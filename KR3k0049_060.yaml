body:
  text: 麟毛蟲之長毛蟲三百六十而麟為之長家語鳳為羽族之美麟為毛類之俊龜龍為介蟲之長楩柟為衆材之最是物之貴也任子玄枵之獸麒麟者玄枵之獸陰之精也鶡冠子禽獸之瑞麟有五采腹黃高丈二金獸之瑞京房天宮五獸中有大角軒轅麒麟之信凡麟生於火游於土故修其母致其子五行之精也視明禮修則麒麟臻蔡雍月令四靈之首麟鳳龜龍謂之四靈麟以為畜則獸不狘禮歲星得歲星散為麟保乾圖機星得機星得則麒麟生萬人壽春秋運斗樞仁獸麒麟者仁獸也牡曰麒牝曰麟不刳胎剖卵則至麕身而牛尾狼項而一角黃色而馬足含仁而戴義音中鍾呂步中規矩不踐生蟲不折生草不食不義不飲汙池不入坑穽不行羅網明王動靜有儀則見牡鳴曰逝聖牝鳴曰歸和春鳴曰扶幼夏鳴曰養綏宋符瑞志𪊭𪊺狼題肉角博雅擇土而後踐位平然後處不群居不旅行紛兮其有質文也幽閒則循循如也動則有容儀說苑嘉祥麟王者嘉祥也食嘉禾之實飲珠玉之英瑞應圖麟一角明海內共一主也王者不刳胎不剖卵則出於郊春秋感精符一角獸者六合同歸則至瑞應圖麟有角示有武有肉示不用正義好生古之王者其政好生惡殺麒麟在郊野孫卿子恩至蟲羽則麒麟至張網焚林則麒麟去春秋繁露在囿黃帝時麒麟在囿中候黃帝之世以麟為畜三五曆紀游田堯時麒麟在郊藪唐傳唐虞之世麟鳳遊於田孔叢子步庭禹時鳳凰棲於木麒麟步於庭吳越春秋游苑成王時麒麟遊苑宋志蒼之滅也麟不榮也麟木精也宋均曰麟木精生水故曰陰木氣好土土黃木青故麟色青黃不榮謂見絏也孔演圖叔孫氏之車子曰鉏商樵於野而獲麟焉衆莫之識以為不祥棄之五父之衢冉有告夫子曰麕身而肉角豈天之妖乎夫子曰今何在吾將觀焉遂往謂其御高柴曰若求之言必其麟乎到視之果信言偃問曰飛者宗鳳走者宗麟為其難致也敢問今見其誰應之子曰天子布德將致太平則麟鳳龜龍先為之祥今宗周將滅天下無主孰為來哉遂泣曰豫之於人猶麟之於獸也麟出而死吾道窮矣乃歌曰唐虞世兮麟鳳遊今非其時吾何求麟兮麟兮我心憂孔叢子子貢問曰夫子何泣爾麟之至為明王也出非其時而見害吾是以傷焉家語何敞云鸜鵒來巢昭公有乾侯之厄西狩獲麟孔子有兩楹之殯後本傳終軍從武帝幸雍祀五畤獲白麟一角而五蹄時又得奇木其枝旁出輒復合於木上上異此二物博謀群臣軍上對曰野獸并角明同本也衆枝內附示無外也殆將有解編髮削左袵習冠帶要衣裳而蒙至化者焉對奏上甚異之由是改元為元狩後數月越地及胸奴名王有率衆來降者時皆以軍言為中本傳元狩元年行幸雍獲白麟作白麟之歌曰朝隴首覽西垠雷電燎獲白麟爰五趾顯黃德禮樂志宣帝時神爵元年詔曰乃元康四年九真獻奇獸晉灼曰漢注駒形麟色牛角仁而愛人西都賦九真之麟昔人未見麟問嘗見者曰麟何類乎曰麟如麟也問者曰若吾嘗見麟則不問子矣而云麟如麟寧可解哉見者曰麟麏身牛尾鹿蹄馬背問者霍解牟子理惑論壽抱朴子曰麟壽三千歲廣雅曰壽一千歲李巡曰麟瑞應獸名孫炎曰靈獸也論衡曰太平之瑞也獸聖夫鳳凰鳥之聖者也騏驎獸之聖者也五帝三王皋陶孔子人之聖也十二聖相各不同而欲以麞戴角則謂之騏驎相與鳳凰象合者謂鳳凰如何論衡講瑞儒者說鳳凰麒麟仁聖禽也思慮深避害遠中國有道則來無道則隱夫孔子見麟而自泣者據其見得而死也使麟有知為聖王來時無聖王何為來哉思慮深避害遠何故為魯所獲殺乎上指瑞不為瑞嗟乎鉏商一獲而周室衰孝武一獲而漢祚微章帝何人而元和二三年間郡國上麟者五十一安帝延光亦且三見孝獻延康之元一年之間至十獻於郡國石季龍開華林郡國上送蒼麟二八爰俾張司虞調之以駕芝蓋晉宋以降無代無有而孟蜀之邦乃至多於大彘不知果何物耶路史禽不祥神龍見喪風雲之象也鳳凰來失尊戴之象也麒麟出亡國土之象也觀我之義禽必不義也以彼為祥禽必不祥也談子化書援神契曰德至鳥獸則麒麟臻是非有明王則五靈不至也榖梁疏哀十四年左傳服虔注云視明禮修而麟至思睿信立白虎擾言從義成則神龜在沼聽聰知正而名山出龍貌恭體仁則鳳凰來儀詩麟趾序騶虞義獸也白虎黑文不食生物王者有至信之德則應之瑞應圖林氏國有珍獸大若虎五彩畢具尾長於身名曰騶吾虞乘之日行千里海內北經王者仁而不害則白虎見白虎者仁獸也虎而白色縞身如雪無雜色嘯則風生徵祥記白虎者義獸也一名騶虞王者德至禽獸澤洞幽冥則見瑞應圖騶虞贖罪文王拘羑里散宜生取怪獸尾倍於身獻紂以贖其身名曰騶虞尚書大傳紂囚文王閎夭之徒詣林氏國求得騶虞獻之紂大悅乃什之六韜般般司馬相如封禪書云囿騶虞之珍群頌曰般般漢作股之獸樂我君囿白質黑章其儀可喜狀狀穆穆君子之態史作能蓋聞其聲今視其來南郡獲宣帝詔曰乃元康四年南郡獲白虎威鳳為寶朕之不明震於珍物漢紀昔文王應九尾狐而東夷歸周武王獲白魚而諸侯同心周公受秬鬯而鬼方臣宣王得白狼而夷狄賓今南郡獲白虎亦偃武興文之應也四子講德論宋元嘉二十五年白虎見蜀郡二赤虎導前二十六年白虎見南琅邪半陽山二虎隨從符瑞志鹿隨王蜀永平三年五月騶虞見璧山有二鹿隨之五代史角端日行萬八千里又曉四夷之語明聖在位明通方外幽遠之事則奉書而至宋符瑞志元太祖提兵回回國與速不䚟追至印度國鐵門關侍衛見一獸高數百丈鹿形馬尾緑毛而角能為人言謂之曰此非帝世界汝主宜早還左右皆震懾元主怪之以問耶律楚材對曰此獸名角端乃旄星之精也日行萬八千里能解四夷語是惡殺之象今大軍征西已四年蓋上天惡殺遣之以告陛下也且此獸靈異如鬼神不可犯也願承天心宥此數國人命元主即日班師元史輟耕録癸辛雜志東北荒中有獸如牛一角毛青四足似熊見人鬪則觸不直聞人論則咋不正名曰獬豸一名任法獸故立獄皆東北依所在也神異經張華曰今御史法冠曰獬豸獬豸似山牛一角古者決訟令觸不直古者神人以豸遺黃帝帝曰何物何處曰食薦春夏處水澤秋冬處松柏說文御覽引秋冬處竹箭松筠毛為帳堯時有獬豸緝其尾為帝帳田求子觟𧣾者一角之羊也性知有罪皋陶治獄其罪疑者令羊觸之有罪則觸無罪則不觸斯蓋天生一角聖獸助獄為驗故皋陶敬羊起坐事之論衡武后時侍御史侯思止本賣餅人以羅告人授五品官高元禮呼為侯大曰上不次用人若言侯大不識字即奏云獬豸獸亦不識字而能觸邪陛下用人安事識字無何后問思止以對后大悅舊唐産神羊開元二十一年富平縣産一角神羊肉角當頂白毛上捧議者以為獬豸雜俎舊唐神羊獬豸神羊也輿服志日走五百里虓獅子也說文狻猊如虥猫食虎豹爾雅狻猊日走五百里郭璞曰獅子也穆天子傳毛群之長獅子形似虎正黃有髯耐尾端茸毛大如斗銅頭鐵額鉤爪鋸牙彌耳跪足目光如電聲吼如雷能食虎豹外國之産毛群之長也東觀漢記章帝章和元年安息國遣人獻獅子形似麟而惟無角後漢後魏武帝伐冒頓經白狼逄獅子使人格之殺傷甚衆王乃自率常從軍數百擊之獅子哮吼奮起左右咸驚王忽見一物從林中出如狸起上王軍軛師子將至此獸便跳起上獅子頭上即伏不敢起於是遂殺之得師子一還來至洛陽三千里雞犬皆伏無鳴吠博物志梁伯玉說沙門釋僧吉云嘗從天竺欲向大嶺其間忽聞數十里外哮哮檻檻驚天怖地頃之但見百獸率走伏地欲絶而四巨象虓焉而至以鼻卷泥自厚塗數尺數數噴鼻隅立俄有獅子三頭見於山下直搏四象崩血若濫泉巨樹草偃宋炳擊象圖序宋宗愨字元幹隨檀和之伐林邑入象浦林邑王范陽邁傾國來拒以具裝被象前後無際愨曰吾聞獅子威服百獸乃制其形與象相禦象果驚奔衆因潰散遂克林邑收其異寶雜物不可勝計宋書元魏波斯國獻獅子永安末始達京師莊帝謂侍中李或曰朕聞虎見獅子必伏可覔試之於是詔近山郡縣捕虎以進鞏縣山陽并進二虎一豹見獅子悉瞑目不敢仰視園中素有一盲熊性甚馴善帝令取試之虞人牽盲熊至聞獅子氣驚怖跳踉曳鎖而起帝大笑伽藍記舊說獅子虎見之而伏豹見之而瞑羆見之而躍黃白獅梁武帝時波斯獻生獅子帝問曰獅子有何色劉顯曰黃獅子超不及白獅子超南史顧光寶能畫建康陸溉患瘧經年光寶詣之遂命筆以墨圖一獅子謂溉曰此出手便靈異可于戶外榜之虔誠祈禱溉如具言是夕中夜戶外有窸窣之聲良久乃不聞明日所畫獅子口中臆前有血淋漓及于戶外皆有點焉溉病遂愈時人異之八朝家怪録蒲延昌者孟蜀廣政中進畫授翰林待詔時福感寺禮塔院僧模寫宋展子虔獅子于壁延昌一見曰但得其樣未得其筆耳遂畫獅子一圖獻通進王昭遠公有嬖妾患痁是夕懸於臥內其疾頓減王公召而問其神異延昌云宋展氏子處於金陵延祚寺佛殿之內畫此二師子患人因坐壁下或有愈者梁昭明太子偶患風恙御醫無減吳興太守張僧繇模此二師子密懸寢堂之內應夕而愈故頭曰辟邪有此神驗久矣益州名畫録獸王蒲州沙門寶澄初于蒲坂普濟寺創營大像百丈未成而卒道積修建十年雕裝始就初積受請之夕寢夢崖傍見二獅子於大象側連吐明珠相續不絶既寤惟曰獸王自在則見法流無滯寶珠自湧又喻財施不窮冥運潛開功成斯去即命工匠圖夢所見於彌勒大像前冥報記中宗時有大石國使請獻獅子姚璹上疏諫曰獅子猛獸唯止食肉遠從碎葉以至神都肉既難得極為勞費陛下以百姓為心慮一物有失鷹犬不畜漁獵揔停運不殺以闡大慈垂好生以敷至德凡在翾飛蠢動莫不感荷仁恩豈容自菲薄於身而厚資給於獸求之至理必不然乎疏奏遽停來使舊唐客有問於浮休子曰來俊臣之徒何如對曰昔有獅子王於深山攫一豺將食之豺曰請為王送二鹿以自贖獅子王喜周年之後無可送者王曰汝殺衆生亦已多今次到汝汝其圖之豺默無對遂齚殺之俊臣之輩何異豺也未幾俊臣之徒皆遇禍浮休子開元末西國獻獅子至安西道中繫於驛樹近井獅子哮吼若不自安俄頃風雨大至有龍出井而去國史補集賢校理張希復言舊有獅子尾拂夏月蠅蚋不敢集其上酉陽雜俎元朝大會群臣盡出諸獸於萬歲山若虎豹熊象之屬一一置列訖然獅子至身才短小絶類人家所畜金毛猱狗諸獸見之畏懼俯伏不敢仰視及各飼以雞鴨野味之類諸獸不免以爪按定用舌去其毛羽惟獅子則以掌擎而吹之毛羽紛然脫落此其所以異於諸獸也輟耕録元時有貢獅子者首類虎身如狗青黑色宮中以為不類所畫者疑非真其使牽入虎牢皆俯首帖耳不敢動獅子遂溺於虎之首虎亦莫敢動也乃知為真獅子癸辛雜志畏鉤戟獅子五色而食虎於巨山之岫一噬而百人仆惟畏鉤戟束晳發蒙記釋氏書言獅子筋為絃鼓之衆絃皆絶西域有黑獅子棒獅子舊說蘇合香獅子糞也酉陽雜俎聚窟洲在西海中申未之地地方三千里北接崑崙二十六萬里有獅子辟邪巨齒天鹿長牙銅頭鐵額之獸十洲記譬如大獅子吼小獅子聞悉皆勇健一切禽獸遠避竄伏新華嚴僧伽彼或師多此云師子僧伽梁云小師子翻譯名義搖光星散搖光之星散而為象運斗樞人希見生象也而得死象之骨按其圖以想其生也故諸人之所以意想者皆謂之象也韓子解老豫象之大者曰豫賈侍中云不害於物白象神靈滋液百寶為用則白象至援神契王者自養有道則白象至負不死藥來瑞應圖梁山南方之美者有梁山之犀象焉爾雅舜葬蒼梧下有群象常為之耕禹葬會稽祠下有群象耕田帝王世紀伊尹說湯以至味曰肉之美者腥腥之脣旄象之約呂本味仙人王子喬駕白象游於高安之荷山其象化為石山中有池多紅蓮豫章記晉范宣子為政子産寓書於子西以告宣子曰長國家者非無賄之患而無令名之難象有齒以焚其身賄也襄二十四吳伐楚針尹固與王同舟王使執燧象奔吳師杜預曰燒燧火繫象尾吳師驚却之左定四泣歌舊說象性久識見其子皮必泣一枚重千斤酉陽雜俎莊周婦死而歌曰通性命者以卑及尊死生不悼周不可論也夫象見子皮無遠近必泣周何忍哉蔣子萬機論牙為火籠漢制天子以象牙為火籠西京雜記武帝時南海獻馴象成帝咸康六年林邑王獻象一能拜跪漢書河南府有象莊舊傳漢時西域僧以象馱經至洛陽化為石今石象猶存山川紀異舟稱孫權遣使詣闕獻馴象二頭魏太祖欲知其斤重咸莫能出其理時鄧王沖尚幼乃曰置象大船刻其所至稱物以載之可知也太祖大悅即施行焉江表傳賀齊還新都孫權出祖道作樂舞象權謂齊曰今定天下都中國使殊俗貢珍狡獸率舞非君而誰吳書魏文帝時南越獻白象子在帝前任成王曹彰手頓其鼻象伏不動拾遺記晉時南越致馴象於皋澤中養之為作車黃門鼓吹數十人令越人騎之每正朝大會皆入充庭帝行則以象車導引以試橋梁後象以鼻擊害人有司祝之而殺象象垂鼻泣血流地不敢動自後朝議以象無益於事悉送還越晉諸公贊會稽張茂嘗夢大象以問萬推曰君當為大郡而不能善終夫象者大獸取其音獸者守也象以齒焚其身後必為人所殺茂永昌中為吳興太守值王敦問鼎執正不移敦遣沈充殺之而取其郡異苑始興郡陽山縣人行田忽遇一象以鼻卷之遙入深山見一象腳有巨刺此人牽挽得出病者即起載人入一紆絀地以鼻掘出數條長牙送還本處本境苗稼常為象所困其象俗呼大客因語曰我田稼在此恆為大客所犯若念我者勿見侵便覺躑躅如有馴解於是一家業絶無其患上宋沈攸之為荊州刺史時有象三頭至江陵城北數里攸之自出格殺之南史元魏永平二年乾羅國胡王獻白象背施五彩屏風七寶坐床容數人真是異物常養象於乘黃曹象嘗壞屋敗牆走出於外逄樹即拔遇牆亦倒百姓驚怖奔走交馳太后令徙於永橋南道象坊伽藍記周軍通江陵梁人出戰梁以二象被之以甲束刃於鼻令崑崙奴馱之以戰楊忠射之象反走三國典略隋文帝遣大將軍劉方等擊林邑其王梵志乘巨象而戰方軍不利方乃多掘小坑草覆其上因以兵挑之方與戰僞北梵志逐之其象陷軍遂亂方大破之志棄城走遂入其郡獲其廟主十八枚皆鑄金為之蓋其國十有八世北史四牙五足高宗時周澄國遣使上表云訶伽國有白象首垂四牙身運五足象之所在其土必豐既有威靈又弭災患力兼十象強制百人以水洗牙飲之愈疾請發兵迎取以獻之上謂侍臣曰夫作法於儉其弊猶奢誰能制之故聖人越席以照儉茅茨以誡奢書云珍禽奇獸不育于國知無益之源不可不遏朕安用其象令其遠獻乃勞其使而遣之唐書明皇每賜酺御樓引大象犀牛或拜或舞動中音律及西幸蜀祿山驅掠舞象舞馬盡入洛陽一日大設聲樂出幽燕戎王番胡酋長多未之見因出象紿之曰此自南海奔至以吾有天命雖異類必拜舞左右教之象皆瞪目憤怒略無拜舞者祿山慚怒盡坑殺之明皇雜録自永徽以來文單國纍獻馴象凡三十有二皆豢於禁中頗有善舞者以傋元會充庭之飾及德宗即位曰王者不尚異物不貴難得之貨今官用費而物性不得非宜也悉放於荊山之陽舊書宏詞獨孤綬所司試馴象賦及其本上上吟其句曰化之式孚則必受乎來獻物或違性斯用感於至仁上以綬為知去就故特書第三先是代宗朝越人獻象三十有二上悉放之於山之南而綬不辱其受獻不傷其放棄故賞其知去就焉杜陽編又云返諸林邑之野歸爾梁山之隅時在偃兵豈嬰乎燧尾上惟賤賄寧惜乎焚軀象膽宋淳化中上苑一象斃太宗命取膽不獲徐鉉曰當在前左足果得之問其故鉉曰象膽隨四時在足今方春故知之類苑龍象龍象六十歲骨方足今荊地象色黑兩牙江猪也象膽隨四峕在四腿春在前左夏在前右如無定體也鼻端有爪可拾針肉有十二般唯鼻是其本肉陶貞白言夏月合藥宜置牙於藥旁南人言象尤惡犬聲獵者裹糧登高樹構熊巢伺之有群象過則為犬聲悉舉鼻吼叫循守不復去或經五六日困倒則下潛刺殺之耳穴薄如鼓皮一刺而斃胸前小橫骨灰之酒服令人能浮水出沒食其肉令人體重廣之屬郡潮循州多野象牙小而紅最堪作笏潮循人或捕得象爭食其鼻云肥脆偏堪作炙或云象膽不附肝隨月轉在豬肉楚越之間象皆青黑唯西方拂林大食國即多白象劉恂有親表曾奉使雲南彼中豪族各家養象負重致遠如中夏之畜牛馬也蠻王宴漢使於百花樓樓前入舞象曲動樂作優倡引入象以金羈絡首錦繡垂身隨拍騰踏動頭搖尾皆合節奏嶺表録異安南有象能知人曲直有鬪訟者行立而嗅之有理者即過負心者以鼻捲之擲空中數丈以牙接之應時碎矣莫敢競者朝野僉載玄裝往西域取經事訖辭還東歸女曲城王戒日勑所部遽送出境并施青象金銀錢各數萬裝辭而不受以象形大日常料草四十餘圍餅食所須又三斛許戒日又敕令諸屬國隨到供給諸僧勸受象施曰斯勝相也佛滅度來王雖崇敬种种布施未聞以象用及釋門象為國寶今既見惠信之極矣因納象而反錢寶象形圓大高可丈三長二丈許容八人并諸什物經像等具並在其上狀如重堵相以空行雖逢奔逸而安穩不墜瓶水不側緣國北旋出印度境過葱嶺至烏鎩國與象別行先渡雪河象晚方至水漸泛漲不悉山道尋嶺直下牙衝岸樹象性凶獷反拔卻頓因即致死玄裝傳群象牙能抵觸鼻善卷舒力卻九牛奔過駟馬矣別有阿耨池岸香醉山陰象則鼓雙翼以飛騰用七支而巧便在夫海山之象百倍絶論厥號藹羅伐拿象中龍也唐高僧感通香象百丈禪師曰如香象渡河截流而過無有滯疑慧忠國師云如世大師斤斧不傷其手香象所負非驢能堪將軍安南人呼象為將軍有獵者曾入深山為白象鼻卷上背止宿高樹明見巨獸高十餘丈攫食白象所領一頭其人纍射獸中其口斃之歸白都護都護髮使隨之巨獸但存餘骨十人舁致一節有孔通人來去廣異記環王國野象成群一牡管牝三十餘牝者牙才二尺迭供牡者水草臥則環守牝象死共穵地埋之號吼移時方散又國人養馴者可令代樵酉陽昔日南貢四象各有雄雌其一雌死於九貢至南海百有餘日其雄泥土著身獨不飲酒食肉長史問其所以輒流涕焉博物志象被傷則群黨相扶將去則向南跪拜鳴三匝以木覆之寰宇記林邑人殺象象怒布陳以鬪人人登樹取衣掛樹枝緣它樹而走象見衣以為人存以鼻汲水灌樹且枝倒不見人怒踏碎其衣而去象病首必向南而死肉粗連皮煮易熟牙笋足掌肉稍佳安南志驃國王宮有巨白象高百尺訟者焚香跽象前自思是非而退有災疫王亦對象跽自咎唐書其王近適則舁以金繩床遠適則乘象舊南蠻環王衛兵五千戰乘象率象千馬四百分前後不設刑有罪者使象踐之舊唐藏牙象牙長一丈餘脫其牙則深藏之削木代之可得不爾窮其主得乃已南越志俗傳象牙歲脫猶愛惜之掘地而藏之人欲取當作假牙潛往易之覺則不藏異物志乳象三歲一乳說文古訓言象孕子五歲始生酉陽性妬禱過之山多象注性妒不畜淫子山經牙生理什氏書言象牙生理必因雷聲酉陽象耳中有油出謂之山性發往往奔逸傷人牧者視象耳有油出則多以索縻之孔平仲談苑僧順法師三破論云或有三盲摸象得象耳者爭云象如簸箕得象鼻者爭云象如舂杵雖獲象一方終不得全象之實說泥洹是死真摸象之一盲矣弘明集凡象白者西天有之又供御陀國有青象皆中夏所無也北戶録鄭文振潮陽人言象為南方之患土人苦之不問蔬穀守之稍不至踐食之立盡性嗜酒聞酒香輒破屋壁入飲之人皆於其來處架高木若望火樓然常有人直象獨畏煙火先用長竿接茅把於其杪望見其來共然火把持竿以指之即去隨之三數里方敢回恐其復來也眼惡蠅蚋有日色則不出群行者猶庶幾其獨行者最喜傷人蓋勢孤恐人害之也土人懸巨木設機壓之能殺惟象鞋者用厚木當中鑿深竅方容其足中植大錐其末上向竅之外周回浚鑿之如今之唾盂而加峻密密埋於其往來之所以草覆之倘投足木上必滑下竅中其既著錐洞貫其足不能自拔即仆負其痛不能食展轉謂之著鞋然猶能以牙傷人人未敢近數日後稍困則衆鎗攢殺之而分其肉留其皮趁濕切作條絣乾連枷等用自潮陽來必經由夔江嶺此處最多先使人行前探之或遇其大群有候數日不去不敢行者監司巡歷則其保甲鳴邏鼓趕逐之頑然若無聞也必俟其自散去乃敢過宋莘視聽抄燕京昔有一雄象甚大凡傷死數人官使殺之不得已乃明其罪象遂帖耳就殺凡得象油四十八大甕癸辛雜志有一僧行遇群象上樹避之象隨倒樹負之至林中有一病象足瘡而臥引沙門手至所苦處乃竹刺沙門為拔去之裂裳與裹俄頃一象持金函授病象病象轉授沙門發視之乃佛牙也西域記伽郍梁翔法師云象一名伽郍北戶録或那先翻譯讚象之為獸形體特詭身倍數牛目不踰豕鼻為口役望頭若尾馴良承教聽言則跪素牙玉潔載籍所美服重致遠形如丘徙南州異物志禱過之山多犀兕注云犀形似水牛猪頭庳腳腳似象有三蹄大腹黑色三角一在頂上一在頃上一在鼻上在鼻上者小而不墮食角也好噉棘口中常灑血沫山經犀出九德縣其毛如豕蹄有三甲頭如馬有三角鼻上角短額上頭上角長劉欣明交州記山犀二角以額上者勝本草犀體兼五種肉舌有棘常食草木棘刺不食棘葉也異物志駭雞太公使南宮適至義渠得駭雞犀以獻紂韓詩楚王獻駭雞犀為上瑞國策文犀武帝時吠勒國貢文犀四頭狀如水犀角表有光因名明犀置暗中有光影亦曰影犀織以為簟如錦綺之文洞冥記元始二年黃攴國獻犀牛應劭曰黃攴在日南之南去京師三萬里平紀白犀章帝元和元年日南獻白雉白犀東觀漢記除凶西南夷土有異犀三角夜行如大炬火照數千步或時解脫則藏於深密之處不欲令人見之王者貴其異以為簪能消除凶逆梁祚魏國統東海蔣潛嘗至不其縣見林下踣一尸已臭爛烏來食之輒見一小兒長三尺許來驅烏烏乃起如此非一潛異之乃就看之見死人頭上著通天犀導價數萬錢乃拔取之既去衆烏爭集無復驅者潛後以此導上晉武陵王王薨以襯衆僧王武剛以九萬錢買之後落禇太宰處猪以餉齊故丞相豫章王王死後內人江夫人遂斷以為叉每夜輒見一兒繞床頭啼叫云何為見屠割必當相報終不獨受枉酷江夫人惡之月餘遂薨續齊諧記兼名苑云宋岑獲通犀賣與廬陵王義真又元康末婦以犀角為斧鉞戈戟戴之用也北戶注開元元年冬至交趾國進犀角一株色如金使者請以金盤置放殿中溫然暖氣襲人上問其故使者對曰此辟寒犀也開元遺事水犀匣貴妃紅漆屏風以玳瑁水犀為匣外傳唐德宗貞元十二年南海獻馴犀詔納苑中至十二年冬大寒馴犀死英華夜明犀敬宗寶曆元年南昌國進夜明犀其狀類通天夜則光明可照百步覆繒千重終不能掩其輝煥上令解為腰帶每游獵夜則不施蠟炬有如晝日杜陽編文宗延學士於內庭李訓講周易時方盛夏上命取水玉腰帶及辟暑犀以賜之響犀文宗時宮人沈那翹吳元濟之妓女進白玉方響光明皎潔可照十數步王犀槌鄖響犀也凡物有聲乃響應其中焉雙龍犀大中初女蠻貢雙龍犀有二龍鱗鬣爪牙悉備杜陽編宣宗時山南西道觀察使奏渠州犀牛見差官押赴闕庭既至牽入便殿閲之仍於月華門外宣示百寮上慮傷物性命中使押還本道復放於渠州之野東觀奏記蠲忿犀懿宗同昌公主出降帶蠲忿犀其犀圓如彈丸入土不朽爛帶之令人蠲忿怒杜陽臥魚楊收女適裴坦長子嫁資豐厚坦尚儉聞之不樂一日夫人至新婦院臺上視果楪乃臥魚犀遽指袖出北夢瑣言占城國用顯德中貢方物有雲龍形通犀帶菩薩石錢武肅王時有獻雲鶴水犀帶者武肅登碧波亭命許彥方係帶試水水開七尺許李司封宗易嘗言石駙馬保吉知陳州其州廨一皆新之每毀舊屋則坐於下風塵自分去人皆驚怪之蓋其所服辟塵犀也本草辟塵犀為婦簪梳塵不著髮嶺表志異通天犀有白理如線者以盛米置群雞中雞欲往啄米至輒驚却故南人名為駭雞也得其角一尺以上刻為魚而銜以入水水常為開方三尺可得氣息水中以其角為義導者得煮毒藥為湯以此義導攪之皆生白沫無復毒物則無沫起也通天犀所以能殺毒者為物食百草之毒及衆木棘歲一解角藏於山中人以木如其角代之犀不覺後年輒復解抱朴子通犀置大霧重露下終不霑濡又堪辨毒藥酒藥酒生沫或中毒箭刺於瘡中立愈蓋犀食百毒棘刺故也北戶録注海中出離水犀似牛其出入有光水為之開南越志犀之通天者必惡影常飲濁水當其溺時人趁不復移足角之理形似百物或云犀角通者是其病然其理有倒插正插腰鼓插倒者一半已下通正者一半已上通腰鼓者中斷不通故波斯謂牙為白暗犀為黑暗醫人吳士皋常職於南海郡見舶主說本國取犀先於山路多植木如徂栻云犀前腳直常倚木而息木木爛折則不能起犀牛一名奴角有鴆處必有犀也犀三毛一孔劉孝標言犀墮角埋之以假角易之酉陽王燦遊海賦云群犀代角巨象解齒林邑國記曰犀行過叢林不通便開口露齒前向直指棘林自開犀有特神者角有光耀白日視之如角夜暗之中理皆粹然光由中出望如火炬欲知此角神異置之草野飛鳥走獸過皆驚萬震南州異物志雞昧白犀角之好者稱雞昧白廣志墮羅犀墮和國多美犀世謂墮和羅犀唐書犀中最大者墮羅犀一株有重七八斤者云是枯犀額角其花多作撒豆斑色深者堪帶胯斑散而色淺者即拍為盤楪器皿之類嶺表録異周顯德五年占城王釋利因德漫遣其臣莆訶散貢方物有雲龍形通犀帶菩薩石宋史為鎧兕如野牛青皮堅厚可以為鎧說文嶓冢之山獸多禱過之山其下多犀兕注兕似水牛青色一角重三十斤山經兕有一角長三尺餘形似馬鞭柄交州記雌陳藏器云兕是犀之雌者而形不同本草武王東伐師行師尚父左杖黃鉞右把白旄以誓曰蒼兕蒼兕總爾衆庶與爾舟楫後至者斬遂至盟津齊世家太師尚父為周司馬將師伐紂到孟津之上杖鉞把旄號其衆曰蒼兕蒼兕夫蒼兕水中之獸也善覆人船因神以化令汝急渡不急渡蒼兕害汝河中有此異物時出浮揚一身九頭人惡畏之未必能覆舟也論衡邢子才文蒼雉奉職靈鼉自梁索隱云本兕或作蒼雉平公射鴳不死使豎襄搏之失公怒拘將殺之叔向聞之夕君告之叔向曰君必殺之昔吾先君唐叔射兕于徒林殪以為太甲以封于晉今君嗣吾先君唐叔射鴳不死搏之不得是揚吾君之耻者也君其必速殺之勿令遠聞君忸怩顏乃趣赦之晉語荊莊哀王獵於雲夢射隨兕中之申公子培劫王而奪之王以為不敬命立誅之左右諫乃止未三月子培死荊興師戰於兩棠大勝晉歸而賞有功者申公子培之弟進請賞於軍旅曰臣兄之有功也車下也王者何謂也對曰臣之兄嘗讀故記曰殺隨犀者不出三月是以臣之兄驚懼而爭之故欲王持千歲之壽也伏罪而死王令人發視乎府而視之於故記果有乃厚賞之呂覽說苑作射科雉狂兕楚王遊於雲夢結駟千乘旌旗蔽天野火之起也若雲霓兕虎嘷之聲若雷霆有狂兕牂車依輪而至王引弓而射之一發而殪王抽旃旄而抑兕首仰天而嘆曰樂矣今日之遊也寡人萬歲千秋之後誰與樂此矣趙策招魂云與王趨夢兮課後先君王親發兮憚青兕夫兕虎有域動靜有時避其域省其時則免其兕虎之害也兕惟壯獸似牛青黑力無不傾自焚以革皮充武備角助文德山經圖贊熊能攀援上高樹見人則顛倒投地而下冬入穴而蟄始春而出詩義熊獸藏於山穴穴裏不得見穢及傷殘則合穴自死又有居大樹孔中東土呼熊為子路以物擊樹云子路可起於是便下不呼則不動也述異記壽五百玉策記稱熊壽五百歲五百歲則能化為狐狸抱朴子熊膽熊膽春在首夏在腹秋在左足冬在右足酉陽神靈滋液百珍寶用則赤熊見赤熊見則奸宄自遠援神契周文王拘於羑里散宜生得黃熊獻紂免西伯之難六韜成王時東胡獻黃熊周書王會青熊成王時不屠國進青熊周書黃熊入寢鄭子産聘於晉晉侯有疾韓宣子逆客私焉曰寡君寢疾於今三月矣竝走群望有加而無瘳今夢黃熊入於寢門其何厲鬼也對曰以君之明子為大政其何厲之有昔堯殛鯀於羽山其神化為黃熊以入于羽淵實為夏郊三代祀之晉為盟主其或者未之祀也乎韓子祀夏郊晉侯有間昭七晉平公夢見赤熊窺屏惡之而有疾使問子産子産曰昔共工之御曰浮遊既敗於顓頊自沒深淮之淵其色赤其言善笑其行善顧其狀如熊常為天王祟見之堂則王天下者死見堂下則邦人駭見門近臣憂見庭則無傷窺君之屏病而無傷祭顓頊共工則瘳公如其言而疾間瑣語射熊晉平公夢見知人五日寤而曰我之帝所見一熊欲援我帝命我射之中熊熊死又有一羆來又射之中羆羆死帝甚喜賜我二笥後有當道者曰帝令主君滅二卿熊與羆皆其祖也忽不見史記漢武時二師得天馬帝以玫瑰石為鞍鏤以金銀鍮石以緑地五色錦為蔽泥後稍以熊羆毛有緑光皆可二尺者直百金卓王孫有百餘雙詔使獻二十枚西京雜記入宮兆亡昭帝時昌邑王賀聞人聲曰熊視而見大熊左右莫見以問郎中令龔遂遂曰熊山野之獸而來入宮室王獨見之此天戒大王恐宮室將空危亡象也賀不改寤後卒失國漢五行志緑熊席趙飛燕女弟居昭陽殿玉床白象牙簟緑熊席席毛長二尺餘人眠而擁毛自蔽望之不能見坐則沒膝其中雜熏爐香一坐此席餘香百日不歇西京雜記元帝馮昭儀上幸虎圈鬭獸後宮皆坐熊出圈攀檻欲上殿昭儀乃當熊而立及左右格殺熊上問人情驚懼汝何故前當昭儀對曰夫猛獸得人而止妾恐熊至御座故身當之耳帝嗟嘆以此陪敬重之漢書咸和七年左右啓以米飴熊上曰此無益而費於穀且是惡獸所不宜畜使遣打殺以肉賜左右直人建武故事白熊元嘉二十年白熊見新安歙縣太守到元度以獻宋書烏熊南蠻東謝蠻貞觀三年其酋元深入朝冠烏熊皮高宗時加一曰加毗葉國獻天鐵熊擒白象師子寧王嘗獵於鄠縣界草中得一匱發之乃一少女也自言姓莫氏莊居昨夜遇賊劫某至此賊中二人是僧王命載以后乘時方獲一生熊置匱中如舊鎖之時上方求極色王以莫氏衣冠子女即日表上之具其所由上令充才人經三日京兆奏鄠縣食店有僧賃店作法事惟舁一匱入店中夜久腷膞有聲店戶人怪日出不啓門撤戶視之有熊衝人走出二僧已死體骨悉露上知之大笑書報寧王曰寧哥大能處置此僧酉陽紹興己酉永嘉火災前日有熊自南溪至江渡到城下初不懼人命獵士射之悴謂趙允蹈曰熊於字為能火宜慎火燭趙笑以為不然果延燒官民舍十七八獨州治存焉陶朱新録熊白埤雅云熊當心白脂如玉俗呼熊白好舉木引氣謂之熊經莊子熊經烏伸是也熊於山中行數十里悉有跲伏之所必在石嵓枯木中山民謂之熊館唯虎出百里外則迷所出道路墨客揮犀不食鹽熊食少許鹽即宛轉而死胡孫亦然瑣碎録熊方冬唯自䑛其掌故其掌特美烹之難熟晉靈公殺宰夫之胹熊蹯不熟者而楚成見圍請食熊蹯而死以其難熟冀於外救也爾雅桀王天下酒濁而殺廚人紂王天下熊蹯不熟而殺廚人纆子拔樹羆如熊黃白文爾雅注曰羆似熊而長頭似馬有髦高腳猛憨多力能拔樹木關西呼曰貑羆陸璣曰有黃羆赤羆大於熊其脂如熊白而粗理不如熊美嶓冢嶓冢之山多熊羆山經文王將田史編卜曰田於渭陽非龍非彲非虎非羆兆得公侯天遣汝師及田渭陽見太公立為師六韜符健字建業初母姜氏夢大羆而孕及長男果便弓馬載記王羆字熊羆齊神武遣韓軌司馬子如從河東宵濟襲羆羆不覺比曉軌衆已乘梯入城羆尚臥未起聞閣外洶洶有聲便袒身露髻徒跣持一白棒大呼而出謂曰老羆當道臥貉子那得過敵見驚退北史力孟獵者云熊是其雄羆則熊之雌者羆力尤猛爾雅翼鹿畏貙貙畏虎虎畏羆羆之狀被髮人立絶有力而甚害人柳宗元羆說樞星樞星散而為虎運斗樞樞精嘯谷韻清籟於驚蘋震德升乾靉玄枝而布族駱賓王集山獸之君虎山獸之君也說文虎者陽物百獸之長也能噬食鬼魅今人卒得病燒皮飲之繫其衣服亦辟惡此甚驗風俗通風俗通曰呼虎為李耳俗說虎本南郡中廬李氏所化為呼李耳即喜呼班便怒又方言曰陳魏宋楚之間或謂之李父江淮南楚之間謂之李耳自關東西謂之伯都虎食物遇耳即止以觸諱故也般文三九二十七日陽氣成故虎七月而生陽立於七故虎首尾長七尺般般文者陰陽雜也考異郵虞吏山中寅日稱虞吏者虎也抱朴子變復之家謂虎食人者功曹為奸所致也其意以為功曹衆吏之率虎以諸禽之雄也功曹為奸來漁於吏故虎食人以象其意論衡虎豹獸之猛者也居深林廣澤之中則人畏其威而載之人主天下之有勢者也深居則人畏其勢故虎豹去其幽而近於人則人得之而易其威人君去其門而迫于民則民易之而傲其勢故曰虎豹託齒而威可載也管子壽千歲虎及鹿兔皆壽千歲滿五百歲色白抱朴子黃帝與炎帝戰於阪泉之野師熊羆狼豹貙虎為前驅鵰鶡鷹鳶為旗幟此亦力使禽獸者也列黃帝駭人桀之時女樂三萬人放虎於市觀其驚駭管子白虎湯池七十里內懷聖明白虎戲朝其終白虎在野演孔圖虎牢西游有虎在於葭中七萃之士高奔戎請生捕虎必全之乃生捕虎而獻之天子命為柙而畜之東虞是為虎牢穆天子傳周王欲殺王子宜咎立伯服釋虎將執之宜咎叱之虎彌耳而服瑣語皋比宋師次於郎學偃自雩門竊出蒙皋比而先犯之莊子皋比虎皮樂記倒載干戈包之以虎皮名之曰建櫜櫜韜也而其字或作建皋故服虔引以解此注疏虎乳初若敖娶於䢵生鬪伯比若敖卒從其母畜於䢵淫於䢵子之女生子文焉䢵夫人使棄諸夢中虎乳之䢵子田見之懼而歸夫人以告遂使收之楚人謂乳榖謂虎於菟漢書作檡故名榖於菟宣四孔子過泰山側有婦人哭於墓者而哀夫子式而聽之使子貢問之曰子之哭也一似重有憂者對曰然昔吾舅死於虎吾夫又死於虎今吾子又死焉夫子曰何為不去曰無苛政子曰小子識之苛政猛於虎也家語拔尾孔子嘗遊於山使子路取水逄虎於水所與共戰攬尾得之內懷中取水還問孔子曰上士殺虎如何子曰上士殺虎持虎頭又問中士殺虎如何子曰中士捉耳又問下士殺虎如何子曰捉虎尾子路出尾棄之因恚孔子曰夫子知水所有虎使我取水是欲死我乃懷石盤欲中孔子又問上士殺人如之何子曰上士殺人用筆端又問中士殺人如何子曰中士殺人用舌唇又問下士殺人如之何子曰下士殺人懷石盤子路出而棄之於是心服衝波傳見殷藝小說及金樓子吳王將赦越王伍子胥諫曰夫虎之卑勢將以有擊也狸之卑身將以所取也越王既歸大夫扶同謂越王曰猛獸將擊必毛帖伏鷙鳥將搏必卑飛戢翼吳越中黃伯曰余左執太行之獶而右搏雕虎惟心之未與吾心試吾惑焉有力者則又願為牛欲與象鬪以自試今二王子以為義矣將惡乎試之夫貧窮太行之獶也疏賤義之雕虎也而吾日遇之亦足以自試矣尸子中行繆伯手摶虎而不能生也蓋力優而克不能及也淮繆稱雕虎嘯而清風起廣絶交論陳軫曰卞莊子欲刺虎館豎子止之曰虎者戾蟲人者甘餌今兩虎爭人而鬪則大者傷小者死從傷而刺之一舉必有雙虎之名卞莊子以為然立頃之兩虎果鬪大者傷小者死一舉果有雙虎之功史秦策春秋後語勇士一呼而三軍皆避士之誠也昔者楚熊渠子夜行見寢石以為伏虎彎弓而射之沒金飲羽下視知其為石石為之開而况人乎夫倡而不和動而不隨中心有不全者矣夫不降席而匡天下者求之已也韓詩或曰養由基見寢石以為兕也射之矢飲羽論衡養由基射先中石矢乃飲羽誠乎先也伯樂學相馬所見無非馬者誠乎馬也呂精通謂石為虎射之洞開精之至也積歲解牛恢然游刃習之久也北齊文苑序梁鴦言養虎之法凡順之則喜逆之則怒血氣者之性也夫食虎者不敢以生物與之為其殺之之怒也不敢以全物與之為其決之之怒也列黃帝時其飢飽達其怒心虎之與人異類而媚養己者順也秦昭襄王時白虎為害乃募能殺者時夷人胊䏰廖仲藥秦精等伏弩於高樓射殺之昭襄王曰虎歷四郡凡害千二百人一朝降之功莫大焉乃刻石與盟華陽國志秦召公子無忌公子不行使朱亥奉壁一雙秦王大怒將朱亥著虎圈中亥目視虎皆裂血出濺虎終不敢動列士傳昔公牛哀轉病也七日化為虎其兄掩戶而入覘之虎搏而殺之方其為虎也不知其嘗為人也方其為人不知其且為虎也淮俶真訓牛哀病而化虎雖逄昆而必噬思玄賦鞠道龍善為幻術嘗云東海人黃公少時為術能制蛇御虎秦末有白虎見東海黃公以赤刀往厭之術既不得遂為虎所殺三輔人俗用以為戲漢帝亦取以為角抵之戲焉西京雜記祭虎漢景帝好遊獵有獵人見虎無便得之乃為珍饌祭所見之虎帝夢虎死在祭所乃命剝取皮牙餘肉悉化為虎而去獨異志李廣與兄弟共獵於冥山之北見臥虎焉射之一矢即斃斷其髑髏以為枕示服猛也鑄銅寫其形為溲器示厭辱之也他日復獵於冥山之陽又見臥虎射之沒矢飲羽進而視之乃石也其形類虎退而射更鏃破簳折而石不傷余嘗以問楊子雲子雲曰至誠則金石為開西京雜記宋均遷九江郡多虎暴數為人患常募設檻穽而猶多傷害均到下記屬縣曰夫虎豹在山龜魚在水各有所托勞勤張捕非憂恤之本也其務退奸貪思進忠善可一去檻穽除削課制其後傳言虎相與東浮渡江後漢按虎山栖穴處毛鬣婆娑豈能犯陽侯陵濤瀨而橫厲哉里語曰狐欲渡河無奈尾何舟人尚懼况於虎耶若使德被四海虎豈能至之鬼方絶域之地乎風俗通衛刺史喪王業字子香漢和帝時為荊州刺史有德政天子徵之道卒於枝江有三白虎低頭曳尾宿衛其側及喪去踰州境忽然不見百姓追美甘棠共立碑文號曰枝江白虎王君其子孫今猶云白虎王耆舊傳歐寶者後漢人居父喪鄰人格虎虎走趨其廬中即以簑衣覆藏之鄰人尋跡問寶寶白虎豈有可念而藏之乎此虎後送鹿獸以助寶祭時人以為孝慈通於神明由是知名王孚安城記騖禽投案猶請命於魏君窮獸入廬乃祈生於歐氏法苑殺生部理感上虞楊威少失父事母至孝嘗與母入山採薪為虎所逼自計不能禦於是抱木且號且行虎見其情遂彌耳而去自非誠貫精微孰能理感於英獸矣水經注漢宣城大守封邵一日忽化虎食郡民民呼曰封使君時人語曰無作封使君生不治民死食民述異靈帝光和三年夏虎見年樂觀下又見憲陵上詔問楊賜賜對曰虎者金行參代之精狼戾之獸也張均曰虎者西方之獸為禽剛猛強梁之物也漢紀魏文帝時樂浪獻虎文如錦班以鐵為檻梟殷之徒莫敢視任城王彰曳虎尾以繞背虎弭耳無聲拾遺周處年少時凶彊俠氣為鄉里所患又義興水中有蛟山中有邅跡一作白額志怪有邪足虎並皆暴死百姓義興人謂為三橫而處尤劇或說處殺虎斬蛟實冀三橫唯餘其一處即刺殺虎又入水擊蛟蛟或浮或沒行數十里處與之俱經三日三夜鄉里皆謂已死更相慶竟殺蛟而出聞里人相慶始知為人情所患有自改意乃自吳尋二陸平原不在正見清河具以情告并云欲自修改而年已蹉跎終無所成清河曰古人貴朝聞夕死况君前途尚可且人患志之不立亦何憂令名不彰耶處遂改勵終為名臣孝子世說安帝隆安元年五月涼州牧李皓微服出城逢一虎在道邊因化為人遙呼皓為西涼君皓因彎弓弧待之又遙呼皓曰汝無疑也皓知其異乃投弓於地虎人乃前謂皓曰燉煌曰虛不是福地君之子孫王於西涼不如遷徙酒泉言訖乃失未幾皓乃移都酒泉建國稱號西涼王寰宇記邵都梁馮恭永初中醉臥於山路夜有虎來以頭枕其背恭中宵展轉之乃以手搏之復大寢向曉始醒猶見虎蹲在腳後茍有宿命非智士所知也異苑劉牧字子仁嘗居南山野中喜山鳥之啼愛松風之韻植果種蔬為人欺侮多伐樹踐囿牧曰我不負人人何負我俄有二虎近居惟見牧則搖尾牧曰汝來護我也虎輒俯首歷年牧卒虎乃去成應元事獨異志漢江之域貙人能化為虎長沙居民作檻捕虎檻發明日衆人共往格之見一亭長赤幘大冠在檻中坐民問君何以入此中亭長大怒曰昨被縣召夜避雨誤入此中急出我民曰君見召不當有文書即出懷中詔文書於是出之尋視之化為虎即上走搜神記識虎嘯齊沈僧照別名法朗攸之之孫也少事天師道說人吉凶頗有應驗嘗校獵中道而還左右問何故答曰國家有邊事須還處分問何以知之曰向聞南山虎嘯知耳俄而使至梁典老道士梁衡山侯蕭泰為雍州刺史鎮襄陽時虎甚暴村門設檻機發村人炬火燭之見一老道士自陳云從村告乞還誤落檻裏共開之出檻即成虎奔馳而去廣古今五行記擒生虎朱爾榮好射獵不舍晝夜法禁嚴重若一鹿出乃有數人殞命曾有一人見虎便走謂曰欲求活耶遂即斬之自此獵如登戰場曾見一虎在窮谷中乃令人重衣空手搏之不令復損於是數人被殺遂擒得之持此為樂焉北史掩于後周楊忠從太祖狩於龍門獨當一虎左挾其腰右拔其舌太祖壯之北臺謂虎為掩于因以字之周書十一天后時涪州武龍界多虎暴有一獸似虎而絶大日正午逐一虎直入人家噬殺之亦不食其肉自是縣界不復有虎矣録奏檢瑞圖乃酋耳不食生物有虎豹則殺之僉載周書云夾林酋耳酋耳若虎尾參於身食虎豹大傳謂之侄獸唐傳黃中為越州諸暨令有部人飲大醉在中山行臨崖而睡忽有虎臨其上而嗅之虎鬚入醉人鼻中遂噴喋聲振虎遂驚躍便即落崖腰胯不遂為人所得僉載天寶中河南緱氏縣仙鶴觀每年九月二日夜有一道士得仙其夜皆不扄戶以求上升之應後張竭忠攝令疑之至時令二勇者以兵器潛覘之至三更後見一黑虎入觀須臾銜出一道士二人射之不中竭忠大獵于太子陵東石穴中格殺數虎或金簡玉籙或冠帔人髮甚多博異志天寶中巴人伐太白廟前大松有老人以神樹止之巴人不聽老人乃登山呼斑子俄群虎出噬巴人又嶺南山魈亦呼虎為斑子並廣異記裴旻為龍華軍使守北平北平多虎旻善射嘗一日斃虎三十有一既而入山下四顧自矜有父老至曰此皆彪也似虎而非將軍若遇真虎無能為也旻曰真虎安在老父曰自此而北三十里往往有之旻躍馬而往次叢薄中果有一虎騰出狀小而勢猛據地一吼山石震裂旻馬辟易弓矢皆墜殆不得免自此慚懼不復射虎國史補張俊者宣州深水縣尉元淡莊客也其死為虎所取俊誓欲報讐乃挾矢入山於近虎穴處上大樹伺之乃見其妻已死為虎所禁尸自起拜虎訖自解起衣裸而復僵虎又於穴中引四子皆大如狸掉尾歡躍以舌䑛死人虎子競來爭食俊連射斃之截虎頭并殺四子取其首負妻而歸原化記陽朔蘇太玄妻徐氏卒既殯忽一日還家但聞語而不見形云某年命未終冥司不録經旬月知占卜吉凶有鄉人在府充職染疾其眷屬誰往卜之俄頃云去至涼風館南地名柘木林遇虎當道不敢過遂回卜者堅請再往俄頃云疾者已愈因述所居坊曲疾人形貌卜者始信服桂林風土記大中年寧茵秀才於南山莊夜吟有叩門者曰南山斑寅將軍拜謁相與吟詠明驗之乃虎也傳奇寅獸寅獸白齒亦能見機亦云寅客真誥白額侯張鋋次巴西遇白額候於巴西侯席上明驗之乃虎也宣室志潭州華林善覺禪師觀察使裴休訪之問有侍者否師曰有一兩箇乃喚大空小空二虎自菴後出師曰有客且去二虎咆哮而去休問作何行業感得如斯師曰山僧常念觀音聰道人者姓仰氏名德聰姑蘇人太平興國三年結廬於雲間佘山之東峰有二虎為之衛名大青小青行則隨待前後志虎交而月暈仙人鄭思遠常騎虎故人許隱齒痛求治鄭曰唯得虎鬚及熱插齒間即愈即為拔數莖與之因知虎鬚治齒也酉陽按古方刮虎牙治犬咬瘡神效無比北戶録虎殺人能令尸起自解衣方食之虎威如乙字長一寸在脅兩旁皮內尾端亦有之佩之臨官佳無官人所媢嫉虎夜視一目放光一目看物獵人候而射之光墜入地成白石主小兒驚同上虎知衝破又能畫地卜今人有畫物上下者推其奇偶謂之虎卜博物志生角漢中有虎生角道家云虎千歲則牙蛻而角生述異記說文委虒虎之有角者斑奴登山履谷與虎相觸猬為功曹斑奴奔北易林虎臥山林鹿過後朐猬為功曹遂全其軀上虎飢欲食見猬而伏上猬見虎則跳入虎耳酉陽江陵有貙人能化為虎俗云貙虎化為人好著紫葛衣足無踵有五指者人化為虎博物志越俚之民老者化為虎括地圖龍編功曹左飛曾化虎數月還作吏交州記凡虎若食一人耳上缺痕若割裂以驗食人之數無差物類相感志結壇有神能結壇召虎人有疑罪令登壇有罪者虎傷無罪者不顧名虎噬僉載扶南王范尋常畜虎五六頭鰐魚十頭若有訟未知曲直便投於魚虎虎不噬則為有理穢貊之人祭虎為神將有以也異苑波羅南詔謂虎為波羅玉溪編事羅羅雲南蠻人呼虎為羅羅老則化為虎有羅藏山求那跋摩采元嘉元年至南海文帝勑州郡跋發下京路由始興經停歲許始興有虎儀形聳峙峰嶺高絶跋摩謂其髣佛耆閣靈山改名靈鷲此山本多有虎災自跋摩居之晝行夜往或時值虎以杖按頭抒之而去於是山旅水賓去來無梗感德歸化者十有七八焉高僧傳三曲江縣靈鷲山舊多虎一名虎市晉義熙中有天竺僧居此而虎絶舊經虎類能識人氣未至百步輒伏而嘷聲震山谷須臾奮躍搏人人有勇者不為之動止而坐逡巡弭耳而去又虎骨甚異雖咫尺淺草能身伏不露及其虓然作聲則嵬然大矣又虎不食小兒兒癡不知虎之可懼故不得而食兼不食醉人必坐守以俟其醒非俟其醒俟其懼也又人或罹虎口其神魂被虎所役往往為之前導今之人凡死於虎者衣服巾履皆別置於地非虎之威能使之自解是鬼之為也又虎饑則兼果實皆啖不特獸也凡食男子必自勢起婦人必自乳起惟不食婦人之陰或遇之者當作勢與之敵而屢退引至曲路即可避去蓋虎不行曲路故也又虎食犬則醉犬虎之酒也癸辛雜志天虎人虎俗言四指者天虎也五指者人虎也國史補紂為象箸而箕子怖以為象箸必不加於土鉶必將犀玉之杯象箸玉杯必不羹菽藿則必旄象世紀作熊蹯豹胎韓子文王拘於羑里散宜生求得玄豹以獻紂免西伯之難瑞應圖武王為侈靡令人貂檐豹裘方得入廟故貂皮百金功臣之家糶千鍾未得一豹皮管子赤豹舂山百獸所聚也爰有赤豹熊羆穆天子傳乘赤豹兮從文貍楚辭太山多赤豹詩云赤豹黃羆山海尾赤而文黑謂之赤豹陸機疏翟人有獻豐狐玄豹之皮於晉文公文公受客皮而嘆曰此亦皮之美自為罪韓子元封中起神明之臺炮青豹之脯青豹出浪坂之山狀如虎色如翠殺之為脯食之不愚洞冥記武昌記云樊口南有大姥廟孫權嘗獵於山下依夕見一姥問權獵何所得曰正得一豹姥曰何不豎豹尾忽然不見應劭漢官儀云豹尾過役執金吾罷屯解圍天下鹵簿中後屬車施豹尾於道路豹尾之內為省中蓋權事應在此故為立廟也水經注管窺王獻之數歲時嘗看諸門生樗蒲見有勝負因曰南風不競門生輩輕其小兒乃曰此郎亦管中窺豹時見一斑獻之怒曰遠慚荀奉倩近愧劉真長拂衣而去世說建安八年庚申令曰明君不官無功之臣不賞不戰之士治平尚德行有事賞功能論者之言一似管窺虎與魏志注見學狄伯奇少曾遊獵得豹見其文采煥炳遂自感嘆始學書藝後秦記白豹屠州有黑豹有白豹別名貘王會文豹夫豐狐文豹棲於山林伏於巖穴靜也夜行晝居戒也雖飢渴隱約猶且胥疏於江湖之上而求食焉定也然且不免於羅罔機辟之患是何罪之有哉其皮為之災也莊子首山狐死首丘豹死首山是性之異也廣志羅山高入雲霧諸仙所遊上有豹獸文采蔚然小似猿猴南海人名之為果下非凡豹也山記室利佛逝國有橐它豹文而犀角以乘且耕名曰它牛豹唐南蠻傳狼烟狼大如狗蒼色作聲諸竅皆沸䏶中筋大如鴨卵有犯盜者薰之當令手攣縮或言狼筋如織絡小囊蟲所作也狼糞烟直上烽火用之或言狼狽是兩物狼前兩足絶短行常駕兩狼失狼則不能動故世言事乖者稱狼狽酉陽白狼者金狼精也王者仁智明哲即至動准法度則見瑞應圖商湯為天子都於亳有神手牽白狼口銜金鉤而入湯庭田俅子荒服不至周穆王將征犬戎祭公謀父諫不聽遂征之得四白狼四白鹿以歸自是荒服者不至國語周宣時白狼見而犬戎服瑞應圖避狼城周幽王時牛化為虎羊化為狼洛南有避狼城是其處也述異記秦故虎圈周匝三十五步狼圈廣八十步長二十步西去長安十五里漢宮殿疏江都昜王非卒子建立宮人有過縱狼嚙之觀以為樂本傳烏孫王昆莫初生傳父置草中為求食還見狼乳之又烏銜肉翔其旁以為神張騫傳山無豺狼王業為荊州刺史山無豺狼搜神記王懿字仲德初遇苻氏之敗與兄睿同起義兵與慕容垂戰敗被重創走困臥大澤林中苦飢忽有青衣童兒攜食與之食畢欲行會水潦暴至莫知所如有一白狼至前仰天而號號訖銜仲德衣渡水因仲德隨之獲濟與睿相及後仲德三臨徐州威德著於彭城立佛寺作白狼童子像於塔中以河北所遇也卒後亦於廟立白狼童子壇每祭必祠之宋書後魏事稍同胸奴單于生二女姿容甚美國人皆以為神單于築高臺置二女其上曰請天自迎之經三年餘有一老狼晝夜守臺嘷呼其小女下為狼妻而産子後遂滋繁成國故其人好引聲長歌又似狼嘷北史突厥之先胸奴之別種也為鄰國所破其族有一小兒棄草澤中有牝狼以肉飼之及長與狼交合遂有孕焉逃於高昌國北山洞穴遂生十男長大外託妻孕其後各為一姓阿史那即其一也後周四夷傳突厥旗纛之上施金狼頭侍衛之士皆為附離夏言亦狼蓋本狼生志不忘本耳北史薛延陀部落嘗有一客乞食於主人者主人引與入帳命妻具饌其妻願視客乃狼頭人也主人不之覺妻告鄰人共視之狼頭人已食主人而去相與逐之見二人追者告其故二人曰我是也我即神人薛延陀當滅我來取追之追者懼而反走舊唐武后人遊擊將軍朱佛兒於魏縣長壽鄉界內逄白狼馴狎無懼人意遂以繩絡頭繫得隨送於縣縣令孟神符諜稱崔融為賀表龍朔中楊思玄恃外戚典選多排斥選士為選人夏彪訟之中丞郎餘慶彈奏免官許南陽曰故知楊吏部之敗或問之許曰一彪一狼共看一羊不敗何待南部百歲狼化為女人名曰知女狀如人坐道傍告丈夫曰我無父母兄弟丈夫娶為妻三年而食人以其名呼之則逃去白澤圖兒啼狼能為小兒啼聲以誘人去數十步止其猛健者人不能制雖善用兵者亦不能尅也其膏可以煎和其皮可以為裘毛詩疏志云狼卜食狼將遠逐食必先倒立以卜所向故今獵師遇狼輒喜蓋狼之所在獸之所在也故古之造式者木用槐癭棗瘤而以狼牙為柱取其靈知也五月生五九四十五五主音音主猿猿故五月而生淮南猿與獮猴不共山宿臨旦相呼元康地記引氣猿似猴大而黑長臂所以壽者好引其氣也繁露化猿周穆王南征一軍皆化君子為猿為鶴小人為蟲為沙抱朴子荊王有神白猿王自射之則搏樹而嬉使養由基射之始調弓矯矢未發猿擁樹而號呂覽養流涕而猿號幽通賦越王問范蠡手戰之術范蠡曰臣聞越有處女國人稱之願王請問手戰之道於是王乃請女女將北見王道逢老人自稱袁公袁公問女聞子善為劍願得一觀之處女曰妾不敢有所隱也唯公所試公即挽林內之竹以枯槁末折墮地女接取其末袁公操其本而刺處女處女應即入之三入因舉杖擊袁公袁公則飛上樹化為白猿吳越授圖黃石不無師表之心學劍白猿遂得風雲之志庾信宇文盛墓志授圖黃石老學劍白猿翁杜牧之詩逞能莊子衣大布而補之正緳係履而過魏王魏王曰何先生之憊邪莊子曰衣敝履穿貧也非憊也此所謂非遭時也王獨不見夫騰猿乎其得柟梓豫章也攬曼其枝而王長其間雖羿蓬蒙不能眄睨也及其得柘棘枳枸之間也危行側視振動悼慓此筋骨非有加急而不柔也處勢不便未足以逞其能也今處昏上亂相之間而欲無憊奚可得邪莊子新序宋玉事楚襄王稍同射猿蜀車騎將軍鄧芝征涪陵見玄猿緣山芝性好弩手自射猿中之猿拔其箭卷木葉塞其創芝曰嘻吾違物之性其將死矣華陽志芝見猿抱子在樹上引弩射之中猿母其子為拔箭以木葉塞創芝乃嘆息投弩水中自知當死晉五行志桓公入蜀至三峽山中部伍中有得猿子者其母緣岸哀號行百餘里不去遂跳上船至便即絶破視其腹中腸皆寸寸斷公聞之怒命黜其人世說劉宋時錢塘釋智一者善長嘯於靈山澗適養一白猿有時驀山踰澗久而不還一乃吮吻張喉作梵呼之則猿至矣時人謂之白猿梵名一公為猿父猶狙公也其後澗邊群狙聚焉每至衆僧齊訖斂生飯送猿臺所後令山童呼三二聲則群猿競至洎唐武宗廢教寺毀除焉飯猿於臺事皆埋滅宋高僧傳求子南齊魚復侯子響為蕭順之所殺武帝出景陽山見一猿透擲悲鳴問後堂丞此猿何意答曰猿子前日墮崖致死其母求之不見故耳上因憶子響歔欷良久不自勝順之慚懼以憂卒南史北齊高昂字敖曹其母張氏始生一男二歲令婢為湯將浴之婢置而去養猿繫解以兒投鼎中爛而死張使積薪于村外縛嬋及猿焚殺之揚其灰于漳水然後哭之昂性似其母北史十九山公王績遊嵩山月夜見一人胡鬢眉皓而瘦稱山公與績談文異義出於言外績疑其怪潛問匣取鏡鏡光出而胡者失聲俯伏化為猿而殞異聞集一李約多蓄古器養一猿名山公嘗以之隨逐月夜泛江登金山擊鐵鼓琴猿必嘯和傾壺連旦不俟外實約汧公子也因話録魏元忠素強正其微時家貧止一婢廚中方爨出外汲水回乃見老猿為其守火婢驚白元忠猿執爨曰猿恐我乏使為我爨不亦善乎後亦無他廣異傳商山隱士高太素纍徵不起在山中構道院二十餘間太素起居清心亭下皆茂林秀竹奇花異卉每至一時即有猿一枚詣亭前鞠躬而啼不易其猴太素因目之為報時猿天寶遺事唐王縉讀書嵩山有四叟攜榼來相訪自稱木巢南林大節孫文蔚石媚虬高談劇飲既醉俱化為猿升木而去樹萱録白猿脂同昌公主疾甚醫者云紅密白猿脂食之可愈內庫得紅密數石本兜離國所貢白猿脂數甕本南海所獻杜陽編巴兒假公路咸通十年往高涼程次青山鎮其山多猿有黃緋者絶大毛彩殷鮮真謂奇獸多群行玄者善啼啼數聲則蟲猿叶嘯騰擲如相呼焉其音凄入肝脾韻含宮徵方知當一部鼓吹不獨蛙聲矣因召獵者捕而養之名曰巴兒極馴不貪食於樹杪間呼之則至後自潘州回路歷仙虛聞舊山猿啼不食而卒乃積薪藏坎北戶録吳郡張鋋罷秩歸蜀行次巴西會日暮有人道左出拜曰吾君巴西候奉邀鋋既見飲酒命樂夜將半鋋假寐將曉悸而寤見身臥石龕中有巨猿醉臥於地宣室志王仁裕畜一猿號野賓呼之則應後因為患項上係紅絲一縷題詩送之孤雲兩角山有棲宿兌勞青嶂夢躋攀應愜碧雲心之句後入蜀行次嶓冢廟前見群猿飲於清流有巨猿捨群而前於道畔右木之間垂身下顧紅綃髣佛而在從者指之曰此野賓也呼之聲聲相應移時哀叫數聲而去許遠尚聞鳴咽之聲疑其腸斷矣繼作一篇未句云數聲腸斷和雲叫識是前年舊主人王氏見聞峽長十百里兩岸連山略無絶處重巖疊障隱天蔽日自非亭午分夜不見曦月每至晴初霜旦林寒澗肅常有高猿長嘯屬引清遠漁者歌曰巴東三峽巫峽長猿鳴三聲淚沾裳荊州記峽中猿鳴至清山谷傳其嚮泠泠不絶行者歌之曰巴東三峽猿鳴悲猿鳴三聲淚沾衣宣都山川記膽甜猿食果故其膽黑甜猿寓屬也或黃黑通胂輕巢善緣能於空輪轉好吟雌為人所得終不徒生周索氏茅子傳臂笛猿臂可為笛吹之其聲圓於竹酉陽王孫猴一名狙一名王孫一名胡孫廣雅猱獨猴也楚人謂之沐猴老者為獑猢駿捷其鳴噭噭而悲詩疏人君山中申日稱人君者猴也猴壽八百歲枹朴子玉策記吳王浮於江登於狙之山衆狙見之恂然棄而走逃於深有一狙焉委蛇攫搔見巧乎王王射之敏給搏捷矣王命相者趍射之狙死王顧謂其友顏不疑曰之狙也伐其巧持其便以傲豫以至此極也戒之哉嗟乎無以汝色驕人哉莊子宋有狙公者愛狙養之成群能解狙之意狙亦得公之心損其家口充徂之欲俄而匱焉將限其食恐衆狙之不馴於己也先誑之曰與若芧朝三而暮四足乎衆徂皆起而怒俄而曰與若芧朝四而暮三足乎衆徂皆伏而喜物之以能鄙相籠皆猶此也聖人以智籠群愚亦猶狙公之以智籠群狙也列子烹猴楚人有烹猴而召其鄰人以為狗羹也而甘之後聞其猴也據地而吐之盡瀉其食此為未始知味者也邯鄲師有出新曲者託之李奇諸人皆爭學之後知其非也而皆棄其曲此未始知音者也淮南滕永叔常一大獼猴鎖著床間犬忽嚙殺之永叔便合鎖埋之後百許日有見鬼者往見獼猴走上永叔承塵上不悟是鬼也驚指之曰獼猴何以被傷血流斷走乎永叔曰始乃知猴死復有鬼也抱朴子山家小兒天監中有釋寶志曰掘尾狗子自發狂又曰山家小兒果攘背掘尾狗子山家小兒皆猴伏也後侯景叛梁書魚弘為湘東王鎮西司馬述職西上道中乏食於窮洲之上捕得數百獼猴膊以為脯以供酒食南史四十五獻白猴交州刺史阮表言林邑王范績云晝觀望天氣知中國有聖主臣乞內附為臣兼獻白猴一頭天監起居注熱熬胡孫楊仲嗣躁率魏光乘目為𤍽𨫼上胡孫僉載唐大曆中有猴數百集古田杉林中里人欲伐木殺之中一老猴忽躍去鄰近一家縱火焚屋里人懼亟走救火於是群猴脫去汀州志唐昭宗播遷隨駕技藝人止有弄猴頗馴能隨班起居昭宗賜以緋袍號孫供奉羅隱下第詩云何如學取孫供奉一笑君王便著緋朱梁篡位取此猴令殿下起居猴望殿陛見全忠徑趨其所跳躍奮擊遂令殺之唐臣愧此猴多矣幕府燕聞録猴部頭猿父也衣以俳優服常在昭宗側朱梁云嘉祐雜志蜀中有楊千度者善弄胡孫會人言語一日內廄胡孫絶維上殿閣蜀主令射之三日不得內豎奏千度能弄胡孫試令捉之楊遂以十餘頭戲於殿前內廄者亦在舍上窺之楊高聲曰奉勑把舍上胡孫來果立致於殿前蜀主大悅厚賜千度內臣因問其教之之術對曰胡孫乃獸實不會人語先餌以靈砂變其獸心然後可學耳野人閒話南唐李後主獵青龍山一牝狙觸網見主兩淚稽顙指其腹戒虞人保守之是夕誕二子還幸大理寺録囚繫有大辟婦以孕在獄未幾誕二子煜感狙事罪止於流湘山野録京師優人以雜物數十種布地使人暗記物色然後遣沐猴認之每沐猴得之優人即曰道著也馬留馬留蓋優人呼沐猴之名古今詩話猴頭鮓南方人以獼猴頭為鮓異物志安家夷以好噉猴頭羹諺言人能負人千石之粟不願負人猴頭羹臛臨海異物志如拳武夷山多獼猴其小者僅如拳崇安志胡孫脂胡孫脂人摘去毛髮者以塗之則不出猴王外夷爪哇國山多猴不畏人呼以霄霄之聲則出或投以果實則其二大猴先至土人謂之猴王猴夫人食畢群猴食其餘三德狐妖獸也鬼所乘也有三德其色中和小前大後死則首丘謂之三德說文狐者先古之淫婦也其名曰紫化而為狐故其怪多自稱阿紫名山記搜神記舊說野狐夜繫尾火出將為怪必戴髑髏拜北斗髑髏不墜則化為人矣酉陽狐五十歲能變化為婦人百歲為美女為神巫或為丈夫與女人交接能知千里外事善蠱魅使人迷惑失智千歲即與天通為天狐玄中記狐及狸狼皆壽八百歲滿三百歲暫變為人形抱朴子玉策記盟津河津恆濁方江為狹比淮濟為闊寒則冰厚數丈冰始合車馬不敢過要須狐行云此物善聽冰下無水乃過人見狐行方渡述征記按風俗通云里語稱狐欲渡河無如尾何且狐性多疑故俗有狐疑之說亦未必一如緣生之言也九尾青丘之國有狐九尾大荒東經太平則出為瑞也注九尾狐者神獸也其狀赤色四足九尾出青丘之國音如嬰兒食者令人不逄妖邪之氣及蠱毒之類瑞應圖禹三十未娶行到山恐時之暮失其度制曰吾之娶也必有應矣乃有白狐九尾造於禹曰白者吾服也九尾者王證也塗山之歌曰綏綏白狐九尾龐龐成家成室我造彼昌禹娶塗山女吳越周文王拘羑里散宜生至會稽得九尾青狐以獻紂免西伯之難瑞應圖昔文王應九尾狐而東夷歸王褒講德論天命文王以九尾狐春秋元命苞狐死首丘不忘本也德至鳥獸則九尾狐見九者子孫繁息也於尾者後當盛也白虎通柏杼子征子東海及三壽得一狐九尾竹書文王拘羑里散宜生之西海之濱取白狐青翰獻紂紂大悅翰長毛也大傳馬化周宣王三十三年幽王生是歲有馬化為狐搜神記管子對桓公曰伐出狐白之皮狐白應陰陽之變六月而一見公貴買之代人忘其難得喜其貴價必相率而求之因令齊載金錢之代谷求狐白之皮代王聞之果去其本入山林之中求狐白之皮二十四月而不得一離支聞而侵之代王即將其士卒下於齊晉平公異日出朝有鳥環平公不去平公顧謂師曠曰吾聞之也霸王之主鳳下之今者出朝有鳥環寡人終朝不去是其鳳鳥乎師曠曰東方有鳥名諫珂其為鳥也文身而朱足憎烏而愛狐今者吾君必衣狐裘以出朝乎平公曰然師曠曰鳥為狐裘之故非吾君之故非吾君之德義也君奈何而再自誣乎說苑林既衣韋衣而朝齊景公齊景公曰此君子之服也小人之服也林既逡巡而作色曰夫服事何足以端士行乎即如君言衣狗裘者當犬吠衣羊裘者當羊鳴且君衣狐裘而朝意者得無為變乎景公曰子真為勇悍矣上狐白之裘天子被之而在廟堂為狐計者不若走於平澤金樓子楚宣王問群臣曰吾聞北方之民畏昭奚恤亦誠何如江乙對曰虎求百獸而食之得狐狐曰子無噉我天帝令我長百獸子若食我是逆天帝之命于以我為不信我為子先行隨我後觀百獸見其能無走乎虎以為然隨狐而行百獸見皆走虎不知獸之畏已反以為畏狐也今王地方五千里帶甲百萬而任之於昭奚恤然北方非畏奚恤實畏王之甲兵春秋後語客謂孟嘗君曰狐者人之所攻也鼠者人之所燻也臣未見稷狐見攻社鼠見燻何則所託者然也說苑廣川王去疾聚無賴少年遊獵無度國內冢墓盡發之嘗發欒書冢無餘物有一白狐見人驚走左右戟之不得傷左足於是王夢一丈夫髮眉盡白來謂王何故傷吾左足以杖叩王左腳上乃患腳至死不差西京雜記忌犬胡道洽自云廣陵人好音樂醫術之事體有臊氣常以名香自防惟忌猛犬自審死日誡弟子曰氣絶便殯勿令狗見我尸也死於山陽斂畢覺棺空即開看不見尸體時人咸謂狐也劉敬叔異苑有一書生吳中皓首稱胡博士教授諸生忽復不見九月初九日士人相與登山遊觀聞講書聲命僕壽之見空冢中群狐羅列見人即走老狐獨不去是皓首書生搜神記習鑿齒從桓溫出獵時大雪於江陵城西見草上有氣出伺一物射之應箭死往取之乃老雄狐足上帶絳繒香囊渚宮故事後魏有挽歌者孫岩娶妻三年妻不脫衣而臥岩私怪之伺其睡陰解其衣有尾長三尺似狐尾岩懼而出之妻臨去將刀截岩髮而走鄰人逐之變為一狐追之不得其後京邑被截髮者一百三十人初變為婦人衣服淨莊行於道路人見而悅之近者被截髮當時婦人著綵衣者指為狐魅洛陽伽藍記唐初以來百姓多事狐神房中祭祀以乞恩飲食與人同之事者非一主當時有諺曰無狐魅不成村僉載天狐科神龍中有何讓之者上已於洛中光武原陵上見老翁吟曰野田荊棘春閨閣綺羅新出沒頭上日生死眼前人訝其非人遽欲前執翁倏然躍入丘中讓之從焉遽見一狐跳出尾有火復如流星讓之見一几案上有文書二紙其一曰五行七曜成此閏餘上帝降靈歲旦涒涂蛇蛻其皮君亦神攎九九六六來自天除何以充喉吐納太虛何以蔽倮霞袿雲𦀌哀爾浮生擲此荒墟吾復浩氣還形之初在帝左右道濟忽諸題云應天狐超異科策八道後文甚繁難以詳載讓之獲此書帖喜而懷之遂躍出丘穴後數日狐化為僧持縑來易復化讓之弟紿取去未幾有勑捕盜內庫府絹者遂執讓之付法乾𦠆子李林甫方居相位嘗退朝至於堂之前軒見一玄狐其質甚大若牛馬而毛色黯黑有光自堂中忽馳至庭顧望左右林甫命弧矢將射之未及已亡見矣自是凡數日每晝坐輒有一玄狐出焉其歲林甫籍沒宣室志唐丞相李揆乾元初為中書舍人嘗退朝見一白狐在庭中搗練石上命侍僮逐之已亡見矣時有客於揆門者因話其事客曰此祥符也某敢賀至明日果遷禮部侍郎宣室志通天狐楊虞卿漢公兄弟黨附關節節常嫉不附己者令其黨赤舌而攻之輦下謂三楊為通天狐三十餘年為朝廷之陰蠹牛羊日曆睢陽郡宋王冢旁有一老狐每至衙中邑中之狗悉往朝之狐坐冢上狗列其下東都王老有雙犬能咋魅前後殺魅甚多宋人相率以財雇犬咋狐王老牽犬往乃徑詣諸犬之下伏而不動大失宋人之望今世人有不了其事者相戲云取睢陽野狐犬廣異記玄丘校尉張鋌為巴西侯所邀坐中有稱玄丘校尉者明日視之乃狐也宣室志什志玄者河朔人曾至絳州夜泊墓林中其夜月色如晝見一狐從林下將髑髏置首搖之落者不顧不落者戴之更取芳草墮葉遮蔽其身俄成美女素服立於道左微聞有車馬行聲女子哀泣悲不自勝少選有乘馬郎至與言久之欲將偕去玄從林出謂之曰此狐也其人不信玄乃振錫胡語女遂化狐而走其人叩頭悔過焉宋高僧傳術中有天狐別行法言天狐九尾金色役於日月宮有符目有醮可洞達陰陽酉陽類從曰燕識戊巳不銜泥狐潛上伏不越度阡陌又曰狐狼知虛實虎豹識衝破夫狐之捕雉也必先卑體弭耳以待其來也雉見而信之故得而擒也使狐瞋目直睹見必殺之勢雉亦知驚憚遠飛以避其怒矣淮人間訓畏犀犀角駭狐淮南犀角置狐穴中狐不歸萬畢術不來徐廣曰狸一名不來封禪書注鉛錫之精鉛錫之精化為狐狸玄中記自為夫婦靈狸一體自為夫婦故能媚人異物志齊惠公之妾蕭桐叔子見御有身以其賤不敢言也取薪而生頃公於野又不敢舉也狸乳鸇覆之人見而收之因名無野搜神記漢董仲舒嘗下帷獨詠忽有客來風姿音氣殊為不凡與論五經究其微奧仲舒素不聞有此人而疑其非常乃謂之曰巢居却風穴處知雨卿非狐狸即是老鼠客聞此言色動形壞化成老狸蹶然而走幽明録費長房曾與人共行見一書生黃巾被裘無鞍騎馬下而叩頭長房曰還他馬赦汝死罪人問其故長房曰此狸也盜社公馬耳後漢張華為司空于時燕昭王墓前有一斑狸化為書生欲詣張公過問墓前華表曰以我才貌可得見司空耶華表曰子之妙解無為不可但張公智度恐難籠絡出不遇辱殆不得返非但喪子千年之質亦當深誤老表狸不從乃持刺謁華華引入談論三日不屈華甚疑之曰此必妖也乃掃塌延留留人防禦言卒便請退華已使人防門不得出既而又謂華曰公門置甲兵欄騎當是疑千僕也將恐天下之人捲舌而不言智謀之士望門而不進深為明公惜之華不應而室人禦防甚嚴時豐城令雷煥博物士也來訪華華以書生白之孔章曰若疑之何不取獵犬試之乃命犬以試竟無憚色狸曰我天生才智反以為妖以犬試我遮莫千試萬慮其能為患乎華聞益怒曰此必真妖也乃曰聞魑魅忌狗所別者數百年物耳惟有千年老精不復能別惟有千年枯木照之則形見孔章曰千年神木何由可得華曰世說燕惠王墓前有華表木已經千年乃遣人伐之使人欲至木所空中有一青衣小兒來問使曰君何來也使曰張司空忽有一少年多才巧辭疑是妖異使我取華表照之青衣曰老狸不智不聽我言今日禍已及我其可逃乎乃發聲而泣倏然不見使乃伐其木血流便將木歸燃之以照書生乃一斑狸華嘆曰此二物不值我千年不可復得華乃烹之齊諧記搜神記作狐樂廣為河南尹郡中前廳多妖怪後人皆於廊下督郵傳中治事無敢在廳事者惟廣處之白日戶自閉二子凱模等懾怖廣使掘牆孔得狸乃絶傳子王度至長安程雄家雄新受寄一婢頗端麗名曰鸚鵡度疑其精魅引鏡逼之化為老狸而死異聞録武弘度士護兄子也父卒廬墓側晨夕哀號有野狸每至齊時必來求食往來甚馴狸無驚懼時以為孝感舊唐月精兔者明月之精典略明視祭宗廟之禮兔曰明視禮玉衡星散玉衡星散而為兔行世瑤光則兔出月運斗樞吐子兔䑛雄毫而孕及生子從口中出論衡葱望月而孕口中吐子博物志五月而吐子陶氏書兔壽千歲五百歲其色白外國圖云西王母國前弱水有玉山白兔抱朴子木蘭歌雄兔腳撲朔雌兔眼迷離一本又作撲握生角商紂之時大龜生毛兔生角兵甲將興之兆述異記楚恭王多寵子而世子之位不定屈建曰楚必多亂夫一兔走於街萬人逐之一人得之萬人不復走分未定則一兔走使萬人擾分已定則雖貪夫知止今楚多寵子而嫡位無主亂自是生矣夫世太子者國之基也而百姓之望也國既無基又使百姓失望絶其本矣本絶則撓亂猶兔走也恭王聞之立康王為太子其後猶有令尹圍公子棄疾之亂也說苑兔走於市百人追之貪人俱存人莫之非者非為兔未分定耶積兔滿市過不能顧非不欲兔也分定之後雖鄙不爭慎子楚王與群臣獵於雲夢縱良犬逐狡兔三日乃獲之其腸是鐵良工曰可以為劍異苑宋人有耕者田中株兔走觸之折頸而死因釋而耕守株冀復得兔為宋國笑韓子三穴馮諼謂孟嘗君曰狡兔有三窟僅得免其死耳齊策北極有潰陽之山有兔如鼠能飛毛色光如漆以腦和丹食之則不死武帝使放兔於昭祥苑苑在甘食宮西周十里萬國獻異物皆集此中洞冥記梁冀起兔園於河南移檄所在調發生兔刻其毛以識民有犯者罪至死西域嘗有賈胡來不知禁誤殺一兔轉相告坐死者十餘人張璠漢記蔡雍性篤孝母嘗滯病三年雍自非寒暑節變未嘗解襟帶不寐七旬母卒廬於冢側動靜以禮有兔馴擾其室傍後漢白兔慕容皓田於南鄙見父老曰此非獵所言卒不見既明日又出見白兔馳射之墜馬輦而還宮遂薨前燕録有兔入於後宮檢問門官無從得入太祖令崔浩推其咎徵浩以為當有鄰國貢嬪嬙者明來姚興果來獻女後魏書華秋汲郡人喪母負土成墳廬於墓側有人欲助之者秋輒拜止之大業初調狐皮郡縣大獵有一兔人逐之奔入秋廬中匿秋膝下獵人異而免之自爾此兔常宿廬中馴其左右郡縣嘉其孝感具以狀聞隋書趙毫漢諸郡獻兔毫書鴻都門題唯趙國毫中用廣志中山出兔毫為筆精妙元和郡志溧水中山古老相傳中有白兔世稱為筆最精寰宇記知水高下鵲巢知風之自獺穴知水之高下淮南魏明帝遊洛水水中有白獺數頭美靜可憐見人輒去帝欲見之終莫能遂侍中徐景山曰獺嗜鯔魚乃不避死畫板作兩生鯔魚懸置岸上於是群獺競逐一時執得帝甚佳之曰聞卿善畫何其妙也答曰臣亦未嘗執筆然人之所目可庶幾耳帝曰是善用所長顏公庭誥云徐景山之畫獺是也續齊諧記孫和悅鄧夫人嘗置膝上和於月下舞水精如意誤傷夫人頰血流污袴嬌姹彌苦自䑛其瘡命太醫合藥醫曰得白獺髓雜玉與琥珀屑當滅此痕即購致百金能得白獺髓者厚賞之有富春漁人云此物知人欲取則逃入石穴伺其祭魚之時獺有鬭死者穴中應有枯骨雖無髓其骨可合玉舂為粉噴於瘡上其痕則滅和乃命合此膏琥珀太多及差而有赤點如朱逼而視之更益其妍諸嬖人欲要寵皆以丹脂點頰而後進幸妖惑相動遂成淫俗拾遺記青衣少婦昔有吏丁初於長塘湖堤見一青衣戴青傘後呼初疑為鬼物便疾行去之轉遠顧視婦人乃自投陂中泥然作聲衣蓋飛散視是大蒼獺衣傘皆荷葉也蓋以多魚乃有獺以驅之耳搜神記并上道四蕃志元和末鈞州鄖鄉縣民有百姓年七十養獺十餘頭捕魚為業隔日一放將放先閉於深溝石門內令飢然後放之無網罟之勞而獲甚厚令人抵掌呼之群獺皆至緣襟藉膝馴若守狗戶部郎中李福親見之酉陽雜俎知人名猩猩知人名如豕而人面山經猩猩能言笑亦二足無尾而君子啜其羹食其胾故人非以二足無毛以知禮也孫卿子肉辟穀武平封溪縣有獸曰猩猩猿形人面顏容端正善與人音聲妙麗如婦人對語聞之無不酸楚其肉食之窮年無厭可以辟穀水經注染朱永昌郡有猩猩能言其血可以染朱罽色鮮不黯或曰若刺其血問之爾與我幾許猩猩曰二升果足其數若加之鞭捶而問之則隨所加而得至於一斗弗如此未肯頓輸華陽國志漢黃霸為封溪令部人陳廉攜酒並猩猩以獻霸問曰何物人未及應囊中語曰斗酒並僕耳霸以其物有靈開囊放之往往悲啼而去獨異志阮研曾使封溪見邑人說猩猩好酒及履里人置之山谷常行路百數為群見酒物等知人設張取之此獸甚靈先知其人祖父姓名而詈曰奴欲殺我捨爾去也既去復還因相呼曰試共嘗酒及飲乃甘其味逮於醉因取屐而著之乃為人之所擒皆獲輒無遺者遂置檻中隨其所欲而飲之將烹里人索其肥者乃自推肥泣而遣之楚太原王綱著傳裴炎銘兒啼猩猩似狟聲如兒啼不聞其言出交趾封溪縣廣志杜佑云廣志足徵諸家之說不加考核遞相祖述耳血染朱罽遍問胡商元無此事通典似雄鴨談苑云宋太祖平嶺南求得猩猩如雄鴨而大取其血染色如渥丹與傳記所載不同雲嶠類要知往歸終知來猩猩知往萬畢術山都狒狒如人被髮迅走食人爾雅山海經曰梟羊其狀如人面長脣黑身有毛反踵見人則笑交廣及南康郡山中亦有此物大者長丈許俗呼之曰山都一名曰贑注蹈飛豹羂嘄陽羽獵賦梟羊喜獲先笑後愁張衡玄圖猩猩啼而就擒𥜿𥜿五臣作鷽笑而被格吳都賦狒狒怪獸被髮操竹獲人則笑脣蔽其目終亦號咷反為我戮郭讚周成王時州靡國獻𥜿𥜿人身反踵自笑笑則上脣翕其目食人北方謂之吐嘍周書王會宋建武中獠子以西波尸地高城郡安西縣主簿韋文禮進𥜿𥜿雌雄二頭帝曰吾聞𥜿𥜿能負千鈞若既力如此何能致之彼土人丁鑾進曰𥜿𥜿見人喜笑則上脣掩其目人以釘釘著額上任其奔馳候死而取之髮極長可為頭髮血堪染其毛一似獼猴人而紅赤色作人言馬聲善知生死飲其血使人見鬼帝聞而欣然命工圖之本草讓老果然獸似獼猴以名自呼色蒼黑群行老者在前少者在後得果食輒與老者似有義焉交趾諸山有之獠人射之以其毛為裘褥甚溫暖山經尾長四尺交州以南有果然獸其鳴自呼身如猿犬面通身白色其體不過三尺而尾長四尺餘反尾度身過其頭視其鼻仍見兩孔仰向天其毛長柔細滑澤色以白為質黑為文視如蒼頭鴨脅邊斑文集十餘皮可得一褥繁文麗好細厚溫暖南州異物志人心劍南人之采猓𤡮者得一果然其數十果然可得何哉果然有傷其類者聚族悲啼雖殺之不去此禽獸之狀而人心也樂羊張仁願史牟則人之狀而禽獸心也國史補三色褥戎人進果然褥皂褐碧三色相間假氏遊蜀記歌然果然九真土人號曰歌然天䴪者純靈之獸五色光耀洞明王者道備則至瑞應圖中平元年注天祿蝦蟆吐水於平門外橋東轉水入宮宦者張讓傳鄧州南陽縣北有宣資碑旁有兩石獸鐫其膊一曰天祿一曰辟邪據此即天祿辟邪並獸名也漢有天祿閣亦因獸以立名靈帝紀注滍水南有漢中常侍長樂大僕吉侯苞冢冢前有碑基人有掘出一獸猶全不破甚高壯頭去地減一丈許作制甚工左膊上刻作辟邪字水經聚窟洲有辟邪天祿十洲記唐肅宗賜李輔國玉辟邪二各長二尺五寸杜陽雜編章帝章和元年安息國遣使獻獅子符拔符拔形似麟而無角後西域傳是年月氐國遣使獻扶拔章紀烏弋有桃拔孟康曰桃扳一名符拔似鹿長尾一角者或為天鹿兩角者或為辟邪前西域傳能高紀云吾非敢自愛恐能薄正義曰能材能也能者獸形色似熊足似鹿為物堅中而強力故人之有賢材者皆謂之能也史記招賢獸出摩伽陀國性善不于人形如獅子若國人見賢良相訪則出現獨步獨步獸出良州形如獅子頭尾虎豹文身黃一角行有意氣故名獨步食草木可以辟群魅山海經云南海之外有三青獸相并名曰雙雙注云言體合為一也公羊傳雙雙而俱至山海經曰霍山有獸其狀如狸而白尾有鬣名曰朏朏養之可以已憂蛩蛩孔子曰北方有獸其名曰蟨前足鼠後足兔是獸也甚矣其愛蛩蛩巨虛也食得甘草必嚙以遺蛩蛩巨虛蛩蛩巨虛見人將來必負蟨以走蟨非性之愛蛩蛩巨虛也為其假足之故也二獸者亦非性之愛蟨也為其得甘草而遺之故也說苑昔有懶婦睡機上姑怒之遂走投水化為此獸一枚可得脂三四斛然之照紡織則暗照歌舞則明習懶之性不革也今安平七源等州峒俱有狀如山豬而小喜食苗田夫以杼柚之類掛於田頭則不敢復近南越志風母風猩如猿猴而小晝日蜷伏不能動變則驚躍甚疾好食蜘蛛毒打殺以口向風復活惟破腦不復生矣以酒浸愈風病南人得傳云此獸常持以小杖遇物則指飛走悉不能去人有得之者所指必有獲夷人施罟网既得其獸不復見其杖杖之數百乃肯為人取或云雍州首領寧泗得之泗資産巨萬僮伎數百泗甚祕其事嶺南異物志風母獸一名平猴狀如猴無毛赤目若行逢人便叩頭似如懼罪自乞人若撾打之愜然死地無復氣息小得風吹須臾能起南州異物記貀貀獸無前足漢津能捕豺貀購百錢說文獸無前足似虎而黑字林長慶中河東節度使李聽貢貀三頭貀猛捷之獸也穆宗好畋遊嘗詔諸道廣求此獸搜踐山谷郡縣告勞防虞籠檻甚于豺虎及至林苑往往噬人後穆宗亦盡令逐及敬宗即位聽復獻之唐書貘貘似熊小頭庳腳黑白駁能舐食銅鐵及竹骨節強直中實少髓皮辟濕人寢其皮可以驅溫癘爾雅注今黔蜀中時有貘象鼻犀目牛尾虎足土人鼎釜多為所食頗為山居之患亦捕以為藥其齒骨極堅以刀斧椎鍛鐵皆碎落火亦不能燒人得之詐為佛牙佛骨以誑俚俗圖經南方有獸齒鐵大如水牛色如漆食鐵飲水其糞可作兵器其利如鋼其溺可消銅鐵神異經貘溺能消鐵為水昔閔氏誤吞針入腹刺血盈盤以貘溺服之其針消矣其屎作刀可切玉石貊或作貘物類感應志㹼江南武當山往往有㹼獸狀如獅子蒼黑色常瞑目聳耳一足攀林抄若猿猴輩逢雖多群輒不狐動皆叩頭久則推一猴與食之去則群走而竄伏終日矣物類感應志貔貅前有鷙獸則載貔貅曲禮黃帝教熊羆貔貅貙虎以與炎帝戰於阪泉之野史記貔一名執夷虎豹之屬詩大雅云獻其貔陸機疏云貔似虎或曰似熊一名執夷一名白狐遼東人謂之白羆爾雅疏海之大也而魚何為可得山之深也虎豹貔貅何為可服汲冢周書抵𤙙二獸名秉心甚靈蓋忠直獸也今承天門內華表頂上者是集韻崑崙西有獸其狀如犬有兩目而不見兩耳而不聞有腹而無五臟有腸直而不旋食而徑過人有德行而往抵𧢻人人有凶惡而往依憑之天使其然名曰渾沌一名無耳一名無心空居無常咋尾回轉向天而笑神異經雅翼引山經帝江為渾敦誤西北有獸其狀似虎有翼能飛便勦食人知人言語聞人鬪輒食直者聞人忠信輒食其鼻聞人惡逆不善輒殺獸往饋之名曰窮奇上封山有獸狀如牛而蝟毛名曰窮奇音如狗嘷是食人西山經窮奇之獸厥形甚醜馳逐妖邪莫不奔走是以一名號曰神狗郭銘文王出獵所獲御覽西方荒中有獸焉其狀如虎而大毛長三尺人面虎足猪口牙尾長一丈八尺攪亂荒中名檮杌一名傲狠一名難訓神異經鉤吾之山有獸狀如羊身人面其目在腋下虎齒人爪其音如嬰兒名曰狍梟是食人山經左傳所謂叨餮是也像在夏鼎注周鼎著叨餮有首無身食人未咽害及其身以言報更也呂先識西域有沙海正據要津其水熱如湯不可向邇終古未嘗通中國忽一夕有巨獸浮水而至其骨長數十里橫於兩涘如津梁然骨中有髓竅可容並馬於是西極之地始通中國其國課往來者每以膏油塗其骨令潤懼其枯朽摧折則無復可通故耳癸辛雜志天中記卷六十終
