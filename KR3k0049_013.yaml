body:
  text: 都邑都邑都者國君所居人所都會也邑猶俋聚會之稱也釋名凡邑有宗廟先君之主曰都無曰邑邑曰築都曰城左莊二十八京師京師者何天子之居也京者何大也師者何衆也天子之居必以衆大之辭言之公羊桓九地方千里周城千雉宮室官府制度廣大四方各以其職來貢莫不備具所以必自有地者治自近始注徑千里京師者千里之邑號也法日月之徑千里王制曰天子之田方千里或曰夏曰夏邑殷曰商邑周曰京師尚書曰率割夏邑謂桀也在商邑謂殷也白虎通爾雅丘之絶高大者為京謂非人力所能成乃天地性自然也左傳莫之與京國語趙文子與叔向游於九京今京兆京師其義取於此風俗通甸服天子畿方千里曰甸服甸服之內曰京師世紀五百里甸服禹貢祭公謀父曰夫先王之制邦內甸服甸服者祭周語晉文公請隧襄王曰昔我先王之有天下也規方千里以為甸服以供上帝山川百神之祀以備百姓兆民之用以待不庭不虞之患上千里之內曰甸京邑在其中央王制甸王田也服服其職業也國語注統四方王者受命創始建國立都必居中土所以揔天地之和據陰陽之正均統四方旁制萬國者也五經要義建王城昔先王之經邑也掩觀九隩靡地不營土圭測景不縮不盈總風雨之所交然後以建王城東京賦神州崑崙東南方五千里謂之神州中有和姜鄉方三千里五嶽之城帝王之宅聖人所生也王嬰古今通論赤縣崑崙東南有赤縣之州風雨有時寒暑有節苟非此土南則多暑北則多寒東則多陰故聖人宅西焉靈憲廣州凡立國都非大山之下必廣州之上高無近旱而水用足下無近水而溝防省因天材就地利故城國不必中規矩道路不必中準繩管子翼翼詩曰商邑翼翼四方之極殷武此成湯所以建至治保子孫化異俗而懷鬼方也前匡衡傳三亳殷有三亳二亳在梁國一亳在河南也榖熟為南亳即湯都也蒙為北亳即景亳湯所盟地偃師為西亳則盤庚所徙也世紀宗周周自后稷至於文武皆都關中號為宗周博物志二周王城者何西周也成周者何東周也公羊昭河南即郟鄏武王遷九鼎周公營以為都是為王城洛陽周公所營下都以遷頑民是為成周平王東遷之後所謂西周者豐鄗也東周者洛都也威烈王以後所謂西周者河南也東周者洛陽也何以稱河南為西周自洛陽下都視王城則在西也何以稱洛陽為東周自河南王城視下都則在東也大事記地中大司徒以土圭之法測土深正日景以求地中日至之景尺有五寸謂之地中天地之所合也四時之所交也風雨之所會也陰陽之所和也然則百物阜安乃建王國焉制其畿方千里而封樹之周禮地官畿方千里取象於日注土方氏以土圭之法以致日景以土地相宅而建邦國都鄙夏官造邑量人掌建國之法以分國為九州營國城郭營后宮量市朝道巷門渠造都邑亦如之夏官營國匠人營國方九里旁三門國中九經九緯經涂九軌左祖右社面朝後市冬官酆鄗文王作鎬武王作鄗其民有先王之遺風地理志酆邑在豐水之西鎬京在豐水之東詩文王有聲注周自武王克殷都於酆鎬雍州為王畿及平王東遷洛邑以岐酆之地賜秦襄公則秦地纍世都之晉地理志四塞秦地被山帶河以為固四塞之國也自繆公以來至於秦王二十餘君常為諸侯雄豈世世賢哉其勢居然也過秦論金城秦孝公據崤函之固擁雍州之地始皇踐華為城因河為池據億丈之城臨不測之淵以為固天下已定自以為關中之固金城千里子孫帝王萬世之業也上扼骯高祖在洛陽婁敬說曰陛下都洛陽豈欲與周室比隆哉成王即位而營成周洛邑以此為天下之中也有德則易以王無德則易以亡夫與人鬪不扼其骯拊其背未能全其勝也今陛下入關而都案秦之故此亦扼天下之骯而拊其背也史敬傳天府劉敬說高帝都關中上疑之左右大臣皆山東人多勸上都洛陽曰東有成皋西有殽澠倍河向洛其固亦足恃張良曰雒陽四面受敵此非用武之國也夫關中左殽函右隴蜀沃野千里南有巴蜀之饒北有胡宛之利阻三面而守獨以一面東制諸侯此所謂金城千里天府之國也史百二秦形勝之國也帶河阻山縣隔千里持戟百萬秦得百二焉地藝便利其以下兵於諸侯譬猶居高屋之上建瓴水也前紀陸海漢興去三河之地止灞滻以西都涇渭之南此所謂天下陸海之地秦之所以虜西戎兼山東者也東方朔傳教化原本長安天子之都親承聖化然其習俗無以異於遠方郡國來者無所法則或見侈靡而放效之此教化之原本風俗之樞機宜先正者也匡衡傳御外大漢之崇世藉雍之饒得御外理內之術夫雍州本帝皇所以育業霸王所以衍功戰士角難之場也關梁之險多所襟帶一卒舉礧千夫沈滯肇十有二是為贍腴斯固帝王之淵囿而守國之利器也後漢杜篤論都賦上都漢之初經營也實用西遷作我上都西都賦帝畿漢之西都在於雍州實曰長安華實之毛則九州之上腴焉防禦之阻則天地之隩區焉是故橫被六合三成帝畿周以龍興秦以虎視上彊幹弱枝英俊之域紱冕所興彊幹弱枝隆上都而觀萬國上畿內數州實惟邦本地狹人稠儲蓄未多特宜優矜令得休息彊本弱枝自古常事舊唐高季輔傳天邑漢氏初都在渭之涘秦里其朔實為咸陽廣衍沃野厥田上上實為地之奧區神皋高帝圖時意亦有慮乎神祗宜其可定以為天邑西京賦逆胡劉曜縱逸西都敢肆犬羊陵虐天邑劉琨勸進表肆豫敢求爾天邑啇尚書天府之國淳于定說南陽王模曰關中天府之國霸王之地今以不能綏撫而還於聲望有虧晉傳七天下樞秦地天下樞八分湊才賢袁淑白馬篇范子見秦王曰今韓魏天下之樞也戰國策神明之奧雍州之地古稱天府右控隴蜀左扼崤函前有終南太華之險後有清渭濁河之固神明之奧王者所都此用武之國非諸夏所同秦漢因之卒成帝業間者狂逆構亂九服分崩河北河南盡從逆命然而先帝仗朔方之衆慶緒奔亡陛下藉西土之師朝義就戮豈唯天道助順抑亦地形使然舊唐郭子儀傳王業根本今之關中即古者邦畿千里之地也王業根本於是在焉秦嘗用之以傾諸侯漢嘗因之以定四海蓋由憑山河之形勝宅田里之上腴弱則內保一方當天下之半可以養力俟時也彊則外制東夏據域中之大可以蓄威昭德也陸宣公關中事宜狀居重馭輕國家之立也本大而末小是以能固左師服語王畿者四方之本也京邑者又王畿之本也其勢當令京邑如身王畿如臂四方如指斯乃居重馭輕天子之大權也太宗列置府兵分隸禁衛大凡諸府八百餘所而在關中殆五百焉舉天下不敵關中則居重馭輕之意明矣上內史秦京師為內史前地理志師古曰京師天子所都畿內也秦并天下改立郡縣而京畿所統特號內史言其在內以別於諸郡守也厭權遠難翼奉元帝初上疏曰天道有常王道亡常亡常者所以應有常也願陛下徙都於成周左據成皋右阻黽池前鄉嵩高後介大河建滎陽扶河東南北千里以為關而入敖倉地方百里者八九足以自娛東厭諸侯之權西遠羌胡之難陛下共已亡為按成周之居兼盤庚之德萬歲之後長為高宗前漢東都召伯相宅卜惟洛邑周公初基其繩則直泝洛背河左伊右瀍西阻九阿東門于旋太室作鎮揭以熊耳底柱為流鐔以大岯東京賦增周舊修洛邑扇巍巍顯翼翼光漢京於諸夏總八方而為之極且夫僻界西戎險阻四塞修其防禦孰與處乎土中平夷洞達萬方輻湊秦嶺九嵕涇渭之川曷若四瀆五嶽帶河泝洛圖書之淵東祁賦大湊周公將致政南繫于洛水北因于郟山以為天下之大湊周書作雒解天室武王曰我南望過於三塗我北望過於有嶽丕願瞻過於河宛瞻於伊洛無遠天室其曰茲曰度邑度邑解武王平商維定保天室規擬伊洛作度邑序淳瀯杜篤以關中表裏山河先帝舊京不宜改營洛邑乃上奏論都賦坎井之潢汙固不容夫吞舟且洛邑之渟瀯曷足居乎萬乘哉咸陽守國利器不可以久虛以示姦萌後漢成周之隆乃即中洛知而不從久都墝埆上寧姬董卓議遷都長安黃琬駮議之曰昔周公營洛邑以寧姬光武卜東都以隆漢天之所啓神之所安大業既定豈宜妄有遷動以虧四海之望後漢卓謂陳紀曰三輔平敞四面險固土地肥美號為陸海今欲西遷何如紀曰天下有道守在四夷宜修德政以懷不附若欲徙萬乘以自安將有纍卵之危崢嶸之險也上深根固本荀彧曰昔高祖保關中光武據河內皆深根固本以制天下進足以勝敵退足以堅守故雖有困敗而終濟大業魏志王里魏孝文外示南伐意在謀遷謂任城王澄曰國家興自北土徙居平城用武之國非可文治崤函帝宅河洛王里因茲大舉光宅中原任城意以為何如澄曰伊洛中區均天下所據陛下制馭華夏輯平九服蒼生聞此應當大慶本傳神都孝文議移都南安王禎曰廓神都以延王業度土中以制帝京周公啓之於前陛下行之於後固其宜也李冲傳則天光宅元年九月改東都為神都唐書紫縣孝文自代還洛詔司州主簿裴仲規曰朕開置神畿郡望優重卿既首膺司隸美舉復督我名邦何能自致也仲規曰陛下窮神盡聖應天順民棄彼玄壤來宅紫縣臣方罄心力躍馬吳會豈一郡而已帝笑曰冀卿必副此言延俊傳伊域崔僧淵復族兄惠景書曰主上安遷靈荒兆變帝基維新中壤宅臨伊域河洛之間重隆周道玄伯傳四塞隋煬帝幸洛陽詔曰安安而能遷民用丕變是故姬邑兩周如武王之意殷人五徙成湯后之業雒邑自古之都王畿之內天地之所合陰陽之所和控以三河固以四塞水陸通貢賦等故漢祖曰吾行天下多矣唯見雒陽成周墟塉弗堪葺宇今可于伊雒營建東京便即設官分職以為民極也隋紀初煬帝登北邙觀伊闕顧曰此龍門耶自古何為不建都於此僕射蘇威對曰自古非不知以俟陛下帝大悅然其地北據山麓南望天關水木滋茂川源形勝自古都邑莫有此也兩京記形勝不如關內貞觀四年詔發卒修洛陽宮張玄素上書曰昔漢高將都洛陽婁敬一言即日西駕豈不知地惟土中貢賦所均但以形勝不如關內也太宗顧謂房玄齡曰洛陽土中朝貢道均朕故修營意在便於百姓今玄素上表實亦可已所有作役宜即停之舊唐東都高宗嘗謂韋機曰兩京朕東西二宅往來不恆卿宜善思修建始作上陽等宮兩京記建東都詔曰朕聞踐華固德百二稱乎建瓴卜洛歸仁七百崇乎定鼎是以稱膏腴於天府啓黃圖於渭濱襟沃壤於王城摛緑宇於河渚市朝之城麗皇州之九緯丹紫之原邈神皋之千里二京之盛其來自昔此都心茲宇宙通賦貢於四方交乎風雨均朝宗於萬國曲阜之規猶勤測圭之地戴華豈得宅帝之鄉獨稱雄於四塞里王之邑匪建國於三川宜改洛陽宮為東都初學記帝宅判官韋損曰東都帝宅侍中何不守之舊唐始乎周卜今自隋革進十八里作唐東宅籠故地之銅駝抱舊里之玉雞季庾東都賦雄都定鼎地勢據萬國尊帝宅夾清洛丹霞捧朝暾韋應物望洛詩洛賦尋歷代之規兆仍險塞之自然被崑崙之洪流據伊洛之雙川挾成皋之嵓阻扶二崤之崇山砥柱回波綴於後三塗太室結於前鎮以嵩高喬嶽峻極於天傳毅南都於顯樂都既麗且康陪京之南居漢之陽割周楚之豐壤跨荊豫而為疆武闕關其西桐柏揭其東流滄浪而為隍廓方城以為墉湯谷涌其後濟永蕩其西推瀨引湍三方通張衡賦蜀都蜀都之地古曰梁州上稽乾度則井絡儲精下按地紀則川宮奠位東有巴賨綿亘百濮銅梁金堂火井龍湫揚雄賦夫蜀都者蓋兆基於上世開國於中古廓靈關而為門包玉壘而為宇帶二江之雙流抗峨眉之重阻水陸所湊兼六合而交會焉豐蔚所盛茂八區而菴藹焉左思賦吳都張紘言於孫權曰秣陵楚武王所置名為金陵地勢岡阜連石頭訪故老云昔秦始皇東巡會稽經此縣望氣者云金陵地形有王者都邑之氣故掘斷連岡改名秣陵處所具存地有其氣天之所命今宜為都邑權善之未能從也後劉備之吳宿於秣陵周觀地形亦勸權都之權曰智者意同遂都焉江表傳龍盤虎踞劉備曾使諸葛亮至京因觀秣陵山阜乃嘆曰鍾山龍盤石頭虎踞帝王之宅也吳録王導曰建康古之金陵舊為帝里又孫仲謀劉玄德俱言王者之宅晉傳四面東以赤山為成皋南以長淮為伊洛北以鍾山為曲阜西以大江為黃河藝文建業水孫皓以建業宮不利謀移都從步闡表徙武昌揚土百姓泝流供給以為患苦陸凱上疏曰武昌土地實危險而塉確非王者安國養民之處船泊則沈漂陸居則峻危且童謠言寧飲建業水不食武昌魚寧還建業死不止武昌居是明天意知民所苦矣皓還都建業志紀傳魏都魏都者畢昴之所應虞夏之餘人先王之桑梓列聖之遺塵考之四隈則八埏之中測之寒暑則霜露所鈞左思賦文帝太和十八年卜遷都鄴登銅雀臺魏御史大夫崔吉等曰鄴城平原千里運漕四通有西門史起舊迹可以饒富在德不在險請都之孝文曰君知其一未知其二鄴城非長久之地石虎傾於前慕容滅於後國富主奢暴成速敗且西有枉人山東有列人縣北有柏人城君子不飲盜泉惡其名也遂止乃都洛陽後魏書中都唐玄宗開元九年五月置中都改蒲州為河中府時揚州功曹參軍韓覃上疏曰建國都乃長久之大業也若兩都舊制分官衆多費耗用度尚以為損豈况更建中都乎夫河東者國之股肱郡也徑鋭彊兵盡出於是其地隘狹今又置都使十萬之戶將安投乎且陋東都而幸西都自西都而造中都取樂一君之欲以遺萬人之患務在都國之多不恤危亡之變悅在遊幸之便不顧兆庶之困非所以深根固蒂不拔之長冊矣昔漢帝感鍾離之言息事德陽之殿趙主採續咸之諫止造鄴都之宮臣願詔罷中都則福履無疆天下幸甚至六月三日詔停通典一百七十九注北都十一年并州置北都詔曰我國家龍躍晉水鳳翔太原猶成湯之居亳有周之興岐昔堯理唐郊式建丹陵之地漢居洛邑更表南陽之都今王業正興營觀猶在列於編郡情所未安其并州宜置北都改州為太原府冊府汴都汴州水陸所湊邑居龐雜號為難理舊唐李勉傳汴都日月所會天地之中禹畫為豫周封鄭地觜臨而上直實沉分以為次惟蓬澤之固境昔合縻之所至芒碭渙渦截其面金隄玉渠纍其脊雷夏灉沮繞其脅罍丘訾婁夾其胰蜀險漢坌荊惑閩鄙惟此中峙不首不尾利過百二嶮踰四塞鄙秦人之踐華陋荊州之却月周邦彥賦汴州水陸要衝山河形勝乃萬庾千箱之地是四通八達之郊晉天福三年詔東京華夷溱湊水陸會通周顯德元年詔輦轂之下謂之浩穰萬國駿奔四方繁會三年詔燕都蘇秦說燕文侯曰燕東有朝鮮遼東北有林胡樓煩西有雲中九原東有滹沱易水南有碣石雁門之饒北有棗栗之利此所謂天府者也史記燕薊南通齊趙渤碣石間一都會也前地理志因內海以為池即瓊島而為囿近則東有潞河之饒西有香山之阜南有柳林之區北有居庸之口遠則易河滹水帶其前龍門狐嶺屏其後菑時鴨緑浮其左五臺恆山阻其右黃文仲大都賦壽春周馥成都王頴以為河南尹馥覩洛陽孤危乃與祖納華談等建策迎天子遷都壽春曰殷人有屢遷之事周王有岐山之徙方今河朔蕭條崤函沮澀宛都多敗江左多虞惟淮揚之地北阻塗山南抗靈嶽名川四帶有重險之固是以楚人東遷遂宅壽春徐邳東海亦足戍禦且漕運四通無患空乏宜相土遷宅以享永祚晉書彼壽陽者南引荊汝之利東連三吳之富北接梁宋平塗不過七日西援陳許水陸不出千里外有江湖之阻內保淮肥之固龍泉之陂良疇萬頃舒六之貢利盡蠻越金石皮革之具萃焉苞木箭竹之族生焉山湖藪澤之隈水旱之所不害土産草滋之實荒年之所取給此則係乎地利者也伏滔正淮論天心遷徙隋文帝嫌舊城制度逼小宮內多鬼妖夜與高熲蘇威定議遷都庾季才旦而奏曰仰觀玄象俯察圖記龜兆允襲必有遷都且漢營此城經今將八百歲水皆鹹鹵不甚宜人願協天人之心為遷徙之計帝愕然謂熲等曰是何神也朕自今以後信有天道矣本傳開皇二年移入新邑在漢故城之東南萬年縣界南直終南山子午谷北枕龍首原今朝堂即舊楊興村村門大樹今見在兩京記襄鄧乾寧初朱朴上書議遷都曰古之王者不常厥居皆觀天地興衰隨時制事關中隋家所都我實因之廣明巨盜陷覆京闕高祖太宗之制蕩然矣夫襄鄧乃形勝之地沃衍之墟自古中興之君去已衰之衰就未王而王今南陽光武雖起而未王也江南土薄水淺人心囂浮輕巧不可以都河北土厚水深人心彊愎狠戾不可以都惟襄鄧實惟中原人心質良去秦咫尺而有上洛為之限永無夷狄侵軼之虞此建都之極選也唐書湯思退以金人議和欲棄唐鄧海泗手詔謂唐鄧非險要可置度外虞允文奏議鄧為襄漢之藩籬南陽又為鄧州之藩籬古形勝之國也大勢議者曰洛陽四戰之地既將不可蒲坂虞舜舊國表裏山河江陵亦嘗設都控壓吳蜀遠導避翟寧不堪居答曰蒲坂土瘠人貧困竭甚於洛邑江陵本非要害梁主數歲國亡夫臨制萬國尤借大勢秦川是天下之上腴關中為海內之雄地若居之則勢大而威遠捨之則勢小而威近恐人心因斯而搖矣非止於危亂乎哉通典一百七十四京兆絶高曰京京大也十億曰兆欲令帝都殷盈也左輔右弼蕃翊承風也張掖始開垂張臂掖也漢官儀絶高曰京十億曰兆人衆所聚也登瀛祕録注輦轂王鳳疏云臣當靡骨輦轂下前元后傳至止之日馳心輦轂曹植責躬詩表谷永疏曰薛宣為御史中丞執憲轂下漢書轂下喻在輦轂之下京城之中也胡廣漢官鮮故注神皋載穆轂下以清任彥升竟陵王狀自我違京輦四載迄于斯潘安仁懷縣詩佳麗壯哉帝王居佳麗殊百城曹植贈王粲詩兩京愧佳麗三都豈能似謝靈運會吟行江南佳麗地金陵帝王州謝玄暉鼓吹曲地近華陽金壇之陵故云金陵建康録六代帝王國三吳佳麗城謂金陵也李白詩皇州升高臨四關表裏望皇州鮑明遠詩宛洛佳遨游春色滿皇州謝玄暉皇邑清晨發皇邑日夕過首陽曹子建贈白馬王彪詩祇役出皇邑相期憩甌越謝靈運詩京華京華陰俠窟山林隱遁棲郭璞詩昔余游京華未嘗廢丘壑謝靈運務協華京想詎存空谷期上火燎神州洪流華域劉琨京洛名都多妖女京洛出少年子建名都篇京洛多風塵素衣化為緇陸機誰能久京洛緇塵染素衣謝玄暉京洛多妖麗玉顏侔瓊蕤陸機京室京室密清罔有不韙東京賦引領望京室南路在伐柯潘安仁引顧見京室宮雉正相望謝玄暉京縣灞涘望長安河陽視京縣玄暉太微凝帝宇瑤光正神縣江淹雜體上游項羽陽尊懷王為義帝曰古之王者地方千里必居上游徙之長沙都郴前傳居中國王者居中國何順天地之和而同四方之統也譙周法訓名都燕之涿薊趙之邯鄲魏之溫軹韓之滎陽齊之臨淄楚之宛丘鄭之陽翟二周之三川富冠海內皆為天下名都居五諸侯之衢跨街衝之路也鹽鐵通有居中欲近四旁莫如中央故王者必居天下之中禮也荀大略奠枕昔在姬公用於周而四海皇皇奠枕于京楊寡見根本京師者諸夏之根本詩民勞箋京師以諸夏為障蔽苕之華箋京師諸夏之本也將以觀治而豪猾踰檢劉蕡傳左襄四年魏絳諫晉侯曰諸華必叛注諸華中國詩正義曰猶諸夏也上京師者諸侯之父母也詩沔水傳王化之始杜預為河南尹以京師王化之始自近及遠凡所施論務崇大體晉書百官之府文帝詔京師百官之府四海歸向隋紀衣冠所聚張九齡云京師衣冠所聚身名所出從容附會不勤而成是大利在于內而不在于外也本傳朝宗玄宗時京城穀貴裴耀卿曰國家帝業本在京師萬國朝宗百代不易之所舊唐國家大本在京師秦地狹水旱易匱新唐天下本李晟云長安宗廟所在為天下本若皆執羈勒誰復京師舊唐京師天下之本新書寰內寰內諸侯尹更始曰天子以千里為寰榖梁古三都堯治平陽舜治蒲坂禹治安邑三都相去各二百餘里俱在冀州春秋疏冀州者天下之中州自唐虞及夏殷皆都焉是天子之常居鄒衍著書云九州之內名曰赤縣赤縣之畿從冀州而起榖梁疏三河昔唐人都河東殷人都河內周人都河南夫三河在天地之中若鼎足王者之所居也建國各數百千歲史貨殖傳周在中樞三河之分風雨所起四險之國博物志三川張儀曰爭名者於朝爭利者於市今三川周室天下之朝市也秦策韋昭曰有河洛伊曰三川今注無漢五都五都之貨殖西都賦王莽於長安及五都立五均官更名長安東西市令及洛陽邯鄲臨災宛成都市長皆為五均司市稱師東市稱京西市稱畿洛陽稱中餘四都各用東西南北為稱食貨志魏五都魏黃初二年正月改長安譙許昌鄴并洛陽為五都立石表西界宜陽北行太行東北界陽平南循魯陽東界郯為中都之地魏志注魏因漢祚復都洛陽以譙為先人本國許昌為漢之所居長安為西京之遺跡鄴為王業之本基故號五都水經注唐五都肅宗寶應元年詔曰五都之號其來自久宜以京兆為上都河南為東都鳳翔為西都江陵為南都太原為北都志州疇也各疇其土而生也說文州注也郡國所注仰也釋名州之言殊也合同類異其界也春秋說題辭周禮五黨為州州疇也州有長使之周相足也風俗通神州地中央曰崑崙其東南地方五千里名曰神州中有五嶽地圖帝王居之括地象九州黃帝受命風后受圖割地布九州置十二國周公成名録自神農已上有大九州柱州迎州神州等名至黃帝以來德不及遠惟於神州之內分為九州周禮職方疏顓帝帝嚳建萬國而制九州帝王世紀堯遭洪水民居水中高土故曰九州說文州域河漢之間為豫周也兩河之間為冀晉也河濟之間兗衛也東方為青齊也泗上為徐魯也東南為揚越也南方為荊楚也西方為雍秦也北方為幽燕也呂覽有始兩河間曰冀州河南曰豫州河西曰雍州漢南曰荊州江南曰揚州濟河間曰兗州濟東曰徐州燕曰幽州齊曰營州爾雅星主北斗七星主九州春秋文耀鉤五星流為兗鉤鈐星別為豫昴畢散為冀箕星散為幽營室流為并參伐流為益虛危流為青天氐流為徐軫星散為荊牽牛流為揚元命包繫台摘輔象曰兗豫屬上台九州繫於三台荊揚屬下級上之下等一台名有上下梁雍屬中上中台之上冀州屬錯中台之下下台之上青州屬下上下台之上徐州屬下下下台之下異氣九州之水泉剛柔各異青徐角羽集寬舒遲人聲緩其泉鹹以酸荊揚角徵會氣漂輕人聲急其泉酸以苦梁州商徵接剛勇慓人聲騫其泉苦以辛兗豫宮徵合平靜有慮人聲端其泉甘以苦雍冀合商羽端駃烈人聲揵其泉辛以鹹河圖舜十二州馬融曰禹平水土置九州舜以冀州之北廣大分置并州燕齊遼遠分燕置幽州分齊為營州於是為十二州史記注禹九州堯遭洪水分為十二州今虞書是也及禹平水土還為九州今禹貢是也帝王世紀禹登王位還置九州正義魯班石為禹九州圖今在格城石室山東北岩中述異記九牧王孫滿曰昔夏之方有德也貢金九牧左宣三殷九州商頌帝命式于九圍互見地門周九州保章氏以星土辨九州之地所封封域皆有分星以觀妖祥注星土星所主土也已見星門周敬王魯哀公之時吳為越所滅其後六十九年至威烈王始命韓魏趙為諸侯後十七年安王之時三國共滅晉而分其地後五十六年顯王之時而越為楚所滅又按所列諸國分野具於班固漢書及皇甫謐帝王世紀下分區域上配星躔固合同時不應前後當吳之未亡天下列國尚有數十其時韓魏趙三卿又未為諸侯晉國猶在豈分其土地自吳滅至分晉凡八十六年時既不同若何分配又按諸國地分考所在封疆辨詳隸屬甚為乖互不審二子依據漢書漢書又云今之蒼梧鬱林合浦交趾九真南海日南皆越分野夏少康庶子封于會稽後二十餘代至勾踐滅吳稱伯後六代而亡後十代至閩君搖漢復立為越王都夷甌則今永嘉郡也是時秦南海尉趙他亦稱王五嶺之南皆他所有也又按越之本封在於會稽至勾踐彊盛有江淮之地天子致胙號稱霸王正當戰國之時凡得百四十二歲後至秦漢方有閩搖雖虛引其歷代興亡而地分星躔皆不相涉及趙他奄有時代全乖未知取舍何所准的凡為著述誠要詳審者也通典王者規摹夏書禹貢周氏職方中畫九州外薄四海析其物土制其疆域此蓋王者之規摹也後魏地形志增益禹貢有青徐梁而無并幽營爾雅有徐幽營而無青梁并職方有青幽并而無徐梁營三代不同故也釋文漢興武帝開拓三方立十三州通并梁之數而增交益焉物理論州十二師古者處師八家而為鄰三鄰而為朋三朋而為里五里而為邑十邑而為都十都而為師州十有二師焉家不盈三口者不朋由命士以上不朋洛誥大傳郡群也人所群聚也秦改諸侯置郡縣隨其所在山川土形而立其名釋名立郡秦始皇廢五等之爵立郡縣之官以公國為大以侯伯為小大郡曰守小郡曰都尉史記周制周制天子方千里分為百縣縣有四郡故左氏傳曰上大夫受縣下大夫受郡風俗通至秦始置三十六郡以監縣矣邑君聲說文取名郡之言君也改公侯之封而言君者至尊也郡守專權君臣之禮彌崇今郡字君在其左邑在其右君為元首邑以載民故取名於君謂之郡黃義仲十三州記三十六郡秦用李斯議分天下為三十六郡凡郡或以列國陳魯齊吳是也或以舊邑長沙丹陽是也或以山陽太山山陽是也或以川原西河河東是也或以所出金城城下得金酒泉泉味如酒豫章樟樹生庭雁門雁之所育是也或以號令禹合諸侯大計東冶之山會計國名會稽是也漢官儀敦煌酒泉其水甘若酒味故也張掖言張國臂掖以威羌狄應劭地理風俗記又曰昔者天子建國名都或以合名或以山林故豫章以樹氏都酸棗以棘名邦水經注郡縣城渾出周至楚新城說其令曰王何不以新城為主郡也邊邑甚利之楚策甘茂曰宜陽大縣也上黨南陽積之久矣名為縣其實郡也秦策春秋時郡屬於縣趙簡子所謂上大夫受縣下大夫受郡是也戰國時縣屬於郡所謂上郡十五縣者是也大事記按此則郡縣之設自春秋已然矣柳子厚封建論乃云秦有天下裂都會而為之郡邑廢侯衛而為之守宰據天下之雄圖都六合之上游攝制四海運於掌握之內此其所以為得也不數載而天下大壞其有由矣夫左傳楚子入陳因縣陳策中楚有新城令趙有上黨守靳黈且下有四太守字是郡縣守宰俱不始於秦也司馬索隱云漢景時始稱太守然賈誼傳河南守吳公又先于景帝矣縣周禮百里曰同所以獎王室協風俗總名為縣縣者玄也首也從系倒首與縣易偏矣言當玄靜徭役也風俗通縣懸也懸於郡矣釋名取名縣絃也絃以貞直言下體之居臨民之位不輕其誓施繩用法不曲如絃絃聲近縣故以取名今縣字在半也黃義仲十三州記子男縣萬戶以上為令則子國也千戶為長男國也今人呼縣為百里子男本方百里也故言今之百里古之諸侯黃恭十四州記縣有四郡郊甸方六百里因西土為方千里分以百縣縣有四郡郡有四鄙鄙不過百室以便野事周書修武武王伐紂到于邢丘乃修武勒兵於寧更名邢丘曰懷寧曰修武行克紂于牧之野韓詩外傳武丘武王祭南嶽廽至汝水西野宿于武丘夜夢云築城在此兼祭天地可王七百年遂城于武丘北因名武陰在沉丘縣城冢記猗氏猗氏縣猗丘所居之地猗頓魯窮士也問術于陶朱公公教之蓄五牸遂富漢因之名縣郡國志九門九門縣本為九室而居趙武靈王改之為九門縣戰國策新豐京兆新豐秦曰驪邑高祖七年置漢志太上皇不樂關中思慕鄉里高祖徙豐沛酤酒煮餅商人立為新豐三輔舊事高帝既作新豐并移舊社衢巷棟宇物色惟舊士女老幼相攜路首各知其室放犬羊雞鴨於通塗亦競識其家其匠人胡寬所營也移者皆悅其似而德之西京雜記聞喜武帝元鼎六年將幸緱氏至左邑桐鄉聞南越破以為聞喜縣漢紀獲嘉七年春至汲新中鄉得呂嘉首以為獲嘉縣上懷德太興三年七月丁亥詔先公武王先考恭王臨君琅邪四十餘年惠澤加百姓遺愛結人情朕創基江表兆庶宅心繈負子來琅琊國人近有千戶在此今立為懷德縣統丹陽郡優復之科一依漢氏沛及南頓故事晉元紀昭應唐玄宗幸溫泉見白鹿升天改會昌為昭應縣會昌解頤會昌新豐也平陸天寶中上以三河道險束漕運艱難乃旁北山鑿石為月河以避湍急傳信記陜州刺史李齊物開砥柱之險以通流運於石中得古鐵犁鏵有平陸字因改河北縣為平陸縣舊唐咸陽咸陽縣本秦舊縣也山南曰陽水北曰陽在北山之南渭水之北故曰咸陽元和郡縣圖志錢塘秦始皇三十七年東游丹陽至錢塘臨浙江史記錢塘屬會稽郡西部都尉治漢志防海大塘在縣東一里符郡議曹華信家議立此塘以防海水始開募有能致一斛土者即與錢一千旬月之間來者雲集塘未成而不復取於是載土石者皆棄而去塘以之成故改名錢塘焉錢塘縣記錢塘在餘杭初為潮水所損州人華信云云九域志希通録云錢塘史漢但作唐字今人以唐為塘非也其失本于世說注云晉人沈姓而令其縣者詭令致土云云不知秦漢已有此名豈至晉而然乎世說雅量篇云褚裒送人投錢唐亭住爾時吳興沈充為縣令遇之云云注云錢塘縣記云縣近海為潮漂沒縣諸豪姓斂錢顧人輦土為塘因以為名沈令未詳今謂以唐為塘其失本於世說注且云晉人沈姓而令其縣者為之句義俱差不有誤於後學耶陳留陳留郡鄭邑後為陳所併故曰陳留瓚曰宋亦有留彭城留是也留屬陳故稱陳留也漢志浚儀浚儀縣北有浚水像而儀之故曰浚儀縣有倉頡師曠城上有列仙之吹臺北有牧澤中出蘭蒲土多俊髦今帶牧澤方一十五里俗謂之蒲關澤陳留風俗傳尉氏圈稱云尉氏鄭國之東鄙尉獄官名也鄭大夫尉氏之邑故欒盈曰盈將歸死于尉氏也水經洛陽周公相成王以酆鎬偏在西方職貢不均乃使邵公卜居洛水之陽以即中土帝王世紀八方之廣周洛為中於是遂築新邑營定九鼎以為王之東都援神契周在中樞西阻崤谷東望荊山南面少室北有太嶽三河之分風雨所起四險之國博物志互見都江都廣陵之江都縣城臨江應劭地里風俗記曰縣為一都之會故曰江都也水經馮翊馮輔翊蕃故以為名應劭漢官鮮詁盩厔山曲曰盩水曲曰厔故以名縣圖經梓潼東倚梓林西枕潼水故以名縣南陽南陽劉善曰在中國之南而居陽地故以為名水經青田青田縣有草葉似竹可染碧名為竹青此地所豐故名青田永嘉記古田屬福州開元以前嘗為土豪所據至二十八年始建為縣有謝能者十餘戶言因古田畝懇闢而居故曰古田又曰青田者其地有青田鄉父老言田中嘗得青玉圖經兩當荊州兩當縣古老相傳嘉陵江與牛洹水相會於縣界故縣界名兩當又云東京西蜀至此皆三十程故名兩當上兩當縣水出陳倉縣之大散嶺西南流入故道川謂之故道水縣因水取名或云縣西有兩山相當故名之也水經陽曲陽曲屬太原應劭曰黃河千里一曲當其陽故曰陽曲漢書九原正平縣有九原一名九京即趙簡子觀處十道志封丘衛地故燕之延鄉也高祖與項羽戰於延鄉有翟母免其難故以延鄉封翟母焉國都記晉江泉州屬邑漢平粵之後其地既虛而晉之衣冠避地者多㳂江以居故以名之盧奴安喜縣即古盧奴縣也有黑水故池深而不流俗謂黑水為盧不流為奴圖經壯哉高帝北征南過曲逆上其城望室屋甚大曰壯哉縣吾行天下獨見雒陽與是耳更封陳平為曲逆侯漢書章帝北巡北嶽以曲逆名不善改為蒲陰後漢鄙小韓安國傳即以嫮鄙小縣師古曰鄙小縣言在外鄙之小縣也前漢六等大唐縣有赤畿望緊上中下六等之差京都所治為赤縣京之旁邑為畿縣其餘則以戶口多寡資地美惡為差郡國志開元中以近畿之州為四輔同華岐蒲其餘為六雄十望十緊及上中下之差六雄鄭陜汴絳懷魏十望宋毫渭許汝晉洛號衛相初有十緊州後入緊者甚多麗水麗水縣有惡道惡道有突星瀨謝靈運與弟書曰聞惡道溪中九十九里有五十九灘永嘉記曰王右軍遊惡道歎其奇絶遂書突星灘於石圖經松陽松陽縣東南臨大溪有松陽樹大八十一圍腹中空容三十人坐故取此為名王右軍嘗往看之云吳地記漢晉以後帝王之割據無常州郡之更置不一其載在本志者固可考而知也藝文略具九州初學止敘十道嗣後類集各依本朝或語焉而不詳或棼紜而無統誠亦有難于述志者今按舊籍少存梗概以備覽云城以盛民也墉城垣也說文城盛也盛受國都也城上垣謂之睥睨言於孔中睥睨非常也亦曰陴言裨助城之高也亦曰女牆言其卑小比之於城若女子之於丈夫也釋名堞城上女垣說文雉堞也以白堊之故曰粉堞增韻雉鄭叔假居京謂之京城大叔祭仲曰都城過百雉國之害也左隱元家不藏甲邑無百雉之城雉者何五板而堵五堵而雉百雉而城公羊定十二天子之城千雉高七雉公侯百雉高五雉子男五十雉高三雉五經異義仞天子之城高九仞公侯七仞伯五仞子男三仞五經異義崇城天子曰崇城言崇高也諸侯曰干城言不敢自專禦於天子也白虎通周城天子周城諸侯軒城軒城者缺南面以受過也春秋說文城始堯聽四嶽之言用鯀修水鯀曰帝遭天災厥黎不康乃築城以衛君造郭以守民此城郭之始也吳越春秋鯀為三仞之城淮南子處士東里槐責禹亂天下事禹退作三城彊者攻弱者守敵者戰城郭蓋禹始也博物志堯城故堯城在濮洲鄄城縣東北十五里竹書云昔堯末德衰為舜所囚也又有偃朱故城在縣西北十五里竹書云舜囚堯復偃丹朱使不得與父相見也括地志元和志云十道志已録今不欲去之小城陽城在陽城西南半里許俗云囚堯城續述征記王僧辨上元帝表云閶闔受白登之辱象魏致堯城之疑梁書鶴城長垣縣有鶴城昔夏纍養鶴于此遂號鶴城城冢記保民夏城中丘榖梁曰城為保民為之也民衆城小則益城益城無極凡城之志皆譏也注夫保民以德不以城也如民衆而城小輒益城是無極也隱七亟城梁伯好土功亟城而弗處民罷而弗堪則曰某寇將至乃溝公宮曰秦將襲我民懼而潰秦遂取梁僖十九城惡楚子重自陳伐莒圍渠丘渠丘城惡衆潰奔莒莒城亦惡莒潰楚遂入鄆莒無備故也君子曰恃陋而不備罪之大者也備豫不虞善之大者也莒恃其陋而不修城郭浹辰之間而楚克其三都無備也夫左成九飾城古者大國過小邑必飾城而請罪禮也榖襄二十五城成周王使富辛與石張如晉請城成周晉士彌牟營成周計丈數揣高卑度厚薄仞溝洫物土方議遠邇量事期計徒庸慮材用書餱糧以令役於諸侯屬役賦丈書以授帥左昭三十二孟懿子會城成周宋仲幾不受功士伯怒乃執仲幾以歸城三旬而畢宣元城叛中行穆子圍鼓鼓人有以城叛者不許軍吏曰師徒不勤可得城奚故不受曰有以吾城叛者吾所甚惡也人以城來我獨奚好焉賞所以甚惡是失賞也說苑馬城昔秦人築城於武周塞內以備胡將成而崩者數矣有馬馳走周旋反覆父老異之因依馬跡以築城城乃不崩遂以名焉搜神記城沂楚令尹蒍艾獵城沂使封人慮事以授司徒量功命日分財用平板幹稱畚築程土物議遠邇略基址具餱糧度有司事三旬而成不愆于素宣十一羊城廣州廳事梁上畫五羊像又作五榖囊隨像懸之云昔高固為楚相五羊銜榖萃於楚庭故圖其像為瑞六國時廣州屬楚廣州記固為楚相有五仙人騎五色羊各持穀穗一莖六出以遺州人騰空而去今呼為五羊其城周十里初尉他築之步陟修之既而為黃巢所焚寰宇記吳修為廣州刺史未至州有五仙人騎五色羊負五榖而來令州庭上圖之為瑞故廣南謂之五羊城南部龜城初張儀築成都城城屢壞不能立忽有大龜周旋行走巫言依龜行處築之城乃得立所掘處成大池龜乃復入於中龜每出則州境有賊刺史或病寰宇記益州城張儀所築錦州城在州南蜀時故宮也亦為錦里益州記蜀王孟昶於成都城上種芙蓉花開爛漫如錦因以為名一曰以江山明媚錯雜如錦也一曰以蜀有錦官如銅官鹽官之類故名亦曰錦里代城盧植去代城始築版幹一夜亡去西南五十里大澤中營城自護結葦為九門於是就以為治城圓匝而不方周四十七里開九門更名其故城曰東城經博物志雲中城武侯自五源河曲築長城東至陰山又於河西造大城一箱崩不就乃改卜陰山河曲而禱焉晝見群鵠遊于雲中徘徊經日見大光在其下武侯曰此為我乎乃即于其處築城今雲中城是也虞氏記新城韓氏城新城期十五日而成假喬為司空有一縣後二日假喬執其吏而囚之囚者之子走告封人子高曰惟先生能活臣父之死願委之先生封人子高曰諾乃見假喬自扶而上城封人子高左右望曰美哉城乎一大功矣子必有厚賞矣自古及今功若此其大也而能無有罪戮者未嘗有也封人子高出假喬使人夜解其吏之束縛也而出之呂氏春秋開春長城秦始皇使蒙恬北築長城西屬流沙東至弱水以捍胡史御覽恬築長城因地險周制險塞起臨洮至遼東延袤萬餘里恬將吞藥自殺嘆曰恬罪固當死矣起臨洮屬之遼東城塹萬餘里此其中不能無絶地脈哉本傳始皇使蒙恬築長城死者相屬民歌曰生男慎弗舉生女哺用餔不見長城下尸骸相支柱陽泉物理論秦所築長城土色皆紫漢塞亦然故稱紫塞者焉古今注趙成侯六年中山築長城史記太山西北有長城緑河徑太山千餘里至琅琅臺入海太山郡記齊宣王乘山嶺之上築長城東至海西至濟洲千餘里以備楚齊記周王築防以為長城竹書齊之長城巨防足以為塞韓非子史注秦昭王滅義渠築長城以備胡漢胸奴傳梁惠成王十二年龍賈帥師築長城于西邊竹書唐劉貺武指云朔塞之上多古長城未知起自何代七國分爭國有長城趙簡子起長城以備胡燕秦又築長城以限中外則長城之築其來遠矣通典二百據此諸書則長城之築固非止于始皇也而邊防之利萬世且永賴焉乃儒書之劇秦者率以是為言鳴呼惡居下流始皇固以之矣功過相準耳學者類習非哉赤色長安城中地皆黑壤今城赤何也且堅如石如金父老所傳云盡鑿龍首山中土以為城及諸城闕亦然三秦記斗城長安故城漢之舊都高帝七年方修長安宮城自櫟陽徙居此城本秦離宮也初置長安城本狹小至惠帝更築之周廽六十五里城南為南斗形北為北斗形至今人呼漢舊京為斗城三輔黃圖長安城面三門四面十二門皆通達九逵以相經緯衢路平正可並列車軌十二門並洞闢隱以金椎周以林木左右出入為往來之徑行者升降有上下之別三輔夬録城郭之制則旁通三門參塗夷庭方軌十二街衢相經西京賦披三條之廣路立十二之通門西都賦廣陵廣陵城吳王濞所築王逸廣陵郡圖經城周十四里半後志注侈秦法佚周令劃崇墉刳濬洫板築雉堞之殷井幹烽櫓之勤格高五嶽袤廣三墳崒若斷岸矗似長雲製磁石以禦衝糊赬壤以飛文觀基扃之固護將萬祀而一君蕪城賦雎陽梁孝王築雎陽城方十三里鼓倡節杵而後下和之者稱雎陽曲今踵以為故今之樂家雎陽曲是其遺音晉太康地記金城金城郡漢昭元始六年所置應劭云築城初得金故曰金城凡城皆稱金言其固也故墨子稱金城湯池秦州記安陽有金城城皆如金色堅徑不崩摧先儒云上古時天雨黃金也述異記玄菟昭帝元鳳六年春正月募郡國徒築遼東玄菟城漢紀疑城魏文帝之在廣陵吳人大駭乃臨江為疑城自石頭城至於江乘以木為植衣以葦席加彩飾焉一夕而成干寶晉紀石頭石頭城吳時悉土塢義熙初始加磚纍甓因山以為城因江以為池地形險固尤有奇勢亦謂之石頭城也丹陽記白下齊武帝欲修白下城難於動役劉係宗啓謫役在東者上從之後武帝講武白下履行其城曰係宗為國家得此一城南史白下城本江乘之白石壘武帝以其地帶江負山移琅邪居之輿地志武德九年更金陵曰白下唐地里志夫人晉朱序鎮襄陽苻堅遣兵攻之序母自登城履行謂西北角當先受弊遂領百餘婢并城中女子於其角斜築城二十餘丈賊攻西北角果潰衆守新城賊遂引退襄陽人謂此城為夫人城晉書遷城吳興郡城秦時為下菰城又為項王故城晉郭璞欲移郡於東遷璞女亦善於地理啓璞無從因舊址損益之可以永無殘破之慮璞從之初璞欲移城于東遷每立標輒為飛鳥銜去會其女又啓遂定於今處女號遷城小娘子從璞廟祀宋知州鄭建撰郭尚書璞記江陵江陵城地東南傾故緣以金隄自靈溪始桓溫令陳遵造遵善於防攻使人打鼓遠聽之知地勢高下依傍創築略無差矣城西有棲霞樓俯臨通隍吐納江流水經注統萬赫連勃勃以叱於阿利領將作大匠營統萬城阿利乃蒸土築城以錐刺之錐入土數寸沒其錐而并築之不入即殺行錐者勃勃以為忠晉載記柳城魏太武伐蠕蠕軍中有告失驢去者楚之曰必覘賊截之為驗耳賊將至矣乃伐柳為城灌水令凍城立而賊至不可攻逼乃走散北史五利魏太和八年中書監高閭請於六鎮築長城云長城有五利罷遊防之苦一也北部放牧無抄掠之患二也登城觀敵以逸待勞三也省境防之憂息無時之備四也歲常遊運永得不匱五也帝優詔答之本傳城精梁武帝攻郢城夜郢城有數百毛人踰堞且泣因投黃鵠磯蓋城之精也及旦城降南史紀六壁六壁府魏太平真君五年討胡於六壁即此城俗以城有六面因以為名焉郡國志玉壁絳州稷山縣後周置荊州有玉壁城後周王思政所築為重鎮齊神武再攻圍不克韋孝寬代思政鎮玉壁高歡攻之智力皆困周書二傳六合隋何稠為煬帝制行殿及六合城帝於遼左與賊相對夜中施功其城周廽八里城及女垣合高千仞上布甲士立仗建旗四隅置闕面別一觀觀下三門遲明而畢高麗望見謂若神功本傳受降景雲三年朔方總管張仁願於河北築三受降城絶虜南寇路六旬而三城就本傳呂溫銘曰俯視陰山仰看昭回一夫登陴萬里洞開仁願封韓公制曰橫却月於天街劃長雲於地脈奉天建中元年五月築奉天城四年十月上避難於奉天初術士桑道茂奏請城奉天為王者之居至是方驗唐書江夏牛僧孺出為鄂州刺史江夏城風土散惡難立垣墉每年加板築賦菁苑以覆之吏緣為奸蠹弊綿歲僧孺至計苑苦板築之費歲十餘萬即賦之以磚以償板築之價凡五年墉皆甃葺蠹弊永除舊唐三城李德裕出為滑州節度使徙劍南西川築仗義城以制大度青溪關之阻作禦侮城以控榮經犄角勢作柔遠城以扼西山吐蕃新唐大玄高駢徙劍南西川節度成都城歲高駢易以磚甓陴堞完新負城丘陵悉根平之以便農桑訖功筮之得大畜駢曰畜者養也濟以剛健篤實輝光日新吉孰大焉文宜去下存上因名大玄城上獻圖王使陳章城衢州工畢以圖獻王視西門樟樹密謂左右曰此樹不入城章終非我畜其後章果叛備史青澗真宗時种世衡知延州築青澗城初苦無水鑿地百五十尺至石屑石得泉城成賜名青澗城鬼工魏罐侍郎知廣州子城一角忽頽一古磚有四大字云委於鬼工是魏字公感其字大築新之罷還未幾儂寇廣州外城一擊而圮獨子城堅民賴以生賊平以公有前知之備加諫議大夫再知五羊公以築城之功自論久不報作感懷詩內云螭頭賜對恩雖厚雉堞論功事己空文潞公採詩呈加龍圖閣學士尹應天府古今詩話人為長城宋文帝有疾義康矯詔收檀道濟付廷尉道濟引飲一斛脫幘投地曰乃壞汝萬里長城魏人聞之皆曰道濟已死吳子輩不復足憚後魏軍至瓜步文帝登石頭城望甚有憂色嘆曰若道濟在豈至此南史金城唐雍字道利晉陽人有治世才具齊文宣嘗登童佛寺望并州城曰此是何等城或曰此是金城湯池天府之國帝云我謂唐雍是金城此非金城也北齊書犬吠不驚命曰金城常避危殆命曰不侮說苑賈誼云上設廉耻禮義以遇其臣故化成俗定父兄之臣誠死宗廟法度之臣誠死社稷輔翼之臣誠死君上守圄扞敵之臣誠死城郭封疆故曰聖人有金城者此物此志也注云言聖人厲此節行以御郡下則人皆懷德戮力同心國家安固不可毀狀若金城也漢書建金城之萬雉呀周池而成淵西都賦石城神農之教曰有石城十仞湯池百步帶甲百萬而無粟弗能守也食貨志亞字吳羅城作亞字形周敬王六年丁亥造其城南北長十二里東西九里城中有大河三橫四直蘇州名摽十望地號六雄八門皆通水陸郡郭三百餘巷吳地記却月沌陽縣至沔口水北有却月城西一里有馬騎城周廽五里高一丈荊州記太平朔方太平城後魏穆帝治也太極殿琉璃臺及鴟尾悉以琉璃為之郡國志千秋張掖郡竇融築千秋城萬歲城上織錦梁山宮在好畤城皆文石名織錦城三秦記益陽益陽城魯肅築也云登之望見長沙城邑人馬形色宛然相去三百里故老云長沙益陽一時相望李城秦圍邯鄲急傳舍吏子李談說平原君得敢死士三千人與赴秦軍秦兵遂罷李同戰死趙封其父為李侯平原傳徐廣曰河內成皋有李城正義曰懷州溫縣本李城也李同父所封昭明名士悅傾城詩經居李城北來往宋家東元稹會真詩因遊李城北偶向宋家東夏口江夏郡所治夏口城其西南角因磯為高墉枕流上則廽眺山川下則激浪崎嶇是曰黃鵠磯荊州圖經羅娑北方禿髮譯語謂吐蕃其王為贊普其國都羅娑城重兵死惡病終以纍世戰沒者為甲門臨陳奔北者懸狐尾於首以表其性似狐之性唐會要燕子北燕人趙應良者為僞丞相高公堂後官常從公至燕于城登重閣注燕子城北燕留都于此海録泥犁泥犁城梁言寄條城又云閉城也文句云地獄北名梵稱泥犁秦言無有或言卑下或言墮落郭或謂之郛郛者亦大也風俗通郭廓也廓落在城外也說文內謂之城外謂之郭管子鐵郭金城鐵郭上下同力寇不敢賊焦贑易林表城夫城之有郭猶裏之有表骨之有皮表裏各異則保障不完皮骨分離則一體不具王肅表壕城下道曰壕壕翱也言都邑之內翱翱祖駕之處也釋名櫓露也露上無覆屋也上洛陽城周公所制東西十里南北十三里城上百米有一樓櫓外有溝渠陸機洛陽記隍城池也有水曰池無水曰隍易曰城復於隍說文宮釋名曰宮穹也言屋見於垣上穹崇然也郭璞云宮謂圍繞之記曰君為廬宮之是也爾雅云室謂之室室謂之宮詩云作於楚宮又曰入此室處是也風俗通曰宮室一也秦漢以來尊者以為常號下乃避之也呂覽慎大云武王克殷靖箕子之宮禮記曰由命士以上父子皆異宮又曰儒有一畝之宮環堵之室又曰季夫子入宮不敢哭是士庶人皆有宮稱也便生上古之人未知為宮室就陵而居處下潤傷民故聖人作為宮室之法高足以避潤濕中足以禦風寒上足以待霜雪牆高足以別男女故以便生不以為樂也今之為宮室必厚斂百姓暴奪民財為曲直之室青黃刻鏤之飾故國貧而人難訴也墨子合宮黃皇有合宮以廣政堯開衢室聽於民管子欲觀黃帝之行於合宮觀堯舜之行於總章尸子黃帝合室有虞總期東京賦昔黃帝有合宮之聽堯有衢室之問舜有總章之訪皆議之謂也文中子作宮黃帝作宮室以避寒濕白虎通堯使禹作宮世本二宮堯見舜處於二宮帝王世紀接禮二宮考庸太室王元長曲水詩序撝宮堯垂貝殼於撝宮嚴助相貌經鑣宮天命湯於鑣宮有神來告曰夏德大亂往攻之豫必使汝大戡之墨子初學記云湯所受命之宮長夜夏桀之時為長夜宮於深谷之中男女雜處三旬不出聽政其後大風飄沙一夕填此宮谷博物志傾宮紂造傾宮作瓊室瑤臺飾以美玉七年乃成其大十里其高千丈其大宮百其小宮七十三處宮中九市帝王世紀蒿宮周時德澤洽和蒿茂大以為宮柱名為蒿宮也大戴禮周德既隆草木茂盛蒿堪為宮室因名蒿室既有天下遂都於鎬竹書呂覽云周明堂茅茨蒿柱土階三等以示節儉正此事也注云茅可覆屋蒿非柱任雖云節儉實所未聞誤化人周穆時西極之國有化人來謁王同游王乃執化人之袪騰而上者中天乃止暨及化人之宮化人之宮搆以金銀絡以珠玉出雲雨之上王寶以為清都紫微鈞天廣樂帝王之所居列子楚宮公作楚宮穆叔曰大誓云民之所欲天必從之君欲楚也夫故作其宮若不復適楚必死是宮也六月辛巳公薨于楚宮左襄三十銅鞮子産相鄭伯如晉盡壞其館之垣而納車馬焉士文伯讓之子産曰今銅鞮之宮數里而諸侯舍於隸人門不容車而不可踰越若獲薦幣修垣而行趙文子曰是吾罪也上虒祁石言於晉晉侯方築虒祁之宮叔向曰是宮也成諸侯必叛君必有咎十年晉侯卒昭八碣石鄒衍如燕昭王擁彗先驅請列弟子之座而受業築碣石宮身親往師之作主運史記春宵夫差築姑蘇臺立春宵宮造千石酒鍾洞真記載館娃闔閭城西硯石山上有館娃宮吳越春秋吳地記美女為娃吳有館娃宮方言幸乎館娃之宮張女樂而娛群臣吳都賦秀峰寺蓋吳館娃宮也蘇志美人美人宮周五百九十步土城句踐所習教美女西施鄭旦宮室也女出於苧蘿山欲獻於吳自謂東垂僻陋恐女朴鄙故近大道居越絶書阿房阿房宮東西三里南北五百步庭中可受十萬人車行酒騎行炙千人唱萬人和置銅人十二於宮前三輔舊事阿房以木蘭為梁以磁石為門懷刃者止之黃圖磁石門西門在阿房前悉以磁石為之故專其目令四夷朝者有隱甲懷刃入門而脅之以示神故亦曰却胡門水經注一名胡臺括地志製磁石以禦衝蕪城賦下可建五丈旗史記未央蕭何治未央宮上見其壯麗甚怒謂何曰天下胸胸勞苦數歲成敗未可知是何治宮室過度也何曰天下方未定故可因以就宮室且夫天子以四海為家非壯麗亡以重威且亡令後世有以加也上悅遂自櫟陽徙都之漢書營未央宮因龍首山以制前殿至孝武以木蘭為棼橑文杏為梁柱金鋪玉戶華欀璧璫雕楹玉磶重軒鏤檻青瑣丹墀左槭右平黃金為璧帶間以和氏珍玉風至其聲玲瓏然也三輔黃圖未央宮周旋三十三里街道十七里有臺三十二池十二土山四宮殿門八十一掖門十四宮殿及臺皆疏龍首山上以作之殿基出長安城上非築也關中記覽秦制跨周法正紫微於未央表嶢闕於閶闔疏龍首以抗殿狀巍峨以岌業西京賦未央者前限未到之辭故漢有未央宮古詩有樂未央詩正義未央一名紫微宮三秦記三雍武帝時河間獻王來朝因獻雅樂對三雍宮本傳建章太初元年柏梁殿災粵巫勇之曰粵俗有火災復起屋必以大用勝服之於是作建章宮度為千門萬戶前殿度高未央武紀郊祀志柏梁既災越巫陳方建章是經用厭火祥營宇之制事兼未央西京賦建章宮周圍數十里殿東別起閣高二十五丈憑高以望遠三輔舊事秦漢規模廓焉泯毀唯建章宮闕聳然獨存雖本象魏之制亦一代之巨觀也繁欽建章宮闕賦序陛下以城中為小圖起建章左鳳闕右神明號稱千門萬戶土木衣錦繡撞萬石之鐘擊雷霆之鼓使民不奢侈難矣方朔傳甘泉建元三年武帝因齊人少翁言作甘泉宮中為臺室畫天地太乙諸鬼神而置祭具以致天神郊祀志武帝起超仙之臺於明庭宮北明庭者甘泉宮名思趙捷仔起通靈臺於甘泉宮洞真記甘泉宮一曰雲陽宮一曰林光宮本秦造在今池陽縣西甘泉山宮以山為名周匝十餘里漢武建元中增廣之周十九里去長安三百里望見長安城黃帝以來員丘祭天處關輔記甘泉山天下顯敞之處也前接大荊後臨北極左撫仁鄉右望素域王褒甘泉頌甘泉山名下有甘泉水因以名之文選注冠以九鉤陪以甘泉乃有靈宮起乎其中秦漢之所極觀淵雲之所頌歎西都賦公孫卿曰黃帝接萬靈明庭明庭者甘泉也志廽天門而鳳舉躡黃帝之明庭劉歆賦武帝以五月避暑於此八月乃還元和郡縣志五柞五柞宮漢之離宮也黃圖宮中有五柞樹皆連三抱上枝蔭覆數十畝西京雜記長楊長楊宮本秦舊宮漢修飾之以備行幸宮中有垂楊蔭數畝因以為名門曰射熊秦漢游獵之所黃圖司馬相如嘗從武帝至長楊獵天子好自擊熊豕馳壄獸因上疏諫本傳振師五柞習為長楊揚雄賦集乎長楊之宮相羊乎五柞之館西京賦建元三年微行北至池陽西至黃山南獵長楊東游宜春私置更衣從宣曲以南十二所中休更衣投宿諸宮長楊五柞倍陽宣曲尤幸方朔傳師古曰皆宮名倍陽即萯陽也桂宮未央宮漸臺西有桂宮中有光明殿皆金玉珠璣為簾箔綴明月珠金戺玉階晝夜光明三秦記武帝為七寶床雜寶案寶屏風列寶帳設於桂宮時人謂之四寶宮西京雜記桂宮在未央宮北周匝十餘里中有明光殿走狗臺土山復道從宮中西上城西至建章宮神明臺蓬萊山三輔故事輦路經營修除飛閣自未央而連桂宮北彌明光而亘長樂西都賦鉤陳之外閣道穹隆屬長樂與明光徑北通於桂宮西京賦明光上起明光宮發燕趙美女三千人充之取年十五以上二十以下滿三十者出嫁掖庭令總其籍時有死出者隨補之凡諸宮美人可有七八千建章未央長樂三宮皆輦道相屬懸棟飛閣皆不由徑路漢武故事明光殿以金為戺玉為階三秦記長樂高帝五年都長安九月治長樂宮漢書漢七年長樂宮成諸侯群臣朝十月儀惠帝為東朝長樂宮及間往數蹕煩民作復道方築武庫南通奏事乃詔立原廟叔孫通傳梁孝王嘗上書願賜容車之地徑至長樂宮自使梁國士衆築作甬道朝太后鄒陽傳長信長信宮漢太后嘗居之黃圖武帝夜出夕還齎五日糧會朝長樂宮方朔傳五日一朝長信宮故齎五日糧長信太后之宮也注成帝母王太后居長信宮班婕妤求共養太后長信宮上許之退處東宮作賦曰奉共養於東宮托長信之末流本傳長信詹事掌皇太后宮景帝中六年更名長信少府平帝元始四年更名長樂少府百官表張晏曰以太后所居官為名也居長信宮則曰長信少府居長樂宮則曰長樂少府也注帝祖母稱長信宮帝母稱長樂宮後曰永樂宮漢官儀后宮在西秋之象也秋主信故宮殿皆以長信長秋為名又永壽永寧殿皆后所處也黃圖長門顧成廟遠無宿宮爰叔教董偃白竇太后獻長門園上大說更名竇太后園為長門宮方朔傳武帝陳皇后擅寵驕貴十餘年而無子元光五年冊曰皇后失序惑於巫祝罷退居長門宮外戚傳陳后時得幸別在長門宮愁悶悲思司馬相如因作解悲愁之辭以悟主上皇后復得幸文選溫泉不到憶拾翠之舊遊長門深閉嗟青鸞之信修駘蕩駘蕩宮春時景物駘蕩滿宮中也黃圖馺娑馺娑宮馺娑馬行疾貌馬行迅疾一日之間遍宮中言宮之大也枍詣枍詣宮枍詣木名宮中美木茂盛也天梁天梁宮梁木至於天言宮之高也上集靈宮華陰集靈宮宮在華山下武帝所造欲以懷集仙者王喬赤松子故名殿為存仙端門南向署曰望仙門桓談仙賦武帝巡省五嶽禋祀豐備故立宮其下號曰集靈宮西嶽記集靈宮集仙宮存仙殿存神殿望仙臺望仙觀俱在華陰縣界皆武帝宮觀名也黃圖漢西嶽華山廟碑略云孝武修封禪之禮巡省五嶽立宮其下宮曰集靈宮殿曰存仙殿門曰望仙門集古録云集靈唯見此碑按地里志華陰有集靈宮武帝起水經注云敷水北徑集靈宮引地理志則不獨見於此碑矣所謂存仙殿望仙門者諸書不載金石録按集靈存仙各見載記而二公之說若此望仙元封三年起望仙宮洞真記步高京兆有步高宮黃圖望遠長安有望遠宮上陽靈天子穆然瑤臺澄心儲精搜述索耦相與齊乎陽靈之宮集乎禮神之囿登乎頌祗之堂揚雄甘泉賦神光入西園閲神光蹂蕙圃踐蘭臺羽獵賦張晏曰神光宮名也濯龍桓帝延熹九年祠黃老於濯龍宮紀祠老子於濯龍宮用郊天樂續漢志飾芳林而考濯龍之宮設華蓋以祠浮圖老子斯將所謂聽於神乎論承光順帝擢种皓監太子於承光宮本傳太初昭明吳有太初宮方三百丈權所起也昭明宮方五百丈皓所作也太康地記吳志避晉諱改曰顯明逍遙慕容熙造逍遙宮高閭燕志九華鄴縣銅雀臺北石虎建宮以三三為位謂之九華宮梁沈約詩照耀三雀臺徘徊九華陰圖經十宮十宮在江都縣北五里長阜苑內依林傍澗因高跨阜隨地形置焉並隋煬帝立也曰歸雁宮回流宮九里宮松林宮楓林宮大雷宮小雷宮春草宮九華宮光汾宮是曰十宮十道志壽春圖經大明上都大明宮本永安宮貞觀九年改曰大明宮以備太上皇清暑百官獻資以助役高宗厭西內湫濕龍朔二年始大興葺改曰蓬萊宮咸亨元年改曰含元宮地理志大明宮高宗命司農少卿梁孝仁制造北據高原南望爽磑每天晴日朗南望終南山如指掌京城坊市街陌俯視如在檻內長安志元象著明帝坐維三皇唐設位俯察仰參翼室正中游宮次南北起含元其容耽耽總而言之如山之壽則曰蓬萊如日之升則曰大明李華含元殿賦太和長安縣南太和谷有太和宮武德八年置貞觀二十一年公卿請修太和廢宮可以清暑詔遣將作大匠閻立本毀壞順陽王第取林瓦以建之包山為苑改為翠微宮地志會要玉華貞觀二十一年建玉華宮於宜君縣之鳳凰閣舊紀即潤疏隍憑巖建宇土無文繢木不雕鎪矯鋪首以荊扉變綺窗於甕牖詔徐賢妃疏諫曰為政之本貴在無為土木之功不可兼遂北闕初建南營翠微曾未逾時玉華創制雖復因山藉水非無架築之勞損之又損頗有工力之費終以茅茨示約猶興木石之煩假使和雇取人不無煩擾之弊故有道之君以逸逸人無道之君以樂樂身舊傳二十一年正月玉華宮李木連理隔澗合枝會要長春大業十三年高祖起義兵次長春宮紀視河外之離宮信寰中之特美飛重樓之沓秀繚長垣而層趾長者仁壽之符春者發生之所長春賦九成貞觀六年孟夏皇帝避暑九成之宮此則隋之仁壽宮也冠山抗殿絶壑為池跨水架楹分巖竦闕高閣周建長廊四起漢之甘泉不能尚也十六日上及中宮歷覽臺觀閒步西城俯察厥土微覺有潤因而以杖導之有泉隨而涌出乃承以石檻引為一渠其清若鏡味甘如醴魏徵銘扃牖六合奔走八神梯霄架極考遺基於汶上稽故典於淹中陽靈開避暑之宮景福制追涼之殿洞龍對霤鐵鳳連甍王勃頌馬周上疏曰明勑以二月幸九成宮臣竊惟太上皇春秋已高陛下宜朝夕視膳而晨昏起居今所幸宮去京三百餘里鑾輿動軔嚴蹕經旬非可以旦暮至也太上皇情或思感而欲即見陛下者將何以赴之且車駕今行本為避暑然則太上皇尚留熱所而陛下自逐涼處溫凊之道臣竊未安然勑書既出業已成就願示速返之期以開衆惑舊傳上陽高帝時初造蓬萊上陽合璧等宮倉庫漸虛張文瓘因進諫曰人力不可不惜百姓不可不養養之逸則富以康使之勞則怨以叛秦皇漢武廣事四夷多造宮室使土崩瓦鮮戶口減半臣聞制化於未亂保邦於未危人罔常懷懷於有仁臣願稍安撫之無使生怨舊傳上陽宮在皇城西南東苑苑東垂南臨洛水西距穀水上元中韋機充使所造列岸修廊連亘掘地得銅器似盆而淺中有隱起雙鯉之狀魚間有四篆字曰長宜子孫時人以為李氏再興之符高宗末常居此宮以聽政也東京記上陽別宮丹粉多狀霄倚霞連屹屹言言翼太和而聳觀側賓曜而疏軒李庾東都賦沓雲宇而承天擎露蓋而洗日賈登上陽宮賦紫桂儀鳳四年造紫桂宮於澠池縣西是年帝入洛乃移御洛北陰殿尚書左僕射劉仁軌謂侍御史狄仁傑曰古之陂池臺榭皆在深宮重城之內不欲外人見之恐傷百姓之心也韋弘機之作列岸修廊在於城堞之外萬方朝謁無不覿之此豈致君堯舜之意哉弘機聞之曰天下有道百司各奉職輔弼之臣則思獻替之事府藏之臣行詔守官而已吾不敢越分也間府調露二年改曰避暑宮永淳元年改曰芳桂宮地理志新書以弘機事附上陽宮三陽宮武三思以則天厭居深宮又欲與張易之昌宗等扈從馳騁以美其權乃請創造三陽宮於嵩高山興泰宮於萬壽山請則天每歲臨幸前後工役甚重百姓怨之舊傳久視元年則天幸三陽宮自夏涉秋不時還都張說上疏諫曰三陽宮去洛城一百六十里有伊水之隔崿坂之峻過夏涉秋水潦方積道壞山險不通轉運奈何去宗廟之上都安山谷之僻處是猶倒持劍戟示人鐏柄臣竊為陛下不取說傳舊事本自明白新書乃為艱澀之詞云后逭暑三陽宮故知震雷不暇掩聰不獨札闥洪休之誚矣夫逭暑三陽已不成語而孔帖復云后造逭暑宮抑又誤已華清貞觀十八年詔閻立德建溫泉宮太宗臨幸製碑咸亨三年名溫泉宮十道志房琯天寶五年為給事中時元宗有逸志數巡幸廣溫泉為華清宮環宮置百司區舍以琯資機算詔總經度驪山疏巖剔藪以為天子游觀本傳楊妃每十月帝幸華清宮五宅車騎皆從家別為隊隊一色俄五家隊合爛若萬花川谷成錦繡遺鈿墮舄瑟瑟璣琲狼藉於道香聞數十里本傳望春西京禁苑內有望春宮在高原之上東臨灞滻今上曾登北亭賦春臺詠朝士奉和凡數百西京記代宗時姚南仲疏曰王者必據高明燭幽隱先皇所以因龍首而建望春也本傳青門之左層谷嶙峋標上苑而獨出儼復道而明望南山之翠色盈前渭水之素光在下李景遜賦魚藻順宗為皇太子後侍宴魚藻宮張水嬉綵艦宮人為擢歌衆樂間發德宗歡甚顧太子曰今日何如太子誦詩好樂無荒以為對順紀元和十五年八月壬辰幸魚藻宮發神策軍二千人浚魚藻池九月辛丑大合樂於魚藻宮觀競渡穆舊紀漢有魚藻宮西京雜記玉清南漢劉荿遣巨艦指揮使暨彥贇以兵入海掠商人金帛作離宮游獵故時劉氏有南宮大明昌華甘泉玩華秀華玉清太微諸宮凡數百不可悉紀五代史紫宮閌閬閬其廖廓兮似紫宮之崢巆師古曰紫宮天帝之宮也甘泉賦體象乎天地經緯乎陰陽據坤靈之正位放太紫之圓方東都賦煥若列宿紫宮是環上天宮紫微宮北極天一太一鉤陳後宮也樂汁圖徵王者師天地體天而行是以明堂之制內有太室象紫微宮南出明堂象太微七略紫之言此也宮之言中也言天神圖法陰陽開閉皆在此中也春秋元命苞紫微太帝室太一之精也春秋合誠圖中宮天極星環之匡衛十二星藩臣皆曰紫宮也漢書青丘山上有紫宮天真仙女多游於此十洲記琉璃方丈洲有金玉琉璃之宮三天司命所治之處十異天地東方有宮青石為牆高三仞左右闕高百丈畫以五色門有銀榜以青石碧鏤題曰天地長男之宮西方有宮白石為牆五色黃門有金榜而銀鏤題曰天地少女之宮西南方有宮以金為牆門有金榜以銀鏤題曰天皇之宮南方有宮以赤石為牆赤銅為門有銀榜題曰天地中女之宮北方有宮以黑石為牆題曰天地中男之宮東南有宮以黃石為牆以黃碧鏤題曰天地少男之宮西南有宮以黃銅為牆題曰地皇之宮神異經珠宮魚鱗屋兮龍堂紫貝闕兮珠宮楚辭鈴絛無響閉珠宮鄭畋請序行宮自襄國至鄴二百里中四十里輒立一宮宮有一夫人侍婢數十黃門宿衛石虎下輦即止凡虎所造內外大小殿臺觀行宮四十四所鄴中記汾陽大業十六年自江都還洛陽勑於汾州北臨汾水起汾陽宮即管涔山汾河源所出之處當盛暑之時臨河盥漱即涼風凜然如八九月其地多雨經夏罕有晴日一日之中倏忽而雨倏忽而晴晴雨未曾經日雖高嶺千仞嶺上居人掘地深二三尺即得清泉用之隋圖經三宮廬山有三宮上宮在懸崖之表人所不及次宮在山岩下兩邊有陰陽溝有石羊馬夾道相對下宮在彭蠡湖際郡國志五宮大秦國城中有五宮相去各十里宮室皆以水晶為柱食器亦然魏略秦有蘄年宮信宮梁山宮並始皇所居史記漢有沛宮林光宮龍泉宮交門宮萬歲宮池陽宮蒲陶宮竹宮昭臺宮黃山宮太一宮思子宮漢書夜光宮棠梨宮七里宮增城宮修池宮扶荔宮長定宮回中宮黃圖鼎湖宮谷口宮望仙宮通天宮漢武故事長安有鼓簧宮承光宮延壽宮祈年宮長平宮漢宮闕名後漢有南宮北宮胡桃宮東觀漢記魏有鄴宮魏略此諸宮皆範金合玉而為之初學記首山漢武元封元年封禪後夢高祖坐明堂朝群臣於是祀高祖於明堂以配天還作首山宮以為高靈館黃圖壽宮北宮有神仙宮壽宮張羽旗設供具以禮神君神君來則肅然風生帷帳皆動上七業七業宮大霞宮太素宮琅華宮滄浪宮丹臺新録逃夏宮今太守舍者春申君所造後壁屋以為逃夏宮越絶書宵遊宮漢成帝好微行於太液池傍起宵遊宮好夕出遊造飛行殿方一丈如今之輦選羽林之士負之以趨帝於輦上覺其行快疾聞其中若風雷之聲言其行疾也名曰雲雷宮拾遺記殿大堂也蒼頡篇殿堂之高大者說文漢書黃霸令郡國上計吏有舉孝子弟弟貞婦者為一輩先上殿師古曰丞相所坐屋也古者屋之高嚴通呼為殿不必宮中也本傳殿共也取衆屋擁從如軍之殿蘇氏演義稱殿商周以前其名不載商子定分篇云臣侍殿上兵陳殿上兵陳殿下史荊軻傳秦法群臣侍殿上者不得持尺寸之兵諸郎中執兵皆陳殿下始皇紀先作前殿阿房周馳為閣道自殿下直抵南山殿陛凡大殿乃有陛堂則有階無陛也左墄左平平者以文磚相亞次墄左者為陛級也九錫之禮納陛以登謂受此陛以上殿堂之正者為路寢凡殿堂坐位以近尊為上無尊者則東向者以北為上南向者以西為上西向者以南為上北向者以東為上也殿堂之上唯天子居床其餘皆匍匐席前設筵禮天子之殿東西九筵南北七筵摯虞決疑要注天子殿高九尺階九齒各為九級薛綜西京賦注象井殿堂象東井形刻作荷菱菱水物也所以厭火風俗通明光甘泉殿函德殿明光殿皋門殿麒麟殿白虎殿金華殿漢書椒房未央宮有椒房殿長樂宮前殿宣德殿通光殿高明殿三輔宮殿名朱鳥長安有臨華殿神仙殿高明殿朱鳥殿曾城殿宣室殿永明殿鳳皇殿飛雲殿昭陽殿鴛鴦殿釣臺殿合歡殿蕭何曹參韓信並有殿漢宮閣名溫明光武居邯鄲宮晝臥溫明殿耿弇入造床下請間後傳趙王如意之殿也故基在今洺州邯鄲縣內注玉海歷代殿名書此於六國趙下誤承明孝文皇帝躬行節儉其時未有甘泉建章及上林中諸離宮館也未央宮又無高門武臺麒麟鳳凰白虎玉堂金華之殿獨有前殿曲臺漸臺宣室溫室承明耳前翼奉傳宣室未央前殿正室也淮南子曰周武王殺紂於宣室漢取舊名也漢書曰文帝受釐宣室夜半前席賈生問鬼神之事即此也黃圖靈光魯靈光殿者蓋景帝程姬之子恭王餘之所立也初恭王始都下國好治宮室遂因魯僖基兆而營焉遭漢中微盜賊奔突自西京未央建章之殿皆見隳壞而靈光巋然獨存意者豈非神明依憑支持以保漢室者也然其規矩制度上應星宿亦所以永安也宮殿賦孔子廟東南立百步雙石闕即靈光之南闕北百餘步即靈光殿基東西二十丈南北二十丈高丈餘東西廊廡別舍中間方七百餘步闕之東北有浴池池方四十二步池中有釣臺方十步池臺之基岸悉石也遺基尚整故王延壽賦曰周行數里仰不見日者是也水經注溫室溫室殿武帝建冬處之溫暖也黃圖溫室以椒塗壁被之文繡香桂為柱設火齊屏風鴻羽帳規地以罽賓氍毹西京雜記清涼清涼殿夏居之則清涼也亦曰延清室漢書曰清室則中夏含霜即此也曹子建七啓溫房則冬服絺綌清室則中夏含霜此云漢書誤唐中武帝太初元年柏梁殿災於是作建章宮前殿下視未央其西則唐中殿受萬人又有疏圃鳴鑾奇華銅柱函德二十六殿黃圖鴛鴦未央殿東有鴛鴦殿潘嶽關中記紫殿帝又於甘泉宮起紫殿雕文刻鏤黼黻以玉飾之黃圖成帝設雲帳雲幄雲幕於甘泉紫殿世謂三雲殿漢掖庭有雲灮殿九華殿不在簿籍皆繁華窈窕之所棲宿焉西京雜記明光尚書奏事於明光殿省中以丹朱漆地故曰丹墀尚書伏其下奏事黃門侍郎揖疏受事漢官儀金華班伯少受詩於師丹大將軍王鳳薦班伯宜勸學召見宴昵殿拜為中常侍時上方鄉學鄭寬中張禹朝夕入講尚書論語於金華殿中詔伯受焉數年金華之業絶敘傳劉尹與桓玄共聽講禮記桓云時有入心處便覺咫尺玄門劉曰此未關至極自是金華殿之語世說新語八區武帝時後宮八區有招陽飛翔增城合歡蘭林披香鳳凰鴛鴦等殿後有增修安處常寧卜若椒風發越蕙草等殿為十四位黃圖昭陽成帝趙皇后居昭陽殿黃圖後寵少衰而弟絶幸為昭儀居昭陽殿其中庭彤朱而殿上髤漆砌皆銅沓冒黃金塗白玉階壁帶往往為黃金釭函藍田璧明珠翠羽飾之自後宮未嘗有焉前傳昭陽特盛隆於孝成屋不呈材牆不露形西都賦靈波甘泉宮南有昆明池池中有靈波殿皆以桂為殿柱風來自香黃圖陽明嚴遵字子陵建武五年詔召遵設宴陽明殿命宴會暮留宿其夜客星犯天子宿會稽典録德陽明帝欲起北宮尚書僕射鍾離意上書諫出為魯相後起德陽殿殿成百官大會上謂公卿曰鍾離尚書若在不得成此殿東觀漢記正月旦天子幸德陽殿臨軒公卿將相大夫百官各陪朝賀蠻貊胡羌朝貢畢見屬郡計吏皆陛覲庭燎宗室諸劉雜會蔡質漢儀偃師去宮四十三里望朱雀五闕德陽其上鬱律與天運洛陽宮閣疏逮至顯宗既新崇德遂作德陽啓南門之特闈立應門之將將其內則含德章臺天祿宣明溫飭迎春壽安永寧飛閣神行莫我能形東京賦皇穹垂象以示帝王紫微之側靈誕彌光大漢體天承以德陽崇高弘麗包受萬方內總朝貢外供遐荒李尤德陽殿賦銘德陽殿周旋容萬人激洛水於殿下漢官典職九龍明帝青龍三年洛陽崇華殿災丁巳行還洛陽宮命有司復崇華殿改名九龍殿魏志帝復崇華殿時郡國有九龍見故改曰九龍殿高堂隆傳太極魏明帝上法太極於洛陽南宮起太極殿於漢崇德殿之故處水經注魏有太極九龍芙蓉九華承光諸殿洛陽殿簿太極殿周制路寢也秦漢曰前殿今稱太極曰前殿洛宮之號始自魏案史記秦皇改命宮為廟以擬太極魏號正殿為太極蓋採其義而加以太亦猶漢夏門魏加曰大夏耳咸康中散騎侍郎庾闡議求改大為泰蓋謬矣山謙之丹陽記百子景福殿賦遂及百子後宮攸處注韋誕景福殿賦曰美百子之時居嘉休祥之令名毛詩箋云太姒十子衆妾則宜百子殿名蓋取於此文選神龍太初宮中有神龍殿去縣三里左太冲吳都賦云抗神龍之華殿施榮楯而捷獵是也建康宮殿簿赤烏赤烏殿在縣東北五里吳昭明宮內制度上應星宿吳都賦云崇臨海之崔嵬飾赤烏之暐曄是也上謙光張駿霸西河於姑臧起謙光殿畫以五色飾以金玉窮盡珍巧四面各起一殿東方曰宜春青殿南方曰朱陽赤殿西方曰政刑白殿北方曰玄武黑殿各同方色各以時居之晉書清暑烈宗起清暑殿識者曰清暑反語楚聲也為殿以酸楚之聲為號非吉祥也頃烈宗崩桓玄自號楚晉中興書太極孝武太元三年僕射謝安作新宮太極殿缺一梁有梅木流至石頭城下因取用之畫梅花於梁上以表瑞焉因名梁殿歷宋齊後為梁武帝所居金陵覽古孝武帝造太極殿郭璞筮云二百十年此殿為奴所壞後梁武帝毀之捨身為奴晉中興書璞明帝時為王敦所殺已五十餘年誤玉燭宋永初所居唯稱西殿及孝武更造正光玉燭紫極諸殿雕欒綺節珠窗網戶南史玉壽齊東昏出游火燒璿儀曜靈諸殿乃大起芳樂仙華等殿又別為潘淑妃起神仙永壽玉壽三殿皆市飾以金璧其玉壽中作飛仙帳四面繡綺窗間盡畫神仙南史紀樟柱初侯景之平也火焚太極殿梁元議欲營之獨缺一柱至陳永定二年有大樟木大十八圍長四丈五尺流泊陶家後渚監軍鄒子度以聞詔中書令沈衆大府卿蔡儔起太極殿陳書昔晉朝繕造文杏有闕梅梁瑞至畫以摽花自是迄今又獲神物即樟樹殿之某間即某柱是也太極殿銘麟趾宗懍名重南土江陵平與王褒等入關明帝初與褒等在麟趾殿刊定群書數蒙宴賜周書武帝開麟趾殿招集學士蕭大圜預焉上觀風隋煬帝北巡宇文愷造觀風行殿上容侍衛者數百人離合為之下施輪軸推移倏忽有若神功戎狄見之莫不驚駭本傳中華武德九年四月甘露降於中華殿之桐木泫如冰雪以示群臣會要永徽初高宗召宰臣弘文館學士坐中華殿問何修而王何若而伯令狐德棻曰王任德霸任刑舊傳丹霄太宗宴群臣於丹霄殿命魏公圍棊賜尚乘馬并金裝鞍轡勒魏公諫録飛霜貞觀二十年七月宴五品已上於飛霜殿絲竹遞奏群臣上壽賜綾錦殿在元武門北因地形高敞層閣三成引水為潔淥池以滌炎暑實録兩儀貞觀十六年帝謂侍臣曰因覽劉聰傳為劉后將起䳨儀殿陳元達諫朕於藍田市木將別為一殿取制兩儀仍建重閣遠想聰事而止舊唐中宗宴兩儀殿令胡人唱合笙武平一上書諫曰兩儀承慶殿者陛下受朝聽訟之所比大饗群臣不宜以倡優媟狎上瑤池太宗嘗御瑤池殿顧謂侍臣曰西蕃通來幾時魏鄭公諫録相思貞觀十六年薛延陀真珠可汗請使其姪實利設納幣及獻饌上御相思殿大饗群臣設十部樂通鑑紫微貞觀二十一年七月帝遊幸敕奉御王孝積於顯道門內起紫微殿十三間文甓重基高敞宏壯帝見之甚悅實録紫宸龍朔三年四月移仗就蓬萊宮始御紫宸殿聽政百寮奉賀會要麟德明皇天性順睦雖讒說無以搖時有鶺鴒千數集麟德殿廷木翔棲浹日魏光乘作頌以為天子友悌之祥帝喜亦為作頌寧王憲傳金鑾西南曰長安殿長安北曰仙居殿仙居西北曰麟德殿此殿三面故以三殿名大福殿在三殿北拾翠殿在大福殿東南兩京記金鑾李白天寶中賀知章言於玄宗召見金鑾殿論當世事奏頌一篇賜食親為調羹本傳大明宮紫宸殿北曰蓬萊殿西龍首山支隴起平地上有殿名金鑾殿殿旁坡名金鑾坡兩京記殿因金鑾坡以為名與翰林院相接五代會要含元大明宮龍朔三年移伏就蓬萊宮新作含元殿會要含元路寢大朝會之所御也五行志含元殿左右立栖鳳翔鑾二閣有龍尾出於閣前殿門去南門五里元會來朝者仰瞻玉座如在霄漢康駢劇談録九龍馬希範作九龍殿以八龍繞柱自言身一龍也五代史太和玉清宮中有寥陽殿太和殿登真隱訣天中記卷十三
