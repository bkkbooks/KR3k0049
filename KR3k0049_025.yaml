body:
  text: 德譽得二在理則昧造形則悟顏子之分也失之於幾故有不善得之於二不遠而復韓易注踐得二之庶幾王儉序人之英立德蹈禮謂之英子産季札人之英也袁子正書冰清原憲玄默冰清玉粹志逸九霄身安陋術孫綽原憲讚體二孟軻荀卿體二希聖從容正道不能維其末運命論玉瑩皎皎屈原玉瑩冰鮮舒采翡林摛光虬川謝萬八賢頌照鄰張子房道亞黃中照鄰殆庶風雲交感蔚為帝師夷項定漢大極橫流傳亮伊顏之殆庶辨命論張良慮若源泉深不可測黃石公記序標的晉簡文云漢世人物當推子房為標的神明之功玄勝之要莫之與二接俗而不虧其道應世而事不嬰玄識遠奧超然獨邁盛弘之荊州記嶽峙淵清李膺嶽峙淵清峻貌貴重華夏稱曰潁川李府君頵頵如玉山汝南陳仲舉軒軒如千里馬南陽朱公叔飂飂如行松柏之下李家傳龍門李元禮風格秀整高自標持欲以天下名教是非為己任後進之士有升其堂者皆以為登龍門世說王衍善玄言惟談老莊為事理有所不安即改更朝野翕然謂一世龍門晉書任昉為中丞簪裾輻輳預其宴者殷藝到溉劉苞劉孺劉孝綽及陸倕而已號曰龍門之遊雖公貴子孫不得與也梁書袁昂在朝謇諤號曰俊臣雅有倫鑒遊處不雜入其門者號登龍門上謖謖李元禮謖謖如徑松下風世說瀏瀏京師號陳仲舉昂昂如千里驥周孟玉瀏瀏如松下風青州先賢傳懸榻陳仲舉言為士則行為世範登車攬轡有澄清天下之志為豫章太守至便世說以禮請徐孺子署功曹稚不就之既謁而退蕃在郡不接賓客唯稚來特設一榻去則縣之後書蕃為樂安太守郡人周璆高潔之士前後郡守招命莫肯至唯蕃能致焉字而不名特為置一榻去則縣之璆字孟玉臨濟人有美名上宋郭石雲考從容謂宋子俊曰吾與子不及郭生辟諸由賜不敢望回也今卿言稱宋郭此河西之人疑卜商於夫子者也若遇曾參之詰何辭以對乎子俊曰魯人謂仲尼東家丘蕩蕩體大民不能名子所明也陳子禽以子貢賢於仲尼淺見之言故然有定耶吾嘗與周深甫論林宗之德也清高明雅英達瓌瑋學問淵深妙有俊才然其愷悌玄淡格量高俊含弘博恕忠粹篤誠非今之人三代士也漢元以來未見其匹也周甫深以為然此乃宋仲之師表也子何言哉泰身長八尺儀貌魁岸善談論聲音如鐘宵行幽暗必正其衣服家有書五千卷率多圖緯星曆之事與其等類行晨則在前暮則在後所歷亭傳不處正堂恆止逆旅之下先加糞除而後處焉及宿止冬讓溫厚夏讓清涼如鄉里或有爾者父母嘆曰欲作郭林宗邪漢記松在霄漢郭林宗來遊京師當還鄉里送車千餘乘李膺亦在焉衆人皆詣大槐客舍而別獨膺與林宗共載乘薄圍車上大槐坂觀者數百人引領望之眇若喬松之在霄漢啇藝小說碑頌無愧郭林宗李元禮一見稱之曰吾見士多矣無如林宗者也及卒同志者乃共刻石立碑蔡伯喈為文既而謂盧植曰吾為碑銘多矣未嘗不有慚容唯郭有道碑頌無愧色耳續漢書先生器量弘深姿度廣大浩浩焉汪汪焉奧乎不可測已若乃砥節礪行直道正辭于時纓緌之徒紳珮之士望形表而影附聆嘉聲而響和者猶百川之歸巨海鱗介之宗龜龍也伯喈碑罔然若失黃憲字叔度汝南慎陽人也同郡戴良才高倨傲而見憲未嘗不正容及歸罔然若有失也其母問曰汝復從牛醫兒來邪對曰良不見叔度不自以為不及既覩其人則瞻之在前忽焉在後固難得而測矣上天授黃憲不矜名以詭時不抗行以矯俗窺其門者莫敢踐其庭觀其流者不能測其深論者咸曰顏子復生乎漢代矣而其祖族出自孤鄙父為牛醫少無度教而後能傑然秀出可謂天授者也汝南先賢傳道周黃憲言論風旨無所傳聞然士君子見之者靡不服深遠去玼吝將以道周性全無德而稱乎范玄平以為憲隤然其處順淵乎其似道淺深莫臻其分清濁未議其方若及門於孔氏其殆庶乎後書蹈矩黃憲動則蹈規矩言則發德音海內先賢傳懷慕戴良字叔鸞鳳才磊硌英聲遠播少者懷之長者慕之鄉里縉紳下至黎庶莫敢有忿爭之家海內先賢行狀磨鏡徐孺子徵聘未嘗出門赴喪不遠萬里常事江夏黃公薨往會其葬家貧無以自供齎磨鏡具自隨每至所在賃磨取資然後得前既至設祭哭畢而返陳仲舉為豫章太守召之則到饋之則受之但不服事以成其節上郭林宗有母憂稚往弔之置生芻一束於廬前而去衆怪不知其故林宗曰此必南州高士徐孺子也詩不云乎生芻一束其人如玉吾無德以堪之後書綱鑑大矣成謂稚置生芻于黃瓊墓前殊誤觀者立亭徐稚亡海內群英論其清風高致乃比夷齊或參許由夏侯豫章追美名德立亭於稚墓首號曰思賢亭別傳畫像東國宗敬蔡雍不言名咸稱蔡君兗州陳留並圖畫形像而頌之曰文同三閭孝齊參騫伯喈別傳王允欲殺蔡雍大尉馬日磾馳謂允曰伯喈曠世逸才多識漢事當續成後史為一代大典且忠孝素著而所坐無名誅之無乃失人望乎允不從日磾退而告人曰王公其不長世乎善人國之紀也制作國之典也滅紀廢典其能久乎雍遂死朝中縉紳諸儒莫不流涕北海鄭玄聞而歎曰漢世之事誰與正之兗州陳留間皆畫像而頌焉後漢布衣雄世鄭玄在徐州孔文舉時為北海相欲其返郡敦請懇惻使人繼踵及歸融告僚屬昔周人尊師謂之尚父今可咸曰鄭君不得稱名也袁紹一見玄嘆曰吾本謂鄭君東州名儒今乃是天下長者夫以布衣雄世斯豈徒然哉殷藝小說君子之望紹延徵北海鄭玄而不禮趙融聞之曰賢人者君子之望也不禮賢是失君子之望也九州春秋屬目客言於何進曰孔文舉於時英雄特傑譬諸物類猶衆星之有北辰百穀之有黍稷天下莫不屬目也家傳三君陳實字仲弓為太邱長其卒也何進遣使弔祭縉紳儒林論德謀跡諡曰文範先生子紀諶齊德同行父子並著高名時號三君每宰府辟召嘗同時旌命羔鴈成群豫州百城皆圖畫三君之形像焉後書行狀碑霜玉比質孔文舉高志真情其足以動義概而忤雄心豈有任意委屈可以沒其生哉懍懍焉皓皓焉其與琨玉秋霜比質可也後漢瘠土所出弭生字仲叔其父賤故張伯英與李幼才書弭仲叔高德美名命世之才也非弭氏小族所當有新豐瘠土所當出也三輔夬録汝南管鑰許劭字子將處弟也山峙淵停行應規表邵陵謝子微高才遠識見劭十歲時歎曰此乃希世之偉人也海內先賢傳劭幼時子微便云此賢當持汝南管鑰別傳金聲玉色王基薦管寧曰應二儀之中和總九德之純懿含章素質冰潔淵清中平之際王綱弛頓遂避時難乘桴入海羇旅遼東三十餘年在乾之始匿景藏光經危履險不易其節金聲玉色久而彌彰德行卓絶海內無偶魏志寧貌甚恭言甚謙觀其行邈然若不可及即之熙熙然甚柔而溫其亡也天下知與不知聞之無不嗟嘆傳子時棟堂堂孔明基宇宏邈初九龍精雅志彌確茍非命世孰掃氛雺釋褐中林鬱為時棟袁宏贊神祇人精英哉吾子獨含天靈豈神之祇豈人之精神物應機大器無方通盈靡滯大德不常昔在顛夭有名無迹孰若吾儕良籌妙畫臧文既沒以言見稱又未若子言行並徵夷吾反玷樂毅不終奚比於爾明哲守沖臨終受寄讓過許由負扆蒞事民言不流刑中於鄭教美于魯蜀民知恥河渭安堵匪皋則伊寧彼管晏豈徒聖宣慷慨屢歎蜀記李興文詔策曰惟君將建殊功于季漢參伊周之巨勳志彭羕與諸葛書云足下當世伊呂也宜善與主公計事濟其大猷天明地察復何言哉上伊呂爭儔孔明包文武之德文以寧內武以折衝其行軍也路不拾遺毫毛不犯雅規宏闊已有功則讓于下下有闕則躬自咎見善則遷納諫則改故聲烈震于遐邇也殆將與伊呂爭儔豈徒樂毅為伍哉張輔樂葛優劣論坐起嘆述司馬懿與諸葛書曰黃公衡快士也每坐起嘆述足下不去口實蜀記名士武侯與司馬宣王在渭濱將戰宣王戎服蒞事使人密覘武侯乃乘素輿葛巾持白羽扇指麾三軍隨其進止宣王聞而嘆曰可謂名士語林不見其比桓宣武溫征蜀猶見武侯時小史年百餘歲桓問諸葛丞相今誰與比意頗欲自矜答云葛公在時亦不覺異自葛公歿後不見其比雜記一時之異諸葛亮誠一時之異也治國有分御軍有法積功興業事得其機入無遺刃出有餘糧知蜀本富而危故持重以鎮之傳子半英雄傅巽有知人之鑑在房州目龐統為半英雄後統附劉備見待次諸葛亮如其言殷藝小說仲父孫策臨亡以弟權託張昭謂昭曰若仲謀不任事者君便自取之正復不克捷緩步西歸亦無所慮吳歷吳中稱昭為仲父如此其人信一時之良幹恨其不與嵩嶽等資而乃播植於會稽典略今止傳照烈記武侯事英偉張昭張紘並與孫策參謀呂布襲徐州稱牧不欲令紘與策從事追舉茂才移書發遣紘紘心惡布恥為之屈策亦重惜紘欲以自輔答記不遣曰海産明珠所在為寶楚雖有才晉實用之英偉君子所遊見珍何必本州哉吳志張公東部初權於群臣多呼其字惟呼張昭曰張公紘曰東部所以重二人也江表傳家寶示人孫策命虞翻為功曹待以交友之禮身詣翻第志策書謂翻曰今日之事當與卿共之勿謂孫策作郡吏相待也江表傳策討山越翻善用矛請在前行得平地勸策乘馬策曰卿無馬奈何答曰翻能步行日可三百里自征討以來吏卒無及翻者明府試躍馬翻能疏步隨之吳書策曰卿博學洽聞前欲令卿詣許交見朝士以折中國之語兒卿不願行便使子綱恐子綱不能結兒輩舌也翻曰翻是明府家寶而以示人人倘留之則去明府良佐故前不行耳策笑曰然江表傳美寶雕摩虞翻聞曹公辟曰盜賊欲以餘財污良家耶遂拒不受吳書翻與孔融書并示以所著易注融答書曰聞延陵之理樂觀吾子之治易乃知東南之美者非徒會稽之竹箭也張紘又與融書曰虞仲翔前頗為論者所侵美寶為質雕摩益光不足以損志菰蘆奇才張溫使蜀諸葛見而嘆曰江東菰蘆中生此奇才金陵志卓躒駱統表曰張溫弘雅之素英秀之德文章之采論議之辨卓躒冠群煒煜曜世世人未有及之者也於是務勢者妒其寵爭名者嫉其才玄默者非其談瑕釁者諱其議吳志邴鄭邴原知世將亂避地遼東公孫度厚禮之中國既寧因夜還鄉里數日度乃覺吏欲追之度曰邴君所謂雲中白鶴非鶉鷃之網所能羅也遂免危難自反國土原於是講述禮樂吟詠詩書門徒數百服道數十時鄭玄以博學洽聞注解典籍故儒雅之士集焉原亦以高遠清白頤志淡泊口無擇言身無擇行故英偉之士向焉是時海內清議云青州有邴鄭之學別傳龍翰鳳翼崔琰為東曹掾記讓曰徵士邴原議郎張範所謂龍翰鳳翼之重寶魏志秋實邢顒字子昂田疇曰顒民之先覺也時人稱之曰德行堂堂邢子昂後為平原侯植家丞以方正不合庶子劉禎諫植曰邢顒北土之彥少秉高節言少理多真雅士也無採庶子之春華忘家丞之秋實魏志蕭映答晉安王書云春華之客登坐右而升堂秋實之賓應虛左而入室方中美範嵇康性含垢藏瑕愛惡不爭於懷喜怒不寄於顏所知王濬沖在襄城面數百未嘗見其疾聲朱顏此亦方中之美範人倫之盛業也別傳送數百里羊公還洛郭奕為野王令羊至界遣人要之郭便自往既見嘆曰羊叔子何必減郭太業復羊許小悉還又歎曰羊叔子去人遠矣羊既去郭送之彌日一舉數百里遂以出境免官復嘆曰羊叔子何必減顏子世說世目殷中軍思緯淹通比羊叔子上祜德高一世才經夷險淵源蒸燭之曜豈喻日月之明也璞玉渾金王戎目山濤如璞玉渾金人皆欽其寶莫知名其器世說裴令公見山巨源如登山臨下幽然深遠上不見喜慍衛玠字叔寶常以人有不及可以情恕非意相干可以理遣故終身不見其喜慍之容晉中興書風恬月朗劉尹云清風朗月輒思玄度世說許掾嘗詣簡文爾夜風恬月朗乃共坐曲室中語襟情之詠偏是許之所長辭寄清婉有逾平日簡文雖契素此遇尤相咨嗟不覺造鄰共義手語達于將旦既而曰玄度才情故未易多有許上輕薄京尹許玄度停都一月劉尹無日不往乃歎曰卿復少時不去我成輕薄京尹上多多許簡文道王懷祖述才既不長於榮利又不淡直以貞率少許便足對人多多許振松籠日謝混與從子靈運齊名時人謂混風韻為高才肅肅如寒風振松康樂凜凜如霜臺籠日宋書宋受禪朗朗卞望之曰叔向朗朗如百間屋世說豐玉荒穀世稱庾文康為豐年玉稚恭為荒年穀庾家論云是文康稱公為荒年穀庾長仁為豐年玉上蕭散直上王惠字令明不交遊未嘗有雜事素不與謝靈運相識嘗得交言靈運辨博辭義蜂起惠時然後言時荀伯子在坐退而告人云靈運固自蕭散直上王郎有如萬頃波焉南史霞明日朗宋世諸王義慶最優炙輠不窮霞明日朗懸河無竭雨散煙飛辨正論飄飄凌雲齊衡陽王鈞居身清率言未嘗及時事吳郡張融清抗絶俗雖王公貴人視之傲如也惟雅重鈞謂從兄緒曰衡陽王飄飄有凌雲氣其風情素韻彌足可懷融與之遊不知老之將至南史過江未有張緒字思曼少知名清簡寡欲叔父鏡比之樂廣從叔敷云是我輩人袁粲言於宋明帝曰張緒有正始遺風王儉嘗云緒過江來所未有北士可求之耳不知陳仲弓黃叔度能過之不永明三年轉太子詹事每朝見武帝目送之謂王儉曰緒以位尊我我以德貴緒緒吐納風流聽者皆忘飢疲見者肅然如在宗廟雖終日與居莫能測焉南齊書輕薄祭酒會稽孔廣字淹源美容止善吐論王儉張緒咸美之儉嘗云廣來使人廢簿領匠不須來來則莫聽去緒數巾車詣之每嘆云孔廣使吾成輕薄祭酒南史育德沛國劉瓛瓛弟璡並一時秀士也瓛則關西孔子通涉六經循循善誘服膺儒行璡則志烈秋霜心貞崑玉亭亭高竦不離風塵皆育德於衡門並馳聲於天地而官有徵於侍郎位不登於執戟劉孝標辨命論飾館拂席王肅字恭懿導之後也太和十七年奔魏高祖聞肅至虛襟待之引見問故肅韻音雅暢辨而有禮高祖嗟納之促席移景不覺坐之疲淹也後為豫州刺史尋徵入朝高祖手詔曰不見君子中心如醉一日三歲我勞如何飾館華林拂席相待卿欲以何日發汝墳也故復此勑魏書明鏡懷冰何點嘗稱陸慧曉心如明鏡遇形觸物無不朗然王思遠常如懷冰暑月亦有霜氣當時以為實録南史儉稷寒纊劉孝標稱劉訏超超如半天朱霞劉敲矯矯如雲中白鶴皆儉歲之梁稷寒年之纖纊上標奇庾曼倩字世華詵子也早有令譽梁元帝在荊州辟為主簿每出嘗目送之謂劉之遴曰荊南信多才子雖美歸田鳳清屬桓階賞德標奇未過此子梁書具美柳惲字文暢立性真素以貴公子早有令名與陳郡謝瀹鄰居深見友愛瀹曰宅南柳郎可為儀表梁武帝謂周捨曰吾聞君子不可求備至於柳惲可謂具美分其才藝足了十人南史江漢英靈柳遐謝舉與語顧人曰江漢英靈見於此矣天上人李德林少以才學見知為齊中書侍郎於賓館受書陳使江總目送之曰此即河朔之英靈也周武帝於雲陽宮作鮮卑語謂群臣云我往日惟聞李德林名及見其與齊朝作詔書移檄我正謂其是天上人豈言今日得其驅使為我作文書極為大異海內共推虞世基字茂世荔子也幼沈靜喜怒不形于色博學有高才兼善草隸陳孔煥見而嘆曰南金之貴屬在斯文徐陵聞其名召之世基不往后因公會陵一見而奇之顧謂朝士曰當今潘陸也隋祕書監柳顧言博學有才罕所推謝與世基相見嘆曰海內當共推此人非吾儕所及也陳書關西孔子薛道衡字玄卿六歲而孤專精好學年十歲講左傳見子産相鄭之功作國僑贊頗有詞致見者奇之其後才名益著吏部尚書辛術與語嘆曰鄭公業不亡矣河東裴瓛祠之曰鼎遷河朔吾謂關西孔子罕遇其人今復遇薛公矣北史摸索可識許敬宗性輕見人多忘或謂其聰乃曰卿自難識若遇曹劉沈謝暗中摸索著亦自可識國史纂異遺珠狄仁傑調汴州參軍為吏誣訴黜陟使閻立本召訊特異其才謝曰仲尼稱觀過知仁君可謂海曲之明珠南東之遺寶特薦之遷并州法曹王拜鄭述祖女為趙郡王睿妃述祖常坐受王拜命坐王乃坐妃薨王更娶鄭道蔭女王坐受道蔭拜王命坐乃敢坐王曰鄭尚書風德又貴重夙舊汝不得比之北齊中林蕙蘭吳淑字正儀幼有俊才時韓熙載潘佑皆以文章著名江左一見淑深加器重曰吳正儀中林之蕙蘭也八歲蒲衣子者舜時賢人年八歲而舜師之遂讓以天下蒲衣子不受而去莫知所終皇甫士安高士傳十二荀仲豫稱禹十二為司空傳子五歲佐禹管仲妾婧云睪子生五歲而佐禹列女辨通傳湯契後秦益後益即皋陶子也仲長統昌言睪子贊禹甘生相秦李雍李思訓碑陶子者皋陶之子伯益也曹大家五稱五窮晉平公使叔譽于周見太子晉與之言五稱而五窮周書蒲衣生八年舜讓以天下周王太子晉生八年而服師曠尸子十五相荊荊公子年十五而相荊說苑昔者荊子總角而攝相事實賴二十五老臻乎惠康抱朴任能篇十八宰阿子奇年十八為阿邑宰出倉廩以振貧乏邑內大化郎顗薦李固云昔顏子十八天下歸仁子奇稚齒化阿有聲說苑咫角齊有閭邱卭年十八道遮宣王願仕宣王曰子年尚稚未有咫角驂駒而能服重致遠者也對曰不然昔者顓項行年十二而治天下秦項橐七歲為聖人師由此觀之卭不肖耳年不稚矣宣王載以俱歸新序項橐文信侯欲使張唐相燕弗肯行少庶子甘羅請行之文信侯叱去甘羅曰夫項橐生七歲為孔子師今臣生十二歲于茲矣君其試臣奚以遽言叱乃見張卿說而行之甘羅還報秦乃封羅以為上卿戰國策董仲舒策云此無異于達巷黨人不學而自知孟康云項橐也漢書橐魯人十歲而亡時人尸而祝之號小兒神圖經飛兔齊之辨士田巴辨於徂邱議於稷下毀五帝罪三王訾五伯離堅白合同異一日而服千人有徐劫者其弟子也魯連謂徐劫曰臣願得當田子使之必不復談可乎徐劫言之巴曰走弟子年十二然千里駒也願得代議於前可乎田巴曰可魯連得見曰今楚軍南陽趙伐高唐燕人十萬在聊國亡在旦暮先生將奈何田巴曰無奈何魯連曰危不能為安亡不能為存無貴學士矣今臣將罷南陽之師還高唐之兵所貴談說此之謂也如先生之言有似梟鳴出聲人皆惡之願先生勿復談也田巴曰謹受教明日見徐劫曰先生之駒乃飛兔騕裊也豈特千里哉田巴於是杜口易業終身不談也魯連子辨獄景帝時廷尉上囚防年繼母陳氏殺防年父防年因殺陳依律殺母以大逆論帝疑之武帝時年十二為太子在傍帝遂問之太子答凡夫繼母如母明不及母緣父之故比之於母今繼母無狀手殺其父則下手之時母恩絶矣宜與殺人者同不宜以大逆論從之漢武故事武帝事史策不著僅見於通典刑法雜議困學紀聞辨牘光武時天下墾土多不以實詔下州郡檢覆其事帝見陳留吏牘上書云潁川弘農可問河南南陽不可問帝詰吏祇言于長壽街得之時明帝為東海公年十二在幄後言曰吏受郡勑欲以墾田相妨耳帝曰何故言河南南陽不可問對曰河南帝城多近臣南陽帝鄉多近親田宅踰制不可為准詰問如明帝對後漢書童烏育而不苗者吾家之童烏乎九齡而與我玄文楊問神楊信字子烏雄第二子幼而聰慧雄草玄經不會子烏令作九數而得之雄又擬易羝羊觸藩彌日不就子烏曰大人何不曰荷戟入榛劉向別傳項子有含穗之歎楊烏有夙折之衷抱朴自敘不乏季子吳祐字季英陳留長垣人父恢為河南太守祐年十歲恢欲殺青簡以寫經書祐諫曰今大丈夫踰越五嶺遠在海濱其俗舊多珍怪此書若成則載之兼兩昔馬援以薏苡興謗王陽以衣囊邀名嫌疑之間誠先賢所慎也恢乃止撫其首曰吳氏世不乏季子矣東觀漢記黃童黃香字文強江夏安陸人年九歲失母思慕憔悴殆不免喪鄉人稱其至孝年十二博覽傳記京師號曰天下無雙江夏黃童京師貴香慕其聲名更饋衣物上御覽天下作日下和親楊厚字仲桓統子也厚母初與前妻子博不相安厚年九歲思令和親乃託疾不言不食母知其音懼然改意恩養加篤後漢異才桓驎年十三四在伯父太尉焉坐焉告客曰此吾弟子有異才殊能作詩賦客乃為詩曰甘羅十二楊烏九齡昔有二子今則桓生驎應聲答曰邈矣甘羅超等絶群伊彼楊烏命世稱賢嗟豫蠢弱殊才偉年仰慚二子俯愧過言文士傳庭樹宅法徐稚字孺子豫章南昌人與太原郭林宗游學同稚還家林宗庭有一樹欲伐去之稚乃問其故林宗曰為宅之法正方如口口中有木困字不祥也是以去之稚難林宗曰為宅之法正方如口口中有人囚字豈可居之林宗默然無對稚時十一歲為郎不就黃琬字子琰早而辨慧年七歲桓帝建和初為祖瓊對日食狀瓊深奇愛之後瓊為司徒琬以公孫拜童子郎辭病不就知名京師時司空盛允有疾瓊遣琬候問會江夏上蠻賊事副府允發書視畢微戲琬曰江夏大邦而蠻多士少琬奉手對曰蠻夷猾夏責在司空因拂衣辭去允甚奇之瓊香子也後書了了孔融字文舉桓帝時河南尹李膺以簡重自居不妄接士賓客外至自非當世名人及與通家皆不得見融年十餘歲欲觀其為人乃造膺門語門者曰我是李君通家子弟門者言之膺請融問曰高明祖父嘗與僕有舊恩乎融曰然先君孔子與君先人李老君同德比義而相師友則融與公纍代通家也衆坐莫不歎息僉曰異童子也膺引坐謂曰卿欲食乎融曰須食膺曰教卿為客之禮但讓不須謝主融曰不然教公為主之禮但置食不須問客膺慚乃歎曰吾乃將死不見卿富貴也融曰公殊未死膺問何故答曰鳥之將死其鳴也哀人之將死其言也善向來公所言未有善也是故知未死膺奇之時大夫陳煒後至坐中以告煒煒曰夫人小時了了大未必奇融曰想君小時必當了了煒大踧踖舉坐大笑不已後書世說語林恨年已過崔琰字季圭清河元方為冀州刺史舉秀才琰時九歲入其選元方曰不道卿是金枝玉葉但卿年幼未合此舉琰曰昔項橐七歲為孔子師今之自恨年已過矣元方曰卿與崔杼近遠琰曰如公與陳恆相似追與客書虞翻字仲翔會稽餘姚人也少好學有高氣年十二客有候其兄者不過翻翻追與書曰僕聞虎魄不取腐芥磁石不受曲針過而不存不亦宜乎客得書奇之由是見稱吳書賦物張惇子純與張儼及朱桓子異俱童少往見驃騎將軍朱據據聞三人才名欲試之告曰老鄙相聞飢渴甚矣夫騕裊以迅驟為功鷹隼以輕疾為妙其為吾各賦一物然後乃坐儼乃賦犬曰守則有威出則有獲韓盧宋鵲書名竹帛純賦席曰席以冬設簟為夏施揖讓而坐君子攸宜異賦弩曰南嶽之幹鍾山之銅應機命中獲隼高墉三人各隨其目所見而賦之皆成而後坐據大歡悅文士傳當今顏淵陸雲字士龍抗第五子也六歲便能賦詩時人以為項橐楊烏之儔也年十八刺史周俊命為主簿常嘆曰陸士龍當今之顏淵也別傳童齓不群賀循字彥先會稽山陰人吳中書令郡之子操尚高邁童齓不群言行進止必以禮讓建武初為中書令元帝下令曰循言行以禮乃時之望俗之表也晉書會稽賀生體識清遠言行以禮不徒東南之美實為海內之秀世說牽衣入暗愍懷太子少便聰慧武帝甚愛之六七歲時宮中嘗夜失火武帝登樓望之太子牽上衣裾使入暗中上問其故太子對曰暮夜倉卒宜備非常不宜親近火光令照見人主雞碑晉戴逵字安道巧藝畢綜總角時以雞卵汁溲白瓦屑作鄭玄碑又為文而自鐫之詞麗器妙時人莫不驚嘆本傳草翁風必王絢彧長子也小字童烏字長素早慧年五六歲警敏外祖何尚之嘗異焉嘗教讀論語至周監于二代因戲之曰可改耶耶乎文哉絢應聲答曰尊者之名安可為戲寧可道草翁之風必舅論語曰草上之風必偃偃尚之子也談藪南史宋書便可道草翁風必汝有佳兒張鎮字義遠憑之祖也嘗語憑父曰我不如汝憑父未解所以蒼梧曰汝有佳兒憑時年數歲斂手曰阿翁詎宜以子戲父世說重器謝朏字敬沖幼聰慧父莊器之常置左右十歲能屬文莊遊華山賦詩使朏命篇攬筆便就琅琊王景文謂莊曰賢子足稱神童復為後來特達莊撫朏背曰真吾家千金宋孝武時姑孰敕莊攜朏從駕詔為洞井讚於坐奏之帝曰雖小重器也上管寧可及劉瓛篤志好學博通訓義年五歲聞舅孔熙先讀管寧傳欣然欲讀舅更為說之精意聽受曰此可及也神童劉顯幼而聰敏六歲能誦呂相蘇秦賈誼過秦琅邪王思遠吳國張融見而稱賞號曰神童族伯瓛儒學有重名卒無嗣齊武帝詔顯為後時年八歲百不為多任昉字彥升幼而聰敏早稱神悟四歲誦詩數十篇八歲能屬文自製月儀辭義甚美褚淵嘗謂進曰聞卿有令子相為喜之所謂百不為多一不為少一遍能誦到沆字茂瀣五歲時父撝于屏風抄古詩沆請教讀一遍便能成誦一不為少陸瓊字伯玉幼聰慧有思理六歲為五言詩頗有詞彩梁大同末雲公受梁武詔校定碁品到溉朱异以下並集瓊時年八歲於客前覆局由是京師號曰神童异言之武帝有勑召見瓊風神警亮進退詳審帝甚異之十一丁父憂毀瘠有至性從祖襄歎曰此兒必荷門基所謂一不為少人中麒驥徐勉字修仁年六歲屬霖雨家人祈霽率爾為文見稱耆舊及長好學宗人孝嗣見之歎曰此所謂人中之麒驥必致千里兄弟聰敏虞荔字少坡年九歲隨從伯闡侯太常陸倕倕問五經凡有十事荔隨問輒應無有遺失倕甚異之弟寄字次安少聰敏年數歲客有造其父者遇寄於門因嘲之云郎君姓虞必當無智寄應聲答曰文字不辨豈得非愚客大慚入謂其父曰此子非常人文舉之對不是過也陳書戲答姓何妥字棲鳳西山人八歲時遊國子學助教顧良戲之曰汝姓何是荷葉之荷為河水之河妥應聲答曰先生姓顧是眷顧之顧為新故之故北史東阿非虛梁簡文幼而聰睿六歲便能屬文武帝弗之信於前面試帝攬筆立成文武帝嘆曰常以東阿為虛今則信矣南史三世幼敏李德林幼聰敏年數歲誦左思蜀都賦十餘日便度高隆之見而嗟嘆遍告朝士云若假其年必為天下偉器鄴京人士多就宅觀之月餘車馬不絶德林少孤未有字魏收謂之曰識度天才必至公輔吾輒以此字卿本傳李百藥字重規幼而聰敏數歲德林于燈下教以四聲一聞便解七歲能屬文父友齊陸乂馬元熙嘗造父德林宴集有誦徐陵文者云既取成周之禾將刈琅琊之稻坐客並不知其事百藥時侍立進曰傳稱鄅人籍稻杜預注云鄅國在琅琊開陽縣乂等驚喜云此兒神童也談賓録舊唐子安期幼聰辨七歲解屬文初百藥大業末出為桂州司馬行至太湖遇賊將加白刃安期跪泣請代父命賊哀而釋之上聳壑昂霄房玄齡幼聰敏五歲能誦毛詩高孝基謂裴矩曰僕觀人多矣未有如此郎者必成偉器但恨不見其聳壑昂霄耳唐書矯對賈嘉隱七歲以神童召見李績於朝堂戲云吾所倚何樹嘉隱曰松樹李曰此槐也何言松嘉隱曰以公配木何得非松長孫無忌復問吾所倚何樹曰槐樹曰汝不復能矯對耶嘉隱曰何須矯對但取其鬼木耳李曰小兒作獠面何得如此聰明嘉隱曰胡頭尚作宰相獠面何廢聰明李狀胡也唐語林進烏詩李義甫八歲舉神童文皇在上林有捕得烏者義甫進烏詩曰日裏揚朝彩琴中伴夜啼上林如許樹不借一枝棲上曰朕以全樹借汝芝田録三珠樹王勃字子安六歲解屬文構思無滯詞情英邁與兄勔勮俱稱少俊父友杜易簡常稱之曰此王氏三珠樹也舊唐王勃之先文中子見勃弄筆令作題太公遇文王贊曰姬昌好德呂望潛華城闕雖近風雲尚賒漁舟倚石釣浦橫沙路幽山僻溪深岸斜豹韜禳惡龍鈐辟邪雖逢切近猶待安車君王握手何其脫耶芝田録舊唐及文中子通隋義寧元年卒楊炯勃文集序陳群稟太邱之訓時不逮焉是勃未及見祖也丁用晦云文中命之作贊蓋誤序及舊唐俱云年二十八蓋貞觀二十二年生也新云二十九亦誤詠崑崙蘇瓌初未知頲常令與傭保雜作一日有客詣瓌候於廳事頲擁篲趨庭遺墜文書客取視之乃詠崑崙奴詩也其詞云指頭十挺墨耳朵兩張匙客心異之久而瓌出與客淹留客笑語之際詠其詩并言形貌問瓌何人非足下宗族庶孽耶瓌備言其事客驚賀之請瓌加禮收舉必蘇氏令子也瓌稍親之有人獻兔懸於廊廡瓌召頲令詠之即應聲曰兔子死蘭彈將來挂竹竿試將明鏡照無異月中看瓌大驚奇開元傳信記誦枯樹賦蘇頲年五歲時裴談嘗過其父頲方誦庾信枯樹賦避談字諱因易其韻曰昔年移柳依依漢陰今看搖落悽愴江潯樹猶如此人何以任談歎異之知其他日必主文章也廣人物志詠尹字蘇頲才能言有京兆尹過瓌既去瓌命頲詠尹字乃曰丑雖有足甲不全身見君無口知伊少人明皇雜録自然生知公神秀穎發自然生知五歲便措意於文每坐臥吟諷未嘗暫輟至於八九歲則有若大成焉一覽誦千言有若素習十七遊太學對策甲科韓休蘇頲集序一遍誦賦宋璟廣平人七歲能屬文一遍誦鵩鳥賦八九歲時嘗夢大鳥銜書吐口中而吞咽之遂乘而直上倏忽驚寤猶若下在胸間自後藻思日深靈襟益爽顏真卿撰神道碑國瑞玄宗封泰山劉宴始八歲獻頌行在帝奇其幼命張說試之說曰國瑞也即授太子正字公卿邀諸旁午號神童名振一時引晏殿內晏坐貴妃膝上親為畫眉總角宮人遺花投果正朋字玄宗御勤政樓大張樂羅列百妓時教坊有王大娘者善戴百尺竿竿上施木山狀瀛州方丈令小兒持絳節出入於其間歌舞不輟時劉宴以神童為祕書正字年十歲形狀獰劣而聰悟過人玄宗召于樓中簾下貴妃置于膝上為施粉黛與之巾櫛玄宗問宴曰為正字正得幾字宴曰天下字皆正唯朋字未正得貴妃復令詠王大娘戴竿宴應聲曰樓前百戲競爭新唯有長竿妙入神誰謂綺羅翻有力猶自嫌輕更著人玄宗與貴妃及諸嬪御歡笑移時聲聞于外因命牙笏及黃文袍以賜之明皇雜録詠方圓動靜李泌字長源小字為順生而髮至於眉幼而聰敏書一覽必能誦六七歲學屬文開元十六年玄宗御樓大酺夜於樓下置高座召三教講論泌姑子員俶年九歲潛求姑備儒服夜升高座詞辨蜂起談者皆屈玄宗奇之召入樓中問姓名乃曰半千之孫宜其若是因問外更有兒童如兒者乎對曰舅子順年七歲能賦敏捷帝命中使馳召之帝方與張說觀棊中人抱泌至俶與劉宴偕在帝側遂命說試為詩即令詠方圓動靜泌曰願聞其狀說應曰方如棊局圓如棊子動如棊生靜如棊死說以其幼仍教之曰但可以應虛作不得更實道棊字泌曰隨意即甚易耳玄宗笑曰精神全大於身泌乃言曰方如行義圓如用智動如逞才靜如遂意說因賀曰聖代嘉瑞也玄宗大悅抱於懷撫其頭命果餌啖之仍賜衣物及綵數十且諭其家曰年小恐於兒有損未能與官當善視之乃國器也後二年賦長歌行曰天覆吾地載吾天地生吾有意無不然絶粒升天衢不然鳴珂遊帝都焉能不貴復不去空作昂藏一丈夫一丈夫兮一丈夫平生志氣是良圖請君看取百年事業就扁舟泛五湖詩成傳寫之者莫不稱賞鄴侯外傳擊父妾嚴挺之薄妻而愛其子武武年八歲詢其母曰大人常厚玄英挺之妾未嘗慰省何至於斯母曰汝父嫌吾寢陋枕席數宵即懷汝自後相棄其母悽咽武亦憤惋候父出玄英方睡武持小鐵鎚擊碎其首挺之歸驚愕視之已斃矣左右言小郎君戲運鎚而致此挺之呼武曰汝何戲之甚武曰焉有大朝人士厚其侍妾困辱兒之母乎故須擊殺非戲也父曰真嚴挺之兒一物四聲楊綰字公權生聰慧年四歲處群衆中敏識過人嘗夜宴親賓客舉坐中一物以四聲呼之衆賓未言綰應聲指鐵燈樹曰燈盞柄曲衆咸異之舊唐神俊李德裕幼而神俊憲宗賞之坐于膝上父吉甫每以敏辨誇于同列武元衡召之曰曰吾子所嗜何書意欲探其志也德裕不應翌日元衡以告吉甫因戲曰公誠大癡耳吉甫歸責之德裕曰武公身為帝弼不問理國調陰陽而問所嗜書者禮部成均之職也其問不當所以不應吉甫復告元衡大慚由是振名北夢瑣言變四聲權德輿生三歲知變四聲四歲能賦詩積思經術無不貫綜元和初拜尚書同平章事風流醞籍自然可慕正元元和間為縉紳羽儀云舊唐絶倫高郢字公楚九歲通春秋能屬文子定幼聰警絶倫年七歲時讀尚書湯誓問郢曰奈何以臣伐君郢曰應天順人不為非道何云伐耶對曰用命賞於祖不用命戮于社是順人乎父不能對小字董二人以幼慧多以字稱之上善文詠楊收字藏之七歲而孤居喪有如成人母長孫夫人知書親自教授十三通諸經義善千文詠吳人呼為神童兄發戲令詠蛙即曰兔邊分玉樹龍底躍銅儀會當同鼓吹不復問官私又令詠筆仍賦鑽字即曰雖匪囊中物何堅不可鑽一朝操政事定使冠三端每良辰美景吳人造門觀神童請為詩賦觀者壓敗其藩收嘲曰爾幸無羸角何用觸吾藩若是升堂者還應自得門上絶乳能詩李甘始河南人楊牢有至行甘以書薦于尹曰牢絶乳即能詩洛陽兒曹壯于牢者皆出其下史弘農楊牢幼孤六歲時就學歸誤入人家乃父友也二丈人彈棊次見楊氏子戲之曰爾能為丈人詠此局否楊即詠詩曰魁形下方天頂雲二十四寸窗中月丈人驚撫其首遺以梨栗曰爾後必有文名年十八一上中春官選芝田録詠鷹崔鉉元略之子也為童兒時隨父訪韓滉滉見而憐之元略云此子邇來詩道頗長滉乃指架上鷹令詠焉遂命箋筆略無停思于是進曰天邊心膽架頭身欲擬飛騰未有因萬里碧霄終一去不知誰是解縧人滉益奇之歎曰此兒可謂前程萬里也南楚新聞識之無字白居易與元稹書云僕始生六七月時乳母抱弄於書屏下有指無字之字示僕者僕雖口未能言心已默識後有問此二字者雖百十其試而指之不差則僕宿昔之緣已在文字中矣及五六歲便學為詩九歲諳識聲韻長慶集拔萃韋溫字弘育綬子也七歲時日念毛詩一卷年十一歲應兩經舉登第以書判拔萃補校書郎時綬致仕田園聞溫登第愕然曰判入高等在群士之上得非交結權幸而致耶令設席於庭自出判目試兩節溫命筆即成綬喜曰此無愧也舊唐辨鼎銘張同居洛陽浚若得古鼎銘曰魏黃初元年春二月同以為奇其子策年十三啓曰漢建安二十五年曹公薨改元延康是歲十月曹丕受禪又改黃初元年無二月銘何謬也同大異之五代史天授王元之內翰五歲已能詩因太守賞白蓮倅言於太守召而吟一絶云昨夜三更裏嫦娥墮玉簪馮夷不敢受捧出碧波心又云佳人方素面對鏡理新妝守曰天授也古今詩話不應神童科黃廷堅年五歲已誦五經一日問其師曰人言六經何讀其五師曰春秋不足讀廷堅曰既曰經矣何得不讀十日成誦無一字或遺其父庶喜其敏悟欲令習神童科舉廷堅竊聞之乃笑曰是甚做處庶尤愛重之時有鄉人赴南宮試庶率同舍餞飲皆作詩送行或令廷堅亦賦詩頃刻而成有云君到玉皇香案前若問舊時黃廷堅謫在人間今八年道山清話送君歸去明主前云云西清詩話避崩字郢州別駕黃泳字宋永年三歲書一過目輒成誦大觀二年應童子科赴闕引見徽宗摘毛詩如南山之壽之句以發誦泳應聲曰不騫不墜上以崩字為問對曰詩人之言不識忌諱臣安敢復道上大悅乃引歷見后嬪爭遺以金錢果餌越明年賜五經及第興化舊志童子科高宗時小校子劉轂年五歲善騎射補校尉朱虎臣浮梁人能排陳步射及誦七書補承信郎召見賜金帶孝宗朝童子呂嗣興衢州人四歲能誦書切韻變四聲畫八卦召見面試吟詩授右從政郎賜鈔三百緡朝野雜記晏殊首冠撫州何正臣名占臨江皆童子舉文昌雜録女神童淳熙元年女童林幼玉求試中書後者挑試所誦經書四十三件並通四月辛酉詔特封孺人朝野雜記五行並下應奉字世叔汝南南頓人少聰明自為童兒及長凡所經履莫不暗記讀書五行並下為郡決曹史行部四十二縣録囚徒數百千人及還太守備問之奉口說罪繫姓名坐狀輕重無所遺脫時人奇之後漢亭長飲漿應奉少為上計吏許訓為計掾俱到京師訓自發鄉里在路晝頓暮宿所見長吏卒奴僕訓皆密疏姓名欲試奉還郡出疏示奉奉云前食潁川綸氏都亭亭長胡奴名祿以飲漿來何不在疏坐中皆驚謝承書半面識應奉年二十時嘗詣彭城相袁賀賀時出行閉門造車匠於內開扇出半面視奉奉即委去後數十年於路見車匠識而呼之上游夏爭匹延篤字叔堅南陽句犨人也篤欲寫左氏傳無紙唐溪典以廢箋記紙不可寫傳乃借本諷之糧盡辭歸典曰卿欲寫傳何故辭歸篤曰已諷之矣典聞之歎曰嗟呼延生雖復端木聞一知二未足為喻若使尼父更起於洙泗君當編名七十與游夏爭匹也先賢行狀分別姓名吳郡陸續初任郡戶曹史飢荒太守君興使續於都亭賑民饘粥續悉簡閔其人訊以名氏事畢興問所幾因說六百餘人皆分別姓名字無有誤謬謝承書援筆書碑禰衡字正平黃射作章陵太守衡俱有所之見蔡伯喈所為碑正平一過視之歎之言好後各歸章陵自恨不令史寫之正平曰吾雖一過皆識其所言惟第四行中石盡磨滅兩字不分明因援筆書之初無遺失惟兩字不著別傳蔡伯喈薦衡疏云衡初涉藝文升堂覩奧目所一見輒誦於口耳所瞥聞不忘於心性與道合思若有神弘羊潛計安世默識以衡準之誠不足怪後漢暗誦張松為人短小放蕩不治節操然識達精果有才幹劉璋遣詣曹公曹公不甚禮公主簿楊修深器之白公辟松公不納修以公所撰兵書示松松宴飲之間一看便暗誦修以此益奇之益部耆舊雜記覆句王粲與人共行讀道邊碑人問曰卿能暗誦乎曰因使背而誦之不失一字觀人圍棋局壞粲為覆之棋者不信以帊蓋局使更以他局為之用相比校不誤一道魏志談刺夏侯榮字幼權淵子也幼聰慧七歲能屬文誦書日千言經目輒識之文帝聞而請焉賓客百餘人人一奏刺悉書其鄉邑名氏世所謂爵里刺也客示之一寓目使之遍談不謬一人帝深奇之世語練究沈璞字道真林子少子也童孺時神意間審有異於衆年十許歲智度便有大成之姿好學不倦善屬文時有憶識之功尤練究萬事經耳過目人莫能欺之宋書方王粲邢邵字子才十歲能屬文聰明強記日誦萬餘言嘗因霖雨乃讀漢書五日略能遍之後因飲謔倦方廣尋經史五行俱下一覽便記無所遺忘文章典麗既贍且速年未二十名動衣冠嘗與右北平陽固河東裴伯茂從兄罘河南陸道輝等至北海王昕舍宿飲相與賦詩凡數十首皆在主人奴處旦日奴行諸人求詩不得邵皆為誦之諸人有不認詩者奴還得本不誤一字諸人方之王粲比禰衡裴諏之字士正少好儒學釋褐太學博士嘗從常景借書百卷十許日便返景疑其不能讀每卷策問應答無遺景歎曰應奉五行俱下禰衡一覽便記今復見之於裴生矣障面楊愔字遵彥聰記強識半面不忘每有所召問或單稱姓或單稱名或有誤者後有選人魚漫漢自言猥賤獨不見識愔曰卿前在元子思坊騎禿尾草驢經見我不下以方麴障面我何不識卿漫漢驚服人調之曰名以定體漫漢果自不虛北齊千言三遍柳慶字更興僧習子也幼聰敏有器量博涉群書不治章句好飲酒間於古對年十三因曝書僧習謂慶曰汝雖聰敏吾未經特試乃令慶於雜賦集中取賦一篇千有餘言慶立讀三遍便即誦之無所遺漏後周目見口誦長孫紹遠字師魏上黨王稚子也雅好墳籍聰慧過人時稚作牧壽春紹遠幼年甫十三稚管記王碩聞紹遠強記心以為不然遂白稚曰伏承世子聰慧之姿發于天性目所一見誦之於口此既歷世罕有竊願驗之於是命紹遠試焉讀月令數紙才遍誦之若流碩乃歎服周書日下燦爛裴漢字仲霄聰敏好學嘗見人作百字詩一覽便誦大統五年為丞相府墨曹漢善尺牘尤善簿領理識明贍斷剖如流相府為之語曰日下燦爛有裴漢上手不執本崔仁師為度支郎中嘗奏度支財物數千言手不執本太宗怪之令杜正倫襒本仁師對唱一無差殊太宗大奇之舊唐一遍千言開元初潞州常敬忠十五明經擢第數年遍通五經上書自舉云一遍誦千言十遍誦萬言乎對曰未曾自試燕公遂出書非人間所見也謂之曰可十遍誦之敬忠危坐而讀每遍畫地為記讀七遍起曰此誦已得燕公曰可滿十遍敬忠曰若十遍即是十遍誦得今七遍已得何要滿十燕公執本觀覽不暇而敬忠誦畢不差一字見者莫不嗟嘆語林一遍能記開元中有李幼奇者以藝干柳芳念有韻詩芳便暗記題之於壁謂幼奇曰此吾之詩也幼奇大驚徐曰相戲耳此吾所念詩也因謂幼奇更念人所著文章皆一遍能記上才格高下蕭穎士四歲屬文觀書一覽即誦嘗與李華陸據遊洛龍門共讀誦路傍古碑穎士一閲即能誦華再閲據三方能記之議者以三人才格高下亦如此舊唐一閲李畬至遠子也初為汜水主簿處事敏速有聲稱雖村童厮養之輩一閲之後無不知代替姓名者上千人無差顏真卿調犀浦主簿嘗送徒益州亡其籍至廷口記物色凡千人無所差長史陸象先異之援筆倒疏魏奉古授雍邱尉嘗九日公宴有客草序五百言奉古言此舊文援筆倒疏之草序者默然自失列座撫掌奉古徐笑曰適覽記之非舊習也由是知名時張挺蒞汴州召奉古前曰此聰明尉耶他日持廄目令示奉古一覽便諷千餘言挺驚起曰仕宦且四十年未嘗見此天下奇才張方平年十三入應天府學穎悟絶人家貧無書常就人借三史旬日輒還曰吾已得其詳矣凡書皆一閲終身不再讀屬文未嘗起草人曰天下奇才墓志聽微客有見周公者應之於門曰何以道旦也客曰在外即言外在內即言內入乎將毋周公曰請入客曰立即言義坐即言仁坐乎將毋周公曰請坐客曰疾言則翕翕徐言則不聞言乎將毋周公唯唯旦也踰明日興師而誅管蔡故客善以不言之說周公善聽不言之說若周公可謂能聽微言矣故君子之告人也微其救人之急也韓詩外傳茅絰哭井楚子伐蕭還無社與司卯言號申叔展叔展曰有麥麴乎曰無有山鞠窮乎曰無河魚腹疾奈何曰目於眢井而拯之若為茅絰哭井乃已明日蕭潰申叔視其井則茅絰存焉號而出之左宣十二還蕭大夫卯申楚大夫麥麴鞠窮所以御濕微言響應騶忌子見威王三月而受相印淳于髡見之曰善說哉髡有愚志願陳諸前騶忌子曰謹受教髡曰得全全昌失全全亡忌曰謹受令請謹受令前髡曰狶膏棘軸所以為滑也然而不能運方穿忌曰謹受令請謹事左右髡曰弓膠竹幹所以為合也然而不能傳合疏罅忌曰謹受令請謹自附於萬民髡曰狐裘雖弊不可補以黃狗之皮忌曰謹受令請謹擇君子毋雜小人其間髡曰大車不較不能成其五音忌曰謹受令請謹修法律而督姦吏髡說畢趨出至門而面其僕曰是人者吾語之微言五其應我若響之應聲是人必封不久矣史記齊有稷下先生喜議政事鄒忌既為齊相稷下先生淳于髡之屬七十二人皆輕忌以謂設以辭鄒忌不能及乃相與俱往見鄒忌淳于髡之徒禮倨鄒忌之禮卑淳于髡等曰狐白之裘補之以敝羊皮何如鄒忌曰敬諾請不敢雜賢以不肖淳于髡曰方內而員缸如何忌曰敬諾請謹門內不敢留賓客髡等曰三人共牧一羊羊不得食人亦不得息何如忌曰敬諾減吏省員使無擾民也于髡等三稱忌三知之如應響于髡等辭屈而去忌之禮倨髡等之禮卑故所以尚干將莫耶者貴其立斷也所以貴騏驥者為其立至也必且歷日曠久乎絲氂猶能挈石駑馬亦能致遠是以聰明捷敏人之美材也新序應對鋒出武帝時東方朔射覆連中時有幸倡郭舍人滑稽不窮常侍左右曰朔狂幸中耳非至數也臣願令朔復射朔中之臣榜百朔不能中臣賜帛乃覆樹上寄生令朔射之朔曰是窶數也舍人曰果知朔不能中也朔曰生肉為膾乾肉為脯著樹為寄生盆下為窶數上令倡監榜舍人舍人不勝痛呼謈朔笑之曰咄口無毛聲謷謷凥益高舍人恚曰朔擅詆欺天子從官當棄市上問朔何故詆之對曰臣非敢詆之乃與為隱耳上曰隱云何朔曰夫口無毛者狗竇也聲謷謷者烏哺鷇也凥益高者鶴俯啄也舍人不服因曰臣願復問朔隱語不知亦當榜即妄為諧語曰令壺齟老柏塗伊優亞狋吽牙何謂也朔曰令者命也壺者所以盛也齟者齒不正也老者人所敬也柏者鬼之廷也伊優亞者辭未定也狋吽牙者兩犬爭也舍人所問朔應聲輒對變詐鋒出莫能窮者左右大驚上以朔為常侍郎遂得愛幸前漢觀相佩刀王尊遷東平相是時東平王以至親驕奢不奉法度傳相連坐及尊視事奉璽書至廷中王未及出受詔尊持璽書歸舍食已乃還致詔後謁見王太傅在前說相鼠之詩尊曰毋持布鼓過雷門王怒起入后宮尊亦趨出就舍乃召敕于廄長節王出入馳驅后尊朝王王復延請登堂尊謂王曰尊來為相人皆弔尊也以尊不容朝廷故見使相王耳天下皆言王勇顧但負貴安能勇如尊乃勇耳王變色視尊意欲格殺之即好謂尊曰願觀相君佩刀尊舉掖顧謂傍侍郎前引佩刀視王王欲誣相拔刀向王耶王情得又雅聞尊高名大為尊屈酌酒具食相對極歡上絶妙好辭魏武嘗過曹娥碑下楊修從碑背上見題作黃絹幼婦外孫𩐋臼八字魏武謂修曰解不答曰解魏武曰卿未可言待我思之魏武乃曰吾已得令修別記所知修曰黃絹色絲也於字為絶幼婦少女也於字為妙外孫女子也於字為好𩐋臼受辛也於字為辭所謂絶妙好辭也魏武亦記之與修同乃歎曰我才不及卿乃覺三十里世說蔡雍避難過吳讀碑文以為詩人之作無詭妄也因刻石旁作八字魏武見而不能了以問群寮莫有解者有婦人浣於汾渚曰第四車解既而禰正平也衡即以離合義解之或謂此婦人即娥靈也異苑楊修有才知魏文為世子歷陳太邱墓過見碑題曰黃絹幼婦外孫臼魏文思之不解問高祖即答曰陳實之墓蔡雍之辭鍾繇之書此絶妙好辭也魏文曰才與不才相校四十里也魏武殺修曰芳蘭當門不得不除典略劉孝標云魏武楊修未嘗過江意當以此為正人噉一口人餉魏武一杯酪魏武噉少許蓋頭上題合字以示衆衆莫能解次至楊修修便噉曰公教人噉一口也復何疑世說竹片椑楯魏武征袁本初治裝餘有數十斛竹片咸長數寸衆云並不堪用正令燒除太祖思所以用之謂可為竹椑楯而未顯其言馳使問主簿楊高祖應聲答之與帝心同衆服其辨悟上門題活字楊高祖為魏武主簿時作相國門始構榱桷魏武自出看使人題門作活字便去楊見即令壞之既竟曰門中活闊字王正嫌門大也上雞肋夏侯淵為黃忠所殺操臨漢中至陽平欲攻劉玄德而不得進欲守又難為功乃出令曰雞肋官屬不解所謂楊修便自嚴裝人驚問修何以知之修曰雞肋棄之可惜食之無所得以比漢中知公欲還也俄操回師時人服其幾決九州春秋欒欒在前王東亭作宣武主簿嘗春月與石頭兄弟乘馬出郊時彥同遊者連鑣俱進唯東亭一人常在前覺數十步諸人莫之解石頭等既疲倦俄而乘輿回諸人皆以從官唯東亭一人在前其悟捷如此一詣主簿桓公陰懷犯順追蜀人知星者問以國家運祚修短星人云太微紫微文昌三宮氣候如此決無憂虞五十年外不論耳由是大忤溫旨異日送絹一匹錢五千文與之星人乃馳詣習鑿齒曰家在益州被命遠下今受旨自裁無由致其骸骨緣君仁厚乞為標碣習問其故星人曰賜絹一匹令僕自裁錢五千以買棺耳習曰君幾誤死君嘗聞星宿有載覆之義乎此以絹戲君以錢供道中資聽君去耳星人大喜明便詣溫別溫問去意以習鑿齒之言對溫笑曰鑿齒憂君誤死君定是誤活然徒三十年讀書不如一詣習主簿解習字東魏孝文帝常宴群臣酒酣歡極帝因舉巵酒屬群臣曰三三橫兩兩縱誰能辨之賜金鍾御史中尉李彪曰沽酒老嫗甕注瓨屠兒割肉與稱同尚書左丞甄琛曰吳人浮水自云工妓兒擲袖左虛空彭城王協曰臣始解此是習字高祖即以金鍾賜彪人服彪聰明有智甄琛和之亦速洛陽伽藍記與上人梁時有沙門訟田武帝大署曰貞有司未辨遍問莫知劉顯曰貞文字為與上人帝因忌其能出之魏使李諧至聞之恨不相識歎曰梁德衰矣善人國之紀也而出之無亦不可乎南史青十二月則天時裴炎與徐敬業駱賓王合謀揚州兵起炎從內應書與敬業等合謀惟有青鵝字人有告者朝臣莫之能解則天曰此青者十二月鵝字者我自與也遂誅炎敬業等尋敗僉載細辨古銘天寶中商洛隱者任升之自言五世祖仕梁為太常大同四年於鍾山下獲古銘有小篆文云龜言土蓍言水甸服黃鍾啓靈趾瘞在三上庚墮遇七中已六千三百浹辰交二九重三四百圮録示史官姚訾并諸學官詳議數月無能知者因緘其名誡諸子曰我代代子孫以此銘訪於通人倘有知者吾無所恨升之雅聞鄭欽悅之名即告以先祖之意欽悅曰子當録以示我我試思之升之書遺其銘會欽悅適奉朝使方授駕於長樂驛得銘而繹之行及滋水凡三十里則釋然悟復書曰屬在途路據鞍運思頗有所得發壙者未知誰氏之子卜宅者實為絶代之賢藏往知來隗照之預識龔使無以過也謹稽諸曆術測會微旨當梁武帝大同四年歲次戊午言甸服者五百也黃鍾者十一也五百一十一年而圮從大同四年上求五百一十一年得漢光武帝建武四年戊子歲也三上庚三月上旬之庚也其年三月辛巳朔十日得庚寅是三月初葬於鍾山也七中己乃七月戊午朔十二日得己巳是初圮墮之日是日己巳可知矣浹辰十二也從建武四年三月至大同四年七月總六千三百一十二月每月一交故云六千三百浹辰交也二九為十八重三為六末言四百則六為千十八為萬可知從建武四年三月十日庚寅初葬至大同四年七月十二日己巳初圮計一十八萬六千四百日故云二九重三四百圮也其所言者但說年月日數耳據年則五百一十一會於甸服黃鍾言月則六千三百一十二會於六千三百浹辰交論日則一十八萬六千四百會於二九重三四百圮從三上庚至於七中已據曆計之無所差也所言年則月日但差一數則不相照會矣李吉甫聞其事于李巽以質于欽悅子克鈞克鈞自云亡其草吉甫甚惜之後吉甫貶明州長史得此書于隱者張玄陽抃逾獲寶為著論曰夫一邱之土無情也遇雨而圮偶然也窮象者己懸定於十八萬六千四百日之前矧於理亂之運窮達之命聖賢不逢君臣偶合則姜牙得璜而尚父仲尼無鳳而旅人傅說夢達於巖野子房神授於圮上亦必定之符也然而孔不暇暖其席墨不俟黔其突何經營如彼孟去齊而接淅賈造湘而投弔又眷戀如此豈大聖大賢猶惑於性命之理歟將浼身存教示人道之不可廢歟異聞記唐書云任昉得此銘按昉天監六年卒已卅九年矣己酉日尅元利十三年裴度擊吳元濟封人濬池濠得石銘以獻文曰井底一竿竹竹色深緑緑雞未肥酒未熟障車兒郎且須縮度令從事辨其義有一卒賀曰吳元濟成擒矣井底一竿竹竹色深緑録者言吳少誠由行間一卒遂擁十萬兵為一方帥且喻其榮者雞未肥者言無肉也夫以肥去肉為己字也酒未熟者言無水也以酒去水為酉字障車兒郎謂兵革之士也且縮者謂宜退守其所也推是言之則己酉日當尅也度奇其辨是冬李訴生得元濟果己酉日焉於是度擢卒為裨將宣室志石壁道語太和中有柳光者嘗南遊因行山道會日晚誤入山菴中下有泉水味若甘醴光飲之而醉遂偃于榻及曉石壁有雕刻文字遂寫置袖中曰武之在卯堯王八季我棄其寢我去其扆深深然高高然人不吾謂由今之後百餘祀焰焰其光和和其始東方有兔小首元尾經過吾道來至吾里飲吾泉以醉登吾榻而寐刻乎其壁奧乎其義人誰以辨其東平子光閲而異之遂行出徑數十步回望其室盡亡見矣光究之不得有昌生者視而解之曰此乃得道者語也夫唐初建號武德二年其歲己卯則武之在卯蓋武德二年也堯王者謂高祖號神堯也曰八季者亦二年也棄寢去扆者言其去絶之時乃武德二年也深深然人不吾謂者言其隱而人不知也由今之後二百餘祀者言君之來相去二百年也焰焰其光謂歲在丁未也焰者火南方丙丁之位也和和其始謂今上太和元年也東方有兔小首元尾者敘君之名氏東方甲乙木也兔者卯也卯以附木是柳字也小首元尾是光字也經吾道來吾里言君之來也飲吾泉以醉登吾榻而寢言君之止也刻乎其壁奧乎其義誰人以辨其東平子謂其義奧而獨吾能辨之東平吾之邑也即其信矣上思得題易劉遵古太和四年節度東川借人千餘編書忽一旦洪水大泛書盡濡濕劉命曝之得周易正義一軸其卷末有題云上元二年三月十一日因讀周易著此正義從茲易號十之三至一人八千口當有大水飄溺因得舒展曬曝衡陽道士李德初劉閲題嘆異召賓掾示之有掌書記思而得之曰自上元至太和凡十三改號一人八千口者蓋太和字也然則萬物之不能逃于至數也久矣宣室志寓簡大明寺壁太保令狐相出鎮淮海曰支使班蒙與從事俱游大明寺之西廊忽觀前壁題云一人堂堂二曜重光泉深尺一點去冰旁二人相連不缺一邊三梁四柱烈火燃添却雙鉤兩日全諸賓幕顧之皆莫能辨獨班支使曰一人非大字乎二曜者日月非明字乎尺一者寸土非寺字乎點去冰旁水字二人相連天字不缺一邊下字三梁四柱烈火燃無字添却雙鉤兩日全比字乃大明寺水天下無比也衆皆恍然曰黃絹之奇智亦何異哉桂苑叢談鐘樓漆字洛京北邙太清觀鐘樓唐咸通中忽然摧塌有屋檁一條其中空虛道士李威義破之於其間得一黑漆板上有陷金之字曰山水誰無言元年遇福重修道士襒呈洛中諸官皆不能詳之後李福罷鎮西川歸洛見此隱文反覆數四因遂以俸餘之金獨力完葺之洎觀成或請其由福曰山水誰無言者今上御名也咸通名崔元年遇福者福改元之初作鎮獲俸而回福其不修復待何人者哉玉堂閒話合寺茍卒乾符末有客詣青龍寺寺僧不為禮客怒題門而去詞曰龕龍去東海時日隱西斜敬文今不在碎石入流沙僧衆皆不能詳有沙彌曰龕龍去矣有合字時日隱有寺字敬文不在茍字也碎石入沙卒字也此不遜之言辱我曹矣僧人大悟追前人杳無蹤由客去沙彌乃懿皇帝朝文皓供奉桂苑叢談許碑重立義興縣有後漢許慎行廟碑碑即許邵祠歲久字多漫滅唐元和中許氏諸孫重刻之碑陰題八字云談馬礪畢王田數七人莫能曉邑宰徐延休鉉之父也一見解之云談馬即言午言午許字礪畢即石卑石卑碑字王田乃千里千里重字數七乃六一六一立字獨眠孤館陶榖使於南唐因書十二字於官舍壁間曰西川狗百姓眼馬包兒御廚飯宋齊邱解云十二字包四字云獨眠孤館干文虎序互見驛門越絶越絶書末敘云記陳厥說略其有人以去為姓得衣乃成厥名有米覆之以庚禹來東征死葬其疆不直自斥託類自明寫精露愚略以事類俟告後人文屬辭定自于邦賢邦賢以口為姓丞之以天楚相屈原與之同名是草創越絶者為會稽袁康潤色之者同郡吳平耳論衡會稽吳君高之越紐録參同契參同契者參即三同即相契所謂委時去害與鬼為鄰委鬼魏字百一之下遨遊人間百一之下為百人乃其傍之立人合之則伯字湯遭厄際水旱隔迸湯遭旱而無水陽字此自解為事合之則陽字此自解魏伯陽三字席上腐談俞兒桓公北伐孤竹未至卑耳之溪十里闟然瞪然視援弓將射未敢發也謂左右曰事其不濟乎今者寡人見人長尺而人物具焉冠右右袪衣走馬前疾事其不濟乎管仲對曰臣聞登山之神有俞兒者長尺而人物具焉霸者之君與而登山神見且走馬前疾道也袪衣示前有水也右袪衣示從右方涉也至卑耳之溪有贊水者曰從左方涉其深及冠從右方涉其深至膝若右涉其大濟桓公立拜管仲於馬前曰仲父之聖至若此對曰夷吾聞之聖人先知無形今已有形而後知之臣非聖也善承教也管子駮象桓公乘馬虎望見之而伏桓公問管仲曰今者寡人悉馬虎望見寡人而不敢行其故何也管仲對曰意者君乘駮馬而馳桓迎日而馳乎公曰然管仲對曰此駮象也駮食虎豹故虎疑焉管子晉平公出畋見乳虎伏而不動顧謂師曠曰吾聞之也霸王之主出則猛獸伏不敢起今者寡人出見乳虎伏而不動此其猛獸乎師曠曰鵲食猬猬食鵔鸃鵔鸃食豹豹食駮駮食虎夫駮之狀有似駮馬今者君之出必驂駮馬而出畋乎公曰然師曠曰臣聞之一自誣者窮再自誣者辱三自誣者死今夫虎所以不動者為駮馬也固非主君之德義也君奈何一自誣乎晉侯平有疾鄭伯使公孫僑如晉聘且問疾叔向問焉曰寡君之疾病卜人曰實沈臺駘為祟史莫之知敢問此何神也子産曰昔高辛氏有二子伯曰閼伯季曰實沈居于曠林不相能也日尋干戈以相征討后帝不臧遷閼伯於商邱主辰商人是因故辰為商星遷實沈于大夏主參唐人是因以服事夏商其季世曰唐叔虞當武王邑姜方震大叔夢帝謂己余命而子曰虞將與之唐屬諸參而蕃育其子孫及生有文在其手曰虞遂以命之及成王滅唐而封大叔焉故參為晉星由是觀之則實沈參神也昔金天氏有裔子曰昧為玄冥師生允格臺駘臺駘能業其官宣汾洮障大澤以處大原帝用嘉之封諸汾川沈姒蓐黃實守其祀今晉主汾而滅之矣由是觀之則臺駘汾神也抑此二者不及君身若君身則亦出入飲食哀樂之事也山川星辰之神又何為焉叔向曰善哉肸未之聞也晉侯聞子産之言曰博物君子也重賄之左昭元金簡吳王伐石以治宮室於合石之中得紫文金簡之書不能讀之使使者持以問仲尼而欺仲尼曰吳王閒居有赤雀銜書以置殿上不知其義故遠咨呈仲尼視之曰此乃靈寶之方長生之法禹之所服隱在水邦年齊天地朝于紫庭者也禹將仙化封之名山石函之中乃今赤雀銜之殆天授也抱朴辨問互見山部言古聖狀景公舉兵將伐宋師過泰山公夢見二丈夫立而怒其怒甚盛公恐覺辟門召占夢者至公曰今夕吾夢二丈夫立而怒不知其所言其怒甚盛吾猶識其狀識其聲占夢者曰師過泰山而不用事故泰山之神怒也請趣召祝史祠乎泰山則可公曰諾明日晏子朝見公告之如占夢之言也公曰占夢者之言曰師過泰山而不用事故泰山之神怒也今使人召祝史祠之晏子俯有間對曰占夢者不識也此非泰山之神是宋之先湯與伊尹也公疑以為泰山神晏子曰公疑之則嬰請言湯伊尹之狀也湯質晳而長顏以髯兌上豐下倨身而揚聲公曰然是已伊尹黑而短蓬而髯豐上兌下僂身而下聲公曰然是已今若何晏子曰夫湯太甲武丁祖乙天下之聖君也不宜無後今惟宋耳而公伐之故湯伊尹怒請散師以平宋景公不用終伐宋晏子曰伐無罪之國以怒明神不易行以續蓄進師以近過非嬰所知也師若果進軍必有殃軍進再舍鼓毀將殪公乃辭乎晏子散師不果伐宋晏子勞薪王劭以上古有鑽燧改火之義上表請變火云昔師曠食飯云是勞薪所爨晉平公使視之果然車輞隋書亥豕卜商反衛見讀史志者云晉師伐秦三豕渡河子夏曰非也己亥耳讀史志者問諸晉史果曰己亥於是衛以子夏為聖家語弟子解怪哉漢武帝幸甘泉坂馳道有蟲蟠而覆地赤如生肝頭目口鼻耳齒盡具先驅旄頭馳還以聞上使視之莫知也時東方朔在屬車帝令往視之還對曰此蟲名怪哉上曰何謂對曰秦始皇拘係無罪幽殺無辜衆庶愁怨咸仰首歎曰怪哉怪哉憤氣之所生也此地必秦之故獄處也詔丞相公孫弘按地圖果秦獄也上曰善當何以去之朔曰凡積憂者得酒而解以酒灌之當消於是使人取蟲置酒中須臾糜爛上笑曰東方生真先生賜帛百匹後屬車上載酒為此也方朔別傳武帝東行至函谷關有物當道長數丈其狀象牛青眼而曜晴四足入土動而不徙百官驚懼東方朔乃請酒灌之數十斛而消帝問其故曰此名為患憂之所生也此必是秦之獄地不然罪人徒作聚地也夫酒忘憂故能消之也帝曰博物之士至于此乎搜神記鐘鳴漢武帝時未央宮前殿鐘無故自鳴三日三夜不止詔問太史待詔王朔朔言恐有兵氣更問東方朔朔曰臣聞銅者山之子山者銅之母以陰陽氣類言之子母相感山恐有崩弛者故鐘先鳴易曰鳴鶴在陰其子和之精之至也其應在後五日內居三日南郡太守上書言山崩延袤二十餘里別傳巫雀漢武祠甘露時有神雀下群臣皆上壽東方朔獨不賀帝曰朔何不賀曰此所謂巫雀非神雀也或有巫者為國作害卒有巫蠱之事果應上異鳥武帝時有獻異鳥者食之百物所不肯食東方朔見之言其鳥名又言其所當食如朔言問朔何以知之曰出山海經劉歆序武帝時嘗有獨足鶴人皆不知以為怪異東方朔奏曰此山海經所謂畢方鳥也驗之果是因敕廷臣皆習山海經云西章義之山有鳥焉其狀如鶴一足赤文青質而白喙名曰畢方其名自叫見則其邑有訛火尚書故實劫灰武帝穿昆明池底得黑灰無復土問東方朔朔云不知可問西域之人明帝時竺法蘭入來洛陽時有憶方朔言者乃追以問之蘭云經云天地大劫將盡則劫燒此燒劫之餘灰也乃知朔言有徵信者甚衆高僧傳志怪藻簾武帝與近臣宴會于未央殿忽聞人語良久梁上見一老翁長八九寸緣柱而下放杖稽首默而不言仰頭視屋俯指帝腳忽然不見帝駭愕召方朔以告朔曰其名為藻廉水木之精夏巢幽林冬潛深河陛下頃日興造宮室斬伐其居故來訴耳仰頭看屋視殿室名未央訴陛下方侵其居宅未央也俯指陛下腳者足也願陛下宮室足於此不復更造也帝感之息役后帝幸瓠子河聞水底有絃歌之聲須臾前梁上翁及年少數人皆長八九寸有一人長尺餘凌波而出或有挾樂器者帝方食命列坐案前帝問曰聞水底奏樂為是君耶得奏樂否故齎樂來安敢不奏其最長人便鼓絃而歌歌聲小大無異於人清徹繞越梁棟又二人鳴管撫節調契聲諧帝歡悅舉觴並勸翁等並舞拜受爵各飲數升不醉獻帝一紫螺殼中有物狀如牛脂帝問曰朕暗無以識此物東方生知君耳君可更以珍異貽之老翁顧命取洞穴之寶一人受命下沒淵底倏忽還到得一大珠徑數寸明曜絶世帝甚弄玩翁等忽然而隱帝問朔紫螺殼中何物朔曰是蛟龍髓以傅面令人好顏色又女子在孕産之必易會後宮産難者試之殊有神效帝以脂塗面便白澤又曰何以此珠名洞穴珠朔曰河底有一穴深數百丈中有赤蚌蚌生珠故以名焉帝既深歎此事又以五十萬錢賜朔取其珠置于內庫幽明録志怪騶牙建章宮後閣重櫟中有物出焉其狀似麋以聞武帝往臨視之問左右群臣習事通經術者莫能知詔東方朔視朔曰所謂騶牙者也遠方當來歸義而騶牙先見其齒前後若一齊等無牙故謂之騶牙其後數歲餘胸奴混邪王果將十萬衆來降漢乃復賜東方生錢財甚多史東方生啖鐵之獸實賴大荒之籍矣抱朴子寶露壇高辛時丹邱之國獻瑪瑙甕以盛甘露至堯時猶存舜遷寶甕於衡山之上故衡山有寶露壇舜于壇下起月館以坐夕月又遷于零陵之上舜崩甕淪于地下秦始皇掘地得赤玉甕於舜廟堂前後人不知年月東方朔識之乃作銘曰寶雲生於露壇祥月起於月館望三壺如盈尺視八鴻如縈帶拾遺記太乙星武帝元狩中有日者奏太乙星不見帝召東方朔問其由朔奏曰是星不見則遊於世為居民福壽旁曰何以驗之朔曰陛下使人於異方江海之濱設禮祭而迎之或乘舟或控鶴特異於常者則為驗見則斫竹建壇醮謝之帝如奏朔曰迎之是月果有會稽太守奏海中有人丫角面如玉色美髭髯而腰蔽槲葉乘一葉紅蓮約長丈餘偃臥其中手持一黃書自東海浮來臣等焚香迎拜俯首百步俄而雲霧所遮後霧散不知所之遺其黃書飄至亭側進於帝帝令朔驗之曰此上界火珠經也或曰連珠漢遺史一角五蹄終軍字子雲從上幸雍祠五峙獲白麟一角而五蹄時又得奇木其枝旁出輒復合于木上上異此二物博謀群臣軍上對曰野獸并角明同本也衆支內附示無外也若此之應殆將有解編髮削左衽襲冠帶要衣裳而蒙化者焉斯拱而俟之耳對奏上甚異之由是改元為元狩後數月越地及胸奴名王有率衆來降者前漢豹文鼠武帝時得豹文鼠群臣無知者孝廉郎終軍曰是名鼮鼠以爾雅對賜絹百匹爾雅竇攸事同具鼠部七車張蜀郡張寬字叔文漢武帝時為侍中從事甘泉至渭橋有女子浴于渭水乳長七尺上怪其異遣問之女曰帝後第七車侍中知我所自來時張寬在第七車對曰天星主祭祀者齊戒不嚴則作女令見益部耆舊傳世稱云七車張三篋武帝幸河東嘗亡書三篋詔問莫能知惟張安世識之具作其事後購求得書以相校無所遺失上奇其材本傳髦頭武帝時有彭權為侍中問髦頭義權答曰秦時有奇怪觸山截水無不崩潰惟畏髦頭帝乃令虎賁之士戴之以衛左右摯虞決疑要注録異傳秦文公以梓樹青牛置之髦頭與此不同具牛部二負二負之臣曰危與二負殺窫窳帝乃梏之疏屬之山桎其右足反縛兩手與髮繫之山上在開題西北郭璞注云漢宣帝使人上郡發磐石石室中得一人徒裸被髮反縛械一足以問群臣莫能知劉向按此言對之宣帝大驚於是時人爭學山海經矣山海董仲舒睹重常之鳥劉子政曉二負之尸論衡宣帝時有人於疏屬山石蓋下得二人俱被桎梏將至長安乃變為石宣帝集群臣問之無一知者劉向對曰此是黃帝時窫窳國負二之臣犯罪大逆黃帝不忍誅流之疏屬之山若有明君當時出外帝不信謂其妖言收向繫獄其子歆自出應募以救其父曰須七歲女子以乳之即復變帝使女子乳於是復為人便能言語應答如劉向之言帝大悅拜向大中大夫歆為宗正卿詔問何以知之歆曰出山海經獨異志本傳向宣帝時為諫議大夫以僞鑄黃金伏法踰冬滅死後復拜為郎中遷諫議大夫給事中不為大中大夫歆以少能屬文召見成帝待詔宦者署為黃門郎去宣時三十餘年亦未為宗正卿疑此說妄也輶車使林閭字公孺臨卬人也善古學古者天子有輶車之使自漢興以來劉向之徒但聞其官不詳其職惟閭與嚴君平知之曰此使考八方之風雅通九州之異同主海內之音韻使人主居高堂知天下風俗也揚雄聞而師之因此作方言華陽國志神雀顯宗時有神雀集宮殿官府冠羽有五采色帝異之以問臨邑侯劉復復不能對薦賈逵博物多識帝召見逵問之對曰昔武王終父之業鸑鷟在岐宣帝威懷戎狄神雀仍集此敵降之徵也帝敕蘭臺給筆札使作神雀頌拜為郎與班固同校祕書應對左右後漢銅人安帝見銅人以問侍中張陵對曰昔秦始皇時有大人十二身長五丈履六尺被夷狄之服見于臨洮此天將亡秦之證而始皇誤喜以為瑞乃鑄銅人以為像上曰何以知之對曰臣見傳載見其人胸上有銘張瑩漢紀礬石王粲在荊州從劉表登鄣山見一岡不生百草粲曰必是古冢此人在世服生礬石死而石氣蒸于外故卉木焦滅即令鑿看果大墓有礬石滿塋一說粲從魏武北征冒頓升嶺眺矚而見此異曹操之平烏桓粲猶在江南異苑閲書觀魏文帝為閲書觀讀書千卷者登此觀觀者六人而已三國遺事職林瑣言埋寶胡綜博物多識孫權時有掘地得銅匣長二尺七寸以琉璃為蓋雕鏤之布雲母于其上開之得一白玉如意所執處皆刻龍虎及蟬形時莫能識其所由者權以綜多悉往事使人問之綜云昔秦始皇東遊以金陵有天子氣乃改縣名并掘鑿江湖平諸山阜處處埋寶物以當王氣事見于秦記此蓋是乎衆人咸嘆其洽聞而悵然自失別傳傒囊諸葛恪為丹陽太守出獵兩山之間有物如小兒伸手欲引人恪令伸之曰去故地即死既而參佐問其故以為神明恪曰此事在白澤圖內曰兩山之間其精如小兒見人則伸手欲引人名曰傒囊引去故地則死諸人未之見也搜神記彭侯孫權時陸敬叔為建安郡太守使人伐大樟樹不數斧忽有血出至樹斷有物人頭狗身從樹中出敬叔曰此名彭侯可烹食之白澤圖曰木之精名彭侯狀如黑狗無尾可烹食之上比子産張華強記默識四海之內若指諸掌武帝嘗問漢宮室制度及建章千門萬戶華應對如流聽者忘倦畫地成圖左右屬目帝甚異之時人比之子産晉書銅盤鳴中朝時有人蓄銅澡盤晨夕恆鳴如人扣以白張華華曰此盤與洛鐘宮商相諧宮中朝暮撞故聲相應可鑢令輕則韻乖鳴自止也依言即不復鳴小說仙館玉漿嵩高山北有大穴莫測其深淺百姓歲時每遊觀其上以為嘗有一人誤墜穴中同輩冀其儻不死投食于穴墮者得之為糧乃緣穴而行計可十許日忽見明曠有草屋一區二人對坐圍棋下有一杯飲墜者告以飢渴棋者曰可飲此墜者飲之氣力十倍棋者曰汝欲停此否墜者曰不願停棋者曰汝從西行數十步有一井其中多怪物慎勿畏但投身入井當得出若飢即可取井中物食之墜者如其言井多蛟龍然見墜者輒避其路墜者緣井而行井中有物若青泥墜者食之了不復飢可半年許乃出蜀中因歸洛下問張華華曰此仙館所飲者玉漿所食者龍之骨髓也殷藝小說博物志張華讀三十車書造博物志四百卷奏於武帝帝以為繁令芟截浮疑分為十卷即於御前賜于闐青鐵硯遼西國麟角筆南越側理紙萬番帝常以博物志十卷置於函中暇中覽焉拾遺記殷文圭啓注顯陵策文時有人於嵩高下得簡一枚上兩行科斗書傳以相示莫有知者司空張華以問束晳晳曰此漢明帝顯節陵中策文也檢驗果然時人服其博識晉書狄泉董養字仲道太始初到洛下不干祿求榮永嘉中洛城東北角步廣里中地陷中有二鵝出焉蒼者飛去白者不能飛問之博識者不能知養聞歎曰昔周時所盟會狄泉即此地也今有二鵝蒼者胡象後胡當入洛白者不能飛此國諱也王隱晉書燒轄擬鏡王獻失鏡鏡在罌中罌中才數寸而鏡尺餘以問郭璞曰此乃邪魅所為使燒車轄以擬鏡鏡即出焉搜神記鼎斛苻堅時藍田縣得一大鼎容二十七斛邊有篆銘人莫能識乃以示釋道安安云此古篆書云魯襄公所鑄乃寫為隸文又有人持一銅斛於市賣之其形正圓下向為斗橫梁昂者為升斗者為合梁一頭為籥籥同黃鍾容半合邊有篆銘堅以問安安云此王莽自言出自舜皇龍戊辰改正即真以同律量布之四方欲小大器均令天下取平焉其多聞廣識如此故京兆為之語曰學不師安義不中難高僧傳威斗何承天博覽古今為一時所重張永嘗開玄武湖適古冢得一銅斗有柄文帝訪朝士承天曰此亡新威斗也王莽三公亡皆賜之一在冢外一在冢內三台居江左者惟甄邯為大司徒必邯之墓時帝每有疑議必先訪之使命相望于道宋書王莽四年八月親之南郊鑄作威斗威斗者以五石銅為之若北斗服匿陸澄領國子祭酒竟陵王子良得古器方腹而底平可將七八升以問澄澄曰此名服匿單于以與蘇武子良後詳視器底髣佛有字可識如澄所言南齊書大力王摛少以博學知名王儉嘗使賓客隸事多者賞之探索皆窮唯廬江何憲為勝乃賞以五色簟白團扇憲坐簟執扇意氣甚得摛後至僕射以所隸示摛語之曰卿能奪之不摛操筆便成事既奧僻辭亦華美舉坐擊賞儉命左右抽憲簟摛手自掣取扇登車而去儉笑曰所謂大力者負之而趨南史焦明建武三年大鳥集東陽郡太守沈約表云鳥身備五采赤色居多案樂緯叶圖徵云焦明鳥質赤至則水之感也南齊志錞于或自蜀得古禮器人莫能識斛斯徵曰此錞于也遂依于寶周禮注為芒筒將之其聲極清衆乃歎服南史砭石王僧孺多識古事侍郎金元起欲注素問訪以砭石僧孺曰古人常以石為針必不用鐵說文有此砭字許慎云以石刺病也東山經高氏之山多針石郭璞云為砭石春秋美疢不如惡石服子慎注云石砭石也季世無復佳石故以鐵代之耳南史周譜王僧孺被敕撰譜訪劉杳血脈所因杳云桓談新論云太史三世表旁行邪上並效周譜以此而推當起周代僧孺歎曰可謂得所未聞梁書犧樽劉杳字士深少好學博綜群書沈約任昉以下每有遺忘皆訪問焉嘗於約坐語及宗廟犧尊約云鄭玄答張逸謂為畫鳳皇尾娑娑然今無復此器則不依古杳曰此言未必可按古者樽彝皆刻木為鳥獸鑿頂及背以出內酒頃魏世魯郡地中得齊大夫子尾送女器有犧樽作犧牛形晉永嘉賊曹嶷於青州發齊景公冢又得此二樽形亦為牛象二處皆古之遺器知非虛也約大以為然上紫荷橐周捨問劉杳尚書官著紫荷橐相傳云挈囊竟何所出答曰張安世傳曰持橐簪筆事孝武皇帝數十年韋昭張晏注並云橐囊也近臣簪筆以待顧問范岫撰字書音訓又訪杳焉其博識強記皆此類也上趙充國傳車騎將軍張安世始嘗不快上上欲誅之充國以為安世本持橐簪筆事孝武數十年見謂忠謹按此安國非張湯子安國也云安國傳誤而梁書南史俱不為改正罨蓋天監五年丹陽山南得瓦物高九尺鋭下平蓋如合焉中得劍一瓷具數十餘人莫識沈約云此東夷罨蓋也葬則用之代棺此制度卑小則隨當時矣東夷死則坐葬之武帝服其博識語在江左雜事史系學府傅昭以書記為樂雖老不衰博極古今尤善人物魏晉以來官宦簿代姻通內外舉而誦之無所遺失世稱為學府南史策事劉峻字孝標博極群書安成王秀雅重之秀遷荊州引為戶曹參軍給其書籍使撰類苑未及成武帝每集文士策經史事范雲沈約之徒皆引短推長帝乃悅曾策錦被事咸言已罄帝試問劉峻峻時貧於冗散忽請紙筆疏十餘事坐客皆驚帝不覺失色自是亦不復引見及峻類苑成帝即命諸學士撰華林編略以高之竟不見用上百六公張綰弘策子也字孝卿少與兄纘齊名湘東王繹嘗以百事綰對闕其六號百六公上涼州蓄饒魏崔浩博覽經史無不該盡帝將討河西王李順以其地無水草軍難久停浩曰漢地理志稱涼州之蓄為天下饒若無水草何以蓄牧後果如浩言本傳石經王肅之奔魏也孝文雅相器重朝野屬目劉芳未及相見嘗宴群臣於華林肅語次云古者唯婦人有笄男子則無笄芳曰推經理正文古者男子婦人俱有笄肅曰喪服稱男子免而婦人髽男子冠而婦人笄如此則男子不應有笄芳曰此專謂凶事也禮初遭喪男子免時則婦人髽男子冠時則婦人笄言俱時變男子婦人免髽冠笄之不同也又冠尊故奪其笄且互言也非謂男子無笄又禮內則稱子事父母雞初鳴櫛纚笄總以茲而言男子有笄明矣高祖稱善者久之肅亦以芳言為然曰此非劉石經耶昔漢世造三字石經於太學學者文字不正多往質焉芳析義明辨疑者皆往詢訪故時人號為劉石經北史陸乂於五經最精館中謂之石經人為之語曰五經無對有陸乂上著腳御覽顧野王字休倫仕陳武帝為門下侍郎博綜群書廣搜經籍撰梁瑞應圖七十卷御覽三百六十卷官人各念一卷常隨駕行內人謂之著腳御覽陸廣微吳地記玉人崔賾大業四年從駕汾陽宮次河陽鎮藍田令王曇于藍田山得一玉人長三尺四寸著大領衣冠幘奏之詔問群臣莫有識者賾答曰漢文以前未有冠幘即是文帝以來所制作也臣見魏大司農盧元明撰嵩山廟記云有神人以玉為形像長數寸或出或隱出則令世延長伏惟陛下應天順人定鼎嵩雒嶽神自見臣敢稱慶百官畢賀上大悅賜縑二百隋隱逸傳羊腸坂崔賾從駕登太行山詔問賾曰何處有羊腸坂賾對曰臣按漢書地理志上黨壺關縣有羊腸坂帝曰不是又答曰臣按皇甫士安撰地書云太原北九十里有羊腸坂帝曰是也因問牛弘姚祖濬所謂問一知二上行祕書唐太宗令虞世南寫列女傳屏風已裝未及求本乃暗書之一字無失國史纂異太宗嘗出行有司請載副書以從帝曰不須虞世南在此行祕書也隋唐嘉話佛齒貞觀中有婆羅門僧言得佛齒所繫前無堅物于是士女奔湊其集如市傅奕方臥病聞之謂其子曰非佛齒吾聞金剛石至堅物莫能敵唯羚羊角破之汝可往試焉僧緘縢甚嚴固封良久乃得見出角叩之應手而碎觀者乃止今理珠玉者用云國史纂異肉譜秦王府倉曹李守素尤精譜學人號為肉譜許敬宗謂虞祕書世南曰昔任彥升善談經籍時稱為五經笥宜改倉曹為人物志隋唐嘉話無脂羊太宗問光祿寺卿韋某須無脂肥羊肉充藥韋不知所從出乃就侍中郝處俊宅問之俊曰上好生必不為此事乃進狀自奏其無脂肥羊肉須五十口肥羊一對前殺之其羊怖懼破脂並入肉中取最後一羊則極肥而無脂也上不忍為乃止當時服處俊之博識也僉載藥金孟詵平昌人也父躍明經擢第拜學官詵少敏悟博學多奇舉無與比鳳閣侍郎劉禕之臥疾詵候問之曰留飯以金碗貯酪詵視之驚曰此藥金非石中所出者禕之曰主上見賜當非假金詵曰藥金仙方所資不為假也禕之曰何以知之詵曰藥金燒之其上有五色氣出燒之果然禕之以聞則天以其近臣不當傍稽異術左授台州司馬閣壁殘記蔣乂字德源七歲時誦庾信哀江南賦數遍而成誦在口以聰悟強力聞于親黨德宗嘗登凌煙閣見左壁頽剝上有殘缺文記每行可辨三五字命録之以問宰臣宰臣遽受宣無以對即令召乂至對曰此聖曆中侍臣圖贊也即于御前口誦以補其缺不失一字上嘆曰虞世南暗寫列女傳無以加也舊唐息壤元和初裴宙鎮荊掘地六尺得一石規模樓櫓悉倣荊城其中空徑六尺八寸甚工緻命徙之藩籬間是春淫雨四月不止潦漲莫遏人抱為魚之憂會歐獻乘居楚山馳問之對以事迫鑿石弗及令陶範為江陵城內廣六尺八寸樓堞門閾無少差於南門外八十步掘深六尺埋之當止宙始驚歎昔人所填從之既瘞祭之夕復隆起獻乃洛中道士博學多聞冥淇録江陵志息壤記云禹堙洪水茲有海眼泛濫無恆禹乃鐫石造龍之宮室置于穴中以塞其水脈玉堂閒話禁物李師古治山亭掘得一物類鐵斧時李章武遊東平師古示之武驚曰此禁物也可飲血三斗驗之而信酉陽華夷圖賈耽好地理學四方之使及使番地來者皆與之坐問其土地山川之所終始三十年所聞既備因撰海內華夷圖以問其郡人皆得其實事無虛詞虞氏雜說報時鐵段成式詞學博聞精通三教復強記每披閲文字雖千萬言一覽略無遺漏嘗于私地鑿一池工人于土下獲鐵一片怪其異質遂求獻成式命尺周而量之笑而不言乃特靜一室懸鐵其室中之北壁已而泥戶但開一牖方才數寸亦緘鐍之時與近親闢牖窺之則有金書兩字以報十二時也其博識如此南楚新聞地囊梁大彭郡郡王劉知俊鎮同州日因築營牆掘得一物重八十餘斤狀若油囊召賓幕將校問之或曰地囊或曰飛廉或曰金神七煞獨留源曰此是冤氣所結也古來囹圄之地或有焉昔王世充據洛陽修河南府獄亦獲此物而高祖記之乃冤死囚人精爽入地聚為此物經百萬年凝結不散源聞酒能忘憂請奠以醇醪或可消釋耳然此物之出亦非吉徵也知俊命具酒饌祝酹復瘞之尋有拔城背主奔秦之事乃驗之矣秦李茂貞也鑒戒録外史禱祝海眼孟蜀廣政中荊南高太王令邸務丁晏入蜀請畫工李文才寫興義門兩雙石笋兼徵其故實將歸本道告道士范德昭皆云真珠樓基或云是海眼未審孰是德昭曰吾聞諸至人斯乃蠶叢啓國鎮蜀之碑中以鐵柱貫之下以橫石相理埋于地際上有文字言歲時豐儉兵革水火之事諸葛曾掘驗之真珠樓基海眼皆非也蜀人少知云出方圓記益州名畫録蜼傅弘業宰天台縣有人獵得一獸形如豕仰鼻長尾有歧謂之怪傅識之曰蜼非怪也雨則懸於樹以尾塞其鼻後驗之可類子雲別鼮鼠曼倩識騶虞葆光録幕府書廚朱遵度避耶律德光之召挈妻孥攜書雜商賈奔楚王待之甚薄杜門却掃諸學士每為文章先問古今首末於遵度時人號為幕府書廚十國紀年海馬骨徐鉉仕江南日嘗直澄心堂復被入直至飛虹橋馬輒不進裂鞍斷轡箠之流血掣韁却立鉉寓書以問僧贊寧答曰下必有海馬骨水火俱不能毀惟漚以腐糟隨毀者乃是鉉斸之去土丈餘果得巨獸骨上脛可長五尺膝以下長三尺腦骨若段柱積薪焚三日不動以腐糟才漚之遂爛焉玉壺清話畫牛江南徐知諤嘗得畫牛一軸晝則嚙草欄外夜則歸臥欄中知諤獻後主煜持貢闕下大宗張後苑以示群臣俱無知者僧録贊寧曰南倭海水或減則灘磧微露倭人拾方諸蚌臘中有餘淚數滴得之和色著物則晝隱而夜顯沃焦山時或風撓飄繫急有石落海岸得之滴水摩色染物則晝顯而夜晦諸學士皆以為無稽寧曰見張騫海外異物記後杜鎬檢三館書目果見於六朝舊本書中載之清波雜志狼星直日嗣主如南都既數日詰旦殿庭忽見殘獐一腳視之乃獸食之餘詢宿衛莫知所以使往詢陳陶陶曰昨暮乃狼星直日故爾嗣主嘆曰真鴻儒矣江南野史墨知墨允大參陳彭年以博學強記受知定陵凡有問無不知者其在北門因便殿賜坐對甚從容上因問墨知墨允是何人彭年曰伯夷叔齊也上問見何書曰春秋少陽即令祕閣取此書既至彭年令於第幾板尋檢果得之上極喜自是注意未幾執政道山清話石浮於江葉曙字杲卿錢塘人師事林逋天禧末錢塘有巨石浮於江太守問逋逋以問杲卿乃按樵子五行志以應曰其當在萬乘乎未幾真宗上仙於是人服杲卿多聞而始知樵子為奇書也天中記卷二十五
