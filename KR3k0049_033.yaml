body:
  text: 卿卿慶也言萬物皆慶賴之又卿章也言貴盛章著也釋名卿彰也明也言當背邪向正彰有道德也漢官卿之為言彰也章善明治也大夫之為言大抵進人者也故傳曰進賢達能謂之大夫也士者事也任事之稱也故傳曰古今辨然否謂之士白虎通齊侯使敬仲陳公子完為卿辭曰羈旅之臣幸若獲宥及於寬政赦其不閑於教訓而免於罪戾弛於負擔君之惠也所獲多矣敢辱高位以速官謗請以死告莊二十二悼公使張老為卿辭曰臣不如魏絳夫絳之知能治大官其仁可以利公室不忘其勇不疚於刑其學不廢其先人之職若在卿位外內必平且雞丘之會其官不犯而辭順不可不順也公五命之固辭乃使為司馬使魏絳佐新軍晉語楚昭王失國屠羊說走而從於昭王王謂司馬子綦曰屠羊說居處卑賤而陳義甚高為我延之以三旌之位屠羊說曰夫三旌之位吾知其貴於屠羊之肆也萬鍾之祿吾知其富於屠羊之利也然可以竟貪爵祿而使吾君有妄施之名乎說不敢當願復反吾屠羊之肆遂不受也莊讓王注三旌三公位也司馬本作三珪云諸侯之三卿皆執珪者虞卿再說虞卿者游說之士也躡蹻擔簦說趙孝成王一見賜黃金百鎰白璧一雙再見為趙上卿故號為虞卿史記虞卿躡步擔簦說趙君一說贈金百鎰再說以為上卿古史考巧宦汲黯姊子司馬安文深巧善宦四至九卿漢書潘岳嘗讀汲黯傳至司馬安四至九卿而良史題之以巧宦之目未嘗不慨然廢書而歎閑居賦再至濮陽段宏始事蓋侯王信信宏官任亦再至九卿然衛人仕者皆嚴憚汲黯出其下黯傳韋玄成作詩戒示子孫曰明明天子俊德烈烈不遂我遺恤我九列注九列卿之位漢書更始時其所授官爵者皆群小賈豎豫章李淑上書諫曰夫三公上應台宿九卿下括河海故天工人其代之今卿公大位莫非戎陳尚書顯官皆出庸伍資亭長賊捕之用而當輔佐綱維之任唯名與器聖人所重敗財傷錦所宜至慮後漢位亞三事順帝時大司農劉據以職事被譴召詣尚書傳呼促步又加以捶撲左雄上言九卿位亞三事班在大臣行有佩玉之節動有庠序之儀孝明皇帝始有撲罰皆非古典帝從而改之其後九卿無復捶撲者上王昹課事云卿考課一曰掌建邦國以考制治二曰九卿時敘以考事典三曰經綸國體以考奏議四曰其厲眾職以考摠攝五曰明慎用刑以考留獄也北堂古者天子諸侯皆名執政大臣曰正卿自周以來始有三公九卿之號漢世雖號九卿其官無卿字至梁始加卿字梁又象四時置十二卿後魏依南齊以前置九卿又各加少卿焉唐龍朔二年加正卿以別少卿初學記五代史百官志麟德二年將有事於泰山有司議依舊禮皆以太常卿為亞獻光祿卿為終獻劉祥道駮曰昔在三代六卿位重故得佐祠漢魏以來權歸臺省九卿皆為常伯屬官今登封大禮不以八座行事而用九卿無乃徇虛名而忘事實乎高宗從其議竟以司徒徐王元禮為亞獻祥道為終獻舊唐韋洪景以直道進議論持正有守當時風教所倚賴為長慶名卿本傳列棘九卿位為列棘作事成務南史通寒暑伊尹曰三公調陰陽九卿通寒暑晉志主治萬事三公北三星曰九卿內坐主治萬事隋志展廢良子而立太叔弟曰國卿君之貳也民之至也不可以茍請舍子明之類曰無昭惡也襄二十二歸嚮卿嚮也言為人所歸嚮也玉海昔舜攝帝位命伯夷作秩宗掌三禮即其任也周時曰宗伯是為春官掌禮樂秦改曰奉常漢更名曰太常應劭曰欲令國家盛大社稷常存故稱太常前漢常以列侯忠孝敬慎者居之後漢不必列侯也宋志應劭曰常典也掌典三禮也師古曰太常王者旌旗也畫日月焉王有大事則建以行禮官主奉持之故曰奉常也後改為太常尊大之義也漢書九卿之首太常社稷郊畤事重職尊故在九卿之首解詁高祖滅秦已登尊號群臣飲爭功醉或妄呼拔劍擊柱高祖患之於是叔孫通進說遂設綿蕝野外習之月餘通曰可試觀上使行禮畢復置法酒無敢讙譁失禮者高祖曰吾乃今日知為皇帝之貴也拜通太常賜金五百斤史紀通起朝儀帝拜為奉常前叔孫傳惠帝即位迺謂通曰先帝園陵寢廟群臣莫習徙通為奉常定宗廟儀法及稍定漢諸儀法皆通所論著也漢書文學晁錯以文學為太常掌故不事權貴杜業有才能選為太常數言得失不事權貴桓榮拜為太常榮初遭倉卒與族人桓元卿同飢戹而榮講誦不息元卿嗤榮曰但自苦氣力何時復施用乎榮笑不應及為太常元卿來候榮榮諸弟子謂曰平生笑盡氣力今何如元卿嘆曰我農家子豈意學之為利乃若是哉明帝即位尊以師禮乘輿嘗幸太常府令榮坐東面設几杖會百官驃騎將軍東平王蒼以下及榮門生數百人天子親自執業時執經生避位發難上謙曰太師在是既罷悉以大官供具賜太常家其恩禮若此桓榮子郁永元四年代丁鴻為太常初榮受朱普學章句四十萬言減其煩辭後郁又刪之由是有桓君大小太常章句周澤字穉都少修高節耿介特立好學問治嚴氏春秋門徒數百人隱居上野不汲汲於時俗拜太常果敢直言數有據爭朝廷嘉其清廉東觀漢記張奐字然明拜太常卿奐有清節可否之間強禦不可奪也該覽群籍古今詳備續後漢書劉愷為太常論議常引正大義諸儒為之語曰難經伉伉劉太常華嶠後漢書咸熙五年詔曰華表字偉容清賢履道內貞外順歷位忠恪言行不玷其以表為太常卿臧榮緒晉書安帝三年太常臨川王寶啟府舍窄狹不足移家母鍾年高違離靡寧乞還第攝事詔聽之晉起居注蔡謨字道明拜太常咸康四年臨軒門下奏非祭祀宴饗則無設樂謨奏宜有金石顯宗納焉臨軒作樂自此始也中興書賀循字彥先元帝以循為太常而散騎常侍如故循以元卿舊不加官唯拜太常而已中宗踐祚下令曰循水清玉潔行為俗表加以位處上卿居身服物蓋身而已屋裁庇風雨孤常造其廬特以為賜以六尺床席褥并錢二十萬以表至德上建元元年詔曰太常職典天地兼掌宗廟其為任可謂重矣是以古今選建未嘗不妙簡時望兼收儒雅會稽王淑履尚清虛志道無倦優游諷議朕所𧫎仰其以王領太常本官如故上漢武初號建元文景子無會稽王此晉康帝建元元年詔也萬卷菁華云前漢武帝本紀合璧云漢武帝制俱誤張瓌以雍州刺史拜太常自謂閑職武帝曰卿輩未富貴謂人不與既富貴復欲委去之瓌曰陛下御臣等若養馬無事就閑廄有事復牽來帝猶怒遂以為散騎常侍齊書長孫紹遠為太常廣召工人制樂器土木絲竹各得其宜唯黃鍾不調紹遠每以為意常因退朝經韓使君佛寺前過浮圖三層之上有鳴鐸焉忽聞其意雅合宮調取而配奏方始克諧後周書斛斯徵遷太常卿自魏孝武西遷雅樂廢缺徵傳採遺逸稽諸典故創新改舊方始備焉又樂有錞于者近代絕無此器或有自蜀得之皆莫之識徵見之曰此錞于也眾弗之信徵依于寶周禮注以芒筒桴之其聲極振眾乃歎服徵乃取以合樂焉上互見博學復求太常李元忠為侍中雖處要任殊不以務物干懷唯以聲酒自娛大率常醉家事大小了不關心園庭羅種果藥親朋尋詣留連宴賞每挾彈攜壺遊遨里閈每言寧無食不可使無酒阮步兵吾師也元忠嘗為太常卿後自中書令復求為太常以其有音樂而多美酒故神武欲用為僕射文襄言其放達常醉不可委以臺閣其子聞之請節酒元忠曰我謂作僕射不勝飲酒樂你愛僕射時宜勿飲酒北史捉筆賦詩楊師道字景猷為太常卿師道善草隸工詩每與有名士燕集歌詠自適帝見其詩為摘諷嗟賞後賜宴帝曰聞公每酣賞捉筆賦詩如宿構者試為朕為之師道再拜少選輒成無所竄定一坐嗟服唐書竇誕為太常奏用音聲博士皆為大樂鼓吹官僚於後彈胡琵琶胡人白胡達竹伯夷積勞計考並至大官自是以聲伎入流品者蓋以百數舊唐崔邠拜太常卿故事太常卿初上大閱四部樂於官署觀者縱焉邠自私第去帽親導母轝公卿見者皆避道都人榮之上趙宗儒為太常卿太常有師子樂備五方之色非會朝聘饗不作幼君荒誕伶官縱肆中人掌教坊者移牒取之宗儒不敢違以狀白宰相以為事在有司執守何必關白以宗儒懦怯不任事改太子少師上崔日知遷太常卿自以歷任年久每朝士參集尚與尚書同列時人號為尚書裏行遂為口實國史補互見樓江南陳彭年學書史於禮文尤所詳練歸朝列于侍從朝廷郊廟禮儀多委彭年裁定援引故事頗為該洽常攝太常卿尊駕誤行黃道上有司止之彭年正色回顧曰自有典故禮曹素畏其該洽不復敢詰問筆談宗官唐虞歷三代以宗官典國之禮漢之太常是也周禮春官注宗卿清重歷選所難漢晉已降莫非素範辭爵則桓郁張奮讓封則丁鴻劉愷潘泥之文雅純深華表之從容退嘿自此迄茲風流繼軌梁陸倕表太常卿位任特隆學冠儒林藝通禮樂者可以居之職員令秩宗太常寺古曰秩宗唐志容臺太常曰容臺類要禮寺唐曰司禮寺唐志又曰禮院杜牧之行杜濛制立國之本禮樂為先今之太常兼掌其事歷代迄今謂之清選白居易制劉賓客為杜佑謝男師損等授官表云太常實禮樂之司非儒者勿履本集聲禮之司本寺禮儀聲樂之司官屬亦妙選才也兩京記韓愈為權德輿墓碑景明初班職令太常少卿第一清選明禮兼天文陰陽者為之後魏書元順為太常少卿以父憂去職哭泣嘔血身自負土時年二十五便有白髮免喪抽去不復生當時人以為孝感所致上帝使少卿祖孝孫以樂律授宮中音樂伎不進數被讓王珪與溫彥博同進曰孝孫修謹士陛下使教女樂又責誚之天下其以士輕乎舊唐張文收尤善音律太宗將創制禮樂召文收於太常令與少卿祖孝孫參定雅樂有古鐘十二近代唯用其七餘有五俗名啞鐘莫能通者文收吹律調之聲皆響徹時人服其妙上宗讓中令薛稷遷太常少卿睿宗以鍾紹京為中書令稷勸令禮讓因入言於帝曰紹京素無才望出自胥吏雖有功勳未聞令德一朝超居元宰師長百寮臣恐清濁同貫失於聖朝具瞻之美帝然其言因紹京表讓遂為戶部尚書上韋萬石頗有學業而特善音律上元中自吏部郎中遷太常少卿當時郊廟樂調及讌會雜樂皆萬石與太史令姚玄辯增損之時人以為稱職上鄭肅太和六年轉太常少卿肅能為古文長於經學左丘明三禮儀注疑議博士已下必就肅決之時魯王永有寵文宗擇名儒為其府屬以肅本官兼長史由是知名後魯王為太子以楊妃故得罪會昌初武宗思太子永之無罪盡誅陷永之黨朝議稱肅忠正有大臣之節召拜太常卿上馮定字介夫儀貌壯偉與兄宿俱有文學而定過之貞元中皆舉進士時人比之漢朝二馮君太和九年為太常少卿文宗每聽樂鄙鄭衛聲詔奉常習開元中霓裳羽衣舞以雲韶樂和之舞曲成定惣樂工閱於庭定立於其間文宗以其端凝若植問其姓氏翰林學士李玨對曰此馮定也文宗喜問曰豈非能為古章句者耶乃召昇階文宗自吟定送客西江詩吟罷益喜因錫禁中瑞錦仍令大錄所著古體詩以獻尋遷諫議大夫知匭事上陶覆之字孫宗為太常丞凡宗廟疑議多所決定時人為之語曰定禮決疑問陶覆之陶家家傳聞曲光宅中改太常為司禮天后時李嗣真為司禮丞聞東夷三曲一遍援胡琴彈之無一聲遺忘職林聞曲知難作李嗣真字承胄擢太常丞知五禮儀常曰隋樂府有堂堂曲明唐再受命比日有側堂堂橈堂堂之謠側不正也橈危也皇帝病日侵事皆決中宮持權與人收之不易宗室雖眾居中勢外勢且不敵諸王殆為后所蹂踐吾見難作不久矣唐書沽洗編鐘宋沇為太常丞嘗一日早於光宅佛寺待漏聞塔上風鐸聲傾聽久之朝迴復止寺舍問寺主僧曰上人塔鈴皆知所自乎曰不能知沇曰其間有一是古製某請一登塔循金索試歷扣以辨之可乎僧初難後許乃扣而辨焉在寺之人即言往往無風自搖洋洋有聞非此耶沇曰是耳必因祠祭考本懸鐘而應之固求摘取而觀之曰此姑洗之編鐘耳請旦獨掇於僧庭歸太常令樂工與僧同臨之約其時彼知本懸此果應遂購而獲焉又曾送客出通化門逢度支運乘駐馬俄頃忽草草揖客別乃隨乘行認一鈴言亦編鐘也他人但覺鎔鑄獨工不與眾者埒莫知其餘及配懸音形皆合其度異乎此亦識徵在金奏者與羯鼓錄太常博士掌辨五禮之儀式本先王之法制通變隨時而損益焉凡大祭祀及有大禮則與卿導贊其儀凡王公已下擬謚皆跡其功德而為之褒貶六典博士之職端委佩玉朝之大典必於詢度當以正道克厭人望然後為可晉中興書張憑舉孝廉詣劉真長還船須臾真長遣覓張孝廉船同旅愕然既同載俱詣撫軍劉真長謂撫軍曰今日為公得一士太常博士之選既前撫軍與之言咨嗟稱善乃曰張憑勃窣為理窟即用為太常博士莊子圖釋象經太宗嘗覽周武帝所撰三局象經不曉其旨太子洗馬蔡允恭年少時嘗為此戲太宗召問亦廢而不通乃召呂才使問焉才尋繹一宿便能作圖解釋允恭覽之依然記其舊法與才正同由是才遂知名累遷太常博士初溫彥博奏才聰明多能眼所未見耳所未聞一聞一見皆達其妙尤長於聲樂請令考之太宗即徵才令直弘文館舊唐呂才為太常博士帝病陰陽家所傳書多謬偽淺惡世益拘畏命才與宿學老師刪落煩訛掇可用者為五十三篇合舊書四十七凡百篇詔頒天下才於持議儒而不俚以經誼推處其驗術諸家共訶短之又舉世相惑以禍福終莫悟云才之言不甚文要欲救俗失切時事俾易曉也新韋叔夏除太常博士後屬高宗崩山陵舊儀廢缺叔夏與中書舍人賈大隱太常博士裴守真等草創撰定由是授春官員外郎則天將拜各及饗明堂皆別受制共當時大儒祝欽明郭山惲撰定儀注凡立議眾咸推服之中宗復位轉太常少卿上唐紹為博士中宗時始郊祝欽明知韋后能制天子欲迎諂之即奏以皇后亞獻安樂公主終獻紹以為非禮引誼固爭唐書博士蔣欽緒抗言不可諸儒壯其節上中宗將為韋后父酆王陵廟各置五品令太常博士楊孚曰興寧永康陵尚置七品令酆王不可上踰先帝又勑武氏崇恩廟齋郎以五品子充孚曰太廟齋郎尚取七品以下子武氏不宜取五品也上曰太廟可准崇恩置孚曰崇恩為太廟之臣太廟為崇恩之君以臣准君猶為僣逆以君准臣奈天下何事皆寢通典袁利正高宗時為博士上疏諫以為前殿路門非命婦宴會倡優進御之所帝納之詔曰嘉卿奕由忠鯁能抗疏規朕之失乃賜物百段職林陳貞節遷太常博士與博士蘇獻上言睿宗於孝和弟也按賀循說兄弟不相為後故殷盤庚不序陽甲而上繼先君漢光武不嗣孝成而上承元帝晉懷帝繼世祖不繼惠帝故陽甲孝成出為別廟又言兄弟共世昭穆位同則毀二廟有天下者從禰而上事七廟尊者所統廣故及高祖若容兄弟則上毀祖考天子不得全事七世矣請以中宗為別廟大祫則合食太祖奉睿宗繼高宗則祼獻永序詔可乃奉中宗別廟升睿宗為第七室唐書裴寬為太常博士禮部擬國忌之辰饗廟用樂下太常寬深達禮節特建新意以為廟尊忌卑則登歌廟卑忌尊則去籥中書令張說謂寬明識舉而行之開元中以太常禮儀聲樂之司屬亦擇才博士尤為清雅雍洛靈異錄陸亘字景山拜太常博士寺有禮生孟真久於其事凡吉凶大儀禮官不能達率訪真真亦倚以倨橫賴是須要元和七年冊皇太子將撰儀注真參議偃蹇亘台之胥曹失色由是國忌饗禮不專於胥吏唐書王彥威太原人世儒家少孤貧苦學尤通三禮無由自達元和中遊京師求為太常敬吏部卿知其書生補為檢討官彥威於禮閣掇拾自隋已來朝廷沿革吉凶五禮以類區分成三十卷獻之號曰元和新禮由是知名特授太常博士上崔龜從字玄告太和二年改太常博士龜從長於禮學精歷代沿革問無不通時饗宗廟於敬宗室祝板稱皇帝孝弟龜從議曰臣審詳孝字載考禮文義本主於子孫理難施於兄弟按禮卜虞之記文子孫曰哀兄弟曰其於祖禰則理宜稱考於伯仲則止可稱名又東晉溫嶠議宗廟祝辭於孝字非子者則不稱傍親直言敢告當時朝議以為宜今臣上考之禮經無兄弟稱孝之義下徵晉史有不稱傍親之文臣謂饗敬宗廟宜去孝弟兩字又以祀九宮壇舊是大祠龜從議曰九宮貴神經典不載詳其圖法不過列宿今者五星悉是從祀日月猶在中祠豈容九宮獨越常禮請降為中祠制從之龜從又以大臣薨謝不於聞哀日輟朝奏議曰伏以廢朝軫悼義重自頃已來輟朝非奏報之時備禮於數日之外貞觀中任瓌卒有司對仗奏聞太宗責其乖禮岑文本既歿其夕為罷警嚴張公謹之亡哭之不避辰日是知閔悼之意不宜過時縱有機務急速便殿須召宰臣不臨正朝無爽事體從之舊唐崔龜從記曰博士重官也由此選者繼登三事而入並時同位者相望元和初權德輿李吉甫同在相位長慶中竇易直在中書杜元預提印使西蜀今僕射相公始與鄭肅中與韋琮同居中書余復叨重委因志所聞以遺他日亦以知博士之選為重焉時令狐綯父楚亦以博士入相時人榮之續通典集禮院令狐綯守兵侍同平章事其日南省上事故事送上而同列必先集於少府監時白敏中崔龜從皆為太常博士至相位欲榮其舊署乃改集太常禮院因改為集禮院龜從手筆志其事上令狐楚曰叔孫通起帝典於桴鼓之中自比以還鴻生碩儒若賈誼董仲舒公孫洪稀不以此進元帝詔丞相御史明於古今通達國體故為博士今行能在臣右者知其班末祿寡莫不以博士為愧臣獨以為榮詳曲臺之儀法攷庶僚之功行太常三卿始涖事博士無參集之禮晏公類要楊收字藏之裴休作相以收深于禮學用為太常博士建言漢制總群官而聽曰省分務而專治曰寺太常分務專治者也所以藏天子之旂常今旂常因車飾隸太僕非是唐書廷尉古官以尉尉人心也凡掌賊及司察之官皆曰尉尉罻也言以兵獄羅罻姦非也猶刺史刺舉不法也韋昭辨釋名王者置廷尉讞疑刑者官之平下之信也尉者尉民心撫其實也安立字士垂一人詰屈折著為廷示戴尸首以寸者為言寸度治法數之分示帷尸稽於寸舍則法有分故為尉示與尸寸宋均注曰士事也垂係也屍人死也人死不可無乃戴之者示天下不可無死也春秋元命包平星平星主建廷平主平天下之獄事若今廷尉之象故星讚曰平星執法正綱紀也天文錄齊職儀云大理古官也唐虞以皋陶作士士理官也初秦置廷尉漢景帝改曰大理王莽改曰作士初學記過聽請死晉文侯使李離為大理過聽殺人自拘於廷請死于君君曰官有貴賤罰有輕重下吏有罪非大子罪也李離對曰臣居官為長不與下吏讓位受爵為多不與下吏分利今過聽殺人而下吏蒙其死非所聞也不受命君甲子必自以為罪則寡人亦有罪矣李離曰法失則刑刑失則死君以臣為能聽微決疑故使臣為理今過聽殺無罪罪當死君曰棄位委官伏法亡國非所望也趣出無憂寡人之心李離對曰政亂國危君之憂也軍敗卒亂將之憂也夫無能以事君闇行以臨民是無功以食祿也臣不能以虛自誣遂伏劍而死君子聞之曰忠矣乎韓詩外傳楚令尹文子之族有干法者廷理拘之聞其令尹之族也而釋之子文召廷理而責之曰凡立廷理者將以司犯王法而察觸國法也夫直士持法柔而不撓剛而不折棄法而背令而釋犯法者是為理不端而懷心不公也豈吾營私之意也何廷理之駮於法也吾在上位以率士民士民或怨而吾不能免之於法今吾族犯法甚明而使廷理因緣吾心而釋之是吾不公之心明著於國也執一國之柄而以私聞於吾生不以義不若吾死也遂致其族人於廷理曰不是刑也吾將死廷理懼遂刑其族人成王聞之不及履而至于子文之室曰寡人幼少置理失其人以違夫子之意於是黜廷理而尊子文使及內政國人聞之曰若令尹之公也吾黨何憂乎乃相與作歌曰子文之族犯國法程廷理釋之子文不聽恤顧怨萌方正公平說苑社稷臣楚莊王有茅門者法曰群臣大夫諸公子入朝馬蹄蹂霤廷理斬其輈而戮其御太子入朝馬蹄蹂霤廷理斬其輈而戮其御太子大怒入為王泣曰為我誅廷理王曰法者所以敬宗廟尊社稷故能立法從令尊敬社稷者社稷之臣也安可以加誅夫犯法廢令不尊敬社稷是臣弁君下陵上也臣弁君則主失威下陵上則上位危社稷不守吾何以遺子太子乃還走避舍再拜請死上不敢失法楚昭王有士曰石奢其為人也公正而好義王使為理於是廷有殺人者石奢追之則其父也遂反於廷曰殺人者僕之父也以父成政不孝不行君法不忠弛罪廢法而伏其辜僕之所守也伏斧鑕命在君君曰追而不及庸有罪乎子其治事矣石奢曰不私其父非孝也不行君法非忠也以死罪生非廉也君赦之二之惠也臣不敢失法下之行也遂不離斧鑕刎頸而死于廷中君子聞之曰貞夫法哉新序樹德季羔為衛之士師則人之足俄而衛為蒯聵之亂季羔逃之走郭門刖者守門焉謂季羔曰彼有竇季羔曰君子不踰又曰彼有竇季羔曰君子不隧又曰於此有室季羔乃入焉既而追者罷季羔將去謂刖者吾不能虧主之法而親刖子之足矣今吾在難此正子之報怨之時而逃我三何故哉刖者曰斷足固我之罪也無可奈何曩者君治臣以法令先人後臣欲臣之免也臣知之獄決罪定臨當論刑君愀然不樂見君顏色臣又知之君豈私臣哉天生君子其道固然此臣之所以脫君也孔子聞之曰善哉為吏其用法一也思仁恕則樹德加嚴暴則樹怨公以行之其子羔乎家語天下之平張釋之為廷尉文帝嘗行有人從渭橋下出乘輿馬驚捕之屬廷尉釋之奏其犯蹕當罰金上怒釋之曰法者所與天下公共也方是時上誅之則已今已下廷尉廷尉天下之平也一傾天下用法皆為之輕重人安所措其手足乎後有盜高廟座前玉環得文帝令族之釋之奏當棄市上大怒釋之曰法如是也今盜宗廟器而族之如令愚人取長陵一抔土陛下何以加其法乎前漢于定國為廷尉為人謙恭尤重經術其決獄平法務在衰鰥寡罪疑從輕加審慎之心朝廷稱之曰張釋之為廷尉天下無冤民于定國為廷尉民自以不冤上潘岳楊荊州誄曰惟此大理國之憲章君蒞其任視民如傷庶獄明慎刑辟端詳聽參皋呂稱侔于張選皋皋陶也虞書曰帝曰皋陶汝作士明于五刑呂呂侯為周王司寇周書曰穆王訓夏贖刑作呂刑號稱詳平孔光為廷尉光久典尚書練法令號稱詳平時定陵侯淳于長坐大逆誅長小妻迺始等六人皆以長事未發覺時棄去或更嫁及長事發丞相翟方進等議迺始等於法無以解請論光以為夫婦之道有義則合無義則離迺始等或更嫁義已絕而欲以為長妻論殺之名不正不當坐有詔光議是前漢范延壽宣帝時為廷尉時燕趙之間有三男共娶一妻生四子長各求離別爭財分子至聞于縣縣不能決斷讞之于廷尉於是延壽決之以為悖逆人倫比之禽獸生子屬其母以子並付母尸三男于市奏免郡太守令長等無師化之道天子遂可其言謝承後漢書盛吉字君達為廷尉性多哀憐其妻謂吉曰君為天下執法不可使一人濫罪殃及子孫其囚無胤嗣者令其妻妾得入使有遺類視事十二年天下稱有恩會稽典錄郭躬字仲孫元和三年為廷尉家世掌法務在寬平及典理官決獄斷刑多依矜恕躬弟子鎮自廷尉左監遷廷尉凡郭氏為廷尉者七人後漢永元六年陳寵代郭躬為廷尉性仁矜及為理官數議疑獄常親自為奏每附經典務從寬恕帝輒從之濟活者甚眾其深文刻敝於此少衰寵又鉤校律令條法溢於甫刑者除之贊曰陳郭主刑人賴其平上法名家順帝時廷尉河南吳雄季高以明法律斷獄平起自孤宦致位司徒雄少時家貧喪母營人所不封土者擇葬其中喪事趣辦不問時日醫巫皆言尚族滅而雄不顧及子訢孫恭三世廷尉為法名家上施恩開怨范堅字子常為廷尉奏王典吏邵廣盜官幔合布四十疋依律棄市廣息雲宗二人自沒為官婢奴以贖父尚書議可特聽堅駁之曰此為施一恩於今開萬怨於後顯宗從之正廣刑晉中興書文帝時議置六卿將除大理盧道思奏曰省有駕部寺留太僕省有刑部寺除大理斯則重畜產而賤刑名也隋書唐臨為大理卿初蒞職斷一死囚先時坐死者十餘人皆他官所斷會太宗幸寺親錄囚徒他官所斷死囚稱冤不已臨所斷者嘿而無言太宗怪之問其故囚對曰唐卿斷臣必無枉濫所以絕意太宗歎息久之曰為獄固當若是囚遂見原太宗親為之考詞曰形若灰死心如鐵石唐新語二唐俱作高宗新唐自述其考云張文礶遷大理卿至官旬日決遣疑事四百餘條無不允當自是人有抵罪者皆無怨言文礶嘗有疾繫囚相與齋禱願其視事當時咸稱其執法平恕以比戴胄上元二年拜侍中兼太子賓客大理諸囚聞文礶改官一時慟哭其感人心如此舊唐大理卿袁仁敬暴卒繫囚聞之皆慟哭歌曰天不恤冤人兮何遽奪我慈親兮有理無申兮痛哉安訴陳兮通典開元二十一年事詳刑龍朔二年改大理為詳刑光宅元年改為司刑舊王正雅字光謙穆宗時為大理卿會宋申錫事起獄自內出卒無證驗是時王守澄之威權鄭注之寵勢雖宰相重臣無敢顯言其事者唯正雅與京兆尹崔綰上疏請出造事者付外考驗其事別具狀聞由是獄情少緩申錫止於貶官中外翕然推重之上張仁愿開運初為大理卿隰州刺史王澈犯贓朝廷以功臣子欲宥之仁愿執奏竟遣伏法議者賞之執方廷尉卿梁國初建曰大理天監元年復改為廷尉有正監平三人元會廷尉三官與建康三官皆法冠玄衣朝服以監東西中華門手執方木長三尺方一寸謂之執方唐官品志廷尉少第四品上第二請用思理平允斷明刑職法者後魏職令宋世軌為廷尉少卿時大理正蘇珍之亦以平幹知名寺中為之語曰決定嫌疑蘇珍之視表見裏宋世軌時人以為寺中二絕卒官廷尉御史諸囚皆哭曰宋廷尉死我等豈有生路也北齊書趙綽為大理少卿時刑部侍郎辛亶嘗衣緋褌俗云利於官上以為厭蠱將斬之綽曰據法不當死臣不敢奉詔上怒甚謂綽曰卿惜辛亶而不自惜也命左僕射高熲將綽斬之綽曰陛下寧可殺臣不得殺辛亶至朝堂解衣當斬上使人謂綽曰竟何如對曰執法一心不敢惜死上良久乃釋之他日又令斬二人綽曰此人當坐杖殺之非法上曰不關卿事綽曰陛下置臣法司欲誤殺人豈得不關臣事上曰撼大木不動者當退綽曰臣冀撼感天心何論撼動木上乃止時薛胄為大理卿俱名平恕胄斷獄以情而綽守法俱為稱職隋書正人戴胄有幹局明法令太宗常謂侍臣曰大理之職人命所懸當須妙選正人用心存法無過戴胄者乃以為大理少卿唐新語胄性既強正處斷明速議者以為法官稱職事無冤濫武德以來一人而已舊徐有功名弘敏以字行轉司刑少卿與皇甫文備同按獄誣有功縱逆黨久之文備坐事下獄有功出之或曰彼嘗陷君於死今生之何也對曰爾所言者私忿我所守者公法不可以私害公新嘗謂所親曰今身為大理人命所懸必不順旨詭辭以求茍免故前後為獄官以諫奏枉誅者三經斷死而執志不渝酷吏由是少衰時人比漢之于張焉或曰若獄官皆然刑措何遠舊初鹿城主簿潘好禮慕有功為人論之曰昔稱張釋之為廷尉天下無冤人然釋之當漢文帝時中外無事守法而已有功居革命之際周興來俊臣等掩義隱賊崇飾惡言以誣盛德有功守死明道身濱殆者數矣此其賢於釋之明甚或稱有功仁恕過漢于張起居舍人盧若虛曰徐公當雷霆之震而能全仁恕雖千載未見其比新猗歟徐公獬豸之精世皆紛濁不改吾清舊讚崔昇兄玄暐知政事先是來俊臣周興等誣陷良善冀圖爵賞因緣籍沒者數百家玄暐固陳其枉狀則天乃感悟咸從雪冤則天季年宋璟劾奏張昌宗謀為不軌玄暐亦屢有讜言則天乃令法司正斷其罪玄暐弟昇時為司刑少卿又請寘以大辟其兄弟守正如此舊桓彥範為司刑少卿凡所奏議若逢人主詰責則辭色無懼爭之愈厲又嘗謂所親曰今既躬為大理人命所懸必不能順旨詭辭以求茍免上太和四年大理少卿崔杞奏大理寺即陛下守法之司一定之制不可搖動若朝示而暮改同罪而異刑則人何所措其手足哉續通典守法權善才高宗朝為將軍中郎將范懷義宿衛昭陵有飛騎犯法善才繩之飛騎因番請見先涕泣不自勝言善才等伐陵柏大不敬高宗悲泣不自勝命殺之大理丞狄仁傑斷善才罪止免官高宗大怒命促行刑仁傑曰法是陛下法臣但守之奈何以數株小柏而殺兩臣請不奉詔高宗涕泣曰善才斫我父陵上柏我為子不孝以至是知卿好法官善才等終須死仁傑固諫侍中張文瓘以笏築令出高宗曰善才情不可容法雖不死朕之恨深矣須法外殺之仁傑曰陛下作法懸諸象魏徒流及死具有等差豈有罪非極刑特令賜死法既無恒萬方何所措其手足陛下必欲變法請今日為始高宗意乃解曰卿能守法朕有法官命編入史又曰仁傑為善才正朕豈不能為朕正天下耶授試御史大唐新語杜景儉徐有功並為司刑丞與來俊臣侯思正同制獄人稱之曰遇徐杜必生遇來侯必死通典李日知為司刑丞嘗免一死囚少卿胡元禮硬判殺之與日知往復至于再三元禮怒遣府吏謂曰元禮不離刑曹此囚無活法日知報曰日知不離刑曹此囚無死法竟以兩聞日知果直唐新語茂陵何比干漢武時丞時公孫弘舉為廷尉右平獄無冤民號曰何公三輔決錄注比干學尚書於晁錯武帝時為廷尉正與張湯同時湯持法深而比干務仁恕數與湯爭雖不能盡得然所濟活者以千數後何敞傳比干字少卿何敞六世祖也經明行修兼通法律為汝陰縣獄吏決曹掾平活數千人後為丹陽都尉獄無冤囚淮汝號曰何公征和三年三月辛亥天大陰雨比干在家日中夢貴客車騎滿門覺以語妻語未已而門有老嫗可八十餘頭白求寄避雨雨甚而衣履不霑漬雨止送出門乃謂比干曰公有陰德今天錫君策以廣公之子孫因出懷中符策狀如簡長九寸凡九百九枚以之授比干子孫佩印綬者當如此算比干五十八歲有六男又生三子本始元年自汝陰徙平陵代為名族何氏家傳黃霸字次公昭帝時俗吏尚嚴酷以為能而霸獨用寬和為名會宣帝即位在民間時知百姓苦吏急也聞霸持法平召以為廷尉正數決疑獄庭中稱平守丞相長史坐公卿大議庭中知長信少府夏侯勝非議詔書大不敬霸阿從不舉劾皆下廷尉繫獄當死霸因從勝受尚書獄中再隃久積三歲迺出漢書南土秀望顧榮字彥先入洛以南土秀望累遷廷尉正晉書中興顧恊少清介有志操初為廷尉正冬服單衣薄寺卿蔡法度欲解褐與之憚其清嚴不敢發口謂人曰我願解身上襦與顧郎顧郎難衣食者竟不敢以遺之南史蘇瓊為廷尉正時畢義雲為御史中丞以猛暴任職理官忌憚莫敢有違瓊推察務在得情雪者甚眾寺署臺按始自於瓊也北史王志愔為大理正奏言法令者人之隄防不立則人無所禁竊見大理官員多不奉法以縱罪為寬恕以守文為苛刻遂上應正論以見志唐書宣帝詔曰今遣廷史與郡鞠獄任輕祿薄其為置廷平秩六百石員四人其務平之以稱朕意於是選于定國為廷尉求明察寬恕黃霸等以為廷平獄刑號為平矣時涿郡太守鄭昌上疏言聖王置諫爭之臣者非以崇德防逸豫之生也立法明刑者非以為治救衰亂之起也今明主躬垂明聽雖不置廷平獄將自正若開後嗣不若刪定律令律令一定愚民知所避奸吏無所弄矣今不正其本而置廷平以理其末也政衰聽怠則廷平將招權而為亂首矣宣帝始置左右而決錄注云何比干漢武帝為廷尉右平謬矣漢書通典據家傳則與前後書俱不同馬宮字游卿為丞相史司直師丹薦宮行能高潔遷廷尉平漢書顧榮遷廷尉平時趙王倫誅淮南王允收允官屬下廷尉議罪榮具明刑理不宜廣濫倫意解賴榮濟者甚眾晉中興書上便宜事何攀字惠興居心平允蒞官整肅為滎陽令上便宜十事甚得名稱除廷尉平時廷尉卿諸葛冲以攀蜀士輕之及攀斷疑冲始歎服晉書則天時左臺御史中丞來俊臣司刑評事康曄衛遂忠等同惡相濟招集無賴數百人令其告事共為羅織千里響應舊唐詰對五六延和中沂州人有反者詿誤坐者四百餘人將隸餘于司農未即路繫在州獄大理評事敬昭道援赦文判而免之時宰相切責大理奈何免反者家口大理及正等失色引昭道以見執政執政怒而責之昭道曰赦云見禁囚徒沂州反者家口並繫在州獄此即見禁也反覆詰對至于五六執政無以奪之詿誤者悉免唐新語杜暹授鄭尉以清節見知華州司馬楊孚公宜士也深賞重之孚遷大理正暹坐公事下法司結非孚謂人曰若此尉得罪則公清之士何以勸矣特薦之於執政由是擢拜大理評事三緊吏部銓注拾遺評事赤尉才望清高標格孤秀者署為之俗號三緊官拾遺立緊以其行立在北省之次獻可替否也評事出緊以其術恩按覆彈射不法也赤尉坐緊以劇縣決遣權豪畏威也入仕之路歷是三官者時輩共以為榮也兩京雜記北寺評刑北寺鷞鳩之政無聞陳子昂集榮加天寵職察雲司上大理曰大棘鄭氏談綺用進丞於棘路往治讞於竹刑胡文恭進丞讞寺上進丞法局上進丞卿讞上治讞之丞上法卿貴丞上往司李法之讞上棘寺初銜命劉喜卿穆王命伯冏為周太僕正作冏命曰命汝作大正正于群僕侍御之臣書太僕長太御中大夫孔注太僕穆王所置也蓋太御眾僕之長中大夫也漢注太僕掌車馬天子出入大駕則奉小駕則御續漢書夏侯嬰高祖為沛公為太僕常奉車竟高祖世以太僕事惠帝惠帝崩以太僕事高后高后崩代王之來嬰與東牟侯入清宮以天子駕迎代王共主文帝後為太僕漢書藝文作灌嬰誤石慶為太僕御出上問車中幾馬慶以策數馬舉手曰六馬慶於兄弟中最為簡易然猶如此漢雜事公孫賀字子叔少為騎士從軍數有功武帝初為太僕後八歲代石慶為丞相子敬聲代為太僕父子並居公卿位上元封三年武帝作柏梁臺詔群臣賦詩太僕賀曰修飾輿馬待駕來古文苑上林賦孫叔奉轡衛公參乘鄭玄曰孫叔者太僕賀也選陳萬年字幼公以高第入為右扶風遷太僕萬年廉平內行修然善事人賂遺外戚許史傾家自盡尤事樂侯史高丞至丙吉病中二千石上謁問疾遣家丞出謝謝已皆去萬年獨留昏夜迺歸及吉病甚上自臨問以大臣行能吉薦于定國杜延年及萬年萬年竟代定國為御史大夫漢書祭彤字坎孫幼有志節建武中拜遼東太守彤有膂力能貫三百斤弓虜每犯塞常為士卒鋒數破走之後徵為太僕彤在遼東三十年衣無兼副顯宗既嘉其功又美彤績詔拜日賜錢百萬馬三匹衣被刀劍下至居室什物大小無不悉備帝每見彤常歎息以為可屬以重任後從東巡狩過魯坐孔子講堂顧指子路室謂左右曰此太僕之室太僕吾之禦侮也東觀記後漢書趙岐初名嘉生於御史臺因字臺卿獻帝時為太僕及李傕寺政使太傅馬日磾撫慰天下以岐為副日磾行至洛陽表別遣岐宣揚國命所到郡縣百姓皆喜曰今日乃復見使者車騎後漢獻帝以岐為太僕持節安慰天下續後漢通典御覽俱同郭展為太僕留心於養畜是以牧馬充牣其後征吳得以濟事晉諸公贊王莽改太僕為太御唐龍朔二年改曰司馭武后光宅元年改曰司僕通典還鄉賜袍張暐為殿中監太僕卿天寶初暐還鄉拜掃特賜錦袍繒綵御賜詩以寵異之乘傳來往勑郡縣供擬暐鬚髮華皓在輿中子弟車馬連接數里衣冠榮之韋弘景遷給事中劉士經以駙馬交通邪倖穆宗用為太僕卿弘景與給事薛存慶封還詔書論士經曰伏以司僕正卿位居九列在周之命伯冏其人所以惟月膺名象河稱重漢朝亦以石慶之謹愿陳萬年之行潔皆踐斯職謂之大寮今士經戚里常人班敘散秩以父任將帥家富資財聲名不在於士林行義無聞於朝野忽長卿寺有瀆官常以親則人物未賢以勳則寵待常厚今叨顯任誠謂謬官其劉士經新除太僕卿勑未敢行下穆宗遣宰臣宣諭弘景等固執如前宰臣不得已改衛尉少卿俱舊唐丞張敬字子高為太僕丞漢書初秦置郎中令掌宮殿門戶及主諸郎之在殿中侍衛故曰郎中令齊職儀謂之郎中令者言領諸郎而為之令長漢官漢武帝更名光祿勳應劭曰光明也祿爵也勳功也言光祿典郎謁者虎賁羽林舉不失德賞不失勞故曰光祿勳應邵鄭玄並云勳猶閽也今光祿勳則古閽之職後漢初學記周文者名仁景帝初為郎中令仁為人陰重不泄常衣弊補衣溺袴故為不潔清以是得幸入臥內於後宮秘戲仁常在旁終無所言上時問人仁曰上自察之然亦無所毀如此景帝再自幸其家上所賜甚多然終常讓不敢受也諸侯群臣賂遺終無所受武帝立為先帝臣重之漢書建元二年郎中令王臧以文章獲罪皇太后以為儒者文多質少以石建為郎中令事有可言屏人恣言極切至廷見如不能言者是以上乃親尊禮之書奏事事下建讀之曰誤書馬字與尾當五今乃四不足一上譴死矣甚惶恐其為謹慎雖他皆如是史記張湛字子孝拜光祿勳光武臨朝或有惰容湛輒陳諫其失常乘白馬帝乘見湛輒言白馬生且復諫矣後漢杜林字伯山從張竦受學愽洽多聞時稱通儒代郭憲為光祿勳內奉宿衛外總三署周密敬慎選舉稱平郎有好學者輒見誘進朝夕滿堂上楊賜字伯欽拜光祿勳光和元年嘉德殿前有赤青氣帝惡之遣中使問賜祥異禍福吉凶所在以賜愽學碩儒故密諮問宜極陳其意賜上疏陳請案春秋讖天投蜺海內亂今妾嬖閹尹共專國朝之所致也謝書郭憲字子橫為光祿勳車駕西征隗囂憲諫曰天下初定車駕未可以動憲乃當車拔佩刀以斷車靷帝不從遂上隴其後潁川兵起乃回駕而還帝歎曰恨不用子橫之言時匈奴數犯塞帝患之乃召百僚廷議憲以為天下疲敝不宜動眾諫爭不合乃伏地稱眩瞀不復言帝令兩郎扶下殿憲亦不拜帝曰常聞關東觥觥郭子橫竟不虛也憲遂以疾辭退卒於家後漢孫堪字子稚為光祿勳以清廉稱與周澤相類澤字稚都京師號為二稚上東觀記作二雅陳蕃字仲舉遷光祿勳時封賞踰制內寵猥盛蕃乃上疏諫曰臣蒙恩聖朝備位九列見非不諫則容悅也夫諸侯上象四七垂耀在天下應分土藩屏上國今近習以非義授邑左右以無功傳賞授位不料其任裂土莫紀其功至乃一門之內侯者數人誠欲陛下從是而止延熹六年車駕幸廣城校獵蕃上疏諫曰安平之時尚宜有節况當今之世有三空之戹哉田野空朝廷空倉庫空是謂三空加兵戎未戢四方離散是陛下焦心毀顏坐以待旦之時也豈宜揚旗曜武騁心輿馬之觀乎上賜穀袁渙字曜卿閎之孫滂之子也時有傳劉備死者群臣皆賀渙以嘗為備舉吏獨不賀卒官太祖為之流涕賜穀二千斛一教以太倉穀千斛賜郎中令之家一教以垣下穀千斛與曜卿家外不解其意教曰以太倉教者官法也以垣下穀者親舊也魏志王肅字子雍為光祿勳時有二魚長尺集于武庫之屋有司以為吉祥肅辨之曰魚生于淵而亢于屋介鱗之物失其所也逢將其殆有棄甲之變乎其後果有東關之敗上孟宗為光祿勳大會宗先少酒偶有強者飲之一杯便吐傳詔司察宗吐麥飯察者以聞上乃歎息曰至德清純如此別傳鄭袤字林叔高鄉貴公時為光祿勳毌丘儉作亂景帝時為大將軍自出征之百官祖送於城東袤疾病不任會上謂中領軍王肅曰唯以不見鄭光祿為恨肅以語袤袤由輿追及於近道上笑曰故知侯生必來也遂與袤共載問以計謀王隱晉書袤父泰字公業與華歆荀攸善見袤曰鄭公業為不亡矣晉陽秋居世之難鄭默字思元袤子也轉光祿勳默寬冲愽愛謙虛溫謹不以才地矜物事上以禮遇下以和雖僮豎厮養不加聲色而猶有嫌怨故士君子以為居世之難晉書擅奇王惠字令明宋國初建當置郎中令武帝難其人謂傅亮曰今用郎中令不可減袁曜卿也既而曰吾得其人矣曜卿不得獨擅其奇乃以惠居之南史邢虬字神虎為光祿少卿母在鄉遇患請假歸遇秋水暴長河梁破絕蚪得一小船而渡船漏滿不沒時人異之北史分紀虬字神寶神寶產字也誤授職每誡柳亨拜光祿少卿太宗每誡之曰與卿舊親情素兼宿卿為人交遊過多今授此職宜存簡靜亨性好射獵有饕湎之名比後頗自勗勵杜絕賓客約身節儉勤於職事太宗亦以此稱之舊唐魯國陳正字叔方為太官令黃門侍郎與正有隙因進御食以髮貫炙中光武啗炙見髮怒勑斬正正曰臣罪有當死者三黑山出炭增冶吐炎焦膚爛肉而髮不銷臣罪一也匣出佩刀匠石砥礪虧肌截骨曾不能斷髮臣罪二也臣朗月書章奏側光讀經書旦臨御食臣與丞及庖人六目齊視曾不如黃門兩目臣罪三也詔乃捨黃門而釋正謝承後漢書庾冰用樂謨詔草曰光祿九列之首且職典吏署選貢惟允其以前散騎常侍謨為光祿勳本集胡廣曰鴻聲也臚傳也所以傳聲贊導九賓也昔唐虞賓于四門此則禮賓之制與鴻臚之任亦同漢官解詁劉熙曰腹前肥者曰臚言以京師為心腹王侯外國為四體以養之也辦云鴻臚本故典客掌賓禮鴻大也臚陳序也欲大以禮陳序賓客也辨釋名鴻臚卿漢官也周禮大行人掌賓客及諸侯朝覲事即其任也漢官云奉置典客掌諸侯及歸義蠻夷漢景帝更名大行令武帝改曰太鴻臚初秦又置典屬國亦掌蠻夷降者漢亦因之成帝并入大鴻臚王莽改鴻臚為典樂初學記不任賓贊蕭由字子驕望之子也為陳留太守元始中作明堂辟雍大朝諸侯徵由為大鴻臚會病不及賓贊還歸故官漢書雜事郭况光武郭皇后弟也遷大鴻臚帝數幸其第會公卿諸侯親家飲燕賞賜金錢縑帛豐盛莫比京師號况家為金穴後后紀習郁為侍中時從光武幸黎丘與帝通夢見蘇山神光武嘉之拜大鴻臚錄其前後功封襄陽侯使立蘇嶺祠刻二鹿石俠神道百姓謂之鹿門廟或呼蘇嶺山為鹿門山襄陽耆舊傳杜瓊字伯瑜後主立為大鴻臚太常為人靜嘿少言闔門自守不與世事蜀志崔林為大鴻臚龜茲王遣侍子來朝朝廷嘉其遠至褒賞其王甚厚餘國各遣子來朝間使連屬林恐所遣或非真的權取疏屬賈胡因通使命利得印綬而道路護送所損滋多所養之民資無益之事徒為夷狄所笑此曩時之患也乃移書燉煌喻指并錄前世待遇諸國豐約故事使有恒常魏志韓宣明帝時為大鴻臚宣前後當官在能否之間然喜以已恕人始南陽韓暨以宿德在宣州為大鴻臚暨為賢人及宣在後亦稱職故鴻臚中為之語曰大鴻臚小鴻臚前後治行曷相如上張儼弱冠知名早歷顯位以愽聞多識拜大鴻臚使于晉吳主孫皓謂儼曰南北通好以君有出境之才故相屈行對曰皇皇者華臣蒙其榮無古人延舉之美磨鋒淬鍔思不辱命既至車騎將軍賈充尚書令裴秀侍中荀勗等欲傲以所不知而不能屈吳錄志記晉使者俞歸至張重華識張鑒才任專對拜典客令歸責鑒禮供給簿鑒曰弊國僻小隔絕皇風行臺撫臨萬里傾躍今大義未崇先存口實非昭德示訓之謂也歸改容謝之前涼錄李安世天安初為主安令齊使劉纘來聘安世美容貌善舉止纘等自相謂曰不有君子其得國乎纘呼安世為典客安世曰三代不共禮五帝各異樂安得以亡秦之官稱于上國纘曰世異之號凡有幾也安世曰周謂掌客秦改典客漢明鴻臚今曰主客君等不欲影響文武而殷勤亡秦魏書異名大鴻臚梁加卿字曰鴻臚卿除大字五代史百官志隋唐因之龍朔二年改為同文卿光宅初改曰司賓卿六典劉世龍高祖時從平京師累轉鴻臚卿時草創之始傾竭府藏以賜勳人而國用不足世龍進計曰今義師數萬並在京師樵薪貴而布帛賤若採街衢及苑中樹為樵以易布帛歲收數十萬疋立可致也又藏內繒絹疋軸之使申截取剩物以供雜費動盈十餘萬段矣高祖因從之大收其利舊義節本名世龍或言世龍子名鳳昌父子非人臣兆高祖不聽更賜今名新王敦為鴻臚卿謂阮脩曰卿常無食鴻臚丞差有祿能作不脩曰亦復可爾耳遂為之晉書脩字宣子雅學達理鴻臚少卿請用雅學詳當明樞達理者後魏職令令望蘇夔字伯尼煬帝方勤遠略蠻夷朝貢前後相屬帝嘗從容謂宇文述虞世基等曰四夷率服觀禮華夏鴻臚之職須歸令望寧有多才藝美容儀可以接對賓客者為之乎咸以夔對帝然之即日拜鴻臚卿隋書職業稱裴光庭開元中權兵部郎中鴻臚少卿性靜默寡交游雖驟歷臺省人未之許既而以職業稱議者更推之唐書典屬國昭帝始元六年春以栘中監蘇武為典屬國漢書孝明之時讀蘇武傳見武官名曰移中監以問百官百官莫知夫倉頡之章小學之書文字備具至于無能對聖國之問者是皆美命隨牒之人多在官也木旁多文字且不能知其欲及若董仲舒之知重常劉子政之知貳負難哉論衡別通分紀以武為典屬國誤常惠代蘇武為典屬國明習外國事勤勞數有功甘露中為右將軍典屬國如故前漢掌蠻降者典屬國秦官掌蠻夷降者河平元年省併大鴻臚上周禮地官有掌節春官又有典瑞並其任也自漢以來惟旌節稱節餘皆號符焉寶即璽也秦為符璽令史記云始皇出遊會稽丞相李斯中車府令趙高從高兼行符璽令事是也漢因秦置符節令六典霍光字子孟初輔幼主政自巳出天下想聞其風采殿中嘗有怪一夜群臣相驚光召尚符璽郎郎不肯授光光欲奪之郎按劍曰臣頭可得璽不可得也光甚誼之明日詔增此郎秩二等眾庶莫不多光前漢符節令掌天子璽符及節麾幢有銅虎竹使符中分二人留其半付受為信環濟要略唐因隋置符璽郎天后更名符寶郎授命及神璽等八璽文並瑑為寶字神龍初復為符璽郎開元初又為符寶郎從璽文也六典符寶郎掌天子八寶及國之符節辨其所用有事則請於內既事則奉而藏之舊唐志宗正宗正卿周官也宋百官春秋云周受命封建宗盟周封兄弟之國十有五同姓之國三十有五始選其宗中之長而董正之謂之宗正成王時彤伯入為宗正掌王親屬是也秦漢因之平帝更名宗伯王莽改為秩宗東漢復為宗正晉曰大宗正後魏皆同姓為之晉以後雜用庶姓為之至梁加卿字除大字曰宗正卿初學記唐武德二年置宗師一人後省龍朔二年改宗正寺曰司宗寺武后光宅元年曰司屬寺百官志千里駒劉德字路叔修黃老術有智略少時數言時事召見甘泉宮武帝謂之千里駒昭帝初為宗正丞後為宗正卿德妻死大將軍欲以女妻之德不敢娶畏盛滿也漢書劉向字子政本名更生德子也元帝初太傅蕭望之為前將軍少傅周堪甚見尊任更生年少于望之堪然二人重之薦更生宗室忠直明經有行為宗正上劉平字公子本名曠明帝初鍾離意薦其修身行義永平三年拜宗正數薦達名士承宮郇恁等後漢劉般字伯興建中初遷宗正般在位數言政事其收恤九族行義尤著時人稱之上劉軫字君文梁孝正胤為宗正卒官遂世掌宗正焉上至行貞素王覽字玄通孝友恭恪名亞于祥咸寧元年大中大夫詔曰覽少篤至行服仁履義貞素之操長而彌固其以覽為宗正卿晉書羊祜忠篤寬厚然不長理劇宗正卿缺不審可轉作否山公啟事杜銓字士衡初密太后父豹喪在濮陽世祖欲命迎葬於鄴謂司徒崔浩曰天下諸杜何處望高浩對京兆為美世祖曰朕今方改葬外祖意欲取京兆中長老一人以為宗正命營護凶事浩曰中書愽士杜銓其家今在趙郡是杜預之後於今為諸杜之最即可取之詔召見銓器貌瓌雅世祖感悅謂浩曰此真吾所欲也以為宗正魏書宗正卿之職掌皇九族六親之屬籍以別昭穆之序紀親踈之列六典九廟之子孫繼統為宗餘曰族唐志竇誕抗子也貞觀初為宗正卿太宗常與之言昏忘不能對乃手詔曰朕聞為官擇人者治為人擇官者亂竇誕比來精神衰耗殊異常時知不肖而任之覩尸祿而不退非唯傷風亂政亦恐為君不明考績黜陟古今常典誕可光祿大夫還第舊杜牧李文舉制取自遠藩擢為宗正大則提陟群吏洒掃守奉次則整訓屬族次第昭穆集元稹李從易宗正丞敕昔劉氏子孫在屬籍者十餘萬我唐光有天下二百餘年伯仲叔季幼子童孫可勝道哉第其賢能以次序昭穆皆吾宗寺之職也元稹李拭授宗正卿等制明皇而下其屬未遠諸王在閣朕得其寒溫睿宗而上五十餘族長幼秩序盡委之于大宗正茍非能賢不敢輕授劉熙曰祭酒者謂祭六神以酒酹之也辯云凡會同饗讌必尊長先用酒以祭先故曰祭酒漢時吳王年長以為劉氏祭酒是也辨釋名胡廣曰官名祭酒者皆一位之元長者也古禮賓客得主人饌則老者一人舉酒以祭於地舊說以為示有先後志注應劭曰禮飲酒必祭示有先也故稱祭酒尊之也如淳曰祭祠時唯尊長者以酒沃酹漢注荀卿年五十始來遊學於齊襄王時而荀卿最為老師齊尚脩列大夫之缺而荀卿三為祭酒焉史記三為祭酒者謂荀卿出入前後三度處列大夫康莊之位而皆為其所尊故云三為祭酒注張安世薦蘇武明習故事奉使不辱命宣帝以武節著名臣令朝朔望號稱祭酒甚優寵之漢書分紀優寵之後加年老不拜迎以安車二句事文因之似誤建武初置五經愽士太常差以有聰明威重者一人為祭酒總領綱紀續漢表秦宓為師友祭酒稱曰仲父宓稱疾臥在茅舍纂將功曹古朴主簿王普廚膳即宓第宴談宓臥如故益州辟宓為從事祭酒蜀志裴頠為國子祭酒奏立國子太學開講堂築門闕刻石寫五經傳暢諸公讚劉毅字仲雄少厲清節然好臧否人物王公貴人望風憚之武帝受禪為國子祭酒帝以毅忠蹇正直使掌諫官咸寧初復為愽士祭酒晉書白帖云漢擢荀卿晉選劉毅並為祭酒也以荀為漢人誤合璧因之又誤袁瓌字山甫為國子祭酒于時喪亂之後禮教陵遲瓌上疏曰疇昔皇運陵替喪亂屢臻儒林之教漸頹庠序之禮有闕國學索然墳籍莫啟若得給其宅地備其學徒愽士僚屬粗有其官則臣之願也疏奏成帝從之國學之興自瓌始也晉書杜夷字行齊世以儒學稱元帝為丞相王敦曰今大義頹替禮典無宗朝廷滯義莫能攸正宜特立儒林祭酒官以弘其事處士杜夷棲情遺遠磪然絕俗才學精愽道行優備其以夷為祭酒建武中令曰國子祭酒杜夷安貧樂道靜志衡門日不暇給雖原憲無以加也其賜榖二百斛皇太子三至夷第執經問義夷雖逼時命亦未嘗朝謁國有大政恒就夷諮訪焉上建元七年高平蘇通長樂劉祥並以碩學耆儒尤精二禮堅以通為禮記祭酒居于東庠祥為儀禮祭酒處于西序堅每月朔旦率百僚親臨講論崔鴻前秦錄張緒字思曼清簡寡欲建元元年立國學以緒為太常卿領國子祭酒以王延之代緒為中書令何點歎曰晉以子敬季琰為此職今以王延之張緒為之可謂清官後接之者實為未易永明七年竟陵王子良領國子祭酒武帝敕王晏曰吾欲令司徒辭祭酒以授張緒物議以為如何子良竟不拜以緒領國子祭酒南史王元長曲水詩序入虎闈而齒胄注周禮曰師氏以三德教國子居虎門之左蔡邕明堂月令論曰周官有闈門之學翰曰虎闈教國子之學所也選何胤字子季為國子祭酒與太子中庶子王瑩並為侍中時胤單作祭酒疑所服陸澄愽古多該亦不能據遂以玄服臨試爾後詳議乃用朱服祭酒朱服自此始也南史韓子熙累遷國子祭酒子熙儉素安貧常好退靜遷鄴之始百司並給兵力時以祭酒閑豫止給二人或有令其陳請者子熙曰朝廷自不給祭酒兵何關韓子熙事也論者高之魏書盧誕本名恭祖拜給事黃門侍郎魏帝詔曰經師易求人師難得朕諸兒稍長欲命卿為師於是親幸晉王第勑晉王以下皆拜之於帝前因賜名曰誕又以誕儒宗學府為當世所推乃拜國子祭酒周書徐孝克陵弟也性至孝宣帝嘉其操行後為國子祭酒孝克每侍宴無所食噉至席散當其膳前羞損減帝密記以問中書舍人管斌斌自是伺之見孝克取珍果納紳帶中斌當時莫識其意後尋訪方知其以遺母斌以啟宣帝嗟歎良久乃敕自今宴亨克孝前饌並遣將還以餉其母時論美之至德中皇太子入學釋奠百司陪列孝克發孝經題後主詔皇太子北面致敬南史大建中國子祭酒徐孝克開講恃貴縱辯眾莫敢當陸游明始弱冠往參焉便與抗對合朝賞歎舊唐王承字安期為國子祭酒承祖儉父暕並居此職三代為國師前代未之有當時以為榮南史周弘正字思行陳宣帝時領國子祭酒尋勑侍東宮講讀太子以弘正德望素重有師資之敬焉卒于官詔曰弘正識宇凝深藝業通備辭林義府國老民宗道映庠門望高禮閣卒然殂殞朕用惻然陳書賀德仁與從兄德基師事周弘正以文辭稱人為語曰學行可師賀德基文質彬彬賀德仁兄弟八人時比漢荀氏唐書元善周武帝時賜爵江陽縣公隋初遷國子祭酒上嘗親臨釋奠命善講孝經於是敷陳義理兼之以諷諫上大悅曰聞江陽之說更起朕心隋書楊汪字元度為國子祭酒帝令百寮就學與汪講論天下通儒碩學多萃焉論難鋒起皆不能屈帝令御史書其問答奏之省而大悅賜良馬一匹上許後胤常侍太宗講後為睦州刺史因入朝乞骸骨太宗召問曰朕與卿刺史資以自養何謂即求致仕後胤對曰年老筋力不逮望得私第時見闕庭太宗曰卿氣力猶強欲何官也後胤陳謝不敢太宗曰朕昔從卿讀書卿今日從朕求官但言所欲不相違也時國子祭酒缺後胤奏言之因授國子祭酒舊唐太宗以孔頴達在東宮數有匡諫拜國子祭酒仍侍講東宮太宗幸國學觀奠命頴達入講孝經既畢頴達上釋奠頌手詔褒美先是與顏師古等諸儒受詔撰定五經正義下詔曰卿等愽綜古今義理該洽考前儒之異說符聖人之幽旨實為不朽付國子監施行致仕圖形於凌煙閣讚曰道光列第風傳闕里精義霞開掞辭飊起上趙弘智篤孝通書傳父事兄弘安永徽初為陳王師講孝經百福殿諸儒更詰辨隨問酬悉舌無留語高宗喜曰試為陳經之要以輔不建弘對曰天子有爭臣七人雖無道不失其天下願以此獻帝悅賜絹二百名馬一進國子祭酒弘安亦終國子祭酒新則天稱制以權臨下不恡官爵取悅當時其國子祭酒多授諸王駙馬都尉唯貞觀故事祭酒孔頴達等上上日皆講至經題至是諸王與駙馬都尉赴上惟判祥瑞三道而已至與愽士助教雖有學士之名多非儒雅之實上桓彥範為侍中俄墨敕以方術人鄭普思為秘書監葉靜能為國子祭酒彥範苦言不可帝曰既要用之無容便止彥範曰陛下自復位制詔軍國皆用故事正觀時以魏徵虞世南彥師古為秘書監以孔穎達為祭酒如靜能方伎庸流豈足以比蹤前烈臣恐物議謂陛下官不擇才濫以天秩加於私愛不納上腐儒祝欽明為國子祭酒景龍三年中宗將親祀南郊欽明與郭山惲希旨奏言皇后亦合助祭景雲初侍御史倪若水劾奏曰欽明等本自腐儒素無操行崇班列爵實為叨忝而涓塵莫效諂佞為能遂使曲臺之禮圓丘之制百王故事一朝墜失所謂亂常改作希旨病君人之不才遂至於此臣請並從黜放以肅周行於是欽明左授饒州刺史上楊綰字公權時元載秉政公卿多附之綰孤立中道清貞自守未嘗私謁載以綰雅望素高外示尊重心實疏忌會魚朝恩死載以朝恩嘗判國子監事塵污太學宜得名儒以清其秩乃奏為國子祭酒實欲以散地處之上教本蕭昕字中明為國子祭酒建請崇太學以樹教本帝寤其言詔群臣有籍于朝及神策六軍子弟隸業者聽補生員上馮審為國子祭酒國子監有孔子碑睿宗篆額如大周兩字蓋武后時篆也審去琢去偽號復大唐二字從之上韓愈拜國子祭酒有直講能說禮而陋容學官多豪族子擯之不得共食公命吏曰召直講來與祭酒共食學官由此不敢賤直講奏儒生為學官日使會講生徒奔走聽聞皆相喜曰韓公來為祭酒國子監不寂寞矣李翱行狀鄭覃故相珣瑜之子以宰相兼判國子祭酒奏太學置五經博士各一人緣無職田請依王府官例賜祿粟從之又進石壁九經一百六十卷舊唐天成中祭酒闕中書奏祭酒之資歷朝所貴望令宰相兼判續通典丘靈鞠齊武帝初領東觀祭酒靈鞠曰人君官願數遷使我終身為祭酒不恨也南史切以庠均義重振古所崇師貴道尊有來攸尚匪曰蘭芷疇變入室之情不自朱藍何遷素絲之質王融為王儉讓國子祭酒表臣聞寶劍未砥猶乏切玉之功美箭闕羽尚無衝石之勢况才非會稽之竹質謝昆吾之金至于敷教東序流化上庠曠官何仰溫子昇為安豐王延明讓國子祭酒表國子周之舊名周官有師氏之職以三德三行教國子又有保氏而國子養以道教之六藝也晉武帝時立國子學置國子祭酒齊梁號為國師隋煬帝改國子學為國子監龍朔二年改為司成館又改祭酒為大司成光宅初改為成均監置祭酒一人掌監學之政皇太子受業則執經講說皆以儒年優重者為之通典兼侍郎五代時田敏任祭酒兼侍郎分紀煬帝大業三年於國子監初置司業一人禮曰樂正司業父師司成因以為名龍朔二年改為少司成凡祭酒司業皆儒重之官非其人不居通典凡六學生每歲有業成上于監者以其業與祭酒司業試之隋志孔頴達字仲達以太子右庶子兼司業子志終司業志子惠元力學寡言又為司業三世司業時人美之唐書合璧云頴達子志終志終子惠元誤類聚新集以因之夫不讀本傳固也亦未見孔氏白帖耶韋叔夏安石兄也少而精通三禮遷成均司業久視元年特下制曰吉凶禮儀國家所重司禮愽士未甚詳明成均司業韋叔夏太子率更令祝欽明等愽涉禮經多所該練委以參掌冀弘典式自今司禮所修儀注並委叔夏等刊定訖然後進奏舊郭山惲少通三禮景龍中遷國子司業中宗數引近臣及修文學士與之宴集嘗令各效伎藝以為笑樂餘臣各有所陳金吾將軍杜元琰誦婆羅門呪中舍盧藏用效道士上章山惲曰臣無所解請誦古詩兩篇帝從之於是誦鹿鳴蟋蟀之詩奏未畢中書令李嶠以其詞有好樂無荒之語頗涉規諷怒為忤旨遽止之翌日帝嘉山惲之意詔曰郭山惲業優經史識貯古今因其預遊潛申規諷謇謇之誠彌切諤諤之操逾明宜示褒揚美茲鯁直賜時服一副上陽嶠景龍末轉國子司業嶠恭謹好學有儒者之風又勤於政理循循善誘及在學司時人為之稱職奏脩先聖廟及講堂因建碑前庭以紀崇儒之事睿宗初為國子祭酒薦尹知章范行恭趙玄默等為學官皆稱名儒時學徒漸弛嶠課率經業稍行鞭箠學生怨之頗有喧謗乃相率乘夜於街中毆之上聞而令所由杖殺無理者由是始息上歸崇敬字正禮大曆中授國子司業時皇太子欲以仲秋之月於國學行齒胄之禮崇敬以國學及官名不稱請改國子監為辟雍省又以祭酒之名非學官所宜按周禮師氏掌以義詔王教國子請改祭酒為太師氏又司業者義在禮記云樂正司業正長也言樂官之長司主此業爾雅云大板謂之業按詩周頌設業設簴崇牙樹羽則業是懸鐘磬之栒簴也今太學既不教樂於義則無所取請改司業一為左師一為右師詔下議者以為省者禁也非外司所宜名周禮代掌其職者曰氏國學非代官不宜曰太師氏其餘大抵以習俗既久重難改作其事不行上陽城字亢宗德宗時為諫議大夫裴延齡誣逐陸游等城上疏極論其罪坐是下遷國子司業引諸生告之曰凡學者所以學為忠與孝也諸生有久不省親者乎明日謁城還養者二十輩有三年不歸侍者斥之簡孝秀德行升堂上沈酗不率教者皆罷躬講經籍生徒斤斤皆有法度唐書出為道州刺史太學生魯郊季償等二百七十人詣闕乞留經數日吏遮止之疏不得上舊惟茲陽公履道葆醇帝求師儒貳我成均開朗蒙滯宣明德教進退作則動言是俲粗厲貪凌待公順之欺偽譎詐待公信之今公于征孰表儒門生徒上言稽首帝閽謂天蓋高曾莫我聞青衿涕濡填街盈衢柳遺愛碣張參為國子司業年老嘗手寫九經以為讀書不如寫書國子監丞東朝束帶銀榜增華西序彯纓環林益潤唐張燕公集趙鼎為相時先是國子監丞張戒上書幾八千言自謂恐忤聖意上謂宰執曰朕熟覽之其憂國愛君之心誠可嘉朕大開言路以防壅蔽自欲賞之趙鼎不答沈與求曰陛下如此何患不聞盡言言行錄參事務設屬成均參釐政令庶事之務惟丞是司初寮制公儀休者魯愽士也為魯相無所變更百官自正使食祿者不得與下民爭利典略秦官愽士秦官也掌通古今百官表愽者愽通古今士者辨於然否漢官儀伏生濟南人也故為秦愽士秦時禁書伏生壁藏之漢書叔孫通秦時以文學徵待詔愽士數歲陳勝起二世召愽士諸儒生問反狀通獨詭對不反拜為愽士通已出反舍諸生曰生何言之諛也通曰公不知我幾不免虎口上通諸家書賈誼年少頗通諸家之書文帝召以為愽士時年二十餘最為少每詔令議下諸老先生未能言誼盡為之對人人各如其意所出諸生於是以為能文帝悅之上武帝初置愽士取學通行脩愽識多藝曉古今爾雅能屬文章者為之朝賀位次中都官吏稱先生不得言君其子弟稱門人漢舊儀武帝初即位招賢良文學士是時公孫弘年六十以賢良徵為博士弘至太常上策詔諸儒時對者百餘人太常奏弘第居下策奏天子擢弘對為第一召入見容貌甚麗拜為愽士待詔金馬門漢書自武帝立五經愽士開弟子員設科射策勸以官祿訖與元始百有餘年傳業者寖盛支葉蕃滋一經說至百餘萬言大師眾至千餘人蓋祿利之路然也至元平時所以網羅遺失兼而存之是在其中矣贊孔子之後孔順生鮒為陳涉愽士鮒弟子襄為孝惠愽士襄生忠忠生武及安國安國生延年皆以治尚書為武帝愽士延年生霸亦治尚書事太傅夏侯勝昭帝末年為愽士霸生光經學尤明成帝初即位舉為愽士官至丞相上韋賢字長孺為人質樸少欲篤志於學兼通理尚書以時教授時人號稱鄒魯大儒徵為慱士上成帝詔曰古之立太學將以傳先王之業流化於天下也儒林之官四海淵源宜皆明於古今溫故知新通達國體故謂之愽士否則學者無述焉為下所輕非所以尊道德也紀王莽之時省五經章句皆為二十萬愽士子弟郭路夜定舊說死於燭下精思不任絕脈氣滅也論衡光武中興愛好經術先訪儒雅自是衛宏桓榮之徒繼踵而集於是立五經愽士各以家法教授後漢翟酺字子超為大匠時言孝文皇帝時始置一經愽士武帝大合天下之書而孝宣論六經於石渠學者滋盛弟子萬數光武初興愍其荒廢起太學愽士舍內外講堂諸生橫卷為海內所集上朱浮為太僕以國學既興宜廣愽士之選乃上書曰夫太學者禮義之宮教化所由興也陛下先建太學造立橫舍尋愽士之官為天下宗師使孔聖之言傳而不絕上桓榮字春卿少學長安十五年不窺家園年六十餘光武召令說尚書甚善之每朝會輒令榮於公卿前敷奏經書帝稱善曰得生幾晚會博士缺拜為愽士通儒董鈞字文伯愽通古今數言政事永平中為愽士時草創五郊祭祀及宗廟禮樂威儀章服輒令鈞參議多見從用當世稱為通儒歐陽歙其先伯和從伏生受尚書至于歙八世皆為愽士敦于經學恭儉好禮東觀記後以臧罪下獄平原禮震年十七上表請代歙死曰伏見臣師歐陽歙學為儒宗八世愽士而以臧咎當伏重辜上令陛下獲殺賢之譏下使學者喪師資之益乞殺身以代歙命後漢安帝覽政薄於藝文愽士倚席不講朋徒相視怠散學舍頹敝鞠為園蔬牧兒蕘豎至于薪刈其下上李絳請崇國學疏云愽士有倚席之譏高柔字文惠明帝明愽士執經柔上疏曰遵道重學聖人洪訓褒文崇儒帝者明義今愽士皆明經行脩一國清選而使遷除限不過長懼非所以崇顯儒術帥勵怠惰也愽士者道之淵藪六藝所宗宜隨學行優劣待以不次之位敦崇道教以勸學者於化為弘帝納之魏志樂詳字文載少好學黃初中徵拜愽士于時太學初立有愽士十餘人學多褊狹又不熟悉略不親教備具而已惟詳五業並授其或難教質而不解詳無慍色以杖畫地牽譬引類至忘寢食以是獨擅名於遠近魏略永安元年詔曰古者建國教學為先所以道世治性為時養器也夫所尚不淳則傷化敗俗其案古置學官立五經愽士核取應選加其寵祿一歲課試差其品第加以位賞使見之者樂其榮聞之者羡其譽以敦王化以隆風俗吳志荀崧字景猷元帝時方脩學校簡省愽士崧以為不可去乃上疏曰自喪亂以來儒學尤寡今處學則闕朝廷之秀仕朝則廢儒學之俊昔咸寧太康永嘉之中侍中常侍黃門通洽古今行為世表者領國子愽士一則應對殿堂奉酹顧問二則參訓國子以弘儒訓三則祠儀二曹及太常之職以得質疑今去聖久遠其文將墮興其過廢寧與過立議者多請從崧所奏晉書虞喜字仲寧太寧中與臨海任旭俱以愽士徵不就復下詔曰夫興化致政莫尚乎崇道教明退素也任旭虞喜並潔淨其操歲寒不移研精墳典居今行古志操足以勵俗愽學足以明通其更以愽士徵之上殷亮建武中徵拜愽士遷講學大夫諸儒論勝者賜席亮重席至八九帝嘉之曰學不當如是耶殷氏世傳姚泓受經於愽士淳于岐岐病親詣省病拜于床下自是公侯見師傅皆拜焉載記嚴植之字孝源梁天監二年詔求通儒脩五禮有司奏植之主凶禮四年初置五經愽士各開館教授以植之兼五經愽士植之館在潮溝生徒常百數講說有區段次第析理分明每當登講五館生畢至聽者千餘人南史解析經理崔靈恩少篤學徧習五經仕魏為太常愽士天監十三年歸梁為國子愽士靈恩聚徒講授聽者常數百人性拙樸無風采及解析經理甚有精致都下舊儒咸稱重之助教孔僉尤好其學僉生徒亦數百人三為五經愽士上戚衮字公文除揚州祭酒從事史敦國子愽士宋懷方質儀理義懷方北人自魏攜儀禮禮記疏秘祕傳不惜及將亡謂家人曰吾死後戚生若赴便以儀禮禮記義本付之若其不來即隨屍而殯為儒者推許如此尋兼太學愽士上戚衮為太學愽士簡文在東宮嘗置宴集玄儒之士先命道學互相質難次令中庶子徐摛馳騁大義間以劇談摛辭辯縱橫難以答抗諸儒懾氣時衮說朝聘義摛與往復衮精采自若領答如流上顧越徧該經藝傍通異義特善老莊尤長論難武帝嘗于重雲殿自講老子徐勉舉越論義越抗首而請音響若鐘容止可觀帝深贊美之除五經愽士上特命崔景雋好古愽涉以經明行脩雅為高祖所知重賜名為逸遷國子愽士每有公事逸常被詔獨進愽士特命自逸始魏書熊安生字植之愽通五經河清中陽休之特奏為國子愽士周齊通好兵部尹公正使焉與講周禮公正嗟服還具言之於武帝帝大欽重之及入鄴安生遽令掃門家人怪而問之安生曰周帝重道尊儒必將見我矣俄而帝幸其第詔不聽拜親執其手引與同坐謂曰朕未能去兵以此為愧安生曰黃帝尚有阪泉之戰况陛下龔行天罰乎帝又曰齊氏役賦繁興竭人財力朕救焚拯溺思革其弊欲以府庫及三臺雜物散之百姓公以為何如安生曰昔武王克商散鹿臺之財發巨橋之粟陛下此詔異代同美帝又曰朕何如武王安生曰武王伐紂懸首太白陛下平齊兵不血刃愚謂神略為優帝大悅賞賜優厚令隨駕入朝并敕所在供給至京北史諸儒推慕權會字理正少受鄭易探賾索隱妙盡幽微詩書三禮文義該洽天保時為國子愽士會參掌雖繁教授不闕性甚懦愞似不能言及臨機答難酬報如饗由是為諸儒所推而貴游子弟慕其德義者或就其宅或寄宿鄰家晝夜承間受其學業會欣然演說未嘗懈怠上何妥字栖鳳江陵平入周仕為太學愽士宣帝初立五后問儒者辛彥之對曰后與天子匹體齊尊不宜有五妥駮曰帝嚳四妃舜又二妃亦何常數上房暉遠字崇儒世傳儒學恒以教授為務隋牛弘每稱為五經庫文帝初為國子愽士會上令國子生通一經者並悉薦舉將擢用之既策問訖愽士不能時定臧否祭酒元善怪問之暉遠曰江南河北義例不同愽士不能遍涉學生皆持其所短稱已所長愽士各各自疑所以久而不決也祭酒因令暉遠考定之暉遠覽筆便下初無疑滯或有不服者暉遠問其所傳義疏輒為始末誦之然後出其所短自是無敢飾非者所試四五百人數日便決諸儒莫不推其通愽皆自以為不能測也文帝嘗謂群臣曰自古天子有女樂乎楊素以下莫知所出遂言無女樂暉遠曰臣聞窈窕淑女鐘鼓樂之此即王者房中之樂著於雅頌不得言無帝大悅隋書北史合璧誤以為唐事文尾復以為唐書更誤王頍字景文江陵陷入關二十尚不知書為其兄顒所責怒乃感激讀書歎曰書無不可讀者勤學累載遂遍通五經大為儒者所稱周武帝引為露門學士每有議決多頍所為而頍性識甄明精力不倦好讀讀諸子偏記異書當代稱為愽物開皇年令於國子講授會高祖親臨釋奠國子祭酒元善講孝經頍與相論難詞義鋒起善往往見屈高祖大奇之起授國子愽士開皇初徵山東義學之士馬光與張仲讓孔籠竇仕榮張買奴劉祖仁等俱至並授太學愽士時人號為六儒隋書剖析疑滯馬光字榮伯少好學尤明三禮為儒者所宗開皇時嘗因釋奠帝親幸國子學王公已下畢集光升坐講禮啟發章門已而諸儒生以次論難者十餘皆當時碩學光剖析疑滯雖辭非俊辯而禮義弘贍論者莫測其淺深咸共推服上嘉而勞焉山東三禮學者自熊安生後唯宗光一人上徐文遠方正純厚有儒者風竇威楊玄感李密皆從其受學開皇中遷太學愽士大業初禮部侍郎許善心舉文遠與包愷禇徽陸游明魯達為學官遂擢授文遠國子愽士愷等並為太學愽士時人稱文遠之左氏禇徽之禮魯達之詩陸游明之易皆為一時之最文遠所講釋多立新義先儒異論皆定其是非然後詰駮諸家又出已意愽而且辨聽者忘倦武德六年高祖幸國學觀釋奠遣文遠發春秋題諸儒設難蜂起隨方占對皆莫能屈舊唐陸游明為太學愽士後高祖親臨釋奠時徐文遠講孝經沙門惠乘講波若經道士劉進喜講老子德明難此三人各因宗指隨端立義眾皆為之屈高祖善之貞觀初拜國子愽士上谷那律貞觀中遷國子愽士淹識群書禇遂良嘗稱為九經庫新宣業龍朔二年改國子愽士為司成宣業通典何佟之字士威仕齊初為國子助教為諸王講喪服結草為絰屈手巾為冠諸生有未曉者委曲誘誨都下稱其醇儒南史執經受業沈峻字士嵩好學晝夜自課睡則以杖自繫遂愽通五經尤長三禮為兼國子助教時吏部郎陸倕與僕射徐勉書薦峻曰凡聖賢所講之書必以周官立義則周官一書實為群經源本助教沈峻特精此書比日時開講肆群儒劉嵒沈宏沈熊之徒並執經下坐北面受業莫不歎服人無間言弟謂宜即用此人令其專此一學周而復始使聖人正典廢而更興勉從之奏峻兼五經愽士於館講授聽者常數百人上在席懔然張譏字直言受學于汝南周𢎪正每有新意為先輩推服陳天嘉中為國子助教時周𢎪正在國學發周易題𢎪正第四弟𢎪直亦在講席譏與𢎪正論議𢎪正屈𢎪直危坐厲聲助其申理譏乃正色謂𢎪直曰今日義集辯正名理雖知兄弟急難四公不得有助𢎪直謂曰僕助君師何為不可舉坐以為笑樂𢎪正嘗謂人曰吾每登坐見張譏在席使人懔然上排毀先儒劉蘭讀左氏五日一遍兼通五經又明陰陽愽物多識故為儒者所宗學徒前後數千成業者眾而排毀公羊又非董仲舒由是見譏於世後為國子助教嘗靜坐讀書有叩門者蘭命引入葛巾單衣入與蘭坐謂蘭曰君自是學士何為每見毀辱義理長短竟在誰而過無禮相陵也今欲相召當與君正之言終而出蘭少時患死北史權會本貧生無僮僕初任助教之日常乘驢上下其職事多非晚不歸曾夜出城東門鐘漏已盡會唯獨乘一驢忽見二人一人牽頭一人隨後有似相助其迴動輕漂有異生人漸漸失路不由本道會心甚怪之遂誦易經上篇一卷不盡前後二人忽然離散會亦不覺墮驢因爾迷悶至明始覺方知墮處乃是郭外纔去家數里上陸游明大業中廣召經明之士四方至者甚眾遣德明與魯孔褒俱會門下省共相交難無出其右者授國子助教舊唐蓋文達冀州信都人也愽涉經史有士君子之風刺史竇抗嘗廣集儒生令相問難其大儒劉焯劉軌思孔頴達咸在坐文達亦參焉既論難皆出諸儒意表抗大奇之問曰蓋生就誰受學劉焯對曰此生岐嶷出自天然以多問寡焯為師首抗曰可謂冰生於水而寒於水也武德中受國子助教其宗人文懿亦以儒業知名當時稱為二蓋焉文懿者貝州宋城人武德初歷國子助教嘗開講毛詩發題公卿咸萃更相問難文懿發揚風雅甚得詩人之致貞觀中卒於國子愽士上高子貢弱冠遊太學徧涉六經尤精史記與邢文偉朱敬則為莫逆之交明經舉歷秘書正字棄官而歸以率鄉曲拒徐敬業弟敬猷之功拜成均助教上馬融論語註云行人掌使之官正義云周禮秋官有大行人小行人皆大夫也掌諸侯朝覲宗廟會同之禮儀及時聘會同之事則諸侯之行人亦然故云掌使之官謂掌其為使之官也註疏大行人掌大賓之禮及大客之儀以親諸侯春朝諸而圖天下之事秋覲以正邦國之功夏宗以陳天下之謨冬遇以恊諸侯之慮時會以發四方之禁殷同以施天下之政時聘以結諸侯之好殷眺以除邦國之慝間問以諭諸侯之志歸服以交諸侯之福賀慶以贊諸侯之喜致禬以補諸侯之好周禮秋官小行人賞邦國賓客之禮籍以待四方之使者上穆叔如晉執知武子之聘也晉侯享之金奏肆夏之三不拜工歌文王之三又不拜歌鹿鳴之三三拜韓獻子使行人子員問之曰吾子舍其大而重拜其細何禮也對曰三夏天子所以享元侯也使臣弗敢與聞文王兩君相見之樂也臣不敢及鹿鳴君所以嘉寡君也敢不拜嘉四牡君所以勞使臣也敢不重拜皇皇者華君教使臣曰必諏於周臣聞之訪問於善為咨咨親為詢咨禮為度咨事為諏咨難為謀臣獲五善敢不重拜北宮文子佗相衛襄公以如楚過鄭印段廷勞于棐林如聘禮而以勞辭文子入聘子羽為行人馮簡子與子大叔逆客事畢而出言於衛侯曰鄭有禮其數世之福也其無大國之討乎襄三十三前襄四行人公孫揮晏子使吳吳王謂行人曰吾聞晏嬰蓋北方之辯於辭習於禮者也命儐者客見則稱天子明日晏子有事行人曰天子請見晏子憱然者三曰臣受命弊邑之君將使於吳王之所不佞而迷惑入于天子之朝敢問吳王惡乎存然後吳王曰夫差請見見以諸侯之禮說苑天中記卷三十三
