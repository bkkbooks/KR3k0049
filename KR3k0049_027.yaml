body:
  text: 清廉清廉清青也去濁遠穢色如青也廉斂也自檢斂也釋名不貪宋人或得玉獻諸子罕子罕弗受獻玉者曰以示玉人玉人以為寶也故敢獻之子罕曰我以不貪為寶爾以玉為寶若以與我皆喪寶也不若人有其寶稽首而告曰小人懷璧不可以越鄉納此以請死也襄十五幅利慶氏亡與晏子邶殿其鄙六十弗受子尾曰富人之所欲也何獨弗欲對曰慶氏之邑足欲故亡吾邑不足欲也益之以邶殿乃足欲足欲亡無日矣在外不得宰吾一邑不受邶殿非惡富也恐失富也且夫富如布帛之有幅焉為之制度使無遷也夫民生厚而用利於是乎正德以幅之使無黜嫚謂之幅利利過則為敗吾不敢貪多所謂幅也與北郭佐邑六十受之與子雅邑辭多受少與子尾邑受而稍致之襄二十八遺行景公以五十乘魚賜弦章章歸魚車塞塗撫其御之手曰昔者晏子辭賞以正君故過失不掩今諸臣諂諛以干利吾若受魚是反晏子之義而順諂諛之欲固辭魚不受君子曰弦章之廉晏子之遺行也晏子春秋皮相吳延陵季子遊於齊見遺金呼牧者取之牧者曰子居之高視之下貌之君子而言之野也吾有君不君有友不友當暑衣裘君疑取金者乎延陵子知其為賢者請問姓字牧者曰子乃皮相之士也何足語姓字哉遂去延陵季子立而望之不見乃止韓詩外傳立廉曾子立廉不飲盜泉所謂養志者也淮說山改節子路問孔子曰仁人廉士窮則改節乎子曰改節則何以稱廉仁哉家語折轅布囊上嘗召見諸郡計吏問其風土及前後守令能否蜀郡計椽樊顯進曰漁陽太守張堪昔在蜀其仁以惠下威能討姦前公孫述破時珍寶山積捲握之物足富十世而堪去職之日乘折轅車布被囊而已上聞嘆息東觀漢記糶鹽司空宋弘嘗受俸得時令諸生糶諸生以賤不糶弘怒悉賤糶不與爭利上清白吏楊震字伯起弘農人性公廉不受私謁子孫常蔬食步行故舊長者或欲令為開産業震不肯曰使後世稱為清白吏子孫以此遺之不亦厚乎為東萊太守道經昌邑邑令王密故所舉茂才夜懷金十斤以遺震震曰故人知君君不知故人何也密曰夜無知者震曰天知神知何謂無知上范書天知神知子知我知委珠鍾離意為尚書交址太守張恢居官貪亂贓踰千金珠璣玩寶乃有石數收贓簿入司農詔悉以珠賜諸尚書皆拜受意獨委珠璣於地不拜受明帝問委珠何也對曰愚聞孔子忍渴不飲盜泉之水曾子還車不入勝母之閭惡其名也今陛下以贓珠賜忠臣以故臣不拜受耳別傳石蘭廉范年十五至蜀迎祖母喪及到葭萌船沒幾死太守張穆持筒中布數篋與范范曰石生堅蘭生香前後相違不忍行也遂不受東觀記還璣黃向字文章為性廉潔常步行於路中得金璣一囊可直二百餘萬募求得其主還之謝承後漢書清高范丹字史雲外黃人西入關學為萊蕪長去官於市賣卜妻紡績以自給辟公府步行無被囊自隨常使兒買麥得五斛鄉人遺之一斛屬兒曰莫令尊君知兒歸不敢不道丹即令并送六斛言麥已雜遂不敢丹弟子愷見丹藩不完載柴將藩之時丹適行還怒勑子拔柴載還之閭里歌之曰甑中生塵范史雲釜中生魚范萊蕪自以性急每為吏常佩韋袁山松後書丹姊病往看之姊設食丹以姊壻不德出門留二百錢姊使人追索還之丹不得已受之閭里中芻藁僮僕更相怒曰言汝清高豈范史雲輩而云不盜我萊子丹問之曰吾之微志乃在僮堅之口不可不勉遂投錢去謝承後書互見姊妹投錢水中頴川黃子廉者每飲馬投錢於水中風俗通安陵清者有項仲山飲馬渭水日與三錢以償之三輔夬録苑乃知清洛陽令董宣死詔使視之闌輿一乘車馬一匹帝曰董宣之清死乃知之陳留耆舊傳售奴徐偉奴善叛知識欲為偉售之偉曰不得奴往當復逃亡豈可虛受其價廉乎義正若此長沙耆舊傳不食人食程堅字謀甫南陽武陰人仁孝清潔居貧無資磨鏡自給不受人施諸嫗共漂更相呼食或不食者相謂曰汝非程謀甫何為不食人食典略世清胡質為貝州刺史薨家無餘財唯有賜衣書篋而已魏志威字伯虎少有志尚清白歷位宰牧武帝賜見嘆其父清因謂威曰卿清孰與父清威對曰臣不如也帝曰以何為不如對曰臣父清恐人知臣清恐人不知是臣不如遠矣晉陽秋懸絲鬲令袁毅為政貪濁饋遺朝廷以營虛譽嘗遺山濤絲百斤濤不欲與衆異受之命懸之梁後毅事露按驗衆官吏至濤于梁上得絲已數年塵埃封印如初竹林七賢論婦無㡓范宣字子宣年八歲潔行廉約韓豫章伯遺絹百匹不受減五十匹復不受如是減半遂至一匹既終韓與後范同載就車中裂二丈與范云人寧可使婦無㡓邪范笑而受之世說冰玉中宗令曰太常賀循冰清玉潔行為俗表孤曾造其廬屋室服物周身而已賜床褥錢二十萬徐廣晉記神知范隆為太尉常有所薦得美官者於閣中以金遺隆隆數而責之言其人曰不知也謹不敢漏泄父母兄弟隆曰神已知矣其可取耶遂絶之崔鴻前趙録故絮耽酒王敦籍周顗家笥簏中有故絮故鴆酒五甕米數斛在位者服其清鄧粲晉記還餉翟湯字道淵潯陽人篤行介始安太守干寶與湯通家遣船餉之勑吏翟公廉讓卿致書記便委船還湯無人送致乃更貨易絹物因寄還寶本以惠湯而反煩之益愧嘆焉晉中興書作賈客孔顗字思遠不尚矯飾服用粗敗終不改易時吳郡顧顗之亦尚儉素衣裘器服皆用其陋者宋世言清約稱此二人顗弟道存從弟徽頗營産業二弟請假東還顗出渚迎之輜重十餘船皆是綿絹紙席之屬顗見之僞喜謂曰我比困乏得此甚要因命上置岸側既而正色謂道存等曰汝輩忝預士流何至還東作賈客耶命左右取火燒之燒盡乃去宋書正路顏延之廷誥曰清者人之正路罷郡無宅裴昭明宋元徽中出為長沙郡丞罷任刺史王蘊之謂曰卿清貧必無還資湘中人士有須一禮之命者我不愛也昭明曰下官忝為郡佐不能光益上府豈以鴻都之事仰纍清風齊永明時為始安內史及還甚貧罄世祖曰昭明當罷郡還遂無宅我不讀書不知古人中誰可比之南史還金甄彬有行業鄉黨稱善嘗以一束苧就州長沙寺庫質錢後贖苧還於苧束中得五兩金以手巾褁之彬得送還寺庫道人驚云近有人以此金質錢時有事不得舉而失檀越乃能見還輒以金半仰酬往復十餘彬堅然不受因謂曰五月披羊裘而負薪豈拾遺金者耶卒還金梁武帝布衣而聞之及踐祚以西昌侯藻為益州刺史乃以彬為府録事參軍帶郫縣令將行同列五人帝誡以廉慎至彬獨曰卿昔有還金之美故不復以此言相屬由此名德益彰上牙管為費范岫每所居官恆以廉潔著稱為長城令時有梓材巾箱至數十年經貴遂不改易在晉陵為作牙管一雙猶以為費梁書清郎清卿袁聿修字叔德在官廉慎為尚書郎十年未嘗受斗酒之饋尚書邢邵與聿修舊款每于省中語戲常呼聿修為清郎太寧初聿修以太常少卿出使巡省經兗州時邢邵為刺史別後遣送白綢為信聿修不受與邵書云今日仰遇有異常行願得此心不貽厚責邵亦欣然領鮮報書云一日之贈率爾不思謹承來旨吾無間然弟昔為清郎今日復作清卿矣北齊書異代一時辛術字懷哲文宣天保時睢州刺史及所部郡守俱犯大辟以其奴婢百口及資財盡賜術三辭不見許術乃送詣所司不復以聞邢邵聞之遺術書云昔鐘離意云孔子忍渴于盜泉便以珠璣委地足下今能如此可謂異代一時上飲水彭城王攸自滄州召還父老相率具饌曰殿下唯飲此鄉水未食百姓食聊獻踈薄修為食一口北史蒞政之本裴俠清慎奉公從弟伯鳳世彥時並為丞相府佐謂之曰人生仕進須身名俱太清苦如此竟欲何為俠云清者蒞政之本儉者持身之基吾幸以凡庸濫蒙殊遇固其窮困非樂名也志在自修懼辱先也翻被辱笑知復何言伯鳳等慚而退後周二十七安身非貨裴文舉字道裕為益州總管蜀土沃饒商販百倍或有勸文舉以利者文舉答之曰利之為貴莫若安身身安則道隆非貨之謂是以不為非惡財也齊公宇文憲矜其貧窶每欲資給之文舉恆自謙遜辭多受少周書失行寇俊字祖俊性廉恕不以財利為心家人曾賣物與人而利得絹一匹俊于後知之乃曰惡木之陰不可暫息盜泉之水無容誤飲得財失行吾所不取遂訪主還之上清徹底宋世良為河清太守及代至傾城祖道有老人丁金剛者泣而前謝曰老人年九十記三十五政府君非惟善政清亦徹底今失賢者人何以濟莫不攀轅涕泣北史十四酌水趙隋文時為齊州別駕時年饑鄰有桑椹落其第遣人悉拾還其主戒諸子曰吾非以此求名意者非機杼物不願侵人爾等宜以為戒後詔入朝父老送者各揮涕曰別駕在官水火不與百姓交是以不敢杯酒相送公清如水請酌一杯水奉餞受飲之上五十八清水明鏡馮履謙補河北尉有部人張懷道任江陽尉與謙疇舊餉鏡一面謙集寮吏遍視之曰此張公所致也吾與之有舊吾效官以俸祿自守豈私受益哉昌言曰清水見底明鏡照心余之效官必至於此復書於使者乃歸之唐書辭紙埋金杜暹舉明經補婺州參軍秩滿將歸州吏以紙萬餘張以贈之暹惟受一百餘悉還之時州寮別者見而嘆曰昔清吏受一大錢復何異也遷監察御史往磧西按事蕃人賫金以遺暹固辭不受左右曰公遠使絶域不可失蕃人情暹不得已受之埋幕下既去出境乃移牒令收取之蕃人大驚度磧追之不及而止上贈簾尚書左丞李廙有清德其妹劉晏妻也晏方秉權嘗造廙延至寢室見其門簾甚敝乃令潛度廣狹以竹織成不加緣飾將以贈廙三攜至門不敢發言而去史補清白自將陸長源為汝州太守簡易無威而清白自將後去州送車二乘乃嘆曰五祖罷魏州有車一乘而圖書半之不及先人遠矣本傳使不受幣馬伉為侍讀李抱真卒伉持節臨弔歸之帛不受又致京師伉上表固拒於是醴泉令缺宰相高選德宗曰前使澤潞不受幣者其人清可用也遂以授伉遺金還子杜佑大曆中有古人遺黃金百兩後三十年為淮節度使其子來投佑取其黃金還緘封如故傳載酌泉投香蕭倣清譽儉德時所推服嘗統戎于番禺有酌泉投香之譽唐關史倣字思道性公廉為嶺南節度使南海雖富珍奇月俸之外不入其門家人疾病醫工治藥須烏梅左右於公廚取之倣知而命還促買於市南海地多榖紙倣勑子弟繕寫缺落文史子廩白曰家書缺者誠宜補葺然此去京師水陸萬里不可露賫當須篋笥人觀兼乘謂是貨財古人薏苡之嫌得為深誡倣曰吾不之思也舊唐非慎四知李尚隱遷廣州都督仍充五府經略使及去任有懷金以贈之者尚隱固辭之曰吾自性分不可改易非為慎四知也竟不受之上緑輿青衣李師古跋扈憚杜黃裳為相未敢失禮乃命一幹吏寄錢數千繩并氈車子一乘亦近直千緍使者未敢遽送乃於宅門伺候纍日有緑輿自宅出從婢二人皆青衣繿縷問何人曰相公夫人使者遽歸以白師古師古乃折其謀終身不敢失節幽間鼓吹知倍古人閩賈郁為仙遊令有邑客遺果辭之客曰其家新果人衆未知郁曰君有弟子否曰昆弟三人豚犬數輩郁曰古人畏四知今君兄知弟知子知攜來者知是倍于古人也客慚而退九國志名教宗主趙光逢五代時為平章事時女真寄黃金一函於其室值亂離餘二十年無所歸命河南尹張全義奏分諸宮觀其清介如此咸以光逢為名教宗主五代史仁人之行幽州從事溫璉燕人也以儒學著稱與馮道幼相善經兵亂有賣漆燈椸于市者璉以為鐵也遂數錢買之纍日家人用然膏燭因拂拭乃知銀也大小觀之靡不欣喜惟璉憫然曰非義之物安可寶之遂訪其賣主而還之主亦不受璉固還之乃拜受而去別賣四五萬將其半謝之璉終不納遂施僧寺用飾佛像冀祝璉之壽也時共推其有仁人之行劉氏耳目記古人之風仲廷預為蜀嘉王教授諸子雖通墳典常厄饑寒至門下亦未甚禮時方凝寒王以舊火爐送學院廷預方獨坐太息以筋撥灰俄灰中得一雙金火筯遽求見王王意其有別所求也勉強見之廷預乃出金筯陳其本末王曰吾家失此物已十年吾子得之還以相示真有古人之風乃厚贈之竟以賓介相遇禮待甚厚薦授祟州録事參軍玉溪編事慎微籧瑗不以昏行變節顏回不以夜浴改容勾踐拘於石室君臣之禮不替冀缺耕於埛野夫婦之敬不虧斯皆慎乎隱微枕善而居劉子好恭魯有恭士名曰機泛行年七十其恭益甚冬日行陰夏日行陽市次不敢不行參行必隨坐必危一食之間三起不羞見衣裘褐之士則為之禮魯君問曰機子年甚長矣不可釋恭乎機汜對曰君子好恭以成其名小人學恭以除其刑對君之坐豈不安哉尚有差跌一食之上豈不美哉尚有哽噎今若汜所謂幸者也固未能自必鴻鵠飛冲天豈不高哉矰繳尚得而加之虎豹為猛人尚食其肉席其皮譽人者少惡人者多行年七十常恐斧質之加於汜者何釋恭為說苑夢言堂溪公見昭侯曰今有白玉之巵而無當有瓦巵而有當君渴將何以飲君曰以瓦巵堂溪公曰白玉之巵美而君不以飲者以其無當耶君曰然堂溪公曰為人主而漏泄其群臣之語譬猶玉巵之無當堂溪公每見而出昭侯必獨臥惟恐夢言泄於妻妾韓子兄弟謹慎石建為郎中令奏事下建讀之驚恐曰書馬者與尾而五今乃四不足一獲譴死矣其為謹慎雖他皆如是慶為大僕御出上問車中幾馬慶以策數馬畢舉手曰六馬慶於兄弟最為簡易矣然猶如此漢書不失尺寸霍光字子孟為奉車都尉出則奉車入侍左右出入禁閨二十餘年小心謹慎未嘗有過每出入下殿門止進有常處郎僕射竊識視之不失尺寸其資性端正如此上目不忤視金日磾字翁叔自在左右目不忤視者數十年賜出宮女不敢近上欲內其女後宮不肯其篤慎如此上溫室樹孔光字子夏周密謹慎未嘗有過沐日歸休兄弟妻子燕語終不及朝省政事或問光溫室省中樹皆何木也光默不應更答以它語其不泄如是上韓昭侯與棠磎公謀而終夜獨寢慮夢言露於妻妾也孔光不對溫室之樹恐言之泄於左右也劉子省中之樹訪猶不言車前之馬數而後對張九齡傳至慎昔嘗侍坐於先帝時有三長史俱見臨辭出上曰為官長當清當慎當勤修此三者何患不治乎並受詔上顧為吾等曰必不得已而去於斯三者何先或對曰清固為本復問吾吾對曰清慎之道相須而成必不得已慎乃為太上曰卿言得之矣可舉近世能慎者誰乎吾乃舉故太尉荀景倩尚書董仲達僕射王公仲上曰此諸人者溫恭朝夕執事有恪亦各其慎也然天下之至慎者其唯阮嗣宗乎每與之言言及玄遠而未嘗評論時事臧否人物可謂至慎乎季康家誡世說司馬昭稱阮籍云無暖席墨子無厥突孔子無暖席是故聖人蒙耻辱以干世王者非以貪祿慕位也欲起天下之利而除萬民之害淮修務甲夜讀書明帝行部署不用輦甲夜讀衆書乙夜盡乃寐方五鼓起率常如此東觀漢記力經力理杜預在家則滋味經籍居官則畢力理治公家之事知無不為自敘星行夏統字仲御永興人與母兄弟居恆星行夜歸採梠求食母老病不綜家事仲御四鼓起灑掃庭內鑽火炊爨之後徑便入野別傳惜陰陶侃少長勤勑自強不息常語人曰大禹聖人乃惜寸陰至於凡俗當惜分陰豈可逸遊荒醉生無益於時死無聞於後是自棄也晉書投籤宣帝明察儉約日昃劬勞一夜內刺閨取外事分判者前後相續每雞人伺漏傳更籤於殿中乃勑送者必投籤於階石之上令鎗然有聲云吾雖眠亦令驚覺也陳紀性無倦杜佑性勤而無倦雖位極將相手不釋卷質明視事接對賓客夜則燈下讀書孜孜不怠與賓佐談論人憚其辨而伏其博唐書警枕武肅王錢鏐在軍中未嘗安寢復用圓木小枕睡熟則欹由是得悟名曰警枕及鎮撫二國至于末年每夕列侍女戒之曰外有報事當大聲以為警自是聞報即時而遣吳越備史菲庖露輿大禹闕百品之羞而菲苞廚殷湯寐寢黃屋駕而乘露輿風俗通蒿柱周明堂茅茨蒿柱土階三等以示節儉呂覽文王疾召太子發曰吾栝柱茅茨蓋為民愛費也周書令德夏取郜大鼎于宋納于太廟臧哀伯諫曰君人者將昭德塞違故昭令德以示子孫是以清廟茅屋大路越席大羹不致粢食不鑿昭其儉也桓二共德春刻其桷御孫諫曰臣聞之儉德之共也侈惡之大也先君有共德而君納諸大惡無乃不可乎莊二十四魚餐晉靈公無道以熊蟠不熟殺膳宰趙盾曰嘻趨而入公望見心怍焉欲殺之於是使勇士某者往殺之勇士入其大門則無人門焉者入其閨則無人閨焉者上其堂則無人焉俯而窺其戶方食魚餐勇士曰嘻子誠仁人也吾入子之大門則無人焉入子之閨則無人焉上子之堂則無人焉是子之易也子為晉國重卿而食魚餐是子之儉也君將使我殺子吾不忍殺子也雖然吾亦不可復見吾君矣遂刎頸而死公羊宣六擇不取費吳師在陳楚大夫皆懼子西曰無患吳矣昔闔廬食不二味居不重席室不崇壇器不彤鏤宮室不觀舟車不飾衣服財用擇不取費哀元躬莝第五倫性儉節雖為二千石長衣布躬莝養馬妻炊鱟飲食受俸祿常取赤米東觀漢記君子侈不僣上儉不逼下豈尊臨千里而與牧圉等庸乎詎非矯激則未可以中和言也後漢蔬食瓦器宣秉字巨公馮翊雲陽人也為御史中丞遷司隸校尉秉性節約常服布被蔬食瓦器帝嘗幸其府舍見而嘆曰楚國二龔不如雲陽宣巨公即賜布帛帷帳什物上妻曳柴王良為大司徒直在位恭儉妻子不入官舍布被瓦器時司徒使鮑恢以事到東海候其家而良妻布裙曳柴從田中歸恢告曰我司徒吏也故來授書欲見夫人妻曰妾是也恢乃下拜歎息而還東觀漢記補袍靈帝時欲用羊續為三司而中官求其賄續出補袍以示使者古今善言蒜果一筒前隊大夫有范仲翁鹽豉蒜果共一筒言其粗儉也三輔夬録不然官薪陳修字奉先遷為豫章太守性清潔恭儉十日一炊不然官薪會稽典録財足自容是儀字子羽事上勤與人恭不治産業不受施惠為屋舍財足自容鄰家有起大宅者孫權出望見問起大室者誰左右對曰似是儀家也權曰儀儉必非也問果他家其見知信如此服不精細食不重膳拯贍貧困家無儲畜權聞之幸儀舍求視蔬飯親嘗之對之嘆息吳志諫屋過制王廙為母立屋過制中宗流涕諫之帝所幸鄭夫人袍無文繡其恭儉率下如此晉中興書不執琉璃崔洪字伯良博陵人少以清厲顯名口不言貨財手不執珠玉汝南王亮嘗宴公卿以琉璃鍾行酒酒及洪不執亮問其故對曰慮有執玉不趣之義故耳然實乖其當性故為詭說語林晉書裹蒸曰片太官進食有裹蒸明帝曰我食此不畫可四片破之餘充晚食齊書竹筯齊明帝嘗飲食捉竹筯謂衛尉應昭光曰卿解我用竹筯意否答曰昔夏禹衣惡往誥流言象筯豢腴告哲垂誠今睿情冲素清風反古太平之跡唯竹筯而已談藪二十七種庾杲之字景行幼有孝行宋司空劉靦見而奇之謂曰見卿足使江漢崇望杞梓發聲為駕部郎清貧自業食唯有韭葅𤅢韭生韭雜菜任昉嘗戲之曰誰為庾郎貧食鮭嘗有二十七種南史十八種李崇為尚書令儀同三司富傾天下僮僕千人而性多儉吝惡衣粗食亦常無肉止有韭茹韭菹崇客李元佑語人云李令公一食十八種人問其故元佑曰二九一十八聞者大笑世人即以為譏焉洛陽伽藍記北晏嬰魏司空長孫道生廉約身為三司而衣不華飾食不兼味一熊皮鄣泥數十年不易時人比之晏嬰第宅卑陋出鎮之後子弟頗更修繕起堂廡道生還乃切責子弟令毀其宅太武命歌工歷頌群臣曰智如崔浩廉如道生北史等農文景字永昌敏學博通知名海內景入參近侍出為侯牧居室貧儉事等農家唯有經史盈車滿架所著文集數百餘篇給事封暐伯作序行於世伽藍記弊踈柳蚪字仲蟠脫略人間不事小節弊衣踈食未嘗改操人或譏之蚪曰衣不過適體食不過充饑孜孜營求徒勞思慮耳周書素業虞世南隋時兄世基當朝貴盛妻子被服擬於王者世南雖同居而躬履勤儉不失素業舊唐席蔽風雨盧懷慎清慎貞素不營資産器用屋室皆極儉陋奉身之具才一布囊耳曾臥病宋璟盧從願嘗相與訪焉懷慎臥于弊簀單席門無簾箔每風雨至則以席蔽焉常器重璟及從願見之甚喜留連永日命設食有蒸豆兩甌菜數菹而已既沒家無留儲惟蒼頭自足以給喪事明皇雜録盧懷慎無疾暴卒夫人崔氏止其兒女號哭曰公命未盡我得知之公情儉而潔廉蹇進而謙退四方賂遺毫髮不留與張說同時為相今納貨山積其人尚在而奢儉之報豈虛也哉及宵分公復生左右以夫人之言啓陳懷慎曰理固不同冥司有三十爐日夕為說鼓鑄橫財我無一焉惡可竝哉言訖復絶獨異志惜福肅宗為太子時常侍膳尚食置熟有羊臂臑上顧使太子割肅宗既割餘污漫在手以餅潔之上熟視不懌肅宗舉餅啖之上甚悅謂太子曰福當如是愛惜林氏史爛蒸去尾鄭餘慶清儉有重德一日忽召親朋官數人會食衆皆驚朝僚以故相望重皆淩晨詣之至日高餘慶方出間話移時諸人皆囂然餘慶呼左右曰處分廚家爛蒸去毛莫拗折項諸人相顧以為必蒸鵝鴨之類逡巡舁臺盤出醬醋亦極香新良久就餐每人前下粟米飯一碗蒸胡盧一枚相國餐羹諸人強進而罷盧氏雜說暗夜燭燎齊桓公合諸侯衛人後至公朝而與管仲謀伐衛退朝而入衛姬望見君下堂再拜請衛君之罪公曰吾於衛無故子曷為請對曰妾望君之入也足高氣彊有伐國之志也見妾而有動色伐衛也明日君朝揖管仲而進之管仲曰君舍衛乎公曰仲父安識之管仲曰君之揖朝也恭而言也徐見臣而有慚色臣是以知之君曰善仲父治外夫人治內寡人知終不為諸侯笑矣桓公之所以匿者不言也今管子乃以容貌音聲夫人乃以行步氣志桓公雖不言若暗夜而燭燎也呂精諭將祭亡牲魯公索氏將祭而亡其牲孔子聞之曰公索氏比及三年必亡矣後一年而亡弟子問曰昔公索氏亡牲夫子曰比及三年必亡矣今期年而亡夫子何以知其將亡也孔子曰祭之為言索也索也者盡也乃孝子所以自盡於親也至祭而亡其牲則餘所亡者多矣吾以此知其將亡也說苑伐樹隰斯彌見田成子田成子與登臺四望三面皆瑒南望隰子家之樹蔽之田成子亦不言隰子歸使人伐之斧離數創隰子止之其相室曰何變之數也隰子曰古者有諺曰知淵中之魚者不祥夫田子將有事事大而我示之知微我必危矣不伐樹未有罪也知人之所不言其罪大矣乃不伐也韓說林佯亡奔衛智伯欲襲衛乃佯亡其太子顏使奔衛南文子曰太子顏之為其君子也甚愛非有大罪也而亡之必有故然人亡而不受不祥使吏逆之曰車過五乘慎勿內也智伯聞之乃止說苑悔索車中秦昭王使謁者王稽于魏載范雎入秦至湖關望見穰侯車騎東行縣邑范雎曰吾聞穰侯專秦權惡內諸侯客此恐辱我我寧且匿車中有頃穰侯果至勞王稽因立車而語謂王稽曰謁君得無與諸侯客子俱來乎無益徒亂人國耳王稽曰不敢即別去范雎曰吾聞穰侯智士也其見事遲鄉者疑車中有人忘索之於是范雎下車走曰此必悔之行十餘里果使騎還索車中無客乃已王稽遂與范雎入咸陽雎後代穰侯為丞相史記解衣刺船陳平事項王懼誅身間行杖劍亡度河船人見其美丈夫獨行疑其亡將腰下當有寶器金玉目之欲殺平平心恐乃鮮衣裸而佐刺船船人知其無有乃止平遂至修武降漢前漢父子去職陳咸為尚書平帝時王莽輔政多改漢制咸心非之及莽因呂寬事誅不附已者何武鮑宣等咸乃嘆曰易稱君子見幾而作不俟終日吾可以逝矣即乞骸骨去職及莽篡位召咸以為掌寇大夫謝病不肯應時三子參豐欽皆在位乃悉令解官父子相與歸鄉里閉門不出上勸行不出魏桓字仲英桓帝時數被徵其鄉人勸之行桓曰夫干祿求進所以行志也今後官千數豈可損乎廄馬萬匹其可臧乎左右悉權豪其可去乎皆對曰不可桓乃慨然歎曰使桓生行死歸於諸子何有哉遂隱身不出後漢舉並不應郭泰字林宗太原介休人游於洛陽名震京師司徒黃瓊辟太常趙典舉有道或勸林宗仕進者對曰吾夜觀乾象晝察人事天之所廢不可支也遂竝不應林宗雖善人倫而不為危言核論故宦官擅政而不能傷也及黨事起知名之士多被其害唯林宗及汝南袁閎得免焉上自同傭人申屠蟠字子龍再舉有道不就先是京師游士汝南范滂等非訐朝政自公卿以下皆折節下之太學生爭慕其風以為文學將興處士復用蟠獨嘆曰昔戰國之世處士橫議列國之王至為擁篲先驅卒有坑儒燒書之禍今之謂矣乃絶迹於梁碭之間因樹為屋自同傭人居二年滂等果罹黨錮蟠崔免於疑論上避地許劭汝南平輿人初為郡功曹後司空楊彪辟舉方正敦朴皆不就或勸邵仕對曰方今小人道長王室將亂吾欲避地淮海以全老幼乃南到廣陵徐州刺史陶謙禮之甚厚邵不自安告其徒曰陶恭祖外慕聲名內非真正待吾雖厚其勢必薄不如去之遂復投揚州刺史劉繇於曲阿其後陶謙果捕諸寓士上始兵衛茲陳留人有大節不應三公之辟曹操之初至陳留茲曰平天下者必此人也且言兵之興者自公始矣先賢行狀一方之主曹公問裴潛曰卿昔與劉備共在荊州卿以備才如何潛曰使居中國能亂人不能為治若乘邊守險足為一方之主世說俊士夏侯霸奔蜀蜀朝問司馬公如何德霸曰自當作家門京師俊士曰有鍾士季其人管朝政吳蜀之憂也上侏儒一節樊胄誘諸夷叛潘濬請以五千兵擒胄孫權曰卿何以輕之濬曰胄是南陽舊姓頗能弄唇吻而實無辨論之才臣所以知之者胄昔嘗為州人設饌比至日中食不可得而十餘自起此亦侏儒觀一節之驗也權大笑即遣濬往果討平之吳志才多識寡孫登字公和稽康從遊三年問其所圖終不答然神謀所存良妙康每薾然嘆息將別謂曰先生竟無言乎登乃曰子識火乎生而有光而不用其光果然在於用光人生有才而不用其才果然在於用才故用光在乎得薪所以保其曜用才在乎識物所以全其年今子才多識寡難乎免於今之世矣子無多求康不能用及遭呂安事在獄為詩自責云昔慚下惠今愧孫登文士傳辭疾韋忠字子節裴頠為僕射數言之於張華華辟之辭疾不起人問其故忠曰吾茨簷賤士本無宦情且茂先華而不實裴頠欲而無厭棄典禮而附賊后若此豈大丈夫之所宜行耶裴嘗有心託我常恐洪濤蕩嶽餘波見漂况可臨尾閭而窺沃焦哉晉書蓴鱸張翰字季鷹吳郡人為齊王冏大司馬東曹椽冏時執權翰謂同郡顧榮曰天下紛紛禍亂未已夫有四海之名者求退良難吾本山林間人無望於時久矣好善以明防前以智慮後榮執其手愴然曰吾亦與子採南山薇飲三江水耳翰因見秋風起乃思吳中菰菜蓴菜羹鱸魚鱠曰人子貴得適意耳何能羈宦數千里以要名爵乎遂命駕歸著首邱賊俄而冏敗人因謂之知機上能抗同異王敦既亡王應欲投世儒世儒為江州王含欲投王舒舒為荊州含語應曰敦平素與江州云何而汝欲歸之應曰此乃所以宜往也江州當人彊盛時能抗同異此非常人所行及覩衰厄必興愍惻荊州守文豈能作意表行事含不從遂共投舒舒果沈含父子于江彬聞應當來密具船以待之竟不得來深以為恨世說含之投舒舒遣軍逆之含父子赴水死者酈寄賣友見譏况販兄弟以求安舒非人矣注秦孝公使商鞅伐魏鞅欺公子卬而虜之孝公薨惠王立以此疑鞅之行亡之魏魏人怨其欺公子卬而破魏師弗受也鄭平於秦王臣也其於應侯交也欺交反主為利故也去秦將入魏趙行方可賤可羞而無秦將之重不窮奚待趙急求李咳李言續經與之俱如衛抵公孫與公孫與見而與入續經因告衛吏使捕之續經以仕趙五大夫人莫與同朝子孫不可以交友公孫謁與陰君之事而反告之又里相國以仕秦五大夫功非不大也然而不得入三都又况乎無此其功而有行乎呂無義四事與酈寄事同因附此克定難制庾翼臨終自表以子園客愛之為代朝廷慮其不從命未知所遣乃共議用桓溫世說時簡文輔政然之劉惔曰溫去必能克定西楚然恐不能復制願大王自鎮上流惔請為從軍司馬簡文不許溫後果如惔所算也文章志蒲博必得桓公將伐蜀在事諸賢咸以李勢在蜀既久承籍纍葉且形據上流三峽未易可克唯劉尹云伊必能克蜀觀其蒲慱不必得則不為世說戎見未晚宋明帝廢立之際王思遠謂從兄晏曰兄荷武帝厚恩今一旦贊人如此事彼或可以權計相須未知兄將何以自立及此引決猶可保全門戶不失後名晏曰方噉粥未暇此事及拜驃騎會子弟謂思遠兄思徵曰隆昌之末阿戎勸吾自裁若用其語豈有今日思遠遽應曰如阿戎所見猶未晚也晏既不能謙退位處朝端事多專斷內外要職竝用門生帝外迹甚美內相疑異思遠謂曰時事稍異兄覺不凡人多拙於自謀而巧於謀人晏默然不答思遠退後晏方歎曰天下人遂勸人自殺旬日晏及禍南史難襒衣裾徐勉字修仁時琅邪王融一時才雋特相慕悅嘗請交焉勉謂所親曰王郎名高望促難可輕襒衣裾融後果陷於法以此見推識鑒上不愛熱官王晞字叔朗昭帝欲以為侍中苦辭不受或勸晞勿自踈晞曰我少年以來閲要人多矣充屈少時鮮不敗績且性實録緩不堪時務人主恩私何由可保萬一披猖求退無地非不愛作熱官但思之爛熟耳北齊不治産業蔡王智積高祖弟整子也以父素與高祖不睦智積常懷危懼每自貶損或勸之治産業者智積曰昔平原露朽財帛苦其多也吾幸無可露何更營乎有五男止教讀論語孝經而已亦不令交通賓客或問其故智積答曰卿非知我者其意恐兒子有才能以致禍也後從駕江都寢疾帝時踈薄骨肉智積每不自安及遇患不呼醫臨終謂所親曰吾今日始知得保首領沒於地矣隋書知廢房喬字玄齡幼聰敏嘗從其父至京師時天下寧晏論者咸以國祚方永玄齡乃避左右告父曰隋帝本無功德但誑惑黔黎不為後嗣長計混諸嫡庶使相傾奪儲后藩枝競崇淫侈終當內誅夷不足保全家國今雖清平其亡可翹足而待彥謙驚而異之舊唐尚主深憂薛克搆為戶部郎中族子紹陽城公主子也尚太平公主紹之將婚也兄顗以公主寵盛深憂之以問克搆克搆曰帝甥尚主由來故事若以恭順行之亦何懼也然室有傲婦善士所惡故鄙諺曰娶婦得公主平地買官府遠則平陽蓋主妖孽致敗近則新城晉安為時所誡吾聞新城以病而卒夫子受其戮辱晉安之醜迹上聞有勑惟案其事汴州司法李思禎右司禦獨狐元康等以穢污之狀同時配流決杖者十有一人惟薄彰露有如此者非夫天資淑德以配君子欲求無患者難矣哉顗雖大懼而竟不敢言冊府死能算生姚元崇與張說同為宰輔頗懷疑阻屢以事相侵張銜之頗切姚既病誡諸子曰張丞相與吾不叶釁隙甚深然其人少懷奢侈尤好服玩吾身歿之後以吾嘗同寮當來弔汝其盛陳吾平生服玩寶帶重器羅列於帳前若不顧汝速計家事舉族無類矣目此吾屬無所虞便當録其玩用致於張公仍以神道碑為請既獲其文登時便寫進仍先礱石以待之便令鐫刻張丞相見事遲於我數日之後必當悔若却徵碑文以刊削為辭當引使視其鐫刻仍告以聞上訖姚既歿張果至目其玩服三四姚氏諸孤悉如教誡不數日文成敘述該詳時為極筆其略曰八柱承天高明之位列四時成歲亭毒之功存後數日果使使取文本以為詞未周密欲重如刪改姚氏諸子乃引使者示其碑乃告以奏御使者復命悔恨拊膺曰死姚崇猶能算生張說吾今日方知才之不及也明皇雜録夷不為亂突厥平溫彥慱請遷於朔方以實虛危之地於是入居長安者且萬家魏徵以為夷不亂華非久常之策爭論數年不決至開中六胡反叛其地復空語林知敗蕭至忠自晉州之入也大理蔣欽緒即其妹壻送之曰以足下之才不憂不見用無為非分妄求至忠不納蔣退而嘆曰九代之卿族一舉而滅可哀也哉至忠既至拜中書令歲餘敗上向火乞兒張九齡見朝之文武僚屬趨附楊國忠爭求富貴惟九齡未嘗及門楊甚銜之九齡嘗於識者議曰今時之朝彥皆是向火乞兒一旦火盡灰冷暖氣何在當凍尸裂體棄骨於溝壑中禍不遠矣果然因祿山之亂附炎者皆罪纍族滅不可勝數向火言附炎也天寶遺事厭亂高駢鎮蜀日因巡邊至資中郡對郡山頂有開元寺黃昏僧衆禮佛其聲喧達命軍侯悉擒械之來晨笞逐召將吏謂之曰僧徒禮念亦無罪過但此寺十年後當有禿丁作亂以是厭之其後土人皆髡執兵號大髡據此寺為寨凌脅州將果叶其言語林得於資中處士王迢還山許寂少有山水之好久棲西明山不甘時譽昭宗聞其名徵赴闕召對於殿內會昭宗方與伶人調品篳築事訖方命坐賜湯果問易義既退寂謂人曰君在淫聲不在政矣寂問君人者將昭德塞違以臨昭百官懼或失之今不厭賤事自求其工君道替矣尋請遠山冊府避入相韓熙載字叔言與徐鉉齊名時號韓徐遷中書舍人至太祖有天下用事者猶議北伐熙載曰北伐吾本意也但今已不可耳郭氏姦雄曹馬之流雖有國日淺守境已固我兵妄動豈止無功耶周人果以藉口兵入淮南熙載性忽細謹老而益甚畜妓四十輩縱其出與客雜居物議門然熙載密語所親曰吾為此以自污避入相爾老矣不能為千古笑端南唐國聽公叔座疾惠王往問之曰公叔之疾嗟疾甚矣將奈社稷何公叔對曰臣之御庶子鞅願王以國聽之也為不能聽勿使出境王不應出而謂左右曰豈不悲哉以公叔之賢而今謂寡人必以國聽鞅悖也夫公叔死公孫鞅西遊秦秦孝公聽之秦果用強魏果用弱非公叔座之悖也魏王則悖夫悖者之患固以不悖為悖呂覽持守白起平原君勸趙孝成王受馮亭王曰受之秦兵必至武安君必將誰能當之者乎對曰澠池之會臣察武安君小頭而面鋭者瞳子白黑分明視瞻不轉小頭而面鋭者敢斷決也瞳子白黑分明者見事明也視瞻不轉者執志強也可與持久難與爭鋒廉頗為人勇鷙而愛士知難而忍恥與之野戰則不如持守足以當之王從其計嚴尤三將敘智人楊子曰莊周何人哉袁子曰太而不儉重而畏禍智人也袁子正書高光魏武晉簡文云漢世祖雄豪之中最有俊令之禮賢達之風高祖則倜儻踈達魏武則猜忌狹𠫤簡文談疏漢高祖度闊而網踈故後世推誠而簡直光武教一而網密故後世守常而禮義魏武帝紀亂以尚猛天下修法而貴理傳子漢興未有王公子問楊子雲何人曰才智開通能入聖道漢興以來未有此人桓談新論角立傑出桓帝問陳蕃曰徐稚袁閎韋著孰為先後蕃對曰閎竺出公族聞道漸訓著長於三輔禮義之俗所謂不扶自直不鏤自雕至於稚者爰自江南卑薄之域而角立傑出宜當為先上宗為覆蓋郭泰秀立高峙淡然淵停九州之士悉凛凛宗仰以為覆蓋蔡伯喈告盧子幹馬日磾曰吾為天下作碑銘多矣未嘗不有慚唯為郭先生碑頌無愧色耳世說共論功德汝南陳仲舉頴川李元禮二人共論其功德不能定其先後蔡伯喈評之曰陳仲舉彊於犯上李元禮嚴於攝下犯上難攝下易仲舉遂在三君之下元禮居八俊之上上陳仲舉體氣高烈有王臣之節李元禮忠壯正直有社稷之能海內論之未決蔡伯喈抑一言以變之疑論乃定也姚信士緯多情衛茲弱冠與同郡圈文生俱稱盛德郭林宗與二人共至市子許買物隨價讎直文生訾呵臧價乃取林宗曰子許少欲文生多情此二人非徒兄弟乃父子也後文生以穢貨見捐茲以烈節垂名林宗別傳借面監廚禰衡建安初來游許下是時許都新建賢士大夫四方來集或問衡曰盍從陳長文司馬伯達乎對曰吾焉能從屠沽兒耶又問荀文若趙稚長云何對曰文若可借面弔喪稚長可使監廚請客唯善魯國孔融及弘農楊修常稱曰大兒孔文舉小兒楊高祖餘子碌碌莫足數也後傳驕矜陳矯字季弼詣許還廣陵告太守陳登曰聞遠近之論頗謂明府驕而自矜登曰夫閨門雍穆有德有行吾敬陳元方兄弟淵清玉潔有禮有法吾敬華子魚清修疾惡有識有義吾敬趙元達慱聞彊記寄逸卓犖吾敬孔文舉雄姿桀出有王霸之略吾敬劉玄德所敬如此何驕之有餘子瑣瑣亦焉足録哉魏志壯觀魚豢曰尋省魯連鄒陽之徒誠彼時文辨之俊也今王粲繁欽阮瑀陳琳路粹諸人文旨亦若昔人何以不甚見用韋仲將云仲宣傷於肥戇休伯都無格檢元瑜病於體弱孔璋實自粗疏又蔚性頗忿鷙如是彼為非徒以脂燭自煎糜也然君子不責備于一人譬之木漆雖無楨幹共為光澤亦壯觀也典略名重德減太丘長陳實實子鴻臚卿紀紀子司空群群子泰四世於漢魏晉朝有重名而其德漸小臧故時人為其語曰公慚卿卿慚長博物志司馬文王問武陔陳玄伯何如其父司空陔曰通雅博畼能以天下聲教為己任者不如也明練簡至立功立事過之世說李載山燕代豪士常呼鷹攜妓以獵不肯仕生子栖筠為御史大夫磊落可觀而氣不及其父栖筠生吉甫任相國八年多智而柔懦公慚卿卿慚長蓋近之矣國史補九州被邊讓才辨俊逸孔北海嘗薦於曹操曰邊讓為九州之被則不足為單衣襜褕則有餘後漢湖海士陳登者字元龍在廣陵有威名後許汜與劉備竝在荊州牧劉表坐表與備共論天下人汜曰陳元龍湖海之士豪傑不除備問汜君言豪寧有事邪汜曰昔遭亂過下邳見元龍元龍無客主之意久不相與語自上大床臥使客臥下床備曰君有國士之名而求田問舍言無可采是元龍所諱也何緣當與君語如小人欲臥百火樓上臥君於地何但上下床之間邪表大笑魏志三反王肅字子雍亮直多聞劉實以為肅方於事上而好下佞已此一反也性嗜榮貴而不求茍合此二反也吝惜財物而治身不穢此三反也上下望之云郗公體中有三反方於事上好下佞已一反治身清貞大修計校二反自好讀書憎人學問三反世說李嶠有三戾性好榮遷憎人升進性好文章憎人才筆性好貪濁憎人受賂亦如古者有女君性嗜肥鮮禁人食肉性愛綺羅斷人衣錦性好淫縱憎人畜聲色此亦李公之徒也僉載有問秀才蔡洪吳舊姓何如答曰吳府君聖王之老成明時之俊乂朱永長理物之至德清選之高望嚴仲弼九皋之鳴鶴空谷之白駒顧彥先八音之琴瑟五色之龍章威伯歲寒之茂松幽夜之逸光陸士衡士龍鴻鵠之收回懸鼓之待槌凡此諸君以洪筆為鉏來以紙札為良田以玄默為稼穡以義理為豐年以談論為英華以忠恕為珍寶著文章為錦繡蘊五經為繒帛坐謙虛為席薦張義讓為帷幕行仁義為室字修道德為廣宅世說問人問官王澄嘗行經陳留郡界陳留時為大郡名有人士太守遣吏迎王王問吏曰此郡人士為誰吏曰有蔡子尼江應元是時郡人多居大位者王以其姓名問曰甲乙等非君郡人耶何但稱此二人吏曰向謂君侯問人不謂問官位王笑而止到郡以語太守曰舊名此邦有風俗果然小吏亦復知此晉書八雋羊曼字祖延時州里稱陳留阮放為宏伯高平郗鑒為方伯泰山胡母輔之為達伯濟陰下壺為裁伯陳留蔡謨為朗伯阮孚為誕伯高平劉綏為委伯而曼為伯凡八人兗州八伯蓋擬古之八雋也上四凶羊聃字彭祖少不經學時論皆鄙其凡庸先是兗州有八伯之號其後更有四伯大鴻臚陳留江泉以能食為穀伯豫章太守史疇以大肥為笨伯散騎郎高平張嶷以狡妄為猾伯而聃以狠戾為瑣伯蓋擬古之四凶上思古習鑿齒與桓祕書曰吾來達襄陽觸目悲感從北門入西望隆中想臥龍之吟東眺白沙思鳳雛之聲北臨樊墟存鄧老之高南眷城邑懷羊公之風縱目檀溪念崔徐之友肆睇魚梁追二德之遠未嘗不徘徊移日惆悵極多撫乘躊躇慨爾而泣上丘壑明帝問謝鯤君自謂何如庾亮答曰端委廟堂使百僚準則臣不如亮一丘一壑自謂過之世說方外廟廊明帝問周伯仁卿自謂何如庾元規對曰蕭條方外亮不如臣從容廊廟臣不如亮上此還皆百庾道季云思理倫和吾愧康伯志力強正吾愧文度自此以還吾皆百之生氣庾道季云廉頗藺相如雖千載上死人凛凛恆如有生氣曹蜍李志雖見在厭厭如九泉下人人皆如此便可結繩而治但恐狐狸猯𢓜噉盡注言人皆如曹李才智無聞功迹俱滅身盡於狐狸無擅世之名也心無所讓撫軍問孫興公劉真長何如曰清蔚簡令王仲祖何如曰溫潤恬和桓溫何如曰高爽邁出謝仁祖何如曰清易令遊阮思曠何如曰弘潤通長袁羊何如曰洮洮清便殷洪遠何如曰遠有致思卿自謂何如曰下官才能所經悉不如諸賢至於斟酌時宜籠罩當世亦多所不及然以不才時復託懷玄勝遠詠老莊蕭條高寄不與時務經懷自謂此心無所與讓也上撫君簡文帝也宴行有得張天錫數宴園池政事頗廢蕩難將軍校書祭酒索商上疏極諫天錫答曰吾非好行行有得也觀朝榮則敬才秀之士玩芝蘭則愛德行之臣覩松竹則思貞操之賢臨清流則貴廉潔之行覽蔓草則賤貪穢之吏逢颷風則惡凶狡之徒若引而伸之觸類而長之庶無遺漏矣晉書一代偉人始興以禿髮傉檀外有陽武之敗內有邊梁之亂遣其尚書郎韋宗來觀釁傉檀與宗論六國縱橫之規三家戰爭之略遠言天命廢興近陳人事成敗機變無窮辭致清辨宗出而歎曰命世大才經綸名教者不必華宗夏士撥煩理亂澄氣濟世者亦未必八索九丘五經之外冠冕之表復自有人車騎神機秀發信一代之偉人由余日磾豈足為多也載記一代英雄王謐字稚遠邵子也初劉裕為布衣衆未之識也惟獨奇貴之常謂裕曰卿當為一代英雄晉王導傳劭道子也賜鹽酒崔浩言於明元曰臣嘗私論近世人物王猛之經國苻堅之管仲也慕容恪之輔少主慕容暐之霍光也劉裕之平逆亂司馬德宗之曹操也帝曰先帝何如浩曰太祖用漠北淳朴之人南入漢地變風易俗化洽四海自與羲農堯舜齊烈臣豈敢仰名語至中夜賜浩縹繆酒十斛水精戎鹽一兩曰朕味卿言若此鹽酒故與卿同味魏書常慕汲崔劉湛字弘仁南陽平陽人少負其志氣常慕汲黯崔琰為人故名長子曰黯字長儒二子曰琰字季圭湛後為丹陽尹光祿大夫南史將來津梁封軌字廣度沉謹好學博通經傳深為郭祚所知祚常謂子景尚曰封軌高綽二人竝幹國之才必應遠至吾平生不妄進舉而每薦此二公非直為國進賢亦為汝等將來之津梁也其見重如此軌既以方直自業高綽亦以風概立名尚書令高肇拜司徒綽送迎往來軌竟不詣綽顧不見軌乃遽歸曰吾一生自為無愆規矩今日舉措不如封生遠矣魏書比蹤昔人王筠初除尚書殿中郎王氏過江以來未有居郎署者或勸逡巡不就筠曰陸平原機東南之秀王文度坦之獨步江東吾得比蹤昔人何所多恨乃欣然就職梁書古賢莫比陶弘景字通明齊高帝作相引為諸王侍讀除奉朝請後辭祿止于勾容之句曲山梁天監四年移居積金東澗深慕張良之為人云古賢莫比讀太玄司馬膺之字仲慶好讀太玄經主楊雄蜀都賦每云我欲與楊子雲周旋北齊人之師表裴寬字長寬親授撫諸弟以篤孝聞榮陽鄭穆嘗謂其從弟文直曰裴長寬兄弟天倫獨睦人之師表吾愛之重之汝可與之遊處周書待賢未足祖孝徵為侍中初李德林器量深沉時人未能測惟任城王湝趙彥深魏收陸卬大相欽重延譽之言無所不及孝徵入為侍中尚書左僕射彥深出為兗州刺史朝士有先為孝寬所待遇者問德林云是彥深黨與不可仍掌機密孝寬曰德林久滯絳衣我常恨彥深待賢未足內省文翰方以委之尋當有佳處分不宜妄說德林少孤未有字魏收謂之曰識度天才必至公輔吾輒以此字卿從官以後即典機密性重慎嘗云古人不言溫樹何足稱也隋書楊師道為侍中性周慎謹密未嘗漏泄內事嘗曰吾少窺漢史至孔光不言溫室之樹每欽餘風舊唐輕言為患鄴城內學人陸撥大象初入長安謂所親曰周德已盡楊氏必興隋公往自定州南行至鄴當時遙望擬為天子昨在路瞻仰定是不疑但未知如何而得後歲當來觀耳其所親曰爾無輕言為貴人患害撥曰天之所命安可害也李德林天命論非常人高祖鎮太原劉文靜察高祖有四方之志深自結託又竊觀太宗謂裴寂曰非常人也大度類於漢高神武同於魏祖其年雖少乃天縱矣舊唐亂世雄傑楊玄感戰敗李密亡命鴈門變姓名以教授有同鄉魏先生戲之曰觀吾子氣沮而目亂心搖而語偷氣沮者新破敗目亂者無所主心搖者神未定語偷者思有謀於人今方捕蒲山黨得非長者乎李公驚起捉先生手曰既能知我豈不能救我歟先生曰吾子無帝王規模非將帥才略乃亂世之雄傑耳吾嘗望氣汾晉有聖人生能往事之富貴可取李公拂衣而起遂絶魏生北依黎陽而南據洛口連營百萬與王充爭衡首尾三年終見敗覆追思魏生之言即日遂歸於唐乃授司農之官後復桃林之叛計澤謠船沒不死封倫字德彝在隋見重於楊素乃以從妹定命録作姪女而妻之隋文帝令素造仁智宮引倫為土木監宮成文帝大怒曰楊素殫百姓之力雕飾離宮為吾結怨於天下素惶恐慮得罪倫曰公勿憂待皇后至必有恩賞明日纍召素良久及入對獨孤皇后勞之曰公大用意知吾夫妻年老無以娛心盛飾此宮室豈非孝順賞賚甚厚素退問倫曰卿何以知之對曰至尊性儉雖初見而怒然雅聽后言婦人唯麗是好后心既悅聖慮必移所以知耳素歎曰揣摩之才非吾所及也素時勳在位略不少下唯激賞倫撫其床曰封郎后時必據吾此座唐新語後討遼東封公船沒衆皆謂死楊素曰封郎當得僕射此必未死使人求之公抱得一板沒於大海中力盡欲放之忽憶楊公之言復勉力持之胸前為板所摩擊肉破至骨衆接救得之後果官至僕射定命録選將李績每臨陳選將必相有福祿者而後遣之人問其故對曰薄命之人不足與成功名君子以為知言定命録恐變風雅貞觀十九年考貢員外郎王師旦知舉考張昌齡王公瑾策下太宗嘆曰二人咸有詞華對曰體性輕薄文絶浮艷必不成令器臣不上拔者恐變陛下風雅帝以為名言後如其言也上相不善徐敬業年十餘歲好彈射英公每曰此兒相不善將赤吾族射必溢鏑走馬若滅老騎不能及英公常獵命敬業入林趂獸因乘風縱火意欲殺之敬業知無所避遂屠馬腹伏其中火過浴血而立英公大奇之酉陽高宗時蠻群聚為寇討之輒不利乃以徐敬業為刺史彼州發卒郊迎敬業盡放令還單騎至府賊聞新刺史至皆繕理以待敬業一無所問處分他事畢方曰賊皆安在曰在南岸乃從一二佐吏而往觀者莫不駭愕賊初持兵覘望及見船中無所有乃更閉營藏隱敬業直入其營內告云國家知汝等為貪吏所苦非有他惡可悉歸田後去者為賊唯召其魁首責以不早降各杖數十而遣之境內肅然其祖英公聞之壯其膽略曰吾不辨此然破家者必此兒也國史異慕和嶠之徒狄仁傑粗覽經史薄間文筆針規切諫有古人之風剪除淫祠有烈士之操心神耿直涅而不淄膽氣堅剛明而能斷晚途錢癖和嶠之徒與僉載識於行伍李白有知鑒客并州識汾陽王郭子儀於行伍間為脫其刑責而獎重之及翰林坐永王之事汾陽功成請以官爵贖翰林上許之因而免誅樂史序三賢李華字遐叔兄事元德秀而友蕭頴士劉迅作三賢論曰元之志行當以道紀天下劉之志行當以六經諧人心蕭之志行當以中古易今世及於夫子之門則達者其流也元據師保之席瞻形容而見其仁劉被卿佐之服居賓友之地言理亂根源人倫隱明參乎元精而後見其妙蕭若百鍊之剛不可屈折當廢興去就之際一生一死之間而後見其大節取其中節之舉可以為師矣茂挺父為莒丞得罪清河張惟一時佐廉使挾成之茂挺初登科自洛至莒道邀使車發詞哀乞惟一涕下即日捨之且曰蕭贊府生一賢才資天下風教吾由是得罪無憾也夫如是得不謂之孝乎太尉房琯每見魯山則終日嘆息謂豫曰見紫芝眉宇使人名利之心盡矣司業蘇源明每謂當時名士曰使僕不幸生於衰俗所不耻者識元紫芝劉在京下嘗寢痑房公時臨扶風聞之通夕不寐顧謂賓從曰柄卿若不起無復有神道尚書劉宴每有勝理必詣與談數日忘返退而嘆曰聞劉公清言見皇王之理矣陳郡殷寅名知人見迅嘆曰今黃叔度也不幸元罷魯山終于陸渾劉避地逝于安康蕭歸葬先人歿于汝南三賢不登尊位不享下壽居易委順賢人之達也不蒙其教生人之病也唐書英華風流士賀知章陸象先族姑子也陸與知章特相友善嘗謂人曰賀兄言論情態直可謂風流之士吾與子弟離闊都不思之一日不見賀兄則鄙郗生矣舊唐楊穆貞元中楊氏穆氏弟兄人物氣概不相上下或謂楊氏弟兄賓客皆同穆氏弟兄賓客皆殊以此優劣穆氏弟兄四人贊質員賞時人謂贊俗而有格為酪質美而多仁為酥員為醍醐賞為乳腐國史補六籍奴婢劉蕡精於儒術嘗看文中子忿然言曰才非殆無擬上聖述作不亦過乎客曰文中子於六籍何如蕡曰若以人望人文中子於六籍猶奴婢之於郎主也世遂以文中子為六籍奴婢南部顧視非常韓熙載奉使周及歸元宗歷問周之將相熙載曰趙點檢顧視非常殆難測也遊南唐貸狄狄青為小校時坐法當斬雍貸之宋史雍傳將材秉義郎嶽飛犯法當刑宗澤一見奇之曰此將材也會金人攻汜水澤以五百騎授飛使立功贖罪飛大敗金人而還上澤傳預知為亂漢高知吳王濞必亂東南許邵知曹操為亂世姦臣孔恂及齊王攸識劉淵必亂王衍識石勒將為天下患潘滔知樹王敦江外為見賊張九齡識安祿山必亂幽州王敘文知劉闢必亂蜀呂晦知王安石必誤天下陳瓘識蔡京為國家賊天下之大蜮知姦鄭子産晨出過束匠之閭聞婦人之哭也撫其夫之手而聽之有間遣吏執而問之則手絞其夫者也異日其御問曰夫子何以知之子聽曰其聲懼凡人於其親愛也始病而憂臨死而懼已死而哀今哭夫已死不哀而懼是以知其有姦也韓子韓滉在潤州事同酉陽引論衡神明黃霸為揚州刺史嘗欲有所司察擇長年廉吏遣行屬令周密吏出不敢舍郵亭食於道旁烏攫其肉民有欲諸府中言事者適見之霸與語道此後日吏還謁霸霸見迎勞之曰甚苦食於道旁乃為烏所盜肉吏大驚以霸具知其起居所問毫氂不敢有所隱鰥寡孤獨有死無以菲者鄉部書言霸具為區處某所大木可以為棺某亭猪子可以祭吏往皆如言其識事聰明如此吏民不知所出咸稱神明前漢爭子潁川有富室兄弟同居兩婦數月皆懷娠長婦胎傷因閉匿之産期同至到乳母舍弟婦生男夜因盜取之爭訟三年州郡不能決丞相黃霸出坐殿前令卒抱兒取兩婦各十步叱婦曰自往取之長婦抱持甚急兒大啼叫弟婦恐傷害之因放之而止甚悽愴長婦甚喜霸曰此弟子也責問乃伏風俗通遺劍沛郡民家資二十餘萬一男才數歲失其母有一女不賢其父病因呼族人為遺書令悉以財屬女但遺一劍云兒年十五以此付之其後又不與兒乃訟之大守司空何武省其書顧謂掾吏曰女性強梁壻復貪鄙畏害其兒且俾與女實寄之耳夫劍者所以決斷限年十五者度其子智力足以自居或問州縣得以伸理其用慮深遠如是乃悉奪則還子漢書爭縑漢時臨淮有一人持一匹縑到市賣之道遇雨以縑被覆後一人至求庇陰授與一頭雨霽當別因互爭各云我縑詣府自言丞相薛宣令斷縑各與一半使騎吏聽之後人濫受因前撮之縑主稱冤宣然後呼責之具服風俗通燒夫張舉為句章令有妻殺夫因放火燒舍乃詐稱火燒夫死夫之親疑之詣官告妻妻拒而不承舉遂取猪二口一殺一活積薪燒之殺者口中無灰因驗夫口中無灰妻果伏罪異書辨劫符融在荊州有老母遇劫於路母揚聲唱盜行人為母逐之既擒劫者劫者返誣行人為盜時日垂暮母及路人莫知孰是乃俱送之融見而笑曰此易知耳可二人竝走先出鳳陽門者非盜既而還入融正色謂後出者曰汝真是盜何以誣人晉載記斷絲雞傳琰字季圭為山陰令齊高帝輔政以山陰獄訟煩積復以琰為山陰令賣針賣糖老姥爭團絲來詣琰琰挂團絲於柱鞭之密視有鐵屑乃罰賣糖者又二野父爭雞琰各問何以食雞一人云粟一人云豆乃破雞得粟罪言豆者縣內稱神明無敢為偷南史鹽薪李惠轉雍州刺史長於思察時人有負鹽負薪者同釋重擔息樹陰二人將行爭一羊皮各言藉背之物惠遣爭者出顧謂州綱紀曰此羊皮可楮知主乎郡下以為戲言咸無答者惠令人置羊皮席上以杖擊之見少鹽屑曰得其實矣使爭者視之負薪者乃伏罪魏書擒姦彭城王浟字子深為定州刺史時有人被盜黑牛背上有白毛長史韋道建謂中從事魏道勝曰史君在滄州曰禽姦如神若捉得此賊定神矣浟乃詐為上符市牛皮倍酬價直使牛主認之因獲其盜建等歎服又有老母姓王孤獨種菜三畝數被偷浟乃令人密往書菜葉為字明日市中看菜葉有字獲賊爾後境內無盜政化為當時第一齊書爭牛宇仲文字次武為安固太守有任杜兩家各失牛後得一牛兩家俱認州郡久不決益州長史韓伯俊曰于安固少年聰察可令決仲文曰此易鮮耳乃令二家各驅牛群去乃放所認者牛遂向任氏群中又使人徵傷其牛任氏嗟惋杜氏自若仲文遂訶詰杜氏服罪而去上詐敕貞觀中左丞李行廉弟行詮前妻子忠蒸其後母遂私將潛藏云敕追入內行廉不知乃進伏奉敕推詰峻急其後母詐以領中勒項臥街中長安縣詰之云有人詐宣敕喚去一紫袍人見留數宿不知姓名勒項送置街中忠惶恐私就卜問被不良人疑之執送縣縣尉王璥引就房內推問不允璥先令一人于案褥中伏聽令一人走報長使喚璥鎖房門而去子母相謂曰必不得承并私密之語璥至開門案下之人亦起母子大驚竝具承伏法僉載辨僧李德裕出鎮浙右日有甘露寺主事僧訴交代得常住什物被前主事僧隱用却常住金若干兩引證前數輩皆有相交割傳領文籍分明衆詞皆指以新得者隱而用之且云初上之時交領分兩既明及交割之日不見其金鞠成具獄伏罪照然然未窮破用之所或以僧人不拘僧行而費之以無理可伸甘之死地一旦引慮之際公疑其未盡徵以意揣之髡人乃具實以聞曰居寺者樂於知事前後主之者稽年以來空放分兩文書其實無金矣群衆以某孤立不雜洽輩流欲乘此擠排之流涕不勝其冤公乃憫而惻之曰此固非難也俯仰之間曰吾得之矣乃立促召兜子數乘命關連僧人對事咸遣坐兜子下簾子畢指揮閉門不令相見命取黃泥各令摸前後交付下次金樣以憑證據僧既不知形假竟模不成公怒令劾前數輩等皆一一伏罪其所排者遂獲清雪桂苑叢談斷絲許宗裔典劍州民有致寇者燈下認識暴客待曉告巡其賊不禁拷捶遂首其罪囚而送州宗裔引慮縲囚與被劫主有詞說宗裔促命兩家繅絲車又各齎綢紈卷時胎心復用何物一云杏核一云瓦子因令相退下綢線見杏核與囚款同仍以絲釣安車量其輕重大小亦是囚家本物因罪妄認者與巡捕吏北夢瑣言攑柳辨傷尚書李南公知長沙縣日有鬥者甲強乙弱各有青赤痕南公以指掜之曰乙真甲僞訊之果然蓋南方有攑柳以葉塗肌則青赤如毆傷者剝其皮橫置膚上以火尉之則如棒傷水洗不下但毆傷者血聚則硬僞者不硬耳踴勇踴也遇敵踴躍欲擊之也釋名不足為強桀之力別觡伸鉤索鐵揉歙金推移大麾犧水殺黿鼉陸捕熊羆然湯革車三百乘困之鳴條擒之焦門由此觀之勇力不足以持天下矣淮主術注大麾軍之大旗見御覽歙讀作協曳牛紂資辨捷疾聞見甚敏材力過人手格猛獸史記紂能倒曳九牛撫梁易柱也帝王世紀凌轢莊公奮乎勇力不顧于行義勇力之士無忌于國晏子曰昔夏之衰也有推侈大戲殷之衰也有費仲惡來足走千里手裂兕虎任之以力凌轢天下晏子君子之勇胡非子修墨以教有屈將子好勇聞墨者非鬥帶劍危冠往見胡非子而問之曰將聞先生非鬥而將好勇有說則可無說則死胡非子曰吾聞勇有五等夫負長劍赴榛薄折兕豹摶熊羆此獵徒之勇也負長劍赴深淵折蛟龍搏黿鼉此魚人之勇也登高危之上鵠立四望顏色不變此陶嶽之勇也剽必刺視必殺此五刑之勇也昔齊桓公伐魯曹劌聞之觸齊軍見桓公曰臣聞君辱臣死君退師則可不退則臣以血濺君矣桓公懼管仲曰許與之盟夫曹劌匹夫一怒而却齊侯之師此君子之勇晏嬰匹夫一怒而沮崔子之亂亦君子之勇也五勇不同公子將何處屈將說稱善乃鮮長劍釋危冠而請為弟子焉胡非子投蓋雩講于梁氏女公子觀之圉人犖自墻外與之戲子般怒使鞭之公曰不如殺之是不可鞭犖有力馬能投蓋于稷門莊三十二走而自投接其屋之角反覆門上注賈勇晉郗克及齊侯戰於鞍齊高固入晉師桀石以投人禽之而乘其車繫桑本焉以徇齊壘曰欲勇者賈余餘勇成一周武帝勞宇文慶曰卿餘勇可以賈人也隋書扶懸晉伐逼陽懸門發聊人紇抉之以出門者狄𢈶彌建大車之輪而蒙之以甲以為櫓左執之右拔戟以成一隊孟獻子曰詩所謂有力如虎者也襄十紇孔子父先鳴齊莊公朝指殖綽郭最曰是寡人之雄也州綽曰君以為雄誰敢不雄然臣不敏平陰之役先二子鳴莊公為勇爵殖綽郭最欲與焉州綽曰東閭之役臣左驂迫還於門中識其枚數其可以與於此乎二子者譬於禽獸臣食其肉而寢處其皮矣襄二十二萬人莫當公子慶忌筋骨果徑萬人莫當走追奔獸手接飛鳥骨騰肉飛拊膝數百里闔閭嘗追之於江駟馬馳不及射之暗接矢不可中吳越杓關孔子之徑舉淮道應作杓引也國門之關而不肯以力聞墨子為守攻公輸般服而不肯以兵加呂慎大孔子之通智過於萇弘勇服於孟賁足躡於郊莌力招城關能亦多矣然而勇力不聞伎巧不知淮主術四勇孔子遊於匡宋人圍之數匝而弦歌不惙子路入見曰何夫子之娛也孔子曰來吾語女夫水行不避蛟龍者漁父之勇也陸行不避兕虎者獵夫之勇也白刃交於前視死若生者烈士之勇也知窮之有命知通之有時臨大難而不懼者聖人之勇也由處矣吾命有所制矣無幾何將甲者進辭曰以為陽虎也故圍之今非也請辭而退莊子勇而能怯聖人畜仁而不主仁畜智而不主智畜勇而不主勇昔者齊桓公脅於魯君而獻地百里勾踐脅於會稽而身宦之三年襄子脅於智伯而以顏為愧其卒桓公臣魯君勾踐滅吳襄子以智伯為戮此謂勇而能怯者也尸子尚力襄楷上書云周衰諸侯以力征相尚於是夏育申休宋萬彭生任鄙之徒生於其時後漢傳烏獲任鄙之力焉而死成荊孟賁王慶忌夏育之勇焉而死史記鐵甲鐵杖趙氏攻中山中山之人多力者曰吾丘鴧衣鐵甲操鐵杖以戰而所擊無不碎所衝無不陷以車投車以人投人也幾至將所而後死呂貴卒夏鬻王子淵洞簫賦云桀跖鬻慱儡以頓雜注云鬻夏育也博申博也陸機夏育贊云夏育之猛千載所希申博角勇臨雒奮椎選蔡澤曰夏育太史噭叱呼駭三軍然而身死于庸夫史記夏育衛人力舉十鈞索隱曰二人勇者夏育賁育也似誤孟賁齊人生拔牛角帝王世紀人謂孟賁曰生乎勇乎曰勇貴乎勇乎曰勇富乎勇乎曰勇三者人之所難而皆不足以易勇此其所以能攝三軍服猛獸也尸子論勇士一呼三軍皆辟易士之誠也夫勇士孟賁水行不避蛟龍陸行不避虎狼發怒吐氣聲響動天至其死矣頭身斷絶夫不用仁而用武當時雖快身必無後是以孔子勤勤行仁新序孟賁過於河先其五船人怒而以楫虓其頭顧不知其孟賁也中河孟賁瞋目而視船人髮植目裂鬢指舟中之人盡揚播入於河使船人知其孟賁弗敢直視涉無先者又况於辱之乎此以不知故也呂覽成荊豫讓必死於襄子而趙氏皆恐成荊致死於韓主而周人皆畏呂論威孔丘曾參無所施其善孟賁成荊無所行其威淮齊俗烏獲武王有力好高力士任鄙烏獲孟說皆至大官王與孟說舉龍文之鼎絶臏而死史記見藝文御覽今本無龍文字武王好多力之士烏獲孟賁之徒竝皆歸焉秦王於洛陽舉周鼎烏獲兩目血出世紀孟賁豈即孟說之誤耶神勇田光曰竊觀太子客無可用者夏扶血勇之人怒而面赤宋意脈勇之人怒而面青武陽骨勇之人怒而面白光所知荊軻神勇之人怒而色不變燕丹子秦舞陽者燕國人也年十二以勇氣聞人犯必殺之莫有敢忤視劉昭兒童傳相啖齊之好勇者其一人居東郭其一人居西郭卒然相遇於塗曰姑相飲乎觴數行曰姑求肉乎一人曰子肉也我肉也尚胡革求肉而為革更於是具染而已因抽刀而相啖至死而止勇若此不若無勇呂當務不辱齊莊公之時有士曰賓卑聚夢有壯子白縞之冠丹績之徇東布之衣新素履墨劍室從而叱之唾其面愓然而寤徒夢也終夜坐不自快明日召其友而告之曰吾少好勇年六十而無所挫辱今夜辱吾將索其形期得之則可不得將死之每朝與其友俱立乎衢三日不得却而自歿謂此當務則未也雖然其心之不辱也有可以加乎上離俗扛鼎項籍長八尺餘力能扛鼎才氣過人紀韓信云項王喑噁叱咤千人皆廢信傳漢有善騎射者樓煩楚挑戰三合樓煩輒射殺之項王大怒乃自被甲持戟挑戰樓煩欲射之項王瞋目叱之樓煩目不敢視手不敢發遂走還入壁不敢復出紀信傳意烏猝嗟洞口祭遵為征虜將軍南擊弘農厭新柏華蠻賊合戰中弩矢入口洞出舉褎掩口血流褎中衆見遵傷却退遵呵吏士吏士進戰皆一人擊十大破之東觀漢記勇可習建安六年劉表攻西鄂西鄂長杜子緒帥縣男女嬰城而守時南陽功曹柏孝長亦在城中聞兵攻聲恐懼入室閉戶牽被覆頭相攻半日稍敢出面其明側立而聽二日往出戶問消息至四五日乃更負楯親聞語子緒曰勇可習也九州春秋曳蛟荊州上明江浦常有蛟谷汲者多不脫歲升平史陳郡鄧遐字應遠素勇健憤而入水覔蛟得便舉拳即曳著岸欲砍殺母語云蛟是神物寧勿殺之今可呪食勿復為害遐呪而放焉自茲迄今絶無此患異苑互見蛟呼聲盜殞兗州刺史蔡裔有勇氣聲若雷震嘗有二偷入室裔拊林一呼而盜俱隕殷浩委以軍鋒焉晉傳逸材楊大眼武都氐難當之孫少有膽氣跳走如飛高祖南伐李冲典選征官大眼求焉冲不許大眼曰尚書不見知為尚書出一枝便以絶長三丈繫髻而走繩直如矢馬馳不及見者莫不驚嘆冲曰千載已來未有逸材若此者遂用為軍主談藪所經戰皆武冠六軍大眼妻潘氏善射詣軍省大眼至攻戰遊獵之際潘氏亦戎裝齊鐮竝轡乃至還營同坐幕下對諸寮佐言笑自得大眼指謂諸人曰此潘將軍也淮泗之間童兒啼者恐之云楊大眼至無不立止後魏執石人相擊羊侃字祖欣膂力絶人所用弓至二十石馬上用六石弓嘗於兗州堯廟踏壁直上至五尋橫行得七跡泗橋有數石人長八尺大十圍侃執以相擊悉皆破碎大通三年至建鄴初仕魏為尚書郎以力聞魏帝謂曰郎官謂卿為虎豈羊質虎皮乎試作虎狀侃因伏以手抉殿沒指魏帝壯之賜以珠劍南史五十三指碎羊骨魏孝文帝宏少善射有膂力年十餘能以指彈碎羊髆骨射禽獸莫不隨行所至而斃北史紀挾石獅踰墻東魏孝文帝善見好文美容儀能挾石獅子以踰墻射無不中上神力神武起兵范陽盧曹以勇力稱為爾朱據薊曹身長九尺鬢面甚雄臂毛逆如䐗鬣力能拔樹嘗臥疾猶申足以舉二人蠕蠕寇范陽曹登城射之矢出三百步投弓於外群虜莫能彎乃去之時有沙門曇讚號為神力唯曹與之角焉曇讚聞叫聲則勝北史十九截腸彭樂勇猛無雙時神武率樂等十餘萬人於沙苑與宇文護戰時樂飲酒乘醉深入被刺肝肚俱出內之不盡截去復入戰護兵遂敗相枕藉死者三萬餘人獨異志樂被刺腸出內之不盡截去復戰身被數創軍勢遂挫不利而還神武每追諭以戒之北史投井躍出權武少果徑勇力絶人能重甲上馬嘗倒投於井未及泉復躍而出其拳捷如此上言聞百步魚俱羅身長八尺膂力絶人聲氣雄壯言聞數百步上肉飛仙沈光字總持少驍捷善戲馬為天下之最初建禪定寺其中幡竿高十餘丈適值繩絶非人力所及光謂僧曰當相為上繩諸僧驚喜光因取口銜拍竿而上直上龍頭繫繩畢手足皆放透空而下以掌拓地倒行十餘步觀者駭悅莫不嗟異時人號為肉飛仙後應徵從煬帝攻遼東以衝梯擊城竿長十五丈光升其端臨城與賊戰短兵接敵殺傷十數人賊競擊之而墜未及于地適遇竿有垂絙光接而復上帝望見壯而異之馳之與語大悅恆致左右及江都之難光與麥孟才錢傑陰圖宇文化及為帝復讎事泄倉卒奮擊賊皆披靡司馬德戡遣騎持弩翼而射之光身無甲胄遂為所害麾下數百人皆鬥而死一無降者壯士聞之莫不為之隕涕隋書拳捷崔弘度膂力絶人儀貌魁岸常與宇文護子訓登樓至上層去地四五丈俯臨之訓曰可畏也弘度曰此何足畏歘然擲下至地無損傷訓以其拳捷大奇之上書壁龍柴紹弟某有材力輕趫迅捷踊身而上挺然若飛十餘步乃止嘗著吉莫靴走上磚城且至女墻手無攀引又以足蹈佛殿柱至簷頭捻掾覆上越百尺樓閣了無障礙太宗奇之曰此人不可處京邑出為外官時人號為壁龍僉載撮確書壁宋令文者有神力禪定寺有牛觸人莫之敢近築圈以闡之令文問知其故遂𥘵禓而入牛竦角向前令文接兩角頓之應乎而倒頸骨皆折而死又以五指撮碓觜壁上書得四十字詩為太學以一手挾講堂柱起以同房生衣柱下壓之重設乃為之出令文有三子長之問有文次之遜善書次之悌有勇之悌後左降朱鳶會賊破歡州以之悌為總管擊之募壯士得八人之悌身長八尺被重甲直前大叫曰賊動即死賊七百人一時俱挫大破之上曳車彭博通者河澗人也身長八尺曾於講堂階上臨楮而立取鞋一緉以臂夾令有力者後拔之鞋底中斷慱通腳終不移牛駕車正走慱通倒曳車尾却行數十步橫拔車轍深二尺皆縱橫破裂曾遊瓜步江有急風張帆慱通捉尾纜挽之不進上慱通膂力絶倫嘗於長安與壯士魏弘宋令文馮師本角力慱通堅臥命三人奪其枕三人力極未腳盡折而枕不動觀者踰主人垣墻屋宇盡壞名動京師嘗與客同飲會瞑獨持兩床降階就月于庭酒俎之類略無傾瀉矣御史台記賞等身金郝玭鎖臨涇鎖勇敢無敵聲振虜庭在邊三十年每戰得蕃俘必刳剔而歸其尸蕃人畏之如神普贊下令國人曰有生得郝玭者賞之以等身金蕃中兒啼者呼玭名以怖之舊唐擲投石獅續溪縣大徽村西北五里有汪節者其母避瘧於村西祿田寺金剛下因假寐感而生節節有神力入長安行到東渭橋橋邊有石獅子其重千斤節指而告人曰吾能擬此而擲之衆不信之節遂提獅子投之丈餘衆人駭異後數十人不能動之遂以賂請節節又提而致之故地尋而薦入禁軍補神策軍將嘗對御俯身負一石碾置二丈方木於碾上上又置一床上坐龜茲樂人一部奏曲終而下無厭重之色德宗甚寵惜之纍有賞賜雖拔山曳牛之力不能過也歙州圖經蹴搗帛石棋客楊河者身形魁偉咸通中游江表寺中著棋僧曰聞隨軍有膂力能角抵願憑欄以觀之河只脫寬衣以腳蹴起庭中搗帛石再蹴手接擲高復接如擊鞠焉角力記河一作汀指畫石痕咸通中京兆左軍有張季弘勇而多力嘗經勝業坊遇泥濘深溢有村人驅驢負薪而至適當具道弘怒之因提驢四足擲過水渠數步觀者無不驚駭後供奉襄州暮泊沈山逆旅有媼謂其子曰惡人歸矣既而愁嘆咸有所懼弘問媼媼以新婦悖逆勇壯無敵對弘笑曰當為除之日暮婦人荷薪而歸後園有磐石弘坐其上召而數之婦人謂弘曰只如某月日如某事豈是新婦不是每言一事引手于弘石上以中指畫之隨手作痕深可數寸弘流汗神駭俱言道理不錯闔扉假寐伺晨而發及回問之新婦已他適矣劇談録拔巨樹姚結耳者為南唐相僕都知膂力過人後出家于廬山開元寺尋為禪者觸犯勇力奮作擬歐其僧自念摧挫而止猶對請普僧前將巨樹拔其根擘其交幹褫其皮如是數株而止其僧逃匿上武一谷武行德初以採薪為業氣雄力壯一谷之薪可以盡負鄉里謂之武一谷五代史補漢祖因出獵行德方入城鬻薪見其魁岸所負之薪令左右數人不能舉壯其力留帳下後至節帥談苑操刺契丹耶律德光送高祖至潞州臨決指劉知遠曰此都軍甚操刺無大故勿棄之上世俗謂勇猛為操刺弄石毬盧郢好學有才藝而膂力過人徐鉉娶郢妹鉉嘗受後主旨撰文數日不能就因語郢郢曰願試為之因弄百鈞石毬以較力少頃引酒一巵復弄如初若是者數四鉉視之曰非吾徒也其何能為且試詰之郢曰既就矣命筆吏口授而書之鉉大驚遂以郢文進後主謂鉉曰語勢酋健似非卿作鉉以實對郢由是知名南唐金剛對舁王愚子者楊州人少小時嘗夢與金剛對舁物似木薪如是兩轉因覺有力遂好相撲因有偶對僞吳楊氏武義中卒角力記三勇有上勇者有中勇者有下勇者天下有中敢直其身先王有道敢行其意上不循於亂世之君下不俗於亂世之民仁之所在無貧窮仁之所亡無富貴天下知之則欲與天下同苦樂之天下不知之則傀然獨立天地之間而不畏是上勇也禮恭而意儉大齊信焉而輕貨財賢者敢推而尚之不肖者敢援而廢之是中勇也輕身而重貨恬禍而廣解茍免不恤是非然不然之情以期勝人為意是下勇也茍性惡四勇有狗彘之勇者有賈盜之勇者有小人之勇者有士君子之勇爭飲食無廉耻不知是非不辟死傷不畏衆彊恈恈然唯利飲食之見是狗彘之勇也為事利爭貨財無辭讓果敢而振猛貪而利恈恈然唯利之見是賈盜之勇也輕死而暴是小人之勇也義之所在不傾於權不顧其利舉國而與之不為改視重死持義而不撓是士君子之勇也上榮辱勇悍林既曰夫登高臨危而目不眴而足不陵者此工匠之勇悍也入深淵刺蛟龍抱黿鼉而出者此漁夫之勇悍也入深山刺虎豹抱熊羆而出者此獵夫之勇悍也不難斷頭裂腹暴骨流血中野者此武夫之勇悍也今臣居廣廷作色端辨以犯主君之怒前雖有乘軒之賞未為之動也後雖有斧質之威未為之恐也此既之所以為勇悍也說苑兵三勇兵有三勇主愛其民者勇有威形者勇賞信於民勇故仁愛加於下則有必死之民素淮正論力聞公儀伯以力聞諸侯堂溪公言之於周宣王王備禮以聘之公儀伯至觀形懦夫也宣王心惑而疑曰女之力何如公儀伯曰臣之力能折春螽之股堪秋蟬之翼王作色曰吾之力者能裂犀兕之革曳九牛之尾猶憾其弱女折春螽之股堪秋蟬之翼而力聞天下何也公儀伯長息退席曰善哉王之問也臣敢以實對臣之師有商丘子者力無敵於天下而六親不知以未嘗用其力故也列仲尼拔矟長沙威王晃少有武力為太祖所愛世祖嘗幸鍾山晃從駕以馬矟刺道邊枯蘗上令左右數人引之銀纏皆卷聚而矟不出乃令晃復馳馬拔之應手便去太祖常曰此我家任城也南齊送弓奚康生河南洛陽人性驍勇有武藝弓力十石矢異常箭為當時所服齊置義陽招誘邊誘邊人康生從王肅討之齊將張伏護自升城樓言辭不遜肅令康生射之望樓射窗扉開即入應箭而斃彼人見箭皆以為狂弩梁武聞其能引強弓故特作大弓兩張送之康生得弓便會集文武乃用平射猶有餘力其弓長八尺把中圍尺二寸箭粗殆如今之長笛觀者以為希世絶倫弓而表送置之武庫魏書挾槍什知巖姓華氏弱冠雄武過人大業末為武賁中郎將從張鎮州往征王世充其大將馬俱全以搶剟地呼衆拔之巖跨馬以腋挾搶而去次巖以搶剟地彼搖再三不動乃下馬交刃遂生擒之績高僧傳天力士釋法通小出家極尫弱同侶輕之日向觀音像泣求提誘歲餘夢有人遺三驢䭾䈥通始噉一驢為母驚覺自爾身力雄勇密舉大木石不以為重寺有僧戡者膂力之最通竊取袈娑安在柱下戡初不見謂是神鬼所為通笑為舉梁抽取戡大駭隋高祖聞而重之有西番貢一人云大壯在北門試相撲無得者帝頗恧之命召通來令相撲通曰必知氣力把手即知便喚彼來通任其把捉其人努力把捉通都不以為懷至通後捉揔攬兩手急搦一時血出外灒彼即蟠卧在地乞命通乃放之於是大伏舉朝稱慶京邑弄力者聞而造之通為把豆麥便碎倒曳車牛行當時壯士命為天力士也上釋明恭住鄭州會善寺其力若神不可當者曾與超化寺爭地彼多召無賴者百餘人來奪會善秋苗衆咸憂惱恭曰無愁獨詣超化脫其大鍾塞孔以乾飯六升投中和水可噉一手承底一手取噉須臾並盡仍取大石可三十人轉動者恭獨拈之如小土塊遠擲于地超化既見一時驚走又曾山行虎猪交鬪猪漸不如恭語虎曰可放令去虎不肯便一手捉頭一手撮尾拋之深谷會善有客游沙彌口作吳語厨下然火乾竹如臂兩指折而燒之恭時怪訝亦以指折而不得沙彌出後恭抱厨柱起以沙彌衣置磉上柱壓之沙彌來求衣不得見在柱下欲取不得恭笑為捧柱取衣上嗜菖文王嗜菖蒲葅孔子聞而服之縮頞而食之三年然後勝之呂遇合逐臭人有大臭者其親戚兄弟妻妾知識無能與居者自苦而居海上海上人有說其臭者晝夜隨之而弗能去上嗜蜜𧏿蛦宋明帝嗜蜜漬𧏿蛦每啖數升僉載嗜痂劉雍穆之之孫也性嗜瘡痂以味似鰒魚嘗詣孟靈休靈休先患炙瘡瘡痂落床上雍取食之靈休大驚雍答曰性之所嗜靈休瘡痂未落者悉禠取以飴雍雍去靈休與何勗書曰劉雍向顧見噉遂舉體流血南康國吏二百許人不問有罪無罪遞與鞭瘡痂常以給膳好潔庾仲文性好潔士大夫造之者未出戶輒令人拭席洗床時陳郡殷冲亦好淨小吏非淨浴新衣不得近左右士大夫小不整潔每容接之仲文好潔反是每以此見譏南史易柱王思微性好潔淨左右提衣悉令白紙包手指在宅有犬汗柱思微令門生洗之意猶不已便令刮削復言未足遂令易柱金樓子服精周舒州勑史張懷肅好服人精唐左思郎中任正亦有此病僉載刻石顏太師貞卿刻姓名于石或置之高山之上或沉之大洲之底而云安知不有陵谷之變耶傳載好食臭蟲劍南東川節度鮮于叔明好食臭蟲時人謂之蟠蟲每散衙令人採蟲得三五升即浮之微熱水中以泄其氣盡以蘇及五味熬之卷餅而啖云其味實佳乾𦠆子嗜人爪長慶末前知福建院權長孺犯事流貶後將詣闕求官臨行郡公飲餞于禪智精舍將士蔣傳知長孺有嗜人爪癖乃於步健及諸傭保處薄給酬直得數兩削下爪或洗濯未精以紙褁俟其酒酣進曰侍御遠行無以餞送今有少佳味敢獻遂進長孺視之欣然有喜色如千金之惠涎流於吻連撮噉合坐驚異上聚書杜兼嘗聚書萬卷每卷後必自題云清俸寫來手自校汝曹讀之知聖道墜之鬻之為不孝傳載異好李衛公德裕喜見未聞新書策崔魏公鉉好食新䭃頭以為珍美杜魏公悰每早食饙飯乾脯崔侍中安潛好看聞牛北夢瑣言宋明帝好鬼神多忌諱言語文書有禍敗凶喪疑似之言應回避者犯即加戮改騧馬字為馬邊瓜以騧字似禍故也宣陽門謂之白門上以白門不祥諱之尚書右丞江謐嘗誤犯上變色曰白汝家門移床修壁先祭土神使文士為祝策如大祭饗南史後梁宣帝察不拘小節不好聲色尤惡見婦人雖相去數步遙聞其臭經御婦人之衣不復更著又惡見人髮白事者必方便以避之周書天中記卷二十七
