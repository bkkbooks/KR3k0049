  - {type: variant, offset: 21362, length: 315, content: 笑言嘗大雪在廷者皆振裾更立斌不徒足雪甚幾至沒靴亦不失恭安石傳天寶初安思順進五色帶上怪近日西貢無五色玉令責安西諸蕃蕃言為小勃律所劫沮上怒李林甫贊成上意命王天運將四萬人往征之屠其城虜二千人及其珠璣而還勃律中有術者言將軍無義不祥天將大風雪矣行數百里忽驚風四起雪花如翼風激小海水成冰柱起而復摧經半日小海漲湧四萬人一時凍死酉陽雜俎王元寶每大雪之際則令僕夫門巷掃雪為徑迎揖賓客飲宴為暖寒之會天寶遺事大曆初鍾陸崔希真工繪事冬日晨出見一老人避雪門下延入具大麥麵食之又獻松花酒老人懷中取一丸藥置酒中酒頃耳美仍似數丸遺崔崔入宅復出見老人已去有圖于所畫素上者皆非常意所及遂踏雪尋至蘆洲中見船中數人而樵客在側顧笑曰葛三乃見逼于伊人李極光天師曰此真人葛洪第, WYG: ''}
