  - {type: 'tls:seg', offset: 21266, content: '', id: KR3k0049_CHANT_030-p522s4}
  - {type: variant, offset: 21266, length: 0, content: '', WYG: 穆宗在東宫方幼好戲綬講書之隟頗以朝誚恱之嘗密齎家所造食入宫餉太子憲宗嘗召對綬奏曰太子學書至依字輒去旁人臣問之太子云君父以此字可天下奏事臣子不合全書上益嘉太子之賢賜綵錦綬無威儀時以人問鄙說􅃧言以取悦太子太子因入侍道綬語憲宗不悦謂侍臣曰凡侍讀者當以經義輔導太子納之䡄物而綬語及此予何望耶乃罷侍讀出為䖍州刺史穆宗即位以師友之恩召為尚書右丞兼集賢院學士甚承恩顧出入禁中舊唐劉納言乾封中歴都水監主簿以漢書授沛}
  - {type: page-break, offset: 21266, content: '', id: KR3k0049_WYG_030-68b, image: WYG0966/WYG0966-0401b.png}
