  - {type: variant, offset: 22773, length: 511, content: 類凡十卷名曰諸經纂要冀人主易於省覽上嘉之賜綵二百疋高元裕自侍講為中丞文宗難其代元裕表言兄少逸才可任因遷少逸議諫大夫代元裕為侍講學士兄弟迭處密時人榮之王起開成三年入翰林為侍講學士文宗或僻字疑事令中使口宣起具榜子附使者上凡十篇號曰寫宣唐書鄭覃太和三年充翰林侍講學士覃長於經學稽古守正文宗尤重之李宗閔牛僧孺以覃與李德裕善惡覃禁中言事奏為工部尚書能侍講學士上好經義心頗思之六年二月復召為侍講學士七年德裕作相上嘗于延英謂宰相曰殷侑通經學為人頗似鄭覃宗閔曰覃誠有經學於議論不足聽覽德裕曰殷鄭之言他人不欲聞陛下切欲聞之覃嘗嫉人朋黨為宗閔所薄故也舊書流人補李訓太和八年自流人補四門助教召人內殿面賜緋魚充翰林侍講學士入阢日賜宴宣法曲第子二十人就院奏法曲以寵之兩省諫官鄭肅高元裕等伏閣切諫言訓姦邪海內聞知不宜令侍宸扆帝終不聽鄭注始以藥術游長安始李愬病痿注治之有狀王守澄神其術太和八年注進藥方一卷上令守澄召對浴堂門賜金紫召對之夕慧出東方九年充翰林侍講學士召自九仙門帝面賜告身時李訓附注以進己在禁庭二人相洽日侍君側講貫太平之術以為朝夕可致昇平兩姦合從天子益惑其說既得行其志生平恩讎絲毫必報朝士相繼斥逐班列為之一空後敗籍沒其家財得絹一百萬匹他貨稱是, WYG: ''}
