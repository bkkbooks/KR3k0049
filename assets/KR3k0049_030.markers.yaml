  - {type: variant, offset: 16397, length: 419, content: 以歸其縱率如此會廢學士院出為吏部員外郎遷禮部郎中知制誥復置翰林遷中書舍人再為學士時在西掖搢縉榮之分紀南唐李璟即位馮延巳喜形於色璟未聽政延巳屢入白事璟不悅曰書記自有常職餘各有司存何不匣煩也俄拜諫議大夫充翰林學士復結魏岑侵損時政與其弟延魯及陳覺查文徽等更相推唱時人謂之五鬼九國志宿儒建隆元年學士王著以酒失扈蒙以請求皆貶官太祖謂宰相曰深嚴之地當以宿儒處之范質對曰竇儀清介重厚然頃自翰林遷端明矣帝曰禁中非此人不可卿當諭以朕意勉令就職分紀宋史淳化四年以張洎錢若水為翰林學士洎等赴上帝曰學士之職清切貴重非他官可比朕常恨不得為之故事學士赴上有勑設久罷其事當令設之仍召樞密直學士及知制誥預坐洎愽涉經史多知典故每上有著述或賜近臣詩什洎必上表援引經傳以將順其意上因賜詩褒美有翰長老儒臣之句後判吏部銓嘗引對選人上顧之謂近臣曰張洎富有文藝至令尚苦學江東士人之冠也上洎字師黯南唐為清輝殿學士入宋與蘇易簡同在禁林甚被寵顧與蘇易簡不恊事文引作張垍置之劉褘之柳公權之間誤, WYG: 玉堂署}
