  - {type: variant, offset: 21267, length: 3, content: 晙將井, WYG: 賢及賢為太子皇累遷太子洗馬兼充侍讀常撰詼諧集十五卷以進太子及賢廢髙宗見而怒之曰劉納言自府入内久淹嵗月朝遊夕處竟無匡贊闕忠孝之良規進詼諧之鄙説儲宫敗徳抑有所由配流振}
