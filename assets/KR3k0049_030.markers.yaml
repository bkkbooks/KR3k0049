  - {type: variant, offset: 21263, length: 0, content: '', WYG: 稽古之力王逥質}
  - {type: variant, offset: 21263, length: 0, content: '', krp: 稽古之力王逥質}
  - {type: variant, offset: 21265, length: 0, content: '', WYG: 十年拜集賢院學士仍侍讀迴質山東宿儒褐衣召拜既入侍讀仍令侍皇太子讀書及夀王通孝經賜束帛酒饌及床褥衣被等令逥質坐床上羅列所賜物金吾奉歸其家里巷觀者如堵家人入門歡􅀈皆歎曰稽古之力信不虚也職官分紀獻龍樓箴順宗為太子歸崇敬與登父子侍讀及即位復為皇太子諸王侍讀獻龍樓箴以諷戲言取悦韋綬字子章元和中充太子諸王侍讀}
  - {type: page-break, offset: 21265, content: '', id: KR3k0049_WYG_030-68a, image: WYG0966/WYG0966-0401a.png}
  - {type: variant, offset: 21265, length: 0, content: '', krp: 十年拜集賢院學士仍侍讀迴質山東宿儒褐衣召拜既入侍讀仍令侍皇太子讀書及夀王通孝經賜束帛酒饌及床褥衣被等令逥質坐床上羅列所賜物金吾奉歸其家里巷觀者如堵家人入門歡􅀈皆歎曰稽古之力信不虚也職官分紀獻龍樓箴順宗為太子歸崇敬與登父子侍讀及即位復為皇太子諸王侍讀獻龍樓箴以諷戲言取悦韋綬字子章元和中充太子諸王侍讀}
