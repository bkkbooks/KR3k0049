  - {type: variant, offset: 28762, length: 389, content: 錄漢東京圖籍在東觀故使名儒碩學著作東觀撰述國史箸作之名自此始也宋志馬融安帝時為大將軍鄧隲所召拜校書郎中在東觀十年窮覽典籍上廣成頌又寶章居貧蔬食講讀不輟太僕鄧康重章學行是時學者稱東觀為老氏藏室道家蓬萊山康薦章入東觀為校書郎中續後漢書桓帝延喜二年初置秘書監掌典圖書古今文字考合異同東觀漢記應亨五葉應亨讓著作表曰自司隸校尉奉至臣五葉著作不絕卿族以為美談崔駰三世繼其後無間若乃談遷武彪固踵跡亦各一世之良也集荀勗字公曾領秘書監與中書令張華依劉向別錄整理錯亂又得汲冢周書身自撰次以為中經列於秘書經傳闕文多所證明王隱晉書諸公讚束晢元康四年晚應司空府入月餘亦除著作佐郎著作西觀撰晉書草創三帝紀及十志文士傳梁秘書郎後漢校書郎也龍朔二年改秘書省曰蘭臺天授初改曰麟臺龍朔改著作為司文郎宋書六典宋太宗崇尚儒術以史館之比建秘閣仍送三館書萬餘卷以實其中內諸司舍屋唯秘閣最宏壯閣下穹隆高敝相傳謂之木天職官分紀, WYG: 録}
