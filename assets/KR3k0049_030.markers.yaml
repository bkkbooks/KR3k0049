  - {type: variant, offset: 16244, length: 152, content: 同受命入翰為學士致雍有俊才舜卿才思拙涉及試五題不勝困弊因託致雍秉筆當時議者為座主辱門生同光初致仕北夢鎖言後唐同光中賜承旨盧質論思翊佐功臣旋授節制河中王道詩云視草北來唐學士擁髦西去漢將軍時人榮之續翰林志李澣為翰林學士常陞殿侍宴翰衣緣左右揖令退澣叱之遂賜緋與坐主和凝同任學士會疑入相澣常草制命開疑閣盡取器玩圖, WYG: 梁}
