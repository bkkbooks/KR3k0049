  - {type: variant, offset: 7730, length: 281, content: 觀也於上觀望也釋名兩觀子家駒曰諸侯僣於天子大夫僣於諸侯久矣昭公曰吾何僣矣哉子家駒曰設兩觀乘大路公羊昭二十五傳禮天子諸侯䑓門天子外闕兩觀諸侯內闕一觀註夏五月壬辰雉門及兩觀災兩觀微也然則曷為不言雉門災及兩觀主災者兩觀也上定二昆吾衛侯夢於北宮見人登昆吾之觀注云衛有觀在古昆吾氏之墟也今濮陽城中左哀十七清梧五柞宮有青梧觀觀前有三梧桐樹樹下有石騏驎二枚刋其脇為文字是秦始皇酈山墓上物也頭高一丈三尺東邊者前左腳折折處有赤如血父老謂其有神皆含血屬筋焉西京雜記白楊營合圍會然後先置乎白楊之南校獵賦注白楊觀名飛廉延壽公孫卿謂武帝曰仙人好樓居於是上令長安作飛廉桂觀甘泉則作延壽觀史記, WYG: ''}
