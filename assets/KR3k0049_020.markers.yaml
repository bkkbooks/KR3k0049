  - {type: variant, offset: 26957, length: 505, content: 謝天香鉅野有穠芳亭邑人秋成報祭所也一日鄉耆謀立石其中延士人王維翰書穠芳亭字維翰久之未至有妓謝天香者問云祀事既畢何為遲留不飲眾曰俟維翰書石耳謝遂以身裔當筆書穠芳二字會維翰至書亭字以完之父老遂命刻之石王謝遂成夫婦後王戲謝詩曰昔日章臺曾舞腰行人無一折枝條天香曰從今已付丹青手壹任狂風不動搖後維翰登進士與天香偕老志嚴蕊天台營妓嚴蕊字幼芳色藝冠一時間作詩詞有新語唐與正賞愛之其後朱晦菴以使節行部至台欲摭與正之罪遂指其嘗與蕊為濫繫獄月餘蕊雖備箠而一語不及唐吏因好言誘之其辭益堅仍繫于獄苦楚幾死然聲價愈騰至徹阜陵之聽未幾朱公別除而岳霖啇卿為憲因賀朔之際憐其悴病卒命之作詞自陳即日判令從良繼而宗室近屬納為小婦以終身焉齊策埜野惜惜馬光明知高郵軍適值管軍官榮全率眾叛據城縱軍劫掠與同黨王安等飲宴有妓毛惜惜不服趨侍全痛責之惜惜云妾雖賤妓不曾伏事反臣全遂斬之秋崖方岳作義娼傳三朝野史閫臣以聞特封英烈夫人潘庭堅詩云淮海艷姬毛惜惜蛾眉有此萬人英恨無匕首學秦女向使裹頭真杲卿玉骨花顏城下土水魂雪魄史間名古今無限腰金者歌舞筵中過一生隨隱謾錄唐安安理宗癸丑元夕上呼妓入禁中有唐安安者歌色絕倫帝愛幸之侍郎牟子才諫曰此皆董宋臣輩壞陛下素履宋史無唐名, WYG: ''}
