  - {type: variant, offset: 15126, length: 890, content: 秋給車晉武帝時荀勗為中書監和嶠為令故事監令由來共車嶠性雅正常疾勗謟諛後公車來嶠便登正向前坐不復容勗勗方更覔車然得去監令各給車自此始世說劉喬字仲彥南陽人齊王冏為大司馬初嵇紹為冏所重每下階迎之喬言於冏曰裴張之誅朝臣畏憚孫秀故不敢受財物嵇紹今何所逼忌故畜裴家車中張家奴婢耶樂彥輔來公未嘗下床何獨加敬于紹冏乃止紹謂喬曰大司馬何故不復迎客喬曰似有正人言以卿不足迎者紹曰正人為誰喬曰其則不遠紹默然晉書鬼子盧志於眾坐問陸士衡陸遜陸抗是君何物荅曰如卿於盧毓盧珽士龍失色既出户謂兄曰何至如此彼容不相知也士衡正色曰我父祖名播海內寧有不知鬼子敢爾世說結援王導初在江左欲結援吳人請緡陸太尉對曰培塿無松栢薫蕕不同器玩雖不才義不為亂倫之始上姐上腐肉蘇峻事平王庚諸公欲用孔坦為丹陽亂離之後百姓彫弊孔慨然曰昔肅祖臨崩諸君親升御床並蒙眷識共奉遺詔坦踈賤不在顧命之列既有艱難則以㣲臣為先今猶姐上腐肉任人膾截耳於是拂衣而去諸公亦止上不筮郭璞嘗遇顏含欲為之筮含曰年在天位在人脩已而天不與者命也守道而人不知者性也自有性命無勞蓍龜晉書時務王導名位隆重百僚宜為降禮太常馮懷以問於顏含含曰王公雖重理無偏敬降禮之言或是諸君事宜鄙人老矣不識時務既而告人吾聞伐國不問仁人向馮祖思問佞於我我有邪德乎晉書雅尚尊嚴蔡充字子尼祖睦蔡邕孫也充少好學有雅尚體貌尊嚴莫有媟慢於其前者高平劉整有雋才而車服奢麗謂人曰紗縠人常服耳嘗遇蔡子尼在坐終日不自安見憚如此充歷成都王東曹掾故稱東曹別傳充虛劉真長王仲祖共行日旰未食有相識小人貽其餐肴案甚盛真長辭焉仲祖曰聊以充虛何苦辭真長曰小人都不可與作緣世說移簴桓溫議移洛陽鐘簴王述曰永嘉不競暫都江左方當漸平區宇旋軫舊京若其不爾宜改遷園陵不應先事鐘簴溫不能奪晉書澄裁周勰為謝安主簿居喪廢禮崇尚老莊脫落名教時韓康伯領中正不過勰品為之議曰拜下之敬猶違眾從禮情理之極不宜以多比為通時人以康伯為澄世所不能澄裁世所不能裁上坐有婦人初淮陵內史虞珧子妻裴以尺牘辨利廉服食絕谷常衣黃衣狀若學道者司馬道子常延致之甚悅其才每與百官飲宴裴亦預焉悉令與賓客談眾人皆為降節王恭辭曰恭聞男女之別國之大節未聞宰相之坐有失行婦人一坐竦然道子慙續晉陽, WYG: ''}
