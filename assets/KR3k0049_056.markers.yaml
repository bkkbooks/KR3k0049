  - {type: variant, offset: 4487, length: 443, content: 齒晉吳蒼鷹捨宅為寺自至楊郡廣經像正濟大江船遂傾側忽有雙骨各長一丈隨波騰漾奄入舟中即得安流開岸以事奏聞有司觀檢乃龍齒也續高僧僧明傳龍毛益州雒縣寺道卓造木浮圖塔為龍所護居在西南角井時有相現側有三池三龍居之貞觀中三龍大斗雷霆震擊水火交飛久之乃凈塔如本人皆拾得龍毛長三尺許黃赤可愛法苑周時潼州靈果寺僧策者承崖滅度設齋市中至于食前忽見黑雲從東來翳日廕會仍雨龍毛五色分明長者五短猶五寸上僧崖下海上人言龍每生二卵一為吉吊多出水與鹿台或於水邊遺瀝值流槎則黏著木枝如蒲搥狀其色微青黃或似灰色號紫梢花犬益陽事可以入藥北夢龍血陰平縣有龍血山亦曰龍象巖絕壁高巖萬有餘丈有四石龍在石壁間昔有群龍共斗四龍疲衂嘔血死因化為石血變成黳堪充器物但不耐風日元和志石晉時鎮州接邢臺界嘗斗殺一龍鄉豪有曹寬者見之取其雙角角前有一物如藍色文如亂錦人莫之識曹寬經年為寇所殺鎮帥人亦被誅北夢龍堂開元中齊澣以徐城險急奏開何真源縣丞崔延禕開數千步得龍堂初開謂是古墓然狀如新築凈潔周視北壁下有五色蟄龍長丈餘頭邊鯉魚五六枚靈龜兩頭毛九寸廣異記, WYG: 金}
