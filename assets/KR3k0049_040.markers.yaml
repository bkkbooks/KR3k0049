  - {type: variant, offset: 10181, length: 280, content: 鄣盡矣臣故曰趙龜雖無遠見於燕且宜近見於秦秦以其大吉辟地有實救燕有名趙以其大吉利削兵辱主不得意而死又非秦龜神而趙龜欺也韓飾邪鄒忌與田忌不相善公孫閔謂鄒忌曰何不詐令人操千金卜於市曰我田忌之人也吾三戰而三勝聲威天下欲為大事亦吉乎卜者出因令人捕為卜者驗其辭於三之所鄒忌從之田忌懼無以自白遂率其徒攻臨淄欲殺鄒忌不勝而奔春秋後語司馬季主卜於長安市宋忠賈誼謂之曰何居之卑何行之汗季主捧腹大笑二君曰夫卜筮者世俗之所賤簡也世皆言曰夫卜者多言誇嚴以得人情虛高人祿命以說人志擅言禍災以傷人心矯言鬼神以盡人財厚求拜謝以私於己此吾之所耻季主曰夫卜者必法於天地象四時順於仁義分策定卦按式正, WYG: 斷截􅀢浣}
