  - {type: variant, offset: 10041, length: 3, content: 聞丹漆, WYG: 人羸服變處一針即差召玉即詰問其狀對曰醫之為言意也腠理至㣲隨氣用巧針石之間毫芒即乖神存於心手之際可得解而}
  - {type: variant, offset: 10041, length: 3, content: 聞丹漆, krp: 人羸服變處一針即差召玉即詰問其狀對曰醫之為言意也腠理至㣲隨氣用巧針石之間毫芒即乖神存於心手之際可得解而}
  - {type: variant, offset: 10045, length: 0, content: '', WYG: 可得言也夫貴者處尊高以臨臣臣懷怖懼以承之其為療也有四難焉自用意而不任臣一難也將身不謹二難也骨節不彊不能使藥三難也好逸惡勞四難也針有分寸時有破漏重以恐懼之心加以裁慎之志臣意且猶不盡何有於病哉此其所為不愈也帝善其對後漢書仲景方南陽張機字仲景總角造何顒謂曰君用思精而韻不高後將為良醫卒如其言顒先識獨覺言無虛發玉仲宣年十士嘗遇仲景仲景曰君有病宜服五石湯不治且成後年三十當眉落仲宣以其貰長逺不治也後至三十果疾成竟眉落其精如此仲景在京師為名醫於當時為上手時以為扁鵲倉公無以加之何顒别𫝊脉經王叔和性沉静好著述考覈遺}
