  - {type: variant, offset: 12194, length: 823, content: 二鍾入門便大感慟宅遂空廢世說孔氏志怪曰于時咸謂勗之報會遇于所失彼此書畫巧妙之極畫聖抱朴子云衛恊張墨並為畫聖孫鴻之上林苑圖恊蹤最妙嘗畫七佛圖不點眼睛人或疑而有請恊謂七佛與烈女圖偉而有情勢毛詩北風圖巧密於情思而自以所畫為不及謝赫云古畫皆略至此始精六法頗為兼善雖不備該形似而有氣顏陵跨群雄曠代絕筆在第一品曹不興下張黑荀勗上名畫記戴安道就范宣學親范所為范讀書亦讀書范抄書亦抄書唯獨好畫范亦為無用不宜勞思戴乃畫南都賦圖范看畢咨嗟甚以為有益始重畫世說晉王廙字世將善屬詞攻書畫過江後為晉朝書畫第一音律眾妙畢綜元帝時為左衛將軍封武康侯時鎮軍謝尚於武昌樂寺造東塔戴若恩造西塔並請廙畫廙畫為晉明帝師書為右軍法時右軍亦學畫於廙廙畫孔子十弟子贊云余兄子羲之幼而岐嶷必將降余堂構今始年十六學藝之外書畫過目便能就余請書畫法余畫孔子十弟子圖以勵之嗟爾羲之可不勗哉畫乃吾自畫書乃吾自書吾餘事雖不足法而書畫固可法欲汝學書則知積學可以玫遠學畫可以知師弟子行已之道名畫記王獻之善丹青恒溫使畫扇筆誤落因就畫一鳥駁悖牛甚妙晉書子敬又書駁牛賦於扇上此扇義熙中尤在名畫記古來未有顧愷之字長康小字虎頭多才藝尤工丹青傳寫形勢莫不妙絕世說云謝安謂長康曰卿畫自生人以來未有也又云卿畫蒼頡古來未有也顧常悅一女鄰乃畫女於璧當心釘之女患心痛告於長康拔去釘乃愈搜神記云思江陵美女畫像簪之於璧玩之顧虎頭為人畫扇作阮籍嵇康都不點眼睛送還扇主曰點眼睛便能欲語俗說顧云畫人四體妍媸本無關于妙處傳神寫照正在阿堵中世說登樓去梯顧凱之建層棲為畫所疾風暴雨烈暑祁寒並不下筆炎涼皆遇天地明朗時乃染毫登樓去梯妻子罕見畫品宋陸探微善畫事明帝人謂畫有六法探微衛恊得法為備平生多愛圖古聖賢像唐張彥遠謂體運遒舉風力頓挫一點一拂動筆新寄固自不凡矣顧景秀武帝嘗賜何戢蟬雀扇是景秀晝後戢為吳興太守齊高帝求好盡扇戢持獻之陸探微顧寶光見之皆歎其巧絕扇畫蟬雀自景秀始也名畫記顧光寶能畫建康有陸溉患瘧經年光嘗詣溉卧前謂光曰我患此疾久不得療君知否光寶曰, WYG: 闕}
