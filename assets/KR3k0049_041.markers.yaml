  - {type: variant, offset: 27279, length: 2287, content: 學中看愽士論孔子弟子達者七十二人幾人已著冠幾人未著者冠博士曰經傳無文動筩曰先生讀書豈合不解孔子弟子已著冠有三十人未著冠有四十三人愽士曰據何文以知之曰論語云冠者五六人五六三十人也童子六七人六七四十二人也豈非七十二人坐中皆大笑博士無以應之啟顏錄侍中宋璟疾負罪而妄訴不已者悉付御史臺治之謂中丞李謹度曰服不更訴者出之尚訴未已者且係由是人多怨者會天旱有魃優人皆魃狀戲於上前問魃何為出對曰奉相公處分又問何故曰負冤者三百餘人相公悉以係獄抑之故魃不得不出明皇心以為然又璟使御史蕭隱之充使括江淮惡錢隱之嚴急擾煩怨嗟盈路上於是貶隱之官罷璟為開府儀同三司通鑑安祿山之叛也玄宗播遷於蜀有䧟在賊中者多為祿山所脅從而黃幡綽同在其數亦得出入左右及收復幡綽被拘至行在上憐其敏捷釋之有於上前曰黃綽幡在賊中與大逆圓夢皆順其情而忘陛下積年之恩祿山夢見衣袖長忽至階下綽曰當垂衣而治之祿山夢見殿中槅子倒綽曰革故從新推之皆此類也綽曰臣實不知大駕塵蒙赴蜀既䧟在賊中寧不苟悅其心以脫一時之命今日得再見天顏若與大逆圓夢必知其不可也上曰何以知之對曰逆賊夢衣袖長是出手不得也夢槅子倒者是胡不得也以此臣故先知之上大笑而止明皇十七事僖宗頗工眾藝於音律愽蹴踘鬥雞自以為能于步打嘗謂優人石野猪曰朕若作步打進士舉湏為狀元野猪對曰若遇堯舜作禮部侍郎恐陛下不免落第北夢瑣言續世說作若應擊毬進士舉唐昭宗時財用窘乏李茂貞令榷油以助軍需俄有司言官油沽賣不行多為諸門放入松明攙奪乞行禁止蓋民間然松明為燈故也優人張堥範曰此事大好更有一例便可并月明禁之茂貞大笑松明之禁遂止易齊笑林洛中記異作李茂貞時安轡新王延彬獨據建州稱偽號一旦大設為伶官作戲辭云只聞有泗州和尚不見有五縣天子南部新書石頭擦倒仁宗時賞花釣魚宴賦詩往往宿製天聖中永興軍進山水石因命賦山水石歌出於不意多荒惡者中坐優人入戲各執紙筆若吟詠狀一人忽仆於石上曰數日來作賞花釣魚詩准備應制却被這石頭倒明日降出詩令中書銓定內鄙惡者與外任東齋遺事遼令官羅衣輕滑稽通變多所規諷興宗於大弟重元狎昵宴酣許以千秋萬歲後傳位重元甚喜驕縱不法又因變陸賭以居民城吧帝屢不競前後已償數城重元既恃梁孝王之寵又多鄭叔叚之過朝臣無敢言者道路以目一日侵愽羅衣輕指其局曰雙陸好癡和你都輸去也上始悟不復戲遼史伶官傳蔡京作宰弟卞為元樞卞乃王安石婿尊崇婦翁當孔廟釋茵時祭於配享而封舒王人設孔子正坐顏孟於安石侍側孔子令之坐安石揖孟子㞐上孟辭曰天下達導爵居其一軻近蒙公爵望公貴為真王何必謙光如此遂揖顏曰回也陋巷匹夫平無生毫分事業公為各世儒位貌有間辭之過矣安石遂處其上夫子不能安席亦避位安石惶懼拱手云不敢往復末央子路外入憤憤不能堪經趍從祝堂挽公冶長臂而出公治為宭迫之狀謝曰長何罪乃貴數之曰汝全不救護丈人看取別人家女婿其意以譏卞也時方議欲升安石於孟子之右為此而止夷堅志紹興壬戍省試秦檜之子熺姪昌時昌齡皆奏名公議籍籍而無敢輙語至乙丑春首優者即戲塲設為士子赴南宮相與推輪知舉官為誰指侍從某尚書某侍郎當主文柄優長者非之曰今年必差彭越問者曰朝廷之上不聞有此官員曰漢梁王也曰彼是古人死已千年如何來得曰前舉是楚王韓信越一等人所以知今為彭王問者雖言其妄且扣厥指笑曰若不是韓信如何取得他三秦四坐不敢領略一關而出秦亦不敢明行讉罰云三勝環秦檜以紹興十五年四月丙子朔賜第望僊橋丁丑賜銀絹萬匹兩錢千萬綵千縑有詔就第賜燕假以教坊優伶宰執咸與中席優長誦致語退有參軍者前褒檜功德一伶以荷葉交倚從之詼語雜至賓歡既洽參軍方拱揖謝將就倚忽墬其幞頭乃總髮為髻如行伍之巾後有大巾鐶為雙晶宜勝伶指而問曰此何鐶曰二勝鐶遽补擊其首曰爾但坐太師交倚請取銀絹例物此鐶掉腦後可也一坐失色檜怒明日下令於獄有死者於是語禁始蓋繁苪燁令袊等吻禍蓋其末流焉桯史彌遠彌堅史彌遠用事選人改官多出其門制閫大宴有優為衣冠者數輩皆稱為孔門弟子相與言吾儕皆選人遂各言其姓曰吾為常從事吾為於從政吾為吾將仕吾為路文學別有二人出曰吾宰予也夫子曰於予與改可謂僥倖其一曰吾顏回也夫子曰回也不改吾為四科之首而不改汝何為獨改曰吾鎖故改汝何不鑽回曰吾非不鑽而鑽彌堅耳曰汝之不改宜也何不鑽彌遠乎韓平原在慶元初其弟仰冑為知閣門事頗與密護時人謂之大小韓求捷徑者爭趨之一日內燕優人有為衣冠到選者自敘履歷材藝應得美官而留滯銓曹自春徂冬未有所擬方徘徊浩歎又為日者弊帽持扇過其旁遂邀使談庚申問以得祿之期日者厲聲曰君命甚高但於五星局中財帛宮若有所礙目下若欲亨達先見小寒更望成事必見大寒可也僈蓋以寒為韓侍燕者皆縮頭匿笑程史金章宗蒲察皇后沒世中宮久虛宮人李師兒性慧黠大蒙愛幸欲立以為后金朝故事其娶后尚主皆諸部部長之家而李氏微甚其大臣固執不從臺諫以為言章宗不得已進封為元妃而勢位熏赫與皇后侔其兄弟皆握顯近勢傾朝廷四方射利競進之徒爭趣其門一日章宗宴宮中優人玳瑁頭者戲於前或問上曰有何符瑞優曰汝不聞鳳凰見乎其人曰知之而未聞其詳優曰其飛有四所應亦異若向上飛則風兩順時向下飛則五谷豊登向外飛則四國來朝向裏飛則加進祿上大笑而罷金史妃傳宋瑞平間真德秀應召而起百姓仰之若元祐之𠇗涑水也繼參大政未及有所建置而卒魏了翁帥師亦未及有所經略而罷臨安優人裝一生儒手持一鶴別一生儒與之邂逅問其姓名曰姓鍾名庸問所持何物曰大鶴也因傾蓋歡然呼酒對飲其人大嚼洪吸酒肉靡有孑遺忽顛仆子地群數人曳之不動一人乃批其頰大罵曰說甚中庸大學喫了許多酒食一動也不動遂一笑而罷鶴林玉露嘉泰末年平原公恃有扶日之功凡事自作威福政事皆不由內出會內宴伶人王公瑾曰今日政如客人賣傘不由裏面後寧宗恭淑后上仙而曹氏為婕妤平原特以為親屬偶值真里富國進馴象至平原語公瑾曰不聞有真里富國公瑾曰如今有假楊國忠平原雖憾之而罪加焉白獺髓, WYG: 䇿}
