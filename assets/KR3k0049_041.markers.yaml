  - {type: variant, offset: 21453, length: 744, content: 也抱朴手談王中郎以圍棋是坐隱支公以圍棋為手談世說王以圍棋為手談故其在哀制中祥後客來即用方幅為會戲語林中興之冠江霦善交為中興之冠徐廣晉紀王恬字敬豫與濟陽江霦俱善交棋為中興第一晉中興書江霦與王恢等棋第一品道第五品范汪綦品陳留阮蘭字弘茂為開卦令縣側有劫賊外白甚急數蘭方圍棋長嘯吏云劫急簡曰局上有劫亦甚急陳留志奕其投江陶侃為荊州見州佐史愽交具投之于江曰圍棋堯舜以教愚子愽殷紂所造諸君並國器何以此為將吏則加鞭朴曰樗蒲者牧猪奴戲耳王導嘗共其子悅圍棋道導曰與汝有瓜葛得爾耶世說江僕射霦年少王導呼與共棊王手嘗不如兩道許而欲敵導戲試以觀之江不即下王曰君何不行曰恐不得耳傍有客曰此年少戲乃不惡王徐舉手曰此年少非惟圖棊見勝上殷仲堪在都嘗往看棋諸從在瓦棺寺前宅上子時袁羗與人共在窗下圍棋仲堪在裏問袁易義袁應答如流圍棋不輟袁意傲然殊有餘地殷撰辭致難每有往復俗說祖納逖兄也好奕棋王隱謂之曰禹惜寸陰不聞奕棋納曰聊以忘憂耳隱曰古人遭時則以功達其道不遇則以言達其才裁成國史俱取散愁何必圍棋必然後亡憂也祖逖傳王隱傳裴遐綽子也嘗在東平將軍周馥坐與人圍棊馥司馬行酒遐未即飲司馬醉怒曳遐墮地曳徐起還坐顏色不變復棊如故其性虛和如此晉書惟許圍棊參軍于瓚陳節戲事曰夫嬉戲非為治之本自令摴蒲擲馬諸不急戲宜一斷之翼曰今惟許其棋餘悉斷庾翼集空如龍鳳晉羅什與人棊拾敵死于空處如龍鳳形信安邵石室中晉時樵者王質伐木入山見二童子棋與一物如棗亥食之不覺飢以所持斧置坐而觀童子指謂之曰汝斧柯爛矣質歸鄉閭無復時人述異記昔有人駕牛採樵入蒙秦山見二老人奕棋其人係牛坐斧而觀局未終老人謂曰非汝久留之所樵人起而斧柯已爛牛己枯矣黎州圖經何承天素好奕棋頗用廢事又善彈箏文帝賜以局子及銀榮箏承天表謝上答曰局子之賜何必非張正之金耶南史羊玄保為黃門侍郎善奕棊品第三宋文帝亦好, WYG: 闕}
