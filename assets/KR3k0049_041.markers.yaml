  - {type: variant, offset: 16383, length: 0, content: '', WYG: 六代之樂周用六代之禮樂故有雲門咸池大韶大濩大夏大武也魯受四代之禮樂故不舞雲門咸池示有降殺也頴容春秋釋例說新聲平公説新聲師曠曰公室其将卑乎君之明兆於衰矣夫樂以開山川之風以耀徳於廣逺也風徳以廣之風山川以逺之風物以聴之修詩以詠之修禮以節之夫徳廣逺而有時節是以逺服而邇不遷國語四時之聲師涓者出於衛靈公之世能寫列代之樂善造新曲以代古聲故有四時之樂春有離鴻去鴈應蘋之歌夏有明晨焦泉之華流金之調秋有商颷白雲落葉吹蓬之曲冬有凝河流隂沉雲之操此四時之聲奏於靈公公情湎心惑怠於政事蘧伯玉諫曰此雖以發揚氣律終為沉湎靡曼之音無合於風雅非下臣宜薦於君也靈公乃去滛聲而親政務故衛人美其化焉師涓悔其違於雅正失為臣之道乃退而隠迹伯玉焚其樂噐於九逹之衢恐後世傳造焉其歌曲湮㓕世代迹逺唯紀其篇目之大意也拾遺記自正正人孔子至齊郭門之外遇一嬰兒挈􅃑歌相與俱行其視精其心正其行端孔子謂御曰趣驅之趣驅之韶樂方作孔子至彼聞韶三月不知肉味故樂非獨以自樂也又以樂人非獨以自正也又以正人矣哉説苑瀟湘之樂洞庭之山浮於水上其下金堂數百間帝女居之四時聞金石絲竹之音徹於山頂楚懐王之時與羣才賦詩於水湄故云瀟湘洞庭之樂聴者令人難老雖咸池簫韶不能比焉毎四仲之節王嘗繞山以遊宴各舉四仲之氣以為樂章惟仲春律中夾鍾乃作輕雲流水之詩宴於山南時中㽔賔乃作皓露秋霜之曲拾遺記感天通神夫樂者聖人所以感天地通神明安萬民成性類者也故聴者無不虚己練神悦而承流是以海内徧知上徳被服其風光輝日新化上遷善而不知所以然至於萬物不夭天地順而嘉應降故詩曰磬管鏘鏘降福穰穰漢書秦漢樂沈約宋書曰秦樂曰五行始皇所改漢樂曰文始髙祖改韶舞為之武徳髙祖造舞人執干戚以象天下樂已行武以除亂安世舊曰房中秦改為夀人孝惠改為安世昭容髙祖造生於武徳禮容髙祖造生於文始王行嘉至叔孫通造以迎神四時文帝所造昭徳孝武帝造薦之太宗廟盛徳孝宣造薦之太宗雲翹育命並漢樂以祀天地巴渝漢初巴渝助漢有功作此舞魏樂曰昭武改漢巴渝正世改漢安世又為享神歌迎靈改漢嘉至武頌改漢武徳昭業改漢昭容鳯翔改漢雲翹靈應改漢育命大韶改漢文始大武改漢五行采菱陽阿奏雅樂者始如陽阿采菱淮南夫歌采菱發陽阿鄙人聴之不若此延路陽局上邯鄲師有出新曲者託之}
