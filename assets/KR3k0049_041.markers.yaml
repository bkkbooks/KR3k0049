  - {type: variant, offset: 23004, length: 421, content: 世祖失容放碁曰不聽奏事實在朕躬樹何罪置之弼奏事訖曰為大臣而逞志於君前者非無也乃許公車自劾請罪世祖曰吾聞築社之役蹇而築之端冕而事之神與之福然則卿有何罪魏書甄琛字思伯舉秀才入都積歲頗以奕棋棄日至乃通宵不止手下蒼頭常令秉燭或時睡頓大加其秋如此非一奴後不勝楚痛乃白琛曰郎君辭父母仕宦京師若為讀書執燭奴不敢辭罪乃以圍棋日夜不息豈是向京之意而賜加杖罰不亦非理琛惕慚感遂從許獻李彪假書研習聞見益優上北齊楊子華善畫于子冲善棊通神號為二絕名畫夏日明星與親王棊令賀懷智獨奏琵琶妃子立於局前觀之上欲輸次妃子將康國猧子放之令於局上亂其輸贏上甚悅焉天寶遺事楊妃外傳一行本不解棋因會燕公宅觀王積薪茶一局遂與之敵笑謂燕公曰此但爭先耳若念貧道四句承除語則人人為國手酉陽語資翰林碁者王積薪從明皇西幸寓宿深溪之家但有婦姑止給水火纔暝闔戶積薪夜聞姑謂婦曰良宵無以為適與子手談可乎堂內無燭婦姑各在東西室對談已而姑曰子已此矣吾止勝九枰耳遲明至具禮請問出局盡平生之好布子未及數十姑謂婦曰, WYG: 闕}
