  - {type: variant, offset: 16680, length: 509, content: 婿趙縱侍郎嘗令韓幹寫真眾稱其善後復請昉寫之二者皆有能名汾陽嘗以二畫張於坐側未能定其優劣一日趙夫人歸寧汾陽問曰此畫誰也云趙郎也復曰何者最似云二畫皆似後盡者為隹蓋前畫者空得趙郎狀貌後畫者兼得趙郎情性笑言之姿爾後畫者乃昉也汾陽嘉曰今日乃決二子之勝負於是令送錦綵數百疋以酧之見聞志田家水牛韓滉字太沖公退之暇留意丹青書師張顛畫師陸探微能圖田家風俗人物水牛曲盡其妙議者謂驢牛雖山前之畜狀最難圖也惟晉公於此工之能絕其妙畫錄戴嵩初韓滉鎮浙西命為巡官師滉畫皆不及獨於牛能畫野性過滉遠甚至於田家川原亦各臻妙弟嶧亦以盡牛得名善作奔逸之狀嵩善盡水牛畫飲水之牛則水中見影畫牧牽牛則牛瞳中有牧影拾遺有藏戴崧牛鬥與客觀旁有一牧童曰牛鬥力在前尾在兩股間今尾棹何也馬正惠嘗得鬥水牛一軸云厲歸真畫甚愛之一日展曝於書室雙扉之外有輸租莊實適立於砌下疑玩久之既而竊哂公見而詰之莊實曰某非知畫者但識真牛其鬥也尾夾於髀間雖壯夫旅力不可少開此畫牛尾舉起所以笑其失真見聞志張南本畫佛像鬼神甚工猶善畫火中和年嘗於成都金華寺大殿畫八明王有一僧遊禮至寺整衣升殿壁間見所畫火劫熖逼人驚怛幾仆時孫位於盡水得名世之論盡水火之妙者獨推此二字蓋水幾於道而應於神非筆端深造理窟未易形容也, WYG: 阿清濟貫河}
