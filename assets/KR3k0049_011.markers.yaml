  - {type: variant, offset: 26308, length: 1, content: 懷, WYG: 懐其徳淮人間隂謀武王伐紂太公隂謀食小兒以丹令身純赤長大教言殷亡殷民見兒赤身以為天神及言殷亡皆謂商滅兵至牧野晨舉脂燭姦謀惑民權掩不備周之所諱也論衡兵忌武王之誅紂也行之日以兵忌東面而迎太嵗至汜而汜至懐而懐至共頭而山隧霍叔懼曰出三日而五災至無乃不可乎周公曰刳比干而囚箕子飛㢘惡来知政夫又惡有不可焉遂選馬而進朝食於戚暮宿於百泉厭旦於牧之野鼓之而紂卒易鄉遂乗殷人而進誅紂荀儒效淮南共頭而墜下云彗星出而授殷人其柄當戰之時十日亂于上風雨擊於中然而前無蹈難之賞而後無遁北之刑白刃不畢拔而天下得矣兵畧係墮武王至殷郊係墮五人御於前莫肯之為曰吾所以事君者非係也武王左釋白羽右釋黄鉞勉而自為係孔子聞之曰此五人者之所以為王者佐也不肖主之所弗安也吕不茍文王伐崇至鳳皇墟韈係解因自結之太公望曰何為也王曰君與處皆其師中皆其友下盡其使也今王先君之臣故無可使也韓外儲黄鳥武王率兵車以伐紂紂虎旅百萬陣于商郊起自黄鳥至于赤斧三軍之士靡不失色武王乃命太公把白旄以麾之紂軍反走鬻子任彦升令曰白羽一麾黄鳥}
