  - {type: variant, offset: 15407, length: 317, content: 如此齊書七月七日宮掖之內張雲錦之帷燃九光之燈候西玉母至也王母以紫錦帷漢武內傳淮南王見八公至足下及屐迎之登思仙之臺張綺羅之帷神仙傳繡帷趙飛燕為皇后第上遺金錯繡帷西京雜記漢安帝好微行于郊埛間或露宿起帷宮千間皆用錦罽文繡拾遺記覆帳幬也說文大帷廣韻覆帳謂之幄小雅幄屋也以帛衣板施之形如屋也釋名大帷在上曰帟四旁及上曰帷上下四方悉周曰幄幄大帷也三禮圖幕人幄帟注帷幕皆以布為之四合象宮室曰幄至所居之幄也周禮楚子伐鄭諸侯還救鄭晉侯使張骼輔躒致楚師求御于鄭鄭人卜宛射犬吉大叔曰不然部婁無松柏二子在幄坐射犬于外襄二十四子產子大叔相鄭伯以會子產以幄幕九張行子大叔以四十既而悔之每舍損焉及會亦如之昭四虎幄衛侯為虎幄于籍圃哀下燕昭王二年廣延國來獻善舞者二人一名, WYG: ''}
