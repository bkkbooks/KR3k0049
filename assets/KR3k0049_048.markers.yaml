  - {type: variant, offset: 22141, length: 483, content: 景公飲酒移於晏子晏子曰夫鋪薦席陳簠簋者有人臣不敢與焉又移於司馬穰苴司馬穰苴曰鋪薦席陳簠簋者有人臣不敢與焉上捐席文公至河令席衽捐之咎犯聞之曰席蓐所臥也而君棄之臣不勝其哀韓子趙簡子謂左右曰車席泰美夫冠雖惡頭必戴之屐雖善足必屐之今車如此其大美也吾將何以屐之且夫美而祀上妨義之道也上衛嗣公時有人於令左右縣令發褥而席弊嗣公令人遺席曰吾聞汝發褥而席弊其賜汝席縣令大驚以君為神上舍者避席陽朱南之沛至梁遇老子老子曰睢睢盱盱而誰誰與居夫太白若辱盛德如不足陽朱曰聞命矣其往也舍者避席其來也煬者與之爭竈列子申屠嘉兀者也與鄭子產同師伯昏瞀人合堂同席而坐莊子衛靈公天寒鑿地宛春諫曰天寒起土恐傷民公曰天寒乎宛春曰公衣狐裘坐熊席陬隅有竈是以不寒呂覽不重席孟獻伯相魯不坐重席韓子三經席孔子困於陳蔡之間居環堵之內坐三經之席說苑仲尼之畜狗死使子貢埋之曰丘也貧無蓋與之以席檀弓艾席老萊子親沒隱蒙山之陽枝木為床薦席坐之皇甫謐高士傳馬薦席蘇秦激張儀令相秦以馬薦席坐之史記任安田仁俱為衛將軍舍人居門人衛將軍從此兩人過平陽至主家令兩人輿騎奴同席而坐此二子拔刀斷席而坐主家皆怪而惡之莫敢問也上弊席陳平以弊席為門上莞, WYG: 伏青}
