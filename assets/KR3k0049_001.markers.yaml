  - {type: variant, offset: 26435, length: 2996, content: 人為主四輔為翼鉤陳分司內座齊飾華蓋於是乎臨映大帝於是乎游息尚書諮謀以納言柱史記私而奏職女史掌彤管之訓御宮揚翠娥之色陰德周給乎其隅大理詳讞乎其側天柱司晦朔之序六甲候陰陽之域其文煥矣厥功茂哉環藩衛以曲列儼閶闔之洞開北斗標建車之象移節度而齊七政文昌制戴筐之位羅將相而枕三台闢天床於玉闕乃宴休之攸御肅天理於璇璣執威權而是預天槍天棓以相指內廚內階而分據雙三夾斗而燮詣兩乙賓門而佐助爾乃天牢崇圉設禁暴之隄防太尊明位擬聖公之寵章太陽接相以班跡玄戈撥杓而耀芒勢微匕而有象輔熠熠而流光薦秋成於八榖務春採於扶筐天廚蔽兮供百宰傳舍開兮通四方偉天官之繁縟立疏廟之隆崇何大角之皎皎夾攝提之融融七宿畫野以分區五宮立都而對雄既以歷於中宮乃回眸而顧東觀角亢於黃道包分野於營中開天門之燦耀揖進賢之雍容是推紀於變節是正綱於大同其次則梗河備預招搖候敵泛舟尤池飛觴帝席周鼎毓神天田豊籍按三條於平道賓萬國於天門置平星以決獄列騎官而衛閽陽門守於邊險折威防於將奔頓頑司於五聽車騎參於八屯望南門之峻關覿庫樓之威府偃蹇列於四衡的歷分於五柱或藏兵而蓄銳或重扃而禦侮煥蒼龍之中宿矚氐心以及房聽朝路寢布政明堂爰俾其地于宋之疆粵若太火赫然天王鉤鈐儼於鳳闕積卒穆於龍驤天輻備於舉輦鍵閉守於關梁騎陣啟將軍之位從官主巫醫之職罰作贖刑日為陽德二咸防非而體正七公議賢而糾慝陣車雷擊乎其南天乳露滋乎其北彼貫索之為狀實幽囹之取則歷龍尾以及箕跨北燕而在茲配四妃而有序均九子以延慈鼉曳尾而波泳魚張鱗而水嬉天江為太陰之主傅說奉中闈之祠糠為簸揚之物杵為舂臼之用天鑰司其啟閉丈人存其播種狗以吠盜奸回靡縱却睇女床前瞻天紀耀棘庭之金印粲椒宮之玉齒中有崇垣厥名天市車肆中衢以連屬市樓臨箕而鬱起帝座類候而獨尊侯臣光熙而燮理宗星派踈而遠集宦者刑餘而近侍列肆與屠肆分行宗正與宗人同峙帛度立象以量用斗斛裁形而取擬若乃朓北宮於玄武泊南斗而牽牛賦象通犧廟之類司域應江淮之洲建星含曜於黃道天井寫映於清流河鼓進軍以嘈囋兩旗夾道以飛浮天淵委輸於南海狗國分權於北幽雞揚音而顧侶鱉曜影而來遊天田臨於九坎羅堰逼於天桴是司溝洫是制田疇遂聳睇於漢陽乃攸窺於織女引寶毓囿搖機弄杼輦道清塵而俟駕漸臺飛灰而候呂可以嬉遊可以臨處瞻須女之繒室奄開邦於會稽離珠耀珍於藏府匏瓜薦菓於宸閨离瑜佩瓊而衒敗瓜委蔓以分畦其外鄭越開國燕趙鄰境韓魏接連齊秦悠永周楚列曜晉代分坰天津橫漢以摛光奚仲臨津而汎影既編梁以虹構亦裁輪而電警列虛危於齊濟職悲哀與宗廟墳墓寫狀以孤出哭泣含聲而相召敗臼察災而揚輝天壘守夷而軿照司命與司祿連彩司危與司非疊耀伺禍福之多端總興亡之要妙人掌詔以優游儼為人之質鉤主震而屈曲宛如鉤之象車府息雷轂之聲造父曳風鑾之響杵軍給以標正曰年豐而示仰土吏設備以司存斧鉞用誅之所掌虛梁闃寂以幽閟蓋屋喧轟而宴賞天錢納賮以山積天綱憩輿而野饗北落置候兵之門八魁建張禽之網瞻廟府於室壁諒有衛之封畿布離宮之皎皎散雲雨之霏霏霹靂交震雷電橫飛壘壁寫陣而齊影羽林分營而析暉土公司築而開務天廄飛御而起機螣蛇宛而成質水蟲總而攸歸動則飛躍於雲外止則盤縈於漢沂迤奎婁之分野辨鄒魯之川陸豢馴獸於囿苑隸封豕於溝瀆左更處東而掌虞右更居西以司牧立囷倉之儲聚樹溷屏之重複司空主土以搜祥鐵鑕縈蒭而薦畜軍南門列轅而遠出天將軍揚旗而示逐伊王良之策馬則車騎之滿野蒙居河而路塞策栽鞭而電寫閤道優游而據中附路備闕而居下自胃倉而昴畢實趙地之郊衢建旄頭而肅引畢罕車而迅驅卷舌列天說之表附耳屬天高之隅天高望氣天說備巫卷舌安其寂默附耳矜其諂諛天船泛影乎清瀨貯積水而窺害太陵分光乎耀虛包積尸而如帶礪石資乎鋸刃月宿歸乎太陰天街畫於戎野天阿察於山林天節宣威於邦域天陰進謀於腹心天庾積粟以示稔天廩備稷以祈歆天園曲列兮儲芳樹天苑圓開兮畜異禽蒭藁遵納秸之軌殊國曉重譯之音九游排鋒以進退軍井依營而淺深天關嚴扃於畢野諸王列藩於漢潯何五車之均明而三柱之照煥納五兵於藏府圖七國之邦貫天潢利涉以淪漣咸池浮中而渺漫闢岷峨之沃壤睎觜參之曜形示斬刈以明罰收褒旅而獲寧參旗懾于邊寇玉井通於水經座旗肅穆以昭禮司怪幽求而發冥屏嫌於客廁咎於圊亦有天屎質黃效靈於是仰東井之輿鬼覽西秦之伯邑質明祀而變生鉞淬水而刑及四瀆斷江淮之候兩河占秦越之域水位瀉流而迅奔天樽奠饌而翕集軍市通貨以財明五侯起議而衡立積水醞燕酹之勞積薪備牲庖之給野雞俟兵而據市天狗吠盜而映漣闕邱擬乎兩觀水府司乎百川狼援戈而野戰弧屬矢而承天老人作主而秋煥大人通臣而夜懸子扶尊而眇邈孫孕緒而連綿惟天社之赫若實勾龍之神焉爰觀柳以及張知周疆之爰啟儼咮頸以分嗉奉滋嘗而賜醴觀夫軒轅之宮宛若螣蛇之體交雷雨之靄靄列后妃之濟濟酒旗緝醼以承歡內平繩愆而執禮爟含烽而喋寇實防邊之有俟長垣崇司域之備少微彰處士之懿外廚調列饍之滋天相居大臣之位天紀錄禽而獻齒天廣嚴祠而毓粹天稷播五稼之勤東歐表三夷之類爰周翊軫厥土惟荊驅風驛之千乘奏雲門之六英長沙明而獻壽車轄朗而陳兵青邱廕於韓貊器府總於琴堂軍門坐甲於軍閫司空掌土於司平矚太微之崢嶸啟端門之赫奕何宮庭之宏類乾坤之闔闢五座參一帝之謀九卿踵三公之跡儲以太子參之幸臣從官肅侍謁者通賓郎將司戟於丹陛郎位含香於紫宸乃寄屏以持法控端門之內闉明堂演化靈臺候神虎賁之徵猛士進賢之訪幽人獻淵謀於諸侯儼營衛於常陳胡天漢之昭回自東震而綿絡北貫箕而聯斗南經說而緯龠合乘津而浮瓜分漂杵而泛閤歷玉潢以汪洋淪七星而依泊惟木德之含精為歲星而明麗雖盈縮所察禍福攸繫然而得之者隆失之者替祚明君而耀朗罰昏主之光翳下為杜靈上為天貴如夭胎而毀卵具職仁而施惠迴騖愆期前馳舛契奮槍棓以示慝峙樓垣而表戾粵若熒惑火帝之精每執法以明罰必伺災而告誠守其邦而歲戰去其野而時清若虧信而廢禮則下乘而上征居惟釁發合與憂并浮天讒而聳劍列蚩尤而耀旌司危見而失國昭明出而起兵伊土宿之播靈為鎮星而耀質尋所履為休慶視所居為貞吉廣邦繳而斯留復軒宮而載出若崇奢而賤義則行虧而度失或含丹而舉兵或噙黑而遘疾旬始發而侯起獄漢明而主黜被金方之耀色有太白之垂文乃降神於屏翳實建象於將軍如用兵而不察匪先達之攸聞高出利於深戰順指著乎宏勳茍恩義之不溥則禍福之攸分或飛芒而蝕月或引彗而橫氛六賊陳災而構禍天狗殺將而破軍咨太陰之稟粹粵辰星之攸揆乘四仲而顯晦歷一周而匝履為用法之淵謨為出師之令軌若淫刑而縱欲則委孛而流矢白其角而表哀黑其規而應水察函劍之相去候正旗之所指非其出而夏寒錯其宜而將死於是究經緯之終始徵幽微之機符昭晰兮為人主之明鑑杳藹兮寔冥祗之秘樞固聲聞而響集方形移而影趨若山石之旌處士谷風之應騶虞者也若夫退寒暑而無舛中昏旦而不越畢露雲油箕躔吹發亦有樞降軒而繞電景瑞堯而麗月雖肸響之難窮信靈英之未歇嘉大舜之登禪耀黃星而靡鋒壯高祖之遇時家五緯而相從殷堪縱眺識曹公之潛跡李郃流目知漢使之幽蹤荊柯入秦白虹貫日衛生設策長庚食昴悲夫星隕如雨而周衰彗竟長天而秦滅蛇隨楚而九域含嗟狗過梁而千里流血晉君終而婺妖見漢帝圍而參暈結周楚滅而南衝晉齊殃而北裂自大辰以及漢彰宋焚而衛𤍽或除舊以布新顯陳盛而姜絕諒吉凶之有兆匪災譴之虛設固罔念而作狂在恭已而成哲是以帝王之有天下也莫不分設其官或司其告唐則羲和降察夏則昆吾演奧嘉殷巫之美服登周史之雅號宋述子韋鄭稱裨竈唐昧與尹皋宣範甘德暨石申垂諾故能下守職而恪恭上知變而無傲此希夷之妙象豈蒙昧之私好有少微之養寂無進賢之見譽參器府之樂肆掌貫索之刑書恥附耳之求達方卷舌以幽居且扃扉而絕駟奈臨河而羨魚望天門而屏跡安知公卿之所如, WYG: ''}
  - {type: variant, offset: 26435, length: 2996, content: 人為主四輔為翼鉤陳分司內座齊飾華蓋於是乎臨映大帝於是乎游息尚書諮謀以納言柱史記私而奏職女史掌彤管之訓御宮揚翠娥之色陰德周給乎其隅大理詳讞乎其側天柱司晦朔之序六甲候陰陽之域其文煥矣厥功茂哉環藩衛以曲列儼閶闔之洞開北斗標建車之象移節度而齊七政文昌制戴筐之位羅將相而枕三台闢天床於玉闕乃宴休之攸御肅天理於璇璣執威權而是預天槍天棓以相指內廚內階而分據雙三夾斗而燮詣兩乙賓門而佐助爾乃天牢崇圉設禁暴之隄防太尊明位擬聖公之寵章太陽接相以班跡玄戈撥杓而耀芒勢微匕而有象輔熠熠而流光薦秋成於八榖務春採於扶筐天廚蔽兮供百宰傳舍開兮通四方偉天官之繁縟立疏廟之隆崇何大角之皎皎夾攝提之融融七宿畫野以分區五宮立都而對雄既以歷於中宮乃回眸而顧東觀角亢於黃道包分野於營中開天門之燦耀揖進賢之雍容是推紀於變節是正綱於大同其次則梗河備預招搖候敵泛舟尤池飛觴帝席周鼎毓神天田豊籍按三條於平道賓萬國於天門置平星以決獄列騎官而衛閽陽門守於邊險折威防於將奔頓頑司於五聽車騎參於八屯望南門之峻關覿庫樓之威府偃蹇列於四衡的歷分於五柱或藏兵而蓄銳或重扃而禦侮煥蒼龍之中宿矚氐心以及房聽朝路寢布政明堂爰俾其地于宋之疆粵若太火赫然天王鉤鈐儼於鳳闕積卒穆於龍驤天輻備於舉輦鍵閉守於關梁騎陣啟將軍之位從官主巫醫之職罰作贖刑日為陽德二咸防非而體正七公議賢而糾慝陣車雷擊乎其南天乳露滋乎其北彼貫索之為狀實幽囹之取則歷龍尾以及箕跨北燕而在茲配四妃而有序均九子以延慈鼉曳尾而波泳魚張鱗而水嬉天江為太陰之主傅說奉中闈之祠糠為簸揚之物杵為舂臼之用天鑰司其啟閉丈人存其播種狗以吠盜奸回靡縱却睇女床前瞻天紀耀棘庭之金印粲椒宮之玉齒中有崇垣厥名天市車肆中衢以連屬市樓臨箕而鬱起帝座類候而獨尊侯臣光熙而燮理宗星派踈而遠集宦者刑餘而近侍列肆與屠肆分行宗正與宗人同峙帛度立象以量用斗斛裁形而取擬若乃朓北宮於玄武泊南斗而牽牛賦象通犧廟之類司域應江淮之洲建星含曜於黃道天井寫映於清流河鼓進軍以嘈囋兩旗夾道以飛浮天淵委輸於南海狗國分權於北幽雞揚音而顧侶鱉曜影而來遊天田臨於九坎羅堰逼於天桴是司溝洫是制田疇遂聳睇於漢陽乃攸窺於織女引寶毓囿搖機弄杼輦道清塵而俟駕漸臺飛灰而候呂可以嬉遊可以臨處瞻須女之繒室奄開邦於會稽離珠耀珍於藏府匏瓜薦菓於宸閨离瑜佩瓊而衒敗瓜委蔓以分畦其外鄭越開國燕趙鄰境韓魏接連齊秦悠永周楚列曜晉代分坰天津橫漢以摛光奚仲臨津而汎影既編梁以虹構亦裁輪而電警列虛危於齊濟職悲哀與宗廟墳墓寫狀以孤出哭泣含聲而相召敗臼察災而揚輝天壘守夷而軿照司命與司祿連彩司危與司非疊耀伺禍福之多端總興亡之要妙人掌詔以優游儼為人之質鉤主震而屈曲宛如鉤之象車府息雷轂之聲造父曳風鑾之響杵軍給以標正曰年豐而示仰土吏設備以司存斧鉞用誅之所掌虛梁闃寂以幽閟蓋屋喧轟而宴賞天錢納賮以山積天綱憩輿而野饗北落置候兵之門八魁建張禽之網瞻廟府於室壁諒有衛之封畿布離宮之皎皎散雲雨之霏霏霹靂交震雷電橫飛壘壁寫陣而齊影羽林分營而析暉土公司築而開務天廄飛御而起機螣蛇宛而成質水蟲總而攸歸動則飛躍於雲外止則盤縈於漢沂迤奎婁之分野辨鄒魯之川陸豢馴獸於囿苑隸封豕於溝瀆左更處東而掌虞右更居西以司牧立囷倉之儲聚樹溷屏之重複司空主土以搜祥鐵鑕縈蒭而薦畜軍南門列轅而遠出天將軍揚旗而示逐伊王良之策馬則車騎之滿野蒙居河而路塞策栽鞭而電寫閤道優游而據中附路備闕而居下自胃倉而昴畢實趙地之郊衢建旄頭而肅引畢罕車而迅驅卷舌列天說之表附耳屬天高之隅天高望氣天說備巫卷舌安其寂默附耳矜其諂諛天船泛影乎清瀨貯積水而窺害太陵分光乎耀虛包積尸而如帶礪石資乎鋸刃月宿歸乎太陰天街畫於戎野天阿察於山林天節宣威於邦域天陰進謀於腹心天庾積粟以示稔天廩備稷以祈歆天園曲列兮儲芳樹天苑圓開兮畜異禽蒭藁遵納秸之軌殊國曉重譯之音九游排鋒以進退軍井依營而淺深天關嚴扃於畢野諸王列藩於漢潯何五車之均明而三柱之照煥納五兵於藏府圖七國之邦貫天潢利涉以淪漣咸池浮中而渺漫闢岷峨之沃壤睎觜參之曜形示斬刈以明罰收褒旅而獲寧參旗懾于邊寇玉井通於水經座旗肅穆以昭禮司怪幽求而發冥屏嫌於客廁咎於圊亦有天屎質黃效靈於是仰東井之輿鬼覽西秦之伯邑質明祀而變生鉞淬水而刑及四瀆斷江淮之候兩河占秦越之域水位瀉流而迅奔天樽奠饌而翕集軍市通貨以財明五侯起議而衡立積水醞燕酹之勞積薪備牲庖之給野雞俟兵而據市天狗吠盜而映漣闕邱擬乎兩觀水府司乎百川狼援戈而野戰弧屬矢而承天老人作主而秋煥大人通臣而夜懸子扶尊而眇邈孫孕緒而連綿惟天社之赫若實勾龍之神焉爰觀柳以及張知周疆之爰啟儼咮頸以分嗉奉滋嘗而賜醴觀夫軒轅之宮宛若螣蛇之體交雷雨之靄靄列后妃之濟濟酒旗緝醼以承歡內平繩愆而執禮爟含烽而喋寇實防邊之有俟長垣崇司域之備少微彰處士之懿外廚調列饍之滋天相居大臣之位天紀錄禽而獻齒天廣嚴祠而毓粹天稷播五稼之勤東歐表三夷之類爰周翊軫厥土惟荊驅風驛之千乘奏雲門之六英長沙明而獻壽車轄朗而陳兵青邱廕於韓貊器府總於琴堂軍門坐甲於軍閫司空掌土於司平矚太微之崢嶸啟端門之赫奕何宮庭之宏類乾坤之闔闢五座參一帝之謀九卿踵三公之跡儲以太子參之幸臣從官肅侍謁者通賓郎將司戟於丹陛郎位含香於紫宸乃寄屏以持法控端門之內闉明堂演化靈臺候神虎賁之徵猛士進賢之訪幽人獻淵謀於諸侯儼營衛於常陳胡天漢之昭回自東震而綿絡北貫箕而聯斗南經說而緯龠合乘津而浮瓜分漂杵而泛閤歷玉潢以汪洋淪七星而依泊惟木德之含精為歲星而明麗雖盈縮所察禍福攸繫然而得之者隆失之者替祚明君而耀朗罰昏主之光翳下為杜靈上為天貴如夭胎而毀卵具職仁而施惠迴騖愆期前馳舛契奮槍棓以示慝峙樓垣而表戾粵若熒惑火帝之精每執法以明罰必伺災而告誠守其邦而歲戰去其野而時清若虧信而廢禮則下乘而上征居惟釁發合與憂并浮天讒而聳劍列蚩尤而耀旌司危見而失國昭明出而起兵伊土宿之播靈為鎮星而耀質尋所履為休慶視所居為貞吉廣邦繳而斯留復軒宮而載出若崇奢而賤義則行虧而度失或含丹而舉兵或噙黑而遘疾旬始發而侯起獄漢明而主黜被金方之耀色有太白之垂文乃降神於屏翳實建象於將軍如用兵而不察匪先達之攸聞高出利於深戰順指著乎宏勳茍恩義之不溥則禍福之攸分或飛芒而蝕月或引彗而橫氛六賊陳災而構禍天狗殺將而破軍咨太陰之稟粹粵辰星之攸揆乘四仲而顯晦歷一周而匝履為用法之淵謨為出師之令軌若淫刑而縱欲則委孛而流矢白其角而表哀黑其規而應水察函劍之相去候正旗之所指非其出而夏寒錯其宜而將死於是究經緯之終始徵幽微之機符昭晰兮為人主之明鑑杳藹兮寔冥祗之秘樞固聲聞而響集方形移而影趨若山石之旌處士谷風之應騶虞者也若夫退寒暑而無舛中昏旦而不越畢露雲油箕躔吹發亦有樞降軒而繞電景瑞堯而麗月雖肸響之難窮信靈英之未歇嘉大舜之登禪耀黃星而靡鋒壯高祖之遇時家五緯而相從殷堪縱眺識曹公之潛跡李郃流目知漢使之幽蹤荊柯入秦白虹貫日衛生設策長庚食昴悲夫星隕如雨而周衰彗竟長天而秦滅蛇隨楚而九域含嗟狗過梁而千里流血晉君終而婺妖見漢帝圍而參暈結周楚滅而南衝晉齊殃而北裂自大辰以及漢彰宋焚而衛𤍽或除舊以布新顯陳盛而姜絕諒吉凶之有兆匪災譴之虛設固罔念而作狂在恭已而成哲是以帝王之有天下也莫不分設其官或司其告唐則羲和降察夏則昆吾演奧嘉殷巫之美服登周史之雅號宋述子韋鄭稱裨竈唐昧與尹皋宣範甘德暨石申垂諾故能下守職而恪恭上知變而無傲此希夷之妙象豈蒙昧之私好有少微之養寂無進賢之見譽參器府之樂肆掌貫索之刑書恥附耳之求達方卷舌以幽居且扃扉而絕駟奈臨河而羨魚望天門而屏跡安知公卿之所如, krp: ''}
