  - {type: variant, offset: 11843, length: 931, content: 酣奏數曲四一作西山猿鳥皆驚飛嗚噭眾悉異之曰昔夔之擊撫百獸舞庭此豈遠耶鴻漸曰某有別墅近華嚴閣嘉時登閣奏此忽見群羊躑躅于山下某不謂以鼓然也及止群羊亦止復鼓羊亦然旋有二犬走而吠之及群羊側遂俯仰若有所聽少選則復宛頸搖尾亦從而變態是知率舞固不難矣羯鼓出外夷以戎羯之鼓曰羯鼓羯鼓錄玄宗好羯鼓而寧王善吹橫笛帝常稱羯鼓八音之領褏諸樂不可方也蓋本戎羯之樂其音太簇一均龜茲高昌疏勒天竺部皆用之其聲焦殺特異眾樂志玄宗洞曉音律由之天縱凡是管絃悉造其妙若製作曲調隨意即成雖古之夔曠無以過尤愛羯鼓橫笛云八音之領袖也諸樂不可為北嘗值二月詰旦巾櫛方畢時宿雨初晴景色明麗小殿庭內柳杏將吐高力士遣取羯鼓上旋命之臨軒縱擊一曲名春光好神思自得又製秋風高每至秋空逈徹纖羅不起即奏之必遠風徐來庭葉墮落其妙絕入神也如此上性雋邁酷不好琴嘗聽彈正弄未及畢叱琴者曰待詔出去謂宦者曰速召花奴將羯鼓來為我解穢宋開府雖耿介不倫亦深好聲樂尤善羯鼓始承恩顧與上論鼓事曰頭如青山峯手似白兩點案此即羯鼓之能事山峯欲不動雨點取碎急東都留守鄭淑祖母即開封之女今尊賢畢鄭氏第小樓即是夫人習鼓之所也曹嗣王皐為荊南節度使有客懷二捲見之皐捧而嘆曰此至寶也必開元中供御捲也已而問之果得于高力士矣杜鴻漸為三川副元帥成都匠者有以二杖獻之鴻漸示于眾曰此尤物也必常衣襟下收之積時也已而問之果養之脊溝中二十年矣廣德中蜀客前雙流縣丞李琬者嘗至長安夜聞羯鼓聲曲頗妙謂鼓工曰君所擊者豈非耶婆色鷄乎雖至精能然而無尾何也工大異之曰君固知音者具言所以琬曰夫耶婆色鷄掘柘急徧解之工如所教果能諧恊而盡其聲矣工泣而謝之柘枝用渾脫解甘州用結了頭解之類是也並羯鼓錄不嗚貞元十三年六月丙寅天晦街鼓不嗚貞元中驃國進樂有銅皷咸通末龔州刺史張直方因葺城池掘得一銅皷捨于延慶以代木魚僖宗朝林藹守高州鄉野牧童聞田中蛤嗚欲進捕之一蛤躍入穴中掘而取之得一銅皷其上隱起多鑄蛙黽之狀豈嗚鴿乃銅皷之精耶嶺表錄異鄭餘慶兼判太常卿事初德宗自山南還宮關輔有懷光吐蕃之虞都下驚擾遂詔太常習樂去大皷至是餘慶始奏復用大皷唐書新進士放榜後翌日排建福門候謁宰相有詩曰華陽觀裏鐘聲起建福門前皷動時即其事也南部新書張薦明為道士高祖召見延入內殿薦明聞宮中奏時皷曰陛下聞皷乎其聲一而已五音十二律皷無一焉然和之者皷也五代史, WYG: ''}
