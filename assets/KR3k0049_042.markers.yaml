  - {type: variant, offset: 4873, length: 628, content: 而莫立使百姓巷祭戎夷野祀非所以存德念功述追在昔者也宜因近其墓立之於陽使所親屬以時賜祭於是始從之襄陽記羊玄保自少至老謹於祭奠四時珎新未得祠薦者口不妄嘗宋書張沖永明八年為假節監青冀二州行刺史事沖父初卒遺命曰祭我必以卿土所產無用牲物沖在鎮西府時還吳國取菓菜每至嘗烝輒流涕薦焉齊書胡叟少孤言及父母則淚下若孺子之號墩煌范潛家善釀酒每節送一壺與叟何其恒也潛曰我恒給祭者以其恒於孝思也論者以潛為君子矣後魏酌水祭海王義方初為太子校書魏徵張亮皆厚禮之亮誅坐與交遊貶授儋州吉安丞行至南海舟人將以酒酺致祭義方曰黍稷非馨義在明德乃酌水而祭唐書太壇太折祭天曰燔迆祭地曰瘞埋爾雅圓丘太壇祭天方澤太折祭地廣雅五祀南郊北郊西郊東郊中兆正謀五者天子公侯伯子男卿大夫士所以承天也禮含文嘉祭帝於郊所以定天位也祀社於國所以列地利也禮運今尚書夏侯歐陽說類祭天名也以事類祭之柰何天位在南方就南郊祀之是也五經異義王者所以祭天地何王者父事天母事地故以子道事之也祭日以丁與辛何丁者反覆自丁寧辛者當自尅辛也五經通義成帝初即位丞相御史大夫相譚奏言帝王之事莫大於承天之序承天之序莫重於郊祀故聖王盡心極慮以建其制祭天於南郊就陽之義瘞地於此郊則陰之象也因其所都而各饗焉昔者周文武郊於酆鄗成王郊于雒邑由此觀之天隨王者所居而饗之可見也耳泉泰畤河東后土之祠宜可徒置長安漢書畫瞑丹陽方儲聰明善天文為洛陽令章帝欲出南郊儲上言當有疾風暴雨乘與不可以出上疑其妄儲飲而死果有大風暴雨洛陽晝瞑後書靈帝建寧二年迎氣黃郊道於洛水西橋逢暴風, WYG: ''}
