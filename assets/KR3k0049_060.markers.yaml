  - {type: variant, offset: 27189, length: 0, content: '', WYG: 則應後因為患項上係紅絲一縷題詩送之孤雲兩角山有棲宿兑勞青嶂夣躋攀應愜碧雲心之句後入蜀行次嶓冡廟前見群猿飲於清流有巨猿捨群而前於道畔右木之間垂身下顧紅綃髪髴而在從者指之曰此野賔也呼之聲聲相應移時哀呌數聲而}
