  - {type: variant, offset: 26596, length: 576, content: 一枚可得脂三四斛然之照紡織則暗照歌舞則明習懶之性不革也今安平七源等州峒俱有狀如山豬而小喜食苗田夫以杼柚之類掛於田頭則不敢復近南越志風母風猩如猿猴而小晝日蜷伏不能動變則惊躍甚疾好食蜘蛛毒打殺以口向風復活惟破腦不復生矣以酒浸愈風病南人得傳云此獸常持以小杖遇物則指飛走悉不能去人有得之者所指必有獲夷人施罟网既得其獸不復見其杖杖之數百乃肯為人取或云邕州首領寧泗得之泗資產巨萬僮伎數百泗甚秘其事嶺南異物志風母獸一名平猴狀如猴無毛赤目若行逢人便叩頭似如懼罪自乞人若撾打之愜然死地無復氣息小得風吹須臾能起南州異物記貀貀獸無前足漢津能捕豺貀購百錢說文獸無前足似虎而黑字林長慶中河東節度使李聽貢貀三頭貀猛捷之獸也穆宗好畋遊嘗詔諸道廣求此獸搜踐山谷郡縣告勞防虞籠檻甚于豺虎及至林苑往往噬人後穆宗亦盡令逐及敬宗即位聽復獻之唐書貘貘似熊小頭庳腳黑白駁能舐食銅鐵及竹骨節強直中實少髓皮辟濕人寢其皮可以驅溫癘爾雅注今黔蜀中時有貘象鼻犀目牛尾虎足土人鼎釜多為所食頗為山居之患亦捕以為藥其齒骨極堅以刀斧椎鍛鐵皆碎落火亦不能燒人得之詐為佛牙佛骨以誑俚俗圖經南方有獸齒鐵大如水牛色如漆食鐵飲水其糞可作兵器其利如鋼其溺可消銅鐵神異經貘溺能消鐵為水昔閔氏誤吞針入腹刺血盈盤以貘溺服之其針消矣其屎作刀可切玉石貊或作貘物類感應志㹼江南武當山往往有㹼獸狀如獅子蒼黑色常瞑目聳耳一足攀林抄若猿猴輩逢雖, WYG: ''}
