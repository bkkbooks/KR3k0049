  - {type: variant, offset: 26504, length: 0, content: '', WYG: 浴子北齊髙昻字敖曹其母張氏始生一男二嵗令婢為湯將浴之婢置而去養􅀈繫解以兒投鼎中􅀈而死張使積薪於村外縳婢及猿焚殺之揚其灰於漳水然後哭之昻性似其母北史十九山公王續遊嵩山月夜見一人胡鬢眉皓而瘦稱山公與績談文異義出於言外繞疑其怪潜開匣取鏡鏡光出而胡者失聲俯伏化為猿而殞異聞集一李約多藏古噐養一猿名山公嘗以之隨逐月夜泛江登金山擊鐵皷琴猿必嘯和傾壼連且不俟外賔約汧公子}
