  - {type: variant, offset: 27190, length: 7, content: 則群走而竄伏終, WYG: 許逺尚聞鳴咽之聲疑其腸斷矣繼作一篇未句云數聲腸斷和雲呌識是前年舊主人王氏見聞鳴哀峽長十百里兩岸連山畧無絶處重巖疊障隱天蔽}
  - {type: variant, offset: 27190, length: 7, content: 則群走而竄伏終, krp: 許逺尚聞鳴咽之聲疑其腸斷矣繼作一篇未句云數聲腸斷和雲呌識是前年舊主人王氏見聞鳴哀峽長十百里兩岸連山畧無絶處重巖疊障隱天蔽}
  - {type: variant, offset: 27198, length: 150, content: 矣物類感應志貔貅前有鷙獸則載貔貅曲禮黃帝教熊羆貔貅貙虎以與炎帝戰於阪泉之野史記貔一名執夷虎豹之屬詩大雅云獻其貔陸機疏云貔似虎或曰似熊一名執夷一名白狐遼東人謂之白羆爾雅疏海之大也而魚何為可得山之深也虎豹貔貅何為可服汲冢周書牴𤙙二獸名秉心甚靈蓋忠直獸也今承天門內華表頂上者是集韻崑崙西有獸其狀如犬有兩目而, WYG: 自非亭午分夜}
