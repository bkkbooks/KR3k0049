  - {type: variant, offset: 27183, length: 1, content: 推, WYG: 至後自潘州囘路厯仙虚聞舊山猿啼不食而卒乃積薪藏坎北户録巴西侯呉郡張􅀈罷秩歸蜀行次巴西㑹日暮有人道左出拜曰吾君巴西候奉邀鋋既能飲酒命樂夜將半鋋假寐將曉悸而窹見身卧石龕中有巨猿醉卧於地宣室志野賔五仁㭲畜}
