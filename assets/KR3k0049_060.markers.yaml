  - {type: variant, offset: 18507, length: 807, content: 北齊高昂字敖曹其母張氏始生一男二歲令婢為湯將浴之婢置而去養猿繫解以兒投鼎中爛而死張使積薪于村外縛嬋及猿焚殺之揚其灰于漳水然後哭之昂性似其母北史十九山公王績遊嵩山月夜見一人胡鬢眉皓而瘦稱山公與績談文異義出於言外績疑其怪潛問匣取鏡鏡光出而胡者失聲俯伏化為猿而殞異聞集一李約多蓄古器養一猿名山公嘗以之隨逐月夜泛江登金山擊鐵鼓琴猿必嘯和傾壺連旦不俟外實約汧公子也因話錄魏元忠素強正其微時家貧止一婢廚中方爨出外汲水回乃見老猿為其守火婢驚白元忠猿執爨曰猿恐我乏使為我爨不亦善乎後亦無他廣異傳商山隱士高太素累徵不起在山中構道院二十餘間太素起居清心亭下皆茂林秀竹奇花異卉每至壹時即有猿一枚詣亭前鞠躬而啼不易其猴太素因目之為報時猿天寶遺事唐王縉讀書嵩山有四叟攜榼來相訪自稱木巢南林大節孫文蔚石媚虬高談劇飲既醉俱化為猿升木而去樹萱錄白猿脂同昌公主疾甚毉者云紅密白猿脂食之可愈內庫得紅密數石本兜離國所貢白猿脂數甕本南海所獻杜陽編巴兒叚公路咸通十年往高涼程次青山鎮其山多猿有黃緋者絕大毛彩殷鮮真謂奇獸多群行玄者善啼啼數聲則虫猿叶嘯騰擲如相呼焉其音凄入肝脾韻含宮徵方知當一部鼓吹不獨蛙聲矣因召獵者捕而養之名曰巴兒極馴不貪食於樹杪間呼之則至後自潘州回路歷仙虛聞舊山猿啼不食而卒乃積薪藏坎北戶錄吳郡張鋋罷秩歸蜀行次巴西會日暮有人道左出拜曰吾君巴西候奉邀鋋既見飲酒命樂夜將半鋋假寐將曉悸而寤見身臥石龕中有巨猿醉臥於地宣室志王仁裕畜一猿號野賓呼之則應後因為患項上係紅絲一縷題詩送之孤雲兩角山有棲宿兌勞青嶂夢躋攀應愜碧雲心之句後入蜀行次嶓冢廟前見群猿飲於清流有巨猿捨群而前於道畔右木之間垂身下顧紅綃髣髴而在從者指之曰此野賓也呼之聲聲相應移時哀叫數聲而去許遠尚聞鳴咽之聲疑其腸斷矣繼作一篇未句云數聲腸斷和雲叫識是前年舊主人王氏見聞峽長十百里兩岸連山略無絕處重巖疊障隱天蔽日自非亭午分夜不見曦月每至晴初霜旦林寒澗肅常有高猨長嘯屬引清遠漁者歌曰巴東三峽巫峽, WYG: 闕}
