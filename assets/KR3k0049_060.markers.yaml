  - {type: substitution, offset: 5914, original: 勅, replacement: 敕, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:9bc9a4233a10ab6fe6494b31262c157187fd580f02a97cad91be81ccd48f7a20', entry: vf-20718}}
  - {type: variant, offset: 5922, length: 353, content: 給諸僧勸受象施曰斯勝相也佛滅度來王雖崇敬种种布施未聞以象用及釋門象為國寶今既見惠信之極矣因納象而反錢寶象形圓大高可丈三長二丈許容八人并諸什物經像等具並在其上狀如重堵相以空行雖逢奔逸而安穩不墜瓶水不側緣國北旋出印度境過葱嶺至烏鎩國與象別行先渡雪河象晚方至水漸汎漲不悉山道尋嶺直下牙衝岸樹象性凶獷反拔卻頓因即致死玄裝傳群象牙能觝觸鼻善卷舒力卻九牛奔過駟馬矣別有阿耨池岸香醉山陰象則鼓雙翼以飛騰用七支而巧便在夫海山之象百倍絕論厥號藹羅伐挐象中龍也唐高僧感通香象百丈禪師曰如香象渡河截流而過無有滯疑慧忠國師云如世大師斤斧不傷其手香象所負非驢能堪將軍安南人呼象為將軍有獵者曾入深山為白象鼻卷上背止宿高樹明見巨獸高十餘丈攫食白象所領一頭其人累射獸中其口斃之歸白都護都護髮使隨之巨獸但存餘骨十人舁致一節有孔通人來去廣異記, WYG: 牡}
