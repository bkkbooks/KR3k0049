  - {type: variant, offset: 24690, length: 999, content: 則不知過國無達士則不聞善願陛下選明經術溫故知新通於幾微謀慮之士以為內臣與參政事諸侯聞之則知國家納諫憂政亡有闕遺若此不怠成康之道其庶幾乎外郡不治豈足憂哉前漢揚雄字子雲以耆老久次轉為諫議大夫疾免復召為諫議大夫家至貧嗜酒人稀至其門時有好事者載餚酒以從遊學上江革轉諫議大夫賜告歸天子思革篤行詔齊相曰諫議大夫江革前以病歸今起居何如夫孝者百行之冠眾善之始也縣以見數千斛賜巨孝常以八月長吏存問致美酒以終身後漢李尤字伯仁侍中賈逵薦尤有揚雄之才明帝召作東觀辟雍德陽諸觀賦銘拜諫議大夫晉書張普惠字洪賑身長八尺容貌魁偉精於三禮兼善春秋百家之說任城王澄重其學業為其聲價轉諫議大夫澄謂普惠曰不喜君得諫議唯喜諫議得君將靈太后父司徒胡國珍薨贈相國太上泰公普惠以前世后父無太上之號詣闕上䟽陳其不可太后覽表親至國珍宅召集五品已上愽議其事遣使召普惠與相問答又令侍中元又中常侍賈璨監觀得失太后復遣元義賈璨宣令謂普惠曰朕向召卿與群臣對議往復既終皆不同卿表朕之所行孝子之志卿之所陳忠臣之道群公已有成議卿不得苦奪朕懷後有所見勿得難言普惠於是拜令辭還初普惠被召傳詔馳驊騮馬來甚迅速佇立催去普惠諸子憂怖涕泣普惠謂曰我當休明之巿掌諫議之職若不言所難言諫所難諫便是唯唯曠官尸祿人生有死死得其所夫復何恨然朝廷有道汝輩勿憂及議罷旨勞還宅親故賀其幸甚時中山杜弼遺書普惠曰明侯淵儒碩學身負大才秉此公方來居諫職謇謇如也諤諤如也一昨承胡司徒第當面折庭諍雖問難鋒至而應對響出宋城之帶始縈魯門之柝裁警終使群后逡巡庶寮拱默雖不見用於一時固已傳美於百代聞風快然敬栽此白普惠美其此書每為口實魏書蹇諤不顧隋煬帝驕矜自負以為堯舜莫已若而諱亡憎諫乃曰有諫我者當時不殺後必殺之大臣蘇威欲開一言不敢發因五月五日獻古文尚書帝以為乩己即除名蕭瑀諫無伐遼出為河西郡守董純諫無幸江都就獄賜死自是蹇諤之士而不顧外雖有變朝臣鉗口帝不知也身死人手子孫勦絕為天下笑唐吳競䟽王珪為諫議大夫嘗有論諫太宗稱善詔每宰相入內平章大計必使諫官隨入與聞政事唐書武后垂拱二年有魚保宗者上書請置匭以受四方之書乃鑄銅匭四區共為一室列於朝堂東方春色青有能告以養人及勸農可投書於青匭銘之曰延恩南方夏色赤有能正諫論時政之得失可投書於丹匭銘之曰招諫西方秋色白有能自陳抑屈可投書於玄匭銘之曰申脕北方水色玄有謀智者可投書於玄匭銘之曰通玄令宣正諫大夫補闕拾遺等一人充使人匭事每日所有投書至暮即進天寶九載玄宗以匭聲近鬼理匭使為獻納使上, WYG: ''}
