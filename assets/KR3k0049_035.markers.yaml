  - {type: variant, offset: 24939, length: 973, content: 皆黃金色上手中自有一琉璃清淨甖可高三尺許以上彌勒即放光明照于上身至兜率天亦不見飲食自然飽滿故一復湏人間食也但聞人間食皆臭是以不肯食於彼天上得波利餅將還意欲與令法師有言令法師是人中果報那得食天上食不聽將去自後體中亦轉惡不復說餘事但云有三十二童子一名功德天二名善女天是迦毗羅所領恒來在左右與我驅使或言得人餉飲食令眾中行之復云空中畫夜作伎樂鬧人耳也沈約行狀宋元嘉十一年師子國尼鐵索羅等於建康南林寺壇上為福寺尼果淨音等受戒法事薩婆多師資傳尼講晉廢帝大和三年洛陽東寺尼道馨通法華維摩研窮理味一方宗師儒史略爾朱榮之害朝士山偉與儀曹郎袁昇屯田郎李考外兵郎李與三公郎王延業方駕而行偉少居後路逢一尼望之嘆曰此輩緣業同日而死謂偉曰君方近天子當作好官既而昇等四人皆死河陰竟如其言後魏書宋初有法南方人不知因緣所出辟穀食棗粟不著綿帛戒德甚尊禪定多所感通會稽恭子張使君莅廣州便供養之隨使君還吳又隨出入尼自尅亡日捨命後勿歛但乞烏鳥至破崗如期而終使君依旨送林野間停再七日七夕鳥哭不敢侵乃收殯焉江惣祖母尼受戒勑江集隋文帝以後魏大統七年六月十三日生於同州般若寺中于時赤光照室流溢外戶紫氣滿庭狀如樓閣色染人衣內外驚禁妳母以時炎熱就而扇之寒甚幾絕困不能啼有神尼者名曰智仙河東蒲坂劉氏女也少出家有戒行和尚失之恐其角井見在佛屋儼然坐定時年七歲遂以禪觀為業及帝誕日無因而至語太祖曰兒天佛所佑勿憂也尼遂名帝為那羅延言如金剛不可壞也又曰此兒來處異倫俗家穢雜自為養之太祖乃割宅為寺內通小門以兒委尼不敢名問後皇妣來抱忽見化而為龍驚惶角地尼曰何因妄觸我兒遂令晚得天下及年七歲告帝曰佛法將滅一切神明今已西去兒當大貴從東國來佛法當滅由兒與之一切神明還來尼沉靜寡言時道成敗吉凶莫不符驗及周滅二教尼隱皇家內着法衣戒行不改帝後果自山東入為天子重興佛法每以神尼為言久云我與由佛法由小時在寺至今樂聞鐘聲乃命王劭為尼作傳其龍潛所經四十五州同時悉改為大興國寺般若其一也於天下舍利內各作神尼之像焉續高王劭舍利記比丘尼經一云除饉女康僧惠法鏡經云凡夫貪染六塵猶餓夫食飯不知厭足今聖人斷貪除六情饑饉故號出家女為除饉女也開元中溫州凈居寺尼玄機景雲中得度嘗習定於平陽大日山石窟中或者云嘗與兄宿覺同參六祖因暑圓明歌與證道歌相表裏後例立而化法屬以生死顛倒語呵之應聲而仆將罪之弘風雷陰黯若有神物移之越二日有自大日來者云是夕空中有簫罄聲釋鑑, WYG: ''}
