  - {type: variant, offset: 24392, length: 545, content: 略肇曰義名信士男信士女凈名䟽云此云清淨士清凈女亦云善宿男善宿女優婆塞梵語鄔波索迦唐言近事男優婆夷梵語夷即女聲字也又云鄔波斯迦唐言近事女言近事者親近承事諸佛法故後漢書名伊蒲塞注云即優婆塞也中華翻為近住言受戒行堪近僧住也翻神之最高謂之大覺教通三世眾別四部二從於道二守於俗從道則服像尊儀守俗則務典供事像尊謂比丘比丘尼也典供謂優婆塞優婆夷也釋彥綜福田論桓溫以雄武專朝覬覦非望時有遠方比丘尼名有道術於別室浴溫竊窺之尼倮身先以刀自破腹次斷兩足浴出溫問吉凶尼云公若作天子亦當如是晉書咸康中竹林寺尼凈檢見天女持五色花自空來迎遂騰空直上所行之路有如虹蜺直屬于天釋鑑南齊禪林寺比丘尼釋凈秀挺慧于曠劫體妙解于當年七歲自然持齋十二便求出家二十九方落䰂青園躬修三葉夙夜匪懈有開士馬先生者於青園見上即便記云此尼當生兜率天也宋大明中黃脩儀及南昌公主深崇三寶敬仰德行初置精舍居之明帝賜號曰禪林上前後違和恒有瑞相天監五年八月得病苦心悶不下飲彭城寺令法師以六月十九日夜得夢見一處謂是兜率天上住止嚴麗非世間比言此是上住處即見上在中於是法師有語上上得生好處當見將接上是法師小品檀越勿見遺棄上即答云法師丈夫又弘通經教自應居勝也某甲是女人何能蓋法師又云不如此也雖為丈夫不能精進持戒不及上時體已轉惡漸就綿綴久復動轉自云上兜率天見彌勒及諸, WYG: 鏁骨}
