  - {type: variant, offset: 22531, length: 448, content: 召至京師鄭重咨問法要司徒楊綰篤情道樞行出人表一見欽於眾退而嘆曰此實方外之高士也難得而名焉名賢執弟子禮者相國崔渙裴晋公度第五琦陳少遊等自淮而南婦人禮乞號皆目之為功徳山焉高僧傳崔圖問弟子今欲出家得否師曰出家乃大丈夫事非相相之所能為公於是有省傳燈塵外摩尼什神邕丱角聦悟過人孔釋二典一讀能誦公卿籍其風宇追慕者結轍而至著作郎韋子春剛氣而贍學與之詶抗子春折角滿座驚服苑舍人歎曰闍梨可謂塵外摩尼論中師子時人以為能言高僧三宣三一揚州釋法慎傳于舊章淮甸之間稱為碩匠天寶初晋陵義宣徃師之毗陵多出名士僧有三宣謂慧徳與義也義時于江都習業與會稽曇一閩川懐一慶雲靈一同門為朋也晋陵既有三宣慎門復出三一焉江表資為美談宋高僧杭州靈隱山寺什道標經行之外尤練詩章辭體古徤比之潘劉當時吳興有晝會稽有靈徹相與詶唱作笙簧故人諺曰霅之晝能清秀越之徹洞氷雪杭之標摩雲霄每飛章寓韻竹夕花時彼三上人當四面之敵所以辭林樂府常采其聲詩景陵于陸羽云夫日月雲霞為天標山川草木為地標推能歸美為徳標居閑趣寂為道標爾後聲價軼于公卿至今杭州謂之西崩和尚矣宋高僧傳, WYG: ''}
