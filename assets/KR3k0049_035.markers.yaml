  - {type: variant, offset: 18460, length: 928, content: 濟甚駭懼後袝商人入湘川中路患痢令商出置岸側夜見火光從身而出商就視已死矣濟後言千劉虬虬曰此入火光三昧也高僧無上士釋雲崇偏精六行冠達五門同學號為無上士智顗禪師眼有重瞳俊朗通悟詣金陵尾官寺創弘禪法徐陵等明時貴望學統釋儒並稟禪慧俱傳香法禹穴慧榮住莊嚴寺道跨吳會世稱義虎辯號懸流聞顗講法故來設問輕誕自矜揚眉舞扇扇墮地顗應對事理渙然清顯譴榮曰禪定之力不可難也時沙門法歲撫榮背曰從來義龍今成伏鹿扇既隨地何以遮羞榮曰輕敵失勢未可欺也一日夢巖岩萬重雲日半垂其側滄海無畔泓澄在於其下又見一僧搖手伸臂至于岐麓挽顗上山云云顗以夢中所見通告門入咸曰此會稽天台山也聖賢之所託矣昔僧光道猷法蘭曇密晉宋英達無不栖焉周與慧辨等二十餘人隱淪斯岳先有青州僧定光久居此山積四十載定慧無習蓋神人也顗未至二年預告山民曰有大善知識當早年山上搖手相喚不乎顗驚異焉知通夢之有枉也又聞鐘聲滿谷眾咸怪異曰鐘是召集有緣爾得住也陳永陽王伯知躬著願文曰天台闍梨德侔安遠道邁光猷宣帝求釋門誰為名勝陳暄奏云瓦官禪師德邁風霜禪鏡淵海昔在京吧群賢所宗今高步天台法雲東靄願陛下召之乃還都敕立禪眾于靈耀寺末為靈曜隘更求閑靜忽夢一人翼從嚴正自稱名云余冠達也請住三橋顗曰冠達叉武法名三橋豈非光宅耶乃移居之卒後枯骸特立端坐如生顗初居臨海民以滬魚為業罾網相連四百餘里江滬溪梁六十餘所即以福緣所得金帛買斯海曲為放生之池又表聞陳宜勑禁採捕時還佛壟如常習定忽有黃雀滿空翱翔相慶鳴呼山寺三日乃散顗曰此乃魚來報吾恩也又居山有蕇觸樹皆垂隨采隨出供僧常調顗若他涉蕇即不生因斯以談誠道感矣釋曇延弘裕方雅詞辨優贍有薛居士者學揔玄儒聞而謁之言謔相高戯題方圓動靜四字命延體之延應聲曰方如方等城圓如智慧日動則識波浪靜類涅槃室薛驚異絕嘆曰由來所未見希世挺生即斯人也爾後恒來尋造質疑請義八能什貞觀左掌仙丈右掌人字口流津液充潤榮府從幼至終未嘗患渴舌文交加狀如羅綺八歲通詩禮和庾尚書林檎之作沙門洪偃才邁儒吳英鉤深釋傑面相謂曰權高多知耳白有名我有四絕爾具八能謂義導書詩辨貌聲棊是也學士傳縡嗟曰三千稱首七十當初是上人者當為對時人語曰錢塘有貞觀當天下一半初祖達摩傳慧可慧可嘗斷其左臂以求其法慧可傳璨璨傳道信道信傳弘忍弘忍信周氏黃梅人物弘忍與道信並往東山寺故謂其法為東山法門舊, WYG: 𤣥奘}
