body:
  text: 心識微心纖也所識纖微無物不貫於心也釋名心者火之精成於五故人心長五寸元命包君位心之在體君之位也九竅之有職官之分也心處其道九竅循理耳目者視聽之官也夫心有欲者物過而目不見聲至而耳不聞也故曰上離其道下失其事管心術智舍潔其宮闕其門宮者謂心也心也者智之舍也故曰宮潔之者去好過也上神者智之淵也神清則智明智者心之府也智公則心平文子心欲小老子曰凡人之道心欲小志欲大智欲圓行欲方所謂心小者慮患未生戒禍慎微不敢縱其欲也志欲大者兼包萬國一齊殊俗是非輻輳中為之轂也智圓者終始無端方流四遠淵泉而不竭也行方者立直而不撓素白而不汙窮不易操達不肆志也故心小者禁於微也志大者無不懷也智圓者無不知也行方者有不為也上孫思邈告盧照鄰曰膽欲大而心欲小智欲圓而行欲方詩曰如臨深淵如履薄冰謂小心也赳赳武夫公侯干城謂大膽也不為利回不為義疚行之方也見機而作不俟終日智之圓也舊唐形之主心者形之主也神者心之寶也形勞而不休即蹶精用而不已則竭是以聖人遵之不敢越也以無應有必究其理以虛受實必窮其節恬愈虛靜以終其命文子國心老子曰主者國之心也心治則百節皆安心擾則百節皆亂故其身治者支體相遺也其國治者君臣相忘也上靈臺萬惡不可內於靈臺司馬云心為神靈之臺莊庚桑楚工倕旋而蓋規矩指與物化而不以心稽故其靈臺一而不桎達生靈臺鬱藹望橫野靈臺心也黃庭天君耳目鼻口形能各有接而不相能也夫是之謂天官心居中虛以治五官夫是之謂天君聖人清其天君正其天官荀天論神明之主心者形之君也而神明之主也出令而無所受令自禁也自使也自奪也自取也自行也自止也故口可劫而使墨云形可劫而使曲中心不可劫而使易意解蔽五臟之主夫心者五臟之主也所以制使四支流行血氣馳騁于是非之境而出入於百事之門戶者也淮原道下衆智之要心者衆智之要物皆求於心意林難知孔子曰凡人心險於山川難於知天莊子精神子思問於夫子曰物有形類事有真偽必審之奚由子曰由乎心心之精神是謂聖推數究理不以疑周其所察聖人難諸孔叢子糞心人皆知糞其田莫知糞其心田糞不過苗利得粟糞心易行而得所欲何謂糞心博學多聞何謂易行一欲止淫孟子見御覽若鏡至人之用心若鏡不將不逆應而不藏故能勝物而不傷莊子義制目好色耳好聞口好味接而説之不知利害嗜欲也食之不寧於體聽之不合於道視而不便於性三宮交爭以義為制者心也淮詮言潛心或問神曰心潛天而天潛地而地天地神明而不測者也心之潛也猶將測之況於人乎況於事倫乎楊子七竅王子比干諫紂以為妖言妲己謂曰吾聞聖人之心有七竅竅有九毛遂剖視之列女傳心蕩楚武王代隨入告夫人鄧曼曰余心蕩矣鄧曼曰王祿盡矣盈而蕩天之道也故臨武事將發大命而蕩王心焉若師徒無虧王薨於行國之福也王遂行卒於樠木之下左莊心異柯陵之會單襄公見晉厲公視遠步高告魯成公曰夫君子目以定體足以從之是以觀其容而知其心矣目以處義足以步目今晉侯視遠而足高目不在體而足不步目其心必異矣目體不相從何以能久國語心疾景王將鑄無射泠州鳩曰王其以心疾死乎夫樂天子之職也和聲入於耳而藏於心心億則樂窕則不咸槬則不容心是以感感實生疾今鐘槬矣王心弗堪其能久乎昭二十一三心梁丘據問晏子曰子事三君君不同心而子俱順焉仁人固多心乎晏子對曰嬰聞之順愛不懈可以使百姓暴強不忠不可以使一人一心可以事百君三心不可以事一君仲尼聞之曰小子識之晏子以一心事百君者也晏子心齋顏回曰敢問心齋仲尼曰若一志無聽之以耳而聽之以心無聽之以心而聽之以氣聽止於耳心止於符氣也者虛而待物者也唯道集虛虛者心齋也莊養生主死灰南郭子綦隱几而坐顏成子遊立侍乎前曰何居乎形固可使如稿木而心固可使如死灰乎齊物論換心魯公扈趙嬰齋有疾同請扁鵲求治鵲曰公扈志強而氣弱足於謀而寡於斷嬰齋志弱而氣強故少於慮而傷於專若換汝之心則均於善矣遂飲二人毒酒迷死三日剖胸探心易而置之投以神藥既寤如初於是公扈反嬰齊之室而有其妻子妻子不識嬰齊亦反公扈之室有其妻子妻子亦不識也列湯問心虛龍叔謂文摯曰吾有疾子能已乎文摯乃命龍叔背明而立文摯自向明而望之既而曰噫吾見子之心矣方寸之地虛矣幾聖人也子心六孔流通一孔不達今以聖智為疾者或由此乎非吾淺術所能已也仲尼心醉鄭有神巫曰季咸知人之死生存亡禍福壽夭期以歲月旬日若神鄭人見之皆棄而走列子見之而心醉莊應帝王阮咸與籍為竹林之遊太原郭奕高爽有識量少所推先見咸心醉不覺嘆焉晉書懸旌蘇秦為趙合從於楚威王曰秦虎狼之國不可親也寡人臥不安席食不甘味心搖搖如懸旌而無所終薄策史兩心武帝以任安見兵事起欲坐觀成敗有兩心田叔傳金石光武於大會中指王常謂群臣曰此家率下江諸將輔翼漢室心如金石真忠臣也是日遷常為漢忠將軍後漢刀開鄭玄師馬融三載無聞融遣還玄過樹陰下假寐夢一人以刀開其心謂曰子可學矣於是寤而即返遂洞精之典籍後東歸融曰詩書禮樂皆東矣異苑心動魏武常言人欲危已已輒心動因語所親小人曰汝懷刃密來我側我必説心動執汝使行刑汝但勿言其使無他當厚相報執者信焉不以為懼遂斬之此人至死不知也左右以為實謀逆者挫氣矣世説如稱諸葛孔明云吾心如稱不能為人作輕重刳心杜恕與宋權書曰吾年五十二不見廢棄頗亦遭明達君子亮其本心若不見亮使人刳心著地正數片肉相似耳何足有所明耶篤論如丹孫秀詐稱詔斬張華華曰臣先帝老臣中心如丹臣不愛死懼王室之難禍不可測也遂害之晉書君子心劉慶孫在太傅府干時人士多為所構唯庾子嵩縱心事外無迹可間後以其性儉家富説太傅令換千萬冀其有吝於此可乘太傅於衆坐中問庾庾時頽然已醉幘墮几上以頭就穿取徐答云下官家故可有兩娑千萬隨公所取於是乃服後有人向庾道此庾曰可謂以小人之慮度君子之心世説難測地顧和始為揚州從事月旦當朝未入頃停車州門外周侯詣丞相歷和車邊和覔蝨夷然不動周既過反還指顧心曰此中何所有顧搏蝨如故徐應曰此中最是難測地周侯既入語丞相曰卿州吏中有一令僕才上狗心符朗初過江王忱與兄國寶命駕詣之沙門法汰問朗曰是王吏部兄弟乎朗曰非一狗面人心又一人面狗心者是耶忱醜而才國寶美而狠故也秦書萬箭攢心梁沈約家藏書十二萬卷然心僻惡聞人一善如萬箭攢心如泥周興嗣為散騎常侍聰明多才思武帝出千言無章句令嗣次之因成千字文歸而兩目俱喪及死開視之心如掬操泥獨異志梁武教諸王書令殷鐵石於大王書中撮一千字不重者每字一片紙雜碎無敘武帝召興嗣謂曰卿有才思為我韻之興嗣一夕編次進上鬢髮皆白而賞錫甚厚劉賓客嘉話心神北齊文宣天保年御史李廣勤學博物夜夢見一人出于其身中謂廣曰君用心過苦非精神所堪今辭君去因而恍惚數日便遇疾積年而終廣古今五行記李廣博覽群書修史夜夢一人曰我心神也君役我太苦辭去俄而廣疾卒獨異志如面傳縡字宜事為文典麗性又敏速雖軍國大事下筆輒成未嘗起藁後為便佞所銜譖下獄陳后主遣使謂縡曰我欲赦卿卿能改過不縡對曰臣心如面臣面可改則臣心可改后主怒賜死獄中陳書二十四山嶽建成元吉將謀害太宗以書招尉遲敬德仍賜以金銀器物一車敬德辭之尋以啓聞太宗曰公之素心鬱如山嶽積金至斗知公情不可移送來但取寧須慮也若不然恐公身不安舊唐新書贈金皿一車萬事主張玄素為太子少詹事時承乾居春宮頗以遊畋廢學玄素上書諫曰騎射遊畋酣歌戲玩以悅耳目終穢心神漸染既久必移情性古人有言心為萬事主動而無節即亂臣恐殿下敗德之源在於此矣承乾並不能納上鐵石契苾何力討平高昌詔許覲省其母姑減夫人其部落皆願從薛延陀共執何力置可汗前何力箕踞而坐割左耳以明志不奪可汗怒欲殺之為其妻所抑而止初太宗聞何力之延陀明非其本意或曰人心各樂其土何力今入延陀猶魚之得水也太宗曰不然此人心如鐵石必不背我會有使自延陀至具言其狀太宗泣謂群臣曰契苾何力竟如何上鑿心尹知章少勤學嘗夢神人以大鑿開其心以藥內之自是日益開朗盡通諸經精義未幾而諸師友北面受業焉心疾韋綬李蟠俱以心疾廢蟠常疑遇毒鎖井而飲李益少而疑病心亦心疾也心靈府也為外物所中終身不全多心慮多疑惑病之本也國史補五臟王心為國主五臟王身有三百六十神心為主不出戶知天下不下堂知四方神以虛受心為棲神之宅故為五臟王赤城童子黃童黃庭真人一名赤城童子絳宮者赤城中童子所安之處一名紫房一名玉房一名洞房五臟六腑異神同歸總御絳宮上下相隨黃庭經九原心為九原真人太一處其中也一名明堂上火精心火之精也南方尊陽在上卑陰在下禮有尊卑故心象火色赤而鋭也人有道尊天本在上故心下鋭也耳為之候何耳能遍內外別音語火照有似於禮上下分明白虎通支主目為心視口為心談耳為心聽鼻為心嗅是其支體主也上管籥心有管籥須言而發人皆知滌其器而莫知洗其心傳子不朽無咸民食土死即埋之其心不朽百年復生去王關四萬六千里括地圖臟總腹厚也説文腹肚也增韻腹為五臟之總書正義空洞王丞相枕周伯仁膝指其腹曰卿此中何所有答曰此中空洞無物然容卿輩數百人世説蟬腹檀圭訴王僧虔求祿不得與僧虔書曰蟬腹龜腸為日已久飢彪能嚇人遽與肉餓驎不噬誰為落毛南史實腹徐之才造汝南周捨宅聽老子捨為設食乃戲之曰徐郎不用心思義而但事食乎之才答曰蓋聞聖人虛其心而實其腹捨嗟賞之孝綽云徐郎燕頷有班定遠之相北史李洛姬肚宗道暉好著高翅帽大屐州將初臨輒服以謁見仰頭舉肘拜於屐上冀州人為之語曰顯公鐘宋公鼓道暉屐李洛姬肚謂之四大顯公沙門也宋公安德太守也洛姬婦人也上垂膝安祿山腹垂過膝嘗自稱重三百斤上嘗戲指其腹曰此胡腹中何所有其大乃爾對曰更無餘物止有赤心耳通鑑腹負東坡聞子由瘦云十年京國厭肥羜日日糕花壓紅玉從來此腹負將軍今者固宜安脫粟俗云大將軍食飽捫腹而歎曰我不負汝左右曰將軍固不負此腹此腹負將軍未嘗少出智慮也志林或云是黨進木藏肝木臟也生於木魂所藏説文肝幹也五行屬木故其體狀有枝幹也凡物以木為幹也釋名肝仁五臟肝仁肝所以仁者何肝木之精也仁者好生東方者陽也萬物始生故肝象木色青而有枝葉目為之候樂動聲儀履肝武王伐紂紂鬥而死棄之玉門之外民之觀者皆進蹴之蹈其腹蹶其腎踐其肺履其肝周武王乃使人帷而守之民搴帷而入以石抵之者猶未止賈子納肝衛懿公有臣弘演有所干使翟人攻衛殺懿公盡食其肉獨捨其肝弘演至報使於肝呼天而啼盡哀而止曰臣請為襮因自殺先出其腹實録懿公之肝齊桓公聞之復立衛于楚丘呂覽傷肝息夫躬絶命辭曰涕泣流兮萑蘭心結愲兮傷肝漢書刳肝生食會稽太守謝琰拒孫恩恩帷下都督張猛於後斫馬琰墮地遂殺之高祖左里之捷生擒猛送琰小子混混刳肝生食之續晉陽秋全無心肝陳後主入隋文帝給賜甚厚數得引見班同三品後監守者奏言叔寶云既無秩位每預朝集願得一官號隋文帝曰叔寶全無心肝南史紀膽腑膽連肝之腑也説文膽者肝之腑肝者目之精主仁者不忍故以膽斷也是以仁者有勇故膽斷也肝膽異處何以知相為腑也肝者木精木之為言牧也人怒無不色青目脤張者是其效也白虎通六腑精膽部之宮六腑精膽胃大腸小腸膀胱三焦為六腑也太平經云精清成精故膽為六腑之精也黃庭經嘗膽吳既赦越越王勾踐反國乃苦身焦思置膽於坐坐臥即仰膽飲食亦嘗膽也曰女忘會稽之恥邪史記愁心苦志懸膽於戶出入嘗之不絶於口吳越春秋膽薄袁紹既并公孫瓚兼四州之地衆十餘萬諸將以為不可敵公曰紹志大而智小色厲而膽薄土地雖廣糧食豐適足以為吾奉也魏志膽過賁育袁紹在黎陽將南渡時程昱有七百兵守鄄成太祖使人告昱欲益二千兵昱不肯曰袁紹擁十萬衆自以所向無前今見昱兵少必不來攻太祖從之紹果不往太祖謂賈詡曰程昱之膽過於賁育上一身是膽趙雲字子龍先主入益州雲留守營曹公爭漢中地運米北山下數千萬囊黃忠以為可取雲兵隨忠取米過期不還雲將數十騎出圍視忠值曹公揚兵大出為前鋒所擊雲前突其陳且鬥且却公軍散已復合雲陷敵還入營更大開門偃旗息鼓公軍疑雲有伏兵引去雲雷鼓震天以戎弩於後射公軍公軍驚駭自相蹂踐墮漢水中死者甚多先主明旦自來至雲營圍視昨戰處曰子龍一身都是膽也軍中號雲為虎威將軍別傳如斗鐘會既搆鄧艾自稱益州牧以叛欲授薑維兵五萬人使為前驅魏將士憤發殺會及維志維死時見剖膽如斗大世語明膽呂子春者精義味道研核是非以為人有膽可無明有明便有膽嵇康謂明膽異用不能相生明以見事膽以決斷專明無膽雖見不斷專膽無明則違理失機明膽論膽破太學生會稽魏準以才學為融所賞既欲奉子良而準鼓成其事太學生虞義丘國賓竊相謂曰竟陵材弱王中書無斷敗在眼中矣及融誅詔準入舍人省誥問遂懼而死舉體皆青時人以準膽破南史如升侯景之為逆也東陽人李瞻起兵為賊所執遂詣建鄴景先出之市中斷其手足刻析心腹破出肝腸瞻正色整容言笑自若見其膽者乃如升焉上舉身悉膽王雅周文時從戰芒山時大軍未利諸將皆退雅獨拒之敵人見其無繼步騎競進雅左右奮擊斬九級敵衆稍退雅乃還周文歎曰王雅舉身悉是膽也北史膽決李標字雲傑弼弟也長不盈五尺性果決有膽氣為周文帝帳內都督從復弘農破沙苑𢷋時跨馬運矛衝堅陷陳隱身鞍甲之中敵人見之皆避此小兒不知𢷋之形貌正自如此周文嗟嘆之謂曰但問膽決如何何必要須八尺之軀也上兩府小腸大腸心肺腑也主禮義禮義有分理腸亦大小相承受也腸為心肺主心為皮體主故為兩腑白虎通爛腸殷洪遠云周旦腹中有三斗爛腸金樓子無他衛綰為中郎將郎官有譴常蒙其罪不與他將爭有功常讓他將上以為廉忠實無他腸史記九回司馬遷與任安書曰僕以口語遇遭此禍腸一日而九回居則忽忽若有所亡出則不知其所如往漢書憋腸董卓將兵擊韓遂詔徵卓為少府不肯就上書言所將湟中義從及秦胡兵牽挽臣車使不能制羌胡憋腸狗態臣禁不能止後漢寸腸高爽辨博多才孫挹為蘭陵縣爽詣之挹了無故人之懷爽出從閣下過取筆題鼓面云身有八尺圍腹無一寸腸面皮如許厚被打未遽央挹體肥壯腰帶十圍故以此激之談藪浣腸北有浣腸之國從口中引腸出而浣濯之更遞易其五臟浣畢嘯傲而飛焉捨遺記腸清欲得長生腸中清欲得不死腸無屎抱朴子五臟目者肝之使肝者木之精蒼龍之位也鼻者肺之使肺者金之精制割立斷耳者心之侯心者火之精上為張星陰者腎之寫腎者水之精上為虛危口者脾之門戶脾者土之精上為北斗主變化者也白虎通五性元帝時翼奉上封事曰五性不相害六情更興廢觀性以歷觀情以律漢書翼氏五性肝性靜行仁甲已主之心性躁躁行禮丙辛主之脾性力力行信戊癸主之肺性堅堅行義乙庚主之腎性智智行敬丁壬主之也五倉成帝末年頗好方術谷永説上曰世有仙人服食不終之藥化色五倉之術者皆姦人左道以欺罔世主漢書李奇曰思身中有五色腹中有五倉神五色存則不死五倉存則不飢上三尸夫人身並有三尸九蟲人之生也皆寄形於父母胞胎五榖精氣是以人腹中盡有尸蟲為之大害常以庚申日夜上告天帝記人罪過絶人生籍欲令速死魂升於蒼天魄入於黃泉唯有蟲尸獨在地上遊走曰鬼或四時八節三牲祭祀不精輒與人作禍害心痛痊忤伐人性命上尸名彭倨好寶物中尸名彭質好五味下尸名彭矯好色欲三尸之為物常居人脾上尸彭倨名青服中尸彭質名白服下尸彭矯名赤口此三尸狀如小兒或似馬形狀皆有鬚髮毛長三四寸人既死遂出作鬼耳如人生時形象衣服長短親人見之謂是亡人還家實非亡人靈也中山王匱經欲生則三尸生欲滅則三尸滅去尸成道之速者先外制聲色名利內平喜怒若怠荒不敬冒於寢寐貪於飲食尸乃千變萬化隨欲而歸令人世患日深多愚早亡制之法每至庚申日夕不眠以守之令不得訴天帝罪滿五百條其人必死三守庚申三尸振扶七庚申三尸長絶太玄鑊湯煮而死矣爾乃精神安定五臟恬和不復搔擾上清元始譜録上尸一名青姑一本作青石中尸一名白姑一本作白石下尸一名血尸一本作血姑玉匱經三彭者三尸之姓也常居人身中伺人之過欲令人死每以庚申日條列人罪目奏于上天學仙之士不去三尸無由得道徒苦無益也七籤三焦三焦者包絡府也水榖之道路氣之所終始也故上焦若竅中焦若編下焦若瀆白虎通言三焦者多矣而未的其實蓋心肝肺三臟之上係管之中為三焦故中黃經云肺首為三焦當指其所也又焦者熱也言肝心肺頭焦熱之義梁丘子黃庭經注肉核骨體之質也肉之核也説文御覽骨滑也骨堅而滑也釋名食苦益骨人有三百六十節當天之數形體有骨肉如地之厚有孔竅血脈如川谷也多食甘者有益於肉而骨不利多食苦者有益於骨而筋不利多食辛者有益於筋而氣不利意林葬稿文王晝臥夢人登城而呼已曰我東北陬之稿骨也速以王禮葬我文王曰諾覺召吏視之信有焉文王曰速以人君葬之吏曰此無主矣請以五大夫文王曰吾夢中已許之矣奈何其倍之也士民聞之曰我君不以夢之故不倍稿骨況於生人乎於是下信其上賈子文王之葬枯骨無益衆庶衆庶悅之恩義動人也新序無骨徐偃王有筋而無骨尸子骨朽孔子適周將問禮於老子老子曰子所言者其人與骨皆已朽矣獨其言在耳史記骨騰孔鮒謂陳王曰梁人有揚由者伎巧過人骨騰肉飛孔叢子指骨戚姬以百鍊金為彄環照皆指骨上惡之以賜侍兒鳴玉耀光等各四枚西京雜記葬骨陳寵字昭公為廣漢太守先是雒縣城南每陰雨常有鬼哭聲寵使吏案行還言昔歲倉卒時骸骨不葬者多寵乃勑縣葬於田是即絶東觀漢記骨青蔣子文漢末為廣陵尉自謂骨青死當為神列異傳似無骨司徒蔡謨親人有王蒙者單獨常為蔡公所收養蒙長才五尺似為無骨登床輒令抱上續搜神記奇骨桓溫字元子彝之子也生未期而太原溫嶠見之曰此兒有奇骨可試使啼及聞其聲曰真英物也彝以嶠所賞故遂名之曰溫嶠笑曰果爾後將易吾姓也晉書正骨王右軍目陳玄伯壘塊有正骨世説骨幹蔡叔子云韓康伯雖無骨幹然亦膚立上舊目韓康伯將肘無風骨上范啓云韓康伯似肉鴨説林顙骨益大呂僧珍勸武帝攻郢州一夜僧珍忽頭痛壯熱及明而顙骨益大其骨法蓋有異焉南史紅潤梁昭明太子脛骨微紅潤澤異常尚書故實鋸骨自若長孫子彥少常墜馬折臂肘上骨起寸餘乃命開肉鋸骨流血數升言戲自若時以為踰於關羽北史羽為流矢貫左臂後瘡雖愈每陰雨即痛醫曰矢鏃之毒入骨宜伸臂令醫鑿之臂血流離肉割炙飲酒自若蜀志鑿頰骨高開道作亂幽州矢陷其頰召醫使出之對以鏃深不可出則俾斬之又召一人如前對則又斬之又召一人如前曰可出然王須忍痛因鈹面鑿骨置揳於其間骨裂開寸餘抽出箭鏃開道奏伎進膳不輟隋唐嘉話威骨唐貞觀中侯君集與庶人承乾通謀意不自安忽夢二甲士録至一處見一人高冠奮髯叱左右取君集威骨來俄有數人操屠刀開其腦上及右臂間各取一骨片狀如魚尾因啽囈而覺腦臂猶痛自是心悸力耗至不能引一鈞弓欲自首不決而敗酉陽鎖子李泌在表兄鄭叔則家已絶粒多歲身輕能行屏風上引指使氣吹燭可滅每導引骨節皆珊然有聲時人謂之鎖子骨鄴侯外傳鑿髀骨萇從籍嘗中流矢鏃入髀骨命工取之工無良藥欲鑿其骨人皆以為不可從簡遽使鑿之工遲疑不忍下從簡叱其亟鑿左右視者皆若不勝其毒而從簡言笑自若五代史古骨長大蔡京崇寧末以使相就第賜第閶闔門外俗號梁門者修築之際往往得唐人舊冢志文皆云葬城西二里大梁實唐宣武節度梁門外知已為墓田矣蓋多得婦人脛骨率長於今時長大男子幾寸焉或謂嘗親陜晉間古長平為秦白起坑趙卒處白骨尚存其脛長大異隋唐時也知今人寖短小釋氏之語或不妄鐵圍山叢談骨化沐胥國術人名尸羅常坐日中漸漸覺其形小或化為老人或為嬰兒倏忽而死臭爛盈屋人有除燒其骸骨於糞土之中復還為人矣拾遺記焚骨頓遜國人死鳥葬或火葬鳥葬者病因便歌舞送郊外有鳥如鵝緑色飛來萬許啄食都盡斂骨焚之沈於海水此必生天上鳥若不食自悲傷乃就火葬取骨埋之扶南傳漂杵炎帝黃帝異母兄弟各有天下之半戰於涿鹿之野血流漂杵賈子血腥禹洪水殺相其血腥臭不可生五榖以其地為臺相一名相仰山經如江龍門之下血如江春秋考異郵龍門戰在魯桓十三年宋均注輪殷齊晉將戰郤傷於矢流血及屨未絶鼓音曰余病矣郤至曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之成二化碧萇弘死於蜀藏其血三年而化為碧莊外物呂覽化為碧玉泣盡繼血下蔡威公閉門而哭三日三夜泣盡而繼以血旁鄰窺牆而問之曰哭何悲也曰吾國且亡吾數諫吾君吾君不用故知其將亡也於是窺牆者舉家而去之楚居數年楚果伐蔡窺牆者為司馬見威公縳在膚中乃言之於楚王遂解其縳與俱之楚故曰能言者未必能行能行者未必能言説苑權謀衣出血豫讓為知伯報仇欲刺襄子伏于橋下為襄子所得使兵環之讓願請其衣而擊之襄子義之脫附身之衣以與之讓拔劍三躍呼天擊之衣盡出血曰而可以報知伯矣遂伏劍而死襄子回車車輪未周而亡戰國策史索隱試人血燕太子丹豫求天下之名利匕首得趙人徐夫人匕首取之百金使工以樂淬之以試人血濡縷無不立死者春秋後語草色殷赤未央殿東北二里許鐘樓故處也有隙地丈餘草色皆殷赤相傳呂后殺韓淮陰血漬而然地志逆流于公辨東海孝婦之冤而天大雨長老相傳云孝婦名周青青將死車載十丈竹竿以懸五幡立誓於衆曰青若有罪願煞血當順下青若枉死血當逆流既行刑已其血青黃緣幡竹而上極標又緣幡而下云爾搜神擲吏流血逢萌隱琅琊勞山非禮不動聚落化之北海太守遣吏奉謁萌不諾太守遣吏捕之民相率以石擲吏皆流血奔走東觀記嵇侍中血元康元年河間成都二王舉兵向南都朝廷北計會稽紹為侍中王旅不振敗績於湯陰百官侍衛莫不潰散唯紹以身捍寇兵突御輦飛矢雨集紹遂被害於帝側血濺御服及定左右欲浣衣帝曰此嵇侍山血勿去晉書上柱下流建興中丞相府斬督運令史淳于伯刑血著柱遂逆上終極柱末二丈三尺旋復下流四尺五寸百姓喧譁士女縱觀咸白其冤伯息忠訴辭稱枉上無血石虎時安定人侯子光自稱佛太子易姓名為李子楊遊于縣聚衆杜南山稱大黃帝建元曰龍興鎮西石廣斬之頸無血十餘日面色無異于生載記流臂馮跋宴群僚忽有血流其左臂跋惡之從事中郎王垂因陳符命之應跋戒其勿言北燕録血湧湔籬陳顯達為官軍所敗趙潭注矟刺落馬斬之於籬側血湧湔籬似淳于伯之被刑也是冬連大雪梟百於朱雀而有不集之齊書七懷血吳明徹殺王琳有一叟以酒脯來至號酻盡哀收其血懷之而去陳書血迹不滅武平中有血點地自咸陽王斛律明月宅而至于太廟及見殺血流于地剗之迹給不滅北史白飲變血陳後主嘗進白飲忽變為血又有血霑殿階瀝瀝然至御榻俄而國亡口鼻流血王君廓鎮幽州會突厥入寇君廓邀擊破之高祖大悅徵入朝賜以御馬令於殿庭乘之而出因謂侍臣曰吾聞藺相如叱秦皇目眥出血君廓往擊竇建德將出戰李績遏之君廓發憤大呼目口鼻耳一時流血此之壯氣何謝古人不可以常例賞之復賜錦袍金帶唐書舐面顏真卿盧杞專權忌之數遣人問方鎮所便將出之真卿往見杞辭曰相公先中丞傳首至平原面上血真卿不敢衣拭以舌舐之相公忍不相容乎杞矍然下拜而含怒心上化磷鬭戰死亡之處其人馬血積年化為磷磷著地及草木如露略不可見行人或有觸者著人體便有光拂拭便分散無數愈甚有細吒聲如炒豆唯靜住良久乃滅後其人忽忽如失魂經日乃差博物志僧傳贊定博物王儞徐鉉嘗就焉柳開守維陽後圃遇陰雨即青焰夕起觸近則散曰此磷火兵戰血或牛馬血著土則凝結為此氣柳掘之皆斷鎗折劍乃古戰地也因贈詩云空門今日見張華湘山野録髑髏頂也説文顙顱謂之髑髏廣雅髐然莊子之楚見空髑髏髐然有形檄以馬捶因而問之曰夫子貪生失理而為此乎將子有亡國之事斧鉞之誅而為此乎將子有不善之行愧遺父母妻子之醜而為此乎將子有凍餒之患而為此乎將子之春秋故及此乎於是語卒援髑髏枕而臥夜半髑髏見夢曰子之談者似辨士諸子所言皆生人之纍也死則無此矣子欲聞死之説乎莊子曰然髑髏曰死無君於上無臣於下亦無四時之事從然以天地為春秋雖南面王不能過也莊子不信曰吾使司命復生子形為子骨肉肌膚反子父母妻子閭里知識子欲之乎髑髏深矉蹙曰吾安能棄南面王樂而復為人間之勞乎莊至樂極大長沙浦圻縣有呂蒙冢中有髑髏極大蒙形既長偉疑即蒙髑髏也荊州記碎火永嘉五年高榮為高平戌邏主時曹疑賊寇離亂人民皆塢壘自固山中火起飛埃絶爛十有餘丈樹巔夕焱響動山谷又聞人馬鎧甲聲謂嶷賊上人皆怕懼並嚴出欲繫之引騎到山下無有人但見碎火來灑人袍鎧馬毛鬣皆燒於是軍人走還明往視山中無然火處唯有髑髏百頭布散山中續搜神記共冢盧循襲廣州風大夜發奔逸者數十而已循除燒骨數得髑髏三萬餘于江南洲上作大坑葬之今名為共冢廣州記赤丁子洛陽牟穎郊外葬一枯骸夢人來謝云我本強寇為同輩見害感公掩藏故來謝君若能容我棲託每夜祭我我當應君指使及覺試禮之夜又夢鬼曰我已託君矣君每欲使我即呼赤丁子一聲輕言其事我必應聲而至也穎遂每潛告令盜人財物無不應聲遂祀穎見鄰婦美色乃呼赤丁子令竊焉鄰婦夜半踰垣而至穎遂攜之而逃瀟湘録謹事致富呂與叔長安人話長安有安氏者家藏唐明皇髑髏作紫金色其家事之甚謹因爾家富達有數子得官遂為盛族後其家析居爭髑髏遂斧為數片人分一片而去張丈潛謂之曰明皇生死為姓安人極合坐大笑明道雜志飲酒烏滸人得髑髏破之以飲酒南州異物志天氣地氣天氣為魂地氣為魄淮南傳迫魂魄者何謂也魂猶傳傳行不休也少陽之氣故動不息於外也魄者猶迫迫著於人也此少陰之氣象金石著人不移也魂者藝也情以除穢魄者迫也往以治內精神者何謂也精者靜也太陰拖化之氣也象水之化須待任生也神者恍惚太陰之氣出入無間白虎通魄白也魂藝也白明白也藝藝動也形有體質取明白為名氣唯噓吸取藝動為義孝經説幽冥魄問於魂曰道何以為體曰以無有為體魄曰無有有形乎魂曰無有魄曰無有何得而聞也魂曰吾直有所遇之耳視之無形聽之無聲謂之幽冥幽冥者所以喻道而非道也魄曰言者獨何為者吾將反吾宗矣魄反顧魂忽然不見反而自存亦以淪於無形矣淮南神明子産適晉趙景子問焉曰伯有猶能為鬼乎子産曰能人生始化曰魄既生魄陽曰魂用物精多則魂魄強是以有精爽至於神明匹夫匹婦強死其魂魄猶能馮依於人以為淫厲況良宵乎左昭七精爽魯叔孫昭子聘于宋宋元公與之宴飲酒樂宋公使昭子古坐語相泣也樂祁佐退而告人曰今茲君與叔孫其皆死乎吾聞之哀樂而樂哀皆喪心也心之精爽是謂魂魄魂魄去之何以能久二十四招魂招魂者宋玉之所作也魂者身之精也宋玉憐哀屈原厥命將落作招魂欲以復其精神延其年壽也楚辭思沛高祖謂沛父老曰遊子悲故鄉吾雖都關中萬歲之後吾魂魄猶樂思沛也史記埋神東海王越妃裴痛越棺柩被焚乃招魂葬越於丹徒中宗以為非禮也下詔曰夫冢以藏形廟以安神令世招魂葬者是埋神也其禁之晉中興書魂守宋南平王鑠元凶弒立以鑠為侍中後歸孝武最晚常懷憂懼每于眠中蹶起坐與人語亦多謬僻語家人云我自覺無復魂守南史拘録人有賢愚皆知已身之有魂魄魄分去則人病盡去則人死故分去則術家有拘録之法盡去則禮典有招呼之義此之為物至近者也然與人俱生至乎終身莫或有自聞見之者也豈可遂以不聞見之又云無之乎抱朴論仙得失越王問於范子曰寡人聞人失其魂魄者死得其魂魄者生物皆有之人亦有之范子曰人有之萬物亦然天地之間人為貴物之生榖為貴以生人與魂魄無異也越絶書自見師言欲求長生勤服大藥欲得通神當金水分形形分則自見其身中之三魂七魄而天靈地祇皆可接見山川之神皆可使役也地真三魂人有三魂一曰爽靈二曰胎光三曰幽精常呼念其名則魂安人身也太微靈書胎光延生爽靈益祿幽精絶死七籤七魄第一魄名尸狗二名伏矢三名雀陰四名吞賊五名非毒六名除穢七名臭肺此七魄之名身中之濁鬼也上九逝惟郢路之遼遠兮魂一夕而九逝楚抽思魄兆惠公改葬共世子臭達于外國人誦之曰貞之無報也歲之二七其每有微兮若翟公子吾是之依兮郭偃曰公子重耳其入乎其魄兆于民矣魄形也晉語愧影君子猶內不負心外不愧影上不欺天下不食言抱朴九影道士郭采真言人影數至九假成式常試之至六七而已外亂莫能辨郭言漸益炬則可別又訉九影各有名影神一名右皇二名魍魎三名泄節樞四名尺鳧五名索隱六名魄奴七名竈𡆩𡆩八名亥靈胎九魚全食不辨酉陽畏影漁父謂孔子曰人有畏影惡迹而去之走者舉足愈數而迹愈多走愈疾而影不離身自以為尚遲疾走不休絶力而死不知處陰以休影處靜以息迹愚亦甚矣莊漁父真人無影陳留有富翁年九十取田舍女為妾一交接而死後生男大女謂其母曰我父年尊無父人道一宿斯須何因有子汝小家淫泆反欲惡我種類乎爭財數年州郡不決丞相丙吉思惟良久言曾聞真人無影老翁子亦無影又不奈寒可共試之時八月取同年小兒俱解裸之此兒獨啼言寒又並日中行後獨無影遂以財與之風俗通九十七生荊州上津鄉人張元始年一百一十六歲族力過人進食不異至年九十七方生兒兒遂無影將亡人人告別少日而終時人以為知命湘東王愛奇重異遂留其枕南史梁武帝身映日無影曹日中郴州古桂陽郡也有曹泰年八十五偶少妻生子名曰曹日中以日中無影為名焉年七十方卒親見其孫子道士具説曹體無影即其從孫姪亦公的不虛故知邴吉驗影不虛也僉載相影寶曆中有玉山人取人本命日五更張燈相人影知休咎言人影欲深深則貴而壽影不欲照冰照井及浴盆中古人避影亦為此古蠼螋短狐踏影蠱皆中人影為害近有人善炙人影治病者上弄影稚子弄影不知為影所弄狂夫侮像不知為像所侮醉者負醉疥者療疥其勢彌顛其病彌篤而無反者也談子化書寐覺夢寐而覺者也夢之言蒙也不明之貌臥安則夢多也説文三夢大卜掌三夢之法一曰致夢二曰觭夢三曰咸陟夢者人之精神所寤可占者也致夢言夢之所至夏后氏作焉咸皆也陟之言得也周人作焉觭讀如戎掎之掎掎亦得也亦言夢之所得殷人作焉周禮發夢黃帝曰願聞淫邪泮衍奈何岐伯曰正邪從外襲內而未有定舍反淫于藏不得定處與營衛俱行而與魂魄飛揚使人臥不得安而喜夢氣淫于府則有餘于外不足于內氣淫于藏則有餘于內不足于外黃帝曰有餘不足有形乎岐伯曰陰氣盛則夢涉大水而恐懼陽氣盛則夢大火而燔炳陰陽俱盛則夢相殺上盛則夢飛下盛則夢墮甚飢則夢取甚飽則夢豫肝氣盛則夢怒肺氣盛則夢恐懼哭泣飛揚心氣盛則夢善笑恐畏脾氣盛則夢歌樂身體重不舉腎氣盛則夢腰脊兩解不屬凡此十二盛者至而寫之立已厥氣客于心則夢見丘山煙火客于肺則夢飛揚見金鐵之奇物客于肝則夢山林樹木客于脾則夢丘陵大澤壞屋風雨客于腎則夢臨淵沒居水中客于膀胱則夢遊行客于胃則夢飲食客于大腸則夢田野客于小腸則夢聚邑衝衢客于膽則夢鬭訟自刳客于陰器則夢接內客于項則夢斬首客于脛則夢行走而不能前及居深地窖范中客于股肱則夢禮節拜起客于胞䐈則夢溲凡此十五不足者至而補之立已也靈樞經神交覺有八徵夢有六候奚謂六候一曰正夢二曰蘁夢三曰思夢四曰寤夢五曰喜夢六曰懼夢此六者神所交也一體之盈虛消息皆通於天地應於物類是以浮虛為疾者則夢揚以沈實為疾者則夢溺藉帶而寢則夢蛇飛鳥斷髮則夢飛將陰夢火將疾夢食飲酒者憂歌儛者哭故神遇為夢形接為事古之真人其覺自忘其寢不夢列子五旬一覺西極之南隅有國焉不知境界之所接名古莽之國陰陽之氣所不交故寒暑亡辨日月之光所不照故晝夜無辨其民不食不衣而多眠五旬一覺以夢中所為者實覺之所見者妄上陽氣之精夢者陽氣之精也心所喜怒則精氣從之莊子夢飲酒者旦而哭泣夢哭泣者旦而田獵方其夢也不知其夢也夢之中又占其夢焉覺而後知其夢也且有大覺而後知此其大夢也而愚者自以為覺竊竊然知之君乎牧乎固哉上夢列凡夢有直有象有精有想有人有感有時有反有病有性在昔武王邑薑方震太叔夢帝謂已命爾子虞而與之唐及生手掌文曰虞因以為名成王滅唐遂以封之此謂直應之夢也詩云惟熊惟羆男子之祥惟虺惟蛇女子之祥衆惟魚矣實惟豐年旐惟旟矣室家蓁蓁此謂象之夢也孔子生於亂世日思周公之德夜即夢之此謂誠精之夢也人有所思即夢其到有憂即夢其事此謂記想之夢也今事貴人夢之即為祥賤人夢之即為妖君子夢之即為榮小人夢之即為辱此謂人位之夢也晉文公於城濮之戰夢楚子伏己而監其腦是大惡也及戰乃大勝此謂極反之夢也陰雨之夢使人厭迷陽旱之夢使人亂離大寒之夢使人怨悲大風之夢使人飄翔此謂感氣之夢也春夢發生夏夢高明秋冬夢熟藏此謂應時之夢也陰病夢寒陽病夢熟內病夢亂外病夢發百病之夢或散或集此謂氣之夢也人之情心好惡不同或以此吉或以此凶當各自蔡常吾所從此謂性情之夢也故先有差忒者謂之精畫有所思夜夢其事乍吉乍善乍惡不信者謂之想貴賤賢愚男女長少謂之人風雨寒暑謂之感五行王相謂之時陰極即吉陽極即凶謂之反觀其所疾察其所夢謂之病心精好惡於事驗謂之性凡此十者占夢之大略也而決吉凶者多失其類豈人覺為陽人寐為陰陰陽之務相反故邪潛夫論夢像夢者像也精氣動也魂魄離身神來往也陰陽感成吉凶驗也夢者語其人預見過失如其賢者知其自改革也夢者告也告其形也目無所見耳無所聞鼻不喘嗅口不言也魂出遊身獨在心所思念忘身也受天神戒還告人也受戒不精忘神言也名之為寤告符臻也古有夢官世相傳也夢書四法什民以四法判夢一曰無明薰習二曰舊識巡遊三曰四大偏增四曰善惡先兆遊華胥黃帝十有五年晝夢遊於華胥氏之國其國在弇州之西台州之北不知距齊國幾千萬里蓋非舟車足力之所及其國無帥長民無嗜欲不知樂生不知惡死故無夭殤不知親已也知疏物故無愛憎不知背逆不知向順故無利害帝悟然自得召輔相而告之曰朕思有以養身治物之道弗獲其術疲而睡所夢若此今知至道不可以情求矣朕知之矣朕得之矣又二十有八年天下大治幾若華胥氏之國列子母子堯為天子夢白帝遺吾烏啄子其母為扶始升丘睹曰帝上有雲虎感已生皋陶堯聘索狀如問之如堯言徵與語明於刑法元命包乘龍昔聖帝明王之時神氣照然先見故堯夢乘龍上太山舜夢擊天鼓禹夢其手長湯夢布令天下後皆有天下桀夢疾風壞其宮紂夢大雷擊其手齊桓夢為大禽所中秦二世夢虎齧其馬王者夢之皆失天下夢書眉長舜耕於歷夢眉長與髮等宋志感夢長眉明仄陋溫子升舜廟碑洗河舜夢自洗於河以手取水飲之宋志夢宰湯思賢夢見有人負鼎抗俎對已而笑寤而占曰鼎為和味俎者割截天下豈有人為吾宰者哉初力牧之後曰伊摯耕於有薪之野湯聞以幣聘有莘之君留而不進湯乃求婚於有莘之君遂嫁女於湯以摯為勝臣至亳乃負鼎抱俎見湯也帝王世記偶中夢攀日月覺而不上天庭夢入九泉寤而不及地下高宗得説偶中耳傳子同夢文王夢天帝服玄禳以立于令狐之津帝曰昌湯汝望文王再拜稽首太公於後亦再拜稽首文王夢之之夜太公夢之亦然其後文王見太公而訊之曰而名為望乎答曰唯為望文王曰吾如有所於見汝太公言其年月與其日且盡道其言臣此以得見也文王曰有之有之遂與之歸以為卿竹書夢先王文王微服而觀於臧見一丈夫釣而其釣莫釣文王欲舉而授之政而恐大臣父兄之弗安也欲終而釋之而不忍百姓之無天也於是旦而屬之大夫曰昔者寡人夢見良人黑色而髯乘駁馬而偏朱蹄號曰寓而政於臧丈人庶幾乎民有瘳乎諸大夫爇然曰先君王也文王遂迎臧丈人而授之政莊子為君為僕周之尹氏大治産其下趣役者侵晨昏而弗思有老役夫筋力竭矣而使之彌勤書則呻呼而即事夜則昏憊而熟寐精神荒散昔昔夢為國君居人民之上總一國之事遊燕宮觀恣意所欲其樂無比覺則復役人有慰喻其勤者役夫曰人生百年晝夜各分吾晝為僕虜苦則苦矣夜為人君其樂無比何所怨哉尹氏心營世事慮鍾家業心形俱疲夜亦昏憊而寐昔昔夢為人僕趨走作役無不為也數罵杖撻無不至也眠中啽囈呻呼徹旦息焉尹氏病之以訪其友友曰若位足榮身資財有餘勝人遠矣夜夢為僕苦逸之復數之常也若欲覺夢兼之豈可得耶尹氏聞其言言寬其役夫之程減已思慮之事疾並少間列子夢摶晉侯夢與楚子摶楚子伏已而盬其腦是以懼子犯曰吉我得天楚伏犯罪吾且柔之矣僖二十八河神初楚子玉自為瓊辨玉纓未之服也先戰夢河神謂已曰畀余余賜女孟諸之麋弗致也榮季曰死而利國猶或為之況瓊玉乎是糞土也而可以濟師將何愛焉弗聽出告二子曰非神敗令尹令尹其不勤民實自敗也既敗晉侯聞之而後喜可知也上涉洹初聲伯夢涉洹或與已瓊瑰食之泣而為瓊瑰盈具懷從而歌之曰濟洹之水贈我以瓊瑰歸乎歸乎瓊瑰盈吾懷乎懼不敢占也還自鄭壬申至于貍脤而占之曰余恐死故不敢占也今衆繁而從余三年矣無傷也言之莫而卒成十七夢鬭不勝景公病水臥十數日夜夢與二日鬭不勝晏子朝公曰夕者夢與二日鬭而寡人不勝我其死乎晏子對曰請召占夢者出於閨使人以車迎占夢者至晏子以公夢告之曰公所病者陰也日者陽也一陰不勝二陽故病將已以是對占夢者入對公如晏子之言居三日公病大愈公且賜占夢者占夢者曰此非臣之力晏子教臣也公召晏子且賜之晏子曰占夢以占之言對故有益也使臣言之則不驗矣此占夢之力也臣無功焉公兩賜之曰以晏子不奪人之功以占夢者不蔽人之能晏子夢先君孔子窮乎陳蔡之間藜羹不斟七日不嘗粒晝寢顏回索米得而爨之幾熟孔子望見顏回攫其甑中而食之選間食熟謁孔子而進食孔子佯為不見之孔子起曰今者夢見先君食潔而後饋顏回對曰不可嚮者煤室入甑中棄食不祥回攫而飯之孔子歎曰所信者目也而目猶不可信所恃者心也而心猶不足恃弟子記之知人固不易矣任數家語云子貢見之以問孔子夢覺顏回問仲尼曰孟孫才其母死哭泣無涕中心不戚居喪不哀無是三者以善喪蓋魯國固有無其實而得其名者乎回一怪之仲尼曰孟孫氏不知所以生不知所以死不知就先不知就後吾特與汝其夢未始覺者邪且彼有駭形而無損心有旦宅而無情死且汝夢為鳥而厲乎天夢為魚而沒於淵不識今之言者其覺者乎其夢者乎莊子上天趙簡子夢上天見一男子在帝之側後出見人當道則前所夢見在帝側者也論之以為趙國且昌之狀也論衡自然簡子所見帝非實帝也以夢占知之樓臺山陵官位之象也人夢上樓臺升山陵輒得官位實樓臺山陵非官位也則知簡子所夢見帝者非天帝也上紀妖高唐楚王與宋玉遊於雲夢之野將使宋玉賦高唐之事望朝雲之館上有雲氣崒乎直上忽而改容須臾之間變化無窮王問宋玉曰此何氣也對曰昔者先王遊於高唐怠而畫寐夢一婦人曖乎若雲煥乎若星將行未至如浮如停詳而視之西施之形王悅而問焉我帝之季女也名曰瑤姬未行而亡封巫山之臺精魂依草實為莖芝媚而服焉則與夢期所謂巫山之女高唐之姬聞君遊於高唐願荐枕席王因而幸之襄陽耆舊記推上天文帝嘗夢欲上天不能有一黃頭郎推上天顧見其衣尻帶後穿覺而之漸臺以夢中陰目求黃頭郎見鄧通其衣後穿夢中所見也召問其名姓姓鄧名通鄧猶登也文帝甚説尊幸之日日異漢書蛟龍董仲舒夢蛟龍入懷乃作春秋繁露詞西京雜記獻賦相如將獻賦未知所為夢一黃衣翁謂之曰可為大人賦遂作大人賦言神仙之事以獻之賜錦四匹上祖譴韋玄成為丞相言孝文太后寢祠園宜如禮勿復修奏可後歲餘上寢疾夢祖宗譴罷郡國廟上少弟楚孝王亦夢焉上召問匡衡議欲復之衡深言不可後上疾連年遂盡復諸所罷寢廟園皆修祀如故上五臟出地楊子雲成帝時上幸甘泉宮召使作賦子雲為之卒暴倦臥夢其五臟出在地以手收內及覺太少氣病一歲卒桓談新論乘龍上天諸將皆勸光武即位乃召馮異上曰我昨夜夢乘赤龍上天覺悟心中動悸異因下席拜賀曰此天命發於精神也異遂與諸將定議上尊號東觀漢記夢殿得禾蔡茂初在廣漢夢坐太極殿上有三穗禾茂跳取之得其中穗輒復失之以問郭賀賀離席慶曰大殿者宮府之形象也極而有禾人臣之上祿也取其中穗是中台之位也於字禾失為秩雖曰失之乃所以得秩也旬月而茂徵焉乃辟賀為掾後漢陰堂周磐字堅伯歲朝會集諸生講論終日因令其二子曰吾日者夢見先師東里先生與我講於陰堂之奧既而長歎豈吾齒之盡乎其月望日無病忽終上歲在鄭玄夢孔子告之曰起起今年歲在辰來年歲在已既寤以讖合之知命當終有頃寢疾而卒上北齊劉晝高才不遇傳論玄曰辰為龍巳為蛇歲至龍蛇賢人嗟天帝賜錢有周掔嘖者貧而好道夫婦夜耕困臥夢天公過而哀之勑外有以給與司命案録籍云此人相貧限不過此惟有張車子應賜錢千萬車子未生請以借之天公曰善曙覺言之於是夫妻戮力晝夜治生所為輒得資至千萬先時有張姬者常往掔嘖家傭賃野合有身滿月當孕便遣出外駐車屋下産得兒主人往視哀其孤寒作糜粥食之問當名汝兒作何姬曰今在車下而生夢天告之名為車子掔嘖乃悟曰吾昔夢從天換錢外白以張車子錢貨我必是子也財當歸之矣自是銀錢衰減車子長大富於周家搜神記牛頭蔣琬見推之後夜夢有一牛頭在門前流血滂沱意甚惡之呼問占夢趙直直曰夫見血者事分明也牛角及鼻公字之象君位必當至公大吉之徵也蜀志山上流水鄧艾當伐蜀夢在山上而有流水以問殄虜護軍爰邵邵曰按易卦山上有水蹇蹇繇曰蹇利西南不利東北孔子曰蹇利西南往有功也不利東北其道窮也往必克蜀殆不還乎艾憮然不樂魏志三夢不同嘗有問周宣曰吾昨夜夢見芻狗其占何也宣答曰君欲得美食耳有頃出行果遇豐膳後又問宣曰昨夜復夢見芻狗何也宣曰君欲墮車折腳宜戒慎之頃之果如宣言後又問宣昨夜復夢見芻狗何也宣曰君家欲失火當善護之俄遂火起語宣曰前後三時皆不夢也聊試君耳何以皆驗邪宣對曰此神靈動君使言故與真夢無異也又問宣曰三夢芻狗而其占不同何也宣曰芻狗者祭神之物故君始夢當得飲食也祭祀既訖則芻狗為車所轢故中夢當墮車折腳也芻狗既車轢之後必載以為樵故後夢憂失火也上吞爻虞翻注易奏上曰臣郡吏陳桃夢臣與道士相遇放髮披鹿裘布易六爻燒其三以飲臣臣乞盡吞之道士言易道在天三爻足矣豈臣受命應當知經別傳夢食筋吳興錢乘孫權時曾晝臥久不覺兩吻沫出者數升其母怖而呼之曰適見一老公食以熇筋恨未盡而呼之乘本尫瘠既爾之後遂以力聞官至無難監幽明録陶法通夢人遺三驢馱筋啖一馱母呼覺同角力記與衫吳選曹令史長沙劉卓得病夢人以白越單衫與之語曰汝著此衫汗即火燒便潔也覺果有衫在側後汗便火燒之列異傳三馬一槽魏武帝猜忌晉宣帝子非曹氏純臣又嘗夢三匹馬在一槽中共食意猶憎之因召文明二帝告以所見並云防理自多無為橫慮帝然之後果害族移器悉如夢焉幽明録曹人之夢皇甫謐以九年冬夢至京師自廟出見車騎甚衆以物呈廟云誅大將軍曹爽寤以告梁柳柳答曰君欲作曹人之夢乎朝無公孫強如何謐曰爽無叔振鐸之請茍失天機則離已何恃於強玄晏春秋黑幔繞車惠帝時陸機為長沙王乂征河東王果夜夢黑幕繞車機擘出不得明旦被殺晉書想因衛玠總角時問樂令夢樂云是想衛曰形神所不接而夢豈是想邪樂云因也未嘗夢乘車入鼠穴搗噉鐵杵皆無想無因故也衛思因經日不得遂成病樂聞故命駕為剖析之衛即小差樂歎曰此兒胸中當必無膏盲之疾世説車傍斤楊雄為舂陽令舉兵拒王敦城陷為敦所擒初雄被執之日其夜夢乘車挂肉其旁占曰夫肉必有筋力也車傍於斤吾其戮乎尋為王敦所害晉書葵生城苻堅將欲南師也夢葵生城曰明以問婦婦曰若征軍遠行出難為將也堅又夢地東南傾復以問云江右不可平也君無南行必敗之應也堅不從卒敗異苑孔墓苻堅之遣慕容垂侍中權翼諫不聽於是翼乃夜私遣壯士要路而擊之垂是夜夢行路路窮顧見孔子墓傍墓有八覺而心惡之召占夢者占之曰行路窮道盡也不可行孔子名丘以八配丘此兵字路必有伏兵深宜慎之於是垂遂別路而進翼伏兵遂不擒之續晉陽秋王導夢人欲以百萬錢買大兒長豫悅導甚惡之潛為祈禱者備矣後作屋忽掘得一窖錢料之百萬億大不歡一皆藏閉俄而長豫卒幽明録履迹劉曜末年夢三人金面丹脣東向逡巡不言而退曜拜履其迹太史令任義曰三者歷運之極東為震王者之始次也今為兌物衰落也脣丹不言事之畢也逡巡揖讓舍之道也為之拜者屈伏為人履迹而行慎不出強兵必大起後三年曜為石勒所擒前趙録神告簡文見讖云晉氏祚盡昌明及孝武之在孕也李太后夢神人謂之曰汝生男以昌明為字及生東方始明因以名焉簡文後悟為之流涕晉書司馬與鎧陶侃為廣州夢有司馬與侃鎧者長史陳協以為司馬者國姓也鎧者扞禦之器節下當進位泰興二年侃加平南將軍王隱晉書白雞謝安石當桓溫之世恆懼不全夜夢乘桓輿行十大里見白雞而止不得復前莫有解此夢及溫亡後果代居宰相歷十六年而得疾安方悟云十六里者十六年見雞住者今太歲在酉吾病殆將不起少日而卒幽明録拔目中刺陳留周氏婢名與入山取樵忽夢見一女子曰吾目中有刺煩為拔之當有厚報此婢乃見朽棺髑髏草生眼中便為拔草即於某處得一雙金指環述異記棺糞或問殷浩曰將蒞官而夢棺將得財而夢糞何也浩曰官本臭腐故將得官而夢尸錢本糞土故將得錢而夢穢時人以為名言晉書索充初夢天上有二棺落充前索紞曰棺者職也當有京師貴人舉君二棺者頻再遷俄而司徒王戎書屬太守使舉充太守先署充功曹而舉孝廉晉傳夢妻咸和初徐精遠行夢與妻寢有身明年歸妻果産後如其言矣幽明録吞土劉敬宣素曉天文知晉室當復在齊夢丸土吞之而於夢中問占者答曰此服土吞也既覺喜曰丸者桓也桓為吞矣我當復本土旬日中間玄敗遂得歸晉安帝紀白龍夾舫劉穆之嘗夢與高祖俱泛海忽值大風驚懼俯視船下見有二白龍夾舫既而至一山峰崿聳秀林樹繁密意甚悅之及高祖克京城問何無忌曰急須一府主簿何由得之無忌曰無過劉道民高祖曰吾亦識之即馳信召焉宋書合舫升天劉穆之常渡揚子江宿夢合兩船為舫上施華蓋儀飾甚盛以升天既曉有一姥問曰君昨夜有佳夢否穆之乃具説之姥曰君必位居端相言訖不見後官至僕射丹陽尹以元功也異苑共鬼爭義崔浩三十九年晝夜無廢專心思書忘寢與食至乃夢共鬼爭義遂得周公孔子之要術始知古人有虛有實妄語者多真正者少本傳秉火爇室初崔浩構害李順基萌已成浩夢秉火爇順寢室火作而順死浩與室家群立而觀之俄而順弟息號哭而出曰此輩吾賊也以戈擊之浩投於河寤而惡之以告館客馮景仁景仁曰此真不善也非復虛事夫以火爇人暴之極也階亂兆禍復已招也商書曰惡之易也如火之燎於原不可向邇其猶可撲滅乎且兆始惡者有終殃積不善者無餘慶厲階成矣公其圖之浩曰吾方思之而不能悛至真君十一年而族登山無見樂平王丕之薨及日者薰道秀之死也高允遂著筮論曰昔明元末起白臺其高二十餘丈樂平王嘗夢登其上四望無所見王以問日者薰道秀筮之曰大吉王默而有喜色後事發王遂憂死而道秀棄市道秀若推六爻以對王曰易稱亢龍有悔窮高曰亢高而無人不為善也夫如是則上寧於王下保於已福祿方至豈有禍哉今舍於本而從其末咎釁之至不亦宜乎與絹少帝凶暴日甚沈慶之猶盡言諫爭遣慶之從兄攸之賫藥賜死時年八十是歲旦慶之夢有人以兩匹絹與之謂曰此絹足度寤而謂人曰老子今年不免兩匹八十尺也足度無盈餘矣宋書理錢徐羡之字宗文年少時嘗有一人來謂曰我是汝祖羡之拜此人曰汝有貴相而有大厄宜以錢二十八文理宅四角可以免災過此可位極人臣後羡之隨親之縣住在縣內嘗暫出而賊自後破縣縣內人無免者雞犬亦盡唯羡之在外獲全南史移床徐孝嗣字始昌曾在率府晝臥北壁下夢兩童子遽云移公床孝嗣驚起壁有聲行數步而壁倒壓床談藪言別齊宜都王鏗年七歲出閣陶弘景為侍讀八九年中甚相接遇後鏗遇害時弘景隱山中夢鏗來慘然言別曰某今命過無罪後三年當生某家弘景訪之以幽中事多祕不出及覺即使人至都參訪果與夢符弘景因此著夢記夢記老公拜路孝文帝至北芒遂幸洪池命任城王澄侍升龍舟帝曰朕昨夜夢一老公頭鬢皓白正理冠服拜立路左朕怪而問之自云晉侍中嵇紹故此奉迎神爽卑懼似有求焉澄對曰晉世之亂嵇紹以身衛主殞命側亦是晉之忠臣比干遭紂凶虐忠諫剖心可謂殷之良士二人俱死於王事墳塋並在於道周然陛下徙御殷洛經瀍墟而弔比干至洛陽而遺嵇紹當是希恩而感夢帝曰朕何德能幽感達士也然實思追禮先賢摽揚忠懿比干嵇紹皆是古之誠烈而朕務濃於比干禮略於嵇紹情有愧然既而此夢或如任城所言於是求其兆域遣使弔祭焉魏書積鹿皮吉士瞻字梁容出為西陽武昌二郡太守在郡清約家無私積始士瞻夢得一積鹿皮從而數之有十一領及覺喜曰鹿者祿也吾當居十一祿乎自其仕進所蒞已九及除二郡心惡之遇疾不肯療普通七年卒於郡南史兵馬避善傅昭天監十一年為安成內史安成自宋已來兵亂郡舍號凶及昭為郡郡內人夜夢見兵馬鎧甲甚盛又聞有人云當避善人軍衆相與騰虛而逝夢者驚起俄而疾風暴雨倏忽便至數間屋俱倒即夢者所見軍馬踐蹈之所也自後郡舍遂安咸以昭正直所致梁書父杖夏侯夬字元廷道遷子也性好酒居喪不戚醇醪肥鮮不離於口沽買飲噉多所費用父時田園貨賣略盡人間債猶數千餘匹穀食至常不足弟妹不免飢寒初道遷知夬好酒不欲傳授國封夬未亡前忽夢見征虜將軍房世寶至其家聽事與其父坐屏人密言夬心驚懼謂人曰世寶為官少間必擊我也尋有人至云官呼郎隨召即去遣左右杖之二百不勝楚痛大叫良久乃悟流汗徹於寢具至明前京城太守趙卓詣之汗流衣濕謂夬曰卿昨夜當大飲溺水如此夬乃具陳所夢先是旬餘祕書監鄭道昭暴病卒夬聞謂卓曰人生何常唯當縱飲於是昏酣遂甚夢後二日不能言針之乃得語而猶虛劣俄而心悶而死洗浴者視其尸體大有杖處青赤隱起二百下許北史求換曹武字士威為雍州刺史致見錢七千萬性儉嗇無所餉遺在襄陽獨饋梁武謂曰卿必大貴我當不及見今以弱子相託每密送錢物并好馬時帝在戎多乏就武換借未嘗不得遂至十七萬及帝即位忘其惠天監二年帝忽夢如田塍下行兩邊水深無底夢中甚懼忽見武來負武帝得過曰卿今為天下主乃爾忘我顧託之言耶我兒飢寒無衣昔所換十七萬可還其市宅帝覺即使主書送錢還之使用市宅子世澄世宗並蒙抽擢三二年間迭為大郡南史倚槐莊帝在藩元順夢一段黑雲從西北直來觸東南上日月俱破復翳諸星天地盡暗俄而雲消霧散便有日出自西南隅甚明淨云長樂王日尋見莊帝從閶闔門入登太極殿唱萬歲者三百官咸加朝服謁帝唯順集書省步廊西槐樹下脫衣冠臥既寤告元暉業曰吾昨夜夢於我殊自不佳説夢因解之曰黑雲氣之惡者是北方之色終當必有北敵以亂京師害二宮殘毀百寮何者日君象也月后象也衆星百官象也以此言之京邑其當禍乎昔劉曜破晉室以為髑髏臺前途之事得無此乎雖然彭城王協有恩德於天下今夢其兒為天子積德必報此必然矣但恨其得之不久所以然者出自西南以時易年不過三載但恨我不見之何者我夢臥槐樹下槐字木傍鬼身與鬼并復解冠冕此寧不死乎然亡後乃得三公贈耳皆如其夢北史楊元慎意思深長善於解夢孝昌年廣陵王元淵初除儀同三司總衆十萬討葛榮夜夢著衮衣倚槐樹而立以為吉徵問於元慎曰三公之祥淵甚悅之元慎退還告人曰廣陵死矣槐字是木傍鬼死後當得三公廣陵果為葛榮所煞追贈司空公終如其言伽藍此事酉陽雜俎載之廣記引入夢類按魏書廣陽劉深字知遠為葛榮所殺非廣陵也子湛字士淵襲封拜太尉時魏都洛已久固未有子以父諱為字者疑即子和之事而煮之紀聞之誤耳假氏愛奇而忽正史且以葛榮為爾朱更誤索刀爾朱榮討葛榮將戰夜夢一人從葛榮索千牛刀葛榮初不肯與此人自稱已是道武皇帝葛榮乃奉刀此人手持授榮寤而喜自知必勝北史斷頭爾朱世隆曾晝寢其妻奚氏忽見一人持世隆首去奚氏驚就視而世隆寢如故既覺謂妻曰向夢人斷我頭持去意殊不適未幾見誅上斷舌沈約齊末建議廢齊和帝後病夢和帝以劍斷其舌召巫視之巫言如夢乃呼道士奏赤章於天稱禪代之事不由已出梁武帝大怒中使譴責者數焉約懼遂卒梁書陰毛拂踝酈範字世則范陽涿人範嘗夜夢陰毛拂踝他日説之時齊人有占夢者曰史進云豪於齊下矣使君臨撫東秦道光海岱必當重牧全齊再祿營丘矣範笑而達曰吾將為卿必驗此夢果如其言為青州刺史後魏書銅柱蓮花陽休之在洛將仕夜夢見黃河北驛道上行從東向西道南有一冢極高大休之步登冢頭見一銅柱跌為蓮花形休之從西北登一柱礎上以手捉一柱柱遂右轉休之呪曰柱轉三匝吾至三公柱遂三匝而止休之尋寤意如在鄴城東南者榮貴之後所居之宅竟在其地北史犬羊據御座大同中太醫令朱耽嘗直禁省無何夢犬羊各一在御座覺而告人曰犬羊非佳物也今據御座將有變乎既而天子蒙塵景登正殿焉南史焚書初太子夢侯景作秦始皇占者云此人復欲焚書景入太子募燒東宮圖籍盡焚夢則應焉三國典略雷池君大寶三年陳霸先討侯景進次大雷軍人杜陵夢雷池君周何神自稱征討大將軍乘朱航陳甲仗稱下征侯景須臾便還云已殺景竟陳書與席柳霞字子升其世父慶遠特器異之謂霞曰吾昔逮事伯父太尉公嘗語吾云我昨夢汝登一樓樓甚峻麗吾以坐席與汝汝後名官必達恨吾不及見耳吾向聊復晝寢又夢將昔時座席還以賜汝汝之官位當復及吾特宜勉勵以應嘉祥也周書帝命放歸江陵平梁御史中丞沈炯遷長安太祖授儀同三司甚禮待之炯恐太祖愛其文才恆閉門却掃無所交遊時有文章隨即毀棄不令流布嘗獨行經漢武通天臺為表奏之陳已思歸之意奏訖其夜炯夢見有宮禁之所兵衛甚嚴炯便以情事陳訴聞有人言甚不惜放卿還幾日可至若一月內見關出此恐不復由我寤而異之當時以為恍忽十餘日便有命放還遂與王克等並得東歸三國典略金板武帝初受禪之日其夜有奉朝請會稽人史普直省宿夢有人自天而下著朱衣武冠導從數十至太極殿前北面手持金板板上有字漙視之其文曰陳氏五主三十四年遂凌空而上旦日黃門侍郎孔宗範嘆曰吾事去矣其為子孫憂乎自武帝已後并廢帝五主自永定初迄禎明末共三十四年陳書騎馬登山侯景敗文帝為吳興太守韓子高勤于侍奉恆會意旨帝甚寵愛之未嘗離於左右帝嘗夢見騎馬登山路危欲墮子高推捧而升上叛蕭禎明初蕭巖蕭獻降德教學士沈君道夢殿前長人朱衣武冠頭出欄上攘臂怒曰那忽受叛蕭誤人事後主聞之忌二蕭故遠散其衆南史紀洪水沒城隋文帝夢洪水沒城意惡之乃移都大興術者云洪水即唐高祖之名也隋唐嘉話惜書武德四年東都平後觀文殿寶廚新書八千許卷將載還京師上官魏夢見煬帝大叱云何因輒將我書向京師于時太府卿宋遵貴監運東都調度乃於陜州書著大船中欲載往京師於河值風覆沒一卷無遺上官魏又夢見帝喜云我已得書帝平存之日愛惜書史雖積如山丘然一字不許外出及崩亡之後神道猶懷愛吝按寶廚新書者並大業所祕之書也大業拾遺青衣趙文若開皇初病亡經七日而蘇云冥中諸罪中殺生甚重更不食肉後因公事至驛忽夢一青衣女子求哀試問驛吏曰有何物食報云見備一羊甚肥嫩詰之云青牸也文若曰我不喫肉遂贖放之報應記鳳集手上大業中有人嘗夢鳳鳥集手上深以為善徵往詣蕭吉占之吉曰此極不祥之夢夢者恨之而以為安言後十餘日夢者母死遣所親往問吉所以吉云鳳鳥非梧桐不棲非竹實不食所以止君手上者手中有桐竹之象禮云苴杖竹也削杖桐也是以知必有重憂耳大業拾遺集異記陽平宋堇為孫氏求官占夢同雙陸不勝武后問石泉公王方慶曰朕夜夢雙陸不勝何也曰蓋謂宮中無子意者恐可神靈警夫陛下因陳人心在唐之意后大悟召廬陵王復其儲位俾石泉公為宮相以輔翊之李繁大唐説纂新唐狄仁傑與方慶同云講坐下聽法中書令崔湜與尚書右丞盧藏用太平黨同被流嶺南俱行湜謂藏用曰家弟承恩或冀寬宥因遲留不速進行至荊州夢於講堂照鏡曰鏡者明象吾當為人主所明也以告占夢人張由對曰講堂者受法之所鏡者於文為立見金此非吉徵其日追使至縊於驛中舊唐張猷謂盧曰坐下聽講法從上來也鏡字金傍竟也其竟于今日乎僉載下體生路顧琮為補闕嘗有罪繫詔獄當伏法琮一夕憂愁坐而假寐忽夢見其母下體琮愈懼形於顏色流輩問琮以夢告之自謂不祥之甚也時有善解者賀曰子其免乎問何以知之曰太夫人下體是足下生路也重見生路何吉如之吾是以賀也明日門下侍郎蘇稷奏刑失入竟得免琮後至宰相廣異記飛鳥至庭張鷟字文成曾夢一大鳥紫色五彩成文飛下至庭前不去以告祖父云此吉祥也昔蔡衡云鳳之類有五其色赤文章鳳也青者鸞也黃者鵷雛也白者鴻鵠也紫者鸑鷟也此鳥為鳳凰之佐汝當為帝輔也遂以為名字焉鷟初舉進士至懷州夢慶雲覆其身其年對策考功員外騫味道以為天下第一又初為岐王屬夜夢著緋乘驢睡中自怪我衣緑裳乘馬何為衣緋却乘驢其年應舉及第授鴻臚丞未經考而授五品此其應也僉載冬絲給事中陳安平子年滿赴選與鄉人李仙藥臥夜夢十一月養蠶仙藥占曰十一月養蠶冬絲也君必送東司數日果送吏部上井中負日玄宗夢入井有一兵士著緋襌背負而出明日使中尋訪於苑中見一掌關著緋褌便引見上問汝昨夜作何夢對曰從井中背負日出登天上覩其形狀與夢相似乃問汝欲官乎答曰臣不解作官臣家貧遂勑賜錢五百千定命録鹿渡水死史朝義與駱悅等謀弒思明其夜思明夢而驚悟據床惆悵曰吾向夢見水中沙上群鹿渡水而至鹿死水乾言畢如廁伶人相謂曰鹿者祿也水者命也胡祿命俱盡矣悅令人擒之縊于柳泉驛舊唐戟刺李輔國恣君無君代宗漸惡之因寢夢登樓見高力士領數百鐵騎以戟刺輔國流血灑地前後歌呼自比而去遣謁者問其故力士曰明皇之命也帝覺不輒言及輔國為盜所殺帝異之方話其夢於左右杜陽編大還李虛中字常容最深于五行書將疾謂其友衛中行韓愈曰吾夢大山裂流出赤黃物如金有人曰是所謂大還者今三年矣虛中既歿愈追占其夢曰山者艮艮為背裂而流赤黃疽象也大還者其大歸也告之矣諱李墓銘墳大韋溫字弘育會昌五年五月瘍生於首召子壻張復魯託以後事復魯曰公去歲兩瘡生頭今始一尚微何言之深溫曰吾年二十九官校書郎時夢二黃衣人賫符來追及滻將渡一人續至曰彼墳至大功須萬日始成今未也遂不涉而寤今萬日矣其可逃乎樊川集就婚復娶太學博士鄭還古婚刑部尚書劉公之女納吉禮後與道士寇璋宿昭應縣夜夢乘車過小三橋至一寺後人家就與婚姻主人姓房驚覺與寇君細言以紙筆記其事寇君曰新婚偶為此夢不足怪也劉氏尋卒後數年向東洛再娶李氏於昭城寺後假宅拜席日正三橋宅主姓韓時房直溫為東洛少尹是妻家舅筵饌之類皆房公主之逸史唐詩紀事劉氏作柳氏昆腳皆頭杜牧頃於宰執求小儀不遂請小秋又不遂嘗夢人謂曰辭春不及秋昆腳與皆頭後果得比部員外尚書故實牧居下位心嘗不樂將及知命得病自為墓志祭文又嘗夢人告曰爾改名畢踰月奴自家來告曰炊將熟而甑裂牧曰皆不祥也俄又夢書行紙曰皎皎白駒在彼空谷寤寢而歎曰此過隙也吾生於角徵還於角為第八宮吾之甚厄也豫自湖守遷舍人木還角足矣其年以疾終舊唐夢者習段成式嘗言聞於醫曰藏氣陰多則夢數陽壯則少夢夢亦不復記夫瞽者無夢則知夢者習也成式表兄盧有則夢看擊鼓及覺小弟戲叩門為衙鼓也又姊壻襄元俗言群從中有悅鄰女者夢妓遺二櫻桃食之及覺核墜枕側李鉉著李子正辨言至精之夢則夢中之身可見如劉幽求見妻夢中身也則知夢不可以一事推矣愚者少夢不獨至人聞之騶皂百夕無一夢也酉陽石橋得履鄭昌圖登第歲居長安夜後納涼於庭夢為人歐擊擒出春明門至合大路處石橋上乃得解遺其紫羅履一隻奔及居而寤甚困言於弟兄而床前果失一履旦令人於石橋上追尋得之聞奇録指飛佛幡梁劉仁恭微時曾夢佛幡於手指飛出占者曰君年四十九必有旌幢之貴後如其説果為幽帥焉北夢瑣言三夢段思平生有異兆蒙主楊干真忌之使人索捕思平逃匿飢摘野桃剖之核膚有文曰青昔思平拆之曰青乃十二月昔乃二十一日令楊氏政亂吾當以是日舉義乎遂借兵車方衆至河尾是夕思平夢人斬其首又夢玉瓶耳缺又夢鏡破懼不敢進兵其軍師董迦羅曰三夢皆吉兆也公為大夫夫去首為天天子兆也玉瓶去耳為王王者兆也鏡中有影如人有敵鏡破則無影無影則無敵矣三夢皆吉兆也思平乃決明旦遂引兵渡江逐楊氏而有蒙國遂改國號曰大理時晉天福二年也湞記刻腹納星周王處訥夢人持巨鑑照天列宿燦然滿中刻其腹納之遂通星緯之學談苑避流星吳鄂帥王璵少為小將從軍圍潤州夜夢道士告之曰旦有流星墜地能避之當至將相明日衆軍攻城城中矢石如雨璵仗劍倚柵木而督戰俄有大石正中其柵木及璵鎧甲之半皆縻碎而璵無傷因歎曰流星正爾耶由是自負稽神録輿攻潤州為巨弩所射中右耳矢自左耳出又中旁一人猶立死輿扶歸營臥百餘日復起耳至老不瞶亦無瘢痍南唐册立徐溫嘗夢水中黃龍十數溫獲一龍而寤翌日得知誥上知誥在政府嘗一日不説其夫人問之知誥曰夜夢不吉以是為憂耳夫人曰夢無吉凶在人諼之耳知誥因出視事俄見周宗於庭下乃謂云我昨夢過順天門俄而仆地何也宗拜賀曰此明公宜使人册立也知誥大悅引宗入內室與夫人同席而飲五國故事懷孕張司直疾病夢懷孕甚惡之果光逢曰此去遇壬申日當差何謂也曰懷孕妊娠也有大福在也以此腹而像之後如其言葆光録玉真盧絳字晉卿病痁且死夜夢白衣婦人歌菩薩蠻勸絳鐏酒因謂絳曰子之疾食蔗即愈詰朝求蔗食之疾果差逮數夕又夢前白衣麗人曰妾乃玉真也他日富貴相見於固子坡絳寤因測固子坡之説後入金陵為宣州節度使唐亡歸梁以龔慎儀事坐誅臨刑有白衣婦人同斬姿貌宛如所夢問其受刑之地即固子坡也婦人姓耿名玉真其夫死與前婦之子通當極法與絳同斬焉南唐鐵篩方金陵之將亡也徐鍇屬疾忽夢巨人持大鐵篩取已及兄鉉并徐遊同納篩中篩之鍇與遊皆墜地而鉉獨否俄鍇遊皆以疾卒云上羊升御床後主篡位之初嘗夢一羊升武德殿御床意甚忌之及金陵之陷補闕楊知讓首知府事盛衰之理其明徵歟南唐近事九十字蜀宗正少卿孟德崇燕王貽鄴之子也日恃貴族脫略傲誕嘗太廟行香攜妓而往一夕夢一老人責之且取案上筆叱令開手大書九十字而覺翌日與賓客話及此事自言老人責我是惜我也書九十字賜我壽至九十也客有封璉戲之曰九十字乃是行書卒字亞鄉其非吉徵乎不旬日果卒野人間話吞日月耶律乙辛母方娠夜夢手摶羖羊拔其角尾既寤占之術者曰此吉兆也羊去角尾為王字汝後有子當王乙辛幼慧黠嘗牧羊至日晏迭刺視之乙辛熟寢迭刺觸之覺乙辛怒曰何遽驚我適夢人手執日月以食我我已食月啖日方半而覺惜不盡食之迭刺自是不令牧羊後進魏王以事誣皇后事蕭忽右知其姦狀伏橋下欲殺之俄暴雨壞橋謀不遂遼史好臣傳理所不容凡所夢者或反中詭遇或理所不容或先覺未兆或假借象類或即事所無事或乍驗乍否此皆神化茫眇幽明不測易以約通難用理檢蕭琛難神滅論喜樂也不言而悅也説文徐曰口豈為喜豈者陳樂立而上見人心之悅則其面目粹然而變知其喜也兩口銜士兩口銜士為喜喜得明心喜者為喜喜天心春秋元命包天喜人主有道國有善政則四七從度五星不逆日不蝕朔月不薄望霜不夏繁雷不冬泄喜瑞並臻災厲寢滅此則天喜也抱朴子憂而喜士渥貞子曰城濮之役晉師三日穀文公猶有憂色左右曰有喜而憂如有憂而喜乎公曰得臣猶在憂未歇也困獸猶鬥況國相乎及楚殺子王公喜而後可知也曰莫余毒也已宣十二喜歸孫伯宗朝以喜歸其妻曰子兒有喜何也曰吾言於朝諸大夫皆謂我知似陽子對曰陽子華而不實立言而無謀是以難及其身子何喜焉晉語三喜孟嘗君出行國至楚獻象床郢之登徒直送之不欲行見孟嘗君門人公孫戌曰臣郢之登徒直送象床象床之直千金傷此若髮漂賣妻息不足償之足而能使僕無行先人有寶劍願得獻之戌曰諾入見孟嘗君曰小國所以皆致相印於君以國事纍君者悅君之義慕君之廉也今君到楚而受象床所未至之國將何以待君孟嘗君曰善戍趣而出孟嘗君召而問之曰今何舉足之高志之揚也戌曰臣有大喜三重之寶劍一孟嘗君曰何謂也戌曰門下百數莫敢入見臣入諫臣一喜諫而得聽臣二喜諫而止君之過臣三喜戰國策七喜上幸長安祠高廟十一陵歷覽宮館舊處會郡縣吏勞賜作樂者有縣三老大言陛下入皇都臣望顏色儀類似先帝臣一歡喜百官嚴設如舊時二歡喜見吏賞賜識先帝時事臣三歡喜陛下聽用直諫默然受之臣四歡喜陛下至明懲文酷吏視人如赤子臣五歡喜進賢用能各得其所臣六歡喜天下太平德合於堯臣七歡喜東觀漢記四喜臣得去幽屏之城獲覲百官之美此一喜也背茅茨之陋登閶闔之闥此二喜也必以有靦之客瞻見穆穆之顏此三喜也將以檮杌之質稟受崇聖之訓此四喜也曹植表灑然唐高祖謂秦王曰爾還洛陽行臺自陜以東悉主之建成等因密使人説帝言秦王左右皆山東人聞還洛皆灑然喜觀其意不復來矣唐書聞往洛陽非常欣躍舊唐喜見群臣阿史那社爾破龜茲書聞太宗喜見群臣從容曰夫樂有幾朕嘗言之土城竹馬童兒樂也飾金翠羅紈婦人樂也貿遷有無商賈樂也高官厚秩士大夫樂也戰無前敵將帥樂也四海寧一帝王樂也朕今樂矣遂遍觴之西戎津津初三宰相就位二人磬折趨而李林甫在中軒驁無少讓喜津津出眉宇間觀者竊言一雕挾兩兔少選詔書出耀卿九齡以左右丞相罷林甫嘻笑曰尚左右丞相邪曰恚而送乃止唐書顏間陸贄從幸山南道途艱險扈從不及與帝相失一夕不至上喻軍士曰得贄者賞千金翌日贄謁見上喜形於顏間其寵待如此舊唐眉端呂溫得一善輒盱衡擊節揚袂頓足信容得色舞於眉端劉禹錫呂集序跫然夫逃虛空者藜藋柱乎鼪鼬之徑跟位其空聞人足音跫然而喜矣而況乎昆弟親戚之謦咳其側者乎莊徐無鬼瞿然九方歅為子綦相子曰梱也為祥子綦瞿然喜索然涕上溢美夫傳兩喜兩怒之言天下之難者也夫兩喜必多溢美之言兩怒必多溢惡之言故法言曰傳其常情無傳其溢言則幾乎全人間世似春古之真人其寢不夢其覺無憂其出不欣其入不距淒然似秋暖然似春喜怒通四時大宗師毗陽人大喜邪毗於陽大怒邪毗於陰陰陽并毗四時不至使人喜怒失位居處無常在宥鼓舞夫哀樂喜怒愛憎欲懼人之情也當其哀也則欲哭泣劈踴遇其喜也則欲歡笑鼓舞遇其樂也則欲荒淫流湎顧子施舍民有好惡喜怒哀樂生於六氣哀有哭泣樂有歌舞喜有施舍怒有戰鬭喜生於好怒生於惡昭二十五收正君子怒則説之以和喜則收之以正公孫尼子見譽聞謗而怒者讒之由也見譽而喜者佞之媒也絶由去媒讒佞遠矣文中子因喜魏徵四疏曰恩所加則思無因喜以謬賞罰所及則思無因怒而濫刑今之刑賞未必盡然或申屈在乎好惡輕重由乎喜怒遇喜則矜其刑於法中逢怒則求其罪於事外所好則鑽皮出其毛羽所惡則洗垢求其迹痕舊唐茠越今夫繇者揭钁臿負籠土鹽汗交流喘息簿喉當此之時得茠越下則脫然而喜矣巖穴之間非直越下之休也淮南墜陽夫喜怒者道之邪也憂悲者德之失也好憎者心之過也嗜欲者性之纍也人大怒破陰大喜墜陽薄氣發瘖驚怖為狂憂悲多恚病乃成積好憎繁多禍乃相隨淮南大憂內崩大怖生狂侵犯人之性有侵犯則怒怒則血充充則氣激氣激則發怒發怒則有所釋憾矣上笑啞笑也嘻大笑也聽笑貌也説文笑言啞啞易嘻其笑矣詩亡是公聽然而笑上林賦舉熢褒姒不好笑幽王欲其笑萬方故不笑幽王為熢燧大鼓有寇至則舉燧火諸侯悉至至而無寇褒姒乃大笑幽王説之為數舉燧火其後不信諸侯益亦不至史記輾然齊桓公田於澤見鬼焉公反誒詒為病數日不出齊士有皇子告敖者曰臣聞野有委蛇惡聞雷車之聲則捧其手而立見者殆乎霸桓公輾然而笑曰此寡人所見也不終日而病去莊子笑於房晉侯使郤克徵會於齊齊頃公帷婦人使觀之郤子登婦人笑於房獻子怒出而誓曰所不此報無能涉河宣十七笑於臺季孫行父禿晉郤克眇衛孫良夫跛曹公子手僂同時而聘於齊齊使禿者御禿者使眇者御眇者使跛者御跛者使僂者御僂者蕭同姪處臺上而笑之聞於客客不悅而去相與立胥聞而語移日不解齊人有知之者曰齊之患必自此始矣成元粲然楚靈王圍吳朱方執齊慶封將殺之使人令於軍中曰有若齊慶封弒其君者乎封曰子一息我亦且一言曰有若楚公子圍弒其兄之子麋而代之為君者乎軍人粲然皆笑昭四解顏列子事老商五年之後心庚念是非口庚言利害夫子始一解顏而笑列子開口盜跖謂孔子曰人上壽百歲中壽八十下壽六十除病瘦死喪憂患其中開口而笑者一月之中不過四五日而已矣莊子局局將閭葂薦季徹於魯君季徹局局然笑蔣閭葂覤覤然驚上胡盧子思荐李音於衛君君胡盧大笑孔叢子笑躄平原君家樓臨民家民家有躄者槃散跚行汲平原君美人居樓上臨見大笑之明日躄者到門曰臣不幸有罷癃之病而君之後宮臨而笑臣臣願得笑臣者頭平原君應曰諾終不殺居歲餘賓客門下舍人稍稍引去者過半平原君怪之門下一人前對曰以君之不殺笑躄者以君為愛色而賤士士即去耳於是平原君乃斬笑躄者美人頭自足門進躄者因謝焉其後門下乃復稍稍來史記目笑平原君與毛遂偕入楚十九人相與目笑之上仰天威王八年楚大伐兵加齊齊王使淳于髡之趙請救兵齎金百斤車馬十駟淳于髡仰天大笑冠纓索隱上嫣然東家之子嫣然一笑惑陽城迷下蔡登徒子賦搏髀東方朔於上前射覆中之郭舍人函屈被榜朔曰南山有木名為柘良工材之可以射射中人情如掩兔舍人數窮可不早謝上乃摶髀大笑也別傳解頤匡衡字子圭好學諸儒為之語曰無説詩匡鼎來匡説詩解人頤漢書盡氣初桓榮遭倉卒困厄時常與族人桓元卿俱捃拾投間輒誦詩元卿謂榮曰卿但盡氣爾當安復施用時乎榮笑而不應後榮為太常元卿來候榮諸子謂曰平生笑君盡氣今何如元卿曰我農民安能預知此東觀漢記仰天賓戲主人主人偵爾而笑曰若賓之言所謂守窔奧之榮燭未仰天庭而覩白日也班孟堅答賓賦先列得歆杜預伐吳軍入城至都督孫歆帳下生將歆詣預王濬先列得歆頭而預生送歆洛中大笑王隱晉書笑疾二陸入洛而士龍不詣張公公問士衡雲何以不來機曰有笑疾恐公不悉故未敢自見俄而雲詣華華為人多姿制又好帛纏鬚雲見而大笑不能自已士龍嘗著纕幘上船因水中自見其影便大笑不能已幾落水中世説大家兒笑桓南郡與道曜講老子王侍中為主簿在坐桓曰王主簿可顧名思義王未答且大笑桓曰王思道能作大家兒笑上強笑漁父謂孔子曰貢者精誠之至也不精不誠不能動人故強笑者雖悲不哀強親者雖笑不和莊子強令之笑不樂強令之哭不悲呂功名笑可哀夫載哀者聞歌聲而泣載樂者見哭者而笑哀可樂者笑可哀者載使然也是故貴虛淮心悅故口痛者口不能不呼心悅者顏不能不笑鄧折子絶倒有丞郎急詣穆優空室慚謝優曰他日內逼但請光訪人聞之莫不絶倒北夢瑣言李濤答弟婦拜作歇後語聞者莫不絶倒五代史補絶倒極笑也韻府群玉成帝服昭儀眘恤膠陰精流輸不禁有頃絶倒飛燕外傳王澄每聞衛玠語議至於理會之間要妙之際輒絶倒於坐前後三聞為之三倒時人遂曰衛君談笑平子三倒世説玠別傳王敦鎮豫章衛玠避亂投敦相見欣然談話彌日于時謝鯤為長史敦謂鯤曰不意永喜之中復聞正始之音阿平若在當復絶倒上宋陶繼之枉殺大樂伎後陶夢伎入其口仍落腹中陶即驚寤俄而絶倒若風顛良久方醒冤魂志梁仉臂與張敏思為主客立談絶倒四公子記李苗梁李膺子也每覽周瑜傳未嘗不咨嗟絶倒魏書北齊崔瞻聘陳行過彭城讀道傍碑文未畢而絶倒從者遙見以為中惡此碑乃瞻父徐州時所立故哀感焉北史隋陳孝意為侍御史以父憂去職後起為鴈門郡丞在郡朝夕哀臨每一夜聲未嘗不絶倒上則天初時特進蘇良嗣於殿庭因拜跪便絶倒舊唐貞元中盧頃家婢小蓮為一婦所批絶倒於地通幽録崔鉉與妻李觀家僮戲為妬狀大笑幾至絶倒王泉子前人所云絶倒如此後遂誤以為笑相承不改韻府衛玠下云極笑更誤發口且喜怒哀樂有感而自然者也故哭之發於口涕之出於目此皆憤於中而形於外者也譬若水之下流煙之上尋也夫有孰推之者淮齊俗哭路楊子見逵路而哭之為其可以南可以北黑子見練絲而泣之為其可以黃可以黑上説林狼戾昔雍門子以哭見孟嘗君已而陳辭通意撫心發聲孟嘗君為之增欷歍唈流涕狼戾不可止覽置哭世許慶字子伯家貧為郡督郵乘牛車鄉里號曰軺車督郵慶嘗與友人談論漢無統嗣幸臣專勢世俗衰薄賢者放退慨然據地悲哭時稱許子伯哭世謝承書哭臨趙一造河南尹羊陟不得見一以仕宦中非陟無足以託名者乃日往其門尋陟自強通陟臥未起一徑上堂臨之曰竊伏西州抱高風舊矣乃今方遇而忽然奈何命也因舉聲哭堂上驚陟延與語大奇之乃與袁逢共稱薦之名動京師後漢四面大哭符登率騎萬餘直到姚萇營下四面大哭哀號動地萇心惡之與其衆議亦哭相應車頴秦書善哭唐衢應進士久而不第能為歌詩意多感發見人文章有所歎傷者讀訖必哭涕泗不能已每與人言論既相別發聲一號音詞哀切聞之者莫不悽然泣下嘗客遊太原屬戎帥軍宴衢得預會酒酣言事抗音而哭一聲不樂為之罷會故世稱唐衢善哭唐書近婦箕子朝周過故殷墟咸生禾黍箕子傷之欲哭則不可欲泣為近婦人乃作麥秀之詩以歌詠之殷民皆流涕史記沾襟蘇秦張儀從橫習之鬼谷先生掘地為坑曰下説令我泣出則奈分人君之地蘇秦下説鬼谷先生泣下沾襟張儀不若論衡闌干王元景使梁劉孝綽送之泣下元景無淚謝曰卿勿怪我別後當闌干耳談藪泣緒齊君景山荊公燕市孟嘗聞琴馬遷廢史少卿悼躬夷甫傷子皆泣緒如絲詎能仰視江淹泣賦向隅聖人之於天下也譬猶一堂之上也今有滿堂飲酒者有一人獨索然向隅而泣則一堂之人皆不樂矣説苑愁城攻詩愁城終不破蕩許愁門終不開何物煮愁能得熟何物燒愁能得然閉門欲破愁愁終不肯去深藏欲避愁愁已知人處庾信愁賦萬斛誰知一寸心乃有萬斛愁上愁鬼特解寬衣帶偏能損面皮謂愁鬼也看朱成碧萬行朝淚瀉千里夜愁積誰知心眼亂看朱忽成碧梁王僧孺詩看朱成碧思紛紛憔悴支離得憶君武后埋愁寄愁天上埋憂地下仲長統詩愁逼愁逼夜長斜漢回而脈脈寒來夢淺行雲去以遲遲假成式天中記卷二十三
