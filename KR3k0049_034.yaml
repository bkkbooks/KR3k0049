body:
  text: 觀察使景雲三年置十道按察使開元二年曰十道按察採訪處置使乾元元年改曰觀察置使以豐稔為上考省刑為中考辦稅為下考唐百官志舜以五長綏四國若今之節制也周以十聯率諸侯若今之廉察也白集李勉為江西觀察使部人有父病以蠱道為木偶人署勉名位瘞于其隴或以告曰為父禳災亦可矜也捨之舊唐李勉除廣西刺史兼嶺南節度觀察使前後西域舶泛海至者歲纔四五勉性廉潔舶來都不檢閱故末年至者四千餘在官累年器用車服無增飾及代歸至石門停舟悉搜家人所貯南貨犀象諸物投之江中耆老以為可繼前朝宋璟盧奐李朝隱之徒人吏請闕請立碑代宗許之上令狐峘授吉州刺史齊映廉察江西行部過吉州故事刺史始見觀察使皆戎服趨庭致禮映雖嘗為宰相然驟達後進峘自恃前輩有以過映不欲以戎服謁入告其妻韋氏恥抹首趨庭謂峘曰卿自視何如人白頭走小生前卿如不以此禮見映雖黜死我亦無恨峘曰諾即以客禮謁之映雖不言深以為憾映至州奏映糺前政過失鞠之無狀不宜按部臨人貶衢州別駕上齊映為江西觀察使常以頃為輔相無大過而罷冀其復入用乃倍歛貢奉及為大金銀器以希旨先是銀瓶高者五尺餘李兼為江西觀察使乃進六尺者至是因帝誕日端午映為瓶高八尺以獻上常衮建中初起為福建觀察使始閩人未知學衮至為設鄉校使作為文章親加講導與為客主鈞禮觀游燕饗與焉由是俗一變歲貢士與荊州等其後閩人春秋配享衮于學官云新吳湊德宗初出為福建觀察使政勤清美譽四騰與宰相竇參有憾參數加短毀又言湊風痺不良趨走帝召還驗其疾非是繇是不直參擢湊陜虢觀察使代李翼翼參黨也上崔咸字重易陜虢觀察使自旦至暮與賓僚痛飲恒醉不醒簿領堆積咸夜分省覽部判決斷無毫釐之差胥吏以為神人上韋丹字文明為江南西道觀察使丹計口受俸委餘於官罷八州冗食者收其財始民不知為瓦屋草茨竹椽久燥則戛而焚丹召工教為陶聚材於場度其費為估不取贏利有吏主倉十年丹覆其糧亡三千斛丹曰吏豈自費邪籍其家盡得文記乃權吏所奪丹召諸吏曰若恃權取於倉罪也與若期一月還之皆頓首謝及期無敢違大和中裴誼觀察江西上言為丹立祠堂刻石紀功不報上王緯字文卿大曆中與李泌俱為路嗣恭江西觀察判官泌見惡於元載嗣恭希意欲殺之緯護解僅免泌執政奏於已有私恩德宗許為泌報故進緯給事中浙西觀察使缺泌擬緯帝曰是朕為君報德者乎黃門要地獨不留議事耶對曰浙西賦入尤劇緯清而忠能惠養民故請遣之制可上元和中郎吏數人省中縱酒話平生各有愛尚及憎怕者或言愛圖畫及愽奕或怕妄與佞工部員外周愿獨云愛宣州觀察使怕大蟲傳載宣宗因讀元和實錄見故江西觀察使韋丹政事卓異問宰臣孰為丹後宰臣周墀奏臣近任江西觀察使見丹行事餘風遺愛至今在人其子宙見任河陽觀察判官上曰速與好官持憲者聞之奏為侍御史東觀奏記久之拜江西觀察使政簡易南方以為世官宙弟岫字伯起盧攜舉進士陋甚岫獨謂攜必大用攜執政岫自泗州刺史擢福建觀察使云新蘭亭絕唱元稹字微之為浙東觀察使會稽山水奇秀稹所辟幕職皆當時文士而鏡湖秦望之遊月三四焉而諷詠詩什動盈卷帙副使竇鞏海內詩名與稹酬唱最多至今稱蘭亭絕唱舊崔郾字廣略昭愍時為陜州觀察使舊弊有上供不足奪吏俸以益之歲八十萬郾以廉使常用之直代之居二年政績聞於朝遷鄂岳浙西觀察使至用寬政安疲人及居鄂渚則峻法嚴刑未嘗貫一死罪江湖之間萑蒲是叢因造蒙衝小艦上下千里期而月盡獲群盜凡三按廉車率由清簡少事財用有餘人遂寧泰子瑤歷浙西鄂岳觀察使瑾為湖南觀察使上李德裕為浙西觀察使先是潤州承王國清兵亂之後前使竇易直傾府藏賞給軍旅𥧲驕財用殫竭德裕儉於自奉留州所得盡以贍軍雖施與不豐將卒無怨二年之後賦輿復集舊江嶺之間信巫祝惑鬼怪有父母兄弟厲疾者舉室棄之而去李德裕欲變其風擇鄉人之有識者諭之以言繩之以法數年之間弊風頓革屬郡祠廟按方志前代名臣賢后則祠之四郡之內除淫祠一千一十所又罷私邑山房一千四百六十以清寇盜人樂其政優詔嘉之上敬宗荒僻日甚大臣罕得進言李德裕身居廉鎮傾心王室意在切諫不欲斥言遣使獻丹扆箴六首以畫意宵衣諷坐朝稀晚也正服諷服御乖異也罷獻諷徵求玩好也納誨諷侮棄讜言也辨邪諷信任群小也防微諷輕出遊幸也帝雖不能盡用其言命學士韋處厚殷勤答詔頗嘉納其心焉上裴休廉察宣城未離京值曲江荷花盛發同省與名士遊賞自慈恩寺各屏左右隨以小僕步至紫雲樓下見數人坐於水濱裴與朝士憩其旁中有黃衣半酣軒昂指顧笑語輕脫裴意稍不平揖而問之吾賢所任何官率爾對曰諾即不敢新授宣州廣德令反問裴曰押衙所任何職裴效之曰喏郎不敢新授宣州觀察使於是狼狽而走朝士撫掌大笑不數日布於京華後於銓司訪之云有廣德令請換羅江矣宣皇在藩邸聞是說與諸王每為戲談及龍飛裴入相因書麻制迴謂樞近曰喏即不敢新授中書門下平章事劇談錄夢鄭處誨族父朗為定州節度使時處誨為工部侍郎因早朝假寐於待漏院忽夢已為浙東觀察使經過汴州而朗為汴帥留連飲餞仰視屋棟飾以黃土賓從皆所識明年朗果自定州鎮宣武辟韋重掌書記重將行處誨告以所夢明年秋處誨授浙東觀察使行及潼關朗遣從事迎勞仍致家書令先疏所夢比至汴宴於清暑亭賓佐悉符夢中郎仰視屋棟曰此亦黃土也四座感歎移時處誨繼為美夢刻詩廳事以盡思朗之悲舊地高曰京左傳曰莫之與京十億曰兆大眾所聚故曰京兆漢注登瀛秘錄河南尹所治周地也洛陽本成周周之衰微分為東西周秦兼天下置三川洛河伊也漢更名河南武帝更云太守世祖中興徙都洛陽改號為尹尹正也詩云赫赫師尹應劭漢官儀雋不疑字曼倩為京兆尹京師吏民敬其威信每行縣錄囚徒還其母輒問不疑有所平反活幾何人即不疑多有所平反母喜笑為飲食語言異於他時或亡所出母怒為之不食故不疑為吏嚴而不殘後趙廣漢為京兆尹言我禁奸止邪行於吏民至於朝廷事不及不疑遠甚漢書趙廣漢字子都為京兆尹以和顏接士推功於掾吏發於至誠吏見者皆輸寫心腹廣漢精於吏事尤善為鉤鉅以得民情其發姦擿伏如神冬獄當斷先為請棺皆曰死無所恨後以魏相夫人殺婢事為蕭望之劾奏下廷尉吏民守闕號泣者數萬人或言臣生無益縣官願代趙京兆死使得牧養小民廣漢竟坐要斬廣漢雖坐法誅為京兆尹廉明威制豪強小民得職京兆政清吏民稱之不容口長老傳以為自漢興以來治京兆者莫能及百姓追思歌之至今上發伏禁姦張敞字子高時潁川太守黃霸以治行第一入守京兆尹霸視事數月不稱罷歸潁川於是以敞守京兆尹自起廣漢誅後比更守尹如霸等數人皆不稱職市師𥧲廢長安市偷盜尤多百賈苦之敞既視事求問長安父老偷盜酋長數人皆召見責問因貰其罪把其宿負令致諸偷以自贖一日捕得數百人窮治所犯或一人百餘發盡行法罰由是枹鼓稀鳴市無偷盜天子嘉之其治京兆略循趙廣漢之迹方略耳目發伏禁姦不如廣漢京兆典京師長安中浩穰於三輔尤為劇久者不過三年惟廣漢及敞為久任職敞為京兆朝廷每有大議引古今處便宜公卿皆服天子數從之後以楊惲厚善被劾奏寢不下敞使賊捕掾絮舜有所案驗舜以敞劾奏當免不肯為敞竟事私歸其家人或諫舜舜曰吾為是公盡力多矣今五日京兆耳安能復案事敞聞舜語即部吏收舜繫獄驗治舜致竟其死事舜當出死敞使主簿持教告舜曰五日京兆竟何如冬月已盡延命乎乃棄舜市上王尊字子贛成帝時南山群盜傰宗等數百人為吏民害發軍擊之不能得王鳳薦尊為京兆尹旬月間盜賊清後以劾匡衡被劾左遷為高陵令病免吏多稱惜之湖三老公乘興等上書訟尊治京兆功效曰長安宿豪大猾為百姓豺狼更數二千石二十年莫能禽討尊以正法案誅皆伏其辜尊撥劇整亂誅暴禁邪皆前所稀有名將所不及尊以京師廢亂群盜並興選賢徵用起家為卿賊亂既除豪猾伏辜即以佞巧廢黜一尊之身三期之間乍賢乍佞豈不甚哉奏書復以尊為徐州刺史上王章字仲卿成帝時為司隸校尉大臣貴戚敬憚之王尊免後代者不稱職章以選為京兆尹時帝舅王鳳輔政章雖為鳳所舉非鳳專權不親附鳳會日蝕章奏封事召見言鳳不可任用遂為鳳所陷罪至大逆章為京兆二歲死不以其罪眾庶冤之號為三王王駿即王陽子也上王駿為司隸校尉奏免丞相匡衡遷少府成帝欲大用之出駿為京兆尹試以政事先是京兆有趙廣漢張敞王尊王章至駿皆有能名故京師稱曰前有趙張後有三王上翟方進字子威為丞相司直旬歲間免兩司隸朝廷由是憚之上以為任公卿欲試以治民徙方進為京兆尹摶擊豪強京師畏之時胡常為青州刺史聞之與方進書曰竊聞政令甚明為京兆能則恐有所不宜方進心知所謂其後少弛威嚴上袁安字邵公為河南尹政號嚴明然未曾以臧罪鞠人常稱曰凡學仕者高則望宰相下則希牧守錮人於聖世尹所不忍為也聞之者皆感激自勵在職十年京師肅然名重朝廷後漢延篤字叔堅為京兆尹其政用寬仁憂恤民黎擢用長者與參政事郡中歡愛三輔咨嗟焉先是陳留邊鳳為京兆尹亦有能名郡人為之語曰前有趙張三王後有邊延二君上楊彪字文先為京兆尹光和中黃門令王甫使門生於郡界辜榷官財物七千餘萬彪發其姦言之司隸司隸校尉楊球因此奏誅甫天下莫不愜心上李燮字德公為京兆尹時既以貨賂為官詔書復橫發錢三億以實西園尹上封事蕩此橫調并陳禍敗辭意深切遂止不發尹履潔白之節秉執忠良吏民愛敬作歌曰我府君道教舉恩如春威如虎愛如毋訓如父別傳董卓廢少帝自公卿已下莫不卑下於卓唯京兆尹蓋勳長揖爭禮見者皆為失色卓問王允曰欲得快司隸誰可者允曰唯有蓋京兆可卓曰此人明智有餘然不可假以雄職乃以為越騎校尉復出為潁川太守英雄記私請不行司馬芝字子華黃初中為河南尹抑彊扶弱私請不行曾內官欲以事託芝不敢發言因芝妻伯父董昭昭猶憚芝不為通芝為教與群下曰蓋君能設教不能使吏必不犯也吏能犯教而不能使君必不聞也夫設教而犯君之劣也犯教而聞吏之禍也君劣於上吏禍於下此政事所以不理也可不各勉之哉於是下吏莫不自勵魏志劉靖為河南尹散騎常侍應璩書與靖曰入作納言出臨京任富民之術日引月長加之以明擿幽微重之以秉憲不撓有司供承王命百里垂拱仰辨雖昔趙張三王之治未足以方也靖為政初雖如碎密終於百姓便之有馥遺風上靖馥子也御覽云馥字子靖應璩以書與子靖誤德教為本傅嘏字蘭石為河南尹內掌帝都外統京畿兼古六鄉六遂之士其民異方雜居多豪門大族商賈胡貌天下四方會利之所聚而姦之所生前尹司馬芝舉其綱而太簡次尹劉靜綜其目而太密後尹李勝毀常法以收一時之聲嘏立司馬氏之綱統裁劉氏之綱目以經緯之李氏所毀以漸補之其治以德教為本然持法有恒簡而不可犯見理識情獄訟不加檟楚而得其實不為小惠有所薦達及大有益於民事皆隱其端迹若不由已出故當時無赫赫之名吏民久而後安之傳子顏斐尹京兆為十郡最徙平原太守吏民號泣遮道步涉稽留日行數十里及卒立碑作頌焉良吏傳武帝咸寧三年詔曰河南百郡之首其風教宜為遐邇所模以導齊之侍中奉車都尉王恂忠亮篤誠才兼外內明於治化其以恂為河南尹晉起居注京兆尹總理眾務皆曰尹南朝曰丹陽尹後魏初曰代尹東魏曰魏尹齊曰清都尹通典陶回性雅正不憚彊禦丹陽尹桓景佞事王導甚為導所昵回常慷慨謂景非正人不宜親狎會熒惑守南斗經句導語回曰南斗楊州分而熒惑守之吾當遜位以厭此讁回答曰公以明德作相輔弼聖主當親忠貞遠邪佞而與桓景造膝熒惑何由退舍導深愧之晉傳辭尹蘇峻新平溫庾諸公以朝廷初復京尹宜得望實唯孔君平可以處之孔固辭二公逼諭甚苦孔敖然曰先帝大漸卿輩身侍御床口行詔令孔坦是時正璅臣耳何與國家事不可今日喪亂而猥見逼迫吾俎豆上腐肉任人割膾截耶庾愧不能答語林晉導庾亮賈敦頤永徽五年為洛州長史時豪富之室皆籍外占田敦頤都括獲三千餘頃以給貧乏又發姦摘伏有若神明弟敦實咸亨元年為洛州長史甚有惠政初敦頤為洛州刺史百姓共樹碑于大市通衢及敦實去職復刻石頌美立于兄之碑側時人號為棠棣碑舊唐張仁愿本名仁亶神龍二年兼檢校洛州長史時都城穀貴盜竊甚眾仁愿一切皆捕獲杖殺之積屍府門遠近震慴無敢犯者初高宗時賈敦頤為洛州刺史亦有政績與仁愿皆為一時之最故時人為之語曰洛州有前賈後張可敵京兆三王其見稱如此上總理眾務唐京兆府本為雍州置牧一人以親王為之多以長史理人置別駕以領州事永徽中改別駕為長史開元初改雍州長史為京兆尹總理眾務唐志通典河南尹武德四年置洛州都督貞觀十七年改為刺史顯慶二年置東都改刺史為長史開元元年改洛州為河南府改長史為尹其牧尹之制一如京兆上李傑為河南尹有寡婦告其子不孝其子不能自理但云得罪於母死所甘分傑察其狀非不孝子謂寡婦曰汝寡居唯有一子今告之罪至死得無悔乎寡婦曰子無賴不順母寧復惜乎傑曰審如此可買棺木來取兒尸因使人覘其後寡婦既出謂一道士曰事了矣俄持棺至傑尚冀有悔再三喻之寡婦執意如初道士立於門外密令擒之一訊承伏與寡婦私通常為兒所制故欲除之傑放其子杖殺道士及寡婦便同棺盛之國史異纂李峴遷將作監改京兆尹所在皆著聲績天寶十三載連雨六十餘日宰臣楊國忠恐其不附已以雨災歸咎京兆尹乃出為長沙郡太守時京師米麥踴貴百姓遙曰欲得米粟賤無過追李峴其為政得人心如此舊唐兄弟京兆李叔明字晉兄仲通字向天寶末為京兆尹叔明乾元中為京兆中長安歌曰前尹赫赫具瞻允若後尹熙熙具瞻允斯新李朝隱為河南尹政甚清嚴豪右屏跡時太子舅趙常奴恃勢侵害平人朝隱曰此而不繩何以為政執而杖之上聞又降勑書慰勉之舊李勉字元卿大曆二年為京兆尹兼御史大夫政尚簡肅宦官魚朝恩為觀軍容使仍知國子監事恃寵含威天憲在舌前尹黎幹寫心候事勤必求媚每朝恩入監傾府人吏具數百人之餼以待之及勉莅職旬月朝恩入監府吏先期有請勉曰軍容使判國子監事勉候太學軍容宜厚具主禮勉忝京兆尹軍容使領府廷豈敢不具蔬饌朝恩聞而銜之因不復至太學勉亦尋受代舊政尚簡約張延賞大曆二年為河南尹河洛久當兵衝閭井丘墟延賞勤身率下政尚簡約疏通河渠修築宮廟數年間流庸歸附邦畿復完詔書褒美焉上鄭珣瑜為河南尹送迎中使皆有常處人吏窺之馬足差跌不出三五步議者以珣瑜為河南尹可繼張延賞而重厚堅正前後莫有及語休貞元十四年春夏旱穀貴人多流亡京兆尹韓皋以政事不理黜官上召吳湊面授京兆尹即日令視事經宿方下制湊孜孜為理以勤儉為務人樂其政舊唐德宗貶皋撫州司馬詔曰京邑為四方之則長吏受親人之寄皋處理事無方宜加懲誡上初府掾吏以吳湊起自戚藩不諳簿領凡有疑獄難決之事多候湊將出時方呈冀免指摘瑕病湊雖倉卒閱視必指其姦倖之處下筆決斷無毫釐之差掾吏非大過不行苔責而召面按問詰責而釋之吏尤惕厲庶務咸舉上德宗非時召拜吳湊為京兆尹便令赴上湊疾驅諸客至府已列筵矣或問曰何速吏曰兩市日有禮席舉鐺釜而取之故三五百人饌常可立辦國史補許孟容字公範為京兆尹神策吏李昱假貸長安富人錢八千貫滿三歲不償孟容遣吏收捕械繫克日命還之曰不及期當死自興元以後禁軍有功又中貴之尤有渥恩者方得護軍故軍士日益縱橫府縣不能制孟容剛正不懼以法繩之一軍盡驚冤訴於上立命中使宣旨令送本軍孟容繫之不遣中使再至乃執奏曰臣誠知不奉詔當誅然臣職司輦轂合為陛下彈抑豪強錢未盡輸昱不可得上以其守正許之自此豪右歛跡威望大震出為河南尹亦有威名舊劉栖楚為京兆尹摧抑豪右不顧患難事無大小必設鉤鉅故時人重之或稱其機變往往有類於西漢時趙廣漢者上栖楚為京兆尹號令嚴明誅罰不避權勢先是京城惡少及屠沽商販多繫名諸軍不遵府縣法令以陵衣冠奪貧弱為事有罪即逃入軍中無由追捕劉公為尹一皆窮治至有匿軍中名目自稱百姓者旬朔內坊市姦偷宿猾攝氣屏跡又嘗與友生入市市內有一軍人乘醉誤喫友生驢過旁諸少年譟曰癡男子死日到敢近衣冠耶人人似頭上各有一劉尹慄慄汗懼不敢為非而與屬吏言未曾傷氣不叱責一官人常謂府縣僚曰諸公各有自了本分公事晴天美景任恣意遊賞勿致拘束因話錄柳公綽字起之拜京兆尹將赴府上有神策軍小將乘馬不避公於街中杖煞之及因對憲宗正色詰公專煞之狀公曰京兆尹在取則之地臣初授陛下獎擢軍中偏裨躍馬衝過此乃輕陛下與法不獨試臣臣知杖無禮之人不知打神策軍將上曰卿何不奏公曰臣只合決不合奏上曰既死合是何人奏公曰在街中本街使金吾將軍奏若在坊內則左右巡使奏上乃止上公綽字寬小字起之唐彈壓為先柳仲郢字諭蒙綽子也李德裕奏為京兆尹紇于泉訴表甥劉詡歐母詡為禁軍小校仲郢不俟奏下杖殺為北司所譖後出為河南尹以寬惠為政言事者以為不類京兆之政仲郢曰輦轂之下彈壓為先郡邑之治惠養為本何取類耶舊仲郢為京兆者吏入粟違納仲郢殺而尸之自是人無敢犯政號嚴明父子更九鎮五為京兆再為河南唐張正甫為河南尹裴中令代淮西置宴府西亭裴公舉一人詞藝好解頭張正色曰相公此行何為也可記得河南府解頭中令有慚色語林正甫字淺方仁而端亮蒞官清強居外任所至稱理唐脂韋李訓之亂宰相京兆尹皆死勑宣張仲方為京兆時軍人橫恣仲方脂韋坐不稱職出為華州刺史唐書孔帖薛元賞代張仲方為京兆尹元賞常詣李石第聞石方坐聽事與一人爭辯甚喧元賞使覘之云有神策軍將訴事元賞趨入責石曰相公輔佐天子紀綱四海今近不能制一軍將使無禮如此何以鎮服四夷即趨出上馬合左右擒軍將俟於下馬橋元賞至則已解衣跽之矣其黨訴於仇士良士良遣宦者召之曰中尉屈大尹元賞曰屬有公事行當繼至遂杖殺之乃白服見士良士良曰癡書生何敢杖殺禁軍大將元賞曰中尉大臣也宰相亦大臣也宰相之人若無禮於中尉如之何中尉之人無禮於宰相庸可恕乎中尉與國同體當為國惜法元賞已囚服而來惟中尉死生之士良知軍將已死無可如何乃呼酒與元賞歡飲而罷通鑑薛元賞會昌中李德裕當國復拜京兆尹都市多俠少年以黛墨鑱膚夸詭力剽敓坊閭元賞到府三日收惡少杖死三十餘輩陳諸市餘黨懼爭以火滅其文元賞長吏事能推言時弊件白之禁屯怙勢擾府縣元賞數與爭不少縱由是軍暴折戢百安賴安新唐威風甚嚴薛元賞為京兆尹武宗謂宰相曰威風甚嚴唯屬軍者即令守取勑文李德裕奏京尹若非陛下假借與之作主則無由為德帝曰灼然分紀韋澳為京兆尹豪右歛手國舅鄭光庄不納租澳繫其主者期以五日不足必抵法太后為言之上延英問澳澳具奏本末上曰今日納租放否曰尚在限內來日即不得矣澳既出半夜上連召之曰國舅庄租今日納足放主者否曰澳必放上入告太后曰韋澳不可犯且與送錢納却頃刻而租足東觀奏記李罕之僖宗末為河南尹每討無不擒之曾縱兵於蒲絳之地有山曰摩雲土人設堡於上號麾雲塞前後不能取罕之至則下焉目為李摩雲鄭戩知開封府時有府吏馮士元者狡猾佞姦乃通結權貴恣為姦贓自尹而下至于權判官往往皆為持中權柄多出於士元偷弄威勢以刑禍于人京師號為立地京兆戩至窮案其贓搜其家得與朝士往來交易貸賭簿書連及近臣而權貴多為之請戩俱不顧案成流於海島於是府中走吏而下日夕戰汗服慄姦惡逃竄都下肅然東都事略戩字天休府吏馮士元為姦利有告士元受賕藏禁書者戩窮治之辭連宰相呂夷簡知樞密院盛度參知政事程琳遂逮捕夷簡子公綽公弼參劾其狀既而士元流海島度琳坐嘗交關士元罷去其餘絀罰者自御史中丞孔道輔天章閣待制龐籍又十餘人朝議畏其激核宋史笑比河清包孝肅尹京號為明察有編民犯法當杖脊吏受贓與之約曰今見尹必付我責狀汝第呼辨我與汝分此罪汝決杖無我決杖既而包引囚問畢果付吏責狀囚如言紛辨不已吏大聲呼之曰但受脊杖出去何用多言包謂其市權斥吏於庭杖之十七特寬囚罪上從杖坐以沮吏勢不知為其所賣卒如所約小人姦回難防也孝肅天性峭嚴未嘗有笑人謂希仁笑比黃河清筆談范君范仲淹為禮部員外郎天章閣待制權知開封府欲撓以煩劇而不暇他議仲淹明敏通照決事如神京師證曰朝廷無憂有范君京師無事有希文談苑張文定公方平知開封府府事繁為尹者皆書板以記事公獨不用默記數百以決決遣不遺毫髮吏民驚以為神不敢復欺東坡集少尹京兆少尹魏晉以來治中之任隋文帝改為司馬煬帝又改為贊治後又改為丞武德初復為治中永徽元年以太皇諱改為司馬開元元年並改為少尹通典故事內史未補間亞尹得行大京兆事試可而即真者往欲有之白張平叔少尹制雖有忠賢委為尹正承而貳之實資亞理上孟存少尹制大京兆京兆尹也小京兆少尹也亦謂之亞尹海錄李元紘開元初為京兆少尹尋有詔令元紘疏決三輔渠時諸王公權要之家皆緣渠立磑以害水田元紘令吏人一切毀之百姓大獲其利舊唐李憕為東京少尹特蕭炅為尹依倚權貴蒞事多不法憕以公直正之人用繫賴又道士士孫甑生以左道求進託以修功德往來嵩山求請無度憕必挫之副牧務郭行餘擢累京兆少尹嘗值尹劉栖楚不肯避栖楚捕導從繫之自言宰相裴度頗為諭止行餘移書曰京兆府漢時有尹有都尉有丞皆詔自除後循而不改開元時諸王為牧故尹為長史司馬即都尉丞耳今尹總牧務少尹副焉未聞道路間有下車望塵避者故事猶在栖楚不能答上使行聘禮李承勳累遷至太原少尹劉守光之僣號也莊宗遣承勳往使伺其釁端承勳至幽州見守光如藩方交聘之禮謁者曰燕王為帝矣可行朝禮承勳曰吾大國使人太原亞卿是唐帝除授燕主自可臣其部人安可臣我哉守光聞之不悅拘留於獄數日出而訊之曰臣我乎承勳曰燕君能臣我王則我臣之吾有死而已安敢辱命會王師討守光承勳竟沒於燕中後唐黃帝立四監以治萬國唐有九州舜置十二州有牧夏為九州牧殷周八命曰牧漢景帝更名郡守為太守凡在郡國皆掌治民進賢勸功決訟檢姦吏民之本宣帝以為太守吏民之本數變易則下不安民知其將久不可欺罔乃服從其教化每拜刺史守相輒親見問觀其所繇退而考察所行以質其言有名實不相應必知其所以然常稱曰庶民所以安其田里而亡歎息愁恨之心者政平訟理也與我共此者其唯良二千石乎是故漢世良吏於是為盛稱中興焉前漢文翁景帝末為蜀郡守仁愛好教化見蜀地辟陋有蠻夷風上本無學士文翁遣相如東受七經還教吏民於是蜀學比於齊魯故地里志曰文翁倡其教相如為之師漢家得士盛於其世蜀志至于武帝時乃令天下郡國皆立學校官自文翁為之始云文翁終於蜀吏民為立祠堂歲時祭祀不絕至今巴蜀文雅好文翁之白骨未收者為之殯葬其有骨肉恩薄不收歛者重加貶責由是百姓感化復覩太平置酒大會郡中耆老相與流涕而歎曰吾等投老更得父母死將何恨又童謠曰幸哉遺民免豺虎三辰既朗遇慈父元酒清醪甘牛脯亦何報恩歌且舞別傳剖符作宰索稜字孟則燉煌人好學博文姚萇甚重之委以機密文章詔檄皆稜之文也後為平原太守以德化民民畏而愛之歌曰懿矣明守庶績允釐剖符作宰實獲我思崔鴻十六國春秋前秦錄殷仲文既素有名望自謂必當阿衡朝政忽作東陽太守意甚不平及之郡至富陽慨然嘆曰看此山川形勢當復出一孫伯符世說東陽峴山舊名三丘山仲文除東陽太守意甚不樂嘗登此山悵然流涕郡人愛之如襄陽之於叔子因名峴山二峰相峙有東峴西峴唐寶歷中縣令于輿宗結亭其下名曰洆碧韻語陽秋統志義熙間殷仲堪有東陽太守嘗登三丘山悵望後人思之名曰峴山按仲堪為荊州東陽也誤顏延之字延年文章冠絕一時時尚書傅亮自以文義一時莫及延之負其才不為之下亮甚疾焉遷始安太守謝晦謂延之曰昔荀勗忌阮咸斥為始平郡今卿又為始安可謂二始黃門郎殷景仁亦謂之曰所謂人惡俊異世疵文雅後復為劉湛所恨出為永嘉太守於行誼可謂賢人君子矣書不云乎股肱良哉其賜爵關內侯上五鳳三年代邴吉為丞相霸材長於治民及為丞相總紀綱號令風采不及邴魏于定國功名損於治郡時上御覽良哉下有元首明哉句袁甫曰人各有能有不能黃霸馳名於州郡而息譽於京邑晉書益州刺史王褒欲宣風化於眾庶聞王褒有俊材請與相見使褒作中和樂職宣布詩選好事者令依鹿鳴之聲習而歌之因奏褒有軼材上迺徵褒既至詔褒為聖主得賢臣頌上宣帝時渤海廢亂以龔遂為太守遂對曰海瀕遐遠不霑聖化其民困於饑寒而吏不恤故使陛下赤子盜弄陛下之兵於潢池中耳臣聞治亂民猶治亂繩不可急也唯緩之然後可治臣願丞相御史且無拘臣以文法得一切便宜從事上許焉遂移書勑屬縣悉罷捕逐盜賊吏單車獨行至府郡中翕然盜賊亦皆罷民有帶持刀劍者使賣劍買牛賣刀買犢曰何為帶牛佩犢上尹翁歸字子兄况徵拜東海太守過辭廷尉于定國定國家在東海欲屬託邑子兩人令坐後堂待見定國與翁歸語終日不敢見其邑子既去定國乃謂邑子也此賢將汝不任事也又不可干以私翁歸治東海明察郡中吏民賢不肖及姦邪罪名盡知之以一警百吏民皆服恐懼改行自新莫敢犯禁東海大治以高第入守右扶風滿歲為真選用廉平治如在東海故迹在京師畏其威嚴扶風大治盜賊課常為三輔最翁歸為政雖任刑其在公卿之間清潔自守語不及私然溫良嗛退不以行能驕人甚得名譽於朝廷三子皆為郡守上召信臣字翁卿為上蔡長其治視民如子所居見稱述遷南陽太守其治如上蔡吏民親愛之號曰召父荊州刺史奏信臣為百姓興利郡以殷富遷河南太守治行常為天下第一竟寧中徵為少府非法食物悉奏罷省費歲數千萬信臣年老以官卒元始四年詔書祀百辟卿士有益於民者蜀郡以文翁九江以召父應詔書歲時郡二千石率官屬行禮奉祠信臣冢而南陽亦為立祠上馮立字聖卿竟寧中為五原太守徙西河上郡立居職公廉治行略與野王相似而多知有恩貸好為條教吏民嘉美野王立相代為太守歌之曰大馮君小馮君兄弟繼踵相因循聰明賢知惠吏民政如魯衛德化鈞周公康叔猶二君後遷為東海太守下濕病痺天子聞之徙立為太原太守更歷五郡所居有迹上杜詩字君公為南陽太守性節儉而政治清平以誅暴立威善於計略省愛民役造作水排鑄為農器用力少見功多時人方於召信臣故南陽人為之詩曰前有召父後有杜父東觀漢記總大體馬援字文淵為隴西太守務開寬信恩以待下任吏以職但總大體而已賓客故人日滿其門諸曹時白外事輒曰此丞掾之任何足相煩若大姓侵小民黠羌欲旅距此乃太守事耳上蔡彤為遼東太守彤之威聲揚於北方胡夷皆來外附野無風塵乃悉罷緣邊屯兵及彤卒烏桓解卑追思無已每朝京師過彤家拜謁即大號泣乃去上葦杖劉寬歷典三郡吏民有過蒲鞭示辱後安陸王碑南陽葦杖未足比其仁選蒲鞭葦杖示有刑曹子建對酒歌時雨郭伋為潁川化如時雨決錄潁川時雨無以豐其澤蜀郡任嘉年三四歲時父騰為諸生於漢中就師有盜賊道路斷絕蜀亦覆沒客處長沙為州郡吏後嘉為長沙太守騰為奏曹掾默知嘉實其子也嘉母語次謂嘉曰奏曹任掾則汝父也但差老耳嘉曰天下豈獨有一任夫人何以老更生淫意母曰咄我守養汝數十年無嫌議豈以垂沒更失計哉顧實真父不可棄捐後嘉問掾聲音可類太守何州里耶掾曰本為武陽人蓬轉流宕則此母察審諦又識左耳前贅因出抱持對之流涕嘉自投榻歔欷哽咽風俗通侯霸字君房為淮平臨淮大尹政理有能名及三本敗霸固保自守卒全一郡更始元年遣使徵霸百姓老弱相攜號哭遮使者或當道而臥皆曰願乞侯君復留期年民乃誡乳婦勿得舉子侯君當去必不能全使者慮霸就徵臨淮必亂不敢授璽書而具以狀聞上借寇寇恂字子翼為潁川太守郡中政理盜賊不入東觀記代朱浮為執金吾後潁川盜起從駕南征恂從至潁川盜賊悉降而竟不拜郡百姓遮道曰願從陛下復借寇君一年乃留恂長社鎮撫吏人受納餘降後得耿耿純字伯山鉅鹿人請治一郡盡力自效上笑曰卿乃欲以治民自效乃拜純為東郡太守後坐事免上過東郡數千人號呼涕泣云願復得耿君上復以純為東郡太守東觀記第五倫字伯魚為會稽太守性節儉雖身居二千石位常蔬食布衣妻自炊爨初到代發當百姓老少闐府門攀車扣馬號呼曰捨我何之其得人心見愛如此上謝夷吾字堯卿為荊州刺史遷鉅鹿太守所在愛育人物有善績司徒第五倫令班固薦之曰會稽謝夷吾出自東土英資挺特加以少膺儒雅韜含六籍應選作宰惠敷百姓爰牧荊州威行邦國尋功簡能為外臺之表聽聲察實為九伯之冠遷守鉅鹿政合時雍誠社稷之元龜大漢之棟甍後沈豐字聖達為零陵太守為政慎刑重殺罪法辭訟初不歷獄嫌疑不決一斷於口鞭杖不舉市無刑戮僚友有過初不暴揚有奇謀異略輒為談述曰太守所不及也到官一年甘露降芝草生東觀記名子為任任延為九真太守不識父子之性夫婦之道延乃遺書屬縣各使男女皆以年齒相配同時相娶者二千餘人是歲風雨順節穀稼豐衍其產子者始知種姓咸曰使我有是子者任君也多名子為任上左轉睢陽令九真吏人生為立祠拜武威太守帝見親戒之曰善事上官無失名譽延對曰臣聞忠臣不私私臣不忠履正奉公臣子之節上下雷同非陛下之福善事上官臣不敢奉詔帝歎息曰卿言是也後宗慶字叔平為長沙太守民養子者三千餘人男女皆以宗為名張堪為漁陽太守乃於狐奴開稻田八千餘頃勸民耕種以致殷富百姓歌曰桑無附枝麥穗兩岐張君為政樂不可支後帝嘗召計吏問守令能否蜀計掾樊顯進曰漁陽太守張堪昔在蜀其仁以惠下威能討姦前公孫述破時珍寶山積捲握之物足富十世而堪去職之日乘折轅車布被囊而已帝聞良久歎息上廉范為蜀郡太守成都民物豐盛邑宇逼側舊制禁民夜作以防火災而更相隱蔽燒者日屬范乃毀削前令但嚴使儲水而已百姓為便乃歌之曰廉叔度來何暮不禁火民安堵平生無襦今五袴上來時我單衣去時重五袴華陽志岑熙為東郡太守招聘隱逸與參政事無為而化視事二年輿人歌之曰我有枳棘岑君伐之我有蟊賊岑君遏之狗吠不驚足下生氂含哺鼓腹焉知凶災我喜我生獨丁斯時美矣岑君於戲仁慈華嶠書陳臨為蒼梧太守有人遺腹子報父怨捕得繫獄臨傷其無子令其妻入獄遂產得男人歌之曰蒼梧陳君恩廣大令死罪囚有後代德參古賢天報施冊蒼梧府君惠及死能令死人不絕志吏皆孝友張霸字伯饒為會稽太守舉賢士勸請教授一郡慕化但聞書聲又野無遺寇民語曰城上烏嗚哺父母府中諸吏皆孝友益郡耆舊傳永建中泰山吳資元約為巴郡太守屢獲豐年民歌之曰習習晨風動澍雨潤乎苗我后䘏時務我民以優饒及資遷去民人思慕又曰望倏忽不見惆悵嘗徘徊恩澤實難忘悠悠心永懷華陽志桓帝時河南李盛仲和為郡守貪財重賦國人刺之曰狗吠何諠諠有吏來在門披衣出門應府記欲得錢語窮乞請期吏怒反見尤旋步顧家中家中無可與思往從鄰貸鄰人以言遺錢錢何難得令我獨憔悴上黃香為魏郡太守郡舊有內外園田常與人分種收穀歲數千斛香曰田令商者不農王制仕者不耕伐冰食祿之人不與百姓爭利乃悉以賦人課令耕種後漢二珪琬琰趙瑤字元珪琰字稚珪凡七兄弟犍為太守宣子也皆以令德著聞瑤少有公望瑤始為緱氏袁趙二公相與書曰趙瑤在緱氏猛虎歸迹百里均耳叔平何難遷扶風太守徙蜀郡司空張溫謂之曰昔第五伯魚徙蜀郡為司空今掃第五以待足下矣琰始為青州刺史部下清肅華陽志蔣滿為上黨太守長子萬為北地都尉次子輔為安定太守滿與俱知名並見徵用時徵為二千石者十三人俱引見萬退却不敢與父並詔譴問謁者曰何以不齊左右曰此乃父子也宣帝歎息曰乃父子剖符耶即先詔曰上黨太守滿經行篤著信行山東其以滿為淮陽王相誨導東藩弘農股肱郡其以萬為弘農太守父子同日拜於前上嘉之漢雜事郭丹字少卿南陽穰人太守杜詩請為功曹丹薦鄉人長者自代而去詩乃歎曰昔明王興化卿士讓位今功曹推賢可謂至德勑以丹事編署黃堂以為後法後黃堂太守之廳事註吳郡平江太守所居之堂即春申君之子為候君之殿也因數失火塗以雌黃故曰黃堂郡國志王閎遷荊州刺史閎性刻不發私書不容豪族賓客號曰王獨坐謝承書能安叛夷何祗字君肅汶山夷不安以祗為汶山太守民夷服信遷廣陵後夷反叛辭曰令得前何府君乃能安我耳時難復屈祗挾族人為之汶山復得安益部耆舊司馬勝之字興先清尚虛素郡請察孝廉歷廣都新繁令政理尤異以清秀徵以疾辭去職即家拜漢嘉太守候迎盈門固讓不之官閉居清靜謙卑自牧常言世人不務求道德而汲汲於爵祿若吾者可少以為有餘榮矣訓化鄉閭以恭敬為先華陽志王濬字士治為廣漢太守夜夢懸三刀於臥屋梁上須臾又益一刀濬驚覺意甚惡之主簿李毅再拜賀曰三刀為州字又益一者明府其臨益州乎及賊張宏殺益州刺史皇甫晏果遷濬為益州刺史晉書濬常夢得三口刀人以禾益之手持不得以問郡丞與掾史莫能知毅對曰吉祥也三刀者州字而益之禾持不得禾傍失者秩字明府秩當至益州濬笑曰如卿言當相以為秀才華陽志濬之在已郡也夢懸四刀於其上心甚惡之陸機晉武紀爰宗為新城太守南界有刻石爰至其下醼有人於石下得剪刀者眾咸異之主簿對曰昔長沙桓王嘗餞飲孫洲父老云此洲狹而長君當為長沙事果應夫三刀為州今得交刀君亦當為州後果作交州世說吳富春縣有沙漲武烈為郡吏赴府鄉人餞之會於沙上父老曰此沙狹而長君後當為長沙太守後果然因名孫洲吳錄地理志武烈堅也長沙桓王策也世說誤江祚為安南太守民思其惠生子多以江名子別傳孟宗為豫章太守人思其惠路有行歌故時人之生以孟為名別傳鳴琴元康六年尚書吏部郎汝南李光彥遷汲郡太守都亭侯江夏李茂曾遷平陽太守此二子皆弱冠知名歷職顯要旬月之間繼踵名郡離險劇之勤就放曠之逸枕鳴琴以侯遠政離別之際各斐然賦詩潘尼二李詩序應詹字思遠為南平太守時天下分崩詹獨保境外攘狂狡內除塗炭甚便百姓之情郡人歌曰亂離既普殆為灰朽僥倖之運賴茲應后歲寒不凋孤境獨守拯我塗炭惠隆丘阜潤同江海恩獨父母尋與陶侃破杜弢於長沙賊中金寶溢目詹一無所取唯收圖書莫不歎之遷益州刺史詹之出郡也士庶攀車號泣若戀所生晉書祖逖為豫州刺史尅已務施不畜資財喪亂之餘化也前漢張寬字叔文蜀承秦後質文刻野太守文翁遣寬詣愽士東受七經還以教授於是蜀學比於齊魯巴漢亦化之景帝嘉之命天下郡國皆立文學由文翁倡教蜀為之始也華陽國志始文翁立文學精舍講堂作石玉室永初後堂遇火太守陳留高䀢統志作朕更修立又增造二石室上始作禮殿以祀先聖周公畫三皇五帝七十二子及三代兩漢君臣像於殿壁志汲黯為東海太守治官好清靜擇丞史任之責其大指而已不細苛黯素多病臥閣內不出歲餘東海大治召為淮陽太守黯辭之上曰君薄淮揚邪吾今召君矣顧淮揚吏民不相得吾徒得君重臥而治之乃行上黃霸字次公為潁川太守宣帝詔居官賜車蓋特高一丈別駕主簿車緹油屏泥於軾前以章有德霸米鹽靡密初若煩碎然霸精力能推行之吏民見者語次尋繹問它陰伏以相參考識事聰明咸稱神明姦人去入它郡盜賊日入霸力行教化而後誅罰務在成就全安嘗曰凡治道去其太甚者耳霸以外寬內明得吏民心戶口歲增治為天下第一前後八年郡中愈治是時鳳凰神爵數集郡國潁川尤多天子以霸治行終長者下詔稱揚曰潁川太守霸宣布詔令百姓鄉化孝子弟弟貞婦順孫日以眾多田者讓畔道不拾遺養親鰥寡瞻助貧窮獄或八年亡重罪囚吏民鄉于教化興延之甚怨恨乃作五君詠以述竹林七賢山濤王戎以貴顯被黜詠嵇康云鸞翮有時鈠龍性誰能馴詠阮籍云物故不可論途窮能無慟詠阮咸云屢薦不入官一麾乃出守詠劉伶云韜精日沈飲誰知非荒宴此四句蓋自序也南史守郡謂之建麾蓋用顏延年一麾乃出守之句不知其悞也延年謂一麾之麾如武王右秉白旄以麾之麾耳延年贈始平詩云屢薦不入官一麾乃出守謂山濤薦咸為吏部郎三上而武帝不用其後一擠遂出始平故有此句延年被擯以此自托爾後杜牧之為登樂遊原詩云擬把一麾江海去樂遊原上望昭陵遂為故事古今詩話謝靈運好學博覽文章之美江左莫逮自謂才能宜參權要既不見知常懷憤憤少帝即位權在大臣徐羨之等出為永嘉太守郡有名山水靈運素所愛好出守既不得志遂肆意遊遨遍歷諸縣動踰旬朔民間聽訟不復關懷所至輒為詩詠以致其意焉宋書王僧達為宣城太守性好游獵而山郡無事僧達肆意馳騁或五日三日方歸受辭辨訟多在獵所人或逢不識問府若所在僧達曰在近南史謝朏字敬仲永明中為義興太守在郡不省雜事悉付紀綱曰吾不能作主者吏但能作太守耳後為吳興太守弟𤅢時為吏部尚書朏至郡致𤅢數斛酒還書曰可力飲此勿豫人事朏居郡每不理常務聚歛眾頗譏之亦不屑也子諼為東陽內史及還五官選錢一萬止留一百答曰數多劉寵更以為愧上晉陵韋朗邵家在延陵元嘉初忽見庭前井中有一人出高長尺許被帶組甲麾伍相應相隨出門良久乃盡朗兄藪頗善占筮常云吾子弟當至刺史朗歷青廣二州異苑蒲鞭崔景貢守平昌有惠政常懸一蒲鞭而未嘗用上夏侯詳為湘州刺史詳善吏事在州四載為百姓所稱州城南臨水有峻峰舊傳云刺史登此山輒代由是歷政莫敢至詳於其地起臺榭延僚屬以表損挹之志南史夏侯夔字季龍詳子也為豫州刺史兄亶字世龍先經此任至是夔又居焉兄弟並有恩惠於鄉里百姓歌曰我之有州頻得夏侯前兄後弟布政優優上劉之遴字思貞徐南郡太守武帝謂曰卿母年德並高故令卿衣錦還鄉盡榮養之理弟之亨字嘉會代之遴為南郡太守上問朱异曰之亨代兄喜不兄弟因循豈直太馮小馮而已又謂尚書令何敬容曰荊州長史南郡太守皆是僕射出入今者之亨便是九轉在郡有異績吏人稱之卒荊土懷之不復稱名號為大南郡小南郡上王承字安期為東陽太守政存寬惠吏人悅之承性簡貴有風格右衛朱异當朝用事每休下車馬填門有魏郡申英者門寒才俊好危言高論以忤權右當指异門曰此中輻湊皆為利往能不至者惟大小王東陽耳小東陽即承弟幼也時唯承兄弟及禇翔不至异門世並稱之上年少太守張緬字元長年數歲外祖中山劉仲德異之曰此兒非常器非止為張氏寶方為海內令名也起家祕書郎出為淮南太守時年十八武帝疑其年少未閑吏事遣主書封取郡曹文案見其斷決允愜甚稱賞之累遷豫章內史緬為政任恩惠不設鉤鉅吏人化其德亦不敢欺故老咸云數十年未有也上荀羡字令則為徐州刺史時年二十中興方伯未有如羡少者晉中興書任昉為吳興太守在郡所得奉秩五分督一餘者悉原兒妾食麥而已友人到溉溉弟洽從昉共為山澤游及被代至都無衣沈約遣裙衫迎之再為新安太守在郡不事邊幅率然曳杖徒行邑郭人通辭訟者就路決焉為政清省吏人便之卒於官唯桃米花米二十石無以為歛闔境痛惜百姓共立祠堂於城南歲時祠之南史裴邃字深明為廣陵太守左遷始安太守邃志立功邊垂不願閑遠乃致書於呂僧珍曰昔阮咸顏延有二始之歎吾才不逮古人今為三始非其願也將如之何後為竟陵太守開置屯田公私便之上謝覽字景滌為吳興太守中書舍人黃睦之家居烏程子弟專橫前太史皆折節事之覽未到郡睦之弟迎覽覽逐去其船杖吏為通者自是睦之家杜門不出郡境多劫為東道患覽下車肅然初齊明帝及覽父𤅢東海徐孝嗣並為吳興號為名守覽皆過之上王規字威明為吳郡太守主書芮珍宗家在吳前守宰皆傾意附之至是珍宗假還規遇之甚薄珍宗還都密奏規不理郡事俄徵為左戶尚書郡境千餘人詣闕請留表三奏不許求於郡樹碑許之上元淑字買仁彎弓三百斤善騎射孝文時為河東太守河東俗多商賈罕事農桑人至有年三十不識耒耜淑下車勸課躬往教示二年間家給人足為之謠曰泰州河東杼柚代舂元公至止田疇始理有七子季海字元泉兄弟中最有名譽位洛州刺史季海妻司空李冲之女莊帝從母也政在爾朱禍難方始勸季海為外官以避纖介及孝莊之難季海果以在藩得免北史元孚字秀和少有令譽崔光等咸曰此子當準的人物拜荊州刺史孚勸課農桑境內稱慈父鄰州號曰神君先是州人張孟都張洪建馬潘崔獨憐張叔緒崔醜張天宜崔思哲等八人皆屯保林野不臣王命州郡號曰八王孚至皆請入城願致死效力上陸馛俟長子也多智有父風高祖見而悅之謂朝臣曰吾嘗歎其父智過其軀是復踰於父矣為相州刺史假長廣公為政清平抑強扶弱州中有德宿老名望素重者以友禮待之詢之政事責以方略如此者十人號曰十善於是發姦摘伏事無不驗百姓以為神明無敢劫盜者徵為散騎常侍百姓乞留馛者千餘人獻文不許謂群臣曰馛之善政雖古人何以加之馛之代還也吏人大歛布帛以遺之馛皆不受人亦不取於是以此物起佛寺焉因名長廣公寺上房景伯字良暉為清河守郡人劉簡武曾失禮於景伯聞其臨郡闔家逃亡景伯督切屬縣追捕禽之即署其子為西曹掾令喻山賊賊以景仁不念舊惡一時俱下論者稱之上韋叔裕字孝寬普泰中從荊州刺史源子恭鎮穰城以功除浙陽郡守時獨孤信為新野郡守同隸荊州與孝寬情好款密政術俱美荊部吏人號為連璧上大小鄭公鄭述祖字恭文少聰敏有風檢為先達所稱齊天保中為兗州刺史時穆子容為巡省使歎曰古人有言聞伯夷之風貪夫廉懦夫有立志今之鄭兗州見之矣遷光州刺史初祖述父為兗州於鄭城南小山起齋亭刻石為記述祖時年九歲及為刺史往尋舊迹得一破石有銘云中岳先生鄭道昭之白雲堂述祖對之嗚咽悲動群僚有人入市盜布其父怒曰何負吾君執之以歸首祖述特原之自是境內無盜百姓歌曰大鄭公小鄭公相去五十載風教猶尚同上李延實莊帝舅也除青州刺史帝謂實曰懷磚之俗世號難治舅宜好用心副朝廷所委實答曰臣年迫桑榆氣同朝露夜行罪人裁錦萬里謹奉明勑不敢失墜時門下侍郎楊寬在帝側不曉懷磚之義私問舍人溫子昇曰聞彭城王作青州刺史問其賓客從至青州云齊土之民風俗淺薄太守初欲入境皆懷磚扣首以見其意及其代下還家以磚擊之言其向背速於反掌是以京師謠語曰獄中無繫囚舍內無青州假令家道惡腹中無懷愁懷磚之義起在於此也伽藍記南安王元稹出為相州刺史五月至鄴上日暴風大雨凍死者數十人是月疽發背薨孫熙後授相州以七月上其日大風寒雨凍死者二十餘人驢馬數十匹熙聞其祖父前事心惡之起兵討元義遂被殺北史房豹字中幹為樂陵太守風教修理稱為致政郡瀕海水味多鹹苦豹命鑿一井遂得甘泉遐邇以為政化所致豹罷歸後甘味復鹹上裴俠字嵩和為河北郡守俠躬履儉素愛人如子所食唯菽麥塩菜而已吏人莫不懷之歌曰肥鮮不食丁庸不取裴公貞惠為世規矩俠嘗與諸牧守俱謁周文周文命俠別立謂諸牧守曰裴俠清慎奉公為天下之最令眾中有如俠者可與之俱立眾皆默然無敢應周文乃厚賜俠朝野服焉號為獨立使君上孔奐字休文除晉陵太守自宋齊以來為大郡雖經寇擾猶為全實前後二千石多行侵暴奐清白自守妻子並不之官唯以單船臨郡所得秩俸隨即分贍孤寡郡中號曰神君曲阿富人殷綺見奐居處儉素乃餉以衣氈一具奐曰太守身居美祿何為不能辦此但百姓未周不容獨享溫飽勞卿厚意幸勿為煩陳書梁彥光字修芝隋初為岐州刺史甚有惠政轉相州彥光前在岐州其俗頗質以靜鎮之合境大安奏課連最為天下第一及居相部如岐州法鄴郡雜俗人多變詐為之作歌稱其不能理政上問而譴之竟坐免歲餘拜趙州刺史彥光言於志曰臣前待罪相州百姓呼為戴帽𩛿臣自分廢黜無復衣冠之望不謂天恩復加收採臣請復為相州改絃易調庶有以變其風俗上從之復為相州刺史豪猾者聞彥光自請而來莫不嗤笑彥光下車發摘奸隱有若神明狡猾莫不潛竄於是合境大駭隋書分紀作戴帽餳片蓋誤讀臣字耳樊子蓋字華宗為武威太守以善政聞煬帝詔曰龔汲振德化于前張杜垂清風于後子蓋操履清潔撫導有方處腸膏不潤其質酌貪泉豈渝其性車駕西巡及還謂之曰人道公清定如此不子蓋謝曰臣安敢言清止是小心不敢納賄耳由此賜之口味百餘斛上薛大鼎為滄州刺史州界有無棣河隋末埴廢大鼎奏開之引魚塩於海百姓歌之曰新河得通舟楫利直達滄海魚塩至昔日徒行今騁駟美哉薛公德滂被大鼎又以州界卑下遂決長蘆及漳衡等三河分洩夏潦境內無復水時與瀛州刺史賈敦頤曹州刺史鄭德本俱有美政河北稱為鐺腳刺史舊唐武后長安四年納言李嶠同平章事唐休璟奏曰竊以物議重內官而輕外職凡所出守多因貶累非所以澄風俗安萬人臣請擇才於臺閣省寺之中分典大州共康庶政臣等請輟近侍率先具寮太后乃令書名採之中者當行於是鳳閣侍郎韋嗣立御史大夫楊再思等二十人中之皆以本官檢校刺史後二十人內以政績可稱者獨常州刺史薛光謙徐州刺史司馬鐘二人而已通典開元十一年山東旱儉朝議選朝臣為刺史以撫貧民仍重諸侯之選於是以黃門侍郎王丘為懷州刺史又以中書侍郎崔沔等數人皆為山東諸州刺史至任皆無可稱唯丘在職清嚴人吏甚畏慕之舊唐知頓最裴耀卿字煥之開元十三年為濟州刺史其年車駕東巡州當大路道里綿長而戶口寡弱耀卿躬自條理置三梁十驛科配得所時大駕所歷凡十餘州耀卿稱為知頓之最封禪還次宋州宴從官帝歡甚謂張說曰前日出使巡天下觀風俗察吏善惡不得實今朕有事岱宗而懷州刺史王丘餼牽外無他獻我知其不市恩也魏州刺史崔沔遣使供帳不施錦繡示我以儉此可以觀政也濟州刺史裴耀卿上書數百言至曰人或重擾即不足以告成朕置書座右以自戒此其愛人也新舊齊澣字洗心為汴州刺史河南汴為雄郡自江淮達于河洛舟車輻輳人庶浩繁前後牧守多不稱職唯倪若水與澣皆以清嚴為治民吏歌之玄宗封泰山歷汴宋許車騎數萬王公妃主四夷君長馬橐它亦數萬所頓彌數十里澣列長棚帟幕聯亘上食凡千轝納筦鑰身進膳帝以為知禮喜甚為留三日賜帛上權懷恩為宋州刺史以威明御下人皆重足而立時汴州刺史楊德幹亦以嚴肅與懷恩齊名至是懷恩路由汴州德幹送之出郊懷恩見新橋中途立木以禁車過者謂德幹曰一言處分豈不得何用此為德幹大慚時議以為不如懷恩也舊盧奐為陜州刺史嚴毅之聲聞於關內玄宗幸京師次陜城頓知奐有神政御筆贊於廳事曰專城之重分陜之雄仁雖惠愛性實冲謙亦既利物在乎匪躬斯為國寶不墜家風陜州之民多有淫祀者州之士民相語曰不須賽神明不必求巫祝爾莫犯盧公立便有禍福天寶遺事天寶初為南海太守南海兼水陸都會物產瓌怪前守劉巨鱗彭杲皆以贓敗故以奐代之汙吏歛手中人之市舶者亦不敢干其法遠俗為安時謂自開元後四十年治廣有清節者宋璟李朝隱盧奐三人而已新唐新書裴伷先為廣州都督舊書廣府清白者有云四謂宋與伷先朝阻及奐此止云三何也張開為荊州刺史至郡界風兩瞑晦不辨面目唯聞空中有殿喝之聲相次雲中有衣紫披甲胄者十數人開問其故對曰某荊州內外所主之神久仰使君令名故相率迎引到任謁廟後各致祭謝及建飾廟貌自此政譽尤善也開元遺事顏真卿為平原太守安祿山逆節頗著真卿以霖雨為托修城浚濠陰科丁壯儲廩食乃陽會多士泛舟於池飲酒賦詩或讒於祿山祿山亦陰傎之以為書生不足虞也無幾祿山果反河朔盡陷獨平原城守具備乃使兵司參軍李平馳奏之玄宗初聞祿山之變歎曰河北二十四郡豈無一忠臣乎得平來大喜顧左右曰朕不識顏真卿形狀何如人所為乃如此唐書蕭定字梅臣為袁州刺史歷信湖宋睦潤五州刺史所涖有政聲大曆中有司條天下牧守課績唯定與常州刺史蕭復豪州刺史張鎰為理行第一其勸農桑均賦稅逋亡歸復戶口增加定又冠焉舊黃人二歌唐乾元二年贊善大夫左振出為黃州刺史下車黃人歌曰我欲逃鄉里我欲去墳墓左公今既來誰忍棄之去後一歲又歌云吾鄉有鬼巫惑人人不知天子正尊信左公能殺之元次山集薛玨字溫如為楚州刺史本州營田使先是州營田宰相遙領使刺史得專達俸錢及他給百餘萬田官數百員奉厮役者三千戶歲以優授官者復十餘人玨皆條去之十留一二而租入有贏為觀察使誣奏左授陜州刺史遷陳州刺史建中初上分命使臣黜陟官吏淮南李承以玨楚州之去煩政簡使山南趙贊以玨陜州之廉清使淮南盧翰以玨之肅物皆以陟狀聞加秩賜紫舊陽城字亢宗出為道州刺史治民如治家宜罰罰之宜賞賞之不以簿書介意月俸取足而已州產侏儒歲貢諸朝城哀其生離無所進帝使求之城奏曰州民盡短若以貢不知何者可供自是罷州人感之以陽名子新舊作矮奴指大官王宗鉥為晉州刺史有海客鬻龍腦邀價倍常宗鉥令持錦被過其客觀之因目從者挈其龍腦餅去又令牙儈市二伎年各十六其直三十二緡宗鉥納之呼一老婢謂儈曰此年已五十直五十千償一伎外尚餘十八千買布褥被一幅重十斤令於酒坊取舊麻繩十五斤而償之百姓相視而笑宗鉥曰小民得五斤利便喜吏民列訴責維州司戶外史禱杌宗鉥責維州司戶參軍問吏曰參軍何官衣何服吏曰下州判司綠衫槐笏而已宗鉥大笑絕倒曰若頭便斬去吾何能作措大官耶九國志孟蜀左丞歐陽彬衡山人博學能文泉以為嘉州刺史喜曰青山綠水中為二千石作詩飲酒為風月主人豈不喜哉蜀檮杌澤州奏前刺史史延韜離州為軍民遮圍不放出城兼截下馬鐙其史延韜經三日後夜開城門越闕薛史謝傑為高州刺史境多虎夜入郭中為暴人不安居傑一日沐浴謁城隍廟舉酒神前曰愚民何辜而虎暴之蓋刺史無德化願虎只食刺史無傷愚民因屏左右獨宿殿庭中是夜三鼓廟東南隅忽有物咆哮其聲如雷良久乃止遲明視之數虎悉斃九國志李大蟲楚李瓊為桂州刺史魁岸多力每食肉十餘斤据按大嚼耽耽然軍中號曰李大虫先是桂州兒童聚錢衢路忽相驚走曰大虫來至是果應上照天蠟燭田元均治成都有聲人有訴訟其懦弱不能自伸者必委曲問之蜀人謂之照天蠟燭又謂之不錯事尚書東齋記事吳越儇鎮永嘉百姓悅慕及移姑蘇溫人有攜家屬以從者謂之隨使戶五代史祥符九年邵曄知廣州鑿內河通舟颶不為害陳世卿代之奏免廣南口塩廣人歌曰邵父陳母除我二苦秦兼天下改州牧為刺史朱明之時則出巡行封部玄英之月則還詣天府表奏刺史言其刺舉不法者之使也交廣記禮天子六馬左右驂三公九卿駟馬左驂漢制九卿則二千石亦右驂太守駟馬而已其有加秩中二千石乃右驂故以五馬為太守美稱遁齋閒覽與學林云漢使朝臣出使為太守增一焉故曰五馬潘子真詩話昔人用五馬事多因游遨動出處方用之如老杜賦王閬州餞蕭遂州云二天開寵餞五馬爛生花其賓主出住分矣又送李梓州五馬何時到贈嚴武五馬舊曾諳小徑送賈閣老出汝州人生五馬貴太白云五馬莫留連岑參云門外不須催五馬戎昱五馬幾時朝魏闕子厚五馬助征騑樂天五馬無由入酒家近人於太守安居閉閣例稱五馬於理恐未安也丹陽集隼旟熊軾隼飛旟上熊伏軾前皁蓋分輝彤幨耀彩記室新書州宰高季通秩映隼旟榮參熊軾徐游蓺碑銅虎漢文帝二年初與郡守為銅虎符竹使符紀任彥升表分虎出守以囊被見嗤選于頔制累政臺郎遂分符守唐大詔令景帝詔曰夫吏者民之師也車駕衣服宜稱吏六百石以上皆長吏也令長吏二千石車朱兩轓千石至六百石朱左轓紀二千石皆皁蓋朱兩轓後輿服志太守專郡信理庶績勸農賑貧決訟斷辟興利除害檢察詳奸舉黜惡誅殺殘暴者也漢書解詁佐守秦置郡丞以佐守在邊為長史掌兵馬漢景帝置郡丞黃綬武帝元朔六年改名長史為京兆尹置丞元帝時丞相于定國條州大小為設吏員治中別駕諸郡從事漢官儀隋改別駕治中為長史司馬煬帝罷之而置郡贊治又改為丞武德初改曰別駕高宗改為長史周防字偉公年十六任郡小吏世祖巡狩汝南召掾史試經防尤能誦讀拜為守丞防以未冠請去師事徐州刺史蓋豫明經舉孝廉拜郎中汝南先賢傳雌伏趙溫字子柔初為京兆郡丞歎曰大丈夫當雄飛安能雌伏遂棄官去後柳儉字道約為弘農太守儉清節愈勵大業五年入朝郡國畢集帝謂納言蘇威吏部尚書牛弘曰其中清名天下第一者為誰威等以儉對帝又問其次威以涿郡贊務郭絢潁川贊務敬肅等二人對帝各賜絹令天下朝集使送至郡邸以旌異焉論者美之北史郭絢歷數州司馬長史皆有能名煬帝將有事於遼東以涿郡為衝要訪可任者聞絢有幹局拜涿郡丞吏人悅服隋敬肅字弘儉少以貞介知名歷長史司馬俱有異績煬帝嗣位遷潁川郡丞大業五年朝東都帝令司隸大夫薛道衡為天下群官之狀道衡狀稱肅曰心如鐵石老而彌篤上張允濟為武陽令政績尤異遷高陽郡丞時無郡將允濟獨統大郡吏人畏悅及賊帥王湏拔攻圍時城中糧盡吏人取槐葉藁節食之竟無叛者舊㧾錄眾事別駕從事校尉行部引總錄眾事續漢志漢制別駕從事史一人從刺史行部別乘一乘傳車故謂別駕題輿周景為豫州辟陳蕃為別駕不就景題別駕輿曰陳仲舉座也不復更辟蕃惶懼起視職謝承書以諫爭不合投傳而去本傳陳茂豫州刺史周敞辟為別駕從事與俱行部到頴川陽翟傳舍傳中有置美酒一柙者敞勑御騶載酒以行茂見於外取柙擊柱破之敞問茂刺史年老酒益氣別駕破柙亦何益茂答曰所過皆有以名使君傳車騑驂載酒非宜也謝承書屏星孔恂字巨卿新塗人也為別駕車前後舊有屏星如刺史車曲翳儀式時刺史行部因怒命之恂曰明使君撤去屏星毀國舊儀此不可行別駕可去屏星不可省即投傳而去豫章列士傳袁紹領荊州以審配為別委以心腹并總幕府紹又以田豐為別駕勸迎天子紹不納及後敗曰吾慚田別駕後王祥徐州刺史呂處檄為別駕祥乃應呂處委以州事于時寇盜充斥祥率勵兵士頻討破之州界清靖政化大行時人歌之曰海斥之康實賴王祥邦國不空別駕之功晉書江統字應元太傅東海王越為兗州牧請君為別駕與君書曰昔王子師作豫州未下車辟荀慈明下車辟孔文舉貴州人士有堪應此者不君舉高平郗道微為賢良陳留阮宣子為直言濟北程弘叔為方正皆於時選為允家傳顧和字君孝總角知名族人顧榮雅相器愛曰此吾家之騏驥也必振衰族時宗人顧球為揚州別駕顧榮謂球曰卿速步公孝如是超卿矣別傳別駕舊與刺史別乘同宣王化於萬里者其任居刺史之半安可任非其人庾亮答郭豫書益州刺史李貌微時居漢川與別駕姜顯餞送刺史顯忽貌貌曰大丈夫何至守偏地為姜顯所陵即不復還家仍附船下自是十五年而鎮梁漢顯猶栖遲檄為別駕續晉安帝紀江左之秀羅含字君章桓宣武辟為別駕以官廨諠擾於城西池小洲上立茅茨伐木為床織葦為蓆布衣蔬食晏若有餘桓公嘗謂眾坐曰此自江左之清秀豈唯荊楚而已含自在官舍有一白雀棲集堂宇及致仕還家階庭忽蘭菊挺生豈非至行之徵邪別傳見牋馳喚桓玄下都羊孚時為兗州別駕從京來詣門牋云自頃世故暌離心事淪蘊明公啟晨光於積晦澄百流以一源桓見牋馳喚前云子道子道來何遲即用為記室參軍世說王翰為汝州長史徙仙州別駕日與才士豪俠飲樂游畋伐鼓窮歡坐貶道州司馬新孔若思為衛州刺史故事以宗室為州別駕見刺史驁放不肯致恭若思劾奏別駕趙道欽請訊狀有詔別駕見刺史致恭漢治中治中從事史一人居中治事主眾曹文書漢制也通典司隸功曹從事即治中也漢儀別駕亦曰治中從事白帖陳禪為州治中從事時刺史為人苛刻受納贓賄禪當傳拷乃至笞掠無筭五毒畢加神意自若辭對無變事遂釋謝承書龐統以從事守耒陽令不治免官魯肅遣先主書曰龐士元非百里之才使處治中別駕之任始當展其驥足耳乃以為治中蜀志柳宗字伯騫為治中與人交結久而益親其所拔進皆世所稱致位牧守鄉里為之語曰得黃金一笥不如柳伯騫所識益部耆舊傳張彥字伯春為治中從事刺史每坐高床治中單席於地上唐彬檄為治中別駕忠肅公亮匡救違闕盡規誨以納善不顯諫以彰主當朝正色焉王隱晉書車胤字武子風姿美劭機悟敏率桓溫在荊州取為從事一歲至治中胤既博學多聞又善于激賞當時每有盛坐胤必同之皆云無車公不樂太傅謝公遊集之日開筵以待之續晉陽秋習鑿齒少博涉才情透逸桓溫奇之自州從事歲中三轉至治中晉記鑿齒史才不常溫器之未三十用為荊州治中謝牋曰不遇明公荊州老從事耳世說陸閑字遐業為齊始安王遙光揚州治中遙光作亂以綱佐不去被殺子襄字師卿為揚州治中襄父終此官固辭職高祖不許聽與府司馬換廨居之梁書南作別駕洛陽主人趙肅字慶雍洛陽人也早有操行知名於時大統三年獨孤信東討肅率宗人為鄉導授司州治中轉別駕監督糧儲軍用不匱周文帝聞之謂人曰趙肅可謂洛陽主人也周書唐以堂吏朱儉廉為華州別駕給事中蕭倣駁曰別駕古為治中從事秩六百石與刺史別乘同宣教化任居刺史之半豈宜以人吏兼副改之名續通典上佐別駕長史司馬通謂之上佐職源衛永君長為溫公長史溫公甚善之每率爾提酒脯就衛箕踞相對彌日衛往溫許亦爾世說王長史廞登茅山大慟哭曰琅邪王伯輿終當為情死上孔休源字慶緒為晉安王府長史南蘭陵太守別敕專行南徐州事休源累佐名藩甚得民譽王深相倚仗軍民機務動止詢謀常於中齋別施一榻云孔是孔長史坐人莫得預焉梁書崔敬嗣為房州刺史中宗為廬陵王安置在州官吏多無禮獨敬嗣以親賢待之供給豐贍中宗深德之及登位有益州長史崔敬嗣既同姓名每進擬御筆超拜者數四後引與語方知誤寵訪敬嗣已卒乃授其子注官張說字道濟睿宗即位遷中書侍郎雍州長史景雲初譙王重福於東郡搆逆而死留守捕繫被黨經時不決睿宗令說往按其獄一宿捕獲重福謀主張靈的鄭愔等盡得其情狀其餘被枉繫禁者一切釋放睿宗勞之曰知卿按此獄不枉良善又不漏罪人非卿忠正豈能如此舊李皋字子蘭為溫州長史攝行州事行縣見一媼垂白面泣哀而問之對曰李氏之婦有二子鈞鍔宦遊二十年不歸貧無以自給時鈞為殿中侍御史鍔為京兆府法曹俱以文藝登科名重於時皋曰入則孝出則悌行有餘力然可以學文若二子者豈可備於列位由是舉奏並除名勿齒改處州別駕行州事以良政聞徵拜衡州刺史上謝奕字無奕桓溫辟為司馬奕既上猶推布衣交在溫坐岸幘嘯詠無異常日宣武每曰我方外司馬遂因酒轉無朝夕禮桓舍入內奕轉復隨去後至奕醉溫往主許避之主曰君無狂司馬我何由得相見世說房恭懿為澤州司馬有異績遷荊州司馬理為天下之最文帝謂諸州朝集使稱為勸勵之首以為上天宗廟之所祐助豈朕寡薄能致下詔曰荊州司馬房恭懿出宰百里毗贊二藩善政能官標映倫伍遷海州刺史隋書善政能官韋安石為永昌令并州司馬則天子制勞之曰文卿在彼善政表於能官明仁彰於鎮撫如此稱職甚慰朕懷俄拜并州刺史世說袁誼神功中為蘇州刺史嘗因視事司馬清河張沛通謁沛即侍中文瓘之子誼揖之曰司馬何事沛曰此州得一長史是隴西李亶天下甲門誼曰司馬何言之失門戶須歷代人賢名節風教為衣冠顧矚始可稱舉此老夫是也夫山東人尚於婚媾求於祿利作時柱石見危授命則曠代無人何可說之以為門戶沛懷慚而退時人以為口實舊有毉工崔懷自淮南小將為黃州司馬勑至省鄭餘慶執之封還以為諸道散將無故受正員五品官是開徼倖之門且無闕可供言或遇理由是稍忤時權上白居易為太子左贊善大夫會有惡於居易者摘摭居易言浮華無行其母因看花墮井而死而居易作賞花及新井詩甚傷名教不宜寘彼周行執政方惡其言事奏貶為江表刺史詔出王涯上疏論之言居易所犯狀迹不宜治郡追詔授江州司馬居易儒學之外尤通釋典常以忘懷處順為事都不以遷謫介意上五品按唐典上州司馬秩五品歲票月俸官足以庇身食足以給家州民康非司馬功郡政壞非司馬罪無言責無事憂為國謀則尸素之尤蠹者身謀則祿仕之憂穩者茍有志於吏隱者捨此官何求焉白記郡丞秦官惟掌兵馬自漢迄唐其名不常曰別駕曰司馬曰治中曰長史雖均號上佐其實從事之長耳故緹油屏軾下與主簿同賜而州牧或得辟置間以處王子及近臣之左降若起廢者其於政事罕嘗與聞邦國不空之謠宜其寥寥也周必記仁宗時中丞孫抃上言通判古監郡之職一州利害全籍論議與近下僚屬不同乞今後大臣出移藩鎮不得奏辟通判上曰州郡設通判本與知州同判一郡之事知州有不法者得舉法之今既辟除自是恩地事有不可必不執守卿言極是自今只得辟簽判一員分紀劉隨待制為成都通判嚴明通達人謂之水晶燈籠東軒筆錄胡宿通判宣州有被誣以殺人者獄成議法將抵死公疑之呼囚以訊囚憚箠楚不敢言公正衣冠坐堂上思之俄而假寐夢有人來告曰吳姓也公遽引囚辟左右復訊之囚曰旦將之由縣吏執以赴官不知其由也公取獄辭窮治乃被毆之婦與吳姦被姦者殺其夫與婦謀執平人以告也公之精誠格物如此自警編王之倅車注倅乃副車今以通判為倅者周禮太守之副職源知成都席益奏州郡置倅所以佐郡守之治入則貳政出則按縣中興會要常同劾陸寘疏云寘乃內侍王通之客為明州通判避通名改稱府判今浙東州軍有呼通判為府判自寘始高宗之歷宋初懲藩鎮之弊置通判以貳州事既非官屬故嘗與知州爭權每云我是監郡朝廷使我來監汝舉動無所制有錢昆少卿者餘杭人嗜蟹常求補郡人問其所欲昆曰但得有螃蟹無通判則可至今以為口實歸田錄青箱雜記堅正韓退之武寧節度使張建封倅府推官操行堅正鯁言無所忌唐徐州張建封又請為其賓佐舊狄兼謨字汝諧仁傑族孫也元和末解褐襄陽推官言行剛正使府知名舊辟襄陽府使剛正有祖風唐錢若水字澹成一字長卿釋褐同州觀察推官錄事嘗貸富民錢不獲因其女奴亡遂誣父子謀設而沉其屍具獄上州官審覆無異若水獨留不決久之得女奴其人傾貲飯僧為祈福自警編擊蛇孔道輔字原魯為寧州軍事推官數與州將爭事有蛇出天慶觀真武殿中一郡以為神州將帥官屬往殿拜之欲上其事道輔徑前以笏擊蛇碎其首觀者初驚後莫不歎服宋史蘇子瞻神宗召見直言無隱王安石不悅命權開封府推官將困之以事軾決斷精敏聲聞益遠上周官有縣正各掌其縣之政令而賞罰之春秋時列國相滅多以其地為縣則縣大而郡小故傳云上大夫受縣下大夫受郡縣邑之長通典魯謂之宰仲尼為中都宰是也齊謂之大夫齊威王封即墨大夫烹阿大夫是也楚謂之尹沈尹戍為方城之外縣尹是也亦謂之公葉公諸梁是也冊府凡縣萬戶以上為令減萬戶為長侯國為相秩次亦如之皆秦制也漢因之通典中牟無令晉平公問趙武曰中牟三國之股肱邯郢之肩髀寡人欲得其良令也誰使而可武曰刑伯子可公曰非子之讎也曰私讎不入公門公又問曰中府之令誰使而可曰臣子可故曰外舉不避讎內舉不避子趙武所薦四十六人及武死舍就賓位其無私德若此韓子製錦子皮欲使尹何為邑子產曰少未知可否子皮曰愿吾愛之使往而學焉子產曰吾子愛人則以政猶未能操刀而使割也其傷實多子有美錦不使人學製焉大官大邑身之所庇而使學者製之其為美錦不亦多乎左襄三十一子奇年十八齊君使之治阿既行矣悔之使使追之曰未至阿及之還之已至勿還也使者及而之不還君問其故對曰臣見所與共載者白首也夫以老者之智以少者之決必能治阿矣是以不還至阿鑄其庫兵以為農耕器出倉廩以賑貧窮阿縣大化新序子賤治單父彈鳴琴身不下堂而單父治巫馬期以星出以星入日夜不處以身親之而單父亦治巫馬期問於子賤子賤曰我任人子任力任人者佚任力者勞人謂子賤則君子矣韓詩宓子賤治單父有若見之曰子何臞也宓子曰君不知賤不肖使治單父官事急心憂之故臞也有若曰昔者舜鼓五絃歌南風之詩而天下治今以單父之細也治之而憂治天下將奈何乎故有術而御之身坐于廟堂之上有處女子之色無害于治無術而御之身雖瘁臞猶未有益韓子孔子謂宓子賤曰子治單父眾悅子何施而得之也子語丘所以為之者對曰不齊之治也父恤其子其子䘏諸孤而哀喪紀孔子曰善小節也小民附矣猶未足也曰不齊所父事者三人所兄事者五人所友事者十一人孔子曰父事三人可以教孝矣兄事五人可以教悌矣友事十一人可以舉善矣中節也中人附矣猶未足也曰此地民有賢於不齊者五人不齊事之而稟度焉皆教不齊所以治之道孔子歎曰其大者乃於此乎有矣昔堯舜聽天下務求賢以自輔夫賢者百福之宗也神明之主也惜乎不齊之以所治者小也家語所師者一人足以慮無遺策舉無敗功矣韓詩西門豹為鄴令清剋潔愨秋毫之端無私利也而甚簡左右左右固相與比周而惡之居期年上計君收其璽豹自請曰臣昔者不知所以治鄴今臣得矣願請璽復以治鄴不當請伏斧鑕之罪文侯不忍而復與之豹因重歛百姓急事左右期年上計文侯迎而拜之豹對曰往年臣為君治鄴而君奪臣璽今臣為左右治鄴而君拜臣臣不治矣遂納璽而去文侯不受曰寡人曩不知子今知矣願子勉為寡人治之遂不受韓外儲晏子治東阿事同說苑西門豹為鄴令倉無積粟府無儲錢兵甲官無計會人數言其過於文侯文侯身往行其縣果若人言文侯曰翟黃任子治鄴大亂子能變道則可不能將加誅於子西門豹曰王主富民霸主富武亡國富府庫今君欲為霸者也臣敢為績於民君以臣臣請先登鼓之甲兵粟米可立具也乃登城而鼓之致甲笴操兵弩而出再鼓服捷載粟米而出文侯曰罷之西門豹曰信非一日積也一舉而欺之其後不可復用也燕嘗侵魏入城臣請北擊之以復侵地遂舉兵擊燕復地而後反冊府昭帝時蒙人焦貢為小黃令路不拾遺囹圄空虛詔遷貢百姓揮涕守闕求索還貢天子聽增貢之秩千石貢之風化猶存其民好學多貧此其風也陳留風俗卓茂字子康為宓令勞心諄諄視人如子吏人親愛而不忍欺之數年教化大行道不拾遺平帝時天下大蝗河南二十餘縣皆被其災獨不入宓縣界督郵言之太守不信自出案行見乃服焉光武初即位先下詔曰前宓令卓茂束身自修執節淳固誠能為人所不能為夫名冠天下當受天下重賞今以茂為太傅封褒德侯後暴虎成狸鍾離意遷東平暇丘令男子倪直勇悍有力三日一飯十斤肉五斗米飯便弓弩飛射走獸百不脫一桀悖好犯長吏意到官召署捕盜掾勑謂之云令昔嘗破三軍之眾不用尺兵嘗縛暴虎不用尺繩但以良計為之爾掾之氣勢安若宜慎之因復召直子涉置門下將游徼私出入寺門無所關白收涉鞭之直走之寺門吐氣大言言無上下意勑直能為子屈者自縛謝令不則鞭殺其子直果自縛意告曰令前告汝曹縛暴虎不用尺繩汝自視何如虎自縛耶勑獄械直父子結連其頭對榜之欲死掾吏陳諫乃貸之由是相率為善所謂上德之政鷹化為鳩暴虎成狸此之謂也別傳鍾離意為堂邑令有詔徵公車縣人陳張送意到洛陽過潁陽太守問汝君與太守孰賢張曰明府之徵邑贈送者萬人男子攀車於路女子號哭於室以此觀之殆不及也彭循字子陽建武二年海賊丁儀等萬人據吳太守秋君聞循勇謀以守命循與儀相見陳說利害應時俱散民歌之曰時歲倉卒賊縱橫大戟長弩不可當賴得賢令彭子陽吳錄虞延字子大建武初除細陽令每至歲時伏臘輒休遣徒繫各使歸家並感其恩德應期而還有囚於家被病自載詣獄既至而死延率吏掾史殯于門外百姓感悅之後孔奮字君魚守姑臧長七年詔書以為奮在姑臧治有絕迹賜爵關內侯奮素孝供養至謹在姑臧唯老母極珍膳妻子飯食葱芥時人笑之或嘲奮曰置脂膏中不能自潤而奮不改其操東觀記政化仁愛鮑昱字文泉為泚陽長政化仁愛境內清淨邑人趙堅殺人繫獄其父母詣昱自言年七十餘唯有一子適新娶今繫獄當死長無種類涕泣求哀昱憐其言令將妻入獄解械止宿遂任身有子上雙鳧俗說葉令王喬有神術每月朔望嘗自縣詣臺朝帝怪其來數而不見車騎密令太史伺望之言其臨至輒有雙鳧從東南飛來於是候鳧至舉羅張之但得一隻舄焉乃詔上方診視則四年中所賜尚書官屬復也每當朝時葉門下鼓不擊自鳴聞於京師喬卒百姓乃為立廟號葉君祠牧守每班錄皆謁先拜之吏人祈禱無不如應若有違犯亦立為作祟帝乃迎取其鼓置都亭下略無復聲焉風俗通後書按左傳葉公子高忍于社稷萬民欣戴白公勝作亂子西等劫惠王以兵葉公自葉而入與國人攻白公奔山而縊生烹石乞迎反惠王整肅官司退而老于葉及其終也葉人追思而立祠功施于民以勞定國兼茲二事固祀典之所先也此乃春秋之時何有近孝明乎國家畏天之威思求譴告故于上西門城上候望近太史寺令丞躬親靈臺位國之賜懼有得失所參之也何有伺一飛鳧遂建其處乎世之矯誣豈一事哉風俗通此皆應劭說也范書愛奇遺其通義後人據以為縣令事矯誣抑又甚矣明帝臨觀見洛陽令車騎意河南尹及至而非尤其太盛勑去軒綏時偃師長治有能名以事詣臺因取賜之下縣遂以為故事漢官儀元和二年詔曰安靜之吏悃愊無華日計不足月計有餘如襄城令劉萬吏人同聲謂之不煩雖未有他異斯亦殆近之矣紀魯恭字仲康為中牟令政有三英蟲不犯境化及鳥獸豎子有仁心河南尹袁安美其治以勵屬縣是歲嘉禾生恭便坐廷中恭謙不矜功封以言府府即奏上尹以檄勞曰君以名德久屈中牟物產之化流行天降休瑞應行而生尹甚嘉之續漢書神筭王渙字稚子初為河內溫令路不拾遺臥不閉門民歌之曰王稚子世未有平徭役百姓喜華陽志拜洛陽令以平正居身得寬猛之宜又能以譎數發摘奸伏京師稱嘆以為有神筭後書元興元年卒百姓痛哭二縣弔祭行人商旅莫不祭之賈胡左威遭其清理制服三年洛陽弦歌之為立祠天子悼惜每下詔書德令必賜後嗣志延熹中桓帝事黃老道悉毀諸房祀唯特詔密縣存故太傅卓茂廟洛陽留王渙祠焉後漢羅衡字仲伯為不韋茂陵令治化浹洽徙西城閬中令號時明宰衡為萬年令路不拾遺人家牛馬皆繫道邊曰屬羅公三府爭辟拜廣漢長二縣皆為立祠華陽志閻憲字孟度為綿竹令以禮讓為化民莫敢犯男子杜成夜行得遺物一囊中布錦二十五疋求其主還之曰縣有明君何敢負其化童謠歌曰閻尹賦政既明且昶去苛去辟動以禮讓遷屬郡民泣涕送之以千數上方儲字聖明為洛陽令功曹竇憲客為憲所諷汝殺人斷頭着奩中置廄門下欲令儲去官儲摩死者耳邊問誰所殺有頃曰死人言為功曹所殺收功曹栲扭具服謝承書建寧中李翕為沔池令治殽嶔之道有黃龍白鹿之瑞其後守武都又有嘉禾甘露木連理之祥人皆圖畫其像刻石翕之於西狹頌側南豐金石錄跋繁陽令楊君富波相牧之子震孫也遭叔父太尉秉薨委榮輕舉吏民攀轅守闕上書運穀萬斛助官賑貧以乞君還集古錄袁遺字伯業紹從兄為長安令河間張超嘗薦遺於太尉朱雋稱遺有冠世之懿幹時之量其忠允亮直固天所縱若乃包羅載管綜百氏登高能賦覩物知名求之今日邈焉靡儔超集曹公稱長大而能勤學者惟吾與袁伯業耳英雄記胡紹為河內懷令三日一視事十日一詣倉受俸米於閣外炊作乾飯食之不設釜竈得一強盜問其黨與得數百人皆誅之政教清平為三河表續漢書呂義字季陽遷新都綿竹令乃心隱恤百姓稱之為一州諸城之首蜀志徐弘字聖通為山陰令縣俗剛強大姓兼并弘到官誅剪姦桀豪右歛手商旅路宿道不拾遺童歌之曰徐聖通政無雙平刑罰姦宄空會稽典錄何祗字君肅補成都令時縣令缺以祗兼二縣二縣戶口猥多切近都治饒諸奸穢每比人常眠睡值其覺寤輒得奸詐眾咸畏祗之發摘或以為有術無敢欺者使人投筭祗眾其讀而心計之不差升合蜀志荀藐除太原榆次令為政以德人懷之時有鳳凰集其境內晉武帝下詔褒美太始三年卒吏人如喪親戚為之樹碑其序曰仰之如日月敬之如神明愛之如父母樂之如時雨家傳就之以下序辭也合璧類聚以為詔詞誤陶潛為彭澤令郡遣督郵至縣吏白應束帶見之歎曰吾不能為五斗米折腰向鄉里小人即解印綬去縣本傳晉書陶潛傳云潛少懷高尚博學善屬文嘗作五柳先生傳以自况先生不知何許人不詳姓字宅邊有五柳樹因以為號焉宋書亦同即非彭澤令時所栽人多於縣令事中使五柳誤也白氏六帖縣令門栽五柳亦誤南部新書菁華引本傳令下加門種五柳更誤記纂事文俱同萬亮為永康令嚴刻人憚之乃以桃木刻作亮身燒柴煮湯火熾桃人自鼎跳出異苑前秦徐嵩為長安令貴戚子弟犯法者嵩一皆考竟請託路絕苻堅甚奇之謂其叔父戚云為長吏故當應爾此年少落落有端貳之才十六國春秋北地傅僧祐潁川陳珉高平張祐並以吏才見知僧祐再為山陰令甚有能名末世令長莫及珉為吳令善發姦伏境內以為神明祐歷臨安武康錢塘令並著能名末世言長吏者以三人為首宋書王歆之臧燾傳三世山陰山陰東土大縣難為長官傅僧祐在縣有稱子琰為武康令遷山陰令尤明察又著名二縣皆謂之傅聖父子並著奇績時云諸傅有治縣譜子孫相傳不以示人明劉玄明亦有吏能歷山陰令政常為天下第一琰子翽代玄明為山陰問玄明答曰我有奇術卿家譜所不載臨別當相示既曰作縣令唯日食一升飯而莫飲酒此第一策也齊書南史蕭景字子昭齊建武中為永寧令政為百城最永嘉太守范述曾居郡號稱廉平雅服景為政乃榜郡門曰諸縣有疑滯者可就永寧令決梁書江介為吳令其父謐為長沙內史謐教治苛刻僧遵道人與謐情款隨謐莅郡犯小事餓繫郡獄僧遵裂三衣食之既盡而死為有司所奏介治亦深切民間榜死人髑髏為謐首介棄官而去齊書南史僧遵道下之人字作又字下又云遵道通志因之似誤元志為洛陽令不畏強禦與御史中丞李彪爭路俱入見孝文令分路而行及出與彪折尺量道各取其半帝謂邢巒曰此兒竟可所謂王孫公子不鏤自彫巒曰露竹霜條故多勁節非巒則鳳其在木枝也北史魏德深遷貴鄉長為政清淨不嚴而肅恒為諸縣之最尋轉館陶長貴鄉吏民聞之相與言及其事皆欷歔流涕語不成聲及將赴任傾城送之號泣之聲道路不絕既至館陶闔境老幼皆如見其父母貴鄉父老詣闕請留德深有詔許之貴鄉吏民歌呼滿道互相稱慶館陶眾庶合境悲泣因從而居住者數百家後與賊戰沒於陣貴鄉館陶人庶至今懷之隋書賈敦實咸亨初為洛州長史時洛陽令楊德幹杖殺人吏以立威名敦實曰政在養人義須存撫傷生過多雖能亦不足貴也常抑止德幹德幹亦為之稍減舊唐韋景駿神龍中為肥鄉令縣界漳水連年泛溢景駿審其地勢增築隄防遂無水患開元中為貴鄉令遷趙州長史路由肥鄉人吏驚喜競來犒餞留連彌日有童幼數人年甫十歲亦在其中景駿謂之曰計吾北去此時汝輩未生既無舊恩何慇懃之甚也咸對曰比聞長宿傳說縣中廨宇學堂館舍堤橋並是明公遺跡將謂古人不意得瞻覩不覺欣戀倍于常也新語李朝隱為長安令有宦官閻興貴詣縣請託朝隱命拽出之睿宗聞而嘉歎乃下制曰李朝隱隱義不回清強自遂品官入縣有乖儀式遂能責之以禮繩之以愆昔虞延持皇后之客梅陶鞭太子之傅古稱遺直復見于今宜加一階用表剛烈舊李元紘開元初為好畤令賦役平允不嚴而治大有政聲遷潤州司馬發離百里士民號泣遮路烏鵲之類飛擁行車有詔褒美之開天遺事李杲為洛陽令嚴毅公正縣務清簡有進士劉兼過其境外聞戶外相語聲曰李令今古正人也見其行事令人破瞻可於他邑求血食也兼啟門視之寂無影響方知乃邑之妖神也兼遂書贊一首於村邸之壁云狡吏畏威縣妖破膽好錄政聲聞于御覽後明皇旌其能賜金百兩及章服焉上崔皎為長安令邠王守禮部曲數輩盜馬承前以上長兄不敢按問奴輩愈甚府縣莫敢言者皎設法擒捕群奴潛匿王家皎命就擒之王懼盡縊殺懸于街樹境內肅然出為懷州刺史歷任內外咸有聲稱新語虞城宰公李錫字元勳官宅舊井水清而味苦公下車嘗之莞爾而笑曰我苦且清足以符吾志也遂汲不改變為甘泉蠡丘館東有三柳焉公往來憩之飲水則去行路勿剪比于北棠李集此白為錫去思頌碑也事略文作白為虞城令誤改名路嗣恭始名劍客歷仕郡縣有能名後授神烏令考績上上為天下最玄宗以其能嗣魯恭賜改其名舊唐滕遂貞元末為長洲令攝吳縣時人歌曰朝判長洲暮判吳道不拾遺人不孤人謂有漢叔輔之遺風滕譜宣宗獵苑北見樵者數人因留與語言涇陽百姓因問邑宰為誰曰李行言為政何如曰性執滯有劫賊五六人匿軍家取來直不肯與盡杖之上還宮書其名帖於殿柱上後二年行言領海州中謝上曰曾宰涇陽否對在涇陽二年上曰賜金紫再謝上曰卿知著紫來由否對曰不知上命取殿柱帖子示之語林鐵船渡海閩賈郁性峭直不容人吏文過時為仙遊令王氏初霸閩越郡邑之政皆自賄成郁獨守正奉法吏頗畏之及受代有一吏酣酒郁怒曰吾當再典此邑以懲汝輩吏揚言公欲再作縣令猶造鐵船渡海也郁聞之是歲選集會延鈞建號聞郁有治稱乃擢授贊善大夫復典舊邑時醉吏為庫吏不數月盜官錢數萬下獄具伏郁批前牘尾曰竊銅鏹以潤家非因鼓鑄造鐵船而渡海不假鑪鎚因決杖徙之胥皆攝伏未幾移治福清考滿召為御史中丞九國志王絲字敦素越之蕭山人景祐初為縣令會歲歉絲每家支錢一千以濟之期以明年夏輸絹一匹邑人大受其惠稱為德政由此當路薦之蓋是時一縑售價不逾其數爾范希文誌荊公當國傚其法施之天下號曰和買久之本錢既不復俵且有折帛之害陳希亮字公弼知鄠縣有巫覡歲歛民財祭鬼謂之春齋否則有火災民訛言有緋衣三老人行火希亮禁之民不敢犯火亦不作毀淫祠數百區勒巫為農者七十餘家及罷去父老送之出境泣曰公去我緋衣老人復出矣宋史葉康直字景溫知光化縣縣多竹民皆編為屋康直教用淘瓦以寧火患凡政皆務以利民時豐稷為穀城令亦以治績顯人歌之曰葉光化豐穀城清如水平如衡上嘉祐中京西轉運使陳希亮奏據河清縣僧道進士等狀奉舉留知縣著作郎王元規再任事本司體量得本官到任軍民歌詠有十奇第一奇民吏不識知縣兒第二奇搨却曹司舊肚皮第三奇買物價例不曾虧第四奇處斷明白盡絕私第五奇街裏不見兇頑兒第六奇蝗虫不入境內飛第七奇不敢賭錢怕官知第八奇不孝不仁不敢為第九奇鄉村不被公人欺第十奇百姓納稅不勾追如此之類甚得民情上令審官院上簿記其姓名分紀於穆君侯英才宣朗明斷決疑易於指掌野有寇盜惟侯屏之我有田疇惟侯闢之古人慎獄惟侯平之凡此三惠如何勿思晉孫楚梁令孫候頌李封為延陵令吏人有罪不加杖罰但多置碧頭巾示辱之隨所犯輕重以日數為等級日滿乃釋著此服出入州鄉以為大恥皆相勸勵無取僣為賦稅常先諸縣去官竟不捶一人封氏見聞長吏縣皆有丞尉是為長吏漢表隋唐縣丞為副貳通判縣事通典丞署文書典知倉獄百官志詔捕淮南太子淮南相怒壽春丞留太子建不遣史記丞主刑獄囚徒故責之注張玄字君夏遷陳倉縣丞清淨無欲專心經書初為丞嘗以職事對府不知官曹處吏事門下責之時扶風徐業亦大儒也聞玄諸生試引見之與語大驚曰今日相遭真解矇矣遂請上堂難問極日後漢孫堅字文臺除堅塩瀆丞徙盱眙丞又徙下邳丞堅歷佐三縣所在有稱吏民親附鄉里知舊好事少年往來者常數百人堅接撫待養有若子弟焉江表傳唐臨為萬年丞縣有輕囚十數人會春暮時雨臨白令請出之令不許臨曰明公若有所疑臨請自當其罪令因請假臨召囚悉令歸家耕種與之約令歸繫所囚等皆感恩貸至時畢集詣獄臨由是知名舊王義方坐與張亮交通貶為儋州吉安丞行至海南舟人將以酒脯致祭義方曰黍稷非馨義方明德酌水而祭時當盛夏風濤蒸毒既而開霽南渡吉安巒俗荒梗義方召諸首領集生徒親為講經行釋奠禮清歌吹籥登降有序蠻酋大喜上陸景倩為扶溝丞河南按察使畢構覆州縣殿最欲必得實有吏言狀曰某彊清某詐清惟景倩曰貞清終監察御史新崔斯立元和中以大理評事言得失黜官再轉藍田縣丞庭有老槐四行南牆鉅竹千挺儼立君相持水㶁㶁循除鳴斯立痛掃溉對樹二松日哦其間有問者輒對曰余方有公事子姑去韓詩裴子羽為下邳令張晴為縣丞二人俱有聲氣而善言語曾論事移時吏人竊相謂曰縣官甚不和長官稱雨贊府即道晴贊府稱晴長官即道雨終日如此非不和乎封氏九千里之丹鳳自下升高七十日之黃龍從微至著張鷟集宋玉曰鳳凰上擊九千里翱翔乎窈冥之上藩籬之鷃豈得料其高哉士亦然矣相書占氣要曰日中有黃氣如龍七十日遷為丞也韋昭云主簿者主諸簿書辦云簿普也關普諸事也簿書必有長者錄書以領之辨釋名主簿上轄通典職司符印主掌簿書白帖忠臣西部都尉宰鼂行吳郡太守事以微過收吳縣獄吏將殺之主簿鍾離意爭諫甚切鼂怒使收縳意欲案之掾吏莫敢諫彭修排閣入拜於庭曰明府發雷霆於主簿請聞其過鼂曰受教三日初不奉行廢命不忠豈非過邪修因拜曰昔任座面折文侯朱雲攀毀闌檻自非賢君焉得忠臣今慶明府為賢君主簿為忠臣鼂遂原意罰貰獄吏罪舊蘇志仇香字季和為書生性謙恭勤恪威儀矜莊貌不為晝夜易容言不為喜怒變聲雖儕輩群居必正色後言終身無泄狎之交以是見憚學通三經然無知名之援鄉里之舉年四十召為縣主簿蘇林廣舊傳覽字季智一名香初為蒲亭長有陳元者母告其子不孝覽為陳慈孝之道卒成孝子焉鄉邑為之諺曰父母何在在我庭化我鳲梟哺所生時考城令河內王渙政尚嚴猛聞覽以德化人署為主簿謂覽曰主簿聞陳元之過不罪而化之得無少鷹鸇之志耶覽曰以為鷹鸇不若鸞鳳渙謝遣曰枳棘非鸞鳳所棲百里豈大賢之路今日太學曳長裾飛名譽皆主簿後耳以一月奉為資勉卒景行後漢萬花谷云他時論道巖廊非主簿而誰引本傳誤李宣之子名表宋公令冠端召表為主簿表不樂為吏於寺門中焚燒衣幘端怒收表欲殺之陳仲舉聞之至宋公欲請表先過宣宣問何故來曰欲見冠令請足下兒宣曰吾子犯罪罪當死如有白君豈妄殺人宜此還端追問仲舉仲舉具以語之端乃歎曰李宣烈士也即原之汝南先賢傳顧少連補登封主簿邑有虎孽民患之少連命塞陷穽移文嶽神虎不為害諭避大駕蘇弁為奉天主簿朱泚之亂德宗倉卒出幸縣令社正元上府計事聞大駕至官吏惶恐皆欲奔竄山谷弁諭之曰君上避狄臣下當伏難死節昔肅宗幸靈武至新平安定二太守皆潛遁帝命斬之以殉諸君知其事乎眾心乃安及車駕至迎扈儲峙無闕德宗嘉之就加試大理司直上大中四年勑曰州有上佐縣有丞簿俗謂閑官不領公事殊乖制作之本意續通典髯鬚之職王建僣蜀李景上封事以為眉山主簿制曰旌其忠藎之心委以髯鬚之職外史檮杌記纂云白集誤光庭調萬年主簿稱為明鏡時程伯淳主鄱縣簿張山甫主武功簿皆以才名稱關中號為三傑淵源錄仕尉梅福字子真為南昌尉後去官歸壽春王莽顓政福一朝棄妻子去九州至今傳以為仙漢書香尉漢雍仲子進南海香物拜為洛陽尉時謂之香尉述異記逢萌字子慶家貧給事縣為亭長時尉行過亭萌候迎拜謁既而擲楯歎曰大丈夫安能為人役哉遂去之後漢商則任廩兵尉為性廉謹縣令丞多貪濁因宴會次第舞令丞舞訖勸則則把手回身而已令問其故則曰長官動手贊府亦動手唯有一箇更動手百姓何容活耶人皆大笑嘲曰令丞但動手縣尉祗回身因舞為刺史得與厲貧之語林盧莊道年十六授長安尉太宗將錄囚徒京宰以莊道幼年懼不舉欲以他尉代之莊道不從但間暇之不省也時繫囚四百餘人令丞深以為虞翌日太宗召囚莊道乃徐書狀以進引諸囚入莊道評其輕重留繫日月應對如神太宗驚歎唐新語員半干上元初授武陟尉屬頻歲旱飢勸縣令殷子良開倉以賑貧餒子良不從會子良赴州半千便發倉粟以給飢人刺史郭齊宗大驚因而按之時薛元超為存撫使謂齊宗曰公之百姓不能救之而使惠歸一尉豈不愧耶遽令釋之舊書朱履霜好學明法理則天朝補山陰尉巡察使必委以推案故人或遺以數兩黃蓮固辭不受曰不辭受此歸恐母妻詰問從何而得不知所以對也後為姑篾令威化行于浙西著憲問五卷撮刑獄之機要新語立身矮屋進士張彖授華陰尉時縣令太守俱非其人多行不法張生有吏道勤於政每申舉一事則太守令尹抑而不從張生曰大丈夫有凌霄蓋世之志而拘于下位若立身於矮屋中使人抬頭不得遂拂歸遯於嵩山天寶遺事嚴安之崔譚俱為赤尉力行猛政譚恐安之名出已右每事欲先之安之使五伯執大杖引前譚則益粗其杖安之越粗譚亦轉粗之如此大如椽力不能舉安之遂令執小杖譚亦益細其杖安之越細譚亦轉細之如此至杖大如筯不能用安之患其壓已遂都去其杖使五伯空手而行譚不能學封氏見聞李勉字玄卿授開封尉時昇平日久且汴州水陸所湊邑居龐雜號為難理勉與聯尉盧成軌等並有擒奸摘伏之名舊作集類劉綺莊毘陵人唐崑山尉研窮今古愽考傳記作集類百卷行於世名崑山編中吳紀聞唐人呼縣令為明府丞為贊府尉為少府李白有餞陽曲王贊公賈少公石艾尹少公序蓋陽曲丞尉石艾尉也隨筆李白贈瑕丘王少府別西河劉少府贈秋浦柳少府杜甫貽華陽柳少府當是唐時縣尉多稱少府也類要杜詩有野望因過常少仙一篇落盡高天日幽人未遣還蜀士注曰少仙應是言縣尉也縣尉謂之少府而梅福為尉有神仙之稱二字與俗呼仙尉不侔矣四筆大曆中湯陰有一尉姓張與數人同行過羑里城或問是何城張尉曰此是郭令公圍相州所築或曰此羑里城紂囚文王之處何關郭令公築張尉曰某比在河南不知文王與紂時只將謂令公所築也封氏見聞劉炎少負詞學晚為永新尉拙於政治道有貪名太守行邑有覬覦之意而炎不悟既行以詩諷炎云未到桃源時長憶出家景及到桃源了還似鑑中影炎乃和而復之后因民訴受賄遂按以法炎復有詩云早知太守如狼虎獵取膏梁以餡之詩話總龜今人號縣令為字民簿為仇覽尉為梅福有王伉者頑鄙為尉氏尉呼令為薛家或謔之曰君知字覽之義乎縣令必須識字故謂之字簿與令同覽詞狀者也故謂之覽伉曰然則尉何以為梅福曰職任雄緊一枚有福人也如足下可謂王福矣伉嘗為富家主藏故以此譏之遯齋閑覽澧陽縣西百三十里澧水之南岸有白石雙立狀類人形相傳昔有充縣左尉與零陵尉共論疆界因相傷害化為此石即以為二縣界首東標零陵西揭充縣充縣廢省今臨澧縣則其地也荊州圖副天中記卷三十四
