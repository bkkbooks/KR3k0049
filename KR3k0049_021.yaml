body:
  text: 美丈夫美而艷宋公子鮑禮於國人鮑美而艷襄夫人欲通之而不可乃助之施左文十六容冶楚襄王時宋玉休歸唐勒讒之於王王謂玉曰身體容冶口多微辭不亦薄乎玉曰身體容冶受之二親口多微辭聞之聖人宋玉風賦好玉張子房之知以為其人計魁梧奇偉至見其圖狀貌如婦人好女史記冠玉陳平少時家貧為人長大美色富人張負獨視偉平曰固有美如陳平長貧者乎以女與之後沛公以平為亞將或譖平曰平雖美丈夫如冠玉耳其中未必有也本傳如瓠沛公略地過陽武張蒼以客從攻南陽蒼當斬解衣伏質身長大肥白如瓠時王陵見而怪其美士乃言沛公赦勿斬漢書甚麗公孫弘對策時百餘人太常奏弘第居下策奏天子擢弘對為第一召入見容貌甚麗拜為博士待詔金馬門上甚都司馬相如車騎雍容間雅甚都上姣好董偃始與母賣珠為事年十三隨母至館陶公主家左右言其姣好主召見曰吾為母養之因留弟中教書計射御年十八而冠入則侍內溫柔愛人以主故諸公接之名稱城中號曰董君美麗董賢字聖卿為太子舍人哀帝時為郎傳漏在殿下為人美麗哀帝望見悅其儀貌拜為黃門郎寵愛日甚出則參乘入御左右常與上臥起嘗晝寢偏籍上褎上欲起賢未覺不欲動賢乃斷褎而起其恩愛至此絶人王沈長八尺餘身體鴻大容貌甚過絶人單于來朝仰視遷延却退天子聞而嘆曰此真漢相矣如玉陸閎字子春吳縣人暢之子也世為族姓篤行好學聰明有令德欲尚寧平公主辭疾不應建武中為尚書令閎姿容如玉喜著越布單衣先武升臺見而偉之歎曰南方固多佳人自是常敕會稽郡獻越布焉謝承漢書吳地記如畫馬援長七尺五寸色理髮膚眉目容貌如畫東觀記偉麗陳喬為尚書容儀偉麗數上言政事桓帝愛其才貌詔妻以公主喬固辭不聽還閉口不食七日而死謝承後漢書狀異恆人蔡雍字伯喈謂從弟谷曰董卓性剛難濟吾且遁逃山東以待何如谷曰君狀異恆人每行觀者盈集以此自匿不亦難乎乃止上傳粉何平叔美姿儀面至白魏明帝疑其傳粉正夏月與熱湯餅既噉大汗出以朱衣自拭色轉皎然世説晏性自喜動靜粉帛不去手行步顧影魏略倚玉時人目夏侯太初朗朗如日月之入懷明帝使后弟毛曾與夏侯玄共坐時人謂蒹葭倚玉樹世説穨唐李安國穨唐如玉山之將摧崩上李豐字安國識別人物海內注意明帝得吳降人問江東聞中國名士為誰以安國對之是時豐為黃門郎改名宣上問安國所在左右公卿即具以豐對上曰豐名乃被於吳越邪魏略龍章鳳姿嵇康身長七尺八寸偉容色土木形骸不加飾厲而龍章鳳姿天質自然正爾在群形之中便自知非常之器別傳見者歎曰蕭蕭肅肅爽朗清舉或云肅肅如松下風高而徐引山公曰嵇叔夜之為人也巖巖若孤松之獨立其醉也傀俄若玉山之將崩世説有人語王戎曰嵇延祖卓卓如野鶴之在雞群答曰君未見其父耳上無雙石苞字仲容渤海南皮人也雅矌有智容儀偉麗不修小節故時人為之語曰石仲容姣無雙晉書擲果潘嶽妙有姿容好神情少時挾彈出洛陽道婦人遇者莫不連手共縈之世説安仁至美每行老嫗以果擲之滿車語林連璧潘安仁夏侯湛並有美容喜同行時人謂之連璧嶽與湛著契故好同遊世説玉人裴楷字叔則為吏部侍郎風神高邁容貌俊爽博涉群書特精義理時人謂之玉人晉書裴令公有俊容儀脕冠冕粗服亂頭皆好時人以為玉人見者曰見裴叔則如玉山上行光映照人世説風塵外物王衍天形奇特明秀若神名士傳總角若造山濤濤嗟嘆良久既去目而送之曰何物老嫗生寧馨兒晉書夷甫容貌整麗妙於談玄恆捉白玉柄塵尾與手都無分別王戎云太尉神姿高徹如瑤林瓊樹自然是風塵外物王公目太尉巖巖清峙壁立千仞王敦稱太尉處衆人中似珠玉在瓦石間世説石勒見夷甫謂長史孔萇曰吾行天下多矣未嘗見如此人當可活不萇曰彼晉三公不我為用勒曰雖然要不可加以鋒刃也夜使推墻殺之八王故事璧人衛玠在群伍之中實有異人之望齠齔時乘白羊車於洛陽市上咸曰誰家璧人於是家門州黨號為璧人別傳王丞相見衛洗馬曰居然有羸形雖復終日調畼若不堪羅綺世説王澄及王玄王濟並有盛名皆出玠下世云王家三子不如衛家一兒晉書玠從豫章至下都人久聞其名觀者如堵墻玠先有羸疾體不堪勞遂成病而死時人謂看殺衛玠世説神仙中人王右軍見杜弘治歎曰面如凝脂眼如點漆此神仙中人時人有稱王長史形者蔡公曰恨諸人不見杜弘治耳上永和中劉惔謝尚共沈略中朝人士或曰杜乂清標令上為後來之英粗可得方諸衛玠尚曰安得相比其間可容數人惔又云杜乂膚清叔寶神清桓彝亦云江左名士傳晉書琳琅珠玉有人詣王太尉遇安豐大將軍丞相在坐往別屋見季胤平子還語人曰今日之行觸目見琳琅珠玉世説不復似世人王濛字世祖有好儀形每覽鏡自照曰王文開那生如馨兒又酷貧帽敗自以形美乃入帽肆就就帽嫗乃得新帽語林林公道王長史飲襟作一來何其軒軒韶舉長史為中書郎往王敬和許爾時積雪長史從門外下車步入尚書著公服敬和進望嘆曰此不復似世中人世説風概桓溫豪爽有風概姿貌甚偉面有七星少與沛國劉惔善惔嘗稱之曰溫鬢如反猬皮眉眼如紫石稜自是孫仲謀司馬宣王一流人晉書世説初桓溫自以雄姿風氣是宣帝劉琨之儔有以其比王敦者意甚不平及是征還於北方得一巧作老婢訪之乃琨妓女也一見溫便潛然而泣溫問其故答曰公甚似劉司空溫大悅出外整理衣冠又呼婢問婢云面甚似恨薄眼甚似恨小鬚甚似恨赤形甚似恨短聲甚似恨雌溫於是裭冠解帶昏然而睡不怡者數日晉書玉舉劉萬安即道真從子庾琮所謂灼然玉舉又云千人亦見百人亦見世説遊雲時人目王右軍飄如遊雲矯若驚龍上朝霞海西時諸公每朝朝堂猶暗唯會稽王來軒軒如朝霞舉姿神荀羡字令則七歲隨父嵩在石頭蘇峻愛其姿神恆置膝上年十五將擬國婚乃遁長沙鹽司追尋不得已尚潯陽公主風氣英秀明鬚眉俯仰眄睞容止可則家傳濯濯春月柳張恭美姿儀人多愛悅或目之云濯濯如春月柳嘗被鶴氅裘涉雪而行孟昶窺見之歎曰此真神仙中人也晉書得葛無恨鄢陽陳忠女名豐鄰人葛勃有美姿豐與村中數女共聚絡絲戲相謂曰若得壻如葛勃無所恨也異苑兩玉人宋謝晦美風姿善言笑眉目分明鬢髮如黑漆涉獵文義博贍多通時人以方楊高祖微將不及晦聞猶以為恨時謝混風華為江左第一嘗與晦俱在武帝前帝目之曰一時頓有兩玉人耳南史九雙珠孟顗字彥重平昌安丘人衛將軍昶弟也昶顗並美風姿時人謂之雙珠上哺啜可觀王彧字景文幼為從叔球所知憐美風姿為一時所推讓袁粲見之歎之曰景文非但風流悅乃哺啜亦復可觀有一客少時及見謝混答曰景文方謝叔源則為野父矣粲惆悵良久曰恨眼中不見此人宋書藍田生玉謝莊字希逸七歲能屬文及長韶令美容儀宋文帝見而異之謂尚書僕射殷景仁領將軍劉湛曰藍田生玉豈虛也哉上荊楚仙人龔祈字蓋道漢壽人也風姿端雅容止可觀中書郎范述見之歎曰此荊楚之仙人也風器庾杲之風範和潤善音吐世祖令對虜使兼侍中上每嘆其風器之美王儉在坐曰杲之為蟬冕所照更生風采南齊二雙宋孝武選侍中四人並以風貌王彧謝莊為一雙玩韜與何偃為一雙常充兼假上方何禇彥儀美儀貌善容止俯仰進退咸有風則每朝會百僚遠國使莫不延首目送之明帝嘗嘆曰禇彥回能遲行緩步便得宰相矣時人以方何平叔南史方嵇伏曼容字公儀宋明帝好周易集群臣於清暑殿講詔曼容字公儀容執經風采帝每以方嵇叔夜使畫人陸探微畫叔夜像以賜之梁儒林傳衛杜在目何炯字士光白晳美容貌從兄求點每稱之曰叔寶神清弘治膚清今觀此子復見衛杜在日上孝行傳衆望禇向字景政淵之孫翔之父也為侍中風儀端麗眉目如點每公庭就列為衆所瞻望後卒官外兄謝表為製墓銘云弘治推華子嵩慚量酒歸月下風清琴上誦者以為擬得其人上精神大遒崔㥄字長儒貌偉麗善於容止端嶷如神後生第一崔瞻字彥通潔白善容止神采嶷然侍中李神俊雅有風譽晚年無子見瞻嘆謂邢邵曰昨見崔㥄兒便為後生第一我遂無此物楊愔引為中書侍郎曰昔裴瓚晉世為中書郎神情高邁每於禁門出入宿衛者皆肅然動容崔生堂堂亦當無愧裴子二天人崔子約長八尺餘姿神俊異潛觀梁使劉孝儀賓從見者駭目武定中與兄子瞻俱詣晉陽寄居佛寺每退朝久立子約憑几對之儀望俱華儼然相映沙門竊窺之以為二天人也北史面似蓮張易之白晳美姿容與弟昌宗俱侍宮中皆傳粉施朱衣錦繡服俱承辟陽之寵武承嗣等呼易之為五郎昌宗為六郎楊再思諛之曰人言六郎面似蓮再思以為蓮花似六郎非六郎似蓮花也舊唐秀整玄宗早朝百官趍班上見張九齡風儀秀整有異於衆謂左右曰朕每見張九齡精神頓生語林朝廷羽儀李揆美風儀善奏對肅宗賞歎之嘗謂揆曰卿門第人物文章皆當代第一信朝廷羽儀乎故時人稱為三絶舊唐盧杞令李揆入蕃既至蕃長曰聞唐家第一人李揆公是否揆曰非也第一人李揆爭肯到此恐其拘留以此謾之也揆致仕東都大司徒杜公罷淮海也入洛見之言及頭頭第一之説揆曰若道門戶有所自承餘裕也官職遭遇爾今形骸凋悴看即下世一切為空何第一之有語林玉而冠崔淡舉止秀峙時謂玉而冠者子遠文采清麗風致整俊人皆慕其為人目為飣坐梨言為席上之珍也唐崔琯傳生菩薩薛調季瓚同年進士調美姿貌人號為生菩薩瓚俊爽人號為劍調寬恕而瓚猜忌論者以時人所稱協其性也劉元章罷江夏入朝以風標自持一日調謁之倒屣出迎愛其風韻去而復留者數四既去謂左右曰若不見其缺也調為翰林學士郭妃悅其貌謂懿宗曰駙馬盍若薛調乎語林路巖路侍中巖風貌之美為世所聞鎮成都日委執政於孔目吏邊咸日以技藥自隨宴於江淮都人士女懷擲果之美雖衛玠潘嶽不足為比善巾褁蜀人見必效之後乃剪紗巾之腳以異於衆也閭巷有眩服修容者人必譏之曰爾非路侍中邪比至出豚之肆見膾豕者謂屠生曰此豚端正路侍中不如用之比方良可笑也端美沈詢侍郎清粹端美神仙中人也除山北節旄京師咸重之誦曹唐遊仙詩云玉詔新除沈侍郎便分茅土領東方不知今夜遊何處侍從皆騎白鳳凰即風姿可知也北夢水月觀音蔣凝侍郎亦有人物每到朝士家人以為祥瑞號水月觀音上唐末朝士中有人物者時號玉筍班王界尺趙逢仕唐及梁卒於天成中文學德行風神秀異號曰玉界尺兩登廊廟四退丘園縉紳仰之北夢美男晉獻公欲伐虞而憚宮之奇存荀息曰周書有言美男破老乃遺之美男教之惡宮之奇宮之奇以諫而不聽遂亡因而伐虞遂取之秦策分桃彌子瑕有寵於衛靈公衛國之法竊駕君車者刖彌子母病人間往夜告彌子彌子矯駕君車以出君聞而賢之曰孝哉為母之故忘其刖罪異日與君遊於果園食桃而甘不盡以其半啖君君曰愛我哉忘其口味以啖寡人及彌子色衰愛弛得罪於君君曰是固嘗矯駕吾車又嘗啖我以餘桃韓子安陵君纏以顏色美壯得幸於楚共王江乙曰以財交者財盡而交絶以色交者華落而愛渝是以嬖色不敝席寵臣不敝軒願君必請從死以身為殉楚策説苑女寵不敝席男愛不盡輪真誥前魚魏王與龍陽君共船而釣龍陽君得十餘魚而泣下以後得大魚而棄前之所得魚喻復得美人而棄己注魏之幸臣國策長孫佐輔古宮怨云重遠豈能慚沼鵠棄前方見泣船魚於武陵長信宮云一從悲晝扇幾度泣前魚是皆作宮人用也似誤男色諺曰力田不如逢年善仕不如遇合固無虛言非獨女以色媚而仕宦亦有之昔以色幸者多矣史佞幸傳柔曼之傾意非獨女德蓋亦有男色焉漢書贊男寵自咸寧太康之後男寵大興甚於女色士大夫莫不尚之天下相倣或至夫婦離絶多生怨曠晉志專寵苻堅初滅燕慕容沖姊清河公主年十四有殊色堅納之寵冠后宮沖年十二亦有龍陽之姿堅又幸之姊弟專寵宮人莫進長安歌之曰一雌復一雄雙飛入紫宮咸懼為亂王猛切諫堅乃出沖後沖進逼長安堅遺之錦袍曰朕於卿恩分知何而於一朝忽為此變載記習纍沈約懺悔文云追尋少年血氣方壯習纍所纏事難排豁淇水上宮誠無云幾分桃斷袖亦足稱多此實生死牢穿未易洗拔廣弘明集別榻蕭韶字德茂昔為兒童庾信愛之有斷袖之歡衣食所資皆信所給遇客韶亦為信傳酒後為郢州刺史信西上江陵途經江夏韶接信甚薄坐青油幕下引信入宴坐信別榻有自矜色信稍不堪因酒酣乃徑上韶床踐踏肴饌直視韶面謂曰官今日形容大異近日時賓客滿坐韶甚慚耻南史侒媚王義方彈李義府疏云義府善柔成信佞媚為心昔事馬周分桃見寵後交劉洎割袖承恩生其羽翼遂階通達文粹娃媛美女為媛毛詩注娃媠窕豔美也荊楚衡淮之間曰娃南楚之外曰媠宋衛晉鄭之間曰豔陳楚周南之間曰窕故吳有館娃蘇秦有榛娥蘇秦晉之間美貌謂之娥或謂之姣趙魏燕代之間曰姝自關而西秦晉之故都曰妍美狀為窕美色為豔美心為窈奕偞容也自關而西凡美容謂之奕或謂之偞宋衛曰偞陳楚汝頴之間謂之奕方言容麗曰媌形美曰媠容媚曰婠南楚以好為娃肥骨柔弱曰婐娜頰妍美曰嫌媚容貌曰㜰服虔通俗姝好也詩曰女其姝秦晉謂好曰娙娥吳楚之外謂好曰媠説文有仍昔有仍氏生女黷而甚美光可以鑑人乃曰玄妻樂正后夔取之生伯封實有豕心貪婪無饜忿怒無忌謂之封豕有窮后羿滅之夔是以不祀昭二十八昌容殷時有仙女名昌容隔窗見骨帝王世紀玉女紂囚文王於羑里散宜生受命而行宛懷條塗之山有玉女三人宜生得之因費仲而獻之於紂以免文王六韜赤烏赤烏之人獻二女於天子女聰女列為嬖人赤烏氏美人之地也穆天子傳三為粲恭王遊於涇上密康公從有三女奔之其母曰必致之於王夫獸三為群人三為衆女三為粲夫粲美之物也衆以美物歸女而何德以堪之王猶不堪况爾小醜康公弗獻一年王威密國語目送宋華父督見孔父之妻於路目逆而送之曰美而豔因攻孔氏殺孔父而取其妻公怒督懼遂弒殤公君子以督為有無君之心而後動於惡桓二驪姬驪姬者國色也公羊傳晉獻公伐驪戎克之獲驪姬以歸有寵立以為夫人史蘇告大夫曰夫有男戎必有女戎如其色必授之情從其惡心必敗國且深亂亂必自女戎君子曰知難本矣國語毛嬙麗姬人之所美也魚見之深入鳥見之高飛麋鹿見之決驟麗之姬艾封人之子也莊子昔秦穆公與晉獻公共伐麗戎之國得美女一玉環二秦取環而晉取女即麗戎國艾地守封強人之女也成公英疏麗姬崔本作西施破舌獻公欲伐虢而憚舟之僑存荀息曰周書有言美女破舌乃遺之女樂以亂其政舟之僑諫而不聽遂去因而伐郭遂破之國策內美人而虞虢亡晉獻公伐虞虢乃遺之屈産之乘垂棘之璧女樂六以榮其意而亂其政韓內儲南威晉文公得南之威三日不聽朝遂推南之威而遠之曰後世必有以色亡其國者魏策三少陳靈公與孔寧儀行父通於夏姬皆衷其衵服以戲於朝泄冶諫曰公卿宣淫民無效焉且聞不令君其納之公告二子二子遂殺泄冶宣九靈公與孔寧儀行父飲酒於夏氏公謂行父曰徵舒似女對曰亦似君徵舒病之公出自其廄射而殺之二子奔楚宣十一楚之討陳夏氏也莊王欲納夏姬申公巫臣曰不可君召諸候以討罪也今納夏姬貪其色也貪色為淫淫為大罰君其圖之王乃止子反欲取之巫臣曰是不祥人也是天子蠻殺御叔弒靈侯戮夏南出孔儀喪陳國何不祥如是天下多美婦人何必是子反乃止王以豫連尹襄老襄老死其子黑要蒸焉巫臣以夏姬行遂奔晉成二子反怨之後與子重殺巫臣之家成七夏姬內挾伎術老而復壯三為王后七為夫人九為寡婦春秋之初有晉楚之諺曰夏姬得道雞皮三少宇文士及粧臺記叔尚欲娶於申公巫臣氏夏姬女其母曰子靈之妻殺三夫一君一子而亡一國兩卿矣可無懲乎吾聞之甚美必有甚惡是鄭穆少妃姚子之子子貉之妹也子貉早死無後而天鍾美於是將必以是大有敗也且三代之亡共其之廢皆是物也女何以為哉夫有尤物足以移人茍非德義則必有禍叔尚懼不敢取平公強使取之生伯石狼子野心竟滅羊舌氏昭二十八西施越王以吳王淫而好色大夫種乃使相者國中得苧蘿山鬻薪之女曰西施鄭旦飾以羅榖教以容步習於土城臨於都巷三年學服而獻於吳乃使相國范蠡進之吳越越謀滅吳有美女二人一名夷光二名修明即西施鄭旦之別名以貢於吳吳處以椒華之房貫紬珠為簾幌朝下以蔽景夕捲以待月二人當軒並坐理鏡靚粧於珠幌之內竊窺者莫不動心驚魂謂之神人矣乃嗟而目之若雙鸞之在輕霧沚水之漾芙蕖吳王妖惑怠於國政及越兵入國乃抱二女以逃説苑越軍亂入見二女在樹下皆言神女望而不敢侵拾遺記西施越之美女欲見者先輸金錢一文孟子注疏曼頰皓齒形姱骨佳不待傳粉芳澤而性可悅者西施陽文也淮修務西施之沈其美也墨子嘉興縣南有女兒亭勾踐令范蠡取西施以獻夫差西施於路與范蠡潛通三年始達於吳遂生一子至此亭其子一歲能言因名女兒亭越絶書云西施亡吳國後復歸范蠡因泛五湖而云唐陸廣微吳地記西施山下有浣沙石十道志西施自窺於井不恃其美猶佐湯沐堯舜自窺於世不恃其美猶須才德况中庸而距諫嫫母自窺於井以為媚於西施桀紂自窺於世以為賢於堯舜闞子魯仲連謂孟嘗君曰君後宮十妃皆衣縞紵食梁肉豈毛牆先施哉國策使先施陽文吳娃傳豫之徒嬿服而御七發莊齊物厲與西施司馬云夏姬誤毛嬙毛嬙西施天下之美人也盛怨氣於面不能以為可好管子小稱毛嬙西施天下之至姱也衣以皮褐則見者皆走易以玄錫則行者皆止慎子國色天子誅邾婁顏而立其弟叔術顏夫人者嫗盈女也國色也其言曰有能為我殺殺顏者吾為其妻叔術為之殺殺顏者而以為妻公羊昭三十一閭娵魯君舉觥於梁惠王曰左白台而右閭須南威之美也魏策閭娵子奢莫之媒也荀佹詩孫子賦閭姝子奢草之媒兮楚策謂閭娵為醜惡騷七諫隴廉與孟娵同宮哀時命後語作明娵集韻引荀子閭娶子奢王質燕昭王即位二年廣延國來獻善舞者二人一名旋娟一名提謨並玉質凝膚體輕氣馥綽約而窈窕絶古無倫或行無迹影或積年不飢昭王處以錦綃華幄飲以瓀珉之膏飴以丹泉之粟拾遺記苕榮趙武靈王遊大陵夢見處女鼓琴後語作瑟而歌詩曰美人熒熒兮顏若苕之榮命乎命乎曾無我嬴異日王飲酒樂數言所夢想見其狀吳廣聞之因夫人而內其女娃嬴孟姚也孟姚有寵於王史記朝雲楚襄王遊雲夢望朝雲之館上有雲氣宋玉曰昔先王懷遊高唐怠而晝寢夢一婦人曖乎若雲皎乎若星將行未至如浮如傾對曰我赤帝季女名曰瑤姚姬未行而喪葬於巫山之陽精魂為草實為靈芝所謂巫山之女高唐之姬王因幸之去而辭曰妾在巫山之陽高丘之咀旦為行雲暮為行雨朝朝暮暮陽臺之下且朝視之果如其言故為立廟號曰朝雲襄陽耆舊傳東家登徒子以好色短宋玉於楚王宋玉曰天下之佳人莫若臣里東家之子東家之子增之一分則太長減之一分則太短著粉則太白施朱則太赤眉如翠羽肌如白雪腰如束素齒如含具嫣然一笑惑陽城迷下蔡宋玉賦粉白黛黑張儀之楚見楚王曰彼鄭周之女粉白黛黑立於衢閭之間非知而見之者以為神王曰楚僻陋之國寡人未見中國之女如此其美乃資以珠玉南后鄭袖聞之大恐令人謂張子曰聞君將之晉有金十斤請供芻秣長子請王觴之王召南后鄭袖而觴之張子再拜曰儀有死罪儀行天下遍矣未嘗見人如此其美面儀言得美人是欺王也王曰吾固以為天下莫若兩人也秦策犀角偃月陰姬與江姬爭為后司馬喜為陰姬乃謂趙王曰臣聞趙天下善為音佳麗人之所出也今至境入都邑容貌顏色殊無佳麗好美者臣未嘗見人如山中陰姬者也不知者時以為神人若其眉目準額權衡犀角偃月乃帝王之后非諸侯之姬也趙王大悅欲請之司馬喜歸謂中山君曰趙王非賢主也乃欲請陰姬王宜立以為后以絶趙王之意中山君遂立為后上中相楚考烈王相春申君吏李園園女弟女環謂園曰我聞王老無嗣可見我於春申君我欲假於春申君我得見於春申君徑得見於王矣園曰春申君貴人也千里之佐吾何託敢言女環曰即不見我汝求謁於春申君才人告遠道客請歸待之彼必問汝汝家何等遠道客者因對曰園有女弟魯相聞之使使者來求之園才人使告園者彼必有間汝女弟何能對曰能鼓者讀書通一經故彼必見我園曰諾明日辭春申君才人有遠道客請歸待之春申君果問汝家何等遠道客對曰園有女弟魯相聞之使使求之春申君曰何能對曰能鼓音讀書通一經春申君曰可得見乎明日使待於離亭園曰諾既歸告女環曰吾辭於春申君許我明日夕待於離亭女環曰園宜先供待之春申君到園馳人呼女環到黃昏女環至大縱酒女環鼓琴曲未終春申君大悅留宿明日女環謂春申君曰妾聞王老無嗣屬邦於君君外淫不顧政事使王聞之君上負於王使妾致下負於夫人為之奈何無泄此口君召而戒之春申君以告官屬莫有聞淫女也皆曰諾與女環通未終月女環謂春申君曰妾聞王老無嗣今懷君子以一月矣見妾於王幸産子男君即王公也而何為佐乎君戒念之五日而道之邦中有好女中相可屬嗣者烈王曰諾即召之烈王悅取之十月産子男是為幽王越絶書畫像齊王起九重之臺募國中有畫者賜之錢狂卒敬君常居飢寒妻端正敬君工畫貪賜畫臺去家日久思念其妻遂畫其像向之嘻笑旁人贍見之以白王王即設酒與敬君相樂謂敬君曰國中獻女無好者以錢百萬請妻可乎不者殺汝敬君慞惶聽許説苑或曰陳平為帝解平城之圍其事祕而不傳子知之乎曰城平使畫工圖美女形間遣人遺閼氏云漢有好麗美女其容貌天下無有今皇帝困厄已馳使歸迎取欲進於單于單于見此人必大好愛之愛之則閼氏日以遠踈不如及其未到令漢得脫去去亦不持女來矣閼氏婦女有妬媔之性恐漢女美奪已寵因謂單于曰漢天子亦有神靈得有上地非能有也於是開其一角得突出以計鄙祕不傳也桓談新論漢書音義金屋貯長公主嫖有主欲與太子婚后長主還宮武帝數歲主抱置膝上問曰兒欲得婦否主指左右長御百餘人皆云不用指其女曰阿嬌好否笑對曰好若得阿嬌作婦當作金屋貯之長主大悅乃若要上遂成婚焉漢武故事萬花谷作景帝問兒欲得婦誤自痛不如尹夫人邢夫人同時并幸武帝有詔不得相見尹夫人自請武帝願見邢夫人帝許之即令他夫人飾從御者數十人為邢夫人來前尹夫人前見之曰此非邢夫人身也帝曰何以言之對曰覩其身貌形狀不足以當人主矣於是帝乃詔使邢夫人衣故衣獨身來前尹夫人望見之曰此真是也於是乃低頭俯而泣自痛其不知也史外戚世家絶世李延年性知音善歌舞侍武帝起舞歌曰北方有佳人絶世而獨立一顧傾人城再顧傾人國寧不知傾城與傾國佳人難再得上歎息曰善世豈有此人乎平陽主因言延年有女弟上乃召見之實妙麗善舞由是得幸李夫人蚤卒上憐閔焉圖畫其形於甘泉宮漢書麗娟武帝所幸宮人名麗娟年十四玉膚柔軟吹氣勝蘭不欲衣纓拂之恐體痕也每歌李延年和之於長生殿唱回風之曲庭中花皆翻落置麗娟於明離之帳恐塵垢污其體也帝常以衣帶繫麗娟之袂閉於重幕之中恐隨風而去也麗娟以琥珀為佩置衣裾裏不使人知乃言骨節自鳴相與為神怪也洞冥記趙飛燕世祖楊霓拂翳皮軒記鼓汾河而祠祀后土登甘泉而祭昊天奉常獻儀謂之大駕車千乘而騎萬匹以幸姬趙飛燕置屬車間豹尾中晉輿服志燕趙上起明光宮發燕趙美女二千人充之率取十五以上二十以下年滿三十者出嫁凡諸宮美人選二百人常從行郡國載之後車輿上同輦者十六人員數恆使滿皆自然美麗不使粉白黛黑侍尚衣軒者亦如之漢武故事玉女武帝在甘泉宮有玉女降常與帝圍棊相娛女丰姿端正帝密悅乃逼之玉女因吐帝面而去遂病瘡經年故漢書云避暑甘泉宮此其時也幽明録臉若芙蓉卓文君姣好眉色如望遠山臉際常若芙蓉肌膚柔滑如脂十七而寡為人放誕風流故悅司馬長卿之才而越禮焉長卿素有消渴疾及還成都悅文君之色遂以發痼疾乃作美人賦欲以自刺而終不能改卒以此疾至死文君為誄傳於世西京雜記昭君元帝宮人既多乃令畫工圖之欲有呼者輒披圖召之其中常者皆行貨賂王明君姿容甚麗志不茍求工遂毀為其狀後胸奴來和求美女於漢帝帝以明君充行世説及去召見貌為後宮第一善應對舉止間雅帝悔之而名籍已定帝重信於外國故不復更人乃窮案其事畫工皆棄市西京雜記文頴曰昭君本蜀郡秭歸人也琴操曰昭君者齊國王穰女也年十七儀形高麗以節聞國中長者求之者王皆不許乃獻元帝石季倫曰昭以觸文帝諱故改為明世説注錢蕭娘昭君漢云早信丹青巧重貨洛陽師千金買蟾鬢百萬寫蛾眉松窗雜録飛燕合德馮萬金善歌世事江都王王孫女嫁江都趙曼萬金又是曼因與主通曼有疾不能近婦人主有身恐乃稱疾一産二女歸於萬金長曰宜主次曰合德冒姓趙氏宜主聰敏家有彭祖方脈之事善行氣微長而纖膩舉止翩然謂之飛燕帝幸之曰豐若有餘柔若無骨遷延謙畏若遠若近禮義人也合德美容體膚滑出浴不濡善音詞輕緩可聽新沐膏九回沉水香為卷髮號新興髻為薄眉號遠山黛施小朱號慵來粧左右嘖嘖嗟賞淖夫人在帝后唾曰此禍水也滅火必矣既進帝大悅以輔屬體無所不靡謂為溫柔鄉謂樊嫕曰吾老是鄉矣不能效武帝求白雲鄉也飛燕外傳體無軫粟飛燕初居貧與妹合德共被嘗通鄰人羽林射鳥者夜露雪立閉息順氣體無軫粟射鳥者以為神仙上唾花飛燕與其妹婕妤坐后誤唾其袖合德曰姊唾染人紺碧正似石上花假令尚方為之未必能若此衣之華乃號石華廣袖上體香趙后浴五蘊七香湯踞通香沉水坐燎降神百蘊香婕妤浴豆蘊湯傳露花百英粉帝嘗私語樊嫕曰后雖有異香不若婕妤體自香也上昭陽趙飛燕為皇后其女弟在昭陽殿遺飛燕書曰今日嘉辰貴姊懋膺洪册謹上禭三十五條以陳踊躍之心西京雜記后立後寵少衰而弟絶幸為昭儀居昭陽舍漢書妖態梁冀妻孫壽色美而善為妖態作愁眉啼粧墮馬髻折腰步齲齒笑以為媚惑後漢身推鹿車趙喜與友人韓仲伯欲入武關仲伯以其婦有姿色恐有強暴者而已受其害欲棄之喜責怒仲伯以泥塗其婦面載以鹿車身自推每逢賊輒為求哀言其病遂脫東觀漢記惠而有色魏甄后惠而有色先為袁熙妻甚獲寵曹公之屠鄴也令疾召甄左右白五官中郎已將去公曰今年破賊正為奴世説建安中袁紹為中子熙娶甄會女紹死熙出在幽州甄留侍姑及鄴城破五官將從而入紹舍魏略見婦人被髮垢面垂涕立紹妻劉後文帝問知是熙妻使令攬髮以袖拭面姿貌絶倫既過劉謂甄曰不復死矣遂納之有寵世語五官將納熙妻也孔融與曹公書曰武王伐紂以妲己賜周公太祖以融博學真謂書傳所記後見融問之對曰以今度古想其然也魏氏春秋感甄記曰魏東阿王漢末求甄逸女既不遂太祖回與五官中郎將植殊不平晝思夜想廢寢與食黃初中入朝帝示植甄后玉鏤金帶枕植見之不覺泣下時已為郭后讒死帝意亦尋悟因令太子留宴飲仍以枕賚植植還度轘轅少許時將息洛水上思甄后忽見女來自云我本託心君王其心不遂此枕是我在家時從嫁前與五官中郎將今與君王遂用薦枕席歡情交集豈常辭能具為郭后以粳塞口今被髮羞將此形貌重覩君王爾言訖遂不復見所在遣人獻珠於王王答以玉佩悲喜不能自勝遂作感甄賦後明帝見之改為洛神賦得妾殺子建安二年春正月曹操征張繡繡降其季弟濟妻國色也操以妾為繡由是媒叛襲操七軍大敗之殺其二子袁宏後紀國志繡濟族子針神魏文帝所愛美人姓薛名雲藝常山人也藝年十七容貌絶世時文帝選良家子入宮靈藝別父母歔欷纍日淚下沾衣至升車就路之時以玉唾壺承淚壺郎如紅色及至京師壺中之淚凝如血色矣帝改靈藝之名曰夜來來妙於針工雖處深帷重幄之內不用燈燭裁製立成非夜來縫製帝則不服宮中號為針神拾遺記四絶文帝宮人絶所愛者有莫瓊樹薛夜來田尚衣段巧笑四人日夕在側瓊樹乃制蟬鬢縹眇如蟬狀故曰蟬鬢巧笑始以錦衣絲履作紫粉拂面尚衣能歌舞夜來善為衣裳一時冠絶古今注絳樹今之妙舞莫巧於綘樹清歌莫激於宋臘文帝與繁欽書神女吳主潘夫人父坐法夫人輸入織室容態少儔為江東絶色同幽者百餘人謂夫人為神女敬而遠之有司聞於吳主使圖其容貌夫人憂戚不食臧瘦改形工人寫之以進吳主見而喜悅以虎魄如意撫按嗟曰此神女也愁貌尚能惑人况在歡樂乃命雕輪就織室納於後宮果以姿色見寵四姬孫亮作琉璃屏風甚薄而瑩徹每於月下清夜舒之常與愛姬四人皆振古絶色一名朝姝二名麗居三名潔華四名洛珍刻像孫皓以張布女為美人有寵皓問曰汝父所在答曰賊以殺之皓大怒棒殺之後思其顏色使巧工刻木作美人形像恆置座側問左右布復有女否答曰布大女適故衛尉馮朝子純即奪純妻入宮大有寵拜為左夫人晝夜與夫人房宴不聽朝政會夫人死皓哀愍思念葬於苑中大作冢使工匠刻柏作木人內冢中以為兵衛江表傳神傷荀粲常以婦人才智不足論自宜以色為主驃騎將軍曹洪女有色粲於是聘焉容服帷帳甚麗專房燕婉歷年後婦病亡未殯傳嘏往唁粲粲不哭而神傷蝦問曰婦人才色並茂為難子之聘也遺才存色非難遇也何哀之甚粲曰佳人難再得顧逝者不能有傾城之異然未可易遇也痛悼不能已已歲餘亦亡世説光麗韓壽美姿容賈充辟以為掾充每聚會賈女於青璅中看見壽説之恆懷存想光麗豔逸端美絶倫壽聞之心動遂請婢潛修音問及其往宿壽蹻捷絶人踰牆而入家中莫知自是充覺女盛自拂拭説畼有異於常後會諸吏聞壽有奇香之氣是外國所貢一箸人則歷月不歇充計武帝唯賜已及陳騫餘家無此香疑壽與女通而垣牆重密門閣急峻何由得爾乃託言有盜令人修牆使反曰其餘無異唯東北角如有人迹而牆高非人所踰充乃取女左右婢考問即以狀對充祕之以女妻壽別傳郭子謂與韓壽通者乃是陳騫女即以妻壽未婚而女亡壽因娶賈氏故世因傳是充女晉諸公贊曰壽字德真敦家風性忠厚豈有若斯之事諸書無聞唯見世説自未可信注騫弟與其子興興忿爭遂説騫子女穢行騫表徙弟以此獲譏於世晉書章丹陳珠夏統從父祀先人迎女巫章丹陳珠二人並有國色莊服甚麗善歌舞又能隱形匿影吞刀吐火統破藩而走歸責諸人曰昔淫亂之俗興衛文公為之悲惋螮蝀之氣見君子尚不敢指季桓納齊女仲尼載馳而退子路見夏南憤恚而慷愾吾常恨不得頓叔向之頭陷華父之眼奈何諸君迎此妖物夜與遊戲放傲逸之情縱奢淫之行亂男女之體破貞高之節何也遂隱床上被髮而臥不復言上六劉劉聰使大鴻臚李弘拜太保劉殷二女為左右貴嬪長曰英字麗芳次曰娥字麗華又納殷孫女四人為貴人謂弘曰此女輩皆姿色絶世女德冠時且太保於朕實自不同弘曰太保裔自有周與聖源實別聰大晤賜弘黃金六十斤於是六劉之寵傾於後宮載記列女傳二靳劉聰如中護軍靳準第遂納其二女為左右貴嬪大曰月光小曰月華皆國色也數月立月光為皇后靳氏有淫穢之行陳元達奏之聰廢靳靳慚恚自殺載記門薛張天錫疾篤門薛二姬並有國色天錫謂曰吾死之後汝二人豈可更為他妻皆曰尊若不諱請效死尊前誓無他志二人自殺天錫疾瘳追悼二姬葬以夫人禮續帝王世紀陳琬晉元興末魏郡民陳氏女名琬家在查浦年十六飢疫之歲父母相繼死沒唯有一兄傭賃自活女容色甚艷鄰中士庶見其貧弱竟以金帛招要之女力操貞氣未嘗有許後直盧循之亂賊衆將加凌逼女厲然不回遂以被害祖沖之述異記化生邢巒在漢中時掠良人為奴婢盧昹與巒有隙與元暉計令崔亮劾之巒懼乃以漢中所得巴西太守龐景民女化生等二十餘口與暉化生等數人奇色也暉大悅乃背昹為巒言於世宗遂得不坐魏書五十三美人石梁石靈寶本餘姚人寓居武康生女有姿容北齊始安王遙光納焉遙光敗入東昏宮建康城平為武帝采女生元帝為修容賜姓阮氏拜其父為朝請時人因名其所居之溪曰阮公溪溪中有大青石曰美人石南史西吳里語重臺蓮梁吳興蘇氏女嘗於霅溪西南岸遇道士以小龜遺已光彩五色曰三年有徵蘇適章景明生女名要兒為陳霸先後因名其地曰貴涇浦又曰章浦其中生重臺蓮花識者云主出美人後果生后后生紫光照室因失龜所在后少聰慧美容儀手瓜長五寸色並紅白每有期功之服則一瓜先折陳書吳興志光彩照映陳後主張貴妃名麗華陰長七尺鬢黑如漆其光可鑒特聰慧有神彩進止間雅容色端麗每瞻視眄睞光彩益目照映左右陳書司花女長安貢御車女袁寶兒年十五腰肢纖墮騃情多態帝寵愛之特厚時洛陽進合館迎輦花帝命寶兒持之號曰司花女隋遺録秀色一日帝將登風舸憑殿腳女吳絳仙肩喜其柔麗不與群輩齒愛之甚久不移步絳仙善畫長蛾眉帝色不自禁由是殿腳女爭效為長蛾眉帝海倚簾視絳仙移時不去顧內謁者云古人言秀色若可食如絳仙真可療飢矣時越溪進耀光綾帝獨賜司花女洎絳仙他姬莫預也殿腳女自至廣陵悉用備月觀行宮由是絳仙不得親侍寢殿有即將自瓜州宣事回獻合歡水果一器帝命小黃門以一雙騎馳賜絳仙遇馬急搖解絳仙拜賜因附紅箋小簡上進曰馹騎傳雙果君王寵念深寧知辭帝里無復合歡心帝省章不悅顧黃門曰絳仙如何來辭何怨之深也黃門言其故帝曰絳仙不獨貌可觀詩意深切乃女相如也何謝左貴嬪乎上來夢兒煬帝自達廣陵沉湎失度每睡須搖頓四體方就一夢侍兒韓俊娥尤得帝意每寢必召令振聳支節然後成寢別賜名為來夢兒他日蕭后誣罪去之帝一日登迷樓憶之題云黯黯愁侵骨綿綿病欲成須知劉嶽鬢強半為多情上飲乳侯君集既誅録其家得二美人容色絶代太宗問其狀曰自爾已來常食人乳而不飯又君集之破高昌得金簟二甚精御府所無亦隱而不獻至時并得焉隋唐嘉話花鳥使天寶中天下無事選六宮風流艷態者名花鳥使主宴傳載素面朝天玄宗妃楊太真姿質豐艷知算過人每倩盼承迎動移上意舊書有姊三人皆豐碩修整工於謔浪巧會旨趣每入宮中移晷方出玄宗並封國夫人之號長曰大姨封韓國三姨封虢國八姨封秦國同日拜命皆月給錢十萬為脂粉之資然虢國不施粧粉自衒美艷常素面朝天當時杜甫有詩云虢國夫人承主恩平明上馬入宮門却嫌脂粉涴顏色淡掃娥眉朝至尊楊妃外傳明秀梅妃善屬文自比謝女淡妝雅服而姿態明秀筆不可描畫明皇大見寵幸長安大內大明興慶三宮東都大內上陽兩宮幾四萬人自得妃視如塵土宮中亦自以為不及梅妃傳秀曼都雅韓弘為汴帥惡李光顏力戰陰圖撓屈遂舉大梁城求得一美婦人教以歌舞絃管六博之藝飾之以珠翠金玉衣服之具計費數百萬命使者送遺光顏翼一見悅惑而怠於軍政也詰朝光顏乃大宴軍士命使者進妓之至秀曼都雅殆非人間所有一軍驚視光頽乃謂來使曰令公憐我久離室家捨美妓見贈誠有以荷德也然今戰卒皆負妻子蹈白刃光顏奈何獨以好色為樂因涕泣鳴咽厚酬來使俾領其妓自席上而回舊書飛鸞輕鳳寶曆二年浙東國貢舞女二人一曰飛鸞一曰輕鳳修眉黟首蘭氣融冶冬不纊衣夏不汗體上琢玉芙蓉以為二女歌舞臺每歌聲發如鸞鳳之音及觀於庭際舞態艷逸更非人間所有每歌罷上令內人藏之金屋寶帳蓋恐風日所侵故也由是宮中語曰寶帳香重重一雙紅芙蓉杜陽雜編絶色畢誠宣宗恩顧特異許以為相令孤綯所忌連徙之鎮皆綯緩其入相之謀也誠思有以結綯在北門得絶色非人所有者盛飾珠翠專使獻綯綯一見心為之動謂其子曰尤物必害人畢太原於吾無分今以是餌吾將傾吾家族也一見立反之使人不敢將回驛候誠意誠又瀝血書輸啓事於綯綯終不納乃命吏貨之東頭醫李玄伯伯所狎昵者以錢七十萬致於家乃舍上堂坐之玄伯執賤役以事之踰月盡得其歡心焉乃進於上上見大惑之寵冠六宮玄伯燒伏火丹進以市恩睪上瘡疾作玄伯之罪也懿宗即位與山人王嶽道士盧仙芝俱棄市東觀奏記窅娘李后主宮嬪窅娘纖麗善舞后主作金蓮六尺作品色瑞蓮令窅娘以帛纆腳令纖小屈上作新月狀素襪舞蓮中回旋有凌雲態齊鎬詩云蓮中花更好雲裏月常新因窅娘作也自是人皆效之道山青話顰笑後主保儀黃氏容態華麗冠絶當世顧眄顰笑無不妍姣其書學伎能皆出於天性南唐書花蘂夫人費氏蜀之青城人以才色入蜀宮後主嬖之號花蘂夫人效王建作宮詞百首國亡入備後宮宋祖聞之召使陳詩誦其國亡詩云君王城上豎降旗妾在深宮那得知十四萬人齊解甲寧無一介是男兒祖悅蓋蜀兵十四萬而王師才數萬爾後山詩話花蘂夫人入宮太祖幸之晉王諫為未黜一日與宋祖獵於園中射殺之鐵圍山叢談瓊仙南漢劉鋹才人名盧瓊仙五國故事花不如完顏亮侍寢妃花不如者長安貧家女慧麗專亮寵凡打毬縱獵出入無不從之亮死亦被殺采石瓜州斃亮記青琴青琴妃之徒絶殊離俗妖冶間都靚莊刻飾便嬛綽約上林賦南部青琴姣冶之極而必俟盛飾以高麗回賜遊夏雖天才雋朗而實須墳誥以廣智抱朴醜耗土之人醜家語仳倠媒婄儓𧟱䫪䫂噅睢頦顝䫑醜也廣推異貌伏羲牛首女媧蛇軀皋陶鳥喙孔子牛唇後漢周蔡傳注顏惡禹長頸鳥啄面目顏色亦惡矣天下獨賢之尸子鬷蔑醜男鬷蔑醜女鍾離泰束晳發蒙記法琳云陽文與鬷蔑爭麗孟陬與隴廉兢妍廣弘明集駘他魯哀公問仲尼曰衛有惡人焉曰哀駘他丈夫之與處者思而不能去也婦人見之請於父母曰與人為妻寧為天子妾者十數而未止也是必有以異乎人也寡人召而觀之果以惡駭天下莊子德充符魯惡魯有惡者其父出而見沈咄反而告其鄰曰沈咄不若吾子矣且其子至惡也沈咄至美也彼以至美不如至惡尤乎愛也呂去尤讎糜陳有惡人焉曰敦洽讎糜雄顙廣顏色如浹頳垂眼臨鼻長肘而短陳侯見而甚説之外使治其國內使制其身楚合諸侯陳侯病不能往使敦洽讎糜往謝焉楚王怪其名而先見之客有進狀有惡其名言有惡狀楚王怒合大夫而告之曰陳侯不知其不可使是不知也知而使之是侮也侮且不智不可不攻也興師伐陳三月然後喪惡足以駭人言足以喪國而友之足於陳侯而無上也至於亡而友不衰上遇合支離支離疏者頤隱於齊肩高於頂會撮指天五管在上兩髀為脅莊人間世闉跂支離無脤説衛靈公靈公説之而視全人其脰肩肩甕盎大癭上德充符不相唐舉相蔡澤曰先生曷鼻臣肩魋顏蹙齃膝攣吾聞聖人不相殆先生乎史史秦相蔡澤斂頤折頞初學記澤斂頤蹙頞周燮注頞鼻莖也貌陋子高見齊王齊王問誰可臨淄宰稱管穆焉王曰穆容貌陋民不敬答曰夫見敬在德且臣所稱稱其材也君王聞晏子趙文子乎晏子長不過三尺面貌惡齊國上下莫不宗焉趙文子其身如不勝衣其言如不出口非但體陋辭氣又訥訥然其相晉國晉國以寧諸侯敬服皆有德故也以穆軀形方之二子猶悉賢之良臣嘗行臨淄市見屠沈焉身修八尺鬚髯如戟面正紅白市之男女未有敬之者無德故也王曰是所謂祖龍始者也帎如先生之言於是乃以管穆為臨淄宰孔叢子眩名承宮字少子朝廷憚其節名播胸奴時北單于遺使求得見官顯宗勑自整飾宮對曰夷狄眩名非識實者也聞臣虛稱故欲見臣醜陋形寢不可以示遠不如選長大有威容者帝乃以大鴻臚魏應代之後漢異貌汝南周燮斂頤折頞狀醜駭人毋欲不舉其父不聽曰吾聞聖賢多有異貌興我宗者必此兒也遂育之汝南先賢傳後漢書形陋魏武將見胸奴使目以形陋不足雄遠國使崔季圭代帝自捉刀立床頭既畢令間諜問曰魏王何如胸奴使答曰魏王雅望非常然床頭捉刀人此乃英雄也魏武聞之追殺此使世説貌寢王粲容狀短小有異才西京擾亂乃之荊州依劉表表以粲貌寢而體弱通侻不甚重也魏志二十一初粲與族兄凱俱避地荊州劉表欲以女妻粲而嫌其形陋而用率以凱有風貌乃以妻凱博物記醜悴左思貌醜悴不持儀飾續文章志思貌醜陋而口訥晉書太沖絶醜效潘嶽遊遨於是群嫗齊共亂唾之委頓而返世説投石張孟陽至醜每行小兒以瓦石投之滿車語林甚醜劉伶字伯倫長六尺貌甚醜悴常乘鹿車攜鋤壺酒使人荷鍤而隨之謂曰死便埋我晉書真猴宋何尚之與顏延之少相狎好為嘲調二人並坐小何常謂顏公為猴顏亦以何為猴嘗共遊戲西池顏問路會吾二人誰似猴路人指何為似延之大喜人曰彼似猴爾君乃真猴也謝綽宋拾遺録短陋張融字思光形貌短陋精神清徹王敬則見融革帶垂寬殆將至骼謂之曰革帶太急融曰既非步吏急帶何為南齊陋小晉安王出成石頭高祖謂周捨曰為我求一人文學俱長兼有行者欲令與晉安遊處捨曰臣外弟徐摛形質陋小若不勝衣而堪此選高祖曰必有仲宣之才亦不簡其容貌以摛為侍讀梁書生犀陸驗為少府丞本無藝業而容貌特醜先是外國獻生犀其形甚陋故閭里以驗為生犀南史恩幸傳奇醜昔王池國有民壻面奇醜婦國色鼻齆壻乃求媚此婦終不肯迎顧遂往西市無價名香而燻之還入其室婦既齆豈知分香臭哉金樓子無情宋遊道使氣黨俠時人語曰遊道彌猴面陸操科斗形意識不關貌何謂醜者必無情李構嘗因遊道會客因戲之曰賢從在門外大好人宜自迎接為通名稱族弟遊山遊道出見之乃獼猴衣帽也將與構與構謝之豁然如舊北齊麼陋長孫太尉見歐陽率更姿形麼陋嘲之曰聳膞成山字埋肩畏出頭誰言麟間上畫此一獼猴詢亦酬之曰索頭連背暖漫襠畏肚寒柢緣心混混所以面團團太宗聞之而笑曰詢此嘲曾不為皇后邪本事詩貞觀十年文德皇后崩百官縗經率更令歐陽詢狀貌醜異衆或指之許敬宗見而大笑為御史所劾左授洪州都督舊唐許郝許欽明與郝處俊鄉黨親族兩家子弟類多醜陋而盛飾車馬以遊里巷京洛為之語曰衣裳好儀貌惡不姓許即姓郝韋述兩京記鬼視盧妃貌陋而色如藍人皆鬼視之舊唐崑崙慕容彥超吐渾部人也父亮彥超即漢高祖之同産弟也嘗冒姓閻氏體黑面胡故謂之閻崑崙周史嫫母黃帝納醜女號嫫母使訓宮人而有淑德奏上德之頌帝周遊行時元妃嫘祖死於道令次妃嫫母監護於道以時祭之因以嫫母為方相氏軒轅本紀人之於色也無不知説美者而美者未必遇也故嫫母執乎黃帝黃帝曰屬女德而弗忘與女正而弗衰雖惡奚傷呂遇合西施媞媞而不得見兮嫫母勃屑而入侍七諫軒皇愛嫫母之貌不易落英之麗容陳侯悅敦洽之醜狀弗貿陽文之婉姿劉子仳倠啳哆噅籧篨戚施雖粉白黛黑弗能為美者嫫母仳也注仳古之醜女淮修務仳醜面也説文隴簾璋圭雜於甑窐兮隴簾與孟娵同宮注云隴簾醜婦也孟娵好女也哀時命效矉西施病心而矉其里其里之醜人見而美之歸亦捧心而矉其里其里之富人見之堅閉門而不出貧人見之挈妻子而去之走彼知美矉而不知矉之所以美莊天運倭傀毛嬙西施善毀者不能藪其好嫫母倭醜善譽者不能掩其醜四子詣德論厚送齊王厚送女欲妻屠牛吐為婦吐辭以疾其友曰子終死腥臭之肆而已乎何為辭之吐應之曰其女醜其女曰子何以知之吐曰以吾屠知之其友曰何謂也吐曰吾肉善之量而去苦少耳吾肉不善雖以他附益之尚猶不售今厚送子子醜故耳其友後見之果醜傳曰目如劈杏齒如編貝韓詩外傳卬鼻齊鍾離春者齊無鹽色女也其為人極醜無雙白頭深目長脂大節卬鼻結喉肥項少髮折腰出胸皮膚若漆行年三十無所容入衒嫁不售於是拂拭短褐自謁宣王宣王方宴於漸臺左右聞之掩口大笑曰此天下強顏女子也宣王召見揚目銜齒謂有四殆宣王喟然而嘆納之為后列女傳項瘤齊宿瘤女者齊東郭採桑之女也項有大瘤故號宿瘤閔王出遊百姓盡觀宿瘤採桑如故王曰此奇女也命後車載之歸告諸夫人曰今日出遊得一聖女遲其至也宿瘤駭宮中失貌不能自止女與衆言閔王大感以為后上五逐齊孤逐女者即墨之女也孤無父母其狀甚醜三逐於鄉五逐於里過時無所容乃造襄王之門而求見王輟食而起左右曰三逐於鄉者不忠五逐於里者少禮何足為貴王曰子不識也夫牛鳴而馬不應者異類故也此人必有與人異者遂見與之語而悅之遂以為齊相妻上登徒妻登徒子其妻蓬頭攣耳齞唇歷齒旁行踽僂又疥且痔登徒子悅之使有五子好色賦允婦許允婦是阮衛尉女德如妹奇醜交禮竟允無復入理家人深以為憂會桓範至語許云阮家既嫁醜女與卿故當有意卿宜察之許便回入內既見婦既欲出婦料其此出無復入理便捉裾停之許因謂曰婦有四德卿有其幾婦曰新婦所乏唯容爾然士有百行君有幾許云皆備婦曰夫百行以德為首君好色不好德何謂皆備允有慚色遂相敬重世説卑下王公淵娶諸葛誕女入室言語始交王謂婦曰新婦神色卑下殊不似公休婦曰大丈夫不能仿佛彥雲而令婦人比蹤英傑上酒家婢兵部郎中朱前疑貌醜其妻有美色天后時洛中殖業坊西門酒家有婢蓬頭垢面傴肩皤腹寢惡之狀舉世所無而前疑大悅之殆忘寢食乃知前世言宿瘤蒙愛信不虛也僉載美室張郎中又新與楊荊州齊名友善楊妻李氏即鄘相之女有德無容楊未嘗意敬待特甚張嘗語楊曰我少年成美名不憂仕矣唯得美室平生之望斯足楊曰必求是但與我同好必諧君心張深信之既婚殊不愜心楊以笏觸之曰君何太癡言之數四張不勝其忿回應之曰與君無間以情告君君誤我如是何謂癡楊歷數求名從宦之由曰豈不與君皆同邪曰然然則我得醜婦君詎不聞我邪張色解問君室何如我曰特甚張大笑遂如初張既成家乃詩曰牡丹一朵直千金將謂從來色最深今日滿欄開似雪一生辜負看花心本事詩骨節轉車吳伐越墮會稽獲骨焉節轉車吳子使來好聘且問之仲尼仲尼爵之即徹俎而宴客執骨而問曰敢問骨何為大仲尼曰昔禹致群神於會稽之山防風氏後至禹殺而戮之其骨節轉車此為大矣客曰防風氏何守也仲尼曰汪芒氏之君也守封隅之山者也為漆姓在虞夏沈為汪芒氏於周為長翟氏今為大人客曰人長之極幾何仲尼曰僬僥氏長三尺短之至也長者不過十尺數之極也身橫九畝文公十年冬十月叔孫得臣敗狄于鹹長狄也弟兄三人佚宕中國瓦石不能害叔孫得臣最善射者也射其目身橫九畝斷其首而載之眉見於軾穀梁傳十一年冬十月甲午敗狄于鹹獲長狄僑如富父終甥椿其喉以戈殺之埋其首於子駒之門以命宣伯左傳長狄弟兄三人各長百尺狄者陰氣時中國衰有夷狄明春秋考異郵長狄長蓋五丈餘也洪範五行傳十尺孔子長十尺大九圍坐如蹲龍立如牽牛就如之昂望之如斗春秋演孔圖一丈伍子胥見吳王僚僚望其顏色甚可畏長一丈大十圍眉開一尺王僚與語三日辭無復者胥知王好之每入言倍有勇壯之氣吳越春秋大人十二秦始皇帝二十六年有大人長五丈足履六尺關中記身長百尺皆夷狄服凡二十人見于臨洮天戒若曰勿大為夷狄之行將受其禍是歲始皇初并六國反喜以為瑞銷天下兵器作金人十二以衆之遂自賢聖築長城故大人見於臨洮明禍亂之起前五行志鑄金狄人十二各重二十四萬斤立阿房殿前三輔舊事昔大人見臨洮而銅人鑄臨洮生卓而銅人毀天下大亂卓身滅抑有以也餘二人魏明帝欲徙詣洛陽清明門裏載至霸城重不可致便留之英雄記後石季龍徙之鄴苻堅又移入長安而銷之關中記銅人翁仲其名也謝承後漢書阮翁仲翁仲安南人身長二丈三尺氣質端勇異於常人少為縣吏為督郵所笞歎曰人當如是耶遂入學究書史秦始皇併天下使翁仲將兵守臨洮聲振胸奴秦以為瑞翁仲死遂禱銅為其像置咸陽宮司馬門外胸奴至有見之者猶以為生宕渠獻秦襄王時宕渠郡獻長人長二十五丈六尺蜀王本紀巨母霸王莽夙夜連率韓博上言有奇士長一丈大十圍來至臣府曰欲奮擊胸奴自謂巨母霸出於蓬萊東南五城西北昭如海瀕軺車不能載三馬不能勝即日以大車四馬建虎旗載霸詣闕臥則枕鼓以鑯著食此皇天所以輔新室者也莽聞惡之留霸在所新豐更其姓曰巨母氏謂因文母太后而霸王符也前漢娶長馮勤字偉伯魏郡繁陽人也高祖父揚宣帝時為弘農太守有八子皆為二千石趙魏間榮之號曰萬石君焉兄弟形皆偉壯唯勤祖父偃長不滿七尺常自耻短陋恐子孫之似也乃為子伉娶長妻伉生勤長八尺三寸八歲善計姚期薦於光武在事精勤遂見親識每引進帝輒顧謂左右曰佳乎吏也後歷官司徒號稱任職勤母年八十每會見詔勑勿拜令御者扶上殿謂諸王曰使勤貴寵者此母也後漢魁岸郭太字林宗身長八尺儀貌魁岸善談論聲音如鍾後漢紀溫偉大將軍袁紹總兵冀州遣使要鄭玄太會賓客玄最後至乃延升上坐身長八尺餘飲酒一斛秀眉明目儀容溫偉後書八尺諸葛孔明身長八尺每自比於管仲樂毅蜀志見襄武咸熙二年有大人見襄武縣長二丈餘腳迹長二尺二寸白髮著黃單衣黃巾柱杖呼民王始語云今當太平魏志屐七尺符健皇始四年有長人見身長五丈語張靖曰今當太平新平令以聞健以為妖妄召靖擊之是月也雨河渭泛溢滿坂津監寇登於河中流得大履一隻長七尺三寸足迹稱屐指長尺餘文深七寸健歎曰覆載之中何所不有張靖所見定不虛也乃赦之祖沖之述異記丈八苻堅以乞活夏默為左鎮即胡人護磨那為右鎮即奄人申香為拂蓋即默等身長一丈八尺並多力善射三人每食飯一石肉三十斤崔鴻前秦録二丈燉煌西盡大秦隔海心無憂遇善風不經二十日得渡心憂數年不得渡諺曰心無憂患不經二旬心若憂患遠離三春士人賢直男女皆長二丈端正國主風雨不和則讓賢而治之三秦記脛長丈六神武時盧曹率其徒自薊入海島得長人骨以髑髏為馬皂脛長丈六尺以為二稍送其一於神武諸將莫能用唯彭樂強舉之未幾曹遇疾烔聲聞於外巫言海神為祟遂卒北齊書身長七尺盧文進幽州人也身長七尺狀貌偉然至江南李氏封范陽王嘗至天定河見人脛骨大如柱長可七尺陸遊南唐詩長丈二淳熙間蘇州有唐姓者兄妹皆長丈二日啖斗餘行倦則倚市簷憩坐如堵墻不可出出則傾市觀之詔廩之殿前司德壽欲見之遣詣北宮懼其聚民乃臥而泛河之至望仙橋專舟焉續夷堅志龍伯佻人從崑崙以北九萬里得龍伯國人長三十丈生萬八千歲而死從崑崙以東得大秦人長十丈皆衣帛從此以東千萬里得佻人國長三十丈五尺從此以東十萬里得中秦國人長一丈河圖玉版朴父東隅大荒之中有朴父焉夫婦並高千里腹圓百輔天初立時使夫妻導開百川懶不用意謫其夫妻並立東南男露其勢女彰其殺氣息如人不畏寒暑不飲不食須黃河清復更使其夫妻導百川神異經東夷東夷長人者類長三丈鋸牙鉛爪黑毛覆身不火食噬禽獸或摶人以食支提有支提國人長三丈二尺有三手三足一手當胸手足各三指洞冥記大秦大秦國人長一丈五尺猿臂長脅好騎駱駝外國圖丈五六晉永嘉王年有鶖鳥集于始安縣南其里之鷔陂中民周虎張得之木矢貫之鐵銀其長六尺有半以箭計之其射者人身應長一丈五六尺也又平州別駕高會語曰倭國人嘗行遭風吹度大海外見一國人皆長丈餘形狀似胡蓋是長翟別種箭殆將從此國來也山經帝舜帝堯長帝舜短文王長周公短仲尼長子貢短葉公子高徵小短瘠行若將不勝其衣然白公之亂也葉公子高入據楚誅白公定楚國如反手耳荀非相黑短齊景公伐宋過太山夢二人怒曰謂太山之神晏子謂宋相湯與伊尹也為言其狀湯晢容多髮伊尹黑而短即所夢也景公進軍不聽軍鼓毀公怒散軍伐宋博物志晏子瑣語湯作盤寅七寸齊桓公獵得一鳴鵠宰之嗉中得一人長三寸三分著白圭之袍帶劍持刀車罵詈瞋目後又得一折齒方圓三尺問群臣曰天下有此及小兒否陳章答曰昔秦胡充一舉渡海與齊魯交戰折傷版齒昔李子敖於鳴鵠嗉中遊長三寸三分博物志有李子昂長七寸日行千里一旦被海鵠所吞居鵠腹中三百年不死神異經朱儒邾人莒人伐鄫臧紇救鄫侵邾敗於狐駘國人誦之曰我君小子朱儒是使朱儒朱儒使我敗於邾左襄五使楚晏子使楚以晏子短楚人為小門於大門之側而延晏子晏子不入曰使狗國者從狗門入今臣使楚不當從此門入儐者更道從大門入見楚王王曰齊無人耶晏子對曰臨淄三百閭張扇成陰揮汗成雨比肩繼踵而在何為無人王曰然則子何為使乎晏子對曰齊命使各有所主其賢者使使賢王不肖者使使不肖王嬰最不肖直使楚矣晏子眇小孟嘗君之趙趙人出觀之笑曰始以薛公為魁然也今視之眇小丈夫耳史記短小齊遣淳於髡到楚為人短小楚人甚薄之謂曰齊無人而使子來何長也對曰臣無所長臣腰中七尺之劍欲斬無狀王王曰止吾但戲子耳即與髡共飲酒説苑巨靈東郡送一短人長七寸衣冠具足上疑其山精常令在案上行召東方朔問朔至呼短人曰巨靈汝何忽叛來阿母還未短人不對因謂上曰王母使臣來告陛下求道之法唯在清淨不宜躁擾復五年與帝會言終不見漢武故事尺二漢光武時頴川張仲師長一尺二寸纂文沈約問劉杳云何承天纂奇博其書載張仲師及長頸王事此何所出杳曰仲師長尺二寸唯出論衡長頸是毗騫王宋建安扶南以南記云古來至今不死約即取二書尋檢一如杳言南史小吏張重字仲篤南郡人也明帝永明元年舉孝廉送京師正月朝於德明殿帝怪其短小問曰何郡小吏答曰昔子奇十六為河東太守甘羅十二為秦相陛下欲得才耶抑將稱骨度肉也帝嘉其善對賜以金帛東觀記交州名士傳短陋周舉字宣光姿貌短陋有晏子之風汝南先賢傳博學洽聞為儒者所宗故京師為之語曰五經從橫周宣光後漢黝歙短人孫權黃武五年有大秦賈人字秦論來到交趾交趾太守吳邈遣送詣權權問方土謠俗論具以事對時諸葛恪討丹陽獲黝歙短人論見之曰大秦希見此人權以男女各十人差吏會稽劉咸送論還本國宋書諸夷中天竺下甚短山濤子淳字子玄允字叔真並少尫病形甚短小而總敏過人武帝聞而欲見之濤不敢辭以問於允允自以尫陋不肯行濤以為勝已乃表曰臣二子尫病宜絶人事不敢受詔論者奇之晉書過軀之用齊孟業有盛名初司州牧清河王嶽聞業名召為法曹見其容貌短小笑而不言及尋斷決之處乃謂業曰卿決斷之明可謂有過軀之用三國典略三短李諧為人短小六指因癭而舉順因跛而緩步因謇而徐言人言李諧善用三短北史三十一短禿阮孚性機辨好酒貌短而禿周文帝偏所愛重常於室內置酒十瓶瓶大一斛上皆加帽欲以戲孚孚適入室即見驚喜曰吾兄弟輩甚無禮何為入王家上坐相對宜早還宅因持酒去周文帝憮然大笑短人行唐長孫元同幼有譏辨貞觀中嘗在諸公主席衆莫能當高密公主乃云我段家兒郎亦有人物走令喚取段恪令對玄同段恪雖微有詞其儀容甚短小召至始入門玄同即云為日已暗公主等並大驚怪云日始是齋時何為道暗玄同乃指段恪若不日暗何得短人行坐中大笑恪面大赤更無以答啓顏録功德竇曉形容短小眼大露睛樂彥偉身長露齒彥偉先弄之云足下甚有功德旁人怪問彥偉曰既已短肉又復精進豈不大有功德竇即應聲答曰公自有大功德因何道曉人間其故竇云樂工小來長高又問長高之意竇云身長如許口嘴高崖豈不是長高衆皆大笑上短向上北省班諫議在給事中上中書舍人在給事中下裴佶為諫議形質短小諸舍人戲之曰如此短何得向上裴佶曰若怪即曳向下衆人皆大笑因話録眇小無髯李希烈叛關播盛稱李元平德宗拜汝州別駕始至募王築郛浚隍希烈陰使亡命應募縳元平馳見希烈遺矢于地希烈以其眇小無髯戲李克誠曰使爾取元平乃以其子來也因嫚罵曰育宰相使汝當我何待我淺耶新唐半人桑維翰身短面黃每對鑑自歎曰七尺之身何如一尺之面後登第同榜四人秦王幕客陳保極戲謂人曰今歲有三箇半人及第以維翰短陋故謂之半人續世僬僥從中州以東四十萬里得僬僥國人長一尺五寸東北極有人名曰諍人長九寸烈湯問詩含人霧周僥國其人短小冠帶一曰僬僥國山海僬僥國人長一尺六寸迎風則偃背風則伏眉目俱足但野宿外國圖有小人國名靖人山海僬僥極麼靖人唯小四體俱足眉目才了郭圖贊長安中嘗見有人臘長尺許眉目手足悉俱或以為焦僥人也南部新書螻蛄東方有人其長三尺君長出行導衛威儀有若中國人又有小人如螻蛄手撮之滿手得之二十枚廣志侏儒國倭南有侏儒國其人長三四尺去女王國四千餘里魏略短人國短人國在康居西北男女皆長二尺衆人多去康居可萬餘里上西域傳陀移員嶠山有陀移國人長三尺壽萬歲廣延之國人長二尺拾遺記小人西北荒中有小人焉長一寸圓如長朱衣玄冠乘軺車導引有威儀人遇其乘車並食之其味辛楚終不為蟓像所咋並識萬物名字殺腹中三蟲神異經鵠國西海之中有鵠國男女皆長七寸自然有禮好經論跪拜壽三百歲行人如飛日千里百物不敢犯之唯鵠鵠遇吞之上壽三百歲在鵠腹不死而鵠一舉千里上弱土弱土之人肥家語肥多肉也腴腹下肥也説文脯臘古諺云堯舜至聖心如脯臘桀紂無道肥膚三尺張顯析言應客楚莊王圍宋子反乘堞而窺宋城見華元曰子之國何如華元曰易子而食之析骸而炊之子反曰吾聞圍國者鉗馬而秣之使肥者應客是何子之情也華元曰吾聞君子見人之惡則矜之小人見人之惡則幸之吾見子之君子也是以告情于子也公羊宣十五言勝閔子騫肥子貢曰何肥也子騫曰吾出見其美車馬則欲之入聞先王之言則又欲之兩心相與戰今先王之言勝故肥尸子義勝子夏見曾子曾子曰何肥也對曰戰勝故肥也曾子曰何謂也子夏曰吾入見先王之義則榮之出見富貴之樂又榮之兩者戰於胸中未知勝負故臞今先王之義勝故肥韓子食言魯哀公至自越郭重僕孟武伯惡重曰何肥也公曰是食言多矣能無肥乎公與大夫始有惡左哀食粳陳平少時家貧好讀書有田三十畝獨與兄弟常耕縱平遊學平為人長而美色人或謂平貧何食而肥若是其嫂疾平不親家産曰亦食粳核耳有叔如此不如無有聞逐其婦漢書如瓠張蒼當斬解衣伏質身長大肥白如瓠時王陵見而怪其美士乃言沛公赦勿斬上副腰東平憲王蒼腰帶八圍顯宗甚重之詔曰日者問東平王處家何等最樂王曰為善最樂其言甚大副是腰腹矣後漢代兄梁國車成字子威兄恩都為赤眉賊所待欲臠之成叩頭曰兄瘦我肥欲得代之賊感其義俱放之謝承書東觀記臨淄倪萌字子明為赤眉所得事同代弟趙孝字長平沛國蘄人王莽時天下亂人相食孝弟禮為餓賊所得孝聞即自縳詣賊曰禮久餓羸瘦不如孝肥餓賊大驚並放之東觀記脂流王允使呂布等誅董卓尸卓於市天時始熱卓素充肥脂流於地守尸吏然火置卓臍中光明達曙如是積日後漢逃廁曹操父嵩在太山操令太山太守應邵送家詣兗州陶謙密遣數十騎掩捕嵩家懼穿後垣先出其妾肥不出逃於廁與妾俱被害世語不能動京邑有一人失姓名食噉兼十許人遂肥不能動其父曾作遠方長吏被縣令故義共傳食之一二年中一鄉為儉博物志服肥吳質黃初五年朝京師詔上將軍及特進以下皆會質所太官給供具酒酣質欲盡歡時上將軍曹真性肥中領軍朱鑠性瘦質召優使説肥瘦真負貴恥見戲怒謂質曰卿欲以部曲將遇我邪曹洪王忠言將軍必欲使上將軍眼肥即自宜為瘦真愈恚拔刀瞋目言俳敢輕脫吾斬爾遂罵坐質案劍曰曹子丹汝非屠機上肉吳質吞爾不搖喉咀爾不搖牙何敢恃勢驕邪質別傳肥奴司馬懿奏免曹爽桓範踰城出為爽畫二策爽不能用範怒爽曰肥奴曹子丹好人生五六頭肉今桓範隨卿滅門也魏志今木無曹子丹佳人生汝兄弟豚犢耳魏氏春秋千斤孟業為幽州其人甚肥或以為千斤武帝為稱之難其大乃作一大稱挂壁業入見武帝曰朕欲自稱有幾斤業答曰陛下欲稱臣耳無煩復勞聖躬於是稱業果得千斤語林自娛孫權問諸葛恪頃何以自娛而更肥澤恪對曰臣聞富潤屋德潤身臣非敢自娛修已而已恪別傳食粳王戎子綏字萬子有美名少而大肥戎令食粳而肥愈甚年十九卒晉書肉潰司隸校尉高平滿奮字武秋豐肥肉潰膚裂每至暑夏輒膏汗流溢其有愛妾夜取以燃照炎灼發於屋表奮大惡之悉盛而埋之暨永嘉之亂為胡賊所燒皎若燭光異苑納李趙伯翁肥大夏日醉臥孫兒緣其腹上戲因以李八九枚乘臍中至後日李大爛汁出乃泣謂家人曰我腸將死明日李核出乃知孫兒所納李子也笑林忽肥庾公造周伯仁伯仁曰君何所欣説而忽肥庾曰君復何所憂慘而忽瘦伯仁曰吾無所憂直是清虛日來滓穢日去耳世語笨伯兗州既有八伯之號其後更置四伯大鴻臚陳留江淵以能食為穀伯豫章太守陳留史疇以大肥為笨伯散騎侍郎高平張嶷以狡妄為猾伯廬陵太守羊聃曼以狠戾為璅伯蓋擬古之四凶晉中興書肥癡沈昭略字茂隆性狂俊使酒仗氣無所推讓嘗醉晚日負杖攜家賓子弟婁湖苑逢王景文子約張目視之曰汝是王約耶何乃肥而癡約曰汝沈略昭耶何乃瘦而狂昭略撫掌大笑曰瘦已勝肥狂又勝癡奈何王約奈汝癡何南史二十七肥婢明皇在百花院便殿因覽漢成帝內傳時妃子後至以手整上衣領曰看何文書上笑曰莫問知則又殢人覔去乃是漢成獲飛燕身輕欲不勝風恐其飄翥帝為造水晶盤令官人掌之而歌舞又製七寶避風臺間以諸香安於上恐其四肢不禁也上又曰爾則任吹多少蓋妃微有肌也故上有此語戲妃楊妃外傳梅妃以楊妃之寵遷於上陽東宮後上憶妃召至華西閣敘舊愛繼而上失寤侍御驚報曰妃子已至上匿之遺舄并翠鈿命封賜妃謂使者曰上棄我之深乎使曰上非棄妃誠恐太真惡情耳妃笑曰恐憐我則動肥婢情豈非棄也上腹垂過膝張守圭為幽州節度安祿山盜羊事覺守圭剝坐欲打殺之大呼曰大夫不欲滅兩蕃邪何為打殺祿山守圭見其肥白壯其言而釋之令與鄉人史思明同捉生行必尅獲拔為偏將軍嫌其肥以守圭威風素高畏懼不敢飽食以驍勇聞遂養為子晚年益肥壯腹垂過膝重三百三十斤每行以肩膞左右抬挽其身方能移步至玄宗前作胡旋舞疾如風馬祿山肚大每著衣帶三四人助之兩人抬起肚豬兒以頭戴之始取裙褲帶及繫腰帶玄宗寵祿山賜華清宮湯浴皆許豬兒等人助解著衣服然終見刳者豬兒也舊唐肥醜中宗與群臣晏欽明自言能八風舞帝許之欽明體肥醜據地搖頭睆目左右顧眄帝大笑吏部侍郎盧藏用歎曰是舉五經掃地矣新唐相嘲王淇張亢同在南京晏元獻幕張肥大王以太牢目之王瘦小張以獼猴目之一日有米綱至八百里村水淺當剝載張往督王曰所謂八百里剝也張曰未若三千年精矣黽水燕談琪嘗嘲亢口張亢觸墻成八字亢應聲曰王琪望月叫三聲歸田録肥喘盛度體豐肥一日自前殿趨出宰相在後盛初不知忽見即欲趨避行百餘步乃得直舍隱於其中石學十中立見其喘甚問之盛告其故石曰相公問否盛曰不問別去十餘步乃悟罵曰奴乃以我為牛布袋和尚明州布袋和尚形裁腲腇蹙額皤腹蓋彌勒化身也傳燈不澤繼子得食肥而不澤情不相與往來也適子懷於燕慈母喻於荊情相往來也淮南穀氣勝穀氣勝元氣其人肥而不壽物理論䑋益梁之間凡諱其肥盛謂之䑋方言臞約省瘦也臞省約少之言也釋名羸委也瘠瘦也説文墳衍墳衍之人哲而瘠周禮地官司徒堯衍神農形悴堯瘦將欲利萬人也文子瘠甚楚子使薳子馮為令尹訪於申叔豫叔豫曰國多寵而王弱國不可為也遂以疾辭方暑闕地下冰而床焉重繭衣裘鮮食而寢楚子使醫視之復曰瘠則甚矣而血氣未動乃使子南為令尹襄二十一心憂宓子賤治單父有若見之曰子何臞也宓子曰君不知賤不肖使治單父官事急心憂之故臞也有若曰昔者舜鼓五絃歌南風之詩而天下治今以單父之細也治之而憂治天下將奈何乎故有術而御之身坐於於廟堂之上有處女子之色無害於治無術而御之身雖瘁臞猶未益韓外儲悲思和熹鄧后自遭大憂及新野君仍喪諸兄嘗悲傷思慕嬴瘦骨立不能自勝宋觀漢記瘦貴張氏得鉤何氏得算故三輔舊語曰何氏算張氏鉤何氏肥張氏瘦言何氏有肥人輒貴瘦人輒賤張氏瘦者輒貴肥者輒賤故二族以釣算知凶吉以肥瘦知貴賤三輒決録注瘦甚楊彪見漢祚將移遂稱腳攣不復行積十餘年後子修為曹操所殺曹見彪問曰公何瘦甚對曰愧無日殫先見之明猶懷老牛乳犢之愛操為之改容謝承後漢書瘦恨得晚曹操攻呂布於下邳呂布登西北白門上城陷士擒以諸操布曰明公何瘦操曰君何以識孤布曰昔在洛會溫氏園操曰然孤忘之矣所以瘦恨不早相故也獻帝春秋雞骨王戎和嶠同時遭大喪俱以孝稱王雞骨支床和哭泣備禮武帝謂劉仲雄曰卿數省王和不聞和哀苦過禮使人憂之仲雄曰和嶠雖備禮神氣不損王戎雖不備禮而哀毀骨立臣以和嶠生孝王戎死孝陛下不應憂嶠而應憂戎世語禁語衛玠好言玄理素抱羸疾母恆禁其語晉書別傳更瘦鄧竟陵免官後赴山陵過見大司馬桓公桓問之曰卿何以更瘦遐曰有愧於叔達不能不恨恨於破甑世説苦役甄法崇永初中為江陵令在任嚴明于時南平僇士為江安令喪官至其年末崇在廳上忽見一人從門入云僇江安通法崇法崇知士已亡因問卿貌何故瘦答曰我生時所行善不補惡今繫苦役窮極理盡述異記革帶移孔沈約久處端揆有志台司武帝終不用乃與徐勉書陳情言已老病百日數旬革帶常應移孔以手握臂率記月小半分欲謝事求歸老之秩勉為請三司之儀帝弗許但加鼓吹而已梁書貌瘦韓休為相峭直時政所得失言之未嘗不盡玄宗嘗臨鏡默然不樂左右曰韓休為相陛下殊瘦於彼何不逐之上歎曰吾貌雖瘦天下必肥唐書通鑑説法馬留元祐間王景亮與任族無名子結為一社紀事嘲哨士大夫無問賢愚一經諸人之目即被不雅之名號曰豬觜關呂惠卿察訪京東呂質清瘦語話之際喜以雙手指畫社人呼為説法馬留又湊為七字曰説法馬留為察訪社中彌歲不能對一日邵箎因上殿氣泄出知東平邵高鼻捲髯社人名為湊氛獅子仍對曰湊氛獅子作知州惠卿銜之諷部使者發以他事舉社遂為虀粉桐江詩話馬留蓋優人呼沐猴之名古今詩話形體身伸也可屈伸也形有形象之異也軀區也是衆名之大總若區域也體第也骨肉毛血表裡大小相次第也釋名參天地人受天地變化而生一月而膏二月血脈三月而懷四月而胎五月而筋六月而骨七月而成形八月而動九月而躁十月而生形骸已成五藏乃分肝主目腎主耳脾主舌肺主鼻膽主口天有四時五行九曜三百六十日人有四支五藏九竅三百六十節天有風雨寒暑人有取與喜怒膽為雲肺為氣脾為風腎為雨肝為雷人與天地相類而心為之主耳目者日月也血氣者風雨也日月失行薄蝕無光風雨非時毀折生災五星失行州國受其殃天地之道尚由愛其神明人之耳目何能久燻而不息精神何能馳騁而不乏是故聖人守內而不失外文子像法人頭圓像天足方法地五臟像五行四肢法四時九竅法九分目法日月肝仁肺義腎志心禮膽斷脾信膀胱決難髮法星辰節法日歲腸法鈐孝經援神契五藏推天命本人情人有五藏六腑何謂五藏精藏於腎神藏於心魂藏於肝魄藏於肺志藏於脾何為六腑咽喉量入之府胃曰五穀之府大腸轉輸之府小腸受成之府膽積精之府膀胱液之府也韓詩外傳精氣形者生之舍也精神者所受於天形體所受於地也血氣者人之華也而五藏者人之精也孔竅者精神之戶牗也而氣志者五藏之使候也是故五色亂目使目不明五聲譁耳使耳不聰五味亂口使口爽傷趣舍滑心使行飛楊故嗜欲使人氣淫好憎使人精勞不疾去之則志氣日耗淮南文子生異堯八眉舜四瞳子禹其跳湯扁文王四乳八者如八字者也其跳者踦也扁者枯也言皆不善也尚書大傳堯眉八彩九竅通洞而公正無私一言而萬民齊舜二瞳子是謂重明作事成法出言成章禹耳參漏是謂大通興利除害疏河決江文王四乳是謂大仁天下所歸百姓所親皋陶馬喙是謂至信決獄明白察於人情淮南且徐偃王之狀目可瞻焉仲尼之狀面如蒙倛周公之狀身如斷災皋陶之狀色如削瓜閎夭之狀面無見膚傳説之狀身如植鰭伊尹之狀面無須麋禹跳湯偏堯舜參牟子荀子傳言黃帝龍顏顓頊戴午帝嚳駢齒堯眉八采舜目重瞳禹耳三漏湯臂再肘文王四乳武王皇陽周公背僂皋陶馬口孔子反羽蒼頡四目為皇帝史晉公子重耳仳脅為諸侯霸蘇秦骨鼻為六國相張儀仳脅亦相秦魏項羽重瞳云虞舜之後與高祖分王天下論衡老子老子身長八尺八寸黃色美眉長耳大目廣額踈齒方口厚唇額有三五達理日角月懸鼻純骨雙柱耳有三門足蹈二五手把十文史記孔子孔子適鄭與弟子相失獨立東郭門外姑布子卿謂子貢曰東門外有一人焉其長九尺有六寸河目隆顙其頭似堯其頸似皋繇其肩似子産然自腰已下不及禹者三寸纍纍然如喪家之狗子貢以告孔子欣然而歎曰形狀末也如喪家之狗然乎哉然乎哉家語老萊子之弟子出薪遇仲尼反以告曰有人於彼修上而趍下末僂而後耳視若營四海不知其誰氏之子老萊子曰是丘也莊子日角子産日角晏平仲月角尾生犀角柳下惠史魚反角管子易貌子思適齊齊君之嬖臣美鬚眉立乎側齊君指之而笑且言曰假貌可相易寡人不惜此之鬚眉於先生也子思曰非所願也昔堯身修十尺眉乃八彩實聖舜身修八尺有奇面頷無毛亦聖禹湯文武及周公勤思勞體或折臂望視或禿骭背僂亦聖骭勝也不以鬚眉美鬣為稱也人之賢聖在德豈在貌乎孔叢子體方安里王欲以馬回為相問子順曰回為人梗梗亮直之丈夫也順曰聞諸孫卿云其為人也長目而豕視者必體方而心圓臣見馬回非不偉其體幹也然甚疑其目王卒用之三月果以諂得罪上法貴武帝諱雄字仲雋姓祖第三子帝生長八尺三寸美容貌相工相之曰此君將貴其相有四目如重雲鼻如龜龍口如方器耳如相望法為貴人位過三公不疑也蜀李書奇表李郃長七尺八寸多鬚髯八眉左耳有奇表腦如鼎形手握二公之字別傳堂堂華溫琪少從黃巢為盜巢敗溫琪走滑州顧其狀貌魁偉懼不自容乃投白馬河流數十里不死河上人援而出之又自經於桑林輒枝折乃之胙縣有田父見之曰子狀貌堂堂非常人也乃匿干家五代史銅筋鐵肋鄧弼字伯翊秦人也身長八尺雙目有紫稜開合閃閃如電聲如虎吼以力雄人鄰牛方聞不可擘拳其脊折仆地市門石鼓十人弗能舉兩手持之行泰定末德王薦之會丞相格其事弼環視四體歎曰天生一具銅筋鐵肋不使立勳萬里外乃稿死三尺蒿下命也遂入王屋山為道士人為貴中黃道君曰天生萬物人為貴也人身包含天地無所不法立天子置三公九卿二十七大夫八十一元士九州百二十郡千二百縣也天子天子大道君脾為皇后心為太尉左腎為司徒右腎為司空封八神及臍為九卿珠樓神十二胃神十二三焦神三合為二十士大夫四肢神為八十一元士合之百二十以法郡數也又胏為尚書府肝為蘭臺府五符經三官為道當調三官口為天關足為地關手為人關三官調則五臟安五臟安則舉身無病真誥精明精者體之神明者身之寶勞多則精散營多則明消妾有益精之道延明之經上十二官心者君主之官神明出焉肺者相傳之官治節出焉肝者將軍之官謀慮出焉膽者中正之官決斷出焉膻中臣使之官喜樂出焉在兩乳間為海之氣脾胃倉廩之官五味出焉大腸傳道之官變化出焉小腸受盛之官化物出焉腎者作強之官伎巧出焉三焦決瀆之官水道出焉膀胱州都之官津液藏焉凡十一官不得相失脾胃二藏共一官素問內經得強五藏者身之強也頭者精明之府頭傾視深精神將奪矣背者胸之府背曲肩隨府將壞矣腰者腎之府轉搖不能腎將敗矣膝者筋之府屈伸不能行筋將憊矣得強則生失強則死上臟神心神丹元字守靈肺神皓華字虛成肝神龍煙字含明腎神玄冥字育嬰脾神常在字魂庭膽神龍曜字威明黃庭經五入酸入肝辛入肺苦入心鹹入腎甘入脾是為五入內經狀貌無憑庾𤔫少聰慧家富于財好賓客食必列鼎又狀貌豐美頤頰開張人皆謂𤔫必為方伯無餒乏之慮及魏尅江陵卒致餓死時又有水軍都督禇蘿而甚尖危有從理入口竟保衣食而終南史庾杲之傳天中記卷二十一
