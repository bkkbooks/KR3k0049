body:
  text: 賢婦懷安晉公子重耳之及於難也奔及齊齊桓公妻之有馬二十乘公子安之從者以為不可將行謀於桑下蠶妾在其上以告薑氏薑氏殺之而謂公子曰子有四方之志其聞之者吾殺之矣公子曰無之薑曰行也懷與安實敗名公子不可薑與子犯謀醉而遣之醒以戈逐子犯左僖二十三織履楚莊王使使賫金百斤聘北郭先生先生曰臣有箕帚之妻願入計之即謂婦人曰楚欲以我為相今日相即結駟列騎食方丈於前如何婦人曰夫子以織屨為食食粥毚履無怵愓之憂者何哉與物無治也今如結駟列騎所安不過容膝食方丈於前所甘不過一肉以容膝之安一肉之味而殉楚國之憂其可乎於是遂不應聘與婦去之韓詩外傳投畚老萊子逃世耕於蒙山之陽楚王駕至其門曰守國之孤願見先生老萊曰諾妻曰妾聞之可食以酒肉者可隨以鞭捶可授以官祿者可隨以鈇鉞今先生食人酒肉受人官祿為人所制也能免於患乎妾不能為人所制投其畚萊而去老萊子白子還吾為子更慮遂行不顧至江南而止列女傳泣富陶答子治陶三年名譽不興家富三倍其妻獨抱兒而泣姑怒曰何其不祥也婦曰夫子能薄而官大是謂嬰害無功而家昌是謂積殃妾聞南山有玄豹霧雨七日而不下食者何也欲以澤其毛而成文章也故藏而遠害犬彘不擇食以肥其身坐而須死耳今夫子不修德而家益厚敗亡之徵見矣期年而答子果以盜誅列女傳黃鵠歌魯陶嬰者陶明之女也少寡養幼孤無強昆弟紡績為産魯人或聞其義將求焉嬰聞之恐不得免乃作黃鵠之歌明己之不更二庭也魯人聞之遂不敢復求上呵止王章字仲卿獨與妻居疾病無被臥牛衣中與妻訣涕泣其妻呵怒之曰仲卿尊貴在朝廷誰踰仲卿者今疾病困厄不自激卬乃反泣涕何鄙也后章仕宦為京兆欲上封事言帝舅王鳳妻止之曰人當知足獨不念牛衣中涕泣時耶章曰非女子所知也書遂上果下廷尉獄死漢書復讎媯覽戴員親近邊洪等數為孫翊所困常欲叛逆時諸縣令長並會見翊翊以妻徐氏頗曉卜翊入語徐吾明日欲為長吏作主人卿試卜之徐言卦不能佳可須異日翊以長吏求久宜速遣乃大請賓客翊出送客洪從後斫殺之逆走入山徐氏購募追捕覽員歸罪殺洪諸將皆知覽員所為而力不能討覽入居軍府中悉取翊殯妾及左右侍御欲復取徐恐逆之見害乃紿之曰乞須晦日設祭除服時月垂竟覽聽須祭畢徐潛使所親信以己意語翊親近舊將孫高傅嬰等高嬰涕泣從命乃密呼翊時侍養者二十餘人共盟誓合謀到晦日設祭徐氏哭泣盡哀畢乃除服薰香沐浴更於他室安施幃帳言笑歡悅示無戚容大小悽愴怪其如此覽密覘視無復疑意徐呼高嬰與諸婢羅住戶內使人報覽説已除凶即吉惟府君敕命覽盛意入徐出戶拜覽適得一拜徐便大呼二君可起高嬰俱出共得殺覽餘人即就外殺員夫人乃還縗絰奉覽員首以祭翊墓舉軍震駭以為神異吳主續至悉族誅覽員餘黨吳歷無子求出沛公孫去病妻者同郡戴元世之女既嫁久而無子謂其夫曰妾不才得奉巾櫛歷年無嗣禮有七出請願受訣矣其夫不許復進曰福莫大於昌熾禍莫大於絶嗣君不忍見遣當更廣室夫復不肯夫死服除父母欲嫁之女遂操刀割鼻郡表其閭列女傳婦師禮修趙嵩妻張氏女也姑酷惡無道遇之不以禮修終無慍色及寧父母父母問之但引咎不道姑卒感寤更粗愛之鄉人相訓曰作婦不當如趙伯高婦乎使惡姑知變何謂婦師矣後姑病女來省疾姑却之曰我以固當絶于賢婦手中後遭米賊嵩死乃碧塗面亂首懷刀託言病賊不逼也養遺生女依父叔立義終身華陽國志遠慮李衡字叔平襄陽人習竺以女英習配之吳時為丹陽太守孫休徙在丹陽衡數以法絶之英習每諫曰賤而凌貴踈而間親取禍之道衡不從會孫亮廢衡從門入英習逆問曰何故有懼色琅邪王立邪衡曰然不用卿語已至如此遂合其家客欲奔魏英習固諫曰不可君本庶民耳先帝相拔過重既數作無禮而不遠慮又復逆自猜嫌逃叛求活以此北歸何面目見中國人乎衡曰計何所出英習曰琅邪王素好善慕名今初立方欲自達於天下終不以私嫌殺君明矣君意自不了者可自囚詣獄表列前夫顯求其罪如此乃當反見優饒非直活而已也衡從之果下令曰丹陽太守李衡以往事之嫌自拘有司夫射鉤斬祛在君為忠遣衡還郡勿令自疑加威遠將軍授之棨戟衡每欲治家事英習不聽衡恆稱太史公言江陵千樹橘當封君家英習云人患無德義不患不富若貴而能貧方好爾用此何為襄陽耆舊傳義姑陸績於欎林所生女名曰欎生適張溫弟白姚信集有表稱之曰臣聞唐虞之政舉善而教旌德擢異三王所先是以忠臣烈士顯名國朝淑婦貞女表迹家閭蓋所以闡崇化業廣殖清風使苟有令性幽明俱著苟懷懿姿士女同榮故王蠋建寒松之節而齊王表其里義姑立殊絶之操而魯侯高其門臣切見故欎林太守陸績女子欎生少履貞持之行幼立匪石之節年始十三適同郡張白侍廟三月婦禮未卒白遭罹家禍遷死異郡欎生抗聲昭節義形於色冠蓋交橫誓而不許奉白姊妹嶮巇之中蹈履水火志懷霜雪義心固於金石體信貫於神明送終以禮邦士慕則臣聞昭德以行顯行以爵苟非名爵則勸善不嚴故士之有誄魯人志其勇杞婦見書齊人哀其哭乞蒙聖朝褒欎生以義姑之號以厲兩髦之節則皇風穆暢士女改視矣吳志注圖畫贊頌張溫姊妹三人皆有節行為溫事已嫁者皆見録奪其中妹先適顧承官以許嫁丁氏成婚有日遂飲藥而死吳朝嘉歎鄉人圖畫為之贊頌云文士傳二女陳志不載蓋隔于見聞也通志略不為表出豈未見裴注耶晉書王渾妻鍾氏字琰生濟渾謂足慰人心琰笑曰若使新婦得配參軍弟淪生子故不啻如此豈婦言耶王氏譜渾婦鍾琰女乃云鍾字琰子父同名耶通志因之不能改正乃譏子長全用舊文耶傾資孟昹與劉裕謀誅桓玄昹妻周氏富於財昹謂之曰劉邁毀我於桓公使我一生淪陷我決當作賊卿幸早離絶脫得富貴相迎未脫也周氏曰君父母在堂欲建非常之謀豈婦人所諫事之不成當於奚官中奉養大家義無歸志昹愴然久之而起周氏追昹坐云觀君舉措非謀及婦人者不過欲得財物耳因指懷中女示之曰此而可賣亦當不惜遂傾資以給之昹弟顗妻周氏之從妹也周氏紿之曰昨夜夢不祥門內絳色物宜悉取以為厭勝妹信而與之遂盡以為軍士袍晉列女傳聖母洗氏高涼人世為南越首領部落十餘萬幼賢明在父母家能撫循部衆壓服諸越高涼太守馮寶聞其志行娉為妻每與夫寶參決詞訟政令有序侯景反都督蕭勃徵兵入援遣刺史李遷仕召寶寶欲往氏疑其反止之後果反寶卒嶺表大亂氏懷集之百越晏然子僕尚幼以氏功封信都侯詔册氏為高涼郡太夫人賚繡幰油絡駟馬安車鼓吹麾幢旌節如刺史之儀僕卒百越號夫人為聖母王仲宣反夫人帥師敗之親披甲乘馬巡撫諸州嶺南悉定封譙國夫人幕府署長史官屬給印章便宜行事皇后賜以首飾及宴服一襲時番州揔管趙訥貪虐黎獠多亡叛夫人上封事論之敕夫人招慰夫人親載詔書自稱使者歷十餘州宣述德意所過皆降文帝賜夫人臨振縣湯沐邑卒諡誠敬遠勢則天朝太僕卿來俊臣之強盛朝官側目上林令侯敏偏事之其妻董氏諫止之曰俊臣國賊也勢不久一朝事壞姦黨先遭君可敬而遠之敏稍稍而退俊臣怒出為涪州武隆令敏欲棄官歸董氏曰速去莫求住遂行至州投刺參州將錯題一張紙州將展看尾後有字大怒曰修名不了何以為縣令不放上敏憂悶無已董氏曰但住莫求去停五十日忠州賊破武隆殺舊縣令略家口並盡敏以不計上獲全後俊臣誅逐其黨流嶺南敏又獲免朝野僉載封髮唐賈直言德宗朝父泄漏禁中事帝怒賜鴆酒直言白中使請自執器以飲其父中使然之直言既持杯而自飲之立死酒自左足間出復活具奏遂流其父於南海遇恩歸還東平以徑直名聞拜諫議大夫直言董氏亦奇節直言隨父流所謂董氏曰生死莫期不限相見令其改適董入室以繩縳髮取筆令直言封之封曰啓曰非君不解畢死不開其後二十二年再會舊題宛然以油沐之其髮俱墮獨異志髮墮泔盆終為禿婦定命録罵賊渤海封夫人諱詢字景文敖孫也善草隸攻文章姻黨號為淑女咸通戊子適殷祕省校書保晦廣明庚子冬妖躔黃道輦轂遐狩都人大潰校書自永寧里所居夫室潛于蘭陵里蕭氏池臺以為賊不復入至明日群凶霧合祕校遂為所俘賊囚欲載以行夫人正色奮袂大罵賊怒殺之祕校脫身來歸侍婢迎門曰夫人已逝矣祕校撫膺大慟揮淚於夫人面曰景文即相見遂長號而絶於地三婢子覩主父主母俱殯乃相攜投浚井而死三水小牘老奴非匹文昌左丞盧獻女第二先適鄭氏其夫早亡誓不再醮姿容端秀韻調甚高姊夫羽林將軍李思沖姨亡之後奏請續親許之兄弟並不敢白思沖擇日備禮贄幣甚盛執政就宅盧氏關詈曰老奴我非汝匹也乃踰垣至所親家截髮沖奏之敕不奪其志後為尼甚精進朝野僉載新舊唐書俱作崔繪妻令德薛元曖播伯父也其妻濟南林氏丹陽太守洋之妹有母儀令德慱涉五經善屬文所為篇章時人多諷諫之元暖卒後其子彥輔彥國彥偉彥雲及播兄據揔並早孤幼悉為林氏所訓導以至成立咸致文學之名開元天寶中二十年間彥輔據等七人並舉進士連中科名衣冠榮之舊唐教夫守城建中末李希烈陷汴謀襲陳州李侃為項城令希烈分兵略定諸縣侃以城小賊鋭欲逃去婦楊氏曰冠至當守力不足則死焉若逃尚誰守請重賞募死士尚可濟侃乃召妻民謂曰令城君主然歲滿則去非如吏民墳墓在此土也請相與死守忍失身奉賊乎衆泣許諾侃率以乘城婦身自爨以享衆報賊曰項城父老義不下賊宜亟去徒失利無益也賊大笑侃中流矢還宅婦責曰君不在人誰肯固死于外猶愈于床也侃遽登城會賊將中流矢死遂引去縣卒完詔遷侃大平令唐書自賣濟行周迪妻某氏迪善賈往來廣陵會畢師鐸亂人相略賣以食迪飢將絶妻曰今欲歸不兩全君親在不可并死願見賣以濟君行迪不忍妻固與詣肆售得數千錢以奉迪至城門守者誰何疑其紿與迪至肆問狀見妻首已在于枅矣迪裹餘體歸葬之廣記斷臂王凝妻李氏凝家青齊之間為虢州司戶參軍以疾卒于官凝家素貧一子尚幼李氏攜其子負其遺骸以歸東過開封止旅舍旅舍主人見其婦人獨攜一子而疑之不許其宿李氏顧天已暮不肯厺主人牽其臂而出之李氏仰天長慟曰我為婦人不能守節而此手為人執邪不可以一手并污吾身即引斧自斷其臂路人見者環聚而嗟之或為之彈指或為之泣下開封尹聞之白其事于朝官為賜藥封瘡厚恤李氏而笞其主人者嗚呼士不自愛其身而忍恥以偷生者聞李氏之風宜少知愧哉五代史馮道等傳序繼室臧宣叔娶于鑄生賈及蒍而死繼室以其姪穆薑之姨子左傳殺前妻子龐參為太尉夫人疾前妻子投於井殺之參素與洛陽令祝良不平率吏入太尉府按實其事遂策免後漢禮宗安定皇甫規妻者不知何氏女也規初喪室家後更娶之妻善屬文能草書時為規答書記衆人怪其工及規卒時妻年猶盛而容色美後董卓為相國聘以輜軿百乘馬二十匹奴婢錢帛充路妻乃輕服詣卓門跪自陳請辭甚酸愴卓使傳奴侍者悉拔刀圍之而謂曰孤之威教欲令四海風靡何有不行於一婦人乎妻知不免乃立罵卓曰君羌胡之種毒害天下猶未足耶妾之先人清德奕世皇甫氏文武上才為漢忠臣君親非其趣使走吏乎敢欲行非禮於爾君夫人邪卓乃引車庭中以其頭懸鞭撲交下妻謂持杖者曰何不重乎速盡為惠遂死車下後人圖畫號曰禮宗云後漢扶風馬夫人威明妻也有才學工隸書夫人寡卓聘以為妻夫人不屈卓止之書斷執鴈行禮鄭袤妻曹氏魯國薛人也袤先娶孫氏早亡娉之為繼室事舅姑甚孝躬紡績之勤以充供養至於叔妹群姊之間盡其禮節咸得歡心及袤為司空其子默等又顯朝列時人稱其榮貴曹氏深懼盛滿每默等升進輒憂之形於聲色然食無重味服浣濯之衣袤等所獲祿秩曹氏必班散親姻務令周給家無餘資初孫氏瘞于黎陽及袤薨議者以久喪難舉欲不合葬曹氏曰孫氏是元妃理從葬豈可使孤魂無所依邪於是遂備吉凶導從之儀以迎之具衣衾凡筵親執鴈行之禮聞者莫不歎息以為趙姬之下叔隗不足稱也晉列女傳王敦惶李皓妻尹氏天水冀人也幼好學清辨有志節初適扶風馬元正元正卒為皓繼室以再醮之故三年不言撫前妻子踰於己生皓之創業也謀謨經略多所毗贊故西州諺曰李尹王敦惶上懷主王彪敗據城之西山樓子陳文帝遣章昭達購之并圖其妻劫來彪知不免呼妻與訣曰生死從此而別劫遂殺彪昭達進軍迎彪妻便拜稱陳文帝教迎為家主楊便改啼為笑欣然意悅請昭達殯彪喪墳冢既畢楊還經彪宅謂昭達曰婦人本在容貌辛苦日久請暫過宅莊飾昭達許之楊入屋便以刀割髮毀面哀哭慟絶誓不更行陳文帝聞之歎息不已遂許為尼後陳武帝軍人求取之楊投井決命時寒北出之垂死積火溫燎乃蘇復起投於火楊氏天水人散騎常侍曒之女也有容貌先為河東裴仁林妻因亂為彪所納南史五十四國㸙竇懷貞字從一避韋后先諱而以字稱會歲除中宗夜宴近臣謂曰聞卿喪妻今欲繼室可乎懷貞唯唯俄而禁中寶扇鄣衛有衣翟衣出者已乃韋后乳媼王所謂莒國夫人者故蠻婢也懷貞納之不辭世謂媼壻為阿㸙懷貞每謁見奏請輒自署皇后阿㸙而人或謂為國㸙軒然不慚以自壻於后后睿宗為金仙玉真二公主營觀懷貞躬護役作督繕甚急時語曰前作後國㸙後為主邑丞言事公主如邑官屬也新唐殺婢衡陽周令失其名蜀川人喪妻再娶亦蜀川人後妻攜三女俱長矣周撫之如己女後妻凶姤周舊畜數婢內二人妊娠後妻加以它事鞭撻之無虛日二婢各為懷妊常以背或臂腿受其撻多方用杖觸其腹欲其不全二婢竟以鞭箠墮胎而死既殺二婢其後三女相次適人因權寓衡陽不回五年其三女俱因産而死每一女死妻必飯僧悔過為先鞭撻墮胎死者二婢看經自禮梁武懺三女俱以産死未死者必旬日號呼痛楚宛轉而後終妻涕泣憂惱而得疾女亡後歲餘亦死吁書所謂天網恢恢踈而不漏佛經報應何昭昭之若是乎俾妒不令之婦聞之增懼亦勸誡之道有益於世教云洛陽縉紳舊聞記妬以色曰妬以行曰忌詩小星箋諺曰美女入室惡女之仇傳曰女無美惡入室見妬士無賢不肖入朝見嫉史外戚美而不使初叔向之母妬叔虎之母美而不使其子皆諫其母其母曰深山大澤實生龍蛇彼美余懼其生龍蛇以禍女女敝族也國多大寵不仁人間之不亦難乎余何愛焉使往視寢生叔虎美而有勇力欒懷子嬖之故羊舌氏之族及於難襄二十一惡息魏王遺楚王美人楚王説之夫人鄭裒知王之説新人也甚愛新人衣服玩好擇其所喜而為之宮室臥具擇其所善而為之愛之甚於王王曰婦人所以事夫者色也而妬者其情也今鄭裒知寡人之説新人也其愛之甚於寡人此孝子之所以事親忠臣之所以事君也鄭裒知王以已為不妬也因謂新人曰王愛子美矣雖然惡子之鼻子為見王則必掩子鼻新人見王因掩其鼻王謂鄭裒曰夫新人見寡人則掩其鼻何也鄭裒曰妾知也王曰雖惡必言之鄭裒曰其似惡聞君王之臭也王曰悍哉令劓之無使逆命楚策坎𡒄馮衍娶北地女任氏為妻悍忌不得畜媵妾兒女常自操井臼老竟逐之遂坎𡒄於時後傳敬通有一婢妻任酷妬之擊婢無所不至敬通乃棄遣之因與婦弟任武達書曰不去此婦則家不寧不去此婦則家不清不去此婦則福不生不去此婦則身不榮不去此婦則事不成吾數奇命薄端相逢遭敬通集酷妬袁紹妻劉氏愛子尚稱其才紹亦奇其貌欲以為後未顯而紹妻性酷妬紹死僵尸未殯寵妾五人劉盡殺之以為死者有知當復見紹於地下乃髡頭墨面以毀其形尚又為盡殺死者之家魏志絞懸廁梁司隸馮方女國色也避亂揚州袁術登城見而悅之遂納焉甚愛幸諸婦害其寵語之曰將軍貴人有志節當時時涕泣憂愁必長見敬重馮氏以為然後見術輒垂涕術以有心志益哀之諸婦人因其絞殺懸之廁梁術誠以為不得志而死乃厚加殯斂九州春秋哭封上洛都尉王琰以功封其妻哭於家為琰富貴更取妾故也典論鞭乳母賈充妻郭産子黎民三歲乳母抱向閣充入就乳母手中戲之郭遙望見疑充即鞭乳母殺之兒思乳母而死郭又生一男乳母抱在中庭充過拈頰郭又疑復殺乳母男又死王隱晉書九錫王丞相曹夫人性甚忌禁制丞相不得有侍御乃至左右小人亦被檢簡時有妍妙皆加誚責王公不能久堪乃密營別館衆妾羅列兒女成行後元會日夫人於青踈臺中觀望忽見兩三小兒騎羊皆端正可念夫人遙見甚憐愛之語婢云汝出問是誰家兒給使不達忍乃答云是第四五等諸郎曹氏聞驚愕大怒不能自忍乃命車駕將黃門及婢二十餘人持食刀自出尋討王公亦遽命駕飛轡出門猶患牛遲乃以左手攀車蘭右手提塵尾以柄助御者打牛狼狽奔馳劣得先至蔡司徒聞而笑之乃故詣王公謂曰朝廷欲加公九錫公知不王謂信然自敘謙志蔡曰不餘聞物唯聞有短轅犢車長柄塵尾王大羞愧後貶蔡曰吾昔與安期千里也在洛水集處不聞天下有蔡充兒世説妒記我見亦憐桓溫平蜀以李勢妹為妾甚有寵常著齋後主始不知既聞與數十婢拔白刃襲之正值李梳頭髮委藉地膚色玉曜不為動容徐曰國破家亡無心至此今日若能見殺乃是本懷主於是擲刀前抱之曰阿子我見汝亦憐何况老奴遂善之上無此句謝太傅劉夫人不令公有別房公既深好聲樂後遂頗欲立妓妾兄子外生等微達此旨共問訊劉夫人因方便稱關雎螽斯有不忌之德夫人知以諷已乃問誰撰此詩答云周公夫人曰周公是男子相為爾若使周姥撰詩當無此句也妬記幃婢暫見謝公夫人幃諸婢使在前作伎使太傅暫見便下幃太傅索更開夫人云恐傷盛德世説求絶謝邈茂度妻鄭氏妬怨懟與邈書邈以書非婦人之辭疑其門生仇玄達為之作遂斥逐玄達被傷晉祖約妻無男性妬約亦不敢違忤常夜寢於外為人所傷疑妻所為求去職不許劉隗劾曰約新荷殊寵當敬以直內而患為婢妾身被形戮宜貶黜帝不罪變羊京邑有士人婦大妬忌於夫小則罵詈大必捶打常以長繩繫夫腳且喚便牽繩士人緣與巫嫗為計因婦眠士人入廁以繩繫羊士人緣墻走避婦覺牽繩而羊至大驚怪召問巫巫曰娘積惡先人怪責故郎君變成羊若能改悔乃可祈請婦因悲號抱羊慟哭自咎悔誓師嫗乃令七日齋舉家大小悉避於室中祭鬼神師祝羊還復本形聲徐徐還婦見聓啼問曰多日作羊不乃辛苦耶聓曰猶憶噉草不美腹中痛爾婦愈悲哀後復妬忌聓因伏地作羊鳴婦驚起徒跣呼先人為誓不復敢爾於此不復妬忌妬記狂婦泰元中有人姓荀婦庾氏大妬忌荀嘗宿行遂殺二兒為屋不立齋室唯有廳事不作後壁令在堂上泠然望見外事凡無鬚人不得入門送書之人若以手近荀手無不痛打客若共床坐亦賓主俱敗鄰近有年少徑突前詣荀接膝共坐便聞大罵推求刀杖荀謂客曰僕狂婦行君之所聞君不去必誤君事客曰僕不畏此乃前捉荀手婦便持杖直前向客客既大健又有短杖在衣裏便與老老嫗無力即倒地客打垂死荀走叛不敢還婦密令覔荀云偶遭狂人非君之過君便可還荀然後敢出婦兄來就荀其方床臥而婦不知便來捉兄頭拽著地欲殺方知是兄暫懼入內兄稱父命與杖數百亦無改悔上俗説車武子妻大妬呼其婦兄宿取一絳裙衣挂屏風上其婦拔刀徑上床發被乃其兄也慚而退要録捉跽跗諸葛元直妻劉氏大妬忌恆與元直杖不勝痛才得一兩仍以手模婦誤打指節腫從此作制每與杖輒令兩手名捉跽跗元直遇見婦捉跽跗欲成衣謂當與己杖失色怖婦曰不也捉此自欲成衣耳乃欣然妬記結誓吳興桑乞妻臨終執乞手云我死為當婚否乞言不忍也服竟更娶白日見其死婦語之云君先結誓云何負言因以刀割其陽道雖不致死人性永廢異苑妬婦津臨濟有妬婦津傳言晉太始中劉伯玉妻段氏字明光性妬忌伯玉嘗於妻前誦洛神賦語其妻曰取婦得如此吾無憾焉明光曰君何得以水神美而欲輕我吾死何患不為水神其夜乃自沈而死死後七日夢見與伯玉曰君本願神吾今得為神矣伯玉遂終身不復渡水有婦人渡此津者皆壞衣枉粧然後敢濟不爾風波暴發醜婦雖不粧飾而渡其神亦不妬也婦人渡河無風浪者以為醜不能致水神醜婦諱之莫不皆自毀形容以塞嗤笑也故齊人語曰欲求好婦立在津口婦人水傍好醜自彰酉陽并州石艾壽陽二界有妬女泉憎妬宋明帝憎婦人妬榮彥遠以善棊見親婦妬傷其面帝曰為卿治之何如遠率爾曰聽聖旨其夕遂賜藥殺其妻劉休妻王氏亦妬帝聞之賜休妾敕杖王二十令休宅後開小店使王親賣掃帚皂策以辱之宋書悍室劉孝標自序云豫自比馮敬通而有同之三異之者四敬通有忌妻至于身操井臼余有悍室家道轗軻此三同也敬通有一子仲文官成名立余禍同伯道永無血胤此二異也梁書四十四截指截舌後魏末嵩陽挂昌妻柳氏甚妬有婢金荊昌浴令理髮柳氏截其雙指無何柳被狐刺螫指雙落又有一婢名玉蓮能唱歌昌愛而唱嘆其善柳氏乃截其舌後柳氏舌瘡爛事急就稠襌師懺悔襌師已先知謂柳氏曰夫人為妬前截婢指已失指又截婢舌今又合斷舌悔過至心乃可以免柳氏頂禮求哀經七日襌師命張口呪之有二蛇從口出一尺以上急呪之遂落地舌亦平復自是不復妬矣僉載賜酒唐初兵部尚書任瓌敕賜宮女皆國色妻妬爛二女頭髮禿盡太宗聞之令上宮齎金胡餅酒賜之云飲之立死瓌三品合置姬媵爾不妬不須飲之若妬即飲柳氏拜敕訖曰妾與瓌結髮夫妻俱出微賤更相輔翼遂致榮官瓌今多內嬖誠不如死遂飲盡然非鴆也既睡醒帝謂瓌曰其性如此朕亦當畏之因詔二女令別宅安置僉載國史異纂房玄齡事同三可畏中宗朝御史大夫裴談崇奉釋氏妻悍妬談畏如嚴君嘗謂之妻有可畏者三少妙之時視之如生菩薩安有人不畏生菩薩耶及男女滿前視之如九子魔母安有人不畏九子魔母耶及五十六十薄施粧粉或青或黑視之如鳩盤茶安有人不畏鳩盤茶耶時韋庶人頗襲武氏之風軌中宗漸畏之內宴唱廽波詞有優人詞曰廽波爾時栳栳怕婦也是大好外邊秪有裴談內裏無過李老韋后意色自得以束帛賜之本事詩御史臺任瓌事同刵耳劓鼻中宗宜城公主駙馬裴巽有外寵一人公主遣閹之執之刵耳劓鼻剝其陰皮漫駙馬面上并截其髮令廳上判事集僚吏共觀之駙馬公主一時皆被奏降公主為縣主駙馬左遷也僉載刻眉房孺復妻崔氏性忌左右婢不得濃粧高髻月給燕脂一豆粉一錢有一婢新買粧稍佳崔怒謂曰汝好粧耶我為汝粧乃令刻其眉以青填之燒鎖梁灼其兩眼角皮隨手燋卷以朱傅之及痂脫如粧焉酉陽月錢紙點今婦人面飾用花子起自昭容上官氏所製以掩點迹大曆已前士大夫妻多妬悍者婢妾小不如意輒印面故有月點錢點上僮戲崔鉉之在淮南嘗俾樂工習其家僮以諸戲一日其樂工告以成就且請試焉鉉命閲于堂下與妻李氏坐觀之僮以李氏妬忌即以數僮衣婦人衣曰妻曰妾列于旁側一僮則執簡束帶旋唯諾其間張樂命酒笑語不能無屬意者李氏未之悟也久之戲愈甚悉類李氏平昔所為李氏雖少悟以其戲偶合私謂不敢然且觀之僮志在于發悟愈以戲之李果怒罵之曰奴敢無禮吾何嘗如此僮指之且叱曰咄咄赤眼作而白眼諱乎鉉大笑幾至絶倒玉泉子鐵錐刺閩王延翰妻崔氏延翰多選良家子為妾崔氏性妬良家子之美者輒幽之別室繫以大械刻木為人以手擊其頰又以鐵錐刺之死者八十四人五代史翰妻博陵氏之女性悍妬而殘忍嘗以練縳姬侍而鞭之練染血赤乃止又置木掌摑人一旦盛暑天無纖雲而霆電擊博陵斃于中庭五國故事賜銀綵兵部尚書杜業任樞密有權變足機會兵賦民籍指之掌中其妻張氏妬悍尤急室絶婢妾業憚之如事嚴親烈祖常命元皇后召張至內庭誡之曰業位望通顯得置妾媵何拘忌如此豈婦道所宜邪張雪涕而言業本狂生遭逢聖運多壘之初陛下所籍者駑馬未竭爾而又早衰多病縱之必貽其患將誤於任使耳烈祖聞之大加獎歎以銀盆綵假賞之南唐近事事婢陳覺微時為宋齊邱客及為兵部侍郎也其妻李氏妬悍親執庖爨不置妾媵齊邱選已之婢三人與之李亦無難色奉事三婢若舅姑禮人問其故李曰此令公寵幸之人見之若面令公何敢倨慢三婢既不自安求還宋第宋笑而許之上自經婦人之妬有異甚者四十年前撫州監酒范寺丞者妻色美而妬范寵憚之同官每休暇招妓燕集皆不得預一夕范輪次直宿會有告宿釀者范晨率吏卒徑往搜捕其同事李供奉者素知范妻之妬戲取妓鞋密置范臥具中須臾務吏攜衾褥歸妻展衾得鞋神色沮喪詰所從來吏言不知於是泣怨良久拊心而呼曰天乎有是邪乃入室闔戶而寢頃之范還排戶入則自經死矣遁齋間覽刃子有任湖南倅者妻生一子已周歲夫婦甚愛憐之偶一日郡守在告倅攝郡事會鄰郡太守過郡開宴命妓妓中有一秀慧者立持倅側倅顧與語及戲為酒今笑語方酣忽鈐吏擎生肉二盤置賓主前倅愕問其故則子肉也蓋妻忿夫與妓語乃手刃其子刲肉以獻其毒忍至此上七出孔子曰女有五不取逆家子者亂家子者世有刑人子者有惡疾子者喪父長子婦有七出三不去七出者不順父母出者無子者淫僻者嫉妬者惡疾者多口舌者竊盜者三不去者謂有所取無所歸與共更三年之喪先貧賤後富貴凡此聖人所以順男女之際重婚姻之始也三世出妻自叔梁紇始出妻及伯魚亦出妻子思又出妻故稱孔氏三世出妻家語後序蒸藜曾子後母遇之無恩而供養不衰及其妻以藜蒸不熟因出之人曰非七出也家語曰吾聞之也絶交令可友棄妻令可嫁也蒸藜不熟而已何問其故乎白虎通惡敗孟子惡敗而出妻可謂能自強矣荀解蔽注云惡其敗德而出其妻取棗去婦王吉少時學問居長安東家有大棗樹垂吉庭中吉婦取棗以啖吉吉後知之乃去婦東家聞而欲伐其樹鄰里共止之因固請吉令還婦里中為之語曰東家有樹王陽去婦東家棗完去婦復還其厲志如此漢書分異李充兄弟六人貧無擔石之儲易衣而出竟日而食其妻竊謂充曰今貧如是我有私財可分異獨居人多費極無為空自苦也充請呼鄰里室家相對共訣妻信之悉召鄰里親戚充乃前跪以妻言白母出其妻妻泣而去汝南記弟子去妻桓榮年四十無子高弟子何湯乃去榮妻為更娶生三子榮甚重之謝承後漢書姑憎遣歸應順字華仲汝南南頓人奉高祖也其妻本汝南鄧元義前妻元義父伯考為尚書僕射元義還鄉里妻留事姑甚謹姑憎之幽閉空室節其飲食羸露日困妻終無怨言後伯考怪而問之時義子朗年數歲言母不病但苦飢耳伯考流涕曰何意親姑反為此禍困遣歸家更嫁為華仲妻仲為將作大匠妻乘朝車出元義於路傍觀之謂人曰此我故婦非有它過家夫入遇之實酷本自相貴其子朗時為郎母與書皆不答與衣裳輒以燒之母不以介意意欲見之乃至親家李氏堂上令人以它詞請朗朗至見母再拜涕泣因起出母追謂之曰我幾死自為汝家所棄我何罪過乃如此耶因此遂絶汝南記叱狗鮑永字君長少有志操事後母至孝妻嘗于母前叱狗而永即去之後漢泝流薑詩事母至孝母好飲江水妻嘗泝流而汲值風不得還母渴詩責而遣之後書白樂天判云薑詩出婦蓋為小瑕鮑永去妻亦非太過棄斥竇玄以形貌絶異天子以公主妻之舊妻與玄書別曰棄妻斥女敬白竇生卑賤鄙陋不如貴人妾日以遠彼日以親衣不厭新人不厭故悲不可忍怨不可去彼獨何人而居我處後書展訣司徒袁隗為從女求婚見黃允曰得壻如此足矣允歸出其妻夏侯氏父母曰婦人見去當分叉斷帶遂還元艾為主人請親屬賓客三百餘人夏侯于座中攘臂數允隱慝穢惡十五事遂越席登車允以此坐廢漢紀亡珠汝南李敬為趙相奴于鼠穴中得繫珠璫餌相連以問主簿對曰前相夫人昔亡三珠疑子婦竊之因而去婦敬乃送珠付前相相慚追去婦謝承後漢書郗家離婚王獻之疾篤道家上章應首過問子敬有何異同得失子敬云不覺餘事惟憶與郗家離婚世説獻之娶郗曇女名道茂咸寧中詔尚餘姚公主別傳折蘼蕪齊處士劉瓛居上元青龍山為儒林之宗仕至四十未婚其友為娶王氏乃詣澗折蕪而去因名蘼蕪澗金陵故事建元中高帝與司徒禇彥回為瓛娶王氏女王氏穿壁挂履落母孔氏床上孔氏不悅瓛即出其妻本傳愜意崔皓者登進士第有俊才無士行好蒲博飲酒及遊京師娶妻擇有貌者稍不愜意即去之舊唐魂訴河東裴章者其父曹嘗鎮荊州門僧曇照道行甚高能知休咎章幼時為照所重言其官班位望過於其父章弱冠父為娶妻李氏女及四十餘章從職太原幸棄妻於洛中過門不入別有所牽李氏自感其薄常褐髽髻讀佛書蔬食又十年嚴綬尚書自荊州移鎮太原曇照隨之章因見照敘舊久之謂曰貧道五十年前言郎君必貴今則皆不何也章自以薄妻之事啓之照曰夫人生魂訴於上帝以非命處君後旬日其下以刃劃腹於浴器中五臟墮傷風遂死南部新書留詩為訣天祐中有慎氏者岊亭儒家女也三史嚴灌夫經由遂結婚好同載歸蘄春越數年無嗣乃拾其過而出之慎氏既登丹留詩為訣曰當時心事已相關雨散雲收一餉間便是孤帆從此去不堪重過望夫山覽詩悽感遂與偕老唐宋遺史死後休妻王雱安石次子也有心疾娶妻龐氏不相睦離而嫁之時侯獻死其妻帷薄不修安石表其事而斥去時語云王太祝生前嫁婦侯工部死後休妻倦遊雜録覆水不收太公望少壻馬氏老而見去賣醬孟津值天大涼改業販麵又值大風賃於棘津讎而不庸屠牛朝歌天熱肉敗凡往不遇乃釣於滋泉西伯出獵與語大悅載與俱歸立為師及武王平商封於齊東就國道遇婦人泣問之其前妻也再拜求合公取盆水傾地令其收之惟得少泥太公曰若言離更合覆水定難收婦遂抱恨而死今有馬母冢呂覽國策説苑韓詩鶡冠子注王朋壽類林馬武曰覆水不收後悔何及後紀孫皓將敗遺群臣書曰孤負諸君事已難圖覆水不可收也江表傳周王明廣對衛元嵩云丁公入漢先獲正典之殘馬母叛薑自招覆水之逝廣弘明集治道自經朱買臣字翁子嘗賣薪樵行且誦書妻羞之求去其後買臣獨行歌道中故妻與夫家上墳見買臣飢寒呼飯食之及買臣為會稽太守入吳界見故妻夫妻治道買臣駐車呼令後車載其夫妻到太守舍置園中給食居一月妻自經死數讓宋徐廣家貧未嘗以産業為意妻中山劉謐之女忿之數以相讓廣終不改如此十數年家道日弊廣離南史二十三焚書王歡字君厚樂陵人也安貧樂道不營産業常丐食誦詩雖家無斗儲意怡如也其妻患之或焚毀其書而求改嫁歡笑而謂之曰卿不聞朱買臣妻耶聞者多哂之歡守志彌固遂成通儒晉書索書顏真卿為撫州刺史邑人有楊志堅者嗜學而居貧其妻以資給不充索書求離志堅以詩送之曰當年立志早從師今日翻成鬢有絲落托自知求事晚蹉跎甘道棄身遲金叉任意撩新鬢鸞鏡從他別畫眉此去便同行路客相逢即是下山時其妻持詩詣公求別適真卿判其牘曰楊志堅早親儒教頗負詩名愚妻覩其未遇遂有離心王歡之廩既虛豈尊黃卷朱叟之妻必去寧寧見錦衣一作靡追冀缺之妻贊成好事惟學買臣之婦輕棄良人污辱鄉閭傷敗風教若無懲戒孰遏浮囂妻可笞二十任自改嫁楊志堅秀才餉粟帛仍署隨軍四遠聞之無不悅服自是江左婦人無敢棄其夫者雲溪友議贈珠吳王夫差小女名紫圭才貌俱美兒童子韓重欲嫁之王不許紫圭飲氣而死重遊學歸知之感其意乃具帛幣弔於墓前圭魂出冢見重流涕相與還冢三日夜贈以徑寸珠并白玉壺延頸而歌曰南山有鳥北山張羅意欲從君讒言孔多悲結成疹歿命黃壚命之不造如之何羽族之長名為鳳凰一日失雄三年感傷雖有衆鳥不為匹雙故見鄙姿逢君輝光身遠心近何當暫忘搜神記作紫玉駙馬隴西辛道度者遊學行至雍州城西五里北見一大宅有青衣女子在門辛度謂門下求餐女子入告秦女女命召入度趨入閣中秦女于西榻而坐度稱名敘起居既畢命東榻而坐即具飯饌食訖女謂度曰我秦關王女出聘曹國不幸無夫而亡亡來已二十三年獨居此宅今日君來願為夫婦經三宿三日俄女即自言曰君是生人我鬼也共君宿契此會只可三宵不可久居當有禍矣然茲信宿未悉綢繆既已分飛將何表信于郎命取床後盝子開之取金枕一枚與度為信乃分袂泣別即遣青衣送出門外未逾數步不見舍宇惟有一冢度當時荒忙走出視其金枕在懷乃無異變尋至秦國以枕於市貨之恰遇秦妃車遊親見度賣金枕疑而索看語度何處得來度具以告妃聞悲泣不能自勝然向疑耳乃遣人發塜啓柩觀之原葬諸物悉在惟不見金枕解體看之情交宛若秦妃始信之嘆曰我女大聖死經二十三年猶能與生人交往此是我真女壻也遂封道度為駙馬都尉賜其金帛車馬令還本國因此以來後人名女壻為駙馬今之國壻亦為駙馬矣搜神記更生秦始皇時有王道平長安人也少小之時與同村人唐叔偕女小名父喻容色俱美誓為夫婦尋王道平被差征伐落陷南國九年不歸其父母見女長成即聘與劉祥為妻女與道平言誓甚重不肯改事父母逼迫不免出嫁劉祥經三年忽忽不樂常思道平忿怒之深悒怏而死死經三載道平還家乃詰鄉人此女何在鄉人曰此女意在於君被父母凌逼嫁與劉祥今已死矣平問墓在何處鄉人引往墓所平悲號哽咽三呼女名繞墓悲苦不能自止平乃祝曰我與汝立誓天地保其終身豈料官有牽纏致令乖隔使女父母與劉祥既不契於初心死生永訣然汝有靈聖使我見汝平生之面若無神靈從茲而別言訖又復哀泣逡巡其女魂自墓而出問平何處而來良久契闊本與君誓為夫婦以保終身為父強逼乃出聘劉祥已經三年日夕憶君成病結恨致死乖隔幽途然念君宿願不忘再求相慰妾身未損可以再生還為夫婦且速開塜破棺出我不活審言乃啓墓門捫看之其女果活乃結束隨道平還家其夫劉祥聞之驚怪申訴州縣檢律斷之無條乃録狀奏王王乃斷還王道平為妻壽年一百二十歲實謂精誠貫於天地而獲感應如此耳搜神記元康中梁國女子許嫁已受禮娉尋而其夫戌長安經年不歸女家更以適人女不樂行其父母逼強不得已而去尋得病亡後其夫還問其女所在其家具説之其夫徑至女墓不勝哀情便發冢開棺女遂活因與俱歸後壻聞知詣官爭之所在不能決祕書郎王導議曰此是非常事不得以常理斷之宜還前夫朝廷從其議晉五行志鬼子盧充者范陽人家西三十里有崔少府墓充先冬至一日出家西獵見一麞舉弓而射即中之麞倒而復起充逐之不覺倏忽見一里門如府舍門中一鈴下有唱家前充問此何府也答曰少府府也充曰我衣惡那得見貴人即有人提襆新衣迎之充著盡可體便進見少府展姓名酒炙數行崔曰近得尊府君書為君索小女婚故相延耳即舉書示充充父亡時雖小然已見父手迹便歔歎無辭崔即敕內令女郎莊嚴使充就東廊充至婦已下車立席頭共拜為三日畢還見崔崔曰君可歸矣女有娠相生男當以相還生女當留自養敕外嚴車送客崔送至門執手零涕離別之感無異生人復致衣一襲被褥一副充便上車去如電逝須臾至家家人相見悲喜推問知崔是亡人而入其墓追以懊惋居四年三月三日臨水戲忽見一犢車乍浮乍沒既上岸充往開車後戶見崔氏女與三歲男兒共載充見之欣然欲捉其手女舉手指後車曰府君見人即見少府充往問訊女抱兒還充又與金別并贈詩曰煌煌靈芝質光麗何猗猗華陰當時顯嘉異表神奇含英未及秀中夏罹霜萎榮曜長幽滅世路永無施不悟陰陽運哲人忽來儀會淺離別速皆由靈與祗何以贈余親金可順兒愛恩從此別斷絶傷肝脾充取兒及詩忽不見二車處將兒還四坐謂是鬼魅僉遙唾之形如故問兒誰是汝父兒徑就充懷衆初怪惡傳省其詩慨然歎死生之玄通也充詣市賣高舉其價不欲速售冀有識者欻有一老婢問充得之由還報其大家即女姨也遣視之果是謂充曰我姨姊崔少府女未嫁而亡家親痛之贈以金箸棺中今視卿甚似得本末可得聞不充以事對即詣充家迎兒兒有崔氏狀又似充貌姨曰我舅甥三月末間産父曰今春暖溫也願休強也即字溫休溫休蓋幽婚也其兆先彰矣兒遂成為令器歷數郡二千石皆箸績其後生植為漢尚書植子育為魏司空冠蓋相承至今也志怪同學梁山伯祝英臺皆東晉人梁家會稽祝家上虞嘗同學祝先歸梁後過上虞尋訪之始知為女歸乃告父母欲娶之而已許馬氏子矣梁悵然若有所失後三年梁為鄞令病死遺言葬清道山下又明年祝適馬氏過其處風濤大作舟不能進祝乃造梁冢失聲哀慟忽地裂祝投而死焉馬氏聞其事於朝丞相謝安請封為義婦和帝時梁復顯靈異效勞於國封為義忠有司立廟於鄞云吳中有花蝴蝶橘蠹所化也婦孺以梁山伯祝英臺呼之寧波志神女冢宋少帝時南徐有一士子從華山往雲陽見客舍中有一女子悅之無因遂成心疾母問其故具以告之母往尋見女子具説之女問感之因脫蔽膝令母密藏于席下臥之當愈數日果差忽舉席見蔽膝持而泣之氣欲絶謂母曰葬時從華山過母從其意北至女門牛打不行且待須臾女粧點沐浴竟而出歌曰華山畿君既為儂死獨活為誰施君若見憐時棺木為儂開言訖棺木開女遂透棺中因合葬呼曰神女冢參察子重活開元中易州司馬鄭州張果女卒權瘞閣下有劉乙來代其子常止閣中日暮有美女來情好遂洽經數月忽謂劉曰我前張司馬女沒殯此閣命當重活與君好合後三日君可見發指其所痊處而去劉如期發之至明復活漸能言語坐起數日父詣閣中見女在焉問知其由乃歔欷曰此冥期至感何為隱蔽因遣報果請婚父母驚喜赴期遂成嘉偶後産數子廣異記鬼胎代説鄭畋是鬼胎其母卒後與其父亞再合而生畋初亞未達旅遊諸處留其妻併一婢在山觀中女冠院側及歸妻已卒詢其婢婢曰娘子將欲産臥之夕聞空中有語曰汝須出觀外無觸污吾清境不然吾當殺汝妻祝曰某婦人也出無所歸願聖者憫念及五更分娠後乃殞絶觀內道衆為殯於墻外野田中矣亞以錢酒往醬之是夜夢妻曰某命未盡合與君生貴子無何為觸污道院為神靈所殺從此向南十里有一僧院其間祗有一僧年可五十來此奇士也君可往求之僧必拒諱但再三哀鳴祈之當得再奉箕帚也及寤不以為信次夕又再夢之語如初亞於是趨其院果見彼桑門初謁之亦喜亞告之殊不管顧曰我即凡人也偶出家耳豈能主幽冥之間事乎亞復懇之僧怒以柱杖驅擊亞甘其辱連日不去夕亦不寢僧乃許之曰汝既心堅若此俟吾尋訪之乃坐入定半夜後起謂亞曰事諧矣天曙但先歸吾當送來亞其夕歸觀三更中聞外戶人語即引妻來言本身已備損壞此即魂也善相保守囑之而去其事宛如平生但惡明處三二年間乃生畋又數歲妻乃辭去言年數已盡合當決去涕泗而別俄不知所之中朝故事入哭復活崔護舉進士不第清明獨遊都城南得村居花木叢萃叩門久之有女子自門隟問之對曰尋春獨行酒渴求飲女子啓門以盂水至獨倚小桃柯佇立而屬意殊厚崔辭起送至門如不勝情而入後絶不復至及來歲清明徑往尋之門庭如故而戶扄矣因題詩於其左扉云去年今日此門中人面桃花相映紅人面不知何處去桃花仍舊笑春風後數日復往聞其中哭聲問之老父云君非崔護耶吾女自去年恍惚如有所失及見左扉字遂病而死崔請入哭之尚儼然在床崔舉其首枕其股曰護在斯護在斯須臾開目半日復活老父大喜以女歸之本事詩雲英裴航遇雲翹夫人與詩云一飲瓊漿百感生玄霜搗盡見雲英藍橋便是神仙窟何必區區上玉京後經過藍橋渴過一舍有老嫗揖之求漿嫗令雲英擎一甌漿飲之即美女也航欲娶雲英嫗曰但得玉杵玉臼當與之後航得杵臼為搗藥乃得娶遂得仙也傳奇彩鸞文蕭抵鍾陵西山山有許真君上升第每歲中爍士女櫛比文生暏一妹歌曰若能相伴陟仙壇應與文蕭駕彩鸞自有繡襦并甲帳瓊臺不怕雪霜寒歌罷秉燭陟山捫石生亦潛躡其蹤妹顧曰非文蕭耶引至絶頂侍衛甚嚴後有天判云吳彩鸞以私欲泄天機謫為民妻一紀後入越王山上佐酒盧李二生隱太白山習吐納李生不甘貧浪迹江湖後於揚州逢盧生昔號二舅以馬來迎朱門斜開侍婢數百人一女子佐酒善箜篌容色極佳上有朱字一行雲中辨江樹天際識歸舟燕罷曰莫願作姻否其年汴舟陸長源以女妻之宛類盧舅善箜篌者李具言舊事女曰少年時因兄弟戲乃作夢入仙宮如公所言盧肇遺史真真進士趙顏於畫工處得一軟障圖一婦人甚麗顏謂畫工曰世無其人也如何令生某願納為妻畫工曰余神畫也此亦有名曰真真呼其名百日晝夜不歇回必應之應則以百家綵灰酒灌之必活顏如其言遂呼之百日晝夜不止乃應曰諾急以百家綵灰酒灌之遂活行步言笑飲食如常曰謝君召妾妾願事箕帚終歲生一兒兒年兩歲友人曰此妖也必與君為患余有神劍可斬之其夕乃遺顏劍劍才及顏室真真乃泣曰妾南嶽地仙也無何為人畫妾之形君又呼妾名既不奪君願君今疑妾妾不可住言訖攜其子却上軟障嘔出先所飲百家綵灰酒覩其障唯添一孩子焉松窗雜記聞奇録不繼娶曾子出妻終身不娶其子元請焉告其子曰高宗以後妻殺孝已尹吉甫以後妻放伯奇吾上不及高宗中不比吉甫容知其免于非乎家語曾參喪妻不更娶人問其故曾子曰以華元善人也韓詩外傳如淳曰華與元參之二子也不復娶王吉子駿為少府時妻死因不復娶或問之駿曰德非曾參子非華元亦何敢娶前漢三不惑楊秉早喪夫人遂不復娶遂從容言曰我有三不惑酒色財也後漢敗家朱暉年五十失妻昆弟欲為繼室暉嘆曰時俗希不以後妻敗家者遂不復娶上不違本心管寧妻先卒知故勸更娶寧曰每省曾子王駿之言意嘗嘉之豈自遭之而違本心哉魏志十一篤慎諸葛瑾才略雖不及弟而德行尤純妻死不更娶有所愛妾生子不舉其篤慎如此吳志辭疾陳化字元耀汝南人為尚書令妻早亡化以古事為鑒乃不復娶孫權聞而貴之以其年壯勑宗正妻以宗室女化固辭以疾權不違其志吳書比曾徐伯珍舉動有禮過曲木之下趨而避之早喪妻曉不復重娶自比曾參南齊書家甚貧乏兄弟四人皆白首相對時人呼為四皓妻亡無妾宋何尚之立身簡約車服率素妻亡不娶又無婦妾執衡當朝畏遠權柄親故一無薦舉既以此致怨亦以此見稱南史二十無子不娶李象述子也清簡不風概博涉群書從容風素有名於時喪妻無子終竟不娶論者非之北史三十三終身無妓丁公著字平子蘇州吳郡人清儉守道每得一官未嘗不憂色滿容年四十四喪室以至終身無妓妾聲色之好舊唐孝友傳孤居一室王維退朝之後焚香獨坐以襌誦為事妻亡不再娶三十年孤居一室屏絶塵纍上妾聘則為妻奔則為妾內則妾之言接也聞彼有禮走而往焉以得接見於君子也注有識女子給事之得接於君者左傳女為人妾妾不娉也説文奔則為妾奔亦識也韻會不聘魯聲伯之母不聘穆薑曰吾不以妾為姒生聲伯而出之左成上內寵晏子對齊景公曰內寵之妾肆奪於市外寵之臣僣令於鄙昭二十一薦芰司馬子期欲以其妾為內子訪之左史倚相曰吾有妾而願欲笄之其可乎對曰子夕嗜芰子本有羊饋而無芰薦君子曰違而道君子之行欲其道也夫子本能違若敖之欲以之道而去芰薦吾子經楚國而欲薦芰以干之其可乎子期乃止楚語大禮公子荊之母嬖將以為夫人使宗人釁夏獻其禮對曰無之公怒曰女為宗司立夫人國之大禮也何故無之對曰周公及武公娶於薛孝惠娶於商自桓以下娶於齊此禮也則有若以妾為夫人則固其無禮也公卒立之而以荊為大子國人始惡之襄二十四樊通德後漢伶玄妾樊通德能言趙飛燕姊妹事既作飛燕外傳伶玄與班固同時有文名玄語通德曰斯人俱灰滅也盛時疲精神馳鶩嗜欲寧知終歸荒田野草乎通德掩袖視燭影以手擁髻凄然泣下原碧王莽妻傍侍者原碧莽幸之後子臨亦通焉漢書友通後梁商美人友通期獻於順帝通期有過帝以歸商商出嫁之商子冀遣客盜還友通期生子伯玉冀傳阿鶩鍾繇與荀攸善朱建平相二人曰荀君雖少然當以後事付鍾君繇因嘲攸曰惟當嫁卿阿鶩耳荀果先卒繇經紀其門戶嫁其妾阿鶩使得善所焉緑珠昔梁氏女有容貌石季倫為交趾採訪使以真珠三斛買之即緑珠也善吹笛孫秀使人求之崇曰緑珠吾愛妾不可得也秀竟誅崇來訪緑珠緑珠聞之墜樓死嶺表録異季倫有愛婢曰翔風能別五聲以文顯名年三十石崇乃退為房老翔風怨而作詩云春華誰不美卒傷秋落時坐見芳時歇憔悴空自嗤拾遺絡秀周浚作安東時行獵值暴雨過汝南李氏李氏富足而男子不在有女名絡秀聞外有貴人與一婢於內宰豬羊作數十人飲食事事精辦不聞有人聲密覘之獨見一女子狀貌非常浚因求為妾父兄不許絡秀曰門戶殄瘁何惜一女若連姻貴族將來或大益父兄從之遂生伯仁兄弟絡秀語伯仁等我所以屈節為汝家作妾門戶計不汝若不與吾家作親親者吾亦不惜餘年伯仁等悉從命由此李氏在世得方幅齒遇世説宋褘宋禕是石崇妓緑珠弟子有國色善吹笛在晉明帝處帝疾患危篤群臣進諫請出宋禕時朝賢悉見帝曰卿諸人誰欲得之衆人無言阮遙集時為吏部尚書曰願以賜臣帝即與之褘死葬金城南山對琅琊郡門袁山松為琅琊太守每醉輒乘輿上禕冢作行路難歌俗説宋禕曾為王大將軍妾后屬謝鎮西問褘我何如王答云王比使君田舍貴人耳世説注云宋禕未詳鄭櫻桃石虎鄭后名櫻桃晉冗從僕射鄭世達家妓也在衆猥妓中虒數嘆其貌於太妃太妃給之十六國春秋後趙録趙書云石虎聘崔氏為夫人無寵所愛鄭夫人有百日兒病謂崔與藥以告石虎虎作威問之崔言外舍見小子以唾其客作實非藥也虎乃射一箭通中而死載記云石虎聘將軍郭榮妹為妻虎寵惑優僮鄭櫻桃而殺郭氏更納清河崔氏女櫻桃又譖而殺之雷尚書王導有幸妾姓雷頗預政事納貨蔡公謂之雷尚書世説雷有寵生洽恬語林露醜王導與周顗及朝士詣尚書紀瞻有愛妾能為新聲顗於衆中欲通其妾露其醜穢顏無怍色有司奏免顗官詔特原之晉紀開閣驅妾王處仲敦世許以高尚之目嘗荒恣於色體為之弊左右諫之處仲曰吾乃不覺爾如此甚易耳乃開後閣驅諸婢妾數十人出路任其所之時人嘆焉桃葉王子敬妾也篤愛之為之歌其一篇云桃葉映花紅無風自婀娜二篇云桃葉復桃葉桃樹連桃根古今樂録馮月華宋沈攸之為荊州刺史廄中有群馬每夜輒騰擲驚嘶攸之令人于櫪邊伺之見一白駒以繩縳腹超軼如飛掩之不及視廄猶闔縱入閣內問內人惟愛妾馮月華臂上玉馬以緑繩穿之臥輒置枕下夜或失所在旦則如故視其蹄果有泥迹攸之亡不知所往渚官故事耀華阮佃夫廬江何恢有妓張耀華美而有寵為廣州刺史將發要佃夫飲設樂見張氏悅之頻求恢曰恢可得此人不可得也佃夫拂衣出戶曰惜指失掌邪遂諷有司以公事彈恢南史恩幸傳徐月華高陽王雍薨後諸妓悉令入道或有嫁者美人徐月華善彈箜篌能為明妃出塞之曲歌聞者莫不動容永安中與衛將軍原士康為側室宅近青陽門徐鼓箜篌而歌哀聲入雲行路聽者俄而成市徐常語士康曰王有二美姬一名修容二名艷姿並蛾眉皓齒潔貌傾城修容亦能為緑水歌艷姿善火鳳舞並愛傾後室寵冠諸姬士原聞此遂常令徐鼓緑水火鳳之曲焉洛陽伽藍記朝雲河間王琛妓女三百人盡皆國色有婢朝雲善吹箎寵為團扇歌壟上聲琛為秦州刺史諸羌外叛屢討之不降琛令朝雲假為貧嫗吹箎而乞諸羌聞之悉皆流涕迭相謂曰何為棄墳井在山谷為寇也即相率歸降秦民語曰快馬健兒不如老嫗吹箎上春風洛陽上高里有冠軍將軍郭文遠宅堂宇園林匹于邦君時隴西李元謙樂雙聲語常經文遠宅前過見其門閥華美乃曰是誰第宅過佳婢春風出曰郭冠軍家元謙曰凡婢雙聲春風曰儜奴慢罵元謙服婢之能于是京邑翕然傳之上紫光元湛名位漸重留連聲色始以婢紫光遺郎中宋遊道後乃私耽出為冀州竊而攜去遊道大致紛紜乃云紫光湛父所寵湛母遺已將致公文久乃停息論者兩非之北史四玉兒元樹奔梁時年十五未及富貴每見嵩山雲向南來未嘗不引領歔欷後為樊子鵠杜德李昭所紿北歸初發時覩其愛妹玉兒以金指環與別樹常著之寄還梁表必還之意朝廷知之俄而賜死未幾三人皆死樹為祟云上七成母崔㥄性暴慢寵妾馮氏長且姣家人號曰成母朝士邢子才等多姦之至是假其威勢恣情取受風政不立十二玉珠到撝有愛伎陳玉珠宋明帝遣求不與逼而奪之撝頗怨帝令有司誣奏將殺之撝入獄數宿鬚鬢皆白免死係上方奪封南史美滿蕭景先遇疾遺言作啓謝世祖曰自丁荼毒以來妓妾已多分張所余醜猥數人皆不似事可以明月佛女桂支佛兒玉女美玉上臺美滿豔華奉東宮南齊書陸太喜梁羊侃性豪侈善音律自造採蓮棹歌兩曲甚有新致姬妾侍列窮極奢靡有彈箏人陸太喜著鹿角瓜長七寸儛人張淨婉腰圍一尺六寸時人咸推能掌上舞又有孫荊玉能反腰貼地銜得席上玉簪勑賚歌人玉娥兒東宮亦賚歌者屈偶之並妙盡倚曲一時無對南史雪兒雪兒者李密之愛姬能歌舞每見賓僚文章有奇麗入意者即付雪兒叶音律以歌之故韓定辭云盛德好將銀管述麗詞堪付雪兒歌北夢瑣言紅拂李靖謁楊素一妓執紅拂侍側目靖久之靖歸逆旅夜有紫衣戴帽人叩門延入脫衣去帽乃十八九一美人也靖驚詰之告曰妾楊家紅拂妓也絲蘿願托喬木乃與俱適太原豪異祕纂素玉司元少常伯崔義起妻蕭氏有婢素玉報應記窈娘武后載初中左司郎中喬知之有婢名窈娘藝色為當時第一知之寵待為之不婚武延嗣聞之求一見勢不可抑既見即留無復還理知之痛憤成疾因為詩寫以縑素厚賂閽守以達窈娘窈娘得詩悲咽結三章於裙帶赴井而死延嗣見詩遣酷吏誣陷知之破其家知之詩曰石家金谷重新聲明珠十斛買娉婷昔日可憐君自許此時歌舞得人情君家樓閣不曾難好將歌舞借人看富貴雄豪非分理驕奢勢力橫相于別君去君終不忍徒勞掩袂傷紅粉百年離別征高樓一旦紅顏為君盡本事詩舊唐書同李德裕祥瑞論褒姒驪姬皆為國妖以禍周晉緑珠窈娘皆為家妖以災喬石朝野僉載窈娘作碧玉仙娥御史監察清河張佶侍兒仙娥能歌舞解書翰常出使以娥充使典有密知者將發之佶拜跪多數竟得不發御史臺記石崇有妾曰仙娥娘名稱亞于緑珠幽怪録駢珠楊國忠本張易之子也時易之得幸於天后恩寵無比每朝退歸太后詔令居樓而去梯易之母恐其絶嗣密使女奴駢珠樓人私與之寢既而有娠而生國忠駢珠遂與國忠父楊為妻以其子姓楊又與楊妃同姓遂結為族眷焉楊妃外傳素娥武三思妓素娥有殊色狄梁公請出之忽失所在於堂奧中聞蘭麝芬馥附耳而聽即素娥語曰某花月之妖帝遣奉公言笑梁公時之正人不敢見也明珠楊慎矜侍婢也有美色以葬原草木流血遺術者史敬思后為八姨闌得以見明皇帝惡其厭勝矜慎遂抵法明皇雜録婢春草賣太真柳氏姊來往宮中唐曆盈盈達奚盈盈者天寶中貴人之妾姿艷貫絶一時會貴人者病同官之子為千牛者失索之甚急明皇聞之詔大索京師無所不至而莫見其迹因問近往何處其父言貴人病嘗往問之詔且索貴人之室盈盈謂千牛曰今勢不能自隱矣出亦無甚害千牛懼得罪盈盈因教曰第不可言在此恐上問何往但云所見人物如此所見帟幕幃帳如此所食物如此勢不由已決無患矣既出明皇大怒問之對如盈盈言上笑而不問後數日虢國夫人入內明皇戲謂曰何久藏少年不出邪夫人亦大笑而已盈盈傳裴六郎哥舒翰有愛妾曰裴六郎容範曠代善歌舞通幽記玉簫唐兩川節度使韋皋少遊江夏止於江使君之館薑氏孺子曰荊寶有小青衣曰玉簫年才十歲常令祗侍韋兄玉簫亦勤於應奉後二載薑使君入關求官韋乃居上頭陀寺荊寶時遣玉簫往役給奉玉簫年少長大因而有情時韋後歸覲與玉簫約云少則五載多則七年來取因留玉指環一枚并詩一首遺之暨五年既不至玉簫乃靜禱於鸚鵡洲又逾年至八年春玉簫歎曰韋家郎君一別七年是不來耳遂絶食而殞薑氏愍其節操以玉環著於中指而同殯焉後韋鎮蜀值荊寶以事係獄韋出之因問玉簫何在薑曰以僕射愆期乃絶食而終因吟留贈玉環詩云黃雀銜來已數春別時留解贈佳人長江不見魚書至為遣相思夢入秦韋聞之益增悽歎廣修經像以報夙心且想念之懷無由再會時有祖山人者有少翁之術能令逝者相親但令府公齋戒七日清夜玉簫乃至謝曰承僕射寫經造像之力旬日便當託生却後十三年再為侍妾以謝鴻恩臨被微笑曰丈夫薄情令人死生隔矣後韋以隴右功理蜀不替纍遷中書令瀘𤏡歸心因作生日節鎮所賀皆貢珍奇獨東川盧八座送一歌姬未當破瓜之年亦以玉簫為號觀之乃真薑氏之玉簫也而中指有肉環隱出不異留別之玉環也韋嘆曰吾乃知存歿之分一往一來玉簫之言斯可驗矣雲溪友議王衍宮人有李玉簫蜀史檮機秀奴七七李汧公勉性不喜俗間聲音惟二寵妓曰秀奴七七皆聰明善琴與箏歌時令奏之自撰琴譜因話録薛瑤英元載寵姬薛瑤英攻詩書善歌舞仙姿王質肌香體輕雖旋波搖光飛燕録珠不能過也瑤英之母趙娟亦本岐王之愛妾後出為薛氏妻生瑤英而幼以香喼之故肌香也及載納為姬處金絲之帳却塵之褥其褥出自句驪國一云是却塵之獸毛所為也其色殷鮮光軟無比衣龍綃之衣一衣無一二兩摶之不盈一握載以瑤英體輕不勝重衣因於異國以求是服也唯賈至楊公南與載友善故往往得見歌舞至因贈詩曰無怯銖衣重笑疑桃臉開方之漢武帝虛築避風臺公南亦作長歌褒其美略曰雪面淡娥天上女鳳簫鸞翅欲飛去玉叉碧翠步無塵楚腰如柳不勝春瑤英善為巧媚載惑之怠於庶務及載死瑤英自為里人妻矣杜楊編小小王縉為相為妾造寶應寺宏麗無比今寺中什梵天女悉韓幹為齊公妓小小等寫真也南部酉陽寺塔上清竇參所寵青衣曰上清參得罪入掖庭異聞集任氏麾兵崔寧大曆中代杜鴻漸為西川節度使寧入朝留弟寬守成都瀘州楊子琳乘間以精騎數千突入成都據城守之寬屢戰力屈子琳威聲頗盛寧妾任氏魁偉果幹乃出其家財十萬募勇士信宿間得千人設隊伍將校手自麾兵以逼子琳琳懼城內糧盡乃拔城自潰子琳素有妖術其夕致大雨引丹至庭除登之而遁舊唐六十七楚賓南鄭縣尉李雲於長安求納一姬號曰楚賓聞奇録真珠寶曆中李願太尉晟之子也早以勳廕入仕纍任方面性甚奢豪而多內寵晚得一青衣乃色中之尤者乃字之曰真珠意取季綸緑珠未臻於此及願年老真珠名轉著乃謀於親友曰匹夫無罪懷壁其罪願今老矣乃家藏一女寶不曾上聞恐非臣子所宜如得一善文者若登徒子能狀其妍艷希一表以進吾死無恨矣其所親乃求表於漢公漢公辭不能文乃告於虞卿虞卿欲自圖之曰須一見俾容態志在吾目然後可以操文願從之虞卿一見此姬晃然自失度終不可得乃話於牛僧孺僧孺方持國柄且曰願欲何求吾能致之亦何必上聞虞卿曰願意已決矣相公若直取之恐不如意若計取之萬萬得也乃薦漢公為行人曰是子掉三寸舌能易人五藏僧孺然之漢公乃往見願曰竊聞司空欲貢一妓誠有之乎願曰然漢公曰竊為司空危之願驚曰何至危也漢公曰今主上春秋鼎盛後宮如西子者數千司空方更以真珠投之何異擲一米于太倉乎若真珠承寵上回聖意勢傾六宮必責司空久自寵憐歷年不進之𠎝昨退思之乃為司空危矣願翻然曰奈何漢公曰大凡尤物必能禍人真珠進與不進恐終與司空為禍然向外竊知司空欲進此妓久矣一日罷之人必謂司空或溺而不能舍也為司空計不若別與一人願曰誰可與也漢公曰牛相訪求一美色久矣今司空不過求大鎮冀欲回天心不若將與牛相牛相得妓司空得鎮不亦可乎願乃甚悅乃以真珠歸于僧孺漢公遂為狎客以真珠為賞心之具雖公卿候謁四方有急切要一見而終不可得故京師號虞卿為宰相牙郎蓋由此也牛羊日曆皇甫松牛奇章公之甥怨公不薦為謗詩曰夜入真珠室朝遊玳瑁宮真珠即公侍妾名也托言真珠鎮襄陽時所納也有殊色歌舞之態時號絶倫真珠敘録奇章公納妓曰真珠有殊色盧肇至奇章重其文延于中寢會真珠沐髮方以手捧其髻插叉于兩鬢間丞相曰何妨一詠肇曰知道相公憐玉腕故將纖手整金叉吟窗敘録絳桃柳枝韓退之二妾一曰絳桃二曰柳枝退之使山東有詩云東風欲動別長安春半邊城特地寒不見園花并巷柳馬頭惟有月團團柳枝後踰園遁去有詩曰別來楊柳階頭樹擺亂春風只欲飛還有小園桃李在留花不發待郎歸語林關盻盻樂天有和燕子樓詩其序云徐州張尚書亦有愛妓盻盻善歌舞雅多風態為校書即時遊淮泗間張尚書宴豫酒酣出盻盻以佐歡豫因贈詩落句云醉嬌勝不得風嫋牡丹花一歡而去爾後絶不復知茲一紀矣昨日司勳員外郎張仲素繪之訪余因吟詩有燕子樓詩三首辭甚婉麗詰其由乃盻盻所作也繒之從事武寧軍纍年頗知盻盻始末云張尚書既歿彭城有張氏舊弟中有小樓名燕子盻盻念舊愛而不嫁居是樓十餘年于今尚在盻盻詩云樓上殘燈伴曉霜獨眠人起合歡床相思一夜情多少地角天涯不是長又云北邙松柏鎖愁煙燕子樓人思悄然自埋劍履歌塵散紅袖香銷一十年又云適看鴻鴈嶽陽回又覩玄禽逼社來瑤瑟玉簫無意緒任從蛛網任從灰余嘗愛其新作乃和之云滿窗明月滿簾霜被冷燈殘拂臥床燕子樓中寒月夜秋來秪為一人長鈿帶羅衫色似煙幾回欲起即潛然自從不舞霓裳曲疊在空箱十二年又今春有客洛陽回然到尚書墓上來見説白楊堪作柱爭教紅粉不成灰又贈之絶句黃金不借買蛾眉揀得如花四五枝歌舞教成心力盡一朝身去不相隨後仲素以余詩示盻盻乃反覆讀之泣曰自公薨背妾非不能死恐百載之後以我公重色有從死之妾是玷我公清範也所以偷生耳乃和白公詩云自守空樓斂恨眉形同春後牡丹枝舍人不會人深意訝道泉臺不去隨盻盻得詩後怏怏旬日不食而卒但吟云兒童不識沖天物謾把青泥汙雪毫長慶集徐州燕子樓直郡舍後乃唐節度使張建封為侍兒盻盻所建者陳彥升嘗留詩僕射荒阡孤兔遊侍兒猶住水西樓風清玉簟慵歌枕月好珠簾懶上鉤寒夢覺來滄海闊新愁吟罷紫蘭秋樂天才似春深雨斷送殘花一夕休西清詩話樊素小蠻白樂天有二妾樊素善歌小蠻善舞嘗有詩曰櫻桃樊素口楊柳小蠻腰二妾既長又有詩云一樹春風萬萬枝嫩於金色軟於絲後二妾各去有詩云病與樂天相伴住春隨樊素一時歸古今詩話春草劉夢得集有贈小樊詩曰花面丫頭十三四春來綽約向人時終須買取名春草處處將行步步隨又同州與樂天詩注曰春草白君之舞妓也錦瑟李商隱有錦瑟詩人莫曉其意或謂是令狐楚家青衣名也貢父詩話錦瑟之聲感怨清和昔令狐楚侍人能彈此四句詩中四句狀此四曲也章子厚曾疑此詩趙推官深為説如此許顗詩話沉真真太常博士鄭還古寓東都與柳將軍同巷還古將調西都柳盛張筵以餞盡出家妓謳歌薦酒行杯有第三姬容艷妖絶鄭竊窺之有眷眷意柳謂鄭曰此沈真真本良家子頗好文辭請賦詩以定情候博士拜命即當送賀還古賦詩曰洞房出神仙清聲當管絃詞輕白苧曲歌揭白雲篇既未生裴秀何妨乞鄭玄不堪金谷水橫過墜樓前柳覽詩大喜俾真真拜謝還古抵京旋拜伊闕令得重疾馳書告柳柳即送真真赴京迎鄭請出相見真真飾容致拜還古起前遽執真真之手長吁而卒麗情集柳蕣英余媚娘者才婦也適周氏夫亡以介潔自守陸希聲時為正郎聞其容美而善書巧智無比使行人中善言者媒遊説之媚娘曰陸郎中必得兒侍巾櫛須立誓不置側室及女奴則可為陸家新婦希聲諾之既娶二年劈箋沫墨更唱迭和媚娘又能饌五色鱠妙不可及無何希聲之獲名姬柳蕣英者媚娘怨之諭令入家同處希聲以為誠然既共居略無它説候希聲他適即召蕣英閉室中手刃殺之碎其肌體盛以二大合封題云送物歸別墅閽吏異之送京兆獄媚娘遂就極典杜秋娘李錡叛有妾杜秋娘沒入宮後又放歸杜牧感而作詩有云椒壁懸綿募鏡奩蟠玉螭月上白壁門桂影浮參差金階玉露重間把紫簫吹燕媒得皇子夫人親棒持虎晴珠絡褓金盤犀鎮帷國史補琴客柳宜城之愛妾也善撫琴瑟宜城請老而琴客出嫁顧况為作歌麗情集却要觀察使李庚之女奴名却要美容止善辭令李有四子長曰延禧次曰延範延祚延祐所謂大郎二郎三郎五郎也咸欲蒸之而不得嘗遇清明之夜大郎遇之於櫻桃花影中乃持之求偶却要取茵席授之紿曰可于廳中東南隅停待又遇二郎調之曰可于廳中東北隅相待又遇三郎束之曰可于廳中西南隅相待又遇五郎握手不可解曰可于廳中西北隅相待四郎皆持所授茵席各趣一隅心雖訝之而不敢發頃却要燃炬豁扉照之曰阿堵貧兒爭敢向這裡覔宿處四子各棄所攜掩面而走自是不敢失敬三水小牘非煙臨淮武公業咸通中任河南府功曹參軍愛妾曰非煙姓氏容止纖麗若不勝綺羅善秦聲好文筆公業甚嬖之其比鄰趙氏子曰象端秀有文才弱冠矣忽一日於南垣隙中窺見非煙神氣俱喪廢食忘寐乃厚賂公業之閽以情告之閽妻具以告非煙但含笑凝睇而不答門媼盡以語象象發狂心蕩不知所持乃取薛濤箋題絶句云一覩傾城貌塵心只自猜不隨簫史去擬學阿蘭來以所題密緘之祈門媼達非煙煙讀畢吁嗟良久謂媼曰我亦曾窺見趙郎大好才貌此生薄福不得當之蓋鄙武生粗悍非良配耳乃復酬篇寫於金鳳箋云緑慘雙娥不自將只緑幽恨在新詩郎心應似琴心怨脈脈春愁更問誰封付門媼令遺象象啓緘吟諷數四拊掌喜曰吾事諧矣後值公業入直遂成繾綣焉如是者周歲后為女奴所告公業鞭楚而斃上素娥韋詢美開成中及第受鄧都從辟焉挈所寵素娥行羅紹威聞其姝麗求之詢美不敢辭遂以獻之素娥姓崔氏大梁良家子善諧謔筆札和淚作詩云妾閉間房君路岐妾心君恨兩依依魂神倘遇巫娥伴猶逐朝雲暮雨歸詢美不受辟夜度河宿一寺長吁不寐曰何處人能報不平寺有行者問其不平事詢美具語之歘然而去至三更忽擲一皮囊乃貯素娥而至侵曉問僧寺言在僧寺打鍾勤苦三十餘年已不知所之詢美即遁逃他所燈下間談解愁潘炕與弟峭同為蜀王建掌機衡號大樞小樞炕嬖于美妾解愁遂風恙成疾解愁姓趙氏母夢吞海棠花蘂而生頗有國色善為新聲及工小詩建至炕第見之曰朕宮中無如此人意欲取之炕曰臣下賤之人不敢以荐于君其實靳之弟峭曰緑珠之禍可不戒耶炕曰人生貴于適意豈能畏死而自不足於心耶外史檮機打鳳杜大中自行伍為將與物為情西人呼為杜大蟲雖妻有過亦公杖之有愛妾才色俱美大中箋表皆其所為一日大中方寢妾至見几間有紙筆頗佳因書一關寄臨江仙有彩鳳隨鴉之語中覺而視之云鴉且打鳳於是掌其面至頃折而斃今是堂手録蓮花南唐處士陳陶隱西山操行清潔時嚴撰牧豫章欲撓之遣小妾蓮花時往焉陶殊不顧妾乃獻詩求去曰蓮花為號玉為腮珍重尚書遣妾來處世不生巫峽夢虛勞雲雨下陽臺陶答云近來詩思清如水老去風情薄似雲已向升天得門戶錦衾深愧卓文君麗情集後人移其事為陳圖南非也趙陽臺竇滔字連波妻蘇氏名蕙字若蘭陳留令武功道質第三女十六歸滔為苻堅秦州刺史以忤旨謫戍燉煌後拜安南將軍鎮襄陽以禦晉初滔有寵姬趙陽臺歌舞之妙無出其右滔置之別所蘇氏知之苦加捶辱滔深以為恨陽臺又專伺其短毀之滔益忿焉蘇氏時年二十一滔將鎮襄陽蘇氏忿之不與偕行滔遂攜陽臺之任斷其音問蘇氏悔恨自傷因織錦回文五色相宣縱廣八寸計八百四十字餘言縱廣反覆皆成章句其文點畫無缺名曰璇璣圖然讀者不能盡通蘇氏笑而謂人曰徘徊宛轉自成文章非我佳人莫之能解遂發蒼頭齎致襄陽焉滔省覽錦字感其妙絶因送陽臺之關中而具車徒盛禮邀迎蘇氏歸于漢南恩好愈重唐武后紀晉書稍異擬四愁李逢吉性強愎猜忌好危人劉禹錫有妓甚麗李一旦陰計約會奪之劉惶惑嘆吒而歸知無可奈何遂憤悶而作四章以擬四愁云爾玉叉重合兩無緣魚在深潭鶴在天得意紫鸞休舞鏡能言青鳥罷銜箋金盆已覆難收水玉軫長拋不續絃若向𧃲蕪山下過遙將紅淚灑窮泉鸞辭舊伴栖何處鳳得新巢已稱心紅粉尚殘香漠漠碧雲初斷信沉沉情知點污投泥玉猶自經營買笑金從此山頭人似石丈夫形狀淚痕深舊曾遊處遍尋看雖是生離死一般買笑樓前花已老畫眉窗下月猶殘雲藏巫峽音容斷路隔星橋過往難莫道詩成無淚滴盡傾東海也須乾三山不見海沉沉豈有仙蹤更可尋青鳥去時雲路斷姮娥歸去月宮深紗窗遙想春相憶書愰誰憐夜獨吟料得夜來天上鏡只應偏照兩人心本事詩月下間談以為黃損妻裴為呂用之所奪作也無末一首損後遇老叟化形于用之斗拱上叱令以裴還損云襄陽歸妾崔郊秀才者寓居於漢上蘊積文藝而物産罄懸亡何與姑婢通每有阮咸之蹤其婢端麗饒彼音律之能漢南之最也始貧鬻婢於連帥連帥愛之以類無雙無雙薛太保愛妾至今圖畫觀之給錢四十萬寵盻彌深郊思慕不已即強就親府署願一見焉其婢因寒食日以事冢值郊立於柳陰馬上連泣誓若山河崔生贈以詩曰公子王孫逐後塵緑珠垂淚滴羅中侯門一入深如海從此蕭郎是路人或有疾郊者寫其詩於座帥覩之令召崔生左右莫測郊深憂海無處潛遁也及見郊握手曰侯門一入深如海從此蕭郎是路人便是公製作也四百千小哉何惜一書不早相示遂命婦同歸至於帷幌奩匣悉為增飾之小阜崔生矣初有客自零陵來稱戎昱使君席上有善歌者襄陽公遽命召焉戎使君豈敢違命逾月而至及至令唱歌乃戎使君之什也詩曰寶鈿香娥翡翠裙粧成掩泣欲行雲殷勤好取襄王意莫向陽臺夢使君公曰丈夫不能立功立業為異代之所稱豈可奪人姬愛為已之嬉娛以此觀之誠可竄身於無人之地遂多以繒帛贐行以書遜謝於零陵之守也昔王敦驅女樂以結軍士楊素歸徐德言妻臨財莫貪於色不吝者時人用為雅談襄陽公其挺特之英雄乎雲溪友議高麗坡江陵寓居士子忘其姓名有美姬甚貧求尺題於交廣間遊索去萬計支持五年糧食且戒其姬曰某若五年不歸任爾改適士子去後五年未歸姬遂為前刺史所納在高麗坡底及明年士子歸已失姬所在尋訪知處遂為詩求媒寄之詩云陰雲漠漠下陽臺惹著襄王更不回五度未歸空有淚一心如結不曾開纖蘿自合依芳樹覆水寧思返舊杯惆悵高麗坡底宅春光無復下山來刺史見詩遂給一百千及資裝便遣還士子盧氏雜説新聲張谷佐劉從諫納邯鄲人李嚴女為侍人號新聲當從諫潛圖窺脅新聲諫谷曰始天子以從諫為節度非有戰野攻城之功直以其父挈齊十二州還天子去就間未能奪其嗣耳自有澤潞未聞以一縷一蹄為天子壽左右皆無賴章武朝數鎮顛覆雄才傑器尚不能固天子恩况從諫擢自兒女手中茍不以法得亦宜以不法終君當脫族西去大丈夫勿顧一飯恩以骨肉腥健兒食言訖悲涕谷不決者三月畏言泄之後果及禍新唐劉悟傳亭亭廬江王瑗寵姬亭亭本賈人妻有殊色瑗殺其父而納之瑗敗而入宮復侍文皇亭亭敘録態態李涉至楊州遍歷諸寺過一女子拜泣自謂宋熊也宋熊者故吳興劉員外愛姬也劉全白也劉李有昔年之分因有詩贈曰長憶雲仙至小時美蓉頭上綰青絲當時驚覺高唐夢惟有如今宋玉知又曰衡陽夜宴使君筵解語花枝在眼前自從明月西沉海不見姐娥二十年李君嘆曰不見豪首而蓬宋熊誠終身之幸喜恨無言於舊知歟雲溪友議紅鸞范元實溫祖禹之子奇士也為其寵妾紅鸞所山病傷寒殂鐵圍山叢談揚花東坡有妾名朝雲榴花朝雲死于嶺外惟榴花獨存故其詞多及之觀浮花浪蘂都盡伴君幽獨可見其意矣耆舊續聞翠翹翠翹洪內翰侍人夫其姓善畫自題云翠翹戲筆字畫婉媚程大昌題詩云戲作風枝斜再惱玉堂宿鶯鶯燕燕錢塘范十郎二女俱為雲間富民陸氏妾長曰鶯鶯寵幸早世次曰燕燕與群妾等陸病且貧貨所居棲墓廬群妾散燕獨不忍去固食貨十餘年陸死自鬻以葬焉嗚呼豫讓懷智伯國士恩始以國士報燕得不賢於讓哉隨隱謾録田田錢錢田田錢錢辛棄疾二妾也皆因其姓而名之皆善筆札當代棄疾答尺牘書史會要臧獲前漢司馬傳臧獲奴婢應劭曰方言荊淮海岱之間罵奴曰臧罵婢曰獲又左傳得用曰獲燕之北郊凡民男而壻婢謂之臧女而婦奴謂之獲張揖云壻婢之子謂之臧婦奴之子謂之獲風俗通云古制本無奴婢即犯事或原之臧者被臧罪沒入為官奴婢獲者逃亡獲得為奴婢也紀綱晉文公及夫人嬴氏至自王城秦伯納衙三千人實紀綱之僕國語羈紲初晉侯之豎頭須守藏者也其出也竊藏以逃及入求見公辭焉以沐謂僕人曰沐則心覆心覆則圖反宜吾不得見也從者為羈紲之僕居者為社稷之守何必罪居者國君而讎匹夫懼者甚衆矣僕人以告公遽見之左僖二十四童妾呂不韋家僮萬人師古曰婢妾總稱説文男有罪曰奴奴曰童女曰妾堅奴霍光愛幸監奴馮子都常與計事史本傳家僮衛青其父鄭季以縣吏給事平陽侯曹壽家壽尚武帝姊陽信公主季與主家僮衛媼通生青少時歸其父使牧羊民母之子皆奴畜之不以為兄弟數青嘗至甘泉居室有鉗徒相青曰貴人也官至封侯青笑曰人奴之生得無笞罵即足矣安得封侯事乎史漢黠奴齊俗賤奴虜而刁間獨愛貴之桀黠奴人之所患唯刁間收取使之終得其力史記蒼頭鮑宣上哀帝書曰奴從賓客漿酒霍肉蒼頭廬兒皆用致富非天意也孟康曰漢名奴為蒼頭非純黑以別于良人也前傳豬突豨勇王莽時胸奴侵寇乃大募天下囚徒人奴名曰豬突豨勇漢書私屬王莽曰秦置奴婢之市與牛馬同簡今改奴婢曰私屬禁不得買賣也賢行李善字次孫本李元蒼頭也建武中元家疾疫相繼死沒惟孤子續始生數旬諸奴婢欲殺績分産善傷不能止負續逃亡瑕邱界中親自奉養乳為生汁推燥居濕雖在孩時奉之如長君每事長跪請白而後行閭里感之續年十歲然後與善歸本縣里舊業告奴婢於長吏悉收殺之鍾離意上書言狀世祖詔拜善及續並為太子舍人後為日南太守路經元墓躬自除草灑道自執爨修饌祭祀拜辭涕泣而去後漢地餘將作大匠陳國公孫志節有蒼頭地餘年十七情性聰惠儀狀端正工書疏志節為戶曹吏令地餘歸取資用因特車馬亡去到丹陽自云姓王名斌字文高遂留為諸曹吏志節拜揚州刺史郡選曹衣冠子弟皆出斌下乃用之斌乞屏左右叩頭涕洟曰斌即明使君地餘也斌後為蒼梧太守風俗通求拜平陵孟他盡以家財賂張讓監奴奴慚問所欲他曰欲得卿曹拜時賓客求見讓者車常數百乘纍日不得通他後至諸奴迎拜徑將他車獨入衆謂他與讓善爭以物賂他他得以賂讓三輔決録出入妻所梁冀愛監奴秦宮官至太倉令得出入妻所每見輒屏御者以言事因通焉內外兼寵刺史二千石皆謁拜之扶風人士孫奮居富冀從貸錢五千萬奮以三千萬與之冀大怒乃告郡縣誣奮母為守藏婢云盜白珠十斛紫磨金千斤以叛遂收考奮兄弟死於獄中悉沒貸財別傳谷利谷利者本孫權左右給使也以謹直為親近監吳志互見馬長命并州刺史畢軌送故漢渡遼將軍范明友鮮卑奴年二百五十歲言語飲食如常人世語漢末發范友明冢奴猶活友明霍光女聓説光家事廢立之際多與漢書相似此奴常遊走於民間無止住處今不知所在博物志士風熊翹嘗為石崇蒼頭而性廉直有士風黃門郎潘嶽見而稱異勸崇免之乃還鄉里晉書遠傳識字余讀漢書胸奴傳不識撑犂孤塗之字有胡奴執燭顧之余問之曰撑犂天也孤塗子也言胸奴之號單于猶漢人之有天子也余曠然發悟玄晏春秋胡奴祖逖有醜奴曰王安待之甚厚及在雍邱告之曰石勒是汝種類吾亦不在爾一人乃厚資遣之遂為勒將祖氏之誅也安多將從人於市觀省潛取逖庶子道重藏之為沙門時年十歲石氏滅後來歸晉書郗司空鑒家有傖奴知及文章事事有意王右軍向劉尹惔稱之劉問何如方回愔王曰此正小人有意向耳何得便比方回劉曰若不如方回故是常奴耳世説海山使者陶侃家僮千餘常得胡奴不喜言常默坐侃一日出郊奴執鞭隨胡僧見而驚禮云此海山使者也因而墮淚侃異之至夜失其所在助力陶侃為彭澤令不以家纍隨送一力給其子書曰汝旦夕之費自給為難今遣此力助汝薪水之勞此亦人子可善遇之好逃張存善針有奴好逃亡存宿則針縮奴腳欲使則針解之燉煌實録典琴北齊王元景為尚書性雖儒緩而每事機捷有奴名典琴嘗旦起令索食謂之解齋奴曰公不作齋何故常云解齋元景徐謂奴曰我不作齋不得為解齋汝作字典琴何處有琴可典啓顏録慕主博奧蕭頴士嚴酷異常有僕杜亮事之十餘年頴士每加捶楚輒百餘不堪其苦人或激之擇木其僕曰我非不能他從所以遲留者特愛慕其博奧李冗獨異志當千太僕卿趙縱郭子儀壻也為奴當千發其陰事下獄留當千於內侍省張鎰疏曰大宗謂侍臣曰比有奴告其主極弊法特須禁斷自後奴告主者盡令斬決頃者長安令李濟得罪因奴萬年令霍晏得罪因奴悖慢威風動遭誣告今趙縱下獄奴在禁中大體所關有乖教化上深納之縱於是左貶而已當千杖殺之鎰乃令召子儀家僮數百人以死僮示之舊唐告換遺表王稷家有二奴告稷換父遺表德沒進奉物留其奴于仗內遣中使往東都檢稷之家財裴度奏曰王諤身沒之後其家進奉已多今因其奴告檢責其家事臣恐天下將帥聞之必有以家為計者憲宗即日遣市使還二奴付京兆府決殺上王義武黃門之死也裴晉公為盜所刺隸人王義扦刃而斃度自為文祭之是歲進士撰王義傳者三之二南部漁童肅宗嘗賜高士玄真子張志和奴婢各一人玄真配為夫婦名之漁童樵青人問其故答曰漁童使捧釣收綸蘆中鼓枻樵青使蘇蘭薪桂竹裏煎茶銀鹿顏峴家僮名銀鹿後事魯公終身國史補方介陽城歲飢屏迹不過鄰里屑榆為粥講論不輟有奴都兒化其德亦方介自約或哀其餒與之食不納後致粳核數杯乃受黃芩高固生微賤為家所賣轉為渾瑊童奴字黃芩性敏惠謫仙權同休友人雇得僕遇疾貧窘禠垢衣令辦酒食曰豫將會村老丐道里資僕曰此固不足辦某當營乃斫桑札噀成牛肉復汲數瓶水頃之乃旨酒也且曰某固異人酉陽李鴻盧肅鈞之孫貞簡有祖風光化初華州行在及第洎大寇犯闕二十年縉紳靡不褊乏肅始登第俄有李鴻者造之願傭力鴻以錐刀暇日往往反資於肅此外未嘗以所須為意肅有舊業在南陽常令鴻徵租皆如期而至往來千里而未嘗侵費一金既及第鴻奔走如初及一春事畢鴻即辭云托言武公幹武公幹常事蒯希逸十餘歲異常勤幹洎希逸擢第幹辭以親在乞歸就養公堅留不住公既加其忠孝以詩送之略云山險不曾離馬後酒醒長見在床前同人醵絹贈行皆有繼和上京兆高昂字敖曹與侯景等同攻獨孤信於金墉昂使奴京兆候西軍京兆於傅婢強取昂佩刀以行昂執殺之京兆曰三度救公大急何忍以小事賜殺其夜夢京兆以血塗已寤而怒使折其二脛時劉桃棒在勃海亦夢京兆言訴得理將公付賊桃棒知昂必死遽奔焉昂心輕敵建旗蓋以陵陳西入盡鋭攻之一軍皆沒昂輕騎東走河陽城未徹而追兵至伏於橋下追者見其從奴持金帶問昂所在奴示之追者斬之以去先是昂夢為此奴所殺以告盧武將殺之武諫乃止果及難北史奚周禮奚三百人注云今官婢也翟婢姑布子卿見無恤曰此真將軍矣簡子曰此其母賤翟婢也奚道貴哉子卿曰天所授雖賤必貴史記李羽生樂成王黨取中山傅婢李羽生為小妻後傳翻肉劉寬嘗有客遣蒼頭市酒迂久大醉不還罵曰畜生遣人視奴疑必自殺夫人欲試寬令恚伺當朝會裝嚴已訖使侍婢奉肉羹翻汙朝衣婢遽收之寬神色不異乃徐語曰羹爛汝手東觀漢記讀書鄭玄家奴婢皆讀書玄嘗使一婢不稱旨將撻之方自陳説玄怒使人曳著泥中須臾復使一婢來問曰胡為乎泥中答曰薄言往訴逢彼之怒世説翟素會稽翟素友翟氏之女受聘未及配適遭賊欲犯之臨以刃曰不從者今即死矣素曰我可得而殺不可得而辱素婢名青青乞代素賊遂殺素後欲犯青青曰向欲代素者恐被恥獲害耳今素已死何以生為賊復殺之皇甫謐列女後傳嫁婢趙明甫名仁美天水人遷授蒲縣令素曉三命自知祿壽所至有日者經過謁之語與相同趙一女未適人未選得壻間先為女子覔一女僕使一日命之掃庭忽爾涕淚趙曰何故女曰某姓王父名德麟嘗為此邑令某生此縣中因喪父母為人掠賣至此趙憕然謂其妻曰我女不憂不嫁遣乃擇邑客善者輟女粧奩先嫁之忽一曰經過善相人復謁于令見之大駭曰昨觀君容其命將殂今日觀之福祿與壽未可言也因徵其異政雪冤之事趙曰某別無能政因話嫁僕之事乃賀令曰只此便是陰功祿壽寧可測乎搜神記今各書止載南唐鍾離瑾事胡婢金褘為郡上計留在許都時魏武使長史伍必將兵衛天子於許都褘與必善必見褘有胡婢善射必嘗請之從後也三輔夬録丸藥陳壽仕蜀遭父喪有疾使婢丸藥客往見之鄉黨以為貶議及蜀平坐是沉滯者纍年晉書下食裴秀年十八有令望母是婢而嫡母妬猶令秀母親役後大集客秀每下食衆賓見並起拜之答曰微賤豈宜如此當為小兒故耳於是大母乃不敢復妬之語林蕧蘇千寶父有嬖人寶母至妒葬寶父時因推著藏中經十年而母喪開墓其婢伏棺上就視猶暖漸有氣息輿還家終日而蘇説寶父常致飲食與之按寢恩情如生家中吉凶輒語之校之悉驗平復數年後方卒寶因作搜神記中云有所感起是也志怪婢傷祖約為丞相從事中郎於府內為婢所傷司直劉隗奏約患生婢僕身被刑傷約甚慚恥遂解職晉中興書采音緑草采音宋零陵太守劉興道所得家婢也選奏彈采蘭蔡樽在臨海百姓楊元孫以婢采蘭貼與同里黃權約生子酬乳哺直權死後元孫就權妻吳贖婢母于五人吳背約不還元孫訴樽判還本主吳能為巫出入樽內以金釧賂樽妾遂改判與吳元孫檛登聞鼓訟之南史十九孔熙先有婢曰採藻宋書范曄傳恭心王懌不辨菽麥時以為殷道矜之流人無肯與婚以摷婢恭心侍之遂生琨初名崑崙南齊玉素中書舍人郭正一破平壤得一高麗婢名玉素極姝豔令專知財物庫正一夜須漿水粥非玉素煮之不可玉素毒之良久乃覺覔婢不得魏有策略於金城坊空宅搜之婢與投化高麗並在奉勑斬東市僉載懷春天寶初駙馬獨孤明有婢曰懷春雅齒俊俏酉陽剪綵顏真卿奉使李希烈謂柳常侍世父曰吾知此行必不回吾小青衣雙鬟名剪綵者頗善承吾吾幸得歸骨其時汝必與之同啓吾棺知吾有異常人之死常侍言旨蘭蓀彭城劉元漙女將出適求女奴資行用錢八十萬得四人一人名蘭蓀者有殊色而風骨姿態不類賤隸元漙詰其情果衣冠子已再易主元漙焚券以家財五十萬先其女而嫁之陰德傳細婢柳仲郢僕射有婢失意鬻於成都蓋巨源使君欲之取致其家一日通衢有鬻綾羅者從窗下過蓋公於束縑內選擇舒卷酬酢可否柳婢失聲而仆似中風蓋命扶出翌日瘳曰某雖賤人曾為柳家細婢死則死矣安能事賣絹牙郎乎北夢薜荔武翊皇以三頭冠絶一代後惑婢薜荔苦其家婦盧氏雖李紳以同年為護而衆論不容終至流竄狀頭宏詞勑頭是謂三頭南部新書緑翹西京咸宜觀女道士魚玄機字幼微有國色喜讀書屬文風月賞玩之佳句往往播于士林一女僮曰緑翹亦明惠有色機疑與知客私笞殺之三水小碧劉積中婢小碧忽作同年杜省躬語酉陽輕紅華州柳參軍妻崔氏有青衣曰輕紅乾𦠆子金釭楊州從事張不疑買一婢金缸價一十五萬靈怪集鸞鳳司馬圖居中條山王官谷布衣鳩杖出則一女僕鸞鳳自隨歲時村社雩禱圖必造之與村老同席曾無傲色續世説春燕蜀王孟昶説宮婢春燕姓李氏行則同輿坐則同席末年遭殺並命合葬墓上有樹生異花上似鴛鴦交頸人不知名但曰鴛鴦樹時有歌曰願作墳上鴛鴦木作雙飛去作雙歸海物異名記金鳳王鏻妻早卒繼室金氏賢而不見答審知婢金鳳姓陳氏鏻嬖之遂立以為后初鏻有嬖吏歸守明者以色見幸號歸郎鏻後得風疾陳氏與歸郎姧又有百工院使李可殷因歸郎以通陳氏鏻命錦工作九龍帳國人歌曰誰謂九龍帳惟貯一郎歸五代史春燕王鏻婢春燕有色其子繼鵬蒸之鏻已病繼鵬因陳氏以求春燕鏻快快與之上春鶯王延義常為牛飲一夕醉甚命宰相李準棄市而準方大醉臥於市中惟呼其婢春鶯而已刑者未敢殺置之他所明日視朝使召準左右以夜來之命對之延義都不能知乃急召復其位五國故事天中記卷十九
