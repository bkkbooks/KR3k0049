body:
  text: 崑崙山三成爾雅曰三成為崑崙丘注崑崙山三重故以名云崑崙山記云崑崙山一名崑丘五級下曰樊桐一名板松二曰玄圃一名閬風上曰層城一名天庭是謂太帝之居玄圃崑崙一曰玄圃一曰積石瑤房一曰閬風臺一曰華蓋一曰天柱僊人所居也葛仙公傳天柱龍魚河圖曰崑崙山天中柱也晉郭璞崑崙丘贊曰崑崙月精水之靈府惟帝下都西羗之宇嵥然中峙號曰天柱地首河圖括地象曰崑崙之山為地首上為握契滿為四瀆橫為地軸上為天鎮立為八柱又曰地中央曰崑崙其東南方五千里曰神州銅柱崑崙有柱焉其高入天所謂天柱也圍三千里圓如削下有僊人九府治與天地同休息其柱銘曰崑崙銅柱其高入天圓周如削膚體美焉地位高大地部之位起形高大者有崑崙山廣萬里高萬一千里神物之所生聖人仙人之所集也出五色雲氣五色流水其泉南流入中國名曰河也其中山應于天最居中八十城匝繞之中國東南隅居其一分愽物志異名阿傉達山一名崑崙山括地志崑崙為無熱丘水經注日月所隱河出崑崙山山高三千五百餘里日月所相隱避為光明也其上有醴泉華池禹本紀天地之齊崑崙為天地之齊酉陽雜俎地之中崑崙墟地之中也水經崑閬西北之天門也楊炯碑帝之下都西海之南流沙之濱赤水之後黑水之前有大山名曰崑崙之丘實惟帝之下都其神陸吾是司天之九部及帝之圓時上有木禾長五尋大五圍面有九井以玉為檻傍有九門門有開明獸守之百神之所在其下有弱水之淵環之其外有炎火之山投物輒然有人戴勝虎齒有豹尾穴處名曰西王母山海經崑崚崑崙號崑崚山有三角其一角正于北辰名閬風巔其一正西玄圃臺其一正東名崑崙宮有五城十二樓金臺玉𨵗乃元氣之所合天帝治處處十洲記熊熊魂魂槐江之山實惟帝之平圃南望崑崙其光熊熊其氣魂魂山海經氣注北斗當崑崙上氣運注天下春夏為雨露秋冬為霜雪徐整長曆起宮黃帝巡游四海登崑崙山起宮望于其上陸賈新語遺珠黃帝遊乎赤水之北登乎崑崙之丘而南望還歸遺其玄珠莊子掘虛禹以息土滇洪水以為名山掘崑崙虛以為下地或作池中有增城九重上有木禾珠樹玉樹璇樹不死樹在其西沙棠琅玕在其東絳樹在其南瑤樹在其北北門開以納不周之風淮南子宿阿周穆王肆意遠遊宿于崑崙之阿赤水之陽別日升崑崙之丘以觀黃帝之宮而封之以詔後世遂賓於西王母觴于瑤池之上列子承天范蠡為越王築城曰崑崙之象存焉越王曰崑崙之山乃地之柱上承皇上氣吐宇內下處后土稟受無外滋聖生神漚養帝會故五帝處其陽陸三王居其正地吾之國也偏何能與王者比隆盛哉吳越春秋去天數里蔡誕者自云被謫至崑崙初誕還人問云崑崙何似荅曰天不問其高几里要於仰視之去天不過十數里也抱朴子崑崙之體涼張駿酒泉太守馬岌言上酒泉南山即崑崙之體也周穆王見西王母樂而忘歸即謂此山山有石室王母堂珠璣鏤飾煥若神宮刪丹西河名曰弱水禹貢崑崙在臨羗之西即此明矣宜立西王母祠以裨朝廷無疆之福駿從之十六國春秋夢登許渾嘗夢登山有宮室凌雲人云此崑崙也既入見數人方飲酒招之至暮賦詩曰曉入瑤臺露氣清坐中惟有許飛瓊他日復夢至其處飛瓊曰何故顯余姓名于人間座上即改天風吹下步虛聲曰善本事詩嵩丘鶉火大火壽星豕韋為中州其神主乎嵩丘鎮星位焉唐天文志中岳中央之岳獨加高字者何中央居四方之中而高故曰嵩高山白虎通外方禹貢熊耳外方鄭玄毛詩譜云外方山即嵩也後郡國志二室嵩山東謂太室西謂少室相去十七里嵩其摠名也謂之室者以其下各有石室焉少室與太室相埒但小耳西征記泰室中岳少室俗名太室山海注瞻眺昔傳亮北征在河中流從客問之曰潘安仁懷舊賦曰前瞻太室旁眺嵩丘嵩丘太室一山何云前瞻旁眺哉亮對曰有嵩丘山去太室七十里此是寫書誤耳小說負黍少室一名負黍山負黍城在南故因山以名城郡國志定思少室在嵩山西七十里從東角上四十里得下定思又上十里得上定思十里中有大石門為中定思自中定思而出至崖頭下有石室中有水多白石央莢內有自然經書自然飲食輿地志栖神靈藪嵩山最是棲神之靈藪長松綠柏生於嶺澗右左古人住止處有銅銚器物東北出雲有自然五榖神芝仙藥嵩山記明公嵩高山上有石室前有石柱似承露盤上有石脂滴下食之一合與天地相畢中步南下二百步亦有岳廟畫為神像有玉人高五寸玉色甚光潤制作亦佳莫知早晚所造蓋神岳之神相像謂明公山中人悉云屢常失之或經旬乃見上避世嵩高山右室十餘孔有石床池水食飲之具道士多遊之可以避世關中記融降國語曰夏之興也祝融降于崇山韋昭注曰崇嵩字古通用夏都陽城嵩山在焉登仙王喬周靈王太子晉也好吹笙作鳳鳴遊伊洛之浦招延道士浮丘公接以上嵩高山三十餘年後求之于山見桓良曰告我家七月七日待我於緱氏山頭果控鶴斯阜靈王望而不得近舉手謝人時數日而去其家得遺屣亦謂之撫父堆堆有上子晉祠世俗有簫管之聲焉列仙傳水經玉膏陽城西谷名季室亦曰少室山巔有白玉膏服之得仙山有周昭王陵山海經注學仙鬼谷先生於嵩山東南學仙嵩山記嵩呼漢武帝至於中岳獲駮麃見夏后啟母石翌日親登嵩高御史乘屬在廟旁吏卒咸聞呼萬歲者三於是令祠官加增太室祠呂山下戶三百為之奉邑名曰密高本紀夢上武帝夜夢與李少君俱上嵩高山上半道有繡衣使者乘龍從雲中下持節言太乙君請少君覺告近臣曰朕夢少君將舍朕去矣漢武內傳三臺自岳神廟東北二十里至一名山曰東龍門其東有三臺山昔漢武東巡過此山見學仙女帝觀之遂以名焉雜道書萬歲漢武於太室山作登仙臺及萬歲亭西征記遇老父王猛至深山見一老父據胡床鬚鬢皓然猛進拜老父曰王公何因拜也遣人送猛出山顧視乃嵩高山也十六國春秋金璧冀州道人釋法稱告其弟子曰嵩神言江東有劉將軍漢家苖裔當受天命吾以璧三十二鎮金一餅與之劉氏卜世之數也宋符瑞志弟子法義於嵩高廟所石壇下得玉璧三十二枚黃金一餅符彩潤潔河南太守毛脩之以靈岳降瑞送諸神府孫嚴宋書嵩岑裴衍字文舒自梁歸魏授通直郎衍欲辭朝命請隱嵩高表曰伏見嵩岑極天包育名草脩生救疾多遊此岫臣攝性乖和誠希藥此沈痾庶偶影風雲永歌至德詔曰知欲養痾中岳練石嵩嶺栖素雲根餌芝清壑深用嘉焉便從來請魏書寶神像魏太武時嵩陽太室中有寶神像長數寸乍見孝文太和中有人避癗於此廟見太武來造神因言今日朝天帝帝許移都洛陽當得四百年神言昨已得天符太武出神神左右曰虜性苛貪天符但言四十而已因言四百明年孝文遷都洛陽唯得四十年矣廣古今五行記訪隱田遊巖初以儒學累徵不起侍其母隱嵩山調露中高宗幸中嶽因訪其居遊巖出拜詔命中書侍郎薛元超入問其母御題其門曰隱士田遊巖宅徵拜弘文學士翰林盛事山神移樹永淳時嵩岳閑居寺釋元珪廬嶽之龐塢一日有偉丈夫從部曲來謁曰我此岳神也請授正戒珪曰無我無汝孰能戒哉神曰我神通亞佛珪曰汝能儀上帝東天行而西七曜乎汝能奪地祇融五嶽而結四海乎曰不能珪曰東巖寺之障莽然無樹北岫有之而背非屏擁汝能移北樹于東嶺乎神曰聞命願師無駭是夜暴風吼雷物不定止詰旦和霽則北巖松栝盡移東嶺森然行植焉宋高僧傳神嶽則天證聖元年將有事於嵩山先遣使祭致下制號嵩高為神嶽尊其神為天中王夫人為靈妃至天冊萬歲二年臘月甲申親行登封之禮改元萬歲登封丁亥禪于少室山三年二月辛巳尊天中王為天中皇帝靈妃為天中皇后舊志新紀十景盧鴻一字顥然博學善書隱于嵩山開元初禮召不至自圖十景有序有詞李參玄亂曰玄居十志者草堂以脩身蓄德之府也樾館以延賓閱禮之用也洞玄室以談道眾妙之宗也幕翠庭以棲閒谷神之致也期僊磴以湛情傲睨之適也滌煩磯以藻性潔已之謂也雲錦淙以汰志日新其德也金碧潭以端形鏡清其色也倒影臺熙熙春臺之樂也枕烟庭渺渺仙山之興也十者蓋天地成數志者紀述之總名玄居道心惟微幽賞亦異可謂隱淪之奇札今昔所未聞故備焉貽諸好事君子也四銘嵩山之上有玉女擣帛石瑩徹光潔人莫能測岳下之人云立秋前一日中夜常聞杵聲響焉岳之西北一峰號望都峰云天氣晴暖即望見洛陽隱如車蓋之狀又岳之東北一峰號雞鳴峰云五更之初便見日出岳頂有中天池開元中隱士盧鴻一凡有絕境之處皆勒銘其最妙者此四銘也紀異廬嵩山盧鴻廬嵩山賜隱居服官營草堂到山中廣學廬聚徒五百人唐書唐舊史鴻一蓋二名與中岳劉真人碑所書合新史刪去一字不知何據當以舊史為正石林草堂圖序隱李渤字濬之隱於嵩山以讀書業文為事元和初以山人徵為左拾遺舊唐河南少尹杜兼遣吏持詔幣即山敦促不拜韓愈遺書曰朝廷士引頸東望若景星鳳凰爭先覩之為快想遺公冠帶就車惠然肯來舒所蓄積以補綴盛德之缺渤心善其言始出家東都唐書題名元和四年三月二十六日余與著作郎樊宗師處士盧仝自洛中至少室謁李徵君渤樊次玉川疾作歸明日與盧李自少室而東上太室中峰宿封禪臺下石室遂自龍川寺釣龍潭水遇雷明日觀啟母石入天封觀閏四月三日韓愈題雲麓漫抄集不載武后封禪處有石記云人游龍潭者毋笑語以瀆龍神龍怒則有雷恐集古錄司真天中岳山洞名上帝司真之天即軒轅為黃帝治中岳主德分精黃老駐蹕上有仙人貝多之樹玉女織錦之室石髓瓊環玉人金像下應柳宿之精下鎮周地之分野洞淵集歲星降婁玄枵以負東海其神主於岱宗歲星位焉唐志山尊太山山之尊一曰岱宗岱始也宗長也萬物之始陰陽交代故為五岳長受命王者恒封禪之風俗通參天太山之高參天入雲去之百里不見埵塊論衡更代東岳所以謂之岱者代謝之義陽春用事除故生新萬物更生相代之道故岱為名也三禮義宗天孫太山一曰天孫言為天帝孫也主召人魂東方萬物始成故知人生命之長短慱物志封禪王者受命必封禪封者增高也禪者廣厚也皆刻石紀號著已之功績以自劾也天以高為尊地以厚為德故增泰山之高以示報天禪梁甫之址以報地白虎通封泰山告大平升中和之氣於天祭土為封謂負於土泰山為壇而祭也項威漢書注夫東方者萬物之所始山嶽者靈氣之所宅故求之物本必於其始取其所通必於所宅崇其壇場則謂之封明其代興則謂之禪然則封禪者王者開務之大禮也袁宏漢紀神府泰山多芝草玉石下有洞天周廻三千里鬼神之府福地記天門盤道屈曲而上凡五十餘盤經小天門大天門仰視天門如從穴中視天窗矣自下至古封禪處凡四十里山頂西巖為仙人石閭東巖為介丘黃河去泰山二百餘里於祠所瞻黃河如帶若在山阯泰山記日觀東南巖名日觀日觀者雞一鳴時見日始欲出長三丈所又東南名秦觀秦觀者望見長安吳觀者望見會稽周觀者望見齊也西地有石室壇以南有玉盤中有玉龜山南脅神泉飲之極清美利人封禪記神房泰山之中有神房阿閣帝王錄尸子易姓而封易姓而王封為泰山禪於梁父者七十有二代其有形兆垠堮勒石凡千八百餘處莊子古者封泰山禪梁父者七十二家而夷吾所記者十有二焉管子介丘司馬相如禪封書曰周躍魚隕杭休之以燎微夫斯之為符也以登介丘不亦恧乎漢書鄭祀左傳鄭伯請釋太山之祀而祀周公以太山之祊易許田注鄭有助祭太山湯木邑在祊隱公望吳顏淵與孔子俱上魯太山孔子東南望吳閶門外有繫白馬引顏淵指以示之曰若見吳閶門乎顏淵曰見之孔子曰門外何有曰有如練係之狀孔子撫其目而止之因與俱下下而顏淵髮白齒落因以病死論衡五大夫秦始皇望祭山川遂上太山下風雨暴至因封其樹為五大夫史記始皇休于松下因封為五大夫漢官儀小天門秦時五大夫松見在太山記玉策古封秦山禪梁甫舊說岱宗上有金篋玉策能知人年脩知漢武帝探策得十八因倒讀曰八十其後果壽長八十風俗通仙人閭漢書曰武帝封泰山禪石閭應邵注曰石閭在泰山下南方土人言仙人閭起雲漢武帝封泰山白雲起封中史記求仙武帝欲求神仙以扶方者言黃帝由封禪而後仙於是欲封禪封禪不常時人莫知後志木甲天門東上一里餘得木甲木甲者武帝時神也上神枕泰山下老父者失其姓名武帝巡狩見老父鋤於道間頭上白光高數丈仙傳稷丘君泰山道士稷丘君武帝時以道術受賜後上東巡泰山稷丘君擁琴來拜武帝曰陛下勿上也必傷足上必欲上及上數里左右足指果折乃止列仙傳金床玉几馬明者齊國臨淄人也本姓和字君賢為縣吏捕賊為所傷當時殆死良久忽於道間見一女以肘後管中一丸藥大如小豆與明服之於是即愈血絕瘡合隨神女往岱中室中上下懸絕重巖深隱去地千餘丈其中金床玉几乃人跡所不能至上雲氣成宮闕光武封山居亭百官布野比日山上雲氣成宮闕百官並見之二十一日夕牲時白氣廣一丈東南極望致濃厚時天清和無雲瑞命篇岱嶽之瑞以日為應也事畢皇帝再拜群臣稱萬歲音動山谷有氣屬天遙望不見山顛山顛人在氣中不知也封禪儀致書天帝臨淄蔡支曾至岱中山下見一官儀衛甚嚴謂曰掾為我致書於外孫也吏曰外孫為誰曰吾太山神也外孫天帝也吏驚出門乘馬所之有頃忽達天帝座太微宮殿支致書訖帝命坐賜酒食仍勞問之列異傳致書河伯搜神記後漢胡母班曾至太山之側為太山府君所召令致書於女婿河伯處云至河中流扣舟呼青衣當自有取書者果得達復為河伯致書府君云蜀志云班王匡之妹夫也石金處士張忠隱于泰山岩棲谷飲脩道養之法鑿石為釜泰山人于今法之前秦錄府君高祖將封東嶽而天久霖雨帝疑矣使劉仁軌問華山道士李播為奏玉京天帝播云待問泰山府君遂令呼之良久府君至拜謁甚恭播云唐皇帝欲封禪如何對曰合封後六十年又合一封播揖之而去時仁軌在播側立見府君屢顧之播又呼廻曰此唐宰相不識府君無宜見怪既出謂仁軌曰府君薄怪相公不拜令左右錄此人名所以呼廻處分耳仁軌惶汗久之播曰處分了當無苦也其後帝遂封禪廣異記播李淳風父也皇后為亞獻唐高宗登封太山祝帝祇于社首皇帝為亞獻越國太妃燕氏為終獻百僚或竊笑之詔名封祀壇為舞鶴臺介丘壇為萬歲臺降禪壇為景雲臺以紀當時所見之瑞舊唐書天齊王開元十三年冬玄宗登封太山登封之夕凝氣昏晦迅風激烈玄宗出齋宮露立以請及明清霽旛旗不搖事畢至山下日又抱戴明耀五色千官稱賀其日大赦以靈岳昭感封太山神為天齊王元和郡國志來蘇頓玄宗東封車駕至岳西來蘇頓有大風從東北來自午至夕裂幕折柱眾恐張說倡言曰此必是海神來迎也上三宮岱宗之洞名三宮空洞之天茅君內傳太山名蓬玄空峒之天即太昊為青帝治東嶽主萬物發生考校死魂鬼神之所歷代帝王報功封禪之岳上應奎婁之精下鎮魯地之分野洞淵集鬼帥東岳太山君領群神五千九百人主治死生百鬼之主帥也血食廟祀所宗者也世俗所奉鬼祠邪精之神而死者皆歸太山受罪考焉金雞周易是謀類曰太山失金雞鄭玄注曰金雞太山之精無螫虫泰山於所經諸山最高而岑崿軒舉陵跨眾阜霞雲草木藹然靈異苑囿神奇故無螫虫猛獸從征記奉高泰山東岳也瀛博二縣共界漢武封禪割此縣以供祀太山故曰奉高三十里有延陵兒塜丘淵之齊記嶕嶢日月之徑不千里則不能燭六合耀八紘太山之高不嶕嶢則不能浡滃雲而散歊烝客難厪附楊喬曰猶塵附太山露集滄海雖無補益誠款至情猶不敢嘿也謝承書賣藥崔文子泰山人好黃老術潛居山下作黃丸賣藥有疫氣者飲藥即愈列仙傳梁甫太山在左亢父在右亢父知生梁甫知死王者封太山禪梁父開山圖太白降翼鶉沈以負西海其神主於華山太白位焉華山西岳華山少陰用事萬物生華故曰華山白虎通山負有池生千葉蓮花服之羽化因曰華山華山記二華西京賦綴以二華山海經太華之山削成而四方其高五千仞其廣千里小華之山其陽多㻬琈之玉注少華也神開華山對河東首陽山黃河流於二山之間古語云此本一山當河河水過之而曲行河神巨靈以手擘聞其上以蹈足離其下中分為兩以通河流今岳上有指掌之形首陽山下足跡亦存焉西京賦注有巨靈胡者徧得神元之道能造山川出江河開山圖河靈矍踼掌華蹈襄揚雄河東賦雍州鄠縣南繫頭山者其山本舟人係船其頂故以名焉昔太乙未分山海太行王屋白鹿河水停于此川號為山海及巨靈大人秦供海者患水浩蕩以左掌托太華右足踏中條太一為之裂河通地出山遂高顯張華賦云巨靈贔負高掌遠蹠以流河曲是也法苑珠林四合華山記曰華山高嵓四合重嶺秀起上有石池北有石鼓父老相傳云嘗有聞其鳴者二岑華山有二岑直上數千仞自下小岑疊秀迄于嶺表有如削成述征記三峰山上有三峰直上晴霽可觀謂蓮花毛女檜也山記二泉華山頂上方七里有靈泉二所一名蒲池一名太上泉上天井華山中路名天井纔容人行迂迴頓曲而上可高六丈餘山上有微涓細水流入井內亦不沾人出井望空視月如在室窺窗水經注蓮花峰上有三峰上接三光中有石池二十八所上應二十八宿青松綠竹叢生高岡白雲翠靄旋於幽阜懷蘊金玉蓄藏風雷為大帝之別宮迺神仙之窟宅也一稱太上山昭文館記敦物華山古文之敦物山也水經注玉女華山上有明星玉女持玉漿得上服之即成仙道險僻不通詩含神霧明星玉女者居華山服玉漿白日昇天山頂石龜其廣數畝高三仞其側有梯磴遠皆見玉女祠前有五石臼號曰玉女洗頭盆其中水色碧綠澄徹雨不加溢旱不減耗祠內有玉女馬一匹焉集僊錄其馬神靈異常夜聞嘶噉之聲頂上隱者常見之山志柏箭秦昭王令工施鉤梯而上華山以松柏之心為博箭長八尺棊長八寸而勒之曰昭王嘗與天神博於此韓子遺璧秦始皇三十六年鄭客從關東來至華陰望見素車白馬從山上下知其非人止而待之遂至持壁與鄭客曰為我遺鎬池君明年祖龍死史記毛女毛女者在華陰山中山客獵師世世見之躰生毛自言秦始皇宮人列仙傳石榻脩羊公魏人也在華陰山上石室中有懸石榻臥其上石盡穿䧟略不食時取黃精食之後以道干景帝帝問公有何能公不荅即化石也題其背云脩羊公謝天子後置石羊於通靈臺羊復去不知所之上集靈宮華山下有集靈宮武帝欲懷集僊者故名殿為存仙門為望仙桓譚仙賦序有神馬自華山出帝令置內棧馬不久留令人尋之見在此山谷中石龕下故名藏馬谷藏馬龕東北澗中石上馬跡尚存焉山志駕鹿衛叔卿常乘雲駕白鹿見漢武帝將臣之叔卿不言而去帝悔求得其子度世令追其父度世登華岳見其父與數人博於石上勑度世令還神仙傳騎龍呼子先者漢中關下卜師壽百餘歲臨去呼酒家嫗急裝我與汝俱去夜有仙人持二茅狗來呼子先子先持一與嫗嫗得而俱騎騎乃龍也上華陰山嘗於山上大呼言子先酒母在此列仙傳金液馬明生從安期先生受金液神丹方乃入華陰山合金液不樂升天但服半劑為地仙上玉版石季龍使人採藥下華山得玉版前燕錄捫蝨王猛隱華山桓溫入關猛被褐而詣之一面說當代之事捫蝨而言旁若無人上雲臺峰嶽東北有雲臺峰其山兩峰崢嶸四面懸絕上冠景雲下通地脈嶷然獨秀有雲臺下有穴昔有人入此穴出東方山行云經黃河底上聞流水之聲周武帝時有道士焦道廣獨居此峰辟粒餐霞常有三青鳥報未然之事周武帝親詣山庭臨軒問道因而谷口置雲臺觀後弟子洪仙等見道廣乘一物如麟往而不返矣東南有神土巖道廣精思所感欲構房廊石上湧出神土用盡復生于今尚然壁中有仙油碽道廣每設齋醮天降油於此碽自道廣乘麟之後此油不復見矣山志素靈宮馬周者華山素靈宮仙官也唐氏將受命太上敕之下佐於國而沈湎於酒汨沒風塵間二十年袁天綱相其將死教之隨騎牛老叟入曰叟顧見之謂曰汝本素靈宮仙官今太華仙王使人召汝即引入宮闕至簾前有宣言責之者使人送之別院中視其門則姓名在焉忽有五人服五方之衣立於前曰我皆先生五臟之神也先生酣酒流蕩濁辱於身我等久歸此矣但閉目將復於神室也周瞑目頃之忽覺心智明悟併憶前事二十餘年若旬日之間耳貞觀中累居大任一旦群仙降其室曰佐國功成可以退矣太乙徵命無復留也翌日無疾而終仙傳拾遺祝夢裴寂初貧無以自業每徒步詣京師經華嶽廟祭而祝曰窮困至此敢脩誠謁神之有靈鑒其運命若富貴可期當降吉夢再拜而去夜夢白頭翁謂寂曰卿年三十已後方可得志終當位極人臣耳舊唐神告李靖始困於貧賤因過華山廟訴於神且請告以官位所至辭色抗厲觀者異之佇立良久乃去出廟門百許步聞後大聲曰李僕射好去顧之不見人後竟至端揆國史補肖華司農卿趙履溫為安樂公主繕治累石肖華山隥彴橫斜回淵九折以石瀵水唐書金天王玄宗乙酉歲生以華岳當本命先天二年七月正位八月癸丑封華岳神為金天王舊志嶽神迎謁車駕次華陰上嶽神見數里迎謁遂召諸巫問神安在獨老巫阿馬婆奏云在路左朱紫衣迎候陛下上顧笑之上至廟見神橐鞬俯伏庭東南大柏樹下又召阿馬婆問之對如上見上加敬禮仍自書製碑文以寵異之其碑五十餘尺闊丈餘厚四尺天下碑莫比也傳信記詞云太華山者踞中土西偏當七官正位左抱桃林之塞右產藍玉之田諒少昊之下都即蓐收之別館也軒帝遊焉以會眾神虞帝柴焉以觀群后下有方士真人金鼎石室上有明星玉女仙草瑤池文粹甕肚峰華嶽雲臺觀中方之上有山崛起半甕之狀名曰甕肚峰上賞望嘉其高逈欲於峰腹大鑿開元二字填以白石令百餘里望見諫官上言乃止傳信記生金李適之嘗與李林甫爭權不協林甫陰賊好諛謂適之曰華山生金采之可以富國顧上未之知適之性踈信其言他日從容為帝道之帝喜以問林甫對曰臣知之舊矣顧華山陛下本命王氣之舍不可以穿治故不敢以聞帝以林甫為愛己而薄適之不親唐書七日上計趙郡李湜以開元年謁華岳廟過三夫人院忽見神女悉是生人邀入寶帳中迭與結歡臨訣謂湜曰每年七月七日至十二日岳神當上計於天至時相迎無宜辭讓今者相見亦是其時故得盡歡爾自爾七年每與之會問以官云合進士及第終小縣令皆如其言廣異記致書北海開元初有三衛自京還青州至華嶽廟前見一婦人容色慘悴曰已非人華嶽第三新婦夫壻極惡家在北海三年無書信聞君遠還欲以尺書仰累海池上第二樹但扣之當有應者言訖訣去及至北海如言送書讀書大怒乃傅教西伐華山命左右取絹二疋贈使者三衛後至華陰復遇前婦人拜謝曰三郎怒君達書將兵於潼關相害且可還京不久大駕東幸鬼神懼鼓車君若坐於鼓車則無慮也後數日玄宗幸洛三衛隨鼓車出關廣異記登華山韓文公登華山之巔顧視其窮極幽險心悸目眩不能下發狂號哭投書於家人別華陰令百計取之方能下國史補登蓮華峰王玄仲欲登蓮華峰約寺僧到峰頂當起煙為信翌日持火而登僧候之數日果有煙起留二旬乃復下僧問之云峰頂有池菡萏盛開可愛其中又有破銕舟存焉三水小牘拜山東夷有識山者徧拜五嶽一拜而退惟入望關華山自關西門拜禮至山下仰望七日嘆咤而去謂京師衣冠文物之盛由此而致語林訊嶽靈樂坤舊名冲累舉不第元和十二年罷舉東歸至華陰夜禱嶽廟以卜進退之計中夜忽夢一青綬人檢簿書來報云來年有樂坤名已到冥簿不見樂冲也冲遂改為坤來年如其說春闈後經嶽折謝又祝官位主簿夢中稱官歷四資郡守而已乃終於郢州雲溪友議上元二年更華山曰太山寶應元年復故名地理志太極總仙華山名太極總仙之天即少昊為白帝治西岳上應井鬼之精下鎮秦地之分野洞天記熒感星紀鶉尾以負南海其神主乎衡山熒惑位焉寶洞南岳衡山朱陵之靈臺太虛之寶洞上承冥宿銓德鈞物故名衡山下踞離宮攝位火鄉故號南岳赤帝館其嶺祝融宅其陽威神堂堂蔭映峨峨是以宅藪神靈室宇仙羅南岳記宿當軫翼度應機衡故曰衡山山有錦石斐然成文湘中記岣嶁衡山俗名岣嶁山海注湘中記岣嶁山有玉牒禹案其文以治水上有禹碑韓愈詩岣嶁山尖神禹碑宇青石赤形墓奇灊霍為副南岳周廻八百里回雁為首麓岳為足南岳記衡山一峰極高雁不能過遇春北歸故名迴雁或曰峰勢如鴈之回故名地記杜荀鶴詩猿到夜深啼嶽麓雁知春信別衡陽五峰衡山軒翔聳拔九千餘丈尊卑差次七十二峰巖洞溪澗泉石之勝交錯於中又有數十洞十五巖三十八泉二十五溪九池九潭六源八洞九井三穿三漏此最著者七十二峰最大者五芙蓉紫蓋石廩天柱祝融而祝融為最高長沙志三峰衡山有三峰其一名紫蓋天景明徹有一雙白鶴徊翔其上一峰名石囷下有石室中聞常諷誦聲一峰名芙蓉峰最為竦桀自非清霽素朝不可望見峰上有泉飛泒如一幅絹分映青林直注山下九向衡山九疑皆有舜廟遙望衡山如陣雲淞湘千里九向九背乃不復見湘中記石囷劉驎之好遊山澤採藥至衡山深入志返見有一澗水水南有二石囷一開一閉水深不可過欲還失道遇伐弓人問途僅得還家或說囷中皆仙靈方藥驎之欲更尋終不復知處晉書執筆湘東姚祖太元末為郡吏經衡山望巖下有數年少並執筆作書祖謂是行侶休息乃枉道過之未至百許步少年相與翻然飛颺異苑憩輿姑洗之旬始暨於衡岳於是假足輕輿宵言載馳憩輿素石映濯水湄仰瞻翠摽邈爾天際身凌太清獨交霞景桓玄遊山序詩執書初有採藥衡山見一老翁四五年少對坐執書荊州記結宇宗炳尋名山西陟荊巫南登衡岳因結宇衡山欲懷尚平之志宋書異人授術申太芝元之去俗脩道嘗登南岳遇異人授金丹火龍之術遂能乘虛神遊隱顯出入不可測天寶初奉詔祭羅浮訪尋朱明洞得之道遇異人告以九疑山舊有天樂一部歲久化五野猪郡人捕之又化五古器太芝往來亦訪得之扣之音律相和謂其徒曰此必有異後二十年當有應者及安祿山反形腯如豕俗謂猪龍嘗竊棃園樂部於凝碧池上奏之時謂讖驗云仙傳願隱崔圓李輔國以李泌為肅宗所親信疾之泌畏禍願隱衡山有詔給三品祿賜隱士服為治室廬唐傳泌於衡嶽寺讀書懶殘所驚曰非凡人也中夜潛往謁焉懶殘命坐發火出芋以啗之謂泌曰慎勿多言領取十年宰相泌拜而退後居相位薨其月中使林遠於藍關逆旅遇泌單騎常服言暫往衡山話三朝之舊慘然久之而別遠到長安方聞其薨鄴侯家傳游岳祠杜甫大曆中出瞿唐下江陵泝沅湘以登衡山因客耒陽岳祠唐書仙山李白送林公遊衡岳江南之仙山黃鶴之爽氣又登祝融之峰巒望長沙之煙火為宗五岳於中州衡山最遠南方之山巍然高而大者以百數獨衡為宗最遠而獨為宗其神必靈廖師郴民而學於衡山送廖道士序火維韓愈衡廟詩火維地荒足妖怪陰氣晦昧無清風潛心默禱若有應豈非正直能感通湏臾靜掃眾峰出仰見突兀撐青空紫蓋連延接天柱石廩騰擲堆祝融東坡潮州廟碑云公之精誠能開衡山之雲太虛天衡山洞名朱陵太虛之天即神農為赤帝治南岳者昔上帝降玉冊寶印賜注生真君永鎮靈岳即吾皇比壽之山上應翼軫璣衡之精故云衡山下鎮楚地之分野泂淵集鶴舞衡山有懸泉滴瀝嵓間聲泠泠如絃有白鶴迴翔其上如舞湘中記灊霍為副衡山者五岳之南岳也其來尚矣至於軒轅乃以灊霍之山為副焉故爾雅云霍山為南岳蓋因其副焉至漢武南巡又以衡山蔓遠讖記皆以衡山為岳乃徙南岳之祭于廬江灊山此亦承軒轅副義也南岳記天柱天柱謂之霍山廣雅其山上侵神氣下固窮泉開山圖養物南岳謂之霍霍者護也言陽氣用事盛夏之日護養萬物故以為稱三禮義宗雲師雨虎霍山南嶽有雲師雨虎注雲師如蚕長六寸似兔雨虎如蛹長七八寸似蛭雲雨之時出在石上肉甘可以熟而食之開山圖神水武帝徙南岳之祭於廬江潛霍山之上無水廟有四鑊可受四十斛至時祭水輒自滿用之足了事畢即空塵土樹葉莫之汙也積五十歲歲作四祭後但作三祭一鑊自敗搜神記出鐘廬江霍山數年來嘗有鐘聲十二潛發重壤帝將征關洛山崩有六鐘自出制度合式聲中律呂上有古文書一百六十字宋書司命府霍山下有洞臺方三百里司命君之府也黃庭內景經辰星大梁柝木以負北海其神主於常山星辰位焉并鎮周官并州其鎮山曰恒山玄岳恒山謂之玄岳水經昴畢散昴畢間為天街散為冀州分為趙國立為常山其下有祠有安天王元命苞五名北岳有五別名一曰蘭臺府二曰列女宮三曰華陽臺四曰紫微宮五曰太乙宮或云大茂山括地志常山恒者常也萬物伏藏于北方有常也風俗通北方為恒恒者常也陰終陽始其道常久故曰常山白虎通茂丘茂山也蓋恒岳之別名泒水從西來甚大至茂山之西沈伏于地過山而復出其大如初世言避恒岳之靈陽固北都賦四種五穫其山北臨代南俯趙東接河海之間早生而晚殺五穀之所蕃熟四種五穫焉管子太玄之泉恒山上有太玄之泉神草十九種服之可度世五岳圖天神貴客崔嵬北嶽天神貴客溫仁正直主布恩德易林安王石舜時十有一月巡狩北岳詣大茂山谷值大雪不能進而遙祭之忽廟之右飛一石冉冉而墜帝前名曰安王石又五載巡狩其石飛于曲陽建廟祀之蓬蔂昌容者常山道士自稱殷女食蓬蔂根往來山下見者二百餘年顏色如二十許人列仙傳趙符趙簡子告諸子曰吾藏寶符于常山上先得者賞諸子馳之常山上求無所得無恤還曰已得符矣從常山上臨代代可取也簡子知其賢以為太子史記燕王慕容儁壽光二年常山寺大樹根下得璧七十珪七十三光色精奇有異常玉儁以為神岳之命以太牢祠之前燕錄置祀禮神道武立廟於其上置大祀九十人歲時所禱水旱至文成帝東巡親禮其神焉後魏書陰岳邁歷恒巒路鄰陰岳惟靈作鎮出納炎水帝道資功坤儀憑德魏孝文祭文靈山惟靈山之秀峙亘朔野而摽奇絕璧千尋孤峰萬仞桂華侵月松羅挂雲幽澗冬暄飛泉夏冷寶符臨代邦之美靈蛇表陣勢之奇唐太宗祭文乾門坤軸包括綿長經綸中外外夷有四昴宿主胡則延袤以限之中郡有五寶符在代則高襄以臨之其頂也上扶乾門黑帝之宮觀其足也下捺坤軸玄神之都府文粹張嘉貞碑鎮岳定州曲陽本恒陽元和十五年更名是年又更恒岳曰鎮岳有岳祠地理志總玄天恒山洞名太一總玄之天顓頊為黑帝治北岳上應畢昴之精下鎮燕地之分野主五穀蕃熟之司五岳神名太山君神姓圓名常龍衡山君神姓丹名靈峙華山君神姓浩名鬱狩恒山君神姓登名僧嵩山君神姓壽名逸群呼之令不人病龍魚河圖姓名東岳姓玄丘名目陸南嶽姓爛名洋光西嶽姓浩嶽名元倉北嶽姓伏名通萌中嶽姓角名普生七籤佐命太山君羅浮括蒼佐命衡山君黃帝所命霍山潛山為儲嵩高山君少室武當佐命華山君地胏女几佐命恒山君河逢抱犢佐命五岳圖序將軍太山將軍姓唐名臣霍山姓朱名丹華陰姓鄒名尚恒山姓莫名惠嵩高山姓石名玄恒存之却百邪龍魚河圖廣乘山廣乘山者天之東岳也在東海之中為五岳發生之首上有碧霞之闕瓊樹寒林紫雀翠鸞碧藕白橘莫可名狀即青帝天君靈威仰仙官統兵吏萬眾鎮此山上主歲星之精居九氣青天之內矣長離山長離山者天之南岳也在南海之中上有朱宮絳闕赤室丹房朱草紫芝霞膏金醴莫可名狀應天下初得道神仙皆詣此宮營形浴質肖陰煉陽為長生久視之道即赤帝天君赤熛怒統領仙官神吏萬眾鎮此山上主熒惑之精居二氣丹天之內矣麗農山麗農山者天之西岳也在西海之中上有白華之闕三素之城玉泉之宮瑤林瑞獸莫可名狀即白帝天君白招拒統領仙官神吏鎮此山上主太白之精居七氣素天之內矣廣野山廣野山者天之地岳也在北海弱水之中形如崑崙酆都羅山合為陰氣之主上多瓊樓寶闕金液龍芝莫可名狀即黑帝天君叶光紀統理仙官神吏鎮此山上主辰星之精五氣玄天之內矣崑崙山崑崙山者天之中岳也在八海之間上當天心形如偃蓋上廣下狹三成而上與天齊日月黃赤二道交會其上三光行焉東曰崑崙西曰玄圃北曰浪苑南積石山大石山水泉山北戶山四面各一萬里上有瓊華之闕光碧之堂瑤池翠水即西王母統眾仙居焉海中四岳為枝幹十洲四島八海大川圍繞其側絕頂之上有金臺五所玉樓十二金城千里地生金根之樹瓊柯瑤林紫雀翠鸞碧桃白李百寶妙岩莫可紀述即黃帝天君含樞紐統領天大聖眾鎮此山皆與五岳名山相連常有神仙往來生校生籍上主鎮星之精居於中元一氣天中焉其海外之五岳即五氣之宗祖矣雲笈七籤土精土精於石石氣之核也氣之生石猶人經絡之生爪牙也物理論地骨地以石為之骨慱物志陰精補陽周易艮為山為小石石陰中之陽陽中之陰陰精補陽故曰含石石之為言託也託立法也春秋說題辭山體山體曰石石硌硌也堅捍硌也山多大石曰礐礐學也大石之形學學然山多小石曰磝磝堯也每石堯堯獨處而出見也礫小石也什名磊眾石也碭文石也說文琅玕石似珠也經注碔砆石似玉也廣雅水沫為浮石抱朴子石解散曰泐周禮嘉肺石周禮曰大司寇以嘉石平罷民有罪者坐諸嘉石以肺石達窮民凡煢獨老幼之欲復於上而未達者立於肺石注曰嘉石文石也肺石赤石也啟母石禹娶塗山治鴻水通轘轅山化為熊謂塗山氏曰欲餉聞鼓聲乃來禹跳石誤中鼓塗山氏往見禹方作熊慚而去至嵩高山下化為石方生啟禹曰歸我子石破北方而生啟淮南子禹產於䃂石啟生於石隋巢子雨石武王伐殷得二大夫而問之曰殷國將亡亦有妖乎其一人對曰殷國常雨血雨灰雨石小者如雞子大者如箕武王曰大哉妖也六韜采石天子升于采山之山於是取采石鑄以成器穆天子傳石言石言於晉魏榆晉侯問於師曠曰石何故言對曰石不能言或憑焉不然民聽濫也抑臣又問之曰作事不時怨讟動於民則有非言之物而言今宮室之侈民力雕盡怨讟並作莫保其性石言不亦宜乎左昭三說苑晉平公築虒祁之室石有言者平公問云云隕石左傳曰隕石於宋五隕星也注曰但直言星則嫌星使石隕故言隕星史記始皇三十六年星墜于東郡至地為石或刻其文曰始皇死而地分始皇盡誅石旁人燔銷其石煮石卭䟽者周封史也能行氣鍊形煮石髓而服之謂之石鍾乳至數百年往來入太室山中有臥石床枕焉列仙傳跪石范蠡吠于狗竇文種聞而拜之鮑龍跪石而吟仲尼為之下車聖賢觀察不待而功而知之也劉子知人燕石宋之愚人得燕石於吾臺之東歸而藏之以為大寶周客聞而觀焉主人端冕衣服以發寶華匱十重緹市十襲客見之盧胡而笑曰此燕石也與瓦甓不異主人大怒藏之愈固闞子山海經燕山多嬰石注云似玉有符彩嬰帶所謂燕石者石行周赧王二十年齊東有二石高三丈餘相從而行如海數百步春秋後傳五婦梓桐縣有五婦山昔秦王獻五美女於蜀王蜀遺五丁迎之至此五女見大蛇入山室中五丁引蛇大呼山崩五女上士化為石蜀記黃石張良見老人出一篇書讀是則為王者師後十三年見我濟北穀城山下黃石即我也良後果得黃石寶而祠之及死并葬黃公伏臈祀之史紀孟津河東去鄴城五里有濟北郡穀城縣有穀城山是黃石公所葬處有人登此山見崩土中有文石石文鮮明虎使採取以治宮殿又免穀城令不奏聞故也鄴中記為磬廣漢有青石山九州要記云此山音石天下無加于此可為磬李膺益州記云昔巴蜀爭界歷歲不決漢高八年一朝密霧山自裂自上至下開數尺若引繩焉於是州界始判巴蜀之民懼天責罰乃息所爭因為立祠民將採石必先祀之寰宇記燕銜竇太后在家嘗有白燕銜石大如指墮后績筐中后取石割為二中有文曰母天后地乃合之遂不復開後為皇后常并置璽櫝中號曰天璽也西京雜記馬肝元鼎中條支國貢馬肝石以和丸轉丹髮白者以此石拂之應手而黑洞冥記潛英李夫人死武帝常思夢一見之欲李少君言能致其神啟帝曰黑海北對都之野出潛英之石其色青輕如毛羽寒盛則石溫夏盛則石涼刻為人像神悟不異真人乃求得之命工刻作夫人形置之幙裏宛若生時帝大悅欲近之少君曰此石毒可望不可迫也拾遺記碣石地理志曰大碣石山在右北平驪城縣西南武帝嘗登之以望巨海而勒其石於此今枕海有石如甬通數十里當山頂有大石如柱形往往而見丘於巨海之中潮水大至及潮波退不動不沒不知深淺世名之天橋柱也韋昭亦指此以為碣石也水經注化石臨賀溤乘縣東五里有故縣廟相傳淮南王安漢被誅其子奔迸來至一夜忽化為石人當縣門而立百姓怪而觀之其迫察者手足無不瘡爛荊州記石立昭帝元鳳時太山萊蕪山南有大石自立三石為足石立處有白鳥數千集其旁眭孟以為石陰類下民象太山岱宗之嶽王者易姓告伐之處當有庶人為天子者孟坐伏誅五行記哀帝時無鹽危山土自起覆草如馳道伏又報山石轉立東平王雲及后謁自之石所祭治石象瓠山立石束倍草并祠之知災異者高尚云石立宣帝起之表也息夫躬告之王自殺后謁棄市本傳支機成都卜肆支機石即海客自天河所得織女令問嚴君平者也太尉燉煌公好奇命鐫取一片欲為器用鐫刻之際工忽風瞀墜于石側者三公知其靈遂至止今則亦玉焉靈驗記互見天吞文石五鹿充宗授學於彌成子彌成子嘗遇人以文石如卵授之成子吞之遂聰悟後成子病吐出此石授亢宗吞之又為名學西京雜記孝子石隗相叔通𤏡道人也性至孝母每食欲江中正流水相冬夏汲之一朝有橫石生正流中叔通因之以汲江中有石號孝子石蜀記相哀帝世舉孝廉平帝時為郎華陽國志燒石虞詡為武都太守下辯東三十餘里有峽中當泉水生大石障塞水流每至春夏輒溢沒秋稼壞敗營郭詡乃使人燒石以水灌之石皆坼裂因鐫去石遂無泛溺之患也續書李翕字伯都為武都守郡西狹中道危難阻峻緣崖俾閣两山壁立下有不測之谿数有顛覆靌墜之害君勑衡官有秩等因常繇道鐉燒破析刻臽崔嵬減高就埤可以夜涉民歌德惠刻石頌之金石錄陣圖沔陽城泝漢上十五里有諸葛武侯所鎮在漢水南背山向水門前累石以為鎮水至壞其行列水去輒復故梁川記磨石魏文在東宮宴諸文學使甄夫人出拜劉禎仰觀之武帝怒罰令徒作后帝至尚方閱視禎坐磨石不動太祖問石如何性禎曰石出荊山懸巖之巔內含卞氏之珍磨之不加瑩雕之不增文武帝曰名豈虛哉文士傳石英明帝增崇宮殿雕鏤觀閣鑿太行之石英採穀城之文石起景陽山於芳林園建昭陽殿於太極之北魏志今作洛陽宮殿取白石工人鑽山索異石鑿石求雲母勞役之事莫過於此也魏名臣奏連理太山下有連理文石高十二丈狀如柏樹其文彪發似人雕鏤自下及上皆合而中開廣六尺望若真樹也父老云當秦末二石相去百餘步蕪沒無有蹊徑及明帝之始稍覺相近如雙闕土石陰類魏為土德斯為靈徵拾遺記討曹明帝青龍三年張掖郡氐池縣大柳谷口夜激波涌溢其聲如雷曉而有蒼石立水中白石畫之為馬牛等形其文曰大討曹帝惡其討也使鑿去為計以蒼石塞之宿昔而白石滿焉至晉初其文愈明焉象皆煥徹如玉焉漢晉春秋文石為瑞馮乘縣有秦山孫權僣稱尊號之時此山夜忽有聲如雷因發洞穴其間可六七里其中石有文采又有石柱石鼓石彈丸郡上言之權以為祥瑞荊州記文理成字鄱陽歷陽縣有石山臨水高百丈其三十丈所有土穿駢羅穿中色黃赤不與本體相似俗相傳謂之石印又云石印封發天下當太平下有祠屋巫祝言石印神有三郎時歷陽長表上言石印發皓遣使以太牢祭歷山巫言石印三郎說天下方太平使者作高梯上看印文詐以朱書作二十字石云楚九州渚吳九州都揚州士作天子四世治太平始還以啟皓皓大喜曰吳當為九州作都渚乎從大皇帝逮孤四世矣太平之主非孤復誰重遣使以印綬拜三郎為王江表傳石樹天璽元年臨海郡吏伍曜在海水際得石樹高二尺餘枝莖紫色詰曲傾靡有光采山海經所載王碧樹之類也宋志鬱林石陸績孫權初為鬱林太守罷秩而歸不載寶貨舟輕不可越海用巨石重之至姑蘇置其門人號鬱林石傳載石子介象字元則會稽人入山求神仙見谷有石子皆紫色大如雞子象取二枚見一美女被服五采象叩頭乞長生女曰急送汝于中物還着故處象送石還女授以還丹方一首神仙傳石髓嵇康遇邯鄲人王烈烈自言一百餘歲共入太行山得石髓飴即自服半餘半與康皆凝而為石室中見一卷素書呼吸康取輒不見臧榮緒晉書神仙五百年輒開其中石髓出得而服之壽與天相畢神仙經鳴石武帝時吳郡臨平岸崩出一石鼓打之無聲以問張華華曰可取蜀中桐材刻作魚形扣之則鳴於是如言扣之聲聞數十里異苑永康元年襄陽郡上鳴石似玉色青撞之聲聞七八里今零陵泉陵縣永正鄉有鳴石二所其一鼓狀如俗因名為石鼓山海注燃石豫章有石黃白色而理踈以水灌之便熱加鼎於上炊足以熱冷則灌之雷煥以問張華華曰燃石也出異物志祠石陳總遷殿中侍御史遣詣終南山請雨總先除小石祠唯存大石一所而祈之祈文曰峨峨大石佐岳通理含滋吐潤惠我四海王隱晉書文如竹葉江東太廟門北有石文如竹葉宋文帝元嘉中修廟所得陸澄以為晉武孝時郊禖石通典石來晉惠永寧中湖熟縣湖中有大石去渚二百步浮來登岸百姓驚觀或曰石來明年石冰入揚州丹陽記白點成宿張軌永嘉元年如姑臧送玄石白點如星成二十八宿前涼錄石笥豫章縣東鄉呂里山中有石笥歷代不能開吳猛遂得發之多有石牒古字弟子莫有曉者猛亦不言弟子數十人合力舉蓋不動如山猛亦平提若無重焉縣南山有石直立水中峻崿千仞猴猿不能致猛乃策梜升之令二弟子隨後忽若平路吳猛別傳石生日月初鄉里所居原丘地中石生日月馬勒鐵騎之象于時父老相者皆云此胡奇貌有大志其終不可量邑人厚遇之石勒別傳採石石季龍立河橋為雲昌津採石為中濟石無大小輒隨流用工五百餘萬不成季龍遣使致祭沈璧於河俄而所沈璧流于渚上地震水波騰上津所樓殿傾壞壓死者百餘人錄異記礪齒孫子荊謂王武子曰當枕流漱石玉臼石非可漱流非可枕孫曰枕流欲洗其耳漱石欲礪其齒晉書浮水上赫連勃勃時有青石大如馬頭浮水上逆流而行行人見而送人群臣咸賀以為石者沈物浮水者自出之義而上行荊吳入朝之象勃大悅前趙錄醉石陶淵明所居栗里有大石淵明嘗醉眠其上名曰醉石廬山記兆祥宋元嘉七年五月武陵洪水善德山崩兩石高丈餘如人雕刻精奇形備古制式占者云武陵出天子其時八月孝武始誕後封武陵王即帝位洽聞記錦石錦沙村傍山依壑素波澄映錦石舒文冠軍吳喜聞之而造焉鼓枻游泛彌旬忘返歎曰名山美石故不虛賞使人喪朱門之志新安記着符魏貞君五年張掖郡列言氐池縣大柳谷山大石有青質白章間成文字記國家祖宗之諱著受命歷數之符乃遣使圖寫其文群臣奏曰斯乃上靈降命國家無窮之徵也靈徵八風黑石太和中造太和殿于平成殿之東階下有一碑石亦是洛陽八風谷之緇也水經出血玉琴卒后墓門前有石人獅子子賢寒微賣與氾氏致牛破牛死氾氏就打破皆血出敦煌實錄靈石永明七年主書朱靈讓於浙江得靈石十人舉乃起在水深三尺而浮世祖親投于天淵池刻之試為佛像南齊志越王石虞愿為晉平太守海邊有越王石常隱霧雲相傳云清廉大守乃得見愿往觀清徹無隱蔽齊書胏石梁天監初詔于公車府謗木胏石傍各置一函有龍蛇方懸才高抱歎豪門陵賤若欲自申並可投胏石函五年詔曰朕昧旦齋居惟刑是恤三辟五聽寢興載懷故陳胏石于都街增官司于詔獄本紀到公石到溉居近淮水齋前山池有奇礓石長一丈六尺梁武戲與賭之并禮記一部溉並輸焉召即迎置華林園宴殿前移石之日都下傾城縱觀所謂到石公也南史梁書無礓字實舸江草自會稽丞除都官尚書將還贈遺一無所受依舊訂舫革並不納惟乘臺所給一舸舸艚偏欹不得安臥或謂革曰船既不平濟江甚險當移徙重物以迮輕艚革既無物乃于西陵岸取石十餘許以實之梁書三侯徐陵後堂豎美人山銘曰峰因五婦石是三候海錄三品臺城同泰寺前四石各高丈餘陳之三品石也楊樹形周宣帝大定永州得白石二年割而為兩段中有楊樹之形黃根紫葉廣五行記變玉隋相州刺史內陽公薛胄所居堂礎忽變為玉胄謂為善徵也設齋慶之釋靈裕云斯琉璃耳宜慎之戒之可禳之以福胄不從其言後矣楊諒起逆事有相緣乃流之邊裔追悔晚矣續高僧傳釣臺石大業七年二月初造釣臺之時多運石者將船兵丁困弊於役嗟歎之聲聞於道路時運石者將船至江東岸山下取石累構為釣臺之基忽有大石如牛十餘自山頂飛下直入船內如人安置船無傷損大業拾遺青石丹書唐齊王元吉于晉陽宮獲青石若龜形文有丹書四字曰李淵萬吉元吉遣使獻之文字映徹宛若龜形見者咸異焉高祖曰令水漬磨以驗之其字愈明於是內外畢賀高祖曰上天明命貺以萬吉宜以少牢祀石龜而酹送之廣德神異記禎石太宗以武德九年八月即位九月壬戌林州獻禎石隱起成文曰聖主某大吉子孫五千歲素質玄字篆隸相參冊府青質白文貞觀十七年八月涼州昌松縣鴻池谷有石青質白文成字太宗遣使祭之曰天有成命表瑞貞石文字昭然曆數惟永五行志鳴石顯慶四年漁人於江中網得一青石長四尺闊九寸其色光潤異於眾石懸而繫之鳴聲清越行者聞之莫不駐足都督滕王表送納瑞府豫章記漁人網得一石甚鳴擊之聲聞數十里道王為洪州刺史破之得劍一雙視其銘一有許旌陽字一有萬仞字遂有萬仞師出焉朝野僉載唐書道王元慶未為洪州蓋元嬰事誤盤石薛元超道衡孫也轉中書舍人省中有一盤石道衡為侍郎時嘗據而草制元超每見輒泫然流涕唐書偽石雍州永安縣人唐同泰于洛水中得瑞石一枚上有紫脈成文云聖母臨朝永昌帝業進之授五品果毅置永昌縣乃是將石鑿作字以紫石末和藥嵌之後并州文水縣于谷中得一石還如此有武興字改文水為武興縣自是往往作之后知其偽不得採用乃止國史補李嶠賀表云人稱同泰縣實永安姓氏將國號玄符土地與石文相應英華魏王武承嗣偽造瑞石文云舊唐云書石連理永昌年中台州司馬孟詵奏臨海水下馮義得石連理樹三株皆白石洽聞記瑞石樊文進瑞石武后暴石朝堂示百官馮元奏常云偽妄不可以示群臣后怒出為隴州刺史唐書赤心則天時有人於洛水中獲白石數點赤詣闕輒進諸宰相詰之對云此石赤心所以來進李昭德叱之曰此石赤心洛水中餘石豈能盡反耶左右皆笑上祝石中宗為天后所廢於房陵仰天而歎心祝之因拋一石於空中曰我復帝此石不落其石遂為樹枝勾掛至今尚存獨異志化麵玄宗時王倕奏武威郡番禾縣嘉瑞鄉天寶山周迴五六里石化為麵在近村閭及諸部落自今載正月以來取食甘美益人孫逖表云豈來麰之足方何雨粟之能喻英華太和四年八月太原節度使柳公綽奏雲蔚代三州山谷間石化為麵人取食之唐會要蹶石開元年李嗣業討勃律通道葱嶺有大石塞隘以足蹶之抵窮谷識者以為至誠所感云唐書落星石秘省內落星石薛稷畫鶴賀知章章書郎餘令畫鳳相傳號為四絕南部新書寶符開元末於弘農古函谷關得寶符白石赤文正成桑字識者解之云桑者四十八字也所以示聖上御歷數也及幸蜀之來歲四十八矣得之時天下歌之遂改年天寶開天傳信鐵鏵李齊物天寶初為陝州刺史開砥柱之險堅石中得古鐵犁鏵有平陸字因改河北縣為平陸縣上石魚開寶四年黔南上言江心有石魚見上有古記云廣德元年二月大江水退石魚見部民相傳豐稔之兆廬陵異物志涪州鑑湖上流有石刻雙魚皆三十六鱗一銜萱草一銜蓮花魚見則年豐山川異紀履石釋明瓚居南岳一日刺史祭岳脩道路極嚴忽中夜風雷一峰頺下其緣山磴道為大石所攔乃多用人牛推挽物力竭而石愈固瓚曰我始去之遂履石而動忽轉盤而下聲若震雷太守奉如神明唐高僧傳靈石僕固懷恩以叛入回紇沒其家入後宮大曆四年封其女為崇徽公主下降可汗道汾州以手掌托石壁遂有手痕今靈石有崇徽公主手痕碑廣川書跋墜石李師誨兄弟于衲僧處得落星石一片僧云蜀于路早行見星墜于前遂掘之得一片石如斷磬其石端有雕刻狻倪之首亦如磬有孔穿絛處尚光滑豈天上奏樂器毀而墜與此石流傳安邑李吉甫宅中尚書故實載石顏真卿晚年嘗載石以行礱而藏之遇事以書隨其所在留其所鐫石石走寶歷元年資州資陽縣山有大石忽然吼踴下山越澗却上坡可百步其石走時有鋤禾人見之各手執鋤趕至止所其石高二丈拋石太和初滄景節度李同捷叛王知興帥兵討之同捷遣能言者登城罵知興有一卒曰此可用拋石擊去其首乃具拋發一石正中其首隨石迸落軍中歡叫城上飛動知興賞之千金獨異記卯石常侍崔元亮在洛中嘗閒步涉岸得一石子大如鷄卵黑潤可愛玩之行一里劃然而破有鳥大如巧婦飛去酉陽雜俎遺石白居易東都所居履道里䟽沼種樹搆石樓香山鑿八節灘新唐弘農楊貞一與青石三方長平滑可以坐臥舊唐太和九年山客贈余盤石轉致履道里第時屬炎暑坐臥其上愛而銘之曰質凝雲白文拆煙碧長慶集天竺白樂天罷杭州得天竺石一華亭鶴二蘇州得太湖石五折腰菱俱置于里第池上舊唐掘石有字甘露事敗王璠舉家無少長皆死初璠在浙西繕城壕役人掘得方石上有十二字云山有石石有玉玉有瑕瑕即休璠視莫知其旨京口老人講之曰此石非尚書之吉兆也尚書祖名崟崟生礎是山有石也礎生尚書是石有玉也尚書之子名瑕休休絕也庸作吉徵果赤族舊書嘉石牛僧孺開成初留守東都治第洛陽之歸仁里多致嘉石美木與賓客相娛樂唐書太湖石奇章公嗜石其僚吏鎮守江湖者乃獻瑰納奇公于東第南墅列而致之游息之時與石為伍石有族聚太湖為甲羅浮天竺之徒次焉大有大小其數四等以甲乙丙丁品之每品有上中下各刻于石陰曰牛氏石甲之上丙之中乙之下百仞一峰千里一瞬此所以為公適意之用也長慶集蛀蚛有達僚差軍將於浙西買太湖石軍將申狀云前件石蛀蚛不堪買盧氏雜說禮星石贊皇公平泉庄有禮星石縱廣一丈長尺餘有文理成斗極象獅子石高二三尺孔竅千萬遞相通貫其狀宛如獅子首尾鼻眼皆具全賈氏談錄平石李德裕平泉庄去洛城三十里卉木臺榭若造仙府有虛檻前引泉水縈迴疏鑿像巴峽洞庭十二峰九派迄于海門江山景物之狀竹間行徑有平石以手摩之皆隱隱雲霞龍鳳草樹之形劇談錄醒酒石李德裕於平泉別墅採天下珍木怪石為園池之玩有醒酒石德裕尤所寶惜醉即踞之唐餘錄河南長春殿南有婆羅亭貯青石處世傳李德裕醒酒石以水之有林木自然之狀今謂之婆羅石河南記德裕平泉山居記曰鬻平泉者非吾子孫也以平泉一樹一石與人者非佳子弟也會昌一品集唐莊宗時張全義為四鎮節度有監軍嘗得平泉醒酒石德裕孫延古託全義復求之監軍忿然曰自黃巢亂後洛陽園宅無復能守豈獨平泉一石哉全義嘗在巢賊中以為譏已大怒奏笞殺之五代史平泉醒酒石昔為玉清昭應宮所取昭應焚蕩仁宗分其地賜濮潞潭越韓冀六王冀王之子丹陽郡王守節得其園地發土得巧石前後幾萬塊多奇塊異狀醒酒石居其一有紋繞刻字云韓王抱清輝閒庭目瀟灑塊然天地間自是孤生者長慶癸卯歲二月景盛題紹聖中輦歸禁中置宣和殿張右丞徵澹岩集平泉石李德裕平泉莊天下奇異珍怪靡不畢置日觀震澤巫嶺羅浮桂水嚴湍廬阜漏潭之石在焉台嶺八公之怪石巫峽嚴湍琅瑯臺之水布于清渠之側仙人跡鹿跡之石列于佛榻之前泰山石兗州從事所寄羅浮石番禺連帥所遺漏潭石魯客見遺釣石友人處求得者一品集又有思平泉似鹿石詩長石于季友為利州刺史時臨江有一寺寺前漁釣所聚有漁子下網舉之覺重壞網視之有一石如拳因乞寺僧置于佛殿中石遂長不已經年重四十斤張司封員外入蜀時親覩其事酉陽雜俎松風石會昌初夫餘國貢松風石方一丈瑩徹如玉其中有樹形若古松偃蓋颯颯焉而涼飊生於其間至盛夏上令置諸殿內稍稍秋氣颼颼即令撤去杜陽雜編松化石馬自然大中時永康縣東天寶觀觀有古枯松湘指之曰此松已三千餘年即化為石自後松果化為石忽大風雷震石倒側作數截楊發自廣州節度責授婺州刺史性尚奇異乃徙兩截就郡齋兩截致之龍興寺九松院各高六七尺徑三尺餘其石松皮鱗皴今猶存焉續仙傳陸龜蒙二遺詩序越之東陽多名山永康之地亦蟬聯其間中饒古松往往化而為石盤根大柯文理具析好事者攻而置人間以為耳目之異太山羊振文得枕材趙郡李中秀得琴薦皆茲石也咸以遺予以二遺之奇賦詩以謝松陵集得金釵夏侯孜為宣宗山陵使開貞陵鑿皇堂深及袤丈於堅石中得折金釵半股其長如掌餘尚銜石中工乃抉取以獻孜孜以寢園方近其事稍異因隱而不奏唐闕史碑忽自鳴華岳金天王廟玄宗御製碑廣明初其石忽自鳴隱隱然聲聞數里浹旬而後定明年巢寇犯闕其廟亦為賊火所爇隳其門觀賈氏談錄朱字唐虔州刺史王哲在平康里治第家人掘得地一石子朱書其上曰脩此不吉家人揩拭轉分明乃呈哲哲家意人惰于朱鍤自磨朱深若石脈哲甚惡之其月哲卒酉陽雜俎沒唐石乾寧二年駱全瓘李繼鵬反帝幸莎城鎮帝欲入南山谷中自固以谷有沒唐石惡之乃移石門鎮之佛宮新王重榮傳舊紀縮石天復中洪中霣石于越王山下昭仙觀前長七八尺圍三丈餘青碧如玉節度使劉威命羿入觀內設齋祈謝七日之內稍小長三尺數日石長尺餘今只有七八寸留在觀內歸異記化石會稽進士李眺偶拾得一小石青黑平正溫滑可玩用為書鎮焉偶有蠅集其上驅之不去視之已化為石求他虫試之隨亦化焉殼落堅重與石無異上陊石徐少郎司業少時游天台山歇於大樹陰巖上石盤欲陊空中語曰下有人石矻然架樹回身乃落震地堛然葆光錄異石蜀文谷嘗詣中書舍人劉光祚有道士劉雲出一白石圓如雞子其上有文彩隱出如畫乃是二童子持節引仙人眉目毛髮冠履衣帔纖悉皆具云於麻谷洞石穴中得之又有一客沈默亦出石闊一寸五分長二尺五分上隱出盤龍鱗介瓜甲無不周備云於巫峽山中得之野人閑話佛座武肅王錢鏐自幼嘗與鄉里兒童聚戲于樹陰石上指其樹石曰我貴賞爵而覆之建功臣精舍遂以其石為佛座焉吳越備史碎石如粉譚紫霄廬山僧於溪滸荊亭苦大石橫直累工不能平紫霄往見曰斯固易也因以指捻訣含水噀之命鎚其石應手如粉南唐活石海陵東臺聖果院有古井欄相傳南唐保大中造舊有綆迹深寸許今復生合而誌文亦漫滅莫辨疑活石云晏溪志李陽冰書縉雲三碑篆刻最細瘦世言此三碑皆活歲久漸生刻處幾合故細耳集古錄金蠶右千牛兵曹王文秉丹陽人世善刻石其祖嘗為浙西廉使裴璩采碑於積石之下得一自然員石如毬形式如礱斲乃重疊如殻相包斲之至盡其大如拳復破之中有一蠶如蠐螬蠕蠕能動人不能識因棄之數年浙西亂王出奔至下蜀與鄉人夜會語及青蚨還錢事佐中或云人欲求富莫如得石中金蠶畜之則寶貨自致矣問其形狀則石中蠐螬也稽神記龍精石丁謂有小山高才數寸蒼翠嵌空盛夏常設盆水置小山其中一日張晏有客掬水洒之須臾雲霧自竅中出有光如電細視之蜿蜒小龍如線掛雲霧中已而散繹蜿蜒亦莫知所之眾客驚謂曰異此龍精石也龍交海上流精于石南墅閑居錄見夢金陵有三大石甚古吳仲庶作守日夜夢三舉子求哀且曰若不垂祐明日當為煨燼矣公甚異之詰旦徧問僚屬莫能原其意既而視其牒見兵馬司狀申乞燒三醜石為灰供修造之用公遂悟敕寺僧愛護元祐中毛漸作漕欲移置廨舍掘之極深而石根不斷不能動遂罷楊公筆錄靈璧石政和間建艮壑異花奇石來自東南不可名狀忽靈璧縣貢一巨石高二十餘尺周圍稱是舟載至京師毀水門樓以入千夫羿之不動或啟于上云此神物也宜表異之裕陵親灑宸翰云慶雲萬態奇峰仍以金帶一條掛其上遂即可移省夫半頃刻至苑中揮塵錄盤固侯宣和艮嶽一石高四十丈名神運昭功朱勔自平江府回造巨艦載太湖大石一塊至京以千人羿進勔被賞建節石封盤固侯淮波雅志巨石隨流建炎三年鼎州巨石隨大水流下有字曰無為大道天知人情無為冥窈神見人形心言意語鬼聞人聲犯禁滿盈地收人魂宋史未石朝議李芬好奇有異石高二尺許嵌硿可愛常置庭檻間每至日方未時即有氣出石穴中若雲煙之狀依之候之萬不差一因目為之未石續墨客揮犀石中魚杜綰字季揚衍之孫也曾獲一蘭州黃河水中圓青石大如柿作鎮紙經宿連簡冊輒濕後以器貯之几移時有水浸潤一日忽墮地破而為三四段空有小魚一枚纔寸許跳躍頃刻即死雲林石譜如畫宋汴京天津橋上有奇石大片有自然華夷圖山青水綠河黃路白粲然如畫癸辛雜志貞婦石道有貞婦石相傳昔有貞婦夫沒無子事姑甚孝姑抑而嫁竟不從之終姑之世後身沒其居之室有一大石湧出後人愛其貞操號其石為貞婦石寰宇記化女陽羡縣小吏吳龕嘗於溪中見五色浮石因取內床頭至夜化女子幽明錄水火石崦嵫山有石赤白色以兩石相打則水潤打之不已潤盡則火出山石皆然炎起丈丈逕日不滅有大黑風自流沙出奄之乃滅其石如初言動火之事發疾經年故不敢輕近耳水經注帝臺石休與之山其上有石焉名曰帝臺之棋五色而文其狀如鶉卵帝臺之石所以禱百神者也服之不蠱山海經協金石有人得青石大如磚皆有鼻穿鉄索長數丈循環無斷處海商見之以數十千易之云此恊金石垂于海中經夕引出上有金幕府宴閑錄龍駒石有人曾畜一石羌人以十萬購之其人與之而詰其異胡人令取盆水置石其中視之有一馬現石中狀如飛動其人問其所用曰此龍駒石也以水浸之飲馬馬輒生龍駒無價寶也北囱炙輠消石消石出烏場國能消金石為水服之悉得長生其石出處氣極穢惡飛鳥不能過其上人或單服從過身上諸虫悉化為水而得長生矣形若鵝毛管者佳仙方云此帝玄珠也乞子石道有乞子石兩石夾青衣江對立如夫婦之相向古老相傳東石從西石乞子將歸故風俗云人無子祈禱有應寰宇記香石卞山在湖山下有無價香有老母拾得一文石光采可玩偶墜火中異香聞於遠近收而寶之每投火中異香如初熱石新北市是景觀舊基有一巨石大如柱礎景人或坐之蹋之逡巡如火燒應而熱因便成疾往往心致死或云若聚火燒此石吼即瞿塘山吼而水沸古老相傳耳又蜀州晉原縣山亭中有二大石各徑二尺已來出地七八十人坐之或心痛往往不救又星落星石東邊者坐即靈者西邊者與石無異色並帶諸青白也錄異註響石南嶽呴嶁峰有響石呼喚則應如人共語而不可解也南州南河縣東南三十里丹溪之有響石高三丈五尺闊二丈狀如臥獸人呼之應笑亦應之塊然獨處亦號曰獨石也洽聞記金剛石徼外出金剛石石厲而似金有光彩可以刻玉外國人帶之云避惡氣山海經注畫眉石畫眉石武昌有之出於樊湖可以代七香圓鎻碎錄凌水石凌水石出常山谷中以此石為末置水中夏月能為水不灰石安福縣長嶺山有石黑可以種火是為不灰石寰宇記質石渭州水中有虫頗類魚鳴或作質質處土人見者多以挺刃或堅物擊之多化為石石色青黑溫潤堪為礪目之為質石長惟尺餘價值數十千凡兵刃用此磨泊者青光而不鏉石譜雷磨石臨賀郡有青石上有磨刀斧迹春夏明淨秋冬蕪穢云是雷磨石荊州記石鷰零陵有石鷰得風雨則飛翔如真燕風雨止還為石湘州記謝鴻云向在鄉中山寺為學見高巖石上有如燕狀者因以筆識之石為烈日所暴忽有驟雨過所識者往往墜地蓋寒熱相激而并落非能飛也倦遊雜錄有石板上磊塊如燕形者呼為燕窩石譜屏石石屏出零陵白鶴山屈處靜上昇之所紹興壬午間有宗子邑居一日艤舟山下於水中得一石光采絢異其文若峰巒聳秀渾然天成自是石工鑿取益眾煙雲雪月之景波瀾龍鳳之象隱然可觀大者方廣可四五尺雖巧畫者莫臻其妙零陵志魚石衡陽鄉湘縣有石魚山下多玄石石色黑而理若雲母發開一重輒有魚形鱗鰭首尾宛若刻畫長數寸魚形備足燒之作魚膏形因以名之南越志隴西地名魚龍掘地取石破而得之與湘鄉所產無異石譜杜詩有水落魚龍夜山空鳥鼠秋之句嫩石南雄縣出嫩石可以為鍋釜寰宇記石果廣西桂州隱山之北中有石室石臺又有石果作荔子胡桃栗棗之狀人採取之或以釘盤相遺韶石曲江有石高百丈廣圓五里兩石對峙相去一里小大略均似雙闕名曰韶石南有靈石一名逃石高三十丈廣圓五百丈舊耆傳言石本桂陽武城縣因夜迅雷之變忽然遷此彼人來見歎曰石乃逃來因名逃石以其有靈運徙又曰靈石其傑處臨江壁立霞駁有若繢焉水石驚瀨傳響不絕啇舟淹留聆玩不已水經玉女房龍盤山有一石長四十丈高五丈當有戶及扇若人掩閉古老相傳為玉女房益州記女觀石南陵縣有女觀山俗傳云昔有婦人夫官於蜀屢愆期憂思感傷登此騁望因化為石如人之形所舝狗亦化為石今狗形獨存輿地志望夫石武當北山上有望夫石狀若人立者傳云昔有真女其夫從役遠赴國難攜弱子餞送此山立望而化為石世說督郵宜都建平二郡之界有五六峰參差互出上有倚石如二人像攘袂相對俗謂二郡督郵爭界於此幽明錄鹽石汶山有鹽石煎之得鹽華陽國志入湯口四十三里有石煮以為鹽石大者如升小者如拳煮之水竭鹽成晉分地道記承受石筑陽米水口有一石下不測出地尺餘圍可三尺色極青其上如研明可以鑒人相傳以為殞星縣西有孤石挺出其下臨潭時有見此石根如竹而黃色見者多凶相與號為承受石州圖副記冷石馬嶺上橋多虺蛇毒殺人有泠石可以解之屑着瘡內即活郡國志譽石鸛水鳥也伏卵時數入水卵泠則不段毈取譽石用繞卵以助煖氣故方術家以鸛巢中譽石為真物愽物志石猪蜻蛉縣有石猪圻長谷中有石猪子母數千頭長老傳言夷昔牧此一朝化為石迄今夷人不敢往牧水經石廩石廩狀似倉廩其內可容千斛廩口開則歲儉閉則年豐臨川記石鏡石鏡山東一圓石懸崖明淨照人微細必察潯陽記宮亭湖邊傍石聞有石數枚形圓若鏡明可鑒人謂之石鏡後人過以火燎一枚今不復明其人眼遂失明幽明錄合州涪江有石立水中正圓如月水落時即出高可三丈俗名石鏡山川紀異零陵中興崖有石鏡劉愿序云以水澤之其光燦然江山之盤紆草木之榮悴皆莫遁也盤陀石明州昌國東海中補陀伽山有盤陀石平廣可立百餘人下瞰大海正扶桑日出之地燭龍將駕天光煥發五色爛然頃焉一輪湧出其大有不可名者四明舊志支鼎辰州東有三山鼎足直上各高數十丈古語云夸父與日兢走至此煮飯此三山者夸父支鼎石也朝野僉載女媧石歸美山山石紅丹赫若采繪峨峨秀上切霄鄰景名曰女媧石大風雨後天晴氣靜聞絃管聲南康記磨鏡石鏡湖俗傳軒轅氏鑄鏡於湖邊今有軒轅磨鏡石石上常潔不生蔓草述異記九州圖魯班刻石為禹九州圖今在洛城石寶山上石泣桀時泰山走山石泣先儒說桀之將亡泰山三日泣今泰山山石遠望之若人泣蓋是也周武謂周公曰桀為不道走山石泣石押衙汴都之南百里有周公墓前一石人能作怪人或遇之稱魯校書石押衙洞微志月鏡周靈王時異方貢石鏡此石色白如月照面如雪謂之月鏡拾遺記石龜海畔有大石龜俗云魯班所作夏則入海冬復止於山上陸機詩云石龜常懷海我寧忘故鄉述異記越王石興安縣水邊有平石其上有石櫛石履各一具俗云越王渡溪脫履墮櫛於此荊州記照石方丈山西有照石去石十里視人物之影如鏡焉碎石片片皆能照人而質方一丈則重一兩燕昭王舂此石為泥泥通霞之臺與西王母常遊居此臺拾遺記方坐會稽秦望山始皇刻石前有石廣數丈云是始皇坐之石兩邊有方坐八所云是丞相已下坐石故今有丞相石之名輿地記立石萊子國海上有石人長一丈五尺大十圍昔始皇遣此石人追勞山不得遂立酉陽雜俎金化石秦二世元年宮中雨金頃刻皆化為石述異記畫石董偃常臥延清之室以畫石為床文如錦也石體甚輕出郅支國拾遺記石人光武夜至趙州南迷路聞人語問之弗應見二人立傍怒拔劍斬之其一急走熟視之乃石人也野史趙州志石象河南府東有象莊舊傳漢時西僧以象馱經至洛陽化為石今石象猶存山川紀異石床焦氏山北數山有漢司隸校尉魯恭家前有石祠石廟四壁皆青石隱起自書契以來忠臣孝子貞婦孔子及弟子七十二人形像像邊皆刻石記之文字分明又有石床長八尺磨瑩鮮明叩之聲聞遠近時太尉從事中郎傳珍之諮議參軍周安穆折敗石床各取去為魯氏之後所訟二人並免官戴延之西征記雨石魏武帝末年鄴中雨五色石述異記石羊京口有石如羊謂之狼石諸葛亮嘗坐其上與孫權議拒曹操志狼石有十字斷痕先主與孫權私卜所斷也演義孫劉同獵醉各據一石羊後名石羊巷輿地記石像魏孝武永熙元年於平等寺造五層塔二年土木畢功帝率百僚作萬僧會其日寺門外有石像自故自動低頭復舉竟日乃止帝怪其詭異中書舍人卞靈景曰石立社移自古有之陛下何怪也帝乃還宮七月中帝奔長安十月遷都于鄴洛陽伽藍記神鉦武安縣南有鼓山上有二石如鼓南北相當世傳鼓鳴則有兵起高齊之末此鼓常鳴而齊為周所并隋文帝末年鼓又自鳴聲聞數百里而唐代隋以興故一名神鉦山川紀異金胡碑記天水北冀縣南有朱圉山山有石鼓開山圖謂之天鼓山九州害起則鳴有常應又云石鼓山有石鼓于星為河鼓星則動石鼓鳴石鼓鳴則秦土秧鳴淺殃萬物鳴深則殃君王矣水經有逢山在廣固南三十里有祠並石鼓齊地將亂石人輒打石鼓聞數十里述征記變玉開皇末高祖於宮中埋二小石於地以誌置床之所未幾變為玉劉向曰玉者至貴也賤將為貴之象及大業末盜皆僣名號隋志投符葉法善卜居卯酉山其門近山巨石當路每還紆回以避師投符須臾飛去路乃平坦眾共驚異之仙傳拾遺賜石鷹楊弘裕河朔人一日出郊有使人自北騎馳來問子非楊裕乎北岳賜汝物可跪受之使者懷中探一物若帛褁者裕歸焚香啟之得二石鷹一雄一雌左趐掩右者雄也右翅掩左者雌也後生一男一女男名廷璋周朝為飛龍使女為周太祖妃縉紳脞說辟蠹熊山野好訪異物有石龜石桃石棗之類嘗夢人自云姓石相依附得一石人長尺餘眉目皆具後今世有石燕石蟹之類又松亦化為石隴州有魚石子置書籍中能辟蠹秘閣閑談石駞于國北五日行又有山山上石駱駞溺水滴下以金銀等器承之皆漏人掌亦漏唯匏取不漏或執之令人身臭皮毛改洽聞記石柱劫比他國中天竺之屬國也有石柱高七十尺紏色有光或觀其身隨其罪福悉見影中見之上搗練碪搗衣山一名靈山在瑯琅山南絕險巖有方石昔有神女於此搗衣其石明塋謂之玉女搗練碪述異記醢石叚成式群從其言小時嘗毀鳥巢得一黑石如雀卵圓滑可愛後偶置醋器中忽覺石動徐視之有四足如綖舉之足亦隨縮酉陽雜俎華岳掌華岳掌其石丹紫正如人肉色每太陽對照則盡見之及日暮則漸隱而不見樵者云仙掌者蓋絕地之上群壑聚會之所石色頳然望之適類其掌爾賈氏閑談石九子母石九子母者坐高七尺在金州寺中九子悉附于石體傳云浮海而至士庶禱祀求子多驗交州記雲根詩人多以雲根為石以雲觸石而生也宋孝武登樂山詩屯煙擾風穴積水溺雲根元魏宣武裴粲詔云栖素雲根餌芝清壑白樂天天竺石詩下搶拂雲根杜詩穿水忽雲根錢起奇石雲根淺賈島移不動雲根陂陀爾雅曰陂者阪也郭璞注陂陀不平也長松天子南還昇于長松之阪東昇于三道之登穆天子傳九曲洛水東逕其地九曲十里有九阪之曲水經注穆天子西征升九阿郭曰疑今新安縣十里有九阪也東京賦西阻九阿東門于旋轘轅欒盈過周王使候出諸轘轅左傳張儀云塞轘轅之口秦策其阪有十二曲道將去復還故云志巔軨太陽縣傅巖東北十餘里有巔軨阪左傳所謂入自巔軨者也有東西絕澗壑中築道謂之軨橋虞城北對長坂二十里許謂之虞阪戴延之曰自上及下七山相重戰國策曰昔騏驥駕鹽車上虞阪遷延負轅而不能進蓋其困處也水經寊零在吳城之北今謂之吳坂古今地名劉越石與盧諶書云昔驥騏倚輈于吳坂長鳴于伯樂知與不知也羊腸趙簡子上羊腸之坂群臣皆推車宗會獨當戟行歌簡子曰人臣而侮其主其罪若何宗會曰其罪死君亦聞人君而侮其臣乎則智不為謀辨者不為鬭則其國危乎簡子曰善以宗會為上客新序高誘曰羊腸其山盤紆如羊腸是太行孟門之限魏武苦寒行羊腸阪詰屈車輪為之摧九折王陽為益州至卬𤏡坂九折歎曰奈何以先人之遺髓乘此險乎遂以病去及王遵為刺史至此坂問吏曰此非王陽所畏道也叱其馭駈之曰王陽為孝子王遵為忠臣漢書黃馬孫登揚駿逼迎之與語不荅賜布袍登借刀截斷棄門中大呼云刺斫卒病死後人見在黃馬坂王隱晉書成皋北有黃馬坂孫登之去楊駿作書與洛中故人處也水經注潘尼惡道賦云若其坂名羊羹八特成皋黃馬八特坂函谷東坂謂之八特坂地理志旋門河水東逕成皋西旋門阪北今成皋四大阪者也昇陟此阪而東躋成皋城曹大家東征賦望河洛之交流看成皋之旋門義婦坂呂榮者吳郡許昇之妻也昇為賊所害榮頁固自守黃巾賊陳寶欲干穢之榮執節不聽寶遂殺榮是日疾風暴雨雷電晦宜寶恐懼叩頭謝葬之而去靡府君聞榮高行遣主簿祭之又出錢助縣為冢於嘉興郭里墟北名曰義婦坂列女後傳赤須坂班彪北征賦登赤須之長坂入義渠之舊城注赤須坂在北地郡水經注赤須水出赤須谷西南流注羅水阪以水得名也選隴坂張衡四愁詩我所思兮在漢陽欲往從之隴坂長應邵曰天水有大坡名曰隴坂選隴西關其坂九迴不知高幾里欲上者七日乃越高處可容百餘家下處數十萬戶其上有清水四注俗歌曰隴頭流水鳴聲幽咽遙望秦川心肝斷絕去長安千里望秦川如帶關中人上隴者還望故鄉悲思而歌則有絕死者三秦記白司馬垂拱中有詔白司馬阪營大像縻費鉅萬蘇珦以妨農上疏切諫則天納焉舊侯思止為左臺侍御史嘗按中丞魏元忠獄曰急認白司馬不然即與孟青白司馬者洛陽有阪號白司馬坂孟青者將軍姓孟名青棒即殺瑯琊王沖者也思止高元禮庸奴常以此謂諸囚也思止言竟不正時人效之以為談謔之資舊酷吏傳崿坂久視中則天幸三陽宮自夏涉秋不時還都張說上䟽曰宮去洛陽一百六十里有伊水之隔崿坂之峻舊書新書云后逭暑三陽宮長樂坂張濬充招討置制使濬率軍騎發自京師昭宗御安喜樓臨送濬酒酣泣奏楊復恭聞之不悅中尉內使餞于長樂坂恭以酒屬濬濬辭復恭戲曰相公不領復恭意作面子耶濬笑曰賊平後方見面子復恭銜之舊唐傳玉輪坂汶江水源出玉輪坂下益州記牛叩頭道有牛叩頭坂馬摶頰坂華陽志三十六洞大天之內有玄中之洞三十六所其八海之中崑崙蓬萊方丈瀛洲滄波白山八停之神山山皆有洞宮不在三十六天之洞數也羅酆山之洞周一萬五千里名曰北帝死生之天皆死神所治五帝之宮考謫之府也鬼神所治又有二十八山洞天之陰宮或地官所在者不能一一記其洞山之名其餘有六洞天陰宮山皆夷狄異類鬼所不治大戎鳥獸蠻祼夷之種也匈奴之天下北戎之善山南越之勾嶁是也句曲山洞宮之中本有神仙人郭四朝者治其宮亦司三官領羅酆師晨候四朝燕人也兄弟四人得道四朝是長兄也茅君內傳清涼洞鉅野金鄉山北有石洞曰清涼深十餘丈內鑿石作四小閣閣外一堂陛高三尺堂外兩門門外兩大閣石道長三十丈闊十有六尺世傳秦始皇避暑宮也地志諸葛洞黔中郡南石崖屹立傍有石洞數丈相傳諸葛亮征九溪蠻嘗過此留宿洞中設一床懸粟一握以秣馬後遂化為石床石粟至今猶存上寶仙洞元宗天寶九載十月庚申幸清華陰太白山人王元翼言玄皇元帝降于寶仙洞本紀玉泉洞荊州玉泉寺近青溪諸山山洞往往有玉泉窟中多乳窟交流有白蝙蝠如鴉千歲之後體如白雪蓋飲乳水而長生也白集猗玗洞元結作自什曰天下兵興逃亂入猗玗洞稱猗玗子唐書大隱洞韋夏卿晚歲將罷歸署其居曰大隱洞唐書白鹿洞貞元中洛陽人李渤與兄涉同隱居讀書于廬山五老峰下洞中養白鹿自娛後因以名洞寶曆中渤為江州刺史即洞創臺榭引流植花焉郡志金沙洞驪山有金沙洞玉蘂峰楊妃外傳含輝洞薛景晦為道州刺史得異境於近郊有石穹然如夏屋因名其地曰含輝洞禹錫集南山乳洞有人遊南山乳洞深數里乳旋滴瀝成飛仙狀洞中已有數十若工玉石眉自衣服形製精巧一處滴至腰已上其人因手承漱之經年再往見所承滴像已成矣乳不復滴當手承處衣缺二寸不就酉陽雜俎龍洞魯國唐世旻字圖昌本零陵人在郡為衙校唐昭宗時盜起世旻團結鄉兵保里閭劉建鋒舉為永州刺史光化初馬殷攻之不屈而死後或聞鉦鼓聲且數晝見嘗有一木自洞流出止於石荊岸人送之中流詰旦復還如是者數四適天旱禱而雨遂取其木像而祠之湖南馬氏封為零陵王廟舊經神農穴夏平縣有重山即烈山也山下有一穴父老相傳是神農所生處也水經注禹穴漢書司馬遷傳云上會稽探禹穴又有禹井楊都賦云洞穴蒼梧汪云有零陵人言從禹穴入至蒼梧出也會稽記迯丹穴越人三世殺其君王子搜患之逃於丹穴而越人無君從之丹穴王子搜不肯出穴人薰之以艾承以玉輿莊子丹穴巴寡婦清其先得丹穴而擅其利史貨殖傳五姓出穴巴蠻有五姓皆出於武落鍾離山其山有赤黑二穴巴氏之子生于赤穴四姓之子皆生黑穴未有君長俱事鬼神乃共擲劍于石穴約能中者奉以為君巴氏子務相乃獨中之眾皆歎因共立之是為廩君後漢馬穴中盧縣有馬穴山傍有地道漢時常有數疋白馬出其中形皆小似湞池馬遂名馬穴荊州圖記西陵北三十里有石穴名馬穿嘗有白馬出穴食人逐之入穴潛出漢中漢中人失馬嘗出此穴相去數千里宜都記地脈太湖中有包山下有洞庭穴傍行地中無所不通謂之地脈風土記吳國南有具區澤中包山有洞庭寶室入地下潛行通瑯琊東武玄中記洞庭山有三穴並有清泉流出惟西北一穴傴僂纔得入吳大帝使人行三十餘里而友云上聞有浪聲有大蝙蝠如鳥拂殺人火穴中高處火照不見穴有鵝管鍾乳冰寒可得入春夏不可入婁地記洞庭山有穴五門東通林屋西達娥眉南接羅浮北連岱岳東有石樓樓下兩石扣之清越所謂神鉦者有青童乘獨飊飛輪之車至此其跡存焉上有天帝壇山山有金牛穴吳孫權時令人掘金金化為牛走上山其跡存焉故號為金牛穴述異記震澤中洞庭山有洞穴深百餘尺仰公誤墮洞中至一龍宮下有青泥晝夜常明飢食青泥味若粳米飯記得歸路得出事聞梁武帝帝問杰公公曰此洞穴有四支一通洞庭湖西岸一通蜀道青衣蒲北岸一通羅浮兩山間大谿一通枯桑島東梁四公記太湖中別有夫椒山下有大洞天宮潛通五岳吳地記潛通循州有龍穴潛通于海傍于洞庭吳都賦云目龍川而帶垌此也郡國志龍穴江陵龍穴洲有駕步口宋文帝車駕發江陵至此黑龍躍出負帝所乘舟左右失色上謂長史王曇首曰此乃夏禹所以受天命矣我何德以堪之故有龍穴之名焉水經注風穴五臺山有風穴將人稍或諠呼及投物擊觸即大風震發揚屋拔木必為物害寶曆初燕人李球墜入穴中見洞內二道士弈棋以一杯水與之令人引出引者曰此山道家紫府洞也洞有三門一徑西通崑崙一徑出此巖之下一向來風穴是洞之端門也皆有龍蛇守之此有北巖之徑可還舊處球如言而歸仙傳拾遺大濩湘水中有穴名大濩不知通何許每春夏江漲數百步外皆奔入穴中有聲如雷開寶中有崑崙沈水視之但見歷年所沈板木縱橫其間兩蚌大如輪車輿地紀勝天中記卷八
