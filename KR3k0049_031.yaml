body:
  text: 尚書省案韋昭辨釋名曰尚上也言最在上總領之也辨云尚猶奉也百官言事當省案平處奉之故曰尚書尚食尚方亦然尚書唐虞官也龍作納言詩云惟仲山甫王之喉舌秦改稱尚書漢亦尊此官典機密也漢官儀漢明帝詔曰尚書蓋古之納言出納朕命機事不密則害成可不慎歟上唐虞曰納言周官為內史機事所總號令攸發漢官解詁秦時少府遣吏四人在殿中主發書尚猶主也宋志昔堯試舜於大麓者領録天下事如今之尚書官矣宜得大賢智乃可使處議持平桓談新論尚書令總攝諸曹出納王命敷奏萬機蓋政令之所由宣選舉之所由定罪賞之所由正斯乃文昌天府衆務淵藪內外所折衷遠近所稟仰百官表隋志通典司會天官司會中大夫二人周禮會大計也司會主天下之大計計官之長若今之尚書鄭玄注文昌政本司會化經陳後主授江總尚書令册文尚書令主贊奏事㧾領紀綱無所不統與司隸校尉御史中丞朝會皆專席而坐京師號曰三獨坐後漢古者重武事貴射御取其捷御如僕各置一人尚書六人謂之八座參攝百揆出內王命古元凱之任也謝靈運晉書天興元年置八部大夫於皇城四方四維面置一人以擬八座謂之八國魏官氏志尚書漢因秦置之故尚書為中臺謁者為外臺御史為憲臺謂之三臺唐光宅元年改為文昌臺垂拱元年又改為都臺神龍初復舊為尚書省亦謂之南省侯霸字君房光武時拜尚書令時無故典朝廷又少舊臣霸明習故事收録遺文條奏前世善政法度有益於時者皆施行之每春下寬大之詔奉四時之令皆霸所建也後漢天下樞要韋彪字孟達肅宗時上疏曰夫欲急人所務當先除其所患天下樞要在於尚書尚書之選豈可不重而間者多從郎官超升此位宜簡嘗歷州宰素有名者鑒嗇夫捷急之對深思絳侯木訥之功也上陽嘉二年李固對曰陛下之有尚書猶天之有北斗也斗為天喉舌尚書亦為陛下喉舌斗斟酌元氣運平四時尚書出納王命賦政四海權尊執重責之所歸若不平心災眚必至漢書春秋合誠圖曰天理在斗中司三公也如人喉在咽以理舌語也天有北斗所以斟酌元氣帝有尚書所以出納王命若賦役平均則百姓以安萬機不治則天下以亂漢紀間舊典太尉李固薦楊淮纍世服事臺閣既間練舊典且有幹用宜在機密特拜尚書固薨免官尚書令陳蕃表淮行狀復徵為尚書左雄字伯豪順帝即位虞詡善之曰雄有王臣蹇蹇之節周公謨成王之風宜擢在喉舌之官必有匡弼之益由是拜雄尚書再遷尚書令後書左雄為尚書令奏崇經術郡國耆儒年六十已上為郎不滿四十不得察舉若茂才異行不拘年齒帝從之有廣陵孝廉徐淑年未及舉臺郎疑而詰之對曰詔書曰有如顏子子奇不拘年齒是故本郡以臣充選郎不能詰雄詰之曰昔顏子聞一知十孝廉聞一知幾邪淑不能對乃譴却郡自是牧守莫敢輕舉自雄在尚書天下不敢妄選十餘年間稱為得人上雄為尚書令限年四十九先試經然後舉孝廉故雄為令在位者各肅清時稱曰左伯豪為尚書天下皆慎選舉漢紀初左雄薦周舉宣光為尚書又舉馮直為將帥而直嘗坐贓受罪舉以此劾雄雄悅曰吾曾事馮直父又與直善今宣光以此奏吾乃韓厥之舉也由是天下服焉後書自雄掌納言多所匡肅每有奏章臺閣以為故事上陳忠為尚書令數進忠言辭旨弘麗前後所奏悉條於宮闕以為故事上董卓為司空聞蔡雍名高辟之稱疾不就卓大怒詈曰我力能族人蔡雍遂偃蹇者不旋踵矣又切勑州郡舉雍詣府雍不得已到署祭酒甚見敬重舉高第補侍御史又轉侍書御史遷尚書三日之間周歷三臺後書費褘字文偉代蔣琬為尚書令于時戰國多事公務煩猥褘識悟過人每省讀書記舉目暫視已究其意旨其速數倍於人終亦不忘常以朝晡聽事其間接納賓客飲食嬉戲加之博奕每盡人之歡事亦不廢董允代褘為尚書令欲裕褘之所行旬日之中事多愆滯允乃歎曰人才力相懸若此甚遠此非吾之所及也聽事終日猶有不暇爾三民望尚書令李胤遷處缺宜得其人征南將軍羊祐體儀玉立可以整肅朝廷征南將軍衛瓘真正靜一中書監荀勗達于事物三人皆民望不審可參舉否山濤啓事昔六官所掌冢宰為首秦公卿贊以丞相御史為冠今者尚書令總事此三者非臣駑暗所宜忝竊荀勗集武帝詔曰尚書令百揆之首總參機衡出納朝政治績之所由也車騎將軍賈充忠允清正通理經遠迪文武謨勳弘著其以充守尚書令晉起居注劉頌為尚書孫秀等推崇趙倫功宜加九錫百寮莫敢異議頌獨曰昔漢之錫魏魏之錫晉皆一時之用非可通行今宗廟乂安雖嬖后被退勢臣受誅昔周勃誅諸呂而尊孝文霍光廢昌邑而奉孝宣並無九錫之命亂舊典而習權變非先王之制九錫之議請所無施晉書八座之任蔡謨為尚書上疏曰八座之任非賢莫居前後選用名賢有常孔愈諸葛恢並以清節令才素有名望臣名輩不同階及殊懸今猥以輕鄙超踰等匹上亂聖朝貫魚之次下違群士準平之論豈唯微臣斯亡之誡實貽聖政維塵之纍晉中興書尚書萬事之本朕所責成也而廩秩儉薄甚非治體今雖軍國多費不為元凱惜祿其依令僕給尚書各親信五十人廩賜晉康帝起居注詔降奏辭疾卞壼明帝時為尚書令與王導等俱受顧命輔幼主成帝即位群臣進璽司徒王導以疾不至壼正色於朝曰王公豈社稷之臣邪大行在殯嗣皇未立寧是人臣辭疾之時專任無敬事寢不行舉朝憚之晉中興書謝石為尚書令上疏遜位曰尚書令國之冢司總括百揆憲範王猷式是群辟故必簡德而拔量才而受晉紀王恭嘗寓于司馬道子室尚書令謝石為吳歌恭曰居端石之重集宰相之坐而效流俗之音乎石有慚色語林並受詞訴徐湛之為尚書僕射令何尚之以湛之國戚任遇隆重欲以朝政推之并諸詞訴絶不科省湛之亦以尚書令敷奏出納事無不總令缺則僕射總任又以事歸尚之互相推委御史中丞袁淑奏並免官詔特無所問乃使湛之與尚之並受詞訴尚之雖為令而朝事悉歸湛之南史比坐右銘王僧虔為尚書令嘗為飛白書題尚書省壁曰圓行方止物之定質修之不已則溢高之不已則栗馳之不已則質弘之不已則迭是故去之宜疾當時嗟賞以比坐右銘上宋孝建元年詔曰尚書百官之元本庶績之樞機丞郎列曹局司有任自頃事無巨細悉歸令僕非所以詔能濟業也更可明體制責厥成也通典自晉以後八座及郎中多不奏事梁天監元年詔曰自禮闈凌替歷茲永久郎署備員無取職戚粳粃文案貴尚虛間空有趍墀之名子無握蘭之實曹郎可依昔奏事自是始奏事矣又詔尚書中有疑事先於朝堂參議然後啓聞通典尚書令為端揆之官武德初太宗為秦王時嘗居之其後人臣莫敢當至廣德中郭子儀勳業既盛乃特拜焉子儀以文皇帝故讓不敢受六典通典玄宗欲以牛仙客為尚書張九齡諫曰不可尚書古之納言有唐以來多用舊相居之不然歷踐內外清貴之地妙選有德望者充之仙客本河湟一使典耳拔升清流齒班常伯此官邪也唐新語尚書左丞彈八座以下居萬機之會斯乃皇朝之司直天臺之管轄傳咸答辛曠詩序賀琛字國寶為尚書左丞並參禮儀事琛前後居職凡郊廟諸儀多所創定每見高祖與語當移晷刻故省中為之語曰上殿不下有賀雅琛容止都雅故時人呼之梁書劉覽字孝智為尚書左丞性聰敏尚書令史七百人一見並記名姓當官清正無所私姊夫御史中丞禇湮從兄吏部郎孝綽在職頗通贓貨覽劾奏並免官孝綽怨之嘗謂人曰犬齧行路覽噬家人上競銀窟郎茂字慰之為尚書左丞時工部尚書宇文愷右翊衛大將軍于仲文競河東銀窟茂奏劾之曰臣聞貴賤殊禮士農異業所以人知局分家識廉耻宇文愷位望已隆祿賜優厚拔葵去織寂爾無聞求利下交曾無愧色于仲文大將宿衛近臣趨侍階庭朝夕聞道虞芮之風抑而不慕分銖之利知而必爭何以貽範庶察示民軌物若不紏治將虧政教愷與仲文竟坐得罪隋書左轄元壽字長壽為尚書左丞開府蕭摩訶妻患且死奏遣其子向江南收家産御史見而不言壽奏劾之曰人倫之義伉儷為重資愛之道烏鳥弗摩訶遠念資財近忘匹好又命其子捨危惙之母為聚斂之行一言才發名教頓盡而侍御史韓徵之等親所聞見竟不紏彈治書侍御史劉本行職攝憲臺虧失憲體臣忝居左轄無容寢默上劉洎上疏曰尚書萬機實為政本是以八座比於文昌二丞方於管轄茍非稱職竊位興譏貞觀之初左丞戴胄右丞魏徵並曉達吏方質性平直事應彈舉無所回避及杜正倫續任右丞頗亦吏下比者綱維不舉並為勳親在位者非其任功勢相傾將救茲弊且宜精簡得人自然綱維略舉亦當矯正趍競豈惟息其稽滯哉書奏永幾拜洎為尚書右丞隋左右丞掌分尚書諸司糾駮唐因隋制龍朔二年改為左右肅機其年有宇文化及子孫理資蔭朝廷以事隔兩朝且其家親族亦衆多為言者所司之理至于勾留右肅機陽昉未詳其案狀訴者以道理已成無復疑滯勃然逼昉昉曰適朝退未食食畢當詳案訴者曰公云未食亦知天下有纍年霸旅訴者乎昉遽命案立批之曰父弒隋主子訴隋資生者猶配遠方死者無宜更敘時人深賞之通典新語錦製儀鳳四年韋仁約除尚書左丞約奏曰陛下為官擇人非其人則闕今不惜美錦令臣製之此陛下知臣之深亦徵臣盡命之秋振舉綱目略無留事朝廷肅然後分置左右肅政臺復以思謙為右肅政大夫通典舊唐顏真卿為尚書右丞車駕自陜將還真卿請皇帝先謁五陵九廟而後還宮宰相元載謂真卿曰公所見雖美其如不合事宜何真卿怒前曰用捨在相公耳言者何罪然朝廷之事豈堪相公再破除耶載深銜之舊唐勑庾承宣尚書右丞制昔我太宗嘗謂尚書丞百職綱維事一失中則天下有受其弊者因命戴胄魏徵及杜正倫劉洎輩繼領是職分居左右官修事理人到于今稱之故吾前命崔戎持左綱今命承宣操右轄承宣端諒勤敏周知典故必能為我紐有條之綱柅妄動之輪坐曹得出入郎官立朝得奏彈御史會決政要扶樹理本無俾戴魏劉杜專美於貞觀中長慶集韋弘景為尚書左丞駮正吏銓所除六十餘官不當進資於是鄭綱丁公著楊嗣復皆奪俸郎吏肅然望風修整吏部員外郎楊虞卿以纍下吏詔弘景與御史詳讞虞卿私造門弘景厲言曰有詔按公尚私謁邪虞卿多朋助自謂必見納及是惶恐去弘景以直道進議論持正有守當時風教所倚賴為長慶名卿唐書弘景先為吏部侍郎銓綜平序貴幸憚其嚴不敢慁以私冢宰掌邦治統百官均四海天官太宰之職掌建邦之六典以佐王治邦國周禮冢大也宰者官也鄭目録濟其清濁和其剛柔而納之中和曰宰于氏宰變冢言太者進退異名也百官總焉則謂之冢宰列職於王則謂之太宰宰主也建立也邦理王所居之邦國佐猶助也周公居攝而作六典之職以佐王理邦國唐武后遂以吏部為天官戶部為地官禮部為春官兵部為夏官刑部為秋官工部為冬官以承周六曹官之制通典唐虞建官法天地四時以分職羲和天地之官也四嶽四時之官也夏因虞制甘誓召六卿是也殷大宰至司寇乃周之六官也閔子騫為費宰問古之為政子曰古之御天下者以六官總治焉冢宰之官以成道司徒之官以成德宗伯之官以成仁司馬之官以成聖司寇之官以成義司空之官以成禮六官在手以為轡均仁以為納天子以內史為左右手以六官為轡已而與三公為執六官均五教齊五法故亦唯其所引無不如志以之道則國治以之德則國安以之仁則國和以之聖則國平以之禮則國安以之義則國義此御政之術故官屬不理分職不明法政不一百事失紀曰亂亂則飭冢宰地而不殖財物不蕃萬民飢寒教訓不行風俗淫僻人民流散曰危危則飭司徒父子不親長幼失序君臣上下乘離異志曰不和不和則飭宗伯賢能而失官爵功勞而失賞祿士卒疾怨兵弱不用曰不平不平則飭司馬刑罰暴亂姦邪不勝曰不義不義則飭司寇度量不審舉事夫理都鄙不修財物失所曰貧貧則飭司空堯命羲和使主陰陽之職羲伯司天即天官也后稷服事虞夏敬授民時尊稷為天官夏衰稷後不窋失官由是廢官殷以其官為冢宰周公在酆為太宰召公又居之齊職儀太宰於殷為六太於周為六卿亦曰冢宰周武王時周公始居之掌建邦之理通典周禮六典冢宰二王而理天下二謂副二也一曰理典以理官府二曰教典以化萬姓三曰禮典以諧萬姓四曰政典以均萬姓五曰刑典以紏萬姓六曰事典以生萬姓也仲長統事言安定梁鵠善八分書初為吏部尚書太祖求為洛陽令鵠以為北部尉鵠避地荊州太祖定荊州求鵠鵠乞以書贖死乃令書信幡宮門題世語昔毛玠為吏部尚書無敢好衣美食者魏武歎曰孤之法不如毛尚書今使吏部用心如毛玠風俗之易在不難矣傳咸集表玠雅亮公正在官清恪其典選舉拔貞實斥華偽進遜行抑阿黨諸宰官治民功績不著而私財豐足者皆免黜停廢久不選用于時四海翕然莫不勵行至乃長吏還者垢面羸衣常乘柴車軍吏入府朝服徒行人擬壺食之潔家象濯纓之操貴者無穢欲之纍賤者絶姦貨之求吏潔于上俗移乎下民到于今稱之先賢行狀玠嘗為東曹掾與崔琰並典選舉其所舉用皆清正之士雖於時有盛名而行不由本者終莫得進務以儉率人由是天下之士莫不以廉節自勵魏志崔琰清忠高亮雅識經遠推方直道正色於朝魏氏初載委授銓衡㧾齊清議十有餘年文武群才多所明授朝廷歸高天下稱平先賢行狀畫地作餅盧育為吏部尚書前此諸葛誕鄧揚等馳名譽有四窗八達之誚帝疾之時舉中書郎詔曰得其人與否在盧生耳選舉莫取有名名如畫地作餅不可啖也育對曰名不足以致異人而可以得常士常士畏教慕善然後有名非所當疾也育於人及選舉先舉性行而後言才黃門李豐嘗以問育育曰才所以為善也故大才成大善小才成小善今稱之有才而不能為善是才不中器也豐等服其言魏志薛綜字敬文為選曹尚書固讓顧談心精體密貫道達微才照人物德允衆望誠非愚臣所可越先後遂代綜吳志李肅字偉恭南陽人少以才聞善論議臧否得中甄奇録異薦達後進題目品藻曲有餘貫衆人以此服之權擢為選曹尚書選舉號為得才步隲傳吳書王濬沖裴叔則二人惣角詣鍾士季須臾去後客問二童是誰曰裴王曰何如鍾曰裴楷清通王戎簡要後二十年此二賢當為吏部尚書爾時天下無復滯才世説山濤為太常遭母喪年踰耳順居喪過禮負土成墳手植松柏詔曰吾所共致化者官人之職是也方今風俗陵遲人心進動宜崇明好惡鎮以退讓山太常雖尚居諒暗情在難奪方今務殷何得遂其志邪其以濤為吏部尚書晉書啓事山濤再居選職十有餘年每一官缺輒啓擬數人詔旨有所向然後顯奏隨帝意所欲為先故帝之所用或非舉首衆情不察以濤輕重任意或譖之於帝故帝手詔戒濤曰夫用人惟才不遺踈遠卑賤天下便化矣而濤行之自若一年之後衆情乃寢濤所奏甄拔人物各為題目時稱山公啓事上山司徒前後選殆周遍百官舉無失才凡所題目皆如其言唯用陸亮是詔所用與公意異爭之不從亮亦尋為賄敗世説王戎為左僕射領吏部戎以晉室方亂慕蘧伯玉之為人與時舒卷無謇諤之節自經典選未嘗進寒素退虛名但與時浮沉戶調門選而已晉書蔡克素有格量及居選官茍進之徒望風畏憚初克未仕時山簡嘗與琅邪王衍書曰蔡子尼今之正人衍以書示衆曰山子以一字拔人然未易可稱後衍聞克在選官曰山子正人之言驗於今矣通志樂廣為吏部尚書所在為政無當時功譽每去職遺愛為人所思論人必先引其長屈其所短不明而自顯人有訾過先盡容弘恕而後善惡自著值世多難清白自將交無內外任誠保真人莫見其際者是以能自全當世以此多之王隱晉書樂彥輔雍容自守當時恨其寡譽山巨源意在拔奇不免與世沉浮張纘表人中市井袁貞為監軍范玄平作吏部尚書大坐語袁卿此假還不失護軍袁曰卿何事人中作市井語林人倫之職山濤曰臣欲以郗詵為溫令詔可尋又啓曰訪聞詵喪母不時葬遂於所居屋後假葬有異同之議請更選之詔曰君為管人倫之職此輩應為清議與不便當裁處之啓事郭撫初為吏部尚書與郎姚範清心虛求搜揚俊乂內外稱之以郭姚擬崔毛崔鴻春秋署紙尾宋廢帝時徵豫章太守蔡廓為吏部尚書廓至因北地傳隆以聞傳亮選事若悉以見付不論不然不能拜也亮以語録尚書徐羡之羡之曰黃門郎以下悉以委蔡吾徒不能厝懷自此以上故宜共參同異廓曰我不能為徐干木署紙尾遂不拜干木羡之小子也選案黃紙録尚書與吏部連名故廓言署紙尾也南史方巖能荷蔡興宗廓之少子也為左戶尚書轉掌吏部時上方盛淫宴虐侮群臣自江夏王義恭以下咸加穢辱唯興宗以方直見憚不被侵媟尚書僕射彥師伯謂儀曹郎王耽之曰蔡尚書常免昵戲去人實録耽之曰蔡豫章昔在相府亦以方嚴不狎武帝宴私之日未嘗相召每至官賭常在勝朋蔡尚書今日可謂能荷矣上少帝即位以蔡廓為吏部尚書不肯拜以王惠代焉惠被召即拜未嘗接客人有與書求官得輒聚閣上及去職印封如初時以廓不拜惠即拜事異而意同也南史庾炳之字仲文為吏部尚書為人強急而不耐煩領選既不緝衆論又頗通貨賄吏部令史錢泰能琵琶主客令史周伯齊善歌詣炳之宅咨事因留宿尚書舊制令史咨事不得宿停外雖有八座命亦不許為所司奏免官宋書六代五人光祿大夫謝莊子朏朏子瀹瀹子覽覽弟舉六代五人皆為吏部尚書並有文集梁書覽字景滌朏之弟瀹之子覽弟舉字言楊遷掌吏部尚書舉祖莊宋代再典選至舉又三為此職前代未有也上范雲性機警有識且善屬文下筆輒成時人每疑其宿構為吏部尚書寄任隆重書牘盈案賓客滿門應答如流無所壅滯官曹文墨發擲若神時人莫不服其明贍梁書徐勉字修仁遷吏部尚書勉居選官彝倫有序既間尺牘兼善辭令雖文案填積坐客充滿應對如流手不停筆又該綜百氏皆為避諱常與門人夜集客有虞高求詹事五官勉正色答云今夕止可談風月不宜及公事故時人咸服其無私上楊愔字遵彥武定來以望實之美超拜吏部尚書典選二十餘年獎擢人倫以為己任然取士多以言貌時致謗言以為愔之用人似貧士市瓜取其大者愔聞不屑焉其聰記強識半面不忘每有所召問或單稱姓或單稱名無有誤者後有選人魯漫漢自言猥賤獨不見識愔曰卿前在元子思坊騎禿尾草驢經見我不下以方趜鄣面我何不識卿漫漢驚服又謂之曰名以定體漫漢果自不虛又令吏唱人名誤以盧土深為琛士深自言惜曰盧郎玉潤所以從玉自尚公主後衣紫羅袍金鏤大帶遇李庶頗以為耻謂曰我此衣服都是內裁既見子將不能無愧北齊東魏以楊愔典選嘗六十人為一甲愔令其自敘訖不省文簿使次第呼之呼誤以慕容為長孫一人而已三國典略辛術字懷哲遷吏部尚書遷鄴以後大選之職知名者數四互有得失未能盡美文襄少年高朗所弊者踈袁叔德沈密謹厚所傷者細楊愔風流辨給取士夫於浮華惟術性尚貞明取士以才以器循名責實新舊參舉管庫必擢門閥不遺考之前後銓衡在術最為折衷甚為當時所稱舉北史韋世康為吏部尚書選用平允請託不行後復拜尚書前後十餘年間多所進拔朝廷稱為廉平嘗因休暇謂子弟曰吾聞功遂身退古人常道今年將耳順志在懸車汝輩以為云何子福嗣答曰大人澡身浴德名立官成盈滿之戒先哲所重欲追蹤二踈伏奉尊命上牛弘字里仁為吏部尚書其選舉先德行後文才要在審慎雖致緩滯所有進用並多稱職吏部侍郎高孝基鑒賞機晤清慎絶倫然爽俊有餘迹似輕薄時宰多以此疑之唯弘深識其貞推心任委隋之選舉於斯為最時論服弘識度之遠上魏知古先天二年冬令往東都知吏部尚書事深以為稱職手制曰卿以宰臣往知大選官人之委情寄尤切遂能端本革弊忘私徇公正色而行措心不撓鏡已激則妍媸必鑒衡已舉則輕重罔違朕遠聞之益用嘉歎舊唐知古姚崇所引及同列稍輕之出攝吏部尚書知東都選知古憾焉時崇二子在洛通賓客饋遺憑舊請託知古歸悉以聞他日帝召崇曰卿子才乎皆安在崇揣知帝意曰臣二子分司東都其為人多欲而寡慎是必嘗以事干魏知古帝始以崇私其子或為隱微以言動之及聞乃大喜問安從得之對曰知古臣所薦也臣子必謂其見德而請之帝於是愛崇不私而薄知古罷為工部尚書唐書唐初因隋制以吏部典選主者將親其人核之吏事始取州縣府寺疑獄課其斷決而觀其能否此判之始焉後日月淹久選人滋多案牘淺近不足為準乃採經籍古義以為問目其後官員不充選人益衆乃徵僻書隱義以試之唯懼選人之能知也道麗者號為高等拙弱者號為藍羅至今以為故事開元中裴光庭為吏部始循資格以一賢愚遵平轍者喜其循常負材用者受其抑屈宋璟固爭不得唐新語選人非負譴者皆有升無降其庸愚沈滯者皆喜謂之聖書通鑑開元十八年蘇晉為侍郎而侍中裴光庭每過官應批退者但對衆披簿以朱筆點頭而已晉遂傍選院門下點頭者更注擬光庭以為侮已不悅唐會要初裴光庭與蕭嵩爭權不協及為吏部奏用循資格并促選限至正月三十日畢其流外行者署亦令門下省之光庭卒後嵩又奏請一切罷之光庭所引進者盡出為外職時有門下主事閻麟之為光庭腹心專知吏部選官每麟之裁定光庭隨而下筆時人語曰麟之口光庭手太常慱士孫琬將議光庭諡以其用循資格非獎勸之道建議諡為克平人以為希嵩意旨上聞而特下詔賜諡曰忠獻舊唐裴均加吏部尚書初均與崔太素俱事中人竇文場太素嘗晨省文場入臥內自謂待已至厚徐觀後榻有頻伸者乃均也德宗以均任方鎮欲遂相之諫官李約上疏斥均為文場養子不可汙台輔乃止唐書神龍初韋巨源為吏部尚書時要官缺執政以次用其親巨源秉筆當除十人楊再思得其一試問餘授皆諸宰相近屬再思喟然曰吾等誠負天下巨源曰時當爾耳是時雖賢有德終莫得進士大夫莫不解體張纘字伯緒大同二年徵為吏部尚書後門寒素一介者皆見引拔不為貴門屈意人士翕然稱之武帝詔曰讚外氏英華朝中領袖南史天寶十年楊國忠兼吏部尚書故事吏部三銓三注三唱自春及夏才終其事國忠使胥吏於私第暗定官員集百寮於尚書省對注唱一日令畢以誇神速資格差謬無復倫序舊唐明年大選因就第唱補帷女兄弟觀之不問資序短小者道州參軍胡者湖州文學簾中大笑聲徹于外會要嘉話其所昵京兆尹鮮于仲通中書舍人竇華侍御史鄭昴諷選人舊唐鄭怤等二十餘人率錢于勤政樓設齋兼為國忠立碑于尚書省南以頌國忠銓綜之能舊唐詔仲通為頌帝為易數字因以黃金識其處唐書所注吏部三銓選人事務鞅掌不能躬親皆委典及令史孔目官為之國忠但押一字猶不可遍會要隋煬帝即位於尚書六曹各益侍郎一人以二尚書之職隋書今之侍郎其置自此始也通典晉宋以來吏部尚書資位尤重龍朔二年改吏部尚書為司列太常伯侍郎為司列少常伯天寶一年改為文部通典陸遊師為吏部侍郎隋承周制官無清濁彥師在職凡所任人頗甄別於士庶論者美之隋書高構字孝基煬帝初為吏部侍郎時為吏部者多以不稱職去官唯構最有能名前後典選之官皆出其下時人以構好劇談頗謂輕薄然其內懷方雅特為吏部尚書牛弘所重後以老病解職弘時典選凡將有所擢用輒遣人就第問其可不河東薛道衡才高當世每稱構有清鑒所為文筆必先以草呈構而後出之構有所詆訶道衡未嘗不嗟伏所舉杜如晦房玄齡其後皆自致公輔論者稱構有知人之鑒上唐武德初因隨舊制以十一月起選至春即停至貞觀二年劉林甫為吏部侍郎以選限促多不空悉遂奏四時聽選隨到注擬當時以為便會要時天下初定州府及詔使多有赤牒授官至是停省盡來赴集將萬餘人林甫隨才銓擢咸得其宜時人以林甫典選比隨之高孝基選舉志貞觀元年溫彥博為吏部郎中知選意在沙汰多所擯抑而退者不伏囂訟盈庭彥博惟騁辨與之相詰終日喧擾頗為識者所嗤上紿欺貞觀八年十一月唐皎除吏部侍郎常引人入銓問何方穩便或云其家在蜀乃注與吳復有云親老先住江南即唱之隴右論者莫測其意有一信都人希河朔因紿云願得江淮即注與河北一尉由是太被選人紿言欺之上貞觀十七年吏部侍郎高季輔知選凡所銓綜時稱允愜至十八年於東都獨知選事上賜金鏡一面以表清鑒上貞觀二十二年二月文部侍郎盧承慶兼檢校兵部侍郎仍知五品選事承慶辭曰五品選事職在尚書臣今掌之便是越局太宗不許曰朕今信卿卿何不自信也通典龍朔二年司列少常伯楊思玄恃外戚貴待選流多不以禮而排斥之為選者夏侯彪所訟御史中丞郎餘慶彈奏免官時中書令許敬宗曰必知楊吏部之敗或問之對曰一彪一狼共看一羊不敗何待會要咸亨二年有楊炯王勃盧照鄰駱賓王並以文章見稱吏部侍郎李敬玄咸為延譽引以示裴行儉曰才名有之爵祿蓋寡楊應至令長餘並鮮能令終上李敬玄總章二年檢校司列少常伯典選纍年銓綜有序自永徽以後選人轉多當其任者罕聞稱職及敬玄掌選天下稱其能預選者歲有萬餘人每於街衢見之莫不知其姓名其被放有訴者即口陳其書判失錯及身負殿纍略無差殊時咸服其強記莫之敢欺舊唐證聖元年劉奇為吏部侍郎注張文長司馬鍠為監察御史二人因申屠瑒以謝之奇正色曰舉賢本自無私二君何為見謝上弘道元年十二月吏部侍郎魏克巳銓綜人畢放長榜遂出得留人名於是衢路喧譁大為冬集人援引指擲貶為太子中允遂以中書舍人鄧玄挺替焉又無藻鑒之目又患消渴選人因號鄧渴上如意元年九月天官郎中李至遠權知侍郎事時有選人姓刁又有王元忠並被放乃密與令史相知減其點畫刁改為丁王改為士擬授官後即添成文字至遠一覽便覺曰今年銓覆萬人看識姓名安有丁士者哉此刁某王某也省內以為神明上天后以許子儒為天官侍郎儒不以藻鏡為意其補官悉委令史勾直時謂勾直曰平配後崔玄暐為之介然自守絶於請謁為執政者所忌轉文昌左丞選司令史乃設齊自慶武太后聞之復拜為天官侍郎唐書景雲元年盧從願為侍郎精心條理大稱平允其有冒名偽選虛增功狀之類皆能擲發其事典選六年頗有聲稱時人曰前有裴馬後有盧李裴即行儉馬謂戴李謂朝隱會要薑晦為吏部侍郎性聰悟識理體舊制吏曹舍宇悉布棘以防令史為與選人交通及晦領選事盡除之大開銓門示無所禁私引署者晦輒知之召問莫不首伏初朝廷以晦改革前規咸以為不可竟銓綜得所賄賂不行舉朝歎伏唐新語馬載為吏部侍郎時考功員外劉思立子憲為河內慰思立今日亡明日選人有索憲闕者載深咨嗟以為名教所不容乃書其無行注冬集朝廷咸曰真銓綜流品之司可謂振理風俗也其人北出選門為衆目所視衆口所謂趦趄失步上韋陟為吏部侍郎常病選人冒名接腳竊授闕員既少取士良難正調者被擠偽集者冒進陟剛毅嫉惡風采嚴正見選人疑其有瑕按聲盤詰無不首伏每歲皆賸得數百員闕以待淹滯常謂所親曰使陟掌銓衡一二年則無人可選矣唐書韋陟嘗任吏部侍郎有一致仕官敘五品陟判之曰青壇展慶曾不立班朱紱承榮無宜臥時人推其強直政能唐新語李乂字尚貞為吏部侍郎仍知制誥與宋璟等同典選事請謁不行時人語曰李下無蹊徑制敕不便輒駮正貴幸有求官者睿宗曰朕非有靳顧李乂不可過耳唐書王丘為吏部侍郎典選纍年甚稱平允擢用山陰尉孫逖桃林尉張鏡微湖城尉張晉明進士王泠然皆稱一時之秀舊唐崔沔分掌吏部十銓事以清直歷祕書監上時為語曰丘山岌岌連天峻沔水澄澄徹底清分紀四代選部房頴叔拜天官侍郎自其高祖景伯至頴叔四代咸居選部時論榮之李季卿拜吏部侍郎俄而兼御史大夫奉使河南江淮宣撫振拔幽滯進用忠廉時人稱之在銓衡數年季卿有宇量性識博達與善人交襟懷豁如其在朝以進賢為務士以此多附之興元初劉滋為吏部侍郎往洪州知選事時京師寇盜之後天下蝗旱穀翔貴選人不能赴價調乃命滋江南典選以便江嶺之人時稱舉職太和四年吏部奏吏部為文昌首曹侍郎為尚書二職銓庭所宜順序廳事故有等衰會要郎位太微五星五帝坐後聚十五星曰哀烏郎位漢書一十五星蔚然曰郎位史記郎位五星在太微中帝坐東北周之元士漢之光祿中散諫議議郎此三署郎中是今之尚書郎占欲其大小均耀光潤有之吉也正義一曰依烏郎府也晉書周官太宰屬官有下大夫蓋郎中之任也秦有郎中以其為郎侍衛居中故曰郎中漢選尚書郎初從三署郎次補之初入尚書臺稱郎中滿歲稱侍郎故郎中之名猶因三署舊號也六典漢魏以來尚書屬或有侍郎或有郎中或曰尚書郎或曰某曹郎或則兩置或為互名雖稱號不同其職一也皆今郎中之任通典明光殿省中皆以胡粉塗壁畫古賢烈女以丹朱漆地故謂之丹墀尚書郎握蘭含雞舌香以其奏事答對欲使氣息芬芳也奏事則與黃門侍郎對揖黃門侍郎稱已聞乃出丞郎月賜赤管大筆一雙隃麋墨一丸六典通典隃麋今泝陽縣出墨不聽所私趙戩字叔茂長陵人也質而好學言稱詩書愛恤於人不論踈密辟公府入為尚書選部郎董卓欲以所私並充臺閣戩拒不聽卓怒召戩欲殺之觀者皆為戩懼而戩自若及見卓引辭正色陳説是非卓雖凶戾而謝之典略明雅山濤為吏部郎文帝與書曰足下蒞事明雅邁時念多所乏今致錢二十萬絲百斤穀二百斛晉書人才既自難知中人已下情偽又難吏部郎以碎事日夜相接非但當正已而已乃當能正人議郎杜默德履亦佳太子庶子崔諒中郎陳淮皆有意正人其次不審有可用者不山濤啓事吏部郎主選舉宜得能整風俗理人倫者通典阮咸為吏部郎史曜出處缺當選山濤薦阮咸曰真素寡欲深清濁萬物不能移也昔在官人之職必妙絶於時詔用陸亮山濤啓事佳吏部徐寧字安期通朗有德素少知名初為輿縣令時廷尉桓彝稱有人倫鑒識護軍庾亮每屬之訪一佳吏部郎彝嘗去職至廣陵尋親舊還遇風停浦中纍日憂悒因上岸見一室宇有似廨署彝訪之云輿縣廨也令姓徐名寧彝既獨行思逢悟賞聊造之寧清惠博涉相遇怡然遂停宿因留數夕與寧結交而別至都謂庾亮曰吾為卿得一佳吏部郎矣亮問所在彝曰人所應有而不必有人所應無而不必無徐寧真海岱清士即遷吏部郎左將軍江州刺史本傳晉傳世説本事王蘊字叔仁為吏部郎欲使時無屈滯曾下鼓急出日迭乃至家去臺數里高褰車帷先後與語不得進也一官缺求者十輩時簡文帝為會稽王輔政蘊輒連狀白之曰某人有地某人有才務存進達各隨其方不得者甘心無怨別傳本傳吏部郎中溫畿字元甫世論以其為人夷曠似玉永嘉官名阮放與從弟孚齊名為吏部郎銓官之任甚有稱譽性清約不理産業為郎不免飢乏王導庾亮以其名士供給衣食放由是得仕晉中興書何尚之字彥德以操立見稱為陳郡謝混所知與之遊處為吏部郎告休定省傾朝送別於治渚及至郡父叔度謂曰聞汝來此傾朝相送可有幾客答曰殆數百人叔度笑曰此是送吏部郎耳非關何彥德也昔殷浩亦嘗作豫章定省送別者甚衆及廢徙東陽船泊征虜亭積日乃至親舊無復相窺者南史與書辭舉王微字景玄吏部尚書江湛舉微為吏部郎微與湛書曰君平生云揚我名者殺我身天爵且猶滅名安用吏部郎哉其舉何陋其事不經非獨縉紳者不道僕妾皆笑之宋書陸慧曉字叔明清介正立不雜交遊會稽內史同郡張圭稱之曰江東裴樂也齊高帝輔政除為尚書殿中郎鄰族來相賀慧曉舉酒曰陸慧曉年踰三十婦父領選始作尚書郎卿輩乃復以為慶邪遷吏部郎尚書令王晏選門生補內外要局慧曉為用數人而止晏恨之送女妓一人欲與申好慧曉不納吏曹郎令史歷政來咨執選事任巳獨行未嘗與語帝遣主書單景俊謂曰都令史諳悉舊貫可共參懷慧曉謂景俊曰六十之年不復能咨都令史為吏部郎也上若謂身不堪便當拂衣而退帝甚憚之後欲用為侍中以形短小乃止南史庾果之字景行幼有孝行宋司空劉勔見而奇之謂曰見卿足使江漢崇望杞梓發聲遷吏部郎參大選上梁顧憲之字士思為吏部郎初其祖凱之嘗為吏部於庭植嘉樹謂人曰吾為憲之種耳至是憲之果為此官然自過江吏部郎不復典大選通典才望兼允孝文在洛欲創革舊制選置百官謂群臣曰與朕舉一吏部郎必使才望兼允者給卿三日假又一日孝文曰朕已得之不煩卿輩也驛徵亮兼吏部郎孝明親政仍兼吏部郎亮自參選事垂將十年廉慎明決為尚書郭祚所委每云非崔郎中選事不辦北史宋繇字體業沮渠蒙遜平酒泉於繇室得書數千卷鹽米十斛而已蒙遜歎曰孤不喜尅李歆欣得宋繇耳拜尚書吏部郎中委以銓衡之任後魏書皇甫瑒光兄椿齡子也位吏部郎性貪婪多所受納鬻賣吏官皆有定價後以丞相高陽王雍之壻為豫州刺史為政殘暴百姓患之北史齊裴叔業之歸魏也衣冠之士預叔業勳者安定皇甫光北地梁祐清河崔高客天水閻慶胤河東柳僧習等魏書此見本傳北史同杜氏通典乃以為韋瑋蓋見傳中有伯昕名而誤耳御覽因之以為韋瑋職官分紀亦以為瑒俱誤銓衡庶品歷選賓僚阮咸直素屢薦未登陸亮忠心裁居敗職自非李重清識李毅恬正何以區分管庫式鑒胥吏陸杜拜吏部郎表吏部郎中裴行儉始設長名榜列銓注期限等法又定州縣升降官資高下以為故事長名榜自此始也選舉志柳公綽字起之武元衡罷相鎮西蜀與裴度俱為元衡判官尤相善先度入為吏部郎度以詩餞別有兩人同日事征西今日君先捧紫泥之句分紀登第集部李建為吏部郎中常曰方今秀茂皆在進士使僕得志當令登第之歲集於吏部使尉緊縣既罷復集稍尉望縣既罷乃尉畿縣而升於朝大凡中人三十成名四十乃至清列遲速為宜既登第遂食祿既食祿必登朝誰不欲也無淹翔以守常限無紛競以來奔捷下曹得其循舉上位得其更歷就而言之其利甚博議者多之國史補吳王潛吳國建遷左司郎中典選事時喪亂之後官失其守譜諜靡散甲簿湮沒真偽相蒙潛雍容款接坐客常滿隨才而接人人自以為得徐知誥相吳掄選有序潛之力也或亡失官諜才無可用者多稟給之九國志劉鼎清泰中為吏部郎中廉侍御史知雜事鼎性若寬易而典選曹按吏有風稜五代史省眼吏部郎二廳先小銓次格式員外郎二廳先南曹次廢置舊説吏部為省眼分紀裴遵度遷吏部員外郎專判南曹天寶中海內無事九流輻湊會府每歲吏部選人盈萬遵度敏識強記精核文贍詳而不滯時稱吏事第一由是大知名李栖筠遷吏部員外郎判南曹栖筠判析有條姦吏氣奪號為神明唐書韋陟字沈衡為吏部員外郎是曹在南宮為眉目在選士為司命公執直筆閲簿書紛拏盤錯一瞬而剖劉禹錫撰神道碑崔郾姿質秀偉神清重雅人望而愛之為吏部員外郎姦吏不敢孤寒無援者不至留滯銓敘之美為時所稱唐書岑羲長安中為廣武令有能名則天嘗令宰相各舉堪為員外郎者鳳閣侍郎韋嗣立薦羲且奏曰恨其從父長倩犯逆為纍則天曰茍有材幹何恨微纍遂拜天官員外郎後遷吏部侍郎時吏部侍郎崔湜太常少卿鄭愔大理少卿李允恭分掌選事皆以贓貨聞羲最守正時議美之舊唐賈言忠曾之父也纍轉吏部員外郎李敬玄兼尚書言忠尚氣及主選不能下貶邵州司馬失武懿宗意下獄幾死唐書劉崇望字希從轉吏部員外郎崔安潛為吏部尚書崇望判南曹滌除宿弊復清選部舊唐李逈秀任考功員外郎知貢舉有進士姓崔者文筆非佳逈秀覽之良久謂曰清河崔郎儀貌不惡鬚眉如戟精彩甚高出身處何量必須進士再三喻而遣之聞者莫不大噱唐書典舉得士席豫開元中纍官主考功員外郎典舉二年大稱得士為時所稱入為吏部侍郎玄宗謂之曰卿已前為考功職事平允故有此授預典選六年復有令譽周墀輔政以韋澳為考功員外郎墀初作相私謂澳曰才小任重何以相救澳曰荷公重知願公無權足矣墀愕然不喻其指澳曰爵賞刑罰非公共欲行者願不以喜怒憎愛行之但令百司群官各舉其職則公斂袵於廟堂之上天下自理何要權耶墀深然之上李渤穆宗即位召為考功員外郎校定京官考不避權幸皆行升黜奏曰三品官考先具如前其四品以下官績具聞奏狀入留中不下議者以宰輔曠官自宜上疏論列而越職釣奇非盡事君之道也上戶部尚書周之地官卿也周禮曰地官司徒帥其屬而掌邦教以佐王安擾邦國應劭云徒衆也司徒主人衆也張鷟云虞書五教實委司徒之班周禮六卿爰開地官之位祝鳩郯子曰祝鳩氏司徒也昭十七百姓不親五品不遜則責司徒尚書太傳素王司徒仲尼為素王顏淵為司徒論語摘輔相靈帝賣官廷尉崔烈入錢五百貫以買司徒烈子均字孔乎亦有時名烈問曰吾作公天下人謂何如對曰大人少有高名不謂不當為公今登其位海內嫌其銅臭烈舉杖擊之均走烈曰子授父撾而走可謂孝乎均曰舜之事父小杖則受大杖而走不陷父於不義烈曰爾以吾為瞽瞍耶司馬彪九州春秋階下讀奏吳孫休初即位戶部尚書階下讀奏通典當陽侯杜元凱為度支尚書內以利民外以救邊備物置用以濟當時之益者五十餘條晉書咸寧五年詔一拜不收使公私俱貴不惟天時乃人事有不盡故也要總者正在度支尚書也其以散騎常侍中書令張華為度支尚書晉起居注初帝與羊祐謀伐吳而群臣多以為不可唯華贊成其策及將大舉以華為度支尚書乃量計運漕決定廟算及吳滅詔褒其勳進封為廣武縣侯晉書吳隱之為度支尚書以竹蓬為屏風坐無氈席後遷中領軍清儉不改每月所得祿才留身糧餘悉分賑親族家人績紡以供朝夕時有困絶或并日而食身布衣不完妻子不沾寸祿上到溉字茂灌為左民尚書溉長八尺眉目如點白晢美鬚髯舉動風華善於應答所蒞以清白自修性又率儉不好聲色宮室單床傍無姬侍自外車服不事鮮華冠履十年一易朝服或至穿補傳呼清路示有朝章而已南史到洽為御史中丞兄溉為左民尚書舊制中丞不得入尚書下舍洽引服親不應有礙刺省評決左丞蕭子雲議許入溉省亦以其兄弟素篤不能相別也上到溉到洽梁書自有傳南史見到彥之傳分紀錯書作劉溉而事文合璧俱因之豈以到姓稍異遂承其誤耶殊誤觀者何胤為左民尚書後辭官隱於若耶山雲門寺勑給白衣尚書祿胤固辭梁書蔡景歷字茂世入守度支尚書舊式拜官在午後景歷拜日適逢輿駕幸玄武觀在位皆侍宴宣帝恐景歷不預特令早拜其見重如此南史長孫平字處均拜度支尚書平見天下州縣多罹水旱百姓不給奏令民間每秋家出粟麥一石已下貧富差等儲之閭巷以備凶年名曰義倉自是州里豐衍民多賴焉隋書民部開皇三年改度支為民部國家修隋志謂之戶部蓋以廟諱故也唐永徽初復改民部為戶部廟諱故也顯慶元年改戶部為度支龍朔二年改度支尚書為司元太常伯初戶部居禮部之後武太后改置天地四時之官以戶部為地官由是遂禮部前通典通典云國家杜祐為唐言也通考因之不改何耶正身奉法鄭善果檢校大理卿兼民部尚書正身奉法甚有善績制與裴寂等十人每奏事及侍立並令升殿與從兄元璹在其數時以為榮分紀王琚佐明皇平內難為戶部尚書帝於琚眷委特異豫大政事號內宰相本傳畢構遷戶部尚書開元四年遇疾上手疏方以賜之時議戶部尚書為凶官遽改授太子詹事冀有愈瘳尋卒分紀版使韋燠辭判戶部歸謂甥姪曰已讓版使矣佳話録周官小司徒中大夫之任也隋煬帝始置民部侍郎唐因之後改為戶部龍朔二年改為司元少常伯通典盧承慶思道孫也美風儀有才幹太宗奇其明辨纍拜民部侍郎太宗嘗問歷代戶口多少之數承慶敘夏殷以後迄于周隋皆有依據太宗嗟賞久之舊唐精擇開元十三年戶部侍郎楊瑒白知慎坐支度失所皆出為刺史上令宰臣及公卿已下精擇堪為戶部者多有薦元紘者將授以戶部尚書時執政以其資淺未宜超授加中大夫拜戶部侍郎元紘因條奏人間利害及時政得失以奏之上大悅因賜衣絹上楊瑒為戶部侍郎帝嘗召宰相大臣議天下戶版延英殿瑒言利病尤詳帝咨賞於是宇文融建檢脫戶餘口瑒執不便融方貴公卿啽默唯唯獨瑒抗議故出為華州刺史唐書無進獻李絳為戶部侍郎判本司事嘗因次對憲宗曰戶部北有進獻至卿獨無何也對曰將戶部錢獻入內藏是用物以結私恩上聳然益嘉其直舊唐不受賂牛僧孺拜戶部侍郎初韓弘入朝以宣武舊事人多流言其子公武以家財厚賂權幸及多言者班列之中悉受其遺俄而父子俱卒孤孫幼小穆宗恐為厮養竊盜乃命中使至其家閲其宅簿以付家老而簿上具有納賂之所唯於僧孺官側朱書曰某月日送牛侍郎物若干不受却付訖穆宗按簿甚悅居無何議命相帝首可僧孺之名上張平叔長慶中為戶部侍郎狡險大言因王播以進既掌財用常屈公利以便私嬖幸多狎之既有寵於上進退便僻雜以優諧或自稱老奴復無大臣之體嘗奏事畢降階復升又有論奏佻蕩輕脫上每為笑容之在班列間玩狎郎吏譁肆無忌奕權監法請宰相為之使因以自求樞機之任每有內制出輒疑授已整衣冠以俟後人多笑之上張平叔國之材臣也計能析秋毫吏畏如夏日司會逾月綱條甚張况師旅未息調食方急倚成取濟非爾而誰非智能則事不可成非諒直則吾難近噫職局之外得不思稱官望而厭我心乎白氏長慶潘孟陽父炎禮部侍郎母劉晏女也公卿多父友及外祖賓從故得薦用德宗末王紹以恩幸數稱孟陽之才因擢戶部侍郎憲宗初命孟陽巡江淮且察東南鎮之政理時孟陽以氣豪權重領行從三四百人所歷鎮府但務遊賞與婦女為夜飲至鹽鐵轉運院廣納財賄補吏職而已及歸大失人望罷為大理卿後復拜戶侍孟陽氣尚豪俊不拘小節居第頗極華峻憲宗微行至樂遊原見其宏敞工猶未巳問之左右以孟陽對孟陽懼而罷工作性喜宴公卿朝士多與之遊時指怒者不一俄以風緩不能行憲宗每事求理常發江淮宣慰使左司郎中鄭敬奉使辭上誡之曰朕宮中用度一匹已上皆有簿籍唯賑恤貧民無所計算卿經明行修今登車傳命宜體吾懷勿學潘孟陽奉使所至但務酣飲遊山寺而已舊唐初孟陽為侍郎年未四十其母謂曰以爾之才而位丞郎使吾憂之唐書盧汝弼簡求子也從昭宗遷後至太原李克用纍奏戶部侍郎太原使府有龍泉亭簡求節制時手書詩一章在亭之西壁汝弼復為亞帥每亭中宴集未嘗居賓位西向俯首而已舊唐下大夫周官司徒屬官有下大夫蓋郎中之任也六典魏有農部郎中通典魏為左民右民後又為民部民曹皆戶部也上吳張溫為戶曹郎事類高構字孝基徵拜比部侍郎尋轉民部時內史侍郎晉平東與兄子長茂爭嫡尚書省不能斷朝臣三議不決構斷而合理上以為能召入內殿勞之曰我聞尚書郎上應列宿觀卿才識方知古人之言信矣嫡庶者禮教之所重我讀卿判數遍詞理愜當意所不能及也賜米百石由是名知隋書韋維少嘗業儒博涉文史舉進士自大理丞纍至戶部郎中善於剖判時員外郎宋之問工於詩時人以為戶部有二妙唐書初維為郎蒔柳于廷及虛心兄弟居郎省對之輒斂容自叔前後至郎中者數人世號郎官家上湊字彥宗祖叔諧貞觀中為庫部郎中與弟吏部郎中叔謙兄主爵郎中季武同省時號三列宿上武儒衡纍遷戶部郎中時皇甫鏄以宰相領度支剝下以媚上無敢言其罪者儒衡上疏論列鏄密訴其事帝曰勿以儒衡上疏卿將報怨耶鏄不復復言儒衡氣岸高雅論事有風彩群邪尤惡之舊唐晉宋以還尚書省置員外郎分判曹事唐朝事彌重其選舊例郎中不歷員外選謂之土山頭景龍中趙謙光自彭州司馬入為大理正遷戶部郎中賀陟為員外乃戲詠之曰員外從來美郎中望不優誰言粉署裏翻作土山頭謙光酬之曰錦帳隋時設金爐任意薰唯慚員外置不應列星文唐新語賫本對唱崔仁師為度支郎中嘗奏度支財物數千言手不執本太宗怪之令黃門侍郎杜正倫賫本仁師口對唱一無差殊太宗大奇之唐書盧昌衡字子均為僕射祖孝徵所薦遷尚書金部郎孝徵每曰吾用盧子均為尚書郎自謂無愧幽明矣隋書畢諴歷駕部員外郎倉部郎中故事勢門子弟鄙倉駕二曹居之者不悅惟諴受命恬然恭遜口無異言執政多之唐書呂太乙遷戶部員外戶部與吏部鄰司吏部移牒戶部令牆宇悉豎棘以防令史交通太乙報牒曰眷彼吏部銓綜之司當須簡要清通何必豎籬插棘省中賞其俊拔唐新語裴向字傃仁為京兆府戶曹轉櫟陽渭南縣令奏課皆第一朝廷亟聞其理行擢為戶部員外郎舊唐長慶中孟簡遷倉部員外郎屬順宗登極王叔文竊政驟為戶部侍郎簡為其屬中立正色挺然不附叔文心忌而不敢退黜言於宰相韋執誼換刑部員外郎唐上書貪猥李石用金部員外郎韓益判度支案益坐贓繫臺石奏曰臣以韓益曉錢穀録用之不謂貪猥如此帝曰宰相但知人則用有過則懲卿所用人且不掩其惡可謂至公從前宰相用人有過曲為蔽之不欲人彈劾此大謬也但知能則舉舉不失職則獎之自然易得其人何必容隱舊唐張濬為支部員外郎黃巢將逼關輔濬託疾請告侍其母挈族避亂沈州賊犯京師僖宗出幸途無供頓衛軍不得食漢陰令李康獻糗餌數百騾網軍士始得食僖宗召康問之曰卿為縣令安操心及此康對曰臣為塵吏安敢有此進獻張濬員外教臣也帝異之上禮部尚書周之春官也唐虞之時秩宗典三禮周禮春官大宗伯掌建邦之天神人鬼地祗之禮通典主賓契為司徒百姓和親夔主賓客遠人必至典略昔舜命伯夷典禮后夔典樂至周并為宗伯之任今禮部尚書蓋其任也南豐擬制宋辨字義和文帝征馬圈留辨以官官兼祠部尚書攝七兵事及行執其手曰國之大事在祀與戎兵服卿綰攝二曹辨頓首辭謝辨劬勞王事恩遇亞於李沖北史東晉宋齊梁陳皆有祠部尚書隋置禮部尚書唐因之龍朔二年改為司禮太常伯光宅元年改禮部為春官通典陳叔達字子聰太宗時拜禮部尚書建成元吉嫉害太宗陰行譖毀高祖惑其言將有貶責叔達固諫乃止至是太宗勞之曰武德時危難潛構知公有讜言今之此拜有以相答也舊唐祝蝹禮部尚書祝欽明頗涉經史不間時務博碩肥腯頑滯多疑臺中小吏號之為蝹蝹者肉塊無七竅秦穆公時野人得之僉載韋綬字子章轉禮部尚書穆宗嘗問穰災祈福其可必乎綬對曰昔宋景公以一善言而法星退之三舍此禳災以德也漢文帝除祕祝每於祠祭盡敬而已言無所祈以明福不可以求致也而二君卒能變已變之災享自致之福著於史傳其理甚明如失德以祈災消媚神以祈福至神茍有知當因以致譴非祈禳之道也時人主失德綬因以諷之典朕三禮大舜委於伯夷分勑六卿成王任於彤伯建茲歲首實曰春官敦敘九族之親欽若五常之教祀天郊地之典舉其宏綱朝日夕月之儀撮其機要張鷟集小宗伯小宗伯之職掌建國之神位周禮禮部侍郎周之春官小宗伯也六典大宗伯亦曰春卿小宗伯亦曰秩宗白帖今侍郎隋煬帝置龍朔二年改為司禮少常伯韋陟為禮部侍郎陟好接後輩尤鑒于文雖詞人後生靡不諳練曩者主司取與皆以一場之善登其科目不盡其才陟先責舊文仍令舉人自通所工詩筆先試一日知其所長然後依常式考核片善無遺美聲盈路舊唐賀知章遷禮部侍郎屬惠文太子薨有詔禮部選挽郎賀知章取舍非允門蔭子弟喧訴盈庭乃以梯登墻首出決事時人咸嗤之由是改授工部侍郎上舊制考功員外郎掌貢舉開元二十三年考功員外郎李昂為進士李權所詆朝議以考功位輕不足以臨多士至二十四年遂以禮部侍郎掌焉開元天寶之中升平既久群士務進天下髦彥由其取舍故勢傾當時資與吏部侍郎等同通典李揆字端卿乾元初兼禮部侍郎揆嘗以主司取士多不考實徒峻其隄防索其書策殊未知藝不至者文史之囿亦不能摛詞深昧求賢之意也其試進士文章請於庭中設五經諸史及切韻本於床而引貢士謂之曰大國選士但務得才經籍請恣尋檢由是數月之間美聲上聞舊唐鮑防進禮部侍郎得穆質等時比歲旱策問陰陽祲袗質對漢故事免三公卜式請烹弘羊指當時輔政者右司郎中獨孤愐欲下質防不許曰使上聞所未聞不亦善乎卒致質高第帝見策嘉揖唐書為侍郎時嘗遇知雜侍御史竇參於通衢道騎不時引避僕人為參所鞭及參秉政處令致仕防謂親友曰吾與蕭昕之子齒而與昕同日懸車非朽邁之致以餘忿見廢防文學舊人歷職中外不因罪戾而為俗吏所擯竟以憤終衆頗憫防而咎參故參之敗不旋踵非不幸也舊唐甄幽抑華陰郢字公楚為禮部侍郎時四方士務朋比更相譽薦以動有司徇名亡實郢疾之乃謝絶請謁顓行藝司貢部郎三歲甄幽獨抑浮華流競之俗為衰唐書韋貫之名純為禮部侍郎所取士抑浮華先行實于時流競為息嘗從容奏曰禮部侍郎重於宰相憲宗曰侍郎是宰相除安得重曰然則陛下柬宰相者得無重乎帝美其言改尚書右丞上建中初令狐峘為禮部侍郎宰相楊炎出故宰相杜鴻漸門下其子封求弘文生以託峘峘謝使者曰得公手署峘得以識炎不疑著送之峘即日奏言宰相迫臣以私從之負陛下不從則害臣帝以詰炎炎具道所以然帝怒曰此姦人無可奈何欲殺之炎苦救解乃貶衡州別駕上錢徽字蔚章長慶元年為禮部侍郎時宰相假文昌出鎮蜀川文昌好學尤喜圖書古畫故刑部侍郎楊憑兄弟以文學知名家多書畫鐘王張鄭之迹在書斷畫品者兼而有之凌子渾之求進盡以家藏書畫獻文昌求致進士第文昌將發面託錢徽繼以私書保薦翰林學士李紳亦託舉子周漢賓於徽及榜出渾之漢賓皆不中選李宗閔與元稹素相厚善初稹以直道譴逐久之及得還朝大改前志由徑以徼進達宗閔亦急取二人遂有嫌隟楊汝士與徽有舊是歲宗閔子壻蘇巢及汝士季弟殷士俱及第故文昌李紳大怒文昌還朝一日內殿面奏言徽所放進士鄭朗等十四人皆子弟藝薄不當在選中穆宗以其事訪於學士元稹李紳二人對與文昌同遂命中書舍人王起主客郎中知制誥白居易於子亭重試內出題目孤竹管賦鳥散餘花落詩而十人不中選尋貶徽為江州刺史中書舍人李宗閔劍州刺史右補闕楊汝士開江令初議貶徽宗閔汝士令徽以文昌李紳私書進呈上必開悟徽曰不然茍無愧心得喪一致修身慎行安可以私書相證耶令子弟焚之人士稱徽長者既而穆宗知其朋比之端舊唐王起字舉乏代錢徽為禮部侍郎掌貢二年得士尤精先是貢舉猥濫勢門子弟交相酬酢寒門俊造十棄六七及元稹李紳在翰林深怒其事故有覆試之科及起考貢士奏當司所選進士據所考雜文先送中書令宰臣閲視可否然後下當司放榜從之議者以為起雖避是非失貢職也上高鍇開成元年為禮部侍郎凡掌貢部三年每歲登第者四十人三年榜出後勑曰進士每歲四十人其數過多則乖精選官途填委要窒其源宜改每年限放三十人如不登其數亦聽然鍇選擢雖多頗得實才抑豪華擢孤進至今稱之上賈至轉禮部侍郎是歲至以時艱歲歉舉人赴省者奏請兩都分試從之兩都試舉人自此始也唐書德宗貶劉太真為信州刺史太真為禮部侍郎性怯懦詭隨其掌貢舉宰臣姻族方鎮子弟先收擢之又嘗敘陳少遊勳績擬之桓文大招物議因斯貶上後唐同光初裴皥拜禮部侍郎前後三知貢舉晉高祖時宰相桑維翰亦成名於皥榜下嘗謁皥於私第皥不迎不送或問之答曰皥見維翰於中書則庶寮也維翰見皥於私館則門生也何送之有人亦重於耿介五代史屢針闕體孔逖字世遠好典故學與王儉至交升明中為齊臺尚書儀曹郎屢針闕體多見信納上謂王儉曰逖貞所謂儀曹不參闕職也南史劉杳字士深博綜群書沈約任昉以下每有遺忘皆訪問焉纍遷尚書儀曹郎僕射徐勉以臺閣大儀專委杳焉上梁武帝問吏部尚書徐勉求一有學藝解朝儀者為尚書儀曹郎勉曰孔休源識見清通詳練故事自晉宋起居注誦略上口武帝亦素聞之即日除尚書儀曹郎時多所改作每建訪前事休源即以所誦記隨機斷決曾無疑滯吏部任昉常謂之孔獨誦上賀德基字承業世傳禮學祖文發父淹仕梁俱為祠部郎並有名當世德基少遊學都下積年不歸衣資罄乏又耻服故弊盛冬止衣夾襦袴嘗於白馬寺前逢一婦人容服甚盛呼德基入寺門脫白綸巾以贈之仍謂曰君方為重器不久貧寒故以此相遺耳問姓名不答而去德基於禮記稱為精明位尚書祠部郎雖不至大官而三世儒學俱為祠部郎時論美其不墜上時吳郡顧越弱冠遊都下通儒碩學必造門質疑討論無倦與文發相埒故都下謂之發越焉上韋叔夏授春官員外郎則天將拜洛及享明堂別受制與當時大儒祝欽明郭山惲撰定儀注衆咸推服之唐書許孟容字公範為濠州刺史德宗知其才召為禮部員外郎有公主之子請補弘文館諸生孟容舉令式不許公主訴於上命中使問狀孟容執奏竟得遷本曹郎中上李玨字待價幼孤事母以孝聞甫冠舉明經李絳為華州刺史見之曰日角珠廷非庸人相明經碌碌非子所宜乃更舉進士高第為殿中侍御史宰相韋處厚曰清廟之器豈擊摶才乎除禮部員外郎上崔淡舉止秀峙纍進禮部員外郎當時士大夫以流品相尚推名德者為之首咸通中世推李都為大龍甲涓豪放不得預雖自抑下猶不許而淡與焉上瑞錦窠舊説員外郎為瑞錦窠員外郎廳前有大石諸州府納到廢印皆於石上碎之又圖寫祥瑞亦員外廳所掌令狐楚元和初任詩曰移石幾回敲廢印開箱何處送新圖冰廳祠部呼為冰廳言其清且冷也因語録舊説吏部為省眼禮部為南省舍人考功度支為振行比部得廊下食以飯從者號比盤二十四曹呼左右司為都公省中語曰後行祠屯不慱中行都門中行禮部不慱前行駕庫國史補舊説禮部郎中掌省中文翰謂之南宮舍人唐職林宋神宗與宰執議更官制至禮部郎中曰此南宮舍人非他曹比可除劉摯王鞏聞見録司馬夏官大司馬之職掌以九伐之法正邦國制軍誥禁以紏邦國領校人牧師職方司兵之屬即今兵部之任也通典尚書大司馬亦曰夏卿職林大司馬馬武也大總武事也大司馬亦曰古者兵車一車四馬故以馬名官韋昭辨釋名訓馬為武者取其建行釋名夏官謂之大司馬後周統六師司馬掌邦政統六師平邦國書蠻夷猾夏寇賊姦宄則責之司馬書大傳雎鳩雎鳩氏司馬也左昭大司馬其在少昊則雎鳩氏之任顓頊以司馬主火堯命羲叔為司馬夏官也虞夏二代以司夏官棄居其職周成王以畢公高為司馬楚漢之際曹無咎周殷始居其職齊王圭之職儀陏有兵部尚書蓋因後周兵部之名兼前代五兵之職龍朔二年改兵部尚書為司戎太常伯侍郎為少常伯光宅元年改為夏官通典李懷遠中宗時為兵部尚書雖久居榮位而彌尚簡率園林宅室無所改作常乘款假馬左僕射豆盧欽望謂曰公榮貴如此何不買駿馬乘之答曰此馬幸免驚蹶無假別求聞者莫不歎美舊唐郭震字元振為兵部尚書玄宗初即位十一月講武驪山既三令帝親鼓之元振遽奏禮止帝怒軍容不整引坐纛下將斬以徇劉幽求張説於馬前諫曰元振有翊贊大功雖有罪當從原宥乃赦之流於新州尋又思其舊功起為饒州司馬上令狐楚檢校兵部尚書奏諸道新授節度使等執弓弩帶器仗就尚書省兵部參辭伏以軍國異容古今定制事不由舊斯為改常未聞省閣之門忽內弓刀之器鄭注外蒙恩寵內畜凶狂首創姦謀將興亂兆致王璠郭行瑜之輩敢驅將吏直詣闕庭震驚乘輿騷動京國雖既往不咎而其源尚開伏乞速令停罷如須參謝即具公服從之舊唐元祐七年上祀南郊公以兵部尚書為鹵簿吏上因太廟宿齋行禮畢特至青城儀衛甚肅五使乘車至景靈宮東櫺門外忽有赭蓋犢車百餘兩衝突而來東坡呼御營巡檢使立於車前曰西來誰何敢爾亂行曰皇后并某國太夫人國婆婆某國大長公主也東坡曰可以狀來比至清城諭儀仗使御史中丞李端伯之純曰中丞職當肅政不可不聞李以中宮不敢言東坡曰軾當自奏即於青城上疏劾之明日中使傳命申敕有司嚴整仗衛談記小司馬兵部侍郎夏官小司馬中大夫之任也六典太宗有事遼東以楊弘禮有文武林擢拜兵部侍郎專典兵機之務弘禮每入參謀議出則統衆攻戰駐蹕之陳所向摧破太宗自山下見弘禮所統之衆人皆盡力殺獲居多甚壯之謂許敬宗等曰越公兒郎故有家風矣舊唐楊弘武為司戎少常伯高宗謂云某人何因輒授此職對曰臣妻韋氏性剛悍以此人見囑臣若不從恐有後患以諷帝用后言也帝笑不罪隋唐嘉話新唐崔湜為兵部侍郎父挹為禮部侍郎父子同為南省副二有唐已來未之有也舊唐衛次公字從周為兵部侍郎選人李績徐有功之孫名在黜中次公召而謂之曰子之祖先勳在王府豈限常格並優秩而遣之舊唐韋澳字子斐遷兵部侍郎與同寮蕭置深為宣宗所遇每二人同直無不召見詢訪時事每有邦國刑政大事中使傳宣草詞澳心欲論諫即曰此一事須降御札方敢施行遲留至旦必論其可否上旨多從之韋處厚字德載正拜兵部侍郎謝恩於思政殿時昭愍狂恣屢出畋遊每月坐朝不三四日處厚因謝從容奏曰臣有大罪伏乞面首帝曰何也處厚對曰臣前為諫官不能先朝死諫縱先聖好畋及色以至不壽臣合當誅然所以不死諫者亦為陛下此時在春宮年已十五今則陛下皇子始一歲矣臣安得更避死亡之誅上深感悟其意賜錦綵一百匹銀器四事上盧元輔字子望杞子也為兵部侍郎元輔自祖至曾以名節著於史册元輔簡潔貞方綽繼門風歷踐清貫人亦不以父之醜行為纍人士歸美上兵部侍郎張燾力詆拜詔之議秦檜患之燾託疾在告檜使樓照諭之曰北扉闕人上欲以公為直院宜早出燾大駭曰愈不敢出矣若使草國書豈能曲徇意旨哉燾嘗思之不過一去檜不能奪遂止中興係年録顧琛字弘瑋遷尚書庫部郎元嘉七年文帝遣到彥之經略河南大敗悉委棄兵甲武庫為之空虛文帝宴會有歸化人在座上問琛庫中伏猶有幾許琛詭辭答有十萬人仗舊庫仗祕不言多少上既發問追悔失言及琛詭對上甚善之南史江智深元嘉末除尚書庫部郎時高流官序不為臺郎智深門孤援寡獨有此選意甚不悅固辭不拜上馮子琮字子琮皇建初為尚書駕部郎中攝庫部孝昭曾閲簿領試令口陳子琮暗對無有遺失北史姚崇遷夏官郎中時契丹寇陷河北數州兵機填委元崇剖析若流皆有條貫則天甚奇之超遷夏官侍郎舊唐盧奕懷慎之子與兄奐齊名開元中任京兆司録參軍天寶初為鄠縣令兵部郎中所歷有聲皆如奐之所治也上李憕驟歷兵部郎中憕有吏幹明於几案甚有當官之稱上蕭願梁宰相傾之子性淳謹承事父母未嘗不束帶而見然性嗜酒無節職事弛慢為兵部郎中日掌告身印覃恩之次頗怠職事父傾為吏部尚書代願視印篆其散率如此五代史韋執誼始未顯時不喜人言嶺南州縣既為郎嘗詣職方觀圖至嶺南輒瞑目命左右徹去及為相所坐堂有圖不就省既易旬試觀之崔州圖也以為不祥惡之果貶死唐書杜正倫太宗聞其名令直秦府文學館魏徵表薦正倫以為古今難匹遂擢授兵部員外郎太宗謂曰朕今令舉行能之人非朕獨私於行能者以其能益於百姓也朕於宗親及以勳舊無行能者終不任之以卿忠直朕今舉卿卿宜勉稱所舉舊唐廷無稽牒張嘉貞字嘉貞遷兵部員外郎時功狀盈几郎吏不能決嘉貞為詳處不閲旬廷無稽牒進中書舍人唐書王翰字子羽并州人長史張嘉貞厚遇之翰自歌以舞屬嘉貞神氣軒舉自如張説至禮益加舉超拔群類擢駕部員外郎家畜聲伎目使頤令自視王侯人莫不惡之上李渤字濬之擢為庫部員外郎會皇甫鎛輔政務剝下佐用度渤上言渭南源鄉戶四百今才四十閺鄉戶三千今才一千他州縣大抵類此其敝始於攤逃人之賦願下詔賜禁止計不三年人必歸于農夫農國之本本立然後可以議太平又言道途不修驛馬多死憲宗覽疏驚異即以飛龍馬數百匹付畿內諸驛舊唐韋溫字弘育姚勗知河陰院嘗雪冤獄鹽鐵使崔琪奏加酬獎乃令權知職方員外郎制出令勗省上溫執奏曰國朝已來郎官最為清選不可以賞能吏上令中使宣諭言勗能官且放入省溫堅執不奉詔乃改勗檢校禮部郎中翌日帝謂楊嗣復曰韋溫不放姚最入省有故事否嗣復對曰韋溫志在銓擇清流然姚最士行無玷梁公元崇之孫自殿中判鹽鐵案陛下獎之宜也若人有吏能不入清流孰為陛下當煩劇者此衰晉之風也上素重溫亦不奪其操上周之秋官卿也唐虞之時士官以正五刑周禮秋官大司寇掌邦之三典以佐王刑邦國蓋其任也通典爽鳩郯子曰爽鳩氏司寇也左國之二柄在德與刑邦之三典惟清與慎大舜有欽恤之言穆王有哀矜之教爽鳩之為司寇務在擇人皋陶之作士師期於致理張鷟賊曹尚書二曹論曰劉道真問薛令長在吳何官答曰為吏部尚書問曰吳待吏部何如餘曹答曰並通高選吏部特一時之俊劉曰晉魏以來俱爾獨謂漢氏重賊曹為是吳晉重吏部為非薛君曰八座秩同班等其選並清宜同一揆若人才或多或少選例難精如不得已吏部職掌人物人物難明謂吳晉為得而君何是古而非今劉難曰今吏部非為能刊虛名舉沉朴者故録以成人位處三署聽曹探卿論而用之耳無煩乎聰明賊曹職典刑獄刑獄難精是以尤重之答曰今之賊曹不能聽聲觀色以別真偽縣不能斷讞之尚書也夫在獄者率小人在朝者率君子小人易檢君子難精俱不得已吏部宜重賊曹宜輕也華談集羊侃為都官尚書尚書令何敬容用事與之並省未嘗遊造左衛蘭欽同侍宮宴詞色少交侃於坐折之曰小子汝以銅鼓買朱異作父韋粲作兄何敢無宜適朱時在席後宦者張僧胤嘗候侃侃曰我床非閹人所坐竟不前之時論美其貞正南史徐孝克陳禎明元年入為都官尚書自晉以來尚書官僚皆攜家屬居省省在臺城內下舍中門有閣道東西跨路通于朝堂其第一即都官省西抵閣道年代久遠多有鬼怪每夜昏之際無故有聲光或見人著衣冠從井中出須臾復沒或門閣自然開閉居多死亡尚書確卒於此省孝克代確便即居之經兩載祅變皆息時人咸以為貞正所致上隋初有都官尚書開皇三年改為刑部尚書唐龍朔三年改刑部尚書為司刑太常伯侍郎為少常伯武后改刑部為秋官天寶初改為憲部通典劉祥道遷司刑太常伯每覆大獄必歔欷纍歎奏決之日為之再不食唐書李適之拜刑部尚書適之雅好賓友飲酒一斗不亂夜則宴賞晝決公務庭無留事上崔隱甫潔介自守以強正稱為刑部尚書帝欲相之也牛仙客可與語卿常見否曰未也帝曰可見之隱甫終不詣他日又問對如初帝乃不用子弟或問故答曰吾不以其人微易之也其材不逮中人可與之對耶贊曰巖挺之拒宰相不肯見李林甫崔隱甫違詔不屈牛仙客信剛者乎二人坐皆是不得相彼亦各申志也唐書涇師之亂關播與盧杞等從駕幸奉天既而盧杞白志貞趙贊等並貶黜播尚知政事中外囂然以為不可遂罷相改刑部尚書大臣韋倫等泣於朝曰宰相不能嘉猷翊贊以至今日而尚為尚書天下何由致理可痛心也聞者敬憚之舊關韋傳柳公綽為刑部尚書京兆人有姑鞭婦致死者府斷以償死公綽議曰尊歐卑非鬥且其子在以妻而戮其母非教也竟減死唐書小司寇周之秋官小司寇中大夫也六典小司寇之職掌外朝之政以致萬民而詢焉周禮唐有大獄即命御史中丞刑部侍郎大理卿充謂之大三司使唐職林妙擇其人太宗謂侍臣曰張亮有義兒五百畜養此輩將何為也正欲反耳命百寮議其獄多言亮當誅唯將作少匠李道裕言亮反形未具明其無事太宗既盛怒竟斬于市籍沒其家歲餘刑部侍郎有闕令執政者妙擇其人纍奏皆不可太宗曰朕得其人也往者李道裕議張亮云反形未具此言當矣當時雖不即從至今追悔遂授道裕刑部侍郎舊唐奚陟字殷卿遷刑部侍郎裴延齡惡京兆尹李充有能政專意陷害之誣奏充結陸贄數厚賂遺金帛充既貶官又奏充比者妄破用京兆府錢穀至多請令比部勾覆以比部郎中崔元翰陷充留惡贄也詔許之元翰曲附延齡劾治府史府史到者雖無過犯皆笞決以立威時論喧然陟乃躬自閲視府案且得其實具獄上充既免元翰既不遂其志因此憤恚而卒上王播字明轉刑部侍郎播長於吏術雖案牘鞅掌剖析如流黠吏詆欺無不彰敗時天下多故法寺議讞科條繁雜播備舉前後格條置之座右凡有詳決疾速如神當時屬僚歎服不暇上劉瑑遷刑部侍郎乃衰彙敕令可用者由武德訖大中凡二千八百六十五事類而析之參訂重輕號大中刑律統類以聞法家推其詳唐書李林甫開元中遷大子中允時源乾曜為侍中乾曜之男潔曰其父曰李林甫求為司門郎中乾曜曰郎官須有素行才望高者哥奴豈是郎官耶哥奴林甫小字也蔣沇以刑部郎中兼侍御史元載持政守道士類不遷沇以故滯郎位不得調衮代相問士議恨沇屈故擢御史中丞唐書馮宿字拱之為都官員外郎淮德平除比部郎中制詞曰亟則失情緩則留獄深則礙恕縱則生姦準是四者持刑之難唐書孔帖鄭谷為都官郎中作詩自賀且為序云故許昌薛尚書能嘗為都官郎中後數歲故建州李員外頻自憲府內彈拜都官員外郎皆一時騷雅宗師都官之曹振盛於此余早年請益實受深知今忝此官復是正秩分紀鄭谷詩名盛於唐末號雲臺編而世俗但稱鄭都官詩其詩多佳句但格不甚高梅聖俞晚年官亦至都官一日會飲劉原父戲之曰聖俞官必止於此坐客皆驚原父曰昔有鄭都官今有梅都官也聖俞頗不樂未幾聖俞病卒其詩為宛陵集而今人但謂之梅都官詩一言之讖後遂果然斯可嘆也唐有大獄以刑部員外郎御史大夫大理寺官為之以決疑謂之小三司使職林武元衡為華原令時畿輔有鎮軍督將恃恩務功者多撓吏民元衡苦之乃稱病去官放情事外沉浮宴詠者久之德宗知其才召授比部員外郎劉乃大曆十二年召拜司門員外郎十四年崔祐甫秉政素與乃友善會加郭子儀尚父以册禮久廢至是復行之祐甫令兩省官撰册文未稱旨召乃至閣草之立就詞義典裁祐甫歎賞久之遂擢為給事中德宗時盧南史坐事貶信州司馬至郡準例得聽吏一人每月請紙筆錢一千文刺史姚驥初奏以為贓又劾南史買鉛燒黃丹德宗遺御史鄭楚相刑部員外郎裴澥大理評事陳正儀充三司同往按鞫裴澥獨奏曰臣按姚驥奏狀事非巨蠹上曰燒鉛何如澥曰燒鉛為丹格令不禁今忽録此小事令三司使往恐遠方聞之各懷憂懼臣堪任此行即請獨往德宗欣然曰卿言是矣令狐峘大曆中改刑部員外郎德宗即位將厚奉元陵垣上疏諫略曰臣讀漢書劉向傳見論王者山陵之誠良史稱歎萬古芬芳詔答曰朕頃議山陵心方迷謬卿聞見該通識度弘遠深知不可形於至言非惟中朕之病抑亦成朕之躬免朕獲不子之名皆卿之力也敢不聞義而徙收之桑榆奉以始終期無失墜古之遺直何以加焉杜牧嘗於宰執求小儀不遂請小秋又不遂嘗夢人謂曰辭春不及秋昆腳與皆頭後果得比部員外冬官工部尚書周之冬官卿也晏類要尚書大司空亦曰冬卿白帖爽鳩爽鳩氏司空也左危東六星兩兩而北曰司空主水金守之天下憂水春秋元命苞下理上和下理坤道上和乾光謂之司空漢官解話溝瀆壅遏水為民害田廣不墾則責之司空尚書大傳主土司空主土不言土而言空空尚主之况於實乎白虎通冬官司空掌邦事營城廓都邑立社稷宗廟造塋宅器械監百工環濟要略禹為司空披九山通九澤決九州使各以其職來貢地方五千里至于荒服魚通典略位當玄武之官職在司空之任虞舜之代伯禹統其班周成之朝毛公處其地張鷟集宋以武公之諱改司空為司城楚改司空為莫敖秦置御史大夫省司空齊職儀禹長於地理水泉九州得括象圖故堯以為司空尚書刑德放孔子中仕為中都宰二年定公以為司空乃別五土之性而物其所生之宜咸得厥所家語王梁初為野王令世祖議選大司空而赤伏符曰王梁主衛作玄武帝以野王衛之所徙衛文君自濮陽徙於野王玄武水神之名司空水土之官也於是擢拜梁為大司空華嶠後漢書晉宋以來有起部尚書陳沈衆為起部尚書后周有冬官大司空卿掌五材九範之法隋有工部尚書因後周工部之名兼前代起部之職龍朔二年改工部尚書司平太常伯侍郎為司平少常伯武后改為冬官通典長孫平字處均為工部尚書名為稱職時有人告都督邴紹非毀朝廷為憒之者上怒將斬之平諫曰川澤納污所以成其深山嶽藏疾所以就其大臣不勝至願願陛下以山海之量茂德裕之德鄙誇曰不癡不聾未堪作大家翁此言雖小可以喻大隋書閻立本顯慶中代兄立德為工部尚書兄弟相代為八座時人榮之總章元年以司平太常伯拜右相二唐時立本為右相薑恪為左相立本無他才識時以善畫稱之恪嘗纍為將軍立功塞外是歲京師飢旱弘文崇賢司成三館學生並放歸本貫當時為之語曰左相宣威沙漠右相馳譽丹青三館學生放散五臺令史明經通典右相馳價丹云明經以末使進身者可為炯戒新語時人以千文為語曰左相云丹青舊于時左相云丹青之嘲唐事與工書無于立本事三書不同附之李栖筠字貝一為工部侍郎關中舊仰鄭租二渠溉田而豪戚壅上遊取磑利且百所奪農用十七栖筠請皆撤毀歲得租二百萬民賴其入魁然有宰相望元載忌之唐書胡證字啓中太和中以校檢工部尚書為回鶻和親使舊制行人有私覿禮縣官不能具召富人子納資於使而命之官證請儉省費以絶鬻官之濫次漠南虜人欲屈脅之且言使者必易胡服又欲主便道疾驅者證固不從以唐官儀自將訖不辱命還拜工部侍郎證旅力絶人晉公裴度未顯時羸服私飲為武士所窘證聞突入坐客上引觥三釂客皆失色因取鐵燈檠摘枝葉櫟合其跗橫膝上謂客曰我欲為酒令飲不釂者以此擊之衆唯唯證一飲輒數升次授客客流離盤杓不能盡證欲擊之諸惡少叩頭請去證悉驅出故時人稱其俠上柳彧字幼文為屯田侍郎時制三品已上門皆列戟左僕射高熲子弘德封應國公申牒請戟彧判曰僕射之子更不異居父之戟槊已列門外尊有厭卑之義子有避父之禮豈容外門既設內閣又施事竟不行熲聞而歎伏隋書通典云煬帝除侍字武德三年加中子官故置侍郎郎中之間能賦詩裴讓之字士禮吳見田郎中省中語曰能賦詩裴讓之與楊愔友善相遇則清談竟日愔每云此人風流警拔斐文季為不亡矣梁使至常令讓之攝主客郎北史宣撫之才沈扶為屯田郎中充山南道宣撫使至鄧州奏內鄉縣行布黃澗兩場倉督鄧琬等先主掌湖南江西運到糙米至淅川縣於荒野中囤貯除支用外六千九百四十九石裛爛成灰塵度支牒徵元掌所由自貞元二年鄧琬父子兄弟至元孫相成二十八年前後禁死九人今琬孫及元孫見在枷禁勑曰如聞鹽鐵度支兩使此類極多其鄧琬等四人資産全賣納禁繫三代庾死獄中實傷和氣鄧琬等並踈放天下州府監院如此類不得禁經三年已上速便踈理以聞議嘉扶有宣撫之才唐書員外郎六典六部主事隋煬初置唐以後無事可見張文瓘遷水部員外郎時兄文琮為戶部侍郎舊制兄弟不許並居臺閣遂出為雲陽令舊唐省中司門都官屯田虞部主客皆間簡無事時諺曰司門水部入省不數人角之戲有假作吏部令史及虞部令史相見忽然俱到悶絶良久云冷熱相激南部天官陳蕃上書云昔明帝公主為子求郎不許賜千萬左右問之帝曰郎天官也以當敘德何可妄與人耶今陛下以郎比一把菜臣以為反側也汝南先賢傳王坦之郎中少年時江彪為僕射領選擬之尚書郎人有詔王者王曰自過江來尚書郎正用第二人何以擬我聞之而止世説故事叔父兄弟不許同省為郎然官格令不載亦無正勑正觀二年韋叔謹除刑部員外郎三年韋季武除庫部郎郎中太宗謂曰知卿兄弟近任尚書省故授卿此官欲成一家之美無避稍屈資也其後同省者甚多近日非特恩除拜即須相回避也通典尚書郎自兩漢已後妙選其人唐武德貞觀已來尤重其職吏兵部為前行最為要劇自後行改入皆為美選考功員外專掌試貢舉人員外郎之最望者司門都門屯田虞水膳部主客皆在後行間簡無事先天中王上客為侍御史自以才望清雅妙當入省常望前行忽除膳部員外郎微有悵惋吏部郎中張敬忠戲詠之曰有意嫌兵部專心望考功誰知腳踜蹬却落省東膳部在省中最東北隅故有此句兩京新記趙華旱擅高名在官途五十年纍經貶謫蹇躓備至而入仕三十年方霑省官身在郎署天中記卷三十一
