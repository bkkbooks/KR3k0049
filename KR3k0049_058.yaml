body:
  text: 鳳羽蟲之長羽蟲三百六十而鳳為之長也家語鳳凰鶉火之禽陽之精也德能致之其精畢至鶡冠子火精鳳火精也孔演圖雄曰鳳雌曰凰其雛為鸑鷟或曰鳳凰一名鸑鷟一名鶠毛毛詩草蟲經鳳非梧桐不棲非竹實不食非醴泉不飲在天為朱雀詩義疏鳳有六像九包六像者一曰頭像天二曰目象日三曰背像月四曰翼像風五曰足像地六曰尾象緯九包者一曰口包命二曰心合度三曰耳聽達四曰舌詘伸五曰彩色光六曰冠矩州七曰距鋭鈎八曰音激揚九曰腹戶行鳴曰歸嬉止鳴曰提扶夜鳴曰善哉晨鳴曰賀世飛鳴曰郎都知我唯黃持竹實來故子欲居九夷從鳳嬉論摘衰聖丹穴之山其上有鳥焉其狀如雞五采而文名曰鳳凰首文曰德翼文曰義背文曰禮膺文曰仁腹文曰信是鳥也飲食自然自歌自舞見則天下安寧南山經夫木行為仁為青鳳頭上青故曰戴仁也金行為義為白鳳纓白故曰纓義也火行為禮為赤鳳背赤故曰負禮也水行為智為黑鳳胸黑故曰向智也土行為信為黃鳳足下黃故曰蹈信也抱朴子鳳凰之翔至德也雷霆不作風雨不興川谷不淡草木不搖而燕雀佼之以為不能與之爭於宇宙之間還至其曾高逝其萬仞之上翱翔於四海之外遇崑崙之疏圃飲砥柱之湍瀨邅回蒙汜之渚尚佯冀州之際徑躡都廣入日抑節羽翼弱水暮宿風穴當此之時鴻鵠鶬鸖莫不僤驚伏竄注喙江裔又况直燕雀之類乎淮覽冥鳳凰上擊九千里絶雲霓負蒼天翱翔乎杳冥黃帝即位宇內和平思見鳳凰之象以問天老天老曰夫鳳象鴻前而麟後蛇頭而魚尾龍文而龜身燕頷而雞喙駢翼而中注首戴德項揭義背負仁心抱忠翼挾信足履正尾繫武小音合鍾大音合鼓延頸奮翼五彩備舉光動八風氣應時而食有質飲有儀往即文始來即嘉成遊必擇所飢不妄下其鳴也雄曰節節雌曰足足昏鳴曰保章舉鳴曰上翔集鳴曰歸昌此謂鳳像夫唯鳳為能究萬物通天祉象百狀達於道律五音成九德去則有災見則有福覽九州觀八極備文武正王國嚴照四方仁聖皆伏故得鳳像之一者則鳳過之得二者鳳下之得三者則春秋下就之得四者則四時下之得五者則終身居之黃帝曰於戲盛哉於是乃備黃冕帶黃紳齋於中宮鳳乃蔽日而降黃帝降自東階西面稽首曰皇天降茲敢不承命於是鳳乃遂集東囿食帝竹實棲帝梧樹終身不去韓詩説苑黃帝黃服齋於中宮坐於玄扈洛水之上有鳳凰集不食生蟲不履生草或止帝之東園或巢於阿閣或鳴於庭其雄自歌其雌自舞黃帝以問天老天老曰臣聞之國安其主好文則鳳凰居之國亂其主好武則鳳凰去之今鳳凰翔於東郊而樂之其鳴音中夷則與天相副以是觀之大有嚴教以賜帝帝勿犯也宋志黃帝治天下鳳凰翔於庭律之初生寫鳳之音二皇鳳至於庭伏羲神農三代鳳止於門堯舜禹周室鳳至於澤德彌澆所至彌遠德彌精所至彌近淮南聲若簫詩曰鳳凰秋秋其翼若干其聲若簫有鳳有凰樂帝之心此不蔽之福也荀解蔽篇逸詩帝蓋謂堯也注鳳凰蹌蹌匪堯之庭楊子舜父有目失在家貧厄邑市而居舜父夜臥夢見一鳳凰自名為雞口銜米以食已言雞為子孫視之是鳳凰以黃帝夢書占之此子孫當有貴者舜占猶之比年糴稻穀中有錢舜也乃三日三夜仰天自告過舜前舐之目霍然開劉向孝子傳司晨帝舜曰朕惟不入百獸鳳晨中候百獸率舞鳳凰司晨鳴注元帝論云鳳闕司晨之功火無內照之美梁書食竹實孟戲人首鳥身其先為虞氏馴百禽夏后之末民始食卵孟戲去之鳳凰隨焉止於丹山去九疑萬八千里此山多竹長千仞鳳凰食竹實孟戲食木實括地圖翠虬覩化益而登玄雲靈鳳值孟戲而反丹穴抱朴子麟鳳以形狀為別聖人以心神為異古者太平之世鳳凰常居其國而生乳至夏后始食卵而鳳去之此則鳳有種明矣上成王時旃塗國獻鳳雛育於靈禽苑及封泰山禪社首之後文彩炳耀飛走之類不復喧鳴之成王崩沖飛而去拾遺洪邁光堯挽詩鼎湖龍去遠社首鳳來遲上周公旦攝政七年制禮作樂鳳凰翔庭成王援琴而歌曰鳳凰翔兮於紫庭余何德兮以感靈賴先王兮恩澤湊臻于胥樂兮民以寧琴操成王著儀鳳之歌宋志鳴鳥耇造德不降則鳴鳥不聞矧曰其能有格書君奭鳴鳥謂鳳也鄭注魏明帝詔管寧曰夫以姬公之聖而茍德不降則鳴鳥弗聞國志鳳凰以嘉鳴為貴吳志吾粲教莊子曰老子見孔子從弟子五人問曰為誰對曰子路為勇其次子貢為智曾子為孝顏回為仁子張為武老子嘆曰吾聞南方有鳥其名為鳳凰之所居也積石千里河水出下鳳鳥居止天為生食其樹名瓊枝高百仞以璆琳琅玕為實天又為生離珠一人三頭遞臥遞起以伺琅玕鳳鳥之文戴聖嬰仁右智左賢逸篇西王母曰仙之上藥有九色鳳腦次藥有蒙山白鳳之脯漢武內傳宣帝以皂蓋一乘賜霍光悉以金鉸具至夜車轄上鳳凰輒亡去莫知所之至曉乃還如此非一守車人亦嘗見後南郡黃君仲北山羅鳥得鳳凰入手即化成紫金毛羽冠翅宛然具足可長尺餘守車人列上云今月十二日夜車轄止鳳凰俱飛去曉則俱還今則不返恐為人所得光甚異之具以列上後數日君仲詣闕上鳳凰子云今月十二夜北山羅鳥所得帝聞而疑之置承露盤上俄而飛去帝使尋之直入光家止車轄上乃知信然帝取其車每遊行即乘御之至帝崩鳳凰飛去莫知所在稽康詩云翩翩鳳轄逢此網羅齊諧記威鳳宣帝元康四年南郡獲威鳳宋志宣帝神爵元年詔曰南郡獻白虎威鳳為寶晉灼云鳳之有威儀者與尚書鳳凰來儀同意紀威鳳以難見為神走麝以遺香不捕關尹子孫盛與桓溫箋云州遣從事觀採風聲進無威鳳來儀之美退無鷹鸇摶擊之用徘徊湘川將為怪鳥晉書梁簡文為太子時與劉孝儀令曰賢從弟遵威鳳一羽足以見其五德南史劉傳太宗嘗追思王業艱難佐命之力乃作威鳳賦賜長孫無忌曰有一威鳳憩翮朝陽晨遊紫霧夕飲玄霜資長風以舉翰唳天衢而鳳翔舊唐五鳳三年詔曰三月辛丑鸞鳳集長樂宮東闕中樹上飛下止地文章五色留十餘刻吏民並觀前漢紀群鳥向立甘露三年二月鳳皇集新蔡群鳥四面行列皆向鳳凰立以萬數宋志建武十七年鳳皇至高八九尺毛羽五彩集穎川郡群鳥從之蓋地數頃留十七日乃去東觀記晉穆帝升平四年二月辛亥鳳皇將九子見鄖鄉之豐城十二月甲子又見豐城衆鳥隨從宋志銜詔石季龍與皇后在觀上有詔書五色紙著鳳口中鳳既銜詔待人放數百丈緋繩轆轤回轉鳳凰飛下鳳以木作之五色漆畫硃腳皆用金鄴中記文帝元嘉十四年太鳥二集秣陵民王覬園中李窠上狀如孔雀頭足小高毛羽鮮明文彩五色音聲諧和衆鳥如山雞者隨之行三十步頃東南飛去彭城王義康以聞改鳥所集永昌里謂之鳳凰里宋志起臺于山因名鳳凰臺金陵志鳳皇樓在鳳皇臺上宮苑記鵠引孝武帝孝建元年正月庚申鳳凰見丹徒愒賢亭雙鵠為引衆鳥陪從征虜將軍武昌王渾以聞宋志長壽三年十一月陳州上言苑丘縣鳳凰集衆鳥數萬前後翊從行列齊整色別為群後三日改元儀鳳唐志宋景德元年五月七日午時白州有三鳳自南入城衆禽周繞至萬歲寺前棲高木上身如龍長九尺高五尺其文五色冠如金杯至申時飛向北去州畫圖來上貽謀録金泰和四年六月磁州武安縣南鼓山北石聖臺鳳凰見鳳從東南來衆鳥周圍之大者近內小者在外以萬萬計地在屯區村村民懼為官司所擾謀逐去之驅牛數十頭擊柝從之牛未至二里即有鷙鳥振翼而起翼長丈餘下擊二水牯肉盡見骨水牯即死於是衆始報官鳳凰高丈餘尾作鯉狀狀而色殷九子差小翼其傍鳳為日景所照則有二大鳥更迭盤旋庇廕之至日入則下留三日乃從西北摩空而上縣中三日無鳥雀鳳去後人視其處有鯉魚重五六十斤者食餘尚有數頭臺傍禽鳥糞兩溝皆滿小禽不敢飛動餓死者不可勝計村民疑臺下有異私掘之三尺餘石罅中直插金劍一取不能盡擊析得其半以火煆欲分之劍見火光金蟬散飛而去癸辛雜志徐知諤知潤州好奇寶怪物所蓄不可計有蜀估持鳳首至自言得之徼外蠻夷狀如雄雞廣五寸冠上正平可用為枕朱冠金喙文彩煥爛如生人咸異之陸遊南唐書洞玄本行經云西方衛羅國王有女字曰配瑛與鳳共處於是靈鳳常以羽翼扇女面後十二年中女忽有胎王意怪之因斬鳳頭埋著長林丘中後生女名曰皇妃王女思靈鳳之遊好駕而臨之長林丘中歌曰杳杳靈鳳綿綿長歸悠悠我思永與願違萬劫無期何時來飛是鳳鬱然而生抱女俱飛徑入雲中梅福上成帝書云夫鳶鵲遭則仁鳥增逝愚者蒙戮則知士深退本傳鳶音緣鴟也梧禽梧禽不與鴟梟同枝麟虞不與豺狼連群抱朴子交際篇梧禽激響於朝陽麟雲覿靈而來出龜龍吐藻於河湄景老摛耀於天路詰鮑篇靈鳥簫韶未九成靈鳥未紆儀也抱朴靈禽嗈喈於阿閣儀禽均儀禽於唐序同舞獸於虞庭張率舞馬賦五鳳皆五色為瑞者一為孽者四其四皆似鳳並為妖一曰鷫鸘鳩喙圓目身義戴信嬰禮膺仁負智至則役之感也二曰發明烏喙大頸翼大身仁戴智嬰義膺信負禮至則喪之感也三曰焦明長喙疏翼圓尾身義戴信嬰仁膺智負禮至則水之感也四曰幽昌兌目小頭大身細足脛若鱗葉身智戴信負禮膺仁至則旱之感也國語曰周之興也鸑鷟鳴岐説文曰五方神鳥東方曰發明南方曰焦明西方曰鷫鸘北方曰幽昌中央曰鳳凰樂叶圖徵青鳳謂之鶡赤鳳謂之鶉黃鳳謂之鸞白鳳謂之鷫紫鳳謂之鷟禽經凡五方之鳥皆似鳳而非也東方發明總全身青西方鷫鸘全身總白南方焦明全身總赤北方幽昌亦曰退居全身總黑中央鳥名玉雀亦曰鳳凰全身總黃人鏡經南恩州北甘山壁立千仞有瀑水飛下猿狖不能至鳳凰巢其上彼人呼為鳳凰山所食亦蟲魚遇大風雨或飄墮其雛小者猶如鶴而足差短南人截取其觜謂之鳳凰杯爾雅翼在笯屈原賦鳳凰在笯兮雞雉翔舞笯鳥籠也思玄賦纚朱鳥以承旗朱鳥鳳也楚辭曰鳳皇翼其承旗也桯盛曰丹霄之鳳青冥之龍鍾會集言李彤四部曰弔鳥山俗傳曰鳳死於上歲七月至九月群帝來集其上刻鳳公輸之刻鳳也冠距未成翠羽未樹人見其身者謂之鳩鵄見其首者名曰鴮鸅皆訾其醜而笑其拙及鳳之成翠冠雲聳朱距電搖錦身霞散綺翮炎發翽然一翥翻翔雲棟三日而不集然後讚其奇而稱其巧劉子火離火離為鸞元命包天樞得則鸞集運斗樞鸞瑞鳥一曰雞趣首翼赤曰丹鳳青曰羽翔白曰化冀玄曰陰翥黃曰土符禽經鸞鳥者赤神之精鳳凰之佐雞身赤色色亦被五彩鳴中五音肅肅雍雍喜則鳴舞人君進退有度親踈有序則至一本曰心識鍾律律調則至鳴舞以和之瑞應圖鸞者鳳鳥之亞始生類鳳久則五彩變易故字從變省禮斗儀曰天下太平安寧則見其音如鈴臠巒然也周之文物大備法車之上綴以大鈴如鸞之聲也後改為鑾禽經注女床女床之山有鳥焉其狀如翟而五彩文名曰鸞鳥見則天下安寧西山經自歌軒轅之國諸夭之野鸞鳥自歌鳳鳥自舞鳳凰卵民食之海外西經廣都之野鸞鳥自歌海內經沃野鸞鳥自歌大荒西北狄之國有桂山有五彩鳥三名一曰皇鳥一曰鸞鳥一曰鳳鳥上孔穎達曰燕雀有啁噍之感鸞鳳有歌舞之容説文長離長麗前掞光耀明瓚曰長麗靈鳥也故相如賦云前長離而後矞皇舊説云鸞也張衡思玄賦亦曰前長麗使拂羽漢樂志後書思玄注長離鳳也潘嶽贖陸機詩婉婉長離凌江而翔英英朱鸞來自南岡傳咸贈何劭王濟詩雙鸞遊蘭渚二離揚清暉皆以離為鳳崑崙圖云鸞鳥似鳳而白纓聞樂則蹈節而舞至則國安樂其雌曰和抱朴子氐羌獻成王時氐羌獻鸞説文蒼鸞西王母曰神仙藥次有靈丘蒼鸞漢武內傳王阜為重泉令鸞鳥集止學宮阜使掾沙疊為張雅樂擊磬烏舉足垂翼應聲而舞止縣庭留十餘日乃去東觀記棲槐辛繕字公文治春秋讖緯隱居華陰光武徵不至有大鳥高五尺雞頭燕頷蛇頸魚尾五色備舉而多青棲繕槐樹旬時不去弘農太守以聞詔問百寮咸以為鳳太史令蔡衡對曰凡象鳳者有五多赤色者鳳多青色者鸞多黃色者鵷雛多紫色者鸑鷟多白色者鵠今此鳥多青乃鸞非鳳也上善其言王公聞之咸遜位避繕不起決疑注對鏡舞罽賓國王結罝峻岐之山獲一鸞鳥王甚愛之欲其鳴而不能致乃飾以金樊享以珍羞而鸞對之愈戚三年不鳴夫人曰聞鳥見其類而後鳴可懸鏡以映之王從言鸞觀影感契慨焉悲鳴哀響中宵一奮而絶范太鸞鳥詩序豫章洪井有鸞岡洪崖先生乘鸞所憩泊也謝莊嘗遊豫章觀井賦詩言鸞岡四周有水謂之鸞陂水經注梁武帝太清元年捨身光嚴重雲殿時海中浮鵠山去餘姚岸可千餘里上有女人年三百歲有女官道士四五百人年並出百但在山學道遣使獻紅席帝方捨身時其使適至云此草嘗有紅鳥居下故其為名觀其圖狀則鸞鳥也南史本紀隋煬帝大業十一年有二孔雀自西苑飛集寶城朝堂前親衛校尉高德孺十餘人見之奏以為鸞時孔雀已飛去無可得驗於是百官稱賀詔以德孺誠心冥會肇見嘉祥擢拜朝散大夫餘人皆賜束帛仍於其地造儀鸞殿通鑑雜記云馬德儒煬帝好聞祥瑞常有野雀集于殿上當上校尉唱云此是鸞鳥有衛士報云村野之中大有此物校尉乃令衛士仍奏為鸞煬帝不究真虛即以為瑞仍名此殿為儀鸞嗤笑至今未弭唐會要軒渠國多九色鳥青口緑頸紫翼紅膺紺頂丹足碧身緗背玄尾亦名九尾鳥亦名錦鳳其青多紅少謂之繡鸞常從弱水西來或云是西王母之禽也通典大秦後鸞吪鳳翥鸞舉百羽從之鳳靡鸞吪百鳥瘞之禽經乾皋斷舌則坐歌孔雀拍尾則立舞人勝之也鸞入夜而歌鳳入朝而舞天勝之也埤雅特栖感鸞鷖之特栖兮悲淑人之希合思玄賦駟玉虬以乘鷖兮溘埃風余上征王逸曰鷖鳳別名也廣雅曰鷖鳳屬也山海經曰蛇山有鳥五色飛蔽日名鷖鳥九疑山有五彩之鳥名鷖北溟有魚其名為鯤鯤之大不知其幾千里也怒而飛其翼若垂天之雲是鳥也海運則將徙於南溟溟者天池也齊諧者志怪者也諧之言曰鵬之徙於南溟也水擊三千里摶扶搖而上者九萬里去以六月息者也故九萬里則風斯在下矣而後乃今培風背負青天而莫之夭閼者而後乃今將圖南莊子楚文王少時好畋獵天下快徇名鷹畢聚焉有人獻一鷹曰非王鷹之儔文王見之瓜頭神爽殊絶常鷹故為獵於雲夢置網雲布煙燒漲天毛群飛旋爭噬兢搏此鷹軒頸瞪目遠視雲際無搏噬之志王曰吾鷹所覆以百數汝鷹曾無奮意將欺余耶獻者曰若效於雉兔臣豈敢獻俄而雲際有一物翱翔飄颻鮮白而不辨其形鷹見之便竦翮而升矗若飛電須臾羽墮如雪血下如雨良久有一大鳥墮地而死度其兩翅廣數十里喙邊有黃衆莫能識時有博物君子曰此大鵬雛也始飛故為鷹所制文王乃厚賞獻者幽明録孔氏志怪漢武帝時西域獻黑鷹得鵬雛衆莫識惟東方朔識之崑崙層期國出大鵬飛則蔽日能食駱駝人拾得其翅裁為水桶元成吉思皇帝西征萬餘里有大鳥其一羽足以蔽千人蓋鵬類也食龍飲鳳齊景公謂晏子曰寡人既得寶乘聚萬駟矣方欲珠懸黎會金玉其得之即奚若晏子曰臣聞琬琰之外有鳥焉曰金翅民謂為羽豪其為鳥也非龍肺不食非鳳血不飲其食也常飢而不飽其飲也常渴而不充生未幾何夭其天年而死珠玉之珍非乃為君之患也符子初武帝夢金翅鳥下殿庭搏食小龍無數乃飛上天及明帝即位誅高武子孫盡明帝名鸞故也北齊龍類有四種生卵生胎生濕生化生亦有四種生金翅鳥食之欲搏取龍時以兩翅扇海令開乃銜出起世經鶴者陽鳥也而遊於陰因金氣依火精以自養行必依洲嶼止不集林木蓋羽族之宗長仙人之麒驥也相鶴經鶴愛陰而惡陽鴈愛陽而惡陰禽經散幽經以驗物偉胎化之仙禽鍾浮曠之藻質抱清逈之明心鮑昭舞鶴賦鶴胎生者形體堅小惟食稻梁雖甚馴熟久須飛去鸛合而卵生其體大食魚蝦喙蛇鼠不能去耳雲嶠類要影生鶴影生今鶴雌雄相隨如道士步斗屐其迹而孕內典英偉不群而幽蕙之芳駭峻槩獨立而臯禽之響振抱朴子聆臯禽之夕聞月賦遇九臯之介鳥兮怨素意之不逞遊塵外而瞥天兮據冥翳而哀鳴思玄賦鶴鳴九折之澤聲聞於天此增益也鶴鳴參天夫則不聞鳴在於澤云何謂乎論衡藝增篇鶴大如鵝長三尺腳青黑高三尺餘赤頰赤目喙長四寸多純白亦有蒼色者今人謂之赤頰常夜半鳴其鳴高朗聞八九里唯老者乃聲下今吳園中及士大夫家皆養之雞鳴時亦鳴詩義疏鶴知夜半説題辭鶴水鳥也夜半水傍感其生氣則喜而鳴注禽問曰多言有益乎對曰蝦蟇日夜鳴口乾而人不聽之鶴雞時夜而鳴天下振動多言何益墨子鳴鶴戒露此鳥性警至八月白露降流於草上滴滴有聲因集高鳴相警移徙所宿處慮有變害也風土記露禽鶴也露下則鶴鳴凡鶴之馴養於家庭者飲露則飛去禽經注玄鶴千載則變蒼又千載則變黑所謂玄鶴也古今注離騷曰緣鶴飾玉后帝具饗后帝謂殷湯也言伊尹始仕緣烹鶴鳥之羹修飾玉鼎以事殷湯湯賢之遂以為相也李嶠攀龍臺碑蓄弘圖於緣鶴之鼎周昭王時塗修國獻青鳳丹鶴各一雌一雄以潭皋之粟飴之以溶溪之水飲之拾遺記化鶴周穆王南征一軍盡化君子為猿為鶴小人為蟲為沙抱朴子獻血天子飲於孟氏爰舞白鶴二八穆天子傳至於巨搜氏巨搜之人乃獻白鶴之血以飲天子上狄人伐衛懿公好鶴鶴有乘軒者將戰國人受甲者皆曰使鶴鶴實有祿位豫焉能戰左傳衛侯喜鶴有飾以文繡而乘軒者賈子晉平公鼓琴有玄鶴二八而下銜明珠舞於庭一鶴失珠覔得而走師曠掩口而笑瑞應圖晉平公遊於河而樂曰安得賢士與之樂此也船人蓋嘗跪而對曰君不好士耳何患無士乎公曰吾食客門左千人門右千人可謂不好士乎對曰夫鴻鵠高飛遠翔一舉千里所恃者六翮耳背上之毛腹下之毳無分寸之數益一把飛不為加高損一把飛不加下不知門下左右客千人者亦有六翮之用乎將皆背上之毛腹下之毳耶韓詩外傳班固薦郭基云進有羽翮奮翔之用後漢桓帝時楊喬薦孟嘗曰實羽翮之美用非徒腹背之毛上郭祖深上武帝封事曰今之所任腹背之毛耳梁書蔡景歷與陳霸先書且為腹背之毛脫充鳴吠之數陳書白鵠翔師曠鼓通於神明而白鵠翔瑞應圖田饒事魯哀公而不見察謂哀公曰夫雞有五德猶曰瀹而食之者以其所從來近也夫黃鵠一舉千里止君園池啄君稻梁君猶貴之以其所從來遠也故臣將去君黃鵠舉矣齊王使淳于髡獻鶴於楚出邑門道飛其鶴徒揭空籠造詐成辭往見楚王曰齊王使臣來獻鶴過於水上不忍鶴之渴出而飲之去我飛亡吾欲刺腹絞頸而死恐人之議吾王以鳥獸之故令士自傷殺也鶴毛物多相類者吾欲買而代之是不信而欺吾王也欲赴他國奔亡痛吾兩主使不通故來服過叩頭受罪大王楚王曰善齊王有信士若此哉厚賜之財倍鵠在也史記説苑魏文侯使舍人蔡無澤獻鶴於齊莊辛謂楚襄王曰黃鵠遊乎江海淹乎大沼俯噣鱔鯉仰囓菱衡奮其六翮而凌清風飄搖乎高翔自以為無患與人無爭也不知夫射者方將修其碆盧治其矰繳將加已乎百仞之上被㔋磻引微繳折清風而抎矣故晝遊乎江河夕調乎鼎鼐楚策還丹使大司命君茅盈與弟定録中君固保命小君衷曾各來白鵠集分句曲之山時人互有見者父老謠歌曰茅山連金陵江湖據下流三神乘白鵠各治一山頭召雨灌旱稻陸田亦復柔妻子咸保室使我百無憂白翔鵠青天何時復來遊漢明帝永平二年詔立廟祀之邑人呼為白鵠廟昔人有至心好道入廟請命者或聞二君在帳中與人言語或見白鵠在帳中白鵠者是服九轉還丹使能分形之變化也亦可化作數十白鵠或可乘之以飛行而本形故在所止也茅君內傳昭帝始元元年春二月黃鵠下建章宮太液池中公卿上壽賜諸侯王列侯宗室金錢各有差漢書黃鵠太鳥一舉千里非白鵠也師古注上為歌曰黃鵠飛兮下建章羽肅肅兮行蹌蹌金為衣兮菊為裳唼喋荷荇出入蒹葭自顧菲薄愧爾嘉祥西京雜記黃鵠出東海以其來集為祥廣志噲參養母至孝曾有玄鶴為戎人所射窮而歸之參牧養治療瘡愈放之後鶴夜到門外參炳燭視之雌雄各至銜雙明珠報參焉搜神記張氏家傳曰禧字彥祥除效轂令有鶴負矢集禧庭禧以甘草湯洗之傳藥留養十餘日瘡愈飛去月餘銜赤玉珠二枚置禧庭事鶴髓王莽以鶴髓漬縠種學仙漢書遼東城門有華表柱忽有一白鶴來集徘徊空中言曰有鳥有鳥丁令威去家千歲今來歸城郭如故人民非何不學仙去空伴冢纍纍遂上沖天續搜神記駕鶴夏口城據黃鵠磯世傳仙人安子黃鵠過此上也邊江峻險樓櫓高危瞰臨沔漢應接司部南齊志費禕登仙嘗駕黃鶴返憩於此遂以名樓唐圖經荀環字叔偉事母孝好屬文及道術潛栖却粒嘗東遊憩江夏黃鶴樓上望西南有物飄然降自霄漢俄頃已至乃駕鶴之賓也鶴止戶側仙者就席羽衣虹裳賓主歡對已而辭去跨鶴騰雲眇然煙滅述異記閻伯理梅記云王室載懷思仲宣之能賦仙蹤可揖嘉叔偉之芳塵黃鶴來時歌城郭之並是浮雲一去惜人世之俱非英華世説云陸機河橋敗為盧志所讒被誅臨刑嘆曰欲聞華亭鶴唳可復得乎八王故事曰華亭吳豢縣郊外墅也有清泉茂林吳平後陸機兄弟共遊於此十餘年語林云機為河北都督問驚角之聲謂孫丞曰問此不如華亭鶴唳晉羊祜鎮荊州江陵澤中多有鶴常取之教舞以娛賓客因名鶴澤後人因之遂呼江陵郡名為鶴澤方輿劉遵祖爰之少為殷中軍所知稱之於庾公庾公甚欣然便取為佐既見坐之獨榻上與語劉爾日殊不稱庾小失望遂名之為羊公鶴昔羊叔子有鶴善舞嘗向客稱之客試使驅來氃氋而不肯舞故稱比之世説僧支道林好鶴時有遺其雙鶴者翅長欲飛林意惜之乃鎩其翮鶴軒翥不能復起乃舒翼反顧視之如似懊喪意林公曰既有凌霄之姿何肯為人作耳目近玩養令翮成置使飛去上合璧引沖天白帖沖雲世説俱誤雷門鶴郡西有白鶴山古老相傳云此山昔有晨飛鵠入會稽雷門鼓中於是雷門鼓鳴洛陽聞之孫恩時斫此鼓見白鶴飛出翱翔入雲此後鼓無復遠聲後人呼為潛鶴鼓臨海記石虎時揚州獻黃鵠雛五泛之于玄武池頸長一丈聲聞十餘里載記化女晉安帝元興中一人年出二十未婚然目不干色曾無穢行嘗行見一女甚麗謂少年曰聞君自以柳季之儔亦復有桑中之歡耶女便歌少年微有動色後復重見之少年問姓云姓蘇名瓊家在途中遂邀還盡歡從弟突入以杖打女即化雌白鵠廣記斷腸廬山遠法師未出家善弩射嘗於鶴窟射得鶴雛後復伺鶴母見將射之鶴不動翔觀之已死於窠中疑其愛子致死破視心腸皆寸絶法師於是放弩發菩薩心江㧾集宋元嘉初鎮北將軍王仲德鎮彭城左右出獵遇一鶴將二子悉禽之歸以獻王王使養其小者口為人所裂遂不能飲食大者輒含粟哺之飲輒含水飲之先令其飽未嘗忘也王甚愛之令精加養視大者羽翮先成每翥沖天小者尚未能飛大者終不先出留飲飴之又於庭中騫躍教其飛揚六十餘日小者能飛乃與俱去述異記齊高帝鎮淮陰為宋明帝所疑被徵為黃門郎深懷憂慮見平澤有群鶴乃命筆詠之曰八風舞遙翮九野弄清音一摧雲間志為君苑中禽以示荀伯玉玉占之言帝不成行俄而帝卒復本任謝昌寓陳郡人也為劉悛廣州參軍孝性甚至嘗養一鵠昌寓病二旬而鵠二旬不食昌寓亡而鵠遂飛去南史孝義傳好鶴唳梁書曰庾域母好鶴唳域在位營求孜孜不怠一旦雙鶴來下論者以為孝感所致南史湘東王修竹林堂新陽太守鄭裒送雌鶴於堂留其雄者尚在裒宅霜天月夜無日不鳴商旅江津聞者墮淚時有野鶴飛赴堂中驅之不去即裒之雄也交頸頡頑撫翼聞奏鐘磬翻然共舞婉轉低昂妙契絃節渚宮故事武成二年春二月雙白鶴飛集上林園大將鄭偉布戈設罝並皆禽獲六翮已摧雙心俱怨相顧哀鳴孤雄先絶孀妻向影天子愍焉立使庾信為讚英華煬帝大業二年太府少卿何稠課州縣送羽毛民求捕之網羅被水陸禽獸有堪氅眊之用者殆無遺類烏程有樹高踰百尺旁無附枝上有鶴巢民欲取之不可上乃伐其根鶴恐殺其子自投氅衣投于地時人或稱以為瑞曰天子造羽翼鳥獸自獻毛羽隋書五行記天皇東封鶴集其壇使諸州為老氏築宮號以白鶴杜光庭靈驗記病鶴李衛公遊嵩山見鶴呻吟曰我鳥仙為樵者傷腳得人血則愈李公解衣即刺血鶴曰世間人至少公且未是乃令拔眼睷毛持往來都下但映眼照之即知矣李公中路自視乃馬頭也至東洛所遇非少悉非全人皆犬彘驢馬之類惟一老翁是人李公言病鶴之意老翁笑下驢宣臂刺血李公得之以塗鶴即愈鶴謝曰公即為明時宰相復當上升相見非遙慎無懈惰李公謝鶴遂沖天而去逸史丹歌池州鳳凰山道士趙自然夢陰真君與柏葉一枝九疊食之因不食神氣異常為詩曰嘗欲棲山島間眠玉洞寒丹歌時引舞來去跨雲鸞或問何名丹歌曰鶴也祕閣間談萬花谷道士趙自然以丹歌為鳳祕閣誤徐州雲龍山西麓有放鶴亭宋山人張天驥所築也山人有二鶴旦則望山西而放暮則傃山東而歸因以為名有客相從各言所志或願為揚州刺史或願多資財或願騎鶴上升其一人曰腰纏十萬貫騎鶴上揚州欲兼三者小説有沐溪野去青田九里中有雙白鶴年年生子長大便去只恆餘父母一隻耳精白可愛多云神仙所養浮丘公相鶴經云青田之鶴永嘉郡記龜鶴壽有千百之數性壽之物也道家之言鶴曲頸而息龜潛匿而噎此其所以為壽也服氣養性者法焉養生要論平涼西有崆洞山乃廣成修道之所山之絶壁有石穴謂之皂鶴洞鶴頂如丹毛羽皆黑日照之金色燦然故其上有金衣亭歲不過一二出金其地乃為僧徒所據鶴或見則僧徒必有死亡返初者墨容揮犀朝鮮知異山中有青鶴洞其境虛曠四隅皆良田沃壤宜播殖惟青鶴栖息其中故以為名志登木玉策記云千歲之鶴隨時而鳴能登於木色純白腦盡成骨其未千歲者終不集于林也抱朴子榮陽郡西有蘭巖山常有雙鶴素羽皎然日夕偶形翔集傳云昔夫婦俱隱此山年數百歲化成此鶴忽一旦一鶴為人所害其一鶴歲常哀鳴至今嚮動巖谷莫知年歲王韶之神境記鵠即是鶴音之轉後人以鵠名頗著謂鶴之外別有所謂鵠故埤雅既有鶴又有鵠蓋古之言鵠不口浴而白白即鶴也鵠名哠哠哠哠鶴也以龜龍鴻鵠為壽壽亦鶴也故漢昭時黃鵠下建章宮太液池而歌則名黃鶴神異經鶴國有海鵠其餘諸書文或為鶴或為鵠者甚多以此知鶴之外無別有所謂鵠也爾雅翼兵爪鶴左右腳裏第一指名兵爪火離火離為孔雀元命包影相釋氏書言孔雀因雷聲而孕酉陽孔雀不必匹合正以音影相接便孕亦與蛇偶一云雌見雄舞而有子南越志或云雄鳴上風雌鳴下風亦孕博物志羅州山中多孔雀群飛者數十為偶雌者尾短無金翠雄者生三年有小尾五年成大尾始春而生三四月後復凋與花萼相榮衰然自喜其尾而甚妬凡欲山棲必先擇有置尾之地然後止焉南人生捕者候甚雨往尾霑而重不能高翔人雖至且愛其尾恐人所傷不復騫翔也雖馴養頗久見美婦人好衣裳與童子絲服者必逐而喙之芳時媚景聞管絃笙歌必舒張翅尾盻睇而舞若有意焉山谷夷民烹而食之味如鵝解百毒人食其肉飲藥不能愈病其血與其首解大毒南人得其卵使雞伏之即成其腳稍屈其鳴若曰都護土人取其尾者持刀於叢篁可隱之處自蔽伺過急斷其尾若不即斷回首一顧金翠無復光彩紀聞孔雀自背及尾皆作圓文五色頭戴三毛長寸以為冠足有距迎晨則鳴相和異物志來翔雲南郡出孔雀常以二月來翔月餘而去華陽國志交趾郡人多養孔雀或遺人以充口腹或殺之以為脯臘人又養其雛為媒傍施網罟捕野孔雀伺其飛下則牽網橫掩之採其金翠毛裝為扇拂或全株生截其尾以為方物云生取則金翠之色不減嶺物異物志魏文帝詔朝臣曰前于闐王山習所上孔雀尾萬枚文彩五色以金根車蓋遙望曜人眼解人語世祖時西域獻孔雀解人語彈指應聲起舞晉公卿贊檀道濟元嘉中鎮潯陽十二年入朝與家分別顧瞻城闕噓欷涕零深識者是知道濟之不南旋也故時人為其歌曰生人作死別荼毒當奈何濟將發舟所養孔雀來銜其衣驅去復至如此數焉以十三年三月伏誅異苑中瑞宋武帝大明五年廣郡獻白孔雀以為中瑞述異記齊文惠太子蕭長懋性奢麗製珍珍之物織孔雀毛為裘光彩金翠過於雉頭遠矣南史本傳貞元中新羅國獻孔雀解舞德宗召邊鸞於玄武門寫貌一正一背翠彩生動金鈿遺妍若運清聲宛轉繁節畫斷辟惡李衛公言孔雀辟惡酉陽與蛇相偶盧肇住在京南海見從事王軒有孔雀一日一奴告曰蛇盤孔雀且毒死矣軒令救之其走卒笑而不救軒怒卒云蛇與孔雀偶耳紀聞鵲見蛇則噪而賁孔見蛇則宛而躍禽經孔雀有九德一顏貌端正二音聲清徹三行步庠序四知時而行五飲食知節六常念知足七不分散八少媱九知反覆佛以此喻比丘之行儀也增一經珠毛孔雀尾端一寸名珠毛翣南蠻婆利左右持孔雀翣盤盤以孔雀羽飾纛南蠻盤盤傳龜茲國孔雀群飛山谷間人取養而食之字乳如雞鶩其王家恆千餘隻後魏書孔雀毛著龍腦則相綴禁中以翠尾作帚每幸諸閣擲龍腦以避穢過則以翠尾帚之皆聚無有遺者亦若磁石引針琥珀拾芥物類相感然也墨莊謾録朱鳥能來能往者朱鳥之謂與鴈一名朱鳥法言謝靈運山居賦海鳥違風朔禽避涼荑生歸北霜降客南接響雲漢侶宿江潭注云朔禽鴈也寒月轉往衡陽禮記霜始降鴈來賓歲莫云鴈北向政是陽初生時荑生歸北霜降客南山宋書鴈之言鴈鴈起聖以招期知晚蚤故鴈南北以陽動也春秋説題辭知時孟春之月鴻鴈來季秋之月鴻鴈來賓季冬之月鴈北鄉禮記白露之日鴻鴈來鴻鴈不來遠人背畔小寒之日鴈北鄉鴈不北鄉民不懷至周書為贄大夫執鴈取其候時而行也婚禮下達納采用鴈鄭玄云納其采擇之禮用鴈取順陰陽往來也周官以六禽作贄大夫執鴈以知保身儀禮贄用鴈者取其隨時南北不失其節明不奪女子之時也白虎通凡贄大夫用鴈鴈有類長者在民上必有先後鴈有行列故以為贄春秋繁露以鴈為贄有長幼之禮説苑鴻翼桓公在位管仲隰朋見立有間有二鴻飛而過之桓公嘆曰仲父今被鴻鵠有時而南有時而北有時而往有時而來四方無遠所欲至而至焉惟有羽翼之故是以能通其意於天下乎寡人之有仲父猶飛鴻之有羽翼也管子獻鴈曹伯陽即位好田弋曹鄙人公孫強好弋獲白鴈獻之且言田弋之説因訪政事大説之有寵使聽政焉左傳秦穆公得百里奚公孫枝歸取鴈以賀曰君得社稷之臣實社稷之福公不辭再拜而受説苑秕飼鄒穆公令食鳧鴈必飼以秕無敢以粟賈誼書梁君出獵見白鴈欲自射之道上有驚鴈駭者梁王怒命射此人其御公孫龍諫曰昔衛文公時大旱三年卜云必須人祝文公曰求雨為民也今殺之不仁吾自當之言未卒而雨下今重鴈殺人何異虎狼梁君引龍登車入郭呼萬歲曰善哉今日獵得善言也新序杜鄴與王音書云昔文侯窹大雁之獻而父子益親師古曰文侯廢太子擊擊臣趙倉唐進大雁於文侯應對以禮文侯感窹擊得立前書韓詩外傳作晨鳧更羸與魏王處京臺之下仰見飛鳥更羸謂魏王曰臣為君引弓虛發而下鳥有問雁從東方來更羸以虛發而下之魏王曰然則射可至此乎更羸曰此孽也王曰先生何以知之對曰其飛徐而鳴悲飛徐者故瘡痛也悲者久失群也故瘡未息而驚心未去也聞弦者音烈而高飛故瘡隕也楚策莊子曰莊子行於山中見大木枝葉茂盛伐木者止其傍而不取也問其故曰無所可用莊子曰此木以不材得終其天年出於山舍於故人之家故人喜令豎子殺一鴈而烹之豎子請曰其一能鳴其一不能鳴請奚殺主人曰殺不能鳴者明日弟子問曰昨日山中之木以不材得終其天年今主人之鴈以不材死先生將何處莊子笑曰周將處夫材與不材之間莊山木張單雙災木鴈兩失宋明帝譬王彧傳定州唐縣中有鴻山關者昔項羽於此關見群鴻乃誓衆曰我當南面必中其一乃引滿射之莫有中者乃折弓投地而去時知項羽終不能濟伐也武帝太始三年幸東海獲赤鴈作朱鴈之歌其辭曰赤鴈集六紛員殊翁雜五采文紛員多也六數也翁鴈頸也員音云漢書五色宣帝於西河築世宗廟告祠有五色鴈集殿前上度遼將軍皇甫規解官歸安定鄉人有以貨買鴈門太守者亦去職還家刺謁見規規臥不迎既入而問卿前在郡食鴈美乎上會稽典録曰虞固字季鴻少有孝行為日南太守常有鴈止宿廳事上每行縣輒飛逐焉及卒官雁隨喪至餘姚墓前歷三年乃去謝承後漢書晉郭瑀燉煌人也張天錫使蓋公明徵之瑀指翔鴻以示之曰此鳥也安可籠哉遂深逃絶迹公明拘其門人瑀嘆曰吾逃祿非避罪也豈得隱居行義害及門人乎乃出就徵隱逸傳石季龍饗群臣於大武殿前有白鴈百餘集於馬道南季龍命射之無所獲既將討三方諸州兵至者百餘萬太史令趙攬私於季龍曰白鴈集殿庭宮室將空不宜行也季龍納之晉載記元魏時北夷酋長遣子入侍者常秋春去避中國之熱時人謂之鴈臣伽藍記張融門律云道之與佛追極無二吾見道士與道人戰儒墨道人與道士獄是非昔有鴻飛天首積遠難亮越人以為鳧荊楚人以為乙人自楚越鴻常一耳齊顧歡傳建義陽城太守薛令伯聞太原王誅百官立莊帝棄城百走忽夢射得鴈以問楊元慎元慎曰卿執羔大夫執鴈君當得大夫之職俄而令伯除為諫議大夫伽藍記盧思道周時為武陽太守位下不得志為孤鴻賦以寄情其序云有離群之鴻為羅者所獲野人馴養貢之於余置諸池庭朝夕賞玩既用銷憂兼以輕疾大易稱鴻漸于陸羽儀盛也楊子曰鴻飛冥冥騫翥高也淮南子曰東歸碣石違溽暑也平子賦云南翔衡陽避祁寒也若其雅步清音遠心高韻鵷鸞以降罕見其儔而鎩翮牆陰偶形獨立唼喋粃稗雞鶩為伍不亦傷乎余五十之年忽焉已至永言身事慨然多緒乃為之賦聊以自慰云北史十八高宗太子弘納裴居道女為妃所司奏以白鴈為贄會苑中獲之帝喜曰漢獲朱鴈遂為樂府今獲白鴈得為婚贄彼禮但成謠頌此禮使首人倫異代相望無慚德也裴氏甚有婦禮帝嘗謂侍臣曰東宮內政吾無憂矣舊唐雅翼漢武太子昏得白鴈為贄似誤大曆二年嶺南節度使徐浩奏十一月二十五日當管懷集縣陽鴈來乞編入史從之先是五嶺之外翔鴈不到浩以為陽為君德鴈隨陽者臣歸君之象也唐會要朱落鴈朱漢賓少時善射嘗因與同輩出獵指一飛鴈隨矢而落其鏃中正其臆上貫一金錢有篆文示其郡之碩儒皆無識者人甚異之由是人皆號之曰朱落鴈晉史員外郎趙化成嘗夢與友人張某坐庭中忽有一鴈自天而下徘徊庭中共掩得之明日詣張言之方坐庭中果有一鴈下於庭際因共逐而得之相與驚駭乃以帛為詩繫其足放去祕閣間談元裕之赴試并州道逢捕鴈者獲一鴈殺之矣其脫網者悲鳴不能去竟自投於地而死豫因買得之葬之汾水之上纍石為志號為鴈丘與同行者楊正卿李仁卿俱為賦摸魚兒詞梅澗詩話傳書元郝經字伯常澤州陵川人世祖中統初拜學士充國信使宋館於真州凡十有六年始得歸先是有以鴈獻者公命畜之鴈見公鼓輒翼引吭似有所訴者公感悟擇日率從者具香案北向拜畀鴈至前手書尺帛親繫鴈足而縱之其詩曰霜落風高恣所如歸期回首是春初上林天子援弓繳窮海纍臣有帛書後虞人獲之苑中以聞上惻然曰四十人留江南者曾無一人鴈比乎遂進師南伐越二年宋亡輟耕録二十陽鳥也飛作八字在天人若張其一則飛行中缺一位也大曰鴻小曰鴈夜宿洲中鴻在內鴈在外遂更驚避備狐與人之捕已也物類相感志智禽智禽銜蘆以避網水牛結陳以却虎抱朴子夫鴈從風而飛以愛氣力銜蘆而翔以避弋繳淮南鴈自河北渡江南瘦瘠能高飛不畏繒繳江南沃饒每至還河北體肥不能高飛恐為虞人所獲嘗銜蘆數寸長以防繒繳焉古今注愛力鴻鴈愛力遇風迅舉孔雀愛毛遇雨高止禽經鴈曰翁雞曰鶉曰䳸上鴈宿於江湖之岸沙渚之中動計千百大者居其中令鴈奴圍而警察南人有採捕者俟其天色陰暗或無月時於瓦罐中藏燭持棒者數人屏氣潛行將欲及之則略舉燭便藏之鴈奴警叫大者亦驚頃之復定又復前舉燭鴈奴又驚如是數四大者怒喙鴈奴秉燭者徐徐逼之更舉燭則鴈奴懼喙不復動矣乃高舉其燭持棒者齊入群中亂擊之所獲甚多淮南張凝評事説云親曾採捕玉堂間話臨邑縣有鴈翅泊旁無樹木土人至春夏常於此澤羅鴈鳥取其翅以禦暑酉陽上虞縣有鴈為民田春拔野草根秋啄除其穢是以縣官禁民不得妄害此鳥犯則有刑無赦十三州記沮陽縣西北有鴈浮山是山經所謂景山也高三十餘里周回三百餘里修巖遐亘擢幹千霄鴈南翔北歸偏經其上士人由茲改山名焉荊州圖食粟鴈食粟翼重不能飛博物志毛囊鴻毛為囊可以渡江不漏上𪃿加鵝倉𪃿鴈也廣雅自關而東謂鴈𪃿鵝南楚之外謂之鵝或謂之倉𪃿方言舒鴈舒鴈鵝爾雅私覿愈愈焉出如舒鴈禮海昏侯沈戎卒葬於烏程之金鵝山上有金鵝飛集三鳴而去其後沈氏通顯諺云金鵝鳴沈氏興後漢志景帝有疾使巫視鬼欲試之乃殺一鵝埋之于苑中駕屋施床几以婦人服物著上乃使巫視之若能説此冢中婦形狀者加賞此巫視日竟晝夕無所道帝催問之急乃曰實不見有鬼但見一頭白鵝在墓上所以不即白疑是神鬼變化而作定無復改易不知何如景帝乃厚賜之抱朴吳志注會稽有孤居老姥養一鵝鳴喚清長時王逸少為太守就求市之未得逸少乃攜親故命駕共往觀之姥聞二千石當來即烹以待之逸少既至殊喪往意嘆息彌日世説山陰道士管霄霞求王羲之寫道德經舉紅鵝一雙相贈而去後鵝沖霄飛去仙傳拾遺山陰有道士好養鵝羲之往觀焉意甚悅固求市之道士云為寫道德經當舉群相贈羲之欣然寫畢籠鵝而去地出鵝董養字仲道太始初到洛下干祿求榮永嘉中洛城東北角廣里中地陷中有二鵝蒼者飛去白者不能飛問之博識者不能知養聞嘆曰昔周時所盟會狄泉此地也卒有二鵝蒼者胡象後明入洛白者不能飛此國諱也王隱晉書符朗食鵝知黑白之處人不信既而試之果然秦記直五萬京下劉光祿養好鵝劉後軍從京師還鎮尋陽以一隻鵝為後軍別純蒼色頸長四尺許頭似龍此一隻鵝可堪五萬自後不復見有此類俗説桓南郡小兒時與諸從兄弟各養鵝共鬪南郡鵝每不如甚以為忿乃夜往鵝欄間取諸兄弟鵝悉殺之既曉家人咸以驚駭云是變怪以白車騎車騎曰無所致怪當是南郡戲耳問果如之傳承為江夏守有一隻鵝失之三年忽引導得三十餘頭來向承家異苑昔太元中章安郡史悝有駮雄鵝善鳴悝女常養之鵝非女不食荀僉苦求得之鵝輒不食乃以還悝又數日晨起失女及鵝鄰家聞鵝向西追至一水唯見女一及鵝毛在水邊今名此水為鵝女溪廣古今五行記義熙中羌中姚略壞洛陽溝取博得一雙雄鵝並金色交頸長鳴聲聞於九皋養之此溝幽明録太康中得大蒼鵝從喙至足四尺有九寸體色豐麗鳴聲驚人三年而為暴犬所害晉沈充鵝賦序胡蕃為高祖從事征廣固纍月及未拔忽有鳥如鵝蒼赤色飛入高祖帳裏皆駭愕番起賀曰蒼色赤色者戎虜戎虜歸我大吉之祥也明日攻城陷之宋書隻鵝送別何遠為永康令人甚稱之太守王彬巡屬縣諸縣皆盛供帳以待焉至永康遠獨設糗水而已彬去遠送之拜斗酒隻鵝而別彬戲曰卿禮有過陸納將不為古人所笑乎南史濟南郡張公城西北有鵝浦南燕世有漁人居水側常聽鵝聲而衆鵝中有鈴聲甚清亮候之見一鵝咽頸極長因羅得之項上有銅鈴綴以銀鎖有隱起元鼎元年字酉陽庾信自建康遁歸江陵湘東因賜妾徐氏妾與任掞通欲求之無致言者信庭前有一蒼鵝乃繫書於鵝頸視之乃掞啓遂題紙尾曰畜生乞汝三國典略係木鵝高祖義兵至河東隨將堯君素城守時圍甚急君素乃為木鵝置表於頸且論時勢浮之黃河下河陽守者得之達於東都越王侗見而嘆息舊唐貞觀二十年吐蕃遣其大臣祿東贊奉表曰聖天子討高麗奴才聞陛下發駕少選之間已聞歸國鴈飛迅越不及陛下速疾奴忝預子壻喜百常夷矣夫鵝猶鴈也故作金鵝奉獻其鵝黃金鑄成高七尺中可實酒三斛唐書淨影寺沙門慧遠講經初在鄉養一鵝常隨遠聽經及遠入京留在寺晝夜鳴叫不止僧徒送入京至此寺大門放之自然知遠房便入馴狎每聞講經即入堂伏聽若聞泛説他事則鳴翔而出如是六年忽哀叫庭宇不肯入堂二旬而遠卒寺內有遠碑亦述其事兩京記駱賓王七歲詠鵝云鵝鵝鵝曲項向天歌白毛浮緑水紅掌撥清波唐詩紀事久視年中越州有祖録事不得名早出見擔鵝向市中者鵝見録事頻顧而鳴祖乃以錢贖之至僧寺令枚為長生鵝竟不肯入寺但走逐祖後經坊歷市稠人廣衆之處一步不放祖牧養之左丞張錫親見其説也僉載天寶末德清沈朝家有鵝育卵而腸出以死其雛悲鳴不復食啄敗薦覆之又銜雛草母前若祭奠狀長吁數聲而死沈氏異而埋之後人因呼為孝鵝寰宇記十萬錢僖宗好鬭鵝數幸六王宅興慶池與諸王鬭鵝一鵝值五十萬錢稅雙卵鵝李先主以國用不足稅民間鵝卵出雙子者柳花為絮者伶人獻詞云惟願普天多瑞慶柳條結絮鵝雙生聞見録宋祈雨雪法擇靈祠為壇取白鵝割項盛血并鵝奠之次日俱於壇前瘞之事實東坡云鵝能警盜亦能却蛇且又有祈雨之厄悲夫志林南道酋豪多選毛之細毛夾以白布絮而為被復縱橫衲其溫柔不下於挾纊也俗云鵝毛柔暖而性冷宜履嬰兒辟驚癇也嶺南異物志差翅鵝見異類差翅鳴雞見同類附翅鳴禽經鶩鴨也一名舒鳧李巡曰野曰鳧家曰鶩禮記內則辨鳥之不可食者云舒鳧翠爾雅疏王勃滕王閣序落霞與孤鶩齊飛是又以鶩為野鴨矣周官庶人執鶩鄭曰鶩取其不飛遷説苑曰鶩無他心故庶人以為摯曲禮曰庶人之摯匹匹鶩也脛短鳧脛雖短續之則憂鶴脛雖長斷之則悲莊權二無復什復禮書云續晨鳧之足鑿混沌之竅雞伏鴨卵雛成入水雞母隨岸呼之雛出而不隨母鴨雞異類能相隨也風俗通帝升望月臺時暝望南端有三青鴨群飛俄而止於臺上帝悅之至夕鴨宿於臺端日色已暗帝求海肺之膏以為燈焉取靈𣿢布為纏火光甚微而光色無幽不入青鴨化為三小童皆著青絹文繻各握鯨文大錢五枚置帝几前身止影動因名輕影錢玄都翠水中有鴨丹毛而輕登于英渠唼露而食名曰升渠鴨洞冥記張湯欲以鶩當鳧祀宗廟董仲舒曰鶩非鳧鳧非鶩愚以為不可繁露鳧藻杜詩光武上疏云陛下起兵十有三年將帥和睦士卒鳧藻注云言其和睦和悅如鳧之戲於水藻也後漢桓帝時劉陶上議曰聖王承天制物與人行止建功則衆悅其事興戎而師樂其旅是故靈臺有子來之人武旅有鳧藻之士注武旅周武王之旅鳧得水藻言喜悅也上捨車道往路鳧藻馳目成顏延年秋胡詩鳧興藻抃獨瑩心靈梁簡文公圃園頌序頓琦至孝母喪感暮哀聲不絶有飛鳧白鳩棲廬側見人即去見琦而留又丁密遭父艱致飛鳧一雙遊廬旁小池見人則馴附如家所畜後遭母喪密歸至所居一宿故雙鳧復遊戲池中廣州先賢傳魏文帝遣使求鬪鴨群臣奏且勿與權曰彼在諒陰中所求若此豈可與言禮哉具以與之江表傳建昌侯孫慮於堂前作鬭鴨欄頗施小巧陸遜正色曰君侯勤覽經典用此何為慮即毀之吳志吾嘗會賓設樂天忽雲興繼以大雨有群鶩成列飛翔而過此偶耳何異玄鶴二八也唐子人有得鳧鳥毛長三丈以示張華華見曰不然此謂海鳧毛也出則天下亂博物志柏邈為汝南郡人齎四烏鴨作禮大兒夢四烏衣人請命覺忽見鴨將殺遂救之買肉以代施夢四人來謝而去夢雋周訪少時與商人共入宮亭廟宿起如廁見一白頭翁昉逐擒之化為雄鴨昉捉還船欲烹之因而飛去後亦無他述異記齊王祐太宗第五子好養鬭鴨方未反前忽有野狸入籠中咬四十餘鴨皆斷其頭去及敗同惡而誅者四十四人舊唐唐安南郡都護登祐韶州人也家巨富奴婢千人莊田綿亘口腹自供未嘗設客孫子將鴨費用祐以擅破家私鞭二十僉載廣州浛洭縣金池王家有養鵝鴨池嘗於鴨糞中見麩金遂多收掏之日得一兩緣此而致富貴子孫皆為使府劇職三世後池即無金王氏力殫矣嶺南異物志陳懷卿嶺南人也養鴨百餘頭後於鴨欄中除糞糞中有光爚然試以盆水沙汰之得金十兩乃覘所食處於舍後山足下土中有麩金銷得數千斤遂巨富僉載李遠為杭州刺史嗜啖緑頭鴨貴客經過無他饋餉相厚者乃緑頭鴨一對而已語林陸龜蒙居震澤之南巨積莊有鬭鴨一欄有驛使過挾彈斃其尤者龜蒙手一表云此鴨能作人語待附蘇州上進使者奈何斃之使人恐以橐中金酬之俟其稍悅徐問其人語魯望曰能自呼其名耳使人憤且笑拂袖上馬復召之還其金曰吾戲耳葆光録太祖車駕幸城南園臨水亭見雙鳧爭藻戲於池面引弓射之一發而雙貫從官歡呼拜賀上命翰林繪工寫之縑素周書白纓水戰之鴨何必白鸚盈俎之雞何必長鳴蔡氏清經青纓之鴨翰音之雞望視之兔白蹄之豕短啄之狗修頸之鳥君子之貌何獨異耶太元經方君云養鴨者每年五月五日不得放棲只喂乾食不得與水吃則日日生卵不然或生或不生凡家用此法生卵未有一日缺一法以土硫黃拌谷飼之易肥瑣碎録海鴨海鴨大如常鴨班白文亦謂之文鴨金樓子野鴨雄者赤頭有似鶩生百卵一日再生有露華鶩以秋冬生卵並出蜀晨鳧而耐寒宜為臛廣志化蒙縣祠山上有池池中有松鳧如金野鳧棲息松間故俗謂之松鳧南越志金羹蜀廣安有金羹玉飯紅臘紫黎金羹謂鴨也燭夜雞一名燭夜古今注玉衡精玉衡星散為雞遠雅頌著倡優則雄雞五足春秋運斗樞積陽雞為積陽南方之象火陽精物炎上故陽出雞鳴以類感也雞之為言佳也佳而起為人期莫寶也説題辭九家易曰應八風也風應節而變變不失時雞時至而鳴與風相應也二九十八主風精為雞故雞十八日剖而成雛二九順陽歷故雞知時而鳴也雞大者蜀蜀子稚未成雞曰僆絶有力奮雞三尺為鶤棲於杙為桀鑿垣而棲為塒爾雅京房易傳曰雞知時劉向云雞者小畜主司時起居人師古曰至時而鳴以為人起居之節漢五行志應旦雞應旦鳴考異郵竇憲論曰當青病奴僕之時竇將軍念咎之日乃庸力之不暇思鳴之無晨後書武選令云諺云候晨之雞思補更鳴魏志諸葛瑾理周瑜子胤使失旦之雞復得一鳴抱罪之臣展其後效吳志鳳為黃帝之時以鳳為雞徐整正曆木雞紀渻子為周宣王養鬭雞十日而問雞可鬭已乎曰未也方虛驕而恃氣十日又問曰未也猶應影嚮十日又問曰未也猶疾視而盛氣十日又問曰幾矣雞雖有鳴者已無變矣望之似木雞矣其德全矣異雞無敢應者反走耳列子先鳴齊莊宗朝指殖綽郭最曰是寡人之雄也州綽曰君以為雄誰敢不雄然臣不敏平陰之後先二子鳴襄二十五戰如鬭雞勝者先鳴尸子公膳日雙雞饔人竊更之以鶩御者知之則去其肉而以其洎饋子雅子尾怒慶封告盧蒲嫳盧蒲嫳曰譬之如禽獸吾寢處之矣襄二十八賓孟適郊見雄雞自斷其尾問之侍者曰自憚其犧也昭二十二金距季郈之雞鬭季氏介其雞郈氏為之金距昭二十五季氏與郈氏鬭雞郈氏介其雞而季氏為之金距季氏之雞不勝季平子怒因侵郈氏之宮而築之郈昭伯怒譖之魯昭公使昭伯將卒以攻之仲孫氏叔孫氏救之郈昭伯不勝而死昭公奔齊故禍之所從生者始於雞足及其大也至於亡社稷淮人間五德田饒謂魯哀公曰夫雞頭戴冠者文也足摶距者武也敵在前敢鬭者勇也見食相呼者仁也守夜不失時者信也雞有五德也韓詩吳均云雞有呼群之德鹿有食蘋之美朱文繡與羅子鍾為友俱仕於梁文繡既死羅子鍾哭之其夜俱亡梁南七里有山葬繡於其中北九里有澗埋鍾於其內繡神靈變為雞鍾魂魄化為雉清鳴哀響往來不絶故詩曰雞山別飛響雉澗和清音異苑白圭對魏王曰帝丘之鼎以烹雞多洎之則淡不可食少炙之則焦而不熟也呂覽蔡雍荐邊讓於何進曰傳曰函牛之鼎以烹雞多汁則淡而不可食少汁則熱而不可熟後書秦惠王謂寒泉子曰蘇秦欺弊邑欲以一人之智反覆山東之君夫諸侯之不可一猶連雞之不能俱止於棲也戰國策呼雞祝祝祝雞翁雒陽人居尸鄉北山下養雞百餘牢雞皆有名字千餘頭暮棲于樹晝日放散呼名即種別而至列仙傳祝雞翁善養雞今世人呼雞皆曰祝起此也博物志俗傳雞本朱氏翁化為之故呼雞皆曰朱朱謹按説文解喌喌二口為誰州其聲也讀若祝祝者誘致禽畜和順之意喌與朱相似耳風俗通楚人擔山雉者路人問何鳥也擔雉者欺之曰鳳凰也路人曰我聞有鳳凰今直見之汝販之乎曰然則十金弗與請加倍乃與之將欲獻楚王經宿而鳥死路人不遑惜金惟恨不得以獻楚王國人傳之咸以為真鳳凰貴欲以獻之遂聞楚王王感其欲獻於已召而厚賜之過於買鳥之金十倍尹文子雙頭太初二年月氏貢雙頭雞四足一尾鳴則俱鳴拾遺方士言益州有金馬碧雞之寶可祭祀致也宣帝使王褒往祀焉漢書巽羽幽通賦巽羽化乎宣室兮彌五辟而成災應劭云宣帝時未央宮路軨中雌鶪化為雄元后時始為太子妃至平帝歷五葉而王莽篡漢成帝時交址越雋獻長鳴雞即下漏驗之咎刻無差一鳴一食長距善鬥西京雜記山雞愛其毛羽映水則舞魏武時南方獻之帝欲其鳴舞而無由公子蒼舒令取大鏡者其前雞鑒形而舞不知止遂乏死韋仲將為之賦其事異苑短鳴魏文帝遣使求長鳴短鳴雞群臣以非禮砍不不與孫權敕付之吳録殷浩以江逌為長史及丁令反叛浩令逌伐之乃取數百雞以長繩連之腳皆繫火一時驅放群雞駭散飛過塹集莞營皆燃因其驚亂縱兵擊之晉中興書支遁幼時嘗與師共論物類謂雞卵生用未足為殺師不能屈師尋亡忽現形投卵於地殼破雛行頃之俱滅遁乃感悟由是蔬食終身高僧傳四兗州刺史沛國宋處宗嘗買一長鳴雞愛養甚至恆籠置窗間後雞作人語與處宗論極有玄致終日不輟處宗因此功業大進幽冥録黃卵烏伏晉袁喬妻于氏上表論養子議曰鄙諺有之黃雞生卵烏雞伏之但知其為烏雞之子不知為黃雞之兒小可以喻大通典祖逖與劉琨為司州主簿情好綢繆共被同寢中夜聞荒雞鳴逖蹴琨覺曰此非惡聲也因起舞晉書雀登背晉元帝未登極有三雀共登一雄雞背三入安東府廳事占者當三進爵為天子也洞林有將雛雞雀集其前皆驅去復至于再三宋書裴景仁符秦書曰符健皇始四年冬山雞束入人家棲宿養子而去群聚傍渭水而遊翔與家雞無異夜鳴苻堅將入寇江右其妾張氏諫云諺言雞夜鳴者不利行師犬群嘷者宮室必空兵動馬驚軍敗不歸秋冬以來群犬皆嘷衆雞夜鳴廄馬驚逸武庫兵器有聲願詳思之堅不聽晉傳知雞露棲符朗善知味會稽王道子殺雞以食之既進朗曰此雞棲常半露檢之驗焉上涼州罪人於市將刑忽有一白雄雞飛於人邊請命引頸長鳴伏地向吏驅之去輒來刺史張義免其坐西河記徐州人吳清以太元五年差征殺雞求福置頭盤中忽然而鳴後得賊帥邵寶首以功拜清河太守越自行伍猥蒙榮位雞之妖更為祥甄異記謝朏莊子也宋孝武初為吳興以雞卵賦人收雞數千及遁節不全為清談所少南史崔光字長仁正始元年夏有典事史元顯獻四足四翼雞詔趙雍以問光光表曰翅足衆多群下相扇動之象雛而未大腳羽差小其勢尚微易制御也帝大悅後數日茹皓等並以罪伏法於是禮光逾重後魏梁時有人常以雞卵白和沐使髮光黑每沐輒破二三十枚臨終但聞髮中啾啾數千雞雛之聲翻譯周武帝好食雞卵拔虎為監膳儀同開皇中死而復蘇云被攝證武帝白團事儀同不識左右告曰名雞卵為白團也冥報記汴人張琦家有女子入夜哀痛白日即安已經年歲王績至其家停宿聞女子聲開口鏡照之痛者曰戴冠郎被殺其病者床下有大雄雞死矣乃是主人七八歲老雞異聞集韓琬與張昌宗王本立同遊太學博士姓張即昌宗之族叔精五經懵于時事畜一雞呼為勃公子愛之不已每講集輒巢於學徒中或攫破書叱逐之必被嗔責昌宗嘗為此雞被杖本立與琬不平曰為公殺此雞張生索取學徒回殘食料本立以業長乃見問合否本立曰明文案即得張生喜每日受之皆立文案他日張生請假本立舉牒數雞罪殺而食之及張生歸學不見雞報已殺之大怒云索案來見數雞之罪張以手再三拍案曰勃公子有案時更知何道當時長安以有案動為口實御史臺記長安富民羅會以剔糞目業里中謂之雞肆言若歸之因剔糞而有所得也會世副其業家財巨萬有士人陸景暘會邀過所止館舍甚麗入內梳洗衫又極鮮屏風氈褥烹宰無所不有景陽問曰主人即如此快活何為不罷惡事會曰吾中間停廢一二年奴婢死七牛馬散失復業已來家園稍遂非情願也分合如此僉載渤海高嶷巨富忽患月餘日帖然而卒心上仍暖經日而蘇云有一白衣人眇目把牒冥司訟殺其妻子嶷對元不識此老人冥官云君命未盡且放還遂悟白衣人乃是家中老瞎麻雞也令射殺魅遂絶上搜神記王子珍父事同雞不三年犬不六載烏衣婦人衛鎬為縣官下縣至里人王幸在家方假寐夢一烏衣婦人引十數小兒著黃衣咸言乞命叩頭再三斯須又至鎬甚惡其事遂催食欲前適鎬所親者報曰王幸在家窮無物設饌有一雞見抱兒已得十餘日將欲殺之鎬方悟烏衣婦人果烏雞也遂命解放是後復夢感欣然而去僉載靈雞唐杭州徑山釋法欽姓朱氏嘗養一雞不食生類隨之若影不遊他所其入長安長鳴三日而絶今雞冢在山之冢宋高僧傳日烹五十楚馬殷王希聲立嘗聞梁太祖好食雞慕之日烹五十雞以供膳葬殷希聲不入泣頓食雞肉數器而起潘起曰昔阮籍居喪而食蒸豚世豈乏賢耶五代史天雞東南有桃都山上有大樹曰桃都枝相去三千里上有天雞日初出照此木天雞即隨之玄中記溫庭筠詩漏轉霞高滄海暗頗黎枕上聞天雞羊溝之雞三歲為株相者視之則非良雞也然而時勝人者以狸膏塗其頭也注羊溝鬭雞處株魁帥也雞畏狸膏莊子郭璞爾雅注陽溝巨鶤古之名雞允吾縣者宋雜陳楚地故梁國寧陵種龍鄉也今見都印文曰種龍出鳴雞陳留風俗傳龍鄉輟曉謝希逸宋宣武誄汝南汝南出長鳴雞漢舊儀東方欲明星爛爛汝南晨雞登壇喚曲終漏盡嚴具陳月沒星稀天下旦古雞鳴歌惟憎無賴汝南雞天河未落猶爭啼徐陵鳥棲曲五時有司夜雞隨鼓節而鳴不息從夜至曉一更為一聲五更為五聲亦曰五時雞扶桑山有玉雞玉雞鳴則金雞鳴金雞鳴則石雞鳴石雞鳴則天下雞之悉鳴而潮水應之矣神異經石雞清響而應潮孫綽望海賦愛州移風縣有潮雞鳴長而清如吹角每潮至則鳴一名林雞其冠四開如美蓉輿地志述異記以為伺潮雞細尾馬韓國出細尾雞其尾長五尺餘魏志承露南郡獻長鳴承露雞江表傳狼肓狼肓之雞特稟異聲狼肓地名長尾雞馬韓有長尾雞尾長五尺後四夷傳容雞高興縣多容雞其形如雞來則年穰南越志見卵而求時夜見彈而求梟炙注云見卵而責司晨之功見彈求梟炙之實崔云時夜司夜謂雞也莊子玄雞白頭食之病人雞有五指者亦殺人雞有五色者亦殺人龍魚河圖呼人姓名老雞能呼人姓名殺之則止白澤圖四距重翼雞有四距重翼者龍也殺之震死白澤圖覆卵雞鶩覆卵忌磨物類相感志工商執雞周禮大宗伯取其守時而動也鄭玄注野雞屬陰先嗚而後鼓翼家雞屬陽先鼓翼而後鳴相感志雞廉狼吞鹽鐵論鑽籬僧家謂雞為鑽籬菜雞有胡髯五指金骹反翅之種大者蜀小者荊白雞金骹者美并州所獻吳中送長鳴雞長倍於常雞永昌郡無雞廣志石雞白水南行十餘里有雞山傍有大山竦上有石雞冠距如生道士李鎮於此下住常寶玩之雞一旦忽摧毀鎮告人曰雞卒如此吾其終乎因與親知訣別後月餘果卒似知命云周景式廬山記徐季龍曰世有軍事則感雞雉先鳴何也管輅曰夫雞者兌之畜金者兵之精雉者離之鳥獸者武之神故太白揚輝則雞鳴熒惑流行則雉驚各感類而動別傳介鳥雉介鳥也禽經雉耿介之鳥韓詩耿介而一志者雉也劉禹錫明贄論春官大宗伯曰士執雉鄭玄注云取其守介不失節儀禮士相見曰相見之禮各用雉注取其耿介交有時別有倫也雉有十四種鸕諸雉鷂雉鷮雉鳪雉鷩雉秩秩海雉鸐山雉雗雉鵫雉雉絶有力奮伊洛而南素質五彩皆備成章曰翬江淮而南青質五彩皆備成章曰鷂南方曰𠷎東方曰鶅北方曰鵗西方曰鷷説文爾雅林慮山下人語曰四足之美有鹿兩足之美有鷮詩義疏雷動而雊雷始動雉鳴而雊其頸説文蔡雍月令云雷在地中雉性精剛故獨知之應而鳴也漢五行志撞鐘於遲郊雉皆雊注鐘聲似雷震淮南雉信雀交不一雉交不再禽經雉不再合信也化書機星散機星散為雉運斗樞疏趾祭宗廟雉曰疏趾曲禮華蟲日月星辰山龍華蟲書華蟲鷩雉也注楊炯冕服議華蟲者雉身被五彩象聖人體兼文明也舊唐郯子曰少皥贄之立也鳳鳥適至故紀於鳥為鳥師而鳥名丹鳥氏司閉者也五雉為五工正昭十七飛鼎耳武丁祭成湯有雉飛升鼎耳而雊祖已曰雉者野鳥升於鼎者欲為用也遠方將有來朝者乎武丁思先王之道絲髮重譯至者六國尚書大傳大傳云高宗祭成湯之廟有雉升鼎耳而鳴高宗問祖乙祖乙曰遠方君子殆有至者祖乙見雉有似君子之行今從外來則曰遠方君子將有至者矣論衡雉尾扇商高宗有雉雊之徵章服多用翟故有雉尾扇古今注周成王時越裳獻白雉去京師三萬里王者祭祀不相踰晏食袍服有節則至援神契白雉有種南越尤多今之九德則古之越裳也成王以為瑞者貴其所自來之遠明其德化所被之廣謂此為奇也抱朴子渤海王高歡攻鄴時瑞物無歲不有令史焚連理木煮白雉而食之三國典略銜環魯昭公時白雉銜環入感精符雉之為言弟也喻昭公弟為季氏入為君也注叔孫豹奔齊及庚宗遇婦人使私獻以雉為食而宿焉及歸所宿庚宗之婦人問其姓曰豫子長矣能奉雉而從我矣乃召見之號之曰牛昭四謁由捧雉孕本貿絲因家乏主遂登顯秩晉書王浚論有鳥飛從南方來質白五色皆備集平公之庭相見如讓公召叔嚮問之叔嚮曰吾聞師曠曰西方有白質鳥五色皆備其名曰翬南方赤質五色備其名曰搖來為吾君臣其祥先至矣瑣語孫休好射雉至其時則晨往夕返群臣莫不上諫曰此何物何足甚耽答曰雖為小物耿介過人朕之所以好也語林休鋭意於典籍欲畢覽百家之言大好射雉春秋之間常晨出夜還惟此時捨書吳志焚雉頭裘太醫司馬程據上雉頭裘詔於殿前燒之晉咸康起居注司馬軌之善射雉太元中將媒下翳此媒屢雊野敵亦應試令尋覔所應者頭翅已成雉半身後故是蛇晉中朝武庫內忽有雉時人咸謂為怪張司空云此蛇之所作耳即披庫中果得蛇蛻異苑後魏裴安祖曾行值天熱舍於樹下有鷙鳥逐雉雉急投之遂觸樹而死安祖愍之乃取置陰地徐徐護視良久得蘇喜而放之後夜忽夢見一丈夫衣冠甚偉著繡衣曲領向安祖再拜安祖怪而問之此人云感君前者見放故來謝德聞者異之北史禇炫從宋明帝射雉至日中無所得帝時猜羞召問侍臣曰吾旦來如皋遂空行可笑座者莫答炫獨曰今節候雖適而雲露尚凝故斯翬之禽驕心未警但得神駕遊豫群情便為載歡帝意解乃於雉場置酒南齊書齊東昏侯在位置射雉場二百九十六處翳中帷帳及步障皆祫以緑紅錦金銀鏤弩牙玳瑁帖箭每出輒與鷹犬隊主徐令孫媒翳隊主俞靈韻齊馬而走左右爭逐之南史梁臨賀王正德其妹長樂公主太子家令謝憘之妻也姿容國色悅而私之生子二人乃燒主第投婢於火唱言主死黃門郎張準有雉媒正德見而奪之準於重雲殿法會所罵之曰張準雉媒非長樂公主何可略奪太子綱恐梁王聞遣武陵王紀急相解喻準罵乃止正德即以雉媒還之三國典略陳宣帝時釋僧安住王室山講涅槃有雌雉伏聽三卷未了遂絶不至安曰雉生人道矣安至越州人家喚雌雉一女走出如舊相識父母異之引安設食其父言見此女生時髮如雉毛因以為名安大笑為述本緣釋氏通釋雌雉雊則天初誕之夕雌雉皆雊遼澤玄宗賜安祿山品目有遼澤野雞酉陽高駢進東面都統中和二年五月雉雊于揚州廨舍會二雉雊寢占者曰野鳥入室軍府將空駢心惡之其月盡出兵於東塘結壘而處如赴難之勢凡百日復還廣陵蓋禳雊雉之異也舊唐翟雉長尾雨雪惜其尾棲高樹杪不敢下食往往餓死博物志商人置雉尾於舟中之止以候陰晴天當晴則尾直豎天將雨則尾下垂中和集畜樊澤雉十步一啄百步一飲不畜於樊中莊子雞有專棲之雄雉有擅澤之鷮蟻有兼弱之智蜂有攻巢之計相役御亦猶是耳抱朴子天子金根車馬上插以翟毛皇后法駕乘重翟羽蓋徐廣車服注為鷨已看能類鱉猶訝雉為鷨柳詩瑤光星散瑤光星散為燕運斗樞天女燕一名天女名名鷙鳥古今注入山見白燕其君宜得貴女注云今俗名燕為天女京房易占鷾鴯鳥莫知於鷾鴯鷾鴯燕也莊子塗巢燕戊巳日不銜泥塗巢此非才智自然得之博物志齊魯之間謂燕為乙作巢避戊巳玄中記云千歲之燕戶北向述異要云五百歲燕生胡生髯酉陽玄鳥郯子云少嗥時玄鳥氏司分者也左傳鳦玄鳥也燕也齊魯謂之鳦取其鳴自呼廣韻赤燕少昊氏之時赤燕銜羽而飛集戶遺其丹書田俅子秦之先帝顓頊之苗裔孫曰女修女修識玄鳥隕卵女修吞之生子大業史記有娀氏有二佚女為之九成之臺飲食必以鼓帝令燕往視之鳴若謐隘二女愛而爭搏之覆以玉筐少選祭而視之燕遺二卵北飛遂不及二女作歌一終曰燕燕往飛實始作為北音北涼沮渠蒙遜起遊林堂于內死圖列古聖賢之象堂成宴群臣談論經傳顧謂郎中劉昞曰仲尼何如人也昞曰聖人也遜曰聖人不凝滯于物而能與世推移畏于匡辱于陳伐樹于宋聖人固若是乎昞不能對遜曰卿知其外不知其內昔魯人有浮海而失津者至于亶淵見仲尼及七十子遊於海中與魯人一木杖令閉目乘之使歸告魯侯築城以備寇魯人出海投杖水中乃龍也具以狀告魯侯不信俄而有群燕數萬銜土培城魯侯信之大城曲阜訖而齊寇至攻魯不克而還此所以稱聖也十六國春秋吳公子札自衛如晉宿于戚聞孫林甫擊鍾聲曰異哉夫子獲罪於君以在此懼有不足而又何樂夫子之在此也猶燕之巢於幕上也左傳危素卵之纍殼甚玄燕之巢幕潘嶽西征賦秦兵攻趙魏大夫以為於魏便子順曰秦貪暴之國也勝趙必復他求吾恐於時受其師也先人有言燕雀處屋子母相哺喣喣焉其相樂也自以為安矣竈突決上棟宇將焚燕雀顏色不變不知禍之將及己也今子不悟趙破患將及已可以人而同於燕雀乎孔叢子春申君都吳宮因加巧飾春申死吏照燕窟失火遂焚吳地記銜土臨江閔王榮坐寢廟壖為宮上徵榮榮詣中尉府中尉致都責訊王王恐自殺葬藍田燕數萬銜土置冢上百姓憐之史記王莽開哀帝母丁姬冢有燕數千銜土投其窟中漢書宋青州刺史都泰玄字義貞好黃老故老相傳泰姓仁恕德感禽獸初葬時有群燕數千銜土於冢獨高大與他有異村鄉歲時迄今祭祀蘇州冢墓記丞相薛宣對曰茂陵寢上食日玄鳥來集吐所含大豆紫黑色翱翔殿上此陛下永與天無極天下天下幸甚漢書名臣奏安清字世高安息國王太子也漢桓帝時人聰敏博學鳥獸之聲無不綜達嘗行見群燕忽謂伴曰燕云應有送食者頃之果有致焉衆咸奇之高僧傳魏禪晉之歲北闕下有一白燕以為神物以金為籠置於宮中旬日不知所在論者以晉金德之瑞昔師曠峕有白燕來巢檢瑞應圖果如所論白色叶于金德師曠事晉古今之議相符矣上子年拾遺中原喪亂鄉人遂共推郗鑒為主與千餘家避難於魯國嶧山山有重險百姓飢饉野無生草掘野鼠蟄燕而食之晉中興書頭有豎毛慕容俊時燕來於俊正陽殿之西椒生三頭頭有豎毛凡城獻異鳥五色成章俊謂群僚曰是何祥也咸稱燕者燕鳥也首有毛冠者言大燕龍興冠通天章甫之象也巢正陽西椒者言至尊臨軒朝萬國之徵也三子者數應三統之驗也神鳥五色言聖朝將繼五行之籙以御四海者也俊覽之大悅載記元嘉元年七月有白燕集於齊郡遊翔庭宇經九月乃去衆燕翼隨恆有數千起居注宋文帝元嘉二十八年魏人破南兗徐豫青冀殺掠不可勝計丁壯即加斬截嬰兒貫於槊上盤舞以為戲所過郡縣赤地無餘春燕歸來巢於林木宋劉義隆時天竺求那跋摩將詣楊州路過靈鷲寺謂諸僧曰此間尋有異瑞兼值王者登臨其年冬果有群燕共銜繡像委之堂內及齊主蕭道成初為始興太守遊於此寺而起白塔廣弘明集李惠長於思察雍州聽事有燕爭巢鬪已纍日惠令人掩獲試命綱紀斷之並辭惠乃使卒以弱竹彈雨燕既而一去一留惠笑謂吏屬曰此留者自計為巢功重彼去者既經楚痛理無固心群下伏其深察後魏侍中紀昌睦初生有白燕一雙出既表素質宦途亦通宣城記襄陽霸城王整之姊嫁為衛敬瑜妻年十六而敬瑜亡父母舅姑咸欲嫁之誓而不許乃截耳置盤中為誓乃止所住戶有燕窠常雙飛來去後忽孤飛女感其遍栖乃以縷繫足為記後歲此燕果復更來猶帶前縷女復為詩曰昔年無偶去今春猶獨歸故人恩既重不忍復雙飛雍州刺史西昌侯藻嘉其美節乃起樓於門題曰貞義衛婦之閭又表於臺南史宋末娼家女姚玉京嫁襄州小吏衛敬瑜溺水而死玉京守志養舅姑常有雙燕窠梁間一日為鷙鳥所獲其一孤飛悲鳴徘徊至秋翔集玉京之臂如告別然玉京以紅縷繫足曰新春復來為吾侶也明年果至因贈詩云云自爾秋歸春來凡六七年其年玉京病卒明年燕來周章哀鳴家人語曰玉京死矣墳在南郭燕遂至墳所亦死每風清月明襄人見玉京與燕同遊溪水濱唐李公撰燕女墳記列從呂光大安三年白燕遊酒泉群黑燕列從涼州記孫氏妻黃見一童子當前以叉擲之躍入雲中夜聞戶外歌曰昔填夏家冢輩泥頭欲禿今寄黃氏居非意傷我目尋覓巢中得一白燕左目傷續異記高士馬樞目常黃能視暗中物有燕一雙巢其庭樹馴狎攔廡時上几案春來秋去幾三十年陳書長安民郭行先有女紹蘭適巨商任宗為賈於湘中數年音信不達絶蘭見雙燕戲於梁間長吁淚下語燕欲憑附書於壻燕子飛鳴上下似有所諾遂飛泊膝上蘭乃吟詩云我壻去重湖臨窗泣血書殷勤憑燕翼寄與薄情夫小書其字繫於足上燕遂飛鳴而去任宗時在荊州忽見一燕飛鳴泊於肩上見有書繫足上解而視之乃妻所寄也宗感而泣下遂歸首出詩示蘭後張説傳其事開天遺事共乳崔玄暐居父喪廬有燕更巢共乳俗傳燕巢人家巢戶內向及長過尺者吉祥也集賢張公每歲燕巢正寢其長可容匹練戶悉內向數年遂登庸瑣碎録遁參間覽漢戶部侍郎范質言嘗有燕巢於舍下雛已哺食矣其雌者為貓所搏食雄啁啾久之方去即時又與一燕為匹而至哺雛如故不數日雛相次墮地宛轉而殭兒童剖腹視之則有蒺藜在嗉中蓋為繼偶者所害玉堂間語夷堅志張子韶事同巢燕不歸宋錢惟演自兗守罷遂築室于楊亦既五年忽春深巢燕不歸已疑之默訪諸寺觀州宅皆不至不二年一城丘墟矣淡山雜識金宣撫使田琢字器之明晨丙辰從軍塞外合虜里山野舍春末有雙燕為巢土人不識屢欲捕之田曲為全護此燕晝出夜歸田必開戶待之忽一日飛止坐隅都無驚畏巧語移時不去田思明日秋社燕當歸矣此殆為留別語也因作詩贈云幾年塞外歷奇危誰謂烏衣亦此飛朝向蘆陂知有為暮投第舍重相依君憐我處頻迎語我憶君時不掩扉明日西風悲鼓角君應先去我何歸遂細書為臘丸係其足上明年四月田受代歸又八年泰和甲子田為潞州觀察判官四月十二日偶坐廨舍之含翠堂忽雙燕至一飛簷戶間一上硯屏田諦視即前燕也臘丸尚在田謂同年龐鑄畫為圖自作序求趙閲作賦詩中州集元元貞二年雙燕巢於燕人柳湯佐之宅一夕家人舉燈照蝎其雄驚墮為貓所食雌倣徨悲鳴不已朝夕守巢哺諸雛成翼而去明年雌獨來復巢其處人視巢上二卵疑其更偶徐伺之則抱雛之殼耳自是春去秋來燕凡狐白貂鼠之類燕見之則毛脫或言燕鷙於水底舊説燕不入室是井之虛也取桐為男女各一投井中燕必來遊波鳥燕也雷效云海竭江枯投遊波而立泛言江海乾投燕於其中水立漲物類相感志處帷天下無道攻擊不已甲生蟣虱燕雀處帷幄韓子崔光曾於門下省晝讀經有鴿飛集膝前遂入於懷緣臂上肩久之乃去道俗贊詠詩頌者數十人後魏書求鴿羽北齊李繪字敬文河間太守崔諶恃其弟暹勢從繪乞麋角鴿羽繪答書云鴿有六翮飛則沖天麋有四足走便下海下官膚體疏懶手足遲鈍不能近追飛走遠事佞人北史李靈傳蒼鴿蜀有蒼鴿狀如春花越絶書赤鴿楊素見赤鴿映棘高二尺隋書并州石壁釋明度者貞觀末有鴿巢楹乳二雛度每以餘粥就哺之曰乘我經力羽翼速成忽一日學飛墮地俱殞度為瘞之旬餘夢二小兒曰兒本鴿也今轉生寺東某家矣度往訪求果孿生二子入視之呼曰鴿兒一時回顧應諾後俱成立焉宋高僧傳大理丞鄭復禮言波斯舶上多養鴿鴿能飛行數千里輒於一隻至家以為平安信張九齡少年時家養群鴿每與親知書信往來只以書繫鴿足上依所教之處飛往投之九齡目之為飛奴時人無不愛訝開元遺事陳誨嗜鴿馴養千餘隻誨自南劍牧拜建州觀察使去郡前一月群鴿先之富沙舊所無孑遺矣又嘗早衙有一鴿投誨懷袖中為鷹所擊故也誨感之不復食鴿南唐近事高宗紹興間宮中養鴿每日群飛於外太學士人以諷其詩流於大內高宗惻然自是宮中不復畜鴿其詩云萬鴿飛翔繞帝都朝昏收放費工夫何如養取雲邊鴈沙漠能傳二聖書古杭雜記張浚嘗按視曲端軍執撾以軍禮見闐無一人公異之謂欲點視端以所部五軍籍進公命點其一部於廷間開籠縱一鴿以往而所點之軍隨至張為愕然既而欲盡觀於是悉縱五鴿則五軍頃刻而集戈甲煥燦旗幟精明魏公雖獎而心甚忌之齊東野語瑤光星散瑤光星散為雀運斗樞嘉賓季秋之月候鴈來賓雀入大水為蛤呂淮賓雀者老雀也栖宿人家堂宇之間有似賓客故謂之賓雀許高注雀一名嘉賓古今注九月雀不入水則多泆周蒙續古今注趙簡子曰雀入於海為蛤雉入於淮為蜃惟人不能哀夫國語千歲之雉入海為蜃百年之雀入江為蛤搜神記秦穆公出狩至於咸陽日稷庚午天震大雷有火下化為白雀銜籙丹書集於公車公俯取其書言繆公之霸也訖胡亥秦家世事尚書中候齊景公探雀鷇弱反之晏子再拜賀曰吾君有聖人之德矣探雀鷇弱故反之是長幼也育禽獸而若此况人乎晏子黃口孔子見羅者所得雀皆黃口也孔子曰黃口盡得大雀獨不得何也羅者對曰黃口從大雀者不得大雀從黃口者得孔子顧謂弟子曰君子慎所從家語論語疏公冶長辨鳥雀語云喈喈嘖嘖白蓮水邊有車覆粟車腳淪泥犢牛折角收之不盡相呼共啄人驗之果然邢昺云舊説冶長解解禽語故係之縲絏海録益部耆舊傳河內太守楊宣桂陽先賢傳成武丁事同邯鄲民以正月日獻雀於趙王而綴以五彩王大悅申叔告子順曰王何以為也對曰正且放之示有生也子順曰此處委巷之鄙事非先王之法也且又不令申叔曰何謂不令曰夫爵者宜受之於上不宜取之於下民非所得制爵也昔虢公祈神神賜之土田是失國而受田之祥也今以一國之王受民之爵何悅乎孔叢子趙武靈王自號主父廢長子章而傳國於公子何主父遊沙丘公子章作難與何戰敗章趨主父主父聞之何遂圍主父飢探雀鷙而食之三月餘遂餓死沙丘東魏為侯景檄梁文云徒探雀殼無救府藏之虛空請熊蟠詎延晷刻之命庾信哀江南賦云探雀殼而未飽熊蟠而詎熟史記莊辛謂楚王曰夫雀俯喙白糧仰棲茂樹鼓翅奮翼自以為無患與人無爭也不知夫王孫公子左挾彈右持攝丸以加其頸晝棲乎茂樹夕調酸醎矣國策圉人魏尚高帝時為太史有罪繫詔獄有萬頭雀集獄棘樹上拊翼而鳴尚占曰雀者爵命之祥其鳴即復也我其復官也有頃詔還故官陳留耆舊傳漢中平三年八月懷陵上有萬餘雀先極悲鳴己因亂鬪相殺皆斷頭懸著樹枝枳棘到六年靈帝崩夫陵者高大之象也雀者爵也天戒若曰懷爵祿而尊厚者自還相害至滅亡搜神記集陵中平三年八月懷陵上有萬餘雀弘農楊寶性慈愛年九歲至華陰山見一黃雀為鴟梟所搏逐樹下復為褸蟻所困寶懷之以歸置諸梁上夜視為蚊所嚙乃移置巾箱中啖以黃花逮十餘日毛羽成飛翔朝去暮來宿巾箱中如此積年忽與群雀俱來哀鳴繞堂數日乃去是夕寶三更讀書有黃衣童子曰我王母使者昔使蓬萊為鴟梟所搏蒙君之仁愛見勑今當受賜南海別以四玉環與之曰令君子孫素白且從登三公事如此環矣寶之孝大聞天下名位日隆子震震生秉秉生彪四世名公及震葬時有大鳥降人皆謂貞孝招也齊諧記駱賓王啓云陰山之雀敢懷餐蕊之心漢東之蛇期致投珠之報又曰白羽書生自銘恩于食稻黃衣童子將賽德于餐花集昔日黃雀報恩而至蔡雍論弘農楊氏高都東房承四太尉之後世傳黃雀所銜玉環至天寶中為楊國忠所奪今不知所在傳載王祥繼母朱氏思黃雀炙忽有數十黃雀飛入其幕得以供母鄉里以為孝感晉書任城魏肇之初生有雀飛入手占者以為封爵之祥異苑上虞縣奚奴多諸方術向空長嘯則群雀來萃夜哭蚊虻悉死於側上雀集雞背丞相府有將雛雞雀飛集其背上驅之復來如此再三令璞卜之此晉王即祚之漸也同休北史曰潘樂字相貴初生有一雀止其母左肩占者咸言富貴之徵因名相貴後以為字北齊書侯瑾字子瑜解鳥音嘗出門見白雀與睪雀同行慨然嘆曰今天下大亂君子小人相與雜居燉煌實録入懷高祖於太原斬王威有白雀飛入高祖之懷唐書開元二十二年秋八月甲申幽州長史張守圭榆關界內蚄蟲食田稼曼延入平州俄頃有群雀來食此蟲一日食盡平州稼穡無有傷者上裴耀卿勤於王事夜看案牘晝決獄訟嘗養一雀每夜至初更時有聲至五更則急鳴耀卿呼為知更雀又於廳前有一桐樹至曉則有群鳥翔集以此為出廳之候故呼為報曉鳥時人美焉開元遺事右驍衛大將軍張籛始在雍州因春景舒和出遊近郊憩於大冢之上忽有黃雀銜一銅錢置之而去未幾復于衙院晝臥見二雀相鬪畢各嗛一錢落於前籛後以所三錢嘗祕於巾箱識者以為大富之徵右晉書熙州有唐碑宋朝未下時一日有家雀數千集其上人惡之曰豈此地將為漢有耶因焚之蓋夷中無此禽也已而果然邵氏聞見録雀皆至夕而不見物人有至夕昏不見物者謂之雀盲是也鵂鶹夜察毫末晝暝目不見丘山殊性感應經天中記卷五十八
