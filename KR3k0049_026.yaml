body:
  text: 言語言語直言曰言論難曰語説文言宣也宣彼此之意也語敘也敘己所欲説也釋名心聲捈中心之所欲通諸人之所發者矣如言故言心聲也楊問神四術言有四術言敬以莊朝廷之言也文言有序祭祀之言也并氣折聲軍旅之言也言若不足喪紀之言也賈誼新書善言與人善言暖於布帛傷人之言深於矛戟荀榮辱故贈人以言重於金石珠玉觀人以言美於黼黻文章聽人之言樂於鐘鼓琴瑟非相身之文晉侯賞從亡者介之推不言祿祿亦弗及推曰獻公之子九人唯君在矣天實置之而二三子以為己力不亦誣乎竊人之財猶謂之盜況貪天之功以為己力乎難與處矣其母曰盍亦求之以死誰懟對曰尤而效之罪又甚焉且出怨言不食其食其母曰亦使知之若何對曰言身之文也身將隱焉用文之是求顯也其母曰能如是乎與女偕隱僖二十四慎辭鄭伐陳入之使子産獻捷于晉晉人曰何故侵小對曰先王之命惟罪所在各致其辟且昔天子一圻列國一同自是以衰周之制也今大國多數圻矣若無侵小何以至焉晉人曰其辭順家語仲尼曰志有之言以足志文以足言不言誰知其志言之無文行而不遠晉為伯鄭入陳非文辭不為功慎辭哉襄二十五釋辭子産相鄭伯以如晉晉侯見鄭伯有加禮厚其宴好而歸之叔向曰辭之不可以已也如是夫子産有辭諸侯賴之若之何其釋辭也詩曰辭之輯矣民之懌矣辭之繹矣民之莫矣其知之矣三十一利溥景公繁于刑晏子言踊貴屨賤景公為是省于刑君子曰仁人之言其利溥哉晏子一言而齊侯省刑昭三一言而善昔叔向適鄭鬷蔑惡欲觀叔向從使之收器者而往立於堂下一言而善叔向飲酒聞之曰必鬷明也下執其手以上今子少不揚子若無言吾幾失子矣言之不可以已也如是遂如故知昭二十八九言鄭子太叔卒晉趙簡子為之臨甚哀曰黃父之會夫子語我九言曰無始亂無怙富無恃寵無違同無敖禮無驕能無復怒無謀非德無犯非義定四送言孔子適周問禮於老子老子曰子所言者其人與骨皆已朽矣獨其言在耳今本無此三句辭去而老子送之曰吾聞富貴者送人以財仁人者送人以言吾不能富貴竊仁人之號送子以言曰聰明深察而近於死者好議人之非也博辨宏達而危其身者發人之惡者也為人子者無以有己為人臣者毋以有己史記家語無以有己為人子者無以惡己為人臣者衣韋林既衣韋而朝齊景公景公曰君子之服也小人之服也林既作色曰夫服何足以端士行乎昔荊為長劍危冠令尹子西出焉齊短衣而遂偞之冠管仲隰朋出焉越文身鬋髮范蠡大夫種出焉西戎左衽而椎結由余亦出焉即如君言衣狗裘者當犬吠衣羊裘者當羊鳴且君衣狐裘而朝意者得無為變乎景公曰子真為勇悍矣説苑正言趙良見商君商君請得交於良良曰僕請終日正言而無誅可乎商君曰語有之矣貌言華也至言實也苦言藥也甘言疾也夫子果肯終日正言鞅之藥也鞅將事子史記下説窟中蘇秦初與張儀俱習從橫之術于鬼谷先生十一年皆通六藝百家之言鬼谷先生弟子五百餘人為作土窟窖深二丈先生曰有能獨下説窟中令我泣出者則能分人主之地矣久之蘇秦下説窟中鬼谷先生泣下沾襟張儀繼下説窖中鬼谷先生泣亦沾襟曰蘇秦辭説與張儀一體也上見御覽論衡同立談奪地邯鄲之北有蘇大侯者蘇秦往説之大侯送以黃金百鎰其家丞諫曰君侯之與客無故舊而送之百金其鎰可得聞耶蘇大侯曰客天下辨士也立談之間再奪吾地而復歸之吾地雖小豈直百金耶典略戒子東方朔將仙戒其子曰明者處世莫尚於中庸優哉遊哉與道相從首陽為拙柱下為工飽食安步以仕代農依隱玩世詭時不逢本集聽者竦然樓護字君卿為人短小精辨論議常依名節聽之者竦然與谷永俱為五侯上客長安號曰谷子雲之筆札樓君卿之脣舌言其見信用也漢書如流郭宏為上計吏朝廷問宏潁川風俗所尚土地所出及先賢將相儒林文學之士宏援經以對陳事答問出言如浮引議如流後漢郡名非實明帝問張重曰日南郡人應向北看日重曰臣聞鴈門郡不見壘鴈為門金城郡不見積金為城雲中郡不見中天而居東海郡不見宮室在於水中臣雖居日南未嘗向北看日東觀記交川名士傳如雲浚儀符融幅巾奮褎談詞如雲李膺每捧手歎息上如雲者奔踊而出也注孔公緒胄清談高論噓枯吹生後鄭太傳辨出問表袁紹總兵冀州遣使要鄭玄大會賓客玄辨對咸出問表時汝南應劭亦歸于紹因自贊曰故太山太守應仲遠北面稱弟子何如玄笑曰仲尼之門考以四科回賜之徒不稱官閥劭有慚色玄傳答問袁次陽妻者扶風馬季長之女也下車禮畢隗問曰為婦之道貞順而已何輜軿僮婢數十黼黻玄黃珠璣之飾耶夫人答曰女有三從之義在家係於父母情愛無已欲其豐麗故不敢逆命今君欲擬鮑子都之風不受婦家之送此乃清高異行也妾亦欲察君志悉還所有以成君之高不亦可乎隗又問曰弟先兄舉猶以為鄙高士不為也賢姊未嫁而新婦先行有何汲汲乎答曰家姊有宋伯姬之風梁高之行節操概於青雲貞介皎於白日家君效堯之配舜孔子妻公冶長之義世乏此賢故躊躇妾固陋不才遭人則可隗默然悵恨外聽者曰使君努力如何為婦所困列女傳隗又問曰南郡君學窮道奧文為辭宗而所任之職輒以貨財為損何邪對曰孔子大聖不免武叔之毀子路至賢猶有伯寮之訴家君獲此固其宜耳後列女蜀俗張裔為雍闓縛送于吳鄧芝使吳孔明令芝言次可從權請裔裔臨發權乃引見問裔曰蜀卓氏寡女亡奔司馬相如貴土風俗何以乃爾乎裔對曰愚以為卓氏之寡女猶賢于買臣之妻權又問裔曰君還必用事西朝終不作田父於閭里也將何以報我裔對曰裔負罪而歸將委命有司若蒙僥幸得全首領五十八以前父母之年也自此以後大王之賜也權意笑歡悅有器裔之色裔出閣深悔不能陽愚即便就船權果追之不及蜀志受兵鄧芝自江州還來朝謂宗預曰禮六十不服戎而卿甫受兵何也預答曰卿七十不還兵我六十何為不受耶時預為屯騎尉芝為車騎將軍不效書生吳趙咨字伯度使魏魏主丕嘲咨曰吳王頗知學乎咨曰吳王浮江萬艘帶甲百萬任賢使能志存經略雖有餘間博覽經傳歷史籍采奇異不效書生尋章摘句而已丕曰吳可征不對曰大國有征伐之兵小國有備禦之固丕曰吳難魏乎對曰帶甲百萬江漢為池何難之有丕曰吳如大夫者幾人對曰聰明特達者八九十人如臣之比車載斗量不可勝數吳志衛故主吳平後晉侍中庾峻等問皓侍中李仁曰聞吳主披人面刖人足有諸乎仁曰以告者過也君子惡居下流天下之惡皆歸焉蓋此事也若信有之亦不足為怪昔唐虞五刑三代七辟肉刑之制未為酷虐皓為一國之主秉殺生之柄罪人陷法加之以懲何足多罪夫受堯誅者不能無怨受桀賞者不能無慕此人情也又問曰云歸命侯乃惡人橫睛逆視皆鑿其眼有諸乎仁曰亦無此事傳之者謬耳曲禮曰視天子由夾以下視諸侯由頥以下視大夫由衡視士由平面得遊目五步之內視士於衡則傲下於帶則憂旁則邪以禮視瞻高下不可不慎況人君乎哉視人君相迂是乃禮所謂傲慢傲慢則無禮無禮則不臣不臣則犯罪犯罪則陷不測矣正使有之將有何失吳志注奇人陸遜聞車浚令名請與相見謂曰早欽風彩何乃龍蟠鳳峙不肯降顧邪答曰誠知公侯敦公旦之博納同尼父之善誘然蜥蜴不能假重雲以升舉鷃雀不能從激風以飛揚是以無因爾時坐上賓客多是吳人皆相顧謂曰武陵蠻夷郡乃有此奇人也浚曰吳泰伯端委之化以改被髮文身之俗今乃上挺聖主下生賢佐亦何常之有遜歎曰國其昌也乃有斯人劉氏小説問識嵇中散語趙景貞瞳子白黑分明卿有白起之風恨量小狹趙云尺表能審璣衡之度寸管能測往復之氣何必在大但問識何如耳世説得一晉武帝始登阼探策得一王者世數繫此多少帝既不説群臣失色莫能有言者侍中裴楷進曰臣聞天得一以清地得一以寧侯王得一以為天下貞帝説群臣歎服異才蔡洪赴洛洛中人問曰幕府初開群公辟命求英奇於仄陋采賢俊於巖穴君荊楚之士亡國之餘有何異才而應斯舉蔡答曰夜光之珠不必出於孟津之河盈握之璧不必采於崑崙之山大禹生於東夷文王生於西羌聖賢所出何必常處昔武王伐紂遷頑民於洛邑得無諸君是其苗裔乎世説戲樂諸名士共至洛水戲還樂令問于夷甫曰今日戲樂乎王曰裴僕射善談名理混混有雅致張茂先論史漢靡靡可聽我與王安豐説延陵子房亦超超玄箸上竹林七賢論及語林作王濟云九牛毛或謂華談曰諺言人之相去如九牛毛寧有此理乎談曰昔許由巢父讓天子之貴市道小人爭半錢之利此之相去何異九牛毛也聞者稱善晉書言談林藪裴頠字逸民弘雅有遠識周弼見而歎曰頠若武庫五兵縱橫一時之傑也樂廣嘗與頠清言欲以理服之而頠辭論豐博廣笑而不答時人謂頠為言談之林藪上崔陳崔正熊詣都郡都郡將姓陳問正熊君去崔杼幾世答曰民去崔杼如明府之去陳恆玉振衛價少有名理善易老自抱羸疾初不于外擅相酹對時友歎曰衛君不言言必入真琅琊王平子澄高氣不群邁世獨傲每聞玠之語議至于理會之間要妙之際輒絶倒於坐前後三聞為之三倒時人遂曰衛君談道平子三倒價別傳王敦為大將軍鎮豫章玠避亂從洛投敦至武昌見敦敦與之談論彌日信宿敦顧謂僚屬謝鯤曰昔王輔嗣吐金聲於中朝此子今復玉振於江表微言之緒絶而復續不悟未嘉之中復聞正始之音阿平若在當復絶倒上此云阿平即前所云平子也晉書云何平叔若在當復絶倒按何劭王弼傳云弼字輔嗣何晏為吏部尚書甚奇弼歎之曰仲尼稱後生可畏若斯人者可與言天人之際乎正始中黃門侍郎纍缺晏議用弼丁謐沮之以弼補臺郎與曹爽論道移時無所他及爽以此嗤之並無絶倒字晉書云云豈阿何字誤耶通志略因之似亦欠審佳言如屑胡毋輔之字彥國少擅高名王澄嘗與人書曰彥國吐佳言如鋸木屑霏霏不絶誠為後進領袖也晉書泠若琴瑟裴遐字叔道綽子也善言玄理音辭清暢泠然若琴瑟嘗與河南郭象談論一坐歎服上天下為家元帝始過江謂顧驃騎曰寄人國土心常懷慚榮跪對曰臣聞王者以天下為家是以耿亳無定處九鼎遷洛邑願陛下勿以遷都為念三十萬石摯瞻曾作四郡太守大將軍戶曹參軍復出作內史年始二十九嘗別王敦敦謂瞻曰卿年未三十已為萬石亦太蚤瞻曰方於將軍少為太蚤比之甘羅已為太老世説故物庾稚恭為荊州以毛扇上武帝武帝疑是故物侍中劉劭曰柏梁雲構工匠先居其下管絃繁奏鍾夔先聽其音稚恭上扇以好不以新庾後聞之曰此人宜在帝左右上更讓簡文作撫軍時嘗與桓宣武俱入朝更相讓在前宣武不得已而先之因曰伯也執殳為王前驅簡文曰所謂無小無大從公于邁授縣李弘度常歎不被遇殷揚州知其家貧問君能屈志百里不李答曰北門之歎久已上聞窮猿奔林豈暇擇木遂授剡縣德音孝武將講孝經謝公兄弟與諸人私庭講習車武子難苦問謝謂袁羊曰不問則德音有遺多問則重勞二謝袁曰必無此嫌車曰何以知爾袁曰何嘗見明鏡疲於屢照清流憚於惠風北方物張天錫為涼州刺史稱制西隅既為苻堅所擒用為侍中後於壽陽俱敗至都為孝武所器每入言論無不竟日頗有嫉心者於坐問張北方何物可貴張曰桑椹甘香鴟梟革響淳酪養性人無嫉心知見有餘王中郎甚愛張天錫問之曰卿觀過江諸人經緯江左軌轍有何偉異後來之彥復何如中原張曰研求幽邃自王何以還因時修制荀樂之風王曰卿知見有餘何故為苻堅所制答曰陽消陰息故天步屯蹇否剝成象豈足多譏如流張天錫世雄涼州以力弱詣京師雖遠方殊類亦邊人之傑也王彌有俊才美譽當時聞而造焉既至天錫見其風神清冷言話如流陳説古今無不貫悉又諳人物氏族中來皆有證據天錫訝服要捷袁宏字彥伯陳郡人臨汝令勗之子也謝安賞宏機捷辨速自吏郎出為東陽郡乃祖之冶亭時賢皆集安欲卒迫試之執手將別顧左右取一扇而贈之宏應聲答曰輒當奉揚仁風慰彼黎庶合坐嘆宏要捷晉陽秋劭令王濛能清言談道貴理中簡而有會商略古賢顯默之際辭旨劭令往往有高致謝公云長史語甚不多可謂有令音濛別傳珠玉謝公云劉尹語審細世説孫綽為惔誄敘云神猶淵鏡言必珠玉好語疏取晉孝武帝好與虞嘯父飲酒醉拜不能起嘯父答曰臣位未及扶醉未及亂非分之賜所不敢當帝美之勑疏取語於是為風俗人相嘲啁輒云好語疏取語林已老謝晦為荊州將之鎮詣從叔淡別晦色自矜淡問晦年答曰三十五淡笑曰昔荀中郎年二十九為北府都督卿比之已為老矣晦色甚愧日始可中文帝嘆重竺道生後設會親同衆御于地筵下食良久衆咸疑日晚帝曰始可中耳生曰白日麗天天言始中何得非中衆咸歎其樞機得中高僧傳農器遺後宋武帝微時嘗躬耕丹徒及受命録農器於宅以遺後元嘉中文帝幸舊宅見而色慚近侍進曰大舜耕于歷山伯禹親事水土陛下不觀列聖之遺物何以知稼穡之艱難先帝之至德乎銜命明僧皓宋大明中再使魏于時新誅司空劉誕孝武問曰若問廣陵之事何以答之對曰周之管蔡漢之淮南帝大悅及至魏魏主問曰卿銜此命當緣上國無相踰者耶答曰聰明特達舉袂成帷比屋之氓又無下僕晏子所謂看國善惡故再辱此庭賜劍孝武嘗賜謝莊寶劍劍以與豫州刺史魯爽後爽叛帝因宴問劍所在答曰昔以與魯爽竊為陛下杜郵之賜上甚悅當時以為知言北史十城內婚姻沈攸之攻郢城夜嘗風浪米船沈沒倉曹參軍崔靈鳳女先適柳世隆子攸之正色謂曰當今軍糧要急而君不以在意猶與城夜婚姻耶靈鳳答曰樂廣有言下官豈以五男易一女攸之歡然意解南齊書名遺子孫裴昭明歷郡皆清勤常謂人曰人生何事須聚畜一身之外亦復何須子孫若不才我聚彼散若能自立則不如一經故終身不事産業南史柳世隆性清廉唯盛事墳典張緒問曰觀君舉措當以清名遺子孫柳答曰一身之外亦復何須子孫不才將為爭府如其才也不如一經上徐勉雖居顯位不營産業門人故舊或從容致言勉乃答曰人遺子孫以財我遺之以清白子孫才也則且致輜軿如其不才終為他有梁書不老劉懷珍為豫章王子尚車騎將軍母憂去職服闋見江夏王義恭義恭曰別子多年那得不老對曰公恩未報何敢便老義恭善其對南齊書吞刀飲灰齊高帝有故吏東管竺景秀嘗以過係作部帝謂伯玉曰卿比看景秀不答曰數往候之往加責誚云若許某自新必吞刀刮腸飲灰洗胃帝善其答即釋之卒為忠信士南史何諡齊武帝嘗與朝臣商略酒後謂群臣曰我後當得何諡群臣莫有答者王儉因目庾杲之從容曰陛下壽等南山方與日月齊明千載之後豈是臣子輕所預量時人雅歎其辨答杲之常兼主客郎對魏使使問杲之曰百姓那得家家題門帖賣宅答曰朝廷既欲掃蕩京洛克復神州所以家家賣宅耳魏使縮鼻而不答沐浴唐風齊王儉為吏部尚書時客有姓談者詣儉求官儉曰齊桓滅談那得有汝答曰談子奔莒所以有僕儉賞其善據卒得職焉帝嘗幸樂遊苑宴群臣奏樂帝曰卿好音樂孰與朕同儉對曰沐浴唐風事兼比屋亦既在齊不知肉味帝稱善談藪南史發口成句周顒音辭辨麗出言不窮宮商朱紫發口成句賓友晤語辭韻如流與張融相遇輒以玄言相滯彌日不解清貧寡欲終日常蔬食雖有妻子獨處山舍衛將軍王儉謂顒曰卿山中何所食顒曰赤米白鹽緑葵紫蔓文惠太子問顒菜食何味顒曰春初早韭秋末晚菘人生如花齊竟陵王子良多招賓客范縝與焉子良精信釋教而縝盛稱無佛子良問曰君不信因果何得富貴貧賤縝曰人生如樹花同發隨風而墮自有拂簾幌墮于茵席之上自有敗籬牆落于糞溷之中墮茵席者殿下是也落糞溷者下官是也貴賤雖復殊途因果竟在何處梁書為仁由己阮孝緒嘗與吳郡范元琰同徵不起陳郡袁峻語之曰往者天地閉賢人隱今世路已清而子猶懷栖遁耶居士曰昔周德雖興夷齊不厭薇蕨漢道方盛黃綺無間山林為仁由己何關人世不妄有名梁武伐齊袁昂不屈後梁以為民部尚書帝謂曰齊明帝用卿為黑頭尚書我用卿為白頭尚書良以多愧對曰臣生四十七年於茲矣四十以前臣之自有七年以後陛下所養七歲尚書未為晚達帝曰士固不妄有名梁書玉環梁武帝起兵柳惔舉漢中應之武帝之鎮襄陽惔祖道帝解茅贈土玉環贈之天監二年元會帝謂曰卿所佩玉環是新亭所贈耶對曰既而瑞感神衷臣謹服之無斁帝因勸之酒帝又嘗謂曰徐元瑜違命嶺南周書父子兄弟罪不相及朕已放其諸子如何惔曰罰不及嗣賞延于世今便見之聖朝時以為知言上虎入郭梁武帝初有虎入郭上意不悅以問群臣群臣莫對尚書令王瑩在御筵乃斂板答曰昔擊石拊石百獸率舞陛下膺籙御圖虎象來格帝大悅衆咸服焉靜壇梁侍中周捨立壇于鍾山下武帝問其壇如何對曰風不鳴條雲無膚寸鹿巾黃帔甚多白簡朱衣罕至因名靜壇金陵志公庭私禮甄深魏遣李道固來使齊帝宴之深于御筵舉酒勸道固道固不受曰公庭無私禮不容受勸深徐答曰詩所謂雨我公田遂及我私座者皆服道固乃受酒梁書丙蕭何敬容在選日嘗有一客詣之此人姓吉敬容問之曰卿與丙吉遠近答曰如明公之於蕭何朱雀門災大同三年正月朱雀門災高祖謂群臣曰此門制卑狹我始欲構遂遭天火並相顧未有答何敬容獨曰此所謂陛下先天而天弗違時以為名對梁書符命魏使李諧聘梁至石頭武帝遣其主客郎范胥當接胥曰金陵王氣兆于先代黃旗紫蓋本出東南君臨萬邦故宜在此諧答曰帝王符命豈得與中國比隆紫蓋黃旗終于入洛無乃自害也有口之説乃是俳諧亦何足道多士如林梁武親問李諧曰魏朝人士德行四科之徒凡有幾人諧對曰多士如林無以備啓武帝曰武王有亂臣十人魏雖人物之盛豈得頓如卿言諧曰愚謂周稱十人本舉佐命至於濟濟多士實是文王之詩皇朝廊廟之才足與周人有競魏書李平傳僧董狐魏李騫崔劭至同泰寺主客王克舍人賀季及三僧迎之引接至浮屠中傍有執板筆者僧謂騫曰此是尸頭專記人罪騫曰便是僧之董狐復入一堂佛前有銅鉢中然燈劭曰可謂日月出矣爝火不息酉陽名對梁武帝嘗從容謂蕭子顯云我造通史此書若成衆史可廢子顯對曰仲尼贊易道黜八索述職方除九邱聖製符同復在今日時以為名對梁書四聲沙門重公嘗謁梁高祖問曰聞在外有四聲何者為是重公應聲答曰天保寺剎既出逢劉綽説以為能綽曰何如道天子萬福談藪引論易老程駿字驎駒師事劉昞性機敏好學後為著作郎獻文屢引與論易老之義又問其年對曰臣六十有一帝曰昔太公既老而遇文王卿今遇朕豈非早乎駿曰臣雖才謝呂望而陛下尊過西伯覬天假餘年竭六韜之效元魏書出軍婦人徐君蒨字懷簡辨於辭令湘東王常出軍有人將婦人從者王曰才愧李陵未能先誅女子將非孫武遂欲驅戰婦人君蒨應聲曰項籍壯士猶有虞兮之愛紀信成功亦資姬人之力南史五日暉粉壁釋寶海還蜀梁武陵王紀作鎮井絡敬愛無已每就宿至旦王將盥手日影初出王曰日暉粉壁狀似城中風動剎鈴方知寺裏其晨車蓋迎王馬復嘶鳴海曰遙看蓋動喜遇陳思忽聽馬鳴慶逢龍樹相與歡笑而出高僧傳贈刀梁孝元屢遣使于蜀召劉璠威靈王紀知不為己用乃厚贈而遣之臨別紀又解其佩刀贈璠曰想見物思人對曰敢不奉揚威靈克翦姦宄北史簡要魏愷辭長史積年沈廢後遇楊愔於路微自披陳楊答曰發詔授官咸由聖旨非選曹所悉公不勞見訴愷應聲曰雖復零雨自天終待雲興四嶽公豈得言不知楊欣然曰此言極為簡要更不須多語數日除霍州刺史北齊書假毛羽陳宣帝嘗披瑣事指蕭引署名曰此字勢翻翻似鳥之欲飛引謝曰此乃陛下假其毛羽耳帝又謂引曰我每有所忿見卿輒意解何也引曰此陛下不遷怒臣何與此恩陳書兄替李孝貞字元操好學善屬文仕齊與弟孝基同見吏部郎中陸昂昂戲之曰弟名孝基兄其替矣孝貞對曰僕雖不肖請附子臧昂握手曰士固不妄有名吾賢必當遠至孝貞後遷蒙州刺史吏民安之自此不復留意於文筆人問其故慨然嘆曰五十之年倏焉而過鬢垂素髮筋力已衰宦意文情一時盡矣悲夫隋書龍因雲出隋太子勇男儼雲定興女生也初誕帝曰此乃皇太孫何乃生不得地靈曰天生龍種所以因雲而出時人以為敏對北史金剛弩目隋吏部侍郎薛道衡嘗遊鍾山開善寺謂小僧曰金剛何為弩目菩薩何為低眉僧答曰金剛弩目所以降伏四魔菩薩低眉所以慈悲六道道衡憮然不能對辛舊太公辛郁舊名太公弱冠遭太宗於行所問何人曰辛太公太宗曰何如舊太公郁曰舊太公八十始遇文王臣今適年十八已遇陛下過之遠矣太宗命直史館御史臺記回天太宗欲修洛陽宮張玄素上書諫上歎曰吾思之不熟乃至於此魏徵聞之嘆曰張公論事有回天之力可謂仁人之言哉本傳切理馬周有機辨中書侍郎岑文本常稱馬君論事援引事類揚榷古今舉要刪繁會文切理一字不可增減聽之靡靡令人忘倦本傳口伐可汗鄭元璹尚文藝突厥攻太原元璹持節往勞敵以不信咎中國元璹隨語折責無所屈因謂頡利曰今掠財資劫人口皆入所部豈若仆旗接好則金玉重幣一歸可汗口伐可汗如約朕何惜金石賜公哉孔帖一言賢十萬衆馬盎或告盎叛太宗詔蘭謨發江淮甲卒將討之魏徵諫曰王者兵不宜為蠻夷動勝之不武不勝為辱盎反未狀當懷之以德盎懼必自來帝乃遣散騎常侍韋叔詣喻盎盎遣智戴入侍帝曰徵一言賢於十萬衆上姑姪則天以武承嗣為左相李昭昭奏曰不知陛下委承嗣重權何也則天曰我子姪委以心腹耳昭德曰君以姑姪之親何如父子何如母子則天曰不如也昭德曰父子母子尚有逼奪何諸姑之能容使其便可乘御寶位其遽安乎且陛下為天子陛下之姑受何福慶而委重權於姪手事之去矣則天矍然曰我未思也即日罷承嗣政事大唐新語自託蕭至忠素有雅望自託於太平公主公主引為刑部尚書嘗自公主第門出遇宋璟璟曰非所望於蕭傳耶公至忠笑曰善乎宋生之言然不能自返也唐書下坂走丸張九齡善談論每與賓客議論經日滔滔不竭如下坂走丸也時人服其辨天寶遺事粲花李白天才俊逸每與人談論皆成句讀如春葩麗粲於齒牙之下時人號曰李白粲花之論上廉無厚畜洛陽人盧坦字保衡為河南尉時杜黃裳為尹召坦立堂下曰某家子與惡人遊破産盍察之坦曰凡居官廉雖大臣無厚畜其能積財者必剝下以致之如子孫善守是天富不道之家不若恣其不道以歸於人黃裳驚其言自是遇加厚唐書皇王道盡劉迅字捷卿陳郡殷寅名知人見迅歎曰今黃叔度也劉晏每聞其論曰皇王之道盡矣上折文臣訓注之禍宦者氣盛凌轢南司延英議事中貴必引訓注以折文臣李石曰京師之亂始自訓注訓注之起始自何人仇士良等不能對其勢稍抑續世説一片文章李建勳字致堯博覽群籍頗善理論宋齊邱當國深忌同列少所推遜然獨稱建勳曰李相清談不必潤色自是一片文章矣南唐近事真道嫉惡楊文公危言真道獨立一世嫉惡如讎在翰苑日有新幸近臣意欲扳入其黨中因間語公曰君子知微知彰知柔知剛公正色疾聲答曰小人不恥不仁不畏不義幸臣大沮心切銜之竟以事中公逐之寓簡黃龍府宋焦守節其宗時奉使契丹館伴丁求説指遠山謂曰此黃龍府也守節應聲曰不知燕然山去此幾許求説慚服宋史項贅蔣之奇字頴叔既貴項上大贅每忌人視之為六路大漕至金山寺僧了元與蔣相善一日見蔣即手捫其贅蔣心惡之了元徐曰沖卿在前穎叔在後蔣大喜了元佛印也慈聖后嘗夢神人語云太平宰相項安節神宗密求諸朝臣無有此人久之吳沖卿為上相瘰癤生頸間一日立朝項上腫如拳后見之告上曰此真項安節也朱彧可談稱書宋高宗問尹焞曰紂亦君也孟子何以謂之獨夫焞對曰此非孟子之言武王誓師之言也獨夫受洪惟作威高宗又問曰君視臣如草芥臣可遽視君如寇讎乎焞對曰此亦非孟子之言書云撫我則后虐我則仇高宗大喜融結孝宗曾謂王過曰李融字若川謂何過對曰天地之氣融而為川結而為山李融之字若川如元結之字次山也上大喜坦齋筆衡非急一聲而非駟馬不能追一言而急駟馬不能及故惡言不出苛聲不入耳此謂君子也登析子多言何益子禽問多言有益乎墨子曰蝦蟇蛙眑黽日夜而鳴舌乾劈然而不聽今鶴雞時夜而鳴天下振動多言何益唯其言之時也墨子正倚明君治國三寸之機運而天下定方寸之謀正而天下治一言正而天下定一言倚而天下靡申子矯尾厲角鬼谷先生曰蘇秦張儀一體也然其矯尾厲角含吐縱橫張儀不如蘇秦是能分人主之地也入前重義賢者之於義曰貴乎義乎曰義是故堯以天下與舜曰富乎義乎曰義是故子罕以不受玉為寶曰生乎義乎曰義故務光投水而殪三者人之所重而不足以易義尸子高義佛肸以中牟叛置鼎於庭致士大夫曰與我者受邑不吾與者烹大夫皆從之至田基卑曰義死不避斧鉞之罪義窮不受軒冕之服無義而生不仁而富不如烹褰衣將就鼎佛肸脫屨而生之趙氏聞其叛也攻而取之聞田基不肯與也求而賞之田基曰不可也一人舉而萬夫俯首智者不為也賞一人以慚萬夫義者不取也我受賞使中牟之士懷恥不義辭賞從處曰以行臨人不道吾去矣遂之楚新序楚王高其義待以司馬説苑知命白公勝將弒楚惠王王出亡令尹司馬皆死拔劍而屬之於屈廬曰子與我將舍子子不與我必殺子廬曰子殺叔父而求福於廬也可乎吾聞知命之士見利不動臨死不恐為人臣者時生則生時死則死是謂之人臣之禮故上知天命下知臣道其有可劫乎子胡不推之白公勝乃內其劍新序辭王白公勝既殺令尹司馬欲立王子閭以為王王子閭不肯劫之以刃王子閭曰王孫輔相楚國匡正王室而後自庇焉閭之願也今子假威以暴王室殺伐以亂國家吾雖死不子從也白公勝曰楚國之重天下無有天以與子子何不受也王子閭曰吾聞辭天下者非輕其利也以明其德也不為諸侯者非惡其位也以潔其行也今吾見國滅而忘主不仁也劫白刃而失義不勇也子雖告我以利威我以兵吾不為也白公強之不可遂殺之葉公高率衆誅白公而反惠王於國上成義齊人有子蘭子者事白公勝勝將為難乃告子蘭子曰吾將舉大事於國願與子共之子蘭子曰我事子而與子殺君是助子之不義也畏患而去子是遁子於難也故不與子殺君以成吾義契領於庭以遂吾行説苑持釜置車俗説齊人有空車行魯人有負釜者便持釜置車中行三百里臨別取釜不相問亦不謝後車家繫獄當死釜主徑往纂之穿壁未達曰極哉車者怒不肯出釜主慚欲俱死明日主者以事白齊君齊君義而原之風俗通理畢就烹欒布梁人也梁王彭越為家人時嘗與布遊後布為人略賣為奴于燕為其主家報仇燕王臧荼舉以為都尉荼為燕王布為將燕反漢擊燕虜布越聞之贖布為梁大夫使於齊未反漢召彭越責以謀反夷三族梟首洛陽詔有收視者輒捕之布還奏事彭越頭立祠而哭之吏捕以聞上召布罵令趣烹之布理越畢請就烹上釋之拜為都尉漢傳金尉陳翼字春卿廬江舒人也行到藍鄉見道邊有一馬傍有一病人呼曰我是長安魏公卿聞廬江樂土來遊今病不能復前倘可相救翼扶歸眷視積日病困曰有金十餅素二十匹死則賣以殯斂餘謝主人既死翼賣素買棺衣衾殯葬以金置棺下騎馬出入後其兄長公見翼乘馬告吏捕翼翼具言之棺下得金長公叩頭以金十餅投其門中翼送長安還之翼後為魯陽尉號魯陽金尉廬江七賢傳范晏陰德傳直亮不容平陵云敞在吳章門下往往好斥人過以為輕薄世人皆以為然章後為王莽所殺人無敢有收葬者弟子皆更易姓名以從他師敞時為司徒掾獨稱吳章弟子收葬其尸方知直亮者不見容於冗輩中矣平陵人生為立碑於吳章墓側在龍首山南幕嶺上西京雜記漢書云敞字幼孺志膽廉范受業事博士薛漢會漢坐楚王事誅故人門生莫敢視范獨往收斂之吏以聞顯宗大怒召范入詰責曰漢與楚王同謀交亂天下范公府掾不與朝廷同心而反收斂罪人何也范叩頭曰臣無狀愚戇以為漢等皆已伏誅不勝師資之情罪當萬坐帝怒稍解問范曰卿廉頗後耶與右將軍褒大司馬丹有屬乎范對曰褒臣之高祖丹臣之祖也帝曰怪卿志膽敢爾因貰之由是顯名後漢還孫遺全闞敞字子張平輿人仕郡為五官掾時太守第五常被徵臨發倉卒有俸錢百三十萬留付敞敞埋著堂上遂遭世倉卒道路斷絶敞年老飢羸其妻曰第五府君所寄錢可取自給然後償之敞曰吾窮老何明當有用故君之財邪道通當送飢寒何損常舉門遭疫妻子皆死常病臨困惟有孤孫年九歲常謂之曰吾寄故五官掾平輿闞敞錢三十萬氣遂絶後孫年長大步擔至汝南問敞敞見之悲喜與共臨發穿錢百三十萬孤孫曰亡祖臨終言有三十萬耳今乃百三十萬不敢當也敞曰府君病困氣索言謬誤耳即無疑也汝南先賢傳腳攣楊彪字文先建安時見漢祚將終遂稱腳攣不復行積十年及曹丕受禪欲以彪為太尉先遣吏示旨彪辭曰彪備漢三公遭世傾亂不能有所補益耄年被病豈可贊惟新之朝遂固辭後漢撫哭脂習字元升京兆人也中平中仕郡公府辟舉高第與少府孔融親善曹操為司空威德日盛而融故以舊意書疏倨傲習常責融欲令改節融不從會融被誅當時許中百官先與融親善者莫敢收恤而習獨往撫而哭之文舉卿捨我死我當復與誰語者哀歎無已太祖聞之收習欲理之尋以其事直見原黃初詔欲用之以其年老然嘉其敦舊有欒布之節賜拜中散大夫魏略義士曹操引軍攻袁談於南皮王修時運糧在樂安聞談急將所領兵及諸從事數十人往赴談至高密聞談死下馬號哭曰無君焉歸遂詣操乞收葬談尸操欲觀修急默然不應修復曰受袁氏厚恩若得收斂談尸然後就戮無所恨操嘉其義聽之三國志曹公既誅袁談梟其首令曰敢哭之者戮及妻子於是王叔治田子泰相謂曰生受辟命亡而不哭非義也畏死亡義何以立世遂造其首而哭之哀動三軍軍正白行其戮操曰義士也赦之傳子感義司馬昭弒魏主髦收王經誅之故吏向雄哭之哀動一市鍾會誅雄復收葬之昭聞召而責之曰往者王經之死卿哭於東市而我不問今鍾會躬為叛逆而又輒收葬若復相容其如王法何雄曰王誅既加於法已備雄感義收葬教亦無闕何必使雄背死違生以立於時殿下讎懟枯骨捐之中野百歲之後為臧獲所笑豈仁賢所掩哉昭悅與宴談而遣之漢晉春秋表葬諸葛恪亡後臨淮臧均表乞收葬曰昔項籍受殯葬之施韓信獲收斂之恩此則漢高發神明之譽也欒布矯命彭越臣竊恨之不先請主上而專名以肆情其得不誅實為幸耳吳志篤義紀瞻字士遠歷陽太守沛國武嘏臨亡以家後不立遂手書寄託瞻悉迎接為居宅衣食取足有若骨肉少與陸機兄弟親善機一門被誅瞻復相營恤機女為嫁之由是稱其篤義晉中興書代姪江都王延年年十五喪二親奉叔父孝聞子良孫及弟從子為噉人賊所掠延年追而請之賊以良孫歸延年延年拜請曰我以少孤為叔父所養此叔父之孤孫也願以子易之賊曰君義士也免之崔鴻十六愚狷石勒謂右長史張賓曰鄴魏之舊都吾將營建誰可任也賓曰晉故東萊太守趙彭忠亮篤敏將軍若任之以鄴必能允副神規勒於是徵拜魏郡太守彭至泣而辭曰臣往曾策名晉室食其祿矣且受人榮寵復事二姓者臣志所不為且豈愚臣之狷志恐亦明公之許有死而已未敢聞命若賜其餘年全臣一介之願者則明公大造也於是賜安車駟馬養以卿秩後趙録不屈龔頴遂寧人也少好學益州刺史毛璩辟為勸學從事璩為譙縱所殺故佐吏並逃亡穎號哭奔赴殯送以禮縱後設宴延穎不獲已而至樂奏穎流涕起曰北面事人亡不能死何忍聞舉樂蹈迹逆亂乎縱大將譙道福引出將斬之道福母則穎姑跣出救之故得免縱既僣號備禮徵又不至乃收穎付獄脅以兵刃執志彌堅終無回改至於蜀平遂不屈節元嘉二十四年刺史陸徵上表曰若王斶之抗辭燕軍同周苛之肆詈楚王方之於穎蔑以加焉誠當今之忠壯振古之遺烈宋書小過徐廣字野人初桓玄篡位安帝出宮廣陪列悲慟哀動左右及武帝受禪恭帝遜位廣又哀感涕泗交流謝晦見之謂曰徐公將無小過廣收淚答曰身與君不同君為宋朝佐命吾乃晉室遺老憂喜之事固不同時乃更歔欷因辭衰老乞歸桑梓性好讀書老猶不倦代弟孫棘大明五年發三五丁弟薩應充行坐違期不至棘自詣郡辭引已為家長令弟不行罪當在己乞以身代薩薩又辭自引太守張岱疑其不實以棘薩各置一處報云聽其相代顏色並悅甘心赴死焉棘妻許氏又寄語囑夫曰君當門戶豈可委罪小郎大家臨亡以小郎囑君今竟未婚娶家道不立君已有二子死復何恨岱依事表上孝武詔特原罪宋書不僵陸超之吳人以清靜雅為晉安王子懋所知子懋起兵既敗于琳之勸其逃亡答曰人皆有死此不足懼吾若逃亡非唯孤晉安之眷亦恐田橫客笑人玄邈等以其義欲囚將還都而超之亦端坐待命超之門生姓周者謂殺超之當得賞乃伺超之坐自後斬之頭墜而身不僵玄邈嘉其節厚為殯斂周又助舉棺未出戶棺墜政壓其頭折即死聞之者莫不以為有天道焉南史高節明帝疾不豫南康王琳於第賜死獨江泌守尸晝夜號泣悲動路人于時諸王並見誅翦故舊無敢瞻看唯泌及衡陽王子浚侍讀嚴植各為營理喪事時人高其節泌字士清濟陽人也吳均齊春秋族人兗州中從事泌黃門郎悆子也與泌同名世謂泌為孝泌以別之南史欒王魏神龜末清河王元懌領太尉辟陽固從事中郎屬懌被害元乂秉政朝野震悚懌諸子及門生吏寮莫不慮禍隱避不出素為懌所厚者彌不自安固以常被辟命遂獨詣喪所盡哀痛哭良久乃還僕射遊肇聞而嘆曰雖欒布王修無以尚也君子哉若人本傳書求葬首梁王琳舉義為陳將吳明徹所殺傳首建康懸之於市琳故吏朱瑒致書陳僕射徐陵求琳首曰竊以典午將滅徐廣為晉家遺老當塗已謝馬孚稱魏室忠臣梁故建寧公琳輕躬殉主以身許國徒蘊包胥之念終遘萇弘之青至使身沒九泉頭行千里身首異處封樹靡卜瑒早造末僚預參下席降薛君之吐握荷魏公之知遇是用霑巾雨袂痛可識之顏回腸疾首切猶生之面伏惟聖恩博厚明詔爰發赦王經之哭許田橫之葬瑒雖芻賤竊亦有心琳經蒞壽陽會遊江右願歸彼境還修窀穸庶孤墳既築或飛銜土之燕豐碑式樹時留墮淚之人近故舊王綰等已有論牒仰蒙制議不遂所陳昔廉公造逝即淝川而建塋域叔孫云亡仍芍陂而植楸檟由此言之抑有其例不使壽春城下唯傳報葛之人滄洲島上獨有悲田之客昧死陳祈伏待刑憲陵嘉其志節又明徹亦數夢琳求首並為啓陳主而許之南史散米徐陵字孝穆性清簡無所營樹祿俸與親族共之大建中食建昌邑邑戶送米至于水次陵親戚有貧匱者皆令取之數日便盡陵家尋致之絶府僚怪而問其故陵云我有車牛衣裳可賣餘家有可賣不陳書忠貞司馬皓字文升承聖中除太子庶子江陵陷隨例入關而梁室屠戮太子瘞殯失所皓以宮室乃抗表周朝求還江陵改葬辭甚酸切周朝優詔答曰昔主父從戮孔車有長者之風彭越就誅欒布得陪臣之禮庶子鄉國已改猶懷送往之情始驗忠貞方知臣道即勑荊荊州以禮安厝上至行王元規字正範性孝事母甚謹晨昏未嘗離左右梁時山陰縣有暴水流漂居宅元規唯有一小船倉卒引其母妹并孤姪入船元規自執楫棹而去留其男女三人閣於樹杪及水退獲全時人皆稱其至行上不遜榮建緒性甚亮直時高祖有舊及為丞相拜息州刺史將之官時高祖陰有禪代之計因謂建緒曰且躊躇當共取富貴耳建緒自以周之大夫因義形於色曰明公此旨非僕所聞高祖不悅建緒遂行開皇初來朝上謂之曰卿亦悔不建緒稽首曰臣位非徐廣情類楊彪上笑曰朕雖不解書語亦知卿此言不遜也隋書祖孫仗義李綱字文紀周齊王憲引為參軍宣帝將害憲召僚屬證成其罪綱誓之以死終無撓詞及憲遇害露車載尸而出故吏皆散惟綱撫棺痛哭躬自埋瘞哭拜而去舊唐憲女孀居孑立綱自以齊王故吏贍恤甚厚及綱卒其女被髮號哭如喪所生焉上綱孫安仁永徽中為太子左庶子屬太子被廢歸于陳邸官寮皆逃散無敢辭送者安仁獨涕泣拜辭而去朝野義之上篤義王義方泗州漣水人少孤貧事母甚謹博通五經而謇傲獨行初舉明經因詣京師中路逢徒步者自云父為潁上令聞病篤倍道將往焉徒不前計無所出義方解所乘馬與之不告姓名而去後為太子校書無何坐與刑部尚書張亮交通貶為儋州吉安丞貞觀二十三年改授洹水丞時張亮兄子皎配流在儋州來依義方而卒臨終託以妻子及致尸還鄉義方與皎妻自誓於海神使奴負柩令皎妻抱其赤子乘義方之馬身獨步從而還先之原武葬皎告祭張亮送皎妻子歸其家而往洹水上濟大事郭元振年十六入太學薛稷趙彥昭為友時有家信至寄錢四十萬以為舉糧忽有縗服者扣門云五代未葬各在一方今欲同時遷窆乏於資財聞公家信至頗能相濟否公即命以車一時載去略無留者亦不問姓氏深為薛趙所誚元振怡然曰濟彼大事亦何誚焉其年糧絶竟不成舉托言密行李約為兵部員外汧公之子也識度清曠迥出塵表嘗江行與一商胡舟楫相次商胡病篤邀相見以二女託之皆絶色也又遺一珠約悉唯唯及商胡死財寶約數萬悉籍其數送官而以二女求配始殮商胡時約自以夜光含之人莫知也後死胡有親屬來理資財約請官司發掘檢之夜光果在其密行皆此類也尚書故實語林汧公勉崔樞事並同犯難徐晦進士擢第登直言極諫授櫟陽尉皆自楊憑所薦及憑得罪貶臨賀尉交親無敢視送者獨晦送至藍田與憑言別故相權德輿與憑交分最深知晦之行因謂晦曰今日送臨賀誠為厚矣無乃為纍乎晦曰晦自布衣受楊公之眷方茲流播爭忍無言而別如他日相公為姦邪所譖失意於外安得與相公輕別德輿嘉其真懇大稱之於朝不數日御史中丞李夷簡請為監察晦白夷簡曰生平不識公門公何取信而見獎拔夷簡曰聞君送楊臨賀不顧犯難肯負國乎由是知名舊唐報德無私柳仲郢字諭蒙為牛僧孺辟客李德裕知其無私奏為京兆尹仲郢謝曰自言曰不期太尉思獎及此仰報感德敢不如奇章公門館德裕不以為嫌仲郢常感德裕之知大中朝李氏無祿仕者仲郢領鹽鐵時取德裕兄子從質為推官知蘇州院事令以祿利贍南宅令狐綯為宰相頗不悅仲郢與綯書曰任安不去常自愧於昔人吳詠自裁亦何施於今日李太尉受責既久其家已空遂絶蒸嘗誠增痛惻綯深感歎與從質正員官續世説燕趙美談呂兗為滄州節度判官劉守光攻陷滄洲兗被擒族誅子琦年十五將就戮有趙玉者幽薊義士也久遊兗門見琦臨危紿謂監刑者曰此子某之同氣也幸無濫焉乃引之俱去琦病足玉負之而行逾數百里變姓名乞食於路乃免於禍琦常以玉免已於難欲厚報之玉遇疾琦親為扶持供其醫藥玉卒代其家營葬事玉之子曰文度既孤而幼琦誨之甚篤及其成人登進士第尋升宦路琦之力也時議者以非玉之義不能存呂氏之嗣非琦之仁不能撫趙氏之孤唯仁義二公得之燕趙之士流為美談上徒步遠送盧多遜門下士有种英蘇冠者平生最器重之被罪之後賓客雲散二人徒步送抵天涯而還英後易名放即明逸冠易名易簡魁天下為參知政事范陽家志焚券還宅建中靖國中坡公自儋北歸卜居陽羡士人邵民瞻從學於坡為坡買一宅為緡五百坡傾囊僅能償之卜吉入居既得日矣夜與邵步月偶至村落聞婦人哭聲極哀坡徙倚聽之與邵推扉而入問嫗何為哀傷至是嫗曰吾有一居相傳百年吾子不肖舉以售人吾今日遷徙百年舊居一旦訣別此吾所以泣也坡亦為之愴然問其故居所在則坡所得者也因再三慰撫謂曰嫗不必深悲當以是居還嫗即命取屋券對嫗焚之呼其子命翌日迎母還舊居不索其直坡自是遂還毗陵不復買宅借顧塘橋孫氏居暫住焉是歲七月坡竟歿于借居白雪偶談縮屋顏叔子獨處于室鄰之嫠婦又獨處于室夜暴風雨至而室壞婦人趨而至顏叔子納之而使執燭放於平旦而蒸盡縮屋而繼之自以為避嫌之不審矣若其審者若魯人然魯人有獨處室者鄰之嫠婦亦獨處一室夜暴風雨至嫠婦室壞趨而託焉魯人閉戶而不納嫠婦自牖與之言何不仁而不納我乎魯人曰吾聞男女不六十不同居今子幼吾亦幼是以不敢納爾也婦人曰子何不如柳下惠然嫗不建門之女國人不稱其亂魯人曰柳下惠則可吾固不可吾將以吾之不可學柳下惠之可孔子聞之曰善哉欲學柳下惠者未有似於此者期於至善而不襲其為可謂智乎毛詩傳不與席光武嘗問宋弘通博之士弘乃薦沛國桓談才學洽聞幾能及揚雄劉向父子於是召談拜議郎給事中帝每宴輒令鼓琴好其繁聲弘聞之不悅悔於薦舉伺談內出正朝服坐府上遣吏召之談至不與席而讓之曰吾所以薦子者欲令輔國家以道德也而今數進鄭聲以亂雅頌非忠正者也能自改耶將令相舉以法乎談頓首辭謝良久乃遣之後大會群臣帝使談鼓琴談見弘失其常度帝怪而問之弘乃離席免冠謝曰臣所以薦桓談者望能以忠正導主而令朝廷耽悅鄭聲臣之罪也帝改容謝使反服其後遂不復令談給事中後漢不私祭遵從征河北為軍市令上舍中兒犯法遵格殺之上怒命收遵時主簿陳嗣諫曰明公欲衆整齊今遵奉法不避是教命行也上乃貰之以為刺姦將軍謂諸將曰當備祭遵吾舍中兒犯令即殺之必不私諸卿也東觀漢記松父友馬援嘗有疾梁松來候之獨拜床下援不答松去後諸子問曰梁伯孫帝壻貴重朝廷公卿已下莫不憚之大人奈何獨不為禮援曰我乃松父友也雖貴何得失其序乎松由是恨之後漢不能為郎世祖選丁邯為郎邯託疾不就詔問實病羞為郎乎對曰臣實不病恥以孝廉為令史耳世祖怒使虎賁杖之數十詔問欲為郎否對曰能殺臣者陛下不能為郎者臣也詔出不為郎三輔夬録大人蘇純字桓公有高名性強切而特毀譽親友咸憚之至乃相謂曰見蘇桓公患其教責人不見又忌之三輔號為大人後漢舞屬不報蔡雍徙朔方及將就還路五原太守王智餞之酒酣智起舞屬雍雍不為報智者中常侍王甫弟也素貴驕慚於賓客詬雍曰徒何敢輕我雍拂衣而去智銜之密告雍怨於囚放謗訕朝廷內寵惡之雍慮卒不免乃亡命江海遠迹吳會上歌舞不盼盧植少與鄭玄俱事馬融能通古今學好研精而不守章句融外戚豪家多列女倡歌舞於前植侍講積年未嘗轉盼融以是敬之上危坐有呂子義當世清賢士也有舊人往存省嫌其設酒食懷乾糒而往主人榮其降已乃盛為饌義出懷中乾糒求一杯冷水而食之為率更令有人就之宿非其度數之呂子義燃燭危坐通曉目不轉睛膝不移處陽泉物理論不拜布之破也陳群父子時亦在布之軍見曹操皆拜袁渙獨高揖不為禮操甚嚴憚之袁氏世紀嘔血高貴鄉公之殺內外喧譁司馬昭召朝臣謀其故太常陳泰不至使其舅荀顗召之告以可不泰曰世之論者以泰方於舅今舅不如泰也子弟內外咸共逼之垂涕而入昭待之曲室謂曰玄伯卿何以處我于寶晉紀泰云唯殺賈充以謝天下昭曰可復下此否對曰但見其上未見其下世説遂嘔血死魏氏春秋給車晉武帝時荀勗為中書監和嶠為令故事監令由來共車嶠性雅正常疾勗諂諛後公車來嶠便登正向前坐不復容勗勗方更覔車然得去監令各給車自此始世説劉喬字仲彥南陽人齊王冏為大司馬初嵇紹為冏所重每下階迎之喬言於冏曰裴張之誅朝臣畏憚孫秀故不敢受財物嵇紹今何所逼忌故畜裴家車中張家奴婢耶樂彥輔來公未嘗下床何獨加敬于紹冏乃止紹謂喬曰大司馬何故不復迎客喬曰似有正人言以卿不足迎者紹曰正人為誰喬曰其則不遠紹默然晉書鬼子盧志於衆坐問陸士衡陸遜陸抗是君何物答曰如卿於盧育盧珽士龍失色既出户謂兄曰何至如此彼容不相知也士衡正色曰我父祖名播海內寧有不知鬼子敢爾世説結援王導初在江左欲結援吳人請緡陸太尉對曰培塿無松柏薰蕕不同器玩雖不才義不為亂倫之始上姐上腐肉蘇峻事平王庚諸公欲用孔坦為丹陽亂離之後百姓雕弊孔慨然曰昔肅祖臨崩諸君親升御床並蒙眷識共奉遺詔坦踈賤不在顧命之列既有艱難則以微臣為先今猶姐上腐肉任人膾截耳於是拂衣而去諸公亦止上不筮郭璞嘗遇顏含欲為之筮含曰年在天位在人修已而天不與者命也守道而人不知者性也自有性命無勞蓍龜晉書時務王導名位隆重百僚宜為降禮太常馮懷以問於顏含含曰王公雖重理無偏敬降禮之言或是諸君事宜鄙人老矣不識時務既而告人吾聞伐國不問仁人向馮祖思問佞於我我有邪德乎晉書雅尚尊嚴蔡充字子尼祖睦蔡雍孫也充少好學有雅尚體貌尊嚴莫有媟慢於其前者高平劉整有雋才而車服奢麗謂人曰紗縠人常服耳嘗遇蔡子尼在坐終日不自安見憚如此充歷成都王東曹掾故稱東曹別傳充虛劉真長王仲祖共行日旰未食有相識小人貽其餐肴案甚盛真長辭焉仲祖曰聊以充虛何苦辭真長曰小人都不可與作緣世説移簴桓溫議移洛陽鐘簴王述曰永嘉不競暫都江左方當漸平區宇旋軫舊京若其不爾宜改遷園陵不應先事鐘簴溫不能奪晉書澄裁周協為謝安主簿居喪廢禮崇尚老莊脫落名教時韓康伯領中正不過協品為之議曰拜下之敬猶違衆從禮情理之極不宜以多比為通時人以康伯為澄世所不能澄裁世所不能裁上坐有婦人初淮陵內史虞珧子妻裴以尺牘辨利廉服食絶谷常衣黃衣狀若學道者司馬道子常延致之甚悅其才每與百官飲宴裴亦預焉悉令與賓客談衆人皆為降節王恭辭曰恭聞男女之別國之大節未聞宰相之坐有失行婦人一坐竦然道子慙續晉陽秋作士人中書令王球以名公子遺務事外中書舍人王弘為太祖所愛遇上謂曰卿欲作士人得就王球坐自當判耳若往詣球可稱旨就廣弘如言往王舉扇撝曰吾不得爾弘還依事啓聞太祖曰我便無如此何移坐張敷為正員中書郎時舍人秋當周赳並管要務以張同省名家嘗欲詣之周曰彼恐不相容接不如勿往秋言我等並已員外郎矣何憂不得共坐敷先設二席去壁三四尺許二客就席張呼左右曰移我遠客周等失色而退宋書拂衣中書舍人阮佃夫在會下請假東歸客勸王僧虔以佃夫要幸宜加禮接僧虔曰我立身有素豈能曲意此輩彼若見惡當拂衣而去耳佃夫言於宋明帝因而免官南齊雅步袁粲字景倩初名愍孫早以操行見知俊于儀範廢帝倮之迫使走愍孫雅步如常顧而言曰風雨如晦雞鳴不已素寡往來門無雜賓間居高臥一無所接談客文士所見不過一兩人南史乞作士夫紀僧真得幸於齊世祖容表有士風嘗請於世祖曰臣出自本縣武吏邀逢聖時階榮至此為兒婚得荀昭光女即時無復所須唯就陛下乞作士大夫上曰此由江裕謝瀹我不得措意可自詣之僧真承旨詣裕登榻坐定裕顧命左右曰移吾床遠客僧真喪氣而退以告世祖世祖曰士大夫故非天子所命上稜岸沈文季風采善于進止司徒褚淵彥回當時貴重頗以門戶裁之文季不為之屈武帝在東宮時宴朝臣文季數舉酒勸彥回回甚不平語武帝曰沈文季謂淵經為其部依然猶有故情文季曰惟桑與梓必恭敬止豈如明府亡國失土不識枌榆上升階長揖遊雅云宗愛之任勢也威震四海嘗召百司於都坐王公以下望庭拜畢高允獨升階長揖由此觀之汲長孺可以見衛青何抗禮之有魏書不同凡俗裴粲字文亮時僕射高肇以外戚之貴勢傾一時一時朝士見者皆望塵拜謁粲候肇惟長揖而已家人尤責之粲曰何可自同凡俗也上拒境梁武帝起兵州郡望風皆降袁昂獨拒境帝手書喻之曰竭力昏主未足為忠家門屠滅非所謂孝忠孝俱盡將欲何依昂答曰一餐微施尚復投殞況食人之祿而頓忘一旦非惟物議不可亦恐明公鄙之南史不食憤卒齊御史中丞顏見遠梁武帝受禪見遠不食發憤數日而卒武帝聞之曰我自應天從人何豫天下士大夫而顏見遠乃至於此續世説詠詩昭明與名士遊玄圃後池番禺軌孰盛稱此中宜奏女樂昭明不答直詠左思招隱詩云何必絲與竹山水有清音軌慚而止梁書無私徐勉為吏部尚書嘗與門人夜集客有虞皓求詹事五官勉正色答云今夕止可談風月不宜及公事時人服其無私上不染尉聿字成興性耿介明帝時為武衛將軍是時領軍元乂秉權百寮莫不致敬而聿獨長揖不拜尋出為平西將軍東涼州刺史涼州緋色天下之最乂送白綾二千匹令聿染拒而不許魏書不為身計蕭引字升休為建康令時殿內朋主吳璡及宦官李善度蔡脫兒等多所請屬引一皆不許引族子密時為黃門郎諫引曰李蔡之勢在位皆畏憚之亦宜少為身計引曰吾之立身自有本末亦安能為李蔡改行就令不平不過解職耳吳璡竟作飛書李蔡證之坐免官陳書陳汝風袁憲字德章君正子昂之孫也大同時生徒對策多行賄賂門客岑文豪請具束修君正曰我豈能用錢為兒買第耶學司銜之尋舉高第以貴公子尚簡文南沙公主陳武帝作相除司徒戶曹初謁遂抗禮長揖中書令王勱謂憲曰卿何矯衆不拜録公憲曰於理不應致拜衛尉趙知禮曰袁生舉止詳中故有陳汝之風大建三年遷御史中丞時豫章王叔英不奉法度逼取人馬憲依事劾奏免叔英自是朝野嚴憚嘗陪宴承香閣賓退後宣帝留憲與衛尉樊俊徙席山亭談宴終日帝謂俊曰袁家故為有人後主欲廢太子知憲有規諫之事答曰袁德章實鯁骨臣即日詔為尚書僕射禎明三年隋軍來伐隋將賀若弼進燒宮城北掖門兵衛皆散走朝士各藏唯憲侍左右後主謂曰我從來待卿不先餘人今日見卿可謂歲寒知松柏後凋也非惟由我無德亦是江東衣冠道盡及至長安隋文帝嘉其雅操下詔以為江表稱首南史形讚陸遊明受學於周弘正善言玄理王世充僣號封其子為漢王署德明為師就其家將行束修之禮德明恥之因服巴豆散臥東壁下充之子入跪床下德明佯紿之遺痢竟不與語遂移病成皋及入唐太宗引為文學館學士使閻立本寫真形褚亮為之讚曰經術為貴玄風可師勵學非遠通儒在茲唐新語真宰相韋安石為納言甚為張易之武三思等所忌嘗於內殿賜宴易之引蜀商宋霸子等數人於前博戲安石跪奏曰蜀商等賤類不合預登此筵因顧左右令逐出之座者皆為失色則天以安石辭直深慰勉之時鳳閣侍郎陸元方在座退而告人曰此真宰相非吾等所及也舊唐高士圖張易之昌宗嘗命畫工圖寫武三思李嶠蘇味道等十八人形象號為高士圖每引朱敬則預其事固辭不就其高潔守正如此上飲巵腹痛王毛仲有寵於玄宗百官附之一日毛仲嫁女上問何所須毛仲頓首謝曰臣萬事已備但未得客上曰張説源乾曜輩豈不可召耶對曰此則得之上曰知汝所不能致者一人耳必宋璟也對曰誠如聖旨上笑曰朕明日為汝召客明日上謂宰相朕奴毛仲有婚事卿等宜與達官悉詣其第既而日中客未敢舉箸待璟久之方至先執酒西向拜謝飲不盡巵遽稱腹痛而歸續世説時毛仲恩寵莫比每入侍宴賞與諸王薑皎等御幄前連榻而坐玄宗或時不見則悄然如有所失見之則歡洽連宵有至日晏其妻已邑虢國夫人賜妻李氏又為國夫人每入內朝謁二夫人同承賜賚舊唐不與交言宋璟為廣府都督玄宗思之使內臣楊思勗馳驛往追璟就路竟不與思勗交一言思勗以將軍貴幸殿中訴于玄宗上嗟嘆良久拜刑部尚書唐語林公直魏元忠男升娶滎陽鄭遠女升與節愍太子謀誅武三思廢韋庶人不克為亂兵所害元忠坐繫獄遠以此乃就元忠求離書今日得離書明日改醮殿中侍御史麻察不平之草狀彈遠曰鄭遠納錢五百萬將女易官既連婚國相父子崇赫逮元忠下獄遂誘私離今日得書明日改醮若言齊鄭非偶不合結褵既冰玉交歡則理資同穴下山之夫未遽御輪之聓已周無聞寄死託孤見危授命斯所謂滓穢流品點辱衣冠名教所先理資懲革請裁以憲綱禁錮終身遠從此廢棄朝野咸賞察之公正唐新語駁正安定公主初降王同皎後降韋濯又降崔詵詵先卒及公主薨同皎子繇為駙馬奏請與其父合葬勑特許之給事中夏侯銛駁曰公主初昔降姻梧桐半死逮乎再醮琴瑟兩亡則生存之時已與前夫義絶殂謝之日合從後夫禮葬今若依繇所請却祔舊婚但恐魂而有知王同皎不納於幽壤死而可作崔詵必訴於玄天國有典章事難逾越銛謬膺駁正敢廢司存請傍移禮官以求指定朝廷咸壯之上州牧有體蘇瓌字昌容歷朗歙二州刺史時來俊臣貶州參軍人懼復用多致書請瓌瓌叱其使曰吾泰州牧高下自有體能過待小人乎遂不發書俊臣未至追懷恨之由是連外徙不得入久之新唐守直李吉甫字弘憲貞元十九年為饒州刺史先是郡城已連失四牧故府廢者七稔公蒞任後命啓鑰翦荊棘而居之郡吏以有怪堅請公曰神好正直守直則神避妖不勝德失德則妖興居之在人唐語林除穢李吉甫之為相也政事堂有會食之床吏人相傳移之則宰臣當罷不遷者五十年公曰朝夕會道之所豈可使朽蠹之物穢而不除俗言拘忌何足聽也以此獲免余之願焉令徹而焚之其下鏟去聚壤十四畚議者稱正焉傳載不信術數裴度不信術數不好服食每語人曰雞豬魚蒜逢著則喫生者病死時至則行因話録耳語崔咸字重易獨行守正時望甚重裴度自興元入覲李逢吉不欲度復入中書京兆尹劉栖楚逢吉黨也栖楚等十餘人駕言排度而朝士持兩端者日擁度門一日度留客命酒栖楚矯求度之歡曲躬附裴耳而語咸疾其矯舉爵罰度曰丞相不當許所由官囁耳而語度笑而飲之栖楚不自安趨出坐客皆壯之舊唐餓死不為長安中爭為碑若市賈大官薨其門如市至有喧競不由喪家裴均之子乞銘於韋貫之縑帛萬匹却之曰寧餓死不茍為之國史補不犯韓愈與人交榮悴不易而觀諸權門豪士如僕隸焉瞪然不顧穆宗以愈為京兆尹六軍不敢犯法私相謂曰是尚欲燒佛骨何可犯之續世説聞語矍然李師中字承之為童子時論其父緯之功於朝久不報自詣漏舍以狀白韓魏公公曰君果讀書自當取科名不用紛紛論賞也承之云先人功罪未辨深恐先犬馬溝壑無以見於地下故忍痛自言若欲求官稍識字第二人及第固不難魏公王堯臣榜第二人登科承之故云公聞其語矍然或云魏公德量服一世獨於承之終身不能平承之既登第官浸顯益有直聲後王安石相神宗以三不足畏為述承之深詆之至呂獻可中丞死承之以詩哭之有姦進賢須退忠臣死國憂吾生竟何益願卜九泉遊之句安石之黨呂惠卿益怨之終其身不至大用邵氏聞見録遠佞王安石初參大政一日因閲晏元獻小詞安石曰為宰相何詎作詞王安國曰彼亦偶然自喜而為爾顧其事業亦不止此時呂惠卿為館職亦在坐遽曰為政必先放鄭聲況自為之乎平甫正色曰放鄭聲不若遠佞人呂大慚東軒雜録不受謁神宗嘗對章惇稱張安道之美問惇識否惇退以告呂惠卿惠卿明日與安道同行入朝告以上語且曰行當大用矣安道縮鼻不對其夕安道適與客坐惇呵引到門謁入安道使謝曰素不相識不敢受謁惇慚怍而退絶纓楚莊王賜群臣酒日暮酒酣燈燭滅有引美人之衣者美人援絶其冠纓告王趣火來上視纓絶者王曰賜人酒使醉失禮奈何欲顯婦人之節而辱士乎乃命群臣百餘人皆絶去其冠纓而上火盡歡而罷居三年晉與楚戰有一臣常在前五合五奮首却敵卒得勝之莊王怪問之對曰臣乃夜絶纓者也説苑隱過張安世字子孺為光祿勳郎有醉小便殿上主事白行法安世曰何以知其不反水漿邪如何以小過成罪郎淫官婢婢兄白言安世曰奴以恚怒誣汙衣冠告曰適奴其隱人過失皆此類也前漢汙車茵丙吉字少卿宣帝時為丞相於官屬掾吏務掩過揚善吉馭吏嗜酒數逋蕩嘗從吉出醉嘔丞相車上西曹主吏白欲斥之吉曰以醉飽之失去士使此人將復何所容西曹地忍之此不過汙丞相車茵耳遂不去也上優容何武字君公九江太守戴聖禮經號小戴者也行治多不法前刺史以其大儒優容之及武為刺史行部録囚徒有所舉以屬郡聖曰後進生何知乃欲亂人治皆無所決武使從事廉得其罪聖懼自免後為博士毀武於朝廷武聞之終不揚其惡而聖子賓客為群盜得繫廬江聖自以子必死武平心決之卒得不死自是後聖慚服上差強人意吳漢字子顯性強力每從征伐諸將見戰陳不利或多惶懼失其常度漢意氣自若唯整厲器械激揚士吏帝時遣人觀大司馬何為還言方修戰攻之具乃歎曰吳公差強人意隱若一敵國矣後漢認馬卓茂為丞相史時嘗出行有人認其馬茂問失馬幾日對曰月餘日矣茂曰然此馬畜已數年遂解馬與之曰即非所失幸至丞相府還我乃步挽車去後馬主自得馬慚愧詣茂叩頭謝之東觀記長者劉寬嘗行有人失牛者乃就寬車中認之寬無所言下駕步歸有頃認者得牛而送還乃謝曰慚負長者寬曰物有相類事容誤脫幸勞見歸何為致謝後漢擲杯郭林宗常不睡夜間命作粥魏德公為之進焉林宗一啜以杯擲地怒而呵之曰為粥不加味如何可食如此之進一呵德公無變色別傳隱几孔融領青州刺史為袁談所攻自春至夏戰士所餘裁數百人流矢雨集戈矛內接融隱几讀書談笑自若後漢鋤園司馬徽有人倫鑒識時人有以人物問徽者初不辨其高下每輒言佳其婦諫曰人質所疑君宜辨論而一皆言佳豈人所以咨君之意乎徽曰如君所言亦復佳劉表子琮往候徽遣問在不會徽自鋤園琮左右問司馬君在邪徽曰我是也琮左右見其醜陋罵曰死傭將軍諸郎欲求見司馬君汝何等田奴而自稱是邪徽歸家頭著幘出見琮左右見徽故是向老翁恐向琮道之琮起叩頭辭謝徽乃謂曰卿真不可然吾甚羞之此自鋤園唯卿知之耳別傳可人費禕字文偉魏軍次于興勢假禕節率衆往禦之光祿大夫來敏至禕語別求共圍棊于時羽檄交馳人馬擐甲嚴駕已訖禕與敏留意對戲色無厭倦敏曰向聊觀試君耳君信可人必能辦賊者也禕至敵遂退蜀志豁情豫章太守顧劭是雍之子劭在郡卒雍盛集僚屬自圍棊外啓信至而無兒書雖神氣不變而心了其故以爪掐掌血流沾褥賓客既散方歎曰已無延陵之高豈可有喪明之責於是豁情散哀顏色自若説苑眼光出牛背王夷甫嘗屬族人事經時未行遇於一處飲燕因語之曰近屬尊事那得不行族人大怒便舉樏擲其面夷甫都無言盥洗畢牽王丞相臂與共載去在車中照鏡語丞相曰汝看我眼光乃出牛背上世説白眼遂作王夷甫與裴景聲志好不同景聲惡欲取之卒不能回乃故詣王肆言極罵要王答已欲以分謗王不為動色徐曰白眼兒遂作上如意帖文殷荊州有所識作賦是束晳慢戲之流殷甚以為有才語王恭適見新文甚可觀便於手巾函中出之王讀殷笑之不自勝王看竟既不笑亦不言好惡但以如意帖之而已殷悵然自失上粗食致飽宗愨字元幹少任氣好武不為鄉曲所稱孝建中纍遷豫州刺史監五州軍事先是鄉人庾業家甚富豪方丈之膳以待賓客而愨至設以菜葅粟飯謂客曰宗軍人串噉粗食愨致飽而去至是業為愨長史帶梁郡愨待之甚厚不以前事為嫌宋書不競劉訏字彥度家甚貧苦併日而食隆冬之月或無氈絮訏處之晏然人不覺其飢寒也自少至長無喜慍之色每於可競之地輒以不競勝之或有加陵之者莫不退而愧服南史象逸不動梁武帝開講於同泰寺會者數萬人南越所獻馴象忽在逸衆皆駭散唯臧盾裴之禮嶷然不動帝甚嘉焉續世説殺鵠不罪梁安成王秀性仁恕喜慍不形於色左右嘗以石擲殺所養鵠齋師請治其罪秀曰吾豈以鳥傷人在京師日臨公事廚人進食誤而覆之去而登車竟朝不飯亦不之誚也梁書把詔溫子升字鵬舉莊帝殺爾朱榮也子升預謀當時赦詔子升詞也榮入內遇子升把詔書問是何文字子升顏色不變曰勑榮不視之北史擊墜長笑崔康帶毋極令時甄琛為長史曾因公事言競之間以拳擊琛墜床琛以本縣長笑而不論魏書讓田元文遙字德遠初自洛遷鄴惟有地十餘頃家貧所資衣食魏之將季宗姓被悔有人冒相侵奪文遙即以與之及貴此人尚在乃將家逃竄文遙大驚追加撫慰還以與之彼人愧而不受彼此俱讓遂為間田北齊書癡人崔暹字季倫好薦人士言邢邵宜親重言論之際邵遂毀暹文襄不悅謂暹曰卿説子才長子才專言卿短此癡人也暹曰子才言暹短暹説子才長皆是實事不為癡也北史簡淡韋覆字敬遠志尚夷簡淡於榮利所居之宅枕帶林泉覆對玩琴書蕭然自逸時人號為居士焉至有慕其間素者或載酒從之覆亦為之盡歡接對忘倦子瓘行隨州刺史因疾物故孝寬子總復於并州戰歿一日之中凶問俱至家人相對悲痛而覆神色自若謂之曰死生命也去來常事亦何足悲援琴撫之如舊周書射牛不問牛弘弟弼好酒而酗嘗因醉射殺弘駕車牛弘來還宅其妻迎謂之曰叔射殺牛矣弘聞之無所怪問直答云作脯坐定其妻又云叔忽射殺牛大是異事弘曰已知之矣顏色自若讀書不輟隋書僮誤不言唐臨儉薄寡欲不治第宅服用簡素寬於待物嘗欲弔喪令家僮自歸家取白衫家僮誤將餘衣懼未敢進臨察知之使召謂曰今日氣逆不宜哀注向取白衫且止之也又嘗令人煮藥失制潛知其故謂曰陰暗不宜服藥宜即棄之竟不揚言其過其寬恕如此舊唐遺犀碎盤裴行儉嘗令醫人會藥請犀角麝香送者誤遺失已而惶懼潛竄又有勑賜馬及新鞍令史輒馳驟馬倒鞍破令史亦逃行儉委所親招到謂曰爾曹豈相輕耶皆錯誤耳待之如故初平都友遮匐大獲環寶蕃酋將士願觀之行儉因宴設遍出歷示有瑪瑙盤廣二尺餘文彩殊絶軍吏王休烈捧盤歷階趣進誤攝衣足跌便倒盤亦隨碎休烈驚惶叩頭流血行儉笑而謂曰爾非故也何至於是更不形顏色舊唐韓琦吏碎玉盞事同寵辱不驚盧承慶總章初考內外官有一官督運遭風失米盧考之曰監運失糧考中下其人容止自若無一言而退盧重其雅量改注曰非力所及考中中既無喜容亦無愧詞又改曰寵辱不驚考中上國史異纂莫窺其際婁師德朴忠沈厚心無適莫狄仁傑入相也師德密薦之及為同列頗輕師德頻擠之外使師德知之而不憾則天覺之問仁傑曰師德賢乎對曰為將謹守賢則臣不知又問師德知人乎對曰臣嘗同官未聞其知人則天曰朕之用卿師德所薦也亦可謂知人矣因命左右取筐篋得十許通薦表以賜仁傑仁傑大慚退而嘆曰婁公盛德我為其所容莫窺其際也吾不逮遠矣新語語林新書王旦薦寇準事同墨汙婁師德在夏官注選選者就案閲簿師德曰容我擇之可乎選者不去乃灑筆曰墨汙爾新書弦斷殺子宋則家奴執弩弦斷誤殺其子則不之罪獨異為父禳災李勉字玄卿為江西觀察使部人有父病以蠱道為木偶人署勉名位瘞于其壠或以告勉勉曰為父禳災亦可矜也捨之舊唐酒沐不動武元衡之西川大宴從事楊嗣復狂酒逼元衡大觥不飲遂以酒沐之元衡拱手不動沐訖徐起更衣終不令散宴乾𦠆子以米易酒陽城嘗絶糧遣奴糴米奴以米易酒醉臥于路城怪其故與弟迎之奴未醒乃負以歸及覺奴痛咎謝城曰寒而飲何責焉唐書房文烈性溫柔未嘗嗔怒為吏部郎中時霖雨絶糧遣婢糴米因以逃竄三四日方還文烈徐謂曰舉家無食汝何處來竟無捶撻北史僮折馬足歸登寬博容物嘗使僮飼馬蹄覂僮怒擊折馬足登知而不責晚年頗好服食有饋金石之藥者且云先嘗之矣登服之不疑藥發毒幾死方訊云未之嘗他人為之怒登視之無慍常慕陸象先之為人論者亦以為近之舊唐羽化柳公權字誠信志耽書學不能治生為勳戚家碑板問遺歲時巨萬多為主藏豎海鷗龍安所竊別貯酒器杯盂一笥緘縢如故其器皆亡訊海鷗乃曰不測其亡公權哂曰銀杯羽化耳不復更言所寶唯筆硯圖畫自扃鐍之上盜飲具王潛夜宴盜入其家盡取飲具逮明方知笑曰亦好飲耶竟不問九國志血紙墮食吳越王錢俶在國日嘗大會賓客食魚羹而庖人因刃傷手以紙濡血紙墮食器中俶得之藏之袖間顧左右曰無令掌膳者知家王故事屋崩不問王崇文任兼將相而平居被服儒雅風度夷曠在武昌方騎士於鞠場旁古屋數十間忽崩聲震數里聞者莫知所為崇文指麾號令訖事不失常度竟亦不問唐書紀傳嘲戲嘲相調戲相弄也説文滑稽滑謂亂也稽同也以言辨捷之人言非若是是若非能亂同異也楚詞云將突梯滑稽如脂如韋崔浩云滑音骨稽流酒器也轉注吐酒終日不已言出口成章詞不勝窮若滑稽之吐酒故揚雄酒賦云鴟夷滑稽腹大如壺盡日盛酒人復藉沽是也又姚察云滑稽猶俳諧也滑讀如字稽言計也以言諧語滑利其知計疾出故云滑稽也靳之宋萬歸宋公靳之曰始吾愛子今子魯囚也吾不愛子矣萬病之遂閔公左莊十一御覽敬作愛注戲而相愧曰靳白帖御覽作戲而相狎持狹欲奢齊威王八年楚大發兵加齊齊王使淳于髡之趙請救兵齎金百斤車馬十駟于髡仰天大笑冠纓索隱王曰先生少之乎髡曰何敢王曰笑豈有乎髡曰今者臣從東方見道傍有穰田者操一豚蹄酒一盂而祝曰甌窶滿篝汙邪滿車五榖蕃熟穰穰滿家臣見其所持者狹而所欲者奢故笑之於是威王乃齎金璧車馬至趙楚聞之夜引兵去史記人中八寸漢武帝對群臣云相書云鼻下人中長一寸年百歲東方朔在側因大笑有司奏不敬方朔免冠云臣誠不敢笑陛下實笑彭祖面長耳帝問之朔曰彭祖正八百歲果如陛下之言則彭祖人中可長八寸以此推之彭祖面長一丈餘矣帝大笑別傳滑稽之雄東方朔名過實者以其該達多端不名一行應諧似優不窮似智正諫似直穢德似隱非夷齊而是柳下惠戒其子以上容首陽為拙柱下為工飽食安步以仕易農依隱玩世詭時不逢其滑稽之雄乎前漢夷齊愚夫武帝見畫伯夷叔齊形像問東方朔此何人曰古之愚夫帝曰天下廉士何為愚夫耶對曰賢者居世與時推移不凝滯於物何不泛泛然如水中之鳧與波俱逝何自苦於首陽乎朔傳邪揄光武令王霸至薊市中募人將以擊王郎市中人皆大笑舉手邪揄之霸慚懅而還東觀漢記手相笑也説文三牲備身漢有牛通為隴西主簿馬文淵為太守羊喜為功曹涼部云三牲備身風俗通妲己賜周公初曹操攻屠鄴城袁氏婦子多見侵略而操子丕私納袁熙妻甄氏孔融與操書稱武王伐紂以妲己賜周公操不悟後問出何經典對曰以今度之想當然耳後操討烏桓又嘲之曰大將軍遂征蕭條海外昔肅慎氏不貢楛矢丁零盜蘇武羊可并案也後漢淫具簡雍字憲和時天旱禁酒釀者有刑吏於人家索得釀具論者欲令與作酒者同罰雍與先主遊觀見一男女行道謂先主曰彼人欲行淫何以不縛先主曰卿何以知之雍對曰彼有其具與欲釀者同先主大笑而原欲釀者蜀志談啁流速張裔領留府長史北詣諸葛亮咨事送者數百車乘盈路裔還書與所親曰近者涉道晝夜接賓不得寧息人自敬丞相長史男子張君嗣附之疲倦欲死其談啁流速皆此類也上蜀吳蜀張奉使吳於權前列尚書闞澤姓名以嘲澤澤不能答薛綜下行酒因勸酒曰蜀者何也有犬為獨無犬為蜀橫目勾身蟲入其腹奉曰不當復列君吳耶綜應聲曰無口為天有口為吳君臨萬邦天子之都於是舉坐大笑吳志費禕聘吳諸葛恪云有水者濁無水者蜀云吳下臨滄海天子帝都江表傳向天穿針諸葛恪對南陽韓文晃誤呼其父字晃詰之曰向人子前呼其父字為是禮也恪笑而答曰向天穿針而不見者非離于天意有所在耳孫權使太子嘲恪曰諸葛元遜食馬矢一石恪答曰臣得戲君子得戲父答明太子未敢上曰可恪曰乞太子食雞卵三百枚上問恪曰人令君食馬矢卿令人食雞卵何也恪答曰所出同耳吳主大笑啓顏録父名鍾育為黃門郎有機警在司馬師坐燕飲時陳群子玄伯武周子元夏同在坐共嘲育師曰皋繇何如人對曰古之懿士顧謂玄伯元夏曰君子周而不比群而不黨世説五伯市魁賈充嘗宴朝士而庾純後至充謂曰君行常居人前今何以在後庾曰且有小市井事不了是以來後世言純之先嘗有五伯者充之先有市魁者充純以此相譏焉晉書俗物敗人意嵇阮山劉在竹林酣飲王戎後往步兵曰俗物已復來敗人意王笑曰卿輩意亦復可敗耶世説勿作常怪荀鳴鶴陸士龍二人未相識俱會張茂先坐張令其語以其並有大才可勿作常語陸舉手曰雲間陸士龍荀答曰日下荀鳴鶴陸曰既開青雲覩白雉何不張爾弓布爾矢荀答曰本謂雲龍騤騤定是山鹿野麋獸弱弩強是以發遲張乃撫掌大笑風至塵飛陸機詣王武子武子有百解羊酪指以示之曰卿東吳何以敵此陸曰有千里蓴羹未下鹽豉耳機在坐潘安仁至陸便起去安仁曰清風至塵飛揚陸應聲答曰衆鳥集鳳凰翔語林無勳頒賚元帝皇子生普賜群臣殷洪喬謝曰皇子誕育普天同慶臣無勳焉而猥頒厚賚中宗笑曰此事豈可使卿有勳邪聚溷謝幼輿謂周侯曰卿類社樹遠望之峨峨拂青天就而視之其根則群狐所託下聚溷而已答曰枝條拂青天不以為高群狐亂其下不以為濁聚溷之穢卿之所保何足自稱圖作佛何次道往瓦棺寺禮拜甚勤阮思曠語之曰卿志大宇宙勇邁終古何曰卿今日何故忽見推阮曰我圖數千郡尚不能得卿乃圖作佛不亦大乎忘食孫安國往殷中軍許共論往反精苦客主無間左右進食冷而復暖者數四彼我奮擲麈尾悉脫落滿餐飯中賓主遂至暮忘食殷乃語孫曰卿莫作強口馬我當穿卿鼻孫曰卿不見缺鼻牛人當穿卿頰遇物斯乘顧愷之見謝萬因論神仙顧問云仙者之乘或羊或鹿使君當乘何物耶對曰居家者遇物斯乘卿輩即轅中客也顧氏家傳鬼揶揄晉羅友家貧乞祿桓溫雖以才學遇之而謂其誕肆非治民才許而不用同府人有得郡者溫為坐序別友亦被命至尤遲晚溫問之答曰臣昨奉教旨出門於中路見鬼揶揄云我只見汝送人上郡何不見人送汝上郡友始怖終慚不覺成淹緩之罪溫笑其滑稽而顧愧焉後以為襄陽太守者宮故事續晉陽秋牽船劉道貞遭亂於河側自牽船見一老嫗採梠劉調之曰女子何不調機弄杼因甚傍河採梠嫗答曰丈夫何不跨馬揮鞭因甚傍河牽船又嘗與一人共飲牽拌草舍中食見一嫗將兩小兒過並著青衣劉調之曰青羊將兩羔嫗答曰兩豬共一槽道真無以對語林錐槌祖士言與鍾雅相嘲鍾云我汝潁之士利如錐卿燕代之士鈍如槌祖曰以我鈍槌打爾利錐鍾曰自有神錐不可得打祖曰既有神錐亦有神槌鍾遂屈啓顏録王母辛恭靜見司馬太傅問卿何處人答曰西人太傅應聲戲之曰在西頗見西王母不恭靜答曰在西不見西王母過東已見東王公太傅大愧語林一物二稱謝公始有東山之志後嚴命屢臻勢不獲已始就桓公司馬于時人有餉桓公藥草中有遠志公取以問謝此藥又名小草何一物而有二稱謝未即答時郝隆在坐應聲答曰此甚易解處則為遠志出則為小草謝甚有愧色桓公目謝而笑曰郝參軍此過乃不惡亦極有會更相推前王文度范榮期俱為簡文所要范年大而位小王年小而位大將行更相推在前既移久王遂在范後王因謂曰簸之揚之粳粃在前范曰洮之汰之沙礫在後著絮挂閡王文度在西州與林法師講韓孫諸人並在坐林公理每欲小屈孫興公曰法師今日如著敝絮在荊棘中觸地挂閡禁臠孝武屬王珣求女壻曰王敦桓溫磊砢之流既不可復得且小如意亦好豫人家事酷非所須正如真長子敬比最佳珣舉謝混後袁山松欲擬謝婚王曰卿莫近禁臠刻畫無鹽庾元規語周伯仁諸人皆以君方樂周曰何樂謂樂毅邪庾曰不爾樂令耳周曰何乃刻畫無鹽以唐突西子也世説頗有蕪菁唐突人參也汝潁優劣論陳群彈棊發八勢王裕之字敬弘桓玄姊夫也形狀短而起坐端方桓玄謂之彈棊發八勢所居舍亭山林澗環周備登臨之美故時人謂之王東山南史妳母何承天徐廣之甥也除著作佐郎年已邁諸佐郎並名家年少潁川荀伯子嘲之常呼為嬭母何曰卿當云鳳凰將九子何言嬭母耶談藪晉穆帝升平四年鳳凰將九雛見于豐城須古物江夏王乂恭性愛古物常遍就朝求之侍中何勗已有所送而王徵索不已何意不平常出行于道中見狗枷敗犢鼻乃命左右取之還以箱擎送之箋云承復須古物今奉李斯狗枷相如犢鼻謝綽宋拾遺録父諱殷淳字粹遠子孚有父風嘗與侍中何勗嘗共食孚羹盡勗云益殷蓴羹勗司空無忌子也孚徐輟筯曰何無忌諱南史流湎謝瀹字又潔莊子也嘗與劉悛飲推讓久之悛曰謝莊兒不可云不能飲瀹曰茍得其人自可流湎千日悛甚慚無言悛劉勔子也上連璧王儉與王敬則同拜開府儀同三司時徐孝嗣於崇禮門候因嘲之曰今日可謂連璧儉曰不意老子遂與韓非同傳上敬別傳許而不與張融嘗乞假還武帝問所居答曰臣陸居無屋舟居無水上未解問其從兄緒緒曰融近東出未有居止權牽小船上岸住在其間上大笑太祖嘗面許融為司徒長史敕竟不出融乘一馬甚瘦太祖曰卿馬何瘦給粟多少融曰日給一石帝曰何瘦如此融曰臣許而不與明日即除司徒長史融與弟寶積俱謁太祖融與御前放氣寶積起謝曰臣兄觸忤宸扆上笑而不問須臾食至融排寶積不與同食上曰何不與賢弟同食融曰臣不能與泄氣之口同盤上大笑談藪執鍮釋寶海嘗因講經執鍮石香爐梁武帝曰法師雖斷慳貪香爐非鍮不執海應聲曰陛下位居宸極帽簪非纛不戴帝大悅衆咸驚嘆高僧傳戴纛梁周捨學通內外兼有口才謂沙門法云曰孔子不飲盜泉之水法師何以捉鍮石香爐答曰檀越既能戴纛貧道何為不執鍮談藪不遊高座齊僕射東海徐孝嗣修葺高座寺多在彼宴息法雲師亦治蕭寺日夕各遊此二寺鄰接而不相往來孝嗣常謂法雲曰法師嘗在高座而不遊高座寺答曰檀越既事蕭門何不至蕭寺談藪學作貴人到溉掌吏部尚書時何敬容以今參選事有不允溉輒相執敬容謂人曰到溉尚有餘臭遂學作貴人初溉祖彥之初以擔糞自給故世以為譏云南史到洽一日問劉孝綽吾甚欲買東鄰地以益宅而其主難之奈何綽曰但多輦糞於其旁以苦之洽怒竟因事害之劾勉之一目角鴟濟州長史李翥常為主人朝士咸集幽州長史陸仁惠不來翥甚銜之周彥淵曰一目之羅豈能獲鳥翥眇一目陸號角鴟又崔儦謂彥淵曰我拙于書不能儦字使好彥淵曰正可長牽人腳斜飄麃尾談藪使知寒暑徐陵字孝穆摛子也太清二年使魏魏人授館宴賓是日甚熱其主客魏收嘲陵曰今日之熱當由徐常侍來陵即答曰昔王肅至此為魏始制禮儀今我來聘使卿復知寒暑收大慚南史殷餘梁陸晏子聘魏魏遣李諧郊勞過朝歌城晏子曰殷之餘人正應在此諧曰永嘉南渡盡在江外談藪不林下立盧思道嘗在賓客日中立內史李德林謂之曰何不就樹蔭思道曰熱則熱矣不能林下立酉陽共甑分炊北齊盧思道聘陳設宴聯句作詩先留者譏北人云榆生欲飽漢草長正肥驢謂北人食榆吳地無驢故有此句思道即續之曰共甑分炊飯同鐺各煮魚謂南人無義同炊異饌也吳人愧之談藪羅剎鬼國隋令盧思道聘陳陳主用觀世音語弄思道曰是何商人齎持重寶思道即以觀世音語報曰忽遇惡風漂墮羅剎鬼國陳主大慚啓顏録毗舍闍鬼隋薛道衡為聘南使時南朝一僧甚辨捷道衡向寺禮拜至佛堂門僧大引聲讀法華經云鳩盤荼鬼今在門外道衡即應聲還以法華經答云毗舍闍鬼乃在其中僧徒愧服上枷中坐隋河間郡劉焯與從弟炫並有儒學嘗俱犯法被禁縣吏不知其大儒也咸與之枷焯曰終日枷中坐而不見家炫曰終日負枷坐而不見婦上陽貨杜伯隋京兆杜公瞻衛尉臺卿猶子也嘗邀楊玠過宅酒酣因而嘲謔公瞻謂兄既姓陽陽貨實辱孔子玠曰弟既姓杜杜伯嘗射宣王殿內將軍隴西牛子充寮友推其機辨嘗謂玠曰君羊有玠恐不任廚玠曰君牛既克正可烹宰又見玠食芥葅曰君身名玠何得復噉芥葅玠曰君既姓牛何得不斷牛肉有太倉令張策者在雲龍門與玠議理屈謂玠曰卿本無德量忽共叔寶同名玠抗聲曰爾既非英雄敢與伯符連諱太子洗馬蘭陵蕭詡爽俊有才辨嘗謂玠曰流共工於幽州易北恐非樂土玠曰放歡兜於崇山江南豈是勝地談藪榤刁霸長侯白捷辨揚素與相善素關中人白山東人素嘗卒難之欲其無對而關中下俚人言音謂水為霸山東亦言擎將去為榤刁素嘗戲白曰山東固多仁義借一而得兩曰何為得兩曰有人從某借弓者乃曰榤刀去豈非借一而得兩白應聲曰關中人亦甚聰明問一知二素曰何以得知曰日有人問比來多雨渭水漲否答曰霸長豈非問一知二素服其辨捷啓顏録刺蝟橡斗侯白在散官隸屬楊素愛其能劇談每上番日即令談戲弄或從旦至晚始得歸才出省門即逢素子玄感乃云侯秀才可以玄感説一箇好話白被留連不獲已乃云有一大蟲欲向野中尋肉見一刺蝟仰臥謂是肉臠便欲銜之忽被蝟卷著鼻驚走不知休息直至山中困乏不覺昏睡刺蝟乃放鼻而去大蟲忽起歡喜走至橡樹下低頭見橡斗乃側身語云旦來遭見賢尊願郎君且避道上問病裴玄本好諧談為戶部郎中時左僕射房玄齡疾甚省郎將問疾玄本戲曰僕射病可須問之既甚矣何須問也有泄其言者既而隨倒看玄齡笑曰裴郎中來玄齡不死也唐新語卷耳韋慶本女選為妃詣明堂謝而慶本兩耳先卷朝士多呼為卷耳時長安令杜松壽見而賀之曰僕固知足下女得妃慶本曰何以知之松壽乃自摸其耳而卷之曰卷耳后妃之德也群居解頤賢室相諳吏部侍郎李安期隋內史德林之孫安平公百藥之子性機警嘗有選人被放訴云羞見來路安期問從何關來曰從蒲津關來安期曰取潼關路去選者曰恥見妻子安期曰賢室本自相諳亦應不笑又一選人引銓安期看判曰第書稍弱對曰昨墜馬損足安期曰損足何廢好書為讀判曰向看書判非但傷足兼以內損其人慚而去僉載會昌解頤李迥秀事同佩人崔行功與敬播相逐播帶櫚木霸刀子行功問播云此是何木播對曰是栟櫚木行功曰惟問刀子不問佩人啓顏録堯典舜李尚書巽性嚴毅不好戲笑時周願知江西鹽鐵留後事將至李公戒從事曰周生好諧謔幸諸賢稍莊以待之及願至數燕李公寒溫外不與之言周亦無由得發一日饌親賓願亦預焉李公有故人子弟來投落拓不事李公遍問舊別墅及家僮有技者圖書有名者悉云賣却李責曰郎君未官家貧産業從賣何至書籍古畫破除惆悵久之復問曰有一本虞永興手寫尚書此又在否其子慚懼不敢言賣云暫將典錢願忽言曰此尚書大屯李公忘却先拒其詼諧之事遂問曰尚書何屯願曰已遭堯典舜又被此兒郎典之李公忿怒之顏大開因話録十二相屬陸長源以舊德為宣武軍行司馬韓愈為巡官同在使幕或譏年輩相懸周願曰大蟲老鼠俱為十二相屬何怪之有旬日傳於長安中國史補掌印李程在夏口日有過客辭焉李相留更住三兩日客曰業已行矣舟船已在漢口程曰但相信住那漢口不足信其客盧胡掩口而退程又因與從祖弟丞相留守石飲石誤收骰子糾者罰以大白石曰何罰之有程曰汝向忙鬧時把他堂印將去又何辭焉酒家謂重四為堂印蓋譏石太和九年冬因李訓之亂倉卒登庸也嘉話又嘗問石汝曾服鍾乳否曰近服之甚覺得力程曰吾全不得汝力蓋譏石在相府無急難之效也語林善謔集枉死人面劉玄佐鎮汴嘗以説怒欲殺軍將翟行恭內外哀之然無敢辨者處士鄭涉能諧隱往見玄佐都無言既將辭曰聞翟行恭抵刑乞令所由付尸一觀玄佐怪問之對曰嘗聞枉死人面一生未識故借看耳玄佐稍悟乃免善謔集窮兵獨舞于頔聞韋皋進奉聖樂亦撰順聖樂以進每宴必使奏之其曲將半行綴皆伏而一人舞于中央幕客韋綬笑曰何用窮兵獨舞以調頔為襄帥暴虐人呼為襄樣節度國史補白澤釘門羅隱與顧雲同謁淮南高駢雲為人素雅重而隱性傲睨高公留雲而遠隱隱欲歸武陵與賓幕酌餞于雲亭時盛暑青蠅入座高命扇驅之因謔隱云青蠅被扇扇離席隱見白澤圖釘在門上即應聲曰白澤遭釘釘在門蓋譏雲也鑑戒録郡閣間談謂是寇豹謝觀得好膏藥王建在許下嘗坐事遭徒但無杖痕爾及據蜀得馬涓為從事涓好詆訐建恐為所譏因間曰竊聞外議以吾曾遭徒刑有之乎涓對曰有之建恃無杖痕且對衆因袒以示涓曰請足下試看有遭杖責而肌肉如是耶涓知其詐乃撫背而嘆曰大奇當時何處得此好膏藥來賓佐皆失色而涓晏然五代史補大還丹僧貫休有機辨杜光庭欲挫其鋒每相見必伺其舉措以戲調一旦因舞轡於通衢而貫休馬忽墜糞光庭連呼大師大師數珠落地貫休曰非數珠蓋大還丹耳上頭陀左街僧録惠江威儀程紫霄俱辨捷每相嘲誚江素充肥會暑袒露霄忽見之曰僧録琵琶腿江曰先生觱栗頭又見駱駝數頭霄指一大者曰此必頭陀也江曰此輩滋息亦有先後此則先生者非頭陀也紀異録厚朴從容盧質字子徵性好玩謔為莊宗管記會醫官陳玄補太原府醫學博士所司請稿質立草之末句云既得厚朴之才宜典從容之職莊宗覽之久為啓齒紀異何代無賢湖南馬希聲聞梁朱溫嗜食雞牧之殺五十雞為膳居其父武穆王喪發引之夕頓食雞臛數盤吏部侍郎潘起譏之曰昔阮籍居喪食蒸豚何代無賢水草大王李茂真子從曮為鳳翔節度使因生辰秦鳳持禮使陋而多髯魏博使少年如美婦人魏博戲云今日不幸與水草大王接坐秦鳳曰夫人無多言四座皆笑五代史補彌天太保天榮學士徐仲雅有清才性好滑稽周行逢素聞名召為節度判官初王逵之起兵也知設官有輕重權欲得其衆茍能應募皆置司空太保以誘之自是武陵村落廛市豪橫之輩稱司空太保者無算三楚新録行逢生日諸道各遣使致賀行逢有矜色謂仲雅曰四鄰亦畏我乎仲雅曰侍中境內彌天太和遍地司空四鄰那得不畏續世説陜西竊盜泰定中西戎寇邊王師失律當國一相以老得謝同列就第為賀飲酣自矜曰某一山民耳遭時得君告老於家當天下無一事之辰可謂太平幸民也石中立曰只有陜西一夥竊盜未獲滿座大笑湘山野録別開太湖王荊公為相大講天下水利時至有願乾太湖云可得良田數萬頃人皆笑之荊公因與客話及之時劉貢父在坐遽對曰此易為也荊公曰何也貢父曰但旁別開一太湖納水則成矣公大笑明道雜志東窗雜録太湖作梁山泊拆名劉貢父與王介甫最為故舊介甫嘗戲拆貢父名曰劉攽不直分文謂其名也貢父遂拆介甫名曰失女便成宕無宀真是妬下交亂真如上頭誤當寧介甫大慚而心銜之王銍默記漢無子雲王介甫論揚子投閣為史臣之誤劇秦美新之作亦後人誣子雲它日與東坡論及此東坡曰軾亦疑一事荊公曰疑何事東坡云不知西漢果有子雲否聞者皆大笑北窗炙輠六眼龜東坡謁呂微仲值晝寢久之方出見便坐有昌蒲盆豢緑毛龜坡指曰此易得耳若六眼則難得微仲問六眼龜出何處坡曰昔唐莊宗同光中林邑國嘗進六眼龜時敬新磨在殿下獻口號云不要鬧聽取這龜兒口號六隻眼兒睡一覺抵別人三覺遊宦紀聞東臯雜録千里更生嘉禾方千里一日會相識張更生千里乃作一令戲曰古人是劉更生今人是張更生手內執一卷金剛經問你是胎生卵生濕生化生更生謂方曰古人是馬千里今人是方千里手執一卷刑法志問汝是五千里一千里三千里葦航紀談名字詩張乂延平人入太學為齋長其人眇小而動以苛禮律諸生莆田林叔弓亦輕薄士也乃以其名字作詩賦嘲之其賦云身材短小欠曹交六尺之長腹內空虛乏劉義一點之墨其詩云中分爻兩段風使十橫斜文上全無分人前強出些聞者絶倒齊東野語死後佳葉衡罷相歸金華里居常召布衣交日飲一日覺意中忽忽不怡問諸客曰某且死所恨未知死後佳否耳一姓金士人曰甚佳葉驚顧問曰何以知之曰使死而不佳死者皆逃歸矣一死不反是以知其佳也滿坐皆笑明年丞相竟不起程史王觀之云駿馬價錢故事邊郡納粟三千斛授本州助教岐山王生納粟授官以厚價市駿馬猶不愜意每以為恨嘗騎過市醫工李生盛稱壯健以為價錢王怪問之李曰馱得三千石穀豈非壯健耶葦航紀談夾注轎子施道民為孫威敏所黥既而復得為民借小字軍人肩輿而出曾子固見之曰好一隻夾注轎子志林竿頭吉州士子赴省書先牌廬陵魁選歐陽伯樂或誚之曰有客遙來自吉州姓名桃在擔竿頭雖知汝是歐陽後畢竟從來不識修夷堅支志風之始吳給事女敏慧工詩詞後歸華陽陳子朝名儒也晚年惑一妾緣此遂染風疾一日親戚來問吳同妾在側因指妾曰此風之始也後西南士夫凡有所惑者皆以風之始為口實蕙畝拾英集雋永録天中記卷二十六
