body:
  text: 桂百藥之長桂江南木百藥之長說文招搖桂和之美者招搖之桂呂覽招搖之山其上多桂山經注桂葉似枇杷長二尺餘廣數寸味辛白花叢生山峰冬夏常青間無雜木八桂桂林八樹在賁隅東八樹成林言其大也山經羅浮山頂有桂所謂賁隅之桂羅浮山記白石之山望之如雪其上有湖傳云金鵝之所集八桂之所植臨海記八桂森挺凌霜天台賦天台山有八桂嶺地里記桂罄一山漢武帝謂東方朔曰孔子顏淵之道德何勝朔曰顏淵如桂罄一山孔子如春風至則萬物生翰林雜事抄綠桂王母與燕昭王遊於燧林之下說炎帝鑽火之術取綠桂之膏燃以照夜忽有飛蛾銜火狀如丹雀來拂於桂膏之上拾遺記闇河之北有紫桂成林其實如棗群仙餌焉韓終採藥詩曰闇河之桂實大如棗得而食之後天而老上桂餌魯人有好釣者以桂為餌黃金為釣闞子漢文帝復使陸賈使南越尉佗因使者獻桂蠹一器注應劭曰桂樹中蝎蟲也師古曰此蟲食桂故味辛而漬之以蜜食之也蘇林曰漢舊常以獻陵廟載以赤轂小車南越傳藝文御覽作賈傳誤武帝使董謁乘琅霞之輦以昇壽靈壇至三更西王母駕玄鸞之輿至壇之四面列種軟條青桂風至桂枝自拂階上游塵洞冥記漢武時昆明池中有凌波殿七間皆以桂為柱風來自香上宣帝元鳳二年於淋池之南起桂臺以望遠氣東引太液之水有一連理桂樹上枝跨於渠水下枝隔岸而南生與上枝同一株拾遺記客有問陳季方足下家君太丘有何功德而荷天下重名季方曰吾家君譬如桂樹生太山之阿上有萬仞之高下有不測之深上為甘露所霑下為淵泉所潤當斯之時桂樹焉知太山之高淵泉之深不知有功德與無也世說桂林一枝郤詵遷雍州刺史武帝於東堂會送問詵曰卿自以為何如對曰臣舉賢良對策為天下第一猶桂林之一枝崑山之片玉帝笑晉書芳林齊武帝時湘州送桂以植芳林苑中本草顏真卿為湖州刺史與袁高遊杼山陸羽折青桂花見寄顏謝以詩云群子遊杼山山寒桂花白綠荑含素蕚採摘自逋客忽枉巖中詩芳香潤金石全高南越蠹豈謝東堂策會愜名山期從君恣幽覿寶積寺故事也杭州靈隱山多桂寺僧曰月中桂也至今中秋夜往往子墜寺僧亦曾拾得招賢寺僧植桂香紫可愛郡守白公號紫陽花南部新書李德裕平泉莊有剡溪之紅桂種山之月桂曲阿之山桂永嘉之紫桂剡中之真紅桂東陽之壯桂一品集龍門敬善寺有紅桂樹獨秀伊川嘗於山南諸山訪之莫致陳侍御因訪剡溪樵客偶得數株移植郊園眾芳色沮乃知敬善所有是蜀道異草徒得嘉名南唐後主嘗召徐鍇至清暑閣閣前地徑兩草生磚縫中薙去復生鍇曰呂氏春秋云桂枝之下無雜木味辛故也後主令取桂屑數斗勻布縫中經宿草盡死談苑以桂為丁以釘木中其木即死蓋其性相制耳雷公炮炙論岱輿山北有玉梁千丈駕玄流於上傍有丹桂紫桂白桂皆直上百尋可為舟航謂之文桂之舟拾遺記太山北有桂樹七十株天神青腰玉女三千人守之其實赤如橘人食之一年仙宮迎之常有九色飛鳳寶光珠雀鳴集於此天地運度經香桂林邑城隍塹之外林棘荒蔓榛梗冥鬱滕槃等秀參錯際天其中香桂成林氣清澄烟桂父縣人也棲居此林服桂得道水經天竺天竺桂生西胡國功用似桂不過之圖經蠹桂夫翠飾羽而體分象美牙而身喪蚌懷珠而致剖蘭含香而遭焚膏以明而遂煎桂以蠹而成疾金樓子百木長松柏為百木長也而守宮闕史記松肪松脂一名松膏一名松肪松花名松黃本草松脂淪入地中千歲為茯苓茯苓千年化為琥珀琥珀一名江珠今太山有茯苓而無琥珀益州永昌出琥珀而無茯苓博物志偓佺好食松實能飛行逐走馬以松子遺堯堯不能服松者橫也時受服者皆至二三百歲梓化周太姒夢周梓化為松太公兵法長松天子升長松之磴穆天子傳荊有長松文梓尸子晉侯使張骼輔躒致楚師求御于鄭鄭人卜宛射大吉子太叔戒之曰大國之人不可與也對曰無有眾寡其上一也太叔曰不然培熡無松柏襄二十四楚郟敖即位王子圍為令尹鄭行人子羽曰是謂不宜必代之昌松柏之下其草不殖上二十九始皇起雲明臺東得葱巒錦柏漂檖龍松寒河星柘岏雲之梓五大夫秦始皇上泰山風雨暴至休於松史作樹下因封其樹為五大夫漢官儀始皇二十八年祭封泰山至半忽大風雨雷雹路傍有五松樹蔭翳數畝乃封為五大夫忽聞松上有人言曰無道德無仁無禮而天下亡命受命何以封左右咸聞始皇不樂乃歸崩于沙丘獨異志仙藥仙之上藥有松柏之膏服之可延年漢武內傳漢宣帝東平王發歸國思京師後薨葬東平冢上松柏皆西靡冢墓記成帝時獵者于終南山見一人無衣服身皆生黑毛跳坑越澗如飛乃密伺其所在合圍取得乃是一婦人問之言是秦之宮人關東賊至秦王出降驚走入山饑無所食女欲餓死有一老翁教我食松柏葉實初時苦澀後稍便吃遂不復饑冬不寒夏不熱此女是秦人至成帝時三百餘載也抱朴漢末大亂宮人小黃門上墓樹上避兵食松柏實遂不復饑舉體生長毛長尺許亂離既平魏武聞而收養還食穀齒落頭白異苑徂徠山多松柏詩所謂徂徠之松也鄒山記云徂徠山在平父奉高博三縣界猶有美松亦曰尤徠之山也赤眉渠師樊崇所堡也故崇自號尤徠三老矣水經注勁松世目李元禮謖謖如勁松下風世說初丁固為尚書夢松樹生其腹上謂人曰松字十八公也後十八歲吾其為公乎卒如夢焉吳書山公曰嵇叔夜之為人也巖巖若孤松之獨立其醉也巍峨若玉山之將崩孫興公齋前種一株松恒自手壅治之高世遠時亦鄰居語孫曰松樹子非不楚楚可憐但永無棟梁用耳孫曰楓柳雖合抱亦何所施世說晉太興二年大雨霖中山常山尤甚滹沱泛溢衝䧟山谷巨松僵拔浮於滹沱東至浡海原隰之間皆如山積石勒下令曰水出巨材所在山積將皇天欲孤繕修宮宇也咸和六年勒僣位如鄴將營宮殿時大霖雨中山西北暴水漂流巨木百餘萬根集于堂陽勒大悅曰諸卿知此不非為災也天意欲吾營鄴都耳載記庾顗見和嶠嘆曰嶠森森如千丈松雖磥砢多節目施之大廈有棟梁之用晉書有人哭和長與曰峨峨若千丈松崩世說張湛好于齋前種松養鴝鵒袁山松出入好令左右作挽歌時人謂張屋下陳屍袁道上行殯符子輿玄子登於大山下臨千仞之淵上蔭百丈之松蕭蕭然神王乎一丘矣符子刺史植松蔣山本少林木東晉令刺史罷還種松百株宋時諸州刺史罷職還者載松三百株下至郡守各有差山之最高峰北有五願樹乃柞木也金陵地記陶弘景特愛松風庭院皆植松每聞其響欣然為樂梁書王愛州在鄴學服松脂不得節度腸塞而死為藥所誤者甚多顏氏家訓齊世有辛毗者清幹之士官至行臺尚書嗤鄙文學嘲劉逖云君輩辭藻譬若朝茵須臾之翫非宏才也豈比吾徒比千丈松樹常有風霜不可凋悴矣劉應之曰既有寒木又發春華何如也辛笑曰可矣上張譏字直言後主幸鐘山開山寺召從臣坐于寺西南松林下敕召譏豎義時索麈尾未至後主敕取松枝手以屬譏曰可代麈尾顧謂群臣曰此即張譏后事陳書陳后主禎明二年初覆舟山及松柏林冬月出木醴後主以為甘露之瑞俗呼為雀餳建康實錄玄裝法師往西域取經手摩靈巖寺松枝曰吾西去求佛教汝可西長吾歸即東向使吾弟子輩知之既去其枝年年西指一年忽東向弟子曰教主歸矣果還至今謂之摩頂松大唐新語龍骨不空三藏塔前多老松歲旱時官伐其枝為龍骨以祈雨蓋三藏役龍意其樹必有靈也酉陽郎餘令授霍王元軌參軍從父知年亦為王友元軌每曰郎家二賢皆入府不意培塿而松為林也松樹大連抱有五立子形如桃仁而稍小皮硬有人取而食之味如胡桃浸酒療風大曆時監察御史顧愔新羅國記五代鄭遨聞華山有五粒松脂淪入地千歲化為藥能去三尸因徙居華陰欲求之一行傳唐德宗時計料造神龍寺須長五七十尺松木裴延齡奏曰臣近於同州檢得一谷木可數千條皆長七八十尺上曰人言開元天寶中側近求覔五六十尺木尚未易須于嵐勝州採市如今何為近處便有此木延齡云賢才珍寶異物皆在處常有但遇聖君即出今此木生關輔蓋為聖君豈開元天寶合邪譚賔舊唐李泌嘗取松醪枝以隱背名曰養和後得如龍形者因以獻帝四方爭效之新唐秦系客泉州南安有九日山大松百餘章俗傳東晉時所植系結廬其上韋表微授監察御史裏行不樂曰將祿譬滋味也人皆欲之吾年五十拭鏡攜白冒游少年間取一班一級不見其味也將為松菊主人不愧陶淵明云新唐有道人自天台來示余怪松圖披之甚駭人自盤根于巖穴之內輪菌逼側而上身大數圍而高不四五尺礧砢然蹙縮然幹不假枝枝不假葉有若龍攣虎跛壯士困縛之狀陸龜蒙怪松贊鄭薰既老號所居為隱巖蒔小松七本于庭自號七松處士異時可對五柳先生南部新書松凡言兩粒五粒粒當言鬣叚成式修竹里私第大堂前有五鬣松兩株大材如椀結實味與新羅者不別五鬣松皮不鱗唐中使仇士良水磑亭子有兩鬣皮不鱗者又有七鬣者不知自何而得俗謂孔雀三鬣松也李德裕言三鬣松與孔雀松別又云欲松不長以石抵其直下根便不必千年方偃酉陽李德裕金松賦序云廣陵東南有顏太師猶子舊宅其地則孔北海故臺余曉春游眺忽睹奇木枝似檉松葉如矍麥迫而察之則翠葉金貫燦然有光訪其名曰金松訊其所來曰得于天台乃就主人求得一本列于平泉英華圍三尺鍾輻作松竺手植一松夢朱衣吏曰松圍三尺吾子當登第後三十年始成名其松圍果三尺摭言天台智者院釋行滿居房檻外有巨松橫枝之上寄生小樹每滿出坐其寄生必嫋嫋向側時謂此樹作禮茶頭也或不信者專伺滿出則紛紛然滿坐則屹立亭亭更無動搖宋高僧傳南康有怪松從前刺史每令畫工寫松必數株衰悴後因一客與妓環飲其下經日松死酉陽將軍伊陽深山中有黑松山平高四十里其上皆大松有二株尤大一號大將軍一號小將軍大者圍絹三疋小者圍一疋木客取材于此皆祭之以絹圍訖造圖掛其上政和間求明堂柱而邑官以無中程者聞既而有人告發云大松不可出小松可取也乃命告者以官而令佐皆謫已伐之亦不可出告者尋死今獨大將軍尚在而小者委于山間惜哉陶朱新錄羅浮奉宸橋南有古松七株上凌霄漢仙靈常此憇息鄒葆光有道術宣和中召至凝神殿有七人從之倏不見上問為誰葆光對曰臣居山常習劍術此七人者古松也上異之羅浮志洪邁紹興間與弟适遵讀書外家沈氏白茅山墳廬是歲墓有二松結毬成蓋既而兄弟舉博學宏辭亦木之祥也昆陵志昔金人伐宋時伐香巖寺木造舟木中有文成詩云栽松種柏興唐日解板成舟破宋時可惜香巖千載樹等閒零落歲寒枝世傳以為怪異浙川縣志天陵偃蓋之松大谷倒生之柏凡此諸木皆與天齊其長與地齊其久抱朴子石門北巖即松林也有數百樹松大皆連拱長近二十丈攢生絕崖上南臨石門澗澗中仰視之離離如駢麈尾號麈尾松於尋陽望聚見之分明周景式廬山記化石僕骨東境其地東北一千里有康于河斷松投之三年輒化為石其色青謂之康于石有松文萬年麻城西北一十里有枯松一株相傳以為萬年松魚甲洛中有魚甲松酉陽精變青牛嵩嶽有大松樹或百歲千歲其精變為青牛或為伏龜採食其實得長生嵩高山記千載松柏樹枝葉上杪不長望如偃蓋其中有物如青牛青羊人服皆萬歲玉策翊真觀在南昌府城西南觀有二松相去五尺合為一幹號曰義松山川紀異水松葉如檜而細長出南海土產眾香而此木不大香故彼人無被服者嶺北人極愛之然愛其香殊勝在南方時植物無情者也不香於彼而香於此豈屈于不知已而伸於知己者歟物理之難窮者如此南方草木狀有抱木生其傍柔弱可作履謂之抱香履羅浮志樹與中國松同但結實絕大形似小粟三角肥甘香美一鐏俎間佳果也出林邑南方草物狀中嶽頂上松幹如插筆其間數株上巨下細柯似枯槎皮或剝落有半榮者僧指云此是嶽神為珪禪師夜移天將曉其鬼兵懼遽倒植之而去曲洧舊聞於潛牧嶺上有古松一本盤錯奇怪嘗有兄弟閱墻欲訟於有司夜行憩其下遲明辨色相視乃伯仲也遂各悔咎息爭而還因名松為木長官杭州志落落藉萋萋之纖草蔭落落之長松天台賦長松落落卉木蒙蒙杜篤首陽山賦亭亭亭亭山上松劉公榦詩青青陵上松亭亭高山柏何敬祖青青陵上柏古詩鬱鬱鬱鬱澗底松左太冲詩丸丸陟彼景山松柏丸丸詩殷武南山石嵬嵬松柏何摧摧上枝拂青雲中心十數圍劉越石扶風歌松取燒枝其上下承取汁名松雔其松樹皮上綠衣名艾納合味眾香燒之其烟回聚清白可愛廣志夢松松為人君夢見松者見人君也夢書土山多柏白於之山其上多柏土山多柏山經文柏華山生文柏地理志食實赤松子好食柏實齒落更生列仙傳漢陽縣西柏泉寺有古井世傳大禹植柏於大別山其根盤曲直至井底今柏根尚存又大別山陽太平興國寺前亦有古柏俗傳禹治水時所植者山川紀異夫子手植魯郡孔子舊庭有柏樹二十四株經歷漢晉其大連抱有二株先折倒士人崇敬莫之敢犯江夏王義恭悉遣人伐取父老莫不嘆息宋書兗州曲阜縣文宣廟門內并殿西南各有柏葉松身之樹各高五六丈枯槁已久相傳夫子手植永嘉三年復枯俗傳千年木療心痛人多竊割削之樹身漸細去地丈餘皆以泥累泥封猶不免焉亦有取為笏者色紫而甚光澤肅宗時二樹猶在封氏見聞記先聖廟前有數株古柏亦傳千餘歲本大十圍淄華為兗州軍食貧窮無以充四方之餉華遂命伐之裁為簡冊刻為器皿以行餉之傳載柏寢景公與晏子游於少海登柏寢之臺而還望其國曰美哉泱泱乎堂堂乎後世將孰有此晏子對曰其田成氏乎韓外傳李少君見武帝上有故銅器問少君少君曰此器齊桓公十年陳于柏寢已而案其刻果齊桓公器一宮盡駭史記師古曰以柏木為寢室於臺之上秦穆文時陳倉人掘地得物若羊非羊若猪非猪怪將獻之道逢二童子謂之曰子知彼乎名為魍常在地下食死人腦若欲殺之以柏東南枝指之則死矣宋符瑞志墓上樹柏路頭石虎周禮方相氏入墟禦魍像魍像好食死者肝腦人家不能當令方相立於墓側以禁禦之而魍僧畏虎與柏風俗通柏谷谷名也漢武帝微行所至長傲賓於柏谷者也谷中無迴車地夾以高原柏林蔭藹窮日幽暗殆弗覩陽景述征記山南有太山廟種柏樹千株大者十五六圍長老傳云漢武所種泰山記太山廟中柏皆二十餘圍夾西階赤眉嘗斫一樹見血而止今斧瘡猶在從征記延年藥有松柏之膏服之可以延年漢武內傳磅山之柏有穴穴上有柏昔李少翁於閬陰移來此穴種此柏已見扶桑三枯海水涸竭帝覺遣人往穴掘不見其根唯見赤鷰飛翻入雲移柏植於通靈臺洞冥記巴郡有柏柱大可十圍高二十餘丈乃公孫述時樓柱所斫之處忽生枝而不朽寰宇記道家多作柏葉湯常點益人古柏葉尤奇今益州諸葛孔明廟中有大柏木相傳是蜀世所植故人多採收以作藥其味甘香於常柏也圖經庾蹇字升褒或有斬其父墓柏者莫知其誰乃召鄰人於墓自責叩頭涕泣謝祖禰自後人莫之犯晉書李充喪父冢側有盜夜斫柏樹者充手刃之陳留耆舊傳王裒字偉元痛父不以命終絕世不仕立屋墓側旦夕常至墓前輒悲號斷絕墓一柏樹裒常所攀涕淚所著樹色與凡樹不同王隱晉書梁武拜山陵涕泣所灑松為變色金樓子柏屋東宮玄圃乃有柏屋製甚古拙南齊豫章王傳江夏王鋒以明帝知權常忽忽不樂著修柏賦以見其志曰既殊群而抗立亦含貞而挺正豈春日之自芳在霜下而為盛衝風不能摧其枝積雪不能改其性雖坎𡒄於當年庶後凋之可詠時鼎業潛移鋒獨有慨然匡復之意後為明帝所害江裕聞其死曰芳蘭當門不得不鋤其修柏之賦乎南史徐伯珍東陽太末人宅南九里有高山班固謂之九巖山後漢龍丘萇隱處也山多龍鬚柏望之五采世呼為婦人巖伯珍移居之門前生梓樹一年便合抱南齊書侯景既䧟臺城都下王侯庶姓廟樹咸見殘毀唯文宣太后廟四周柏樹獨鬱茂及景篡修南郊路偽都官尚書呂季略說景令伐此樹以立三橋始斫南面十餘株再宿悉枿生便長數尺時既冬月翠茂如春賊乃大驚惡之使悉斫殺識者以為昔僵柳起於上林乃表漢宣之興今廟樹重青必彰陜西之瑞梁書南史梁武陵王紀以侯景之亂僣號于蜀初妖怪不一內寢柏殿柱繞節生花其莖四十有六靃靡可愛狀似荷花識者曰王敦祅花非佳事也後果為元帝所誅南史博陵崔𣷉字子洪死十二年而復生性畏日不敢仰視又畏水火及刀兵之屬常走於逵路遇疲則止不徐行也時人猶謂是鬼洛陽大市北奉終里里內之人多賣送死之具及諸棺槨𣷉謂曰作柏木棺勿以桑木為欀人問其故𣷉曰吾在地下見人發鬼兵有一鬼訴稱是柏棺應免主兵吏曰爾雖柏棺桑木為欀遂不免京師聞此柏木踴貴人疑賣棺者皆𣷉發此等之言也洛陽藍記霸城王整之姊嫁為衛敬瑜之妻年十六而敬瑜亡父母舅姑咸欲嫁之誓而不許乃截耳置盤中為誓乃止遂手為亡壻種樹數百株墓前柏樹忽成連理一許還復分散女乃為詩曰墓前一株柏根連復并枝妾心能感木顏城何足奇南史武帝伐齊永昌公椿屯雞棲原齊王憲密謂椿曰為營不須張幕可伐柏為庵令兵去之後賊猶致疑及被敕追還率兵夜返齊人果謂柏庵為帳幕翌日始悞後周書隋文帝時王劭上書云陳留老子祠有枯柏傳云老子將度世云待枯柏生東南枝迴指當有聖人出吾道復行至齊枯柏從下生枝東南上指夜有三童子相與歌曰老子廟前古枯樹東南枝如繖聖主從此去及陛下牧亳州親至祠樹之下自是柏枝迴抱其枯枝漸指西北道教果行北史真源縣老子堂前有雙柏樹左階之柏久枯煬帝大業十三年忽從根生一枝聳榦三丈三尺枝葉青翠唐武宗二年更生一枝直上五尺橫枝兩層枝葉相覆異于常樹述征記寰宇記高祖在襁袵之時母置放其莊柏樹之陰而往餉田比及餉回日斜而樹影不移玉堂閒話大小將軍嵩山天封觀有古柏三株武后封五品大夫蔭百餘步俗云大小將軍河南志乾陵之柏異于他處其木未有無文理者而其文多為菩薩雲氣人物鳥獸狀極分明可觀有盜得一株徑尺者可直萬錢關陜人家多以為貴冝其子實最佳也本草大將軍嵩山漢武帝登封時神人呼萬歲之所峰之半乃昔嵩陽觀故基有唐天寶年碑刻碑東古柏五株積翠婆娑可愛中有一株尤大五人聯手抱之圍始合下一石刻曰漢武帝封大將軍少林集錄桑道茂居有二柏甚茂曰人居而木蕃者去之木盛則土衰衰則人病乃以鐵數十鈞埋其下復曰後有發其地而死者太和中溫造居之發藏鐵而造死李德裕平泉莊有鴈翅檜婆娑如鴻鴈之翅珠子柏實皆如珠子簾生葉上香聞數十步蓮房玉蘂每跗蕚之上上分五朵而實同其一房者也賈氏談錄李德裕有柳柏賦謂其風姿濯濯宛若荑楊而冒霜停雪四時不改英華唐太常博士崔石云汝西有練溪多異柏及暮枝葉斂俗呼合掌柏酉陽余靖慶曆中知桂州州境窮僻處有林木延袤數十里每至月盈之夕輒有笛聲發于林中甚清遠土人云聞之已數十年終不知其何怪也公遣人尋之見其聲出一大柏樹中乃伐取以為枕聲如期而發公甚寶惜凡數年公之季弟欲窮其怪命工解視但見木之文理正如人在月下吟笛之像雖善畫者莫能及重以膠合之則不復有聲矣遯齋閒覽元豐間朝廷問罪西夏五路舉兵秦鳳路圖上師行營憩形便之次至關嶺有秦時柏一株雖質幹不枯而枝葉略無存者既標圖間裕陵披圖顧問左右偶以御筆點其枝間而嘆其閱歲之久也後郡奏秦朝柏忽復一枝再榮殿中有記當時奏圖歡賞之語私相聳異以為天人降筆所加回枯起死便同雨露之施春渚紀聞宋高宗時高麗國進陰陽柏兩株高纔二三尺高宗以賜王綯綯種于永懷寺殿庭左右後柏高與殿齊每歲左花則右實右花則左實寺在崑山玉峰志綺柏日就殿以文檉綺柏為材成都記蒼官柏曰蒼官樊宗師園林記桃李蒨粲於一時時至而後殺至於松柏經隆冬而不凋蒙霜雪而不變可謂得其真矣荀子廣漢梁泉縣漢故道縣也龍女山多紫柏華陽志云梁泉有紫柏坂樅檜樅松葉柏身檜柏葉松身爾雅亳州法相寺矮檜高纔數尺偃亞蟠屈枝葉繁茂不可圖唐大中年李待價石記云圓蔭三丈陰距今凡三百餘年廣袤五六丈為一郡之珍玩士人目其寺曰矬栝澠水燕談白樂天為蘇州守時恩信及民皆敬而愛之嘗植檜數本于郡圃後人目之曰白公檜以况甘棠焉吳中紀聞宋真宗朝寢殿側有古檜秀茂不群名御愛檜然橫礙殿簷真皇意欲去之一夕風雷轉摺其枝時以為瑞話腴檜花蜜亳州太清宮檜至多檜花開時蜜蜂飛集其間作密極香而味微苦謂之檜花蜜老學庵筆記桑木者箕星之精神木也蟲食葉為文章人食之老翁為小童典術千戶侯齊魯千畝桑其人與千戶侯等史記太古時有人遠征家有一女并馬一匹女思父乃戲馬云能為迎我父吾將嫁於汝馬絕韁而去至父所父疑家中有故乘之而還馬後見女輒怒而奮擊父怪之密問女女具以告父父屠馬曬皮於庭女至皮所以足䠞之曰爾馬而欲人為婦自取屠剝如何言未竟皮蹶然起卷女而行父失女後於大桑樹枝間得女乃皮盡化為蠶績樹上蠒厚大異常鄰婦取養之其收數倍因名其樹曰桑桑者喪也由斯百姓競種之今世所養是也漢禮皇后親採桑祭蠶神曰菀窳婦人寓氏公主公主者女之尊稱也菀窳婦人先蠶者也故世或謂蠶為女兒者是古之遺言也搜神記昔者堯見舜於草茅之中席隴畝而蔭庇桑陰移而受天下傳趙國策堯舜相見不違桑陰說苑伊尹之母居伊水之上孕夢有神告之曰臼水出而東走無顧明日視臼出水告其鄰東走顧其邑盡為水身因化為桑有莘氏採桑得嬰兒空桑之中獻之于君君令乳之命曰伊尹呂覽太戊之時道缺法圯以致妖孽桑榖生朝七日而拱太戊恐懼側身修德家語天子居范宮以觀桑者乃飲于桑中命桑虞出桑者用禁暴民注桑虞主桑者穆天子傳謀桑下晉重耳至齊桓公妻之有馬二十乘公子安之從者以為不可將行謀於桑下蠶妾在其上以告姜氏姜氏殺之而謂公子曰子有四方之志其聞之者吾殺之矣左僖二十三翳桑趙宣子田於首山舍于翳桑見靈輒餓問其病曰不食三日矣食之舍其半問之曰宦三年矣未知母之存否今近焉請以遺之使盡之而為之簞食與肉置諸橐以與之既而與為公介倒戟以禦公徒而免之問何故對曰翳桑之餓也問其名居不告而退宣二孔子適楚厄於陳蔡之間七日不食告子路曰居不隱者思不遠身常佚者志不廣汝庸知吾不得之桑落之下荀宥坐吳公子光伐楚拔居維城離初楚邊邑卑梁氏之處女與吳邊邑之女爭桑二女家怒相滅兩邑長聞之怒而相攻滅吳之邊邑吳王怒遂伐楚史記劉毅中正疏云夫桑妾之訟禍及荊楚闘鷄之變難興魯邦晉書齊瘤女者齊東郭採桑之女項有大瘤閔王遊至東郭百姓盡觀宿瘤女採桑如故王怪問之對曰妾受父母教採桑不受教觀大王王曰此奇女也聘迎之列女傳楊範字文端齊人齊宋之亂母在賊中探椹藏于地夜取之進母如是非一忽於地中得米十斛上有字云米十斛賜孝子楊範以資給母風俗通始皇聞鬼谷先生言因遣徐福入海求金菜玉蔬并一寸椹金樓子北方有白桑椹長數寸食之甘美異苑丹椹神仙上藥有扶桑丹椹漢武內傳扶桑國在大漢國東二萬餘里上多扶桑葉似桐初生如笋國人食之實如棃而赤績其皮為布亦為綿為紙齊書扶桑在碧海之中上有大帝宮東王父所治處有椹樹長者數千丈大二千餘圍樹兩兩同根偶生更相依倚故名扶桑仙人食其椹體作金色飛翔玄宮其樹雖大其葉則小故如中夏之桑也但椹稀而色赤九千歲一生實耳味絕甘香美十洲記飯蠶汝南尹崑為汝陰功曹令新到官問曰園中有桑以飯蠶何如崑曰非初政所務令嘉其言後漢先主舍東南角籬上有桑樹生高五丈餘遙望見童童如小車蓋往來者皆怪此樹非凡涿人李定云此家必出貴人先主少時與宗中諸小兒於樹下戲言吾必當乘此羽葆蓋車叔父子敬謂曰汝勿妄語滅吾門也三國志齊高祖蕭道成宅在武進宅南有桑樹櫂本三丈橫出四枝狀如車蓋上年數歲好戲其下從兄敬宗謂曰此樹為汝生也南史助採南郡龐士元聞司馬德操在穎川故二千里候之至遇德操采桑士元從車中謂曰吾聞丈夫處士當帶金佩紫焉有屈洪流之量而執絲婦之事德操曰子且下車適知邪怪之速不慮失道之迷昔伯成耦耕不慕諸侯之榮原憲桑樞不易有官之宅何有坐則華屋行則肥馬侍女數十然後為奇此乃許父所以忼慷夷齊所以長歎雖有竊秦之爵千駟之富不足貴也士元曰僕生出邊陲寡見大義若不一叩洪鐘伐雷鼓則不識其音響也世說士元師事司馬德操不矜小名眾莫知德操蠶月躬採桑後園士元助之因與談斯世之廢興其言若神遂移日忘食德操於是異之荊州先賢傳漢興平元年九月桑再椹時劉玄德軍小沛年荒穀貴士眾皆饑仰以為糧異苑楊沛為新鄭長課民畜桑椹一豆積得千餘斛太祖遷天子軍乃無糧沛進乾椹後為鄴令賜其生口十人絹百疋以乾椹也魏略初諸葛孔明自表後主曰成都有桑八百株薄田十五頃子弟衣食自有餘饒不別治生以長尺寸若臣死之日不使內有餘帛外有贏財以負陛下及卒如其所言蜀志夢桑生井何祗夢桑生井中趙直占曰桑非井中之物桑字四十八君壽恐不過此祗年四十八而卒益部耆舊傳夢椹晉武太元中太原王戎為鬱林太守泊船新亭眠夢有人以七枚椹子與之著衣襟中既悟得椹如夢中占曰椹桑子也自後男女大小凡七喪異苑五行記西廂愍懷太子之將廢也有桑生於宮西廂日長尺餘數日而枯其子太孫臧之入東宮也桑復生于西廂太孫廢乃枯晉書張天錫少有文才流譽遠近及歸朝甚被恩遇朝士以其國破身虜多共毀之會稽王道子嘗問其西土所出天錫應聲曰桑椹甘香鴟鶚革響乳酪養性人無妒心晉書本傳前涼錄黃甘之流有王甲從北方來詣謝公問北方何果最勝甲云桑椹最好謝公問可以比江東何果甲云是黃甘之流公曰君何乃爾妄語甲既受妄語之名恐宰相所責乃買駿馬候熟時取數千枚還以奉公公食之以為美乃謂甲此味乃江東所無而君近比黃甘於是引甲為賓客世說初晃之遷于龍城也植松為社主及秦滅燕大風吹之後數年社忽有桑二根生焉先是遼川無桑及廆通于晉求種江南遼川之桑悉由吳來後燕錄崔鴻十六國春秋洛中願會寺佛堂前生桑樹一株直上五尺枝條橫遶柯葉傍布形如羽蓋復高五尺又然凡為五重每一重葉椹各異京師道俗謂之神桑觀者成市布施者甚眾帝聞而惡之以為惑眾命給事黃門侍郎元紀伐之其日雲霧晦冥下斧之處流血至地見者莫不悲泣洛陽伽藍記沈如琢成都人有孝行母患渴非時思桑椹苦求不遂家東一樹生摘以奉母母渴愈及亡負土成墳廬於側白鵠二妻于廬冬笋抽十莖天寶二年詔旌表唐京兆萬年縣大寧坊有桑樹一株暮秋生子初冬椹熟鳳閣侍郎李元素取之以進李嶠代為表云鴟鶚已革見夷貊之懷音絲蠒行豐知府藏之逾實英華李德裕居家以儉約自處每謂子孫曰吾性不好貨財遂至貧乏然吾近京城有賜田十頃耕之可以充食若干根可以充衣唐書晉開連二年契丹南掠邢洺磁至於安陽河千里之內焚剽殆盡契丹見大桑因罵曰吾知紫披襖出汝身吾豈容汝活耶遂命軍卒束薪于木而焚之五代史烈祖末年溧水天興寺桑生木人長六寸如僧狀右袒而左跪衣械皆備其色如純漆可鑑謂之須菩提縣掇置龕中以仁壽節日來獻烈祖驚異迎置宮中奏事甚謹其徒因以為感應而識者按譙氏五行書知且有大喪不三月烈祖殂陸游南唐書宣山上有桑大五十尺其枝四衢名之曰帝女之桑郭璞曰婦人主桑故以名也山經窮桑者西海之濱有孤桑之樹直上千尋葉紅椹紫萬歲一實食之後天而老拾遺記食桑化民食桑二十七年化而自褁九年生翼十年而死括地圖南方赤帝子學道得仙居高陽崿山桑樹上正月一日啣柴作巢至十五日成或作白鵲或作女子赤帝見之悲痛誘之不得以火焚之女即升天因名帝女桑今人至十五日焚鵲巢作灰汁浴蠶子招絲象此也廣異記虛精槐木者虛星之精春秋說題辭守宮槐葉晝聶宵燒注槐葉晝日聶合而宵燒布者名為守宮槐爾雅兔目鼠耳槐之生也入季春五日而兔目十日而鼠耳更旬而始規二旬而葉成淮南三槐朝士面三槐三公位焉槐懷也言懷來人也周禮聽訟樹槐聽訟其下注槐之言歸也情見歸實也元命苞武王問太公曰天下神來甚眾恐有試者何以待之太公曰請樹槐於王門內有益者入無益者距之金匱齊景公有所愛槐令吏守之令曰犯槐者刑傷之者死有罪而犯之者公令加罪焉其女告晏子曰妾聞明君不為禽獸傷人民不為草木傷禽獸不為野草傷禾苖今君以樹木之故罪妾父恐鄰國謂君愛樹而賤人也晏子入言之公令罷守槐之役廢傷槐之法出犯槐之囚晏子董叔將取於范氏叔向曰范氏富盍已乎曰欲為繫援焉他日董祁愬於范獻子曰不吾敬也范子執而紡於庭之槐叔向過之曰子盍為我請乎叔向曰求繫既繫矣求援既援矣欲而得之又何請焉晉語甘泉谷北岸有槐樹今謂玉樹根幹盤峙三二百年木也楊震關輔古語云耆老相傳咸以謂此樹即楊雄甘泉賦所謂玉樹青葱也三輔雲陽縣界多漢離宮故地有樹似槐而葉細土人謂之玉樹楊子雲甘泉賦云玉樹青葱後左思以為假稱珍怪蓋未詳也國史異纂玉樹武帝集眾寶為之思謂非木土所出失之顏師石婆娑大司馬府有老槐樹殷仲堪對而嘆曰此樹婆娑生意盡矣晉書初河右不生楸槐柏漆張駿之世取於秦隴而植之終於皆死而酒泉宮之西北隅有槐樹生焉李玄盛著槐樹賦以寄情蓋歎僻陋方立功非所也上廣陵王元淵初除儀同三司總眾北討葛榮夜夢著衮衣倚槐樹而立以為吉徵問於楊元慎曰三公之祥淵甚悅之元慎退還告人曰廣陵死矣槐字木旁鬼死後當得三公果為爾朱勞所殺追贈司空公終如其言洛陽伽藍記庾肩吾常服槐實年七十餘目看細字鬢皆黑離亂之際奔於江陵梁書槐以十月上已取子服之好顏色長生通神太清草木方韋孝寬為雍州刺史先是路側一里置以土堠經雨頺毀每須修之孝寬臨州勑部內當堠處置槐樹既免修復行路又得庇蔭文帝後見之於是令諸州道一里種一樹十里種三樹百里種五樹後周書高穎字昭玄領新都太監每坐槐樹下以聽事後以樹多不依行列有司請伐之上特令勿去以示後人隋書賈嘉隱年七歲以神童召見時長孫無忌徐司空勣於朝堂立語徐戲之曰吾所倚何樹嘉隱云松樹徐曰此槐也何言松嘉隱云以公配木何得非松長孫復問吾所倚何樹曰槐樹公曰汝不能復矯對耶嘉隱曰何煩矯對但取其鬼木耳徐嘆曰此小兒作獠面何得如此聰明嘉隱云胡頭尚為宰相獠面何廢聰明徐狀胡也劉賓客嘉話孝感紐回字孝政性至孝周武成中父母喪廬於墓側廬前生麻一株高丈許圍之合拱枝葉鬱茂冬夏恒青武帝表其閭子士雄喪父復廬於墓側其庭前有一槐樹先甚鬱茂及士雄居喪樹遂枯死服闋還宅死樹復榮高祖下詔褒揚號其所居為累德里隋書淳于芬家廣陵郡宅南有大古槐枝幹條密棼與郡豪大飲其下貞元七年因沉醉致疾二友扶之歸臥夢二使曰槐安國王奉邀芬隨二使指古槐驅入穴中題曰大槐安國入見王妻以次女瑤芳號金枝公主有群女曰華陽姑青溪姑上仙子下仙子輩皆侍從命守南柯郡棼至郡二十餘年使者送出穴遂寤生有子女斜日未隱于西垣餘尊尚湛于東牖夢中倏忽若度一世矣因與客尋槐下穴洞然明朗可容一榻有二大蟻素翼朱首長可二寸乃槐安王又窮一穴直上南枝即南柯郡也貞元中度支欲取兩京道中槐樹為薪更栽小樹先下符牒渭南縣尉張造牒曰邵伯所憩尚勿剪除先皇舊遊豈宜斬伐乃止唐書長慶中虢州刺史蕭佑奏湖城縣永房鄉百姓閆酆五代同居家內一槐木再枝葉上天王槐長安持國寺門前有一槐樹數株金監買一株令所使巧工解之及入內迴工言木無他異金大嗟惋令膠之曰此不堪矣但使爾知予工也乃別理解之每片一天王塔戟成就酉陽相國李石河中永樂有宅庭槐一本抽三枝直過堂前屋脊一枝不及相國同堂昆弟三人曰程曰石皆登宰執惟福一人歷七鎮使相而已蓋一枝稍短耳玉泉子裴度在相位日有人寄槐癭一枚欲削為枕時郎中庾威世稱博物召相別之庾捧玩良久白曰此槐癭是雌樹生者恐不堪用裴曰郎中甲子多少庾曰某與令公同是甲辰生公笑曰郎中便是雌甲辰盧氏雜記吳湊為京兆尹兼兵部尚書先是街樾稀殘有司蒔榆其空湊曰榆非人所蔭既悉易以槐及槐成而湊以亡行人指樹懷之長安城有孫家宅居之數世堂屋甚古其堂前一柱忽生槐枝孫氏初猶障蔽之不欲人見期年之後漸漸滋茂以至柱身通體而變壞其屋上衝秘藏不及衣冠士庶之來觀者車馬填咽不久偓處巖廊居節制人以為應三槐之兆亦甚異也其孫愇備言之玉堂閒話槐生室中呂蒙正方應舉僦舍建隆觀沿幹入洛鏁室而去自冬涉春方回啟戶視之床前槐枝叢生高二三尺蒙茸合抱是年登科十年作相幕府燕聞錄出烟熙寧中吳仲庶知成都一日文明廳前大槐枝葉皆出烟色青白如焚香至暮方止木如故楊損之云陰符稱火生於木初發必克疑將有士卒作難而不成者後月餘果有告戍卒議亂者皆獲楊彥齡筆錄西夏無槐惟夏州有一株或要槐葉移牒取酉陽白居易云忠州有荔枝一株槐一株自忠之南更無槐自忠之北更無荔枝傳載都堂南門道東有古槐垂陰至廣或夜聞絲竹之音則省中有入相者俗謂音聲樹南部新書晉陽都城北角有槐木一日之間三榮三悴玉箱雜記玉衡散玉衡星散為榆運斗樞蕪荑藲至無姑其實夷注無姑之榆也所謂蕪荑爾雅蕪荑一名無姑本草蕪荑在地赤心者善范子計然劉子駿信方士虛言為神仙可學余見其庭下大榆樹久而剝折指謂曰彼樹無情然猶枯蠹人雖欲愛養何能使之不衰桓譚新論為籬鄭澤為魏郡太守百姓乏材木乃課種榆為籬魏志魏桓帝曾中蠱嘔吐之地仍生榆參合陂土無榆樹故世人異之魏書太祖道武皇帝諱珪七月七日生於參合陂北明年有榆生於藏胞之坎後遂成林上河間邢果反眾踰十萬先是河南人常笑河北人好食榆葉故齊人號之為𦧟榆賊為元天穆討平之魏傳二𦧟音闥歠也徐曰謂若犬以口取食也韓曹成玉碑𦧟隨光化大河在金城北門東流有梁泉注之出縣之南山按耆舊言梁暉字始娥漢大將軍梁冀後冀誅入羗後其祖父為羗所推為渠帥而居此城土荒民亂暉將移居抱罕出頓此山為群羗圍迫無水暉以所執榆鞭竪地以青羊祈山神泉湧出榆木成林水經濟南頻見所上利民之術植濟南之榆栽漢中之漆魏虞璩輿龐惠恭書剝榆皮于秋塞掘蠻鼠於寒山庾信謝賚采啟令人眠豆令人種榆令人眠愚智所知也嵇康養生論食枌榆則眠不欲覺嵇康養生論白榆連理鄭縣東百步有縣故城縣南里名伍佰村有白榆連理樹異根合條高四四丈餘土民奉為社荊州圖記姑榆有姑榆有郎榆郎榆無莢村人任車用至善蠡者出渤海東光以供官廣志天棘柳曰天棘杞柳亦曰澤柳通志柳楊楊蒲柳也檉河柳也柳小楊也說文展禽之家有柳樹身行惠德因號柳下惠一曰邑名淮南注魏哀王以田需為相惠子謂需曰子善事左右今夫樹楊橫之則生折而樹之又生然使十人樹楊一人拔之則不生楊矣子雖自樹于王而欲去之者眾必危矣春秋後語昭帝時上林苑中大柳樹斷臥地一朝起生枝葉有蟲食其葉為字曰公孫病已立睦孟以為木下民之象當有從民間受命者及昌邑廢更立宣帝帝本名病已三眠漢苑中有柳狀如人號曰人柳一日三眠三起三輔故事豈如河畔牛星隔歲止聞一過不比禁中人柳終朝剩得三眠玉溪生江文嫣賦張敞為京兆尹時罷朝會過走馬章臺街有柳終唐時號章臺柳世說孫敬到洛在太學左右一小屋安止母然後入學編柳為簡以寫經睡則懸頭于梁楚國先賢傳嵇康性絕巧能鍛家有一柳樹甚茂乃激水以圜之每夏月居其下遨戲及鍜呂安慕康高致每一相思輒千里命駕晉書濯濯王恭字孝伯有人嘆其形茂者云濯濯如春月柳世說顧悅與簡文同年而髮早白簡文曰卿何以先白對曰蒲柳之姿望秋而落松柏之質經霜彌茂世說顧凱之為父傳曰君以直道陵遲於世入見王王髮無二毛而君已斑白問君年乃曰卿何偏早白君曰松柏之姿經霜猶茂臣蒲柳之質望秋先零受命之異也王稱善久之注十圍桓溫自江陵北征經金城見少為琅琊時所種柳皆已十圍慨然嘆曰木猶如此人何以堪攀枝執條泫然流涕劉義慶記陶侃領江州刺史鎮武昌嘗課諸營種柳都尉夏施夜盜拔郡西門柳為已所種侃後因駐車施門問此是郡西門柳何故盜種此施怖謝罪時人憚之晉中興書以柳自蔽顧愷之癡信小術桓玄嘗以一葉柳紿之曰此蟬翳葉也以自蔽玄溺焉愷之信不見益珍重之俗傳愷之有三絕此癡之一絕世說化松涼張天錫之嗣事也柳化為松火出泥中王敬則嘗使魏於北館種楊柳後員外郎虞長曜北使還敬則問我昔種楊樹今各大小長曜曰虜中以為甘棠南齊五柳陶潛宅邊有五柳樹嘗自著五柳先生傳南史劉悛之為益州刺史獻蜀柳數株枝條甚長狀若絲縷時舊宮芳林苑始成武帝以植於太昌靈和殿前嘗翫咨嗟曰此楊柳風流可愛似張緒當年時其見賞愛如此齊書南史劉瓛兄弟三人共處蓬室一間習業不廢聚徒教授常有數十丹陽尹袁燦於後堂夜集聞而請之指廳事前古柳樹謂瓛曰人謂此是劉尹時樹每想高風今復見卿清德可謂不衰矣瓛琰之曾孫琰晉時為丹陽尹南史交讓陸惠曉與張融並宅其間有池池上有二株楊柳何點嘆曰此池便是醴泉此樹便是交讓上獨茂柳機字匡時初機在周與族人昂俱歷顯要及機昂並為外職楊素時為納言用事因上賜宴素戲機曰二柳俱摧孤楊獨聳坐皆歎笑隋書煬帝自板渚引河築街道植以柳名曰隋堤一千三百里隋書狄煥字子炎梁公後也寄于南嶽以林泉自適題柳云天南與天北此處影婆娑翠色折不盡離情生更多雨餘籠灞岸烟瞑夾隋河自有佳名在秦松繼得麼雅言系述渤海公高熲孩孺時家有柳樹高百許尺亭亭如車蓋里中人父老曰此家當出貴人隋書生女媧墳乾元中虢州刺史王奇光奏閻鄉縣女媧墳天寶十三載大雨晦冥忽失所在至夜河墳忽聞河中雷雨聲曉見其墳湧出上有雙柳樹下有巨石柳各高十餘丈畫圖進上以示百官舊唐李錫天寶中為虞城令蠡丘館東有三柳焉公往來憩之飲水則去行路勿剪比于甘棠鄉人田樹而書頌四十有六篇李集去思頌韋虛心維子初為郎蒔柳于庭及虛心兄弟居郎省對之輒斂容呂渭為禮部侍郎中書省中有柳樹建中末枯死興元元年車駕還京其樹再榮人以為瑞柳渭以為賦題上聞而惡之渭因入閣遺失請託文信遂出為譚州刺史舊唐夢柳仆地柳宗元自永州司馬召至京師詣卜者問命曰余柳姓也昨夢柳樹仆地其不祥乎卜者曰生則柳樹仆則柳木木者牧也君其牧柳州乎卒如其言紀異錄因話錄柳枝娘洛中里娘也聞誦義山燕臺詩乃折柳結帶贈義山乞詩麗情集柳將軍盧虔於古宅中遇柳將軍者驗之乃一枯柳樹宣室志數歲成林范希朝遷振武節度使初單于城池舊少樹希朝于地處市柳子命軍人種之俄遂成林居人賴之舊唐朱全忠出大梁門憩大柳下游客侍坐溫曰大好樹眾皆稱羡溫復曰此樹好作車頭眾復和之恭翔等白柳樹雖佳然作車頭須夾榆樹溫惡眾人之順已也悉撲殺之洛陽縉紳舊聞記補闕柳宋辛仲甫知彭州課種柳兩行行路人謂補闕柳綠條清陰綠城堤邊悉植細柳綠條散風清陰交陌盛弘之荊州記種柳線柳條也色赤葉大好生河邊天將雨雨先起氣應之是地氣上行也故名為雨師孟伯饒說宋用臣種柳睿思殿用常柳五株批開急合為一取圓直麻縷係牛屎堅固深栽之一年有三年力暇日記建康有鳳州柳蜀主與江南結婚求得其種鳳州出乎柳酒曾極詩云蜀主函封遣時使芳根原自鳳州移柔荑憙醁今安在唯有青絲拂地垂方輿勝覽陜西鳳州有三出妓女手皆纖白州境內生柳翠色可愛與他處不同又公庫多英醞故世言鳳州有三出謂手柳酒也宣州士人李愈云吾鄉有四出問何物答曰漆栗筆蜜墨客揮犀鳳之為州當秦蜀之衝以三絕名世胡塵一起號為邊鄙者四十餘年淳熙初太守傳子平為詩于壁云珍珠不見小槽紅遐想柔荑嫩剝葱惟有萬條羅帶綠年年依舊舞春風鳳縣志鳳伯之山熊山直陵之山木多柳平丘山爰有楊柳山經絮萍柳絮落水經宿則為浮萍瑣碎錄順插順插為柳倒插為揚柳花為酒南蠻訶陵以柳花為酒西域尼拘律陀樹即東夏之楊柳也西域人來止稱尼拘宋高僧傳桐華清明之日桐始華桐若不華歲有大寒周書葉應月梧桐不生則九州異主注梧桐以知日月正閏生十二葉一邊有六葉從下數一葉為一月至上十二葉有閏則十三葉視葉小者則知閏何月也不生則九州異居天下不同也遁甲為琴神農皇帝削桐為琴桓譚新論成王與唐叔虞燕居援梧桐葉剪珪以告曰以此封汝虞喜以告周公周公請封虞王曰余與虞戲周公曰天子無戲言於是遂封叔虞于晉呂覽梧桐苑在吳夫差舊國一名琴川梧園宮在句容縣傳云吳王別館有楸梧成林焉古樂府云梧宮秋吳王愁是也述異記梧宮楚使使聘于齊齊王饗之梧宮使者曰大哉梧乎王曰江漢之魚吞舟大國之樹必巨使何怪焉使者曰昔燕攻齊遵洛路渡濟橋焚雍門擊齊左而虛其右王歜絕頸而死于杜山公孫差格死于龍門飲馬于淄澠定獲于琅琊王與太后奔于莒逃于陽城之山當此之時則梧之大何如乎王使刁勃對之曰使者問梧之年乎昔者荊平王為無道加諸申氏殺子胥父與其兄子胥入吳闔閭以為將相三年將吳兵復讎楚戰勝于柏夆級頭百萬囊瓦奔鄭王保於陏引師于郢軍雲行乎郢之都子胥親射王宮掘平王冢笞其屍數以其罪曰吾先人無罪而子殺之士卒人皆百焉然後止當若此時梧可以為樹矣說苑奉使篇齊城有梧桐臺即梧宮也齊地記昭帝元鳳三年馮翊人獻桐枝長六尺九枝三葉也伏侯古今注李子長為政欲知囚情以梧桐為人象囚之形鑿地為䧟以盧為槨臥木囚其中囚罪正則木囚不動囚冤侵奪木囚動出不知囚之精神著木人乎將精神之氣動木人也論衡亂龍桐廬縣吳黃武四年分富春置以桐溪側有大桐樹垂條偃蓋傍蔭數畝遠望似廬因謂之桐廬十道志騫保坐擅近塢上北樓宿暮鼓二中有人著黃練單衣白帢侍人炬炬火上樓保懼藏壁中須臾有二婢上帳使迎一女子上與白帢人入帳宿未明白帢輒先去保因入帳中問侍女子向去者誰答曰桐郎道東廟樹是至暮二更桐郎復來保乃斫取之縳著樓柱明日視之形如人長三尺餘檻送詣丞相渡江未半風浪起桐郎得投入水風波乃息志怪鶉鷃棲翔鳳之條黿鼉游昇龍之淵識真者所為憤結也應璩與劉公幹書假翼鳴鳳條濯足升龍淵陸士衡從梁陳詩歷城房家園齊博陵君豹之山也其中雜樹森竦或有人折其桐枝者君曰何謂傷吾鳳條自後人不復折酉陽任昉報陸倕感知己賦過龍津而一息望鳳條而曾翔梁書初長安謠云鳳凰鳳凰止阿房苻堅遂于阿房城植桐數萬株以待之其後慕容冲入阿房城而止焉冲小字鳳凰秦記僧瑜幼入釋門誓欲焚身以宋孝建中集薪為龕請僧設齋禮別而入火中經三日而瑜房倏忽生雙桐樹枝根豐茂鬱翠非常道俗異之號為雙桐沙門高僧傳王宴為員外郎父普曜齋見柏樹忽成梧桐論者以為梧桐雖有棲鳳之美而失後凋之節宴後果然不能終齊書齊豫王嶷於邸起土山列種桐竹號為桐山武帝幸之置酒為樂顧臨川王映王邸亦有嘉名不映曰臣好棲靜因以為稱又問武陵王畢畢曰臣山卑不曾棲靈昭景惟有蕨薇直號首陽山帝曰此直勞者之歌也南史會稽孔珪家起園列植桐柳多搆山泉殆窮直趨齊衡陽王蕭鈞往遊之珪曰殿下處朱門游紫闥詎得與山人交耶答曰身處朱門而情游江海形入紫闥而意在青雲鈞齊高帝子也南史衡陽王道度傳彭城王勰與帝昇金墉顧見堂後桐竹曰鳳凰非梧桐不棲非竹實不食今桐竹並茂詎能降鳳乎勰曰鳳凰應德而來豈桐竹能降帝曰朕亦未望降之後魏書元魏孝文宴侍臣于清徽堂日宴移于流化池芳林下帝仰觀桐葉之茂曰其桐其椅其實離離愷悌君子莫不令儀今林下諸賢足敷歌詠遂令黃門侍郎崔光讀暮春群臣應制詩至彭城王勰詩帝為改一字北史契苾何力司稼少卿梁修仁新作大明宮植白楊于庭示力曰此木易成不數年可庇何力不答但誦白楊多悲風蕭蕭愁殺人之句修仁驚悟更植以桐開元四年尚書考功院廳前一雙桐樹忽然枯死旬日考功員外郎邵某卒尋而麴光冲為郎中判郡舊案月餘西邊樹又枯死省中憂之未幾而光冲又卒僉載破桐葉以進李泌德宗在奉天召赴行在時李懷光叛歲又蝗旱議者欲赦懷光常博問郡臣泌破一桐葉附使者以進曰陛下與懷光君臣之分不可復合如此葉矣由是不赦新唐王義方為御史買宅數日忽對賓朋指庭中青桐樹一雙曰此無酬直親朋言樹當隨宅別無酬例義方曰此佳樹非他物比召宅主付錢四千唐京兆釋守素者居興禪寺其院幽僻庭有青桐四株皆素之手植元和中卿相多遊此院青桐至夏中無何發汗頗污人衣如輠脂焉而不可浣時相國鄭公絪嘗與丞郎數人避暑且惡其滴瀝謂素曰弟子為師伐此樹各殖一松可乎及暮素戲呪之曰我種汝二十餘年汝以汗之淋灑為人所惡同惡木之不可休其下也來歲若然我必薪之自爾絕蹤矣宋高僧傳乃斲孫枝准量所任銑注側生枝也善曰張衡應間曰可剖其孫枝嵇叔夜琴賦孫枝之根末生者也蓋桐孫亦然周禮注梧桐生於嶧山之陽嵓石之上採東南孫枝為琴聲極清麗風俗通驃國有白桐木其華有白毳取其毳漬淹緝織以為布廣志有青桐赤桐白桐白桐宜琴瑟今雲南䍧牱人緝以為布詩義疏受氣淳木有扶桑梧桐松柏皆受氣淳矣異於群類者松柏冬茂陰木也梧桐春榮陽木也扶桑日所出陰陽也王逸子桐木成雲桐木成雲注云取十石甕滿以水置桐其中蓋之三四日間氣如雲作准萬畢術益州有梧桐木其華采如絲人績以為布名曰華布華陽國志春官大司樂圓丘用孤竹之管雲和之琴瑟方澤用孫竹之管空桑之琴瑟宗廟用陰竹之管龍門之琴瑟注和空桑龍門皆山名也孤竹竹特生者孫枝竹枝根之末生者陰竹生于山北者周禮嶧陽桐嶧陽孤桐注嶧山之陽特生桐中琴瑟書鄒山古之嶧陽魯穆公改為鄒今鄒山嶧陽猶多桐樹鄒山記吹臺吹臺有高桐皆百圍嶧陽孤桐方此為劣遊名山志玄谿爰有梧桐生于玄谿傳根朽壤托險生危崔琦七蠲龍門之桐高百尺而無枝中鬱結之輪菌根扶疏以分離枚叔七發寒山之桐出自太冥含黃鍾以吐幹據蒼岑而孤生晞二春之溢露遡九秋之鳴飊零雪寫其根霏霜封其條七命材難為弩智者有所不足故梧不可以為弩淮南刺桐其木為材三月三日時布葉繁密後有花赤色間生葉間旁照他物皆赤皦然三五房周則三五復發如是者竟歲九真有之南方草木狀桐體濕則愈重乾則愈輕生時以斧砟之甚易乾乃軟而拒斧故鄙諺云輕是桐重是桐難砟亦是桐此之謂也相譜大不利主俗云桐大如斗主人必屢見之驗瑣碎錄鄰父有與人鄰者有枯梧樹其鄰之父言梧樹之不善也鄰人遽伐之鄰父因請而以為薪其人不說曰鄰者若此其險也豈可為之鄰哉此有所宥也呂覽木王俗呼梓為木王蓋木莫良於梓故書以梓材名篇禮以梓人名匠埤雅乘火而茂君乘火而王其政和平梓為常生禮斗威儀雞山美梓玉山碧山多梓木雞山美梓山經一物四名椅梓也賈侍中說檹即椅木可作琴梓楸也檟楸也說文楸之疏理色白而生子者為梓梓實桐皮白椅詩義疏白色有角者為梓或名角楸又名子楸黃色無子者為柳楸世人見其木黃呼為荊黃楸齊民要術棘實曰棗梓實曰豫章桑實曰椹柘實曰佳古今注越人多種豫章樹梓即豫章也十道志太姒夢太子發取周庭之梓樹於商闕間化為松柏柞棫周書齊姜成公夫人薨初穆姜成母使擇美檟以自為櫬與頌琴季文子取以葬君子曰非禮也禮無所逆婦養姑者也虧姑以成婦逆莫大焉襄二十九樹價初季文子為已樹六檟於蒲圃東門之外定姒薨匠慶請木季孫曰略匠慶用蒲圃之檟季孫不御君子曰志所謂多行無禮必自及也其是之謂乎上樹墓子胥將死告舍人曰必樹吾墓上以梓梓可為器而抉吾眼於吾之東門上以觀越兵之入吳也史記秦文公造長安宮面四百里南至終南山山有梓樹大數百圍蔭宮中公惡而伐之連日不尅輒大風雨夜有鬼問梓樹樹曰豈奈吾何鬼曰若使三百人披頭以絲繞樹豈不敗汝樹默然不應明日人言于秦王王依此言伐之中有青牛逐之入澧水郭氏玄中記秦文公時梓樹化為牛以騎擊之騎不勝或墮地髻解被髮牛畏之入水故秦因是置旄頭騎使先驅列異傳衛子夫入宮歲餘不得見因涕泣請出上曰吾昨夜夢子夫中庭生梓樹數株豈非天意乎是日幸之有娠漢武故事元帝初元四年皇后曾祖父濟南東平陵王伯墓門梓柱卒生枝葉上出屋劉向以為王氏貴盛將凌漢家之象也後王莽篡位自說之曰初元四年莽生之歲也當漢九世火德之厄而有此祥興於高祖考之門門為開道梓猶子也言王氏當有賢子開通祖統起於柱石大臣之位受命而王之符也劉向疏云王氏先祖墳墓在濟南者其梓柱生枝葉扶疏上出屋根垂地中雖孝昭冠石立於太山仆柳起於上林無以過此之明也應慎字仲華東平相事後母至孝有梓樹生於廳事室上徙置府庭繁茂長大人以為孝感之應東觀記陸倕尋陽太守章曰不能使府庭生梓橫閣誦經俯闚朱輜仰瞻繒冕晏類要類聚九章望長楸而太息室屋之間有此木則餘材皆不復震其葉可以餉豕肥碩三倍雅翼宋有荊氏者宜楸柏桑其拱把而上者求祖猴之杙者斬之三圍四圍求高名之麗者斬之七圍八圍婁人富商之家求禪傍者斬之此材之患也莊人間世楸戶淮北榮南河濟之間千樹楸與千戶侯等漢書吳中有陸家白蓮種顧家斑竹趙有韓氏酸棗中山有楸戶掌楸木者楸可為什器述異記蔡聲子聘于晉還如楚令尹子木與之語問晉故焉且曰晉大夫與楚孰賢對曰晉卿不如楚其大夫則賢皆卿材也如杞梓皮革自楚往也雖楚有材晉實用之襄二十五堯聘許由為九州長由惡聞洗耳於河巢父見而謂之曰豫章之木生於高山工雖巧而不能得子欲避世何不藏深高士傳豫章之為木也生七年而後可知昔漢武寶鼎二年立豫章宮於昆明池中作豫章木殿述異記豫章城之南門曰松陽門門內有樟樹高七丈五尺大二十五圍枝葉扶疏垂蔭數畝應劭漢官儀曰豫章郡樹生庭中故以名郡矣此樹嘗中枯逮晉永嘉中一旦更茂豐蔚如初咸以中宗之禪也禮斗威儀曰君政訟平豫章常為生太興中元皇果興大業於南故郭景純南郊賦云弊樟擢秀於祖邑是也以宣王祖為豫章故也水經枝垂新淦縣封谿有聶父所用樟木殘柯者遂生為樹今猶存其木合抱始倒植之今枝條皆垂下豫章記藜藿之生蝡蝡然日加數寸不可以為櫨棟楩柟豫章之生也七年而後知故可以為棺舟淮備務伐楩柟豫章而剖棃之或為棺槨或為柱梁披斷撥檖所用萬方然一木之樸也上齊俗似𣏞延叔堅曰豫章與𣏞木相似七年乃可別𣏞音尤讓木黃金山有柟樹一年東邊榮西邊枯後年西邊榮東邊枯年年如此張華曰交讓者此是也潯陽記雉山有木名交讓眾木敷榮後方萌芽亦更歲更榮枯也武陵郡記楠木植之成行列枝葉若相迴避然謂之讓木骰柏楠出西番及馬湖紋理縱橫不直其中有山水人物等花者價高亦難得又謂之骰子香楠格古要論柀煔煔似松生江南可以為船及棺材作柱埋之不腐爾雅太液池中有小池名孤樹池池中有一洲洲上有檆樹一株十餘圍望之如車蓋故取名之西京雜記休徵合浦東二百里有一杉樹葉落含風入洛陽城內漢時善相者云此休徵當出王者故遣千人伐樹役夫多死三百人坐斷株上食過足相容交州記西山有漢太傳陳蕃墓遙望兩杉樹聳柯出嶺垂陰覆谷南康記侍御史秦武奏平陵前道東杉樹一株僵死以柏栽補之請收陵令推劾晉咸康起居注爾雅云楓攝攝孫炎云生江南有寄生枝高三四尺生毛一名楓子天旱以泥泥之即雨又注楓賦云楓木葉厚無風自動天雨則止相感志爾雅謂楓為攝攝言天風則鳴聶聶也說文解字云楓木厚葉弱枝善搖漢宮殿中多植之至霜後葉丹可愛故騷人多稱之圖經景福殿賦芸若充庭槐楓被宸說文曰宸屋宇也選黃帝殺蚩尤於黎山之丘擲其械於大荒之中宋山之上其械化為楓木之林王瓘廣軒轅本紀靈楓南中有楓子鬼楓木之老者人形亦呼為靈楓焉述異記五嶺之間多楓木歲久則生瘤癭一夕遇暴雷驟雨其樹贅暗長三五尺謂之楓人越巫取之作術有通神之驗取之不以法則能化去南方草木狀楓天江東江西山中多有楓木人於楓樹下生似人形長三四尺夜雷雨即長與樹齊見人即縮依舊曾有人失笠於明日看笠子挂在樹頭上旱時欲雨以竹束其頭禊之即雨人取以為式盤極神驗楓天棗地是也僉載楓天棗地置之槽則馬駭置之輒則車覆兵法楓子留為式桐孫待作琴庾信詩楓香楓脂一名白膠香雅翼楓脂入地千歲為琥珀金樓子化人老楓化為羽人化書椿木樗木形幹相類但椿木實而葉香可噉樗木踈而氣臭膳夫亦能熬去其氣北人呼樗為山椿江東人呼為鬼目葉脫處有痕如樗蒱子又如眼目故得此名圖經惠子謂莊子曰吾有大樹人謂之樗其大本擁腫而不中繩墨其小枝卷曲而不中規矩立之塗匠者不顧今子之言大而無用眾所同去也莊子曰何不樹之於無何有之鄉廣莫之野彷徨乎無為其側逍遙乎寢臥其下莊逍遙洛陽北山謂之邙山其上無大樹大葉都城之北嶺上有古樗樹不知其來早晚婆娑周廻四五畝以來在伊闕正南相當越公等將建都城之日據此樹以為南北定准嫌樗木名惡號曰婆娑羅樹矣河洛記楚之南有冥靈者以五百歲為春五百歲為秋上石有大椿者以八千歲為春八千歲為秋莊子注椿一名橓橓木槿也夫明曰大椿矣而乃以為木槿豈專以無窮無極概之耶柞櫟櫟其實梂櫟橡實也梂盛實之房也爾雅秦風山有苞櫟陸璣云秦謂柞櫟為櫟唐風云集于苞栩陸云今柞櫟也徐州人謂櫟為杼或謂為栩其子為皂或言皂斗其殼為汁可以染皂今京洛及河內言杼斗謂櫟為杼五方通語也然則柞櫟也杼也栩也皆橡櫟之通名也本草吳越之間名柞為櫟風土記杼實曰橡古今注十二月其樹櫟之可以為車轂木不出火惟櫟為然亦應陰氣也淮南匠石之齊至乎曲轅見櫟社樹其大蔽牛絜之百圍其高臨山十仞而後有枝其可以為舟者旁十數觀者如市匠伯不顧遂行不輟弟子厭觀之走及匠石曰自吾執斧斤以隨夫子未嘗見材如此其美也先生不肯視行不輟何邪曰散木也以為舟則沈以為棺槨則速腐以為器則速毀以為門戶則液滿以為柱則蠹是不材之木也無所可用故能若是之壽匠石歸櫟社則夢曰若將比予於文木耶使予也而有用且得有此大也耶莊人間世合壁樗下引文木誤金鈴苦楝子亦曰金鈴子花落子謂之石茱蓃本草鳳食七月其樹楝楝實鳳凰所食也淮南豸食風俗通云獬豸食楝荊楚歲時記又云蛟龍畏楝見五日楚楚荊也牡荊蔓荊也廣雅一名羊櫨一名空疏六甲陰符楚焞以荊為之燃以灼必以荊者凡木心圓荊心方也禮弓矢圖寧浦有三種荊金荊可作枕紫荊堪作床白荊堪作履與他處牡蔓荊全異又彼境有牡荊指病自愈節不相當者日暈時刻之與病人身齊等置床下雖危困亦愈南方草木狀荊文王得葆申曰先王卜以臣為葆百今若此王之罪當笞王曰願請變更而無笞葆申曰臣承先王之令不敢廢也王曰敬諾引席王伏葆申束細荊五十跪而加之于背如此者再謂王起矣王曰有笞之名一也遂致之申曰臣聞君子耻之小人痛之恥之不變痛之何益葆申趣出自流於淵請死罪文王曰此不榖之過也葆申何罪王乃變更召葆申後荊國兼國三十九呂覽梁天監三年上將合神仙飯奉敕論牡荊曰荊花白多子子粗大歷歷踈生不過三兩莖多不能圓或褊或異或多似竹節葉與餘荊不殊蜂多採牡荊牡荊汁冷而甜餘荊被燒則烟火氣苦牡荊體慢汁實烟火不入其中主治心風第一于時遠近尋覔不得猶用荊葉今之所有者云登真隱訣注郊祀志以牡荊為幡竿漢書五年南方置北景林邑海陰三郡北景在林邑南大海中與海陰接境或云馬援鑄柱尚存地暑熱多大林木高者數百尋有金荊生於高山峻阜大者十圍盤屈瘤蹙文如美錦色艷於真金中夏時有於海際得之工人數用甚精妙貴於沉檀大業拾遺錄煬帝令朱寬征留仇國還得金荊瘤數十片木色如真金密緻而文彩盤蹙有如美錦甚香極細可以為枕及案面雖沉檀不能及僉載五加皮樹本是白楸其上有葉如蒲葉者其葉三花是雄五葉花是雌一名𤜮漆一名𤜮節俗名為追風使本草金鹽舜嘗登蒼梧山曰厥金玉之香草朕用偃息正道此乃五加也又異名曰金鹽昔西域真人王屋山人王常言何以得長久何不食石蓄金鹽母何以得長壽何不食石用玉豉玉豉者即地榆也五加地榆皆是煮石而餌得長生之藥也昔尹公度聞孟綽子董士固共相與言曰寧得一把五加不用金玉滿車寧得一斤地榆安用明月寶珠東華真人煮石經大王君云五加蓋天有五車之星精也金應五湖人應五德位應五方物應五車故青精入莖則有東方之液白氣入節則有西方之津赤氣入華則有南方之光玄精入根則有北方之固黃烟入皮則有戊巳之靈五神鎮生相轉肓成用之者真仙服之者反嬰也本草陽精木者陽精生於陰故水者木之母也木之為言觸氣動躍也其字八推十為木八者陰合十者陽數元含苞草洪者為本而殺者為末禽獸之性大者為首而小者為尾末大於本則折尾大於腰則不折故食其口而百節肥灌其本而枝葉美淮南古禮男子生而射天地四方其文云東方之弧以梧桐者東方之草春木也南方之弧以柳柳者南方之草夏木也中央之弧以桑桑者中央之木也西方之弧以棘棘者西方之草秋木也北方之弧以棗棗者北方之草冬木也青史子木名三時草命一歲若椿從春楸從秋榎從夏所謂木名三時芓從予蔩從寅茆從卯莤從酉荄從亥艼從丁茂從戊芑從巳莘從辛葵從癸之類命以一歲支幹故曰草命一歲也董子王者繼嗣平明則賓連生于戶闊達生于房連累相承象繼嗣也白虎通賓連闊達生于房室王者御后妃有節生宋志王者使賢不肖位不相踰則平露生庭狀如蓋政平則正不平則傾白虎通平露如蓋以察四方之政其國不平則隨方而傾宋志紫脫王者仁義行則生紫脫瑞應圖君乘木而王政太平蔓竹紫脫為之常生禮斗華平植華平於春圃東京賦其枝正平王者有德則生德剛則仰德弱則低宋志崙者之山有木焉其狀如穀而赤理其汗如漆其味如飴食者不饑可以什勞其名曰白䓘可以血玉山經櫔木歷兒之山其上多橿多櫔木是木也方莖而圓葉黃華而毛其實如楝服之不忘山經狼山有異木人無見其朽者其名千歲葉似棗色似桑冬夏青貞強少節宜都山川記長生上林苑有千年長生樹十株萬年長生樹十株西京雜記金華殿後有皇后浴室種雙長生樹枝條交于棟上團團車蓋形冬日不凋葉大如掌至八九月乃生華華色白子赤大如橡子不中啖也世人謂之西王母長生樹鄴中記華林園有萬年樹十四株晉官閣名不死樹圓丘山有不死樹食之乃壽博物志模木生周公塜上其葉春青夏綠秋白冬黯以色得其正也淮南王草木譜楷楷木生孔子塚上其幹枝疏而不屈以質得其直也上蜀中有木類柞眾木榮時如枯枿隆冬方萌芽布陰蜀人呼為楷木晉人為介之推起思烟臺種仁壽木木似柏而枝長柔軟其花堪食呂覽云木之美者有仁壽之華拾遺記方丈山有恒春之樹葉如蓮花芬芳如桂花隨四時之色昭王之末仙人採焉列國咸賀王曰寡人得恒春矣何憂太清不至恒春一名沉生如今之沉香也上七里洲中有魯班刻木蘭為舟舟至今在洲中詩家所云木蘭舟出於此也木蘭川在潯陽江中多木蘭樹昔吳王闔閭植木蘭於此用構宮殿也述異記聚窟州有返魂樹伐其根心於玉釜中煮取汁煎之令可丸名曰驚精香或名震靈丸或名返生香或名却死香死屍在地聞氣乃活十洲記君子樹華林園有君子樹三株晉宮閣記晉永康元年巴陵顯安寺僧房床下忽生一樹隨發隨生如是非一樹生愈疾咸共異之置而不剪旬日之間植柯極棟遂移房避之自爾以後樹長便遲但極晚秀夏中方有花葉枝落與眾木不殊多歷年稔人莫識也後外國僧見之攀而流涕曰此娑羅樹也佛處其下涅盤吾思本事所以泣耳而花開細白不足觀採元嘉十一年忽生一花形色如芙蓉樹今見在此亦一方之奇迹也荊南記續高僧傳天寶初安西進娑羅枝狀言臣所管四鎮有拔汗那最為密近木有娑羅樹特為奇絕不庇凡草不止惡禽聳幹無慚於松栝成陰不愧於桃李近差官拔汗那使令採得前件樹枝二百莖如得托根長樂擢穎建章布葉垂陰鄰月中之丹桂連枝接影對天上之白榆酉陽大食國王嘗遣人乘船將衣糧入海經涉八年未極西崖於海中見一方石石上有樹枝赤葉青樹上揔生小兒長六七寸見人不語而皆能笑動其手腳頭著樹枝人摘取入手即乾黑其使得一枝還今在大食王處唐書端正長安西端正樹去馬嵬一舍之程乃德宗幸奉天觀其蔽芾鍚以佳名也後有文士題詩曰昔日偏霑雨露榮德皇西幸賜佳名馬嵬去此無多地合向楊妃塚上生抒情集上發馬嵬行至扶風旁花畔見石楠樹愛玩之因目為端正樹蓋有所思也楊太真外傳合歡欲蠲人之憂則贈以丹棘一名忘憂欲蠲人之忿則贈以青棠一名合歡合歡枝葉柔弱互相交結每一風來輒自相解了不相牽綴樹之階庭使人不忿嵇康種之舍前古今注其葉能去垢至暮即合故曰合昏又謂之夜合花本草合歡蠲忿萱草忘憂養生論程雅問櫨木曰無患何也答曰昔有神巫曰瑤芝能符劾百鬼得鬼則以此木為棒棒殺之世人相傳以此木為眾鬼所畏競取以為器用以却邪厭鬼故曰無患也古今注今僧家貫之為念珠惟取紫紅色小者佳纂文無患子一名噤婁一名桓桓患字聲訛也本草㧾葉似柳其核堅正黑可作香纓用辟惡氣浣垢博物志無患木燒之極香酉陽女貞女貞木者少陰之精冬華不落典術女貞之樹柯葉冬生寒涼守節險不能傾鄭氏婚禮謁文贊女貞之樹一名冬生負霜葱翠振柯凌風故清士欽其質而貞女慕其名晉蘇彥頌少室之山有木名帝休葉狀如楊其枝五衢黃華黑實服者不怒山經太室之山其上有木焉葉狀如藜而赤理其名曰栯木服者不妬上慎火廣州有大樹可以御火山北謂之慎火或謂戒火多種屋上以防火南越志東武城東南有勝火木方俗音曰挺子其木經野火燒炭不滅故東方朔謂為不灰之木伏琛齊地記徐無山有不灰之木生火之石注云其木色黑似炭而無葉有石赤色如丹以一石相磨則火發以然無火可以終身今則無之水經南海蕭丘之上生一種木雖為火所著但少焦黑人或得以為薪者炊熟則灌滅之用之不窮抱朴思惟樹漢時有道人自西域持具多子植於嵩之西峰下後極高大有四樹樹一年三花魏王花木志嵩高寺中有思惟樹即貝多也如來坐貝多下思惟因以名焉嵩山記南印建那補羅國北不遠有多羅樹林三十餘里其葉長廣其色光潤諸國書寫莫不采用翻譯洛陽翊津橋通翻經道塲東街其道塲有婆羅門僧及身毒僧十餘人新翻諸經其所翻經本從外國來用貝多樹葉書書今胡書體貝多葉長一尺五六寸闊五寸許葉形似琵琶而厚大橫作行書隨經多少縫其一邊帖帖然拾遺交趾定安縣有木緜樹高大實如酒杯中有綿如絮之綿又可作布名曰緤一名毛布吳錄地理志木綿正月則花大如芙蓉花落結子方生綿方葉耳子內有綿甚白蠶成則熟南人以為縕絮羅浮山記嶺南容州陸川白石山色潔白四面懸絕上有飛泉瀑布下有勾芒木可以為布里人斫之新條更生取之績以為布寰宇記木龍寺有三層磚塔側生一大樹縈繞至塔頂枝幹交橫上平云容十餘坐枝杪四向下垂團團如柏子帳經過莫有辨者梁武帝曾遣人圖寫樹形還都大体屈盤似龍因呼為木龍寺聘中道里記抱木生江溪中葉細如檜身堅類柏唯根軟不勝刀鋸今潮循人用多其根刳而為履當木濕時刻削易如割瓜木乾之後柔刀不可理也或油畫或漆其輕如通草暑月著之隔卑濕地氣力如杉木今廣州從諸郡牧守初到任皆有油畫抱木履也嶺表錄異丹青終南山有樹直上百尺無枝上結藂條狀如車蓋葉一青一丹斑駁如錦繡長安謂之丹青樹亦云華蓋樹亦生於熊耳山中西京雜記樺上林賦華楓枰櫨師古曰華即今之皮貼弓者也蓮書二年汾州起汾陽宮宮南外平林率是大樺木高百餘尺行從文武皆剝取皮覆菴舍大業拾遺鉢室韋國用樺皮蓋屋隋書堪為燭取脂燒辟鬼本草桄榔樹大四五圍長五六丈洪直旁無枝條其顛生葉不過數十似椶葉斫其木肌堅難傷入數寸得麪赤黃蜜緻可食廣志木理有文堪為握槊局其心似藤心為炙滋腴極美其鬚可為帚香潤絕勝椶柟北戶錄木作鋘鋋利如鐵中石益利唯中焦根致敗上葉下有鬚如粗馬尾廣人採之以織巾子嶺表錄異萬歲登封元年春封嵩山御朝覲壇受朝賀登封壇南有槲樹大赦日於其杪置金鷄改名為金鷄樹唐書南方大荒有樹焉名曰如何三百歲作花三百歲作實有核如棗子長五寸金刀割則苦竹刀割則飴木刀割則酸蘆刀割則辛食之則得仙神異經如何隨刀而改味顧愷之啟蒙記符禺之山其上有木名曰文莖其實如棗可以已聾山經天上李紳詩序新昌宅書堂前有藥樹一株今已盈拱則長慶中於翰林院西軒藥樹下移得纔長一寸僕夫封一泥圓以歸植今則長成名之曰天上樹詩云白榆星底開紅甲珠樹宮中映紫霄海錄劉成云平仲之木實白如銀君遷之樹子如瓠形吳都賦庭中必有君遷樹莫向空臺望漢朝陸龜蒙詩瑤光寺內珍木香草不可勝言牛筋狗骨之木鷄頭鴨腳之草亦悉備焉伽藍記山中樹能語者非樹語也其精名曰雲陽山中午日稱仙人者老樹也抱朴連理異根同體謂之連理異畝同頴謂之嘉禾瑞應圖木瘣古人有言木無枝謂之瘣人之不學謂之瞽搜神異記杜芳籐形不能自立根本緣繞他木作房藤連結如羅網相罥然其皮理連合鬱茂成樹所託樹既死然後扶踈六七丈也南州異物志簡子籐簡子藤生緣樹木正月二月華色四月五月熟實如藜赤如雄鷄冠核如魚鱗取生食之淡泊甘苦出交趾合逋南方草物狀萪藤萪藤圍數寸重於竹可以杖篾以縳船及以為席勝竹也異物志藤類有十許種續斷草藤也一曰諾藤一曰水藤山行渴則斷取汁飲之治人體有損絕沐則長髮去地一丈斷之輒便生根至地永不死廣州記人子藤安南有人子藤紅色在蔓端有刺其子如人狀崑崙燒之集象南中亦難得酉陽天中記卷五十一
