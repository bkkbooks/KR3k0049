body:
  text: 姓姓人所生也古之聖人母感天而生子故稱天子因生以從女女生亦聲也説文紀世別類人所以有姓者何所以崇恩愛厚親親遠禽獸所以別婚姻也故紀世別類使生相愛死相哀同姓不得相娶皆為重人倫也姓者生也人稟天氣所以生者也詩云天生蒸民尚書曰平章百姓姓所以有百者何以言古者聖人吹律定姓以記其族人含五常而生正聲有五宮商角徵羽轉而相雜五五二十五轉生四時異氣殊音悉備故姓有百也所以有氏者何所以貴功德下伎力或氏其官或氏其事聞其氏即可知矣所以勉人為善也或氏王父字者何所以別諸侯之後為興滅國繼絶世也王者之子稱王子王者之孫稱王孫諸侯之子稱公子公子之子稱公孫公孫之子各以其王父字為氏故春秋有王子瑕論語其王孫賈又有衛公子荊公孫胡魯有沖氏孟氏叔氏季氏楚有昭屈景氏齊有高國崔盧氏以知其子孫也王者之子亦稱王子兄弟立而皆封也或曰王者之孫亦稱王孫刑德倣曰堯之命表稷契賜姓于姬皋陶典刑不表姓言天任德遠刑禹姓姒祖昌意以薏苡生殷姓子氏祖以玄鳥子生也同姓姬氏祖以履大人迹生也白虎通賜姓昔者聖王觀象於乾坤考度於神明探命曆之去就省群后之德業而賜姓命氏因彰德功傳稱氏之徹官百王公之子弟千世能聽其官者而物賜之姓是謂百姓姓有徹品於王謂之千品昔堯賜契姓子賜棄姓姬賜禹姓姒氏曰有夏伯夷為薑氏曰有呂下及三代官有世功則有官族邑亦如之後世微末因是以為姓則不能改也故或傳本姓或氏號與諡或氏於爵或氏於志若夫五帝三王之世所謂號也文武昭景成宣戴柏所謂諡也齊魯荊楚秦晉燕趙所謂國也王氏侯氏王孫公孫所謂爵也司馬司徒中行下軍所謂官也伯有孟孫子服叔子所謂字也巫氏匠氏陶氏所謂事也東門西門南宮東郭北郭所謂居也三烏五鹿青牛白馬所謂志也凡厥姓氏皆出屬而不可勝紀也潛夫論胙土無駭卒羽父請諡與族公問族於衆仲衆仲對曰天子建德因生以賜姓胙之土而命之氏諸侯以字為諡因以為族官有世功則有官族邑亦如之公命以字為展氏左隱八世祿穆叔如晉范宣子逆之問焉曰古人有言曰死而不朽何謂也穆叔未對宣子曰昔丐之祖自虞以上為陶唐氏在夏為御龍氏在沈為豕韋氏在周為唐杜氏晉主夏盟為范氏其是之謂乎穆叔曰以豹所聞此之謂世祿非不朽也襄二十四堯姓伊堯母字慶都配高辛氏而生堯因主人伊長孺為姓謂之伊三輔舊事羸氏秦之先曰伯翳佐舜擾馴鳥獸錫姓曰羸氏其後分封以國為姓有徐氏郯氏王氏江氏陳留風俗傳呂氏太公望呂尚者東海上人其先祖嘗為四嶽佐禹平水土甚有功虞夏之際封於呂本姓薑氏從其封姓故曰呂尚史記侯姓侯氏侯爵周微官失其守故以侯爵為姓陳留風俗傳趙氏費仲生惡來季勝武王伐紂并殺惡來季勝之後有造父以善御事周穆王穆王遊西海忘歸於是徐偃作亂造父御一日千里以征之王封造父於趙城因以為氏潛夫論張氏張良韓公族姬姓也秦始皇滅韓良弟死不葬良散家資千萬為韓報讎擊始皇於博浪沙中誤椎副車秦索賊急良乃變姓為張匿於下邳上孫氏夏侯嬰初為滕令奉車故號滕公及曾孫頗尚平陽公主主隨外家姓號孫公主故滕公子孫更為孫氏漢書灌夫灌夫字仲孺潁陰人也父張孟常為潁陰侯灌嬰舍人得幸因進之至二千石故蒙灌氏姓為灌孟上衛氏衛青字仲卿其父鄭季河東平陽人也以縣吏給事侯家平陽侯曹壽尚武帝姊陽信長公主季與主家僮衛嫗通生青青同産兄衛長君及子夫子夫自平陽公主家得幸武帝故青冒姓衛氏上馬趙馬援字文淵其先趙奢為趙將號曰馬服君子孫因為氏後書馬服者言能服馭馬也注第五第五倫字伯魚京兆長陵人也其先齊諸田諸田徒園陵者多故以次第為氏後漢慶賀賀氏慶封之後慶純儒學有重名安帝時為侍中江夏太守避安帝父清河王慶諱改為賀氏虞預晉書是儀是儀字子羽北海營陵人也本姓氏仕郡郡相孔融嘲儀言氏字民無上可改為是乃遂改焉吳志古之建姓或以所生或以官號或以祖名皆有義體以明氏族故曰胙之以土而為之氏此先王之典也所以明本重始彰示功德子孫不忘也今離文析字橫生忌諱使儀易姓忘本誣祖不亦謬哉徐衆評奚嵇嵇康字叔夜譙國銍人也其先姓奚會稽上虞人以避怨徙焉銍有嵇山家于其側因而命氏晉傳束踈束晳字廣微陽平元城人漢踈廣之後也王莽末廣曾孫孟達避難自東海徙居沙鹿山南因去踈之足改性焉上棗踈棗據字道彥潁川長社人也本姓棘其先避仇改焉上崔正熊豹詣都郡都郡將姓陳問正熊君去崔杼幾世答曰民去崔杼如明府之去陳恆世説諸葛令恢王丞相共爭姓族先後王曰何不言葛王而云王葛令曰譬言驢馬不言馬驢驢能勝馬邪上刁韓刀彝於桓公坐嘲韓慱曰君是韓盧後慱誤應曰君是韓盧後桓公笑曰刁以君姓韓故相問耳他自姓刁那得是韓盧後博曰明公未之思耳短尾者則為刁也一坐歎以為佳晉中興書徐盧徐之才聰辨強識尤多劇談公私會聚多相嘲戲常嘲王昕姓云有言則誑近犬則狂加頸足而為馬施角尾而為羊欣無以對又嘗宴賓客時盧元明在座戲弄之才姓云卿姓徐字乃未入人之才即嘲元明姓盧字安亡為虐在丘為虛生男成虜配馬成驢嘲元明二字去頭則是兀明出頸則是元明臧半則是元目變聲則是元盲元明亦無以對啓顏録北齊書封盧盧思道嘗謂通直節渤海封孝騫曰卿既姓封是封豕之後騫曰卿既姓盧是盧令之裔談乩麥竇隋麥鐵杖因朝集考功郎竇威嘲之曰麥是何姓鐵杖曰麥竇不殊何忽相怪時人以為敏捷芝田録北史馬王隋姓馬王二人嘗娶宴談笑馬遂嘲王曰王是你元來本姓二為你漫走來將丁釘你鼻王曰馬是你元來本姓馬臧你尾子來背上負王郎啓顏録賜族有尉義臣者其父崇不從尉遲逈後復與突厥戰死高祖嘉之將賜姓為金氏訪及群臣鮑宏曰昔項伯不同項羽漢祖賜姓劉氏秦真父能死難魏武賜姓曹氏請賜以皇族高祖曰善陏書駝李后魏時定四姓隴西李氏大姓也恐不得預星夜乘明駝倍程入洛而事已定訖故至今謂之駝李馬僉載牛馬牛弘為吏部侍郎有選人馬敞者形貌最陋弘輕之側臥食果子嘲敞曰嘗聞扶風馬謂言天上下今見扶風馬得驢亦不假敞應聲曰嘗聞隴西牛千石不用軥今見隴西牛臥地打草頭弘驚起遂與官上莽梟高宗廢后王氏及蕭良娣皆為庶人囚之別院武昭儀令人皆縊殺之尋又追改后姓為莽氏蕭良娣為梟氏舊唐陏煬帝誅楊玄感改為梟氏虺氏則天朝博州刺史琅琊王沖據博州起兵沖父豫州刺史越王真又舉兵於豫州與相應討平之改姓為虺氏初貞在蔡州遊城西水門橋鑒水不見其首上蝮氏乾封元年改武惟良為蝮氏劉員員半千字榮期其先本彭城劉氏十世祖凝之事宋起部郎及齊受禪奔元魏以忠烈自比伍員因自姓員新唐半千狀云本姓劉氏彭城輿星人宋宗室營陵侯劉遵考子起部郎中凝之後宋之禪因留北魏太武以忠諫比伍員改姓員氏懷遠懷遠六代孫半千古今姓纂南史宋有劉凝之因留北魏慕伍員忠烈改姓員氏大武帝賜名懷遠姓譜宋書營浦侯遵考武帝族弟非營陵也子澄之琨之亦無凝之魏太武燾終于文帝元嘉二十八年齊受禪在順帝升明三年魏孝文之太和三年也相去已二十九年矣南史隱逸傳劉凝之答臨川衡陽二王書曰頓首稱僕不修民禮卒於元嘉二十五年其史具在可考也乃姓纂謂太武以忠諫比伍員姓譜謂凝之慕員改姓著述之家俱相承而莫辨焉然則姓氏之書詎可憑耶通志氏族略前涼有安夷人員半千不及唐之半千豈其誤耶族望高宗朝以太原王范陽盧榮陽鄭清河慱陵三崔趙郡隴西二李其族望耻與諸姓為婚也高士廉傳以易自筮陸羽字鴻漸一名疾字季疵不知所生或言有僧得諸水濱畜之既長以易自筮得蹇之漸曰鴻漸于陸其羽可用為儀乃以陸為氏名而字之新唐矜氏林蘊辨給嘗有姓崔者矜氏族蘊折之曰崔杼弒齊君林放問禮之本優劣何如邪其人俯首不能對上姓胡冒令令狐綯以姓氏少族人有投者不吝其力繇是遠近皆趨之至有姓胡冒令者進士溫庭筠戲為詞曰自從元老登庸後天下諸狐悉帶令南部朱耶朱耶赤心者或云其先塞上人多以騎獵為業胡人三十輩於大山中見飛鳥甚衆鴶䲳於一谷中衆胡就之見一小兒約才二歲已來衆鳥銜果實而飼之衆胡異之遂收而衆養之成長求姓衆云諸人共育得大遂以諸耶為姓言朱耶者訛也上復姓成汭少無行使酒殺人亡為浮屠後入蔡賊中為賊帥假子更姓名郭禹昭宗時為荊南節度使唐書推官鄭準為表乞歸本姓云名非霸越乘舟難效于陶朱志切投秦出境遂稱于張祿成為本姓郭乃冒稱避本犯禁之辜敢歸司寇別族受封之典誠愧諸侯其表甚為朝廷所重五代史補范禹稱九隴人隨母改適張氏因冒姓張名諤天成中登第始戲復姓上郡守啓曰昔年上第誤標張祿之名今日故榮復作范睢之裔孟知祥以為蒙陽令時為翰林學士蜀檮杌范仲淹二歲而孤隨母謝改適長山朱氏遂冒姓名説家録既登第後乞還姓表云志在投秦入境遂稱於張祿名非伯越乘舟偶效於陶朱陶唐陶穀本姓唐氏避石敬塘而改焉小字鐵牛鹿門先生序李沆出典河中嘗寄陶書云每過中流潛聞令德陶初不為意久之方悟蓋河中有張燕公鑄係橋鐵牛故也間談録敬文文彥博本姓敬其曾大父避石晉高祖諱更姓文至漢復姓敬入宋其大父避翼祖諱又更姓文初敬氏避諱各用其一偏或為文氏或為茍氏然敬氏從非茍也從支非文也俱非其一偏也聞見後録何敬容為尚書令而拙於草隸淺於學術其署名敬字則大作茍小為文容字大為父小為口陸倕戲之曰公家茍既奇大父亦不小敬容遂不能答梁書乾符末有客題青龍寺門曰敬文今不在碎石入流沙有沙彌曰敬文不在茍字也杜苑叢談按敬從茍從文自梁已然矣邵氏作音棘毛氏韻因之豈以陸倕等為誤耶馬矢馬宮字遊卿師丹薦其行能高潔後代孔光為司徒宮本姓馬矢宮仕學稱馬氏云前書避難城陽炅橫被誅四子一守墳姓炅一避難徐州姓昋一居幽州姓桂一居華陽姓炔四字並音桂字各九畫以避難也後漢太守陳球碑陰謝射漢末大鴻臚射咸本姓謝名服天子命為將軍出征以姓謝名服不祥改為射氏名咸三輔決録周姬侯景篡置七廟偉請七世諱景黨有知景祖名乙羽周及篡以用為廟諱改周弘正周名珍姓姬也南史魚鄭鄭注本姓魚冒為鄭故當時號魚鄭及用事人瘦謂曰水族注敗前菌生所服帶上禇中藥化為蠅數萬飛去新唐桑姓桑維翰舉進士主司惡其姓桑喪同音人勸勿舉進士維翰著日出扶桑賦以見志五代史吐情人必有名何以吐情自紀尊事人者也論語曰名不正則言不順三月名之何天道一時物有其變人生三月日煦亦能咳笑與人相更答故因其始有知而名之故禮服傳曰子生三月則父名之名之於宗廟者謂子之親廟也明當為宗祖主也一説名之於燕寢名者幼少卑賤之稱也寡略故於燕寢殷以日名子何殷家質故直以生日名子也尚書言太甲帝武丁也於臣民亦得以甲乙生日名子何亦不止也以尚書道殷臣有巫咸有祖已也何以知諸侯不象王者以生日名子也以太王名亶甫王季名歷此殷之諸侯也不以子丑為名何曰甲乙者幹也子丑者枝也幹為本本質故以甲乙為名也名或兼或單何名子非一或聽其聲以律定其名或依事旁其形故名或兼或單也依其事者若后稷是也棄之因名之為棄也旁其形者孔子首類魯國尼邱山故名為邱或旁其名為之字者聞名即知其字聞字即知其名若名賜字子貢名鯉字伯魚白虎通敬成人人所以有字何冠德明功敬成人也故禮士冠經曰賓北面字之曰伯某甫又曰冠而字之敬其名也所以五十乃稱伯仲者五十知天命思慮定也能順四時長幼之序故以伯仲號之上名本字末君之於臣先生之與其門人名之可也至於同官之於僚黨同姓之於昆弟同門之於朋友可以稱其字而不可斥其名故公羊傳曰名不如字者非謂其人之名不如其字尊乃謂為人所字則近乎見尊為人所名則近乎見卑也古之君子之名子也必以信義而擇淑令所以祥其名也不以官職所以殊其名也不以畜幣所以重其名也不以隱疾所以顯其名也遍告內外所以昭其名也書而藏之所以寶其名也賤者避焉所以貴其名也冠而有字所以尊其名也名成乎禮字依乎名名字之本字名之末也為本故尊為末故卑尊故其禮詳卑故其禮略也且婦人無名故賤於丈夫野人無名故賤於學士名者已之所以尊尊者之所以命已字則已之所以接卑卑者所以稱已未有用之於尊而為卑用之於卑而為尊者也御覽秦記制義晉穆侯之夫人薑氏以條之役生大子命之曰仇其弟以千畝之戰生命之曰成師師服曰異哉君之名子也夫名以制義義以出禮禮以體政政以正民是以政成而民聽易則生亂嘉耦曰妃怨耦曰仇古之命也今君命大子曰仇弟曰成師始兆亂矣兄其替乎桓二名有五桓公子同生以大子生之禮舉之公問名於甲繻對曰名有五有信有義有象有假有類以名生為信以德命為義以類命為象取於物為假取於父為類不以國不以官不以山川不以隱疾不以畜牲不以器幣周人以諱事神名終將諱之故以國則廢名以官則廢職以山川則廢主以畜牲則廢祀以器幣則廢禮晉以僖侯廢司徒僖侯名司徒廢為中軍宋以武公廢司空武公名司空廢為司城先君獻武廢二山二山具敖也魯獻公名具武公名敖更以其鄉名山是以大物不可以命公曰是其生也與吾同物命之曰同上六旌功鄋瞞侵齊遂代我公卜使叔孫得臣追之吉冬十月敗狄于鹹獲長狄僑如以命宣伯文十一得臣因名宣伯曰僑如以旌其功也無野齊惠之妾蕭桐子見御有身以其賤不敢言也取薪而生項公於野又不敢舉也有狸乳而鸇覆之人見而收因名曰無野是為項公搜神記待事魯苫越生子將待事而名之陽州之役獲焉名之曰陽州定八欲自比僑如伯魚孔子年十九娶於宋之開官氏之女一歲而生伯魚伯魚之生也魯昭公使人遺之鯉夫子榮君之賜今本作貺故因以名曰鯉而字伯魚家語叔馬衛青生子或有獻騧馬者乃命其子曰騧字叔馬其後改為登字叔升西京雜記獨不名鄭當時字莊陳人也其先鄭君嘗事項籍籍死而蜀漢高祖令諸故項籍臣名籍鄭君獨不奉詔詔盡拜名籍者為大夫而逐鄭君鄭君死孝文時當時以任俠自喜聲聞梁楚間漢書慕蘭司馬相如名犬子相如既學慕蘭相如之為人也更名相如漢書更名劉向本名更生恭顯誣譖周堪張猛死更生傷之乃著疾説擲要救危及世頌依興古事悼已及同類遂廢十餘年成帝即位顯等伏辜更生乃復進用更名向本傳宋郊有説之者曰姓符國號名應郊天郊因請更名嘗移書葉道卿清臣日為同年葉戲答云清臣宋郊榜第六人登第遍閲小録無宋庠者不知何許人公答詩云莫驚書録題臣向便是當時劉更生元服袁賀字元服祖父京為侍中安帝始加元服百官會賀臨嚴垂出而孫適生喜其嘉會因名曰賀字元服風俗通臺卿趙岐字臺卿生於御史臺因字臺卿後漢元歎顧雍從蔡伯喈學專一清靜敏而易教伯喈貴異之謂曰卿必成致今以吾名與卿故雍與伯喈同名由此也江表傳雍字元歎言為蔡雍之所歎因以為字焉吳録小同鄭玄一子名益字益恩孔融在北海舉為孝廉及融為黃巾所圍益恩赴難隕身妻有遺體生男玄以太歲在丁卯生此男以丁卯日生又手理與玄相似故名曰小同別傳依謙王昶為兄子及子作名字皆依謙實以見其意故兄子默字處靜沈字處道其子渾字玄沖深字道沖遂書戒之曰以玄默沖虛為名欲使汝曹顧名思義不敢違越也魏志作名字孫休詔曰人之有名以相紀別長為作字憚其名耳禮名子欲令難犯易避五十稱伯仲古或一字今人競作好名好字又令相配所行不副此瞽字伯明者也孤常哂之孤今為四男作名字太子名𩅦彎字酋迄次子名𩃙觥字栗賢次子名壾莽字昷舉次子名𠅨褒字㷏擁此都不與世所用者同故鈔舊文會合作之夫書八體損益因事而生今造此名字既不相配又字但一庶易棄避吳録陳武胡人育於臨水令陳君君奇之起議欲易其故字武長跪白起曰里語有之都亭鼠數聞長者語今當易字實有私心嘗聞長卿慕藺相如之行故字相如往在鄉里久聞故老之説稱漢使蘇武執忠守志不服單于流於漠北擁節牧羊寄秋鴈以訴心因行雲而托誠高山仰止意竊慕之陳氏嘉其志遂名之曰武又欲令字仲顯其本是胡人而石勒石虎諱胡曰國人故因字之曰國武別傳慕荀袁粲父濯蚤卒祖母哀其幼孤名之曰愍孫愍孫幼慕荀奉倩之為人白孝武求改名為粲不許至明帝立乃請改為粲字景倩其外孫王筠又云明帝多忌諱反語袁愍為殞門帝意惡之乃令改焉南史名世用之字王胡之子茂之茂之子裕之裕之子瓚之瓚之子秀之南史王彪之尚書僕射彬子也彪之子臨之臨之子納之納之子準之準之子輿之輿之子進之上王羲之子徽之徽之子禛之晉書獻之以兄子靖之嗣靖之子悅之晉宋書孫同祖名安同遼東胡人也父屈仕慕客暐長子屈明元時典太倉事北史改名袁昂本名千里齊永明中武帝謂曰昂昂千里之駒在卿有之今改卿名為昂即字千里南史剛梗遊肇字伯始孝文賜名焉博綜經史動存名教尚書令高肇宣武之舅百僚懾憚以肇名與已同欲令改易肇以孝文所賜執志不許高肇甚銜之宣武嘉其剛梗北史名乾魏鎮東將軍劉乾碑云君諱乾字天金石録盜毆莊里有人字其長子曰盜次子曰歐盜持衣出耨其母呼之曰盜吏因縛之其母呼歐歐喻吏遽而聲不轉但言歐歐吏因歐之盜幾至于殪劉子祖父同名襄陽有陏處士羅君墓志曰君諱靖字禮襄陽廣昌人高祖長卿齊饒州刺史高祖弘智梁殿中將軍祖養父靖學優不仕有名當代碑字畫徑楷類褚河南容齋一筆半千員半千字榮期始名餘慶舉童子房玄齡異之長與何彥先同事王義方以邁秀見賞義方常曰五百年一賢者生子宜當之因改今名唐書易名姚崇始名元崇以與突厥叱刺同名武后時以字行至開元世避帝號更以今名上賜名陸象先元方子也始名景初睿宗曰子能紹先構是謂象賢者乃賜名焉上瓜子賀知章祕書監有高名告老歸吳中上嘉重之每別憂異焉知章將行涕泣辭上上曰何所欲知章曰臣有男未有定名幸陛下賜之歸為鄉里榮上曰為道之要莫若信孚者信也履信思乎順卿子必信順之人也宜名之曰孚知章再拜而受命知章久而謂人曰上何謔我耶吳人孚乃瓜下為子豈非呼我為瓜子耶傳信記名似杜相鴻漸之父名鵬舉父子而似兄弟之名父嘗夢有所之見一大碑云是宰相碑已作者金填其字未作者刊名於上杜問曰有杜家兒否曰有任自看之記得姓下是鳥偏傍曳腳而忘其字乃名鵬舉而謂之曰汝不為相即世世名鳥旁而曳腳也鵬舉生鴻漸而名字亦前定矣况其官與壽乎劉賓客嘉話神命李西臺栖筠避暑於青龍寺夢戴白神人云昔尹氏相宣王致中興君男亦佐中興之君可以吉甫名之傳載栖筠喜獎善而樂人攻已短為天下士歸重不敢有所斥稱贊皇公云新唐索繼馬燧之孫始生德宗命之曰繼祖退而笑曰此有二義意謂索繼也國史補同帝王苗晉卿十子發丕堅粲垂向昌稷望咸粲德宗時官至郎中陸贄欲進粲官帝不許曰晉卿往攝政有不臣之言又名其子皆與帝王同粲等宜與外官贄為奏辨帝然之而粲官終不顯新唐趙堯李舜未聞為逆於當時王莽曹操不假襲名於前代而讒者以此誣之可謂冤矣大學衍義賜舊名李正已反將斷江淮路德宗以張萬福為濠州刺史召見謂曰先帝改卿名正者所以褒卿也朕以為江淮草木亦知卿威名若從光帝所收恐賊不知是卿也復賜名萬福舊唐名子楊遺直為蘭陵簿四子發假收嚴皆登進士第收即大拜發已下皆至丞相發以春為義假以夏為義收以秋為義嚴以冬為義皆有文學登弟上巖龑南漢劉龑初名巖又更曰陟九年白龍見南宮三清殿改元白龍又更名龑以應龍見之祥有胡僧言讖書滅劉氏者龑也龑乃採周易飛龍在天之義為龑字音儼以名焉五代史齊聖汪台符飲人能屬文烈祖善之而宋齊邱疾其才高屢為詆訾台符由是不平齊邱始字超回台符貽書誚之曰聞足下齊大聖以為名超亞聖以稱字齊邱大慚改字子嵩因使親信誘台符乘舟痛飲推沉石城蚵蚾磯下南唐兩曾參曾子處費費人有與曾子同名族者而殺人人告曾子母曰曾參殺人曾子之母曰吾子不殺人織自若有頃焉人又曰曾參殺人其母尚織自若也頃之一人又告之曰曾參殺人其母懼投杼踰墻而走夫以曾參之賢與母之信也而三人疑之則慈母不能信也秦策秋胡杜陵秋胡者能通尚書善為古隸字為翟馳所禮欲以兄女妻之或曰秋胡已經娶而失禮妻遂溺死不可妻也馳答曰昔魯人秋胡娶妻三月而遊宦二年休還家其婦採桑於郊胡至郊而不識其妻也見而悅之乃遺黃家一鎰妻曰妾有夫遊宦不返幽閨獨處三年于茲未有被辱如今日也採不顧胡慚而退至家問家人妻何在曰行採桑於郊未返既還乃向所挑之婦也夫妻並慚妻赴沂水而死今之秋胡非昔之秋胡也西京雜記毛遂趙有兩毛遂野人毛遂墜井而死客以告平原君平原君曰嗟乎天喪豫矣既而知野人毛遂非平原君客也上公孫弘孟嘗君為從公孫弘請西觀秦王昭王聞之而欲醜之以辭弘言昭王不好士昭王笑而謝焉公孫弘可謂不侵矣呂不侵公孫侯年六十以賢良對策拜為慱士後代薛澤為丞相封平津侯漢書虞延欲辟幽州從事公孫弘以弘交通楚王英而止後書董仲舒下帷發憤潛心大業令後學者有所統後為郡儒首漢贊齊魚復侯子響武帝四子也為都督荊州刺史直閣將軍薰蠻粗有氣力上曰人名蠻復何容得蘊籍乃改名為仲舒謂曰今日仲舒何如昔日仲舒答曰昔日仲舒出自私庭今日仲舒降自天帝以此言之勝昔遠矣上稱善南史孔安國孔子十一世孫為漢武帝博士承詔作書傳又作古文孝經傳亦作論語訓解論語正義孔安國字安國孔愈子也以儒業顯孝武時甚蒙禮遇安帝時歷尚書左右僕射晉書張禹張禹字子文宣帝甘露中諸儒薦禹詔蕭望之問禹對易及論語大義望之善焉後代王沈為丞相封安昌侯漢書張禹字伯達性篤厚節儉和帝時為太傅安帝時以定策功封安鄉侯後漢張衡張衡字平子大將軍鄧騭奇其才崔瑗之稱曰數術窮天地制作侔造化上張陵入鵠鳴山自稱天師陵子衡為係師陏張衡殺文帝武后令史張衡官四品李膺李膺字元禮桓帝時朝廷日亂綱紀穨阤膺獨持風裁以聲名自高士有被其客接者名為登龍門後漢蜀士李膺字公胤為涪令有才辨西昌侯藻為益州以為主薄使至都武帝悅之謂曰今李膺何如昔李膺對曰今勝昔問其故對曰昔事桓靈之主今逢堯舜之君帝嘉其對乃以為益州別駕著益州記三卷南史張説劉瑀為益州張説代之瑀去任將佐逼制將還謂人曰隨我上豈可為張説作西門客耶宋書張説字道濟玄宗時為右丞相中書令開元後不以姓著者曰燕公云唐書張説之為丞旨也朝士多趨之王質景文沈瀛子壽始俱在學校有聲既而俱立朝物譽亦歸之相與言吾儕當以詣説為戒衆皆聞其説而壯之已而質潛往説所甫入客位而瀛已先在焉相視愕然明日喧傳清議鄙之久皆不安而去焉齊東野語李綱李綱字文紀少慷慨尚風節始名瑗慕張綱為人改焉仕周及陏入唐為太子少保帝以綱陏名臣手敕未嘗名唐書李綱字伯紀高宗時為相為黃潛善王伯彥所嫉張浚伯彥所幸進且潛善客也以所厚客宋齊愈劾綱以私意殺侍從之罪遂罷綱提舉洞霄宮宋史韓翊天寶末舉進士制誥闕人中書兩進名德宗批曰與韓翊時有與翊同姓名者為江淮刺史又具二人同進御筆復批曰春城無處不飛花寒食東風御斜斜日暮漢宮傳蠟燭青煙散入五侯家又批曰與此韓翊時建中初也本事詩時有翰林學士韋綬華陰令韋綬唐書李益李尚書益有宗人庶子同名俱出於姑臧公時人謂尚書為文章李益庶子為門戶李益而尚書亦兼門地焉嘗姻族間有禮會尚書歸笑謂家人曰大堪笑今日局席兩箇坐頭總是李益固話録漢初張良石虎右僕射張良梁王彭越苻堅平西北軍彭越武帝時將軍李廣北齊御史李廣益州刺史任安蜀秦宓薦儒士任安會稽太守朱買臣梁元時武昌太守朱買臣昭帝時衛尉王莽後王莽篡漢元成時丞相王商蜀志王商為嚴平立祠祠後漢儒林張玄吳張紘子玄晉張玄與謝安圍棋張綱埋輪慕容超尚書郎張綱降劉裕為攻具桓帝時司空張溫吳張溫使蜀冉閔車騎張溫靈帝時司空劉弘晉開府隋誠節俱有劉弘普壯侯張華慕容德黃門侍郎張華成公綏張華重其文慕容超太史令成公綏他不能盡載不諱周頌祀文武之樂歌雍曰克昌厥後噫嘻曰駿發爾私此廟中不諱也春秋僖公名申而書戊由定公名宋而書宋仲幾莊公名同而書同盟此臨文不諱也文王諱昌而箕子陳範回曰使羞其行而邦其昌厲王諱胡而宣王時詩曰胡不相畏胡為虺蝪周禮有昌本之姐詩有觱發之詠大誥弗棄基不諱后稷棄字孔子父叔梁紇而春秋書臧孫紇成王諱誦而吉甫作誦之句正在其時此詩書不諱也齊東野語同訓凡避諱者皆須得其同訓以代換之桓公名白傳有五皓之稱厲王名長琴有修短之目不聞謂布帛為布皓呼腎腸為腎修也家訓風操不偏諱夫子之母名徵在言在不稱徵言徵不稱在檀弓辟兵為狂莊子曰宋桓公行未出城門其前驅呼辟蒙人止之後為狂也司馬彪云呼辟使人避道蒙人以桓侯名辟而前驅呼辟故為狂也史宋世家注史桓侯名避兵正征正周正建子之正也始皇以正月旦生干趙因名為政後以始皇諱故音征正義史月表二世二年三年俱書端月不云正也又盧生云良士畏忌諱諛不敢端言其過又老子天得一以清地得一以寧侯王得一以為天下正已讀征音矣又禮緇衣昔吾有先正其言明且清前書敘傳其在于京奕世宗正子政慱學三世成名西漢諱景帝諱啓史記微子啓作微子開武帝諱徹以徹侯為通侯蒯徹為蒯通宣帝諱詢以荀卿為孫卿至唐楊倞改孫卿新書為荀卿子元帝諱奭以奭氏為盛氏漢司徒盛允梁國虞人也其先奭氏自漢中葉避孝元皇帝諱改姓曰盛水經注碑東漢諱明帝諱莊相襲謂莊為嚴莊光為嚴光莊君平為嚴君平後書君平博覽亡不通依老子嚴周之指著書十萬餘言殤帝諱隆以隆慮為林慮安帝父諱慶以慶氏為賀氏見姓氏杜度世徵名與姓音同者必稱杜度按杜恕篤論云杜伯度名操字伯度善草書曹魏時以其名同武帝故隱而舉字後人見其姓杜字伯度後又削去伯字呼為杜度明知度非名也資暇集吳諱吳黃龍三年嘉禾生于由拳改縣曰禾興後孫皓父名禾改曰嘉興地志晉諱司馬師諱師以師保為保傅以京師為京都司馬昭諱昭以昭穆為韶穆昭君為明君韋昭為韋曜晉帝諱業以建業為建康李涪云昭本如字為晉諱昭改音韶案説文昭明也韶樂也自有紹穆字以昭為紹蓋借音耳梁諱梁武小名阿練子孫皆呼練為絹乃謂銷鍊物為銷絹物恐乖其義或有諱雲者呼紛紜為紛煙有諱桐者呼梧桐樹為白鐵樹便似戲笑耳顏氏家訓隋諱隋帝諱忠凡郎中皆去中字侍中為侍內中書為內史中廬為次廬魏徵隋書凡忠字皆謂之誠謂死事之臣為誠節傳唐太宗詩疾風知徑草板蕩識誠臣隋煬帝諱廣以廣樂為長樂廣陵為江都唐諱唐高祖之祖諱虎以猛獸代之晉書易石虎以季龍北史易韓擒虎以韓擒赤虎儀同為赤彪南史梁紀作神龍仁獸闕陳紀九錫虎賁之士作武賁宣紀改作雲龍神獸門地志武林本名虎林唐因避諱改之也高祖父諱昞北史丙以景字代之如景子景午景成之類陸贄鐵券文貞元二年歲次景寅高祖諱淵淵字盡改為泉字龍淵為龍泉晉書劉淵為元海戴淵為戴若思北齊趙文淵為趙文深太宗諱世民凡言世皆曰代民皆曰人南史王規傳俊民作俊人柳宗元平淮夷雅曰命官分土則嵩高韓奕蒸人民部曰戶部太宗諱世民故令牒葉棄皆去世而從云漏泄縲紲皆去世而從曳世之與云形相近與曳聲相近者皆從云則泄為沄矣故又從云而變為曳也民則易而從氏昏愍泯之類至今猶或從氏也遊宦紀聞高宗諱治凡言治皆曰理章環云至理之主不代出陸贄曰與理同道罔不興脅從罔理韓文策問垂衣裳而理無為而理玄宗諱隆基太一神君基民基並改為其字隆州為閬中代宗諱豫以豫章為鐘陵以薯蕷為薯藥德宗諱適改括州為處州穆宗諱恆以恆山為常山宋諱太祖諱匡胤賣香印者呼鳴鑼仁宗諱禎呼蒸餅為吹餅青箱雜記大中祥符有神降自稱宋祖名玄朗詔中外不許斥犯宋朝事實朗山改為崔山高宗諱構避嫌名者仍其字更其音者勾濤是也加金字者鉤光祖是也加絲字者絇紡是也如草頭者苟諶是也改為句字者句思是也增勾龍者如淵是也句龍去上一字者大淵是也野語后諱呂后諱雉封禪書謂野雞夜雊晉簡文鄭后諱阿春以春秋為陽秋富春為富陽蘄春為蘄陽武后諱曌以詔書為制書鮑照為鮑昭中宗太子重照為重潤全鳳花中都習宮闈嫉語謂鳳兒花光宗后慈懿李氏之生鸑儀于黑珉名曰鳳娘逮正位坤極六宮避舊諱稱曰好兒女花四朝聞見録后家諱王元后父諱禁以禁中為省中武后父諱華以華州為太州野語國王諱趙辟石勒諱羅勒為蘭香馬勒為轡錢武肅王諱鏐劉家為金家留住為駐住上蘇州許墅本名虎疁唐氏諱虎錢氏諱鏐因改名吳地記楊行密據江淮至今滁人謂荇溪為菱溪以杏為甜梅揚州民呼蜜為蜂糖翰府名談梁朱溫父諱誠改城曰墻又改曰州如東都州南州北是也雲麓漫抄閩人避王審知諱沈氏去水為尤楊行密父名怤與夫同音改文散諸大夫為大卿御史大夫為御史大卿至有興唐寺鐘題志云金紫光祿大兼御史大及銀青光祿大皆直去夫字戊字與茂同音俗呼為務吳中術者及北人語多曰武舊五代薛史梁開平元年司天監上言日辰內戊字請改為武以戊類成字也家諱司馬遷以父諱談史趙世家以張孟談為孟同季布傳貴人趙談為趙同與任安書同子參乘爰絲變色王羲之祖諱正每書正月為初月或作一月餘則以政字代之范曄父名泰後漢書郭林宗為郭太鄭公業為鄭太李翱父名楚金故為丈皆以今為茲蘇子瞻祖名序故以序為敘或改作引字孔氏雜説范曄父諱泰後書以泰為太李翱父楚金云云事文類聚落曄父泰字及下句合璧抄之即以楚金為曄之父誤甚晉書羲之祖正野語以為父舊唐翱父楚金野語以為祖俱誤同官太元十三年召孔安國為侍中表以王瑜名犯私諱不得連署求解有司議云名終諱之有心所同聞名心瞿亦明前誥而禮復云君無所私諱大夫之所有公諱無私諱王祐名犯父諱聽許換曹蓋是恩出制外耳夫皇朝禮大百僚備職編官列署動相經涉若以私諱人遂其心則移官易職遷流莫已晉禮志晉陵晉東海王越世子名毗中宗為越所表遣渡江故改毗陵為晉陵輿地志改門始安貞王道生字孝伯太祖次兄也子鳳字景慈卒於宋世明帝贈始安靜王改華林鳳莊門為望賢門太極東堂盡鳳鳥題為神烏而改鸞烏為神雀齊書范諱殷淳子孚有父風嘗與侍中何勗共食孚羹盡勗云益殷蓴羹勗司空無忌子也孚徐輟筯曰何無忌諱南史被代王亮王攸之子為晉陵太守在職清公有美政時有晉陵令沈瓚之性粗疏好犯諱亮亮不堪遂啓代之瓚之怏怏乃造坐云下官以犯諱被代未知明府諱若為攸字當作酋傍安犬猶為犬傍安酋猷若有心悠無心攸乞告示亮不及履下床跣而走瓚之撫掌大笑而去南史今本及通志作無骹尊傍犬為犬傍無骹尊上哭諱梁世謝舉甚有聲譽聞諱必哭為世所譏又臧逢世臧嚴之子也篤學修行不墜門風孝元經牧江州遣往建昌督事郡縣民庶兢修箋書朝夕輻輳几案盈積書有稱嚴寒者必對之流涕不省取記多廢公事物情怨駭竟以不辦而還此並過事也顏氏家訓不為照字劉縚緩綏兄弟並為名器其父名昭一生不為照字唯依爾雅火傍作照耳然凡丈與正諱相犯當自可避其有同音異字不可悉然呂尚之兒如不為上趙一之子儻不作一便是下筆即妨是書皆觸也上寬雅宗如周以府僚隨蕭察至度支尚書嘗有人訴事於如周謂為經作如州官也乃曰某有屈滯故來訴如州官如周曰爾何小人敢呼我名其人慚謝曰祗言如周官作如州不知如周官名如周早知如周官名如周則不敢喚如周官作如州如周乃笑曰令卿自責見侮反深衆咸服其寬雅北史觸觸生熊安生字植之將通名見徐之才和士開二人相對以徐之才諱雄和士開諱安乃稱觸觸生群公哂之上鑱石韋皋為西川節度使沒蜀人德之見其遺像必拜凡刻石著皋名者皆鑱其文尊諱之新唐誤犯韓僕射皋為京兆尹時久旱祈雨縣官讀祝文一一心記公之家諱及稱官銜畢而誤呼先相公名公但憕然因命重讀亦不之罪在夏口嘗病小瘡令醫傳膏藥藥不濡公問之醫云天寒膏硬公笑曰韓皋實是硬竟不以為過是得大賢體矣因話録諱樂韋有翼尚書有重名平生不飲酒不務歡笑為家諱樂故也芝田録麻膏相公崔胤五拜相權傾天下險誦可畏其父慎由人改呼油為麻膏避其諱時號為麻膏相公諱石石昂節度使符習高其行召以為臨淄令習入朝京師監軍楊彥朗知留後事昂以公事至府上謁贊者以彥朗諱石更其姓曰右昂趨于庭仰責彥朗曰內侍奈何以私害公昂姓石非右也彥朗大怒拂衣起去昂即趨出解官還于家語其子曰吾本不欲仕亂世果為刑人所辱子孫其以我為戒五代史無寸道馮道之在中書也有舉子李導投贄所業馮相見之戲謂曰老夫名道秀才不可謂不知然亦名道於禮可乎李抗聲對曰相公是無寸底道字小子有寸底道字何謂不可公笑曰老夫不惟名無寸諸事亦無寸吾子可謂知人矣了無怒色五代史補道門客講道德首章有道可道非常道門客見道字是馮名乃曰不敢説可不敢説非常不敢説籍川笑林貫為千錢元瓘浙江人以一貫為一千猗覺寮準去十寇準當軸人遜其諱去十為準至今詩書承用之吹劍録漢曰兵士承平時有宗室名宗漢自惡人犯其名謂漢子曰兵士舉宮皆然其妻供羅漢其子授漢書宮中人曰今日夫人召僧供十八大阿羅兵士大保請宮教點兵士書都下門然傳以為笑老學菴筆記婢請罰薛肇明謹事蔡元長至戒家人避其名宣和末有朝士新買一婢頗熟事用會客命出侑焉忽一客語及京字婢遽請罰酒問其故曰犯太師諱一座駭愕婢具述先在薛太尉家每見與賓客會飲有犯京字者必舉罰平日家人誤犯必加叱詈太尉脫或自犯則自批其頰以示戒云間燕常談良臣為賊錢良臣自諱其名幼子頗慧凡經史中有良臣字輒改之一日讀孟子今之所謂良臣古之所謂民賊也遂改云今之所謂爹爹古之所謂民賊也殊為可笑稗史墨池皮掤朝奉郎王僧虔父名師古嘗自呼硯為墨池謂鼓謂皮掤人或誤犯輒以他事中之曾知嶺南一郡有李彥古者以進納得官過郡請謁遂題刺云永州司戶參軍李墨池皮掤謹祗侯參僧彥一見大喜示其子弟曰奉人當如此矣續墨客揮談二十為念吳主之女名二十而江南人呼二十為念而北人不為之避也兼明書加算黃帝曰凡人生一日天帝賜算三萬六千入賜紀二十聖人得三萬六千七百二十月人得三萬六千一紀主一歲聖人加七百二十河圖紀符五百載聖紀符考靈曜受圖四千五百六十歲精反初握命乙起河出圖聖鄭思鄭玄注曰聖謂堯也天握命人當起者河乃出圖堯帝堯舜而思之以受曆數也上德合天地哀公曰何謂聖人孔子曰所謂聖者合德於天地變通無方窮萬事之終始協庶品之自然敷其大道而遂成情性明並日月化行若神下民不知其德覩者不識其鄰此謂聖人也家語知通大道哀公曰敢問何如可謂聖人矣孔子對曰所謂聖人者知通乎大道應變而不窮能測萬物之情性者也故其事大配乎天地參乎日月雜乎雲雨揔要萬物穆穆純純其莫之能循若天之司莫之能職百姓淡然不知其善若此則可謂聖人矣大戴禮西方沈太宰見孔子曰邱聖者與答曰聖則邱何敢曰三王聖者與答曰三王善任智勇者聖則邱弗知曰五帝聖者與答曰五帝善在仁義者聖則邱弗知曰三皇聖者與答曰三皇善因時者聖則邱弗知沈曰然則孰者為聖孔子曰西方聖者不治而不亂不言而自信不化而自行蕩蕩乎民無能名焉列子不謀聖人不謀惡用知不斫惡用膠無喪惡用德不貨惡用沈四者天鬻也天鬻也者天食也既受食於天又惡用人有人之形無人之情莊子利器聖人者天下之利器也非所以明天下也上天行聖人之生也天行其死也物化靜而與陰同德動而與陽同波不為福先不為禍始感而後應迫而後動不得已而後起上道之管修百王之法若辨白黑應當時之變若數一二則可謂聖人矣聖人也者道之管也天下之道管是矣百王之道一是矣茍儒效聖人者道之極也資陰陽聖人之生必資於陰陽陰陽之理即聖人所盡但盡陰陽之理則玄照之本自見此謂不求于自知而理盡自然知者也五經鉤沉生知生而知之者上也問曰孰生而知之乎答曰聖人二儀既判懸象列暉八風有序四氣錯御覽日月而達陰陽之數消搖八節俯仰玄黃彌綸天地之體窮竟有生之機瞻天為師用醒已心故曰生知不亦審乎上民之父母聖人者民之父母也母能生之能養之父能教之能誨之聖王曲備之者也能生之能食之能教之能誨之也為之城郭以居之為之宮室以處之為之庠序之學以教誨之為之列地制畝以飲食之故書曰作民父母以為天下王此之謂也書大傳修本聖人內修其本而不外飾其末保其精神偃其智見故漠然無為而無不為也淡然無治而無不治也淮南貫物聖人內修其道術而不外飾仁義不知耳目之宜而遊乎精神之和若然者橫廓六合兼貫萬物此聖人之遊也上與道沉浮聖人將養其神和柔其氣平夷其形而與道沉浮俯仰恬然則縱之迫則用之其縱之也若委衣其用之也若發機如是則萬物之化無不偶百事之變無不應上若鏡聖人若鏡不將不迎應而不藏上待時夫聖人者不能生時時至而弗失也覽置事或不可前規物或不可慮卒然不戒而至故聖人畜道以待時説山聖人隨時而舉事因資而立功守清道抱雌節因循而應變常後而不先文子謀府聖人不為名尸不為謀府不為事任不為智主藏無形行無迹遊無朕不為福先不為禍始保于虛無動於不得已淮詮言足譽聖人不為可非之行不僧人之非已也修足譽之德不求人之譽已也不能使禍不至信已之不迎也不能使福必來信已之不攘也上衢尊聖人之道猶中衢而致尊耶過者斟酌多少不同各得其所宜上通分理聖人同死生愚人亦同死生聖人之同死生通于分理愚人之同死生不知利害所在説山抱天心聖人懷天氣抱天心執中含和不下廟堂而衍四海變習易俗民化而遷善若性諸已能以神化泰族九拂聖人見禍福於重閉之內而慮患於九拂之外者也上將養聖人之於百姓其猶赤子乎餒者食之寒者衣之將之養之育之長之唯恐其不至於大也説苑郛郭虐政虐世然後知聖人之為郛郭也楊吾子似水火聖人之言似於水火或問水火曰水測之而益深窮之而益遠火用之而彌明宿之而彌壯楊問道知之不用或問孔子之時諸侯有知其聖者與曰知之曰知之則曷為不用曰不能曰知聖而不能用也可得聞乎曰用之則宜從之從之則素其所習逆其所順強其所劣捐其所能衝衝如也非天下之至德孰能用之五百齊楚聖人張子侯曰楊子雲西道孔子也乃貧如此吾應曰子雲亦東道孔子也昔仲尼豈獨是魯孔子亦齊楚聖人也桓談新論聖神儒者論聖人以為前知千歲後知萬世有獨見之明獨聽之聰事來則名不學自知不問自曉故稱聖則神矣論衡知天上天之心在聖人之胸其譴告在聖人之口世無聖人不能知天上聲通聖者聲也通也言其聞聲知情通於天地調暢萬物風俗通無外無內聖人俱受乾坤之醇靈稟造化之和氣該百行之高善備九德之淑懿極鴻源之深閭窮品物之情類曠蕩出於無外沉微淪於無內孔融聖人優劣論稟於天聖人所稟於四時也所稟於元氣也高不可極深不可測窮神知化獨見先識仁若春陽信若影響此所以稟於天也姚信士緯生神州神州何以專生聖人聖人曾不産於絶域乎推此論之明神州者處乾之正鍾日月之精地形愷爽源流清暢其生民也長短應數儀狀端正聲音得節性理調良上如天地聖人之道如天地諸子之異如四時四時相反天地合而通焉傳子握杼聖人蹈機握杼織成天地使萬物順焉人倫正焉上體道夫體道者聖遊神者哲體道然後寄意形骸之外遊神然後窮變化之端故寂然不動而萬物為我用塊然玄默而衆機為我運華談新論承照天者為萬物之根本冥然而不言百姓生而不有其功萬物成而不疲其勞聖者承天之照用天之業聖宣其道者也殷仲堪天聖論兼應夫道以至虛順通聖人以忘懷兼應祖台之道論知要聖人明君者非盡能其萬物也知萬物之要也故其治國也察要而已矣啇子農戰聖人非能通知萬物之要也故其治國舉要以致萬物故寡教而多功上賞刑制民聖人見本然之政知必然之理故其制民也如以高下制水如以燥濕制火畫策知河海識山石西南大荒中人身長十丈其腹圍九丈踐龜蛇戴朱鳥左手馮青龍右手憑白虎知河海斗斛識山石多少知天下鳥獸言語識土上人所道知百穀可食識草木鹹苦名曰聖俗曰聖人一曰哲俗曰睿哲一曰先俗曰知先一曰通俗曰通達一曰無不達凡人見拜令神人智此人天下神聖也神異經道足以化哀公曰何謂賢人孔子曰所謂賢人者德不踰間行中規繩言足以法於天下而不傷於身道足以化於百姓而不傷於本富則天下無宛財施則天下不病貧此則賢者也家語好惡與民同情取舍與民同統大戴三常凡治國有三常曰一君以舉賢為常二曰官以任賢為常三曰士以敬賢為常夫然雖百代可知也周書陰符不治國之所以不治者三不知用賢此其一也或求賢不能得此其二也雖得弗能盡此其三也文子審情賢人君子者通乎盛衰之時明乎成敗之端察乎治亂之紀審乎人情知所去就故雖窮不處亡國之勢雖貧不受汙君之祿説苑非禮不進古之賢人賤為布衣貧為匹夫然而非禮不進非義不受孫卿子至德為心夫賢人者至德以為已心行道以為己任處則不求私名仕則不求私寵不為其身不阿其君積禮義於朝播仁風於民使天下之人翼翼焉向戴其君之尊欣欣歌舞其君之德任子達賢傷賢者殃及三世蔽賢者身當其害達賢者福流子孫嫉賢者其名不令黃石公三略為杖聖人居高處上則以仁義為巢乘危履傾則以聖賢為杖陸賈新語託賢夫朝無賢人猶鴻鵠之無羽翼是故絶江海者託於船致遠道者託於乘欲伯王者託於賢説苑求賢自輔明君在上慎於擇士務於求賢設四佐以自輔有英俊以治官上國器夫賢者國家之器用也君人者勤於求賢而逸於得人故聖主必得賢臣而弘功業俊士亦候明主以顯其德十載一會説論無疑翼乎如鴻毛之遇順風沛乎若巨魚之縱大壑其意如此則胡禁不止曷令不行王褒聖主得賢臣頌比肩在金石曰堅在草木曰緊在人曰賢千里一賢謂之比肩故語曰黃金纍千不如一賢物理論得賢身定國安天下治必賢人得賢人國無不安名無不榮失賢人國無不危名無不辱先王之索賢人無不以也呂覽積賢氣之精者為神人之清者為賢治身者以積精為寶治國者以積賢為道夫欲致精者必虛靜其形欲致賢者必卑謙其身形靜志虛者氣精之所趣也謙尊自卑者仁賢之所事也能致精則合明而壽能致賢則德澤洽而國太平春秋繁露折衝山有猛獸林木為之不斬野有螫蟲葵藿為之不採國有賢人折衝千里文子賢代以賢代賢謂之順以不肖代不肖謂之亂桓談新論大務南面之大務莫急於知賢潛夫論舉賢文王曰君務舉賢不獲其功何也太公曰舉不容易文王曰舉賢若何太公曰案賢察名選才考能則得之也六韜禮賢周公旦曰吾不如者吾不與處纍我者也與我齊者吾不與處無益我者也惟賢者必與賢於已者處賢者之可得與處也禮之也呂觀世恐失伯禽就封於魯周公戒伯禽曰我文王之子武王之弟成王之叔父我於天下亦不賤矣然我一沐三握髮一飯三起以待士猶恐失天下之賢人子之魯慎無以國驕人史記分職召公賢者也明不能與聖人分職常戰栗恐懼故舍於樹下而聽斷焉勞身苦體然後乃與聖人齊是周南無美而召南有之樂動聲儀未遇百里奚之未遇時也亡虢而虜晉飯牛於秦鬻以五羊之皮公孫枝得而悅之獻諸繆公三日請屬事焉繆公曰買之五羊之皮而屬事焉無乃天下笑乎公孫枝對曰信賢而任之君之明也讓賢而下之臣之忠也君為明君臣為忠臣彼信賢境內將服敵國且畏夫誰暇笑哉繆公遂用之謀無不當舉必有功呂慎大賢大夫衛靈公與夫人夜坐聞車聲轔轔至闕而止過闕復有聲公問夫人曰知此謂誰夫人曰此必遽伯玉也公曰何以知之妾聞禮下公門式路馬所以廣敬也夫忠臣與孝子不為昭昭伸節不為冥冥墮行今伯玉衛國賢大夫也仁而有智敬於事上此其人必不以暗昧廢禮是以知之公使人視之果伯玉也反戲之曰非也夫人進觴再拜賀之公曰子何以賀寡人夫人曰始妾謂衛獨有伯玉耳今衛復有與之齊者是君有二賢臣也國多賢臣則國之福也妾是以賀公驚曰善哉遂語夫人其實焉列女傳舉士晉平公問叔向曰吾群臣孰賢對曰趙武賢武之立如不勝未言如不出口然其所舉士者數十人皆令得其意而公家甚賴之况武子之生也不利其家死不託其孤臣敢以為賢韓子佐多賢趙簡子將襲衛使史默往賭之期以一月六月而後反趙簡子曰何其久也史默曰謀利而得害猶弗察也今遽伯玉為相史鰌佐焉孔子為客子貢使令於君前甚聽易曰渙其群元吉渙者賢也群者衆也元者吉之始也渙其群元吉者其佐多賢也趙簡子按兵而不動呂召類養賢獵吾趙簡子獵於晉山之陽撫膺而嘆董安于曰敢問何嘆簡子曰吾有食穀之馬數千多力之士數百欲以獵獸也吾恐鄰國養賢以獵吾也王孫子百福之宗孔子謂宓子賤曰子治單父衆悅子何施而得之也對曰此地民有賢於不齊者五人不齊事之而稟度焉皆教不齊以治道孔子嘆曰昔堯舜治天下務求賢以自輔夫賢人百福之宗神明之主也惜乎不齊之所治小也家語推衣昔思革子成文子三人相與為友聞楚成王好士三子相與俱往見之於豪嶔巖之間卒遇飄風暴雨俱伏於空柳之下衣寒糧乏度不俱活三人相視歎曰與其俱死也豈若併衣糧於一人哉二子以革為賢推衣讓之琴操魯人有公儀休潛者砥節勵行樂道好古恬於榮利不事諸侯子思與之友穆公因子思欲以為相謂子思曰公儀子必輔寡人參分魯國而與之一子其言之子思對曰如君之言則公儀子愈所以不至也君若飢渴待賢納用其謀雖蔬食水飲伋亦願在下風今徒以高官厚祿鉤餌君子無信用之意公儀子之智若魚鳥可也不然則彼將終身不躡乎君之庭矣且臣不佞又不任為君操竽下鉤以傷守節之士也孔叢子達賢子思自齊反衛衛君館而問曰先生魯國之士然不以衛之褊小猶步玉趾而慰存之願有賜於寡人也子思曰臣羈旅於此而辱君之威尊亟臨蓽門其榮多矣欲報君以財幣則君之府藏已盈而伋又貧欲報君以善言恐未合君志而徒言不聽也顧未有可以報君者唯達賢耳衛君曰賢則固寡人之所願也上誠用史台謂申向曰吾所患者不知賢申向曰人之患不在乎不言用賢而在乎不誠用賢夫言用賢者口也却賢者行也言行相反而欲賢者用不肖者廢不亦難乎人主誠用賢則境內賢者出矣不賢者至矣呂覽寡賢尹文子見齊宣王王嘆國寡賢尹文子曰使國悉賢孰處王下王曰國悉不肖可乎尹文子曰國悉不肖孰理王朝王曰賢與不肖皆不可也尹文子曰不然有不肖故王尊於上臣卑於下進賢退不肖所以有上下也尹文子六翮桓文漢高鼓群賢以為六翮託豪傑以為舟楫抱朴國紀賢者國之紀人之望自古帝王皆以之安危故書曰惟后非賢不乂惟賢非后不食昔者周公體大聖之德而勤於吐握由是天下之士爭歸之向使周公驕而且吝士亦當高翔遠去所至寡矣語林處世賢者之處世猶金玉生於沙礫豫章産乎幽谷下不進之於上則無由而至也鍾子芻蕘論君子夫君子也者其賢宜君國而德宜子民也宜處此位者唯仁義人故有仁義者謂之君子潛夫論英雄夫草之精秀者為英獸之特群者為雄故人之文武代異取名於此是故聰明秀出謂之英膽力過人謂之雄英以其聰謀始以其明見機待雄之膽行之雄以其力服衆以其勇排難待英之智成之然後乃能各濟其所長也聰能謀始明以見機膽能決之然後可以為英張良是也氣力過人勇能行之智足斷事乃可以為雄韓信是也故英可以為相雄可以為將若一人之身兼有英雄則能長世高祖項羽是也然英之分以多於雄而英不可以少也人物志人物雅俗或問人物曰察虛實審真偽斷成敗定終始斯可謂之人物矣或問雅俗曰判風流正位分涇渭殊流雅鄭異調題帖分明標榜可觀斯謂之雅俗矣孫綽子五品賢有五品謹敕於家事順悌於倫黨鄉里之士也作健曉惠文史無害縣廷之士也信誡篤行廉平公理下務上者州郡之士也通經術名行高能達於從政寬和有固守者公輔之士也才高卓絶疏殊於衆多籌大略能圖世健功者天下之士也桓談新論茂選五人曰茂十人曰選百人曰俊千人曰英倍英曰賢萬人曰傑萬傑曰聖白虎通英俊智過萬人者謂之英千人者謂之俊百人者謂之豪十人者謂之傑明於天道察於地理通於人情大足以容衆德足以懷遠信足以一異知足以知變者人之英也德足以教化行足以隱義仁足以得衆明足以照下者人之俊也行足以為儀表知足以決嫌疑廉可以分財信可以守約作事可法出言可道者人之豪也守職而不廢處義而不比見難不茍免見利不茍得者人之傑也淮泰族百人者謂之傑十人者謂之豪文子二十五人中黃子曰天有五方地有五行聲有五音物有五味色有五章人有五位故天地之間有二十五人也上五有神人真人道人至人聖人次五有德人賢人智人善人辨人中五有公人忠人信人義人禮人次五有士人工人虞人農人沈人下五有衆人奴人愚人肉人小人上五之與下五猶人之與牛馬也聖人者以目視以耳聽以口言以足行真人者不視而明不聽而聰不行而從不言而公故聖人所以動天下者真人未嘗過焉賢人所以矯世俗者聖人未嘗觀焉文子微明行品擬玄黃之覆載揚明並以表微文彪昺而備體澄獨見以入神者聖人也稟高亮之純粹抗峻標以邈俗虛靈機以如愚不二過而諂黷者賢人也居寂寞之無為蹈修直而執平者道人也盡蒸嘗於存亡保髮膚以揚明者孝人也垂惻隱於有生恆恕己以接物者仁人也端身命以徇國經嶮難而一節者忠人也覿微理於難覺料倚伏於將來者明人也量理亂以卷舒審去就以保身者智人也順通塞而一情任性命而不滯者達人也不枉尺以直尋不降辱以茍命者雅人也據體度以動靜每清詳而無悔者重人也體冰霜之粹素不染潔於勢利者清人也篤始終於寒暑雖危亡而不猜者義人也守一言於久要歷歲衰而不渝者信人也摛鋭藻以立言辭炳蔚而清允者文人也奮果毅之壯列騁干戈以靜難者武人也甄墳索之淵奧該前言以窮理者儒人也鋭乃心於精義吝寸陰以進德者益人也識多藏之厚亡臨祿利而如遺者廉人也不改操於得失不傾志於可欲者貞人也恤急難而忘勞以憂人為已任者篤人也潔皎分以守終不遜厚而茍免者節人也飛清機之英麗言約暢而判滯者辨人也每居卑而推功雖處上而滋恭者謙人也崇惇睦於九族必居正以赴理者順人也臨凝結而能斷操繩墨而無私者幹人也拔朱紫於中搆剖猶豫以允當者理人也步七曜之盈縮推興亡之道度者術人也赴白刃而忘生格兕虎於林谷者勇人也整威容以肅衆伏法度而無二者嚴人也創機功以濟用總音數而並精者藝人也凌強禦而無憚雖嶮逼而不沮者黠人也執匪懈於夙夜忘勞瘁於深峻者勤人也蒙謗讟而晏如不懾懼於可畏者徑人也聞榮譽而不歡遭憂難而不變者審人也知事可而必行不猶豫於群疑者果人也循繩墨以進止不乾沒於僥幸者謹人也奉禮度以戰兢及親踈而無尤者良人也履道素而無欲時雖移而不變者朴人也凡此諸行了無一然而不躋善人之迹者下人也不致養於所生損道而危身者悖人也懷邪偽以偷榮豫利己而忘生者逆人也背仁義之正途茍危人以自安者凶人也好爭奪而無厭專醜正而害直者惡人也出繩墨以傷刻心好殺而安忍者虐人也飭邪説以浸潤構謗纍於忠貞者讒人也雖言巧而行違實履濁而假清者佞人也不原本於枉直茍尚勝而肆怒者暴人也措細善以取信陰挾毒而無親者姦人也承風指以茍容揆主意而扶非者諂人也言不計於反覆好輕諾而無實者虛人也覩利地而亡義棄廉耻以茍得者貪人也覿艷逸而心蕩飭誇綺而思邪者淫人也見成事而疑惑動失計而多悔者暗人也背訓典而自任耻請問於勝已者損人也知善事而不逮雖多為而無成者劣人也委德行而不修奉權勢以取媚者弊人也履蹊徑以僥速推貨賄以爭津者邪人也既傲佷以無禮好凌辱乎勝已者悍人也遇抑枉而自誣事無若而振懾者怯人也治細辨於稠衆非其人而盡言者淺人也暗事宜之可否雖企慕而不及者頑人也知事非而不改聞良規而增劇者惑人也無濟恤之仁心輕告絶於親舊者薄人也既疾真所不逮喜他人之有災者妬人也專財穀而輕義觀困匱而不振者吝人也冒至危以僥幸值禍敗而不悔者愚人也情局碎而偏黨志唯務於盈利者小人也騁鷹犬於原獸好博戲而無己者迷人也忘等威之異數快飭玩之誇麗者奢人也耽聲色於飲謙廢慶弔於人理者荒人也既無心於修尚又怠惰於家業者懶人也無抑斷之威儀每脫易而不思者輕人也觀道義而如醉聞貨殖而波擾者穢人也杖淺短而多謬暗趨舍之臧否者笨人也憎賢者而不貴聞高言而如聾者嚚人也覩朱紫而不分雖提耳而不悟者蔽人也違道義以趑趄冒禮刑而罔顧者亂人也每動作而受嗤言發口而違理者拙人也事酋豪如僕虜值衰微而背惠者慝人也損貧賤之故舊輕人士而踞傲者驕人也棄衰色而廣欲非宦學而遠遊者蕩人也無忠信之純固背恩養而趨利者叛人也當交顏而面從至析離而背毀者偽人也習強梁而專已距忠告而不納者刺人也抱朴行品五儀孔子曰人有五儀有庸人有士人有君子有賢人有聖人審此五者則治道畢矣哀公曰敢問孔子曰所謂庸人者心不存慎終之規口不吐訓格之言不擇賢以託其身不力行以自定見小暗大而不知所務從物如流不知其所執此則庸人也心有所定計有所守雖不能盡道術之本必有率也雖不能備百善之美必有處也是故知不務多必審其所知言不務多必審其所謂行不務多必審其所由智既知之言既道之行既由之則若性命之形骸之不可易也富貴不足以益貧賤不足以損此則士人也言必忠信而心不怨仁義在身而色不伐思慮通明而辭不專篤行信道自強不息油然若將可越而終不可及者此則君子也家語行中規繩而不傷於本言足法於天下而不傷於身富有天下而無怨財布施天下而不病貧如此則可謂賢人矣知通乎大道應變而不窮辨乎萬物之情性者也大道者所以變化遂成萬物也情性者所以理然不取舍也是故其事大辨乎天地明察乎日月總要萬物於風雨繆繆肫肫其事不可循若天之嗣其事不可識百姓淺然不識其鄰若此則可謂大聖矣荀子高行忠者臣下之高行管子三忠忠之道有三有大忠者有次忠者有下忠者以道覆君而化之是謂大忠也以德調君而輔之是謂次忠也以是諫非而怨之是謂下忠也若周公之於成王可謂大忠也管仲之於桓公可謂次忠也子胥之於夫差可謂下忠也韓詩外傳忠臣卑身賤體夙興夜寐進賢不解數稱於往古之德行事以厲主意庶幾有益以安國家社稷宗廟如此者忠臣也説苑逆命利居鴟夷子皮對陳成子曰從命利君為之順從命病君為之諛逆命利君謂之忠逆命病君謂之亂上純臣衛州吁弒桓公石厚從州吁如陳石碏使告于陳曰衛國褊小老夫耄矣無能為也此二人者實録寡君敢即圖之陳人執之而請涖于衛君子曰石碏純臣也惡州吁而厚與焉大義滅親其是之謂乎左隱四碎首宋萬弒閔公絶其脰仇牧聞君弒趨而至遇之于門手劍而叱之萬臂摋仇牧碎其首齒著乎門闔仇牧可謂不畏強禦矣公羊莊十二納肝衛懿公有臣曰弘演有所於使翟人攻衛其民曰君之所豫位祿者鶴也所貴富者宮人也君使宮人與鶴戰余焉能戰遂潰而去翟人至及懿公於榮澤殺之盡食其肉獨捨其肝弘演至報使於肝畢呼天而啼盡哀而止曰臣請為襮因自殺先出其腹實録懿公之肝桓公聞之曰衛之忘也以為無道也今有臣若此不可不存於是復立衛於楚丘弘演可謂忠矣殺身出生以徇其君非徒徇其君也又令衛之宗廟復立祭祀不絶可謂有功矣呂覽自刖鬻拳強諫楚子楚子弗從臨之以兵懼而從之鬻拳曰吾懼君以兵罪莫大焉遂自刖也楚人以為大閽謂之大伯使其後掌之君子曰鬻拳可謂愛君矣諫以自納於刑刑猶不忘納君於善莊十九忠貞獻公使荀息傳奚齊公疾召之曰以是藐諸孤辱在大夫其若之何稽首而對曰臣竭其股肱之力加之以忠貞其濟君之靈也不濟則以死繼之公曰何謂忠貞對曰公家之利知無不為忠也送往事居耦俱無猜貞也僖九古制晉惠公卒懷公立命無從亡人期期而不至無赦狐突之子毛及偃從重耳在秦弗召冬懷公執狐突曰子來則免對曰子之能仕父教之忠古之制也策名委質二乃辟也今臣之子名在重耳有年數矣若又召之教之二也父教之二何以事君上二十三忠於公室晉人執季文子於苕丘范文子謂欒武子曰季孫於魯相二君矣妾不衣帛馬不食粟可不謂忠乎成十六季文子卒大夫入斂公在位宰庀家器為葬備無衣帛之妾無食粟之馬無藏金玉無重器備君子是以知季文子之忠於公室也相三君矣而無私積可不謂忠乎襄五季文子相宣成無衣帛之妾無食粟之馬仲孫它諫曰子為魯上卿相二君矣妾不衣帛馬不食粟人其以子為愛且不華國乎文子曰吾亦願之然吾觀國人其父兄之食粗而衣惡者猶多矣吾是以不敢人之父兄食粗衣惡而我美妾與馬無乃非相人者乎且吾聞以德榮為國華不聞以妾與馬文子以古孟獻子獻子囚之七日自是子服之妾衣不過七升之布馬餼不過稂莠文子聞之曰過而能改者民之上也使為上大夫國語民望楚子囊還自伐吳卒將死遺言謂子庚必城郢君子謂子囊忠君薨不忘增其名將死不忘衛社稷可不謂忠乎忠民之望也襄十四贖國丈公誅觀狀以伐鄭鄭人以名寶行成公弗許曰豫我詹鄭卿叔詹伯詹請往鄭伯弗許詹固請曰一臣可以赦百姓而定社稷君何愛於臣也鄭人以詹豫晉人晉人將殺之詹曰臣願獲盡辭而死固所願也公聽其辭詹曰天降鄭禍使淫觀狀棄禮違親臣曰不可夫晉公子賢明其左右皆卿才若復其國而得志於諸侯禍無赦矣今禍及矣尊明勝患知也殺身贖國忠也乃就亨據鼎耳而疾號曰自今以往知忠以事君者與詹同乃命弗殺厚為之禮而歸之國語利衛宋為盟故代陳衛人救之孔達曰先君有約言焉若大國討我則死之宣十二晉以衛之救陳也討焉使人弗去曰罪無所歸將加而師孔達曰茍利社稷請以我説罪我之由我則為政而亢大國之討將以誰任我則死之十三孔達縊而死衛人以説于晉而免十四土臣中行伯既克鼓以鼓子宛支來令鼓人各復其所非寮勿從鼓子之臣曰夙沙釐以其孥行軍吏執之辭曰我君是事非事土也名曰君臣豈曰土臣今君實遷臣何賴於鼓穆子召之曰鼓有君矣爾止是君吾定而祿爵對曰臣委質於翟之鼓未委質於晉之鼓也臣聞之委質為臣無有二心委質而策死古之法也君有烈名臣無畔質敢即私利以煩司寇而亂舊法其若不虞何穆子嘆而謂其左右曰吾何德之務而有是臣也乃使行既獻言於頃公與鼓子田於河陰使夙沙釐相之國語易位鞍之戰晉韓厥逐齊侯逢丑父與公易位使公下如華泉取飲鄭周父御佐車宛茷為右載齊侯以免韓厥獻丑父郤獻子將戮之呼曰自今無有代其君任患者有一於此將為戮乎郤子曰人不難以死免其君我戮之不祥赦之以勸事君者乃免之齊侯免求丑父三入三出成二斷脰決腹昔者吳與楚戰於柏舉兩軍之間夫卒交莫敖大心撫其御之手顧而太息曰嗟乎子乎楚國忘之日至矣吾將深入吳軍若朴一人若捽一人以與大心者也社稷其庶幾乎故斷脰決腹一瞑而萬世不視不知所益以憂社稷者莫敖大心是也戰國策勞身愁思昔吳與楚戰於柏舉三戰入郢寡君身出一夫悉屬百姓離散棼冒勃蘇曰吾被堅執鋭赴強敵而死此猶一卒也不若奔諸侯於是贏糧潛行上崢山踰深蹊跖穿膝暴七日而薄秦王之朝雀立不轉晝吟宵哭七日不得告水漿無入口而殫悶旄不知人秦王聞而走之冠帶不相及左奉其首右濡其口勃蘇乃蘇於是秦出師救楚退吳師復楚故勞其身愁其思以憂社稷者棼冒勃蘇是也上吳師既退昭王復國而賞始於申包胥包胥曰輔君安國非為身也救急除害非為名也功成而受賞是賣勇也君既定又何求焉遂逃賞終身不見君子曰申子之不受命赴秦忠矣七日七夜不絶聲厚矣不受賞不代矣然賞所以勸善也辭賞亦非常法也新序死事楚有士申鳴者在家而養其父孝聞於楚國王欲授之相申鳴辭不受其父曰王欲相汝汝何不受乎申鳴對曰舍父之孝子而為王之忠臣何也其父曰使有祿於國立義於庭汝樂吾無憂矣吾欲汝之相也申鳴曰諾遂入朝楚王因授之相居三年白公為亂殺司馬子期申鳴將往死之父止之曰棄父而死其可乎申鳴曰聞夫仕者身歸於君而祿歸於親今既去子事君得無死其難乎遂辭而往因以兵圍之白公謂石乞曰申鳴者天下之勇士也今以兵圍我吾為之奈何石乞曰申鳴者天下之孝子也往劫其父以兵申鳴聞之必來因與之語白公曰善則往取其父持之以兵告申鳴曰子與吾吾與子分楚國子不與吾子父則死矣申鳴流涕而應之曰始吾父之孝子也今吾君之忠臣也吾聞之也食其食者死其事受其祿者畢其能今吾已不得為父之孝子矣乃君之忠臣也吾何得以全身援桴鼓之遂殺白公其父亦死王賞之金百斤申鳴曰食君之食避君之難非忠臣也定君之國殺臣之父非孝子也名不可兩立行不可兩全也如是而生何面目立於天下遂自殺也説苑斷臂崔杼殺莊公申蒯侍漁者退謂其宰曰爾以帑免我將死其宰曰免是反子之義也與之皆死襄二十五崔杼弒莊公申蒯漁於海將入死之其御止之曰君無道聞於天下不可死也申蒯曰安得食亂君之祿而死治君之事乎申蒯至門曰請入吊門者以告崔杼杼令勿內申蒯曰汝疑我乎吾與汝臂乃斷左臂以與門者與示崔杼杼陳八列令其入申蒯投劍呼天鬥殺七列未及崔子一列而死新序死義崔杼弒莊公也有陳不占者聞君難將赴之比去餐則失匕上車失軾御者曰怯如是去有益乎不占曰死君義也無勇私也不以私害公遂往聞戰鬥之聲恐駭而死人曰不占可謂仁者之勇也上納善齊侯問於晏子曰忠臣之事其君何若對曰有難不死出亡不送君曰裂地而封之疏爵而貴之吾有難不死出亡不送可謂忠乎對曰言而見用終身無難臣何死焉謀而見從終身不亡臣何送焉若言不見用有難而死之是忘死也諫而不見從出亡而送是詐為也故忠臣者能納善於君而不能與君陷難者也説苑不從劫陳恆弒君使勇士六人劫子淵棲子淵棲曰子之欲與我以我為知乎臣弒君非知也以我為仁乎見利而背君非仁也以我為勇乎劫我以兵懼而與子非勇也使吾無此三者與何補於子若吾有此三者終不從子矣乃舍之新序不事二君燕昭王使樂毅伐齊閔王亡燕之初入齊也聞蓋史作盡邑人王歜史作蠋賢使人謂歜曰齊人多高子之義吾以子為將封子萬家歜固謝燕人燕人曰子不聽吾引三軍而屠蓋邑王歜曰忠臣不事二君貞女不更二夫齊王不聽吾諫故退而耕於野國既破亡吾不能存今又劫之以兵為君將是助桀為暴也與其生而無義固不如死遂懸其軀於樹枝自奮絶脰而死齊亡大夫聞之曰王歜布衣義猶不背齊向燕况在位食祿者乎乃相聚如莒求諸公子立為襄王説苑路中大夫景帝時荊楚七國及齊孝王狐疑膠西濟北二國圍齊齊使路中大夫於天子還報曰堅守比至二國圍齊數重無從入二國與路中大夫盟曰若反言漢已破大夫許之至城下望見齊王曰漢已發兵百萬使太尉周亞夫擎破荊楚方引兵救齊齊必堅守二國誅之漢雜事詐忠胸奴求和親群臣議上前博士狄山曰和親便上問張湯湯曰此愚儒無知狄山曰臣固愚忠若御史大夫湯乃詐忠漢書疾風徑草光武為大司馬以王霸為功曹令史從度河北賓客隨者數十人稍稍引去上謂霸曰穎川從我者皆逝而子獨留始驗疾風知徑草東觀漢記庾登子仲遠為宋明帝府尉廢帝景和中明帝疑防賓客故人無到門者惟仲遠朝謁不替明帝即位曰卿可謂疾風知徑草南史太宗曰武德六年已後太上皇有廢立議我當此日不為兄弟所容實有功高不賞之懼蕭瑀不可以厚利誘之不可以刑戮懼之真社稷臣也因賜詩曰疾風知徑草版蕩識誠臣舊唐李絳論古今以宦官統師等事憲宗怒絳謝帝動容曰卿告朕以人所難言疾風知徑草卿當之矣本傳禮義之主鮑永字君長到京兆灞陵過更始冢引車入陌欲下從事諫止之永曰親北面事人何忍車過其墓雖以獲罪司隸不辭也遂下車哭盡哀而至西至右扶風推牛上茍諫冢上聞之問公卿曰奉使如此何如時太中大夫張堪對曰仁者百行之宗忠者禮義之主也仁不遺舊忠不忘君行之高者也上悅之東觀漢記忠臣子鮑昱字文淵拜司隸校尉詔昱詣尚書使封胡降檄上遣小黃門問昱有所怪不對曰臣聞故事通官不著姓又當司徒露布怪使司隸下書而著姓也帝報曰吾欲令天下知忠臣之子復為司隸也上奕世忠義傳彤先生退軍斷后拒戰兵人死盡吳將語彤令降彤罵曰吳狗何有漢將軍降者遂戰死子僉后為關中都督景曜中見危授命論者嘉其父子奕世忠義晉武帝詔曰蜀將軍傳僉前在關城身拒官軍致死不顧父彤復為劉備戰亡天下之善一也豈由彼此以為異蜀志注有之易雄長沙瀏陽人為舂陵令聞王敦作逆譙王承檄至雄馳檄遠近列敦罪惡俄而王師敗績敦得肆暴收雄姑熟以檄示焉雄曰有之惜雄位微力弱不能救國難安以生為今日即戮得為忠鬼乃其願也晉中興書敦憚其辭正釋之衆人皆賀雄笑曰昨夜夢乘車挂肉其傍夫肉必有筯筯者斤也車傍有斤吾其戮乎尋而敦遣殺之當時見者莫不傷惋晉書飲鴆張禕者吳郡人恭帝為琅邪王以禕為郎中令及帝踐祚劉裕以禕帝之故吏素所親信封藥酒一罌付禕密令鴆帝禕歎曰鴆君而求生阿面目視息人間哉不如死也自飲之死晉書烈士于簡字什門代人也太宗時為謁者使喻馮跋及至和龍住外舍不入使人謂跋曰大魏皇帝有詔須馮主出受然後敢入跋使人牽逼令入見跋不拜跋令人按其項什問曰馮主拜受詔吾自以賓主致敬何須苦見逼也與跋往復聲色俱厲然終不撓屈既而跋止什門什門於群衆之中回身背跋被袴后襠以辱之既見拘留隨身衣裳敗壞略盡蟣虱被體跋遺以衣服什門拒而不受和龍人聞嘆曰雖古烈士無以過也歷二十四年後馮文通上表稱臣乃送什門歸拜治書侍御史世祖下詔曰什門奉使和龍值狂豎肆虐勇志壯厲不為屈節雖昔蘇武何以加之賜羊千口帛千匹進為上大夫策告宗廟頒示天下咸使聞也魏書賜骨齊平東雍州刺史傳伏堅守不降帝遣韋孝寬將伏子世寬來招伏曰并州已平故遣公兒來報今授上大將軍武鄉郡公以金馬腦二酒鍾為信公宜急下伏不受謂孝寬曰事君有死無二此兒為臣不忠為子不孝願即斬以示天下帝又遣高阿郍肱等百餘人臨汾召伏伏出軍隔水相見聞齊主入關哀號良久乃降帝見之曰何不早下伏流涕而對曰臣三代被任革命不能自死羞見天地帝執其手曰為臣當若此朕平齊國唯見公一人乃自食一羊肋以骨賜伏曰骨親肉踈所以相付上儀同也三國典略排闉陳霸先謀篡使中書舍人劉師知引沈恪勒兵入宮衛送梁敬帝如別宮恪排闥入見霸先叩頭謝曰恪身經事蕭家來今日不忍見此事分受死耳決不奉命霸先嘉其意不復逼更以蕩主王僧志代之兄弟忠節武后時許欽寂與契丹戰於崇州軍敗被擒虜將圍安東令欽寂謂其屬城未下者安東都護裴玄圭在城中欽寂謂曰狂賊天殃滅在旦夕公但勵兵謹守以全忠節虜殺之弟欽明為涼州都督戰敗為突厥所執將至靈州令説城中早降欽明大呼曰賊中都無飲食城內有美醬乞二升梁米乞二升墨乞一鋌是時賊營處四面阻泥河惟有一路得入欽明乞此物以喻城中冀其簡兵陳將候夜掩襲城中無喻其旨者尋遇害兄弟同年皆死王事論者稱之舊唐不忘君親唐明宗召蜀中舊臣賦蜀主降巨唐詩王偕等譏荒淫獨中丞牛希濟曰唐主再懸新日月蜀王難保舊山川明宗曰希濟不忘君親忠孝也賜綵百假藝苑雌黃石敢後唐應順末少帝失位自洛涉河與數百騎欲奔鄴時晉高祖改鎮常山亦自郡詣闕夜與帝遇于獲嘉東遂俱入衛郡郵舍中是夜少帝伏甲欲與從臣謀害晉高祖詐屏人對語方坐於亭廉帝密遣御士石敢袖鎚立其後伏口者俄起左右驚擾敢素有勇力擁晉高祖入一室以巨木塞門敢力當其鋒尋死焉五代史忠正周世宗伐南唐至淮上淮兵大敗諸將或走或降劉仁瞻鎮壽州獨堅守不可下馬南唐書少子崇諫夜泛小舟渡淮謀紓家禍為軍校所執仁贍命腰斬之監軍使文德殿使周廷構哭于中門又赴救於仁贍妻薛氏薛氏曰崇諫幼子固所不忍然貸其死則劉氏為不忠之門促命斬之然後成喪聞者皆為出涕陸書次年世宗復來代仁贍病且死其副孫羽等詐為仁贍書以城降宗命舁仁贍至帳前歎嗟久之復使入城養疾世宗制曰劉仁贍盡忠所事抗節無虧前代名臣幾人可比豫之南伐得爾為多乃拜太尉兼中書令馬仁贍不起以手指口而卒時日陰曀天雨黃沙年五十八江南野史州人皆哭偏裨及士卒自死以殉者二十人世宗遣使吊祭追封郡王其夫人不食五日亦死陸元宗聞仁贍卒哭之慟及贈太師焚其誥曰魂兮有知鑒周惠耶歆吾命耶夜夢仁贍拜墀下若受命然壽州故治壽春世宗以其難尅遂徙城下蔡而復其軍曰忠正曰吾以旌仁贍之節也馬五代史仁贍至今廟食壽春不絶陸不負陛下唐使右僕射孫晟使周給事中王崇質為介晟至汴京謂崇質曰吾觀事勢不生還矣君家百口當別為謀乃白世宗遣崇質歸計事江南別録世宗怒江南失約召晟責之乃置晟于樓車野史因曰諸將圍荊州久未尅汝能降之當赦汝罪晟至城下見劉仁贍遙呼曰君受國家旌旄臣節不可隳也且援兵至世宗大怒追至汴京斬之晟臨刑神色不變南望再拜曰死不負陛下矣別録元宗聞晟死流涕贈魯國公陸撰碑南唐後主薨太宗詔侍臣撰碑時有與徐鉉爭名欲中傷之因言知吳王事迹莫若徐鉉太宗詔鉉為之鉉遽請對泣曰臣舊事李煜陛下容臣存舊主之義不敢奉詔太宗許之鉉為碑但推言歷數已盡天命有歸有曰東鄰搆禍南箕扇疑投杼致慈親之惑乞火無老媼之談始勞因壘之師終後塗山之會太宗覽讀嘆賞又得所撰吳王挽詞每對宰臣稱鉉忠義挽詞云青松洛陽陌荒草建康宮東鄰謂錢俶也宋朝類苑務本凡為天下治國家必務本而後末務本莫貴於孝人主孝則名章榮下服聽天下譽人臣孝則事君忠處官廉臨難死士民孝則耕藝疾守戰固不罷北夫孝三皇五帝之本務而萬事之紀也夫執一術而百善至百邪去天下從者其惟孝也呂覽五孝天子孝曰就就之為言成也天子德被天下澤及萬物始終成就則其親獲安故曰就也諸侯孝曰度度者法也諸侯居國能奉天子法度得不危溢則其親獲安故曰度也卿大夫孝曰譽譽之為言名也卿大夫言行布滿能無惡稱譽達遐邇則其親獲安故曰譽也士孝曰究究者以明審為義士始升朝辭親入仕能審資父事君之禮則其親獲安故曰究也庶人孝曰畜畜者含畜為義庶人含情受朴躬耕力作以畜其德則其親獲安故曰畜也援神契見舊唐志孝感元氣混沌孝在其中天子孝天龍負圖地龜出書夭孽消滅景雲出遊庶人孝則澤林茂浮珍舒怪草秀水出神魚援神契通神明天子行孝四夷和平孝悌之至通於神明病則致其憂鷦消形求醫翼全上宋均注曰翼羽翼親者也上愛敬先王之所以治天下也故愛其親不敢惡人敬其親不敢慢人愛敬盡於事親光耀加於百姓究於四海此天子之孝也曾子曰身者父母之遺體也行父母之遺體敢不敬乎居處不莊非孝也事君不忠非孝也蒞官不敬非孝也朋友不篤非孝也戰陳無勇非孝也五行不遂災及乎親敢不敬乎沈書曰刑三百罪莫重於不孝呂孝行拭目舜耕歷山歲不熟舜糶其母詣糴每還錢與米問之子也因相抱歸拭其父目尋自明堯聞而妻之類林舜糶於平陽中父認之乃其目目以光明真源賦安金罐中舜為父母淘井取金銀安罐中與父母史記御覽不擇官曾子曰往而不可還者親也至而不可加者也是故孝子欲養而親不待也木欲直而時不待也是故椎牛而祭墓不如雞豚逮親存也故吾嘗仕齊為吏祿不過斤釜尚猶欣欣而喜者非以為多也樂其逮親也既沒之後吾嘗南遊於楚得尊官焉堂高九仞榱題三圍轉轂百乘猶北鄉而涕泣者非為賤也悲不逮吾親也故家貧親老不擇官而仕后夫信其志約其親者非孝也韓詩外傳感益母詩王風中園有蓷陸璣云韓詩及三蒼皆云益母也故曾子見益母而感本草茺蔚下曾子攀柩車引輴者為之上也淮南曾參行孝枯井湧泉遺躬樂正子春下堂而傷足瘳而數月不出猶有憂色門人問之曰夫子下堂而傷足瘳而數月不出猶有憂色敢問其故樂正子春曰善乎而問之吾聞之曾子曾子聞之仲尼父母全而生之子全而歸之不虧其身不損其形可謂孝矣君子無行咫步而忘之余忘孝道是以憂故曰身者非其私有也嚴親之遺躬也呂孝行地中得米楊範字文端齊人齊宋之亂母在賊中採椹藏於地夜取之進母如是非一忽於地中得米十斛上有字云米十斛賜孝子楊範以資給母風俗通得婦賜算紀邁廬江人本姓舒以五月五日生母棄之村人紀淳妻趙氏養之年六歲本父母時來看語曰汝是我生邁泣涕告趙乃具言始末及年十歲傭力所得輒分二母各半淳亡無子邁乃斬衰三年本父母繼亡又並齊衰心喪三年趙欲為齎酒米往婚家逢醉人打趙體悶忽有一狗直至銜邁衣如此者三邁心動走赴婚家逢醉適共舉酌於草中邁乃以擔殺二醉人趙歸得平乃詣縣首令宥之乃誓不娶後邁嘗寢忽有一女言姓衛昨忽暴死天神矜愍君無妻故使相報邁具説其狀母子至衛門外果如言送喪上車牛不肯動趙乃與主人具敘説之主人開柩女有氣息至晚便説且説始末如趙所言遂為夫婦趙卒邁絶復蘇者日數四邁五十嘗病幾死夢神曰君行至孝延歷將得百歲果九十七而卒頴躬孝子傳孝順二親得算二千天司録所表事賜算中功河圖伏棺火滅梁武孝思賦顧長沙之臨湘有古初之道始時父沒而未葬遇鄰火之卒起乃伏棺而長號雨暴至而火死事見東觀記又何琦其亦然獨柩屋而全止見晉中興書醴泉生竈劉鎮就養而不暇常遠汲而力寡苦節感於幽靈醴泉生於竈下孝思賦齒生邢渠失母與父仲居性至孝貧無子傭以給父父齒落不能食渠常自喃之專專然代其喘息仲逐康休齒落更生百餘歲乃卒也蕭廣濟孝子傳目明吳中書郎盛彥之至孝母王氏失明彥暫行勑婢食母婢乃取蠐螬蒸食之母甚以為美不知是何物兒還母曰汝行後婢進吾食甚甘然非魚肉汝試問之既而問婢婢服曰實是蠐螬彥抱慟哭母自霍然立開志怪畫像陳實子故大鴻臚紀字元方至德絶俗才達過人蒸蒸色養不離左右豫州刺史嘉其至行表上尚書畫像百城以厲風俗焉海內先賢傳感馬程堅字謀甫南陽人居貧以磨鏡給養母喪哀號下有馬每聞堅哭轍淚出暫輟芻草魏略孝弟王兗州曲阜縣高平鄉九原里有至人蘭公家族百餘口精專孝行感動乾坤忽有斗中真人下降蘭公之舍自稱孝弟王云居日中為仙王月中為明王斗中為孝弟王夫孝至於天日月為之明孝至於地萬物為之生孝至於民王道為之成吾於上清已下託化人間示陳孝弟之教後晉代嘗有真仙許遜傳吾孝道之宗是為衆仙之長因付蘭公至道祕旨十二真君傳病從指入崔渾為侍御史清白溫恭能盡色養父母小不康輒析幽請以身代母常有疾渾跪請病受已有頃覺病從十指入俄而遍身母所苦逐愈丁父艱勺飲不入口毀瘠骨立無何不勝其哀而卒朝野傷心朝野僉載飲鴆賈直言父道沖以伎術得罪貶之賜鴆於路直言偽令其父拜四方辭上下神祗伺使者視稍怠即取其鴆以飲遂迷伏而死明鴆泄于足而復蘇代宗聞之減父死直言亦自此病躄舊唐大和初授絳郡太守每話所經之事自云始飲鴆志在必死忽然覺毒沿五內至支節其痛愈於鑽灼摩頂旋踵不可名狀天陰則又甚焉𣍨其䏶及足脛色皆如墨有傍攻出緑膿液紫迄於臭敗逆搶人鼻達數十步外唯食啖無減續定命録掘錢符夢趙雋字子奇平陽嶽陽人父晡嗜酒夜歸里墅橫臥塗中雋見歸遲尋迎之父醉負而不勝時冬中沍寒方甚雋脫己衣覆之嶽陽山多鷙獸有豹視之為之岐道而去父卒自營丘封有白鵲常遊其冢棗樹會潞師劉禎反輦其母入文城西山稹滅復輦其母東歸母卒哀毀過制縣令京兆常伯倫知之給米粟蠲其家雋將葬母貧鬻其子質劑已定其夜夢一人請曰小舍束有錢百萬乃自發之及旦雋自舍東手掘之果得錢符夢數焉史系血緣幡竿周青東郡人母疾積年青扶持左右四體羸瘦村里乃斂錢營助湯藥母痊許女同郡周郡周少君少君病疾未獲成禮乃求青母見青許之俄而命終青往為婦十餘年中公姑感之勸令更嫁青誓以匪石後公姑并自殺姑女告青害殺縣牧栲捶遂以誣款七月刑青於市青謂監殺曰乞樹長竿白幡青若殺公姑血入泉不殺者血上天血乃緣幡竿上天王紹之孝子傳漢書于公辨孝婦之冤相傳將刑青血上復緣幡而下云搜神記天中記卷二十四
