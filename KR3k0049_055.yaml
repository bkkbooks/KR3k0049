body:
  text: 馬馬歲馬尺説文曰馬怒也武也馬一歲曰馵二歲曰駒三歲曰駣兆八歲曰𩡩八高六尺曰驕七尺曰騋八尺曰龍驁駿馬也以壬申日死乘馬忌之月精陰合於八八合陽九八九七十二二為地地主月月精為馬月數十二故馬十二月而生人乘馬以理天下王者駕馬故其字以王為馬春秋考異郵地精為馬十二月而生應陰紀陽以合功故人駕馬任重致遠以利天下月度疾故馬善走春秋説題辭資皎月而載生祖河房而挺授張士簡舞馬賦漢書曰漢中四星曰天駟旁一星曰王梁王梁策馬車騎滿野元命包云漢中四星曰騎一曰天駟春秋合成圖曰王良主天馬也淮南子云黃帝治天下青龍進駕飛黃服皂又曰天下有道飛黃服皂瑞應圖曰乘黃王者輿服有度則至符瑞圖曰騰黃者神馬也其色黃王者德御四方則至一名吉光此馬無死時一名乘黃亦曰飛黃或作吉黃或曰翠黃一名紫黃其狀如狐背上有兩角出白民之國乘之壽三千歲黃帝乘之海內北經曰犬戎國有文馬縞身鬣目若黃金名曰吉量一作良乘之壽千歲周書云犬戎文馬赤鬣白身目若黃金名曰吉黃之乘成王時獻之郭璞云吉良吉黃雞斯乘黃皆一物也尚書中候曰帝堯修壇河洛仲月辛日禮備至于日稷榮光出河龍馬銜甲變緑色臨壇吐甲圖宋均曰稷側也鄭玄曰赤文緑色赤文緑地也瑞應圖云龍馬者仁馬也河水之精高八尺五寸長脛身有鱗甲骼上有翼旁有垂毛鳴聲不哀蹈水不沒有明王則見也飛兔者神馬之名也日行三萬里禹治水勤勞歷年救民之害天應其德而至孫氏瑞應圖駃騠鄒陽傳曰蘇秦相燕人惡之燕王燕王按劍而怒食以駃騠李斯書曰駿良駃騠不實外廄孟康曰駃騠駿馬也生七日而超其母周書曰正北以駃騠為獻廣雅曰馬屬也孫氏瑞應圖曰駃蹄者后土之獸也自能言語王者仁孝於民則出禹治水有功而來九代馬大樂之野夏后啓於此舞九代馬乘兩龍山海經夏后兩龍載驅璿臺之上王元長序呂覽曰伊尹説湯曰天子不得至味故須青龍之匹遺風之乘高誘注曰皆馬名也疾若比遺風也師古曰馬行疾每在風前故遺風于後也尸子曰人之言君天下者騏驎青龍而堯素車璞馬雞斯商王拘周伯昌於羑里太公與散宜生以金千鎰求天下珍物以免君之罪於是得犬城氏文馬駁身朱鬣目如黃金項如雞尾名曰雞斯之乘以獻商王太公六韜瑞應圖曰腰裊者神馬也與飛兔同以明君有德也夏侯地志云翁洲上有徐偃王城傳云昔周穆王巡狩諸侯共尊偃王穆王聞之令造父御乘腰裊之馬日行千里自還討之應劭曰古有駿馬名腰裊赤喙黑身一日行萬五千里天子命駕八駿之乘右服驊騮而左緑耳右驂赤驥而左白義天子主車造父為御次車之乘右服渠黃而左踰輪右驂盜驪而左山子伯夭主車參伯為御奔戎為右東遊至于黃澤使宮樂謠曰黃之池其馬噴沙皇人威儀黃之澤其馬噴玉皇人壽穀穆天子傳穆王即位三十二年巡行天下馭黃金碧玉之車傍氣乘風起朝陽之嶽自明晦窮宇縣之表御八龍之駿一名絶地足不踐土二名翻羽行越飛禽三名奔霄夜行萬里四名超影逐日而行五名踰輝毛色炳耀六名起光一形十影七名騰霧乘雲而奔八名挾翼身有肉趐遞而駕焉按轡徐行以匝天地之域拾遺記北唐之君來見以一驪馬是生緑耳八駿皆因其毛色以為名號紀年夸父之山北有林焉名曰桃林中多馬造父於此得驊騮騄耳之乘獻周穆王山海經趙高曰何必華山之騄耳而後行遠乎史樂書翠龍楊雄河東賦云乘翠龍而超河兮陟西嶽之嶢崝師古曰翠龍穆天子所乘馬也桃文延陵卓子乘蒼龍桃文之乘鉤飾在前錯錣在後馬欲進則鉤飾禁之欲退則錯錣貫之馬因旁出因下抽刀而刎其腳造父過而為之泣涕曰古人治人亦然矣夫賞所以勸之而毀存焉罰所以禁之而譽加焉民中立而不知所由此亦聖人之所為泣也一曰乘蒼龍與翟文之韓非子纖離騏驥纖離古之良馬也孫卿子乘纖離之馬李斯書纖驪馬朕常所自乘甚調良善走數萬匹之極選乘之真可樂也中國雖饒馬其知名絶足亦時有之耳魏文帝與孫權書唐成公如楚有兩驌驦馬楚子常欲之不與三年止之唐人竊馬而獻子常唐公歸群臣請償之馬融曰驌驦鳥也馬似之左傳世祖將幸鄴李平諫曰馳驌騻于緑竹之區騁驎驥于漳滏之壤魏書晉假道於虞以伐虢還襲滅虞荀息牽曩所遺虞屈産之乘馬奉之獻公公笑曰馬則吾馬齒亦老矣史記晉石樓有屈産泉相傳昔有白馬母飲茲泉生得龍駒春秋曰晉屈産之乘蓋此地生良馬也寰宇記衛侯來獻其乘馬曰啓服塹而死公將為之櫝子家曰從者病矣請以食之乃以帷褁之左傳秦始皇有七名馬一追風二白兔三躡景四追電五飛翮六銅雀七晨鳧崔豹古今注項王騅項王駿馬名騅常騎之及被圍於垓下乃悲歌慷愾為歌曰力拔山兮氣蓋世時不利兮騅不逝及至烏江謂亭長曰吾騎此馬五歲所當無敵常一日千里不忍殺以賜公史記文帝自代還有良馬九匹皆天下之駿馬也一名浮雲一名赤電一名絶群一名逸驃一名紫燕騮一名緑螭驄一名龍子一名麟駒一名絶塵號為九逸有來宣能御代王號為王良俱還代邸西京雜記選注引此一名飛燕騮漢書武紀云武帝元狩二年夏馬生于吾水中元鼎四年秋馬生渥窪水中作太一之歌曰太一况天馬下霑赤汗兮沫流赭志俶儻精權奇籋躡浮雲掩上馳騁容與兮跇萬里今安匹兮龍為友李斐曰南陽新野有暴利長當武帝時遭刑屯田燉煌界人數於此水旁見群野馬中有奇異者與凡馬同來飲此水傍利長先為土人持勒靽於水傍後馬玩習久之代土人持勒靽收得其馬獻之欲神此馬云從水中出史記漢書太初四年春二師將軍李廣利斬大宛王首獲汗血馬來作西極天馬之歌曰天馬徠從西極涉流沙九夷服天馬徠出泉水虎脊兩化若鬼天馬徠歷無草徑千里循東道天馬徠執徐時將搖舉誰與期天馬徠開遠門竦豫身逝昆侖天馬徠龍之媒遊閶闔觀玉臺漢書西域傳云大宛國別邑七十餘城多善馬馬汗血言其先天馬子也漢書云初天子發書易云神馬當從西北來得烏孫好馬名曰天馬及得宛汗血馬益壯更名烏孫馬曰西極馬宛馬曰天馬云張騫傳又曰大宛有善馬在二師城漢使以金馬請宛相與謀曰二師馬宛寶馬也不肯豫漢使後建初三年賜東平王蒼及琅琊王京書云并遺宛馬一匹血從前髆上小孔中出常聞武帝歌天馬霑赤汗今親見其然也後漢中黃門駙馬大宛馬汗血馬乾河馬天馬漢官舊儀有角漢武帝聞大宛有天馬遣李廣利伐之始得此馬有角為奇故漢武為賦天馬之歌胡馬感北風之思遂頓羈絶絆驤首而馳晨發京城食時至燉煌北塞山下嘶鳴而去因名其處為侯馬亭今晉昌及廣武馬蹄谷石上馬迹若踐泥中有自然之形故其俗號曰天馬經西河舊事宋膺異物志云大宛馬有肉角數寸或有解人語及知音舞與鼓節相應隋西域圖記云其馬騮馬烏馬多赤耳黃馬赤馬多黑耳惟耳色別自餘毛色與常馬不異武帝伐大宛得千里馬名蒲稍作歌曰天馬徠兮從西極經萬里兮歸有德承威靈兮降外國涉流沙兮四夷服史記樂書孝武之世明珠文甲通犀翠羽之珍盈於后宮蒲稍龍文魚目汗血之馬充於黃門注孟康曰四駿馬名一云大宛馬虎脊魚目龍文鳳頸尾如蒲稍西域贊魏紹宗慕容檄梁境內曰虎班龍文之逸蘭池蒲稍之駔噓天陸野躡影追風東方朔遊吉雲之地越扶桑之東得神馬一匹高九尺股裏有旋毛如日月狀如月者夜光如日者晝光毛色隨四時之變帝問朔曰是何獸也朔曰此西王母乘靈光之輦以適東王公之舍稅此馬於芝田而食芝草王公怒棄馬於清津天岸臣至王公壇因騎而返繞日三匝此馬入漢關關門猶未掩臣於馬上睡不覺而至帝曰其名云何對曰因疾為名步景朔當乘之時如駑蹇之驢耳洞冥記果下馬昌邑王賀召皇太后果下馬乘之漢書濊國果下馬漢桓時獻之注云高三尺乘之可於果樹下行魏志周弘正為宣城王所愛給一果下馬蓋東夷濊國所出也此史尉景有果下馬文襄求之不與曰土相扶為墻人相扶為王一馬亦不得畜而索也神武對景及常山君責文襄而杖之顏氏家訓漢樂浪郡出果下馬高三尺述異記德興産果下小駟以瀧水者為最高不踰三尺駿者有兩脊骨虞衡志宣帝時至大宛得名馬象龍而還師古曰言馬形似龍者馮奉世傳列異記曰故司隸鮑子都少時舉上計於道遇一書生卒得心痛子都下車為按摩奄忽而卒不知姓字有素書一卷銀十餅即賣一餅以資殯殮其餘以枕之素書著腹上埋之未至京師有驄馬隨之遇一關侯家住宿問曰君何以致此馬子都因説之侯乃驚愕曰此吾兒也使迎喪開棺視銀書如所言侯乃薦子都辟公府至司隸子永孫昱俱為司隸皆復乘驄馬故京師歌之曰鮑司驄三入司隸再入公馬雖瘐行步工的顱劉備之初奔劉表屯於樊城表左右欲因會取備備覺如廁便出所乘馬的顱走墮襄陽城西檀溪水中溺不得出備急謂的顱曰今日厄何不弩力的顱達備意踊三丈得過世説傳玄乘輿馬賦曰往日劉備之初降也大祖賜之驄馬使自至廄選之歷名馬以百數莫可意者次至下廄有的顱馬委棄莫視瘦瘁骨立備撫而取之衆莫不笑之馬超破蘇氏塢塢中有駿馬百餘匹自超已下俱爭取肥好者而將軍龐德獨取一騧馬形觀既醜衆亦笑之其後劉備奔于荊州馬超戰于渭南逸足電發追不可逮衆乃服焉張飛有馬號玉追時歌曰人中有張飛馬中有玉追寰宇記江夏白馬廟耆舊云飛之靈也呂布常御良馬號曰赤兔能馳城飛塹人語曰人中有呂布馬中有赤兔絶影張繡降而復反曹操所乘馬名絶影為流矢所中魏書白鵠曹洪武帝從弟家盈産業駿馬成群武帝討董卓夜行失馬洪以其所乘馬上帝其馬號曰白鵠此馬走時惟覺耳中風聲足似不踐地至汴水洪不能渡帝引洪上馬共濟行數百里瞬息而至馬足毛不濕時人謂乘風而行一代神駿也諺曰憑空虛躍曹家白鵠拾遺記廣記事類賦作白鶴黃耳魏時鮮卑獻千里馬白色而兩耳黃名曰黃耳穆天子傳注魏志云文帝黃初中於上黨澤馬魏都賦澤馬於阜顏延年赭白馬賦魏德懋而澤馬效質魏陳王曹植獻文帝馬表曰臣於先武皇帝世得大宛紫騂馬一匹形法應圖善持頭尾教令習拜今輒已能又能行與鼓節相應謹以奉獻梁張士簡舞馬賦懷夏后之九代想陳王之紫騂曹真有駃馬名為驚帆言其馳驟如烈風之舉帆疾也慕容瘣有駿馬赭白有奇相逸力石虎之伐棘城也皓將出避難欲乘之馬悲鳴踶齧人莫能近皓曰此馬見異先朝孤常仗之濟難今不欲出避者蓋先君之旨也乃止虎尋退皓益奇之至是四十九歲而駿逸不虧雋比之鮑氏驄命鑄銅以圖其象親為銘贊鐫勒其傍置薊城門掖是月象成而馬死載記驍騎將軍呂光封西域王上疏曰唯龜茲據三十六國之中制被王侯之命入其國見天驥龍驤腰裊丹髦萬計盈廄雖伯益更生衛賜復出不能辨也崔鴻十國春秋揚武續晉安帝記曰司馬休之奔廣固慕容超欲害之休之不知常所乘騅馬于床前養餌忽連鳴不食注目視鞍體之試被之即不動也還床坐馬又驚跳如此者數四因試騎視裁出門外便奔而馳之走行十里顧望所住已有收兵至矣乘馬南奔殆而獲免後還荊州加騅馬楊氏之號渚宮舊事同姚襄為秦將黃眉所敗襄所乘馬曰黧眉騧日行千里是戰也而馬倒秦兵擒而斬之通鑑晉穆帝紀白口騮老宿諺言赫連之世有駿馬名曰白口騮水經注三朱龍冉閔所乘赤馬曰朱龍日行千里燕騎圍之數周閔躍馬潰圍正東奔二十餘里馬無故而死為慕容恪所擒晉書載記劉胡之叛走也袁顗至夜方知大怒罵曰今年為小子所誤呼取飛燕謂其衆曰我當自出追之因又遁走宋書齊世祖在東宮頗有不法荀伯玉密啓之上大怒檢校東宮世祖還至方山日暮將泊豫章王于東府乘飛燕東迎具述上怒之意南齊傳後魏河間王元琛在秦州遣使向西城求名馬遠至波斯國得千里馬號曰追風赤驥次有七百里者十餘匹皆有名字以銀為曹金為環鎖諸王服其豪富伽藍記後魏曹彰性倜儻偶逢駿馬愛之其主所惜也彰曰余有美妾可換惟君所選馬主因指一妓彰遂換之馬號曰白鶻后因獵跪獻於文帝獨異志唐開成初有鮑生者多蓄妓聲以夢蘭小倩自隨外弟韋生有良馬數匹同憩陽道山寺鮑置酒命伎韋見鮑有欲馬之意曰能以人換乎鮑遣四弦更衣而出韋以紫叱撥酬之俄有二客至曰可以妾換馬為題共賦其一曰香暖深閨未厭夭桃之色風清廣陌曾憐噴玉之聲其一曰香散緑騣意已忘於鬢髮汙流紅額愛無異於凝脂客自稱江淹謝莊也異聞録楊玉夫殺蒼梧王太祖夜從承明門乘常所騎赤馬入殿內驚怖既知蒼梧王死咸稱萬歲及太祖踐阼號此馬為龍驤將軍世謂為龍驤赤南齊南都賦馬鹿超而龍驤吳都賦四騏龍驤北齊高緯御馬皆藉以氈罽被以金玉食物有十餘種號為駁龍儀同其將合牝牡則設青廬黼帳牢具過於諸王婚禮齊主常親視焉三國典略魏大武真君中遣李敞詣北石神祠祭天配以考妣祝曰天子謹遣敞等用駿足一元大武敢昭告於皇天之靈魏書禮志王元長法樂記云夙隸乖往途駿足獨歸路弘明集魏昭成時國有良馬曰騧騮一夜忽失之求之不得後知為南部士人劉庫仁所盜養於窟室奚簟聞而馳往取馬庫仁以國甥恃寵慚而逆擊簞簞捽其髮落傷一乳苻堅時事魏書奚斤傳簞斤之父也梁武陵王紀在蜀甲器殷積馬八千匹上足者置之內廄開寢殿以通之日落輒出步馬南史玉獅子梁武帝有良馬名照殿玉獅子小説南史天監四年禊飲華光殿其日河南國獻赤龍駒能拜伏善舞詔張率與到溉周興嗣為賦武帝以率及興嗣為工張裕傳梁書率賦序云臣聞天用莫如龍地用莫如馬故禮稱驪騵詩頌騮駱先景遺風之美世所得聞吐圖騰光之異有時而出大梁光有區夏廣運自中日入之所浮琛委贄風被之域越險效珍軨服鳥號之駿騊駼豢龍之名而河南又獻赤龍駒有奇貌絶足能拜舞梁豫章王綜降魏后衆不得還者甚衆湘州益陽人任煥常有騅馬乘之退去煥為抄所傷人馬俱弊煥於橋下歇抄復至煥腳痛不得上馬於是向馬泣曰騅子我於此死矣馬因跪其前腳乃得上馬遂免難南史西魏孝武將為齊太祖所殺孝武索所乘波斯騮馬命太宰南陽王躍之將舉其鞍馬蹶而死帝惡之日晏還宮至後門馬驚不前捶之鞭折須臾遇鴆而崩三國典略梁武帝幸樂説苑羊侃預宴時少府奏新造兩刃矟成長二丈四尺圍一尺三寸帝因賜侃河南國紫騮令試之侃執矟上馬左右擊刺特盡其妙觀者登樹帝曰此樹必為侍中折矣俄而果折因號此矟為折樹矟南史梁太清元年四月神馬出五月丁酉朔詔以馬寶示群臣簡文為皇太子獻頌文苑英華隋煬帝令李景營遼東戰具於北平賜御馬一匹名獅子𩢴北史隋書騧騮隋文帝所乘騧騮馬脊有肉鞍北史王卲傳隋文帝時大宛國獻千里馬騣曳地號曰師子驄上置之馬群陸梁人莫能制郎將裴仁基曰臣能制之遂攘袂向前去十餘步踴身騰上一手撮耳一手摳目馬戰不敢動乃跨乘之朝發西京暮至東洛隋未不知所在唐文皇勑訪之同州刺史宇文士及得於朝邑市麯家挽磑騣尾焦禿皮肉穿穴及見之悲泣帝自出長樂坡馬到新豐向西鳴躍帝甚喜齒口並平飼以鍾乳仍生五駒皆千里足也後不知所在朝野僉載吉頊與武懿宗爭趙州功太后不説它日頊奏事太后曰太宗有馬名師子驄肥逸無能調馭者朕為宮女侍側言于太宗曰妾能制之然須三物一鐵鞭二鐵撾三匕首鐵鞭擊之不服則以撾撾其首又不服則以匕首斷其喉太宗壯朕之志今日卿豈足朕匕首耶頊頊惶懼流汗拜伏求生乃止通鑑唐太宗破竇建德乘馬名黃驄驃命樂工製黃驄疊曲樂志唐太宗時東骨利幹國産良馬首似橐它筋骼壯大日中馳數百里太宗時來其大酋候斤因使者獻之帝取其異者號十驥皆為美名曰騰霜白曰皎雪驄曰凝露驄曰懸光驄曰決波騟曰飛霞驃曰發電赤曰流金騧曰翔麟紫曰奔虹赤厚禮其使回紇傳騰霜會要作騰雲凝露作凝霜酉陽雜俎云決波騟走歷門三限不躓上尤惜之太宗六馬其一曰拳毛騧黃馬黑啄平劉黑闥時所乘贊日月精按轡天駟橫行弧矢載戢氛埃廓清其二曰什伐赤純赤色平世克建德時乘贊曰瀍澗未靜斧鉞伸威朱汗騁足青旌凱歸其三曰白蹄烏純黑色四蹄俱白平薛仁杲時所乘贊曰倚天長劍追風駿足聳轡平隴回鞍定蜀其四曰特勒驃黃白色啄微黑色平宋金剛時所乘贊曰應策騰空承聲半漢入險摧敵家危濟難其五曰颯露紫紫燕騮平東都時所乘贊曰紫燕超躍骨騰神駿氣讋三川威淩八陳其六曰青騅蒼白雜色平竇建德時所乘贊曰足輕雪影神發天機策茲飛練定我戎衣潼關之役備體流汗金石録秦叔寶所乘馬號忽雷駁常飲以酒每於月明中試能竪越三領黑氈及胡公卒嘶鳴不食而死酉陽雜俎大宛六馬天寶中大宛國進汗血馬六匹一曰紅叱撥二曰紫叱撥三曰青叱撥四曰黃叱撥五曰丁香叱撥六曰桃花叱撥上乃製名一曰紅玉輦二曰紫玉輦三曰平山輦四曰陵雲輦五曰飛香輦六曰百花輦復命圖於瑤光殿乃改為觀驥殿秦再思紀異録宋玉明圖叱撥有八曰紅耳叱撥鴛鴦叱撥桃花叱撥丁香赤撥青赤撥騮叱撥榆叱撥紫騮叱撥稍異玄宗幸蜀天廄八馬其七盡斃于棧道惟一雲騅存焉後德宗幸梁亦充御焉傳載德宗幸梁御馬號望雲騅駕還飼以一品料暇日牽而視之至必長鳴四顧若感恩狀后老死飛龍廄中貴戚畫為圖國史補玄宗好大馬御廄至四十萬遂有沛艾大馬命王毛仲為監牧使燕公張作駧馬頌祿山之亂沛艾馬種遂絶名畫記開元二十九年三月滑州刺史李雍獻馬一匹肉髮麟臆嘶不類馬聲日行三百里雍任淄青日遇一翁云聖主將得龍馬以應太平遂於青州馬會恩家獲而獻之初會恩有牝馬嘗浴於淄水遂有胎産而因以龍子呼之天寶中隴右節度皇甫惟明奏龍支縣人庫狄孝義有馬生龍駒經九旬有九日身有鱗而不生毛臣就檢視時有慶雲五色遙覆馬上久而不散請付史官唐書照夜白上所乘馬有玉花驄照夜白明皇雜録照夜白封太山回令陳門圖之開元記杜詩曾貌先帝照夜白龍池十日飛霹靂曹霸人馬圖紅衣美髯奚官牽玉面騂緑衣閹官牽照夜白畫鑒燕友驕韓幹八馬圖二奚官引連錢驄燕友驕上九馬圖曹將軍霸所繪杜甫作詩拳毛獅子二駿在焉贊曰姚宋廟堂李郭治兵帝下毛龍以馭群英三花開元天寶間承平日久尚世輕微多愛三花飾馬郭若虛家藏貴戚閲馬圖中有三花馬蘇大參家有韓幹畫三花御馬晏元獻家藏一畫虢國出行圖亦有三花馬三花者剪鬃為之瓣白樂天詩云舞衣裁四葉馬鬣剪三花是也唐六典云外牧歲進良馬印以三花飛鳳之字或云取隋丹元子步天歌五個吐花王良星杜詩五花散作雲滿身個個五花紋李詩五花馬千金裘又開元內廄有飛黃照夜浮雲五花之乘名畫要録玉腕騮荊南節度使衛伯玉有馬名玉腕騮杜子美詩聞説荊南馬尚書玉腕騮肅宗時有告保定太守反者令李泌乘千里馬往案之千里馬寧遠所獻髮拳紫色狀如八駿乘者必衣裘冒絮似胡兒抱持早發扶風初馳三十里則皆旁側跳三十里外乃墜然而去唯聞耳傍風聲飛前蹄之土過耳辰時達保定申時歸奏事續博物志九花虬代宗命御馬九花虬并紫玉鞭轡以賜郭子儀儀固讓久之上曰此馬高大稱卿儀質不必讓也子儀身長六尺八寸九花虬即范陽節度使李德山所貢也額高九寸毛拳如鱗頭頸鬃鬣真虬龍也每一嘶則群馬聳耳以身被九花文號九花虬上往日東幸觀獵於田不覺日暮忽顧謂侍臣曰行宮去此幾里奏曰四十里上令速鞭恐閡夜而九花虬綏然如三五里而已侍從奔驟無有及者為超光趨影之儔也杜陽編杜詩近時郭家獅子注即九虬也德宗有二馬一號神智驄一號如意騮皆耳中有毛引之可長一尺而進退緩急皆如上意故以是名之一日花木方春上欲幸諸苑內廄控馬侍者乃進瑞鞭上指二駿語近臣曰昔朕西幸有二駿謂之二絶今獲此鞭可謂三絶矣遂命酒飲之左右張翼而去因吟曰鴛鴦赭白齒新齊晚日花間落碧蹄玉勒乍回初噴沫金鞭欲下不成嘶中書舍人韓翊詩也杜陽編初大將李萬江春本退渾部李抱玉送回紇道太原舉帳從至潞州牧津梁寺地美水草馬如鴨而健世所謂津梁種者歲入馬價數百萬唐書劉悟傳高駢有所愛馬死圉人懼得罪求救于呂用之用之乃入見駢曰隋將陳果仁用之有事命之淮海果仁訴以無馬令公大烏且望一借頃刻廄吏報云大烏忽汗發駢徐應之曰吾已借陳司徒矣俄而告斃廣陵妖亂志朱溫愛寇彥卿賜以所乘愛馬丈烏溫圍鳳翔彥卿乘馬馳突陳前溫曰真神將也五代史劉旻據太原與契丹約為父子契丹以黃騮馬為聘後與周世宗戰高平敗獨乘黃騮以歸遂與黃騮治廄飾以金銀食以三品料號自在將軍五代史宋太祖御廄一馬號碧雲霞馬口角有文如碧霞文于雙勒間圉人飼秣稍跛倚失恭則蹄齧吼噴怒不可解從征太原上下坂岡其平如砥下則伸前而屈後登高則反之太宗甚愛上尊餘瀝時或令飲嘶鳴喜躍后聞晏駕悲悴骨立真宗遣從皇輿于熙陵數日遂斃詔以弊幃埋于桃花犬之傍玉壼清話仁宗御馬名玉逍遙色白乘之如輿輦圉人云馬行步有尺度疾徐皆中節御者行速則以足欄之一日燕王借乘即長鳴不行王怒還之帝以配南城馬鋪久之復御其行如初帝升遐從葬至陵下悲鳴不食而死卲氏聞見録墨莊謾録云神廟朝御馬有曰玉逍遙者蓋赭白也嘗幸金明池歸乘之神宗有馬名小烏曾以曹太后所送珠鞍於福寧殿親試之駕幸金明池回遂乘此鞍孔氏談苑志林云秦州進一馬騣如牛領垂胡側立顛倒毛生肉端蕃人云此肉騣馬也乃知杜鄧公騣馬行云肉騣碨礧連錢動百斛明珠元祐庚午曾紆公卷至京師見黃魯直于酺池寺魯直曰異時李伯時貌天廄滿川花放筆而馬殂蓋神魂精魄皆為伯時筆端取去實古今異事當為數語記之周公謹雲煙過眼録元祐初禽鬼章青宜結百官皆賀時兩域貢馬首高八尺龍顱而鳳膺虎脊而豹章出東華門入天駟監振鬣長鳴萬馬皆瘖父老縱觀以為未始見也蘇軾請於李公麟盡三馬之狀為贊曰八尺神龍超遙若將西燕西瑤帝念民乃下招籋歸雲逝房妖玉海元祐時于闐所貢鳳頭驄董氈進到錦膊驄天駟監揀中秦馬好頭赤溫溪所進照夜白李伯時畫為天馬圖雲煙過眼録畢再遇兗州將家也開禧中用兵纍有功金人認其旗幟即避之始居於霅有戰馬號黑大蟲駿駔異常獨三翁能御之再遇既死其家以鐵絙羈之圉中適遇嶽司迎神聞金鼓聲意謂赴敵於是長嘶奮迅斷絙而出其家慮傷人命健卒十餘挽之而歸因好言戒之云將軍已死汝莫生事纍我家馬聳耳以聽汪然出涕喑啞長鳴數聲而斃齊東野語青獅子姚興嘗畜一馬名青獅子每親飼之若通其語言時取斗酒投大盆中與馬同飲曰吾與汝同力報國紹興辛巳之冬逆亮來寇尉子橋之戰大將王權先遁時興為統領以所部四百騎敵虜凡十餘戰權不救援部將戴皋亦玩視不救遂與馬同沒于陳朝廷憫之厚恤加諡立廟淮甸有題絶句者云赤心許國自平時見敵捐軀更不疑權忌皋庸皆遁走同時死難只青獅韋居安梅澗詩話張浚畏曲端異已欲殺之因王庶吳玠之譖送恭州獄仍命其讎康隨點焉端聞之呼天者數聲端有馬名鐵象日馳四百里至是又呼鐵象可惜者數聲乃赴逮死獄中陜西士夫莫不惜之民亦恨恨有叛去者宋傳西夏有豪酋號青面夜義有駿馬曰赤駝為李顯忠所擒宋名臣言行録九江戌校王成者於淮上得病騟養之後亦惟成得乘也嘉定間成為洞寇李元礪所殺馬悲鳴尸側賊將異而取之為元礪弟所得馳騁良愜其意后乘之以犯永新柵我軍出迎騟識旗幟亟馳賊覺有異大呼勒挽不止擊以鐵槊胯為盡傷騟不復顧冒陳以入遂執之以徇于軍軍士鼓譟爭奮遂敗之居二日騟歸病傷不秣而死桯史小將軍金主完顏亮常所御小騅號小將軍上淳熙間宿松叛民汪革有三馬號惺惺騮小驄騍曰番婆子駿甚上爾雅曰騊駼馬字林云北狄良馬也一云野馬山海經云北海內有獸焉狀如馬名曰騊駼色青史記曰胸奴奇畜則騊駼瑞應圖云函隱之獸有明王在位即至為時除災害淮南主術訓云湯武聖王也而不能與越人乘幹舟而浮於江湖伊尹賢相也也而不能與胡人騎騵而服騊駼秀騏我得民而治則馬有紫燕蘭池秀騏逢騩尸子漢書揚雄河東賦云六先景之乘赭白馬賦蓋乘風之淑類實先景之洪胤張率舞馬賦先景遺風之實吐圖騰光之異齊顏延年赭白馬賦云驥不稱力馬以龍名豈不以國上威容軍𩢰趫迅而已庾中丞昭君辭曰聯雪隱天山崩風蕩河澳朔障裂寒笳冰原嘶代𩢰𩢰馬名文選駿馬有晨風黃鵠皆取鳥名馬言走疾若飛也黃子朝鮮有麒麟窟在平壤府浮碧樓下東明王養麒麟馬處也世傳王乘麒麟馬入窟從地中出朝天石升天至今石上有馬迹志吐谷渾有青海周回八九百里中有小山至冬放牝馬於其上生駒號龍種嘗得波斯馬放於海中因生驄駒日行千里故代稱青海驄馬舊唐小步烏秅國出小步馬孟康曰種小能步也師古曰小細也細步言其能蹀足即今所謂百步千迹者也豈謂其小種乎神馬滇池中有神馬家馬交之則生駿駒日行五百里水經法越𦖠之西多薦草産善馬世稱越𦖠駿始生若羔歲中紐莎縻之飲以米瀋七年可御日馳數百里南蠻傳䮂䮧䮂䮧蕃大馬名黃帝將見大隗于之山適遇牧馬童子黃帝曰請問為天下小童曰夫為天下者亦奚以異乎牧馬者哉亦但去其害馬者而已矣郭璞曰馬以過分為害莊子害馬已去世事都捐天台山賦王明廣云牧馬童兒先去亂群之馬放牛豎子由寵護群之牛弘明集華子曰堯漢皆得馬者以皆火德正斗南方乘德而至也英華馬寶頌桓公乘馬虎望見而伏公問管仲對曰意者君乘駁馬而洀柏迎日而馳乎公曰然管仲曰此駁象也駮食虎豹故虎疑焉管子晉平公出田見乳虎伏而不動平公顧謂師曠曰聞霸王之君出猛獸伏而不敢起今者寡人出乳虎伏而不動此猛獸乎師曠對曰鵲食猬猬食鵕鸃鵕鸃食駮駮食虎夫駮之狀似駁馬今者吾君當驂駁馬以出乎平公曰然説苑秦伯伐晉三敗及韓晉惠公乘小駟鄭入也慶鄭曰古者大事必乘其産生其水上而知其人心安其教訓而服習其道今乘異産以從戎事及懼而變將與人易亂氣狡憤陰血周作張脈僨興外強中乾進退不可周旋不能君必悔之弗聽壬戌戰於韓原晉戎馬還濘而止左僖十五秦穆公乘馬而車為敗右服御覽作左驂失而野人取之見野人方將食之於岐山之陽繆公歎曰食駿馬之肉而不還飲酒余恐其傷女性也於是遍飲而去處一年為韓原之戰晉人已環繆公之車矣晉梁由靡已叩繆公之左驂矣晉惠公之右路石奮投而擊繆公之甲中之者已六札矣野人之嘗食馬肉於岐山之陽者三百有餘人畢力為繆公疾鬥於車下遂大克晉反獲惠公以歸此詩之所謂曰君君子則正以行其德君賤人則寬以盡其力者也呂愛士秦穆公謂伯樂曰子之年長矣子姓有可使相馬者乎伯樂對曰良馬者可以形容筯骨相也天下之馬者若滅若沒若亡若失若此者絶塵弭轍臣之子皆下才也可告以良馬不可告以天下之馬也臣有所與共擔纏薪菜者有九方皋此其於馬非臣之下也請見之穆公見之使之求馬三月而反報曰已得之矣在沙丘穆公曰何馬也對曰牝而黃使人往取之牡而驪穆公不説召伯樂而謂之曰敗矣子所使求馬者色物牝牡尚弗誰知又何馬之能知也伯樂喟然太息曰一至於此乎是乃其所以千萬臣而無數者也若皋之所觀天機也得其精而忘其粗在其內而忘其外見其所見不見其所不見視其所視而遺其所不視若皋之相馬乃有貴乎馬者也馬至果天下之馬也列子淮南作九方堙汗明見春申君曰夫驥之齒至矣服鹽車上太行中坂遷延負轅不能上伯樂遭之下車攀而哭之解紵衣而羃之於是俯而噴仰而鳴聲造於天欣伯樂之知己也戰國策昔騄驥倚輈于吳坂長鳴于伯樂知與不知也劉越石與盧諶書馬蹄可以踐霜雪毛可以御風寒齕草飲水翹足而陸此馬之真性也雖有義臺路寢無所用之及至伯樂曰我善治馬燒之剔之刻之雒之連之以羈馽編之以皂棧馬之死者十二三矣飢之渴之馳之驟之整之齊之前有橛飾之患而後有鞭策之威馬之死者已過半矣莊馬蹄伯樂姓孫名陽善馭馬石氏星經云伯樂天星名主典天馬孫陽善馭故以為名注得十利劍不若得歐治之巧得百走馬不若得伯樂之數淮南子得十良馬不若一伯樂得地千里不若得一聖人呂覽夫視煆錫而察青黃區冶不能以必劍水擊鵠雁陸斷駒馬則臧獲不疑鈍利發齒吻形容伯樂不能以必馬授車就駕而觀其末塗則臧獲不疑駑良韓子造父為齊王駙駕渴馬服成效駕圃中渴馬見圃池去車走池駕敗一曰王子於期為駙駕轡策不用而擇欲於馬擅芻水之利也然馬過於圃池而駙馬敗者非芻水之利不足也德分於圃池也上彘突王子於期為趙簡主取道爭千里之表其始發也伏溝中王子於期齊轡策而進之彘突出於溝中馬驚駕敗一曰造父御四馬馳驟周旋而恣欲於馬恣欲於馬者擅轡策之制也然馬驚於出彘而造父不能禁制者非轡策之嚴不足也威分於出彘也上得術聖主之治也其猶造父之御齊輯之于轡銜之際而急緩之于脣吻之和正度于胸臆之中而執節于掌握之間內得於心中外合於馬志是故進退履繩而旋曲中規取道致遠而氣力有餘誠得其術也是故權勢者人主之車輿也大臣者人主之駟馬也體離車輿之安而手失駟馬之心而能不危者古今未有也是故御馬不調王良不足以取道君臣不和唐虞不能以為治也淮南宋人有取道者其馬不進倒而投之鸂水又復取道其馬不進又倒而投之鸂水如此者三雖造父之所以威馬不過此矣不得造父之道而徒得其威無益於御人主之不肖者有似於此不得其道而徒多其威威愈多民愈不用呂覽造父始習於大豆蜂門始習於甘蠅御大豆射甘蠅而不徙人以為性者也不徒之所以致遠追急也所以除害禁暴也凡人亦必有所習其心然後能聽説上魯定公問於顏回曰子亦聞東野畢之善御乎對曰善則善矣雖然其馬將必佚定公色不悅謂左右曰君子固有誣人也後三日牧來欣之曰東野畢之馬佚兩驂曳兩服入于廄公聞之促駕召顏回回至公曰吾子奚以知之對曰以政知之昔者帝舜巧於使民造父巧於使馬舜不窮其民力造父不窮其馬力是以舜無佚民造父無佚馬今東野畢之御也升馬執轡銜體正矣步驟馳騁朝禮畢矣歷險致遠馬力盡矣然而猶乃求馬不已臣以此知之公曰善誠若吾子之言也願少進乎顏回曰臣聞之鳥窮則啄獸窮則攫人窮則詐馬窮則佚自古及今未有窮其下而能無危者也公悅遂以告孔子孔子對曰夫其所以為顏回者此之類也家語呂覽云東野稷以御見莊公顏闔入見云云事稍同注顏闔去莊公十二世呂之誤也孔子行道而息馬逸食人之稼野人取其馬子貢往請説之畢辭野人不聽孔子曰夫以人之所不能聽説人譬以大牢享野獸以九韶樂飛鳥也乃使馬圉往説之至見野人曰子耕於東海至於西海吾馬何得不食子之禾其野人大説相謂曰説亦皆如此其辨也獨如嚮之人解馬而與之説如此其無方也而猶行外物豈可必哉淮呂儒書稱孔子與顏淵俱登魯東山望吳昌門謂淵曰爾何見曰一匹練前有生藍孔子曰噫此白馬盧芻也使人視之果然論衡見御覽顏淵與孔子俱上魯太山孔子東南望吳閶門外有繫白馬引顏淵指以示之曰若見吳閶門乎顏淵曰見之孔子曰門外何有曰有如係練之狀孔子撫其目而止之因與俱下下而顏淵髮白齒落因以病死蓋精神不能若孔子強力自極精華竭盡故早夭死今本顏淵所以命短暴孔子所以傷其年也若庸馬良馬相追至晚共列良馬宿所鳴食如故庸馬垂頭不復食何異顏淵與孔子優劣桓談新論齊景公好馬命畫工圖而訪之殫百馬之價期年而不得像過實也今使愛賢之君考古籍以求其人雖期百年不可得也符子田子方見老馬於通道喟然有志焉以問其御曰此何馬也其御曰此故公家畜也老罷而不為用出而鬻之田子方曰少而貪其力老而棄其身仁者弗為也束帛以贖之罷武聞之知所歸心矣淮人間韓外傳天下馬徐無鬼因女啇見魏武侯曰吾相馬直者中繩曲者中鉤方者中矩圓者中規是國馬也而未若天下馬也天下馬有成材若恤若失若喪其一若是者超軼絶塵不知其所武侯大説而笑莊子如耳説衛嗣君君悅而太息左右曰公何為不相也公曰夫馬似鹿者而題之千金然而有百金之馬而無一金之鹿者馬為人用而鹿不為人用也今如耳萬乘之相也外有大國之意其心不在衛雖辨智亦不為寡人用吾是以不相也韓子蘇代欲見齊王説淳于髡曰人有駿馬欲賣之見伯樂曰比三旦立於市人莫與言願子還而視之去而顧之臣請獻一朝之價伯樂如其言一旦而馬價十倍今臣欲以駿馬見於王莫臣先後足下有意為臣伯樂乎請獻白璧一雙黃金十鎰以為馬食淳于髡言於王而見之注馬食不欲斥言之春秋後語古之善相馬者寒風是相口齒麻朝相頰子女厲相目衛忌相𩬈許鄙相投伐褐相胸脅管青相頭膹吻陳悲相股腳秦牙相前贊君相後凡此十人者皆天下之良工也其所以相馬者不同見馬之一徵也而知節之高卑足之滑易材之堅脆能之長短非獨相馬然也人亦有徵呂觀表近塞上之人有善術馬無故亡而入胡人皆弔之其父曰此何詎不為福乎居數月其馬將胡駿馬而歸人皆賀之其父曰此何遽不能為禍乎家富馬良其子好騎墮而折其髀人皆弔之其父曰此何不遽為福乎居一年胡人大入塞丁壯者皆引弦而戰近塞之人死者十九此獨以跛之故父子相保幽通賦曰北叟頗識其倚服淮人間武帝詔曰馬或踶奔而致千里士有負俗之纍而立功名夫泛駕之馬跅弛之士亦在御之而已漢書驃騎難諸博士東方朔對曰干將莫耶天下之利劍也水斷鵠雁陸斷馬牛將以補不如一錢之錐騏驥騄耳天下之良馬也將以捕鼠於深宮曾不如跛貓東方朔傳衛后園有送葬時乘輿馬十匹隸卒養視善飲不能乘而馬六十歲乃死桓談新論韓子治嘗以地黃甘草哺五十歲老馬又生三駒又百三十歲乃死抱朴子德州刺史張訥之一白馬其色如練父雄為數州刺史常乘雄薨子敬之為考功郎中改壽州刺史又乘此馬敬之薨弟訥從給事中改德州刺史入為國子祭酒出為常州刺史至今猶在計八十餘極肥健驟腳不散朝野僉載廣漢陽翁偉能聽鳥獸之音乘蹇馬之野而田間有放馬者相去數里鳴聲相聞翁偉謂其御曰彼放馬目眇其御曰何以知之曰罵此轅中馬曰蹇馬蹇馬亦罵之曰眇馬御者不信使往視之馬目竟眇論衡李南乘赤馬行道逢他人乘白馬者白馬先鳴而南赤馬鳴應之南謂從者曰彼馬言汝今當見一黃馬左目肓者是吾子可為告使駚行相及從者不信行二里所果逢黃馬而左目肓南之馬先鳴而肓馬應之問其主果向白馬子也抱朴子世祖會諸將問破賊所得物唯李忠獨無所掠世祖曰我欲特賜忠諸卿得無望乎即以所乘大驪馬及繡被衣物賜之本傳欵假馬援擊交址謂官屬曰從弟少遊常哀吾多大志曰士生一世但取衣食足乘下澤車御款假馬為郡吏守墳墓鄉里稱善人斯可矣求益盈餘但自苦耳東觀漢記兵甲之本夫行天莫如龍行地莫如馬馬者兵甲之本國之大用安寧則以別尊卑之序有變則以濟遠近之難援上銅馬式表八百錢馬虞芝州命辟南陽從事太守張忠連姻王室罪名入重芝依法執按刺史畏勢召芝芝曰吾年往志盡譬如八百錢馬死生同價且欲立效於明時耳遂投傳去長沙耆舊傳孫堅討黃巾乘勝深入于西華失利被創墮馬臥草中軍衆分散不知堅所在堅所騎驄馬馳還營掊地呼鳴將士隨馬向草中乃得堅扶還營吳書伏櫪老驥伏櫪志在千里烈士暮年壯心不已曹操樂府杜摯與毌丘儉詩云騏驥馬不試婆娑槽櫪間壯士志未伸坎軻多辛酸文章敘録孫權征合肥敗馬上津橋橋南已徹丈餘無板谷吉利在馬後使權持鞍緩轡於後著鞭以助馬勢遂得超渡江表傳惡香朱建平善相馬文帝將出取馬外入建平道遇之語曰此馬之相今日死矣帝將乘馬馬惡衣香驚齧帝膝帝怒殺之魏志駑馬戀棧豆桓範出赴曹爽宣王謂蔣濟曰智囊往矣濟曰範則智矣駑馬戀棧豆爽必不能用也于寶晉紀中盧縣西山中有一道漢時嘗有數百匹馬出其中今名馬穴人于此得馬頓宿遂名騎亭馬形皆小似巴滇馬三國時陸遜攻襄陽又值此穴中有數十匹馬出遜載還建業蜀使來有五部兵家湞池者識其馬色云是已亡父所乘對之流涕因名地道為白馬坑襄陽記夷陵縣北三十里有石穴名曰馬穿常有白馬出穴食人逐之入穴潛行出漢中漢中人失馬亦常出此穴相去數千里水經二十四泥馬章震號王子能以泥作馬日行千里葛洪神仙傳解馬性王濟善解馬性嘗乘一馬著連錢障泥前有水終日不肯渡王云此必是惜障泥使人解去便徑渡世説馬癖武子性愛馬亦甚別之故杜預道王武子有馬癖和長輿有錢癖武帝問杜預卿有何癖對曰臣有左傳癖語林王湛字處沖居墓次兄子濟往省濟性好馬而所乘馬駿駃意甚愛之湛曰此小駚然力薄不堪苦近見督郵馬當勝此但養不至耳濟取督郵馬榖食十數日與湛試之湛未嘗乘馬卒然便馳騁步驟不異於濟而馬不相勝湛曰今直行車路何以別馬勝不唯當就蟻封耳於是就蟻封盤馬果倒踣鄧粲晉記王武子被責移第北邙下于時人多地貴濟好馬射買地作埒編錢匝地竟埒時人號曰金溝世説溝一作埒王戎頴脫不持儀形好乘巴馬雖為三司率爾私行巡省田園不從一人自以手巾插腰竹林七賢論陳安為河間王顒給使甚壯健常乘一馬駿快非常后馬死雙赤蛇出其鼻靈鬼志晉明帝時有獻馬者夢河神請之及至與帝夢同即投河以奉神始太傳禇褒亦好此馬帝云已與河神及禇公卒軍人見云乘此馬矣志怪支道林常養數匹馬或言道人畜馬不韻支曰貧道重其神駿世説支道菴在南峰古號支硎山今有白馬澗支飲馬處也菴傍石上有馬足四云是道林飛步馬迹也吳郡志苻堅時大宛獻天馬千里駒皆汗血朱鬣五色鳳膺麟身命群臣作止馬詩而遣之示無欲也晉載記苻堅為慕容沖所襲堅馳騧馬墮而落澗追兵幾及計無由出馬即踟蹰臨澗垂鞚與堅堅不能及馬又跪授焉堅攀之得登岸而走盧江異苑太上四年兗州民王蒲率衆二千來降獻美女馬一匹羊鬚去地九寸拜蒲長水校尉廩丘公崔鴻十六國春秋侯景所乘白馬每戰將勝輒躑躅嘶鳴氣意俊逸其有奔衄必低頭不前及石頭之役精神沮喪臥不肯動景使左右拜請或加箠策終不肯進南史權會為國子博士武平末自府還第在路無故馬倒遂不得語因暴亡會生平畏馬位望既至不得不乘果以此終王世充兄子偽代王琬使于竇建德軍中乘陏煬帝所御驄馬鎧甲甚鮮逈去軍前以誇衆太宗曰彼之所乘真良馬也尉遲敬德請往取之乃與高甑生梁建方三驥直入賊軍擒琬引其馬以歸舊唐尹神童每説伯樂令其子執馬經畫樣以求馬經年無有似者歸以告父更令求之出見大蝦蟆謂父曰得一馬略與相同而不能具伯樂曰何也對曰其馬隆顱跌目脊郁縮但蹄不如纍趨耳伯樂曰此馬好跳擲不堪御也子笑乃止朝野僉載中宗時殿中奏蹀馬之戲宛轉中律遇作飲酒樂者以口銜杯臥而復起吐蕃大驚景龍文館記玄宗嘗令教舞馬四百匹分為左右目為某家寵某家嬌時塞外亦以善馬來貢者上俾教習無不曲盡其妙因命衣以文繡絡以金鈴飾其鬣間雜以珠玉其曲謂之傾盆一作杯樂若歌其曲奮首鼓尾縱橫應節又於三層板床馬乘而上旋轉如飛或命壯士舉一榻馬舞於榻上樂工數十人立于左右前後皆衣淡黃衫文玉帶必求少年而姿貌美秀者每千秋節常命舞於勤政樓下其後上既幸蜀舞馬亦散在人間祿山嘗覩其舞而心愛之自是因取數十匹置於范陽其後轉為田承嗣所得而承嗣不知雜之戰馬置之外棧忽日軍中大享士樂作馬舞不能自止厮養輩謂其為妖擁篲以擊之馬謂其舞不中節抑楊頓挫尚存故態廄吏劇以為怪白承嗣命箠之甚酷馬舞益整而鞭捶愈加竟斃於櫪下時人亦有知其舞馬者懼田暴逆而終不敢言明皇雜録寧王方集賓客粥馬牙人麴神奴者詣呈二馬焉寧王即於中堂閲試座客視之不相上下寧王顧謂神奴曰其價幾何牙人先指曰此一千緍次指曰此五百緍寧王欣然如言付錢賓客莫測其價之懸殊即令鞭轡馳驅往復數回笑謂座客曰辨其優劣否皆曰不知寧王乃顧千緍者曰此馬緩急百返蹄下不起纖埃復顧五百緍者曰此馬往來十過足下頗生塵埃以此等第其價之高下焉坐客乃服集異記長安俠少每到春時結朋聯黨各置矮馬飾以錦韀金𩊚並轡於花樹下往來使僕從執酒皿而隨之遇好囿則駐馬而飲天寶遺事化龍柳宗元龍馬圖贊云明皇時靈昌郡得異馬於河其狀龍鱗虺尾拳毛環目肉鬣居帝間二十年遇禍亂帝西幸馬至咸陽西入渭水化為龍遊泳去不知所終安祿山肥每乘驛入朝半道必易馬號大夫換馬臺不爾馬輒仆故馬必能負五石馳者乃勝載新唐唐郎中張元一以唐波若矮短自為鬱屈蜀馬朝野僉載大馬劉從諫鎮潞獻九尺馬武宗不納唐書黠戛斯古堅昆國也畜馬至壯大以善鬥者為頭馬回紇傳西域有馬高丈餘人皆行于馬腹下往來無礙癸辛雜志前生為馬劉三復以文章見知於李德裕能記三生事云曾為馬馬常渴望驛而嘶傷其蹄則連心痛後三復乘馬磽確之地必為緩轡有石必去之其家不置門限慮傷馬啼也北夢瑣言人語路巖成都移渚宮所乘馬忽作人語且曰蘆荻花此花開後路無家不久及禍上報冤河東裴光遠為滑州渭南宰性甚貪殘尤好擊鞠雖九夏蒸鬱亦不暫息畜一白馬俊健能馳竟以暑月不勝其役而斃於廣場之內又計殺里長王表而奪其子大順辛亥裴遘疾逾月時若為鬼物所重獨言曰王表來也少頃曰白馬來也仍自代表及馬語責之苦求不免數日而卒三水小牘徐台符仕晉為翰林學士中書舍人契丹之陷中原也台符從虜帳北至於薊門及虜中內潰乃竄身南歸初台符所乘馬好嘶鳴及自虜中回向常露於草中雖胡騎連群經其左右而台符馬若椎其口然及行至漢地即嘶鳴如故時人以為積善之所感也周史偽蜀渠陽鄰山有富民王行思嘗養一馬甚愛之勞粟餘飼甚于他焉一日因乘往本郡遇夏潦暴漲舟子先渡馬回舟以迎王氏至中流風起船覆其馬自岸奔入駭浪接其主蒼茫之中遽免沉溺警戒録江夢孫知天長縣民爭馬二年不決馬係於官亭孫曰管仲以老馬識路王忳馬歸其故第遂縱馬郊外馬乍什羈來果奔入主家訟遂息南唐娌安涅烈衮善識馬嘗行郊野見數馬迹指其一曰此奇駿也以己馬易之果然遼史二距興國中靈州貢馬各有二距其後靈州陷於西戎宣和中燕山貢馬亦然而北虜之禍遂作老學菴筆記大德十年西域貢千里馬其馬食肉每旦必以羊肉酥油沙糖胡椒和飯秣之趙孟俯于杭州館中見之霏雪録貴州養龍坑泓渟淵深靈物藏其下當春初夷大立柳坑畔擇牝馬係之已而雲物晦冥有物蜿蜒與馬接必産龍駒元末偽夏明升得一白馬首高九尺長丈餘乘之如躡雲一塵弗驚後以獻之賜名飛越峰志會無縣有元馬河元馬日行千里死於蜀今元馬冢是也縣有元馬祠家人牧山下或産駿駒元馬子也華陽國志天下有道却走馬以糞天下無道戎馬生郊王弼曰天下有道修于內而已故却走馬以糞田老子夫馬陸居則食草飲水喜則交頸相靡怒則分背相踶馬知己此矣夫加之以衡扼齊之以月題而馬知介倪闉扼鷙曼詭銜竊轡故馬之知而能至盜者伯樂之罪也莊子驊騮騹驥纖離緑耳此皆古之良馬也然而前必有銜轡之制後有鞭策之威加之以造父之馭然後一日而致千里也荀性惡張敞弟武為梁相敞使吏問何以治梁武曰馭點馬者利其銜策敞傳册錣今有良馬不待册錣而行駑馬雖册錣之不能進為此不用册錣而御則愚矣淮修務夫馬之為草駒之時跳躍揚𨂜翹尾而走人不能制齕咋足以噆肌碎骨蹶𨂜足以破盧陷胸及至圉人擾之良御教之掩以衡扼連以轡銜則雖歷險塹弗敢辭也故其形之為馬馬不可化其可駕御教之所為也馬聾蟲也而可以通氣志猶待教而成又況人乎上狂馬不觸木猘犬不自投于河雖聾蟲而不自陷又況人乎説林訓元稹和李文饒述夢詩云借騎銀杏葉橫賜錦垂萄注云學士初入例借飛龍馬會昌品集馬生下墮地無毛行千里尿舉一腳行五百里蘭筋堅者千里馬色如團趐千里三軍莫逐但知所發不知所宿也一筋從玄中出謂之蘭筋玄中者目上陷如井字相馬經夫騄驥垂耳於埛牧鴻雀戢翼於汙池褻之者固以為園囿之凡鳥外廄之下乘也及其整蘭筋揮徑翮陵厲清浮顧盻千里豈可謂其借翰於晨風假足於六駁哉詩云駕彼四牡四牡項領抱朴子嘉遁篇曰空谷有項領之駿者孫陽之耻也太平遺冠世之才者賞真之責也勗學篇曰抱翼之鳳奮翮于清虛項領之駿騁迹于千里體名有輸鼠外鳧烏頭龍翅虎口豬槽飼馬石灰泥槽汗而繫門三事落駒酉陽雜俎紺馬轉輪王有紺馬之寶名婆羅訶色青體尾毛悅澤頭黑髮披有神通力騰空而行日初出時乘此馬寶周流大地還至本宮乃始進食起世經瑞應經云佛生之日王家青衣復産一兒廄中白馬亦乳白駒奴字車匿馬曰𤙶陟王常使隨太子本起經云其駒毛色純白騣𩥂貫珠名為蹇持奴曰闡持回鶻其地出玉犛牛緑野馬獨峰駝白貂鼠騊駼之革五代史虜中議蘭馬五白馬也亦曰玉面瓜州飼馬以薲草沙州以茨箕涼州以勃突渾蜀以稗草以蘿蔔根飼馬馬肥安北飼馬以沙蓬根針酉陽雜俎解人語大食國馬解人語上撒豆驄唐鄭馴名器有馬曰撒豆驄廣異記稱匹馬一匹俗説相馬及君子與人相匹或曰馬夜行目明照前四丈故曰一匹或曰度馬縱橫適得一匹或説馬死賣得一匹帛或云春秋左氏説諸侯相贈乘馬束帛帛為匹與馬之相匹耳風俗説顏回望吳門焉見一匹練孔子曰馬也然則馬之光景一匹長耳故後人號馬為一匹韓詩外傳疲馬不能度繩俗云馬羸不能度繩索或云不能度種萊畦塍也謹按齊有澠水裁廣三四步言馬之疲乃不能度此水耳又曰蝦蟇一跳八尺再丈六從春至夏祼袒相逐無他所掉尾肅肅按蝦蟇無尾當言夏馬夏馬患蠅蚋掉尾擊之故肅肅也風俗通按九鼎記及青靈經言人物之死俱有鬼也馬鬼常以晦夜出行狀如炎火抱朴子凡達兵事急能致風雨突圍而走者蓋有赭丹隨身耳赭丹者馬腹中所産之物用之念咒即致風雨如狗寶牛黃之類䟃𧽼䩛馬䟃𧽼以騰擲迅象飛控以馳驅馬名諸葛頴子字漢撰馬名録二卷行於世隋書大物物萬物也牛為大物天地之數起於牽牛説文東至牽牛牽牛者言陽氣牽引萬物出之也牛者冒也言地雖涷能冒而生也牛者耕植種萬物也史律書世本曰𩨬作服牛𩨬黃帝臣也又曰少昊時人始駕牛始作牛耕稷之孫曰叔均是始作牛耕注始用牛犁也山海經文王在鄗召太子發曰吾語汝童牛不服童馬不馳是謂大仁周書六角周成王時東夷送六角牛述異記天子飲於文山有獻良馬駟牥牛二此牛能行沙中如橐馳穆天子傳犬戎人觴天子于雷首之阿及獻良馬四匹天子使孔子牙受之爰有黑牛白角也穆天子傳武都故道有怒特祠祠上生梓樹焉秦文公使人伐之輒有大風雨樹創隨合經日不斷乃益發卒持斧者三四十人猶不斷士疲還息其一人傷足不能行臥樹下聞鬼語樹神曰勞乎攻戰其一人曰何足為勞又曰秦公必不休如之何答曰秦公其如豫何又曰秦若使人被髮以朱絲繞樹赭衣灰坌伐汝汝得不困耶神無言明日病人語聞公如其言伐樹斷中有一青牛出走入豐水中其後牛出豐水中使騎擊之不勝有騎墮地復上髮解牛畏之乃入水不敢出故秦自是置旄頭騎録異傳搜神記玄中記作始皇寧戚欲干齊桓公窮困無以自進於是為商旅將任車以至齊暮宿於郭門之外桓公郊迎客夜開門辟任車爝火甚盛從者甚衆寧戚飯牛居車下望桓公而悲擊牛角疾歌桓公聞之撫其僕之手曰異哉之歌者非常人也命後車載之桓公反至從者以請桓公賜之衣冠將見之寧戚見説桓公以治境內明日復見説桓公以為天下桓公大説將任之群臣爭之曰客衛人也衛之去齊不遠君不若使人聞之而固賢者也用之未晚也桓公曰不然問之患其有小惡以人之小惡亡人之大美呂覽歌曰南山研白石䃹生不逢堯與舜禪短布單衣裁至骭長夜冥冥何時旦琴操秦穆公使價人載鹽徵諸賈人賈人買百里奚以五羖羊之皮使車將之秦穆公觀鹽見百里奚牛肥曰任重道遠以險而牛何以肥也對曰臣飲食以時使之不以暴有險先後之以身是以肥也穆公知其君子也以為上卿説苑昔百里奚賢秦穆公欲干之繆公好牛因賃官以養牛蹄上乘肉三寸公使禽息視牛息入言之公不信怒息復言之公又怒吏曰再怒其主罪當刖使守門公出禽息跪而請之曰夫養牛者願君勿忽也公乃問百里奚曰臣之長非養牛者也乃養民也公視牛察之則賢人也遂與同車而出謝禽息息曰所以不死者君未知客也今已知之矣乃觸門而死張溫自理表介葛盧來朝聞牛鳴曰是生三犧皆用之矣其音云問之而信左僖二十九秦潛伐鄭及滑鄭商人弦高將市於周遇之以乘韋先牛十二犒師曰寡君聞吾子將師涉於弊邑敢犒從者且使遽告于鄭秦將孟明曰鄭有備矣滅滑而還僖三十三徛頓魯之窮士聞陶朱公富往問術焉告之曰子欲速富當畜五牸於是乃適西河大畜牛羊于徛氏之南十年之間其滋息不可計資擬王公馳名天下以興富徛氏故曰徛頓孔叢子宋人有好行仁義者三世不懈家無故黑牛生白犢以問孔子孔子曰此吉祥也以薦上帝居一年其父無故而肓其牛又復生白犢其父又復令其子問孔子其子曰前問之而失明又何問乎父曰聖人之言先忤後合其事未究姑復問之其子又復問孔子孔子曰吉祥也復教以祭其子歸致命其父曰行孔子之言也居一年其子又無故而肓其後楚攻宋圍其城民易子而食之析骸而炊之丁壯者皆乘城而戰死者太半此人以父子有疾皆免及圍解而疾俱復列子庖丁為文惠君解牛曰臣之刀十九年矣所解數千牛矣而刀刃若新發於硎彼節者有間而刀刃者無厚以無厚入有間恢恢乎其於遊刃必有餘地矣莊屠牛坦朝解九牛而刀可以剃髮則刃遊於其間也管子路拯溺者其人拜之以牛子路受之孔子曰魯人必拯溺者矣呂察微公明儀為牛彈清角之操伏食如故非牛不聞不合其耳矣轉為蚉虻之聲孤犢之鳴即掉尾奮耳蹀躞而聽牟子綏安縣北有連山昔越王建德伐吳得牛其大千石以童男女三千人牽之既而入船俱墜于潭時之聞附船有騞然之聲往往有青牛與船俱見神靈之至南越志今名越王潭衣繡或聘于莊子莊子應其使曰子見夫犧牛乎衣以文繡食以芻菽及其牽而入于太廟雖欲為犢其可得乎莊漁父元封三年大秦獻花蹄牛高六尺尾環繞角生四耳角端有肉蹄如蓮華洞冥記元封中大秦獻牛善走多力使輦銅石起望仙宮迹在石上皆如花形故陽關之外有花牛津上漢武拜少翁為文成將軍少翁為帛書以飯牛詳不知言曰此牛腹中有奇殺視得書書言甚怪天子識其手書問其人果是偽書於是誅文成隱之史記長沙西南有金牛岡漢武時有一田父牽赤牛告漁人欲渡江漁人云船小豈勝得牛田父曰但相容不重君船於是人牛俱上及半江牛糞於船田父曰以此相贈既渡漁人怒其污船以橈撥糞棄水欲盡方覺是金訝其神異乃躡之但見人牛入嶺隨而掘之莫能及也今掘處猶存湘中記武帝末年詔曰方今之務在于力農以趙過為搜粟都尉耦犂二牛三人民或苦少牛亡以趙澤故平都令光教過以人挽犂食貨志趙過創三犂之巧而關右以足任延教九直之佃而黎庶殷飽抱朴子漢建武二十一年有人騎白年蹊入田田父訶詰之乃曰吾北海使將看天子登封遂乘牛上山田父尋至山惟見牛迹遺糞皆為銀明年世祖封禪酉陽雜俎梁冀遣客齎書詣京兆并貨牛黃延篤殺之吳普本草牛黃味苦無毒牛出入呻者有之夜有光走角中牛死入膽中如雞子黃神農本草曰療驚癇除邪逐鬼後漢萬歲樹精為青牛漢桓帝出遊河上忽有一青牛從河中出走踼帝人皆驚走太尉何公河時為殿中將軍有勇力走逆牛牛見公走還河公以手挽牛左足右手持斧斫牛頭而殺之此青牛者萬年之木精也玄中記山有大松或千歲其精變為牛嵩高記觸墻成字大司農鄭玄牛角抵墻成八字佩觿魏文帝迎美人薛靈藝駕青色駢蹄之牛日行三百里此牛尸塗國所獻足如馬蹄也拾遺記杜預奏事曰臣前在南聞魏興西北山有野牛野羊牛之大者二千斤羊之大者千數百斤試令求之各得一枝并頭角蹄案其形不與中國牛羊相似然亦是野獸中所希有何曾性華侈都官從事劉享嘗奏曾以銅鉤黻紖車瑩牛蹄角後曾辟享為掾或勸勿應享謂至公之體不以私憾遂應辟晉書千里茍晞為兗州鎮去京師五百里有貢晞珍異食者欲貽都邑親貴慮經信宿之間不復鮮美募有牛能日行數百里者當厚賞之有人進一牛云此一日行千里晞乃命其丁車善馭之書疏發遣旦發日中到京師取答書還至一更始竟便達晞以其駿快筯骨必將有異遂殺而觀之亦無靈異唯見雙筋如小竹大自頭挾脊著肉褁故外不覺也祖台之志怪王君夫愷有牛名八百里駮嘗塋其蹄角王武子語君夫我射不如卿今指卿牛以千萬對之君夫既恃手快且謂駿物無有殺理便相然可令武子先射武子一起便破的郤據胡床叱左右速探牛心來須臾炙至一臠便去世説臣按相牛經云陰虹屬頸千里注曰陰虹者雙筋白尾骨屬頸寧戚所飯者也愷之牛其亦有陰虹也注石崇牛形狀氣力不勝王愷牛而王愷出遊極晚發爭入洛城崇牛數十步後迅若飛禽愷牛絶走不能及乃密貨崇馭人問牛所以駛馭人云牛本不遲由將車人不及制之爾急時聽偏轅則駛矣愷從之遂爭長石崇後聞殺告者世説明帝問周伯仁真長何如人答曰故是千斤犗特王公笑其言伯仁曰不如捲角牸有盤辟之好世説以戲王也犗界桓公入洛過淮泗踐北境與諸僚屬登平乘樓眺矚中原慨然曰遂使神州陸沉百年丘墟王夷甫諸人不得不任其責袁虎率爾對曰運自有廢興豈必諸人之過桓公凛然作色顧謂四坐曰諸君頗聞劉景升不有大牛重千斤噉芻豆十倍於常牛負重致遠曾不若一羸牸魏武入荊州烹以饗以卒于時莫不稱快意以況袁四坐既駭亦失色世説拜乞命桓沖鎮江陵正會當烹牛牛忽熟視帳下督都目中淚下都督呪之曰汝若向我跪者當啓活也牛應聲而拜衆皆異之督都復謂曰汝若須活遍拜衆人牛涕隕如雨遂遍拜值沖醉不得啓遂殺牛沖聞大怒都督痛加鞭罰渚宮故事元嘉中益州刺史吉翰遷為南徐州先於蜀中載一青牛下常自乘恆於目前養視翰搆疾多日牛亦不肯食及亡牛流涕滂沱吉氏喪未還都先遣驅牛向宅牛不肯行人知其異即待喪喪既下船便隨去幽明録魏道武謂尚書崔玄伯曰蠕蠕之人昔來號為頑嚚每來抄掠駕牸牛奔遁驅犍牛隨之牸牛伏不能前異部人有教其以犍牛易之者蠕蠕曰其母尚不能行而況其子終於不易遂為敵所虜元魏桓帝馬不能勝常乘安車駕大牛角容一石魏書白𤚎牛齊明帝賜蕭胄以所常乘白𤚎牛陳顯達家既豪富諸子與王敬則諸兒並精車牛麗服飾當世快牛稱陳世子青王三郎烏呂文顯折角江瞿曇白鼻而皆集陳舍南齊書齊有一奉朝請家甚衆侈非手殺牛噉之不美年三十許病篤大見牛來舉體如被刀刺叫呼而終顏氏家訓殺報梁孝元在江州時有人為望蔡縣令經劉敬躬亂縣廨被焚寄寺而住民將牛酒作禮縣令以牛繫利柱屏除形像鋪設床坐於堂上接賓未殺之頃牛解徑來至階而拜縣令大笑命左右宰之飲噉醉飽便臥簷下稍醒而覺體癢爬搔隱疹因爾成癩十許年死上唐鳳閣侍郎李元素進瑞一作牛一頭額上有萬字賜馬一匹李矯代為謝表云萬為盈數化成于大武之元者粹文煥炳於純離之畜英華龐帝師養一牸牛一赤犢子前後生五犢得絹一百匹及翻轉至萬時號金犢子朝野僉載唐豫章令賀若瑾眼皮急項轅粗張鷟號為飽乳犢子上北人牛疲者多以蛇灌鼻口則為獨肝水牛有獨肝者殺人逆賊李希烈食之而死酉陽雜俎有士人平生好食爊牛頭一日忽夢其物故拘至地府酆都獄有牛首阿旁其人亦無畏憚仍以手撫阿旁言云只這頭子大堪爊阿旁笑而放回傳載寧茵假大僚莊南山下月夜有叩關稱桃林班特處士相訪繼而南山班寅將軍來謁茵為置酒及明視門外惟牛蹄虎迹而已傳奇唐末劉訓者京師富人梁氏開國嘗假貸以給軍京師春遊以觀牡丹為勝賞訓邀客賞花乃繫水牛數百在前指曰此劉氏黑牡丹也夫畜生賤也然有尤善者皆見記識故馬稱驊騮驥騄牛譽郭椒丁櫟桓談新論摯雉兔則鸞鳳不及鷹鷂引耕犁則龍鱗不逮雙特抱朴子夫氂牛其大如垂天之雲此能為大矣而不能執鼠莊子犛牛出西域尾長而徑中國以為纓人或射之乃自斷其尾瓊州不産驢馬人多騎黃牛亦飾以鞍韉加之銜勒可騎者皆自小習其步驟亦甚穩快者嶺表録異合浦合浦牛如橐駝案頂上有特骨大如覆斗足健疾其行三日如馬百里異物志引牧牛項上惟肉大如斗出徐門餘同初學記麒牛麒牛似鹿又似羊肉美皮溫常處滇濱也郭義恭廣志周留州留者其實水牛蒼毛豕身角若擔矛衛護其犢與虎為讎鬱林異物志周留牛毛青大腹鋭頭青尾其狀似豬上夔牛岷山多夔牛山海經注曰今蜀山中有大牛重數千斤名為夔牛晉太興元年此牛出上庸郡人弩射殺得三十八擔肉即爾雅所謂犩臨洮之境有山民曰仲小小衆號仲野牛平生以採獵為務臨洮以西至于疊岩潘岷之境數群良田自祿山以來陷為荒徼其間多産竹牛一名野牛其色紙黑其巨一敵六七駱駝肉重千萬斤者其角二壯夫可勝其一每飲齕之處則拱木藂竹踐之成塵獵人先縱犬逐之俟其奔迸則毒其矢伺便射之洎中鏃則躡其蹤緩逐之矢毒發處即斃踣之如山積肉如阜一牛至于肉數千斤新鮮者甚美縷如紅絲線乾寧中小小之獵遇群牛於石塜山嗾犬逐之其牛驚擾奔一深谷谷盡南抵一懸崖犬逐既急牛相排蹙居其首者失腳墮崖居次者不知其偶墮纍纍接迹而進三十六頭皆斃于崖下積肉不知紀極秦成階三州士民荷擔之不盡玉堂間話角乘梧州出獨峰牛土人乘騎如馬謂之角乘海録碎事郡國志竇州特亮縣昔有白牛夜出光影照於人見牛光號為特亮北虜之先索國有泥師都二妻生四子一子化為鴻遂委三子謂曰爾可從古旃古旃牛也三子因隨牛牛所糞悉成肉駱酉陽雜俎天竺波羅奈國有稍割牛黑色角細長可四尺許十日一割或不至十日一割便困病或致死人服其血皆老壽國人皆壽五百歲牛壽一等于人什法盛歷國傳東夷占骨東夷之人以牛骨占事呈示吉凶無往不中牛非含智之物骨若有此之效楊方五經釣沉不花虜呼牛為不花世祖賜楊漢英名以賽因不花謂以華言賽因好也不花牛也世史正綱大月支及西胡有牛名日及牛以今日割取其肉三四斤明日其肉已復瘡亦愈漢人入此國以牛示之以為珍異漢人曰吾國有蟲大小如指名為蠶食桑葉為人吐絲外國人不復信有蠶也玄中記越嶲國有牛稍割取肉經日必復生慱物志九真有𤚫牛形如牛而大頭白身黑角長二丈堪為酒器寰宇記扶桑國有牛角甚長以角載物至勝二十斛南史駛牛日南多駛牛日行數百里異物志淨梵西國土俗以牛能耕地出生萬物故以牛糞為淨梵王帝釋及牛並立神廟以祠之佛隨俗情故同為淨耶舍法師傳石牛在城西石虎當衰石牛夜鳴聲聞三十里事奏虎虎使人打失牛耳及尾以鐵丁釘四腳今具存楊龍驤洛陽記陽光號山陽光之山獸多橐駝善行流沙中日三百里負千斤山海經駝背有兩峰如鞍其足三節色蒼褐凡欲脊載輒先屈足受之所載未盡量終不起古語謂之橐他爾雅翼泉渠橐駝之本出泉渠淮南萬畢術南單于上書獻橐駝單于歲祭三龍祠走馬鬪橐駝以為樂事東觀漢記高祖不飲洛水常以千里足明駝更互回恆州取水以供贍焉後魏書明皇時交趾貢龍腦香禁中呼為瑞龍腦上賜貴妃十枚妃私發明駝使持三枚遺祿山明駝使腹下有毛夜能明日馳三百里楊妃外傳駝性羞木蘭篇明駝千里腳多誤作鳴字駝臥腹不帖地屈足漏明則行千里酉陽雜俎耕餘博覽云明駝使眼下有毛夜明見物日行三百餘里亦異人也誤迷密國迷國正平元年遣使獻一峰黑橐駝北史八十五磁州山中有竹林寺五百羅漢所居隱而不見按齊志云天寶末嘗使人往此寺取經函使者辭以不知文宣曰卿取我駱駝乘之則自至矣使者入山果見一寺之門有數僧相謂曰高洋駱駝來也問使者曰爾天子使汝來何求曰帝命于寺東廊從北第一房取經函及尺八黃帕等僧共取與之後不復見胡礪鼓山常樂寺碑虞孝仁性奢華伐遼之役以駱駝負函盛水養魚以自給宋孫承祐從太宗伐以駱駝負大斛貯水養魚自隨天官侍郎吉項長大昂頭行視郎中張元一目為望柳吉駱駝哥舒翰嘗鎮于青海路既遙遠遣使嘗乘白駱駝以奏事白駝日行五百里明皇雜録廬山精乾符中劉秉仁為江州刺史自京將駱駝至郡因風而逸于廬山下南土無此畜人見而大驚因擊射至斃乃以狀白州曰獲廬山精劉公訝其事既至愀然曰此吾橐駝也乃命痤于江壖三水小牘雙峰成自虛自渭南晚過東陽驛遇雪夜止佛廟有老病僧曰安知高在焉夜吟詩曰擁褐藏名無定蹤流沙千里度衰容傳得南宗心地後此身應便老雙峰梁朱溫常言于明皇趙崇是輕薄圓頭於鄂州坐上佯不識駱駝呼為山驢南部新書鬼乘龍周世祖征濠夜遣兵持炬乘橐駝絶淮濠兵驚以為鬼乘龍也遂名乘龍洲寰宇記有駝坊使臣夜坐聞戶外語云舍人來日當有萬里之役然遂免此苦吾將奈何答云諫議願自寬會當免耳使臣竊窺之乃庭中二駝也次早有旨差一駝載軍衣入蜀遂死蜀中王清明投轄録西域大月氏國出一封橐駝注脊上有一封也封言其隆高若封土也今俗呼為封牛漢書吐番獨峰駝日行千里焞煌西渡流沙往外國流沙千餘里中無水時有伏處人不能知皆乘駱駝知水脈遇其處輒停不肯行以足踏地人於踏處掘之輒得水慱物志鄯善古樓蘭國也西北有流沙數百里夏日有熱風為行旅之患風之欲至唯老駝知之即鳴而驟立埋其口鼻於沙中人每以為候亦即將氈擁蔽鼻口其風迅駛須臾過盡若不然者必至危斃後周異域傳風腳駝于闐有小鹿角細而長與駝交生子曰風腳駝日行七百里其疾如風洽間記波斯國出名馬大駝及駝往往有日行七百里者富室至有數千頭北史兩腳滑國者車師之別種也有兩腳駱駝野驢有角南史糞煙如狼駱駝糞煙直上如狼煙駝峰駝峰倒者齒老矣少健者峰直瑣碎録駝聲義訓曰牛之聲曰牟駝之聲曰𡇼西域拘夷國山有石駱駝腹下出水以金鈇及手承取即便對過瓠蘆盛之者則得飲之令身體香淨而升仙其國神祕不可數遇異苑漢驪驢一曰漢驪其子曰𩥃何承天纂文奇畜胸奴奇畜即驢騾也史記駕驢靈帝於宮中西園駕四白驢躬自操轡驅馳周旋以為大樂於是公卿貴戚轉相倣效至乘輜軿以為騎從互相侵奪賈與馬齊夫驢乃服重致遠上下山谷野人之所用耳何有帝王君子而驂服之乎遲鈍之畜而今貴之天意若曰國且大亂賢愚倒植凡執政者皆如驢也後五行志漢靈帝養驢數百頭常自騎之驅馳遍京師有時駕四驢入市金樓子薊子訓駕驢車與諸生俱詣許下道過滎陽止主人舍而所駕之驢忽然卒僵蛆蟲流出主遽白之子訓曰乃爾乎方安坐飯食畢徐出以杖扣之驢應聲奮起行步如初即復進道其追逐觀者常有千數後漢諸葛恪父瑾長面似驢孫權大會群臣使人牽一驢入長檢題其面曰諸葛子瑜恪跪請筆益兩字續其下曰之驢舉坐歡笑乃以驢賜恪吳志作鳴王濟卒將葬時賢無不畢至孫楚雅敬濟而後來哭之甚哀客莫不垂涕哭畢向靈床曰卿嘗好我作驢鳴我為卿作之體似聲真賓客皆笑楚顧曰諸君不死而令王濟死乎晉書頭當似豬考武帝末嘗見驢謝大傳問陛下遙相其形當何所似孝武掩口而笑答曰頭當似豬世説王導謂諸葛恢曰人言王葛不言葛王恢曰人言驢馬不言馬驢豈驢勝馬也晉書釋道安宇內式瞻嘗乘赤驢往來荊襄間朝夕而見今河東寺上有驢臺峴南有中驢村史或云皆虛也中驢之名本是閭國郗國之故地也耀靈後廢帝於耀靈殿上養驢數千宋書驢王東海王凡劣前廢帝號為驢王劉休仁傳魏元坦傲狼凶粗安豐王延明每切責之曰昔宋有東海王禕志性凡劣人號曰驢王我熟觀汝所作亦恐不免驢號當時聞者號為驢王北史王奐初拜僕射劉祥與奐子融載行至中堂見路人驅驢祥曰驢汝好為之如汝人才皆已令僕矣南齊運糧受絹公孫軌字元慶為虎牢鎮將初太武將北征發民驢以運糧使軌部調雍州軌令驢主皆加絹一匹乃與受之百姓語曰驢無強弱負絹自壯衆共嗤之坐徵還後魏書陳後主入隋文帝問監者叔寶何嗜對曰嗜驢肉問飲酒多少曰與其子弟日飲一石文帝大驚南史蘇世長容貌醜陋頗有學識性滑稽言雜諧調隋大業中為都水使者煬帝嘗謂之曰卿面何類驅驢世長再拜叫呼以手據地蹙項敗面為驅驢之狀群臣掩口而笑煬帝大悅賜帛百匹舊唐武后初稱周恐下心不安乃令人自舉供奉官正員外多置裏行拾遺補闕御史至有車載斗量之詠有御史臺令史將入室值裏行御史數人聚立門內令史不下驢衝過其間諸御史大怒將杖之令史云今日之過實在此驢乞先數之然後受罰御史許之謂曰汝技藝可知精神極鈍何物驢畜敢於御史裏行於是羞赧而止國朝傳記唐楊炯每呼朝士為麒麟楦或問之曰今假弄麒麟者必修飾其形覆之驢上宛然異物及去其皮還是驢耳無德而朱紫何以異是僉載王及善後為右相無甚施設惟不許令史輩將驢入堂終日驅逐號驅驢宰相上郭英乂知運子也鎮劍南頗恣狂蕩取女人令乘驢擊毬以寶鈿為驢鞍賞賜巨萬以為笑樂唐書跨長耳咸通末執政以進士車服僣差奏請不許乘馬時場中不下千人皆跨長耳或嘲之曰今年勑下盡騎驢短轡長鞦滿九衢清瘦兒郎猶自可就中愁殺鄭昌圖鄭光業軀幹偉大故云托言唐夏侯籍學吟詩遊西川依託勳臣為幕下從事時人號為夏侯驢子言其鄙也北夢瑣言漢高祖鎮太原周太祖為漢衛時令隱帝監符璽頗相戲狎暨從征鄴城旦夕同侍一旦語太祖曰我夜來夢爾為驢負我升天既捨爾乘俄變為龍捨我南去何祥也曰公謂驢作少意知勿空見玩撫掌而罷册府陸軫云天聖中侍中馮拯卒次年京城南錫慶院側人家生一驢腹下白毛成馮拯二字馮氏以金贖之潛育於室中四方皆知之泊宅編嶺南有馹名翠嵐往來者多飼馬堂上吏止之不聽乃題璧云犬馬本非堂上畜莫言郵舍暫經過大都人畜須分別不聽鶯聲可奈何聽鶯聲者蓋昔人為驢吃牡丹賦云展似鐵之雙蹄驚回蝶夢聳如船之兩耳不聽鶯聲驛吏之言出此墨客揮犀代呼驢為衛於文字未見今衛地出驢義在斯乎或説以其有胄有槽譬如諸衛有胃曹也因目為衛資暇集或曰晉衛玠好乘之故以為名爾雅翼欭矣㰳亞驢鳴也率以午及五更初而鳴有驢仙者享五百員負乘而不輟歷無定主大驛於天下符子烏場國特檀山山中有寺大有衆僧日日有驢運食無控御者自來留食還去莫知所在西域志廬山公宋袁淑徘諧集廬山公九鍚文云開成初東市百姓喪父騎驢市凶具行百步驢忽忽曰我姓白名元通負君家力已足勿復騎我南市賣麩家欠我五十四百我又負君錢敘亦如之今可賣我其人驚異即牽行旋訪主賣之驢甚壯報價只及五千詣麩行乃還五千四百因賣之兩宿而死酉陽雜俎晉僧朗住金榆山及卒所乘驢上山失之時有人見者乃金驢矣樵者往往聽其鳴響土人言金驢一鳴天下太平上服駕驥垂兩耳兮中坂蹉跎蹇驢服駕兮無用日多楚辭四類騾驢父馬母也駃騠驢馬父母也説文驢為牝馬為牡則生騾馬為牝驢為牡則生𩢷古今注馲馹驢父牛母玉篇蜀中縣有馬與牛合而生者皆牛為牡馬為牝故今川廣皆産騾生于廣者蹄輕産于蜀者蹄重以大武之遺體也爾雅翼趙簡子有兩白騾而甚愛之陽城胥渠處廣門之宮夜款門而謁曰主君之臣胥有疾醫教之曰得白騾之肝病則止不得則死謁者入通董安于御于側慍曰嘻胥渠也欺吾君請即刑焉簡子曰夫殺人以活畜不亦不仁乎殺畜以活人不亦仁乎於是召庖人殺白騾取肝以與陽城胥渠處無幾何趙兵興而攻翟廣門之左七百人右七百人皆先登而獲甲首人主其胡可以不好事呂覽元封四年修彌國獻駮騾高一丈毛色赤班皆山色旋成日月之象常以金瑤物器盛芻以飼之置於黃門廄東方朔曰比六畜之下者無為深愛昔夏侯淫于原獸以亡其國況戎翟獻其鄙獸費財毀德非所以示天下也楚莊好馬叔敖知其失政願陛下省物全國家之機事騾鄙獸宜置之於負乘不用則棄之於野上乃放之後野人見有赤蛇自天屬地有雲氣來繞地及雲徐馳復變為赤龍騎之入雲有人來告上曰滑稽兒使我失龍矣朔曰龍何難值恐陛下費金瑤終化為驢騾耳帝納其言而深忌之洞冥記龜茲王絳賓朝漢樂漢衣服制度歸國治宮室如漢家儀外國胡人皆曰驢非驢馬非馬若龜茲王所謂騾也漢書高昌性難伏乃作歌曰驢非驢馬非馬言高昌似騾也上白騾將軍明皇將登封太山益州進白騾至潔朗豐澗權奇偉異上遂親乘之柔習安便不知登降之勞也告成禮畢復乘而下才及山址上休息未久有司言白騾無疾而殪上嘆異久之諡之曰白騾將軍命有司具槥櫝壘石為墓墓在封禪壇北數里至今存焉開天傳信記騾子都吳少誠據蔡州地既少馬而廣畜騾乘之教戰謂之騾子軍尤稱勇悍而甲仗皆畫為雷公星文以為厭勝舊唐吳元濟叛其將有董重質者守洄曲其部下乘騾即戰號騾子都最為徑悍官軍恆警備之上進士李詹平生廣求滋味取騾縶于庭中圍之以火騾渴即飲以灰水蕩其腸胃然後取酒調以諸辛味復飲之騾未絶而為火所逼爍外已熟矣其法狄慎思小諫所傳也無何俱卒玉泉子靖康元年金人犯濬州徽宗微服出通津門御小舟將次雍丘沮淺船不得進夜出堤上御駮騾名鵓鴿青望睢陽而奔揮塵録錢昂治郡有聲以才能稱于崇觀間嘗帥秦州時童貫初得幸為熙河措置邊事恃寵驕倨將迎不暇獨昂未嘗加禮昂短小精悍老而矍鑠一日赴天寧開啓待貫之來久之方至昂曰太尉來何暮耶貫曰偶以所乘騾小而難騎動必跳躍適方欲據鞍忽盤旋庭中甚久以此遲遲昂曰太尉之騾雄者耶雌耶貫曰雄者也昂曰既爾難奈何不若閹之貫雖一時愧怒而莫能報其後貫大用事卒致遷責上馬力在前髆驢力在髀騾力在腰騎乘者隨其力而進退之騾股有鎖骨故不能生其狀大骨若臼而口小小骨若杵而頭大小口御大頭故不可出此騾之所以不滋息焉爾雅翼天中記卷五十五
