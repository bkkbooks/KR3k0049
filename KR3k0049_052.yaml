body:
  text: 李玉衡星玉衡星散為李運斗樞土宜五沃之土其梅其杏其桃其李管地員趙李休無實李一名趙李座接慮李今之麥李爾雅王文王母遺帝上清玉文之李黃帝內傳武帝初修上林苑群臣遠方各獻名果異樹亦有製為美名以摽奇麗李十五紫李綠李朱李黃李青綺李青房李同心李車下李含枝李食枝李顏回李羗李燕李蠻李侯李西京雜記李少君謂武帝溟海棗大如瓜鍾山之李大如瓶臣以食之遂生奇光漢武內傳員丘紅李仙之上藥有員丘紅李上琳國去長安九萬里生玉葉李色如碧玉數千歲一熟味酸昔韓眾常餌此李因名韓眾李洞冥記帝坐神明臺設琳國碧李許昌節度使小廳是故魏景福殿董卓亂曹操挾令遷帝自洛都許許州有小李子色紅黃大如櫻桃謂之御李子即獻帝所植至今有焉述異記廬山白李袁本初時有神出河東號度索君人共立廟兗州蘇氏母病往禱見一人着白布單衣高冠冠似魚頭度索君曰昔廬山共食白李未久已三千年日月易得使人悵然去後度索居云此南海君也文帝列異傳魏文帝安陽殿前天降朱李八枚啖一枚數日不食今李種有安陽李大而甘者即其種也述異記玄雲李五雲丹山上有玄雲之李食之得仙真人王褒內傳五原蔡綖入山而還欺家人云到崑崙山有玉李王瓜玉桃其實形如世間桃李但光明洞徹而堅須以玉井水洗之便軟而不可食抱朴安丘望之病篤弟子公沙都來省之與安丘共坐於庭樹下安丘曉然有痊聞李香開目見雙赤李着枯枝都仰手承李自墮掌中安丘食之所苦除盡稽康高士傳王戎年七歲嘗與諸兒遊觀道邊李樹有子折枝諸小兒競走取之惟王戎不動人問之荅曰樹在道傍而多子此必苦李也取之信然世說和嶠性至儉家有好李王武子求之與不過數十王武子因其上直率少年能食之者持斧詣園飽共噉畢伐之送一車枝與和公問曰何如君李和既得而笑之已上嶠諸弟往園中食李而皆計核責錢故嶠婦弟王濟伐之也語林鑽核王安豐有好李嘗賣之恐人得其種乃鑽核而賣世說北齊武帝改芳林園為仙都苑植名果有合歡杏同心李花木錄盤屈如龍武德中有獻李樹連李盤屈如龍舊唐之首李直方常第果實若貢士者以綠李為首楞棃為二櫻桃為三柑為四蒲桃為五或薦荔枝曰寄舉之首問栗何如曰最有實事不出八九始范曄以諸香品時輩侯味虛撰百官本草皆此類也國史補唐肅宗至德二年返轅指扶風令釋元皎於鳳翔開元寺置御藥師塲忽於法會內生一叢李樹有四十九莖元皎等表賀帝喜曰此大瑞應荅勑云瑞李繁滋國之興兆生在伽藍之內足知覺樹之榮感此殊祥與師同慶宋高僧傳興元元年八月亳州貞元縣大空寺僧院李樹種來十四年纔長一丈八寸今春枝忽上聳高六尺周圍似蓋九尺餘舊唐南唐李昇受徐溫之禪也其日白雀見于庭江西楊化為李洪州李生連理詔還李姓國還號唐江南別錄房陵定山有朱仲李園三十六所潘岳閑居賦曰房陵朱仲之李李尤果賦云三十六園之朱李蓋仙李縹而神李紅陸士衡果賦云中山之縹李是也述異記西王母居龍月城城中產黃中李花實上皆有黃中二字王母惜之過於蟠桃集真記東都嘉慶坊有李樹其實甘鮮為京都之美故稱嘉慶李今人但言嘉慶子蓋稱謂既熟不加李亦可記也韋述兩京記金李杜陵有金李李之大者謂之夏李小者呼鼠李述異九都北狄渤海有九都之李唐志春李華林國有春李冬華春熟鄴中記黃建李有黃建李青皮李馬肝李冬李十一月熟廣志河沂黃建房陵縹青傳玄賦南居細李四月先熟風土記二色瀨鄉老子祠有紫石榴紅縹李一李二色山中有縹李大如拳者呼拳李李尤果賦云如拳之李三種柰有白赤青三種張掖有白柰酒泉有赤柰廣志二柰曜丹白之色閑居賦夏禹詣鍾山啖紫柰醉金酒服靈實行九真而猶葬於會稽真誥福鄉柰展上公學道于伏龍地乃植柰彌滿所住之土常白諸仙人云昔在華陽下食白柰美憶之未久忽已三千歲矣郭四朝後來住其處又種五果上公云此地善可種柰所謂福鄉之柰可以除災癘洞仙傳綠柰上林苑有白柰紫柰綠李西京雜記有紫柰大如升甜如蜜核紫花青研之有汁如漆可染衣其汁着衣不可湔浣亦名闇衣柰洞冥記帝坐神明臺果則有塗陰紫梨圓丘仙藥之次者有圓丘紫柰漢武內傳上握蘭園之金精摘圓丘之紫柰故事神柰漢末楊氏家園中產神柰三株述異記即夕殿中虎賁宣詔賜臣冬柰一奩詔使溫啖夜非食時而賜見及柰以夏熟今則冬至物以非時為珍恩以絕口為厚詔曰此柰從梁州來道里既遠又來東轉暖故稍變色不佳耳曹植表王祥後母庭中有柰樹始着子使祥守視晝驅鳥雀夜驚虫鼠時雨忽至祥抱樹至曙母見之惻然蕭廣濟孝子傳夫人姓魏名華存性樂神仙季冬夜半有四真人降夫人靜室因設玄雲紫柰絳實靈爪夫人還王屋山王子喬等並降夫人與真人為賓主設三玄紫柰續仙傳紫微王夫人詩云俯漱雲瓶津仰掇碧柰花濯足玉天池鼓枻牽牛河真誥白花如柰成帝杜皇后崩先是三吳女子相與簪白花望之如素柰傳言天公織女死為之着服至是而後崩晉書紹興五年寧德皇后訃音從北庭來陳之茂䟽云十年罹難終弗返於蒼梧萬國啣冤徒盡簪于白柰白馬寺浮圖前柰林葡萄異於餘處柰實重七斤葡萄實偉于棗至熟時帝取之或賜宮人宮人轉遺親以為奇異得者不敢輒食乃歷數家洛陽伽藍記承光柰承光寺亦多果木柰味甚美冠於京師上不顧落實楊愔字遵彥幼年學庭前有柰樹實落于地群兒咸爭之愔獨坐不顧其季父暐適入學館見之大用嗟異顧謂賓客曰此兒恬裕有我家風典略貞觀中頓丘有人于黃河渚上拾菜得一樹栽子大如指持歸蒔之三年乃結子五顆味狀如柰又似林檎多汁異常酸美送縣縣上州以其奇味乃進之後樹長成漸至三百顆每年進之號曰朱柰至今猶存德貝博等州取其枝接所在豊足人以為從西域浮來礙渚而住矣僉載永徽中魏郡人王方言拾得此樹以果獻刺史紀王慎王貢於高宗以為朱柰又名五色林檎或謂之聯珠果上重賜王方言文林郎亦號此果為文林果俗云頻婆果洽聞記冬柰崑崙山上有冬柰冬生子碧色須玉井之水洗之方可食拾遺記河州鳳林關有靈巖寺每七月十五日溪穴流出聖柰大如盞以為常洽聞記春秋柰虎丘山下三面有春秋二柰虎丘山䟽太如兔頭白柰出涼州野猪澤太如兔頭酉陽日給之華與柰相似也柰結實而日給零落虛偽之言與真實相似也虛偽敗而真實成杜恕篤論林檎似赤柰子亦名黑禽亦名來禽言味甘熟則來禽也廣志此有三種大長者為柰圓者林檎夏熟小者味澀為梣秋熟本草歲星之精杏者東歲星之精也典術三種滎陽有白杏鄴中有赤杏有柰杏廣志海杏范蠡宅在湖中有海杏大如拳地志縹杏瀨鄉老子祠有縹杏述異記文杏漢上林苑有文杏林有文彩西京雜記餘文杏以為梁相如長門賦蓮萊杏上林苑有蓬萊杏東海郡都尉于吉所獻一株花雜五色六出云是仙人所食西京雜記號仙人杏述異記仙人杏天台山有杏花六出而五色杏園洲在南海中多杏海上人云仙人種杏處漢時常有人洲行遇風泊此洲五六月日食杏故免死云洲中有冬杏王充果賦云冬實之杏春熟之甘晉郭太儀果賦云杏或冬而實述異記濟南郡之東南有分流山山上多杏大如棃黃如橘土人謂之漢帝杏亦曰金杏酉陽董奉字君異居廬山為人治病重病得愈者令種杏五株輕病得愈者為栽一株數年之中杏有十數萬株鬱然成林杏子熟奉於林中所在作簞食一器宣語買杏者不復須來報但自取之一器穀便得一器杏有人少穀往而取杏多即有三四頭虎逐之奉悉以杏所得穀賑救貧窮神仙傳杏花北嶺上有樹百株今猶稱董先生杏林潯陽記三玄紫杏仙人有三玄紫杏南岳夫人傳裴沆再從伯遇白衣老人裴渴甚求茗老人指一土龕此中有少漿可就取裴視龕中有杏核一扇如笠滿中有漿漿色正白乃力舉飲之不復飢渴漿味如杏酪老人曰君向飲杏漿當哭九族親情且以酒色為誡也酉陽神仙感遇傳望杏三月杏花盛可菑白沙輕土之田四民月令杏花如何可耕白沙上嵩山東北有牛山箕山多杏至五月爛然黃茂自中國喪亂百姓飢饉皆資此為命人人充飽而杏不盡嵩高山記靈山靈山之下其木多杏山經杏多實不蟲者來年秋禾善五木者五穀之先欲知五穀但視五木擇其木盛者來年多種之萬不失一故五果分五行所以表五谷也師矌占術五木之精桃者五木之精仙木也典術互見元日應氣驚蟄大壯初九桃始華不華倉庫多火易卦通驗王子慶忌死于劍羿死于桃棓棓大杖以桃木為之以擊殺羿由是以來鬼畏桃淮南扶桑東有磅磄山日所不及其地寒上有桃樹千圍其花青黑色萬歲一實西王母以食穆王拾遺記齊桓公出遊遇一丈夫衰衣應步帶着桃殳桓公怪而問之曰是何名何經所在何篇所居何以斥逐何以避余丈夫曰是名二桃桃之為言亡也夫日日慎桃何患之有故亡國之社以戒諸侯庶人之戒在於桃殳桓公說其言與之共載來年正月庶人皆佩詩曰殷監不遠韓詩外傳子產相鄭往見壺丘子林與其弟子坐必以年是倚其相於門也夫相萬乘之國而能遺之故相鄭十八年刑三人殺二人桃李之乘於行說苑作街者莫之援也錐刀之遺於道者莫之舉也呂覽碧桃尹喜從老子西遊省太真王母共食碧桃之實內傳孔子御坐於魯哀公哀公賜之桃與黍哀公請用仲尼先飯黍而後啗桃左右皆揜口而笑哀公曰黍者非飯之也以雪桃也仲尼對曰丘知之矣夫黍者五穀之長也祭先主為上盛果蓏有六而桃為下祭先王不得入廟丘聞之也君子以賤雪貴不聞以貴雪賤今以五穀之長雪果蓏之下是從一雪下也丘以為妨義故不敢以先於宗廟之盛也韓外儲二桃殺三士公孫接田開彊古冶子事景公勇而無禮晏子言于公曰此危國之器也不若去之因請公使人少餽之二桃曰三子何不計功而食公孫接田開彊各言功援桃而起古冶子又言其功曰二子何不反桃抽劍而起二子曰吾勇不子若功不子逮取桃不讓是貪也然而不死無勇也皆反其桃挈領而死古冶子曰二子死之冶獨生之不仁耻人以言而夸其聲不義恨乎所行不死無勇亦反其桃挈領而死晏子春秋餘桃昔彌子瑕有寵於衛君與君遊於果園食桃而甘不盡以其半啖君君曰愛我哉忘其口味以啖寡人及彌子色衰愛弛得罪于君曰是固嘗啖我以餘桃故彌子之行未變于初也而以前之所以見賢而後獲罪者愛憎之變也韓說難陽虎得罪于衛北見簡子曰自今以來不復樹人矣簡子曰何哉陽虎對曰夫堂上之人臣所樹者過半矣朝廷之吏臣所立者亦過半矣邊境之士臣所立者亦過半矣今夫堂上之人親却臣於君朝廷之吏親危臣於眾邊境之士親劫臣於兵簡子曰唯賢者為能報恩不肖者不能夫樹桃李者夏得休息秋得食焉樹蒺藜者夏不得休息秋得其刺焉今子之所樹者蒺䔧也自今以來擇人而樹毋已樹而擇之說苑崔順答豫章王書云門有將相宜樹桃李隋書或謂狄仁傑曰天下桃李悉在公門通鑑王冷然上裴耀卿書云拾遺補闕容有種乎僕不佞亦相公一株桃李也摭言魏文侯時子質仕而獲罪焉去而北游謂簡主曰從今已後而不復樹德於人矣云云韓詩外傳御覽李部引之按史六國年表趙簡子與魏獻子同時文侯元年簡子之子襄子巳卒其去簡子之死三十三年矣韓詩疑誤雅翼以韓詩作韓子亦誤周書云秦吏趙凱以私恨告國民吳旦生盜食宗廟御桃旦生對曰民不敢食也王曰剖其腹出其桃史記惡而書之曰食桃之肉當有遺核王不知此而剖人腹以求桃非禮也鍾離意別傳知伯庖人亡炙一篋而即知之韓魏將反而不能知邯鄲子陽園亡一桃而即覺之其自亡也而不能知斯皆銳情於小而忘大者也劉子觀量篇寧都金精山係第三十五福地漢初張芒女麗英入山獲二桃得道長沙王吳苪一日至洞中見其女乘紫雲在半空謂苪曰吾為金星之精降治此山言訖即升天而去白玉蟾記勝覽三偷東郡獻短人帝疑其精召東方朔朔至呼短人曰巨靈阿母還來否短人不對因指朔謂上曰西王母種桃三千年一着子此兒不良已三過偷之矣漢武故事西王母以七月七日降帝宮命侍女取桃須臾以玉盤盛桃七枚大如𪀀子形圓色青以呈王母王母以四顆與帝三顆自食桃味甘美口有盈味帝録其核王母問帝帝曰欲種之耳母曰此桃三千歲一實中夏地土薄不生如何帝乃止內傳後上殺諸道士妖妄者百餘人西王母遣使謂上曰求仙而信邪欲見人而殺戮吾與帝絕矣又致三桃曰食此可得極壽故事王莽畏漢高神靈乃令虎賁拔劍四面斫高廟桃湯赤鞭灑屋梅子漢明帝時恒山獻巨桃核霜下結花隆暑方熟亦云仙人所食帝使值于霜林園園皆植寒果積冰之節百果方盛俗謂之相陵聲之誤也拾遺記漢明帝永平五年剡縣劉晨阮肇共入天台山取穀皮迷路不得返經十餘日糧盡饑餒殆死遙望山上有一桃大有子實而絕巖還澗永無登路板緣藤葛然後得上各啖數桃而不飢下山一大溪邊有二女資質妙絕因要還家勑婢云劉阮二郎向雖得瓊實猶尚虛弊可速作食有胡麻山羊脯甚美遂留半載餘二人懷土求歸女曰宿福所率何復欲還因指示還路既出無復相識問得七世孫傳聞上世入山迷不得歸幽明錄晉太元中武陵人捕魚從溪而行忘路遠近忽逢桃花林夾兩岸芳華鮮美落英繽紛林盡得山山有小口初極狹行四五步豁然開朗邑屋連接鷄犬相聞男女衣着悉知外人見漁父驚為設酒食云先世避秦難率妻子來此遂與外人間隔問今是何世不知有漢不論魏晉既出白太守劉歆即遣人隨往尋之迷不復得路陶潛桃源記譙郡夏侯文規亡後見形還家經庭前桃樹邊過曰此桃我昔所種子乃美好其婦曰人言亡者畏桃君何不畏耶荅曰桃東南枝長二尺八寸向日者憎之或亦不畏也甄異傳奪帝食桃惠帝征成都王於安陽城北軍敗日已向中而大官未暇進食左右有賫秋桃一枚便以獻帝帝食三枚石超使人擘手奪三枚四王啟事斫桃武歷陽女嫁阮宣武絕忌家有一桃樹華葉灼燿宣歎美之即便大怒使婢取刀斫樹摧折其華妬記桓玄素輕桓崖崖在京下有奴桃玄連就求之遂不得佳者玄與殷仲文書以為嗤笑曰德之休明肅慎貢其楛矢如其不爾籬壁間物亦不可得也世說鄴華林苑有勾鼻桃子重三斤或二斤半亦有名棃凡此眾果氣味甘美入口消汁人間有名果季龍作蝦蟆車四箱廣一丈深一丈合土在中植之則無不生也洽聞記魏華林園景陽山南有百果園果列作林林各有堂有仙人桃其色赤表裏照徹得霜即熟亦出崑崙山亦曰王母桃也伽藍記洛城華林園內有冬桃十月始熟形如括蔞食之鮮勞亦名西王母桃酉陽康國獻正觀十一年康國獻金桃銀桃詔令置於苑囿舊唐四年春上宴於桃花園群臣畢從學士李嶠等各獻桃花詩上令宮女歌之辭既清婉歌仍妙絕獻詩者舞蹈稱萬歲上勑太常簡二十篇入樂府號曰桃花行景龍文館記御苑新有千葉桃花帝親摘一枝插於妃子寶冠上曰此箇花尤能助嬌態天寶遺事明皇於禁苑中初有千葉桃盛開帝與貴妃日逐宴于花樹下帝曰不獨萱草忘憂此花亦能消恨上桑苧翁謂李復云天寶末有韋長史虛舟寓于廬山瀑布泉時夏月多雨見瀑布之中流出一桃葉闊五寸長一尺二寸北戶錄至德初徐正字凝于海鹽縣白塔沙渚之上得一桃核片可貯一升上水部員外郎杜陟嘗見江淮士人以桃核扇量米正容一升言於九嶷山溪中得酉陽桃大如椀史論在齊州時出獵憩蘭若中覺桃香異常訪其僧僧言近有人施二桃因取獻論大如飯碗論時饑盡食之核大如鷄卵論因詰其所自僧導論上山越澗至一處清泉怪石非人境也有桃數百株其香撲鼻論與僧各食一蔕取兩個而返酉陽仙桃咸通中越僧懷一居雲門寺遇一道流相與入山花木繁茂水石幽勝久之覺飢道流曰此有仙桃千歲一實可以療飢以一桃授之大如二升器奇香珍味非世所有懷一自此不食神仙感遇傳武宗朝術士王瓊妙于化物無所不能方冬以藥栽培桃杏數株一夕繁英盡發芳蘂濃艷月餘方謝劇談錄核大如斗咸通中王瓊為王屋令遇東極真人王太虛授以所注黃庭經復與桃核大如數斗器磨而服之身輕無疾王氏神仙傳莊宗年邁多疾馮道因奏事言於帝曰臣願陛下寢膳之間動留調衛道指御前果實曰如食桃不康翊日見桃而思戒可也如食李不康翊日見李而思戒可也陛下幸思而戒之矣後唐史紅桃六出蜀孟知祥僭位召百官宴芳林園賞紅桃花其葉六出外史檮杌蜀文谷好古之士也於中書舍人劉光祚處見桃核杯杯闊尺餘紋綵燦然真蟠桃之實也劉自云少時遊華岳見一道士以此核酌瀑泉盥漱觀之驚駭道士以半片授之野人閑話孟昹二十年十二月中書舍人劉光祚進蟠桃核酒盃云得華山陳摶賜帛五十疋張唐英後蜀紀事外史檮杌亦載有人以桃核半枚獻王黼者中容米三四斗墨莊漫錄大桃吐谷渾有桃大如石甕洽聞記大食勿斯離國桃子重二斤史木子之大者有積石山之桃實焉大如十斛籠玄中記東海有山名度索山有大桃樹屈盤三千里曰蟠桃十洲記大海中女人國土產蓮肉長尺餘桃核長二尺玉桃玉桃服之長生不死若不得早服之臨死日服之其尸畢天地不朽神農經桃梟桃實已乾著木上經冬不落者名桃梟又名桃奴正月採之本草偏桃出波斯國波斯呼為婆淡樹長五六丈圍四五尺葉似桃而闊大三月開花白色落落結實狀如桃子而形偏故謂之偏桃其肉苦澀不可噉核中仁甘甜西域諸國並珍之酉陽占畢國出偏核桃形如半月狀波斯人取食之絕香美極長氣力比於中夏桃仁療疾不殊會最云偏桃仁㪍律國尤多花殷紅色郎中解忠順使安西以蘿蔔插之而生桃仁肥大其桃皮不堪食北戶錄金桃貞觀二十一年康國獻黃桃大如鵝卵其色如金亦呼為金桃通典木桃桃之大者謂之木桃詩云投我以木桃是也述異記獼猴洋州雲亭山生獼猴桃甚甘酸食之止渴海錄葛由好刻木作羊賣之一旦騎羊上綏山王侯追之皆得仙綏山多桃故諺曰得綏山一桃雖不得仙亦足以豪列仙傳綿州彰明縣雲臺山天柱崖下有一桃樹高五丈餘外皮似桃內心似松張道陵與王長趙昇試法于此四百餘年桃迨今不朽有碑記之道經云雲臺山有一桃樹三年一花五年一實懸絕無底之谷趙昇乃自擲取得桃子餘者無能取之治應胃宿郡國志樊夫人與夫劉剛俱學道術各自言勝中庭有兩大桃樹夫妻各咒其一夫人咒者兩枝相鬥擊良久綱所咒者桃走出籬外神仙傳仙桃出蘇昵仙壇有人至心祈之輒落壇上或至五六顆形如石塊赤黃色破之如有核三重研飲之立愈眾疾尤治邪氣天寶中處士崔元微東洛有宅入嵩山採術茯苓回宅中蒿萊滿院時春季夜風月清朗忽有青衣引十餘人有綠裳者前曰某姓指一人曰李氏又一人曰陶氏又指一緋衣小女曰姓石名醋阿醋各有侍女輩色皆殊絕香氣襲人處士命酒各歌以送之紅衣人送酒歌曰絳衣披拂路盈盈淡染臙脂一朵輕自恨紅顏留不住莫怨春風道薄情月中隨而送之踰苑墻入苑中乃桃花精也博異記石城玉桃古記云昔人于天目捕獵沮雨于石城之外見林間有白桃一顆摘入手如冰忽又變紅其熱如湯遂採木葉包之藏于白囊下山捫之猶在及至家惟木葉存杭州志接桃李接桃而本強者其實毛化書仲夏羞含桃先薦寢廟含桃櫻桃鸎鳥所含食故言含桃也呂覽一名朱桃一名麥美本草櫻桃其種有三大而殷者曰吳櫻桃黃而白者曰蠟珠小而赤者曰水櫻桃食之皆不如蠟硃楊膳夫錄漢惠帝出離宮叔孫通曰禮有春嘗果方今櫻桃可獻願陛下出因取櫻桃獻宗廟諸獻果自此始漢書明帝於月夜宴群臣於園太官進櫻桃以赤瑛為盤賜群臣月下視之盤與桃同色群臣皆笑云是空盤拾遺記太宗將致櫻桃於鄭公稱奉則是尊言賜又似卑問之虞監曰昔梁帝遺齊巴陵王稱餉遂從之舊唐賜朱櫻四年夏四月上與侍臣於樹中摘櫻桃恣其食未後於蒲萄園大陳宴席奏宮樂至每人賜朱櫻兩籠景覽文館記四年夏四月上幸兩儀殿命侍臣昇殿食櫻桃其櫻桃並盛以琉瑠和以杏酪飲酴醿酒上口摘玄宗紫宸殿櫻桃熟命百官皆摘之舊唐李希烈始入汴聞戶曹參軍竇良女桂娘美而能文強取之桂娘將出門顧其父曰慎無戚必能滅賊桂娘在希烈側能巧曲取信得聞密謀希烈歸蔡州桂娘常稱陳仙奇忠勇可用而妻亦竇姓願如姒媢者以固其夫希烈然之桂娘以姊事仙奇妻因論以禍福仙奇妻然之興元元年四月希烈暴死其子不發喪欲悉誅諸將自立未決有獻含桃者桂娘白希烈子分遺仙奇妻且以示無事于外因為蠟帛丸雜果中出所謀仙奇見之言于薛育明日各以所部兵譟而入子迫出遍拜語已斬之取首以獻后兩月吳少誠殺仙奇知桂娘謀因亦殺之杜樊川集文宗始即位嘗因內園進新櫻桃將以賜三宮太后上曰送太后焉可以為賜因援筆易其文簿曰奉太后自是以為常舊唐唐時新進士尤重櫻桃宴乾符四年劉鄴第二子覃及第時狀頭已下方議醵率覃潛遣人預購數十樹獨置是宴大會公卿時京國櫻桃初出雖貴達未適遇而覃山積鋪席復和以糖酪者人享蠻畫一小盎亦不啻數升以至參御輩靡不霑足摭言夢遺櫻桃裴元裕群從中有悅鄰女者夢妓遺二櫻桃食之及覺核墜枕側酉陽陳景思說勑使齊日昇養櫻桃至五月中皮皺如紅柿不落其味數倍人不測其法上饆饠韓約能作櫻桃饆饠其味不變上十二枚及一尺衛公言滑州櫻桃十二枚及一尺上嚴綬為左僕射司空嘗預百寮廊中食上令中使馬江朝賜櫻桃綬為兩班之首舊識江朝敘語次不覺屈膝而拜江朝荅拜御史大夫高郢亦從而拜為御史所劾綬出鎮荊南江朝降一官續世說千樹淮北滎南河濟之間千樹梨其人皆與千戶侯等漢書紫梨老子西游省太真王母共食碧梨紫梨尹喜內傳上林苑有紫梨芳梨實小大谷梨細葉梨縹蔕梨金柯梨出瑯琊王野家太守王唐所獻瀚海梨出瀚海北耐寒不凍東王梨紫條梨青玉梨西京雜記玄光太上之藥果有玄光梨內傳取小孔融年四歲與諸兄食梨輒取其小者人問其故荅曰我小兒法當取小者由此宗族奇之文士傳出血曹操自漢中至洛陽起建始殿使工吳越從美梨掘之根傷盡血出越白狀操躬自視而惡之以為不祥還遂寢疾曹瞞傳介象為吳主所徵在武昌速求去不許象言病帝以美梨一奩賜之湏臾象死帝殯而埋之以日中時死其日晡時到建業以所賜梨付守苑吏種之後吏以狀聞即發象棺視之惟一符耳神仙傳真定真定御梨大若拳甘若密脆若菱可以鮮煩釋渴魏文帝詔洛陽北邙張公夏梨海內唯有一樹常山真定梨山陽鉅野梨梁國睢陽梨齊郡臨淄梨廣都梨又云鉅鹿豪梨重六斤數人分食之上黨楟梨小而加甘新豐箭谷梨關以西弘農京兆右扶風界諸谷中梨多供御陽城秋梨夏梨廣志味出靈關山名之陰旨珍玉津之澨豈徒真定歸美大谷慚滋謝眺賜紫梨啟睢陽東苑子圍三尺新豊箭谷枝懸六斤庾肩吾啟大谷張公大谷之梨潘岳賦梨則大谷冬紫張公秋黃玉京洛都賦城南五十里有大谷舊名通谷華延洛陽記桓南郡每見人不快輒嗔云君得哀家梨當復不蒸食不世說舊說秣陵有哀仲家梨甚美大如升入口即消釋道安公講僧常數百習鑿齒嘗餉十梨值講安公便於座中手自剖分梨盡人遍都無頗上同心梨呂光時燉煌太守宋歆獻同心之梨叚龜龍涼州記王玄謨徑滑臺一疋布責民八百梨以此倍失人心宋書百果之宗張敷小名查父邵小名梨宋文帝嘗戲之曰查何如梨荅曰梨為百果之宗查何可比南史張敷從彭城還傳亮下船與別張不起授手着舫戶外傳遂不執手熟視張面云查故是梨中不臧者便去俗說宋廢帝大始年既失彭城江南始盛傳種消梨先無此樹百姓爭欲種植識者曰當有姓蕭而來者後齊受禪廣五行記南齊志魏高聰以高肇之黨彈廢於家斷絕人事惟修塋園果世稱高聰梨以為珍異北史鳳棲河中府土貢鳳棲梨地理志陜州峽石縣山中有棠一株甚偉古老傳云鳳止棠貞觀初有鳳止此木其後結實猶如合掌狀團團婉轉有赤黃之色其馨香脆美乃諸果之王職貢之珍也刺史韋堅為銘刻石紀異記唐三藏游西域經行梨州植棃杖云他日州治在此後果遷如其言其後棃成株高五丈圍九尺宋天聖間州治火人取其枝以接他株肅宗嘗夜坐召頴王等三弟同於地爐罽毯上坐時李泌絕粒上自燒二棃以賜之頴王恃恩固求上不與曰汝常飽肉食先生絕粒何必爭之賜以他果頴王曰先生恩渥如此臣等請聯句以為他年故事頴王曰先生年幾許顏色似童兒信王曰夜抱九仙骨朝着一品衣幽王曰不食千鍾粟惟食兩顆棃既而三王請上成之上曰天生此間氣助我化無為鄴侯家傳武宗五年患心熱之疾青城山邢道士以赤城山之青芝太白溪南紫花棃所合青丹二粒愈之邢辭去後帝疾復作詔求紫花棃時恒州節度王達尚壽春公主公主即會昌女弟聞真定李令有一株即遣就加封檢及秋實公主手選進之其記室李遵來作進棃表云紫花開處擅美春林縹蔕懸時回光秋浦離離玉潤落落珠圓甘不待嘗脆難勝口表達闕下公卿笑之曰常山公何用進殘棃干天府也蓋以其有脆難勝口之句有縣宰李尚嘗以守樹不謹曾風折一枝降為荊州典午耳目記按唐書壽春武宗女不着尚者名武宗年三十三不應有如此女大疑劉記為是李昇本徐氏湖州安吉人為安吉令先是其家有棃樹云結一實大如升其父異之將獻郡守有謂其父母此果非常年所有即上獻來年見徵安知復有此物不如勿獻其父然之因會鄰里將共食即席剖之有赤蛇在實中割者大驚投刃於地俄而赤蛇走其母榻下尋之了無所見未幾其母遂孕知誥吳越備史李建勳罷相出鎮豫章一日遊西山田間茅舍有老叟教數村童公觴于其廬連食數棃賓僚有曰棃號五臟斧斤不宜多食叟嘆曰鶡冠子五臟斧斤乃別離之離非謂棃也蓋離則殘賊胸懷有若刀斧因就架取鶡冠子呈之公大嘆服湘山野錄塗山之北有棃大如斗紫色千年一花冬月乃實煎之有膏食之身輕亦曰紫輕棃洞冥記青田村人家多種棃樹名曰官棃子大一圍五寸恒以供獻名為御梨吏司守視土人有未知味者棃實落至地即融汁永嘉記報德寺有含肖棃重六斤伽藍記融峰上有青壇方五丈有燒香行道處古形銅器數種有棃樹高三十丈子如斗至搖落時但見其汁核無得味者洽聞記樂遊北狄海果有樂遊之棃赤梨扶桑國有赤棃經年不壞南史昫山果則昫山之棃齊都賦山陽縣北有谷通得驢馬石勒十人騎昔在此啖棃生樹今有棃園三晉山險記三皇五帝之禮義法度其猶柤棃橘柚邪其味相反而皆可於口故禮義法度者應時而變者也莊天運夫柤棃橘柚果蓏之屬實熟則剝則辱大枝折小枝泄此以其能苦其生者也故不終其天年而中道夭自掊擊於世俗者也上人間世律明五果一核果如棗杏等二膚果如棃柰是皮膚之果三殼果如椰子胡桃石榴等四檜果字書空外反麄糠皮謂之檜如松柏子五角果如大小豆等翻譯名義異名棗壺棗邊要棗樲酸棗洗大棗晳無實棗爾雅弱枝周文弱枝之棗閑居賦上林苑有弱枝棗玉門棗棠棗青華棗梬棗赤心棗西王棗出崑崙山穆王東巡大騎之谷西王母與王共玉帳高會進陰岐黑棗北極有岐峰之陰多棗樹百尋枝莖皆空實長二尺核細而柔百年一熟拾遺記老子西遊省太真王母共食玉文之棗其實如瓶尹喜內傳東海棗景公謂晏子曰東海之中有木而赤其中有棗華而不實何也晏子曰昔者秦穆公乘龍理天下以黃布裹蒸棗至海而投其布故水赤蒸棗故華而不實公曰吾佯問子耳對曰晏聞之佯問者亦佯對晏子春秋食棗吐死鮑焦耕田而食鑿井而飲於山中食棗或曰此棗子所植耶遂強吐枯立而死風俗通魏世河內冬雨棗耆舊說周秦時河南雨酸棗遂生野棗今酸棗縣是也酸棗之甚小者謂之野棗述異記酸棗縣故城古韓國昔天子建國名都或以山林故豫章以樹氏都酸棗以棘名邦水經青州有樂氏棗細核多膏肥美為天下第一父老傳云樂毅破齊時從燕來齊所種也齊人要術如瓜李少君以却老方見上曰臣曾遊海上見安期生食巨棗大如瓜史記李少君謂武帝溟海之棗大如瓜內傳玉門七月七日西王母為帝設玉門之棗上嵻細棗嵻細棗出嵻山山臨碧海上萬年一實如今之軟棗咋之有膏膏可燃燈西王母握核以獻帝因名曰握核棗洞冥記今本無末句武帝時上林苑獻棗上以所持杖擊未央前殿檻呼朔曰叱來叱來先生知此篋中何物朔曰上林獻棗四十九枚上曰何以知之朔曰呼朔者上也以杖擊檻兩木林也曰來來者棗也叱叱者四十九也上大笑賜帛十疋方朔傳宣帝時幽州刺史李宣尚范陽公主公主憶長安於易州築一城象長安故以為名城中有棗樹花而不結皆向西南而引俗謂思鄉棗寰宇記含棗不食孟節能含棗核不食可至十年後漢南方有龍眼荔枝寧北西國蒲萄石蜜乎酢且不如中國凡棗味莫若安邑御棗也魏文帝詔魏文帝忌弟任城王驍壯因在卞太后所共圍棊並文棗文帝以毒着諸棗蔕中自選可食者而進王弗悟遂雜進之既中毒太后索水救之帝豫勑左右毀器太后徒跣趨井無以汲須臾遂卒世說棗下何攢攢榮華各有時棗欲初赤時人從四邊來棗適今日賜誰當仰視之古咄唶歌詠園桃之夭夭歌棗下之纂纂歌曰棗下纂纂棗花朱實離離宛其死矣化為枯枝人生不能行樂何以虛謚為潘安仁笙賦弱刺引羅衣朱實凌還幰且歡洛浦詞無羡安期遠棗下何纂纂簡文帝辭石虎園有西王母棗味絕美枝葉忽茂四時不凋九月生花十二月乃熟三子一尺又有羊角棗亦三子一尺鄴中記海棗樹身無閑枝直聳二四丈樹頭四面共生餘枝葉如栟櫚五年一實實大如杯盌核兩頭不尖雙卷而圓其味極甘美安邑御棗無以加也晉泰康五年林邑獻百枚昔李少君謂棗大如瓜非誕說也南方草物狀沙門竺惠猷太元二年夜夢讀詩五首其一篇後曰陌南酸棗樹名為六奇木遣人以伐取載還柱馬屋異苑棗昏范曄撰和香方其序云棗膏昏鈍以比楊玄保也避亂遇棗太原王仲德年少時遭亂避胡賊絕粒二日草中臥忽有人扶其頭呼云可起啗棗王便寤瞥見一小兒長四尺即隱乃有一囊乾棗在前噉之小有氣力便起幽明錄仙人棗魏百果園中有仙人棗長五寸把之兩頭俱出核細如鍼霜降乃熟食之甚美俗傳云出崑崙山一曰西王母棗伽藍記北齊綦母懷文云昔在晉陽為監館館中有一蠕蠕客同館胡沙門指語懷文云此人別有異筭術仍指庭中一棗樹云令其布筭子即知其實數乃試之并辦若干純赤若干赤白相半於是剝數之惟少一子筭者曰必不少但更撼之果落一實北史信都獻仲思棗四百枚棗長四五寸正紫色細文文縐小核味甘勝于青州棗北齊時有山人仲思得此棗種之因以為名亦名仙棗時海內惟有數株大業拾遺碧棗處士元藏機大業元年為海使判官遇風浪壞船獨為破木所載忽達于洲島洲人曰此乃滄洲有碧棗丹栗皆大如梨杜陽編河中永樂縣出棗世傳得棗無核者食可度世里有蘇氏女自小獲而食之不食五穀年五十嫁顏如處子自亂離後不知所終北夢瑣言河中永樂縣道淨院居蒲中之勝境蒲中多大棗天下人傳歲中不過一二無核者侯道華比三年輒得啖之後仙去室室志邢州城東十餘里周世宗之祖庄也門側有井上有大棗一株世宗時柯葉茂盛垂蔭一畝恭帝既祗棗遂枯死明道中枯枿復生一枝長一丈餘蔚然可愛井水中如覆錦綉柴氏懼遂塞井伐木明年詔求五代帝王之後柴氏自邢蔡虢等州諸族被甄敘入官者三十餘人井棗之祥亦非空應括異志光祿卿李郁因晝寢夢食巨棗覺而有疾謂其親友曰嘗聞棗子重來呼魂之象今予神氣逼抑將不免乎未幾而卒晉史正月一日日出時反斧班駁椎之名嫁棗不椎則花無實子易零落也齊民要術河東安邑棗東郡穀城紫棗長二寸西王母棗大如李核三月熟在眾果之先洛陽宮後園河內汲郡棗一名墟棗一名安益棗東海蒸棗洛陽夏后棗安平信都大棗單父棗梁國夫人棗大白棗一名曰蹙咨小核多肌三星棗駢白棗灌棗此四者官園所種棗有狗牙鷄心牛頭羊矢獼猴細腰之名又有玄棗大棗崎廉棗桂棗夕棗之名廣志安邑千樹棗與千戶侯等史記風搖羊角樹日映鷄心枝已聞安邑美永茂玉門關簡文詠棗賦龍骨河中府貢龍骨棗地理志極美者有水菱棗圖經千年大食國有千年棗杜還經行記七寸北方有七寸棗述異記鶻莽拂菻南有國曰磨鄰人食鶻莽并食波斯棗也西域傳波斯棗出波斯國波斯呼為窟莽樹長三四丈圍五六尺葉如土藤不凋二月生花狀如蕉花有兩甲漸漸開罅中有十餘房子長二尺黃白色有核熟則紫色形類乾棗味甜如飴可食酉陽北方荒中有棗林焉其高五十丈敷張枝條數里餘疾風不能偃雷電不能摧其子長六七等圍過其長熟色如朱乹之不縮氣味潤澤殊於常棗食之可以安軀益氣故方書云此棗枝條盛於常棗亦益氣安軀赤松子云北方大棗味有殊既可益氣又安軀神異經黃齒齒居晉而黃養生論晉地多棗人常置之懷袖中若粵人之噉檳榔味甘傷脾故齒黃也醫說箕山伊尹曰果之美者江浦之橘箕山之栗呂覽千樹燕秦千樹栗其人與千戶侯等漢書栗五方皆有周秦吳楊特饒唯漁陽范陽栗甜美長味他方不及也倭韓國上栗大如鷄子亦短味不美桂陽有栗叢生大如柿詩義䟽上林苑有侯栗瑰栗魁栗榛栗嶧陽栗嶧陽都尉曹龍所獻大如拳西京雜記十五枚一升漢武帝果園栗十五枚為一升三秦記案其栗味甘而小不如三秦所說括地志安平好棗中山好栗魏郡好杏河內好稻真定好梨河晏九州論中山好栗地產不以為珍盧毓冀州論劉秀之為丹陽尹先是秀之從叔穆之為丹陽與子弟於廳事上飲宴廳事柱有一穿穆之謂子信及秀之曰汝等試以栗遙擲此柱若能入穿必得此郡唯秀之獨入焉其言果驗宋書世說沈約常侍宴會豫州獻栗徑寸半奇之問眾栗事多少與約各䟽所知約少帝三事約出謂人曰此公護短前不讓即羞死帝以其言不遜欲抵其罪徐勉固諫得止梁書蕭琛嘗預御筵醉伏上以棗投琛琛乃取栗擲帝中面御史中丞在席帝動色曰此中有人不得如此豈有說也琛曰陛下投臣以赤心臣敢報之以戰栗上王可交居松江泛江見舫中有道士七人皆玉冠霞帔呼可交上舫與二栗青赤光如棗長二寸許肉脆而甘如飴食盡令去俄頃坐於石上問樵者何地即天台也續神仙傳鳳冠栗謝玄卿遇神仙設鳳冠栗續仙傳李德裕一夕柑子園會客盤中有猴栗無味陳堅處士云荊州南有漸栗形如棗核酉陽晉王嘗窮追汴師糧運不繼蒸栗以食軍中遂呼栗為河東飯清異錄栗之出南山其上多栗葛山銅山其未多栗山經栗有關中侯栗大如鷄子梁州獻栗徑寸半越中栗大如拳廣志諸暨產如拳之栗地理志馬韓出大栗如梨後四夷傳東夷魏國出大栗如梨魏志東北方荒中有木名曰栗高二十丈有殼徑三尺三寸刺長尺餘實徑三尺殼赤肉黃白味甜食之多令人氣短而渴神異經汝水灣中有地數頃上有栗園不並固安之實然歲貢三百石以充天府水渚即栗洲也樹高茂望若屯雲積氣矣林中有栗射埻堂甚閑敞牧宰及英彥多所遊薄水經注朔濱西域獻崑山之蒲桃北燕薦朔濱之巨栗王逸荔枝賦胡栗蔡伯喈曰有胡栗齊民要術殼可為杯鄴中產巨栗脫其殼可以為杯鄴中記赤實果柿曰赤實果說文七絕俗謂柿樹有七絕一壽二多陰三無鳥巢四無蟲五霜葉可翫六嘉實七落葉肥大酉陽木中根固柿為最俗謂之柿盤上孝感韋順為東平相賞罰必信有柿樹生屋上從庭中遂茂順至孝行人以為感于天地而生東觀漢記烏枇梁侯烏枇之柿閑居賦梁侯園有烏椑八稜大如酒盞地理志徽章華林園柿六十一株徽章殿前柿一株晉宮閣名殊本合條吳令顧修期言縣西鄉有柿樹殊本合條枝義熙起居錄柿酸番禺有酸柿甜梅李乂果賦云梅甜柿酸述異記金液懸霜照采凌冬挺潤甘清玉露味重金液梁簡文啟枯死復生景雲二年高祖故第有柿樹自天授中枯死至是復生五行志鄭虔好書嘗苦無紙於是慈恩寺貯柿葉數屋遂往日取葉肄書歲久殆遍本傳醂柿藏果實謂之醂今醂柿是也力感切楊彥齡筆錄青埤上林苑有青椑赤葉椑烏椑西京雜記宜都出大椑荊州土地記丹若石榴一名丹若酉陽若榴石榴也廣雅天漿李衛公云石榴甜者謂之天漿能已乳石毒酉陽安石榴有酸淡兩種道家謂之三尸酒云三尸得此果則醉本草有一種子白瑩澈如水晶者味亦甘謂之水晶石榴上塗榴張騫使西域還得安石榴博物志張騫為漢使外國十八年得塗林安石榴陸機與弟雲書環榴吳王以潘夫人遊昭宣之臺志意幸愜既盡酣醉唾於玉壺中使侍婢瀉於臺下得火齊指環即挂石榴枝上因其處起臺名曰環榴臺時有諫者云今吳蜀爭雄還劉之名將為妖矣權乃翻其名曰榴環臺拾遺記江表記引稽神必苑子大如盞石虎苑中有安石榴子大如椀盞其味不酸鄴中記武陵臨沅獻安石榴子大如椀其味不酸一蔕六實晉安帝起居注元嘉末魏太武征彭城遣求甘蔗安石榴張暢曰石榴出自鄴下當非彼所有宋書宋太始中劉亮為益州刺史齋前石榴樹陵冬生華實亮以問道士始康邵碩碩曰此為狂華宋諸劉滅亡之象南史始興王鑑傳魏白馬寺有大榴京師語曰白馬甜榴一石直牛伽藍記合肥浮槎山俗傳自海上浮來梁武帝女為尼於此山建道林寺寺有榴花根幹偉茂即帝女手植方興勝覽齊安德王延宗納趙郡李祖收女為妃後帝幸李宅宴而妃母宋氏薦二石榴於帝前問諸人莫知其意帝投之問魏收曰此竟何意收曰石榴房中多子王新婚妃母欲子孫眾多帝大喜詔收卿還將來仍賜美錦二疋北史孔紹安仕隋高祖受禪自洛陽間行求奔高祖見之甚悅拜內史舍人時夏侯端亦嘗為御史監高祖軍先紹安歸朝受秘書監紹安因侍宴應制詠石榴詩可惜庭中樹移根逐漢臣秪為來朝晚開花不及春時人稱之舊唐鄭虔云石榴堪作胭脂睿宗女代國公主常為之棄其實于禁中叢生成林北戶錄閩縣東山有榴花洞唐永泰中樵者藍超遇白鹿逐之渡水入石門始極窄忽豁然有鷄犬人家主翁謂曰吾避秦人也留卿可乎超云欲與親舊訣乃來與榴花一枝而出恍然若夢中再往竟不知所在方興勝覽武宗朝術士金陵許元長善變幻武宗謂之曰先朝明崇儼取羅浮山甘子萬里往來止于旬日東都當進石榴時已熟矣卿今日當致十顆元長奉詔而出及旦寢殿始開金盤貯石榴致于御榻俄有使奉進亦以所失之數上聞靈驗變通皆如此類劇談錄金櫻兩浙避錢鏐之名號石榴為金櫻邵武郡庭有石榴一株士人視所實之數以為豋科之信熙寧康戍歲有雙實於木末者又有附枝而雙實者是歲葉祖洽上官均名在一二何與京兄弟同牓祖洽有詩曰已分桂葉爭雲路不負榴花給露枝蓋謂此也海錄紹興間漢陽軍有石榴枝插于石罅秀茂成陰歲有花實者初郡獄有誣孝婦殺姑婦不能自明屬行刑者插髻上花于石罅曰生則可以驗吾冤行刑者如其言後果生宋志崖州婦人以安石榴花着釜中經旬即成酒其味香美仍醉人方輿勝覽頓孫國有安石榴取汁停杯中數日成美酒扶南傳三十八河陰石榴名三十八中只有三十八子也瑣碎錄味絕洛中南詔石榴子大皮薄如藤紙味絕於洛中酉陽重六斤大食勿斯離國石榴重五六斤石榴者天下之奇樹九州之名菓也是以屬文之士或敘而賦之遙而望之煥若隋珠輝重淵詳而察之灼若列宿出雲間千房同樣十子如一御飢療渴解醒止醉潘岳賦惟木之珍莫美石榴擢鮮葩於清春結芳實於素秋徐藻妻陳氏賦彤子振綠葉於柔柯垂彤子之累衰王倫妻羊氏賦上林苑上林苑有胡桃西京雜記西域種張騫使西域還得胡桃博物志華林園華林園胡桃八十四株晉宮閣名植胡桃後蜀李雄玉衡十二年扶風人韓豹為太史令雄卒子期立以豹為太傳猶領侯職豹嘗言於期曰臣今老志在田園欲植胡桃願賜其種期不悟俄而李壽自涪率眾南向襲尅成都廢期自立廣五行記紐滔母荅虞吳國書胡桃本生兩羗外剛內柔質似古賢欲以奉貢挺自禁園味逾井絡動物迴祗在微必應此乃胡羯奔逃吉之先見者也沈約啟陳倉胡桃薄皮多肌陰平胡桃大而皮脆急捉則碎廣志梅杏類也樹及葉皆如杏而黑煮而曝乾為蘇置羹矐虀中又可含以香口詩義䟽上林苑有朱梅紫葉梅紫蕚梅同心梅麗枝梅燕梅猴梅西京雜記越俗說會稽山夏禹廟中有梅梁忽一春而生枝葉述異記大梅山在鄞縣東七十里蓋漢梅子真舊隱也山頂有大梅木其上則伐為會稽禹廟之梁其下則為它山堰之梁禹廟之梁張僧繇畫龍于其上夜或風雨飛入鏡湖與龍闘後人見梁上水淋漓而萍藻滿焉始駭異之乃以鐵索鎖于柱四明圖經梅溪淹梅溪昔有梅樹吳國采為姑蘇臺後忽於此沉今湖州側猶有梅溪蘇州記越使諸發執一枝梅遺梁王梁王之臣曰韓子顧謂左右曰惡有以一枝梅以遺列國之君者乎請為二三子慚之出謂諸發曰大王有命客冠則以禮見不冠則否諸發曰彼越亦天子之封也不得冀兗之州乃處海垂之際屏外蕃以為居而蛟龍又與我爭焉是以剪髮文身爛然成章以像龍子者將避水神也今大國其命冠則見以禮不冠則否假令大國之使時過敝邑敝邑之君亦有命矣曰客必翦髮文身然後見之於大國何如意而安之願假冠以見意如不安願無變國俗梁王聞之披衣出以見諸發令逐韓子說苑邯鄲有故邯鄲宮基存焉中有趙王果園梅李至冬而花春得食述異記魏武行役失道軍皆渴乃令曰前有大梅林饒子甘酸可以解渴士卒聞之口皆出水乘此得及前源世說梅下種樂蘇耽後園梅樹下種藥可治百病桂陽先賢傳陸凱與范曄相善自江南寄梅花一枝詣長安與范并贈詩曰折花逢驛使寄與隴頭人江南無所有聊贈一枝春荊州記范信至能啖梅人嘗置一斛奩信留食之須臾而盡語林武帝女壽陽公主人日臥于含章殿簷下梅花落公主額上成五出之華拂之不去皇后留之看得幾時經二日洗之乃落宮女奇其異效之今稱梅花粧是也金陵志柳惲嘗與瑯琊王瞻博射嫌其皮闊乃摘梅帖鳥珠之上發必命中觀者驚駭南史隋開皇中趙師雄遷羅浮一日天寒日暮於松林間見美人淡粧素服出迎時殘雪未消月色微明師雄與之語但覺芳香襲人語言極清麗因與之扣酒家共飲少頃有一綠衣童來笑歌戲舞頃醉寢但覺風寒相襲久之時東方已白起視乃在大梅花樹下上有翠羽啾嘈相顧月落參橫但惆悵而已龍城錄蕭倣為嶺南節度使倣性公廉南海雖富珍綺月俸之外不入其門家人疾病醫工治藥須烏梅左右於公廚取之倣知而令還之促買於市舊唐蜀郡有紅梅數本花之殊品也郡侯建閣扃鑰遊人莫得見一日梅開有兩婦人高髻大袖凭欄倚笑郡侯啟鑰闐不見人惟東壁有詩曰南枝向煖北枝寒一種春風有兩般憑仗高樓莫吹笛大家留取倚闌干摭遺大庾嶺上梅南枝落北枝開寒煖之候異也韓偓出內庭詩玉為通體尋常見香號返魂客易回之句其題云嶺南梅花一歲再發金堂密記返魂香入嶺頭梅東坡誰信幽香是返魂和楊公濟梅花嚼梅前蜀王建判官馮淆好戲時鳳翔遣張郎中通好來晨宴接王慮馮公先語而張子乘之或致失機乃令客將傳達旦請緘默坐既定而賓主寂然無敢發其語端者馮乃取青梅鏗然一嚼之四坐流涎因成大笑楊彥贍六帖補李后主於宮中作紅羅亭四面栽紅梅作艷曲歌之韓熙載和之云桃李不須誇爛熳已輸了春風一半時已失淮南矣故云古今詩話大庾嶺上有佛塔廟有婦人題云妾幼年侍父任英州司寇既代歸父以大庾本有梅嶺之名而反無梅遂植三十株于道之右因題詩于壁今隨夫之任端溪復至此寺前詩已污漫矣因再書之云英江今日掌刑回上得梅山不見梅輟俸買將三十本清香留與雪中開好事者因以夾道植梅矣倦游錄方輿勝覽紅梅清艷兩絕昔獨盛於姑蘇晏殊始移植西岡第中特珎賞之一日貴遊洛園吏得一枝分接由是都下有二本緫龜故蜀別苑在成都西南十五里多梅有兩大梅夭矯如龍人謂梅龍老學叢談梅槐合生洪亭村下有梅廻村舊云是梅槐合生成樹是以名之今音訛謂之梅廻江陵記許洛中有江梅椒萼梅綠萼梅千葉黃香梅凡四種曲洧舊聞橫公魚長七八尺形狀如鯉而目赤晝在湖中夜化為人刺之不入煮之不死烏梅二七煮之即熟食之治邪病神異經子如彈丸楊梅其子如彈丸正赤五月中熟熟時如梅味甘甜酸臨海異物志楊梅葉如龍眼樹冬青一名机音求潘州有白色者甘而絕大北戶錄楊家菓楊脩字德祖九歲聰慧孔文舉詣其父父不在乃呼脩脩為設菓菓有楊梅融指示兒曰此君家之菓耶脩應聲曰未聞孔雀是夫子之家禽郭子楊氏子九歲孔君平詣之云云世說楊周年七歲孔君平詣之云云此真君家果金樓子齊王虛之庭中楊梅樹隆冬三實又每夜所居有光如燭墓上橘樹一冬再實時人咸以為孝感所致南史任昉為新安太守郡有蜜嶺及有楊梅舊為太守所採昉以冒險多毒物故即時停之梁書王薿字豐父守會稽童貫時方用事貫苦腳氣或云楊梅仁可療是疾豐父裒五十石以獻之後擢待制再任不歷貼職徑登次對惟豐父一人揮麈錄楊梅塢杭州楊梅塢在南山近瑞峰石塢內有一老嫗姓金其家楊梅甚盛俗稱楊梅塢所謂金婆楊梅是也古蹟事實甘橘之屬滋味甜美特異者也有黃者有頳者謂之壺甘風土記甘實形如石榴者亦謂之壺甘古今注有黃甘一核有成都平蔕甘大如升色蒼黃犍為南安縣出黃甘廣志宜都郡舊江北甘園名宜都甘荊州記丹陽張磐字子石為廬江太守尋陽令嘗餉一奩甘橘其小男年七歲就取一枚磐奪取付外卒以兩枚與之磐奪兒甘鞭卒曰何故行賂於吾子謝承書吳李衡字叔平襄陽人習竺以女英習配之漢末為丹陽太守每以妻計得全衡每欲治家事妻輒不聽後密遣客十人往武陵龍陽泛洲上作宅種甘橘千株臨死勑兒曰汝母惡吾治家故窮如是然吾州里有千頭木奴不責汝衣食歲上千匹絹亦可足用爾衡亡後二十餘日兒以白母母曰此當是種柑橘也汝家失十戶客來七八年必汝父遣為宅汝父恒稱太史公言江陵千樹橘當封君家吾荅云且人患無德義不患不富若貴而能貧方好爾用此何為吳末衡柑橘成歲得絹數千匹家道殷足晉咸康中其宅止枯樹猶在襄陽耆舊傳文帝時彭城王義康顓總朝政四方獻饋皆以上品薦義康而以次者供御上嘗冬月噉甘其形味並劣義康在坐曰今年甘殊有佳者遣人還東府取甘大供御者三寸宋書唐光宅中李崇真為益州刺史廳事前有甘樹有甘大如鷄子晚熟微小有孔如針群官咸異之方欲將進久而方罷因剖之得一赤班蛇長尺餘崇真後為兵所殺廣五行記調露中連州見一柑樹四月中有子如斗大剖之有兩頭蛇益州歲進甘子皆以紙裹之他時長吏嫌紙不敬代之細布既而恐柑子為布所損每懷憂懼俄有御史甘子布至長吏以為推布裹甘子事懼曰果為所推及子布到驛長吏敘以布裹甘子為敬子布初不知之久而方悟聞者莫不大笑唐新語天寶中中書門下奏曰臣等今日因奏事承德音聞江南為橘江北為枳蓋以地氣有殊物性因變朕近於宮內種甘子樹數株今秋以來結實一百五十顆乃與江南及蜀道所進無別亦可謂稍異也舊唐宰臣表賀曰雨露所均混天區而齊被草木有性憑地氣以潛通故茲江外之珍果為禁中之佳實綠蔕含霜芳流綺殿金衣爛日色麗彤庭云云乃頒賜大臣外有一合歡實上與妃子互相持翫上曰此果似知人意朕與卿固同一體所以合歡於是促坐同食焉因令畫圖傳之於後楊奴外傳羅浮山有御園甘子唐玄宗幸蜀子乃不生德宗梁亦不實僖宗狩蜀花實皆無樹亦枯瘁續南越志中和辛丑翠轝在蜀优詔以雲棧巖嶮罷貢洞庭丹實是歲木奴之屬既醢且瘠唐闕史羅浮甘子開元中始有山僧住於南樓寺其後嘗資進獻幸蜀幸奉天之歲皆不結實舊唐安祿山將反宰臣韋見索請以平章事追之玄宗許焉草詔訖中留之遣中使輔璆琳送甘子且觀其變璆琳受賂而還因言無反狀玄宗謂宰臣曰祿山必無二心詔本朕已焚矣上明皇食甘已千餘枚皆缺一瓣問進甘使者云途嘗有道士嗅之蓋羅公遠也宣宗朝有術者董元素自江南來上召見留于上林中宿泊夜召與語曰聞君頗有神術今南中柑橘正熟卿能致之否元素對曰請安一合于御榻前數刻時有微風入簾元素乃啟其合柑子滿其中奏曰此江陵枝江縣柑也遠處恐遲上嚐之驚嘆異聞集變甘新州出變甘有苞大如升許且皮薄如洞庭之柑餘柑之所弗及傳云移植不數百里形味俱變因以為名北戶錄南康郡有東望山山頂有果林周四里許眾果畢植行列整齊如人功也甘子熟嘗有三人造之共食致飽又懷二枚欲以示人廻旋半日迷不得歸聞空中語云放雙柑乃聽汝去懷柑者恐怖放甘於地轉眄即見歸徑乃相與俱返述異記南康歸美山石城內有甘橘橙柚就食其實任意取足脫持歸者便見大虺或顛仆失徑家人啖之亦病異苑雲南北勝州有獅頭柑狀如獅頭而色黃有大如椀其味最甘雲南志璇星璇星散為橘運斗樞千樹蜀漢江陵千樹橘與千戶侯等史記伊尹告湯曰果之美者沙棠之實箕山之東青鳧之所有櫨橘焉江浦之橘雲夢之柚漢上之箞今本作石耳所以致之呂覽晏子使楚王謂其左右曰晏嬰習辭者也吾欲傷之坐定而縳一人至問何為曰齊人坐盜王視晏子曰齊人善盜乎晏子對曰嬰聞橘生於淮北則為枳枝葉徒似其實味不同水土異也今民生於齊不盜入楚則盜得無楚之水土使民善盜耶王笑曰寡人反取病焉晏子食橘不剖晏子使楚楚王進橘置削晏併食不剖王曰橘當剖對曰臣聞賜人主前者瓜桃不削橘柚不剖今者萬乘無教故不敢剖臣非不知也上陽虎去齊走趙簡子問曰吾聞子善樹人虎曰虎不善樹人云云主俛而笑曰夫樹橘柚者食之則甘嗅之則香樹枳棘者成而棘人故君子慎所樹韓子御覽引以柤棃橘柚者厭橘孝武帝平百越以為園圃而民皆厭橘鹽鐵論橘柚生於江南而民皆甘之於口味同也上后皇嘉樹橘徠服兮受命不遷生南國兮深固難徙更壹志兮綠葉素榮紛其可喜兮行比伯夷置以為像兮楚辭橘頌沛國桓曄字文林一名嚴避地居楊州從事屈豫室中中庭有橘樹一株遇其實熟數垂室內嚴以竹藩樹四面風吹落兩實墮地以繩縳繫樹枝謝承書朱光祿為建安郡中庭有橘冬月樹上覆裹之至明年春夏色變青黑味尤絕美上林賦云盧橘夏熟盧黑色也蓋近是乎吳錄地理志盧橘屬土有給客橙似橘而非若柚而香冬夏華實相繼或如彈丸或如拳通歲實之亦名盧橘魏王花木志橘稅越多橘柚園越人出橘稅謂之橙橘戶亦曰橘籍吳闞澤表曰請除臣之橘籍越中有王氏橘園胡氏梅園賀氏之瓜述異記孔安國閉宅忽有二人來云自帝庭來謁一衣綠曰藤子一衣黃曰黃子語吳大帝時事歷歷可聽及去遣人尋之入未央宮庭中衣綠者入於藤下衣黃者入於橘下三吳志劉先主時巴郡結舫水居者五百家縣有橘官荔支園夏至則熟二千石常設廚膳命士大夫共會樹下食之縣北有稻田出御米水經吳黃武中交趾太守士爕獻橘十七實同一蔕以為瑞異群臣畢賀南方草木狀晉咸和六年西平將軍庾亮送橘十二實共同一蔕以為瑞異建武故事孝武大明中芳香琴堂東西有雙橘連理改芳香琴堂為連理堂宋書豫章王嶷薨忽見形於第後園乘腰輿指麾處分呼直兵無手板左右授一玉手板與之曰橘樹一株死可覔補之因出後園閣直兵倒地仍失手板齊書梁侯景未平王僧辨獻嘉橘一蔕二十五子于湘東王王荅之曰昔文康獻橘十有二子用今方古彼有慚色今景之兇惡既稔凱歌之聲已及嘉瑞遠臻但增哽慰三國典略黃衣圍城陳後主夢黃衣人圍城繞城橘樹盡伐去之及隋兵至上下通服黃衣未幾為隋攻圍之應廣五行記巴卭人家有橘園霜後諸橘盡收餘二大橘如三斗盎巴人異之剖開每橘有二叟鬚眉皤然肌體紅明皆相對象戲談笑自若一叟曰橘中之樂不減商山但不得深根固蒂為愚人摘下耳幽竹錄韋蘇州寄橘書云書後欲題三百顆洞庭須待滿林霜後人多言率爾成章不知南朝有人於紙尾寄洞庭霜橘三百顆正用此事王右軍帖云奉橘三百顆霜未降不可多得同出于此芝田錄序國子朱司業言南方柑橘雖多亦畏霜每霜時亦不甚收唯洞庭霜雖多却不能損詢彼人云洞庭四面皆水也水氣上騰尤能閣霜所以洞庭柑橘最佳歲收不耗正為此耳文昌雜錄分貢劉晏自江淮名橘珍柑常與本道分貢兢欲先至雖封山斷道以禁前發晏厚資致之嘗冠諸府唐書弛橘禁薛戎遷浙東觀察使所部州橘未貢先鬻者死戎弛其禁上柳玭為嶺北節度副使廨中橘熟既食乃納質于官上清霜始降上命中使賜臣等朱橘各三枚蓋靈囿之所植也臣伏以度淮而枳由地氣而不遷吹谷生黍信陽和之所感昔漢武致石榴於異國靈根遐布此西域柔服之應也魏武植朱橘於銅雀華實莫就乃吳人未格之兆也遠自湘山移根清禦始發素榮俄成丹寶臣貞葉凝碧蔚湘岸之夕陰華實變黃動江潭之秋色冰心獨潤金衣更鮮樹隱方塘此丹墀之效實盤映皎目與赤瑛而共研并食不割竊愧晏嬰之知捧之以拜重感桓榮之賜瑞橘賦一品集陳允升好道撫州危全諷迎置郡中嘗夜坐危謂之曰豐城橘美頗思之允升曰方有一船泊豐城港今為取之港去城十五里少頃便還攜一布囊數百異人錄世說有枇杷黃醫者忙橘子黃醫者藏李大異回醫生書云遺白金三十兩奉納以備橘黃之需橘為樹白華赤實皮既馨香又有善味江南則有之不生他所交趾橘有置官長一人秩三百石主歲貢御橘矣曹叔異物志綠橘出洞庭東西山比常橘特大未霜深綠色臍間一點先黃味最全可啖故名綠橘范成大蘇志大如斗成都有柚大如升廣志嶺南有柚大如冬瓜本草讓木橘樹直竦枝葉不相妨蜀人謂之讓木江鄰幾雜志蒼梧土諺曰郡中甘橘多被黑蟻所食人家買黃蟻投于樹上因相鬥黑蟻死柑橘遂成寰宇記覩屍橘覩屍而實繁榴得骸而葉茂類從果中易生者莫如桃而結實遲者莫如橘諺云頭有二毛好種桃立不踰膝好種橘蓋言桃可待橘不可待曲洧舊聞金橘其實小如彈黃如金謂之金橘花果錄金橘產于江西都人初不甚貴後因溫成皇后好食之由是價重京師欲久留此果藏于菉豆中經時不變橘性熱而豆涼也歸田錄吳楚之國有大木焉其名為櫾碧樹而冬生實丹而味酸食其皮汁已憤厥之疾齊州珍之渡淮而北而化為枳焉地氣然也列湯問故曰橘柚有林萑蒲有叢又曰橘柚凋於北徙若榴鬱於東移也埤雅南珍荔枝甘橘南珍之上廣志此木以荔枝為名者以其結實時枝弱而蒂牢不可摘取以刀斧劙取其枝故以為名耳扶南記荔字亦用欐字衛洪七間云蒲萄龍目椰子荔枝作此字北戶注南越王尉佗獻高祖鮫魚荔枝高祖報以蒲桃錦四匹西京雜記扶荔宮漢武帝破南越建扶荔宮扶荔者以荔枝得名自交趾移植百株于庭無一生者連年移植不息後數歲偶一株稍茂然終無花實帝亦珍惜之一旦忽萎死守吏坐誅死者數十遂不復茂其實則歲貢焉郵傳疲斃于道極為生民之患至後漢安帝時交趾郡守極陳其弊遂罷其貢三輔黃圖上林賦荅遝離支舊南海獻龍眼荔枝十里一置五里一候奔騰阻險死者繼路和帝時臨武長汝南唐羗以縣接南海乃上書諫曰臣聞上不以滋味為德下不以貢膳為功故天子食太牢為尊不以果實為珍伏見交趾七郡獻生龍眼等鳥驚風發南州土地惡蟲猛獸不絕於路至於觸犯死亡之害死者不可復生來者猶可救也此二物升殿未必延年益壽帝於是下詔曰遠國珍羞本以薦奉宗廟茍有傷害豈有愛民之本其勑太官勿復受獻由是遂省焉謝承書每歲進荔枝郵傳者斃死於道漢朝下詔止之今猶脩事荔枝煎進焉其樹自徑尺至於合抱葉密如冬青木性堅重其根工人多取為阮咸槽彈弓棊局廣州記楊貴妃生於蜀好荔枝南海荔枝勝蜀者當時以馬遞馳載七日七夜至京人馬多斃於路百姓苦之然方暑而熱經宿者輒敗新舊唐一騎紅塵妃子笑無人知道荔枝來杜牧詩天寶十四載六月日於驪山駐蹕是貴妃誕辰上命許雲封等小部音聲樂長生殿仍奏新曲未有曲會南海進荔枝因以曲名荔枝香左右歡呼聲動山谷是年祿山叛甘澤謠白居易為忠州刺史在郡為木蓮荔枝圖寄朝中親友各記其狀曰荔枝生巴峽間樹形團團如帷蓋葉如桂冬青華如橘春榮實如丹夏熟朵如蒲桃核如枇杷殼如紅繒膜如紫綃瓤肉潔白如冰雪漿液甘酸如醴如酪大略如彼其實過之若離本枝一日而色變二日而香變三日而味變四五日外色香味盡去矣舊唐宋公荔枝泉州所產者樹極高大世傳已三百歲舊屬王氏黃巢兵過欲伐之時王氏主其木媼抱木願併戮巢兵為之不伐今雖老矣其實益滋繁味益甘滑真佳植也徐師仁湖山集莆田荔枝名品皆出天成雖以其核種之終與其本不相類宋香之後無宋香所存者孫枝爾陳紫之後無陳紫過墻則為小陳紫矣此果形狀變態百出不可以理求或似龍牙或類鳳瓜釵頭紅之可簪錄珠子之旁綴非人力所能加也容齎四筆十八娘荔枝色深紅而細長俚傳閩王王氏有女第十八好噉此品因而得名其塜今在城東報國院塜旁猶有此樹云荔枝譜治平中長沙趙琪作廣東提刑韶州公宇西軒有荔枝數本中夏時荔枝方熟琪將召刺史賞燕一夕荔枝皆空皮核滿地琪深訝之乃開西軒見壁上有詩曰吾儕今日會嘉賓滿酌洪鍾酒數巡遍地狼籍不知曉荔枝又是一番新荔枝皆積其下二廣人多傳異之青瑣高議福建官譚徽之元符末出郊見一園荔枝垂熟徽之採食少憩樹下朦朧中夢至一室美人盛服出迎攜手而入飲間吟云妾生原在粵閩間六月南州始薦盤肉嫩色包丹鳳髓皮枯稜澀紫鷄冠咽殘風味消心渴嚼破天漿沁齒寒却憶當年妃子笑紅塵一騎過長安荔枝食之有益于人列仙傳云有食其華實為荔枝仙人本草云通神益知多食亦不傷人葛洪云蠲渴補髓譜荔枝閩中第一蜀川次之圖經荔枝木之大者子至百斛其花青白狀若冠之蕤纓實如松花之初生者殼若羅紋初青漸紅肉淡白如肪玉味甘而多汁五六月盛熟時彼方皆燕會其下以賞之賓主極量取噉雖多亦不傷人少過度則飲蜜漿一盃便解扶南記梧州江前有火山上有荔枝四月先熟核大而味酸其高新州與南海產者最佳五月方熟形若小鷄子近蒂稍平皮殼殷紅肉瑩寒玉又有焦核者性熱液甘食之過度即蜜漿制之又有臈荔枝黃色味稍劣於紅者嶺表錄異三種為𤏡道廣南荔枝熟時百鳥肥其名之曰焦核小次曰春花次曰朝偈此三種為美次鱉卵大而酸以為醢和率生稻田間廣志焦核荔枝冬青夏至日子始赤六七日可食甘酸可人其細核者謂之焦核荔枝之最珍也竺法真登羅山䟽荔枝青華朱實核黃黑似熟蓮子實白如肪甘而多汁似安石榴有浸酢者至日將已時翕然俱赤則可食也廣志荔枝熟時人未採則百蟲不敢近人才採之烏鳥蝙蝠之類無不殘傷故採荔枝者日中而眾採之本草無核梧州火山者夏初先熟而味少劣其高潘者最佳五六月方熟有無核類鷄卵大者其肪瑩白不減水精性熱液甘乃奇實也北戶錄廣州信安縣有連理荔枝樹即傍挺龍目側生荔枝也寰宇記益智益智龍眼也廣雅比目龍眼一名比目本草一名亞荔枝海錄蔓生龍眼樹葉似荔枝蔓延緣木生子大如酸棗色異純甜無酸廣志龍眼子樹如荔枝但枝葉稍小殼青黃色形圓如彈丸大核如木槵子而不堅肉白蒂漿其甘如蜜一朵恒三十十顆作穗如蒲桃然荔枝方過龍眼即熟故謂之荔枝奴以其常隨後也南方草木狀益智葉如嫩荷莖如竹箭子從心中出一枝有十子內白骨四破去之取外皮蜜煮為粽子味辛廣州記益智子如筆毫長七八分二月華實色仍連著實五六月熟味辛雜五味中芬芳亦可鹽曝南方草物狀益智類薏苡長寸許如枳梖子味辛辣飲酒食之佳異物志安帝元年盧循為廣州刺史遺劉裕益智粽裕乃荅以續命湯二十六國春秋損餉六種深抱情至益智乃是一方異味即於僧中行之慧達法師答盧循書香孟智子似廉薑香如荳蔻寰宇記鴨腳銀杏一名鴨腳因葉相似也格物總論京師舊無鴨腳李文和自南方來移植於私第因而著子自後稍稍蕃多不復以南方為貴詩話總龜唐鄭光讌飲把酒曰某改令身上取果子名云膍臍薛保遜還令云腳杏滿座大笑盧氏雜說汴人龔猗以殿中侍御史扈高宗南渡道經崑山貞義里折銀杏一株插地祝曰若此枝得活吾於是居其枝長茂遂成大樹如癭如乳者凡七十餘顆相傳為其子孫嗣世之數崑山志漢武帝因張騫言遣李廣利伐宛而還又發使十餘輩抵宛西諸國求奇物漢使采蒲萄苜蓿種歸漢大宛傳於是天子始種苜蓿蒲萄肥饒地及外國使來眾則離宮別觀旁盡種蒲萄苜蓿極望史記藝文引廣利破宛得種御覽因之誤中國珍果甚多且復為說葡萄當其末夏涉秋尚有餘暑酒醉宿醒掩露而食甘而不餚脆而不酸冷而不寒味長汁多除煩解餚又釀以為酒甘於麴蘖善醉而易醒道之固以流涎咽唾况親食之耶他方之果寧有疋之者魏文詔白馬寺浮圖前葡萄異于餘處枝葉繁衍子實甚大偉於棗味殊美冠於中京伽藍記俗言葡萄蔓好引於西南庾信謂魏使尉瑾曰我在鄴遂大得葡萄奇有滋味陳昭曰作何形狀徐君房曰有類軟棗信曰君殊不體物何得不言似生荔枝魏肇師曰魏武有言云云道之固以流涎稱奇况親食之者瑾曰此物出自大宛張騫所致有黃白黑三種成熟之時子實逼側星編珠聚西域多釀以為酒每來歲貢在漢西京似亦不少杜陵田五十畝中有蒲萄百樹今在京邑非直止禁林也信曰乃園種戶植接蔭連架昭曰其味何如橘柚信曰津液勝奇芬芳減之瑾曰金衣素裏見苞作貢向齒自消良應不及酉陽報縑李元忠曾貢文襄葡萄一盤文襄報以百縑遺練書曰儀同立亞台鉉識懷貞素出藩入侍備經要重而猶家無擔石室若懸磬豈輕財重義奉時愛已故也久相嘉尚嗟詠無極恒思標賞有意無由忽辱蒲桃良深珮戴聊用絹百匹以酹清德也北齊通志貢玉蒲桃高祖賜群臣食於御前果有葡萄侍中陳叔達執而不食高祖問其故對曰臣母患口乾求之不能得高祖曰卿有母可遺乎遂流涕嗚咽久之乃止因賜物百叚舊唐太宗時葉護獻馬乳蒲桃一房長二尺餘子亦稍大其色紫舊唐蒲萄酒西域有之前代或有貢獻人皆不識及破高昌收馬乳蒲桃實於苑中種之并得其酒法太宗自損益造酒為丸有八色芳辛酷烈味兼醍醐既頒賜群臣京師始識其味上飲漿四月上已日上幸司農少卿王光輔庄駕還頓後中書侍郎南陽岑義設茗飲葡萄漿與學士等討論經史景龍文館記貝丘之南有葡萄谷谷中葡萄可就其所食之或有取歸者即失道世言王母葡萄也天寶中沙門曇霄因遊諸岳至此谷得葡萄食之又見枯蔓堪為杖大如指五尺餘待還本寺植之遂活長高數仞蔭地幅員十丈仰觀若帷蓋焉其房實磊落紫瑩如墜時人號為草龍珠帳酉陽大月氏國善為葡萄花葉酒或以根及汁醞之其花似丁香而綠榮碧鬚春夏之時萬鬚兢發如鸞翼八月中風至吹葉上傷裂有似綾紈故人呼為葡萄風亦名為裂葉風金樓子鷄卵波斯國磨鄰老勃蕯歲獻貴人葡萄大者如鷄卵大食國葡萄大如鷄子唐書崑山葡萄西旅獻崑山之葡萄王逸荔枝賦似螺檳榔菓也似螺可食周成雜字檳門檳榔一名檳門李富之藥錄南遊奇觀豫章俞益期性氣剛直不下曲俗容身無所遠適在南與韓康伯牋曰惟檳榔樹最南游之奇觀子既非常木亦特異余在交州時度之大者三圍高者也丈餘葉聚木端房棲葉下花秀房中子結房外其擢穗似黍其綴實似穀其皮似桐而厚其節似竹而概其中空其外勁其屈如覆虹其伸如縋繩本不大末不小上不傾下不斜調直亭亭千百若一步其林則寥廓庇其蔭則蕭條可以長吟可以遠想矣但性不柰霜不得北植必當遐立海南遼然萬里不遇長者之目自令人恨深齊民要術水經注贈檳榔王高麗年十四五時四月八日在彭城佛寺中謝混見而以檳榔贈之執王手謂曰王郎謝叔源可與周旋否風俗記劉穆之少時家貧誕節嗜酒食不脩拘檢好往妻兄家乞食多見辱不以為恥其妻江嗣女甚明識每禁不令往江氏後有慶會屬令勿來穆之猶往食畢求檳榔江氏兄弟戲之曰檳榔消食君乃常飢何乃須此妻復截髮市殽饌為其兄弟以餉穆之自此不對穆之梳沐及穆之為丹陽尹將召妻兄弟妻泣而稽顙以致謝穆之曰本不匿怨無所致憂及至醉穆之乃令廚人以金柈貯檳榔一斛以進之南史常餌檳榔任昉父遙本性重檳榔以為常餌終嘗求之剖百許口不得好者昉以所嗜好深以為恨遂終身不嘗檳榔上齊命通直散騎常侍辛德源聘于陳陳遣主客蔡佞宴醻因談謔手弄檳榔乃曰頃聞北間有人為噉檳榔獲罪人間遂禁此物定爾不德源荅曰此是天保初王尚書罪狀辭耳猶如李固被責云胡粉餙貌搔頭弄姿不聞漢世頓禁胡粉三國典略液如朱南海地氣暑濕人多患胸中痞滯故常啗檳榔數十口加勃蔞藤泊蜆反同咀之液如朱色程思孟知番禺凡左右侍吏啖檳榔者悉杖之或問其故曰我惡其口唇如漱血耳宋朝類苑檳榔樹如椶櫚高七八丈無枝柯上有十許葉正月結房一房二百餘子花甚香每生即落一籜籜堪為扇至五月熟大如鷄子以海蠡殼燒作灰名曰蛤賁灰共扶留葉藤和而嚼之香美除口氣久食令人齒黑故南人有雕題黑齒之俗雲南記寰宇記檳榔大如棗色青似蓮子彼人以為異婚族好客輒先進此物若邂逅不設用嫌恨南中八郡志直亭檳榔樹大圍丈餘高十餘丈皮似青桐節如桂竹下本不大上末不小調直亭亭千萬若一森秀無柯頂上有葉葉似甘蕉條泒開破仰望渺渺如插叢蕉於竹杪風至觸動似舉羽扇掃天葉下繫數房房綴十數子家有數百掛扶踈如墜繩也林邑記安南人自嫩及老採實啖之以不婁籐兼之瓦屋子灰競咀嚼之自云交州地溫不食此無以祛其瘴癘廣州亦噉檳榔然不甚於安南也嶺表錄異紫檳榔紫檳榔即馬金囊狀類白蔻嚼塗惡瘡甚效或食一枚飲冷水即無所傷雲南志山檳榔山檳榔一名蒳子幹似蔗葉類柞一叢千餘幹幹生十房房底數百子四月採竺法真豋羅浮山說橄欖樹身聳枝皆數丈其子深秋方熟閩中尤重其味云咀之香口勝含鷄舌香生喫及煮飲悉解酒毒有野生者子繁樹峻不可梯緣但刻其根下方寸許內鹽于其中一夕子皆自落樹枝節上生脂膏如桃膠南人採之和其皮葉煎之調如黑𩛿謂之橄欖糖用濯船損乾後牢於膠漆着水益乾堅耳嶺表錄異博羅縣有合成樹十圍去地二丈分為三衢東向一衢大葉似練子如橄欖而硬削去皮南人以為糝南向一衢橄欖西向一衢橄欖南越志有樹名獨根分為二枝其東向一枝是木威樹南向一枝是橄欖樹金樓子餘甘子初入口舌澀酸飲水乃甘又如梅實核兩頭銳呼為餘甘橄欖同一物異名耳臨海異物志制魚橄欖木作楫魚皆浮出本草誤落橄欖在池中魚盡斃瑣碎錄薑制橄欖木開花如樗將採其實剝其皮以薑汁塗之則盡落江鄰幾雜志椰子樹似檳榔而高大葉長一尺無陰結實一房生三十餘子如瓜其殼中有肉如熊白味似胡桃內有漿一升清如水甜如蜜飲之愈渴疾殼堪為酒器皮堪縳船土人多種之寰宇記椰樹高六七丈無枝葉葉如束蒲在上其實如瓠繫之顛實外皮如胡蘆膚中有汁升餘清如水味美于蜜食其膚則不飢食其汁則增渴又有如兩眼處俗人謂之越王頭異物志昔林邑王與越王有故怨遣俠客刺得其首懸之於樹俄化為椰子林邑王憤之命剖以為飲器南人至今效之當時刺時越王大醉故其漿猶如酒云南方草物狀訶陵國俗以椰樹花為酒其樹生花長三尺餘實大如人腦割之取汁以成酒味甘飲之亦醉唐書筒承椰子有漿截花以竹筒承其汁作酒飲之亦醉也交州記東南荒中有椰木焉高二三十丈或十餘丈圍丈餘或七八尺其枝喬直上二百歲葉落而生花花形如甘瓜復二百歲一落盡而生萼下生子三歲而成熟成熟之後不長不減子形如寒瓜似冬瓜也長七八寸徑四五寸萼覆其頂此實不取萬世如故若取下子而留萼萼復生子如初其子形如甘瓜瓤甘美如蜜食之令人身澤不可過三升令人冥醉半日乃醒木高人不能得唯木下有多羅樹人緣能得之一名無葉一名倚驕張茂先曰驕直上不可那也世人後生不見葉謂之無葉也一名綺縞人見無葉謂之綺縞神異經魚復縣地多木瓜樹有子大如甒音武白黃實甚苦香爾雅所謂楙也水經齊孝昭北伐庫莫奚至天池以木瓜灰毒魚皆死而浮出庫莫奚竊相謂曰池有靈魚犯之不祥乃出長城北遁齊主分兵追擊獲牛羊七萬振振而還三國典略楊后思食酸味明皇以告張說因進經袖出木瓜以獻明皇雜錄天台石橋梁既峭危下臨絕澗過者心悸石罅有木瓜華時有蛇盤紏至實落供大士乃去號為護聖瓜方輿宣州人種木瓜始成顆則鏇紙花以貼其上夜露日曝而變紅花紋如生可愛上天中記卷五十二
