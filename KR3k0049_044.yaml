body:
  text: 酒酒就也所以就人性之善惡也一曰造也吉凶所起造也說文酒酉也釀之米麴酉懌久而味美也亦言踧也能否皆彊相踧待飲之也又入口咽之皆踧其面也釋名麥釀黍凡黍為酒陽據陰力能動故以麥釀黍為酒緯酒者天之美祿帝王所以頤養天下享祀祈福扶衰養疾百禮之會非酒不行漢食貨志王莽詔曰夫鹽食肴之將酒百藥之長上酒始古有醴酪禹時儀狄作酒古史考儀狄始作酒醪變五味少康作秫酒世本昔者帝女令儀狄作酒而美進之禹禹飲而甘之遂䟽儀狄絕旨酒曰後世必有以酒魏策陳公子完奔齊為公正飲桓公酒樂公曰以火繼之辭曰臣卜其晝未卜其夜不敢君子曰酒以成禮不繼以淫義也以君成禮弗納于淫仁也左莊二十二齊桓公為大臣具酒期以日中管仲後至桓公舉觴以飲之管仲半棄酒桓公曰棄而後至飲而棄酒於禮可乎管仲對曰臣聞酒入舌出舌出者言失言失者身棄臣計棄身不如棄酒桓公笑曰仲父起就坐說苑齊桓公飲酒醉遺其冠恥之三日不朝管仲曰此非有國之恥也公胡不雪之以政公曰善因發倉賜貧窮論囹圄出薄罪處三日而民歌之曰公胡不遺冠乎韓子酒敗楚莊王攻宋廚有臰肉樽有敗酒將軍子重諫曰今君廚肉臰而不可食樽酒敗而不可飲而三軍之士皆有飢色欲以勝敵不亦難乎莊王曰請有酒推之士有食饋之賢王孫子新書晉師伐虢虢公出奔至澤中曰吾飢渴甚其御者進清酒腵脯問御曰汝何故謟諛曰恐君必亡所以儲也虢公作色怒御者曰臣言誤也君所以亡者天下皆不肖疾公賢也虢公喜據軾而笑飢勌乃枕御者膝而臥御以塊代其膝而去虢公因餓死賈誼書鄢陵之戰楚王召子反謀榖陽豎獻飲於子反子反醉而不能見王曰天敗楚也夫余不可以待乃宵遁左成下景公飲酒移於晏子之家晏子立于門曰國得無有故乎君公何為非時而夜辱公曰酒醴之味金石之聲願與夫子樂乎晏子曰臣不敢與焉公乃移於司馬穰直之家穰直荅如晏子公復移於梁丘據據左執琴右擁竿行歌而至公曰樂哉無彼二子何以持國無此一臣何以樂身晏子晏子飲景公酒日暮公呼具火晏子辭曰詩曰側弁之俄言失德也屢儛傞傞言失容也既醉以酒醉飽以德既醉而出並其福賓主之禮也醉而不出是謂伐德賓主之罪也嬰以卜其日未卜其夜公曰善舉酒而祭之再拜而出曰豈過我哉吾託國于晏子也以其家貧善寡人不欲其淫侈也而况於寡人謀國乎說苑叔孫婼聘于宋明日宴飲酒樂宋公使昭子右坐語相泣也樂祁佐退而告人曰今茲君與叔孫其皆死乎吾聞之哀樂而樂哀皆喪心也心之精爽是謂魂魄魂魄去之何以能久昭二十五越王勾踐出行有獻酒一壺者王曰吾獨飲之若三軍何乃投于川命三軍飲之皆告醉呂氏春秋物類相感志昔良將用兵人有饋一簟醪者必投之于何言將士遞流而飲之其味同之也黃石公記平原君與子高飲強子高酒曰昔有遺諺堯舜千鍾孔子百觚子路嗑嗑尚飲十榼古之聖賢無不能飲也吾子何辭焉子高曰以穿所聞賢聖以道德兼人未聞以飲食也此言生於嗜酒者蓋其勸厲獎戲之辭非實然也孔叢子魯酒薄魯酒薄而邯鄲圍聖人生而大盜起莊子楚宣王朝諸侯魯恭王後至而酒薄宣王怒欲辱之恭公不受命乃曰我周公之胤長於諸侯行天子禮樂勳在周室我送酒已失禮方責其薄無乃太甚遂不辭而還宣王怒乃發兵與齊攻魯梁惠王常欲擊趙而畏楚救楚以魯為事故梁得圍邯鄲言事相由也亦是感應注楚會諸侯魯趙俱獻酒於楚王魯酒薄而趙酒厚楚之主酒吏求酒於趙趙不與吏怒乃以趙厚酒易魯薄酒奏之楚王以趙酒薄故圍邯鄲也許慎注淮南魏文侯與大夫飲酒使公乘不仁為觴政曰飲不嚼者浮以大白文侯飲而不盡嚼不仁舉白浮君君視而不應侍者曰不仁退君已罪矣不仁曰周書曰前車覆後車戒蓋言危也今君已設令令不行可乎君曰善舉白而飲飲畢曰以公乘不仁為上客說苑齊威王置酒後宮問淳于髡曰先生能飲幾何而醉對曰臣飲一斗亦醉一石亦醉王問故髡曰賜酒大王之前執法在前御史在後髡恐懼飲不過一斗徑醉矣若乃履舄交錯盃盤狼籍堂上燭滅主人留髡而送客當此之時髡心醉歡能飲一石故曰酒極則亂樂極則悲萬事盡然言不可極極之而衰以諷諫焉齊王曰善乃罷長夜之飲史記紹績昧醉寐而亡其裘宋君曰醉足以亡裘乎對曰桀以醉亡天下而康誥曰母彝酒者彝酒常酒也常酒者天子失天下匹夫失其身韓非子趙王武臣間出為燕軍所得燕囚之欲求分地使者往十餘輩輒殺之有厮養卒請往張耳陳餘遣之及見燕王燕王問之對曰賤人希見長者願請一巵酒已飲又問之復曰賤人希見長者願復請一巵酒與之酒卒乃為言之因曰耳餘名求趙王實欲燕殺之分趙自立耳燕王以為然乃歸趙王養卒為御而歸新序孔融與曹操書云趙之厮養東迎其主非巵酒無以激其氣九州春秋漢制宗廟八月飲酎用九醞太牢皇帝侍祠以正月旦作酒八月成名曰酎一曰九醞一名醇酎西京雜記高廟酎張晏曰正月旦作酒八月成名曰酎酎之言純也至武帝時因八月嘗酎會諸侯廟中出金助祭所謂酎金也師古曰酎三重釀醇酒未厚故以薦宗廟景紀季布為河東守孝文時人有言其賢者孝文召欲以為御史大夫復有言其勇使酒難近至留邸一月見罷史記灌夫武帝即位以為淮陽太守入為太僕與長樂衛尉竇甫飲輕重不得夫醉摶甫甫太后昆弟上恐太后誅夫徒夫為燕相夫為人剛直使酒不好面諛貴戚諸執在已之右欲必陵之士在已左愈貧賤尤益禮敬與釣稠人廣眾薦寵下輩士亦以此多之前漢無愁酒漢武作無愁酒飲之令人無憂王箱雜記漢禮樂志景星歌云百末旨酒布蘭生師古曰百末百草華之末也旨美也以百草末雜酒故香且美也晉灼曰芬香布外若蘭之生也枚乘七發曰蘭英之酒酌以滌口良注曰酒口漬蘭葉取其香也謝靈運詩蘭巵獻時哲旨酒布蘭生龍城錄謂漢武百味旨酒名武帝思懷李夫人親侍者覺帝容色愁怨乃進洪梁之酒酌以文螺之巵巵出波袛之國酒出洪梁之縣此屬右扶風至哀帝廢此邑南人受此釀法今言雲陽出美酒兩聲相亂矣帝飲三爵色悅心歡拾遺記君山仙酒庾穆之湘州記云君山上有美酒數斗得飲之而不死為神仙漢武帝聞之齋居七日遣鄽巴將童男女數十人來求之果得酒進御未飲東方朔在旁竊飲之帝大怒將殺之朔曰既酒有驗殺臣亦不死無驗安用酒為帝笑而釋之寺僧云春時往往聞酒香尋之莫知其處岳陽風土記道士言君山左右皆有美酒數斛得飲之者不死湘中記蓋寬饒京師為清平恩侯許伯入第丞相御史等皆賀寬饒不行許伯請之迺往許伯白酌曰蓋君後至寬饒曰無多酌我我迺酒狂丞相魏侯笑曰今公醒而狂何必酒也坐者皆屬目卑下之前漢于定國食酒至數石不亂冬月治請讞飲酒益精明上客轄投井陳遵字孟公嗜酒每大飲賓客滿堂輒關門取客車轄投井中雖有急終不得去上大雅流連富平侯張放淳于長等成帝愛幸出為微行入侍禁中設宴飲之會及趙李諸侍中皆引滿舉白談笑大噱班伯云沈湎于酒微子所有告去也式號式謼大雅所以流連也注言作詩之人嗟嘆而泣涕流連也詩書淫亂之戒其言皆在於酒上昔有人名劉玄石曾從中山酒家酤酒酒家與千日酒飲之忘言其節度歸至家大醉不醒數日家人不知以為死也具棺殮葬之後酒家至向千日滿乃憶玄石前來酤酒醉當醒矣遂往索玄石家而問之云玄石亡已三年今服闋矣于是與家人至石掘冢開視玄石始醒起于棺中又俗云玄石飲酒一醉千日愽物志齊人田乃之能為千日酒飲過一升醉臥千日有故人趙英飲之喻量而去其家以為死埋之乃之計千日當醒往至其家破棺出之尚有酒氣鬼神至怪錄漢末政在閹宦扶風孟佗獻西涼州葡萄酒十斛于張讓即拜涼州刺史換涼州見三輔決錄大宛左右以蒲萄為酒富人藏酒至萬餘石久者至數十年不敗史記俗傳飲之醉彌月不解愽物志王母嘗下帝設蒲萄之酒漢武內傳蒲萄讓以為酒甘于麯米逆之因以流涎咽唾魏文帝詔苻堅使呂光討西域至龜茲城胡人厚於養士家有蒲桃酒或至千斛十年不敗士卒淪沒酒藏者相繼矣載記李白進清平詞貴妃以玻璃七寶杯酌西涼葡萄酒飲白楊妃傳孟詵云葡萄不問土地但收之釀酒皆得美好續愽物志靈帝未有司榷酒斗酒直千錢劉表一子好飲乃製三爵大曰伯雅容七升次曰仲雅五升小曰季雅三升又設大鍼于杖端客有酒輒以刺之驗醉醒也魏文典論飲酒一石盧植飲酒一石不醉後漢書袁紹總兵荊州遣使邀鄭玄大會賓客玄最後至乃延升上坐身長八尺飲酒一斛秀眉明日容儀溫偉後漢孔融集與曹操書云酒之為德久矣古先哲王類帝禋宗和神定人以濟萬國非酒莫以也故天垂酒星之燿地列酒泉之郡人著旨酒之德堯不千鐘無以建太平孔非百觚無以堪上聖樊噲解厄鴻門非豕肩鐘酒無以奮其怒趙之厮養東迎其王非引巵酒無以邀其氣高祖非醉斬白蛇無以暢其靈景帝非醉幸唐姬無以開中興袁盎非醇醪之力無以脫其命定國不酣飲一斛無以決其法故酈生以高陽酒徒著功於漢屈原不餔糟歠醨取困於楚由是觀之酒何負於政哉又書曰昨承訓荅陳二代之禍及眾人之敗以酒亡者實如來誨雖然徐偃王行仁義而亡今令不絕仁義燕噲以讓失社稷今令不禁謙退魯因儒而損今令不棄文學夏商亦以婦人失天下今令不斷婚姻而將酒獨急者疑但惜榖耳非以亡王為戒也後漢注坐客常滿孔融為大中大夫及退閑職賓客日盈其門常歎曰坐上客常滿尊中酒不空吾無憂矣與蔡邕善邕卒後有虎賁士貌於邕融每酒酣引與同坐曰雖無老成人尚有典刑本傳孝靈末百司湎酒酒千文一斗常侍張讓子奉為太醫令與人飲輒去衣露刑為樂也典論祖裸進酒洛陽令郭珍家有巨億每暑召客侍婢數十盛粧飾羅縠披之祖祼其中使進酒上邴原初辭家求學原舊性能飲酒自行之後八九年間酒不向口單才負笈苦身持力至陳留則師韓子助潁川則宗陳仲弓汝南則交范孟慱涿郡則親盧子幹臨別師友以原不飲酒會米肉送原原曰本能飲酒但以荒思廢業故斷之耳今當遠別因見貺餞可以飲燕於是共坐飲酒終日不醉魏志葉歆能劇飲至石餘不亂眾人徵察常以其整衣冠為異江南號之曰華獨坐華矯叔論曹公時禁酒而人竊飲之故難言酒以曰酒為賢人清酒為聖人上徐邈字景山魏國初建為尚書郎時科禁酒而邈私飲至於沉醉校尉趙達門曹事邈曰中聖人達白太祖太祖甚怒度遼將軍鮮于輔進曰平日醉客謂酒清者為聖人濁者為賢人邈性慎獨遇醉言耳坐刑後車駕幸許昌問邈曰頗復中聖人不邈對曰昔子反斃於榖陽御叔罰於飲酒臣嗜同二子不能自懲時復中之然宿瘤以醜見傳而臣已醉見識帝大笑顧左右曰名不虛立魏志鄒陽酒賦曰清者為酒濁者為醴清者聖明濁者頑騃西京雜記王凌表滿寵年過躭酒不可居方任帝將召寵給事中郭謀曰寵為汝南太守豫州刺史二十餘年有勳方岳及鎮淮南吳人墠之若不如所表將為所闚可令還朝問以方事以察之帝從之寵既至進見飲酒至一石不亂帝慰勞之遣還魏略時苖德胄性嫉惡為壽春令蔣濟作揚州治中苖初至謁濟濟素嗜酒適會其醉不時見苖苖恚悵還刻木為人署曰酒徒蔣濟立于墻下旦夕射之州縣知無柰之何上化為酒壺鄭泉字文淵陳郡人慱學有奇志而性嗜酒其間居每曰願得美酒滿五百斛船以四時甘脆置兩頭反覆沒飲之憊即住而啖肴膳酒有斗升臧隨即益之不亦快乎權以為郎中使蜀臨卒謂同類曰必葬我陶家之側庶百歲之後化而成土幸見取為酒壺實獲我心矣吳書孫皓每饗宴無不竟日坐席無能否率以七升為限雖不悉入口皆澆灌取盡韋曜素飲酒不過二升初見禮異時常為裁臧或密賜茶荈以當酒至於寵衰更見偪彊輒以為罪又於酒後使侍臣難折公卿以嘲弄侵克發摘私短以為歡笑吳志劉伶病酒渴甚從婦求酒婦捐酒毀器涕泣諫曰君飲太過非攝生之道必宜斷之伶曰甚善我不能自禁唯當祝鬼神自誓斷之耳便可具酒肉婦曰敬聞命供酒肉於神前請伶祝誓伶跪而祝曰天生劉伶以酒為名一飲一斛五斗解酲婦人之言慎不可聽便引酒進肉隗然已醉矣世說客有詣伶值其裸袒伶笑曰吾以天地為宅舍以屋宇為㡓衣諸君自不當入我㡓中又何惡乎鄧粲晉紀酌以大㯆諸阮皆能飲酒仲容至宗人閒共集不復用常桮斟酌以大㯆盛酒圍坐相向大酌時有群猪來飲直接去上便共飲之世說阮宣子常步行以百錢挂杖頭至酒店便獨酣畼雖當世貴盛不肯詣也上王戎弱冠諸阮籍時劉公榮在坐阮謂王曰偶有二斗美酒當與君共飲彼公榮者無預焉二人交觴酹酢公榮遂不得一桮而言語談戲三人無異或有問之者阮荅曰勝公榮者不得不與飲酒不如公榮者不可不與飲酒唯公榮可不與飲酒上張季鷹縱任不拘時人號為江東步兵或謂之曰卿乃可縱適一時獨不為身後名邪荅曰使我有身後名不如即時一桮酒上濬仲曰勝公榮故與酒不如公榮不可不與酒唯公榮可不與酒晉陽秋鴻臚卿孔群好飲酒王丞相語云卿何為恒飲酒不見酒家覆瓿布日月糜爛群曰不爾不見糟肉乃更堪久群嘗書與親舊今年田得七百斛秫米不了麴蘖事世記周伯仁風德雅重深達危亂過江積年恒大飲酒嘗經三日不醒時人謂之三日僕射上桓公有主簿善別酒有酒輒令先嘗好者謂青州從事惡者謂平原督郵青州有齊郡平原有鬲縣從事言到臍督郵言在鬲上住上王忱嗜酒醉輒經日自號上頓世喭以大飲為上頓起自忱也宋明帝文志王忱少慕達好酒在荊州轉甚一飲或至連日不醒遂以此死晉安帝紀王孝伯問王大阮籍何如司馬相如王大曰阮籍胸中壘塊故湏酒澆之世說形神相親王仲大歎言三日不飲酒覺形神不復相親王孝伯云名士不湏奇才但使常得無事痛飲酒讀離騷使可稱名士也欲傾家釀劉尹云見何次道飲酒使人欲傾家釀元帝過江猶好酒王茂弘與帝有舊常流涕諫帝許之命酌酒一酣從是遂斷金貂換酒阮孚為散騎常侍終日酣縱常以金貂換酒為有司所彈三十六國春秋賀知章見李白呼為摘仙人以金龜換酒本傳謝奕為桓溫司馬謂之方外司馬因以酒逼溫走入南康主門避之主曰君無狂司馬何由得相見奕遂引溫一兵師於廳事共飲曰失一老兵得一老兵亦可所怪晉書孟嘉為桓溫參軍嘉好酣飲愈多不亂溫問嘉酒有何好而卿嗜之嘉曰公未得酒中趣耳上祖台州與王荊州書古人以酒為戒願君屏爵棄巵焚罍毀榼殛儀狄于羽山放杜康于三危孔嚴祖父奕為全椒令明察過人時有遺之酒者始入門奕遙曰餉吾兩甖酒其一何故非也檢視之果是水或問其故曰酒重水輕提酒者手有輕重故耳陶侃每飲酒有定限常觀有餘而限已竭殷浩等勸更少進侃悽懷良久曰年少曾有酒失亡親見約故不敢踰晉書孝武末年嗜酒好肉而會稽王道子昏醟尤甚唯狎昵謟邢於是國寶讒諛之計稍行於主相之間上王弘為江州刺史欲識陶潛不敢致也潛常往廬山弘令潛故人龐通之齎酒具於半道栗里要之潛有腳疾使一門生二兒轝籃輿既至欣然便共飲酌俄頃弘至亦無忤也先是顏延之為劉柳後軍功曹在尋陽與潛情款後為始安郡經過日日造潛每往必酣飲致醉延之臨去留二萬錢與潛潛悉送酒家稍就取酒嘗九月九日無酒出宅邊菊叢中坐久值弘送酒至即便就酌醉而後歸潛不解音聲而畜素琴一張無絃每有酒適輒撫弄以寄其意貴賤造之者有酒輒設潛若先醉便語客我醉欲眠卿可去其真率如此郡將侯潛值其酒熟取頭上葛巾漉酒畢還復者之宋書餞送酒家顏延之在尋陽與陶淵明情款後為始安郡經過潯陽日就淵明飲焉每往必酣飲致醉延之臨去留二萬錢與淵明淵明悉遺送酒家稍就取酒唐陽城為諫議大夫每約二弟吾所俸入而可度月食米幾何薪菜塩幾錢先具之餘悉送酒家無留也顏延之以醉謁何尚之尚之望見便佯眠延之發簾熟視曰杇木難雕尚之謂左右曰此人醉甚可畏據鞍索酒顏延之好騎馬遨遊里巷遇舊知輒據鞍索酒得必傾盡欣然自得宋書顧憲之字士思元徽中為建康令清儉強力為政甚得人和故都下飲酒者醇旨輒號為顧建康謂其清且美焉上孔顗為江夏內史使性使酒仗氣每醉輒彌日不醒不治產業居常貧罄無有豊約朱嘗關懷為二府長史典籤諮事不呼不敢前不令去不敢去雖醉日居多而明曉政事醒時判決未嘗有擁眾咸云孔公一月二十九日醉勝他人二十九日醒也沈文季出為吳興太守文季飲酒至五斗妻王氏飲酒亦至三斗常對飲竟日而視事不廢袁粲嘗步屧白楊郊野閒道遇一士大夫便呼與酣飲明日此人謂被知顧到門求進粲曰昨飲酒無偶聊相邀了竟不與相見嘗作五言詩訪迹雖中宇循寄乃滄洲蓋其志也南史十六村父留連袁粲常酌於白楊路忽逢村父便留連笑語人怪而問之荅曰吾侶偶遊非知音也上行炙內妓大明中尚書僕射顏師伯豪貴下省設女樂王琨時為度支尚書要琨同飲傳酒行炙皆悉內妓琨以男女無親授傳行每至令置床上回避之然後取畢文如此坐上莫不撫手談笑琨容色自若師伯後為設樂邀琨琨不往南史宋明帝宴會朝臣以南臺御史賀藏為柱下史紏不醉者沈文季不肯飲酒被驅下殿南齊書謝諫不妄交接有時酌曰入吾室者但有清風對吾飲者惟當明月謝朏為吳興之弟𤅢於征虜渚送別朏指𤅢口曰此中唯宜飲酒𤅢建武之朝專以長酣為事與劉瑱沈昭略交飲各至數斗朏既至郡致𤅢數斗酒遺曰力飲此物勿豫人事齊書三騶對飲謝幾卿性通脫為尚書左丞嘗預樂遊花宴不得醉而還詣道邊酒爐停車褰幔與車前三騶對飲觀之如堵幾卿自若曾於省閣裸飲小遺下霑為南司所彈高允被勑論集往世酒之敗德以為酒訓孝文覽而悅之酒之為變惑情性雖曰哲人孰自能競在官者怠於政也為下者慢于令也聰達之士荒于聽也柔順之倫興于諍也久而不悛致于病也豈止于病乃損于命諺亦有云其益如毫其損如刀魏書劉藻為東平別將辭孝文于洛水之南孝文曰與卿石頭相見藻對曰臣才非古人度亦不留賊虜而陛下輒當驪曲阿之酒以待百官高大笑曰今未至曲阿且以酒東數石賜卿上梁武帝東行記有覆船山酒罃山高驪山云昔高驪有女東海神乘船致酒禮聘之女不肯行海神撥船覆酒流入曲阿故傳曲阿有羹酒曲阿在丹徒縣圖經輿地志云曲阿出名酒皆云後湖水所釀故醇烈也今按湖水上承丹徒高驪覆船山馬林溪水水白味寰宇記任昉謂劉杳曰酒香千里當是虛言杳曰桂林程鄉有千里酒飲之至家而醉亦其例也昉大驚曰吾自當遺忘實不憶此杳曰出楊元鳳所撰置郡事其賦云三重五品商溪里又在昉坐有人饋昉𣒅酒而作榐字昉問杳此字是否杳曰葛洪字苑作木旁若𣒅音振木名其汁可以為酒梁書梁武帝招延後進二十餘人置酒賦詩臧盾以詩不成罰酒一斗飲盡顏色不變言笑自若蕭介染翰便成文無加點帝兩美之曰臧盾之飲蕭介之文即席之美也上陰鏗嘗與賓友飲宴見行觴者因迴酒炙以授之眾坐皆笑鏗曰吾儕終日酣飲而執爵者不知其味非人情也及侯景之亂鏗嘗為賊擒或救之獲免鏗問之乃前所行觴者上崑崙觴魏賈㹡家累千金慱學善著作有蒼頭善別水常令乘小艇於黃河中以瓠匏接河源水一日不過七八升經宿器中色赤如絳以釀酒名崑崙觴酒之芳味世中所絕曾以三十斛上魏莊帝酉陽雜俎洛陽城西張方橋即漢之夕陽亭也市西有退酤治觴二里里由之人多醞酒為業河東人劉白墮善能釀酒季夏六月時暑赫晞以甖貯酒暴於日中經一旬其酒不動飲之甚美而醉經月不醒京師朝貴多出郡登藩遠相餉饋踰于千里以其遠至號曰鶴觴亦名騎驢酒永熙年中南青州刺史毛鴻賓齎酒之蕃逄路賊盜飲之即醉皆被擒獲因復命擒奸酒遊俠語曰不畏張弓拔刀唯畏白墮春醪伽藍記東坡詩獨看紅蕖傾白墮故張文潛戲之東坡以惟有杜康為應汝南王悅兄清河王懌為元乂所害悅了無讎恨之意乃以桑落酒候伺之乂大喜以悅為侍中大尉魏書蒲坂西舜所都有姓劉名墮採楫河流醞成芳酎食同枯枝之年排于桑落之辰故酒得其名水經注河中桑落坊有井每至桑落時取其寒暄得所以井水釀酒甚佳故名後史補坐開桑落酒一云廬山有桑落洲杜詩桑落多美酒庾信從蒲州刺史乞酒詩云蒲城桑落酒灞岸菊花秋世說索郎酒桑落時美因以為名續古今注釀桑落酒亦以九月索郎桑落反語也齊民要術胡叟字論許少聰敏披讀群籍再閱于目皆誦于口仕魏家于密雲蓬室草筵惟以酒自適謂友人金城宗舒曰我此生活似勝焦先志意所棲謝其高矣叟少孤每言及父母則淚下若孺子之號春秋當祭之前則先求旨酒美膳將其所知攜榼執壺至郭外空靜處設坐奠拜盡孝思之敬時燉煌汜潛家善釀酒每節送一壺于叟或謂潛曰再三之惠以為過厚子惠于叟何其恒也潛曰我給恒祭者以其恒於孝思也論者以潛為君子矣魏書樂部郎祖長命妻張氏事姑王氏甚謹太安中京師禁酒張以姑老且患私為醞之為有司所紏王氏詣曹自告曰老病湏酒在家私釀王所為也張氏曰姑老私患張主家事姑不知釀其罪在張主司疑其罪不知所處平原王陸麗以狀奏高祖義而赦之上孝義傳王肅與孝文帝殿會帝因舉酒曰三三橫兩兩縱誰能辨之賜金鍾御史中丞李彪曰沽酒老嫗甕注缻屠兒割肉與秤同尚書右丞甄琛曰吳人浮水自云二妓兒擲繩在虛空彭城王勰曰臣始解此是習字高祖即以金鍾賜彪伽藍記李元忠雖處要任初不以物務干懷唯以聲酒自娛大率常醉家事大小了不關心園庭羅種果藥親朋尋詣必留連宴賞每挾彈攜壺關遨里閈每言寧無食不可使我無酒阮步兵吾師也孔少府豈欺我哉後自中書令復求為太常卿以其有音樂而多美酒故神武欲用為僕射文襄言其放達常醉不可委以臺閣其子搔聞之請節酒元忠曰我言作僕射不勝飲酒樂爾愛僕射宜勿飲酒孫騰司馬子如嘗詣元忠逢其方坐樹下葛巾擁被對壺獨酌庭室蕪曠使婢卷兩褥以質酒肉北史不為酒令湘東王時為京尹與朝士宴集屬王規為酒令規從容對曰自江左以來未有茲舉特進蕭琛金紫傳昭在坐並謂為知言梁書阮孚性機辨好酒貌短而禿周文帝偏所眷顧嘗於室內置酒十缻缻餘一斛上皆加帽欲戲孚孚適入室見即驚喜曰吾兄弟輩甚無禮何為竊入王家匡坐相對宜早還宅也因持酒歸周文撫手大笑北史竊酒乞婢齊郡王簡性好酒不能理公私之事妻常氏燕郡公喜女也文明太后以賜簡幹綜家事頗節簡酒乃至盜竊求乞婢侍卒不能禁北史齊皇甫亮性質朴純厚終無斥言矯餙屬有勑下司各列勤墮亮三日不上省文宣王親詰其故亮曰一日雨一日醉一日病酒文宣王以其實優容之北齊楊羲夢遊蓮萊山會蓮萊仙公洛廣休既下山半見許主簿相遇於夾石之間公語主簿曰吾為汝置酒四升在山上可往飲之此太平家酒治人膓也諺曰欲得長生飲太平真誥洪醉梁元帝徐妃性嗜酒多洪醉帝還房必吐衣中南史陳宣嗜酒與兄子秀書曰汝以飲酒為非吾以不飲酒為過昔周伯仁度江唯三日醒吾不以為少鄭康成一飲三百盃吾不以為多然洪醉之後有得有失成厮養之志是其得也使次公之狂是其失也吾常譬酒之猶水亦可以濟舟亦可以覆舟故江諮議有言酒猶兵也兵可千日而不用不可一日而不備酒可千日而不飲不可一飲而不醉美哉江公可與共論酒矣何水部眼不識盃鐺吾口不離瓢杓汝寧與何同日而醉與吾同日而醉乎速營糟丘吾將老焉身沒之後題吾墓曰陳故酒徒陳君之神道上縹醪酒太宗引崔浩論事語至中夜大悅賜浩縹醪酒十斛水晶戎塩一兩曰朕味卿言若此塩酒故與卿同其味也元魏書齎著作郎祖珽有文學多技藝而踈率無行嘗因宴失金叵羅於珽髻上得之鄭羲為西兗州刺史多所受納政以賄成性乂嗇吝人有禮餉者不與杯酒臠肉西門受羊酒東門酤賣之後魏王續字無功求為六合丞以嗜酒不任事高祖武德初以前官待詔門下省故事官給酒日三升或問待詔何樂耶荅曰良醞三升差可戀耳侍中陳叔達聞之日給一斗時號斗酒學士貞觀初以疾罷復調有司時大樂署史焦革家善釀績求為丞吏部以非流不許績固請曰有深意竟除之革死妻送酒不絕歲餘又死績曰天不使我酣美酒耶棄官去追述焦革酒法為經又采杜康儀狄以來善酒者為譜李淳風曰君酒家南董也所居東南有盤石立杜康祠祭之尊為師以其配著醉鄉記以次劉伶酒德頌其飲至五斗不亂人有以酒邀者無貴賤輒往著五斗先生傳杜之松故人也為刺史請績講禮荅曰門談糟粕棄醇醪也之松歲時贈以酒脯本傳缸面唐太宗使蕭翼求蘭亭真跡于越僧辨才才一見款密留宿設缸面酒江東缸面猶河北曰甕頭蓋初熟酒也書法要錄太宗破高昌收馬乳蒲桃實於苑中種之并得其酒法上自損益造酒酒成凡有八色芳辛酷烈味兼醍醐既頒賜群臣京師始知其味唐書魏左相證能治酒有名曰醽淥翠濤常以大金甖內貯盛十年飲不歇其味即世所未有太宗文皇帝嘗有詩賜公稱醽淥勝蘭生翠濤過玉薤千日醉不醒十年味不敗蘭生即漢武百味旨酒也玉薤煬帝酒名公此酒本學釀於西胡人豈非得大宛之法司馬遷所謂富人藏萬石葡萄酒數十歲不敗者乎龍城錄李密入關為邏所獲與支黨護送帝所出所有金元使者使者顧金禁漸施益市酒飲笑讙譁守者懈密寺遂夜亡去白帖白雞盞柳亨飲未醉造白雞盞取其迅速僉載唐韓王元嘉有一銅鶴樽背上注酒則一足倚滿則正不滿則危側上李景伯景龍中為諫議大夫中宗嘗與宰臣貴戚內宴酒酣遞唱迴波樂甚喧雜失禮次日景伯歌曰迴波尔時酒巵微臣職在箴規禮飲只合三爵君臣雜混非宜席為之散時人稱之唐書葉法善居玄真觀嘗有朝士詣之解帶淹留滿座思酒忽有一美措傲猊直入稱麴生秀才年二十餘肥白可觀笑揖諸公末席伉聲譁論良久暫起法善曰此子突入詞辯如此豈非䰡魅為惑乎俟其復至密以小劍擊之遂手墜于階下化為瓶榼一座驚攝遽視乃瓶醲醞也咸笑飲之其味甚佳白麴生風味不可忘也開元記汝陽王飲葉静能静能曰有一生能飲當令來謁翊日有通謁者曰進士常持滿見之侏儒也談胚腪之道飲以酒五斗醉倒乃是一甕耳河東記周穆王時有柸名常滿十洲記上始入斜谷天尚早煙霧甚晦知頓使給事中韋倜於野中得新熟酒一壺跪獻於馬首者數四上不為之舉倜懼乃注以他器引滿於前上曰卿以我為疑耶始吾御宇之初嘗飲大醉損一人吾悼之因以為戒迨今四十餘年未嘗甘酒味指力士及近侍者曰此皆知之非紿鄉也從者聞之無不感悅上孜孜儆戒也如是柳氏舊聞夜宴晝決李適之雅好賓友飲酒一斗不亂夜則宴賞晝決公務廷無留事唐書金牌斷酒安祿山受帝睠愛常與妃子同食無所不至帝恐外人以酒毒之遂賜金牌子繫於臂上每有公王召宴欲沃以巨觥祿山即以牌示之云准勑斷酒天寶遺事長安進士鄭愚劉參郭保衡王冲張道隱等十數輩不拘禮節旁若無人每春時選妖妓三五人乘小犢車指名園曲沼藉草躶形去其巾帽叫笑喧呼自謂之顛飲上李白嗜酒不拘小節然沉酣中所撰文章未嘗錯誤而與不醉之人相對議事皆不出太白所見時人號為醉聖上長安自昭應縣至都門官道左右村店之民當大路是酒量錢數多少飲之亦有施者與行人解之故路人號為飲馬杯上自暖盃內庫有一酒盃青色而有紋如亂絲其薄如紙於盃足上有縷金字名曰自暖盃上令取酒注之溫溫然有氣相次如沸湯遂收於内藏上李絳字深之曰今法令不及者五十餘州西戎內淆加此水旱無年陛下焦心銷志求濟時之略渠便高枕而臥哉帝入謂左右曰絳言骨鯁真宰相也遣使賜酴醿酒白帖孟浩然字浩然採訪使韓朝宗約浩然偕至京師欲薦諸朝會故人至劇飲歡甚或曰君與韓公有期浩然曰業已飲遑恤佗卒不赴上肅宗張皇后專權每進酒常寘䲻腦酒令人夕醉健忘酉陽生春酒德宗即位五月甲申劍南貢生春酒本紀李泌字長源泌請里閭釀宜春酒以祭勾芒神祈豊年帝悅乃著令麻姑送酒李泌以虛誕自任嘗對客曰令家人速洒掃今夜洪崖先生來有人遺美酒會有客至乃曰麻姑送酒來與君傾未畢門者曰某侍郎取榼子泌命倒還略無怍色國史補荷盃李宗閔暑月臨池以荷為盃裴鈞大宴有裴弘泰後至均不悅弘泰曰請在坐銀器盡滿飲之隨飲以賜可乎均許之遂竭坐上小爵至觥舡飲皆竭隨即寘器于懷有銀海受一斗以上弘泰一飲而盡踏其海卷抱之索馬徑去均使人問之方箕踞而坐稱所得銀器凡二百餘兩乾饌子婪尾盃申屠澄與路旁茅舍老父嫗及處女環火而坐翁自外攜酒壺至曰此君冒寒且進一杯澄因揖遜曰始自主人翁即巡澄當婪尾河東記蘇鶚云今人以酒巡匝為婪尾又云婪貪也謂處於坐未得酒既貪婪之故云宋景文守歲詩云迎新送故只如此且盡燈前婪尾盃白樂天詩云三盃藍尾酒一堞膠牙𩛿但改婪為藍耳或云藍穎水其深三丈時人取之以為酒又藍當作啉侯白酒律云酒巡匝未坐者連飲二盃為藍尾末坐遠酒行到常遲故連飲以慰之以啉為貪婪之意石林燕語元德秀罷魯山令愛陸渾佳山水乃定居不為墻垣扄鑰無僕妾歲飢或不爨嗜酒陶然彈琴自娛人以酒餚從之不問賢鄙為酣飲唐書老獻降階苖晉卿字元輔潞州壺關人充河北採訪使入計謁歸壺關太守迎槁吏所屬令行酒酒至必立飲白釂侍老有獻降階拜而飲時美其恭斐晉公盛冬用龍腦凝結刻小魚兒每沸酒一盞投一魚在內隨即消釋名魚兒酒順宗時處士伊初玄召入宮飲龍膏酒黑如純膝飲之令人神爽此本鳥弋山離國所獻杜陽編武宗會昌元年夫餘國貢火玉才人常用煎澄明酒其酒亦異方所貢也色如紫膏飲之令人骨香無憂武宗起望仙臺薦無憂酒冰寒郢水李德裕述夢詩云荷凈蓮池膾冰寒郢冰膠凡學士初上賜食皆悉是蓮池魚膾夏至湏冰及酒以酒味濃和冰而飲禁中有郢酒坊一品集林蘊仕不稱意縱酒自適多忤時政刑部尚書白居易贈詩戒之曰世上如今重檢身吾儕恃酒似狂人西曹舊日多持論慎莫吐他丞相裀閩中高士傳武元衡之西川大宴從事楊嗣復狂酒逼元衡大觥不飲遂以酒沐之元衡拱手不動沐訖徐起更衣終不令散宴乾𦠆子有一客僧長慶中屆一寺呼凈人酤酒寺僧見之怒其粗暴奪瓶擊柏樹其瓶百碎其酒凝滯著樹如綠玉搖之不散知僧云某常持般若經湏預飲此物一盃即諷詠瀏亮乃將瓶就樹盛之其酒盡落器中奄然流啜斯湏器窳酣矣釋氏會要進士顧非熊令狐相國楚聞其辨捷乃改一字令云水裏取一鼉岸上取一駞將者駞來馱者鼉是為鼉馱鼉非熊曰屋頭取一鴿水裏取一蛤將者鴿來合者蛤是謂鴿合鴿公大奇之紀異錄姚崇之孫巖傑與盧肇會于江亭時剻希逸在席肇改令曰欲目前取象一聯即發令曰遠望漁舟不闊尺八入姚遽飲酒一器凭欄吐噦湏臾即席還肇令曰凭欄一吐已覺空喉摭言宋人衛元規酒後忤宋州丁僕射謝書略曰自茲囚酒星於天獄焚醉日於秦坑人多記之上崔櫓酒後失荊州陸郎中肱以詩謝之曰醉時顛蹶醒時羞麴蘖催人不自由叵耐一雙窮相眼不堪花卉在前頭上鄭光在河中日遇國忌行香便與判官及眾客寺宴飲微令時薛保遜為客在坐光把酒曰某改令身上取一果子多膍臍他人皆盡思不得薛乃還令曰腳杏滿坐皆大笑玉泉子柳玭相國餗門人賈有奴頗橫馮球愛賈召奴責之奴泣謝未幾馮謁賈未出有二青衣齎罌出曰公恐君寒奉地黃酒三杯馮說盡舉之忠孝飲爵大中年丞郎宴席蔣伸在坐忽斟一杯言曰席上有孝于家忠于國及名重于時者飲此爵眾皆肅然無敢舉者獨李公景讓起引此爵蔣曰此宜其然盧氏雜說孫會宗僕射即渥相大王父也宅中集內外親表開宴有一甥姪為朝官後至及中門見緋衣官人衣襟前皆是酒涴咄咄而出不相識頃即席說于主人訝無此官沉思之乃是行酒時階上酹酒草草傾潑也自此每酹酒止側身恭跪一酹而已自孫氏始今人三酹非也北夢瑣言王源中文帝時為翰林承旨暇日與諸昆季蹴踘于大平里第毬子擊起誤中源中之額薄有所損俄有急召比至上訝之源中具以上聞上曰卿大雍睦命賜酒二盤每盤貯十金碗每碗各容一升許宣令并碗賜之源中飲之無餘略無醉容摭言同昌公主上每賜御饌其酒則有凝露漿桂花醞焦遂口吃對客不出一言醉後酹酢如注當時目為酒吃唐史拾遺陸相扆出典夷陵時有士子修謁相國與之從容因命酒酌勸此子辭曰天性不飲酒相曰誠如所言已校五分矣蓋平生悔吝有十分不為酒困自然臧半也北夢瑣言竟陵人劉虛白擢進士第嗜酒有詩云知道醉鄉無戶稅任他荒却下丹田上朱溫初兼四鎮蜀先生遣潘𡵻持聘𡵻飲一斗每讌飲禮容益莊溫飲酣謂曰押衙能飲一盤器物呼𡵻曰不敢乃簇在席器皿次第注酌𡵻並飲之𡵻愈溫克溫謂其歸館多應傾瀉困臥遺人偵之𡵻簪筍籜冠子秤所得酒器令下人收之上五代漢韋思在上黨五年惟務聚歛未嘗與賓佐燕會有從事請見思怒曰必是來獵酒也命典客飲而遣之續世記酒有別腸閩主廷曦與翰林學士周惟岳嘗會飲極酣因顧左右曰維岳身嫗甚小而能飲如詐酒左右對曰酒有別腸非可以肌體而論之延曦欣然曰果有別腸即使拽維岳下殿將取別腸而視之左右善對曰今侍奉飲樂惟維岳最有殊量取其別腸是無可陪奉者延曦然之遂獲免五國故事冬瓜片閩王延羲審知之子也即位后為長夜之飲銀葉為酒杯以賜飲群下銀葉即柔弱因目之為冬瓜片又名之曰醉如泥酒既盈不復置他所惟飲盡乃可置之自宗室臣宰而下多以拒命嘗一夕延羲乃為牛飲醉甚命宰相李準棄市而準方大醉臥於市中惟呼其婢春鶯而已刑者不敢殺置之他所明日視朝使召準左右以夜來之命對之延羲都不能知乃急召復其位上兵部李濤小字社翁時李公昉為翰林學士月給內醞兵部嘗因春社寄昉詩云社公今日沒心情為寄治聾酒一瓶惱亂玉堂將欲遍依稀巡到第三廳社酒號治聾酒賈氏談錄垂幃痛飲常楚錫為翰林剛正不附貴近或曰公剛直私門何以為樂常曰垂幃痛飲而已南唐近事楊隆演嘗飲酒樓上命優人高貴近待酒徐知訓為參軍隆演鶉衣髽髻為蒼鶻知訓嘗使酒罵坐語侵隆演隆演愧恥第泣而知訓愈辱之五代吳世家後蜀王衍後宮皆戴金蓮花冠酒酣免冠其髻髽然更施朱粉號醉粧國中人皆效之陶榖使越越王因舉酒令曰白玉石碧波亭上迎仙客陶對曰口耳王聖明天子要錢塘宣和間林攄奉使契丹國其中新為碧室云如中國之明堂伴使舉令曰白玉石天子建碧室林對曰口耳王聖人坐明堂伴使曰奉使不識字只有口耳壬即無口耳王林詞窘罵之幾辱命雲麓漫抄金陵語中酒曰酒惡則知李後主詩云酒惡時拈蘂嗅用鄉人語也侯鯖錄寇準在中書多召兩制就第飲宴必閉關苛留之畏謹者甚懼李宗諤嘗於門扉下竊出得馬而走後為修宮使恩顧漸深一日召至玉宸殿賜酒宗諤堅辭以醉且云日暮上令中使附耳語云此中不湏從門扉下出金坡遺事真宗皇帝嘗曲宴群臣於太清樓君臣懽笑無間忽問𢆖沽尤佳者何處中貴人以實價對之上遽問近臣曰唐酒價幾何無能對者惟丁晉公奏曰唐酒每斗三百上曰安知丁曰臣嘗讀杜甫詩曰速來相就飲一斗恰有三百青銅錢是知一斗三百上大喜曰甫詩可為一時之史玉壺清話宋時有以進士為舉首者其黨人意侮之會其人出令曰以字偏傍為率曰金銀釵釧鋪次一人曰絲綿細絹綱至其黨人曰鬼魅魍魎魁貢父詩話楊大年于丁謂席上舉令云有酒如線遇州必見丁云有餅如月因食則缺續青瑣高議東坡一日會客坐客舉令欲以兩卦名證一故事一人云孟嘗門下三千客大有同人一人云光武兵渡滹沱未濟既濟一人云劉寬婢美汙朝衣家人小過東坡云牛僧孺父子犯罪先斬大畜後斬小畜蓋指荊公父子也唾玉集蓮花杯有王永年娶宗女監金耀書庫嘗置酒延竇卞楊繪於室出其妻間坐妻以左右手掬酒以飲卞繪謂之白玉蓮花盃後永年盜庫書下獄引卞繪受饋俱落職東軒筆記唐人有蓮子杯白公詩中稱之竇子野酒譜玉柱椀丁石韞監花黶榷塲一日數胡兒用綿褁一物至玉柱椀也表裏瑩徹無纖瑕製琢亦甚工胡兒云此未足為珍試注以酒頃刻即溫已而果然椀底刻安美二字結之云得於長安古壙中清波別志破壺盃劉卿任待制言宣和時王黼宴從官于私第各出一寶器勸酒侍兒捧一物至卿任前宛若疊縠俄而瀉酒錚然有聲隨酒漲起酒滿如常盃飲盡復如故名破壺盃云南方軟琉璃也南墅閑居錄金液流暉王母會帝于嵩山飲帝以護神養氣金液流暉之酒又有延洪壽光之酒黃帝內傳酒德武王見三神曰予既沉潰付于酒德矣往岐必此之晏子海錄琬液穆王東巡大騎之谷指春宵宮西王母乘翠鳳之輦而來共玉帳高會薦清澄琬琰之膏以為酒拾遺記瑤琨碧酒瑤琨去玉門九萬里有碧草如麥割之以釀酒則味如醇酎飲一合三旬不醒但飲甜淡水隨飲而醒帝坐神明臺設甜水之冰以備洪濯酌瑤琨碧酒炮青豹之脯果則有塗陰紫梨琳國碧李仙眾與食之洞冥記玄碧安期先生與神女會于圜丘酣玄碧之香酒列仙傳憂心如醉靈帝頗好學藝每引見劉寬常令講經寬常於坐被酒睡伏帝問太尉醉邪寬仰對曰臣不敢醉但任重責大憂心如醉帝重其言寬簡略嗜酒不好盥浴京師以為諺嘗坐客遣蒼頭市酒迂久大醉而還客不堪之罵曰畜產辱湏臾遣人視奴疑必自殺顧左右曰此人也罵言畜產辱孰甚焉故吾懼其死也後漢歡伯焦氏易林坎之兌曰酒為歡伯除憂來樂竇子野酒譜曰蓋其可愛無貴賤賢不肖夷夏共耳而樂之敗首楊之拒妻者劉懿公女也字恭璞貞勳達禮有四男二女拒早亡教遵閨門動有法則長子元琮常出飲酒自輿而歸母不見十日因諸弟謝過乃數責之曰夫飲食有節不至流湎者禮也汝乃沉荒慢而無禮自為敗首何以師先諸弟益部耆舊傳酒泉太守晉有羗人桃馥字世芳充廄圉每醉中好言王者興亡之事常云九河之水不足以漬麯蘖八藪之木不足以為薪蒸七澤之糜不足以充庖俎嘗言渴於酒群輩呼為渴羗武帝授以朝歌令馥願且為馬圉時賜美酒以樂餘年帝曰朝歌紂之舊都地有酒池故使老羗不復呼渴固辭遷酒泉太守地有清池其味若酒馥乘醉拜受焉拾遺記九醞張華既貴有少時知識來候之華與共飲九醞酒為酣暢其夜醉眠華常飲此酒醉眠後輒勑左右轉側至覺是夕忘勑之左右依常時為張公轉側其犮人無人為之至明犮人猶不起華咄云此必死矣使視之酒果穿腸流床下滂沱世說張華為醇酒煮三薇以漬麴蘖蘖出西羗麴出北胡胡中有指星麥四月火星出穫麥而食之蘖用水漬三夕而麥生萌芽以平旦時鷄初鳴而用之俗人呼為鷄鳴麥以釀酒清美鬯久含令人齒動若大醉不搖蕩使人肝腸爛當時謂之消腸酒或云醇酒可為長宵之樂拾遺記飲人狂藥長冰校尉孫季舒嘗與石崇酣燕慢傲過度崇欲表免之裴楷聞之謂崇曰足下飲人狂藥責人正禮不亦乖乎楷傳客飲腐脅周顗在中朝時能飲酒一石及過江雖日醉每稱無對偶有舊對從北來顗遇之欣然乃出酒二石共飲各大醉及顗醒使視客已腐脅而死晉書唐初無酒禁乾元元年京師酒貴肅宗以廩食方屈乃禁京城酤酒期以麥熟如初二年飢復禁酤食貨志西北荒中有玉饋之酒酒泉注焉廣一丈長深三尺酒美如肉澄清如鏡上有玉尊玉籩取一尊一尊復生焉與天同依無乾時飲此酒人不生死神異經瓊𨹋酒謝玄卿遇神仙設瓊𨹋酒續仙傳仙漿拘樓國有仙樹腹中有水謂之仙漿飲者十日醉物類相感志瑞露酒田璆鄧韶攜觴晚道遇書生曰某有瑞露之酒釀于百花之中不知與足下乾和五酘孰愈耳與飲其味甘香無比嵩岳嫁女記瓊蘇南嶽夫人設王子喬瓊蘇綠酒九霞觴許碏遍遊名山常作詩曰閬苑花前是醉鄉誤飜王母九霞觴群仙拍手嫌輕薄謪向人間作酒狂列仙傳酃淥酒衡陽縣東二十里有酃湖周二十里深八尺湛然綠色土人取以釀酒其味醇美晉武平吳始荐酃酒於太廟郭仲堅湘中記長沙郡酃縣有酃湖周迴二里取湖水為酒酒極甘美杜佑曰衡州衡陽縣漢酃地孟康云酃音零又云淥水出豫章郡康樂縣其間烏程縣有井官取水為酒與湘東酃湖年常獻之世稱酃淥酒荊州記飛輕軒而酌淥酃吳都賦桂陽郴縣有綠水注于東謂之程鄉溪郡置酒官醞于山下名曰程酒獻同酃也水經秦時有程林鳥金二家善釀美酒縣因以名吳興箬溪溪多生箭箬南岸曰上箬北岸曰下箬土人取下箬水釀酒酒極醇美有上箬下箬惟下箬釀酒醇美吳興摘錄顧野王輿地志長興若溪夾溪悉生箭箬南岸曰上箬北岸曰下箬二箬皆村名村人取下箬水釀酒醇美盛于雲陽俗稱若下酒韋昭吳錄云烏程若下酒有名出謙之吳興記云上若下若村併出美酒張恊七命云酒則荊南烏程則此酒也寰宇記成都府西五十里因水標名曰郫縣蜀王杜宇所都以竹筒盛美酒號曰郫筒成都記郫人刳竹之大者傾春釀於筒包以藕絲蔽以蕉葉信宿馨庭于林外然後斷之以獻俗號郫筒酒風俗錄相傳山濤治郫用筠管釀𨢕醿作酒兼旬方開香聞百步杜詩魚知丙穴由來美酒憶郫筒不用沽李義山詩錦石有棊子郫筒當酒壺郫蜀縣也魚復有巴鄉村村人善釀故俗稱巴鄉清村側有溪中有魚其頭似羊豊肉少骨美於餘魚水經注宜城宜城醪蒼梧清酒名也釋名安成宜春縣出美酒謂之宜春醇酎隨歲舉上貢刺史親付計吏晉書地道記王烈之安成記同梁劉杳要雅宜成酒酎見周禮䟽張華輕薄篇云蒼語竹葉清宜城九醞酒陸韓卿詩渤海方淫滯宜城誰勸酬昭明將進酒云宜城溢渠椀中山浮羽巵酒杯藤酒杯藤出西域藤大如臂葉似葛花實如梧桐實花堅可以酌酒自有文章映徹可愛實大如指味如荳蘊香美銷酒土人提酒來至藤下摘花酌酒仍以實銷醒國人寶之不傳中土張騫出大宛得之事出張騫出關志崔豹古今注沈釀川沈釀者漢鄭弘為靈文鄉嗇夫行官京洛未至宿一埭埭名沈釀於埭逢故舊友人四顧荒郊村落絕遠酤酒無處情抱不伸乃以錢投水中依口而飲飲盡酣暢皆得大醉因更為沈釀川上南海有頓遜國有酒樹似安石榴採其花汁停甕中數日成酒甘美南史西南夷有樹頭酒其樹類椶高五六丈結實大如李土人以麯納罐中以索懸罐於實下倒其實取汁流于罐以為酒名曰樹頭酒或不用麯惟取其汁熬為白糖其葉即貝葉寫緬書用之今緬甸軍民宣慰司也雲南志杭州其俗釀酒趁棃花時熟號棃花春白樂天杭州春望詩曰紅袖織綾誇柿葉青旗沽酒趁棃花長慶集杭州物產食貨有棃花乾酒之上者杭州圖經象洞在潮海之間今屬武平縣昔未開拓時群象止於其中乃謂之象洞其地膏腴稼穡滋茂有美醞邑人重之曰象洞酒圖經朱崖郡海中之洲也洲方千里自徐文涇度便風揚風帆一日一夕即至以土為釜器用瓠瓢無水人飲石汁又有椒似安石榴花着甕中經旬即成酒其味香美甚醉人十道志女酒南方人有女數歲即大釀酒俟陂水竭寘壺其中密固其上侯女將嫁決水取之供賓客謂之女酒味絕美居常不可致也房千里投荒泉般若湯北僧謂酒為般若湯蓋廋詞以避法禁酒錄酒則郢之富水烏程之若下滎陽之土窟春富平之石凍春劍南之燒春河東之乾和蒲桃嶺南之靈溪慱羅宜城之九醞潯陽之湓水京城之西市睦蝦蟆陵郎官清河漠又有三勒漿類酒法書波斯三勒謂庵摩勒毗棃勒訶棃勒國史補山海經㰂汁甘為酒齊民要術沈約集皮日休集皆有㰂酒烏丸有東墻酒交州有椰子酒南蠻有檳榔酒貢臘有朋芽四酒辰溪有釣藤酒赤土國有甘蔗酒韃靼有馬潼酒訶陵國以柳花椰子為酒扶南有椰漿又有蔗及土瓜根酒房千里投荒錄云南方有女數歲積水釀酒侯彼水竭置壺其中密固其上侯女將嫁決水取之供客謂之女酒味絕美常居不可致也古有崑崙酒事見陸魯望詩蜀后主有桃核兩扇每扇着仁處約盛水五升良夕水成酒味醉人更五貯水以俱其宴見雜俎阿薩部多獵虫鹿剖其肉重疊之以石壓瀝汁波稅斯拂𡒄等國米及草子釀于肉汁之中經數日即變成酒飲之可醉同上天竺國謂酒為酥烈椰子本出伽盧國其地熱衢植椰子木為蔭剖其實中有酒能醉人孫公談圃三佛齊有柳花酒椰子酒檳榔酒皆非麯蘖所醞飲之亦醉人扶南石榴酒辰溪釣藤酒赤土國甘蔗酒孫公談圃韓詩百年未滿不得死且可勤買拋青春李太白詩堂中三千朱履客甕中百斛金陵春杜子美詩山杯竹葉春聞道雲安麯米春吳志烏程酒有名竹葉春裴鉶傳奇亦有酒名松醪春三臺北齊高洋毀銅雀臺築三箇臺宮人拍手呼上臺因以送酒劉賓客嘉話今之催酒三臺或云鄴中有三臺石崇遊宴之地樂工以促飲又云蔡邕三日之間周歷三臺樂府以邕諳音律製此曲希其厚遇資暇集玉清碧瑤杜陵韋弇游蜀春末南山鄭氏亭有仙女曰我玉清之女此玉清宮也命酒樂宴亭中曰吾有三寶將以贈君始出一杯其色碧而光瑩洞澈顧謂弇曰碧瑤盃也宣室志鸂鶒巵莊宗年十一從晉王討王行瑜初令入勤獻捷昭宗一見駭異之曰此子有奇表乃撫其背曰我兒將來之國棟勿忘忠孝於吾家乃賜鸂鶒酒巵翡翠盤北夢醉龍蔡邕飲酒乃至一石嘗醉在路上臥人名曰醉龍故在此醉臥扶而歸也語林紅犮元豊中東坡自黃移汝至荊溪寓滆湖別業一夕與單君錫步月于黃上有餉紅灰酒者曰此紅犮也坡曰彼知有紅友不知有黃封真快恬也因就號為東坡酒圖經劉跋字斯立命酒為玉犮仍為作傳百家詩序資暇集云黃巾餘黨起西河白波谷漢既擒白波戮之如卷席然故酒席倣之以快人情也青箱雜記曰杯名文選飛觴舉白蓋卷白上之酒波耳薛瑩後漢書曰黃中郭太等起于西河白波谷時謂之白波賊味江蜀有味江舊經蜀王征西番有野人以壺酒獻王王使投之江中三軍飲之皆醉因名南昌國有酒山山有泉其味如酒飲之甚美醉經月不醒酒井衛青破月支月支有井色如酒因名酒井羊頭山記謹酒萍氏掌幾酒謹酒神農書萍能勝酒取不沉溺也示兒編空桑穢飯醞以稷麥以成醇醪酒之始也烏梅女麯甜醹九酘澄清百品酒之終也酒經或有勇於牛飲者以巨觥沃之既撼狂花復凋病葉飲流謂睚者為狂花日睡者為病葉醉鄉日月酉不會客杜康善造酒以酉日死故酉日不飲酒會客典論夫飲之禮不脫履而即序者謂之禮跣而上坐者謂之宴能飲者飲之不能飲者已謂之醧齊顏色均眾寡謂之沉閉門不出者謂之湎故君子可以宴可以醧不可以沉不可以湎韓詩外傳異名酴酒母也醴一宿成也醪渾汁酒也酎三薰酒也醨薄酒也醑旨酒也曰醛曰醙白酒也曰釀曰醞造酒也買之曰沽當肆曰壚釀之再亦曰醙灑酒曰釃酒之清曰醥厚曰醹相飲曰配相強曰浮飲盡曰釂使酒曰酗甚亂曰醟飲而面赤曰酡病酒曰酲主人進酒于客曰酹客酌主人曰酢獨酌而醉曰醮出錢共飲曰醵賜民共飲曰酺不醉而奴曰奰婢集韻酒滓謂之酪母醪汁滓酒也竹根巴州以竹根為酒注子為時珍貴也叚氏蜀記庾信謝趙王賜酒詩如聞傳上命定是賜中尊野爐燒樹葉山盃捧竹根杜詩傾銀注玉驚人眼共醉終同臥竹根酒譜云蓋以竹根為飲盃也江淹集壺關仙人嘗吟詩曰杯賢與杓聖與我萬戶封樹萱錄玄宗幸諸楊第出有賜曰餞路及還有勞曰軟腳樽郭子儀自同州歸代宗詔大臣就宅作軟腳局人出三百千大唐遺記玄宗幸楊國忠第出有飲餞還有軟腳樽開天傳信記白擲劇飲元行恭少頗驕恣父文遙令與盧思道交遊文遙嘗謂思道曰小兒此日微有所知是大弟之力然白擲劇飲甚得師風思道荅云六郎情情俊邁自是克荷堂構而白擲劇飲亦天性所得北齊嵬峨我北齊盧思道嘗曰長安酒賤㪷價三百能可嵬峨我不可令嵬峨尔也楊松玠談藪酒禿茶風無柰筆酒禿不勝簪張祐酒經陶人之為器有酒經焉晉安人盛酒以瓦壺之製小頸環口修腹受一斗可以盛酒凡饋人牲兼云以酒器書云酒一經或二經至五經焉他境人有游于是邦不達其義間五經至束帶迎於門乃知是酒五鉼為五經焉侯鯖錄豩字呼關切頑也當在山字韻劉夢得有盃前膽不豩趙勰有吞舡酒膽豩之句禮部韻不收唐韻亦無漢皐詩話抱甕羊稚舒冬月釀酒令人抱甕速得味好語林凡醉有所宜醉花宜晝襲其光也醉雪宜夜消其潔也醉得意宣唱宜其和也醉將離宜擊鉢壯其神也醉文人宜謹節奏章程畏其侮也醉俊人宜加觥孟加旗幟助其烈也醉樓宜暑資其清也醉水宜秋泛其爽也此皆以審其宜攻其景以與恊合也侯鯖錄麯晒凡造麴晒一月露一月釀酒清甚瑣碎錄茶者南方之嘉禾也樹如瓜蘆葉如梔子花如白薔薇實如栟櫚蔕如丁香根如胡桃其名一曰茶二曰檟三曰蔎四曰茗五曰荈茶經早采者為茶晚取者為茗一名荈蜀人名之苦茶爾雅茶品風俗貴茶其品器益眾劍南有蒙頂石花或小方或散芽號為第一湖州有顧渚之紫笋東川有神泉昌明硤州有碧澗明月芳蘂菓萸簝福州有芳山之生芽荊州有香山江陵有楠木湖南有衡山岳州有㴩湖之含膏常州有義興之紫笋婺州有來白睦州有鳩坑洪州有西山之白露荊州有藿山之黃芽蘄州有蘄門團黃浮梁商賈不在焉國史補建州有龍團鳳夸上清明日湖州進紫笋茶荊楚歲時記臯盧苦平作飲止渴除疫不睡利水道明目生南海諸山中南人極重之本草拾遺酉平縣出臯盧茗之別名葉大而澀南人以為飲廣州記會稽有日鑄嶺其地產茶歐陽脩云兩浙產茶日鑄第一方輿勝覽茶產建州之北苑先春龍焙東川之獸目綿州之松嶺福州之柏巖雅州之露芽南康之雲毋婺州之舉巖碧貌宣城之陽坡橫紋饒池之仙芝福合祿合運合慶合蜀州之雀舌鳥觜麥夥片甲蟬翼潭州之獨行靈草彭州之仙厓石花臨江之玉津袁州之金片龍安之騎火涪州之賓化建安之青鳳髓岳州之黃翎毛建安之石巖白岳陽之令膏冷出茶譜通考茶論臆乘湖州紫笋袁州界橋其名甚著不若湖州之研膏紫笋烹之有陸腳垂下故公淑賦云雲垂綠腳蜀雅州境上頂有蒙山榖芽皆云火前者言採造於禁火之前也火後者次之又有枳殼芽荀把芽桃杷芽者皆治風疾又有皂莢芽槐柳芽皆上春摘其芽和茶作之湖州長洲縣啄木嶺金沙泉每歲造茶之所也湖長二郡接界於此厥土有境會亭每茶時二牧畢至斯泉也處沙之中居常無水將造茶太守具儀注拜勑祭泉湏之發源其夕清溢供御者畢水即微臧供堂者畢水已半之太守造畢水即涸矣太守或還斾稽期則示風雷之變或見鷙獸毒蛇木魅暘晱之類焉商旅即以顧渚水造之無沾金沙者今之紫笋即顧渚者亦甚佳矣潭郡之間有渠江中有茶而多毒蛇猛獸鄉人每年採擷不過十五六斤其色如鐵而芳香異常烹之無腳蜀州晉原洞口橫原味江青城其橫芽雀舌鳥觜麥顆蓋取其嫩芽所造以牙似之也又有片甲片甲者早春黃茶牙茶相把如片甲也蟬翼者其葉軟弱如蟬翼也皆散茶之最上也岳陽灉湖舊出茶謂之灉湖茶李肇所謂灉湖之含膏也今惟白鶴僧園有千餘本一歲不過一二十兩土人謂之白鶴茶味極甘香岳陽風土記徽黟茶有勝金嫩桑仙芝來泉先春運合瓊英之品又有不及號者曰片茶竹茶茶經云容州黃家洞有竹茶葉如嫩竹土人作飲甚甘美杭州茶杭州寶雲山產者名寶雲茶下天竺香林洞者名香林茶上天竺白雲峰者名白雲茶西域僧金地藏所植今傳梗空筒者是大抵烟霞雲霧之中氣常溫潤與地上者不同味自異也九華山志茶之別茶之別者有枳殼芽枸杞芽批杷芽皆治風疾又有皂筴芽槐芽柳芽乃上春摘其芽和茶作之故今南人輸官茶往往雜以眾葉惟茅蘆竹箬之類不可入自餘山中草木芽葉皆可和合椿柿尤奇真茶性極冷惟雅州蒙山出者溫而主疾本草茶山茶溪臨城縣東北一百四十里有茶山茶溪括地圖大茗丹丘出大茗服之生羽翼天台記西陽武昌晉陵皆出好茗巴東別有真香茗煎飲令人不眠桐君錄花如梔子茶花狀如梔子其色稍白上明月峽在顧渚側二山相對石璧峭立大澗中流亂石飛走茶生其間尤為絕品張文規所謂明月峽月茶始生是也又峽中有夜橋昔顏魯公於此步月因名宋長興令許遵重建改名許公橋湖州茶生長城縣顧渚山中與峽州光州同生白茅懸腳嶺與襄州荊南義陽郡同生鳳亭山伏翼澗飛雲曲水二寺啄木嶺與荊州常州同生安吉武康二縣山谷與金州梁州同界橋茶袁州界橋茶其名甚著不若湖州之研膏紫笋烹之有綠腳垂下嬰相齊景公時食脫粟之飯炙三弋五卯茗菜而已晏子春秋蒙塵上茶惠帝蒙塵還洛陽黃門以瓦盂盛上茶至尊晉四王起事江統字應遷愍懷太子洗馬常上䟽諫云今西園賣醯麪藍子菜茶之屬虧國體宋江氏家傳劉琨與兄子南兗州刺史演書云前得安州乾薑一斤桂一斤黃芩一斤皆所湏也吾體中潰悶常仰真茶汝可置之茶經任瞻字育長少時有令名自過江失志既下飲問人云此為柔為茗覺人有怪色乃自分明云向問飲為熱為冷世說晉元帝時有老姥每旦獨提一器茗往市一鬻之市人競買自旦至夕其器不臧所得錢散路傍孤貧乞人人或異之州法曹縶之獄中至夜老姥執所鬻茗器從獄牗中飛出廣陵耆老傳剡縣陳務妻少寡與二子同居好飲茶茗以宅中有古塜每飲輒先祀之二子患之曰古塜何知徒以勞意欲掘去之母苦禁而止其夜夢一人云吾止此塜三百餘年卿二子恒欲見毀賴相保護又享吾佳茗雖潛壤杇骨豈忘翳桑之報及曉于庭中獲錢十萬似久埋者但貫新耳母告二子慚之從是禱祠愈切異苑餘姚人盧洪入山採茗遇一道士牽三青牛引洪至瀑布山曰吾丹丘子也聞子善具飲常思見惠山中有大茗可以相給祈子他日有甌犧之餘乞相遺也因立奠祀後常令家人入山獲大茗焉神異記苦茶輕身換骨昔丹丘子黃山君服之陶洪景雜錄夏侯愷因疾死宗人字茍奴察見鬼神見愷來收馬拜病其妻著平上幘單衣入坐生時西壁大床就人覔茶飲搜神記桓溫為揚州牧性儉每讌飲唯下七奠拌茶果而已晉書穢吾素業陸納為吳興太守時衛將軍謝安常欲詣納納兄子俶恠納無所備不敢問之乃私蓄十數人饌安既至所設唯茶果而已俶遂陳盛饌珍羞必具及安去納杖俶四十云汝既不能光益叔父李何穢吾素業上晉孝武世宣城人秦精入武昌山中採茗忽見一人長一丈通體毛精見之太怖自謂必死毛人牽其臂將至山入大叢茗處放之便去精因留採湏臾復來乃採懷中橘與精精甚怖負茗而歸續搜神記桓宣武有一督將因時行病後虛熱更能飲複茗必一斛二斗乃飽纔臧升合便以為大不足非復一日家貧後有客造之正遇其飲複茗亦先聞世有此病仍令更進五升乃大吐有一物出如升大有口形質縮縐狀以牛肚客乃令置之於盆中以一斛二斗複茗澆之此物噏之都盡而止覺小脹又增五升便悉混然從口中涌出既吐此物病遂差或問之此何病荅云此病名斛二瘕續搜神記晉司徒長史王濛好飲茶人至輒命飲之士大夫皆患之每欲往侯必云今日有水厄世說王肅初入國不食羊肉及酪漿等物常飯鯽魚羹渴飲茗汁京師士子道肅一飲一斗號為漏巵高祖謂肅曰卿中國之味也羊肉何如魚羹茗飲何如酪漿肅對曰羊者是陸游之最魚者乃水族之長所好不同並各稱珍以味言之甚是優劣羊比齊魯大邦魚比邾莒小國唯茗不中與酪作奴高祖太笑彭城王勰謂肅曰卿不重齊魯大邦而愛邾莒小國肅對曰鄉曲所美不得不好彭城王重謂曰卿明日顧我為卿設邾莒之食亦有酪奴因此復號茗飲為酪奴時給事中劉縞慕肅之風專習茗飲彭城王謂縞曰卿不慕王侯八珍好蒼頭水厄海上有逐臭之夫里內有學顰之婦以卿言之即是也其彭城王家有吳奴以此言戲之後蕭衍子西豊侯蕭正德歸降時元義欲為之設茗先問卿於水厄多少正卯不曉義意荅曰下官生於水鄉而立身以來未遭陽侯之難元義與舉坐之客皆笑焉伽藍記燉煌人單道開不畏寒暑常服小石子藥有松蜜薑桂茯苓之氣時復飲茶蘇一二升而已晉書新安王子鸞豫章王子尚詣曇濟道人於八公山道人設茶茗子尚味之曰此耳露也何言茶茗宋錄飲茗治腦陏文帝微時夢神人易其腦骨自尔腦痛忽遇一僧云山中有茗草煮而飲之當愈服之有效由是人競採掇讚其略云窮春秋演河圖不如載茗一車權紓文義興南岳寺有真珠泉稠錫禪師嘗飲之清甘可口曰得此泉烹桐廬茶不亦稱乎未幾有白蛇啣茶子墜寺前由此滋蔓茶味倍佳號曰蛇種土人重之每歲爭先餉遺官司需索無絕寺僧苦之舊誌敲冰煮茗逸人王休居太白山下日與僧道異人往還每至冬時取溪冰敲其精瑩者煮建茗其賓客飲之遺事稅茶貞元九年春初稅茶先是諸道塩鉄使張滂奏曰伏以去秋水災詔令臧稅令之國用湏有供備狀請出茶州縣及茶山外商人要略委所定三等時估每十稅一價錢充所放兩稅其明年以後所得稅外收貯若諸州遭水旱賦稅不辨以此代之詔曰可仍委張滂具處置條奏自是每年得錢四十萬貫茶之有稅自此始也然稅茶無戲歲遭水旱處未嘗以茶稅錢拯瞻唐史太和七年正月吳蜀貢新茶皆於冬中作法為之上務茶儉不欲逆其物性詔所貢新茶宜於立春後作上太和九年十月王涯獻茶以涯為榷茶使茶之有稅自涯始太和九年十二月諸道塩鉄轉運榷茶使令狐楚奏榷茶不便於民請停從之元和十四年歸光州茶園於百姓從刺史房免讓之請余聞荊州玉泉寺近清溪諸山其水邊處處有茗草羅生枝葉如碧玉唯玉泉真公常來而飲之年八十餘歲顏色如桃花而此茗清香滑熟異於他者所以能還童振枯扶人壽也余遊金陵見宗僧中孚示余茶數十片拳然重疊其狀如手號為仙人掌茶蓋新出乎玉泉之山曠古未覿因持之見遺兼贈詩要余荅之遂有此作後之高僧大隱知仙人掌茶發乎中孚禪子及青蓮居士李白也李詩皇孫奉節王好詩初煎茶加酥椒之類求詩泌戲云旋沬番成碧玉池添酥散出瑠璃眼奉節王即德宗鄴侯家傳陸羽仙茶景陵僧有於水濱得嬰兒者育為弟子稍長自筮遇蹇之漸繇曰鴻漸於陸羽可用為儀乃姓陸氏字鴻漸名羽羽有文學多意思恥一物不盡其妙茶術最著始造煎茶法至今鬻茶之家陶為其像置於煬器之間杞為茶神云宜茶足利鞏縣為瓷偶人號陸鴻漸買十茶器得一鴻漸市人沽茗不利輒灌注之一復州老僧是陸僧弟子常諷其歌云不羡黃金罍不羡白玉杯不羡朝入肖不羡幕入臺千羡萬羡西江水曾向竟陵城下來又有追感陸僧詩至多因話錄有積師者嗜茶素非漸兒煎侍不鄉口羽出游江湖四五載積師絕於茶味代宗召入內供奉命宮人善茶者以餉師一啜而罷上疑其詐私訪羽召入翌日賜師齋俾羽煎茗喜動顏色一舉而盡使問之師曰此茶有若漸兒所為也於是欲師知茶出羽見之紀異錄見廣川畫跋御史大夫李季卿宣撫江南至臨淮或言常伯熊善茶者李公請之伯熊着黃衫烏紗帽手執茶器口誦茶茗區別指點左右刮目茶熟李公為歠兩杯至江外又召陸鴻漸鴻漸身衣野服隨茶具而入既坐敷攤如伯熊故事公心鄙之茶畢命奴子取錢三十分酹煎茶博士鴻漸久遊江介通達勝流至此羞愧復着毀茶論語林陸龜蒙字魯望嗜茶置園顧渚山下歲取租茶自判品第張又新為水說七種其一慧山泉三虎丘井六松江人助其好者雖百里為致之不乘馬升舟設蓬席齎束書茶竈筆床釣居往來時謂江湖散人或號天隨子甫里先生自比涪翁漁父江上丈人後以高士召不至唐書何易于為益昌令鹽鐵官榷取茶利詔下所在毋敢隱易于視詔書曰益昌人不征茶且不可活矧厚賦毒之乎命吏閣詔吏曰天子詔何敢拒吏坐死公得免竄邪對曰吾敢愛一身而暴于民乎亦不使罪爾曹即自焚之觀察使素賢之不劾也上受茶一串陸游字敬輿張鎰餉錢百萬止受茶一串曰敢不承公之賜王涯始變茶法益其稅以濟用度下益困而鄭注亦議榷茶天子命涯為使心知不可不敢爭李訓敗乃及禍初民怨茶禁苛急涯就誅皆群詬罵抵以瓦礫王紹遷倉部員外郎是時兵旱無年詔戶部收關官俸稅茶及無名錢以修荒政紹由員外判務唐制湖州造茶最多謂之顧渚貢焙歲造一萬八千四百八斤焙在長城縣西北大厝五年以後始有進奉至建中二年袁高為郡進二千六百串并詩刻石在貢焙故鴻漸與楊祭酒書云顧渚山中紫笋茶兩片此物但恨帝未得嘗實所嘆息一片上太夫人一片充昆弟同歠後開成三年以貢不如法停刺史裴充南部陸羽品第水以雪水第甘云煎茶滯而太冷也海錄茶癖酒狂鄧利云陸羽茶既為癖酒亦稱狂上韓晉公滉聞奉天之難以夾練囊緘茶未遺使健步以進國史補有人授舒州牧李德裕謂之曰彼到郡日天柱峰茶可惠三數角其人獻數十斤李不受明年罷郡用意精求獲數角投之李閔而受之曰此茶可以消酒食毒乃命烹一甌沃于肉食內以銀合閉之詰旦視其肉已化為水矣眾服其廣識中朝故事玉泉子右補闕母旻慱學有著述才性不飲茶致代茶餘序其略曰釋滯消壅一日之利暫佳瘠氣侵精終身之累斯大獲益則歸功茶力貽患則不為茶災豈為福近易知福遠難見云直集賢無何以熱疾暴終矣大唐新語李約性嗜茶能自煎謂人曰茶湏緩火炙活火煎活火謂炭火之熖者也客至不限甌數竟日執持茶器不倦曾奉使行至陜州硤石懸東愛渠水清流旬日忘發因話錄官自治園令狐楚為鹽鐵轉運使先是鄭注建榷茶使王涯又議官自治園植茶人不便楚請廢使如舊法從之李玨字待價鹽鐵使王播增茶稅十之五以佐用度玨上號謂搉率本濟軍與而稅茶自貞元以來有之方天下無事忽厚歛以傷國體一不可茗為人飲鹽粟同資若重稅之售必高其弊先及貧下二不可山澤之產無定數程斤論稅以售多為利若價騰則市者稀其稅幾何三不可陛下初即位詔懲聚歛今反增茶賦必失人心帝不納胡生者失其名以釘鉸為業居霅溪而近白蘋洲去厥居士餘步有古墳胡生若每茶必奠酹之嘗夢一人謂之曰吾姓柳平生善為詩而嗜茗及死葬室乃子今居之側常銜子之惠無以為報欲教子為詩胡生辭以不能柳強之曰但率子言之當有致矣既寤試搆思果有冥助者厥後遂工焉又一說列子終於鄭今墓在郊藪謂賢者之跡而或禁其樵焉里有胡生性落魄家貧少為洗鏡鎪釘之業倏遇甘果名茶美醞轍祭於列禦寇之祠壟以求聰惠而思學道歷稔忽夢一人刀劃其腹開以一卷之書置于心腑及睡覺而吟詠之意皆其美之祠所得不由於師友也既成卷軸尚不棄於猥賤之業真隱者之風遠近號為胡釘鉸南部新書時人謂之胡釘鉸詩柳當是柳惲也茶譜大中三年東都進一僧年一百二十歲宣皇問服何藥而致此僧對曰臣少也賤素不知藥性本好茶至處唯茶是求或出日過百餘椀如常日亦不下四五十椀因賜茶五十斤令居保壽寺南部新書悔自潑茶杜豳公悰位極人臣富貴無比嘗與同列言平生不稱意有三其一為澧州刺史其二貶司農卿其三自西川移鎮廣陵舟次瞿唐為駭浪所驚左右呼喚不至渴甚自潑湯茶喫也上同昌公主上每賜饌其茶則有綠華紫英之號杜陽編党魯使西蕃烹茶帳中蕃使問何為者魯曰滌煩消渴所謂茶也蕃使曰我亦有之命取出以指曰此壽州者此顧渚者此靳門者國史補藩鎮劉仁恭禁南方茶自擷山為茶號山曰大恩以邀利楊行密字化源議出鹽茗俾民輸帛幕府高勗曰瘡破之餘不可以加歛且帑貲何患不足若悉我所有易四鄰所無不積日財有餘矣行密納之八床主人劉建鋒死馬殷代高郁又教殷鑄鐵錢民得自摘山故茗算募高力置邸閣居茗號八床主人楚馬殷始脩貢京師然歲貢不過所產茶名而已乃自京師至襄唐郢復等州置邸務以賣茶其利十倍張詠令崇陽時重陽民以茶為業公曰茶利厚官將榷之命拔茶而置桑民以為苦其後榷茶他縣失其業而崇陽之桑已成其為絹歲百萬匹其為政知所先後如此也言行錄陶榖買得党大尉故妓取雪水烹團茶謂妓曰党家應不識此妓曰彼粗人安得有此但能銷金帳下淺斟低唱飲羊羔兒酒耳陶愧其言類苑蘇才翁嘗與蔡君謨鬭茶蔡茶水用惠山泉蘇茶水劣改用竹瀝水煎遂能取勝天台竹瀝水彼人欲竹稍屈而取之盈瓮若以他水雜之則亟敗江鄰幾雜志茗戰建人謂鬭茶為茗戰茶錄丁謂云石乳出壑額斷崖缺石之間蓋草木之仙骨草大䖝宋崇寧後復榷茶法制日嚴私貶者固以抵罪而商賈官券清納有限道路有程纖悉不如令則被擊斷罪或沒貨出告昏愚者往往不免其儕乃目茶籠為大䖝言傷人如虎也拊掌錄陸羽茶經不第建安之品蓋前此茶事未興靈芽真笋委翳消腐而人不知惜耳夫體勢洒落神觀冲淡惟茲茗飲為冠天下借使陸羽復起閱其金餅味其需腴當爽然自失黃儒品茶要錄宣和中復有白茶勝雪熊蕃曰使黃君閱今日則前乎此者未足詫也陸羽茶經裴汶茶述不第建品說者俱謂二子未嘗至閩而不知物之發也固自有時蓋昔者山川尚閟靈芽未露至于唐末然後北苑出為之最時偽蜀毛文錫作茶品亦第言建有紫笋而臈面乃產于福五代之季建屬南唐歲率諸縣民採茶北苑初造研膏繼造臘面既又製其佳者號曰京挺宋太平興國二年始置龍鳳模遣使即北苑團龍鳳茶以別庶飲又一種茶叢生石崖枝葉尤茂至道初有詔造之別號石乳又一鍾號的乳又一種號白乳此四種出而臘面斯下矣貨宗咸平中丁謂為福建漕鹽御茶進龍鳳團始載之茶錄仁宗慶曆中蔡襄為漕始改造小龍團茶以進甚見珍惜旨令歲貢而龍鳳遂為次矣歐陽脩聞襄進小龍團驚曰君謨士人也何至此作事神宗元豊間有旨造密雲龍其品又加于小團之上哲宗紹聖中又改為瑞雲翔龍至徽宗大觀初親製茶論二十篇以白茶者自為一種與他茶不同其條敷闡其葉瑩薄崖林之間偶然生出非人力可致正焙之有者不過四五家不過四五株所造止于二一銙而已淺焙亦有之但品格不及於是白茶遂為第一既又製三色細芽及試新銙貢新銙自三色細芽出而瑞雲翔龍又下矣夫至芽茶絕矣宣和庚子歲漕臣鄭可間始創為根絲冰芽蓋將已揀熟芽再令剔去祗取其心一縷用珍器貯清泉漬之光瑩如銀絲然一制方寸新銙有小龍蜿蜒其上號龍團勝雪又廢白的石三鼎乳造化銙二十餘色初貢茶皆入龍腦至是慮奪其味始不用焉蓋茶之妙至勝雪極矣故合為首冠然猶在白茶之下者以白茶上所好也其茶歲分十餘綱惟白茶與勝雪自驚蟄後興役浹日乃成飛騎疾馳不出仲春已至京師號為綱頭玉芽以下先後而發建至京夏過半矣然能焙初興貢數殊少累增至干元符以斤計者一萬八千今則四萬七千一百斤有奇貢茶錄茶論并郡志歐陽公詩云建安三千五百里京師三月嘗新茶蓋御茶園自九窠十二隴至小山凡四十六所惟龍游窠小若張坑西際又為禁圍之先也負暄雜錄上林第一乙夜清供承平雅玩宜年寶玉萬眷銀葉延年石乳瓊林毓瑞浴雪呈祥清白可鑒風韻甚高暘谷先春價倍南金雲英雪葉金錢玉華玉葉長春蜀葵寸金並宣和者政和曰太平嘉瑞紹聖曰南山應瑞北苑貢茶錄異美之名謝氏論茶曰比丹丘之仙茶勝烏程之御荈不止味同露液白况霜華豈可為酪蒼頭便應代酒從事杜牧詩山實東南秀茶稱瑞草魁皮日休詩十盆前皋盧曹鄴詩劍外九華英施肩吾詩茶為滌煩子酒為忘憂君南越志茗苦澀謂之果羅北苑曰葉布絕品也豫章曰白露曰白芽南劍曰石花曰錢芽東川曰獸目湖常俱曰紫笋荊州曰黃芽福閩曰生芽曰露芽岳陽曰含膏外此尤夥若蟾背籀目龍舌蟹眼瑟瑟瀝霏霏靄鼓浪湧泉琉璃眼碧玉池又皆茶事中天然偶字也說郛臆來九難茶有九難一曰陰採夜焙非造也二曰嚼味嗅香非別也三曰膩鼎腥甌非器也四曰膏薪庖炭非火也五曰非湍擁潦非水也六曰外熟內生非炙也七曰碧粉縹塵非末也八曰操艱攪豦非煮也九曰夏興冬廢非飲也茶經芽澤肥乳則甘香而粥面著盞而不散土瘠而芽短則雲腳渙亂去盞而易散葉梗半則受水鮮白葉梗短則色黃而泛鳥蔕白合茶之大病不去鳥蔕則色黃熟則草木氣存去膏未盡則色濁而味重受煙則香奪壓黃則味失此皆茶之病也試茶錄故老云五十年前多患熱黃近代悉而無病腰腳者多乃飲茶所致也國史補凡茶有二類曰片曰散片茶蒸造實捲模中串之惟建劍則既蒸而研編竹為格置焙室中最為精潔他處不能造其名有龍鳳石乳的乳白乳頭金蠟面頭骨次骨末骨粗骨山梃十二等以充歲貢及邦國之用洎本路食茶餘州片茶有進寶雙勝寶山兩府出興國軍仙芝嫩蘂福合祿合運合慶合指合出饒池州泥片出荊州綠英金片出袁州玉津出臨江軍靈川福州先春早春華英來泉勝金出歙州獨行靈草綠芽片金金茗出潭州大石椀出江陵大小巴陵開勝開捲小捲生黃翎毛出岳州雙上綠牙大小方出岳辰澧州東首淺山薄側出光州總二十六名其兩浙及宣江鼎州止以上中下或第一至第五為號散茶有太湖龍溪次號末號出淮南岳麓草子楊樹雨前雨後出荊湖清口出歸州茗子出江南總十一名文獻通考江左近日有蠟面之號李氏別命取其乳作片或號曰京挺的乳及骨子二十餘品名乳蠟面龍鳳茶等又有研膏茶即龍品也談苑浙西湖州為上常州次之湖州出長城顧渚山中常州出義興君山懸腳嶺北岸下唐重修茶舍記貢茶御史大夫李栖筠典郡日陸羽以為冠於他境栖筠始進故事湖州紫筍以清明日到先薦宗廟後分賜近臣紫筍生顧渚在湖常間當茶時兩郡太守畢至為盛集見蔡寬夫詩話玉川子謝孟諫議寄新茶有手閱月團三百片又云天子湏嘗陽羡茶則孟所寄乃陽羡茶也雲麓漫抄茶之品莫貴於龍鳳團凡八餅重一斤慶曆間蔡君謨為福建運使始造小片龍茶其品絕精謂之小龍團几二十餅餘重一斤其價值金二兩然金可有而茶不可得每因南郊致齋中書樞密院各賜一餅四人分之宮人往往縷金其上其貴重如此歸田錄凡酌茶置諸盌令沫餑均沫餑湯之華也華之薄者曰沫厚者曰餑細輕者曰花茶經傳巽七誨云蒲萄宛柰齊柿燕栗峘陽黃棃巫山未橘南中茶子西極石蜜霜華弘君峰飲檄寒溫既畢便下霜華之茗三爵而終應下諸蔗木瓜元李楊梅五味橄欖懸豹葵美各一杯茶經七事茶之分茶千類萬狀略而言之有如胡人鞾者蹙綜然幇牛臆者廉譫然浮雲出山者輪菌然輕颺拂水者寶澹然此茶之精好者也有竹籜者枝幹堅實艱于蒸搗故其形𣵁簁焉如霜苛者莖葉凋沮易其狀貌故其形萎瘁然此茶之瘠者者也自采至于封七經自胡鞾至于𣵁簁八等茶經蜀之雅州名蒙山中頂山有頂頂有茶園其中頂曰上清峰昔有僧病冷且久嘗遇老父詢其病僧具告之客曰何不飲茶僧曰本以茶冷豈有能止乎父曰是非常茶仙家有雷鳴茶亦有聞乎僧曰未也父之蒙之中頂茶常以春分之元後多搆人力俟雷之發聲併手採摘以多為貴至三日乃止若獲一兩以本處水煎服能祛宿疾二兩當眼前無疾三兩固以換骨四兩即為地仙但精絜治之無不郊者僧因之中頂築室以俟及期獲一兩餘服未竟而病瘥既不能久及慱求但精健至八十餘氣力不衰時到城市觀其貌若年三十餘眉髮紺綠後入青城山不知所終今四頂茶園不廢唯中頂草木繁茂重雲積霧蔽虧日月鷙獸時出人跡希到矣茶譜龍焙泉即御泉也北苑造貢茶社前芽細如針用御水研造每片計工直錢四萬分試其色如乳乃最精也凡種茶樹必丁子移植則不復生故俗聘婦必以茶為禮義固有所取也雲腳乳面凡茶少湯多則雲腳散湯少茶多則乳面聚高齊詩話大小龍團始於丁晉公而成於蔡君謨歐公聞而歎曰君謨士人也何至作此事苕溪詩話天中記卷四十四
