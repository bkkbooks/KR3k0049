治孝婦自誣服具獄上府于公為辨明其冤太守不聽竟論殺孝婦郡中枯旱三年後太守至卜筮其故于公以為前太守彊斷孝婦之咎於是太守自祭孝婦冢因表其墓天立大雨歲熟漢書後漢書殷丹因孟嘗言祭上虞寡婦晉列女傳劉曜時呼延謨辨陜縣婦人事同決獄致雨永平十三年楚王英謀為逆事互相牽引拘繫者千餘人三年而獄不決坐掠幽而死者百餘人天用災旱赤地千里袁安拜楚郡太守即控轡而行既到決獄事人人具録其辭狀本非首謀為主所引應時理遣一旬之中言千人之命其時甘雨滂霈歲大豐稔汝南先賢傳後漢書止役永平三年夏旱而大起北宮鍾離意免冠上疏帝策詔報云比上天降旱密雲數會分布禱請窺候風雲北祈明堂南設舞雩今又勑大匠止作諸宮減省不急庶消災譴詔因謝公卿百僚遂應時澍雨焉意傳罷督郵汝南高獲善天文鮑昱為汝南太守時郡境大旱昱自往問何以致雨獲曰急罷三部督郵明府當自北出到三十里亭雨可致也昱從之果得大雨謝書葬客骸周暢性仁恕為河南尹夏旱久禱無應因收葬洛城傍客死骸骨萬餘人應時澍雨歲乃豐稔謝書梁簡文啓將恐督郵不除失在汝南之守曝胔未收無傷河南之尹積薪自焚諒輔字漢儒廣漢新都人仕郡為五官椽時夏大旱出禱山川曰輔為郡股肱不能進諫納忠薦賢退惡和調陰陽至今天地否隔萬物燋枯百姓喁喁無所告訴咎盡在輔今太守自省責已自曝中庭使輔請罪為民祈福輔今敢自誓若至日中不雨乞以身塞無狀乃積薪柴將自焚焉至禺中時山氣轉起雷雨大作一郡霑潤世以稱其至誠搜神記李雍驕陽賦水干土而成妖誓禺中而有請春秋繁露水干土則大旱禱名山建初五年詔曰去年雨澤不適今時復旱如炎如焚其令二千石理冤獄録輕係禱五嶽四瀆及名山能興雲致雨者冀蒙不崇朝遍雨天下之報後書明帝詔曰長吏各潔齊禱請冀蒙嘉澍推陰陽消伏楊統漢建初中為彭城令一州大旱統推陰陽消伏縣界蒙澤太守宗湛使統為郡求雨亦即降澍后漢楊厚傳彌日不旋元和元年鄭弘為太尉時旱朝廷百僚皆暴請雨夏炎熱小雨群官即還舍弘彌日不旋大雨注稼穡遂豐謝書火起雨降戴封字平仲遷西華令其年大旱禱請無獲乃積薪坐其上以自焚火起而大雨遠邇嘆服謝書祝令特苦漢祝良字石卿謝書邵平順帝時為洛陽令歲時亢旱天子祈雨不得良暴身階庭告誠引罪自晨至中紫雲沓起甘雨登降人為之歌曰天久不雨蒸人失所天王自出祝令特苦精符感應滂沱下雨晉劉彧長沙耆舊傳令簿自焚桂陽先賢畫讚云臨武張熹字季智為平輿令時天下大旱熹躬禱未獲應熹乃積柴自焚主簿崇小吏張化從熹焚焉火既燎天靈感應即澍雨水經捐俸贍民夏香字曼卿永興人也年十五縣長葛君出臨靈星會客飲宴時郡遭大旱香進諫曰昔殷湯遭旱以六事自責而雨澤應澍成王悔過偃禾復起自古先聖畏懼天異以思變復以濟民命今始罹天災縣界獨甚未聞明達崇殷周之德臨祭獨歡百姓枯瘁神祗有靈必不享也百姓不足君熟與足宜當還寺長即罷會身捐俸祿以贍飢民會稽典録首陽神使靈帝熹平五年大旱禱請名山未獲答應時處士平陽蘇騰字玄成夢陟首陽有神馬之使在道明覺而思之以其夢陟狀上聞天子開三府請雨使者與郡縣戶曹掾吏登山升祠手書要曰君況我聖主以洪澤之福天尋興雲即降甘雨蔡雍夷齊碑竹人致雨馬均大巧能削竹作人語時天下大旱人皆將酒與此竹人語天下須臾雨也架屋致雨三國吳時董奉居豫章時大旱縣令丁士彥議曰聞董君有道當能致雨乃自求之奉曰雨易得耳貧道屋皆見天雨至何堪令曰先生當致雨當為架好屋明日丁為立屋聚土作泥擬數里取水奉曰不須爾暮當大雨乃止暮即大雨高下皆平神仙傳書符廟中吳主曾與葛玄坐於上望見道間人民請雨帝曰百姓請雨安可得乎玄曰易得耳即書符著社廟中日午天地冥晦大雨流注中庭平地水尺餘葛仙公傳精誠感神束晢太康中郡大旱苗稼敗晢為邑人請雨三日中雨水三尺衆人以其有術數精誠感於神明為之歌曰束先生通神明請天三日甘雨零我黍以育我稷以生何以疇之報束先生王隱晉書房心興雨符離縣相山碑辭云晉武帝太康五年憲令有國諸侯祀界內山川時相山屬沛國令郭卿云相山上應房心之星能興雲雨會天旱祈雨即應乃建廟刻石紀銘曰巍巍相山盤紆穹崇上應房心與天雲沖興雲播雨稼穡以豐唐永徽元年立寰宇記白龍降祠石虎時大旱虎遣其太子詣臨漳西滏口祈雨久雨不降乃令佛圖澄自行即有白龍降于祠所其日大雨方數千里晉書報賽陳聄字國鎮過江為少府卿時大旱經久大興四年四月始雨有司奏應報賽宗廟山川中宗詔曰祈廟云報賽非奉尊上辭也吾意有疑聄以為舊山川有祈故報雨應賽非大事不應告廟子無要君親之道瀆祭稱賽於義有違從之臧榮緒晋書旱疫平印元魏世祖太延元年自三月不雨至六月使有司遍請群神數日雲雨震灑流澤霑渥有鄙婦人持方寸玉印請潞縣侯孫家賣之孫家得印奇之求訪婦人莫知所在玉色鮮白光照內映印有三字為龍鳥之形要妙奇巧不類人迹文曰旱疫平寇天師曰龍文紐書云此神中三字印也本圮及靈徵志鞭神像南安王元楨為相州刺史鄴城有石虎廟人奉祀之楨告虎神像云三日不雨當加鞭罰請雨不驗遂鞭像一百是月疽發背薨魏書奚康生為相州以天旱令人鞭石虎畫像復就西門豹祠祈雨不獲令吏取豹舌未幾二兒暴喪身亦遇疾巫以為虎豹之崇魏書張水曹梁武帝禱雨蔣山未應神見夢曰陽羡九斗山有神號張水曹能興雲雨帝如其言遣使致祭雨隨至後旱禱輒應祠天井梁始興王憺為都督荊州刺史時大旱憺使祠于天井有巨蛇長二丈出繞祠壇而注雨歲大豐南史荊州記云有外國人能呪龍使至天井有巨蛇云靈澤后周保定三年盛營宮室春夏大旱黎季明上封事曰成湯邅旱以六事自陳宣王太甚而圭璧斯竭今農要之月時雨猶愆率土之心有懷渴仰豈或作事不節有違時令舉措失中倘邀斯旱春秋莊公三十一年冬不雨五行傳以為是歲一年而三築臺奢侈不恤人也僖公二十一年夏大旱五行傳以為時作南門勞人興役漢惠帝五年夏大旱五行傳以為先是發十四萬六千人城長安武帝元狩三年夏大旱五行傳以為是歲發天下故吏穿昆明池然則土木之功動人興役天輒應之以異典籍作誡儻或可思上天譴告改之則善今若息人省役以答天譴庶靈澤時降嘉榖有成則年登可覬子來非晚北史本傳祀華嶽達奚武為同州刺史時旱武祀華山廟嶽既高峻人迹罕通武年逾六十攀藤而上於是稽首祈請陳百姓懇誠晚不得還即于嶽上藉草而宿夢一白衣人來執武手曰快辛苦甚相嘉尚武遂驚覺益用祗肅旦而澍雨遠近霑洽高祖聞之璽書勞武曰感公至誠甘澤斯應賜雜彩百匹周書禱白兆于翼建德二年為安州總管時大旱溳水絶流舊俗每逢亢旱禱白兆山祈雨帝先禁群祀山廟已除翼遣主簿祭之即日澍雨歲遂有年百姓感之聚會歌舞頌之北史禱木仙魯般燉煌人未詳年代巧侔造化嘗作木鳶其父乘之至吳會吳人以為妖殺之般怨吳人殺其父於肅州城南作一木仙人舉手指東南吳地大旱三年卜曰般所為也於是齎物巨千謝之般為斷其一手其月吳中大雨唐初工人尚祈禱其木仙酉陽雜俎雨禁絶重什玄照講經于嵩山有三叟來聽問之乃龍也玄照曰今愆陽經時可致甘澤乎三叟曰召雲施雨固是細事但雨禁絶重不奉命擅行誅責非輕長老如求孫居士見救則雨可立致也玄照為求于思邈果于一日一夜千里霑足神仙感遇傳田使君歌田仁會永徽二年為平州刺史勸學務農稱為善政轉郢州刺史屬時旱仁會自曝祈禱竟獲甘澤其年大熟百姓歌曰父母育我田使君精誠為人上天聞田中致雨山出雲倉廩既實禮義申但願常在不患貧舊唐書玉龍子唐太宗於晉陽宮得之廣不數寸而溫潤精巧非人間所有帝相傳以為國瑞武后以賜玄宗及即位初每京師旱禱之必有霖注逼視若奮鱗鬣開月中三輔大旱帝復祈禱而涉旬無應乃命密投於南內龍池俄而雲霧暴起風雨隨作神異録明皇別録白檀香龍玄宗嘗詔術士羅公遠與不空同祈雨校功力俱詔問之不空曰臣昨焚白檀香龍上命左右掬庭水嗅之果有檀香氣每祈雨無他軌但設數繡座手簸旋數寸木神念呪擲之自立於座上伺木神吻角牙出目則雨至酉陽雜俎鏡龍僧一行開元中嘗旱玄宗令祈雨一行言當得一器上有龍狀者方可致雨上令於內庫中遍視之皆言不類數日後指一古鏡鼻盤龍喜曰此有真龍矣乃持入道場一夕而雨同上召龍致雨玄宗嘗幸東都天大旱時有竺乾僧無畏號三藏善召龍致雲之術上遣高力士召之請雨無畏云今旱數當然耳召龍適足暴物不可為也上強之無畏盛一鉢水以刀攪之作胡言呪水須臾有龍如指大在鉢水中復呪之白氣自鉢中興若一匹素者少頃大風震雷力士及天津之南風雨亦隨馳至矣衢中大樹多拔力士比復奏衣盡沾濕柳氏舊聞畫龍致雨開元中大旱上於新池創一殿召馮紹正四壁各畫二龍西壁一素龍蜿蜒若奮風雲隨筆而生壁上鱗甲皆熱有白氣自簷廡出池中波濤洶湧俄有白龍乘雲而起風雨大作明皇雜録祀介推王維京兆張公德政碑云公之守邠也仍歲大旱郡祀介推雖屢舞仙仙而靈應未若公命束藥取火伐樹置薪釃酒而祝曰有功于人祀為明神無德而祿禍亦覆餗自絳以來人實祀子神既靡答人將安仰若亭午而雨則樹其鷺羽執此騂毛不然者火燎將至焮天爍地靈衣且為灰燼豐屋將為茂草爾其圖之言未畢而雲興拜未起而雨降周于闔境不入他郡右丞集撤土龍馬璘代宗永太初拜行營節度使天大旱里巷為土龍聚巫以禱璘曰旱由政不修即令撤之明日雨是歲大穰本傳巫覡對舞黎幹大曆八年復為京兆尹時大旱幹造土龍自與巫覡對舞彌月不應又禱孔子廟帝嘆曰丘之禱久矣使毀土龍帝減膳節用既而霪雨新唐書自責吳公信陵貞元中為望江令有仁政天旱為請雨文云必也私欲之求行于邑里黯黷之政施於黎元令長之罪也神得而誅之豈可移于人而害其歲既卒官百姓留葬縣境為之立祠宋崇寧時勑賜靈施廟蘇州志不苦不愁段文昌文宗太和中帥荊州或旱禬解必雨或久雨遇出遊必霽民為語曰旱不苦禱而雨雨不愁公出遊本傳新唐書投巫水中會昌中狄惟謙為晉陽令屬邑亢旱禱于晉祠略無其應時有并州女巫郭天師者少為符術出入宮掖狄敦請祈雨期滿無徵仍辱狄不知天道翌日惟謙責其妖妄叱左右鞭于神前投之潭水遽命設席焚香放還從吏人皆危之時沙石流鑠忽起片雲大如車蓋先覆惟謙立所四郊雲霧會之雷震數聲甘雨大澍州將表列其事詔書褒異仍賜錢五十萬惟謙仁傑之後也劇談録黑龍湫牛僧孺鎮襄陽久旱有處士能豢龍公請致雨處士曰江漢間無龍獨一湫泊中有黑龍難制強驅之必為災公固命之果有大雨而漂流萬戶尚書故實僕馬為獻姑臧李仲呂咸通末調授汝之魯山令為政明練吏不敢欺遇旱請禱群望皆不應仲呂乃潔齊自禱于縣二十里魯山堯祠以所乘烏馬及騶人張翰為獻祭畢將下山雲霧暴起及平澤而大雨僕馬皆暴殞於是仲呂復設祭圖僕馬于東壁三水小牘蛇醫王彥威鎮汴夏旱李過汴因宴王以旱為言李醉曰欲雨甚易耳可求蛇醫四頭石甕二枚每甕實以水浮二蛇醫以木蓋密泥之分置於鬧處甕前後設席燒香選小兒十歲已下十餘令執小青竹晝夜更擊其甕不得少輟王如言試之一日兩夜雨大注舊說龍與蛇師為親家焉酉陽雜俎龍吸硯水有僧講經山寺常有一叟來聽問其姓氏曰某乃山下潭中龍也幸歲旱得閒來此聽法僧曰公能救旱乎曰上帝封江湖有水不得輒用僧曰此硯中水可用乎乃就硯吸水徑去是夕雷雨大作逮曉視之雨悉黑水幕府燕聞大雨由天張士伯禱雨于嶧山忽聞空中語曰大雨由天小雨由山海録碎事蒲蕭祈雨僖宗時夏旱詔大京兆用器水爐香蒲蕭絳幡致於坊市門將以用舊法而召雨也羅隱上疏曰陛下以蒲蕭輩為請者豈為其靈於嶽瀆者乎夫嶽瀆受祭據封尚未能為陛下出力彼蒲蕭輩復何足以動天夫天之有雨澤猶陛下有渥恩雨澤可以委曲干之則陛下渥恩亦可以委曲干之矣請追癸巳日詔文粹笞龍五代周李元懿為青州北海縣令泥龍求雨無應李令笞龍責之即日雨足周史龍潤李煜在國時自作祈雨文曰尚乖龍潤之祥清異録蜥蜴求雨熙寧中京師久旱按古法令坊巷以甕貯水插柳枝泛蜥蜴小兒呼曰蜥蜴蜥蜴興雲吐霧降雨滂沱放汝歸去時蜥蜴不能盡得往往以蝎虎代之入水即死小兒更曰冤苦冤苦我是蝎虎似恁昏沈焉得甘雨倦游雜録鵝鴨諫議宋紹興乙卯以旱禱雨諫議大夫趙霈上言自來祈禱斷屠止禁猪羊今後請併禁鵝鴨時胡致堂在兩掖見之笑曰可謂鵝鴨諫議矣聞虜中有龍虎大王當以鵝鴨諫議當之神龍池絳北有陽石山有神龍池黃帝時遣雲陽先生養龍於此帝王歷代養龍之處國有水旱不時即祀池請雨遁甲開山圖桐木魚董仲舒請雨秋用桐木魚淮南子方士龍使者甘宗所奏西域事云方士能神呪者臨泉禹步吹氣龍即浮出長十數丈更吹龍輒縮至數寸乃掇取著壺中或有四五龍以少水養之聞有旱處便齎龍往賣一龍直數十斤金發壺中出一龍著潭中復禹步吹之長十數丈須臾而雲雨四集抱朴子蒙古禱雨蒙古人之禱雨者非若方士惟取淨水一盆浸石子數枚而已其大者若雞卵小者不等然後默持密呪將石子淘漉玩弄如此良久輒有雨石子名曰鮓答乃走獸腹中所産狗牛馬者最妙輟耕録楊瑀山居新語楓子爾雅曰楓攝攝孫炎注攝木生江上有寄生高三四尺生毛一名楓子天旱以泥塗之即雨朝野僉載江東江南山中多有楓木人於楓樹腳下生似人形長三四尺夜雷雨即長與樹齊見人即縮依舊有人合以笠子明日看笠子掛在樹上土人旱而欲雨以竹束其頭揳之即雨人取以為試極驗虎骨南山久旱即以長繩繫虎頭骨以投有龍湫潭中入水即掣不定俄頃雲起潭中雨亦隨降而足乃取出龍虎敵也雖枯骨猶能激動如此劉賓客嘉話尚書故實投犬舒州灊山下有九并其實九眼泉也旱則殺一犬投其中大雨必降犬亦流出焉劉賓客嘉話鞭陰石狠山縣有一山獨立峻絶西北有石穴以獨行百步許二大石其門相去一丈許俗名其一為陽石一為陰石水旱為災鞭陽石則雨鞭陰石則晴盛弘之荊州記泥石牛鬱林郡山東南有一池池邊有一石牛人祀之若旱百姓殺牛祈雨以牛血和泥泥石牛背禮畢則天雨大注洗牛背泥盡即晴廣州記燒崖山太原郡東有崖山天旱土人常燒土山以求雨俗傳崖山神娶河伯女故河伯見火必降雨以救之今山上多生水草酉陽雜俎舉臥石荊州永豐縣東鄉里有臥石一丈九尺六寸其形似人面體青黃隱起狀若雕刻境若旱便齊手而舉之小舉小雨大舉大雨相傳此石忽見於此酉陽雜俎雨母山湘東有雨母山山有祠壇每祈禱無不降澤以是名之荊州記溫庭筠敘雨云銅姑尚注石姥方勤雨瀨來陽縣有雨瀨此縣時旱百姓共壅塞之甘雨普降若一鄉獨壅雨亦偏降應隨方所其信若符刻荊州記羅霄石乳王孚安城記云宜春萍鄉羅霄山澤水所出傍出石乳天旱吏人祝之因以大木長三四尺投井即雨水懸湊井溢輒令木湧出而雨止蓋潛龍之穴宅以陽居陰精神上通故扣之必有玄感若蜀都賦所謂應鳴鼓而興雨者也神石交州記云九真去郡三里有珍山山有神石廟值天亢旱二千石親到以水澆石即雲雨立降雨止說文云霽雨止也霋雨霽也霩雨止雲罷貌也禜門禮記曰雩禜祭水旱也三禮義宗云雩祈雨之祭禜止雨之祭每禜于城門吹笛止雨周穆王時天下連雨三月穆王乃吹笛其雨遂止也應魏祚延康元年大霖雨五十餘日魏有天下乃霽魏受祚之應也魏略五行志蘇峻滅咸和四年陰霖五十餘日蘇峻滅乃霽晉中興徵祥記夢白頭翁文虔字仲孺為郡功曹時霖雨廢民業太守憂悒召虔戶曹掾虔奉教齊戒在社三日夜夢見白頭翁謂曰爾來何遲虔具白所夢太守曰昔禹夢青繡衣男子稱滄水使者禹知水脈當通若掾此夢將其比也明日果大霽長沙耆舊傳術止道士劉道合隱于嵩山高宗召入禁中深尊禮之及將封太山屬久雨帝令于儀鸞殿作止雨之術俄而霽朗帝大悅舊唐書誅二張張長安四年九月後霖雨并雪凡陰一百五十餘日至神龍元年正月五日誅二張孝和反正方晴霽舊唐書張柬之既遷則天于上陽宮中宗猶以皇太子監國告武氏之廟時纍日陰翳御史崔渾奏宜正唐徽號毀武氏廟以順天下之心中宗深納之制命既行陰雲四除萬里澄廓咸以為天人之應唐新語誅竇懷真先天二年四月陰至六月一百餘日至七月三日誅竇懷真等一十七家方晴舊唐書立太子貞元二十一年順宗風疾叔文用事連月霖雨不霽乃以憲宗為皇太子制出日即晴傳所謂皇之不極厥罰恆陰皆此類也上禱雞翁溫造初赴鎮漢中遇大雨平地水深尺餘乃禱雞翁山祈晴俄而疾風驅雲即時開霽文宗嘗聞其事會造入對言之乃詔封雞翁山為侯上宣宗自責大中初京師嘗淫雨涉月將害粢盛分命禱告百無一應宣宗一日在內殿顧左右執爐降階踐泥焚香仰視若自責者久之御眼沾濕感動左右旋踵而急雨止翌日而凝陰開比秋而大有年真陵十七事獄決而霽崔碣玄暉裔孫也為河南尹邑有大賈王可久轉貨江湖間值龐勛亂盡亡其資不得歸妻詣卜者楊乾夫咨在亡乾夫名善數而內悅妻色且利其富既占陽驚曰乃夫殆不還矣即陰以百金謝媒者誘聘之妻乃嫁乾夫遂為富人它年徐州平可久困甚丐衣食歸閭里往見妻乾夫大怒詬逐之妻詣吏自言乾夫厚納賄可久反得罪再欣復坐誣可久恨嘆遂失明碣之來可久陳冤碣得其情即敕吏掩乾夫并前獄吏下獄悉發賕姦一日殺之以妻産還可久時淫潦獄決而霽都民相語歌舞于道唐闕史陰液露者陰液也釋為露結為霜月令章句從地出和氣津液凝為露露從地出五經通義甘露瑞應圖曰甘露者美露也神靈之精仁瑞之澤其凝如脂其甘如飴一名膏露一名天酒白虎通曰甘露者美露也降則物無不盛董仲舒云露結珠而成甘結潤而成膏天乳星列星圖曰天乳一星在氐北主甘露占明潤則甘露降禮斗威儀曰君治政則軒轅之精散為甘露松柏竹受耆老得敬則松柏受甘露尊賢愛老不失細微則竹𥯤受露孫氏瑞應圖天地合老子曰天地相合以降甘露人莫之令而自均書林事藪寶露壇高辛時丹丘之國獻瑪瑙甕以盛甘露甕至堯時猶存甘露在其中盈而不竭謂之寶露以頒賜群臣至舜時露已漸減舜遷寶甕於衡山之上故衡山之嶽有寶露壇舜於壇下起月館以望夕月舜南巡至衡山百辟群后皆得露泉之賜時有雲氣生於甘露壇又遷寶甕於零陵之上東方朔寶甕銘曰寶雲生於露壇祥風起於月館望三壺如盈尺視八鴻如縈帶拾遺記冬下桀無道露冬下春秋序三危揭雩伊尹說湯曰水之美者三危之露和之美者揭雩之露其色紫呂氏春秋沾衣子胥諫吳王王怒暮歸舉衣出宮宮中群臣皆曰天無霖雨宮中無泥露相君舉衣行高何為子胥曰吾以越諫王王心迷不聽吾言聽中生草棘霧露沾吾衣群臣聞之莫不悲傷吳越春秋濡履吳欲伐齊王令曰敢有諫者死太子友知子胥忠而不用太宰嚭佞而專政欲切言之恐罹尤也乃以諷諫激於王清旦懷丸持彈從後園而來衣夾履濡王怪而問之曰子何為夾衣濡履體如斯也太子友曰適游後園聞秋蜩之聲往而觀之夫秋蜩登高樹飲清露隨風撝撓長吟悲鳴自以為安不知螳螂超枝緣條曳腰聳距而稷其形夫螳蜋翕心而進志在有利不知黃雀盈緑林徘徊枝陰𨃆𨃂微進欲啄螳蜋夫黃雀但知伺螳蜋之有味不知臣挾彈危擲蹭蹬飛丸而集其背今臣但虛心志在黃雀不知空坎其傍暗忽坎中陷於深井臣故夾體濡履幾為大王取笑王曰天下之愚莫過於斯但貪前利不覩後患太子曰天下之愚復有甚者吳越春秋劉向說苑吳欲伐荊少孺子者云云玉杯仙掌漢武帝故事曰帝作金莖擎玉杯以承雲表之露和玉屑服之以求仙又曰作銅承露盤上有仙人掌以承露也西都賦抗仙掌以承露擢雙立之金莖西京賦立修莖之仙掌承雲表之清露衛覬立魏明帝疏曰漢武信求神仙之道謂當得雲表之露以餐玉屑故立仙掌以承高露五色露東方朔遊吉雲之地漢武帝問朔曰何名吉雲曰其國俗常以雲氣占吉凶若吉樂之事則滿室雲起五色照著於草木皆成五色露露味甘帝曰吉雲五色露可以得否朔乃東走至夕而還得玄黃青露盛之琉璃器以授帝帝遍賜群臣得露嘗者老者少疾病皆愈洞冥記降未央元康元年三月詔曰鳳皇集秦山陳留甘露降未央宮其赦天下宣紀樹汁新蔡鄭敬都尉高懿廳前槐樹有白露類甘露懿問椽屬皆言是甘露敬曰明府德政未致甘露但樹汁耳懿不悅稱疾而去汝南先賢傳降陵明帝永平十七年夢見先帝光烈皇后夢見喜覺悲不能寐明旦上陸其日甘露降於陵樹帝令百官採之帝伏御床流涕也東觀漢記政感山陽百里嵩為濟南相甘露降于郡安帝嘉其露徵祥拜大鴻臚為徐州刺史甘露再降廳事前樹謝承書芳林園露魏志曰明帝鑄承露盤莖長十二丈銅龍繞其根立於芳林園甘露乃降明帝與東阿王詔曰昔先帝時甘露屢降於仁壽殿前靈芝生芳林園中自吾建承露盤已未甘露復降芳林園仁壽殿前曹植魏德論曰玄德洞幽飛花上蒸甘露以降蜜淳冰凝覩陽弗晞瓊爵是承承露盤館曰氣之清者莫如露玉杯吳猛將弟子登廬山過石梁見一老坐桂樹下以玉杯承甘露與猛述異記五明囊弘農鄧紹八月旦入華山採藥見一童子執五綵囊承柏葉上露皆如珠滿囊問之云赤松先生取以明目言終便失所在齊諧記八月一日作五明囊盛取百草頭露洗眼眼明述征記佳祥晉翟鏗啓庾翼述甘露曰甘露降學堂柳樹與幹吏共嘗味極甜宜表賀翼答曰甘露自古佳祥而頃天下多故何以致此且其味尚薄未知瑞應否而近得一白兔少羸小且養之併上嘉露元嘉中甘露頻降狀如細雪二十四年七月江夏王義恭上嘉禾甘露頌云蘭林甫樹嘉露頻流宋符瑞志午降元嘉二十七年四月豫章南昌戊牛午時天氣晴明有彩霧映覆郡邑甘露又自雲降太守劉思考以上聞兩致崔鴻字彥鸞光子也領郎中以父憂解任甘露降其廬前樹世宗以本官徵鴻四年復有甘露降于京兆宅之庭樹魏書感致武定六年甘露降宮闕文武同賀魏帝令群臣各言德績感致所由崔昂曰吉凶兩門不由符瑞故桑雉之戒實啓中興小鳥孕大未聞福感所願雖休勿休允答天意帝為斂容北史邢子才頌曰流甘委素玉潤冰鮮蜜房下結珠琲上懸藝文李德林為百官賀表云上玄乃顧神物薦委飛甘灑潤玉散珠連昔魏明仙掌竟無靈液漢武金莖空望雲表豈若神漿可挹流味九戶之前天酒自零凝照三階之下臣等振鱗撫翼空馳魚鳥之心瘞玉編金待云亭之后初學記事文類聚以此為梁時虞寄瑞雨頌誤孝感李德饒趙郡柏鄉人性至孝丁父憂單縗徒跣甘露降其樹白鳩巢其廬隋書潤肺太真妃宿酒初消多苦肺熱嘗陵晨獨遊後苑傍花樹以手攀枝口吸花露籍其露液潤于肺也開元遺事政致李懸為具州刺史甘露𡾋庭樹其邑人曰美政所致重降林攢貞元初為福唐尉聞母病棄官還母亡自埏甓作冢廬其右有白鳥來甘露降觀察使李若初遣官屬驗實會露晞里人失色攢哭曰天所降露禍我耶俄而露復集鳥亦回翔詔作二闕于墓前時號闕下林家新唐書甘露之變李訓十一月帝御紫宸殿京兆尹韓約奏甘露降金吾左仗樹群臣賀訓元輿奏言甘露近在禁中陛下宜親往觀以承天貺許之即輦入含元殿詔宰相群臣往視訓奏言非甘露帝曰豈約妄耶顧中尉仇士良于志弘等驗之訓因欲閉之諸官人使無免者薔薇露五代時蕃使蒲阿散以十五瓶獻賜歌祥符九年十一月五日賜玉清昭應宮甘露歌曰名神漿稱天酒考祥圖兮嘉應之首降仁壽零未央觀舊史兮太平之祥六日表賀雀餳杜鎬博學有識都城外有墳莊一日忽有甘露降布林木子姪輩驚喜白之鎬味之慘然不懌子姪啓請曰此非甘露乃雀餳也大非佳兆吾門其衰矣踰年鎬家有八喪王陶談淵天官書曰色黃白爵餳降松熙寧六年冬建昌軍城北五里間甘露降於進士徐上交別業松上濃厚如酒澤其味甜香上交折松枝獻於太守張子方時有野人賣藥於市語人曰吾嘗客華陰縣民亦有以甘露降告縣者縣令因自出按之有道人笑曰譬如人身精液流通均布六七十年中若有壽短促則涌於未死之前矣此木蓋將槁故耳官人不信請留我以待明春此松必不復榮矣縣令如其說果驗焉苕溪漁隱鶴警白鶴性警至八月露降流于草葉上滴滴有聲則鳴周處風土記仙丘露仙丘降露仙人常飲之山海經桂露元封三年婁遏國獻能言龜東方朔曰唯承桂露以飲之洞冥記丹露畢勒國人飲丹露為漿丹露者日初出有露汁如珠也上香露炎帝始百榖滋阜神芝發其異色靈苗擢其嘉穎陸地丹蕖駢生如蓋香露滴瀝下流成池拾遺記朱露崑崙山有甘露濛濛似霧著草木則滴瀝如珠亦有朱露望之色如丹著木石赭然如赤雪灑焉似瑤器承之如𨹋人君盛德則下上玉露齊武帝紀云卿雲玉露南史玉露凋晚林舊唐書李密陰精霜者陰精冬令也四時代謝以霜收殺霜之為言亡也物以終也春秋考異郵陰凝陰陽之氣各靜其所則靜矣陽氣勝則散為雨露陰氣勝則凝為霜雪大戴禮露凝詩含神霧曰陽氣終白露為霜蔡雍月令章句曰露凝為霜潘安仁賦云天凝露以降霜兮木葉落而損枝殺木霜以殺木露以潤草春秋元命苞挫物援神契曰霜以挫物殺伐之表霜殺伐之表秋季霜始降鷹隼擊王者順天行誅以成肅殺之威若政令苛則夏下霜誅伐不行則冬霜不殺草春秋感精符從地升寒氣凝以為霜從地升也五經通義鴻雁南飛天霜樹落葉而鴻雁南飛五經鉤沈駟見國語曰駟見而霣霜霣霜而冬裘具賈逵曰駟房星也附木誅不原情其霜附木不下地不教而誅其霜反在草下京房易傳工休禮曰季秋之日霜始降則百工休鄭玄注曰謂膠漆之作停嫁娶行家語曰霜降而婦功成嫁娶者行焉王肅注云季秋霜降嫁娶始于此詩云將子無怒秋以為期青女秋三月青女乃出以降霜雪高誘注曰青女天神青腰玉女主霜雪也楞嚴經青女者主霜雪之神也梁昭明博山香爐賦青女司寒紅花翳景夏隕霜桀無道夏隕霜命歷序仲夏霜穆公即位仲夏霜殺草日中不消上不殺草菽魯僖公即位隕霜不殺草李梅實梅李大樹比草為貴是君不能伐也定公即位隕霜殺菽菽者稼最強季氏之萌春秋考異郵履霜操琴操曰履霜操者伯奇之所作也伯奇者吉甫之子也吉甫聽其後妻之言疑其孝子伯奇遂逐之伯奇編衣采楟花而食之清朝履霜自傷無罪見放遂乃援琴而鼓之六月飛霜淮南子曰鄒衍事燕惠王盡忠左右譖之王繫之獄仰天而哭夏五月天為之下霜江淹書云昔者賤臣叩心飛霜擊於燕地庶女告天振風襲於齊臺宋井霜先民有言明出乎幽著生乎微故宋井之霜以基升正之寒黃蘆之萌以兆大中之暑事亦如之中論修本順天氣孫寶為京兆尹以立秋日署候文束部督郵入見勑曰今日鷹隼始擊當順天氣取奸惡以成嚴霜之誅漢書為秋霜光武崩廣陵王荊作飛書與東海王彊搆逆曰當為秋霜無為檻羊注秋霜肅殺於物檻羊受制於人後漢書晝霜北齊武成時晝霜下其年傳位於太子緯隋書盛夏隕霜證聖元年六月陸州隕霜殺草吳越地燠而盛夏隕霜昔所未有五行志凝霜封樹唐書曰寧王憲疾時京城寒甚凝霜封樹時學者以為春秋雨木冰即此是亦名樹介言其象介胄也憲見而歎曰此俗所謂樹稼者也諺曰樹稼達官怕必有大臣當之吾其死矣十一月薨不害嘉榖元和十四年四月淄青隕霜殺惡草及荊棘而不害嘉榖唐史五行豐山鍾鳴山海經曰豐山有九鍾是知霜鳴郭璞注曰霜降則鍾鳴故言知也春雷驗霜周則天時春雷始鳴記其日計其數滿一百八十日霜必降又曰雁從北來記其日後八十日霜降朝野僉載霜信北方白雁秋深乃來來則霜降謂之霜信古今詩話紺碧廣延國霜色紺碧拾遺記甘霜嵰州霜耳上玄霜西王母云仙藥中有玄霜絳雪漢武內傳裴航遇仙女樊夫人詩曰一飲瓊漿百感生玄霜搗盡見雲英傳奇鷓鴣覆背鷓鴣常向日而飛畏霜露早晚希出有時夜飛夜飛則以樹葉覆其背上陰氣凝陰氣盛則凝為雪曾子雲霧雨之徵也夏則為露冬則為霜濕則為雨寒則為雪雨露凍凝者皆由地發不從天降論衡花六出凡草木花皆五出雪花獨六出韓詩外傳不封條太平之代雪不封條凌殄毒害而已西京雜記五榖之精汜勝之書云取雪汁漬原蠶矢五六日待什手挼之和榖種之能禦旱故謂雪為五榖之精也一丈雪武王伐紂都洛邑未成陰寒雨雪十餘日深丈餘甲子平旦不知何五大夫乘五車從兩騎止門外欲謁武王武王將不出見太公曰不可雪深丈餘而車騎無迹恐是聖人王使太師尚父謝五大夫曰賓幸臨之失不先問方修法服太師尚父使人持一器粥出進五車兩騎曰大夫在內方對天子天寒故進熱粥以御寒未知長幼從何起兩騎曰先進南海君次河伯風伯雨師粥既畢使者具以告尚父尚父告武王曰客可見矣武王曰諸神各有名乎師尚父曰南海神名祝融北海神名玄冥東海神名勾芒西海神名蓐收河伯名馮修請使謁者各以其名召之武王乃于殿上謁者于殿下門外引祝融進五神皆驚相視而歎祝融拜武王王曰天陰乃遠來何以教之神曰王伐殷立周謹來受命願勑風伯雨師各使奉其職武王曰豫歲時亦無廢禮焉太公金匱伏符陰謀賦黃竹丙辰天子遊黃臺之丘獵於蘋澤有降雨天子乃休日中大寒北風雨雪有凍人天子作黃竹詩三章以哀之曰我徂黃竹負閟寒郭璞注曰閟閉也穆天子傳甜雪穆王東至大之谷西王母來進嵰州甘霜甜雪嵰州去玉門三千里地多寒雪霜著木石之上皆融而甘可以為果拾遺記西嶽記云甘雪惠茲禾黍北堂披裘猶寒天雨雪楚莊王披裘當戶曰我猶寒彼百姓賓客甚矣乃使巡因中求百姓賓客之無居宿絶糧者國人大悅尸子歌召靈王起昆明臺召諸方士有二人乘遊龍飛龍之輦王迎之上廣時天下大旱地裂木然其一人先唱能為霜雪王乃請焉于是引氣一吸則雲起雪飛坐者皆凜然拾遺記負薪而哭王孫子曰衛君重裘纍茵而坐見路有負薪而哭者問之曰雪下衣薄也衛君曰為君而不知民孰以我為君於是開府金出倉粟以賑貧窮雨雪不寒景公時雨雪三日公披狐白之裘曰怪哉雨雪三日不寒晏子曰古之賢君飽而知人飢溫而知人寒公曰善出裘發粟以與飢寒者晏子春秋梁山操琴操曰曾子耕太山下雨雪不得歸思父母作梁山操牛目魏惠王死葬有日矣天大雨雪至於牛目群臣請弛期太子不許犀首以告惠公惠公諫曰昔王季歷葬於渦山之尾欒水齧其墓見棺之前和文王曰嘻先君必欲一見群臣百姓也天故使欒水見之於是出而為之張朝百姓皆見之三日而後更葬此文王之義也太子曰甚善敬弛期更擇葬日呂氏春秋北堂書抄引孟子作滕文引戰國策作惠王青雪燕昭王時廣延國來獻其國去燕七萬里在扶桑東其地寒盛夏之日冰厚至丈常雨青雪冰霜之色皆如紺碧拾遺記履雪東郭先生久待詔公車貧困飢寒衣敝履不完行雪中履有上無下足盡踐地道中人笑之東郭先生應之曰誰能履行雪中令人視之其上履也其履下處乃似人足者乎史記牛馬縮如蝟漢元封二年大雪深一丈野中鳥獸皆死牛馬踡縮如蝟齧雪蘇武持節使於胸奴單于幽武置大窖中絶不與食天雨雪武臥齧雪與氈毛并咽之數日不死胸奴因以為神漢書五月雪漢女者居東海養姑姑女讒之於姑姑徑詣太守訴而殺之五月下雪飛燕期射鵰趙飛燕在父母家居貧與妹合德通鄰人羽林射鵰者露立戶外風雪大作飛燕閉息順氣體無軫粟射鵰者以為神仙飛燕外傳閉門不出時大雪積地丈餘洛陽令自出案行見人家皆除雪出有乞食者至袁安門無有行路謂安已死令人除雪入戶見安僵臥問何以不出安曰大雪人皆餓不宜干人令以為賢舉為孝廉汝南先賢傳潁川胡定字元安至行絶人在喪雉兔游其庭雪覆其室縣令遣戶曹排雪問定定已絶榖妻子皆臥在床令遣掾以乾糒就遺之定乃受半食雪段熲破羌明年春餘羌復與燒河大豪寇張掖熲自下馬大戰刀折矢盡虜亦引退熲追之且鬥且行晝夜相攻割肉食雪四十餘日東觀漢記袒臥不移焦先世莫知所出野火燒其廬因露寢遭冬雪大至先袒臥不移人以為死就視如故高士傳赤雪宋朝雜事曰太康七年河陰雨赤雪二頃唐五行志貞元二十一年正月甲戌雨赤雪于京師掘得玉馬東瀛公騰字元邁自并州遷鎮鄴行次真定時大雪當其門前數十步獨液不積騰怪而掘之得玉馬高尺許齒皆缺騰以為馬國姓上送之以為瑞或謂無齒則不食是后騰為汲桑所殺異苑平地尺雪陸機誅日平地尺雪時人以為冤別傳失行馬曹攄為洛陽令于時大雪而宮門夜忽失行馬攄曰此非他竊理可保明必是門生以燎寒驗之而具服別傳雨雪降變石季龍以五月內發五百里內萬人築華林苑垣周旋數十里至八月天暴雨雪深三尺凍死數千人太史奏作役非時天降此變虎乃誅起部尚書朱軌以塞天災鄴中記柳絮因風謝太傅寒雪日內集與兒女講論文義俄而雪驟公欣然曰白雪紛紛何所似兄子胡兒曰散鹽空中差可擬兄女曰未若柳絮因風起世說訪戴王子猷居山陰大雪夜眠覺開室酌酒四望皎然因起傍徨詠左思招隱詩忽憶戴安道時戴在剡溪即便夜乘輕船就戴經宿方至既造門不前便返人問其故王曰吾本乘興而行興盡而返何必見戴語林撤薦飼馬孝廉范逵宿於陶侃家時大雪侃母湛氏撤所臥薦自銼飼其馬逵聞之嘆曰非此母不生此子列仙傳雪贊羊孚作雪贊云資清以化乘氣以霏遇象能鮮即潔成輝桓胤遂以書扇世說神仙中人孟昶未達時家在京口嘗見王恭乘高輿被鶴氅裘于時微雪昶於籬間窺之嘆曰此真神仙中人上銅駝得銅先酒泉南有銅駝山言虜犯者有大雪沮渠蒙遜遣工取之得銅數萬斤崔鴻北涼録集衣大明五年正月戊午元日花雪降庭殿時右衛將軍謝莊下殿雪集衣還白上以為瑞於是公卿并作花雪詩宋書符瑞志載樵給乏梁南平王偉每祁寒積雪則遣人載樵米隨乏隨者賦給之南史映雪讀書宋齊語曰孫康家貧嘗映雪讀書清淡交游不雜孫氏世録雪霰兆凶梁元帝徐妃初嫁夕車至西州而疾風大起發屋折木無何雪霰交下帷簾皆白及長還之日又大雷震西州廳事兩柱俱碎帝以為不祥後果不終婦道南史飛雪不霑梁邵陵王為魏將楊忠所殺投於江岸經日色不變鳥獸莫敢近時飛雪飄零尸橫道路周回數步獨不霑灑舊主帥郝破敵斂之於襄陽葬之日黃雪氛糅惟冢壙所獨不下雪楊忠悔而祭之百姓為立廟上立雪中長孫儉舊嘗詣闕奏事時值大雪遂立於雪中待報自旦達暮竟無惰意其奉公勤至皆此類也后周書禬神致雪薛延陀使大度設擊李思摩摩走朔州太宗詔李績營朔州部將薛萬徹率徑騎先收執馬者故延陀不能去斬首數千級獲馬萬五千大度設亡去萬徹追弗及殘卒奔漠北會雪甚衆皸踣死者十八始延陀能以術禬神致雪冀困績師及是反自斃云回紇傳盛夏取進高宗盛夏思雪明崇儼坐頃取以進曰雪往陰山取之藝術傳盛夏積雪咸亨元年吐蕃遣大臣論仲琮入朝帝召見對曰烏海之陰盛夏積雪吐蕃元日雪長壽二年元日大雪其夜質明而晴上謂侍臣俗云元日有雪則百榖豐未知此語有何故實文昌左丞姚璹對云汜勝之書云雪是五穀之精以其汁種和則年榖大穰又宋武帝大明五年元日降雪以為嘉瑞上曰朕臨御萬民心存百姓如得年登歲稔即可為大瑞雖獲麟鳳亦何用焉舊唐書春雪非瑞久視二年都城三月雨雪鳳閣侍郎蘇味道以為瑞雪率百官表賀左拾遺王求禮云公為宰相不能燮理陰陽非時降雪又將災而為瑞誣罔視聽若以三月雪為瑞雪即臘月雷亦為瑞雷耶味道不從舉朝嗤笑以為口實上雪不移足郭元振為安西大都護時西突厥首領烏質勒部落強盛欻塞通和元振就其牙帳計會軍事時天大雪元振立于帳前與烏質勒言議須臾雪深風凍元振未嘗移足烏質勒年老不勝寒苦會罷而死上立雪待友蕭至忠嘗與友人期於路隅會風雪凍冽諸人皆奔避就宇下至忠曰焉有與人期而求安失信乎獨不去上又滕六降雪事見風巽二下遇雪誓神開元時王晙將并州兵西濟討叛虜間行倍道趨之夜於山中忽遇風雪甚盛晙恐失期仰天誓曰晙若事君不忠不討有罪明靈所殛固自當之而士衆何辜令其艱苦若誠心忠烈天艱孔明當止雪回風以濟戎事言訖風回而雪止上沒靴韋斌每朝會不敢離位笑言嘗大雪在廷者皆振裾更立斌不徙足雪甚幾至沒靴亦不失恭安石傳雪花如翼天寶初安思順進五色玉帶上怪近日西貢無五色玉令責安西諸蕃蕃言為小勃律所劫沮上怒李林甫贊成上意命王天運將四萬人往征之屠其城虜二千人及其珠璣而還勃律中有術者言將軍無義不祥天將大風雪矣行數百里忽驚風四起雪花如翼風激小海水成冰柱起而復摧經半日小海漲湧四萬人一時凍死酉陽雜俎掃雪迎賓王元寶每大雪之際則令僕夫門巷掃雪為徑迎揖賓客飲宴為暖寒之會天寶遺事葛三避雪大曆初鍾陵崔希真工繪事冬日晨出見一老人避雪門下延入具大麥麵食之又獻松花酒老人懷中取一丸藥置酒中酒頓甘美仍取數丸遺崔崔入宅復出見老人已去有圖于所畫素上者皆非常意所及遂踏雪尋至蘆洲中見船中數人而樵客在側顧笑曰葛三乃見逼于伊人李極光天師曰此真人葛洪第三子所畫也其藥乃千歲松膠也原化記野處詩天上惟留滕六住人間會有葛三來雪夜平蔡李訴襲吳元濟出文成柵是日雨雪大風裂旗斾馬栗而不能躍士卒抱戈凍死者十二三比夜半至懸匏城雪愈甚近城有鵝鴨池訴令擊驚之以雜其聲遂登城縳元濟訴傳雪擁藍關韓退之姪湘有仙術方退之在朝暇日湘種頃刻花上擁出詩一聯云雲橫秦嶺家何在雪擁藍關馬不前未幾退之言佛骨貶潮州一日途中遇雪俄有一人冒雪而來乃湘也湘曰憶花上之句乎公詢其地乃藍關嗟嘆久之為續其詩載集中青瑣集越犬吠走柳子厚答韋中立書云二年冬大雪踰嶺被越中數州數州之犬皆倉皇吠噬狂走者纍日寢室無雪懿宗在藩邸時嘗大雪盈尺上寢室上輒無分寸諸王見者無不異之杜陽編深雪袒寢蜀有道士陽狂俗呼為灰袋嘗大雪中衣布褐入青城山暮投蘭若求僧寄宿至夜半雪深風起僧慮其已死就視之去床數尺氣蒸如炊酉陽雜俎星子取書書生李勝嘗游洪州西山與處士盧齊輩雪夜共飲坐中一人偶言雪勢如此固不可出門勝曰欲有何詣吾當往之曰吾有書在星子可為取之乎勝曰可乃出門去飲未散攜書至星子距西山凡三百里江淮異人録雪令李升既畜異志欲有江南且欲諷動僚屬雪天大會出一令曰借雪取古人名仍詞理通貫時宋齊丘徐融在坐升舉杯為令曰雪下紛紛便是白起齊丘曰著履過街必須雍齒融意欲挫升等遽曰明朝日出爭奈蕭何升大怒是夜收融投于江自是與謀者惟齊丘而已五代史補以雪為銀耿先生大中召之官嘗大雪戲之曰先生能以雪為銀乎曰可乃取雪自投於熾炭中灰埃芒起徐以炭周覆之過食頃曰可矣乃取出赫然若銅置之於地及冷爛然為鋋銀及視其下若垂酥滴乳之狀江表志絳雪丹薛昭遇仙女張雲容一曰蕭鳳臺一曰劉翹翹得絳雪丹度世傳奇瑞葉王綸女為鬼所憑自稱為燕華君有雪詩云何事月娥期不在亂飄瑞葉落人間說與人云天上瑞木開花六出古今詩話馬耳王晉之與霍辨對談雪盈尺王曰雪太深乎霍曰看北臺馬耳果何如左右曰有兩尖在東坡雪夜詩試掃北臺看馬耳未隨埋沒有雙尖示兒編三白正月三白田公笑赫赫西北人唁曰要宜麥見三白朝野僉載陰作威春秋潛潭巴曰大雪甚厚必有女主天雪連月陰作威宋均曰雪為陰臣道冬夏有雪山海經曰由首山小威山空桑山並冬夏有雪漢書西域傳曰天山冬夏有雪積雪雲南郡四五月猶積雪皓然代郡陰山五月猶宿雪八月未復雪將將荀子詩云如雪霜之將將如日月之光明注逸詩瓊樹謝惠連雪賦庭列瑤階林挺瓊樹善注瓊赤玉也瓊樹恐誤困學紀聞載之按詩木瓜報之以瓊琚傳瓊玉之美者琚佩玉名疏云言琚是玉名則瓊非玉名故云瓊玉之美者言瓊是玉之美名非玉之名也陳張正見詩睢陽生玉樹雲夢起瓊田隋王衡詩璧臺如始構瓊樹似新栽李賀詩白天碎碎墮瓊芳李義山詩已隨江令誇瓊樹又入盧家妬玉堂玉塵巴卭人有橘園兩大橘如三斗盎剖開每橘有二老叟皆相對象棋一叟曰我輸瀛洲玉塵九斛幽怪録何遜雪詩若逐微風起誰言非玉塵銀花群仙録姚君上升之日天雨銀花繽紛滿地宋之問雪中應制詩瓊章定少千人和銀樹先舒六出花劉夢得詩銀花垂院榜翠羽撼絛鈴堅立不動達摩止嵩山少林寺面壁有僧神光事之夜大雪堅立不動達摩契之與易名惠可即二祖也傳燈録六出公東陽夜怪録有雪詩云愛此飄颻六出公輕瓊洽絮舞長空呼雪為公取呼竹為君之意也剪水作花陸暢雪詩仙人寧底巧剪水作花飛本事詩雪蛆峨眉雪蛆大治內熱江鄰幾雜志寒凝春泄氣為雨寒凝為雪五經通義陽之專氣大戴禮曾子云陽之專氣為雹陰之專氣為霰霰雹者一氣之化也盛陽之氣在雨水則溫暖為雨陰氣薄而脅之不相入則轉而為雹盛陰之氣在雨水則凝滯而為雪陽氣薄而脅之不相入則消散而下因水而為霰故春秋榖梁說曰雹者陰脅陽之象霰者陽脅陰之符也稷雪說文曰霰積雪也埤雅云霰閩俗謂之米雪今名澀雪亦曰濕雪詩補傳霰米雪又曰粒雪花雪韓詩曰如彼雨雪先集維霰薛君注霰英也花葉謂之英離騷云秋菊之落英左思云落英飄颻是也然則霰為花雪矣宋書符瑞志爾雅雨霰為霄雪注詩先集惟霰霰冰雪雜下者謂之霄雪疏霄即消也爾雅又云雨雪相和為霰冬夜霰雪有丁生寓朗州蘂宮久夜霰雪方甚二三羽衣圍爐有肥羜美酒之嘆丁曰致之何難闢戶奮袂去至夜分蒙雪回提一銀榼酒熟羊一足云浙帥廚中物留之而去瑣言雨冰說文曰雹雨冰也蔡雍月令章句云雨凝曰雹也北方氣東方之氣雷南方之氣電西方之氣虹霓北方之氣雲雨雹霰雪造化權輿愆陽伏陰凡雹皆冬之愆陽夏之伏陰也漢五行志徵動羽風角占曰徵動羽有雹霜陳陸瓊詩惟徵動羽惟陰脅陽雨水作沴凝氣為祥陰氣專精春秋考異郵曰陰氣之專精凝合生雹雹之為言合也以妾為妻陰精凝而見戒也后漢張奐疏云陰氣專用則凝精為雹如礪夷王七年冬雨雹大如礪紀年氣凝春秋漢含孽曰專一精并氣凝為雹宋均注謂若魯僖公脅于齊以妾為妻尊重齊媵無回曲之心感陰水氣乃使結而不解散禦雹春王正月大雨雹季武子問於申豐曰雹可禦乎對曰聖人在上無雹雖有不為災古者日在北陸而藏冰西陸朝覿而出之其藏之也周其用之也遍則冬無愆陽夏無伏陰春無凄風秋無苦雨雷出不震無菑霜雹今藏川池之冰棄而不用風不越而殺雷不發而震雹之為菑誰能禦之左昭四如桃李成帝問劉向曰俗說文帝曰時天下斷獄二人米一斗一錢有此事否對曰皆不然後元年雨雹如桃李深三尺尋太宗之世不可為升平風俗通馬頭雞子武帝元封三年十二月雨雹大如馬頭宣帝地節四年五月山陽濟陰雨雹如雞子深二尺五寸殺二十人蜚鳥皆死成帝河平二年四月楚國雨雹大如斧飛鳥皆死漢書霍淵沈伏袁安為陰平長有惠化縣先有雹淵冬夏未嘗消釋歲中輒出飛布十數里大為民害安乃推誠潔齊引愆貶已至誠感神雹遂為之沈淪伏而不起乃無苦雨凄風焉小說縣界獨無韓稜字伯師除為下邳令視事未周吏人愛慕時鄰縣皆雹傷稼稜縣界獨無東觀漢記如杯棬永初三年夏河西縣大雨雹皆如杯棬大者或如斗殺畜生雉兔折樹木孔叢子陰乘陽延光元年河西大雨雹如斗安帝見孔季彥問其故對曰此皆陰乘陽之徵今貴臣擅權母后黨盛陛下宜修聖德慮此二者也後漢尹敏傳如斗獻帝初平四年六月寒風如冬右扶風雹如斗殺人前後雨雹此最為大時帝亂遷失政天下潰亂袁山松書介推怒石勒時雹起西河界山大如雞子平地三尺汙下丈餘行人禽獸死者萬數歷太原樂平武鄉趙郡廣平巨鹿千餘里樹木摧折禾稼蕩然勒問徐光光曰去年禁寒食介推帝鄉之神也歷代所尊故有此災矣崔鴻十六國春秋金石皆銷石遵襲位鄴中暴風雨震留雹如斗金石皆銷月餘乃滅歷代記吞而生子鮮卑兵投鹿候從胸奴三年其妻在家有子怪欲殺之妻言常行仰天視而雹入口吞之而生子號擅石槐後遂為鮮卑大人魏魏書氣激永熙中有風雹之變王椿上疏曰風為號令皇天所以示威雹者氣激陰陽有所交諍殆行令殊節舒急失中之所及也魏書恩幸傳撒珠應雹隋煬帝南幸時陰雲驟作俄雨冰雹忽降擊龍舟之蓋既晴上思雹虞世基請令宮女撒珠璣于舟中以應雹聲又拋龍腦于錦帆之上以象霰雪開河記宣麻降雹乾符六年五月巢寇自廣陵將及襄漢朝廷以王鐸為南面都統崔沆豆盧瑑同日拜相宣麻之際殿上霧氣四塞及政事堂立班賀有雹大如雞卵識者以為鈞軸不祥之兆明年京師陷二相俱及于難劇談録高等寺樓楊行自言天祐初在鼓城避暑于佛寺雨雹方甚忽聞大聲震地走視門外乃見一雹其高與寺樓等入地可丈餘經月雹乃消稽神録蜥蝪吐劉居中至嵩山顛有大蜥蝪數百皆長三四尺人以食食之撫摩其身滋膩如脂一日聚繞水盆邊各就取水陀入口即吐雹已圓結如彈丸積之于側俄頃雹纍滿地忽震雷一聲起彈丸皆失去明日人來言昨日雨雹大作乃知蜥蝪所為夷堅志無異鐫刻熙寧中河州雨雹大者如雞卵小者如蓮芡或如人頭耳目口鼻皆具無異鐫刻次年王師平河州硬雨紹興十七年五月初臨安大雨雹太學屋瓦皆碎學官申朝廷修不可言雹稱為硬雨軒渠録有一村人多為不善者夜中行人聞神過云付硬雨施行次日雨雹大損禾稼木再花夏有雹酉陽雜俎柴都東房有柴都焉在齊國有山山有泉水如井狀深不測至春夏時雹從井中出常敗五榖人常以柴塞之不柴塞則出也故號為柴都郭氏玄中記安丘城南三十里雹都泉其雹或出或否亦不為災異伏琛齊地記神井雍丘縣夏后公祠有神井能興霧雹陳留風俗傳流銅涼州異物志曰有大人生於北邊偃臥於野其高如山頓腳成谷橫身塞川近之有災銅電擊旃注曰旃之也唯可遙看不可到下到下則雷霆流銅鐵之丸為雹以擊殺人乘霞燕昭王二年海人乘霞獻龍膏拾遺記流霞臺上元夫人謂西王母曰阿瓊有六甲之術用之可以遊景雲之宮登流霞之臺漢武內傳飲流霞河東蒲坂項曼都好道學仙去三年而反家問其狀都曰欲飲食仙人輒飲我以流霞每飲一杯數日不飢論衡碩漫卿夢到天上仙人以流霞一杯飲之謂曰公后貴壽不可以不重也其味甘其色赤其香馥郁乘霞仙人劉根隱于積谷山飛霞洞嘗乘霞至天台溫州舊志霞舉海西時諸公每朝猶暗惟會稽王來軒軒如朝霞舉世說李白元宗召見於便殿神氣高朗軒軒然若霞舉酉陽雜俎凝霞臺大中年日本王子來朝云國東三萬里有集真島島上有凝霞臺杜楊編日精日者霞之實霞者日之精食霞之道甚祕致霞之道甚易九光崑崙山之上有瓊華之室紫翠丹房景雲燭日朱霞九光十洲記赤水氣蒸崑崙山有五色水赤水之氣上蒸為霞而赫然河圖五色霞崑崙山第八層有五色霞拾遺記錦綺開開元傑東嶺洞谷銘曰朝霞照海兮錦綺開文粹螮蝀詩云螮蝀在東爾雅螮蝀謂之雩螮蝀虹也注俗呼為美人以江東呼雩月令季春之月虹始見音義云虹雙出色鮮盛者為雄雌曰虹暗者為雌雌曰霓是陰陽交會之氣挈二爾雅霓為挈二注霓雌虹也挈二其別名也見尸子離騷云雌霓㛹嬛以魯撓天弓虹也又謂之帝弓明者為虹暗者為霓白虎通陽炙陰陽炙陰為虹莊子虹霓為析翳尸子天二氣天二氣即成虹地二氣即泄藏人二氣即生病文子天忌虹霓者天之忌也淮南子陰陽之精虹霓者陰陽之精也漢天文志斗之亂精精霓者斗之亂精也斗失度則投霓見態主惑于毀譽春秋演孔圖陽氣動虹者陽氣之動史記流渚帝摯少昊氏母曰女節見星如虹下流華渚既而夢接意感生少昊宋符瑞志貫月瑤光如霓貫月感女樞生顓頊詩含神霧竟天大虹竟天握登見之意感生帝舜於姚墟瑞應圖貫牛山春秋文曜鉤曰白虹貫牛山管仲諫曰無近妃宮恐失權齊侯大懼去色黨更立賢輔使后出望上牛山四面聽之以厭神宋均注曰山君位也虹霓陰氣也陰氣貫之君惑于妻黨之象也望謂祭以謝過也后漢李氏家書李郃曰齊桓公遭虹貫斗牛之變納管仲之謀齊以大安楊賜傳亦引青虹晉定公十八年青虹見紀年化玉孔子修春秋制孝經既成乃齊戒向北斗星而拜告備于天乃有赤氣如虹自上而下化為黃玉上有刻文孔子跪而授之搜神記白霓嬰茀楚辭天問白霓嬰茀胡為此堂安得夫良藥不能固藏列仙傳云崔文子學仙於王子喬子喬化為白霓持藥與之文子驚怪引戈擊霓中之因墮其藥俯而視之子喬之尸也置之室中覆以敝筐須臾而化為大鳥開而視之翻翻飛鳴而去貫日戰國策曰唐睢謂秦王曰聶政刺韓傀白虹貫日列士傳曰荊軻發後太子見虹貫日不徹曰吾事不成矣後聞軻死事不立曰吾知之矣漢書鄒陽傳曰荊軻慕燕丹之義白虹貫日太子畏之屬宮飲井上官桀謀廢昭帝迎立燕王是時天雨虹下屬宮中飲井井水竭漢書女子之祥靈帝和光元年虹晝見御座殿庭前色青赤上引蔡雍問之對曰虹霓小女子之祥張璠漢記天投霓光和元年有黑色墮北宮溫明殿東庭中黑如車蓋起奮迅身五色有頭體長十餘丈形貌似龍上問蔡雍對曰所謂天投霓者也不見足尾不得稱龍后五行志繞船兆禍吳志曰諸葛恪攻新城出往東興有白虹見其船還拜蔣陵白虹復繞其軍吳録云恪曰虹何為此來哉果為孫峻所殺斷虹入樹故越王無諸舊宮上有大杉樹空中可坐十餘人越人夏世隆高尚不仕常之故宮因雨霽欲暮斷虹飲於宮池漸漸縮小化為男子著黃赤紫之間衣而入樹良久不出世隆怪異乃召鄰之年少十數人往視之見男子為大赤蛇盤繞衆懼不敢逼而少年遙擲瓦礫聞樹中有聲極異如婦人之哭須臾雲霧不相見又聞隱隱如遠雷之響俄有一彩龍與赤鵠飛去及曉世隆往觀之見樹中紫蛇皮及五色蛟皮欲取以歸有火生樹中樹焚蕩盡吳景帝永安三年七月也東甌後記與人相接廬陵巴丘人陳濟為州吏其婦秦在家一丈夫長大端正著絳碧花衫色炫耀來從之後常相期於一山澗共與寢處不覺有人道相感接如是積年村人觀其所至輒有虹見秦至水側丈夫以金瓶引水共飲後遂有身生而如人多肉濟假還秦懼見之乃納兒著甕中此丈夫以金瓶與之令覆兒云兒小未可得將去不須作衣我自衣之即與絳囊與裹之令可時出與乳于時風雨晦冥鄰人見虹下其庭丈夫復少時將兒去亦風雨晦冥人見二虹出其家數年而來省母後秦適田見二虹於澗畏之須臾見丈夫云是我無所畏從此乃絶神異傳搜神記夢虹李特長子蕩少子雄初特妻羅氏夢雙虹自門升天一虹中斷既而生蕩后羅氏因汲水忽然如寐又夢大蛇繞其身遂有孕十四月而生雄羅常曰吾二兒若有先亡在者必大貴后雄遂王蜀十六國春秋經天有岐劉聰麟嘉元年東西赤虹經天南有一岐太史令康相曰虹達東西者許洛以南不可圖也一岐南徹者李氏當仍跨巴蜀司馬獻終據全吳之象天下其三分乎載記彌天愍帝建興五年正月帝在平陽虹霓彌天其年帝為劉聰所殺晉書五重張駿六年有彩虹五重隆隆如鐘鼓之聲前涼録黑虹下營張駿薨子重華嗣石虎遣將軍王擢攻拔武街始與進圍抱罕重華遣宋輯率衆拒之濟河次于金城將決戰乃有黑虹下于營中少日輯病卒述異記夜出晉安帝紀曰義熙二年七月夜彩虹出西方蔽月吐金晉陵薛願義熙初有虹飲其釜澳吸響便竭願輦酒灌之隨投隨咽便吐金滿器於是災弊日祛而豐富數臻異苑飲粥劉義慶在廣陵有疾白虹貫城野麕入府心甚惡之因陳求還宋書義慶在廣陵臥疾食粥忽白虹入室就飲其粥義慶擲器于階遂作風雨聲振于戶庭獨異志化女後魏明帝正光二年夏六月首陽山中有晚虹下飲於溪泉有樵人陽萬於嶺下見之良久化為女子年十六七異之問不言乃告浦津戍將宇文顯取之以聞明帝召入宮幸未央宮視之見其容貌姝美問云我天女也暫降人間帝欲逼幸而色甚難復令左右擁抱聲如鐘磬化為虹而上天八朝窮怪録貫東宮門隋太子勇知其將廢憂懼計無所出乃問于占候人王輔賢輔賢曰白虹貫東宮門太白襲月皇太子廢退象也北史本傳天使韋皋鎮蜀嘗與賓客宴郡西亭暴風雨俄頃而霽忽虹霓自空而下直入庭垂首于筵吸其飲食且盡五色似霞首似驢四視左右久而方去公懼罷宴曰吾聞虹霓者妖沴之氣今止吾宴怪之甚矣豆盧署曰夫虹霓天使也降于邪則為戾降于正則為祥公正人也敢以祥賀後旬餘有詔就拜中書令宣室志成都記入宅元和二年三月彩紅入潤州大將張子良宅初入漿甕水盡入井飲之是年九月李錡反令子良收宣歙子良反兵圍城錡就擒子良拜金吾尋歷方鎮祥異集驗霓龍侯弘實蒲坂人也年方十三四嘗寐於簷下天將大雨有虹自河飲水俄貫于弘實之口其母見不敢驚焉良久虹自天沒于弘實之口不復出焉及覺母問有夢否對曰適夢入河飲水飽足而歸母默喜知其必貴後數月有蜀僧詣門相之謂其母曰此霓龍也但離去鄉井近江海宦官方有顯榮弘實後為將領同光三年從興聖太子收蜀為眉州刺史節制夔州復自江寧遷于黔府二府二鎮皆近大江鑑戒録入殿南漢劉龑乾亨九年八月白虹入其三清殿中龑頗憂畏其外震懼會有詞臣王宏欲說隱乃以白虹為白龍見上賦以賀之隱大悅乃改元白龍更名龑五國故事環廳行荊州有氣如虹五采奪目有首如驢長數十丈環廳事而行三匝而滅占者曰庭中將有哭聲然非州府之咎頃之順貞穆后崩發哀于此堂稽神録美人虹異苑曰古者有夫妻荒年菜食而死俱化成青絳故俗呼為美人虹郭云虹為雩俗呼為美人揚輝春秋考異郵曰虹霓出亂惑棄和荀爽貽李膺書曰不謂夷之初旦明而未融虹霓揚輝棄和取同夜光易是類謀曰晝視無日虹霓煌煌夜視無月彗孛將將又曰天卑地高雷誰公行星晝奔霓夜光五色虹五色迭至照于宮殿有兵革之事春秋潛潭巴九虹九女并御則九虹并見感精符婚姻失序夫陰陽不和婚姻失序即生此氣月令章句天陂斷霓天陂垂杜牧弄水亭紛錯宋務光云虹霓紛錯陰陽之沴也天中記卷三
