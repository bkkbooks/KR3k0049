body:
  text: 雨輔時雨者輔時生養均遍故謂之雨禮統雨者輔也什名天地之施雨者天地之施也河圖帝通紀陽制于陰故為雨春秋潛潭已陰陽和天地之氣和則雨曾子二氣均王弼云雨者陰在於上而陽薄之而不得通則蒸而為雨此說非也何者夫陰陽二氣生於黃泉氤氳交結出地為雲二氣力均則能為雨或陰氣少而陽氣多或陰氣多而陽氣少皆不能為雨也小畜不雨者陰氣少也小過不雨者陽氣少也小畜上九既雨既處者陽極則陰也故孔子曰天作時雨山川出雲雲也者非一氣能生者也譬之於炊或有水而無火有火而無水皆不能生氣必須水火傋而後氣生氣生本於釜中非結成於甑上也由此而論雲必結於地中陰陽相將而出非陰先而陽後尚不能為雲豈能為雨乎兼明書地氣風為天氣雨為地氣風順時而行雨應風而下命曰天氣下地氣上陰陽交通萬物成矣范子計然陰氣天將雨人之病為之先動是陰相應而起也天將陰雨又使人睡臥者陰氣也漢名臣奏神雨神農之理天下欲雨則雨五日為行雨旬日為穀雨一旬五日為時雨萬物咸利故曰神雨尼子神農之治天下甘雨時降五穀繁植淮南子雲族黃帝見廣成子於空同曰而治天下雲氣不待族而雨莊子族雲飛泉室震風沉羽卿鮑照詩洗甲兵文王命散宜生卜伐紂吉乎曰不吉鑽龜龜不兆數蓍不交而折將行之日雨輜車至軫行之日幟折為三散宜生曰此卜四不祥不可舉事太公進曰是非子之所知也祖行之日雨輜重車是洗濯甲兵也六韜暴雨太公為灌壇令武王夢婦人當道夜哭問之曰吾是東海神女嫁於西海神童今灌壇令當道廢我行我行必有大風雨而太公有德吾不敢以暴風雨過是毀君德武王明日召太公三日三夜果有疾風暴雨從太公邑外過博物志風波立霽武王伐紂至河上雨甚疾雷晦暝揚波於河衆甚懼武王曰余在天下誰敢干志者風波立霽搜神記雨必以夜周公載紀而天下太平當此之時雨不破塊風不鳴條旬而一雨雨必以夜無丘陵高下皆熟鹽鐵論淫雨宋大水公使弔焉天作淫雨害於粢盛若之何下弔對曰孤實不敬天降之災又以為君憂拜命之辱左莊十一年膏雨子游答季孫曰以子産之仁愛譬夫子其猶浸水之與膏雨乎夫浸水所及則生不及則死膏雨之所生也廣民之受賜也普莫識其由來者孔叢子孔子相魯三月不令而行沛若時雨之灌萬物莫不興起也鹽鐵論月離畢孔子出使子路齎雨具有頃天果大雨子路問其故孔子曰昨暮月離于畢後日月復離于畢孔子出子路請齎雨具孔子不聽出果無雨子路問其故孔子曰昔日月離其陰故雨昨暮月離其陽故不雨論衡商羊舞齊有一足之鳥飛集殿前舒趐而跳齊侯異之訪諸孔子孔子曰此鳥名曰商羊昔童兒在屈其一腳振迅兩臂而跳且謠曰天將大雨商羊鼓舞今齊有之其應至矣急告民趨治溝渠修堤防果大霖雨諸國傷害人民唯齊有備家語假蓋孔子將行雨而無蓋門人曰商也有之孔子曰商之為人也甚吝于財吾聞與人交推其長者違其短者故能敬也家語雨水滅表齊韓魏共攻燕楚王使景陽將而救之暮舍使左右司馬各營壁地已植表景陽怒曰女所營者水皆欲滅表焉可以舍乃令徙明日大雨山水大出所營者水皆滅表軍吏乃服戰國策狸知雨有客詣董仲舒談論微奧仲舒疑之客又云天欲雨仲舒因戲之曰巢居却風穴處知雨卿非狐狸即其老鼠客化為老狸而走幽明録流粟鄒子曰朱買臣貧賤之時孜孜修學不覺雨之流粟志在經傳也流麥高鳳好學不休其家曝麥令鳳守雞以竿授其手中鳳執竿讀書雨大至不覺執竿如故其妻還見麥流甚以為怒鳳亦不愧後漢蟻封穴東觀漢記云沛獻王輔善京氏易永平五年少雨上以易林占之繇曰蟻封穴居大雨將至以問輔輔曰蹇艮下坎上艮為山坎為水山出雲為雨蟻穴居時雨將至故以蟻為興居豫備任文公為治中從事時大旱白刺史曰五月一日當有大水其變已至不可防救宜令吏人豫為其備刺史不聽文公獨儲大船百姓或聞頓有為防者到其日旱烈文公急命促載使白刺史刺史笑之日將中天北雲起須臾大雨至餔時湔水涌起十餘丈突壞廬舍所害數千人後漢書噀酒邵信臣為少府南陽遭火熱數萬人信臣時在丞相匡衡坐心動會酒東向漱之遭火處見雲西北來冥晦大雨以滅火雨酒香邵氏家傳後漢書郭憲從駕噀酒厭齊國火神仙傳欒巴正旦救成都火成武丁於周昕坐噀酒救臨武火晉書佛圖澄於石虎臺救幽州火俱同隨車百里嵩字景山為徐州刺史境遭旱嵩出巡處甘雨輒澍東海祝其合鄉等二縣父老欣曰人等是公百姓獨不迂際乃回赴之雨隨車而下謝承書鄭弘為騶令勤行德化魯國當春大旱五穀不豐騶獨致雨偏熟遷淮陰太守消息繇賦政不煩苛行春大旱隨車致雨後漢漱水樊英隱於壼山嘗有暴風從西方起英謂學者曰成都市火甚盛因含水西向漱之乃令記其時日客後有從蜀來云是日大火有黑雲從東起須臾大雨火遂得滅後漢書避雨茅容耕于野時與等輩避雨樹下衆皆夷踞相對容獨危坐逾恭郭林宗行見而奇之因請寓寓宿後漢書折巾郭林宗嘗於陳梁間行遇雨巾一角墊時人乃故折巾一角以為林宗巾其見慕如此後漢書留客昔羽山有神人焉逍遙于中嶽與左元放共遊薊子訓所坐欲起子訓應欲留之二日之中三雨今呼五月三雨亦為留客雨陸機要覽刻雨期管輅與倪清河刻雨期倪未信輅曰十六日壬子直滿畢星中已有水氣水氣之發動於卯辰此必至之應也又夫昨檄召五星宣布星符刺下東井告命南箕使召雷公電父風伯雨師群嶽吐陰衆川激精雲漢垂澤蛟龍含靈燁燁朱電吐咀杳冥殷殷雷聲噓吸雨靈習習谷風六合皆同咳唾之間品物流形天有常期道有自然不足為難也向暮果有艮風鳴鳥日未入東南有山雲樓起黃昏之後雷聲動天到一鼓中星月皆沒風雲並興玄氣四合大雨河傾倪調輅言誤中耳不為神也輅曰誤中與天期不亦工乎管輅別傳蓋覆劉基字敬輿繇子也姿容美好孫權愛敬之權大暑時嘗于船中宴飲於樓船上值雷雨權以蓋自覆又命覆基餘人不得也其見待如此吳志蠱粟懷帝永嘉中梁州雨十旬麥化為飛蛾又荊州久雨粟化為蠱蟲中郎王義興表曰堯生神禾晉有蠱粟陛下自以聖德何如帝有慚色述異記霖浩元魏高祖詔云撫師于霖浩之辰魏書率衆訴天茍金龍為梓潼太守帶關城戍主梁人攻圍會金龍病妻劉率勵拒戰百有餘日井在城外尋為賊陷城絶水劉集衆告天俄而澍雨劉命出公私布絹乃至衣服懸之城中絞而取水所有雜器悉儲之於是人心益固梁人退宣武嘉之官其子魏書列女傳雨珠梁大同中嘗驟雨殿前往往有雜色寶珠梁武帝觀之甚有喜色虞寄因上瑞雨頌帝謂寄兄荔曰此頌典裁清拔卿家之士龍也陳書風雨不異王惠常臨曲水風雨暴至坐者皆馳散惠徐起不異常日不以霑霈而改南史暴雨不改裴粲魯詣清河王下車始進便屬暴雨粲容步舒雅不以霑濡改節懌乃令人持蓋覆之歎謂左右曰何代無奇人魏書審雨堂古槐中蟻穴也元魏時盧汾嘗叩樹有一女子衣青出引汾入見廳堂危豁有堂題曰審雨堂窮神祕苑月額雨金樓子自敘云初至荊州孟秋之月亢陽日久月旦雖雨俄而便晴有人云月雨額千里赤蓋旱之徵也吾筮當雨又以十七日筮于時雲卷金翹日暉合璧紅塵暗陌丹霞映峙咸謂亢陽之勢未沐膏澤筮遇坎之比豫曰坎者水也子爻為世其在今夜三更乎地上有水稱之為比其夜果有甘雨浮漚陳後主泛舟樂遊于河忽遇雨浮漚生宮人指浮漚曰滿河珍珠因名其河為珍珠河金陵志雨官張元賓得仙入華陽洞為理禁伯其職主水蓋雨官也真誥李靖行雨李靖微時嘗射獵靈山中會暮投宿一巨宅有老婦延之中夜扣門甚急婦人曰此非人世乃龍宮也今天符命行雨二子俱出計兩處雲程合踰萬里欲奉煩頃刻如何遂命黃頭鞲青驄馬又命取雨器乃一小瓶子繫於鞍前戒曰馬躍嘶鳴取瓶中水一滴滴馬騣上謹勿多也既而電掣雲間見所憩村連下二十滴既歸老婦泣曰何相負之甚此一滴乃地上一尺雨也此村夜半平地水深二丈豈復有人妾已受譴杖八十矣玄怪録優賢之應貞觀末房玄齡避位居第時天旱太宗將幸芙蓉園以觀風俗玄齡聞之戒其子曰鑾輿必當見幸亟使掃灑兼備饌具有頃太宗果先幸其第便載入宮其夕大雨咸以為優賢之應大唐新語瓦為雨衣谷那律常從太宗出獵途中遇雨上問油衣若為得不漏那律曰能以瓦為之必不漏矣意欲太宗不為畋獵太宗悅賜帛二百段舊唐書會要語林作高宗徙營儉高宗時為定襄道大總管討突厥大軍次單于北暮已立營塹壕既周行儉更命徙營高岡吏白士安堵不可擾不聽促徙之比夜風雨暴至前占營所水深丈餘衆莫不駭歎問何以知之行儉曰自今第如我節制母問我所以知也唐書閉北門神龍元年七月洛水漲壞廬舍宋務先疏曰雨暘或愆則貌言為咎雩禜之法存乎禮典今暫逢霖雨即閉坊門豈有一坊一市遂能感召靈星暫閉暫開便欲發揮神道哉至今巷議街言共呼坊門為宰相謂能節宣風雨燮理陰陽夫如是則赫赫師尹便為虛設悠悠蒼生復何所望唐休璟以霖雨為害咎在主司上表解任冀移陰咎之徵復免夜行之責舊唐五行志牛劣景龍中洛下霖雨百餘日宰相不能調陰陽乃閉坊市北門卒無效霑溢益甚人歌云禮賢不解開東閣燮理惟能閉北門朝野僉載時駕車者苦甚污街中言曰宰相不能調陰陽致茲恆雨令我污行會中書令楊再思過謂之曰於理則然亦卿牛劣耳舊五行志雨工儀鳳中柳毅於涇陽見婦人牧羊道畔怪而問之曰洞庭龍君小女也問牧羊何用曰非羊也雨工也雷霆之類也毅後配此女開元中猶在異聞録知雨邠王守禮章懷太子之子也時雖積陰纍日守禮白於諸王曰欲晴果晴𠎝陽涉旬守禮曰即雨果連澍岐王等奏之云邠哥有術守禮曰臣無術也則天時以章懷遷謫臣幽閉宮中十餘年每歲被勑杖數頓見瘢痕甚厚欲雨臣脊上即沈悶欲晴即輕健臣以此知之非有術也涕泗霑襟玄宗亦憫然舊唐書占雨石蘇頲有一錦紋花石鏤為筆架置於硯席間每天欲雨即津出如汗逡巡而雨頲以此為雨候開元遺事霖鈴上既幸蜀初入邪谷霖雨彌旬於棧道中聞鈴聲與山相應上悼念貴妃因採其聲為雨淋鈴曲以寄恨焉明皇雜録御史雨顏真卿開元中為監察御史使河隴時五原有冤獄久不決真卿至立辨之天方旱獄決乃雨郡人呼之御史雨舊唐書李德雨太和七年二月二十八日蒙恩守本官平章事時樞機不密二十六日京師已盛傳明日有麻二十七日寂然皆言已中止不行矣文宗與樞密使手詔示諸相其詞曰命相絶是重事適看曆日明日晨非佳二十八日方下云去冬今春久無雨雪昏霾尤甚是日甘澤沛然樞密使謂豫曰禁中喜此宮人呼相公向下一字訛音李德雨矣李德裕兩朝獻曆記乾雨泗州門監王忠政云開成中死十二日復活始見一人碧衣赤幘引臂登雲曰天召汝行雨隸於左落隊其左右落隊各有五方甲馬簇於雲頭俯向下重樓深室囊匱之內纖細悉見更異者見米粒長數尺凡兩隊而一隊於小項瓶子貯人間水一隊所貯如馬牙硝末謂之乾雨雨皆在前風車為殿唐年小録霖甚豆盧瑑乾符中拜相宣制日大風雷雨拔樹左丞韋蟾與瑑善往賀之瑑言及雷雨之異蟾曰此應相公為霖作解之祥也瑑笑曰霖何甚耶及巢賊犯京師瑑遇害於張直方之第識者以風雷不令之兆舊唐書假雨具孔