body:
  text: 龍鱗蟲之長鱗蟲三百六十而龍為之長大戴禮龍鱗蟲之長能幽能明能小能大能短能長春分而登天秋分而入淵說文蛟龍水蟲之神者也乘于水則神立失于水則利廢故曰蛟龍得水而神可立也管子形勢龍被五色而遊故神欲小則化如蠶蠋欲大則極於天下欲上則凌於雲氣欲沉則入於深泉變化無日上下無時謂之神管子水地有鱗曰蛟龍有翼曰應龍有角曰虬龍無角曰螭龍廣雅龍未升天曰蟠龍方言天有九龍應龍有翼項岱雨師山中辰日稱雨師者龍也抱朴子黃金千歲生黃龍青金千歲生青龍赤金千歲生赤龍白金千歲生白龍玄金千歲生玄龍河圖興雲龍之言萌也陰中之陽故言龍舉而雲興元命包有自然之龍有蛇蠋化成之龍抱朴子尺木龍無尺木無以升天聖人無尺土無以王天下桓談新論短書言龍無尺木無以升天謂龍從木中升天也蓋當雷電樹木擊之時龍適與雷電俱在樹木之側雷電去龍從而上故謂從樹木之中升天也論衡孫策署太史慈門下督出教曰龍欲騰翥先階尺木者也江表傳雜俎云龍頭上有一物如博山形名尺木龍無尺木不能升天蓋杜撰也雅翼引之似誤羽嘉生飛龍毛犢生應龍介鱗生蛟龍介潭生先龍淮地形天用天用莫如龍索隱曰易曰行天莫如龍是也漢平準書陽精管輅答徐季龍曰龍者陽精以潛於陰幽靈上通和氣感神二物相扶故能興雲矣別傳夫龍之為蟲柔可狎而騎也然其喉下有逆鱗徑尺若人有嬰之者則必殺人人主亦有逆鱗說者能無嬰人主之逆鱗則幾矣韓說難剖卵夫蛟龍伏潛於川而卵剖於陵騰蛇雄鳴於上風雌鳴於下風而化成形精之至也淮太族人不見龍之飛舉而高者風雨奉之也說林江湖見龍卵主大水玄珠名法夫玄龍迎夏則凌雲而奮鱗樂時也涉冬則淈泥而潛蟠避害也張衡應間四龍之長黃龍者四龍之長四方之正色神靈之精也能巨細能幽明能短能長乍存乍亡王者不漉池而漁則應和氣而遊於池沼不衆行不群處必待風雨而遊乎青氣之中遊乎天外之野出入應命以時上下有聖則見無聖則處瑞應圖大辰之精蓋青龍者大辰之精木官之瑞魏繆襲青龍賦青龍水之精垂雨而下下處深泉有仁聖君子在位不肖斥退則見瑞應圖應龍潛於潢汙魚黿媟之不睹其能奮靈氣合風雲超忽荒而躆昊蒼也故夫泥盤而天飛者應龍之神也時暗而久章者君子之貞也班固答賓戲土德漢公孫臣云黃帝得土德黃龍地蚓見史封禪書黃帝治天下而力牧泰山稽輔之青龍進駕淮南黃帝録圖五龍舞河魏文帝雜占應龍蚩尤作兵伐黃帝黃帝乃令應龍攻之冀縣之野應龍已殺蚩尤又殺夸父乃去南方處之故南方多雨應龍處南極殺蚩尤與夸父不得復上故下數旱旱而為應龍之狀乃得大雨山經火德堯游河渚赤龍負圖以出圖亦如綈元命包堯火德故赤龍應焉中候五采舜以太尉即位與三公臨觀於河黃龍五采負圖出置舜前以黃玉為柙白玉檢黃金繩黃芝為泥章曰天賜黃帝符璽河圖木德夏得木德青龍止於郊封禪書負舟禹南省方濟於江黃龍負舟舟中之人五色無主禹乃熙笑而稱曰我受命於天竭力而勞萬民生寄也死歸也何足以滑和視龍猶蝘蜓顏色不變龍乃弭耳掉尾而逃禹之視物亦細矣淮精神穿胸昔禹平天下會諸侯會稽之野防風氏後到殺之夏德之盛二龍降庭禹使范成光御之行域外既周而還至南海經防風防風之神二臣以塗山之戮見禹使怒而射之有迅風雷雨二龍升去二臣恐以刃自貫其心而死禹衰之乃拔其刃療以不死之草皆生是為穿胸民去會稽萬五千里博物志秋龍見於絳郊魏獻子問於蔡墨曰吾聞之蟲莫智於龍以其不得生也謂之智信乎對曰人實不智非龍實知古者畜龍故國有豢龍氏有御龍氏昔有飂叔安有裔子曰董父實甚好龍能求其嗜欲以飲食之龍多歸之乃擾畜龍以服事帝舜帝賜之姓曰董氏曰豢龍封諸鬷川故帝舜氏世有畜龍及有夏孔甲擾于有帝帝賜之乘龍河漢各二各有雌雄孔甲不能食而未獲豢龍氏有陶唐氏既衰其後有劉纍學擾龍于豢龍氏以事孔甲能飲食之夏后嘉之賜氏曰御龍豕韋之後龍一雌死潛醢以食夏后夏后饗之既而使求之懼而遷於魯縣范氏其後也龍水物也水官棄矣故龍不生得周易有之乾曰潛見飛亢坤曰龍戰於野若不朝夕見誰能物之昭十九震鱗震鱗漦於夏庭兮匝三正而滅姬幽通賦天使龍鬪於馬請之陽牛山之陰管子又復於桓公曰天使使者臨君之郊請使大夫初飾左右玄服天之使者乎天下聞之曰神哉齊桓公天使使者臨其郊不待舉兵而朝者八諸侯此乘天威而動天下之道也故智者役使鬼神而愚者信之管子晉文公出亡周流天下舟之僑去虞而從焉文公反國擇可而爵祿之舟之僑獨不與文公酌諸大夫酒酒酣賦詩舟之僑進辭曰有龍矯矯頃失其所一蛇從之周流天下龍反其淵安寧其處一蛇耆乾獨不得其所文公瞿然欲爵祿之舟之僑曰請而得其賞廉者不受也言盡而名至仁者不為也遂歷階而去文公求之不得說苑呂覽介子推事同介子推云惟聞君子之道謁而得位道士不居也爭而得財廉士不受也遂去向之介山之上新序鄭大水龍鬪於時門之外洧淵國人請為榮焉子産弗許曰我鬭龍不我覿也龍鬭我獨何覿焉禳之則役其室也吾無求於龍龍亦無求於我乃止也昭十九吳王欲從民飲酒伍子胥諫曰不可昔白龍下清泠之淵化為魚漁者豫且射中其目白龍上訴天帝天帝曰當是之時若安置而形白龍對曰我下清泠之淵化為魚天帝曰魚故人之所射也若是豫且何罪夫白龍天帝貴畜也豫且宋國賤臣也白龍不化豫且不射今棄萬乘之位而從布衣之士飲酒臣恐其有豫且之患矣王乃止說苑九石虎多徵行初察作所韋謏諫曰白龍魚服有豫且之禍海若潛遊罹葛陂之酷願思二神為元鑒十六國春秋猶龍孔子問禮於老子去謂弟子曰鳥吾知其能飛魚吾知其能遊獸吾知其能走走者可以為獵遊者可以為綸飛者可以為繒至於龍吾不能知其乘風雲而上天吾今日見老子其猶龍耶史記孔子見老聃歸三日不談弟子問曰夫子見老聃亦將何規哉孔子曰吾與汝處於魯魯時人用意如飛鴻者吾為弓弩射之如游鹿者吾走狗而逐之用意若井魚者吾鉤繳以投之吾乃今如是乎見龍龍合而成體散而成章乘乎雲氣而養乎陰陽余口張而不能吸舌出而不能言余又何規老聃哉莊子見藝文今本稍異似龍子張見魯哀公七日而哀公不禮託僕夫而去曰君之好士也有似葉公子高之好龍也鉤以寫龍鑿以寫龍尾室雕文以寫龍於是天龍聞而下之窺頭於牖拖尾於堂葉公見之棄而還走失其魂魄五色無主是葉公非好龍也好夫似龍而非龍者也君非好士也好夫似士而非士者也敢託而去新序射龍韓雉見申羊於魯有龍飲於訴韓雉曰吾聞也出見虎搏之見龍射之今弗射是不得行吾聞也遂射之尸子屠龍朱泙漫學屠龍於支離益單千金之家三年枝成而無所用其巧莊子人有見宋王者錫車十乘以其十乘驕稚莊子莊子曰河上有家貧恃緯簫而食者其子沒於淵得千金之珠其父謂其子曰取石來煆之夫千金之珠必在九重之淵而驪龍頷下子能得珠者必遭其睡也使驪龍而寤子尚奚微之有哉今宋國之深非直九重之淵也宋王之猛非直驪龍也子能得車者必遭其睡也使宋王而寤子為𩐎粉夫上昔有溫氏媼者端溪人也居常澗中捕魚以資日給忽於水側遇一卵大如斗乃將歸置器中經十日許有一物如守宮長尺餘穿卵而出因任其去留稍長五尺便能入水捕魚日得十餘頭稍長二尺許得魚漸多常遊波中縈回媼側媼後治魚誤斷其尾遂逡巡而去數年乃還媼見其輝色炳耀謂曰龍子今復來也因盤旋遊戲親馴如初秦始皇聞之曰此龍子也朕德之所致遣使者以玄圭之禮聘媼媼戀土不以為樂至始興江去端溪千餘里龍輒引船還不踰夕至本所如此數四使者懼而止卒不能召媼媼殞瘞於江陰龍子常為大波至墓側榮浪轉沙以成墳人謂之掘尾龍今人為船為龍掘尾即此也南越志九色王母乘紫雲之輦又駕九色之班龍漢武內傳角長三丈建武中曹鳳字仲理為北地太守政化尤異黃龍應於九里谷高岡亭角長三丈大十圍稍至十餘丈天子嘉之賜帛加秩水經注湘水去泉陵城七里水上聚石曰燕室丘臨水有俠山其下巖淦水深不測建初三年二黃龍見長出十六丈身大於馬舉頭顧望狀如圖中畫龍燕室丘民皆觀見之去龍可數十步又見狀如駒馬小大凡六出水遨戲陵上蓋二龍之子也并二龍為八出移一時乃入論衡當陽南有龍川鳳川云漢武時八龍五鳳常見於此亦呼為五鳳塠述異記元和元年大雨有一青龍墮於宮中帝命烹之賜群臣龍羹各一杯故李尤七命曰味兼龍羹上費長房辭壺公歸翁與一竹杖曰騎此任所之則自至矣既至可以杖投葛陂中長房乘杖須臾來歸即以杖投陂顧視則龍也後書吳赤烏中曹不興之青溪見赤龍出水上寫獻孫皓送祕府至宋時陸探微見畫嘆其妙因至青溪復見其龍時纍月亢旱祈禱無應乃取不興龍置水上應時畜水成霧纍日滂沛浙江志湯陰西有真人社舊傳孫登寓此值旱衆禱於龍得雨將祭謝之登曰此病龍雨安能蘇禾衆弗信請嗅之水果腥穢龍時背生疽聞登言化老翁求治曰病痊當有報不數日果大雨大石上忽裂一井其水湛然蓋龍穿此以報也山川紀異陸機嘗餉華鮓于時賓客滿坐華發器便曰此龍肉也衆未之信華曰試以苦酒濯之有異既而五色光起機還問鮓主果云園中茅積下得一白魚質狀殊常以作鮓過美故以相獻世說癡龍洛下有洞穴有婦人推夫墜穴中匍匐行數十里穴有微明覺所踐如塵而聞粳米香啖之芬美即褁以為糧復遇如泥者味似向塵又齎以去所歷幽遠漸明曠有宮殿長人前進凡遇如此者九處最後所至苦飢長人指中庭大柏樹下有一羊令跪將羊鬚初得一珠長人取之次埒亦取後埒令啖食即得療飢請問九處之名答曰還問張華當悉此人復隨穴而行遂得出交郡往還六七年間即歸洛問華以得二物示之華云如塵者是黃河龍涎泥是崑崙下泥九處名地仙九館羊為癡龍其初一珠食之與天地同壽次者延年後者療飢而已幽明録平陽府平山麓有金龍池晉永嘉中有韓媼者出野見巨卵持歸育之得一兒名橛兒生四歲劉淵築城不就募能城者橛兒應募因變為蛇令媼遺灰識其後其後憑灰築城立就淵怪之遂潛入山穴露尾數寸使者斬之忽湧泉出穴匯為此也山川紀異陶侃常捕魚得一織梭挂於壁有頃雷雨梭變成赤龍從屋騰躍而去異苑呂光伐龜茲軍其城南營外夜有一黑物大如斷堤搖動有頭角目光若電及明而雲霧四周遂不復見旦視其處南北五里東西三十餘步鱗甲隱地之所昭然猶在光笑曰黑龍也俄而雲起西北暴雨滅其跡杜進言於光曰龍者神獸人君利見之象易曰見龍在田德施普也斯誠明將軍道合靈和德符幽顯願將軍勉之以成大慶光有喜色晉載記龍角永明五年獻龍角一枚長九尺三寸色紅有文南史化毒龍梁武帝郗皇后酷妬忌及終化為龍入於後宮通夢於帝或見形光彩照灼帝體將不安龍輒激水騰涌於露井上為殿衣服委積常置銀鹿盧金瓶灌百味以祀之南史郗皇后性妬忌武帝初立未及冊命因忿怒忽投殿庭井中下衆趨井救之后已化為毒龍烟熖冲天人莫敢近帝悲嘆久之因冊為龍天王便於井上立祠兩京記魏崔挺字雙根為光州刺史州舊掖城西北數里有斧山峰嶺高峻北臨滄海南望岱嶽挺於頂上欲營觀宇故老曰此嶺上秋夏之際常有暴雨相傳云是龍道恐此觀不可久立挺曰人龍相去何遠之有蚪龍倏忽豈一路乎遂營之數年間果無風雨之異挺既代即為風雨所毀遂莫能立衆以為善化所感北史齊天統三年行臺右丞盧潛屯兵於皖于時龍鳴城內潛以不祥移軍在外乃號為龍鳴城寰宇記梁元帝承聖二年江陵城壕中有龍騰出煥爛五色竦躍入雲六七小龍相隨飛去群魚騰躍墜死於陸道龍處為窟若數百斛圌南史地龍初承聖二年三月有兩龍自城西江中騰躍升天五色分明遙映江水百姓咸仰面目之父老或聚而悲竊相謂曰地龍已去國其亡乎上王僧辨傳故老竊相泣曰昔年龍出建康淮而天下大亂今復有焉禍至無日矣帝聞而惡之踰年而遘禍紀陸法和拒任約至安南入赤亭湖法和乘輕舟不介胄泝流而下去約軍一里乃還謂將士曰彼龍睡不動吾軍之龍其能踊躍若待明日攻之當不損客而自破賊三國典略助戰隋師濟江荊州呂肅敗後遁保延洲別帥廖世龍領大舫詐降欲燒隋艦更決死一戰於是有五黃龍備色象各長十餘丈驤首連接順流而東風浪大起雲霧晦冥陳人震駭不覺火自焚隋軍乘高艦張大弩以之陳軍大敗風浪應時頓思故隋文下詔以告郊廟陳書貞觀中汾州言青龍白龍見白龍吐物在空中有光如火至地陷入二尺掘之則玄金也形圓斜廣尺餘高六七寸舊唐龍齒晉吳蒼鷹捨宅為寺自至楊郡廣經像正濟大江船遂傾側忽有雙骨各長一丈隨波騰漾奄入舟中即得安流開岸以事奏聞有司觀檢乃龍齒也續高僧僧明傳龍毛益州雒縣寺道卓造木浮圖塔為龍所護居在西南角井時有相現側有三池三龍居之貞觀中三龍大斗雷霆震擊水火交飛久之乃淨塔如本人皆拾得龍毛長三尺許黃赤可愛法苑周時潼州靈果寺僧策者承崖滅度設齊市中至于食前忽見黑雲從東來翳日廕會仍雨龍毛五色分明長者五短猶五寸上僧崖下海上人言龍每生二卵一為吉吊多出水與鹿台或於水邊遺瀝值流槎則黏著木枝如蒲捶狀其色微青黃或似灰色號紫梢花犬益陽事可以入藥北夢龍血陰平縣有龍血山亦曰龍象巖絶壁高巖萬有餘丈有四石龍在石壁間昔有群龍共斗四龍疲衄嘔血死因化為石血變成黳堪充器物但不耐風日元和志石晉時鎮州接邢臺界嘗斗殺一龍鄉豪有曹寬者見之取其雙角角前有一物如藍色文如亂錦人莫之識曹寬經年為寇所殺鎮帥人亦被誅北夢龍堂開元中齊浣以徐城險急奏開何真源縣丞崔延禕開數千步得龍堂初開謂是古墓然狀如新築淨潔周視北壁下有五色蟄龍長丈餘頭邊鯉魚五六枚靈龜兩頭毛九寸廣異記俱名國有商人驅八牛牧於澤中時有離車捕得一龍云將食之商人以八牛易致取放別池中龍忽人語邀入宮中有龍女與八餅金云此是龍金截已更生足汝父母眷屬終身用之不盡法苑貞觀十八年汶水縣天雷震雲中落一石下大如碓觜脊高腹平縣丞張孝靜奏聞時有西域磨伽陀菩提寺長年師到西京頗推博識敕問之云是龍食二龍相爭故落下耳上蜀縣令劉靜妻患病正諫大夫明崇儼論之曰須得生龍肝食之必愈靜以為不可得儼乃書符乘風放之上天須臾有龍下入瓮水中剔取肝食之而差僉載春秋時周侯治滑久病目醫者曰得龍肝治之乃平復捨此不可治周侯詢左右叱曰龍蟠韋城池中歲旱禱皆有應屠而取其肝可矣侯令取之是日驚雷怒風作化龍由南而去衝其城缺迄今城缺補之復壞如故圖經九子張路斯頴上人隋初明經登第景龍中為宣城令夫人關州石氏生九子自宣城罷歸常釣於焦氏臺之陰一日顧見釣處有宮室樓殿遂入居之自是夜出旦歸歸輒體寒而濕夫人驚問之公曰我龍也蓼人鄭佯遠者亦龍也騎白牛據吾池自謂鄭公池吾屢與戰未勝明日取使可使九子助我領有絳綃者我也青綃者鄭也明日九子以弓矢射青綃者中之怒而去公亦逐之所過為溪谷達于淮而青綃者投於合淝之西山以死為龍冗山九子皆化為龍公之兄為馬步使者子孫散居頴山其墓皆存焉趙耕龍公碑開元中業天師講經於明州奉化縣忽一老父自云守藏龍守此千歲方免炎沙之罰今為胡僧呪水欲取統天鎮海之寶天師以符救之波停風息老父泣謝仙師命致清泉遂成石渠經冬不竭至今謂之天師渠玄怪録仙傳拾遺龍舌氏北庭西北沙州有黑河中巨龍為患民甚苦之凡吏茲土者皆先備牲醴往祀河滸然後敢視政開元中南陽張嵩為都護即命致祭密令左右潔弓矢侍其側俄有巨龍長百尺自波中躍出委首於席伸其舌且長數尺將食未及為矢所斃於時中右脅遽伏於地聲若山摧龍既死觀者如市嵩命封其腹具表以獻上壯之果斷詔函其舌函以賜嵩且降優詔勞之因錫號為龍舌張氏宣室志太尉房琯嘗修學終南山谷中間忽聞聲若戛銅器之韻蓋未之前聞也問父老云此龍吟也不久雨至矣琯望之冉冉雲氣瀰漫果驟雨作自爾再聞徵驗不差後將赤金鉢戛之為僞龍吟靈怪集興慶小龍天寶中興慶池小龍嘗出游宮垣南溝水中蜿蜒奇狀靡不瞻睹及鑾輿西幸龍一夕乘雲雨自池中望西南而去上至嘉陵江將乘舟有龍翼舟而進上泫然流涕顧謂左右曰此吾池中龍也命以酒沃酹之於是龍振甲而去柳氏舊聞唐陽城出守道州至襄陽有五老人來迓自云舂陵人城與之縑帛問其所居曰城西北五里至則訪焉惟有五龍井縑帛尚存因為立廟時貞元十九年也晏殊類要茅山龍池中其龍如蜥蝪而五色自昔嚴奉貞觀中敕取龍子以觀御製歌送歸黃冠之徒競詫其神李德裕恐其惑世嘗捕而脯之龍亦竟不能神也戎幕閒談牛僧孺鎮襄州日以久旱祈禱無應有處士自云豢龍者公請致雨處士曰江漢間無龍獨有一湫泊中之黑龍也彊驅逐之慮為災難制公固命之果有大雨漢水泛漲漂溺萬戶處士懼罪潛去玉泉子懶龍什僧伽間而宴息見神告曰天方亢陽百姓苗死身胡藏其懶龍耶伽曰為之奈何神曰若今夕但小指出窗隙外其如人何伽依之其夜霆擊異常質明視指微有紅線脈焉高僧傳南山宣律師乘龍入中指節事同咸通末舒州刺史孔威進龍骨一具因有表録其事狀云州之桐城縣善政鄉百姓胡舉有青龍鬭死於庭中時四月尚有繭箔在庭忽雲雷暴起聞雲中擊觸聲血如釃雨灑繭箔上血不汙箔漸旋結聚可拾置掌上須臾令人冷痛入骨初龍拖尾及地繞一泔桶即騰身入雲及雨悉是泔也龍既死剖之喉中有大瘡凡長十餘尺身尾相半尾本褊薄鱗鬣皆魚唯有鬚長二丈其足有赤膜翳之雙角各長二丈其腹相自齟齬時遣大雲倉使督而送州以肉重不能全舉乃剸之為數十假載之赴官唐年補録海州南有溝水上通淮楚公私漕運之路也唐寶應中堰破水涸漁商絶行州差東海令李知遠主役修復堰將成輒壞如此者數四用費頗多知遠甚以為憂或說梁武築浮山堰頻有缺壞乃以鐵數萬斤填積其下堰乃成知遠聞之即依其言而塞穴初堰之將壞也輒聞其下殷如雷聲至是其聲移於上流數里蓋金鐵味辛辛能害目蛟龍護其目避之而去故堰可成大曆中刑部郎中程皓家在相州宅前有小池有人造劍於池內淬之蛇魚皆死演家井中有魚數十頭因有急家人以藥杵投之於井信宿魚皆浮出知魚亦畏鐵焉封氏見聞大江之南蘆荻之間往往燒起睡龍朱梁末辰州民向氏因燒起一龍四面風雷急雨不能撲滅尋為煨燼而角不化瑩白如玉向氏寶而藏之湖南行軍高郁酹其價而強取於時術士曰高司馬其禍乎安用不祥之物以速之俄而被誅北夢瑣言降龍師莊宗時五臺山僧誠惠自號降龍師帝雅重之每屈膝施敬諸王嬪御皆為之拜誠惠悉倨坐而受之初自臺山謁帝鎮州王鎔不為之禮誠惠恚怒曰吾有毒龍五百命一龍揭片石州其再為沼乎踰年而滹川大溢敗鎮之郛或聞其言益以為神繇是帝敬之愈篤後漢鎮州大水壞其南城誠惠曰彼無信心吾使一小龍警之自言飛役使毒龍故也同光初到闕權貴皆拜之唯郭崇韜知其為人終不設拜京師旱迎至洛下祈雨數旬無徵應或以焚燎為聞懼而潛去至寺慚恚而終建塔號法雨大師何其謬也北夢瑣言五臺山北臺下有青龍池約二畝已來佛經云禁五百毒龍之所每至盛午昏霧暫開比丘及淨行居士方可一觀比丘尼及女子近即電雷風雨當時大作如近池必為毒氣所吸逡巡而沒傳載同光中滄州民子路逢白蛇以繩繫之擺其頭落須臾雷電撮此子上空中為雷火燒死墜地而背有朱書曰此人殺安天龍今為天符所誅北夢吳越錢鏐少在軍中未嘗寢末年少倦乃刻木為枕以自警或命諸孫諷詩以達旦晉天福中契丹使至朝廷以近侍李泳為監伴使虜有判官者幽薊人謂泳曰吳越嘗不睡乎泳詰其故對曰嘗聞五臺山王子大師言浙中不睡龍今已歸矣訪所聞乃長興王辰之後也九國志劉洞微善畫龍一日有夫婦造門觀畫因謂曰龍有雌雄其狀不同雄者角浪凹峭目深鼻豁鬣尖鱗密上壯下殺朱火燁燁雌者角靡浪平目肆鼻直鬣圓鱗薄尾壯於腹劉不能平問之其人曰身乃龍也請公觀之遂化雙龍而去乘異記梁什法聰與晉安王臨白馬泉內有白龜就聰手中取食謂王曰此是雄龍又臨靈泉有五色鯽魚亦就手食聰曰此是雌龍王與群臣重賞而回法苑河津一名龍門巨靈跡猶存水懸下注旁有山水陸不通龜魚之屬莫能上江海大魚集門下數千不得上上者為龍不上者魚故云曝鰓龍門垂耳轅下三秦記龍門之下每歲季春有黃鯉二魚自海及諸川爭來赴之一歲中登龍門者不過七十一初登龍門即有風雨隨之天人自後燒其尾乃化為龍矣林登博物志鱣鮪出鞏穴三月則上渡龍門得渡為龍矣否則點額而還非夫往還之會何能便有茲稱乎水經注交趾封溪縣有隄防龍門水深百尋大魚登此門化成龍不得過曝鰓點額血流此水常如丹池有泰潛江出漚山分九十九流三百里共會一口交州記觀於龍門有一魚奮鱗鼓鬐而登乎龍門而為龍又一術士凌波蹈流而不陷搖鈴行歌飄浪於龍門而終日棲遲而不化彼同功而事異迹一而理二夫何哉無乃魚以實應而人以僞求乎符子舊說春水時至魚發龍門則有化者至今汾晉山穴龍蛻骨角甚衆採以為藥有五色者國史補蜀五城縣其地值天門天門龍升天不達死墜此地故掘取龍骨冬夏無已華陽國志拾遺記曰方丈山東有龍場地方千里龍皮骨如山阜布散百餘頃述異記普寧縣有龍葬洲父老云龍蛻骨於北洲其水今猶多龍骨按山阜岡岫能興雲雨者皆有龍骨或深或淺多在土中齒角脊足宛然皆具大者數十丈或盈十丈小者才一二尺或三四寸體皆具焉嘗因採取見之近蒲州人家拆草屋於棟上得龍骨長一尺許宛然皆具感應經張澤者居鄆州東城於樹枝間得一龍蛻才大如新蟬之殼頭爪角尾皆具中空而堅扣之聞聲如玉不且光瑩多目遇暗則光燭于室遂祕之於家傳為好事又沈么者紹金間為青州從官於庭前葡萄架上得一龍蛻一一皆具而無光春渚紀聞龍之性粗猛而畏蠟愛玉及空青而嗜燒燕肉故食燕肉人不可渡海南部新書玉京子安期生常跨一龍而朝玉京故號之玉京子傳奇古有豢龍氏長安有豢龍戶觀水即知龍色目有無悉知之懿皇朝龍氏上言龍池中走失兩條往關東尋訪數十日東都魏王池中見之取而歸闕經華州時李訥為華州刺史訥父名建杓置與白居易相善訥為人正直聞得龍來大以為虛妄命就公府視之則於一小瓶子中倒于盆內乃二細鰍魚也訥怒目曰何以為驗其人對曰驗非難也請鑿穴尺許注水其間收鰍投水內魚倒水中相趁旋轉尾觸穴四隅隨觸而陷水亦暴漲逡巡穴已闊數尺其人咨訥云恐穴更廣即難制也遂搦入瓶中訥方奇之厚贈錢帛攜歸輦下中朝故事西域方士能神祝者臨淵禹步吹氣龍即出浮其初出乃長十數丈於是士更吹之一吹則龍輒一縮至長數寸方士掇取著壺中或有四五龍以少水養之物塞壺口於是方士聞有旱處便賫龍往賣之一龍值數十斤金舉國會斂以顧之直畢乃發壺出一龍著淵潭之中因復禹步吹之輒一吹一出長數十丈須臾雲雨四集抱朴子住米倉毗呵羅寺有神龍住米倉奴取米龍輒却後奴若長取米龍不與倉中米若盡奴向龍拜倉即盈溢外國事龍火龍火得水而熾人火得水而滅內典波知國有三池傳云大池有龍王次者龍婦小者龍子行人設祭乃得過不祭多遇風雪後魏書朝鮮扶余縣扶蘇山下有一怪石跨於江渚石上有龍攫之跡諺傳唐高時蘇定方伐百濟臨江欲渡忽風雨大作以白馬為餌釣得一龍須臾開濟遂渡師伐之故江曰白馬巖曰釣龍臺朝鮮志西方烏場國西有池龍王居之池邊有一寺五十餘僧龍王每作神變國王祈請以金玉珍寶投之池中在後涌出令僧取之此寺衣食待龍而濟世人名曰龍王寺伽藍記驪龍之目見百里纖芥龍能變水人能變火龍不見石人不見風魚不見水鬼不見地羊不見雨狗不見雪陰陽自然變化論潛靈俟慶雲以騰踈棲禽階徑風以凌虛正郭篇云玄圃之棲禽九淵之潛靈抱朴那伽那伽秦云龍那伽常在定無有不定時翻譯宮毗羅成都濯龍池隋蜀王秀取土築廣子城因為池有胡僧見之曰摩訶宮毗羅蓋胡僧謂摩訶為大宮毗羅為龍謂此池廣大有龍也郡志翻譯云宮毗羅蛟也五花樹龍池之山四方高中有池方七百里群龍居之多五花樹群龍食之去會稽四萬五千里括地圖唐乾符中有僧日以課誦為事因下峽泊舟白帝城夜深持念之際忽覺有腥穢之氣見水面有一人漸逼船來僧問之曰某非人也姓許名道坤唐初為夔牧以貪殘暴虐歿受業報為灧澦堆龍王三千年於今二千四十年矣適聞師持課故來遜謝耳僧曰峽路險惡多覆溺之患盍敕諸龍而禁戢之可乎曰此類實繁皆業報所作非常力所能制也僧將復問忽失所在報應録龍屬蛟龍屬也無角曰蛟池魚滿三千六百蛟來為之長能率魚而飛置笱水中即蛟去說文蛟似蛇四腳細頸頸有白嬰大者數圍卵生如子一二斛瓮能吞人郭璞虺五百年化為蛟蛟千年化為龍龍五百年而為角龍又五百年為應龍蟒蛇目圓蛟眉連生述異記夏桀之末宮中有女子化為龍不可近俄而復為婦人甚麗而食人桀命為蛟妾告桀吉凶之事述異記擊蛟淡臺子羽賫千金之璧渡河河伯欲之陽侯波起兩蛟夾船子羽左操璧右操劍擊蛟皆死既濟三投璧於河河伯三躍而歸之子羽毀璧而去博物志荊有佽飛者得寶劍於干遂還涉江至於中流陽候之波兩蛟夾繞其船佽飛勃然曰此江中之腐肉朽骨棄劍而已余奚愛焉拔劍赴江刺蛟殺之荊王聞之仕以執圭呂覽東海有勇士曰菑丘欣以勇猛聞於天下遇神淵曰飲馬其僕曰飲馬於此者馬必死曰以欣之言飲之其馬果沉菑丘欣去朝服拔劍而入三日三夜殺三蛟一龍而出雷神隨而擊之十日十夜眇其左目韓外傳射蛟漢武帝元封五年自潯陽浮江親射蛟江中獲之瓠子決有蛟龍從九子自決中逆上入河瀆沫流波凡數十里西京雜記漢昭帝常遊渭水使群臣漁釣為樂時有大夫任緒釣得白蛟長三丈若大蛇無鱗甲頭有一角長二尺牙出脣外帝曰此魚䱉之類非珍祥也乃命太官為鮓骨青肉紫味甚美帝後思之使罾者復覓終不得也拾遺曹公幼而智勇年十歲常浴於譙水有蛟來逼自水奮擊蛟乃潛退於是畢浴而還弗之言也後有人見大蛇奔逐操笑之曰吾為蛟所擊而未懼斯畏蛇而恐耶衆問乃知咸驚異焉新吳大帝赤鳥三年七月有王述者採藥於天台山時熱息橋下忽見溪中有一小青童長尺餘執一青蒲而乘赤鯉魚徑入雲中漸漸不見述良久登峻崖四望見海上風寒起頃刻雷電交鳴俄然將至述懼伏於虛樹中天霽又見所乘之赤鯉小童還入溪中乃黑蛟耳張三吳記潯陽城東門通大橋常有蛟為百姓害董奉疏符沉水中少見一蛟死浮出潯陽記義興郡溪渚長橋下有蒼蛟吞噉人周處執劍橋側伺久之遇出於是懸自橋上投下蛟背而刺蛟數創流血荊溪自郡渚至太湖乃死志怪斬蛟渚晉鄧遐字應遠勇力絶人氣蓋當時時人方之樊噲治郡號為名將為襄陽太守城北污水中有蛟常為人害遐遂拔劍入水蛟繞其足遐揮劍截蛟流血江水為之俱赤因名曰斬蛟渚亦謂之斬蛟津襄陽耆舊傳許真君名遜字敬之本汝南人後於豫章遇一少年容儀修整自稱慎郎許君與之語知非人類指顧之間少年真君謂門人曰適來少年乃是蛟蜃之精吾念江西纍為洪水所害若非剪戮恐致逃遁蜃精知真君識之潛於龍沙洲化為黃牛真君遙觀謂弟子施大玉曰彼之精怪化作黃牛我今化其身為黑牛乃以手巾挂膞將以認之汝見牛奔鬭當以劍截彼真君乃化身而去俄頃見黑牛奔趁黃牛而來大玉以劍揮牛中其左股因投入城西井中從此井徑歸潭州却化為人先是蜃精化為美少年以珍實財貨數萬獲娶潭州刺史賈玉女至是真君求見賈使君謂曰聞君有貴壻略請見之賈公乃命慎郎出慎郎怖畏託疾潛藏真君勵聲而言曰此是江湖害物蛟蜃老魅焉敢遁形於是蜃精復變本形宛轉堂下尋為吏兵所殺真君又令其二子出以水噀之即化為小蜃真君謂賈玉曰汝家骨肉幾為魚鱉也今須速移不得暫停賈玉倉黃徙居俄頃之間官舍崩沒白浪騰涌即今舊跡宛然在焉十二真君傳蛟湖徽歙黃墩湖一名蛟湖其湖有蜃常與呂湖蜃鬭程靈銑好勇而善射夢蜃化人告之曰吾為呂湖蜃厄君共助吾必厚報束帛練者我也明日靈銑彎弓射之正中後蜃後有一道教靈銑求善墓地靈銑隨陳武帝有功為佐命功臣趙昱嘗隱青城山隋煬帝起為嘉縣太守時犍為潭中有老蛟為害昱率甲士千人夾江鼓噪昱持刀入水有頃江水盡赤昱左手持蛟首右手持刀奮波而出隋大亂隱去不知死終後嘉陵水漲蜀人見昱青霧中騎白馬從數獵者於波面過宋太宗封神勇大將軍廟食灌江口方輿勝覽唐蘇頲始為烏程尉暇日曾與同僚泛舟㳂溪醉後諷詠因至道磯寺寺前是霅溪最深處俗相傳云此水深不可測中有蛟螭代為人患頲乘醉步行還自駱駝橋過橋破墮水直至潭底水中有人令扶尚書出遂冉冉至水上頲遂得濟廣異記唐陸禋續水經云蛇雉遺卵於地千年而為蛟龍屬漢武親射蛟於潯陽江中乃其蛇出殼之日害於一方洪水飄蕩吳人謂之發洪余于杭州新城縣之伊山忽見茂草中一雌雄飛起丈餘翅羽零亂又復入草數四不不絶久而不出因剃草注視則一巨蛇一雌雉蟠結纏糾津沫狼藉斯須雉驚而飛蛇亦入草始驗禋之說玉世清話王蜀先主時修榖閣道鳳州衙將白某掌其事焉至武休潭見一婦人浮水而來意其溺者命役夫鉤致岸濱忽化為大蛇沒入潭中白以為不祥因而致疾愚為誦岑參賦云瞿唐之東下有千歲老蛟化為婦人彩服靚粧浮於水濱白公聞之方悟蛟也厥疾尋瘳又內官宋愈昭自言於柳州江岸為二三女人所招里民呼而止之亦蛟也北夢瑣言河間滹池河水常有蛟入五月恆暴遂變為人于岸上與人并行至懸岸處推與俱下輿地志蕪湖有蟂磯蟂毛蛟也蟂似蛇四足能害人賈生所謂偏蟂獺以隱處者也方土螻若龍無角而黃北方謂之土螻說文季孫氏劫公家孔子欲論術則見外於是受養而便說魯國以訾孔子孔子曰龍食乎清而游乎清螭食乎清而游乎濁魚食乎濁而遊乎濁今丘上不及龍下不若魚丘其螭耶夫欲立功者豈得中繩哉救溺者濡追逃者趨呂覽赤螭今夫赤螭青虬之游冀州也天清地定噆味含甘步不出頃畝之區而蛇鱓輕之以為不能與之爭於江海之中若乃至於玄雲之素朝陰陽交爭降扶風雜凍雨扶搖而登之威動天地聲振海內蛇鱓著泥百仞之中淮覽冥揚雄客難云夫翠蚪絳螭之將登乎天必聳身於蒼梧之淵不階浮雲翼疾風虛舉而上升則不能撠膠葛騰九閎漢書崑崙山第三層有螭潭百里多龍螭皆白色千歲一蛻其五臟此潭左側有五色石云是白螭之腸化為石拾遺記白螭駕青虬兮驂白螭吾與重華遊兮瑤之圃楚辭涉江蒼螭乘玉輿兮駟蒼螭高唐賦配龍張奐疏云蛇能屈伸配龍騰蟄後漢蟒王蛇注蟒蛇最大者故曰王蛇郭贊曰惟蛇之君是謂巨蟒小則數尋大或百丈爾雅游霧螣螣蛇龍類也能興雲霧而游其中爾雅螣蛇游霧而動應龍乘雲而舉淮主術訓螣蛇游霧而擊蝍蛆說林兔不牝牡螣蛇不交不可謂貞抱朴巴蛇羿屠巴蛇於洞庭其骨若陵故曰巴陵潯江記斬修蛇於洞庭淮巴蛇吞象三歲而出其骨君子服之無心腹之疾山經屠巴蛇出象骼吳都賦善用兵者譬如率然率然者常山之蛇也擊其首則尾至擊其尾則首至擊其中身則首尾俱至孫子西方山中有蛇頭尾差大有色五彩人物觸之者中頭則尾至中尾則頭至中腰則頭尾並至名曰率然會稽常山最多此蛇故孫子兵法曰將之三軍勢如率然也神異經昔圓丘多大蛇又生好藥黃帝將登焉廣成子教佩雄黃而蛇皆去今帶武都雄黃色如雞冠者五兩以入山林則不畏蛇蛇若中人以少許雄黃末傳之瘡中立愈抱朴子晉獻公太子申生至靈臺蛇繞左輪御曰太子下拜吾聞國君之子蛇繞左輪者速得國太子遂不行反乎舍御人見太子太子曰今吾得國是君失安也見國之利而忘君安非子道也聞得國而拜其聲非君欲也投劍將死御止之曰夫禨祥妖孽天之道也嚴恭承命人之行也拜祥戒孽禮也嚴恭承命不以身恨君孝也今太子見福不拜失禮殺身恨君失孝太子不行伏劍而死新序晉文公出畋前驅還白前有大蛇其高若隄橫道而處文公曰還車而歸其御曰臣聞祥則迎之見妖則凌之今前有妖請以從吾者攻之公曰不可吾聞天子夢惡則修道諸侯夢惡則修政大夫夢惡則修宮庶人夢惡則修身若是則禍不至今我有失行而天詔以妖戒我若攻之是逆天命也乃歸齊宿而請於廟曰寡人有過天降之罰宜在寡人之身不敢不改謹具牲告乃退而修政居三日而夢天誅大蛇曰爾何敢當明君之路文公覺使人視之蛇已臭爛矣文公大說賈子孫叔敖之為嬰兒也出遊而還憂而不食母問其故泣而對曰今日吾見兩頭蛇恐去死無日矣今蛇安在曰吾聞見兩頭蛇者死吾恐他人又見之吾已殺而埋之也其母曰無憂汝不死矣吾聞之有陰德者天報以福人聞之皆諭其能仁也及為令尹未治而國人信之上顏淵子路共坐於夫子之門有鬼魅求見孔子其目若日其形甚偉子路失魄口禁不能言顏淵乃仗劍前斫其腰於是形化成蛇即斬之孔子出觀嘆曰勇者不懼智者不惑仁者有勇勇者不必有仁殷藝小說魯定公元年有九蛇繞柱占以為九世廟不祀乃立煬宮搜神記秦惠王欲伐蜀蜀王好色乃獻美女五人蜀王遣五丁迎女還至梓潼見一大蛇入山穴中一人引其尾不能出五丁共引蛇山崩壓五丁五丁踏蛇而大呼蜀王本紀綿竹縣有玉妃溪初玉女與五丁力士同生其母初生一包父以為怪棄之溪中後聞哇哇聲往視之乃一女五男即歸養之既長女為蜀侯妃男為五丁鑿路通金牛入也鴟夷子皮事田成子成子去齊亡之燕鴟夷子皮負傳而從至望邑曰子不聞涸澤之蛇乎涸澤蛇將徙有小蛇謂大蛇曰大蛇行而小蛇從之人以為蛇之行者耳必有殺子子不如相銜負我以行人必以我為神君也乃相負越公道而行人皆避之今子美而我惡以子為我上客千乘之君也以子為我使者萬乘之卿也子不如為我舍人田成子負傳而隨之至逆旅逆旅之君遂待之甚厚因獻酒肉韓子昭陽為楚伐魏覆軍殺將移師攻齊陳軫為齊王使見昭陽曰楚有祠者賜其舍人酒一巵舍人相謂曰數人飲之不足一人飲之有餘請各畫地為蛇蛇先成者飲酒一人先成引酒且飲之乃左手持巵右手畫蛇曰吾能為之足為足未成一人之蛇後成奪其巵曰蛇故無足子安能為之足遂飲其酒為蛇足者終亡其酒今公攻魏破軍殺將又將移師攻齊齊畏公甚戰勝不知止猶為蛇足也昭陽解軍而歸國策東越閩中邵武有庸嶺一名烏頭嶺北隰中有大蛇長七八丈大十餘圍為患都尉長吏多致死者下夢巫覡欲得啖童女其都尉令長遂估債人家婢子養之八月祭蛇送穴蛇輒吞之已用九女矣時將樂縣李誕有六女無男小女名奇應募而行乃請買好劍及咋蛇犬仍將數斛次食用蜜灌之以致穴口蛇既出頭大如囷目如二尺鏡先啖餈灌奇便於犬咋蛇又從後以劍斫之蛇踊出至庭而死得九女髑髏越王奇之聘以為后搜神記坤元録隋縣溠水側有斷蛇丘昔隋侯出而見大蛇中斷疑其靈使人以藥封之蛇乃能去因號其處為斷蛇丘歲餘蛇銜珠以報其珠徑寸純白夜有光明如月之照謂之隋侯珠亦曰靈蛇珠丘南有隋季良大夫池說苑搜神記水經注楚大夫靳尚以讒殺屈原為天所遣作一大蟒穴在山後人為之立廟攝記小黃縣者宋地黃鄉也沛公起兵野戰喪皇妣于黃鄉天下平定乃使使者以梓官招魂幽野於是丹蛇在水自濯洗之入於梓宮其浴處有遺髮故諡曰昭靈夫人陳留風俗傳漢武帝時張寬為揚州刺史先是有老翁二人爭山地諸州訟疆界連年不決寬臨復來寬視二翁形狀非人令卒持戟將入問汝何等精翁欲走寬呵格之化為兩蛇出搜神記邛都縣下有一老姥家貧孤獨每食輒有小蛇頭上戴角在床間姥憐而飴之後稍長大遂至丈餘令有駿馬蛇遂吸殺之令因大忿恨責姥出蛇姥云在床下令即掘地愈深愈大而無所見令又遷怒殺姥蛇乃感人以靈言瞋令何殺我吾母當為母報讎此後每夜輒聞若雷若風四十許日百姓相見咸驚語汝頭那忽戴魚是夜方四十里與城一時俱陷為湖主人謂之為陷湖唯姥宅無恙迄今猶存漁人採捕必依止宿每有風浪輒居宅側恬靜無他風靜水清猶見城郭樓櫓畟然今水淺時彼土人沒水取得舊木堅真光黑如漆今好事人以為枕相贈李膺益州記武強縣故治有武強淵耆宿云邑人有行於途者見一小蛇疑其有靈持而養之名曰擔生長而吞噬人里中患之遂捕繫獄擔生負而奔邑淪為湖縣長及吏咸為魚矣今縣治東北半許落水淵水又東南結而為湖又謂之郎君淵邑之耆宿又言縣淪之日其子東奔又陷于此故淵得郎君之目矣酈道元水經注大如船馬援征五溪蠻進營壺頭中暑病乃穿岸為室以避炎氣令武陵語曰壺頭山邊有石窟即馬援所穿之室也室內有蛇如百斛船大云是援之遺靈也武陵記車騎將軍巴郡馮緄字鴻卿為議郎發綬笥有二赤蛇可二尺分南北走大用憂怖許寧方卜云此吉祥也君後三歲當為邊將以東為名後五年為大將軍拜遼東太守春秋外蛇與內蛇鬪文帝時亦復有此傳志著其云為而鴻卿獨以終吉豈所謂或得神以昌乎風俗通竇武母産武並産一蛇送之林中後母卒及葬未窆有大蛇自榛草而出徑至喪所以頭擊柩涕血皆流俯仰蛣屈若哀泣之容有頃而去時人知為竇氏之祥後漢李膺益州記云晉原鳴鶴山張陵登仙之所傳云常有麒麟白鶴遊翔其上有銘記張陵為蝮蛇所吸門徒以為登仙矣寰宇記桓帝即位有大蛇見陽德殿上雒陽市令淳于翼曰蛇有鱗甲兵之象也見於省中明有椒房大臣受兵甲之誅也乃棄官遁去至延熹二年誅大將軍梁冀捕治家屬揚兵京師也干寶搜神記天門山山多峻秀巖谷逶邐有大巖壁直上數千仞草木交連雲霧擁蔽其下有徑途微細行人往忽然上飛而出林表若升仙遂絶世如此者漸不可勝紀往來南北號為仙谷時有樂於道者不遠千里而來洗浴巖畔以求升仙此林下無不飛去會一夕有智能者謂他人曰此必妖怪非是仙道因以石自繫而牽一丈入其谷大復飛去然知是妖邪之氣以吸之乃遣近山鄉里募年少者數百人執兵器持大棒而先縱火燒其草及伐竹木至山畔觀之遙見一物長數十丈高下隱隱垂頭下望及更漸逼乃一大蟒蛇於是命少年鼓躍擊射然後斫刺而口張尺餘尚欲害人力不加衆久乃卒其所吞入骨與他獸之骸俱在左右如阜焉博物志晉興郡路側五六里有一物大百圍長數十丈行者過視則往而不反積年如此失人甚多董奉從交州出由此嶠見之大驚云此蛇也在行旅施符敕經宿往看蛇已死矣左右曰白骨積聚成山廣州記趙王倫篡位殿上有大蟒及小蟒耳間垂肉似重孝幘小蟒亦然晉書顏含㛐病須髯蛇膽不能得含憂歎纍日有一童子持青囊授含含視乃蛇膽也童子化為青鳥飛去中興書交址山多大蛇名曰髯蛇長十丈圍七八尺常在樹上伺鹿獸鹿獸過便低頭繞之有頃鹿死先濡令濕訖便吞頭角骨皆鑽皮出山夷始見蛇不動時便以大竹籤籤蛇頭至尾殺而食之以為珍異故楊氏南裔異物志曰髯惟大蛇既洪且長采色駮犖其文錦章食灰吞鹿腴成養瘡實享嘉宴是豆是觴言其養創之時肪腴甚肥搏之以婦人衣投之則蟠而不起走便可得也水經泉建州進蚺蛇膽五月五日取時膽兩柱相去五六尺擊蛇頭尾以杖於腹下來去扣之膽即聚以刀刲取藥封放之不死復更取看肋下有痕即放僉載蚺蛇膽上旬近頭中旬在心下旬近尾酉陽膽狀若鴨子大切取之復內肝腹中以線縫合創口蛇亦復活舁歸放於川澤其膽暴乾以充土貢或云蛇被取膽它日見捕者則遠遠側身露腹瘡明已無膽以此自脫嶺表録異蚺蛇牙長六七寸土人尤重之云辟不祥利遠行賣一枚直牛數頭括地志蛇肉食之辟蠱毒證俗音其膏俗傳不利人其皮可鞔鼓今潮州和鱗為之聲絶鳴與象皮鼓相類北戶録其脂著人骨輒軟又能萎陽終身不舉埤雅虞願為晉安太守郡舊出髯蛇膽可為藥有餉願者願不忍殺放三十里外經宿復來故處願使送他處又復歸諸者以為仁心所致也齊書泉州盧元欽患大風唯鼻未倒五月五日取蚺蛇膽欲進或云肉可治風遂一截蛇肉食之三五日頭覺漸可百日平復僉載永嘉末有大蛇長十餘丈斷道經過者輒以氣吸引取之吞噬已百數行旅斷道道士吳猛與弟子數人往欲殺蛇蛇藏深穴不肯出猛符南昌社公蛇乃出穴頭高數丈猛於尾緣背而以足按蛇頭著地弟子於後以斧殺之猛曰此蛇是蜀精蛇死而蜀賊當平既而果杜韜滅也豫章記蜀主李勢宮人張氏有妖容勢寵之一旦化為大班蛇長丈餘送于苑中夜復來寢床下勢懼遂殺之復有鄭美人勢亦寵愛化為雌虎一夕食勢寵姬未幾勢為桓溫所滅獨異志東晉時跋陀羅尊者譯經於廣陵天寧寺之青蓮池忽有兩青蛇從井中出化二童子自旦為尊者灑掃焚香迄暮俟其收經卷而去日復如是譯經既畢青衣亦不知所在寶祐廣陵志妬報郗氏梁武帝后也崩數月帝居寢殿聞外騷窣聲視之乃見一蟒盤躃上殿睒睛呀口向帝帝驚駭蹶起曰宮殿嚴警非爾類所生之處豈妖孽欲祟朕耶蛇人語曰蟒昔郗氏也妾以生存嫉妬損物害人死以是罪謫為蟒耳蟒非常蛇亦以變化不以皇居梁重為阻感帝昔恩故託醜形骸陳露於帝祈一切功德以見拯拔也帝悲切感激既而求蟒遂不復見明日以告志公公對曰非禮佛懺滌悃款不可帝乃撰悔文十卷為其懺禮又一日聞宮內異香馥郁良久轉美不知所來帝因仰視乃見一天人容儀端麗謂帝曰此則蟒後身也蒙帝功德已得生忉利天今呈本身以為明驗也殷勤致謝言訖而去梁武懺序梁武帝與宮人幸玄洲苑見大蛇盤屈於道群小蛇繞之並黑色宮人曰恐是錢龍帝以錢十萬貫鎮於蛇處以厭之南史南陽武當縣有杜柏樹大四十圍梁蕭欣為郡伐之言有大蛇從樹腹中墜下粗數圍長三丈群蛇數十隨之入南山聲如風雨未伐樹前曾見夢於欣欣不以厝意及伐之後欣果死於治所圖經吏少日果死水經東魏孝靜帝武定元年大蛇見武牢城上高仲密以武牢叛後司馬消難之任武牢蛇又見消難亦叛士人謂之雌龍魏書受祭後主末年祕書監傳縡上書諫諍後主賜死獄中死後有惡蛇屈尾來上靈床當前受祭酹去而復來者百有餘日時時有彈指聲俄而陳滅南史有角薛濬幼與宗中諸兒戲於澗濱見黃蛇有角及足召群兒共視了無見者濬以為不祥歸而憂悴母逼而問之濬以實對適有胡僧詣宅乞食濬母怖而告之僧曰此乃兒之吉應早有名位然壽不過六七耳言終而出忽然不見時咸異之既而濬終於四十二六七之言於是驗矣隋書煬帝大業末翟讓初見李密衣在格上密腰帶化為赤蛇讓心異之竟為密所殺上搜神記蛇千年則斷復續淮南子云神蛇自斷其身而自相續煬帝遣人於嶺南邊海窮山求此蛇數四而至洛下所得之者長可三尺而色黃黑其頭錦文全似金色不能毒人解食肉若欲令自斷其身者則先觴之令怒使不任其憤毒則自斷為三四其斷之處如刀截焉見其皮骨文理亦有血焉然久怒定則三四斷稍稍自相就而連續體復如故亦似不相斷隋著作郎鄧隆云此靈蛇一類自斷不必千歲也窮神祕苑太宅屯柏璧常欲覘敵潛軍遠抄騎皆四散太宗與一甲士登丘而睡俄然賊兵四面雲合不之覺也會有蛇逐鼠鼠觸甲士驚起遽白太宗俱上馬馳百餘步為賊所及太宗發大羽箭射之殪其驍將賊騎乃退當時以為神異焉舊唐屢見虞世南貞觀八年進封縣公會大蛇屢見帝憂之以問世南對曰漢靈帝時青蛇見御座晉惠帝時大蛇長三百步見齊蛇經市入廟蛇宜在草野而入市此所以為怪爾今蛇見山澤適其所居恐有冤獄枉繫宜省録纍囚獻珠長安至相寺有賢者自十餘歲便在西禪院修道院中佛堂座下恆有一蛇賢者初修道時蛇大一圍及後四十餘年蛇如堂柱大蛇雖相見而不能相惡開元中賢者夜中至佛堂禮拜堂中無燈而光粲滿堂心甚怪之因於蛇出之處如徑寸珠至市高舉價冀其識者數日有胡人交市定還百萬賢者曰此夜光珠當無價何以如此酹直胡云蚌珠則貴此乃蛇珠多至千貫賢者歎服遂賣焉廣異記天寶中洛陽有巨蛇高丈餘長百尺出芒山下胡僧無畏見之曰此欲決水瀦洛城即以天竺法呪之數日蛇裂龜殺蛇建中二年夏趙州寧晉縣沙河北有棠樹甚茂民祠之為神有蛇數百千自東西來趨北岸者聚棠樹下為二積留南岸者為一積俄有徑寸龜三繞行積蛇盡死而後各登其積野人以告蛇腹皆有瘡若矢所中刺史康日知圖其事奉三龜來獻李舟之弟患風或說蛇酒可療乃求黑蛇生覆瓮中加之麴孽數日蛇聲不絶及熟香氣酷烈引滿而飲須臾悉化為水唯毛髮存之國史補郎中陸紹言嘗記一人浸蛇酒前後殺蛇數十頭一日自臨甕窺酒有物跳出囓其鼻將落視之乃蛇頭骨也因瘡毀其鼻如削焉酉陽韋皋鎮西蜀時有黃甘一樹方熟忽數夕衆實皆落唯樹杪一蒂獨存其大如碗枝葉滋茂異於常者園吏具白韋令韋令親視之曰此奇果也非臣不宜食議欲表進令去蒂尺餘折之其實從蒂自落有善醫者咱殷侍立曰凡木實未過時蒂自脫乃實之病也請針驗之韋令再三方許咱殷引針就蒂刺之其實應手而轉殷則連下一刺血濺盈袖韋令大驚因命破之乃兩頭蛇也北戶録開成初宮中有黃色蛇夜自寶庫中出遊於階庭間光彩照灼不可擒捕宮人擲珊瑚玦擊之遂并玦而亡去掌庫者具以事告上令遍搜庫內乃得黃金蛇而珊瑚玦貫其首上熟視之曰昔隋煬帝為晉王時以黃金蛇贈陳夫人吾不知此蛇得自何處左右因覩頷下有阿𡡉字上蹶然曰果不失朕所疑耳阿𡡉煬帝小字也上之博學敏悟率多此類遂命取玻瓈連環繫於玉彘之前足其後更復見焉以彘能啖蛇也杜陽編假公路至雷州對岸倚舟候風勢見群小兒簇二巨蛇各長丈餘一如孔雀珠色金翠奪目一如真朱紅色鮮明若血又有十餘頭白蛇前後相次若導從俱入一榕藤竅內竟不復出故知蛇有草木水土四種其類不可窮也北戶録光化中楊守亮鎮褒日有一蛇橫斜谷嶺路高七八尺莫知其首尾四面小蛇翼之無數每一拖身即林木摧折殆旬半方過盡阻絶行旅因聚草焚燎路隅慮其遺毒然後方行明年楊伏誅北夢瑣言梁牛存節鎮鄆州於子城西南角大興一第因板築穿地得蛇一穴大小無數存節命殺之載於野外十數車載之方盡時有人云此蛇藪也是歲存節疽背而薨玉堂閒話初有黃蛇見於碑樓王處直以為龍藏而祠之又有野鵲數百巢麥田中處直以為已德所致而定人皆知其不祥曰蛇穴山澤而處人室鵲巢鳥降而田居小人竊位而在上者失其所居之象也已而處直果被廢死五代史景煥為璧州白石令行涉巴嶺達玉女廟有巨虺橫亘其前徑可七尺餘鱗甲不啻門扇許大頭尾垂在山下惟聞折木震嚮山谷從者驚駭莫能前進于是且駐山穴因登高望之竟日方見其尾因知吞舟之魚翳天之鳥信有之也閒人野話宣和間蔡州有一士人家書室中忽然見小蛇文章陸離蜿蜒几格間見人不驚畏不敢傷也每日惟巳時則見至午乃隱去日日如此士人異之因伺其至則捕之置鐵絲籃中逮午視之則堅冷化為石矣其質巧妙天成雖鬼工不能加也明日巳時則復蠕動既又復為石而屈伸蟠結之狀日日不同士人寶蓄持至京師見中人梁師成梁嘆曰此神物造化之所寓也禁中有玉鼠玉兔以其時見則其物也士遂獻之寓簡初吳璘為大制置在蜀以殺金坪叢茂恐寇匿其間將欲焚之而未發露忽一老嫗攜一子直至轅門曰聞制置將焚山此軍令不敢沮語但某母于居此久未能便去願少瘴一日容某遷避庶得全某母子性命吳叱曰是何妖物嫗曰必殺我我能滅爾宗族吳怒叱左右執之忽不見遂四面縱火焚山明日巖下焚死一大蛇長十數丈一小蛇長丈餘縱火時火焰中黑氣一陳從東南方去時制置子挺新婦有娠生子曦正焚山時也曦後為四川制置背叛受金爵命封蜀王興州見兩日相摩夜天赤如血光燭地如晝江湖紀聞安丙子文與楊巨源李好義合謀矯詔誅之詔曰惟干戈省厥躬朕既昧聖賢之戒雖犬馬識其主爾乃甘夷虜之臣邦有常刑罪在不赦乃好義姊夫楊君玉之詞也鶴林玉露兩頭蛇兩頭蛇嶺外多此類時有如小指大者長尺餘腹下鱗紅背錦文一頭有口眼一頭似頭而無口眼云兩頭俱進退亦謬也昔叔孫敖見之不祥乃殺而瘞之恐他人見復受其禍南人見之如常其禍安在嶺表録異兩頭蛇一名越王約髮俗占見之不祥兼名苑兩頭蛇無毒夷人餌之南越志紀僧真遭母喪開冢得五色兩頭蛇南史漢水又東合洛谷谷有二源合同注一壑於神蛇戍西左右山溪多五色蛇性馴良不為物毒水經滇池黃津江有大蛇名曰青葱好食人又有大蛇藏樹上伺鹿過繞之鹿死乃吞之吞了蛇亦繞樹其角骨亦鑽皮而出蛇亦殆死瘡差即更死吞之寰宇記九真長江水有鈎蛇其蛇食人若殺此蛇則當令死如不死則尋追報人終不已也雖復人衆中往取害之者萬不一失又曰鈎蛇數丈尾末有鈎取岸上人及牛馬食之上會川興古郡有大蛇長數丈其尾有兩岐如鈎在水中以尾鉤取岸上人馬食之郡國志肥遺泰華山有蛇名曰肥遺六足四翼見則天下大旱山經鳴蛇鱗山多鳴蛇其狀如蛇四翼音如磬見則大旱上寡人巳日山中稱寡人者社中蛇也抱朴子巳日不宜殺蛇酉陽刺尾倒拖蛇不出以針劄其尾即出瑣碎録辨蛇雄雌以細軟物停蛇著上其躁嬈者當知是雄住不動者當知是雌如雜寶藏經律云白疊試蛇去住不同也內典種黍來蛇種黍來蛇燒羖羊角及頭髮則蛇不敢來僉載蝮蛇蝮蛇秋月毒盛無所齧草木以泄其氣草木即死樵採設為此草木所傷刺者亦殺人博物志劉曜率衆入馮翊愍帝徵兵於南陽王保保左右議曰蝮蛇螫手壯士解其腕且斷其隴道以觀其變從侍中郎裴詵曰蛇已螫頭頭可截不晉李靖傳齊王曰腹蠚手則斬手蠚足則斬足何者為害於身也前田儋傳魚星主理陰陽而知雲雨之期也故讚曰漢中魚星如雲雨也占曰魚星明大河海水皆出又云魚星明大則陰陽和氣魚星忽不明而在則魚多魚星亡則少魚天文録魚有力者鰴魚枕謂之丁魚腸謂之乙魚尾謂之丙爾雅夏鯀治水無功沉於羽淵化為玄魚大千丈後遂死橫於河海之間後世聖人以玄魚為神化之物以玄字合於魚字為鮌字拾遺録武王得兵鈐謀東觀白魚入舟俯取以燎八百諸侯順同謀魚者視用無足翼從欲紂如魚乃誅尚書璇璣鈐武王伐紂度孟津中流白魚躍入王舟長三尺赤文有字告以伐紂之意中候史佚因作魚書體魚之首為乙尾為丙以紀瑞焉史書魯隱公將如棠觀魚者臧僖伯諫曰其物不足以講大事其材不足以備器用則君不舉焉山林川澤之實皂隸之事官司之守非君所及也公曰吾將略地焉遂往陳魚而觀之僖伯稱疾不從左傳宣公夏濫於泗淵里革斷其罟而棄之曰古者大寒降土蟄發水虞於是乎講罛罶取名魚登川禽而嘗之寢廟行諸侯人助宣氣也且夫魚禁鯤鮞蟲舍蚳蝝蕃庶物也古之訓也今魚方別孕不教魚長又行網罟貪無藝也公聞之曰吾過而里革匡我不亦善乎魯語楚子曰古者明王伐不敬取其鯨鯢築我軍封以為大戮左宣十二長鯨吞航修鯢吐浪吳都賦鯨大者長千里小者數千步一生數萬子常以五月六月就岸邊生子至七月八月引其子入海中鼓浪成雷噴沫成雨水族驚畏之一皆逃匿莫敢當者其雌曰鯢大者亦長千里眼睛為明月珠古今注東海有大魚如山長五六里謂之鯨鯢次有如屋者時死岸上膏流九頃其鬚長一丈廣三尺厚六寸瞳子如三升碗木可為方矜魏武四時食制南海有珠即鯨魚目瞳夜水以鑒謂之夜光述異記開元七年大拂涅靺羯獻鯨鯢睛唐書有人往林邑於海嶼上得鯨頭骨如數百斛囷頂上一孔大如甕俗以為珠穴寰宇記楚威王問於宋玉曰先生其有遺行耶何士民衆庶不譽之甚也宋玉對曰夫鳥有鳳而魚有鯨選作鯤楚國先賢傳作龍鳳鳥上擊于九千里絶浮雲負蒼天翱翔乎窈冥之上夫糞田之鴳豈能與之斷天地之高哉鯨魚朝發崑崙之墟暴鬐於碣石暮宿於孟諸夫尺澤之鯢豈能與之量江海之大哉故非獨鳥有鳳而魚有鯨也士亦有之新序春秋後語北海有大鳥其高千里頭文曰天維又曰雞左翼文曰鷖右翼文曰勤左足在海北崖右足在海南崖其毛蒼其喙赤其腳黑名曰天雞一名鷖勒頭河東身止海北唯捕鯨魚死則北海水流不犯觸人不干於物或時舉翼飛其兩羽切如雷風驚動天地神異經海精死彗星出孔演圖注海精鯨魚也專諸學炙魚香聞數十里王僚索魚炙專諸持一利鋼刀藏著魚腹中金樓子置匕首於炙魚之中史記闔閶十年東夷侵吳王親征之夷遁入海據東洲沙上吳亦入海逐之據沙洲上相守月餘屬時風濤浪不得度王焚香禱之言訖東風大震水上見金色逼海而來繞吳王沙洲百匝所司撈漉得魚食之美三軍踊躍夷人一魚不獲遂送降款吳王亦以禮報之仍將魚腹腸肚以鹹水淹之送與夷人因號逐夷吳王歸會群臣思海中所食魚問所餘所司云並曝乾吳王索之其味美因書美下著魚是為鮝字今從䱃非也魚出海中作金色不知其名吳王見腦中有骨如白石號為名首魚吳地記吳王江行食膾有餘棄於江中流化而為魚今江中有名吳王餘膾魚者長四寸大者如箸猶作膾形博物志雙則比目片則王餘吳都賦寶志對梁武帝食膾帝曰朕不知味二十餘年師何必爾志乃吐出小魚鱗尾依然今金陵鱠殘魚是也高僧傳楚人有獻魚於王者曰今日漁獲食之不盡賣之不售棄之又惜故來獻也左右曰鄙哉辭也楚王曰子不知漁者仁人也蓋聞菌倉粟有餘者國有餓民後宮多幽女者下民多曠夫餘衍之蓄於府庫者境內多貧困之民皆失君人之道故庖有肥肉廄有肥馬民有飢色是以亡國之君藏於府庫漁者知之其以此喻寡人也乃使恤鰥寡而楚民大悅故漁者獻餘魚而楚國賴之新序孔子之楚有漁者獻魚甚強孔子不受漁者曰天暑市遠吾無所鬻之棄之糞壤不若獻之君子孔子再拜而受使弟子掃除將祭之弟子曰夫人將棄之今吾子將祭之何也孔子曰吾聞之務施而不腐餘財者聖人也今受聖人之賜可無祭乎說苑孔子厄於陳絃歌於館中夜有一人長九尺餘皂衣高冠大叱聲動左右子貢進問何人耶便提子貢而挾之子路引出與戰于庭有頃未勝孔子察之見其甲車間時時開如掌孔子曰何不探其甲車引而奮登子路如之沒手仆於地乃是大鯷魚也長九尺餘孔子歎曰此物也何為來哉吾聞物老則群精依之因衰而至此其來也豈以吾遇厄絶糧從者病乎夫六畜之物及龜蛇魚鱉草木之屬久者神皆依憑能為妖怪故謂之五酉五酉五行之方皆有其物酉者老也故物老則為怪矣殺之則已夫何患焉或者天之未喪斯文以是係豫之命乎不然何為至於斯也絃歌不輟子路烹之其味滋病者興明日遂行搜神記曾子食魚有餘曰泔之門人曰泔之傷人不若奧之曾子泣涕曰有異心乎哉傷其聞之晚也荀子曾參食生魚甚美因吐之人問其故參曰母在之日不知生魚味今我食美故吐之遂終身不食孝子宓子賤將適單父陽晝曰吾少賤無以送子有釣道二焉夫投綸錯餌迎而吸之者陽橋也其為魚薄而不美若亡若存若食若不食者魴也其為魚也博而厚味子賤曰善說苑不取小魚季子治單父三年而巫馬期衣短褐易容貌往觀化焉夜見得魚者釋之巫馬期問曰凡人所為漁者欲得魚也今而釋之何也漁者對曰季子不欲人取小魚也所得者小魚是以釋之巫馬期歸以報孔子曰季子之德至矣使人暗行若有嚴刑在其側者淮道訓景公射質堂上唱善者一口弦章入公曰吾失晏子未嘗聞吾不善章曰臣聞君好臣服君嗜臣食尺蠖食黃身黃食蒼身蒼君其食諂人言乎公曰善是時海人入魚公賜弦章魚五十乘弦章歸魚車塞途章撫其僕曰曩之唱善者皆欲若此者也固辭不受晏子公儀休相魯而嗜魚一國人獻魚而不受其弟諫曰嗜魚不受何也曰夫欲嗜魚故不受也受魚而免于相則不能自給魚無受而不免于相長自給於魚此明於魚為己者也韓詩外傳子思居衛衛人釣於河得鰥魚焉其大盈車子思問之曰鰥魚魚之難得者也子如何得之對曰吾始下釣垂一魴之餌鰥過而弗視也更以豚之半體則吞之矣子思喟然曰鰥雖難得貪以死餌士雖懷道貪以死祿矣孔叢子威王聘朱公問之曰聞公在湖為漁父在齊為鴟夷子皮在西戎為赤精子在越為范蠡任足千萬家纍億金何術乎朱公曰夫治生之法有五水畜第一所謂水畜者魚也以六畝地為池池中有九洲求懷子鯉魚長三尺者二十頭牡鯉魚長三尺者四頭以二月上庚日內池中令水無聲魚必生所以養鯉者鯉不相食易長又貴也陶朱公養魚經鯉魚最為魚之主形既可愛又能伸變乃至飛越山湖所以琴高乘之山上本草其脊中鱗一道每鱗上皆有小黑點從頭至尾無大小皆三十六鱗圖經鯉魚至陰之物也其鱗故三十六衍義五尺之鯉一寸之鯉但大小殊鱗之數等金樓子兗州人謂赤鯉為赤驥青鯉謂青馬黑鯉為玄駒白鯉為白驥黃鯉為黃雉古今注三十六鱗充使時數番猶得褁相思假成式詩詹何以獨繭絲為綸芒針為鈎荊條為竿剖粒為餌引盈車之魚於百仞之淵汨流之中綸不絶鉤不伸竿不撓楚王聞而異之召問其故詹何曰臣聞先大夫之言蒲且子之弋也弱弓纖繳乘風振之連雙鶬於青雲之際用心專動手均也臣因其事放而學釣五年始盡其道當臣之臨河持竿心無雜慮唯魚之念投綸沈鈎手無輕重物莫能亂魚見臣之鈎餌猶沈埃聚沫吞之不疑所以能以弱制彊以輕致重也列子任公子為大鉤巨緇五十犗以為餌蹲乎會稽投竿東海旦旦而釣期年不得魚已而大魚食之牽巨鉤錎沒而下騖揚而奮鬐白波若山海水震蕩聲侔鬼神憚赫千里任公子得若魚離而臘之自制河以東蒼梧以北莫不厭若魚者已而後世輕才諷說之徒皆驚而相告也夫揭竿纍趣灌瀆守鯢鮒其於得大魚難矣莊子莊周家貧故往貸粟於監河侯監河侯曰諾我將得邑金將貸子三百金可乎莊周忿然作色曰周昨來有中道而呼者周顧視車轍中有鮒魚焉周問之曰鮒魚來子何為者耶對曰我東海之波臣也君豈有升斗之水而活我哉周曰諾哉且南遊吳越之王激西江之水而迎子可乎鮒魚忿然作色曰吾失我常與我無所處吾得升斗之水然活耳君乃此言曾不如早索我於枯魚之肆上莊子與惠子遊於濠梁之上莊子曰鯈魚出遊從容是魚樂也惠子曰子非魚安知魚之樂莊子曰子非我安知我不知魚之樂惠子曰我非子固不知子矣子固非魚也子之不知魚之樂全矣莊子曰請循其本子曰女安知魚樂云者既已知吾知之而問我我知之濠上也靖郭君將城薛謂謁者無為客通齊人有請三言者靖郭君見之趨而進曰海大魚因反走君使更言之對曰君不聞大魚乎網不能止鉤不能牽蕩而失水則螻蟻得意焉今夫齊亦君之水也君長齊奚以薛為夫齊雖隆薛之城到於天猶之無益也君曰善乃輟城薛齊策弟子曰夫尋常之溝巨魚無所還其體而鯢鰌為之制步仞之丘陵巨獸無所隱其軀而㜸狐為之祥庚桑子曰夫函車之獸介而離山則不免於罔罟之患吞舟之魚碭而失水則蟻能苦之故鳥獸不厭高魚鱉不厭深庚桑魏王與龍陽君共船而釣龍陽君得十餘魚而涕下問其故曰臣為王之得魚也臣之始得魚也臣甚喜後得又益大今臣直欲棄前之所得矣今以臣之凶惡而得為王拂枕席夫四海之內美人亦甚多矣聞臣之得幸於王也必褰裳而趨大王臣亦猶曩前所得魚也臣亦將棄矣臣安能無涕出乎王於是令四境之內敢有言美人者族魏策楚僚早失母事後母至孝母患腫癰形容日悴僚自徐徐吮之血出逮夜即得安寢夢乃一小兒語母曰若得鯉魚食之其病即瘥可以延壽不然不久死矣母覺而告僚時十二月僚仰天嘆泣乃脫衣上冰床之有一童子決僚臥處冰開送鯉一雙與僚僚得將歸奉母其疾即愈延壽至一百三十三歲蓋至孝感天神昭應如此搜神記晉王祥王延事同射魚始皇祭青城山築石城入海三十里射魚水變色如血者數里于今猶爾三齊記無骨河陰南廣武山漢高皇廟在其麓殿前有八角井曰漢泉井中三魚一金鱗一黑一如常一邊鱗內與骨皆無獨其首全與二魚並遊水中但其游差緩不復有揚鼠撥刺之勢至今尚存俗傳漢高皇食鱠庖人治魚及半而楚人至倉皇棄魚井中而遁耳陶朱新録襄陽古魚井內一魚無肉惟骨相連耳南雍州記昆明池中有靈沼名神池云堯時治水嘗停船於此池通白鹿原原人釣魚綸絶而去夢於武帝求去其鈎三日戲於池上見大魚銜索帝曰豈不榖昨所夢耶乃取鈎放之間二日帝復遊池池濱得明珠一雙帝曰豈昔魚之報耶三秦記瓊魚王母曰仙人上藥有流淵瓊魚內傳耿會昌五鳳中又白增海租三倍天子從其計蕭望之奏言故御史屬徐宮家在東萊言往年加海租魚不出長老皆言武帝時縣官嘗自漁海魚不出後復干民魚乃出夫陰陽之感物類相應萬事盡然前食貨志懸魚羊續好食生魚為南陽太守府丞侯范作焦儉貢鯉續受而懸之一歲儉復致一枚續乃出所懸枯魚示之以杜其意謝承書王審知遺推官黃滔魚徐演代為謝啓曰卸諸斷索才從羊續懸來列在雕盤便到馮歡食處時大稱之五代史補術釣左慈字元放曾在曹操坐曰恨少吳松江鱸魚耳慈因求銅盤貯水以竹竿餌釣于盤中須臾引一魚鱸出操曰一魚不周坐席可更得乎乃更餌釣沉之須臾復引出皆長三尺餘生鮮可愛操使目前鱠之後漢葛玄見賣大魚者玄謂暫煩此魚到河伯處魚主曰魚已死玄曰無苦以丹書紙內魚口中擲水中有頃魚還躍上岸吐墨書青黑色如木葉而飛又玄與吳王坐樓上見作請雨土人玄曰雨易得耳即書符著水中一時之間大雨流淹帝曰水中有魚乎玄復書符擲中須臾有大魚數百頭使人治之汝南先賢傳介象與吳王共論鯔魚為上乃於殿庭作坎汲水滿之并求釣象餌之須臾得鯔魚帝驚喜乃乃使廚人切之象又往蜀市薑有頃而反神仙傳甘始言取鯉魚一雙令一者含藥俱投沸膏中有藥者奮尾鼓鯉遊行沉浮有若處淵其一者已熟而可噉余時問言可試不言是藥去此踰萬里非自行不能得也曹植辨道論郝隆為桓公南蠻參軍三月三日會作詩不能者罰酒三升隆初以不能受罰既飲攬筆便作一句云娵隅躍清池桓問娵隅是何物答曰蠻名魚為娵隅桓公曰作詩何以作蠻語隆曰千里投公始得蠻府參軍那得不作蠻語也世說虞嘯父為侍中為孝武所親愛嘗侍飲宴帝從容問曰卿在門下初不聞有所獻替耶嘯父家近海謂帝有所求對曰時尚溫䱥魚蝦鮓未可致尋當有所上獻帝大笑因飲大醉出拜不能起帝顧曰扶虞侍中嘯父曰臣位未及扶醉不及亂非分之賜所不敢當帝甚悅晉書鰶魚出東萊文字集略䱥亦作鰶字音祭又音制字林䱥魚至肥炙食甘美諺曰寧去纍世田宅不去䱥魚額臨海異物志隆安中丹徒民陳性於江邊作魚扈潮去扈中得一女長六尺有容色無衣裳水去不動臥沙中與語不應中一人就奸之性夜夢云我江黃也昨失路落君扈中水人辱我今當殺之性不敢歸待潮來自逐水而去奸者尋病死洽聞記海人魚東海之大者長五六尺狀如人眉目口鼻手氐頭皆為美麗女子無不俱足皮肉白如玉鱗有細毛五色輕軟長一二寸髮如馬尾長五六尺陰形與丈夫女子無異臨海鰥寡多取得養之於池沼交合之際與人無異亦不傷人上待制查道奉使高麗晚泊一山而止望見沙中有一婦人紅裳雙袒髻鬟亂肘微有紅鬣查命水工以篙擔水中勿令傷婦人得水偃仰復身望查拜手感舞而沒水工曰某在海上未省此何物查曰此人魚也能與人姦處水類人性徂異志髮鱓盧循以義熙五年自廣州下泊船江西衆多疫死事平之後人往蔡州皆死人髮變而為鱣又司馬張逝瞻湖際有一棺棺頭有鱣衆試令撥看即是髮亦有未都化者一說云生以秫潘沐髮死則髮為䱉又昔有人食不能無䱉死後改棺䱉滿中䱉即鱣也異苑謝靈運守永嘉遊石門洞入沐鶴溪旁見二女浣沙顏貌娟秀非塵俗態以詩嘲之曰我是謝康樂一箭射雙鶴試問浣沙娘箭從何處落二女邈然不顧又嘲之曰浣沙誰氏女香汗濕新雨對人默無言何事甘良苦而二女微吟曰我是潭中鯽暫出溪頭食食罷自還潭雲蹤何處覔吟罷不見康樂遂回青田志明月峽中有二溪東西流宋順帝升平二年溪人微生亮釣得一白魚長三尺投置船中以草覆之及歸取烹見一美女在草下潔白端麗年可十六七自言高堂之女偶化魚游為君所得亮問曰既為人能為妻否女曰冥契使然何為不得其後三年為亮妻忽曰數已足矣請歸高唐亮曰何時復來答曰情不可忘者有思復至其後一歲三四往來不知所終三峽記禇彥回元徽中授中書監侍中時淮北屬魏江南無鰒魚或有間關得至者一枚直數千錢有獻彥回鰒魚三十枚彥回時雖貴而貧薄過甚門生有獻計賣之云可得千萬錢彥回變色曰我謂此是食物非曰財貨且不知堪賣錢聊爾受之雖復儉乏寧可賣餉取錢也悉與親遊噉之少日便盡南齊光武時張步遣使隨伏隆詣闕上書獻鰒魚郭璞注三蒼云鰒似蛤偏有石廣志云鰒無鱗有殼一面附石細孔雜雜或七或九本草曰石決明一名鰒魚伏湛傳永明九年鹽官縣石蒲有海魚乘潮來水退不得去長三十餘丈黑色無鱗未死有聲如牛土人呼為海燕取其肉食之南齊五行志王肅初入國不食羊肉及酪漿等物常飯鯽魚羹經數年已後肅與高祖殿會食羊肉酪粥甚多高祖怪之謂肅曰卿中國之味也羊肉何如魚羹肅對曰羊者是陸産之最魚者乃水族之長所好不同並各稱珍以味言之甚是優劣羊比齊魯大邦魚比邾莒小國彭城王謂肅何愛小國對曰鄉曲所美不得不好伽藍記化虹太和三年文明太后馮氏幸金河府摩磷宮湯泉釣得鯉魚一雙皆長三尺以黃金鎖穿腮放于池內後皆長五尺沉泛相從正光元年五月五日天清氣爽聞池內鏘鏘聲水中驚沸須臾雷電其一浮天化五色虹而去久之乃滅一在池中至孝昌元年六月行臺元淵北伐頓此決此池魚鱗甲非常淵令殺之得金二斤八兩淵明年為葛榮所殺冀州圖經郡國志邢子勵地記云元魏延興初文安人孫願捕魚於五渠水中有群魚從西來共以柴塞之忽有人謂願曰須臾當得大魚若願多求宜勿殺也願與共食惟覺出氣少腥而衣衫多棷及去願送之以魚固辭不受去後願下網果得大魚其狀如鯉而大願以為賣物遂殺食之俄然風雨晝昏聞飛鳥聲比風息雨霽有人乘船至者前見群魚無數飛入於海願遂不復漁矣因呼入海之處為飛魚口宣室志峴山下漢水中出鯿魚肥美常禁人採捕以槎斷木謂之槎頭鯿宋張敬兒為刺史齊高帝求此魚敬兒作六艫船置魚而獻曰奉槎頭縮項鯿魚一千六百頭襄陽耆舊傳南郡太守劉之亨嘗夢二人姓李詣之乞命未之解也其明仲夏有遺生鯉魚二頭者之亨曰夢中所感也放之又夢來謝恩云當令君延算梁書張洞為淮南轉運使夢人通謁云池州李長史後池中得大鯉即夢也見聞雜録炙魚眼梁元帝母阮修容曾失一珠元帝時幼竊吞之謂是左右所盜乃炙魚眼以厭之信宿之間珠遂便出帝尋一日致眇蓋魚之報也梁書引御覽梁邵陵王綸在南徐州輕險躁虐肆行非法遨遊市里雜於厮隸常謂賣䱉者曰刺史何如對者言其躁虐綸怒令吞䱉以死自是百姓惶駭道路以目南史江陵劉氏以賣鱓羹為業後生一兒頭是鱓自頸已下方為人耳顏氏家訓嘉味大業六年吳郡獻松江鱸魚乾膾臚魚肉白如雪不腥所謂金𤅢玉鱠東南之嘉味也拾遺録四年梁郡有清泠水面闊二里許即衛平得大龜之處清泠水南有橫瀆東南至崖山縣西入通濟渠是時多雨溝渠皆滿忽有大魚似鯉而頭一角長尺餘鱗正赤從清泠水出頭長三尺許入橫瀆逆流西北十餘里不沒入通濟渠于時夾岸隨看者數百人皆謂赤龍大鱗從淵而出此亦唐祚將興之兆上隋煬帝時常駿使赤土國還既入海見緑魚群飛水上浮海十餘日至林邑東並山而行其海水色黃氣腥舟行一日不絶云是大魚糞也北史昔人有遊東海者既而風惡船被補治不能制隨風浪莫知所之一日一夜得一孤洲同侶歡然下石植纜登洲煮食食未熟而洲沒在船者斫斷其纜船復飄蕩向者孤洲乃大魚也怒豎掉揚鬐吸波吐浪云疾如風雲在洲上死者十餘人西京雜記李崇矩見海上沙島有大魚剖其腹得一艇船兼三死人衣服猶備祕閣閒談海鰌魚即海上最偉者也小者亦千餘尺吞舟之說固非謬矣每歲廣州常發舶船過南安貨易北海人有偶求此行往復一年便成斑白云路經調黎深闊處又見十餘山或出或沒初甚訝之篙工曰非山島鰌魚背也果見雙目閃爍鬐鬣若簸米箕危沮之際日中忽雨霂霡舟子曰此鰌魚噴氣水散於空風勢吹來若雨耳及近魚即鼓船而噪倏爾而沒去嶺南録異王師中知登州一日大風異常呼問父老曰海鰌將過此必先有大風次日師中登蓬萊閣候之須臾魚至不見其首但其脊如山出水上隱隱自北而南經二日始見其尾托遺別録沈作哲嘗迎親海上至補陀山望見海中數十里外有旌旗如軍行數萬騎者淘湧東下問其人曰此大魚耳旌旗狀者蓋鱗鬣也須臾稍近山石為之震動寓簡南方嘗晴望海中二山如黛海人云去岸兩相各六百里一旦暴風雷雨霧露皆腥雜以泥涎七日方已屬有人從山來說云大魚因鳴吼吹沫其一鰓挂山巔七日山為之折不能去鳴聲為靁氣為風沫為霧嶺南異物志真臘國有魚名建同四足無鱗鼻如象吸水上噴高五六十尺有浮胡魚形似䱉觜如鸚鵡有八足多大魚半身出望之如山北史八十三東海之大者東海魚焉行海者一日逢魚頭七日逢魚尾魚産三日則碧海為之變紅玄中記海人與山客辨其方物海人曰橫海有魚額若華山之頂一吸萬頃之波山客曰鄧林有木圍三萬尋直上千里傍蔭數國有人曰東極有大人斬木為策短不可支釣魚為鮮不足充饑孫綽子山中人不信有大魚大如木海上人不信有大木大如魚顏氏家訓黑河北極也其水濃不流上有濃雲出焉有黑鯤千尺如鯨常飛遊於南海拾遺記瀛洲一名魂州亦曰環洲洲傍有洞淵其廣千里有魚焉其長千丈鱗色爛斑鼻有角時鼓舞群戲或有遠而望者見水間有五色雲上就之乃是此魚噴水為雲也上五百賈客入海採寶值摩竭魚王開口船去甚疾船師問樓上人何所見耶答曰見三日及大白山水流奔趣如入大坑船師云三日者一是實日二是魚目白山是魚齒水奔是入魚口我曹死矣時船中有優婆塞語衆人言共稱南無佛魚便合口衆人命存大論海味鹹者有三一者海中大魚身長二萬八千里不淨其中樓炭經佛言如意珠者是摩竭大魚腦中出魚身長二十八萬里此珠名曰金剛也雜寶經赤鯶公唐朝律取得鯉魚即宜放仍不得喫號赤鯶公賣者決六十酉陽太宗觀魚於西宮見魚躍焉問其故漁者曰此當乳也於是中網而止唐書周利貞武后時調錢塘尉時禁捕魚刺史飯蔬利貞忽饋佳魚刺史不受利貞曰此闌魚公何疑問其故答曰適見漁者禽不獲而有魚焉闌得之上開元二十一年衢州獲魚有銘獻之侍中裴光庭等奏賀曰魚龍為圖河洛所出比之盛明彼何足云上張九齡賀瑞魚銘曰魚為龍象既彰受命之元銘作久文更表錫年之永韓愈初至潮州問民疾苦皆曰惡溪有鱷魚食民畜産且盡民是以窮數日愈自往視之令其屬秦濟以一羊一豚投溪水而祝之祝之夕暴風震電起溪中數日水盡涸西徙六十里自是潮無鱷魚患唐書王齊直知潮州釣得一鱷魚其大如船畫以為圖其形如鼉啄長半其身牙如鋸齒尾有三鉤極利遇鹿豕即以尾戟之以食生卵甚多或為魚鼉其為鱷不過一二嶺表志鰐魚其身土黃色有四足修尾形狀如鼉而舉止趫疾口渺鋸齒往往害人南中鹿多最懼此物鹿走崖岸之上群鰐嘷叫其下鹿必怖懼落崖多為鰐魚所得亦物之相攝伏也故太尉李德裕貶官潮州經鰐魚灘損壞舟船平生寶玩古書圖畫一時沉失遂召舶上崑崙取之見鰐魚極多不敢輒近乃是鰐魚之窟宅也嶺表録異南海有鰐魚狀似鼉斬其頭而乾之喙去齒而更生如此三乃止博物志鰐好出沙上卵大如鵝卵可食交州記廣州人說鰐魚能陸追牛馬水中覆舟殺人值網則不敢觸有如此畏慎感應經鰐魚別號忽雷熊能制之握其觜至岸裂擘食之一名骨雷秋化為虎三爪出南海思雷二州臨海英潘村多有之洽聞記南方有鱷魚喙長八尺秋時最甚人在舟邊者魚或出頭食之故人持戈於船側而御之虞喜志林鰐魚大者長二三丈有四足似守宮常吞食人扶南王范尋敕捕取置溝塹中尋有所忿者縳以食鰐若罪當死鰐不食便解放以為無罪吳時外國傳林邑國於城溝中養鰐魚門外圈虎有罪者輒以餧猛戰及鰐不食為無罪三日乃放之南史占城國有鰐魚潭有爭訟官不能斷者則令二人騎水牛過此潭曲者鰐魚出而食之直者雖過數次鰐出而不食也瀛涯勝覽鱖西塞山邊白鳥飛桃花流水鱖魚肥一品集鱖魚巨口而細鱗鬐鬣皆圓黃質黑章皮厚而肉緊特異常魚夏月盛熱時好藏石鏬中人即而取之其斑文尤鮮明者雄也稍晦昧者雌也漁者以索貫一雄置之溪畔群雌來齧曳之不捨掣而取之常得十數尾凡魚無肚不嚼鱖魚有肚能嚼爾雅翼魚脅李德裕有巨魚脅骨一條長二丈五尺其上刻云會昌二年海州送到劇談録封演客海州見人持一束黑物形如竹篾問其人乃海中鰓中毛擬用作屏風貼問其所得云數十年前東海有大魚死于岸山收得此惟堪用為屏風貼前後所用無數今官造屏風搜求得此奇文異色澤似水牛角小頭似猪鬃大頭正方長四五寸廣可一寸亦奇異也今人間大魚鰓中翣毛長不盈寸物此乃長四五寸魚亦大矣封氏見聞記漕國在葱嶺之北漢時罽賓國也葱嶺山有順天神祠前有一魚脊骨有孔中通馬騎出入北史王旻之與琅琊太守許誠言書云貴郡臨沂縣其沙村逆鱗魚可調藥物逆鱗魚仙經謂之肉芝紀聞錢氏之有國也應西湖之魚捕者必日納數斤謂之使宅魚有終日不及其數者必市而供之民頗怨嘆一日武肅大設有一圖上畫磻溪直釣之事武肅指示命羅隱賦詩隱應聲曰呂望當年展廟謨總戎釣國更誰如若教生在西湖上也是須供使宅魚武肅大笑自是盡得蠲免閒談録策策堂堂庚氏穴池搆竹為憑欄登之者其聲策策焉辛氏穴池搆木為憑欄登之者其聲堂堂焉二氏俱牧魚於池中每憑欄投餌魚必踴躍而出但日但聞策策堂堂之聲不投餌亦踴躍而出則是庚氏之魚可名策策辛氏之魚可名堂堂食之化也談子化書嘉祐末有人攜一巨魚入都能人言號曰海多人爭覩之亦嘗召至禁中帝自為一詞曰海多風措被魚人下網打住將我在帝城中每日教言語甚時節放我歸去龍王傳言這裏思量爾千回萬度螃蟹最恓惶鮎龍憂慮於李氏園作場躍入池中不復可獲是歲黃河大決水入都城壞民屋宇數百家而昭陵升逝玉照新志水蟲范希文戍邊行水邊甚東之從者前云此水不好裡間有蟲觀之乃魚也答云不妨我亦食此蟲江鄰幾雜記金國有一太守得巨魚令庖人烹焉熟而薦之求魚之舌庖人曰魚元無舌不信其說疑其竊而食之鞭背數十白雲時議河東房灝比目東方有比目魚焉不比不行其名謂之鰈爾雅管仲諫桓公古者封禪東海有比目之魚史記帝王將興比目魚出鄭注比目魚曰東鯀中候狀似牛脾鱗細紫黑色一眼兩片相合乃得行江東呼為王餘魚雅注南人謂之鞋屉魚淮江為之拖沙魚嶺表録異亦謂之箬葉魚臨海異物志一名鰜南越志謂之板魚亦曰左介介亦作魪唐韻魪比目魚也北戶録上林賦禺禺魼鰨注魼比目魚吳都賦單兩魪劉曰魪左右魪一目所謂比目魚也云須兩魚並合乃能游若單行落魄著物為人所得故曰兩魪丹陽吳會有之選其和也若比目魚鬼谷子反復篇鱣鱣出江海三月中從河上身形似龍鋭頭口在頷下背上腹下皆有甲縱廣四五尺今於盟津東石磧上釣取之大者千餘斤可蒸為臛又可為鮓魚子可為醬詩義疏長鼻軟骨可啖俗謂之玉板大者長二三丈埤雅今江東呼鱣為黃魚大者曰王鱣雅翼鵜胡飲水數斗而不足鱣鮪入口若露而死准齊俗鮪東京賦王鮪岫居山有穴曰岫其穴在河南小平山長老言王鮪之魚由南方來出此穴中入河水見日目眩浮水上流行七八十里釣人見之取以獻天子用祭選河陰岫穴出鮪魚焉博物志鮪魚形似鱣而青黑頭小而尖似鐵兜鍪口亦在頷下其甲可以摩薑大者不過七八尺益州人謂之鱣鮪大者為王鮪小者為鮇鮪一名鮥肉色白味不如鱣也今東萊遼東人謂之尉魚或謂之仲明仲明者樂浪尉也溺死海中化為此魚詩義疏季春薦鮪於寢廟天官漁人春薦王鮪月令魴江東呼魴魚為鯿一名魾雅注魴今伊洛濟潁魴魚也廣而薄肥恬而少力細鱗魚之美者遼東梁水魴特肥而厚尤美於中國魴故其鄉語曰居就糧梁水魴是也詩義疏別立市於樂水南號曰四通市民間謂永橋市伊洛之魚多於此賣士庶須膾皆詣取之魚味甚美京師語曰洛鯉伊魴貴於牛羊洛陽伽藍記鱮似魴而大頭魚之不美者故里語曰買魚得鱮不如啖茹徐州謂之鰱或謂之鱅詩義疏緡隆餌重則嘉魚食之緡調餌芳則庸魚食之六韜嘉魚嘉魚出於丙穴蜀都賦東南得丙水口水上承丙穴穴出嘉魚常以三月出十月入穴穴口廣五六尺去平地七八尺泉懸注魚自穴下透入水穴口向丙故曰丙穴下注褒水水經丙穴魚食乳水食之甚溫酉陽丙穴在巴郡明通縣井峽中其穴凡十其中以産嘉魚其出也止於巴渠龍脊灘首有黑點謂映照星象相感而成長身細鱗肉白如玉其味自鹹蓋食鹽象也方輿勝覽嘉魚細鱗似鱒魚蜀山謂之拙魚任豫益州記雅州諸水多有嘉魚或云黃河中味魚亦此類也雲南記蜀都賦李善注云丙日魚出穴今則不然丙者向陽穴也陽穴多生此魚魚復何能擇丙日耶本草陳藏器今本無此丙日句諸魚中唯鱧魚膽甘可食有舌鱗細有花文一名文魚與蛇通氣其首戴星夜則北嚮今道家忌之以其首戴斗也又指為厭故有天厭鴈地厭犬水厭鱧之說皆禁不食埤翼烏賊舊說名河伯從事小吏遇大魚輒放墨方數尺以混身江東人或取其墨書契以脫人財物書跡如淡墨逾年字消唯空紙耳海人言昔秦王東遊棄算袋於海化為此魚形如算袋兩帶極長一說烏賊有矴遇風則蚪前一鬚下矴酉陽此魚每遇漁舟即吐墨染水令黑以混其身漁人見水黑則知是網之大獲炙轂子俗云是海若白事小吏南越記金義嶺之西南有盤龍山山有乳洞斜貫一溪號曰靈水溪溪內有魚皆修尾四足丹其腹狀若守宮游泳自若漁人不敢捕之爾雅云鯢似鮎四足聲如小兒今商州溪內亦有此魚謂之魶魚嶺表録異北戶録司馬遷謂之人魚故史記曰始皇之葬也以人魚為為燭徐廣曰人魚似鮎而四足即鯢魚也水經隴坂汧水東北流歷澗注以成淵潭漲不測出五色魚俗以為靈而莫敢採捕因謂是水為龍魚水上丹魚南陽丹水出丹魚先夏至十日夜伺之魚夜浮水則赤光上照如火網而取之割其血以塗足可以步行水上長居淵中抱朴水經神魚武陵佷縣長楊谷中有石穴清泉潰流三十許步復入穴即長楊之源也水中有神魚大者二尺小者一尺居民釣魚先陳所須多少拜而請之拜訖投釣餌得魚過數者水輒波湧暴風卒起樹木摧折水經扶南象浦晉功臣表所謂金潾清徑象渚澄源者也源潭湛瀨有鮮魚色黑身五丈頭如馬首伺人入水便來為害上樂城縣三京亭去郡二百有溪水清如鏡曩昔有得一死鮎者鬐大五六圍一鬐取得數十斛鮓此灣無所不容有大能食者常自頭腹如三厚灣無所不容永嘉郡記漈湖溪中多大鮎昔有流得一死者鬚大五六圍上石首鯼魚出南海頭中有石一名石首字林石首小者名䠓水其次名春來石首異種也又有石頭長七八寸與石首同臨海異物志初出水能鳴夜視有光服其石能下石淋魚鱗色黃如金和蓴菜作羹謂之金羹玉飯薧而食之名為鮝炙食之主消瓜成水初學記石首魚至秋化為冠鳧冠鳧頭中猶有石也吳地志䱜䱜魚長二丈大數圍皮皆鑢物生子子小隨母覔食驚則還入母腹廣州記䱜魚子朝索食暮入母腹吳録地理志魚爺瓊州文昌縣有魚爺井水極清冽相傳泉與海通有一大魚頭白俗呼為魚爺人呼之輒出志魚向魚始雷向下未驚蟄頭皆向上物類相感志不瞑門鑰必以魚取其不瞑目守夜之義芝田録水梭僧家謂魚為水梭花天中記卷五十六
