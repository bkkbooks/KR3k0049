body:
  text: 衮龍衣說文天子享先王袞龍繡於下裳幅一龍蟠上向徐按周禮衮龍衣也衣五章裳四章凡九皆絺繡而畫以為衮阿曲也謂繡龍蟠屈也王之卿六命公自衮冕而下如王之服侯伯自鷩冕而下如公之服禮記三公一命卷天子卷冕亦作裷荀子天子袾裷衣冕五采彰施帝曰予欲觀古人之象日月星辰山龍草蟲作會宗彝藻火粉米黼黻絺繡以五采彰施于五色作服汝明尚書益稷五服山龍青華蟲黃作繢黑宗彝白藻火赤天子五服書大傳上古衣毛而冒皮後世聖人為之以絲麻觀翬翟之文榮華之色乃染帛以效之始作五采成以為服皇帝堯舜禹衣裳蓋取諸乾坤有文故上衣玄而下裳黃秦繼戰國即天子位減去禮樂郊社之服皆以初玄漢承掌故至顯示初服冕旒衣章以祀天地養三老五更於三雍三公九卿郊祀天地明堂皆冠冕垂旒衣裳玄上纁下乘輿備文日月星辰十二章三公諸侯用山龍九章九卿已下用華蟲七章皆五采衣裳乘輿刺史公侯九卿已下皆織成陳留襄邑獻之漢輿服志聖人處天子位服日月昇龍所以服其德章其功也賢人佐聖封國愛民黼黻文繡降龍所以顯其仁光其能也續漢輿服志天子龍冕諸侯黼大夫黻白與黑謂之黼黑與青謂之黻青與赤謂之文赤與白謂之章五色備謂之繡諸侯去日月星辰山龍華蟲卿大夫去山龍華蟲服藻火服粉米環濟要略弊盡更為昔堯帝王天下黼衣絓履不弊盡不更為也六韜諸侯伐楚許穆公卒于師凡諸侯薨于朝會加一等死王事加二等於是以衮斂左僖上秦除衮冕之制惟為玄衣絳裳一具而已漢興亦如之中興後明帝永平中使諸儒案古衣圖書始復造衮冕之服至今用之摰虞決疑要注韋孟詩云肅肅我祖家自豕韋衮衣朱黻四牡龍旂漢書姚襄夢弟萇上御座著衮服謂官屬曰此兒或能大起吾族後秦記陸澄兼左丞泰始六年詔皇太子朝賀服衮冕九章澄與議曹郎邱仲起議服冕以朝實者經文秦附六冕漢明還備魏晉已來不欲令臣下服冕故位公者加侍官今皇太子禮絕群臣宜遵聖王盛典為近代之制齊書代宗時渤海質子盜衮龍服捕得之詞云慕中國衣服上赦之唐書衮冕衮冕衮卷也畫卷龍於衣也釋名王后之上服曰禕衣畫翬雉之文於衣也伊洛而南雉青質五色備曰翬鷂翟畫鷂雉之衣於文也上內司服掌王后之六服褘衣天官下內司服釋名曰履禮也飾足所以為禮亦曰屨屨拘也所以拘足也複其下曰舄舄腊也行立久立地或泥濕故複其末下使乾腊也不借言賤易有宜各自蓄之不假借人也齊人曰摶腊摶腊猶把鮓粗貌也荊州人曰粗麻韋草皆同名也粗粗措也言所以安措足也足依履足所依也靸小履也鞮革履也說文於則作世本曰於則作履屝履遺不取禹之趨時冠桂而弗顧履遺而不取淮南子崇侯虎曰今周伯昌懷仁而善謀冠雖弊禮加於首履雖新法以踐地可及其未成而圖之六韜穆王起春霄之宮西王母乘翠鳳之輦而來前導以文虎文豹後列雕麟紫麏曳丹玉之履敷碧蒲之席拾遺記晉文公與楚戰至黃鳳之陵履繫解因自結之左右曰不可以使人乎公曰吾聞上君所與居皆其所畏也中君之所與居皆其所愛也下君之所與居皆其所侮也寡人雖不肖先君之人皆在是以難之也韓子文王伐崇至鳳黃虛韈繫解因自結太公望曰何謂也王曰君與處皆其師中皆其友下盡其使也今皆先君之臣故無可使也上東方朔瑣語曰木履起于晉文公時介之推逃祿自隱抱樹而死公撫木哀嘆遂以為履每思從亡之功輒俯視其履曰悲乎足下足下之稱亦自此始也見南方草木狀豹舄傳曰雨雪楚王皮冠豹皮為履齊侯墜于車傷足喪屨反誅屨于徒人費不得鞭之鄭申侯見齊侯曰若師出於陳鄭之間供其資糧屝屨其可也注云草履屝履也景公問曰子近市識貴賤乎時公繁刑晏子曰踴貴履賤公愀然遂緩刑晏子景公為履黃金之綦飾以銀連以珠良玉之鉤其長尺上景公為履飾以金玉服以聽朝履重僕不能舉之問曰天寒乎晏子曰古之制衣服冬輕而煖夏重而清金玉之履是重而寒也公入徹履上納履踵決曾子居衛捉襟而肘見納履而踵決莊子昔楚昭王與吳戰楚軍敗昭王走而履決失之行三十步復旋取左右問曰何惜此一踦履乎王曰楚國雖貧豈愛一踦履哉惡與偕出弗與俱反也自是之後楚國之俗無相棄者賈誼書楚昭王出奔而忘其履使人求之以百金曰吾不忘其相從于患難之中也故論功而未及者皆無怨矣世宗詔趙修云楚履既墜江君徘徊鐘中一聲東向改釁魏書鄭人有欲買履者先自度足而置其坐往市而忘操之見履乃曰吾忘持度及歸取之市罷不得履人曰何不試以足曰寧信度無自信也陳仲字子終自齊適楚楚王欲以為相其妻曰子織履以為食淡然而無為樂在其中矣謝便不就皇甫謐高士傳魯人身善織履其妻善織縞而徙於越或謂之曰子必窮履飾足也而越人跣縞為冠者也而越人披髮欲不窮可得乎韓子車席泰美簡主謂左右車席泰美夫冠雖賤頭必戴之屨雖貴足必履之今車席如此泰美吾將何屩以履之夫美下而耗上妨義之本也上趙平原君使人於春申君欲誇楚為瑇瑁簪刀劍之室飾以珠玉春申君三千餘人其上客皆躡珠履趙使大慚史記張良嘗遊下邳圯上有一老父至良所墮其履圯下顧謂良曰孺子下取之父曰履我良為取履因長跪進之史記東郭先生待詔公車貧困饑寒衣弊不完行雪中屨履有上無下足盡踐地道中人笑之上茨充字子何為桂陽太守民惰懶多無履足多剖裂茨教作履今江南知織履皆充之教東觀漢記鄭崇哀帝擢為尚書僕射數諫諍每見曳革履上笑曰我識鄭尚書履聲漢書高冠厚履王莽好高冠厚履上曹公令曰議者以祠廟當解履吾受錫命帶劍不解履上殿今有事于廟而解履是尊先公而替王命敬父祖而簡君王也吾不敢脫履上殿魏志劉琰妻胡入賀太后后特留胡經月乃出胡有美色琰疑其與後主有私呼卒五百撾胡以履摶面胡具以言告琰坐下獄有司議曰卒非撾妻之人面非受杖之地琰竟棄市蜀志夜武庫火累代之寶皆焚焉孔子履漢祖斬蛇劍王莽頭晉書符犍時霖雨河水溢浦津監寇登得一履於河長七尺三寸內指跡長一尺深三寸上謁陵無履帝還洛陽至陵下謁無履取左右履著下拜晉惠帝起居注江州刺史王弘造陶淵明無履弘從人脫履以給之與左右為彭澤作履左右請度度淵明於眾坐申腳令度及履至著而不疑續晉漢陽春秋佛圖澄足葬後郭門吏報石季龍云是師攜一履西去季龍發其墓唯見一履與一石趙錄化鵠得履昔有盧耽仕州為治中當元會至曉不及朝化為白鵠至閣前迴翔欲下威儀以帚擲之得一雙履耽驚還就列內外左右莫不駭異時步騭廣州刺史意甚惡之便以狀聞遂至誅滅鄧德明南康記王遵業從容恬素若處丘園嘗著穿履好事者多毀新履以學之後魏書終縳履行益州道士邵碩元徽二年忽告人云吾命終困臥而死後人見碩在荊州上明以一隻故履縳左腳而行甚疾遂不知所之宋書紫絲履高祖儉素宮人盡令著紫絲履齊書七寶履趙飛燕為皇后其弟上遺同心七寶綦履西京雜記青絲履慶安世年十五為成帝侍郎嘗著青絲履上織履翟方進學於京師後母憐其幼隨之長安織履以給之列女傳阮長之字景茂為中書郎直省夜往鄰省誤著屐出閣依事自列門下以暗夜人不知不受列長之固遣送曰一生不侮暗室南史孫廉字思約便辟巧宦凡貴要每食廉必日進滋旨皆手自煎調不辭勤劇遂得為列卿廣陵高爽有險薄才客于廉廉委以文記爽嘗有求不遂乃為屐謎以喻廉曰刺鼻不知啑蹋面不知瞶齧齒作步數持此得勝人譏其不計恥辱以取此名位上居士屩朱桃椎嘗織十芒屩置道上見者曰居士屩也為鬻米茗易之置其處輒取去終不與人接其為屩草柔細環結促密人爭躡之崔戎出為華州刺史徙兗海沂密觀察使民擁留于道不得行乃休傳舍民至抱持取其靴崔彥昭與王凝外昆弟也凝大中初先顯而彥昭未仕嘗見凝凝倨不冠帶嫚言曰不若從明經舉彥昭為憾至是凝為兵部侍郎毋聞彥昭相敕婢多製履襪曰王氏妹必與子皆逐吾將共行彥昭聞之泣且拜不敢為怨文宗時吳越間織高頭草履如綾縠前代所無履下物也織草為之又非正服而被以文飾蓋陰斜闒茸泰侈之象五行志玄宗貴妃楊氏每十月帝幸華清宮五宅車騎皆從國忠導以劍南旗節遺鈿墮舄狼藉于道令奴著鞋鄭仁凱為密州刺史有小奴告以履穿凱曰阿翁為汝經營鞋有頃門夫著新鞋者至凱廳前樹上有鴷巢遣門夫上樹取其子夫脫鞋而緣之凱令奴著鞋而去門夫竟至徒跣凱有德色僉載吏訴之仁凱曰刺史不是守鞋人北齊沈麟士性寬恕一人鄰人認其所著履麟士曰是卿履耶即脫與跣而歸後鄰人得履送還前日履曰非卿履耶笑而受之史齊始安王遙光生而躄疾多忌人有餉履者以為戲已大被嫌責劉繪嘗為牋云智不及葵亦以忤旨南史惠州冲虛觀有遺履軒相傳南海太守鮑靚嘗夜訪葛洪與語達旦乃去人訝其往來之頻而不見車使人往密伺之但見雙燕飛至網之得雙履一統志抱木生於水松之傍若寄生然極柔弱不勝刀鋸乘濕時刳而為履易于削瓜乾則韌不可理也履雖猥大而輕若通腕木風至則隨飄而動夏月納之可禦蒸濕之氣太康六年扶南貢百雙帝深嘆異然哂其製作之陋但置諸外府以備方物而已南方草木狀高宗為錄尚書輔政百僚屣履到席約躡屐不改帝謂江祐曰蔡氏故是禮度之門故自可悅祐曰大將軍有揖客復見於今南齊蒲靸江南李昇常履蒲靸九國志夢履履襪為子屬體末也若夢得履緬者必有子息也履者為男子緬者為女也夢書足衣襪足衣也說文襪末也在腳末也釋名文王伐崇至鳳凰之墟而襪係解文王自結之太公問焉文王曰吾聞亡君所與處盡其後寡人雖不肖所與處皆先君之人也以無令結之文子武王伐紂行至商山襪繫解五人在前莫肯繫皆曰臣所以事君非為繫襪帝王世紀衛侯與諸大夫飲酒褚師聲子襪而登席公怒辭曰臣有疾異於人若見之君將惡之是以不敢哀下景帝時王生者善為黃老言嘗召居廷中公卿盡會張釋之為廷尉王生顧曰吾襪解為我結襪釋之跪而結之人或讓王生獨奈何辱張廷尉如此王生曰吾老且賤自度終無益於張廷尉廷尉方今天下名臣故吾聊使廷跪結襪欲以重之諸公聞之賢王生而重釋之漢書中山王來朝成帝賜食後飽起下襪繫解成帝以為不能而賢定陶王上和帝召諸儒侍中賈逵黃香相難罷朝特頒賜履襪東觀漢記綾羅襪魏文帝吳妃乃裁縫綾羅紬絹為襪炙轂子凌波微步羅襪生塵賀劭為人美容止與人交久益敬之在官府常著襪希見其足會稽典錄巴卭人家橘園有兩大橘如三斗盎剖開每橘有二老叟皆相對象戲一叟曰我輸阿母女態盈娘子躋虛龍縞襪八緉幽怪錄妃子死之日馬嵬媼得錦袎襪一隻相遇過客一翫百錢前後獲錢無數太真外傳李石中人自邊還走馬入金光門道路妄言兵至百官或襪而騎元載於萬年縣佛堂子中謁主官乞一快死也主者曰相公今日受些子污泥不怪也乃脫穢襪塞其口而終劉賓客嘉話唐臣李仁矩董璋置酒召仁矩仁矩辭醉不往於傳舍與倡妓飲璋怒率衙兵露刃之傳舍仁矩惶恐不襪而鞋走廷中璋責之五代史偽蜀吏部尚書韓昭多能而皆不精朝士李白云韓八座事業如拆襪線無一條長北夢瑣言凡事如僧削髮無有寸長外史檮机屐榰也為兩足榰以踐泥也帛屐以帛作屐如屩者也不與帛屩而曰帛屐者屩不可以踐泥屐可以踐泥也故謂之屐釋名拊木製屐介子推逃祿隱跡抱樹燒死文公拊木哀嗟伐而製屐每懷割股之功俯視其屐曰悲乎足下足下之稱遂起於此異苑孔子屐孔子至蔡解於客舍人夜有取孔子一隻屐去盜者置屐于受盜家孔子屐長一尺四寸與凡人屐異論語隱義注振方屐孔穿振方屐見平原君孔叢子直出屐行袁盎使吳吳王使圍守之乃力決帳直出屐行七十里漢書解屐升轂范升奏云伏見太原周黨東海王良山陽王戎使者三到乃肯就車脫衣解屐升於華轂東觀漢記鄭玄在馬融門下業成辭歸融心忌之鄭玄亦疑有追乃坐橋下據屐融果轉式逐之告左右曰玄在上下水上而據木此必死矣遂罷追後竟以免語林宣王初欲追諸葛亮于關中亮多置蒺藜帝使軍士三千人著軟林平底木屐前行蒺藜悉著屐然後馬步俱進追至赤岸始知亮死晉書謝安遣弟石及從子玄征苻堅所在充安方對客圍碁有驛書到碁畢還內過戶限心喜不覺折屐齒王述性急當食雞子以著刺之不得便怒擲于地雞子圓轉不止便下以屐齒踏之不得嗔甚撥口中嚼而吐之上祖約好財阮孚好著蠟屐同是累而未判其得失有詣約見正料物財客至屏當不盡餘兩小簏著背後傾身障之意未能平或有詣阮正見蠟屐因嘆曰未知一生當著幾量屐神色閒暢於是勝負始分上鐵屐石勒擊劉曜使人著鐵屐施釘登城上舊為屐者齒皆達名曰露卯泰元中忽不復徹名陰卯亦復妖也識者以為卯謀也必有陰謀烈宗末驃騎參軍袁悅之始有陰謀之事及隆安初遂至大亂晉中興徵神說謝靈運好山水尋山陟嶺必造幽峻巖障數十里莫不備盡登躡常著木屐上山則去其前齒下則去其後齒宋史新屐不受虞玩之高帝鎮東府朝廷致敬玩之為少府猶躡屐造席高帝取屐視之訛黑釘說蒵斷以芒接之問曰卿此屐已幾載玩之曰初釋褐拜征北行佐買之著已三十年貧士竟不辦易高帝咨嗟因賜以新履玩之不受問其故答曰公之賜恩華俱重但舊簪弊席復不可遺所不敢當帝善之上認屐不取劉凝之有嘗認其著屐笑曰僕已敗令家中不覔新者還君此人後田中得所失屐送還不肯復取玉屐襄陽有盜發古冢傳云是楚王冢獲玉屐金屏風蕭子顯齊書屐謎范廉為吳興太守廣陵高爽有儉薄才客于廉委以文記爽嘗有求不遂乃為屐謎以喻廉曰刺鼻不知嚏蹋面不知瞋嚙齒作步數持此得胜人譏其不計恥辱以此取名位梁書延嘉中京師長皆著木屐婦女始嫁作漆畫屐五色采為系後黨事起九族俱繫婦人桎蓋木屐之像也風俗通足著木屐袁閎字夏甫汝南人也築室于庭首不著布身無單衣足著木屐黃甫謐高士傳杖荷屐劉盛公枝江人桓司空臨州與上佐遊于靈溪盛公詣市還著皁蓋布裙以杖荷屐詣桓司空庾仲雍荊州記趙嫗者九真軍安縣女子乳長數尺不家入山聚群盜常著金擒踶屐劉欣期交州記躡屐高屐王子敬兄弟見郄公躡屐問訊甚修外生禮及嘉賓死著高屐儀容輕慢每命坐皆云有事不暇坐郄公慨然曰若使嘉賓不死鼠輩敢爾世說廣平遊方先期望見一人著赤袴褶知是鬼魅乃以刀砍之乃死良久方變是所常著屐集異記丹陽縣有梅姑廟始生時有道術能著屐行水上後負道法壻怒殺之投其屍于水上乃隨波流漂至今廟處晦望之日時見水霧中曖然屐異苑白荊屐劉禎彈廣州刺史韋朗昭脏有白荊屐六七十里宋元嘉和記左慈見孫討逆著鞭驅馬慈著木屐杖策徐步然終不能及乃止神仙傳餘材作屐王褒僮約曰持斧入山斷輮裁轅若得餘材當作俎几木屐何隨家養竹人盜其筍隨行見恐盜者覺挈屐而歸華陽國志昔作屐婦人圓頭男子方頭蓋作故意欲別男女也太康婦人皆方頭屐與男無異搜神記布裳木屐戴良嫁女布裳木屐汝南先賢傳麄屐為使麄屐為使令卑賤類也夢得麄屐得僮使也夢書武靈服靴木胡也趙武靈王服之釋名繡靴慕容晃與顧和書曰今致繡靴一量織成魏武與楊彪書曰奉足下織成靴一量五彩織成石虎皇后出女騎千人皆著五彩織成靴鄴中記有人遺趙柔鞾數百枝柔與子善明鬻之於市有人從柔買柔索絹三十疋有商人知其賤與柔三十疋善明欲取之柔曰與人交易一言便定豈可以利動心也遂與之後魏書任城王湝為荊州刺史有婦人臨汾水浣衣有乘馬又換其新靴而去婦人持故靴詣州言之湝召城外諸嫗以靴示之紿曰有乘馬人于路被賊劫害遺此靴焉得無親屬乎一嫗撫膺哭曰兒昨著此靴向妻家如其語捕獲一時稱明察北齊書自作鄭太妃初與神武避葛榮同走荊州貧困燃馬屎自作靴上建中初贈司徒沈易良之妻崔氏即太后之季父母也上見之方屣而靴唐書皂靴隋煬帝數出幸因今百官以戎服從一品紫次朱次青皂靴乃馬鞋也後世循襲遂為朝服朱語錄氈靴唐馬周以麻為靴殺其靿加以靴氈靴紀原羊靴開元中裴叔通以羊為靴隱麖加以帶子裝束上朱桃椎益州成都人長史竇軌遺以衣服麂幘麂靴之地不肯服本傳長靿北齊全用故服長靿靴筆談賣靴為業仙人文賓大邱人也賣靴為業列仙傳醉使脫靴李白供奉翰林當侍玄宗醉使高力士脫靴力士恥之摘其詩激楊貴妃帝欲擢白輒為妃沮止唐書先辨靴涼州民先辨靴從軍之物然後作衣傅咸表躡屩擔簦虞卿者游說之士也躡屩擔簦說趙孝成王一見賜黃金百鎰白璧一雙再見為趙上卿故號為虞卿史記作屩供食江夏劉勤字伯家貧作屩供食常作一量屨斷勤置不賣出行妻賣以糴米勤歸炊熟怪問何所得米妻以實告勤責妻曰賣毀物欺取其直也因棄不食仕至司徒謝承後漢書元康之末至太安之間江浦之城有敗屩自聚於道多或至四五十兩人散去之投林草中明日視之悉復矣民或云見狸銜而聚之世之所說屩者人之賤服而當勞辱下民之象也敗者疲弊之象也道者地理四方所以交通王命所由往來也今敗屩聚於道者象下民疲疾將眾聚為亂絕四方而壅王命搜神記劉敬宣嘗夜與僚佐晏空中有投一隻芒屩於坐墜敬宣食盤上長三尺一寸已經人著耳鼻間竝欲壞頃之敬宣參軍司馬道賜反敬宣為其所害宋書張暢在彭城為魏太武所圍太武遣李伯至城欲與暢語李伯曰君南上膏梁何為著屩君而著此使將士云何暢曰膏梁之言武誠為愧但以不武受命統軍戎陣之間不容緩服上沈瑀為餘姚令瑀初至富吏皆鮮衣美服自彰別瑀怒曰汝等下縣吏何得自擬貴人悉使易芒屩粗布侍立終日足有蹉跌輒加榜捶齊書褚彥回幼有清譽宋元嘉末魏軍逼瓜步百姓咸負擔而立時父湛之為丹陽尹使其子弟并著芒屩於齊前習行或譏之湛之曰安不忘危彥回時年十餘歲甚有慚色上侯景即位童謠曰脫青袍著芒屩荊州天子挺應著梁書何點為尚書乘柴車躡草屩恣心所適致醉而歸上沈眾武帝時兼起部尚書監起太極殿恒服布袍芒屩以麻繩為帶朝士共誚其所為陳書孟元陽起於陳許軍中理戎整肅曲環主屯作西華陽芒屩立稻中須役者退而去唐書劉禎長少時居丹徒家至貧劇方回數出南射堂射劉往市賣屩路經射堂邊過人無不看射堂劉過初不迴顧方回異之遣問信答老母朝來未得食至市貨屩不得展詣後過劇之呼使來與共語覺其佳俗說南方人至京師者人戒之曰汝得物唯食慎勿問其名也後詣主人入門內見馬矢便食惡臭乃步進見敗屩棄於路因復嚼殊不可咽顧伴曰且止人言不可皆信後詣貴官為設饌因相視曰故是首物且當勿食笑林漢卜式為郎在上林中布衣而牧羊注屩草屨也南方謂之蹻本傳張志和築室越州東郭茨以生草椽棟不施斤斧豹帶椶屩每垂釣不設餌志不在魚也本傳袁粲為丹陽尹步屧白楊郊野間道遇一士大夫便呼與酣飲明日此人謂被知顧到門求進粲曰昨飲酒無偶聊相要耳竟不與相見南史江泌字士倩濟陽人也少貧好學畫則斫屧為業夜則讀書隨月光光斜則掩卷升室齊書寶屧臨川王宏奢侈過度後庭數千人皆極天下之選所幸江無畏服玩侔於齊東昏潘妃寶屧直千萬梁書備忽忘釋名曰笏忽也君有教命及所啟白則書其上備忽忘也或曰笏可以簿一物笏天子以球玉為之挺然而方其首示無所屈於天下諸侯以象前詘後直圓其首屈於天子也大夫以魚班飾竹士竹本前詘後詘又示無所不屈焉禮記天子御珽諸侯御茶大夫服笏大戴禮天子之笏謂之珽挺然無所屈也五經要義士竹笏飾以象骨大夫飾以魚須三禮圖書君教令笏以書君教令記善刺過今之手板以象牙仲長子古者貴賤皆執笏主書君上之政令有事則搢之于腰帶中近代以來唯八座尚書執笏者白筆綴手板頭以紫囊裹之其餘王公卿士但執手板板主于敬不執笏亦非記事官也輿服雜事示無仇武王不閉外門以示無懼去劍搢笏以示無仇周書應仲遠云昔荊軻逐秦王其後謁者持匕首以備不虞從此侍官執刀劍漢高祖偃武修文始制以手板代焉周遷車服雜事孟岐清河之逸人也年可七百歲語及周初時事如目前岐時侍周公升壇上岐以手摩成王之足周公以玉笏與之郭子橫洞冥記陳蕃為光祿勳范滂為主事以公儀詣蕃執板入閣至坐不奪滂投板振衣而去郭太責蕃曰以階級言滂宜有敬以類數推之至閣宜省後漢書獻帝嘗見郄慮及少府孔融問融曰鴻豫何所優長融曰可與適道未可與權慮舉笏曰融昔宰北海政散民流其權安在遂與融互相長短江表傳朱治領吳郡舉孫權為孝簾後權為吳王治每見權常執板交拜吳志王敦表溫嶠為丹陽尹因餞會錢鳳自起行酒至鳳未飲嶠偽醉以手板擊鳳幘墜作色曰錢鳳何人溫太真行酒敦不悅兩釋之晉書倒持桓溫秉政謝安王坦之往候之坦之倒持手板上庾道愍尤精相板宋明帝時山陽王休祜屢以言語忤顏見道愍託以已板為他物令道愍占之道愍曰以乃甚貴然使人多僣忤祜以褚彥同詳密求換其板他日彥因侍明帝自稱下官帝多忌其不悅休祜具以狀言帝乃意解宋書手板富貴綦母珍之在西州時有一手板相者云當貴每以此言勳帝又圖皇門郎帝嘗問之曰西州時手板何在珍之曰此是黃門手板官何須帝大笑上玉手板豫章王嶷薨見形於第後園乘腰輿指麾處分呼直兵直兵無手板左右授一玉手板與之謂曰橘樹一株死可覔補之因出後園閣直兵倒地仍失手板齊書爾朱榮既誅得其手板上有數牒啟皆左右去留人名非其腹心在出限帝曰豎子若過今日便不可制矣北齊書文襄疑文宣佯愚慮其有後變將陰圖之以問崔暹暹曰嘗與二郎俱在行位試以手板拍其背而不瞋乃將犀手板換暹竹者自指拭下翫視之以是知其實癡不是慮也帝既鏁暹責其往若打背暹自陳所對文襄之言以功求贖死帝悟曰我免禍乃暹之力釋而勞之上魏徵薨帝後臨朝嘆曰朕比使人至家得書一紙始半槀其可識者曰天下之事有善有惡任善人則國安任惡人則國弊公卿之內情有愛憎憎者惟見其惡愛者止見其善愛憎之間所宜詳謹若愛而知其惡憎而知其善去邪勿疑任賢勿猜可以興矣其大概如此朕顧思之恐不免斯過公卿侍臣書之於笏知而必諫也魏徵五世孫謩帝問家書詔頗有存者乎謩對惟故笏在詔令上送鄭覃曰在人不在笏帝曰覃不識朕意此笏乃今之甘棠韋端符衛公故物記三年冬端符於三原令座中揖其群官有客曰某丞李謂端符曰是衛公之胄也其家傳賜書與他物服器十餘物訖讌端符即丞居為客謁丞延入就次因請以觀丞慘然曰諾即奉賜書一函它物一器出發眎有玉帶一公擒蕭銑時所賜于闐所獻素錦袍靴袴皆非華人所為象笏不類今笏火鏡椰杯凡十三物文王賜書二十通多言征討事丞因請韋作衛公故物記文粹禇遂良帝將立昭儀遂良翌日復言對曰陛下必欲改立后者請更擇貴姓昭儀昔事先帝身接帷第今立之奈天下耳目何帝差默遂良因致笏殿階叩頭流血曰還陛下此笏丐歸田里崔滌玄宗時嘗朝夕宮掖出入無間慮有所漏洩乃於滌笏上親書慎密二字以誡之唐書張九齡體弱有醞藉故事公卿皆搢笏於帶而後乘馬九齡獨常使人持之因設為笏囊自九齡始宋璟告滿入朝公卿以次謁易之等後至促步而附璟舉笏却揖唯唯顧少連裴延齡方橫無敢忤者嘗與少連會田鎬第酒酣少連捉笏曰叚秀實笏擊賊臣今吾笏將擊姦臣奮且前元友直在坐勸解之叚秀實朱泚召秀實計事源休姚令言李忠臣李子平皆在坐秀實戎服與休並語至僣位勃然起執休腕奪其象笏奮而前唾泚面大罵曰狂賊可磔萬段吾豈從汝反耶遂擊之泚舉臂捍笏中顙流血衊面榻笏重積崔琳每歲時宴于家以一榻置笏重積其上以笏叩頭宋申錫豆盧署誣告與漳王謀反時二月晦群司皆休中人馳召宰相至中書舍人唱曰所召無宋申錫申錫始知得罪望延英門以笏叩頭還第崔元亮改諫議大夫鄭注誣宋申錫捕逮倉卒內外震駭元亮率諫官叩延英苦諫反復數百言文宗未諭元亮置笏在陛宋遜為連州參軍刺史聞其善歌使教婢日執笏簾外唱吟自如李絳面諭吐突承瓘用兵無功合從顯責又論承瓘於軍中立聖政碑事不可舉上初怒色變絳語不已詞旨懇切因泣下上察其意乃大開悟拜絳為中書舍人即命曳去所立碑曰微絳語吾不知為損又面賜絳紫親為絳擇笏以賜之因謂之曰爾他時勿易此心唐書韋貫之或薦之京兆尹李實實舉笏示所記曰此其姓名也舉笏擊面常達歸賊薛舉奴張貴曰識我否達瞑目曰若乃奴耳貴忿舉笏擊其面達不為懾賈隱林德宗見隱林偉其貌問家世答曰故范陽節度副使循臣從父也帝異之引至臥內以手板畫地陳攻守計賈直言始劉悟子從諫貴甚見直言輒衣紫擁笏以兵自衛直言諫悟曰郎少年毋使襲山東態朝服可擅著耶司空圖會遷洛陽柳璨希賊臣意誅天下才望助喪王室詔圖入朝圖陽墮笏趣意野耄璨知無意於世乃聽還高駢呂用之憚其術窮且見詰乃刻青石手版為龍蛇隱起文曰帝賜駢使人潛植几上駢得之大喜元稹閣下以文皇勑起居郎書居安思危四字於笏上為至戒矣上裴相書孫樵文貞公笏銘靈豸鹿角比于獻骨合以憤烈在公為笏文粹韓皋家自黃門以來三世傳執一笏經祖父所執未嘗輕授於僕人之手歸則別致在臥內一榻以示敬謹唐語林會昌以來宰相朝則有笏架入禁中逐門傳送至殿前朝罷則置于架上百僚則各有笏囊吏持之常朝錄陳希烈不便執笏騎馬以帛裹令左右執之李右座見云便為將來故事李參軍善相笏知休咎必驗呼為李相笏又龍復本者無目凡有象簡竹笏以手捻之必知官祿年壽南部新書唐明宗天成元年八月丁酉以象笏三十二賜百官之無笏者五代何澤邪佞嘗班退獨留以笏叩顙北望而呼曰明主明主上王彥章至京師入見以笏畫地陳勝負趙巖等劾不恭勒還第晉明為太子時嘗戲殿前以玉手板弄銅幡螭口手傾溜入螭服中不能出入後見一白鼠出入螭口郡國志王徽之為桓冲參軍冲謂徽之曰卿在府日久比當相料理徽之初不酹答直高視以手版拄頰云西山朝來致有爽氣耳本傳未嘗書笏王播善占奏雖數十事未嘗書于笏余靖奉使入辭書所奏事于笏各用一字為目上顧見之問其所書者何靖以實對上指其字一一問之盡而後已笏擊僕死晏殊坐以笏擊死僕隸出守南京詩話邱巒為兩浙進表開寶末年廣州牙網到吏私藏一牙巒易得之命工解笏得五面其中三面甚大上曰此笏紅文光瑩頗殊等有一聶長史者年過八十獨善相笏召使相之既至命水洗手取其大者向日視之曰此王侯笏也然生人不當秉又舉次者曰宰相笏也又取第三者熟視之曰卿監笏也亦可為節度使而非真其後不數日忠懿王急須一大笏巒乃以第一面附歸蓋欲致之於武肅王祠中備供養耳又月餘沈相公遣堂吏欲致新笏遂以次者進于相第執之十餘年餘第三面巒以奉錢昭宴昭宴後太平興國二年除衛尉卿知滑州皆如聶之言嗟乎三笏同出異用物固不逃于數矣是何聶老之術其妙如此耶見錢希白小說沈良除大理寺丞通判吉州借緋遂至鋪家買一笏次有一道士行乞至舖見沈持笏乃曰貧道善相笏見沈笏曰此只是借緋笏耳官人爭得似賜緋賜紫笏遂自出一面授沈曰此笏借緋兼是吉州通判執得沈大驚延於靜室祈以向去之事道士笑曰但且赴任如獲罷後貧道方為官人別選一面朝官笏曰何時曰明年六月乃去不見明年六月良果卒於吉州章服品第只此可以知其前定矣相手板經相手板法出蕭何或曰四皓初出殆不行世東方朔見而善之曰此非庸人所至魏司空陳長史見此書歎伏以示許士宗韋仲將管輅而推歎郭景純以夜兼晝方得其妙理初學記齎手板異建平王宏文帝子也元凶劭弒立孝武入討劭錄宏殿內自拔莫由孝武先嘗以一手板與宏宏遣左右親信周法道齎手板詣孝武事平以為尚書左僕射宋書明帝起事諸方並舉兵帝謂蔡興宗曰頃日人情言何事當濟否興宗曰今未甚豐賤而人情更安以此等之清蕩可必但臣之所憂更在事後猶羊公言既平之後方當勞聖慮耳尚書禇彥回以手板築興宗不已上曰如卿言上崔澄性滑稽善辨帝恐漏禁中語以謹密字親署笏端內衣袍丈夫著下至跗者袍苞也內衣也釋名繭袍如絮曰繭繭以縕曰袍說文纊為繭縕為袍玉藻博袍楚莊王鮮冠縕紐纓絳衣博袍以理其國政也墨子縕袍曾子居衛縕袍無裏十年不制衣莊子子思居衛縕袍無裏田之方遺狐白之裘恐其不受謂之曰吾假人遂忘之子思竟不受說苑原憲之縕袍賢於季孫之狐貉鹽鐵論秦相范睢與魏人須賈有隙及賈使秦睢自稱張祿先生見賈寒取一綈袍以賜之及數其罪曰公之所以得無死者以綈袍戀戀有故人之意故釋公史記錦裌袍文帝使遺單于繡袷長襦錦袷袍各一漢書上元夫人降武帝服赤霜之袍雲綵亂色非錦非繡不可得名漢武內傳練袍倪寬練袍衣若僕妾令若庸夫鹽鐵論省鹿袍袁安為光祿勳至省鹿袍糲食續書都祿大袍三老五更皆服都祿大袍上明德馬皇后袍極麄踈諸王朝望見反以為綺東觀漢記詔給皂袍樂松者家貧無被糟食自此詔給帷被皂袍華嶠後漢書桓鸞字始春焉弟也少立志行縕袍糟食不求盈餘以濁世恥不肯仕袁山松後漢書薛夏字宣聲黃初中為秘書丞帝與夏推論書傳未嘗不終日也帝見其衣薄解御袍以賜之魏略彭羡字永年姿性驕傲多所輕忽唯敬同郡秦安薦之於太守許靖曰竊見處士綿竹秦安應山甫之德履雋生之直枕石漱流吟詠縕袍也蜀志賜印大袍江東賜涼州刺史張駿真金印大袍王隱晉書鄭冲以儒雅為德蒞職無幹局之譽簞食縕袍不營資產以此重之上賜鶴綾袍惠帝自鄴還洛陽賜中書監盧志鶴綾袍一領上袍裏千端武帝賜桓伊錢百萬袍裏千端上慕容冲進逼苻堅堅送一領錦袍遺冲曰古者交兵使在其間今送一袍以明本懷上卞彬蚤蝨賦序曰余居貧布衣十年不製一袍之縕有生所託資其寒暑無與易之為之多病起居甚踈庸寢敗絮不能自釋齊書侯景將為亂時謠曰青袍白馬壽陽來後景軍中悉著青袍景長乘白馬梁書臨賀王正德侯景之亂正德為平北將軍屯朱雀航景王正德乃北向望闕三拜歔欷流涕引賊入宣陽門與景交揖馬上退據左衛府先是其軍皆著絳袍袍裏皆碧至是悉反之賊以正德為天子上武皇出緋紫單羅銘襟背袍以賜文武臣其袍文各有炯戒諸王則飾以盤石及鹿宰相飾以鳳池尚書飾以對鴈左右將軍飾以麒麟左右武衛飾以對虎左右鷹揚飾以鷹左右千牛飾以牛左右豹韜飾以獅子左右金吾飾以象又名其襟背作八字迴文焉唐書肅宗為皇太子受冊當被絳紗袍太子以為與皇帝同稱辭不敢當下百官議帝手勑改為朱明服上十年不易薛平能守法度理身儉薄一綠袍十年不易恩加朱紱然始解去上青龍袍石虎臨軒大會著青龍袍鄴中記袁彭字伯楚為南陽太守政以清潔糲食縕袍不改其操鍾岐良吏傳短衣說文褐短衣也吳申叔儀乞糧於公孫有山氏曰佩玉蘂兮余無繫之旨酒一盛兮余與褐之父睨之對曰梁則無矣粗則有之若登首山以呼曰庚癸乎則諾哀上束郭書知宋之將亡故褰褐而過鬲其朝曰宋將有荊棘故褰褐而避之也居三年宋果亡韓詩外傳被褐食牛五羖大夫鄙人也聞秦繆公之賢自鬻秦客被褐食牛期年舉之牛口之下加之百姓之上史記齊有婦人極醜無雙號為鹽女行年四十無所容入衒嫁不售乃拂短褐自詣宣王曰願當君盛顏新序趙惠文王得楚和氏璧秦昭王遺趙王書願以十城易璧趙遣藺相如奉璧秦王無償城色相如使衣褐懷璧徑道亡歸史記婁敬隴西人過洛陽衣羊裘因齊人虞將軍求見上虞將軍欲為易其衣不肯曰臣衣帛衣帛見衣褐衣褐見遂見上說上西上貢禹上書云年老貧窮家資不滿萬錢妻子糠豆不瞻裋褐不完漢書張玄字處微有才略以世亂不仕司空張溫數以禮辟不能致溫以車騎將軍出征涼州將行玄自廬被褐帶索要說溫不能用後漢振褐皇甫謐字士安上書曰咎繇振褐不仁者遠矣晉書短褐穿結短褐穿結簟瓢屢空晏如也陶潛五柳先生傳澤父褐衣有澤父冠葭蘆之笠納蔍之履莎裳褐衣符子穀皮蠻夷取榖樹皮熟搥之以為褐廣州記世家多所宜欬唾自成珠被褐懷金玉蘭蕙化為蒭趙壹疾邪賦施於床上幬謂之帳爾雅帳張也張施於床上也小張曰斗形如覆斗也釋名帳中擊筑燕丹太子曰秦始皇置漸離于帳中擊筑綈帳秦時奢侈綈帳綺綉土木珠紫三輔舊事茅君當受神靈之職眾賓皆至忽然有素縑帳於屋下敷數重白氈金案玉杯人皆醉飽神仙傳茅君仙去民為立廟茅在帳中與人言上上以琉璃珠玉明月夜光雜錯天下珍寶為甲帳其次為乙帳甲以居神乙以自居漢武故事東方朔曰陛下誠能用臣朔之計推甲乙之帳燔之四達之衢漢書丞相公孫弘燕見上或時不冠至如汲黯不冠不見也上嘗坐武帳中黯前奏事上不冠望見黯避帳中使人可其奏其見敬禮如此史記馮魴永平中上行幸於諸國敕魴車駕發後將鞮騎宿玄武間複道上詔南宮複道多惡風寒老人居之且病靡苦內者多取帷帳東西竟塞諸牕望令致密東觀漢記五色帳大秦國金織成五色帳又有明月夜光珠帳魏略白珠帳斯條國王作白珠交結帳吳時外國傳呂布將辭袁紹還洛紹欲殺之明日當發紹遣甲兵三十人辭以送布布使止于帳則偽使人于帳中鼓箏紹兵臥布無何出帳去而兵不覺夜半兵起亂斫布床被謂為已死明旦紹訊問知布尚在魏志典韋拜都尉太祖引置左右將親兵數百人常繞帳晝立侍終日夜宿帳左右上疏帳蔣欽字公希拜左護軍權嘗入其內母疏帳漂被權嘆其貴而守約敕御府為母作錦被改易帷帳吳志張方兵入洛御寶織成流蘇武帳皆割分為馬矣晉後略許侍中顧司空俱作王丞相從事帝夜在丞相許戲二人歡極丞相便使入帳中眠願至曉猶展轉不得熟寐許上床便大鼾丞相因語諸客曰此中亦是難眠處耳郭子桓玄小會于西堂殿施絳綾帳鏤黃金龍御五色羽葆流蘇群臣切相語曰此頗似縛車亦王莽仙蓋之流晉令桓玄在南州妾當產畏風應須帳桓曰不須作帳可以到夫人故帳與之俗說絳文帳劉植詣石崇如廁見有絳文帳大床茵褥甚麗不得行乃更如他廁語林郗超為桓溫參軍時謝安王坦之當詣溫溫令超帳中臥聽安笑曰郗生可謂入幕之賓矣世說開帳拂褥卞範之為丹陽尹羊孚南州嘗還往卞許云下官疾動不堪坐卞便開帳拂褥羊逕上卞大床入被須枕卞乃迴坐傾睞移晨達暮羊去卞執手曰我以弟一理期卿卿莫負我上流蘇斗帳石虎御床辟方三丈冬月施熟錦流蘇斗帳四角安純金龍頭銜五色流蘇或青綈光錦或用緋綈登高文錦或用紫綈大小錦絲以房子錦百二十斤白縑裏名為裏複帳帳四角安純金銀鑿金香爐以石黑燒集和名香帳頂上安金蓮花花中懸金薄織成枕囊春秋但錦帳表以五色總為夾帳夏用紗羅或綦文丹羅或紫縠文為單帳鄴中記高祖圍廣固夜忽有鳥大如鵝蒼黑色飛入高祖帳中胡蕃起賀曰蒼黑胡虜之色胡虜歸我大吉之兆也明旦攻城陷之宋書吐谷渾王河南其國多善馬有屋宇雜以百子帳即窮廬也齊書煬帝北巡欲誇戎狄令宇文愷為大帳其下坐數千人帝大悅賜物千叚又造觀風行殿上容侍衛者數百人離合為之下施輪軸推移倏忽有若神功戎狄見之莫不驚駭隋書竹帳高祖時吳王杜伏威獻竹帳上以勞人不受唐書衙帳自破始畢可汗衙帳無故自破高祖曰此何祥也內史令蕭瑀進曰昔魏文帝幸許昌城門無故自壞帝惡而返其年文帝崩始畢帳壞即其類也高祖然之上李少君置武帝李夫人神影於帳中令帝觀見之桓譚新論翟酺上事云漢文帝連上事書囊以為帳惡聞紈素之聲益部耆舊傳元帝時奏太極殿施絳帳帝詔曰漢文以上書皂囊為帷冬月青布夏青疏晉令靈帝好胡服帳京師皆競為之後董卓擁胡兵掠宮掖風俗通蔡伯喈到江東得論衡中國諸儒覺其談論更遠嫌得異書求帳中隱處果得之抱朴子皂帳魏武帝愍嫁娶之僣上公卿適人不過皂帳傳子魏武遺令曰吾與妓女皆著銅雀臺上施六尺床練帳月朝十五輒向帳作樂蜀先主甘后坐于白綃帳中於戶外望之如月下聚雪拾遺錄交結帳斯調王作白珠交結帳金床上殿天竺佛精舍天竺王見珠圓好意欲留臣下諫乃止吳時外國傳烏練帳東齊夏施烏紗帳四率坊洗馬坊烏練帳上晉朱黃祖奉親至孝母病篤天漢開明有一老公將小兒持箱自通即以兩丸藥賜母服之患頓消因停宿夜中聽事上有五色氣際天琴歌清好祖往視之坐大帳裏四角及頂上各有一大珠形如鵝子明彩炫燿幽明錄虎帳左哀十七衛侯為虎帳于藉圃琉璃帳董偃常臥延清之室設紫琉璃帳拾遺記成帝設雲帳雲幄雲幕於甘泉紫殿世謂之三雲殿西京雜記歸藏曰昔女媧筮張雲幕而攸占神明帝為后別開遠條館賜紫茸雲氣帳后以真蠟矢獻萬年蛤粧五成金霞帳帳中常若滿月趙飛燕外傳隋煬帝建迷樓樓上設四寶帳一曰散春愁二曰醉忘歸三曰夜酣香四曰迎秋月皆雜寶所成南部烟花記武后時嬖臣張易之為母臧作七寶帳有魚龍鸞鳳之形李嶠當則天朝拜相帝幸宅見臥青絁帳賜御用繡羅帳嶠臥不安席明日奏少時相者謂不當華欲用舊知命錄慘紫帳武侯常御紫宸殿設慘紫帳玄宗皇后王氏廢為庶人當時王作翠羽帳賦帝五王帳帝友愛至厚殿中設五幄與諸王處號五王帳明皇傳鏁鏁楊國忠鏁子帳希世之寶時人不能計其直上白紬帳酷吏吉溫楊國忠當國引拜京畿關內採訪使安祿山敕吏設白紬帳于傳以俟命元載芸暉堂戶牖內設紫絹帳得於南海溪洞中酋帥則鮫綃之類也輕疏而薄如無所礙雖屬凝冬而風不能入盛暑則涼自至其色隱隱焉忽不知其帳也謂臥內紫氣也杜陽雜編金絲帳元載寵姬薛瑤英載為處金絲帳玳瑁帳武宗起望仙臺玳瑁帳珠玉帳李蔚咸通十四年詔迎佛骨乃以珠玉為帳連珠帳同昌公主堂中設連珠之帳續珍珠為之也杜陽編錢鏐夫人常以王寢帳墮裂乃造青縑帳將易之王曰作法於儉猶恐其奢但慮後代皆施錦繡耳卒不用吳越備史幕掩幔幕也說文幔漫也漫漫相連綴之言也釋名幔掩也廣雅周穆王時鸞章錦幔者摩連國獻馬錦文如鸞翔拾遺記岑彭與吳漢戰隗囂壅谷水以縑幔盛土為堤灌城東觀漢記吳主趙夫人巧妙無雙權居昭陽宮倦暑乃褰紫綃之帷夫人曰此不足貴也權使夫人出其意思焉答曰妾欲窮慮盡思能使下綃帷而清風自入視外無有蔽礙列侍者飄然自涼若御風而行權稱善夫人乃折髮以神膠續之神膠出鬱夷國接弓之弦百絕百續乃織為羅縠累月而成裁之為幔內外視之飄心如烟氣輕動而房內自涼時權尚軍旅常以此幔自隨以為征幕舒之則廣縱一丈卷之則可納于枕中時人謂之絲絕拾遺記晉安王子勛叛逆取所乘車除腳以為輦其夕有鶚集其幔宋書曹景宗為揚州刺史性躁動不能沉默出行常欲褰車帷幔左右輒諫以位望隆重人所具瞻不宜然景雲謂所親曰我昔在鄉里平澤中逐麞數肋射之此樂使人忘死不知老之將至今來揚州作貴人動轉不得路行開車幔小人輒言不可閉置車中如三日新婦此悒悒使人氣盡梁書隔幔出妓柳惔甚重婦頗成畏憚性愛音樂女妓精麗略不敢視僕射張稷與惔狎密而為惔妻敬賞稷每諳惔先相聞夫人惔每欲見妓但因稷請奏其妻隔幔坐妓然後出惔因得留目上苻堅以太常韋逞母宋傳其父業得周官音義乃就家立講堂書生百人隔紗幔而授業焉秦記黑幔繞車陸機夢黑幔繞車手決不開至明見誅別傳庾太尉亮有儿年數歲溫太真常隱幔坦之驚曰此兒神色恬然乃徐跪曰君侯何以為論者乃謂不減于亮世說將冬不服裘夏不操扇衣天雨不張幔蓋名曰禮將不躬禮以知士卒寒暑也六韜戰時皆取船上布幔布衣漬水中積聚之賤有炬炎箭以掩滅之軍令幌帷屏風之屬說文洛陽城十八觀皆籠雲母幌洛陽記幬幬單帳也說文黃昌夏多蚊貧無幬傭債為作幬謝承後漢書羊續為廬江太守臥一幅布幬穿敗糊紙補之上楚將子發求伎道之士楚有善為偷者願以伎自效子發禮之後齊伐楚偷乃夜解齊將之幬獻之子發因復還之齊將懼而退淮南子魏武帝少時常與袁紹好為遊俠觀人新婚因潛入主人園中夜叫呼云有偷兒賊青廬中人皆出觀帝乃抽刀劫新婦與紹還出失道入棘林中紹不能動帝復大叫云偷人今在此紹遑迫自擲出遂俱免世說戶幃簾廉也自障蔽戶廉恥也釋名簾戶蔽也聲類戶幃曰簾通俗文宋魏陳楚謂之曲或謂之麴自關以西謂之箔南楚謂之篷簿楊子方言嚴君平筮卜成都市日得百錢則閉肆下簾而授老子漢書夏侯亶性節儉不事華侈廉頗好音樂有妓妾數十人無被服姿容每有客常隔簾奏樂時謂簾中夏侯妓衣梁書織簾先生沈麟士字雲禛有高尚之心居貧織簾誦書號為織簾先生齊書柳世隆善卜別龜甲價至萬永明初世隆曰永明九年我亡後三年丘山崩齊亦於此季矣屏人命典籤李黨取筆及高齒屐題簾箔旌曰永明十一年因充涕謂黨曰汝當見吾不見也上張嘉貞蒲州猗氏人也弱冠應五經舉拜平鄉尉坐事免歸侍御史張循憲為河東採訪使薦嘉貞材堪憲官請以已之官秩授之則天召見垂簾與之言嘉貞奏曰以臣草萊而得入謁九重是千載一遇也咫尺之間如隔雲霧竟不覩日月恐君臣之道所有未盡則天遽令卷簾與語大悅擢拜監察御史唐書粗竹織成尚書李廙有清德其妻劉宴妹也宴常造廙見其門簾甚弊乃指度廣狹以粗竹織成不加緣飾將以贈廙三攜至門不敢發而去國史補王鍔為淮南程作有法軍中無一棄物至故簾亦令收之他日付船坊以為笠箬他皆如此唐書漢武元鼎元年甘泉宮起招仙靈閣編翠羽麟毫以為簾洞冥記漢諸陵寢皆以竹為簾畫布為水文及龍鳳之象西京雜記織珠為簾昭陽殿織珠為簾風至聲如珩珮上范滂被收曰願得一幡簿埋于首陽山上不負黃天下不愧夷齊汝南先賢傳布純簾箔皆以青布緣純晉東宮故事石虎于太武殿前起樓高十丈結珠為簾垂五色玉珮風至鏗鏘和鳴拾遺記金玉為簾明光宮在漸臺西以金玉珠璣為簾箔三秦記白珠簾呂纂時胡人發張駿冢得白珠箔簾叚龜龍涼州記戴明寶歷朝寵倖家累千金大兒驕淫為五色珠簾明寶不能禁謝綽宋拾遺緯蕭河上有家貧窮緯蕭以為業莊子伍子胥將欲見吳王而不得客有言之于王子光者王子光見而惡其貌客以告子胥曰此易改也願令王子光重帷堂上而見其衣王子光許之子胥說之半王子光舉帷摶其手而與之坐呂氏春秋障圍在旁曰帷說文帷圍也以自障圍也釋名絺帷孔子見衛靈公夫人夫人在絺帷中而拜史記連袵蘇秦說齊宣王曰臨淄之眾連袵成帷上運籌高祖曰運籌帷幄之中決勝千里之外子房功也帷帳文綉文帝帷帳不得文綉上班始尚陰城公主公主順帝之姑貴驕淫亂與所嬖居帷中而始入便伏床下華嶠後漢書董仲舒為博士下帷講弟子以次相授或莫見其面三年不窺舍園史記離宮帷帳秦越咸陽西至雍離宮三百帷帳不移而具漢書周帷成都侯王商弟內池大以行船立羽蓋張周帷上集囊為帷東方朔上疏云文帝集上書囊為殿帷上更始委政趙萌日夜與婦人飲宴後庭群臣欲言事輒醉不能見時不得已令侍中坐帷內與語諸將識非更始聲出皆怨曰成敗未可知遽自縱放若此獻帝出長安李催來追董承懼射之以被為帳幔袁宏漢記賈琮為冀州刺史垂帷而行及至州曰刺史當遠視廣聽反垂帷以自掩蔽命褰帷上伏兵帷中孫峻欲誅諸恪置酒伏兵于帷中吳志穆宗立年始二歲皇太后褚氏設白紗帷于太極前殿起帝臨軒晉書披帷人在袁粲每經傳昭戶輒嘆曰經其戶寂若無人披其帷其人斯在豈非名賢乎宋書毛惠素為少府卿性孝母服除後更修母所住處幃屏每月朝十五向帷悲泣傍人為之感傷終身如此齊書七月七日宮掖之內張雲錦之帷燃九光之燈候西玉母至也王母以紫錦帷漢武內傳淮南王見八公至足下及屐迎之登思仙之臺張綺羅之帷神仙傳繡帷趙飛燕為皇后第上遺金錯繡帷西京雜記漢安帝好微行于郊埛間或露宿起帷宮千間皆用錦罽文繡拾遺記覆帳幬也說文大帷廣韻覆帳謂之幄小雅幄屋也以帛衣板施之形如屋也釋名大帷在上曰帟四旁及上曰帷上下四方悉周曰幄幄大帷也三禮圖幕人幄帟注帷幕皆以布為之四合象宮室曰幄至所居之幄也周禮楚子伐鄭諸侯還救鄭晉侯使張骼輔躒致楚師求御于鄭鄭人卜宛射犬吉大叔曰不然部婁無松柏二子在幄坐射犬于外襄二十四子產子大叔相鄭伯以會子產以幄幕九張行子大叔以四十既而悔之每舍損焉及會亦如之昭四虎幄衛侯為虎幄于籍圃哀下燕昭王二年廣延國來獻善舞者二人一名旋波一名提謨并玉質凝膚王處以單綃華幄拾遺記見后未央宮置酒令內者為傳太后張幄坐于大皇后旁王莽案行責內者令曰定陶太后藩妾可得與至尊并撒去更設坐傳太后聞之大怒不肯會漢書雲幄成帝設雲幄雲幕於甘泉紫殿世謂之三雲殿西京雜記幄後對泣漢末黃門張讓叚珪等于靈帝幄後相對泣帝驚問尚復幾時哉于是大收諸黨物理論紺幄豋祭天紫壇有紺幄帳漢書儀在裏幕幄也廣雅幕絡也在裏之稱也釋名幄在上曰幕蒙之覆案食亦曰幕說文幕人掌幕人掌帷幕帟綬之事周禮天官下幕有烏楚子元伐鄭師夜遁諜告曰楚幕有烏乃止莊下燕巢幕上吳季札來聘過衛夜宿于戚聞鐘聲季子曰異哉夫子之在此猶燕之巢于幕上而可以樂乎文子聞之終身不聽琴瑟襄六幕蒙晉人執季孫意如以幕蒙之昭四晏子復於景公曰且合升斗之微以滿倉廩合疏縷之緯以成帷幕說苑孔子反衛見夫人在錦帷中孔子北面稽首夫人自帷中再拜環珮之聲璆璆然魚豢典略幕府衛青征匈奴大尅武帝就拜大將軍于幕下府中因號幕府漢書李夫人既死帝思之命工人作夫人形狀置于輕紗幕中宛然如生帝大悅漢武內傳漢武帝好微行於太液池傍起宵遊宮以漆為柱鋪黑綈之幕器服乘輿皆尚黑色拾遺記上飯加幕明德馬皇后既處椒房太官上飯重加幕覆輒撒去東觀漢記郗超字嘉賓桓公與謝安論大事令超臥帳內聽之風動帳開安笑曰郗生可謂入幕之賓晉書劉穆之孫瑀仕官甚不得意至江陵與顏崚書曰朱修之三世叛兵一旦居荊州青油幕下作謝宣明面見向宋書杜暹為監察御史往磧西覆屯蕃人賫金以遺暹固辭不受左右言不可逆其情乃受而埋之幕下既去乃移牒令取之唐書劉歆與楊子雲書曰蕭何造律張蒼撰歷皆成於帷幕貢於王門律曆成淮南八公詣淮南王安門皆鬚眉皓素王欲少者八公皆成十五六童子門吏以白安聞之不及履即出迎之以登思仙之臺張綺羅之幕設象牙之席葛洪仙傳江都王釗字延年為將善綏御眾寢止布幕而已漢書帟小幕曰帟張在上帟帟然也釋名掌次曰師田則設重帟周禮君於士有賜帟檀弓上薦首枕臥為所薦首者也說文視枕孝已一夕五起視親衣之厚薄枕之高下尸子越王問范子曰寡人已聞陰陽之事穀之貴賤可得而知乎曰陽者主穀貴陰者主榖賤故當寒而不寒榖之為暴貴當溫而不溫榖之為暴賤王曰善書之帛藏之枕中以為國寶范子曰堯舜禹湯皆有預見之明雖有凶年而民不窮王曰善以丹書置之枕中以為邦貴越絕書楚靈王敗于乾谿王親獨行彷徨於山林之中三日乃見其涓人疇王呼之曰予不食三日矣疇趣而進王枕其股以寢于地王寐疇枕王以璞而去之國語楚將子發好伎道之士有善偷者往見子發子發禮之無幾齊伐楚偷夜出盜其齊將軍枕歸之明夕復取其簪又以歸之齊師大駭還師而歸淮南子淮南有枕中鴻寶苑秘書書言使鬼物為金之術及鄒衍重道延命方世人莫知劉更生父德於武帝時治淮南獄得其書更生以為奇獻之言黃金可成上命典尚方鑄作事費甚多方不驗漢書神枕秦山父者漢武帝東巡狩見父頭頂白光高數尺帝呼問之曰有道士教臣作神枕枕有三十二竅二十四氣八竅應八風臣行之轉少而齒生神仙傳直臺無枕樂崧天性樸忠家貧為郎嘗獨直臺之無被枕又凡食糟糠帝每夜入臺輒見崧問其故甚嘉之自此詔太常賜尚書以下朝夕食給幃帳後漢魏高昌有白鹽其形如玉高昌人取以為枕貢之中國上蘇則為侍中董昭嘗枕則膝臥則推下之曰蘇則膝非佞人枕也魏志張紘作柟榴枕賦陳琳在此得之因以示士人曰此吾鄉里張子幼作也吳書玉枕自防王敦鎮豫章為王澄以舊意所侮敦益忿怒請澄入宿陰欲殺之而澄左右二十人持鐵馬鞭為衛軍校恒提玉枕以自防故敦未之得發後敦賜澄左右酒皆醉借玉枕觀之因下床而謂澄曰何與杜弢通信敦令力大路戎攝殺之晉書筮者謂董豐曰君憂獄遠二枕避三沐豐既歸妻具枕授沐豐皆不從其夜果誤殺妻也上寧州嘗獻𤽾魄枕光色甚麗時北征以𤽾魄治金瘡上大悅命擣碎分諸將宋書武帝紀武昌王渾少而凶戾為中書令每夕裸身露頭往散騎省戲因彎弓射通直郎周郎中枕以為笑樂上朱齡石少好武不事崖險舅淮南蔣氏才劣齡石使舅臥廳事剪紙方一寸帖作枕以刀子懸擲之相去八九尺百擲百中舅畏齡石終不敢動上陳顯達建武世心懷不安侍宴酒後啟上借枕帝令與之顯撫枕曰臣年已老富貴已足唯少枕枕死特就陛下乞之上失色曰公醉矣南史郎基字世業清慎常語人曰任官之所木枕亦不須作况重於此者也北齊擲枕起入王茂為雍州長史人或譖茂反武帝弗之信令鄭紹叔往候之遇其臥因問疾茂曰我病可耳紹叔曰都下殺害日甚使君家因塗炭今欲起義長史那猶臥茂因擲枕起即袴褶隨叔入見武帝梁書長枕玄宗嘗製大被長枕與寧王憲申共之唐書貴妃姊虢國夫人豪侈尤甚所枕照夜枕不知其價夜中照廡其光如晝上龜文枕趙飛燕為皇后其女弟上遺以琥珀枕龜文枕西京雜記中山劉玄暮忽見一人着烏袴褶取火照之面首無七孔面莽當然乃請師筮之師曰此是君家先世物久則為魅劉因執縳刀斫數下變為一枕乃是其先祖之枕集異記魏咸熙二年宮中夜夜有異獸或吼呼驚人乃有傷害者詔使宦者闇中伺候有白虎毛色凈密以戈投虎即中左目俄而往取虎已隱形更搜覔乃於藏中得一玉虎頭枕左目有血帝嗟其大異問諸大臣答云昔漢誅梁冀得玉虎頭枕一枚云此枕單池國所獻臆下有篆書字云是帝辛之枕嘗與妲己同枕之是殷時遺寶也凡珍寶久則生精靈必神物憑之也拾遺記覆被衾大被也說文被所以被覆人者也衾六也其下廣大如六受人也釋名翠被楚子次于乾谿雨雪楚王皮冠秦複陶翠被豹舄執鞭以出襄三綉被鄂君乘青翰之舟張翠蓋之華越人擁楫而歌曰山有水兮木有枝心悅君兮君不知於是鄂君舉綉被而覆之說苑黔婁先生死被短露足孔子及門人見之謂其妻曰寧使正之不足不可斜之有餘家語汲黯云公孫弘位至三公俸祿甚厚為布被此詐也王問弘弘謝曰有之夫九卿與臣善者無過黯然今日廷詰臣誠中臣之病夫以三公為布被飾詐以釣名且臣聞管仲相齊有三歸侈擬于君桓公亦霸是嬰相景公食不重肉妾不衣絲齊國亦治今臣位為御史大夫而為布被自九卿以下至小吏無差誠如黯言且無汲黯忠陛下安聞此言天子以為謙讓愈益厚之史記臥牛衣王章字仲卿疾無被臥牛衣中上誣臥錦皮廣川王去嘗疾妃昭信甚妒王愛姬陶望卿昭信妒之譖於王曰望卿數窺郎吏疑有姦又誣望卿言節中令臥錦被王信之擊殺之漢書李夫人病篤上自臨候之夫人蒙被謝曰妾久寢病形貌壞不可以見帝願以王及兄弟為託上綉被霍光夢詔賜綉被百領上布被祭遵奉公家無私財布被夫人裳不加綵後漢宿直無被樂崧為郎獨宿直臺上無被帝乃推被與之華嶠後漢書去官無被范丹為萊蕪長去官無被空囊自隨上京兆朱寵字仲威為太尉家貧臥布被朝廷賜錦被臥兼布被上羊續字興祖為南陽太守以清率下唯臥一幅布綯禂綯敗糊紙補之上王良為大司徒在位恭儉妻子不入官舍布被瓦器東觀漢記馮豹字仲文後母惡之嘗因豹夜臥引刀斫之正值其起中被獲免上馮豹每奏事未報伏省閣下或從昏至明天子默常使小黃門持被覆之曰勿驚之上文帝詔朝臣三代大夫知被服五代大夫知飲食此言服被飲食難曉也魏書景帝有目疾文鴦之來攻驚而目出懼六軍恐蒙以被痛甚齧被破晉陽秋魏舒為尚書郎或以當時郎官多非其才有沙汰之言舒乃曰吾即其人也撲被徑出同僚素無清論者咸有愧色晉書楊駿被誅初駿徵高士孫登遺以布被登截被於門外大呼曰斫斫刺刺旬日託疾詐死及是其言果驗上光逸字孟祖為博昌縣令使之冒雨還遇令不在逸解衣臥衾被中令還詰之逸曰衣單冒雨如不易衣勢必凍死奈何惜一被而殺一人耶令奇之而不問上祖逖字士雅與劉琨共被寢中夜聞雞鳴蹴琨覺曰此非惡聲也因起舞上去任被襆吳納為吳興守徵為尚書去任有被襆而已禿髮烏孤祖壽闐之在孕母胡掖氏因寢而產於被中鮮卑謂被為禿髮因而氏焉虞龢位在中書郎廷尉少好學居貧屋漏恐濕墳典乃被舒覆書書獲全而被大濕時人以比高鳳沈麟士以揚王孫皇甫謚深達生死而終禮矯俗乃自為終制遺令氣絕剔被取三幅布以覆屍反斂仍移布於屍下以為斂服反被左右兩際以周上上遺被牽去沙門釋寶志王亮欲以衲被遺之未有言及寶志忽來牽被而去上羅研齊茍兒之後臨汝侯嘲之曰卿蜀人樂禍貪亂一至於此對曰蜀中積弊實非一朝百家為材不過數家有食貪亂樂禍無足多怪若令床上有百鉤布被甑中有數升麥飯為肯為亂乎上裴之橫字如岳少好賓重氣俠不事產業兄之高以其縱誕乃為狹被蔬食以激厲之之橫嘆曰大丈夫富貴必作百幅被後為吳興守作百幅被以成其志梁書高宗時豫州獻織成羅文錦被詔於雲龍門外焚之陳書鴛鴦被趙飛燕為皇后其女弟上遺鴛鴦被西京雜記姜肱字伯淮事繼母年少肱兄弟感凱風之孝同被而寢不入室以慰母心也海內先賢傳傳信字子思遭父喪哀慟骨立母憐之竊以錦被蒙其上林宗往弔之見被謂之曰卿海內之雋四方是則如何當喪錦被蒙上郭奮衣而去自後賓客絕百許日語林邊讓字元禮才辨俊逸孔融薦於魏武曰邊讓為九州之被則不足為單衣襜則有餘別傳長安孫晨家貧為郡功曹十月無被夜臥蒿束晝收之京兆故事王忳字少林於客舍見諸生疾甚甚困謂忳曰腰下有金十斤願以相與乞收藏屍骸未及問其姓名呼吸困絕忳賣金一斤以給棺柩餘九斤置生腰下後署大度亭長到亭有白馬一疋入亭中其日大風有一綉被隨風而來從忳乘馬馬突入金彥父家彥父見曰真得盜矣忳得說之狀又取被示之彥父曰卿有何陰德忳曰念葬諸生事且說形狀彥父曰真我子也忳即以被馬歸之彥父不受遣迎生喪金具存焉益都耆傳江夏孟宗少遊學與同學共處母為作十二幅被其鄰婦怪問之母曰少兒無異操懼朋類之不顧大其被以招貧生之臥庶聞君子之言耳列女傳二幅桓任後母酷惡常憎任為作二幅箕踵被本傳君曾新作被暖眠不覺晏起乃嘆暖眠使人忘起異事因命着陌上有寒苦人舉被乞之常眠布被中杜祭酒列傳親親有窮老者略或推被以恤之竟寒不解帶而寢孫略別傳魏武云我眠中不可妄近近輒斫人不覺左右宜慎之後乃陽凍眠所幸小兒切以被覆之因便斫殺自爾莫敢近之語林羊太常辛夫人字憲英性不好華從外孫胡母楊上夫人錦被夫人取反臥之夏侯孝子集晉惠帝至朝歌無被中黃門以兩幅布被給帝起居注小暮取被殷浩作楊州尹行日小暮使令左右取被襆人問其故答云刺史嚴不敢夜行郭子蔣欽為右將軍孫權嘗入其內母練帳縹被權嘆其在貴守約勑御府為其母作錦被改易帷帳吳志晉庾冰輔政及卒無絹為衾齊宗室赤斧為太子詹子及卒無絹為衾武帝嘆惜康福自言沙陀種有疾臥閣中寮佐入問疾見錦衾相顧竊戲曰錦衾爛兮福聞之怒曰安得謂我為奚五代史同昌公主堂中設神絲繡被繡三千鴛鴦間以奇花異葉其精巧華麗絕比其上絡以靈粟之珠如粟粒五色輝映唐司馬子微洛州溫人廬天台不出睿宗命其兄承禕就之錫寶琴霞紋被還山灊溪績書斷南方之酋豪多選鵝之細毛夾以布帛絮而為被幅縱橫納之其溫柔不下于挾纊也俗云鵝毛被柔而性偏冷宜覆嬰兒兼辟卒驚癇唐劉恂嶺表錄異地日國薦蛟毫之白褥以蛟毫織為褥也此毫柔而冷常以夏日舒之因名柔毫褥洞冥記元和八年大軫國貢神錦被冰蠶絲所織也方二丈厚一寸其上龍文鳳彩殆非人工得水則舒遇火則縮杜陽編古詩客從遠方來遺我一端綺文綵雙鴛鴦裁為合歡被著以長相思緣以結不解鄭愚津陽門詩象床塵埃罨靸被注上在華清日罨颯公主嘗與上晨聽按水心調愛王起晚遽自真珠被而出及寇至倉惶隨駕出宮后不之省及上歸南宮一旦入此中而當時罨畫之被宛然塵積矣茲爾雅曰褥謂之茲褻辱褥人所坐褻辱也釋名虎皮茵車中所坐用虎皮也上紫羅文褥周穆王時紫羅文褥者壇孫國所獻拾遺記周靈王起昆昭之臺設狐腋素裘紫羆文褥羆褥是西域所獻也施於臺上坐者皆溫上錦茵尉佗臥象床錦茵南越傳霍禹廣治第室作乘輿輦加綉茵飾以金塗韋絮輪漢書鴛鴦褥趙飛燕為皇后其女弟上遺鴛鴦褥西京雜記重茵祭遵有病詔賜重茵東觀漢記錦緣石虎作褥長三丈用錦緣之鄴中記大將軍收周侯至石頭坐南門石盤上將戮之送已褥與周語林補衲茵褥太祖性節儉帷帳屏風壞則補衲茵褥取溫無有緣飾魏志王朗上疏曰老臣慺慺願國家同祚於軒轅之伍某少小常苦被褥泰溫則不能使軟膚弱體是以難可防護而易用感慨若常全小縕袍不至於甚厚則必咸保金石之性而比壽於南山矣上孟仁字恭武江夏人也從李誘學其母為作厚褥大被人問其故母曰小兒無德客多貧為廣被大褥吳錄晉孝武年十三四時冬天晝日不著衣夜則累茵褥謝公云體宜令常和陛下晝過冷夜過熱恐非攝生之術帝曰夜靜宜溫謝公出而嘆之世說蒲褥宗則高尚不仕王儉亦雅重之贈以蒲褥筍席齊書禇彥回弟澄為左右尚書彥回薨澄以錢一萬一千就招提寺贖高帝所賜彥回白豹坐褥上柳慶遠為儀同初慶遠從父兄世隆嘗謂慶遠曰吾夢太尉以褥席見賜吾遂亞台司通又夢以吾褥席與汝汝必光我門族至是慶遠亦繼世隆焉太尉謂元景也上爾朱世隆將被誅此年正月晦日令僕並不上省西門不開忽有河內太守因帖家奴告省門亭長云今且為令王借車牛一乘終日于洛濱遊觀至晚王遣省將軍自東掖門始覺車上無褥請為之記識後魏書詔賜席褥丁潭以光祿大夫歸第詔賜床帳席褥會稽先賢傳北方有冰萬里厚百丈奚鼠在永下土中其毛長八尺可以為褥也神異經蛩蛩毛可以為氈說文細氈氈旃也毛相著旃旃然也釋名氈細罽也集韻氈綈漢武帝以氈綈藉地惡轍之喧也拾遺錄蘇武使匈奴匈奴絕不與食天雨雪武臥齧雪與氈毛裹咽之漢書王吉諫昌邑王遊獵曰夫廣廈之下細氈之上明師居前勸誦在後上論唐虞之際下及殷周之盛其樂豈銜橛之間哉上江都王女細君歌云遠適異國烏孫王穹廬為室氈為壇上李勝為荊州刺史往辭太傳曹爽因察之太傅曰謬問勝曰荊州有佳氈可致之勝出曰太傳毛無能為也魏志鄧艾伐蜀自陰平行無人之地鑿山通道作橋以氈自裹推轉而下上置鍼氈中杜預子錫為愍懷太子舍人屢直諫於太子太子患之置鍼於錫坐處氈中錫上刺足血出晉書慕容熙后符氏慕容隆妻張氏熙之嫂也美姿容有巧思熙將以為符氏之殉欲以罪殺之乃毀其禭鞾中有弊氈遂錫死三女叩頭求哀熙不許載記太康中天下以氈為陌頭及帶身袴口於是百姓相戲曰中國其必為胡所殺也夫氈胡之所產也而今天下以為陌頭帶身袴口胡既三制之矣搜神記桓豹奴病勞冷無氈可臥桓車騎自撒已眠氈與之俗說王子敬在齋中臥偷人取物一室之內略盡子敬臥而不動偷遂登榻欲有所覓子敬因呼曰偷兒石染青氈是我家舊物可特置否於是群偷置物驚走語林孔奐為晉陵太守清白自守妻子並不之官唯以單船臨郡所得秩俸隨即分瞻孤寡郡中號曰神君曲阿富人殷綺見奐居處儉業乃餉以衣氈一具奐辭不受齊書裴寬與東魏將彭樂戰於新城因傷被擒至河陰見齊文襄寬舉止閒雅善于占對文襄甚賞異之解鎖付館厚加禮遇寬乃裁所臥氈夜縋而出因循還北齊書清河三年周師及突厥至并州突厥謂周人曰爾言齊亂故我伐之今齊人服中有鐵何可當耶遂還至陘嶺凍滑乃鋪氈以渡之上綦雋佞巧能候當途斛斯椿賀拔勝皆與友善性多詐賀拔勝出鎮荊州過雋別因辭故見敗氈弊被更遺之錢物上大花氈羗女人被大花氈以為盛服廣志夫胡人見麻不知其可以為布越人見毳不知其可以為氈故不通於物者不可與言俗淮南子被毳夫荷旃被毳者難與道純緜之麗密聖主得賢臣頌純絲也謂織為繒帛之麗絲纊之密也注比肩氈陸雲詩曰冬坐比肩氈比肩獸名也絳紫氈調斯國有石青染氈絳紫氈日南傳竹席簟竹席也說文簟簟也布之簟然正平也釋名簟宋魏之間謂之笙或謂之籧曲自關而東謂之簟其精者謂之籧篨行唐自關而東周楚魏之間謂之倚佯自關而西謂之行唐方言象牙簟武帝以象牙為簟賜李夫人西京雜記尚書令王允奏曰太史令王立說孝經六隱事能消却姦邪常以良日允與立入為獻帝誦孝經一章以丈二竹簟盡九宮其上隨日時入焉及允被害乃不復行也東觀漢記玉恭字孝伯與王忱齊名友善恭有六尺簟忱見之謂其有餘因求之恭輒以送遂坐薦上忱聞而大驚恭曰吾平生無長物晉書象牙細簟車永為廣州刺史永子溢使工作象牙細簟工患之也王隱晉書金簟林邑王永明九年遣使貢獻金簟等物蕭子顯齊書席之上先萑簟樽之上先玄酒先王貴之先本而後末也淮南子䨥文簟太子納妃有赤花䨥文簟東宮舊事流黃簟會稽獻竹簟供御世號為流黃簟西京雜記今致八尺文二細桃枝簟十枚黃篾雙文簟二領黃篾獨坐雙文簟一枚庾翼與王書桃枝細簟馬棱為會稽太守詔詰會稽車牛不務堅強車皆以桃枝細簟東觀漢記桃笙象簟韜於筒中吳都賦注桃笙桃枝簟也吳人謂簟為笙又象牙以為簟楚簟楚簟陳於玉房巴箱列於椒臺王鑒竹簟賦薦藉薦藉也禮天子諸侯有黼黼純說文薦所以自薦藉也蒲草也以蒲作之其體平也席釋也可卷可釋也釋名黃帝詔使百辟群臣受德教者先列珪玉於蘭蒲席上拾遺記禹為蔣席頗緣此彌侈矣而國不服者三十三服作茵席雕文彌侈矣國之不服者五十三韓子降席舜不降席而天下治桀紂不降席而天下亂子思子文綺席桀紂之時婦人坐文綺之席衣以紈綺之衣六韜武王踐祚席前左端之銘曰安樂必敬前右端之門曰無行可悔後左端之銘曰一反一側亦不可以忘後右端之銘曰所鑒不遠視邇所代大戴禮穆王時西王母來敷碧蒲之席黃筦之薦莞色若金拾遺記滅葭景公獵休坐地而食晏子後至滅葭而席公不悅曰子獨席何也對曰臣聞介胄坐不獄席訟不席二者皆憂也臣故不敢以憂侍坐公曰善令大夫侍席晏子景公飲酒移於晏子晏子曰夫鋪薦席陳簠簋者有人臣不敢與焉又移於司馬穰苴司馬穰苴曰鋪薦席陳簠簋者有人臣不敢與焉上捐席文公至河令席衽捐之咎犯聞之曰席蓐所臥也而君棄之臣不勝其哀韓子趙簡子謂左右曰車席泰美夫冠雖惡頭必戴之屐雖善足必屐之今車如此其大美也吾將何以屐之且夫美而祀上妨義之道也上衛嗣公時有人於令左右縣令發褥而席弊嗣公令人遺席曰吾聞汝發褥而席弊其賜汝席縣令大驚以君為神上舍者避席陽朱南之沛至梁遇老子老子曰睢睢盱盱而誰誰與居夫太白若辱盛德如不足陽朱曰聞命矣其往也舍者避席其來也煬者與之爭竈列子申屠嘉兀者也與鄭子產同師伯昏瞀人合堂同席而坐莊子衛靈公天寒鑿地宛春諫曰天寒起土恐傷民公曰天寒乎宛春曰公衣狐裘坐熊席陬隅有竈是以不寒呂覽不重席孟獻伯相魯不坐重席韓子三經席孔子困於陳蔡之間居環堵之內坐三經之席說苑仲尼之畜狗死使子貢埋之曰丘也貧無蓋與之以席檀弓艾席老萊子親沒隱蒙山之陽枝木為床薦席坐之皇甫謐高士傳馬薦席蘇秦激張儀令相秦以馬薦席坐之史記任安田仁俱為衛將軍舍人居門人衛將軍從此兩人過平陽至主家令兩人輿騎奴同席而坐此二子拔刀斷席而坐主家皆怪而惡之莫敢問也上弊席陳平以弊席為門上莞蒲為席文帝以莞蒲為席漢書元帝病史丹以親密侍候上獨寢直入臥內頓首伏青蒲上上更始至長安居長樂宮升前殿郎吏以次列庭中更始羞怍俯首刮席不敢視後漢來歙征隗囂徑至洛陽斬囂守將金梁因保其城囂乃悉兵圍略陽築堤灌城歙固守矢盡發屋斷木為兵上自將上隴囂眾潰走於是置酒高會勞賜歙班坐絕席在諸將之上上未嘗賜席鄧訓於閨門甚嚴兄弟莫不敬憚諸子進見未嘗賜席接以溫色上趙丙有術曾至渡頭求船不得乃布席於水而坐呼風乃過上織席自給李恂遷武威太守坐事免織席自給上持蒲編席郭丹師事公孫昌敬重常持蒲編席人異之東觀漢記諸將絕席王常為橫野大將軍位次與諸將絕席上寒自溫席黃香家貧躬執勤苦盡心供養暑則扇床枕寒則自溫席上張禹為太傳尚書鄧太后以殤帝初育欲令重臣居禁內乃召禹與三公絕席上宣秉建武元年拜御史中丞上持詔御史中丞與司隸校尉尚書令會同並專席而坐故京師號曰三獨坐上戴憑徵博士詔公卿大會群臣皆就席憑獨立世祖問其故憑對曰博士說經皆不如臣而坐居臣上是以不得就席令與諸儒難說帝善之後正旦朝賀令群臣說經更相難詰義有不通輒奪其席以益通者憑重五十席京師議曰解經不窮戴侍中謝氶後漢書坐重八九席殷亮為博士講學大夫諸儒論勝者賜席亮坐重八九席帝曰學不如是也上拔刀斷席許敬字鴻卿其鄉吏有誣告者會於縣令坐敬拔刀斷席曰敬不忍與惡人同席上汝南薛惇字子禮為北海長史家貧坐無完席妻曰君無俸祿給子孫使無完席耶惇以善者與妻自坐其敗者上衛良字叔賢拜尚書令病罷官還家家無完席賓客省之者坐桑下談論飲水去上坐於凍地袁尚袁熙奔遼東公孫康先置精勇於廄中請熙尚熙入乃縛之坐於凍地尚寒求席熙曰頭顱方行萬里何席之為典略織席為業先主少孤母販履織席為業蜀志坐無空席王渾為將軍鎮壽陽虛懷撫士坐無空席晉書陶侃字士衡親人過宿侃時大雪無草侃母湛撒床雜薦手挫給客牛馬王隱晉書褁以席王敦死裹以席塗以蠟埋齋中晉中興書不用綠緣立敬后廟薦席不用綠緣晉建武起居注高祖廆年十五出避難追者急走避民家入其屋以席自障追者入屋發視無所見遂免前燕錄林邑王陽初在孕其母夢生兒有人以金席藉之其色光麗夷人謂金之精者為陽邁中國云紫磨者因以為名宋書元嘉中劉禎為御史中丞奏風聞廣州刺史韋朗於州部作蒐白席三百二十領請以事追免朗官宋起居注劉璡字子敬映介好禮嘗與故人共車於津陽內見一女子容姿甚麗盼睞之璉因抽坐席懸車中以隔絕之其正如此吳均齊春秋玄宗子頴王璬為劍南節度大使玄宗將幸蜀遣璬先赴本郡渡綿州江乘船見以綵緣席而藉者顧曰此可以為寢處奈何踐之令撒去唐書代宗時晉州男女郇模以麻辮髮持竹筐葦席哭於東市以三十二論時政每字條一事上即召見人君所察者三不可以不知不知行與不行譬以方為輪也不知宜與不宜譬以錦緣薦也魯連子昭陽店設緣熊席毛皆長一尺余眠而雍毛自弊望之者不能見也坐則設膝其中雜薰諸香一坐此席餘香百日不歇也西京雜記回風席趙飛燕為皇后其女弟上遺回風席上茅葭為席鄭敬以茅葭為席常隨杞柳之陰汝南先賢傳常卷坐席隆修字奉遷為豫章太守廳事薦編絕不改易郡風俗不整常卷坐席唯徐穉李贄數詣問乃待以殊禮會稽典錄虎鬚草名虎鬚者江東織以為席曰西王母也崔豹古今注龍鬚太子有獨坐龍鬚席赤皮席花席經席東宮舊事鵲山至箕尾山其神皆鳥身龍首祀之用白菅為席山海經武帝齋於尋真臺紫羅薦地夜二更後西王母至也漢內傳蕖葉草高五尺葉色如紺葉形如半月之勢亦曰半月花草無實其質溫柔可以為席拾遺記方丈山有草名濡姧葉色如紺莖色如漆細軟可縈海人織以為薦席卷之不盈一手舒之則列坐方國之賓上葭席崑崙山有葭紅色可編為席溫柔如毯毛焉上瀛洲南有金巒之觀有青瑤瓦覆以雲紈之素席用香水柔莞上燕昭王設麟文席麟文席者錯雜寶飾席為雲霞麟鳳之狀上魚鬚登白鹿山延成君入為敷魚鬚之席成公興內傳象牙席淮南王為八公設象牙席神仙傳席庾寔妻毛氏五月曬暴薦席忽見其三歲女在席下薦上臥驚怛庾滅女真形在別床如故不旬而夭世傳仲夏忌移床異苑石虎作席以錦囊五雜香以五彩綫編蒲皮緣之錦鄴州中記桃枝席安城郡今屬江州出桃枝席范汪荊州記張儼朱異張純三人共詣驃騎將軍朱據據聞三人才名告各為賦然後乃坐純乃賦席曰席為冬設簟為夏施揖讓而坐君子攸宜文士傳嚴君平成都市賣卜詔徵不起蜀有富人羅仲與君平善問何以不往曰無車糧仲即與具車馬糧科君平曰吾病身非不足也我有餘而子不足也我有餘而子不足奈何以為不足奉有餘也仲曰吾一席直萬金子無擔石乃云有餘謬矣高士傳張充為荊州治中從事刺史每日坐高床為從事設單席於地益都耆舊傳吳隱之字處默鄄城人轉廣州刺史返舟之日唯身而已宅有茅茨六間坐無完席以蓬為屏風鍾元良吏傳董崑字文通為大農帑丞坐無完席會稽先賢傳常山為林大陸曰澤蒹葭蒲葦雲母御席地產不為無珍也盧毓冀州論割席分坐管寧與華歆同席嘗讀書有乘軒冕過門者歆廢書出看寧割席分坐曰子非吾友也世說岱輿山有草名莽煌葉圓如荷去之十步炙人衣服則焦鳥獸不敢近也刈以為席方冬彌溫以枝相摩摩則火出矣拾遺記羅威字德行性至孝母老天寒以身溫席而後授其處搜神記物几所以物也釋名諸侯之師久於偪陽荀偃士丐請於荀瑩曰水潦將降懼不能歸請班師智伯怒投之以几出於其間襄二薳啟疆曰聖王務行禮不求恥人設几而不倚爵盈而不飲禮之至也昭二倚几左史倚相曰倚几有訓誦之諫楚語吳王稱疾不朝驗問不實及後使人為秋請上復責問吳使使者曰察見淵中魚不祥於是天子賜吳王杖几漢書賜臥几黃香為尚書郎以香父尚在賜以臥几靈壽杖東觀漢記上初即位先訪求茂詔曰前密令卓茂名冠天下當受天下重賞今以茂為太傅封褒德侯賜几杖馬援憑几而見梁竇子弟文舉坐榻而授徐文高拜姚信士緯素憑几太祖為司空丞相毛玠為東魯椽太祖平柳城頒所獲物特以素屏風素憑几以賜玠曰君有古人之風故賜以古人之物魏志砍几呂布遣陳登詣太祖因陳布勇而無謀宜早圖之太祖悅始因登求徐州牧不獲及登還布拔戟砍几責之上劉毅字仲雄以太康六年卒帝撫几驚曰失吾名臣不得生作三公即贈儀同三司晉書魏舒以年老稱疾遜位詔賜几杖不朝及錢百萬床帳簟褥上王羲之字逸少嘗往門生家見棐几滑淨因書之真草相半後其父誤刮去之門生驚懊累日上憑几鼓琴沈麟士字雲禛隱居以篤學為務恒憑素几鼓素琴宋書王冲為太子少傳武帝以冲前代舊臣特申長幼之敬文帝即位尊大益加常從幸司空徐度宅宴筵之上賜之以几陳書咸陽王僖謀逆誅其宮人為之歌曰可憐咸陽王奈何作事誤金床玉几不能眠夜蹋霜與露後魏書南郭子綦隱几而坐仰天而嚧嗒焉似長其偶莊子梯几西王母梯几而戴勝山海經玉几天子用玉几漢舊儀黃金几帝受西王母五岳真形經盛以黃金之几漢武內傳漢制天子玉几冬則扣綈錦其上謂之綈几公侯皆以木為几冬則以細廁為囊憑之不得加綈錦之飾於几案西京雜記葛仙翁憑白桐几學數十年白桐登仙几化為白虎三腳兩頭往往人見之會稽典錄漆畫御物三十種有上車漆畫重几大小各一枚魏武上䟽任元褒為光祿勳孫憑翊往詣之見門吏憑几視之孫入語任曰吏憑几對客為非禮任便推之吏答云得罰體痛以橫木扶之非憑几也孫曰直木橫施植其兩足便為憑几何必狐蹯鵠曲木抱腰語林魏朝封文王文王固讓公卿皆當喻旨司空鄭冲等馳使從阮籍求其文立待之籍時在袁孝尼家宿扶而起書几板為文無所治定乃寫付信戴勝竹林七賢論五色几石虎御座儿悉漆雕畫皆為五色花也鄴中記歷陽召秀之剡有一人著平巾袴褶語秀云聞君巧侔班輸刻几尤妙太山府君相召秀之自陳云劉政能造數旬而殞石氏猶存作几有名遂以致斃異苑金几海中有金臺水出百丈臺其內有金几雕文備制上有百味之食幽明錄石几衡山有石室內有石床石几南岳記檈檈圓案也說文為寫陳楚宋魏謂案為寫方言同案而食太子常與荊軻同案而食燕丹子玉案之食項王使武涉淮陰侯淮陰侯曰臣故事項王不過中郎官不過執戟及去項歸漢漢王賜臣玉案之食玉貝之劍臣背之內愧於心楚漢春秋高祖過趙趙王張敖自特案進食甚恭上蹲踞罵之史記萬石君石奮子孫有過失不誚讓為便坐對案不食漢書貢禹奏曰見賜杯案畫文金銀飾非當所以食臣下也上朱博為人廉儉自微賤至富貴不食重祿案上不過三杯酒上許后五日一朝皇太后於長樂宮親奉案上食上更始韓夫人嗜酒每侍飲見常侍奉事輒怒曰帝方對我飲正用此時持事來手起抵破書案東觀記魏霸延年元年仕為光祿大夫妻死長兄伯為娶妻送至官舍霸曰年老兒子備具何用空養他家老嫗為即自入拜其妻手奉案前內跪曰不敢相屈而妻慚求去上尹敏字幼季與班彪相友善每相與談論輒屏案不食上舉案齊眉梁鴻常賃舂每歸妻為具食舉案齊眉上蔡彤素清在遼東三十年衣無儲副賜錢百萬下至杯案食物大小重沓上江秉之為新安太守在郡作書案一枚去官留以付庫南史木案食郭祖深清儉素木案食不過一肉梁書奏案皇太子妃初拜有漆金度足奏案一枚東宮舊事按行曹公器物有奏案五枚又作欹枕以臥視書陸雲與兄機書曹公平荊州欲伐吳張昭等皆勸迎曹公唯周瑜魯肅陳距北之計孫權拔刀斫前奏案曰諸將復有言迎北軍者與此案同江表傳雜寶案武帝為七寶床雜寶案於桂宮中西京雜記武帝時東郡獻短人長五寸上疑是山精常令在案行東方朔問曰巨靈汝何以叛阿母健否漢武故事吳戒字貴齊性剛直同業生陳升為賊戒見之升為設食戒曰汝已為賊奈何為設食因舉案投江中令其趣降廣陵傳吳興人沈羲為仙人所迎上見老君玉女以金案玉杯藥賜羲曰此神仙丹不死之藥神仙傳玉案石季龍以宮人為女官門下通事以玉案行文書有案置石百文山上有石房內有案置石書二卷異苑夸父與日競走渴飲河渭不足北走大澤未至道死棄其杖化為鄧林山海經老子當周之末居及景日室之山與世人絕跡唯有黃髮老叟五人手中捉青笻之杖出入室中與老子共談天地之數拾遺錄杖藜子貢乘大馬軒車不容巷往見原憲杖藜應門莊子孔子之弟子從遠方來者孔子荷杖而問曰子之父不有恙乎持杖而揖之問曰子之母不有恙乎置杖而問曰子之兄弟不有恙乎杙步而倍之問曰子之妻子不有恙乎故孔子以六尺之杖論貴賤之等辨親疏之義又况于以尊位厚祿乎呂覽邾莊公與夷射姑飲酒私出閽乞肉焉奪之杖以敲之定上漢高祖與項藉戰京縈間遁叢薄中時有鳩鳴其上追者不疑遂得脫及即位異此鳥故作鳩杖賜老人也風俗通金杖漢文帝微服過魯魯少年拄金杖出應門搜神記九節杖孝武皇帝登少室見一女子以九節杖仰指曰閉左目開右目氣且絕久乃蘇息武帝使問之所行何等女子不答東方朔曰婦人食日精者劉根別傳帝先有玉箱杖是西湖母所獻帝甚愛之崩後故以入槨其年人有於扶風郿市中買得者帝時左右侍人識之告有司詰聞云見市中有一人賣之實不知賣杖主名也漢武內傳張騫曰臣在大夏時見邛竹杖蜀布問曰安得此大夏國人曰吾賈人往市之身毒身毒在大夏東南可數千里史記劉向於成帝之末校書天祿閣專精覃思夜有老人著黃衣植青藜杖扣門而進見向暗中獨坐誦書老人乃吹杖端出火因以照向具說開闢以前向因受五行洪範之文恐辭說繁廣向乃裂裳及紳以記其言至曙而去請問姓名答曰我是太乙之精天帝聞金卯之子有博學者下而觀焉乃出懷中竹牒有天文地圖之書余略授子焉至向子歆從授其術向亦不悟此人也拾遺錄昌邑王賀徵為天子到榮陽買積竹刺杖二枚龔遂諫曰積竹刺杖者驕蹇少年杖也大王奉大喪當拄竹杖新序賜玉杖嘉平中袁逢為三公賜玉杖華嶠後漢書糜竺用陶朱計術日益富有室庫千間竺常賑生恤死家內馬廄旁有古塚夜聞泣聲尋之見婦訴云漢末為赤眉所害剖棺見剝乞更深埋并乞敝衣自掩竺從其言後歷一年復見前婦云君財寶可支一世應遭大厄今以青蘆杖一枚長九尺報君衣棺之惠竺挾杖而歸所住鄰家常見竺家有一青氣如龍蛇之狀又有青衣童子數人來云縻竺家當有火賴君能恤斂枯骨天道不孤君德故來攘却此災使君財物不盡旬日火從庫起燒其珠玉十分遺一火盛之時見青衣童子十數來撲火又有氣如雲覆火上即滅拾遺錄延年杖文帝引漢太尉楊彪待以客禮賜之几杖詔曰夫先王制几杖之錫所以賓禮黃耆褒崇元老也昔孔光卓茂以淑德高年受茲嘉鍚其賜公延年杖及憑几魏志周宣為郡史太守楊沛夢人曰八月一日曹公當至必與君杖飲以藥酒宣占之曰夫杖起弱藥治人病八月一日黃巾賊必滅至時果敗上藜杖魏帝嘗賜景帝春服帝以賜山濤又以其母老年并賜藜杖一枚晉書阮宣子出行常以百錢掛杖頭每至酒家輒沽醉而歸上甄琛拜侍中以其衰老詔賜御府杖朝直杖以出入後魏書青竹杖費長房欲求道而顧家夏壺公乃斷一青竹杖與長房身等使懸之舍見家人後以為縊死大小驚號遂殯葬之長房立其傍人無見者後長房歸家人不信是房房曰往日所葬竹且發塚視杖猶在神仙傳壺公遣長房歸以一竹杖與之騎此當到家以杖投葛陂中長房騎杖忽然如睡便到家以杖投葛陂中顧之乃青龍也上銀角桃杖今賜足下銀角桃杖一枚魏武帝與楊彪書魏文嘗與平虜將軍劉勳奮威鄧展共食飲宿聞展有手臂曉五兵余與論劍酒酣耳熱方食甘蔗便以為杖下殿交三中其臂典論陳敏孫皓之世為江夏太守自建業赴職聞宮亭廟驗過乞在任安穩當許上銀杖一枚年限既滿作杖擬以還廟撫捶鐵以為幹以銀塗之尋徵為散騎常侍往宮亭送杖於廟中乞即進路日晚降神巫宣教曰陳敏許我銀杖今以塗杖見與投杖水中當送以還之欺蔑之罪不可容也於是取杖看之剖視眾見鐵幹乃置之湖中杖浮在水上其疾如飛遙到敏舫前敏舟遂覆也神異記陳留史均字威明嘗得病臨死謂其母曰我得復生埋我杖瘞我若杖拔出之及死埋杖如其言七日往視杖果拔即掘出之便平復如故列異傳謝尚夢其父告之曰西南有氣至衝人必死勿當其鋒見塔寺可禳未暇立寺可杖頭刻作塔形見有氣來擬之尚如其言置杖左右果有黑氣衝尚家尚以杖指之氣即迴散闔門獲全氣所經處數里無復孑遺塔記山桃杖後魏河澗邢巒字山賓遷殿中侍御史嘗有疾策山桃杖帝問此何杖荅曰臣源杖太武諱燾故言焉談藪佛圖澄死以澄所服金杖銀鉢內著棺中經後再開棺視之不見體骨唯見杖鉢二石偽事祗洹精舍西北四里有榛林名曰得眼本有五百盲人佛為說法盡得眼開盲人喜刺杖著地頭面作禮杖遂生長成榛法顯記南野縣有漢監匠陳鄰其人通靈夜嘗乘龍還家其婦懷身母疑與外人通密看乃知是鄰乘龍龍至家輒化成青竹杖鄰內致戶前母不知因將杖去須臾光彩滿堂俄爾飛失杖乃御雙鵠還鄧德明南康記夫居高者自處不可以不安履危者任杖不可以不固自處不安則墜任杖不固則顛是聖人居高處上則以仁義為巢乘危履傾則以聖賢為杖也陸賈新語麒麟角杖劉向別傳曰有麒麟角杖說文床安身之几坐徐曰床即以安身也廣韻簀也釋名裝也所以自裝載也廣韻棲謂之床床齊魯謂之簀陳楚之間謂之第北燕朝鮮謂之蔡秦晉之間謂之杠南楚趙東齊海岱之間謂之梓衛之北郊趙魏之間謂之牒方言齊無知弒其君殺孟陽于床注云陽小臣代公居床莊上楚子圍宋宋人懼使華元夜入楚師登子反之床起之曰寡君使元以病告宣下夏子庚卒楚子使薳子馮為令尹訪於申叔豫叔豫曰國多寵而王弱國不可為也遂以疾辭方暑掘地下冰而床焉重繭衣裘鮮食而寢楚子使醫視之復曰瘠則甚矣而血氣未動乃使子南為令尹襄三晉獻公寢而不寐叔虎曰床第之不安耶驪姬之不存側耶國語麗之姬艾封人之子也晉國之始得之也泣涕沾襟及其至于王所與王同匡床食芻豢而後悔其泣也莊子孟嘗君至楚獻象床郢之登徒直送之不欲行見孟嘗君門人公孫戍曰象床之直千金傷此若髮標妻賣息不足以償足下能使僕無行先人有寶劍願獻之戍曰諾戰國策袁術僭號人情離叛欲北至青州曹操使劉備邀之至江寧坐簀床而嘆曰袁術乃至於此乎歐血而死范曄後漢書向栩性卓詭常於竈北坐板床上如是積久板乃有膝踝足指之處上羊茂字季寶為東郡太守冬日坐百羊皮夏月坐一榆木板床蔬食出界買鹽豉食之上薛淳為漢中太守夏但坐板床不設席冬坐羊皮河內高弘為瑯琊相亦然也上陳登字元龍許氾與劉備并在荊州牧劉表坐氾曰陳元龍湖海之士豪氣不除備問氾君言豪有事耶氾曰昔遭亂過下邳見元龍無主客之意元龍不相與語自上床臥使客臥下床備曰君有國士之名今天下大亂帝王失所望君憂國忘家有濟世之意而君求田問舍言無可采是元龍所諱何緣當與君語如小人欲臥百尺樓上臥君於地下何但上下床之間耶表大笑魏志此坐可惜武帝會宴凌雲臺衛瓘託醉因跪帝床前曰臣欲有言因以手撫帝床曰此坐可惜帝意乃悟因謬曰公真甚大醉也瓘於此不復言晉書齊獻王攸特為文帝所寵愛每見攸輒撫床呼其小字曰此桃符坐也幾為太子者數矣上中宗既登尊號百官陪列詔王導升御床共坐導固辭曰太陽下同萬物蒼生何由仰照中宗乃止陶淡字起靜好道養年十五六便絕穀設小床常獨坐不與人共上桓玄從荊州下都篡位所坐御床忽䧟殷仲文進曰將聖德深厚地不能載玄大悅上地床公孫鳳隱於昌黎九城寢於地床也燕書局腳床武帝初開國有司奏東西堂於局腳床銀塗釘上不許使用直腳釘用鐵也沈約宋書江湛為元兇劭所害初湛家數見怪異未敗少日所眠床忽有數斗血上王微不仕元兇之數微尋書玩古遂至足不履地終日端坐床皆生埃惟當坐處獨淨羊戎好為雙聲江夏王義恭嘗設齋使戎布床須臾王出以床狹乃自開床戎曰官家恨狹更廣方寸王笑曰卿豈雙聲惟喜乃辨士也上張敷為中書舍人狄當周起善管務要以敷同省名家欲詣之超曰彼若不相容接便不如不往詎可輕行當日吾等並已員外郎矣何憂不得共坐敷先方設二床去壁三尺二客就席數呼左右曰移我遠客起等失色而去其自接過如此上焚瓊坐床王僧達大明中以歸順功封寧陵縣五等侯遷中書舍人黃門郎路瓊之太后兄慶之孫也宅與僧達等並嘗盛車服詣僧達僧達將獵已改服瓊之就坐僧達乃不與語謂曰身昔門下騶人路慶之者是何親遂焚瓊之所坐之床上紀僧真幸於武帝稍歷軍校容表有士風謂帝曰臣小人出自本縣武吏遭逢聖時陞勞至此為兒婚得荀昭先女即時無復所須惟就陛下乞作士大夫帝曰江教謝籥我不得歷此意可自詣之僧真承旨詣教登榻坐定教便命左右曰移吾床讓之僧真喪氣而退齊書虞愿除後軍將軍褚彥回詣愿不在見其眠床上積塵埃有書數卷彥回歎曰虞君廉清乃至於此令人掃地拂床而去上竟陵王子良為會稽郡閣下有虞翻舊床罷任還乃致以歸後於西邸起古齋多聚古人器服以充之上少帝夜醉蕭坦之與曹道中挾抱還延昌殿置玳瑁床上又韓嫣以玳瑁為床西京雜記魚宏性奢侈侍妾百餘人不勝金翠服玩車馬皆一時之絕有眠床一張皆是蹙柏四面周匝無一有異通用銀鏤金花兩重為腳也梁書賀革字文明少以家貧躬耕供養年二十始輟耒就受父業精力不怠有六尺方床思義未達則橫臥其上不盡其義終不肯食上西域龜茲等國其王坐金床隨太歲與其妻並坐接客上魏收讀書夏月坐板床隨樹陰諷誦積年床板為之銳減而精力不輟後魏書七寶床韓武除龍驤將軍郢州刺史獻七寶床象牙席侯景既篡位聞義師轉近猜忌彌深床前蘭錡自遶然後見客南史長沙王懿孫藻性恬靜獨處一室床有膝痕宗室衣冠莫不楷則上玉床世本曰紂為玉床支木為床老萊子隱蒙山之陽支木為床皇甫謐高士傳武帝受方王母真形六甲雲飛十二事帝盛以黃金几封以白玉函珊瑚為床紫錦為帳安著柏梁臺上武帝內傳七寶床武帝為七寶床雜寶屏風列寶帳設於桂宮中時人謂之四寶宮西京雜記昭陽殿設玉床上畫石床上董威常臥延清之室以畫石為床文如錦也石體甚輕出在郅支國上設紫瑠璃帳火齊屏風拾遺記石季倫屑沉水之香如塵末而置象床上使所愛者踐之無跡則賜珍珠百琲若有跡者則節其飲食令體弱故閨中相戲曰爾非細骨輕軀那得百琲珍珠上長沙郡有賈誼所穿井井傍有局腳石床一床可容一人坐其形古制云誼所坐床也盛弘之荊州記石床金鄉焦氏山北有漢司隸校尉曾峻塜前有石床長八尺瑩摩鮮明叩之即鳴時太尉從事中郎傳珍之諮議參軍周安穆折石床各取一頭為曾氏之後所訟西征記石虎御床辟方三丈其餘床皆局腳高下六寸後宮別坊中有小形玉床有轉關林射鳥獸鄴中記沙門支法存有八尺沉香板床刺史王淡息切求不與遂殺而籍焉後息疾存出為崇也異苑床塵不拂簡文為撫軍時所作床床上塵不聽左右拂見鼠行視以為佳語林袁紹年少時曾夜以劍遣人擲魏武小下不著帝揆其後必高因帖臥床劍至果焉世說緝石為床頻斯國有楓林林東有大石室可容萬人坐壁上刻為三皇之象天皇十二頭地皇一十一頭人皇九頭皆龍身亦有膏燭之處緝石為床床上有漆疽深二三寸拾遺錄筐床明者無所不見人王處筐床之上而天下治商君書天中記卷四十八
