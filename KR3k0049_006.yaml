body:
  text: 律萬事根本王者制事立法物度軌則一稟於六律六律為萬事根本焉其於兵械尢所重故云望敵知吉凶聞聲效勝負百王不易之道也史記律本黃帝使泠綸自大夏之西昆侖之陰取竹之解谷生其竅厚均者斷兩節間而吹之以為黃鍾之宮制十二筒以聽鳳之鳴其雄鳴為六雌鳴亦六比黃鐘之宮而皆可以生之是為律本至治之世天地之氣合以生風天地之風氣正十二律定漢志呂覽云阮隃之陰嶰溪之谷聲管月令章句曰律率也聲之管也上古聖人本陰陽別風聲審清濁而不可以文載口傳也於是始鑄金作鍾以主十二月之聲然後以放升降之氣鍾難分別乃截竹為管謂之律律者清濁之率法也聲之清濁以制長短為制宮商所生夫聲有清濁故協以宮商形有長短故檢以丈尺器有大小故定以斛斗質有輕重故平以鈞石故虞書曰乃同律度量衡然則律呂宮商之所由生也宋志候氣夫五音生於陰陽分為十二律轉生六十皆所以紀斗氣效物類也天效以景地效以響即律也陰陽和則景至律氣應則灰除是故天子常以日冬夏至御前殿合八能之士陳八音聽樂均度晷景候鍾律權土灰放陰陽冬至陽氣應則樂均清景長極黃鍾通土灰輕而衡仰夏至陰氣應則樂均濁景短極蕤賓通土灰重而衡低進退於先後五日之中八能各以候狀聞太史封上效則和否則占候氣之法為室三重戶閉塗釁必周密布緹縵室中以木為案每律各一內庳外高從其方位加律其上以葭莩灰抑其內端案歷而候之氣至者灰去其為氣所動者其灰散人及風所動者其灰聚殿中候用玉律十二惟二至乃候靈臺用竹律六十候日如其曆後漢志六律相生元帝自曉音律郎官京房知五聲之音六律之數因使韋玄成等雜試問房房對受學焦延壽六十律相生之法以上生下皆三生二以下生上皆三生四陽下生陰陰上生陽終於中呂而十二律畢矣中呂上生執始執始下生去滅上下相生終於南事六十律畢矣夫十二律之變至於六十猶八卦之變至於六十四也上九律相生五聲之本生於黃鍾之律九寸為宮或損或益以定商角徵羽九六相生陰陽之應也律十有二陽六為律陰六為呂律以統氣類物一曰黃鍾二曰太族三曰姑洗四曰蕤賓五曰夷則六曰亡射呂以旅陽宣氣一曰林鍾二曰南呂三曰應鍾四曰大呂五曰夾鍾六曰中呂有三統之義焉前志函三太極元氣函三為一極中也元始也陰陽合德氣鍾於子化生萬物者也故孳萌於子紐牙於丑引達於寅冒茆於卯振美於辰巳盛於巳咢布於午昧薆於未申堅於申留孰於酉畢入於戌該閡於亥出甲於甲奮軋於乙明炳於丙大盛於丁豐楙於戊理紀於己斂更於庚悉新於辛懷任於壬陳揆於癸故陰陽之施化萬物之終始既類旅於律呂又經歷於日辰而變化之情可見矣上相生周十一辰在六律為陽則當位自得而下生陰在六呂為陰則得其所衡而上生於陽推等之術無重上生下之法也所謂律取妻呂生子陰陽升降律呂之人經也晉志娶妻生子九六陰陽夫婦子母之道也律娶妻而呂生子天地之情也六律六呂而十二辰立矣前志注異類為子母謂黃鍾生林鍾也同類為夫婦謂黃鍾以大呂為妻也律娶妻黃鐘生林鐘呂生子林鐘生太族相生相攝凡十二律各有所攝引而申之至於六十相生者相變始黃鍾之管下生林鍾以陽生陰故變也相攝者相通如中呂之管攝於物應以母權子故相變者異時而各應相通者同月而繼應應有早晚者非正律氣乃子律相感寄母中應也毛爽律譜天道一律而生五音十二律而為六十音因而六之六六三十六故三百六十音以當一歲之日故律曆之數天地之道也淮南子聲生於音楊子雲曰聲生於日律生於辰聲以情質律以和聲聲律相協而八音生宮商角徵羽謂之五聲金石匏革絲竹土木謂之八音聲和音諧是謂五樂日謂甲己為角乙庚為商丙辛為徵丁壬為羽戊癸為宮辰謂子為黃鍾丑為大呂寅為太簇卯為夾鍾辰為姑洗巳為中呂午為蕤賓夫為林鍾申為夷則酉為南呂戌為無射亥為應鍾宋志玉紀聖人觀四時之變刻玉紀其盈虛察五行之聲金金均其清濁所以遂八風而宣九德和大樂而成政道然金質從革侈弇無方竹體圓虛修短利制是以神瞽作律用寫鍾聲叶時日於晷度效地氣於灰管律之為言法也言陽氣施生各有法也呂之為言助也所以助陰成陽功也晉志截管截管為律吹以考聲列以物氣道之本也後志律之始造以竹為管取其自然圓虛也楊泉物理論曰聽清濁五聲之和然後制為鍾律取弘農宜陽縣金門山竹為管河內葭莩為灰或云以律著室中隨十二辰埋之上與地平以竹莩灰實律中以羅縠覆律呂氣至吹灰動縠小動為和大動君弱臣強不動君嚴暴之應也晉志定姓黃帝吹律定姓帝王世紀聖人興起不知姓名當吹律聽聲以別其姓律者六律也易是類謀聖王吹律有姓援神契作律黃帝始作律管通歷昔黃帝採竹昆崙之陰聽鳳岐陽之下斷自然之物寫自然之音音既協矣黃鍾以立數既生矣氣亦證之於是備數和聲審度嘉量權衡之用皆出於茲後魏志律譜云黃帝遣伶倫氏取竹于嶰谷吹以為黃鍾之宮曰含少聽鳳阿閣之下始造十二律焉乃致天地氣應是則數之始也陽管為律陰管為呂其氣以候四時其數以紀萬物云隸首作數蓋律之本也故有虞氏用律和聲鄒衍改之以定五始隋志玉管黃帝吹玉律正璇衡拾遺記黃帝作律以玉為管長尺六孔為十二月音至舜時西王母獻昭華之琯以玉為之及漢章帝時零陵文學奚景於冷道舜祠下得白玉琯又武帝太康元年汲郡盜發六國時魏襄王冢亦得玉律則古者又以玉為管矣以玉者取其體含廉潤也晉志淳古葦籥創覩人籟之源女蝸笙篁仍昭鳳律之首伶倫含少乃擅比竹之工虞舜昭華方傳刻玉之美隋志正律舜以夔為樂正於是正六律和均五聲以通八風呂覽吹律聽聲武王伐商吹律聽聲推孟春以至季冬殺氣相并而音尚宮史律書武王問太公曰律音之聲可以知三軍之消息勝負之決乎太公曰夫律管十二其要有五音宮商角徵羽此真正聲也萬代不易五行之神道之常也金木水火土各以其勝攻也其法以天清淨夜半往至敵壘去九百步外遍持律管當耳大呼警之有聲應管其來甚微角聲應管當以白虎徵聲應管當以玄武商聲應管當以朱雀羽聲應管當以勾陳五管聲盡不應者宮也當以青龍此五行之符佐勝之徵成敗之機微妙之音皆有外候敵人驚動則聽之聞枹鼓之音者角也見火光者徵也聞金鐵矛戟之音者商也聞人嘯呼之音者羽也寂寞無聞者宮也此五者聲之符也龍韜同律周禮大師執同律以聽軍聲而詔吉凶武王出兵書云王者行師出軍之日大師吹律合音商則戰勝軍士強角則軍擾多變失士心宮則軍和士卒同心徵則將急數怒軍士勞羽則兵弱少威明玉律武帝太康元年汲郡發魏襄王冢得古周時玉律及鍾磬與新律聲韻暗同于時郡國或得漢時故鍾吹律命之皆應晉志主衣從上相承有周時銅尺一枚古玉律八枚今餘七枚檢考參差惟夾鍾玉琯有昔題刻未必是舜時白琯觀其玉色要非近物乃制為尺以相參驗鍾律緯毛爽云梁武時猶有汲冢玉律宋蒼梧時鑽為橫吹然其長短厚薄大體具存隋志立均出度景王將鑄無射問律於伶州鳩對曰律所以立均出度也古之神瞽考中聲而量之以制度律均鍾百官軌儀紀之以三平之以六成於十二天之道也夫六中之色也故名之曰黃鍾所以宣養六氣九德也由是第之二曰太簇所以金奏贊陽出滯也三曰姑洗所以修潔百物考神納賓也四曰蕤賓所以安靖神人獻酬交酢也五曰夷則所以詠歌九則平民無二也六曰無射所以宣布哲人之令德示民軌儀也為之六間以揚沈伏而黜散越也元間大呂助宣物也二間夾鍾出四隙之細也三間中氣宣中氣也四間林鍾和展百事俾莫不任肅純恪也五間南呂贊陽秀也六間應鍾均利器用俾應復也律呂不易無姦物也國語六始為律六間為呂注陽為始陰為間於子為律於丑為呂太元經七律景王曰七律者何對曰凡神人以數合之以聲昭之數合聲和然後可同也故以七同其數而以律和其聲於是乎有七律國語七音齊侯至自田晏子曰五聲六律七音八風九歌以相成也清濁小大短長疾徐哀樂剛柔遲速高下出入周疏以相濟也君子聽之以平其心昭二十年注武王伐紂自午及子凡七日王因此以數合之以聲昭之故以七同其數以律和其聲謂之七音吹律知世孔子生不知其父其母匿之吹律自知殷宋大夫子氏之世也論衡孔子曰丘援律而吹命陰得羽之宮演孔圖黍谷方士傳言鄒衍在燕燕有谷地美而寒不生五穀鄒子居之吹律而溫氣至而穀生今名黍谷劉向別録師曠之清角鄒衍之吹律列子東風入律武帝時有西胡月氏國王遣使獻香曰臣國去此三十萬里國有常占東風入律百旬不休青雲千呂連月不散者閻浮國將有好道之君矣十洲記協律漢初興張蒼定律乃推五勝之法以為水德實因戰國官失其守後秦滅樂其道浸微蒼補綴之未獲詳究及孝武創制乃置協律之官用李延年以為都尉頗解新聲變曲未達音律之源故其服色不得而定也律譜定氏京房字君明好鍾律知音聲房本姓李推律自定為京氏漢書銅律平帝時王莽凡律度量衡以銅為之銅者名自名也所以同天下齊風俗也銅為物之至精不為燥濕寒暑變其節不為風雨暴露改其形介然有常有似於士君子之行是以用銅也用竹為引者事之宜也漢書鍾律劉歆鍾律書云春宮秋律百卉必雕秋宮春律萬物必榮夏宮冬律雨雹必降冬宮夏律雷必發聲隋牛弘傳魏晉律後漢尺度稍長魏代杜夔亦制律呂以之候氣灰悉不飛晉光祿大夫荀勗得古銅管校夔所制長古四分方知不調事由其誤乃依周禮更造古尺用之定管聲韻始調左晉之後漸又訛謬律譜以管候氣北齊神武霸府田曹參軍信都芳深有巧思能以管候氣仰觀雲色嘗與人對語即指天曰孟春之氣至矣人往驗管而飛灰已應每月所候言皆無爽又為輪扇二十四埋地中以測二十四氣每一氣感則一扇自動他扇並住與管灰相應若符契焉隨志祖珽謂芳曰律管吹灰術甚微妙絶來既久吾思所不至卿試思之芳留意十數日便報珽云吾得之矣然終須河內葭莩灰祖對試之無驗後得河內灰用術應節便飛餘灰即不動也為時所重竟不行用故此法遂絶北史廢八懸七後周明帝時裴政上書以為昔者大舜欲聞七始下洎周武爰制七音持林鍾作黃鍾以為正調之首及武帝讀史書見武王克殷而作七始又欲廢八懸七并除黃鍾之正宮用林鍾為調首長孫紹遠奏云天子懸八百王共軌下逮周武甫修七始之音詳諸經義又無廢八之典且黃鍾為君天子正位今欲廢之未見其可后竟廢懸七紹遠疾中與齊樹書云古之先聖殊塗一致逮周武克殷逆取順守專用干戈事乖揖讓反求經義是用七音蓋非萬代不易之典又命其子覽曰夫黃鍾者天子之宮太呂者皇后之位今廢黃鍾之位是祿去王室若用林鍾為首是政出私門將恐八百之祚不得同姬周之永也北史律譜陳毛爽受京房律法布管飛灰順月皆驗隋開皇九年遣爽及太樂令蔡子元等候節氣令爽草定其法名曰律譜其略曰班氏漢志盡歆所出也司馬彪志並房所出也爽兄喜陳武帝時以十二管衍為六十律私候氣序並有證應隋志協律郎協律郎掌和六律六呂以辨四時之氣八風五音之節陽為六律所以統氣類物仲冬為黃鍾孟春為太簇季春為姑洗仲夏為蕤賓孟秋為夷則季秋為無射陰為六呂所以振陽宣氣季冬為大呂仲春為夾鍾孟夏為仲呂季夏為林鍾仲秋為南呂孟冬為應鍾凡律管之數起干九以九相乘八十一以為商三分去一五十四以為徵三分益一七十二以為商三分去一四十八以為羽三分益一六十四以為角黃鍾為宮太簇為商姑洗為角林鍾為徵南呂為羽還相為宮以生其氣焉唐六典造律以黍始求聲者以律而造律者以黍自一黍之廣積而為分寸一黍之多積而為籥合一黍之重積而為銖兩此造律之本也故為之長短之法而著之於度為之多少之法而著之於量為之輕重之法而著之於權衡唐志合天地之情周世旋宮因孝孫而再設京房灰管遇毛爽而重彰漢章和世實用旋宮漢世群儒備言其義牛弘祖孝孫所由準的也杜夔漢世之樂郎不識旋宮之義荀勉晉朝之博識莫知古律之則歷動而右移律動而左轉律以歷合氣以錯行金奏隨律而變宮以宣地靈登歌與歷而改調以應天氣歌奏相命所以合天地之情也劉貺太樂令壁記詔作事昔者聖王之造曆數也察紀律之行觀運機之動原星辰之迭中寤晷景之長短於是營儀以準之立表以測之下漏以考之布算以追之然後元首齊乎上中朔正乎下寒暑順序四時不忒夫曆數者先王以憲殺生之期而詔作事之節也使萬國之民不失其業者也徐幹中論至精夫曆數者聖人之所以測靈耀之賾而窮玄妙之情也非天下之至精孰能致思焉上授時夫陰陽二氣陶育群品精象所寄是為日月群生之性章為五才五才之靈五星是也曆所以擬天行而序七耀紀萬國而授人時宋志正曆曆譜者序四時之位正分至之節以會日月五星之辰以考寒暑殺生之實故聖王必正曆數以定三統服色之制又以探知五星日月之會凶厄之患吉隆之喜其術皆出焉此聖人知命之術也非天下之至林其孰與焉前漢志制術昔者聖人之作曆也觀璿璣之運三光之行道之發斂影之長短斗綱所建青龍所躔參伍以變錯綜其數而制術焉後漢志紀綱萬物昔者聖人擬宸極以運璿璣揆天行而序景曜分辰野辨躔歷敬農時興物利皆以繫順兩儀紀綱萬物者也然則觀象設卦扐閏成文歷數之原存乎此也晉志六德夫曆有聖人之德六焉以本氣者尚其體以綜數者尚其文以考類者尚其象以作事者尚其時以占往者尚其源以知來者尚其流大業載之吉凶生焉是以君子將有興焉咨焉而以從事受命而莫之違也後漢志受命治曆天道之動則當以數知之夫為國家者履端立極必體其元布政考績必因其歲禮動樂舉必正其朔三農百工必順其時五刑九伐必順其氣庶務有為必從其日月是以聖人受命必治曆數故五紀有常度庶徵有常應正朔行之於天下也五代司天考王朴甲曆伏羲在位百一十年始有甲曆五運通歷神農曆神農始治農功正節氣審寒溫為早晚之期故立曆日楊泉物理論調曆炎帝分八節以始農功黃帝紀三綱而闡書契乃使羲和占日常儀占月車區占星氣伶倫造律曆大撓造甲子隸首作算數容成綜斯六術考定氣象建五行察發斂起消息正閏餘述而著焉謂之調曆晉志容成氏造曆黃帝臣也博物記天步有常張衡應間曰渾元初基靈軌未紀吉凶分錯人用瞳矇黃帝為斯深慘有風后者是焉亮之察三辰於上迹禍福乎下經緯歷數然後天步有常則風后之為也後漢風后善於伏羲氏之道故推演陰陽之事春秋內事黃星黃帝有黃星之祥考定曆紀拾遺記五官太史公曰黃帝考定星曆建立五行起消息正閏餘於是天地神祗物類之官是謂五官各司其序民有信神有明德故神降之嘉生史曆書律陰陽黃帝治天下力牧太山稽輔之以治日月之行律陰陽之氣節四時之度正律曆之數淮南子少昊歷郯子曰鳳鳥氏歷正也左傳歷宗魏董巴議曰伏羲始造八卦作三畫以象二十四氣黃帝因之初作調歷歷代十一更年五千凡有七顓帝以今之孟春正月為元其時正月朔旦立春五星會子天歷營室也冰凍始泮蟄蟲始發雞始三號天曰作時地曰作昌人曰作樂鳥獸萬物莫不應和故顓帝聖人為歷宗也晉律歷志絶地天通少皥之衰也九黎亂德民神雜糅不可方物夫人作享家為巫史民匱于祀禍災荐臻顓頊受之乃命南正重司天以屬神命火正黎司地以屬民使復舊常無相侵瀆是謂絶地天通楚語申理當少昊清陽之末九黎亂德重黎又相顓頊而申理之日月即次則重黎之為也人各有能因蓻受任鳥師別名四叔三正官無二業事不並濟應間立羲和官其後三苗服九黎之德故二官咸廢所職而閏餘乖次孟陬殄滅攝提無紀曆數失序史記堯復育重黎之後不忘舊者使復典教之故書曰乃命羲和欽若昊天曆象日月星辰敬授民時於是陰陽調和災厲不作休徵時至嘉生蕃育民人樂康鬼神降福舜禹受之循而勿失也中論造曆者羲和之子也尸子曆官文曜鉤曰高辛受命重黎説文唐堯即位羲和立禪夏后制德昆吾列神成周改號萇弘分官革命治曆祐術開業淳耀天光重黎其上也承聖帝之命若昊天典曆象三辰以授民事立閏定時以成歲功羲和其隆也取象金火革命創制治曆明時應天順民湯武其盛也後漢志瑞曆荀子日月星辰瑞曆是禹桀之所同也禹以治桀以亂注當時星辰書之名也天論殷曆命曆序曰孔子治春秋退修殷之故曆使其數可傳於後春秋宜以殷曆正之今考之交會不與殷曆相應晉志喪其甲子夏后之時羲和淫湎廢時亂日胤乃征之紂作淫雪喪其甲子武王誅之後漢志日官夏殷承運周氏應期正朔既殊創法斯異傳曰火出於夏為三月於商為四月於周為五月是故天子置日官諸侯有日御以和萬國以協三辰至乎寒暑晦明之徵陰陽生殺之數啓閉升降之紀消息盈虛之節皆應躔次而無淫流故能該浹生靈堪輿天地晉志和人道夫歷春秋者天時也列人事而因以天時以作事厚生易金火相革之卦曰湯武革命順乎天而應乎人又曰治曆明時所以和人道也前漢志一月武成惟一月壬辰鄭玄曰一月周之正月泰誓一月戊午度師孟津正義曰不言正月而言一月者易革卦彖曰湯武革命順乎天而應乎人象曰君子以治曆明時然則改正治曆必自武王始矣既入商郊始改正朔其初發猶是殷之十二月故史以一月名之五紀周武王訪箕子箕子言大法九章而五紀明曆法自殷周皆創業改制咸正曆紀服色從之順時氣以應天道前漢志周魯曆武王作周曆周公作魯歷董巴議疇人函厲之後周室微陪臣執政史不記時君不告朔故疇人子弟分散或在諸夏或在夷狄是以其機祥廢而不統史記如淳曰家業世世相傳為疇律年一十三傳之疇官各從其父學韋昭云疇類也孟康云同類之人明歷者也樂彥云疇昔知星人也注祖沖之曰周漢之際疇人喪業曲技競設圖緯實繁宋志疇官隋劉炫上太子啓曰自木鐸寢聲緒言成燼群生蕩析諸夏沸騰曲技雲浮疇官雨絶曆紀廢壞千百年矣志贊天經時帝王興作未有奉贊天時以經人事者也故孔子制春秋書人事而因以天時以明二物相須而成也故人君不在分至啓閉則不書其時月蓋刺怠慢也中論人事之本後秦姚興甲申天水薑岌造三紀甲子元歷其略曰治歷之道必審日月之行然後可以上考天時下察地化一失其本則四時變移故仲尼之作春秋日以繼月月以繼時時以繼年年以首事明天時者人事之本是以王者重之晉書合璧事類作姚興白誤揆天行曆者聖人所以揆天行而紀萬國也孔子作春秋正春正秋所以重曆也五家之曆多踈闊唯顓頊曆為微近故張蒼用顓頊曆元封中立太初曆測彌望皆最密洪範五行傳十月為正周既衰史官廢職疇人分散機祥莫理秦兼天下頗推五勝自以獲水德之瑞以十月為正漢氏初興多所未暇百有餘載猶行秦曆至于孝武改用夏正隋志太初曆武帝元封七年公孫卿壺遂用司馬遷等言歷紀壞廢宜改正朔上乃詔御史曰乃者有司言歷未定廣延宣問以考星度未能讎也蓋聞古者黃帝合而不死名察發斂定清濁起五部建氣物分數然則上矣書缺樂弛朕甚難之依違以惟未能修明其以七年為元年造漢太初曆乃選治歷鄧平方士唐都巴郡洛下閎與焉都分天部而閎運算轉歷其法以律起曆與鄧平所治同更以算推如閎平法名曰陽歷陰曆乃詔遷用鄧平所造八十一分律曆罷廢尤疏遠者十七家復使校曆律昏明淳于渠復罷太初曆晦朔弦望皆最密日月如合璧五星如連珠陵渠奏遂用鄧平歷前律曆志改曆落下閎字長公明曉天文隱於落下武帝徵待詔太史於地中轉渾天改顓頊歷作太初曆拜侍中不受曰後八百歲此曆差一日當有聖人定之益部耆舊傳漢厄三七路溫舒從祖父受曆數天文以為漢厄三七之間上封事以豫戒成帝時谷永亦言如此漢書三統曆孝成世劉向總六曆列是非作五紀論向子歆究其微眇作三統曆及譜以説春秋推法密要前志三萬六千歲王莽見盜賊多乃令太史推三萬六千歲歷紀六歲一改元布天下書曰紫閣圖曰太一黃帝皆仙上天張樂崑崙處山之上後世聖主得瑞者當張樂秦終南山之上子之不敏奉行未明乃今諭矣欲以誑耀百姓銷解盜賊衆皆笑之本傳四分曆自太初元年始用三統曆百有餘年者真行日有退無進月有進無退建武八年朱浮言曆不正宜改更至永平五年詔岑普與官課起七月盡十一月弦望凡五官曆皆失元和二年太初失天益遠章帝詔曰朕聞古先聖王先天而天不違後天而奉天時春秋保乾圖曰三百年斗曆改憲史官用太初鄧平術冬至之日日在斗二十二度而曆以為牽牛中星先立春一日則四分數之立春也而以折獄斷大刑於氣已忤用望平和蓋亦遠矣今改行四分以遵於堯以順孔聖奉天之文後律歷志天事函微昔太初曆之行也發謀于元封啓定于天鳳積百三十年是非乃審及用四分建武草創其端元和課校其實永元宣行其法七十餘年然後儀式備立司候有準天事函微若此其難也上乾象曆光和元年蔡雍劉洪補續曆志雍能著文清濁鍾律洪能為算敘述之光後志劉洪字元卓善算當世無偶作七曜術及在東觀與蔡雍共述律曆記考驗天官及造乾象術十餘年考驗日月與象相應袁山松書又制遂疾曆以步月行方於太初四分轉更精妙耳宋志獻帝違安元年鄭玄受其法以為窮函極微之加注什焉晉志景初曆景初元年山茌縣言黃龍見有司奏以為魏得地統宜以建丑之月為正乃定曆年改大和曆為景初曆魏志蜀吳曆先主在蜀仍漢四分曆吳中書令闞澤受劉洪乾象法於東萊徐嶽又加解注中常侍王蕃以洪術精妙用推渾天之理以制儀象及論故吳用乾象曆晉志丙寅曆大象元年太史上士馬顯等上丙寅元曆奏曰臣案九章五紀之旨三統四分之説咸以節宣發斂考詳晷緯布政授時以為皇極者也而乾維難測斗憲易荖盈縮之期致舛咎徵之道斯膺寧止蛇或乘龍水能沴火因亦玉羊掩曜金雞喪精王化關以盛衰有國由其隆替曆之時義於斯為重自炎漢已還迄於有魏運經四代事涉千年日御天官不乏於世命元班朔互有沿改驗近則疊璧應辰經遠則連珠失次義難循舊其在茲乎臣等監考踈密共定今術開元發統肇自丙寅至於兩曜虧食五星伏見參校積時最為精密庶鐵炭輕重無失寒燠之宜灰箭飛浮不爽陰陽之度隋志抱書慟哭高祖作輔方行禪代之事欲以符命曜于天下道士張賓揣知上意自云玄相洞曉星曆因盛言有代謝之徵及受禪之初議造新曆賓等依何承天法微加增損四年二月撰成奏上高祖詔用之張賓曆既行劉孝孫與冀州秀才劉焯並稱其失言學無師法刻食不中所駮凡有六條賓有寵於高祖劉暉附會之二人叶議共短孝孫言其非毀天曆孝孫焯等竟以他事斥罷後賓死孝孫仍直太史纍年不調寓宿觀臺乃抱其書弟子輿襯來詣闕下伏而慟哭執法拘以奏之高祖異焉以問國子祭酒何安妥言其善即日擢授大都督遣與賓曆比校短長隋志隋新曆隋文帝時張胄玄直太史參議律曆時輩多出其下太史令劉暉等甚忌之然暉言多不中胄玄所推步甚精密上異之擢兼太史令暉及黨與皆斥逐之定新曆言前曆差一日內史通事顏慜楚上言曰漢時落下閩改顓頊曆作太初曆云後當差一日八百年當有聖者定之計今相去七百一十年術者舉其成數聖者之謂其在今乎本傳皇極曆開皇二十年袁充奏日長影短高祖因以曆事付皇太子遣更研詳著日長之候劉焯以太子新立復增修其書名曰皇極曆駁正胄玄之短太子頗嘉之焯為太學博士負其精博志解胄玄之印官不滿意稱疾罷歸仁壽四年焯言胄玄之誤于皇太子又造曆家同異名曰稽極大業四年帝召焯欲行其曆袁充方幸於帝左右胄玄共排焯曆曆竟不行隋志作曆之難昔鄧平洛下閎造漢太初曆非之者十七家後劉洪蔡伯喈何承天祖中之皆數術之精粹者至於宣考曆書之際猶為橫議所排斯道寂寥知音蓋寡所以張胄玄佩印而沸騰劉孝孫輿棺而慟哭俾諸後學益用為疑舊唐志麟德曆唐高宗時傳仁均戊寅曆推步既益疏李淳風歲損劉焯皇極曆作甲子元曆以獻詔頒用之詔曰朕仰稽七曜旁總五家古所未通今印備載而改之初考此曆歲推甲子合於天正合朔之夜應以嘉祥五緯若連珠二曜如合璧如此授農升平可致昔洛下閎漢曆云後八百歲當有聖人受之自火德暨我年將八百事合當仁可名麟德曆會要千歲曆王勃聰警絶衆於推步曆算尤精嘗作大唐千歲曆言唐德靈長千年合承周漢運曆不合承周隋短祚其論大旨云以土王者五十代而一千年金王者四十九代而九百年水王者二十代而六百年木王者三十代而八百年火王者二十代而七百年此天地之長期符曆之大數也自黃帝至漢並是五運真主五行之匝土運復歸唐德承之宜矣魏晉至于周隋咸非正統五行之沴氣也故不可承之大率如此唐書昔在唐虞之際以斗精受命者七神得四均間氣而生者又二十八人所謂三十五際者也禹以金德王故夏后之有天下也生數四百年契以水德王故殷人之有天下也成數六百年稷以木德王故周人之有天下也成數八百年伯益之命中天而堯族以火德乘之故漢室之有天下也生數再及二百年其間距王而興不能復大禹九州之迹及勝殘百年之命者皆五神之餘氣也皋繇降德皇唐復興土精應王厚德載物生數五百成數千年命曆有歸此其大較轉算之徒莫能究也緯以入元三百四歲為德運七百六十歲為代軌千五百二十歲為天地出符四千五百六十歲為七精返初天人相應合若符節開元張説握符頌序神龍曆武后有光宅曆後又有神龍曆止因麟德曆法李嶠神龍曆序云自麟德創紀四十餘年雖斗憲未移而渾儀漸變蔡伯喈所謂術無恆是洛下閎所謂曆後當差爰命典司更從刊正究天道之精微開日官之軌憲容成再出不能添黍纍之功壽王重生無以議分毫之失豈比夫時乖兩閏始載鄒人之語亥有二首方聞絳老之年英華大衍曆開元中僧一行精諸家曆法言麟德曆行用既久晷緯漸差宰相張説言之玄宗召見令造新曆推大衍數立術以應之較經史所書氣朔日名宿度可考者皆合十五年草成而一行卒臨張説與曆官等次成之目太初至麟德曆有二十二家與天雖近而未密至一行密矣其倚數立法固無以易也後世雖有改作者皆依倣而已略例所以明逑作本旨也曆議所以考古今得失也皆足以為將來折衷唐志光大殿一行初奉詔於光大殿改撰曆經後移在麗正殿與學士參校曆術集賢注記大衍曆序開元十有三祀詔沙門一行上本黃顓夏商周魯五王一侯之遺式下集大初至于麟德二十三家之衆議比其同異課其踈密振古未探之象必發揮於神算大鈞不測之氣盡鸍縷於天聰乃更審晷度之長短度星間之廣狹繩九道之朓朒糾五精之進退參大衍天地之數綜八卦六爻之序一轍於文王也覆春秋交蝕之辰研九疇五紀之奧同符於孔子也杼軸萬象優柔四載奏章朝竟一公夕落臣説奉詔金門成書册府緯合編次勒成一部名曰開元大衍曆所以貫三才周萬物窮數術先鬼神非軒后至聖不啓履端之業非容成詣業不就歸餘之經據其圖也七政之天心不遠守其術也千歲之日月可知蓋中黃之寶符大紫之神器者也謹以十六年八月端午赤光照室之夜皇雄成紀之辰當一元之出符獻萬壽之新曆伏望藏之書殿録於記言掌之大史頒於司曆文苑張説握符大曆開元正曆握乾符頌序云以數推氣以氣定朔以星正時以閏成歲考星間而革踈度置歲差而辨誤日立大衍之紀參大渾之晷合鍾律之聲鬼神之情是謂聖人握符之大曆也彼洛下閎者漢太初時一巧曆耳其云後八百歲當差一日有聖人正之斯人也抑將露才揚術預證來聖有耆舊之傳記無史策之明文然至隋之開皇及麟德聖曆三家創法一引為徵約之年代則鄰近稽之圖籙則曖昧未有如新曆之昭昭者矣自堯典命羲和修重黎之舊理顓頊之曆上元甲子千五百餘歲得孔聖而春秋之曆序暨開元十二年甲子凡三千四十歲遇聖上而大衍之曆興是時也土德入生數之元天命當出符之會信矣文粹張説玉匱賀表云天旨裁其紀綱日官考其精要梁天監中陶弘景著玉匱記云盛德木子以肇來運一行推璿衡曆得皇家天命成數千年古今祥兆若合符契曆數既在於聖躬卜年又表於長曆和六氣伏見景寅制書以開元曆握乾符垂示天下幸甚其沙門等所言益部耆舊傳洛下閎改顓曆推數最為精密而曰後八百歲其曆差一日當有聖人定之洛下閎極其數而知來耆舊傳尚其占而示後下協黃鍾上稽玄象以和六氣以協三光張曲江集司曆司曆掌國之曆法以頒于四方有戊寅曆麟德曆神龍曆大衍曆凡天下測景之處分至表準其可載故參考星辰稽驗晷影各有常典六典八改唐始終二百九十餘年而曆八改曰戊寅之曆曰麟德甲子元曆曰開元大衍曆曰寶應五紀曆曰建中正元曆曰元和觀象曆曰長慶宣明曆曰景福崇元曆而止矣唐志又有至德曆几九改正一氣天福三年馬重績上言曆象王者所以正一氣之元宣萬邦之命而古今所紀考審多差五代本傳欽天曆王朴為人明敏多材智陰陽律曆之法莫不通焉周顯德二年詔朴校定大曆乃削去近世符天流俗六經之學設通經統三法以歲軌離交朔望周變率策之數步日月五星為欽天曆上劉羲叟曰前世造曆者其法不同而多差至唐一行始以天地之中數作大衍曆最為精密後世善治曆者皆用其法惟寫分擬數而已至王朴亦能自為一家朔望正二曜協交會密晷漏實五緯齊然不能宏深簡易而徑急是耴至其所長聖人不能廢也上變曆疏密二代之曆多至八百年少至四百年而一變者非曆之差也正朔既改曆不容不變也漢曆率百年一變唐曆率百年三變宋朝曆率百年而六變以其用之久近觀之則法之疏密可知矣玉海求詳朱差日蔡雍杜預用新術治曆至何承天祖沖之考索愈精承天以月蝕之衝推日躔次沖之言古衝之作在漢初周未所謂求詳於未差之前蓋劉歆班固所不能到也上曆數綱紀董巴議云聖人迹太陽於晷景效太陰於弦望明五星於見伏正是非於晦朔弦望伏見者歷數之綱紀檢驗之明者也晉志敬天育物曆者先王所以明時授人敬天育物者也辰極常居斗運不息晦明相推而變月寒暑往來而成歲日月右進周天之度啓星辰左旋正時之氣合積餘分而致閏配甲子而設蔀張説序該羅曆義張載弟前烏程令冗依蔡雍注明堂月令中台要解又綴諸家曆數而為曆讚祕書監荀嵩見讚異之云信該羅曆表義矣王隱晉書白猿曆周群妙間算術讖説遊岷山採藥見一白猿從絶峰而下化為一老翁握中有玉版長八寸以授群群問其年答曰今已衰邁忘其生之年月憶從軒轅之時始學曆數風后容成皆黃帝之史就余授曆術至顓頊更考定日月星辰之運多差異及春秋時有子韋子野裡竈之徒權略雖驗未得其門爾來世代不復可紀因以相襲至大漢之時有洛下閎得其大旨群復其言更精勤算術乃考校年曆之運驗于圖緯知蜀應滅及明年歸命皆稱周群詳陰陽之精妙也蜀人謂之後聖拾遺王在門中餘分之月五歲再閏也告朔之禮天子居宗廟門中故其字從王在門中也周禮曰閏月王居門中終月也説文陽餘月猶閏何周天三百六十五度四分度之一十二月日不匝十二度故三年一閏五歲再閏也明陰不足陽有餘閏也者陽之餘也白虎通閏餘黃帝起消息正閏餘史記乖次三苗服九黎之德故重黎二官咸廢所職而閏餘乖次孟陬殄滅攝提無紀曆數失序上正時文公元年閏三月非禮也先王之正時也履端於始舉正於中歸餘於終履端於始序則不愆舉正於中民則不惑歸餘於終事則不悖左傳不告朔文公六年閏月不告朔非禮也閏以正時時以作事事以厚生生民之道於是乎在矣不告閏朔棄時政也何以為民上注云四時漸差則致閏以正之蔀首周道既衰幽王既喪天子不能班朔魯歷不正以閏餘一之歲為蔀首自文公閏月不告朔至此百有餘年莫能正歷數故子貢欲去其餼羊孔子愛其禮而著其法於春秋前志司歷過哀公十二年冬十有二月螽季康子問於孔子曰今周十二月夏之十月而猶有螽何也對曰火伏而後蟄者畢今火猶西流司歷過也康子曰所失者幾月也曰於夏十月火既沒矣今火見再失閏也家語左傳閏在歲後漢祖受命因秦之紀十月為年首閏常在歲後不稽先代違於帝典後志天氣備光武詔張純曰禘祫之祭不行久矣純奏曰三年一閏天氣小備五年再閏天氣大備三年以祫五年以禘注閏者歲之餘後本傳告朔武后詔群臣議告朔于明堂張齊賢曰穀梁氏稱閏月天子不告朔它月故告朔矣左氏言魯不告閏朔為棄時政則諸侯雖閏告朔矣唐本傳非常月閏月不告朔曷為不告朔天無是月也閏月矣何以謂之天無是月非常月也公羊文公六年附月餘日閏月者附月之餘日也積分而成於月者也天子不以告朔而喪事不數也穀梁傳叢殘之數閏是叢殘之數非月之正穀梁注二終并終數為十九易窮則變故為閏法前志孟康曰天終數九地終數十窮終也言閏亦日之窮餘故取二終之數以為義注合二終以紀閏餘唐歷志無中氣書稱期三百六旬有六日以閏月定四時成歲允釐百工庶績咸熙是以天子必置日官諸侯必置日御世修其業以考其術舉全數而言故曰六日真實五日四分之一日日行一度而月日行十三度十九分度之有畸日官當會集此之遲疾以考成晦朔錯綜以設閏月閏月無中氣而北斗邪指兩辰之間所以異於他月也積此以相通四時八節無違乃得成歲其微密至矣得其精微以合天道事敘而不悖然陰陽之運隨動而差差而不已遂與曆錯故仲尼丘明每於朔閏發文蓋矯正得失因以宣明曆數也杜預長曆周禮云王出居寢門故為閏字門中從王也是月也不舉百事以無中氣也荊楚歲時記天度岐伯曰天以六六為節地以九九制會者所以正天之度氣之數也天度者所以制日月之行也氣數者所以紀化生之用也天為陽地為陰日為陽月為陰行有分紀周有道理日行一度月行十三度而有奇焉故大小月三百六十五日而成歲積氣餘而盈閏矣立端於始表正於中推餘於終而天度畢矣注云端首也始初也表彰示也正斗建也中月半也推退位也言立首氣於初節之日示斗建於月半之辰退餘閏於相望之後是以閏之前則氣不及月閏之後則月不及氣故常月之制建初立中閏月之紀無初無中縱曆有之皆他節氣也故曆無云其候閏某月節閏某月中也推終之義斷可知乎故曰立端於始表正於中推餘於終也由斯推日成閏故能令天度畢焉素問十九年七閏玄始曆以為十九年七閏皆有餘分是以中氣漸差據渾天二分為東西之中而晷景不等二至為南北之極而進退不齊此古人所未達也唐曆志二中曆本議曰天數中於五地數中於六合二中以通律曆天有五音所以司日也地有六律所以司辰也參伍相周究於六十聖人以此究天地之心唐律志此係曆藕楊應閏藕生應月至閏月益一節東坡詩惟有黃楊厄閏年小月臧日陽月者所以補小月之臧日以正歲數故三年一閏五年再閏獨斷甲子記稱大橈作甲子隸首作數二者既立以比日表以管萬事後志呂氏春秋曰黃帝師大橈月令章句大橈探五行之情占斗綱所建於是始作甲乙以名日謂之幹作子丑以名日謂之枝枝幹相配以成六旬注干支于幹也其名有十亦曰十母即甲乙丙丁戊己庚辛壬癸是也支枝也其名一十有二亦曰十二子即子丑寅卯辰巳午未申酉戌亥是也蔡雍獨斷太歲太歲在甲曰閼逢在乙曰旃蒙在丙曰柔兆在丁曰強圉在戊曰著雍在己曰屠維在庚曰上章在辛曰重光在壬曰玄黓在癸曰昭陽爾雅閼蓬許慎注曰言萬物鋒芒欲出擁遏未通故曰閼蓬也旃蒙在乙言萬物遏蒙甲也柔兆在丙萬物皆生枝布葉故曰柔兆也強圉在丁言萬物剛盛故曰強圉也著雍在戊言位在中央萬物繁養四方故曰著雍也屠維在巳萬物各成其性故巳曰屠維屠別維離也上章在庚言陰氣上升萬物畢生故曰上章也重光在辛言萬物就成熟其煌煌故曰重光玄黓在壬言歲終包任萬物故曰玄黓也昭陽在癸言陽氣始萌萬物合生故曰昭陽以上俱淮南子甲漢律曆志出甲於甲史記曰甲者言萬物剖符甲而出也説文甲位東方之孟陽氣萌動從木載孚甲之象徐曰孚猶葭孚殼蘀也乙志奮軋於乙史乙者言萬物生軋軋也説文乙象春草木冤曲而出陰氣尚強其出乙乙也徐曰乙乙未展也京房易傳乙屈也釋名乙軋也自抽軋而出也丙志明協於丙史丙者言陽道著明故曰丙説文位南方萬物成炳然陰氣初起陽氣將虧從一入門一者陽也徐曰坰猶門也天地陰陽之門也功成將去坰也釋名丙炳也物生炳然皆著見也丁志大盛於丁史丁者言萬物之丁壯也故曰丁説文夏時萬物皆丁壯成實徐曰物挺然成立之貌萬物盛於丙成於丁釋名丁壯也物體皆丁壯也戊志豐茂於戊釋名戊茂也物皆茂盛也説文戊中宮也象六甲五龍相拘絞也徐曰五土無定居主在中往來不相越故曰拘絞月令其日戊巳注戊言茂己言起己志理紀於己釋名已紀也皆有定形可紀識也説文己中宮也象萬物辟藏詘之形也徐曰萬物與陰陽之氣藏則歸土屈曲包容象人腹圜曲也庚志斂更於庚史庚者言陰氣庚萬物故曰庚説文位西方象秋時萬物庚庚有實也徐曰史記大橫庚庚堅強之貌辛志悉新於辛史辛者言萬物之辛生故曰辛説文秋時金剛味辛辛痛泣出徐曰言萬物方盛初見斷制故辛痛也釋名辛新也物初新者皆收成也壬志懷妊於壬史壬之為言任也言陽氣任養萬物於下也説文壬位北方也陰極陽生故易曰龍戰于野戰者接也象人懷妊之形承亥壬以子生之敘也釋名壬妊也陰陽交接懷妊也至子而萌也癸志陳揆於癸史癸之為言揆也言萬物可揆度故曰癸説文冬時水土平可揆度象水從四方流入也釋名癸揆也揆度而生乃出之也爾雅癸歸也五行屬水五運屬火歲名太歲在寅曰攝提格在卯曰單閼在辰曰執徐在巳曰大荒落在午曰敦牂在未曰協洽在申曰涒灘在酉曰作噩在戊曰閹茂在亥曰大淵獻在子曰困敦在丑曰赤奮若攝提格李巡注爾雅云萬物承陽而起故曰攝提格起也孔文祥云以歲在寅正月出東方為衆星之紀以攝提宿故曰攝提以其為歲月之首起於孟陬故曰格正也索隱曰天官書云攝提三星若鼎足句直斗杓所指以建時節故為攝提格格至也言攝隨月建至也楚辭攝提貞于孟陬兮王逸注孟始也正月為陬史記作正月其名監德單閼許慎注曰單盡閼止也言陽氣推萬物而起陰氣盡止也史二月其名降入執徐執蟄徐舒也言伏蟄之物皆散舒而出也史三月其名青章大荒落荒大也方萬物熾盛而大出霍然落落大布散史四月其名跰迹敦牂言萬物皆盛壯也敦牂敦盛牂壯也史五月名啓明協洽協和洽合也言陰陽化生萬物和合史六月其名長烈涒灘涒大灘修也言萬物皆修其精氣也李巡云涒灘物吐秀傾垂之貌呂氏春秋曰維秦八年歲在涒灘高誘注涒大也灘循也萬物皆大循其情性也涒灘誇人短舌不能言為涒灘也史七月其名大晉作噩作鄂零落也萬物皆陊落李巡云作鄂萬物皆落拔起之貌史八月其名長王閹茂掩蔽茂冒言萬物皆蔽冒史九月其名天睢大淵獻淵藏獻迎也言萬物終於亥大小深藏窟伏以迎陽孫炎云淵深也大獻萬物於天深謂蓋藏之於外者也史十月其名大章困敦困混敦沌也言陽氣皆混沌萬物牙孽也孫炎云言萬物初萌混沌於黃泉之下史十一月其名天泉赤奮若奮起也若順也言陽氣奮迅萬物而起無不順其性也赤陽色李巡云言陽氣奮迅史十二月其名天皓志作昊子前志陰陽合德氣鍾於子化生萬物者也故孽萌於子史記子者滋也滋者言萬物滋於下也説文子十一月陽氣動萬物滋入以為稱徐曰十一月夜半陽氣所起人承陽故以為稱白虎通曰子孳也孳孳無已也釋名子孳也陽氣始萌孳生於下也於易為坎坎險也丑志紐牙於丑史丑者紐也言陽氣在上未降萬物厄紐未敢出也説文丑紐也十一月萬物動用事象手之形時加丑亦舉手時也徐曰丑象手有所執也昧爽為丑人皆起有為也釋名丑紐也寒氣自屈紐也於易為艮艮限也時未可聽物生限止之也寅志引達於寅史寅言萬物始生蚓然也説文寅臏也正月陽氣動去黃泉欲上出陰尚強也象穴不達臏寅於下也徐曰臏擯斥之意人陽氣上鋭而出閡於寅也臼所擯也釋名寅演也演生物也卯志茂茆於卯師古曰茆謂叢生也史卯之為言茂也言萬物茂也説文卯冒也二月萬物冒地而出象開門之形故二月為天門徐曰二月陰不能制陽冒而出也天門萬物畢出也晉樂志卯茂也謂陽氣生孳孳茂也釋名於易為震二月之時雷始震也辰志振美於辰史辰者言萬物之蜄也説文辰震也三月陽氣動雷電振民農時也釋名辰伸也物皆伸舒而出也巳志巳藏於巳史巳者言陽氣之巳盡也説文巳也四月陽氣巳出陰氣巳藏萬物見成文章故巳為蛇象形徐曰巳主蛇象蛇之變化有文章也釋名巳巳也陽氣畢布巳也於易為巽巽散也物皆生布散也又云巳巳也如出有所為畢巳復還而入也毛氏曰陽氣生於子終於巳巳者終巳也象陽氣既極回復之形故又為終巳字午志咢布於午史午者陰陽交故曰午説文午牾也五月陰氣午逆陽冒地而出也徐曰人為陽一為地丨為陰氣貫地午逆陽也五月陽極陰生仵者正衝之也午亦象衝逆也釋名午仵也陰氣從下上與陽相仵逆也於易為離離麗也物皆附麗陽氣以茂也未志昧薆於未師古曰薆蔽也史未者言萬物皆成有滋味也説文未味也六月之辰也五行木老於未象木重枝葉也釋名未昧也日中則昃向函昧也申志申堅於申史申者言陰用事申賊萬物故曰申淮南子申者呻之也説文申神也七月陰氣成自申束杵臼自持也吏以餔時聽事申旦政也釋名申身也物皆成其身體各申束之使備成也酉志留孰於酉史酉者萬物之老也故曰酉淮南子酉者飽也説文酉就也八月季秋可為耐酒徐曰就成熟也釋名酉秀也秀者物皆成也於易為兌兌悅也物得備足皆喜悅也戌志畢入於戌史戌者言萬物盡滅故曰戌説文滅也九月陽氣微萬物畢成陽下入地戌舍一也五行土生於戊盛於戊釋名戌恤也物當收斂矜恤之也亦言脫也落也亥志該閡於亥史亥者該也言陽氣藏於下故該也孟康云閡藏塞也陰雜陽氣藏塞為萬物作種也説文亥荄也有微陽起接盛陰徐曰言萬物之荄皆動也從上者陽微在下也十月盛陰感陽萬物皆舍育於內象人之懷妊也釋名亥核也收藏百物核取其好惡真偽也亦言物成皆堅核也十二辰禽五行之氣相賊害含血之蟲相勝服其驗何在曰寅木也其禽虎也戌土也其禽犬也丑未亦土也丑禽牛未禽羊也木勝土故犬與牛羊為虎所服也亥水也其禽豕也巳火也其禽蛇也子亦水也其禽鼠也午亦火也其禽馬也水勝火故豕食蛇火為水所害故馬食鼠屎而腹脹然亦有不相勝者午馬也子鼠也酉雞也卯兔也水勝火鼠何不逐馬金勝木雞何不啄兔亥豕也未羊也丑牛也土勝水牛羊何不殺豕巳蛇也甲猴也火勝金蛇何不食獼猴猴畏鼠者也囓獼猴者犬也鼠水獼猴金也水不勝金獼猴何故畏鼠戌犬也申猴也土不勝金猴何故畏犬十二辰之禽以氣性相克則尤不相類應大凡含血之蟲相服至于相啖食者以齒牙頓利斤力優劣自相勝服也論衡相屬陰陽日家璩公選云子寅辰午申戌俱陽數取相屬之奇數以為名鼠五指虎五指龍五指馬單蹄猴五指狗五指丑卯巳未酉亥俱陰數取相屬之陰數以為名牛四爪兔兩爪蛇雙舌羊四爪雞四爪豬四爪暘谷謾録肖形不足術家以十二肖配十二辰每肖各有不足之形焉如鼠無牙牛無齒虎無脾兔無唇龍無耳蛇無足馬無贍羊無神猴無臀雞無腎犬無腸豬無筋人則無不足也草木子月陽月在甲曰畢在乙曰橘在丙曰修在丁曰圉在戊曰厲在己曰則在庚曰窒在辛曰塞在壬曰終在癸曰極爾雅月名正月為陬二月為如三月為寎四月為余五月為皋六月為且七月為相八月為壯九月為玄十月為陽十一月為辜十二月為塗上疏此辨以日配月之名也設若正月得甲則曰畢陬二月得乙則曰橘如三月得丙則曰修寎四月得丁則曰圉余五月得戊則曰厲皋六月得己則曰則且七月得庚則曰窒相八月得辛則曰塞壯九月得壬則曰終玄十月得癸則曰極陽十一月得甲則曰畢辜十二月得乙則曰橘塗周而復始亦可知也若史記歷書云月名畢聚也載祀載歲也夏曰歲商曰祀周曰年唐虞曰載爾雅疏夏曰歲取歲星行一次夏書曰每歲孟春遒人以木鐸徇于路是也商曰祀取四時一終則以祀者嗣也取其興來繼往之義孫炎曰取四時祭祀一訖商書曰惟元祀十有二月乙丑伊尹祀于先王是也周曰年者取禾一熟也案説文云年穀熟也從禾千聲春秋曰大有年然則年者禾熟之名每歲二熟故以為歲名左傳曰卜年七百是也唐虞曰載載始也取物終更始堯典曰朕在位七十載舜典曰五載一巡守是也行事直辰春秋元命苞曰歲之為言遂也注遂出也出行事於所直辰也釋名曰歲越也越故限也年進也進而前也祀巳也新氣生故氣巳也載載生主言年五運岐伯曰五日謂之候三候謂之氣六氣謂之時四時謂之歲而各從其主治焉五運相襲而皆治之終期之日周而復始時立氣布如環無端候亦同法素問天氣周孔子曰歲三百六十日而天氣周八卦用事各四十五日而備歲用事易乾鑿度改節易常太陰治春則欲行柔惠溫良太陰治夏則欲布施宣明太陰治秋則欲修備繕兵太陰治冬則欲猛毅剛強三歲而改節六歲而易常故三歲而一飢六歲而一衰十二歲而一康淮南子天道歲在申酉乞漿得酒歲在辰巳嫁妻賣子夫盛衰更代豐荒相半天之常道也袁子正書語四仲四孟律曆志分二十八宿為十二次晉灼注天文志云太歲在四仲則歲行三宿太歲在四孟四季則歲行二宿二八十六三四十二面行二十八宿十二歲而周天是歲星年行一次也後律曆志日行一度積三百六十五度四分度之一而周天一匝名曰歲四時備成日周于天一寒一暑四時備成萬物畢改攝提遷次青龍移辰謂之歲歲首至也月首朔也至朔同日謂之章同在日首謂之蔀蔀終六旬謂之紀歲朔又復謂之元後志二呂目歲前志春秋二呂目歲鄧展曰春秋則為二矣孟康曰春為陽中萬物以生秋為陰中萬物以成舉春秋以目一歲終陽董仲舒曰天使陽出布施於上而主歲功使陰入伏於下而時出佐陽陽不得陰之助亦不能獨成歲終陽以成歲為名此天意也前漢書統首歲星主歲事為統首號令所紀上歲朝尚書大傳曰凡六沴之作歲之朝月之朝日之朝后王受之歲之中月之中日之中則正卿受之歲之夕月之夕日之夕則庶民受之鄭玄曰自正月盡四月為歲之朝後志曰凡六氣相傷謂之沴一白二十二祖摩拏羅至月氏國鶴勒那問祖曰我止林間已經九白印度以一年為一白傳燈録斗指斗正月指寅二月指卯三月指辰四月指巳五月指午六月指未七月指申八月指酉九月指戌十月指亥十一月指子十二月指丑終而復始淮天文訓旬浹十日曰旬十二日曰浹十日亦曰浹禮信次一宿為舍二宿為信過信為次左傳十時日之數十故有十時之數亦當十位自王已下其二為公其三為卿注日中當王食時為公平旦為卿雞鳴為士夜半為皂人定為輿黃昏為隸日入為僚晡時為僕日昳為臺隅中日出闕不在第尊王公曠其位昭五剛柔五剛甲丙戊庚壬五柔乙丁己辛癸注王制注敬日故善日者王善時曰霸王者敬日霸者敬時荀強國篇愛日孔子愛日又或曰君子愛日乎楊五百篇有四子産曰君子有四時朝以聽政晝以訪問夕以修令夜以安身左昭惜陰聖人不貴尺之璧而重寸之陰時難得而易失也禹之趨時也履遺而弗取冠挂而弗顧非爭其先也而爭其得時也淮南子競辰辰乎辰曷來之遲去之速也君子競諸淮南子掘太歲朝良正性剛不怖鬼每年常掘太歲地掘後忽見一肉物良正打之三日送於河其夜使人視之三更後車馬甚衆來至肉所問太歲何故受此屈辱不讎報之太歲曰彼正榮盛無奈之何暨明失所在廣異記董表儀家在河沙塘東嘗欲撤屋掘土陰陽人云太歲居北方不可興工既而掘深三尺許得肉塊漫漫然董惡之投諸河訖亦無禍傳載築牆太歲工部員外張周封言舊莊在城東狗梁觜西嘗築牆於太歲上一夕盡崩且意其基虛工不至率莊客指揮復築之高未數尺炊者驚叫曰怪作矣遽視之飯數斗悉躍出地著牆勻若蠶子無一粒重者矗牆之半如界焉因謁巫酹地謝之亦無他酉陽雜俎掘歲得禍上元末復有李氏家不信太歲掘之得一塊肉相傳云得太歲者鞭之數百當免禍害李氏鞭九十餘忽然騰上因失所在李氏家有七十二口死亡略盡惟小蒯公尚存李氏兄弟恐其家滅盡夜中令奴悉作鬼裝束劫小蒯便藏之唯此子得存其後襲封蒯公廣異記寧州有人亦掘得太歲大如方狀類赤菌有數千眼其家不識移至大路遍問識者有胡僧驚曰此太歲也宣速埋之其人遽送舊處經一年人死略盡上萊州即墨縣有百姓玉豐兄弟三人豐不信方位所忌嘗於太歲上掘坑見一肉塊大如斗蠕蠕而動遂填其坑肉隨填而出豐懼棄之經宿肉長塞於庭兄弟奴婢數日內悉暴卒惟一女子存焉酉陽雜俎熱煮釋名曰熱爇也如火之燒熱也或曰暑煮也如煮物也溽暑禮曰季夏之月土潤溽暑説文曰溽濕暑也焦金爛石夏至陰陽之會北方而物動於下南方物動於上故至日後為熱焦金爛石也春秋繁露蔭暍武王蔭暍人於柳下而天下懷淮南子武王見暍人王自左擁而右扇之世説身熱阪罽賓國武帝時剽殺漢使成帝時復遣使奉獻謝罪杜欽説大將軍王鳳不令使使向罽賓國曰此國道經大頭痛小頭痛之山赤土身熱之阪令人身熱無色頭痛嘔吐驢畜盡然漢書壽麻壽麻之國爰有大暑不可以往山海經赤帝所司南方之極自北戶之界至炎風之野赤帝祀融之所司淮南子穿岸為室馬援征武陵五溪蠻夷進營壺頭賊乘高守隘水疾船不得上會暑甚士卒多疫死援亦中病遂因乃穿岸為室以避炎氣本傳武陵記曰壺頭山邊有石窟即援所穿室也室內有蛇如百斛船大云是援之餘靈也渡瀘諸葛亮出師表曰五月渡瀘深入不毛蜀志益州記曰瀘水即武侯渡處水有熱氣暑天不敢行入水避暑葛洪從祖仙公每大醉及夏天盛熱輒入深水底入日乃出者正以能閉氣胎息故耳抱朴子露臺桂館一名甘泉作迎風觀寒露臺以避暑潘嶽關中記熱身尉婦荀奉倩與婦至篤冬月婦病熱乃出中庭自取冷還以身尉之婦亡奉倩後少時亦卒以是獲譏於世世説瓜鎮心鄭灼字茂昭勵志好學多苦心熱若瓜時輒偃臥以瓜鎮心便起讀誦其篤志如此梁書避暑九成宮太宗欲幸九成宮馬周上疏曰宮去京三百里本為避暑行也太上皇留熱處而陛下走涼處溫清之道臣所未安太宗善其言唐書童子參見岑文本避暑山亭忽有報上清童子元寶衣淺服青衣曰此上清五銖服出門不見伺之東行數步於院牆下瞥然而沒文本命工力掘之古墓中得古錢一枚文本方悟上清童子是青銅名元寶錢之文也博異志積冰成山玄宗起涼殿拾遺陳知節上疏極諫上令九士召對時暑毒方甚上在涼殿座後冰激扇車風獵衣襟知節至賜坐石塌陰霤沉吟仰不見日四隅積冰成山簾水飛灑坐內含凍復賜冰屑麻飲陳體生寒粟腹中雷鳴再三請起方許上猶拭汗不已陳才及門遺泄狼籍逾日復召謂曰卿論事宜審勿以己方萬乘也廬陵官下記冷蛇申王有肉疾腹垂至骭玄宗召南方取冷蛇數修賜之蛇長數尺色白不螫人執之冷如握冰申王腹有數約夏月置于約中不復覺煩暑酉陽雜俎出征冒暑王承宗叛詔吐突承璀出討兵老不決白居易上言今暑濕暴露兵氣薰蒸雖不顧死孰堪其苦本傳辟暑犀文宗延學士於內庭討論經義李訓講周易微義頗叶於上意時方盛夏遂命取冰玉腰帶及辟暑犀如意以賜訓訓謝之上曰如意足以與卿為談柄也神異龍皮避暑韋澳孫宏大中時同在翰林盛暑上在太液池中宣二學士既赴召中貴人頗以絺綌為訝初殊未悟及就坐但覺寒氣逼人熟視有龍皮在側尋宣賜銀餅餡食之甚美既而醉以醇酎二公因茲苦河魚者數夕上竊知笑曰卿不奈事朕日進十數未嘗有損銀餅餡皆乳酪膏腴所製也托言鴈臣元魏時北夷酋長遣子入侍者常秋來春去以避中國之熱時人謂之鴈臣伽藍記熱風西域大流沙多熱風觸人及六畜皆迷仆唐書土熱牂柯無城郭土熱多霖雨稻粟再熟上陽水有雲大如車蓋十餘此陽水之氣必暑有暍者京房易飛候褦襶古樂府詩云今世褦襶子觸熱向人家炙轂子云褦襶笠子也集韻解云褦襶不曉事不畏盛暑呂公著居家夏不排窗不揮扇冬不附火一日盛夏楊大夫懷寶字器之將赴鎮戎軍倅來辭器之乃呂氏甥公著於西窗下烈日中公裳對飲三杯器之汗流浹背公凝然不動雜志冰鼠北方曾冰萬里厚百丈有磎鼠在冰下土中焉行如鼠食草木肉重千斤可以作脯食之已熱其毛八尺可以為褥臥之却寒其皮可以蒙鼓聲聞千里有美尾可以來鼠此尾所在鼠聚今江南鼠食草木為災此類也神異經鑠石楚辭云魂兮歸來東方不可以託十日代出流金鑠石抱朴子云朱颷鑠石不能靡蕭丘之木南方生熱陰陽應象大論云南方生熱注陽氣炎灼故生熱暄暑成燠熱之用也五運行大論注云暄暑鬱蒸熱之化也炎赫沸騰熱之用也又云太虛昏翳其若輕塵山川悉然熱之氣也大明不彰其色如丹鬱然之氣也若形雲恭升從然乍盈下縮谷之熱也內經伊鬱感乎溽暑之伊鬱而慮性命之所乎景福殿賦爛渭賈誼旱雲賦隆盛暑而無聊兮煎砂石而爛渭湯風至而含熱兮群生悶滿而愁憒畝畝枯稿而失澤兮壤石相聚而為害焦金陰陽之會冬合北方而物動於下夏合南方而物動於上上下之大動皆在日至之後為寒則凝冰烈地為熱則焦沙爛石氣之精異於是繁露捍釋名曰寒捍也捍格也𩅀説文曰𩅀寒也從雨執聲凜清寒也義氣天地嚴凝之氣始於西南而盛於西北此天地之義氣也禮記北方生寒應象論云北方生寒注陰氣凝冽故生寒藏清慘冽寒之用也運行論注云凝慘冰雪寒之化也凜冽霜雹寒之用也柔耎之物遇寒則堅寒之化也大虛澄淨黑氣浮空天色黯然高空之寒氣也若氣似散麻本末皆黑氣見川澤之寒氣也太虛清白空尤雪映遐邇一色山谷之寒氣也太虛白昏火明不翳如霧雨氣遐邇肅然北望色玄凝氛夜落此水氣所生寒之化也太虛凝陰白埃昏翳天地一色遠視不分此寒濕凝結雪之將至也地裂水冰河渠乾涸枯澤浮鹹木斂土堅是土勝水冰不得自清水所生寒之用也大火中大火寒暑之候也火星中而寒暑退豳七月注單襄公曰火見而清風戒寒國語張躍曰火中寒暑乃退注心以季夏昏中而暑退季冬旦中而寒退左昭三挾纊楚子圍蕭申公巫臣曰師人多寒王巡三軍拊而勉之三軍之士皆如挾纊左宣十二出裘衣寒賈子云楚王當戶而立愀然有寒色曰寡人尚然奈百姓何乃出府裘以衣寒者也北堂書抄築臺景公起火臺歲寒役之凍餒者有焉公延晏子坐飲酒樂晏子歌曰庶民之凍我若之何奉上靡弊我若之何歌終喟然流涕公止之曰子殆為大臺之役夫寡人將罷晏子春秋鑿池衛靈公天寒鑿池宛春諫曰天寒起役恐傷民公曰天寒乎宛春曰公衣狐裘坐熊席陬隅有竈是以不寒今民衣敝不補履決不組君則不寒矣民則寒矣公曰善令罷役左右以諫曰君鑿池不知天之寒也而春也知之以春之知之也而令罷之福將歸于春也而怨將歸于君公曰不然夫春也魯國之匹夫也而我舉之夫民未有見焉今將令民以此見之曰春也有善於寡人有也春之善非寡人之善歟呂氏春秋解裘田單為齊相過淄水有老人涉淄而出不能行寒坐于沙中乃解裘衣之襄王曰單之後施欲取我國乎有貫珠者聞之曰不如因以為已善乃下令曰寡人憂民之寒而單解裘衣人稱寡人之意於是閭里相與語曰田單之愛人乃王之教也戰國策加衣昔者韓昭侯醉而寢典冠者見君之寒也故加衣於君之上覺寢而説問左右曰誰加衣者左右對曰典冠君因兼罪典衣與典冠其罪典衣以為失其事也其罪典冠以為越其職也非不惡寒也以為侵官之害甚於寒故明主之畜臣臣不得越官而有功不得陳言而不當越官則死不當則罪守業其官所言者貞也則群臣不得朋黨相為矣韓子天寒後門戎夷違齊如魯天大寒而後門與弟子一人宿於郭外寒愈甚謂其弟子曰子與我衣我活也我與子衣子活也我國士也為天下惜死子不肖人也不足愛也子與我子之衣弟子曰夫不肖人也又惡能與國士之衣哉戎夷太息歎曰嗟夫道其不濟夫解衣與弟子夜半而死弟子遂活呂氏春秋賜綈袍范睢相秦魏須賈使秦睢微行弊衣間出見須賈賈曰今叔何事范睢曰臣為人傭賃須賈意哀之留與坐飲食曰范叔一寒如此哉乃取一綈袍以賜之史記四月寒秦始皇九年四月寒凍民有死者洪範五行傳墮指上聞韓王信降胸奴上將擊之連戰乘勝逐北至樓煩會天寒士卒墮指者十二三漢書積陰鼂錯上疏曰夫狐貉之地積陰之處也木皮三寸水厚六尺食肉而飲酪其人密理鳥獸毳毛其性能寒漢書忍寒元帝時漢中道人王仲都能忍寒乃於盛寒日令袒衣載以駟馬於昆明池上環水而走御者厚衣狐裘甚寒而仲都獨無變色桓談新論月旁寒河東項曼都好道學仙去家二年而反曰去時有數仙人將上天離月數里而止月之旁其寒凄凄論衡八月大寒王莽天鳳四年八月莽親之南郊鑄作威斗是日大寒百官人馬有凍死者漢書不得歸寢嚴遵者與光武俱為諸生遊涉汝頴同行精學暮夜宿息二人勤學寒不得歸寢更相謂曰後日豪貴憶此之難勿相忘別後數年光武即位下詔徵遵遵不至鐘離意別傳上豆粥王郎起兵上自東南馳夜至蕪蔞亭時天寒冽衆皆飢疲馮異上豆粥明旦上謂諸將曰昨得公孫豆粥飢寒俱解東觀漢書盛夏寒盛夏多寒韋彪上疏諫曰臣聞政治之本必須陰陽伏見立夏以來當暑而寒殆刑罰刻急郡國不時令之所致也謝承書六月如冬獻帝初平四年六月寒風如冬時續五行志大寒吐火葛仙公與客談語時天大寒仙公謂客曰居貧不能人人得爐火請作一大火共致暖者仙公因吐氣火赫然從口出須臾火滿屋客皆熱脫衣別傳毒害竇武上表曰今日大寒過節毒害鳥獸城旁竹柏皆為傷死龍涸常寒六月二十六日發龍涸晝夜肅肅常寒不復得脫襦袴將從七十二人面盡黎黑口唇青沙州記辟寒金嗽金鳥出昆明國形如雀色黃常翱翔於海上魏明帝時其國來獻此鳥飴以真珠飲以龜腦鳥常吐金屑如粟鑄之可以為器此鳥不畏霜雪乃起小臺處之名曰辟寒臺皆用水精為戶牖使內外通光宮人爭以鳥吐之金用飾叉珮謂之辟寒金故宮人相嘲曰不服辟寒金那得帝王心不服辟寒鈿那得帝王憐拾遺記誰似辟寒金聊借與空床暖古樂府凌破河橋永寧二年十二月大寒凌破河橋晉朝雜事八月寒凍十三年春二月虎率三公九卿躬耕籍田后率三夫人命婦先蠶近都是歲八月雨雪大寒行旅凍死石虎別傳鶴語寒大興二年冬大雪南州人見二白鶴語於橋下曰今茲寒不臧堯崩年也於是飛去異苑傷民大興四年大寒傷民冰厚時王敦肆亂殺戮忠良晉朝雜事入宮酷寒桓玄入建康宮逆風迅激旌旗不立法章儀飾一皆傾偃是月酷寒晉中興書奇寒魏使崔劼曰今歲奇寒江淮亦冰酉陽雜俎辟寒犀開元二年冬至交趾國進犀一株色黃如金使者請以金盤置於殿中溫溫然有暖氣襲人上問其故使者對曰此辟寒犀也頃自隋文帝時本國曾進一株直至今日上甚悅厚賜之天寶遺事裂膚涼州都督楊敬述使官屬盧公等勒兵討突厥會大寒裂膚士卒不能張弓矢乃敗唐書引避錢徽拜左丞會宣墨麻群臣在庭方大寒稍稍引避徽素恭謹不去位久而仆上歲苦寒文宗時大臣新族死歲苦寒外情不安李石傳却寒簾咸通九年同昌公主下降錫錢五百貫仍罄內庫寶貨以實其宅更賜金麥銀粟數斛堂設連珠之帳績真珠以成也却寒之簾類玳瑁班有紫色云寒鳥骨所為也則未知何出杜陽雜編辟寒香同昌公主乘七寶步輦綴五色玉香囊貯辟寒香異國所獻也杜陽編辟寒香丹國所出述異國辟寒鯽東南方海中有祖洲上有烜湖其內鯽魚出焉長八尺食之宜暑而避風寒之氣此魚狀即與江湖小鯽相類耳神異經尋陽有青林湖鯽魚大者二尺餘小者滿尺食肥美亦可止寒熱也酉陽雜俎沈寒陸業通連珠曰烈火流金不能焚景沈寒凝海不能結冰不周不周之國地寒括地圖思玄賦縱余緤乎不周五寒單快曰國有五寒而冰凍不與焉一曰政外二曰女厲三曰謀泄四曰不敬卿士而國家敗五曰不能治內而務外此五者一見雖祠無福除禍必得致福則貸説苑折綿阮籍歌云陽和微弱陰氣竭海凍不流綿絮折呼吸不通寒冽冽庾肩吾詩徑氣方凝酒清威正折綿折骨魏應璩新詩曰嵐山寒折骨面目盡生瘡嵐山羌中山名寒暴讖曰寒者小人暴雪專權居位無道有位適罰無法又殺無罪其寒必暴殺寒門北方有北極之山曰寒門淮南子注積寒所在故曰寒門楚辭踔絶垠于寒門大人賦軼先驅於寒門穴居挹樓國地寒人多穴居廣志避忌氣異陰陽氣不同處萬物生焉冬三月之時草木既死萬物各異藏故陽氣避之藏伏壯於內使陰陽得成功於外夏三月之時萬物遂長陰氣避之下藏伏壯於內而萬物親而信之陽者主生萬物方夏三月之時大熱不至則萬物不能成陰氣主殺方冬三月之時地不內藏則根荄不成即春無生故一時失度即四序為不行越絶蔭揚陰蔭也氣在內奧蔭也陽揚也氣在外發揚也釋名三合獨陰不生獨陽不生獨天不生三合然後生穀梁莊天道天道之天者在陰陽陽為德陰為刑刑主殺而德主生是故陽常居大夏而以生育養長為事陰常居大冬而積於空虛不用之處以此見天之任德不任刑也天使陽出布施於上而主歲功使陰入伏於下而時出佐陽陽不得陰之助亦不能獨成歲終陽以成歲為名此天意也前漢董仲舒傳推移利用春秋冬夏陰陽之推移也時之短長陰陽之利用也日夜之易陰陽之化也管子天地大理陰陽者天地之大理也四時者陰陽之大經也刑德者四時之合也上處陰處陽春采生秋采蓏夏處陰冬處陽此言聖人之動靜開闔詘信浧儒取與之必因於時也上分晝夜一晝一夜陰陽分索夜道極陰晝道極陽陽不極則陰不萌陰不極則陽不牙玄摛德義順帝梁后云夫陽以慱施為德陰以不專為義螽斯則百福之所由興後漢書天經立天之經曰陰與陽陽不陰無與合其施陰陽所以抽嘖也嘖情也抽理也玄攡舒慘張平子西京賦夫人在陽時則舒在陰時則慘此牽乎天者也施化陽尊陰卑蓋乃天性陽性純而能施陰體順而能化後荀爽傳閉開甘泉賦帥爾陰閉霅然陽開晉灼曰帥聚也霅散也文子曰與陰俱閉與陽俱開韓文春生秋殺陽開陰閉饒乏陽動吐陰靜翕陽道常饒陰道常乏陰陽之道也玄告閉隔萬物之中以人為貴故聖人養之以君成之以化順四時之宜適陰陽之和陰陽閉隔則二氣否塞二氣否塞則人物不昌風雨不時風雨不時則水旱成災後漢天地之方一陰一陽天地之方乃文乃質王道之綱賓戲抱負萬物負陰而抱陽中氣以為和老子動靜知天樂者靜而與陰同德動而與陽同波莊天道肅赫至陰肅肅至陽赫赫肅肅出乎天赫赫發乎地兩者交通成和而物生焉田子方錯行陰陽錯行則天地大絯於是乎有雷有霆莊外物氣大天地者形之大者也陰陽者氣之大者也陰陽相照相蓋相治莊則陽德刑天道之常一陰一陽陽者天之德也陰者天之刑也天之道任陽不任陰王者之道任德不任刑順天也繁露陽行於順陰行於逆逆行而順順行而逆者陰也是故天以陰為權以陽為經陽出而雨陰出而北經用於盛權用於末以此見天之顯經隱權前德而後刑也故曰陽天之德陰天之刑也陽氣暖而陰氣寒陽氣子而陰氣奪陽氣仁而陰氣戾陽氣寬而陰氣急陽氣愛而陰氣惡陽氣生而陰氣殺是故陽常居實位而行於盛陰常居空虛而行於末天之好仁而近惡戾之變而遠大德而小刑之意也先經而後權貴陽而賤陰也上處陰陽之行終各六月遠近同度而所在異處陰之行春居東方秋居西方夏居空右冬居空左夏居空下冬居空上此陰之常處也陰之行春居上冬居下此陽之常處也陰終歲四移而陽常居實非親陽而踈陰任德而遠刑與上位休陽氣始出東北而南行就其位也西轉而北入藏其休也陰氣始東南北行亦就其位也西轉而南入屏其服是故陽以南方為位以北方為休陰以北方為位以南方為休陽至其位而大暑熱陰至其位而大寒凍陽至其休而入化於地陰至其伏而避德於下是故夏出長於上冬入化於下者陽也夏入守虛地於下冬出守虛位於上者陰也陽出實入實陰出空入空天之任陽不任陰好德不好刑如是也故陰陽終歲各一出上治陰陽武后詔問調元氣之道陳子昂對曰元氣天地之始萬物之祖王政之大端也天地莫大於陰陽萬物莫靈於人王政莫先於安人故人安則陰陽和陰陽和則天地平天地平則元氣正昔黃帝合德有虞總期堯衢室夏世室皆所以調元氣治陰陽也夏商之末桀紂昏暴陰陽乖行天地震怒唐書瀆為災武后嘗以季秋出朝視事宰相以為祥杜景儉曰洪範五行傳陰陽不相奪倫瀆之即為災春秋云冬無純陽夏無伏陰春無凄風秋無苦雨今已秋矣草木黃落而忽生此花瀆陰陽也舊唐愆候開元初張廷圭上疏頃陰陽愆候五穀失稔關輔尤劇唐書天地之道黃帝曰陰陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也故積陽為天積陰為地陰靜陽躁陽生陰長陽殺陰藏陽化氣陰成形素問把握上古有真人者提挈天地把握陰陽中古有至人者淳德全道和於陰陽調於四時上天陰天陽陰中有陰陽中有陽平旦至日中天之陽陽中之陽也日中至黃昏天之陽陽中之陰也合夜至雞鳴天之陰陰中之陰也雞鳴至平旦天之陰陰中之陽也彰兆天地之動靜神明為之紀陰陽之升降寒暑彰其兆阜生肅殺陽面阜生陰而肅殺天之能也陽而藝樹陰而揫斂人之能也劉禹錫天論尊卑陽者陰之長也其在鳥則雄為陽雌為陰其在獸則牡為陽而牝為陰其在民則夫為陽而婦為陰其在家則父為陽而子為陰其在國則君為陽而臣為陰故陽貴而賤陽尊而陰卑天之道也説苑陰陽家陰陽之術大詳而衆忌諱使人拘而多畏夫陰陽四時八位十一度二十四節各有教令曰順之者昌逆之者亡未必然也故曰使人拘而多畏司馬遷傳陰陽家者流蓋出於羲和之官敬順昊天歷象日月星辰敬授民時此其所長也及拘者為之則牽於禁忌泥於小數舍人事而任鬼神藝文志象法天失陰陽則亂其道地失陰陽則亂其財人失陰陽則絶其後君臣失陰陽則其道不理五行四時失陰陽則為災今天垂象為人法故當承順之也太平經為御大丈夫以四時為馬陰陽為御文子行首九疇天錫禹洪範九疇初一曰五行一曰水二曰火三曰木四曰金五曰土水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘洪範人用水火者百姓之求飲食也金木者百姓之所興作也土者萬物之所資生也是為人用書大義五材天生五材民並用之廢一不可誰能去兵襄左傳五行即五材也言五者各有材幹也謂之行者若在天則五氣流行在地世所行用也書正義五體微著萬物之本有生於無著生於微及其成形亦以微著為漸五行先後亦以微著為次五行之體水最微為一火漸著為二木形實為三金體固為四土質大為五洪範疏更王古之王者易代改號取法五行五行更王終始相生亦蒙其宜是以太皥配木炎帝配火黃帝配土少皥配金顓頊配水家五帝分時季康子問五帝之名不知其實孔子曰天有五行木水金火土分時化育以成萬物其神謂之五帝上五正季康子曰勾芒為木正祝融為火正蓐收為金正亢宜為冰正后土為土正此五行之主而不亂稱曰帝者何子曰五正者五行之官名五行佐成土帝故稱王帝上五神木神則仁金神則義火神則禮水神則智土神則信中庸鄭注五音協之五行則角為木商為金祉為火羽為水宮為土前律歷志勝負夫火熱而水滅之金剛而火銷之木強而金伐之水流而土遏之惟造化者物莫能勝也淮南子五物萬物盈於天地之間而其為物最大且多者有五曰水火木金土其用於人也非此五物不能以為生而闕其一不可是以聖王重焉夫所謂五物者其見象於天也為五星分位於地也為五方行於四時也為五德稟於人也為五常播於音律為五聲發於文章為五色而總其精氣之用謂之五行唐志五官天地之氣合而為一分為陰陽判為四時列為五行行者行也其行不同故謂之五行五行者五官也比相生而間相勝也繁露天次天有五行木五行之始水五行之終土五行之中也此其天次之序也木生火火生土土生金金生水水生木此其父子也木居左金居右火居前水居後土居中央此其父子之序相受而布是故木受水而火受木土受火金受土水受金也諸授之者皆其父也受之者皆其子也常因其父以使其子天之道也是故木已生而火養之金已死而木藏之火樂木而養以陽水克金而喪以陰土之事天竭其忠故五行者乃孝子忠臣之行也上母子相生水生木木生火火生土土生金金生水子生母曰義母生子曰保子母相得曰專母勝子曰制子勝母曰困淮南子三辰生狀木生於亥壯於卯死於未也三辰皆木也火生於寅壯於午死於戌三辰皆火也土生於午壯於戌死於寅三辰皆土也金生於巳壯於酉死於丑三辰皆金也水生於申壯於子死於辰三辰皆水也上五勝岐伯曰五勝更立木得金而伐火得水而滅土得木而達金得火而鈌水得土而絶萬物盡然不可勝竭實命全形論勾如曰桓繆據五勝之便而列六國吳越春秋五運太虛廖廓肇基化元萬物資始五運終天天元紀大論五運相襲周而復始時立氣布如環無端六節藏象論夫五運之政猶權衡也高者抑之下者舉之化者應之變者復之此生長化成收藏之理氣之常也失常則天地四塞矣氣交變大論注五運謂五行之氣應天之運而王化者也宋均保乾圖注曰五運五行用事之運五化木曰敷和火曰升明土曰備化金曰審平水曰靜順敷和之紀木德周行陽舒陰布五化宣平升明之紀正陽而治德施周普五化均衡備化之紀氣協天休德流四政五化齊修審平之紀收而不爭殺而不犯五化宣明靜順之紀藏而勿害治而善下五化咸整其不及木曰委和火曰伏明土曰卑監金曰從革水曰涸流其太過木曰發生火曰赫曦土曰敦阜金曰堅成水曰流衍素問更用易乾鑿度孔子曰立德之數先立木金水火土德各三百四歲五德備凡千五百二十歲太終復初故曰五行更用郎顗傳注相本地秉陰竅於山川播五行於四時五行之動迭相竭也五行四時十二月還相為本也禮運更運應吉甫華林集詩五德更運膺籙受符注七略曰鄒子有終始五德言土德不勝木德繼之金德次之火德次之水德次之春秋命歷次曰五德之運同德合符膺籙次相代生殖展禽曰天之王辰民所以瞻仰也地之五行所以生殖也魯語雜成岐伯曰先王以土與金木水火離以成百物鄭語萬物之本五行萬物之本天地百物莫不用之洪範疏九穀之宗唐志五行者九穀之宗也人稟五行之全氣以生故於物為最靈九疇五行之説前賢所以窮治亂之變談天人之際菁華雨暘木為雨金為暘火為燠水為寒土為風禮器注協音五常協之五行則角為木商為金徵為火羽為水宮為土前志異位五行異位千變萬化繁育庶類晉志尊天五行者猶言為天行氣之義也地之承天猶婦之事夫臣之事君也謂其位卑卑者事親故自周於一行尊於天也水位在北方者陰氣在黃泉之下任養萬物水之為言準也陰化沾濡水生木木在東方者陽氣始動萬物始生木之為言觸也陽氣動躍火在南方者陽在土萬物垂枝火之為言委隨萬物布施火之為言化也陽氣用事萬物變化也金在西方者陰始起萬物禁止金之為言禁也土在中央中央者主土含萬物土之為言吐也白虎通德性清潔潤下水之用也炎上翕赩火之性也柔軟曲直木之性也堅徑從革金之性也安靜稼穡土之德也素問注體用澄徹流衍水之體也漂蕩沒溺水之用也光顯炳明火之體也燔燎焦然火之用也長短曲直木之體也幹舉機發水之用也從革堅剛金之體也鋒刃銛利金之用也敦靜安鎮群品以生土之體也含垢匿穢為變化母土之德也上五行神遁甲開山圖云五龍見教天皇榮氏解云五龍爰皇後君也兄弟四人皆人面龍身長曰角龍木仙也次曰徵龍火仙也次曰商龍金仙也次曰羽龍水仙也父曰宮龍土仙也父與諸子同得仙治在五方今五行之神也五常形氣五行者五常之形氣也書云初一曰五行次二曰羞用五事言進用五事以順五行也貌言視聽思心失而五行之序亂五星之變作皆出於律歷之數而分為一者也漢藝文志五性順逆田獵不宿飲食不享出入不節奪民農時及有姦謀則木不曲直棄法律逐功臣殺太子以妾為妻則火不炎上治宮室飾臺榭內淫亂犯親戚侮父兄則稼穡不成好戰攻輕百姓飾城郭侵邊城則金不從革簡宗廟不禱祠廢祭祀逆天時則水不潤下洪範五行傳洪範五行箕子為武王陳禹所有洪範之書條其事為九類別其説為九章謂之九疇考其説初不相附屬而劉向為五行傳乃取其五事皇極庶證附於五行以為八事皆屬五行至於八政五紀三德稽疑福極之類又不能附至俾洪範之書失其倫理所謂旁引曲取而遷就其説也然自漢以來未有非之者唐志先後大禹謨曰水火金木土穀惟修洪範曰水火金木土月令曰春木夏火中央主秋金冬水其言先後不同者大禹謨之所主者養民之政故以五行之相尅而言之尅下為財故也洪範之所主者自然之數故以五行之生數言之舉生數則成數可知矣月令之所主者四時之令故以五行相生之序言之示兒編曆數岑羲為敬暉等論武氏表帝王之曆數必應乎五行水盛則火衰木衰則金盛天地之運也必合乎四時春往則夏來暑退則寒集則知五行之數帝王不可違違之則宗社不安生人不理四時之序天地不能變變之則霜露不均水旱交錯唐文粹蘊達水潛故蘊為五精火飛故達為五臭木茂故華為五色金堅故實為五聲土和故滋為五味關尹子天中記卷六
