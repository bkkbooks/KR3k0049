body:
  text: 公廨官府太宰以八法治官府注百官所居曰府周禮公衙近代通謂府廷為公衙即古之公廟字本訛牙作為衙續世説府寺自漢以來三公所居謂之府九卿所居謂之寺風俗通曰府聚也公卿牧守府道德之所聚也藏府私府貨財之所聚也寺司也庭有法度令宮所止皆曰寺左傳疏寺嗣也治事者相嗣續於其內釋名官舍何並性清廉為頴川太守妻子不至官舍漢書繕葺陸抗與諸葛恪換屯柴桑臨去皆更繕完其城圍葺其墻屋居廬桑果不得妄敗恪入屯儼然若新而恪柴桑故屯頗有毀壞深以為慚吳志禁毀羊祐都督荊州時長吏喪官後人惡之多毀壞舊府祐以死生有命非由居室書下征鎮普加禁斷晉傳擅飾杜預為秦州刺史石鑒奏預擅飾城門官會稽之軍興遣御史檻車徵詣廷尉以預尚主在八議以候贖論本傳壞舍阮籍為東明相乘驢到郡壞府舍屏障使內外相望法令清簡旬日而還晉傳作廨匿錢光武建武二年西河鮮于冀為清河太守作公廨未就而亡後守趙高計功用二百萬五官黃秉功曹劉適言四百萬錢于是冀乃鬼見白日道從入府與高及秉等對共計校定為適秉所割匿冀乃書表自理其略言高貴不尚節畝壟之夫而箕踞遺類研密失機婢妾其性媚世求顯偷竊銀艾鄙辱天官易譏負乘誠高之謂臣不勝鬼言謹因千里驛聞付高上之便西北去三十里車馬皆滅不復見秉等皆伏地物故高以狀聞詔下還冀西河田宅妻子焉兼為差代以旌幽中之訟水經注治廨王導治揚州廨舍按行而言曰我正為次道治此爾何少為王公所重故屢發此嘆世説新語陷穴恆恭為桓石民參軍在丹徒所住廨床前一小陷穴詳視是古墓桓食常先以鮭投穴中如此經年後眠始覺見一人在床前云吾終沒以來七百餘年後緣嗣滅蒸嘗莫寄君恆食見播及感激無已依君籍當應為寧州刺史後果如言幽明録神據蕭惠明泰始初為吳興太守郡界有卞山山下有項羽廟相承云羽多居郡界事前後太守不敢上廳惠明謂網紀云孔季恭曾為此郡未聞有災因命盛設筵榻接賓數日見一人長丈餘張弓挾矢向惠明既而不見因發背旬日而卒南史異苑舍怪樂廣為河南尹先是官舍多妖怪前尹皆不敢處正寢廣居之不疑嘗外戶自閉左右皆驚廣獨自若顧見墻有孔使人掘墻得狸而殺之其怪亦絶上喧擾羅含字君章為州別駕以廨舍喧擾于城西池小洲上立茅屋伐木為材織葦為席而居布衣蔬食晏如也入隍傅昭字茂遠梁天鑒中為安成內史郡自宋來兵亂相接府舍稱凶每昏旦間人鬼相觸在任者鮮以吉終及昭至有人夜見甲兵出曰傅公善人不可侵犯乃騰虛而去有頃風雨忽至飄郡聽事入湟中自是郡遂無患咸以昭貞正所感南史修廨蔡凝字子居為中書侍郎遷晉陵太守及將之郡更令左右作中書廨守謂賓犮曰庶來者無勞上息妖徐孝克禎明元年入為都官尚書自晉以來尚書官僚皆攜家屬居省省在臺城內下舍門中有間道東西跨路通于朝堂其第一即都官省西抵閣道年代久遠多有鬼怪每夜昏之際無故有聲光或見人著衣冠從井中出須臾復沒或門閣自然開閉居多死亡尚書周崔卒于此省孝克代確便即居之經兩日妖變皆息時以咸以為貞正所致上繕理房琯開元中歷慈溪宋城濟源縣令所在為政多興利除害繕理廨宇頗能著名舊唐遇神相州刺史宅舊凶王道堅李使君朱希玉前後為太守皆不生出郡城茍不留死則貶開元中張嘉祐初至郡便有鬼祟備極擾亂祐不之懼往觀之見一女子云已是周故大將軍相州刺史尉遲府君女往者楊堅篡奪廽死王事一門遇害合家六十餘口骸骨在此廳下欲白于人悉皆懼死明公幸垂顧盼祐許諾他日以禮葬于廳後便以廳為廟歲時禱祀焉祐有女年八九歲家人欲有所問則令啓白神必有應神欲白祐亦令小女出見以為常也后三年嘉祐入拜大金吾至吳兢加以冕服其後皆榮遷云紀聞廣異記獨異志葺修李聽起為邠寧節度使邠州衙廳相傳不利葺修以至隳壞聽曰帥臣鑿凶門而出豈有拘于巫祝而隳公署耶遂命葺之足無變異舊唐市第趙惠伯為河南尹時嘗市楊炎第為官廨御史劾炎宰相抑吏市私第貴取其直盧杞召大理正田晉評罪晉曰輔相于庶官比監臨計羡利罪奪官杞怒謫晉衡州司馬于是當監主自盜罪絞新唐災除李吉甫改郴饒二州會前刺史繼死咸言牙城下物怪不敢居吉甫命災除其署以視事吏由是安上緑莎廳河中府有緑莎廳唐治平時好事者常加澆溉兵興以來而好事者劉吉之王禹稱送柴諫議河中中詩云紗莎廳事舊鳴蛩雞跖集無廨宗初京師職事官舊皆無公廨雖宰相執政官亦僦舍而居每遇出省或有中批外奏急速文字則省吏遍持于私第呈押既稽緩又多漏泄石林燕語邸驛郡國朝宿之舍在京者謂之邸郵驛傳遽之館在四方去謂之驛玉海驛置騎也説文乘傳梁山崩晉侯以傳召伯宗伯宗辟重曰辟傳重人曰我待不如捷之速也左成五田橫乘傳詣洛陽如淳曰律四馬高足為置傳四馬中足為馳傳四馬下馬為乘傳一馬二馬為軺傳急者乘一傳傳師古曰傳者若今之驛古者以車謂之傳車其後又單置馬謂之驛騎高紀乘遽公孫黑將作亂駟氏與諸大夫欲殺之子産在鄙聞之懼弗及乘遽而至昭二伐叛克勝則使傳遽告功于王江漢毛詩注士曰乘遽之臣注云傳遽以車馬給使者也謂若今明乘驛遞傳而遽疾故謂之傳遽也玉藻以車曰傳以馬曰遽釋文廣成藺相如奉璧西如秦秦王舍相如廣成舍索隱廣成是傳舍之名史營客館以周坊飭賓旅之所集廣成之傳無以儔苑街之邸不能及魏都賦高陽沛公至高陽傳舍使人召酈食其師古曰傳舍者人所止息前人已去後人復來轉相傳也傳置文帝二年詔曰以給傳置師古曰置者置傳驛之所因名置紀田橫至尸鄉廄置臣瓚曰廄置謂置馬以傳驛者曹參取狐父祁善置文頴曰善置置名也李陵騎置以聞師古曰騎置謂驛騎也各傳郵亭平帝詔置宗師考察不從教令者宗師得因郵亭書言宗伯紀薛惠為彭城令橋梁郵亭不修父宣過縣心知惠不能留彭城數日案行會中處置付器觀視園菜終不問惠以吏事傳説文郵境上行書舍從邑垂垂邊也徐曰郵之言過使所過也廣雅曰郵馹也置驛也風俗通曰漢改郵為置置者度其遠近之間置之也增韻又馬傳曰置步傳曰郵置驛鄭當時孝景時為太子舍人每五日洗沐常置驛長長安諸郊請謝賓客夜以繼日明旦常恐不遍前漢詐止魏相為茂陵令御史大夫桑弘羊客詐稱御史止傳丞不以時謁客怒縳丞相疑其有姦收捕案致其罪論棄客市茂陵大治上具馬王溫舒為河內太守令郡具私馬五十匹為驛自河內至長安奏行不過二日得可論事報河內皆怪其奏以為神速上飾傅宣帝元康詔吏或飾廚傳稱過使客以取名譽韋昭曰廚謂飲食傳謂舍言修飾意氣以稱過使而已師古曰使人及賓客來者稱其意而遣之令過去也紀列傅衛颯建武時遷桂陽太守三縣去郡遠且千里每一吏出徭及數家颯乃鑿山通道五百餘里列亭傳置郵驛於是役省勞息本傳不納趙孝字長平父普王莽時為田禾將軍任孝為郎每告歸常白衣步擔嘗從長安還欲止郵亭亭長先時聞孝當過以有長者客灑掃待之孝既至不自名長不肯內因問曰聞田禾將軍子當從長安來何時至乎孝曰尋到矣于是遂去後漢劉寵纍登卿相家無貨積嘗出京師欲息亭舍亭吏止之曰整頓灑掃以待劉公不可得也寵無言而去時人稱其長者上籌筆驛在利州諸葛孔明籌畫于此山水最秀殷潛之詩沉處經謀際揮毫決勝時之觚當八畫前著此操持山秀扶英氣川流入妙思算成功在彀運去事終虧杜牧之詩永安宮受詔籌筆驛沉思晝地乾坤在濡毫勝負知川流縈智思山聳助扶持子夜星才落鴻都鼎便移郵亭自世換白日事長垂李義山詩魚鳥猶疑畏簡書風雲長為護儲胥徒令上將揮神筆終見降王走傳車管樂有才原不忝關張無命欲何如他年錦里經祠廟梁甫吟成恨有餘羅隱詩拋擲南陽為主憂北征東討盡良籌時來天地皆同力運去英雄不自由千里山河輕孺子兩朝冠劍恨譙周惟餘巖下多情水猶解年年傍驛流滋水滋水驛在長樂驛之東睿皇在藩日經此廳廳西壁畫一胡頭因題曰喚出眼何用苦深藏縮却鼻何畏不聞香南部新書晨侯鄭審開元中為殿中侍御史充館驛使令每傳舍立晨候自公始也傳載開元十六年七月敕傳驛因御史出使察之二十五年五月御史鄭察檢校兩京館驛猶未稱使今驛門前十二辰堆即審創焉會要即當梓潼縣有上亭驛明皇幸蜀問黃幡綽曰車上鈴聲頗似人語言對曰似言三郎郎當三郎郎當故又名琅璫驛羅隱詩山雨霏微宿上亭雨中因想雨淋鈴長樂郭子儀乾元元年破賊河上因朝京師詔百官迎於長樂馹帝御望春樓待之館驛使裴潾元和中兩河用兵初憲宗寵任內官以充館驛使有曹進五者恃恩暴戾遇四方使多據有至捽辱者宰相李吉甫奏罷之十二年淮西用兵復以內官為使潾上疏云館驛之務每處皆有專知官畿內有京兆尹外道有觀察使刺史迭相監臨臺中又有御史充館驛使專察過闕若令宮闈之臣出參館馹之務則內臣外事職分各殊切在塞侵官之源絶出位之漸言雖不用帝意嘉之舊唐相思鋪鄜州東百里有水名相思河傳舍曰相思鋪令狐楚詩曰誰把相思號此河塞垣車往來來多只應自古征人淚灑向空川作碧波詩話總龜萬春延和中敬昭道遷監察御史先是荊州征人舒萬福等十人次于巴陽灘溺死昭道因使巴渝至萬春馹方睡見十人祈哀始寐覺至于再三乃召馹吏問之馹人對如夢昭道即募善遊者出其尸具酒肴以酎之乃移牒近縣備槥櫝歸之故鄉征人聞者無不感激大唐新語女巫乘傅肅宗以王璵為相尚鬼神之事分遣女巫遍禱山川有巫者少年盛服乘傳而行中使隨之所至誅求與惡少十數輩橫行州縣至黃州震左為刺史晨至驛門扃戶不啓震命壞鎖而入曳巫斬階下惡少皆死籍其緍巨萬悉列上曰臣已斬巫請以所籍錢代臣貧民輸稅其中使送上臣請死朝廷慰獎之唐語林驛官江西有驛官以幹事自任白刺史馹已理請一閲之乃往初一室為酒庫諸醞畢熟其外畫神問曰何也曰杜康刺史曰功有餘也又一室曰茶庫諸茗畢貯復有神問何也曰陸鴻漸刺史益喜又一庫諸茹畢備復問何神曰蔡伯喈刺史大笑曰君誤矣國史補高塘濠州西有高塘館俯近淮水御史閻敬愛宿此館題詩曰借問襄王安在哉山川此地勝陽臺今朝寓宿高塘館神女何曾入夢來軺軒來往莫不吟諷有李和風者至此又題詩曰高唐不是這高塘淮畔江南各一方若向此中求薦枕參差笑殺楚襄王讀者莫不解顏後因失印求新鑄始添濠字南部新書敷水元稹為御史分司東都召還次敷水驛中人仇士良夜至稹不讓中人怒擊稹敗面宰相以稹年少輕樹威失憲臣體貶江陵士曹參軍新唐褒城元稹為御史奉使東川於褒城驛竇明府聽虞鄉黃丞犯令逃去再使東川至褒城驛黃丞餽酒艤舟稹與同酌遍問褒陽山水則褒姒所奔之城在其左諸葛所征之路在其右感今懷古作詩贈黃曰昔年曾痛飲黃令困飛觥席上當時走馬前今日迎迤邐七盤路坡坨數丈城花疑褒女笑棧息武侯征一種埋幽石空聞千載名本事詩褒城驛號天下第一孫樵記青雲元稹青雲驛詩岧嶢青雲嶺下臨千仞溪謂言青雲馹繡戶青雲閨昔遊蜀關下有驛名青泥聞之意慘愴若墜牢與狴本集陽城元稹陽城驛詩沈有陽城驛名同陽道州陽公沒已久感我淚交流祠曹諱羊祜此驛何不侔我願避公諱名為避賢郵上條檢柳公綽長慶元年為京兆尹時河朔復叛朝廷用兵捕授行營諸將朝令夕改驛騎相望公綽奏曰自幽鎮用兵使命繁併館遞匱乏鞍馬多闕又敕使行李人數都無限約其衣緋紫乘馬者二十三十匹衣黃緑者不下十匹五匹驛吏不得視券牒隨口即供驛馬既盡遂奪路人鞍馬衣冠士庶驚擾怨嗟遠近喧騰行李將絶伏望聊為定限乃下中書條流人數自是吏不告勞舊唐管城太和二年滎陽守陽歸厚奉詔成新驛周以高墉乃樓其門勞迎展蠲潔之敬餞別起登臨之思走轂奔蹄遄征急宣入而忘勞出必屢顧其傳舍之尤乎劉禹錫管城驛記三鄉劉禹錫至三鄉驛睹明皇望女几山詩斐然有感云開元天子萬事足惟惜當時光景促三鄉陌上望仙山歸作霓裳羽衣曲仙心從此在瑤池三鄉八景相追隨天上忽乘白雲去世間惟有秋風辭本集會昌時有題三鄉者云余本家若耶溪東從良人西入函關寓居晉昌里第不幸良人已矣邈然無依帝里方春吊影東邁涉滻水歷渭川背終南陟太華經虢略抵陜郊揖嘉祥之清流面女几之蒼翠凡經過之所皆昔燕笑之地遂命筆聊題終不能滌其懷抱翰墨非女子之事名字故隱而不書詩曰昔逐良人西入關良人身歿妾空還謝娘衛女不相待為雨為雲歸舊山和者十一首王祝詩曰女几山前嵐氣低佳人留恨此中題不知雲雨歸何處空使王孫見即迷劉谷詩曰蘭蕙芬芳見玉姿路傍花笑景遲遲苧蘿山下無窮意併向三鄉惜別時張綺詩曰洛州依舊好風光蓮帳無因見女郎雲雨散來音信斷此生遺恨寄三鄉雲溪友議五花荊南舊有五花館待賓之上地也故蔣肱上成汭詩云不是上名台姓字五花賓館改從容南部新書稷山稷山驛吏王全作吏五十六年人稱有道術往來多贈篇什故李義山贈詩云過客不勞詢甲子唯言亥字與時人上皇華廣州押衙崔慶成轄香藥綱詣內庫抵黃花驛舍見美婦人曰今日見君君必有疑今日君從我寧不悔俟君回轅別圖後會擲書云川中狗百姓眼馬撲兒御廚飯洎還不敢宿皇華寓宿旅邸前婦人來曰今日之事可諧否十二字能辨否慶成不對因命青衣進酒終不舉盞乃作詩云妖魄才魂自古靈多情心膽似平生知君不是風流物却上幽原怨月明青衣曰小娘子嘗養鸚鵡十餘年竟不言今其驗乎婦人嘆曰是矣乃作啞鸚鵡詩云雕籠馴養許多時終歲曾無一句詞深恨化工情太誤因何偏與好毛衣擲紙于地燈火俱滅丁晉公嘗見十二字曰川中狗蜀犬也獨字百姓眼民目也眠字馬撲兒瓜子也孤字御廚飯官食也館字乃獨眠孤館四字托遺白沙白沙驛在未州一百二十里祁縣縣下臨湘水西岸門外有亭以形勝盡在此也詩話總龜草上煙河東馬鋪有驛馹善行者鋪卒名為草上煙有勢力使命常數程打過好事作詩云過此為尋草上煙數程打過苦尤偏迃齋詩話閭里小宰以官府之八成經邦治三曰聽閭里以版圖周禮爾雅巷門謂之閭説文里門也周禮五家為比五比為閭閭侶也二十五家相郡侶也説文里居也周禮五家為鄰五鄰為里風俗通云五家為軌十軌為里里者止也五十家共居止也清節齊稷門外東北二百步有晏平仲冢宅左傳晏子之宅近市景公欲易之而嬰弗更為誡曰吾生則近市死豈敢易乃葬故宅後人名之曰清節里水經注勝母里名勝母曾子不入邑號朝歌墨子回車鄒陽書錦里張儀築益州城故錦澗也號錦里益州記樗里樗里子名疾高誘曰其里有樗樹故曰樗里然疾居渭南陰鄉之樗里故號曰樗里子又紀年則謂之禇里疾史記閭左秦二世發閭左戍漁陽九百人師古曰發閭左之人皆遣戍也漢書應劭曰入閭取其左發之未及取右而秦亡食貨志注中陽高皇帝家在沛豐中陽里及為天子祠豐故宅漢舊儀宋謝莊求賢表曰升歷中陽英賢起于徐沛受籙白水茂異出于荊宛南史姬宗之在水滸也鸑鷟鳴於岐山劉姓之在中陽也蛟龍降于豐澤史通里母客謂蒯通曰先生之于曹相國拾遺舉過顯賢進能齊國莫先生生者先生知梁石君東郭先生何不進之於相國乎通曰諾臣之里婦與里之諸毋相善也里婦夜亡肉姑以為盜怒而逐之婦且去過所善諸母語以事而謝之里母曰汝安行我今令而家追汝矣即束縕請火於亡肉家曰昨暮夜犬得肉爭鬥相殺請火治之亡肉家遽追呼其婦故里婦非談説之士也束縕乞火非還婦之道也然物有相感事有適可臣請乞火於曹相國漢書戚里石奮高祖召其姊為美人徙其家長安中戚里師古曰於上有婚姻者則皆居之故名其里為戚里本傳陵里萬石君奮徙居陵里內史慶醉歸入外門不下車萬石君讓曰內史貴人入閭里里中長者皆走匿而內史坐車中自如固當乃謝罷慶慶及諸子入閭門趨至家前漢長安長安閭里一百六十室居櫛比門巷修直有宣明建陽昌陰尚冠修城黃棘北煥南平等里宣帝在民間時常在尚冠里劉向列女傳節女長安大昌里人也黃圖高陽荀淑有子八人儉緄靖燾汪爽肅並有名稱時人謂八龍初荀氏舊里名西豪潁陰令渤海苑康以為昔高陽氏有才子八人今荀氏亦有八子故改其里曰高陽里後漢賀德仁在陳與從兄德基師事周弘正以文辭稱人為語曰學行可師賀德基文質彬彬賀德仁兄弟八人時比漢荀氏太守鄱陽王伯山改所居井滂里為高陽云新唐冠蓋宜城縣有太山山下有廟漢末多士其中刺史二千石卿長數十人朱軒華蓋同會於廟下荊州刺史行部見之雅嘆其盛號為冠蓋里而刻石銘之水經注互見亭宜春左思賈謐請講漢書謐誅退居宜春里專意典籍齊王冏命為記室督辭疾不就晉書四望元魏伊洛之間夾御道作四夷館道東有四里一曰歸正二曰歸德三曰慕化四曰慕義吳人投國者處金陵館三年已後賜宅歸正里北夷來附者處燕然館賜宅歸德里東夷來附者處扶桑館賜宅慕化里西夷來附者處崦嵫館賜宅慕義里洛陽伽藍記穢里劉繪字士章為南康相郡人有姓賴者所居名穢里刺謁繪繪戲嘲之曰君有何穢而居穢里此人應聲曰未審孔子何闕而居闕里繪默然無忤意嘆其辨速南史仁里明山賓造宅昭明太子聞築室不就有令曰明祭酒雖出撫大藩擁族推轂珥金拖紫而恆事屢空聞構宇未成今送薄助并詒詩曰平仲古稱奇夷齊昔擅美令則挺伊賢東秦固多士築室非道傍置宅歸仁里庚桑方有係原生今易擬必來三徑人將招五經士南史里上仁之所廬選匪仁里其焉宅匪義迹而焉居上三柱劉仁軌咸亨中進爵為公子及兄子授上柱國者三人州黨榮之號所居為樂城鄉三柱里新唐居巢劉知幾封居巢縣子鄉人以知幾兄弟六人進士及第文學知名改其鄉里為高陽鄉居巢里舊鳴珂張嘉祐嘉貞弟嘉貞為相時任右金吾衛將軍昆弟每上朝軒蓋騶導盈閭巷時號所居坊曰鳴珂里新愴別吐蕃請婚中宗以所養雍王守禮女為金城公主妻之帝為幸始平縣設殿帳於百頃泊側餞別因改始平縣為金城又改其地為鳳池鄉愴別里舊吐蕃傳同里韋貫之名純為長安丞或薦之京兆尹李實實舉笏示所記曰此其名姓也與我同里素聞其賢願識之而進於上或者喜以告曰子今日詣實而明日賀者至矣貫之唯唯不往官亦不遷唐安邑李吉甫居安邑里時號安邑李丞相上靖恭咸通中楊汝士與諸子位皆至正卿所居靖恭里第弟兄並列門戟南部新書修行楊收兄發假弟嚴皆顯貴號修行楊家與靖恭諸楊相比長安志近俗以權臣所居坊呼之安邑李吉甫也靖安李宗閔也驛坊韋澳也樂和李景讓也靖恭修行二楊也皆放此南部新書坊邑里之名説文坊方也言人所在里為方蘇鶚演義白沙李愚所居暴雨一庭俱為白沙及薨得地于白沙里時號白沙相公紀異録不遊崔稅遭世亂寓居于滑臺不遊里巷十餘年人罕識其面梁貞明三年舉甲科五代史栗里陶淵明所居栗里兩山門有大石可坐十人教坊記孝義魏世宗詔曰李謐屢辭徵辟志守沖素可遠傍惠康近準玄晏謐曰貞靜處士表其門閭以旌高節於是表其門曰文德里曰孝義云北史二十薛曲東京昭國坊有薛繪子姪十人冠冕茂盛時號薛曲西京記市時也言交易而退恃以不匱也市亦謂之市井言人至市有所鬻賣者當於井上洗濯令香潔然後到市也或曰古者二十畝為井因井為市故云也風俗通市買賣之所也説文闤市垣也闠市門也古今注市巷謂之闤市門謂之闠巷謂之閎顏延之纂要市中空地謂之闤鄭衆周禮注作市神農作市高陽氏衰市官不修祝融修市古史考祝融作市世本祝融顓頊臣為高辛氏大正宋衷注九市武王伐紂得二夫人問曰殷國將亡亦有妖乎曰殷君喜修宮室大者宮室九市太公六韜夜市郡國志曰豳州有邠亭新論曰豳縣邠亭本太王所部其人將與夜市不為則有童害焉市井井田之義有五一曰無泄天時地氣二曰無費一家三曰同風俗四曰合巧拙五曰通財貨因井為市交易而退故稱市井也春秋井田記學齊占蹕云後漢循吏傳曰首不入市井注引井田記云謂不見于他書今劉寵傳注無之妄刪古籍可恨也哉多牛啇太宰使少庶子之市顧反而問之曰何見于市對曰無見也太宰曰雖然何見也對曰市南門之外甚衆牛車僅可以行耳太宰因誡使者無敢告人吾所問於女因召市吏而問之曰市門之外何多牛屎市吏甚怪太宰知之疾也乃悚懼其所也韓內儲市南仲尼之楚楚莊王觴之孫叔敖執爵而立市南宜僚受酒而祭曰古之人乎曰丘也聞不言之矣市南宜僚弄丸而兩家之難鮮孫叔敖甘寢乘羽而郢人投兵丘願有喙三尺彼之謂不道之道此之謂不言之辨莊庚桑楚孔子之楚舍於蟻兵之漿其鄰有夫妻臣妾登極者子路曰是稷稷何為者耶仲尼曰是自埋于民自藏于畔其聲銷是陸沉者也是其市南宜僚耶則陽近市景公過晏子曰子宮小近市請徙子家豫章之圃晏子再拜而辭曰且嬰家貧待市食而朝暮趨之不可以遠景公函曰子家習市識貴賤乎是時景公繁於刑晏子對曰踴貴而屨賤景公曰何故對曰刑多也景公造然變色曰寡人其暴乎於是損刑五韓非子七市齊桓公宮內有七市韓娥女之齊乏糧過雍門鬻歌於市乃此也上吹箎伍子胥之吳乃佯狂塗面行乞於市市人罔有識者翌日吳市吏善相者見之與俱入見王僚吳越春秋子胥至吳徒跣被髮乞於吳市三日市正疑之而道於闔廬曰市中有非常人徒跣被髮乞于吳市三日矣闔廬曰吾聞荊平王殺其臣伍子奢而非其罪其子子胥勇且智彼必經諸侯之邦可以報其父仇者王即使召子胥入吳王下階迎上殿與語三日三夜語無復者越絶書鶴舞吳王闔廬有女怒王先食蒸魚乃自殺闔廬痛之葬於邦西閶門外乃舞白鶴於吳市中令萬民隨而觀之還使男女與鶴俱入羡門因發機以掩之吳越春秋市虎龐恭與太子質於邯鄲謂魏王曰今一人言市有虎王信之乎曰不信二人言市有虎王信之乎曰不信三人言市有虎王信之乎王曰寡人信之龐恭曰夫市之無虎也明矣然而三人言而成虎今邯鄲之去魏也遠於市議臣者過于三人願王察之龐恭從邯鄲反竟不得見韓非子爭利司馬錯欲伐蜀張儀曰不如伐韓臣聞爭名者於朝爭利者于市今三川周室天下之朝市也而王不爭焉顧爭於戎翟去王業遠矣史記求存孟嘗君逐於齊而復反談拾子迎之於境謂孟嘗曰君得無有所怨於齊士大夫孟嘗君曰然談拾子曰事有必至理有固然富貴則就之貧賤則去之此事之必至理之固然者請以市諭市朝則滿夕則虛非朝愛市而夕憎之也求存故往亡故去願君勿怨孟嘗君不敢以為言戰國策魯連子同史記馮歡謝客語稍同廉頗之免長平歸也失勢之時故客盡去及復用為相客又復至廉頗曰客退矣客曰吁君何見之晚也夫天下以市道交君有勢我則從君君無勢則去此固其理也有何怨乎史本傳擊築荊軻既至燕愛燕之狗屠及善擊築者高漸離荊軻嗜酒日與狗屠及高漸離飲於燕市酒酣以往高漸離擊築荊軻和而歌於市中相樂也已而相泣旁若無人者史記直市雍州富平西南十五里有直市城秦王文造物無二價以直市為名郡國志地市始皇作地市與生死人交易令云生人不得欺死者物市吏告始皇云死人陵生人生人定入市門斬斷馬脊故徐云秦地市有斷馬三秦記始皇陵有銀蠶金鴈以多奇物故俗云秦王地市郡國志東市司馬季主者楚人也卜於長安東市宋忠賈誼二人同輿而之市遊於卜肆中史記坐市歲小旱上令百官求雨卜式言曰縣官當食租衣稅而已今桑弘羊令吏坐市列販物求利烹弘羊天乃雨食貨志鬥變大將軍霍光秉政諸霍在平陽奴客持刀兵入市鬥變吏不能禁及尹翁歸為市吏莫敢犯者漢書柳市萭章字子夏長安熾盛街閭各有豪俠章在城西柳市號曰城西萭子夏門如哀帝責鄭宗曰君門如市人何以欲禁切主上崇對曰臣門如市臣心如水第市司隸校尉鮮光奏王根曰縱橫恣意大治室第第中立土山而立兩市殿上赤墀戶下青璅賣市嚴君平卜筮於成都市裁日閲數人得百錢足自養則閉肆下簾而授老子俱同上槐市元始四年起明堂辟雍為博士舍三十區為會市但列槐樹數百行為隊無墻屋諸生朔望會此市各持其郡所出貨物及經書傳記笙磬器物相與買賣雍雍揖讓論議樹下侃侃誾誾黃圖王莽作宰衡時建弟子舍萬區起市郭上林苑中三輔舊事云漢太學中有市有獄上市卒梅福元始中王莽專政棄妻子去後人有見福于會稽者變姓名為吳市門卒云漢書越州梅市即梅福為市門卒之所郡國志閲曹王充字仲任會稽人也家貧無書常遊洛陽市肆閲所賣書一見輒能誦憶遂至博通衆經謝承後漢書公超張楷字公超門徒常百人居弘農山中學者隨之所居成市後華陰山南遂有公超市後漢不二價韓康字伯休常採藥名山賣於長安市口不二價三十餘年時有女子從康買藥康守價不移女子怒曰公是韓伯休耶乃不二價乎上蒲胥郢城內有市名蒲胥故南齊校尉府也郡國志苑市齊東昏以閲武堂為芳樂苑於苑中立店肆模大市日遊市中雜所貨物與宮人闡豎共為裨販以潘妃為市令自為市吏録事將鬥者就潘妃罰之又開渠立埭躬自引船埭上設店坐而屠肉于時百姓歌云閲武堂種楊柳至尊屠肉潘妃酤酒南史紀市易大業六年諸夷來朝請入市交易煬帝許之於是修飾諸行葺理邸店皆使甍宇齊正卑高如一壞貨充積人物華盛時諸行鋪竟崇侈麗至買菜者亦以龍鬚藉之夷人有就店飲噉皆令不取直故夷驚視寢以為常兩京記豐都洛陽南市即隋之豐都市也初築外垣之時掘得一塜無甎甓棺中有平上朱衣銘曰筮言居朝龜言近市五百年廟於斯見矣校其年月當魏黃初二年隋唐嘉話利人西市隋曰利人市市西北隅有海池長安中僧法成所穿分未安渠以注之以為放生之所穿池得古石銘云百年為市而後為池自置立市至是時百餘年矣兩京記賣卜武攸緒則天兄惟良子也恬淡寡欲好易莊周書少變姓名賣卜長安市得錢輒委去新唐宮市德宗時宦者主宮市置數十百人閲物闤左謂之白望無詔文驗核但稱宮市則莫敢謂何大率與直十不償一諫官交章列上皆不納上吳湊以戚里為京兆尹深言其弊張建封入覲具奏之德宗頗深嘉納蘇辨希宦者之旨因入奏言便于墮業之徒宮市不為之改舊唐德宗晚年政出多門宮市之弊諫官論之不聽韓愈嘗上章數千言極論之不聽怒貶為連州山陽令上三公入杜司徒常言我致政之後必買小駟飽食訖跨之著粗布襴衫入市看盤鈴傀儡即足矣後致仕果行其志諫官上疏言三公不合入市公曰在吾計中矣劉禹錫嘉話置權量柳仲郢拜京兆尹置權量於東西市使買易用之禁私製者北司吏入粟違約仲郢殺而尸之自是人無敢犯新書草市蜀東西川之人常互相輕薄西川人言梓州者乃我東門之草市也豈得與我耦哉柳仲郢為東川節度使聞之謂幕賓曰吾立朝三十年清華備歷今日始得為西川作市令聞者皆笑之故世言東西兩川人多輕薄南部新書鬼市輦俗説務本坊西門是鬼市或風雨曛晦皆聞其喧聚之聲秋冬夜多聞賣乾柴云是枯柴精也又或中秋望夜聞鬼吟六街鼓絶行人歇九衢茫茫空有月有和者云九衢生人何勞勞長安土盡槐根高歲時記海邊時有鬼市半夜而合雞鳴而散人從之多得異物番禺雜記虛所嶺南謂材市為虛柳子厚童區寄傳云之虛所賣之又詩曰青篛褁鹽歸洞客緑荷包飯趂虛人市之所在有人則滿無人則虛嶺南村市滿時少虛時多故曰虛青箱雜記亥市分寧縣本常州亥市也嶺南村落有市謂之虛不常會多虛日也西蜀曰痎如瘧疾間曰復作也江南人惡以疾稱故止曰亥耳又荊吳俗有寅申巳亥日集于市故稱亥市徐筠水志蜀有痎市間日一集如痎瘧之發其俗又以冷爇發歇為市喻青箱市禁孔子告仲弓曰其餘禁者十有四焉命服命車不粥於市圭璋璧琮不粥于市兵車旍旗不粥於市犧牲秬鬯不粥於市戎器兵甲不粥於市器用不中度不粥於市布帛精粗不中數廣狹不中量不粥於市姦色亂正色不粥於市文錦珠玉之器雕飾靡麗不粥於市衣服飲食不粥於市果實不時不粥于市五木不中伐不粥於市鳥獸魚鱉不中殺不粥於市凡執此禁以齊衆者不赦過也家語九市廟記云長安市有九六市在道西三市在道東凡四里為一市致九州之人在突門夾橫橋大道市樓皆重屋又曰旗亭樓在杜門大道南又有當市樓有令署以察啇賈貨財買賣貿易之事三輔都尉掌之西京賦云郭開九市通闤帶闠旗亭重立俯察百隧是也黃圖四通後魏立市於洛水南號曰四通市民間謂永橋市伊洛之魚多于此賣士庶須鱠皆請取之洛陽伽藍記市語長安市人語各不同有葫蘆語鎖子語紐語練語三摺語通名市語兩京雜記三市大市名也金市在大城西南市在大城南馬市在大城東按金市名啇觀西充為金故曰金市洛陽記肆店肆者所以陳貨鬻之物也店者所以置貨鬻之物也古今注青羊老子為關令尹喜著道經臨別曰子行道千日後於成都青羊肆尋吾今為青羊觀也蜀本紀蔥肆呂僧珍從父兄子先以販蔥為業僧珍至乃棄業求州官僧珍曰汝等自有常分豈可妄求叨越當速反蔥肆耳南史雞肆長安富民羅會以剔糞自業里中謂之雞肆言若雞之因剔糞而有所得也會世副其業家財巨萬有士人陸景晹會邀過所止館舍甚麗入內梳洗衫又極鮮屏風氈褥烹無所不有景晹問曰主人即如此快活何為不罷惡事會曰吾中間停廢一二年奴婢死亡牛馬散失復業已來家園稍遂非情願也分合如此朝野僉載女肆蔥嶺以東俗志淫龜茲于闐置女肆征其錢新唐星貨肆有以筐以筥或倚或垂鱗其物以鬻者曰星貨鋪言其列貨叢雜如星之繁今俗呼為星火鋪誤也李濟翁資暇集駔儈子貸金錢十貫節駔儈貪賈三之廉賈五之孟康曰節節物貴賤也謂除估儈其餘利師古曰儈者合會二家交易者也駔者其首率也前貨殖傳大駔段干木晉國之大駔也駔廥人也學於子夏高何縣子石齊國之暴者也指於鄉曲學於子墨子呂覽尊師市師王孫卿以財養士與雄傑交王莽以為京司市師漢司東市令也貨殖道路道蹈也路露也言人所蹈而露見也城下路謂之豪步所用道謂之蹊釋名一達謂之道路二達謂之岐旁三達謂之劇旁四達謂之衢五達謂之康六達謂之莊七達謂之劇驂八達謂之崇期九達謂之逵廟中路謂之唐大路謂之奔爾雅墿亦軌堩亘街徑吭航𧮮千道也廣雅阡陌南北為阡東西為陌風俗通長安中有九陌漢宮殿疏東西經七陌南北越九阡子建詩四達帝顓頊之法婦人不辟男子於路者拂之於四達之衢今之國都男女切踦肩摩於道其於俗一也淮南齊俗棄灰殷之法刑棄灰于街者子貢以為重問之仲尼仲尼曰知治之道也夫棄灰於街必掩人掩人人必怒怒則鬥鬥必三族相殘也此殘三族之道也雖刑之可也且夫重罪者人之所惡也而無棄灰人之所易也使人行之所易而無離所惡此治之道也一曰殷之法棄灰於公道者斷其手子貢曰棄灰之罪輕斷手之罰重古人何太毅也曰無棄灰所易也斷手所惡也行所易不關所惡古人以為易故行之韓非子道茀定王使單襄公聘宋假道于陳火朝覿矣道茀不可行也司空不視途道無列樹單子歸告王曰陳侯不有大咎國必亡夫辰角見而雨畢天根見而水涸故先王之教曰雨畢而除道水涸而成梁故夏令曰九月除道十月成梁周制有之曰列樹以表道立鄙食以守令陳國道路不可知是廢先王之法制者也其能久乎周語失道管仲隰朋從於桓公而伐孤竹春往冬反迷惑失道管仲曰老馬之智可用也乃放老馬而隨之遂得道韓非子爭道楚野辨女者昭氏之妻也鄭簡公使大夫聘於荊至於狹路有一婦人乘車與大夫轂擊而折大夫車軸大夫怒將執而鞭之婦人曰君子不遷怒不二過今於狹路之中妾避之已極矣而子大夫之僕不肯少引是以敗子大夫之車而反執妾豈不遷怒哉既不怒僕而反怨妾豈不二過哉列女傳術子産相鄭十八年刑三人殺二人桃李之垂於街者莫之授也錐刀之遺于道者莫之舉也呂覽下賢孟春察端徑術注端正其徑路不得邪行也呂覽畛塗陳術亦道路別名初學記別途孔子用魯三年男子行乎塗右女子行乎塗左財物之遺者民莫之舉呂樂成五父季孫相魯子路為郈令魯以五月起衆為長溝當此之為子路以其私秩粟為民飯要作溝者于五父之衢而食之孔子聞之使子貢往覆其飯擊毀其器曰魯君有民子奚為乃食之子路怫然怒攘肱而入請曰夫子疾由之為仁義乎孔子曰由之野也女之食之為愛之也夫禮天子愛天下諸侯愛境內大夫愛官職士愛其家過其所愛曰侵今君有民而子擅愛之此是子侵也不亦誣乎言未卒而季孫使者至讓曰肥也起民而使之先生使弟子今徒役而食之將奪肥之民耶孔子駕而去魯韓外儲多岐楊子之鄰人亡羊既率其黨又請楊子之豎追之楊子曰嘻亡一羊何追者之衆鄰人曰多岐路既反問獲羊乎曰亡之矣曰奚亡之曰岐路之中又有岐焉吾不知所之所以反也心都子曰大道以多岐亡羊學者以多方喪生列説符楊子見逵路而哭之為其可以南可以北墨子見練絲而泣之為其可苡黃可以黑淮説林堙溪中山之國有風繇者智伯欲攻之而無道也為鑄大鍾方車二軌以遺之夙繇之君將斬岸堙溪以迎鍾赤章蔓枝諫曰諫云唯則定國我胡則以得是於智伯夫智伯之為人也貪而無信必欲攻我而無道也故為大鍾方車二軌以遺之君因斬岸堙溪以迎鍾師必隨之弗聽有頃諫之君曰大國為歡而子逆之不祥子釋之赤章蔓枝曰為人臣不忠貞罪也忠貞不用遠身可也斷榖而行至衛七日而風繇亡呂權勳夙繇韓子作仇繇衛作齊金牛昔蜀王從卒數千餘出獵於褒谷而溪秦惠王亦畋於山中怪而問之以金一筐遺蜀王及報欺之以土秦王大怒其臣曰此秦得之端秦王未知蜀道乃刻石牛五頭置金于尾下偽如養之者言此天牛能屎金蜀人見而信之乃令五丁共引牛成道致之成都秦始知蜀道使張儀伐之蜀王開戰不勝而亡十三州志馳道秦紀始皇二十七年治馳道注曰馳道天子道也蔡雍曰馳道天子所行道也今之中道然漢令諸侯有制得行馳道中者行旁道無得行中央三丈也不如令沒入其車馬黃圖賈山至言曰秦為馳道於天下東窮燕齊南極荊楚江湖之上瀕海之觀畢至道廣五十步三丈而樹厚築其外隱以金椎樹以青松為馳道之麗至於此使其後世曾不得邪徑而託足焉漢書鮑宣為司隸丞相孔光四時行園陵官屬以令行馳道中宣沒入其車馬本傳行必以車馬故以名馳選注年不順成馳道不修毛詩注甬道漢王屯榮陽築甬道屬河以取敖倉粟應劭曰恐敵抄錙重故築垣墻如街巷也紀棧道張良至褒中因説漢王燒絶棧道以備諸侯盜兵亦視項羽無東意注棧即閣也今謂之閣道紀復道高祖居南宮從復道上見諸將往往耦語如淳曰上下有道故謂之復紀惠帝為東朝長樂宮及間往數蹕煩民作復道方築武庫南紀桂宮周回十里內有復道橫渡西至神明臺三輔故事間道韓信欲東下井陘擊趙李左車説趙王曰願假臣等三萬兵從間路絶其輜注微路也黥布已先從間道破關下軍本傳靈山司馬相如略定西南夷通靈山道橋孫水注鑿開靈山道置靈道縣本藁街甘延壽陳湯上疏云斬郅支首及名王以下宜縣頭藁街蠻夷邸間本傳長安城中有藁街三輔故事子午平帝元始五年秋王莽以皇后有子孫瑞通子午道子午道從杜陽直絶南山徑漢中師古曰子北方也午南方也言通南北道相當故謂之子午耳今京城古南山有谷通梁漢道名子午谷又荊州西界慶州東界有山名子午嶺計南北直相當此則北山者是子南山者是午共為子午道漢傳子午長安正南山名三秦記王莽以皇后有子孫瑞通子午道蓋以子午為陰陽之王氣也括地志九逵長安城面三門四面十二門皆通達九逵以相經緯衢路平正可並列車軌十二門三塗洞闢隱以金椎周以林木左右出入為往來之徑行者升降有上下之別三輔決録披三條之廣路立十二之通門西都賦城郭之制則旁開三門參塗夷庭方軌十二街衢相經西京賦飛狐建武十三年盧芳與胸奴烏桓連兵寇盜詔王霸將弛刑徒六千餘人與杜茂治飛狐道堆布土石築起亭障自代至平城三百餘里注飛狐道在今蔚州飛狐縣北通媯州懷戎縣即古飛狐口也後漢距飛狐之口注曰在代郡西南前酈食其傳與馬肅宗崩廉范奔赴敬陵時廬江郡掾嚴麟奏章弔國俱會於路麟乘小車塗深馬死不能自進范見而愍然命從騎下馬與之不告而去麟事畢不知馬所歸乃緣縱放之或謂麟曰故蜀郡太守廉叔度好周人窮急今奔國喪獨當是耳麟亦素聞范名以為然即牽馬造門謝而歸之世伏其好義後漢嶠道建初八年鄭弘為大司農舊交趾七郡貢獻轉運皆從東冶泛海而至風波艱阻沉溺相系弘奏開零陵桂陽嶠道至今為常路本傳褒斜延光四年詔益州刺史罷子午道通褒斜路順紀褒斜漢中谷名南曰褒北曰斜三秦記褒水東南歷小石門穿山通道六丈有餘刻石言漢永平中司隸校尉楊厥所開建和二年王升琢石頌德蓋因石牛道而廣之水經注諸葛孔明揚聲由斜谷道郿避泥鍾皓字季明為司徒掾公出道路泥濘導從惡其相灑去公車絶遠公推軾言司徒今日為獨行耳先賢行狀街卒孔嵩字仲山宛人與山陽范式有斷金契貧無養親賃為阿里街卒遣迎式式下車把臂曰子懷道卒伍不亦痛乎嵩曰侯嬴賤役晨門卑下之位古人所不恥何痛之有故其讚曰仲山通達卷舒無方屈身所役拱秀含芳水經嵩在阿里正身厲行街中子弟皆服其訓化後傳閣道諸葛孔明與兄瑾書云前趙子龍退軍燒壞赤崖以北閣道緣谷一百餘里其閣梁一頭入山腹牛一頭立柱於水中今水大而急不得安柱此其窮極不可強也又云頃大水暴出赤崖以南橋閣悉壞時趙子龍與鄧伯苗一戌赤崖屯田一戌赤崖口但得緣崖與伯苖相聞而已水經銅駝洛陽太尉司徒兩坊間謂之銅駝街魏明帝置銅駝諸物於閶闔南街陸璣云駝高九尺積出太尉坊者也上銅駝街在洛陽宮南金馬門外人物繁盛俗語云金馬門外聚群賢銅駝街上集少年陸璣洛陽記左擔江油在擔道按圖在陰平縣北於成都為西其道至險自北來者擔在左肩不得度擔也鄧艾束馬懸車之處任豫益州記開道天紀二年衛尉岑昏表修百府自官門至朱雀橋夾路作府舍又開大道使男女異行夾道皆築高墻瓦覆或作竹藩環濟吳紀避道王戎簡脫不持儀刑好乘巴滇馬雖為三司率爾私行巡省園田不從一人以手巾插腰戎故吏多至大官相逢戎輒下道避之竹林七賢哭途阮籍常率意獨駕不由徑路車迹所窮輒慟哭而反魏氏春秋四達晉穆帝升平二年二月詔曰佽飛督王饒忽上吾鴆鳥一口云以避惡此是凶物豈宜妄進於是鞭饒二百使殿中御史孫雲焚其鳥於四達之衢中興書樹柳苻堅滅燕趙之後自長安至於諸州皆夾路槐樹柳二十里一亭四十里一旅行者取給於塗工沈資販於道崔鴻前秦録盤道氐人揚難當居仇池山高二十里羊腸盤道三十六回王智深宋紀相逢司馬膺之神氣甚高性方古舊典楊愔同為黃門郎至愔為尚書令抗禮如初曾路逢愔威儀導引乃於樹下側避愔望見令呼謂曰兄何意避弟膺之曰我自避赤棒本不避卿愔甚重之北齊植槐李孝寬為雍州刺史先是路側一里置一土堠經雨頽毀每須修之自孝寬臨州乃勒部內當堠處植槐木代之既免修復行旅又得庇蔭周文後見怪問知之曰豈得一州獨爾當天下同之於是分諸州道路一里植一木十里植二木百里植五木焉北史御道隋煬帝大業元年發淮南民十餘萬開邗溝自山陽至揚子入江渠廣四十步旁皆築御道樹以柳街鼓舊制京城內金吾曉暝傳呼以戒行者馬周獻封章始置街鼓俗號鼕鼕公私便焉有道人裴修然雅有篇詠善畫好酒常戲馬為渭川歌詞曰遮莫鼕鼕動須傾湛湛杯金吾儻借問報道玉山頽甚為時人所賞大唐新語龍尾舍元殿側龍尾道自平階至凡詰曲七轉由丹鳳門北望宛如龍尾下垂於地焉兩垠欄檻悉以青石為之至今石柱猶有存者賈氏談録安祿山逆謀日熾每過朝堂龍尾道南北睥睨久乃去本傳別開高宗將幸汾陽宮以狄仁傑為知頃使并州長史李沖玄以道出妬女祠俗云盛服過者必致風雷之災乃發數萬人別開御道仁傑曰天子之行千乘萬騎風伯清塵雨師灑道何妬女之害耶遽令罷之高宗聞之嘆曰真大丈夫也舊唐鑿山陸象先為益州長史奏嘉卭路遠請鑿岷山之南以從捷近發卒從役居人不堪多道亡愈死行族無利左拾遺張宣明監姚雋諸軍事兼招慰使乃親驗其路審其難險移牒益州曰此路高山臨雲深谷無景至有斗絶巨險殆不通人蹤經之者必摶壁旁崖脅息而度雖竟日登頓二十許里木人猶堪淚下鐵馬亦可蹄穿象先覽之兢惕遽罷役仍舊路以聞蜀人賴焉唐新語避遲初房琯嘗尉馮翊陸象先下孔目官黨芬于廣衢相遇避馬遲琯拽芬下決脊數十下芬訴之象先曰汝何處人芬曰馮翊人又問房琯何處官人芬曰馮翊尉象先曰馮翊尉決馮翊百姓告我何也琯亦入見欣其事請去官象先曰如黨芬所犯打亦得不打亦得官人打了去亦得不去亦得太平廣記蜀道李白嘗為蜀道難歌曰蜀道難難于上青天白以刺嚴武也後陸暢復為蜀道易曰蜀道易易于履平地暢佞韋皋也初暢受知于皋乃作蜀道易獻之皋大喜贈羅八百匹尚書故實道槐貞元中度支欲取兩京道中槐樹為薪更栽小樹先下符牒華陰華陰尉張造判牒曰召伯所憩尚不剪除先皇舊遊豈宜斬伐乃止國史補迷道貞元二年李晟收復京城朱泚以千餘人西走昏忽迷道不辨南北因問路於田父父曰豈非朱太尉耶偽宰相源休止之曰漢皇帝田父曰天不長凶地不生惡蛇不為龍鼠不為虎天網恢恢去將何適泚怒將殺之忽亡其所在杜陽編偏路貞元七年刺史李西華自藍田至內鄉開新道七百餘里回山取塗人不病涉謂之偏路地理志掃街蜀之士子莫不沽酒慕相如滌器之風陳會郎中家以當壚為業為不掃官街吏歐之其母甚賢勉以進修不達不要歸鄉以成名為期每歲舉糧紙筆衣服僕馬皆自成都齎至中都助業後業成元和元年及第李相固言覽報狀處分廂界收下酒斾闔其戶家人猶疑之逡巡賀登第實聖善獎諭之力也唐語林天威高駢鎮安南使者歲至乃鑿道五所置兵護送其徑有青石或傳馬援所不能治既攻有震碎其石乃得通因名其道曰天威云唐書置耳吳崔太初多疑好察每通街交會之所牆必置耳謂人曰還聞牆有耳否非牆耳乃吾耳行路之人鮮敢偶語九國志天街天街兩畔槐樹俗號為槐衙曲江江畔有柳亦號為柳衙意謂其成行列如排衙也中朝故事裙腰白樂天杭州春望云誰開湖寺西南路草緑裙腰一徑斜注孤山寺路在湖州中草緑時望如裙腰長慶集鳥道交趾郡治龍編自興古鳥道四百里南中志李太白詩西當太白有鳥道可以橫絶峨眉巔畏途夫畏塗者十殺一人則父子兄弟相戒也必盛卒徒而後敢出焉不亦知乎人之所取畏者衽席之上飲食之間而不知為之戒者過也莊達生畏途饞巖不可攀李太白詩末路詩云行百里者半於九十此言末路之難秦策古道南唐元宗廬山百花亭刻石云蒼苔迷古道紅葉亂朝霞迷途回朕車而復路及迷途之未遠楚辭實迷途而未遠覺今是而昨非歸去來辭迷途知反往哲是與邱希範與陳伯之書邪徑焦先孝然行不踐邪徑必循阡陌京兆阡武帝時京兆尹曹氏葬茂陵民謂其道為京兆阡涉慕之為買地開道立表署曰南陽阡人不肯從謂之原天阡前書郟鄏杜預釋地曰河南縣王城西有郟鄏陌水經注紫陌漳水北徑祭陌西戰國之世徐巫為河伯取婦祭於此陌西門豹投巫河中淫祀雖斷地留祭陌之稱田融以為紫陌也趙建武十一年造紫陌浮橋於水上為浮圖澄先造生墓於紫陌即此處也水經晉書自啓塋墓於鄴西紫陌織路庸織路於四裔兮斯與彼其何瘳思玄賦言涉路東西有似於織也邯鄲漢文帝至霸陵居北臨廁是時慎夫人從上指示慎夫人新豐道曰此走邯鄲道也史記陳倉諸葛孔明與兄瑾書曰有綏陽小谷雖山崖絶重溪水縱橫難用行軍者羅候往來要道通人今使前軍斫治此道以向陳倉足以扳連賊勢使不得分兵東行者也水經就國師尚父東就國道宿行遲逆旅之人曰吾聞時難得而易失客寢處安殆非就封者也太公聞之夜衣而行犁明至國菜侯來伐與之爭營丘史記太公蹶起即路俄有追者至以其出關遂王獨異志假道荀息假道於虞曰今虢為不道保於逆旅以侵弊邑之南鄙左傳僖上暮舍鄭桓公東會封於鄭暮舍于宋東之逆旅逆旅之叟從外來曰客將焉之曰東封於鄭逆旅之叟曰吾聞之時難得而易失也今客之寢安殆非封也鄭桓公聞之援轡自駕其僕接浙而載之行十日夜而至釐何與之爭封故以鄭桓公之賢徵逆旅之叟幾不會封也説苑宋東楊朱過宋東之於逆旅逆旅人有妾二人其一人美其一人惡惡者貴而美者賤楊子問其故逆旅小子對曰其美者自美吾不知其美也其惡者自惡吾不知其惡也楊子曰弟子記之行賢而去自賢之行安往而不愛哉列子玉桂蘇秦之楚三日乃得見乎王談卒辭而行王曰寡人聞先生若聞古人今先生乃不遠千里而臨寡人曾不肯留願聞其説對曰楚國之食貴於玉薪貴於桂謁者難得見如鬼王難得見如天帝今令臣食玉炊桂因鬼見帝王曰先生就舍寡人聞命矣楚策投宿帝即位為微行嘗至柏谷夜投亭長宿亭長不納乃宿逆旅翁惡少年十餘人皆持弓矢刀劍令主人嫗出遇客婦謂其翁曰吾觀此丈夫非常人也且有備不可圖也天寒嫗酌酒多與其夫夫醉嫗自縛其夫諸少年皆走嫗出謝客殺雞作食平旦上去還宮乃召逆旅夫妻見之賜嫗金千斤擢其夫為羽林郎漢武故事漢武微行柏谷遇辱竇門又感其妻深識之饋既返玉階厚賞賚焉賜以津河令其鬻渡今竇津者是也故潘嶽西征賦酬匹婦其已泰故厥夫之謬官袁豹之徒並以為然余按穆天子傳曰天子自竇軨乃次於浢水之陽丁亥入于南鄭考其沿歷所鍾路直斯津以是推之知非因門矣水經除糞第五倫自度仕宦牢落遂將家屬客河東變易姓名自稱王伯齊常與奴載鹽北至太原販賣每所止客舍去輒為糞除陌上號曰道士開門請求不復責舍宿直東觀漢記供客周防字偉公父楊少孤微常修逆旅以供過客而不受其報後漢灑掃郭林宗每行宿逆旅輒躬灑掃及明去後人至見之曰此必郭有道昨宿處也別傳客舍靈帝數遊戲於西園中令後宮采女為客舍主身為沈賈服行至舍采女下酒食因共飲食以為戲樂後五行志客議謹按客舍逆旅久矣其所由來漸矣行者賴其頓止居者薄收其直交易貨還各得其所役賦而因民利誠惠加百姓而公無所費語曰許由辭帝堯之命而舍於逆旅自唐到今未有不得客舍之法潘嶽客舍議償衣桑虞嘗行寄宿逆旅同宿客失脯疑虞為盜虞默然無言便解衣償之主人曰此舍數失魚肉雞鴨多是狐狸偷去君何以疑人乃將脯主至山冢間尋求果得之客求還衣虞投之不顧晉書獨酌馬周西行長安至新豐宿於逆旅主人唯供諸沈販而不顧周遂命酒悠然獨酌主人翁深異之乃為常何陳便宜二十餘事太宗怪其能問何何答曰此非臣發慮乃臣家客馬周也太宗召見甚悅隨大用敕求勝地為周起宅談賓録失家口滄州南皮丞郭務靜性糊塗與主簿劉思莊宿于逆旅謂莊曰從駕大難靜嘗從駕失家口三日于侍官幕下討得之莊曰公夫人在其中否靜曰若不在中更論何事朝野僉載訪謫仙李太白初自蜀至京師舍于逆旅賀監知章聞其名首訪之既奇其姿又請所為文白出蜀道難以示之讀未竟稱嘆數四號為謫仙人本事詩輟馬熊執易赴舉行次潼關秋霖月餘滯于逆旅俄聞鄰店有一士吁嗟數次執易潛問之曰前堯山令樊澤舉制科至此馬斃囊空莫能自進執易造焉遽輟所乘馬倒囊濟之執易其年罷舉澤明年登科托言賦詩李義山遊長安投宿旅店適會客因召與坐不知為義山也酒酣客賦木蘭花詩衆皆誇示義山后成詩曰洞庭波冷曉侵雲日日征帆送遠人幾度木蘭舟上望不知花是此船身坐客大驚詢之方知是義山古今詩話零陵總記陸龜蒙所作禹會濠州鍾離縣塗山禹娶所也山西南有禹墟及禹會村蓋禹會諸侯之地輿地志石紐禹汶山廣柔人生於石紐村其地名刳兒坪元和郡縣志今夷人共營其地方百里不敢畜牧有罪逃其野中捕者不敢追之畏禹神能藏三年不為人得則共原之言為禹神所祐也華陽國志祿里吳太湖中洞庭中西南中號祿里村角里先生所居也史正義昭君王昭君生於峽州今有昭君村緑珠生於白州今有緑珠江貴妃生於蜀嘗誤墜池中後人呼為落妃池楊妃外傳群山萬壑赴荊門生長明妃尚有村杜詩烏夜村晉穆帝后父何準寓居海鹽南三里后將産之夕有群烏夜驚于聚落爾後烏更鳴衆共異之及明大赦乃穆帝立準女為后之日圖經錦沙睦州清溪縣錦沙村傍山依壑素波澄映錦石舒文冠軍吳喜聞之而造焉鼓枻遊泛彌旬忘返歎曰名山美石故不虛賞使人忘朱門之志睦州記昉村歙縣有昉村俗説任昉為新安太守因行春至此愛其雲溪緣源尋幽纍日不返百姓因名其溪為昉溪溪旁村為昉村村旁有山故近北野縣每山上石墜則不利縣官縣廢後其事亦止大中十年刺史盧藩改曰任公村任公溪寰宇記浣花奉乞桃栽一百根春前為送浣花村杜詩甫于成都浣花里種竹植樹結廬枕江縱酒嘯詠與田夫野老相狎舊唐埋懷馬燧計李懷光自太原引兵至寶下營問其地名埋懷村乃大喜曰擒賊必矣國史補朱陳徐州古豐縣有村曰朱陳一村唯兩姓世世為婚姻白詩箬下長興若溪夾溪悉生箭箬南岸曰上箬北岸曰下箬二箬皆村名村人取下箬水釀酒醇美勝於雲陽俗稱箬下酒輿地志巴鄉魚復尉戍江之左岸有巴鄉村村人善釀故俗稱巴鄉清郡出名酒村側有溪溪中多靈壽木中有魚其頭似羊豐肉少骨美於餘魚水經平樂魚腹縣東狠山縣舊屬武陵縣北十餘里有神穴平居無水時有渴者誠啓請乞輒得水或戲求者水終不出縣東十許里至平樂村又有石穴出清泉中有潛龍每至大旱平樂村左近村居輦草穢著穴中龍怒須臾水出蕩其草穢傍側之田皆得澆灌上東亭從平樂順流五六里東亭村北山甚高峻上合下空空徼東西廣二丈許起高如屋中有石林甚整頓傍生野韭人往乞者神許則風吹制分隨偃而輸不得過越不偃而輸輒凶往觀者去時特平暨處自然恭肅矣石塘桂陽陽山縣西北有石塘村村之流水側有豫章木本徑可二丈其株根猶存伐之積載而斧迹若新羽族飛翔不息其傍衆枝飛散遠集鄉亦不測所如唯見一枝獨在尋水涯矣萬歲桂陽郴縣有千秋水出西南萬歲山山有石室室中有鍾乳山上悉生靈壽木溪下即千秋水也水側民居號萬歲村其水下合黃水湘陂郴縣南湘陂村村有圓水廣圓可二百步一邊暖一邊冷冷處極清緑淺則見石深則無底暖處水白且濁玄素既殊冷暖亦異厥名除泉其猶江乘之半湯泉也水盛則瀉黃溪水耗則律徑輟流斷石休寧縣西斷石村舊名吳口村西南有石壁下臨深溪舊經云昔有兩舟泊此一祭一否夜有神人徙祭者舟北岸有石自絶壁墜碎不祭者舟石墜處遂成石室輿地志梅花羅浮山高三千六百丈周回三百餘里嶺十五峰三十二其峰之秀者曰飛雲玉鵝錦繡玳瑁飛雲峰路側有梅花村南越志蘇軾詩羅浮山下梅花村玉雪為骨冰為魂木香宜城縣西六十里有木香村唐段成式別業也地志梅廽洪亭村下有梅廽村舊云是梅槐合生成樹是以名之今音訛謂之梅廽王端休江陵記木客越有木客村鄱陽山中有木安秦時造阿房宮者食木實得不死時下山就民間取酒為詩云酒盡君莫沽壺傾我當發城市多囂塵還山弄明月徐鉉帖老人蜀青城山有老人村其溪有枸杞根飲其水故壽圖經野狐野狐泉店在潼關之西泉在道南店後坡下舊傳云野狐掊而泉涌店人改為冷淘過者行旅止焉今法饌中有野狐泉者以菉粉為之亦象此也南部新書原廣平曰原下濕曰隰爾雅春秋説題辭曰高平曰太原原端也平而有度廣延曰大鹵太原也釋名曰地不生物曰鹵盧榖梁傳曰中國曰太原夷狄曰大鹵尚書大傳曰東原底平大而高平者謂之太原下而平者謂之隰水經上平曰原下平曰隰公羊傳地理風俗記曰原慱平也故曰平原矣水經土地寬慱而平正名之曰原李巡爾雅注畢原周文正葬于畢長安東南有原名畢原關中記劉向曰文武周公葬于畢師古曰畢陌在長安西北四十里漢書始平長安城北有始平原數百里無山川湖水其民井汲巢居井深五十丈有伯夷墓人食薇可常食或云夷叔食三年顏色如故漢時亦謂之北芒巖三秦記白鹿長安東則驪山西則白鹿原北望雲陽悉見山阜之形而恆若雲霧之中述征記周平王東遷有白鹿遊于此原以是得名蓋春運之象三秦記杜陵狗枷川東亦曰白虎原上有狗枷堡三秦記曰驪山西有白鹿原原上有狗枷堡言襄公時有大狗來下有賊則狗吠之故一堡無患故川得厥目水經三畤三畤原在岐州雍縣南二十里封禪書云秦文公作鄜畤襄公作西畤靈公作吳陽上畤並此原上因名也括地志御覽引封禪書曰文公作鄜畤靈公作吳陽上畤宣公作密下畤蓋三畤在此原故號三畤原九原京陵縣故城於春秋為九原之地也國語曰趙文子與叔向遊於九原曰死者若可作也吾誰與歸叔向曰其陽子乎文子曰其智不足稱也叔向曰其舅犯乎文子曰其仁不足稱也其隨武子乎納諫不忘其師矣故其京尚存漢興增陵于其下故曰京陵焉水經皇天玉澗水出土漢北流徑皇天原西首上平慱方可里餘三面壁立高千許仞漢世祭天于其上名之為皇天原上有漢武帝思子臺上樂遊宣帝少依許氏長於杜縣樂之後葬于南原立廟於曲池之北亭曰樂遊原關中記少陵少陵原南接終南北至滻水即漢鴻固原也宣帝許后葬於此俗號少陵原長安志五丈諸葛亮據渭水南原司馬懿謂諸將曰亮若出武功依山東轉者是其勇也若西上五丈原諸君無事矣亮果屯此原與懿相禦水經石安符健攻張琚于宜秋還登石安原而嘆曰美哉斯原也悵然有終焉之志崔鴻前秦録萬壽高祖校獵於華池之萬壽原白鹿見高祖新御弧矢射而獲之舊唐鳳凰韋嗣立營搆業于驪山鳳凰原鸚鵡谷有重崖洞壑飛流瀑水中宗新往幸焉因封嗣立逍遙公名其所居曰清虛原幽棲谷後漢延光二年鳳凰集新豐即此原也亦驪山之別麓長安志舊唐韓原韓馮翊有原詩曰有卓其道韓侯受命是此原也又古今地名云韓武子食菜於韓原亦秦晉戰于此地即獲杜回又秦獲晉惠侯以歸之處郡國志七山河東鹽池東吳圾登七山原每登一原輒峭起五六里原土平廣不知巨極戴延之西征記風涼麗山之西川中有阜名曰風涼原在磈山之陰雍州之福地關上圖郊外邑外謂之郊郊外謂之牧牧外謂之野爾雅襄城黃帝將見大隗于具茨之山方明為御昌宇參乘至於襄城之野七聖皆迷無所問塗適遇牧馬童子乃問途焉莊子洞庭北門成問黃帝曰帝張咸池之樂於洞庭之野吾始聞之而懼後聞之而怠卒聞之而惑蕩蕩默默乃不自得上絶轡炎帝戮蚩尤于中冀名其地曰絶轡之野帝王世紀青羌禹東至摶木之野日出九津青羌之野鳥谷青邱之鄉南至九陽之山不死之鄉西至積金之山共肱一臂三面之鄉兆至夏海之窮夸父之野呂覽求人牧野自朝歌以南南極清水土地平衍據皋跨澤悉坶野突即國志曰朝歌縣南有牧野竹書紀年曰周武王率西方諸侯伐殷敗之于坶野詩所謂坶野洋洋檀車煌煌者也水經敦物秦自非子受封至昭王滅周之歲在大梁前後七遷皆在禹貢雍州之域荊山終南敦物之野東井輿鬼之分鶉火之次也帝王世紀謀野子産之從政也擇能而使之裨諶能謀謀于野則獲謀于邑則否鄭國將有諸侯之事子産乃與裨諶乘以適野使謀可否而告馮簡子使斷之周禮少原孔子出遊少源之野有婦人中澤而哭其音甚哀孔子使弟子問焉曰夫人何哭之哀婦人曰鄉者刈蓍薪亡吾蓍簪吾是以哀也弟子曰刈蓍薪而亡蓍簪有何悲焉婦人曰非傷亡簪也蓋不忘故也韓詩外傳丹野桓溫北征姚襄在伊水上許遜曰不見得襄而有大功見襄走入太玄中問曰太玄是何等也答曰南為丹野北為太玄必西北走也果如言幽明録廣莫莊子謂惠子曰子有大樹患其無用何不樹之于無何有之鄉廣莫之野倣徨乎無為其側逍遙乎寢臥其下莊逍遙壙垠無名人曰豫方將與造物者為人厭則又乘失莽眇之鳥以出六極之外而遊無何有之鄉以處壙埌之野應帝王無極廣成子曰今夫百昌皆生于土而反于土故余將去女入無窮之門以遊無極之地在宥霄雿大丈夫恬然無思淡然思慮縱志舒節以馳大區天地上遊于霄雿翟之野下出于無垠之門執要道之柄而遊于無窮之地淮原道罔浪若士曰我南遊乎罔浪淮南作寰之野北息乎沉薶墨之鄉論衡道虛泱漭鏡機子駕超野之駟乘追風之輿經逈漢出幽墟入乎泱漭之野七啓過乎泱漭之壄上林賦莽䍚袒禓徒摶拔距投石之部參談翋𦑲相與騰躍乎莽䍚之野吳都賦沃野西有王母之山有沃之國沃民是處沃之野鳳島之卯是食甘露是飲凡其所欲其味盡存鸞鳥自歌鳳鳥自舞爰有百獸相群是處是謂沃之野有軒轅之臺射者不敢西嚮射畏軒轅之臺山海經天穆西南海之外赤水之南流沙之西有人乘兩龍名曰夏后開開上三嬪于天得九辨與九歌以下此天穆之野高二千仞上關西河天闕其星為天關天文志司關掌國貨之節以聽關市周禮關在境所以察出禦入蔡雍月令章句九塞何謂九塞大汾冥淮作澠厄荊阮方城殽淮下有阪字井陘令疵字注居庸呂有始散關周無極元年老子度關關令尹喜先勑門吏曰若有老翁從東來乘青牛薄板車者勿聽過關其日果見老翁乘青牛車求度關關吏入白喜曰諾道今來矣我見聖人矣即帶印綬出迎設弟子之禮關令傳老子西遊遇關令尹于散關抱朴子六關臧文仲其不仁者三不知者三下展禽廢六關注塞關陽關之屬凡六關所以禁絶未遊而廢之左文二陽關汶水西南徑陽關故城西春秋襄公十七年逆臧紇自陽關者也陽虎居之以叛伐之虎焚菜門而奔齊者也水經鹿門季孫攻臧氏臧紇斬鹿門之關以出奔邾季孫用孟椒之言盟臧氏曰無或如臧孫紇干國之紀犯門斬關臧孫聞之曰國有人焉誰居其孟椒乎襄二十三昭關伍子胥與太子建子勝俱奔吳夜行晝伏出到昭關關吏欲執之胥因詐曰上之所以索我者以我有美珠也今我已亡之矣我將告子欲取之關吏因舍焉吳越春秋子胥橐載而出昭關夜行晝伏至于陵水無以糊其口膝行蒲伏稽首肉袒鼓腹吹箎乞食於吳市卒興吳國闔閭為伯史莊即傳督關楚肅王四年蜀伐楚取茲方楚為扞關以拒之世家楚自巫山起方城屬巫黔中設關扞以距秦鹽鐵論江水自關東徑弱關捍關注捍關廩君浮夷水所置也弱關接連平秭歸界昔巴楚數相攻伐藉險置關以相防捍水經巴郡魚腹扞水有扞關郡國志焉氏塞秦小主夫人用奄變群賢不説自匿百姓鬱怨非上公子連亡在魏聞之欲入因群臣與民從鄭所之塞右主然守塞弗入曰臣有義不兩主公子起去矣公子連去入翟從焉氐寒菌改入之夫人聞之大駭令吏興卒奉命曰寇在邊卒與吏其始發也皆曰往擊寇中道因變曰非擊寇也迎主君也公子連因與卒俱來至雍圍夫人夫人自殺公子連立是為獻公怨右主然而將重罪之德菌改而欲厚賞之監突爭之曰不可秦公子之在外者衆若此則秦人爭入亡公子矣此不便主獻公以為然故復右主然之罪而賜菌改官大夫賜官塞者人米二十石獻公可謂能用賞罰矣呂覽當賞四塞秦四塞之國也史蘇秦傳秦地被山帶河四塞中為固婁敬傳秦地左肴函右隴阺前蜀漢後山河四塞以為固金城千里鹽鐵險固函谷蘇秦約從山東六國共攻秦楚懷王為從長至函谷關秦出兵擊六國六國兵皆引而歸史記函谷關邃岸天高空谷幽深澗道之峽車不方軌號曰天險故西京賦曰巖嶮周固襟帶易守所謂秦得百二并吞諸侯也是以王元説隗囂曰請以一丸泥東封函谷關圖王不成其弊足霸矣水經蒲坂魏襄王七年秦王來見于蒲坂關竹書紀年雞鳴孟嘗君夜出秦關雞未鳴而關不闓下坐賤客鼓臂為雞鳴而雞皆和之關得開而孟嘗得出論衡定賢燕丹去秦夜到關關門未開丹為雞鳴衆雞皆鳴遂得逃歸燕丹子燕丹孟嘗君義動雞鳴于其下可謂深心有感至誠難奪矣昔老子西入關尹喜望氣于此也故趙至與稽茂齊書曰李叟入秦及關而嘆水經白馬倪説宋人善辨者也持白馬之非白馬也齊稷下之辨者乘白馬而過關則顧白馬之賦故籍之虛辭則能勝一國考實按形不能謾于一人韓非子公孫龍常爭論曰白馬非白人不能屈後乘白馬無符傳欲出關關吏不聽此虛言難以奪實也桓談新論虎牢左魯襄公二年七月晉成公與諸侯會于戚遂城虎牢以逼鄭穆天子傳曰天子射鳥獵獸于鄭圃命虞人掠林有虎在於葭中天子將至七萃之士高奔戎生擒虎而獻之天子命之為狎畜之東虞是曰虎牢矣然則虎牢之名自此始也秦以為關漢乃縣之城西北隅有小城周三里北面列觀臨河迢迢孤上路直茲邑升眺清遠勢盡川陸羈途羈至有傷深情水經金事關吏衛嗣公使人為客過關市關市苛難之因爭關市以金與關吏乃舍之嗣公謂關吏曰其時有客過而所與女金而女因遣之關吏乃大恐而以嗣公為明察韓非子發薪沛公西入武關居於灞上遣將軍閉函谷關無內項王項王大將亞夫至關不得入怒曰沛公欲反耶即令家發薪一束欲燒關門關門乃開楚漢春秋終軍終軍初從濟南當詣慱士入關關吏與軍繻軍問以此何為吏曰為復傳還當以合符軍曰大丈夫西遊終不復傳還棄繻而去後軍為謁者使行郡國建節東出關關吏識之曰此使者乃前棄繻生也漢書榆林衛青西定河南地案榆溪舊塞本傳伍被諫淮南王曰今漢廣長榆開朔方胸奴折傷雖未及古太平時然猶為治本傳上郡之北有諸次山諸次水出焉其水東徑榆林塞世又謂之榆林山自溪西去悉榆柳之藪矣緑歷沙陵屇龜茲縣西出故謂廣長榆也王恢云樹榆為塞謂此矣水經長榆塞名或謂之榆中漢書注枚乘説吳王曰秦北備榆中之關南距羌筰之塞本傳徙關函谷關舊在弘農湖城縣西元鼎三年冬樓船將軍楊僕數有大功恥為關外民上書乞徙東關請以家僮七百人築塞以家財給其用度武帝意亦好廣闊於是徙關于新安去弘農三百里武紀臨晉所為建武關函谷臨晉關者大抵為備山東諸侯也今大諸侯多其力因建關而備之豈若定地勢使無可備之患賈誼新書蕭關元封四年冬行幸雍祠五畤通回中道遂北出簫關歷獨鹿鳴澤武紀孝文十四年胸奴單于十四萬騎入朝那蕭關胸奴傳五原甘露二年呼韓邪單于款五原塞願朝就邸留月餘遣歸國單于自請願留光祿塞下漢發邊郡士馬送單于出朔方雞鹿塞胸奴傳居庸建武十五年二月徙鴈門代郡上谷民置常山關居庸關以東武紀濕餘水出上谷居庸關東溪之東岸有石室三層其戶牖扇扉悉石也蓋古關之候臺矣南則絶谷纍石為關址崇墉峻壁非輕功可舉山岫層深側道褊峽林彰蘧嶮路才容軌曉禽暮獸寒鳴相和羈官遊子聆之莫不傷思矣水經封符郭丹初之長安從宛人陳兆買入關符以入函谷關既入封符乞人曰不乘使者車不出關丹自從入關後不歸家十二年後奉使乃出關竟不本心東觀漢記玉門光武閉玉門關謝西域之貢紀班超久在絶域年老思土上疏云不敢望到酒泉郡但願生入玉門關本傳自敦煌西出玉門關陽關涉鄯善北通伊吾千餘里後西域傳西域以孝武時始通東接漢以玉門陽關西則限以蔥嶺前西域傳上黨馮異北攻天井關拔上黨二城注天井關在太行山下本傳邗水出太行之阜山則五行之異名也淮南子曰武王欲築宮于五行之山用公曰五行嶮固德能覆也納貢回矣使吾暴亂則伐我難矣君子以為能持滿高誘曰今太行山也在河內野王縣西北上黨關也詩所謂徒殆野王道傾蓋上黨關即此山矣水經馮衍遺田邑書曰上黨有四塞之固東帶三關西為國蔽注三關謂上黨壺口石陘也本傳白水關李固出為廣漢令至白水關解印綬還漢中本傳關城西南百八十里有白水關固解印綬處也梁州記金牛縣南有故白水關通典八關散關鄣自南山橫洛水北屬于河皆關塞也即楊僕家僮所築矣其城西岨塞垣北抗惠水靈帝中平元年以河南尹何進為大將軍五營士屯都亭置函谷關廣成伊闕太谷轘轅旋門津小平孟津入關都尉官治此函谷為之首在八關之限故後人總其統目有八關之名矣水經洛陽四關升高臨四關鮑昭樂府漢洛陽四關東成皋關南伊闕關西函谷關北孟津洛陽記潼關魏延欲請精兵萬人與諸葛亮異道會于潼關亮制而不許蜀志河在關內南流潼激關山因謂之潼關或説因潼谷水以名地也潼關東北水側有長坂謂之黃卷坂旁絶澗涉此坂以升潼關所謂泝黃卷以濟門關也水經蜀三關三關電掃于令升晉紀論賀邵曰劉氏據三關之險守重山之固吳志蜀有陽平關江關白水關此為三關張華漢南記漢中褒城漢褒中縣有漢陽平關在縣西北蜀先主破魏軍于此通典照烈起館築亭彰從成都至白水關四百餘區典略白馬蜀孟達降魏文帝以為新城太守治房陵有白馬山山石似馬望之逼真側水謂之白馬塞達登之而嘆曰劉封申耽據金城千里而更失之乎為上堵吟音韻哀切有惻人心今水次尚歌之水經木蘭漢水石岸有城名陵城周廽數里左岸壘石數十行重壘數十里中謂是處為木蘭塞云吳朝遣軍救孟達于此矣上鬼門關鬼門關去北流縣南三十里有兩石相對其間闊三十里俗號為鬼門關漢伏波將軍馬援討林邑蠻路由于此立碑石龜尚在昔時趨交趾皆由此關其南尤多瘴癘去者罕得生還諺曰鬼門關十人去九不還唐宰相李德裕貶崖州日經此關因賦詩云一去一萬里千知千不還崖州在何處生渡鬼門關寰宇記唐詩記事楊炎作李太尉之在崖州也郡有北亭子謂之望闕亭太尉每登臨未嘗不北睇悲咽有詩曰獨上江亭望帝京鳥飛猶是半年程青山也恐人歸去百匝千遭繞郡城昔崖州今瓊州是也南部新書瘴江西去火為山炎徼南窮鬼作關張均流浦州詩容州鬼門關其土少鐵以營石為燒器以烹魚北人謂之五侯燋石一經火久之不冷今之滑石也方輿勝覽桃林桃林塞在長安東四百里若有軍馬經過好行則牧華山休息林下惡行則決河漫延人馬不得過矣三秦記鴈門山海經曰鴈門之水出于鴈門之山鴈出其間在高柳北高柳在代中其山重巒疊巘霞舉雲高連山隱隱東出遼塞水經鴈塞鴈塞北接梁汶陽郡鴈至矯翮而度同于鴈門也荊州記梁伯縣界有鴈塞傳云此山有大池水鴈栖集之故名鴈塞梁州記楚塞郡西泝江六十里南岸有山名曰荊門山北岸有山名曰虎牙二山相對楚之西塞也荊門上合下開開達山南有門之形故曰荊門荊州記魯陽魯陽縣有魯陽關左右連山插漢秀木干雲是以張景陽詩云朝登魯陽關峽路峭且深水經橋水梁也榷水上橫木所以度也亦曰彴今謂之略東楚謂橋為圯説文石杠謂之猗爾雅聚石水中以為步度彴也注百官上虞縣一名虞賓晉太康地記曰舜避丹朱于此故以名縣百官從之故縣北有百官橋亦云禹與諸侯禽事訖因相虞樂故曰上虞水經黿鼉周穆王三十七年伐楚大起九師至于九江架黿鼉以為梁竹書紀年恨賦方架黿鼉以為梁善引竹書周武王伐紂東至九江云云舜命禹疏川奠嶽濟巨海則黿鼉以為橋梁拾遺記梁溠楚令尹鬥祁除道梁溠營軍隨架左莊四溠水名溴梁晉平公警守而下會于溴梁襄十六梁莫大于溴梁爾雅機橋燕太子丹質于秦秦王遇之無禮乃求歸秦王為機發之橋欲以陷丹丹過之橋不為發又一説交龍捧輿而機不發但言今不知其故處矣水經七星蜀有七橋一沖里橋二市橋三江橋四萬里橋五夷里橋六笇橋七長升橋李冰沿水造橋上應七宿故光武謂吳漢曰安軍宜在七星橋間也華陽國志橫橋秦造橫橋漢承秦制廣六丈三百八十步置都水令以掌之號為石柱橋三輔舊事橫橋以象牽牛黃圖橋之北首壘石水中舊有忖留神象此神嘗與魯班語班令其人出忖留曰我貌狠醜卿善圖物容我不能出班于是拱手與言曰出頭見我忖留乃出首班於是以腳畫地忖留覺之便還沒水故置其象於水唯背以上立水上忖留之像曹公乘馬見之驚又命下之水經渭橋渭橋在長安北三里跨渭水為橋始皇造渭橋鐵鐓重不能乃刻石作力士孟賁等像祭之鐓乃可移動今石人在黃圖渭橋有三所一在城西北咸陽路曰西渭橋一在東北高陵路曰東渭橋其中渭樓在故城之北索隱張釋之傳霸橋霸橋在長安東跨水作橋漢人送客至此橋折柳贈別王莽時霸橋災數千人以水沃救不滅更霸橋為長存橋黃圖飲馬漢時七里渠有飲馬橋長安圖丞相夏侯嬰墓在飲馬橋東大道南人謂之馬冢三輔舊事升仙蜀城北十里有升仙橋送客觀司馬相如初入長安題其柱曰大丈夫不乘赤車駟馬不過汝下也華陽國志竹橋諸葛亮表云臣遣虎步監孟琰據武功水東司馬懿因渭水漲攻琰營臣作竹橋越水射之橋成遂馳去水經注萬里萬里橋在成都縣南八十里蜀使費褘使吳諸葛亮送之于此嘆曰萬里之路始於此橋因名萬里橋華陽國志河橋杜預啓建河橋于富平津衆論以為殷周所都經聖賢而不作者必不可作故也預曰昔造舟為梁則河橋之謂也遂作橋成上從百官臨會舉杯勸預曰非君此橋不立也預曰非陛下之明臣亦不獲奉承聖制也衆咸稱善旅人洛陽七里澗有石梁即旅人橋也昔孫登不欲久居洛陽知楊氏榮不保終思遁遁迹林鄉隱淪妄死楊駿埋之於此橋之東駿後尋亡矣朱超石與兄書云橋去洛陽宮六七里悉用大石下員以通水可受大舫過也制作奇狀水經木蘭豬蘭橋其本名荻蘭橋橋之左右豐蒿荻于橋東劉季和大養豬襄陽太守曰此中作豬屎臭可易名豬蘭橋初如戲言而百姓遂以為名矣襄陽耆舊傳浮橋趙建武中造浮橋于水津上採石為中濟石無大小下輒流去用功百萬經年不就石虎親閲工作沈璧于河明日璧流渚上波蕩上岸遂斬將而還水經朱雀明帝太寧二年六月丁卯以應詹為護軍將軍假節督朱雀橋南諸軍事晉紀吳時南津橋橋又名朱雀桁五丈慕容垂與劉牢之戰于五丈橋澤因大敗車騎慕容德等引兵逼之五丈橋牢之馳馬跳五丈澗會符丕救至而免崔鴻十六國春秋後燕録河厲吐谷渾于河上作橋謂之河厲長一百五十步兩岸纍石作基陛節節相次犬木從橫更鎮壓兩邊俱來相去三丈並大村以板橫次之施勾欄甚嚴飾段國沙州記長分閶闔門城外七里長分橋中朝時以榖水浚急注于城下多壞民家立石橋以限之長則分流入洛故名曰長分橋或云晉河間王在長安遣張方征長沙王營軍于此因為張方橋也今民間訛語號為張夫人橋朝士送迎多在此處伽藍記百口橋宋太原太守顧訓之五代同居子孫富盛闔門雍睦家有百口時人重之故名崑山編前志東漢顧訓崔公崔亮為雍州刺史城北渭水淺不通船行人艱阻會天大雨山水暴至浮出長木數百根藉此為用橋遂成立百姓利之至今猶名崔公橋後周書天津天津橋在河南縣北四里隋大業元年初造用大船維舟以鐵鎖鉤連南北夾路對起四樓其樓為日月表勝之象正觀十四年更令石工纍方石為腳爾雅斗牛之間為天漢之津故取名元和志石橋趙州石橋甚工磨櫳蜜緻如削焉望之如初月出雲長虹飲澗上有勾欄皆石也勾欄並有石獅子龍朔年中高麗諜者盜三獅子去後復募匠修之莫能相類者至天后大足年默啜破趙之定州賊欲南過至石橋馬跪地不進但見一青龍臥橋上奮迅而怒賊乃遁去朝野僉載野郡洨河石橋隋匠李春之迹也制造奇特張嘉正柳渙張彧為銘文粹大陽大陽橋長七十六丈廣二丈架黃河為之左陜縣東北三里正觀十一年太宗東巡遣武候將軍丘行恭營造元和志肥鄉神龍中韋景駿為肥鄉令縣北瀕漳水連年泛濫舊坊迫漕渠雖峭岸隨即壞決景駿相其地勢益南千步因高築漳水至隄距輒去其北燥為腴田雖漕以梁其上而廢長橋功少費約人立石著功數年後刺趙州道出肥鄉民曰學廬館舍橋彰皆公所治本傳利涉初都城洛水天津之東立德坊西南隅有中橋及利涉橋以通行李上元中司農卿韋機始移中橋置于安衆坊之左街當是夏門都人甚以為便因廢利涉橋所省萬計然歲為洛水衝注常勞治葺李昭德創意積石為腳鋭其前以分水勢自是竟無漂損舊唐河橋蒲津河橋天下之要津也唐明皇詔鑄鐵牛八頭縶纜柱二十四條連鎖一十二條山架八所牧人八枚於中潭分立亭亭有虹霓之狀實萬伐之奇絶也又詔中書令張説制河橋贊置于中灘之上紀異記銷魂長安東灞陵有橋來迎去送皆在此橋為離別之地故人呼之銷魂橋也天寶遺事拆柳陶雍典陽安送客至情盡橋問其左右曰送迎之地止此故橋名情盡陶命筆題其柱曰折柳橋自後送別必吟其詩曰從來只有情難盡何事名為情盡橋自此改名為折柳任他離恨一條條唐詩紀事鬼橋方輿縣鬼橋忽一夜聞人呼喚聲車行雷駭曉而石橋自成家家牛皆喘息未定述征記吳興駱駝橋在霅溪上唐初建又名迎春橋以其直迎春門也舊傳此橋梁或摧圯將墜夜遠處聞橋上若有千餘人工作呼聲及旦橋梁之將墜者煥然一新皆沈舶上桅檣木也居處近橋者一無所聞覺或云此魯班仙也百花元徹柳實二人泛海底孤島上見玉壺尊師南冥夫人拜謁求歸路夫人曰有百花橋可行俄有長橋上有異花二人登岸回視已無橋矣傳奇擲巾崔生入山遇仙女為妻還家得隱形符潛遊宮禁為術士所知追捕甚急生逃還山中隔洞見其妻告之妻擲其領巾成五色虹橋度崔追者遂不及矣逸史魚鱉高麗國王有侍婢自云有氣如雞子來下我故有身后生子名東明東明善射王恐其害國欲殺之東明走至淹水以弓擊水魚鱉浮為橋既渡魚鱉解散論衡夫余王得河伯女而生一卵一男子破卵而出名曰朱蒙夫余之臣將殺之朱蒙東南走遇一大水曰我河伯外孫於是魚鱉積而成橋遂渡隋書天中記卷十六
