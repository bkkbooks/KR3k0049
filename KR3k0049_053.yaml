body:
  text: 蓮芙蓉荷芙蕖其莖茄其葉蕸其本蔤其華菡萏其實蓮其根藕其中的的中薏李巡曰函蕖其總名也別名芙蓉郭璞曰江東人呼荷華為芙蓉北方人便以藕為荷亦以蓮為荷蜀人以藕為茄或用其母為華名或用根子為母葉號此皆名相錯習俗傳誤失其正體者也爾雅芙蕖莖為荷其華未發為菡萏已發為芙蕖其實蓮青皮裏白子為的的中有青長三分如鉤為薏語曰苦如薏者也詩義疏其葉名荷圖經詩陳風彼澤之陂有蒲與荷樊光注爾雅引詩有蒲與茄水芝丹芙蓉一名水芝丹一名澤芝一名水花古今注芳苓七發蔓草芳苓善曰苓古蓮字七啓寒芳苓之靈龜黃帝時有石蕖青色堅而甚輕從風靡靡覆其波上一莖百葉千年一花生于洹流其地一名沙瀾拾遺記西王母與周穆王共玉帳高會進崑流素蓮千常碧藕素蓮者一房百子凌冬而茂上鬱水在磅磄山東其水小流在大陂之下所謂況流亦名重泉生碧藕長千常七尺為常也上老子語喜曰天崖之淵真人所遊各各坐蓮花之上一花輒徑十丈有返生香逆風聞十里真人關令尹喜傳華山頂上有池池生千葉蓮花長十丈藕如大船服之羽化物類相感志隋煬帝步虛辭八行分寶樹十丈散芳蓮韓退之詩太華峰前玉井蓮花開十丈藕如船關令尹喜生時其家堂陸地自生蓮花光色鮮盛關令內傳昭帝元始元年穿琳池廣千步中植分枝荷一莖四葉狀如駢蓋日照則葉低蔭根莖若葵之衛足名曰低光荷實如玄珠可以飾佩花葉雖萎芬馥之氣徹十里餘食之令人口氣常香益人肌理宮人貴之每遊宴出入必皆含嚼或剪以為衣或折以蔽日以為戲弄楚詞所謂折芰荷以為衣意在斯也拾遺記昭帝遊柳池有芙蕖素色大如斗花葉甘可食芬氣聞於十里之內蓮實如珠上見藝文初學記寒荷北極玄坂去崆洞十七萬里日月不至其地自明有紫河萬里流沫千丈中有寒荷霜下方香茂也洞冥記靈帝西園渠中植蓮大如蓋枝長一丈南國所獻也其葉夜舒晝卷一莖有四蓮叢生名曰夜舒荷亦云月出則葉舒也亦名望舒荷拾遺記儀仗生蓮王敦在武昌鈴下儀仗生蓮華五六日而落説曰易稱枯楊生華何其久也今狂華生枯木敦終逆而身死搜神記晉末黃祖至孝母病篤庭中稽顙俄頃天漢開明有一老翁以兩丸藥賜母服之衆患頓消翁曰汝入三月可泛河而來依期行見門題曰善福門內有水曰湎源池有芙蕖如車輪幽明録新塗縣廳事前陸地生蓮華入冬死十六年更生四枚今年復生故處繁殖轉多華有二十五枚鮮明可愛有異常蓮晉范寧為豫章郡守表謝靈運恃才傲俗少所推崇一見遠公肅然心服乃即寺觀翻涅槃經因鑿為臺植白蓮池中名其臺曰翻經臺因號白蓮社廬山記嘉蓮泰始七年六月己亥東宮元圃池芙蓉二花一蒂謂之嘉蓮皇太子以獻符瑞志泰始二年八月嘉蓮一雙駢花並實合跗同莖生豫章鯉湖又六年雙蓮一蒂生東宮玄圃池起居注臧質説南郡王義宣反兵敗無所歸乃入南湖逃竄無食摘蓮噉之追兵至緊急以荷覆頭自況於水唯出鼻軍主鄭俱兒望見射之中心兵刃亂至腸胃纏縈水草宋書宋帝時太官作血勘庖人削藕皮誤落血中遂皆散不凝乃用藕療血多效本草蓮花池王儉用庾杲之為衛將軍長史蕭緬與儉書曰盛府元僚每難其選庾景行泛緑水依芙蓉何其麗也時人以儉府為蓮花池南史時人呼儉府為入芙蓉池南齊永明中巴東王子嚮殺行事劉寅等武帝聞之謂群臣曰子嚮遂反戴僧靜大言曰諸王應自反豈惟巴東武帝問其故答曰天王無罪而一時被囚一挺之藕一杯之漿皆咨籤師籤師不在則竟日忍渴上晉安王子懋字雲昌武帝子也年七歲時母阮叔媛常病危篤請僧行道有獻蓮花供佛者衆僧以銅罌盛水華更鮮子懋流涕禮佛誓曰若使阿姨獲祐願華竟齋如故七日齋畢華更鮮紅看視罌中稍有根鬚阮病尋差世稱其孝感法苑吳均齋春秋閣下生蓮齊太和二年烏程縣閣下生蓮華萬歲曆湖目歷城二里北有蓮子湖周環二十里湖中多蓮花紅緑間明乍疑濯錦又漁船掩映罟罾坂布遠望之者若蛛網浮杯也魏元翻曾在湖宴焦參軍張伯瑜咨公言向為血羹頻不能就公曰取洛水必成也遂如公語果成時清河王怪而異焉乃咨公未審何義得爾公曰可思湖目清河笑而然之而實未解坐散語主簿房叔道曰湖目之事吾實未曉叔道對曰藕能散血湖目蓮子故令公思清河嘆曰人不讀書其猶夜行二毛之叟不如白面書生酉陽採荷調江從簡光祿大夫革之子也頗有才學年十七為採荷調以刺何敬容其文曰欲持荷作鏡荷暗本無光欲持荷作柱荷弱不勝梁敬容弗覺唯唯嗟其工隋書後主武平中特進侍中崔季舒宅中池內蓮莖皆作胡人面仍著鮮卑帽俄而季舒見殺北齊齊主還鄴高麗新羅並遣使朝貢先是徐州蓮一莖兩蒂占云異木連枝遠人入欵斯其應也三國典略元藏幾大業初為海使判官遇風漂于滄州其洲方千里有良金池可方數十里水石沙泥皆如金色其中有四足魚金蓮花州人研之如泥竹間彩繪光影煥鑠與真金無異但不能入火而已更有莖出其花如蝶每微風則搖蕩如飛婦人競採之以為首飾即語曰不戴金莖花不得在仙家又以強木造船楫其上多飾珠玉以為遊戲強木不沉木也杜陽編貞觀二十年十月渝州相恩寺側泉倏忽出紅蓮花面廣三尺旅遊往來無不歎訝經月不滅廣記靈異羅公遠謂中使輔仙玉云主人列月華之藕又云玉京交契之舊感遇傳明皇秋八月太液池有千葉白蓮數枝盛開帝與貴戚宴賞焉左右皆歎羡久之帝指貴妃示於左右曰爭如我解語花天寶遺事開元二十一年六月癸丑絳州黃龍興觀池同心蓮一莖唐書德宗貞元十八年六月中西內神龍寺前水渠生合歡蓮其花一莖兩房宰臣權德輿柳宗元等表賀英華青蓮柳宗元有賀西內定禮池青蓮花表贊皇公平泉莊其水物之美者有白蘋州之重臺蓮芙蓉湖之白蓮茅山東溪之芳蓀山居草堂記宣平相國盧公應舉時寄居壽州安豐縣別墅嘗遊芍陂見里人負薪者持碧蓮花一朵已傷器刃矣云於陂中得之尚書故實張舜民藝叟責郴州稅郴多碧蓮根大如碗張嘗以墨印于詩稿上以詫北人孫公談圃中和中有士人蘇昌遠居蘇州屬邑有小莊去官道十里吳中水鄉率多荷芙忽一日見一女郎素衣紅臉容質絶麗若神仙中人自是與之相狎以莊為幽會之所蘇生惑之既甚嘗以玉環贈之結繫殷勤或一日見檻前白蓮花開敷殊異俯而玩之見花房中有物視乃所贈玉環也因折之其妖遂絶北夢監軍張承業本朝舊人權貴任事人士脅眉低首候之唯馬郁滑稽侮狎每賓僚宴集承業出異方珍果陳列于前客無敢先嘗當郁前者食之必盡承業私戒主膳者曰他日馬監至唯以乾蓮子置前而已郁至觀之知其不可啖異日鞾中置鐵鎚出以擊之承業大笑曰為公易饌勿敗豫桉後唐史蜀王先主將晏駕其年峨眉山婆羅花悉開白花又荊文獻王未薨前數年溝港城隍悉開白蓮雍熙中張君房寓泊廬山開先寺望黃石崖瀑布水中一大紅葉泛而下令僧行急取之乃紅蓮一葉長三丈餘闊一尺三寸嘗觀廬山記説沛水出雙劍峰頂有池闊數百尺其深莫測又有清源池生蓮花大如車輪今可信矣君房因分此花葉遺好事者磨湯飲之其蓮香經宿不散紹紳脞説僧齊已芳塑匠蔡蟠曾於廬山瀑布見一蓮房房已乾其大如笠楊氏六帖補宋昭宣用臣卓有幹才元豐間掖庭水啓殿落成嘉致既滿偶失種蓮宋即購于都城得器缶所植者百餘本連缶沉水底再夕視之則蓮已開盈沼矣談選蘇州進藕其最上者名傷荷藕或云荷名或云葉甘為蟲所傷或云故傷其葉以長其根近多重臺荷實中又生花亦甚異國史補食之無滓他産不滿九竅此獨過之以此為辨也睡蓮葉如荇而大沈水面上有異浮根菱耳其花布葉數重不房而蘂凡五種色當夏晝開夜縮入水底晝而復出於水面也北戶録紫芙蓉襄陽石梁山上有池池生紫芙蓉物類相感志九疑山過半路皆行竹松下夾路有青澗澗中有黃色蓮華芳氣盈谷王韶之神境記蜀中有朝日蓮花色或黃或白葉浮水上開則隨日所在日入轍斂藏葉下若葵傾藿太陽也益州方物贊豫章雩都縣有瑞蓮池池産異蓮其葉曰雙捲劍脊其花曰雙頭丫髻三蕚二千四葉其實曰覆鍾金鋌移之他處輒類常種俗傳雩山倒影所致豫章志白蓮入水必沉惟煎鹽鹹鹵能浮之鴈食之糞落山石間有百年不壞相傳橡子落水為蓮酉陽顏延之碧芙蓉頌曰澤芝芳艷擅奇水屬劉孝威謝藕啓云凡厥水羞莫敢相輩田田江南可采蓮蓮葉何田田古樂府雖無田田葉及爾泚漣漪陸韓卿詩王安貧武陵記言四角三角曰芰兩角曰菱芰一名水栗一名薢茩酉陽巨野巨野大菱大於常菱淮漢以南凶年以芰為蔬廣志嗜芰屈到嗜芰有疾召其宗老而屬之曰祭我必以芰及祥宗老將薦芰屈建命去之宗老曰夫子屬之子木曰夫子不以其私欲干國之典遂不用國語浮根菱漢武旦露池西有靈池中有浮根菱根出水上葉沉波下霜降彌美因名青冰菱洞冥記玄都翠水水有菱碧色狀如雞飛名翻雞菱仙人鳧伯子常遊翠水之涯採食之上昭帝琳池中有倒生菱莖如亂絲一花千葉根浮水上實沉泥中名紫菱食之不老拾遺記魚弘為湘東王鎮西司馬述職西上道中乏食緣路採菱作菱米飯給所部弘度之所後人覓一菱不得梁書花開背日花開背日芡花開向日菱寒而芡暖仇池筆記加籩加籩之實菱芡脯周禮雞頭䓈芡雞頭也北燕謂之䓈青徐淮泗之間謂之芡南楚江湘之間謂之雞頭或謂之鴈頭或謂之烏頭方言一名鴈喙實一名水陸丹木草藥也其實堇也桔梗也雞𢋊也豕零也是時為帝者也莊徐無鬼𢋊或作壅司馬云即雞頭也水硫黃地産之芡其甘滑可食名為水硫黃孫公談圃地芝瓜也其子謂之𤬓龍蹄虎掌羊骹兔頭桂支蜜筒㼔䒷貍頭白㼐無餘縑瓜屬也廣雅稽含賦作土芝星主牽牛星荊州謂之河鼓主關梁織女主瓜果續漢書五月乃瓜乃瓜者治瓜之辭也瓜也者始食瓜八月剝瓜蓄瓜之時也大戴禮夫差為越所敗遁去因得生瓜已熟吳王掇而食之謂左右曰何冬而生瓜近道人不食何也左右曰謂糞種之物人不食也吳王曰何謂糞種左右曰盛夏之時人食生瓜起居道傍子復生秋霜惡之故不食吳越齊侯使連稱管至父戍葵丘瓜時而往曰及瓜而代期戍公問不至請代不許故謀作亂左莊七昔梁大夫宋就為邊縣令與楚鄰界梁亭楚亭皆種瓜梁亭劬力數灌其瓜瓜美楚人田窳而稀灌其瓜瓜惡楚令以梁瓜美怒其瓜之惡因往夜竊搔梁瓜皆有死焦者矣梁亭覺之因請其尉亦欲竊往報搔楚瓜宋就曰是搆怨招禍之道也令人竊為楚亭夜灌其瓜令勿知也楚亭旦而往瓜則以灌瓜日以美楚亭怪而察之則梁亭之為也楚令大説因以聞楚王楚王曰此梁之陰讓也乃謝以重幣而請交於梁王賈子鉶谷瓜秦始皇改古文為篆隸患苦天下不從所改更召諸生至者皆拜為郎凡七百人密令冬月種瓜於驪山鉶坑谷中溫處瓜實乃使人上書曰冬瓜有實詔下博士諸生説之人人各異乃令就視之先為伏機諸生賢儒皆至焉方發機從上填之以土為壓之終乃無聲衛宏古今奇字序召平者故秦東陵侯秦破為布衣貧種瓜長安城東瓜美故世俗謂之東陵瓜從召平以為名也史記蕭何世家邵平廣陵人黃圖昔聞東陵瓜近在青門外連畛距阡陌子母相鉤帶五色曜朝日嘉賓四面會阮籍詩有龍肝瓜長一尺花紅葉素生於冰谷所謂冰谷素葉之瓜仙人瑕丘仲採藥得此瓜食之千歲不渴瓜上恆如霜雪刮嘗如蜜滓及武帝封泰山從者皆賜冰谷素葉之瓜洞冥記空同靈瓜仙之上藥有空同靈瓜四劫一實內傳明帝陰貴人夢食瓜甚美帝使求諸方國時燉煌獻異瓜種瓜名窮隆長三尺而形屈曲味甘如飴父老云昔道士從蓬萊山得此瓜云是空同靈瓜四劫一實西王母遺于此地世代遐絶其實頗在拾遺記王莽居攝二年唐公昉為漢中郡吏啖瓜旁有真人左右莫察君獨進美瓜又從而敬禮之真人者遂與期谷口山上乃與君神藥曰服藥以後當移意萬里知鳥獸言語後公昉舉家仙去仙人唐君碑安帝元初三年有瓜異本共生一瓜同蒂時以為嘉瓜或以為瓜者外延離本而實女子外屬之象也是時閻皇后初立後閻后與外親耿實共譖太子廢為濟陰王更外迎濟北王子犢立之續漢書吳桓王時會稽生五色瓜今吳中有五色瓜歲充貢賦述異記吳時有徐光常行幻術于市里從人乞瓜其主弗與便從索瓣種之俄而瓜生蔓延成花實乃取食之因賜觀者鬻者反視所賣皆耗矣搜神記冬致生瓜葛玄冬為客設生棗及生瓜神仙傳遼東丁伯昭自説其有客字次節既死常為本家致奇物試臘月中從索瓜得美瓜數枚來在前不見形也列異傳孝感致瓜焦華父遺常病甚冬中思瓜夜夢一人黃冠謂曰我聞子父病思瓜故送以助華拜受之及寤在手馨香非常父食而病愈孝子傳桑虞仁孝自天年十四喪父毀瘠過禮虞有園在宅北數里瓜果初熟有人踰垣盜之虞以園後多棘刺恐偷見人驚走而致傷損乃使奴為之開道及偷負瓜將出見道通利知虞使除之乃送所盜瓜叩頭請罪虞乃歡然盡以瓜與之晉書涼天水太守史稜暴疾死五日而蘇云見涼光殿皆生白瓜秦使梁熙滅涼小字白瓜也三十國春秋郭原平以種瓜為業大明七年大旱瓜瀆不復通船縣官劉僧秀愍其貧老開瀆下水與之原平曰普天大旱百姓俱困豈可減溉田之水以通運瓜之船乃步從他道往錢塘貨賣宋書分瓜止渴齊武帝與到撝同從宋明帝射雉郊野渴倦撝得早春瓜與上對剖而食之及帝即位一歲三遷至御史中丞懷舊德也南史竟陵王子良禮才好士傾意賓客天下才學皆遊集焉善立勝事夏月客至為設瓜飲及甘果南齊種瓜營葬韓靈敏與兄靈珍早孤並有孝性尋母又亡家貧無以營凶兄弟共種半畝瓜朝採瓜子墓已復生以此遂辦葬事上鄭灼字茂昭勵志好學多苦心熱若瓜時輒偃臥以瓜鎮心便起讀誦其篤志如此梁書早春瓜郭祖深清儉常服故布褐素木案食不過一肉有姥餉以早春青瓜祖深報以匹帛富人效之以貨利祖深鞭而徇衆朝野憚之上緑沉瓜任昉卒武帝聞問方食西苑緑沉瓜投之於盤悲不自勝因屈指曰昉少時常恐不滿五十今四十九可謂知命上蘭欽為廣州刺史前刺史新渝侯映之弟南安侯恬權行州事冀得即真及聞欽至嶺厚貨廚人塗刀以毒削瓜進之欽及愛妾俱死帝聞大怒檻車收恬削爵土南史冬月求瓜王薦母病篤渴思瓜時冬月薦至深嶺值雪仰天而哭忽見岩石間青蔓離披有二瓜焉摘歸以進母渴遂止楊愔典選多以言貌取人時謗詞云尚書典選似貧人買瓜惟取大者後魏書蘇瓊為清河太守郡人趙穎以太守年老致仕在家五月中得新瓜一雙自來奉瓊不受穎苦請遂便留乃致之廳事竟不割人聞其受瓜欲貢新果到門知穎瓜猶在相顧而去北齊食瓜皮王羆性儉嘗有客與羆食瓜客削瓜侵膚稍厚羆意嫌之及瓜皮落地乃引手就地取而食之客甚有愧色後周書杜如晦薨後太宗食瓜每愴然思之遂輟其半使置之靈座舊唐高宗子八人武后所出者自為行第長曰孝敬皇帝監國仁明為后所忌而鴆之次曰雍王賢為太子次曰中宗次曰睿宗及孝敬遇害諸弟嘗所不安晨夕懷懼雖父母之前無由敢言乃作黃臺瓜詞令樂人歌之欲微悟上意歌曰種瓜黃臺下瓜熟子離離一摘使瓜好再摘令瓜稀三摘尚猶可四摘把蔓歸然太子竟亦流竄于黔州上明皇召諸學士宴於便殿因酒酣故謂李白曰我朝與天后之朝何如白曰天后朝政出多門國尤姦幸任人之道如小兒市瓜不擇香味惟揀肥大者我朝任人如淘沙取金剖石採玉皆得其精粹者明皇笑曰學士過有所飾緱氏瓜高宗四月憶瓜明崇儼索百錢須臾以瓜獻曰得之緱氏老人圃中帝召老人問故曰埋一瓜失之土中得百錢矣唐書王建華清宮詩云二月中旬已進瓜注唐置溫湯監監丞種瓜蔬隨時供奉瓜夏熟者二月而進瓜蓋譏明皇違時及物求口體奇巧之奉以説婦人酷吏王弘義始賤時求傍舍瓜不與及為御史乃騰文言園有白兔縣為集人捕逐畦無遺蓏李昭德曰昔聞蒼鷹獄吏今有白兔御史唐書馬湘有道術嘗於江南刺史馬植坐上冬月以酒杯盛土種瓜須臾引蔓花實食之甚美續仙傳瓜惡香香中尤忌麝鄭注太和初赴職河中姬妾百餘盡騎香氣數里逆於人鼻是歲自京至河中所過路瓜盡死一蒂不獲酉陽廣明中巢寇犯闕僖宗幸蜀關中道傍之瓜悉皆萎死蓋宮嬪多帶麝香所熏遂皆萎落耳負暄雜録胡嶠為蕭翰掌書記隨翰入虜中至真珠寨始食西瓜云契丹破回紇得西瓜種種以牛糞覆棚而種大如中國冬瓜而味甘五代史西瓜形如匾蒲而圓色極青翠經歲則變黃其瓞類甜瓜味甘脆中有汁尤冷五代史四夷附録云以牛糞覆棚種之洪皓使虜攜以歸今禁圃鄉囿皆有亦可留數月但不能經歲仍不變黃色鄱陽有久苦目疾者曝乾服之而愈蓋其性冷故也松漢紀聞草木子西瓜元世祖征西域中國始有種誤也宣和中蔡君安提舉祕書省夏日會館職于道山食瓜君安令坐客徵瓜事各疏所意每一條食一片坐客不敢盡言君安所徵為優欲畢校書郎董彥遠連徵數事皆所未能聞坐客咸歎服之識者謂彥遠必不能安後數日果補外揮麈録瓜之所出以遼東廬江燉煌之種為美有烏瓜魚瓜貍頭瓜蜜筒瓜女臂瓜龍蹄瓜羊髓瓜縑瓜瓜州大瓜如斛御瓜也有青登瓜大如三斗魁有桂枝瓜長二尺餘蜀地溫良瓜冬熟有春日瓜細小小瓣宜藏正月種三月熟有秋泉瓜秋種十月熟形如羊角色蒼黑廣志分蒂瓜滄州産分蒂瓜長二尺其色如椹一顆二蒂杜陽編大食園瓜大者名尋支十餘人食一顆輒亦足越瓜長四尺以上杜還經行記瓜州燉煌瓜州地出美瓜因名狐食其瓜不見首尾元和志大五六尺大食勿斯離國瓜大五六尺麥每粒長三寸靺鞨國西瓜甜瓜一枚用二人舉之古里國西瓜四時皆有又有小瓜大如小指長二寸許味如青瓜瀛涯勝覽朝鮮靈岩郡西有崔氏園諺傳新羅人崔氏園中有瓜長尺餘一家頗異之崔氏女潛摘食之歆然有娠彌月生子其父母惡其無人道而生置之竹林居數七日女往視之鳩燕來覆翼之還告於父母父母往見異之取而養之及長為僧名道詵入唐傳一行地里法而還後名其地曰鳩林志兩蒂瓜有兩蒂兩鼻者食之殺人龍魚河圖甘蔗有三種赤色者曰崑崙蔗白色者竹蔗亦名蠟蔗小而燥者曰荻蔗柘漿胹鱉炮羔有柘漿招魂百末旨酒布蘭生泰尊柘漿析朝酲漢郊祀歌魏文帝嘗與平虜將軍劉勳奮威鄧展等共飲宿聞展有手臂曉五兵與之論劍酒酣耳熱方食甘蔗便以為杖下殿數交三中其臂左右大笑孫亮使黃門以銀碗并蓋就中藏吏取交州所獻甘蔗餳黃門先恨藏吏以鼠矢投餳中啓言藏吏不謹亮呼吏持餳器入問曰此器既蓋之且有掩覆無緣有此黃門將有恨於汝邪吏叩頭曰嘗從某求宮中莞席宮席有數不敢與亮曰必是此也覆問黃門具首伏即於目前加髡鞭斥付外署江表傳泰康六年扶南國貢蔗一丈三節南人云甘蔗可消酒南方草木狀扶南蔗一丈三節見日即消風吹即折漸入佳境顧愷之字長康噉甘蔗先食尾人問所以曰漸至佳境世説魏王致意安北遠來渴乏若有甘蔗及酒可見分惠世祖遣人答曰知行路多乏今付酒二器甘蔗百挺宋書庾仲文好貨劉雍自謂得其助力事之如父夏中送甘蔗若新發於州國吏運載樵蘇無輟于道南史宜都王鏗善射常以棚的大闊曰終日射侯何難之有乃取甘蔗插地百步射之十發十中齊書范雲永明十年使魏魏使李彪宣命至雲所甚見稱美彪為設甘蔗黃甘粽隨盡絶益彪笑謂曰范散騎小復儉之一盡不可復得不食庾沙彌性至孝母劉亡好噉甘蔗沙彌遂不食焉梁書陸納反湘州分其衆三千人夜襲巴陵晨至城下宜豐侯修出壘門坐胡床以望之納衆乘水來攻矢下如雨修方食甘蔗曾無懼色部分軍旋鼓而進之遂獲其一艦生擒六十人納遂歸保長沙三國典略赤土國物産多同於交址以甘蔗作酒雜以紫瓜根酒色黃赤味亦香美隋書大業三年常駿使其國云磨偈他太宗遣使取熬糖法即詔揚州上諸蔗榨瀋如其劑色味愈西域遠甚西域傳賜郭汾陽在汾上代宗賜甘蔗二十條節稀似竹唐韋齊休聘雲南會川都督劉寬使致甘蔗節稀似竹許削去後亦有甜味雲南記大歷間有僧鄒和尚不知所從來跨白驢登繖山結茅廬以居須鹽米薪菜之屬即書十紙繫錢緡遣驢負至市區人知為鄒也取平直挂物於鞍縱驢歸一日驢犯山下黃氏諸蔗黃請償於鄒鄒曰汝未知因蔗糖為霜利當十倍吾語汝塞責可乎試之果信其色如琥珀遂為上品自是流傳其法鄒末年北走通泉縣靈鷲山龕中其徒追及之但見一文殊石像始知大像化身而白驢者獅子也王灼譜盧絳痁疾逾月既乏資給疲瘵且極忽夢一白衣婦人頗有姿色謂之曰子之疾當食蔗即愈既詰朝見鬻者絳揣囊中且乏一鏹唯有唐韻一册遂詣易之其人曰吾輩乃負販者將此安用哀君欲之志切遂遺數挺絳喜而食之至旦疾損江南野史甘蔗遠近皆有交趾所産甘蔗特醇好本末無薄厚其味至均圍數寸長丈餘頗似竹斬而食之既甘迮取汁如飴餳名之曰糖益復珍也又煎而曝之既凝而冰破如博其食之入口消釋時人謂之石蜜者也異物志甘蔗所在皆植獨福唐四明番禺廣漢遂寧有糖冰而遂寧為冠四郡所産甚微而顆碎色淺味薄才比遂之最下者蔗有四色曰杜蔗曰西蔗曰艻蔗本草所謂荻蔗也曰紅蔗本草崑崙蔗也譜南方山有𤮽蔗之林其高百丈圍三尺八寸促節多汁甜如蜜咋囓其汁令人潤澤可以節蛔蟲人腹中蛔蟲其狀如蚓此消穀蟲也多則傷人小則穀不消是甘蔗能減多益少凡蔗亦然神異經若脛婆賄伽盧國蔗大若脛唐南蠻傳杖必取材不必用味相必取賢不必欲愛都蔗雖甘猶不可杖佞人悅已猶不可相馮衍杖銘都蔗雖甘杖之必折巧言雖美用之必滅曹植詩土芝芋一名土芝本草芋魁漢書芋渠後書仲冬昴星中收莒芋宋均曰莒亦芋孝經援神契大芋實根駭人故謂之芋也齊謂芋為莒説文渠芋也其莖謂之𦵸葃姑水芋烏芋也廣雅蜀漢既繁芋民以為資凡十四芋有君子芋大如斗魁有百果芋魁大子繁多畝收百斛種一百畝葉以養彘廣志博士芋博士芋蔓生根如鵝鴨卵風土記卓氏之先趙人秦破趙遷卓氏之蜀曰吾聞岷山之下沃野下有蹲鴟至死不飢乃求遠遷致之於臨卭史記徇蹲鴟之沃則以為世濟陽九吳都賦酒客者為梁丞使民益種芋菜曰三年當大飢卒如其言梁民不死列仙傳長自引芋袁安字邵公除陰平長時年飢荒民皆菜食租入不畢安聽使輸芋曰百姓飢困長何得食穀先自引芋吏皆從之薛直歸先人冢側種稻芋稻以祭祀芋以充飢耽道説禮玄虛無為汝南先賢傳何隨字季業蜀郡郫人也除安漢令蜀亡去官時巴土飢荒所在無穀送吏行乏輒取道側民芋隨以帛繫其處使足所取直民視芋見帛相語曰聞何安漢清廉行過從者無糧必能爾耳持帛送還之終不受因為語曰安漢吏取糧令為之償章仇置成都市誓文曰大亂不亂蜀有廣漢大飢不飢蜀有蹲鴟唐書鮮于文宗漁陽人年七歲喪父父以種芋時亡至明年芋時對芋嗚咽如此終身南史孝義傳開元中蕭嵩奏請注文選東宮衛佐馮光進解蹲鴟云今之芋子即是著毛蘿蔔嵩聞大笑李泌在衡嶽有僧明瓚號懶殘泌察其非凡人夜往謁之瓚發火芋啖之曰勿多言領取十年宰相本傳芋塹閣皂山一寺僧甚專力種芋歲收極多杵之如泥造塹為牆後遇大飢獨此寺四十餘僧食芋塹以度凶歲玉堂間話野芋狀小于家芋食之殺人蓋蘝也家芋種之三年不收旅生亦不可食博物志今浙江常生土芋狀磊磈自實若天雷頻則多生若耕種欲取之得名之曰若呼芋字則逡巡不見矣相感志天芋天芋生終南山中葉如荷而厚酉陽雀芋狀如雀頭置乾地反濕置濕處反乾飛鳥觸之墮走獸遇之僵上芋宜沙白土土宜深耕二月種為上時相去六七寸下一芋芋羞三日衆人來往眼目多見并聞刷鍋聲處多不滋胤務本新書度凶年芋可以度飢饉度凶年今中國多不以此為意後生有耳目所不見聞者及水旱風蟲雷雹之災便能餓死滿道白骨交橫知而不種坐致泯滅悲夫人君者安可不督課之哉要術處士劉湯隱居王屋山嘗於齋中見一大蜂屑于蛛網蛛縛之為蜂所螫墜地俄頃蛛鼓腹欲烈徐徐行入草囓芋梗微破以瘡就囓處磨之良久腹漸消輕躁如故自後人有為蜂螫者挼芋梗傅之則愈筆談甘薯似芋亦有巨魁剝去皮肌肉正白如脂肪南人專食亦當米殼蒸炙皆香美賓客酒食亦施設有如果實也異物志出三輔儲藇東出三輔白色者善范子計然山藥本名薯蕷避唐代帝諱豫改名薯藥宋英宗諱曙遂名山藥負暄雜録一名山芋秦楚名玉延鄭越名土薯一名修脆一名兒草本草若欲掘取默然則獲唱名便不可得人有植之者隨所種之物而象之異苑手殖則如手鉏鍬等物植隨本物之形狀相感志景山景山北望少澤其草多薯藇郭璞云根似芋可食今江南人單呼薯語或有輕重耳北山經異名玉衡星散為椒運斗樞一曰蓎藙一曰南椒生于漢中者曰漢椒巴中者曰巴椒本草蜀椒出武都赤色者善秦椒出天水隴西細者善范子計然景山多秦椒山經檓檓大椒今椒樹叢生實大者名為檓爾雅椒樹如茱萸有針刺葉堅而滑澤蜀人作茶吳人作茗皆合煮其葉以為香今成皋諸山間有椒謂之竹葉椒其樹亦如蜀椒可著飲食中又用蒸雞豚最佳香東海諸島上亦有椒樹枝葉皆相似子長而不圓甚香其味似橘皮島上獐鹿食此椒葉其肉自然作椒橘香詩義疏皇后稱椒房取其曼延盈升以椒塗室亦取其溫暖漢官儀天仙虜蘇割刺在答魯之右大澤中高百尋然無草木石皆赭色山産椒椒大如彈丸燃之香徹數十里每然椒則有鳥自雲際蹁躚五色名赭爾鳥蓋鳳凰種也昔漢武帝遣將軍趙破奴逐胸奴得其椒不能解因問東方朔朔曰此天仙椒也塞外千里有之能致鳳武帝植之太液池至元帝時椒生果有異鳥翔集燉煌新録天成元年宋王義潮使雲中云然鍾繇嬖庶子會之母黜其夫人文帝命繇復焉繇恚忿餐椒致噤帝乃止魏氏春秋同異椒薑禦濕菖蒲益聰巨勝延年感喜辟兵此皆上聖之至言方術之實録也援神契井蕉草類望之如樹株大者一圍餘葉長一丈或七八尺廣餘二尺許花大如酒杯形色如芙蓉著莖末百餘子大名為房根似芋魁大者如車轂實隨華長每華一闔各有六子先後相次子不俱生花不俱落此蕉有三種一種子大如指長而鋭有似羊角名羊角蕉味最甘好一種大如雞卵有似牛乳味微減羊角蕉一種大如藕子長六七寸形正方少甘味最弱其莖如芋取以灰練之可以紡績南州異物志剝其皮食其肉味如蜜甚美食之四五枚可飽而其滋味猶在齒牙一名甘蔗上十丈赤巖山水石之間有甘蕉林高者十丈遊名山志陸羽作僧懷素傳曰貧無紙可書常于故里種芭蕉萬餘株以供揮灑書法苑什文天水之地邇于邊陲土寒不産芭蕉戎帥使人於興元求之植二本於庭臺間每至入冬即連土掘取之埋藏于地窟候春暖即再植之庚午辛未之間有童謠曰花開來裏花謝來裏而又節氣變而不寒冬即和暖夏即毒熱甚于南中芭蕉於是花開秦人不識遠近仕女來看者嗔咽衢路尋而蜀人犯我封疆年年一來不失芭蕉開謝之期其地竟為蜀人所有玉堂間説間話徵應初朱勔之進花石也聚于京師艮嶽之上以移根之久為風日所殘植之未久即稿瘁時時欲一易之故花綱旁午於道一日內宴伶人因以諷之有持梅花而出者問曰此何物也應之曰芭蕉有持松檜而出者亦以芭蕉答之如是者數四遂批其頰云此某花此某木何俱謂之芭蕉應之曰我但見巴巴地討來都焦了天顏亦為之少破中吳紀聞地輔杞一名枸檵郭云今枸杞也爾雅一名苦杞詩義疏一名杞根一名地骨一名枸忌一名地輔一名羊乳一名却暑一名仙人杖一名西王母杖本草家柴一名托盧或名天精或名却老抱朴朱孺子嘉安國人幼事道士王玄真居大箬巖常登山嶺採黃精服餌一日就溪濯蔬忽見岸側有二小花犬相趁孺子異之乃尋逐入枸杞叢下歸語玄真訝之遂與孺子俱往伺之復見二犬戲躍逼之又入枸杞下玄真與孺子共尋掘乃得三枸杞根形狀如花犬堅若石洗挈歸煮食之俄頃而孺子忽飛升在前峰矣玄真驚異久之孺子謝別玄真升雲而去今俗呼其峰為童子峰續神仙傳枳匱枳匱葉似蒲柳子似珊瑚廣志有子著枝端大如指長數寸噉之甘美如飴八九月熟江南者特美今官園種之謂之木蜜本從江南來其木能令酒薄若以為屋柱則一屋酒皆薄詩義疏昔有南人修舍用此誤有一片落在酒甕中其酒化為水味本草枳椇子一名樹蜜一名木餳實形拳曲核在實外一名白石一名木石古今注十二年四月南海郡送都念子樹一百株勑付西苑十六院內種此樹高一丈許葉如楊枝柯長細花金色花葉正赤似蜀葵而大其子小於柿子甘酸至美蜜漬為粽益佳大業拾遺頭上有四葉如柿蒂食者必捻其蒂故謂之倒捻子或訛呼都念子今又訛念為撚嶺表録異劉一名劉杙其子可食郭云劉子生山中實如梨酢甜核堅出交趾爾雅劉三月華七月八月熟其色黃其味酢出交趾武平興古九真南方草木狀端溪縣有樹冬榮其子號曰豬肉子大如杯其肉如肪炙而食之味似豬肉至美故名也寰宇記元和志雲南大理府鄧川縣有猩猩果高數丈春花秋實果如彈丸色如血故名味酸可食雲南志豆蔻樹大如李二月花色仍連著實子相連纍其核根芬芳成殼七月八月熟曝乾剝食核味辛香五味出興古南方草物狀豆蘊生交趾其根似薑而大從根中生形似益智皮殼小厚核如石榴辛且香異物志鈎緑子形如瓜皮似橙而金色胡人重之極芬香肉甚厚白如蘆蔔女工競雕鏤花鳥漬以蜂蜜點燕檀巧妙麗絶妙無與為比太康五年太秦進十缶帝以三缶賜王愷助其珍味誇示于石崇南方草物狀千歲子有藤蔓出土子在根下鬚緑色交加如織其子一苞二百餘顆皮殼青黃色殼中有肉如栗味亦如之乾者肉殼相離撼之有聲似肉豆蔻出交趾上印度出那核婆果大如冬瓜熟則果赤剖之中有十小果大如雞卵更又破之其汁黃赤其味甘美或在樹枝如衆果之結實或在樹枝如茯苓之在土北戶録人面子樹人面子樹似含桃結子如桃實核正如人面故以為名以蜜漬之稍可食其核可玩稽含草木狀人面木春花夏實秋熟皮味甘酸實有核如胡桃兩邊似人面寰宇記古度古度樹不花而實實從皮中出大如安石榴色赤可食其實中如有蒲䔧者取之為粽數日不煮皆化成蟲如蟻有翼穿皮飛出著屋正黑交州記熙安縣有孤古度樹生其號曰古度俗人無子於祠炙其乳則生男以金帛報之廣州記崑崙之丘有木焉其狀如棠華黃赤實其味如李而無核名曰沙棠可以禦水食之使人不溺山經果之美者沙棠之實呂覽石南樹野生二月花色仍連著實實如燕卵七八月熟人採之取核乾其皮中作肥魚羹和之尤美出九真南方記州樹野生二月花色仍連著實五六及握煮如李子五月熟剝核滋味甜出武平上國樹子如鴈卵野生三月花色連著實九月熟曝乾訖剝殼取食之味似栗出交址上五子五子樹實如梨裏有五核因名五子治霍亂金瘡廣州記無花木饅頭無花果也倦遊録占城國有果曰波羅蜜狀如冬瓜皮似荔枝內有黃肉大如雞子味甘如蜜中有子似鵝腰子炒食之味若栗瀛涯勝覽王壇子如棗大其味甘出猴官越王祭太一壇邊有此果無知其名因見生樹遂名王壇其形小於龍眼有似木瓜異物志多感多感子黃色圍一寸交州記植類之中有物曰竹不剛不柔非草非木根幹將枯花𥳇乃縣箹必六十復亦六年竹譜東南之美東南之美者有會稽之竹箭焉爾雅渭川渭川千畝竹與千戶侯等史貨殖傳秦地有鄠杜竹林南山檀柘號陸海焉漢地理志箬楚謂竹皮曰箬説文籜竹皮也字書竹花曰華草本草萬個竹竿萬個貨殖傳竹曰個木曰枚釋名竹性愛向西南引故園東北角種之數歲之後自當滿園諺云東家種竹西家治地為滋蔓而來生也其居東北角者老竹種不生亦不能滋茂故須取西南引少根也齊民要術高陽氏有同産而為夫婦者帝怒放之於是相抱而死有神鳥以不死竹覆之七年男女皆活同頸異頭共身四足是為蒙雙民外國圖大荒之中附禺之山帝顓頊與九嬪葬焉爰有鳥獸瑤碧皆出衛于山在其山邊丘方圓三百里丘南帝俊舜竹林在焉大可為舟山經竹譜云員丘帝竹一節為船舫廣文初學作衛丘山俱誤贊寧笱譜作衛於山更誤湘水去岸三十許里有相思宮望帝臺舜南巡不返歿葬於蒼梧之野堯之二女娥黃女英追之不及相思慟哭淚下沾竹文悉為之斑斑然述異記禹殺共工臣相繇二臣膏流為水其處腥臊不植五穀禹三堙沮尋竹生焉在崑崙之北有嶽之山山經東海畔孤竹生焉斬而復生中為舟武王時孤竹人獻笋一株述異記衛有淇園出竹在淇水之上詩曰瞻彼淇澳緑竹猗猗上淇園殷紂竹箭園也見班彪志竹譜武帝時河決上使發卒數萬人塞瓠子河下淇園之竹以為楗漢書烏號之弓貫淇衛之箭也淮南南山子路見孔子子曰君子可不學子路曰南山有竹不揉自直斬而用之達於犀革以此言之何學之有子曰括而羽之鏃而礪之其入之不亦深乎家語斬竹齊景公樹竹令吏守之公守過之有斬竹者拘之將加罪焉晏子曰君聞吾先君丁公乎公曰何如對曰丁公伐曲城勝之止其財出其財出其民有與死人以出者公怪之令視之則其中有金玉焉吏請殺其人丁公曰以兵攻城以衆圖財不仁且君人者寬惠慈衆身不妄誅令吏舍之公曰善令出斬竹之囚舍之晏子越王竹根生石上若細荻高尺餘南海有之南人愛其青色用為酒籌云越王棄餘算而生竹南方草木狀次有沙筯産于海島間其心若骨可為籌筯凡欲采者須輕步從之不爾聞人行聲則縮入沙中了不可取北戶録晉安有越王餘算菜白者似骨黑者似角異苑符竹葉峽州玉泉鬼谷子洞前有叢竹竹葉有文成符葉葉不同佩之可以辟患宋陳曄日華瑣碎録張騫至大夏見蜀布卭竹杖問之云賈人市之身毒國因説武事西南夷以通漢書張騫奉使尋河源得高節竹植于卭山今緣領皆是堪為杖號曰卭竹杖蜀記笻竹高節實中狀若人剡俗謂之扶老竹竹譜卭竹本出卭山張騫西至大夏所見也而此山左右時有之鄉老多以為杖羅浮山記龜山多扶竹即笻竹山經孝竹詩義云南中生子母竹今慈竹是也漢章帝三年子母竹筍生白虎殿前時謂之孝竹群臣作孝竹頌述異記蔡雍避難宿于會稽高遷亭見屋椽竹從東間數第十六可以為笛取用果有異聲文士傳會稽記千秋亭一名柯亭郡國志一云高遷亭寰宇記有竹王者興於遁水有一女浣於水濱有三節大竹流入女足間推之不去聞有兒聲持歸破竹得男長養有武才遂雄夷狄氏竹為姓所破竹於野成林今王祠竹林是也華陽國志吳褚瑤字孔珽為烏傷令罷去單船而歸故人太子中庶子羊衜乞土宜瑤乃抽船上竹一竿與之曰東南之美惟竹箭最真而有節幸堪歲寒羊衜密令人視之舟中惟竹笠一枚蘆襏數領遂啓用瑤為昭信中郎篃亦箘徒是箭竹類一尺數節葉大如履可以作蓬亦中作矢其筍冬生廣志云魏時漢中太守王圖每冬獻筍俗謂之𥱙笴北土寒冰至冬地凍竹根類淺故不能植唯𥱙根深故能晚生竹譜王子猷嘗暫寄人空宅住便令種竹或謂暫住何煩爾王嘯詠良久直指竹曰何可一日無此君世説徑造竹下王子猷嘗行過吳中見一士夫家極有好竹主已知子猷當往乃灑掃施設在聽事坐相待王肩輿徑造竹下諷嘯良久主已失望猶冀還當通遂直欲出門主人大不堪便令左右閉門不聽出王更以此入主人乃留坐盡歡而去上樂成張豸者隱居頤志家有苦竹數十頃在竹中為屋常居其中王右軍聞而造之豸逃避竹中不與相見郡號為竹中高士永嘉郡記雉頭蛇身大元中汝南人入山伐木見一竹蛇形已成上枝葉如故吳郡桐廬人少嘗伐除遺竹一宿竿雉頭已盡就蛇身猶未變此亦竹為蛇為雉也異苑宋袁粲為丹陽尹郡南一家頗有竹石粲率爾步往不通主人直造竹所嘯詠自得主人出語笑款然俄而車騎羽儀併至門方知是袁尹南史宋郭仲産為南郡從事宅在枇杷寺南其村亦名枇杷元嘉末起齋屋以竹為窗櫺竹遂漸生枝葉長數丈扶踈蔥翠鬱然成林仲産以為祥及孝建中同義宣之謀被誅渚宮故事述異記南齊南海王子罕字雲華武帝子也其母樂容華嘗寢疾子罕晝夜祈禱于時以竹為燈纘其燈照曜訖夜極明此纘經宿枝葉茂盛母病尋愈咸以為孝感所致主簿劉鬷侍讀賀子喬為之賦頌當時以為美談南史竹林堂竹林堂宋臨川王羲慶所作梁元帝因而修之堂前有竹名桂竹郭璞云桂竹出始興桂陽縣來風防露上合下踈每日出羅紈金翠春光秋月隔林而望若花開也其西有篠爾雅篠箭冬月抽笋似桂而辛隆暑赫曦但有涼氣入其下者咸以御風寰宇記蘇良嗣為荊州長史高宗使中官緣江採異竹植于苑內中官科船載竹所在縱暴還過荊州良嗣囚之上疏切諫高宗謂則天曰吾約束不嚴整果為良嗣所怪下詔慰喻便令棄竹于江中唐新語枯死後漢襄楷云國中竹柏枯者不出三年人主當之人家竹花枯死者家長當之開元二年終南山竹開花結子綿亘山谷大小如麥其歲大飢其竹並枯死嶺南亦然人取而食之四年而太上皇崩僉載太液池岸有竹數十叢牙笋未嘗相離密密如栽也帝因與諸王間步于竹間謂諸王曰人世父子兄弟尚有離心離德此竹宗本不相踈有人懷二心生離間之意覩此可以為鑒諸王皆唯唯帝呼為竹義貞元五年秋番禺有海戶犯鹽禁者避罪於羅浮山深入至第十三嶺遇巨竹百千萬竿連亘巖谷竹圍二十一尺有三十九節節長二丈即由梧類也海戶因破之為篾會罷吏捕逐遂挈而歸時有軍人獲一篾以為奇者後獻於刺史李復復命陸子羽圖而記之舊記云李公顧謂門生廣州桑苧翁曰夫視聽之外經籍未録不合有而有者不知其極况茲竹載在圖記不足奇也許慎説文有長節竹謂之䇗得非羅浮山之義耶北戶鄜延長吏有大竹凌雲可三四圍伐剖之見內有二仙翁對云平生深根徑節惜為主人所伐言畢乘雲而去幽怪録報平安李衛公守北都惟童子寺有竹一窠才長數尺相傳令其寺綱維每日報平安酉陽規方李衛公罷鎮浙右遊甘露寺有老僧者熟于祇接談話多空教所長李以大宛所遺笻竹杖贈別其杖雖竹而方所持向上節眼鬚牙四面對出李所寶也後再領朱方到院問柱杖何在則老僧規圓而漆之矣公嗟嘆再彌日桂苑叢談澄州産方竹其隔州亦出大者數丈北戶僧玄燭曾寓天台國清寺與同學尋山川旬日至一溪夾岸翠竹數百竿皆三尺圍玄燭伐得竹五六截凡遇樹木皆斫成文用記後來數日再遊竟尋不得斫樹之文亦皆迷沒其竹俱可桶子葆光録爆竹辟妖氣李畋鄰人有仲叟家為山魈所祟擲瓦石開戶牖不自安叟求禱之以佛經報謝而妖祟彌盛畋謂其叟曰翁旦夜于庭落中若除夕爆竹數十竿叟然其言爆竹至曉寂然安帖遂止該聞録或問鬼所惡答云最惡金姑聲閩人謂破竹聲為金姑聲海録鬼神門舊稱竹實鸞鳳所食今近道竹間時見開花小白如棗花亦結實如小麥子無氣味而澀江浙人號為竹珠以為荒年之兆及其竹即死信非鸞鳳之所食也近有江南餘千人來言彼有竹實大如雞子竹葉層層包裹味甘勝蜜食之令人心膈清涼生深竹林茂盛蒙密處頃因得之但日久汁枯乾而味尚存耳因知鸞鳳之食必非常物也該聞録張堂云同邑安福西鄉周俊叔家嘗得十二時竹一根植之家庭歷有十餘年笋而竹者才三竹繞節凸生子丑寅卯辰巳午未申酉戌亥十二字點盡可數暘谷漫録紹興中四明有巨商泛海沮風抵一山下因攀躡而登至絶頂有梵宮焉商入見一僧獨坐禪榻窗外竹數箇幹葉如丹商堅求得一二竿持還就舟中截之為杖每以刀鍥削輒隨刃有光心異之前至一國偶攜其杖登岸有老叟以簞珠易之因謂商曰君親至補陀落伽山此觀音坐後旃檀林紫竹也商驚悔歸舟取削棄餘札寶藏之有久病醫藥無效者取竹煎湯飲之輒愈陳仲謨知録説暌車志蓬山有浮筠之簳葉青莖紫子如大珠有青鸞集其上下有砂礰細如粉暴風至竹條翻起拂細砂如雪霰仙者來觀戲焉風吹竹折聲如鐘磬之音拾遺記岑華山在西海之西有蔓竹為簫管吹之若群鳳之鳴上金門金門之竹可以為律管金門山名在福昌縣九州記宜陽縣金門山竹以為律管河內葭以為灰可以候氣焉物理論魯郡鄒山有篠形色不殊質特堅潤宜為笙管諸方莫及也笙賦所謂鄒山大竹嶧陽孤桐此山竹特能貞絶也竹譜笙賦鄒魯之珍有汶陽之孤篠焉此云大竹孤桐誤簫幹慈母山竹作簫笛有妙聲江圖江寧縣南慈母山積石臨江生簫管竹王褒洞簫賦云於江南之丘墟即此處也其竹圓緻異於餘處自伶倫採竹嶰谷其後唯此簳見珍故歷代常給樂府而俗呼曰鼓吹山今慈胡戌常禁之丹陽記永昌有漢竹圍三尺餘大者一節受一斛小者數升為椑榼廣志吳王聞越王盡心自守因賜之以書增之以封越王乃使大夫種索葛布十萬狐皮五雙晉竹十廋以答封禮吳越為船雲母竹一節為船出扶南南方草木狀節竹一名太極長百丈南方以為船神異經南方荒中有竹其長百丈圍三丈五六尺厚八九寸以為船其子美食之可以已瘡癘上嶺南峰州糞泠縣有大竹數圍實中任屋梁柱覆用之則當瓦南征八郡志由梧竹吏民家種之長三四丈圍一尺八九寸作屋柱出交趾南方草物狀有竹曰䈏其大數圍節間相去局促節中實滿堅強以為屋榱斷截便以為棟梁不復加斤斧也異物志䈏實厚肥孔小幾於實中安成以南有之竹譜少室之山大竹堪為釜甑孝經河圖雲南有實心竹文采班駮殊好可為器物其土以為槍幹交床雲南記𥯨簩竹皮薄而空多大者徑不逾二寸皮上有粗澀文可以為錯子錯甲利勝於鐵若鈍以漿水洗之還復快利嶺表録異石林竹似桂竹徑而利削為刀割象皮如切芋出九真交趾南方草木狀林一作麻竹大如腳指堅厚修直腹中白幕闌隔狀如濕麵生衣將成竹而筍皮未落輒有細蟲齧之隕籜之後蟲齧處往往成赤文頗似繡畫可愛肅肅畟畟南康所生見沈志也竹譜箛築竹生于漢陽內實外澤時獻以為輅馬策見南郡賦上桂竹雲山有桂竹甚毒傷人必死山經桂竹高四五丈大者二尺圍闊節大葉狀如甘竹而皮赤南康以南所饒也竹譜桃枝竹皮赤編之滑徑可以為席顧命篇所謂篾席者也上嶓冢之山其上多桃枝鉤端山經紅竹出峽州宜都縣飛魚口大者不過寸許鮮明可愛續竹譜篔簹竹生水邊長數丈圍一尺五六寸一節相去六七尺或去一丈廬陵界有之異物志建安有篔簹竹節中有人長尺許頭足皆具異苑王彪之閩中賦竹則篔簹涵人桃枝育蟲篔簹竹節中有物長數寸正似世人形俗説相傳云竹人時有得者育蟲謂竹飀竹中皆有耳齊民篔簹竹堪作甑竹譜羅浮山生竹皆大七八圍節長一二丈謂之龍鍾竹南越志常有鳳鸞棲宿食其實山東有溪曰羅陽永泰中暑雨漲有一竹葉若芭蕉葉大隨水出羅浮山記杜寄高適岑參詩云何太龍鍾極於今出處妨薛蒼舒注按廣韻龍鍾竹名世言龍鍾謂其年老如竹之枝葉搖曳不自矜持取此義集此南裔異物人所希見者安得以年老取此義耶注杜者欺己誣人大率類此後記事珠等書遂據為故實更誤竹譜云籦龍竹名黃帝使伶倫伐之於崑崙之墟吹以應律按呂氏古樂云伶倫自大夏之西乃之阮隃之陰取竹于嶰溪之谷不云崑崙漢志云伶倫自大夏之西崑崙之陰取竹之嶰谷亦不云籦龍馬融笛賦云惟籠籦之奇生于終南之陰崖亦不云崑崙不知凱之何據而云伶倫所伐初學記引之似誤韻會云籠籦竹名吳都賦竹則籦籠注伶倫吹以為律選無此句蓋誤引竹譜耳籃箊籃箊葉薄而廣越女試劍竹是也竹譜吳筠賦序云廣漢山中有竹名慈竹生必內向示不離本修莖巨葉欑根沓柢叢之大者或至千百株焉而縈結踰乎咫步好事者徙為階庭之玩英華月竹蜀嘉定産月竹每月生笋始興郡桂陽縣出筀竹大者圍二尺長四丈又交趾有篥竹實中徑強有毒鋭以刺虎中之則死山經注棘竹棘竹生交州諸郡叢生初有數十莖大者二尺圍肉至厚幾於實中夷人破以為弓枝節皆有刺彼人種以為城卒不可攻萬震異物志所謂種為藩落阻過層墉者也或卒崩倒根出大如十石物從橫相承狀如繅車一名䇼竹見三蒼笋味落人鬚髮竹譜其竹一邊青一畔二色相映可愛筍萌可食出成都孟詠據蜀作對青竹亭焉筍譜弓竹如藤其節郗曲生多臥土立則依木長幾百尋狀若相續質雖含文須膏乃縟竹譜弓竹似筋藤班駁如玳瑁薛翊異物志謝靈運山居賦云其竹則二箭殊葉四苦齊味注云二箭一者苦箭大葉一者笄箭細葉宋書安思縣多苦竹竹之醜有四有青苦者白苦者紫苦者黃苦者要術電斑雷州土貢電斑竹地理志高潘州有踈節竹五六尺一節僧道多以為杖又溱州通竹直上無節空心也北戶録篁竹堅而促節體圓而質堅皮白如霜粉大者宜行船細者為笛篁見三蒼竹譜樂毅書薊丘之植植于汶篁史記初篁苞緑籜謝靈運詩風篁成韻月賦修篁壯下屬徐敬業詩廣新州石城狹隘宋紹興中州守黃濟植竻竹圍繞之竹有刺芒棘森然羔豚不能入志合歡竹出南嶽下諸州山溪間郴州最多其筍初生合歡形勢及成竹也或三莖合或兩莖合斷其間有竅三稜竹狀若棕櫚葉莖柄三脊然筍細初抽川中人家竹林中忽有云吉兆也䈽竹竹之良者惟有䈽竹謝靈運所遊之澗今在鴈蕩其自死筍則謂之仙人杖通志靈運遊名山志云神子溪南山與七里山分流去斤竹澗數里又有從斤竹澗越嶺溪行詩此云䈽竹似誤解賓王作利漕將代還凡有行衙所在竹皆伐賣之時人呼為解子猷雜志儋州滔沿井與淪水通有人以竹置井口淪水得之儋人呼竹為滔沿因以為名郡國志種竹者多用辰日又用臘月惟五月十三日人謂之竹醉日又謂之竹迷日栽竹多茂盛或陰雨則鞭竹明年笋莖交出藝苑雌黃竹有雌雄雌者多筍故種竹常擇雌者物凡欲識雌雄當自根上第一枝觀之有雙枝者為雌即出筍若獨枝者是雄竹耳志林唐言杖林其林修徑被滿山谷先有婆羅門聞釋迦佛身長丈六常懷疑惑未之信也乃以丈六竹杖欲量佛身恆於丈端出過丈六如是增高莫能窮實遂投杖而去因植根焉西域記竹肉江淮有竹肉生節上如彈丸味如白樹雞酉陽竹萌筍竹萌也爾雅筍竹胎也箈竹萌也説文箈苴鴈醢鄭注箈箭萌越駱菌和之美者越駱之菌注云越駱山名菌竹筍也呂覽馬援好事至荔浦見冬筍名苞筍上言禹貢厥包橘柚疑謂是也其味美于春夏筍東觀漢記孟宗字恭武至孝母嗜筍冬節將至時笋尚未生宗入竹林哀歎而笋為之出得以供母皆以為至孝所感楚國先賢傳吳丁固晉劉殷孟蜀程崇雅事同漢人有適吳吳人設笋問是何物曰竹也歸煮其床簀而不熟乃謂其妻曰吳人轣轆欺我如此笑林希見食筍歸煮竹根唐子鬻筍辛居士名宣仲家貧春月鬻筍充腸酌截竹為瞿用充盛酒人問其故宣仲曰我惟愛竹好酒欲令二物常相並耳南雍州記處州宣平響巖之東有盧棲溪溪上巖洞甚奇唐道士盧敖棲其中故名盧棲巖竹每無風自動拂除巖石人以為奇其筍味嘉人號曰盧棲筍浙江志唐夏侯彪為益州新昌令問里胥曰筍一莖幾錢曰一錢五莖取十千買五萬莖謂之曰吾未要且寄林中養之至秋竹成一竿十文遂成五十萬僉載吉安城有魏夫人壇夫人煉丹時有村嫗屢以茶獻夫人感其意遂拔簪插于籬下曰年年四月盡當生笋可供汝家食饌次年其地笋生朱甘而無根苗鄉人名曰填補笋至今有之夷堅續志園人云笋惟初出者盡成竹次者多為蟲所傷十不得五六玉簡雜書詩義疏笋皆四月生笆竹笋八月生篃竹笋冬夏生永嘉記含墮竹笋六月生竹譜棘竹落人鬚髮湘源縣十二月食斑皮竹笋滋味與北中七八月笋牙小類但甜脆過之諸笋無以及也北戶録匾竹出廬山莖匾傳云釋惠遠使鬼神號辟蛇行者捻此竹為匾竹筍出皆匾堪食之筍譜般腸實中與笆相類生東郡緣海諸山中其筍甚美云與笆竹相似出閩中竹譜浮筍浮竹長者六十尺肉厚而虛軟節闊而亞生水次彭蠡以南大嶺以北遍有之其筍未出時掘取以甜糟藏之極甘脆南人所重上雞脛篁竹之類纖細大者不過如指踈葉黃皮其肌無所堪施筍美青班色緑沿江山岡所饒也竹譜雞脛竹筍肥美筍譜雍管有鹿頭笋范旻雍管記築陽薤山有孤竹三年而生一笋笋成代謝常如一荊州圖思摩竹如竹大而筍生其節筍既成竹春而筍復生節焉交廣所在有之南方草木狀夢筍夢折笋得財象也夢竹生筍者欲有子息也李淳風占夢書笋竹之白蒻也竹之醜節種厥性弱於木而強於草實草木中別類也笋譜初篁初始也篁竹也梁簡文勉春賦云望初篁之傍領愛新荷之發池笋譜按謝靈運湖中瞻眺詩初篁苞緑籜新蒲含紫茸諺曰臘月煮筍羹大人道便是昔有新婦不得舅姑意凡所須索必昔時而逆意其婦善承須不違所要皆巧圖與夫求變而副舅姑無以取責姑一日歲暮而索筍羹婦答即煮供上妯娌問之曰今臘月中何處求筍婦曰且譍為貴以順攘逆責耳其實何處求筍姑聞而後悔倍憐新婦故又諺曰恭敬不如從命受訓莫如從順上冉冉冉冉孤生竹古詩檀欒檀欒蔭修竹和八公山詩嬋娟蔭修竹之嬋娟嘯賦有㛹娟之茂篠寄江上而叢生玉潤桃枝之麗魚腸雲母之名梁文帝修竹賦牡丹前史中無説處唯謝康樂集中言竹間水際多牡丹成式檢隋朝種植法七十卷中初不記説牡丹則知隋朝花中所無酉陽世謂牡丹花近有蓋以前朝文士集中無牡丹歌詩然楊子華有畫牡丹處極分明子華北齊人則知牡丹花亦久矣劉賓客嘉話煬帝闢地二百里為西苑詔天下進花卉易州進二十相牡丹赭紅鞓紅飛來紅袁家紅醉妃紅雲紅天外紅一拂黃軟條黃延安黃先春紅顫風嬌等名海記按假云隋朝所無而劉斧乃有此説其杜撰欺人往往如此高承事物紀原似據之以為實者其亦為所誤矣高宗後苑宴群臣賞雙頭牡丹賦詩惟上官昭容一聯絶麗所謂勢如連璧友心似臭蘭人武后冬月遊后苑花俱開而牡丹獨遲遂貶于洛陽故今言牡丹者以西洛為冠首事物紀原開言禁中重木芍藥得數本紅紫淺紅通白者上因移植于興慶池東沉香亭前會花方繁開上乘照夜白妃以步輦從乃命李龜年持金花箋宣賜李白進清平調詞三首上命梨園子弟歌之太貞外傳松窗雜録禁中呼木芍藥為牡丹開元花木記通志略云芍藥著于三代之際風雅所流詠也今人貴牡丹而賤芍藥不言牡丹初無名依芍藥得名故其初曰木芍藥亦如木芙蓉之依芙蓉以為名也牡丹晚出唐始有聞貴遊競趍遂使芍藥為落譜衰宗云按神農本草云一名鹿韭一名鼠姑唐本注云亦名百兩餘博雅白茉牡丹也而康樂所云竹間水際子華有畫極分明何云至唐始著耶花妖初有木芍藥植于庭前其花一日忽開一枝兩頭朝則深紅午則深碧暮則深黃夜則粉白晝夜之內香艷各異帝謂左右曰此花木之妖不足訝也開元遺事明皇與妃子幸華清宮因宿酒初醒憑妃子肩同看木芍藥帝親折一枝與妃子遞嗅其艷帝曰不惟萱草忘憂此花香艷尤能醒酒天寶遺事楊國忠初以貴妃專寵上賜以木芍藥數本植于家園忠以百寶粧飾欄楯雖帝宮之內不可及也楊國忠用沉香為閣檀香為欄以麝香乳香篩土和為泥飾壁每于春時木芍藥盛開之際聚賓友于此閣上賞花焉禁中沉香之亭遠不侔此壯麗也宮中牡丹品最上者御衣黃次曰甘草黃次曰建安黃次皆紅紫各有佳名終不出三花之上他日宮中貢一尺黃乃山下民王文仲所接也花面幾一尺高數寸祗開一朵絳幃籠護之帝未及賞會為鹿銜去帝以為不祥有佞人奏云釋氏有鹿銜花以獻金仙帝私曰野鹿遊宮中非佳兆也殊不知應祿山之亂青瑣高議開元末裴士淹為郎官奉使幽冀過汾州衆香寺得一株白牡丹移置長安私第天寶中為都城奇賞當時名士裴給事看牡丹詩又房琯有言牡丹之會琯不與焉至德中馬僕射總鎮太原又得紅紫二色者今則至多與戎葵比矣興唐寺昔有一株開花一千朵有正暈側暈紅紫黃白之色各不同酉陽洛人宋單父字仲孺善吟詩亦能工藝術凡牡丹變易千種紅白鬭色人亦不能知其術上皇召至驪山植花萬本色樣各不同賜金千餘兩內人皆呼為花師亦幻世之絶藝也龍城録異人録斸牡丹長安貴遊尚牡丹三十餘年每春暮車馬若狂以不就玩為恥人種以求利一本有數萬者元和末韓弘罷宣武節制始至長安私第有花命斸之曰吾豈效兒女輩耶國史補自從韓令功成後辜負穠華過此身羅隱長安興善寺素師院牡丹色絶佳元和末一枝花合歡酉陽徐仲雅題合歡詩云平分造化中分去折破春風兩面開湘湖近事白樂天初為杭州刺史令訪牡丹花獨開元寺僧惠澄近於京師得之始植於庭欄圈甚密他處未之有也時景方深惠澄設油幕覆牡丹自此東越分而而種之矣會徐凝自富春來不知而先題詩曰此花南地知難種慚愧僧門用意栽海燕解憐頻睥睨胡蜂未識更徘徊虛生芍藥徒勞妬羞殺玫瑰不敢開惟有數苞紅幕在含芳只待舍人來白尋到寺看花乃命徐同醉而歸雲溪友議文宗朝朔方節度使李進賢第階前有牡丹數叢皆覆以錦幄劇談録長安三月五日看牡丹奔走車馬慈恩寺元果院牡丹半月開裴璘題詩于佛殿東頭虛壁之上曰長安豪貴惜春殘爭賞先開紫牡丹別有玉杯承露冷無人肯向月中看太和中文宗自夾城出芙蓉園幸此寺見所題詩吟玩久之因令宮嬪諷念及暮此詩滿六宮矣南部新書尊賢坊田弘正宅中門外有紫牡丹成樹後發千餘朵花盛時每月餘有小人五六長尺餘遊於花上如此七八年人將掩之輒失所在酉陽王蜀號其苑曰宣華權相勳臣競起第宅上下窮極奢麗皆無牡丹惟蜀主舅徐延瓊聞秦州董成村僧院蜀總志有紅牡丹一株所植年代深遠使人取之掘土方丈盛以木匱自秦州至成都三千餘里歷九折七盤望雲九井大小漫天懸險之路方至焉乃植之新第王氏見聞至孟氏於宣華苑廣加栽植名之曰牡丹苑廣政五年牡丹雙開者十黃者白者三紅白相間者四後主宴苑中賞之蜀總志時彭門為輔郡典州者多其戚里得之上苑而彭門花之所始也天彭亦謂之花州而牛心山下謂之花村成都記蜀平花散落民間小東門外有張百花李百花之號皆培子分根種以求利每一本或獲數萬蜀總志洛中舊品獨以姚魏為冠天彭則紅花以狀元紅為第一紫花以紫繡毬為第一黃花以禁苑黃為第一白花以玉樓子為第一上彭門牡丹在蜀為第一承平洛陽花最盛獨彭門有小洛陽之稱成都記宋景文帥蜀以彭門牡丹錦被堆為第一姚黃初出邙山下白司馬坂下姚氏酒寺水北諸寺間有之府中多取以進魏紫出五代魏仁浦樞密園池中島上初出時園吏得錢以小舟載遊人往過他處未有也邵氏聞見録錢仁伉尚父之孫也為元帥府中書檢校司徒與中軍都虞候金沼鄰居沼所居堂東植牡丹花一本著花三百朵其色如血如之金含稜每瓶子頂上有碎金絲如自然蛺蝶之狀一城以為殊異每歲花開張宴仁伉預焉開寶七年春三月才一兩朵開仁伉一夕洪飲擊劍桯服中單背負大籃左手攜籃腰插大匕首踰牆而過沼中外無知者鋤取牡丹置籃中乃平其地空中聞有吁歎之聲微細若遊蜂音辭曰一花三百朵含笑向春風明年三月裏朵朵斷腸紅仁伉異之移植於亭後明日沼覺矣花為非人力所及來年花盛開乃宴召沼沼一見無語得疾以歸至夜憤悶不已以刀決腸而卒腸皆寸寸斷果符空中之語洞微志太祖問罪江南李後主用謀臣計欲興王師法眼禪師觀牡丹於大內作偈諷曰擁毳對芳叢由來趣不同髮從今日白花是去年紅艷曳隨朝露馨香逐晚風何須待零落然後始知空後主不省王師渡江孟蜀時兵部尚書李昊每將牡丹花數枝分遺朋友以興平酥同贈且曰俟花凋卸即以酥煎食之無棄穠艷也東坡詩明日春陰花未老故應未忍著酥煎復齋謾録洛中花工宣和中以藥壅培於白牡丹如玉千葉一百五玉樓春等根下次年花作淺碧色號歐家碧歲貢禁府價在姚黃上嘗賜近臣外庭所未識也墨莊謾録碧花止一品名曰歐碧其花淺碧而開最晚獨出歐氏故以姓著淳熙三年二月桑子河堰東孝里莊園有牡丹一本無種而生明年三月花勝開始知紫牡丹也過者皆往觀之有杭州觀察推官東過通州見花甚愛欲移分一株掘土深尺許見一石如劍長二尺題曰此花瓊島飛來種只許人間老眼看遂不敢移以是鄉老有生旦值花開時必造花下飲酒為壽間亦有約明日造花所而花一夕凋謝者多不吉惟一人李嵩者三月八日初度自八十看花至一百九歲而終如臯志錢思公嘗曰人謂牡丹為花王今姚黃真其王而魏紫乃其后也歐陽永叔花什名兩京牡丹聞于天下花盛時太守作萬花會宴集之所以花為屏帳至于梁棟柱栱悉以竹筒貯水簪花釘挂舉目皆花也墨莊謾録冀王宮花品以五十種分為三等九品潛溪緋平頭紫居正一品姚黃居其下題景祐元年滄州觀察使記僧仲殊越中牡丹花品序云越之所好尚惟牡丹其絶麗者三十二種始乎郡齋豪家名族梵宇道宮池臺水榭植之無間賞花者不問親踈謂之看花局澤國此月多有輕雨微雲謂之養花天里語曰彈琴種花陪酒陪歌丙歲八月十五日移花日序丙雍熙三年也一擫紅者多葉淺紅花葉杪深紅一點如人以三指擫之牡丹記明皇時有獻牡丹者謂之楊家紅乃楊勉家花也命力士將花上貴妃妃方對粧妃用手拈花時勻面脂在手即印于花上帝見之問其故妃以狀對上詔于仙春館栽來歲花開上有脂印紅迹帝賞花驚異其事乃名為一捻紅後樂府中有一捻紅曲青瑣離草芍藥離草也韓詩芍藥有二種有草芍藥木芍藥木者花大而色深俗呼為牡丹非也牛亨問曰將離相別贈以芍藥何也答曰芍藥一名何離故相贈猶相招召贈以文無文無一名當歸古今注七發曰勺藥之醬子虛賦曰勺藥之和具而後御之師古曰勺藥根主和五臟又辟毒氣故合之于蘭桂五味以助諸食因呼五味之和為芍藥耳韋昭曰今人食馬肝馬腸者合芍藥而煮之東坡云揚州芍藥為天下冠蔡繁卿為守始作萬花會用花千餘萬枝既殘諸圉又吏因緣為姦民大病之萬花本洛陽故事錢惟演為留守始置驛貢洛花識者鄙之曰此宮妾愛君之意也漁隱叢話西京進花自李迪相國始日精蘜治蘠爾雅菊有筋菊有白菊黃菊菊花一名節花一名傳公一名延年一名白花一名日精一名更生又曰陰威一名朱周嬴盈一名女花一名女莖其白花者潁川曰回峰汝南曰茶苦蒿河南曰地薇蒿上黨及建安郡曰羊歡草本草日精治蘠皆菊之花莖之別名也生依水邊其華煌煌霜降之時唯此草盛茂九月律中無射俗尚九日而用候時之草也風土記背明國有紫菊謂之日精一莖一蔓延及數畝味甘食者至死不飢渴拾遺記滎陽郡西有靈源山其澗生靈芝石菌巖有紫菊王韶之神境記荊州菊潭其源旁芳菊被涯其滋液極甘馨香谷中有三十餘家不得穿井仰飲此水上壽二三百中壽百餘其七十八十者猶以為夭十道記王子喬變白增年方甘菊三月上寅日採名曰玉英六月上寅日採名曰容成九月上寅日採名曰金精十二月上寅日採名曰長生長生者根莖是也玉函方菊花與薏花相似直以甘苦別之耳菊甘而薏苦所謂苦如薏者也抱朴子永壽漢之好畤也出墨菊其色如墨古用其汁以書見終南山五老洞碑今無蘭一名水香俗呼燕尾香煮水以療風又名香水蘭葉如麥門冬而闊且韌長及一二尺四時常青花黃中間葉上有細紫點有春芳者為春蘭色深秋芳者為秋蘭色淡秋蘭稍難得二蘭移植小檻中置座右花開時滿室盡香與他花香又別本草都梁縣有小山山有淳水既清且淺其中悉生蘭草緑葉紫莖芳風藻谷蘭馨遠馥俗謂蘭為都梁山因以號縣受名焉盛弘之荊州記蘭山蘭山在蜀敘州溪縣界蘭生于深林石門尤多有春蘭秋蘭崇蘭鳳尾蘭竹蘭石蘭春蘭花生于葉之下崇蘭花生于葉之上圖經猗蘭操者孔子所作也孔子聘諸侯莫能任自衛反魯隱谷之中見香蘭獨秀喟然歎曰夫蘭當為王者香今乃獨茂與衆草為伍乃止車援琴鼓之自傷不逢時託辭於香蘭云琴操湛漸曾子將行晏子送之曰君子贈人以軒不若以言吾請以言乎夫蘭本三年而成湛之苦酒則君子不近庶人不珮湛之麋醢而價匹馬矣非蘭本美也所蕩然也願子之必求所湛晏子漸于蘭則芳漸于鮑則臭論語撰考讖傳曰蘭根與白芷漸之滫中君子不近庶人不服者所以漸然也史記燕王旦傳芳蘭當門曹操殺楊修曰芳蘭當門不得不除典略先主殺張裕諸葛亮救之先主曰芳蘭當門不得不鋤蜀志劉湛欲袁淑附已而淑不為改意由是大相乖失淑乃賦詩云種蘭忌當門懷璧莫向楚楚少別玉人門非植蘭所南史羅含致仕還家庭中忽蘭菊叢生人以為德行之感別傳毛玄字伯成既負其才氣常稱寧為蘭摧玉折不作蕭敷艾榮世説梁武帝平建業朝士皆拜謝覽長揖而已意氣間雅武帝目送良久謂徐勉云覺此生芳蘭竟體想謝莊正當如此梁書煬帝在江都昏湎滋深往往為妖祟所惑嘗遊吳公宅雞臺恍惚間與陳後主相遇尚喚帝為殿下後主舞女數十許羅侍左右中一人迥美女帝屢目之後主云即麗華也乃以緑文測海蠡酌紅梁新醞勸帝帝飲之甚歡因請麗華舞玉樹後庭花麗華徐起終一曲後主問帝蕭妃何如此人帝曰春蘭秋菊各一時之秀也隋遺録春蘭秋菊各有時豬零苓桔梗時為帝莊徐無鬼長壽二年裴子餘為鄠縣尉同列李朝隱程行諶皆以文法著稱子餘獨以詞學知名或問雍州長史陳崇業三人優劣孰先崇業曰譬之春蘭秋菊俱不可廢舊唐新同蘭菊異芬胡可廢者語林秋菊春蘭英華靡絶選鄭風士與女方秉蕳兮蕳即蘭香草也春秋傳曰刈蘭而卒楚辭云紉秋蘭孔子云蘭當為王者香草皆是也其莖葉似藥草澤蘭廣而長節節中赤高四五尺漢諸池苑及許昌宮中皆種之可著粉中藏衣著書中辟白魚詩疏離騷曰紉秋蘭以為珮又曰秋蘭兮青青緑葉兮紫莖今沅澧所生花在春則黃在秋則紫然而春黃不若秋紫之芬馥也劉次莊樂府集九畹余既滋蘭之九畹兮又樹蕙之百畝離騷蘭之葉如莎首春則茁其牙長五六寸其杪作一花花甚芳香生深林之中清風過之其香藹然與蕙甚相類其一幹一花而香有餘者蘭一幹五六華而香不足者蕙今野人謂蘭為幽蘭蕙為蕙蘭雅翼薰草蕙草也廣雅一名燕草南越志即零陵香也本草樹蘭兩心不可以得一人一心可以得百人男子樹蘭美而不芳繼子得食肥而不澤情不相與往來也淮南蘭生幽谷不為莫服而不芳君子行義不為莫知而止休上蘭以芳致燒膏以肥見𤋲翠以羽殃身蚌以珠破腹女惡蛾眉士惡勝已由來尚矣意林辟如伊蘭與旃檀生末利山中牛頭旃檀生伊蘭叢中未及長大在地下時牙莖枝葉如閻浮提竹筍衆人不知言此山中純是伊蘭無有旃檀而伊蘭臭臭若胖尸熏四十由旬其華紅色甚可愛樂若有食者發狂而死療愁萱草一名紫萱又名忘憂草吳中書生呼療愁花述異記萱草是今之鹿蔥也名醫別録説文作萱萱萱三字萱草一名宜男婦人懷妊佩其花生男交廣人佩之極有驗然其土為多男不厭女子故不常佩也南方草木狀忘憂神農經曰中藥養性合歡蠲忿萱草忘憂博物志皋蘇什勞萱草忘憂王朗與魏太子書雖萱草在背皋蘇在側悒憤不逞秪以增毒魏應瑒報龐惠公書甘棗令人不惑萱草可以忘憂束晢發蒙記鶴望還信以代萱蘇梁元帝與劉智藏書萱草辨俗謂母為萱堂考之詩云焉得諼草言樹之背願言思伯使我心痗注云背北堂也箋云憂以生疾恐將危身欲忘之是詩既以君子行役而作以忘憂解之極通于母何干預鼠璞願得萱草枝以解飢渴情李陵録別詩積憤成疢痗無萱將如何謝惠連獻康樂詩思君如萱草一見乃忘憂王融和南海王諫秋胡詩銷憂非萱草永懷寄夢寐江文通擬潘黃門悼婦詩始知萋萋萱草忘憂之言不實團團輕扇合歡之用為虛梁何遜為衡山侯與婦書木奇木之奇者會稽之海棠草木記花中神仙唐相賈耽著百花譜以海棠為花中神仙花木録海棠色紅以木瓜頭接之則色白長樂志李贊皇花木記以海為名者悉從海外來惟紫綿色者謂之海棠餘悉棠梨花耳沈立海棠記明皇登沉香亭召太真于時卯醉未醒扶掖而至帝笑曰豈妃子醉是海棠睡未足耳太真外傳徐儉樂道隱于藥肆中家植海棠結巢其上引客登木而飲紺珠集蓮花海棠花中之尤也凡海棠雖艷麗然獨蜀都所産重葉豐腴如小蓮花海棠有色無香惟蜀中昌州海棠花有香其木合抱故昌州號曰海棠香國州治前有香霏閣每花或二十餘葉香氣醲郁花譜同心木芙蓉會稽之百葉木芙蓉鐘陵之同心木芙蓉稽山之四時杜鵑山居草堂記邛州有弄色木芙蓉一日白次日淺紅三日黃四日紅深比落紫色人號文官花楊州后土廟有瓊花與聚仙熟玩有不同者三大而瓣厚其色潔白可愛且其樹大而花繁不知實何木也俗謂之瓊花因賦詩以狀其態劉禹錫詩序楊州后土廟有瓊花宋郊搆亭花側榜曰無雙謂天下無別株也仁宗慶曆中嘗分植禁中明春輒枯遂復載還廟中鬱茂如故聞見雜録德祐乙亥北師至花遂不榮趙棠國炎有絶句弔之曰名擅無雙氣色雄忍將一死報東風他年我若修花史合傳瓊花烈女中山堂隨筆拂簾墜席范縝常稱無佛竟陵王子良曰君不信因果何得富貴貧賤縝曰人生如樹花同發隨風而墜自有拂簾幌墜於茵席之上自有關籬牆落於糞溷之間墜茵席者殿下是也落糞溷者下官是也南史梁元帝竹林堂中多種薔薇康家四出薔薇白馬寺黑薔薇長沙千葉薔薇多品彙並以長格校其上使花葉相連其下有十間花屋仰而望之則枝葉交映迫而察之則芬芳襲人寰宇記洛陽進合蒂迎輦花云得之嵩山塢中人不知名採者異而貢之會帝駕適至因以迎輦名之其花外紫內素粉蘂紅心枝幹甚翠狀類通草其香惹衣移日不散嗅之令不睡帝命袁寶兒持之號曰司花女隋遺録馮慈明勸李寶歸國寶囚之死神龍中勑旌其門為忠臣門令大其標題見者莫不嘆美慈明號為凌霄花御史臺記凌霄花中露水損人目酉陽學士許慎選放曠不拘小節多與親友結宴于花圃中未嘗具帷幄設坐具使僮僕輩聚落花鋪于座下慎選曰吾自有花裀何銷坐具開元遺事諸花少六出者惟梔子花六出陶真白言梔子剪花六出刻房七道其花香甚相傳即西域薝蔔也酉陽蜀孟昹常理花園異花芳草畢集其間一日有青城山叟申迅入內進花兩粒紅梔子種宣令園子種之不覺成樹兩栽其葉婆娑則梔子花矣其花爛紅六出其香襲人蜀主甚愛重之及結梔子則顆大于常者用染則成赭紅色甚妍麗野人間話廣政八年十月召百官宴芳林園賞之蜀杌素馨廣州城西九里曰花田彌望皆植素馨花南征録云南漢劉隱時美人死葬骨於此至今花香異於他處廣東志劉玉女塜在肇慶府陽江縣玉女名素馨死葬于此其墓上生那悉茗花因名素馨廣志陵葬其花舊名那悉茗因生於素馨冢上故名或云隱之女那悉茗那悉茗花末利花皆胡人自西國移植於南海南人憐其芳香競植之陸賈南越行紀曰南越之境五穀無味百花不香此二花特芳香者緣自胡國移至不隨水土而變與夫橘北為枳異矣彼之女子以綵絲穿花心以為首飾南方草木狀末利末利花似薔蘼之白者香愈於那悉茗上豆蔻花其苗如蘆其葉似薑其花作穗嫩葉卷之而生花微紅穗頭深色葉漸舒花漸出舊説此花食之破氣消痰進酒增倍泰康二年交州貢一篚上試之有驗以賜近臣上指甲花其樹高五六尺枝條弱柔葉如嫩榆與那悉茗末利花皆雪白而香不相上下亦胡人自大秦國移置于南海而此花極繁細才如米粒許彼人多折置襟袖間蓋資其馥芬耳一名散沫花南方草木狀金銀花一名鴛鴦草又曰老翁須藤蔓而生黃白花對開傍水依山處處有之食菌中毒者生啖之可解治癰疽腫毒尤妙或服或傳之皆可沈存中良法所載本草名忍冬草墨莊謾録草卉也木謂之華草謂之榮不榮而實者謂之秀榮而不實者謂之英爾雅草盛曰菶木茂曰葆服虔通俗凡生草而初達謂之䓲䓲小也荄杜根也東齊曰杜或曰茇方言黃帝問師曠曰吾欲知歲之苦樂善惡可知不對曰歲欲豐甘草先生甘草薺也歲欲儉苦草先生苦草者葶藶也歲欲惡惡草先生惡草者水藻也歲欲旱旱草先生旱草者蒺莉也歲欲潦潦草先生潦草者蓬也師曠占朱草炎帝教民耒耜百穀滋阜朱草蔓于階拾遺記德至草木朱草生朱草赤草也可以染絳別尊卑也白虎通君乘木而王其政升平則福草生廟中朱草別名禮斗威儀朱草日生一葉至十五日生十五葉十六日一葉落終而復始大戴明堂篇德光地序則朱草生書大傳朱草草之精也世有聖人之德則生宋志黃帝時群瑞畢臻有屈軼之草生于庭佞人入朝則草指之是以佞人不敢進博物志太平之時屈軼生於庭之末右草之狀主指佞人論衡惟袁與薛人中屈軼唐書萐莆萐莆瑞草也堯時生於庖廚扇暑而涼説文萐莆一名倚扇狀如蓬大枝葉小根根如絲轉而成風殺蠅堯時生於廚宋志君和則孳於庖廚潛潭巴一名倚萐倚扇賓閭舜時生於廚瑞應圖東海島龍駒川穆天子養八駿處島中有草名龍芻馬食之日行千里古語云一株龍芻化為龍駒述異記山戎之北有草莖長一丈葉如車輪根大如轂花如朝虹之色齊桓時山戎獻其種乃植于庭以表霸者之瑞拾遺記鄰人謂展禽曰魯聘夫子夫子三黜無憂何也禽曰春風鼓百草敷蔚吾不知其茂秋霜降百草零落吾不知其枯符子不生刺草魯城北孔子塋中不生刺人草木金樓子祖洲上有不死之草人已死三日者以草覆之即活服之令人長生昔秦始皇大苑中多枉死者橫道有鳥如烏狀銜此草覆死人面當時起坐而自活也有司聞奏始皇遣使者齎草以問北郭鬼谷先生鬼谷先生云此草是東海祖洲上有不死之草生瓊田中或名為養神芝其葉似菰苗叢生一株可活一人始皇乃使使者徐福發童男童女入海採之十洲記夫草之精秀者為英獸之特群者為雄故人之文武茂異取名於此是謂聰明秀出謂之英膽力過人謂之雄聰能謀始明能見機膽能決之然後可以為英張良是也氣力過人勇能行之智足斷事乃可以為雄韓信是也人物志有夢草似蒲色紅晝縮入地夜則出亦名懷草懷其葉則知夢之吉凶立驗也帝思李夫人之容不可得朔乃獻一枝帝懷之夜果夢夫人因改曰懷夢草洞冥記有五味草初生味甘花時味酸食之使人不眠名曰却睡草武帝時多末國獻此草上桂林有睡草見之則令人睡一名醉草亦呼懶婦針出南海也述異記宵明宣帝時背明國貢宵明草夜視如列燭晝則無光自消滅也有黃渠草映日如火其堅勒若金食者焚身不熱有聞遐草服者耳聰香如桂莖如蘭拾遺記鄭司農常居不其城南山中教授黃巾亂乃避遣生徒崔琰王經諸賢於此揮涕而散所居山下草如薤葉長尺餘堅勒異常土人呼為康成書帶草三齊略記魏明時苑中有合歡草狀如蓍一株百莖晝則衆條扶踈夜則合為一莖萬不遺一謂之神草拾遺記吉利草其莖如金叉股形類石斛根類芍藥交廣俚俗多蓄蠱毒惟此草解之極驗吳黃武中江夏李俁以罪徙合浦始入境遇毒其奴吉利者偶得是草與俁服遂解吉利即遁去不知所之俁因此濟人不知其數遂以吉利為名草木狀武當縣石階山西北角有大松樹樹下生草名救窮冬夏不枯日食三寸絶穀不飢登之度世陶先生謂之西嶽佐命是也福地記興慶池南岸有草數叢葉紫而心殷有一人醉過于草傍不覺失其酒態後有醉者摘草嗅之立然醒悟故目為醒醉草天寶遺事神草芝神草也芝為瑞服之神仙故曰神草説文芝生于土土氣和故芝草生論衡王者慈仁則芝生採食之則延年不終與真人同古瑞命記三秀芝一歲三華瑞草一名菌爾雅采三秀兮於山間九歌冀一年之三秀思玄賦煌煌靈芝一年三秀嵇叔夜詩山川雲雨五行四時陰陽晝夜之精以生五色神芝皆為聖王休祥焉神農芝論飲六醴之清液兮食五芝之茂英馮涓志賦五芝含秀而晨敷天台賦青芝曰龍芝赤芝曰丹芝黃芝曰金芝白芝曰玉芝黑芝曰玄芝紫芝曰木芝本草赤者如珊瑚白者如截肪黑者如澤漆青者如翠羽黃者如紫金而皆光明洞徹如堅冰也晦夜去之二三百步便望見其光矣抱朴子元封二年甘泉宮産芝有九莖金色六葉朱實夜有光乃作芝房之歌神爵元年金芝九莖産于函德殿銅池中銅池承霤也漢舊儀甘美歌美函德書奇大真紅芝西王母云仙之上藥有大真紅芝草漢武內傳建初三年零陵泉陵女子傳寧宅土中忽生芝草五本長者尺四五寸短者七八寸莖葉紫色蓋紫芝也太守沈酆遣門下掾衍盛奉獻皇帝悅懌賜錢衣食詔以芝告示天下論衡章帝元和二年芝生沛如人冠又生章武如人抱三子狀建初五年芝出潁川常以六月中生一葉五歲五重春青夏紫秋白冬黑色十月後黃氣出上尺五寸古今注魏青龍元年神芝生長平芝習陽其色紫彤上別為三幹分為九枝散為三十六莖有似珊瑚之形繆襲贊曰煌煌紫芝吐葩揚榮曩披其圖今握其形藝文蔡誕求仙三年飢凍還家欺家云吾為老君守視班龍與諸仙博戲忽輸此龍為此罪見責送吾付崑崙山下藝鋤芝草三四頃並皆生細石中多荒穢治之勤苦不可論法當十年乃得原會偓佺子王喬諸仙來按行吾守請之並為吾作力且自放歸當更自修理求去抱朴子崔希喬以孝友稱丁內憂哀毀過禮為鄭縣丞芝草生所居堂一宿而葩蓋盈尺唐新語肅宗上元二年七月甲辰延英殿御座梁上生玉芝一莖三花親製玉靈芝詩三章章八句會要貞元中甌越隱者王遇芝産丹竈前逾用病卒齊映別業生芝草數月中書去世餘姚守盧從芝生屋梁狀若樓臺其歲盧為叛將栗鍠所害置遺骸梁下一品集榻下生仁宗降誕章懿后榻下生靈芝一本四十二葉以應享國四十二年之瑞云邵氏聞見后録政和中宗室士頓所居鈍軒忽生白芝數本于梁棟上因賜名芝軒賓客詠歌以為和氣次年士頓死王黼賜第有白芝生于正寢附臥榻後屏風而出又一本在廳事照壁上隔六年而黼誅宣政雜録宣和間王將明賜第既而以梁生芝草為奏車駕臨幸適久雨梅潤芝墜地京師無名子有為十七字詩曰相公新賜第梁上生芝草為甚脫下來膠少古今詩話名山生神芝不死之草上芝為車馬形中芝為人形下芝為六畜形博物志仙都有芝圃悉種靈芝或如車騎或如華蓋或如樓閣或如飛鳥五色廣異記芝田崑崙山九層有芝田蕙圃群仙種耨焉拾遺記菖葉耕獲冬至五旬七日菖始生菖者草之先生者也於是始耕呂覽玉衡星散為菖蒲遠雅頌著倡優則玉衡不明菖蒲冠環運斗樞醢人朝事之豆其實有昌本麋臡鄭玄云昌本昌蒲根切之四寸為菹周禮蘭蓀菖蒲一名堯韭一名昌陽吳氏本草世又謂之蘭蓀衍義益聰菖蒲益聰援神契菖蒲放花人得食之長年風俗通聖功濟天下者堯也天降精于庭為薤感百陰為菖蒲焉典術嗜葅屈到嗜芰文王嗜菖蒲葅非正味也韓十六饗有菖歜王使周公閲來聘饗有菖歜左服韓衆服菖蒲十三年身上生毛日視書萬言皆誦之冬袒不寒抱朴子漢武帝上嵩山忽見仙人長可二丈問之曰吾九嶷山人也聞中嶽有石上菖蒲一寸九節食之長生故來採之忽然不見內傳熙安縣東北有菖蒲澗盤石上水從上過味甘冷異于常流廣州記澗昔交州刺史陸胤之所開也至今重之每旦輒傾州連汲以充日用雖有井泉不足食大元中襄陽羅友纍石澗側容百許人坐遊之者以為洗心之域咸安中姚成甫嘗採菊澗側遇一丈夫謂成甫曰此澗菖蒲昔安期生所餌可以忘老於是徊翔俯仰倏然不知所終蓋仙者焉南越志生花兆禍永元中御刀黃文濟家齋前種菖蒲忽生花光影照壁成五采其兒見之餘人不見也少時文濟被殺南齊志梁太祖后張氏嘗於室內忽見庭前菖蒲生花光彩照灼非世中所有後驚視謂侍者曰汝見不曰不見后曰嘗聞見者當富貴因遽取吞之是月産武帝孝文帝南巡至新野臨潭水而見菖蒲花乃歌曰兩菖蒲新野樂遂為建兩菖蒲寺以美之後魏典略瑞蒲吳興德清有沈姓者其宅傍有潭水涯忽産蒲葉長幾尋仞俗以為異遇重午爭來斬其葉以辟瘟臘其根以入藥遂表蒲以為瑞因名潭為瑞蒲潭西吳記苔蘚空室無人行則生或紫或青一名員蘚一名緑錢一名緑蘚一名緑苔古今注苔錢亦謂之澤葵又名連錢草亦呼為員蘚南人呼為垢草述異記一名昔邪一名烏韭一名垣嬴一名天韭一名鼠韭在屋曰屋遊瓦苔在石上謂之烏韭在地上謂之地衣在井中謂之井中苔在牆垣則謂之垣衣土馬騣澤中石上謂之陟釐浮水中者名苔本草藫石衣也爾雅苔水衣也説文石髮石衣也廣雅石髮水衣也青緑色皆生於石也風土記海藻一名海苔或曰海羅南越志晉梁國獻蔓金苔色如金若螢火之聚大如雞卵投之水中蔓延波瀾之上光出照日皆如火生水上也乃於宮中穿池廣百步時時觀此苔以樂宮人宮人有幸者則以金苔賜之以置漆碗中照耀滿室名曰夜明苔著衣襟則如火光矣拾遺記菭華殿塵兮玉階菭菭水氣所生也漢婕妤賦萍一名䓑大者名蘋江東謂之薸一名水花一名水白一名水蘚一名水簾一名芣菜本草世説楊花入水化為浮萍崑崙菜之美者崑崙之萍焉呂覽漢武昆明池中有水網藻枝橫側水上長八九尺有似網目鳧鴨入此草中皆不得出因名之酉陽宋文帝為宜都王臨川人獻王萍實六子大者如升小者如鶴卵圓而赤初莫有識者以問長史王華曰此萍實也宣尼所謂王者之應宋祚當卜年六百頃之宜都王即位祚終於六十矣渚宮故事少陘之山有草焉名曰𦱌草葉狀如葵而赤莖白華實如櫻薁食之不愚山經薲草崑崙之丘有草焉名曰薲草其狀如葵其味如蔥食之已勞上玉紅尸子赤縣洲為崑崙之墟其東則水島山左右玉紅之草生焉食其一實醉臥三百歲文樞鏡要壽榮草出少室金山丘下服之令人不老取葉服之可通百神典餌玉長生草一名通天價值千金陰乾方寸七日再服之令人得仙上君子國民帶劍使兩文虎衣野絲土方千里多薰華之草好讓故為君子國薰草朝生夕死大極山西有采華之草服之乃通萬里之言括地圖永州之野有香茅芬馥數里貢以縮酒蓋禹貢荊州所貢而楚包茅不入即此也山川記芒茅枯時瘴疫大作交廣皆爾也土人呼曰黃茅瘴又曰黃芒瘴草木狀護門常山北草名護門置諸門上夜有人過輒叱之廣州草有大千金小千金守房郎千里回萬里憶寰宇記媚草鶴子草蔓生也其花麴塵色淺紫蒂葉如柳而短當夏開花南人云是媚草甚神可比懷草夢芝採之曝乾以代面黛形如飛鶴狀翅嘴距無不畢備北戶録南丹山中産相憐草媚藥也或有所矚密以草少許擲之草必著其身不脫彼必將從而不舍嘗得試輒驗癸辛雜志天中記卷五十三
