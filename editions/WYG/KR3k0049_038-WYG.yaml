body:
  text: 天中記卷三十八明陳文耀撰書效奎奎主文章蒼頡效象洛龜曜書丹青埀萌畫字宋均注曰奎星屈曲相鈎似文字之畫蒼頡視龜而作書則河洛之應與人意所惟通矣孝經援神契鬼哭蒼頡造書而天雨粟鬼夜哭髙誘曰自書契作詐偽萌生去本趨末棄耕耨之業而務錐刀之利天知其將餓故為雨粟鬼恐為文所劾故哭也鬼或作兎恐有取毫作管之害及之故哭淮南文字黄帝之史蒼頡見鳥獸蹏迒迹知分理之可相别異也初作書契葢依類象形故謂之文其後形聲相之益即謂之字字者言孶乳而浸多也著於竹帛謂之書書者如也以迄五帝三王之世改易殊體封于㤗山者七十有二代靡有同焉説文序六書周禮八歲入小學保氏教國子先以六書一曰指事指事者視而可識察而可見上下是也二曰象形象形者書成其物隨體詰詘日月是也三曰形聲形聲者以事為名取譬相成江河是也四曰㑹意㑹意者比類合誼以見指撝武信是也五曰轉注轉注者建類一首同意相受考老是也六曰假借假借者無其字依聲託事令長是也上八體秦書有八體一曰大篆二曰小篆三曰刻符四曰蟲書五曰摹印六曰署書七曰殳書八曰𨽻書新六書亡新居攝使大司空甄豐等校文書之部自以為應制作頗改定古文時有六書一曰古文孔子壁中書也魯恭王壞孔子宅而得尚書春秋論語孝經也二曰竒字即古文而異者也三曰篆書即小篆秦始皇帝使下杜人程邈所作也四曰佐書即秦𨽻書五曰縁所以摹印也六曰鳥蟲書所以書幡信也太公孫字孫暢之嘗見青州刺史傳𢎞釋説臨淄人發古塚得銅棺前和隠為𨽻字言齊太公六世孫胡公之棺也唯三字是古餘同今𨽻書證知𨽻字出古非始於秦時水經春申君銘梁顧野王太學之太博也周訪字原出没不定故玉篇序云有開春申君墓得其銘文皆是𨽻字春申是周末六國同時𨽻文則非吞併之日也法苑珠林掣肘宓子賤治亶父恐魯君之聴説人而令巳不得行其術也將辭而行請近吏二人於魯君與之俱至於亶父邑吏皆朝宓子賤令吏二人書吏方將書宓子賤從旁時掣搖其肘吏書云不善則宓子賤為之怒吏甚患之辭而請歸宓子賤曰子之書甚不善子勉歸矣二吏歸報於君曰宓子不可為書君曰何故吏對曰宓子使臣書而時掣搖臣之肘書惡而有甚怒吏皆笑宓子此臣所以辭而去也魯君大息而嘆曰宓子以此諫寡人之不肖也寡人之亂子而令宓子不得行其術必數有之矣㣲二人寡人幾過遂發所愛而令之亶父告宓子曰自今以来亶父非寡人之有也子之有也有便於亶父者子决為之矣五嵗而言其要宓子敬諾乃得行其術於亶父呂具備百世法式秦丞相李斯曰上古作大篆頗行於世但為古逺人多不詳今刪畧繁者取其合體参為小篆斯善書自趙髙已下咸見伏焉刻諸名山碑璽銅人並斯之筆書秦皇紀功石乃曰吾死後五百三十年當有一人替吾迹烏蒙䏦筆經斯妙篆始省改之為小篆著蒼頡篇七章古文可為上古大篆為中古小為下古三古為實草𨽻謂筆妙極於筆者羲獻精窮其實者籕斯始皇以和氏之璧琢而為璽令斯書其文今㤗山嶧山及秦望等碑並其遺迹亦謂傳國之偉寳百世之法式斯小篆入神大篆入妙書評七日十旬王羲之書論云昔秦丞相李斯見周穆王書七日興嘆患其無骨蔡尚書入鴻都觀碣十旬不返嗟其出群張彦逺要畧以為衛夫人辭也秃筆漢蕭何善篆籕為前殿成單思三月以題其額觀者如流何使秃筆書羊欣筆陣圖草聖𢎞農張伯英芝性好書凡家之衣帛必書而後練臨池學書池氷盡黒下筆必為楷則號忩忩不睱草書寸紙不見遺至今世尤寳其書韋仲將謂之草聖四書體勢亞聖張昶字文舒伯英季弟尤善章草書類伯英時人謂之亞聖王僧䖍書録草賢崔瑗字子玉駰子也善章草書師於杜度媚趣過之㸃畫精㣲神變無礙利金百鍊美玉天姿可謂氷寒於水也王隠謂之草賢書㫁行書後漢劉徳升字君嗣頴川人桓靈之世以造行書擅名既以草剏亦甚硏美風流婉約獨步當時胡昭鍾繇並師其法而胡書體肥鍾書體瘦亦各有君嗣之美也上神授蔡邕字伯喈工書篆𨽻絶世􅀹得八分之精㣲體法百變窮靈盡妙獨步今古又剏造飛白妙有絶倫女琰亦工書伯喈入嵩山學書於石室内得一素書入角垂芒篆寫李斯幷史􅘴用筆勢伯喈得之不食三日乃大呌喜歡若對數十人喈因讀誦三年便妙逹其㫖伯喈常居一室不寐恍然一客厥狀甚異授以九勢言訖而没伯喈自書五經於大學觀者如市羊欣筆法懸帳梁鵠字孟皇少好書受法於師宜官以善八分書知名靈帝重之鵠後依劉表及荆州平曹操募求鵠使在秘書以勤書自效操甚愛其書嘗懸著帳中文以釘壁玩之謂勝宜官魏宮殿題署皆鵠書也干時邯鄲浮亦得次仲法三體鍾繇書有三體一曰銘石正書最妙者也二曰章程謂對書三曰行押謂行書相聞者也王僧䖍名書録三絶魏受禪碑王朗文梁鵠書鍾繇鐫字謂之三絶古鐫字皆須妙于篆籕故繇方得鐫刻劉賓客嘉話手筆張紘字子綱好文學又善楷篆書與孔融書自書融遺紘書曰前勞手筆多篆書毎舉篇見字欣然獨笑如復見其人也呉書一䑓二妙衛瓘􅀶習文藝晉武帝時與索靖俱善草書時人號為一䑓二妙漢末張芝善草書論者論瓘得伯英筋靖得伯英肉本傳善學人書鍾㑹是荀朂從舅荀有寳劔可直百萬㑹善書學荀手迹作書與母取劍仍竊去不還世説㑹善學人書代蜀之役於劍閣要鄧艾章表皆約其言令詞旨倨傲多自矜伐艾由此被收也上妙參鍾索李充母衛氏充㓜孤母聦明有訓又善楷書妙参鍾索世咸重之充從兄咸亦善書晉中興書晉文苑傳止云充似誤冊府筆札云充善楷𨽻書盖因晉書之誤寳翫晉平南將軍侍中王廙右軍之叔父工飛白祖述張旭法得索靖書七月二十六日一紙每寳翫之遭永嘉䘮亂乃四疊綴衣中以渡江今蒲州桑泉令豆盧器得之疊跡猶在國史異纂廙善書畫嘗謂右軍曰諸事不足法惟書畫可法晉明帝師其畫右軍學其書劉賓客嘉話天台神降晉帝時祭北郊更寫祝版工人削之筆入木三分三十三書蘭亭序三十七書黄庭經書訖空中有語卿書感我而况人乎吾是天台文人自言真勝鍾繇羲之書多不一體羊欣筆陣圖虞世南筆髓云王羲之山陰寫黄庭經感天台神降小人亂真羲之曽自書表與穆帝專精任意帝乃令索紙色類長短濶狹與王良相似使張翼寫一毫不異乃題後答之羲之初不覺後更詳看乃嘆曰小人亂真乃爾賤家雞庾征西翼書少時與右軍齊名右軍後進庾猶不忿在荆州與都下人書云小兒軰賤家雞皆學逸少書須吾下當比之變格難儔李嗣真論右軍書毎不同以變格難儔書樂毅論太史箴體皆正真有忠臣烈士之象告誓文曹娥碑其容憔悴有孝子順孫之象逍遙篇孤鴈賦迹逺趣髙有㧞俗抱素之象畫像賛洛神賦姿儀雅麗有矜莊嚴肅之象皆見義以成字非得意獨硏小聖右軍書樂毅論與子敬帖云書賜官奴竟能極妙入聖筋骨𦂳宻不減于父故謂之小聖官奴子敬小字也法苑郄氏工書王羲之妻郗氏甚工書有七子獻之最知名𤣥之凝之徽之渙之操之幷工學𨽻凝之妻謝道韞有才華亦善書甚為舅所重書㫁掣筆不得王獻之字子敬七八歲時學書羲之宻後從掣其筆不得歎曰此兒後當復有大名山人披雲王獻之於㑹稽山見一人黒身披雲而下左手持紙右手持筆以遺獻之獻之受而問曰君何姓字復何遊筆計奚施答曰吾象外為家不變為姓五常為字其筆跡豈殊吾體耶獻之佩服斯言退而臨寫向逾三載竟昧其㣲虞世南筆髓書凌雲殿晉太元中新宮成議者欲屈王獻之題榜以為萬世寳謝安與王語次因及魏時凌雲閣忘題榜乃使韋仲將懸橙上題之比下鬢鬚盡白纔餘氣息還語子弟云宜絶楷書法安欲以此風動其意王解其旨正色曰此竒事韋仲將魏朝大臣寧可使其若此尤以知魏徳之不長安知其心乃不復逼之宋明帝文章志劉瓌之善八分太令既不肯書太極榜謝安遂令瓌之以八分題之黄伯思法帖刋誤自云勝父謝安嘗問子敬君書何如右軍答云固當勝安云物論殊不爾子敬答曰世人那得知寫易真本王僧䖍云王子敬上表多在中書雜事中謝靈運竊寫易其真本相與不疑第一瑯琊王僧䖍􅀶涉經史兼善草𨽻髙帝素善書篤好不已與僧䖍賭書畢謂曰誰為第一對曰臣書第一矣或云帝問我書何如卿曰臣正書第一草書第二陛下草書第二而正書第三臣無第三陛下無第一上大笑曰卿善為詞然天下有道丘不與易也麒麟賞鳯尾齊江夏王鋒字宣頴髙帝使舍於張氏年四歲好學書張家無紙筆乃倚井欄為書書滿則洗之已復更書如此者累月又晨興不肯拂窓塵而先畫塵上學書字五歲髙帝使學鳯尾諾一學即工髙帝大悦以玉麒麟賜之曰麒麟賞鳯尾矣南史百濟求書蕭子雲善草𨽻為時楷法自云善效鍾元常王逸少而㣲變字體其書迹雅為武帝所重帝嘗論書曰筆力勁駿心手相應巧逾杜度美過崔寔當與元常並驅争先其敬賞如此出為東陽太守百濟國使人至建鄴求書逢子雲為郡維舟將發使人於渚次候之望船三十許步行拜行前子雲遣問之答曰侍中尺牘之美逺流海外令日所求惟在名迹子雲乃為停船三日書三十紙與之獲金貨數百萬性吝自非答餉不書好紙好事者重加賂遺以要其答第二子特字世逹早知名亦善草𨽻髙祖嘗謂子雲曰子敬之書不及逸少近見特迹遂逼于卿袁昻書評梁武帝命袁昻作書評其答啓云奉勅遣臣評古今書臣愚短豈敢輙量海江但天旨委臣斟酌是非謹品字法如前今淳化帖第五卷知果書此一叚謂為梁武評書中興舘閣書目亦然誤也勅㫖云俱如卿所評賓退録大觀中黄伯思法帖刋誤同名亞子雲蕭子云王褒之姑夫也特善草𨽻褒少以姻戚徃來其家遂相模範俄而名亞子雲並見重於時後周老不憚勞崔浩字伯深仕魏太武監秘書事既工書人多託寫急就章從少至老初不憚勞所書葢以百數浩盡體勢及其先人而巧妙不如也世寳其迹多裁割綴連以為摹楷魏書太和中兖州人沈法㑹能𨽻書宣武之在東宮勅法令侍書後以𨽻迹見知於閭里者甚衆然從未有如崔浩之妙上書𨽻與弟趙仲捋充世子也雖見妻子亦未嘗怠慢終日儼然學涉羣書善草𨽻雖與弟書書字楷正云草不可不解若施之于人耶似相輕忽若當家卑㓜又恐疑其所在宜爾是以必湏𨽻筆北齊筆勢翩翩蕭引善𨽻書為當時所重宣帝嘗披奏事指引署名曰此字筆勢翩翩似鳥之欲飛引謝曰此乃陛下假其羽翼耳陳書丁真永草陳永欣寺僧智永師逺祖逸少歴紀專精攝齊升堂真草唯命智永章草及草書入妙行入能兄智楷亦工書丁覘亦善𨽻書時人云丁真永草僧智永嘗於樓上學書業成方下國史攷異工模寫兾儁字景儁性忱謹善𨽻書特工模寫用文引為記室周文志平侯莫陳悦乃今儁偽為魏帝勅書與費也頭令將兵助周文討悦儁尋舊敕模寫及代舍人主書等署與真無異周文大悦費也頭見敕不以為疑遂遣兵受周文節度北史退筆頭智永嘗居永欣寺閣上臨書所退筆頭置之於大竹簏簏受一石餘而五簏皆滿法書要録呼為博士張景仁以學書為業遂工草𨽻遂補内書生與姚元標韓毅袁買奴李超等齊名天保八年敕教太原王王紹徳書後主在東宮武成令侍書後主愛之呼為􅀶士後進位開府侍書如故奉贈司空自倉頡以来八體取進一人而已北史儒林郡志細書隋大業中命虞世基等修十郡志其圖上山水城邑題書字極細並用歐陽肅書即率更令詢之長子攻于草𨽻為時所重大業拾遺方丈隋東都内慧日道塲僧敬脫善正書大筆寫方丈字天然勁遒時號僧傑法苑其筆管麄如臂可長三尺東都門額皆脫所題隨意賦筆更不修餙髙僧傳字類髙祖竇后善書字類髙祖之書人不能辨舊唐常侍登床唐太宗貞觀十四年目書草真屏風以示羣臣筆力遒勁為一時之絶嘗召三品以上賜宴於𤣥武門帝操筆作飛白書賜羣臣咸乘酒就太宗手中相競散騎常侍劉洎登御床引手然後得之其不得者咸稱洎登床罪當死請付法太宗笑曰昔聞媫妤辭輦今見常侍登床尚書故實戈字逼真太宗工𨽻書師虞世南常患難于戈法一日書戩字乃空其落命世南填之帝以示魏徴曰朕學世南似盡其法卿看之徴曰天筆臨萬象不能逃其形非臣下所可儗倫仰觀聖作惟戩戈字逼真上笑公藻識法苑善臨飛白唐臨川公主太宗女也下嫁周道務善篆籕能屬文其妹晉陽公主字明逹文徳皇后所生善臨帝飛白書下莫能辨年十二而薨後有房隣妻髙氏嘗書石刻字畫𦂳媚灊溪續書㫁書名逺播歐陽詢初學王羲之書後更㣲變其體筆力險勁為一時之絶人得其尺牘文字咸以為楷範焉髙麗甚重其書嘗遣使求之髙祖嘆曰不意詢之書名逺播夷狄彼觀其跡謂其形魁梧耶舊唐儒林傳書㫁云􅀶覽古家書則八體盡能云云絶藝歐陽率更未嘗擇筆而皆得佳趣葢其所寄者心耳論者謂其飛白冠絶有龍蛇戰闘之象雲霧輕飄之勢真行森森焉若武壽矛戰至使和永奪氣葢絶藝也書藪古碑宿傍歐陽率更嘗出行見古碑索靖所書駐馬觀之良久而去數百步復還下馬佇立疲則布毯坐觀因宿其旁三日而後去今通元寳錢武徳四年鑄其文乃歐陽率更書也國史異纂隋唐嘉話古今書聖龍朔二年上自為書與遼東諸將謂許敬宗曰許圉師嘗自愛書可于朝堂開示圉師見而驚喜私謂朝官曰圉師見古跡多矣魏晉以後惟稱二王然逸少少力而姸子敬姸而少力今觀聖跡兼絶二王鳯翥鸞㢠廻實古今書聖㑹要自重其書歐陽通詢子善書痩怯於父嘗自矜能書必以象牙犀角為筆管狸毛為心覆以秋兎毫松烟為墨末以麝香紙必須堅𦂳薄白滑者乃書之葢自重其書薛純陁亦効歐草傷於肥鈍亦通之亞也僉載字直五萬褚遂良問虞監曰某書何如永師曰吾聞彼一字直五萬官豈得若此者曰何如歐陽詢曰聞詢不擇紙筆皆能如志官豈得若此褚曰既然某何更留意於此虞曰若使手和筆調遇合作者亦深可貴尚禇喜而退國史纂異隋唐嘉話不擇筆墨裴行儉工草書唐髙宗嘗以絹素百卷令草書文選八部帝覽之稱善賜帛百百匹行儉嘗謂人曰褚遂良非精筆佳墨未嘗輙書不擇筆墨而姸㨗者唯余與世南耳所譔草字雜體數萬言並傳于代舊唐三葉嗣名徐浩父工書以法授浩益工嘗書四十二幅屏八體皆􅇱所題多文選五言詩其朔風動秋草邊馬有歸心十數字或草或𨽻尤為精絶或綴小簡于其下記云怒猊抉石渇驥奔泉可以下視碧落矣尤為司空圖所寳愛新唐書及司空圖書屏記灊溪云唐之工書者多求三葉嗣名者惟徐氏云徐師道字太真精于翰墨子嶠之字惟嶽能承以世名家戯換不誤高正臣廣平人習右軍之法睿宗愛其書張懐素之先與髙有舊朝士就髙乞書或凴書之髙嘗為人書十五紙張乃戯換其五紙又令示高再看不誤客曰有人換公書髙笑曰必是張公也乃審詳言得其三紙客曰猶有在髙又觀之竟不能辯髙正臣嘗許人書一屏障逾時未獲其人巧出使淮南臨别大悵惋髙曰正臣故人在申州正與僕書一類可便徃來之遂立申此意書斷書中仙手李邕書始變右軍行法頓挫起伏李陽氷謂為書中得仙手法苑細看未好李邕常不許蕭誠書蕭乃詐為古帖令紙故暗特示邕曰右軍真跡邕欣然云是真物平生未見誠以實告遂復取視曰細看之亦未能好封氏見聞記寢卧碧落李陽氷善小篆自言斯翁之後至小生曹喜蔡邕不足言開元中張懐瓘撰書㫁陽氷張旭並不載綘州有篆字與古不同頗為怪異李陽氷見之􅃦卧其下數日不能去驗其書是唐初不載書者名姓碑有碧落二字時人謂之碧落碑國史補仙篆綘州碧落觀有天尊石像光熖灼然高丈餘上有文云神仙所篆莫之測也有老黄冠云唐龍朔中刺史李誼為母氏太妃追薦所造也李使君即高宗之子其文未刻之􅀢忽有二道士謁李使君聞君欲篆刻其文我二人即天下之善篆也請為使君成之乃于懐中出一卷陰符經殆非人功也使君尤異之復約殿内四面封閉不得令人窺視只我二人在中候三日即畢矣使君從之但見二道士挈一小囊自闔其門余無所覩至三日使君命開之只見白鴿一雙自門飛去及視文已畢餘有一及字但有一畫不成而去使君與道衆悲喜益神之後李陽氷于此學凡十二年終不得妙搶之而去至今為天下絶矣洛中紀異綘州碧落碑文乃髙祖子韓王元嘉四男訓誼譔諶為先妃所製陳惟玉書今不知者皆妄有指説劉賓客嘉話書中虎李陽氷字書氷或作凝與李夫人書云其意在古篆於天地山川得方圓流峙之常於日月星辰得經緯昭回之度於雲霞草木得霏布滋蔓之容於文物衣冠得揖遜周旋之體於眉目口鼻得喜怒􅆭舒之態於蟲魚鳥獸得屈伸飛動之理於骨角齒牙得拉撮咀嚼之勢隨身萬變任心所成書法苑竇泉號陽氷為筆虎一作書中虎玉筯篆議者謂李陽氷踰于李斯乃引筆書其志行下以保明其為字寳也不謬詞云斯去千年氷生唐時氷復去矣後來者誰後千年有人誰能待之千年無人篆止於斯嗚呼後人為吾寳之舒元輿王筯志鬼哭陽氷篆鄂字上有四口空中鬼為之哭鄂州圖經篋笥之珍張長史什褐為蘓州常熟尉上後數日有老父􅂈狀判不數日復至乃怒而責曰敢以閑事屢擾公門老父曰某實非論事但覩少公筆跡竒妙貴為篋笥之珍耳長史異之因詰其得愛書答曰先人愛書兼有著述長史取視之曰信天下工書者也自是備得筆法之妙冠于一時閑鼓吹後軰言筆札者歐虞禇陸或有異論至長史無間言國史補三人韓擇木當肅代世以八分得名時韓雲卿以文􅂋李陽氷以篆顯擇木以八分顯天下欲銘其先人功者不得此三人不得言孝􅘝溪續書㫁金翦唐司馬承禎字子徽善篆别為一體名金剪書仙價連綿書唐呂向字子回章草𨽻求巧能一筆環冩百字若縈髪然世號連綿書續書㫁八分絶筆梁昇卿涉學工書於八分尤工歴廣州都督書東封朝覲碑為時絶筆五雲體韋陟字商卿封郇公性侈縱常以五彩牋為書記使侍妾主之其裁答授意而已陟唯署名自謂所書陟字若五朶雲時人慕之號郇公五雲體又陟書如蟲穿書木鳥踏花枝呂評古釵脚顔魯公與懐素同學草書于郭兵曹或云張長史見蘓大娘舞劔得低昻回翔之勢兵曹有之乎懐素以古釵脚為對魯公曰何如屋漏痕懐素抱魯公脚公復問師何所得對曰貧道觀夏雲師之又遇壁折之路一一自然法苑顔太師嘗學折釵股謂得古人書法隠處王宻碑為世絶藝廣川書䟦魯公書顔魯公書觀中興頌則閎偉發揚狀其功徳之盛觀家廟碑則莊重篤實見其承家之謹觀仙壇記則秀頴超舉像其志氣之妙觀元次山銘則淳􅉼深厚見其榮履之純餘皆可以類考㸃如墜石晝如夏雲鈎如屈金戈如發弩縱横有象低昻有態自羲獻以來未有如公者也灊溪續書斷田舍漢江南李後主善書有言顔魯公端勁有法後主曰真卿之書有楷法而無佳處正如义手並脚田舍漢耳倦游録未嘗草書席豫與弟晉俱以詞藻見稱而豫性􅀹謹雖與子弟書䟽及吏曹簿領未嘗草書謂人曰不敬他人是自不敬也或曰此事甚細卿何介意豫曰細猶不謹而況巨耶舊唐板穿陸羽撰懐素𫝊云踈放不拘細行飲酒以養性草書以暢志酒酣興發遇寺壁里墻靡不書之貧無紙乃種蕉葉萬餘株以供揮灑又漆一盤一方兩盤板皆穿法苑筆塜長沙僧懐素學書草字自云得草書三昧棄筆堆積埋于山下號曰筆􅊘國史補一代冠冕懐素草工痩張長史草工肥瘦硬易作肥勁難工此二人一代草書之冠冕也上目書謝狀柳公權大中初轉少師中謝宗宗召至御前書真草行三紙軍容使西門李𤣥捧硯樞宻使崔巨源􅂈筆賜錦綵缾盤等銀器仍令自書謝狀勿拘真行帝玩竒惜之舊唐當時大臣家碑志非其筆人以子孫為不孝外夷入貢者皆别署貨貝曰此購柳書嘗書京兆西明寺金剛經備有鍾王歐虞禇陸之體尤為得意唐書寓書甚惡李都荆南從事時朝官親屬自京寓書書蹤甚惡李寄詩戯曰華緘千里到荆門章草縱横任意論應笑鍾張虚用力却教羲獻枉勞魂惟堪愛惜為珍寳不敢傳留誤子孫深荷故人相厚處天行時氣許教吞忬情集書蕭梁武帝造寺令蕭子雲飛白大書蕭字至今一字存焉李約竭産自江南買歸東洛建一小亭以翫號曰蕭蕭國史𥙷約壁書蕭字賛云崩雲委地游霧萦空潑利勢動慄憀氣雄昆池駭鯨孟門闘龍抱素日潔金章内融逸擬方外縱在矩中藝窮造化比象無窮法帖什文鍾王不如楊少卿凝式有材自負多佯狂自穢逰寺觀遇水竹幽勝之地吟咏忘歸墻壁之上筆跡多滿僧道愛護莫不粉壁光潔以俟揮掃逰客嘆賞故馮瀛王次子少吉題壁下曰少卿真跡滿僧居秪恐鍾王也不如為報逺公須愛惜此書書後更無書安鴻漸題曰端溪石硯宣城管玉屋松烟紫兎毫更得孤卿老書札人間無此五般髙洛陽舊聞金錯刀南唐後主李煜字重光自稱鍾峯隠居又畧其言曰鍾隠後人能文善畫書作顫筆摎曲之狀遒勁如寒松霜竹謂之金錯刀宋唐希雅學後主金錯刀書有一筆三􅂈之法雖若甚瘦而風神有餘文翰之雄石延年字曼卿志氣豪邁與世齟齬於是嗜飲以自放竒篇寳墨多得于醉中真一代文翰之雄也正書入妙品尤善題壁不擇紙筆自然雄逸嘗艤舟於泗州之龜山寺僧請題壁傍殿榜乃劇醉卷氊而書一揮而三榜成使善書者雖累旬月構思以為之亦不能及也范文正誄之曰曼卿之筆顔筋柳骨散落人間寳為神物發陵取書鄭元素温韜之甥也自言韜發昭陵從埏道下見宮室制度閎麗不異人間中為正寢東西廂列石床床上石函中有鐡匣悉藏前世圖書鍾王墨迹紙墨如新韜悉取之韜死元素得之為多南唐書十五善寫細字應用善冩細字㣲如毛髪嘗如一錢上寫心經又於麻粒上寫國㤗民安四字江南野史元和脚柳公權在元和間書有名故劉禹錫詩柳家新様元和脚且盡薑芽歛手徒本集后山詠徐仙書肯學黄家元祐脚註徐清蓬萊女官詩效謝體書效山谷姸妙可喜換羊書黄魯直戯東坡云昔右軍字為換鵝字韓宗儒性饕餮毎得公一帖於殿帥姚鱗換羊肉数斤可名二犬書為換羊書矣公在翰苑一日以生辰製撰紛冗宗儒繼作簡以圖報書來人督索甚急公笑曰傳語本官今日㫁屠侯􅀈録草聖不工張天覺好草聖而不工一日得詩索筆疾書滿紙使其姪録之當竒險處姪罔然而止執所書問曰此何字丞相熟視詬云胡不早來問致吾忘之泠齋夜話學曹操書朱子少時曽學曹操書時劉共父方學顔書鹿脯帖朱以字畫古今誚之共父云我所學者唐之忠臣公所學者漢之簒賊耳時朱黙然無以應梵書造書凡有三人長名曰􅆊其書右行次曰佉盧其書左行少者蒼頡其書下行法苑珠林梵書左旋其勢向右華書右旋其勢向左通志六書畧安息國書革旁行為書記服䖍曰横行為書記也師古曰今西方胡國及南方林邑之徒書皆横行不直下也革謂皮之不柔者漢書西域𫝊筆不律釋名曰筆述也謂述事而言之成公綏曰筆者畢也能畢舉萬物之形而序自然之情也墨藪云筆者意也意到即筆到焉楚謂之聿呉謂之不律燕謂之弗秦謂之筆也曽削古未有筆以書刀刻字於方䇿謂之削魯為詩書之國故考工記以魯之削為良困學紀聞周禮䧟文太公陰謀筆之書云毫毛茂茂䧟水可脱䧟文不活縹筆孔子制作孝經使七十二子向北辰磬折使曽子抱河洛事北向孔子簮縹筆衣綘单衣向北辰而拜孝經授神契蒙恬筆牛亨問曰古有書契已来便應有筆也世稱蒙恬造筆何也答曰自蒙恬始作秦筆耳以枯木為管以鹿毛為柱羊毛為被所謂蒼毫非兎毫竹管也非謂古筆也又問曰筆有彤管何也答曰彤者赤漆耳史官載事故以赤管言以赤心記事也崔豹古今注天子筆天子筆管以錯寳為跗毛皆以秋兎之毫官師路扈為之以雜寳為匣廁以玉璧翠羽皆直百金西京雜記飾璧綴珠漢末一筆之匣雕以黄金飾以和璧綴以隋珠文以翡翠此筆非文犀之禎必象齒之管非豐狐之柱必秋兎之翰用之者必被珠繡之衣踐雕玉之履𫝊子筆端傳曰鳥之美羽勾啄者鳥畏之魚之侈口垂腴者魚畏之人之利口贍辭者人畏之是以君子避三端避文士之筆端避武士之鋒端避辨士之舌端詩曰我友敬矣䜛言其興韓詩外𫝊齧筆司馬相如作文把筆嘗齧之似魚含毫簮筆張安世持槖簮筆事孝武帝數年見謂忠謹漢書槖挈槖也近臣負槖簮筆從備顧問或有所記投筆班超字仲升家貧為官傭書寫嘗輟書投筆嘆曰大丈夫當效𫝊介子張騫立功異域以取封侯安能久事筆硯乎東觀漢記弱翰楊雄謂天下上計孝亷㑹即把三寸弱翰油素四尺以問其異染血楊斑字機平平零陵賊為荆州刺史趙凱横奏檻車徴之仍奪其筆硯乃齧臂出血以簿中白毛筆染血以書帛上具陳破賊之形勢及言為凱所誣以付子弟詣闕詔原之謝承後漢書舟筆盛吉拜廷尉每冬月罪囚當㫁其妻執燭吉持月筆相向埀涕㑹稽典録削荆任末十四時學無常師或依林木之下編茅為庵削荆為筆刻樹汁為墨夜則映星望月暗則􅈁麻蒿以自照拾遺記忌筆路粹字文蔚少學于蔡邕為丞相軍謀祭酒曹操令枉狀奏孔融誅之後人觀粹所作無不嘉其才而忌其筆典畧㸃額孫權常夣北面􅉐首于天帝顧而見日俄而日變為三月忽見一人從前以筆㸃額流血于前懼而走之狀似飛者復墜于地覺以問術士熊循循曰吉祥矣大王必為呉主王者人之首額者人之上王加㸃主字也在􅀢而來王者之羣臣也雖主意未至而羣下自逼矣血流在前教令明白當從王出也權乃詢之大臣遂絶于魏吳祚國統齊髙洋夣人以筆㸃其額王曇哲賀曰王當作主琉璃筆陸士龍云魏武帝劉媫妤以七月七日折琉璃筆管此其時也麟角張華造􅀶物志成晉武賜麟角筆以麟角為筆管此遼西國所獻也拾遺記王勃春日孫學士宅宴序且傾鸚鵡之盃聊舉麒麟之筆炙筆左思為三都賦門庭藩溷必置筆硯十稔方成薛宣令人納薪以炙筆硯筆答成公綏口不能談而有劇問以筆答之見其深智文士𫝊洪筆晉蔡洪赴洛中人問曰呉中舊姓何如答曰呉府君展聖朝之老成佐明時之俊乂朱永長誕理物之至徳清選之髙望嚴仲弼隠九臯之鴻鵠空谷之白駒顧彦先八音之琴瑟五色之龍章張威伯歲寒之茂松幽夜之逸光陸士衡士龍鴻鵠之徘徊懸皷之待槌凡此諸君以洪筆為鉏耒以紙札為良田以𤣥黙為稼穡以義理為豐年世説鼠鬚筆王羲之得用筆法于白雲先生先生遺之鼠鬚筆又鍾繇張芝皆用鼠鬚筆緑沉昔人或以琉璃象牙為筆管麗飾則有之然筆須輕便重則躓矣近有人以緑沉漆竹管及鏤管見遺録之多年斯亦可愛玩詎必金寳雕琢然後為貴乎余嘗自為筆甚可用謝安石庾雅恭每就吾求之禁而不與王羲之筆經賫筆陳壽卒洛陽令張泓遣吏賫紙筆就壽門下寫三國志王隠晉書赤筆王祐病有鬼至其家留赤筆十餘所千薦下曰可使人簮之出入辟惡舉事皆無恙牙管庾廙字㓜簡侍中袁彖雅慕之贈鹿角書格蜯硯象牙筆管范岫字懋賓濟陽考城人毎居常以亷潔著稱為晉陵太守雖牙管一雙猶以為費縳筆何禛少孤常以縳筆戢扇為業善為智討由是知名晉春秋打骨宋雲以魏神龜中至烏萇國又西至本釋迦徃自作國名磨休玉有天帝化為婆羅門形語五日我甚知聖法須打骨作筆剥皮為紙取髓為墨王即依其言遣善書者抄之遂成大乘經典今打骨處祀為琉璃行記胎髪南朝有老姥善作筆胎髪者尤佳又有筆工名鐵頭能瑩管如玉紀聞譚退筆塜僧智永于樓上學書有秃筆頭十甕每甕數石人求顯題門限穿宂乃以鐵葉裹之謂之鐵門限後取筆頭瘞之號退筆塜自製銘志夣吞筆虞世南學書專精中宵之間夣吞筆覺後若在胷臆又因假􅄰見張芝指一道字用筆體斯源也虞筆髓犀角管歐陽通詢之子善書瘦怯於父常自矜能書必象牙犀角為管貍毛為心覆以秋毫松烟為墨末以麝香紙必須用𦂳薄白滑者乃書之盖自重也管子丈李林甫為相初年有一布衣請謁之自稱曰業八體書生管子文語畢求退林甫令人暗逐之生至南山中一石洞其人尋亦入石洞遽不見生惟有故舊大筆一其人持以白林甫林甫以其筆置於書閣焚香拜祝其夕筆忽化為五色禽飛然不知所之大唐竒事髙搘筆䑓中尚揖揖者古之肅拜也故有䑓揖筆每署事必舉筆當額有不能下筆者人號為髙搘筆徃徃自䑓拜他官執筆亦誤作䑓揖者人皆笑之御史䑓記管刻人馬王使君有筆管中間刻從軍行人馬毛髪屋木山水無不精絶毎一事刻從軍行一句殆非人功成云用鼠牙刻盧氏雜説宣城世𫝊宣州陳氏世能作筆家傳右軍與其祖求筆帖後子孫猶能作筆至唐柳公權求筆于宣城先與二管語其子曰柳學士如能書當留此筆不爾如退還即可以常筆與之未㡬柳以為不入用别求遂與常筆陳云先與者二筆非右軍不能用柳信與之逺矣文房四寳類説作宣州諸葛氏柳公權謝人惠筆帖云近蒙寄筆雖毫管甚佳而出鋒大短傷于勁硬所要優柔出鋒須長擇毫須細管不在大副切須齊副齊則波撆有馮管小則運動省力毛細則㸃畫無失鋒長則洪潤自由頃年曽得舒州青練筆指揮教示頗有靈性後有管小鋒長者望惠一二即為妙矣能改齋漫録架筆起舞杜昭逺將失寵幸多妖物晝見狗作鷄鳴嘗一日架上雙筆起舞相對回檢不已杜曰既為崇能自書乎右一筆倒硯中漬其毫於案上大書于案上其年杜䧟大辟葆光録衣袖代筆唐相裴休早𨽻業于河内之太行山後登顯位建寺于彼目為化城寺旋授太原節鎮經由是寺寺之僧粉額陳筆硯俟裴公親題之裴公神情自若以衣袖濕墨以書之尤甚遒徤逮歸侍婢訝其霑渥裴公曰句以之代筆來斑竹管李徳裕寓居郊外舍中有湘州守贈以班竹筆管竒采爛然愛玩不足因為賦以報之英華筆耕翰林盛事云王勃所至請託為文金帛豐積人謂心織筆耕翰林志足夾大厯中東都天津橋有乞兒無兩手以右足夾筆寫經乞錢欲書時先擲筆髙尺餘以足接之曽無失落書跡尤楷酉陽夣筆石晉朝丞相趙瑩布衣時常以窮通之分禱於華嶽宙是夜夣神遺以一筆二劔始得未窹既而一踐廊廟冄擁節旄五色筆和凝年十七舉明經至京師忽夣人以五色筆一束以與之謂曰子才可以舉進士自是才思敏贍十九登進士第五代周史二筆馬裔孫初為河中從事因事赴闕宿於邏店其地有上邏神祠夜夣神見召待以優禮手授以筆一大一小覺而異焉及為翰林學士旋知貢舉私自謂曰此二筆之應也洎入中書吏奉二筆熟視大小如昔時夣中所授者上畫日蘓循始至魏州晉王大悦明日獻畫日筆三十管鹿毛宣城之筆雖管答至妙而佳者亦少大約供進或逹寮為之則稍工又或以鹿之細毛為之者故晉王隠筆銘云豈其作筆必兎之毫調利難秃亦有鹿毛盖江邊亦少兎也徃徃商賈齎其皮南渡以取利今江南民間使者則皆以山羊毛焉蜀中亦有用羊毛為筆者徃徃亦不下兎毫也宣城歲貢青毫六兩紫毫三兩次毫六兩勁徤無以􅂈也嶺中亦有兎但纔大於鼠比中者其毫軟弱不充筆用是知王羲之歎江東下濕兎毛不及中山鹿毛筆晉張華嘗用之不下兎毫石鼠蜀中出石鼠毛可以為筆其名􅥨人鬚嶺南兎嘗有郡牧得其皮使工人削筆醉失之大懼因剪已鬚為筆甚善更使為之工者辭焉詰其由因實對遂下令使一户輸人鬚或不能致輙責其直異物志雉毛有獸縁木文似豹名虎僕毛可以取為筆嶺外尤少兎人多以鷄雉毛作筆亦妙故嶺外人書札多體弱然而筆亦利其鋒至水乾墨𦂳之後鬚鬈然如蠆焉􅀶物麝貍鄭公䖍云麝毛筆一管寫書直行四十張狸毛筆一管界行寫書八百張羊鬚陶隠居燒丹封鼎際用羊鬚筆胎髪弗嫗多以小兒髪為筆柱鄭䖍云蕭祭酒常用之又韋仲將筆説方云筆柱或云墨池亦曰承墨又有柳筆皮筆鐡筆五色畨禺諸郡如隴右多以青羊毫為筆昭州擇鷄毛為筆其三覆鋒亦有圓如錐方如鑿可抄寫細字者昔溪源有鴨毛筆雀雉毛間之五色可愛徴其事得非入江淹夣中者乎雙床枚捜神記云益州西有神祠自稱黄石公祈禱一百紙一雙筆一丸墨先聞石室中有聲便具吉㓙不見形也南朝呼筆四管為一床梁簡文帝答徐摛書云時䕶書幌乍置筆床梁令云寫書必一枚一萬字毫錐白樂天與元㣲之將應制科各有纎鋒細管筆擕以就試相顧輙笑目為毫錐故贈元相詩曰䇿目穿如札毫鋒銃似錐胡盧漢上題襟集有叚成式寄溫飛卿胡盧筆管徃復書二首鬼取今之筆故者徃徃尋不見或㑹府吏千百軰用筆至多亦不知所之或云鬼取之判𡨕擲空昔有僧惠逺製湼槃經云䟽訖呪其筆曰如合聖意此筆不墜乃擲于空中卓然不落唐越州法師神楷造維摩經䟽亦然後迎入長安筆端舍利唐法師楚金刺血寫經筆端常有舍利刀筆古者吏道必事刀筆今亦有藏刀于管者毁筆今之職官㫁大辟罪者署案訖必尋毁其筆盖彰其惻隠也醫工常取之燒灰治驚風及童子邪氣毛錐子漢史洪肇位方鎮兼中書令洪肇不喜賓客嘗言文人難耐呼我為卒𢎞肇議帶樞宻蘓逢吉以為不可恨之㑹飲竇貞固第洪肇厲聲曰安朝廷定禍亂直須長槍大劔若毛錐子安足用哉三司使王章曰無毛錐子軍賦何從集乎洪肇黙然筍筆上元縣瓦棺寺閣南隅有雙籠閉之忘記歲月㑹昌中詔折浮圖因開有筍筆餘頭藏書秋中有生日藤紙題為南部烟花録僧志澈得録及焚澤氏郡僧經人惜其香軸争取紙尾折去視其軸皆有魯郡顔公名題云手寫是録即前之筍筆可舉而知也大業拾遺後序銀筆韓定辭酧馬彧詩曰盛徳好將銀筆述麗詞堪與雪兒歌彧問銀筆事曰梁元帝著書筆有三品或以金銀雕飾或用斑竹為管忠孝全者用金管書之徳行清粹者用銀筆書之文章贍麗者以斑竹書之雪兒者李宻愛姬賓寮文章入意者即付雪兒叶音律以歌之筆僊石晉之末汝州有一髙士不顯姓名每夜作筆十管付其室家至曉闔户而出面皆鑿壁貫以竹筒如引水者或人置三十金則一管躍出十筆告盡雖勢要官府督之亦無報也其人則携一葢吟嘯于道宮佛廟酒肆中至夜酣暢而歸其鄰媍亦怡然自得復為十管來晨貨之如此三十載後忽携室徙居杳不知所詣人有後數十年復見者顔色如故時人謂之筆僊硯硯硯者硏也可硏墨使和濡也釋名石滑謂之硯字從石見説文墨海昔皇帝得玉一紐治為墨海焉其篆文曰帝鴻氏之硯硯銘硯銘云石墨相着而黒耶心䜛言得無汙白太公金匱孔子硯伍緝之從征記云魯國孔子廟中有石硯一枚製甚古朴盖夫子平生時物也范蠡硯洞庭湖一陂有范蠡石床石硯廣記玉滴廣川王發晉靈公塜獲蟾蜍一枚大如拳腹空谷五合水潤如新王取為盛書滴器玉硯天子玉几以酒為書滴取其不氷以玉為硯亦取其不氷西京雜記同硯張彭祖少與漢宣帝㣲時同硯席帝即位以舊恩封陽都侯出常叅乘漢書曹爽與魏明帝少同硯席世語劉𢎞沛國人常寄居洛陽與晉武帝同硯書梁元帝忠臣𫝊方畧薛宣為左馮翊性宻静有思省吏職求其便安至於用筆硯皆為方畧利用而費省也遺硯范喬年二歲祖父馨卒臨終撫其首曰恨不見汝成人以吾所用硯與之至五歲祖母此言告喬便執硯啼哭陳留志鐵硯先生欲歸河内舍人劉守璋與道士呉恪儒王隠來謁贈先生楊雄鐵硯并四皓鹿角枕洪涯先生傳銅雀瓦魏銅雀䑓遺址人多發其古瓦􅅣之為硯甚工而貯水數日不渗世傳云昔人製此䑓其瓦俾陶人澄泥以絺濾過碎胡桃油方埏埴之故與衆瓦有異焉即今大名相州等處士人有作古瓦之狀硯以市于人者甚衆青鐡張華博物志成晉武賜以麟角筆管遼西所獻也青鐡硯用于闐所貢鐡為之也拾遺記風字硯㑹稽老叟云右軍之後持一風字硯大尺餘色正赤用之不减端石云右軍所用石揚休以錢三萬得之硯譜蜯硯庾翼少為侍中袁彖所重贈以鹿角書格蜯硯象牙筆管晉書城池王羲之筆陣圖以水硯為城池魚硯蔣道支于水側見一浮租取為硯製形象魚有道家符䜟及紙皆内魚硯中常自隨二十餘年忽失之夣人云吾暫逰湘水過湘君廟為二妃所留今復還可于水際見尋也道支詰旦至水側見罾者得一鯉魚買剖之得先時符䜟及紙方悟是所夣人弃之俄而雷雨屋上有五色氣直上入雲有人過湘君廟見此魚硯在二妃側異苑翔鳯硯盖梁武帝時有司奏性純儉呉令唐傭鑄盤龍火爐翔鳯硯葢詔禁錮終身南史紀芝生東魏孝静帝芝生銅硯殺墨硯杜叔元藏許敬宗硯後官杭漁人於浙江網一銅匣鑄許敬宗硯兩方足匣有容足處即敬宗物叔元子遺孫萃老萃老憎其人求得之端石也潤如玉殺墨如風㣲窪貞四百餘年物匣在唐諲處當合東坡雜説銀硯景龍文舘記云中宗令諸學士入甘露殿其北壁列書架上見其名學士等名新序説苑塩鐡潛夫等論架前有銀硯一碧鏤牙管十銀凾承紙數十種稠桑硯稠桑硯始因元和初李濟翁叔祖宰虢之耒陽邑諸子溫清之隙必訪山水以遊一日于澗側見一紫石憩息于上佳其色且欲紀其憩山之逰既賞擕鎸具隨至自勒姓氏年月遂刻成文復無刓缺乃曰不頑不麩可琢為硯矣既就琢一硯而過但惜其重大無由出之更行百步許至有小如拳者不可勝紀遂令從者挈數拳而出就縣第製琢有胥性巧請斵之遂請解胥籍于是來斵開席于大路厥利驟肥後諸李每經稠桑鐫者必相率致硯以報其本焉稠桑石硯自此始也資暇集碧玉硯貞元中許商舟行湖中青衣迎入一府女郎請書江海賦碧玉硯銀氷頗黎為匣東坡云許旌陽君王陶泓毛頴者中山人也秦皇帝使蒙恬賜之湯沐而封諸管城號曰管城子頴與綘人陳𤣥𢎞農陶泓及㑹稽禇先生友善相推致其出處必偕韓文結隣李衞公多硯妙絶者曰結隣言與硯為隣朱硏益丹廬陵官下記韋令去西蜀時彭州刺史被縣今宻論訢韋前期勘知屈刺史詣府陳謝及廻日諸縣令悉逺迎所訢者為首大言曰使君今日可謂朱硏益丹矣刺史笑曰則公便是硏朱漢子也作聲鄭朗以狀元及第覆落甚不得志其几案之硯忽作數十聲鄭愈不樂時洪法師在坐曰硯中作聲有聲價之象朗後果入台輔斯吉兆也明矣今直閤范舍人果言頃目大著直館于史閤中與諸學士清話間范公几案之上所用硯或作一十五聲丁丁然甚駭之范獨内喜迨半月有朱衣銀魚之賜亦異事也樸硯僖宗時鄭􅌈盧擕同在中書因議政喧競撲碎硯王鐸嘆云不意中書有瓦解之事唐語林擕與畋為相不相得議黄巢事忿争盧拂衣而起擲硯相投唐書栗岡李白酬殷十一贈栗岡硯詩云殷侯三𤣥士贈我栗岡硯灑染中山毫光輝呉門練天寒水不凍日用心不倦携此臨墨池還如對君面琉璃硯李白自漢陽歸詩去歲左遷夜郎道琉璃硯水常枯槁鴿添水藍田王順山悟真寺有髙僧寫湼槃經羣鴿自空中􅀈水添硯水竭畢至曽聞彼山僧傳云亦見于白𫝊百餘韻詩補硯近石晉之際闗右有處士者放逹之流也能盡馴貍復能補端硯至百碎者賫歸旬日即復舊焉如新琢成畧無瑕類世莫得其法也磨鐡硯桑維翰或令其改姓維翰鑄鐡硯以示人曰硯弊則改而他姓卒以進士及第五代史玉硯周世宗征淮南先鋒劉重進得吳楊􅄎玉硯以獻石虚中石虚中字居黙南越髙要人也器度方圓中心坦然隠遁不仕因採訪遇之端陽拜即墨侯與宣城毛元銳燕人易𤣥光華陰禇知白同出處文嵩石虚中𫝊金線環殿丞崔岷硯金線環匝池中有金魚心有金雲唐録金月校理錢仙芝二硯一中有金月下有雲翼之一有金斗星二雲左右之色頗青上黄石後主青石硯墨池中黄石如彈丸水常滿終日用之不耗毎以自隨後歸朝陶榖見而異之大不可持乃取石彈丸去後主曵其衣振臂就取後主請以寳玩為謝陶不許後主曰惟此硯能生水他硯皆不可用陶試數十硯水皆不生後主索之良苦陶不能柰曰要當碎之石破中有小魚跳地上即死自是硯無復潤澤硯譜龍尾石江南故老云李後主所用龍尾云為天下冠唐録硯山李後主常寳一硏山徑長十餘尺前聳三十六峯皆大猶手指左右引兩陂陀而中鑿為硯及江南已破硯山流傳士人家後為米元章所得蘓仲容弟以丹陽美宅同王彦昭與米易之米後號海岳菴者是也漁陽石譜蒼碧龍尾山在㜈源東南開元中獵人葉氏逐獸至長城見壘石瑩潔􅂝歸刋成硯溫潤􅂈端溪持獻令令訪匠琢為硯南唐元宗時歙守獻硯薦工李少㣲擢硯官新安志龍尾石産水中極溫潤性堅宻聲清越婉若玉與他石不同色有蒼黒者青碧者歙硯説泓水丁晉公自海外徙宅光臨終以一巨篋寄郡帑中上題云候五十五年有姓丁來此作通判可分付開之至是歲有丁僑者來二郡政即晉公之孫計其所留年月尚未生啓視之但一黒匣貯大端硯一枚上有一小竅以一碁于覆之掲之有水一泓流出無有歇時溫潤之甚不可名狀丁氏子孫至今珤之揮塵録慰斗焦陳公宻縝未逹時嘗之端州聞部内有富民蓄一硯竒甚至破其家得之硯面世所謂熨斗焦者成一黒龍奮迅之狀可畏二鸜鴿眼以為目每遇陰晦則雲霧輙興公宻没歸于張仲謀詢政和間遂登金門祐陵置于和殿為書符之用揮塵録養直集亦載月狀三衢徐氏有龍尾溪石硯近貯水處有圓暈幾寸許正如一月狀其色明暗隨月盈虧金龍何持之滕莊敏外生也有一端硯形正圓中長七八寸渾厚無眼干馬肝色中盤一金色龍頭角𤓰尾粲然畢具㑹有知者即以進御紫龍卵崔生居端巖于後巖百丈坑得紫龍卵造硯長百廣减尺之四厚重粹潤眼暈六七重無纎瑕近手潤澤可劘墨蔡君謨硯記紅絲唐彦猷嘉祐中守青社得紅絲石於黒山琢為硯其理紅黄相参文如林木或如月暈或如山峯或如雲霧花卉石自有膏潤泛墨色覆之以匣數日不乾彦猷作硯録品為第一渑水燕談雲覆宋謝塈知徽州嘗于舊坑取石貢理宗初坑上常有五色雲如錦衾郡檄隨雲所覆處斵之得佳石有白文繞兩船宛轉如二龍既發為硯而雲氣不復見矣鷺駐端溪硯工見有飛鷺翹駐潭心因令沒人視之網得一石石既登岸轉之若有􅉼水聲硯工曰是必有子石刻之得一石于泓水中大如鵝卵色紫玉也刻為二硯郡守以其一送丁謂之甚喜斗星歙汪氏避水寓莊户硯工家夜有光起于支床之石異而取之使鑿為硯石色正天碧細羅文中􅉼金星七布列如斗宿牀輔星在焉因目之為斗星硏端溪柳公權論硯言青州石為第一絳州者次之殊不言端石世傳端州有溪因曰端溪其石為硯至妙益墨而至潔其溪水中出一草芊芊可愛匠琢訖乃用其草裹之故自嶺表迄中夏而無損也噫亦非天使之然耶或云水中石其色青山半石其色紫山絶頂者尤潤如猪脉色者佳其貯水處有白赤黄色㸃者世謂之鸜鵒眼或脉理黄者謂之金線文尤價倍于常者也其山號曰斧柯山即觀棋之所也昔人採石為硯必中牢祭之不爾則雷電勃興失石所在其次有將軍山其硯已不及溪中及斧柯者硯譜端所出有四岩石為甲然岩石又分上下又有活眼死眼之别圓暈相重黄黒相問黳睛在内晶熒可愛謂之活眼四旁浸漬不甚鮮明謂之淚眼形容畧具内外皆白謂之死眼活眼勝淚眼淚眼勝死眼死眼勝無眼下巖石色深紫襯手潤叩之聲清逺有清緑暈圓小而𦂳謂之鸜鵒眼採於水底最貴重皇朝類苑巖石有黄臕胞絡鑿去方見硯材所謂子石端硯譜山有自然圓石剖其璞得焉謂之子石唐録眼石縝宻溫潤端人謂石嫰則多眼凡青脉必有眼脚石腰石多青脉眼之别有鸜鵒眼雀眼鷄眼猫眼菉豆眼翠緑為上黄赤為下端硯譜眼生於墨池外曰髙眼生於池内曰低眼髙眼尤所愛尚以其不為墨所漬也硯録宋髙宗謂端硯如一叚紫玉瑩潤無瑕乃佳不必以眼為貴老學菴記丹石硯唐林夫遺丹石硯粲然如芙蓉出水殺墨宜筆唐氏譜天下硯不如兹鐡硯青州熟鐡硯發墨王氏談録青州鐡硯製作頗精歐譜磨硯古人有學書于人者數年自以其藝成遂告辭而去師曰吾有一篋物可附于某處及山之下絶無所付人封題亦甚不宻乃啟之皆磨穴者硯數十枚此人方知其師夙之所用者也乃返山服膺至皓首方畢其藝是知古人工一事必臻其極焉紙平滑紙砥也平滑如砥石也釋名方絮曰紙服䖍通俗文紙者絮也苫字從系氏聲葢古人書於帛故裁其邊幅如絮之一苫也説文赫蹏篋中有裹藥二枚赫蹏書孟康曰蹏猶地也染紙素令赤而書之苦今黄紙也鄧展曰赫音兄弟墻之䦧應邵曰赫蹏薄小紙也晉灼曰今謂薄小物為蹏鄧音應説是也師古曰孟説非也今書本赫字或作擊蔡侯紙自古書契多編以竹簡其用縑帛者謂之為紙縑貴而簡重並不便于人蔡倫乃造意用樹膚麻頭及敝布魚網以為紙元興元年奏上之帝嘉其能自是莫不從用焉故天下咸稱蔡侯紙後漢書耒陽縣北有蔡倫宅宅西有一石臼云是倫舂紙臼也湘州記蔡侯紙用故麻名麻紙木皮名糓紙故魚網名網紙輿服記漢桓帝使桂陽人蔡倫始煑谷皮以造紙􅀶物志和帝時曰桓誤左伯韋誕奏蔡邕自矜能書兼明斯喜之法非得紈素不妄下筆工欲善其事必先利其器用張芝筆左伯紙及臣墨皆古法兼此二具又得臣手然後可以盡徑丈之勢方寸之言三輔夫録左伯字子邑又能為紙故蕭子良荅王僧䖍書云子邑之紙姸妙輝光仲將之墨一㸃如漆伯英之筆窮神盡思妙物逺矣邈不可追古今紙王隠晉書曰魏太和六年􅀶士河間上古今字話其巾部云紙今紙則其字從巾古以縑帛依書長短隨事裁截枚數重沓即名幡紙字從系此形聲也後漢和帝元興中中常侍蔡倫以故布擣剉作紙故字從巾是其聲雖同系巾為殊不得言古紙為今紙也側理張華造􅀶物志成晉武帝賜側理紙萬畨南越所貢漢人言陟釐與側理相亂葢南人以海苔為紙其理縱横邪側因以為名宻香宻香紙以蜜香樹皮葉作之㣲褐色青文如魚子極香而堅韌水清之不潰爛㤗康五年大秦獻三萬幅帝以萬幅賜當陽侯杜預令寫所撰春秋什例及經傳集解以進未至而預卒賜其家令上之含南方草木狀􅁞蠒紙羲之永和九年製蘭亭乘春興而書用􅁞蠒紙鼠鬚筆遒媚勁徤絶代更無桑根紙雷孔璋曽孫穆之猶有張華與祖書乃桑根紙也右軍筆王右軍在㑹稽謝公就乞牋筆庫内有九萬枚悉與之桓宣武云逸少不節王右軍作書惟愛張氷人製紙謂光𦂳澤麗便於行筆廣川書䟦藤角紙古有藤角紙范寗教云土紙不可作文書皆令用藤角五綵石虎詔書以五綵色著木鳯凰口中令銜之飛下端門鄴中記桃花詔令平淮作青赤縹緑桃花紙使極精令速作之桓𤣥偽事雨綘羅張仲舒在廣陵晨夕輙見行側有赤氣後空中忽兩綘羅於其庭周廣七八分長五六十皆箋紙繼之廣長亦與羅等紛紛甚快經宿仲舒暴疾死異苑供御不及張永善𨽻書又有巧思紙及墨皆自營造上毎得永表啓輙執玩咨嗟自嘆供御者不之及也宋書疑光紙江寧縣東十五里有紙官署齊髙帝於此造紙之所也常造凝光紙賜玉僧䖍一云銀光紙也丹陽記襞綵牋陳後王常令八婦人襞綵牋製五言詩設空紙司馬消難不知書書架上徒設空紙時人云黄紙五經赤軸三史五色班紋蕭誠採野麻土糓作五色班紋紙法帖什文銷金唐初將相官告亦用銷金牋及鳯凰紙書之餘皆魚牋花牋而已金花牋明皇與貴妃賞牡丹於沉香亭命棃園李龜年持金花牋宣賜李白三進清平調詞三篇外𫝊合璧作李延年誤徳宗朝有朱來鳥常噉玉屑聲甚清暢及為鷙鳥所摶宮人皆以金花牋寫多心經薦其𡨕福杜陽編薛濤牋松花牋代以為薛濤牋誤也元和之初薛濤尚斯色而好製小詩惜其幅大不欲長䞉之乃命匠人狹小為之蜀中才子既以為便後減諸牋亦如是特名曰薛濤牋今蜀紙有小様者皆是也非獨松花一色賚暇録松花紙成都薛濤元微之使蜀屢陪燕笑元松后於松花紙上寄詩云别後相思隔烟水菖蒲花發五雲髙薛於浣溪種菖蒲故有是句蜀中松花紙金沙紙流沙紙彩霞紙金粉紙龍鳯紙近年皆廢惟十色牋綾紋紙尚在牧竪閑談李義山送崔珏詩小肆至今多寂寞酒墟從古植風流浣花牋紙桃花色好好題詩詠玉鈎玉葉趙象興武公業妾非煙以金鳯牋剡溪玉葉紙題詩相贈答三水小牘謝公紙以人待名者有謝公有薛濤所謂謝公者謝司封景初師厚師厚創牋様以便書尺俗因以為名謝公有十色牋深紅粉紅杏紅明黄深青淺青深緑淺緑銅緑淺雲即十色也韓浦詩十様蠻牋豈謝公之謂乎雲藍予在九江出意造雲藍紙既乏左伯之法全無張永之功輙分送五十枚詩曰三十六鱗充使時數畨猶得裹相思待將袍襖重抄了寫盡㐮陽播掿詩叚成式與溫盛筠雲籃紙絶句序文房四譜云今飛卿集中有掘柘詞恐播掿字誤琅玕東都龍門有一家相傳廣成子所居也天寳中推禪師居於此庭多古桐桐華時有異蜂聲如人吟禪師諦視之具體人也乃捲竹巾網而獲焉置於紗籠中意者桐華牀置其傍忽有數蜂翔集隔籠相慰勉一曰子與青童君奕勝獲琅玕紙十幅君出當為我寫星子詞語皆非人世事僧乃舉籠放之酉陽霞光牋蜀王衍賜金堂縣令張蠙霞光牋五百幅霞光彩疑即今之彤霞牋亦深紅色也葢以胭脂染色最為靡麗元費著蜀牋紙譜㑹府紙江南李主常較舉人畢放牓日給㑹府紙一張可長二丈濶一丈厚如贈帛數重令書合格人姓字每紙出則縫􅀈者相慶有望於成名也廟祀蔡倫蜀中盡用蔡倫法牋紙有玉板有貢餘有經屑有表光玉板貢餘雜以舊布破履亂麻為之惟經屑表光非亂麻不用於是造紙者廟以祀蔡倫矣廟在大東門雪峯院雖不甚壮麗然毎遇歲時祭祀香火纍纍不絶示不忘本也元費著蜀牋紙譜玉屑蜀中多以麻為紙有玉屑屑骨之號江浙間多以嫩竹為紙北土以桑皮為紙剡溪以藤為紙海人以苔為紙浙人以麥􅂒稲稈為之者脆薄焉以麥膏油藤紙推之者尤佳香皮紙廣管羅州多棧香樹身似柜柳其花内而繁其葉如橘皮堪作紙名為香皮紙灰白色有文如魚子牋雷羅州義寧新㑹縣率多用之其紙慢而弱沾水郎爛逺不及楮皮者劉恂嶺表異録澄心堂紙蜀士云澄心堂紙取李氏澄心堂様製也葢表光之所輕脆而精絶者中等則名曰玉水紙最下者曰塗金牋以供乏使雙流紙雙流紙出於廣都毎幅方尺許品取下用最廣而價亦最賤雙流實無有也而以為名葢隋煬帝始改廣都曰雙流疑紙名自隋始也亦名小灰紙凝霜歙績溪界有地名龍鬚出嘉紙葢新安之水清徹見底利以漚楮故紙如玉雪者水色所為也紙有墨光白滑氷翼凝霜之目方輿勝覽畨幅枚簡文帝集網啓謹奉紅牋二千幅陸倕有謝安成王賜西蜀箋紙一萬幅簡文帝又云特送四色紙三萬枚湘東王㑹最云晉宋間有一種紙或一幅長丈餘言就舡中抄之世謂璽紙又云張載紙銘並稱紙為畨北户録廣都廣都紙有四色一曰假山南二曰假榮三曰冉村四曰竹絲皆以楮皮為之其視浣花牋最清潔凡公私簿書契券圖籍文牒皆取給于是廣幅無粉者諸之假山南狹幅有粉者謂之假榮造於冉村曰清水造於龍溪鄉曰竹紙蜀中經史子籍皆以此紙傳印蜀紙譜蠻紙唐中國未備多取於外夷故唐人詩中多用蠻箋字亦有為也髙麗歲貢蠻紙書卷多用為襯曰本國出松皮紙又南畨出香皮紙色白紋如魚子又苔紙以水苔為之名側理紙薛道衡詩昔時應春色引緑泛青溝今來承玉管布字轉銀鈎又扶桑國出芨皮紙今中國惟有桑皮紙蜀中藤紙越中竹紙江南楮皮紙南唐以徽紙作澄心堂紙得名若蜀箋呉箋皆染搗而成蜀箋重厚不佳今呉箋為勝負暄雜録蠲紙溫州作蠲紙潔白𦂳滑大畧類高麗紙東南出紙處最多此當為第一烏程由拳皆出其下呉越錢氏時供此紙者蠲其賦役故號蠲紙云植杖閑談墨陰象今書通用墨者何葢文章屬陰墨陰象也自陰顯於陽也墨者晦也言似物晦墨也釋名畫灼墨者黒也字從黒土墨者烟煤所成土之類也古人灼龜先以墨画龜然後灼之兆順食墨乃吉説文湼墨周書有湼墨之刑荘子云䑛筆和墨晉公墨纕邑宰墨綬是知墨其來久矣畫掌張儀蘓秦同志寫進遇聖人之文則以墨畫掌及股𠂻以記之拾遺記隃糜漢制尚書郎作文書起草月賜赤管大筆一雙隃麋大墨一枚小墨一枚漢宮石墨陸士龍與兄云一日上三䑓得曹公藏石墨數十萬片云燒此消復可用然不知兄頗見之否今送三螺贈墨漢時王朗為㑹稽太守子肅隨之郡徃東齋中夜有女子從地出稱越王女與肅語曉别贈墨一丸肅方欲注周易因此便覺才思開悟顧野王與地志數蠡石崇奴劵曰張金好墨􅂈市數蠡并市豪筆備即寫書童子硏墨義熈中三藏佛䭾䟦陁住建業謝司空寺造䕶净堂譯華嚴經堂下忽化出一池常有青衣童子自池中出與僧洒净硏墨斮髓西天釋迦佛為磨休王時剥皮為紙斮髓為墨寫大乘經宋雲行記樊槻陶隠居云樊槻皮水漬以和墨書色不脫即秦皮也楯鼻磨頴川荀濟與梁武有舊而素輕梁武及梁受禪遂入北嘗云㑹於楯鼻磨墨作文檄梁晝眉周宣帝令外婦人以墨畫眉葢禁中方得施粉鎮庫墨任道源家有唐髙宗時鎮庫墨重二斤許質堅如玉石銘云永徽二年鎮庫墨春渚紀聞上谷墨唐𤣥宗修圖書創集賢院大府月給蜀郡麻紙五千畨季給上谷墨三百三十六丸歲給河間景城清河􅀶平四郡兎千五百皮為筆才藝文志墜池仍舊偽蜀有童子某者能誦書孟氏召入甚佳其頴悟遂錫之衣服及墨一丸後家僮誤墜於庭下盆池中後數年重植盆中荷芰復獲之堅硬光膩仍舊或云僖宗朝所用之餘者墨官昔祖氏本易定人唐氏之時墨官也今墨之上必假其姓而號之大約易水者為上其妙者必以麝角膠煎為膏而和之故祖氏之名聞於天下今太行濟源王屋亦多好墨有圓如規亦墨之古製也有以枯木烟為之者尤粗又云上黨松心為之尤佳突之末者為上雨濕不滅西域僧言彼國無硯筆紙但有好墨中國者不及也云是鷄足山古松心為之僕嘗獲貝葉上有梵字數百墨倍光澤㑹秋霖為忩雨濕因而楷之字終不㓕刃可裁紙常侍徐鉉云建康東有雲宂山西有石墨親常使之又云㓜年常得李超墨一挺長不􅂈尺細方知筯與其愛弟鍇共用之日書不下五千字凡十年乃盡磨處邊際有刃可以裁紙自後用李氏墨無及此者超即廷珪之父也唐末陶雅為歙州刺史二十年嘗責李超云爾近所造墨殊不及吾初至郡時何也對曰公初臨郡歲取墨不過十挺今數百挺未已何暇精好焉道池不變唐末墨工李超與子廷珪自易水渡江居歙本姓奚江南賜姓李氏廷珪始名廷邽故世有奚廷珪墨又有李廷邽墨或作庭珪者偽也其弟庭寛二廷直宴安子文用皆能世其業祥符中治昭應宮用庭珪墨為染飾有貴族嘗遺一丸于池中踰月臨池飲又墜一金器乃令善水者取之併得墨宄色不變表裏如新北齊閑覧其雙脊様李氏至歙州以其地多松因留居以墨名家其墨有劍􅆃圓餅面多為龍紋仁宗宴近臣於群玉殿嘗以其墨賜之曰新安香墨其後翰林承旨賜者皆廷珪雙􅆃龍様尤為嘉品渑水燕談李氏故物秦少㳺有李廷珪墨半丸不為文理質如金潘谷見之而拜曰真李氏故物也我再見矣又有張遇墨一團面為盤龍鱗鬛悉具其背有張遇麝香四字張遇后梁供備使潘谷之墨香徹飢骨磨斫至盡而香不衰後山叢談四和相州韓家有李廷珪一墨曰臣廷珪四和墨春者紀聞白墨近黟歙間有人造白黒色如銀迨硏訖即與常墨無異即未知所製之法石墨黟縣南一十六里有石嶺上有石墨土人多採以書有石墨井是昔人採墨之所今懸水所淙激其井轉深一矣新安郡記南雄州江中有石墨色軟嫩可層層掲得近年因齊唐官廣州其嫂以婉屬取此石墨遂傳云可治婦人血疾今土人以鋸解成片吏人上案牘小兒學成皆代以磨墨不知以婉何以知也鎻碎録懐化郡掘塹得石墨甚多精好寫書今山中多出朱石亦可以入朱硯中使顧㣲廣州記雷公墨嶺表有雷墨葢雷州廟中雷雨勃起人多於野中獲得石狀如黳石謂之曰雷公墨也扣之鎗鎗然光瑩可愛劉恂嶺表録兾噴墨海人云明河魚即秦王筭袋魚也昔秦王東遊弃筭袋於海比為此魚形一如筭袋兩帶極長墨猶在腹人捕之必噴墨昏人目也其墨人用寫劵歲久其字㓕如空紙焉無行者多用之也螺量丸枚陸雲與兄書今送墨二螺婦人集汲太子妻李與夫書云致尚書墨十螺梁科律御墨一量十二丸皇后妃一量一百丸蔡質漢官儀曰尚書令僕丞即月賜隃麋大墨一枚小墨一枚宋元嘉中格寫書墨一丸限二十萬字比户録飲墨水北齊朝㑹儀諸郡守勞訖遣陳土宜字有謬誤及書跡濫劣者必令飲墨水一升開寳通禮價不二賣墨者潘谷墨既精妙而價不二士或不持錢求墨不計多少與之一日忽取欠墨錢券焚之飲酒三日發狂浪走遂赴井死人下視之葢跪坐井中手尚持數珠也張元明説林不感几墨日日用之一歳纔减半寸者萬金不換相墨經科舉進士科進士科始於隋大業中盛於貞觀永徽之際縉紳雖位極人臣不由進士者終不為美以至歲貢恒不減八九百其推重謂之白衣公卿又曰一品白衫其艱難謂之三十老明經五十少進士其負倜儻之才變通之術蘓張之辨説荆聶之膽氣仲由之武勇子房之籌畫𢎞羊之書算方朔之詼諧咸以是而晦之修身慎行雖處子之不若其有老死於文塲者亦無所恨故有詩曰太宗皇帝真長䇿賺得英雄盡白頭國史補時尚李肇曰進士為時所尚久矣是故俊人由此出者終身為文人故争名常切為時所弊其都㑹謂之舉塲通稱謂之秀才投刺謂之鄉貢得第謂之前進士互相推敬謂之先軰俱㨗謂之司年有司謂之座主京兆府考而升者謂之等第外府不試而貢者謂之㧞解將試相保謂之合保羣居而賦謂之私試造請權要謂之闗節激揚聲價謂之還徃既㨗列姓名於慈恩寺塔謂之題名大讌於曲江亭子謂之曲江㑹曲江大㑹在闗試後亦謂聞喜宴後同年各有所之亦謂之為離㑹可也籍而入選謂之春闈不㨗而醉飽謂之打毼氉匿名造牓謂之無名子退而肄業謂之過夏執業以出謂之夏課挾藏入試謂之書䇿此其大畧者也其風俗繫於先逹其制置存於有司雖然賢者得其大者故位極人臣常十有二三登顯列十有六七而元魯山張睢陽有焉劉闗元修有焉上四科詔書故事三公辟召以四科取士一曰徳行志節二曰經通行脩三曰明通律令四曰剛毅多畧才任二輔劇縣令崔寔政論飲墨水北齊選舉多㳂後魏之制天子常服乘輿出坐於朝堂中楹秀孝各以班草對字有脫誤者呼起立席後書有濫劣者飲墨水一升文理孟浪者奪席脱容刀通典一門三秀杜正𤣥舉秀才試䇿髙第楊素怒曰周孔更生尚不得為秀才刺舉何忽妄舉此人乃以䇿抵地使擬司馬相如上林賦等五篇素讀數遍大驚曰誠好秀才北史隋時重舉秀才天下不十人而杜正倫一門三秀才雕蟲小藝持書侍御史李愕以選才失中上書曰自魏之三祖更尚文詞忽君人之大道好雕蟲之小藝下之從上有同影響競騁浮華遂成風俗江左齊梁其弊彌甚貴賤賢愚唯務吟詠遂復遺理存異尋虚逐㣲競一韻之竒争一字之巧連篇累牘不出月露之形積按盈箱惟是風雲之伏代俗以此相髙朝廷據茲擢士禄利之路既開愛尚之情愈篤於是閭里童昏貴逰總角未窺六甲先製五言捐本逐末流徧華壌遞相師祖澆離愈扇通典隋進士張從師祖損之隋大業中進士甲科位至侍御史諸曹員外郎損之生汯以碩學麗藻名動京師亦舉進士自監察御史為㑹稽令獨孤及法曹参軍從師墓志唐制唐貢士之科有秀才有明經有進士有明法有書有筭每歳仲冬郡縣館監課試其成者計吏㑹屬僚設賓主陳姐豆備管弦牲用少牢行鄉飲酒禮歌鹿鳴之詩召耆艾叙少長而觀焉既餞而與計偕其不在館學而舉者謂之鄉貢武徳以來禮部閲試之日皆嚴設兵衛荐棘圍之捜索衣服譏訶出入以防假濫焉通典糊名武后以吏部選人多不實乃令試日自糊其名暗考以定等第張説永昌中武后䇿賢良方正詔吏部尚書李景諶糊名較覆説所對弟一后署乙等覆試崔沔擢賢良高弟不中者誦訾之武后勑有司覆試對益工遂為第一殿試則天永昌元年二月䇿問貢舉人於洛城殿前殿試自此始覓舉今之舉人有乖事實鄉議决小人之筆行修無長者之論䇿弟喧競於州府祈恩不勝於拜伏或明制纔出試遣捜􅆒驅馳府寺之門出入王公之弟上啓陳詩唯希欬唾之澤摩頂至足兾荷提擕之恩故俗號舉人皆稱覔舉覔為自求之稱未是人知之詞察其行而度其材則人品於茲見矣舊唐槐黄長安舉子自六月已後落第者不出京謂之過夏多借静坊廟院及閑宅居住作新文章謂之夏課亦有十人五人醵率酒饌請題目於知已朝逹謂之私試七月後投獻新課并於諸州府拔解人為語曰槐花黄舉子忙南部翁承賛有詩云雨中粧㸃望中黄勾引蟬聲送夕陽憶得當年隨計吏馬蹄終日為君忙家諱凢進士入試遇題目有家諱即託疾下將息狀來出云牒某忽患心痛請出試院將息謹牒如的暴疾亦如是上主文家諱進士犯主文家諱雖音同字不同亦不敢入試如崔夣殷知舉以父名龜從則歸仁澤不敢試夜游録内出題開城中高諧知舉内出霓裳羽衣曲賦太學創置石經詩進士試詩賦自此始也盧氏雜説常雜鮑帖常衮為禮部判雜文牓後云他日登庸心無不鋭通宵絶筆恨即有餘所放雜文過者常不過百人鮑祭酒防為禮部帖經落人亦甚時謂之常雜鮑帖𫝊載燒燭三條唐制舉人試日既暮許燒燭三条韋衣貽試日光畢作詩云褒衣􅀶帶滿塵埃獨上都堂納卷回蓬巷㡬時聞吉説棘籬何日却重來三條燭盡鍾初動九轉成鼎未開殘月漸低人擾擾不知誰是謫仙才又云白蓮十朶照廊明一片昇平雅頌聲才唱第三條燭盡南宮風月畫難成而舊説亦言舉人試日已晚主文權徳輿於簾下戯云三條燭盡燒殘舉子之心而舉子遽答云八韻賦成驚破侍郎之膽故國史竇正固傳舊制夜試以二燭為限晉長興二年改令晝試正固以短書難成奏復夜試周廣順中竇儀奏復用晝文星暗大中九年日官李景亮奏云文星暗科塲當有事沈詢為禮部甚懼焉至是三科盡覆試宏詞趙拒等皆落吏郎裴諗除祭酒南部題名神龍已來幸園宴後皆於慈恩塔下題名同年中推一善書者已時他有將相則朱書之及第後知聞或遇未及第時題名處則為添前字故昔人有詩云曽題名處添前字送出城人乞舊衣摭言科舉之弊舉人大率二十人中方收一人故没齒而不登科者甚衆其事難其路隘也收人既少則争第急切交馳公卿以求汲引毁訾同類用以争先故業因儒雅行成險薄非受性如此勢使然也浸以成俗虧損國風選人不約本州所試悉令聚於京師人既浩穣文簿繁雜因此渝濫其事百端故俗間相傳云入試非正身十有三四赴宮非正身十有二三此又弊之尤者趙臣舉選議弊風江陵項氏曰風俗之弊至唐極矣王公大人巍然於上以先逹自居不復求士天下之士什什伍伍戴破㡌騎蹇驢未到門百步輙下馬奉弊刺再拜以謁扵典客者投其所為之文名之曰求知已如是而不問則再如前所為者名之曰溫券如是而又不問則有執贄於馬前自賛曰某人上謁者嗟乎風俗之弊至此極矣請孟學科懿宗咸通四年進士皮日休上䟽詣以孟子為學科曰臣聞聖人之道不過乎經經之降者不過乎史史之降者不過乎子子不異乎道者孟子也今國家有業莊列之書者亦登於科其誘善也則深而懸科也未正伏望命有司去莊列之書以孟子為主有能精通其義者其科選視明經同不報五老榜昭宗天復元年赦文令中書門下選擇新及第進士中有久在名場才沾科級年齒已髙者不拘常例各授一官於是禮部侍郎杜徳祥奏楝到新及第進士陳光問年六十九曹松年五十四王希禹年七十三劉象年七十柯崇年六十四鄭希顔年五十九詔光問松希禹可秘書省正字象崇希顔可太子校書上新平内難聞放進士甚喜特授官制詞曰念爾登科之際當予反正之年宜降異恩各膺寵命時謂此舉為五老榜摭言排斥李徳裕以巳非由科第恒嫉進士舉者及居相位貴要束于徳裕嘗為藩府從事日同院李評事以詞科進適與徳裕官同時有舉子投文軸誤與徳裕舉子既誤復請之曰某文軸當與及第李評事非與公也由是徳裕志在排斥玉泉子唐科夫科目之盛自李唐起而唐之取士猶未盡出於此也有上書而得官如和逢堯貟半千之類是也有隠逸而召用如陽城李渤之類是也有出於辟舉如韓愈之出於張建封董晉是也有出於延譽者如呉武陵之薦杜牧之是也項安世擬䇿主試不成令器正觀中考功員外郎王師旦知貢舉時冀州進士張昌齡王公瑾並有俊才聲振京邑而師旦考其文䇿全下舉朝不知所以及奏等第太宗恠無昌齡等名因召師旦問之對曰此軰誠有文華然體性輕薄文章浮艶必不成令器臣若擢之恐後生相效有變陛下風雅帝以為名言後並如其言别頭開元二十四年考功員外郎李昻為舉人詆訶帝以員外郎望輕遂移貢舉於禮部以侍郎主之禮部選士自此始侍郎親故移試考功謂之别頭訪問名士貞元七年杜黄裳知舉聞尹樞時名籍乃㣲服訪之問塲中名士樞唯唯黄裳乃具告曰某即今年主司也受命久矣帷得一人其他不能盡知敢以為請樞聳然謝云既辱下問敢有所隠即言子弟有崔元畧孤寒有林藻令孤楚數人黄裳大喜其年樞狀頭及第試珠還合浦賦藻賦制凴几假􅄰恍惚見人語之云君賦甚佳但恨未叙珠去來之意爾藻窹視其草乃足四句其年擢第及謝恩黄裳謂曰惟林生序珠去來之意若有神助閔川名士𫝊珠之去也山無色兮氣霧𡨕𡨕海無光兮空水浩浩珠之來也川有媚兮祥風習習地有潤兮生物振振見蒲陽文獻志龍虎榜唐貞元八年陸贄主司試明水賦御溝新柳詩真人賈稜陳羽歐陽詹李􅀶馮宿王涯張季友齊孝若劉遵古許季同侯繼穆贄韓愈李綘溫商庾承宣員結胡諒崔郡刑冊裴光輔萬是年一榜多天下名雋偉傑之士號龍虎榜科舉記一庄荒崔羣自中書舍人知舉歸其妻李氏因暇嘗勸樹庄田以為子孫之業笑曰予有美庄良田遍在天下夫人何憂夫人曰不聞君有此業羣曰吾前歳放春榜三十人豈非良田耶夫人曰若然者君非陸贄相門生乎曰然夫人曰徃年君掌文柄使人約其子簡札不令就試如君以為良田即陸氏一庄荒矣羣慙而退累日不食唐餘録獨異志玉笋李宗閔為中書舍人典貢舉門生多清秀俊茂唐冲薛庠袁都等時謂之玉笋因話録冬烘鄭薫侍郎主文誤以顔標為顔魯公乃取之後非是遂為舉子賦詩曰主司頭腦大冬烘錯認顔標作魯公題詩被嘲大中元年魏扶知禮闈入貢院題詩曰梧桐葉落滿庭陰鏁閉朱門試院深曽是昔年辛苦地不將今日負前心及牒出為無名子削為五言以譏之南部新書敬座主令狐峘為齊映所擠貶衢州别駕衢州刺史田敦峘如舉時進士門生也初峘當貢部放榜日貶遂與敦不相面敦聞峘來喜曰始見座主迎謁之禮甚厚月分俸之半以峘峘在衢州殆十年舊唐鸞鳯集門貞元中奉詔考定賢良草澤之士昇名者十七人及禮部擢進士第者七十有二鸞鳯把梓舉集其門而公所擢登輔相者十人楊嗣復權公集序沆瀣一氣杜審權大中十二年知舉放盧處權有獻之曰座主審權門生處權可謂權不失權又乾符二年崔沆放崔瀣譚者稱座主門生沆瀣一氣南部新書同硯主文劉虚白昔與裴坦常同硯席及公主文虚白猶是舉子試雜文日簾前獻曰絶云二十年前此夜中一般燈燭一般風不知歳月能多少猶着麻衣待至公中表不遇韓洙與沈詢尚書中表詢怜終許與成事如是歴四五年太夫人又念之復累付與詢詢知舉大中九年也自第二人邐迤改為第七人方定及放牓悞為羅洙後詢見韓洙未嘗不深嗟其命南部衣鉢放牓後狀元以下到主司庭謝名曰謝衣鉢衣鉢謂得主司名第其或主司先人同名第即謝大衣鉢也摭言唐末禮部知貢舉有得程文優者即以已登第時名次處之不以甲乙為髙下也謂之傳衣鉢和凝登第名在十三後得范魯公質遂處以十三其後范登相位官至太子太傅封國於魯與凝皆同世以為異也石林葉氏有獻詩云從此廟堂添故事登庸衣鉢亦相𫝊邵氏録徹棘和凝知貢舉是時進士多浮薄喜為諠譁以動主司主司每放牓則圍以棘閉省門絶人出入以為常凝徹棘開門而士皆肅然無譁所取皆一時之秀稱為得人受謁桑維翰亦裴皥之門生嘗謁皥皥不迎不送或問之答曰皥見翰於中書則庶僚也維翰見皥於私館則門生也何送迎之有人亦重其耿介郡國閑談裴皥官至禮部尚書放三榜四人拜相桑維翰竇正固張礪馬裔孫清㤗二年馬裔孫知貢舉纔放榜謝恩引諸生詣座主宅謁拜裴公以詩示之曰宦途最重是文衡天與愚夫著盛名三主禮闈年八十門生門下見門生世以為榮主司前定陳蜀字文郁唐乾符五年及第初夣神人謂曰當在山下水邊及第至是主司乃崔澹者豈非前兆乎閩中記韓夫子韓熈載初知貢舉人皆以為巨題熈載是夕自賦五首旦視諸生皆有可觀及著格言五十餘篇時軰罕及誘掖後進號韓夫子性好謔浪有投贄荒惡者使妓炷艾􅀈之俟來嗅曰子之卷軸何多艾氣也江南野録二天雞淮南張佖知舉進士試天雞弄和風佖但以文選中詩句為題未嘗詳䆒也有進士白試官云爾雅螒天雞鶾天雞天雞有二未知孰是佖大驚不能對亟取爾雅檢釋䖝有螒天雞小䖝黒身赤頭一名莎雞一名樗雞釋鳥有鶾天雞赤羽逸周書曰文鶾若彩雞成王時蜀人獻之江士人深於學問有如此者談苑題勅背陳彭年大中祥符中同知貢舉省試榜出有甥不預選怒入其第㑹彭年未來於几上得黄勅乃題其背曰彭年頭恼太東烘眼似朱砂鬂似蓬紕繆幸叨三字内荒唐仍在四人中取他權勢欺明主落却親情賣至公千百孤寒齊下淚斯言無路逹堯聰彭年怒抱其勅入奏章聖見而不悦然釋其罪江南野録間疑事楊大年主文舉子上請堯舜是一事為覆事答云如此疑事不須用也得清波雜志世傳歐公掌貢闈舉子問堯舜是㡬種事公曰疑事不用使此乃南唐湯悦楊鸞問答見鄭文寳江表志又載鸞詩云白日蒼蠅滿飯盤夜間蚊子又成團毎到更深人静後定來頭上咬楊鸞西清詩話鄆州進士李矩赴公試問同人李演云堯舜可對天地否演曰似此疑惑事切不可用文昌雜録朱衣㸃頭歐陽修知貢舉日毎遇考試卷坐後常覺一朱衣人時復㸃頭然後其文入格不爾則無復與考始疑侍吏及回顧之一無所見因語其事於同列為之三嘆嘗有句云唯願朱衣一㸃頭侯鯖録無㨿永叔知舉太學生劉㡬試卷判紕謬俄有間歳詔㡬懼改名煇暨試永叔在詳定所升作狀元劉原父云永叔有甚憑㨿雜志獻詩孟賓于獻主司詩那堪雨後更鳴蟬溪隔重湖路七千憶昔故園楊柳岸全家送上渡頭船主司得詩自謂得賓于之晩雅言系述託孤王仁裕知貢舉時已年髙有數子皆早亡諸孫並㓜毎諸生至門必延於中堂與夫人偶坐受諸生拜二如兒孫禮然忽一日生徒畢集出一詩牋曰二百一十四門生春風初長羽毛成衰翁漸老兒孫小它日知誰畧有情談録獻金魚庾承宣主文後六七年方授金紫時門生李石先於内庭恩賜矣承宣拜命之初石以所服紫袍金魚拜獻座主摭言牓帖一人王凝知貢舉司空圖一㨗列第四人登科同年訝其名姓甚暗成事太速有浮薄者號之為司徒空王知有此説因召一牓門生開筵宣言於衆曰某切忝文柄今年牓帖全為司空先軰一人而已由是圖聲彩益振北夣𤨏言座主辱門生封舜卿梁時知貢舉後門生鄭致雍同受命入翰林為學士致雍有俊才舜卿才思拙澁及試五題不勝困弊因託致雍秉筆當時識者以為座主辱門生同光初致仕上詩賀門生五代王仁裕知貢舉王丞相漙為狀元時年二十六後六年遂相周世宗猶及本朝以太子太保罷歸班年纔四十二􅄎初拜相仁裕猶致仕無恙嘗以詩賀漙云一戰文塲援趙旗便調金鼎佐無為白麻驟䧏恩何極黄髪初聞喜可知䟦勑按前人到少築沙堤上馬歸遲立班始得遥相見親洽争如未貴時漙在位毎休沐必詣仁裕從容終日葢唐以來座主門生之禮尤厚石林詩話父子知舉父子知舉三家髙鍇子湘湜于邵子允躬崔郾子瑶唯崔氏相去只二十年南部新書潤筆李瀚及第於和凝牓下後於座主同任學士㑹凝作相瀚為承㫖適當批詔次日於玉堂輙開和相舊閣悉取圖書器玩留一詩於榻擕之盡去座主登庸歸鳯閣門生批詔立鰲頭玉堂舊閣多珍玩可作西齋潤筆不王壺清話竊題元祐中東坡知貢舉李方叔就試將鎻院坡緘封一簡令送方叔值方叔出其僕受簡置几上有頃章子厚二子曰持曰授者來取簡竊觀乃楊雄優於劉向論一篇二章驚喜擕之以去方叔歸求簡不得知為二章所竊悵惋不敢言已而果出此題二章皆模倣坡作方叔幾於閣筆及折號坡意魁必方叔也乃章援第十名文意與魁相似乃章持坡失色二十名間一卷頗竒坡謂同列曰此必李方叔視之乃葛敏修時山谷亦預校文曰可賀内翰得人此乃僕宰太和時一學子相從者也而方叔竟下第坡出院聞其故大歎恨作詩送其歸謂平生謾説古戰塲􅂈眼終迷目五色我慙不出君大笑行止皆天子何責者是也其母歎曰蘇學士知貢舉而汝不成名復何望哉抑鬰而卒鶴林玉露三古字淳熈中汪藻􅁸知貢舉將行有一知友屡黜於禮部乃約其㑹于富陽蕭寺宻語之曰省試程文易義冐子中可用三古字既閲卷果有三古字者遂置前列及拆號非其友人也私竊怪之及友人來見藻而怒責之友人曰某以暴疾㡬死不能就試非敢相負也既而以古字得者來謁藻詰其故曰其來就試假宿富陽某寺中與僧閑步廡下見一棺僧曰此一官員女也殯此十年矣是夕夣一女子謂某曰官人省試頭塲冐子中可用三古字發科幸勿相忘使朽骨得早入土遂用前言果叨前列近已徃寺中葬其女矣王山驚嘆上恩賜詩開成一年髙侍郎鍇主文恩賜詩題曰霓裳羽衣曲三年復前詩題為賦題太學石經詩並辭入貢院日面賜大中中都尉鄭尚書放牓上以紅牋筆札一名紙云鄉貢是士李昻以賜鎬摭言登第鴈塔題名神龍以來杏園宴後皆於慈恩寺塔下題名同年中推一善書者紀之他時有將相則朱書之及第後知聞或遇未及第時題名處則為漆前字故昔人有詩云曽題名處添前字送出城人乞舊衣摭言國史補韋肇初及第偶于慈恩塔下題名後進慕効之遂成故事南部新書佛在世時有比丘見羣鴈飛乃念曰此鴈可充我之食佛曰此鴈王也不可輙食乃為營塔類説探花宴進士杏園初㑹謂之探花宴以少俊二人為探花使遍逰名園若他人先折得名花則二人被罰秦中記選最少者三人為探花使世謂之探花郎東軒筆録唐大中以來禮部放榜有姓氏稀僻者曰榜花南部新書燒尾士子初登榮進及遷除朋僚慰賀必盛置酒饌音樂以展歡宴謂之燒尾謂説者有虎變為人唯尾不化須為燒除乃得成人故以初蒙拜受如虎得為人木尾猶在體肌既合方為焚之故云燒尾一云新羊所觸不相親附火燒其尾則定真觀中太宗嘗問朱子奢以羊事對西齋話記又説魚躍龍門化為龍時必雷為燒其尾乃得化聞見録唐進士宇文翃雖士族子無文藻酷愛上科有女及笄真國色朝之令子弟求之不得時竇璠年逾耳順方謀繼室其兄諫議正有氣㷔能為人致科第翃聘女與璠璠為言元比果有所獲相國韋公説即其中表甚鄙之因滑䑓杜尚書宅遭火㡬爇初柩家人云老鼠尾曵火入庫因而延燎京兆謂宇文曰魚將化龍雷為燒尾近日老鼠亦有燒尾之事用以譏之北夣鬼謡錢􅁸呉興人與郎士元齊名時語曰前有沈宋後有錢郎天寳十載試湘靈皷瑟詩登進士初􅁸從鄉薦居江湖客舍聞吟於庭中曰曲終人不見江上數峯青視之無所見矣明年崔暐試湘靈皷瑟詩起即用為末句人以為鬼謡唐詩紀事泥金帖子新進士才及第以泥金書帖子附家書中用報登科之喜至鄉曲親戚例以聲樂相慶謂之喜信文宗朝遂䆮削此儀也天寳遺事日五色賦李程貞元中試日五色賦先牓落矣初出試楊於陵見其賦藁破曰徳動天鍳祥開日華於陵覧之謂程曰公今須作狀元翌日雜文無名於陵深不平攜之以詣主文亟命取程所納面對不差一字主文因擢為狀元前牓不復放矣程後出大梁聞浩名復應𢎞詞復試此題破慮浩愈於已專馳一介取既至將啓緘尚有憂色及觀浩破題曰麗日焜煌中含瑞光程喜曰李程在裏摭言至末韻侵晩水以芒動俯寒山而秀發程相大咍曰李程賦且在端日何為到夜秀發由是浩賦不能凌邁北夣破天荒唐荆州衣冠藪澤毎歳解送舉人多不成名號曰天荒解劉蛻舍人以荆解及第號為破天荒北夣時崔魏公作鎮以破天荒錢七十萬資蛻蛻謝書略曰三十年來自是人廢一千里外豈曰天荒摭言報羅羅玠貞元五年及第闗宴曲江泛舟舟沈玠以溺死後有闗試前卒者謂之報羅上九肋盧肇赴舉至京師先逢或問所從來曰某袁民也或曰袁門出舉人耶答曰袁州出舉人亦猶沅江鱉甲九肋者稀上㑹昌三年肇為狀元及第宜春録錦標盧肇袁州宜春人與同郡黄頗齊名頗富於産肇㓜貧乏與頗赴舉同日遵路郡牧於離亭餞頗而已時樂作酒酣肇䇿蹇郵亭側而過出郭余里駐程俟頗為侣明年肇狀元及第而歸刺史已下接之大慙恚㑹延肇看競渡於席上賦詩曰向道是龍剛不信果然奪得錦標歸上首冠盧肇開成中就江西解為試官未送肇有謝啓云巨鰲屓屭首冠蓬山試官謂之曰昨限以人數擠排雖獲仰展深慚名第奉凂焉得首冠蓬山之謂肇曰必知明公垂問大凡頑石在上巨鰲戴之豈非首冠耶一坐聞之大笑宜春𫝊信録新郎君薛逢晚年厄於宦途嘗䇿羸赴朝值新進士牓下綴行而出時進士團司所由軰數十人見逢行李蕭條前導曰廻避新郎君逢囅然即遣一介語之曰教道莫貧相阿婆三五少年時也曽東塗西抹來上不􅀶上州文宗曽言進士之盛宰相對曰鄉塲中自云鄉貢進士不􅀶上州刺史上笑之曰亦無柰何盧氏雜説酷愛進士宣宗酷愛進士及第每對朝臣問及第茍有科名對者必大喜便問所試詩賦題日併主司姓名或有人物稍好者偶不中第嘆惜移時常於内自題鄉貢進士李道龍上紅綾餅餤僖宗幸南内興慶池泛舟方食餅餤時進士在曲江有聞喜宴上命御􅌮衣人數各賜紅綾餅餤所司以金合進上命中官馳以賜故徐演詩云莫欺老缺殘牙齒曽喫紅綾餅餤来洛中紀異賜花懿宗開新第宴於曲江乃命折花一金合令中官馳至宴所宣口敕曰便令栽花飲酒無不為榮孤進還舟許棠晚年登第嘗曰自得一第筋骨輕健過于少年則知一名乃孤進之還舟金華子落驢彭伉湛貴俱袁州宜春人伉妻又湛姨也伉舉進士擢第湛猶縣吏妻族為置賀宴皆官人名士伉居席之右一座盡傾湛至命飯于後閣湛無難色其妻忿然責之曰男子不能自勵宭辱如此復何為容湛感其言孜孜學業未數載一舉登第伉常侮之矣時伉方跨長耳縱逰于郊外忽有家童馳報湛郎及第伉失聲而墜故袁人謔曰湛賁登第彭沆落驢今袁川西有落驢橋即其地也宜春傳信録洗眼李紳鎮揚州章孝標賦春雪詩云六出花飛處處飄粘自拂砌上寒條朱門到晚難盈尺盡是三軍喜氣銷及及第後寄紳曰及第全勝十政官金鞍鍍了出長安馬頭漸入揚州郭為報時人洗眼看紳以一絶箴之曰假金方用真金鍍若是真金不鍍金十載長安得一第何湏空腹用髙心摭言全唐詩話江神世情庾肩吾元和十年登第後過楊子江詩云憶昔將貢年抱愁此江邊魚龍互閃鑠白浪高于天今日步青草還來經此道江神也世情為我風色好唐詩紀事雲齋廣録載馮京渡江題詩同末二句第五崔偃試進士東都呉武陵謂偃曰公方為天子求竒才敢獻所益因出袖中書偃讀之乃杜牧阿房宮賦坐客皆驚武陵曰牧方試有司請以第一人處之偃謝已得其人至第五偃未應間武陵勃然曰不爾宜以賦見還偃曰如教牧果異等摭言鄭毅夫自負時名國子監以第五人送意甚不平謝主司啓云李廣事業自謂無雙杜牧文章止得第五又云騏􅂹已老甘駑馬以先之巨鰲不靈因頑石之在上筆談三頭武翊黄府選為解頭及第為狀頭宏詞為勅頭時謂武氏三頭唐語林崔元翰晚年取應咸為首㨗京兆解頭禮部狀頭宏詞勅頭制科三等勅頭南部新書張又新時號張三頭摭言同裴次元制䇿宏詞同日勅下並為勅頭時人榮之南部新書王老唐王播五十始登第同年陳通方年最少因戯拊播背曰王老王老奉贈一第言日暮途逺便同贈官也播曰擬應三篇通方曰一之謂甚其可再乎王衘之及為相通方竟為所困而終閔川名士傳㤗山送榜廣明年中鳯翔副使鄭昌圖未及第前有親表家僕過京洛於糓水店邊逢見二黄衣使人西來曰吾二人乃是今年送榜之使也自㤗山來到金天處抑署其榜子幸相遇僕遂請竊觀其榜使者曰此年狀頭姓偏傍有阝名兩字下一字在口中榜尾之人姓偏傍亦有此阝名兩字下一字亦在口中記之記之遂辭去鄭公親表頗異其事昌圖其年狀頭及第榜尾鄒希回也姓名㸃畫皆同玉堂閑話錦上披簑許孟容進士及第學究登科時號錦襖子上着莎衣摭言蔡京以進士舉登學究科時謂好及第惡科名有錦上披簑之誚焉唐詩紀事束翅鷂子李藹應舉初勤敏妙絶倫人謂之束翅鷂子咸通二年及第盧氏雜説夣鳯字鄭􅄎自説應舉時曽夣看及第榜榜上但見大書鳳字大中元年冬求解鳯翔偶看本府鄉貢試紙之首便是鳯字至東都試緱山月夜聞王子晉吹笙詩坐側諸詩悉有鳯字明年果登第焉因託録馮陶馮宿之三子陶韜圖兄弟連年進士及第連年登宏詞科一時之盛代無比焉當大和初馮氏進士及第者海内十人而公家兄弟叔姪八人傳載故實張環張環兄弟七人並舉進士談賓録茫茫隊後有東西二甲東呼西為茫茫隊言其無藝也盧氏雜説三元淳化二年孫漢公何舉進士自開封至南省廷試皆第一咸平五年王沂公曽青州南省廷試皆第一慶歴二年楊審賢寘皇祐元年馮京黄裳元豐中汶上梁逖一夕夣奏事殿中見御座前掲一牌箔金大書黄裳二字意必貴兆也因改名黄裳明年御前唱進士第南劍黄裳為第一渑水燕談柳道者泉州人遇異僧授以要旨能預言未兆或問之曰今歳狀元何姓答曰不黒不白非朱非緑復曰亦知其名乎乃舉衣裾以示人後數日㨗音至乃黄裳也遯齋閑覧五元政和中張伯紀綱以三舍釋褐徽宗御崇政殿賜之及第顧知舉吏書張克公等曰人言祖宗時有三元今綱係四元果何如克公等對曰綱自本州升貢次公試次内舍校定上舍合格次升補上等上舍皆第一人所以京師有五元之目上曰可謂得人自來止説三元今張綱五處作魁必不是偶中當優奬之遂除大學􅀶士綱金壇人其後立朝有大節為世名臣坦齋筆衡四克張奎字汝弼登淳熈丁未進士初隆興乙酉諸鄉舉時主司命題云平直正直彊弗友剛克爕友柔克深濳剛克髙明柔克巳而春官失利夣神人告曰汝若再遇四克始克有濟自以為經旨别無四克矣淳熈丁酉再試題云撫于五辰庶績其凝無教逸欲有邦兢兢業業一日二日萬九塲中遇程三畏厲聲曰汝弼可賀矣不記向時之夣耶今果有四克遂再荐三畏為解首宦㳺制科宋制科至宰相者富弼一人孝宗時復制科止得眉山李后一人后字仲信為南北史世説困學紀聞下第千佛明經張倬柬之之孫數舉進士不第捧登科記頂上戴之曰此千佛名經唐書白臘明經張鷟號青錢學士謂萬選萬中時有董方九舉不第號曰白臘明經與鷟為對僉載宋五坦率徳宗夏中㣲行西明寺宋濟葛巾犢鼻抄書上曰措大茶求一碗濟曰鼎水方煎可自潑之上又問作何事業是何姓行濟曰姓宋第五應進士舉須㬰聞呼官家濟皇恐起拜待罪上曰宋五大坦率一本上問曰今上詩何如曰聖意難測上曰宋五大坦率後禮部放榜上問有濟名否使回云無上曰宋五又坦率盧氏雜説宋濟老于文塲試賦失韻乃撫膺曰宋五又坦率矣後禮部上甲乙名徳宗曰宋五坦率否國史補招飲大言許孟容與宋濟布衣友善許知舉宋不第招宋與飲謝之酒酣許復大言曰今年為國取卿相為狀頭姚嗣卿是也後數日姚卒宋徃見許曰國家不幸姚令公薨盧氏雜説花様不同盧氏子合不中第步出都門其日風寒頗甚投宿逆旅有客續至附火吟曰學織絲綾功未多亂投機杼錯抛梭莫教宮錦行家見把此文章笑殺他又曰如今不重文章士莫把文章誇向人盧愕然憶是白居易詩因問其姓氏曰姓李世業織綾離亂前舊𨽻東都宮錦坊後宮錦災近以薄技投本行皆云如今花様與前不同不謂伎倆児以文采求售者不重於世如此且東歸也上下第詩元和十三年士人下第多為詩刺試官獨章孝標作歸燕詩獻庾承宣侍郎曰積累危巢泥已落今年故向社前歸連雲樓閣無棲處更傍誰家門户飛歐陽澥亦作燕詩獻鄭愚侍郎云翩翩飛燕畫堂開送古迎今㡬萬回長向春秋社前後為誰歸去為誰來古今詩話棄置孟郊下第詩曰棄置復棄置情如刀劔傷又再下第詩曰兩度長安陌空將淚見花而後及第有詩曰昔日齷齪不足嗟今朝曠蕩恩無涯青春得意馬蹄疾一日看盡長安花一日之間花即看盡何其速也進取得失葢亦常事而器宇不𢎞至於如此何其鄙耶唐宋遺史空囊賈島下第詩云下第唯空囊如何住帝鄉杏園啼百舌誰醉在花傍淚落故山逺病來春草長知音逢豈易孤棹負三湘夣裏輸嬴李山甫咸通中數舉進士被黜後流落河朔為樂彦禎從事多怨朝廷之執政嘗有詩云勸君不用誇頭角夣裏輸嬴總未真南部姮娥甚陋沈嵩與羅隠從事浙西幕下主公出妓衆稱殊麗便是姮娥嵩曰姮娥甚陋安可及主公驚曰書記識姮娥否曰嵩兩度到月宮折桂何為不識嵩欲警隠故有是言紀異録隠在浙幕沈山松得新榜示隠題其末曰黄土原邊狡兎肥矢如流電馬如飛㶚陵老將無功業猶憶當時夜獵歸鍾陵妓雲英隠舊見之一日譏隠猶未第隠嘲之曰鍾陵醉别十餘春重見雲英掌上身我未成名君未嫁可能俱是不如人江南李氏嘗遣使聘越越人問見羅給事否使人曰不識亦不聞名越人云四海聞有羅江東何拙之甚使人曰為金榜上無名所以不知紀事錦衣貼月沈彬字子美髙安人為詩天才狂逸少孤西遊以三舉為約嘗夣着錦綵衣貼月而飛識者言雖名播天下身不入月終不及第洪州解至長安兩舉落第第三舉贈劉象一首云曽應大中天子舉四朝風月鬢蕭踈一枝何事於君惜仙桂年年幸有餘劉象三舉無成孤寒主司覧彬詩其年放象及第五老牓即其兆也彬乾符中值四方多事遂南遊湖湘及嶺表二十餘年却迴呉中過江南受偽命官至吏部侍即致仕退居髙安雅言雜載為僧僧可隆善詩髙從誨閲其卷有觀棋句云萬般思後行一失廢前功從誨謂可隆曰吾師此詩必因事而得隆答曰某本姓慕容與桑維翰同學少負志氣多恐維翰維翰登第以至入相某尤在場屋頻年敗衂皆維翰所挫也因削髪為僧其句實感前事而露意焉從誨識鍳多此類也天定録􅎙蜋推屎髙渙久舉不第或謔之曰一百二十箇􅎙蜋推一箇屎塊不上摭言衣錦井中費絢應進士舉夣衣錦在井中覺自喜曰及第衣錦之後遊鄉井爾或曰此非佳夣衣錦井中文章未顯之兆來春果不第茅齋客話集古詩石曼卿下第集句云一生不得文章力欲上青天未有因聖主不勞千里召嫦娥何惜一枝春鳯凰詔下雖沾命豺虎叢中也立身啼得血流無着處朱衣騎馬是何人西清詩話年去年来来去忙為他人作嫁衣裳仰天大笑出門去獨對春風舞一塲蔡絛金玉詩話康了柳冕應舉多避諱謂安樂為安康以避落字也又聞橋出遣僕視之須㬰僕還曰秀才康了也遯齋閑覽綱官蜀人石揚休屢㧞鄉薦常屈春官蜀人比之綱官葢謂牙校部土貢入京師只空歸也續歸田録同年期集㑹進士榜出謝後便徃期集院狀元與同年相見請一人為録事其餘主宴主酒主樂探花主茶之類咸以其年辟之摭言有情李綘相徳宗元義方言其私同年許季同徳宗問之曰人於同年有情乎綘曰同年乃九州四海之人偶同科第或登科然後相識於情何有若其果才雖在兄弟子姪之中猶將用之况同年乎唐紀阿孩兒苖台符六歳能屬文年十六及第張讀亦㓜擅詞賦年十八及第同年進士又同佐鄭薫少師宣州幕二人常列題於西明寺東廊或竊注之曰一雙前進士兩箇阿孩児台符十七不禄讀位至禮部侍郎摭言題詩張唐卿進士第一人及第期集于興國寺題壁云一舉首登龍虎榜十年身到鳯凰池有人續其下云君看姚察并梁固不得朝官未可知後果終于京官夣溪筆談紫陌進士科始隋盛於唐偕升者謂之同年唐人尤憙期集曲江大㑹長安坊市為半空天子至御樓以觀通榜之士意氣相予甚厚否則有紫陌青雲之譏天中記卷三十八
