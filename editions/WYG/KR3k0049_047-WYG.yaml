body:
  text: 天中記卷四十七明陳耀文撰韜髪冠貫也所以貫韜髪也冠纓上古穴居野處衣毛而冐皮後代聖人易以絲麻觀翬翟之文迺染帛以效之始作五采以為服見鳥獸有冠角􅏋胡之制遂作冠冕纓縷與服志持髪人所以有冠者也所以􅀈寺髪也人懐五常莫不貴徳示成禮有修飾文章故制冠以威首别成人也白通布冠緇布冠始冠之冠也大古冠布齋則緇之今武冠則其遺象也太古未有絲繒殆麻布耳三礼圖冠等玉藻曰始冠緇布冠自諸侯下逹冠而敝之可也元冠朱組纓天子之冠也緇布冠繢緌諸侯之冠也元冠丹組纓諸侯之齊冠也元冠緇組纓士之齊冠也縞冠文武子姓之冠也縞冠素紕既祥之冠也垂緌五寸惰游之士也元冠縞武不齒之服也居冠屬武自天子下逹有事然後緌𤣥武之象冠之在首𤣥武之象也𤣥武貎之最嚴威者象在後反居首者武武至而不用者矣春秋繁露三王皮弁素積冠義始冠之緇布之冠也大古冠布齊則緇之其緌也孔子曰吾未之聞也冠而敝之可也適冠於阼以著代也醮於客位加有成也三加彌尊喻其志也冠而字之敬其名也委貎周道也章甫殷道也母追夏后氏之道也周弁殷冔夏收三王共皮弁素積禮記五采天皇太帝比辰星也含元秉陽舒精吐光居紫宫中制御四方冠有五采文曰黄帝冠黄冠白帝冠曰又黒帝冠黒文春秋合城圖大帛狄人滅衛齊桓公封衛于楚􅏀衛國忘亡衛文公大布之衣大帛之冠左閔公高冠昔齊桓公高冠慱帶以治其國楚莊王鮮冠組縷絳衣慱袍以治其國墨子遺冠齊桓公飲酒遺其冠恥之三日不朝管仲曰此有國家之恥公胡不雪之以政公曰善因發囷倉賜貧窮論囹圄出薄罪三日而民歌之曰公胡不復遺其冠乎韓子鷸冠鄭子華之弟子臧出奔宋好聚鷸冠鄭伯聞而惡之使盗誘之八月盗殺之于陳宋之間君子曰服之不哀身之灾也僖一十獬冠楚文王好服獬冠楚國效之趙武靈王具帶鵕䴊而朝趙國化之淮主術制冠莊王誅史里孫叔敖制冠澣衣淮南貃冠公孫屈子曰屈到貃冠簡彛定王使單襄公聘于宋遂假道於陳以聘楚及陳氏靈公與孔寗儀行父南冠以如夏氏單于歸告王曰陳我太姫之後也棄衮冕而南冠以出不亦簡彛乎囯語豹冠范獻子卜獵命人占之此其繇也曰君子得黿小人遺冠范獻子獵而無得遺其豹冠瑣語未能言冠哀公㑹晋侯吳子于黄池吳王夫差曰好冠來孔子曰大矣夫差未能言冠而欲冠也穀梁𫝊舜冠哀公問孔子曰昔舜何冠孔子不對公曰有問於子不對何也對曰舜之為君好生惡殺任能授賢君舍此不遵而冠是問是以緩對家語文竹成王將加元服周公使人來零陵取文竹為冠烏萃曽参鋤𤓰三足烏來萃其冠古今注枝木之冠盗跖責孔子曰爾作言造語言稱文武冠枝木之冠帶死牛之脅多辭繆説搖脣鼓舌擅生是非以迷天下之主莊子制冠傳記言魏牟北見趙王王方使冠工制冠於前問治國於牟對曰太王誠能重國若此二尺縱則治國且安王曰國所受於先人宗廟社稷至重比之二尺縱何也牟曰大王制冠不使親近而必求良工者非為其敗縱而冠不成與今治國不善則社稷不安宗廟不血食大王不求良士而任使其私愛此非輕國於二尺縱之制耶王無以應桓子新論鵕䴊高祖時籍孺孝惠時閎孺婉侫貴倖與人卧起故惠帝時郎中皆冠鵕䴊具帶傳脂粉此閎籍之屬史記不冠不見丞相公孫叔燕見上或時不冠至於汲黯見上不冠不見嘗坐武帳中黯前奏事上不冠望見黯避帳中敬禮如此上劉氏冠高祖為亭長以竹皮為冠至貴所謂劉氏冠也後令爵非公乘母得冠劉氏冠也漢書竹皮今之鵲尾冠高山冠酈食其謁沛公衣儒衣冠側注注一名高山冠溺冠沛公畧地陳留麾下騎士酈食其里中子也食其見之曰沛公吾所欲從騎士曰沛公不喜儒諸客冠來者沛公輙觧其冠溺其中未可以儒生説也上小冠杜欽字子夏家富而目偏盲茂陵杜業亦字子夏時人號欽為盲杜子夏以相别欽惡以疾詆迺為小冠廣裁一寸由是京師更謂欽為小冠杜子夏而業為大冠社子夏上冠大冠盖寛饒初拜衛司馬冠大冠帶長劍躬按行士卒之室上歩搖冠江充召見衣紗縠禪衣冠禪纚歩搖冠飛翮之纓上見之燕趙固多竒士上彈冠王陽與貢禹為友陽為益州刺史禹聞之彈其冠以待陽薦陽薦禹於成帝召為大夫上掛冠王莾居攝子字諫莾殺之逢萌謂其友人曰三綱絶矣不去禍將及人即觧冠掛東門而去東觀漢記交讓冠馬援與公孫述有舊援入蜀述見之甚喜令冠交讓之冠立舊友之位上儉素為操劉虞為公孫瓉所誅初虞以儉素為操冠敝不改乃就補其穿及遇害瓉兵捜其内而妻妾服羅紈盛綺􅅚時人以此疑之後漢書狹冠梁兾改輿服别制卑幘狹冠續漢書法冠劉暾字長生轉侍御史武庫火尚書郭彰率百人自衛而不救火暾正色詰之彰怒曰我能截君角也暾勃然謂彰曰何敢恃寵作威作福天子法冠而欲截角乎求紙筆奏之彰伏不敢言衆人觧釋乃止晉書歛髪襲冠慕容廆曽祖父慕容䟦見燕代少年多冠歩搖冠好之乃歛髪襲冠諸部因呼之為歩援其後音訛而為慕容遂以慕容為氏崔鴻十六國春秋前燕録鹿皮冠張欣泰為直閣歩兵校尉領羽林監欣泰通渉雅好交結多士名素正直輒着鹿皮冠挾素瑟有以啟武帝曰將家兒何敢作此舉止梁書鹿皮冠武帝幸劉悛第帝着鹿皮冠劉悛設兎毛衾於牗中宴樂以冠賜悛至夜乃出齊書獺皮冠陳伯之濟隂睢陵人也年十三四好着獺皮冠梁書金長冠婆利國以瓔珞繞身頭着金長冠高尺餘形如弁綴以七寳之飾上崔逞舊冠崔休兼給事黄門侍郎叅定禮儀帝常閲故府得舊冠題曰南部尚書崔逞制顧謂休曰此卿家舊事也後魏書金蝉翠緌帝臨軒冠太子于太極殿舊制太子著逺避觀金蝉蟾翠緌纓至是詔加金􅀶山梁書進賢進賢冠古緇布遺象也盖文儒之服有五梁三梁兩梁一梁人主五梁三公三梁卿大夫尚書兩梁漢太官令冠兩梁親省御膳為重也􅀶士兩梁崇儒也晉輿服志翼善冠貞觀中太宗初服翼善冠賜貴臣進徳冠因謂侍臣曰幞起自周武帝盖取便於軍容今四海無虞息武事此冠頗採古様兼類幞頭乃宜常服可與袴褶通用唐書冠加一星肅宗時司天韓穎奏五官正其官配五方臣請冠上加一星衣從方色上冠髻在首令狐徳操帝嘗問丈夫冠婦人髻比高大何邪徳操對曰冠髻在首君之象也晉之將亡君弱臣彊故江左士女衣小而裳大宋武帝受命君徳尊嚴衣裳隨亦變改此近事驗也冠冕之制董晉金吾將軍沈房有朞喪公除常服入閤帝疑以問晉又問晉對曰古者服冠冕以佩玉節歩堂上接武堂下布武君前趨進而已今或奔走以致顛仆在式朝臣皆綾􅂁五品而上金玉帶所以盡飾而奉上故漢尚書郎含香老萊綵服君父一也若然服絁縵亦非禮也帝然其言詔入閤官無趨走期以下喪不得以惨服㑹令羣臣衣本品綾袍金玉帶自晉而復玉葉冠太平公主玉葉冠虢國夫人夜光枕楊國忠鎻子帳皆輪代之寳不能計其直明皇雜録知有持盈玉葉冠比紅兒詩輕金冠寳政二年浙東貢舞女戴輕金冠以金絲結之為鵉鶴狀仍餙以五綵細珠玲瓏相續可高一尺秤之無二三分唐杜陽編狎蕩不冠嚴武鎮成都奏杜甫為参謀甫於浣花里種竹植樹結廬枕江縱酒嘯咏與田畯野老相狎蕩無拘檢武過之有時不冠其傲誕如此舊史賣平天冠廖融潘居冲更唱迭和宋太宗懲五代之弊以詞賦論䇿取士融曰豈知今日詩一似大市裏賣平天冠並無人問耶荆湖近事惠文武冠一曰惠文或曰趙惠文王所造或曰齊人見于嵗涸澤之神名曰慶忌冠乘小車疾馳因象其冠而服焉裂冠梁邵陵王綸於婁湖立園廣讌酒後好聚衆賔冠手自裂破投之唾壺皆莫敢言謝舉常預宴王欲取舉幘舉正色曰裂冠毁冕下官弗敢聞命拂衣而退王屢召不返甚有慚色南史華山宋鈃尹文為華山之冠以自表莊子示勇宋康王為無顔之冠以示勇桓子新論加首冠雖敝禮加之於首履雖新法踐之於地六韜通天冠通天冠一曰高山冠上之所服三禮圖天子通天冠高九寸黒介幘金慱山徐廣輿服雜注通天冠金􅀶山蟬謂之金顔徐爰釋逺逰冠逺逰冠諸王所服三禮圖天子雜服逺逰冠太子及諸王逺逰冠制似通天也天子五梁太子三梁徐廣輿服雜注皇太子逺逰冠翠緌張鏡宋東宫儀魏文帝與于禁詔曰昔漢高脱衣以衣韓信光武觧綬以帶李忠誠皆人主當時貴敬功勞今以逺逰冠與將軍章甫章甫殷冠名甫大夫也殷以之表章大夫也釋名殷統十二月為正其餙微大故為章甫白虎通孔子曰某長居宋冠章甫之冠禮記宋人有資章甫而適於越越人㫁髪文身無所用之莊子委貎端冠一曰委貎今之進賢則其遺象也夏曰母追殷曰章甫周曰委貎後世轉以巧意改易其名耳三禮圖周襄王賜晉文公命晉侯端委而入孔朝曰侯端之衣委貎之冠也國語委貎者何周朝廷理政事行道徳之冠名所謂委貎者周統十一月為正萬物始萌冠餙最小故為委貎言委曲有貎也白虎通鶡冠虎賁冠挿鶡尾鶡鷙鳥中之果勁者也每所櫻撮應𤓰摧碎其尾上黨所貢漢官儀武冠加雙鶡尾為鶡鷄羽林虎賁冠之鶡鷄勇鬭死乃止故趙武靈王以表武士秦施用之漢輿服志武弁武弁大冠也士服之或曰千嵗涸澤之神名慶忌冠大冠乘小車馬好疾馳齊人服之三禮圖武冠一曰武弁大冠武官冠之侍中常侍加黄金璫附蟬為餙謂之趙惠文冠漢輿服志武冠或曰繁冠今謂之大冠蔡邕獨㫁陳思王植上疏曰臣若得辭逺逰戴武弁觧朱組佩青紋乃臣之至願也魏志武弁世謂之籠冠也宋志却敵冠却敵冠前廣四寸後高三寸衛士服之三禮圖却敵冠制似進賢衛士服之漢輿服志却非冠却非冠宫殿門僕射服之高五寸禮不記又司馬彪續漢書云挿以燕尾三禮圖却非冠似長冠漢輿服志巧士冠巧士冠前高五寸後相通掃除從官服之禮不記三禮圖巧士冠高七寸不常服唯郊天黄門從官四人冠之在鹵簿中次乘輿車前以備宦者四星漢輿服志方山冠五綵方山冠各以其綵縠為之祠廟天子八佾樂五行舞人所服三禮圖方山冠似進賢冠以五彩縠為之漢輿服志昌邑王賀為王時冠方山冠漢五行志牟追母追夏后氏之道也儀禮士冠禮收收夏后氏冠名也言收歛髪也釋名夏收而祭謂之收者十三月陽氣收本舉生萬物而逹出之故謂之收白虎通冔殷冔而祭謂之冔者十二月施氣受化冔張而後得牙上殷人哻而祭縞衣而養老禮記法冠法冠一曰柱後惠文一曰獬豸冠柱高五寸以縱裏鉄柱卷秦制法冠服之禮不記三禮圖法冠秦制執法者服之天子冠通天漢制之侍中中常侍皆冠惠文加貂附蟬蔡邕獨㫁太傳胡公説春秋左氏傳有南冠而縶者則楚冠也秦滅楚以其服賜執法近臣御史服之漢輿服志武冠一曰武弁大冠侍中中常侍加黄金璫附蟬為文貂尾為餙為之趙惠文冠上定王使單襄公聘於宋假道於陳陳靈公與孔寧儀行父南冠以如夏氏留賔不見單子歸告王曰陳侯棄衮冕而南冠以出不亦簡彛乎簡畧彛常也言簡畧常服犯先王之令國其亡乎賈逵曰南冠楚冠也國語張敞弟武為梁相敞遣吏送之曰何以治梁武曰馭黠馬者利其御䇿當以柱後惠文弹治之耳秦獄吏冠柱後惠文冠如淳曰蟪蟬也冠細如蟬趐今御史冠也漢書昌邑王賀短衣大袴冠惠文冠服處曰武冠也趙惠文所服故號惠文上侍御史周官也為柱下史冠法冠一曰柱後以鉄為柱言其審固不撓或説古有獬豸獸主觸不直故執憲者以角形為冠耳漢官儀侍御史朱放請復置朱衣豸冠於内郎有犯者御史服以弹後御史張著服之以弹京兆尹嚴郢唐書樊噲冠樊噲冠楚漢㑹於鴻門項羽圖危高祖樊噲聞急乃裂衣苞楯戴以為冠排入羽營輿服雜事夜光上元夫人戴九星靈芝夜光之冠漢武内傳晨嬰王母戴太真晨嬰之冠履嬰璚鳯文之舄上芙蓉神仙服食經曰漢武帝閒居未央殿有人乘白雲車駕白鹿冠芙蓉冠曰我中山衛叔度也又陶元景真誥曰桐栢山真人王子喬戴芙蓉冠著朱衣以朱綴縫帶劍金棺𦵏狗北斗曹植與陳琳書曰夫披翠雲以為衣戴北斗以為冠帶虹霓以為紳連日月以為佩此服非不美也然而帝王不服者望殊於天志絶于心矣骨蘇高麗冠曰骨蘇多以紫羅為之周書冕垂旒冕大夫以上冠􅃉延垂旒紞纊昔者黄帝初作見説文冕所以前後􅃉延者何示進賢退不能也垂旒者示不視邪纊塞耳示不聽䜛故水清無魚人察無徒明不尚極知下故禮曰天子玉藻十有二旒前後􅃉延也白虎通黄帝作旃冕宋均曰通帛為旃冕冠之有旃應劭云周始垂旒也世本黄帝戴黄冕三礼圖祭服祭服曰冕冕猶俛俛平直貎也珠上纁下前後垂珠有文餙也釋名麻冕麻冕者何周宗廟之冠也十一月之時陽氣俛仰黄泉之下萬物被施如冕前俛而後仰故謂之冕也所以用麻為之者女功之始示不忘本不以皮皮乃太古未有禮聞之服也白虎通弁師弁師掌王之五冕豸冕朱裏延紐冕綖之覆也紐小鼻笄所貫也五綵繅十有二就繅合五色絲為之垂于延之前後各十有二所謂􅃉延也就迎也繩之每一匝而貫五綵玉十二斿則十二玉也周禮司服司服掌王之吉及祀昊天上帝則大裘而冕祀五帝亦如之六服同冕享先王則衮冕享先公饗享外則鷩冕祀四望山川則毳冕祭社稷五祀則冕祭羣小祀則麻冕上冕而祭有虞氏皇而祭周人冕而祭皇冕屬畫羽餙之禮記冕而舞諸侯冕而舞大武諸侯之僣禮也上天數王戴冕璪十有二旒則天數也上𤣥冕𤣥冕齋戒鬼神隂陽也隂陽夫婦上文為貴天子之冕朱緑藻十有二諸侯九上大夫七下大夫五士三此以文為貴也禮記恐卧魏文侯問於子夏曰吾端冕而聴古樂則惟恐卧鄭𤣥曰端曰衣樂記敬色君子端冕則有敬色表記前旒古者冕而前旒所以蔽明黈纊塞耳所以揜聴也大戴禮冕危石龍逢諌桀曰臣觀君之冕非冕冕危石觀君之履非履履春氷未有冠危石而不壓蹈春氷而不䧟也符子三命周襄王賜晉文公命晉侯端委入太宰以王命命之冕服内史賛之三命而後即冕服國語黻冕晉士㑹帥師滅赤狄晉侯請于王戊申以黻冕命士㑹將中軍且為太傳左傳德賞公還及方城季武子使公冶問問公起居公冶季氏屬大夫公與公冶冕服以卿端冕賞之固辭而後受公冶疾聚其臣曰我死必無以冕服歛非徳賞也言公畏季氏而賞其使非以我有徳襄六裂冠毁冕王使詹桓伯辭於晉曰我在伯父猶衣服之有冠冕未水之有本源民人之有謀主伯父若裂冠毁冕㧞本塞源專棄謀主雖戎狄其何有余一人昭三定冕制漢明帝採尚書臯繇及周官禮記以定制冕皆廣七寸長尺二寸係白珠子其端十二旒三公及諸侯九旒卿七旒蔡邕獨㫁秦除六冕之制明帝漢明帝也永平中使諸儒案古文始復造衮冕摯氏决疑要注彰德郭賀拜荆州刺史明帝巡狩到南陽特見嗟嘆賜以三公之服黼黼旒冕勑去幨露冕使百姓見此衣服以彰其徳陳夀益部耆舊傳用白珽珠初中興儀服不備又冕旒餙以蓊翠珊瑚雜珠顧和奏舊冕十二旒皆用玉今不能得玉可用白珽珠於是始下太常治改晉中興書大冕郊祀明帝詔曰滕以大冕郊祀天地宗祀明堂以治冕祀太廟元正大㑹朝諸侯以絺冕小㑹宴嚮餞送諸侯臨軒命王公以繡冕征伐不賔講武校獵宋記黄錦六等之冕皆有黈纊黄錦為之其大如橘自皇太子以下並犀導青纓隋書繁露牛亨問曰冕旒如繁露何也答曰綴而下垂如露之繁多故曰繁露古今注圓方制冕皆前圓後方朱裏朝上三禮圖高下冕者俛也後高前下有俯伏之形上黄帝作冕黄帝作冕垂旒目不邪視通典禮篇堯舜為堯舜以徳化為冠冕王制用玉珠叔孫通制禮多依周法古今冕俱廣八寸長尺六寸前圓後方漢用白玉珠各十二三公九青珠二千石七黒珠上魏用珊瑚魏因漢故事明帝好婦人之餙改以珊瑚通典設司服後周設司服之官掌皇帝十二冕祀昊天則蒼冕五帝各隨其方色朝日同青冕夕月同素冕地祗同黄冕神州社稷同元冕享先生加元服笄象冕享先帝食三老耕籍等以衮冕視朝大射等以山冕視朝臨法門適宴等以鷩冕皆十有二旒通典用采玉北齊採陳之制旒玉用五采以組為纓色如其綬其四時祭祀封禪皆服衮冕上垂組纓隋採北齊之法衮冕垂白珠十二旒組為纓色如其綬充耳玉笄裴正奏色並用元上去珠玉乾徳元年閏十二月詔乘輿所服冠冕去珠玉之餙長編改組紘元豐四年臣僚言古者冕弁則用紘冠則用纓今衣服令乘輿服大裘冕以組為纓色如其綬衮冕朱絲組帶為纓冕而用纓不與禮合請改用朱組紘仍改平冕為元冕用纓不赤而微黒者又别圖改上􅀈制從之品服衮冕者一品之服也鷩冕者二品之服也毳冕者三品之服也絺冕者四品之服也端冕者五品之服也平冕者郊廟武舞郎之服也爵弁者六品以下九品以上從祀之服也武弁者武官朝叅殿廷武舞郎堂下皷人皷吹按工之服也弁服者文官九品公事之服也輿服雜志執玉子路問於孔子曰有人於此披褐而懐玉如何子曰國無道隠者可也國有道則衮冕而執玉家語平天宋更名曰平天冕天子郊禮及宗廟服之通典貂蟬冠貂蟬冠胡服也貂者取其有文而不煥外柔而易内剛而勁蟬者取其清虚而識時變在位者有文而不自耀有武而不示人清虚自牧識時而動古今注補冠帽㡌釋名曰㡌冐也冐絮漢薄太后以冐絮提文帝晉輿服志紫綸㡌趙飛燕為后其弟在昭陽殿遺飛燕書曰令月嘉辰貴姉懋膺大冊上遺金花紫綸㡌以陳踴躍白綸㡌孟逹與諸葛亮書曰貢白綸㡌一顔以示微意皂㡌管寧在家恒着皂㡌布裙隨時單複魏志織成㡌朱然破魏將李典等軍斬首五百級得皷車三乗拜然左大司馬加錫御織成㡌吳書翠㡌陸遜破曹休於石亭還上脱翠㡌以遺遜上遺㡌王濛字仲祖美姿容居貧㡌敗自入肆買之嫗悦其貎争遺新㡌晉書金鏤石季龍將獵頭冠金鏤之㡌蕭方等三十囯春秋季龍獵着金鏤織成合歡㡌陸翽鄴中記云狐皮㡌沈慶之隨宗慤等代沔北諸山蠻大破之威震諸山羣蠻皆稽顙慶之患頭風好着狐皮㡌羣蠻惡之號曰蒼頭公宋書簮㡌墜側元凶劭姓生三日帝徃視之簪㡌甚堅無風而墜于劭側上不悦上鹿皮㡌何尚之大明二年以左光禄開府儀同三司侍中如故尚之在家常着鹿皮㡌及拜開府天子臨軒百僚陪位沈慶之於殿廷戯之曰今日何不着鹿皮冠上四種㡌東昏侯自造逰宴之服綴以花采錦綉羣小又造四種㡌㡌因勢為名一曰山鵲歸林以詩曰鵲巢夫人之徳東昏寵嬖滛亂故鵲反藪二曰兎度坑天意言天下將有逐兎之事也三曰反縳黄離嘍黄口小鳥也反縳之應也四曰鳯凰度三橋鳯凰者嘉三橋梁王宅處也齊書破後㡌永明中蕭諶開􅀶風㡌後裠之製又為破後㡌世祖崩後建謀廢正誅滅諸王上黄綸㡌徐龍駒常住含章殿着黄綸㡌被貂裘南靣向案代帝書勅上烏紗㡌豫章王嶷妃庾氏常有病廖上幸嶷邸後堂設金石樂官人畢至登桐臺使嶷着烏紗㡌因極宴盡歡脱㡌到溉嘗夢武帝遍見諸子至湘東而脱㡌與之於是尤敬事焉梁書初賀革之江陵也意甚不悦過别御史中丞江革以情告之答曰吾常梦主上遍見諸子惟至湘東王手脱㡌以與之此人後必當璧卿其行乎上三布㡌沙門寳誌忽重着三布㡌亦不知於何得之俄而武帝崩文惠太子豫章文獻王相繼夢上襍采㡌倭國男女皆露髻富貴者以錦繡雜采為㡌似中國胡公頭上將刑索㡌庚信逺字士操清實有仕譽仕齊為江州長史刺史陳題逹舉兵敗斬於朱雀航將刑索㡌着之曰子路結纓吾不可以不冠而死上白紗㡌桓崇祖為豫州刺史魏攻夀春崇祖着白紗㡌肩輿上城决水破之簪荷為㡌安開者安成之俗師也善於㓜術時王凝之為江州相王當行陽為王刷頭簮荷葉以為㡌與王著當時亦不覺㡌之有異到座之後荷葉乃見舉坐驚駭王不知幽明録皂㡌辛紹先有至性丁父憂三年口不甘味頭不櫛沐髪遂落盡故常垂着裙皂㡌後魏書紗㡌絨㡌齊制宫内唯天子紗㡌臣下皆絨㡌特賜平秦王歸彦紗㡌以寵之上側㡌獨孤信在秦州嘗因獵日暮馳馬入城其㡌微側詰旦而吏人有戴㡌者咸慕信而側㡌焉後周書司徒㡌高昻轉司徒公好着小㡌世因稱司徒㡌後魏書􅒤上加㡌后魏元孚貎短而秃性機辨周文以酒十􅒤上皆加㡌戯之孚曰吾兄弟甚無禮竊入王家宜早還家因持酒歸周文撫掌大笑史艾㡌陳陳暄為后主狎客後傲弄轉甚后主不能容摶艾為㡌使加于首爇之然及髪垂涕求哀弗什栁莊遽起發之并悸死上哭騎㡌後周之時着突騎㡌如今胡㡌垂裙覆帶盖索髪之遺象也又文帝項有瘤疾不卻人見每常着焉相魏之時着而謁帝故後周一代將為雅服小朝公宴咸許戴之隋書著榖㡌唐初以榖為之以隔風塵唐寶録練㡌自表唐李晟收京師每與朱泚戰必錦裘繡㡌自表李懐光惡之箴曰將務持重豈宜自表襮為賊餌裁晟曰昔在涇原士頗相畏伏欲令見之奪其心耳本傳闕田秀榮潜與通或以告還曰晨出戰以碧㡌為識視之如言盡覆其衆還輒日中誘之也請以精騎徃易為識砑硝㡌汝陽王璡戴砑硝㡌打曲明皇自摘紅槿花置㡌上極滑乆而方安喚曰花奴壓耳㡌代宗禁㡌皂衫壓耳㡌以異官唐書危㡌散衣李紳河南惡少危㡌散衣白孔六帖砑光㡌李珣子七嵗夢王母宴羣仙舞者帶砑光㡌㡌上簮花舞山香曲未終百花盡落仇池筆記作李陶子好戴大㡌蜀王衍晩年俗競為小㡌僅覆其頂俛首即堕謂之危腦㡌衍以為不祥禁之而衍好大大㡌五代史膩顔蛤王仲郎坦之與楊公絶不相得王謂林公危辨陳公道王云着膩顔蛤綸巾布衣挾左傳逐鄭康成車後問是何物塵垢囊世説林公云文度着膩顔挾左傳逐鄭康成自為高足弟子篤而論之不離塵垢囊也語林巾謹修四教巾謹也二十成人士冠庶人巾當自謹修於四教也釋名承露兩􅃨結謂之幘巾或謂之承露巾或謂覆髪巾方言㡌巾光武徵鮑永永疑不至及更始亡乃發去上將軍列侯印綬悉罷兵但幅巾與諸將詣河内幅巾謂不着冠但幅巾束首也後漢書華歆為豫章太守孫䇿畧地歆知䇿善用兵乃幅巾迎䇿魏志秃巾曹操既猜嫌忌孔融令丞相軍謀祭酒路粹枉狀奏融云位為九列不遵朝儀秃中微行唐突宫掖後漢書巾幗諸葛亮出斜谷司馬宣王拒之堅璧不與戰亮致巾幗婦人之餙以怒宣王魏志葛巾諸葛武侯與宣王在渭濵將戰宣王戎服涖事使人視武侯乘素輿葛巾毛扇指揮三軍皆隨其進止宣正聞而嘆曰可謂名士矣蜀書縑巾漢末王公多委王服以幅巾為雅袁紹崔釣之徒雖為將軍皆着縑巾太祖以天下未定擬古皮爾裁縑帛以為之􅝊合簡易隨時之義以色别貴賤可謂軍容非國容也𫝊子餙巾何進袁隗欲特表陳寔以不次之位寔謝四乆絶人事餙巾待終而已大刀巾王敦欲伐甘卓遣使送大刀巾晉書着白綸巾謝萬字萬石簡文辟為從事中郎着白綸巾鶴􅌁裘版而前帝與談移日上葛巾漉酒陶潜在家郡將侯潜值其酒熟取頭上葛巾漉酒還暴着之宋書賜鹿皮巾武帝賜陶元景以鹿皮巾後屢加禮聘並不出梁書武帝與何㸃有舊及踐祚手詔論舊賜以鹿皮巾等召之㸃以巾褐引入華林園上脱白綸巾賀徳基少逰學都門積年不歸衣資罄乏又恥服故敝盛冬止衣裌􅃭袴嘗於白馬寺前逢一婦人容服甚盛呼徳基入寺門脱白綸巾以贈之仍謂曰君方為重器不乆貧寒故以此相遺耳問姓名不答而去鬻巾自業王僧孺遷尚書左丞俄兼御史中丞僧孺㓜貧其母鬻紗巾以自業上折角巾宣政元年初服常冠以皂紗為之加簮而不施纓其制若今之折角巾也後漢書桐子巾隋大業十年左丞相牛儒下議請着桐子巾以桐木為之内皆漆詔從之劉馮事始剪紙帖巾張易之兄同休嘗謂王公大臣宴於司禮寺因謂御史大夫楊再思曰公靣似高麗請作高麗舞再思欣然剪紙自帖其巾反紫袍遂作之唐書踣様巾武后擅政多賜羣臣巾子綉􅂁靳以囘文之銘皆無法度不足紀至中宗又賜百官英王踣様巾帝在藩時冠也車服志以葛為巾武攸暨安樂公主出降遣通事舍人李邈以璽書邀之詔見曰以葛為巾不名不拜自製巾裴冕自製巾子工甚人争效之號僕射巾孔帖夾羅巾唐文宗性儉素不喜華侈駙馬韋處仁戴夾羅巾帝謂之曰慕卿門第清素以之選尚如此巾服從他戚為之惟卿非所宜也聞變不及巾李愿節度鳯翔用婚家竇綏典帳中兵驕驁怠沓衙將李臣則等因衆不忍夜斬綏首愿聞變不及巾與左右數人縋而逸圓頭巾楊供奉官及詣司長官則有羅巾圓頭巾子後遂不改車服志以珠飾巾昭宗播迁於鳯翔朱梁率諸道甲馬奉迎車駕時侯王將帥在歧下者皆以珠一顆盤幞頭脚貫以銀線而簮之又軍人咸以珠飾巾競相誇尚洎朱梁纂立乃知珠已居人上者乆矣秦再思紀異辟塵巾皇甫𤣥真于新羅得一辟塵巾持與高瑀乞田知性命翌日試于郭外時乆旱塵埃且甚高顧視馬尾鬛及左右騶從並無纎塵執之體􅁴虚凉酉陽器竒尖巾前蜀王衍好褁尖巾其狀如錐車服志白接籬山簡鎮襄陽優㳺卒嵗唯酒是耽諸習氏荆土豪族有佳水池簡每出嬉逰多之池上置酒輒醉名之曰高陽池時有兒童歌曰山公出何許徃至高陽池日夕倒載歸酩酊無所知時時能騎馬倒着白接籬舉鞭向葛彊何如并州兒彊家在并州簡愛將也晉本傳幘覆髻覆髻謂之幘巾或謂之承露或謂之覆髻皆趙魏之間通語也方言不冠之服幘古卑賤執事不冠者之所服也漢官儀無屋未冠童子幘無屋者未成人也入學小童幘也句卷屋示尚㓜小未逺冐也通典晢幘齊侯伐晉夷儀東郭書讓登犂彌從之云云齊侯賞犂彌犂彌辭曰有先登者臣從之晢幘而衣貍裘晢白也齒上下相值製裘也上首餙古者有冠無幘秦加其武將首飾為絳栢以表貴賤後稍作顔題漢興續其顔却結之施巾連題却覆之今喪幘是也至孝文乃高顔續為之耳崇其巾為屋貴賤皆服之漢輿服志緑幘武帝從舘陶公主飲董偃緑幘傳韝伏殿下乃賛曰館陶公主庖人臣偃昧死再拜謁漢書絳衣赤幘光武初起與諸李市弓弩綘衣赤幘東觀漢記坦幘馬援初見帝令中黄門引入上在宣徳殿南軒下坦幘坐援曰陛下何知臣非刺客姦臣而簡易若是上幘見寡嫂馬援外類儻蕩簡易而内重禮事寡嫂雖在閨内必幘然後見上幘壞不改巴祇字敬祖為揚州刺黒幘毁壊不復改易以水澡墨傳而用之許慎説文曰澡洗也後漢書幘肆許劭字子將劭知人入幘肆㧞樊子昭續漢書脱幘間出孫堅屯七梁東為董卓所攻衆少而不敵與其驍騎潰圍得出常着赤􅄢幘卓騎追堅堅脱􅄢幘令親近持祖茂着之堅從間道得出春秋冠幘顧悌字子通疾篤妻出省之悌命左右自扶起冠幘加襲令妻還真㓗不黷如此吳書隋機就穿廋顗字子嵩性儉家富劉與説東海王越令就換錢千萬冀其有吝因此可乘越於衆坐中間顗顗頽然已醉幘墮機上以頭就穿取徐答示下官家故有兩千萬隨公所取矣與於是乃服越甚喜晉書脱幘投地檀道濟數拒魏有功及誅憤怒氣盛目光如炬俄爾間引飲一斛乃脱幘投地曰乃壊汝萬里長城宋書裂冠毁冕謝舉臨川始興諸王常所逰踐邵陵王綸於婁湖立園廣燕酒後好聚衆賔冠手自裂破投之唾壺皆莫敢言舉嘗預宴王欲取舉幘舉正色曰裂冠毁冕下官弗敢聞命拂衣而去王屢召不反甚有慙色梁書着幘不安平秦王歸彦額骨三道着幘不安文宣見之怒使以馬鞭箠其額血出靣曰爾反時當以此骨三道後歸彦竟反云比齊書施屋漢元帝額有壯髪不欲使人見始進幘服羣臣皆隨焉向無巾王莾頭秃因施巾故里語曰王莾秃幘施屋蔡邕獨㫁庫幘梁冀改易輿服之制作平上軿車庫幘㣣冠也漢書幘皆顔短桓帝延熈中梁冀誅後京師作幘皆顔短耳長短上長下以為服妖輿服雜事平幘公孫瓉字伯珪上計吏郡太守劉基以事公車徴伯珪褠衣平幘御車洛陽身執徒養英䧺記白幍無顔昔魏武軍中無故作白幍此喪徴也白横縫其前名之曰顔晉永嘉初乃去其縫名無顔幘其後綴平四海分崩下因悲嘆無顔以生也搜神記渉氷幘湜晉明帝年少不倫常微行詔喚入以衣幘迎之渉氷過衣幘悉􅊜元帝已不重明帝忽復有此以為無不廢理既入幘不正元帝自為正之明帝大喜語林緗幘改素哀帝隆和元年太學􅀶士曹攸之等議立秋應讀令不應着緗幘改為素晉書要事緗幘謁者着緗幘大冠漢官赤幘凡救曰蝕者皆着赤幘以􅂇陽也侍臣皆赤幘帶劍摯虞夫疑翡翠幘交阯蒼梧俗以翡翠為幘廣志介幘中書監令着介幘衣衣始世本曰胡曹作衣宋𠂻注曰黄帝臣也隠形衣者隠也裳者鄣也所以隠形自鄣蔽也白虎通庇寒暑衣者依也人所依以庇寒暑也釋名衣襟衣梳謂之視黼領謂之襮縁謂之純􅀈謂之褮衣眥謂之襟衱謂之裾衿謂之袸佩衿謂之褑執衽謂之祮扱衽謂之襭衣蔽前謂之䄡婦人之禕謂之縭縭緌也裳削幅謂之纀爾雅治絲麻孔子曰昔先王未有火化食草木之實鳥獸之肉飲其血茹其毛未有絲麻衣其羽皮後果有作治其絲麻以為布帛禮器昭物臧哀伯曰衮冕黻珽帶裳幅舄衡紞紘綖昭其度也藻率鞞鞛厲游纓昭其數也火龍黼黻昭其文也五色比象昭其物也相二藍縷欒武子曰訓之以若敖蚡冐篳路藍縷以啟山林宣下不得曵地文帝衣弋綈所幸慎夫人令衣不得曵地史記三服齊國有三服之官奉獻冠幘縱為首服紈素為冬服輕綃為夏服漢書錦衣武帝末郡國賊盗羣起暴勝之為置指使者衣錦衣持斧捕之上褒衣朱慱為瑯琊太守勅官屬多作褒衣大祒不中節度自冬掾吏衣皆令去地三寸上上禇下禇帝賜南粤玉佗上禇五十衣中禇三十衣下禇二十衣常服見上江充初召見犬臺宫自請願以所常被服冠見上上許之充衣紗縠禪衣曲裙後垂交輸冠禪纚綴搖冠飛翮之纓容貎甚壯帝望而異之謂左右曰燕趙固多竒士上盛服至門雋不疑佩環玦褒衣􅀶帶盛服至門下謁暴勝之上衣服鮮明王吉字子陽好車馬衣服自奉養極為鮮明而遷徙所載不過囊衣天下服其潔而怪其奢世傳陽能作黄金也上庖人着綉更始時授官爵皆羣小賈竪膳夫庖人多着綉而衣錦袴䄡䄖諸子罵詈道中時智者見之以為服之不中身之災也後漢衣韋祭遵為人亷節家無私財常衣韋袴寝布被夫人裳不加緑上無兼副祭彤在遼東㡬三十年衣無兼副題宗美其清約賜之衣被什物無不悉備上衣屨耿恭自疏勒還衣屨穿敝形容枯稿上衣大練明徳為后身長七尺二寸方口美髪能卜易好讀春秋常衣大練􅅂不加縁朔望諸姫主朝請望見后袍衣疎麄反以為綺縠就視乃笑后辭曰此繒特直染色故用之耳六宫莫不歎息上青絳采衣袁忠乘船戴笠詣王朗見朗左右僮從皆着青絳采衣非其奢麗即辭疾發而退謝承後漢書賜服郭賀拜荆州刺史有殊政題宗巡狩到南陽特見嗟嘆賜以三公之服黻黼冕旒勅行部去䄡幃令百姓見其容服以彰有徳上三世長者文帝詔曰三世長者知被服五世長者知飲食此言被服飲食難曉也魏志白布皁衣明帝徴管寧為光禄勲辭不就詔問青州刺史程喜寧守節高乎審疾至頓耶喜上言寧相着皁㡌布􅃭袴而裙隨時單複出入閨庭能自任杖不須扶持四時祭祀輒自力强改加衣服着絮巾故在遼東所有白布单衣親薦饌饋跪拜成禮上玉衣覆上文昭甄后以漢光和五年十二月丁酉生每􅃦寐家中髣髴見有人持玉衣覆其上者常共恠之魏畧衣敗清吏王允為吏部郎中選郡守明帝疑其所用非次召入將加罪允妻阮出謂曰明主可以理奪難以請求允頷之而入帝怒詰之允對曰某郡太守雖限滿文書先至年限在後月限在前帝取事視之乃釋遣山望其衣敗曰清吏也吕氏春秋賜衣百領孫權每賜周瑜衣寒暑皆百領諸將皆不能及吳書如厠易新石崇以奢豪矜物厠常有十餘婢列侍置香粉有容如厠皆易新衣而出客多羞脱故而王敦脱故着新意氣無怍婢相謂曰此必能作賊晉書韋布衣高士郭文字文舉河内軹人也洛陽䧟入吳居大辟山恒着鹿裘葛巾餘杭令顧颺與葛洪造之颺使致韋布衣不納使置室中乃爛於内竟不服用上今本作袴褶一具百結董威輦不知何許人忽見洛陽止宿白社中於市得殘許繒輒結以為衣號曰百結衣王隠晉書不容換服沈慶之領隊防東掖門劉湛被收之夕上開門召慶之慶之戎服履韎縳袴入上見而驚曰卿何意乃爾急装慶之曰夜半喚隊主不容換服宋書着小皮衣明帝體肥憎風夏月常着小皮衣上召着黄羅明帝疾召禇彦囘入帝坐帳中流涕曰吾近危篤故召卿欲使着黄羅耳指床頭大凾曰文書皆凾得不復開彦囘亦悲不自勝黄羅􅘼乳母服也上増損制度范曄性精微有思致觸類多善衣裳器服莫不増損制度世人皆法學之上澣衣稱疾江湛字微深為吏部尚書家甚貧不營財利餉饋盈門一無所受無兼衣餘食嘗為上用召遇澣衣稱疾經日衣成然後起上不衣自煖謝超宗為義興太守昇明二年公事免詣東府門自通其日風寒高帝謂曰座曰此客至使人不衣自煖上白服侍宴宋元嘉制諸王入齋各得自服􅅂㡌見主人唯出太極西廂乃備朝衣車駕幸其弟乃白服烏紗㡌以侍宴焉至於衣服制度動皆陳啟事無專制齊書裁減稱體高帝即位後手詔賜張融衣曰見卿衣服粗故成乃素懐有本交爾藍縷亦虧朝望今送一通故本意謂雖故乃勝新也是吾所着已令裁減稱卿之體衣履一量上脱朝服陶元景永明十年脱朝服掛神武門上表辭禄詔許之上衣垢不前王思逺立身簡㓗諸容詣己者覘知衣服垢穢方便不前儀形新楚乃與促􅂰雖然及去之後猶令二人交帚拂其坐處上戒嚴須紫王琨性儉約景和中討義陽王㫤六軍戒嚴應須紫服左右欲雲辨琨曰元嘉初征謝晦有紫服在匣不須臾製檢取果得焉朝服穿補劉溉性率儉不好聲色庭室單牀傍無姫侍冠履十年一易朝服或至穿補梁書衣裳熨燋何敬容為吏部尚書侍中領太子中庶子敬容身長八尺白哲美鬚眉性矜莊衣冠鮮麗武帝雖衣而左右衣必須㓗嘗有侍臣衣帶卷摺帝怒曰卿衣帶如繩欲何所縳敬容希㫖故益鮮明常以膠清刷鬚衣裳不整伏牀熨之或暑月皆為燋上冬月葛帔任昉有子東里西華南容北庾西華冬月着葛帔練裙上遺裙衫迎任昉為義興太守友人彭城劉溉弟洽從昉共為山澤遊及被代登舟止有絹七疋米五石至都無衣鎮軍將軍沈約遺􅅂衫迎之上着百戯衣樂浪王萬夀孫忠明帝時位太常少卿孝武帝汎舟天泉池命宗室諸王陪宴忠愚而無智性好衣服着紅羅􅃭繡作領碧納袴錦為縁帝謂曰朝廷衣冠應有常式何為着百戯衣忠曰臣少來所愛情存綺羅歌衣儛服是臣所願帝曰人之無良乃至此乎後魏書䓙靡見譏胡叟於高允館中見書侍郎李璨被服華靡叟貧老衣褐璨頗忽之叟謂曰老子今若相脱體上袴褶衣㡌君欲作何計也譏其唯假成服璨愓然失色上絶食㗖袖文宣因元韶幽於京畿地牢絶食㗖衣䄂而死上竇走易衣爾朱敞字乾羅彦伯之誅敞小隨母養於宫中年二十敞自竇走大街見童兒羣戯觧所着綺羅金翠服易衣而遁追騎至不識敞便執綺衣兒比䆒門知非㑹日已暮由是免北齊書絲袍拂踝徐陵為吏部尚書精簡人物縉紳之士皆嚮慕焉陳暄以玉㡌簮挿髻紅絲布褁頭􅂁拂踝靴至膝不陳爵里直上陵坐陵不知識命吏持下暄徐歩而出舉止自若竟無怍客作書謗陵陵甚病之陳書衣繿縷齊後主於􅁐内作貧兒村親衣繿縷之服而行乞其間以為笑樂多令人服烏衣以相執縳後主果為周所敗被虜妃后窮困至以賣燭為業隨書差等太宗詔冠冕制度已備令文尋常服飾未為差等於是三品以上服紫四品以上服緋六品七品以緑八品九品以青婦從夫之色仍通服唐書鳴玉曵組李綱帝以舞工安叱奴為散騎常侍綱諌曰魏武使禰衡擊鼓衡光解朝衣曰不敢以先王法服為伶人衣今先令舞胡鳴玉曵組位五品趨丹地殆非創業垂統貽子孫之道衣婦人服李密簡驍勇數十人衣婦人服戴羃内離藏刀裙下詐為家婢要者入桃林傳舍須臾變服出據其城制六服閻立徳遷尚衣奉御制衮冕六服􅆎輿傘扇咸有典法羽裳吹簫張易之時無檢輕薄者又謟言昌宗乃王子晉後身后使被羽裳吹蕭乘寓鶴裴囘庭中如仙去狀刺繡楊妃寵愛特甚宫中主貴妃刺繡者七百人楊益及諸戚里每嵗進衣服布之於庭光奪人目紫袍主事楊國忠侍郎韋見素張倚與本曹郎趨走堂下抱按牘國忠顧女弟曰紫袍二主事何如皆大噱竒服𤣥宗貴妃楊氏竒服變化若神衣帶絶孫孝哲契丹部人禄山對側門俟召衣帶絶不知所為孝哲箴縷素具徐為紉綻禄山大悦覆以己􅂁安禄山林甫稍厚之引至中書覆以己􅂁寳雞􅂁賜安禄山品目有金鵉紫羅緋羅立馬寳雞袍酉陽雜爼結今生縁開元中賜邉衣製自宫中有軍校袍中得一詩云留意多添線含情更着綿令生已過了重結後生縁持詩白帥帥以聞明皇問之有一宫人自言萬死即以嫁得詩者與汝結今生縁本事詩朝服黄裙天寳初貴族及士民好為胡服胡㡌婦人則簮歩搖釵袗䄂窄小楊貴妃常以假䰎為首餙而好服黄裙近服妖也時人為之語曰義髻抛河裏黄裙逐水流百鳥毛裙安樂公主使尚方合百鳥毛織二裙正視為一色旁視為一色日中為一色影中為一色而百鳥之狀皆見以其一獻韋后五行志碧羅籠裙安樂公主初出降益州獻单絲碧羅籠裙縷金為花鳥細如絲髪大如黍米眼鼻觜甲皆備瞭視者方見之着白者山人李泌肅宗即位欲授以官固辭願以客從入議國事出陪輿輦衆指曰着黄者聖人着白者山人帝聞因賜金紫縫戰士衣肅宗廢后張氏駐靈武産子三日起縫戰士衣太子敕止對曰今豈自養時耶已三浣肅宗性節儉嘗出衣䄂示近臣曰此衣已三浣矣乞􅃭袴初徳宗居奉天儲蓄空窘嘗遣卒視賊以苦寒乞􅃭袴帝不能致剔親王帶金而鬻之食貨志蜀襭袍韋綬徳宗時為翰林學士帝嘗幸其院韋妃從㑹綬方􅃦學士鄭栶欲馳告之帝不許時大寒以妃蜀襭袍覆而去其待遇若此文綵非制貞元六年徳宗初賜節度觀察使新製時服尚方織作呈閲所宜上曰頃來賜衣文綵不􅁪非制也朕今思之節度使以雕銜綬帶取武毅以靖封内觀察使以鴈銜威儀委取其竹列有序牧人有威儀也褐衣到闕下陽城徳宗召拜諌議大夫遣長安尉楊寧齎束帛詣其家城􅄄衣到闕下辭讓帝遣中人持緋衣衣之親紉綻衣和政公主代宗以主貧詔諸節度餉億主一不取親紉綻裳衣諸子不敢服紈絺緑袍木簡楊炎道州還也家人以緑􅂁木簡棄之炎止曰吾嶺上一逐吏超登上台可常哉且有非常之福必有非常之禍安可棄是及貶還所服無文綺餙盧懐謹服無文綺之餙解衣衣之陸贄帝親倚至解衣衣之同類莫敢望垢衣敗服武儒衡宰相鄭餘慶不事華㓗門下客多垢衣敗服獨儒衡上謁未嘗有所易常衣垢弊蕭復傳常衣垢弊澣衣小節栁公權嘗與六學士對便殿帝稱漢文帝恭儉因舉袂曰此三澣矣學士皆賀獨公權無言帝問之對曰人主當進賢退不肖納諌諍明賞罰服瀚濯之衣此小節爾朝服擅着賈直言始劉悟子從諌貴甚見直言輒衣紫擁笏以兵自衛直言諌悟曰郎少年無使襲山東熊朝服可擅着耶踰制得罪文帝朝淮南節度使李徳裕奏比以婦人長􅅂大袖朝廷制度尚未頒行微臣之分合副天心比聞閭閻之間神闊四尺今令闊一尺五寸裙曵四尺今曵五寸初延安公主以衣服踰制駙馬竇澣得罪徳裕因而奏之正服李徳裕臣在先朝嘗獻大明賦以諷二曰正服諷服御非法也視衣製廣狹漢陽公主文宗尤惡世流侈因主入問曰姑所服何年法也今之弊何代而然對曰妾自貞元時辭宫所服者皆當時賜未嘗敢變元和後數用兵悉出禁藏纎麗賞戰士由是散於人間内外矜似以成風若陛下示所好于下誰敢不變帝悦詔宫人視主衣製廣狹徧諭諸主衣紫韋澳一日召入屏左右問曰朕於敕使何如澳陳帝烕制前世無比帝搖首曰未也䇿安出澳倉卒答曰若謀之外廷則大和事可用追鍳不若就擇可任者與計事帝曰朕固行之矣自黄至緑自緑至緋猶可衣紫即合為一矣解衣以贈夏侯端夀春人王世充遣人以淮南郡公尚書少吏部印綬召端解衣服以贈端曰吾天子使寧汚賊官耶非持首去不可見即焚書及衣以衣敝辭張仲武范陽人子直方時鄭畋輔政頗言仲武㑹昌中功第一今直方百口不自存每内燕以衣敝惡辭不赴陛下録功念舊宜少優假衣紙自蔽周智光先是淮西李忠臣入朝次潼關聞智光反率兵討之㑹敗忠臣因入華大掠自赤水至潼關畜産財物皆盡官吏至衣紙自蔽累日不食者危㡌散衣開成初李紳為河南尹河南多惡少或危㡌散衣擊大毬當官道車馬不敢前紳治剛嚴皆望風遁去不為鮮明盧鈞玩服不為鮮明衣服喜鮮明李貞素衣服喜鮮明衣錦半臂來子珣遷遊擊將軍常衣錦半臂自異軿羅衣敬宗寳厯二年閩東國貢舞女二人衣軿羅之衣無縫而成其文巧織人未之識焉裙曵地淮南觀察使李德裕令管内婦人衣褒四尺者皆闊一尺五寸裙曵地四五寸者減三寸銀緋張宿使淄青裴度欲為請銀緋韋貫之曰宿㚥侫吾等縱不能斥柰何欲假以寵乎蒿氷濕衣唐咸通末淮南李公㳺江舟子刺船誤為竹蒿所濺水濕近侍衣李公為之變色裴餘慶時佐幕適在坐遽獻詩云半額鵝黄金縷衣翠翹浮動玉釵垂從教水濺羅􅃭濕疑是巫山行雨歸散幅裙周逢行為武安節度婦人所着裙皆不縫謂之散幅裙或曰裙之于身以幅多為尚周匝子身今乃散開是不周也不周不縫是姓與名俱去矣幅者福也福破散其能乆乎未㡬行逢卒陶岳荆湖近事畫雲霞蜀王衍嘗與太后太妃逰青城山宫人衣服皆畫雲霞飄然望之若仙遺浦浣衣楊行密嘗過楚州臺濛盛供帳之行密一夕去遺衣卧内皆經補浣濛帳之行密曰吾興細微不敢忘本君笑我耶濛大慙黄衫昭宗既誅宦官第五可範等凖國故事量留三十人各賜黄絹衫一領以備宫中指使仍不得輒有養男其左右神䇿軍諸道監軍並令停廢寒不假衣陳無已趙挺之邢和叔皆郭大夫壻陳在館職當侍祠郊􅉌非重裘不能禦寒氣無已止有其一其内子為於挺之家假以衣之無已詰所從來内以實告無已曰汝豈不知我不着渠衣邪却之既而遂以凍病而死謝克家作其文集序中有云篋無副裘又云此豈易衣食者盖指此事朱語録寳衣武王伐紂紂䝉寳衣投火而死六韜紫衣齊桓好服紫國人盡服之公患之管仲曰君謂左右甚惡紫臭於是三日境内莫有紫衣者韓子妾不衣帛季文子相宣成無衣帛之妾無食粟之馬仲孫它諌曰子為魯上卿妾不衣帛馬不食粟人其以子為愛且不華國乎文子以告孟獻子獻子囚之七日自服之妾衣不過七升之布文子聞之曰過而能改者民之上也使為上大夫魯語偏裻之衣晉獻公使太子申生伐東山衣之偏裻之衣偑之金玦僕人賛聞之曰大子殆哉君賜之竒竒生怪怪生無常無常不立使之出征先以觀之且是衣也狂夫阻之衣也晉語狂夫方相氏之士也阻古詛字將服是衣必先詛之䍧羊之裳晉文公好仕之惡衣故文公之臣皆䍧羊之裳韋以為帶墨于大布之衣昔晉國苦奢文公以儉矯之乃衣不重帛食不兼肉無㡬時國人皆大布之衣脱粟之飯尹文子四時衣宋景公之時懸四時衣春夏以珠玉為􅅚秋冬以翡翠為温拾遺録觧衣夜死戎夷違齊如魯天大寒而後與門弟子一人宿於郭外寒逾急謂其弟子曰子與我衣我活我與子衣子活我國士也為天子惜死子不肖也不足愛子與我衣弟子曰夫不肖之人安能與國士衣哉戎夷觧衣與弟子夜半而死弟子遂活吕氏春秋懸蓑林類榮啟期衣若懸蓑淮南小人衣齊林既者衣葦朝景公景公曰何忽服小人衣耶林既曰衣狗裘者必不羊鳴今君衣狐裘音必能不狐乎説􅁐賜衣魏文侯封太子擊於中山三年使不徃來舎人趙倉唐奉使侯問子之君長大孰與寡人倉唐曰君賜之外府之衣則能勝之文侯遣倉唐賜太子衣一襲令倉唐鷄鳴時至太子迎拜賜發篋衣盡顛倒太子趣具駕曰賜之衣非以為寒也欲召擊也無誰與謀故遺予以衣詩曰東方未明顛倒衣裳顛之倒之自公召之上懸鶉子夏家貧衣若懸鶉人曰子何不仕曰諸侯之驕我者吾不為臣大夫之驕我者吾不復見也孫卿子緇衣狗吠楊朱之弟楊布衣素衣而出天雨緇衣而反其狗吠之布恐將擊之朱曰使汝狗白而徃黒而來能不怪哉韓子大布之衣莊子衣大布之衣而過魏王魏王曰何先生之憊耶莊子曰士有道德不能行憊也衣弊履穿而貧者非憊也莊子短褐田文謂其父靖郭君曰君後宫蹈綺縠之衣而士不得短褐春秋後語五時衣高祖時大謁者臣章受詔長樂官令羣臣議天子所以服以安天下謁者趙堯舉春李舜舉夏倪湯舉秋貢禹舉冬四人各職一時制曰可舉者以各舉一時之事白之五時衣始於是漢雜事綴草為衣天漢三年渠搜國之西有祈淪國其俗淳和人夀三百嵗有大夀木之林一樹千尋若經憇此木皆不死不病或有泛海繩山來㑹其國綴毛草為繩結網為衣如今之羅紈也至元狩六年獻網衣一襲帝焚於九逹之道恐後人徴求此物故燒之烟如金石之氣拾遺以茅為衣員嶠山南有池移國人長三尺夀萬嵗以茅為衣衣服皆長裾大䄂因風以昇烟霞若鳥用羽毛也織茅為衣禮敬國其俗人年三百嵗而織芳茅以為衣盖尚書云島夷卉服之類也觀書題衣任末年十四時學無常師夜則映星望月暗則縷麻蒿以自照觀書有合意者題其衣裳以記其事門徒悦其勤學更以静衣易之時人謂任氏為經􅁐金縷衣王昌字公伯為東平相散騎常侍早卒婦是任成王曹子大女昌弟式字公儀為渡遼將軍長史婦是尚書令桓階女昌母聰明有典教二婦入門皆令變服下車不得踰侈後偕子嘉尚魏主欲金縷衣見其式婦歸嘉止之曰其嫗嚴固不聴善耳不須持徃犯人家法襄陽耆舊傳賭衣明帝寵愛肇與帝戯賭衣服有所獲輒入御帳服之趣出親狎如此曹肇傳襲私服齊王冏為大司馬輔政稽紹為侍中詣冏諮事冏召葛􅒅董艾等共論時宜􅒅等白冏曰稽侍中善於絲竹公可能操之遂進樂器紹推却不受冏曰今共為歎卿何却耶紹曰公恊輔皇室今作事可法紹雖官卑職備常伯豈可以先王法服為令人之業今逼高命不敢有辭當釋冠冕襲私服此紹之心也􅒅等不自得而退世説不好着新衣桓車騎不好着新衣浴訖婦故送新衣車騎大怒催使將去婦便持還傳語云衣不經新何由而故桓大笑而着之上鬼着生衣阮宣子論鬼神有無或以人死有鬼阮子獨以為無曰今見鬼者云着生時衣服若人死有鬼衣服亦復有鬼乎上五色玉衣太始元年魏帝以陳留王之嵗有頻斯國人來朝以五色玉為衣如今之鎧拾遺録繡衣賜死曹操遣女皁帳婢婢十人東阿婦以繡衣賜死王景興以淅米見誚南齊書崔祖思傳玉衣霍光傳珠璣玉衣師古曰漢儀注以玉為􅃭如鎧連綴之以黄金為縷要以下玉為札長尺廣二寸半為柙下至足亦綴以黄金縷也上賜霍光玉衣梓宫耿秉死上亦賜玉衣貴人死者珍異之服也染帛為服上古穴居衣毛未有制度後聖人易之以絲麻觀之翬翟之文榮華之色乃染帛以効之始作五采成以為服凡十二章董巴漢輿服志適體古之人未知衣服之制故聖人作之冬則綿帛暖且温夏則絺綌清且凉所以適身體和肌膚也墨子老而衣絲古者庶人老耋而後衣絲其餘則麻而已䀋鉄論白越单衫吳選曹令史劉卓並荒夢見一人以白越单衫與之言曰汝着衫汙火燒便潔也卓覺果有衫在側汙輒火浣之魏文帝列傳服婦人服何宴好服婦人之服傅𤣥曰此服妖也夫衣裳之制所以定上下殊内外也大雅云𤣥衮赤舄鉤膺鏤錫歌其文也小雅云有嚴有翼共武之服詠其武也若内外不殊王制失叙服妖既作身隨之亡姝嬉冠男子之冠桀亡天下何晏服婦人之服亦亡其家其咎均也紫􅂁狄仁傑轉幽州都督賜紫􅂁龜帶武后自製十二金字環統五色雙鵉其文曰敷政術守清勤昇題位勵相臣乃命録之家傳不肯服朱桃椎益州成都人澹泊絶俗被裘曵索人莫能測其為長史竇軌見之遺以衣服鹿幘麂鞾逼署鄉正委之地不肯服羣臣之服衮冕者一品之服也鷩冕者二品之服也毳冕者三品之服也絺冕者四品之服也𤣥冕者五品之服也平冕者郊廟武舞郎之服也爵弁者六品以下九品以上從祀之服也武弁者武官朝叅殿庭武舞即堂下鼓人鼓吹按工之服也弁服者文官九品公事之服也進賢冠者文武朝叅三老五更之服也逺逰冠者親王之服也法冠者御史大夫中丞御史之服也高山冠者内侍省内謁者之服也委貎冠者郊廟文舞郎之服也却非冠者亭長門僕之服也平巾冠者武官衛公事之服也黒介幘者國官視品府优謁府國子太學生四門生俊士叅見之服也介幘者流外官行署及三品以下登歌工人之服也緑幘者尚食局主膳典膳局典食大官署食官署供膳奉觶之服也具服者五品以上陪祭朝饗拜表大事之服也從省服者五品以上公事朔望朝謁見東宫之服也服袍加襴大尉長孫無忌議服袍者下加襴緋紫緑皆視其品庶人以白出車服志易青以碧則天光宅元年九月甲寅易内外官服青者以碧闕金字銘袍永夀中勑賜岳牧金銀字銘􅂁雞跖集機杼伯余之初作衣也緂麻索縷手經指挂其成猶網羅後世為之機杼淮南汜論甚遼衣服鬼名甚遼焚衣街齊東昏侯製四種冠五彩􅂁一月中二十餘出晨出三更歸夜出清晨反梁廢東昏焚奢滛異服六十二種于御街後人號其所曰焚衣街金陵志衣小裳大帝嘗問丈夫冠婦人髻皆高大何邪令狐德棻對曰冠髻在首君之象也晉之將亡君弱臣彊故江左士女衣小而裳大宋武帝時命君德尊嚴衣裳隨亦變改此近事驗也唐書紗榖单衣江充召見上衣紗榖单衣曲􅅂後垂交輸漢書共衣陳留尹苞字延􅀶與同郡范史雲善二人俱貧出入共一单衣到人門外苞年長常先着单衣前入須臾出觧與史雲謝承後漢書衣補車幰梁孝王彤宣帝子將軍衣補車幰以此為清叅軍王銓曰晏嬰大官稱清者以為御食七百家也公無此費宜美衣服使内外相稱彤有慙色王隠晉書賣衣還錢鄭𢎞為縣嗇夫民有弟斥兄錢者未還之嫂領詣𢎞賣中单為叔還錢兄聞之慙遣婦賫錢還𢎞𢎞不受㑹稽典録市衣與父吳祐為曜東相嗇夫孫性盗富民錢五百為父市单衣父恐便以单衣謁門自謝祐遂以单衣遺其父陳留耆舊傳火浣梁兾作火浣布单衣㑹賔客行酒失盃而汚之偽怒觧衣而燒之垢盡火滅粲然潔白𫝊子梁兾作狐尾单衣上短下長别𫝊单衣有餘邊讓才辯俊逸孔融薦讓於武帝曰邊為九州之被則不足為单衣䄡䄖則有餘别𫝊華曜懐愧張君平與妹憲書曰念諸里舎皆富財賄袿䙱襲蔽紛華照曜於是之除想汝懐愧婦人集介幘優申石勒叅將周承為舘陶令㫁官絹數百疋獄以入坐議宥之後每設大㑹使優兒着介幘黄絹单衣優問曰汝何官答曰我本為舘陶令斗藪单衣曰正坐取是故入汝輩以為本笑趙書緼袍以示靈帝欲以羊續為太尉時拜三公者皆輸東園禮錢千萬于使督之續乃舉緼袍以示之曰臣之所資惟斯而已故不登公位袁山松後漢書續出黄紙補􅂁以示使人時人謠曰天下清苦羊續祖古今善言青絲􅂁郭璞每自為卦知其㓙終嘗逢一趍走來年便脱青絲袍與之此人不觧其意璞曰身命卒當在君手故逆相屬耳及當死果此人行刑傍人皆為屬求利璞曰我常託之乆矣此人為之歔欷哽咽行刑既畢乃説如此搜神記㝠婦珠袍有談生者年四十無婦夜有女年十六六姿色無雙來為生妻經三年遂乃生一兒曰慎勿以火照我後三年可照耳生不能忍照之腰上肉如人腰以下但枯骨婦求去將入華堂奥室以珠􅂁與之生至市賣袍睢陽王識是女袍收栲談生談生具對呼兒似王女捜神記䄂長三丈母􅉌儉征浟􅀈使王頃窮其東界父老云曽有破船從漢海流得布衫身如中國人但兩䄂俱長三丈異苑􅀶袍楚莊王觧冠緼紐纓綘衣􅀶袍以理其國政也墨子襦短衣􅃭短衣也一曰羅衣羅温也奴案反説文􅃭煗也言温煗也单􅃭如􅃭而無絮也反閉􅃭之小者也却向着之領含於項反於背後閉其衿也釋名小獄􅃭袴子産治鄭鄧析務難之約民大獄一衣小獄􅃭袴鄭國大亂子産殺鄧析而民服吕氏春秋左開之􅃭勾踐與妻入臣吳夫人衣無縁之裳左開之􅃭莝以養馬吳越春秋綺繻班伯為侍中與王許子弟為羣在於綺繻紈袴之間非其好也漢書珠􅃭昌邑王被廢太后被珠􅃭如淳曰以珠飾􅃭晉書曰貫珠為􅃭盛服坐武帳中王前聽詔珠􅃭䂊賜哀帝以東園秘器珠􅃭玉柙皆豫以賜董賢織􅃭趙飛鷰為皇后其弟在昭陽殿上遺織成上􅃭兩京雜記遺􅃭待詔景子春素善占坐事繫其婦朱君至獄門通言遺􅃭袴子春驚曰朱君來言與朱為誅袴而􅃭中絶者也我當誅㫁也後遂腰斬桓譚新論與徒作􅃭鍾離意為司徒侯覇府議曹掾詔送三百人到河北遇隆恩到𢎞農意輒使屬縣令出錢與徒作􅃭袴光武謂侯覇曰君所使吏仁恕用心乎吳越春秋䄡􅃭來歙詣雒見上上大喜觧所披䄡􅃭衣歙東觀漢記布􅃭第五倫性節儉為二千石常衣布􅃭上布􅃭袴裙梁鴻妻孟氏女布􅃭袴裙鴻曰此真梁鴻妻也上皂㡌布􅃭管寧嘗着皂㡌布􅃭隨時单複魏志官中物司馬宣王從遼東還有六十假士寒凍于車乞一􅃭公乞之酒左右曰官不少􅃭可賜之公乞之酒曰􅃭官中物臣無私施世説脱􅃭不受謝眺為吏部侍即過侯江革時大寒雪見革敝絮單席而眈學不倦差嘆乆之乃脱其著􅃭并手割半氊與之充坐具而去紫羅􅃭謝鎮西着紫羅􅃭據胡床弹琵琶作大道曲語林脱􅃭武陵昭王頴過竟陵王子良宅冬月道逢乞人脱􅃭與之子良見其衣单進􅃭於頴笑曰我與向人亦復何異齊書不敢觧􅃭顧恊少清介有志操初為廷尉正冬服单薄寺卿蔡法度欲觧􅃭與之憚其清嚴不敢發口謂之曰我願觧身上􅃭與顧即難衣食者竟不敢以遺之梁書常服布􅃭郭祖深清儉常服故布􅃭上神送北斗索君正為豫章内史性不信巫邪有師世榮稱道術為一郡巫長君正在郡小疾主簿熊􅉌簏巫師云須疾者衣為信命君正以所着􅃭與之事竟取􅃭云神將送與北斗君君正使檢諸身於衣裏獲之以為亂政即刑於市而焚神一郡無敢行巫上婦着小􅃭高祖復至鄴見公卿曰朕昨日入城見車上婦人冠㡌而着小􅃭襖者尚書何為不察任城王澄曰着者猶少帝曰任城意欲全着乎一言可以喪邦其斯之謂可命史官書之後魏書珠􅃭吳王闔閭𦵏女以珠􅃭之寳吳越春秋夏着暑􅃭紐伯子者冬着單衣盛暑􅃭袴列仙傳青􅃭東海君以織成青􅃭遺陳節方列異傳着金􅃭乾羅者慕容廆之十一世祖也着金銀􅃭鎧乘白馬金銀鞍勒自天而墮鮮卑䄂之推為君長述異記衫末無䄂端衫芟也衫末無䄂端也􅃭襠其一當胸其一當背也釋名䄡􅃭陳魏宋之間謂之䄡或謂之单􅃭揚䧺方言織衫建康小吏曹著為蘆山使君所迎配以文婉著形意不安屢求請退婉澘然流涕賦序别并贈織成禈衫也晉東宫舊事寄愍懐以體上白絹单衣一領因士寄與妃晉惠帝起居注納布徐湛之母㑹稽公主高祖微時有納布衫襖等衣皆是武敬皇后手自作高祖既貴以此付公主曰後代若驕奢不節者以此示之宋書兩襠衫薛安都與魏多縱突騎衆軍患之安都怒甚乃䏹兠鍪觧所帶鎧唯着絳納兩襠衫馬亦去具装馳馬賊陣猛氣咆􅣋所向無當其鋒者宋書求衫到溉為建安太守任昉以詩贈之求二衫云䥫錢兩當一百代易名實為惠當及時無待凉秋曰溉合云余衣本百結閩中徒入蠶假令金如粟詎使亷夫貧上青􆀈兩襠太始二年御史丞羊希奏山隂令謝洸親憂未除常着青綘納兩襠請免沈前所居官也宋起居注被衫甲陽休之除散騎常侍監修起居注頃立坐事左遷驍騎將軍衣兩襠文宣郊天百僚咸從休之為驍騎將軍衣兩襠用手持白棓時魏收為中書令嘲之曰義真服未休之曰我昔為常伯首戴蝉冕令處驍遊身被衫甲允文允武何必減卿談笑晏然議者服其夷曠齊書不獨衣衫德宗在梁州地熱未給將士春衣夾服以侍朝左右請御衫上曰從我者冬服未易我豈可獨衣衫乎將士聞之莫不流涕唐書裙下裳裙下裳也連接裙幅也緝下横縫緝其下也縁裙裙施縁也釋名裏衣裙裏衣也古服裙不居外皆有衣籠也上帔裙陳魏之間謂裙為帔繞衿謂之裙方言織成趙飛燕為皇后其女弟上織成下裙西京雜記無縁戴良家五女皆布裙無縁裙四等汝南先賢𫝊布裙王良為司徒司徒妻布裙徒跣曵柴東觀漢記秃裙漢明德太后秃裙不縁續漢書長裙上短獻帝時女子好長裙而上甚短五行志攣縮燉煌俗婦人作裙攣縮如羊腸用布一疋皇甫隆為太守禁改之魏畧恒着管寧恒着布裙魏志絳碧崇進皇太后為太皇太后有綘碧絹雙裙綘絹䙱裙緗綘紗複裙白絹裙晉宋舊事單帛惠帝還洛陽得鹿犢車一乘以單帛裙為幃也四王起事書裙羊欣字敬元年二十時王獻之為吳興太守甚知愛之欣嘗夏月着新絹裙晝􅃦獻之入縣見之書裙數幅而去欣書本工因此彌善宋書啟藏腰中魚復侯子響不道帝以兵圖之有司奏絶子響屬籍賜為蛸氏子響密作啟數紙藏妃王氏裙腰中具自申明云輕舫還闕而不得見此苦之深惟願矜之無使竹帛齊有反父之子父有愛子之名齊得裙繫槊何間人齊與太武攻赤連昌帝以微服入其城齊固諌不許乃與數人從帝入城内既覺諸門悉下帝及齊等因入其宫中得婦人裙繫之槊帝乘而上因此得㧞於齊有力焉後魏書真珠裙世祖為胡皇后造真珠裙積所費不可勝計後被火燒之比齊单裙不換孟卓字君偉少修清苦之志着单裙十六年不換後趙録青羽裙南極夫人被錦服青羽裙真人傳留仙裙成帝立飛燕為皇后帝歩太液池后歌舞歸風送逺之曲帝以文犀簮擊玉甌酒酣風起后揚䄂曰仙乎仙乎去故而就新寧忘懐乎帝令馮無方持后􅅂風止裙為之縐他日宫姝或襞裙為縐號留仙裙外傳每輕風至飛燕殆欲隨風入水帝以翠纓結飛燕之裙常怨曰妾微賤何得復與纓裙之逰拾遺記葛帔練裙梁任昉四子東里西華南容北叟俱元學墜其家聲流離不自振西華冬月著葛帔練裙道逢劉孝標泫然矜之曰我為卿作論乃著廣絶交論譏其舊友五色繡裙梁武帝作五色繡裙以朱繩真珠為餙事始仙裙隋煬帝作長裙十二破名仙裙上借民裙􅃭唐孫伏迦上表近太后常於民間借婦女裙􅃭以充妓衣于五月五日於神武門遊戱非所以為子孫法百鳥毛裙安樂公主使尚方合百鳥毛織二裙正視為一色旁視為一色月中為一色影中為一色而百鳥之狀皆見以其一獻韋后五行志碧羅籠裙安樂公主初出降益州獻单絲碧羅籠裙縷金為花鳥細如絲髪大如黍米眼鼻觜甲皆備瞭視者方見之散幅裙周逢行為武安節度婦人所著裙皆不縫謂之散幅裙或曰裙之于身以幅多為尚周匝于身今乃散開是不周也不周不縫是姓與名俱去矣幅者福也福破散其能乆乎未㡬行逢卒陶岳荆湖近事裩犢鼻滌器司馬相如初與卓文君至成都遂相謀還成都賣酒相如自着犢鼻裩滌器以恥王孫也西記雜窮袴昭帝上官后霍光外孫也光欲后擅寵有子帝時体不安左右及醫者皆阿意言宜禁内雖宫人使令皆為窮袴多其帶后宫莫有進者犢鼻上樹王澄之荆州送者傾城澄脱衣着犢鼻禈上樹取鵲􅑹傍若無人晉書以屋為裩客詣劉伶值其祼祖因責伶伶笑曰吾以天為屋以屋為裩諸君不當入何責乎晉記露禈上聽桂陽侯義融孫冕字茂德性庸鄙為郢州刺吏暑月露禈上聽事宋書紅縠欝林王常祼􅃝着紅縠裩齊書紅禈周𢎞正善𤣥理為當世所宗藏法司於開善寺講説門徒數百𢎞正年少未知名着紅禈錦文髻踞闗而聽衆人茂之弗譴也既而乘間進難舉坐盡傾法師疑非是人覘之知相賞狎𢎞正後為左氏尚書夏月着犢鼻裩衣朱衣為有司所奏弹其放逹如此梁書擲摶無禈吉士瞻少時嘗於南蠻國中擲摶無禈褰露為儕軰所侮及平魯休烈軍得絹三萬疋乃作百裩其外并賜軍士不以入室上犢鼻登閣謝㡬卿姓通脱在省署夜着犢鼻裩與門生登閣道飲酒酣呼為有司糺奏坐免上裳障蔽上曰衣下曰裳裳障也以自障蔽也釋名入祼觧裳禹入祼國欣起而觧裳俗説禹治洪水乃播入祼國君子入俗不改其恒於是欣然而觧裳也原其所以當言皆裳祼國今吳即是也被髪文身祼以為餙盖正朔所不及也猥見大聖之君悦禹文德欣然皆着衣裳矣風俗通王千服綉桀之時女樂三千人無不服文綉衣裳者管子以裳褁首華登以吳師救華氏齊烏枝嗚曰用少莫如齊致死齊致死莫如去備彼多兵矣請皆用劍從之華氏北復即之厨人濮以裳褁首而荷以走曰得華登矣遂敗華氏于新里昭二十一去冠披裳景公飲酒數日去冠披裳自皷盆甕而已晏子一衣五采景公飲酒數日衣縠綉之裳一衣而五采具焉上裂裳至郢楚欲攻宋墨子聞之自魯趋而徃十日十夜足重繭而不休息裂裳而裹之至于郢見楚王淮南子裂裳裹楯樊噲常持鐡楯聞項羽有意殺漢王噲裂裳以裹楯冠之入軍門立漢王旁續漢書輿服志掛樹化龍東方朔生三日而母死隣母拾而養之經嵗母忽失朔累月方歸後復去家萬里見一枯樹脱白布裳掛樹裳化為龍因名其地為布龍澤洞㝠記裳不加縁祭遵為人亷約夫人裳不加縁後漢書短布衣裳鮑宣妻桓氏女字少君宣嘗就少君父學父竒其精苦以女妻之裝送甚盛宣謂妻曰少君生富驕習美餙吾貧賤不敢當禮妻乃悉歸侍御服餙更着短布衣裳東觀漢記編草為裳孫登字公和於汲郡北山中為土窟夏則編草為裳冬則以髪自覆嵇康集自録裘皮衣説文曰裘皮衣也白虎通曰所以佐女工助温也古者緇衣羔裘黄衣狐裘禽獸衆多獨以狐羔取其輕暖因狐死首􅉌明君子不忘本也羔取其跪乳遜順也龍茸狐裘龍茸一國三公吾誰適從左僖上羔䄂齊人以郲寄衛侯右宰糓從而迯歸衛人將殺之辭曰余不悦初矣余狐裘而羔䄂乃赦之襄三賜羔公賜公衍羔裘使獻龍輔於齊侯遂入羔裘齊侯與之陽糓昭六衣貍齊侯伐晉夷東郭書讓發犂彌從之齊侯賞犂彌犂彌辭曰有先登者臣從之晢幘而衣貍製公使視東郭書曰乃夫子也定下禦寒周昭王綴青鳯毛為二裘一名燠質一名暄肌常以禦寒也至厲王流于彘彘人得而竒之分裂此裘遍于彘土罪入大辟者抽裘一毛以贖死價值萬金也拾遺䍧裘晉文公好士之惡衣故文公之臣皆䍧裘墨子衣羖孫叔敖相楚衣羖羊裘韓子繡衣貂裘晉平公使叔嚮聘吳吳人飾舟以送左右各五百人有繡衣而貂裘者説􅁐狐裘晉平公出朝有鳥環平公不去平公謂師曠曰吾聞之覇王之主鳯下之今者出朝有鳥環寡人終朝不去是其鳯鳥也曠對曰東方有鳥名諌珂其為鳥也文身而赤足憎鳥而愛狐今者君不衣狐裘以朝乎平公曰然上羖羊之裘趙簡子敝車瘦馬衣羖羊之裘其宰曰車新則安馬肥則疾狐裘則温君宜改之上出裘與寒景公時雨雪三日公披狐白之裘曰怪哉雨雪三日不寒晏子曰古之賢君飽而知人飢温而知人寒今君不知也公乃命出裘以與寒者發粟以與飢者晏子反裘負芻晏子至中升賭弊冠反裘負芻者晏子曰子何者對曰我越石父也不免凍餓為人僕三年晏子觧左􅆖贖之也上賜裘不受景公賜晏子狐白裘其賈千金晏子辭而不受三反曰君服之上而使嬰服之下不可以為教上狗號羊鳴林既衣韋衣而朝齊景公公曰此君子服耶既作色曰服何足以端士行如君言衣狗裘當狗號羊裘當羊鳴乎今君衣狐意得無變乎説􅁐麛裘孔子始用於魯魯人謗之曰麛裘而韠投之無戾韠而麛裘投之無郵用三年男行乎途左女行乎途右物之遺者民莫之舉吕覧皮裘負薪延陵季子適見路有遺金當夏五月有披裘而薪者季子呼取金薪者曰吾五月披裘而負薪豈取金者哉吳越春秋愛毛魏文侯出遊見反裘負芻者問之對曰愛毛也文侯曰爾不知皮盡而毛無所附也明年東陽上計其布十倍大夫賀之文侯曰民不増而税倍亦何異反裘負芻者厚取於下則上下不安此自危之道也子何用賀之乎新序得狐白裘秦昭王囚孟嘗君欲殺之孟嘗君使人抵昭王幸姫求觧姫曰妾願得君狐白裘此時孟嘗君有一狐白裘值千金天下無雙入秦献之昭王更無他裘孟嘗君患之客最下坐為狗盗者臣能得狐白裘乃夜為狗盗以入秦宫藏中取所献裘奉姫姫為言于王王釋孟嘗君史記委裘賈誼上書諌文帝曰天下咸知陛下之義卧赤子天下之上而安植遺腹朝委而天下不亂漢書服處曰言天下安雖赤子遺腹在位猶不危也孟康曰委裘若容衣太子未坐朝事先帝裘衣也賜貂東平王蒼來朝章帝以王觸寒渉道賜乘輿貂裘東觀漢記服羊裘馬援嘆曰殖貨財産貴其能施賑也不能守錢虜耳乃盡散以班昆弟故舊身服羊裘皮袴後漢披裘澤中嚴光世祖時遊學及世祖即位乃變名隠身不見帝思其賢乃令以物色訪之後齊國上言曰有男子披羊裘釣澤中帝令齎𤣥纁聘之三聘而後至上着氊裘劉虞為函州刺史常着氊裘謝承後漢書觧裘覆之高文惠為刺姦令史夙夜匪懈至擁􅂰袍文書而窹寐大祖常張微出觀察諸吏見而哀之徐觧裘覆之而去魏氏春秋􅏈子裘陸遜破曹休上為羣僚大㑹酒與遜對舞觧所着􅀈子裘賜遜吳志盗御裘趙王倫字子彛初封琅邪郡王坐使散騎將劉緝買工所將盗御裘廷尉杜友正緝弃市綸當與緝同罪有司奏倫爵重屬親可不坐諌議大夫劉毅駮曰王法賞罰不阿貴賤然後可以齊禮制而明典刑也倫知裘非常蔽不語吏與緝同罪晉書着裘走脱歩熊字叔羆好學兼術數趙王倫辟熊熊言倫死不乆不足應有人告倫倫怒遣兵圍之熊使諸生着巳裘南走圍者皆奔之熊密從北道走得脱王隠晉書遺母桓𤣥殺羅企生先是𤣥以羔裘遺企生所生母氏及企生遇害即日焚裘鶴氅王恭裳披鶴裘氅渉雪行孟旭曰此神仙中人也故裘賜老王敦叅軍摯瞻見敦以故壞裘賜老外部都督曰此裘雖故不如與卜吏敦曰何故瞻曰上服賜下貂蟬亦可賜下乎上雉頭裘大司馬程據上雉頭裘一領詔曰據此裘非常衣服清費功用其於殿前燒之勅内外有造異服詔罪之晉咸寧起居注孔雀裘文帝製孔雀毛裘齊書文惠太子性奢侈製珍玩之物織孔雀毛為裘光采金翠過於雉頭逺矣上青鼠裘唐邕字道和少明敏有治世才斛律金啟太后曰唐邕强幹一人當千題祖乃觧所服青䑕皮裘賜之云意在與卿共弊北齊盛暑重裘汲乘盛暑重裘重茵使人扇之恚不清凉斬扇者軍中謂之語曰仕為將軍何可羞六月重茵披狐裘不識寒暑㫁人頭趙書羽裘少昊氏都於曲阜鞬鞮毛人獻其羽裘田休子鹿裘堯之王天下也冬則鹿裘夏則葛絺韓子珍裘渠搜之人服夏禹之德獻其珍裘毛出五采光曜五色田休子褐裘夏禹時渠搜國來獻裘也帝王世紀裘有尾齊有盗狗子與胡跪子相誇盗狗子曰吾父之裘獨有尾胡跪子曰吾父冬夏獨有一足袴韓子弊補淳于髠見鄒忌曰狐裘雖弊不可補以黄犬之皮忌曰諾謹受教請擇君子無雜小人其間春秋後語送黒貂裘蘇春説李兌兌送秦黒貂裘黄衣百鎰戰國策黒貂裘弊蘇秦詣秦王上書十上而説不行黒貂之裘弊黄金百鎰盡形容枯槁及歸妻不下機嫂不為炊上吉光裘漢武帝大漢三年西國獻吉光裘色黄盖神馬之類入水不沉入火不灼十洲記鷫鸘裘司馬相如初與卓文君還成都居貧愁懣以所服鷫鸘裘就市人陽昌貫酒與文君為歡西京雜記青羔裘成帝好蹴踘羣臣以蹴踘為勞體非至尊所宜帝曰朕好之可擇似而不勞者奏之劉向作弹棊以獻帝大悦賜青羔裘紫絲履服以朝覲上白裘反衣楊興謂史高曰將軍所舉不過門下賔客富人而列士不舉是有狐白之裘而反衣也漢書錦裘魏武與楊彪書曰今贈足下錦裘二領布衣貂裘管寧自㓜安至孝每祭祀未嘗不伏地流涕恒着布衣貂裘鼲子裘魏文與孫權書曰今因趙咨致文馬一匹鼲子裘一領鳴皷撒裘魏朗字少英為郡功曹佐正旦掾吏顧龕被裘以加朝服朗以裘非臣服龕不敬勅卒撤去龕恚而不聽朗右手鳴鼓左手撒裘以聞府君喜朗遂退龕以朗代之朗辭病不就㑹稽典畧畏寒乞裘謝萬就安乞裘云畏寒答曰君妾與語正欲以為豪具耳若畏寒無復勝綿者以三十斤綿與萬語林鵠氅謝萬與安共諧簡文萬來無衣幘可前簡文曰俱但前不須衣幘即呼使入萬着白綸巾鵠氅裘履板而前共談移日大器重之世説與狐議裘挾夫私計以論公政猶與狐議裘無時而可也潜論着裘衣覆古者着裘於内而以繒衣覆之乃加以朝服㑹之時祖其朝服見裘裏覆衣謂之禓禓之言露可見之辭所以示美呈好而為飾加以朝服謂之祖謂之禓大裘不覆反本以其質也五經要義黼裘諸侯黼裘以誓田雜羔狐為黼文也上千鎰之裘或謂孟嘗君曰太廟之掾非一水之枝也千鎰之裘非一狐之皮也戰國䇿名裘毛氏國出名裘去朔方七千里外國圖與狐謀為千金之裘而與狐謀之其皮不可得也符子粹白之裘天下無粹白之狐而有粹白之裘取之於衆白也吕覧狐裘負籠夫夏日之不披裘者非愛之也暖有餘於身也裘與蓑孰急見雨則裘不用上堂則蓑不御此代為帝者白狐之裘天子之披也而在朝堂然為狐計者不若走於澤披羊裘而賃固其事也狐裘而負籠甚可怪也哉淮南子袴脛衣袴脛衣也説文袴跨也兩股各跨别也留幕冀州所名大褶下至􅂰者也留牢也幕絡也言牢落在衣表也釋名倒頓齊魯之間袴謂之褰或謂之襱闗西謂之袴大袴謂之倒頓小袴謂之芙蓉衫楚通語也方言置兒袴中屠岸賈攻趙朔朔妻晉成公姊有遺腹公宫匿之生男屠岸賈索於宫中夫人置兒袴中祝曰趙宗若滅即號若不滅即無聲乃索兒竟無聲史記鑿新為孔鄭人卜子使妻為袴曰冩吾故袴妻因鑿新袴為孔韓子經冬無袴孟嘗君食客三千人上客食肉中客食魚下客食菜馮煖經冬無袴靣有飢色列士傳俛出袴下淮隂屠中少年有侮韓信者衆辱之曰信能刺我不能出我袴下於是信熟視之俛出袴下蒲伏一市皆笑信以為怯漢書溺袴周仁為人隂重不泄當衣弊補衣溺袴甚為不潔清以是得幸景帝大袴昌邑王賀衣短衣大袴上褒衣大祒朱􅀶瑯琊郡功曹官屬多褒衣大祒謂大袴也上窮袴多帶昭帝上官后霍光外孫光欲后檀寵有于帝體不安左右及醫皆阿意言宜内宫人使令皆為窮袴多其帶後宫無進者上錦袴更始所爵多羣小被服威儀不以衣冠或繡靣衣錦袴東觀漢記皮袴馬援田牧至有牛馬羊數千頭盡散昆弟故舊身衣羊裘皮袴後漢書韋袴祭遵賞賜與士共之家無私財身衣韋袴上曹掾無袴吳良字大儀齊國臨淄人以清白守正稱為郡議曹掾正旦掾吏入賀明下掾王望舉觴上夀曰齊郡遭離盗賊今明府視事五年家給人足良跪曰門下掾侫謟明府勿受其觴盗賊未盡人庶困之今良為議曹掾尚無袴望曰議曹隋窳自無袴寧足為不家給人足耶太守曰此生言是賜良鰒魚百枚上冬無袴秦䕶清亷不受禮賂家貧衣服单露鄉人歌之曰冬無袴有秦䕶謝承後漢書貧無袴賈逵居貧無袴過其妻兄栁孚家宿其明無何著孚袴去時人謂為通逹魏畧道還取袴許允聞李豐寺被收欲徃見大將軍已出門􅂞遑不定中道還取袴豐等已收訖大將軍聞允前遽怪之曰我自收豐等不知士大夫何為忽忽乎上布袴絮巾趙䟦避難至北海着布袴絮中在市中賣餅壞裳為袴劉穆之壞布裳為袴徃見武帝謂曰我中始舉大義須一軍中甚急誰堪其選穆之曰無見踰者帝笑曰卿能自屈吾事濟矣宋書緑絲布袴周劉題將之尋陽朝賢畢祖道題懸帛十疋約曰檢衣來者以賞之衆人競改常服不過短長之間題曰將有甚於此矣既而𢎞正緑絲布袴軒昻而至折而取帛梁書碧絲布袴元帝愍懷太子眤狎羣下好着微服常入朝見服中着碧絲布袴摳衣元帝見之帝大怪遣尚書周中正責之上青絞羅袴王裕之常使二老婦女戴五條辨着青絞羅袴飾以朱彩上作􅃭賜凍安成王秀為郢州冬月常作􅃭以賜凍者裂裙為袴何㸃永元中雀景惠圍城人間無薪㸃悉伐園樹以贍親黨景惠性好俠義欲交㸃㸃不顧之至是乃逼召㸃㸃裂裙衣為袴徃赴其軍終日談説不及軍事其語黙之迹如此上藏刀袴中丞相司馬任胄主簿李世林都督鄭仲禮房子逺等潜謀害神武自魏氏舊俗以正月十五日夜為打簇戱能中者即時賞帛胄令仲禮藏刀於袴中因神武臨觀謀竊發後敗北齊見貧遺袴孫畧冬日見貧士脱袴遺之高士論綾羅袴武帝嘗降王武子婢子百餘人皆綾羅袴裙手擎飲食世説弊袴待功昭侯使人藏弊袴侍者曰君上不以賜左右而藏之昭侯曰吾聞明主愛一嚬一笑有為嚬而嚬有為笑而笑今袴豈特嚬笑哉吾必待有功者故藏之韓子錦裁為袴孫興公道曹輔佐才云白地明光錦裁為負板袴非無文綵然酷無裁製郭子文袴出郊謝仁祖年少時喜着刺文袴出郊郭外其叔父誚責之仁祖於是自改遂為名流俗説直幅無殺晉中興作袴者直幅為口無殺不大夫裁也王敦之微搜神記柸文綺袴皇太子納妃有降直文羅袴七綵柸文綺袴東宫舊事都尉布袴中朔字元遊蒼梧人為九真都尉布􅃭布袴鄉邑歡慕之廣州光賀傳披袴􅃜體兼司徒員外散騎常侍謝祭應着絳袴而祭披袴不以貫足有􅃜常體蔡廊弹事官絹作袴楊平善裁袴以官絹百疋作袴百枚魏事合歡袴石虎獵着金樓合歡袴鄴中記皂袴絳袴司空騎吏以下皂袴因秦水行今漢家火行宜絳袴應劭漢官儀帶鞶帶説文曰帶紳也男子鞶帶婦人帶絲象繫佩之形帶必有巾故從重巾徐曰􅜼其帶上連屬結固處着身釋名曰帶蔕也着於身如物蔕也朱帶貝餙天子北征舎于珠澤珠澤獻白玉食天子賜黄金之環三十朱帶貝餙三十西征至赤烏氏赤烏氏先出自周宗乃賜赤烏之人具帶五十穆天子傳黄金横帶魯仲連謂田单曰將軍黄金横帶騁乎淄澠之間有生之樂無死之心戰國䇿金餙貝帶文帝遺匈奴黄金餙具帶一黄金犀毗漢書革帶楊賜拜大常詔賜所服冠幘綬王兼革帶東觀漢記緄帶鄧遵破匈奴上賜金剛鮮卑緄帶一具上赤石帶疎勒王獻大秦赤石帶一枚魏畧青石金帶漢陽嘉三年疎勒王獻海西青石金帶鈎絡帶陸遜破曹休於石亭上脱御金交帶以賜遜又親以帶為鈎絡帶吳書鈎絡者鞍飾革帶也世名為鈎絡帶吳録大秦國人皆着袴褶絡帶吳時外國傳扶南人悉着鈎絡帶上急帶張融形貎短醜精神清徹王敬則見融革帶寛洽將至骼謂曰革帶大急融曰既非歩吏急帶何為齊書十三鐶帶隋文作相李穆曰周德既衰愚智共悉天時若此豈能違天仍遣使謁隋文帝并上十三鐶金帶盖天子服也以微申其意後周書寳餙絡帶夏侯祖忻為兖州刺史喪於官沈僧榮代之祖欣見形詣僧榮見床上有一織成寳餙絡帶夏侯曰此帶殊好豈能見與沈曰甚善夏侯曰卿直許中不見關必以為施可命焚與沈對前燒視此帶已在下腰矣述異記黄銀帶杜如晦薨帝嘗賜𤣥齡黄銀帶曰如晦與公同輔朕今獨見公泫然流淚曰世傳黄銀鬼神畏之更取金帶遣𤣥齡送其家賜魚天授二年改佩魚為龜其後三品以上龜袋餙以金四品以銀五品以銅中宗初罷龜袋復給以魚郡王嗣王亦佩金魚袋景龍中令特進佩魚散官佩魚自此始也唐車服志紅玉帶上自解紅玉帶賜寧王明皇雜録柴金帶上以紫金帶賜岐王盖昔高宗破高麗所得開元中高麗遣使來朝宴内殿因從容言於内臣曰紫金帶本國亡是嵗荒民散干戈屢起幸在内帑一見足矣上聞之命封付其使佩龜載初元年改内外官所佩魚並作龜舊史魚袋金玉帶高宗咸亨三年勑五品以上賜新魚袋並餙以銀三品以上賜金裝刀子􅀈石一具上元中又勑文武官三品以上金玉帶四品五品並金帶六品七品並銀帶八品九品並䃋石帶庶人銅鐡帶文武並帶手巾算袋刀子礪石武官欲帶亦聽之九月百官具新服上宴之于麟德殿上隨身魚永徽二年文武職事四品五品並給隨身魚天后復改魚為龜唐實録雕銜綴帶貞元之間德宗詔頃來賜衣文綵不常非制也朕今思之宜有定制節度使宜以緩帶取其武毅以靖封内觀察使宜以鴈銜威儀取其行列有序翼牧人有威儀也威儀瑞草也㑹要于闐玉帶李靖五代孫彦芳其舊物有靖破蕭銑時所賜于闐玉帶十三胯七方六刓胯各附環以金固之所以佩物者天子悉留禁中通天犀帶馬植進中書侍郎初左軍中尉馬元䞇最為帝寵信賜通天犀帶而植素與元䞇善至通昭穆元贄以賜帶遺之它日對便殿帝識其帶以詰植植震恐具言狀於是罷為天平軍節度使辟塵犀李司封宗易言石駙馬寳吉知陳州其州􅇬一皆新之每毁舊屋則坐下風塵自分去人皆驚怪盖其所服帶乃辟塵犀也本草還入玉帶裴晉公質狀眇小相者曰郎君若不至貴即當餓死一日逰香山寺有婦人以父被罪假得玉帶三犀帶一以賂津要寘于欄楯忘收而去度得而授之後相者曰必有隂德及物前途萬里非某所知也撫言芝田録載白中令事同但以婦為夫耳通天帶裴度拜淮西宣慰招討處置使入對延英曰主憂臣辱義在必死賊不斷首臣無還期帝壯之為流涕及行帝賜通天御帶本傳進玉帶晉公平淮西賜以玉帶公臨薨却進口占奏狀曰内府之珍先朝所賜既不敢將歸地下又不合留在人間聞者嘆其不亂因話録水玉腰帶文宗朝李訓講周易頗叶上意時方盛夏遂命取水玉腰帶以賜訓杜陽夜明犀唐敬宗時南昌進夜明犀製為寳帶光照百歩富人玉帶萇從簡陳州人許州富人有玉帶欲之而不可得遣二卒夜入其家殺而取之卒夜踰垣隠木間見其夫婦相待如賔二卒嘆曰吾公欲奪其寳而害良人吾必不免因躍出而告之使其速以帶獻遂踰垣而去求玉帶鳯翔李永吉初朝京師蘇逢吉以永吉故秦王從曮子家世王侯當有竒貨使人告永吉許以一州而求其先世玉帶永吉以無為解逢吉乃使人市一玉帶直數千緡責永吉償之既而不得州五代史漢臣傳犀帶有光楚馬希聲海商有牛犀帶者直數百萬晝夜有光洞照一室希聲殺商而取之逾月光遂滅九國志雲鶴水犀江西鍾氏既滅子匡範歸武肅獻雲鶴通天離水犀帶一云𤣥宗御玩遺在西門門客獻鍾鍾常寳之武肅囘帶賜錢二萬緡範因登碧波亭命與許彦方擊楫而行水開七尺許至瑞石山岸大為驚賞僧賛傳載歌姫賭犀帶嚴續相公歌姫唐鎬給事通天犀帶皆一代尤物因出妓觧帶呼廬唐采大勝乃酌酒命美人歌一曲而别嚴悵然與之南唐近事日月帶韓似夫使金國見北主所係犀帶倒透中正透如圓鏡狀光彩絢目虜主云此石晉少主歸獻耶律氏謂唐世所寳日月帶也揮塵録濶十四稻宋王介甫所賜玉帶濶十四稻號玉抱肚真宗時趙德明所貢也紹興中王氏猶藏之曽孫奉議郎璹始復進入禁中老學筆記萬釘寳鈿統葉爾可汗獻萬釘寳鈿金帶突傳天中記卷四十七
