body:
  text: 天中記巻十五明陳耀文撰臺臺觀四方髙白臺有木曰榭爾雅鈞臺椒舉曰夏啓有鈞臺之享左昭四啓筮享神於大陵之上是為鈞臺之享歸藏璿臺夏后啓筮享神於晋之墟作為璿臺於水之陽上九成有娀氏有二佚女為之九成之臺飲食必以鼓帝令燕徃視之鳴若謚隘吕覧音初瑶臺桀作瑶臺殫百姓之財伊尹諫之桀曰吾有天下猶天之有日日亡吾乃亡矣新序鹿臺紂為鹿臺七年而成其大三里髙千尺臨望雲雨新序竹書紀年曰武王親禽帝受於南單之臺遂分天之明南單之臺蓋鹿臺之異名也水經注靈臺文王比出羑里周公旦築為靈臺六韜文王為玉門築靈臺以正紂之失淮南子周文王作為靈臺及於池沼澤及朽骨新序武王有靈臺之復而賢者進也管威公問篇重璧天子遊於河濟盛君獻女為造重璧臺穆天子傳濮州璧玉臺穆天子為盛姫所造也今旁地猶多珉石郡國志誃臺周景王作洛陽誃臺論語云誃子之足誃别離也噐文中天穆王之時西極之國有化人來以王之宫室卑陋不可處王乃為之改築土木之功赭堊之色無遺巧焉五府為虚而臺始成焉高千仭臨終南之上號曰中天之臺列子鳯臺蕭史者瓊姿偉爍風神超邁善吹簫作鸞鳯之響秦穆公有女字弄玉好之公遂以妻焉日教弄玉作鳯鳴居數年吹簫似鳯聲鳯凰來止其屋公為作鳯臺夫婦止其上不飲不食不下數年一旦弄玉乗鳯蕭史乗龍昇天而去秦為作鳯女祠時聞簫聲列仙傳拾遺思烟晋文公焚林以求介之推有白鵶遶煙而噪或集之推之側火不能焚晋人嘉之起一髙臺名曰思烟臺拾遺記九層晋靈公造九層臺費用億萬謂左右曰敢有諫者斬荀息聞之上書求見靈公張弩持矢見之謂曰子欲諫邪息曰不敢諫也臣能累十二博碁加九雞子其上公曰子為寡人作之息即正顔色定志氣以碁子置下加九雞子其上左右慴息靈公扶伏氣息不續公曰危哉危哉息曰是不危也復有危於此者公曰願復見之息曰九層之臺三年不成男不得耕女不得織國用空虚隣國謹議將欲興兵社稷亡滅君欲何望靈公曰寡人之過乃止於此即壞九層之臺說苑彈人晋靈公不君厚歛以彫墻從臺上彈人而觀其辟丸也左宣二望母洧水南有鄭莊公望母臺莊姜惡公寤生與叚共居叚不弟姜氏無訓莊公居夫人於城潁誓曰不及黄泉無相見也故成臺以望母用伸在心之思感考叔之言忻大隧之賦洩洩之慈有加融融之孝得常矣水經注層臺楚莊築層臺延石千重延壤百里士有反三月之糧者大臣諫者七十二人皆死矣有諸御己者違楚百里委其耕而入見莊王莊王謂之曰諸御己來汝將諫邪諸御己曰君有義之用有法之行且已聞之土負水者平木負䋲者正君受諫者聖君築層臺延石千重延壤百里民之釁咎血成於通塗然且未敢諫也已何敢諫乎因歴陳天子諸侯不尊賢用諫身死國亡之事遂趨而出楚王遽而追之曰己子反矣吾固將用子之諫日遂觧層臺而罷民楚人歌之曰薪乎萊乎無諸御己訖無子乎萊乎薪乎無諸御己訖無人乎說苑强臺令尹子佩請飲楚王莊王許諾子佩疏揖北靣立於殿下曰昔者君王許之今不果徃意者臣有罪乎莊王曰吾聞子具於强臺强臺者南望料山以臨方皇左江而右淮其樂㤀死若吾薄徳之人不可以當此樂也恐留而不能反淮南子昆昭周靈王二十三年起昆昭之臺亦名宣昭聚天下異木神工篩水精以為泥臺髙百丈昇之以望雲色論遺馳底晋平公使叔向聘於呉呉人拭舟以逆之左右五人右五百人有繡衣而豹裘者有錦衣而狐裘者叔向歸以吿平公平公曰呉其亡乎奚以敬舟奚以敬民叔向對曰君為馳底之臺上可以發千兵下可以陳鐘鼓諸侯聞君者亦曰奚以敬臺奚以敬民所敬咎異也於是平公乃罷臺說苑施恵晋平公置酒於施恵之臺史樂書章華靈王建章華之臺與登焉王曰臺美伍舉曰臣聞國君服寵以為美安民以為樂克聼以為聰致逺以為明不聞以土木之崇髙蟲鏤之刻畵金石之清音絲竹之淒唳以之為美前莊王為匏呉越作抱居之臺髙不過望國氛大不過容宴豆木不妨守備用不煩官府民不敗時務官不易朝常今君為此臺七年國人怨焉財用盡焉年榖敗焉百姓煩焉諸侯忿怨卿士訕謗豈前王之所盛人君之美者耶靈王即除土去餙不遊於臺楚語呉越春秋昔靈王不君其臣箴諫以不入乃築臺於章華之上罷弊楚國其民不忍飢勞之殃三軍叛亂於乾谿呉語邊讓賦云靈王遊雲夢之中息於􅍮臺之上前方淮之水左洞庭之波右顧彭蠡之隩南望巫山之阿遂造章華之臺後漢傳楚子成章華之臺願與諸侯落之左昭七三休翟王使使至楚楚王誇使者以章華之臺臺甚髙三休乃至楚王曰翟國亦有此臺乎使者曰否翟窶國也惡見此臺也翟王之自為室也堂髙三尺壤堦三累茒茨弗剪采椽弗刮且翟王猶以作之者大苦居之者大佚翟國惡見此臺也楚王媿賈𫝊新書乾谿楚靈王作乾谿之臺五百仭之髙欲登浮雲窺天文陸賈新語妨農宋皇國父為平公築臺妨於農収子罕請俟農功之畢築者謳曰澤中之晳實興我役邑中之黔實慰我心子罕聞之執扑抶其不勉者曰吾儕小人皆有闔廬以避燥濕寒暑今君為一臺而不速成何以為役注善子罕分謗左襄十七重華昔衛靈公坐重華之臺侍御數百随珠照日羅衣從風仲叔御諫曰昔桀行此而滅紂用此以亡今四境内侵諸侯加兵土地日削百姓乖離今君王内寵無乃大盛歟公下席再拜曰寡人過矣㣲子之言社稷傾㡬於是出宫女之不進者數百人百姓大恱子貢聞之曰所謂能受諫也王孫子新書長庲景公築長庲之臺晏子侍坐觴三行晏子起舞曰嵗已暮矣而禾不穫忽忽矣若之何嵗已寒矣而役不罷惙惙矣如之何舞三而涕下沾襟景公慙焉為之罷長庲之役晏子露寢齊景公為路寢之臺成而不通焉柏常騫曰為臺甚急臺成君何為不通焉公曰然梟昔者鳴其聲無不為也吾惡之甚是以不通焉柏常騫曰臣請禳而去之公曰何具對曰築新室為置白茅焉公使為室成置白茅焉柏常騫曰用事明日問公曰今昔聞梟聲乎公曰一鳴而不復聞使人徃視之梟當陛布翼伏地而死說苑柏寢景公與晏子遊於少海登柏寢之臺而還望其國曰美哉泱泱乎堂堂乎後世將孰有此晏子對曰其田成氏乎公泫然出涕曰不亦悲乎寡人有國而田成氏有之今為之奈何晏子對曰君何患焉若君欲奪之則近賢而逺不肖治其煩亂緩其刑罰賑貧窮而恤孤寡行恩恵而給不足民將歸君則雖有十田成氏其如君何韓非子遄臺齊侯至自田晏子侍於遄臺飲酒樂公曰古而無死其樂若何晏子對曰古而無死則古之樂也君何得焉昔爽鳩氏始居此地季萴因之有逢伯陵因之蒲姑氏因之而後太公因之古者無死爽鳩氏之樂非君所願也左昭二十年九重景公使人於楚楚王與之上九重之臺顧使者曰齊有臺若此乎使者曰吾君有治位之坐土階三等茅茨不翦樸椽不斵者猶以謂為之者勞居之者泰吾君惡有臺若此者於是楚王蓋悒如也韓詩外傳檀臺簡公與婦人飲酒於檀臺成子遷諸寢公執戈將擊之太史子餘曰非不利也將除害也左哀十四凌陽陳恵侯大城因起凌陽之臺未終而坐法死者數十人又執三監吏夫子適陳見陳侯與俱登臺而觀焉夫子曰羙哉此臺自古聖王之為臺未有不戮一人而能功成若此者也陳侯黙然而退遽竊赦所執吏既而見夫子問曰昔周作靈臺亦戮人乎荅曰文王之興附者六州六州之衆各以子道來故區區之臺未及期月而既成矣何戮之何夫以少少之衆能立大大之功唯君耳孔叢子􅍮臺楚王將游􅍮臺司馬子期諫王怒令尹子西駕於殿下曰今􅍮臺之觀不可失也王喜子西出從十里還引轡曰夫子期忠臣也若臣䛕臣也願王賞忠而誅䛕也王乃還家語漸臺貞姜者楚昭王夫人也王出遊留夫人漸臺之上而去王聞江水大至使使者迎夫人忘持其符使者至請夫人夫人不去於是使者取符則水大至臺崩夫人流而死列女傳姑蘇闔閭造姑蘇臺經營九年始成其臺髙三百丈廣八十四丈望見三百里外作九曲路以登之吴地記越王得神木一䨇大二十圍長五十尋陽為文梓隂為楩楠巧工施校制以規䋲雕治圎轉刻削磨礱分以丹青錯畫文業婪以白璧鏤以黄金狀類龍蛇文彩生光乃使大夫種獻之於呉王呉王大恱呉子胥諫曰王勿受也昔者桀起靈臺紂起鹿臺隂陽不和寒暑不時五榖不熟天與其災民虚國變遂取滅亡大王受之必為越王所戮呉王不聼遂受而起姑蘇之臺三年聚材五年乃成髙見二百里呉越春秋越王既獻西施復使大夫種請糴以入其意子胥曰夫虎不可餧以食蝮蛇不恣其意今大王捐國家之福以饒無益之讎棄忠臣之言而順敵人之欲臣必見越之破呉豸鹿游於姑胥之臺􅍮榛蔓於宫闕願王覧武王伐紂之事也呉王聼宰嚭之言與越粟萬石上伍被諫淮南王曰昔子胥諫呉王呉王不用廼曰臣今見麋鹿游於姑蘇之臺也本傳如皇越伐呉乃先宣言曰我聞呉王築如皇之臺掘深池疲苦百姓煎靡財貨以盡民力余來為百姓誅之韓子洪波趙簡子有臣曰周舎立於門下抱筆執牘從之書過簡子與之居無㡬死後與諸大夫飲於洪波之臺酒酣泣曰千羊之皮不如狐之一腋衆人之唯唯不如周舎之諤諤今舎死吾亡無日矣韓詩外傳召兵秦康公築臺三年􅍮人起兵將欲以兵攻齊任妄曰飢召兵疾召兵亂召兵勞召兵君築臺三年今􅍮人起兵將攻齊臣恐其攻齊為聲而以襲秦為實也不如備之戍東邊􅍮人輟行韓非子瑤臺齊威王遊於瑶臺成侯卿來奏事從車羅綺甚衆王望之謂左右曰來者何為者也左右曰成侯卿也王曰國至貧也何出之盛也成侯卿至王問其說對曰忌舉田居子為西河而秦梁弱忌舉田解子為南城而楚人抱羅綺而朝忌舉黔涿子為冥州而燕人給牲趙人給盛忌舉田種首子為即墨而於齊足究忌舉北郭刁勃子為大士而九族益親民益富舉此數良人者王枕而卧耳何患國之貧哉說苑范臺梁恵王觴諸侯於范臺酒酣請魯君舉觴魯君擇言曰昔者楚王登强臺而望崩山左江而右湖以臨彷徨其樂㤀死遂盟强臺而弗登曰後世必有以高臺陂池亾其國者今主君前夾林而後蘭臺强臺之樂也可無戒與魏䇿叢臺趙武靈王建叢臺於邯鄲前漢書夫全趙之時武力鼎士􅀈服叢臺之下者一旦成市本傳楚築章華於前趙建叢臺於後東京賦史記趙武靈王起叢臺太子圍之三月薛綜注郡國志曰邯鄲有叢臺故劉劭趙郡賦曰結雲閣於南宇立叢臺於少陽者也水經注中天魏襄王將起中天臺令曰敢諫者死許綰負操鍤入曰聞大王將起中天臺臣願加一力王曰子何力有加綰曰雖無力能商臺王曰若何曰臣聞天與地相去萬五千里今王因而半之當起七千五百里之臺高既如是其趾湏方八千里盡王之地不足以為臺趾古者堯舜建諸侯地方五千里王必起此臺先以兵伐諸侯盡有其地猶不足又伐四夷得方八千里乃足以為臺趾材木之積人徒之衆倉廪之儲數以萬億度八千里之外當定農畝之地足以奉給王之臺者臺具以備乃可以作魏王黙然無以應乃罷起臺新序逃債周赧王雖居天子之位為諸侯所侵逼與家人無異多負責於民無以歸之乃上臺以避之故周人因名其臺曰逃債臺故洛陽南宫簃臺是也帝王世紀黄金黄金臺易水東南十八里燕昭王置千金於臺上以延天下之士上谷郡圖經燕昭為郭隗築臺今在幽州燕王故城中土人呼為賢士臺亦謂之招賢臺述異記叚匹磾進屯故安縣故燕太子丹金臺王隠晉書固安縣金臺陂西北有釣臺高十丈陂北十餘歩有金臺有小金臺臺北有蘭馬臺並悉髙數丈秀峙相對翼臺左右水流經通長廡廣宇周旋被浦棟堵咸淪柱礎尚存耆舊咸言昭王禮賔廣延方士至如郭隗樂毅之徒鄒衍劇辛之儔宦遊歴說之民自逺而届者多矣不欲令諸侯之客伺隟燕邦故修建下都舘之南垂言燕昭創之於前子丹踵之於後水經注傳逮􅄒遊賦曰出北薊歴良鄉登金臺觀武陽雨城遼郭舊迹冥芒上按史記云昭王為郭隗改築宫而師事之孔文舉與曹公書昭王築臺以尊郭隗善注止引築宫事鮑昭詩將起黄金臺善引圗經晉書俱不云史記御覧乃引史昭王置千金云云士謂之黄金臺不知所據崇霞昭王時廣延國來獻善舞者二人一名旋娟一名提謨王登崇霞之臺乃召二人處之拾遺記通霞昭王時海人乗霞舟以雕壺盛數斗龍膏以獻王王坐通雲堂亦曰通霞之臺王與西王母常居其上拾遺握日西王母與昭王遊於燧林之下王坐握日之臺参雲上可捫日上望氣酸棗城西有韓王望氣臺孫子􅍮故臺賦叙曰酸棗寺門外夾道左右有兩故臺訪之故老云韓王聼訟觀臺髙一十五仭雖樓泯滅然廣基似於山嶽邵公大賢猶舎甘棠區區小國而臺觀隆崇驕盈於世以鍳來今故作賦曰薎邱陵之邐迤亞五嶽之嵯峨言壯觀也水注青陵韓慿為宋康王舎人妻何氏美王欲之捕舎人築青陵臺何氏作烏鵲歌以見志遂自縊死韓亦死彤管新編章臺楚懷王西至咸陽朝章臺如蕃臣不與亢禮懷王大怒世家楊雄解嘲曰藺先生収功於章臺漢書張敞無威儀時罷朝㑹走馬章臺街上蘭臺楚襄王遊於蘭臺之宫風賦楚有人謂頃襄王曰王綪繳蘭臺飲馬西河世家一名南臺時所謂楚臺者也地志陽雲襄王與唐勒景差宋玉遊於陽雲之臺玉作大言賦古文苑子虚賦楚王乃登陽雲之臺孟康云雲夢中髙唐之臺宋玉所賦者言其高出雲之陽也漢書文選作昭陽時所謂陽臺者互見巫山下白起長平城在郡之南秦壘在城西二軍共食流水澗相去五里秦坑趙衆収頭顱築臺於壘中因山為臺崔嵬桀起今仍號曰白起臺上黨記華陽􅍮軻與太子遊東宫池軻拾瓦拾龜太子捧金丸進之又共乗千里馬軻曰馬肝美即殺馬進肝太子與樊將軍置酒於華陽臺出美人能鼓琴軻曰好手也斷以玉盤盛之燕丹子琅邪琅邪山名越王勾踐之故國也秦始皇二十八年至琅邪大樂之留三月乃徙黔首二萬户於琅邪山下復十二年所作琅邪臺臺亦孤山也然髙顯出于衆山之上刋石立碑紀秦功徳臺上有神淵淵至靈焉人汙之則竭齋潔則通漢武帝亦登此臺水經注伏㴞地記雲明始皇起雲明臺窮四方之珍木捜天下之巧工二千人虚縁木揮斤斧於空中子時起工午時已畢秦人謂之子午臺拾遺記海録作燕昭誤受珠始皇至東海海神捧珠獻於帝前今海畔有始皇受珠臺􅄒異記蒲臺鬲城東南有蒲臺髙八丈秦始皇東遊海上於臺下縈蒲繫馬夾道數百歩到今蒲生縈委猶若有繫狀蒲似水楊而勁堪為箭三齊畧記懐清巴蜀寡婦清其先得丹穴而擅其利數世家亦不訾清寡婦也能守其業用財自衛不見侵犯秦皇帝以為貞婦而客之為築女懷清臺史記曲臺秦倚曲臺之宫懸衡天下畫地而民不犯威加胡越漢鄒陽傳游曲臺臨上路不如朝夕之池枚乗傳黄山陽糓有黄山臺黄石公與張子房期處也水經注朝臺熈安縣東南有圎囧十丈四靣為羊腸道論者曰尉佗登此望漢而朝名曰朝臺南越志尉佗築臺以朝漢室基圎千歩直峭百丈螺道登進頂上三畝朔望升拜號為朝臺傍江起華舘以送陸賈因稱朝亭裴淵廣州記前後刺史郡守遷除新至未甞不乗車升履於焉逍遥歩騭登髙逺望覩巨海之浩茫觀原薮之殷阜乃曰斯誠海島膏腴之地宜為都也建安二十二年遷州畨禺桀立城郭綏和百越遂用寧集水經注露臺文帝甞欲作露臺召匠計之直百金上曰百金中人十家之産也吾奉先帝宫室常恐羞之何以臺為紀賛翼奉上疏曰孝文欲作一臺度用百金重民之財廢而不為其積土基至今猶存本傳漸臺文帝嘗夢欲上天不能有一黄頭郎推上天覺而之漸臺以夢中隂目求推者郎見鄧通夢中所見也師古曰未央殿西南有蒼池池中有漸臺漢書漸臺在未央宫太液池中髙十丈漸浸也言為池水所漸黄圗馬臺睢陽縣城中有掠馬臺臺東有曲池池東有一臺謂之清泠臺北城慿隅又結一池臺晋灼曰或說平臺在城中東北角亦或言兔園在平臺側如淳曰平臺離宫所在今城東二十里有臺寛廣而不甚極髙俗謂之平臺按漢梁孝王傳稱王以功親為大國築東苑方三百里廣睢陽城七十里大治宫室為複道自宫東出揚州之門左門陽即睢陽東門也連屬於平臺則近矣屬之城西則不能是知平臺不在城中也梁王與鄒枚相如之徒懽遊于其上故亦一時之盛事謝氏賦雪亦曰梁王不恱遊于園今也歌堂淪宇律管埋音孤墓磈立無復曩日之望矣水經綴平臺之遺響宋書靈運傳論漢書晉如注見水經者今本删削殆盡因備録之統志云謝恵連於此賦雪又名雪臺夫謝居江左賦假相如安得云於此賦雪耶通志因之俱誤吹臺陳留風俗傳曰縣有倉頡師曠城上有列仙之吹臺梁王層築以為吹臺城隍夷滅畧存故跡其臺方一百許歩即阮嗣宗詠懷詩所謂駕言發魏都南向望吹臺簫管有遺音梁王安在哉晉世䘮亂乞活慿居削墮故基遂成二層上基猶方四五十歩高一丈餘世謂之乞活臺又謂之婆臺城水經注後有繁姓居側因亦名繁臺郡國志九域志蠡臺梁孝王所築於園中廻道似蠡因名之述征記司馬彪郡國志曰睢陽縣有盧門亭城内有高臺甚秀廣巍然介立超然獨上謂之蠡臺亦曰升臺焉當昔全盛之時故與雲霞競逺矣續述征記云廻道似蠡故謂之蠡臺非也闕子所謂虎圈臺者水經注柏梁元鼎二年春起柏梁臺武紀武帝鑄柏梁銅柱郊祀志梁以香柏為之香聞數十里三輔舊事起柏梁臺以處神君武帝故事帝甞置酒其上詔羣臣二千石有能為七言詩者乃得上座三輔黄圖古文范通天元封二年作甘泉通天臺師古曰通天者言此臺髙通于天也漢武故事築通天臺於甘泉去地百餘丈望雲雨悉在其下去長安三百里望見長安城武帝時祭太乙上通天臺舞八嵗童女三百人置祠祀招仙人祭太乙云令人升通天臺以候天神天神既下祭所若大流星乃舉烽火而就竹宫望拜上有承露盤仙人掌擎玉杯以承雲表之露元鳯間自毁椽桷皆化為龍鳯從風雨飛去亦曰候神臺又曰望仙臺以候神明望神仙也黄圗左右通天臺髙三十餘丈祭天時於此候天神下也関中記神明陛下以城中為小圗起建章左鳯闕右神明號稱千門萬户方朔傳神明臺武帝造祭仙人處上有承露盤有銅仙人舒掌捧銅盤玉杯以承雲表之露以露和玉屑服之以求仙道廟記武帝初起神明臺時掘地入三十丈得泉水色黄傍有人居無日月光明晝夜以火照中有人食土飲水服赭布之衣漢人問汝何時在此荅曰商王無道使兆人入地千丈求青堅之土以作瓦起瑶宫金堂工人皆以䋲入地裏負噐取土多有壓陷死者今猶二人在耳漢人問何得獨存荅曰我以玉為衣金為環身有金玉故心氣不滅漢人問汝欲更出為人否荅曰食土飲泉與螻蟻為伍寧望日月乎乃引出三日自死骨肉靡成灰惟心如彈丸大堅如石以物扣之則是乾血耳洞冥記神明臺髙五十丈上有九室常置九天道士百人漢宫閣疏神明臺上有九臺今謂之九子臺黄圗望風太初二年起甘泉望風臺於臺上得珠望之如照月因名照月珠洞冥記騰光建元二年帝起騰光臺以望四望常有飛光如星集於臺上亦曰經星臺集方士說仙事招仙武帝起招仙之臺於明庭宫北明庭宫者甘泉之别名也於臺上撞碧玉之鐘掛懸黎之磬吹霜滌之箎唱來雲依日之曲使臺下聼而不聞管歌之聲登仙嵩中嶽也東謂太室西謂少室相去十七里嵩髙總名也武帝作登仙臺在少室峯下戴延之西征記尋真嵩髙山有玉女臺云武帝見三仙玉女因以名臺山記尋真帝登尋真之臺齋至七月七日夜天西南如白雲起頃王母至漢武内傳帝登延靈之臺盛齋存道其四方之事權委於冡宰焉七月七日王母至廣記引内傳通靈鈎弋夫人從至甘泉而卒既殯尸香聞十餘里葬雲陽帝哀悼疑其非常人也乃起通靈臺於甘泉宫有一青鳥集臺上徃來至宣帝時鳥不至王褒雲陽記望恩武帝寤戻太子無辜被殺作思子宫為歸來望思之臺於湖天下聞而悲之漢書黄圗桂臺昭帝元始元年穿林池廣千歩池南起桂臺以望逺東引太液之水時命水嬉遊燕永日以文梓為船木蘭為柁刻飛燕翔鷁餙於船首隨風輕漾畢景㤀歸起商臺於池上拾遺記黄圖避風帝常以三秋閒日與飛燕戯於太液池以沙棠木為舟貴其不沈浮也每清風時至飛燕殆欲随風入水帝以翠纓結飛燕之裙常怨曰妾㣲賤何復得預纓裙之遊今太液池尚有避風臺即飛燕結裙之處拾遺記月影漢掖有月影臺雲光殿九華殿鳴鑾殿殿開襟閣臨池觀不在簿籍皆繁華窈窕之所棲宿焉西京雜記類白虎成帝幸王根第見園中土山漸臺似類白虎殿於是上怒以讓車騎將軍音外戚温明洺州温明臺後漢世祖晝卧此殿耿弇入造牀下勸即位處郡國志雲臺周黨光武引見伏而不謁范升奏毁曰願與坐雲臺之下考試圗國之道逸民傳永平初馬援女立為皇后顯宗圗畫建武中名臣列將於雲臺以椒房故獨不及援東平王蒼觀圗言於帝曰何故不畫伏波將軍像帝笑而不言本傳中平二年二月己酉南宫雲臺灾夫雲臺者乃周家之所造也圗書術籍珍玩寳怪皆所藏在也五行志景升沔水南有層臺號曰景升臺蓋劉表治襄陽之所築也言表盛遊於此常所止憇表性好鷹甞登此臺歌野鷹來曲其聲韻似孟逹上堵吟矣水經讀書華陽有讀書臺諸葛孔明相蜀築此臺以集諸儒兼以待四方賢士號曰讀書臺寰宇記避暑隆中諸葛亮故宅有舊井一今涸無水盛𢎞之記云井深五丈廣五尺堂前有三間屋地基坵極髙云是孔明避暑臺宅西山臨水孔明嘗登之鼓琴以為梁父吟因名此為樂山先有董家居此宅衰殄滅亡後人不敢復憇焉齊建武中有人脩井得一石枕髙一尺二寸長九寸獻晋安王習鑿齒又為宅銘南雍州記三臺魏武帝于鄴城西北立三臺中臺名銅雀臺南名金虎臺此名氷井臺陸翽鄴中記三臺皆因城為基巍然崇舉其髙若山建安十五年魏武所起其中曰銅臺髙十丈有屋百餘間臺成命諸子登之並使為賦陳思王下筆成章美㨗當時亦魏武望奉常王叔治之處也南則金雀臺髙八丈有屋一百九間北曰氷井臺亦髙八丈有屋一百四十間上有氷室室有數井井深十五丈藏氷及石墨焉石墨可書又然之難盡亦謂之石炭又有粟窖及鹽窖以備不虞今窖上猶有石銘存焉左思魏都賦曰三臺列峙而峥嶸者也水經文宣天保九年發丁匠三十萬人營三臺于鄴因其舊業而髙博之大起宫室及遊逸園至是三臺成改銅雀曰金鳯金虎曰聖應氷井曰崇光十一月登三臺御乾象殿朝燕羣臣並命賦詩北齊書陵雲文帝黄初二年築陵雲臺魏志陵雲臺樓觀精巧先稱平衆木輕重然後造構乃無錙銖相負掲臺雖髙峻常随風摇動而終無傾倒之理魏明帝登臺懼其勢危别以大材扶持之樓即頽壞論者謂輕重力偏故也世說凌雲臺髙二十三丈登之見孟津楊龍驤洛陽記凌雲臺在明光殿西髙八丈累塼作道通至臺上登髙㢠眺究觀洛邑暨南望少室亦山之秀極也述征記明帝景初元年鑄作黄龍鳯皇竒偉之獸餙金墉陵雲臺陵霄闕百役繁興作者萬數公卿以下至于學生莫不展力帝因遂躬掘土以率之髙堂隆上疏切諫本傳燭臺文帝築土為臺基髙四十丈列燭置於臺下名曰燭臺逺望如列星之墜地以處美人薛靈芸焉拾遺記釣臺孫權於武昌臨釣臺飲酒大醉使人以水灑羣臣曰今日酣飲惟醉堕臺中乃當止耳張昭曰昔紂為糟邱酒池長夜之飲當時亦以為樂不以為惡也權黙然有慙色遂罷酒吴志呉主以潘夫人為神女每以遊昭宣之臺志意幸愜又與夫人遊釣臺得大魚主大喜夫人曰昔聞泣魚今乃有喜有喜必憂以為深戒呉主於是罷宴夫人果見棄逐釣臺基今尚存馬拾遺記閱馬鄴漳水北有趙閱馬臺基髙五丈列觀其上石虎每講武於其下升觀以望之虎自於臺上放鳴鏑之矢以為車騎出入之節矣水經芳塵石虎於太極殿前起樓髙四十丈盛夏之時登髙樓以望四極奏金石絲竹樂以日繼夜時亢旱春雜寳異香為屑使数百人於樓上吹散之名曰芳塵臺上有銅龍腹容数百斛酒使胡人於樓上𠻳酒風至則望之如露名之曰粘雨臺用以灑塵樓上戯笑之聲震空中拾遺記靈鈞凉張茂築靈鈞臺周輪八十餘堵基髙九仭武陵人閻曽夜叩門呼曰武公遣我來曰何故勞百姓而築臺乎姑臧令辛巖以曽妖妄請殺之茂曰吾信勞人曽稱先君之令何謂妖乎大府主簿馬魴曰今世難未夷唯當宏尚道素不宜勞役崇餙臺榭比年以來轉覺衆務日奢於徃每所經營輕違雅度實非士女所望於明公茂曰吾過也命止作役晋書冲天赫連勃勃起冲天臺於南山欲登之望長安十六國春秋學臺范寗為豫章太守大設庠序逺近至者千餘人資給衆費一出私禄并取郡四姓子弟皆充學生課誦五經文起學臺功用彌廣本傳波若姚興集沙門五千餘人有大道者五十人起造淨圗於永貴里立波若臺居中作湏彌山四靣有崇岩峻璧珍禽異獸木草精竒仙人佛像俱有人所未聞皆以為希竒長安志靈芝千秋門内道北有西游園園中有凌雲臺即魏文帝所築者臺上有八角井髙祖於井北造凉風觀登之逺望目極洛川東有靈芝釣臺累木為之出於海中去地二十丈風生户牖雲起梁棟刻石為鯨魚背負釣臺既如從地踊出又似空中飛下釣臺四靣凡四殿皆有飛閣向靈芝徃來三伏之月皇帝在靈芝臺以避暑洛陽伽藍記静輪魏天師道塲壇東北舊有静輪宫魏神䴥四年造抑亦柏梁之流也臺髙廣超出雲間欲令上延霄客下絶囂塵水經雨花梁武帝時有雲光法師講經於此臺感得天雨賜花天厨獻食楊無為詩云空書來震旦康樂造淵㣲貝葉深山譯曼花半夜飛香清雖透􅀢蘃散不霑衣舊住白蓮老逺公應望歸六朝事迹樂善髙齋之後有堂堂西有射堂五間射堂南有大池池上有臺名曰樂善臺南雍州記玉女李軌字處别武威姑臧人也大業末自稱河西大凉王後僣稱尊號不受唐官時有胡巫惑之曰上帝甞遣玉女從天而降遂徴兵築臺以候玉女多所縻費百姓患之及敗嘆曰人心去矣天亡我乎携妻子上玉女臺置酒為别安脩仁執送尋伏誅舊書訟臺景龍中韋庻人置石臺於朱雀門街在開化一方之間雕刻綵鏤上建䓗臺蛟龍蟠遶下有石馬石獅子侍衛之像初韋氏矯稱衣箱有五色雲氣使畵工圗像以示於朝及節愍太子遇害韋氏乃上中宗聖威神武頌刋石以紀其事謂之訟臺上官昭容之文也并勒公卿姓名於上諂詞偽事有乖典實景雲元年毁之長安志望月𤣥宗八月十五日夜與貴妃臨太液池凭欄望月不盡帝意不快遂勑令左右於池西岸别築百尺髙臺與吾妃子來年望月後經禄山之兵不復置焉惟有基址而已天寳遺事愁臺明宗入汴州莊宗至萬勝鎮不得進與元行欽登道旁冡置酒相顧泣下有野人獻雉問其冡名野人曰愁臺也莊宗益不恱因罷酒去五代史濮州羊角城陳思王愁臺基甚髙郡國志病龍周世宗大舉入幽州契丹蕃部望風宵遁車駕至瓦橋関聞之甚喜登髙阜因以觀六師頃之有老父百餘輩持牛酒以獻世宗問曰此地何名對曰歴代相傳謂之病龍臺世宗黙然遽上馬馳至是夜病亟回戈未到闗而晏駕五代史補書臺母昭裔入蜀見岷峨之秀乃嘆曰卿雲黼黻河漢實英靈所鍾也脩文翁石室武侯書臺出家財建學館刋九經海録天井江陵縣東有天井臺飛軒孤映背邑靣河實郊􅆵遊憇之佳處也荆州記井在方城北里餘廣員二里其深不測井有潜室見輙兵西岸有天井臺因基舊隄臨際水湄遊憇之佳處也水經注清暑江陵赤湖東北有大罡臺髙六丈餘從廣八丈一名清暑臺秀宇層明通望周使逺者登之以暢逺情上玉臺雩都君山上有玉臺方廣數丈週廻盡是白石柱柱自然石覆如屋形也四靣多松杉遥眺峨峨嚮像羽人之舘風雨之後景氣明净頗聞山上有鼓吹之聲山都木客為舞唱之節鄧徳明南康記游閶闔觀玉臺注上帝所居天馬歌西有玉臺聫以昆徳西京賦麗春東都城有流杯殿在麗春臺北有東西廊南至麗春臺北連宏徽殿南頭皆亭子間以山池殿上作漆渠九曲兩京記九思九思臺楚莊王樊姫墓也張說登臺詩云楚國所以霸樊姫有力焉萬化茫無在孤墳獨巋然英華集思作里逍遙張九齡陪王司馬登薛公逍遥臺詩常聞薛公淚非直雍門琴曾是陪遊日徒為梁父吟英華琴臺司馬相如宅在州西笮橋北百許歩王褒益州記市橋西二百歩得相如舊宅今海安寺南有琴臺故墟李膺記在成都府華陽縣市橋西寰宇記在浣花溪云海安寺南今為金花寺城内非其舊成都志盧照隣詩雲疑作賦客月似聼琴人卜臺廣漢郡有嚴君平卜臺蜀記鴈橋東有嚴君平卜處土臺髙数丈也益州記一柱江陵有臺甚大而惟有一柱衆梁皆共此柱博物志靈應長安城南四十里有靈母谷俗呼為炭谷入谷五里有恵炬寺寺西南澗水緑崖側一十八里至峯謂之靈應臺臺上置塔塔中觀世音菩薩鐡像像是六軍散將安清鑄造陸長源辨疑志望京李逢吉上望京臺寄令狐華州云祗役滯南服閒上望京臺寄懐三峯守岐路隔雲烟唐詩紀事集虚張祜集虚臺詩云日光斜照集虚臺紅樹花迎曉露開昨夜上皇新授籙太真含笑入簾來上凝霞大中中日本國王子來朝云本國之東三萬里有集真島島上有凝霞臺臺上有手譚池池中生玉棊子不由制度自然黑白分明杜陽編璜臺天問璜臺十成誰所極焉楚辭珍臺珍臺間館甘泉賦珍臺蹇産以極壯隥道邐倚以正東西京賦旋臺應門八襲旋臺九重七命箕子曰紂必為九重髙臺韓子春臺衆人熈熈如登春臺老子和邢端公登臺春望詩春日繡衣輕春臺别有情春煙間草色春鳥隔花聲春樹亂無次春山遙得名春風正飄蕩春甕莫湏傾英華砌臺砌臺即今擦擦臺也王侯家作以為臨觀之戯唐張仲素詩云騁望臨香閣登髙下砌臺林間踏青去席上寄箋來即知唐來有之王審琦都尉家其子承祐㓜時其父戱補砌臺使談苑仲素字繪之建封子也孔帖作仲封誤避燥濕先聖王之為臺榭也足以辟燥濕而已矣吕覧髙堂招魂云髙堂䆳宇檻層軒些層臺累榭臨髙山些楚辭長楊長楊榭在長楊宫秋冬較獵其下命武士摶射禽獸天子登此以觀焉黄圗瀛洲成帝於太液池中起為瀛洲榭髙四十尺帝御流波文縠無縫衫趙后衣南越所貢雲英紫裙碧瓊輕綃廣榭上后歌舞歸風送逺之曲帝以文犀簮擊玉甌令后所愛侍郎馮無方吹笙以倚后歌趙飛燕傳髙光馬融廣成頌云棲遲乎昭明之觀休息乎髙光之榭以臨乎宏地後傳三臺天子有三臺靈臺以觀天文時臺以觀四時施化囿臺以觀鳥獸魚鼈諸侯卑不得觀天文無臺但有時臺囿臺也五經異義門門門捫也在外為人所捫摸也釋名門從二户象形也閻里中門也闤市垣也闠市外門也閌閬髙門也䦳門響也閭里門也周禮五家為比五比為閭閭侣也二十五家相郡侣也閽門竪也門昏也門常昏閉故曰閽即守門𨽻也閈門也汝南平輿里門曰閈說文閈城外郭内之里門也閈扞也言為人藩屛以扞難也風俗通天門角天門也韓楊天文集要閶闔天門也楚人名門皆曰閶闔說文呌帝閽使開闗兮倚閶闔而望予楚辭夢良人兮來遊若閶闔兮洞開潘岳賦爾雅闔謂之扉左傳以枚数闔公羊傳齒著于門闔荀子外闔不閉又月令乃修闔扇注治門户用木曰闔用竹葦曰扇或謂䨇曰闔闔門也單曰扇扇户也月令仲春修闔扇孟冬修鍵閉服䖍云闔扇所以開鍵閉所以塞九重九辨云豈不鬰陶而思君兮君之門以九重楚辭注天子九門闗門逺郊門近郊門城門臯門雉門應門路門寢門亦曰庫門臯門王之郭門曰臯門詩注應門王之正門謂之應門宫中之門謂之闈其小者謂之閨小閨謂之閣爾雅李廵曰路門之外受朝正門一名應門應門之外門曰雉門虎門師氏掌以媺詔王居虎門之左司王朝注虎門路寢門也王日視朝於路寢門外畵虎焉以明勇猛於守宜也周禮王元長曲水詩序入虎闈而齒胄閎門周書皇門篇維正月庚午周公格于左閎門㑹群臣序周公㑹群臣于閎門以輔主之格言作皇門注路寢左曰皇門鼎門成王定鼎于郟鄏其南門名定鼎門蓋九鼎所從入也帝王世紀雒陽東城門名鼎門後漢志魯十二魯城凡有十二門其北名上東門左傳定公元年公歛處父帥成人自上東門入是也西五門一曰鹿門即臧孫紇斬鹿門闗以出奔邾是也三曰稷門即圉人犖能投蓋於稷門南曰雩門左傳自雩門出蒙臯比而先犯之是也呉門呉子胥為呉造大城陸門八象天之八風水門八法地之八牕立閶門者象天門通閶闔風也立虵門以象地尸亦名破楚門亦名地門者呉位辰屬龍故小城南門作龍以壓蛇氣也呉越春秋呉都賦云通門二八水道陸衢陸士衡詩云閭門何峨峨飛閣跨通波劉夢得詩云二八城門開道路五千軍馬引旌旗髙門韓昭侯造作髙門屈宜咎曰昭侯不出此門曰何也曰不時吾所謂不時者非時日也人固有利不利昭侯嘗利矣不作髙門徃年秦㧞宜陽明年大旱民饑不以此時恤民之急也而顧反益奢此所謂福不重至禍必重來者也髙門成昭侯卒竟不出此門談苑夷門魏有隐士曰侯嬴年七十家貧為大梁夷門監者魏公子聞之徃請欲厚遺之不肯受史記大史公曰吾過大梁之墟求問其所謂夷門夷門者城之東門也上土多髦俊儒藝則以遊俠夷門即侯嬴抱闗處郡國志司馬司馬門之名起漢世案列女傳鍾離春詣齊司馬門史記又云司馬欣請事咸陽留司馬三日是則名起戰國非獨漢也今又曰公車門而俗稱謝章門也丹陽記未央宫殿雖南靣而上書奏事謁見之徒皆詣北闕公車司馬在焉高紀注師古曰宫外門也衛尉有八屯衛侯司馬主衛士徼循宿衛毎靣各二司馬故謂宫外門為司馬門元紀注端門太㣲南四星執法中端門左右掖門天文志端門太㣲正南門注始皇窮極奢侈築咸陽宫因北陵營殿端門四逹以則紫宫象帝居引渭水灌都以象天漢横橋南渡以法牽牛黄圗燕王旦傳鼠舞殿端門中注端門正門也本傳立金人於端闈西都賦掖門内至禁者為殿門外出大道為掖門漢制劉章從勃請卒千人入未央宫掖門注非正門而在兩旁若人之臂掖吕后紀闔門如今東西掖門儀禮注掖者言在司馬門之旁掖應劭注漢書十二長安城方十三里經緯各長十五里十二城門續志注漢舊儀長安城東出南頭第一門霸城内民見門色青名曰青城門或曰青門召平種𤓰青門外廟記亦曰青綺門莽更曰仁壽門無疆亭黄圗金馬金馬門者署門旁有銅馬故謂之金馬門史記武帝時善相馬者東門京鑄作銅馬法獻之有詔立馬於魯班門外則更名魯班門曰金馬門後馬援傳公孫宏待詔金馬門東方朔待詔公車上使待詔金馬門稍親近主父偃嚴安徐樂皆待詔金馬門宣帝脩武帝故事益召髙才劉向張子僑華龍栁褒等待詔金馬門上欲興協律之事王褒作中和樂職宣布詩傳蘭臺金馬遞宿迭居西京賦金閨諸彦蘭臺羣英注金閨金馬門也選歴金門上玉堂應劭曰金門金馬門也楊雄傳詔罷黄門乗輿狗馬師古曰黄門近署也元紀金馬門又謂之黄門玉海璧門漢書曰建章宫南有玉堂璧門三層臺髙三十丈玉堂内殿十二門階陛皆玉為之鑄銅鳯髙五尺餙黄金棲屋上下有轉樞向風若翔椽首薄以璧玉因曰璧門黄圖青𤨏黄門郎屬黄門令日暮入對青𤨏門拜名曰夕郎漢舊儀青𤨏門在南宫宫閣簿王根驕奢僣上赤墀青𤨏孟康曰以青畫户邊􅍢中天子制也如淳曰門楣格再重如人衣領再重裹者青名曰青𤨏天子門制也師古曰青𤨏者刻為連𤨏文而以青塗之也元后傳雕欒鏤楶青𤨏丹楹呉都賦衛瓘注青𤨏户邉青鏤也後百官志注董巴曰禁門曰黄闥以中人主之故號曰黄門令上攝官青𤨏闥遙望鳯皇池范雲詩雷門王尊為東平相王以至親驕不奉法度尊至庭中王傳在前說相鼠之詩尊曰毋持布鼓過雷門本傳開陽開陽門始成未有名宿昔有一柱來在樓上琅邪開陽縣上言縣南城門一柱飛去光武使來識視悵然遂堅縳之刻記其年月因以名焉應劭漢宫何湯仲弓嘗為門候上㣲行夜還湯閉門不納朝廷嘉之水經謝承書開陽門故建陽門也晋官閣名上東榖水東逕建春門石橋下即上東門也阮嗣宗咏懐詩所謂朝出上東門遙望首陽基遙遙九曲門徘徊欲何之者也水經注郅惲為上東門候光武甞出夜還詔開門欲入惲不内上令從門間識靣惲曰火明遼逺遂拒不開由是上益重之東觀漢記堅鐔攻洛陽朱鮪别將為反間私約鐔晨開上東門本傳上西閶闔門漢之上西門者也漢官儀曰上西門所以不純白者漢家厄於戍故以丹鏤之水經注濯龍建初二年有司依舊典奏封諸舅太后詔曰前過濯龍門上見外家車如流水馬如龍吾亦不譴怒之但絶其嵗用兾知黙愧其心袁宏漢紀雲龍班固永平十七年與賈逵傳毅杜矩展龍郗萌等召詣雲龍門小黄門趙宣持秦始皇本紀問臣等曰太史遷賛語寧有非邪典引金商楊賜光和元年引入金商門問祥異注太極殿西有金商門後漢啓南端之特闈立應門之將將昭仁恵於崇賢抗義聲於金商飛雲龍於春路屯神虎於秋方東京賦東蒼龍西白虎漢書鴻都靈帝引諸生能為文賦尺牘工書鳥篆者待制鴻都門下宦者傳通徳鄭康成北海髙宻人國相孔融深敬之吿髙宻令為康成特立一鄉曰齊置士鄉越有君子軍皆異賢之意又謂公者仁義之正號不必三事大夫今鄭公鄉可廣開門衢令容髙車號曰通徳門本傳昌門孫堅母生堅夢腸出繞呉昌門以告隣母隣母曰安知非吉祥也昌門呉郭門也獻帝興平中呉中謠言黄金車斑䦨耳開昌門出天子宋符瑞志千秋一水自千秋門南流逕神虎門下東對雲龍門二水衡􅀈之上皆列龍雲風虎之狀以大齊薄之及其晨見初起夕景斜暉霜文翠照陸離眩目又南流東轉逕閶闔門南魏明帝上法太極於洛陽南宫起太極殿于漢崇徳殿之故處改雉門為閶闔門閶闔門外夾建巨闕以應天宿水經注承明黄初元年十二月初營洛陽宫戊午幸洛陽注案諸書記帝居北宫以建始殿朝羣臣門曰承明陳思王詩曰謁帝承明廬是也三國志注承明門後宫出入之門常怪謁帝承明廬問張公云明帝作建始殿朝㑹皆由承明門陸璣洛陽記塞門張昭諫孫權不從稱疾不朝權恨之土塞其門昭又於内以土封之後權因出過其門呼昭昭辭疾篤權曉其門欲以恐之昭更閉户權使人滅火住門良久昭諸子共扶昭起權載以還宫呉志題門廣州盧躭仕州為治中冇仙術刺史歩騭惡之以狀聞欲誅之躭後題其門曰誅門誅門國雖存無射年欲知此書盧躭還太守削之隨削字更生郡國志歸厚稽含好學能屬文家在鞏縣亳邱自號亳邱子門曰歸厚之門室曰慎終之室晋傳朱門麴􅁢金城人也與游氏世為豪族西州為之語曰麴與游羊牛不数頭南開朱室不望青樓上私作元帝時廷尉張闓在小市居私作都門蚤閉晩開群小患之詣州府訴不得理遂至檛登聞鼓猶不被判聞賀司空出至破囧連名詣賀訴賀曰身被徴作禮官不闗此事羣小叩頭曰若府君復不見治便無所訴賀未語令且去見張廷尉當為及之張聞即毁門自至方山迎賀賀出見辭之曰此不必見闗但與君門情相為惜之張愧謝曰小人有如此始不即知蚤已毁壊世說白門宋明帝末年多忌諱宜陽門謂之白門上以白門不祥諱之尚書右丞江謐嘗誤犯上變色曰白汝家門本紀大夏洛陽北靣有二門西頭曰大夏門漢曰夏門魏晋曰大夏門嘗造三層樓去地二十丈洛陽城門樓皆兩重去地百尺惟大夏門甍棟干雲洛陽伽藍記朱白梁元帝令胡僧祐援王僧辯將發泣下謂其子玘曰汝可開朱白二門吾不㨗則死吉則由朱凶則由白也元帝聞而壯之前至赤沙亭㑹陸法和至乃并與軍大敗侯景將任約軍禽約送江陵南史露門武帝建徳三年正月壬戌朝羣臣露門周書沈重於露門館講論語玉海久閉髙祖初為定州總管先是定州城西門久閉不行齊文宣帝時或請開之以便行路帝不許曰當有聖人來啓之及髙祖至而開焉莫不驚異隋書縣門萬年縣門宇文愷所造髙宗末太平公主出降於縣􅇬為婚第以縣門窄狹欲毁之髙宗勅曰其宇文愷所作不湏折於他所開門遂存韋述西京記春明開元十七年五月丁邜侍臣以下燕于春明門外寧王憲元園池帝御花萼樓邀其廻騎更令坐飲遞舞班賜有差實録王涯詩莫道兩京非逺别春明門外即天涯光範公主受册設册案便次於光範門及長樂門外通典韓愈上宰相書伏光範門外門樞貴戚懼家之不吉而聚諸令名懼門之不堅而作為鐡樞卒其所以敗者非苦禁忌少而門樞朽也常苦崇財貨而行驕僣虐百姓而失民心爾潜夫論漢武世王侯深殿重階金樞素墀傳子門闗魯仲連先生見孟嘗君於杏堂之門孟甞君曰吾聞先生有勢数可得聞乎連曰勢数者譬若門闗舉之而便則可以一指持中而舉之非便則兩手不関非益加重兩手非加罷也彼所起者非舉勢也彼可舉然後舉之所謂勢数魯連子大畜之乾曰金柱鐡関膠固衛災君子居之安安憂疑易林屋屋大屋曰廡廡幠也幠覆也并冀人謂之庌庌正也屋之正大者也釋名屋奥也其中温奥也上客堂曰庌通俗文殷屋禮人君公室之制為殷屋也夏也卿大夫為夏屋隔半以北為正室中半以南為堂正室齋室也崔愷䘮服節黄屋黄屋非堯心選項羽圍漢滎陽紀信誑楚乗王車黄屋左纛曰漢王降楚以故漢王出遁漢書天子車以黄繒為蓋裏注白屋周公居冡宰之尊而猶下白屋之士日見百七十人家語蕭望之說霍光曰恐非周公相成王躬吐握之禮致白屋之心本傳白屋謂白蓋之屋以茅覆之注金屋武帝四嵗封膠東王長主数抱膝上問曰児欲得婦否長主指右左長御百餘人皆云不用因指其女問曰阿嬌好不笑對曰好若得阿嬌作婦當作金屋貯之長公大恱乃苦要上遂成婚焉漢武故事神屋上起神屋九間鑄銅為柱以金塗之大五圍赤王為階椽以金刻玳瑁為龍虎禽獸以薄其上椽首皆作龍首銜鈴流蘇懸之鑄銅為瓦以赤白石脂為泥椒汁和之以火齊薄其上扇屛悉以白琉璃作之光照洞徹以白珠為簾玳瑁壓之以象牙為牀乃以琉璃珠玉明月夜光雜錯天下珍寳為甲帳其次為乙帳甲以居神乙上自御之前庭植王樹珊瑚為枝以碧玉為葉或青或赤悉以珠玉為之子皆空其中如小鈴鎗鎗有聲甍柎作金鳯軒翥若飛口銜流蘇長十餘丈有雲母忩珊瑚忩雖崑崙元圃不是過也漢武内傳故事俸作鍾離邑為堂邑令初到無屋意乃出俸錢作屋民賫柱趋作浹日而成畢為民士祝曰興功役者令也如有禍崇令當之民大悦東觀漢記起屋是儀字子羽為人不治産業造屋舎纔容足隣家起大宅孫權出望見起屋左右曰是儀家權曰是子羽儉必非也令人親至果是隣舎呉志三間蔡司徒在洛陽見陸機兄弟住參佐􅇬中三間屋士龍住東頭士衡住西頭士龍為人文弱可愛士衡長七尺餘聲作鍾聲言多忼慨世說雕楹𢎞農王粹以貴公子尚主館宇甚盛圗莊周於室廣集朝士使稽含為之賛含援筆為序文文不加㸃其序曰帝壻王𢎞逺華池豐屋廣延賢彦圗畫真人於刻桷之室載退士于進趋之堂嗟乎先生髙跡何局生處巖岫之居死寄雕楹之屋託非其所没有餘辱粹有愧色晋傳茅茨桓宣武以羅含為别駕以官􅇬寺諠擾非静黙所處乃與城西池小洲上立茅茨之屋竹果䕃宇伐木為牀織葦為蓆布衣疏食晏若有餘别傳蒲屋楊於陵出為嶺南節度使教民陶瓦易蒲屋以絶火患本傳板屋秦州俗上氣力不恥冦盗弓馬射獵以為工能其居八板為屋故詩曰在其板屋脩我甲兵及車轔轔四鐡小戎皆田狩之事郡國志覆形伎之書起宅蓋屋必擇吉日夫屋覆人形宅居人體何患害於嵗月而必擇之則夫裝車治船亦當擇日論衡欎金洛陽城有欎金屋戴延之西征記水精大秦國以青水精為屋廣志齋讀書大和中陳郡殷府君引水入城穿池殷仲堪又於池北立小屋讀書百姓于今呼曰讀書齋王孚安成記盤龍桓元鎮姑孰屋壁悉畵盤龍於其上號為讀書齋俄而元敗將軍劉毅居之毅小名盤龍晋徴祥說髙齋襄沔記曰金城内刺史院有髙齋梁昭明太子於此齋造文選鮑至云簡文為晋安王鎮襄陽日又引劉孝威庾肩吾徐昉江伯操孔敬通恵子恱安徐陵王囿孔鑠等於此齋綜覈詩集於時鮑時亦在凡数木人資給豐厚日設餚饌于時别為髙齋學士雍州記云髙齋其泥色鮮净故此名焉南平世子恪臨州有甘露降此齋前竹林昭明太子於齋宫集道義以時相繼白土白土齋南道又一齋以栗為屋梁武帝臨州寢卧於此齋中常有五色雲廻轉狀如盤龍屋上恒紫雲騰起形似繖蓋逺近望者莫不異焉梁武於此龍飛上下齋齊齋東北有一齋名曰下齋次於髙齋制度壯麗極爽嵦刺史辨决獄訟舊出此齋上東府梁宣城王為揚州刺史顧野王及琅邪王褒並為賔客野王好善丹青王於東府起齋令野王畫古賢命王褒書賛時人稱為二絶南史蕭齋梁武造寺令蕭子雲飛白大書一蕭字在焉李約自江淮竭産買歸於洛中匣於小亭號曰蕭齋國史補竈挿竈宜都山絶崖壁立数百丈有一大燼挿其崖間望可長数尺傳云堯洪水人泊船此旁㸑餘故曰挿竈崖宜都縣記燔柴臧文仲燔柴於竈者老婦之祭也盛於盆尊於瓶非所柴也文仲安知禮禮噐踞觚仲尼作春秋老􅆅踞竈觚而聼之曰是何書也曰春秋也莊子曲突淳于髠至隣家見其竈突之直而積薪在傍謂曰此直有火使為曲突而徙薪隣家不聼後果焚其屋隣家救火乃滅烹羊具酒以謝救火者不肯呼髠知士譏之曰曲突徙薪無厚澤焦頭爛額為上客蓋傷其賤本而貴末也桓譚新論漢書人為徐福上言霍氏事同祀竈武帝時李少君以祠竈榖道郤老方見上言祠竈皆可致物致物而丹砂可化為黄金黄金成以為飲食噐則益壽益夀而海中蓬萊仙者乃可見之以封禪則不死黄帝是也於是天子乃親祠竈漢郊祀志養生昭帝元鳯元年燕王旦宫永巷中豕出圂壊都竈銜其鬴六七枚置殿前劉向以為近豕禍也竈者生養之本豕而敗竈陳鬴於庭鬴竈將不用宫室將廢壊也燕王不改卒伏其辜五行志厠中豕羣出壊大官竈本傳風吹李南明於風角女亦曉家術為由拳縣人妻晨詣㸑室卒有暴風婦便上堂從姑求歸辭其二親姑不許乃跪而泣曰家世傳術疾風卒起乃吹竈突及井此禍為婦女主㸑者妾將亡之應因著其亾日乃聼還家如期病卒本傳請隣御史大夫張忠署孫寳主簿寳徙入舎祭竈請比隣後漢雞入卞伯玉作東陽郡竈正熾火有雞遙從口入良久乃於突而入毛羽不焦鳴啄如故伯玉尋病殞竈神黄帝作竈死為竈神淮南子竈神晦日歸天白人罪萬畢術竈神名隗狀如美女又姓張名單字子郭夫人字卿忌有六女皆名察治常以月晦日上天白人罪狀大者奪紀紀三百日小者奪算算一百日故為天帝督使下為地精己丑日日出邜時上天禺中下行署此日祭得福其屬神有天帝嬌孫天帝大夫天帝都尉天帝長兄硎上童子突上紫宫君太和君玉池夫人等一曰竈神名壤子也酉陽雜爼鈎注竈無故自濕潤者赤蝦墓名鈎注居之去則止上夢衛靈公時彌子瑕有寵専於衛國侏儒有見公者曰臣之夢踐矣公曰何夢對曰夢見竈為見公也公怒曰吾聞見人主者夢見日奚為夢竈曰夫物兼燭天下一物不能當也人君兼燭一國人一人不能擁也故將見人主者夢見日夫竈一人煬焉則後人無從見矣今或者一人有煬君者乎則臣雖夢見竈不亦可乎韓子内儲厠溷說文曰廁清也釋名曰廁言雜在上非一也又或曰溷言溷濁也或曰聞至穢之處宜常修治使潔清也偃觀室者周於􅃦廟又適其偃焉莊子注偃謂屛厠也屛厠則以偃溲庚桑篇䧟厠晋景公夢大厲覺召桑田巫曰不食新矣六月晋侯欲麥使甸人獻麥饋入為之召桑田巫示而殺之將食張如厠䧟而卒小臣有晨夢負公以登天及日中負晋侯出諸厠遂以為殉左成十厠牏萬石君石奮長子建老白首萬石君尚無恙建為郎中令每五日洗沐歸謁親入子舎竊問侍者取親中帬廁牏身自澣洗復與侍者不敢令萬石君知之以為常前漢徐廣曰牏築垣短板也厠牏謂溷垣墻建隐於其厠而浣滌也一謂牏為豆言建又自洗盪厠豆厠豆冩除穢汚之穴也吕静曰楲窬䙝噐也楲虎子也窬行清也舊注今本無孟康曰厠行清牏中受糞函者也守厠淮南王安謁仙伯坐起不恭主者奏安不敬謫守厠三年神仙傳河東碩曼卿入山學仙十年而成家問其故曼卿曰在山中仙人乗龍迎我上天先過紫床金床玉几真貴處也仙人以流霞一杯飲我輙不飢渇忽然思家天帝前謁拜失儀見斥來還昔淮南王劉安昇天見上帝而箕坐大言自稱寡人遂見謫守天厠三年吾何人哉抱朴子惡夢博士弟子譚生居東寺連三夜有惡夢以問人教使晨起清中說之三旦而人告以為呪咀捕治数日桓譚新論不冠管寧避地遼東經海遇風船人危懼皆叩頭思過寧思惟無愆念嘗如厠不冠即便悔首尋風止周景式孝子傳過爐劉季和性愛香常如厠還過香爐上主簿張坦曰人名公作俗人不虚也季和曰荀令君至人家坐豦三日香氣不歇為我如何令君而惡我愛好也坦曰古有好婦人患而捧心嚬眉見者皆以為好其隣醜婦法之見者皆走公便欲使下官遁走邪季和大笑以是知坦襄陽記列婢石崇厠常有十餘婢侍列皆麗服藻餙置甲煎粉沉香汁之屬無不畢備又與新衣著令出客多羞不能如厠王敦徃脫故衣着新衣神色傲然羣婢相謂曰此客必能作賊世說錦囊晉太尉劉實詣石崇如厠見有絳紗帳大床茵蓐甚麗兩婢持錦香囊寔遽反走即謂崇曰向誤入卿室内崇曰是厠耳寔曰貧士未甞得如此便如他厠語林下果王敦初上舞陽公主如厠見漆箱盛乾棗本以塞鼻王謂厠上亦下果食遂至盡既還婢擎金澡盤盛水琉璃琬盛澡豆因倒水中而飲之謂是為乾飯羣婢莫不掩口而笑之世說設醊郭璞素與桓彛友善彛每造之或值璞在婦間便入璞曰卿來他處自可徑前但不可厠上相尋耳必客主有殃彛後因醉詣璞正逢在厠掩而觀之見璞裸身被髪銜刀設醊璞見彛撫心大驚曰吾每屬卿勿來反更如是非但禍吾卿亦不免矣天實為之將以誰咎璞終嬰王敦之禍彛亦死蘇峻之難本傳後帝陶侃常如厠見数十人悉持大杖有一人朱衣平上幘劍履自稱後帝曰以君長者故出見三載勿言富貴至極侃便起旋失所在有大印作公字當其穢所異苑厠神後帝也雜五行書方相庾翼鎮江州如厠見一物頭如方相兩眼大有光翼擊之入地因而病卒卤薄宋沈慶之在文帝時甞夢引鹵薄入厠中慶之甚惡入厠之鄙時有善占夢者為觧之曰君必大富貴然未在旦夕鹵簿固是富貴容厠中所謂後帝也本傳厠鬼貞元中呉都進士李赤與趙敏之同遊閩宿於驛之館亭宵分忽有一婦人入廷中赤即起下階揖讓良乆上廷取紙筆作書與親云某為郭氏所選為壻婦人拍其巾縊之敏之出走大呌婦人乃収巾而走及視其書赤如夢中所為明又偕行白書又失赤敏之遽徃見赤坐於厠大怒曰方當禮謝為爾所驚浹日至閩屬僚有與赤舊游者設讌次又失赤敏之疾索于厠見赤僵仆于地氣絶死矣獨異志據厠王昇曽行至一宅籬間見物兩手據厠深目虎鼻猪身靣色紫而斒斕直視於昇懼而走見表兄陸望言之望曰吾聞見厠神無不立死汝其勉之昇遂卒紀聞見形宣城太守刁緬初為玉門軍使有厠神形見狀如大猪通體皆有眼出入溷中遊行院内緬時不在官吏兵卒見者千餘人如是数日緬歸祭以祈福厠神乃滅旬日遷伊州刺吏歴官至翰林左將軍上溷軒有一丞郎馬上内逼急詣一空宅徑登溷軒乃大優穆刁陵空屋也將畢穆優忽至此丞郎慙謝之優穆曰侍郎他日内逼但請光訪聞者絶倒北夢𤨏言祭報台州有民姓王常祭厠神一日至其所見著黄女子云某厠神也君聞螻蟻言否民曰不聞遂懐中取小合子以指㸃少膏如口脂塗民右耳下戒之曰或見蟻子側耳聆之必有所得民明旦見柱礎下羣蟻紛紜聼之果聞相語母移穴去暖處傍有問之何故云其下有寳甚寒住不安民伺蟻出訖尋之獲白金十鋌葆光録屋頭俗命如厠為屋頭稱并州人咸鑿土為室厠在所居之上故也一說北齊文宣帝怒其魏郡丞崔叔寳以溷汁沃頭後人或食或避親長不能正言溷因影為沃頭焉資暇集墅别業石崇樂放逸篤好林薮遂肥遯於河陽别業其制宅也却阻長堤前臨清渠柏木㡬於萬株流水周於舎下有觀閣池沼多養鳥魚思歸引土山謝安於土山營墅樓館林竹甚盛毎携中外子姪徃來游集肴饌亦屢廢百金本傳賭墅苻堅入冦謝安與謝元出土山墅宴親朋畢集方留元圍棊賭别墅安棊常劣于元是日有懼心便不勝安顧外甥羊曇曰以墅乞汝上宋屬檀道濟名檀城地圗謂之城子墅唐温廷筠謝公墅詩云朱鵲橋南繞香陌謝郎東墅連春碧勅取王騫有舊墅在鍾山八十餘頃與諸宅及故舊共佃之常謂人曰我不如鄭公業有田四百頃而食常不周以此為愧梁武帝于鍾山西造大愛敬寺騫墅在寺側者即王𨗳賜田也帝遣主書宣㫖取之荅曰此田不賣若勅取所不敢言帝怒遂付市評田價以直逼還之南史員庄員半千庒在焦戴川北枕白鹿原蓮塘竹徑酴醿架海棠洞㑹景堂花䲧藥畦碾磨麻稲里諺曰上有天堂下有員庒長安志輞川王維得宋之問藍田别墅在􅜁口􅜁水周於舎下别漲竹洲花塢與道友裴廸浮舟徃來彈琴賦詩嘯咏終日聚其田園所為詩號輞川集舊唐余之别業在輞川山谷其遊止有孟城坳華子岡文杏館斤竹嶺鹿柴木蘭柴茱茰沜宫槐栢臨湖亭南宅欹湖栁浪欒家瀬金屑泉白石灘北坨竹里舘辛夷塢漆園等與裴廸閒暇各賦絶句輞川集母亡表輞川第為寺新唐城南張守珪坐賂中人牛仙童得罪李林甫素忌蕭嵩因言嵩嘗以城南墅遺仙童見貶唐書嵩請老於林園植藥合鍊自適舊唐昭應蕭復字履初嵩孫也為宫門郎廣徳中嵗饑家貧議將鬻昭應别墅時宰相王縉聞其林泉之美心欲之乃使弟紘以要地誘焉復曰僕以家貧鬻舊業將以拯濟孀㓜耳倘以易美職於身令門内凍餒非鄙夫之心也縉憾之乃罷復官舊濟源蕭俛字思謙嵩曽孫也母韋氏賢明理家嚴俛雖為宰相侍母左右不異褐衣時既致仕以洛都官屬賔友避嵗時請謁之煩乃歸濟源别墅逍遙山野嘯咏窮年開成二年弟俶授楚州刺史辭日文宗謂俶曰朕賜俛詔書匹帛卿便賫至濟源道吾此意拆楊綰拜相御史中丞崔寛劍南節度使寧之弟家富於財有别墅在皇城之南池館臺榭當時第一寛即日潜遣毁之舊處士温造字簡輿自負節概隠王屋山以釣魚逍遙為事人號其居曰處士墅舊新家墅裴休字公美操守嚴正兄弟借隠家墅晝講經夜著書終年不出户唐杜墅韓昌黎南山詩云前行經杜墅坌薮畢原陋注杜墅即杜陵也本周之杜伯國在長安萬年縣東南集玉潭庄隴西李㓜卿字長夫大厯中以右庻子領滁州别業在常州義興曰玉潭庄在滁州時以書託獨狐至之獨孤以詩寄云日日思瓊樹書書話玉潭題玉潭云碧玉徒强名氷壺難比徳唯當寂照心可並奫淪色㓜卿所謂薄宦龍鍾心懶慢故山寥落水淵淪午橋裴度於東都立第於集賢里築山穿池竹木叢萃有風亭水榭梯橋架閣島嶼廻環極都城之勝槩又於午橋創别墅花木萬株中起涼臺暑館名曰緑野堂又甘水貫其中釃引脉分映𢃄左右度視事之隟與詩人白居易劉禹錫酣宴終日髙歌放言以詩酒琴書自樂當時名士皆從之遊舊唐裴題南庒云野人不識中書令喚作陶家與謝家白樂天和云陶廬僻陋那堪比謝墅幽㣲不足攀何以嵩峯三十六長随申甫作家山長慶集互見堂張齊賢以司空致仕歸洛得度午橋莊有池榭松竹之盛日與親舊觴詠其間意甚曠適宋史傳平泉李徳裕東都於伊闕南置平泉别墅清流翠篠樹石幽竒初未仕時講學其中及從官藩服出將入相三十年不復重遊而題寄歌詩皆銘之於石舊唐初徳裕營平泉逺方之人多以異物奉之有題平泉詩曰隴右諸侯供語鳥日南太守送名花劇談録汪遵平泉莊詩云水泉花木好髙樹嵩少縱横滿目前惆悵人間不平事今朝身在海南邊唐詩紀事賛皇公平泉莊周圍十里構臺榭百餘所天下竒花異草珍松怪石靡不畢致其間故徳裕自製平泉草木記今悉蕪絶唯鴈翅檜珠子柏蓮房玉蕊等蓋僅有存焉怪石名品甚衆多有洛城有力者取去唯禮星石及師子石今為陶學士徙置梁園别墅賈氏談録東墅呉越廣陵王錢元璙帥呉時其子衙前指揮使文奉剏東墅南園經營三十年極園池之賞竒卉異木名品千萬及其身見皆成合抱又累土為山亦成巖谷晩年經度不已每宴集其間任客所適文奉跨白騾被鶴氅緩歩花徑或泛舟池中容與徃來聞客笑語就之而飲其好事如此呉越備史九國志牆牆垣蔽曰牆壁垣也說文牆謂之墉爾雅墉垣牆也廣雅墉容也所以蔽隠形容也壁僻也所以辟禦風寒也牆障也所以自障蔽也垣援也人所依阻以為援衛者也釋名牆所以防非常也賁庸天子賁庸諸侯疏杼鄭元注曰賁大也言大牆正直也疏衰也杼亦牆也言衰殺其上下不得正直尚書大傳丹青諸侯垣牆有黝惡無丹青之色新序始築舜作室築牆茨屋辟地樹榖令民皆知去巖穴各有家室淮南脩務象墉孔子觀乎明堂覩四門之墉有堯舜桀紂之象各有善惡之狀興廢之誡焉家語蔽惡叔孫豹曰人之有牆以蔽惡也牆之隙壊誰之咎也衛而惡之吾又甚焉左昭元玉璧元狩三年帝復起凌霞臺去地九十丈累白玉為壁以八分篆冩羲皇以來訖周成王封禪之事所謂事登壁文蓋帝王之本績也洞冥記金釭趙媫妤居昭陽舎殿壁𢃄徃徃為黄金釭舎藍田壁明珠翠羽餙之西京雜記畵雲哀帝為董賢起太第於北闕下重五殿洞六門柱壁皆畫雲氣華蘤山靈水怪或衣以綈錦或餙以金玉樓閣臺榭轉相連注山池玩好窮盡雕麗上粉塗漢省中皆以胡粉塗壁紫素界之畫古烈士漢官典職金餙琅邪王京都莒好脩宫室窮極伎巧殿館壁𢃄皆餙以金銀注壁𢃄壁中之横木也以金銀為釘餙其上後漢刻像焦氏山魯恭塜前有石祠四壁皆有青石隠起忠臣孝子貞婦形像像邊皆刻石記碑文戴延之西征記藏書杜安字伯夷少有志節年十三入學號竒童京師貴戚慕其名或遺之書安不發悉壁藏之後及捕案貴戚賔客安開壁出書印封如故竟不罹患時人貴之後漢基下史叔賔者陳留人也少有盛名郭林宗見而謂人曰牆髙基下雖得必失後果以論議阿枉毁名云上石角蔡瑁字徳珪襄陽人家在蔡洲上屋宇甚好四墻皆以青石結角婢妾數百人别業四五十處耆舊傳穿壁吕䝉病孫權時在江安迎置内殿治䕶萬方欲数見顔色又恐勞動常穿壁瞻之見小能下食則喜不然則咄唶也呉志卧壁下徐孝嗣初在率府晝臥齋北壁下夢兩童子遽云移公床孝嗣驚起行数歩而壁崩齊書水間牆元諧隋髙祖為丞相引致左右諧白髙祖曰公無黨援譬如水間一堵墻大危矣公其勉之及髙祖受禪上顧諧笑曰水間墻竟何如也於是賜宴極歡本傳九丈鄴城避雷室西南石溝北有華髙牆髙九丈方圎一里孟奥北征記琉璃大秦國以琉璃為牆南州異物志裔外西北裔外大夏山有宫以黄金為牆南方裔外罔明山有宫以赤石為牆西南裔外老壽山有宫以黄銅為牆東南裔外闠清山有宫以青石為牆西方裔外西明山有宫以白石為牆神異經苑圃苑苑有垣曰囿說文囿所以養禽獸也天子百里諸侯四十里毛萇詩註苑藴也言薪蒸所藴積也囿者畜魚鱉之處也囿猶有也風俗通古謂之囿漢謂之苑周禮囿人住疏天子曰苑諸侯曰囿左僖原圃疏東方苑囿所以在東方何囿苑養萬物者也東方所以生也白虎通天苑天苑十六星在昴畢南天子之苑囿隋天文志外内之制各得其所四方之士無有畜滯則麒麟遊囿六畜繁多天苑有徳星應禮嵇命徴節性昔先聖王之為苑園囿池也足以觀望勞形而已矣非好儉而惡費也節乎性也吕覧養龍黄帝為養龍之囿拾遺記初作湯之初作囿也以奉宗廟鮮犞之具簡士卒習射御以戒不虞及其衰也馳騁游獵以奪民時罷民之力淮南泰族禦災單襄公曰薮有圃草囿有林池所以禦灾也其餘無非榖土民無縣耜野無奥草周語具囿皇武子鄭之有原圃猶秦之有具囿也左僖三十三縈陽中牟縣西有圃田澤注鹿囿秋築鹿囿書不時也左成十八郎囿冬築郎囿書時也季平子欲速成叔孫昭子曰焉用速成其以勦民也無囿猶可無民其可乎昭三螻趙簡子田于螻史黯聞之以犬待于門簡子見之曰何為曰有所得犬欲試之兹囿簡子曰何為不告對曰君行臣不從不順主將適螻而麓不聞臣敢煩當日簡子乃還晋語五苑秦大饑應侯請曰五苑之草著蔬菜橡果棗栗足以活民請發之昭襄王曰吾秦法使民有功而受賞有罪而受誅今發五苑之蔬草者使民有功與無功俱賞也韓非子樂林張儀說韓王曰大王不助秦鴻臺之宫樂林之苑非韓之有也戰國䇿今本作桑林上林上林苑本秦舊苑也長安志蕭相國請曰上林中多空地願令民得田苑中史記武帝㣲行以為道逺勞苦又為百姓所患乃使大中大夫吾邱夀王與待詔能用笮者舉措阿城以南􅉦屋以東宜春以西提封頃畝及其賈直屬之南山以為上林苑東方朔諫秦起阿房而天下亂因陳泰階六符之事上乃拜大中大夫卒起上林苑故相如請為天子遊獵之賦稱烏有先生亡是公而奏上林也水經注上林苑中廣長三百里苑中養百獸天子春秋獵射苑中取禽無数其中離宫七十所容千乗萬騎漢舊儀初修上林苑羣臣逺方各獻名果異卉三千餘種植其中亦有制為美名以標竒麗也西京雜記昭祥昭祥苑在甘泉宫西周千里萬國獻異物皆集此中洞冥記樂游神爵三年春起樂遊苑宣紀樂遊苑自生玫瑰樹樹下多苜蓿苜宿一名懐風昔人或謂之光風風在其間常蕭蕭然日照其花有光采故名苜蓿為懐風茂陵人謂之連枝草西京雜記宣帝樂遊廟亦名樂遊苑亦名樂遊原基地最髙四望寛敞西京新記芳林濯龍芳林九谷八溪東京賦濯龍池名芳林苑名洛陽圗經廣成明帝数倖廣成苑鍾離意以為從禽廢政甞當車陳諫般樂遊田之事天子即時還宫本傳桓帝幸廣成校獵陳蕃諫曰臣聞人君有事於苑囿唯仲秋西郊順時講武殺禽助祭以敦孝敬豈宜揚旗曜武騁心輿馬之觀乎本傳河南新城有廣成聚有廣成苑續志汝水東與廣成澤水合水經注千里梁兾多柘林苑禁同王家西至𢎞農東界滎陽南亟魯陽北逹河淇包含山薮逺𢃄邱荒周旋封域殆將千里又起兔苑於河南城西經亘数十里本傳有人殺苑兔者迭相尋逐死者十三人張璠漢記兾誅散其苑囿以業窮民畢圭靈帝欲造畢圭靈琨苑楊賜諫曰昔先王造囿裁足以脩三驅之禮薪菜芻牧皆悉徃焉先王之制左開鴻池右作上林不奢不約以合禮中今城外之苑已有五六可以逞情意順四節也宜情夏禹卑宫太宗露臺之意以慰下民之勞書奏帝欲止以問侍中任芝中常侍樂松松等曰昔文王之囿百里人以為小齊宣五十里人以為大今與百姓共之無害於政也帝恱遂令築苑後傳𤣥武苑以元武陪以幽林繚垣開囿觀宇相觀表清籞勒虞箴樵蘇徃而無忌即鹿縱而匪禁魏都賦元武苑在鄴城西苑中有魚梁釣臺竹園蒲萄諸果注桂林建康縣北呉朝為桂林苑陶季直宗都記桂林苑在落星山之陽南朝宫苑記龍騰慕容熈大築龍騰苑廣袤十餘里役徒二萬人起景雲山於苑内基廣五百歩峯髙十七丈又起逍遙宫甘露殿連房数百觀閣相交鑿天河渠引水入宫又為其昭儀苻氏鑿曲光海清涼池晋載記南苑宋明帝嘗以南苑借張永云且給三百年期盡更請南史紀南苑在臺城南鳯臺山南朝宫苑記芳林芳林苑一名桃花園本齊髙帝舊宅在廢東府城東邊秦淮大路北齊王融作曲水詩序載懐平浦乃睠芳林即此也上齊世清溪宫改為芳林苑天監初賜南平王偉為第偉又加穿築増植嘉樹珍果窮極雕麗毎與賔客遊其中命從事中郎蕭子範為之記梁世藩邸之盛無以過焉梁傳芳樂齊東昏以閱武堂為芳樂苑窮竒極麗當暑種樹朝種夕死死而復種卒無一生於是徴求人家望樹便取毁徹墻屋以移置之大樹合抱亦皆移掘挿葉繁華取玩俄頃剗取細草來植階庭烈日之中至便焦燥紛紜徃來無復已極山石皆塗以采色跨池水立紫閣諸樓壁上畫男女私䙝之像南史紀建興梁紀少遊建興苑詩云丹陵抱天邑紫泉更上林玉臺極百尺銀樹起千尋湘東湘東王於子城中造湘東苑穿池構山長数百丈植蓮浦縁岸雜以竒木其上有通波閣跨水為之南有芙蓉堂東有禊飲堂堂後有隠士亭亭北有正武堂堂前有射堋馬垀其西有鄉射堂堂置行堋可得移動東南有連理堂堂㮈生連理太清初生北連理當時以為湘東踐祚之瑞北有映月亭脩竹堂臨水齋齋前有髙山山有石洞潜行宛委二百餘歩山有陽雲之樓樓好髙峻逺近皆見北有臨風亭明月楼顔之推詩云屡陪明月宴並將軍扈熈義所造渚宫故事仙都齊後主武平四年大興土木之宫於仙都苑穿池築山樓殿間起窮華極麗功始就而亡國陏五行志西苑隋煬帝大業元年五月築西苑周三百里其内為海周十餘里為方丈蓬萊瀛洲諸山髙出水百餘尺臺觀宫殿羅絡山上向背如神海北有龍鱗渠縈紆注海内縁渠十六院門皆臨渠每院以四品夫人主之堂殿樓觀窮極華麗宫樹秋冬彫落則剪綵為花葉綴於枝條色渝則易以新者常如陽春沼内亦剪綵為荷芰菱茨乗輿遊幸則去氷而布之十六院競以殽羞精麗相尚求市恩寵上好以月夜從宫女数千騎遊西苑作清夜遊曲於馬上奏之續世說於皁澗營顯仁宫採海内竒禽異獸草木之􅁼以實園苑隋書紀㑹通東都苑隋曰㑹通苑又改為華芳神都苑周廵一百二十六里兩京記上苑蘇良嗣遷􅍮州刺史髙宗遣宦者采怪竹江南將蒔上苑宦者所過縱暴至􅍮良嗣囚之上書言狀帝下詔慰奬取竹棄之新唐鬻果則天時尚方監裴匪躬檢校京苑將鬻苑中果菜以収其利蘇良嗣駁之曰昔公儀相魯猶能㧞葵去織未聞萬乗之主鬻其果菜以與下人争利也匪躬遽止舊唐昌華荔枝洲在番禺縣劉氏於其上剏昌華苑圗經北苑南唐徐鉉湯恱徐鍇有北苑侍宴詠序云望蔣橋之嶔崟祝為聖壽泛潮溝之清淺流作恩波奈苑西域國有奈樹生果果中有一女子王収為妃女乃以苑地施佛為伽藍故曰奈苑雜集園圃樹果園樹果也圃樹菜也說文天園天園主果實菜茹蓄儲天文要集匏𤓰匏𤓰為天子果園上大象賦云匏𤓰薦果於震閨注云五星在離珠北天子之果園占大光潤則嵗豐不爾則𤓰果之實不登塲圃場人掌國之場圃而樹之果蓏珍異之物以時歛而藏之凡祭祀賔客共其果蓏享亦如之周禮注云果棗栗之屬蓏𤓰瓠之屬珍異蒲桃枇杷之屬矍相郡國志魯國有闕里孔子所居注禮記矍相之圃亦在城中西南近孔子廟後漢圃畦子貢南遊於楚反於晋過漢隂見一文人方將為圃畦鑿隧而入井抱甕而出灌搰搰然用力甚多而見功寡子貢曰有機於此一日浸百畦用力甚寡而見功多夫子不欲乎為圃者仰而視之曰奈何曰鑿木為機後重前輕挈水若抽数如沃湯其名為橰為圃者忿然作色而笑曰吾聞之吾師有機械者必有機事有機者者必有機心機心存于胷中則純白不備純白不備則神生不定神生不定者道之所不載也吾非不知羞而不為也子貢告孔子孔子曰彼假修渾沌氏之術者也莊子繫馬魯穆公時君老太子㓜漆室女倚柱而嘯隣婦笑之漆室女曰昔晋客舎吾家繫馬園中馬佚馳走踐吾葵使我終嵗不食葵列女傳鄭圃列子居鄭圃四十年人無識者國君卿大夫視之猶衆庻也國不足將嫁於衛列子灌園於陵子辭卿相而桔槹灌園雜記漆園梁郡蒙縣莊周之本邑也為蒙之漆園吏郭景純所謂漆園有傲吏者也悼恵施之沒杜門於此邑矣水經兔園史記謂梁孝王築東苑方三百里是曰兔園也隋圗經梁王不恱遊於兔園乃置㫖酒命賔乃召鄒生延枚叟雪賦漢枚乗有免園賦五見親王臺下竹園睢水東南流歴于竹圃水次緑竹䕃渚菁菁實望世人言梁王竹園也水經不窺董仲舒孝景時為博士下帷講誦弟子傳以久次相授業或莫見其靣蓋三年不窺園其精如此前漢桓榮字春卿精力不倦十五年不窺家園後漢法真隐居大澤講論術藝歴年不問園圃謝承後書趙昱歴年潜志不窺園圃魏志陶謙傳注北邙茂陵富人袁廣漢藏鏹巨萬家僮八九百人於北邙山下築園東西四里南北五里激流水注其内構石為山髙十餘丈連延数里飬白鸚鵡紫鴛鴦牦牛青兕竒獸怪禽委積其間積沙為洲嶼激水為波潮其中致江鷗海鵠孕雛産鷇延漫林池竒樹異草靡不具植屋皆徘徊連屬重閣修廊行之移晷不能徧也廣漢後有罪誅沒入為官園鳥獸草木皆僉植上林苑中西京雜記樊川漢武有名園曰樊川一名御宿園出栗十五枚一升大棃如五升落地則破其取棃先以布囊承之號曰含消此園棃也三秦記索其栗味甘而小不如三秦記所說含消棃人間徃徃有之其大不至五升亦不出此川矣括地志持鋤孫寳為京兆尹署侯文為東部督郵灞陵杜穉季杜門不通水火持鋤自理園不敢犯法前漢濯龍顯宗每幸濯龍並召諸才人請呼皇后帝笑曰是家不好樂雖來無歡以遊娱之事奚從馬后蠶于濯龍中馬后紀自賃范丹學通三經常自賃灌園陳留耆舊傳得印桓帝時沛國戴翼鉏園得黄金印後漢紀行園呉祐遷膠東侯相時濟北戴宏父為縣丞宏年七六從在丞舎祐毎行園常聞諷讀之音甚竒之與為友宏卒成儒宗知名東夏為河間相因自沔歸家不復仕灌園蔬以經書教授年九十八卒銅爵文昌殿西有銅爵園園中有魚池銅爵園西有三臺中央銅爵臺南金鳯臺北氷井臺魏都賦注芳林明帝起土山於芳林園西北陬使公卿百僚皆負成山立松竹雜木善草於其上捕山禽雜獸置其中魏畧芳林園即華林園齊王芳即位改為華林甘露降明帝與東阿王詔曰昔先帝時靈芝生芳林園中自吾建成承露已來甘露復降芳林園仁夀殿前翻車馬鈞巧思絶世居京都城内有地可以為園患無水以灌之乃作翻車令童児轉之而灌水自覆更入更出其巧百倍於常収利向秀與吕安灌園於北山陽収其餘利以供酒食之費起園顔斐字文林為京兆守於府下起菜園使吏㧞簡鋤治也魏志春王文選陸士衡詩逍遥春王圃躑躅千畝田注晋宫閣名曰洛陽宫有春王園廬中范汪性好學外氏家貧無以資給汪乃廬于園中布衣蔬食燃薪寫書寫畢誦讀一遍遂博學多通善談名理晋書苜蓿華􅂒既廢黜武帝後又登凌雲臺望見􅂒苜蓿園阡陌甚整依然感舊太康初大赦乃襲得封上名園王子敬自㑹稽經呉聞顧辟疆有名園先不識主人徑徃其家值顧方集賔友酣燕而王遊歴既畢指麾好惡傍若無人顧勃然不堪曰傲主人非禮也以貴驕人非道也失此二者不足齒人傖耳便驅其左右出門王獨在輿上回轉顧望左右移時不至然後令送箸門外怡然不屑世說呉中舊傳池館林木之勝惟晋顧辟疆園為第一李太白云栁深陶令宅竹暗辟疆園陸羽云辟疆舊園林怪石紛相向陸龜蒙云呉之辟疆園在昔勝槩敵皮日休云更葺園中景應為顧辟疆中呉紀聞㑹心簡文入華林園顧謂左右曰㑹心處不必在逺翳然林木便自有濠濮間想也覺鳥獸禽魚自來親人世說殖果凉州牧張駿増築四城箱各千歩東城殖園果命曰講武場北城殖園果命曰𤣥武圃皆有宫殿王隐晋書逍遙姚興常於逍遥園引諸沙門聼番僧鳩摩羅什演講佛經起逍遥宫殿庭左右有樓閣髙百尺相去四十丈以麻䋲大一圍兩頭各絟樓上㑹日令二人各從䋲䋲行過以為佛神相遇長安志種菜桞元景為尚書令南岸有数十畝菜園園人得賣菜錢三萬送宅元景曰我立此園種菜以供家中啖耳乃復賣以取錢奪百姓之利耶以錢與守園者宋書𤣥圃齊文恵太子好釋氏立六疾館以養窮人而性頗奢麗宫内殿堂皆雕餙精綺過於上宫開拓𤣥圃園與臺城北壍等其中起出土山池閣樓觀塔宇窮竒極麗費以千萬多聚異石妙極山水慮上宫中望見乃旁列脩竹外施髙彰造遊觀数百間施諸機巧宜湏鄣蔽湏㬰成立若應毁撤應手以晋明帝為太子時立西池以起武帝引前例求於東田起小苑上許之壯麗極目南史離垢劉慧斐字宣文游匡山有終焉之志遂居東林寺又于山北構園一所號曰離垢園時人乃謂為離垢先生南史隠逸芙蓉芙蓉園本隋氏之離宫居地三十頃周廻十七里秦謂為宜春苑漢謂為樂遊苑宇文愷營建京城以羅城東南城地髙不便故􅆙此隅頭一方餘地穿入芙蓉池以虚之兩京記芙蓉在京羅城東南隅有青林重複縁城瀰漫若帝城勝景駕時幸之景龍文館記司竹司竹園在盩屋縣東十二里穆天子西征至𤣥池乃植竹即此是也史記云渭川千畆竹漢謂鄠杜竹林故有司竹都尉西都賦所謂鄠杜濵其足竹林果園芳草甘木也隋圗經起樓汝南袁徳師故給事髙之子甞於東都買得婁師徳故園地起書樓洛人語曰昔日婁師徳園今乃袁徳師樓傳載不立張嘉貞雖貴不立田園甞曰吾相國矣未死豈有飢寒憂苦以譴去雖富田産猶不能保也近丗士大夫務廣宅為不肖子孫酒食費我無是也唐書市取唐嗣王臯為山南東道節度使張柬之有園圃在襄陽臯將市取之馬彛諫曰漢陽有中興功今遺業當百世共保奈何使其子孫鬻乎王謝曰主吏失詞以為君羞㣲君安得聞此言上奉誠司徒兼侍中馬燧宅在安邑里燧子少府監暢燧貲甲天下暢亦善殖財貞元末神䇿中尉楊志亷諷使納田産遂獻舊䇿為奉誠園長安志到順宗時復記之中官徃徃逼取暢畏不敢􅈔以至困窮而終諸子無室廬自託奉誠園亭觀故當世視暢以厚畜為戒新唐暢以第中大杏饋竇文埸文埸以進徳宗徳宗未甞見頗怪之令中使就封其樹暢懼進宅廢為奉誠園术皆拆入内國史補桂苑叢談題園楊尚書昭儉退居華下自題家園以見志曰池蓮憔悴無顔色園竹低垂减翠隂園竹池蓮莫惆悵相㸔恰似主人心南部新書瀟灑顔謝魯公之後所居有泉石松竹創亭延客孟賔于留題詩云園林瀟灑聞來久欲徃因循二十秋今日開襟吟不盡碧山重叠水長流江南賦荔枝西夷有荔枝園僰僮扡夷中最賢者古所謂􅈎僮之富多荔枝為業園植萬餘樹収一百五十斛郡國志栗園𤣥瓠灣中有地数頃土有栗園栗小殊不并固安之實也然嵗貢三百寔以充天府水渚即栗洲也樹木髙茂望若屯雲積氣矣林中有栗堂射墩甚閑敞牧宰及英彦多所遊薄水經瓊圃洛陽有瓊圃園靈芝園石祠園鄴有鳴鵠園蒲萄園晋宫闕名祇園湏逹多長者白佛言弟子欲營精舎請佛住惟有祇陀太子園廣八十頃林木欎茂可居白太子太子戯曰滿以金布便當相與湏逹出金布八十頃精舎告成凡千二百區經律異相亦曰給孤園金剛經注舎衛精舎東北六百里毗舎佉毋作精舎請佛及借此處故在秖洹舎大園落有二門一門東向一北向此園即逹湏長者布金錢買地處也精舎當中央佛住此處最久說法度人經行坐處亦盡孝塔皆有名字法顯記菴羅園菴羅是果樹之名其果似桃或云似奈此樹開花花生一女國人嘆異以園封之園既屬女女人守䕶故言菴羅樹園宿善冥薫見佛歡喜以園奉佛佛即受之而為所住闡義拘夷那竭城東行到毗舎離城北有大林重閣精舎佛住䖏及阿難半身塔其城裏本菴婆羅女家為佛起塔今故在城南三里道西菴婆羅女以園施佛住處法顯記天中記卷十五
