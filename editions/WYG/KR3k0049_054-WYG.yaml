body:
  text: 天中記卷五十四明陳耀文撰鹿異名鹿牡麚牝麀其子麛其跡速絶有力􅀢爾雅麚牡鹿也夏至解角麟大牡鹿也􅣩鹿􅀢也􅀢鹿迹也麠大鹿也説文律主四九三十六六主律律主鹿鹿故六月而生家語不觸鹿有角而不能觸麞有牙而不能噬崔豹古今注瑤光星瑶光散而為鹿江淮不祠則瑶光不明彘生鹿春秋運斗樞純善夫鹿者純善之獸也道術得則白鹿見王者明惠及下則見瑞應圖仁獸白鹿仁獸也色若霜雪不與他鹿為羣晉徵祥説殷仲堪上白鹿表曰白者正色鹿者景福嘉義中興書乘鹿獻環黄帝時西王母使使乘白鹿戲環白之休符有金方也神鹿夏禹之時神鹿行於河水金樓子迎乘天子征于菹臺獵菹之獸於是有白鹿一迕乘而逆天子乘蕖黄之乘馳焉穆天子𫝊駕鹿天子西升于黎丘之陽過並公𫝊乃駕鹿遊乎山上買鹿桓公問管子楚之强國舉兵伐之恐力不能過奈何對曰公貴買其鹿公即為百里之城使人載錢二千萬求鹿於楚人楚人釋其農而田鹿管子告楚人賈曰為致生鹿賜子金百斤什至金千斤管子死不擇音晉侯不見鄭伯以為二於楚鄭子家使執訊告子宣子曰鹿死不擇音小國之事大國也徳則其人也不徳則其鹿也鋌而走險急何能擇左𫝊犄角范宣子執戎子駒支親數諸朝今諸侯之事我寡君不如昔者葢言語漏泄則職女之由戎子駒支曰昔文公與秦代鄭秦人竊與鄭盟於是乎有殽之師晉禦其上戎亢其下譬如捕鹿晉人角之諸戎犄之與晉踣之戎何以不免襄十四放鹿兒孟孫獵得麑使秦西巴載之持歸其母隨之而歸秦西巴弗忍而與之孟孫大恕逐之居三月復召以為子傅曰夫不忍于麑又且忍吾子乎采薇得鹿昔有女子采薇菜有所驚而走因䕶得鹿其家遂昌熾故屈子天問云驚女采薇鹿何祐指鹿為馬秦二世之時趙髙駕鹿而從行王曰丞相何為駕鹿髙曰馬也王曰丞相誤耶以鹿為馬髙曰乃馬也陞下以臣之言為不然願問羣臣羣臣半言馬半言鹿當此之時秦王不敢信其目而從邪臣之言鹿與馬之異形乃衆人之所知也然而不能别其是非況于闇昧之是乎陸賈新語鹿王楚王畋於震澤遇羣鹿約千餘王令諸軍張兩翼駈羣鹿入一大谷中谷無他道王將令弓弩並發期盡殪之忽一大鹿突圍而走至王前跪而人言曰我鹿王也今者與其族類盡困於此谷中大王如盡取之則我之族滅絶無有遺類矣我願大王憫而釋之願自今日日獻一鹿則大王可長享而我等不至殲絶也王異之遂命諸將開道縱之大鹿遂跳躍而徃鳴以呼其羣整行而出入大山去自是日有一死鹿置王所獵處僅三年王崩遂止山傍人竒其事為立廟因為鹿王廟震澤事􅁐楚元王在欝林大獵于雲夢之澤云云後吳侵楚萬鹿乘月黒馳繞吳軍若萬馬奔聲吳軍驚遁楚王明日達呉營見鹿迹無數環之一大白鹿見王叙其報恩曲折楚王乃為立廟以旌其徳仍名其山曰仁鹿山谷曰仁鹿谷廟曰仁鹿廟地理志青瑣髙議殺鹿武帝時有殺上林鹿者下有司收殺之朔時在傍曰是故當死者三使陛下以鹿殺人一當死天下聞陛下重鹿賤人二當死匈奴有急以鹿觸之三當死上黙然赦之東方朔别𫝊為幣古者皮幣諸侯以聘享武帝乃以白鹿皮方尺縁以藻繢為幣直四十萬王侯朝覲享聘必為薦璧然後得行史記𤣥鹿鹿千年為蒼鹿又五百年為白鹿又五百年化為𤣥鹿成帝時中山人得𤣥鹿烹而視其骨皆黒色仙者説𤣥鹿為脯食之夀二千嵗餘干縣有白鹿土人傳千嵗矣晉成帝遣人捕得其銅牌刻字在角後云寳鼎二年臨江所獻述異記雨鹿成帝時宫中雨一蒼鹿殺而食之味甚美三角明帝永平中三角鹿出江陵孝和帝永元中豫章餘干得白鹿髙丈九寸古今注隨車鄭𢎞為淮隂太守行春大旱隨車致雨白鹿方道俠轂而行𢎞怪問主簿黄國曰鹿為吉為凶國拜賀曰聞三公車轓畫作鹿明府必為宰相後果為太尉謝承書劉攽云淮隂當作淮陽白鹿甚馴辛繕字公文少治春秋詩易隠居𢎞農華隂弟子受業者六百餘人所居旁有白鹿甚馴不畏人三輔決録烏馴丹羽巢叔和之室鹿呈白毳擾功文之廬晉孝友傳序射子母鹿初明帝為平原王王母甄后妬文帝殺之故不立為太子嘗從帝獵見鹿子母帝射殺鹿母語明帝射其子對曰陛下既已殺其母臣不忍復殺其子因涕泣帝放弓矢歎曰此語一何痛哉由是帝立太子意定矣魏末𫝊禁鹿髙堂隆集曰近日有司宣令殺禁地鹿者身死財産沒官有能先覺白者賞賜之此為重禽獸而賤人也鏡視鹿怪昔張盍蹹及孺寗成二人竝精思於蜀云臺山石室中忽有一人著黄練單衣葛巾到其前曰勞乎道士乃辛苦幽深於是二人顧視於鏡乃見是鹿也因問曰汝是草中老鹿也敢詐為人形也言絶即逐其鹿而走去抱朴子逐鹿免難石勒嘗傭於臨水為遊軍所囚㑹有羣鹿傍過軍人競逐之勒乃䕶免俄而又見一老父謂勒曰向羣鹿者我也君應為中州故相救耳鹿怪謝鯤避地于豫章嘗行經空亭中夜宿此亭舊毎殺人將曉有黄衣人呼鯤字令開户鯤澹然無懼色便於窓中度手牽之髀斷視之鹿也尋血䕶焉爾後此亭無復妖怪化鹿鄱陽樂安有人姓彭世以獵射為業每入山與子俱行後忽蹷然而倒化成白鹿兒悲號鹿超然逺遊遂失所在其子終身不復弋獵至孫復學射忽得一白鹿乃于兩角間得道家七星符並有其祖姓名及鄉居年月焉覩之悔懊乃燒去弓矢永斷射獵異􅁐列異𫝊不云晉咸寜中白鹿就人晉咸和四年七月壬寅長沙郡邏吏黄光於南郡道遇白鹿驅之不去直來就光追尋光二百餘步光遂抱取遣吏李堅奉獻宋書白鹿子陶淡侃之孫雅好導養年十五六便服食絶榖於野得白鹿子馴而養之恒與之俱徃還後遂不復還家晉中興書紫纈青裾淮南陳氏於田種豆忽見有二女姿色甚美著紫纈􅃭青􅅂天雨而衣不濕其壁先挂一銅鏡鏡中見二鹿以刀斫䕶之以為脯陶潜搜神後記救禍項縣人姚年年十餘嵗父為鄉人所殺牛後在縣署前手刃之于衆中吏捕得官長深矜孝節為推遷其事㑹赦得免令後出獵逐鹿入草中有古深穽數處馬將趣之忽見一翁舉杖擊馬馬驚避不得鹿令怒引弓將射之曰此中有穽恐君墮耳令曰爾為何人翁跪曰姚牛父也感君活牛故來謝恩遂滅不見令身感𠖇事在官數年多惠於民文明録白鹿山荆山山臨江皆絶壁峭峙五百餘丈亘帶激流禽獸所不能履北岸有一白鹿浮過江行人競逐之謂至山下必得之鹿忽飛超踰岡而去故名此壁白鹿山袁崧白鹿山詩序孝感伍襲字世公丁父憂盧墓側有一鹿每襲哭輒依墳而悲鳴肅廣濟孝子傳丁茂字仲盧交阯人也至孝母終負土治家列植松栢白鹿遊乎左右廣州先賢𫝊唐頌字徳雅番禺人遭喪六年廬於墓次白鹿拾食冢邊觸網解放孫法宗每􅍪鹿觸網必解放之償以錢物後忽苦頭瘡夜有女人至云我是天使來相謝行瘡本不闗善人使者逺相及取牛糞煮傅之即驗一傅便差一􅔡賴之南史夢積鹿皮梁吉士瞻夢得一積鹿皮從而數之有十一領及覺喜曰鹿者禄也吾當居十一禄乎自其仕進所歴已乆及除西陽武昌二郡太守心惡之遇疾不肯療普通七年卒於郡南史被箭來投㑹稽孔祐至行通神隠於四明山谷中有數百斛錢視之如瓦石不異采樵者競取入手即成沙礫曽有鹿中箭來投祐祐為之養療愈然後去跪祈命天監中有邵文立者世以烹屠為業嘗欲殺一鹿鹿跪而流涙以為不祥鹿懐一麑尋當産育就庖衰切同被刳割因患疾乃深自悔責舍宅為伽藍小莊嚴寺是也梁京寺記鹿娘真山在毗陵梁時有村人韓文秀見一鹿産一女子在地遂收養之既長與凡女有異遂為女冠梁武帝為别立一觀號曰鹿娘死後入棺武帝致祭但聞異香不見骸骨葢尸解也遂葬棺于毗陵因號其葬處為真山述異記山客津陽門詩長生鹿瘦銅牌埀注上嘗於芙蓉園䕶白鹿惟王昊山人識之曰晉時鹿也上異之令左右周視之乃於角際雪毛中得銅牌子刻之曰宜春􅁐中白鹿上由是愈愛之移于北山字之曰山客宣室志作張果詩漢武鹿白鹿升天唐𤣥宗幸温泉見白鹿升天改㑹昌為昭應縣㑹昌解頥㑹昌新豐也角八岐唐京師安國寺什元康貞觀中遊學京邑有彭田之譽先居山野見一鹿角分八岐厥形絶異撫而馴伏遂豢養之乘而致逺曽無倦色以三論之文荷之於背又以小軸係之于尾曳入上都意為戲㺯人背駭觀焉宋髙僧傳馴墓禇無量丁母憂解軄廬於墓側其所植松栢時有鹿犯之無量泣而言曰山中衆草不少何忍犯吾先瑩樹哉因通夕守䕶俄有羣鹿馴押不復侵害無量因此終身不食鹿肉唐書獻白鹿不視正元八年正月鄂州觀察使何士幹獻白鹿上曰朕初即位即上祥瑞士幹致白鹿其謂我何還之彼當慚懼留之逺近復獻竟不視遂放於􅁐中焉唐㑹蹄下貫環虞部郎中陸紹弟為盧氏縣尉常觀獵人獵忽遇鹿五六頭臨澗見人不驚毛斑如畵陸怪獵人不射之之獵者言此仙鹿也射之不能傷且復不利陸不信強之獵者不得已一發失鹿帶箭而去及返射者墜崖折左足蹄下貫環胡珦為號州時獵人殺得鹿重一百八十斤蹄下貫銅環上有篆字博物者不能識酉陽雜俎剖鹿得珠唐寳厯中范陽節度使朱克融獵得一鹿鹿膽中得珠如彈丸黒色初軟後硬如石光明克融以為已瑞或問麻安石曰是何祥也安石曰此事自古未有請以意推之鹿者禄也鹿死是禄盡也珠初軟後硬是珠變也禄盡珠變必有變易之事衰亡之兆也自此克融言詞輕發是年五月帳下軍亂而全家被殺祥驗集人語開寳七年金陵􅁐圃中鹿忽一旦人語牧者叱之鹿亦叱牧者曰明年今日汝等俱作鬼物􅁐囿荒凉焉能拘我明年宋師渡江牧者俱死鬭敵􅁐囿亦廢矣金陵志遊牝江陵松滋枝江村射鹿者率以淘河烏脛骨為管以鹿心上脂膜作簧吹作鹿聲有大號小號呦呦之異或作麀鹿聲則麚鹿畢集葢為牝聲所誘人得轂矢而注之南中多鹿毎一牡管牝百類至春羸廋葢遊牝多也及夏則唯食昌蒲一味却肥當角鮮之時其茸甚痛獵人逢之其鹿不敢逆走伏而不動獵者以繩繫其茸截而取之先以其血來噉然後殺之鹿何其苦也與夫狨麝孔雀以有用賈害良可愍之北夢瑣言麋畯麋千百為羣掘食草根其處成泥名曰麋畯民隨此畯種稻不耕而穫其收百倍博物記鹿瓊鹿者仙獸常自能樂性從其雲泉至六十年必懐瓊于角下角有班痕紫色如㸃行或有涎出于口不復能急走矣天𤣥主物簿伊尼佛書謂鹿為伊尼山谷詩照灘行郭索焚野得伊尼般若經世尊三十二相第八相名曲腨纖圖如延鹿王一云密利伽羅性驚胡居士嘗言鹿性驚烈多别良草食九物餘則不嘗九草者一曰葛葉及花鹿藥白蒿水芹丼草齊頭蒿山耳薺苨也享神用其肉者以其性烈清浄也凡餌藥者勿食鹿肉以鹿常啖解毒之草也山谷鹿市蜀郡頥慕山山有穴如慕之口故名髙七百二十丈崖岩直峭有平地百餘步坦然方正諸山之鹿一日一聚其中號曰鹿市圖經兩頭雲南郡出茶首其音為蔡茂是兩頭鹿名也獸是鹿兩頭其腹中胎常以四月中取可以治虵虺毒永昌亦有之博物志雲南郡有熊倉山上有神鹿一身兩頭主食毒草名之食毒鹿魏宏南中志武陵郡西有山山有獸如鹿前後有頭常以一頭食一頭行山中時有見之者盛𢎞之荆州記㦸食鐡之獸射噬毒之鹿蜀都賦鹿寨鹿夜臨宿下鹿角寨大者角而外四圍小者在中團圍如寨今人以木倣作鹿角寨瑣碎録江同祖過郢州京山晩抵村驛驛人言鹿在前結寨即出觀之彌望可數里巨鹿無數四環成圍以角外向凡數十重兩麑塵處中勃跳嬉戲民田相近者悉遭蹂踐禾苗為之一空獵户雜沓其傍云不可近近輒觸遭之者多死明旦始引去獵人操弓矢戈矛追隨之伺巨者行前稍逺乃敢捕射其稚弱亦各有所䕶而還背食字統云麤驚防也鹿之性相背而食慮人獸之害也旅行麗旅行也鹿之性見食急則必旅行禮麗皮納聘葢鹿皮也説文鹿胎山嵊縣剡山一名鹿胎山昔有獵士陳惠度射鹿此山鹿孕而傷既産以舌䑛子乾而母死惠度遂投寺為僧後鹿死處生草名曰鹿胎草浙江志几化㑹稽記上虞蘭室山葛𤣥所隠之處有隠几化為鹿鹿鳴即縣令有罪獨異志赤鹿張掖南山一名天山一名雪山出赤鹿足短而形大如牛肉千斤寰宇記馬鹿陶隠居云古稱馬之似鹿者直百金今荆楚之地其鹿絶以馬當解角時望之無辨土人謂之馬鹿以是知趙髙指鹿為馬葢以類耳爾雅翼無用鹿形似馬而迅於馬豺形似犬而徤於犬國有千以犬馬有用而豺鹿無用也劉子䑛鹹遼穆宗應厯十一年夏射䑛鹹鹿于玉山䑛鹹鹿性嗜鹹灑􅜮于地以誘鹿射之國語解䑛作􅀈塵名􅁐曰鹿之大者為麈羣鹿隨之皆視麈所徃以尾所轉為凖故名談者揮焉其尾辟塵以置於衣帛中能令嵗久經色不黦以之拂氈令氊不蠧恩平郡譜云沈牛謂之囬沙牛謂之磨麈謂之荒鹿謂之擢無魂麞鹿無魂白瞻善怖道書麋茸麋茸補陽鹿茸補隂𤨏碎録為脯麝鹿非辰屬八卦無主故道家聴許為脯陶氏書黠獸山澤之獸無黠於麋麋知獵者張綱前而驅已也固還走而冐人至數獵者知其詐偽舉綱而進之麋因得矣楚策並負子海陵沿海洲上蘆葦無際羣麋馬大迅走人欲捕之雖麑不獲葢常兩兩並負其子而行太州志噬虺食栢西北之麝噬虺而食栢故其香結東南山谿有松而無栢故麝不結也趙辟公雜説固臍商汝山中多麝絶愛其臍毎為人所逐勢且急即自投髙岩舉𤓰裂出其香就繫而死猶拱四足以固其臍李商隠詩云投岩麝退香羊形舉羊祥也象頭角足尾之形孔子曰牛羊之字以形舉也羊在六畜主給膳也羊大則美故从大羸瘦也羊以瘦為羔羊子也咩羊鳴也羴羊臭也説文説文云達小羊也薛綜答韋昭曰羊子初生達小名羔未成羊曰羜大曰羊長幼之異名詩生民疏大羊為羬六尺尸子小羊曰集韻柔毛凡祭祀宗廟之禮羊曰柔毛曲禮髥鬚主簿羊一名髥鬚主簿古今注羊而不角曰羖羊一名胡鬚郎又名青鳥蛟羊似羊而無角啖之毒羊䞇凡䞇卿用羔羔有角而不用如好仁者執之不鳴殺之不謗類死義者羔飲其母必跪類知禮者羊之為言猶祥故以為䞇春秋繁露譙周法訓曰羊有跪乳之禮鷄有識時之候鴈有庠序之儀人取法焉鄭氏婚禮謁文讃曰羣而不黨跪乳有敬禮以為䞇吉事之宜六飛有人黄頭大腹出天齊政三百四嵗春秋命歴序神次之號曰皇神出淮駕六飛羊政三百嵗五葉千五百嵗六角羊周成王時東夷進六角羊周厲王元年外國貢三角羊述異記白血犬戌朝天子于雷首之河乃獻良馬四駟天子使孔牙受之曰雷水之中爰有黒牛面角黒羊白血也穆天子傳刳羊齊攻魯魯使栁下惠于齊齊侯曰魯君將懼乎栁下惠曰齊魯之初封也相與出周南門刳羊而約曰自後子孫敢有相攻者令其罪若此刳羊矣臣之君固以刳羊不懼矣齊侯乃解兵三百里説􅁐羊舌為氏昔有攘羊者以羊頭遺晉叔向向母埋之不食後三年攘羊事發追捕向家檢羊骨肉都盡唯有舌在國人異之遂以羊舌為氏尚羔魯定公㑹晉師于瓦范獻子執羔中行文子趙簡子皆執鴈魯於是始尚羔魯以前同贄始知執羔之貴謀羞魯侯時欲以孔子為司徒將召三桓而議之左丘明曰周人有愛裘而好珍羞欲為千金之裘而與狐謀其皮欲具少牢之珍而與羊謀其羞言未卒狐相率迯於重丘之下羊相呼藏于深林之中故周人之謀失之矣今君欲以孔子為司徒召三桓而謀之亦與狐謀裘與羊謀羞哉符子土怪季桓子穿井獲如土􅇲其中有羊焉使問仲尼曰吾穿井得羊何也對曰以某所聞非羊也木石之怪䕫魍魎水之怪龍罔象土之怪羵羊也家語魯衰公使人穿井三月不得泉得一生羊焉公使祝鼓舞之欲上於天羊不能上孔子見曰水之精為玉土之精為羊此羊肝土也公使殺羊視肝即土韓詩外𫝊問仲尼曰穿井獲狗何也仲尼曰以某所聞羊也搜神記植羊晉文種菜曽子植羊非性闇蠢不辦方隅以其運大不習小務也劉子觀量篇謂剉羊皮用土和之也羊盟齊莊公之臣王國卑與中里檄者訟三年而獄不斷恐失有罪使二人共一羊盟齊之社二子相從以羊血灑社讀王國卑之詞已盡中里檄之詞未半祭羊起而觸中里檄齊人以為神墨子隠於屠肆屠羊説楚人隠於屠肆昭王失國説往從王王反國欲將賞説説曰大王失國説失屠羊大王反國説亦屠羊臣之爵禄已復矣又何賞之有王使司馬子綦延之以三珪之位説曰願長反屠羊之肆耳遂不受髙士𫝊拜鄰魏文侯見宋陵子三仕不願文侯曰何貧乎曰王見楚富者牧羊九十九而願百嘗遊邑里故人其鄰人貧有一羊者富拜之曰吾羊九十九今君之一盈成我百則牧數足矣鄰者與之從此觀焉富者非富貧非貧也符子臧穀亡羊臧與穀二人相與牧羊而俱亡其羊問臧奚事則挾䇿讀書問穀奚事則博塞以遊二人事業不同其亡羊均也莊子荷箠楊朱見梁惠王言治天下如運諸掌王曰先生有一妻一妾而不能治三畆之園而不能耘言治天下何也曰君見夫牧羊者乎百羊為羣使五尺童子荷垂而隨之欲東而東欲西而西使堯牽一羊舜荷垂而隨之則不能前也列子格虎張儀謂楚王曰夫為從者無異驅羣羊而致生虎虎之與羊不格亦明矣今王不與虎而與羊臣竊以為大王之計過也春秋後語鄭太對董卓驅虎兕以赴犬羊將狼黥布反上病欲使太子將徃擊之四皓説建成侯曰今諸將皆陛下故等夷乃令太子將此屬無異使羊將狼莫肯為用史記敗羣卜式牧百羊十餘年羊致千餘頭上曰吾有羊在上林欲令子牧之乃拜為郎式布衣屮蹻而牧羊嵗餘羊肥息上過其羊所善之式曰非獨羊也治民亦猶是矣以時起居惡則輒去無令敗羣上竒其言拜緱氏令漢書出澗郡國志云呉房堂溪有白羊淵淵水舊出山羊漢武帝封二年有白羊出此淵畜牧者禱祀之初出一羊婦人大驚拍手羊自此絶焉今欲生羊禁婦人拍手是効古也水經注同牧讀路温舒鉅鹿人父為里監門使温舒牧羊温舒取澤中蒲截以為牒編寫書漢書王育字伯春京兆人也少孤貧為人慵牧羊毎過小學必戲欷流涕時有暇即折蒲學書忘而失羊為羊主所債育將鬻已以償之同郡郭子章聞而嘉之代育償羊給其衣食使與子同學遂博通經史子章以兄之子妻之叱石皇初平年十五家使牧羊有道士見其良謹便將至金華山石室中四十餘年忽然不復念家其兄初起行索初平歴年不得後見市中有道士乃問之道士曰金華山中有牧羊兒姓皇宇初平兄乃隨道士與初平相見語畢問羊何在在山東兄徃視但見白石不見羊平曰羊在耳兄自不見平乃徃叱之曰羊起於是白石皆起成羊數萬頭神仙傳鬼化羊南陽宗定伯夜行忽逢一鬼鬼問伯為誰伯欺之曰我亦鬼也遂為侣向宛行勌因相擔問鬼曰鬼何畏曰鬼唯不喜唾耳欲至宛便擔鬼著頭上詣宛市鬼化為羊伯恐其變遂唾之因賣得錢千五百買者將還繫之明旦見繩在時人語曰宗定伯賣鬼得錢千五百搜神記化羊曹公收左慈慈走入羣羊中失慈之所在追者疑化為羊乃令人數羊羊本千口揀之長一口知果化為羊乃謂曰若是左公者但出無苦也有一羊跪云遽如許追者欲執之於是羣羊皆跪曰遽如許追者乃去仙𫝊羊車武帝平吳後多内寵莫知所適嘗乘羊車恣其所之至便宴寢宫人乃取竹葉挿户以鹽汁灑地而引帝車胡貴嬪芳最蒙愛幸殆有専房之寵晉后妃𫝊宋之帝好乘羊車經諸房潘淑妃毎粧飾褰帷以候并密令左右以鹽水灑地帝每至户羊輒䑛地不去帝曰羊乃為汝徘徊况于人乎以此愛傾后宫南史后妃𫝊劉毅奏羊琇乘羊車請免官詔曰羊雖無制非素乘者可如其奏太元起居注牧羊張華少孤貧自牧羊同郡盧欽見而器之鄉人劉放亦竒其才以女妻焉晉書質羊桓彝亡後子冲兄弟并少家貧母患須羊以解無由得之温乃以冲為質羊主甚富言不欲為質幸為養買得郎買得郎冲小字也及冲為江州出射羊主于堂邊看冲識之曰我買得也遂厚報之負魚石虎嘗晝寢夢見羣羊負魚從東北來寤以訪浮圖證證曰不祥也觧卑其有中原乎慕容氏後果都之髙僧傳投客顧霈者呉之豪士送客於昇平亭時有一沙門在坐是流俗道人主當欲殺羊羊繩斷便走來入此道人膝中穿頭入袈裟下道人不能救即將去而殺之既行炙主人先割以啖道人道人食炙下喉炙便自走行道人皮中痛毒不可忍呼醫來針之以數針貫之炙猶動搖乃破出之故是一臠肉耳道人於是得病作羊鳴吐沫還寺少時便死續捜神記王克為永嘉郡守有人餉羊集賓欲讌而羊繩解來投一客先跪兩拜便入衣中此客竟不言之固無救請須臾宰羊為炙先行至客一臠入口便下皮内周行遍體痛楚號呌方復説之遂作羊鳴而死顔氏家訓羊怪呉興俞亮以永明八年補䕶軍府吏於長眠處聞有羊聲疑為神怪竊於户窺之見其床下有一羊可髙二尺毛色若丹光耀滿室續異記夢盜入獄京兆許超夢盜羊入獄問於楊元慎曰君當得陽城令其後有功封陽城侯伽藍記青衣乞命隋大業中長安趙文若嘗因使暫憇一驛㕔上夢一青衣婦女乞命甚急文若驚寤問之乃驛長將殺青㹀羊相待也即贖放之宜祥記鬭羊王君㚟破吐蕃於青海西張説策其且敗因上巂州鬭羊於帝以申諷諭曰使羊能言必將曰鬭而不解立有死者所賴至仁無茂量力取歡焉帝識其意納之賜綵千匹西舍利凡曲名十有二五曰鬭羊勝驃云來乃昔有人見二羊鬭海岸強者則見弱者入山時人謂之來乃來乃者勝勢也食頭開元末有人好食羊頭者嘗晨出有怪在門焉羊頭人身怪衣冠甚偉告其人曰吾未之神也其屬在羊吾以汝好食羊頭故來告汝輟食則已若不爾吾將殺汝其人大懼遂不復食紀聞食羊邠公杜悰福夀少倫日食五飧一食之費皆至萬錢京西李客見人牧羊遍滿山谷不知幾千萬口詰之自何而來自鄜夏供相公食耳指顧之際轉首恍然並無所覩乃神靈所授也中朝故事李徳裕為太子少保分司東都嘗召一僧問已之休咎僧曰公災當南行萬里公曰南去遂不還乎僧曰當還耳公究其事對曰相國平生當食萬羊今食九千五百矣所以當還者未盡五百羊耳公慘然而嘆曰吾師果至人且我元和十三年為丞相張公從事於北都嘗夢行晉山見山上盡目皆羊有牧羊者十數迎拜我因問牧羊者牧者曰此侍御平生所食羊吾嘗識此夢不洩於人今者果如師之説耶後旬餘振武節度使朱塈遣使至書於公且饋四百羊公大驚即召僧告其事僧嘆曰萬羊將滿公其不還乎公曰吾不食之亦可免耶曰羊至此已為相國所有公戚然不悦旬日貶潮州司馬連貶崖州司户竟沒於荒裔補録紀傳宣室志一品集𡨕數論云余嘗三遇異人非卜祝之流惟再謫南服未嘗有前知者則萬羊之説疑即杜公事而宣室志等傳聞之誤耳蒙皮王處存以輕兵三千蒙羊皮夜布之野李全忠軍望為羣羊争趍之李茂勲𫝊羶根薛昭緯經巢賊亂流離絶粮遇舊識銀工延昭緯飲食甚豐以詩謝之曰一楪氈根數十皴盤中猶更有紅鱗早知文字多辛苦悔不當初學治銀南楚新聞請命黄載字元吉精究經史遂不復進取肄業之士多從之諸生醵㑹市羊以俻饌載夢一羊前跪請命晨出見羊跪伏如所夢載以已緡償諸生而畜其羊又畜一犬亦頗馴出入則羊犬聨隨潭倅夏中正為作犬羊仙序以記其事南唐書羊生人手寧州真寧縣有牽羊教化者其羊胸前有一手抱胸如人手有六指甲如羊頗長皆言前身為人因過惡致此縣令張元弼疑之主簿尹良臣曰此無他人與羊交耳衆人皆伏北忩記異苦泉羊梁氏志云馮翊朝邑縣許原下地有苦泉水味醎苦羊飲之肥而肉美今於泉側置羊牧因相𫝊渭沙􅁐細肋羊諺曰苦泉羊洛水漿寰宇記元和郡圖縣志一角龍魚河圖曰羊有一角食之殺人白澤圖曰羊有一角當頂土龍也殺之震死如驢僧𤣥裝至西域大雪山髙嶺上有一村養羊大如驢酉陽生土拂林國有羊羔生于土中其國人候其欲萌乃築垣以環之防外獸所食然其臍連地割之絶則死惟人著甲走馬擊鼓駭之其羔驚鳴而臍絶因逐水草以一二百口為羣舊唐大尾月氏有羊尾重十斤稍割以供食尋生如故宋膺異物志康居出大尾羊尾上旁廣重十斤靈羊尾大者重二十斤行則以車載羊取脂大食勿斯離國産胡羊髙三尺餘其尾如扇毎嵗春時割取脂二十餘斤再縫合仍生不取則脹死又莊浪有饕羊土人嵗取其脂羊久復滿腹二種羊有二種不可食毛長而黒壯者曰骨䍽白而有角者曰古羊皆羶臭發病羊之大者不過五十斤奚中所産者百餘斤膳夫録龍羊龍羊出吐蕃及蜀威茂州形似畜羊而大其角繚上重八九兩黒質而白文帶以為帶胯其用亂犀宋祁益州方物賛青羊千嵗之樹精為青羊𤣥中記􅄢賓國出野青羊如翠色土人食之酉陽四種忽魯謨斯國羊有四種大尾綿羊重七八十斤其尾濶一尺餘拖地重二十斤狗尾羊如山羊尾長二尺餘鬭羊髙二尺七八寸前截毛長拖地後半皆剪净頗頗似綿羊角彎向前上帶小鉄牌好鬭好事者養之賭博為戲瀛羊勝覽毛短如犬阿丹國綿羊白毛無角於角處有兩搭圓黒甚異其項下如黄牛袋毛短如犬尾大如盤跛牂故十仞之城樓季弗能踰者峭也千仞之山跛牂易牧者夷也故明王峭其法而嚴其刑也韓子五蠧李斯對二世書曰城髙五丈而樓季不輕犯也太山之髙百仞而跛牂牧其上夫樓季也而難五丈之量豈跛牂而易百仞之髙哉陗塹之勢異也史記五角蜀復山郡有五角羊觥羊觥羊之毅鳴不類太𤣥觥羊大羊也虎皮或曰有人焉自姓孔而字仲尼入其門升其堂伏其几襲其裳則可謂仲尼乎曰其文是也其質非也敢問質曰羊質而虎皮見草而説見豺而戰忘其皮之虎也楊子吾子滛佷卞彬為禽獸决録目禽獸云羊性淫而佷猪性卑而率鵝性頑而傲狗性險而出皆指斥貴勢其羊淫佷謂呂文顯猪卑率謂朱隆之鵝頑傲謂潘敞狗險出謂文度其險詣如此皂莢江東謂羖羊角為皂莢南史陳紀融鉄鑄鉄不銷以羊頭骨灰致之乃消融也物類相感志變羊萬夀年中長安百姓李審言忽得病如狂須與羊同食家人無以止求醫不效後忽西走近將百里路傍遇羣羊遽走入其内逐之者方至審言已作為一大羊於衆中不能辨認及家人齊至泣而釋之其一大羊乃自語曰將我歸慎勿殺我我為羊快樂人何以比遂將歸飼養以終天年犬犬犬狗之有懸蹄者也孔子曰視犬之字如畫狗也狗叩也叩氣吠以守也説文尨犬多毛也猲短喙犬也㺌犬吠不止也獒犬如人心可使也㹞徤犬也狄赤犬也狡少狗也匈如地有狡犬巨口而黒身獿獀南越名犬也上獹韓良犬也㹱鵲宋良犬也􅜏逐虎犬也吕忱字林守犬為獖隴西以犬為猶㺜㲰皆多毛犬也獟猘也䂏屈尾犬也何承天纂文狗有懸蹄短尾之號殷虞晉獒並犬名也廣雅槃瓠昔髙辛氏有犬戎之冦帝募有能得其將呉將軍搜神作呉將軍𤣥中記作犬戎頭者厚賞之妻以少女時帝有畜狗其毛五采名曰槃瓠下令亡三月以其首來帝乃以女配之槃瓠負女而走入南山止石室中經三年生六男六女槃瓠死後因自相夫妻其母後歸以狀白帝於是使迎致諸子賜以名山廣澤其後滋蔓號曰蠻夷今長沙武陵蠻是也後漢髙辛氏有老婦居王室得耳疾挑之乃得物大如繭婦人盛瓠中覆之以槃俄項化為丈其文五色因名槃魏畧武溪山髙可萬仞半有槃瓠石窟可容數萬人窟中有石似狗形蠻俗相𫝊即槃瓠也武陵記毎嵗七月二十五日種類四集於廟扶老攜幼環宿其旁凡五日祠以牛彘酒鮓椎歌歡飲即還惟不用犬云辰陽風土記逐犬少康逐犬而顛隕厥首言夏后少康因田獵放犬逐獸遂襲殺澆而斷其頭楚詞矩狗湯四方獻令伊尹請正南以矩狗為獻孔氏曰矩狗狗之善也執犬周成王時渠搜國獻鼩一作鼩犬鼩犬者露犬也能飛食虎豹周書王㑹執虎豹天子之狗走百里執虎豹穆天子𫝊龍狗天子東征以行流沙天子之豪牛豪馬龍狗豪羊上注龍龍茸謂猛狗或曰龍亦狗名鵠蒼徐君宫人姙娠而産卵以為不祥弃於水濱孤獨老母有犬名鵠蒼獵於水濱得所棄卵銜以來歸獨母以為異覆煖之遂􅭨蝍成小兒生時正偃故以為名徐君宫中聞之乃更録取收養長而仁智襲君徐國後鵠蒼臨死更生角而九尾實黄龍也偃王葬之徐梁界中今名狗壟鵠蒼或名后蒼􅅯王志博物志周狗晉侯飲趙盾酒伏甲將攻之其右提彌明知之趨登曰臣侍君宴過三爵非禮也遂扶以下公嗾夫獓焉明摶而殺之盾曰弃人用犬雖猛何為鬭且出左宣二靈公食趙盾公曰聞子之劍葢利劍也子以示我我將觀焉盾起將進劍祁彌明自下呼之曰盾食飽則出何故拔劍於君所盾知之躇階而走公有周狗謂之獒呼而屬之獒亦躇階而從之彌明逆而踆之絶其頷趙盾顧曰君之獒不若臣之獒也公羊注躇猶超遽周狗可以比周之狗所指如意踆以足逆蹋之瘈狗宋國人逐瘈狗瘈狗入於華臣氏國人從之臣懼遂奔陳左襄十七狾狗鄭子陽剛毅而好罰其於罰也執而無赦舍人有折弓者畏罪而恐誅則因狾狗之驚以殺子陽此剛猛之所致也淮南汜論茹黄荆文王得茹黄之狗宛路之矰以畋雲夢三月不返得舟之姬期年不朝葆申束細箭五十跪而加之王背出而自沈於淵荆王乃殺茹黄狗折矰放舟之姬吕覽噬犬秦伯有齧犬弟鍼欲請之秦伯不與鍼以百兩金易之又不聴因逐鍼而奪其爵昭元事兄有噬犬弟何欲易之以百兩卒無禄楚詞吠狗叔孫婼如晉晉人執之館諸箕吏人之與叔孫居放箕者請其吠狗弗與及將歸殺而與之食之叔孫所館者雖一日必葺其牆屋去之如始至昭二十三作狗吠文種過范蠡之門蠡于狗洞作狗吠文種曰狗當吠人蠡乃以我為人迴車至其門入内而拜薦為越相劉子知人篇曰范蠡于犬竇文種聞而拜之給祭景公走狗死命外供之棺内給祭晏子諫公曰亦細物也特與左右為笑耳晏子曰孤老凍餒無食狗死有祭鰥寡不恤而死狗有棺行辟若此百姓聞之必怨吾君諸侯聞之必輕吾國而乃以為細物君其圖之公曰善趨庖治狗以㑹朝屬晏子春秋葢埋仲尼之畜狗死使子貢埋之曰吾聞之弊帷不棄為理馬也弊葢不棄為埋狗也丘也貧無葢於其封也亦與之席無使其首陷焉檀弓國狗呉徴㑹于衞子木曰長木之弊無不摽也國狗之瘈無不笑也而况大國乎宋淖介鬭閭里有狗宋人之駑狗也其家命之為淖逐狗不及止而望之自以為過矣莊子韓盧齊欲伐魏淳于髠謂齊王曰韓子盧者天子之壯犬也東郭􅀈者海内之狡兔也韓子盧逐東郭􅀈環山者三騰山者五兔極于前犬疲於後犬兔俱罷各死其處田父見而䕶之無勞勌之苦而擅其功今齊魏相持頓兵弊衆臣恐强秦大楚承其後而有田父之功也戰國策騏驥長鳴白樂昭其能盧狗悲號韓國知其才曹子建求自試表昔韓盧之取兔也上觀下獲不甚多殺願次卿少緩誅罰思行此術張敞與嚴延年書嚴尤謂陳茂曰是猶紲韓盧而貴之獲也莾傳周嚳客謂孟嘗君臣聞周氏之嚳韓氏之盧天下疾狗也見莬而指屬則無失兔矣望見而放狗也則累世不能得兔矣狗非不能屬之者罪也説苑迎吠楊朱之弟曰布衣素衣而出天雨解素衣布衣而反其狗迎而吠楊布怒將朴狗楊朱曰子無朴矣向者使汝狗白而往黒而來豈能無怪哉列子跖狗貂勃常惡田單於廟單召而問之貂曰勃然跖之狗可使吠堯非貴跖而賤堯狗自吠非其主者且公孫子賢而徐子不肖然而公孫子與徐子聞徐子之狗攫公孫子之腓而噬之哉單乃任貂勃於王春秋後語髙祖詔齊捕蒯通通至上曰若何教淮隂侯反對曰然跖之狗吠堯堯非不仁狗故吠非其主史記相狗齊有善相狗者其鄰籍之買鼠狗期年而得曰良狗也其鄰畜之數年不噉鼠以告相者曰此志在麞麋豕鹿不在鼠欲其取鼠也則梏之其鄰桎其後足則狗取鼠吕氏春秋徐無鬼曰嘗語君吾相狗也下之質執飽而止是狸徳也中之質若視日上之質若亡其一莊子命狗齊有貧者命其狗為富命其子為樂方將祭狗入於室叱之曰富出祝曰不祥家有禍長子死哭之曰樂乎而不自悲也尸子字犬康衢長者字僮曰善摶字犬曰善噬賓客不過其門三年長者怪而問之以實對於是改之賓客復往尹文子據掖吕后七年三月中祓還過軹道見物如蒼犬據后掖忽弗復見卜之云趙王如意為􅑂后遂病掖傷崩史記生角文帝後五年齊雍城門外有狗生角京房易𫝊曰執政失下將害之厥妖狗生角君子茍免小人陷之厥妖狗生角漢五行志天狗下梁而呉楚攻梁狗生角於齊而三國圍齊青骹楊萬年有獵狗名青骹直百金西京雜記白望茂陵少年李亭好馳逐鷹犬皆制佳名狗則有修毫釐睫白望青曹之號上與人鬭成帝河平元年長安男子石良劉音相與同居有如人狀在其室中擊之為狗走出去後有數人被甲持弓弩至石家良等格擊或死或傷皆狗也自二月至六月乃止其於洪範皆犬禍也漢五行志青狗為怪占仲子婢死有女四嵗數來撫循亦能為沐頭浣濯甚令人惡之道士云其家青狗為之殺之便止楊仲文亦言能知家嫗死未葬忽起飲食醉后而坐祭床上如此三四家益厭苦其後醉形露壊垣得老狗便行打死之推問乃里頭沽家狗桓譚新論搜神記以李徳事同人行桂陽太守汝南韋叔堅少時為從事其家狗忽人立而行家中皆請殺之叔堅云犬馬喻君子狗見人行行效之何傷叔堅為縣令還解冠榻上狗戴持走家人驚愕復云誤觸冠冠纓挂著耳狗尋于竈前畜火家益驚愕叔堅曰兒軰皆在田中狗助畜火幸可不煩鄰里亦何所惡也遂不肯殺後數日狗自暴死卒無纎芥之異叔堅至太尉終於位風俗通著冠靈帝熹平四年於西園㺯狗著進賢冠帶綬以為笑樂有一狗突出走入司徒府門或見之者莫不驚怪配人光和四年又於西園㺯狗以配人袁山松書不吠漢末富春有桑君者養犬數年不吠孫文臺微時經此犬忽吠之桑謂文臺曰君其異相乎及貴欲報桑無祈好惟好張畢捕魚文臺為作九里畢以贈之文臺堅字也郡國志上屋公孫淵未亡家數有怪犬冠幘絳衣上屋魏志烏狗雍闓欲絳魏説夷曰官欲得烏狗三百頭膺前盡黒蟎腦三㪷斵木溝三丈者三千枚汝能得不夷皆從闓華陽國志沾草孫權時李信純襄陽紀南人也家養一犬字曰黒龍愛之尤甚行坐相隨飲饌之間皆分與食忽一日於城外飲酒大醉歸家不及卧於草中時遇太守鄭瑕出獵見田草深遣人縱火爇之信純卧處恰當順風犬見火來乃以口拽純衣純亦不動卧處比有一溪相去三五十步犬即奔往入水濕身走來卧處週迴以身濕之獲免主人大難犬運水困乏致斃於側俄爾信純醒來見犬已死遍身毛濕甚訝其事週迴覩火蹤跡因爾慟哭聞於太守太守憫之曰太之報恩其於人人不知恩豈如犬乎即命具棺槨衣衾葬之今紀南有義犬􅊘髙十餘丈搜神記太和中廣陵人楊生養狗甚憐愛之行止與俱後生飲酒醉行大澤草中眠不能動時冬月野火起風又猛狗周章號喚生醉不覺前有一坑水狗便走往水中還以身灑生左右草沾水得著地火尋過去生醒方見之他日又闇行墮空井中狗呻吟徹曉湏㬰有人過怪之就視見生生曰君可出我當厚報君人曰以此狗見與便當相出生曰此狗曽活我於已死不得相與餘即無惜人曰若爾便不相出狗因下頭目井生知其意乃語路人以狗相與人乃出之繫狗而去後五日狗夜走歸續搜神記天公狗王姥黄龍中九嵗病死自朝至暮復蘇云見一老嫗挾將飛見北斗君有狗如獅子大深目伏井欄中云此天公狗也洋明録崖柴丁謐為尚書多所忽畧雖與何晏鄧颺同位而皆少之惟以勢屈于爽爽亦敬之言無不從故于時謗書謂臺中有三狗二狗崖柴不可當一狗憑黙作疽囊三狗謂何鄧丁也黙者爽小字也言三狗皆欲嚙而謐尤甚魏畧類聚作啀喍事類賦作睚眦引衣孫峻與亮謀誅諸葛恪恪將見之夜精爽擾動通夕不寐嚴畢趨出犬銜引其衣恪曰犬不欲我行乎還坐頃刻乃復起犬又銜其衣恪令從者逐犬遂升車被殺呉志黄耳陸機少時頗好遊獵在呉豪盛客獻快犬名曰黄耳機後仕洛常將自隨此犬黠慧能解人語又常借人三百里外犬識路自還一日至家機覉旅京師久無家問機戲語犬曰我家絶無書信汝能齎書馳還取消息否犬喜搖尾作聲應之機試為書盛以竹筒繫之犬頸犬出驛路疾走向呉入草噬肉取飽毎經大水輒依渡者弭毛掉尾向之其人憐愛因呼上船載近岸犬即騰上速去如飛逕至機家口銜竹筒作聲示人機家開筒取書看畢犬又向人作聲如有所求其家作荅書内竹筒中復繫犬頸犬既得荅仍馳還洛計人行程五旬而犬往還裁半月後犬死殯之遣送還家葬機村南去機家二百步築土為墳村人呼為黄耳塜述異記犬名黄耳崔豹古今注三尺太康七年郊天壇下有白狗髙三尺光色鮮明恒卧見人則去魏晉俗語犀犬元康中婁縣瑤懐家忽聞池中有犬聲視之得犬子䧳雄各一長老云此名犀犬得之者富搜神記晉志云經宿失所在的尾晉大興二年呉人華隆好獵養一快犬號曰的尾常時自隨隆後至江邊伐荻犬暫出渚次隆為大虵圍繞周身犬還便咋虵虵死隆僵無所知犬彷徨涕泣走還船復反草中同伴怪所以隨往見隆悶絶將歸家二日犬為不食隆復蘇乃始進飯隆愈愛惜同於親戚地狼大興四年廬江􅏦縣何旭家忽聞地中有犬子聲掘之得一母犬青釐色狀甚羸瘦走入草中不知所在視其處有二犬子一雄一雌哺而養之雌死雄活及長為犬善噬野獸其後旭里中為蠻所沒晉五行志地中有犬名曰地狼尸子掘地得犬名曰賈夏鼎志烏龍㑹稽張然滯役有少婦無子唯與一奴守舍奴遂與婦通然素養一狗名烏龍常自隨婦奴欲謀殺然盛作飯食婦然然與君當大别離君可彊噉奴已張弓㧞刀須然食畢然涕泣不能食以肉及飯擲狗祝曰食汝經年吾當將死汝能救我否狗得飡不噉唯注睛視奴然拍膝大喚曰烏龍犬應聲傷奴奴失刀伏倒地狗咋奴頭然因取刀斬奴以婦付官殺之搜神記韋善俊挾一犬號烏龍後化龍乘之飛昇而去續仙𫝊韓渥詩洞房深閉不曽開横卧烏龍作妬媒守死訴寃安帝義熈年譙縣崔仲文與㑹稽石和俱為劉撫君吏仲文養一犬以獵麋鹿無不得也和甚愛之乃以丁奴易之仲文不與和及仲文入山獵至草中殺仲文欲取其犬犬齧和守其主尸爬地覆之後諸軍出獵見犬守尸人識其主因還啟劉撫軍石和假還至府門犬便往牽衣號吠人復白撫軍曰此人必殺犬主因録之撫軍栲問果得其實遂殺石和廣古今五行記夢咋張天錫在凉州夢一緑色犬甚長從南來欲咋天鍚林上避之乃墮地后苻堅遣茍萇著緑地錦袍從南來攻未入門大破之李産集異𫝊歌梅花嘉興縣朱休之有一弟宋元嘉中兄弟對坐家有一犬來向休之蹲遍視二人遂搖頭而笑曰言我不能歌聴我歌梅花今年故復可奈汝明年何其家驚懼斬犬榜首路側至來嵗梅花時兄弟相鬭並被囚係經嵗得免至夏舉家時疾兄及弟皆死􅄒異記大㲰狗宋袁􅙾父子以舉兵為齊所害有小兒數嵗乳母將投􅙾門生狄靈慶靈慶遂抱以首乳母號泣呼天曰公昔于汝有恩故冐難歸汝奈何欲殺郎君以求小利若天神有知我見汝滅門此兒死後靈慶常見兒騎大㲰狗戲如平常經年餘鬭塲忽見一狗走入其家遇靈慶子庭噬殺之少時妻子皆沒此狗即袁郎所常騎也南史廣古今記其妻子皆沒于狗白靈陶𢎞景云裴真君好養白犬白鷄犬名白靈鷄名白精學道之士或居山林此可以辟邪目犬北齊徐之才與朝士出遊遙望羣犬竸走諸人令目之之才厲聲曰為是宋鵲為是韓盧為逐李斯東走為負帝女南徂本𫝊波斯狗南陽王綽始十餘嵗留守晉陽愛波斯狗尉破胡諌之歘然研殺數狗狼籍在地破胡驚走不敢復言後在定州有婦人抱兒在路走避入草綽奪其兒飼波斯狗婦人號哭綽恕又縱狗使食狗不食塗以兒血乃食焉北齊赤儀齊髙緯以波斯狗為赤虎儀同逍遙郡君飼以梁肉食縣邑常於馬上設蹬褥以抱之三國典畧髙思反與諸貴書云駮龍得儀同之號逍遙受郡君之名犬馬班位榮冠軒冕北史後主時為開府儀同雌者有夫人郡君之號隋五行志取箭北齊廣寧王孝珩嘗畜一犬守外人不得趨近孝珩每射令其取箭亦解呼召左右牽衣而進三國典畧還家犬吠徐勉為侍中時師方侵魏候驛填委勉參軍動經數旬一還家羣犬驚吠勉曰吾憂國忘家乃至於此吾亡後亦是𫝊中一事也梁𫝊抱犬義陽朱詹好學家貧累日不㸑乃時吞紙以實腹寒無氊被抱犬而卧犬亦饑虚起行盜食呼之不至哀聲動隣猶不廢業卒成學士為孝元所禮顔氏家訓黄蒼張彪敗後與妻楊氏去唯常養一名黄蒼狗左右前後未曽捨離乃還入若邪山中沈泰説陳文帝遣章昭達領千兵重購之並圖其妻彪眠未覺黄蒼驚吠刼來便嚙一人中喉即死及彪被害黄蒼號呌彪屍側宛轉血中若有哀狀昭達殯彪䘮墳􅊘既畢黄蒼又俯伏􅊘間號呌不肯離南史銜兔張元性仁孝幼時村陌有狗子為人所棄者元見即收而養之其叔父怒曰何用此為將更棄之對曰有生之類莫不重其性命若天之生殺自然之理今為所弃而死非其道也是以收養之叔父感其言遂許焉未㡬有狗母銜一死免置元前而去後周書持齋文帝時魏州四月八日立舍利塔有一黒狗耽耳白胷於舍利塔前舒左股屈右脚見人行道即起行道見人持齋亦即持齋非時與食不食唯欲得飲净水至後日旦起解齋與粥始喫且寺内先有數箇猛狗但見一狼狗無不競來吠嚙若見此狗入寺悉皆低頭掉尾隋書銜燭唐武徳中髙昌王文泰獻狗雄雌各一髙六寸長尺餘性甚慧能曳馬銜燭云本出拂􅀢國中國有拂􅀢狗自此始也舊唐通典五狗武三思嘗與宗楚客兄弟紀處訥崔湜丼元東相驅煽王同皎周憬張仲之等不勝憤謀殺之為冉祖雍宋之愻李悛所白皆坐因逮染五王而崔湜遣周利貞就殺之時人號祖雍姚紹之等五人為三思五狗脫禍神龍時唐休景為相有門僧出言多中一日謂休景曰公有大禍不逺數月然可以禳之公懼而問計僧曰可於卑宂官中孤寒有才幹者用為曹州因得張君為之乃問所為僧曰張君赴部之時當令求二犬髙數尺而神駿者張到郡即求得二犬髙四尺獻之休璟大悦召僧視之僧曰極善育后旬日有二刺客為犬所嚙而斃宣室志作人言宗楚客家畜一犬一日忽戴楚客冠人立楚客恕曰畜類敢作妖僣越犯分即殺之犬作人言曰公亦作妖僣越犯分亦即見殺未㡬韋氏敗楚客被斬孝順魏元忠嘗呼蒼頭未應犬輒代呼之元忠曰此孝順狗也乃能代我勞後亦無恙廣異記知難劉巨麟開元未為廣府都督在州恒養一丈雄勁多力犬至馴附有異於他巨麟常夜迎使犬忽遮䕶不欲令出巨麟亦悟曰犬不使我行耶徘徊良久人至白使近巨麟叱曰我行部從如雲寧有非意之事使家人闗犬而出上馬之際犬亦隨之忽咋一從者喉中頃之死巨麟驚愕搜死者懐中得利七首初巨麟常鞭箠此僕故修其怨私欲報復而犬逆知之是以免難摭異記人性裴令公度性好養犬凡所宿設燕㑹處悉領之所食物餘者便和椀與犬食時子壻李甲見之數諫裴公曰人與犬類何惡之甚犬正食見李諌乃棄食以目視李而去裴令曰此犬人性必讐於子竊慮之李以為戲言將欲午寢其犬乃蹲而向李李見之乃疑犬讐之犬見未寢又出其户李見犬去後乃以巾櫛安枕多排衣服以被覆之其狀如人寢李乃藏於異處視之逡巡犬入其戸將謂李已睡乃跳上寢床當喉而嚙嚙訖知謬犬乃下床憤跳號吠而死集異記小狸鄱陽人張朝為猛獸所摶噬其家犬名小狸救之獲免南部新書青花捧硯者裴至徳家僮也其母曰春紅配騶人髙璠而生一嵗時有卑脚犬曰青花忽來噬兒隂食之至徳有良藥封之愈明年夏青花復併兒邜又食訖工以前藥傅之及愈為宦者焉字之曰捧硯委以内堅之職花鵲僖宗朝宰相王鐸所愛卑脚犬曰花鴨有刺官匿于梁上為犬所覺而免吠雲杜光庭犬名吠雲可行萬里肖像寧徳大學生黄岳者乾寧中王審知節度武威軍累辟不為動及審知據閩必欲起之岳投淵而死其父母妻子二弟一白犬俱赴水死焉偽使者宗舒趙田四人亦死邦人哀之俱肖像祀之廟稱忠烈王云福寜州志桃花淳化中合州貢羅江犬甚小而性慧帝馴擾于御榻之側毎坐朝犬必掉尾先吠人乃肅然太宗不豫犬不食及上仙犬號呼涕泗以至疲瘠章聖初即位左右引令前導鳴吠徘徊意若不忍章聖令諭以奉陵即掘尾飲食如故詔造大鐡籠施素䄄置鹵簿中行路見者隕涕后因以斃詔以弊葢葬於熈陵之側李至作桃花犬歌以寄史官錢若水末句云白麟赤鳯且勿喜願君出此懲浮俗古今詩話送歸康定中侍禁李貴為西邊寨主妻為昊賊虜去家中一白犬頗馴擾祝之曰我聞犬之白乃前世為人也爾能送我歸乎犬俯仰如聴命即裏粮隨之有驚則引伏草間渇即濡身而返凡六七日出賊境其夫無恙朝廷封崇信縣君江隣㡬雜記慶厯中渭州廵檢張殿直事同回家後夫妻朝暮所食必分三器一以飼犬括異志羅江慶歴中衞士有變震驚宫掖臺官宋禧上言蜀有羅江狗赤而尾小者其警如神願養此狗於掖庭以警倉卒時謂之宋羅江東軒華録渠來虞經臣策元祐時為給事中初入臺值都城開渠忽有異犬自渠中出直入其家熟服若素畜養者家人軰愛之名曰渠來但無事惟喜睡至或亂毁簾幃窓􅀈之類則經臣必有遷改錫典之慶自爾每遇慶事則飼以肉一斤必欣喜跳躍然後食之以為常凡數年經臣敗前一夕渠來亦死靈犬楊光逺之叛青州也有孫中舍者居圍城中族人在西州别墅城閉既久内外隔絶食且盡舉族愁嘆有所畜犬徬徨其側似有憂思者中舍因囑曰爾能為我至庄取米耶犬搖尾若應狀至夜置一布囊并簡置犬背上犬自水竇出至庄鳴吠居者開門識其犬取簡視之令負米還未曉入城如此數月以至城開孫氏闔門賴以不餒孫氏愈愛畜之後數年斃葬於别墅之南至其孫彭年語龍圖趙師民刻石表其墓義犬咸溪童􅀈家畜二犬一白一花共出一母性狡獪善知人意後白者雙目俱盲弗能進牢而食主家作草窩卧于簷外花者日含飯吐而飼之夜則卧于其傍白者既死主憐之埋於門前山麓間花者朝夕徃埋所遶數匝若拜泣狀卧其旁少頃始返建寧志齧殺宣和五年京師城北乃官民牧羊地忽有野犬不知所從來入羊羣中鳴呌左右前後諸犬皆往聚㑹一羊間一犬黒白交映至次日城内外諸犬畢集或縳者并㫁索而來凡擾擾兩日犬多羊少皆齧殺其羊識者知為不祥後果有靖康北狩之禍宣靖妖化録鳥喙蘇子聸耳得吠犬名烏喙甚猛而馴闕遷合浦過澄邁溷而濟路人皆驚本集青鸇犬則青顫白鵲飛龍虎子馴良㨗警難伸易使也周處風土記駁犬波斯國多白馬駁犬或赤日行七百里者駁犬今所謂波斯犬也舊唐如驢罽賓犬狗大如驢赤色數里搖鞉以呼之郭義恭廣志南斗犬犬虎文南斗君犬也畜之可致萬石黒犬白耳大王犬也畜之令富貴黒犬白前兩足宜子孫白犬黄頭家大吉黄狗白尾代有衣冠黄犬白前兩足利人雜五行尾龍黒狗白頭耳長卷尾龍也白澤圖豺跪狗豺之舅豺遇狗輒跪如拜狀酉陽鷹背唐伯剛云北方凡皂雕作巢所在官司必令人窮巢探卵多寡若三枚必設圍以守之及其出一乃狗也取而飼養之長則獻于朝廷與常狗無異但耳上多羽毛耳田獵之際鵰則上飛狗則陸行所逐同至名曰鷹背狗東園客談遼鵰巢中生獵犬性識頗異每獵而䕶十倍常犬然極難得使遼録狗國北狗國人身狗首長毛不衣手摶猛獸語為犬嘷其妻皆人能漢語生男為狗女為人自相婚嫁宂居食生而妻女人食云嘗有中國人至其國其妻憐之使逃歸與其筯十餘隻教其毎走十餘里遺一筯狗夫追之見其家物必銜而歸則不能追矣其説如此五代史四夷附録嘊嘊管仲寢疾言于桓公曰東郭有狗嘊嘊且暮欲齧我猳而不使也謂牙牙等之不可用也管子狺狺豈不欝陶而思君兮君之門以九重猛犬狺狺而迎吠兮闗梁閉而不通九辨猪參軍猪一名參軍一名豕豕曰剛鬛禮云豚曰腯肥豕生子多謂之縱古今注異呼豬燕朝鮮之間謂之豭闗東西謂之彘或謂之豕南楚謂之豨其子或謂之豚或謂之貕呉揚之間謂之豬子方言梁州以豕為豬河南謂之彘呉楚謂之豨漁陽以大豬為䝈齊徐以小豬為䝒􅀈白豕黒頭也豱豕奏毛也何承天纂文豰小肫也豯肫生三月也豵肫生六月也或曰一嵗曰豵豝牝豕豶􅭘也豕豜三嵗豕豭壯豕也䝐豶也上谷名豬曰豛豷豕息也豢以穀圏養豕也説文大豕為䝈五尺尸子寢檜豕所寢檜郭云檜郭所卧蓐方言云其檻及蓐曰檜舍人曰豕所寢草名為檜某氏曰臨淮人謂野豬所寢為檜李巡曰豬卧處名檜檜是所居之處爾雅䟽四月生斗星時散精為彘四月生應天理春秋説題辭六九五十四四主時時主豕故豕四月而生淮南子人立而蹄齊無知殺其君十二月齊侯游于姑棼遂田于且丘見大豕從者曰公子彭生也公恕曰彭生敢見射之豕人立而啼公懼墜于車傷足䘮屨遇賊于門遂殺之而立無知左莊八封豕昔有仍氏生女曰𤣥妻樂正后䕫取之生伯封實有豕心貪婪無厭忿類無期謂之封豕昭二十八婁猪衞靈公為夫人南子召宋朝㑹于洮太子蒯瞶獻孟于齊過宋野野人歌之曰既定爾婁猪盍歸吾艾假太子羞之定四十烹豚孔子窮陳蔡之間藜蒸不糂子路烹豚孔子不問肉所由來即食之墨子佩猳子路所鄙好勇力冠雄鷄佩假豚凌暴孔子孔子設禮稍誘子路子路後儒服委質因門人請為弟子史牢筴祝宗人𤣥端以臨牢筴説彘曰汝奚惡死吾將三月㹖汝十日戒三日齊藉白茅加汝肩尻乎彫爼之上則汝為之乎為彘謀曰不食食以糠糟而錯之牢筴之中莊子弗䫫子車氏之豭其色粹而黒一産三豚其二如之其一則駁而白惡其弗類于已也囓而殺之其同於巳也字之惟恐傷也子華子視性韓昭釐侯見所以祠廟之牲其豕小昭釐侯令官更之官以是豕來也昭釐侯曰是非嚮者之豕邪官無以對命吏罪之從者曰君王何以知之君曰吾以其耳也申不害聞之曰何以知其聾以其耳之聦也何以知其育以其目之視也何以知其聾以其耳之聦也何以知其肓以其目之明也何以知其狂以其言之當也魯津伯朔人獻燕昭王以大豕曰養奚若使曰豕也非大圊不居非人便不珍今年百二十矣人謂豕仙王乃命豕宰養之十五年大如沙獖足如不勝其體王異之命衡官橋而量之折橋豕不量又命水官舟而量之其重千鈞其巨無用燕相謂王曰奚不享之王乃命宰夫膳之豕既死乃見夢於燕相曰造化勞我以豕形食我以人穢吾患其生久矣仗君之靈得化吾生始得為魯津之伯而浮舟者食我以粳糧欣君之惠將報子焉後燕相游于魯津而赤龜銜夜光而獻符子一云奉璧相彘留長儒以相彘立名史記養猪商丘子有養猪法卜式有養羊法博物志牧豕公孫𢎞菑川人少時為獄吏有罪家貧牧豕海上四十餘乃學春秋雜記漢書銜鬴昭帝時燕王宫永巷中豕出圂壊都竈銜其鬴六七枚置殿前漢五行志遼東豕朱浮為幽州牧與彭寵書曰伯通自伐以為功髙天下往時遼東有豕生子白頭異而獻之行至河東見羣豕皆白懐慙而還若以子之功論於朝廷則為遼東豕也賤事呉祐字季英年二十䘮父獨居家無儋石而不受贍遺常牧豕於長垣澤中行吟經書遇父故人謂曰卿二千石子而自業賊事縱子無耻奈先君何祐辭謝而已守志如初後𫝊售猪過真公沙穆嘗養猪有病使人賣之於市語之言如售當告買者言病賤取其直不可言無病欺人取貴價也賣猪者到市即售亦不言病其直過價穆怪之問其故齎半直以還買猪者買者辭不取穆棄錢而去謝書養猪嚄嚄五門子孫凡民之伍決録馬氏兄弟五人共作五門客舍養猪賣豚故民謂之曰􅁐中三公鉅下二卿五門嚄嚄但聞豚聲注驅豕入孫期濟隂人少為諸生家貧事母至孝牧豕於大澤中以奉養焉逺人往從其學者皆執經壟畔以追之里落化其人讓黄巾賊起過其里陌相約不犯孫先生舍辟舉方正遣吏齎羊酒請期期驅豕入草不顧司徒黄琬特辟不就終於家皇甫徽猪司馬徽字徳操時人呼為水鏡嘗有人妄認徽猪徽便推猪以與之後數日亡猪者得其猪既以猪還徽乃叩頭自責徽又厚謝董正别𫝊人語莎車王殺于闐王于闐大都末出城見野豕欲摶之乃人語曰無殺我我為汝殺莎車將軍都末異之即與兄弟共殺莎車王張璠漢記蒸豕尤美王濟性豪侈帝幸其家供饌甚豐蒸豚尤美上問其故對曰以人乳蒸之上色不平食未畢而去晉書犬豕交劉聦末年犬與豕交有豕著進賢冠升聦坐犬冠武冠帶綬與豕并升俄而鬭死殿上宿衞莫有見其入者晉五行志接飲阮咸至宗人間共集不用杯觴斟酌以大瓮盛酒圓坐相向大酌更飲時有羣豕來飲其酒咸直接去其上便共飲之晉書進㹠郭子曰劉道真少時嘗漁釣草澤善歌嘯有一老嫗識其非常人乃殺㹠以進道真食盡嫗又進一㹠又食半餘半還之後道真為吏部郎嫗兒為小令史道真乃超用之兒不知所由問母而後知之於是齎牛酒以詣道真笑曰去去無復相報繫金鈴呉中有一士大夫於都假還至曲阿塘上見一女子甚美留其宿士解臂上金鈴繫女臂令暮更來女遂不至使人求都無此色過猪圈見一母猪臂上繫金鈴志怪為妖李汾撫琴于四明山月夜有女子至端正無比惟覺口帶髙緇黒色留宿極歡汾偷女子青氊履子一隻女泣求不與及明見鮮血滿地驗履乃猪蹄殻也汾惶駭尋血至山前張氏溷中見一牝豕後足已刓一殻豕視汾瞋目咆哮如有怒色汾以事白張叟叟即殺之汾即棄山院别遊他邑搜神記誌怪録尹縱之事同猪王廢帝狂悖無道囚諸父殿中以明帝肥壯用竹籠盛而稱之號為猪王嘗以木槽盛飯内諸雜食攪令和合掘地為坑穽實之以泥水倮明帝内坑中和槽食置前令太宗以口就槽中食用之為歡笑時廷尉劉矇妾孕臨月迎入後宫冀其生男欲立為太子太宗嘗忤㫖帝怒乃倮之縳其手脚以杖貫手脚内使人縳付太官曰即日屠猪休仁笑謂帝曰猪今日未應死帝問其故休仁曰待皇太子生殺猪取其肝肺帝意乃解曰且付廷尉一宿出之宋書休仁𫝊乞命有劉胡者兄弟四人以屠為業永安年中胡殺猪猪忽唱乞命聲及四憐憐人謂胡兄弟相歐鬭而來觀之乃猪也即舍宅為歸覺寺合家人入道焉伽藍記相乳陸逞為京兆尹都界有豕生數子經旬而死其家又有獖遂乳養之諸豚賴之以活時論以逞仁政所致後周書豕語開皇末渭南有人寄宿他舍夜中聞二豕對語其一曰嵗將盡阿耶明日殺我供嵗何處避之一答曰可向水北姊家因相隨而去天將曉主人覔豕不得意是宿客而詰之宿客言狀主人如其言而得豕隋五行志化為異猪安禄山嘗夜宴醉卧化為異猪而龍首左右遽言之𤣥宗曰猪龍也無能為者禄山事跡㹠主饒陽李瞿曇勲官番滿選夜夢一母猪極大李僊藥占之曰母猪㹠主也君必得㹠主數日烏金洪州有人畜猪以致富因號猪為烏金烏將軍郭元振開元中下第自晉之汾夜行失道有宅門宇甚峻堂上燈燭而悄無人俄聞女子哭聲公曰人耶鬼耶曰妾鄉有烏將軍能禍福人毎嵗鄉人擇美女嫁焉父利鄉人之金潜以應選醉妾此室而去將軍二更當來公大憤曰吾力救不得當殺身以狥女未久車馬駢闐紫衣吏入復走曰相公在此既而將軍入公出揖曰聞今夕嘉禮願為小相將軍喜而延坐公取佩刀斫其腕而斷之將軍失驚而走天明視其手乃猪蹄也俄聞哭聲漸近乃父母舁襯而來將收其屍公具告焉乃令鄉人執弓矢尋血而行入大冡中見大猪無前蹄走出而斃公納其女為側室識豕語咸通初有渤海僧隆多羅者寓于西明精舍能通鳥獸之言一日秋暑方炎與朝客數人將納凉于城西别墅路逢牝豕引諸豚而行咯咯有聲一朝士戯云此猪有語否僧曰巨彘顧諸雛云行行向前樹隂下吃妳料其不逺當遇官槐而止且飼羣子矣傎之果然闗史勃賀僧辨聦遊五臺將還京師有老僧託書書其上題云東京城北尋勃賀分付僧竊啟封眎之云度衆生畢早來茍更强住切恐造業復封之至京尋訪不見其人一日於五丈河側見一小兒逐一大猪名勃賀屠者趙氏猪能令羣猪不亂逸愛食薄苛故以名僧試呼其名以書投之猪遽食其書人立而化僧徑之五臺訪其老僧亦化去矣洞㣲志隨聲遂狶今觀宰司之取士也有似于司原之佃也昔有司原氏者燎獵中野鹿斯東奔司原縱譟之西方之衆有逐狶者聞司原之譟也競舉音而和之司原聞音之衆則反輟已之逐而往伏焉遇夫俗惡之狶司原喜而自以為獲白瑞珍禽也盡芻豢單囷倉以養之豕俛仰嚘咿為作容聲司原愈益珍之居無何烈風興而澤雨作灌巨豕而惡塗渝遂駭懼真聲出乃知是家之艾猳耳此隨聲逐響之過也潜夫論甂甌食狗彘不澤甂甌而食偷肥其體而顧近其死鳯凰髙翔千仞之上故莫之能致淮南説林石猪啨蛉縣有石猪圻長谷中有石猪子母數千頭長老𫝊言夷昔牧此一朝化為石迄今夷人不敢往牧鄭頡豕北狄渤海俗所貴者曰鄚頡之豕豢豕豢豕者翁為調糠而媪為擇之蝨豈愛豕哉利其肉也猫䝉貴猫目晴旦暮圓及午竪歛如綖其鼻端常冷唯夏至一日暖其毛不容蚤虱黒者闇中逆循其毛即若火星俗言猫洗面過耳則客至楚州射陽出猫有褐花者靈武有經叱撥猫青騘色者猫一名蒙貴一名烏圓平陵城古譚國也城中有一猫常帶金鏁有錢飛若蛺蝶士人往往見之酉陽猫鬼獨狐陁性好左道其外祖母髙氏先事猫鬼轉入陁家毎一子日夜祠之猶鬼所殺人取其財物置於所事猫鬼家鬼若降人則面正青若被牽曳陁後敗免死北史隋大業之季猫鬼事起家養老猫為厭魅頗有神靈􅉍相誣告京都都縣被誅戮者數千餘家蜀王秀皆坐之隋室既亡其事亦寢僉載死願作髙宗廢王后及蕭良娣蕭罵曰阿武狐媚飜覆至死百十願生得一日為猫阿武為鼠吾扼其喉以報今日即足矣武后聞之不説約六宫不許畜猫舊書李猫李義甫柔而害物時謂之李猫舊唐新唐作人猫李徳柔任大理少卿持法甚峻忌刻便佞時號李猫兒本無學術詐稱博聞毎呼馬為韓盧樂工為伶倫謟佞為謇諤以此貽譏於世南唐近事摶食鸚鵡武則天習猫使與鸚鵡共處出示百官𫝊觀未遍猫飢摶鸚鵡食之太后甚慙猫犬互乳河東孝子王燧家猫犬互乳其子州縣上言遂蒙旌表乃是猫犬同時産子取猫兒置犬窠中取犬子置猫窩内飯慣其乳遂以為常殆不可以異論也僉載夢伏堂限薛季昶為荆州長史夢猫兒伏卧于堂限上頭向外以問占者張猷猷曰猫兒者爪牙伏門限者閫外之事君必知軍馬之要未旬月除桂州都督嶺南招討使失猫唐裴寛子諝素好談諧為河南尹有婦人投狀争猫兒狀云若是兒猫即是兒猫若不是兒猫即不是兒猫諝大笑判狀云猫兒不識主傍我搦老鼠兩家不須争將來與裴諝遂納其猫兒争者皆哂之開元傳信記同乳朱泚上言隴州將趙貴家猫鼠同乳不相為害詔遣中使示於朝常衮率百僚慶賀崔祐甫獨否中官詰其故答曰此物之失常也上奏言禮云迎猫為其食田鼠也今對鼠不食無乃失于性乎且猫受人養育職既不修亦何異于法吏不勤觸耶疆吏不勤捍敵以茲稱慶臣所未詳代宗深嘉之舊唐相乳司徒馬燧家猫有生子同日者其一母死焉有二子其一方乳其子銜而乳之若其韓文猫精連山張大夫摶好養猫衆色備有皆自製佳名毎視事退至中門數十頭曳尾延頸盤接入以緑紗為幃聚其内以為戲或謂摶是猫精南部新書人言左軍容使嚴遵美閹官中仁人也嘗一日發狂手足舞蹈傍有一猫一犬猫忽謂犬曰軍容改常也顛發也犬曰莫管他從他俄而舞定自驚自笑且異猫犬之言遇昭宗播廷乃求致仕北夢瑣言苗介立成自虚雪夜于東陽驛寺中遇苗介立吟詩曰為慙食肉主恩深日晏蟠蜿卧錦衾且學志人知白黒那將好爵動吾心次日視之乃一大駁猫兒也傳竒白老建州刺吏月下見七八白衣人長不盈尺男女雜坐而飲一人曰今日甚樂然白老將至奈何因哭入溝中數月後罷官新政家有猫名白老於堂西得白鼠七八枚食之稽神録善記猫事江南二徐大儒也後主岐王六嵗時戲佛像前有大琉璃瓶為猫所觸仆然墮地因驚得疾薨詔鍇為墓誌鍇謂鉉曰此文章雖不引猫兒事此故實兄頗記不鉉為䟽二十事鍇曰適已憶七十餘事鉉曰楚金大能記明旦又云夜來復得數事兄撫掌而已邵思野説兆祥鄱陽龔冕仲自言其祖紀與族人同應進士舉其家衆妖競作乃召女巫徐姥者使治之時尚寒有一猫正卧爐側家人指謂姥曰吾家百物皆為異不為異者獨此猫耳於是猫亦人立拱手而言曰不敢姥大駭馳去後數日㨗音至二子皆髙第矣知妖異未必盡為禍也續墨客揮談負債為猫和州烏江縣升中寺僧有負主僧今久而不償病且革誓為畜産以報既卒主僧晝寢夢病僧披衣槃跚入床下覺而異之須㬰猫生一子稍長極馴擾其重七八斤毎客至則歡迎走報見非其人者輒謹隨入有知呼其名必前怒噬至主僧呼則昻首號呌若求隠其事者泊宅編章惇為猫宋有盧仙姑者指猫而問蔡京曰識之否此章惇也其意葢以諷京仙哥河南永寧天壇山中岩有仙猫洞世𫝊燕真人丹成鷄犬俱昇仙猫獨不去人嘗見之就洞呼仙哥則聞有應者山川紀異澡洗世俗稱六月六日猫犬澡洗之候鼠應星玉衡星散而為鼠運斗樞仲能玉䇿記稱鼠夀三百嵗滿一百嵗者則色白善憑人而卜名曰仲能知一年中吉凶及千里外事也抱朴子毁郊牛鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛左蚤風雖細困於安寢鼷鼠雖微猶毁郊牛魏文與王朗書鼷鼠丼口鼠也食牛嚙盡而牛不覺畏人齊侯將為臧紇田臧孫聞之見齊侯與之言伐晉對曰多則多矣抑君似鼠夫鼠晝伏夜動不穴於寢廟畏人故也今君聞晉之亂而後作焉寧將事之非鼠如何乃弗與田襄二十三社鼠桓公問管仲曰治國奚患對曰最苦社鼠矣公曰何患社鼠哉對曰君亦見夫社木者乎樹木而塗之鼠穿其間掘穴託其中燻之則恐焚木灌之則恐塗陁此社鼠之所以不得也今人君之左右出則為勢重而收利於民入則比周而蔽惡於君不誅則亂法誅之則君不安據而有之此亦國之社鼠也韓子外儲説苑同晏了作景公社鼷不灌屋鼠不薫何則所託者然也漢中山王𫝊馬成人之巨蠧久依成社不畏熏燒虞延𫝊鼠璞鄭人謂玉未理者為璞周人謂鼠未腊者為璞周人乃懐璞問鄭賈曰欲買璞乎賈曰欲因出其璞視之乃鼠也因謝不取尹文子馬屎為靈薪老鼠為玉璞上清經厠鼠李斯年少時為郡小吏見吏舍厠中鼠食不潔近人犬數驚恐之斯入倉觀倉中鼠食積粟居大廡之下不見人犬之憂於是李斯乃嘆曰人之賢不肖譬如鼠矣在所自鼠耳史記首鼠田蚡怒謂韓安國曰與長孺共一秃翁何為首鼠兩端注首鼠一前一却也漢灌夫𫝊掠鼠張湯其父為長安丞出湯為兒守舍還鼠盜肉父怒笞湯湯掘熏得鼠及餘肉劾鼠掠治𫝊爰書訊鞠論報并取鼠與肉具獄磔堂下父見之視文辭如老獄吏大驚遂使書獄本𫝊鼠舞宫門漢昭帝元鳯元年九月燕有黄鼠銜其尾舞王宫端門中王往視之鼠舞如故王使吏以酒脯祠鼠舞不休一日一夜死時燕剌王旦謀反將死之象也其月發覺伏辜京房易𫝊曰誅不原情厥妖鼠舞門不容左馮翊韓延夀有罪下獄楊惲上書訟延夀郎中丘常謂惲曰聞君侯訟韓馮翊當得活惲曰事何容易硜硜者未必全也我不能自保真人所謂鼠不容穴坐銜窶藪也漢書鉅鼠翟方進傳王莽詔誣劉信云父東平王王雲不孝不謹親毒殺其父思王名曰鉅鼠前書鼮鼠竇攸治爾雅舉孝亷為郎世祖與百僚大㑹靈臺得鼠如豹文熒熒光澤世祖異之以問羣臣莫能知者攸對曰鼮鼠也詔問何以知之攸曰見爾雅詔案視書如攸言賜帛百匹詔諸侯子弟從攸受爾雅竇氏家𫝊終軍事同見爾雅註何承天纂文唐鼠唐鼠形如鼠稍長青黒色腹邊有餘物如腸時亦汚浴名易腸鼠昔仙人唐昉㧞宅升天鷄犬皆去惟鼠墜下不死而腸出數寸三年易之俗呼為唐鼠録異記唐房升仙鷄狗並去惟以鼠惡不將去鼠悔一月三出腸也博物志鼠乃感激以月晦日吐腸胃更生水經注鼠嚙馬鞍公子蒼舒早惠時軍國多事用刑嚴重太祖馬鞍在庫為鼠所囓庫吏懼罪必死議欲面縳首罪猶慮不免冲謂曰待三日中然後自首冲於是以刀穿單衣如鼠囓者繆為失意貎有愁色太祖問之冲對曰世俗以為鼠嚙衣者其主不吉今衣見囓是以憂戚太祖曰此妄言耳無所苦也俄而庫吏以囓鞍聞太祖笑曰兒衣在側尚囓况馬鞍懸柱乎一無所問魏志逐鼠丸王肅以銅為逐鼠丸晝夜自轉酉陽人言魏齊王正始中中山王周南為襄邑長有鼠從穴出語曰王周南爾以某日死周南不應鼠還穴後至期更冠幘皂衣出語曰周南汝日中當死又不應鼠復入穴斯須更出語如前日適欲中鼠入須㬰復出出復入轉更數語如前日適中鼠曰周南汝不應我復何道言絶顛蹙而死即失衣冠取視具如常鼠幽明録及宋五行志列異𫝊死王樂生鼠陳安世年十三初為管叔本客得道叔本年七十猶拜安曰得道者當師吾不羞弟子之禮矣死王樂生鼠雖為帝王死不及生鼠抱朴子愛鼠行跡晉簡文為撫軍時床上塵不聴拂見鼠行跡視以為佳有參軍見鼠白日行以手板㧗殺之撫軍不悦門下起彈教曰鼠被害尚不能忘懐今復以鼠損人無乃不可乎世説鼠市大興中衡陽區純作鼠市四方丈餘開四門門有一木人縱四五鼠於中欲出門木人輒以椎椎之晉陽秋射鼠宋南譙玉劉義宣鎮荆州府吏蔡鐵善卜宣射得一白鼠置函中乃召鐡使卜之鉄兆成笑曰兊色之鼠背明户彎弧射之絶左股鼠孕三雄而兩䧳若不見信剖腹而立知公乃使剖鼠腹皆如鐡言即賜錢一萬􅄒異記唐袁天綱子客師髙宗置一鼠於匳令術家射之皆曰鼠客師曰雖實鼠然入則一出則四發之鼠生三子史捧朱景平中東陽大水永康蔡嘉夫避住住南壟夜有大鼠浮水而來伏喜夫奴床角奴愍而不犯毎食以餘飰與之水勢既退喜夫得返故居鼠以前脚捧青囊褁三斤許珠著奴床前啾啾狀如欲語從此去來不絶異􅁐養鼠呼名齊永明中㑹稽鍾山有人姓蔡不知名山中養鼠數十頭呼來即來遣去便去語狂易時謂之謫仙南齊髙逸杜京産𫝊捕鼠齊欝林王夜中與宦者共刺鼠至曉毎夜輒得十藍金樓子東昏侯在東宫嘗夜捕鼠達且以為笑樂南史纪囓靴北齊平原太守蘭陵蕭悉達服帶為鼠嚙楊遵彦以俗事戲之曰當遷官未㡬除家令尋失官鼠後嚙其靴遵彦曰當復得官悉逹曰鼠便為吏部尚書何闗人事談藪噬衣李曉字仁畧魏太尉䖍子學涉有里理釋褐員外侍郎爾朱榮之害朝士將行曉衣冠為鼠所噬遂不成行得免河套之難北齊二十一失窟蘇徴仕汜水縣令舉止輕薄郎中張元一目為失窟鼠僉載小人天寳末御史中丞畢杭為魏州刺史䧟於禄山賊中尋欲謀歸順而未發數日於庭中忽見小人長五六寸數百枚遊戲自若家人擊殺明日羣小人皆白服而哭載死者以䘮車凶器一如士人送䘮之備仍於庭中作塜塟畢遂入南牆穴中甚驚異之發其冡得一死鼠乃作熱湯沃中久而掘之得死鼠數百枚後十餘日杭以事不尅一門遇害廣異記西閣舍人李知微夜遊文成宫下初月微明見數十小人皆長數寸聚立古槐下有一紫衣者擁侍十餘軰悉稍長有一人白長者曰某當為西閣舍人一人曰某當為殿前録事一人曰某當為司文府史一人曰某當為南宫書佐一人曰某當為馳道都尉一人曰某當為司城主簿一人曰某當為遊佃使者一人曰某當為東垣執㦸言訖相引入穴而去明日掘視之乃鼠也河東記報㤙寳應中有李氏家于洛陽不畜狸者三世忽一日李氏大集親友㑹食私堂既坐而門外有數百鼠俱人立以前足相鼓如甚喜狀家僮驚異言於李氏李氏親友乃空其堂而縱觀人去且盡堂忽摧圯其家無一傷者悲夫鼠固㣲物也尚能識恩而知報况人乎宣室志擁杖而號路敬淳為遂安令先是令多死敬潜欲辭妻曰君不死獄而得全非生死有命邪從之到官有梟嘯其屏鼠數十走于前左右驅之擁杖而號敬潜不為懼久之遷衞令新唐白鼠入營王孝傑為清邊道緫管初進軍平州白鼠晝入營頓伏皆謂鼠精胡象也白質歸命天亡之兆及戰乃孝傑覆焉為妖王縉大厯中嘗將入朝其前榻囊中忽有一鼠長尺餘躍出公大懼顧謂其子曰我以不才謬居卿相無徳而貴嘗懼有意外之咎今者妖異如是豈非禍之將至耶後數日果得罪貶縉雲守宣室志拱立許昌郗尚書士美元和末為鄂州觀察一日晨興出視事束帶已畢左手引鞾未及陷足忽有一巨鼠過庭北面拱立而舞八座大怒驚叱之畧無懼意自擲鞾以擊鼠則奔逸有毒虺墜于鞾中向無鼠妖則以致臃指潰足之患闕史銜卷進士李昭嘏舉十上不第時登科年已有主司並無薦託之地主司盡寢忽窺見一軸文卷在枕前看其題處乃昭嘏之卷令遷於架上復寢暗視有一大鼠取其卷銜其軸復還枕前再三如此昭嘏來春第後主司問其故乃三世不養猫皆云鼠報聞竒録玉泉子符斷僖宗末廣陵丐者杜可均嘗大雪訪街西酒家姓樂者求飲見主事者白人以衣換酒收藏不謹鼠囓其衣杜即令治浄室曰項年記一符能却鼠試書之既有驗可盡此室永無鼠矣生得符焚之鼠遂絶桂苑叢談掘鼠得粟天復中隴右大飢其年秋稼甚豐將穫之間大半無穗有人就田畔斸鼠穴求之所獲甚多於是家家窮穴有獲五七斛者相傳謂之刼鼠倉飢民皆出求食濟活甚衆燒尾竇蟠久不第晩娶宇文翊女遂登科時杜尚宅遺火云因鼠尾踐火而作韋説因謂璠曰魚將化龍雷為燒尾近日鼠亦有燒尾者璠大慙𤨏言進士吕口虞部郎中周仁愿監永豐倉有通謁云江州進士禇昌及見之如十嵗小兒出一啟為䞇曰幽室微光寒泉涸滴莊周之室已空孔氏之車何適愿曰孔緒之車何故事也其人曰楊三楊三汝楊邁之孫楊中之子孔緒之事何必問也愿怒欲擊之其人溘然仆地惟露幞頭巾子愿遽逐之化為犬鼠走入倉下金玉精陳太者家貧好施嘗夜見一白鼠雪色縁其樹或上或下久之揮而不去陳言於其妻子曰衆言有白鼠處即有藏遂掘之果獲白金五十錠葆光録白鼠身毛皎白耳足紅色眼􅀈赤者此乃金玉之精伺其所出掘之當獲金玉云鼠五百嵗即白耳足不紅者乃常鼠也録異記入牛角南漢劉玢初名洪度龑子龑病卧寢中召右僕射王翻與語呼洪度小字曰夀命雖長然皆不足任吾事惟洪昌類我吾欲立之奈何吾子孫不肖後世如鼠入牛角勢當漸小爾因泣下㱆欷五代史鼠膽鼠膽在頭活取則有雜俎食巴菽􅂒鼠地中行鼠百勞所化亦作蚡鼠字食巴菽人食礜石而死蠶食而不飢魚食巴菽而死鼠食之而肥淮南説林庚申甲子夜鼠伏庚申夜蝙䗜伏瑣碎録拱鼠聖人師􅉕立君臣師蜘蛛立綱罟師拱鼠制禮師戰蟻置兵文子拱鼠形如常鼠行田野中見人即拱手而立人近欲捕之即跳躍而走去秦川有之録異記詩相鼠有體人而無禮陸璣云河東有大鼠能人立交前兩脚於頭上跳舞善鳴韓退之城南聨句云禮鼠拱而立孫奱云相地名按地志相州與河東相隣則知相州有此鼠詩人葢取譬焉若如毛氏以相為視則視物之有體與皮者皆可以喻禮何以取鼠紅飛鼠紅飛鼠多出交趾及廣管瀧州背腹有深毛茸茸然唯肉翼淺黒色多雙伏紅蕉花間採捕者若獲一則其一不去南中婦人皆買而帶之以為媚樂嶺表録異鼹鼠鼹鼠首尾如鼠色青黒短足百指形大重千餘斤出零陵郡界不知所來民有災及為惡者鼠輒入其田中振落毛衣皆成小鼠食其苗稼而去或捕得鼹鼠者治其皮食為帶頗能􅧣篘為其三毛出於一孔與常皮有異人多寳之録異記家鹿嶺南人食鼠謂之家鹿倦遊録蜜鹿嶺南僚氏如為蜜唧即鼠胎未瞬通身赤蠕者飼之以蜜釘之筵上囁囁而行以筯夾取咬之唧唧作聲故曰蜜唧僉載廣南府儂人飲食無美味嘗醢鼷鼠捕飛蟲噉之雲南志竹鼠竹鼠如小狗大食竹根出封溪縣交州記竹􅥫者食竹之鼠也生於深山溪谷竹林之中無人之境非竹不食巨如野狸其肉肥脆山民重之鼠王國西域有鼠王國鼠大如狗著金環枷中者如兔小者如常鼠頭悉白商佑有經過其國不先祈祀者則齧人衣裳得沙問呪願便獲無他釋道安昔西方親見如此俗諺云鼠得死人目精則為王異􅁐西域諸國志鼠王鼠母舊説鼠王其溺精一滴成一鼠一説鼠母頭脚似鼠尾蒼口鋭大如水牛性畏狗溺一滴成一鼠時有鼠災多起於鼠母鼠母所至處動成萬鼠其肉極美酉陽雜俎辟毒鼠大秦國出辟毒鼠褥特鼠􅄢賓國武徳十六年獻褥特鼠喙大而尾赤能食虵有被虵螫者鼠輒臭而尿之其瘡即愈舊唐獻金錢釋善無畏至烏萇國有白鼠馴遶日獻金錢宋髙僧𫝊毗狸契丹國産大鼠曰毗狸形類大鼠而足短極肥其國以為殊味穴地取之以供國主之膳自公相以下皆不得嘗常以羊乳飼之頃北使嘗獲至京烹以進御本朝使其國者亦皆得食之葢極珍重之也澠水燕談刁約使契丹戲為詩云押燕夷離畢看房賀䟦支餞行三疋裂密賜十毗狸毗狸如鼠而大宂居食果穀味若㹠而脆契丹以為珍膳續揮尾狀如大鼠極肥腯甚畏日為隙光所射輒死陸氏舊聞有比令邦者以其肉一臠置之食物之鼎則立糜爛是以愛重王休使遼録遼史國語解云伊勒希巴即參知政事也引刁約詩云松鼠尸子曰松栢之鼠不知堂密之有美樅説文山如堂者密夜猴宣大間産黄鼠土人珍之凡捕之者必畜鬆尾鼠數􅃗名夜猴兒能嗅黄鼠穴知其有無有則入嚙其鼻而出白貂耶律徳光脫白貂以衣晉髙祖五代史契丹西北至伊竒哩多黒白黄貂鼠皮北方諸國皆仰足䧟虜記天中記卷五十四
