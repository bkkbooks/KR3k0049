body:
  text: 天中記卷二十明陳耀文撰師第師佐智如泉源行可以為表儀者人師也智可以砥行可以為輔弼者人友也上主以師為佐中主以友為佐韓詩外傳就師子既生不免乎水火母之罪也羈貫成童不就師傅父之罪也就師學問無方心志不通身之罪也心志既通而名譽不聞友之罪也穀梁昭十九四術師術有四而博習不與焉尊嚴而憚可以為師耆艾而信可以為師誦説而不陵不犯可以為師知微而論可以為師故水深則回樹落糞本弟子通利則思師茍子師法人無師無法而知則必為盗勇則必為賊云能則必為亂察則必為怪辯則必為誕人有師有法而知則速通勇則速威云能則速成察則速盡辯則速論故有師法者人之大寶也無師法者人之大殃也上求師干將鏌耶巨闕辟閭此皆古之良劍也然而不加砥礪則不能利不得人力則不能㫁驊騮騹驥纎離緑耳此皆古之良馬也然而前必有衘轡之制後有鞭策之威加之以造父之馭然後一日而致千里也夫人雖有性質美而心辯知必將求賢師而事之擇賢友而友之上尊師聖人生於疾學不疾學而能為魁士名人者未之嘗有也疾學在於尊師師尊則言信矣道論矣故往教者不化召師者不化自卑者不聴卑師者不聴師操不化不聴之術而以彊教之欲道之行身之尊也不亦逺乎學者處不化不聴之勢而以自行欲名之顯身之安也是懷腐而欲香也是入水而惡滯也吕覽勸學逹師逹師之教也使弟子安焉樂焉休焉游焉肅焉嚴焉此六者得於學則邪辟之道塞矣理義之術勝矣此六者不得於學則君不能令於臣父不能令於子師不能令於徒上誣徒稱師君子之學也説義必稱師以論道聴從必盡力以光明聴從不盡力命之曰背説義不稱師命之曰叛背叛之人賢主弗内之於朝君子不與交友上尊師模範務學不如務求師師者人之模範也模不模範不範為不少矣一閧之市不勝異意焉一卷之書不勝異説焉一閧之市必立之平一卷之書必立之師楊子聖師天地之所貴者人也聖人之所尚者義也德義之所成者智也明智之所求者學問也雖有至聖不生而智雖有至材不生而能故志曰黄帝師風后顓頊師老彭帝嚳師祝融堯師務成舜師紀后禹師墨如湯師伊尹文武師姜尚周公師庻秀孔子師老􅆅若此言之而信則人不可以不就師矣夫此十一君者皆上聖也猶待學問其智乃博其德乃碩而况於凡人乎潜夫論哀公問於子夏曰然則五帝有師乎子夏曰臣聞黄帝學乎大墳顓頊學乎禄圖帝嚳學乎赤松子堯學乎務成子附舜學乎尹壽禹學乎西王國湯學乎貸子相文王學乎錫疇子斯武王學乎太公周公學乎虢叔仲尼學乎老聃此十二聖人未遭此師則功業不能著乎天下名號不能傅乎後世者也韓詩神農師悉諸黄帝師大撓帝顓頊師伯夷父帝嚳師伯招帝堯師子州父帝舜師許由禹師大成贄湯師小臣文王武王師吕望周公旦吕尊師堯學於君疇舜學於務成昭荀子黄帝學于大真堯學于尹壽舜學于務成湯學于成子伯文王學于鉸時子思武王學于郭叔新序堯舜師堯之師曰許由許由之師曰齧缺齧缺之師曰王倪王倪之師曰被衣莊天地善卷堯聞其得道之士乃北面而師事之蒲衣八嵗而舜之師上齧缺問道乎被衣知北逰尸子云蒲衣八嵗舜讓以天下崔云即被衣王倪之師也世師伊尹酒保太公屠牛管子作革百里官奴海内荒亂立為世師鶡冠子伯師昔殷之伊尹周之太公秦之百里奚雖咸有天才然皆年七十餘乃昇為王伯師桓譚新論文王師文王為西伯鬻熊者為文王師有功於文王早卒及武王滅殷未之封也成王舉勤勞之後封其會孫熊繹為楚子史記魏相奏記載霍光曰文王見鬻子年九十餘文王曰噫老矣鬻子曰君若使臣捕虎逐麛臣已老矣若使坐策國事臣年尚少文王善之遂以為師髙氏子略鬻子事二説不同已難慿矣今其書慎誅篇乃云昔者魯周公使康叔往守于殷戒之云云是信書耶酌酒散宜生閎夭南宫适生三子者學於太公太公見三子之為賢人遂酌酒切脯約為朋友尚書大傳王師齊桓公師管夷吾晉文公師舅犯隨會秦穆公師百里奚公孫枝楚莊王師孫叔敖沈申巫吳王闔閭師伍子胥文之儀越王句踐師范蠡大夫種吕尊師虚往實歸常季問於仲尼曰王駘兀者也從之遊者與夫子中分魯立不教坐不議虚而往實而歸固有不言之教無形而心成者耶是何人也仲尼曰夫子聖人也丘直後而來往耳立將以為奚假魯國乎莊德充符扣門傳曰堂衣若扣孔子之門曰丘在乎丘在乎子貢應之曰君子尊賢而容衆嘉善而矜不能親内及外已所不欲勿施於人子何言吾師之名焉堂衣若曰子何年少言之絞子貢曰大車不絞則不成其任琴瑟不絞則不成其音子之言絞是以絞之也堂衣若曰吾始以鴻之力今徒翼耳子貢曰非鴻之力安能舉其翼韓詩外傳三盈三虚少正卯在魯與孔子並孔子之門三盈三虚惟顔淵不去顔淵獨知孔子聖也論衡大駔段干木晉之大駔為文侯師淮南子子張魯之鄙家也顔涿聚梁父之大盗也學於孔子段干木晉國之大駔也學於子夏髙何縣子石齊國之暴者也指於鄉曲學於子墨子索盧叅東方之鉅狡學於禽滑黎此六人者刑戮死辱之人也今非徒免於刑戮死辱也有此為天下名士顯人以終其壽王公大人從而禮之此得之於學也吕尊師恭敬待命成回學于子路三年回恭敬不已子路問其故何也回對曰臣聞之行者比於鳥上畏鷹鸇下畏網羅夫人為善者少説者多若身不死安知禍罪不施行年七年常恐行節之虧是以恭敬待天命子路稽首曰君子哉説苑計然計然者蔡邱濮上人其先晉國公子也姓辛氏字文當南遊越范蠡師事之太史公素生妙論乘風列子師老啇子友伯高子進二子之道乘風而歸列黄帝註列子蓋神人也居南郭子列子既師壺邱子林友伯昏瞀人乃居南郭從之處者日數而不及列仲尼以東丁寛字子襄梁人也初梁項生從田何受易時寛為項生從者讀易精敏材過項生遂事何學成何謝寛寛東歸何謂門人曰易以東矣漢書異待張禹字子文性習知音聲内奢淫身居大第後堂理絲竹筦絃禹成就弟子尤著者淮陽彭宣至大司空沛郡戴崇至少府九卿宣為人恭儉有法度而崇愷弟多智二人異行禹心親愛崇敬宣而疏之崇每候禹常責師宜置酒設樂與弟子相娛禹將崇入後堂飲食婦女相對優人筦絃鏗鏘極樂昏夜乃罷而宣之來也禹見之於便坐講論經義日宴賜食不過一肉巵酒相對宣未嘗得至後堂及兩人皆聞知各自得也上明經術夏侯勝字長公後始昌受尚書及洪範五行傳説災異後事簡卿又從歐陽氏問為學精孰所問非一師也始勝每講授常謂諸生曰士病不明經術經術茍明其取青紫如俛拾地芥耳學經不明不如歸耕上輔導顯宗以張酺受皇太子業甚得輔導之禮章帝即位出拜東郡元和二年東巡狩幸東郡引酺及門人并郡掾吏並會庭中帝先備弟子之儀使酺講尚書一遍然後修君臣之禮賞賜殊特東觀漢記市宅張霸字伯饒㓜號張曽子後博覽五經孫林等慕之各市宅其傍以就學焉子楷後漢忘年朱穆字公叔躭學鋭意其父常以為專愚同郡趙康叔盛者隠于武當山清淨不仕以經傳教授穆時年五十乃奉書稱弟子及康歿喪之如師其尊徳重道為當時所服上嘲師邊韶字孝先陳留浚儀人也以文學知名教授數百人韶口辯曽晝日假卧弟子私嘲之曰邊孝先腹便便􅂴讀書但欲眠韶潜聞之應時對曰邊為姓孝為字腹便便五經笥但欲眠思經事寐與周公通夢靜與孔子同意師而可嘲出何典記嘲者大慙進粥郭泰嘗止陳國文學見童子魏昭號徳公知其有異求近其房供給灑掃林宗嘗不佳夜中命昭作粥粥成進泰一啜怒而呵之曰為長者作粥而不加敬意使沙不可食耶以杯擲地昭更為粥重進泰復呵之如是者三昭姿容無變顔色殊悦林宗曰始見子之面今乃見子之心遂友善之卒為妙士别傳絳帳馬融字季長扶風茂陵人也為人美辭貌有俊才初京兆摯恂以儒術教授隠於南山不應徴聘名重關西融從其遊學博通經籍恂竒融才以女妻之融才高博洽為世通儒教養諸生常有千數涿郡盧植北海鄭𤣥皆其徒也善鼓琴好吹笛逹生任性不拘儒者之節居宇器服多存侈飾常坐髙堂施絳紗帳前授生徒後列女樂弟子以次相傳鮮有入其室者後書侍講盧植字子幹涿郡涿人也身長八尺二寸音聲如鐘少與鄭𤣥俱事馬融能通古今學好研精而不守章句融外戚豪家多列女倡歌舞於前植侍講積年未嘗轉眄融以是敬之學終辭歸闔門教授上道東鄭𤣥字康成北海髙宻人造太學受業以山東無足問者乃西入關因涿郡盧植事扶風馬融融門徒四百餘人升堂進者五十餘生融素驕貴𤣥在門下三年不得見乃使高業弟子傳受於𤣥𤣥日夜尋誦未嘗怠倦會融集諸生考論圖緯聞𤣥善算乃召見於樓上𤣥因從質諸疑義問畢辭歸融喟然謂門人曰鄭生今去吾道東矣本傳馬季長以英儒著名𤣥往從之叅考同異季長后戚嫚於待士𤣥不得見住左右自起精廬既因紹介得通時涿郡盧子幹為門人冠首季長又不解剖裂七事𤣥思得五子幹得三季長謂子幹曰吾與汝皆弗如也季長臨别執𤣥手曰大道東矣子勉之高士傳鄭𤣥在融門下三年不得相見髙足弟子傳授而已嘗算渾天不合諸弟子莫能解或言𤣥能者融召令算一轉便決衆咸駭服及𤣥業成辭歸既而融有禮樂皆東之歎恐𤣥擅名而心忌焉𤣥亦疑有追乃坐橋下在水上據屐融果轉式逐之告左右曰𤣥在土下水上而據木此必死矣遂罷追𤣥竟以得免世説師模邴原字根矩欲逺遊學詣安邱孫崧崧辭曰君鄉里鄭君君知之乎原答曰然崧曰鄭君學覽古今博聞強識鉤深致逺誠學者之師模也君乃捨之躡屣千里所謂以鄭為東家邱者也君似不知而曰然者何原曰人各有志所規不同故乃有登山而採玉者有入海而採珠者豈可謂登山者不知海之深入海者不知山之髙哉君謂僕以鄭為東家邱君以僕為西家愚夫耶崧辭謝焉别傳涉師劉先主欲遣周不疑就劉巴學巴曰昔游荆北時涉師門記問之學不足紀名猶天之南箕虛而不用賜書乃欲賢甥摧鸞鳯之艶游燕雀之宇將何以啟明之哉零陵先賢傳乞言魏髙貴鄉公之幸學也將崇先典乃命王祥為三老侍中鄭小同為五更祥南面几杖以師道自居帝北面乞言魏紀晉傳人倫之表太傅東海王越鎮許昌以王安期為記室叅軍雅相知重謂世子毗曰夫學之所益者淺體之所安者深閑習禮度不如式瞻儀形諷咏遺言不如親承音㫖王叅軍人倫之表汝其師之或曰王趙鄧三叅軍人倫之表汝其師之謂安期鄧伯道趙穆也世説宣文符堅幸太學問博士經典博士盧壼對曰周官禮註未有其師韋逞母宋氏傳其父業得周官音義自非此母無可授後生於是就宋氏家立講室書堂生員百三十人隔絳紗幔而受業焉拜宋爵號宣文君賜侍婢十人裴景仁前秦記在三姚泓為太子受經于太學博士淳于岐岐病在家泓以師者人之表範傳先聖之訓加在三之義不可以不重親詣省疾拜於床下崔鴻後秦録東郭宋高祖踐祚召周續之禮賜甚厚為開館東郭外招集生徒乘輿降幸并見諸生宋傳詔徴士周勣於東陵立學裹糧受業百餘人王智深宋紀師逃陽平王子元欽字思若色甚黒時人號為黒面僕射欽曽託青州人高僧壽為子求師師至未幾逃去欽以讓僧壽粗性滑稽反謂欽曰凡人絶粒七日乃死始經五朝便爾逃遁去食就信實有所闕欽乃大慚於是待客稍厚魏書青溪劉瓛姿狀纎小儒業冠於當時都下士子貴遊莫不下席受業當世推其大儒以比古之曹鄭每出惟一門生持胡床隨後住在檀橋瓦屋數間上皆穿漏學徒敬慕不敢指斥呼為青溪焉竟陵王子良親往修謁南史請業李謐字永和涿郡人也少好學博通諸經周覽百氏初師事小學博士孔璠數年後璠還就謐請業同門生為之語曰青成藍藍謝青師何常在明經年三十二嵗卒其年四門小學博士孔璠等上書曰趙郡李謐㓜號神童年十八詣學受業時博士即孔璠也覽始要終論端究緒授者無不欣其言矣於是鳩集諸經廣校同異比三傳事例名春秋叢林十有二卷為璠等判析隠伏埀盈百條滯無常滯纎毫必舉通不長通有枉斯屈不茍言以違經弗飾辭而背理辭氣磊落觀者忘疲每曰丈夫擁書萬卷何假南面百城遂絶跡下幃杜門却掃棄産營書手自刪削卷無重複者四千有餘矣猶括次專家搜比讜議隆冬逹曙盛暑通宵雖仲舒不窺園君伯之閉户髙氏之遺漂張生之忘食方之斯人未足為喻前河南尹甄琛謂其子曰昔鄭𤣥盧植不逺數千里詣扶風馬融今汝明師甚邇何不就業也又結宇依巖慿崖鑿室方欲訓彼青衿宣揚墳典冀西河之教重興北海之風不墜而祐善空聞暴疾而卒邦國衘殄悴之哀儒生結摧梁之慕况璠等或服議下風或親承音㫖師儒之義其可黙乎事奏詔曰可逺傍惠康近凖𤣥晏謚曰貞靜處士表其門閭以旌高節遣謁者奉冊於是表其門曰文徳里曰孝義云魏書脱衣賈思伯與弟思同師事北海隂鳯業竟無資酬之鳯遂質其衣物時人謂之語曰隂生讀書不是癡不識雙鳯脱人衣及思伯之部送縑百匹遺鳯因具車馬迎之鳯慚不往時人稱歎焉北史影質華隂徐遵明字子判講學於外二十餘年海内莫不宗仰頗好聚歛與劉獻之張吾貴皆河北聚徒教授懸納絲粟留衣物以待之名曰影質有損儒者之風上遵明見鄭𤣥論語序云書以八寸策誤作八十宗因曲為之説其僻也如此上南學何尚之字彦徳元嘉中為丹陽尹立宅南郭外立學聚生徒東海徐秀廬江何曇黄頴川荀子華太原孫宗昌王延秀魯郡孔惠宣並慕道來游謂之南學王球嘗云尚之西河之風不墜尚之亦曰球正始之風尚在上事若嚴君常爽字仕明元魏武成時教授明徒七百餘人立訓甚有勸罰之科弟子事之若嚴君焉尚書左僕射元賛平原太守司馬真安著作郎程靈蚪皆是爽教所就崔浩高允併稱爽之嚴教奬勵有方允曰文翁柔勝先生剛克立教雖殊成人一也北史夢唾鄭灼字茂昭㓜聰敏勵志儒學少受業於皇侃嘗夢與侃遇於途侃謂曰鄭郎開口因唾灼口中自後義理益進南史後進質疑劉炫聰明博學名亞於焯故時稱二劉焉天下名儒後進質疑受業不逺千里而至者不可勝數論者以為數百年已來博學通儒無能出其右者然懷抱不曠又嗇於財不行束脩未嘗有所教誨時人以此少之北史十五為師賈誼曰夫子十五為人師陳留王孝逸先逹之傲者也然白首北面豈以年乎文中子帝師張後裔在并州太宗就受春秋左氏傳後因召入賜讌言及平昔從容謂曰今日弟子何如後裔對曰昔孔子領徒三千逹者無子男之位臣翼賛一人即為萬乘主計臣此功愈於先聖太宗大悦譚賓録同師員半千名餘慶少與齊州人何彦先同師事王義方義方嘉重之嘗謂曰五百年一賢足下當之矣遂改為半方及義方卒半千與彦先皆成服喪畢而去神異録外夷願師蕭頴士字茂挺聰警絶倫外夷亦知其名新羅使入朝言國人願得蕭夫子為師其名動華夷若此舊唐倭國遣使入朝自陳國人願得蕭夫子為師者中書舍人張漸等諫不可而止新黨罪陽城字亢宗隠於中條山逺近慕其徳行多從之學有薛約者嘗學於城性狂躁以言事得罪徙連州客寄無根蔕臺吏以蹤跡求得之於城家城坐臺吏於門與約酒訣别涕泣送之郊外徳宗聞之以城黨罪人出為道州刺史太學生魯郊季償等二百七十人詣闕乞留經數日吏􅃒止之疏不得上舊唐柳宗元聞之遺何番等書曰昔李膺稽康時大學生徒仰闕執訴僕謂訖千百年不可復見乃在今日論者以謂陽公過於納汙無人師道仲尼吾黨狂狷南郭獻譏曽參徒七十二人致禍負芻孟軻館齊從者竊屨彼聖賢猶不免如之何其拒人也俞扁之門不拒病夫繩墨之側不拒枉材師儒之席不拒曲士新唐為服鄭俶依陽城讀書經月餘與論國風俶不能往復一辭因縊于梁下城哭曰我雖不殺俶因我而死為之服緦麻南部新書正身南郭惠子問於子貢曰夫子之門何其雜也子貢曰君子正身以俟欲來者不距欲去者不止且夫良醫之門多病人櫽栝之側多枉木是以雜也茍法行辭師徐曠字文逺博覽五經尤精春秋左氏傳時有大儒沈重講于太學聴者常千餘人文逺就質問數日便去或問曰何辭去之速答曰觀其所説悉是紙上僕皆先已誦得之至於奥􅄨之境翻似未見有以其言告重者重呼與議論十餘反重甚歎服之文逺方正純厚有儒者風竇威楊𤣥感李宻皆從其受學開皇中累遷太學博士後越王侗署為國子祭酒時洛陽饑饉文逺出城樵採為李宻軍所執宻令文逺南面坐備弟子禮北面受之文逺曰老夫疇昔幸以先王之道仰授將軍今將軍權鎮萬物威加四海猶能屈體𢎞尊師之義此將軍之德也老夫之幸也既荷茲厚禮安不盡言乎但未審將軍意耳欲為伊霍繼絶扶傾雖遲暮猶願盡力若為莾卓乘危廹險則老夫耄矣無能為也宻䪺首曰敬聞命矣俄王世充專制宻又問計文逺答曰王世充亦門人也頗得識之是人殘忍意又偏促既乘此勢必有異圖將軍前計為不諧矣非破王世充不可朝覲宻曰嘗謂先生儒者不學軍旅之事今籌大計殊有明畧及宻敗復入東都王世充給其廪食而文逺盡敬見之先拜或問曰聞君踞見李宻而敬王公何也答曰李宻君子也能受酈生之揖王公小人也有殺古人之義相時而動豈不然歟舊唐先生古者稱師曰先王釋名子冠氏子沈子公羊隠十一沈子稱子冠氏上者著其為師也不但言子曰者辟孔子也其不冠子者他師也何註室灑舊翻弟子新云所教南山曰學在我後名弟解從師生名子天台云師有匠成之能學者具資禀之德資則捨父從師敬師如父師之謙讓處資如弟司馬彪曰徒弟子謂門徒弟子老子云善人不善人之師不善人善人之資也南山云師無率誘之心資缺奉行之志翻譯名義三朋友同志同師曰朋同志曰友鄭𤣥註同門曰朋公羊友愛也同志為友説文友有也相保有也釋名合方孔子對哀公曰儒有合志同方營道同術並立則樂相下不厭久别則聞流言不信義同而進不同而退其交有如此者家語為服昔虢叔閎天太顛散宜生南宫适五臣同寮比徳賛文武及虢叔死四人為服朋友之服孔叢子率友左儒友於杜伯皆臣周宣王宣王將殺杜伯而非其罪也左儒爭之于王九復之而王弗許也王曰别君而異友斯汝也左儒對曰臣聞之君道友逆則順君以誅友友道君逆則率友以違君王怒曰易而言則生不易而言則死左儒對曰臣聞古之士不枉義以從死不易言以求生故臣能明君之過以死杜伯之無罪王殺杜伯左儒死之説苑管鮑管夷吾鮑叔牙二人相友甚戚管仲嘗歎曰吾少窮困時嘗與鮑叔賈分財多自與鮑叔不以我為貪知我貧也吾嘗為鮑叔謀事而大窮困鮑叔不以我為愚知時有利不利也吾嘗三仕三見逐于君鮑叔不以我為不肖知我不遭時也吾嘗三戰三北鮑叔不以我為怯知我有老母也公子紏敗召忽死之吾幽囚受辱鮑叔不以我為無恥知我不羞小節而恥名不顯於天下也生我者父母知我者鮑子也此世稱管鮑善交者列立命昔鮑叔有疾管仲為之不食不内漿甯戚患之管仲曰生我者父母知我者鮑叔士為知己者死馬為知己者良鮑子死天下莫吾知安用水漿雖為之死亦何傷哉韓詩外傳鮑叔死管仲舉上袵而哭之泣下如雨從者曰非君父子也此亦有説乎管子曰非夫子所知也吾嘗與鮑子負販於南陽吾三辱於市鮑子不以我為怯知我之欲有所明也鮑子嘗與我有所説王者而三不見聴鮑子不以我為不肖知我之不遇明君也鮑子嘗與我臨財分貨吾自取多者三鮑子不以我為貪知我之不足於財也生我者父母知我者鮑子也士為知己者死而况為之哀乎説苑觀友荆有善相人者所言無遺策聞於國莊王見而問焉對曰臣非能相人也能觀人之友也觀布衣也其友皆孝悌純謹畏令如此者其家必日益身必日榮矣所謂吉人也觀事君者也其友皆誠信有行好善如此者事君日益官職日進此所謂吉臣也觀人主也其朝臣多賢左右多忠主有失皆交爭諍諫如此者國日安主日尊天下日服此所謂吉主也臣非能相人也能觀人之友也莊王善之於是疾収士日夜不懈遂霸天下吕覽班荆初楚伍參與蔡太師子朝友其子伍舉與聲子相善也伍舉娶于王子牟王子牟為申公而亡楚人曰伍舉實送之伍舉奔鄭將遂奔晉聲子將如晉遇之於鄭郊班荆相與食而言復故聲子曰此行也吾必復子至楚與子木言之子木懼言諸王益其禄爵而復之聲子使椒鳴逆之襄二十六縞紵吳季札聘於鄭見子産如舊相識遺之縞帶子産獻紵衣焉上二十九張儼字子節拜大鴻臚使於晉羊祜何禎並結縞帶之好吳録胡叟字倫許一見高允曰吳鄭之交以紵縞為羙談吾之于子以絃韋為幽贄以此言之彼可無愧也後魏書知我子産自晉歸未至聞子皮卒哭且曰吾已無為為善矣惟夫子知我昭十三罕生逝而國子悲廣絶交論傾蓋孔子之郯遭程子於塗傾蓋而語終日甚相親顧謂子路曰取束帛以贈先生子路屑然對曰由聞之士不中間見女嫁無媒君子不以交禮也有間又顧謂子路子路又對如初孔子曰由詩不云乎有美一人清揚婉兮邂逅相遇適我願兮今程子天子賢士也於斯不贈則終身弗能見也小子行之家語宗欽與高允書曰希懷寄契延想積久天遂其願爰遘京師才非季札而眷深孫僑徳􅆾程子而義均傾蓋魏子韓詩作程木子水醴孔子問子桑虖曰吾親交益䟽徒友益散何與子桑虖曰林回曰君子之交淡若水小人之交甘若醴君子淡以親小人甘以絶彼無故以合者則無故以離孔子曰敬聞命矣徐行翔佯而歸絶學捐書弟子無挹於前其愛益加進莊子孫長樂綽作王長史濛誄云余與夫子交非勢利心猶澄水同此𤣥味王孝伯見曰才士不遜亡祖何至與此人周旋世説君子之接如水小人之接如醴表記出交子路問於孔子曰有人養其親而名不稱孝何也孔子曰吾語汝雖有國士之力而不能自舉其身非力之少勢不可矣夫内行不修身之罪也行修而名不彰友之罪也行修而名自立故君子入則篤行出則交賢何謂無孝名乎家語四友周文王胥附奔輳先後禦侮謂之四鄰以免乎牖里之害懿子曰夫子亦有四鄰乎孔子曰吾有四友焉自吾得回也門人加親是非胥附乎自吾得賜也逺方之士日至是非奔輳乎自吾得師也前有光後有輝是非先後乎自吾得由也惡言不至於門是非禦侮乎孔叢子故文王有四臣免於虎口丘有四友以禦侮尚書大傳日益孔子曰吾死之後則商也日益賜也日損曽子曰何謂也子曰商也好與賢已者處賜也好説不若已者不知其子視其父不知其人視其友不知其君視其所使不知其地視其草木故曰與善人居如入芝蘭之室久而不聞其香即與之化矣與不善人居如入鮑魚之肆久而不聞其臭亦與之化矣丹之所藏者赤漆之所藏者黒是以君子必慎其所與處者焉家語索居子夏喪其子而喪其明曽子弔之曰吾聞之也朋友喪明則哭之曽子哭子夏亦哭曰天乎予之無罪也曽子怒曰商女何無罪也吾與女事夫子於洙泗之間退而老於西河之上使西河之民疑女於夫子爾罪一也喪爾親使民未有聞焉爾罪二也喪爾子喪爾明爾罪三也而曰爾何無罪與子夏投其杖而拜曰吾過矣吾過矣吾離羣而索居亦已久矣檀弓死友羊角哀左伯桃二人相與為死友欲仕於楚道遙山阻遇雨雪不得行饑寒無計自度不俱生也伯桃謂角哀曰天不我與深山窮困併在一人可得生宦俱死之後骸骨莫収内手捫心知不如子生恐無益而棄子之能我樂在樹中角哀聴之伯桃入樹中而死得衣糧前至楚楚平王愛角哀之賢嘉伯桃之義以公卿禮葬之角哀夢見伯桃曰蒙子之恩而獲厚葬然正苦荆將軍冡相近欲役使吾吾不能聴也與連戰不勝今月十五日當大戰得子則勝否則負矣角哀至期日陳兵馬詣其冡上作三桐人自殺下而從之君子曰執義可以為世規列士傳俗謂荆軻誤前交後絶吳有士曰張胥鄙譚夫吾前交而後絶張胥鄙有罪拘將死譚夫吾合徒而取之出至於道而後絶知其夫吾也輟行而辭曰義不同於子故前交而後絶吾聞之君子不為危易行今吾從子是安則肆志危則易行也與吾因子而生不若反拘而死闔閭聞之令吏釋之張胥鄙曰吾義不同於譚夫吾故不受其任矣今吏以是出我以譚夫吾故免也吾庸遽受之乎遂觸牆而死譚夫吾聞之曰我任而不受佞也不知而出之愚也佞不可以接士愚不可以事君吾行虚矣人惡以吾力生吾亦恥以此立於世乃絶頸而死君子曰譚夫吾其以失士矣張胥鄙亦未為得也可謂剛勇矣未可謂得節也新序不助子胥將之吳辭其友申包胥曰後三年楚不亡吾不見子矣申包胥曰子其勉之吾未可以助子助子是伐宗廟也止子是無以為友雖然子亡之我存之於是乎觀楚一存一亡也説苑莫逆子祀子輿子犂子來四人相與語曰敦能以無為首以生為脊以死為尻孰知死生存亡之一體者吾與之友矣四人相視而笑莫逆於心遂相與為友莊大宗師子桑户孟子反子琴張三人相與友曰孰能相與於無相與相為於無相為孰能登天遊霧撓桃無極相忘以生無所終窮三人相視而笑莫逆於心遂相與友上青萍趙襄子遊于囿中至於梁馬却不肯進青荓為叅乘襄子曰進視梁下類有人青荓進視梁下豫讓却寢佯為死人叱青荓曰去長者吾且有事青荓曰少而與子友子且為大事而我言之是失相與友之道子將賊吾君而我不言之是失為人臣之道如我者惟死為可適乃退而自殺青荓非樂死也重失人臣之節惡廢交友之道也青荓豫讓可謂之友也吕氏序意友士魏文歎謂子擊曰吾下田子方以行得而友之自吾友子方也君臣益親百姓益附吾是以得友士之功説苑待食吳起出遇故人而止之食故人有他故期反而食至暮不來起不食而待之明日其人來乃與之食韓子夢迷六國時張敏與高惠為友每相思不能得見敏便於夢中徃尋但行至半道即迷不知路遂回于此者三韓非子濠梁莊子與惠子遊于濠梁之上莊子曰鯈魚出游從容是魚樂也惠子曰子非魚安知魚之樂莊子曰子非我安知我不知魚之樂惠子曰我非子固不知子矣子固非魚也子之不知魚之樂全矣莊子曰請循其本子曰女安知魚樂云者既已知吾知之而問我我知之濠上也莊秋子為質莊子送葬過惠子之墓顧謂從者曰郢人堊慢其鼻端若蠅翼使匠石斵之匠石運斧成風聴而斵之盡堊而鼻不傷郢人立不失容宋元君聞之召匠石曰嘗試為寡人為之匠石曰臣則嘗能斵之雖然臣之質死久矣自夫子之死也吾無以為質矣吾無與言之矣莊徐無鬼莊惠標濠上之契發郢匠之模天下注鍾子期死而伯牙絶絃破琴知世莫賞也惠施死而莊子寢説言世莫可為語也淮南脩務匠人輟成風之妙巧廣絶交論蘇張説人主須術以動上從横師則鬼谷也傳曰蘇秦張儀從横習之鬼谷先生掘地為坑曰下説令我泣出則耐分人君之地蘇秦下説鬼谷先生泣下沾襟張儀不若蘇秦相趙并相六國張儀貧賤往歸蘇秦座之堂下食以僕妾之食數讓激怒欲令相秦儀忿恨遂西入秦蘇秦使人厚送其後覺知曰此在其術中吾不知也此吾所不及蘇君者論衡答佞抗手子髙遊趙平原君客有鄒文季節者與子髙相友善及將還魯詣故人訣既畢文節送行三宿臨别文節流涕交頥子高徒抗手而已分背就路其徒問曰先生與彼二子善彼有戀戀之心未知後㑹何期悽愴流涕而先生厲聲髙揖無乃非親親之謂乎子高曰始吾謂此二子丈夫爾今乃知其婦人也人生則有四方之志豈鹿豕也哉而常聚乎其徒曰若此二子之泣非耶答曰斯二子良人也有不忍之心其於敢㫁必不足矣其徒曰凡泣者一無取乎子高曰有二焉大姦之人以泣自信婦人懦夫以泣著愛孔叢子張陳張耳大梁人陳餘亦大梁人也餘好儒術年少父事耳相與為刎頸交後以張黶陳釋之事搆隙耳後與韓信擊破趙井陘斬餘泜水上漢書耳餘始居約時相然相死豈顧問哉及據國争權卒相滅亡何向者慕用之誠後相背之戾也勢利之交古人羞之蓋謂是矣賛脱粟布被公孫𢎞起家徒步為丞相故人高賀從之𢎞食以脱粟飯覆以布被賀怨曰何用故人富貴為脱粟布被我自有之𢎞大慙賀告人曰公孫𢎞内服貂蟬外衣麻枲内厨五鼎外膳一餚豈可以示天下於是朝廷疑其矯焉𢎞歎曰寧逢惡賓不逢故人西京雜記撫塵蓋聞爵禄不相貴以禮同類之遊不以逺近為故是以東門先生居蓬户空穴之中而魏公子一朝以百騎尊寵之吕望未嘗與文王同席而坐一朝讓以天下半大丈夫相知何必撫塵而遊垂髪齊年偃伏以日數哉東方朔與公孫𢎞書王貢王吉字子陽小與貢禹為友及陽仕益州刺史貢禹聞之拂冠以待之陽遂薦稱禹世稱王陽在位貢公彈冠言其取舍同也漢書見御覽今本不同蕭張蕭育望之子也少與陳咸朱博為友著聞當世往者有王陽貢禹故長安語曰蕭朱給綬王貢彈冠言其相薦逹也始背與陳咸俱以公卿士聞名育與博後有隙不能終故世以交為難上操異陳遵字孟公少孤與張竦伯松俱為京兆史竦博學通逹以亷儉自守而遵放縱不拘操行雖異然相親友上奔喪王丹子有同門生喪親家在中山白丹欲往奔慰結侣將行丹怒而撻之令寄縑以祠焉或問其故丹曰交道之難未易言也世稱管鮑次則王貢張陳凶其終蕭朱隙其末故知全者鮮矣時人服其言後漢奉詔交肅宗始修古禮巡狩方岳崔駰上西巡頌帝歎之謂侍中竇憲曰知崔駰乎對曰班固數為臣説之然未見帝曰公愛班固而忽崔駰葉公之好龍也可試見駰駰候見見憲憲倒屣迎笑謂曰吾受詔交公何得薄我哉遂揖入也上慶亷亷范字叔度京兆杜陵人也仕至蜀郡太守平生有志膽氣烈好周人之急世伏其好義與洛陽慶鴻為刎頸交鴻亦慷慨有義節位至琅琊㑹稽二郡太守所在有異迹時人稱曰前有管鮑後有慶亷陳雷宜春陳重少與鄱陽雷義為友太守張雲舉重孝亷重以讓義前後十餘通記雲不聴後義重茂才讓於陳重刺史不聴義遂佯狂被髪走不應命鄉里為之語曰膠漆自謂堅不如雷與陳三府同時俱辟二人陳雷傳陶陶尹敏與班彪相厚每相與談常晏暮不食晝即至㝠夜徹旦彪曰相與久語為俗子所怪然鍾子期死伯牙破琴曷為陶陶哉東觀漢記尹班陶陶于永夕廣絶交論􅍁􅍁范式字巨卿山陽金鄉人少遊太學與汝南張劭為友邵字元伯二人並告鄉里式謂元伯曰後二年當還將過拜尊親見孺子焉乃共克期至日卿果到陞堂拜母飲盡歡而别後元伯寢疾篤同郡郅君章商子徴晨夜省視曰元伯臨盡曰恨不見死友尋卒式夢元伯𤣥冕垂纓而呼曰吾死當以某日葬子豈能相及式覺而悲歎泣下赴之使服朋友之服投其葬日馳往赴之未届而喪已發引至壙將窆而柩不肯進其母撫之曰元伯豈有望耶停柩移時見有素車白馬哭而來母曰必巨卿也既至叩喪言曰行矣元伯死生異路永從此辭㑹葬者千人咸為揮涕式因執紼而引柩於是乃前遂留止冡次為修墳樹而去後漢范張款款於下泉廣絶交論絶交朱穆字公叔與劉伯宗書絶交書曰昔我為豐令足下不遭母憂乎親解縗經來入豐寺及我為侍書御史足下親來入臺足下今為二千石我下為郎乃反因計吏以謁相與足下豈丞尉之徒我豈足下部民欲以此謁為榮寵乎咄劉伯宗於仁義道何其薄哉後漢負約梁鴻初與京邑蕭友善約不為陪臣及友為郡吏鴻遂以書責之而去東觀記班草張升字彦真有大志歎曰人生於世白駒過隙耳安能曲道媚世俗哉守外黄令遇黨錮去官道逢友人班草而語曰今闕下閹宦專權因相向而泣有老父過之曰嗟乎二大夫何泣之悲龍不隠鱗鳯不藏翼一世網羅泣將何及二人欲與之言不顧而退升竟以黨錮下獄死後漢舍短取長李燮字徳公所交皆舍短取長好成人之美時頴川荀爽賈彪雖俱知名而不相能燮並交二子情無適莫世稱其正上杵臼吳祐放猪長垣澤中誦經而行北海公沙穆遊太學資乏乃變服為傭與祐賃舂祐與語大驚遂定交於杵臼之間東觀記義代荀巨伯逺看友人疾值胡賊攻郡友人語巨伯曰吾今死矣子可去巨伯曰逺來相視子令吾去敗義以求生豈荀巨伯所行邪賊既至謂巨伯曰大軍至一郡盡空汝何男子而敢獨止巨伯曰友人有疾不忍委之寧以我身代友人命賊相謂曰我輩無義之人而入有義之國遂班軍而還一郡並獲全世説管華華歆與北海邴原管寧俱遊學三人相善時人號三人為一龍歆為龍頭原為龍腹寧為龍尾魏畧管寧華歆嘗同席讀書有乘軒冕過門者寧讀如故歆廢書出看寧割席分坐曰子非吾友也世説非常孫楚牽招碑曰初君與劉備少長河朔英雄同契為刎頸之交有横波截流拊翼横飛之志俄而委質於太祖備遂鼎足於蜀漢所交非常為時所忌每日自酌揖于季孟之間上復平張遼與其䕶軍武周有隙遼見温恢求請胡質質辭以疾遼出謂質曰僕委意於君何以相辜如此質曰古人之交也取多知其不貪奔北知其不怯聞流言而不信故可終也武伯南身為雅士往者將軍稱之不容於口今以睚眦之恨乃成嫌隙况質才薄豈能終好是以不願也遼感言復與周平魏志分居張裔字君嗣蜀郡成都人也少與犍為楊恭友善恭早死孤遺未數嵗裔分居事恭母如恭息長大為之娶妻買宅産業使立門户蜀志石交諸葛亮與張裔書曰吾自以為與君古之石交也石交之道舉讎以相益割骨以相明猶不相謝也上金蘭張溫字惠恕英才瓌偉遂以禮躬延見召對詞雅淹潤帝改容前席拜中郎聘蜀與諸葛亮結金蘭之好焉吳録僑札周瑜為居巢長過魯肅求資糧肅指囷米與周瑜周瑜益知其竒也遂相親結定僑札之分本傳晉陽秋曰陸抗與羊祐推僑札之分千里候食卓恕字公行上虞人也與人相期約雖遭暴風疾雨無不至者常從建業辭太傅諸葛恪恪問何當復來恕答曰某日當復親覲至是日恪停食候恕至時賓客會者皆以㑹稽建業相去千餘里道隔江湖豈得如期須臾恕至一座盡驚虞預會稽典録共枕吳潘章少有美容儀時人競慕之楚國王仲先聞其美名故來求為友因願同學一見相愛情若夫婦便同衾共枕交好無已後同死而家人哀之因令葬于羅浮山冢上忽生一樹柯條枝葉無不相抱時人異之號為共枕樹廣記千里命駕稽康素與吕安友每一想思輒千里命駕安來值康不在兄喜出迎之不前題門上作鳯字而去喜不悞康至云鳯凡鳥也語林竹林陳留阮籍譙國稽康河内山濤三人年皆相比康年少亞之預此契者沛國劉伶陳留阮咸河内向秀琅邪王戎七人常集于竹林之下肆意酣暢故世謂竹林七賢世説王濬沖為尚書令著公服乘軺車經黄公酒壚下過顧謂後車客吾昔與稽叔夜阮嗣宗共酣飲於此壚竹林之遊亦預其末自稽生夭阮公亡以來便為時所羈紲今日視此雖近邈若山河上忘言山濤性好莊老每隠身自晦與稽康吕安善後遇阮籍便為竹林之遊著忘言之契康後坐事臨誅謂子紹曰巨源在汝不孤矣晉傳神交陳留阮籍譙國稽康並高才逺識少有陪其契者濤初不識一與相遇便為神交袁宏山濤别傳識度相友山公與稽阮一面契若金蘭山妻韓氏覺公與二人異於常交問公公曰我當年可以為友者唯此二生耳妻曰負羈之妻亦親觀狐趙意欲窺之可乎他日二人來妻勸公止之宿具酒肉夜穿墉以視之逹旦忘反公入曰二人何如妻曰君才致殊不如正當以識度相友耳公曰伊輩亦常以我度為勝飲市仰泣昔邢髙吕安飲於市仰天而泣二子非有喪之哀傷相知之晚耳君子所以勤於接賢汲汲於結善欲以立名者也鄒子襟契顧孟著嘗以酒勸周伯仁伯仁不受顧因移勸柱而語柱曰詎可便作棟梁自遇周得之欣然遂為衿契世説相期庾翼字稚恭時京兆杜乂陳郡商浩並才名冠世而翼弗之重每語人曰此輩宜束之高閣俟天下平然後議其所任耳唯與桓温友善在總角之中便相期終始晉中興書競心桓公少與殷侯齊名常有競心桓問殷卿何如我殷云我與我周旋久寧作我世説殷侯既廢桓公語諸人曰少時與淵源共騎竹馬我棄去已輒取之故當出我下上辭多寄託孫興公作庾公誄文曰咨予與公風流同歸擬量託情視公猶師君子之交相與無私虚中納是吐誠誨非雖實不敏敬佩絃韋永戢話言口誦心悲既成示庾道恩庾見慨然送還之曰先君與君自不至於此㝠契支道林喪法度之後精神霣喪風味轉墜常謂人曰昔匠石廢斤於郢人牙生輟絃於鍾子推已外求良不虚也㝠契既逝發言莫賞中心藴結余其亡矣郤後一年支遂殞俱同上世外許邁字叔𤣥入臨安西山改名𤣥字逺遊羲之造之未嘗不彌日忘歸相與為世外之交晉書得意交孔淳之隠居剡山嘗遇枽門法崇於三山披襟領契自以為得意之交宋紀雲霞交謝澹字景恒安孫也任逹仗氣不營當世與順陽范友為雲霞之交南史異常交謝述字景先少有志行蒞官清約殷景仁劉湛並與為異常之交美風姿善舉止湛每謂人曰我見謝道兒未嘗足道兒述小字也宋書謝景仁傳君子交孔稚珪字徳璋㑹稽人也早立名譽當時名士陸惠曉謝􅀢張融何㸃沈淵相與為君子之交齊書投􅍁初宋孝武世齊高帝為舍人劉懷珍為直閣相遇早舊高帝輔政以子晃代為豫州刺史或疑懷珍不受代高帝曰我布衣時懷珍便摧懷投欵况在今日寧當有異南史心期向柳字𤣥季禎弟也有學乂才能立身方雅太尉袁淑司空徐湛之東揚州刺史顔竣皆與友善及竣貴柳猶以情素自許不推先之順陽范􅟛誡柳曰名位不同禮有義數卿何得作曩時意耶柳曰我與士遜心期久矣豈可一旦勢利處之及柳為南康郡涉義宣事敗係建康獄屢宻請竣求相申救孝武常與竣言及柳事竟不助之柳遂伏法上抗禮檀超字悦祖少負氣始為南徐州西曹書佐與别駕蕭惠開抗禮惠開自以地位居前稍相凌駕而超舉動嘯傲不以地勢推之張目謂惠開曰我與卿並有何等名閥俱國家微賤時外戚耳何足以一爵高人惠開欣然更為刎頸之交齊春秋役曵太原孫伯裔家貧常映雪讀書放情物外棲志邱壑與王令君亮范將軍雲為莫逆之交王范既相二朝欲以吏職相處伯裔曰人生百年有如風燭正可怡神飬性琴酒寄情安能栖栖役曵若此稽康所不堪余亦未能也談藪解裳自隔劉璡與友人會稽孔逷同舟入東於塘上遇一女子逷目送曰美而􅀈璡曰斯豈君子所宜言乎非吾友也於是解裳自隔或曰與友孔徹同舟入東徹留目觀岸上女子璡舉席自隔不復同坐招攜劉訏字彦度與陳留阮孝紳李紳申金蘭之契築室鍾阜之傍共聴内義鑚尋奥典梁典阮孝緒博學隠居不交當世恒居一鹿牀環植竹木寢處其中時人造之未嘗見也訏經一造孝緒即顧以神交訏族兄歊又履髙操三人日夕招􅂝故都下謂之三隠訏自少至長無喜愠之色每於可競之地輒以不競勝之或有加陵之者莫不退而愧服由是衆論咸歸重焉南史遺書劉善明少與崔祖思友善祖思出為青冀二州善明遺書曰昔時之遊于今邈矣或擕手春林或負杖秋澗逐清風於林杪追素月於園埀如何故人徂落殆盡足下今鳴笳舊鄉衣繡故園宋季荼毒之悲已蒙蘇㤗河朔倒懸之苦方須救援遣遊辯之士為鄉導之使輕裝啓行經營舊壤今泗上歸業稷下還風君欲誰讓邪􅂓送諸心敬申貧贈南齊及聞祖思死慟哭仍得病卒南史置祭裴伯戎少有風望末年劇飲不已乃至傷性未亡前數日忽云吾得宻信將被收掩乃與婦乘車西逃避後因顧指壁中言有官人追逐其妻方知其病卒後殯子家園友人常景李渾王元景盧元明魏季景李騫等十許人于墓旁置酒設祭哀哭涕泣一飲一酹曰裴中書魂而有靈知吾曹也乃各賦詩一篇李騫以魏収亦與之友寄以示収収時在晉陽乃同其作論叙伯荗其十字云臨風想𤣥度對酒思公榮時人以伯荗性侮傲謂収詩頗得其事實魏書夢别盧元明友人王由居頴川忽夢由擕酒就之言别賦詩為贈及明憶其詩十字云自兹一去後朝市不復遊元明歎曰由性不狎俗旅寄人間乃有今夢詩復如此必有他故經三日果聞由為亂兵所害尋其亡日乃是發夢之夜北史遣煩㓂雋字祖雋有志行篤於仁義少為司徒崔光所知光命其子勵與雋結交雋每造光常清言移日小宗伯盧辨以雋業行俱崇待以師友之禮毎有閑暇輒詣雋讌語彌日恒謂人曰不見西安君煩憂不遣其為通人所敬重如此周書不阿韋正字敬直􅀈子也初與東海王僧孺友善及僧孺為尚書吏部郎參掌大選賓友故人莫不傾意正獨澹然及僧孺擯廢之後正復篤素分有踰曩日論者稱焉梁書放逸韋𤣥字敬逺志尚夷簡雅好名義虚襟善誘雖耕夫牧豎有一介可稱者皆接引之特與族人處𤣥及安定梁曠為放逸之友周書易衣張軌字元軌少好學志識開朗初仕洛陽家貧與樂安孫樹仁為莫逆之友每易衣而出以此見稱上紿盟周敷字仲逺梁時與同郡周迪深相交結梁亡敷先入陳進號安西將軍令還鎮豫章迪以敷素出已下超致顯貴深不平乃舉兵反遣弟方興襲敷敷大破之後迪復襲東興敷從章昭逹征之至定川縣與迪相對紿敷曰吾昔與弟戮力同心宗從匪他豈規相害今願伏罪還朝因弟披露心腑先朝挺身共立盟誓敷許之方登壇為迪所害詔曰敷受詔遐征淹時違律虚襟姦詭遂貽喪仆史臣曰昔張耳陳餘自同于至戚周敷周迪亦誓等䁥親尋鋒刃而誅殘斯忍夫胡越矣讎隙因于勢利何其鄙歟陳書傾心定交李宻字𤣥䆳隋蒲山公寛于也開皇中襲父爵年始弱冠尚書令楊素見而竒之謂其子𤣥感曰李宻智計不窮爾所不及可與為友𤣥感遂傾心禮遇為定刎頸之交舊唐資給劉黒闥具州漳南人也與竇建德少相友善家貧無以自給建徳每資之黒闥隨所費至盡而不以為疑建徳亦弗之問也上忘年孔紹安越州山隂人陳吏部尚書奐之子少與兄紹新俱以文詞知名十三陳亡入隋時有詞人孫萬壽與紹安篤忘年之好時人稱為孫孔紹安大業末為監察御史上撝損岑文本自以出自書生每懷撝損平生故人雖微賤必與之抗禮上人雖羇賤必鈞禮新不改舊劉仁軌雖位居端揆不自矜倨毎見貧賤時故人不改布衣之舊耐久魏元同與裴炎締交能保終始故號耐久朋唐書方外陸餘慶雅善趙貞固盧藏用陳子昻杜審言宋之問畢搆郭襲微司馬承禎釋懷一時號方外十友上文章四友杜審言少與李嶠崔融蘇味道為文章四友世號崔李蘇杜小友李泌字長源七嵗知為文張九齡尤所奬愛常引至卧内九齡與嚴挺之蕭挺善挺之惡誠佞勸九齡謝絶之九齡忽獨念曰嚴太苦勁然蕭軟美可喜方命左右召蕭泌在旁帥爾曰公起布衣以直道至宰相而喜軟美者乎九齡驚改容謝之因呼小友新唐紿終張九齡與嚴挺之袁仁宗梁升卿盧怡結交友善挺之等有才幹而交道始終不渝甚為當時所稱舊唐人外初李泌流放江南與柳渾顧况為人外之交吟詠自適顧况者蘓州人性恢諧雖王公之貴與之交者必戯侮之柳渾輔政以校書郎徴復遇李泌繼入自謂已知秉樞要當得逹官久之方遷著作郎况心不樂求歸於吳及泌卒不哭而有調笑之言為憲司所劾貶饒州司户上然諾郗純字髙卿以詞學見推與顔真卿蕭頴士李華皆相友善子士美少好學善記覽顔蕭輩常與之討論經傳應答如流既而相謂曰吾曹異日當交于二郗一之間矣士美善與人交然諾之際豁如也當時名稱翕然上不改操趙曄性孝悌敦重交友雖經艱危不改其操少時與殷寅顔真卿柳芳陸據蕭頴士李華邵軫同志友善顧天寶中語曰殷顔柳陸蕭李邵趙以其重行義敦友道也舊唐曄宗儒父也聨床静言李約為兵部員外􅊈公之子也識度清曠逈出塵表與主客張員外諗同官并韋徴君况墻東遯世不婚娶不治生業李獨厚於張聨床静言逹旦不寢人莫得知贈張詩曰我有心中事不向韋三説秋夜洛陽城明月照張八尚書故寶交遊楊憑少負氣節與母弟凝凌相友愛皆有時名重交遊尚然諾與穆質許孟容李鄘王仲舒為友故時人稱楊穆許季之友仲舒以後進慕而入焉舊唐四䕫崔造字𤣥宰與韓㑹盧東美張正則為四皆僑居上元好談經濟之畧嘗以王佐自許時人號為四䕫神感吳郡陸憑少有志行性悦山水貞元中往遊永嘉遘疾而疫憑素與吳興沈萇友善萇夢憑顔色顦顇曰我遊至永嘉苦疾將困君為知我者願託家事萇悲又叙舊歡宴語久之因述文章話虛無之事乃謂萇曰贈君浮雲詩一篇以寄其懷詩曰虛虚復空空瞬息天地中假合成此像吾亦非吾躬悲吟數四臨去曰憑船已發來明日午時到此執手而去及覺所記甚分明乃書而録之如期而憑喪船至萇撫孤而慟􅐠助倍禮詞人楊丹為之志具旌神感銘曰篤生府君美秀而文沒而不起寄音浮雲通幽記林泉韋温字𢎞育綬子也剛腸寡合人多踈簡惟與常侍蘇祐善字祐之蘭陵人博雅好古閑淡貞退善鼓琴賦詩遊心林壑嘯詠終日而名人髙士多與之遊給事中韋温尤重之結為林泉之友舊書八友吳珙吳頊吳崧皮光業林昇羅隠何蕭韓必居于吳興長城之八座山時號八友而交舜耕於歴山而交益陶於河濱而交禹魯連子飲醇醪吳有程普者頗以年長數凌侮周瑜瑜折節容下終不之校普後自敬服而親重之乃告人曰與周公瑾交若飲醇醪不覺自醉江表傳得婦遼東馬仲叔王志都相知至厚叔先亡忽見形謂都曰吾不幸先亡心恒相念念卿無婦當為卿得婦遂與之期至日大風書昏向暮果有婦人在寢室中都問其由曰我河南人父為清河太守臨當見嫁不知何得至此都告之故遂成夫婦往詣其家大喜以為天相與也遂與之生一男後為南郡太守幽明録詆訶崔瞻與趙郡李槩為莫逆之交槩趙東還瞻遺之書曰仗氣使酒我之常弊詆訶指切在卿尤甚足下告歸吾於何聞過也北史烏集與人交多詐偽無情實偷取一切謂之烏集之交烏集之交初相驩後必相咄故曰烏集之交雖善不親管形勢解伐木伐木燕朋友故舊也自天子至于庻人未有不須友以成者毛詩序朱穆見比周傷義偏黨毁俗志抑朋游之私遂著絶交之論蔡邕以為穆貞而孤又作正交而廣其志焉後論聞之前訓曰君子以朋友講習而正人無有淫朋是以古之交者其義敦以正其誓信以固逮夫周徳始衰頌聲既寢伐木有鳥鳴之刺谷風有棄予之怨其所由來政之缺也蔡正交論勢利諸葛武侯云勢利之交雖以經逺士之相知温不増華寒不改葉貫四時而不衰歴險夷而益固要覽以勢交者勢傾則絶以利交者利窮則散故君子不與也文中子江乙曰以財交者財盡而交絶以色交者華落而愛渝楚策凡人之結交多初隆而後薄始宻而終疎斯何故也皆由交静不發於神氣道數乖而不同權以一時之術取倉卒之利有貪於財而交有慕其勢而交有愛其色而交三者既衰疏薄由生鍾㑹蒭蕘論唇齒夫交接者人道之本始紀綱之大要名由之成事由之立交之於人也猶唇齒之相濟才非交不用名非交不發身非交不太劉歆新議四道朋友之道有四近則正之逺則稱之樂則思之患則死之白虎通面朋朋而不心面朋也友而不心面友也法言攻己幽閑則攻己之短㑹同則述人之長負我者我加厚焉未有與人交者此而見憎者也昌言友道夫隂陽交萬物成君臣交邦國治士庻交徳行光同幽樂共富貴而友道備矣易曰上下交而其志同由此觀之交乃人倫之本務王道之大義非特士友之志也魏文論交道交之為道起自羲皇造化之初君臣始立而有人倫上下之叙象天地交泰以左右於民也唐虞三代莫不因之故交全情親則國安治強交敗情乖則國危治弱立交者欲其親也是故百姓不親禹作司徒疎者能睦亷頗相如忍忿以從厚陳平周勃感陸生而相親所以安趙於強敵定漢於幾殆此交接之大義帝王之極務聞之於易曰交乃人倫之本務王道之大義也周昭新撰染素譬之於物猶素之白也染之以藍則青遊居交友亦人之所染也韓起與田蘇處而成好仁之名甘茂事史舉用顯齊秦之功曹叅師蓋公致清淨之治竇長君兄弟出於賤𨽻謹恭師友皆為退讓君子語曰蓬生麻中不扶自直此言雖小可以喻大必得其人千里同好固於膠漆堅如金石窮途不阻其分毁譽不疑其實譙子齊交定交禮越俗性率朴意親好合即脱頭上手巾解腰間五尺刀以與之為交拜親跪妻初定交有禮俗皆當於山間大樹下封土為壇祭以白犬一丹鷄一鷄子三名曰木下鷄犬五其壇地人畏不敢犯也祝曰卿雖乘車我戴笠後日相逢下車揖我雖歩行卿乘馬後日相逢卿當下風土記結義傅幹與叔威威書曰吾與足下結義紈素恩比同生剖心張奥與張叔堅書曰吾與叔堅剖心相知豈以流言相猜耶暱交昔毎聞長老追計平生同時親故亡多存寡暱交宻交亦不半在或所曽共逰一塗同宴一室十年之内索然已盡以是思哀哀可知矣歎逝賦幽情發而成緒滯思叩而興端信松茂而栢悦嗟芝焚而蕙歎上三交五釁利交同源派流則異較言其畧有五術焉一曰勢交二曰賄交三曰談交四曰窮交五曰量交因此五交是生三釁敗徳殄義禽獸相若一釁也難固易攜讎訟所聚二釁也名陷饕餮貞介所羞三釁也古人知三釁之為梗懼五交之速尤故王丹威子以檟楚朱穆昌言而示絶有㫖哉有㫖哉絶交論反眼士窮乃見節義今夫平居里巷相慕悦酒食游戯相徴逐詡詡強笑語以相取下握手出肺肝相示指天日涕泣誓生死不相背負真若可信一旦臨小利害僅如毛髪比反眼若不相識落陷穽不一引手救反擠之又下石焉者皆是也此宜禽獸夷狄所不忍為而其人自視以為得計昌黎柳子厚墓誌貧交翻手作雲覆手雨紛紛輕薄何須數君不見管鮑貧時交此道今人棄如土杜詩當面輸心背面笑賓客肅客士凡與客入者毎門讓於客客至於寢門則主人請入為席然後迎客客固辭主人肅進客而入主人入門而右客入門而左主人就東階客就西階禮記曲禮東道晉人秦人圍鄭鄭伯使燭之武見秦伯辭曰臣之壯也猶不如人今老矣無能為也已因見秦伯曰若舍鄭以為東道主行李之往來共其乏困君亦無所害左禧重席季武子無適子公張長而愛悼子欲立之訪於臧紇曰飲我酒吾為子立之季氏飲大夫酒臧紇為客既獻臧孫命北面重席新樽繫之召悼子降逆之左襄二十二収器昔叔向適鄭鬷蔑惡欲觀叔向從使之收器者而往立於堂下一言而善叔向將飲酒聞之曰必鬷明也下執其手以上曰子少不颺子若無言吾幾失子矣言之不可以已也如是遂如故知昭二十八李嶠上高長丈書云曽越嚴序趍下風希口吻之芳音候眉宇之陽氣而堂上百里鬷明無撤器之因明下三千毛遂乏處囊之地文粹三過賓有見人於宓子者賓出宓子曰子之賓獨有三過望我而笑是􅀈也談語而不稱師是返也交淺而言深是亂也賓曰望君而笑是公也談語而不稱師是通也交淺而言深是忠也故賓之容一體也或以為君子或以為小人所自視之異也故趨舍合即言忠而益親身疏即謀當而見疑淮南謀畫尸子晉人也名佼秦相衞鞅客也鞅謀事畫計未嘗不與佼規也商君被刑恐併誅乃亡逃入蜀作書二十篇十九篇陳道徳仁義之記一篇言九州險阻水泉所起也善遇孟嘗君田文在薛招致諸侯賓客以故傾天下之士食客數千人無貴賤一與文等曽待客夜食有一人蔽火光客怒以飯不等輟食辭去孟嘗君起自持其飯比之客慙自剄士以此多歸孟嘗君孟嘗君客無所擇皆善遇之人各自以為孟嘗君親己也史記三客孟嘗君食客三千人厨有三列上客食肉中客食魚下客食菜齊市中有乞食人馮煖經冬無袴面有饑色願得上厨列士傳唾面孟嘗君毁廢諸客皆去後召而復之客之復至此欲唾面而大辱馮驩曰生者必有死物之必至也富貴多士貧賤寡友事之固然也君獨不見夫朝趨市者乎明旦側肩争門而入日暮之後過市朝者掉臂而不顧非好朝而惡暮所期物忘其中今君失位賓客皆去不足以怨士而徒絶賓客之路願君遇客如故孟嘗君再拜曰敬聞命矣史記互見市禮交魏公子無忌封信陵君為人仁而下士士無賢不肖皆謙而禮交之不敢以其富貴驕士士以此方數千里往争歸之致食客三千人當是時諸侯以公子賢多客不敢加兵謀魏十餘年上珠履趙平原君勝使人於春申君黄歇春申君舍之於上舍趙使欲夸楚為瑇瑁簪刀劒室以珠玉飾之請命春申君客春申君客三千餘人其上客皆躡珠履以見趙使趙使大慙著藉汗明見春申君候間三月而後得見談卒春申君大悦之汗明欲復談春申君曰僕已知先生息矣汗明慨然曰臣請為説之君之賢實不如堯臣之能不及舜夫以賢舜事聖堯三年而後乃相知也今君一旦而知臣是君聖於堯而臣賢於舜也春申君曰善乃召門吏為先生著客籍五日一見戰國策揖客大將軍衞青既益尊姊為皇后然汲黯與亢禮或説黯曰自天子欲令羣臣下大將軍大將軍尊貴誠重不可以不拜黯曰夫以大將軍有揖客反不重耶大將軍聞愈賢黯漢書賓客益落鄭當時始與汲黯列為九卿内行脩兩人中廢賓客益落當時死家亡餘財先是下邽翟公為廷尉賓客亦填門及廢門下可設雀羅後復為廷尉客欲往翟公大署其門曰一死一生乃知交情一貧一富乃知交態一貴一賤交情乃見本傳一浮一沒交情乃出説苑勢有常趣理有固然富貴則人争附之此勢之常趨也貧賤則争去之此理之固然也夫與富貴交者上有稱譽之用下有貨財之益與貧賤交者大有賑貸之費小有假借之損是故富貴雖新其勢日親貧賤雖舊其勢日除此處子所以不能與官人競也昔魏其之客流於武安長平之吏移於冠軍亷頗翟公載盈載虚夫以四君之賢藉舊貴之夙恩客猶若此則又况乎生貧賤者哉潜夫論上客樓䕶字君卿為人短小精辯聽之者皆竦然與谷永俱為五侯上客長安號曰谷子雲筆札樓君卿唇舌言其見信用也漢書致膳五侯不相能賓客不得來往樓護豐辯傳食五侯間各得其懽心競致竒膳護乃合以為鯖世稱五侯鯖以為奇味焉西京雜記居樽丕成都侯王商子邑為大司空貴重商故人皆敬事邑唯樓護自安如舊節邑亦父事之不敢有闕時請召賓客邑居樽下稱賤子上壽坐者百數皆離席伏唯護獨東嚮正坐字謂邑曰公子貴如何漢書投轄陳樽居長安中列侯近臣貴戚皆貴重之牧守當之官及郡國豪傑至京師者莫不相因到遵門遵嗜酒毎大飲賓客滿堂輒闗門取客車轄投井中雖有急終不得去嘗有部刺史奏中過遵值其方飲刺史大窮候遵霑醉時突入見遵母叩頭自白書對尚書有期㑹狀母迺令從後閣出去上浮湛陳遵與張竦俱免官以列侯歸長安竦居貧無賓客時時好事者從之質疑問事論道經書而已而遵晝夜呼號車騎滿門酒肉相屬遵常謂竦曰足下諷誦經書苦身自約不敢蹉跌而我放意自恣浮湛俗間官爵功名不减於子而差獨樂顧不優耶竦曰人各有性長短自裁子欲為我亦不能吾而效子亦敗矣雖然學我者易持效子者難將吾常道也上北道主光武至薊彭寵上謁心懷不平光武以問朱浮浮對曰前吳漢北發兵時大王遺寵以所服劍又倚以為北道主人寵謂至當迎閣握手交歡並坐今既不然所以失望後漢賓饗崔瑗好士愛賓客盛修殽膳殫極滋味不問餘産或言其大奢瑗聞之怒敇妻子曰吾並日而食以供賓客而反以獲譏士大夫不足養如此後勿過菜具無為諸子所蚩也終不能改奉禄盡於賓饗也東觀漢記折節袁紹有姿貌威容愛士養名既累世台司賓客所歸加傾心折節莫不争赴其庭士無貴賤與之抗禮輜軿紫轂填接街陌後漢紹不妄通賓客非海内知名不得相見又好游俠與張孟卓何伯求吳子卿許子逺皆為奔走之友英雄記倒屣蔡邕見王粲而竒之時邕才學顯著貴重朝廷常車騎填巷賓客盈坐聞邕在門倒屣迎之後漢坐上客孔融性寛容少忌好士喜誘益後進及退職賓客日盈其門常歎曰坐上客常滿尊中酒不空吾無憂矣與蔡邕素善邕卒後有虎賁士貌類於邕融毎酒酣引與同坐曰雖無老成人且有典型上不知是客諸葛孔明毎至徳公家獨拜牀下徳公初不令止司馬徳操嘗詣徳公值其渡沔上先人墓徳操徑入其室呼徳公妻子使速作黍徐元直向云當來就我與徳公談其妻子皆羅拜於堂下奔走共設須臾徳公還直入相就不知何者是客也襄陽記無主客意陳登字元龍在廣陵有威名許汜與劉備並在劉表坐表與備共論天下人氾曰陳元龍湖海之士毫氣不除備曰君言豪寧有事耶昔過下邳見元龍元龍無主客之意久不與相語自上大􅇃卧使客卧床下備曰君有國士之名所望有救世之意而君求田問舍言無可采是元龍所諱也何縁當與君語如小人欲卧百尺樓上君於平地卧但上下牀之間耶表大笑魏志談客簡雍字憲和少與先主有舊隨從周旋先主至荆州雍與糜竺孫乾同為從事中郎嘗為談客往來使命雍性簡傲跌宕在先主坐席猶箕踞傾倚威儀不肅自縱􅃴諸葛亮已下則獨擅一榻項枕卧語無所為屈蜀志接賓疲惓張裔字君嗣諸葛亮出駐漢中裔領留府長史其明年北詣亮諮事送者數百車乘盈路裔還書與所親曰近者涉道晝夜接賓不得寧息人自敬承相長史男子張君嗣附之疲倦欲死上無雜客通賢橋東有吳丞相顧雍宅自雍至孟名著四代常居此宅門無雜客投刺攝齊者不過一時英俊蘇州志上賓孫策在吳張昭張紘秦松為上賓共論四海未㤗湏當用武治而平之績年少末坐遙大聲言曰昔管夷吾相齊桓公九合諸侯一匡天下不用兵車孔子曰逺人不服則修文徳以來之今論者不務道徳懷取之術而唯尚武績雖童蒙竊所未安也昭等異焉吳志高㑹諸葛融瑾子也毎延賓髙㑹輒歴問賓客各言其能乃合榻促席量敵選對或有博奕或有樗蒱投壺弓彈部别類分於是甘果經進清酒徐行融周流觀覽終日不倦上忩中窺客漢中楊子拒妻字大英仲珍有髙名嘗請客母盛為供具從窻中窺客罷讓之曰吾視汝所交皆不及已此自損之道後嵗餘復請賓客皆耆徳秀士母觀之喜曰吾無憂矣列女傳不得一桮王戎弱冠詣阮籍時劉公榮在座阮謂王曰偶有二斗美酒當與君共飲彼公榮者無預焉二人交觴酬酢公榮遂不得一桮而言語談戯三人無異或有問之者阮答曰勝公榮者不得不與飲酒不如公榮者不可不與飲酒唯公榮可不與飲酒世説敗人意稽阮山劉在竹林酣飲王戎後往步兵曰俗物已復來敗人意王笑曰卿輩意亦復可敗耶上連榻坐杜預拜鎮南將軍朝士悉至皆在連榻坐時亦有裴叔則羊穉舒後至曰杜元凱乃復連榻坐客不坐便去杜請裴追之羊去數里住馬既而俱還杜許上佳設過江初拜官輿飾供饌羊曼拜丹陽尹客來蚤者並得佳設日晏漸罄不復及精隨客早晚不問貴賤羊固拜臨海竟日皆美供雖晩至亦獲盛饌時論以固之豐華不如曼之真率上精食翻陽孝亷范逵寓宿于陶侃時母湛氏乃徹所卧新薦自剉給其馬又宻截髪及雙髲賣與鄰人供肴饌逵聞之歎息曰非此母不生此子侃竟以功名顯晉列女傳風恬月朗許掾嘗詣簡文爾夜風恬月朗乃共作曲室中語襟情之詠偏是許之所長辭寄清婉有逾平日簡文雖契素此遇尤相咨嗟不覺造意共又手語逹于將旦既而曰𤣥度才情故未易多有許世説詢字𤣥度能言理曽出都迎姉簡文皇帝劉真長説其情㫖及襟懷之詠毎造上賞對夜以繫日續晉陽秋亹亹謝太傅未冠始出西詣王長史濛清言良久荀子脩問曰向客何如尊長史曰向客亹亹為來逼人世説欵雜孫長樂綽兄弟就謝公宿言至欵雜劉夫人掞妹在壁後聴之具聞其語謝公明日還問昨客何以劉對曰亡兄門未有如此賓客謝深有愧色上無君輩客王劉每不重蔡公二人嘗詣蔡語良久乃問蔡曰公自言何如夷甫答曰身不如夷甫王劉相目而笑曰公何處不如答曰夷甫無君輩客開筵車𦙍字武子風姿美劭機悟敏率桓温在荆州取為從事𦙍既博學多聞又善于激賞當時毎有盛坐必同之皆云無車公不樂太傅謝公游集之日開筵以待之賣狗供客謝僕射陶太常詣吳領軍坐久吳留作食曰已身作婢賣狗供客此得一䪺食殆無復氣可與語俗説率素陸納為吳興太守將至郡先至姑孰辭桓温因問温曰公致醉可飲幾酒食肉多少温曰年大來飲三升便醉白肉不過十臠卿復云何納曰素不能飲止可二升肉亦不足言後伺温閑謂之曰外有微禮方守逺郡欲與公一醉以展下情温欣然納之時王坦之刁彛在坐及愛禮唯酒一斗鹿肉一柈坐客愕然納徐曰明公近云飲酒三升納止可二升今有一斗以備杓餘瀝温及賓客並歎其率素更勑中厨設精饌酣飲極懽而罷迴詣王雅字茂逹性好接下敬慎奉公孝武帝深加禮遇毎置酒宴集雅未至不先舉觴其見重如此時王珣兒婚賓客車騎甚衆會聞雅拜少傅迴詣雅者過半時風俗頺弊無復亷恥雅既貴倖威權甚震門下車騎常數百而善應接傾心禮之晉傳不獨餐劉穆之性奢豪食必方丈旦輒為十人饌穆之既好賓客未嘗獨餐毎至食時客止十人以還者帳下依常下食以此為常宋書改服羊欣嘗詣領軍謝混混拂席改服然後見之時混族子靈運在坐退告族兄瞻曰望蔡見羊欣遂易衣改席欣由此知名上慣噉麤食宗慤孝建中累遷豫州刺史監五州諸軍事先是鄉人庾業家甚富豪方丈之膳以待賓客而慤至設以菜葅粟餅謂客曰宗軍人慣噉麤食慤致飽而去至是業為慤長史帶梁郡懿待之甚厚不以前事為嫌逼母崔道固為宋諸王叅軍被遣青州募人長史以下王詣道固諸兄等逼其所生自致酒炙於客前道固驚起謂人曰家無人力老親自執劬勞詣客皆知其兄所作成拜其母母謂道固曰我賤不足以報貴汝宜答拜諸彥皆歎美道固母子而賤其諸兄南史傾朝送别何尚之字彦徳遷吏部郎告休定省傾朝送别於治渚及至郡父叔度謂曰聞汝來此傾朝相送可有幾客答曰殆數百人叔度笑曰此是送吏部郎耳非闗何彦徳也昔殷浩亦嘗作豫章定省送别者甚衆及廢徙東陽舩泊征虜亭積日乃至親舊無復相窺者上客至自煖謝超宗為義興太守坐公事免詣東府門自通其日風寒慘厲太祖謂四座曰此客至使人不衣自煖矣南齊書羙歎㑹稽孔廣字淹源美容止善吐論王儉張緒咸美之儉常云廣來使人廢簿領匠不須來來則莫聽去緒數巾車詣之毎歎云孔廣使吾成輕薄祭酒南史客去拂坐王思逺立身簡潔諸客有詣己者覘知衣服垢穢方便不前形儀新楚乃與促膝雖然及去之後猶令二人交帚拂其坐處上不舉主饌孔休源字慶緒初到都寓於宗人少府孔登宅曽以祠事入廟侍中范雲一與相遇深加褒賞曰不期忽覯清顔䪺祛鄙吝觀天被霧驗之今日後雲命駕到少府登堂拂筵整帶謂當詣已備水陸之品雲駐筋命待休源及至命取其常膳止有赤倉米飯䒱鮑魚雲食休源食不舉主人之饌髙談盡日同載還家登深以為愧尚書令沈約當朝貴顯軒蓋盈門休源或時後來必虚襟引接處之坐石商畧文義求内傳盃僕射徐勉勢傾天下在袁昻處宴賓主甚歡勉求昻出内人傳杯昻良久不出勉苦求之昻不獲已命出五六人始至齋閣昻謂勉曰我無少年老嫗並是兒母非王妃母便是主大家今令問訙卿勉聞大驚求止方昻為貴造謁何思澄字元静少勤學工文重結交入華林撰遍畧分書與諸賓朋校定而終日造謁毎宿背作名刺一東曉便命駕朝賢無不悉與狎狎處即命食有人方之覆䕶欣然當之投晩還家所齎名刺必盡舊賓如昔何敬容字國禮為尚書令侍中參掌佐史以妾弟事免職後起加侍中敬容舊時賓客門生諠譁如昔冀其復用會稽謝郁致書戒之曰君侯已得瞻望多士出入禁門醉尉將不敢呵灰然不無其漸甚休甚休昔竇嬰楊惲亦得罪明時不能謝絶賓客獨交黨援卒無後福終益前禍人人所以頗猶有踵君侯之門者未必皆感惠懷仁有灌夫任安之義乃戒翟公之大署冀君侯之復用也君侯豈能鑒焉梁書殘客張纉字伯緒與參掌何敬容意趣不恊敬容居權軸賓客輻湊有過詣纉者輒距不前曰吾不能對何敬容殘客上慶陪宴吳興吳規頗有才學邵陵王綸引為賓客深相禮遇及綸作牧郢蕃規隨從江夏遇纉出之湘鎮路經郢服綸餞之南浦纉見規在坐意不能平忽舉盃曰吳規此酒慶汝得陪今宴規尋起還其子翁孺見父不悦問而知之翁孺因氣結爾夜便卒規恨纉慟兒憤哭兼至信次之間又致殞規妻深痛夫子翌日又亡時人謂張纉一盃酒殺吳氏三人其輕傲皆此類也好遊鮑正為湘東王五佐好交游無日不適人人為之語曰無處不逢烏噪無處不逢鮑佐南史别榻蕭韶為郢州刺史韶昔為㓜童庾信愛之有㫁袖之歡衣食所資皆信所給遇客韶亦為信傳酒後為郢州信西上江陵途經江夏韶接信甚薄坐青油幕下引信入宴坐信别榻有自矜色信稍不堪因酒酣乃徑上韶床踐蹋肴饌直視韶面謂曰官今日形容大異近日時賓客滿坐韶甚慙恥好觀人酣長孫澄字士亮操履清約家無餘財雅對賓客接引忘疲雖不飲酒而好觀人酣興常恐座客請歸毎勒中厨别進異饌留之止周書泛江孫瑒字徳璉性通泰有財物散之親友其自居處頗失於奢豪庭院穿築極林泉之致賓客填門軒蓋不絶及出鎮郢州乃合十餘船為大舫於中立亭池植荷芰毎良辰美景賓寮並集泛長江而置酒亦一時之勝賞焉南史未得客王毛仲有寵於𤣥宗百官附之一日毛仲嫁女上問何所須毛仲䪺首謝曰臣萬事已備但未得客上曰張説源乾曜輩豈不可召耶對曰此則得之上曰知汝所不能致者一人耳必宋璟也對曰誠如聖㫖上笑曰朕明日為汝召客明日上謂宰相朕奴毛仲有婚事卿等宜與逹官悉詣其第既而日中客未敢舉箸待璟久之方至先執酒西嚮拜謝飲不盡巵遽稱腹痛而歸豪友長安富民王元寶楊崇義郭萬金等國中巨豪也各以延納四方多士競於供送朝之名寮往往出於門下毎科場文士集於數家時人目之為豪友天寶遺事賦詩李適之在相位毎退朝則邀賓客諧謔賦詩曽不避李林甫之害嘗為詩曰朱門長不閉親友恣相過年今將半百不樂待如何及罷相又為詩曰避權仍罷相樂聖且啣盃借問門前客今朝幾箇來及死非其罪時人寃之疾饌徳宗非時石拜吳湊為京兆尹便令赴上湊疾驅諸客至府已列筵矣或問曰何速吏曰兩時日有禮疾舉鐺釜而取之故三五百人饌常可立辨國史補強致李藩字叔翰除秘書郎王紹持權邀藩一相見即用終不就王仲舒韋成季呂洞輩為郎官朋黨輝赫日㑹聚歌酒慕藩名強致同會藩不得已一至仲舒輩好為訛語俳戯後召藩堅不去曰吾與仲舒輩終日不曉所與言何也後果敗舊唐罰爵李逢吉當國畏裴度復相使京兆尹劉栖楚等十餘人悉力排却之雖度門下賓客皆有去就意它日度置酒延客栖楚曲意自解附耳語崔咸嫉其矯舉酒讓度曰丞相乃許所由官囁嚅耳語願上罰爵度笑受而飲栖楚不自安趨出坐上莫不壯之新唐竒客崔𢎞禮過宣武從劉𤣥佐獵酒酣顧曰崔生獨不知此樂耶𢎞禮笑曰我固喜武請為公歡𤣥佐臂鷹與𢎞禮馳逐急緩在手一軍驚曰安得此竒客𤣥佐大悦欲留之固辭夜半客郭薫者與丞相于都尉向為硯席之交及琮居重地復綰財賦薫不能避譏嫌而樂為夜半客咸通中薫及沈雲翔輩凡十人皆交通中貴號芳林十哲芳林門名由此入内故也摭言王莾為宰衡時甄豐旦夕入謀議時人語曰夜半客甄長伯後漢妓小小錢塘蘇小小歌云我乘油璧車郎乘青驄馬何處結同心西陵松栢下古樂府蘇小小錢塘名倡也蓋南齊時人西陵在錢塘江之西歌云西陵松栢下是也樂府廣題嘉興縣前有晉妓錢塘蘇小小墓吳地記真娘真娘吳之妓人歌舞有名者死葬武邱寺前吳中少年從其志也墓多花草藪其上李公垂詩序時人比于蘇小小行客感其華麗競為詩題於墓樹吳門舉子譚詠題云虎邱山下塚纍纍松柏蕭條盡可悲何事世人偏重色真娘墓上獨題詩雲溪友儀真娘墓頭春草碧心奴頭至秋霜白就中惟有楊瓊在堪上東山伴謝公長慶集永新開元中廬陵永新縣尹氏女意曰南將軍濯之後也美姿容性敏惠不因保母而妙善歌唱重陽與羣女戯登南山文峯為同輩歌一曲聲逗數十里故俗耆舊云尹氏之歌閎于長安時刺史行部至邑召見之行進入宫封為唱歌供奉喉音妙絶為天下第一于是海内樂人及至王公貴戚共以邑名呼為尹永新後元㑹大燕含光殿盡放長安百姓及戎狄之長入觀大内時燕方酣一日戯囂劇聖情頗撓髙力士因推永新出歌纔一聲羣歎皆黙于是皇襟洞豁至夕而終今存始歌處號為玉女峯為立廟祀之江南野史洎漁陽之亂永新為一士人所得後士人卒與其母之京師意沒于風塵及卒謂其母曰阿母錢樹子倒矣樂府雜録云是許和子永新柳青娘國樂婦人有永新婦御史娘柳青娘皆一時之妙也有與御史娘詩曰天下能歌御史娘花前月底奉君王九重深處無人見獨把新聲傳順郎林花叢集宫妓永新善歌帝曰此人一曲直千金矣開元遺事嬌陳如睦州刺史柳齊物少而俊邁家富于財因調集至京師有名娼嬌陳如者姿藝俱美為士子所奔走睦州君詣之悦焉嬌陳如云第下錦帳二十里即奉事終身本易其言戯之耳翌日遂如數載錦帳以行嬌陳如驚且賞其奇特竟納入柳氏之家執僕媵之禮為中表所推𤣥宗在人間常聞嬌陳之名訪知乃召入宫涕泣稱痼疾且老上知其不可強也命之歸因話録紀聞譚乾饌子作陳嬌如薛瓊瓊薛瓊瓊開元宫中第一手清明日上令宫妓踏青狂生崔懷寶竊窺瓊瓊夜之内樂供奉楊羔潜待之羔令崔作小詞方得見薛崔作詞云平生無所願願作樂中筝得近玉人纎手子呀羅裙上放嬌聲便死也為榮羔飲懷寶以薫肌酒曰此常春草所造亦云千嵗草可令白髪變黒致長生之道崔後為河南司録瓊瓊理筝為吏所詰収赴闕明皇因以贈之麗情集楚蓮香都下名姫楚蓮香國色無雙時貴門子弟争相詣之蓮香毎出處之間則蜂蝶相隨慕其香也天寳遺事劉國容長安名妓劉國容有姿色能吟詩與進士郭昭述相愛他人莫敢窺也後昭述釋褐授天長簿遂與國容相别詰旦赴任行至咸陽國容使一女僕馳矮駒賫短書云歡寢方濃恨鷄聲之㫁愛恩情未洽歎馬足以無情使我勞心因君飡食再期後㑹以結齊眉長安子弟多諷誦焉上一枝花天寶中常州刺史滎陽公子應舉狎長安倡女李娃娃後封汧國夫人夫人舊名一枝花元禎酧白樂天代書一百韻云翰墨題名畫光隂聽話移注云樂天毎與予從遊常題名於屋壁顧復本説一枝花自寅至巳異聞集薛校書薛濤本長安良家女父鄖因官寓蜀而卒母孀養濤及笄以詩聞外又能掃眉塗粉與士族不侔客有竊與之宴語時韋中令􅆏鎮蜀召令侍酒賦詩僚佐多士為之改觀朞嵗中令議以校書郎奏請之䕶軍曰不可遂止濤出入幕府自􅆏至李徳裕凡歴事十一鎮皆以詩受知其間與濤唱和者元稹白居易牛僧孺令狐楚裴度嚴綬張籍杜牧劉禹錫吳武陵張祐餘皆名士記載凡二十人競有酧和濤僑止百花潭躬撰深紅小彩牋裁書供吟獻酧賢傑時謂之薛濤牋晩嵗居碧鷄坊剏吟詩樓偃息于上後段文昌再鎮成都太和嵗濤卒年七十三文昌為撰墓誌蜀牋譜元稹初受監察御史出使西蜀知有薛濤難得見焉嚴司空潜知其意毎遣薛往泊稹登翰林薛濤歸浣花所其浣花之人造十色彩牋於是濤别模新様作小幅松花紙多用題詩因寄獻元公百餘幅元於松花紙上寄贈一篇曰錦江滑膩岷峨秀幻出文君與薛濤言語巧偷鸚鵡舌文章分得鳯凰毛紛紛辭客多停筆箇箇公侯欲夢刀别後相思隔烟水菖蒲花發五雲髙薛嘗好種菖蒲故有是句牧䜿閑談蜀人皆呼營妓為女校書故胡曾有詩贈薛濤云萬里橋邉薛校書枇杷花下閉門居掃眉才子知多少管領春風總不如濤再為連帥所喜因事獲罪怒而逺之作十離詩以獻一曰犬離主筆離手馬離廐鸚鵡離籠鴛離巢珠離掌魚離池鷹離主竹離亭鏡離臺遂復喜焉録戒濤辯慧知詩有黎州刺史作千字文令帶魚禽鳥獸乃曰有虞陶唐濤曰佐時阿衡其人謂語中無魚鳥詐罰薛曰衡字内有小魚字使君有虞陶唐都無一魚坐客大笑唐語林髙駢鎮成都令酒佐薛濤改一字人曰須得一字象形又須遂韻公曰口有似沒粱斗濤曰川有似三條椽公曰奈何一條曲濤曰相公為西川節度使尚使一沒量斗至於窮酒佐有三條椽内一條曲又何足怪紀異録濤字洪度本長安良家子父鄭因官寓蜀濤八九嵗知聲律其父一日坐亭中指井梧示之曰庭除一古桐聳幹入雲中令濤續之應聲曰枝迎南北鳥葉送往來風父愀然久中父卒母孀居韋􅆏鎮蜀召分侍酒賦詩目入樂籍濤暮年屏居浣花溪著女冠服有詩五百首郡閣雅談按駢乾符初始節度西川去太和中已四十餘年矣疑紀異記述之誤其為校書或以為韋皋或以為嚴司空晁氏以為武元衡一人而記者懸殊若此後人何以取𠂻耶十餘詩摭言又以為薛書獻元稹事鏡湖春色元稹亷問浙東有劉採春自淮甸而來元贈詩有更有惱人腸㫁處選詞能唱望夫歌之句又醉題東武云因循未歸得不是戀鱸魚盧簡不戯曰丞相雖不為鱸魚為好鏡湖春色耳謂採春也唐詩紀事阿軟白樂天及第時贈長安妓阿軟絶句云緑水紅蓮一朶新千花萬草無顔色元集貞元末妓阿軟産一女求小名于樂天樂天曰此兒甚白晳可名之曰皎皎有文士過之見呼皎皎為什其久始寤樂天之戯蓋其種姓不明取吉詩云皎皎河漢女也善謂集髙玲瓏長慶中白居易為杭州刺史官妓髙玲瓏謝好好巧于應對善歌舞後元微之鎮㑹稽參其酧唱毎以筒竹盛詩往來唐語林崔徽崔徽蒲妓也同郡裴敬中以興元幕為梁使蒲一見為動情相從累月敬中言旋徽不得去怨抑不能自支後數月敬中宻友東川幕白知退至蒲有邱夏善寫真知退為徽致意于夏果得絶筆徽捧畫謂知退曰為妾謝敬中崔徽一旦不及卷中人徽且為郎死矣明日發狂自是移疾不復畫時形容而卒麗情集好好杜牧之張好好詩云牧佐故吏部沈公在江西幕好好年十三以善歌來樂籍中隨公移置宣城後為沈著作所納見之於洛陽東城感舊傷懷題詩以贈之本事詩灼灼灼灼錦城官妓也善舞柘枝能歌水調相府筵中與河東人坐接神通目授如舊相識自此不復面矣灼灼以軟綃帕裹紅淚宻寄河東人麗情集愛愛愛愛姓楊氏錢塘娼家女七夕泛舟西湖採荷香為金陵少年張逹所調相擕潜遁旅于京師二年餘為父捕去後或傳逹已死愛愛感念而卒其小婢曰錦兒出其故繡纈履郁然如新上東東竇鞏工為絶句嘗從軍有吊妓東東一篇芳菲羙艶不禁風未到春中先墜紅惟有側輪車上鐸耳邊常似呌東東抒情集端端崔崖張祐齊名毎題詩娼肆譽之側車馬盈門毁之則杯盤失錯嘲李端云黄昏不語不知行鼻似烟熜耳似鐺愛把象牙梳掠鬢崑崙頂上月初生端遂往見二子再請曰端端願祗候三郎六郎伏望哀之乃更贈曰覔得驊騮被繡鞍善和坊裏取端端楊州近日渾成鹺一朶能行白牡丹於是賓客競臻其户或曰李家娘子纔出墨池便登雪嶺何其一日黒白不均雲溪友議轉轉燕帥劉仁恭使幕客馬彧聘于鎮州王鎔使書記韓定辭接于公館時有妓轉轉者韓之所眷也毎當酒席彧頻目之韓曰昔晉文公公季隗于趙衰孫伯符輟小喬于公瑾蓋以名色可奉名人但慮倡姫不勝賢者顧盻願垂一詠俾得奉之彧即援筆文不停綴作轉轉之賦其文甚羙咸服其敏妙遂傳于逺近北夢𤨏言賦首云玳筵既啓雅樂斯陳霧卷羅幃花攅錦茵有西園之上客命南國之佳人貌逞嬋娟縱玉顔而傾國步移縹緲蹴羅儀以生塵彧載以歸劉崇逺耳目記首同北夢書仙長安中有娼女曹文姫尤工翰墨為闗中第一時號為書仙有任生者投之詩曰玉皇前殿掌書仙一染塵心下九天莫怪濃香薫骨膩雲衣曽惹御爐烟麗情集徐月英江淮間娼徐月英送人詩曰惆悵人間萬事違兩人同去一人歸生憎平望橋邉水忍照鴛鴦相背飛金陵徐諸公子寵一官妓死而焚之月英送葬謂徐曰此娘子平生風流沒非帶熖號羙戱也北夢𤨏言紅兒羅兒詞藻富瞻與宗人隠鄴齊名咸通乾符中時號三羅廣明庚子亂後去從鄜州李孝恭籍中有紅兒者善為音聲常為副戎屬意㑹副戎聘鄰道虬請紅兒歌而贈之繒綵孝恭以副心所盻不令受之虬怒拂衣而起詰且手刃紅兒既而思之乃作絶句百編號比紅兒詩大行於時摭言瑞卿歐陽彬在湖南日馬氏不用因而落魄街市有歌人瑞卿者慕其才延於家一日西蜀圖綱將發瑞卿遂以家財資彬隨綱吏入蜀獻獨鯉朝天賦蜀主大悦擢居清要其後官至尚書左丞相䕫州節度使五代史補韓香韓香南徐娼也色藝冠一時與大將葉氏子交閉門謝客將終身焉葉父怒投牒有司集官軍于射圃中者妻之一老卒中香欣然同歸謂曰夫婦有禮爾買羊沽酒召親故以成禮賓至酒三行香出所賫金帛高下獻之入更衣久不出自刎矣嗚呼白刃可蹈也不為非義屈歐陽公作襍傳録遍事五代之臣香雖不入襍傳節亦可尚矣隨隠謾録小東小東長沙之妓人以能詩得幸于馬氏後國入為郡窮于京師里而人絶不知言及長沙宫中事必南望泣涕而後言續侍兒小名録李艶娘蜀孟昶廣政三年上元觀燈露臺舞娼李艶娘有姿色召入宫賜其家錢十萬蜀史檮杌降真五代楚馬希範少愛娼妓徐降真及嗣立號西堂夫人十國紀事挈妓趙抃為青城宰挈散樂妓以歸為邑尉追還大痛且怒又因與妻忿争由此惑志孔氏野史清獻帥蜀日有妓戴杏花清獻喜之戱語之曰髻上杏花真有幸妓應聲曰枝頭梅子豈無媒逼晩使直宿老兵呼之幾二鼓不至復令人速之旋又令止之老兵忽自幙後出公怪問之兵曰某度相公不過一箇時辰此念息矣雖承命實未嘗往蕙畆拾英集李師師李師師京都名妓也見寵於宋徽宗而私與周邦彥羙成昵甚一日正與宴洽而報上遽至周狼狽匿床下上於坐中出新橘食之周遂潜為度曲以詠其事異日師師歌之上知而大怒出周外任師師往餞之及歸離索未解淚光尚瑩瑩也上適至因問之李不敢隠具以狀對後遂復周官云天中記卷二十
