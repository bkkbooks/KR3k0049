body:
  text: 天中記卷十四明陳耀文撰樓樓狹而修曲曰樓爾雅樓重屋也樔澤中守草樓也説文樓有户牖諸孔慺慺然也釋名十二方士有言黄帝時為五城十二樓以候神人于執期名曰迎年封禪書崑崙山有積金為天墉城上安金臺五所玉樓十二所十洲記昆侖濟南人公玉帶上黄帝時明堂圖中有一殿為複道上有樓從西南入命曰昆侖郊祀志飛翼范蠡為勾踐立飛翼樓以象天門為兩蟉繞棟以象龍角吴越春秋九柱老子廟有皇天樓九柱樓静念樓皆畫仙人雲氣瀨鄉記虞氏虞氏者梁之富人登髙樓臨大路擊搏樓上而笑有俠客相隨而行飛鳶適墜其腐鼠而中之俠客曰虞氏富樂已乆吾不侵犯乃以此辱我此無以立慬于天下遂率其屬以滅其家列説符麗譙徐無鬼見武侯曰君亦必無盛鶴列於麗譙之間無徒驥於錙壇之宫注麗譙戰樓也謂華麗而嶕嶢莊子陳勝攻陳守丞與戰譙門中師古曰樓一名譙故謂美麗之樓為麗譙漢書趙充國為塹壘木樵師古曰樵與譙同本傳初學記魏有麗譙盖即莊子中事白帖乃云魏武有麗譙樓合璧事類及韻府俱因之誤本傳井幹武帝立神明臺井幹樓高五十丈輦道相屬師古曰井幹樓積木而高為樓若井幹之形也井幹者井上木欄也郊祀志攀井幹而未半目眩轉而意迷西都賦神明崛其特起井幹疊而百層西京賦赤樓公孫述造十層赤樓也東觀漢記升樓黄昌為郡守陜縣彭氏造高樓臨道昌行縣彭氏婦人輒升高樓而觀昌乃殺之後漢落星吳嘉禾元年於桂林苑落星山起三重樓名曰落星樓金陵地記數軍實乎桂林之苑饗戎旅乎落星之樓吳都賦吳有白雀樓吳紀百尺洛陽城内西北角有重城東北角有樓其高百尺魏文帝造也洛陽雜記殷中軍廢後恨簡文曰上人著百尺樓上儋梯將去世説登樓當陽縣城樓王仲宣登之而作賦荆州記當陽東南七十里有楚昭王墓登樓則見所謂昭邱荆州圖記鳯皇洛陽有鳯皇樓總章觀儀鳯樓在觀上廣望觀之南又别有翔鳯樓又有慶雲樓伺星樓晉宫閣名四望石虎於太極殿前起樓高四十丈結珠為簾垂五色玉珮風至鏗鏘和鳴清雅盛夏之時登高樓以望四極奏金石絲竹之樂以日繼夜時方早春雜寳異香為屑使數百人於樓上吹散之名曰芳塵拾遺庾公庾亮在武昌諸佐吏殷浩等乗秋夜佳景共登高樓俄而不覺亮至衆將避之公曰老子於此興復不淺便坐談詠至今名庾公樓九江録觀名與天壤齊者有若豫章之滕王閣九江之庾樓吳興之消暑樓宣城之疊嶂此外不過更二三所而已滕宗諒上范希文詩序互見月門入漢義熈八年於石頭東城内起高樓加累入於霄漢連堞帶於積水署曰入漢樓晉書萬嵗有黄鶴山在縣界晉王恭為刺史改創西南樓名萬嵗西北名芙蓉樓至今存焉京口記俗傳此樓飛向江外以鐵鎖縻之方已輿地志又樓上時見一道白氣如烟刺史必死輕者貶州人至今為常候羊頭山記桐亭浦陽江自􅖣山東北逕太康湖車騎將軍謝𤣥田居所在右濵長江左傍連山平陵修通澄湖逺鏡於江曲起樓樓側悉是桐梓森聳可愛民居號為桐亭樓樓兩靣臨江盡升眺之趣蘆人漁子汎濫滿焉水經注景陽宋元嘉二十二年修廣華林園築景陽山始造景陽樓孝武大明元年紫雲出景陽樓狀如烟廻薄乆之詔改為紫雲樓輿地志棲霞江陵城西百餘歩有棲霞樓宋臨川康王義慶置荆州記棲霞樓俯臨通隍吐納江流水經注烽火齊武帝登烽火樓詔郡臣賦詩蕭頴胄詩合㫖帝謂頴胄曰宗室便不乏才本傳𤣥暢沈約齊隆昌元年以吏部郎出為東陽太守題八詠詩于元暢樓時號絶唱後人因更元暢為八詠樓云金華志崔顥題隠侯八詠樓詩梁守歩城東為樓望越中嚴維詩明月雙溪水清風八詠樓統志云宋郡守馮伉更此名唐書有馮伉不為郡守宋人更名嚴維安得預有此句耶青樓齊武帝興光樓上施青漆世人謂之青樓東昏曰武帝不巧何不純用琉璃本紀北固大同十年幸蘭陵因賦還舊鄉詩己酉幸京口城北固樓改名北顧因幸囘賔亭宴帝故鄉老及迎候者少長數千人各賫錢二千梁書初京城之西有别嶺入江高數十丈三靣臨水號曰北固蔡謨起樓其上以置軍實是後崩壊頂猶有小亭登降甚狹及上升之下輦歩進南徐州刺史蕭正義乃廣其路傍施欄楯翌日上幸遂通小輿上悦登望乆之敕曰此嶺不足須固守然京口實乃壯觀乃改曰北顧南史三層陶𢎞景齊永明初于句容之句曲山更築三層樓𢎞景處其上弟子居其中賔客至其下與物遂絶唯一家僮得至其所文選襄陽有文選樓金城内刺史院有高齋昭明太子於此齋造文選襄沔記隋煬帝自達廣陵嘗幸昭明文選樓車駕未至先命宫娥數千人昇樓迎侍微風東來宫娥衣被風綽直泊肩項帝觀之色荒愈熾南部烟花録統志云昭明聚賢士劉孝感庾肩吾徐防江伯操孔敬通田子悦徐陵王囿孫爍鮑至十餘人號曰高齋學士著文選於此今有臺址存南史云庾肩吾初為晉安王國常侍王毎徙鎮肩吾常隨府在雍州被命與劉孝威江伯摇田子悦徐摛孔鑠等十人抄撰衆籍號高齋學士襄沔記同志云昭明學士誤清徳後周長孫儉為荆州刺史吏民請為儉建清徳樓立碑頌徳詔許之迷樓隋煬帝至廣陵建迷樓擇下俚稚女居之使衣輕羅單裳倚檻望之勢若飛舉又爇名香於四隅煙氣霏霏常若朝霧未散謂之香霧杜牧之有咏迷樓詩云煬帝雷塘路迷蔵有舊樓誰家唱水調明月滿揚州王觀揚州賦云四帳無所兮失迷蔵之樓迷樓記云浙人項昇能搆宫室先進圖本帝大悦詔有司營之經嵗而成工巧之極自古無有帝幸之大喜顧左右曰使真仙遊其中亦當自迷也可目之曰迷樓后帝幸江都唐帝入京見迷樓曰此皆民膏血所為乃命焚之經月火不滅青瑣高議按烟花録以迷樓在江都而牧之王觀皆同劉斧乃妄搆虚詞謂在長安是地里之莫辨也其海山開河等記可盡信耶統志云樓在揚州而分注引記中語汜水孔徳紹事竇建徳為中書侍郎嘗草檄毁薄太宗賊平執登汜水樓責曰爾以檄謗我云何對曰犬吠非其主帝怒曰賊乃主耶命壯士捽殞樓下新唐望春初潼水御苑有望春樓韋堅於其下鑿為潭以通漕𤣥宗為昇樓詔羣臣臨觀賜名廣運潭本傳代宗時姚南仲上䟽云且王者必據高明燭幽隠先皇所以因龍首而建望春也本望仙上皇正在望仙樓太真同凭欄干立樓上樓前盡珠翠炫轉熒煌照天地元稹連昌宫詞觀風此時上御觀風樓水光山影相參差津陽門詩樓在宫外東北隅屬夾城而連於内前臨馳道周視山川注紅樓安國寺紅樓睿宗在東宫時造元和中廣宣上人住此上有詩名時號為紅樓集酉陽雜俎望省崔日知厯職中外恨不居八座及為太常卿於都寺㕔事後起一樓與尚書省相望時人謂之崔公望省樓國史纂異望京浚儀城西門樓本無名唐文宗太和二年節度使令狐綯重修因登臨賦詩曰夷門一鎮五經秋未得朝天未免愁因上此樓望京國便名樓作望京樓寰宇記祈祥劉闢為西川節度使以術家言五福大一舎於蜀乃造大樓以祈祥新唐萬巻田𢎞正性忠孝好功名起樓聚書萬餘卷通春秋左氏與賔屬講論終日本傳明月吳興刺史楊傑次公明月樓詩云江南地煖少嚴風九月炎凉正得中溪上玉樓樓上月清光合作水晶宫吳興因此謂之水晶宫方輿勝覽海棠海棠樓李囘出為劍南西川節度使於成都建海棠樓以會僚佐鄭谷詩上國休誇紅艶杏深溪自照緑苔磯一枝低帶流鶯睡數片猶如舞蝶飛迎仙髙駢於府第别建道院院有迎仙樓延和閣髙八十尺飾以珠璣金鈿侍女數百皆羽衣霓服和聲度曲擬之鈞天日與吕用之高守一三人授道家法籙談論於其間賔佐罕見其靣舊唐用之以神仙好樓居請駢公廨邸北跨河為迎仙樓其斤斧之聲晝夜不絶費數萬緍半嵗方就自成至敗竟不一遊扄鐍儼然以至灰燼妖亂志齊雲昭宗乾寧三年鳯翔李茂貞欲搆難犯於神京上欲幸太原行止渭北華州韓建迎歸郡中上鬱鬱不樂時登城西齊雲眺望明年秋製菩薩蠻詞二首中朝故亊百尺唐主於宫中作百尺樓命衆臣觀之衆皆嘆美蕭儼曰恨樓下無井耳唐主問其故對曰所以不及景陽樓唐主怒貶於舒州續世説木平和尚者南唐保太初徴在闕下常出入禁中他日從上登百尺樓上曰新建此樓制度佳否木平曰尤宜望火上初不喻其㫖居數載木平卒淮甸大擾自夀陽置烽候以應龍安山旦夕上多登覽以瞻動静南唐書紅樓王蜀先主所建綵繪華侈初潁川人華洪隨先主入蜀賜姓王名宗侃至是造紅樓城中相率來觀曰看畫紅樓先主以為應華洪之䜟乃誅之成都古今記玳瑁西魏文帝毁東宫造嬪嬙諸院起玳瑁樓散花唐成都有散花樓河東有薫風樓披雲北齊有披雲樓隋有乗雲樓浴日上陽宫有麗春臺浴日樓韋述兩京雜記凌雲三十六國有凌霄樓玉海觀風此時新搆觀風樓樓高百尺堆華榱樓南更起聞雞殿神光山影相參差津陽門詩朝日六朝有朝日樓夕月樓玉海萬嵗北齊有萬嵗樓千秋樓逍遥蒲州有逍遥樓唐𤣥宗登樓詩云黄河分地絡飛觀接天津蘇頲和云樓觀分迤邐河山㡬縈紆文苑英華北齊有逍遥樓玉海鴛鴦孫逖奉和御製登鴛鴦樓應制詩云玉輦下離宫瓊樓上半􅆰英莘北齊有鴛鴦樓鸚鵡樓玉海翡翠崔湜梨園亭子侍宴應制詩云草緑鴛鴦殿花明翡翠樓英華翡翠為樓金作梯誰人獨宿倚門啼李太白七重西域泥婆羅宫中有七重樓覆銅瓦楹棟皆大琲雜寳四隅置銅槽下有金龍口激水仰注槽中七鳯于闐有七鳯樓五代史欄干堕和羅屬國曰陀洹一云耨陀洹俗喜樓居謂為欄干唐書外夷傳臨肆李晦為雍州長史私第有樓下臨酒肆其人嘗候晦言曰微賤之人雖則禮所不及然家有長幼不欲外人窺之家逼明公之樓出入非便請從此辭晦即日毁其樓談賔録唐書初晦第起觀閣下臨肆區看街李景讓為御史大夫大臣貴戚有看街樓閣皆泥之畏其紏彈也金華子閣阿閣黄帝時鳯凰集東園止於阿閣韓詩外傳扈閣黄帝坐於扈閣鳯凰銜書致帝前其中得五始之文春秋緯黄帝坐元扈樓上與大司馬容光臨觀鳯凰之至河圖録運法凌雲凌雲閣秦二世造漢宫閣疏秦二世起雲閣欲與山齊三輔故事秦結雲閣冠南山東京賦乗雲閣而上下甘泉賦石渠石渠閣蕭何造其下礲石為渠以導水若今御溝因為閣名所蔵入關所得秦之圖籍至於成帝又於此蔵秘書焉三輔黄圖韋元成甘露中受詔與太子太傅蕭望之及五經諸儒雜論同異於石渠閣條奏以對上親制臨决傳葛龔考天文於蘭閣覽羣言於石渠反遂初賦天祿天祿麒麟蕭何造以蔵秘書處賢才漢宫閣䟽天祿石渠並在未央大殿北以蔵秘書三輔故亊天祿石渠典籍之府西都賦校文之處西京賦天祿閣蔵典籍之所三輔黄圖劉向於成帝之末校書天祿閣專精覃思夜有老人着黄衣植青藜杖登閣而進見向暗中獨坐誦書老父乃吹杖端煙燃因以見向説開闢已前向因受五行洪範之文恐辭説繁廣忘之乃裂裳及紳以記其言至曙而去向請問姓名云我是太乙之精天帝聞金夘之子有博學者下而觀焉乃出懐中竹牒有天文地圖之書余畧授子焉至向子歆從向授其術向亦不悟此人焉拾遺記哀帝命子歆嗣父之業乃徙温室中書于天祿閣上歆遂總羣篇撮指要著七畧大凡三萬三千九十卷隋經籍志王莽以符命自立時楊雄校書於天祿閣上治獄使者欲收雄雄從閣上自投下幾死莽聞之曰雄素不與事有詔勿問然京師為之語曰惟寂寞自投閣爰清静作符命漢書麒麟天䘵麒麟閣蕭何造以蔵秘書畫賢臣漢宫殿疏宣帝甘露三年二月單于始入朝上思股肱之美乃圖霍光等至蘇武凡十一人於麒麟閣明著中興輔佐列於方叔召虎仲山甫焉蘇武傳白虎未央宫有白虎閣屬車閣三輔黄圖延閣孝武建蔵書之䇿置寫書之官注如淳曰劉歆七畧曰外則有太常太史博士之職内則有延閣廣内秘室之府藝文志延閣棧道淮南子結陽城之延閣蜀都賦西閣楊惲觀西閣上畫人指桀紂畫謂樂昌侯王武曰天子過此一二問其過可以得師矣本傳阿閣馬嚴顯宗時拜將軍長史將敕嚴過武庫祭蚩尤帝親御阿閣觀其士衆時人榮之馬援傳周書曰明堂咸有四阿然則閣有四阿謂之阿閣文選注四阿若今四注屋古詩阿閣三重階周禮注仁夀明章重儒術四方鉅儒鴻生負笈自逺而至者不可勝算石室蘭臺彌以充積於東觀及仁夀閣集新書校書班固傅毅等典掌焉並依七畧為書部因又編為漢藝文志三閣魏氏采掇遺亡蔵在秘書中外三閣隋經籍志魏鄭黙拜秘書郎中掌中外三閣刪省繁文除其浮穢始制中經本傳陸機表云身登三閣注謂秘書郎掌内外三閣經書也晉令曰秘書郎掌三閣經書文選秘閣孝武帝好覽文藝敕著作郎徐廣科秘閣四部見書凡三萬六千卷續晉陽秋陸士衡詩升降秘閣注即尚書省也又曰絜身躋秘閣注秘書省亦為秘閣文選麟趾興和三年詔羣臣於麟趾閣議定新制謂之麟趾格北史封隆之參議麟趾閣新制上凌煙大極宫中有凌煙閣在凝隂殿内功臣閣在凌煙閣南頡利既平置酒于此韋述兩京記貞觀十七年二月二十八日詔曰自古皇王褒崇勲徳既勒名于鍾鼎又圖形于丹青是以甘露良佐麟閣著其美建武功臣雲臺紀其跡長孫無忌等二十四人宜酌故實並圖畫凌煙閣庶念切之懐無謝於前載旌賁之義永貽於後昆㑹要河間元王叚志元碑並云圖形戢武閣意凌煙先名戢武後改之爾金石録翔鸞棲鳯大明宫中丹鳯門内正殿曰含元殿夾殿兩閣左曰翔鸞右曰棲鳯閣下即朝堂肺石登聞皷唐六典凝暉李淳風上渾天儀皆用銅帝稱善令置於凝暉閣天文志朝元元宗幸温泉宫登朝元閣賦詩舊史天寳初元宗嘗登朝元閣賦詩近臣屬和帝以席豫詩最工因詔曰詩人冠冕也本傳元宗幸驪山登朝元閣命羣臣賦詩正字劉飛詩最清拔特蒙激賞聞見記神之本以朝為大乾之徳以元為髙孫翊仁賦儀仙起草儀仙閣宋之問詩滕王滕王者唐髙祖之子武徳中出為洪州刺史喜山水酷愛蝴蝶尤攻書妙音律暇日乗青雀舸遊江漢自選芳渚基址不大高低得宜逺瞰湘雲近枕漢水仍便以王而名閣焉閣記韓愈少時嘗聞江南多登臨之美而滕王閣獨為第一有瓌瑋絶特之稱閣記四香楊國忠用沉香為閣檀香為闌檻麝香乳香篩土為泥飾謂之四香閣春時芍藥盛開聚賔友于閣上禁中沉香亭不侔此壯麗也天寳遺亊含薫王元寳起高樓以銀鏤三稜屛風代籬落密置香于水槽香自花鏤中出號含薫閣清異録延和髙駢起延和閣於大㕔之西凡七間高八丈皆飾以珠玉綺窻繡户殆非人工每旦焚名香列異寳以祈王母之降及畢師鐸亂人有登之者於藻井垂蓮之上見二十八字云延和髙閣上干雲小語猶疑太一聞燒盡降真無一事開門迎得畢將軍此近詩祅也妖亂志天册馬氏霸湖南末年天冊閣為天火焚朗州寺此夜聞空中呵喝言􅂞避天冊閣來也雲中騰沸若千萬人舁荷重物然累日方潭州大矣宋高僧傳昇元開元九年江寧縣瓦棺寺閣西南乆傾因風自正吳順義中改寺為昇元寺閣為昇元閣龔穎運厯圖康仁傑以陳徳誠薦至金陵會羣公旬沐宴昇元閣仁傑造席和登閣詩有雲散便凝千里望日斜長占半城隂之句座皆大驚南唐書南唐書云昇元閣因山為基高可十丈平思閣影半江開寳中王師收復士大夫暨豪民富商之家美女少婦避難于其上迨數千人呉越兵舉火焚之哭聲動天一旦而燼金陵志天佑施功宰相栁璨奏西京舊有凌煙閣圖畫國初功臣今遷幸東都尚未崇建四鎮副元帥梁王勲業冠古請近凌煙閣别創一閣圖畫梁王以旌徳業詔曰魏賞彭陽之功别創紀勲之觀齊旌泗水之績乃崇嘉徳之樓式示新規爰從舊典宜令所司於皇城擇善地别造凌煙閣圖寫賜名曰天佑施功之閣五代史乗風觀雲臺高閣十四間乗風觀閣十二間洛陽地記臨波紫微宫有臨波閣閶闔閣東京記飛閣周廬千列徼道綺錯輦路經營蘭除飛閣張平子西都賦云閶門何峨峨飛閣跨通波陸機樂府詩飛閣纓紅帶閤閤閤門傍户也説文小閨謂之閤爾雅東閤公孫𢎞開東閤以延賢人注師古曰閤小門也東向開之避當門引賔客以别於掾史官屬本傳公孫𢎞至丞相開東閤延賢人與謀議朝覲奏事因言國家便宜上令助等與大臣辨論中外相應以義理之文嚴助傳薛宣謂朱雲曰留我東閤可以觀四方竒士雲傳黄閤太尉公有黄閤主簿録省衆事讀志三公黄閤前此無其義禮記士韠與天子同公侯大夫則異鄭元注云士賤與君同不嫌也夫朱門洞開當陽之正色也三公之與天子禮秩相亞故黄其閣以示謙漢舊制也宋志陳三公之制開黄閤聼事置鴟吻北齊三公府三門當中門黄閤設内屛黄閤主簿掌閤下威儀通典張超與陳公箋云拜黄閤將有日月省閤楊賜拜太尉中平元年被召㑹議詣省閤切諌後傳金光洛陽宫有金光閤青陽閤承休閤朱明閤安樂閤白蔵閤顯仁閤崇明閤章徳閤飛雲閤安世閤長安閤長安有東明閤西華閤紫闥閤晉宫閤名上閤崔光乗歩挽至東西上閤後魏書北齊有西上閤通典宣政之左曰東上閤右曰西上閤六典朱華隋姚察授秘書丞敕於朱華閤長參宣光李適擢修文館學士睿宗時待詔宣光閤本傳闕闕闕在門兩旁中間闕然為道也釋名闕缺也門兩邉缺然為道也廣志闕觀也古毎門樹兩觀宇其前所以標表宫門也其上可居登之則可逺觀故謂之觀人臣將朝至此則思其所闕故謂之闕其上皆畫雲氣仙靈竒禽恠獸以示四方蒼龍白虎𤣥武朱雀並畫其形崔豹古今注象魏大宰正月之吉始和懸治象之法于象魏注鄭司農云闕也䟽周公謂之象魏雉門之外兩觀闕高巍巍然周禮治之見於象者為治象書治象之法者為象魏兩觀之垂治象者為魏闕易氏其上垂法象巍巍髙大謂之象魏使人觀之謂之觀左莊二十一正義舊章魯司鐸火季桓子至御公立于象魏之外命救火者傷人則止財可為也命蔵象魏曰舊章不可亡也哀三過闕下車衛靈公與夫人夜坐聞有車聲轔轔至闕而息過闕復有聲公問夫人曰知此為誰夫人曰此蘧伯玉也公曰何以知之夫人曰妾聞禮下公門軾路馬今蘧伯玉賢者也必不以暗昧廢節公令人視之果如所言列女傳魏闕中山公子牟謂瞻子曰身在江海之上心居乎魏闕之下奈何瞻子曰重生重生則利輕中山公子牟曰雖知之未能勝也瞻子曰不能自勝則從神無惡乎不能自勝而强不從者此之謂重傷之人無夀類矣莊子讓王冀闕秦孝公築冀闕臨渭水在咸陽西四十里史記水經東門東海郡胊縣始皇立石海上以為東門闕漢地理志東北闕蕭何造未央宫立東闕北闕高紀闗中記曰未央宫東有蒼龍闕北有元武闕史記注東闕名蒼龍北闕名元武秦舊空皆在渭北立東北闕取其便也索隠鳯凰闕建章宫東起别風闕高二十五丈乗高以望逺又於宫門北起圓闕髙二十五丈上有銅鳯凰赤眉賊壊之西京賦云圓闕聳以造天若雙碣之相望是也舊事鳯凰闕漢武帝造髙七十丈五尺鳯凰闕一名别風闕廟記長安民俗為鳯凰闕為貞女樓楊震關輔古語闕上有金鳯髙丈餘黄圖注栢梁臺有桐鳯因名鳯闕三秦記嶕嶢嶕嶢闕在圓闕門内二百歩廟記閶闔之内别風嶕嶢西京賦正紫宫於未央表嶢闕於閶闔上過闕下車萬石君過宫門闕必下車趨漢書陵霄陵霄闕始建有鵲巢其上帝以問髙堂隆魏志天闕孫氏無闕大晉南都亦不暇立門闕遂廢臧榮緒晉書大興中議者皆言漢司徒義興許彧墓二闕髙壯可徙施之王茂𢎞弗欲後陪乗出宣陽門南望牛頭山兩峯即曰此天闕也豈煩改作帝從之今出宣陽望此山良似闕丹陽記博望孝武太明七年博望梁山立雙闕宋書石闕天監七年正月戊戌作神龍仁獸闕於端門大司馬門外梁紀詔曰昔孫氏青盖南移日不暇給而兩觀莫築懸法無所今禮盛化光役務簡便可營建象闕以表舊章於是選匠量功鐫石為闕窮極壯麗冠絶古今竒禽異羽莫不畢備劉璠梁典闕成朝士銘之時陸倕字佐公其文甚佳士流推服侯景作亂焚燒宗廟城郭府寺百無一存尋髙麗等國入貢見其凋殘遂哭於闕下六朝事迹陸倕序曰象闕之制其來已逺春秋設舊章之教禮經垂布憲之文戴記顯㳺觀之言周史書樹闕之夢北荒明月西極流精海市黄金何庭紫貝蒼龍𤣥武之製銅一作神爵鐵鳯之工或以聼窮省寃或以布化懸法或以表正王居或以光崇帝里又曰晉假天闕於牛頭宋託逺圖於博望有欺耳目無補憲章乃命審曲直之官選明中之士陳圭置臬瞻星揆地趨以表敬觀而知法物覩雙碣之容民識百重之典銘曰布教方顯浹日初輝色法上圓制模下矩前賔四㑹却背九房北通二轍南凑五方選武帝雅好辭賦獻文章於南闕者相望奉敕與陸倕各製新闕銘袁峻傳石金東南有石井其方百丈上有二石闕在東南靣上有罇熊有榜着闕題曰地户西北荒中有二金闕髙百丈金闕銀盤圓五十丈二闕相去百丈上有明月珠徑三丈光照千里中有金階西北入兩闕中名天門神異經互見天門流精崑崙山有三角一正東有墉城金臺玉樓相鮮有流精之闕西王母所治也十洲記崑崙山第九層山形漸狹小下有芝田􅈍圃皆數百頃羣仙種耨焉傍有瑶臺一二各廣千歩皆五色玉為臺基最下層有流精闕直上四十丈東有風雲雨師闕拾遺記黄金蓬萊方丈瀛洲此三山在海中諸仙人不死藥皆在焉黄金白銀為宫闕漢書紫貝魚鱗屋兮龍堂紫貝闕兮珠宫楚辭王逸曰言河伯所居以貝作闕也華闕樹中天之華闕豐冠山之朱堂徐都賦崇闕豐屋廣夏崇闕百里徐幹七喻朱闕崇墉岡連以嶺屬朱闕巖巖以雙立魯靈光殿賦青闕流雲藹青闕皓月鑒丹宫顔延年直東宫詩伊闕昔大禹䟽以通水兩山相對望之若闕伊水歴其間北流故謂之伊闕矣春秋之闕塞焉昭公二十六年趙鞅使女寛守闕塞是也陸機云洛有四闕斯其一焉東巖西嶺並鐫石開軒髙甍架峯西側靈巖下泉流東注入于伊水傅毅洛都賦曰因龍門以暢化開伊闕以達聰水經神闕南康縣歸義山去縣七百里下有石城髙數丈逺望嵯峨靈闕騰空故老謂之神闕鄧徳明南康記桂蒲䍧牱郡有桂蒲闕漢書雙闕長安城西有雙闕上有雙銅雀一鳴五榖豐再鳴五榖熟古歌百常表以百常之闕圜以萬雉之城七命建此百常興兹雙起陸倕石闕銘熛闕左欃槍而右𤣥㝠兮前熛闕而後應門甘泉賦觀上蘭校獵上蘭元后傳望舒彌轡翼乎徐至於上蘭羽賦獵陳虎旅於飛亷正壘壁乎上蘭西京賦上林有上蘭觀黄圖鳷鵲蹷石闗歴封巒過鳷鵲望露寒注張揖曰此四觀建元中作在雲陽甘泉宫外上林賦建元中作石闗封巒鳷鵲觀黄圖楊雄云近則有洪涯儲胥逺則有石闗封巒鳷鵲露寒棠梨等觀又有髙華白虎温徳相思觀史記正義雲陽宫記云宫東北有石門山岡巒糾紛干霄秀出有石巖容數百人上起甘泉觀甘泉賦云封巒石闕弭迤乎延屬黄圖龍臺上林賦登龍臺掩細栁注皆觀名三輔故事曰龍臺髙六丈漢時龍見陂中故作此臺豫章集乎豫章之宇注館名黄圖曰上林有豫章觀武帝造在昆明池中亦曰昆明觀西都賦大修昆明池列觀環之史平凖書昔豫章之名宇披元池而特起儀景星於天漢列牛女以雙峙西征賦屬玉甘露二年十二月行幸萯陽宫屬玉觀注晉灼曰屬玉水鳥似鵁鶄以名觀也應邵曰宫在鄠秦昭王起宣紀天子乃登屬玉之館厯長楊之榭西都賦平樂東方朔有平樂觀賦本傳明帝至長安迎取飛廉并銅馬置上西門平樂觀華嶠後漢書靈帝時青徐黄巾復起帝自稱無上將軍燿兵於平樂觀紀東觀和帝永元十三年正月帝幸東觀覽書林閲篇籍博選藝術之士以充其官注陸機洛陽記曰在南宫髙闕十二間介於承風觀紀竇章少好學有文章與馬融崔爰同好更相推薦永初中學者稱東觀為老氏蔵室道家蓬萊山大僕鄧康薦章入東觀為校書郎注老子為守蔵史復為柱下史四方所記文書皆歸柱下言東漢經籍多也蓬萊海中神山為仙府幽經秘籙並皆在焉本傳黄香元和元年肅宗詔詣東觀讀未見書文苑南宫有東觀漢氏圖籍所在有石渠石室延閣廣内蓄之於外府又有御史掌蘭臺秘書及麒麟天祿二閣蔵之於内禁成帝延熹二年始置秘書監官掌典書古今文字考古今同異屬太常洛陽宫殿名髙彪舉考亷為郎中校書東觀因事諷諫數奏賦頌竒文靈帝詔東觀畫彪像以勸學者文苑陽球奏罷鴻都文學曰今太學東觀足以講明聖化願罷鴻都之選以塞天下之謗酷吏東觀儒林之府當講校文藝處定疑難漢時皆名學碩儒乃任其職吳華覈傳後漢東觀蔵書之府亦著作之所當時文學之士使校讎其中故有校書之職唐百官志漢東京圖書悉在東觀多使名儒碩學入直東觀撰述國史謂之著作東觀通典白虎建初四年十一月壬戌詔下太常將大夫博士議郎郎官及諸生諸儒會白虎觀講論五經同異使五官中郎將魏應承制問侍中淳于恭奏帝親稱制臨決如孝宣甘露石渠故事作白虎議奏章紀白虎門名於門立觀因以名焉才鴻傳注孝宣會諸儒于石渠元帝集學士於白虎蔡邕封事長樂靈帝時京兆第五永為督軍御史使督幽州百官大會祖餞於長樂觀議郎蔡邕等皆賦詩彪獨作箴髙彪鼎中洛陽南宫有承風觀北宫有増喜觀城外有宣陽觀千秋鴻地泉城揚威石樓等觀城外有鼎中觀洛陽地記洛陽西南洛水上有鼎中觀是成王定鼎處輿地志迎風閒宫顯敞雲屋皓旰崇景山之髙基迎清風而立觀七啟迎風觀在鄴地理志總章明帝青龍三年大治洛陽宫築總章觀髙十餘丈建翔鳯於上四年四月置崇文觀召善屬文者充之魏志恊律總章之司厚倫正俗崇文成均之職導徳齊禮王元長曲水詩序白爵太子孫和被廢驃騎將軍朱據尚書僕射屈晃率將吏泥頭詣闕請和權登白爵觀見甚惡之吳志鄷明劉曜立大學於長樂宫東簡百姓年二十五以下十三已上五百人選朝賢宿儒明經篤學以教之命起鄷明觀於西宫起凌煙臺於滈池晉載記崇明劉聰時平陽地震崇明觀為池水赤如血赤氣至天赤龍奮迅而去後魏匈奴傳戲馬石虎起靈臺九殿女官十有八等又女妓二千為鹵簿皆着紫綸巾蜀錦袴金銀鏤帶五紋織成靴遊於戲馬觀輿地志凌霄太子宣出時石季龍於其後宫升凌霄觀望之笑曰我家父子如是自非天崩地䧟當復何愁但抱子㺯孫日為樂耳晉載記賔遐張駿境内漸平使其將楊宣率衆越流沙伐龜兹鄯善於是西域並降鄯善王元孟獻女號曰美人立賔遐觀以處之本傳通天晉孝武帝講孝經於通天觀僕射謝安侍座尚書陸納侍講黄門侍郎謝石吏部侍郎袁宏執經丹陽尹王緄讀句論者榮之志通天觀在舊臺城内宋元嘉中築二十三年更修廣之造景陽樓大壯觀又立鳯光殿醴泉堂建業宫有迎風觀宋大明年起建康宫闕簿揔明明帝泰始六年九月戊寅立揔明觀召學士以充之置東觀祭酒訪舉各一人學生二十人分為儒道文史隂陽五部學言隂陽者遂無其人南史王諶領東觀祭酒即明帝所置揔明觀也齊傳臨滄丹陽秣陵縣新亭隴有逺望樓又名勞勞樓宋改為臨滄觀行人分别之所輿地志一柱劉宋臨川王義慶在鎮于羅公洲立觀甚大而惟一柱渚宫故事經從一柱觀出入三休臺梁劉孝綽詩孤城一柱觀落日九江秋杜甫詩東京紫微宫有一柱觀唐韋述東京雜記商颷商颷觀在東北十三里籬門亭後亭墩上齊武帝築九日登以晏羣臣建康宫闕簿明月丹陽郡建康縣臺城齊文恵太子治𤣥圃有明月觀婉轉橋徘徊廊圃内作净名精舎輿地志東明髙祖太和十五年五月議改律令於東明觀親折疑獄後魏書崇文周明帝尚學藝内有崇文之觀外重成均之職握素懷鈆重席之士間出於朝廷員冠方領執經一作疑之士著録於京邑北史齊雲陳後主令采木湘洲擬造正寢栰至牛渚磯盡而沒既而漁人見栰於海上復起齊雲觀國人歌曰齊雲觀冦來無際畔本紀紫雲乾封元年正月丁丑兖州置紫雲僊鶴萬嵗三觀封巒非煙重輪三寺舊紀望僊武宗會昌三年夏五月作望僊觀于禁中紀玉晨玉晨觀在紫宸殿後元稹集髙唐昔者楚襄王與宋玉遊於雲夢之臺望髙唐之觀宋玉賦祈年既表祈年觀復立望仙宫沈休文詩九觀宫中有臨髙陵雲宣曲廣望閬風萬世修齡總章聴訟凡九觀皆髙十六七丈雲母窻日曜之有光洛陽記逸客蜀城有逸客觀華陽國志客觀南嶺東岩北靣有二小山一山有雙石竪立號曰石門一山孤崖特秀上有客觀陟之者逺眺千里華山記𤣥珠楊子縣有楊子宫宫中有𤣥珠觀揚州記上清上陽宫有上清觀東京雜記翠觀髙聳南嶺秀出中天翠觀岑青彫閣霞連七命髙昌碣以髙昌崇觀表以建城峻廬岧嶤岑立崔巍巒居何平叔賦北看髙昌邪睨建城韋仲將景福殿賦臨春北齊有臨春觀望秋觀庭庭堂下至門謂之庭玉海明庭黄帝接萬靈明庭明庭者甘泉也漢郊祀志總街湯有總街之庭管子少庭周王二十三祀庚子朔九州之候咸格于周王在鄷昧爽立于少庭周書鄷保解承明承明金馬著作之庭西都賦殊庭太初元年十二月甲子朔上親禪髙里祠后土臨勃海將㠯望祀蓬萊之屬幾至殊庭焉注師古曰殊庭蓬萊中仙人庭也郊祀志商中作建章宫其西則商中數十里如淳曰商中商庭也師古曰商金也於序在秋故謂西方之庭為商庭上堂堂古者為堂自半已前虚之謂堂半已後實之為室堂者當也謂當正向陽之屋玉海九尺禮有以髙為貴者天子之堂九尺諸侯七尺大夫五尺士三尺禮器九雉天子堂九雉諸侯七雉伯子男五雉尚書大傳縉雲永康縣縉雲堂黄帝錬丹處宋永初古今山川記堯舜堂王者之堂墨子稱堯舜堂髙三尺儒家以為卑下假使之然髙三尺之堂蓂莢生於階下須臨堂察之乃知莢數夫起視堂下之莢孰與懸日厯於扆坐顧輙見之論衡學堂王屋縣有孔子學堂西南七里有石室臨大河水勢湍急五里之間寂無水聲如似聴義郡國志講堂齊桓公宫城西門外有講堂齊宣王立此學也故稱為稷下學莒子如齊盟于稷門此也上臨淄城西門外有古講堂其柱猶存齊宣王修文學處也齊地記通雲海人獻龍膏為燈於燕昭王王坐通雲之堂具燈拾遺記黄堂雞陂之側即春申君子為假君之殿也後太守居之以數失火故塗以雌黄遂名黄堂郡國志遺芬漢武息於延凉室卧夢李夫人授帝蘅蕪之香帝驚起而香氣猶着衣枕厯月不歇帝彌思涕乃改延凉室為遺芬夢堂拾遺記延清董偃常卧延清之堂設火齊屛風上玉堂文翁立講堂作石室一曰玉堂在城南初堂遇火太守更修立又増二石室華陽國志文翁學堂在城南益州記萬金靈帝起四百尺觀於阿亭道造萬金堂於西園又造南宫玉堂築廣城苑承明袁紹抽戈承明注山陽公載記曰紹等入端門遂於承明堂上格殺中常侍髙望等二人本傳愧賢劉聰嘉平三年廷尉陳元達極諌聰怒將斬之聰時幸逍遥園李中堂元達抱堂下樹呌曰臣所言者社稷之計聰免之於是易李中堂為愧賢堂和苞趙漢記靖恭李暠於南門外臨水起堂名曰靖恭堂以議朝政閲武事堂成圖讃自古明王忠臣孝子貞女暠自為序以明鑒戒文武羣寮亦皆圖焉是月白雀翔于靖恭暠頌之三十國春秋聖夀聖夀堂石虎造垂玉佩八百大小鏡二萬枚丁香末為泥油瓦四靣垂金鈴一萬枚去鄴三十里羊頭山記清徽孝文南征還洛引見王公侍臣於清徽堂帝曰此堂成來未與王公行宴樂之禮今與諸賢欲無髙而不升無深而不入因之流化渠洗煩池次之凝閒堂帝曰此堂取夫于閒居之義不可縱奢以忘儉自安以忘危故於堂後作茅茨堂謂李冲曰此東曰歩元廡西曰㳺凱廡此座雖無堯舜之君卿當無愧元凱冲對曰臣既遭唐堯之君不敢辭元凱之譽髙祖曰光景垂落朕同宗則有載考之義卿等將出無逺何得黙爾徳音即命黄門郎崔光鄴郭雅邢巒崔林等賦詩言志燭至公卿辭髙祖曰在夜載考宗族之義卿等且還朕與諸王宗室欲成此夜飲魏書又詔延四廟之子下逮元孫之胄申宗宴於皇信堂令宗室賦詩又會百寮於宣極堂行飲至策勲之禮上太和十九年十二月甲子見羣臣光極堂紀苗􅗔奈林南有石碑一所魏明帝所立也題云苗􅗔之碑髙祖於碑北作苗􅗔堂永安中年莊帝馬射於華林園百官皆來讀碑疑苗字誤國子博士李同軌曰魏明英才世稱三祖公幹等為其羽翼但未知本意如何不得言誤也楊衒之時為奉朝請因即釋曰以蒿覆之故言苖􅗔何誤之有衆咸稱善以為得其㫖歸洛陽伽藍記水經云魏文帝茅􅗔堂前有茅􅗔碑是黄初中所立也按衒之魏人親釋苗􅗔之義道元謂黄初所立誤玉海因之書於漢晉之間亦誤矣儀賢梁天監六年九月乙亥改閲武堂為徳陽堂聴訟堂為儀賢堂紀水堂齊文襄於鄴東起山池㳺觀時俗眩之孝瑜遂於第作水堂龍舟植幡矟於舟上數集諸弟宴射為樂武成幸其第見而悦之故盛興後園之翫於是貴賤慕斆處處營造北齊徙堂若干恵事母以孝聞周文帝造射堂新成與諸將晏射恵竊歎曰親老矣何時辦此乎周文聞之即日徙堂於恵宅北史流霞上元夫人言西王母有六甲之術用之可以逰景雲之宫登流霞之堂漢武内傳光碧崑崙山有光碧之堂西王母所居十洲記流杯馬泉每年刺史三月上旬於此泉起曲水流杯堂引泉水為袚褉之所臨時搆造事竟毁除其流杯堂本在壘城西襄沔記合歡八姨新起合歡堂翔鴻賀燕無由窺萬金酬工不肯去矜能恃巧猶嗟咨鄭嵎津陽門詩虢國夫人即貴妃姊也創一堂價費萬金堂成工人徴價之外更邀賞伎之直復受絳羅五千段工者嗤而不顧虢國訝之問其由工曰某生平之能殫於此矣苟不知信願將螻蟻蜥蜴蜂蠆之類數其目而投於堂中使有閒隙得入一物即不論工直也於是又以繒綵珍綺與之天下佳人至今語古事者尚以第行呼諸姨焉注虢國中堂既成召匠汙鏝授二百萬償其值復以金盆二瑟瑟三斗為賞後曽有暴風拔樹委其堂上已而視之畧無所傷既撤瓦以觀之皆乗以木瓦其制作精緻皆此類也明皇雜録月堂李林甫於正堂後别創一堂製度彎曲有却月之形名曰月堂木土秀麗精巧當時莫儔也林甫毎欲破滅人家即入月堂精思極慮喜悦而出必不存焉傳信記芸輝元載造芸輝堂於第芸輝香草名也出于闐國其香潔白如玉入土不朽爛舂之為屑以塗其壁故號芸輝而更以沉香為梁棟金銀為户牖杜陽編緑野裴度時閹竪擅威天子擁虚器搢紳道䘮度不復有經濟意乃治第東都集賢里午橋作别墅具燠館凉臺號綠野堂激波其下度野服蕭散與白居易劉禹錫為文章把酒窮晝夜相歡不問人間事本傳徳星崔鄲貝州武城人崔氏四世緦麻同爨兄弟六人至三品邠郾鄲凡為禮部五吏部再唐興無有也居光徳里架便齋宣宗聞而歎曰鄲一門孝友可為士族法因題曰徳星堂後京兆民即其里為徳星社本傳鏡堂顧彦暉為東川節度使梓州有鏡堂世稱其麗彦暉嘗㑹諸將堂上唐書逺百里堂上逺於百里門庭逺於萬里今歩者一日百里之情通堂上有事十日而君不聞歩者十日千里之情通堂下有事一月而君不聞歩者百日萬里之情通門庭有事期年而君不聞此謂逺於萬里也管子滿堂飲聖人於天下譬如一堂之上也今有滿堂飲酒者一人獨纍然向隅而泣則一堂之人皆不樂矣説苑則百洛陽宫有則百堂螽斯堂休徴堂延祿堂仁夀堂綏福堂含芳堂樂日堂椒華堂芳音堂顯成堂承光堂五福堂嘉寧堂堯母堂永光堂長夀堂晉宫閣名承慶堂昌福堂徽音堂嘉徳堂宫殿簿虚徳堂修成堂宫地記湛露三十六國有琨華堂湛露堂後魏有雲母堂九華堂六朝有芳香堂芙蓉堂貞華堂隋有紫霄堂玉華堂延祥襲慶堂芳音堂懐芳堂璧月堂流風崇蘭堂麗景堂鮮雲堂谿堂馬摠為鄆曹濮節度觀察使為堂於其居之西北隅號曰谿堂以饗士大夫通上下之志既饗其從事陳曽乃使來請詩曰公作谿堂四通流水淺有蒲蓮深有蒹葦公以賔燕其鼓駭駭公燕谿堂賔校醉飽流有跳魚岸有集鳥谿有薲苽有龜有魚公在中流右詩左書韓集宅宅宅擇也言擇所處而營之也釋名宅人所託也説文宅亦曰第言有甲乙之次第也一曰出不由里門靣大道者名曰第爵雖列侯食邑不滿萬户不得作第其舎在里中皆不稱第初學記斵礱趙文子為室斵其椽而礱之張老夕焉而見之曰天子之室斵其椽而礱之加密石焉諸侯礱之大夫斵之士首之備其物義也從其等禮也今子貴而忘義富而忘禮吾懼不免文子歸令之勿礱也匠人請皆斵之文子曰止為後世之見之也其斵者仁者之為也其礱者不仁者之為也晉語輪奐晉獻文子成室晉大夫發焉張老曰美哉輪焉美哉奐焉歌於斯哭於斯聚國族於斯文子曰武也得歌於斯哭於斯聚國族於斯是全要領以從先大夫於九京也北靣再拜稽首君子謂之善頌善禱禮檀弓美室宋向戌來聘見孟獻子尤其室曰子有令聞而美其室非所望也對曰我在晉吾兄為之毁之重勞且不敢間襄十五爽塏初景公欲更晏子之宅曰子之宅近市湫隘囂塵不可以居請更諸爽塏者辭曰君之先臣容焉臣不足以嗣之於臣侈矣且小人近市朝夕得所求小人之利也敢煩里旅及晏子如晉公更其宅反則成矣既拜乃毁之而為里室皆如其舊則使宅人反之且諺曰非宅是卜惟鄰是卜二三于先卜鄰矣違卜不祥君子不犯非禮小人不犯不祥古之制也吾敢違諸乎卒復其舊宅左昭三東益哀公問於孔子曰寡人聞東益宅不祥信有之乎孔子曰不祥有五而東益不與焉夫捐人而自益身之不祥也棄老而取幼家之不祥也舎賢而任不肖國之不祥也老者不教㓜者不學俗之不祥也聖人伏匿愚者擅權天下不祥也不祥有五東益不與焉家語西益哀公欲西益宅史争之以為西益宅不祥哀公作色而怒左右數諌不聴乃以問其傅宰折雎曰吾欲益宅而史以為不祥子以為何如宰折雎曰天下有三不祥西益宅不與焉哀公大説而喜頃復問曰何謂三不祥對曰不行禮義一不祥也嗜慾無止二不祥也不聴彊諌三不祥也哀公黙然深念憤然自反遂不西益宅淮南人門風俗通曰宅不西益俗以西者為上上益宅者妨家長也原其所以西益者禮記曰南向北向西方為上爾雅曰西南隅謂之奥尊長之處乎不西益者恐動摇之耳審西益有害増廣三靣豈能獨吉乎土木勝人知襄子為室美士茁夕焉知伯曰室美夫對曰美則美矣抑臣亦有懼也志有之曰髙山峻原不生草木松栢之地其土不肥今土木勝臣懼其不安人也室成三年而知氏亡晉語木生髙陽魋將為室問匠人匠人對曰未可也木尚生加塗其上必將撓以生材任重塗今雖成後必敗髙陽魋曰不然夫木枯則益勁塗乾則益輕以勁材任輕塗今雖惡後必善匠人窮於辭無以對受令而為室其始成竘然善也而後果敗開第齊威王養士稷門之下自淳于髠以下七十餘人髙者為列大夫為開第康莊之衢髙門大屋尊寵之史記窮僻蕭何買田宅必居窮僻處為家不治垣屋曰令後世賢師吾儉不賢毋為勢家所奪本傳北第漢書曰夏侯嬰以太僕事恵帝恵帝及髙后徳嬰之脱孝恵魯元於下邑間也乃賜嬰北第一區曰近我以尊異之師古曰北第者近北闕之第故張衡西京賦云北闕甲第當道直啟壊孔子宅魯恭王初好治宫室壊孔子舊宅以廣其宫聞鐘磬琴瑟之聲遂不敢復壊於室壁中得古文經傳漢本傳傳舎平恩侯許伯入第盖寛饒賀之酒酣仰屋而嘆曰美哉然富貴無常忽則易人此如傳舎所閲多矣惟謹慎為可乆君侯可不戒哉本傳治第霍去病為票騎將軍上為治第令視之對曰匈奴不滅無以家為也由此上益重愛之前漢膏腴田蚡為丞相嘗請考工地欲以益宅上怒曰何不遂取武庫治宅甲諸第田園極膏腴前堂羅鐘皷立曲㫋後房婦女以百數上塞咎董宣為北海太守大姓公孫舟造起大宅工占之曰宅當出一䘮舟使子取行人殺之以塞咎宣收舟考殺之陳留耆舊傳對宇襄陽城東南有白沙曲龐士元居漢之隂司馬徳操宅洲之陽隔魚梁洲望衡對宇懽情自接每至相思則褰裳渉水豈待還桂柂於千里貢深心於永思哉水經輿地志表閭晉永興中鎮南將軍劉𢎞至隆中觀亮故宅立碣表閭命太傅掾犍為李興為文蜀記與兄裴楷營新宅基宇甚麗當移住與兄共逰行牀帳儼然櫺軒踈朗兄心甚願之而口不言楷心知其意便使兄住别傳楷嘗營别宅從兄衍見而悦之即以宅與衍晉書起宅太過王濬字士治恢廓有大志嘗起宅開門前路廣數十歩人或謂之太過濬曰吾欲使可容長㦸幡旗衆咸笑之濬曰陳勝有言燕雀安知鴻鵠之志晉書宅相魏舒字陽元㓜䘮父母為外祖甯氏所養甯氏起宅相者云當出貴外甥祖父母以魏氏甥小而慧意謂應之舒荅曰當為外家成宅相晉書侵併廷尉張闓住在小市將奪左右近宅以廣其居乃私作都門早閉晏開人多患之訟於州府皆不見省會賀循出至破岡連名詣循質之循曰見張廷尉當為言及之闓聞而遽毁其門詣循致謝上草屋孔愉為會稽内史在郡三年營山隂湖南緱山下數畝地為宅草屋數間便棄官居之送資數百萬悉無所取上為營桓𤣥得志常欲以謝安宅為營謝混曰邵伯之仁猶恵及甘棠文静之徳更不保五畝宅耶𤣥聞慙而止同上鬼營檀道濟居清溪第二兒夜忽見人來縛已欲呼不得至曉乃解猶見繩痕在此宅先是吳將歩闡所居諺云揚州青是鬼營青溪青揚是也自歩及檀皆被誅異􅁐㐫地建業大社西空地東吳時右司馬丁奉宅孫皓殺之流徙其家晉元帝初為僕射周顗宅顗為王敦所害後為冠軍蘇峻宅峻反被誅後為袁悦宅為會稽王道子所親昵縁道子見殺又為章武王司馬秀宅亦以㐫終宋孝武時為雍州刺史臧燾宅質反被殺故宅多空地宋吏部尚書王僧綽嘗謂宅無吉㐫請以為第始造未及居為元兇邵所殺宋書南史笑拙顔延之子峻既貴權傾一朝凡所資供延之無所受器服不改宅宇如舊見峻起宅謂曰善為之無令後人笑汝拙也本傳永年孝文因行藥至司空府南見邢巒宅遣使謂巒曰朝行藥至此見卿宅乃住東望徳館情有依然巒對曰陛下移構中原方建無窮之業臣意在於魏昇降寧容不務永年之宅帝謂司空穆亮僕射李冲曰巒之此言其意不小也魏君買宅吕僧珍舊宅在市北前有督郵廨鄉人咸勸徙廨以益其宅僧珍怒曰豈可徙官廨以益私宅乎宋季雅罷南康郡市宅居僧珍宅側僧珍問宅價曰一千一百萬恠其貴季雅曰一百萬買宅千萬買鄰岳史賣宅崔慰祖賣宅須四十五萬買者曰寧有减不荅曰誠異韓休伯何容二價買者曰君但賣四十六萬一萬見與慰祖曰是豈我心乎上望氣長流解西有梁曹儀同景宗栁儀同慶逺韋儀同叡諸宅並相隣次郭城西門韋叡少時有南陽人蔡郍善望氣相叡宅應出三公刺史貴不可言時叡宅上有草房十間郍宅在城南悉是瓦屋求叡換宅疑而不許叡兩兄闡纂有令聞位望在叡之右鄉里謂此人應班槐梀其後闡纂相繼而終叡奉龍飛遂成宅相簡文徴書既至乃曰此宅望氣之言殆有徴矣襄沔記逆旅舎徐勉戒子書曰吾清明門宅西邉既施宣武寺不復方幅意謂亦逆旅舎耳何事須華常怪時人謂是我宅古往今來豪貴繼踵宛其死矣定是誰室梁書同傳舎陽固字敬安元魏世宗末中尉王顯起宅既成集僚屬饗宴酒酣問固曰此宅何如固曰晏嬰湫隘流稱於今豐屋生災著於周易此盖同傳舎耳惟有徳能卒願公勉之顯黙然北史髙壯王椿字元夀叡子也於宅構起㕔事極為髙壯時人忽云此乃太原王宅豈是王太原宅椿往為本郡世皆呼為王太原未㡬爾朱榮居椿之宅榮封太原王焉魏書恩倖傳廣營栁夐宇文䕶執政廣營第宅嘗召夐至宅訪以政事夐仰視其堂徐而嘆曰酣酒嗜音峻宇雕墻有一於此未或不亡䕶不悦有識者以為知言北史宅怪長安待賢坊隋北領軍大將軍史萬嵗宅其宅初有鬼怪居者輒死萬嵗不信因即居之夜見人衣冠甚偉來就萬嵗萬嵗問其由曰我漢將軍樊噲墓近君居厠常苦穢惡幸移他所必當厚報萬嵗許諾因詰殺生人所由曰各自怖而死非我殺也及掘得骸柩因為改葬後夜又來謝曰君當為將吾必助君後萬嵗為隋將每遇賊便覺鬼助已戰必大㨗兩京記宜人東京宜人坊其半本隋齊王暉宅煬帝愛子初欲盡坊為宅帝問宇文凱曰里名謂何凱曰里名宜人帝曰既號宜人奈何無人可以半為王宅上髠栁延夀坊東隅駙馬裴㢲宅髙祖末裴行儉居之自行以前居者輒死自儉卜居有狂僧突入盡髠其庭中大栁樹中有豕走出徑入北隣其家數日暴死盡此宅清宴上辭第隋煬帝在藩舊宅武徳中賜尚書左僕射蕭瑀西為園後瑀子鋭尚襄城公主詔别營主第主辭以姑婦異居有乖禮則因固陳請乃取園地充主第又辭公主棨㦸不欲異門乃併施瑀之院門長安志輟材魏徴當朝重臣也所居室宇卑陋太宗欲為營第輒謙讓不受洎徴寢疾太宗將營小殿遂輟其材為造正堂五日而就開元中此堂猶在家人不謹遺火焚之子孫哭臨三日朝士皆赴弔封氏聞見記後裔孫謩相宣宗居舊第焉長安志避惡名明教坊龍興觀西南隅開府宋璟宅南門之東國子司業崔融宅璟造宅悉東西相對不為斜曲以避惡名融奉詔為哀策用思精苦下直馬過其門不覺文就而卒兩京記栢梁宗楚客造一宅新成皆是文栢為梁沉香和紅粉以泥壁開則香氣蓬勃磨文石為階砌及地凡客至著靴者行則仰仆楚客被逮昌王推得􅂍萬餘貫兄弟配流太平公主就其宅看嘆曰觀其行坐處我等虚生浪死一年追入為鳯閣侍郎景龍中為中書令韋氏之敗被誅朝野僉載崇麗則天以後王侯妃主京城第宅日加崇麗至天寳中御史大夫王鉷有罪賜死縣官簿録鉷太平坊宅數日不能遍宅内有自雨亭從簷上飛流四注當夏處之凛若髙秋又有寶鈿井欄不知其價他物稱是封氏見聞記宅氣浮圖泓與張説置永樂東南第一宅有永巷者戒曰此宅西北隅是王地慎勿於此取土越月泓至熟視謂燕公曰此宅氣候忽然索漠甚必恐有取土於西北隅者公與泓偕行至宅西北隅果有取土坑三數坑皆深丈餘泓大驚曰禍事令公富貴一身而已更二十年外諸郎君皆不得天年燕公大駭曰填之可乎泓曰客土無氣與地脉不相連今欲填之亦猶人有瘡痏縱以他肉補之終無益也燕公子均垍皆為祿山委任克復後均賜死垍長流之常侍言旨奪宅貴妃姊虢國夫人恩傾一時嘗治第宅棟宇之盛世無與其比所居本韋嗣立舊宅韋氏諸子亭午方偃息於堂廡間忽見一婦人衣黄披衫降自歩輦有侍婢數十笑語自若謂韋氏諸子曰聞此宅欲貨其價幾何韋氏降階言曰先人舊廬所未忍捨語未畢有工人數百登兩廂掘其瓦木韋氏諸子既不能制乃率家童挈其琴書委於衢路而自嘆曰不才無為勢家所奪古人之戒將見於今日乎而與韋氏隙地十畝餘其他一無所得雜録勝絶崇仁坊西南隅長寧公主宅既承恩盛加雕飾朱樓綺閣一時勝絶又有山池别院山谷虧蔽勢若自然中宗及韋庶人數逰於此第留連彌日賦詩飲宴上官昭容操翰於亭子柱上寫之韋氏敗公主隨夫為外宫初欲出賣木石當二千萬山池别巧仍不為數遂奏為觀詞人名士竟入逰賞兩京記玉盞浮圖泓云長安永寧坊東南是金盞地安邑里西是玉盞地後永寧為王太傅鍔地安邑為馬北平燧地後王馬皆進入官王宅累賜韓令𢎞及史憲誠李戴義等所謂金盞破而成焉馬燧為奉誠園所謂玉盞破而不完也傳戴李吉甫宅泓師謂其地形為玉柸牛僧孺宅為金柸云玉柸一破無復全全柸或傷重可完僧孺宅在新昌里本天寶中將作大匠康䛒宅䛒自辨圖阜以其地當出宰相毎命相䛒必引頸望之宅卒為僧孺所得吉甫宅至徳裕貶其家滅矣盧氏雜説萬花谷引傳載以為僧一行誤又云桑道茂號長安公卿宅有金盃玉盌之號木妖大厯十四年七月毁元載馬璘劉忠翼之第自天寳中京師堂寢已極宏麗而第宅未甚逾制然衛國公李靖廟已為嬖人楊氏􅂒矣及安史二逆之後大臣宿將競崇棟宇無界限力窮乃止人謂之木妖而馬璘之堂尤盛計錢二十萬貫他室稱是璘卒於軍以䘮歸京師士庶欲觀之假名於故吏投刺會弔者數十百人故命撤毁之自是京師樓榭之踰制者皆毀徳宗實録肅宗時京都第宅屢經殘毁代宗即位宰輔及朝士當權者爭修第舎頗為煩弊議者以為土木之妖無何皆易其主矣封氏聞見記修築郭子儀所居宅内諸院往來乗車馬僮客於大門出入各不識詞人梁鍠嘗賦詩云堂髙凴上望宅廣乗車行盖此之謂郭令曽將出見修宅者謂曰好築此墻勿令不牢築者釋錘而對曰數十年來京城達官家墻皆是某所築祇見人自改換墻今見在郭令聞之愴然動心遂入奏其事因固請老封氏見聞録鬻業蕭復字履初為太子僕廣徳中連嵗不稔榖價翔貴家貧將鬻昭應别業時宰相王縉聞其林泉之美心欲之乃使弟紘誘焉曰足下之才固宜居右職如以别業奉家兄當以要地處矣復對曰僕以家貧而鬻舊業將以拯濟孀㓜耳儻以易美職於身令門内凍餒非鄙夫之心也縉憾之乃罷復官沉廢數年復處之自若舊唐儉徳韓滉性持節儉居處薄陋才蔽風雨弟泳嘗於里宅増修廊宇滉自江南至即命撤去之曰先公容焉吾輩奉之常恐失墜所有摧圮葺之則已豈敢改作以傷儉徳舊唐書履道白樂天得楊慿宅竹木池館有林泉之致因為池上篇曰都門風水土木之勝在東南東南之勝在履道里其宅有池水可泛舟樂天毎命賔客繞船以百十油囊沉水中隨船而行一物盡則左右又取之蔵盤筵于水底也宋景文雞跖及窮齒記不奉權貴楊損家新昌里與路巖第接巖方為相欲易其廐以廣第損族仕者十餘人議曰家世盛衰係權者喜怒不可拒損曰今尺寸土皆先人舊貲非吾等所有安可奉權臣耶窮達命也卒不與唐書居寢鬱然楊行密嘗在楚州登城見王茂章營第曰天下未定而茂章居寢鬰然渠肯為我忘身乎茂章遽毁損上宅泣顧全武於越中廣捜楩楠建宅甚宏壯畢工之際梁棟皆出水户牖漬濕竟不得入斯屋而卒人謂之宅泣葆光録侵居楊玢仕蜀至顯官隨王衍歸後唐以老致仕歸長安舊居多為鄰里侵占子弟欲詣府訢其事玢批狀尾云四隣侵我我從伊畢竟須思未有時試上含元殿基望秋風衰草正離離子弟不敢復言談苑華麗孟知祥至蜀時魏王繼岌滅王衍尚駐於府舎知祥乃舘於徐延璚之第延璚即衍之舅衍嘗幸其第悦其華麗於壁上書孟字以戱之盖蜀中以孟為不任故也延璚以紅紗籠之知祥見而笑曰踈狂霸竪亦預知與我為代知我居此耶蜀檮杌三不得宋神宗時丞相陳升之治第於􅃳州極為宏壯綿亘數百歩宅成升之已疾甚唯肩輿一登西樓而已人謂之三不得居不得賣不得修不得筆談兩枝梁理宗時丞相崔與之歸蜀建第甚麗里有豪商李姓者亦從而效之即用崔府匠人規制落成崔往觀之歸召匠問曰汝與某建宅固佳但少兩枝梁耳匠曰此一依相府規模者崔曰一枝是沒思量一枝是沒酌量當時以資談笑夷堅續志四事人之有宅東閣延賢南軒引景北牖招風西櫺映月主人端居中霤以收四事之用焉蕭琛難神滅論宅宜凡宅東下西髙富貴雄豪前髙後下絶無門户後髙前下多有牛馬凡宅地欲平坦名曰梁地後髙前下名曰晉地居之並吉南髙北下名曰魯土居之富貴當出賢人前髙後下名曰楚土居之凶四靣髙中央下名曰衛土居之先富後貧宅經宅無吉㐫設為三公之宅而命愚人居之必不為三公可知也夫夀夭之不可求甚於貴賤然則擇百年之宫而望殤子之夀處孤另之地以速彭祖之夭必不幾矣然則果無宅也是性命自然不可求矣嵇康論亭停集亭停也人所停集也釋名寓望春秋國語有寓望謂今亭也民所安定也亭有樓從髙省丁聲也漢家因秦大率十里一亭亭留也今語有亭待盖行旅宿食之所舘也亭亦平也民有訟諍吏留辦處勿失其正也風俗通萬嵗武帝元封元年幸緱氏登太室聞山呼萬嵗聲者三故立萬嵗亭漢書曲城齊城東有萬嵗水水北有萬嵗亭三齊畧記夏門亭長注洛陽北靣西頭門外有萬夀亭後李固傳千秋建武元年四月行至鄗命有司設壇場於鄗南千秋亭五成陌光武紀常山國髙邑故鄗光武更名郡國志惟元康二年三月壬寅弱子生五月之長安壬寅次於新安之千秋亭甲辰而弱子夭乙巳瘞於亭東潘岳傷弱子序亭有千秋之號子無七旬之期西征賦謝靈運與王𢎞之諸人出千秋亭飲酒倮身大呼孟顗深不堪遣信相聞靈運大怒曰身自大呼何闗癡人事南史雒陽巡守獵還公卿以下陳雒陽亭前街上乗輿到公卿以下拜天子下車公卿識顔色然後還宫獨斷洛陽二十四街街一亭十二城門門一亭漢官典職十里一亭十亭一鄉漢百官志十里一亭有亭長亭後五里一郵郵相去二里半司姦盜亭長持更板以劾賊索繩以執賊後百官志十里五里長亭短亭言十里一長亭五里一短亭白帖蕪蔞王郎起光武自薊東南馳晨夜草舎至饒陽蕪蔞亭時天寒烈衆皆饑疲馮異上豆粥本傳鵲巢蒼梧廣信女子蘇娥行宿髙安鵲巢亭為亭長龔夀所殺及婢致富取其財物埋致樓下交阯刺史周敞行部宿亭覺夀姦罪奏之殺夀謝承後漢書列異傳云鵠奔亭捜神記方掘其户時有雙鵠來奔其亭故名鵠奔文選江淹書鴻亭之鬼無恨於灰骨冠盖襄陽南二十里冠盖山下有冠盖亭後漢靈帝末天下大亂嘗有去官及見居職四郡守七都尉二卿兩侍中一黄門二侍郎三尚書六刺史二十長史劉表以其豪盛乃題其山道口亭刋石銘之曰峨峨南岳烈烈離明實敷俊义君子以生唯此君子作漢之英徳為龍光聲化鶴鳴此碑永嘉中為人毁壞圖經隴亭楚煜為天水太守之官與故太守喪會於隴亭堂吏移喪避煜煜讓坐於正堂闗西稱之張璠漢記夕陽董卓得何進私召將兵入朝又以脅太后太后使諌議大夫种邵宜往止之卓不受使其軍士以兵脅邵邵怒稱詔叱之軍士皆披遂前質責卓卓辭屈乃還軍夕陽亭通鑑武帝以賈充鎮闗中將之鎮百寮餞于夕陽亭晉書思賢徐孺子墓在郡南十四里曰白杜亭吳嘉禾中太守長沙徐熈於墓􅎬種松太守南陽謝景於墓側立碑永安中太守梁夏侯嵩於碑邉立思賢亭松碑亭今並在松大合抱亭世世修治至今之謝君亭豫章記白樓江夏太守宋輔於重山南白樓亭立學教授沛國桓儼避地至會稽聞陳業賢而往候之不見臨去入交州留書繫白樓亭柱而别會稽記重山西大夫文種之所葬也山上有白樓亭亭本山下縣令殷朗移置今處沛國桓儼避地會稽聞陳業履行髙潔往候不見儼後浮海南入交州臨去遺書與業不因行李繫白樓亭柱而去升陟逺望山湖滿目也水經注孫興公許𤣥度共在白樓亭共商畧先往名達林公既非所闗聴訖云二賢故自有才情世説亭在山隂臨流映壑也會稽記新亭過江諸人每至美日輒相邀新亭藉卉飲宴周侯中坐而嘆曰風景不殊正自有山河之異皆相視流淚唯王丞相愀然變色曰當共戮力王室克復神州何至作楚囚相對泣耶及簡文崩桓温入赴山陵晉書傳止新亭大陳兵衛將移晉室呼謝安王坦之欲於坐害之文章志王惶遽問謝曰當作何計謝神意不變謂文度曰晉祚將亡在此一行相與俱前王之恐狀轉見於色謝之寛容愈表於貎世説舉目徧厯温左右衛士謂温曰安聞諸侯有道守在四鄰明公何有壁間著阿堵輩温笑曰正自不能不爾於是矜莊之心頓盡命部左右促燕行觴笑語移日文章志王謝舊齊名於此始判優劣世説冶亭袁宏字彦伯謝安賞其機捷辨速自吏部郎出為東陽郡乃祖之於冶亭時賢皆集安欲卒迫試之執手將别顧左右取一扇而贈之宏應聲荅曰輒當奉揚仁風慰彼黎庶合坐歎其敏㨗續晉陽秋征虜支道林還東時賢並送於征虜亭蔡子叔前至坐近林公謝萬石後來坐小逺蔡暫起謝移就其處蔡還見謝在焉因合褥舉謝擲地自復坐謝冠幘傾脱乃徐起振衣就席神意甚平不覺瞋沮坐定謂蔡曰卿竒人殆壊我靣蔡荅曰我本不為卿靣作計其後二人俱不介意世説京師三亭新亭吳舊亭也故基淪毁隆安中丹陽尹司馬恢移創今地謝石創征虜亭三吳縉紳創冶亭並太元中丹陽記錢唐褚公於章安令遷太尉記室叅軍名字已顯而位微人未多識公東出乗估客船送故吏數人投錢唐亭住爾時吳興沈充為縣令當送客過浙江客出亭吏驅公移牛屋下潮水至沈令起彷徨問牛屋中是何物人吏云昨有一傖父來寄亭中有尊貴客權移之令有酒色因遥問傖父欲食䴵不姓何等可共語褚因舉手答曰身是章安令禇某乆承公名令於是大遽不敢移公便於牛屋下修刺詣公更宰殺為饌具於公前鞭撻亭吏欲以謝慙公與之酌宴言色無異狀如不覺令送公至界世説金昌禇太傅初渡江嘗入東至金昌亭吳中豪右燕集亭中禇公雖素有重名於時造次不相識别敕左右多與茗汁少箸粽汁盡輒益使終不得食禇公飲訖徐舉手共語云禇季野於是四坐驚散無不狼狽世説孔甯子與王華並有富貴之願自徐羡之等秉權日夜搆之於太祖甯子嘗東歸至金昌亭左右欲泊舡甯子命去之曰此弑君亭不可泊也宋書羡之等謀廢少帝幽於吳郡使中書舎人邢安泰弑帝於金昌亭紀余尋師求入經吳行達昌門忽覩斯亭傍川帶河其榜題曰金昌訪之耆老曰昔買臣仕漢還為會稽内史而逢其迎吏逆旅比舍與買臣争席買臣出其印綬羣吏慚服自裁因事建亭號曰金傷失其字義耳謝歆金昌亭詩叙蘭亭王羲之初渡江會稽有佳山水名士多居之與孫綽許詢謝尚支遁等宴集於山隂之蘭亭王隠晉書湖口有亭號曰蘭亭亦曰蘭上里太守王羲之謝安兄弟數往造焉吳都太守謝朂封蘭亭侯盖取此亭以為封號也太守王廙之移亭在水中晉司空何無忌之臨郡也起髙於山椒極髙盡眺矣水經注神告徐苗字叔胄髙密淳于人也曽因事行至感靈亭有神人告亭欲崩苗出亭崩得免王隱晉書風亭徐湛之為廣陵郡守善為政威恵並行廣陵城舊有髙樓湛之更加修整更加風亭月觀吹臺琴室果竹繁茂花藥成行宋書夢謝白樂天詩夢謝亭古傳名謝歌妓樓新道姓蘇杭州靈隠寺山上有一謝亭即杜明浦夢謝靈運之所因名客兒也本集謝靈運會稽人世不宜子息乃於錢唐杜明師舎寄養師是夜夢有賢人相訪及曉見靈運至後因以名亭晏殊類要九曲景龍三年九月壬戌幸九曲亭宴侍臣學士唐舊紀臨渭四年三月甲寅幸臨渭亭修禊飲上含象開元中拜張説等十八人為學士於東都上陽宫含象亭圖寫御贊述之翰林鑑事沈香𤣥宗坐沉香亭意有所感欲得李白為樂章召入而白已醉左右以水頮靣稍解援筆成清平調三章婉麗精切末章云解釋春風無限恨沉香亭北倚闌干唐書松忩雜録長慶四年敬宗初嗣位九月丁未波斯大商李蘇沙進沉香亭子材拾遺李漢諌云沉香為亭子不異瑶臺瓊室上怒優容之舊紀振旅天寶八載於開逺門外作振旅亭以待兵還譚賔録白雲太白山有隠士郭休字退夫有運氣絶粒之術於山中建茅屋百餘間有白雲亭錬丹洞注易亭修真亭朝𤣥壇集神閣每於白雲亭與賔客看山禽野獸即以槌擊一鐵片子其聲清響山中鳥獸聞之集於亭下呼為喚鐵天寳遺事白雲亭在縣西南旁對千越亭而峙焉跨古城之危瞰長江之深隋州刺史劉長卿題詩曰孤城上與白雲齊因以白雲為名鄱陽記三癸代宗時顔真卿由吉州司馬遷撫湖二州刺史於烏程杼山立三癸亭時癸年癸月癸日故名望春代宗嘉誠公主貞元元年下嫁魏博節度使田緒徳宗幸望春亭臨餞新唐南北望春亭在禁苑東南髙原之上長安志太液大和四年七月文宗於太液亭召翰林學士鄭覃已下對賜錦綵實録元稹詩網索兩臨太液池注網索在太液上學士侯對於此彩霞文宗太和九年二月發神策軍一千五百人修淘曲江如諸司有力要於曲江置亭舘者宜給與閒地七月敕造紫雲樓彩霞亭於曲江芙蓉園北垣十月内出曲江新造紫雲樓彩霞亭額左軍仇士良以百戯於銀臺門迎之時鄭注言秦中有災宜興土功厭之乃濬昆明曲江二池上好為詩毎誦杜甫曲江行云江頭宫殿鏁千門細栁新蒲為誰緑乃知天寶已前曲江四岸皆有行宫臺殿百司廨署思復昇平故事故為樓殿以壯之舊紀㑹要合璧事類引孔帖云天寳時詔兩神䇿治曲江昆明作彩霞亭詔公卿得列舎堤上鄭若庸類雋引天寶遺事天寳時云云俱誤精思李徳裕所居安邑里第有院號起草亭曰精思每計大事則處其中雖左右侍御不得豫本傳含春宣宗召學士令狐綯夜對含春亭燭盡以金蓮華炬送歸院統志本傳止云夜對禁中白檀李絳子璋為宣州觀察使楊收造白檀香亭子初成㑹親賔觀之先是璋潛遣人度其廣袤織成地毯其日獻之及收敗璋亦從坐杜陽編休休司空圖本居中條山上官谷有先人田遂隠不出作亭觀素室悉圖唐興節士文人名亭曰休休作文以見志曰休美也既休而美具故量才一宜休瑞入二宜休耄而瞶三宜休又少也惰長也率老也迂三者非為時用則又宜休因自目為耐辱居士新唐半隠王龜字大年常以光福第賔客多更住永達里林木窮僻構半隠亭以自適唐書野春武陵儒生苖彤事園池以接賔客有野春亭者雜植山花五色錯列清異録天繪昭州瘴毒地靣山水頗清婉郡圃有亭名天繪郡守李丕以同金年號欲更之有范滋者為易名清暉後李視積壤中有片石載邱濬所作記畧云子擇勝地構此亭名曰天繪取其景物自然也後某年月日當有俗子易名清暉者可為一笑考命名之日不差夷堅志草𤣥揚雄宅後置寶園寺今為宫亭有墨池在焉成都記子雲南陽諸葛廬西蜀子雲亭孔子云何陋之有劉禹錫陋室銘勞勞江寧縣南十五里有勞勞亭古送别之所太白詩金陵勞勞送客堂蔓草離離生道傍古情不盡東流水此地悲風愁白楊本集新亭隴有逺望樓一名勞勞樓後為臨滄觀輿地志故人梁栁惲詩汀洲採白蘋日晚江南春洞庭有歸客瀟湘逢故人後因於瀟湘水合處立故人亭千越饒州餘干縣有千越亭前瞰琵琶洲後枕思禪寺林麓森鬰千峯競秀張枯題云扁舟亭下駐煙波十五年逰從此過洲觜露沙人渡淺風稍蔵竹鳥啼多層欄漲水痕猶在古板題詩字已訛况是髙林正圓月可堪聞聼異鄉歌文公談苑迎春飛霜殿前日悄悄迎春亭下風颸颸鄭愚津陽門詩四亭頥山有四亭曰綠隂曰西陽曰㺯雲曰卧龍陸希聲頥山録浣花浣花亭臨大江鼈靈檻池成都記稽亭稽亭北瞰大江南望髙岳淹留逺客因以為名焉潯陽記閬風潤州覆舟山有閬風亭郡國志金谷東都苑内有金谷亭凝碧池兩京新記九洲東京上陽宫有曜掌亭九洲亭上三京樂城縣三京亭此亭是祖送行人所永嘉記三楓韶州潼溪里有三楓亭郡國志駕霄張鎡字功甫張循王諸孫也園池聲妓服玩之麗甲天下嘗於南湖園作駕霄亭於四古松間以巨鐵絙懸之空半當風月清夜與客梯登之飄摇雲表折疊宋理宗時禁苑漸頺賞荷池宴但張盖設屛扆於烈日中董宋臣黙會意不日而成一亭於池傍再宴上大喜未㡬冬月賞梅園又有一亭上意不樂諭宋臣曰前造荷亭朕不為較今復有此半年之間勞民動衆如此宋臣曰此梅亭即前之荷亭也上問其故對曰此乃折卸摺疊之亭上愈稱賞之積功亭為積功民所成也夢築亭者功積成也夢亭壊敗恩澤傷也夢書􅀢亭河南密縣有􅀢亭急也从弦从心説文㥥亭琅邪朱虚有㥥亭懽也揚荋沛城父有揚荋亭草多葉貎鮚埼鄞有鮚埼亭師古曰鮚音結􅑕也長一寸廣三分有一小蟹在其腹中埼曲岸也其中多鮚故以名亭丈亭慈溪縣在尉廨築方丈室云丈亭其北有老尉埔地志館館館客舎也待賔之舎曰館桂苑凡事之賔客館焉舎也有積以待朝聘之官是也客舎逆旅名候館也公館也公宫者公所為也私館者自卿大夫以下之家開元文字大庭黄帝於是放萬機舎官寢去直侍徹鐘懸減厨膳退而閒居大庭之館齊心服形三月不親政事畫寢而夢逰於華胥氏之國列子授館單襄公聘於宋假道於陳司里不授館國無寄寓縣無施舎單子歸告定王曰陳侯必有大咎周制有之曰國無郊牧縣有寓望周之職官有之曰敵國賔至候人為導卿出郊勞司里授館周語重館晉分曹衛之田公使臧文仲往宿於重館重館人曰晉新得諸侯必親其共不速行將無及也左僖三十一大館叔弓聘於晉晉侯使郊勞辭致館辭曰寡君命下臣來繼舊好好合使成臣之祿也敢辱大館左昭二葺館叔孫婼如晉晉人執之先歸邾子士伯曰以芻蕘之難從者之病將館子於都叔孫旦而立期焉乃館諸箕吏人之與叔孫居於箕者請其吠犬弗與及將歸殺而與之食之叔孫所館者雖一日必葺其牆屋去之如始至昭二十三築館戰國䇿曰燕昭王見郭隗乃築館而師之樂毅鄒衍劇辛皆争走燕遂以破齊藝文類聚今本館作宫祠韓惠帝時有道士韓稚來自東海退莫知其所之帝使立仙壇於長安城北名曰祠韓館拾遺記忘憂梁孝王逰於忘憂之館集諸逰士各使為賦西京雜記飛亷元鼎六年冬公孫卿候神河南言見僊人迹緱氏城可為館如緱氏城置脯棗神人宜可致且僊人好樓居於是上令長安作飛亷桂館甘泉則作益夀延夀館使卿持節設具而候神人乃作通天臺置祠具其下將招徠神僊之屬郊祀志平樂元封六年夏京師民觀角抵於上林平樂館武紀枚臯上書北闕詔使賦平樂館上善之本傳董偃常從馳逐平樂方朔傳禹山走馬馳逐平館霍光傳三館公孫𢎞起徒歩數十年至宰相封侯於是起客館開東閣以延賢人與參謀議𢎞身食一肉脱粟之飯故人賔客仰衣食俸祿皆以給之家無所餘𢎞年八十終後李蔡嚴青翟趙周石慶公孫賀劉屈氂繼踵為丞相者客館丘墟而已至賀屈氂時壞已為馬廐車庫奴婢室矣漢書平津侯自以布衣為宰相乃開東閣營客館以招天下之士其一曰欽賢館以待大賢次曰翹材館以待大才次曰接士館以待國士其有徳任毗贊佐理隂陽者處欽賢之館其有才堪九列將軍二千石者居翹材之館其有一介之善一方之藝居接士之館而躬自菲薄所得俸祿以奉待之西京雜記賢良曰公孫丞相倪大夫分禄以養賢畢已以下士功業顯立無行人子産之繼而葛繹澎侯之等隳壊其緒紕亂其紀毁其客館議堂以為馬廐掃舎鹽鐵救匱髙靈上自封禪後夢髙祖坐明堂羣臣亦夢想於是祀髙祖於明堂以配天還作髙靈館三輔故事昭靈霍光夫人顯改光時所自造塋制而侈大之北臨昭靈南出承恩本傳雲林霍后廢處昭臺宮後十二嵗徙雲林館迺自殺外戚白鶴初元三年茂陵白鶴館災詔曰迺者火災降於孝武國館漢紀射熊永光五年冬幸長楊宫射熊館有車騎大獵元紀是時農民不得收歛揚雄從至射熊館還上長楊賦以風本傳陽祿成帝班婕伃以趙氏娣弟驕妬恐久見危作賦自傷悼曰痛陽祿與柘館兮仍襁褓而離災外戚涿沐成帝許美人前在上林涿沐館數召入飾室中若舎一嵗再三召留數月或半嵗御幸元延二年褱子其十一月乳上長平王莽知太后厭居深宫中欲虞樂迺令太后四時巡狩四郊存見孤寡貞婦春幸繭館率皇后列侯夫夫桑遵霸水而䘠除夏遊篽宿鄠杜之間秋歴東館望昆明集黄山宫冬響飲飛羽校獵上蘭登長平館臨涇水而覽焉莽傳承光王莽壊徹城西苑中建章承光包陽大臺儲元宫及平樂當路陽禄館凡十餘所取其材瓦以起九廟師古曰自建章以下至陽祿皆上林苑其館本傳袐館賈逵明左氏傳國語為之解詁五十一篇永平中上䟽獻之顯宗寫蔵祕館後傳蔡邕上書曰臣得以學問執事祕館操管御前本傳裸遊靈帝初平三年逰於西園起祼遊館十間采綠苔而被堦引渠水以繞砌周流澄澈乗船以遊漾使宫人乗之拾遺記崇文魏有崇文館唐六典注𤣥武魏氏起𤣥武館於芒垂張景陽𤣥武觀賦所謂髙樓特起竦跱岧嶤直亭亭以孤立延千里之清颷也水經渭陽魏明帝為外祖母築館於甄氏既成自行視謂左右曰館當以何為名侍中繆襲曰陛下聖恩齊於哲王罔極過於曽閔此館之興情鍾舅氏宜以渭陽為名世説東都東都館者盖東武陽侯之館也俄而遷居謂余曰吾將老焉故有終焉之心而無移易之意子且為我賦之潘尼賦儒學宋元嘉十五年立儒學於北郊命雷次宗居之南史紀上好儒雅十六年命丹陽尹何尚之立𤣥素學著作郎何承天立史學司徒叅軍謝元立文學各聚門徒多就業者上元嘉有𤣥史兩館六典注招隠元嘉中徴雷次宗至京師開館於雞籠山聚徒教授久之還廬山後又徴詣京邑為築室於鍾山西巖下謂之招隠館使為太子諸王講次宗不入公門乃使自華林東門入延賢堂就業隠逸傳太平禇伯玉字元璩居剡瀑布山宋孝建二年徴聘不就齊太祖即位手召吳會二郡以禮迎遣又辭疾上不欲違其志敕於剡白石山立太平館居之齊隠逸傳總明武帝永明三年既立國學省總明觀詔於王儉宅開學士館以總明四部書充之本傳何佟之為總明館學士本傳宋太始齊永明有總明館六典注五館梁武天監四年詔開五館建立國學摠以五經教授置五經博士各一人以明山賔陸璉沈峻嚴植之賀瑒補博士各主一館館有數百人南儒林傳植之兼五經博士植之館在湖溝每當登講五館生畢至聴者千餘人本傳帝别開五館其一館在袁憲宅西憲常招引諸生講論新義同輩嗟服本集雅天監五年五月置集雅館以招逺學大同七年十二月於宫城西士林館延集學者南史紀御覽前後差誤仙人華林園中有大海即漢天淵池也中猶有魏文帝九華臺元魏宣武在海内作蓬萊山山上有仙人館上有釣臺殿并作虹蜺閣乗虚來往至於三月禊日季秋巳辰皇帝駕龍舟蠲首逰於其上海西南有景山殿山東有義和嶺山西有姮娥峯上有寒露館山北有𤣥武池山南有清暑殿殿東有臨澗亭殿西有臨危臺洛陽伽藍紀文林北齊後主緯幼而令善及長頗學綴文置文林館引諸文士焉紀馬元熈字長明敬徳子也少傳父業兼長文藻以通直待詔文林館北史本傳通道長孫熾字仲光周武帝崇尚道徳求學兼經史者為通道館學士熾應其選北史傳十四方隋於建國門外置四方館以待四方使客各掌其方國乃互市等六典注𤣥宗詔徙姚崇寓四方館崇以館局華大不敢居上曰設四方館為官吏也使卿居之為社稷也本傳修文唐武徳四年置修文館於門下省九年改曰𢎞文館神龍元年改曰昭文館以避孝敬皇帝之名官志文學四年太宗討平東夏海内無事乃鋭意經籍於秦府開文學館廣引文學之士以府屬杜如晦等十八人為學士舊儒學傳帝以魏王泰好士善屬文詔即府置文學館得自引學士本崇賢貞觀十三年置崇賢館上元二年避太子名改崇文館百官志李善為崇賢館直學士舊邕傳臨臯李固言為西川節度詔雲韶雅樂即臨臯館送之本傳廣文元宗愛鄭䖍之材欲置左右以不事事更置廣文館以䖍為博士䖍聞命不知廣文曹司何在訴宰相宰相曰上増國學置廣文館以居賢者令後世言廣文博士自君始不亦美乎䖍乃就職品秩同大學乆之雨壊廡舎有司不復修完寓泊國子館自是遂廢本傳天寳十三載八月綦母潛遷廣文博士集賢注記空館竟陵掾劉諷夜投空館有三女郎至歌曰明月清風良宵會同星河易翻歡娛不終綠尊翠杓為君斟酌令女不飲何時歡樂忽有黄衣人曰婆提王屈娘子速來女郎皆起明旦拾得翠釵數隻幽怪録孤館陶榖使於南唐因書十二字於官舎壁間曰西川狗百姓眼馬包兒御厨飯宋齊丘解云十二字包四字云獨眠孤館于文虎序靖㝠禽殫中衰相與集於靖㝠之館羽獵賦迎風覛往昔之遺館獲林光于秦餘既新作於迎風増露寒與儲胥西京賦薛綜注曰露寒儲胥皆館名今本無黄華置酒乎黄華之館趙都賦桃林襄陽縣南有桃林館是餞行送歸之所萃也荆州圖副天中記巻十四
