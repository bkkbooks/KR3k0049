body:
  text: 天中記巻十明陳耀文撰洛繹耀洛出熊耳山洛之為言繹也言水繹繹光耀也春秋説題辭隂精之官洛水地理隂精之官帝王明聖龜書出文天以與命地以授瑞接河合際居中護羣王道和洽吐圖佐神逆名亂教摘亡弔存故聖人觀河洛也河圖龍見帝王始興將起河洛龍見皆察其首黒者人正白者地正赤者天正易乾鑿度吐符河以通乾出天苞洛以流坤吐地符河龍圖發洛龜書感王者沈禮焉説題辭鳳柙黄帝服齋于中宫坐𤣥扈洛水上與大司馬容光左右輔周昌等百二十人臨觀鳳凰銜圖至帝前圖以黄玉為柙黄帝録軒遊黄帝時天大霧三日帝遊洛水之上見大魚殺五牲以醮之天乃甚雨七日七夜魚流始得圖書今河圖視萌篇是也帝王世紀青鯉黄帝遊於洛見鯉魚長三丈青身無鱗赤文成字河圖赤光起尚書中候曰堯率羣臣東沈璧於洛退候至於下稷赤光起𤣥龜負書出赤文成字宋均注曰稷讀曰側龍出虞舜時黄龍從洛水出詣舜鱗甲成字舜即位與三公臨觀黄龍五采負圖出舜前顧野王符瑞圖天符𤣥龜洛書者天符也王者徳至淵泉則洛出龜書禹受舜禪洛出龜書六十五字是為洪範此謂洛出書者也宋書黒玉天乙在亳諸鄰國襁負歸徳東觀於洛習禮堯壇降三分沈璧退立榮光不起黄魚雙躍出濟于壇黒鳥以雄隨魚亦止化為黒玉赤勒曰𤣥精天乙受神福伐桀克三年天下悉合尚書中候龜符周公攝政與成王觀於洛沈璧禮畢𤣥龜青龍蒼龍止于壇背甲刻書赤文成字周公援筆以世文寫之書成文消龜墮甲而去其言自周公訖於秦漢盛衰之符宋書二水鬭周靈王時榖洛鬭將毁王宫王欲壅之太子晉諌曰不可夫水聚於髙歸於下今吾執政無乃實有所避而滑夫二川之神使至於争明以妨王宫王而飾之無乃不可乎王卒壅之王室大亂國語洛絶晉定公二十年洛絶于周魏襄王九洛入城周山水大出竹書紀年洛伯洛伯用與河馮夷鬭盖洛水之神也竹書昔者河伯筮與洛伯戰而枚占昆吾占云不吉歸蔵黒頭公秦始皇祀洛水有黒頭公從河中出呼始皇曰来受天之寶乃與羣臣作歌云洛陽之水其色蒼蒼祠祭大澤倐忽南臨洛濱醊禱色連三光古今樂録玉鷄昭靈后名含始遊洛池有玉鷄銜赤珠刻曰玉英吞此者王含始吞之生漢祖劉季帝王世紀雒水造城沛國陳宣建武十年雒水出造天津城門或欲築塞之宣諌曰昔王尊人臣正身金堤水退況聖主天所挺授邪言未絶而水去謝承書激洛水徳陽殿周遊容萬人自偃師去宫四十五里激洛水於殿下漢官典職洛雒字洛字或作雒初漢火行忌水故洛去水而加佳魏為土行土水之母水得土而流土得水而柔故去佳加水魚豢典畧洛神後魏虎賁洛子淵者洛陽人戌在彭城其同營人樊元寳假歸附書令達其家云宅在靈臺南近洛河元寶至忽見一老翁云是吾兒書引入屋宇顯敞坐命婢取酒須臾見婢抱一死小兒而過俄而酒至色甚紅香美異常兼設珍羞海陸具備飲訖送元寶出但見髙岸對水緑波東傾唯見一童子可年十五新溺死鼻中出血方知所飲酒是其血也及還彭城子淵已失矣方知是洛水之神也伽藍記作頌神龜出洛水上作浮橋所謂永橋也常景為洛汭頌其辭曰浩浩大川泱泱清洛導源熊耳控流巨壑納榖吐伊貫周淹亳近達河宗逺朝海若伽藍記詠詩髙宗承貞觀之後天下無事上官侍郎儀獨持國政嘗凌晨入朝巡洛水堤步月徐轡詠詩云脉脉廣川流驅馬歴長洲鵲飛山月曉蟬噪野風秋音韻清亮羣公望之猶神仙焉隋唐嘉話永昌水垂拱五年四月魏王武承嗣偽造瑞石文云聖母臨人永昌帝業今雍州人唐國泰表稱獲之洛水則天大悅號其石為寶圖七月改寶圖曰天授聖圖洛水曰永昌封其神為顯聖侯禁漁釣祭享齊於四瀆所出處號曰聖圖泉於泉側置永昌縣十二月則天親拜洛水受天授聖圖為壇于洛水之北中橋之左皇太子皆從内外文武百寮蠻夷酋長各依方位而立珍禽竒獸並列於壇前禮畢還宫父老勒碑于拜洛壇前號曰天授聖圖之表開元五年左補闕盧履冰奏毁之舊紀志作防李適之為河南尹𤣥宗患榖洛嵗暴耗徭力詔適之以禁錢作三大防曰上陽積翠月陂自是水不能患唐書五色帝徳盛之應洛水先温九日乃寒五日變為五色𤣥黄六帖礜石洛水底有礜石故上無冰述征記宓妃宓妃宓羲氏之女溺死洛水為神漢書音義八流八流亦出名山渭出鳥鼠漢出蟠冡洛出熊耳涇出少室汝出燕泉泗出涪尾沔出月台汶出太山博物志三川八水涇與渭洛為闗中三川涇渭灞滻澇潏灃滈為闗中八水闗中記秦漢都西京灞滻灃澇涇渭之水皆不在大川之列以近咸陽盡得比大川之祠也漢書天寶九載詔曰五材並用特表上靈八水分流實稱善利京師奥壤秦甸王畿灞滻通于涇渭澇潏匯于灃滈蓄洩雲雨滋育稼穡宜令備禮致祭務陳蠲潔冊府湖大陂廣雅云湖池也説文云湖大陂也風俗通曰湖都也流瀆四面所隈都也浮玉堂湖是仙人浮玉北堂太湖記太湖太湖有大雷小雷三山亦謂之三山湖又謂之洞庭湖楊脩五湖賦云頭首無錫足蹄松江負烏程于背上懐太呉以當胷岝崔巍穹隆紆曲大雷小雷湍波相逐用言湖之苞極也水經注五湖周禮揚州其浸五湖浸者所仰灌溉者也五湖一名具區其派有五故曰五湖一名震澤一名笠澤張勃呉録五湖者太湖之别名以其周行五百里三萬六千頃故以五湖名虞翻云太湖有五道陸龜蒙云太湖上稟咸池之氣一水而五名捐珠舜棄黄金於嶄巖之山捐珠玉於五湖之泉以塞邪淫之路陸賈新語舜乃使禹疏三江五湖淮南子辟湖夏人之王鑿五湖管子禹治天下南為江漢淮汝東流注之五湖墨子禹通三江五湖決伊闕溝迴陸注之東海因水之力也吕覽禹之時天下大水禹身執虆臿以為民先剔河而導九岐鑿江而通九路辟五湖而定東海淮南河間獻王曰禹鑿江通於九派釃五湖而定東海説苑彭蠡三苗之國左洞庭右彭蠡徳義不脩禹滅之史記宫亭即彭蠡澤也謂之彭澤湖一名匯澤荆州記扁舟伍子胥諌吳王與我争五湖之利非越乎及越滅吳范蠡乃乘扁舟游五湖國語句踐滅吳謂范蠡曰吾將與子分國而有之蠡曰君行令臣行意乃乘扁舟浮海以行終不返史記練瀆吳王遊五湖經練瀆曰此水潔白如練影之涵空也故名練瀆僧文鑒洞庭記五渚戰國䇿曰秦與荆戰大破之取洞庭五渚史記曰秦乘流而下漢四日而至五渚裴駿注五渚在洞庭湖城陷由拳縣秦時長水縣也始皇時童謡曰城門當有血城陷没為湖有老嫗聞之憂懼朝朝往窺城門門侍欲縛之嫗言其故嫗去後門侍殺犬以血塗門嫗又往見血走去不敢顧忽有大水長欲没縣主簿令幹入白令令曰何忽作魚幹又曰明府亦作魚遂淪陷為湖神異傳淮南子曰夫歴陽之都一夕反而為湖注歴陽淮南國名昔有老嫗常行仁義有兩書生過之謂曰此國當没為湖視東城門閫有血便走上山勿反顧也自爾此嫗數往視門閫吏問之姥對如其言暮門吏殺鷄以血塗門明日嫗早往視門血便走上山國沒為湖龍目龍目湖秦王東遊觀地勢云此有天子氣使赭衣徒鑿湖中長岡使斷因改名為丹徒今水北注江也京口記潤州遏陂有湖名龍目湖京口出好酒人習戰故桓温云京口土瘠人窶無可戀唯酒可飲兵可用耳郡國志生彫胡㑹稽人顧翺少失父事母至孝母好食彫胡飯常帥子女躬自採擷還家導水鑿川自種供養每有贏儲家亦近太湖湖中後自生彫胡無復餘草蟲不敢至焉遂得以為養郡縣表其閭舎西京雜記鏡湖漢順帝永和五年㑹稽太守馬臻創立鏡湖在㑹稽山隂兩縣界築塘蓄水髙丈餘田又髙海丈餘若水少則洩湖灌田水多則出湖決田中水入海所以無㓙年堤塘周迴三百一十里溉田九十頃創海之始多淹塜宅有千餘人訴於臺臻遂被刑於市焉及臺中遣使按鞫總不見人驗籍皆是先死亡之人名㑹稽記山隂南湖縈帶效郭白水翠巖互相映發有若圖畫輿地記湖開吳之未亡也吳郡臨平湖一旦自開湖邉得石函中有小青石刻作皇帝字舊言臨平湖塞天下亂開則天下太平吳人以為美祥俄而吳滅後元帝興於江左宋書桓𤣥之難湖水色赤熒熒如丹錢塘記太平陳訓少學天文孫皓時錢塘湖開或言天下當太平青盖入洛皓以問訓對曰臣能望氣不達湖開塞退告友曰青盖入洛將有舁櫬銜璧之事非吉祥也晉書巴丘湖都督荆州江漢懐徳號曰杜父舊水道惟沔漢達江陵千數百里無通路又巴丘湖沅湘之㑹表裏山川實為險固荆蠻之所恃也預乃開楊口起夏水達巴陵千餘里内瀉長江之險外通零桂之漕南土歌之曰後世無叛由杜翁孰識智名與勇功晉書華容縣東南有雲夢澤一名巴丘湖荆之藪也劉澄之荆州記曲阿謝萬經曲阿後湖問左右此是何水荅曰曲阿湖謝曰故當淵注渟著納而不流世説曲阿本名雲陽秦始皇以有王氣鑿北阬山以敗其勢截其直道使其阿曲故曰曲阿也吳還為雲陽今復名曲阿太康地記丹徒有髙驪山𫝊云昔髙驪國女来此東海神乘船致酒禮聘之女不肯海神撥船覆酒流入曲阿湖故曲阿酒美也輿地志云曲阿出名酒皆云後湖水所釀故醇冽也今按湖水上承丹徒髙驪覆船山馬林溪水水色白味甘寰宇記擲湖褚公遊曲阿後湖狂風忽起船傾褚公已醉乃曰此舫人皆無可以招天譴者唯有孫與公多塵滓正當以厭天欲耳便欲捉孫擲水中孫懼無計唯大呼曰季野卿念我語林御覽分注云褚公褚彦回也季野彦回字也按晉書褚裒字季野南齊書褚淵字彦回相去百二三十年矣乃以裒字為淵字之字何耶立塘武昌南湖通江夏有水冬則涸于時靡所産植陶大尉立塘以遏水於此常自不竭因取瑯琊郡隔湖魚菱以著湖内菱甚甘美異於他故所産鮒魚乃長三尺武昌記又名五丈湖志求湖㑹稽太守孟顗事佛精懇而為謝靈運所輕東郭有迴踵湖靈運求決以為田太祖令州郡履行此湖去郭近水物所出百姓惜之顗堅執不與靈運既不得回踵又求始寧岯崲湖為田顗又固執靈運謂顗非存利民正慮決湖多害生命言論毁傷之與顗遂構讎隙宋書青林湖宋明帝遣沈攸之西伐子勛伐柵青山覩一童子甚麗曰下旬當平伐此何為忽不見故謂之青林湖湖有鯽魚食之肥美避寒暑水經注髙沙湖髙沙湖在枚迴洲上翠澤平皛水陸彌曠芰荷殷生鱗羽滋阜湖南林野清曠可以栖託故徵士宗炳昔常家焉北有小水自湖通江謂之曽口是也荆南志篁墩湖歙縣篁墩湖其中有蜃常與吕湖蜃鬭程靈銑好勇而善射夢蜃化為人告之曰吾為吕湖蜃所厄君能助吾必厚報束白練者吾也明日靈銑彎弧助之正中後蜃不知所之後人名其處為蜃灘時有一道人詣靈銑母求食食訖曰勞母設食今當為求善墓地使母隨行上山以白石識其地曰葬此可以暴貴矣靈銑因移父葬其所侯景亂靈銑率郡鄉萬餘衆保新安因隨陳武帝有竒功及陳武受梁禪靈銑以佐命功臣與周文育侯安都為三傑圖經一名蛟湖方輿勝覽西苑五湖隋煬帝起西苑十六院又鑿五湖每湖方四十里東曰翠光湖西曰金光湖北曰潔水湖南曰迎陽湖中曰廣明湖湖中積土石為山上構庭殿曲屈環繞澄澄皆碧窮極人間華麗述樓記剡川賀知章天寶初病夢遊帝居數日寤乃請為道士還鄉里詔許之以宅為千秋觀而居又求周宫湖數頃為放生池有詔賜鏡湖剡川一曲唐書丹陽湖李白嘗游丹陽湖酷愛其景乃張帆載酒縱意往来有詩云湖與元氣連風波浩難止天外賈客歸雲間片帆起金陵志郎官湖故人尚書郎張謂出使夏口沔州牧杜公漢陽宰王公觴於江城之南湖方夜水月如練清光可掇張公殊有勝槩四顧超然乃顧白曰此湖古来賢豪遊者非一而枉踐佳景寂寞無聞夫子可為我標之以嘉名白因舉酒酌水號之曰郎官湖亦鄭圃之有僕射陂也李白集甘棠湖江州潯陽南有甘棠湖長慶二年刺史李渤築立斗門以蓄洩水勢唐志飲馬唐莊宗滅梁楚馬殷遣其子希範脩貢京師上梁所授都統印莊宗問洞庭廣狹希範對曰車駕南巡纔堪飲馬爾莊宗嘉之五代史後湖金陵北有湖周迴數十里幕府雞籠二山環其西鍾阜蔣山諸峯聳其左名山大川掩映如畫六朝舊迹多出其間每嵗菱藕網罟之利不下數十百千一日諸閣老待漏朝堂語及林泉之事坐間馮謐舉𤣥宗賜賀監三百里鏡湖信為盛事又曰余非敢望此但賜得後湖亦暢得平生徐鉉怡聲而對曰主上尊賢下士常若不及豈惜一後湖所乏者知章耳馮大有慚色南唐近事後湖亦名𤣥武湖蔣陵湖秣陵湖練湖金陵志吳孫皓寶鼎元年開城北渠引後湖水巡繞殿堂窮極伎巧晉元帝大興三年創北湖長堤以遏北山之水東自覆舟山西至宣武城建康實録湖本桑泊元帝創為此湖宋以肄舟師徐爰什問宋元嘉二十三年築北堤𤣥武湖於樂遊苑北紀上欲於湖中立方丈蓬莱瀛洲三神山何尚之固諌乃止本傳元嘉二十五年黒龍兩見𤣥武湖志明帝大時七年於𤣥武大閲水師紀又於湖側作大竇通水入華林園天淵池引殿内諸溝經太極殿由東西掖門注城南墅故臺中諸溝水常縈迴不息輿地志從北望鍾山似宫亭湖望廬岳齊武帝理水軍於此中號曰昆明池故沈約鍾山應教詩云南瞻儲胥館西望昆明池即此爾京都記御覽云永嘉末有龍見於湖内故改𤣥武湖圖經云湖中有三神山世紀因之誤洞庭湖巴陵南有青草湖周迴百里日月出没其中湖南有青草山故因以為名青草湖一名洞庭湖洞庭亦謂之太湖荆州記洞庭湖西岸有沙洲堆阜隆起即青草廟下一湖之内中有此洲南名青草北名洞庭所謂重湖也南遷録湘江北流至岳陽達蜀江夏潦後蜀江漲勢髙遏住湘波讓而退溢為洞庭湖凡闊數百里而君山宛在水中秋水歸壑此山復居于陸唯一條湘川而已有都押衙蔡姓者戲題詩吟與僧齊己曰可憐洞庭湖恰到三冬無髭鬚以其不成湖也諸僧大笑之北夢瑣言洞庭湖西秋夏水泛與洞庭為一涸時惟見赤沙舊記云洞庭南連青草西亘赤沙七八百里又謂之三湖地志灃水又東與赤沙湖㑹湖水北通江而南注灃謂之決口水經注宫亭湖宫亭湖廟神甚有靈驗塗旅經過無不祈禱能使湖中分風而帆南北荆州記後漢時廬山廟有神於帳中與人言語飲酒投杯能令宫亭湖中分風船行者舉帆相逢欒巴遷豫章太守未到十數日廟中神不復作聲神仙傳彭蠡湖心有大孤山按郡國志彭蠡湖周迴四百五十里内有石髙數十丈大禹刻其石以記功焉又有乞烏隨船行舟人擲摶飯接之髙下不失一粒九江記迴艫乗派水舉棹逐分風劉刪詩分風為二擘流成兩曹毗西湖杭州西湖源出於武林泉山川秀發景物華麗自唐以来為東南遊賞勝處志白居易長慶二年為杭州刺史始築隄捍錢塘湖鍾洩其水溉田千頃本傳放水溉田每減一寸可溉十五頃可無凶嵗白西湖記白居易為刺史方是時西湖溉田千餘頃及錢氏置撈湖兵士千人日夜開浚東坡狀湖上春来似畫圖亂峯圍繞水平鋪松摇山面千重翠月㸃波心一顆珠碧毯線頭抽早稻青羅裠帶展新蒲未能抛得杭州去一半勾留是此湖白詩孫何帥錢塘栁耆卿作望海潮詞贈之内有三秋桂子十里荷花之句此詞流播金主亮聞之矙然起投鞭渡江之想命畫工潜入臨安圖西湖掲軟屛間貌己像䇿馬吳山之巔題其上曰萬里車書盍㑹同江南豈有别疆封提兵百萬西湖上立馬吳山第一峯謝處厚詩云誰把杭州曲子謳荷花十里桂三秋那知卉木無情物牽動長江萬古愁紹興淳熈間君相縱逸耽樂湖山無復新亭之淚是以論者以西湖為尤物比之西施之破吳也張志道詩云荷花桂子不勝悲江界年華憶昔時天目山来孤鳳歇海門潮去六龍移賈充誤世終無䇿庾信哀時尚有詞莫向中原誇絶景古今遺恨是西施太湖東鄉太湖吳時於此有一軍士五百人將破堰先以酒肉祈神約令水涸夜夢人云塘水速竭若見巨鱗慎勿殺也又有銅釜並不可發明往決水翕然而盡得白魚形狀非常小人貪利剖而治之見昨所祭餘食充溢腸内須臾復得釜又取發水便暴出五百人一時沒溺唯督監得存具説事狀于今猶名此湖為五百陂異苑燕雀湖昭明太子有一琉璃盌紫玉杯皆武帝所賜也既薨詔置梓宫後更葬開墳為閹人攜入大航乃有燕雀數萬擊之因為有司所縳乃獲二寶帝聞而驚異詔以賜太孫封墳之際復有燕雀數萬銜土以増其上墳側今有湖後人因名燕雀湖窮神秘苑半湯湖句容縣吳瀆塘有半湯湖湖水半冷半熱熱可以瀹雞皆有魚交入輒死酉陽花墅湖慈谿有花墅湖唐刺史任同勸民脩築中有小墅春花明媚因以名之圖經洲水中髙土昔尭遭洪水民居水中髙土故曰九州詩曰在河之州作洲非説文洲淤方言曰水可居者為洲三輔謂之淤郭璞注曰上林賦云行於洲淤之浦滄浪洲武當縣西北四十里江中有滄浪洲禹貢稱漢水東流為滄浪洲水疑此洲是也荆州圖經漢水經琵琶谷至滄浪洲洲即漁父棹歌處庾仲雍記云謂之千齡洲隨圖經鵲洲鵲洲在縣北左傳曰昭公五年楚以諸侯伐吳吳敗之於鵲岸按鵲頭與鵲尾相去八十里杜預注云吳地也廬江舒縣東南有鵲尾渚潯陽記今居巢江南水有鵲尾渚者是也西京記鸚鵡洲鸚鵡洲在縣北按後漢書曰黄祖為江夏太守時黄祖太子射賓客大㑹有獻鸚鵡於此洲故以為名江夏記蔡洲後漢蔡瑁字徳珪襄陽人家在蔡洲上屋宇甚好四牆皆以青石結角婢妾數百人别業四五十處漢末諸蔡最盛永嘉末其家猶富宗族甚強共保於洲上為草賊張如所敗一宗都盡襄陽耆舊長水校尉蔡瑁居之故名蔡洲洲大岸西有洄湖停水數十畝長數里廣減百步水色常緑楊儀居上洄楊顒居下洄與蔡洲相對水經魚梁洲沔水中有魚梁洲龐徳公所居士元居漢之隂在南白沙故世謂是地為白沙曲矣司馬徳操宅洲之陽望衡對宇懽情自接泛舟蹇裳率爾休暢豈待還桂柁於千里貢深心於永思哉上亶洲孫權遣衛温諸葛直將甲士萬人浮海求夷洲及亶洲在海中長老傳言秦始皇帝遣方士徐福將童男童女數千人入海求蓬莱神山及仙藥止此洲不還世世相承有數萬家其上人民時有至㑹稽貨布㑹稽東縣人海行亦有遭風流移至亶洲者所在絶逺卒不可得至但得夷洲數千人還吳志汎洲龍陽縣汎洲吳丹陽太守李衡植甘橘於其上臨死𠡠其子曰吾州里有木奴千頭不匱汝衣食嵗絹千匹襄陽記或曰昭潭無底橘洲浮橘洲每大水諸洲悉没而橘洲獨存焉湘中記益陽有昭潭其下無底湘水最深處也或謂周昭王南征不復沒於此潭因以為名上烈洲輿地志曰江寧烈洲吳舊津所也内有小水堪泊船商客多停以避烈風故以名焉王濬伐吳宿於此簡文為相時㑹桓𤣥之所也亦曰溧洲洲上有山山形似栗伏滔北征賦謂之烈洲丹陽記羅公洲始興城西百餘步有棲霞樓臨川王營置清暑遊焉羅君章居之名為羅公洲樓下洲上有果竹交映長楊傍映髙梧前竦雖即城隍趣同丘壑始興記加子洲三十國春秋曰晉咸和二年温嶠與陶侃起義兵伐蘇峻帥師四萬直指石頭侃泊加子洲夏月堪泊船冬月淺涸自永昌之初其洲忽一朝崩陷數里隨其形曲折凡作九灣行者所依東西浩然矣丹陽記不滿百枝江縣西至上明東及江津其中有九十九洲楚諺曰洲不滿百故不出王者桓𤣥有問鼎之志乃増一為兩以先百數僣號旬時身屠宗滅及其傾覆淵亦消毁至宋文帝在藩忽生一洲果龍飛江表元兇之禍此洲還没荆州記水中有岸殷仲堪游於江濱見流棺接而葬焉旬日間門前之溝忽起為岸其夕有人通仲堪自稱徐伯𤣥云感君之恵無以報也仲堪因問門前之岸是何祥乎對曰水中有岸其名為洲君將為州言終而沒至是果臨荆州晉書門前生洲張興世居臨沔水自襄陽以下至于江二千里先無洲嶼興世初生當其門前水中一旦忽生洲年年漸大及興世為方伯而洲上遂十餘頃南史市橋生洲宋泰始中益州市橋忽生小洲道士邵碩見之曰當有貴王臨州宋滅後有王勝憙来作此州齊永明初不復用諸將為益州始以始興王鑑為益州刺史督益寧二州軍事加鼓吹一部勝憙反語為始興碩言於此乃驗上長命洲潤洲長命洲梁武放生處後魏使李諧来聘武帝問曰彼國亦放生否諧曰不取亦不放帝大慙郡國志洲生忽沒髙繼沖時李景威云舊傳江陵諸處九十九洲滿百則王者興自武信王之初江心深浪中忽生一洲昨此洲忽漂没若可憂也繼沖遂以納款九國志朱崖洲朱崖在大海中遥望朱崖洲大如茵舉帆一日一夜至洲周迴二千里徑度七八百里可十萬家女多姣好長髪美鬢王隠晉書郁洲東北海中有大洲謂之郁洲山海經所謂郁山在海中者也言是山自蒼梧徙此云山上猶有南方草木故崔季珪之叙述初賦言郁洲者故蒼梧之山也心悦而怪之聞其上有仙士石室也乃往觀之見一道人獨處休休然不談不笑顧非己及也水經十洲漢武帝既聞王母説八方巨海之中有祖洲瀛洲𤣥洲炎洲長洲元洲流洲生洲鳳麟洲聚窟洲有此十洲乃人跡所稀絶處又知非世常人是以延之曲室而親問十洲所在所有之物名故書記之十洲記谿谿谷宋均曰無水曰谷有水曰谿前溪前溪烏程縣東南流入太湖謂之風渚夾溪悉生箭箬後溪在市北餘不亭晉車騎將軍沈充家於前溪樂府有前溪曲則充之所製其詞云當曙與未曙百鳥啼忩忩後宋少帝續為七曲其一曲曰憂思出門户逢郎前溪渡莫作流水心引新都捨故寰宇記五雲溪歐冶子鑄劍處下有孤潭深而青有孤石聳出潭上有大櫟樹客兒與弟恵連作詩聨句刻於樹上唐吏部侍郎徐浩遊之云曽子不居勝母之閭吾豈遊若耶之溪遂改為五雲溪郡國志任公溪歙縣有昉村俗説任昉為新安太守因行春至此愛其雲溪緣源尋幽累日不返百姓因名其溪為昉溪溪旁村為昉村村旁有山近故北野縣每山上石墜則不利縣官縣廢後其事亦止大中十年刺史盧藩改曰任公村任公溪寰宇記好溪處州東十里有惡溪多水怪宣宗時刺史段成式有善政水怪潜去民謂之好溪地理志温涼二谿山隂縣西四十里有二谿東谿廣一丈九尺冬暖夏冷西谿廣三丈五尺冬冷夏暖二谿北出行三里至徐村合成一谿廣五丈餘而温涼不雜水經注百管谿百管谿周迴丈餘水極沸涌如猛火煎油聲裴氏廣州記武谿武溪水源出武山東南流注于沅故為歌曰武溪深復深飛鳥不能渡遊獸不能臨善歌録康王谷廬山有康王谷昔秦始皇并吞六國楚康王隠避於此故名内有水簾洞宋王禹偁序畧云康王谷為天下第一水簾髙三百五十丈計程且一月矣其味不敗取茶煮之浮雲散雪之狀與井泉殊絶陸羽留題有瀉從千仞石寄逐九江船之句統志康王谷巔有一城號為釗城天每欲雨輒聞山上鼓角簫笳之聲聲漸至城而風雨晦合村人以為常候傳云此周康王之城康王愛竒好異巡歴名山不逺而至城中每得古器大鼎及弓弩金玉之屬知非常人之所處也而山有康王之號城又以釗為稱斯言將有徵述異記按楚康王在周靈王時始皇所虜乃負芻也志大誤金谷梓澤在王城西北三十里與金谷相近輿地志梓澤即金谷也有金水出焉故謂之金谷晉石季倫别墅在焉郡國志余有别廬在河南縣界金谷澗中或髙或下有清泉茂林衆果竹柏藥草之屬莫不畢備又有水碓魚池土窟其為娯目歡心之物備矣時征西大將軍祭酒王詡當還長安余與衆賢共送往㵎中晝夜遊宴屢遷其坐或登髙臨下或列坐水濱時琴瑟笙筑合載車中道路並作及住令與鼓吹遞奏遂各賦詩以叙中懐或不能者罰酒三斗感性命之不永懼凋落之無期故具列時人官號姓名年紀又寫詩著後後之好事者其覽之哉凡三十人石崇金谷詩叙謝公云金谷中蘇紹最勝紹是石崇姊夫蘇則孫愉子也世説大谷鞏縣東五里有大谷張衡東京賦曰孟津達其後大谷通其前陳思王洛神賦曰經通大谷潘岳閑居賦曰張公大谷之梨皆謂此也十道志幽棲谷韋嗣立營别第驪山鸚鵡谷帝臨幸命從官賦詩製序冠篇况優備因封嗣立逍遥公賜名所名曰清虚原幽棲谷翰林志郎君谷王龜侍父至河中廬中條山朔望一歸省州人號郎君谷唐書王官谷司空圖居中條山王官谷時寇盜所過殘暴獨不入王官谷上津九津禹東至摶木之地日出九津青羌之野鳥谷青邱之鄉南至沸水漂漂九陽之山西至飲露吸氣之民積金之山北至夏海之窮衡山之上積水積石之山不有懈墮吕覽三津勾踐入吳吳王赦之歸國范蠡執御至三津之上仰天長歎淚下沾襟曰嗟乎紹之屯厄誰念復生渡此津也吳越春秋竇津漢武㣲行栢谷遇辱竇門又感其妻深識之饋既返玉階厚賞賚焉賜以河津令其鬻渡今竇津者是也故潘岳西征賦酬匹婦其已泰胡厥夫之謬官水經注君子津雲中定襄之間有津曰君子濟漢桓帝十三年西幸榆中東行代地洛陽大賈齎金貨隨帝後行夜迷失道往投津長曰子封送之渡河賈人卒死津長埋之其子尋求父喪發塚舉尸資費一無所損其子悉以金與之津長不受事聞於帝曰君子也即名其津為君子濟水經注白馬津舊東郡白馬縣神馬亭有神馬寺去白馬津可二十里許東南去白馬縣故城可五十里開山圖所謂白馬山也山上常有白馬羣行悲鳴則河決馳走則山崩上河過黎陽縣南為白馬津石勒號為靈昌津上灣清灣清灣在縣東南七里隋開皇中太守梁文謙涖官清潔取此灣水以自供後人思其徳號為清灣鄱陽記百家灣徐温嘗自迎鑾還至百家灣暴風起舟人相顧失色温乃袒裼以帛繫璟首顧謂妾御曰吾善遊儻溺不暇相救幸保此子言訖風浪漸息九國志白璧灣沅水東歴臨沅縣西為明月池白璧灣灣狀半月清潭鏡澈上則風籟空傳下則泉響不斷行者莫不擁檝嬉遊徘徊愛玩沅水又東歴三石㵎鼎足均峙秀若削成其側茂竹便娟致可翫也水經注三原灣樂城縣三原亭去郡百二十里溪水清如鏡曩昔有得一死鮎者䰇大五六圍一鬐輒得數十斛鮓此灣無所不容有人能食者常自譬腹如三原灣無所不容永嘉郡記浦南浦南浦在江夏縣南三里離騷曰送美人兮南浦其源出京首山流入大江春冬涸竭秋夏泛漲商旅往来皆於浦停泊以其在郭之南故稱南浦江夏記送君南浦傷如之何别賦水際上虞縣有石駞步水際謂之步也𤓰步在吳中吳人賣𤓰於江畔因以名也江中有魚步龜步湘中有靈妃步按吳楚間謂浦為步盖語訛耳述異記沙流沙流沙在玉門闗外南北二千里東西數百里有三斷名曰三隴廣志沙城曹操征馬超隔渭水婁子伯説曰今天寒可起沙為城以水灌之可一夜而成曹瞒傳沙長吳富春縣有江沙漲武烈為郡吏赴府鄉人餞之㑹於沙上父老曰此沙狹而長君後當為長沙太守後果然因名孫洲吳録地理志沙米袁州有水春交則上白沙如米於兩岸九十餘里呼為米沙若一岸徧米其方豐熟王孚記沙堆新昌水有一沙堆在縣東北五十里其形狀如覆船鮮浄特異每年豐稔其沙即堆積如舊若砂移向岸其年儉古来相傳以為常驗鄱陽記玉女沙緱氏有八風溪溪水南流合三交水岸有沙細潤可以澡濯隋代常進後宫雜以香藥以當豆屑號曰玉女沙寰宇記沙鳴沙州天氣晴朗即沙鳴聞於城内又云人遊沙山結侣少或未曽遊即生怖懼莫敢前其沙或隨人足自頓下經宿却自還山上河西舊事鳴沙山一名神沙山其山積沙為之峯巒危峭踰于山石四面皆為沙壠背有如刀刃人登之即鳴隨足墮落經宿風吹落輒復如舊地理志有一泉水名曰沙井綿歴古今沙填不滿水極甘美上沙角山河西有沙角山峯崿危峻逾於石山其沙粒粗色黄有如乾糒又山之陽有一泉云是沙井綿歴今古沙不填之人欲登峯必步下入穴即有鼓角之音震動人足三秦記泉異名水本曰源源曰泉正直上出曰檻泉從上溜下曰下泉湧出曰濆泉側出曰氿泉泉所出同所歸異曰肥泉異出同流曰瀵泉爾雅詩注醴泉醴泉水之精也味甘如醴王者循理則出符瑞志神農脩徳作耒耜地應以醴泉禮含文嘉黄帝之時以醴泉為漿徐整正厯醴甘也取名醴酒尭祇徳匪懈醴泉出文命盛徳俊義在官醴泉出山尚書中候成康之隆醴泉湧出春秋命厯序禹本紀言河出崑崙其上有醴泉瑶池史記太山之東有醴泉其形如井本體石也欲取飲者皆洗心跪而挹之則泉出如流多少足用若汗慢則泉縮焉盖神明之異常者也法苑珠林太公泉汲縣北三十里有太公泉泉上又有太公廟廟側髙林秀木翹楚競茂相傳云太公之故居也城西北有石夾水飛湍迅急人亦謂之磻溪言太公常釣於此也太公避紂之亂屠隠市朝遁釣魚水何必渭濱然後磻溪茍愜神心曲渚則可磻溪之名斯無嫌矣水經注盜泉孔子至于勝母縣暮矣而不宿過于盜泉渴矣而不飲惡其名也尸子水名盜泉仲尼不飲里名勝母曽子斂襟論語撰考䜟盜泉在泗水縣源出髙徑山之隂元和志温泉驪山湯舊説以三牲祭乃得入可以去疾消病俗云秦始皇與神女遊而忤其㫖神女唾之則生瘡始皇怖謝神女為出温泉而洗除後人因以為驗三秦記凡水源有石流黄其泉則温或云神人所煖主療人疾博物記驪山湯初始皇砌石起宇至漢武又加脩飾焉漢武帝故事拔劍泉漢髙帝入彭城嘗聞於徐州為楚所困漢兵渇乏帝以劍挿地拔即泉湧出至今水不溢旱不枯土人呼為龍湫五泉蘭州五泉水在臯蘭山下泉有五眼瀑布飛瀉潺然可聽衆流成溪灌溉甚博俗謂霍去病以鞭卓之而出者志酒泉福祿城謝艾所築下有金泉味如酒故曰酒泉西河舊事漢宣帝時開泉味如酒故以名縣方輿記金泉出數穴清澈無底雲陽宫記有人飲此泉水見有金色從山中照水往取得金故名雍州記貪泉吳隠之字處黙介立有清操桓𤣥欲救嶺南之弊以隠之為廣州刺史未至州二十里地名石門有水曰貪泉飲者懐無厭之欲隠之既至語其親人曰不見可欲使心不亂越崖喪清吾知之矣乃至泉所酌而飲之因賦詩曰古人云此水一㰱懐千金試使夷齊飲終當不易心及在州清操愈厲晉書石門之水俗云經大庾則清穢之氣分飲石門則緇素之質變即吳隠之酌飲之所也南越志隠之罷郡見妻箧中有沈香一斤遂投石門内水中後人謂之沈香浦亦曰投香浦寰宇記横流溪溪水甚小冬夏不乾俗以為貪泉飲者輒冒於財賄同於廣州石門貪流矣㢘介為二千石則不飲之昔隠之挹而不辭豈為能溷其真乎盖亦惡其名也水經注聰明泉潯陽縣落星山澗有五松橋昔恵逺法師與殷仲堪席㵎談易于此而樹下泉湧號聰明泉寰宇記永新有聰明泉水自山湧出古今學者飲之多成事土人謂之聰明泉上孝感王彭旴􅇇人少喪母元嘉初父又亡家貧力弱營葬鄉人助作磚磚須得水天旱穿井數十丈無水一旦磚竈前忽生泉用之事畢復竭助者嗟嘆元嘉中改其里為通靈里沈約宋書安金蔵長安人為太常丞初喪母寓葬於都南闕口之北廬於墓側躬造石墳石塔晝夜不息原上舊無水忽有湧泉自出唐書太極泉宋孝武大明七年赦詔曰思散太極之泉以福無方之外志含文嘉曰禮天子靈臺為萬物獲福于無方之源招太極之清泉以與稼穡之根後樂志注一仙藥有太極井泉酉陽雜俎狂泉宋袁粲嘗謂周旋人曰昔有一國國中一水號曰狂泉國人飲此水無不狂惟國君穿井而汲獨得無恙國人既並狂反謂國主之不狂為狂於是聚謀共執國主療其狂疾火艾針藥莫不畢具國主不任其苦於是到泉取酌水飲之飲畢便狂君臣大小其狂若一衆乃歡然我既不狂難以獨立比亦欲試飲此水矣南史本傳梁泉蘭州狄道縣有梁泉昔梁暉者後周之將為羣羌圍於白石山無水暉以所執鞭卓地以青羊祈山神而飛泉湧出榆木成林郡國志玉漿盧勣隋初拜渭州刺史甚有恵政鳥鼠山俗呼為髙武隴其下渭水所出其山絶壁千尋由来乏水諸羌苦之勣馬足所踐忽飛泉湧出有白鳥翔止㕔前而乳民為之謡曰我有丹陽山出玉漿濟我民夷神鳥来翔百姓因號其泉為玉漿隋書汲食馮立唐太宗時出牧南海前後牧守率多貪冒蠻夷患之數為叛逆立不營生業衣食取給而已嘗至貪泉歎曰此吳隠之所酌泉也飲一盃何足道哉吾當汲而為食畢飲而去唐新語温泉天寶六載更温泉曰華清宫地理志上於華清宫新廣一湯制度宏麗安祿山於范陽以白玉石為魚龍鳬鴈仍以石梁及石蓮花以獻雕鐫巧妙殆非人工上大悦命陳於湯中仍以石梁横亘湯上而蓮花纔出水際上因幸華清宫至其所解衣將入而魚龍鳬雁皆若奮鱗舉翼狀欲飛動上甚恐遽命撤去而蓮花今猶存又嘗於宫中置長湯數十間屋環回甃以文石為銀樓谷船及白香水船致於其中至於楫棹皆飾以珠玉又於湯中壘琴瑟及沈香為山以狀瀛洲方丈明皇雜録聖應泉楊朝晟正元中為邠寧節度使請城方渠合道木波以遏吐蕃路師次方渠無水師徒囂然遽有青蛇乗髙而下視其跡水隨而流晟使築防環之遂為渟泉軍人仰飲以足圖其事上聞詔置祠焉命泉曰聖應二唐書噴玉夀安縣有噴玉泉石溪皆山水之絶勝也貞元中李賓客詞為縣令乃剗蘙薈開徑隧人方聞而異焉太和中博陵崔蒙為主簿標堠于道周人方造而遊焉傳載半月泉李紳題法華山天衣寺詩殿湧全身塔池開半月泉此泉隠於岩下雖月圓池中止見其半最為佳處紹興初愚秃法聰遂鑿開巖上易名滿月池泉甚可惜也西溪叢語吳興徳清慈相寺石壁下有半月泉晉咸和僧曇卓庵其處鑿石罅如半月得泉清涼甘美名曰靈泉後人即其形似更名半月覆亭其上西吳記甘泉澤州髙平有甘水一曰甘泉貞元元年令明濟引入城號甘泉有省寃谷本殺谷𤣥宗幸潞州過之更名豊州西受降城北三百里有鸊鵜泉地理志上善泉坊州中部州郭無水東北七里有上善泉開成二年刺史張怡架水入城以紓逺汲四年刺史崔駢復増脩之民獲其利後思之為立祠上明月泉吳洞庭山縹緲峯下有泉唐天祐四年刺史曹珪以明月名之蘇志金沙泉金砂泉在顧渚山碧泉湧砂粲如金星唐學士毛文錫有記唐貢泉用二銀瓶其泉煮茶則味極嘉不與他泉比昔人逺相寄遺用瓶貯泉取泉畔小石養之則日久不壊西呉記湖州長城縣啄木嶺金沙泉每嵗造茶之所居常無水湖常二郡守至境具牲祭泉其夕清溢造御茶畢其水即㣲減太守造畢即涸太守或還斾稽期則示風雷之變或見鷙獸毒蛇水魅焉張君房脞説祈泉西蜀將王暉任集州刺史城中無水泉值岐兵攻城且絶其水路城内焦渇王公乃中夜祈請神祇及寐夢一老父告曰州獄之下當有靈泉王驚寤遲明亟命畚鍤于所止之處掘之乃有泉流居人蒙活甚衆岐兵以城中無水將坐俟其斃王公命汲泉水于城上揚而示之其寇乃去是日神泉亦竭玉堂閒話禱泉宋思禮蕭縣簿㑹大旱井池涸母羸疾非泉水不適口思禮憂懼具禱有泉出諸庭味甘寒日不乏汲縣人異之唐孝友傳瀑泉司空圖舊隠三峯天祐末移居中條山王官谷周迴十餘里泉石之美冠於一山北巖之上有瀑泉流注谷中溉田田數十畝至今子孫猶存為司空之莊耳南部新書玉醴瀛洲有玉石髙且千丈出泉如酒味甘名之為玉醴泉飲之數升輒醉令人長生十洲記八泉靈池山在翁源縣上有八泉曰湧泉曰甘泉曰温泉曰震泉曰龍泉曰玉泉曰衡泉水衡記榮泉漢書赤雁歌象載瑜白集西食甘露飲榮泉注榮泉言泉有光華白泉泉色白自出山澤得禮制則澤谷之白泉出飲之使人長夀瑞應圖玉泉崑崙及蓬莱其上鳥獸飲玉泉皆長生不死也抱朴太𤣥泉恒山有太𤣥泉神草十九種服之可度世五岳圖赤泉英泉員邱之山上有赤泉飲之不老神宫有英泉飲之眠三百嵗乃覺不知死括地圖帝之神泉崑崙四水者帝之神泉以和百藥以潤萬物淮南子孔子泉城東北三百步有孔子泉其水甘馨雖帝漿無以過也荆州記龍泉山西有龍泉精舎初逺法師遣諸道人行卜地息此而渇法師因以杖掘地即泉出天旱法師令道人讀海龍王經泉中有物如蛇而出角騰空中去須臾而雨周景式燕山記靈泉河東霍太山有嶽廟甚靈鳥雀不棲其林猛虎常守其庭又有靈泉以供祭事鼔動則泉流聲絶則水竭湘東隂山縣有候曇山上有靈壇經前有石井深數尺居常無水及臨祈禱則甘泉湧出眉川則已亦其比也水經注湯泉張勃吳録曰丹陽江乗縣有湯山湯出其下大小凡六處湯㵎繞其東西冬夏常熱禽魚之類入者輒爛以煮荳糓終日不熟草木濯之輒更鮮茂舊有湯泉者今廢寰宇記舒姑泉臨城縣南四十里有盖山登百許步有舒姑泉昔有舒氏女與其父斫薪於泉處坐牽挽不動父還告家比還唯見清泉女母曰吾女本好音樂乃絃歌泉湧泪流見朱鯉一雙今作嬉戲泉故涌出宣城記金線泉齊州城西有金線泉澄澈見底池心南北有金線一道㣲起水面以油滴之則線文還云或以杖亂之則線輒不見水止如故天隂亦不見湘山野録妒女泉太原廣陽有妒女泉初出大如車輪水色清碧傍有祠土人視之婦人袨服靚妝必興雨雹故曰妒女故老相傳此泉中有神似鼈晝伏夜遊神出水隨水而湧元和志潮泉雞籠山下㵎中有數十處累石若有人功水常深天餘朝夕輒有湧泉溢出如潮水時刻不差前望尤大號為潮泉常如沸湯潯陽記交旋如盤龍允街縣有泉泉眼中水交旋如盤龍或撓破之尋手成龍狀畜生將飲者皆畏避而走謂之龍泉水經注灌田郴州温泉下流有田資以灌溉常十二月下種至明年三月新榖便登也相感志雌雄梁山縣多喜山有雌雄二泉一名浴丹井夏春則左盈右竭秋冬則右盈左竭聖泉蜀武陽有聖泉其水碧色患瘡疾者洗之多愈投銀即成金色孕婦飲之墮胎俗以為聖泉寰宇記田公泉華陽雷平山有田公泉即栁汧泉一名栁谷泉飲之除腹中三蟲與隠泉水味同云是玉沙之流津也用以浣衣不用灰以此為異盖古有田叔者居雷平山後得道名泉以此酉陽雜俎石泉譙郡有功曹􅔠天統中濟南来府君出除譙郡時功曹清河崔公恕弱冠有令徳於時春夏積旱送别者千餘人至此􅔠上衆渴甚思水升直萬錢矣来公有思水色恕獨見一青烏於􅔠中乍飛乍止怪而就焉烏起見一石方五六寸以鞭撥之清泉湧出因盛以銀瓶瓶滿水立竭唯来公與恕供療而已議者以為盛徳所感致焉時人異之故以如此上鹿泉韓信將下趙聞陳餘不用李左車之計引兵方出井陘口師患無井筮之得蒙知山下有泉焉信遣胡將周而索之見二白鹿跑地有泉湧出后人於泉左立胡王祠祀之金周義記神泉燉煌有懸泉一名神泉出龍勒山腹梁州異物志云漢貳師將軍李廣利伐大宛還士衆渇乏廣利乃引佩刀刺山飛泉湧出三軍賴以獲濟今有祠甚嚴郡侯嵗謁寰宇記紅泉謝靈運山居賦飄丹砂於紅泉又題華子岡銅陵映碧澗石磴瀉紅泉玉女投泉新陽縣恵澤中有温泉冬月未至數里遥望白氣浮蒸如烟上下采映狀若綺疏又有車輪雙轅形世傳昔有玉女乗車自投此泉今人時見女子姿儀光麗往來倐忽荆州記飛泉夷道縣句將山下有三泉傳云本無此泉居者皆苦逺汲人人多賣水與之有一女子孤貧繿縷無以貿易有一乞人衣麄貌醜瘡痍竟體村人見之無不穢惡唯女子獨加哀矜割飯飴之乞人食畢曰我感姬行善欲思相報為何所須女荅曰何恩可報且今所須之物非君能得因問所須女子曰正願此山下有水可汲乞人乃取腰中書刀刾山下三處即飛泉涌出因便辭去忽然不見上徳潤泉雍熈二年五月癸酉鳳翔府言岐山縣周公廟有泉忽涌出耆舊相傳時平則流世亂則竭唐安史之亂泉竭至大中年復流號徳潤泉自後又涸今忽湧清澄甘潔甚異於常因圖之以進晏殊為賛曰隠顯以時靈符孔彰玉海神泉廬山錦繡峯下有神泉宋紹興間皇甫履隠斯山髙宗名其居曰清虛菴光宗在東宫問履所乏履曰但水差逺光宗持書神泉二字履持歸菴傍穿小井方施畚鍤而泉遂出故名九江志井解井清也泉清潔者也釋名井通也物所通用易傳周云井以不變更為義師説井以清潔為義字林井深也廣雅井法也節也言法制居人令節其飲食無窮竭也風俗通作井黄帝始穿井周書伯益作井世本昔者蒼頡作書而天雨粟鬼夜哭伯益作井而龍登𤣥雲神棲崑崙淮南子九井隋郡重山有一穴父老相傳云神農所生地中有九井相傳神農既育九井自穿又云汲一井則衆井水動即以地為神農社年常祀之荆州記老子井襄邑縣南瀨鄉老子之舊鄉也有老子廟廟中有九井能潔齋入祠者水温清隨人意念幽明録玉羊魯哀公使人穿井三月不得泉得一玉羊哀公甚懼孔子曰丘聞水之精為玉土之精為羊此羊肝乃土耳公使人殺羊其肝即土也韓詩外傳季桓子穿井獲如土缶其中有羊焉使問之仲尼曰吾穿井而獲狗何也對曰以丘之所聞羊也丘聞之木石之怪曰䕫蝄蜽水之怪曰龍罔象土之怪曰墳羊國語抱罋子貢過漢隂見一丈夫方將為圃畦鑿隧而入井抱罋而出灌子貢曰有械於此後重前輕汲水若抽名曰桔槹日浸百畦用力少而見功多子不欲乎圃者曰有機事必有機心機心存乎胸中則道之所不載也莊子得人宋丁氏無井常一人溉汲於外及自穿井喜而告人吾穿井得一人傳之者聞於宋君召問其故對曰得一人之使非得一人於井中也吕覽厄井板渚津津南原上有厄井父老去漢祖與楚戰敗走逃走逃此井追軍至見兩鳩從井中出故得免厄因名厄井西征記上有蜘蛛網因免郡國志灌嬰銘湓城灌嬰所築建安中孫權經此城自標井地令人掘之正得故井有石銘云漢六年潁隂侯所開卜云三百年當塞塞後不滿百年當為應運者所開權見銘欣悦以為己瑞時咸異之井甚深大江有風浪此井輒動土人呼為浪井尋陽記買傅井湘州南寺之東賈誼宅有井水而深上斂下深狀似壺即誼所穿井荆州記誼有井上圓下方寰宇記井竭朱博為御史大夫府吏舎百餘區井水俱竭長老異之後果廢焉漢書投轄陳遵嗜酒每飲賓客取轄投井中雖有急終不得去上通仙井益州嚴貞觀有通仙井相傳此井與廣漢綿竹君平宅井相通有人淘井得銅錢三徑可二寸因恍惚不安復投井中立愈或云此君平卜卦錢也井溢元帝時謡曰井水溢滅竈烟灌玉堂流金門至成帝北宫井泉溢王莽之徵也漢書拜井耿恭之攻匈奴以疏勒城傍有澗水可固五月乃引兵據之七月匈奴復来攻恭恭募先登數千人直馳之敵騎散走匈奴遂於城下擁絶澗水恭於城中穿井十五丈不得水吏士渴乏笮馬糞汁而飲之恭仰歎曰聞昔貳師將軍拔佩刀刺山飛泉涌出今漢徳神明豈有窮哉乃整衣服向井再拜為吏士禱有頃水泉奔出衆皆稱萬嵗恭親自挽籠於是令士且勿飲先和泥塗城并揚示之敵出不意以為神明遂引去後漢其水名懸泉有靈車馬大至即出多小至即出少元和志李嗣業為疏勒鎮使漢耿恭故井久涸禱已泉復出唐書飲牛淳于恭門側有井鄉里小兒争飲牛恭惡之多致水器汲水滿之東觀漢記設器管寧所居屯落㑹井汲水或男女錯雜或争井鬭鬩寧患之乃多買器分置井傍汲以待之又不使知来者得而怪之問知寧所為乃各相責不復鬭訟髙士傳井有丹砂臨沅縣有廖氏家世世夀考後子孫徙去轉多夭折他人居其故宅復累世夀考乃知是宅之所為而不知何故疑其井水殊赤乃試掘井左右得古人埋丹砂數十斛去數尺此丹砂汁因泉漸入井是以飲其水而得夀抱朴子綺欄明帝九龍殿前為玉井綺欄蟾蜍含受神龍吐水魏畧緑珠井白州雙角山下有緑珠井昔梁氏之女有容貌石季倫為交趾採訪使以圓珠三斛買之梁氏之居舊井存焉耆老傳云汲飲此水者誕女必多美麗里閭有識者以美色無益於時遂以巨石填之邇後雖時有産女端嚴則七竅四肢多不完全異哉州界有一流水出自雙角山合容州畔為緑珠江亦猶歸州有昭君村村盖取美人生處名矣嶺表録異七靖井晉永嘉中旌陽令許遜嘗煉丹於艾城之黄龍山有蛟魅為淵藪輒作洪水欲漂丹室遜擒之釘于石壁還郡時海昏有巨蛇據山為穴吐氣為雲遜誅之法北斗七星每擒置一靖井以鎮之讃曰海昏之地府當陽南昌之州龍安之場上繚艾縣古城之岡地連蛇穴侵截川江占其地土防民之殃于今立靖萬古吉祥地理志讓飲阮瞻嘗羣行冒熱渴甚逆旅有井衆人競趨之籍獨逡巡在後須臾飲者畢乃進其夷退無競如此晉書三龍謝晦字宣時宅南路上有古井以元嘉二年汲者忽見三龍甚分明行道往觀莫不嗟異有人入井始知是塼隠起作龍形異苑沸井昇平二年延陵季子廟沸井之北北忽聞金石聲疑有異鑿深三尺得沸井奔湧若浪其地又響即復鑿之又得一井涌沸亦然井中得一木簡長一尺廣二分上有隠起字曰廬山道人張陵再拜謁簡大堅白字色乃黄南史出錦南齊時荆州城東天子井出錦于時士女取用與常錦不異經月乃歇呉均齊春秋買水梁何逺為武昌太守武昌俗皆汲江水盛夏逺患水温毎以錢買人井寒水不取錢者則連水還之南史玉井河間王琛置玉井金罐以金五色績為繩伽藍記王鉷以寶鈿為井唐書祝井三國典畧曰東魏以平鑒為懐州刺史鑒乃于故軹開道築城以防西軍尋西魏驃騎將軍楊􅋆議同長孫慶明率兵東伐是時新築之城少糧乏水衆情大懼内有一土井隨汲即乾鑒乃整衣冠俯井而祝俄而泉湧城内皆足揚水示􅋆􅋆無功而退北史亦載政感房豹字仲幹遷樂陵太守風教脩理稱為美政郡瀕海水味多醎苦豹命鑿一井遂得甘泉遐邇以為政化所致豹罷歸後井味復鹹北史得船烏山下無水魏末有人掘井五丈得一石函函中得一龜大如馬蹄積炭五枝於函傍復掘三丈遇盤石下有水流洶洶然遂鑿石穿水北流甚駛俄有一船觸石而匠人窺船上得一杉木板板刻字曰吳赤烏二年八月十日武昌王子義之船景陽井景陽井陳末后主與張麗華孔貴嬪投其中以避隋兵舊𫝊云欄有石脉以帛拭之作胭脂痕一名胭脂井一名辱井在法華寺聖井吳興長興廣恵寺左有五井晉永嘉中邑人陳氏所穿陳武帝初生其一井泉湧出家人汲以浴之後相傳謂之聖井井歎武后時來俊臣家井中夜有嗟吁怨歎聲五行志韓公井唐韓朝宗為襄州刺史城有昭王井言汲者死人雖渴而不敢視朝宗移書論神自此飲者無恙號韓公泉思復傳十丈建中時韓滉為潤州刺史涇師之亂徳宗出幸滉以國家多難恐有永嘉渡江之事置館第數十於石頭城以為備預亦申儆自守也城中穿深井十丈近百所下與江平令丘涔督其役先賢坵墓多令毁廢舊唐開井李臯字王蘭貞元初為荆南節度使荆至樂鄉凡二百里旅舎鄉聚凡十數楚俗佻薄不穿井飲陂澤臯始命合錢開井以便人上井竭貞元時夀州隨軍王迪家井忽然沸溢十日又竭見底井有聲如嬰兒之聲至四月兄弟二人盲又一人死家事狼狽之應也祥集驗井漲集賢張希復言初授新州將拜相井忽漲才深尺餘酉陽井大賈躭在滑臺于城北命築八角井以鎮黄河於是潜使人於鑿所偵之有一老父来觀問曰誰鑿此井曰賈相公也父曰大好手但近東近西近南近北也躭聞之曰是井太大也惜哉玉泉子躭自記云滿城控白馬之津邇斥鹵之溢里居者井無良焉掘井宜視水脈因便道求美泉得之於城濠之右開成八隅合為一甃寰宇記聖瑞穆宗有事於南郊將謁太清宫長安縣主簿鄭翦侍立於御院之西序見白衣老人云此下有井正值黄帝過路汝速實之不然罪在不測翦惶懼使脩之其處已陷數尺發之則古井也驚顧之際已失老人所在功徳使護軍中尉劉𢎞規奏之帝至宫朝獻畢赴南郊于宫門駐馬宰臣及供奉官稱賀遂命翰林學士韋處厚撰記令起居郎栁公權書於實井之上名曰聖瑞感應紀仍賜鄭翦緋衣唐統紀墜井白樂天之母因看花墜井後有排擯者以賞花新井之作左遷穆皇嘗題柱曰此人一生争得水喫南部新書投珠王涯作相日庭穿一井金玉為欄嚴其鎖鑰天下寶玉珍珠投置其中汲其水供飲後廣津被刑其骨肉之色並如金獨異志鷄聲開成末永興坊百姓王乙掘井過常井一丈餘無水忽聽向下有人語及鷄聲甚喧鬧近如隔壁王乙懼不敢掘酉陽愈目吳興餘不鄉韶村梁天監五年青州刺史沈子真宅一夕鐘磬自鳴堂前井中放出毫光八道俄有龍騰空而去子真遂捨宅為八聖寺吳越王鏐嘗病目取此井水洗之即愈因賜旃檀作井欄西吳記鑿井八十牛存節為鄜州留後劉知俊叛奔李茂貞朱友珪立朱友謙叛附于晉西連鳳翔存節東西受敵同州水鹹而無井知俊叛梁以渇不能守而走故友謙與岐兵合圍持久欲以渇疲之存節禱而擇地鑿井八十水皆甘可食友謙卒不能下五代史銀葉護井髙郁起于行陣為楚馬殷謀臣貪而且僣嘗以所居之井不甚清澈思所以澄汰之乃用銀葉護井其四方内外皆然謂之拓裏五代史補御井善和坊舊御井故老云非可飲之井地卑水柔宜用濯開元中以駱駝䭾入大内以給六宫國史補香井太山有上中下三廟廟前有大井水極香冷異於凡水不知何代所掘從征記司命廣州記曰鬱林郡有石井半甘半淡潜通江波冬夏常盈名曰司命井周給闔境也其井水竭即土人疫稼穡不登以為候寰宇記二色井廬陵城中有一井中有二色水半青半黄黄者灰汁取作糜粥皆作金色土人名灰汁為金因名金井異物志宋永初山川記史宏水井賦廬陵之瑞空存二色之名明義井明義樓南有明義井夏有冷漿甘飲米飯羅扇綾扇羽扇有三浴堂上以浴王侯宰吏中以浴君子上流下以浴庶類也三伏之日炎暑赫曦男女行来其氣短急望見義井則喜不可言未至而憂既至而樂號為歡樂井夀陽記療病宋時雍邱莱園人浚井得石刻銘云漢代功臣銘隠在秦城井得到靖康春方顯千嵗景金賊亂天下諸賊皆來并甕下有甘泉能療千年病侯鯖録銀牀古舞曲曰淮南王自言尊百尺髙樓與天連后園鑿井銀作牀金瓶素綆汲寒漿許彦周言嘉祐時河濱人網得一石刻詩曰雨滴空階曉無心換夕香井梧花落盡一半在銀牀井幹井上木欄也字亦作韓其形四角或八角又謂之銀牀皆井欄也井謎鮑照井謎曰一八四八飛泉仰流盖合則五八五八四十也四十為井字一本載云二八三八錢昭度食梨詩云二八飛流繞齒寒井神故井之精名觀狀如美女好吹簫以其名呼之即去白澤圖一云井鬼名瓊穿井夀州刺史張士平中年以來夫婦皆瞽歴求方術不愈一旦有書生為開井一眼及得新水洗眼遂平復如初因留此法令轉救世人以救疾苦用増隂隲其要曰子午之年五月戌酉十一月夘辰為吉丑未之年六月戌亥十二月辰巳寅申之年七月亥子正月巳午夘酉之年八月子丑二月午未辰戌之年九月申未三月寅丑巳亥之年十月申酉四月寅夘取其方位年月日時即為福地浚井汲泉必有良效矣士平再拜受言訖升天而去書生太白星官也感遇傳蜀井廣陵蜀岡上大明寺西有井曰蜀井言水與西蜀相通茶品天下水有二十種而大明寺水為第七揚州賦注六井鄴侯家傳云杭州舊取陂湖貯水地暑多瘧痢乃深穿隂溝引錢塘湖水於郭内穿六井也六井覆以大屋皆得寒泉有餘則洩之於官河民遂無疾癘海録白居易為杭州刺史復浚李泌六井民賴其汲池停水孔安國曰停水曰池廣雅云沼池也風俗通曰孫子有金城湯池之説後人因此開地為池以養魚鼈圓曰池曲曰沼辟池豐鎬有天子辟池索隠曰即周天子辟雍之地史封禪書𤣥池穆天子西征至于𤣥池三日休于𤣥池之上乃奏廣樂而歸是曰樂池傳瑶池穆天子觴西王母于瑶池之西王母為天子歌白雲之謡上昭華池齊景公出弋昭華之池韓詩外傳蘭池秦始皇㣲行夜出逢盜蘭池史記秦始皇作長池引渭水東西二百里南北二十里築土為蓬莱山刻石為鯨魚長二百丈三秦記鎬池秦始皇三十六年有人持璧遮使者曰為吾遺鎬池君史記昆明池昆明池漢武元狩三年所穿也初漢欲求身毒國為昆明夷所閉昆明有滇池方三百里名曰滇河漢將伐昆明以通身毒使謫卒伐棘上林象滇河作昆明池以習水戰漢書昆明池刻玉石為魚毎至雷雨魚常鳴吼鬐尾皆動漢世祭之以祈雨往往有驗西京雜記昆明池中有戈船樓船各數百艘樓船上建樓櫓戈船上建戈矛四角悉垂幡旄旍葆麾盖照灼涯涘上太液池建章宫北治大池漸臺髙二十餘丈名曰太液池中有蓬萊方丈瀛洲壺梁象海中神山龜魚之屬漢書日出暘谷浴於咸池至虞泉即暮此則象之三輔舊事酒池武帝作酒池以誇羌胡飲以鐵杯重不能舉皆抵牛飲太平寰宇記酒池北起臺天子於上觀牛飲者三千人在長樂宫秦始皇造武帝行船其中西京記酒池監於商辛追覆車而不悟西征賦濯龍池帝在濯龍池李雲傳鴻池漢威帝欲廣開鴻池趙典諌曰鴻池泛溉已且百頃猶復増而深之非所以從唐虞之約已遵孝文之愛人也帝納其言而止典傳浚儀有鴻池魏獻公射鴻于此寰宇記𤣥武池武帝還鄴作𤣥武池以肄舟師魏志靈芝池黄初三年十一月是嵗穿靈芝池四年五月有鵜鶘集池上詔曰詩人所謂汙澤也曹詩刺共公逺君子而近小人豈有賢智之士處於下位乎否則斯鳥何為而至魏志天淵池黄初五年穿天淵池魏志天淵池在洛陽池中有魏文帝九花叢殿基水經注明帝天淵池南設流杯石溝燕羣臣宋志芙蓉池魏文帝芙蓉池作詩乗輦夜行逰逍遥步西園文選濛汜池魏明帝鑿濛氾池種芙蓉於中張載賦激通渠於千金承瀍洛之長川髙陽池漢侍中習郁于峴山南依范蠡養魚法作養魚池邊有髙隄種竹當中築一釣臺是燕遊名處也將亡勑其兒必葬我魚池山簡為荆州時每臨此池未嘗不大醉而還曰此是吾髙陽池也人為之歌曰山公出何許往至髙陽池日夕倒載歸酩酊無所知時時能騎馬倒著白接離舉鞭問葛疆何如幷州兒疆家在幷州簡愛將也襄陽記天泉池晉孝武太元十年大旱井瀆皆渇大官供膳皆資天泉池宋書云明帝泰始二年天泉池白魚躍入御舟龔穎運厯圖孝武帝遊于清暑殿有一人黄衣自號天泉池神名淋岑君謂帝曰若見善待當福佑之帝恐怪投以佩刀神怒曰君為不道當使知之因不見遂聞鼓鼙之響而去帝乃請大沙門為齋夜轉誦見一臂長三丈來摸經案甚怪之後帝與宫妓泛龍舟飲宴于池有慢神色乃見形攀龍舟沈帝遂溺死圖經天池汾陽有天池在燕京山上周迴八里陽旱不耗隂霖不溢故老言常有人乗車風飄墮池有人獲車輪于桑乾泉後魏孝文帝以金珠穿魚七頭於此池放之後於桑乾原得穿魚猶為不信又以金縷拖羊箭射著此大魚久之又於桑乾河得所射箭山在嵐州静樂縣東北百四十里俗名天池曰祁連汭洽聞記隋煬帝嘗於池南置宫毎夜風雨吹破竟不成元和志祁連池秀容界有池三所在髙山之上清深不測相傳曰祁連池魏言天池也爾朱新興曽與其子榮遊池上聞簫鼓之音新興謂榮曰古老相傳凡聞此聲皆至公輔吾今年已衰暮當為汝耳汝其勉之魏書流觴池柰林西有都堂有流觴池堂東有扶桑海皆有石竇流於地下西通糓水東連陽渠亦與翟泉相連若旱魃為害糓水注之不竭離畢滂潤陽糓泄之不盈至於鱗甲異品羽毛殊類濯波浮浪如似自然也伽藍記咸池寳光寺園中有一海號咸池葭菼被岸菱荷覆水青松翠竹羅生其旁京邑士子至於良辰美日休沐告歸徵友命朋来遊此寺雷車接軫羽盖成隂或置酒林泉題詩花圃折藕浮𤓰以為興適上九龍洛中舊有靈芝九龍池魏太和中遷都洛陽經構宫極脩理街渠務窮隠發石視之嘗無毁壊之石工細宻非今知所擬亦竒為精至也遂因用之水經注積翠池太宗宴羣臣積翠池酣樂賦詩證賦西漢其卒章曰終藉叔孫禮方知皇帝尊帝曰證言未嘗不約我以禮本傳漢積翠池中有珊瑚隋閲散樂於東京芳華苑積翠池側隋樊子盖陪宴積翠池本草圖海池武后時鑒察御史王守慎避法官乞出家為僧釋名法成長安中於京兆西市疏鑿大坎號曰海池支分永安渠水注之以為放生之所穿池之際獲古石銘云百年為市而後為池自隋朝置都市至于時正一百年矣宋髙僧傳定昆池神龍中安樂公主恃寵請昆明池中宗不與主發怒自以家財别穿池號曰定昆池通典安樂公主西莊在延平門外二十里司農卿趙履温種殖將作大匠楊務㢘引流作沼延袤十數里時號定昆池景龍文館記曲江池曲江池本秦世隑州開元中疏鑿遂為勝境其南有紫雲樓芙蓉苑其西有杏園慈恩寺花卉環周煙水明媚都人遊翫盛於中和上已之節綵幄翠幬匝於堤岸鮮車健馬比肩繫轂上巳即錫宴臣僚京兆府大陳筵席長安萬年兩縣以雄盛相較錦繡珍玩無所不施百辟㑹於山亭恩賜太常及教坊聲樂池中備綵舟數隻唯宰相王使北省官與翰林學士登焉每嵗傾動皇州以為盛觀入夏則菰蒲葱翠栁隂四合碧波紅渠湛然可愛好事者賞芳辰翫清景聮騎攜觴纍纍不絶劇談録蓬池汴州開封縣有福源池本蓬池天寶六載更名福源並無漁採地理志凝碧池祿山犯闕王維等為賊所執一日逆黨大㑹于凝碧池以梨園弟子數百人奏樂支解雷海清王維時拘于菩提佛寺中聞之賦詩曰萬户傷心生野煙百官何日更朝天秋槐葉落空宫裏凝碧池頭奏管絃賊平維以此詩得免明皇雜録寶厯二年六月幸凝碧池觀魚㑹要魚藻池正元十三年七月壬辰浚湖渠魚藻池深五尺徳宗舊紀文石砌元載芸暉堂前有池悉以文石砌岸中有蘋陽花亦類于白蘋其花紅而且大有如牡丹更有碧芙蓉杜陽編蓬萊池憲宗嘗畋苑中至蓬萊池謂左右曰絳嘗以諌我今可返也其見禮憚如此李絳傳學士初上賜食皆蓬萊池魚鱠李徳裕詩注池底鋪錦文宗論徳宗奢靡云聞得禁中老宫人每引泉先于池底鋪錦王建宫詞曰魚藻宫中鎖翠娥先皇行處不曽多只今池底休鋪錦菱角鷄頭積漸多是也李石開城錄臨碧池敬宗寶厯二年六月辛酉觀魚於臨碧池敬宗紀九曲池杜亞拜淮南節度使泛九曲池曳繡為帆詫曰要當稱是林沼李衡曰未有錦纜云何亞大慙鑿深池李滿嘗鑿深池於府中客有過者召宴池上指其水曰蛟龍水怪皆窟於此盖水府也酒酣取坐上器擲池中因裸而入取其器嬉水上久之乃出治衣復坐意氣自若五代史九州池東都城有九洲池在仁智殿之南歸義山之北其池曲象東海之洲居地十頃水深丈餘魚鳥翔泳花卉羅植東京記内園有九江池國史志天生池宕渠披衣山上有雲山寺寺中有池去果州嘉陵江三十里江水或淺其池亦淺或漲其池亦漲號天生池寰宇記玉華池犍為牛鞞縣有玉女靈山東北有泉西北兩岸各有懸岩腹有石乳房一十七眼狀如人乳流下土人呼為玉華池每三月上巳日有乞子者漉得石即是男瓦即是女自古有驗上陂陂池也説文芍陂孫叔敖作期思之水灌雩婁之野淮南子叔敖作期思陂而荆土用贍意林楚大夫子思造芍陂皇覽鉗盧陂元帝建昭中邵信臣為南陽太守於穰縣南六十里造鉗盧陂累石為隄傍開六石門以節水勢澤中有鉗盧玉池因以為名用廣溉灌嵗増多至三萬頃後杜詩為守復脩其業時歌之曰前有邵父後有杜母通典其陂澤則有鉗盧玉池赭陽東陂南都賦鴻隙汝南舊有鴻隙大陂郡以為饒成帝時闗東數水陂溢為害翟方進為相與御史大夫孔光共遣掾行視以為決去陂水其地肥美省隄防費而無水憂遂奏罷之及翟氏滅鄉里歸惡言方進請陂下良田不得而奏罷陂云王莽時常枯旱郡中追怨方進童謡曰壊陂誰翟子威飯我豆食羮芋魁反乎覆陂當復誰云者兩黄鵠漢書建武中太守鄧晨欲脩復其功聞楊曉水脈召與議之楊曰昔成帝用方進之言尋而自夢上天天帝怒曰何故敗我濯龍淵是後民失其利多致飢困明府今興立廢業將有徵於此誠願以死効力晨大説因署楊為都水椽使典其事楊因髙下形勢起塘四百餘里數年乃立水陂成人譛楊言取錢晨繫楊於獄户自開械自解晨釋之出時日暮陂上有火光引前清徳之感也謝承書萬頃陂郭泰入汝南交黄叔度至南州先過袁奉髙不宿而去從叔度累日或以問泰泰曰袁奉髙之器譬諸汎濫雖清而易挹也叔度之器汪洋若萬頃之陂澄之而不清混之而不濁不可量也漢書僕射陂鄭州管城縣有僕射陂後魏孝文賜僕射李沖因以為名唐志月陂洛水自苑内上陽宫南瀰浸東注當宇文愷版築之時因築斜堤今東北流水衡作堰九所形如偃月謂之月陂河南圖經渼陂渼陂出終南山諸谷合朝一作胡公泉為陂十道志曰有五味陂陂魚甚美因誤名之唐寶厯二年勅渼陂令尚食使收管不得雜人採捕其水任百姓溉灌勿令廢碾磑之用文宗初詔並還府縣長安志藪藪藪之為言厚也有草木魚鼈所以厚養人君與百姓者也傳曰水草交錯名之為澤澤者言其潤澤萬物以阜民用者也風俗通大澤曰藪周禮職方注水鍾曰澤水希曰藪澤虞職大澤火藪注有水曰澤無水曰藪吕覽注九藪何謂九藪越之具區楚之雲夢秦之陽華晉之大陸梁之圃田宋之孟諸齊之海隅趙之鉅鹿燕之大昭吕覽淮南秦之陽紆燕之昭余爾雅十藪魯有大野秦有陽陓燕有昭余祁周有焦護周禮職方九藪青州曰望諸雍州曰弦蒲幽州曰貕養冀州曰陽紆豐殖伯禹念前之非度象物天地而度之于羣生共之從孫四岳佐之髙髙下下疏川導滯鍾水豐物陂障九澤豐殖九藪汩越九原宅居九隩合通四海故天無伏隂地無散陽水無沈氣火無灾燀神無間行民無淫心時無逆數物無害生周語逢澤開封逢池宋之逢澤也汲郡古文梁恵王發逢忌之藪以賜民今浚義有逢陂忌澤是也漢志注圃田中牟縣之圃田澤北與陽武分水澤多麻黄草故述征記曰踐縣境便覩斯卉窮則知踰界詩所謂東有圃草也皇武子曰鄭之有原圃猶秦之有具圃澤在中牟縣西西限長城東極官渡北佩渠水東西四十許里南北二十許里中有沙岡上下二十四浦津流逕通淵潭相接各有名焉有大漸小漸大灰小灰義魯練秋大白楊小白楊散入禺中羊圈大鵠小鵠龍澤鬯罷大哀小哀大長小長大縮小縮伯邱大盖牛眠等浦水盛則北注渠溢則南播故竹書紀年梁恵成王十年入河水于甫田又為大溝而引甫水者也水經廣城澤廣城澤在梁縣西四十里後漢書云安帝永初元年以廣城遊獵地假與貧人于時馬融作廣城頌云大漢之初基也揆厥靈囿營于南郊右矕三途左枕嵩岳面據衡隂箕背王屋浸以波溠演以榮洛金山石林殷起乎其中神泉側出丹水涅池怪石浮燿焜乎其陂是此澤也隋大業中置馬牧焉亦名廣陂其溉灌之至今百姓賴之河南圖經水經注雲夢禹貢雲土夢作乂子虚賦雲夢者方九百里地里志南郡華容縣南有雲夢澤左昭三年楚子與鄭伯田于江南之夢定四年楚子涉睢濟江寢于雲中則此澤跨江南者亦得單稱雲單稱夢也書爾雅疏漏澤魯國卞縣東南有姚虚世謂之陶墟井曰舜井虚東有漏澤方一十五里淥水泓渟凡三大澤西際有阜俗謂之媯亭山盖有姚墟舜井之言因復有媯亭之名矣阜側有三石穴廣圓三四尺穴有通否水有盈漏漏則數夕之中即傾陂竭澤矣左右民居識其將漏預以木為曲弓約塞穴口魚鼈異鱗不可勝載矣自此連岡通阜西北四十許里岡之西際便得泗水之源也水經彼之鄉人或目之為漏陂亦謂之陷澤其水將漏即有聲聞四逺數十里分若風雨之聚也先洄旋若渦勢然後淪入於穴率一二嵗陷莫知其趨向及穴之深淺焉玉堂閒話此澤漏洩穴區别所謂車箱漏鼓漏土漏雞漏猪漏春夏積水秋冬漏竭居人知之不過三日之中俱盡在今兖州泗水縣治東七十里廣記濩澤墨子曰舜漁濩澤應劭曰澤在陽阿縣西北竹書紀年梁恵成王十九年晉取𤣥武濩澤水經督亢澤澤兼方城縣郡國志曰縣有督亢亭孫暢之述畫有督亢地圖言燕太子丹使荆軻齎入秦秦王殺軻圖亦絶滅也風俗通曰沆漭也言乎淫淫漭漭無涯際也沆澤之無水斥鹵之謂也上渠渠渠者水所居也風俗通陽渠洛陽城外四面有陽渠水周公所制也西征記十二西門豹為鄴令鑿十二渠以富民史記陸海戰國海内十二分魏州有史起引漳水灌鄴民以興歌蜀郡李芝鑿離堆通二江益部至今賴之芝開鄭國漢作白溝而闗中號為陸海雀寔政論九曲漢司空漁陽王梁之為河南也將引榖水以溉京都渠成而水不流故以坐免後張純堰洛而通漕洛中公私懐瞻是渠今引榖水盖純之創也亦謂之九曲瀆長明魏武堰漳水迴流東注號天井堰十二里中作十二燈令互相灌注一源分為十二流皆懸水門又引漳流自城西東入逕銅雀臺下伏流入城東注謂之長明溝其登臺賦云引長明灌街里謂此渠也五龍河南十二里境簿曰河南縣城東十五里有千金堨洛陽記曰千金堨舊堰榖水魏時更脩此堰謂之千金堨積石為堨而開溝渠五所以謂之五龍渠盖魏文帝脩王張故績也千金語林曰陳協數進阮步兵酒後晉文王欲脩九龍堰阮舉協文王用之掘地得古承水銅龍六枚堰遂成水歴堨東注謂之千金渠逮于晉世大水暴注溝瀆泄壊又廣功焉亦名伐龍渠即九龍渠也并水經萬金鄴縣天平中決漳水為萬金渠今號天平渠魏地形志金鳳相州鄴南有金鳳渠引天平渠下流溉田唐地里志菊花相州臨漳南有菊花渠自鄴引天平渠溉田王梁蔡州新息西北有隋故王梁渠通濟隋宇文愷于河隂鞏洛梁公堰厮河為通濟渠劉晏傳御史郭子儀請開豐寧軍御史渠溉田二千頃家傳佐耕通漕古者治水或以佐耕或以通漕白公引涇嚴安導洛農民獲其利而轉漕之功弗聞宇公厮流韋堅堰渭漕運僅得其便而灌溉之績弗著冰凌凍澌泮積冰曰凌冰壯曰凍冰流曰澌冰解曰泮風俗通凌人凌人掌冰正嵗十有二月令斬冰絶水凌春始治鑑祭祀共冰鑑賓客共冰大喪共夷槃冰夏頒冰掌事秋刷周禮六月冰三月冰嵗不成四月冰天下荒五月冰其國亡六月冰天下兵京房蔵冰出冰申豊曰古者日在北陸而蔵冰西陸朝覿而出之其蔵冰也深山窮谷固隂沍寒於是乎取之其出之也朝之祿位賓食喪祭於是乎用之其蔵之也黒牡秬黍以享司寒其出之也桃弧棘矢以除其災其出入也時食肉之祿冰皆與焉大夫命婦喪浴用冰祭寒而蔵之獻羔而啓之公始用之火出而畢賦自命夫命婦至於老疾無不受冰山人取之縣人傳之輿人納之隷人蔵之夫冰以風壯而以風出其蔵之也周其用之也徧七月之卒章蔵冰之道也左傳寒温節晏子曰景公伐魯得東門無澤問曰魯年糓何如對曰隂不凝陽冰厚五寸者寒温節也寒温節則政平政平則年糓熟請禮魯以息怨闕地為牀楚子使薳子馮為令尹遂以疾辭方暑闕地下冰而牀焉重繭衣裘鮮衾而寢楚子使醫視之復曰瘠則甚矣而血氣未動左傳春無冰春無冰梓慎曰今兹宋鄭其饑乎隂不勝陽也左傳天瑞光武從邯鄲避王郎兵至滹沲河導吏還言河冰流澌無船不可濟左右皆惶畏為王郎所及上命王霸前往視之實然霸念還言驚衆雖不可渡且臨冰上尚可為阻即白曰冰堅可渡士衆大喜上大笑曰果妄言也叱至河流澌冰合可履馬欲僵各以囊盛沙布冰上乃渡渡未畢數車而冰陷光武謂官屬曰王霸權以濟事殆天瑞也東觀記冰厚丈餘靈帝光和六年冬北海東萊瑯琊井冰厚丈餘後書陷冰丸黄巾羣起青州刺史焦和恐賊乗冰渡河多作陷冰丸投河中賊衆遂潰上濟河冰泮石勒伐劉曜於洛陽從大河南濟時河凍將合軍至而冰自泮舟楫無用遂生擒曜謂是神靈之助異苑天橋慕容徳正月渡黎陽津其夕流澌冰合是夜濟師旦魏師至而冰泮鄴令韓軌言於徳曰昔光武渡滹沱冰澌自合今大王濟河天橋自成徳迺大悦南燕録不冰南燕汝水不冰燕王慕容超惡之李超對曰良由逼帶京城近日月也燕王大悦鶴林玉露葦結昭成帝征劉衛辰時河冰未成帝乃以葦絙約澌俄然冰合乃散葦于上冰草相結若浮橋衆軍利涉衛辰與宗族西走魏書一時之要趙郡王叡為定州刺史天保六年監築長城于時六月塗中屛盖扇親與軍人同勞苦定州先常蔵冰長史宋欽道以叡冒熱遣倍道送冰正遇炎盛咸謂一時之要叡對之歎曰三軍皆飲温水吾何義獨進寒冰遂至銷液竟不一嘗兵人感悦北齊書椎冰文宣時周人常懼齊兵之西度恒以冬月守河椎冰及後主即位朝政多紊齊人椎冰懼周兵之逼斛律光憂曰國家常有吞闗隴之志今日至此上冰一夕合王方翼平西域七月次葉河無舟而冰一夕合時以為祥唐書冰筯冬至日大雪至午雪霽寒結簷溜皆為冰條妃子使侍兒敲下二條看玩帝晩朝回問之曰所玩冰筯也帝謂左右曰妃子聰慧比象可愛也天寳遺事紅冰貴妃初承恩召與父母相别泣涕登車時天寒淚結為紅冰上敲冰煮茗王休居太白山下日與僧道異人往還每至冬時取溪冰敲其精瑩者煮建茗共賓客飲之開元遺事常堅冰劉宗初拘弭國貢常堅冰其國有大凝山中有冰千年不釋乃齎至京師潔冷如故雖炎暑赫日不消嚼之則與中國者無異杜陽編海冰穆宗長慶元年海州海水冰南北二百里東望無際五行志冰花如纈開成末河陽黄魚池池冰作花如纈酉陽冰紋如畫景福中滄州城塹中冰有紋如畫有竹木牡丹車馬人物樓臺殿閣之狀時人以為地當有兵難近華孽也五行志冰合後唐莊宗南伐周徳威軍不利或號曰晉王渡河而北矣日晩明宗與末帝相失軍無所止河冰初解比無舟楫帝泣曰吾兒安在吾主安歸身世盡於斯矣是夜大寒雪深盈尺冰有復合處帝踐之以渡不旋踵而冰解帝宿先鋒砦翌日聞莊宗土山之捷軍聲復振冊府冰橋周太祖乾祐中北征至澶州驛河冰已解浮橋難立衆憂之其夜西北風裂凝凍比旦津吏報冰堅可渡步騎踐冰而行衆謂之凌橋日夕津吏報曰冰橋泮矣鑿冰而浴郭忠恕窮冬即鑿河冰而浴其傍凌澌消釋人皆異之本傳貢冰藍田縣嵗貢冰常在冬杪如藍水不冰則主吏宣命以祭一夕而成冰形似柱礎清虚明潔或有粟砂線葉粘于其中則命鐫取以滚湯沃之或沃以冷則凍斂不固尋復脱去唐闕史天畫金末河冰凍成龜文又有花卉禽獸之狀巧過雕鏤時人謂之天畫大金國志化玻瓈千嵗積冰結為玻瓈酉陽刀切薄餅卷厚冰以刀切入迎刃而解盧氏雜説賣冰袁參上姚崇書曰昔蒯人為商賣冰于市客不苦熱者將買之蒯人自以得時欲邀以數倍之利客怒而去俄而其冰亦散故蒯人進且不得冰二者俱亡自泣而去今君坐青雲之中平衡天下士皆欲附此亦君賣冰之秋而士買冰之際也使君強自遲迴至于冰散尚欲開口其事焉得哉願少圖之無為蒯人之事也摭言火鑚木燧人氏鑚木取火令人無有腹疾遂天之意故曰燧人禮含文嘉伏羲禪於伯牛鑚木作火河圖挺佐輔回祿内史過曰夏之興也祝融降于崇山其亡也回祿信於聆隧國語昭十八年五月宋衛陳鄭皆火梓慎登大庭氏之庫以望之司馬司寇行火所焮子産使禳火於𤣥㝠回祿祈于四􅅠左注回祿火神正義𤣥㝠祭脩熈不知回祿祭何人楚之先吳回為祝融或云回祿即吳回也西宫灾西宫灾何以記灾也何休曰時僖公為齊桓所脅以齊媵為嫡楚女廢居西宫而不見恤悲愁怨曠所生也公羊傳楚女悲而西宫灾陳蕃傳火正九年春宋災晉侯問於士弱曰宋災知有天道何故對曰古之火正或食於心或食於味以出内火是故味為鶉火心為大火陶唐氏之火正閼伯居商邱祀大火而火紀時焉相土因之故商主大火商人閲其禍敗之釁必始於火是以曰知其有天道也左譆譆或叫于宋太廟曰譆譆出出鳥鳴于亳社如曰譆譆甲午宋大災左襄三十年伯姬之舎失火左右曰夫人少辟火乎伯姬曰婦人之義傅母不在宵不下堂左右又曰夫人少辟火乎伯姬曰婦人之義保母不在宵不下堂遂逮乎火而死穀梁鬱攸哀三年夏五月辛夘司鐸火火踰公宫桓僖災救火者濟濡帷幕鬱攸從之孔子在陳聞火曰其桓僖乎左李商隠齋文云閬苑歊臺列遘鬱攸之毒霓旌絳節咸罹竊發之災南倚魯人燒積澤天北風火南倚恐燒國哀公懼自將衆趣救火者左右無人盡逐獸而火不救乃召問仲尼仲尼曰夫逐獸者樂而無罰救火者苦而無賞此火之所以無救也哀公曰善仲尼曰事急不及以賞救火者盡賞之則國不足以賞於人請徒行賞哀公曰善於是仲尼乃下令曰不救火者比降北之罪逐獸曰比入禁之罪令下未遍而火已救矣韓非子夢火知伯既敗將出走夢火見于西方乃出奔秦又夢見於南方乃奔楚也瑣語徙薪淳于髠至鄰家見其竈突之直而積薪在傍謂曰突直有火使為曲突而徙薪隣家不聽後果焚其屋鄰衆救火乃滅烹羊具酒以謝救火者不肻呼髠知士譏之曰曲突徙薪無厚澤焦頭爛額為上客盖傷其賤本而貴末也桓譚新論乞火客謂蒯通曰先生知梁石君東郭先生賢何不進之於曹相國乎通曰諾臣之里婦與里之諸母相善也里婦夜亡肉姑以為盜怒而逐之婦晨去過所善諸母語以事而謝之里母曰女安行我今令而家追女矣即束緼請火於亡肉家曰昨暮夜犬得肉争鬭相殺請火治之亡肉家遽追呼其婦故里母非談説之士也束緼乞火非還婦之道也然物有相感事有適可請乞火於曹相國漢書投杼致慈親之感乞火無里媪之談徐鉉李後主碑畢方漢武時有獻獨足鶴者食之百物所不肯食人皆不知以為怪異東方朔見之曰此畢方鳥也又奏言其所當食如朔言問朔何以知之朔曰山海經章我之山有鳥如鶴一足名曰畢方見則有譌火因勅廷臣皆習山海經山海序實尚書故火之精名畢方狀如鳥一足白澤圖生矛車師後王姑句家矛端生火其妻取紫陬謂姑句曰矛端生火此兵氣也利以用兵前書火井臨卬縣有火井漢室之盛則赫熾桓靈之際火勢漸㣲諸葛孔明一窺而更盛至景曜元年人以燭投即滅其年蜀併于魏異苑天火糜竺嘗從洛陽歸未達家數十里路傍見一婦人從竺求寄載行可數里婦謝去謂麋曰我天使也當往燒東海糜竺家感君見載故以相語竺因私請之婦曰不可得不燒如此君可馳去我當緩行日中火當發竺乃急還出財物日中而火大發捜神記積油積油萬石則自然生火晉武帝太始中武庫火積油所致也博物志長沙宣武王將葬而車府忽於庫火油絡欲推主者樂藹曰昔晉武庫火張華以為積油萬石必然今庫若有灰非吏罪也既而檢之果有積灰時稱其博物𢎞恕焉梁書光㦸晉恵帝永興元年成都王伐長沙每夜戈㦸鋒有火光如懸燭宋書行火元帝渡江隋民有王離妻季氏者洛陽人將洛陽舊火南渡自言受道於祖母王氏傳此火并有遺書二十七巻臨終使行此火勿令斷絶火色甚赤異於餘火有靈驗四方病者將此火煮藥及灸諸病皆愈轉相妖惑官司禁不能止及季氏卒火亦經時而滅人號其所居為聖火巷建康實録注赤幟義熈五年彭城劉澄常見鬼及為左衛司馬與將軍巢營廨宇相接澄夜相就坐語見一小兒赭衣手執赤幟團團似芙蓉花數日巢大遭火幽明録天下赤旛義熈十一年京都所在大行火災吳郡尤甚火防甚峻猶自不絶王𢎞為吳郡白日在㕔事上見天上有一赤物下狀如信旛遥集路南人家屋上火即大發𢎞知天為之災不罪火主吳志聖火齊永明中先是魏地謡言赤火南流喪南國是嵗有沙門自北齎火而至色赤于常火而㣲云以療疾貴賤争取之多得其驗二十餘日都下大盛咸云聖火詔禁之不止灸至七炷而疾愈吳興邱國賓宻以還鄉邑人楊道慶虚疾二十年依法灸之即愈南史京師有病癭者以火灸數日瘥隣人笑曰病偶自瘥豈火能為此人便覺頥間癢病以火灸之還如前後梁以火徳興南齊志變火王劭以古有鑚燧改火之義表請變火曰周官四時變火以救時疾在晉時有以洛陽火度江者代代事之相續不滅火色變青昔師曠食飯云是勞薪所爨晉獻公使視之果然車輞今温酒及灸肉用石炭柴火竹火草火麻荄火氣味各不同以此推之新火舊火理應有異願於五時取五木以變火用功甚少救益方大隋書烽火臺遼東西北有太宗烽火臺去臺五里間有火光彼謂為煻煨池夜望明如晝常如燒照明或有物去池三十步無巨細脅入池中莫知記數淺深焉相感志八人過翟天師乾祐常入䕫州市大言曰今夕當有八人過此可善待之人不知悟其夜火焚數百家八人乃火字也酉陽紅衣尼賈耽退歸第令召上東門卒嚴戒之曰明日當午有異色人入門爾必痛擊之死且無妨門卒稟命自巳至午果有二尼自東相序而至施朱傅粉冶容艷佚如倡人之飾其衣紅色卒因以撾痛擊之行百步忽不見卒以告耽曰然不免小有災矣翌日東市奏火延百十家芝田録火精長慶元年春楚州淮岸屯官胡榮家有精物或隠或見或作小兒為著女人紅裠擾亂於人或稱阿姑時復一處火發所燒即少皆救得之三月火大起延燒河市營市廬舎殆盡嵗中胡榮亦死符異集驗叱火吳盧文進遷潤州節度城中火救之不息文進怒自出州門使召馬步使將斬之聲至火即滅九國志猛火油周顯徳中古城貢猛火油得水愈熾貯以琉璃瓶五代西北邉防城庫皆掘地作大池縱廣丈餘以蓄猛火油闕池土皆赤黄乃别為池而徙焉不如是則火自屋柱延燒矣猛火油者出於髙麗之東數千里日初出之時因盛夏日力烘石極熱則出液他物遇之即為火惟真琉璃器可貯之用油者以油涓滴自火焰中過則烈焰俱發油之餘力入水藻荇俱盡魚鼈遇之皆死昨夢録粦火僧録賛寧博物王禹偁徐鉉嘗就學焉栁開守維揚後圃遇隂雨即青燄夕起觸近則散寧曰此粦火也兵戰血或牛馬血著土則凝結為此氣栁掘之皆斷鎗折劍乃古戰地也因贈詩曰空門今日見張華湘山野録宋無忌火之精宋無忌白澤圖安平太守王基家有賤婦人生一男兒墮地便走入竈中死管輅曰宋無忌之妖非妖咎之徵也魏志唐牛僧孺為武昌節度使立宋無忌廟祀之以禳火災唐韋建除武昌節度使將行夢一朱衣導從數十詣韋曰公將鎮鄂渚僕所居頺毁非公不能葺治及至訪無忌廟其像即夢中所見遂新之志火術姚光者有火術吳主身臨試之積荻數千束使光坐其上又以數千束荻裹之因猛風而燔之荻了盡謂光當已化為燼而光端坐灰中振衣而起把一巻書吳主取其書視之不能解也抱朴子避火有孫供奉者火發于堂衆皆奔逃有乳姥直穿烟焰中出身不焦灼嬰兒尚眠不覺人問之荅曰吾夫云避火當瞑目認路勁直趨出若目開則氣悶必倒我用此説故出而不損亦不覺身蹈烈火也遯齋閒覽丁壬梓慎曰水火之母也左隂陽之書有五行嫁娶之法火畏水故以丁為壬妃是水為火之雄正義張宴曰水以天一為牡火以地二為牝故火為水妃莽傳注丁女婦壬傳世婚韓陸渾山火寒焰火體宜熾而有蕭邱之寒焰抱朴子天中記巻十
