body:
  text: 天中記卷五十明陳耀文撰羅文䟽羅文羅䟽也䌒簁也麄可以簁物也釋文纎羅周成王五年因祇國獻女工一人善於工巧體貎輕潔被纎羅雜繡之衣拾遺記金簡黄庭為不死之道受者先齋九日然後受之結盟立誓期以勿渫古者盟以𤣥雲之錦九十疋金簡鳯文羅四十疋黄庭經羅縠荆軻左手把秦王䄂右手椹其胷秦王曰今日之事從子計耳乞聽琴聲而死召姬人鼓琴琴曰羅縠單衣可裂而絶八尺屏風可超而越塵盧之劔可負而伏秦王乃奮地而起遂殺軻燕丹子薦地帝以七月七日掃除宫掖之内設大床於殿上以紫羅薦地燔百和香燃九㣲燈以待西王母漢武内傳蝶蛺羅漢武時西域獻蝶蛺羅日本國貢麒麟錦金花眩人眼目紫羅面衣趙飛鷰為皇后女弟在昭殿遺書曰今日嘉辰貴􅀈􅅷膺洪冊上襚三十條以陳踴躍之心金花紫羅面衣織成襦羅帷羅􅀈羅帳羅西京雜記三代服馮房父子兄弟三代為侍中並帶青紫羅綺羅縠為幔呉王孫權居昭陽宫趙夫人乃織羅縠累月而成裁之為幔内外視之飄飄如烟氣輕動而房内自凉拾遺記綾羅袴武帝嘗降王武子供饌悉用琉璃器婢子百餘人皆綾羅袴以手擎飲食世説紫羅囊謝𤣥好帶紫羅香囊叔父安惡之不欲傷其意因睹而焚之遂絶晉書雨綘羅張仲舒為司空廣陵城北元嘉年七月中輙見門側有赤氣赫然後空中忽雨絳羅於其庭内廣七八分長五六寸皆以箋紙繼之廣長亦與羅等紛紛甚張惡而焚之猶有數片府州多相傳示張經宿暴病而死異苑綺文繒鬰金流黄綦綺廣雅綺文繒也説文經緯縱横綺欹也其文欹邪不順經緯之縱横也有杯文形似杯也有長命其綵色相間皆横也幅言長命者服之使人命長本造者之意也有棋文者方文如棋也釋名識襦班伯侍講金華殿在識襦紈之問非其好也漢書袍麄為綺馬后袍極麄䟽諸主朝望見反以為綺后曰此繒染色好故冝用之東觀漢記白石綺初洛中名服有白石綺識者尤之曰石非繒綵之稱于寶晉紀綺紈之士余兼虎賁中郎將寓直散騎之省珥蟬冕襲綺紈之士此馬遊處潘岳秋興賦序紫綺緗綺為下裳紫綺為上襦古詩綾文似氷綾綾者其文望之似氷綾之理也釋名散花綾霍光妻淳于衍散花綾二千五疋綾出鉅鹿陳寶光妻傳其法霍顯召入其弟使作之一疋直錢一萬又與緑綾七百端直錢百萬西京雜記縹綾半袖楊阜字儀山為城門校尉常見明帝着㡌被縹綾半袖阜問帝曰此於禮何法服也帝黙然魏志絳綾詔臨邑使主范柳所貢物多絳綾是其所珍可籌量増賜晉咸康起居住白綾㡌帝改服着白綾㡌晉修復山陵故亊託綾還封辛穆字叔宗舉茂才東雍州别駕初隨父在下邳與彭城陳敬文友善敬文弟敬武為沙門從師逺學經久不還敬文病臨卒以雜綾二十疋託穆與敬武穆久不得見經二十年始於洛陽見敬武以物還之封題如故世稱亷信後魏書盤絛綾長慶中浙西觀察使李徳裕上表曰臣當道奉詔更令織定羅絲袍叚及可幅盤絛綾一千疋孔丘立鵝天馬掏豹盤絛文彩珍竒只合聖躬自服今所織十疋費用至多在臣愚誠亦有所未諭乞着臣當道物力所宜更賜節減即海隅蒼生無不受賜詔許罷進盤絛綾一千疋唐書縠細繒説文曰縠細繒也不如愛縠先生王斗見齊宣王宣王曰願聞先生直言正諫斗曰王之憂國愛民不若王愛尺縠也王使人為冠不使左右便僻而使工者何也為能之也今王治齊非左右便僻無使也臣故曰不如愛尺縠也齊䇿見上紗縠江充召見太乙宫自請願以所常被服衣冠見上上許之充衣紗縠單衣漢書後官服縠袁術遂僣號荒侈滋甚後宫數百服綺縠餘梁肉魏志霧縠或曰霧縠之麗曰女工之蠧楊子法言勁弩之餘力不能洞霧縠抱朴子紗輕紗幕漢武帝思李夫人不可復得手詔董仲君曰朕思李氏其可得乎仲君曰可遥見而不可同帷幄耳濳英石色青輕如毛羽寒盛則石溫夏盛則石冷刻之為人像神悟不異真人使此石像徃則夫人至矣乃遣人至晦海經十年而得還此石命工依李夫人形刻成置於輕紗幕裡宛若生時帝大悦拾遺記紗帳授徒馬融博洽通儒教養諸生千數融好侈飾常施絳紗帳前授生徒後列女樂東觀漢記綘紗繫臂武帝始㤗九年帝多簡良家子女以充内職又擇其美者以絳紗繫臂晉書紗縠不安蔡克字子尼體貎尊嚴莫有媟嫚髙平劉整雋才白衣居家車服奢麗謂人曰紗縠吾之常服耳遇蔡子在坐而經日不自安别傳絳帳受業符堅以太常韋暹毋宋傳其父業周官音義乃就宋家立講書堂書生百人隔絳紗帳而受業焉秦記鬻紗王僧孺㓜貧其母鬻紗布以自業梁書青紗單衣游明根以年踰七十表求致仕優詔許之引入陳謝悲不自勝帝言别慇懃仍為流涕賜青紗單衣委貎冠被褥錦袍等物後魏書張幕隔障琅邪王儼字威仁武成第三子拜京畿大都督領軍大將軍領御史中丞遷大司徒初從北宫出將上中丞凡京畿步騎領軍之官屬中丞之威儀司徒之鹵簿莫不畢備帝與后在華林園東門外張幕隔素紗步障觀之北齊隔紗帷聽盧道䖍聘妻元氏甚聰悟常升高坐講老子道䖍從弟元明隔紗帷以聴焉北史服黄紗衣太宗幸蒲州刺史趙元楷課父老服黄紗單衣迎謁道左唐書絳紗單衣皇太子初拜有絳紗單衣東宫舊亊盛食沉波江漢之民至暮春上已之日禊集招祗之祠或結五色紗囊盛食沉於波中言蛟龍水䖝畏之不侵食也拾遺記着紗披袍餘杭縣有一人姓沈名縱與父同入山至夜二更中忽見一人着紗㡌披絳龍袍云是闘山王齊諧記紬紬紬大絲繒也説文紬抽也抽引綵端紬緒也又謂之絓挂也挂於杖端振舉之也釋名白紬為别袁聿脩為太常寺少卿出視廵省仍令考校官人得失經兖州時邢劭為刺史别後送白紬為别信聿脩不受與劭書云今日仰遇有異常行𤓰田李下古人所慎願體此心不貽厚責劭亦欣然􅉐解報書云老夫忽忽意不及此敬承來旨吾無間然弟昔為清郎今日復作清卿矣太史布帶㫁以狥諸侯攻偪陽主人懸布魯孟氏之臣秦堇父登之及堞而絶之墜則又懸之蘇而復上者三主人辭焉乃退帶其㫁布以狥於軍三日襄二幅利齊子尾曰富人之所欲也何獨弗欲對曰且夫富如布帛之有幅焉為之制度使無遷也夫民生厚而用利於是乎正德以幅之使無黜嫚謂之幅利利過則為敗吾不敢貪多所謂幅也襄二十八布衣飯牛魯君聞顔闔得道之人使人以幣聘焉顔闔守門粗布之布衣而自飯牛使者致幣顔闔對曰恐聽繆而遺使者罪不若審之使者還反復來求而不得莊子無故得帛衛人有夫妻禱而祝曰使我無故得百束帛其夫曰何心也妻曰益子將取妾韓子布盡無幣齊國好厚葬布帛盡於衣衾材木盡於棺槨桓公患之以告管仲曰布帛盡則無以為幣材木盡則無以為守備而人厚𦵏之不休柰何管仲對曰凡人之有為也非名之則利之也於是乃下令曰棺槨過度者僇其尸罪夫當喪者夫僇死無名罪當喪者無利人何故為之也上衣細布墨子曰古有衣無文者禹是也土階三等衣裳細布當此時黼黻無所用務在完堅説苑雲霞布周成王六年燃丘之國遣使貢獻使者衣雲霞之布如今之朝霞布也拾遺記令尹盜布楚江乙母者當恭王之時也乙為郢大夫有入王宫盗者令尹以罪乙請於王而黜之處家無㡬其毋亡布入尋言令尹盗之王曰令尹在上冦盗在下令尹不知有何罪焉毋曰昔日妾子為郢大夫人盗王宫中之物妾子坐而黜之令尹獨何以不坐是為􅂈也王曰善令吏償毋之布因賜金十鎰毋讓金布曰妾豈貪貨而于王哉怨令尹之治也遂不肯受王曰毋智若此其子必不愚乃復召江乙而用之列女傳尺布可縫文帝從淮南王長道死時民謡曰一斗粟尚可舂一尺布尚可縫兄弟二人不相容漢書蜀布臣在大夏時見卭竹杖蜀布問安得此大夏國人曰吾賈人徃市之身毒身毒在大夏東南可數千里史記張騫傳猪膏塗布董卓獲山東兵以猪膏塗布十餘疋用纒其身然後燒之先從足起謝承後漢書越布單衣吳郡本不獻越布陸宏美容儀常衣越布單衣明帝好之因勅郡獻越布由此始也上布如綾錦哀牢夷之染綵紬布織成文章如綾錦有梧木葉倩以為布幅廣五尺潔白不受垢汙先以覆亡人然後服之華嶠後漢書書吕布上王允與吕布及士孫瑞謀董卓有人書吕字於布上負而行於市歌曰布乎布乎有告卓者卓不悟上着布率下馬太后詔曰吾為天下母而身服太練食不求甘左右但着帛布無香亷之飾者欲身率下也范􅈌後書海西布大秦國在安息條支西出細布有織成細布言用水羊毳名曰海西布魏畧裙布一疋皇甫隆為燉煌太守燉煌婦人作裙率縮如羊腸用布一疋隆禁止之所省復不訾上遺單布衣王戎性慳從子將婚遺一單布衣婚畢都收之晉書練布單衣蘇峻平後帑藏空竭庫中唯練數千端鬻之不售而國用不給道患之乃與朝賢俱制練布單衣於是人士翕然竟服之練遂踴貴乃令主者出賣端至一金上疋布責梨王𤣥謨侵魏為前􅄡好营貨利一疋布責人八百梨以此倍失人心宋書焚筒中布蕭恢為郢州刺史境内大寧時有進筒中布者恢以竒貨異服即命焚之於是百姓仰徳梁書送南布姚察自居顯要一不交通嘗有私門生不敢厚餉送南布一端花練一疋察謂曰吾所衣著止是麻布蒲練此物於吾無用旣欲相接欵幸不煩爾此人遜譲察厲色驅出自是莫敢饋遺陳書賜布令負宋該字宣孔為右長史大社為羣僚以該性貪故賜布百餘疋令負而歸重不能制乃至􅀈頓以愧辱之燕書勿積金帛楊椿歸老臨行試子孫曰國家初丈夫好服綵色吾雖不記上谷翁時事然記清河翁時服飾恒見翁着布衣韋帶常自約勅諸父曰汝等後世若富貴於今日慎勿積金一斤綵帛百疋已上用為富也後魏書縳蒿衣布楊大眼為荆州刺史常縳蒿為人衣以青布而射之召諸蠻渠指示之曰卿等若作賊五口正如此相殺也上盜布首官齊鄭述祖為光州刺史有人入市盗布其父怒曰何忍欺吾君之執以歸首述祖特原之自是境内無盜北史出布資征貞觀十八年命將征東安州人彭通請出布五千叚以資征人上善之比漢之卜式拜宣義郎唐書妻織燔機公儀休相魯其妻織布休曰汝豈與世人乎争利哉遂燔其機韓子紡花為布𤣥莬北有山山有花人取紡績為布𤣥中記緝木為布大業七年十二月朱寛征留仇國獲男女口千餘人并雜物産與中國多不同緝木皮為布甚細而幅濶三尺二寸亦有細班布幅濶四尺許拾遺録班布林邑國出古貝古貝者樹名也其華盛時如鵝毳抽其緒紡之以作布布與紵布不殊亦染成五色織為班布南史扶桑布東夷扶桑國其土多扶桑木故以為名扶桑葉似桐初生筍筍國人食之實如梨而赤績其皮為布以為衣亦以為錦上暴布戎人見暴布者而問之曰何以為之莾莾也指麻而示之怒曰孰之壤壤也可以為之莾莾也吕覽織葛葛山者勾踐種葛使越女織治葛布獻於吳越􅅸書盜牛遺布王烈字彦考逺識逹通人皆慕之州閭成風咸競為善時國中有盜牛者牛主得之盜者曰我邂逅迷惑從今以後將改過子既已見宥幸無使王烈聞之人有以告烈者烈以布一端遺之先賢行狀遺布不受王戎為侍中南郡太守劉肇遺戎筩中布五十端戎不受而厚報其書識者以為譏世祖患之為發詔譏乃息竹林七賢論擇布無麄者沈珩弟峻字枚山有譽而性儉張溫使蜀辭峻峻入内良久出語溫曰向擇一端布欲以送卿而無麄者溫嘉其能顯非笑林市布作惟曹植表曰欲遣人到鄴市上黨布五十疋作車上小帳帷謁者不聽大浣布西域獻青龍三年西域重譯獻火浣布詔大將軍大尉臨試示百僚魏志火鼠布日南北景縣有火鼠取毛為布燒之而紡績名火浣布吳録火洲南海諸藻國東千餘里至自然火洲其上有樹生火中州左近人剥取其皮紡績作布以為手巾與蕉麻無異而色㣲青若小垢洿則投火中復更稍潔或作鐙柱用之不知盡南史火浣布周穆王大征西戎西戎獻錕鋙之劔火浣之布其劒長尺有咫鍊鋼赤刃用之切玉如泥焉火浣之布浣之必投於火布則火色垢則布色出火而振之皓然疑乎雪也列子單衣㑹賓長老説漢桓帝時有大將軍梁冀作火浣布單衣㑹賔客行酒公卿朝臣前佯争酒失杯而行之偽怒解衣而燒之布得火煒炎赫然而熾如燒凢布垢盡火滅粲然潔白如氷澣之傅子蕭丘生火海中蕭丘有自生火常以春起而秋滅五方十里當火起滿洲上上純生一種木正著此木雖為火所焚而不糜但小焦里人或得為薪者火之俱如常薪但不成灰炊熟列以水灌滅之後復更用如此不窮夷人取此木葉績以為布其木皮赤剥以灰煮治以為布但麄不及華俱可以火浣又有白鼠毛長三寸許亦居北州上空木中入火中不燒灼也其毛又可績以為布故火浣有三種抱朴子火鼠布南荒之外有火山長四十里廣五十里其中皆生不燼之木盡夜火燒得暴風下猛雨不滅火中有鼠重百斤毛長二尺餘細如絲可以作布恒居火中色洞赤時時出外而色白如水逐而沃之即死織以為布東方朔神異經净火晉太康中有羽山之民獻火浣布其國稱羽山之上有文石生火烟色似隨四時而見也名為净火有不潔之衣投於石火之中雖滯于漬淄皆如新浣矣當虞舜時其國獻黄布漢末獻赤布梁冀製為衣謂之丹衣而史家云單衣則今掖縫也字異聲同未知熟是拾遺記為纒方丈山東有龍塲地方千里玉瑶為林或云龍常闘此處膏血如水流著物如淳漆燕昭王三年海人乘霞舟以彫壺盛膏數斗以獻昭王王坐通雲之臺之火浣布為纒用龍膏為鐙照曜百里上炎火山崑崙之墟有炎火之山山上有鳥獸草木皆生長於炎火之中故有火浣布非此山草木之皮枲則其鳥獸之毛也漢世西域舊獻此布中間久絶至魏初時人疑其有文無實文帝以為火性酷烈無含育之氣著之典論明其不然之事絶智者之聽及明帝立詔三公曰先帝嘗著典論不朽之格言令其刋石於廟門之外及太學與石經並以為永示後世至此西域使至始獻火浣布焉於是刋滅此論而天下笑之臣松之昔從征西洛陽歴觀舊物見典論石在大學者尚存而廟外廡之間諸長老云晋初受禪即用魏廟移此石於太學非兩處立也竊謂此言為然木鼠有高人賫火浣布為三端帝以雜布積之令杰公以他事至於市所李公遥識曰此火浣布也一是積木皮所作一是積鼠毛所作以誥商人具如李公所說因問木鼠之異公曰木堅毛柔是可别也以陽燧火山陰柘木爇之木皮改常試之果驗梁四公記火洲斯調國有大洲在南海中其上有野火春夏自生秋冬自死有木生於其中而不消也枝皮更滑秋冬火死則皆枯瘁其俗常以冬採其毛以為布色小青黒若塵垢汙之便投着火中則更鮮明也異物志黄草布湖州有黄草布出各縣極細者與葛無異海中布大秦國有織成細布言用水羊毛名曰海中布作􅉊㲣􅕰㲪罽帳之屬其色又鮮於海東諸國所作史白疊高昌國有草實如繭中絲如細纑為白疊子國人取以為布海録碎事又白越細布也越絶書春蕪波岐國産荃薕草亦曰春蕪草其皮如絲可以為布所謂春蕪布亦曰香荃布洞冥記朝霞布西屠夷頭黎貞觀時獻朝霞布唐書海西布波西織水羊毛為布曰海西布黄潤蜀都賦黄潤比筒籝金所過注黄潤謂筒中細布也司馬相如几將篇曰黄潤織美宜制禪楊雄蜀都賦曰同中黄潤一端數金籝幐也紵獻紵衣季札聘鄭見子産如舊相識與之縞帶子産獻紵衣焉襄六紵絺三百呉赤市使於智氏假道於衛寗文子具紵絺三百製將以送之大夫豹曰吳雖大國也亦不壊交假之道則亦敬矣又何禮焉文子不聽遂致之説苑販紵為業戴法興㑹稽山陰人家貧父碩子以販紵為業宋書絺綌粗細葛絺細葛也綌粗葛也縐絺之細也説文夏給善卷曰子立宇宙之中冬衣皮毛夏給葛稽康髙士傳賜絺堯見舜於宫設饗禮送為賓主南面問政然後賜以絺表琴瑟又築宫室封之於虞帝王世紀抽絺以授孔子南逰楚至阿谷有處女佩黄而浣孔子曰彼婦人可與言矣抽絺綌五兩以授子貢曰善為之辭以觀其語子貢曰吾北鄙之人也將南􅃴楚於此有絺綌五兩吾不敢置之水浦婦人對曰客之行差遲乘人久分其資財棄之野鄙吾年甚少何敢取之子不早去竊有狂夫守之者矣韓詩外傳全葛江都王建謀反與閩越通越遺建荃葛漢書絺巾耿純字伯山率宗族賓客二千人皆繒襜絺巾迎上於費上大悦東觀漢記葛綈馬嚴為陳留太守嚴病遣功曹史李龔奉章詣闕上親召見龔問疾病形狀以黄金葛綈賜嚴上黄白葛黄香為郎召詣安福殿賜錢三萬黄白葛各一端上求細葛魏文帝遣使於吳求細葛君臣以為非禮欲不與孫權勅付使江表傳冬月著葛任昉卒後子西華冬月著葛帔練裙道逄平原劉孝標泫然矜之謂曰我當為卿作計梁書贈絺綌賀蘭祥梁雍州刺史岳陽王蕭􅊫欽其節儉乃以竹屏風絺綌之屬及經史贈之祥難違其意取而付諸所司太祖後聞之並以賜祥後周書冬初衣葛袁充少警悟年十餘歳其父黨至門時冬初充尚衣葛衫客戯充曰袁郎子絺兮綌兮凄其以風充應聲荅曰唯絺與綌服之無斁以是大見嗟賞隋書綿纊説文曰纊絮縕也挾纊楚子伐蕭蕭潰申公巫臣曰師人多寒王廵三軍拊而勉之三軍之士皆如挾纊左宣下綿絮漬酒徐稚不就諸公之碎及人喪者萬里赴吊常於家預失鷄一隻以一兩綿絮漬酒中曝乾至門以綿絮致水中俟有酒氣以鷄置前祭畢便去謝承後漢書纒以綿纊張奐遺命曰吾前後仕進十腰銀艾不能和光同塵為邪説所忌通塞命也始終常也但地下𡨕𡨕長無曉期而復纒以綿纊半以釘密為不喜耳今幸有前穿朝殞夕下横屍露床幅巾而已范曄後漢書纒女馬上呂布為曹公所攻甚急乃求救於袁術術先求布女布恐術為女不至故不遺救也即以綿纒女身縳着馬上夜自送女女與術天祖守兵相觸格財不得􅃴復還城英雄記傷婢拭血鍾繇常數日不朝或問其故云常有婦女來美麗非凢問必曰是鬼物不可殺之婦人後徃不即前止户外繇問何以曰公有相殺意繇曰無此勤勤呼之乃入繇有不忍心然猶斬之傷婢婦人即出以新綿拭血竟路明日使人尋跡至一大塜木中有好婦人形體如生人着白練冊繡兩當傷一脚以兩當中絹拭血異林衣並無絮朱百年隠居山陰家室素貧母以冬月亡衣並無絮自此不衣綿布嘗寒時就孔凱宿衣悉裌布飲酒醉眠凱以卧具覆之百年不覺引卧具去體謂凱曰綿定竒溫因流涕悲慟凱亦為之感傷宋書不服綿纊阮孝緒年十六父喪不服綿纊雖􅂼食有味亦吐之齊書豪具謝萬就人乞裘云畏寒荅曰君妄語正欲以為豪具耳若威寒無復盛綿者以三十斤綿與謝語林建安綿郭原平孝行既著睢陽許瑶之罷建安郡丞還家以綿一斤遺之不受瑶之乃自徃曰今遇寒而建安綿好以此奉尊上下耳原平乃拜而受之也宋書房子綿房子城西出白上細滑可如膏用灌綿霜鮮雪曜異於常綿世俗言房子之纊也御亦類蜀郡之綿得江津矣故歳貢其綿以充御府酈善長水經注絮蘆花代絮閔子騫㓜時為後母所苦冬月以蘆花衣之以代絮其父後知之欲出後母騫跪曰母在一子單母去三子寒父遂止孝子傳覆面吳王將死曰吾以不用子胥言以至於此死者無知則已死者有知何面目見子胥也遂蒙絮覆面而自刎吳越春秋澼絖宋人有善為不龜手之藥世世以洴澼絖為事客聞之請買其方百金聚族而謀曰我世世洴澼絖不過數金今一朝鬻其百金請與之莊子冒絮提帝人有上書告周勃反下廷尉薄太后以為無反事文帝朝太后以冐絮提文帝曰絳侯綰皇帝璽將兵於北軍不以此時反今居一小縣顧欲反耶帝乃出之史記野蠶絮光武建武二年野蚕成繭民收其絮司馬彪續漢書贈雜繒絮曹公定鄴臨祠袁紹墓哭之流涕慰勞紹妻還其家人寶物贈雜繒絮廪食之魏志布衣摩絮顧悌字千通父亡孫權為作布衣一襲皆􅂒絮著之强令悌釋服呉書素簏故絮王敦害周顗籍其家政見素簏數枚中有故絮也晉中興書腹孔絮塞佛圖澄腹傍有一孔常以絮塞之每夜讀書則㧞絮孔中出光照于一室晉書布衣絮綵顔竣丁父憂起為丹陽尹遣中書舍人戴寶明抱竣登車載之郡舍賜以布衣一襲絮以綵綸遣主衣就衣諸體宋書弊絮躭學江革補國子生王融謝眺嘗行還過候革時大寒見革弊絮單衣而躭學不倦嗟嘆久之齊書木綿為絮蠻夷不蠶採木綿為絮裴淵廣州記房子好綿房子好綿地産不為無珍也盧毓兾州論被絮通心皇甫規與馬融書曰與被絮一雙以通㣲心着絮棘中王文度在西州與林法師講韓孫諸人並作坐林公理每欲小屈孫興公曰法師今日似着弊絮在荆棘中觸地挂閡世説金華山金石黄金謂之盪其美者謂之鏐餅金謂之鈸絶金謂之銑西南之美者有華山之金石焉爾雅黄金為長金五色金也黄金為之長久埋不生衣百鍊不輕從革不違西方之行大於土從土左右注象金在土中形説文制物金禁也氣剛毅能禁制物也釋名金起汝漢玉起於禹氏山金起於汝漢珠起於赤野此寶相去之七十里湯以杜山之金以贖民之賣子者禹以歴山之金贖賣子者江陽之珠天下至美上有丹沙下有黄金上有慈石下有銅金上有陵石下有鈆錫上有赭下有鐵葛盧山發而出金􅃖尤取以為鎧雍孤山發而出金􅃖尤取以為㦸楚有汝漢之黄金􅈨子鳴山少昊主西方一號金天氏亦曰金窮氏時金鳴於山銀湧於地或如龜蛇之類乍似人鬼之形拾遺記封璽舜為天子東廵臨觀黄龍五采負圖出置舜前圖以黄玉為柙黄金繩封兩端章曰黄帝符璽也春秋運斗樞鑄鼎夏之方有德也逺方圖物貢金九牧鑄鼎象物百物而為之備使民知神姦宣三金明夏革殷謂湯曰渤海之東不知㡬億萬里有大壑中有山一曰岱輿二曰方壺三曰員嶠四曰瀛洲五曰蓬萊其上高觀皆金闕列子崑崙金臺老子與伊喜登崑崙上金臺玉樓七寶宫殿晝夜光明乃大帝四王之所遊處有珠玉七寶之床闗令内傳金綦景公為履黄金之綦僅能舉之晏子取不見人齊人有欲金者清旦衣冠之市􅃴鬻金者之所因攫其金而去吏捕得之問曰人皆在焉子攫人之金何故對曰取金之時不見人徒見金列子晏子金齊晏子娶吳王女築城於吳興安吉州西北二十里後耕者每得黄金狀如四角菱中有齊字名晏子金故其地曰晏子城鄉名晏子鄉虹化為金孔子修春秋製孝經既成孔子齋戒向北斗星辰而拜告備於天乃有赤虹見自上而下虹化黄金有刻文孔子受而跪讀之捜神記徙木予金衛鞅入秦孝公以鞅為左庶長鞅定變法令及立三丈之木於國都市南門募民有能徙置北門者予五十金有一人徙之輙予五十金以明不欺史記抵鼃太子與荆軻之東宫臨池而觀軻拾瓦投池太子秦金丸軻用抵鼃復進軻曰非為太子愛金也但臂痛也燕丹子千金不取秦圍趙邯鄲魏使將軍新垣衍入邯鄲令趙尊秦為帝魯連子説罷之秦軍退平原君以千金為先生壽笑曰若即有取商賈之事連不忍為也魯連子懸金吕不韋乃使其客人人著所聞號吕氏春秋布咸陽市門懸千金其上有能増減一字者予千金史記賜金封印項羽以陳平為信武君擊殷而還拜平為都尉賜金三十鎰居無何漢攻下殷項王怒將誅定殷者平懼廼封其金與印使歸間行杖劔亡渡河上與金以間漢王與陳平金四萬斤以間䟽楚君臣不問其出入也上賜金陳廊吳楚反孝景以竇嬰為大將軍賜金千斤嬰陳之廊廡下軍吏􅂈輙令財取為用金無入之者上賜金千鎰文帝初立以陳平為丞相位第二賜金千鎰刲三千户漢書日金一諾季布為任俠有名楚人諺曰得黄金百斤不如季布一諾上金巨萬計梁孝王未死時金以巨萬計不可勝數及死藏府餘黄金尚三十餘萬斤上獻長門園董偃見寵館陶長公主安陵袁叔謂偃曰顧成廟逺無宿宫何不白主獻長門園於上董君入白主主獻之上大悦更名為長門宫主大喜使董君以黄金百斤為袁叔壽上黄金可成武帝即位欒大曰臣之師曰黄金可成而河可塞上鑄金不驗劉向字子政本名更生宣帝時更生言黄金可成上令典尚方鑄作事費甚多方不驗上誤持金去直不疑為郎其同舍郎有告歸誤持同舍郎金去生意不疑不疑買金償之而告歸者來歸金亡者大慙上黄金滿籝韋賢少子𤣥成復以明經歴任至丞相故鄒魯諺曰遺子黄金滿籝不如教子一經上賜金奉祭尹翁歸卒家無餘財天子賢之賜翁歸子黄金百斤以奉其祭祀上乞骨賜金踈廣徙為太傅兄子受為少𫝊父子並為師傅俱乞骸骨皆許之加賜黄金二十斤皇太子賜以五十斤金上守藏盜金扶風人士孫奮居富而性恡梁兾認奮母為其守臧婢云盗紫金千斤續漢書懷金夜遺楊震為東萊太守道經昌邑初震為茂才王密時為昌邑令謁見至夜懷金十斤以遺震曰故人知君君不知故人何也密曰暮夜無知者震曰天知神知子知我知何謂無知密愧而出上金如粟張奐遷安定屬國都尉羗豪帥感奐恩徳上馬二十疋先䙴酋長遺金渠八枚奐受之而召主簿於諸羗前以酒酹地曰使馬如羊不以入厩使金如粟不以入懷悉以金馬還之上金穴郭况遷為大鴻臚上數幸其苐賞賜金帛京師號况家為金穴言其富貴東觀漢記賫金不收豫章張載字仲宗為廣陵太守舉孝子吳奉為孝亷奉賫金至廣陵還奉謝承後漢書鑄黄金蛇永昌太守鑄黄金之蛇獻之梁兾益州刺史和暠發其事張璠漢記神光照社中興初有應媼者生四子而寡見神光照社試探之乃得黄金自是諸子宦學並有才名至瑒七代通顯後漢書舉袖受金田豫為并州胡密懷金三十斤曰以此上公張袖受之荅其厚意胡去之後皆悉付外具狀聞於是詔褒之曰昔魏綘開懷以納戎今卿舉袖以受狄金朕甚嘉焉魏畧石碑生金繁昌縣授禪石碑中生金表送上羣臣盡賀魏志碑金復生永嘉初陳國項縣賈逵石碑中生金人盜鑿取賣賣已復生此江東之瑞也王隠晉書銅生金中咸寧三年起居注載燉煌郡上言銅生金中百陶不消可以切玉上金鈴生清河王覃初為清河世子所佩金鈴歘生隠起如麻粟者祖母陳大妃以為不祥毁而賣之占者以金是晉行太興之祥覃為皇𦙍是其瑞也毁而賣之象覃見廢不終之驗也晉書紫赤光廬江太守路永表言於糓城北見水岸邊紫赤光得金一枚文如印齒晉永和起居注求官袖金彦囘為吏部尚書有人求官密袖中將一餅金因清求閑出金示之曰人無知者彦囘曰卿自應官無假此物若必見與不得不相啟此人大懼狀金而去彦囘叙其事而不言其名時人莫之知也宋書陽邁南海扶南國王諸農死子陽邁立陽邁初在孕其母夣生兒有人以金蓆籍之其色光麗夷人謂金之精者為陽邁中國云紫磨者因以為名宋永初二年遣使貢獻以陽邁為林邑王南史自捧金澡齊武帝嘗至劉悛宅晝卧覺悛自捧金澡灌受四升以沃盥因以與帝宋書金車金人金車玉者至孝則出金人玉者有感德則游於後也林邑有金山金汁流於浦齊書鑄金為龍梁武帝於襄陽起兵蕭頴胄以荆州應焉時長沙寺僧鑄黄金為龍數千兩埋土中歴相傳付稱為下方黄鐵穎胄因取此龍以充軍實上可食廬陵王續之子應不惠王薨至庫内閲珍物見金鋌問左右曰此可食不荅曰不可應曰旣不可食並惣乞汝梁書山金夜飛林邑國有山皆赤色其中生金金夜則出飛狀如螢火南史贖苧得金甄法崇之孫彬有行業鄉黨稱善嘗以一束苧就州長沙寺庫質錢後贖苧還於苧束中得五兩金以手巾裹之彬得送還寺庫道人大驚云近有人以此金質錢時有事不得舉而失擅越乃能見還輙以金半仰酧徃復十餘彬堅然不受謂曰五月披羊裘而負薪豈拾遺金者耶卒還金梁武帝布衣時聞之及踐祚以西昌侯藻為益州刺史乃以彬為府録事叅軍帶鄲縣令將行同列五人帝誡以亷慎至彬獨曰卿昔有還金之美故不復以此言相勵由此名徳益彰上密金寄還歐陽頠在嶺南交州刺史袁曇緩密以金五百兩寄頠令以百兩還合浦太守龔為四百兩付兒智矩餘人弗之知頠尋為蕭糓所破貲財並盡唯所寄金獨存曇緩亦尋卒至是頠並依信還之時人莫不嘆伏之陳書夜中報金紀昭字嗣先燉煌人辟州主簿志在理枉申滯人有夜中報昭黄金者昭責而遣之前燕録路得遺金趙柔字元順嘗在路得人所遺金珠一貫價直百縑柔呼主還之後魏書帝親探賜孫軌字元度為諸軍司馬太武平赫連昌引諸帥入其府藏各令任意取金玉諸將取之盈懷軌獨不取帝把手親探金賜之謂之曰卿臨財亷朕所以贈金者欲顯亷於衆人上置金韀中段暉自慕容璝歸魏太武至長安人告暉欲南奔去置金於韀中帝密遣視中果如告者斬之於市北方金賤李安世為主客令有江南使至多出藏内珍物令都下富室好容服者貨之令使任情交易時齊劉纘至金玉肆問價纘曰北方金玉太賤當時山川所出安世曰聖朝不貴金玉所以同於瓦礫又皇上德通神明地不愛寶故川無金山無玉纘初將大市得安世言慙而罷上黄金殿副貨國城周匝七十里國王有黄金殿殿下有駞七頭高二尺上金寶輙擲齊李㓜亷少寡欲為兒童時初不從家人所求請故嘗以金寶授之終不取强付輙擲之地後為南青州刺史主簿徐乾富而暴横歴政不能禁㓜亷初至因其有犯收繫之乾密通䟽奉黄金百挺奴婢二十人㓜亷不受遂殺之北史金精盤上賜王公已下射王素箭為第一上手以外國所獻金精盤價直鉅萬以賜之隋書御府金贖太宗謂侍臣曰水旱不調皆為人君失徳朕徳不修天當責朕百姓何罪而尚多窮困聞有鬻男女者朕甚愍焉於是遣御史大夫杜淹廵闗内諸州出御府金寶贖還父母唐書受埋幕下開元中杜暹為監察御史徃西覆屯蕃人賫金以遺暹因辭不受左右以不可失藩人之情暹受而埋於幕下旣出境乃移牒令收取之上金坑潤國德宗詔曰朕聞王者不貴逺物所寶惟賢故堯設茅茨禹卑宫室光武捨去寶劍順帝封還火箭朕仰企前王思齊太素邕州所奏金坑誠為潤國語人於利非朕素懷方不以貪為寶惟徳是寶豈尚兹難得之貨生其可欲之心耶其金坑任人採斸官不得占上金沙為贄貞元元年四月南詔王異牟尋與其酋長定計遣使趙莫羅負田南安使凡三軰致書於韋臯各賫生金丹沙為贄三分前臯所與牟尋書各持其一為信歳中三至京師且曰牟尋請歸大國永為蕃臣所獻生金以喻向化之意堅如金也丹沙示其赤心耳上嘉之乃賜牟尋詔書上出金擺袖韋執誼時為翰林學士受賂為人求科第夏卿不應執誼乃探懷出金以内夏卿袖夏卿驚曰吾與若頼先人德致名位幸各以逹豈可如此自毁壞擺袖而去執誼大慙上金謝除制路隨為翰林學士及兼金紫有以金帛謝除制者必辭之曰吾以公事特私賄終無所納上人言善我魯丹三説中山之君而不受也因散五十金事其左右復見未語而君與之食魯丹出不及舍遂去中山其御曰君乃始善我何故去之魯丹曰夫以人言善我必以人言罪我未出境而公子惡之曰為趙來間中山君因索而罪之韓子法而畏上張譴相韓病將死公乘無正懷三十金而間之其􅍚居一月公自謂張譴曰君子死將誰使代子荅曰無正法而畏上雖然不如子食我之得民也張譴死因相公乘無正上資金出弟荆王弟在秦秦不出也中尉之士曰資臣百金臣能出之因載百金之晉見叔向曰荆王弟在秦秦不出也請以百金委之叔向受金而見平公曰可以城壺丘矣平公曰何以對曰荆王弟在秦秦不出是秦荆惡也又不敢禁我城壺丘若禁之我曰為我出荆王之弟吾不城也彼如出之可以得禁彼不出是卒惡也不敢禁我城壺丘公曰善乃城壺丘謂秦之公曰為出荆州之弟吾不城也秦因出之荆王大課以鍊金百鎰遺晉上假物不朽吳時景帝戌將於廣陵掘一大塜棺中人面如生兩耳及鼻孔中皆有黄金大如棗許此假物不朽之効也枹朴子種金平漢建信侯婁敬晚得道居好畤明月山北能種金其地曰種金平今人徃徃得金云敬將卒召邑人囑曰為廟祀我我有以福汝矣已而雲霞飛集而去唐寶厯三年縣令韓儦禱雨于此應于先雨而後雲其事甚異至大古碑永壽縣端木辭國之法贖人臣妾於諸候皆取金于府子貢贖之辭不取金孔子聞之曰賜失之矣夫聖人舉事可以移風易俗非獨適身之行也受金即為不亷則何以相贖自今以後魯國不復贖人於諸侯柿子金襄趙之間故舂陵白水之地多得金麟趾襄􅕭金趾中空四旁有文刻工巧裏蹏似于平物上滳成如乾柿土人謂之柿子金或曰此婁敬所為藥金最良印子金印子金世𫝊淮南王安藥金上有印子篆文出主字壽州八公山土中耕者徃徃得之小餅重半兩有一印大餅至七兩有二十許印續博物志辟寒金魏明帝時昆明國貢𠻳金鳥常吐金屑如粟此鳥畏寒乃處以辟寒臺宫人争以鳥吐之金用飾釵佩謂之辟寒金故宫人相嘲曰不服辟寒金那得聖人心拾遺記何文魏郡張􅁬賣宅于黎陽程應應舉家􅍚轉賣於鄴人何文文獨持大刀暮入北堂宿一更中有人丈餘高冠黄衣升堂呼細腰何以有生人氣荅曰無之須㬰有高冠青衣者又有高冠白衣者問􅀢並如前及將曙文乃下堂中如向法呼之之曰黄衣者金也在堂西壁下青衣錢也在堂前井邊五步白衣銀也在墻東角柱下汝誰也曰我杵也在皂下文按次掘之得金銀各五百斤錢千餘萬仍取杵焚之宅遂清安㮴神記蘓遏天寶中長安有㐫宅莫有市者扶風蘇遏貧甚知之乃以賤價詣本主質焉夕自携一榻當堂而􅃦二更後忽見有一赤物如人形無手足表裏通徹光明忽呌曰咄遏視之不動良久又呼曰爛木咄西墻下有物應諾問曰甚人曰不知又曰大硬鏘欄木曰可畏良久失赤物遏下庭中呼爛木曰前害人者何在曰更無别物只是金精人福自薄不曽殺傷耳遏明日於西墻下掘得一朽桂當心如血色其堅如石於東墻下掘得一石上有篆文曰夏天子紫金三十斤賜有徳者遏自思其不足當也爛木忽語曰何不改名為有徳遏曰善爛木曰君子倘能送某昆明池中自是無撓吾人矣明日掘得一鐵甕得紫金送爛木于昆明池慱異記華山金李􅃴之為左相與李林甫不協林甫陰賊乃好謂􅃴之曰華山生金採之可以富國顧上未之知􅃴之信其言他日為帝道之帝喜問林甫對曰臣知之舊矣顧華山陛下本命王氣之舍不敢以穿治故不敢以聞帝以林甫為愛巳而薄􅃴之􅃴之懼不自安飲藥自殺銀婦宜春郡民章乙其家以孝義聞賓客至者皆延納之忽一日晚有一美婦詣門求宿諸婦欣然待之夜深而罷有一子弟心悦之囑其乳姥别止一室夜深濳滛之其人身體如氷生大驚命燭視之乃一銀人重可千百斤一家驚喜然恐其變化即以炬炭然之乃真白金玉堂閑話䛕墓金劉义持韓愈金數斤去曰此䛕墓中人之金耳不若與劉君為壽愈不能止上辛鋭寶厯中京兆韋思𤣥求鍊金之術一日有居士辛鋭來謁思𤣥即止於舍其後病癰潰血即甚舉家惡之思𤣥嘗招術士數人㑹食而居士不得預具膳居士突至溺于筵上客怒皆起鋭亦告去行至庭忽不見衆甚異之因視其溺乃紫金液竒光燦然有解者曰居士紫金精也辛者葢西方庚辛金也而鋭字兊從金兊亦西方之正位也宣室志山礦銀液唐武帝好仙術有方士趙歸真云飛鍊中須得生銀詔使于樂平採取無所得歸真齋醮數朝寫御書置于岩穴間俄有老人杖䇿而至曰山川藏寶葢因有道而出况明主以修真為念是何感應不臻尊師無復懷憂明旦當從所請語訖莫知所之是夕有聲如雷山礦豁開數丈銀液坌然湧出與入用之數相同禁中修鍊至多外人罕得其術劇談録龍紀唐昭宗文徳二年正朔御武徳殿有紫氣出于昭徳殿東隅欝欝如烟令大内留後司尋其所出得金龍子一枚長五寸許羣臣稱賀帝曰朕不以金龍為􅖤瑞以偃息干戈為􅖤瑞卿等各宜盡忠以體朕懷門下奏請改文徳二年為龍紀元年大唐雜記金塼同光中莊宗遣平蜀得王衍金銀悉命鎔之為金塼銀塼約重三百斤一塼開一竅二人擔之上有匠人名曰馮高過荆南髙季興曰馮高主屬我坑官吏持而有之儲為一庫宋建隆中金銀入京師斤兩封緘如故續博物志求汞成金張永徳并州人五代為潞帥淳化二年改并州初寓睢陽有書生隣居卧病永徳療之􅍚愈生一日就永徳求汞五兩即置鼎中煮之成金永徳懇求藥方生曰君當貴吾不惜此慮損君福白鳩銀冶饒州徳興有銀山一名鄧公山唐總章初竇儼奏立銀冶塲䜟云白鳩出銀冶畢至宋紹聖二年白鳩雙出山穴傾摧自後取無所得貢課未除范仲洛守郡請罷于朝志𤓰子金宋祖詣趙普第時吳越王俶方遣使遺普書及海物十瓶列廡下上曰此海物必佳命啟之皆滿貯𤓰子金普王恐􅉐首謝曰臣實不知上笑曰彼謂國家事皆由汝書生耳命普受之翡翠屑金歐陽修家有一玉罌形制甚古且精巧始得之梅聖俞以為碧玉在頴州時常以示僚屬坐有兵馬鈴轄鄧保吉者真宗朝老内臣也識之曰此寶物也謂之翡翠寶物皆藏宜聖庫有翡翠琖一隻所以識也其後偶以金環于罌腹從手摩之金屑紛紛而落如硯中摩墨始知翡翠之能屑金也歸田録黄銀辛公義為并州刺史山出黄銀獲之以獻詔水部郎婁則就公義禱焉乃聞空中有金石絲竹之響北史循史不取陶季直早慧其祖愍祖宋廣州刺史甚愛之嘗以四函銀列置於前令諸孫各取其一季直時年四歳獨不取曰若有賜當先父伯不應度及諸孫故不敢愍祖益竒之南史龍膏化液韓約唐太和中為安南都䕶時土産有玉龍膏南人用之能化銀液耆舊相傳其膏不可齎徃犯者則為禍耳約不之信及受代還闕貯之以歸時為執金吾果首惟甘露之禍乃貪利冐貨之所致也補録紀傳寳山黄金從吐蕃國向雪山南界至屈露多悉立等國云從此驛北行可以九日有一寶山之中土石並是黄金有人取者即獲殃咎王𤣥榮西國行傳藏地變土殷仲文性貪吝多納貨賄桓𤣥為劉裕所敗仲文隨𤣥西走其珍寶玩好悉藏地中皆變為土晉書螢飛林邑國有山赤色其中生金夜則出飛狀如螢火梁書山出山上有葱下有銀山上有薤下有金山上有薑下有銅錫山有寶玉木傍枝皆下垂又曰白銀見為雄鷄地鏡圖汝漢起玉起於禺氏山金起於汝漢珠起於赤野此寶相去各七千里上有丹沙下有黄金上有磁石下有銅金葛盧山發而出金蚩尤取以為劍鎧雍狐山發而出金蚩尤取以為㦸管子金精梁簡文論云見夜如棗核飛散者金精也萬斤一匱王莾敗省中黄金萬斤者一匱尚六十匱漢書石碑生金繁昌縣授禪石碑中生金表送上羣臣盡賀魏志懸金於市懸千金於市人不敢取者分定也委一錢於路童子争者分不定也傳子珍葆珍寶字皆作葆張良傳見黄石取而葆祠之史記雨金先儒説禹時天下雨金三日古詩曰安得天雨金使金賤如土周成王時咸陽雨金今咸陽有雨而原秦二世世元年宫中雨金旣而化為石漢惠帝二年宫中雨黄金黒錫又翁仲儒家貧力作居渭川一旦天雨金十斛於其家由是與王侯争富今秦中有雨金翁世世富拾遺記海捐為牛海中有金臺臺内有金九𤣥中紀金之精為牛幽明録鳩飛入懷長安有張姓者晝獨處室有鳩自入止于對床張惡之披懐祝曰鳩爾來為我祸耶止承塵為福耶入我懷鳩翻飛入懷以手探之不知所在而得一金帶鈎焉遂寶之自是之後子孫昌盛上腰金收骨王忳字少林詣京師於客舍見諸生病甚因謂忳曰腰下有金十斤願以相與乞收藏骸骨未問姓名因絶忳賣金一斤以給絮棺九斤置生腰下益都耆舊傳詔使來負隗炤者汝南陰鴻壽亭民善於易臨終書板授其妻曰吾死當大荒窮雖爾慎莫賣宅到後五年春當有詔使來􅉐此亭姓龔此人負黄金卿以此板徃責之亡後果大困欲賣此宅者數矣憶夫言輙止到期日有龔使者果至亭妻遂賫板徃責使者使者執板不知所言曰我平生不踐此處何縁爾也沉吟良久謂曰賢夫何能妻曰夫善易而未曽為人卜使者曰是矣乃顧命使者取蓍而筮之卦成謂炤妻曰吾不相負賢夫自有金乃知亡後暫窮故藏金以待太平所以不告婦兒者恐金盡而困無己也知吾善易故書板以寄意耳金有五百斤盛以青鉼覆以銅柈埋在堂屋東頭去壁一丈入土九尺妻還掘之皆如卜焉録異𫝊金臺玉樓老子與尹喜登崑崙上金臺玉樓七寶宫殿晝夜光明乃天帝四王之所遊處有珍玉七寶之狀闗令内傳報婦投瀬伍子胥伐楚還漂陽瀬水上欲報自殺婦人百金不知其家投金瀬水中而去須㬰有一姥哭而來言是女母取金而去吳越春秋不以利汚樂羊子出舉其妻貞儀截髪供其費後羊子得遺金一餅以與妻貞儀曰君子不以利汚行羊子慙而去之列女傳得金讓兄廣漢汝婦者汝敦妻也敦以所受田地奴婢三百餘萬悉譲與兄裁留園地數十畆起舍耕作土中得金一器敦以示妻妻曰本言讓先祖所有此獨非其有耶敦曰固無意也俱擔金送與兄嫂上賣素置金陳翼字子初到覧鄉見馬旁有一人病呼曰我長安魏少翁聞卿廬江樂來遊今病不能前翼迎歸養之有金十餅素二十疋旣死翼賣素買棺衣衾以金置棺下騎馬出入後其兄長公見馬告之吏捕翼翼具言棺下得金長公叩頭謝以金十餅投其門翼送長安還之廬江七賢傳蘓家金蘓秦宅在洛陽利仁里後魏高顯業每夜見赤光於光處掘得金百斤詔曰蘓家金業為之造寺郡國志金牛二丈州南十里有牛潭漁人見金牛自水出義熈中縣民張安躡得金繅大如指遂數十尋尋之不已俄有物從出引之掘不能禁以刀㫁之數尺安遂致富其後儀興云甫掩此牛犁㫁其鏁得二丈遂以財雄羅浮山記金山從林邑徃金山三十日至逺望金山嵯峨如赤城照耀似天大潤壑谷中亦有生金形如䖝豸細者如蒼蠅大者若蜂蟬夜行耀耀光如螢火林邑記賜孝郭巨河内溫人也妻生男謀曰養子則不得營業妨於供養當殺而埋焉鍤入地有黄金一釜上有鐵券曰黄金一釜賜孝子郭巨宗躬孝子傳紫磨金之優者名曰紫磨猶人之有聖也孔融聖人優劣論夜明五嶺内冨州濱州澄州江漢間皆産金側近居人以木箕陶金為業自旦及暮有不䕶一星者鄭圯傷陶者詩云披沙辛苦見傷懷徃徃分毫望亦乖力盡半年深水裡得金為一鳯凰釵就中澄州者最為良金余頃年使于上國親友不欲書其姓字附澄州金二十兩與當灼權臣余訝其單鮮友人曰金雖少貴其夜明有異於常金耳遂留宿驗之信然也嶺表録異金氣赤黄黄金之氣赤黄千萬斤以上大如鏡盤地鏡圖麗水荆南之地麗水之中生金人多竊採金採金禁得而輙辜磔于市甚衆壅離其水也而人竊金不止韓子昆吾金昆吾之金錕鋙山名出金可作刀以切玉易書唐高昌王弟之子昭好學有鬻異書者每顧筒中金白曰何愛此不使予有異聞乎盡持易之史鼻齅狼䐠民與漢人交闗常夜市以鼻齅金知其好惡異物志不祥物朝鮮國都中有兄弟二人偕行弟得黄金二錠以其一與兄至楊花渡同舟以濟忽投金于水曰吾平日愛兄甚篤今分金忽萌忌兄之心此乃不祥之物不若投諸江忘之兄曰汝言誠是亦投金于水大唐金成弼遇道士遺以化金丹後試之驗乃刼道者殺而盡奪之弼旣得丹多變黄金色赤踰常可以服餌唐太宗聞之授以五品官凡造金數萬斤後術窮求去帝謂其詐而斬之後有别寶者以為至寶廣記逐丸韓嫣好彈常以金為丸一日所失者十餘長安為之語曰若飢寒逐金丸京師兒童每聞嫣出輙隨之望丸所落而拾之西京雜記白鼠白鼠以昏時見於丘陵之間視所出入中有金白澤圖十四種曰銷金曰拍金曰鍍金曰織金曰砑金曰披金曰泥金曰鏤金曰撚金曰鎔金曰圈金曰貼金曰嵌金曰裹金廣六典清明金神謂之清明廣雅爍金諺曰衆口爍金口者火也五行二曰火五事二曰言言與火直故云爍金論衡衆口爍金俗説有美金在此衆人咸共詆䚹言其不純賣金者欲其售因取鍛燒以見真此謂衆口鑠金風俗通能鑄黄金漢書曰説王陽雖儒生自寒賤然好車馬衣服極為鮮好而無金銀文繡之物及遷徙去處所載不過囊衣不蓄積財去位家居亦布衣䟽食天下服其亷而恠其奢故俗傳王陽能作黄金語曰金不可作世不可度王陽居官食禄雖為鮮明車馬衣服亦能㡬所何足恠之乃傳俗説班固之論陋於是矣上神鷄如金南康雩都縣㳂江西出去縣三里名梦口穴狀石屋舊傳常有神鷄色如好金出此穴中奮翼回翔長鳴響徹見人輙飛入穴因號此穴為鷄石昔有人耕此山望見鷄出遊戯有一長人操彈之鷄遥遥見便飛入穴彈丸正着穴上丸徑六尺許下垂蔽穴猶有門隙不復容人又有人乗船至此從下流還縣未至此屋數里一人通身黄衣擔兩籠黄紙求寄載因載之黄衣人乞食船主與之食訖船􅃴至崖下船主乞𤓰此人不與乃唾盤上徑下崖直入石中船主初甚忿之見其入石始知神異取食器視之見盤上唾悉是黄金述異記載金一舸馮子猷以豪俠聞貞觀中入覲載金一舸自隨白帖造常滿樽李元素為武徳令刺史李文揀横調民黄金造常滿樽以獻官屬無敢諫元素固争文揀為少損椱坦洞穴王鍔常請籍坊以廣第舍作複坦洞穴實金錢其中藥金孟銑遷鳯閣舍人它日至劉槿之家見賜金曰此藥金也燒之火有五色起試之驗置餘金棺下李勉少貧俠客梁宋與諸生共逆旅諸生􅍚且死出白金曰左右無知親君其於此為我𦵏餘則君自取之勉許之托𦵏密置餘金棺下後其家謁勉共啟墓出金付厚啖元載盜殺李輔國載陰與其謀及復結中人董秀厚啖以金使刺取密旨帝有所屬必先知之持金去劉乂因持愈金數斤去云此䛕墓中人耳不若與劉君為壽愈不能止刻玉扶南出剛金狀類紫石英生水字石上人没水取之可以刻玉鑄金象郝玭封寶定郡王贊普常等玭身鑄金象令于國門得生玭者以金玭償之朝廷畏失名將徙為慶州刺史雨金垂拱三年七月廣州雨金位正秋為刑為兵占曰人君多殺無辜五行志一篋尉遲敬徳單雄信騎直趨秦王敬徳躍馬大呼刺雄信墜馬乃翼王出賜金一篋積金至斗隠太子以書招之贈金皿一車辭曰其敢當賜王曰公之心如山岳雖積金至斗豈能移之藥塗紙成金陳允升好道無金諷有姻禮而黄金郡中少不足用呵責其下允升曰無恕吾得為之取厚藥以塗其紙投火中皆成金因以足用能化黄金劉巨容始揚州人申屠生能化黄金高駢客之為吕用之所譖犇襄漢見巨容自言其術金麩長川諸山徃徃有金或披沙得之麗水多金麩南蠻傳獻金示順革南詔異牟尋贈常臯黄金丹砂臯䕶送使者奏異牟尋請歸天子為唐藩輔獻金示順革丹赤心也徳宗嘉之賜以詔書二道比黄衣白衣陳尚書言其昔在郷里好為詩俚人謂之陳舍人比樂天也性踈簡喜賓客常有二道比一黄衣一白衣詣其家求宿舍之㕔事夜聞二客床上鏗然有聲久之若無人秉燭視之見白衣下乃銀人也黄衣不復見家遂富稽神録銀銀鐐白金謂之銀其美者謂之鐐爾雅淘井安灌中舜為父母淘井將銀錢安灌中與父母史記銀山溢殷得金徳銀山溢上多銀杻陽之山其陽多白銀少陽之山其下多赤銀山海金簡禹登委山得五金簡青玉為字編以白銀吳越化人宫周穆王執化人之袪騰而上天暨化人之宫構以金銀絡以珠玉列子蛇糞成銀𢎞農楊子聞土中作聲掘得玉後三年有蛇去梁上落糞皆成碎銀作器賣於市得者尋以破滅異苑銀餅賣歛故司𨽻校尉上黨鮑子都少時上計椽於道中遇一書生獨行無伴卒得心痛子都下車為按摩􅍕忽亡不知姓名有書一卷銀十餅即賣一餅以殯歛其銀以枕之素書着腹上哭之謂曰若子魂靈有知當令子家知子在此今奉使命不獲久留遂辭而去列異記銀牓東門外有東明山有宫焉左右闕而立其高百丈逮以五色門有銀牓以青碧鏤題曰天地長男之宫南方有閭明山有宫焉有銀牓題曰天地中女之宫十洲記好黄白事期門郎程偉好黄白事娶妻得恠女偉無衣偉婦致兩疋繒後見夫方扇炭欲燒箇中水銀乃出其中中藥以投之立成銀偉就求道不授發狂而死桓譚新語銀錢大秦國以金錢為錢十銀錢當一金錢司馬彪續漢書賜千餅郭修手刃蜀大將軍費褘追加褒寵謚曰威侯子龍加爵拜奉軍都尉賜銀千餅魏志掘得銀孫皓時言掘地得銀長一寸廣一分刻上有年月於是改元為天䇿吳志上元賜銀成帝咸康元年有司奏上元給賜衆官銀檢金部見銀一萬五千充給晉故事銀器滿席明帝每存儉約欲鑄壞太官元日上壽酒銀鎗尚書令王晏等咸稱盛徳蕭頴胄曰朝廷盛禮莫過三元此一器旣是舊物不足侈帝不悦復預曲晏銀器滿席頴胄曰陛下前欲壞酒鎗恐宜移在此器也帝甚慙齊書四歳不取梁陶季直丹陽和陵人也祖愍祖宋廣州刺史父景仁中散大夫季直早慧愍祖甚愛異之嘗以四凾銀列置於前令諸孫各取其一季直年時四歳獨不取曰若有賜當先伯父不應度及諸孫故不取愍祖益竒之南史卜暴得銀周文育從南海出至大庾嶺遇卜者卜之曰君北下不過作令長南入則為公侯又當暴得銀二千兩若不見信以此為驗其夕宿於逆旅有賈人求與文育博文育勝之得銀二千兩日遂却入嶺南陳書贈柘弓劉聰引帝入讌語帝曰卿為豫章王時贈朕柘弓銀硑卿頗憶否曰臣安敢忘之但恨爾日不得早識龍顔前趙録銀楹大武殿室皆銀楹金柱後趙録開銀山禁孝明皇帝開恒州銀山之禁與人共之後魏書黄金鏤銀太武皇帝和平二年詔中書坊作黄金盒子鏤以白銀紉以玫瑰上食器不死武帝中方術人師市奴合金銀並成上異之以示侍臣封徳彛進曰漢代方士及劉安等皆學術唯苦黄白不成金銀為食器可得不死唐書比我桓靈貞觀中治書侍御史權萬紀上言宣饒二州諸山大有銀坑採之極是利益每歳可得錢百萬貫上謂曰朕貴為天子是事無所少乏唯嘉言善事有益於百姓者且國家䞉得數百萬錢何如得一有才行人不見卿推賢進善之事又不能按舉不法震肅權豪唯只言稅鬻銀坑以利多為美昔堯抵璧於山投珠於淵由是崇名美號見稱千載後漢桓靈二帝好利賤士為近代庸暗之主卿遂欲將我比桓靈耶是日放令還弟上賦詩賜鍾太宗引杜淹為天䇿府兵曹恭軍文學館學士常侍宴賦詩時有八人同時淹為稱首賜以銀鍾上吊伐報耻貞觀中鴻臚奏高麗莫支唯貢白金黄門侍郎禇遂良進曰莫支難虐殺其主九夷所不容陛下以之興兵將事吊伐為遼山之人報主辱之若受其貢何所致伐太宗納焉上進熟綿綾元和十四年涇原節度使王濳進銀三千兩熟綿綾三千疋涇州密邇我境其土無百姓其軍皆仰給度支舊矣主若無名上獻雖吳蜀沃富猶謂取諸人以于媚不免於譏責今則盜削軍實以充供獻而求恩澤葢以時急於利勢使然也進銀胡瓶太和中尚書左丞王起進亡兄播銀胡瓶二百枚玉及通犀帶刀劔器仗等上升封報告王者易姓而起必升封太山何報告之義也封以金銀繩或曰石塗金銀繩封之以印璽白虎通銀甕玉者宴不及醉刑罰中人不為非則銀甕出瑞應圖銀氣夜白銀氣夜正白流散在地撥之隨手合地鏡圖變雄鷄白銀精變白雄鷄上銀山素霧曲江縣有銀山山多素霧相州記黄銀黄銀見君乘金而王則黄銀見禮斗威儀山出黄銀辛公義為牟州刺史時山東霖雨自陳汝至於滄海皆苦水灾境内犬牙獨無所損山出黄銀獲之以獻詔水部郎婁前就公義禱乃聞空中有金石絲竹之響隋書黄銀帶太宗嘗賜房𤣥齡黄銀帶顧謂曰昔如晦與公同心輔朕今日所賜唯獨見公因泣然流涕唐書鬼畏黄金如聞黄金多為神鬼畏命取黄金帶遣𤣥齡親送于靈所也上水銀葬以水銀秦始皇𦵏以水銀為百川江河大海機轉相輪終而復始史記墓中水銀闗東賊發始皇墓中有水銀皇覧汞水銀謂之汞廣雅服鍊水銀封君逹隴西人服鍊水銀年百餘歳常騎青牛世號青牛道士神仙傳鈆􅀈目擊筑髙漸離秦始皇矅其目使擊筑漸離乃以鈆置筑中舉筑朴秦始皇帝史記枕鈆東觀漢記曰曹褒􅃦則枕鈆鈆攪成金取鈆十斤安鐵器中猛火燒之三沸投九轉丹華一銖於鈆中攪之立成黄金茅君内傳銷鈆求銀尹軌字公度有一人遭父喪當𦵏而貧窮及尹公度省之孝子説甚辛苦公度愴然曰卿假求數十斤鈆得否孝子言猶可得耳乃具一百斤公度將入前山中架小屋下於爐火中銷鈆以其所帶管中藥如豆大投沸鈆中攪之皆成好銀以與之告曰念卿貧困故以相與慎勿多言神仙傳天雨鈆河門有雨鈆城漢世天雨鈆述異記草有鈆草青莖赤秀下有鈆地鏡圖精為老婢鈆錫之精為老婢𤣥中記錫鈏爾雅曰錫謂之鈏明鏡磨氊明鏡之始照未見其容也及扢之以𤣥錫磨之以氊則鬚眉見淮南子赤錫龍山之下多赤錫濯山多白錫山海經赤堇出錫赤堇山破而出錫越絶書銷錫成金尹軌字公度常見一人本冠族子弟仕郡遇公事薄書不了當備官錢百萬賣田宅車牛不售而停見收擊公度與所富人曰子可以百萬錢借我我欲以救人後三十日信當還富人嘉敬之即以百萬錢與公度以與遇事者曰卿能得一百二十斤錫否遇事者即具之公度於䥶中銷錫復以其腰間管中藥一方寸投沸錫中攪之皆成金賣與人得錢百萬以還富人近光熈元年間公度到南陽太和山中神仙傳銅鑄鐘鄭伯朝楚子與之金旣而悔之與之盟曰無以鑄兵故以鑄三鐘左傳僖中銅色龍形秦遣徐福入海還偽辭曰臣見海中大神曰汝秦王之神薄得觀而不得取從臣徃􅅾萊山見芝城宫闕有使者銅色而龍形光上照天史記銅人十二秦始皇收天下兵聚之咸陽為銅鑄金人十二各千石置庭中上銅山鑄錢上使善相相鄧通當貧飢死文帝於是賜通蜀嚴道銅山得自鑄錢景帝立有告通盜去徼鑄錢盡没入一簮不得著身寄死人家上天中記卷五十
