body:
  text: 天中記卷三十二明陳耀文撰御史臺上卿御史大夫秦官位上卿掌副丞相漢百官表應劭曰侍御史之率故稱大夫云初學記位次上卿御覽同寺御史大夫寺在司馬門内門無塾其門署用梓板不艧色題曰御史大夫寺漢舊儀副丞相漢御史大夫副丞相事若今之同平章及㕘知機務之類所以漢書曰薛貢韋匡迭為宰相薛宣韋賢匡衡則是丞相而貢禹但為御史大夫通典蘭臺御史大夫所居之署漢謂之御史府亦謂之御史大夫寺亦謂之憲臺後漢以來謂之御史臺亦謂之蘭臺寺上中司御史臺率執憲中司朝㑹獨坐内掌蘭臺督諸州刺史糾察百寮出為二千石蔡質漢儀秘書為鄰初漢御史中丞掌蘭臺秘書圖籍故歴代置都邑建臺省以秘書與御史為鄰六典注弄印漢高祖以御史大夫周昌為趙王相曰吾極知其左遷吾私憂趙堯之有母無可者於是徙昌為趙王相既行高祖持御史之印玩弄之曰誰可以為御史大夫者熟視趙堯曰母已老矣遂拜堯御史大夫始堯為昌符璽御史人謂昌曰君之史趙堯竒才必代君為相昌曰堯刀筆小吏何至是乎後果然史記長者張歐字叔武帝時代韓安國為御史大夫歐為吏未甞言按人剸以誠長者處官官屬以為長者亦不敢大欺上具獄事有可卻卻之不可者不得已為涕泣面而封之其愛人如此漢書上知人武帝将封禪拜倪寛為御史大夫從東封㤗山初梁相褚大通五經為博士時寛為弟子及御史大夫缺徵褚大大自以為得御史大夫至洛陽聞兒寛為之褚大笑及至與寛議封禪於上前大不能及退而服曰上誠知人寛為御史大夫以稱意任職故乆無有所匡諫於上官屬易之上舞文張湯為御史大夫鉏豪彊并兼之家舞文巧詆以輔法湯每朝奏事語國家用日旰天子忘食丞相取充位天下事皆決湯百姓不安其生上居父府杜周刻深上以為盡力無私遷為御史大夫子延年字幼公五鳯中徵入為御史大夫居父官府不敢當舊位坐卧皆易其處上白去副封魏相字弱翁宣帝即位遷御史大夫故事諸上書者皆為二封署其一曰副領尚書者先發副封所言不善屏去不奏相復因許伯白去副封以防雍蔽上不灋丞相司直緐延壽奏御史大夫蕭望之知御史有令不得擅使望之多使守史自給車馬之杜陵護視家事少史冠法冠為妻先引又使賣買私所附益凡十萬三千不奉法自脩踞慢不遜攘讓請逮捕係治上于是䇿免望之黄霸代為御史大夫上數言得失貢禹字少翁元帝時御史大夫陳萬年卒禹代為御史大夫列於三公自禹在位數言得失書數十上又言孝文皇帝時貴亷絜賤貪汙今天下奢侈官亂民貧盜賊並起姦軌不勝則取勇猛能操切百姓者以寄暴威服下者使居大位故亡義而有財者顯於世欺謾而善書者尊於朝誖逆而勇猛者貴於官故黥劓而髠鉗者猶復攘臂為政於世行雖犬􅇾家富勢足目指氣使是為賢耳故謂居官而置富者為雄桀處姦而得利者為壯士兄勸其弟父勉其子俗之壊敗乃至於是上嘉其質直之意上九卿之右元帝時琅邪貢禹為御史大夫而華隂守丞嘉上封事言治道在於得賢御史之官宰相之副九卿之右不可不選平陵朱雲兼資文武忠正有智畧可使試守御史大夫以盡其能上迺下其事問公卿匡衡對以為大臣者國家之股肱萬姓所瞻仰明王所慎擇也今御史大夫禹絜白亷正經術通明有伯夷史魚之風海内莫不聞知而嘉猥稱雲欲令為御史大夫妄相稱舉疑有姦心宜下有司案驗以明好惡嘉竟坐之上統理天下薛宣字贛君以明習文法詔補御史中丞是時成帝初即位宣為中丞執法殿中外總部刺史數言政事便宜舉奏部刺史郡國二千石所貶退稱白黒分明由是知名累遷少府月餘御史大夫于永卒谷永上疏曰御史大夫内承本朝之風化外佐丞相統理天下任重職大非庸才所能當今當選於羣卿以充其闕竊見少府宣才茂行潔達於從政前為御史中丞執憲轂下不吐剛茹柔考績功課簡在兩府文臣足以謀王體斷國論臣是用越職陳宣行能唯陛下留神考察上然之遂以宣為御史大夫相府漢興襲秦官置丞相御史大夫成帝時何武為九卿建言依古置三公改御史大夫為司空是時御史府吏舍百餘區井水皆竭及其府中列栢樹常有野烏數千棲宿其上晨去暮來號曰朝夕烏烏去不來者數月長老異之後二嵗餘朱博為大司空奏言高皇置御史大夫位次丞相典正法度以職相㕘總領百官上下相監臨歴載二百年天下安寧今中二千石未更御史大夫而為丞相權輕非所以重國政也臣愚以為大司空官可罷復置御史大夫為百寮率哀帝從之迺更拜博為御史大夫上師古曰史言井竭烏去著御史大夫之職當休廢也後謂御史臺為栢臺烏臺者皆此事也事文類聚烏府下引此而云成帝時御史臺有烏集故謂之烏臺誤合璧復因之亦誤門北闢北齊楊楞伽鄴都故事云御史臺在宫闕西南其門北開取冬殺之義斯事乆矣今東都臺門所以不北向者葢欲變古之制或建造者不習故事耳龍朔中改司經局為桂坊置司直為東宫之憲府亦開北門以象御史臺其例明矣或云隋初移長安城造御史臺時以兵部尚書李員通檢校御史大夫欲於尚書省近故開北門此説則非也通典無為地韋挺拜御史大夫太宗甞謂挺曰卿之任御史大夫獨朕意耳左右大臣無為卿地者卿勉之哉挺陳謝曰臣駑下不足以辱陛下高位且臣非勲非舊而超處藩邸故寮之上臣願後之以勸立功者太宗不許舊唐見坐不起韋挺為御史大夫見侍御史坐不起時馬周為監察韋恃性使氣畧於知人馬以才幹特達至於奏事韋猶作常人相處及韋為太常卿馬累遷中書舍人太宗甞欲復用韋在門下馬密陳其傲狼非宰相器遂寢十九年征遼擇運糧人馬云韋挺中麄使上然之竟以此敗分紀二唐稍異憲臺後周曰司憲隋及大唐皆曰御史臺龍朔二年改為憲臺故御史為風霜之任彈糺不法百寮震恐官之雄峻莫之比焉舊制但聞風彈事提綱而已通典被辱安受劉仁軌為給事中與中書令李義府不協出為青州刺史時有事遼海義府逼仁軌運糧果漂沒勅御史袁異式按之異式希義府意遇仁軌不以禮或對之猥洩曰公與當朝讎者為誰何不引決仁軌曰劉仁軌豈失却死耶坐此除名大将軍劉仁願尅百濟奏以為帶方州刺史仁願凱旋髙宗謂之曰卿将家子處置補置皆稱朕意何也仁願拜謝曰非臣能為乃前青州刺史教臣耳遽發詔徵之至則拜大司憲御史大夫也初仁軌被徵次于萊州驛舍於西㕔夜已乆有御史至驛人曰西㕔稍佳有使止矣御史曰誰答曰帶方州刺史命移仁軌於東㕔既拜大夫此御史及異式俱在臺内不自安仁軌慰之曰公何痩也無以昔事不安耶知君為勢家所逼仁軌豈不如韓安國但恨公對仁軌卧而洩耳又謂諸御史曰諸公出使當舉寃滯發明耳目興行禮儀無為煩擾州縣而自重其權指行中御史曰只如某御史夜到驛驛中東㕔西㕔復有何異乎苦移乃公就東㕔豈忠恕之道也願諸公不為也唐新語仁軌雖貴顯不自矜踞接舊故如布衣時甞為御史袁異式所劾慢辱之脅使引決及拜大司憲異式尚在臺不自安因醉以情自解仁軌持觴曰所不與公者有如此觴後既執政薦為司元大夫新唐坐受其拜韋思謙在憲司每見王公未甞行拜禮或勸之答曰鵰鶚鷹鸇豈衆禽之偶柰何設拜以狎之且耳目之官固當獨立也則天光宅元年分置左右肅政臺復以思謙為右肅政大夫大夫舊與御史杭禮思謙獨坐受其拜或以為辭思謙曰國家班列自有差等柰何以姑息為事耶舊唐朝彈暮黜薛登本名謙光景雲中拜御史大夫時僧惠範恃太平公主權勢逼奪百姓店肆州縣不能理謙光将加彈奏或請寢之謙光曰憲臺理寃滯何所􅂞避朝彈暮黜亦可矣遂與殿中慕容珣奏彈之反為太平公主所構出為岐州刺史上臺無長官御史大夫李承嘉甞召諸御史責之曰近日御史彈事不咨大夫禮乎衆不敢對監察御史蕭至忠進曰故事臺中無長官御史人君耳目比有事主得自彈事不相闗白若先白大夫而許則彈大夫不知白誰也承嘉黙然㑹要至忠曰御史人君耳目俱握雄權豈有奏事先咨大夫臺無此例新語競為官政崔隠甫開元十四年代程行諶為御史大夫在職强政無所􅂞避自貞觀年李乾祐為御史大夫别置臺獄有所鞫訊便輒繫之由是自中丞侍御史已下各自禁人牢扉常滿隠甫引故事奏以為不便遂掘去之又憲司故事大夫已下至監察御史競為官政畧無承禀隠甫一切督責事無大小悉令諮決稍有忤意者便列上其罪前後貶黜者殆半羣寮側目帝嘗謂曰卿為御史大夫海内咸云稱職甚副朕之所委也舊唐抗禮故事侍御史以下與大夫抗禮光宅元年韋思謙除左肅政大夫遂坐受拜其後大夫又與之抗禮至開元十八年有勅申明隔品致敬其禮由之不改至二十四年六月李適之為大夫又坐受拜其後與之抗禮至今不改通典副相尹思貞睿宗初為将作大匠時左僕射竇懐貞興造金仙玉真兩觀調發夫匠思貞常節減之懐貞怒頻詰責思貞思貞曰公職居端揆任重弼諧不能翼贊聖明光宣大化而乃盛興土木害及黎元豈不愧也又受小人之譖輕辱朝臣今日之事不能茍免請從此辭拂衣而去闔門累日上聞而特令視事其年懐貞伏誅乃下制曰國之副相位亞中台自匪邦直孰司天憲将作大匠尹思貞剛不䕶缺清而畏知簡言易從莊色難犯徵先王之體要敷袵必陳折佞臣之怙權拂衣而謝故以事聞海内名動京師鷹隼是擊豺狼自逺必能條理前弊發揮舊章宜承弄印之榮式允登車之志可御史大夫舊唐兄弟並拜肅宗幸靈武李峴應召至行在拜扶風郡太守兼御史大夫既收京師拜禮部尚書守京兆尹復兼御史大夫時峴兄峘為户部尚書兼成都尹乾元初𤣥宗還京峘自蜀至又兼御史大夫兄弟俱判臺事自國初以來兄弟並拜大夫未有其比時長安士庶皆賦美之上先細務李朝隠代崔隠甫為御史大夫天下以其有素望每大夫闕冀朝隠得之及居職不争引大體惟先細務由是名少衰唐書方挺元載當國乆益恣横代宗不能堪隂引剛骾大臣自助欲收剛權以黜載㑹御史大夫敬恬卒即召李栖筠與河南尹張延賞擇可為大夫者延賞先至遂代括㑹李少良陸珽等上書劾載隂事詔御史問狀延賞稱疾不敢鞫少良珽覆得罪死帝殊失望出延賞為淮南節度使引拜栖筠為大夫始栖筠見帝敷奏明辨不阿附帝心善之故制麻自中以授朝廷莫知也中外竦眙栖筠素方挺無所屈於是華原尉侯莫陳怤以優補長安尉當㕘臺栖筠物色其勞怤色動不能對乃自言為徐浩杜濟薛邕所引非真優也始浩罷嶺南節度使以瓌貨數十萬餉載而濟方為京兆邕吏部侍郎三人者皆載所厚栖筠并劾之上不往曲江故事賜百官宴曲江教坊倡顐雜侍栖筠以任國風憲獨不往臺遂以為法帝比比欲召相憚載輒止然有進用皆密訪焉多所補助上推為盛門李叔明字晉族兄仲通字向叔明與仲通俱尹京兆及兼秩御史中丞並節制劍南又與子昇俱兼大夫蜀人推為盛門上繩治如平日顔真卿遷御史大夫方朝廷草昩不暇給而真卿繩治如平日侍郎崔漪諫議李何忌皆被劾斥降廣平王總兵二十萬平長安辭日當闕不敢乗趨出梐􅀈乃乗王府都虞候管崇嗣先王而騎真卿劾之帝還奏慰答曰朕子每出諄諄故戒故不敢失崇明老而躄卿姑容之百官肅然上脂韋在列李元素徵拜御史大夫自貞元中位缺乆難其人至是元素以名望召拜中外聳聽及居位一無脩舉但規求作相乆之寢不得志見客必曰無以其官散相疎也見屬官必先拜脂韋在列大失人情舊唐論元載姦崔渙博綜經術長論議遷御史大夫元載輔政與中官董秀盤詰固寵渙疾之因進見慨然論載姦代宗曰載雖非重慎然協和中外無間然能臣也對曰和之為貴者由禮節也不節之以禮焉得和今干戈甫定品物思乂載為宰相宜明制度易海内耳目而怙權樹黨毀法為通鬻思為恕附下茍容乃幽國卑主術臣所未喻帝黙然渙𤣥暉孫也子縱徳宗時為御史大夫處大體不急細事獄訴付成僚屬而已新辱臺李景讓大中中進御史大夫甫視事劾免侍御史孫王汝監察御史盧植威肅當朝為大夫三月蒋伸輔政景讓名素出伸右而憲宗擇相書書羣臣當選者以名内器中禱憲宗神御前射取之而景讓名不出世謂除大夫百日有他官相者謂之辱臺景讓愧艴不能平見宰相自陳考深當代即拜西川節度使以病丐致仕諫抑外戚李景讓轉御史大夫正色立朝言無避忌時宣宗皇舅鄭光卒詔贈司徒罷朝三日景讓曰國舅雖親朝典有素無容過越有天下者尤不可使外戚强盛故西漢有吕氏之侈幾滅劉氏國朝有則天之纂殆革唐命葢非一朝一夕其所由來漸也今鄭光輟朝日數與親王公主同設使陛下速改詔命輟朝一日或兩日示其昇降有差恩禮無僣優詔報之乃罷朝兩日舊唐制百司大中元年御史臺奏伏以御史臺臨制百司糾繩不法若事簡則風憲自肅事煩則紀綱轉輕唐㑹要雄班避車要秩非徳靡升専席雄班惟賢是屬侍中楊再思投水陳謨邁漢朝之三傑霑砂作相掩虞日之五臣佇因獻替兼肅權豪宜分務於鸞扄俾効能於烏署峻秩烏臺峻秩望總鐵冠蒼佩崇班威高石室蘇㺾詞吞楚澤量湛黄陂西京展驥道掩題輿右輔憑熊風超露冕朱帷霧撤初停州縣之勞白簡霜凝宜屏權豪之氣俱中宗制職司天憲御史臺事總朝綱職司天憲五代㑹要大憲呉武義元年改御史大夫為御史大憲九國志正班序御史臺御史大夫一人朝㑹則率其屬正百官之班序監察御史顓舉不如法者百官志中丞休有光烈御史大夫本有兩丞其一曰御史丞一曰御史中丞謂之中者以其别在殿中掌蘭臺秘書外督部刺史内領侍御史受公卿章奏糾察百僚休有光烈漢官糾察百寮丞故二千石為之或遷侍御史高第執憲中司朝㑹獨坐内掌蘭臺督諸州刺史糾察百寮蔡質漢儀臺率御史中丞御史大夫之丞也舊别監御史在殿中密舉非法及御史大夫轉為司空因别留中為御史臺率後志漢官尚書御史謁者為三臺自漢罷御史大夫而憲臺猶置以丞為臺主中丞御史謝靈運晉書居殿中釋名曰御史中丞居中丞相者也辦云此中丞自御史大夫下丞有二其一别居殿中舉不法故曰中丞韋昭辨中丞有石室以藏秘書圖䜟之屬以其居殿中故曰中丞環濟要畧殿中蘭臺秘書圖籍在焉而中丞居之宋志㣲文深詆減宣遷至御史及中丞使治主父偃及治淮南反獄所以微文深詆殺者甚衆稱為敢決疑數廢數起為御史及中丞者幾二十嵗史記敬憚陳咸字子康沛郡人為中丞總領州郡奏事課第諸刺史執法殿中公卿已下皆敬慊之漢書權次尚書建武以來省御史大夫官屬入侍蘭臺蘭臺有十五人特置中丞一人以總之此官得舉非法其權次尚書漢官解詁注三獨坐宣秉建武元年拜御史中丞上特詔御史中丞與司𨽻校尉尚書令㑹同並專席而坐故京師號曰三獨坐東觀漢記清識高亮陳謙字伯讓拜御史中丞執法奉憲多所糺正為百寮所敬尚書選舉序位旌賢常諮問謙自陳蕃雖尊為宰相論議褒貶每往質疑皆服其清識高亮謝承後漢書奉法察舉馬嚴字威卿拜御史中丞賜冠幘衣服車馬嚴舉劾案章車明舊典奉法察舉無所􅂞避百僚憚之續漢書宫正鮑勛字叔業黄初四年尚書令陳羣僕射司馬懿並舉勛為宫正宫正即御史中丞也帝不得已而用之百寮嚴憚罔不肅然魏志分路故事御史中丞與洛陽令相遇則分路而行以土主多逐捕不欲稽留也魏氏春秋宋文帝元嘉十三年有司奏御史中丞劉式之議楊州刺史丹陽尹建康令並是京輦土地之主或檢校非違或赴救水火事應神速不宜稽駐並合分道通典註正繩周處字子隠為御史中丞奏征虜将軍石崇大将軍梁王彤等正繩直筆權豪震肅王隠晉書不憚權勢熊逺字孝文為御史中丞時尚書刁協用事衆皆憚之尚書郎盧綝将入直遇協於大司馬門外協醉使綝避之綝不􅂞協令威儀牽捽綝墮馬至協車前而後釋逺奏免協官詔令白衣領職初逺遷太子中庶子尚書左丞散騎常侍帝每歎其忠公謂曰卿在朝正色不茹柔吐剛忠亮至到可謂王臣也吾所欣賴卿其勉之晉書初學記逺遷中丞中宗每歎其公忠云云豈要其官之所至云然耶御覽合璧等俱因之欠審奏彈夜警譙王恬字元愉為御史中丞值海西公廢太宗即位未解嚴大司馬桓温屯中堂夜吹警角恬奏劾温大不敬請理罪明日温見奏事歎曰此兒乃敢彈我真可畏也恬忠正有器局在朝憚之晉中興書恬晉宗室也初學記止云王恬誤百官避路江左拜御史中丞不得復入尚書省中丞鹵簿至百官避路隘淖排濟溝中但得鹵簿者雖皆清道而中丞尤嚴四世中丞王准之字元魯高祖彬尚書僕射曽祖彪之尚書令祖臨之父納之並御史中丞彪之博聞多識練悉朝儀自是家世相𫝊並諳江左舊事緘之青箱世人謂之王氏青箱學准之兼明禮𫝊贍於文辭宋臺建除御史中丞為僚友所憚准之父納之祖臨之曽祖彪之至准之四世居此職准之嘗作五言范㤗謿之曰卿唯解彈事耳准之正色答猶差卿世載雄狐宋書司直鄭鮮之字道子宋武起義兵遷御史中丞性剛直甚得司直之體外甥劉毅權重當時朝野莫不歸附鮮之盡心武帝獨不屈意於毅毅甚恨焉南史立朝正色荀伯子遷御史中丞莅職懃恪有匪躬之稱立朝正色外内憚之凡所奏劾莫不深相謗毀或延及祖禰示其切直又頗雜謿戯故世人以此非之宋書臨幸蘭臺孔琳之字彦琳永初二年為御史中丞明憲直法無所屈撓奏劾尚書令徐羨之虧違憲典時羨之領揚州刺史琳之弟璩之為中從事羨之使璩之解釋琳之使停寢其事琳之不許曰我觸忤宰相正當罪止一身汝必不應從坐何須勤勤邪自是羣僚震肅莫敢犯禁武帝甚嘉之行經蘭臺親加臨幸上不阿權戚蕭惠開拜御史中丞世祖與劉秀之詔曰今以惠開為憲司冀當稱職但一往眼額已自殊有所震及在任百寮畏憚之八年入為侍中詔曰惠開前在憲司奉法直繩不阿權戚朕甚嘉之可更授御史中丞上南史不載後授中丞已失紀事之實鄭樵通志畧因之豈于宋書不一經目耶乃詆班固高至武帝六世之前盡竊遷書不以為慚自昭至平資于逵歆不以為恥寜非自道也哉畏其筆端劉瑀字茂琳孝武初為御史中丞瑀使氣尚人為憲司甚得志彈蕭惠開云非才非望非勲非徳彈王僧達云䕃藉高華人品冗末朝士莫不畏其筆端上白簡顔延之為御史中丞何尚之與延之書曰絳騶清路白簡深刻取之仲容或有虧耶通典永平八年沈約為中丞奏彈王源云源官品應黄紙臣輙奉白簡以聞選名士不樂王球甚矜曹地遇從弟僧朗除御史中丞球謂曰汝為此官不復成膏粱矣通典江左中丞雖亦一時髦彦然膏粱名士猶不樂上憲臺試為王僧䖍為御史中丞領驍騎将軍甲族由來多不居憲臺王氐分枝居烏衣者位宦微減僧䖍為此官乃曰此是烏衣諸郎坐處我亦可試為耳南史僧䖍曇首子也為太子舍人退黙少交接與袁淑謝莊善淑每歎之曰卿文情鴻麗學解深拔而韜光潛實物莫之窺雖魏陽元之射王汝南之騎無以加焉上兄弟司直沈冲字景綽與兄淡深並歴御史中丞兄弟三人皆為司直晉宋所末有也中丞案裁之職被惡者多結怨永明中深彈呉興太守袁彖建武中彖從弟昻為中丞到宫數日奏彈深子繢父在僦白幰車免官與錮冲母孔氏在東鄰家失火疑為人所焚爇大呼曰我三兒皆作御史中丞與人豈有善者方恐肌分骨散何但焚如上近世獨步江淹為御史中丞時明帝作相謂淹曰君昔在尚書非公事不妄行在官寛猛能折衷今為南司足以震肅百僚也淹於是彈中書令謝朏等及二千石大縣官長多被奏劾内外肅然明帝謂曰自宋以來不復有嚴明中丞君今日可謂近世獨步上南司何敬容為宰相後妾弟費惠明為導倉丞夜盜官米為禁司所執送領軍府時河東王譽為将軍敬容以書解惠明譽前經屬事不行因此即封書以奏帝大怒付南司推劾御史中丞張綰奏敬容協私罔上合棄市詔特免職到溉謂朱异曰天時便覺開霽其見嫉如此圖形張緬字元長為御史中丞緬居憲司推繩無所顧望號為勁直武帝乃遣圖其形於臺省以勵當官執憲直繩張綰字孝卿少與兄纘齊名為宣城王長史遷御史中丞武帝遣其弟中書舍人絢宣㫖曰為國之急唯在執憲直繩用人之本不限升降晉宋時周閔蔡廓兼以侍中為之卿勿宜是左遷時宣城王府望重故有此㫖焉兄弟並騶舊例僕射中丞坐位東西相當大同四年元日大㑹張綰為中丞兄纘為僕射及百司就列兄弟並導騶分趍兩塗陛前代未有也時人榮之梁書不畏强禦陸杲字明霞為御史中丞性婞直無所顧望時山隂令虞肩在任贓汙數百萬杲奏收劾之中書舍人黄睦之以肩事託杲杲不答梁武聞之以問杲杲答曰有之帝曰識睦之不答曰臣不識其人時睦之在御側上指示曰此人是也杲謂曰君小人何敢以罪人屬南司睦之失色領軍将軍張稷是杲從舅杲嘗以公事彈稷稷因侍宴訴帝曰陸杲是臣親通小事彈臣不貸帝曰杲職司其事卿何得為嫌杲在臺號不畏强禦南史木手擊脅後魏改中丞為中尉官氏志李彪字道固為御史中尉領著作郎彪既為孝文所寵性又剛直遂多劾糾遠近畏之豪右屏氣帝嘗呼為李生從容謂羣臣曰吾之有李生猶漢之有汲黯始彪為中尉號為嚴酷以姦款難得乃為木手擊其脅腋氣絶而復屬者時有焉又慰喻汾州叛胡得其兇渠皆鞭面殺之及彪病體上往往創潰痛毒備極北史益利清直高恭之字道穆莊宗時為御史中尉外執直繩内參機密凡是益國利人之事必以奏聞諌争盡言無所顧憚選用御史皆當世名輩僕射尒朱世隆當朝權盛因内見衣冠失儀道穆便即彈糾帝姊壽陽公主行犯清路執赤棒卒呵之不止道穆令卒棒破其車公主深恨泣以訴帝帝曰高中尉清直人彼所行者公事豈可私恨責之也道穆後見帝帝曰一日家姊行路相犯深以為愧道穆免冠謝帝曰朕以愧卿卿反謝朕後尒朱榮死帝召道穆付赦書令宣於外謂曰今當得精選御史矣先是榮等常欲以其親黨為御史故有此詔魏書通典以為北齊誤嚴猛御史中尉酈道元字善長素有嚴猛之稱司州牧汝南王悦嬖近左右邱念常與卧起及選州官多由於念念匿於悦第時還其家道元收念付獄悦啟靈太后請全之敕赦之道元遂盡其命因以劾悦魏書令僕側目宋游道神武啟以為中尉文襄執請乃以吏部郎中崔暹為御史中尉以游道為尚書左丞文襄謂暹游道曰卿一人處南臺一人處北省當使天下肅然游道入省省中豪吏王儒之徒並鞭斥之始依故事於尚書省立門名以記出入早晩令僕已下皆側目北史彈劾不避崔暹字季倫為御史中尉文襄與諸公出之東山遇暹在道前驅為赤棒所擊文襄囘馬避之魏帝宴華林園謂神武曰自頃所在百司多有貪暴朝廷中有用心公平直言彈劾不避親戚者王可勸酒神武降階跪言唯御史中尉崔暹一人謹奉明㫖敢以酒勸并臣所射賜物千段乞以囘賜帝又褒美之上莊宗時崔氏暹字元欽累遷瀛州刺史上酷吏𫝊赤棒琅邪王儼字仁威武成第三子也兼為御史中丞魏氏舊制中丞出清道與皇太子分路行王公皆遥住車去牛頓軛於地以待中丞過其或遲違則赤棒棒之自都鄴後此儀􅐛絶武成欲雄寵儼乃使依舊制初從北宫出将上中丞凡京畿步騎領軍之官屬中丞之威儀司徒之鹵簿莫不畢備時儼總領四職帝與胡后在華林園東門外張幕隔青紗步障觀之遣中貢驟馬趣仗不得入自言奉敕赤棒應聲碎其鞍馬驚入墜帝大笑以為善更敕令駐車𫝊語良乆觀者傾京邑北齊朝廷肅然徐陵字孝穆為御史中丞時安成王頊為司空以帝弟之尊勢傾朝野直兵鮑僧汝假王威權抑塞辭訟大臣莫敢言者陵聞之乃為奏彈導從南臺官屬引奏案而入世祖見陵服章嚴肅若不可犯為斂容正坐陵進讀奏版時安成王殿上侍立仰視世祖流汗失色陵遣殿中御史引王下殿遂劾免侍中中書監自此朝廷肅然陳書子儉為御史中丞性公平無所阿附尚書令江總望重一時亦為儉所糾劾後主深委任焉上法無私宋璟為左御史臺中丞張易之與弟昌宗縱恣益横傾朝附之昌宗私引相工李𢎞泰觀占吉凶言涉不順為飛書所告璟廷奏請窮究其狀則天曰易之等已自奏聞不可加罪璟曰易之等事露自陳情在難恕且謀反大逆無容首免請勒就御史臺勘當以明國法易之等乆蒙驅使分外承恩臣必知言出禍從然義激於心雖死不恨則天不悦内史楊再思御覽引作姚璹恐忤㫖遽宣敕令璟出璟曰天顔咫尺親奉徳音不煩宰臣擅宣王命則天意稍解乃收易之等就臺将加鞫問俄有特敕原之仍令易之等詣璟辭謝璟拒而不見曰公事當公言之若私見則法無私也舊唐三世清節盧奕懐慎之少子也與兄奐齊名天寳十一年為御史中丞始懐慎及奐並為此官父子三人為中丞清節不易時人美之退位盧坦字保衡為御史中丞裴均為僕射右班踰位坦請退之均不受坦曰姚南仲為僕射例如此均曰南仲何人坦曰南仲是守正而不交權倖者也尋罷為右庶子時人歸咎於均格詔輸獻盧坦遷中丞初諸道長吏罷還者取本道錢為進奉帝因赦令一切禁止而山南節度使栁晟浙西觀察使閻濟美格詔輸獻坦劾奏晟濟美曰白衣待罪帝諭坦曰二人所獻皆家財朕已許原不可失信坦曰所以布大信者赦令也今二臣違詔陛下柰何以小信失大信乎帝曰朕既受之柰何坦曰出歸有司以明陛下之徳帝納之新唐辱侍臣温造字簡輿為御史中丞性剛褊人或激觸不顧貴勢以氣凌籍嘗遇左補闕李虞於街怒其不避捕祗承人打脊十下左拾遺舒元褒等上䟽論之曰國朝故事供奉官街中除宰相外無所􅂞避温造蔑朝廷典禮凌陛下侍臣恣行胷臆曽無畏忌凡事有小而闗分理者不可失也分理一失亂由之生遺補官秩雖卑陛下侍臣也中丞雖高法吏也侍臣見凌是不廣敬法吏壊法何以持繩前時中書舍人李虞仲與造相逢造乃曵去引馬知制誥崔咸與造相逢造又捉其從人元和長慶中中丞行李不過半坊今乃逺至兩坊謂之籠街喝道但以崇高自大不思僣擬之嫌勅曰憲官之職在指佞觸邪不在行李自大侍臣之職在獻可替否不在道路相高其臺官與供奉官同道聽先後而行道途即祗揖而過今後𫝊呼前後不得過三百步舊唐紫宸對請韓臯為御史中丞常有所陳必於紫宸殿對百寮而請未嘗詣便殿上謂之曰我與卿言於此不盡可來延英當與卿從容或無遺事親友或謂臯曰自乾元已來羣臣啟事皆詣延英方得詳盡公何獨於外庭對衆官以陳之無失於慎密乎韓曰御史天下之持平也權剛直枉唯在公共所言之事貴人知之柰何求請便殿避人竊語以私國家之法且延英之置也肅宗皇帝以苗晉卿年老艱步故設之後來臣寮得詣便殿多以私自售希求恩寵欲盡其身柰何以此為望哉𫝊載朝廷綱紀狄兼謨仁傑曾孫為御史中丞謝日文宗顧謂之曰御史臺朝廷綱紀臺綱正則朝廷理朝廷正則天下理凡執法者大抵以魏忌顧望為心職業由兹不舉卿梁公之後自有家法豈復為常常之心哉兼謨謝曰朝法或未得中臣固悉心彈奏舊唐合璧以為魏謨語誤紀綱之地魏謨字申之魏徵五代孫也為御史中丞謝日面賜金紫之服彈駙馬都尉杜中立贓罪貴戚憚之兼户部侍郎判本司事謩奏曰御史臺紀綱之地不宜與泉貨吏雜處乞罷中司專主户部公事從之謨儀容魁偉言論切直與同列上前言事他宰相必委曲規諷唯謩讜言無所畏避宣宗每曰魏謩綽有祖風名公子孫我心重之上憲臺之長中丞為大夫之貳縁大夫秩崇官不常置中丞常為憲臺之長今九寺少卿及秘書少監國子司業京兆少尹等並省寺之貳皆為四品惟御史中丞官業雖至品秩未崇望昇為從四品㑹昌品集奏進羨餘歸融兼御史中丞胡南觀察使盧周仁違勅進羨餘錢十萬貫融奏曰天下一家何非君土中外財賊皆陛下府庫也周仁輒陳小利妄説異端入財貨以市恩待朝廷而何淺臣恐天下放效以羨餘為名因縁刻剥生人受弊請行重責以例列藩歴五院臺儀自大夫以下至監察通謂之五院御史國朝歴踐五院者共三人馬李尚隠張延賞温造也尚書故實辟三院憲府故事三院御史臺中大夫中丞自辟請命于朝獨孤朗為御史中丞時崔沔鄭居中不由憲長而除授皆丞相之僚舊也敕命雖行朗拒而不敢納沔改太常博士居中分司東臺宰相銜之里巷毆擊李傑本名務光代宋璟為御史大夫時皇后妺壻尚衣奉御長孫昕與其妺壻楊仙玉因於里巷遇傑遂敺擊之上大怒令斬昕等散騎常侍馬懐素以為陽和之月不可行刑累表陳情乃下敕決殺之以謝百寮舊唐持憲平直南唐江文蔚保太初遷御史中丞持憲平直無所阿枉宰相馮延己弟延魯與魏岑陳覺竊弄威權及代閩敗績詔斬覺及延魯以謝國人而延己岑置不問文蔚對仗彈奏畧曰昨天兵敗衂統内震驚将雪宗社之羞宜醢姦臣之肉已誅二罪未塞羣情盡去四凶方袪衆怒請行典法以謝四方文蔚将上疏先具小舟載老母以待左降元宗果怒貶江州司士㕘軍而覺延魯以宋齊邱救解復皆不死延已雖蹔罷旋復柄用方宣延己制百官在廷常夢錫大言白麻雖佳要不如江文蔚疏耳逾年召遷九國志陸㳺南唐書文蔚常為御史中丞國朝自王義方後曠數百年未有危言激論如此之彰灼者故權右振竦朝野喧騰謄寫彈文為之紙貴徐騎省為志馬令南唐書云文蔚居諫職時宋齊邱陳覺馮延己魏岑皆以容悦得用人情不平文蔚上表其言曰二公移去未稱民情四罪盡除方明國典云後事亡豈其誤耶九國志及陸書所載君章事甚詳此云諌官不云申丞且云後事亡何耶横挺待賢御史臺有閽吏𨽻臺中四十年聲喏之時以所執之挺待中丞賢否賢則横其挺不賢則直其挺凡為中丞惟恐其直時范諷為中丞一日視其挺直范問曰爾挺忽直豈我之失耶吏曰昨日中丞召客諭庖人造食指揮者數四去又教戒之數四大凡役人者授以法觀其成何俟喋喋之繁若使宰天下如此不亦勞乎某心却之不知杖之直也范大笑慚明日視之挺復横矣東軒筆録持書御史中丞舊持書御史中丞也初漢宣帝元鳳中感路温舒尚徳緩刑之言秋季後請讞時帝幸宣室齋居而決事令侍史二人持書持書御史起于此也通典糺繩肅厲梁毗為持書侍御史時京師饑上令禁酒劉昉使妾任屋當鑪酤酒毗劾奏昉曰臣聞處貴則戒之以奢持滿則守之以約昉既位列郡公秩高庶尹縻爵稍乆厚禄已淹正當戒滿歸盈鑒斯止足何乃規麴蘖之潤競錐刀之末身昵酒徒家為逋藪若不糺繩何以肅厲有詔不治昉鬱鬱不得志隋書當朝正色栁彧字幼文遷治書侍御史當朝正色甚為百寮之所敬憚上嘉其婞直謂彧曰大丈夫當立名於世無容容而已右僕射楊素當塗顯貴百寮慴憚無敢忤者嘗以少譴敕送南臺素恃貴坐彧牀彧從外來見素如此於階下端笏整容謂素曰奉敇治公之罪素遽下彧據案而坐立素於庭辨詰事狀素由是銜之隋書侍御熒惑火精熒惑火之精御史之象主禁令刑罰收捕糺正黄石公隂謀秘法柱下史周官宗伯屬官御史掌邦國都鄙及萬民之治令以贊冢宰凡治之者受法令焉以其在殿柱之間亦謂之柱下史老􅆅嘗為之秦改為侍御史史記張蒼自秦時為御史主柱下方書即其任也冠法冠一名柱後名鐵柱以鐵為柱言其審固不橈也法冠者秦事云始皇滅楚以其君冠賜御史亦名獬豸冠以獬豸獸主觸不直故執憲者以為冠六典繡衣武帝時侍御史又有繡衣直指者出討姦猾理大獄而不常置注直指而行無阿私也衣以繡者尊寵之也漢表舉劾奢僣江充字次倩拜為直指繡衣使者督三輔盜賊禁察踰侈貴戚近臣多奢僣充皆舉劾奏請沒入車馬令身待北軍擊匈奴奏可充即移書光禄勲中黄門逮召近臣侍中諸當詣北軍者移劾門衛禁止無令得出入宫殿於是貴戚子弟惶恐皆見上叩頭求哀願得入錢贖罪上許之令各以秩次輸錢北軍漢書逐捕不誅王賀字翁孺為武帝繡衣御史逐捕不誅賊盜堅盧等黨與及吏畏懦逗遛當坐者翁孺皆縱之去它部御史暴勝之等奏殺二千石誅千石以下及通行飲食坐連及者大部至斬萬餘人翁孺以奉使不稱免嘆曰吾聞活千人有封子孫吾所活者萬餘人後世其興乎元后𫝊御覽作王禁誤威振州郡武帝末郡國盜賊羣起暴勝之為直指使者衣繡持斧逐捕盜賊督課郡國誅不從命威振州郡劾專廢立嚴延年字次卿少學法律舉侍御史是時大将軍霍光廢昌邑王尊立宣帝宣帝初即位延年劾奏光擅廢立亡人臣禮不道奏雖寢然朝廷肅焉敬憚議法依輕陳寵曽祖父咸哀平間以明律為侍御史王莽簒位父子相将歸鄉里閉門不出乃收家中律令文書壁藏之以俟聖主咸常戒子孫曰為人議法當依于輕雖有百金之利慎無與人重東觀漢記持節觀風譙𤣥為繡衣使者持節分行天下觀覽風俗所至專行誅賞後漢埋輪張綱字文紀為御史時順帝委縱宦官有識危心綱常感激慨然嘆曰穢惡滿朝不能奮身出命埽國家之難雖生吾不願也漢安元年選遣八使徇行風俗皆耆儒知名多歴顯位唯綱年少官次最微餘人受命之部而綱獨理其車輪於洛陽都亭曰豺狼當路安容狐狸遂奏曰大将軍冀河南尹不疑蒙外戚之援荷國厚恩專為封豕長蛇貪縱無底多樹諂䛕以害忠良誠天威所不赦大辟所宜加也謹條其無君之心十五事斯皆臣子所切齒者也書御京師震竦上驄馬桓典字公雅拜侍御史是時宦官秉權典執政無所囘避常乗驄馬京師畏憚為之語曰行行且止避驄馬御史上横劒當車种暠字景伯順帝時為侍御史監䕶太子承光宫中常侍高梵受敕迎太子不齎詔書以衣車載太子欲出太子太傅高襄後漢作杜喬不知所以力不能止開門臨去暠至横劍當車御史受詔監䕶太子太子國之儲副人命所繫常侍來無一尺詔書安知非挾姦耶今日之事有死而已梵不敢争續後漢書朝賀不整陳翔字子麟少知名拜侍御史時正旦朝賀大将軍梁冀威儀不整翔奏冀恃貴不敬請收案罪時人竒之後漢自稱不堪韋約字季明司徒則愷甚敬重之謂曰君以輕於去就大位不躋今嵗垂盡選御史實欲煩君約曰大馬齒盡既無膂力又無考課所以躊躇戀慕者以明公禮遇隆崇未能自割因稱素有風疾眩冒不堪乆侍遂徒跣趍出公追不及三輔決録遮敕宫門楊仁字文義明帝引見問當代政治之事仁對上大竒之拜侍御史明帝崩是時諸馬貴盛各争入官仁被甲持㦸遮敕宫門不得令入章帝既立諸馬更譖仁刻峻於是上善之陳留耆舊𫝊簪白筆魏當大㑹殿中御史簪白筆側陛而坐帝閣左右此何官何主辛毗曰此謂御史舊時簪筆以奏不法當如今者直備位但眊筆耳魏畧直言公論吕岱字定公親近呉郡徐原慷慨有才志岱知其可成賜中褠與共言論後逐薦拔官至侍御史原性忠壯好直言岱時有得失原輒諫諍又公論之人或以告岱岱嘆曰是我所以貴徳淵者也及原死岱哭之甚哀曰徳淵吕岱之益友今不幸岱復於何聞過談者美之呉志御覽以徳淵為岱字誤決大獄庾峻字山甫魏高貴鄉公時為秘書丞遍觀古今見聞益廣長安有大獄乆不決拜峻侍御史往斷之朝野稱慶王隠晉書截角劉暾字長升毅子也正直有父風為侍御史武庫火尚書郭彰率百人自衛而不救火暾正色諾之彰怒曰我能截君角也暾勃然謂彰曰君何敢恃寵作威作福天子法冠而欲截角乎求紙筆奏之彰伏不敢言衆人解釋乃止彰乆貴豪侈每出輒從百餘人自此之後務從簡素晉書習事補中書屬通事令史孫綝限滿乆習内事才宜殿中侍御史須空補之不審可否詔曰可山公啟事清要李素立丁憂高祖令所司奪情授以七品清要官所司擬雍州司户㕘軍高祖曰此官要而不清又擬秘書郎高祖曰此官清而不要遂擢授侍御史高祖曰此官清而復要舊唐宣宗欲與韋宙好官拜侍御史職林雄職李義甫執權用事有洛州婦人淳于氏有美色坐事係大理義甫聞而悦之囑大理丞畢正義求為别宅婦特為雪其罪卿竇𤣥疑其故遽以狀聞高宗敕給事劉仁軌侍御史張倫重案其事正義惶懼自縊而死高宗特原義甫之罪侍御史王義方彈奏曰臣去嵗冬初雲陽下縣丞耳今春及夏陛下擢臣著作郎極文學之清選未幾又拜臣侍御史濫朝廷之雄職顧視生涯隕首非報惟欲有犯無隠以廣天聽伏以李義甫枉殺寺丞陛下已赦之臣不應更有鞫問但陛下撫育萬邦蠻陬夷落猶懼疎網況輦轂咫尺姦臣肆虐足使忠臣憤抗又士扼腕縱令正義自縊彌不可容便是畏義畏之權勢能殺身以滅口此則生殺之威上非主出賞罰之柄下移佞寵臣恐履霜堅氷積小成大因言其初容貌為劉洎馬周所幸由此得進請重鞫正義死由雪寃氣于幽泉誅姦臣于白日對仗叱義甫合下義甫直視不退義方三叱上既無言義甫趨出高宗以義方毀辱大臣言辭猥䙝出正義為萊州司户而不問義甫姦濫之罪義甫云王御史妄相彈奏得無愧乎義方對云仲尼為魯司宼七日誅少正夘於兩觀之下義方任御史旬有六日不能去姦邪於雙闕之前實以為愧上佯失告狀李靖為岐州刺史人或私有告其謀反高祖命一御史按之謂之曰李靖反且實便可處分御史知其誣罔與告事者行數驛佯失告狀驚懼鞭撻行典乃祈求於告事者曰李靖反狀分明親奉進㫖今失告狀幸救其命更請狀告事者乃疏狀與御史驗與本狀不同即日還以聞髙祖大驚御史具奏靖不坐亡御史名氏惜哉唐新語小事不足介意唐臨初為殿中侍御史大夫韋挺以朝列不整責臨臨曰此為小事不足介意請今之後革之明日江夏王道宗自以貴戚共韋挺對立私語趨至曰王亂班臨彈王江夏答曰共公大夫語何至於是臨曰大夫亦自亂班韋失色而退諸人莫不悚動授職欣然徐有功起為左臺侍御史則天特褒異之時逺近聞有功授職皆欣然相賀潤州刺史竇孝諶妻龎氏為奴誣告云夜解祈福則天令給事中郎季昶鞫之季昶鍛鍊成其罪龎氏當坐斬有功獨明其無罪而季昶等返陷有功黨援惡逆奏付法法司結刑當弃市而功方視事令史垂泣以告有功曰豈吾獨死而諸人長不死耶乃徐起而歸則天覽奏召有功詰之曰卿比斷獄失出何多對曰失出臣下之小過好生聖人之大徳願陛下𢎞大徳則天下幸甚則天黙然於是龎氏減死流於嶺表有功除名為庶人雄權韋仁約字思謙授監察御史嘗謂人曰御史出都若不動摇山岳震慴州縣誠曠職耳時中書令褚遂良賤市中書譯語人地思謙劾奏其事因出為清水令謂人曰吾狂鄙之性假以雄權觸機便發固宜為身灾也大丈夫當正色之地必明目張膽以報國恩終不能為碌碌之臣保妻子耳舊歎彼棄此魏元忠遷監察御史高宗嘗從容曰外以朕為何如主對曰周成康漢文景也然則有遺恨乎曰有之王義方一世豪英而死草萊議者謂陛下不能用賢帝曰我適用之聞其死顧已無及元忠曰劉藏器行副於才陛下所知今七十為尚書郎徒歎彼而又棄此帝黙然慙新唐抑人為妾劉藏器為侍御史時衛尉卿尉遲寳琳抑人為妾藏器請還其父母帝既可其奏寳琳私奏乞之帝從之藏器復執奏帝又可之寳琳又請如是再三藏器進言曰法者海内之懸衡上下之所共若刑罰不中則人無所措手足陛下若用舍恣情愛憎由已則國之刑憲何所施陳今寳琳請陛下從之臣所執奏陛下亦從之今日從之明日又改之欲令下人何以遵奉夫人無信不立匹夫匹婦尚不可失信況為天子安可戲言今陛下二三其言處分不定臣恐四海之内無所適從帝意從藏器所奏供奉赤墀上官儀同東西臺三品時以雍州司户㕘軍韋絢為殿中侍御史或疑非遷儀曰比野人爾爾御史供奉赤墀下接武䕫龍簉羽鵷鷺豈雍州判佐比乎時以為清言朝廷肅然狄仁傑為侍御史左司郎中王本立怙寵自肆仁傑劾奏其惡有詔原之仁傑曰朝廷惜之賢如本立者不尠陛下惜有罪虧成法柰何臣願先斥為羣臣戒本立抵罪由是朝廷肅然伸難抑躁陽嶠長安中左右御史中丞桓彦範袁恕已爭取為御史楊再思素嶠吾知其意不樂抨彈事為與語彦範彦範曰為官擇人豈待情樂乎唯不樂者固與之以伸難進抑躁求也遂為右臺侍御史白兎酷吏王𢎞義為左臺侍御史𢎞義嘗於鄉里傍舍求𤓰主恡之𢎞義乃狀言𤓰園中有白兎縣官命人捕逐斯須園苗盡矣李昭衣曰昔聞蒼鷹獄吏今見白兎御史四其郭𢎞霸初舉集召見於則天前自忠鯁云往年征徐敬業臣願抽其筋食其肉飲其血絶其髓則天悦拜左臺監察御史時人號為四其御史和事天子崔琬為監察御史彈奏宰相宗楚客紀處訥等驕恣跋扈請收劾之舊制大臣有被御史彈者皆俯僂趨出待罪朝堂楚客瞋目作色稱以忠鯁被誣中宗令琬與楚客約為兄弟時人切歎焉兩解之謂帝為和事天子唐書皁鵰王志愔神龍中為左臺侍御史執法剛正百僚畏憚時人呼為皁鵰言其顧瞻人吏皆如鵰鶚之視燕雀也南憲殿中侍御史郭震劾刑部尚書趙彦昭太子賔客韋嗣立青州刺史韋安石曰彦昭以女巫趙五娘左道亂常託為諸姑潛相影援既因提挈乃踐台階驅車造門著婦人之服擕妻就謁申猶子之情于時南憲直臣劾以霜憲蹔加微貶旋登寵秩同惡相濟一至於此請付紫微黄門凖法處分又張易之兄弟勢傾朝野嗣立此際結為舅甥神龍之初已合誅死天網疎漏腰領誤全與安石阿韋編諸屬籍中宗晏駕削太皇輔立之制定阿韋臨朝之䇿此時朝野危懼人神恐憤臣忝司請憲敢不糺彈彦昭等並請准法處分於是並貶官不斬逆賊蘇瓌案問鄭普思其妻有寵於韋庶人特敕令對御辦折上屢抑瓌而伸普思侍御史范獻忠歴階而前曰臣請先罪蘇瓌上問其故獻忠曰蘇瓌國之大臣荷榮貴乆矣不斬逆賊而後聞奏今使眩惑天聰摇動刑柄而普思反狀昭露陛下曲為申理此則王者不死今聖躬萬福豈有兩天子耶臣請先死終不能事普思上意乃解獄遂定朝廷知尊李勉拜監察御史屬朝廷右武勲臣恃寵多不知禮大将管崇嗣於行在朝堂背闕而坐言笑自若勉劾之拘於省司肅宗特原之歎曰吾有李勉始知朝廷之尊膽落温造拜侍御史請復置彈事朱衣豸冠於外廊大臣阻而不行李祐自貢州入拜金吾違制進馬一百五十疋造正衙彈奏祐肱戰汗流祐私謂人曰吾踰蔡州城擒呉元濟未嘗心動今日膽落于温御史吁可畏哉兄弟憲府楊假楊收並遣直之子假自浙西觀察判官入為監察御史收亦自西川入為監察兄弟並居憲府持為新例呈身韋澳字子斐性貞退寡慾大和六年登第後十年不仕伯兄温與御史中丞高元裕友善温請用澳為御史謂澳曰髙二十九持憲綱欲與汝相面汝必得御史澳不答温曰高君端士汝不可輕澳曰然恐無呈身御史竟不詣元裕之門均御史職唐法殿中侍御史遷拜及職事與侍御史均職林端公侍御史之職有四謂推推者掌推鞫也彈掌彈舉公廨知公廨事雜事臺亊總判定殿中監察以下職事及進名改轉臺内之事悉主之號為臺端他人稱之曰端公共知雜事者謂之雜端最為雄劇食坐之南設横榻謂之南床殿中監察不得坐亦謂之癡牀言處其上者皆驕傲自得使人如癡是故謂之癡牀凡侍御史之例不出累月則遷登南省故號為南牀通典烘堂御史故事大朝㑹則監察押班常㕘則殿中分班入閣則侍御史監奏葢含元殿最逺用八品宣政其次用七品紫宸最近用六品殿中得立花塼緑衣用紫案褥之類號為七貴監察院長與同院禮隔語曰事長如事端凡上堂絶言笑有不可忍雜端大笑則合座皆笑謂之烘堂烘堂不罰國史補大熱有毒户部郎侯味虚著百官本草題御史曰大熱有毒又朱書云大熱有毒主除邪倿杜姦回振寃滯止淫濫尤攻貪濁無大小皆摶之畿尉簿為之相畏逺使惡暴直忌按權豪出於雍洛州諸縣其外州出者尤可用日炙乾硬者為良服之長精神減姿媚乆服令人冷峭僉載監察本草賈言忠撰監察本草云服之心憂多驚悸生白髮時義云裏行及試員外者為合口椒最有毒監察為開口椒毒微歇殿中為蘿蔔亦曰生薑雖辛辣而不為患侍御史為脆梨漸入佳味遷員外郎為甘子可乆服或謂合口椒少毒而脆梨毒者此由觸之則發亦無常性唯拜員外郎號為摘去毒歡悵相半喜遷之惜其權也御史臺記拘局不樂栁渾拜監察御史臺中執法之地動限儀矩渾性放曠不甚檢束察長拘局忿其疎縱渾不樂乞外任執政惜其才奏為左補闕唐書名望素髙呉楊廷式為侍御史知雜事廷式强立忠直名望素高及為憲職人皆屬望雖功臣武將亦嚴憚之徐知誥輔政漸革貪弊張崇為廬州刺史好聚斂㑹廬江民訟其縣令掊刻者時議以崇難制使廷式往按之廷式謂知誥曰雜端推事其威至重職業人可不行也知誥曰君将若何廷式曰将械繫張崇使使往金陵簿責都統知誥曰所刻者縣令爾何至於是廷式曰縣令卑官也今取於民皆張崇使為之轉以獻都統爾其可捨其大而詰其細乎知誥俯首謝之曰吾知小事不足仰煩乃止遷大理司直九國志識面臺官皇祐中詔委御史中丞孫抃舉御史抃舉太常博士呉中復或云公平生不識中復何由知之抃曰聞中復知犍為縣廢淫詞以禁民之非開河灘以通民之利又嘉州舊産紫竹桶癭木等任于蜀者競採之以為器民甚苦之中復作嘉陽四詠詩以悼之及替還舟中並不載嘉陽一物其愛民清謹如此使之立朝必不茍且昔人恥為呈身御史今我豈薦識面臺官遂除殿中侍御史言宰臣劉沆之過出知拙州召還為侍御史分紀中書舍人直宿奏事漢尚書郎直宿建禮門奏事明光殿下筆為詔誥出語為誥令乃今中書舍人也通典忠慎劉超遷中書舍人時臺省初建内外多事出内書命以忠慎稱加以治身清苦衣不重帛每上所賜皆固辭曰凡陋小臣横竊賞賜無徳而禄殃咎必至上益嘉之晉中興書儒素徐邈字景山東莞姑幕人也少有學問尤善經𫝊時烈宗始覺典籍招延理學之士謝安舉邈補中書舍人左西省撰正五經音訓學者宗之毎預顧問輒有獻替多所補益烈宗甚愛之上掌制詔通事舍人自晉宋以來唯掌呈奏宣王言甚用事至梁用人殊重多以尊官兼領並入閣内始専掌中書詔誥其後除通事二字直曰中書舍人陳及北朝皆因之掌制詔初學四户永明元年熒惑入紫微時中書通事舍人四人各住一省謂之四户既總重權勢傾天下㑹𤣥象失度太史奏宜修福禳之太尉王儉謂帝曰天文乖忤此由四户仍其舍人王文明等奏之齊書古人風明帝踐祚引𫝊昭為中書舍人時居此職者皆權傾天下昭獨亷静無所干預器服率畧身安麄糲常插燭板牀明帝聞之賜漆合燭槃曰卿有古人之風故賜卿古人之物上勢利之職茹法亮乆為中書通事舍人後出為大司農中書勢利之職法亮戀之垂涕而去上絶饋遺顧協字正禮少清介有志操為舍人同官者皆潤屋協在省十六載器服飲食不改於常有門生始來事協知其亷絜不敢厚餉止送錢三千協發怒杖二十因此事者絶於饋遺南史醜舍人荀士遜好學有思理為文有清典見賞知音世祖時轉中書舍人狀貌甚醜以文辭見用曽有事須奏值世祖在後庭因左右轉通者不得士遜姓名乃云醜舍人世祖曰必士遜也看封題果是内人莫不忻笑北齊營外飲酒顔之推字介天保末從至天池以為中書舍人令中書郎段孝信将敕書出示之推之推營外飲酒孝信還以狀言顯祖乃曰且停由是遂寢之推聰頴機悟博識有才辯工尺牘應對閑明俄領中書舍人帝時有取索􅀈令中使𫝊㫖之推稟承宣告館中皆受進止所進文章皆是其封署於進賢門奏之待報方出兼善於文字監校繕寫處事勤敏號為稱職帝甚加恩接顧遇逾厚為勲要者所嫉上三才魏收兼中書舍人與温子昇邢子才齊名世號三才北史海内共推虞世基拜内史舍人煬帝即位顧遇彌隆秘書監河東栁顧言博學有才罕所推謝至是與世基相見歎曰海内當共推此一人非吾儕所及也隋書藥石之言貞觀中中書舍人高季輔上封章曰時已平矣功已成矣然而刑典未措者何哉良由謀猷之臣不𢎞簡易之政臺閣之吏昩於經逺之道執憲者以深刻為奉公當官者以侵下為益國未有坦平恕之懐副聖明之㫖伏願隨方訓諭使各揚其職人敦朴素俗革澆浮家識孝慈人知亷恥杜其利欲之心載以清淳之化自然家富國肥禍亂何由而作太宗善之特賜鍾乳劑曰卿進藥石之言故以藥石報之也唐書工冊奏顔籕字師古唐初為起居舍人遷中書舍人専掌機密于時軍國多務凡有制誥皆成其手師古達於政理冊奏之工時無及者舊唐隨口並寫岑文本字景仁才名既著李靖復稱薦之擢拜中書舍人漸蒙親顧初武徳中詔誥及軍國大事文皆出於顔師古至是文本所草詔誥或衆務繁湊即命書僮六七人隨口並寫須臾悉成亦殆盡其妙時中書侍郎顔師古以譴免職頃之温彦博奏曰師古諳練時事長於文法時無及者冀蒙復用太宗曰我自舉一人公勿憂也於是以文本為中書侍郎專典機密上不見便思馬周字賔王太宗時拜給事中轉中書舍人周有機辨能敷奏深識事端動無不中太宗嘗曰我於馬周暫不見則便思之中書侍郎岑文本謂所親曰吾見馬君事論多矣援引事類揚㩁古今舉要刪蕪㑹文切理一字不可加一言不可減聽之靡靡令人亡倦昔蘇張終賈正應此耳上中舍相待朱子奢武徳四年隨杜伏威入朝授國子􅂇教貞觀初髙麗百濟同伐新羅連兵數年不解新羅遣使告急乃假子奢員外散騎侍郎充使喻可以釋三國之憾雅有儀觀東夷大欽敬之三國王皆上表謝罪賜遣甚厚初子奢之出使也太宗謂曰海夷頗重學問卿為大國使必勿籍其束修為之講説使還稱㫖當以中書舍人待卿子奢至其國欲悦夷虜之情遂為發春秋左傳題又納其美女之贈使還太宗責其違㫖猶惜其才不至深譴上文士極選中書舍人唐初為内史舍人至武徳三年改為中書舍人龍朔以後隨省改號而舍人之名不易專掌詔誥侍從署敕宣㫖勞問授納訴訟敷奏文表分判省事自永淳以來天下文章道盛臺閣髦彦無不以文章達故中書舍人為文士之極任朝廷之盛選諸官莫比焉通典龍朔改西臺舍人先宅改鳯閣舍人開元改紫微舍人又曰紫微省㑹要口授分寫武后天授元年壽春郡王成器兄弟五人初出閣同日受冊有司撰儀注忘載冊文及百寮任列方知闕禮宰臣相顧失色中書舍人王勮立召小吏五人各令執筆口授分寫同時須㬰俱畢詞理典贍時人歎伏舊唐鳯閣舍人樣徐堅西臺舍人齊􅅨子也少好學徧覽經史聖厯中車駕在三陽宫御史大夫楊再思左庶子王方慶為東都留守引堅為判官表奏專以委之方慶賞其文章典實常稱曰掌綸誥之選也再思亦曰此鳯閣舍人樣如此才識走避不得上齊􅅨少善屬文高宗時累遷蘭臺舍人善於文誥甚為當時所稱高宗愛其文令侍周王等屬文以職在樞劇仍日間日來往焉文苑堅長姑為太宗充容次姑為高宗婕妤並有文藻堅父子以詞學著聞議者方之漢世班氏堅𫝊不裁一言則天嘗引中書舍人陸餘慶入草誥餘慶囘惑至晩竟不能裁一言由是轉左司郎中上一人辦事孫處約為中書舍人累年中令杜正倫奏請更授一舍人與處約同知制誥高宗曰處約一人足辦我事何須多也㑹要兄弟代為韋承慶字延休仁約子也補雍王府㕘軍府中文翰皆出于承慶辭藻之美擅於一時長壽中累遷鳯閣舍人屬文迅速雖軍國大事下筆輒成未嘗起草弟嗣立與承慶俱以學行齊名長壽中代承慶為鳯閣舍人上思如湧泉蘇頲神龍中拜中書舍人尋而頲父同中書門下三品父子同掌樞密時以為榮機事填委文誥皆出頲手中書令李嶠歎曰舍人思如湧泉嶠所不及也上景龍四年初定内難惟中書舍人頲在太極殿後文詔填委動以萬計而手操口對無毫釐差誤主書韓禮談子陽轉書詔草謂頲曰乞公稍遲禮等書不及恐手腕将脱廢鳯閣王家王徽曽祖擇從擇從兄易從天后朝登進士第從弟朋從言從睿宗朝並以進士擢第昆仲四人開元中三至鳯閣舍人故時人號鳯閣王家上一時之秀許景先轉中書舍人自開元初景先與中書舍人齊澣王邱韓休張九齡掌知制誥以文翰見稱中書令張説嘗稱曰許舍人之文雖無峻峰激流嶃絶之勢然屬辭豐美得中和之氣亦一時之秀也上王言之最孫逖開元十年登文藻宏麗科二十四年拜中書舍人制敕所出為時流歎服議者以為自開元以來蘇頲齊澣蘇晉賈胄許景先及逖為王言之最逖尤善思文理精練加之謙退不伐人多稱之上張九齡視其草欲易一字卒不能也新一朝大手武徳及開元中有顔侍郎陳叔達蘇頲云大手筆掌書王命故一朝言語煥成文章唐文詔令虚有其表蕭嵩開元初為中書舍人與崔琳王邱齊澣同列皆以嵩寡學術未異之而紫微令姚崇許其致逺眷之特深上𤣥宗欲命蘇頲為相前一日上祕密不欲令人知逮夜艾方令草詔謂侍臣曰外庭直宿者誰遽命秉燭召來至則中書舍人蕭嵩上手以頲姓名授之既成其詞曰國之瓌寳上謂嵩曰頲瓌之子朕不斥其父名卿當為刋削嵩乆之復獻上以前詞非工謂沉思既乆必當精密不覺前席及觀惟改曰國之珍寳上擲其草於地上曰虚有其表爾左右皆笑嵩頥大多髯故上有是言一代辭宗韋陟字殷卿安石子也與弟斌文華當代俱有盛名于時才名之士王維崔顥盧象等常與陟唱和遊處廣平宋公見陟歎曰盛徳遺範盡在是矣張九齡一代辭宗為中書令引陟為中書舍人與孫逖梁陟對掌文誥時人以為美談斌天寳初轉國子司業徐安貞王維崔顥當代辭人特為推挹天寳中拜中舍兄陟先為中舍未幾遷禮部侍郎陟在南省斌又掌文誥舊唐解事舍人齊澣開元初姚崇復相用為給事中中書舍人論駮及告詔皆援準古誼朝廷大政必諮之時號解事舍人斵忩舍人陽滔為中書舍人時促命制敕令史持庫鑰他適無舊本檢尋乃斵忩取得之時人號為斵忩舍人僉載蘇賈賈曽授中書舍人曽以父名忠固辭議者以為中書是曹司名又與曽父音同字别於禮無嫌曽乃就職與蘇晉同掌制誥皆以詞學見知時人稱為蘇賈子至天寳末為中書舍人禄山之亂從上皇幸蜀時肅宗即位於靈武上皇遣至為𫝊位冊文上皇覽之歎曰昔先帝遜位於朕冊文則卿之先父所為今朕以神器大寳付儲君卿又當演誥累朝盛典出卿父子之手可謂難矣至伏於御前嗚咽感涕舊唐常揚楊炎字公南父播隠居不仕肅宗賜號𤣥靜先生炎美鬚眉風骨峻峙文藻雄麗汧隴之間號為小楊山人遷中書舍人與常衮並掌綸誥衮長於除書炎善為徳音自開元已來言詔制之美者時稱常揚焉上綸音除中書舍人李文為學士制云綸省推髙文館記焚制草高郢掌誥累年家無制草或謂曰人皆留制草公焚之何也曰王言不可存私家時人重其慎密舊唐請改制辭憲宗元和十二年七月以中書侍郎平章事裴度為門下侍郎平章事充彰義軍節度申光蔡等州觀察淮西宣慰處置等使其制翰林學士中書舍人令狐楚所草也度以是行既兼招撫請改其辭中未剪其類為未革其志又以韓𢎞已為都統請改更張琴瑟為近輟樞軸又改煩我台席為授以成算憲宗皆從之乃罷楚内職守中書舍人舊唐冊府不接私貺路隋敬宗初登極拜中書舍人翰林學士仍錫金紫有以金帛謝除制者必叱而却之曰吾以公事接私貺耶終無所受舊文字首選白居易穆宗時為中書舍人凡朝廷文字之職無不守居其選然多為排擯不得用其才時天子荒縱不法執政非其人制御乖方何朔復亂居易累上疏論其事天子不能用乃求外任除杭州刺史賜宫錦封敖字碩夫拜中書舍人敖構思敏速語近而理勝不務竒澁武宗深重之嘗草賜陣傷邊将詔警句云傷居保體痛在朕躬帝覽而善之賜之宫錦李徳裕在相位定䇿破􅂞鶻誅劉稹議兵之際同列或有不可之言唯徳裕籌計指畫竟立竒功武宗賞之封衛國公守太尉令制語有遏横議於風波定竒謀於掌握逆稹盜兵奪闗晝鏁造膝嘉話開懐静思意皆我同言不他惑也封敖往慶之徳裕口誦此數句撫敖曰陸生有言所恨文不迢意如卿此語秉筆者不易措言座中解其所賜玉帶以遺敖深禮重之非代言才殷鵬姿顔若婦人而性巧媚晉天福中拜中書舍人同職馮玉本非代言之才所得詞㫖多託鵬為之玉嘗以姑息字問于人人則以辜負字示玉玉乃信之當時以為笑端鵬之才比玉雖優纎佞過之訝其高岸陳義長興中自舍人御命冊公主於太原公主即帝后也帝深待之但訝其高岸人或有獻言於義曰宜陳一謳頌以稱帝之美可邀其異待耳義曰人生貧富咸有定分未有持天子命違禮以求利既損國綱且虧士行義今生所不為也聞者無不嘉之晉史賜不分遺馬希廣初襲位有其弟萼叛於朗州鍾允章聘湖南還晟問曰馬公復能經畧南士乎允章曰馬公兄弟為梗天論絶以臣觀之敗亡可待況能害我晟於是發兵復昭賀之地楚人果不能救因授允章中書舍人性吝嗇嵗獲賜賚甚厚然未嘗分遺故人其妻牢氏有賢行常語允章曰妾昔事君子家無釜􅑄烹茶作糜止用一銚尚且接待朋友金寳貨盈室而義路棒塞雖富且貴何足尚也乃出銚以示允章允章大慙自是稍揮散矣字作金聲王翊乾亨初拜中書舍人賜金魚紫四年文徳殿成著作郎陳光又獻賦龑賜珠數斤翊見之色動後南詔獻朱鬛馬南宫白龍見昭陽殿成翊皆獻賦頌毎賜予稍緩必於同列颺言曰吾賦字字作金聲何受賜之晩也龑聞之大笑仁而徇公王延為中書舍人權知貢舉有崔頎者協之子也授郾師簿簿甚卑屑棄去數年應進士延将入貢院見舊相吏部尚書盧文紀素與協不睦謂延曰舍人以謹重聞于時所以老夫去冬與諸相首以長者聞奏然此一途取事者頗多面目説者云越人善泅生子方晬乳母浮之水上或駭然止之乳母曰其父善泅子必無溺今若以名下取士徵泅之類也舍人當求實才以副公望延退而笑曰盧公之言為崔頎也縱與其父不悦致意何至此耶來春以頎登甲科其仁而徇公皆此類也周史偪下之甚閩王昶立晉高祖遣散騎常侍冊封昶閩王昶遣中書舍人劉乙勞損于館乙衣冠偉然騶僮甚盛佗日損遇乙于塗布衣芒屩而已損使人誚之曰鳯閣舍人何偪下之甚也乙羞媿以手掩面而走世家有元和風南唐韓熈載為和州司馬乆之召為中書舍人乃始親制誥典雅有元和之風九國志失却君房真宗時日本國入貢求本國神光寺記舍人辝不工令學士張君房代之張退食多潛飲市樓掖垣求之不得大窘時种放以司諫歸華山楊大年為閑忙令云世上何人號最閑司諫拂衣歸華山世上何人號最忙紫微失却張君房湘山野録六押李泌曰給舍分司押事故舍人謂之六押李泌𫝊宰相判官中舍時目為宰相判官盧氏雜説一佛出世太宗嘗云朝廷每除一舍人六親相賀諺云一佛出世國史給事中黄門禁門曰黄闥以中人主之故號曰黄門令然則黄門郎給事黄闥之内故曰黄門郎興服志名儒國親諸給事中日上朝謁平尚書奏事分為左右以有事殿中故曰給事中多名儒國親為之掌左右顧問漢儀注給事中常侍從左右無員位次侍中常侍或名儒或國親胡廣集夕郎黄門郎屬黄門每日暮入對青瑣門拜名曰夕郎漢舊儀漢儀夕則兩郎向瑣闥拜謂之夕郎栁子厚朝日説受事尚書郎奏事於明光殿省中皆調粉塗壁其邊以丹漆地故曰丹墀尚書郎含鷄舌香伏其下奏事黄門侍郎對揖跪受上賜帛東方朔為中郎賜帛百疋給事中東方朔記胡伯始曰給事常侍從或名儒或國親東方朔中郎為給事中劉向諫議大夫為給事中後胡廣傳能臣蕭望之漢元帝詔曰望之𫝊朕八年厥功茂焉可賜爵闗内侯給事中贊曰身為儒宗有輔佐之能近古社稷臣也漢本𫝊有言而治陳紀父實實子羣魏使持節給事中文帝曰卿何如祖父羣曰臣父有言而治臣有言而不治梁湘東王繹孝子𫝊軒軒煦煦王黎為黄門郎軒軒然得志煦煦然自樂𫝊子忠篤履素武帝太康七年詔曰郎中張建忠篤履素為江表士大夫所稱宜在中朝其以建為給事中晉書起居注清貞亷潔陳邵字節艮太始六年詔曰燕王師邵清貞亷潔博通六籍宜在左右以敦儒訓可給事中古人風太子竊於東宫遣徐文景造乗輿御物文景父陶仁時為給事中謂文景曰汝終當滅門政當掃墓待䘮耳仍移家避之後太子薨事泄文景賜死陶仁遂不哭時人以為有古人風南史太子長懋齊武帝長子駁正給事中凡百司奏抄侍中審定則先讀而署之以駁正違失凡制勅宣行大事則稱揚徳澤褒美功業覆奏而請施行小事則署而頒之凡文武六品已下授職所司奏楊則校其任歴深淺功狀殿最訪其徳行量其才藝若官非人理失其事則白侍中而退量焉其𢎞文館圖書繕寫讎校亦課而寮之凡天下寃滯未申及官吏刻害者必聽其訟與御史及中書舍人同計其事宜而申理之六典塗歸掌侍左右分判省事𢎞文館繕寫校讎之課凡百司奏抄侍中既審則駁正違失詔敕不便者塗竄而奏還謂之塗歸季終奏駮正之目百官志臣下争功張行成遷給事中太宗嘗臨軒謂侍臣曰朕所以不能恣情欲取樂當年而勵節苦心卑宫菲食者正為蒼生耳我為人主兼行将相之事豈不是奪公等名昔漢高祖得蕭曹韓彭天下寧晏舜禹湯武有稷契伊吕四海義安此事朕並兼之行成退而上書諫曰陛下聖徳含光規模𢎞逺雖文武之烈實兼将相何用臨朝對衆與其校量以萬乗至尊共臣下争功哉太宗深納之舊唐東臺給事中龍朔二年改為東臺舍人六典劉伯芻除給事制曰東闥實掌駁議白集崔璪除給事制曰左省駁議不畏强禦杜牧之集覆獄列枉李嶠高宗時遷給事中時酷吏來俊臣構陷狄仁傑李嗣貢裴宣禮等三家奏請誅之則天使嶠與大理少卿張徳裕侍御史劉憲覆其獄徳裕等雖知其枉懼罪並從俊臣所奏嶠曰豈有知其枉濫而不為申明哉乃與徳裕等列其枉狀由是忤㫖出為潤州刺史詔入轉鳯閣舍人則天深加接待朝廷毎有大手筆皆特令嶠為之舊唐駁取儲物盧粲幽州范陽人也景龍二年遷給事中時節愍太子初立韋庶人以非已所至深加忌嫉勸中宗下勅令太子却取衛府封物毎年以供服用粲駁奏曰皇太子處繼明之重當主鬯之尊嵗時服用自可百司供擬又據周官諸應用財器嵗終則㑹唯王及太子應用物並不㑹此則儲君之費咸與王同今與列國諸侯齊衡入封豈所謂憲章在昔垂法将來者也必謂青宫初啟服用所資自當廣支庫物不可長存藩封詔從之上駁駙馬陵盧粲遷給事中時安樂公主壻武崇訓為節愍太子所殺特追封為魯王令司農少卿趙履温鹽䕶葬事李温諷公主奏請依永㤗公主故事為崇訓造陵詔從其請粲駁奏曰伏尋陵之稱謂本屬皇王及儲君等自皇家已來諸王及公主墓無稱陵者惟永㤗公主承恩特葬事越常途不應假以為名請比貞觀以來諸王舊例足得豐厚手敕答曰安樂公主與永㤗無異同冗之義右令不殊魯王縁此特為陵制不煩固執粲又奏曰臣聞陵之稱謂施於尊極至屬王公已下且魯王若欲論親等第則不親於雍王守禮雍王之墓尚不稱陵魯王則不可因上公主而加號且君之舉事則載於方冊或稽之往典或考自前朝臣歴檢貞觀已來駙馬墓無得稱陵者且君人之禮服絶於傍朞葢為不獨親其親不獨子其子陛下以膝下之恩愛他及其夫贈賵之儀哀榮足備豈得使上下無辯君臣一貫者哉帝竟依粲所奏上凝碧詩王維字摩詰天寳末為給事中禄山陷兩都𤣥宗出幸維扈從不及為賊所得禄山宴其徒於凝碧宫其樂工皆黎園弟子教坊工人聞之悲惻潛為詩曰萬户傷心生野煙百官何日再朝天秋槐花落空宫裏凝碧池頭奏管絃賊平陷賊官三等定罪維以詩聞肅宗嘉之特宥之惡其異已給事中駁正制敕定其是非開元中李義多駁正姚崇惡其異已薦為紫薇侍郎實去其權自後唯署案牘而已栁氏家學録執詞頭袁高為給事中徳宗復用盧把為饒州刺史命髙草詔書高執詞頭謁宰相曰盧把作相三年矯詐隂賊退斥忠良若更授大郡恐失天下之望宰相不悦命舍人草之詔出執之不下乃奏論之舊史宰相器李藩為給事中制勅有不可遂於黄勅後批之吏曰宜别連白紙藩曰别以白紙是文狀豈曰批勅耶裴􅀈言於帝以為有宰相器舊唐復為給事憲宗以同州刺史吕元􅈾復為給事中初元膺自給事中除同州及入謝上問以時政得失元膺論奏詞甚激切上嘉其剛正翌日謂宰相曰吕元膺讜言直氣今欲留在左右使言得失卿等以為何如李藩裴􅀈進賀曰陛下納諫超冠前王乃宗社無疆之福臣等不能廣求直士又不能數進直言孤負聖心合當罪責今請以元膺復為給事中以備顧問上悦而從之上擇辰敷奏李遜為給事中嘗論時政以為事君之義有犯無隠陳誠啟沃不必擇辰今君臣敷奏乃候隻日是畢嵗臣下睹天顔獻可否能幾何憲宗嘉之上屢有封駁韋𢎞景為給事中屢有封駁時有劉士經以駙馬交通邪倖自檢校官用為太僕卿𢎞景執奏不可中人宣諭再三𢎞景不為之􅂞穆宗怒令𢎞景使安南邕容宣慰時論翕然推重上繼有封駁郭承嘏為給事中開成元年出為華州刺史詔方下兩省迭詣中書求承嘏出麾之由給事中盧載封還詔書奏曰承嘏自居此官繼有封駁能奉其職宜在瑣闈牧守之才易為推擇文宗謂宰臣曰承嘏乆在黄扉欲優其禄俸暫令亷問近闗而諫列拜章惜其稱職甚美事也乃復為給事中上封還詔書狄兼謨長慶大和中歴鄭州刺史以治行稱入為給事中開成初度支在藏庫妄破漬汚縑帛等贓罪文宗以事在赦前不理兼謨封還敕書文宗召而諭之曰嘉卿舉職然朕已赦其長官典吏亦宜在宥然事或不可卿勿以封敕為艱上補闕左右補闕掌供奉諷諫扈從乗輿凡發令舉事有不便於時不合於道大則廷議小則上封若賢良之遺滯於下忠孝之不聞於上則條其事狀而薦言之六典不待授闕補闕唐垂拱中所置言國家有過闕而補正之故以名官焉詩云衮職有闕仲山甫補之蓋取此義後漢伏湛出入禁闈拾遺補闕魏志文帝勅侍臣曰公卿等宜拾朕之遺補朕之闕晉武帝詔曰公卿等宜補闕拾遺獻可替否晉職官志御登殿侍中居佐散騎常侍居右備切問近對拾遺補闕後魏孝文帝令侍中李中補闕左右垂拱中因其義而創立其才可則登不拘階叙又置内供奉無員數才識相當不待闕而授其資望亦與正官同上左右拾遺垂拱中所置言國家有遺事拾而拾之故以名官焉史記及黯曰臣願為中郎署長出入禁闥補過拾遺漢書元帝初立給事中劉向侍中金敞拾遺於左右後漢張衡為侍中恒居帷幄從諫議拾遺左右後魏初置内侍長主拾遺應對若今之侍中散騎又孝文帝命侍中邱惟拾遺左右垂拱中因其義而創立餘同上堪為諫官李邕少知名長安初内史李嶠及監察御史張廷珪並薦邕詞高行直堪為諫諍之官由是召拜左拾遺俄而御史中丞宋璟奏侍臣張昌宗兄弟有不順之言請付法推斷則天初不應邕在階下進曰臣觀宋璟之言事闗社稷望陛下可其奏則天色稍解始允宋璟所請既出或謂邕曰吾子名位尚卑若不稱㫖禍将不測何為造次如是邕曰不愿顛不狂其名不彰若不如此後代何稱也舊唐見用妖人中宗即位以妖人鄭普思為秘書監李邕上書諫曰陛下今若以普思有竒術可致長生乆視之道則爽鳩氏乆應得之永有天下非陛下今日可得而求若以普思可致仙方則秦皇漢武乆應得之永有天下亦非陛下今日可得而求若以普思可致佛法則漢明梁武乆應得之永有天下亦非陛下今日可得而求若以普思可致鬼道則墨翟干寳各獻於至尊矣而二王得之永有天下亦非陛下今日可得而求此皆事涉虚妄歴代無効臣愚不願陛下復行之於明時上擢自草澤竇羣隠居毗陵以節槩聞著書三十四卷號史記名臣疏貞元中蘇州刺史韋夏卿以園丘茂異薦兼獻其書不報復薦羣召拜左拾遺遷侍御史充入蕃使判官羣因入對奏曰陛下即位二十年始自草澤擢臣為拾遺是難其進也今陛下以二十年難進之臣用為和蕃判官一何易也徳宗異其言留之復為侍御史遺補諫官元和中以左拾遺杜從郁為秘書丞從郁司徒佑之子也初自司議即為左補闕崔羣韋貫之左拾遺獨孤郁等上䟽以為宰相之子不合為諫諍之官於是降為左拾遺羣等又奏云拾遺與補闕雖資品不同而皆是諫官父為宰相而子為諫官若政有得失不可使子論父於是改授之上疏諫禁軍王源忠字正蒙遷左補闕時典禁軍者不循法度至有臺府人吏皆為追擒源忠上䟽其畧曰夫臺府者紀綱之地府縣者責成之所設有罪犯宜歸司存安有北軍勢重於南衙輦下權傾於仗内乞還法司庶守職分憲宗可其請孜孜獻納裴垍在中書有獨孤郁李正辭嚴休復自拾遺轉補闕及㕘謝之際垍廷語之曰獨孤與李二補闕孜孜獻納今之遷轉可謂醜勞無愧矣嚴補闕宦業或異於斯昨者進擬不無疑緩休復悚恧而退幾處無過文宗以魏謩為補闕上嘗言於宰臣曰太宗皇帝得魏徵採拾闕失弼成聖政今我得魏謩於疑似之間必極匡諫雖不敢希及貞觀之政庶幾處於無過之地命授謩左補闕於狀内備述諫疏激切詔中書善為之詞諫賜伶人王直方開成中為右補闕上䟽曰陛下即位之始宣徽教坊悉令停減人數聞近來稍不如此樂工子弟賜與至廣每有此事向外流𫝊傷陛下聖徳豈容易也臣以為鄭聲娯人音樂動聽能使人情迷性亂捨棄萬事而為樂不足也臣伏以聖體未安加以聲色之翫侵蠧聖祚得不憂乎帝覽奏嘉歎賜帛百匹并以表示宰臣令宣付史官冊府秩卑選重白居易上疏云蒙恩授臣左拾遺依前翰林學士謹按六典云云其選甚重其秩甚卑所以然者抑有由也大凡人之情位髙則惜其位身貴則愛其身惜位則偷合而不言愛身則茍容而不諫此必然之理也故拾遺之置所以卑秩者使位未足惜身未足愛也所以重其選者使下不忍負心上不忍負恩夫位未足惜恩不忍負然後能有闕必規有違必諫朝廷得失無不察天下利病無不言此國朝置拾遺之本意也疏禁内官元稹為東臺御史召還京宿敷水驛内官劉士元後至争㕔士元怒排其户稹襪而走㕔後士元追之以箠擊傷稹面執政以稹年少後輩務作威福貶為江陵府士曹㕘軍白居易為拾遺上疏云聞士元蹋破驛門奪将鞍馬仍索弓箭嚇辱朝官承前已來未有此事今中官有罪未聞處置御史無過却先貶官逺近聞知實捐聖徳臣恐從今已後中官出使縱暴益甚朝官受辱必不敢言縱有被凌辱毆打者亦以元稹為戒但吞聲而已陛下從此無由得聞不避雷電韋温為右補闕忠鯁救時宋申錫被誣温昌言曰宋公履行有素身居台輔不當有此是姦人陷害也吾輩諫官豈避一時之雷電而致聖君賢相蒙蔽惑之咎耶因率同列伏閤切争之由是知名諫上尊號韋温為右補闕内史羣臣上尊號温上疏曰徳如三皇止稱皇功如五帝止稱帝徽號之稱乃聖王之末事今嵗三川水災江淮早歉恐非崇飾徽稱之時帝深嘉之團句把麻通事舍人宣詔舊命拾遺團句把麻者盡謁者不知書多失句度故用拾遺低摘聲句以助之及吕温為拾遺被喚把麻不肯去遂成故事拾遺不把麻者自吕始也時栁宗元戲吕云幸識一文半字何不與他把也嘉話録諫迎軒轅大中十一年右補闕陳嘏左拾遺王譜右拾遺薛廷傑上疏諫遣中使往羅浮山迎軒轅先生詔曰朕以萬機事繁躬親庶務訪聞羅浮山處士軒轅集善能攝生年齡亦壽乃遣使迎之或冀有少保理也朕毎觀前史見秦王漢武為方士所惑常以之為誡卿等位當論列職在諫司閲示來章深納誠意仍謂崔慎由曰為吾言於諫官雖少翁欒大復生不能相惑如聞軒轅生高士欲與之一言耳舊紀詩人命蹇白居易與元稹書云古人云名者公器不可以多取僕是何者竊時之名已多既竊時之名又欲竊時之富貴使已為造物者肯兼與之乎況詩人命蹇如陳子昻杜甫各授一拾遺屯剥至死集陳子昻轉右拾遺數上疏陳事詞皆典美時有同州下邽人徐元慶父為縣尉趙師韞所殺後師韞為御史元慶變姓名於驛家傭力候師韞手刃殺之議者以元慶孝烈欲捨其罪子昻建議以為國法專殺者死元慶以正國法然後旌其閭墓以褒其孝義可也當時議者咸以子昻為是舊唐車載斗量天授三年舉人無賢愚咸加擢用高者試鳯閣侍郎給事中次或試員外郎侍御史補闕拾遺校書郎當時頗為濫雜著於謡誦謡曰補闕連車載拾遺平斗量杷椎侍御史椀脱校書郎諫議大夫諫議大夫掌侍從賛相規諫諷諭凡諫有五一曰諷諫二曰順諫三曰規諫四月致諫五曰直諫六典五義孔子曰忠臣之諫君有五義焉一曰譎諫二曰戅諫三曰降諫四月直諫五曰風諫唯度主而行之家語朝有直臣陽城為諫議大夫裴延齡䜛譛陸贄等坐貶黜徳宗怒不解在朝無救者城聞而起曰吾諫官不可使天子殺無罪人而信用姦臣即率拾遺王仲舒等數人守延英門上疏論延齡姦佞贄等無罪狀徳宗大怒召宰相入語将加城等罪良乆乃解今宰相論遣之於是金吾将軍張萬福聞諫官伏閤諫趍往至延英門大言賀曰朝廷有直臣天下必太平矣遂遍拜城及王仲舒等曰諸諫議能如此言事天下安得不太平已而連呼太平萬嵗萬福武人時年八十餘自此名重天下上直士杜口李絳見浴堂殿憲宗曰比諫官多朋黨論奏不實皆陷謗訕欲黜其尤者若何絳曰此非陛下意必憸人以此營誤上心自古納諫昌拒諫亡夫人臣進言於上豈易哉君尊如天臣卑如地加有雷霆之威彼晝度夜思始欲陳十事俄而去五六及将以聞則又憚而削其半故上達者纔十二何哉于不測之禍顧身無利耳雖開納奨勵尚恐不至今乃欲譴訶之使直士杜口非社稷利也帝曰非卿言我不知諫之益上不䘏國事鄭覃以父䕃累諫議大夫穆宗立不䘏國事覃與崔郾等廷對曰陛下新即位宜側身勤政而内耽宴嬉外盤游畋今吐蕃在邊徂候中國假令緩急臣下乃不知陛下所在不敗事乎夫金繒所出固民膏血可使倡優無功濫被賜予願節用之毋今有司重取百姓帝不懌顧宰相蕭俛曰是皆何人俛曰諫官也帝意解乃曰朕之有闕下能盡規忠也因詔覃曰閤下殊不欵欵後有為我言者當見卿延英時閤中奏乆廢至是士相慶上忠良腹心憲宗皇后郭氏武宗喜畋游他日問后起居從容謂曰如何可為盛天子后曰諫臣章疏宜審覽度可用用之有不可以詢宰相毋拒直言勿納偏言以忠良為腹心此盛天子也帝再拜還索諫章閲之往往道游獵事自是畋幸稀小兒武抃等不復横賜矣請廣諫員牛叢任補闕數數言事㑹宰相請廣諫員宣宗曰諫臣惟能舉職為可奚用衆耶今張符趙璘牛叢使臣聞所未聞三人足矣舁櫬極諫閩王曦惡其宗室多以事誅之諫議大夫黄峻舁襯詣朝堂極諫曦怒貶峻漳州司户㕘軍校書郎陳光逸上書疏曦過惡五十餘事曦命衛士鞭之百而不死以繩繫頸掛于木乆而乃絶五代史受諫漢高赦周昌桀紂之對晉武受劉毅桓靈之譏呉兢天中記卷三十二
