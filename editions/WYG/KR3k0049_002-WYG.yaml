body:
  text: 週天大象賦張衡垂萬象乎列星仰四覽乎中極一人為主四輔為翼鈎陳分司内座齊飾華盖於是乎臨映大帝於是乎游息尚書諮謀以納言柱史記私而奏職女史掌彤管之訓御宫揚翠娥之色隂徳周給乎其隅大理詳讞乎其側天柱司晦朔之序六甲候隂陽之域其文煥矣厥功茂哉環藩衛以曲列儼閶闔之洞開北斗標建車之象移節度而齊七政文昌制戴筐之位羅將相而枕三台闢天牀於玉闕乃宴休之攸御肅天理於璇璣執威權而是預天槍天棓以相指内廚内階而分據雙三夾斗而燮詣兩乙賓門而佐助爾乃天牢崇圉設禁暴之隄防太尊明位擬聖公之寵龎太陽接相以班跡𤣥戈撥杓而耀芒勢㣲㣲而有象輔熠熠而流光薦秋成於八榖務春採於扶筐天廚厰兮供百宰𫝊舎開兮通四方偉天官之繁縟立疏廟之隆崇何大角之皎皎夾攝提之融融七宿畫野以分區五官立都而對雄既以歴於中宫乃回眸而顧東觀角亢於黄道包分野於營中開天門之燦耀揖進賢之雍容是推紀於變節是正綱於大同其次則梗河備預招摇候敵泛舟尤池飛觴帝席周鼎毓神天田豐籍按三條於平道賓萬國於天門置平星以決獄列騎官而衛閽陽門守於邉險折威防於將奔􅉐頑司於五聽車騎㕘於八屯望南門之峻闗覿庫樓之威府偃蹇列於四衡的歴分於五柱或蔵兵而蓄鋭或重扃而禦侮煥蒼龍之中宿矚氐心以及房聽朝路寢布政明堂爰俾其地于宋之疆粤若大火赫然天王鈎鈐儼於鳳闕積卒穆於龍驤天輻備於舉輦鍵閉守於闗梁騎陣啓將軍之位從官主巫醫之職罰作贖刑日為陽徳二咸防非而體正七公議賢而糾慝陣車雷擊乎其南天乳露滋乎其北彼貫索之為狀實幽囹之取則歴龍尾以及箕跨北燕而在兹配四妃而有序均九子以延慈鼉曳尾而波泳魚張鱗而水嬉天江為太隂之主傅説奉中闈之祠糠為簸揚之物杵為舂臼之用天鑰司其啓閉丈人存其播種狗以吠盜奸回靡縱却睇女牀前瞻天紀耀棘庭之金印粲椒宫之玉齒中有崇垣厥名天市車肆中衢以連屬市樓臨箕而鬱起帝座類候而獨尊侯臣光熙而燮理宗星派疎而逺集宦者刑餘而近侍列肆與屠肆分行宗正與宗人同峙帛度立象以量用斗斛裁形而取擬若乃朓北宫於𤣥武泊南斗而牽牛賦象通犧廟之類司域應江淮之洲建星含曜於黄道天井寫映於清流河鼓進軍以嘈􅓐兩旗夾道以飛浮天淵委輸於南海狗國分權於北幽雞揚音而顧侣鼈曜影而來遊天田臨於九坎羅堰逼於天桴是司溝洫是制田疇遂聳睇於漢陽乃攸窺於織女引寶毓囿摇機弄杼輦道清塵而俟駕漸臺飛灰而候吕可以嬉遊可以臨處瞻須女之繒室奄開邦於㑹稽離珠耀珍於蔵府匏𤓰薦果於宸閨卨瑜佩瓊而衒敗𤓰委蔓以分畦其外鄭越開國燕趙鄰境韓魏接連齊秦悠永周楚列曜晉代分坰天津横漢以摛光奚仲臨津而汎影既編梁以虹構亦裁輪而電警列虚危於齊濟職悲哀與宗廟墳墓寫狀以孤出哭泣含聲而相召敗臼察災而揚輝天壘守夷而軿照司命與司祿連彩司危與司非疊耀伺禍福之多端總興亡之要妙人掌詔以優游儼為人之質鈎主震而屈曲宛如鈎之象車府息雷轂之聲造父曳風鑾之響杵軍給以標正曰年豐而示仰土吏設備以司存斧鉞用誅之所掌虚梁閴寂以幽閟盖屋喧轟而宴賞天錢納賮以山積天綱憩輿而野饗北落置候兵之門八魁建張禽之網瞻廟府於室壁諒有衛之封畿布離宫之皎皎散雲雨之霏霏霹靂交震雷電横飛壘壁寫陣而齊影羽林分營而析暉土公司築而開務天廏飛御而起機螣蛇宛而成質水蟲總而攸歸動則飛躍於雲外止則盤縈於漢沂迤奎婁之分野辨鄒魯之川陸豢馴獸於囿苑隷封豕於溝瀆左更處東而掌虞右更居西以司牧立囷倉之儲聚樹溷屏之重複司空主土以捜祥鐵鑕縈蒭而薦畜軍南門列轅而逺出天將軍揚旗而示逐伊王良之䇿馬則車騎之滿野蒙居河而路塞䇿裁鞭而電寫閤道優游而據中附路備闕而居下自胃倉而昴畢實趙地之郊衢建旄頭而肅引畢罕車而迅驅卷舌列天説之表附耳屬天髙之隅天髙望氣天説備巫卷舌安其寂黙附耳矜其諂䛕天船泛影乎清瀨貯積水而窺害太陵分光乎耀虚包積尸而如帶礪石資乎鋸刃月宿歸乎太隂天街畫於戎野天阿察於山林天節宣威於邦域天隂進謀於腹心天庾積粟以示稔天廩備稷以祈歆天園曲列兮儲芳樹天苑圓開兮畜異禽蒭藁遵納秸之軌殊國曉重譯之音九游排鋒以進退軍井依營而淺深天闗嚴扃於畢野諸王列藩於漢潯何五車之均明而三柱之照煥納五兵於蔵府圖七國之邦貫天潢利涉以淪漣咸池浮中而渺漫闢岷峨之沃壤睎觜參之曜形示斬刈以明罰收褒旅而獲寧參旗懾于邉寇玉井通於水經座旗肅穆以昭禮司怪幽求而發㝠屏嫌於客厠咎於圊亦有天屎質黄効靈於是仰東井之輿鬼覽西秦之伯邑質明祀而變生鉞淬水而刑及四瀆斷江淮之候兩河占秦越之域水位瀉流而迅奔天樽奠饌而翕集軍市通貨以財明五侯起議而衡立積水醖燕酧之勞積薪備牲庖之給野雞俟兵而據市天狗吠盜而映漣闕邱擬乎兩觀水府司乎百川狼援戈而野戰弧屬矢而承天老人作主而秋煥大人通臣而夜懸子扶尊而眇邈孫孕緒而連綿惟天社之赫若實勾龍之神焉爰觀栁以及張知周疆之爰啓儼咮頸以分嗉奉滋嘗而賜醴觀夫軒轅之宫宛若螣蛇之體交雷雨之靄靄列后妃之濟濟酒旗緝醼以承歡内平繩愆而執禮爟含烽而喋寇實防邉之有俟長垣崇司域之備少㣲彰處士之懿外廚調列饍之滋天相居大臣之位天紀録禽而獻齒天廣嚴祠而毓粹天稷播五稼之勤東歐表三夷之類爰周翊軫厥土惟荆驅風驛之千乘奏雲門之六英長沙明而獻夀車轄朗而陳兵青邱廕於韓貊器府總於琴堂軍門坐甲於軍閫司空掌土於司平矚太㣲之峥嶸啓端門之赫奕何宫庭之宏厰類乾坤之闔闢五座㕘一帝之謀九卿踵三公之跡儲以太子㕘之幸臣從官肅侍謁者通賓郎將司㦸於丹陛郎位含香於紫宸乃寄屏以持法控端門之内闉明堂演化靈臺候神虎賁之㣲猛士進賢之訪幽人獻淵謀於諸侯儼營衛於常陳胡天漢之昭回自東震而綿絡北賁箕而聮斗南經説而緯龠合乘津而浮𤓰分漂杵而泛閤歴玉潢以汪洋淪七星而依泊惟木徳之含精為嵗星而明麗雖盈縮所察禍福攸繫然而得之者隆失之者替祚明君而耀朗罰昏主之光翳下為杜靈上為天貴如夭胎而毁卵具職仁而施恵迴騖愆期前馳舛契奮槍棓以示慝峙樓垣而表戾粤若熒惑火帝之精毎執法以明罰必伺災而告誠守其邦而嵗戰去其野而時清若虧信而廢禮則下乗而上征居惟釁發合與憂并浮天讒而聳劍列蚩尤而耀旌司危見而失國昭明出而起兵伊土宿之播靈為鎮星而耀質尋所履為休慶視所居為貞吉廣邦繳而斯留復軒宫而載出若崇奢而賤義則行虧而度失或含丹而舉兵或噙黒而遘疾旬始發而侯起獄漢明而主黜被金方之耀色有太白之垂文乃降神於屏翳實建象於將軍如用兵而不察匪先達之攸聞髙出利於深戰順指著乎宏勲茍恩義之不溥則禍福之攸分或飛芒而蝕月或引彗而横氛六賊陳災而構禍天狗殺將而破軍咨太隂之稟粹粤辰星之攸揆乗四仲而顯晦歴一周而匝履為用法之淵謨為出師之令軌若淫刑而縱欲則委孛而流矢白其角而表哀黒其規而應水察函劍之相去候正旗之所指非其出而夏寒錯其宜而將死於是究經緯之終始徵幽㣲之機符昭晰兮為人主之明鑑杳藹兮寔㝠祗之秘樞固聲聞而響集方形移而影趨若山石之旌處士谷風之應騶虞者也若夫退寒暑而無舛中昏旦而不越畢露雲油箕躔吹發亦有樞降軒而繞電景瑞尭而麗月雖肸響之難窮信靈英之未歇嘉大舜之登禪耀黄星而靡鋒壯髙祖之遇時家五緯而相從殷堪縱眺識曹公之潜跡李郃流目知漢使之幽蹤荆軻入秦白虹貫日衛生設䇿長庚食昴悲夫星隕如雨而周衰彗竟長天而秦滅蛇隨楚而九域含嗟狗過梁而千里流血晉君終而婺妖見漢帝圍而參暈結周楚滅而南衝晉齊殃而北裂自大辰以及漢彰宋焚而衛􅉯或除舊以布新顯陳盛而姜絶諒吉凶之有兆匪灾譴之虚設固罔念而作狂在恭已而成哲是以帝王之有天下也莫不分設其官或司其告唐則羲和降察夏則昆吾演奥嘉殷巫之美服登周史之雅號宋述子韋鄭稱裨竈唐昧與尹臯宣範甘徳暨石甲垂諾故能下守職而恪恭上知變而無傲此希夷之妙象豈蒙昧之私好有少㣲之養寂無進賢之見譽㕘器府之樂肆掌貫索之刑書恥附耳之求達方巻舌以幽居且扃扉而絶駟奈臨河而羨魚望天門而屏跡安知公卿之所如欽定四庫全書天中記巻二明陳耀文撰星陽之榮星之為言精也陽之榮也陽精為日日分為星故其字日下生為星春秋説題辭元氣之英星者元氣之英也三五歴萬物之精萬物之精上為列星說文坤徳布精上為衆星河圖水土之氣上為曽宙萬物之精凝為列緯皆本於地而發於天者也杜牧孫子註金之散氣星者金之散氣其本曰人星衆國吉少則㓙孟康曰星石也金石相生人與星氣相應也前天文志山川之精地為山川山川之精上為星各應其州城分野為國作精符騐也國精符山川精氣上為列星唐嚴思善傳體生於地地有山嶽川谷井泉江河洞湖池沼陂澤溝壑以宣吐其氣也天有列宿星辰三百四十八座亦天之精氣所結成凝瑩以為星也星者體生於地精成於天列居錯峙各有逌屬在野象物在朝象官在人象事其以神著有五列焉是為三十五名一居中央謂之北斗四布於方為二十八宿中外之官常明者百有二十四可名者三百二十為星二千五百㣲星之數葢萬一千五百二十庻物蠢蠢咸得繫命靈憲萬物之體星者陰陽之精萬物之體五行之形其體在下精耀在天百官之命各因其原飛又行萬人不安京房易傳象官書正義云天有日月照臨晝夜猶王官之伯率領諸侯也北辰環繞北極猶卿士之周衛天子也五星行於列宿猶州牧之省察諸侯也二十八宿布於四方猶諸侯為天子守土也常星衆星常星猶公卿也衆星猶萬民也列星正則衆星齊常星亂則衆星墜矣塩鍬論劉向云天官列宿在位之象小星無名者庻民之類恒星穀梁傳曰列星曰恒星亦曰經星恒經皆常也天極中宫天極星其一明者太乙常居也史記三公侍旁藩臣環翊璇璣玉衡髙揭衡峙文昌秦階森布暉映其垣為紫微其象為樞紐在人則廣朝路􅃦造命出政之廷萬方之所内面而觀卭也蒼龍主東赤鳥司南於菟神龜儼列西北其舍二十有八其度三百六十有五在人則九畿五服庶邦庶尹之位上之所賴以榦方而作屏也玉海紫宫為皇極之居太微為五帝之廷靈憲北斗天文地理各有所主北斗有七星天子有七政也春秋合城圖北斗七星所謂璇璣玉衡以齊七政杓攜龍角衡殷南斗魁枕參首是謂帝車運於中央臨制四鄉分陰陽建四時均五行移節度定諸紀皆繫於斗史記斗第一天樞第二璇第三璣第四權第五衡第六開陽第七摇光第一至第四為魁第五至第七為杓合而為斗居陰布陽故稱北春秋運斗樞天之喉舌斗者天之喉舌玉衡属杓魁為璇璣文耀鈎李固對詔陛下之有尚書猶天之有北斗也斗為天喉舌尚書亦為陛下喉舌斗斟酌元氣運平四時尚書出納王命賦政四海所謂制氣之臣也後漢書天理在斗中司三公也如人喉在咽以理舌語宋均注曰斗為天之舌口主出政教三公主𨗳宣君命喻於人則宜如人喉在咽以理舌口使言有條理春秋合誠圖天中之精易是類謀曰斗機絶綱玉衡撥攝提亡五星合狼狐張鄭𤣥斗者天中之精天失其平故斗機絶綱玉衡撥也攝提者斗前之星為斗施政教布之八野今斗失其政故攝提亦為之亡不見也攝提似眉春秋元命苞曰天有攝提人有两眉為人表候陽立於二故眉長二寸注云攝提兩星頰曲人眉似之漢書翟方進云今提揚眉服䖍曰提攝星揚眉揚其芒角也失方劉向奏云孔子對魯哀公言夏桀殷紂暴虐天下故厯失則攝提失方孟陬無紀前漢書天階北斗為帝座上有三台形如䨇目疊為三級以復斗魁是名天階斗中復有尊帝二星大如車輪若人見之壽可千嵗玉樞經三台為天階太一躡以下上晉天文志三台魁下六星兩兩相比者名曰三能三能色齊君臣和不齊為乖戾史記李竒曰三台謂之㤗階漢藝文志注㤗階黄帝㤗階六符經曰㤗階者天之三階也上階上星為男主下星為女主中階上星為諸侯三公下星為卿大夫下階上星為元士下星為庻人三階平則陰陽和風雨時社稷神祗咸獲其宜嵗大登民人息天下大安是謂太平不平則五神乏祀日有食之水潤不浸稼穡不成冬雷夏霜百姓不寧故治道傾天子行暴令好興甲脩宫榭廣苑囿則上階奄奄䟽濶也文昌斗魁戴匡六星曰文昌宫一曰上將二曰次將三曰貴相四曰司命五曰司中六曰司禄史記天府文耀鈎曰文昌宫為天府孝經援神契云文者精所聚昌者揚天紀輔拂並居以成天象故曰文昌宫晉志曰文昌六星在北斗魁前天之六府也主集計天道三公杓南三星及魁第一星西三星皆曰三公主宣徳化調七政和隂陽之官也晉志四輔太微東藩四星一曰上相二曰次相三曰次將四曰上將所謂四輔也西藩四星一曰上將二曰次將三曰次相四曰上相亦曰四輔也東壁東壁二星主文章天下圖書之秘府也占若明則圖書集道術行小人退君子入不然則天子好武臣賤文士稽古中正之臣隠親黨邪曲之人用也太象列星圖屛星孝經内事曰王者逺嫌别微殊貴賤抑驕臣息亂子則屏星為之明以潤帝座章而光宋均曰屏星五帝座明以潤章大也鈎鈴孝經内事曰昆弟有親親之恩則鈎鈴不離房宋均曰鈎鈴逺房則踈濶今昆弟相親故天相近明其及也老人星史記曰狼北地有大星曰南極老人老人見治安不見兵起常以秋分時候之於南郊隋志曰老人一星在弧南一曰南極常以秋分之旦見於丙春分之夕一作夜沒一作見於丁見則化平主壽昌月令秋分日饗壽星於南郊注云壽星南極老人星也爾雅云壽星角亢也注云數起角亢列宿之長故云壽星唐㑹要開元敕有司置壽星壇以千秋節日脩祠祭老人星及亢角七星著之常式景星史記曰天暒而景星見景星者徳星也其狀無常常出於有道之國瑞應圖曰景星者大星也狀如半月生於晦朔助月為明王者不私人則見袁山松書漢桓帝時陳蕃劉知茂上書云夫氣𢎞則景星見化錯則五星開徐陵陳武帝報徳寺刹下銘曰助月致景星之祥非烟流慶雲之色妖星妖星曰孛星彗星長星亦曰攙搶天文録曰孛星者彗之屬也偏指曰彗芒氣四出曰孛孛謂孛孛然也灾甚於彗爾雅曰彗星為攙搶司馬相如大人賦㩜攙搶以為旌後漢崔篆慰志賦運攙搶以電掃兮清六合之土宇謝瞻張子房詩鴻門銷薄蝕垓下隕攙搶注喻羽也後漢杜篤論都云髙祖奮彗光埽項軍注彗除舊布新故曰埽貫索星貫索九星在七公前為賤人牢口一星為門門欲開開即有赦九星皆明天下獄煩七星見小赦六星五星大赦動則斧鎻用中空則更元石氏星經晉志孫狄云天市星繁嵗豐稔也貫索星少獄無囚也熒惑帶休色刑措不用也流星淮南子流星色赤名曰地鴈其所墜者起兵流星有光青赤名曰天鴈軍甲之精華也天文要集云流星入昴貴人囚係怪星袁山松書云怪星晝行名曰營頭行振大誅也客星客星有三一曰老子二曰國星三曰温星老子稱李耳古之有徳行而不仕老而有壽之人國星者國皇也不知何國人温星者温其姓古之有操行而不仕者也三人者其精皆為星命之為客星中興天文志軒轅軒轅十七星在七星北黄龍之體主雷雨之神後宮之象也陰陽交感雷激為電和為雨怒為風亂為霧凝為霜散為露聚為雲氣立為虹蜺離為背璚分為抱珥二十四變皆軒轅主之史正義金虎陸士衡詩大辰匿暉金虎曜質石氏星經曰昴者西方白虎之宿也太白者金之精太白入大昴金虎相薄主有兵亂也五才之靈夫陰陽二氣淘育羣品精象所寄是為日月羣生之性章為五才五才之靈五星是也宋厯志五行之精五星者五行之精五帝司命應天之號令為天之節度前李尋傳天有五帝五星為之使隋天文志天之五佐五星者天之五佐為經緯見伏有時所過行嬴縮有度史記五辰凡星皆出辰没戍故五星為五辰十二舍亦為十二辰嵗星司肅典致時雨熒惑司哲典致時燠太白司乂典致時暘辰星司謀典致時寒填星司聖典致時風經星有常不變緯星有伏見進退與日相終始更王相休廢星備云五星更王相休廢其色不同王則光芒相則内實休則光芒無角不動摇廢則少光色順四時其國皆當也保章氏䟽失政政失於春嵗星盈縮政失於夏熒惑逆行政失於秋太白出入無常政失於冬辰星不效其鄉文子五星聚周將伐殷五星聚房齊桓將霸五星聚箕漢髙入秦五星聚東井宋志五星聚於冀方而魏有天下魚豢典畧五星聚箕尾安禄山反於燕唐志宋祖啓國五星聚奎太宗即位五星在奎宋史四星聚四星聚桞張而光武興復于洛宋志四星聚尾箕而曹公迎帝都許兖豫遂定後四星復聚魏文受禪騐異録四星聚牛女而元帝中興揚土晉書宋武北伐四星聚奎及西伐秦四星聚井四星聚参而渤海始霸四星聚危而文宣受終魏書四星聚張而周太祖代漢五代史参商子産曰昔髙辛氏有二子長曰閼伯季曰實沈不相能也日尋干戈以相征討帝不臧遷閼伯於啇丘主辰商人是因故辰為商星遷實沈於大夏主参唐人是因故参為晉星左昭元年孛孛本黄帝時一女子脩行不得其死中興天文志景星見史記曰黄帝時景星見形如半月可以夜作尚書中候曰帝堯七政七十載景星出翼春秋佐助期曰舜之時景星出房堯五老論語䜟曰仲尼曰吾聞堯率舜等遊首山觀河渚有五老遊焉一老曰河圖將來告帝期二老曰河圖將來告帝謀三老曰河圖將來告帝書四老曰河圖將來告帝圖五老曰河圖將來告帝符龍御王苞金泥玉檢封盛書咸曰知我者重瞳姚黄五老因飛為流星上入昴拾遺記云虞在位五老遊於國都禪於禹五老去不知所之堯填星大象賦云欽明光被填逆水府洪波滔天功隆大禹注昔堯遭大水填星逆行入水府舜黄星元魏張淵觀象賦嘉黄星之靡鋒明虞舜之不競注昔舜將受禪於堯先有星見員而無鋒芒言舜當用土徳王天下星見而無芒角者示揖讓而受不以兵事爭競也本傳羅泌路史云舜十有七年天見妖孽黄星靡鋒帝乃死注引此證之且以魏為宋異哉帝王星精堯翼之精星在南方色赤舜斗之星精在中央色黄禹参之星精在西方色白湯虚之星精在北方色黑文王房星之精在東方色青感精符注奚仲託精觀象賦云奚仲託精於津陽注奚仲四星在天津北近河傍太古時造車輿者死而精上為星水北曰陽在河北故曰津陽也鑄鼎星見王子年拾遺記曰禹鑄九鼎擇雌金為陰鼎雄金為陽鼎太白星見九日不没嵗星順行昔湯之元祀嵗星順行與日合於房房心宋亳分也周武王至豐之明年嵗星順行與日合於桞留於張桞張河洛分也程史傅說乗尾莊子曰夫道可傳而不可受得而不可見傅說得之以相武丁奄有天下乗東維騎箕尾而比於列星觀象賦曰傅說登天而乗尾注傅說一星在尾後乗尾在龍駟之間石氏云傅說一名太祝鄭樵通志云謂之傅說者古有傅母有保母傅而說者謂傅母喜之也偶商之傅說與此同音諸子家不詳審其義則曰說騎箕尾殊不知箕尾專主後宫之事故有傅說之佐焉按在天為星辰在人為聖賢於理固有然者乃變古而曲為之説則造父奚仲玉良亦皆古人也又將何說乎迎嵗周文王受命嵗星在鶉火武王伐紂十三年嵗星在鶉火魏志蘓林傳武王伐紂柬面而迎嵗至汜而水至共頭而墜彗星出而授殷人其柄當戰之時十日亂於上風雨擊於中然而前無蹈難之賞而後無遁北之刑白刃不畢㧞而天下得矣淮南兵畧訓武王伐紂魚辛諫曰嵗在北方不北征武王不從尸子天黿國語云伶州鳩對周景王曰武王伐殷嵗在鶉火星在天黿我姬氏出自天黿天黿即𤣥枵齊之分野也王季之母太姜齊女也故言出於天黿夣北斗觀象賦曰疇吕尚之霄夣善登輔而翼聖注曰昔太公未遇文王時釣魚於磻溪夜夣北斗輔星神告尚以伐紂之意事見尚書中候篇也祭畢畢為天網主網羅無道之君故武王伐紂上祭於畢求助天也後漢蘓竟傳九光王曰余不知九星之光周公旦曰九星星辰日月四時嵗是謂九星九星九光周書任昉敦勸梁王令曰重搆参辰而九星仰止不易日月而二儀貞觀感星微子感牽牛星顔淵感中台星張良感弧星樊噲感狼星劉子星孛五色貫紫微昭王末年有星孛見光五色貫於紫微荆人卑詞致於王曰願獻白雉乃宻使漢濵之人膠船以待王遂南巡狩將底於海天大曀雉兎皆震䘮六師於漢時王至中流膠液船解王及祭公辛餘靡溺竹書紀年造父王良觀象賦云仰見造父爰及王良注造父五星在傳舍河中造父周穆王御死精上為星王良五星在奎北王良者晉大夫善御九方􅀈之子良一名郵無正為趙簡子御死精託於星為天帝之馭官韓陽天文要集曰造父洗馬轡勒衘鑣史記曰王良策馬車騎滿野北斗三台並流周厲王時北斗與三台並流不知其所厲王没后兩主星復見獨異志觀星識霸觀象賦云欽管仲之察微見虚危而知命注云昔管仲與鮑叔牙啇賈於南陽見三星聚虚危之分知齊將有霸主遂共戮力來投齊地也恒星不見四月辛卯夜恒星不見夜中星隕如雨左莊七年彗入斗周襄王不能事其母弟彗入斗亡其度孝經鈎命决𤣥枵春無氷梓慎曰今兹宋鄭其饑乎嵗在星紀而滛於𤣥枵蛇乗龍龍宋鄭之星也宋鄭必饑𤣥枵虛中也枵耗名也上虛而民耗不饑何為左襄二十八年星孛於辰冬有星孛於大辰西及漢申須曰彗所以除舊布新也今除於火火出必布焉諸侯其有火灾乎梓慎曰在宋衛陳鄭鄭禆竈言於子産曰宋衛陳鄭將同日火若我用瓘􅕸玉瓉鄭必不火鄭人請用之子産曰天道逺人道邇非所及也竈焉知天道遂不與亦不火左昭十八年得星吳伐越史墨曰不及四十年越其有吳乎越得嵗而呉伐之必受其凶左昭三十二年禳彗齊有彗星景公坐栢􅃦而泣晏子問之公曰寡人聞之彗星出其所向之國君當之今彗星出而向吾國我是以悲晏子曰君之行義固應無徳於國穿陂池則欲其深以廣也為臺榭則欲其髙且大也賦歛如撝奪誅戮如仇讎自嬰觀之孛又將出彗星之出庸何懼乎公欲使常伯騫􅓙之晏子曰無益也祗取誣焉天道不謟不二其命若之何􅓙之使神而可祝而來亦可􅓙而去也百姓苦怨以萬數而君令一人􅓙之安能勝衆口乎史記晏子春秋左傳觀星知動地齊景公問太卜曰子之道何能對曰能動地公以告晏子晏子出見太卜曰昔吾見鈎星在房心之間地其動乎太卜曰然晏子出太卜走見公臣非能動地地固將自動論衡晏子見常伯騫問曰昔吾見維星絶樞星散地其動乎晏子春秋彗星籠月春秋後傳曰魏人唐㫿對秦王曰專諸之刺王僚彗星籠月無色紫微降光仲尼春秋成紫微降光抱朴子孛於東方魯哀公十三年十一月有星孛於東方明年春秋之事終是謂諸夏微弱蠻夷􅉍霸田氏專齊三族擅晉卒以干其君明而代奪之陵夷遂為戰國天下横流矣魏書星孛東北春秋星孛北則齊魯晉鄭陳宋莒之君並受殺亂之禍星孛東方則楚滅陳三家由此分纂齊晉宋書熒惑退舍宋景公時熒惑守心心宋之分野也景公憂之司星子韋曰可移於相公曰相吾之股肱曰可移於民公曰君者待民曰可移於嵗公曰嵗饑民困吾誰為君子韋曰天髙聼卑君有君人之言三熒惑宜有動於是候之果徙三度吕氏春秋彗何知昔楚將軍子正與齊戰未合夜彗星出柄在齊所在勝不可擊子正曰彗何知明與齊人戰大破之尉子繚太白食昴前漢鄒陽上梁孝王書曰衛先生為秦畫長平之事太白食昴昭王疑之蘓林曰白起為秦伐趙破長平軍欲遂滅趙遣衛先生說昭王益兵糧為應候所害事用不成其精誠上達於天故太白為之食昴彗孛大角秦史云始皇之時彗孛大角西漢詞圃曰項羽之敗孛大角劉向曰三代之亡攝提易方秦項之滅星孛大角五星㑹南斗秦一世時五星㑹於南斗南海尉任囂曰秦方長亂此南越偏霸之象也遂有志焉病且死召真定人趙佗行南海尉事故今呼為尉佗漢髙帝遣陸賈立為南越王南越志太白竊織女侍兒秦併六國太白星竊織女侍兒梁玉清衛承莊逃入衙城小仙洞四十六日不出天帝怒命五岳搜捕太白歸位衛承莊逃焉玉清有子名子休玉清謫於北斗下常舂其子乃配與河伯骖乗行雨子休毎至小仙洞耻其母淫奔之所輙回馭不經故此地常少雨東方朔内傳獨異志枉矢西流漢書曰項羽救鉅鹿枉矢西流枉矢所觸天下之所伐射滅亡象也羽遂合從阬秦人屠咸陽凡枉矢之流以亂伐亂也張衡周天大象賦云蛇隨楚而九域含嗟觀象賦云恒不見以周衰枉蛇行而秦滅天街史記云平城之圍月暈参畢七重漢書曰畢昴間天街也街北胡也街南中國也昴為匈奴参為趙畢為邉兵是嵗髙祖自將至平城為冒頓所圍七日乃解昴星精春秋佐助期曰漢相蕭何長七尺八寸昴星精生耳三漏月角大形鈎命决曰蕭何為昴精項羽陳勝胡亥為三滑天狗漢文帝後二年八月天狗下梁壄景帝三年七月天狗下天狗所降以戒守禦其年吳楚反攻梁梁堅城守遂伏尸流血其下大象賦狗過梁而千里流血客星掩帝座武帝嘗微行造主人家仍留宿夜與主婢卧有一書生亦寄宿善天文忽見客星將掩帝座甚逼書生驚呼咄咄不覺聲髙又見一男子操刀將入户聞書生聲急遂縮走客星應時而退如此者數過帝異而問之書生具說所見帝乃悟曰必此人壻也將欲肆㓙惡於朕乃語主人召集期門羽林擒奴問而欵服乃誅之帝嘆曰斯葢天啓書生以扶祐朕躬乃厚賜書生焉幽明録折木指彗武帝嘗見彗星方朔折指星之木以授帝持以指彗彗遂没星出之夜野獸皆鳴或說為獸鳴星郭子横洞冥記帝皇太尊北斗九星七見二隠其第八第九是帝皇太尊精神也漢相國霍光家有典衣奴子名還車忽見二星在斗中光明非常乃拜而還遂得増年六百𤣥門寳海經天星盡摇元光中天星盡摇上以問候星者對曰星摇者民勞也後伐四夷百姓勞於兵革漢書内傳以為東方朔嵗精王母遣使至東方朔死上疑問使者對曰朔是木帝精為嵗星下遊人中以觀天下非陛下臣也漢武内傳彗出牽牛哀帝建平二年彗出牽牛日月五星所從起厯數之元三正之始彗而出之改更之象也其後王莾簒國漢書神星晝見光武破王尋與朱然書曰交鋒之日神星晝見太白清明東觀漢記三星在漢分王莾時冦賊羣發郅惲仰占𤣥象歎謂友人曰方今鎮嵗熒惑並在漢分翼軫之域去而復來漢必受命福歸有徳如有順天發策者必成大功後漢演孔圖曰卯金刀名為劉中國東南去荆州故為漢分也星繞劉聖公初得璽綬之夕有流星下降如䋲繞聖公明日為劉盆子將謝禄縊殺之亦繞星之象後漢二使和帝即位分遣使者二人各至州郡觀採風謡二人當到益部投候館吏李郃舍夏月露坐郃問曰二君發京師時知朝廷遣二使至郡問何以知之郃指星云有二使星來向益部耳漢書大陸後漢魯恭傳云仲夏行秋令則人傷於疫注大陵之氣為害也春秋合城圖云大陵星主死䘮也一名積尸卷舌策馬星不動周騰字叔達為侍御史桓帝當南郊平明應出騰仰觀曰夫王者象星今宫中星及策馬星悉不動明日必不出至四更皇太子卒遂止豫章列士傳徳星見太史言有徳星見當英才賢徳同遊者詔下下諸郡縣問潁昌郡上事曰有陳太丘父子三人俱共㑹社漢雜事陳太丘詣荀朗陵云云於時太史奏真人東行世綐徳星聚陳仲弓從諸子姪造荀季和父子於時徳星聚太史奏五百里内有覧人聚異苑兄弟夜過荀爽汝南先賢傳南斗注生管輅至平原見趙顔貎主夭亡顔父乃求輅延命輅曰子歸覓清酒鹿脯一觔卯日刈麥地南大桑樹下有二人圍碁次汝但酌酒置脯飲盡更斟以盡為度若問汝但拜之勿言必合有人救汝顔依言而徃果見二人圍碁顔置脯斟酒於前其人貪戯但飲酒食脯不顧飲數巡北邉坐者忽見顔在叱曰何故在此顔唯拜之南面坐者語曰適來飲他酒脯寧無情乎北坐者曰文書已定南坐者曰借文書㸔之見趙子壽可十九嵗乃取筆挑上語顔曰救汝至九十年活顔拜而回管語顔曰大助子喜且得増壽北邉坐人是北斗南邊坐人是南斗南斗注生北斗注死凢人受胎皆從南斗過至北斗所有祈求皆向北斗搜神記東斗主筭西斗記名北斗落死南斗上生中斗大魁總監衆靈度人經軫星逐鬼張星拘魂東井還魄也抱朴子將星隕有星赤而芒角自東北徃西南沒于諸葛亮營俄而亮卒孫氏晋陽秋熒惑化小兒吳孫休永安元年有諸保質子羣嬉中有一異兒眼有光芒爚爚外射諸兒問之曰我熒惑也將示爾三公歸於司馬言畢乃聳身而躍仰視之若曵一疋練有頃而没後四年蜀亡六年魏廢二十一年呉平是歸司馬也宋書中台坼張華為司空中台星坼少子韙勸華遜位華云天道𤣥逺須脩徳以應之晉書張華將死中台星遂折太元中復還合正太𫝊謝安為相所致也晉陽秋月犯少㣲㑹稽謝􅀈字慶緒隠若耶山初月犯少微星少微一名處士星占者以隐士當之時譙國戴逵名著於敷時人憂之俄而敷死故㑹稽人士以嘲吳人云吳中髙士便是求死不得死晉陽秋妖星見豫分初有妖星見於豫州之分歴陽陳訓嘗謂人曰今年西北大將當死祖逖亦見星曰為我矣方平河北而天欲殺我此乃不祐國也俄卒於雍丘晉書飲流星袁真在豫州遣女伎紀陵阿薜阿郭阿馬三奴與桓宣武既至經時三人夏夜同出月下有銅瓮水在其側見一流星墮瓮中驚喜共視星如二寸火珠於水底冏然明净乃相謂曰此吉祥也當誰應之於是薜郭更以瓢杓接取並不得馬最後取星正入瓢中便飲之既而若有感焉俄而懐桓𤣥𤣥雖簒位不終而數年之中榮貴極矣續搜神記續晉陽秋星隕化肉漢主劉聰淫泆無度時有星隕平陽化為肉徑二十八步羣臣諫以淫色所致聰曰自是天家事於朕何干十六國春秋聰曰此陰陽之理何關人事載記太白犯東井符生時有奏太白犯東井井秦之分也太白罰見必有暴兵起於京師生曰星入井者彼自渴耳何所怪乎載記福徳在燕符堅攻燕燕人大震封孚問申生曰事將何如生嘆曰鄴必亡矣然越得嵗而呉伐之卒受其禍今福徳在燕秦雖得志而燕之復建不過一紀耳及慕容暐降燕故太史黄泓嘆曰燕必中興其在呉王乎恨吾老不及見耳汲郡趙秋曰天道在燕不及十五年秦必復為燕有通鑑后妃星失明符堅以弟融為冀州牧融將發堅祖於灞東奏樂賦詩堅母茍氏以融少子甚愛之比發三至灞上其夕又竊如融所内外莫知是夜堅􅃦於前殿太史令魏延上言天市南門屛内后妃星失明左右閽寺不見后妃移動之象堅推問知之驚曰天道與人何其不逺遂重星官載記妖星見東井符堅末年妖星見於東井尹緯知堅將滅乃與尹詳龎演推姚萇為盟主載記黄星出昴畢晉太元二十一年有大黄星出於昴畢之分五十餘日慕容氏太史王先曰當有真人起於燕代之間大兵鏘鏘其鋒不可當冬十一月黄星又見天下莫敵元魏太祖皇始元年也魏書鎮星在軒轅沮渠蒙遜聞劉裕滅姚泓顧謂左右曰古之行師不犯嵗鎮所在姚氏舜後軒轅之苗裔也今鎮星在軒轅而裕滅之亦不能乆守關中後劉裕子義貞果敗於赫連勃勃焉載記熒惑失位初姚興死之前嵗也太史奏熒惑在瓠𤓰星中一夜忽然亡失不知所在或謂下入危亡之國將為童謡妖言而後行其灾禍太宗聞之驚乃召諸碩儒令與史官求其所詣崔浩對曰請以日辰推之庚午之夕辛未之朝天有陰雲熒惑之亡當在此二日之内庚之與未皆主於秦辛為西夷今姚興據咸陽是熒惑入秦矣諸人皆誚其無徵浩笑而不應後八十餘日熒惑果出於東井留守盤旋秦中大旱明年姚興死二年交兵三年國滅於是諸人乃服曰非所及也魏書兵候太白廢帝之殞也沈攸之欲起兵問其知星人葛珂之珂之曰自古起兵皆諸侯太白太白見則成伏則㫺桂陽以太白伏時舉兵一戰授首此近世明騐今蕭公廢昏立明政值太白時此與天合也且太白尋出東方東方利用兵西方不利故攸之止不反及後舉兵珂之又曰今嵗星守南斗其國不可伐攸之不從遂敗宋書驛馬星流容城令徐路善占候世宗時坐事係冀州獄别駕崔隆宗就禁慰問路曰昨夜驛馬星流計赦即時應至隆宗先信之遂遣人試出城候焉俄而赦至時人重之後魏書粹陽天庭元魏泰常四年自正月至秋七月月行西犯太微天象若曰太微粹陽之天庭月者臣也今横行轥之不已甚乎天象志熒惑入南斗梁武帝中大通六年先是熒惑入南斗去而復還留止六日上以諺曰熒惑入南斗天子下殿走乃跣足下殿以禳之及聞魏主西奔乃慙曰彼亦應天象耶本紀魏明問黄權天下鼎立何地為正對曰當驗天文往者熒惑守心而文帝崩呉蜀無事此其徵也蜀記熒惑入井𫝊奕隋開皇中以儀曹事漢王諒及諒舉兵謂奕曰今兹熒惑入井是何祥也弈曰天上東井黄道經其中正是熒惑行路所涉不為怪異若熒惑入地上井是為灾也諒不恱及諒敗由是免誅舊唐書中星不守呉嶠霅溪人煬帝元年過鄴中告其令曰中星不守太微主君有嫌而旺氣流萃於秦地子知之乎令不之信至神堯即位方知不誣嶠精明天文即袁天綱之師也龍城録金玉床摇隋煬帝幸江都盗賊日滋夏侯端頗知𤣥象善相人說髙祖曰金玉床摇動此帝座不安参墟得嵗必有真人起於實沈之次天下方亂然安之者其在明公徳星守秦分薜頥武徳初進直秦王府宻語曰徳星守秦分王當有天下王表為太史丞唐書太白見秦分𫝊奕武徳九年五月宻奏太白見秦分秦王當有天下髙祖以狀授太宗及太宗嗣位召奕賜之食謂曰汝前所奏幾累於我然今後但須盡言無以前事為慮也舊唐書星孛太微貞觀中太宗將封禪泰山有星孛干太微犯即位薜頥言考諸𤣥象恐未可東封禇遂良曰方告成岱宗而彗見此天意有所未合願加詳慮詔罷封禪唐書七星化人太宗時李淳風奏北斗七星當化為人明日至西市飲酒使人候之有僧七人共飲酒二石太宗遣人召之笑曰此必李淳風小兒在彼言我也忽不見周史纂異熒惑犯五諸侯長安二年熒惑犯五諸侯渾儀監尚獻甫奏臣本命納音在金五諸侯太史之位熒惑火也能尅金是臣將死之徵則天曰朕為卿禳之遽轉獻甫為水衡都尉謂曰水能生金今又去太史之位卿無憂矣其秋獻甫卒則天甚嗟異惜之舊唐書鎮犯天關長安四年熒惑入月鎮星犯天關嚴善思奏曰法有亂臣伏罪臣下謀上之象嵗餘張柬之敬暉等起兵誅張易之昌宗五王立中宗舊唐書下人家飲酒章仇兼瓊領西川嘗令搜訪道術士有一鬻酒者不急於利毎有紗帽藜杖四人來飲酒至數斗積至十餘石即倂還之其言愛說孫思邈或報章仇公公專令探問忽一日又來公遂潛徃從者三四人公至前躍出再拜自稱姓名相顧徐起唯柴燼四枚在座前不復見矣時𤣥宗好道公奏其事詔召孫問之曰此太白酒星仙格絶髙毎遊人間飲酒處處皆至尤樂蜀中唐逸史孫卒於永淳元年此云召孫問之何耶北斗化豕僧一行㓜嘗有徳於王姥兒殺人係獄姥求姥求救於一行一行乃徙大瓮於渾天寺中授布囊於二奴曰某坊廢園至昏當有七物入來可盡掩之酉後果有羣豕至奴悉獲之一行令寘瓮中𤣥宗急召一行問曰太史奏昨夜北斗不見是何祥也師有一禳之乎一行曰后魏時失熒惑至今帝車不見古所無者天將大警於陛下也莫若大赦天下𤣥宗從之一行歸放豕出又其夕太史奏北斗一星見凡七日而復酉陽雜爼星犯昴韋見素見肅宗於順化郡是嵗十月丙申有星犯昴見素言於帝曰昴者胡也天道謫見所應在人禄山將死矣帝曰日月可知乎見素曰福應在徳禍應在刑昴金忌火行當火位昴之昏中乃其時也既死其月亦死其日明年正月甲寅禄山其殪乎帝曰賊何等死荅曰五行之説子者視妻所生昴犯以丙申金木之妃也木火之母也丙火為金子申亦金也二金本同未異還以相尅賊殆為子與首亂者更相屠戮乎及禄山死日月皆驗新唐書按新舊書本紀禄山皆以乙邜死此云皆驗未審熒惑守嵗朱泚盗據京城李晟屯渭橋時熒惑守嵗久之方退賔介或勸曰今熒惑已退皇家之利也可速用兵晟曰天子外次人臣但當死節埀象𤣥逺吾安知天道耶至收復謂叅佐曰前者士大夫勸晟出兵非敢拒也且軍可用之不可使知之嘗聞五緯盈縮無准晟懼復來守嵗則我軍不戰而自潰矣参佐歎服皆曰非所及也舊唐書火金犯太微上將貞元十一年司天頻奏熒惑太白犯太微上將間一月而馬燧薨舊唐書太白犯上相元和八年太白犯上相歴執法占者言今之三相皆不利始輕末重月餘李絳以足疾免明十月李吉甫以暴疾卒九年六月武元衡為盗所害唐書李吉甫卒前一嵗熒惑掩太微上相吉甫曰天且殺我文星暗大中九年日官李景亮奏文星暗科塲當有事沈詢為禮部侍郎聞而憂焉至是三科盡覆試宏詞趙矩等皆落吏部侍郎裴諗左授國子祭酒趙矩丞相令狐綯故人子也同列將以諗賦題不宻事嫁患於綯綯遂令盡覆云東觀奏記木入南斗唐乾符中木入南斗數夕不退荆州節度王鐸問知星者咸曰金火土犯斗即為灾惟木當應為福耳術士邊岡以為惟斗帝王之宫宿惟木為福神木星入斗帝王之兆木在斗中朱字也后為全忠之應北夣𤨏言五星連珠晉開運二年契丹主北歸脅陶穀令從行穀頗工厯數謂同軰曰西南五星連珠漢地當有王者出契丹主必不得歸國及耶律徳光死有孛光芒指北穀曰自此契丹自相魚肉永不亂華矣遂歸漢本傳夣星墜懐蜀孟㫤母李氏本長公主膢也嘗夣大星自天墜落其懐以告公主公主曰此婢有福相當生貴子乃令知祥幸之遂生㫤蜀檮杌夣立斗下袁郭初應舉夣立北斗下果第七人及第外史檮杌伍喬星伍喬居廬山詩調清苦山中浮屠夣仰視見一大星芒色甚異傍有人指之曰此伍喬星也既覺訪得喬乃傾資奉之使入金陵舉進士陸游南唐書吞飛星湯恱貴池人㓜穎悟嘗見飛星墜水盤中掬吞之自是文思日竒仕南唐為宰相凡書檄詔誥皆出於恱后隨其主歸宋為光禄卿壽星圖嘉祐八年冬十一月京師有道人遊卜於市莫知所從來貌體古怪不與常類飲酒無算未嘗覺醉都人士異之相與諠傳好事者潛圖其狀後近侍逹帝引見賜酒一石飲及七斗次日司天䑓奏壽星臨帝座忽失道人所在仁宗嘉嘆久之閱世之所寫壽星圖不知其幾不過俯龜狎鶴松栢叅錯粉餙鮮麗而已仁宗時天下熈熈物不春宜乎壽星遊戯人間躬見於帝也康節題章聖二年有人長三尺許身首幾相半云云濯纓記南陵使者元豐八年春太史奏熒惑守心是時太清宫道士王太初奏章於太一宫真室殿之中壇回云至九天門下有傳上帝之命者曰已付南陵使者告行太初因問曰南陵使者為誰荅云見守心者是也自是京師大火文昌雜録天星不照宋宣和初蜀人王俊明在京師謂人曰汴都王氣盡矣吾夜以盆水直氐房下望之皆無一星照臨汴分野者更於宣徳門外宻掘土二尺試取一塊嗅之枯燥索莫非復有生氣天星不照地脈又絶而為萬乗所都可乎即投匭上書乞移都洛陽夷堅志熒惑入天江宣和中熒惑入天江謝中美謂給事中許翰崧老云後三年都邑必大水至己亥夏大水莫知所由來幸新堤築成僅免魚鱉之患鐡圍山叢談祭星曰布釋名曰星者散也言列位布散也爾雅曰祭星曰布注布散食地上取其象之布也隕星為石左傳云隕石於宋五隕石也史記天官書曰星墮至地則石也河濟之間時有墜星星徑百里大星徑百里中星五十小星三十北斗七星星間相去九千里皆在日月下其二陰星不見者相去八千里也徐整長厯罰星廣雅云熒惑謂之罰星杜牧孫子注云嵗為善星不福無道火為罰星不罰有徳玉李星如玉李月上金波霧生猶縠河埀似帶金樓子河鼔謂之牽牛爾雅河鼓十二星在牽牛北故或名為牽牛牽牛織女焦林大斗記云天河之西有星煌煌與参俱出謂之牽牛天河之東有星微微在氐之下謂之織女荆楚嵗時記云嘗見道書云牽牛娶織女取天帝二萬錢備禮久不還被驅在營室又小說云天河之東有織女天帝之子也年年機杵勞役織成雲錦天衣容貌不暇整理天帝怜其獨處許嫁河西牽牛郎嫁後遂廢織絍天帝怒焉責令歸河東但使其一年一度相㑹㺯杼古詩云迢迢牽牛星皎皎河漢女纎纎擢素手札札弄機杼終日不成章泣涕零如雨謝惠連七夕詩弄杼不成藻聳轡騖前蹤負軛古詩云南箕北有斗牽牛不負軛架楹陸士衡擬古詩織女無機杼大梁不架楹農祥國語虢文公諫宣王曰太史順時峴土農祥晨正土乃脈發韋昭曰農祥房星也龍楚語曰觀射父對昭王曰日月㑹於龍土氣含收天明昌作百嘉備舎國家於是乎蒸嘗賈逵龍尾也月令孟冬日在尾分野保章氏掌天星以志星辰日月之變動以觀天下之遷辨其吉凶以星圡辨九州之地所封封域皆有分星以觀妖祥周禮角亢氐兖州房心豫州尾箕幽州斗牽牛婺女揚州虚危青州營室東壁并州奎婁胃徐州昴畢冀州觜􅏲參益州東井鬼雍州桞七星張三河翼軫荆州堪輿家云𤣥枵為齊之分星紀吳越之分析木之津燕之分大火宋之分壽星鄭之分鶉尾楚之分鶉火周之分鶉首秦之分實沉魏之分火梁趙之分降婁魯之分訾娵衛之分星主中國或曰分野獨擅於中華星次不霑於荒服豈日月私照與李淳風曰華夏為四交之中當二儀之正四夷炎涼氣偏鳥語獸心豈得同日而語故孔子曰夷狄云云之亡此之謂也是故越裳重譯匈奴稽顙肅慎獻矢西戎聴律莫不航海梯山逺方致貢人畜内首殊類宅心以此而言四夷宗中國之驗也故孔子曰為政以徳云云拱之且聖人觀象分配國野或取水土所生或視風氣所宜因係之以成形象之應故昴為旄頭被髮之象青丘蠻夷文身之國梗河胡騎負戈之俗胡人事天以昴星為主越人伺察以斗牛辯祥秦人占狼弧齊觀虚危各是其國自所宗奉是以聖人因其情性所感而分屬之豈茍然𫝊㑹者哉乙己占鄭樵通志畧云按天之所覆者廣而華夏所占者牛女下十二國耳牛女在東南故釋氏謂華夏為南贍部州其二十八宿所管者多十二國之分野隨其所𨽻耳文獻通考云以十二次言之牛女雖屬揚州而華夏之地所謂十二國者則不特揚州而已又揚州雖可言東南而牛女在天則北方宿也與南贍部州之説異矣且北斗七星其次舎自張而至於角星書以為一主秦二主楚三主梁四主呉五主趙六主燕七主齊五車五星其次舍在畢星書以為西北一星主秦東北一星主趙燕東南一星主魯衛中央一星主楚西南一星主魏然則北斗五車所主者亦此十二國而此二星初未嘗屬乎牛女也謂牛女専主華夏可乎癸辛雜志云世以二十八宿配十二州分野最為踈誕中間僅以畢昴二星管異域諸國鄭夾漈云云趙普有䟽云五星二十八宿在中國而不在四夷此言信矣按此三書俱不及乙已占何耶宿字解釋名云宿宿也言星各止住其所也説􅁐辨物篇曰二十八星所謂宿者日月五星之所宿也王充論衡云二十八宿為日月舍猶地有郵亭為長吏廨矣晉天文志云四布於方各七為二十八舍觀此數公則宿止當讀如本音呉都賦窮飛走之棲宿叶披重霄而髙狩借韻耳未可固執宿為秀音也史記律書註正義秀肅二音行止異名凡星居之曰次曰舍曰留同舍曰合變為妖星曰散經之曰歴相擊曰鬭又曰離復合合復離為鬭早出曰嬴晩出曰縮又失次上二三宿曰嬴失次下二三宿曰縮在下而上曰陵韋昭謂突掩為陵在上而下曰乘周匝曰繞東西曰鈎南北曰紀星月相陵曰食七寸以内光芒相及曰犯居其宿曰守守之而久曰復曰還金鷄玉羊易是類謀曰當藏者出當出者消太山失金鷄西嶽亡玉羊鄭𤣥云失金鷄者箕星玉羊者狼星茀劇秦美新大茀經霣海水羣飛善曰茀彗星也井中視星自井中視星所見不過數星自丘上以望則見始出也非明益也勢使然也私心井中也公心丘上也尸子漢金之散氣史記天官書曰漢者金之散氣其本曰水漢星多則多水少則旱河精川徳布精上為星河精上為天漢河圖活地象水氣天河水氣也精光轉運於天詩箋水精為天漢靈憲水精上浮星元氣之英漢水之精也氣發而升精華上浮宛轉隨流名之曰天河一曰雲漢衆星出焉物理論天津爾雅曰析木謂之津箕斗之間漢津也郭璞注曰津漢津也箕龍尾斗南斗天漢之津梁劉炫云天漢即天河也天河在箕斗二星之間箕在東方木位斗在北方水位分析水木以箕星為隔隔河須津梁以渡故謂此次為析木之津也從天轉地天河從北極分為兩頭至於南極其一經南中過其一經東井過河者天之水也隨天而轉入地下過抱朴子七月案戸大戴禮曰夏小正曰七月漢案户漢天河也户直户也言正南北也星孛及漢傳曰昭公四年星孛及漢水祥也賈逵解曰天漢水也或曰天河渭水以象始皇都咸陽端門四達以則紫宫渭水貫都以象天河橋橋南渡以法牽牛三􅀈皇圖天漢項羽封髙帝為漢王帝不悦蕭何曰語曰天漢其稱甚美願大王王漢撫其民還定三秦天下河圖也漢書天河與海通舊說天河與海通近世有人居海渚者年年八月有浮槎去來不失期人有竒志立飛閣於槎上多齎糧乘槎而去十餘月至一處有城郭状屋舎甚嚴遥望宫中有織婦見一丈夫牽牛渚次飲之牽牛人乃驚問曰何由至此此人為説來意拜問此是何處荅曰君還至蜀都訪嚴君平則知之竟不及登岸因還至蜀問君平曰某年某月有客星犯牽牛宿計其年月正是此人到天河時也博物志榰機石漢武帝令張騫使大夏尋河源乗槎經月而至一處見城郭如州府室内有一女織又見一丈夫牽牛飲河騫問曰此是何處荅曰可問嚴君平織女取榰機石與騫而還後至蜀問君平君平曰某年某月客星犯牛女榰機石為東方朔所識荆楚嵗時記昔有一人尋河源見婦人浣沙以問之曰此天河也乃與一石而歸問嚴君平云此織女支機石也集林嚴遵仙槎唐置之於麟徳殿長五十餘尺聲如銅鐡堅而不蠧李徳裕截細枝尺餘刻為道像往往飛去復來廣明以來失之槎亦飛去洞天集元豐末有人㩦支機石頭投進者廣可二斗許不圓微峩而碧色天漢左界比斗經其上南壁閑居緑天漢素女謝端少喪父母為隣人所養年十七未婚後於海中得一大螺如斗許取貯瓮中毎早至野還見有飲飯湯火端疑之於籬外窺見一少女從瓮中出至竈下燃火便入問之女答曰妾天漢中白水素女天帝哀卿孤貧恭順使我權相為守舎炊煑待卿取婦當還去今無故相伺不宜復留今留此殻貯米穀可得不乏忽有風雨而去端得其米資其子孫搜神記發䝉記老公賜藥晉宋黄祖奉親至孝母病篤天漢明開有一老公將小兒持箱自通即以兩丸藥賜母服之患頓消因以停宿夜中㕔事上有五色氣際天琴歌清好祖徃視之見坐帳裏四角及頂上各有一大珠形如鷄子明彩炫燿幽明録五帝墟夫雲漢自坤抵艮為地紀北斗自乾攜巽為天綱其分野與帝車相直皆五帝墟也唐志鵲填烏鵲填河成橋而渡織女淮南子銀漢絳河天河謂之銀河銀漢河漢絳河明河李白詩銀河倒㵼三石梁杜甫詩銀河倒列星古詩曰河漢清且淺宋之問詩明河可望不可親願得乗槎一問津銀灣銀浦許洞謂銀河為銀灣李賀謂為銀浦鷄跖集風天地之使風者天地之使也河圖辛通記萬物之首樂動聲儀云風者禮樂之始萬物之首漂物管子曰風漂物者也風之所飄不避貴賤美惡宋王風賦云楚王曰夫風者天地之氣漙暢而至不擇貴賤髙下而加焉樂動聲儀云風者禮樂之始萬物之首噫氣南郭子綦曰大塊噫氣其名曰風是惟無作作則萬竅怒號而獨不聞之翏翏乎無根陰陽散為風風氣無根也五經通義陰陽怒淮南子曰天之偏氣怒者為風春秋元命苞曰陰陽怒為風太𤣥中精風􅉼太𤣥之中精故能動化百物而行乎天上風陰也而其發為陽子華書天之號令翼氏風角曰風者天之號令所以譴告人君者郎顗曰風者號令天之威怒蔡伯喈上封事曰風者天之號令所以教人也張奐䟽曰風為號令動物通氣四正四維風者陰陽亂氣激發而起者也猶人之内氣因喜怒哀樂激越而發也故春氣温其風温以和喜風也夏氣盛其風熛以怒怒風也秋氣勁其風清以凄清風也冬氣實其風惨以烈固風也此四正之風也又有四維之風東北明庶庶物出幽入明也東南融風其道以長也西南清明百物備成也西北不周方潛藏也此八風者方土異氣徐疾不同和平則順違逆則凶非有使之者也氣積自然怒則飛沙揚礫發屋㧞樹喜則不摇枝動草順物布氣天地之性自然之體也物理論八風易緯曰八節之風謂之八風立春條風至春分明庶風至立夏清明風至夏至景風至立秋涼風至秋分閶闔風至立冬不周風至冬至廣莫風至春秋考異郵曰八風殺生以節翺翺風之為言萌也其立字䖝動於几中者為風吕氏春秋曰何謂八風東北曰炎風一曰融風東方曰滔風東南曰薫風南方曰巨風西南曰凄風西方曰飂風西北曰厲風北方曰寒風喜氣怒氣黄帝風經曰調暢祥和天之喜氣也折揚奔厲天之怒氣也風者氣也得怒之氣則暴得喜之氣則和得金之氣則涼得木之氣則温得火之氣則炎得水之氣則烈祥風黄帝占曰風不及地和緩而來謂之祥風符瑞圖曰祥風者瑞風也一名景風尸子述太平事云其風春為發生夏為長嬴秋為方盛冬為安靜四氣和為通正謂之永風禮稽命徴曰出號令合民心則祥風至孝經援神契云徳至八方則祥風至尚書大傳曰王者徳及皇天則祥風起五風女媧没大庭氏之王有天下五風異色枚乗七發曰衆芳芬鬰亂於五風遁甲開山圖夣風得相黄帝夣大風吹天下之塵垢皆去窹而嘆曰風為號令執政者也垢去土后在也天下豈有姓風名后者哉於是依占而求之得風后於海隅登以為相帝王世紀脯翣堯時厨中自生肉脯其薄如􅝍摇動則風生使食物寒而不臭名曰脯翣世紀解愠阜財舜作五弦之琴以歌南風歌曰南風之薫兮可以解吾民之慍兮南風之時兮可以阜吾民之財兮世紀恊風國語史伯對鄭桓公曰虞幕能聼恊風以成樂生物者也虢文公諫周宣王曰先時五日瞽告有恊風至陸機詩恊風旁駭陸雲詩恊風應律折葢武王伐紂大風折葢太公因折葢之形而制曲葢崔豹古今注雷電以風周公居東二年為詩以貽王名之曰鴟鴞秋大熟未獲天大雷電以風禾盡􅅯大木斯㧞邦人大恐王與大夫盡弁以啓金縢之書乃得周公請代武王之説王執書以泣曰昔公勤勞王家唯予冲人弗及知今天動威以彰周公之徳王出郊天乃雨反風禾則盡起尚書金縢别風韓詩外傳曰成王時越裳重譯而來朝曰久矣天之不迅風疾雨也海不揚波也意者中國殆有聖人乎尚書大傳曰天無烈風淫雨意中國有聖人乎文心雕龍云尚書大傳有别風淮雨帝王世紀云烈風淫雨别列淮淫字似潛移淫列義當而不竒淮别理乖而新異傳毅制詠已用淮雨固知愛竒之心古今一也爰居避國語曰海鳥曰爰居止於魯國東門之外臧文仲使國人祭之展禽曰今兹海其有災乎夫廣川之鳥獸恒知而避其災也是嵗也海多大風冬燠虞翻注曰是爰居之所避也賈逵注曰爰居雜縣也六鷁退六鷁退飛過宋都風也占老子將去周出關以升崑崙關令尹喜占風逆知當有神人來過乃歸道見老子老子知喜命應得道乃停關下以長生之事授之神仙傳襲齊殿庶女者齊之寡婦養姑姑女利母財而殺母以告寡婦婦不能自解以寃告天大風襲於齊殿史記御風列子御風常以立春歸於八荒立秋遊乎風穴是風至則草木發生去則摇落謂之離合風陸機要覧列子曰列子師老啇氏友伯髙子進二子之道乗風而歸莊子曰列子御風冷然旬有五日而後返蕭蕭荆軻入秦燕太子丹送别易水上歌曰風蕭蕭兮昜水寒壮士一去兮不復還楚辭秋風瀏以蕭蕭史記雄風雌風楚襄王遊於蘭䑓之宫宋玉景差侍有風颯然而至王乃披襟而當之曰快哉此風寡人所與庶人共者耶宋玉對曰此獨大王之風耳庶人安得共之夫風入於深宫經於洞房清清冷冷愈病析酲發眀耳目寧體便人此謂大王之雄風夫庶人之風塕然起於窮巻之間動沙堁吹死灰憞㥵鬱邑毆温致濕此謂庶人之雌風也以􅍎占風孝武坐未央前殿天新雨東方朔屈指獨語上問之對曰殿後栢上有鵲立枝上東向而鳴視之果然問朔何以知之對曰此以人事知之風從東方來􅍎尾長傍風則順背風則蹶必當順風而立是以知也朔傳李孝貞詠散東立朝雨霽南飛夜月明避風䑓拾遺記云漢成帝與趙飛燕戱於太液池毎輕風時至飛燕殆欲隨風入水帝以翠纓結飛燕之裙今太液池尚有避風䑓即飛燕結裙之處楊妃外傳云明皇覧漢成帝外傳以趙飛燕身輕置七寶避風䑓謂妃子曰爾則任吹多少妃子對曰霓裳一曲足以髙掩前世鄭公風射的山南有白鶴山此鶴為仙人取箭漢太尉鄭𢎞嘗採薪得一遺箭頃有人覓𢎞還之問何所欲𢎞識其神人也常患若邪溪載薪為難願旦南風暮北風後果然故若邪溪風至今猶然呼為鄭公風也孔靈符會稽記手指葛𤣥行過神廟乗車不下須􅁷有大風逐𤣥埃塵漲天𤣥大怒曰小邪敢爾即舉手指風風便止神仙傳少女風管輅過清河倪太守時天旱倪問輅雨期輅曰今夕當雨樹上已有少女微風樹間又少男風起衆鳥和鳴其應至矣須􅁷雨至别傳劉孝威詩電舒長男氣枝摇少女風扇蔽庾亮出鎮江州以帝舅故内執朝權王𨗳不能平時王在冶城坐大風揚塵王輙舉扇拂塵曰元規塵汙人世説仁風晉陽秋曰袁宏為東郡守謝安執宏手授扇宏曰謹當奉揚仁風慰彼黎庶清風謝安云小時在殿廷㑹見王丞相便覺清風來拂人青鳥啣符呉真君嘗遇大風書符置屋上有青鳥啣去風即止續仙傳司風令史明帝體肥憎風夏月常着小皮衣拜左右二人為司風令史風起方靣輙先起聞宋書長風宋書曰宗慤字元幹少時從父徵士炳問其志荅曰願乗長風破萬里浪髙唐賦曰長風至而波起西京賦長風激於别隯起洪濤而揚波江賦長風颹以増扇小人風齊神武時芒山之役風從西來入營李業興曰小人風來當大勝神武曰若勝以爾為本州刺史後果驗北史䟦扈將軍隋煬帝泛舟忽陰風波嘆曰此風可謂䟦扈將軍清異録如焚侯君集平髙昌之後太宗欲以其地為郡縣褚遂良曰髙昌塗路沙磧千里冬風氷冽夏風如焚行人遇之多死貞觀政要勝風山人包超明皇令隨哥舒翰西征毎陣常得勝風酉陽雜爼巽二起風蕭志忠景雲元年為晉州刺史將以臘日畋遊先一日有樵者於霍山見一長人向谷長嘯俄有兕鹿豕狐兎雉鴈駢匝百許長人曰余𤣥冥使者奉北帝之命明日蕭使君當畋汝軰若干合鷹死若干合箭死羣獸皆戰懼請命有老麋屈滕求救使者曰東谷嚴四善謀可就彼祈求羣獸從行樵者覘之至東谷有黄冠一人老麋哀請黄冠曰若祈滕六降雪巽二起風即蕭使君不復遊獵矣昨滕六䘮偶得美女納之雪立降矣巽二好飲酒得醇醪賄之則風立生有二狐自稱能取之羣獸散去翌日未明風雪暴至竟日乃罷蕭使君不復獵矣幽怪録銀瓶止風天寶時一日大風卒起詔不空禳止請銀瓶一枚作法加持須􅁷戢靜忽因池鵝悞觸瓶傾其風又作急暴過前勅令再止隨止隨効帝乃賜號曰知藏焉宋髙僧傳封十八姨天寶中崔元微春時月夜於􅁐中見青衣女伴曰楊氏李氏陶氏又緋衣小女曰石醋醋忽報封家十八姨來言辭冷冷有林下風醋醋曰女伴在􅁐中毎被惡風相撓常求十八姨相庇處士毎嵗旦作一朱幡上圖日月五星之文於二月一日平旦微有東風立於􅁐東則免難矣崔明年至此日立幡是日東風刮地折木飛花而􅁐中繁花不動崔始悟女伴即衆花之精封家姨乃風神也博異記占風鐸唐岐王宫中於竹林内懸碎玉片子毎夜聞玉片子相觸之聲即知有風號占風鐸開元遺事相風旌五王宫中各於庭中立長竿掛五色旌於竿頭旌之四埀綴以小金鈴有聲即使侍從者視旌之所向可以知四方風候開元遺事詠薫風桞公權侍文宗遊後庭聨句帝曰人皆苦炎熱我愛夏日長桞曰薫風自南來殿閣生微凉本傳貪狼風前蜀王衍咸寧元年十月幸秦州至梓橦大風發屋㧞木太史曰此貪狼風也當有敗軍殺將者衍不省至綿谷而唐師入其境衍懼遽還唐師所至州縣俱迎降東方生風東者日之初風者教之始天之使也所以發號施令故生自東方也景霽山昏蒼埃際合崖谷若一巖岫之風也黄白昏埃晩空如堵獨見天垂川澤之風也加以黄黒白埃承下山澤之猛風也内經五運行論鳴紊啟折風之化也振拉摧㧞風之用也上風師吕氏春秋曰風師曰飛亷應劭云飛亷神禽能致風氣者也楚詞後飛亷使奔属風俗通云周禮以桞箕祀風師風師者箕星也箕主簸揚能致風氣昜巽為長女長者伯也故曰風伯戌之神為風伯故以丙戌日祀於西北火勝金為木相也晉天文志曰箕一名天鷄主八風凡日月宿在箕壁軫翼者風起孫子火攻之法曰起火有日月者月在箕畢軫翼也四宿者風起之日也春秋緯曰月失其行離于箕者風揚沙郊祀志注師古曰風伯飛亷雨師屛翳也説者謂為箕畢星志既言二十八宿又有風伯雨師則知非箕畢也風伯名方道彰七籖磔爾雅云祭風曰磔孫炎云既祭披磔其牲以風散之李巡曰祭風以牲頭蹄及皮破之以祭故曰磔郭璞曰今俗當大道中磔狗云以止風此其象云羊角莊子曰鵬之背若太山鵬翼若垂天之雲摇羊角而上者九萬里絶雲氣負青天司馬注羊角風曲上行若羊角駱賔王啟摶羊角以垂天展驥足而騰景王勃啓牛蹄已倦臨大壑而驤鱗羊角可逢想髙衢而撫翼異名爾雅云南風曰凱風詩􅆁風凱風自南東風曰谷風邶風習習谷風北風謂之凉風邶風北風其凉西風謂之秦風大雅大風有隧焚輪謂之頺郭曰暴風從上下小雅惟風及頺從上下曰颷説文颷疾風也亦曰扶摇廻風楚詞悲廻風曰飄日出而風曰暴陰而風曰曀風而雨圡曰霾月令云疾風曰肓風風俗通曰猛風曰颲凉風曰瀏微風曰飉小風曰颼小風從孔來曰􅂒不鳴條儒者論太平瑞應皆言五日一風風不鳴條論衡董仲舒云太平之世風不摇條開甲破萌而已西京雜記太平時陰陽和風雨咸同海内不偏地有險昜故風有遲疾雖太平之政猶有不能均同也唯平均乃不鳴條易稽覧圖君子風風或清明來久長不摇樹木枝葉離地三二丈者此有龍徳在於下風或清明不及二三尺者此君子之風也風俗通髙下風髙者道逺下者道近凡大風非常三日三夜者天下盡風也二日二夜者天下半風也一日一夜者千里風也抱朴子疾遲凡風動初遲後疾其來逺初急後緩其發近凡風動葉十里鳴條百里摇枝二百里墮葉三百里折小枝四百里折大枝五百里飛沙石千里㧞大樹根五千里凡鳴條以上皆百里風也乙已占鳥巢扶枝鳥鵲識嵗之多風去喬木而巢扶枝注扶旁也淮南子鳥向風立魚逆水而上鳥向風而立取其鱗羽之順也有微風不知所從來但觀鳥之所向𤨏碎録酒沈溢淮南子曰物類之相應𤣥妙深微論辯不能解故東風至而酒沈溢造化權輿云以為東方之氣風也故凍非東風不能解湛非東風不能溢虎嘯春秋元命苞曰猛虎嘯谷風起類相動也淮南子曰虎嘯而谷風至注虎陽獸也與風類同成公綏嘯賦云飛亷皷於幽隧猛虎應於中谷鳶鳴前有塵埃則載鳴鳶注鳶鳴則風生禮記曲禮惠風魏都賦惠風如薫邊讓章華䑓賦曰惠風春施謝混游西池詩云惠風蕩繁囿吕向曰春風也晉袁羊曰何嘗見明鏡疲於屢照清流憚於惠風光風招魂云光風轉惠汜崇蘭此注光風謂雨已日出而風草木有光也緒風楚詞款秋冬之緒風注云緒餘也謝靈運詩初景革緒風新陽改故陰顔延年和謝詩云倚巖聴緒風厲風莊子云冷風則小和飄則則大和厲風濟則衆竅為虚而獨不見之調調之刀刀乎注泠泠小風厲風大風也獵葉風周生列子曰夫獵葉之風不應八節石尤風宋孝武帝丁督䕶歌云願作石尤風四靣斷行旅陳子昴入峽阻風云故鄉今日友歡㑹坐應同寧知巴峽路辛苦石尤風戴叔倫贈裴明州詩知得未得去慚愧石尤風郎士元留盧秦卿詩知有前期在難分此夜中無將故人酒不及石尤風李義山詩來風貯石郵香風王子年拾遺記曰瀛洲時有香風冷然而起張袖受之則歴年不歇着肌膚必軟滑祛塵風崑崙山有四面風者言東南西北一時俱起也又有祛塵之風若衣服塵汚者風至吹之衣則浄如浣濯落梅風五月有落梅風江淮以為信風又有霖霪號為梅雨沾衣服皆敗風土記黄雀風南中六月則有東南長風俗號黄雀風時海魚化為黄雀因為名也風土記鯉魚風提要録鯉魚風乃九月風也李賀詩門前流水江陵道鯉魚風起芙蓉老又古詞云瑞霞成綺映舴艋鯉魚風起信風江淮船泝流而上常待東北風謂之信風七八月有上信三月有鳥信五月有麥信國史補花信風徐鍇嵗時記云三月花開名花信風東臯雜録江南自初春至初夏五日一畨風候謂之花信風梅花風最先楝花風最後凡二十四畨以為寒絶也后詩人詩云楝花開後風光好梅子黄時雨意濃徐師川詩云一百五日寒食雨二十四畨花信風又古詩云早禾映雨初晴后苦楝花風吹日長􅄓風嶺南録云嶺㠐秋夏雄風曰􅄓發自午至夜半乃止仆屋僵樹甚者颺屋瓦若飛蝶累年一發或嵗再三南越志云熈安間多􅄓風􅄓者具四面之風也一曰具風常以六七月發未至時三日鷄犬為之不寧大者或至七日小者一二日外國以為黑風嶺表録異云南海秋夏間或雲物􅆭然有暈如虹長六七尺此候則􅄓風必發故呼為􅄓毋見忽有震雷則􅄓風不作矣舟人嘗以為候預為備之番禺雜記云􅄓風將作有微風細雨先緩後急謂之鍊風舶䑲風呉中梅雨初過颯然清風而至彌旬謂之舶䑲風此畨啇客海舶初回風送而至𤨏碎録呉中毎暑月則東南風數日甚者至踰旬而止呉人名之曰舶趠風云海外舶船禱於神而得之乗此風到浙江間也東坡呉中詩云三旬已過黄梅雨萬里初來舶趠風唐溪詩話古風發屋折木者曰怒風揚沙轉石者曰狂風四轉五復者曰亂風暴風卒起乍有乍無者曰暴風獨鹿蓬勃者曰勃風扶摇羊角者曰飄風風來清涼温和塵埃不起者曰和風乙己占四方風南越志云熈安界多風俗號為四方之風五風信吳俗以十月初五日為五風生日太湖漁者千餘家盛陳牲醴饗並湖諸神祠祈此日有風則毎五日風雨如期而至終嵗皆然可以揚㠶取魚謂之五風信海風海道之險曰癡風曰黒風癡風之作連日怒號不已四方莫辨黒風則天色晦冥不分晝夜圖經俊風正月時有俊風俊者大也大風南風也何大於南風也曰合冰必於南風解冰必於南風生必於南風收必於南風故大之也大戴禮剛風鴟鳶展趐不能動去地四十里風力猛壮可騐有剛風世界抱朴子風山北屋縣故城西十里有風山其山有穴如輪風氣蕭索常不止風門山風門山有石門去地百餘丈將欲風起此門隠隠有黒氣上須臾有黒風竟天武陵記風母風母出九徳縣似猨見人若慚出頸打殺得風還活劉欣期交洲記風井盛𢎞之荆州記曰冝都佷山縣山有風穴口大數尺名曰風井夏則風出冬則風入風出入之時吹拂左右常浄暑月經之凛然有衣裘想袁山松云夏則風出冬則風入春秋分則靜余徃觀之其時四月去穴數數丈須臾寒慄言至六月中尤不可當徃人有冬過者置笠穴中風吸之經日還步陽溪得其笠則知潛通矣水經風穴龍山石上徃徃有仙人及龍迹故以為名四麓各有一大穴大如車輪春則風生東秋出西夏出南冬出北不相奪倫有沙門法猛於夏日入其東穴見石屋石人欲窮諸穴便見有人厲聲云法師其餘皆如東者不宜來見穢猛乃愕然不覺身在穴外邢子勵地記犬自穴出汝南臨汝縣有小山曰崆峒其顛洞穴如盎将有大風雨則白犬自穴出田夫以為候亦名曰玉燭峯三水小牘見雲知風白崖山之右有巨穴如井不知淺深穴口四圍津津如汗間有氣出騰空為白雲須􅁷風起怒號如雷里人見雲即知風氣散則風定細則風小盛則風猛窒其穴風雖少而民多瘴開則風如故而瘴亦衰風輪子華子云棲三陰之正氣於風輪其專精之名曰太𤣥寶積經云有風輪名清涼能使一雲普覆三千大千世界三種風輪難陀􅁐中自然有三種風輪曰開曰净曰吹開者有風來開􅁐諸門净者有風輪來掃除其地今皆清净順者有風輪來吹諸華樹令花布散起世經山􅏈法獄之山有獸其名曰山􅏈暉其行如風見則天下大風山海經折丹大荒之中有山曰鞠陵焉山有人名曰折丹處東極以出入風折丹神人也山海經蓬蓬風謂蛇曰予蓬蓬然起於北海而入於南海也夫折大木飛大屋者惟我能也莊子秋水嫋嫋九歌曰嫋嫋兮秋風洞庭波兮木葉下謝靈運詩嫋嫋秋風過湯惠休白紵歌秋風嫋嫋入曲房瑟瑟劉公幹贈從弟詩亭亭山上松瑟瑟谷中風獵獵鮑明逺還都詩鱗鱗夕雲起獵獵晩風遒鯨魚報風扶南之西海裏有山週迴千里有大石名為海彭濶可百里海神欲為風暴動但先聞此石震響如雷則鯨便起而風也扶南傳髙沙洞朝鮮慶尚道清道郡南二里有鰲山東有一谷名曰髙沙洞天將風雨先期而鳴噴出雲氣雲入洞内則雨雲出洞外則風大鳴則即日有驗小鳴則三二日乃驗志相風帝與娥皇汎於海上以桂枝為表結芳茅為旗刻玉為鳩置與表端言知四時之候今之相風此遺像也王子年拾遺記相風鳥長安南有靈䑓髙十仞上有銅渾天儀又有相風銅烏或云遇千里風乃動郭縁生述征記雷天皷河圖帝通紀曰雷天之皷也抱朴子同陰陽合春秋元命苞曰陰陽合為雷曾子曰陰陽之氣俱則為雷楊泉物理論曰積風成雷陰陽相薄陰陽相薄感而為雷激而為霆穀梁傳説文霆雷餘聲也鈴鈴所以挺出萬物震劈歴萬物者徐鉉云别作霹靂非五經通義震與霆皆霹靂也東京賦霹靂激而増響前天文志辟歴夜明晉書楚王瑋傳大風雷雨礔礰天地長子雷於天地為長子以其首長萬物與其出入也陽用事百八十三日而終陰用事亦百八十三日而終雷二月出地百八十三日雷出則萬物出八月入地百八十三日雷入則萬物入此其常經也故雷安萬物安雷害萬物害猶國也君安國亦安君害國亦害洪範論人君之象於易雷以二月出其卦曰豫言萬物隨雷出地皆逸豫也以八月入其卦曰歸妺言雷復歸入地則孕毓根核保藏蟄蟲避盛陰之害出地則養長華實發楊隠伏宣盛陽之徳入能除害出能興利人君之象也五行傳雷以十一月起黄鍾二月大聲八月閉藏京房占辟陰除害孔子云雷之始發大壯始君弱臣強從解起靁者所以開發萌芽辟隂除害萬物須靁而解資雨而潤故經曰靁以動之雨以潤之王者崇寛大順春令則靁應節不則發動於冬當震反潛故易傳曰當靁不靁太陽弱也後漢郎顗傳號令郎顗曰雷者號令其徳生養出滯虢文公諫周宣王曰陰陽分布震雷出滯國語拒難折衝五星占云雷電殺人何雷天拒難折衝之臣也君承用節度即雷以節暴人威福則雷電殺人京房易傳大陽激氣雷者太陽之激氣也正月陽動故正月始雷五月陽盛故五月雷迅秋冬陽衰故秋冬雷潛盛夏之時太陽用事陰氣乗之陰陽分争則相校軫校軫則激射激射為毒中人輙死中木木折中屋屋壊人在木下屋間偶中而死矣論衡震驚百里論語䜟曰雷震百里聲相附宋均注曰雷動百里故因以制國也雷聲為諸侯之政教所至相附近也酈炎對事曰或曰雷震驚百里何以知之炎曰以其數知之夫陽動為九其數三十六陰靜為八其數三十二一陽動二陰從故曰百里論衡云千里不同風百里不共雷蔵氷棄氷凡藏氷以時則雷出不震棄氷不用則雷不發而震左傳陽聲雷者陽聲出非其時臣竊君柄之象唐五行志天怒論衡曰世名雷電為天怒隆隆之聲天怒之音呉武陵遺孟簡書曰古稱一世三十年子厚之斥十二年殆半世矣霆碎電射天怒也不能終朝聖人在上安有畢世而怒人臣耶雄雷雌雷春雷初起其音洛洛霹靂者所謂雄雷旱氣也其鳴依依音不大霹靂者謂之雌雷水氣也師曠軒轅星軒轅星主雷雨之神春秋合城圖雷君雷君出裝隠隠西行霖雨不止流為江河易林變占雷公圖畫之工圖雷之狀畾畾如連皷形又圖一人若力士謂之雷公使之左手引連皷右手椎之論衡雷公江赫冲道經黄帝雷精黄帝以雷精起河圖塗山雷震禹㑹塗山之夕大風雷震有甲步卒千餘人其不被甲者以紅綃帕抹其額自此遂為軍儀之服一儀實録射天震死帝武乙無道為偶人謂之天神與之博令人為行天神不勝乃僇辱之為革囊盛血仰而射之命曰射天武乙獵於河渭之間暴雷武乙震死史記震乗武王伐紂雨甚雷疾武王之乗雷震而死周公曰天不祐周矣太公曰君秉徳而受之不可如何也六韜雷電以風尚書大傳云周公薨成王欲𦵏之於成周天乃雷電以風禾即盡偃大木斯㧞周人大恐王𦵏周公於畢示不敢臣也張奐䟽云昔周公𦵏不如禮天乃動威雷師穆天子傳云吉日辛酉天子升崑崙之丘以觀黄帝之宫而封豊隆之𦵏以詔後世郭璞云豊隆筮師御雲得大壯卦遂為雷師淮南子曰季春三月豊隆乃出以將其雨張衡思𤣥賦云豊隆軒其震霆雲師􅞝以交集抱朴子云故聾瞽在乎形噐則不信豊隆之與𤣥象矣玉樞經雷師皓翁悉力雷司委心火部雷神隨擊東海上有勇士曰菑丘訢以勇遊於天下過神淵飲馬馬沉訢去朝服㧞劍而入三日三夜殺二蛟龍而出雷神隨而擊之十日十夜眇其左目韓詩外傳擊齊䑓淮南子曰庶女呌天雷電下擊景公䑓隕支體傷折海水大出許慎註云庶賤之女齊之寡婦無子不嫁事姑謹敬無男有女女利母財令母嫁婦婦終不肯女殺母以誣寡婦婦不能自明寃結呌天天為作雷電下擊景公之䑓隕壊也毁景公之支體海水為之大溢出也震廟九月己卯晦震夷伯之廟罪之也於是展氏有隠慝焉左傳十五感雷而生子路感雷精而生尚剛好勇親涉衛難結纓而死孔子聞而覆醢毎聞雷鳴乃中心惻怛故後人忌焉以為常也論語説雷火化雀秦穆公出狩天震大雷下有火化為白雀䘖丹書集公車曰秦伯霸尚書中候無雲而雷史記秦二世元年天無雲而雷劉向以為雷當託於雲猶君託臣陰陽之合也二世不恤天下萬民有怨畔之心是嵗陳勝起天下畔趙髙作亂秦遂以亡一曰易震為雷為貌不恭也前漢書母畏雷蔡順母平生畏雷自亡後毎有雷震順奔塜泣曰順在此汝南先賢傳晉書王裒孝子傳竺彌伏父墳泣同避雷室湖陽縣春秋蓼國樊重之邑也重母畏雷為石室避之悉以文石為堦砌今猶存盛𢎞之荆州記辨誣河南李叔卿為功曹應舉孝亷同時應者害之使婢宣言叔卿淫其寡妹其妹傷被淫之名遂到府門自殺叔卿亦自殺明已無􅄽也後三年霹靂害叔卿者以屍置叔卿塜前其家收而𦵏之秋又震發其塚列女后傳失匕箸曹公從容謂先主曰天下英雄唯使君與操本初之徒不足數也先主方食失匕箸㑹雷大震先主曰聖人言迅雷風烈必變良有以也一震乃可致此華陽國志虎衘曹爽夣二虎衘雷公若二升椀放着庭中以問占者馬訓曰憂兵訓退告妻曰爽將以兵亡不出旬日世語遇震不驚世説云夏候太初嘗倚柱作書時大雨霹靂破所倚柱衣服焦然神色無變書亦如故賔客左右皆跌蕩不得住曹嘉之晉紀作諸葛誕語林云夏侯太初從魏帝拜陵陪列於松柏下時暴雨霹靂正中所立之樹冠冕焦壊左右覩之皆伏太初顔色不改减榮緒亦作諸葛誕載記劉曜年八嵗從元海獵於西山遇雨止樹下雷震樹旁人莫不顛仆曜神色自若元海異之曰此吾家千里駒也􅃦栢移災王丞相令郭璞試作一卦卦成郭意色甚惡云公有震厄王問有可消伏理不郭曰命駕西出數里得一栢樹截斷如公長置床上常􅃦處災可消矣王從其語數日中果震栢粉碎子弟皆稱慶大將軍云君乃復委罪於樹木世説雷車義興人姓周永和中出都日暮道邊有一新草小屋有一女出門望見周曰日已暮前村尚逺臨賀詎得至周便求寄宿向一更中聞外有小兒喚阿香官喚汝推雷車女乃辭去明朝視宿處乃見一新塜後五年果作臨賀太守續搜神記桞公權嘗見親故說元和末止建州山寺中夜半覺門外喧閙因潜於牕櫺中觀之見數人運斤造雷車如圖畫者酉陽雜爼白日揚光雷車避藏易林雷神堕地晉扶風楊道和夏于田中值雷雨至桑下霹靂下擊之道和以鋤格折其肱遂落地不得去色如丹目如鏡毛角長三尺餘狀如六畜頭似彌猴捜神記震惡佛佛虜凶虐暴忍常自言國名佛佛則是佛中之佛尋被震死既塟又震出之題背四字表其凶逆異􅁐震齋棟齊永明十一年三月震於東齋棟崩左右宻欲治繕竟陵王子良曰此豈可治留之志吾過且旌天之愛我也明年子良薨南齊書擊大航顧恊為通事舍人大通二年霆擊大航然盡建康縣馳啓恊以為非吉祥未即呈聞后帝知之曰霆之所擊一本罰惡龍二彰朕之有過恊掩惡揚善非曰忠公由是見免南史霹靂鬭神武嘗閱馬於北牧道逢暴雨大雷電震地前有浮圖一所神武令薛孤延唱殺繞浮圗走火按稍直前未至三十步震燒浮圖孤延唱殺繞浮圖走火遂滅孤延還眉鬚及馬􅐢尾皆焦神武嘆其勇决曰薛孤延乃能與霹靂鬭北齊書雷卵牙門將陳義即雷之諸孫昔陳氏因雷雨晝冥庭中得大卵覆之數月卵破有嬰兒出焉自後日有雷扣擊戸庭入其室中就於兒所似若乳哺者嵗餘兒能食乃不復至遂以為己子義即卵中兒也投荒雜記丁謂撰記云舊記云雷欽州南七里有擎水雷今南渡是也始者里民陳氏家無子因射獵中獲一大卵圍及尺餘擕歸家不知其何名忽一日霹靂而開遽生一子鞠育撫養遂成其家鄉俗異之曰雷種陳天建二年也雷公夾樹唐代州西十餘里有大槐震雷所擊中裂數丈雷公夾於樹間吼如霆震時狄仁傑為都督賔從徃觀衆皆披靡無敢進者仁傑單騎逕進廹而問之乃云樹有乖龍所由令我逐之落勢不堪為樹所夾若相救者當厚報徳仁傑命鋸匠破樹方得出其後吉㓙必先報命分地界開元中漳泉二州分彊界不均互訟于䑓省制使不能斷者數年一日忽大雷雨霹靂一聲崖壁中裂所競之地拓為一逕因為官道壁中有方篆六行二十四字皆廣數尺人莫能識貞元初流人李􅀈辯之曰漳泉兩州分地太平永安龍溪山髙氣清千年不惑萬古作程所云永安龍溪者兩郡界首鄉名也漳泉故事録異記方士致雷𤣥宗嘗冬月召山人包超令致雷聲超對曰來日及午有雷遂令髙力士監之一夕醮式作法及明至已矣天無纎翳力士懼之超曰將軍視南山當有黒氣如盤矣力士望之如其言有頃風起黑氣彌漫疾雷數聲酉陽雜爼霹靂車李鄘在北都介休縣百姓送解牒夜止晉祠宇下夜半有人叩門云介休王暫借霹靂車某日至介休收麥良乆見數人共持一物如幢扛上環綴旗幡其幡凡二十八葉毎葉有光如電起以授之百姓遍報鄰村村人悉不信其日介山上有雲氣蔽天注雨如綆風吼雷震凡損麥千餘頃數村以民為妖訟之酉陽雜爼雷公形貞元四年宣州忽大雷雨一物墮地猪首手足各兩指執一赤虵嚙之俄頃雲暗而失時皆圖而傳之酉陽雜爼雷州春夏多雷無日無之秋日則伏地中其狀如彘人取而食之國史補嘗有雷民因大雷電空中有物豕首鱗身狀甚異民揮刀以斬其物踣地血流道中而震雷益厲其夕凌空而去自後揮刀民居屋頻為天火所災雷民圖雷以祀者皆豕首鱗身也投荒雜録震林甫元和元年六月惠州一娼女震死於市衢脇下有朱字云李林甫以毒虐弄正權帝命震死龍城録震逆臣宫元和中李師道據青齊不貢不覲憲宗命将討之王師不利而師道益驕乃建新宮擬天子正衙卜日而居是夕雲物遽晦風雨如撼遂為震擊傾圮俄復繼以天火了無遺者青齊人相顧語曰人臣逆君謫見於天安可迯其戾乎旬餘師道果誅死宣室志震寺刹蕭澣初至遂州造二旛刹施於寺齋慶畢作樂忽暴雷震刹俱成數十片至來嵗雷震日澣死酉陽雜爼瓮列梁上元稹在江夏襄州賈塹有庒新起堂上梁􅂊畢疾風甚雨時庒客輸油六七瓮忽震一聲油瓮悉列於梁上一滴不漏其年元卒酉陽雜爼劈山填石東陽郡濵於浙江有山周數百里江水曲而環焉遷滯舟楫人頗病之常侍敬昕太和中出守其山一夕雲物曛晦暴風雷電動蕩室廬江水騰溢莫不惶惑迨曉方霽人徃視之已劈而中分相逺數百步引江流直而貫焉其環曲處悉填以石遂無縈繞之患宣室志兄弟五人葉遷韶曾避雨救雷公於夾樹間翌日雷公以墨篆一卷與之曰依此可致雷雨袪疾苦立功救人我兄弟五人要聞雷聲但喚雷二雷五性剛躁無危急之事不可喚之自是行符致雨咸有殊効嘗醉於吉州為太守所辱乃大呼雷五時郡中亢旱忽震霹暴作太守下階禮接請為致雨信宿霑足因為逺近所傳神仙感應傳雷神移床呉柴再用為光州一日大震雷家人皆伏匿再用當户危坐不動俄見有襦袴四人舁再用坐敗床出庭中復大震屋折有龍出九國志雷公籙巴蜀間於髙山頂或潔地建天公壇祈水旱葢開元中上帝所降儀法以示人也其壇或牛羊所犯及預齋者飲酒食肉多為震死新繁人王蕘因徃别業村民烹豚待之有一人自天公齋廽乃即席食肉王謂曰爾不懼雷霆耶曰我與雷為兄弟何懼之有王異之乃詰其所謂曰我受雷公籙與雷同職因取其籙驗之果如其説仍有數卷或􅀞壯夫以拳杖地為井號拳杖井或􅀞一士負薪枿號一谷柴或以七手撮出簸之號七山簸江陵東村李道士舍亦有此籙云玉洞法籙此夣𤨏言誤擊江西村中有人震死既而空中呼曰誤矣可作蚯蚓爛擣覆臍中當差如言擣之遂蘓稽神録擊妬閩王延翰忠懿王審知子也妻慱陵崔氏性悍妬殘忍嘗以練縳姬侍而鞭之練染血赤乃止又置木掌摑人一旦盛暑天無纎雲而霆震擊斃於中庭或者曰忠懿暴終􅀶陵之鴆故也五國故事擊章惇章惇徽宗時貶雷州司戸卒後欽宗北狩至檀州雷擊民間一男子背上朱書賊臣章惇南燼録雷公墨雷州之西有雷公廟彼中百姓毎年配納雷皷雷車人有以黄魚彘肉同食者立遭雷震人皆敬而憚之毎大雷雨後人多於野中拾得黳石謂之雷公墨扣之鎗然光瑩如漆又於霹靂處或土木中得楔如斧者謂之霹靂楔與小兒珮帶皆辟驚邪與孕婦磨服為催生藥皆有應騐嶺表録異凡訟者投牒必以雷墨雜常墨書之為利投荒雜録霹靂碪玉門之西有一國國中有山山上有祠廟國人嵗嵗出石碪數千輸廟中名曰霹靂碪給霹靂用從春雷出碪日減至秋而盡𤣥中記服􅖦羭次之山有鳥名橐􅖦服其毛羽令人不畏雷山海經食魚正過之水其内有飛魚食之不畏雷郭璞讃曰飛魚如豚赤文無羽食之辟兵不畏雷音山海經雷穴興州一處名雷穴毎雷聲水塞穴流魚隨流而百姓毎候雷聲繞樹網獲魚無限酉陽雜爼雷塘桞州有雷山雨崖皆東西雷水出焉蓄崖中曰雷塘能出氣氣作雷雨變見有光禱用爼魚豆彘脩形糈稌陰酒䖍則應桞文雷聲雷聲兠率天作歌頌音閻浮提作海潮音酉陽雜爼雕雷雷部鬼神晝勞夕役動有捶楚大則考戮屑雲雕雷無有已時檄龍命鴉以息彼作玉樞經雷同後漢桓譚䟽云畧雷同之俗語詳通人之雅謀注雷之發聲衆物同應俗人無是非之心出言同者謂之雷同馮衍顯志賦紛綸流於權利兮親雷同而妬異雷神雷澤有雷神龍首人身鼓其腹則雷山海經五雷玉霄一府所統三十六天内院中司東西華䑓𤣥館妙閣四府六院及諸有司各分曹局所以揔司五雷天臨三界者也玉樞經雷耕雷人陰㝠雲霧之夕呼為雷耕曉視田中必有開墾之迹有是乃為嘉祥投荒雜録雷蔵村民鑿山為穴多品供雷冀雷享之名雷藏番禺雜記雷郎民家女或為神所依即呼為雷郎得子曰雷子同上玉虎令訾野中有玉虎晨鳴雷聲聖人感期而興括地篆不葢醬雷不葢醬俗説今人腹中雷鳴風俗通今月上下如弦之時觸醬輙壊里俗忌之埤雅戒容止雷將發聲有不戒其容止者生於不備必有㓙灾月令雷電之子必病癲狂𤣥女房中經電雷解説文云電陰陽激燿也字指曰儵爚電光也釋名云殄也乍見則殄㓕也雷光電謂之雷光五經通義陽光禮記月令二月始電䟽云電陽光陽微則光不見此月陽氣漸盛以擊於陰其光乃見陰陽分争曽子曰陰陽之氣交則為電莊子曰陰氣伏於黄泉隂氣上通於天陰陽分爭故為電列缺大人賦貫列缺之倒景服䖍曰天閃也前書思𤣥賦列缺􅁮其照夜張衡曰電也後書噬嗑列缺摶䃸磹灼傳曰列缺摶雷之動也䃸磹灼電之耀也元包月支獻猛獸兩目如天䃸磹之交光十洲記宣示光耀太平之世電不眴目宣示光輝而已西京雜記繞斗黄帝有熊氏母曰附寶有蟜氏之女也見大電光繞北斗樞星照郊野感附寶而孕帝王世紀天笑仙傳拾遺木公與一玉女投壺設不入者天為之􅦍嘘注噓開口而笑神異經東王公與玉女投壺梟而脱誤不接者天為之笑開口流光今電是也弄雷電西王母曰東方朔為太山仙官太上使至方丈勅三天司命朔但務山水遊戯擅㺯雷電激波揚風致令蛟螈陸行山崩海竭太上謫斥使在人間漢武故事目爛如電王戎㓜而聦悟神彩秀徹視日不眩裴楷目之曰戎眼爛如巖下電晉書繞室上元中台州一道士王逺知善易善知人死生禍福作揔十五巻一日因曝書雷雨忽至赤電遶室在瞑霧中一老人叱曰所泄者書何在上帝令吾攝六丁雷電追取遂失易㧾龍城録繞案睦昭符金陵人保大中常州刺史一日坐聴事雷雨暴至電光如金蛇繞案吏卒皆震伏昭符不懾撫案叱之雷電遽散及舉案惟得鐡索重百斤昭符亦不變色徐命舉索納庫中南唐書四方電東方有電名曰無厚南方有電名曰順流西方有電名墮光明北方有電名百生樹無厚與墮光明相觸相對順流與百生相觸相對故虛空雲聚之中出生大明名曰電光起世經炟炟豊雷磤磤其聲震也電炟炟其光睒也元包雲陰陽聚陰陽聚為雲春秋元命包山川氣說文曰雲山川氣也又曰大澤之潤氣也洪範五行傳云雲起於山而彌於天舍陽雲之為言運也觸石而起謂之雲舍陽而起以精運也春秋説題辭天地之本雲者天地之本也河圖帝通紀雨具荀顗上書順帝云夫賢者化之本雲者雨之具也得賢而不用猶久陰而不雨也後漢書地氣黄帝素問云清揚為天濁陰為地地氣上為雲天氣下為雨雨出地氣雲出天氣注曰陰凝上結則合以成雲陽散下流則注而為雨雨從雲以施化故言雲出地氣憑氣以交合故言雲出天友風子雨雲賦云託地而游宇友風而子雨荀子雲翳初出為雲繁雲為翳論衡雲泉相應黄泉之埃上為黄雲青泉之埃上為青雲赤泉之埃上為赤雲白泉之埃上為白雲𤣥泉之埃上為𤣥雲河圖始開比類示人吕氏春秋曰山雲草莾水雲魚鱗旱雲烟火雨雲水氣淮南子作涔雲波水無不比類其所生以示人各國雲象韓雲如布趙雲如牛楚雲如日宋雲如車魯雲如馬衛雲如犬周雲如輪秦雲如行人魏雲如鼠齊雲如絳衣越雲如龍頭蜀雲如倉囷兵書扶日呈瑞蒼帝起青雲扶日赤帝起赤雲扶日黄帝起黄雲扶日白帝起白雲扶日洛書五雲周禮保章氏以五雲之物辨吉㓙水旱豐荒之祲鄭司農注二至二分觀雲氣青為䖝白為䘮赤為兵荒黑為水黄為豐慶雲史記曰若煙非煙若雲非雲郁郁紛紛蕭索輪囷是謂卿雲卿雲見喜氣也漢書作慶西京雜記董仲舒曰太平之時雲則五色而為慶三色而成矞景雲景雲孫氏瑞應圖曰景雲者太平之應也一曰慶雲非氣非煙氤氲五色謂之慶雲春秋運斗樞曰天子孝則景雲出游禮斗威儀曰景明也言雲氣光明也蔡邕什誨曰屬炎氣於景雲梢雲孫氏瑞應圖云梢雲瑞雲人君徳至則出若樹木梢梢然也郭璞江賦梢雲冠其㟽紀官左傳郯子曰黄帝以雲紀故為雲師而雲名服䖍曰黄帝受命得景雲之瑞故以雲紀事杜預曰縉雲氏葢其一官也合符釡山史記黄帝合符釜山洞冥記東方朔云東海大明之墟有釜山山出瑞雲應王者之符命如尭時有赤雲之祥之類葢黄帝黄雲之瑞故曰合符應於釜山也春秋演孔圖云黄帝之將興黄雲升於堂金枝玉葉黄帝與蚩尤戰於涿鹿之野常有五色雲氣金枝玉葉止於帝上有花葩之象因作華葢古今注沉璧雲起堯沉璧於河白雲起逥風摇落尚書中候卿雲歌舜為賔客禹為主人百工相和而歌卿雲帝乃倡曰卿雲爛兮禮縵縵兮於是八風脩通卿雲叢聚注言和氣應也叢或為族或以雲出為岫逥薄而難以名狀也白雲入房春秋孔演圖曰文命之候𤣥龍御雲天命於湯白雲入房注白雲金精入湯房也青雲浮河成王觀於洛河沈璧禮畢王退俟至於日昩榮光併出幕河青雲浮洛尚書中候灰滅楚有蒼雲如霓圍軫七蟠中有荷斧之人向軫而蹲太史唐勒以葭灰遺於地乃更滅拂之其蒼雲為之半滅又遺灰乃盡去之故曰唐史之策上滅蒼雲春秋文曜鈎蘆灰投地蒼雲自滅感應類從朝雲赤帝女姚姬未行而卒塟於巫山之陽故曰巫山之女楚懐王遊於髙唐晝􅃦夣見與神遇自稱是巫山之女王因幸之去而辭曰妾在巫山之陽髙丘之岨旦為朝雲暮為行雨朝朝暮暮陽䑓之下旦朝視之如言故為立廟號曰朝雲襄陽耆舊傳宋玉集芒碭雲氣髙祖隠於芒碭山澤間吕后與人俱求常得之髙祖怪問之吕后曰季所居上常有雲氣故從徃常得季漢書彤雲晝聚素靈夜哭陸機髙祖功臣頌覆鼎武帝時汾陰得寶鼎迎至中山晏温有黄雲焉漢白雲為葢武帝封泰山禪肅然山其夜若有光晝有白雲出封中漢志上禪肅然白雲為葢漢武故事紫雲輦西王母乗紫雲輦雲氣勃鬱盡為香氣漢武内傳青雲于吕天漢三年月氏國獻神香使者曰國有常占東風入律十旬不休青雲干吕連月不散意中國有好道之君十洲記吉雲東方朔至東極過吉雲之澤雲起五色草木皆成五色露帝得之徧賜羣臣洞冥記凌雲相如作大人賦帝覽之飄飄有凌雲之氣漢書雲成宫闕光武封泰山雲氣成宫闕百官並見之封禪儀去後雲起薊子訓至各公卿以下候之者􅁪數百人後因遁去初去之日唯見白雲騰起如是數十處後漢書開雲見日獻帝使趙岐解關東罷兵公孫瓉與袁紹書云趙大僕衘命來征宣揚朝恩若開雲見日後漢紹傳披雲覩天樂廣為尚書令衞瓘見而竒之命諸子造焉曰毎見此人瑩然若披雲霧而覩青天晉書雲鬭咸和元年鬭雲聲如暴風雨晉書落身世祖在江洲起義建牙軍有紫雲二叚落於身上宋書髙祖北征至洛陽常有紫雲見於軍上宋書思親狄仁傑為并州法曹其親在河陽别業赴任於并登太行白雲孤飛曰吾親舍所居近此雲下悲泣佇立久之候雲移乃行唐新語謬圖五色中宗后韋氏禁中謬傳有五色雲氣后衣笥帝圖以示諸朝因大赦天下唐書賊瑞建中三年冬十月庚申朱滔王武俊田恱李納為壇魏西祀天各僭為王滔等三讓乃就位是日三叛軍上有雲氣頗異燧望笑曰是雲無知乃為賊瑞耶唐書表符唐正元壬午有五色雲見長安太史張􅀈曰在宋分後一百六十年有聖人興其地至天成丁亥宋祖生洛陽五色葢㕔拾遺崔希喬轉馮翊令有雲如葢當其㕔事前須臾五色錯雜徧於州郭唐書天瑞鄭垍子仁規仁表皆豪爽有文表嘗以門閥文章自髙曰天瑞有五色雲人瑞有鄭仁表唐書雲氣甚嘉五代吕師周謂其禆將綦毋章曰吾與楚人為敵境吾嘗望其營上雲氣甚嘉未易敗也楚馬殷傳鳯竹祥符元年封泰山十月壬辰天文院言紫雲如葢黄雲如龍鳯青雲如竹木名梢雲宋史五色天聖五年仁宗初臨軒試進士琦名在第二時唱名第一甲方終太史奏日下五色雲見左右從官皆賀於殿上韓琦家傳貢雲宣和中艮嶽初成令近山多造油絹囊以水濕之曉張於危巒絶巘之間既而雲盡入遂括囊以獻名曰貢雲毎車駕所臨則盡縱之須臾滃然充塞如在千巖萬壑間齊東野語又載東坡山歸牧白雲入籠放之作攓雲篇雲將莊子曰雲將東遊過扶摇之枝而適遭鴻䝉曰天氣不和地氣鬱結六氣不調四時不節今我願合六氣之精以育羣生李注云雲将雲主師也五嶽雲公羊傳曰觸石而出膚寸而合不崇朝而徧乎天下者惟泰山雲耳尚書大傳五嶽皆觸石出雲四海雲淮南子云先王之政四海之雲至而脩封彊注云立春之後四海出雲八極雲八極之雲是雨天下八門之風是節寒暑八紘八寅大澤之雲以雨九州而和中土淮南子周雲淮南子云周雲之籠蓯遼巢澎濞而為雨注周宻也籠蓯聚合也遼巢澎濞藴藉貌也圛圛書曰圉圛升雲半有半無圛回行也説文云云吕氏春秋曰雲氣西行云云然冬夏不輟雲輿仲長統詩春雲為輿秋風為駟傳𤣥詩雲為車兮風為馬金翹雲卷金翹日輝合壁紅塵暗陌丹霞映峙金樓子雲互王僧達祭顔延年文云情條雲互謝靈運辨論云情理雲互物已相傾李陵詩云仰視驚雲逝紛紛互相踰礟車雲暴風之候有砲車雲國史補舟人占雲若砲車起急避之乃大風候也東坡詩終日江頭天色惡砲車雲起風欲作南雲陸機思親賦指南雲以寄欽望歸風而效誠陸雲贈鄭曼季詩聲播東汜響溢南雲宋文帝北伐詩云不覩南雲陰但見胡風起江緫揚州九日詩心逐南雲逝形隨北鴈來謝靈運上書云注心南雲為日已久東雲義熈七年朱齡石代蜀袁豹為檄文云梁益人士驅廹一時待命冦讎之戮㩻䧢豺狼之吻豈不遡誠南凱延首東雲宋袁湛傳雕雲顔延年詩雕雲麗􅀈葢祥飈被綵斿南齊祥瑞志流火赤雀實紀周祚雕雲素靈發祥漢氏沈烱陳武帝哀策雕雲布族祥星結樞愁雲班婕妤擣素賦停風軒而結睇對愁雲之浮沉𫝊𤣥詩浮雲含愁色悲風坐自嘆謝惠連雪賦寒風積愁雲繁渫雲蜀都賦窮岫渫雲日月􅁪翳謝𤣥暉詩渫雲已漫漫多雨亦凄凄纎雲曹植魏徳論纎雲不形陽光赫戯𫝊弈詩纎雲時髣髴渥露霑我裳鮮雲陸士衡悲哉行和風飛清響鮮雲垂薄陰崇雲猛虎行崇雲臨岸駭鳴條隨風吟曾雲園葵詩曽雲無温液嚴霜有凝感歸雲擬古詩驚飈褰反信歸雲難寄音流雲顔延年詩流雲藹青闕皓月鑒丹空石梁雲應襄陽石梁山出雲應驗符合鄉人候之若曰雲起定雨黄雲起則風黑雲起則多病物類相感志崑崙五色崑崙山有九層毎層相去萬里有雲氣五色從下望之皆有城闕之象崑崙者西方曰須彌山有九層其第七層有景雲出以映朝日拾遺記香雲貟嶠山一名環丘有雲石駁駱如錦川扣之則片片蓊蓊然雲出俄而遍潤天下西有星池有爛石常浮於水邉其色紅質虚似肺燒之有煙香聞數百里煙氣升天則成香雲遍潤則成香雨同上屯雲曹子建漢髙賛云屯雲斬蛇傳𤣥詩屯雲結不解謝靈運詩屯雲被曽嶺霧陰陽亂氣陰陽之氣亂則霧曽子積水上溢騰水上溢故為霧莊子百邪之氣霧者百邪之氣為陰冐陽本於地而行於天五行志霧不塞望太平之世霧不塞望浸淫被泊而已西京雜記三日霧黄帝時天大霧三日帝遊洛水之上見大魚殺五牲以醮之天乃甚雨七日七日魚沉始得圖書焉今之河圖即其書也世傳大霧三日必有甚雨自此始也帝王世紀蚩尤作霧黄帝與蚩尤戰於涿鹿之野蚩尤作大霧彌三日軍人皆惑黄帝乃令風后法斗機作指南車以别四方遂擒蚩尤焉志林地吐黄霧桀無道地吐黄霧尚書中候伊尹卒霧三日伊尹卒年百有餘嵗天霧三日沃丁塟以天子之禮帝王世紀伊尹受戮大霧三日抱朴子開而覩天文王遇姜公於渭陽執竿而釣文王得之灼若披雲而見白日霍若開霧而覩青天徐幹中論噴水為霧燕昭王七年沐胥國來朝有道術人名尸羅噴水為雰霧暗數里間俄復吹為疾風雰霧皆止拾遺記大霧免難髙祖至平城為匈奴所圍七日天大霧漢使人還徃胡不覺後得免平城之難漢書乗霧東方朔乗雲飛去仰望天霧覆之不知所在漢武内傳立起雲霧淮南王聞有道術之士必卑辭厚幣以致之於是八公乃徃一人能坐致風雨立起雲霧神仙傳東海人黄公立興雲霧坐成山河西京雜記隂侵陽成帝建始中黄霧四塞上問楊興等對曰陰盛侵陽之氣也漢書王氏五侯同日俱封其日黄霧四塞還蜀欒巴為尚書郎忽一旦天大霧對坐不相見失巴所在尋問之云其日還成都與親故别時亦風雨晦㝠葛洪神仙傳蜀郡鄧公呼吸成霧蘓子能作霧張楷字公超有道術居華山谷中能為五里霧人學其術者填門如市故云霧市神仙傳時關西人裴優亦能作三里霧自以不如楷徃從學之楷避不見謝承書迷路曹公赤壁敗行雲夣大澤中遇大霧迷失道路國志不迷劉雄鳴每行雲霧中識道不迷時人謂能為霧魏畧半天劉先主遣軍取李曠先生起霧半天備騎自相殺先生乃入呉李先生傳冐霧王肅張衡馬均者昔俱冐霧行一人無恙一人病一人死無恙者飲酒病者食死者空腹􅀶物志孝感旴􅇇民王彭先丁母艱居䘮至孝元嘉之始父又䘮亡彭兄弟二人土工未就鄉人助彭作塼塼事須水濟值天旱穿井盡力不得水彭號窮無計一旦天霧霧消之後於塼􅍳前自然水生元嘉起居注晝昏天寶間霧昏暗十步外不見人是謂晝昏五行志數里韓似在桂州有妖賊封盈能為數里霧聲言某日將攻桂州有紫氣者我必勝至期果紫氣如疋帛自山亘於州城白氣直衝紫氣遂散天忽大霧至午稍霽雜爼枉殺致霧馬希聲矯殷令殺髙郁是日大霧四塞殷怪之曰吾嘗從孫儒毎殺不辜天必大霧豈馬步獄有寃死乎明日吏以狀白殷撫膺大哭五代楚世家服霧霧者金石之盈氣女真張微子服霧得仙迷空步障髙麗見􅀶學記呼霧迷為空步障清異録素霧曲江縣有銀山山常多素霧湘州記金霧蓬萊山東有鬱夷國時有金霧天中記卷二
