body:
  text: 天中記卷三十六明陳耀文撰浮圖名義五禪階級真性即不垢不净凡聖無差禪門則有淺有深階級殊等謂帶異計欣上厭下而修者是外道禪正信因果亦以欣厭而修者是凡夫禪悟我空偏真之理而修者是小乗禪悟我法二空所顯真理而修者是大乗禪若頓悟自心本來清凈元無煩惱無漏智性本自具足此心即佛畢竟無異依此而修者是最上乗禪亦名如來清凈禪亦名一行三昧亦名真如三昧上三藏夫三藏之義者則内為戒定慧外為經律論以陀羅尼總攝之也陀羅尼者是菩提速疾之輪解脫吉祥之海三世諸佛生於此門慧照所傳一燈而已宋僧無畏傳三乘法華經曰三乗者一曰聲聞乗二曰縁覺乗三曰菩薩乗聲聞者悟四諦而得道也縁覺者悟因縁而得道也菩薩者行六度而得道也然則羅漢得道全由佛教故以聲聞為名也辟支佛得道或聞因縁而解或聴環珮而得悟神能獨達故以縁覺為名也菩薩者大道之人也方便則止行六度真敎則通修萬善功不為已志存廣濟故以大道為名也世説注沙門治心修净其根業各差謂之三乗聲聞縁覺及以大乗取其可乗運以至道為名也魏釋老志釋道安上二敎論云九流之敎敎止其身名為外敎三乗之敎敎静其心名為内敎是以智度有内外兩經仁王辯内外二論方等明内外兩律百論言内外二道若通論内外則􅔜彼華夷若局命此方則可云儒釋釋敎為内儒敎為外廣𢎞明大乗者盖如來之道塲也故縁覺聲聞謂之小乗言法駕之通馳如舟車之致逺也李顒大乗賦序小乗列四果之梯大乗有十等之位從几入聖具有經論甄鸞笑道論三身一切諸佛皆有三身一者法身謂圎心所證二者報身謂萬善所感三者化身謂隨縁所現今釋迦牟尼佛者法身乆證報身乆成今之出現盖化身耳禪林妙記三歸佛道其始修心則依佛法僧謂之三歸若君子之三畏也又有五戒去殺盜婬妄言飲酒大意與仁義禮智信同云奉持之則生天勝處虧犯則墜鬼畜諸苦又善惡生處凡有六道焉釋老志三昧此云調直定又云正定亦云正受圭峯疏云不受諸受名為正受逺法師云夫稱三昧者何專思寂想之謂也思專則志一不分想寂則氣虚神朗氣虚則智恬其照神朗則無幽不徹斯二乃是自然之𤣥符用一而致用也翻譯道家云貞一儒者云致一釋氏云三昧其義通也言一即有二遂至於三言三即昧在其間反覆存之而已佛書雜記四諦苦集滅道是也苦謂一切生老病死之類集謂一切聚集骨肉財帛之類滅謂壊滅道謂修行類此名四諦謂其理審諦非徒説也經云見苦㫁集因滅修道龍舒心經注四果四果預流即須陀洹為初果一來即斯陀含為二果不來即阿那含為三果無生即阿羅漢為四果自此以上獨覺菩提為辟支佛自覺覺他為一切菩薩摩訶薩行因果圎滿為諸佛無上正等菩提六通經云六通者三乗之功徳也一曰天眼通見逺方之色二曰天耳通聞障外之聲三曰身通飛行隠顯四曰宅心通水鏡萬慮五曰宿命通神知巳往六曰漏盡通慧解累世三明者解脫在心朗照三世者也世説注佛身即法身也從六通生從三明生維摩經天眼宿命漏盡為三明僧肇五衍憑五衍之軾拯溺逝川選頭陀碑僧肇論曰聘六通之神驥乘五衍之安車五衍五乘天竺言衍此言乘五乘一人二天三聲聞四辟支佛五菩薩注五盖一曰貪婬二曰瞋恚三曰愚癡四曰邪見五曰調戲别而言之求欲為貪耽著為婬外發為瞋内結為恚繫於縛著觸理倒惑為愚癡生死因縁癡為本一切諸著皆始於癡地獄苦酷多由於恚奉法要六度一曰施二曰戒三曰忍辱四曰精進五曰一心六曰智慧積而能散潤濟衆生施也謹守十善閑邪以誠戒也犯而不校常善下人忍辱也勤行所習夙夜匪懈精進也專心守意以約歛衆一心也凡此五事行以有心謂之俗度領以兼忘謂之道慧上三幡消一無於三幡選天台賦三幡色一也色空二也觀三也言三幡雖殊消令為一同歸於無也郤敬輿與謝慶緒書論三幡義曰近論三幡諸人猶多欲既觀色空别更觀識同在一有而重假二觀於理為長然敬輿之意以色空及觀為三幡識空及觀亦為三幡注二諦二諦者一是真諦一名俗諦真諦亦名第一義俗諦亦名世諦勸臣以忠勸子以孝勸國以治勸家以和𢎞善示天堂之樂懲非顯地獄之苦此依俗諦也真諦彰本寂之理一性泯然所以實際理地不受一塵是非雙泯能所俱亡指萬象為真如㑹三乗歸實際此依真諦也翻譯三智一曰真智本來寂静通達無涯二曰内智自覺無明割㫁煩惱三曰外智分别根門識了塵境三報大涅槃經明三種報一順現報明王孝慈訓世則祥雲布夀星現仁君恩徳及物則醴泉涌嘉苗秀善既有徵惡亦可驗樵客指熊而臂落酒客啖䏑以皮穿二順生報今世雖行善惡之因次生方受苦樂之果缾沙轉報於四天有相改生於六欲三順後報因造今身報終後世伽吒七反而享餘慶那律乆刼以受逺福此三種報皆名定業翻譯三徳法身般若解脱是為三常樂我净是為徳無二生死為常不受二邊為樂具八目在為我三業清净為净金光明𤣥義三縁第一為了自已輪回生死二為紹隆三寶三為六道四生皆令解脱古禪師語錄五濁刼濁見濁煩惱濁衆生濁命濁彌陀經六塵色聲香味觸法中論四觀觀生如石女之懐兒觀住如陽焰之翻浪觀異同浮雲之萬變觀死猶狂花之謝空三有欲有色有無色有有者何謂一切有漏法是佛言若業能令後生相續是有又云生滅故名有墮苦集諦中是有婆沙論四大我今此身四大和合所謂毛髮爪齒皮肉筋骨腦髓垢色皆歸於地唾涕膿血涎沫津液痰淚精氣大小便利皆歸於水煖氣動火動静歸風四大各離今者妄身當在何處圎覺經七聖財人生世間禍福從口生當䕶於口甚於猛火猛火能燒一世惡口能燒無數世猛火燒世間財惡口燒七聖財口舌皆鑿身之斧也七聖財謂一信二精進三戒四慚愧五聞捨六忍辱七定慧七者能資用成佛故名財報恩經三科法王立法周王識心三界牢獄三科驗定一罪一福三道十使十惡此屬乎罪名為黒業報四惡趣五戒十善四禪四定此屬於福名曰白業報處人天三乗摩訶衍此屬乎道感報四聖此則凡聖界分因果事定以此三科收行盡矣翻譯五藴五隂謂色受想行識也色謂色身有形或黄或白是也受謂一切受苦受樂受用是也想謂一切思念是也行謂所行之事識謂曉解世間事五藴即五隂道院集五隂是色隂受隂想因行隂識隂十善十善者身不犯殺盜婬意不嫉恚癡口不妄言綺語兩舌惡口反十善者謂之十惡四過者上之所謂兩舌惡口妄言綺語也奉法要八正開八正之門大庇交喪頭陀碑維摩經曰雖行八正道而樂行無量佛道是菩薩行僧肇論曰啓八正之平路坦衆聖之夷塗大品經説八正曰正見正思惟正語正業正命正精進正念正定注六入六情一名六衰亦曰六欲謂目受色耳受聲鼻受香舌受味身受細滑心受識識者即上所謂識隂者也五隂六欲盖生死之源本罪苦之所由奉法要禪法律金仙氏之道盖本於孝敬而後積以衆徳歸於空無其敷演敎戒於中國者離為異門曰禪曰法曰律以誘掖迷濁江永州龍興寺記白居易問惟寬禪師法何以説法師曰無上菩提被於身為律説於口為法行於心為禪應用者三其致一也譬如江湖淮漢在處立名名雖不一水則無二戒定慧法要有三曰戒定慧唐宣宗問𢎞辨禪師曰云何名戒對曰防非止惡謂之戒帝曰云何為定對曰六根涉境心不隨縁名定帝曰云何為慧對曰心境俱空照覽無惑名慧五燈真如馬師云真如有變易豈不聞善知識者能回三毒為三聚净戒回六賊為六神通回煩惱作菩提回無明作大智若真如無變易是外道也上古釋云遣妄曰真顯理曰如觀法師云無法非真何妄可遣無法不如何理可顯三身六祖謂智通曰三身者清浄法身汝之性也圓滿報身汝之智也千百億化身汝之行也若悟三身即名四智大圓鏡智平等性智妙觀察智所作智傳燈慧日曜慧日於康衢則重昏夜曉頭陀碑劉蚪曰菩薩員净照均明兩故曰慧日注慈雲如來慈心如彼大雲䕃注世界鷄跖集唐太宗手勅𤣥裝云慈雲欲卷收之廕四空慧日將昏朗之照八極舒朗之者其惟法師乎止觀止能捨樂觀能離苦止能修心觀能修慧止如鑷鑷刺觀如剪剪髮心法雙亾止也心法雙照觀也戒寳大疾病中戒為良藥大恐怖中戒為守護大暗㝠中戒為明燈三惡道中戒為橋梁五怖懼中戒為大船智度論阿耨多羅三藐三菩提梵云阿此云無梵語耨多羅此云上梵語三此云正梵語藐此云等梵語菩提此云覺是阿耨多羅三藐三菩提者乃無上正等正覺謂無上真性也心經注波羅蜜多梵經云波羅蜜多此云到彼岸彼岸者西土俗以設諭諸佛地謂之彼岸衆生輪回作業之地如在海中謂之此岸則佛地所以謂之彼岸上經云到者有六焉一曰檀檀者施也二曰毗黎黎者持戒也三曰羼提羼提者忍辱也四曰尸羅尸羅者精進也五曰禪禪者定也六曰般若般若者智慧也然則五者為舟般若為導導則俱絶有相之流升無相之彼岸也故曰波羅蜜也世説注彼岸者引之於有則髙謝四流推之於無則俯𢎞六度頭陀碑阿毗曇逺法師阿毗曇叙曰阿毗曇者晉言大法也道標法師曰阿毗曇者秦言無比法也和南僧家謂合掌作禮曰和南禪苑清規口禮者如合掌問訊也觀音義疏云此方以拱手為恭外國以合掌為敬手本二邊今合為一表不散誕專至一心翻譯或云那漠婆南要律儀翻為恭敬善見論翻為度一法六宗二𣲖六宗之後為二𣲖一曰清原思思傳石頭遷其下為曹洞雲門法眼一曰南嶽讓讓傳馬祖其下為臨濟溈仰是為五家宗𣲖道一而已一棒一喝一唱一和機用縱横諸名義南無此云歸命信順也佛覺也菩提亦覺也道之極者稱曰菩提菩提薩埵覺衆生也阿羅漢總音殺惱賊逺離諸惡堪總供養更不受三界生也釋迦能仁也牟尼寂㸃也彌勒慈氏也維摩詰净名也婆羅門梵志也辟支獨覺也比丘乞士也上乞法下乞食也波羅蜜彼岸也多到也禪那静慮也般若聰慧也三昧正定也又等特也奢摩它止息也瑜伽相應也阿耨多羅無上也三藐正也般涅槃般普也涅出也槃煩惱也􅌥堵波塔也茶毘亦云闍維焚燒也僧伽藍衆園也娑婆堪忍也懴悔懴謂懴摩請忍也羯磨作法辨事也阿僧祗無數也方等經慈悲為佛眼正念為佛頭妙音為佛耳香林為佛鼻甘露為佛口四辯為佛舌六度為佛身四攝為佛首平等為佛指戒定為佛足種智為佛心四門入清凉地即方也所契之理平等大慧即等也四經維摩經以不思議為宗金剛經以無住為宗華嚴經以法界為宗涅盤經以佛性為宗三千大千千千重數故曰三十二過復千故曰大千迦維羅衞居其中也智度論震旦蔥河以東名為震旦以日初出耀於東隅故得名也樓炭經琳法師云東方屬震是日出之方故云震旦或曰真丹或曰旃丹翻譯印度西域記云天竺舊云身篤或曰賢豆今從正音宜云印度印度者唐言月以其土聖賢繼軌導凡御物如月照臨五印度之境周九萬餘里三垂大海北背雪山北廣南狹形如半月劃野區分七十餘國時特暑熱地多泉濕成光子曰中天竺國東至震旦五萬八千里南至金地國西至阿拘遮國北至小香山阿耨達亦各五萬八千里則知彼為中國矣上互見日四王印度常傳贍部一洲四王所治東謂脂那主人王也西謂波斯主寶王也南謂印度主象王也北謂獫狁主馬王也皆謂四國藉斯以治續𤣥裝𫝊布薩布薩即説戒也净住者即布薩之翻名布薩天言净住人語或曰増進亦稱長養通道殊俗俱禀修行所謂净身口意如戒而住故曰净住也道宣净行法門序練神練神者閉情闗照期神曠刼幽靈不亡積習成聖階十地而逾明邁九宅而髙蹈此什教所以𢎞也周什道安二敎論逺辭九宅寧羅氏族之拘上般若航清凉禪師云夫般若者苦海之慈航昬衢之巨燭也大願船净土傳云菩薩乗大願船住生死海就此世界呼引衆生上大願船如是送至西方如有往者無不得生理絶人區維摩經曰以四大海水入一毛孔中不撓魚鼈等而彼大海本相如故又舍利佛住不思議菩薩斷取三千大千國界如陶家輪著右掌中擲過恒河沙國界之外其中衆生不覺不知又復還本處都不使人有往來相後漢西域傳注事出天外涅槃經曰阿闍王令醉象蹋佛佛以慈善根力舒其五指遂為五師子見爾時醉象惶懼而退上刹那無常者前滅後生刹那不住者也梁武記注刹那是天竺國音迅速之極名也𢎞明九俱舍云時之極少名刹那時之極長名為刼俱舍頌云極微字刹那色名時極少翻譯雖年百嵗猶若刹那如東道之長波似西垂之殘照擊石之星火馳隙之迅駒風裏之微燈草頭之懸露臨崖之朽樹燦目之電光天竺重文鳩摩羅什云天竺國俗甚重文製其工商體韻以入弦為善凡覲國王必有讃徳見佛之儀以歌嘆為貴經中偈頌皆其式也但改梵為秦失其藻蔚雖得大義殊隔文體有似嚼飯與人非徒失味乃更嘔噦也戒飲長老莎伽陀降伏菴婆羅提陀惡龍及為酒困不能折伏蝦蟆故佛制戒小草頭一滴亦不得飲下酒是惡本酒是魔事梁武㫁酒肉文不殺釋善伏云不殺者佛敎之都門也不能行之若講禮而為倨傲耳又勸行六道供以先祖諸亡者無越此途續二十一八闗齋一不殺二不偷盜三不淫邪四不妄語五不飲酒六不坐髙大牀七不著花鬘瓔珞不用香油塗身董衣八不自歌舞不得輒往聴不過中食受此八戒名八闗齋五辛修行者不得食五辛言五辛者一葱二薤三韭四蒜五興渠梵網經釋慧闕僧徒多迷五辛中興渠或云蕓薹胡荽或云阿魏唯净土集中别行盡又云五辛此土唯有四一蒜二韭三葱四薤闕於興渠梵語稍訛正云形具餘國不見迴至于闐方得見也根麄如細蔓菁根而白其臭如蒜彼國人種取根食也于時冬天到彼不見枝葉薹荽非五辛所食無罪日親見為驗與唐髙僧傳極樂中國之西數萬里有國曰身毒釋迦牟尼如來示現之地彼佛言曰西方過十萬億佛土有世界曰極樂佛號無量夀如來其國無有三惡八難衆寶以為飾其人無有十纒九惱羣聖以為友有能誠心大願歸心是土者茍念力具足則往生彼國然後出三界之外御净土記鑿大昬夫佛之道可以轉惑見為真智即羣迷為正覺捨大闇為光明夫性豈異物耶孰能為余鑿大昬之墉闢靈照之户廣應物之軒者吾將與為徒龍興寺記懈慢國過此西方十二億那由他有懈慢國快樂安閑人欲往生阿彌陀佛國若從此國過人多染著即願生其中遂不得到阿彌陀佛國若人見此不貪不愛即得越過至安樂國此懈慢國亦曰疑城人遥見此城謂是極樂便生愛著菩薩處胎經心燈意蘂心燈夜炳意蘂晨飛晉安王書障火魔風障火焚心印魔風颺刼灰由旬西域記云夫數量之稱踰繕那者舊曰由旬踰繕那者自古聖王一日軍行舊傳一踰繕那四十里印度國俗乃三十里聖敎所載唯十六里大論云由旬三别大者八十里中者六十里下者四十里翻譯佛田供父母曰恩田供佛僧曰敬田供貧病曰悲田總名曰福田見法論鬼宿佛敎上屬鬼宿暗則佛敎衰尚書故實太子出家時見鬼星與月合諸天唱大聲言大聖太子鬼宿已合今時至矣欲求勝法莫住于此佛本行經沸星佛以二月八日沸星見時初成等正覺亦以二月八日沸星出時生以八月八日沸星出時轉法輪以八月八日沸星出時取般涅槃薩婆多論底栗車此云畜生婆沙云畜謂畜養謂彼横生禀性愚癡不能自立為他畜養故名畜生翻譯齋戒白争飯土言欲受八禁清净齋戒所謂不殺生不偷盜不婬妷不妄語不飲酒不兩舌不惡口不無義語又願不貪欲不瞋恚不愚癡不生邪見本行經曇摩曇摩法也曇摩迦羅此云法時曇摩密多此云法秀曇摩流支此曰法希亦曰法樂曇亦法也曇無竭此云法勇亦云法上曇無徳此云法密翻譯達摩此翻為法唐明濬云契之於心然後以之為法在心為法形言為敎法有自相共相敎乃遮詮表詮上達摩流支此云法希分衞善見論云此云乞食僧祗律云乞食分施僧尼衞護令修道業故云中食多論云從旦至中其明轉盛名之為時中後明沒名為非時今言中食以天中日午時得食僧祇云午時日影中一髮一瞬即是非時毗羅三昧經瓶沙王問佛何故日中佛食荅云早起諸天食日中三世佛食日西畜生食日暮鬼神食佛制㫁六趣因令同三世佛食袈裟僧祇律敬袈裟如敬佛塔謂袈裟為福田衣衣名銷痩取能銷痩煩惱鎧名忍辱取能降伏魔軍亦喻蓮華不染泥滓亦為諸佛之所幢相則袈裟之為義其至矣廣𢎞明司我議僧行薩婆多云卧具者三衣之名大净法門經云袈裟者晉名去穢大集經名離染服賢愚經名出世服真諦雜記云袈裟是外國三衣之名名含多義或名離塵服由㫁六塵故或名消痩服由割煩惱故或名蓮華服服者離著故或名間色服以三如法色所成故言三色者律有三種壊色青黒木蘭青謂銅青黒謂雜泥木蘭即樹皮也應法師云韻作􅀢㲚音加沙葛洪字苑始改從衣翻髙宗末疏勒國王遣使送釋迦牟尼佛袈裟衣一長二丈餘髙宗以審是佛衣應有靈異遂燒之以驗虚實置於猛火之中經日不然觀者莫不悚駭心形俱肅魏書蜀金堂縣三學山開照寺衣羣冦入寺刼掠緇徒聲盡寺元有釋迦藕絲袈裟為千載之異物也賊曹分取與其妻折而易之夫妻當時手指節節墮落鬚鬢俱墜尋事敗戮於市儆戒録三衣僧祗云三衣者賢聖沙門之幖幟翻譯一曰僧伽梨即大衣也二曰欝多羅僧即士條也三曰安陀㑹即五條也此是三衣若呼三條褊衫裙為三衣誤也員覺褊衫僧祗支西域記云正名僧迦鵄此云覆腋衣用覆左肩右開左合竺道祖云魏時請僧於内自恣宫人見僧偏袒不以為善遂作此衣施僧因綴於左邊祗支上因而受稱即褊衫右邊今隠祗支名通號兩袖曰褊衫錫杖隙棄羅此云錫杖由振時作錫錫聲故十誦名聲杖錫杖經又名智杖亦名徳杖彰智行功徳故聖人之幖幟賢士之明記道法之幢翻舒州潜山最竒絶而山麓尤勝誌公與白鶴道人皆居之因禀武帝帝以二人俱具靈通俾各以物識其地得者居之道人云某以鶴止處為記誌公云某以卓錫處為記已而鶴先飛去至麓將止忽聞空中錫飛聲誌公之錫遂卓於山麓而鶴驚止他所道人不懌然以前言不可食遂各以所識築室焉釋鑑釋子云遊行僧為飛錫安住僧為掛錫釋氏要覽犍椎聲論翻為磬亦翻鍾増一云阿難升講堂擊犍椎者此是如來信鼓也應法師準尼鈔云時至應臂吒犍搥梵語臂吒此云打犍搥此云所打之木翻又云凡有一箇銅鐵鳴者皆名犍椎又云但是金石板木砧鎚有聲可以集衆者皆名犍椎要覽梵㖵梵語云㖵者華言止斷外事外事止斷時任為法事㖵者讃詠之聲也善見云聴汝作㖵㖵言説之辭也清而不濁雄而不猛流而不越凝而不滯逺聴則汪洋峻雅近屬則從容和肅法苑云尋西方之有㖵猶東國之有讃讃者從文以結草㖵者短偈以流頌比其事義名異實同佛道論衡云陳思王幼含珪章十嵗能文毎讀經文流連嗟玩以為至道之宗極也遂製轉讀七聲昇降曲折之響世之諷誦咸憲章焉嘗游魚山忽聞空中梵天之響清颺哀婉其聲動心獨聴良乆而侍御莫聞植深感神理彌悟法應乃摹其聲節為梵㖵撰文翻思王嘗登魚山臨東阿忽聞巖岫裏有誦經聲清道深亮逺谷流響肅然有靈氣不覺歛襟祗敬便有終焉之志即效而則之今梵唱皆植依擬所造異苑金言有譯梵響無授始有魏陳思王曹植深愛聲律屬意經音既通般遮之瑞響又感漁山之神製於是刪治瑞應本起以為學者之宗傳聲則三千有餘在契則四十有二髙僧傳珠林齊僧辯能作梵契等音義云契之一字猶言一節一科也翻四姓釋迦者起自秦代釋道安云既存剃染紹繼釋迦子雖異父而姓無殊今者出家宜悉稱釋及翻四含果云四姓出家同一釋種衆咸歎其四姓一刹帝利此是王種二婆羅門是髙行人三名毗舍如此土民四名首陀最為卑下如此土皂𨽻安當晉秦之時刪注羣經自號彌天措摸季葉猶言譯胡為秦此一崑山之一礫未盡美焉法苑傳記泥犂耶梵稱泥犁秦言無有無有喜樂無氣味無歡無利故云無有或云無者更無赦處婆沙論名不自在謂彼罪人為獄卒阿傍之所拘制不得自在故名地獄又地者底也地最在下獄者局也謂拘局不得自在故名地獄梁言寄條城又言閉城也翻苑諸罪人未受罪之間共聚是處巧風所吹隨業輕重受大小身臭風所吹成就罪人麄醜之形香風所吹成就福人㣲細之體净度三昧經云有三十地獄有五官主典一者鮮官禁殺二者水官禁盜三者䥫官禁婬四者言官禁兩舌五者天官禁酒法記趙泰字文和宋太始中暴死而蘇云被捉將去遍歴地獄復見一城名為受變形城地獄考治已畢者當於此城更受變報泰入其城見大屋中有數百局吏對校文書云殺生者當作蜉蝣朝生暮死若為人常短命刼盜者當作猪羊受人屠割身屠肉償人婬逸者作鶴騖麞麋蛇身兩舌者作鵄梟鵂鶹人聞皆呪令死捍債者為驢騾牛馬魚鼈之屬㝠報記幽㝠録阿鼻此云無間觀佛三昧經云阿言無鼻言救翻摩訶薩梵語摩訶薩者此云大有情即能救度人也地符孔門亞聖觀音於諸先覺猶孔門之有亞聖其悲智應用鴻纎億刹常如視諸掌八關修多羅敎函于藏輪周迴八角正道斯陳周迴八角角覺也佛以眼為八邪耳為八患鼻為八苦舌為八難迥八邪為八覺迥八患為八解脫迥八苦為八安樂迥八難為八王子指四八為三十二相由此八闗返邪歸正成佛之境矣止則寂然無用引則轉而不窮動雖有聲静乃無跡文苑轉闗經藏記梵語修多羅此言經也什要覽盂蘭盆梵云盂蘭此云救倒懸盆則此方器也華梵雙舉自目連救母始也要覽鉢塞梵語鉢塞莫梁云數珠此是引接下根牽果修業之具也伽陀梵言伽陀此言諷誦祖廷事苑法門佛示滅後大弟子寅聖言而成經傳心印曰法承法而能傳曰宗由宗而分敎曰支坐而攝化者勝義皆空之宗也行而宣敎者推破邪山之支也釋子惠則生於像季思濟刼濁乃學于一支門役羣迷以為盡妙理者莫如法門變凡夫者莫如佛土悟無深者莫如散花故業于净名深達實相自京師涉漢沔歴鄢郢登熊湘劉禹錫送惠則歸上都竺僊夜雨山草濕爽籟雜枯木閒吟竺僊偈清絶過於玉貫休詩三禪沙門有三坐禪為上輩誦經為中輩助衆為下輩無為經天堂地獄䖍州刺史李舟與妹書曰釋迦生中國設敎如周孔周孔生西方設敎如釋迦天堂無則已有則君子登地獄無則已有則小人入識者以為知言國史補四惑含笑作姿以惑于人婬羅彌網人皆投身坐臥行立四面巧媚薄智愚人為之心醉執劍向敵是猶可勝女賊害人是不可禁毒蛇含毒猶可手捉女情惑人是不可觸智度論隂府寄庫遍覽藏經無隂府寄庫之説譬如有人不為君子之行以交結賢人君子乃寄錢司理院獄子處待其下獄則用錢免罪豈不謬哉龍舒吃栗多梵云吃栗多唐言賤人寺寺寺司也官府所止故曰寺風俗通漢永平中佛敎初至洛陽始置寺度騰蘭二徳古者官之庭府稱寺盖賔而尊之比干曹署此其源也李華杭州開元寺新塔碑寺者釋名曰嗣也治事者相嗣續於其内本是司名西僧乍來權止公司移入别居不忘其本還標寺號翻古徳寺誥乃有多名或名道場即無生廷也或名為寺即公廷也或名净往舍或名法同舍或名出世間舍或名精舍或名清净無極園或名金剛净刹或名寂滅道場或名逺離惡處或名親近善處並隨義立各有所表今道俗雜居豈得稱名也法苑白馬白馬寺漢明帝所立也佛入中國之始帝夢金神號曰佛遣使向西域求之乃得經像焉時以白馬負經而來因以為名明帝崩起祗洹於陵上自此從後百姓冡上或作浮圖焉寺上經函至今猶存常燒香供養之經函時放光明耀於堂宇是以道俗禮敬之如仰真容伽藍記帝勅使西巡過四十餘國屆舍衞都僧云佛乆滅度遂抄聖敎六十萬五千言以白馬䭾還所經嶮隘餘畜皆死白馬轉强嘉其神異洛陽立白馬寺焉漢明内記昔外國王欲滅佛法宣令毁壊塔寺次招提寺忽有一白馬從西方來繞塔悲鳴騰躍空中或復下地一日一夜鳴聲不絶以事啓王王即勅停已毁之塔並更修復由此白馬大法更興因改招提以為白馬故諸寺之號亦取是名焉法苑釋明槩云化漸漢朝寺興白馬之號道流晉世刹建青龍之名廣𢎞明辨惑論劉禹錫集載僧靈徹詩云云經來白馬寺僧到赤烏年禹錫稱其工金石録隋釋彦琮辨正論云至若開源白馬則語逐洛陽發序赤烏則言隨建業續髙僧傳則天華嚴經序云鷲巖西峙象駕東驅注云謂白象䭾經東來山川紀異云河南府有象庄象至洛陽化為石今石象猶存㨿此則白馬之説法苑似是龍泉寺釋慧逺屆潯陽見廬峯清静足以息心始住龍泉精舍此處去水本逺乃以杖扣地曰若此中可得栖立當使朽壤抽泉言畢清泉湧出浚矣成溪少時潯陽亢旱逺詣池側讀龍王經忽有巨蛇從池上空須臾大雨嵗以有年因號精舍為龍泉寺焉髙僧傳東林寺時有沙門慧永居在西林與逺同門舊好遂要同上永謂刺史桓伊曰逺公方當𢎞道今徒屬已廣而來者方多貧道所棲褊狹不足相處如何桓乃為逺復於山東更立房殿即東林是也逺創造精舍洞盡山美却負香爐之峯傍帶瀑布之壑仍石疊基即松栽搆清泉環階白雲滿室復於寺内别置禪林森樹煙凝石逕苔冷凡在瞻履皆神清而氣肅焉既而謹律息心之士絶塵清信之賔並不期而至望風遥集上河東寺荆州河東寺者晉氏南遷郭璞多聞之士周訪地圖云此荆楚舊為王都欲於硤州置之嫌逼山遂止便有宜都之號下至松滋地有面勢都邑之像乃掘坑秤土嫌其太輕覆冩本坑土又不滿便止曰昔金陵王氣於今不絶固當經三百年矣便都建業仍於此置河東改遷裴薩栁杜四姓居之地在江曲之間類蒲州河曲故有河東目也有東西二寺法苑珠林朗公寺泰山神通寺即南燕主慕容徳為僧朗禪師之所立也上下諸院十有餘所長廊延袤千有餘間三度廢敎人無敢撤欲有犯者朗輒現形以錫杖撝之病困垂死求悔先過還差如初寺立已來四百餘載佛像鮮榮色如新造衆禽不踐于今儼然古號為朗公寺以其感靈即目故天下崇焉開皇三年文帝以通徴屢感故改曰神通也續髙安樂寺釋慧受安樂人來遊京師常修福業嘗行至王坦之園夜輒夢於園中立寺如此數過受欲就王乞立一間屋處詣王陳之王大喜即以許焉初立一小屋毎夕復夢見一青龍從南方來化為刹住受將沙彌試至新亭江尋覓乃見一長木隨流來下受曰必是吾所夢見者也於是雇人牽上竪立為刹架以一層道俗競集咸歎神異坦之即捨園為寺以受本鄉為名號曰安樂寺王雅劉鬬范寗並施宅以成寺髙僧傳靈隠寺景徳靈隠寺在武林山之隂晉咸和元年梵僧慧理建理曰中天竺國靈鷲山之小嶺不知何年飛來佛在世日多為仙靈所隠今此亦復爾耶因掛錫造靈隠寺號其峯曰飛來葛洪書扁杭州志錢塘縣西有靈寺山者舊曰仙居峯吐蓮花洞藏龍穴信江東之秀嶽也續髙僧貞觀傳禪窟義林宋元嘉中有慧嚴慧議道人並住東安寺學行精整為道俗所推時鬭塲寺多禪僧京師為之語曰鬭塲禪師窟東安談義林宋夷蠻傳天竺下延祚寺金陵延祚寺宋太始中邦人所建也唐有靈知禪師生無雙目號羅㬋和尚經綸文子悉能明了時人號有天眼金陵志天安寺宋大明四年於丹陽中興寺設齋有一沙門容止獨秀舉衆往目皆莫識焉沙門惠璩往問之荅名惠明又問所住荅云從天安寺來語訖忽然不見天下無此寺名闔堂驚異以為明祥所賁幽應攸闡紫山可覩華臺不逺故上土盛士尅表大明之朝勸發妙身躬見龍飛之室意若曰陛下慧燭海縣明華日月故以慧明為人名繼興天祚式垂無疆故以天安為寺稱乃改中興曰天安寺宋蠻夷傳記釋老志㝠祥聚慧寺崑山聚慧寺梁天監中沙門惠響欲建寺時忽見神請助千工是夜風雪頃刻暴作聞喑嗚之聲遲明基成帝賜名焉志光宅寺梁武捨宅造光宅寺未成于小莊嚴寺造無量佛像長丈九尺未移前淮中佑客夜聞橋上數百人修道路往視不見人俄而像度光彩輝煥大覺寺大覺寺廣平王懐捨宅也北瞻芒嶺南眺洛汭東望宫闕西顧旗亭禪臯顯敞實為勝地是以温子升碑云面水背山左朝右市是也環所居之堂上置七佛林池飛閣比之景明至於春風動樹則蘭開紫葉秋霜降草則菊吐黄花名僧大徳寂以遣煩伽藍記長廣陸馥為相州刺史假長廣公有善政其代還也吏人大歛布帛以遺之馥皆不受人亦不取於是以此物起佛寺焉因名長廣公寺北史俟傳修梵寺修梵寺有金剛鳩鴿不入烏雀不棲菩薩達摩云得其真相伽藍記少林寺西域沙門跋陀者有深道業周太和所敬重詔于少室山隂立少林寺以居之公給衣供廣𢎞明安國寺義興安國寺陳武所營基址猶存釋慧弼修理之寺宇光華門房嚴麗故真觀法師製寺碑曰花塼錦石更累平階夏藻秋蓮環莊竦塔月臨月殿粉壁照於金波雲映雲臺畫梁承於玉葉是也續髙仙遊寺釋童貞綜掇𤣥儒英猷秀舉抱操懐亮以徳王當時隋文帝勅令往雍州置塔送舍利於終南山仙遊寺即古傳云秦穆公女名弄玉習仙升雲之所也上四絶齊州靈巖荆州玉泉潤州棲霞台州國清世稱四絶晏殊類要歙溪據二浙上流古為新安郡溪西太平寺舊號興唐寺李太白嘗留題曰天台國清寺天下為四絶今到漢唐游竒蹤更無别枿木劃斷雲髙僧頂殘雪檻外一條溪幾回碎明月溪即取太白詩名之也石刻尚存而集中不載曲淆舊聞那蘭陁唐云施無厭此伽藍南菴沒羅園中有池其龍名那爛陁旁建伽藍因取其稱西域記其寺周圍四十八里九寺一門是九天王所造西域伽藍無如其髙廣矣常住僧衆四千餘人外客道俗通及邪正乃出萬數皆周給衣食無有窮竭故佛號寺為施無厭也中有佛院備諸聖迹精舍髙者二十餘丈佛昔於中四月説法又有精舍髙三十餘丈中諸變態不可名悉置立銅像髙八丈餘六層閣盛莊嚴綺飾即戒日之兄滿胄王造也續髙僧傳廣敎寺大中間裴休為宣州刺史建廣敎寺其材皆松蘿惟安南有之相傳為黄蘖禪師所募時寺後有二金鷄相鬭入井中材皆從井中出寺成餘松蘿八株蘖師植之殿前輒敷榮長茂别有栢二株遇僧有異行者輒開異花數色今井中㫁木尚存宣州志三大道塲東海梅岑山耶補陀落伽山此云海島上有寳陀寺唐大中間有西域僧來燔盡十指頂禮洞前親感菩薩見大人相為説妙法授以七色寶石後日本僧慧諤自五臺得觀音瑞相欲返故國舟抵新螺嶋諤禱之曰使我國衆生無縁見佛當從所向立精藍有頃舟行竟泊于潮音洞下有居民張氏目覩斯異亟舍所居雙峯山卓庵奉之俗呼為不肯去觀音院郡聞遣迎其像置城中已而有僧即大衆中求嘉木刻像扃户彌月工竟而僧不見宋元豐三年内殿王舜封使三韓至此有大龜負舟不得去望山作禮忽龜沒而舟行還以其事上之賜額寶陀寺惟大士以三十二應身入諸國土現八萬四千手臂接引羣生與五臺之文殊峨眉之普賢為天下三大道塲寧波府志有咀落迦山南海有石天宫觀自在菩薩游舍西域記伽藍僧伽藍譯為衆園僧史畧云為衆人園圃園圃生植之所佛弟子則生植道芽聖果也翻後魏太武帝始光元年造伽藍創立招提之名僧史伽藍之地本曰净居栖心之所理尚幽寂唐髙沙汰語或云毗阿羅此云遊止處要覽招提經音義云梵去招鬭提奢唐言四方僧物後人寫之誤以拓為招又省去鬭奢二字只稱招提只今十方住持是也西溪叢語唐㑹昌五年毁招提蘭若四萬餘區又㑹要元和二年官賜額為寺私造者為招提蘭若及招挺菩薩皆古佛號故寺謂之招提或名伽藍釋書蘭若阿蘭若或名阿練若大論翻逺離處薩婆多論翻閑静處天台云不作衆累名之為閑無憒鬧故名之為静或翻無諍謂所居不潔之故即離聚落五里處也肇云忿競生乎衆娶無諍出乎空閑故佛讃住於阿蘭若應師翻空寂翻四分律云空静處精舍寺或名精舍釋迦譜云息心所栖故曰精舍靈裕寺誥曰非麄暴者所居故云精舍藝文類云非由其舍精妙良由精練行者所居也或名道場肇師云修道之場隋煬帝勑天下寺院皆名道場止觀云道場清净境界或名僧坊者别屋謂之坊也翻雞園雞園在摩竭陀國無憂王造小乗大衆出家寺也佛滅後衆多名徳比丘皆住雞園西域記雞頭摩竦疏釋雞園引智論云昔有野火燒林林中有雉入水漬羽以救其焚纂要云即雞頭摩寺翻鹿苑在羅茶柰國佛成道初轉法輪處也鹿園深義龍宫奥説廣𢎞明鴈堂毗舍離於大林為佛作堂形如鴈子一切具足要覽鷲嶺耆闍窟山中山形如鷲佛常居此中故號鷲嶺法華祗園須達多長者白佛言弟子欲營精舍請佛住惟有祗陀太子園廣八十頃林木欝茂幽静可居白太子太子戲曰滿以金布便當相與須達出金布八十頃精舍告成凡千二百區經律異相須達多長者居舍衞國常施孤獨故曰給孤獨上祗洹林樹名梵云祗陁洹此云戰雖即太子名須達長者施園祗陁太子施樹為佛説法之處故後人曰祗園亦曰給孤園金剛經注金地或云金地即舍衞國給孤長者側布黄金買祗陀太子園建精舍諸佛居之處也雞跖五臺佛光寺願誠治棲金地禮行嚴為師宋僧傳寶坊給孤長者布黄金地為伽藍故寺宇號為寶坊雞跖叢林梵論貧婆此云叢林譬如大樹叢叢故僧聚處得名叢林祖發事苑方丈吠舍黧園有維摩故宅顯慶中王𤣥䇿因向印度過净名宅以笏量基止有十笏故號方丈室唐髙僧紫紺殿碧玉之樓昇堂未易紫紺之殿入室為難梁元帝紺園白帖紺殿横江上李白殿宇餘丹紺韋蘇州柰苑菴羅園闡義云菴羅是果樹之名其果似桃或云似柰此樹開華華生一女國人嘆異以園封之園既屬女女人守護故言菴羅樹園宿善㝠熏見佛歡喜以園奉佛佛即受之而為所住翻菴羅肇汪云柰也柰女經云維耶梨國梵志園中植此柰樹樹生此女梵志收養至年十五顔色端正王收為妃女乃以苑地施佛為伽藍故曰柰苑雞跖鷲嶺三層塔菴園一講堂沈炯香城究香城之妙理窮金河之奥説王僧孺香城金簡龍宫玉牒二敎論鹿樹表光金河匿曜法苑千佛香界佛寺曰香界亦曰香阜因香所生以為香界楞經髙適詩香界冺羣有江總詩息舟候香阜悵别在寒林香宇齊竟陵王三界外樂門頌云燈祗開逺照香宇薦嘉薫蓮花界蓮花界蓮宫花宫金界金繩界道福界沈炯從遊中天寺應令曰福界開新草儴佉宫時我及衆僧俱出靈鷲山儴佉之宫孱然可期𢎞明集引法華經青豆房伏承輿駕尋幸伽藍冀於此時得一覯止辨論青豆之房遣惑赤華之舍廣梁簡文仁祠楚王英為浮屠齋戒祭祀奉送縑帛以贖愆罪詔報曰楚王誦黄老之㣲言尚浮屠之仁祠何嫌何疑後漢上方常琮侍煬帝遊寶山帝曰幾時到上方琮曰昏暗應須到上頭左右失笑帝曰淳古君子也隋傳禪宫釋慧明欲移湖州佛川寺泉側有吳王古祠夜神謂明曰師欲移寺弟子願捨此處永奉禪宫後果移寺於祠側獲銅盤之底篆文有慧明二字焉髙僧傳波羅越彼國名鴿達嚫國有迦葉佛伽藍穿大石山作之有五重最下為鴈形第二層作師子形第三層作馬形第四層作牛形第五層作鵠形為波羅越佛游天竺本記青鴛須彌山下有青鴛伽藍大悲經莊嚴下壓象迹歡喜之地上接蜂歌莊嚴之境段成式愬像記二梵世尊説四梵福若能補理故寺是謂二梵之福問含經演經姚興如逍遥園引諸沙門于澄𤣥堂聴鳩摩羅什演佛經公卿已下莫不欽附沙門自逺而至者五千餘人起浮圖於永貴里立波若臺於中宫沙門坐禪者恒有千數州郡化之事佛者十室而九矣晉書阿含此云故涉法師云阿含此云傳所説義唯識論云謂諸如來所説之敎長阿含序云阿含者秦言法歸所謂萬法之淵府摠時之林苑也翻楞伽正言䮚迦佛住南海濵入楞伽國摩羅耶山而説此經梵語楞伽此云不可往唯神通人方能到也阿跋多羅此云入謂入此山中而説此寶或翻無上謂此經法是無上寶上半字義是諸大乗經為滿子無欠少之義也小乗諸教悉為半字義未圓故云半字涅槃經移坐張緒為中書令善談𤣥駕幸莊嚴寺聴僧達道人講維摩坐逺不聞緒言上難移緒乃遷僧達齊書閉閣張稷出為青冀二州刺史而不得志嘗閉閣讀佛經梁書誦經枷鎖自脱盧景裕魏節閔帝時為國子博士後河間邢摩納與景裕從兄盧仲禮據鄉作逆連坐景裕繫晉陽獄景裕至心誦金剛經枷鎖自脱是時又有孫敬徳負罪當死夢沙門敎誦救坐觀世音經覺時如所夢謂誦千遍臨刑刀折主者以聞丞相髙歡表請免死勅寫其經廣布於世今謂髙王觀世音經北史續髙僧報應記誦經獲祐蕭瑀篤信佛法常持金剛經議伐髙麗不合㫖上大怒與賀若弼髙熲同禁欲寘於法瑀就其所八日念金剛經七百遍明日桎梏忽自脱守者失色復為著至殿前獨宥瑀報應記大雲金仙降㫖大雲之偈先彰則天華嚴經序北凉三藏曇無䜟所譯大方等無相經大雲分云爾時衆中有一天女名曰净光聞法歡喜供養如來佛即為説宿世因縁乃告之曰汝當來世即以女身當王國土得轉輪王所統領處四分之一得大自在受持五戒作優婆夷守護正法摧伏外道汝於爾時實是菩薩為化衆生現受女身注曰是大雲先彰䜟武后為天子之文也寶雨玉扆披詳寶雨之文後及上寶雨經第一卷云佛記日月净光天子宿種善根以是因縁我涅槃後第四五百年汝於贍部東支那國故現女身為自在主正法治化能於我法廣大住持清凉師云此時更無女主斯言不妄也懴懴之始本自齊南竟陵王因夜夢往東方普光王如來所聴彼如來説法後因述懴悔之言覺後即賔席梁武王融謝朓沈約共言其事王因兹乃述成竟陵集二十篇懴悔一篇後梁武得位思懴六根罪業即將懴悔一篇乃召真觀法師慧式遂廣演其文述引諸經而為之故第二卷中發菩提心文云慧式不惟凡品輕摽心志實由渴仰大乗貪求佛法依倚諸經取譬世事即非是為郄后所作今之序文不知何所作與本述不同近南人新開印本去其慧式二字盖不知本末也南部像像始漢桓帝於宫中鑄黄金浮圖老子像覆以百寶華盖身奉祀之由是百姓向化事佛彌盛世人以金銀作佛像自此而始釋鑑金瑞像揚州育王金瑞像者吳孫皓時後園所獲皓使置穢處以為笑樂俄得腫疾隠處尤痛太史占曰犯大神也皓謝之有間因爾開信𢎞明法像瑞集靈寶木像㑹稽山隂靈寶寺木像者徵士譙國戴逵所製東夏製像之妙未有如其工者也道俗瞻仰忽若親遇髙平郗嘉賔撮香呪曰若使有常將復覩聖顔如其無常願㑹彌勒之前所捨之香於手自然芳煙直上極目雲際餘芬徘徊馨盈一寺于時道俗莫不感厲像今在越州嘉祥寺法苑金像行襄州檀溪寺今像行者寧康中釋道安所造也及成就已乃行至萬山明迎返寺其夕又出至寺門至山蹋石現一足相周武滅法鎮副長孫哲志性兇麄先欲除毁令百人以索繫頸挽之不動哲大怒乃至加五百人方倒震地哲喜落馬尋卒當毁像時於腋下倒垂衣内銘云晉太元十九年嵗次甲午比江道安於襄陽西郭造丈八金像此像更三周甲午百八十年當滅計勘年月興廢悉符同焉信知印手聖人崇建容範動發物心生滅之期世相難改業理之致復何虚矣續髙僧傳飛越城秦將吕光伐龜兹將軍杜進夢金像飛越龜兹之城曰所謂佛神去之胡亡必矣晉書夜行遶坐陳留王景皓夙善𤣥言道家之業捨半宅安置佛徒唱演大乗數部遂進京師大徳菩提流支等時有奉朝請孟仲暉者學兼釋氏恒來造第與沙門論議時號為𤣥宗先生暉遂造人中夾貯像一軀相好端嚴希世所有置皓前㕔須臾彌寶坐永安二年中此像毎夜行遶其坐四面脚跡隠地成文於是士庶咸來觀矚永熈三年秋忽然自去莫知所之其年冬而京師遷鄴伽藍記生毛普泰元年臨覺寺金像生毛眉髮悉皆具足尚書左丞魏季景謂人曰張天錫有此事其國遂滅此亦不祥之政至明年而廣陵被廢死上課奴有沙門晏通於道傍造大漆像敎化乞財所得物咸入常住嘗以杖敲此像號曰出課烏奴北齊改元大像玉華宫鐵礦瑞像者周武滅法有姜明者督事夜行毎見山上光明旦往尋之有卧石狀如像便斵掘四邊乃是鐵礦不可傷損舉身三丈谷中有趺乃共村人拗舉忽然下流經趣趺孔卓然特立以狀聞奏時天元嗣厯改元大像勅其處為大像寺因開佛法廣𢎞明出涕襄州峴山華嚴寺盧舍那瑞像者本是周朝右像法滅藏之得存毎有㓙相以涕出為期隋文將崩一鼻涕出沾汚于懐今薄剥起雖後修飾望還如涕貞觀末年四月内連涕不止塗汚胷懐方可尺許太宗升遐方驗先兆上觀音像西小湖天台敎寺舊名觀音敎寺相傳唐乾符中有沈香觀音像泛太湖而來小湖寺僧迎得之有草繞像足投之小湖遂生千葉蓮花蘇州舊志阿育像長沙寺有阿育王像相傳是阿育王女所造太元中夜浮至江津漁人見異光如晝而諸寺以千人迎之嶷然不動長沙寺翼法師者操行精苦乃率十僧至誠祈啓即時就輦至齊末僧常夜行不知者以槊刺之作銅聲而倒毎南朝大事及災疫必先流汗數日自像敎已來最為靈應也渚宫遺亊觀音像有邸嫗鋤桑拾得一銅觀音像穴壁安之皆將供養嫗有子時在潘葑軍前日夕祝之保其安寧其子當陣之際倒于草間聞背上連下三劍似擊銅器聲戰罷起看身並無所傷其母此日見銅像落在地背上有三刃痕罔知其由至子囘説其事方知神助爾葆光録事佛佞佛二郗奉道二何奉佛皆以財賄謝中郎云二郗諂於道二何佞於佛世説何充性好佛道崇修佛寺供給沙門以百數乆在揚州徵役吏民功賞萬計是以為遐邇所譏充弟準亦精勤唯讀佛經營治寺廟而已矣晉陽秋臨刑誦經王恭性雖抗直而闇於機㑹自矜貴不閑用兵尤信佛道臨刑猶誦經神色無懼晉書結志隆雲齊竟陵王子良幼含勝慧結志隆雲誠感懇徵亟發靈應以永明七年二月八日於西第在内堂法㑹見佛從東來威容顯曜文宣望身頂禮因而侍立自覺已冠裁及趺踝佛俛而㣲笑既而咳唾白如凝雪以手承捧變為玉稻法苑子良嘗招致名僧講論佛法造經唄新聲數於邸園營齋戒大集朝臣衆僧至賦食行水或躬親其事世頗以為失宰相體武帝不豫子良啓進沙門於殿户前誦經武帝為感夢見優曇鉢花子良案佛經宣㫖使御府以銅為花挿御牀四角齊施身為奴梁髙祖崇信佛道於建業起同泰寺又於故宅立光宅寺皆窮極工巧殫竭財力百姓怨苦殆不聊生自以其身施同泰寺為奴朝廷共歛珍贖之有事佛精苦者輒加菩薩之號其下書皆云皇帝菩薩談藪髙祖崇重釋侣欣尚靈儀造等身金銀像二軀於重雲殿晨夕禮敬五十許年初無替廢續髙僧僧名傳自暴誦經後王沈皇后諱婺華身居儉約唯尋閲圖史及釋典為事常遇嵗旱自暴而誦經應時雨降陳亡入隋及煬帝崩自廣陵過江於毘陵天静寺為尼名觀音陳書令師踐髮武成帝河清二年帝築壇於内具問道禮儀請上法師授歸戒帝布髮于地令上踐其髮而升座帝授大戒畢次命八座重臣及妃后戚屬皆授菩薩戒剙報徳寺移上法師主之上性儉素雖當大統位國師而壊衣布褐未嘗乗肩輿世益以此重之諺曰四海僧望道塲法上釋鑑稱師兒女隋文帝開皇十四年曇崇法師道重當時入大内為宣净業帝毎禮接自稱師兒皇后延徳又稱師女師所獲外利盡施伽藍縁身資蓄衣鉢而已上俾僧據身楊希古性酷嗜佛法常置僧于第陳列佛像雜以幡盖所謂道塲者毎夌旦輒入其内以身俛地俾僧據其上誦金剛經三遍性又潔净内逼如厠必散衣無所有然後髙屐以往玉泉子送喪嚴挺之與裴寬皆奉佛開元末惠乂卒挺之服縗麻送于龕所寬為河南尹僧普寂卒寬與妻子皆服縗絰設次哭臨妻子送喪嵩山故挺之自誌云葬于大照塔側祈其靈祐也挺之傳晩事白居易暮節惑浮屠尤甚至經月不食葷及致仕與香山僧如滿結香火社毎肩輿往來白衣鳩杖自稱香山居士臨卒遺命葬於香山如滿師塔之側舊傳後履道第卒為佛寺新生于闐國宰相裴休留心釋氏精於禪律師圭峯密禪師得達摩頓問密師注法界觀禪詮皆相國􅁧文序常被毳衲於歌妓院中持鉢乞食自言曰不為俗情所染可以説法為人毎自發願願世世為國王𢎞護佛法後于闐國王生一子手文中有裴休二字聞於中朝其子弟請迎之彼國不允而止北夢頓顙瘤贅李後主酷信浮屠每日與后頂僧伽㡌衣袈裟誦佛書拜跪頓顙至為瘤贅親為桑門削作厠簡子試之腮頰少有澁滯者再為治之其手不扠學佛握印而行僧犯姦有司具牘還俗後主令禮佛三百拜免刑王師尅池州令僧俗兵士念救苦觀世音菩薩江南野録鹵簿借飾釋寶瓊以至徳二年卒有詔慰焉喪事所須隨由資給仍以天子鹵簿仗借為榮飾終古所希幸也續髙徳迴萬乘漢帝隆禮於摩騰吳王屈節於康㑹曇始延魏君之席道林登晉主之牀秦世道安榮膺共輦趙邦澄上寵懋錦衣皆道降極尊徳迴萬乗良有以也辨正論贈官賜諡代宗大厯十年興善寺胡僧不空卒贈開府儀同三司司空謚曰大辨正廣智不空三藏和尚毁佛鬼道魏世祖忿沙門非法崔浩毁其虚誕為世費害乃下詔曰昔後漢荒君信惑邪偽妄假睡夢事胡妖鬼以亂天常禮義大壊鬼道熾盛視王者之法蔑如也雖言胡神問今胡人共云無有皆是前世漢人無賴子弟劉元貞吕伯彊之徒乞胡之誕言用老莊之虚假附而益之皆非真實至使王法廢而不行盖大姦之魁也釋老志殽亂海内梁武信重釋門寺像崇盛荀濟上表曰三墳五典帝皇之稱首四維六紀終古之規模及漢武祀金人黄新以建國桓靈祀浮圖閹竪以控權三國由兹鼎峙五胡仍其薦食衣冠奔於江東戎教興於中壤使父子之親隔君臣之義乖夫婦之和曠友朋之信絶海内殽亂三百年矣廣𢎞明朝夕敬妖怪之胡鬼曲躬供貪淫之賊秃上五謗俗之謗佛者有五其一以世界外事及神化無方為迂誑也其二以吉凶禍福或未報應為欺誑也其三以僧尼行業多不精純為姦慝也其四以糜費金寶減耗課役為損國也其五以縱有因縁而報善惡安能辛苦今日之甲利益後世之乙乎為異人也顔氏家訓不行忠孝按釋迦出戎剖脇而誕摩耶遂殂事符梟獍年長净立内不自安背父叛君逆節彌甚達多投石難陀引弓變革常道自餓形骸安能濟物九十六道此道最貪叶彼淫愚衆多崇信至如瑠璃誅釋瞿曇路左視之在生親尚不存既歿疎何能救斯即不行忠孝若牟尼能照而故縱婬殺便是詐稱慈悲徒能照而不救又是大覺於羣生無益而天下不覺荀濟疫胎之鬼北齊劉晝上書言佛法詭誑避役者以為林藪又詆訶謡蕩有尼有優婆夷實是僧之妻妾損胎殺子其狀難言今僧尼二百許萬并俗女向有四百餘萬六月一損胎如是則年族二百萬户矣驗此佛是疫胎之鬼也廣𢎞明鬼敎魏時民多絶户而為沙門李瑒上言禮以教世法道將來佛捐弃慈孝乖禮滅倫安有弃堂堂之政而從鬼敎乎沙門都統僧暹等以瑒為毁謗佛法泣訴靈太后后責之瑒曰鬼神之名皆通靈達稱天地曰神祗人死曰鬼佛非天非地本出于人應世道俗其道幽隠名之為鬼愚謂非謗本傳焚經捐厠崔浩不信佛道其族弟滎陽太守模深所歸向毎雖糞土之中禮拜形像浩大笑之云持此頭顱不净處跪是胡神也魏書浩非毁佛法其妻郭氏敬信釋典時時誦金剛般若經浩取而焚之捐灰於厠及幽執􅀈於城南使術士數十人行溲其上呼聲嗷嗷聞于行路自宰司之被戮辱未有如浩者世皆以為報應之驗也善讀佛經齊李公緒見有喪之家憂齋供福利便曰佛敎者脱畧父母遺蔑帝王捐六親捨禮義赭衣髠剔自比刑餘妄説眩惑唯利是親隂陽名墨雖紕繆竒察而四時節用有取至如兹術則傷化託幽滋為界道惜哉舉國皆迷彼衆我寡悲哉吾之死也福事一切罷之棄華即戎有識不許弟槩字季節屬文讀佛經脚指夾之廣𢎞明佛在西域言妖路逺漢譯胡書恣其假託舊唐泥犂人傅奕自武徳貞觀中嘗為太史令性不信佛法毎輕僧尼至以石像為塼瓦之用貞觀十四年秋暴病卒初奕與同伴傅仁均薛頤並為太史令頤先負仁均錢五千未償而仁均死後頤夢見仁均言語如平常頤因問曰先所負錢當付誰人仁均曰可以付泥犁人問是誰答曰傅奕是也既而寤是日夜少監馮長命又夢已在一處多見先亡人長命問經文説罪福之報未知審定有否答曰皆悉有之又問如傅奕者生平不信佛死受何報答曰罪福定有然傅奕已配越州為泥犂人矣地獄苦記長命旦入殿庭見薛頤説所夢頤又説之二夢符合唐臨在其側同嗟嘆之頤即送錢付奕并説所夢後數日而奕卒案泥人者謂泥犂中人也泥犂即地獄之别名矣㝠報記事佛無益中宗時姚崇奏曰佛不在外求之於心佛圖澄最賢無益於金趙羅什多藝不救於亡秦何充符融皆遭敗滅齊襄梁武未免殃災但發心慈悲行事利益使蒼生安樂即是佛身臨終遺令曰佛者覺也在乎方寸假有萬像之廣不出五藴之中平等慈悲行善不行惡則佛道備矣何必溺於小説惑於凡僧損耗生人無益亡者且如來普慈竟存利物損衆生之不足厚豪僧之有餘必不然矣萬年龜鏡舊唐今之佛經羅什所譯姚興執本與什對翻姚興造浮屠於永貴里傾竭府庫廣事莊嚴而興命不得延國亦隨滅又齊跨山東周據關右周則多除佛法而修繕兵威齊則廣置僧徒而依慿佛力及至交戰齊氏滅亡國既不存寺復何有修福之報何其蔑如梁武帝以萬乗為奴胡太后以六宫入道豈特身戮名辱皆以亡國破家近日孝和皇帝發使贖生傾國造寺太平公主武三思悖逆庶人張夫人等皆度人造寺竟術彌街咸不免受戮破家為天下所笑經云求長命得長命求富貴得富貴刀尋段段壊火坑變成池比來縁精進得富貴長命者為誰生前易知尚覺無應身後難究誰見有徵且死者是常古來不免所造經像何所施為夫釋迦之本法為蒼生之大弊吾亡後必不得為此弊法舊唐刺血寫經咸通中西川僧法進刺血寫經聚衆敎化寺司申報髙燕公判云㫁臂既是凶人刺血必非美事貝多葉上不許塵埃俗子身中豈堪腥膩宜令出境無得惑人與一繩遞出東界所司不論繩絞賜錢一千送出東郭幸而誤免從卒於荆州玉泉寺北夢烏巾徽宗時濟南府開元寺因更修掘地得古碑盖㑹昌中汰僧碑也字皆磨滅惟八字獨存云僧盡烏巾尼皆緑髻僧惡而碎之後有詔改徳士遂符其言宣政雜録塔􅌥堵波塔者梵名塔婆此云方墳或云支提翻為滅惡生善處西梵正音名為􅌥堵波此云廟廟者貌也即是靈廟也法苑塔西國浮圖也言浮圗者此翻聚相戒壇圗經云依梵本瘞佛骨所名曰塔婆翻譯有舍利者名塔無舍利者名支提法苑凡人以塔廟者敬田也執于有為禪寂慧門也得于無物李邕嵩岳寺碑八萬四千如來在日行化乞食因遇童子戲㺯沙土以為米麫宿祐𠖇㑹以土麫施佛佛感其善心為受塗壁記此童子吾滅度後一百年滿作王出世號為阿育作鐵輪王王閻浮提一切鬼神並皆臣屬且使空中地下四十里内所有鬼神開往前入塔所獲舍利役諸鬼神於一日一夜一億家施一塔廣計八萬四千塔法苑三十八王殺八萬四千宫人夜聞宫中有哭聲王悔為起八萬四千塔今此震旦亦有在者什提恒因天上造三千偷婆阿育王經廣𢎞明十三晉廬山文殊師利菩薩像者昔傳云育王既統此洲學鬼王制獄酷毒尤甚文殊現處鑊中火熾水清生青蓮華王心感悟即日毁獄造八萬四千塔建立形像其數亦尒此其一也法苑十三周共和九年東天竺國阿育王盡收西域諸塔及龍宫舍利夜役鬼神碎七寶末造八萬四千寶塔命耶舍尊者舒指放光八萬四千道令捷疾鬼各隨一光盡處安置一塔遍娑婆界在此震旦國者一十九所釋鑑按此一事而四説不同漢譯胡書恣其假託傅奕之言信矣圎光現塜明帝幸白馬寺攝摩騰竺法蘭進曰寺東何館帝曰土有阜無因而起夜有異光民呼聖塜滕曰阿育王藏如來舍利於天下凡八萬四千所今震旦境中十有九處此其一也帝大驚即駕幸拜之忽有圎光現塚上三身現光中帝喜曰不遇二大士安知上聖遺祐哉詔塔其上釋鑑竒塔崇竦江州盧山有三石梁長數十丈廣不下天下望無底晉咸康年中庾亮為江州登山過梁見一公殊偉厦屋崇峻玉堂眩目竒塔崇竦莫測是何循遶乆之終非人宅乃拜謝而返法苑杖頭作塔謝尚嘗夢其父曰西南有氣至衝人必死勿當其鋒家庶一全汝宜修福建塔寺可禳之若未暇立寺可杖頭刻作塔形見有氣來可擬之尚悟懼遂刻小塔施杖頭恒置左右後果有異氣遥見西南從天而下始如車輪漸彌大直衝尚家尚以杖頭指之氣便囘散闔門獲全氣所經處數里無復孑遺後遂舍宅為莊嚴寺宋路太后改為謝鎮西寺宋盡建康實録去地千尺永寧寺靈太后胡氏所立也髙九十丈有刹復髙十丈合去地一千尺去京師百里已遥見之初掘基至黄泉下得金像三千軀太后以為信法之徴是以營建過度也常景碑云須彌寶殿兠率净宫莫尚於斯也菩提達摩者波斯國胡人也見金盤炫日光照雲表寶鐸含風響出天外自云一百五十嵗遍涉諸國而此寺精絶閻浮所無永熙三年浮圖為火所燒當時雷雨晦㝠雜下霰雪其年五月中有人從象郡御覽東萊來云見浮圗於海中光明照耀儼然如新海上之民咸皆見之俄然霧起浮圗遂隠至七月中平陽王為侍中斛斯椿所使奔於長安十月而京師遷鄴伽藍記景明寺浮圗去地百仞邢子才碑云俯聞激電旁屬奔星妝飾華麗侔於永寧金盤寶鐸煥爛霞表上雀離乾陁國都城東南七里有佛塔髙七十丈周三百步所謂雀離佛圗也魏書健䭾國有雀離浮圗元魏靈太后遣沙門道主等賫大旛長七百餘尺往彼掛之脚纔及地唐𤣥裝傳父老云此浮圗天火七燒佛法當滅道榮傳云王修浮圖木工既訖猶有鐵柱無有能上者王於四角起大髙樓多置金銀及諸寶物王與夫人及諸王子悉在上燒香散花至心精神然後轆轤絞索一舉便到故胡人皆云四天王助之塔内物事悉是金玉旭日始開則金盤晃朗㣲風漸發則寶鐸和鳴西域浮圗最為第一伽藍記輸伽之建寶塔百鬼助以日工雀離之起浮圗四天扶其夜力廣𢎞明王明廣釋懐信淮南西靈寺塔同偷婆四種人得樹偷婆漢言冡謂輪王羅漢辟支如來也正法念經一如來二辟支佛三聲聞四輪王阿含經合尖石敬塘欲出外藩捍太原隂遣人謝李崧曰為浮屠者必合其尖盖欲崧終始成已事也五代史天門俗言塔頂為天門蘇國老有詩云上到天門最髙處不能容物只容身盖譏在位者古今詩話舍利舍利者西域梵語此云骨身有三種一是骨舍利其色白也二是髪舍利其色黒也三是肉舍利其色赤也菩薩羅漢等亦有三種若是佛舍利椎打不碎若是弟子舍利椎擊便破矣法苑光明云此舍利者是戒定慧之所薰修甚難可得最上福田翻刹梵語刺瑟胝此云竿今畧名刹即旛柱也輔行云西域以柱表刹示所居處也長阿含云若沙門於此法中得一法者便當竪幡以告四逺法苑云阿育王取金華金幡懸諸刹上翻今守株桑門迷瞀俗士良繒碎于刹上丹金縻於塔下而謂為福田期以報業𢎞明蕭深諭頭陀碑列刹相望翰云列刹佛塔也或因之併誤道道家道家之源出於老子其自言也先天地生以資萬類上處玉京為神王之宗下在紫㣲為飛仙之主千變萬化有徳不徳隨感應物厥迹無常授軒轅於峨眉敎帝嚳於牧徳大禹聞長生之決尹喜受道徳之㫖至於丹書紫字昇𤣥飛步之經玉石金光妙有靈洞之説不可勝紀其為敎也咸蠲去邪累澡雪心神積行樹功累徳増善乃至白日昇天長生世上所以秦皇漢武甘心不息靈帝置華盖於濯龍設壇塲而為禮魏什老志開刼度人道經者云有元始天尊生於太元之先毎至天地初開授人秘道謂之開刼度人故有延康赤明龍漢開皇是其年號其間相去經四十一億萬載所度皆諸天仙上品有太上老君太上丈人天真皇人五方天帝及請仙官轉共承命世人莫之與也所説之經亦禀元一之炁自然而有非所造為亦與天尊不滅天地不壊則藴而莫傳刼運當開其文自見凡八字盡道體之奥謂之天書字方一丈八角垂芒光輝照耀驚心眩目雖諸天仙不能省視乃命天真皇人改轉天音而辨行之自天真以下至于諸仙展轉節級以次相授諸仙得之始授世人衆經或言傳之神人篇卷非一自云天尊姓樂名静信例皆淺俗故世甚疑之其術業優者行諸符禁往往神驗而金丹玉液長生之事歴代糜費不可勝紀竟無效焉隋書萬物之奥道者葢為萬物之奥聖人之至賾也隋經藉志萬物之祖大道起於無為萬物之祖也𤣥妙内篇出於自然道之𤣥妙出於自然生於無生先於無先彌綸無外布神化氣淡然無上制御諸天昇𤣥經萬物之始無宗無上而獨能為萬物之始故名元始運道一切為極尊而常處二清出諸天上故稱天尊太𤣥真一本際經元始天尊太上道君言我無量刼度人無數元始天尊以我因縁之勲賜我太上道君之號本行經世父女仙王奉仙云夫天尊行化天上數人以道延人以生主宰萬物覆育周徧如世人之父也釋迦行化世上勸人止惡誘人求福如世人之母也仲尼儒典行於人間示以五常訓以百行如世人之兄也雲笈上士中士下士上士學道輔佐帝王好生之徳也中士學道欲度其家下士學道才脱其身太平經治心治心之最下忘須臾心神乃定定則入道其狀在外慎其言語懼觸物也節其飲食慮貪生也衣麄而静在素淡也居陋而隠守静篤也恭謹一切避凌辱也不敢為先免疾謗也始終淳信潜化導也進止和光密行教也挫銳解紛明道有時也出處變化見神應之速也定真玉籙氣精化生昔兩儀未分溟涬濛澒日月未具狀如鷄子混沌𤣥黄乃有盤古真人天地之精自號元始天王遊乎其中天地既分相去三萬六千里元始天王在天脊膂中住名曰玉京山山中有宫殿並金玉常呼吸天炁俯飲地泉忽生太元王女在石間出能言人形具足天姿絶妙號曰太元聖母元始君下遊見之乃招還上宫元始上真記無公大道無上大道若治在五十五重無極大羅天中玉京之上七寶𤣥臺金牀玉几仙童玉女之所侍衞住在三十三天三界之外大霄隠書無上真書等大道天尊大道天尊治太𤣥之都玉光之州金貞之郡天保之縣元明之鄉定志之里災所不及神仙五岳圗大羅是五億五萬五千五百五十五重天之上天也靈書經都者觀也太上大道道之中道神明君最守静居太𤣥之都五岳圖天與諸仙鳴樓都之鼓朝妄玉京以樂道君諸天内音髙葢天道君處太𤣥都坐髙盖天上羅三清下包三界居七瑛之房出九宫之上行神布氣造作萬物四民天三界之外次四民天所謂東華南離西靈北貞行仁者生東華宫行禮者生南離宫行義者生西靈宫行徳者生北貞宫言三界之内大刼交時有四行者堪為種民王母迎之登上四天為下民種也四見論八百道君玉皇諸録有百八道君羣仙隨業以補其職三善道者聖真仙也上品曰聖中品曰貞下品曰仙三清之間各有正位聖登玉清真登上清仙登太清玉清有大省宫殿皇帝王公卿大夫吏民率以聖呼之如聖皇聖帝之類是也男女貴賤各有次第上清𤣥都玉京七寶紫㣲率以真呼之太清有大極宫殿率以仙呼之其上清太清之品列位男女次第之統數與玉清同太真道品道家厥品有三一者老子無為二者神仙餌服三者符籙禁厭就其章式大有精麄麄者厭人殺鬼精者練屍延夀更有青籙受須金帛王侯受之則延年益祚庶人受之則輕健少疾孔子貴知命伯陽去竒尚奚取鬼符望致其夀若言受之必益今佩符道士悉可長年無籙生民並應短夀事既不徴何道之有二敎論敎人與人君言則惠於國與人父言則慈於子與人師言則愛於衆與人兄言則悌於行與人臣言則忠於上與人子言則孝於親與人友言則信於交與人婦言則忠於夫與人夫言則和於室與人弟言則恭於禮與野人言則勸於農與道士言則正於道與國人言則各守其域與奴僕言則慎於事智慧經法道置官中黄道君曰天生萬物人為貴也人身包含天地無所不法立天子置三公九卿二十七大夫八十一元士九州百二十郡千二百縣也膽為天子大道君脾為皇后心為太尉左腎為司徒右腎為司空封八神及擠為九卿珠樓神十二胃神十二三焦神三合為二十七大夫四肢神為八十一元士合之百二十以法郡數也又肺為尚書府肝為蘭臺府五符經上清上清者宫名也明乎混沌之表煥乎大羅之天靈妙虚結神竒空生髙浮澄净以上清為名乃衆真之所處大聖之所經也宫有丹青金書玉字上皇寶經皆𤣥古之道自然之章雲笈方諸天仙上真之宫室也髙九千丈有大方諸小方諸大方諸對㑹稽東南七萬里小方諸之上多有奉佛者人皆服五星精讀夏歸藏經用以飛行真誥真定真惠夫欲修道惟滅動心不滅照心但凝空心不凝住心有事無事常若無心處静處喧其志惟一制而不動處喧無惡涉事無惱者皆是真定以無事為真宅有事為應迹不求惠而惠自生此名真惠定觀經三洞道門大論云三洞者洞言通也通𤣥達妙其統有三故云三洞第一洞真第二洞𤣥第三洞神乃三景之𤣥㫖八㑹之靈章鳯篆龍金編玉字修服者因兹入悟研習者得以還源故玉經隠注云三洞經符道之綱紀太虚之𤣥宗上真之首經矣豈中仙之所聞哉本際經云若有經文具十二部應三洞者是名正法洞真以不雜為義洞𤣥以不滯為名洞神以不測為用故洞言通也三洞上下𤣥義相通洞真者靈祕不雜故得名真洞𤣥者生天立地功用不滯故得名𤣥洞神者召制鬼神其功不測故得名神此三法皆能通凡入聖同契太乗故得名洞也雲笈服隠芝仙宫上下次秩有左右府左右公左右卿左右大夫左右御史明大洞真經者為仙卿服金丹者為大夫服衆芝為御史若得大極隠芝服之便為仙公真人矣九患學道者有九患有志無時有時無友有友無志有志不遇其師遇師不覺覺師不勤勤不守道或志不固固不能乆皆人之九患也五難上元夫人三天上元之官統領十萬玉女名籙者謂武帝曰汝好道乎數招方術登山祀神亦為勤矣然汝胎性暴胎性淫胎性奢胎性酷胎性賊五者恒舍於榮衞之中五藏之内雖獲良針固難愈也暴則使氣奔而攻神是故神擾而氣竭淫則使精漏而魂疲是故精竭而魂消奢則使真離而魄穢是故命逝而靈失酷則使喪仁而自攻是故失仁而眼亂賊則使心鬭而口乾是故内戰而外絶此五事者皆是截身之刀鋸刳命之斧斤矣雖復志好長生不能遣兹五難亦何為損性而自勞乎若從今閉諸淫養汝神放諸奢從至儉勤齋戒節飲食絶五穀去羶腥鳴天鼔飲玉漿蕩華池叩金梁按而行之阿母必能致汝於𤣥都之墟迎汝於昆閬之中位以仙官遊於十方子勵之哉漢武内傳長生之道武帝問長生之道王母曰汝能賤榮樂卑躭虚味道自復佳耳然汝道恣體欲淫亂過甚殺伐非法奢侈恣性夫侈者裂身之車也淫者破身之斧也殺者嚮對奢者心爛積欲則神隕聚穢則命斷以子蕞爾之身而宅殘形之賊盈尺之材乃攻之者百刃欲以解脱三尸全身永乆不可得也有似無翅之鷃願鼓天池朝生之䓢而樂春秋者哉若能蕩此衆亂撥穢易意保神氣於絳府閉淫宫而不開静奢侈於寂室愛衆生而不危守慈務施鍊氣惜精儻有若斯之事豈無髣髴耶若不爾者譬如抱石而濟長河耳墉城集仙録王母傳七逺七近真君則太上也為神明宗極獨在於窅㝠之先髙居紫㣲之上隂隲兆庶詩稱上帝臨汝書曰天監孔明福善禍淫不差毫末而迷悟之子日用不知背本向末故逺於仙道者有七焉近於仙道亦有七焉當世之士未能窺妙門洞幽􅄨雷同以泯滅為真實生成為假幻但所取者性所為者形甘之死地乃為常理放彼七逺取此七近謂之拔陷區出溺塗碎禍車登福輿始可與涉神仙之津矣神仙可學論智盡諸見太上告王母曰夫人愛天地之氣生氣之來也謂之精精之搆也謂之靈靈之變化之謂神神之化也之謂魂隨魂往來之謂識隨魂出入之謂魄主管精魄之謂心心有所從之謂情情有所屬之謂意意有所指之謂志志有所憶之謂思思而逺慕之謂慮慮而用事之謂智智者盡此諸見者也衆真語録三過視過其目明不居聴過其耳精泄漏愛過其心神出去妙真經禍車罪莫大於淫禍莫大於貪咎莫大於僭此三者禍之車也小則亡身大則殘家上多言何謂為多言然一言而致大㓙是為上多言人也一言而致辱是為中多言人也一言而見窮是為下多言人也太平經去欲入無欲者㓙害之根也氣者天地之元也莫知其根莫識其元是故聖人去欲入無以輔其身西昇經敗徳傷生七竅者精神之户牖也志氣者五藏之使候也耳目誘於聲色鼻口悦於芳味肌體之於安適其情一也則精神馳騖而不守志氣縻於趣捨則五藏滔蕩而不安嗜慾連綿於外心腑壅塞於内曼衍於荒淫之波留連於是非之境而不敗徳傷生者盖亦寡矣雲笈知足天下有富貴者三貴莫大於無罪樂莫大於無憂富莫大於知足知足之為足天道之禄不知足之為止害乃反已上五色五味五色重而天下爽珠玉貴而天下勞幣帛通而天下傾是故五色者䧟目之錐五音者塞耳之椎五味者截舌之斧致道機要聖母元君曰功術之秘者惟符藥與氣也符者三光之靈文天真之信也藥者五行之英華池之精液也氣者隂陽之和萬物之靈爽也三者致道之機要求仙之所寶也衆真語録學道求生西城真人謂王子登褒曰夫學道者諒不可以倉卒期求生者不可以立爾綜子求生雖篤而未見其涯慕道雖勤而未啓其門殆猶㳂湧波以索鳥巢尋長木而訪淵鱗爾是故子心疲於導引而朱宫為之喪潰肺弊於理炁故神華為之凋落肝勞於視盼而魂精為之遼索脾竭於守神而丹田為之閡滯腎困於經緯而津液為之不澤膽鋭於趣競故四肢為之亂作五臟相攻六府顛覆三焦滯而不瀉八關絶而無續賴釩飯以勁汝身恃丹青以固汝内爾正可却衰白之凋折猶不免必死之期㑹徒有萬年之夀豈足貴乎王君内傳養夀彭祖告采女曰養夀之道但莫傷之而已夫冬温夏凉不失四時之和所以適身也美色淑資幽閒娛樂不致思慾之惑所以通神也車服威儀知足無求所以一志也八音五色以悦視聴所以導心也凡此皆以養夀而不能斟酌之者反以速患夫逺思彊記傷人憂喜悲哀傷人喜樂過差忿怒不解傷人汲汲所願傷人隂陽不順傷人有所傷者數種而獨戒於房中豈不惑哉神仙傳九貞九貞者九天之貞氣凝而成也上中下三貞生於太清是元始之澄氣也各置宫室次第上清行衞之宫太上太道君萬貞之主也居玉殿造上帝之章以為寶經於王清宫中以度後學得貞之士太上正法經中極中極貞人主人命籍九華貞人主九幽之上宿對生死太元貞人受天地之符度長夜之魂太極貞人治赤城玉洞之府司校大山死生之籙三元貞人主紫㣲行道靈寳隠書瑶臺崑崙瑶臺刋定真經之所也上品居上清擬皇帝之尊中品處中道皆公卿之位下品居三元之末並大夫之流三貞品經各有條次登真隠訣閬野閬野者閬風之府是也崑崙上有九府是為九宫太極為太宫諸仙皆是九宫之宫僚耳至於真人乃九宫之公卿也南真記陽臺王屋山仙之别所謂陽臺也始得道者皆詣陽臺是清虚之宫也凌毁大道道科凡故意凌毁大道及福地靈壇殃流三世立法三品道家立法厥品有三上標老子次述神仙下襲張陵太上為宗夫標名大道而敎甚於俗舉号太上而法窮下愚何故知耶貪夀忌天含識所同故肉芝石華譎以翻騰好色觸情世所莫異故黄書御女誑稱地仙肌革盈虚羣生共愛故寶惜洟唾以灌靈根避災苦病民之恒患故斬縳魑魅以快愚情慿威恃武俗之舊風故吏兵鉤騎以動淺心至於消災淫術厭勝姦方事合氓庶故比屋歸宗是以張角李𢎞毒流漢季盧􅀈孫恩亂盈晉末餘波所被寔蕃有徒糜費産業蠱惑士女運迍則蠍國世平則蠧民𢎞明集滅惑論首冠黄巾者卑鄙之相也皮革苫頂者莫非華風也販符賣籙者天下邪俗也搏頰扣齒者倒惑之至也反縛伏他者地獄之貌也符章含氣者姦狡之窮也戎華論上清經陸修静宋明帝太始七年因勑而上上清經目既云隠在天宫爾來一百餘年不聞天人下降不見道士上昇不知此經從何至此昔文成書以飯牛詐言王母之命而黄庭元陽以道換佛張陵創造靈寶吳赤烏時始出上清起於草𤣥宋齊之間乃行鮑静造三皇事露而被誅文成書飯牛致戮於漢世今之學者又踵其術又可悲乎笑道論去五情老子語尹喜曰若求學道先去五情一父母二妻子三情色四財寶五官爵若除者與吾西行喜精鋭因㫁七首來老笑曰吾試子心所殺非親乃禽獸耳伏視七頭為七寶七尸為七禽喜疑反家七親皆存消氷經仙僊老而不死曰仙僊遷也遷入山也故制字人傍山也釋名變形惟昔聖賢懐𤣥抱貞體服九鼎化淪與并含精養神通徳三元精液腠理筋骨致堅衆邪闗除正氣常存累積長乆變形而仙周易參同契魏伯陽者吳人也好道不仕修已養髙後入山餌神丹仙去􅁧㕘同契其説以周易爻象論作仙丹之意而世不知神丹之事多作隂陽注之殊失其㫖三洞珠囊求仙求仙者要當以忠孝和順仁信為本若徳不修而但務方術終不得長生也行惡行大者司命奪紀小過奪筭隨所犯輕重故所奪有多少抱朴子三神山蓬萊方丈瀛洲此三神山者其傳在渤海中盖嘗有至者諸仙人及不死之藥皆在焉其物禽獸盡白而黄金銀為宫闕未至望之如雲及到三神山反居水下臨之風輒引去終莫能至云世主莫不甘心焉史記登雲天黄帝采首山銅鑄鼎於荆山下鼎既成有龍垂胡髥下迎黄帝黄帝上騎羣臣後宫從上龍七十餘人龍乃去餘小臣不得上乃悉持龍髥龍髥拔墮墮黄帝之弓百姓卬望黄帝既上天乃抱其弓與龍髥號故後世因名其處曰鼎湖其弓曰烏號郊祀志黄帝得道以登雲天莊子木工赤將子輿者黄帝時人不食五穀啖百草花至堯時為木工能隨風雨上下列仙傳陶正寗封子者為黄帝陶正有人過之為其掌火能出五色烟積火自燒而隨烟氣或上或下上食松偓佺者槐山採藥父也好食松實形體生色長數寸兩目更方能飛行逐馬走以松子遺堯堯不暇服也松者簡松也時人受服者皆至二三百嵗焉上食桂彭祖姓籛名鏗帝顓頊之孫陸終氏之中子歴夏至殷末八百餘嵗常食桂芝善導引行氣歴陽有彭祖仙室前世禱請風雨莫不輒應上莊子疏云堯封於彭城其道可祖故謂之彭祖列仙傳云歴夏經殷七百六十嵗而不衰老後西游之流沙不知其終也故羅隠碑文云水運降靈始分輝於𤣥帝仙源啓祚乃襲慶於彭墟星辰浮濮渚之陽雲鸐度游沙之境也仙苑編珠趙次公云徐州彭城縣以彭祖得名寰宇記云今墓此故邑號大彭廬山名賢傳云彭鏗曽過彭蠡之濱造其名嶽今廬山是也真仙通鑑弄鳯蕭仙者以周宣王十七年五月五日生宣王之末史籍散亂蕭仙能文著本末以備史之不及人以史目之實無名也行第三浪迹入秦善吹簫能致孔雀白鶴於庭穆公有女名弄玉善吹笙無和者求得吹笙者以配孟明薦史因召見秦侯問史云善簫曰吾女好笙子簫也奈何史以不稱㫖退女在屛門呼曰試使吹之一聲而清風生再吹而彩雲起三吹而鳯凰來女曰是吾夫也願嫁之史曰女亦且吹笙且三吹之如史所感於是孟明為媒蹇叔為賔仙鑑公以弄玉妻之遂敎弄玉作鳯鳴居十數年吹簫似鳯聲鳯凰來止其屋公為作鳯臺夫婦止其上不飲不食不十數年一旦㺯玉乗鳯蕭史乗龍昇天而去秦為作鳯女祠時聞簫聲仙傳拾遺老子老子者姓李氏名耳字伯陽諡曰耼周守藏室之史也孔子適周將問禮於老子老子修道徳其學以自隠無名為務居周乆之見周之衰乃遂去至闗闗令尹喜曰子將隠矣彊為我著書於是老子乃著書上下篇言道徳之意五千餘言而去莫知其所終盖老子百有六十餘嵗或言二百餘嵗以其修道而養夀也老子隠君子也老子之子名宗宗為魏將封於叚于宗子注注宫宫𤣥孫假假仕於漢孝文帝而假之子解為膠西王卬太傅因家于齊焉李耳無為自化清静自正史記耼父張重華讌羣寮于閑豫庭講論經義顧謂索綏曰老耼父字為何綏曰耼父名乾字元果胎刵無耳雙目不明孤單年七十二無妻與鄰人益夀氏老女野合懐胎十年乃生老子前凉萬史記王儉百家譜云李者髙陽之後始祖咎繇為掌理官因遂氏焉李氏之興起於耼也自耼之前未有李姓唯氏理焉以樹下生乃稱李氏老子之子名宗仕魏文侯盖春秋之末六國時人也文王之世既無李姓何得有耼出為周師乎辨正論太上老君有黄巾李仲卿太上老君託神𤣥妙玉女剖左腋而生上案盧景裕戴詵韋處𤣥等集解五千文及梁元帝周𢎞政等考義類云太上有四謂三皇及堯舜是也言上古有此大徳之君臨萬民之上故云太上也郭莊云時之所賢者為君材不稱世者為臣老子非帝非皇不在四種之限有何典據輒稱太上耶世出老子或云上三皇時為𤣥中法師下三皇時為金闕帝君伏羲時為鬱華子神農時為九靈老子祝融時為廣夀子黄帝時為廣成子顓頊時為赤精子帝嚳時為禄圖子堯時為務成子舜時為尹夀子夏禹時為貞行子殷湯時為錫則子文王時為文邑先生一云守藏史或云在越為范蠡在齊為鴟夷子在吳為陶朱公皆見於羣書不出神仙正經皆由晩學之徒好竒尚異茍欲推崇老子故有此説神仙傳陶朱者即范蠡也既事越王勾踐君臣囚吳石室嘗屎飲尿亦以甚矣今尊崇其術不亦昧乎又蠡子被戮於楚何為不行父術變化而自免乎笑道論造天地經老子託幽王皇后腹即幽王之子也身為柱史即幽王之臣也若審知者幽王為犬戎所殺豈可不授君父與神符令不死乎化胡經云老子在漢為東方朔夫漢武窮兵疲役中國天下户口至減大半老子為東方朔者何忍不與辟兵辟穀之符厭人咒鬼之方以護漢國乎眼看流弊若此無心取救將非欺誑之謬乎千嵗翁安期先生者瑯琊阜鄉人也賣藥於東海邊時人皆言千嵗翁秦始皇東遊請見與語三日三夜賜金璧度數千萬出於阜鄉亭皆置去留書以赤玉舄一量為報曰後數年求我於蓬萊山始皇即遣使者徐市盧生等數百人入海未至蓬萊山輒逢風波而還列仙傳李少君字雲翼好道入泰山採藥修絶穀全身之術遇安期生少君疾困叩頭乞活安期以神樓散一匕與服之即愈乃上言臣能凝澒成白銀飛丹砂成黄金服之白日升天身竦則凌天伏入無間控飛龍而入遐遍乗白鴻而九陔周𠖇海之棗大如𤓰鍾山之李大如瓶臣食之遂生竒光師安期授臣口訣是以保萬物之可成也於是上甚尊敬為立屋第漢武内傳少君言於帝曰臣嘗遊海上見安期生食巨􅀥大如𤓰安期生仙者通蓬萊中合則見人不合則隠史武紀少君有不死之方而家貧無以市其藥物故出於漢以假途求其財道成而去董仲舒少君家録少君之將去也武帝夢與之共登嵩髙山半道有使者乗龍持節從雲中下云太一請少君帝覺以語左右曰如我之夢少君將舍我去矣數日而少君稱病死乆之帝令人發其棺無尸唯衣冠在焉漢禁中起居注上士舉形昇虚謂之天仙中士遊於名山謂之地仙下士先死後蛻謂之尸解仙仙經韓衆告劉根云夫仙道有昇天躡雲者有遊行五岳者有服食不死者有尸解而仙者凡脩仙道要在服藥藥有上下仙有數品不知房中之事及行氣導引并神藥者亦不能仙也神仙傳犬吠雲中淮南王安愛道術之士有八公詣門曰聞王好士故來相從王乃朝夕朝拜授王丹經三十六卷時雷被伍被乃告王反八公謂王曰可以去矣乃使安登山大祭埋金地中即白日昇天八公與安所至山上石皆陷成跡至今人馬跡猶存時人傳八公安臨去時餘藥器置在中庭雞犬䑛啄之盡得昇天故雞鳴天上犬吠雲中也上鞠道龍説淮南王好方士方士授之術見遂有畫地成江河撮土為山巖嘘吸為寒暑吐𠻳為雨霧王亦卒與諸方士俱去西京雜記斥仙河東蒲坂有項㬅都者與一子入山學仙十年而歸家家人問其故㬅曰在山中三年精思有仙人來迎我共乗龍而昇天及到天上先過紫府金牀玉几晃晃昱昱真貴處也仙人但以流霞一盃與我飲之輒不飢渴忽然思家到天帝前謁拜失儀見斥來還令當更自修積乃可得更後矣昔淮南王劉安昇天見上帝而髙坐大言自稱寡人遂見謫守入㕑三年吾何人哉河東因號㬅都為斥仙抱朴論衡仙人將我上天居月傍甚寒虚妄夫神仙之書道家之言一云傳説上為辰尾宿嵗星降為東方朔淮南王安誅於淮南而謂之獲道輕舉鉤戈死於雲陽而謂之屍逝柩空其為虚妄甚矣哉又世虚然有仙人之説仙人者儻猱猨之屬與世人得道化為仙人乎夫雉入海為蛤䴏入海為蜃當其徘徊其翼差池其羽猶自識也忽然自投神化體變乃更與黿鼈為羣豈復自識翺翔林薄巢垣屋之娛乎牛哀病而為虎逢其兄而噬之若此者何貴于變化耶而顧為匹夫所謂納虚妄之詞信眩惑之説隆重以招弗臣傾産以供虚求散王爵以榮之清閒館以居之經年累稔終無一効或歿於沙丘或崩乎五柞臨時雖誅其身滅其族紛然足為天下笑矣然夀命長短骨體强劣各有人焉善養者終之勞擾者半之虚用者殀之其斯之謂歟辨道論劉根不覺飢渴或謂能忍盈虚王仲都當盛夏之月十爐火炙之不熱當嚴冬之時裸之而不寒桓君山以為性耐寒暑桓君山以無仙道好竒者為之愽物志仙術誕妄源流乆矣韓終徐福始詐於秦邦文成五利紹偽於漢國叙控鶴弗目陵雲之實言餐霞莫覩療飢之信致有猱猨蜃蛤之論繫風捕影之談故棄實瓠者以非器也廢石田者以絶蓺也賤左道者以虚偽也辨正論絶穀道家潛居㫁粮䖍修仙術僕聞老氏有五味之誡而無絶穀之訓矣是以蟬蛾不食君子誰重蛙蟒穴藏聖人何貴且自古聖賢莫不歸終吾子獨云不死何斯濫乎故舜有蒼梧之墳禹有㑹稽之陵周公有改葬之篇仲尼有兩楹之夢曽參有啓足之辭顔回有不幸之歎慧通駁夷夏論鼎湖亡返嶠山之冡獨存流沙不歸扶風之隴空樹皇覽云黄帝冡在嶠山老子冡扶風辨正論西王桃實屢熟而靡延東海桑田數變而非永五雲九轉悲繩鳥之暫留飛雪𤣥霜比遊駒以難固信終馗無大椿之乆蜉蝣罕龜鶴之年上夫滅身以懼大患絶智以避長勞議生靈於懸疣齊泯性於王樂盖老莊之談也且綿綿常住古皇則不死不終繩繩無名老氏則復歸無物然常存非永沒之稱無物豈長生之化耶上丹臺周乂山遇羨門子髙叩頭乞長生羨門曰子名在丹臺玉室之中何憂不仙真人周君内傳謝自然泛海將詣蓬萊求師船為風飄到一山見道人指言天台山司馬承􅐃名在丹臺身居赤城此真良師也蓬萊隔弱水三十萬里非舟楫可行非飛仙無以到續仙傳金格青童君告趙旭曰君宿世有道骨法應仙然名已在金格相當與吹洞簫於紅樓之上撫雲璈于碧落之中心死可以身生保精可以致神通幽記道可心得宣平坊賣錢貫王老善黄白之術賀知章信重之與夫人持一明珠上老人自云保惜多時者老人即付童子市胡餅延賀賀意甚不快老人曰夫道者可以心得慳惜未止術無由成須山谷勤求非市朝所授也賀悟謝而去數日失老人所在賀因求入道還鄉原化仙墟薛𤣥貞者遨遊雲泉得長生之道常於五嶺間棲憩毎遇人曰九疑五嶺神仙之墟山水幽竒烟霞勝異如陽朔之峯巒挺拔博羅之洞府清虚不可忘也所以祝融棲神於衡阜虞舜登仙於蒼梧赫胥耀跡於潛峯黄帝飛輪於鼎湖其餘髙貞列仙人臣輔相騰翥逍遥者無山無之仙傳拾遺兩塵韋子威躭玩道術叔採訪使有步卒丁約者周旋恪勤子威頗私之一日辭欲他適謂子威曰何謂兩塵對曰儒謂之世釋謂之刼道謂之塵善堅此心亦復遐夀唐闕史道士行大道人行大道號曰道士士者何理也事也身心順理唯道是從從道為事故稱道士太霄書經幽逸周穆王尚神仙因尹貞人草制樓觀遂召幽逸之人置為道士樓觀本記父母師友凡道士道徳為父神明為母清浄為師太和為友大戒三百以杜未兆之禍威儀二千以興自然之福陸法師五道道士有五一天貞道士髙𤣥皇人之流也二神仙道士杜冲尹軌之例也三山居道士許由巢父之比也四出家道士宋倫彭諶之匹也五在家道士黄瓊籛鏗之倫也三洞道科上座道士有上中下深於道多者名上座老子立徳經朱字鳯文明光映軒上座𤣥黄中序天貞洞貞隠𤣥經三景凡遵三景稱三景弟子已度三人付師友已從傳授得稱三景法師太上入素貞經天師張陵字輔漢沛國豐人也本大儒晚學長生之道得九鼎丹經聞蜀中多名山乃入鳴鵠山著道書二十篇仙去貞誥張天師道陵隠龍虎山修三元黙朝之道得黄帝龍虎中丹之術丹成服之能分形散景天師自鄱陽入嵩髙山得隠身制命之術集仙録陵學道於蜀鶴鳴山時蜀中人鬼不分災疾競起感太山老君降授正一盟威法如分人鬼置二十四治至今民受其福有戒鬼壇見在正一經陵七試弟子與趙昇王長三人皆白日冲天而去衆弟子仰視之乆乃沒于雲霄也神仙傳上清真符令玉女二人引陵與夫人雍氏于雲臺峯白日昇天仙鑑陵將秘籙斬邪劍玉冊玉印授子衡與雍氏上昇上按一道陵而所載紛紛若此故知罔世惑衆係風捕影谷永之説信矣三師漢書曰張陵子衡為係師衡子魯為嗣師號曰三師三人之妻為夫人皆云白日昇天笑道論張鎮南在北洞北石壇上燒香禮拜固伏而不起遂乃夜解明旦視之形如生此壇今猶存真誥衡以真人之法付係師與妻盧氏得道陽平山白日飛昇仙鑑操西征魯以手板畫地成河兵不得渡使者以水師至岸魯又以手板葢其河水中輒出髙峯兵不能進曹公遣使封之不固後脩諫白日乗龍昇天上米賊沛國張陵學道於蜀鶴鳴山遊作道書自稱太清𤣥元以惑百姓其來學者初名鬼卒受道者用金帛之物號為祭酒各領部衆衆多者名治頭其供通限出五斗米故世號米賊道陵死子衡行其道衡死魯復行之魯母有姿色兼挾鬼道往來益州牧劉焉之家焉以魯為督義司馬住漢中焉死子璋立以魯驕恣不順盡殺魯母家室魯遂據漢中以鬼道化氏自號師君大都與張角相似雄據巴漢垂三十年曹操征魯魯走巴中弟衛横山下陽平城以拒之夜有野糜數千突壊衛營衛大驚懼以為大軍見掩遂降閻圃説魯降曹公或西歸劉備魯勃然曰寧為曹公作奴不為劉備上客遂委質曹公拜鎮南將軍華陽志蜀魏志世語破邪論蛇噏張陵避􅒻丘社中得咒鬼之術書遂解使鬼法熹平末為蟒蛇所噏子衡奔出尋屍無所畏負清議之譏乃假設權方以素靈化之迹生縻鵠足置石崖頂謀事辨畢尅期發之到光和元年遣使告曰正月七日天師昇𤣥都米民山獠蟻集閾外雲臺治民等稽首再拜言伏聞聖駕𤣥都臣等常辭䕃接尸塵方享九幽方夜衡入乆之乃出詭稱曰吾旋駕晨華爾各還所治净心持行存師念道衡便密抽遊罥鶴直衝虚空民獠愚戅僉言登仙販死利生欺罔天地逆莫過此之甚也李膺蜀記𤣥光辨惑論見梁𢎞明集謀亂後漢順帝中有沛人張陵客游蜀土聞古老相傳云昔漢髙祖應二十四氣祭二十四山遂王有天下陵不度徳遂搆此謀殺牛祭祀二十四所置以土壇戴以草屋稱二十四治治館之興始乎此也二十三所在于蜀地尹喜一所在于咸陽於是誑誘愚民招合兇黨歛租税米謀為亂階時被蛇吞逆舋弗作至孫張魯禍亂方興起于漢中明槩决對傳奕事于時假託神言黄衣當王魯因與張角相應合集部衆並戴黄巾披道士之服數十萬人自據漢中垂三十載後為曹公所破黄巾始滅破邪論張陵棄婦見陵𫝊上夫國志等書去陵不逺其三張之偽接于耳目者當不誣也而道書依託詭説流傳不悟焉悲夫三張後魏之世嵩山道士冦謙之自謂遇太上老君云張陵去世無所師授授汝天師之位賜汝雲中音舖科誡二十篇號曰並進汝宜宣吾新科清整道敎除去三張偽法租米錢税及男女合氣之術大道清虚寧有斯事什老志道家方術以昇仙為神因而誑惑偷潤目下昔徐福欺妄分國於夷丹文成五利妖偽於漢世三張詭惑於西梁孫恩搔擾於東越此之巨蠧自古稱誣辨惑論逐聲潁川郤儉能辟穀餌茯苓甘陵甘始名善行氣老而少容廬江左慈知補導之術並為軍吏初儉至之所茯苓價暴貴數倍議郎安平李章學其辟穀食茯苓飲寒水水寒中泄利殆至殞命後始來衆人無不鴟視狼顧呼吸吐納軍祭酒𢎞農董芬為之過差氣閉不通良乆乃蘇左慈到又競受其補導之術至寺人嚴峻往從問受奄豎真無事於斯術也人之逐聲乃至於是也典論招致世有方士吾王悉所招致甘陵有甘始廬江有左慈陽城有郄儉始能行氣導引慈曉房中之術儉善辟穀悉号三百嵗本所以集之於魏國者誠恐斯人之徒接姦詭以欺衆行妖慝以惑人故聚而禁之豈復欲觀神仙於瀛洲求安期於邊海釋金輅而顧雲輿棄文驥而求飛龍哉甘始者老而有少容自餘術士咸共歸之然始詞繁寡實頗竊有怪言余嘗密問其所行始言本師姓韓字世雅嘗與師於南海作金投數萬斤於海又言取鯉魚一雙令其一著藥投沸膏中鯉奮尾鼓鰓其遊行沈浮有若處淵其無藥者已熟而可噉余問寧可試不言此藥去此踰萬里始不自行不能得也始若遭秦始皇漢武帝則復徐福欒大之徒矣桀紂殊世而齊惡姦人異代而等偽乃如此耶辨道論術道相須張殖遇道士姜𤣥辨以六丁驅役之術授之謂曰術之與道相須而行道非術無以自致術非道無以延長若得術而不得道亦如欲適萬里而足不行也術者雖萬端隠見未除死籙固當棲心妙域注念丹華立功以助其外鍊魄以存其内内外齊一然後可適道可以長存也仙傳拾遺三毒毘陵道士李褐性偏急好陵侮人忽有貧士詣褐乞食褐不之與加以叱責弗顧數日有乗白馬來者禮接之曰頗相記乎視其貌乃前之貧士也謂褐曰子知有寒山子邪答曰知曰即吾是矣吾始謂汝可敎今不可也修生之道除嗜去欲嗇神抱和所以無累也内抑其心外檢其身所以無過也先人後已知柔守謙所以安身也善推於人不善歸諸身所以積徳也功不在大立之無怠過不在大去而不貳所以積功也然後内行充而外丹至可以冀道於髣髴耳子之三毒未剪以冠簪為飾可謂虎豹之鞟而犬豕之質也出門乗馬而去竟不復見上濁穢道家方術濁穢不清乃扣齒為天鼓咽唾為醴泉馬屎為靈薪老鼠為芝藥資此求道焉能得乎辨惑論喚婦女為朱門呼丈夫為玉柱口唾為玉液破邪論火仙外道名吉波頭水仙外道名夷叔羅閹人自黄老風澆容服亦變非道非俗諺号閹人善詛善罵古名鬼卒其救苦也則解髮繫頸以繩自縳牛糞塗身互相鞭打其法律也若失符籙則倒銜手板逆風掃地楊枝百束自斫自負盜奏章也則匍匐灰獄背負水漚責罰尤重同奴𨽻之法罪譴銜伏比畜生之類辨正觀樓觀樓觀者昔周康王大夫闗令尹喜所立也以其結草為樓因即為號周穆王西遊秦文東獵並枉駕迴輪親崇道敎始皇建廟於樓南漢武立宫於觀北晉宋謁板于今尚存樓觀碑玉梁漢武時玉笥山民感山之靈異或愆旱災蝗祈之無不應乃相謂曰可置一觀彰表靈跡構殿闕中梁一條邑民將𨕖竒材經數旬未獲忽一夜震雷風烈達曙乃晴天降白玉梁一條可其尺度嚴安其上光彩瑩目因號為玉梁觀至魏武時遣使取之至其山門去觀數里亭午之際雷霆大震烈殿脊化為白龍擘烟霧而去沒觀之東山下自玉梁飛去後其處莫能近之皆為猛獸毒蛇所逼玉笥山録玉局成都玉局觀相傳永夀初老君與張道陵至此有局脚玉牀自地而出老君昇坐為陵説南北斗經既去而座隠地中因成洞穴故以玉局名之彭乗記陽平沙門號曰道人陽平呼為道士僧順三破論凡有二十四治而陽平一治最為大者今道士上章及奏符厭皆稱陽平重其本也以上清為洞𤣥靈寶為洞真三皇為洞神故曰三皇蜀記張守珪有役人將去自云陽平洞謫仙守珪曰洞府大小與人間城闕相類否對曰二十四化各有一大洞或方千里五百里三百里其中皆有日月飛精謂之伏晨之根下照洞中與世間無異其中皆有仙王仙官卿相輔佐如世之職司有得道之人及積功遷仙返生之士皆居其中以為民庶毎年三元大節諸天各有上真下遊洞天以觀其所為善惡人世生死興廢水旱風雨預闗於洞中焉龍神祠廟血食之司皆為洞府所統二十四化之外青城峨嵋益登慈母繁陽嶓冡皆亦有洞不在十大洞天三十六小洞天之數仙拾太清宫亳州真源縣太清宫老君降生之宅也九井三儈俱存咸通中龎勛據徐州欲奪宫為營壘有黒氣自九井中出昏曀一川勛黨迷道自相蹤踐廣明中黄巢將領欲焚其宫亦有黒霧遍川迷失行路刺史潘稠奏云自大冦犯闕之後羣兇誅殄以來大小冦逆前後一十八度欲犯太清宫或迷失道途或龍神示見終挫兇計宫城宴然清移真源縣就宫安置道敎靈驗記天中記卷三十六
