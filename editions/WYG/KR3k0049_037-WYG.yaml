body:
  text: 天中記卷三十七明陳耀文撰經典經經徑也典常也如徑路無所不通可常用也釋名聖制聖人制作曰經賢人着述曰傳因記訓曰詁因章句曰註愽物志書鈔賢者著述曰記曰章句曰解曰論曰讀御覧五經作法五經運之天地稽之圖象質於三王施之四海也春秋演孔圖羣言之祖三極彛訓其書言經經也者恒久之至道不刋之鴻教也易張十翼書標七觀詩列四始禮正五經春秋五例義既極乎情性辭亦匠於文理可謂太山徧雨河潤千里者也讚曰性靈鎔匠文章奥府淵哉鑠乎羣言之祖文心雕龍道藝之淵正經為道藝之淵海子書為増深之川流猶景星之佐三辰林薄之禆喬嶽者也抱朴子文章之府詩之雅頌書之典謨文質足以相副玩之若近㝷之若逺浩乎文章之淵府也𫝊子經海夫五經則四海也傳記則四瀆也諸子則涇渭也至於百川溝洫畎澮茍能通陰陽之氣逹水泉之流以四海為歸者皆益也楊泉物理論府藏五經為府藏雜藝為庖厨髙彪集庖厨六經為庖􅌮百家為異饌也傳幹與蘓文師書琴筝退隠之士三墳為金玉五典為琴筝講肆為鍾皷百家為笙簧抱朴子嘉論林藪易一曰連山二曰歸藏三曰周易連山八萬言歸藏四千三百言古文尚書舊有四十五卷為十八篇古秩禮記有五十六卷古論語有一十一卷古孝經一卷二十章千八百七十二字今異者四百餘字葢嘉論之林藪文義之淵海也桓譚㫁論莫􅂈立君臣設尊卑杜將漸防未萌莫􅂈乎禮哀王道傷時政莫過乎詩導陰陽示悔吝莫過乎易明善惡知廢興吐辭令莫過乎春秋量逺近賦九州莫過乎尚書知人情動風俗莫過乎樂治刑名審法術莫過乎商韓載百王紀治亂莫過乎史漢式軻之徒溷淆其間世人見其才易登其意易過於是家著一書人書一法雅人君子投筆硯而髙視蘓子不刋之典穆宗常謂侍臣曰朕欲習學經史何先薛放對曰經者古先聖之至言多仲尼所發明皆天人之極致誠萬代不刋之典也論語者六經之菁華孝經者人倫之大本窮理執要真可謂聖人至言是以漢朝論語首列學官光武令虎賁之士皆習孝經舊唐臆説鄭康成多臆説人見其名學謂有所出也證案大事要在五經四部書如非此文近為妄矣若子所執以為郊天皷必當麒麟之皮也冩孝經本當曽子家䇿乎孔融與諸卿書七緯七緯者易緯稽覧圖乾鑿度坤靈圖通卦驗是類謀辨終備也書緯璇璣鈴考靈耀刑徳收帝命驗運期授也詩緯推度災記歴樞含神務也禮緯含文嘉稽命徴斗威儀也樂緯動聲儀稽耀嘉叶圖徴也孝經緯授神契鈎命决也春秋緯演孔圖元命包文耀鈎運斗樞感精符合誠圖考異郵保乾圖漢含孳佑助期握誠圖濳潭巴説題辭後樊英𫝊易三易按周禮筮人氏掌三易夏曰連山殷曰歸藏周曰周易解此不同按杜子春云連山伏羲也歸藏黄帝也難曰按禮記曰我欲觀殷道得坤乾焉今歸藏先以坤後乾則知是殷明矣推歸藏既在殷製連山理是夏書金樓子道籥孔子曰易者易也變易也不易也管三成德為道苞籥易者其徳也光明四通簡易立節天以爛明日月星辰布設張列通精無門藏神無穴不煩不擾澹泊不失此其易也變易者其氣也天地不變不能通氣五行迭終四時更廢君臣取象變節相移能消者息必專者敗此其變易也不易者其位也天在上地在下君南面臣北面父坐子伏此其不易也故易者天地人之道也乾鑿度管猶兼也一言而兼此三事以成其道徳苞之美齊魯之間名門户及藏器之管為籥鄭𤣥注始太極孔子曰易始於太極太極分而為二七九八六故生天地天地有春冬夏之節故生四時四時各有陰陽剛柔之分故生八封八卦成列天地之道立雷風水火山澤之象定矣乾鑿度象陽法陰孔子曰陽三陰四位之正也易卦六十四分而為上下象陰陽也陽道純而竒故上篇三十以象陽陰道不純而偶故下篇三十四以法陰上象天叶厯易者氣之節含精宣律上經象天下經叶歴文言立符符信象出期節象兩也出期節者若以至日閉闗商旅不行后不省方之北也彖言變化繫設類迹春秋説題辭正本遂皇燧人始出握機矩表計寘其刻白蒼牙通靈伏羲昌之成文王孔演命明道經􅀢羲作易仲命徳維紀衡仲謂四仲之卦震兑坎離也維者四角之卦艮巽坤乾也周文増通八八之節轉序三百八十四爻以繫王命之瑞故正其本而萬物理失之毫釐差以千里易通卦驗漢馬遷傳差以史失之毫釐謬史差以千里注師古曰今之易經及彖象繫辭並無此語易緯則有之葢易象之别記者也見王注今本無經解引易此語孔頴逹䟽曰此易係辭文也歐陽永叔傳易圖序云余讀經解此語今易無之豈易今亦有亡者耶是亦不得為全書也選竟陵王行狀注引易乾鑿度云云讀易孔子讀易韋編二絶鐡擿撾三折漆書三㓕論證史世家韋編三絶抱朴子古強云三絶三折云九師易者淮南九師道訓者淮南王安所造也七畧淮南王安聘明易者九人號九師説漢書音義五子所校讐中古五子書除復重定著十八篇分六十四卦著之曰辰自甲子至壬子凡五子劉向别録東南之美虞翻與少府孔融書并示以所著易涇融答書曰聞延陵之理樂覩吾子之治易乃知東南之美者非徒㑹稽之竹箭也又觀象雲物察應寒溫原其禍福與神合契可謂探頥窮通者也呉志孔答書曰示所著易傳自商瞿以来舛錯多矣去聖彌逺衆説騁辭曩聞云云王覧引後漢書易道在天虞翻初立易注奏上曰臣郡吏陳桃夣臣與道士相遇放髪被鹿裘布易六爻撓其三以飲臣臣乞盡吞之道士言易道在天三爻足矣别傳無體禇澄與王儉書論立鄭王易注曰易彌天地之道通萬物之情雖有異家之學同以象數為宗葢無體不可以一體永屢遷不可以一遷執也儉答曰易體微逺實貫羣籍施孟異聞周韓殊㫖豈可專據小王便為該備依舊存鄭髙同來説南齊書不讀易虞世南云不讀易不可為宰相坤鑿度注旨難明五鹿充宗與諸儒講而朱雲折之何晏不了九事而伏曼容輕之王弼訓注於六爻變化五氣相推多所擯畧而孫盛短之周洪正於講席辨析名理而張譏屈之玉海書上帝之書尚書者二帝之迹三王之義所以推其期運明命授之際書之言信而明天地之情帝王之功凡百二篇第次委曲尚者上也上帝之書也春秋説題辭鄭𤣥書贊云孔子乃尊而命之曰尚書玉海引正義大訓孔安國尚書序云典謨訓誥誓命之文凡百篇所以恢𢎞至道示人主以􅁤範也故歴代寳之以為大訓也謹按此書多録正事堪為國訓家之􅁤則故曰大訓北堂墳典三墳五典粲粲如列宿落落如連珠也顧子義訓賈逹云三墳三王之書五典五帝之典延篤言張平子説三墳三禮禮為人防五典五帝之常道馬融説三墳三氣陰陽始生天地人之氣也五典五行也諸家各以意言春秋正三墳之目見於孔序漢志不載元豐七年毛漸奉使京西得之其書以山氣形為别山墳謂之連山氣墳歸藏形墳坤乾與先儒言三易異其中有姓紀一篇皇䇿一篇政典二篇合為三卷皆依託也中興書目論事子夏讀書既畢而見於夫子夫子謂曰子何為於書子夏對曰書之論事也昭昭然若日月之代明離離然若参商之錯行上有堯舜之道下有三王之義凡古之弟子所受書於夫子者志之於心弗敢忘雖退而窮居河濟之間深山之中作壤室編蓬户常於此彈琴以歌先王之道則可以發憤忘憂矣書大傳孔叢子古文杜林字伯山從張竦受學􅀶洽多聞時稱通儒於西州得漆書文文尚書一卷常寳愛之衛宏徐廵皆受林學出古文示宏曰林離流兵亂常恐此經將絶何意衛子徐生復能傳之是斯道竟不墜地也古文雖不合時務然禮失求之於野古文不猶愈於野乎願諸生無悔所學古文遂傳於世東觀記臯謨周誥論者或恠亮文彩不豔而過於丁寧周至臣愚以為咎繇大賢也周公聖人也考之尚書咎繇之謨畧而雅周公之誥煩而悉何則咎繇與舜禹共談周公與羣下矢誓故也亮所與言盡衆人凡士故其文指不及得逺也三國志改頗為陂典謨既作雖曰不刋文字或訛豈必相襲朕每讀尚書洪範至無偏無頗遵王之誼三復斯文並皆恊韻唯頗一字實則不倫又周易㤗卦中無平不陂釋文陂字亦有頗音陂之與頗訓詁無别為陂則文亦㑹意為頗則聲不成文應由煨燼之餘簡編墜缺傳授之餘差舛相仍宜改頗字為陂仍宣示國學唐𤣥宗詔百二篇孔子求書得黄帝𤣥孫帝魁之書迄於秦穆公凡三千二百四十篇㫁送取近定可以為世法者百二十篇以百二篇為尚書十八篇為中候書緯詩言志書曰詩言志歌詠言故哀樂之心感而歌詠之聲發誦其言謂之詩詠其聲謂之歌故古有采詩之官王者所以觀風俗知得失自考正也藝文志喻志古者諸侯卿大夫交接鄰國以㣲言相感當揖讓之時必稱詩以喻其志葢以别賢不肖而觀盛衰也御覧藝文志志之所之詩者志之所之也在心為志發言為詩情動於中而形於言子夏毛詩在事為詩未發為謀恬淡為心思慮為志故詩之為言志也説題辭天地之心詩者天地之心君徳之祖百福之宗萬物之户也詩含神霧詩者天文之精星辰之度春秋説題辭四始五際建四始五際而八節通卯酉之際為革政午𤣥之際為革命神在天門出入候聽詩推度災翼奉云竊聞齊詩聞五際之要十月之交篇注孟康曰詩内傳曰五際卯酉午戌亥也陰陽終始際㑹之歳於此則有變改之政前傳今本無注大明在亥水始也四牡在寅木始也嘉魚在已火始也鴻鴈在申金始也卯天保也酉祈父也午采苞也然則亥為革命一際也亥又為天門出入候聽二際也卯為陰陽交際三際也午為陰謝陽興四際也酉為陰盛陽㣲五際也汎歴樞翼奉曰詩有五際君臣父子兄弟夫婦朋友白帖郎顗曰四始之缺五際之戹其咎如此四始謂闗睢為國風之始鹿鳴為小雅之始文王為大雅之始清廟為頌雅之始後漢六情詩含五際六情演孔圖六情即六義一曰風二曰賦三曰比四曰興五曰雅六曰頌宋均注詩之也志之所之也興物而作謂之興敷布其義謂之賦事類相似謂之比言王政事謂之雅稱頌成功謂之頌隨作者之志而别名之也釋名物化物正夫風雅者體同而由我化物則謂之風物由我正則謂之雅考之禮教其歸不殊也周續之解集㣲揆著集㣲揆著上統元皇下序四始羅列五際宋均注集㣲揆著者綿綿𤓰瓞人之初生揆其如是必將至著有天下也含神霧言情詩以言情情者信之符也書以决斷斷者義之證也劉歆七畧春秋志在孔子在庶徳無所施功無所就志春秋秋行在孝經以春秋屬商孝經屬參孝經鈎命寶書閔因叙云昔孔子受端門之命制春秋之義使子夏等十四人求周史記得百二十國寳書九月經立感精符考異郵説題辭解疑論云聖人不空生受命而制作所以生斯民覺後生也西狩獲麟知天命云周赤帝方起麟為周亡之異漢興之瑞故孔子曰我欲託諸空言不如載諸行事又聞端門之命有制作之狀乃遣子夏等云云公羊䟽思存前業古之王者世有史官君舉必書所以慎言行昭法式也周室既㣲載籍殘缺仲尼思存前聖之業以魯周公之國禮文備物史官有法故與左邱明觀其史記據行事仍人道因興以立功就敗以成罰假日月以定厯數籍朝聘以正禮樂有所褒諱貶損大人當世君臣有威權執力其事實皆形於𫝊是以隠其書而不宣所以免時難也及末世口説流行故有公羊榖梁鄒夾四𫝊公榖立於學官鄒氏無師夾氏未有書藝文志左氏善於禮公羊善於䜟榖梁善於經六藝論左丘明張本繼末發明經意信多奇偉公羊高親受子夏辭義清􅖿斷决明審榖梁赤師徒相𫝊文清義約是以三𫝊並行莫能孤廢晉荀崧𫝊操戈何休字邵公作公羊𫝊解注妙得公羊本意作公年墨守左氏膏肓榖梁廢疾鄭𤣥乃發墨守鍼膏肓起廢疾休見而嘆曰康成入吾家操吾戈矛以伐我乎别𫝊囊括古今丘明之𫝊本模春秋博物盡變囊括古今表裏人事盧植奏事太官厨嚴翰字公仲善於春秋公羊時司𨽻鍾繇不好公羊而好左氏以左氏為太官厨公羊為賣餅家故嘗數與翰會辨析長短繇機摙善特論而翰訥口時屈無以應繇曰公羊高竟為丘明服矣翰曰直故吏為明公服爾公羊未肯也魏畧若雲若海左氏之傳史之極也文采若雲月高深若山海北堂相斫書隗禧字子牙魚豢嘗從問左氏傳禧答曰欲知幽㣲莫若易人倫之紀莫若禮左氏相斫書耳不足精意也魏畧經傳表裏左氏𫝊世後百餘年魯榖梁赤為春秋殘畧多所遺失又有齊人公羊髙縁經文作傳彌離其本事矣左氏經之與傳猶衣之表裏相持而成經而無傳使聖人閉門思之十年不能知也桓譚新論婦女讀誦劉子正子駿伯玉三人􅀹珎重左氏下至婦女讀誦上劉子政玩弄左氏童僕妻子皆呻吟之論衡道聽塗説公羊髙道聽塗説之書欲以鄉曲之辨論聖人之經非其任也袁淮正論詭辨之言杜預云公羊榖梁詭辨之言又非先儒所説也王隠晉書備聖經文備三聖之度春秋説題辭考符孔子作春秋陳天人之際記異考符春秋握成圖國之建本公扈子曰有國者不可以不學春秋生而尊者驕生而富者傲生而富貴又無鑑而自得者鮮矣春秋國之鑑也春秋之中弑君三十六亡國五十二諸侯奔走不得保其社稷者甚衆未有不先見而後從之者也説苑禮得事體禮體也言得事之體也釋名禮者體也履也統之於心曰體踐而行之曰履體之謂聖履之謂賢鄭序得天中和禮者體也人情有哀樂五行有興滅故立鄉飲之禮終始之哀婚姻之宜朝聘之表尊卑有序上下有體王者行禮得天中和斗居天中而有威儀王者法而備之是亦得天之中和也禮得則天下咸得厥宜陰陽滋液萬物調四時和動静常用不可須㬰惰也春秋説題辭國之幹子駟氏欲攻子産子皮怒之曰禮國之幹也殺有禮祸莫大焉乃止襄三十年天經地義子大叔見趙簡子簡子問揖譲周旋之禮焉對曰是儀也非禮也吉也聞諸先大夫子産曰夫禮天之經也地之義也民之行也天地之經而民實則之上下之紀天地之經緯也民之所以生也是以先王尚之故人之能自曲直以赴禮者謂之成人大不亦宜乎昭人之幹公至自楚孟僖子病不能相禮乃講學之茍能禮者從之及其將死也召其大夫曰禮人之幹也無禮無以立吾聞將有逹者曰孔邱聖人之後也我若獲免必屬説南宮敬叔與何忌於夫子使事之而學禮焉以定其位故孟懿子與南宮敬叔師事仲尼昭七可以為國陳氏厚施而民歸之晏子對景公曰惟禮可以已之在禮家施不及國大夫不收私利公曰吾今而後知禮之可以為國也對曰禮之可以為國也久矣與天地並君令臣共父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令而不違臣共而不貳父慈而教子孝而箴兄愛而友弟敬而順夫和而義妻柔而正姑慈而從婦聽而婉禮之善物也公曰善哉寡人今而後聞此禮之上也對曰先王所禀於天地以為其民也是以先王上之昭二十六御民齊景公登射晏子脩禮而待公曰𨕖射之禮寡人厭之矣吾欲得天下勇士與之圖國晏子對曰君子無禮是庶人也庶人無禮是禽獸也夫臣勇多則殺其君子力多則弑其長然而不敢者惟禮之謂也禮者所以御民也轡者所以御馬也無禮而能治國家者嬰未之聞也景公曰善乃飭射更帝以為上客終日問禮説苑不法晏子使魯仲尼命門弟子徃觀子貢反報謂其不習于禮者晏子退見仲尼仲尼曰夫禮登階不歴堂上不趨授玉不跪夫子反此禮乎晏子曰嬰聞兩楹之間君臣有位焉君行其一臣行其二君之來遫是以登階歴堂上趨以及位也君授玉卑故跪以下之且吾聞之大者不踰閑小者出入可也晏子出仲尼送之以賓客之禮反命門弟子曰不法之禮惟晏子為能行之晏子禮之所起人生而有欲欲而不得則不能無求求而無度量分界則不能不争争則亂亂則窮先王惡其亂也故制禮義以分之以養人之欲給人之求使欲必不窮乎物物必不屈於欲兩者相持而長是禮之所起也荀子三本禮者三本天地者生之本也先祖者類之本也君師者治之本也故禮上事天下事地尊先祖而隆君師是禮之三本也上人道禮者人道之極也然而不法禮不足禮謂之無方之民法禮足禮謂之有方之士上禮之時義夫禮者經天緯地本之則大一之初原始要終體之乃人情之欲順之則宗祐固社稷寧君臣序朝廷正逆之則紀綱廢政教煩陰陽錯於上人神怨於下故曰人之所生禮為大也非禮無以事天地之神辨君臣長㓜之位是禮之時義大矣哉道䘮兩楹義乖四術上自游夏之初下終秦漢之際愽物通人知今溫古考前代之憲章參當時之得失是以所見各記舊聞錯總鳩聚以類相附禮記之日於是乎在禮正義序容典漢初天下創定朝制無文叔孫通頗採經禮參酌秦法雖適物觀時有救崩敝然先王之典容葢多闕矣後傳曹褒論脩外孔子謂子夏曰禮以脩外樂以制内邱已矣夫禮稽命徴脩外飾容貎也脩内蕩滌心性也宋均注六經之道同歸而禮樂之用為急樂以治内而為同禮以脩外而為異同則和親異則畏敬和親則無怨畏敬則不争揖譲而天下治者禮樂之謂也前禮樂志有序天地位日月明四時序陰陽和風雨節羣品滋茂萬物宰制君臣朝儀尊卑貴賤有序咸謂之禮故曲禮云道徳仁義非禮不成教訓正俗非禮不備分争辨訟非禮不决君臣上下父子兄弟非禮不定宦學事師非禮不親班朝治軍涖官行法非禮威嚴不行禱祠祭祀供給鬼神非禮不誠不荘是以君子恭敬撙節退讓以明禮史記正義崇讓合敬詩者弦歌諷喻之聲也禮者序尊卑之制崇讓合敬也春秋者古史所記之制動作之事也鄭𤣥藝論粉澤太公對文王曰禮者理之粉澤六韜橘柚三王五帝之禮義法度其猶楂梨橘柚雖其味相反而皆可於口也莊子孝經至德要道曽子􅁧斯問曰孝文手駮不同何予曰吾作孝經以素王無爵禄賞斧鉞之誅與先王以託權權自至徳要道以題行首仲尼以立情性言子曰以開號列曽子示􅁧輔詩書以合謀孝經鈎命央赤烏摩雲孔子作孝經文成而天道立乃齋以白之天𤣥雲涌北極紫宮開北門召亢星北落司命天使書題號李經篇曰𤣥神辰裔孔邱知元命使陽衢乗紫麟下告地主要道之君後年麟至口吐圖文北落郎服書魯端門隠形不見子夏往觀冩之得十七字餘文二十消滅飛為赤烏翔摩青雲孝經中契孝感元氣混沌孝在其中天子孝天龍負圖地龜出書夭孽消滅景雲出遊庶人孝則澤林茂浮珍舒恠草秀水出神魚孝經援神契萬事之紀凡為天下治國家必務本而後末務本莫貴於孝人主孝則名章榮下服聽天下譽人臣孝則事君忠處官亷臨難死士民孝則耕芸疾守戰固不罷北夫孝三皇五帝之本務而萬事之紀也夫執一術而百善至百邪去天下從者其惟孝也吕氏春秋孝名天子孝曰就就之為言成也天子德被天下澤及萬物始終成就則其親獲安故曰就也諸侯孝曰度度者法也諸侯居國能奉天子法度得不危溢則其親獲安故曰度也卿大夫孝曰譽譽之為言名也卿大夫言行布滿能無惡穪譽逹遐邇則其親獲安故曰譽也士孝曰究究者以明審為義士始升朝辭親入仕能審資父事君之禮則其親獲安故曰究也庶人孝曰畜畜者含畜為義庶人含情受朴躬耕力作以畜其徳則其親獲安故曰畜也援神契舊唐書禮志史史官司籍班彪云唐虞三代詩書所及有史官以司典籍暨於諸侯國自有史後傳華覈上䟽曰五帝三王皆立史官叙録功美垂之無窮吳志太史令夏太史令終古見夏桀迷惑暴亂也乃泣執圖法出奔如商殷内史向勢見紂之愈亂迷惑也於是載其圖法出亡之周晋太史屠黍見晋之亂也見晋公之驕而無德義也以其圖法歸周呂氏春秋史記周太史儋見秦獻公曰始秦與周合而離離百百歳而復合合七十歳而覇王者出焉周秦二義司典荀躒如周藉談為介景王謂藉談曰且昔而高祖孫伯黶司晋之典藉以為大政故曰藉氏及辛有之二子董之晋於是乎有董史汝司典之後也何故忘之藉談不能對昭十五書法不隠趙穿攻靈公於桃園宣子未出山而復太史書曰趙盾弑其君以示於朝宣子曰不然對曰子為正卿亡不越境反不討賊非子而誰宣子曰烏呼我之懐矣自詒伊慼其我之謂矣孔子曰董狐古之良史也書法不隠趙宣子古之良大夫也為法受惡宣二古之良史崔杼者齊之相也弑莊公止太史無書君弑及賊太史不聽遂書賊曰崔杼弑其君崔子殺之其弟又嗣書之崔子又殺之死者二人其弟又嗣復書之乃舍之南史氏是其族也聞太史盡死執簡以往將復書之聞既書矣乃還君子曰古之良史新序節士良史楚王與右尹子革語左史倚相趨過王曰是良史也子善視之是能讀三墳五典八索九丘昭十二習於春秋悼公與司馬侯升臺而樂問以德義對曰諸侯之為日在君側以其善行以其惡戒可謂德義矣公曰孰能對曰羊舌􅆄習於春秋國語春秋紀人事之善惡而目以天時謂之春秋周史之法也時孔子未作春秋注申叔時對莊王曰教之春秋而為之聳善而抑惡焉以戒勸其心楚語以天時紀人事謂之春秋注三途史之為務厭途有三彰善貶惡不避強禦若晋之董狐齊之南史此其上也編次勤成欝為不杇若魯之丘明漢之子長此其次也高才博學名重一時若周之史佚楚之倚相此其下也史通太史公漢武時司馬談世為太史談死子遷以世官復為太史公紬史記石室金鐀之書序事如古春秋法司馬氏本古周史佚後也作景帝本紀極言其短及武帝之過帝怒而削去之後坐舉李陵陵降匈奴下遷蚕室有怨言下獄死西京雜記遷既被刑之後為中書令尊龍任職遷既死後其書稍出宣帝時遷外孫平通侯楊惲祖述其書遂宣布焉漢非誼士永平十七年詔曰司馬遷著書成一家揚名後世至以身䧟刑之故反㣲文諷刺貶損當代非誼士也班固典引魏明帝問王肅司馬遷以受刑之故内懷隠切著史記非貶孝武令人切齒王肅對曰司馬遷記事不虚美不隠惡劉向楊雄服其善叙事有良史之才謂之實録漢武帝聞其述史記取孝景及已本紀覽之於是大怒削而投之於今此兩紀有録無書後遭李陵事遂下遷蠶室此為隠切在孝武而不在於史遷也魏志大敝塲道班彪繼採前史而譏正得失其畧論曰司馬遷採經摭傳分散百家之事甚多疎畧不如其本務欲以多聞廣載為功論議淺而不篤其論術學則崇黄老而薄五經序貨殖則輕仁義而羞貧窮道游俠則賤守節而貴俗功此其大敝傷道所以遇極刑之咎也後漢贊曰史遷是非頗繆於聖人論大道則先黄老而後六經序遊俠則退處士而進姦雄述貨殖則崇執利而羞賤貧此其所蔽也嗚呼以遷之博物洽聞而不能以知自全既䧟極刑齒而發憤書亦信矣夫唯大雅既明且哲能保其身難矣哉前書目􅊿司馬遷班固議者咸稱二子有良史之才遷文直而事覈固文贍而事詳信哉其能成名也固傷博物洽聞不能以智免極刑然亦身䧟大戮嗚呼古人所以致論於目􅊿也後漢非良史班固漢書因父得成論國體則飾主闕而抑忠臣叙世教則貴取容而賤直節述時務則謹辭章而畧事實非良史也傳子後漢紀傳後漢紀傳發源東觀袁張所製偏駁不倫薛謝之作疎謬少信司馬彪之詳實華嶠之準當則其冠也雕龍范氏増損東漢一代自謂無慙良直而王喬鳬履出於風俗通左慈羊鳴傳於抱朴子朱紫不别穢莫大焉史通國志隋内史李德林著論稱陳壽蜀人其􅁧國志黨蜀而抑魏為漢賊按曹公之創王業也賊殺母后􅂒逼主上罪百田常禍千王莾文帝臨戎不武為國好奢忍害賢良踈忌骨肉而壽評皆依違其事無所措言劉主地居漢宗仗順而起夷險不撓終始無瑕方諸帝王可比少康光武譬以侯伯宜輩秦繆楚荘而壽評抑其所長攻其所短是則以魏為正朔之國典午攸承蜀乃僭偽之君中朝所嫉故典稱曹美而虚説劉非安有背曹而向劉踈魏而親蜀也上後主傳云蜀無史職故災祥靡聞按黄氣見於柹歸羣烏墮於江水成都言有景星出益州言無宰相氣若史官不置此事安得從而書之盖由父辱受髠故加茲謗議者也上志稱王崇補東觀許葢掌禮儀又郄正為秘書郎廣求益部書籍斯則典校無闕屬辭有所矣而陳壽評云蜀不置史官者得非厚誣諸葛乎上文義典正毛脩之位次崔浩下浩之以其涉獵書傳與共論説之次及陳壽三國志志有古良史風其所著述文義典正班史以來無及壽者脩之曰昔在蜀中聞長老言壽曽為諸葛門下書佐得撻百下故其其論武侯云應變非其所長浩乃與論曰承祚之評亮乃有故義過美之譽非挾恨之言夫亮之相備英雄奮發之時君臣相得魚水為喻而不能與曹氏争天下委棄荆州退入巴蜀守窮﨑嶇之地僭號邉夷之間此䇿之下者可以趙他為偶而以管蕭之亞匹不亦過乎脩之謂浩言為然此史著漢春秋桓溫覬覦非望習鑿齒著漢晋春秋以裁正之起漢光武終於晋愍帝於三國之時蜀以宗室為正魏武雖受漢禪晉尚為簒逆至文帝平蜀乃為漢亡而晋始興焉引世祖諱炎興而為禪受明天心不可以勢力強也晋書穢史魏收撰魏史夙有怨者多没其善每言何物小子敢共魏收作隙若舉之則使上天按之當使入地時論收為􅈛朱榮作傳以榮比韓彭伊霍者葢由得其子文畧黄金故也收在神武時為太常少卿脩國史得楊休之助因謂休之曰無以謝德當為卿作佳傳休之父固魏世為北平太守以貪虐為中尉李平所彈獲罪收書云固為北平甚有惠政坐公事免官又云李平深相敬重羣口沸騰勑魏史且勿施行號為穢史三􅀦典畧五難袁山松云書之為難也有五煩而不整一難也俗而不典二難也書不實録三難也賞罰不中四難也文不勝質五難也史通三長禮部尚書鄭惟忠嘗問劉子𤣥曰自古已來文士多而史才少何也對曰史才須有三長世無其人故史才少也三長謂才也學也識也夫有學而無才亦猶有良田百頃黄金滿籯而使愚者营生終不能致於貨殖者矣如有才而無學亦猶思兼匠石巧若公輸而家無楩柟斧斤終不果成其宮室者矣猶須好是正直善惡必書使驕主賊臣所以知懼此則為虎傅翼善無可加所向無敵者矣脫茍非其才不可叨居史任自夐古已來能應斯目者罕見其人時人以為知言舊唐史通劉知㡬求罷史任奏記於蕭至忠因為言五不可至忠惜其才不許忠楚客嫉其正直謂諸史官曰此人作書如是欲置我何地時知㡬又著史通子二十卷備論史䇿之體右庶子徐堅深重其書嘗云居史職者宜置此書於座右上良史古所謂良史者明周萬事之理道􅃴天下之用智足以通難知之德文足以發難顯之情諸子立言諸子者入道見志之書太上立徳其次立言大自六國以前去聖未逺故能越世髙談自開户牗兩漢以後體勢侵弱難明于坦途而類多依採此逺近之漸變也嗟夫身與時舛志共道申摽心於萬古之上而送懐於千載之下金石靡矣聲其銷乎雕龍述往思來古者富貴而名摩滅不可勝記唯俶儻非常之人稱焉葢西伯拘而演周易仲尼戹而作春秋屈原放逐乃賦離騷左丘失明厥有國語孫子髕脚兵法修列不韋遷蜀世傳呂覽韓非囚秦説難孤憤此人皆意有鬰結不得通其道故述往事思來者漢書漢書載子長云自古述作皆因患而起末云不韋遷蜀世傳呂覽按呂氏廣招辨士購以千金則當時宣布為日久矣豈以遷蜀之後方始傳乎若欲引以自喻何不云虞卿窮愁著書八篇乎葢識有不該思之未審耳史通窮愁著書魏齊魏相與應侯有仇秦求之急乃抵虞卿卿弃相印乃與齊間行亡歸梁以託信陵君疑未决齊自殺故虞卿失相乃窮愁而著書上採春秋下觀近世曰節義稱號揣摩政謀凡八篇以刺譏國家得失世傳之曰虞氏春秋史記索𨼆尸子尸子晋人也名佼秦相魏鞅客也鞅謀事畫計立法理民未嘗不與佼規也商君被刑恐併誅乃亡逃于蜀作書二十篇凡六萬餘言十九篇陳道徳仁義之事一篇言九州險阻水泉所起也其仁意篇述太平之事云燭於玉燭飲於醴泉暢於永風春為青陽夏為朱明秋為白藏冬為𤣥英四氣和正光照此之謂玉燭甘雨時隆萬物以嘉髙者不少下者不多此之謂醴泉其風春為發生夏為長嬴秋為方盛冬為安静四氣和為通正此之謂永風韓子韓非者為人口吃不能道説而善著書人或傳其書至秦秦王見孤憤五蠧之書曰嗟乎寡人得見此人與之游死不恨矣史記韓非之書傳在秦庭始皇歎曰獨不得與此人同時陸賈新語每奏一篇高祖左右稱曰萬歳夫嘆思其人與喜稱萬歳豈可空為哉論衡佚文新語新語陸賈所造葢董仲舒相被服焉皆言君臣政治得失言可采行事美足觀鴻知所言參貳經傳雖古聖之言不能過増上書夣龍入懐董仲舒著書不稱子者意殆自謂過諸子也上仲舒夣蛟龍入懐乃作春秋繁露詞西京雜記字直百金公孫𢎞著公孫子言刑名事亦謂字直百金字挾風霜淮南王安著鴻烈二十一篇鴻大也烈明也言大明禮教號為淮南子一曰劉安子自云字中皆挾風霜楊子雲以為一出一入俱上太𤣥楊雄少而好學博覽無所不見欲求文章成名於後世以為經莫大於易故作太𤣥傳莫大於論語作法言家素貧耆酒人希至其門時有好事者載酒肴從游學而鉅鹿侯芭常從雄居受其太𤣥法言焉劉歆亦嘗觀之謂雄曰空自苦今學者有禄利然尚不能明易又如𤣥何吾恐後人用覆醬􅹏也雄笑而不應雄卒大司空王邑納言嚴尤聞雄死謂桓譚曰子常稱楊雄書豈能傳於後世乎譚曰必傳顧君與譚不及見也凡人賤近而貴逺親見楊子雲禄位容貎不能動人故輕其書楊子之書文義至深而論不詭於聖人若使遭遇時君更閲賢知為所稱善則必度越諸子矣自雄之没至今四十餘年其法言大行而𤣥終不顯然篇籍具存漢書擬經張平子與崔子玉書曰乃者讀太𤣥經知子雲特極陰陽之數也非特傳記之屬心實與五經擬漢家得二百歳卒乎𤣥四百歳其興乎足下累世窮道極㣲子孫必命世不絶且幅寫一通藏之以待能者陸續云平子云漢之四百其興乎漢元至今四百年矣其道大顯陸績述𤣥吐鳯楊雄讀書有人語之曰無為自苦𤣥故難傳忽然不見雄著太𤣥經夣吐鳯凰集𤣥之上頃而滅西京雜記不觀述事者好髙古而下今貴所聞而賤所見辨士則談其久者文人則者其逺者畫工好畫上代之人秦漢之士功行譎竒不肯圖今世之士者尊古卑今也貴鵠賤鷄鵠逺而鷄近也楊子雲作太𤣥造法言張伯松不肯壹觀與之併肩故賤其言使子雲生周世則伯松以為金匱矣論衡齊世世俗率貴古昔而賤當今敬所聞而黷所見同時雖有追風絶景之駿猶謂不及伯樂之所御也雖有宵朗兼城之噗􅀈謂不及楚和之泣也雖有㫁馬指雕之劒猶謂不及歐冶之所鑄也雖有生枯起朽之藥猶謂不及和鵲之所合也抱朴文行雖有超羣之人猶謂之不及竹帛之所載也雖有益世之書猶謂之不及前代之遺文也是以仲尼不見重於當時太𤣥見􅃖薄於比肩也俗士多云今山不及古山之高今海不及古海之廣今日不及古日之熱今月不及古月之朗何肯許今之才士不減古之枯骨重所聞輕所見非一世之所患矣上尚􅀶次經楊子雲才智聞道早絶於衆漢興已來未有此也劉子駿曰何以言之荅曰通才著書以百數唯太史公為廣大餘皆缺殘小論不能比之子雲所造法言太𤣥也人貴所聞賤所見也故輕易之若遇上好事必以太𤣥次五經也桓譚新論河漢漢作書者多司馬子長楊子雲河漢也其餘涇渭也然而子長少臆中之説子雲無世俗之論量仲舒説道術竒矣北方三家尚矣案書未見此人陽成子長張作樂經楊子雲作太𤣥經造於􅂇思極窅冥之深非庶幾之才不能成也孔子作春秋二子作兩經所謂卓爾蹈孔子之跡鴻茂參貳聖之才者也王公子問於桓君山以楊子雲君山對曰漢興以來未有此人超竒新論桓譚曰余為新論術辨古今亦欲興治也何異春秋褒貶耶今存疑者所謂蚌異蛤二五為非十也譚見劉向新序陸賈新語乃為新論莊周寓言乃云堯問孔子淮南子云共工争帝地維絶亦昏為妄作故世人多云短書不可用然論天間莫明於聖人莊周等雖虚誕故當採其善何云盡棄耶新論素相世間為文者衆矣是非不分然否不定桓君山論之可謂得實矣論文以察實則君山漢之賢人也孔子不王素王之業在於春秋然則桓君山素丞相之跡存於新論者也衡定賢孔子之春秋素王之業也諸子之傳書素相之事也觀春秋以見王意讀諸子以睹相指超竒説論為甲新論論世間事辯照然否虚妄之言偽飾之辭莫不證定彼子長子雲説論之徒君山為甲上董仲舒之言道德政治可嘉美也質定世事論説世疑桓君山莫上也案書桓譚新論華譚又有新論楊雄有太𤣥經楊泉有太𤣥經金樓子洞歴㑹稽周長生者文士之雄也作洞歴十篇上自黄帝下至漢朝鋒芒毛髪之事莫不紀載與太史公表紀相似類也上通下逹故曰洞歴然則長生非徒文人所謂鴻儒者也孔子曰文王旣没文不在兹乎文王之文在孔子孔子之文在仲舒仲舒旣死豈在長生之徒與何言之卓殊文之美麗也長生家在㑹稽生在今世文章雖竒論者猶謂穉於前人天禀元氣人受元精豈為古今者差殺哉超竒七序梁敬叔竦以經籍自娛著書數篇名曰七序班固見而之稱曰昔孔子著春秋而亂臣賊子懼梁竦作七序而竊位素餐者慙後書度越諸子王充好慱覽而不守章句閉門濳思絶慶吊之禮戸牗墻壁各置刀筆著論衡八十五篇後書充作論衡北方都未有得之者蔡伯喈到江東始得之歎其文高度越諸子及還中國諸儒覺其談論更逺嫌得異書或捜求其帳中至隠處果得論衡捉取數卷將去伯喈丁寧之曰惟我與爾共之勿廣也抱朴邕入吳得論衡恒秘玩以為談􅂇其後王朗為㑹稽太守又得其書及還許下時人稱其才進或曰不見異人當得異書問之果以論衡之益由是遂見傳焉袁山松書充一代英偉所著文時有小疵猶鄧林枯枝滄海流芥未易貶者抱朴譏世六畧之書萬三千篇増善消惡割截横拓驅役遊慢期便道善歸正道焉論衡者所以銓輕重之言立真偽之平非茍調文飾辭為竒偉之觀也其本皆起人間有非故盡思極心以譏世俗九虚三増所以使俗務實誠也論死訂鬼所以使俗薄喪葬也衡案書自紀王充性恬淡不貪富貴滛讀古文甘聞異言好結友雅徒不汜結俗材傷偽書俗文多不實誠故為論衡之書論衡者論之平也口則務在明言筆則務在露文寧危之計黜於閭巷撥世之言訾於品俗呂氏淮南懸於市門觀讀之者無訾一言二氏之文不無累害所由出者家富官貴也夫貴故得懸於市富故有千金副觀讀之者惶恐畏忌雖見乖不合焉敢譴一字或戯充仕數不耦而徒屬文著記美言何補於身者夫逹者未必知窮者未必愚遇者則得不遇失之故夫命厚禄善庸人尊顯命薄禄惡竒俊落魄必以偶合稱材量德則夫專城食土者材賢孔墨身貴而名賤則居潔而行墨食千鍾之禄無一長之德乃可戯也若夫德高而名白官卑而禄泊非才能之過未足以為累也士願與憲共廬不慕與賜同衡樂與夷俱旅不貪與蹠比迹髙士所貴不與俗均故其名稱不與世同身與草木俱朽聲與日月並彰行與孔子比窮文與楊雄為雙吾榮之身通而知困官大而德細於彼為榮於我為累偶合容説身尊體佚百載之後與物俱殁名不流於一嗣文不遺於一札官雖傾倉文德不豐非吾所臧徳汪濊而淵懿知滂沛而盈溢筆瀧漉而雨集言溶㵠而泉出富材羡知貴行尊志體列於一世名傳於千載乃吾所謂異也或有難充書繁重云玉少石多多者不為珍龍少魚衆少者固為神荅曰文多勝寡財富愈貧世無一卷吾有百篇人無一字吾有萬言孰為賢也上末篇見虎一毛王仲宣昔在荆州著書數十篇荆州壊盡焚其書今在者二篇知名之士咸重之見虎一毛不知其斑金樓子中論文帝與呉質書曰觀古今文人類不護細行鮮能以名節自立而徐偉長獨懐文抱質恬淡寡欲有箕山之志可謂彬彬君子矣著中論二十餘篇辭義典雅足𫝊于後魏志古人賤尺璧而重寸陰懼乎時之過矣而人多不強力貧賤則懼於饑寒富貴則流于逸樂遂營目前之務而遺千載之功日月逝于上體貎衰于下忽然與萬物遷化斯亦志士大痛也孔融等已逝唯幹者論成一家之言典畧通志畧儒術云中論六卷魏徐幹𫝊典論五卷魏文帝撰徐氏中論六卷魏太子文闕學徐幹撰其編次之訛論云隋志最可信縁分類不攷故亦有重􅃨者是不校勘之過也以隋志尚且如此後有編書出於衆手不經校勘者可勝道哉於是作書目正訛通志公自製也魏豈有二偉長各作中論三寸卷耶重􅃨之謂固古人所以致論于目睫也體論杜恕著體論八篇以為人倫之大綱莫重於君臣立身之基本莫大於言行安上理民莫精於政法勝殘去殺莫善於用兵夫禮也者萬物之體也萬物皆得其體無有不善故謂之體論其荅宋權書云恕以年五十二不見廢棄頗亦遭明逹君子亮其本心若不見亮使刳心著地正與數片肉相似何足有所明故終不自解説杜氏新書􅎥藻脱牙余家遭火典籍蕩盡困於無力不能更得故抄掇衆書撮其精要用工少而所收多思不煩而所見博或謂洪曰流無源則乾條離株則悴吾恐玉屑盈車不如金璧余荅曰泳源流者採珠而捐蚌登荆嶺者拾玉而棄石余之抄畧譬猶摘翡翠之藻羽脱犀象之角牙抱朴未成為恨稽君道問二陸優劣抱朴子曰朱淮南嘗言二陸重規沓矩無多少也一手之中不無鈍利方之他人若江漢之與潢潦陸子十篇誠為快書者其辭之富也雖覃思不可損也其理之約者雖殘筆腐豪不可益也陸平原作子書未成吾門生有在陸君軍中嘗在左右説陸君臨亡曰窮通時也遭遇命也古人貴立言以為不朽吾所作子書未成以此為恨耳余謂仲長統作昌言未竟而亡後董襲撰次之桓譚新論未備而終班固為其成琴道今才士何不贊成陸公子書上抱趨符朗家罹楚朗棄千金之劒抱苻子而趨曰夫千金之劍利割之所在焉符子之書大道之所居焉符子類苑劉峻梁安成王秀雅重之及為荆州引為户曹參軍給其書籍使抄録事類名曰類苑未及成後髙祖招文學之士擢以不次曽䇿錦被事咸言已盡峻忽請紙筆䟽十餘事帝不覺失色自是惡之不復引見及類苑成凡百二十卷帝即命學士撰華林徧畧以髙之梁書南史劉之遴與孝標借類苑書曰間聞足下作類苑括綜百家馳騁千載彌綸天地纒終萬品撮道畧之英華捜羣言之隠頥鈆􅎥既畢殺青已就義以類聚事以羣分述征之妙楊班儔也擅此博物何快如之雖復子野調聲寄知音於後世文信搆覽懸百金於當時居然無以相尚自非沉鬰澹雅之思安能閇志經年勤成若此吾嘗聞為之者勞觀之者逸足下已勞於精力宜令吾見異書孝標荅曰九冬有隟三餘暇時多遊書圃代樹萱蘓若夫采亹亹於緗紈閲㣲言於殘竹嗢飫膏液咀嚼英華不知地之為輿天之為葢靡測迴塘莫辯輿馬烏足以言乎是用周流墳素詳觀圖諜搦管聨冊纂兹英竒蛩蛩之謀止於善草周周之計利在衘翼故鴻集斯文葢自綴其漏耳豈兾藏之名山播於士大夫裁藝文何思澄字元静少勤學工文重結交入華林撰遍畧分書與諸賓朋校定而終日造謁時人方之婁䕶南史雕龍劉勰字彦和撰文心雕龍五十篇論古今文體旣成未為時流所稱勰自重其文欲取定於沈約約時貴盛無由自逹乃負書候約於車前狀若欲貨鬻者約便命取讀大重之謂深得文理常陳諸几案梁書高才不遇劉晝字孔昭撰髙才不遇𫝊三篇自謂博物竒才言好矜大每云使我數十卷書行于後世不易齊景公之千駟也北史自懃著書或謂余曰子何不詢之有識共著此書何為區區自懃如此夫荷㫋被毳者難與道純綿之緻蜜羮藜唅糗者不足論大牢之滋味故服綌絺之凉者不知盛暑之欝燠襲貂狐之煖者不知至寒之悽愴予之術業豈賓客之能闚斯葢以筳撞鐘以蠡測海也子嘗切齒淮南不􅅊之書謂為賓逰所製每至著述之間不令賓客窺之也金樓子修文御覽初齊武成令宋士嘉録古來帝王言行要事三卷名為御覽置於齊王巾箱陽體之創意取芳林遍畧加十六國春秋六經拾遺録魏帝史書以士素所撰之名稱為𤣥洲苑御覽後改聖壽堂御覽武平三年如晉陽祖珽等上言觀書貴博博而貴要省日兼功期於易簡前者修文殿令臣等撰録斯書編成三百六十卷昔漢時諸儒集論經傳奏之曰白虎閣因名白虎通竊縁斯義仍曰修文殿御覽上呈齊主命付史閣徐之木謂人曰此可謂床上之床屋下之屋也三國典畧六籍奴婢劉蕡精於儒術嘗看文中子忿然而言曰才非上聖擬上聖述作不亦過乎客曰文中子於六籍如何蕡曰若以人望人文中子於六籍猶奴婢之於郎主耳後人遂以文中子為六籍奴婢賈氏談録更撰千文進士周逖改次千字文更撰天寶應道千字文將進之請頒行天下先呈宰執右相陳希烈問之曰有添換乎逖曰飜破舊文一無添換又問翻破盡乎對曰盡右相曰枇杷二字如何飜破逖曰唯此兩字依舊右相曰若如此還未盡逖逡廵不能對上梁髙祖次韻王羲之書千字使周興嗣為文髙祖稱善加賜金帛梁𫝊武帝取鍾王真迹授周興嗣令選不重復者千字韻而文之興嗣一宿而上鬢髪皆白大被賞遇後興嗣目疾武帝親為之合藥御覽引梁書千字文有王右軍書者始梁武教諸王書令殿鐵石於大王書中撮一千字不重者每字一片紙雜碎無叙武帝召興嗣謂曰卿有才思為我韻云云劉賓客嘉話太宗嘗幸秘閣出草書千字文為賜李至勒石上曰千文乃梁武得破碑鍾繇書命周興嗣次韻而成理無足取若有資於教化莫孝經若也宋史至𫝊誤意林初梁庾仲容取諸家書術數雜記凡一百七家五家抄其要語為子畧三十卷馬總以其繁畧失中増損成三軸前有戴叔倫楊伯存兩序讀書志叔倫序曰止以防守教之失中以補比事之缺下以佐屬文之緒有䟽通廣博㓗净符信之要無僻放拘刻譤蔽倍蕩之患當篇籍散缺人所未見之時而乃先識其名又得其語斯足以廣聞見􅂇發揮何止嘗鼎臠啖鷄蹠也陸機氏曰傾羣言之瀝液潄六藝之芳潤唐韋展日月如合璧賦云獵英華於百氏潄芳潤於六籍是庶㡬焉子畧纂異李景譲典貢年有李復言者納省卷有纂異記一部十卷牓出曰事非經濟動涉虚妄其所納仰貢院驅使官却還復言因此罷舉南部化書譚景昇於終南山著化書出授宋齊丘曰是書之化其化無窮願子序之流於後世齊丘將酒灌之沉湎以牛皮裹縫抛於江中後為漁人所獲剖開見先生睡􅋜齁不止喚之頗久方覺乃曰宋齊丘奪我化書墜我于江今天下頒行矣齊丘何在因留詩化風起去不見詩曰線作長江扇作天靸鞋抛向海東邊蓬萊信道無多地只在譚生柱杖前本初學記徐堅撰初學記中山劉子儀愛其書曰非止初學可為終身記春明退朝録白帖牛革日厯以白居易六帖為不語先生談助徽言司馬光手抄諸子名曰徽言所鈔自國語而下六書其目三百一十有二小楷端無一筆不謹陳氏文章如繡文者㑹集衆綵以成錦繡㑹集衆字以成辭義如文繡然也釋名不朽盛事文章經國之大業不朽之盛事年壽有時而盡榮樂正乎其身二者必至之常期未若文章之無窮是古之作者寄身於翰墨見意於篇籍不假良史之辭不託飛馳之勢而聲名自𫝊於後典論樹德建言夫宇宙杳邈黎獻紛雜援萃出類智術而已歳月飄忽性靈不居騰聲飛實制作而已夫肖貎天地禀性五十擬耳目於日月方聲氣乎風雷其超出萬物亦已靈矣形甚草木之脆名踰金石之堅是以君子處世樹德建言豈好辨哉不得已也雕龍宣明文章者所以宣上下之象明人倫之叙窮理盡性以究萬物之宜者也文章流别論異名刺美風化緩而不迫謂之風采摭事物摛華布體謂之賦推明政治莊語得失謂之雅形容盛德楊勵休功謂之頌幽憂憤悱寓之比興謂之騷感觸事物託於文章謂之辭程事較功考實定名謂之銘援古㓨今箴戒得失謂之箴猗遷抑揚永言謂之歌非皷非鍾徒歌謂之謡步驟馳騁斐然成章謂之行品秩先後叙而推之謂之引聲音難比髙下短長謂之曲吁嗟慨嘆悲憂深思謂之吟吟詠情性總合而言志謂之詩帝王之言出法度以制人者謂之制絲綸之語若日月之垂照者謂之詔制與詔同詔亦制也道其常而作彛憲者謂之典陳其謀而成嘉猷者謂之謨順其理而迪之者謂之訓屬其人而告之者謂之誥即師衆而申之者謂之誓因官使而命之者謂之命出於上者謂之教行於下者謂之令時而戒者勑也言而喻之者宣也諮而揚之者贊也登而崇之者冊也言其倫而㭊之者論也度其宜而揆之者議也别嫌疑而明之者辨也正是非而著之者説也記者記其事也紀者紀其實也纂者纘而述焉者也䇿者條而對焉者也傳者傳而信之也序者纘而陳之也碑者披列事功而載之金石也碣者揭示操行而立之墓隧也誅者累其素履而質之鬼神也誌者識其行藏而謹其終始也檄者激發人心而喻之禍福也移者自近移逺使之周知也表者布臣子之心致君父之前也牋者修儲后之問伸宮間之儀也簡者質言之而畧也啓者文言而詳也狀者言之於公上也牒者用之於官府也㨗書不緘挿羽而𫝊之者露布也尺牘無封指事而陳言之者劄子也青黄黼黻經緯以相成者總謂之文也此文之異名也珊瑚鈎詩話七國言事於王皆稱上書秦初定制改書曰奏漢定禮儀則有四品一曰章二曰奏三曰表四曰議章以謝恩奏以按劾表以陳情議以執異文心雕龍文章骨髓五經者象天地效鬼神參物序制人紀洞性靈之奥區極文章之骨髓者也故論説辭序則易統其首詔䇿章奏則書發其源賦頌謌讚則詩立其本銘誄箴祝則禮總其端紀傳銘檄則春秋為根並窮髙以樹表極逺以啓疆所以百家騰躍終入環内者也上夫文章者原出五經詔命䇿檄生於書者也序述論議生於易者也歌詠賦頌生於詩者也祭祀哀誄生於禮者也書奏箴銘生於春秋者也朝廷憲章軍旅誓誥敷顯仁義發明功德牧民建國施用多途至於陶冶性靈從容諷諫入其滋味亦樂事也顔氏家訓足言鄭子産獻㨗于晉士莊伯不能詰仲尼曰志有之言以足志文以足言不言誰知其志言之無文行而不逺晉為伯鄭入陳非文辭不為功慎辭哉左襄四美言不文或曰良玉不雕美言不文何謂也曰玉不雕璵璠不作器言不文典謨不作經法言畫脂鏤氷内無其實而外學其文若畫脂鏤氷費日損功鹽鉄論造化之淵所謂文者非徒執卷於儒生之門攄筆於翰墨之采乃貴其造化之淵禮樂之盛也陸景典語以氣為主文以氣為主氣之清濁有體不可力強而致譬諸音樂曲度雖均節奏同檢至於引氣不齊巧拙有素雖在父兄不能以移子弟典論不自見夫人善於自見而文非一體鮮能備善是以各以所長相輕所短里語曰家有弊帚享之千金斯不自見之患也常人貴逺賤近向聲背實又患闇於自見謂已為賢夫文本同而末異葢奏議宜雅書論宜理銘誄尚實詩賦欲麗此四科不同故能之者偏也唯通才能備其體上任勢桓譚稱文家各有所慕或好浮華而不知實覈或美衆多而不見要約陳思亦云世之作者或好煩文博採深沉其旨者或好離言辨白分毫析釐者所習不同所務各異言勢殊也劉楨云文之體指實強弱使其辭已盡而勢有餘天下一人耳不可得也公幹所談頗亦兼氣然文之任勢勢有剛柔不必壯言慷慨乃稱勢也又陸雲自稱往日論文先辭而後情尚勢而不取悦澤及張公論文則欲宗其言夫情固先辭勢實湏澤可謂先迷後能從善矣文心辭理事方文章當以理致為心腎氣調為筋骨事義為皮膚華麗為冠冕今世相承趨末棄本率多浮艶辭與理競辭勝而理伏事與才争事繁而才損放逸者流宕而忘歸穿鑿者補綴而不足時俗如此安能獨違但務去㤗去甚耳顔氏家訓防慮原其所積之章之體摽舉興㑹發引性靈使人矜伐故忽於持操果於進取今世文士此患彌切一事愜當一句清巧神厲九霄志凌千載自吟自賞不覺更有傍人加以砂礫所傷慘於矛㦸諷刺之禍速乎風塵深宜防慮以保元吉上文筆鳴鳯翬翟備色而翔翥百步肌豊而力沈也鷹隼無采而翰飛戾天骨勁而氣猛也文筆才力有似於此若風骨乏采則鷙集翰林采乏風骨則雉竄文固者澡曜而髙翔固文筆之鳴鳯也雕龍悦目今之俗也縉紳稚齒閭巷小生茍取成章貴在悦目龍目豕足隨時之宜牛頭馬髀強相附㑹夫把酌道德憲章前言者君子所以行之也金樓子􅂈秦論余觀賈誼􅂈秦論發周秦之得失通古今之制義洽以三代之風潤以聖人之化斯可謂作者矣典論文之烏獲世稱力者常褒烏獲然則董仲舒楊子雲文之烏獲也秦武王與孟説舉鼎不任絶脉而死少文之人與董仲舒等涌胷中之思必將不任有絶脉之變論衡異用枚臯文章敏疾長卿制作淹遲皆盡一時之譽而長卿首尾溫麗枚臯時有累句故知疾行無善迹矣楊子雲曰軍旅之際戎馬之間飛書馳檄用枚臯廊廟之下朝廷之中髙文典冊用相如西京雜記𢎞麗以敏於賦頌為𢎞麗之文為賢則夫司馬長卿楊子雲是也文麗而務臣言𦕈而趨深然而不能處定是非辯然否之實雖文如錦繡深如河漢民不覺知是非之分無益於崇實之化論衡定賢差顛漢明帝楊后花面甚美絶有顛狂病發則殺人惟内傳孟召為文章哀怨后毎讀之顛狂則必醒時人語曰孟召文章差顛狂獨異志繡囊馬融勤學夣見一林花如錦繡夣中􅎥此花食之及窹見天下文詞無所不知時人號為繡囊獨異志武陵記芸鋤曹操欲殺彌衡衡亡走投荆州牧劉表表欲作書與孫權討逆于時已全據江東帶甲百萬欲結輔車之援共其距中國使諸文士立草盡思而不得表意乃示衡衡省之曰但欲使孫左右柱刀児視之者此可用爾儻令張子布見此大辱人也即摧壊投地表悵然有怪色謂衡曰為了不中芸鋤乎惜之也索紙筆便更書之衆所作有十餘通衡凡一歴視之而已暗記書之畢以還表表以還主或有録所作之本也以比校之無一字錯乃各大驚表乃請衡更作衡則作成手不停輟表甚以為佳而施用焉抱朴表嘗作上事極以為快衡見之便滅投地曰作此筆者為食飯不别𫝊孔陸或問曰何如斯可謂之文荅曰孔文舉之書陸士衡之議斯可謂之文也李充翰林論徳音表冝以逺大為本不以華藻為先若曹子建之表可謂成文矣諸葛亮之表劉主裴公之辭侍中羊公之讓開府可謂德音矣上譏彈世人之著述不能無病僕常好人譏彈其文有不善者應時改定昔丁敬禮常作小文使僕潤飾之僕自以才不􅂈若人辭不為也敬禮謂僕卿何所疑難文之佳惡吾自得之後世誰相知定吾文者耶吾常歎此逹言以為美談選曹子建與楊修書江南文制欲人彈射知有病累隨即改之陳王得之於丁廙也山東風俗不通擊難吾初入鄴遂嘗以此忤人至今為悔汝曹必無輕議也家訓瑕病古來文才異世争驅而慮動難圓鮮無瑕病陳思之文羣才之俊也而武帝誄云尊靈永蟄明帝頌云聖體浮輕浮輕有似於蝴蝶永蟄頗疑於昆虫施之尊極豈其當乎雕龍閣筆王粲才旣髙辯論應機鍾繇王朗等雖各為魏氏相至於朝廷奏議皆閣筆不能措手三國典畧愈病陳琳為曹操管記室作諸書及檄草成呈操操先苦頭風是日疾發卧讀琳所作翕然而起曰此愈我病數加厚賜上馬上具草曹操嘗使阮瑀作書與韓遂時操􅃴近出瑀隨從因於馬上具草書成呈操􅒆筆欲有所定而竟不能増損上劉先主叛走曹操使阮瑀為書與備馬上立成操以此為能者吾以為児戯耳金樓子假論嗣宗鍾士季嘗向人道吾少年時一紙書與人云是阮歩兵書皆字字生義旣知是吾不足道也語林一代之絶陸機天才秀逸詞藻宏麗張華嘗謂之曰人之為文常恨才少而子更患其多弟雲嘗與書曰君苖見兄文輙欲燒其筆硯後葛洪著書稱機文猶𤣥圃之積玉無非夜光焉五河之吐流泉源如一焉其𢎞麗姸贍英銳飄逸亦一代之絶乎晉書制曰機文其詞深而雅其義博而顯故足逺超枚馬髙躡王劉百代文宗一人而已上雲騫潘安仁之為文也猶翔禽之羽毛衣被之綃糓李充翰林論安仁思緒雲騫詞鋒景喚前史儔於賈誼先逹方之士衡晉史臣岳文文選言簡章清綺絶倫續文章志孫興公云潘岳文爛若披錦無處不善陸機文若排沙簡金往往見寶世説機文喻海韞蓬山而育蕪岳藻如江濯美錦而増絢晉論王勃滕王閣序末云請灑潘江各傾陸海云爾英華須銘孫綽為著作郎於時才筆之士綽為冠故溫王郄庾諸公之薨必須綽銘而後刻石晉中興書倚馬桓宣武北征袁虎時從被責免宫㑹須露布文喚袁倚馬前令作手不輟筆俄得七紙殊可觀東亭在側極嘆其才袁虎云當令齒舌間得利世説夣吞鳥羅含夣吞五色鳥自後頓有文章晉傳夣筆如椽王珣為桓溫椽嘗夣人以大筆如椽與之旣覺曰此當有大手筆事俄而武帝崩哀冊謚議皆珣所草上貴時後漢才林可參西京晉世文苑足儷鄴都然而魏時話言必以元封為稱首宋來美談亦以建安為口實何也豈非崇文之盛世招才之嘉㑹哉嗟夫此古人所以貴乎時也雕龍才盡鮑照字明逺文辭贍逸為臨川王義慶所知賞文帝以為中書舍人上好文章自謂人莫能及照悟其旨為文章多鄙言累句咸謂才盡實不然也宋書寄人籬下張融為問律自序云夫文章豈有常體但以有體為常政當使常有其體大夫當刪詩書制禮樂何至因循寄人籬下且中代之文道體闕變尺寸相資彌縫舊物吾之文章體亦何異政以屬辭多出比事不覊不阡不陌非途非路耳然其傳音振逸鳴節竦韻或當未極亦已極其所矣吾無師無友不文不句頗有孤神獨逸耳臨終又戒其子曰吾文體英絶變而屢竒不能逺至漢魏故無取嗟晉宋豈吾天挺葢不隤家聲融自自集為玉海司徒禇淵問玉海名融荅以玉比德海崇上善南齊夣錦夣筆江淹字文通少以文章顯晚節才思㣲退云為宣城太守時罷歸始泊船禪靈寺渚夜夣一人自稱張景陽謂曰前以一匹錦相寄今可見還江懐中得數尺與之此人大恚曰那得割截都盡顧見丘遲謂曰餘此數尺旣無所用以遺君自爾淹文章躓矣又嘗宿於冶亭夣一丈夫自稱郭璞謂淹曰吾有筆在卿處多年可以見還淹乃探懷中得五色筆一以授之爾後為詩絶無美句時人謂之才盡南史淹夣神人授五色筆識者謂為五臟神乾􅍧子當時無輩任昉字彦升王儉毎見其文必三復殷勤以為當時無輩曰自傳季友以來始復見于任子若孔門是用其入室升當於是令眆作一文及見曰正得吾腹中之欲乃出自作文令眆㸃正眆因定數字儉拊几歎曰後世誰知子定吾文時琅邪王融有才儁自謂無對當時見眆之文怳然自失沈約一代詞宗深所推挹南史三易沈隠侯約曰文章當從三易易見事一也易識字二也易讀誦三也邢子才常曰沈侯文章用事不使人覺若胷臆語也深以此服之祖孝徴亦嘗謂吾曰沈詩云崖傾䕶石髓此豈似用事耶邢子才魏收俱有重名時俗準的以為師匠邢賞服沈約而輕任眆魏愛慕任眆而毁沈約毎於談讌辭色以之鄴下紛紜各有朋黨祖孝徴嘗謂吾曰任沈之是非乃邢魏之優劣也顔氏家訓隠侯斟酌二南剖陳三變攄淵雲之抑鬰振播陸之風徽俾律呂和諧宮商輯洽不獨子建總建安之覇客兒擅江左之雄舊唐文苑永明體永明末盛為文章呉興沈約陳郡謝眺瑯琊王融以氣類相推轂汝南周顒善識聲韻約等文皆用宫商以平上去入為四聲以此制韻不可増減世呼為永明體南齊陸厥𫝊呉均體呉均文體清㧞有古氣好事者咸斆之謂為吳均體南史宫體徐摛字士秀為晉安王綱侍讀王入為皇太子轉家令領直摛文體旣别春坊盡學之宮體之號自此而始上簡文帝篇章辭賦操筆立成然傷于輕艶當時號曰官體梁紀徐庾體庾信字子山父肩吾為太子中庶子掌管記東海徐摛為右衛率摛子陵及信並為抄撰學士父子東宮出入禁闥恩禮莫與比隆旣文竝綺􅃩故世號為徐庾體焉當時後進競相模範毎有一文都下莫不傳誦聘于東魏文章辭令盛為鄴下所稱北史一代文宗徐陵為一代文宗其文頗變舊體緝裁巧密多有新意每一文出好事者已傳寫成誦遂傳于周齊南史後進所宗劉孝綽辭藻為後進所宗時重其文毎作一篇朝成暮徧好事者咸諷誦傳寫流聞河朔亭苑柱璧莫不題之上魏公藏拙梁常侍徐陵聘于齊時魏收文學北朝之秀録其文集以遺陵令傳之江左陵濟江而沉之從者以問陵曰吾為魏公藏拙隨唐嘉話國朝𫝊記韓陵片石梁庾信從南朝初至北方文士多輕之信將枯樹賦以示之於後無敢言者時溫子昇作韓陵山寺碑信讀而寫其本南人問信曰北方文士何如信曰唯有韓陵山一片石堪共語薛道衡盧思道少解把筆自餘驢鳴狗吠聒耳而已僉載復生比玉溫子昇字鵬舉博覽百家文章清婉梁使張臯寫其文筆傳於江外梁武稱之曰曹植陸機復生于北土恨我詞人數窮百六陽夏守傅標使吐谷渾見其國主有書數卷乃是子昇文也濟陰王暉業嘗云江左文人宋有顔延之謝靈運梁有沈約任眆子昇足以陵顔轢謝含任吐沈揚遵彦作文德論以為彬彬然有德素魏書模偷魏收毎陋邢邵文邵嘗云江南任昉文體本踈魏收非直模擬亦大偷竊收聞之乃言曰邵常於沈休文集裏作賊何意道我偷任語三國典畧收言及沈休文集毁之徐之才怒曰卿讀沈文半不能解何時事論其得失謂收曰未有與卿談收去避之上共人生活祖􅉷以文學見重嘗語人云文章須自出機杼成一家風骨何能共人同生活也葢譏世人好竊他文以為已用北史月露風雲李諤字士恢能屬文文帝時以時文體尚輕薄流宕忘返上書曰自魏之三祖更尚文詞江左齊梁其弊彌甚遺理存異㝷虚逐㣲連篇累牘不出月露之形積案盈箱唯是風雲之狀捐本逐末流徧華壤􅉍相師祖久而愈扇上文章體式隨杜正藏為文迅速有如宿搆曽令數人並執紙筆各題一文正藏口授俱成皆有文理為當時所異又為文章體式二十卷論為文體則甚有條理後生寶而行之多資以解褐大行於世時人號為文􅁤乃至海外髙麗亦共傳習謂之杜家新書云北史馬誤不覺禇遂良為太宗哀冊文自朝還馬誤入家而不覺也國朝傳記王楊盧駱楊烱華州華陰人少與綘州王勃范陽盧照鄰東陽駱賓王皆以文詞知名海内稱為王楊盧駱亦號為四傑烱聞之謂人曰吾愧在盧前恥居王後當時議者亦以為然其後崔融李嶠張説俱重四傑之文崔融曰王勃文章宏逸有絶塵之跡固非常流所及烱與照鄰則可企之楊盈川之言信矣張説謂人曰楊盈川文思如懸河注水酌之不竭既優於盧亦不減王恥居王後則信然愧在盧前謙也唐書腹藁王勃毎為碑頌先磨墨數升引被覆面而卧忽起援筆書之初不㸃竄時人謂之腹藁談藪㸃鬼簿楊烱為文好以古人姓名連用如張平子之談畧陸士衡之所賦潘安仁宜其陋矣仲長統何足知之號㸃鬼簿僉載筭博士駱賓王好以數對如秦地重關一百二漢家離宮三十六時人號為筭博士上口占五冊王勮長壽中為鳯閣舍人壽春等五王出閣同日受冊有司撰儀註忘載冊文及百官在列方知闕禮宰相相顧失色勮立召書五人各令執筆口占分寫一時俱華辭理典贍人皆歎服舊唐三變唐有天下文章無慮三變高祖太宗㳂江左餘風絺章繪句揣合低昻故王楊為之覇𤣥宗好經術羣臣稍厭雕琢崇雅黜浮氣益雄渾則燕許擅其宗大厯正元間美才輩出嚅嚌道真􅉼泳聖涯於是韓愈倡之柳宗元李翺皇甫湜和之排逐百家法度森嚴抵轢晉魏上軋漢周唐之文卓然為一王法此其極也若侍從酧奉則李嶠宋之問沈佺期王維制䇿則常衮楊源陸贄權德與王仲舒李徳裕言詩則杜甫李白元稹白居易劉禹錫譎恠則李賀杜牧李商隠皆卓然以所長為一時冠其可尚已唐書青錢學士張鷟凡應入舉皆登甲科四叅選判䇿為詮府之最貟半千謂人曰張子之文如青錢萬選萬中未聞退時時流重之目為青錢學士是時天下知名無賢不肖皆記誦其文天后朝中使馬仙童䧟黙啜黙啜謂仙童曰張文成在否曰近自御史貶官黙啜曰國有此人而不用漢無能為也新羅日本東夷諸蕃尤重其文毎遣使入朝必重出金貝以購其文其才名逺播如此澁體徐彦伯為文多求新竒以鳯閣為鶠閣龍門為虬戸金谷為銑溪玉山為瓊岳以芻狗為卉犬以竹馬為篠驂以月兎為魄兎以風牛為焱犢後進效之謂澁體僉載富吳體富嘉謨與吳少微友善同官先是文士撰碑頌皆以徐庾為宗氣詞漸劣嘉謨與少微屬詞皆以經典為本時人欽慕之文體一變號為富吳體舊唐文苑𫝊馬過不覺崔融為司農作則天哀冊文用思過苦下直馬過其門不覺文就而卒時人以為二百年來無此文兩京記國朝傳記鬻文獲財李邕早擅才名尤長碑頌雖貶職在外中朝衣冠及天下寺觀多賫金帛往求其文前後所製數百首受納餽遺亦至鉅萬時議以為自古鬻文獲財未有如邕者其韓公行狀洪州放生碑批韋巨源謚議文士推重之舊唐文體溫麗李華文體溫麗少宏傑之氣蕭穎士詞鋒俊發華自以所業過之疑其誣詞乃為祭古戰塲文燻汙之如故物置於佛書之閣華與頴士因閲佛書得之華謂之曰此文何如頴士曰可矣華曰當代秉筆者誰及於此頴士曰君稍精思便可及此華愕然華著論言龜卜可廢通人當其言上思澁求樂李翰以進士知名天寶中寓居楊翟為文精密用思苦澁嘗從楊翟令皇甫曽求音樂毎思渇則奏樂神逸則著文曽撰張廵姚誾等傳兩卷士友稱之上揮翰霧散李白從弟令問常醉目白曰兄心肝五臟皆錦繡耶不然何開口成文揮翰霧散也本集㨗書無如李晟破朱泚徳宗覽收城露布之文云臣已肅清宮禁祗謁􅃦園鍾簴不移廟貎如故上感涕失聲左右六宮皆嗚咽論者以國朝㨗書露布無如此者于公異之辭也公異後為陸贄所忌誣以家行不至賜孝經一卷壞坎而終國史補唐于公異為李西平故作京城露布云肅清云云如故人以為工然傳季札為宋公劉裕作謁五陵表云山川無改城郭為墟宮廟頓隳鍾簴空列又宇文周平髙齊詔曰幽青海岱折簡而來冀北河南傳檄可定公異葢出此也寓簡發於羇旅文章之作常發於羇旅草野韓荆潭詩序儷花閗葉李翺祭退之文云建武以還文卑質䘮儷花聞葉顛倒相上及兄之為思動鬼神開合恠駭驅濤振雲包劉越羸並武同殷學者有歸大變于文文苑元和體元和已後文士學竒於韓愈學澁於樊宗師歌行則學於張籍詩句則學矯激於孟郊學淺切於白居易學滛靡於元貞俱名元和體大抵天寶之風尚黨大厯之風尚怪國史補元和主盟唐初開文館髙宗禮茂才虞許擅價於前蘇李馳聲於後潤色之文咸布編集然尚古者傷於大僻狥華者或至不經齷齪者局於宮商放縱者流於鄭衛若呂調律度楊𣙜古今賢不肖皆賞其文未有如元白之盛也昔建安才子始定覇于曹劉永明辭宗先讓功于沈謝元和主盟㣲之樂天而已舊元白𫝊論見詞􅂞心白傅與贊皇不協每毎有所寄文章李緘之一篋未嘗開劉三復或請之曰見詞翰則􅂞吾心矣南部出有豁懷令狐楚一代文宗雅知元積之辭學謂積曰嘗覽足下製作所恨不多遲之久矣請出其所有以豁予懷積因獻其文唐書文理貴中李德裕鎮浙西劉三復在幕一旦令草謝御書表謂之曰立構也歸創之三復曰文理貴中不貴其速贊皇以為當南部名馳戎夷馮定初長慶中源寂使新羅國見其國人傳寫諷念定所為黒水碑畫鶴記􅅊休符之使西畨也見其所館寫定商山記於屏障其文名馳于戎夷如此舊傳三十六體李商隠初為文奇古及在令狐楚府楚本工章奏因授其學商隠儷偶而繁縟過之時溫庭筠段成式俱用是相誇號三十六體本傳新羅請記大中四年進士馮㳙登第榜中文譽最髙是歳新羅國起樓厚賫金帛奏請撰記時人榮之𤨏言獺祭魚李商隠為文多撿閲書冊左右鱗次號獺祭魚談苑錦繡堆謝廷皓以詞賦著名號錦繡堆摭言撑霆裂月吾􅃴又自編一鳴集且撑霆裂月劼作者之肝脾亦當吾言之無怍也司空圖與王駕評詩書上水船朱梁時姚洎為學士一日梁祖問及裴延裕曰頗知其人思敏洎曰向在翰林號下水船帝曰卿便是上水船泊甚慙摭言又號急灘頭上水船吳沈顔字可鑄天復初進士後為吳翰林學士少有詞藻琴棋皆臻妙傷中語曰下水船言為文敏速無不載也著贅書十卷自序極其誇誕玉堂集五代劉贊文思遲乃禱乹象乞文才一夕夣吞小金龜自後大有文思孟氏朝為學士有玉堂集一日吐金龜投水中不久卒牧竪閑談西江集周王仁裕少夣剖出腸胃引江水浣之見水中沙石皆為篆籀文因飲之自是文思益佳有詩百卷號西江集五代史文思敏速徐鉉㓜能屬文文思敏速凡所撰還不喜預作有欲從其求文者必戒臨事即來請往往執筆立就未嘗沈思常曰文速則意思敏壯緩則體勢踈慢南唐穢臭宋齊丘天才縱逸凡建碑碣皆其為文命韓熈載八分書之熈載常以紙塞其鼻曰其詞穢且臭江南野録艾氣韓熈載性好謔浪有投贄荒惡者使妓炷艾燻之俟來嗅曰子之卷軸何多艾氣也上宵􅄰匪禛宋景文修唐史好以艱深之詞文淺易之説歐公思有以諷之一日大書其壁曰宵􅄰匪禛札闥洪休宋見之曰非夜夣不祥題門大吉耶何必求異如此歐公曰李靖傳云震雷無暇掩聦亦是類也宋公慙而退今所謂震霆不及塞耳者係再改佛頭着糞陳師錫序五代史荆公曰釋迦佛頭上不堪着糞衲被楊億為文章所用故事常令子姪檢出處每叚用小片紙録之輙粘所録而蓄之時人謂之衲被吕氏家塾記言對事對言對為美貴在精巧事對所先務在允當若兩事相配而優劣不均是驥在左驂駑為右服也若夫事或孤立莫與相偶是䕫之一足踸踔而行也雕龍遲速人之禀才遲速異分文文制體大小殊切相如含筆而腐毫楊雄輟輟而驚夣桓譚疾感於苦思王充氣竭於思慮張衡硏京以十年左思練都以一紀雖有巨文亦思之緩也淮南崇朝而注騷枚臯應詔而成賦子建援牘如口誦仲宣舉筆似宿搆阮瑀據案而制書禰衡當食而草奏雖有短篇亦思之速也上賦敷布其義賦敷也敷布其義謂之賦也釋名登高能賦傳曰不歌而誦謂之賦登髙能賦可以為大夫言感物造端材智深美可與圖政事故可以為列大夫也春秋之後周道􅃦壞聘問歌詠不行於列國學詩之士逸在布衣而賢人失志之賦作矣孫卿及楚臣屈原離纔憂國皆作賦以風咸有惻隠古詩之義其後宋玉唐勒漢興枚乘司馬相如下及楊子雲競為侈麗閎衍御作荒唐之語沒其風諭之義是以楊子悔之曰詩人之賦麗以則辭人之賦麗以滛如孔氏之門人用賦也則賈誼登堂相如入室矣漢書古詩之流賦者敷陳之稱古詩之流也前世為賦者有孫卿屈原尚頗有古詩之義至宋玉則多滛浮之病矣楚辭之賦賦之善者也故楊子稱賦莫深於離騷賈誼之作則屈原儔也虞摯文章流别論上林子虚司馬相如為上林子虚賦意思蕭散不復與外事相關控引天地錯綜古今忽然如睡煥然而興㡬百日而後成其友人盛覽字長通䍧牱名士嘗問以作賦相如曰合綦組以成文列錦繡而為質一經一緯一宮一商此賦之迹也賦家之心苞括宇宙總覽人物斯乃得之於内不可得而傳覽乃作合組歌列錦賦而退終身不復敢言作賦之心矣西京雜記大人賦相如將獻賦未知所為夣一黄衣翁謂之曰可為大人賦遂作大人賦言神仙之事以獻之賜錦四匹神化所至司馬長卿賦旹人皆稱典而麗雖詩人之作不能加也楊子雲曰長卿賦不似從人間來其神化所至邪子雲學相如為賦而弗逮故雅服焉并上以速易遲漢武好詞賦毎所行幸及鳥獸異物輙命司馬相如等賦之上亦自作詩賦數百篇賦成初不留思相如造文遲彌時而後成每嘆其工妙謂相如曰以吾之速易子之遲可乎相如曰於臣則可未知陛下何如耳上大笑而不責漢武故事賦託相如長安有慶虬之亦善為賦嘗為清思賦時人不之貴也乃託以相如所作遂大見重於世西京雜記浮滛或問屈原之騷相如之賦孰愈曰優㳺宏衍屈原之尚也浮艶漂滛相如之長也然原託譬喻其意周旋綽有餘矣長卿子雲未能及之矣典論不如相如枚臯為賦善於東方朔上有所感輙使賦之為文疾受詔輙成故所賦者多司馬相如善為文而遲故所作少而善於臯臯賦辭中自言為賦不如相如又言為賦廼俳見視如倡自悔類倡也故其賦有詆娸東方朔又自詆娸其文骫骳曲隨其事皆得其意頗詼笑不甚閑靡漢書古詩司義宣帝令王褒與張子僑等並待詔數從遊獵所幸宮館輙為歌第其高下以差賜帛議者多以為滛靡不急上曰不有博奕者乎為之猶賢乎已辭賦大者與古詩同義小者辨麗可喜譬如女工有綺縠音樂有鄭衛今世俗猶皆以此娛説耳目辭賦比之尚有仁義風諭鳥獸草木多聞之觀賢於倡優博奕逺矣上夣臟出地余少時愛楊子雲麗文高論不量年少猥欲追及嘗作小賦用精思太劇而立感動發病子雲亦言成帝上甘泉詔使作賦為之卒暴倦卧夣其五臟出地以手收之覺大少氣病一歳余素好文見子雲善為賦欲從之學子雲曰能讀千首賦則善為之矣桓子新論先是時蜀有司馬相如作賦甚𢎞麗溫雅雄心壯之每作賦常擬以為式漢書楊雄作賦有夣腸之談曹植為文有反胃之論言勞神也金樓子壯夫不為或問楊雄曰吾子少而好賦曰然童子彫蟲篆刻俄而曰壯夫不為也或曰霧糓之組麗曰女工之蠧矣吾子若論詩人之賦麗以則辭人之賦麗以滛但知變之而已又未知雄自為壯夫何如也著劇秦美新妄投於閣周章怖慴不逹天命童子之為耳桓譚以勝老子葛洪以方仲尼使人歎息顔氏家訓小巫見大巫張紘見柟榴枕愛其文為作賦陳琳在北見之以示人曰此吾鄉里張子綱所作也後紘見陳琳作武庫賦應機論與琳書深歎美之琳荅曰自僕在比與天下隔此間率少於文章易為雄伯故使僕受此過荖之譚非其實也今景興在此足下與子布在彼所謂小巫見大巫神氣盡矣吳志三都賦左思字太冲齊國臨淄人也作三都賦十年乃成門庭户席皆置筆硯遇得一句即便䟽賦成時人有譏訾思意甚不愜後示張華華曰此二京可三然君文未重于世宜以示髙名之士思乃請序皇謐謐見之嗟嘆遂為作序於是訾者莫不歛衽讚述焉陸機入洛欲為此賦聞思作之撫掌而笑與弟雲書聞有傖父欲作三都賦須其成當以覆酒瓮耳及思賦出機絶歎服以為不能加也世説孫興公云三都二京五經皷吹上班張之流左思欲賦三都乃詣著作郎張載訪岷卭之事遂搆思十年門庭牗厠悉著紙筆遇得一句即便䟽之自以為所見不博求為秘書郎及賦成讀書之家兢相傳寫都城為之紙貴張司空見左太冲三都賦曰班張之流也使讀之者盡而有餘久而更新晉書屋下架屋庾仲初作揚都賦成以呈庾亮亮以親族之懷大為其名價云可三二京於此人人競冩都下紙為之貴謝太傅云不得爾此是屋下架屋耳事事擬學而不免儉狹世説江左獨秀宋元嘉中南平王獻赤鸚鵡普詔羣臣為賦太子在衛率袁淑文冠當時賦畢賫示謝希逸時希逸賦亦竟袁見嘆曰江左無我卿當獨秀我若無卿亦一時之傑也遂隠其賦神􅂇貞元中杜黄裳知舉試珠還合浦賦進士林藻賦成憑几假􅃦夣人謂之曰君賦甚佳但恨未叙珠來去之意爾藻悟視其草乃足四句其年擢第謝恩黄裳謂曰唯林生叙珠來去之意若有神􅂇閩川名士傳結綵蹙金張登長于小賦氣宏而密間不容髪有織成隠起結綵蹙金之狀史權徳輿為之序以公幹景陽比之文字見命進士李為作淚賦及輕簿暗小四賦李賀作樂府多屬意花草蜂蝶之間二子竟不逺大世言文字可以見分命之優劣因話録語詩六詩文章者所以宣上下之像明人倫之叙窮理盡性以究萬物之宜者也王澤流而詩作成功臻而頌興周禮太師掌教六詩曰風曰賦曰比曰興曰雅曰頌言一國之事繫一人之本謂之風言天下之事形四方之風謂之雅頌者美盛徳之形容賦者敷陳之稱也比者喻類之言也興者有感之辭也後世之為詩者矣矣其功徳者謂之頌其餘則總謂之詩頌詩之美者也文章流别論六義詩有六義焉一曰興二曰比三曰賦文已盡而義有餘興也因物喻志比也直書其事寓言冩物賦也𢎞斯三義酌而用之幹之以風力潤之以丹彩使味之者無極聞之者動心是詩之至也詩品古律蘇李而上髙簡古澹謂之古沈宋而下法律精切謂之律珊瑚鈎詩話歌行姜堯章云守法度曰詩載始末曰守體如行書曰行放情曰歌行間之曰歌行悲如蛩曰吟通乎風俗曰謡委曲盡情曰曲娯書堂詩話動物感人氣之動物物之感人故摇蕩性情形諸舞詠照燭三才暉麗萬有靈祇待之以致饗幽㣲藉之以昭告動天地感鬼神莫近於詩昔南風之辭卿雲之頌厥時夏矣夏歌曰鬰陶乎予心楚謡曰名余曰正則雖詩骨未全然是五言之濫觴也逮漢李陵始著五言之目矣自王楊枚馬之徒詞賦競爽而吟詠靡聞從李都尉迄班媫妤將百年間有婦人焉一人而已詩人之風􅉐已缺畏東京二百載中惟有班固詠史質木無文降及建安曹公父子篤好斯文平原兄弟鬰為文棟劉楨王粲為其羽翼次有攀龍托鳯自致於屬車者葢將百計彬彬之盛大備於時矣詩品入室魏陳思王曹植詩其源出於國風骨氣竒髙詞彩華茂情兼雅怨體備文質粲溢今古卓爾不羣嗟乎陳思之於文章也譬人倫之有周孔鱗羽之有龍鳯音樂之有琴笙女工之有黼黻俾爾懐鉛吮墨者抱篇章而景慕暎餘暉以自燭故孔氏之門如用詩則公幹升堂思王入室景陽潘陸自可坐於廊廡之間矣上繡虎曹植七步成章號繡虎玉箱雜記魏文與陳思王同出逰見兩牛在墻間闘一牛墜井死詔植賦詩不得言牛不得言鬬不得言井不得言死百步要成四十言不成即加罪植應口即成曰兩肉齊道行頭上載横骨行至險上頭崛起相唐突二敵不俱勝一肉卧土窟非是力不如盛氣不得泄步猶未竟又作自怨詩三十言曰煮豆持作羮漉䜴以為汁箕在釡下燃豆向釜中泣本是同根生相煎何太急其敏如此尚書故實以筳叩鐘魏白馬王彪詩魏文學徐幹詩白馬與陳思荅贈偉長公幹往復雖曰以筳叩鐘亦能閑雅矣詩品兒女情多張華詩其源出於王粲其體華艶興託不竒巧用文字務為硏冶雖名髙曩代而䟽亮之士猶恨其兒女情多風雲氣少上爛若舒錦潘岳詩其源出於仲宣翰林歎其翩翩然如翔禽之有羽毛衣服之有綃縠猶淺於陸機謝混云潘詩爛若舒錦無處不嘉陸文如披沙簡金往往見寶嶸謂益壽輕華故以潘為勝翰林篤論故謂陸為深余常言陸才如海潘才如江輓歌輓歌辭者或云古者虞殯之歌或云出自田横之客皆為生者悼往哀苦之意陸平原多為死人自嘆之言詩格旣無此例又乖製作本意顔氏家訓讀文神超郭景純詩云林無静樹川無停流阮孚云泓峥蕭瑟實不可言毎讀此文輙覺神超形越世説見孝弟性夏侯湛作周詩成示潘安仁安仁曰此非徒溫雅乃别見孝弟之性潘因此遂作家風詩上犯即出詩桓溫少與殷浩友善浩嘗作小詩示溫溫曰汝慎勿犯我當出汝詩示人沈約野史一時文宗許詢有才澡善屬文自司馬相如王褒楊雄諸賢世尚賦頌皆體則詩騷傍綜百家之言及至建安而詩章大盛逮乎西朝之末潘陸之徒雖時有質文而宗歸不異也正始中王弼何宴好莊老𤣥勝之談而世遂貴焉至􅂈江佛理尤盛故郭璞五言始㑹合道家之言而韻之詢及太原孫綽轉相祖尚又加以三世之辭而詩騷之體盡矣詢綽並為一時文宗自此作者悉體之至義熈中謝混始改續晉陽秋皷吹来思桓𤣥作詩思不來輙作皷吹旣而思得云鳴鵠響長阜數曰皷吹固自來人思俗説託言以諷蜀李壽於成都興上方御府務于奢侈百姓思亂其臣龔壯作詩七首託言應璩以諷壽壽報曰省詩知意若今人所作賢哲之話言也古人所作死鬼之常詞耳魏書載記二十一華綺之冠普宋之際殆無詩乎義熈中以謝益壽殷仲文為華綺之冠殷不競矣詩品潘陸顔謝顔延之與陳郡謝靈運俱以辭未齊名而遲速懸絶文帝嘗各𠡠擬樂府比上篇延之受詔便成靈運久之乃就延之嘗問鮑照巳與靈運優劣照曰謝五言如初發芙蓉自然可愛君詩若鋪錦列繡亦雕繢滿眼延之毎薄湯惠休詩謂人曰惠休制作委巷中歌謡耳方當誤后事是時議者以延之靈運自潘岳陸機之後文士莫及江右稱潘陸江左稱顔謝焉南史湯惠休曰謝詩如芙蓉出水顔如錯彩􅍢金顔終身病之詩品都邑竸冩謝靈運毎有一詩至都邑貴賤莫不競寫宿昔之間士庶皆徧逺近欽慕不動京師宋書齊武陵王華作短句詩學謝靈運陳太祖曰康樂放蕩作體不辯有首尾安仁士衡深可宗尚顔延之抑其次也南齊十六風人第一謝惠連才思富㨗恨其蘭玉夙凋故長轡未騁秋懷擣衣之作雖復靈運銳思亦何以加焉久工為綺麗歌謡風人第一詩品康樂毎對惠連輙得佳語後在永嘉西堂思詩竟日不就窹􅄰間忽見惠連即成池塘生春草園柳變鳴禽故常云此語有神􅂇非吾語也家録五言冠冕元嘉中有謝靈運才髙詞盛富艶難蹤固已含跨劉郭陵轢潘左故知陳思為建安之傑公幹仲宣為輔陸機為太康之英安仁景陽為輔謝客為元嘉之雄顔延年為輔斯皆五言之冠冕文詞之命世也詩品好謔遇敵謝莊有口辨宋孝武嘗問顔延之曰謝希逸月賦何如荅曰美則美矣但莊始知隔千里兮共明月帝召莊以延之荅語語之莊應聲曰延之作秋胡詩始知生為久别離沒為長不歸帝撫掌笑曰人好嘲謔未有不遇其敵者善製冩物鮑照字明逺其詩善製形狀冩物之詞得景陽之諔詭含茂先之靡嫚骨節強於謝混驅邁疾於延年總四家而擅美跨兩代而孤出嗟其才秀人㣲故取湮當代然貴尚巧似不避危仄頗傷清雅之調故言險俗者多以附昭詩品感激􅉐挫謝晀字𤣥暉詩其源出於謝混㣲傷細密頗在不倫一章之中自有玉石然竒章秀句往往警遒足使叔源失步明逺變色善自發詩端而末篇多躓此意銳而才弱也至為後進士子之所嗟慕晀極與余論詩感激􅉐挫過其文上晀長五言詩沈約嘗云二百年來無此詩南史梁髙重晀詩曰三日不讀謝晀詩覺口臭談藪劉孝綽當時有重名無所與讓唯服謝晀常以謝詩置几案間動静輙諷味簡文愛陶淵明文亦復如此家訓打鉢立韻蕭文琰蘭陵人丘令楷吳興人江洪濟陽人齊竟陵王子良嘗夜集賦詩約四韻刻燭一寸文琰曰須燒一寸燭為成四韻詩何難之有乃與丘江等共打銅鉢立韻響滅則詩成皆可觀覽南史王𫝊孺傳文外獨絶王籍入若耶溪詩云蟬噪林逾静鳥鳴山更幽江南以為文外獨絶物無異議簡文吟詠不能忘之孝元諷味以為不可復得至懷舊志載於籍傳范陽盧詢鄴下才俊乃言此不成語何事於能魏收亦然家訓雕章間出齊蕭慤字仁祖嘗於秋夜賦詩其兩句曰芙蓉露下落楊柳月中踈邢子才曰蕭仁祖之斯文可謂雕章間出昔潘陸齊􅁤不襲建安之風顔謝同聲遂革太元之氣自漢逮晉情賞猶自不諧河北江南意製本應相詭顔黄門云吾愛其蕭散宛然自目而盧思道之徒雅所不愜箕畢殊好理宜固然三國典畧日限為詩張率字士簡常日限為詩一篇有虞訥者見而詆之率乃一旦焚毁更為詩示焉託云沈約訥便字字嗟稱無字不善率曰此吾作也訥慙而退南史十步後魏彭城王勰從幸上黨有大松上行而賦詩曰汝可作詩至吾行所而令就也時勰去帝十餘步至帝所而就詩曰問松經㡬冬山川何如昔風雲與古同本傳妻子不容北齊并州有士族好為可笑詩賦輕蔑邢魏諸公衆共嘲弄虚相稱讚必擊牛釃酒延之其妻明鑒人也泣而諫之此人嘆曰才華不為妻子所容何况行路至死不覺家訓作詩得妾李徳林為内史令與楊素共執隋政素功臣豪侈後房婦女千人徳林子百藥夜入其室私素寵姬旦日俱執於庭將斬之百藥年未二十儀神雋令素意惜之曰聞汝善為詩可作詩自叙若稱吾意當貸汝死授以紙筆立就素覽之欣然即以妾與之并資從數十萬國朝傳記嘉語得祸煬帝善屬文而不欲人出其右司𨽻薛道衡由是得罪因後事誅之曰更能作空梁落燕泥否煬帝為燕歌行文士皆和著作郎王胄獨不下筆帝毎衘之胄竟坐此見害而誦其警句曰庭草無人隨意緑復能作此語否國朝傳記隋唐嘉話力敵造化盧黄門云陳拾遺横制頺波天下質文翕然一變至今尚有陳梁宮掖之夙至公大變掃地並盡今古文集遏而不行惟公文章横被六合可謂力敵造化歟李陽氷序江山助張説旣謪岳州而詩亦悽惋人謂得江山􅂇云非世間語歌詩之風蕩來久矣大抵喪於南朝壞於陳叔寶然今之業是者苟不能求古於建安即江左矣苟不能求麗於江左即南朝矣或過為豔傷麗病者即南朝之罪人也吾唐來有是業者言出天地外思出鬼神表讀之則神馳八極測之則心懷四溟磊磊落落真非世間語者有李太白皮日休文藪李陽氷云太白多天仙之詞凡言多諷興自風騷之後馳騁屈宋鞭打楊馬千載獨步惟公一人而已得古體勢杜子美詩上薄風騷下該沈宋言奪蘇李氣吞曹劉掩顔謝之孤標雜徐庾之鮮麗盡得古人之體勢元禎集詩人多蹇天寶之末劉希夷王昌齡祖詠張若虚孟浩然常建李白杜甫雖有聞名俱流落不偶恃才浮誕而然也明皇雜録詩人多蹇如陳子昻杜甫各授一拾遺而屯剥至死李白孟浩然不及一命窮悴終身近日孟郊六十終恊律即張籍五十未離一太祝好取人句王維好佛故字摩詰性致髙逺得宋之問輞川别業山水勝絶今清凉寺是也維有詩名然好取人句如行到水窮處坐看雲起時英華集中詩也漠漠水田飛白鷺陰陰夏木囀黄鸝李嘉祐詩也國史補天心月脇逸歌長句駿發踔厲往往穿天心出月脇意外驚人語非尋常所能及也皇甫湜顧况集序擅塲李端工詩大厯中與韓翊錢起盧綸等文詠唱和馳名都下號大厯十才子郭尚父少子曖尚代宗女昇平公主賢明有才思尤喜詩人而端等十人多在曖之門下每宴集賦詩公主坐視簾中詩之美者賞百縑曖因拜官㑹十子曰詩先成者賞詩端先獻警句云薫香荀令偏憐小傅粉何郎不解愁主即以百縑賞之錢起曰李校書誠有才此篇宿搆也願賦一韻正之請以起姓為韻端即裂牋而獻曰方塘似鏡草芊芊初月如鈎未上弦新開金將教調馬舊賜銅山許鑄錢曖曰此食工也起等始服子虞仲舊唐唐人讌集必賦詩推一人擅塲是㑹也端擅塲送丞相王縉之鎮幽朔韓翊擅塲送丞相劉宴之廵江淮錢起擅塲國史補賂求供奉李益長於歌詩與宗人李賀齊名毎作一篇為教坊樂人以賂求取唱為供奉歌詞其征人歌早行箱好事者盡為圖障􅂞樂烽前沙似雪受䧏城外月如霜之句天下以為歌詞舊唐規諷時事白居易作樂府及詩百餘篇規諷時事流聞禁中上見而悦之召為翰林學士元禎為集序曰鷄林賈人求市頗切自本國宰相每以一金換一篇甚偽者宰相輙能辨之本傳李戡嘗曰自元和以來有元白詩者纎艶不逞非莊人雅士多為其所破壞流于民間䟽于屏壁子父女母交口教授滛言媟語冬寒夏熱入人肌骨不可除去吾無位不得用法以治之杜牧李志或云樂天毎作詩令一老嫗解之問曰解否嫗曰解則録之不解則不復習之故唐末之弊至於俚墨客揮冷淡生活裴令公居守東洛夜宴半酣公索句元白有得色時公為破題次至汝士曰昔日蘭亭無艶質此時金谷有髙人白知不能加遽裂之曰笙歌鼎沸勿作冷淡生活元顧曰樂天所謂能全其名者也唐紀探驪獲珠長慶中元㣲之夣得韋楚客同㑹樂天舍論南朝興廢各賦金陵懷古詩劉滿引一盃飲已即成曰王濬樓船下益州金陵王氣黯然收千尋鐵鏁沈江底一片䧏幡出石頭人世㡬囘傷往事山形依舊枕江流而今四海為家日故壘蕭蕭蘆荻秋白公覽詩曰四人探驪龍子先獲珠所餘鱗爪何用耶於是罷唱唐詩紀事鑄銅像事李洞字才江諸王之孫慕賈島為詩鑄銅其像事之如神詩人多笑其僻澁不貴其竒峭惟吳融稱之唐書小杜杜牧於詩情致豪邁人號為小杜以别杜甫本𫝊味出酸醎司空圖論詩云梅止于酸而塩止于鹹味嘗在于酸鹹之外謂其詩棋聲花院静旛影石壇髙之句為得之又云戴容州叔倫謂詩家之景如藍田日暧良玉生烟可望而不可置于目睫之前也一鳴集掘得玉匣湖南天䇿府學士劉昭禹字休明婺州人少師林寛為詩刻苦不憚風雪嘗與人論詩曰五言如四十箇賢人着一宇如屠沽輩不得覔句者若掘得玉匣合有葢有底但精心求之必得其寶郡閣雅談目昏耳聾魏明好作詩詞多而格下嘗擕近詩詣韓熈載韓託以目病請置几案徐覽明曰侍郎目昏請自為呤之韓曰耳聾加劇切恐不聞南唐近事小杜之下吳僧法海好作惡詩萃成帙求劉從事為序劉書曰師雖習西方之教頗同東魯之風因命為同東集然師之詩長於譬喻動有風騷昔唐小杜旣為老杜之次令師又在小杜之下悦生堂隋抄騷驚采絶艶昔漢武愛騷而淮南作傳以為國風好色而不滛小雅怨謗而不亂若離騷者可謂兼之蟬蛻穢濁之中游浮塵埃之外䂃然湼而不緇雖與日月夣光可也故能氣往轢古辭來切今軒翥詩人之後奮飛辭家之前驚采絶艶難與並能矣自九懷以下遽躡其跡而屈宋逸步莫之能追故其叙情怨則鬰伊而易感述離居則愴怏而難懷論山水則循聲而得貎言節候則披文而見時是以枚賈追風以入麗馬楊㳂波而得竒其衣被詞人非一代也故才髙菀其鴻裁中巧者獵其艶辭吟諷者衘其山川童蒙者拾其香草若能憑軾以倚雅頌懸轡以馭楚篇則顧盻可以驅辭力欬唾可以窮文致亦不復乞靈於長卿假寵於子淵矣文心雕龍驚瀾奮湍離騷經若驚瀾奮湍欝閉而不得流若長鯨蒼虬偃蹇而不得伸若渾金璞玉泥沙掩匿而不得用若明星皓月雲漢蒙蔽而不得出蔣之翰騷離靈王為章華之臺與伍舉升焉曰臺美矣對曰君國者將民之與處私欲𢎞侈則徳義鮮少德義不行則邇者騷離而逺者距違楚語騷愁也離畔也天中記卷三十七
