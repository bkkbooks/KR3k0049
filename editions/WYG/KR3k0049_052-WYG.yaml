body:
  text: 天中記卷五十二明陳耀文撰李玉衡星玉衡星散為李運斗樞土宜五沃之土其梅其杏其桃其李管地員趙李休無實李一名趙李座接慮李今之麥李爾雅王文王母遺帝上清玉文之李黄帝内𫝊顔淵李武帝初修上林􅁐羣臣逺方各獻名果異樹亦有製為美名以摽竒麗李十五紫李緑李朱李黄李青綺李青房李同心李車下李含枝李食枝李顔囘李羗李燕李蠻李侯李西京雜記李大如瓶李少君謂武帝溟海棗大如𤓰鍾山之李大如瓶臣以食之遂生竒光漢武内傳員丘紅李仙之上藥有員丘紅李上玉葉琳國去長安九萬里生玉葉李色如碧玉數千歳一熟味酸甘韓衆常餌此李因名韓衆李洞真記帝坐神明臺設琳國碧李御李子許昌節度使小㕔是故魏景福殿董卓亂曹操挾令遷帝自洛都許許州有小李子色紅黄大如櫻桃謂之御李子即獻帝所植至今有焉述異記廬山白李袁本初時有神出河東號度索君人共立廟兖州蘓氏母病徃禱見一人着白布單衣高冠冠似魚頭度索君曰昔廬山共食白李未久已三千年日月易得使人悵然去後度索居云此南海君也列異傳安陽李魏文帝安陽殿前天降朱李八枚啖一枚數日不食今李種有安陽李大而甘者即其種也述異記𤣥雲李五雲丹山上有𤣥雲之李食之得仙真人王褒内傳玉李五原蔡綖入山而還欺家人云到崑崙山有玉李王𤓰玉桃其實形如世間桃李但光明洞徹而堅須以玉井水洗之便軟而不可食抱朴子枯枝赤李安丘望之病篤弟子公沙都來省之與安丘共坐於庭樹下安丘曉然有痊聞李香開目見雙赤李着枯枝都仰手承李自堕掌中安丘食之所苦除盡稽康高士傳道傍苦李王戎年七歳嘗與諸兒遊觀道邊李樹有子折枝諸小兒競走取之惟王戎不動人問之荅曰樹在道傍而多子此必苦李也取之信然世説啖李伐樹和嶠性至儉家有好李王武子求之與不過數十王武子因其上直率少年能食之者持斧詣園飽共噉畢伐之送一車枝與和公問曰何如君李和旣得而笑之已上嶠諸弟徃園中食李而皆計核責錢故嶠婦弟王濟伐之也語林鑽核王安豐有好李嘗賣之恐人得其種乃鑽核而賣世説同心北齊武帝改芳林園為仙都苑植名果有合歡杏同心李花木録盤屈如龍武徳中有獻李樹連李盤屈如龍舊唐果品之首李直方常第果實若貢士者以緑李為首楞棃為二櫻桃為三柑為四蒲桃為五或薦荔枝曰寄舉之首問栗何如曰最有實事不出八九始范氏以諸香品時輩侯味虚撰百官本草皆此類也國史補瑞應唐肅宗至徳二年返轅指扶風令釋元皎於鳯翔開元寺置御藥師塲忽於法㑹内生一叢李樹有四十九莖元皎等表賀帝喜曰此大瑞應荅勅云瑞李繁滋國之興兆生在伽藍之内足知覺樹之榮感此殊祥與師同慶宋高僧傳似葢興元元年八月亳州貞元縣大空寺僧院李樹種來十四年纔長一丈八寸今春枝忽上聳高六尺周圍似葢九尺餘舊唐楊花南唐李昇受徐溫之禪也其日白雀見于庭江西楊化為李洪州李生連理詔還李姓國還號唐江南别録朱仲李房陵定山有朱仲李園三十六所潘岳閑居賦曰房陵朱仲之李李尤果賦云三十六園之朱李葢仙李縹而神李紅陸士衡果賦云中山之縹李是也述異記黄中西王母居龍月城城中産黄中李花實上皆有黄中二字王母惜之過於蟠桃集真記嘉慶子東都嘉慶坊有李樹其實甘鮮為京都之美故稱嘉慶李今人但言嘉慶子葢稱謂旣熟不加李亦可記也韋述兩京記金李杜陵有金李李之大者謂之夏李小者呼鼠李述異九都北狄渤海有九都之李唐志春李華林國有春李冬華春熟鄴中記黄建李有黄建李青皮李馬肝李冬李十一月熟廣志河沂黄建房陵縹青傳𤣥賦南居細李四月先熟風土記二色瀬鄉老子祠有紫石榴紅縹李一李二色上如拳山中有縹李大如拳者呼拳李李尤果賦云如拳之李上柰三種柰有白赤青三種張掖有白柰酒泉有赤柰廣志二柰曜丹白之色閑居賦啖紫柰夏禹詣鍾山啖紫柰醉金酒服靈實行九真而猶塟於㑹稽真誥福鄉柰展上公學道于伏龍地乃植柰彌滿所住之土常白諸仙人云昔在華陽下食白柰美憶之未久忽已三千歳矣郭四朝後來住其處又種五果上公云此地善可種柰所謂福鄉之柰可以除災癘洞仙𫝊緑柰上林苑有白柰紫柰緑李西京雜記有紫柰大如升甜如蜜核紫花青硏之有汁如漆可染衣其汁着衣不可湔浣亦名闇衣柰洞冥記帝坐神明臺果則有塗陰紫梨圓丘仙藥之次者有圓丘紫柰漢武内傳上握蘭園之金精摘圓丘之紫柰故事神柰漢末楊氏家園中産神柰三株述異記冬熟即夕殿中虎賁宣詔賜臣冬柰一奩詔使溫啖夜非食時而賜見及柰以夏熟今則冬至物以非時為珍恩以絶口為厚詔曰此柰從梁州來道里旣逺又來東轉暖故稍變色不佳耳曹植表抱樹王祥後母庭中有柰樹始着子使祥守視晝驅鳥雀夜驚䖝鼠時雨忽至祥抱樹至曙母見之惻然蕭廣濟孝子傳三𤣥夫人姓魏名華存性樂神仙季冬夜半有四真人降夫人静室因設𤣥雲紫柰絳實靈爪夫人還王屋山王子喬等並降夫人與真人為賓主設三𤣥紫柰續仙傳碧柰紫㣲王夫人詩云俯潄雲瓶津仰掇碧柰花濯足玉天池皷枻牽牛河真誥白花如柰成帝杜皇后崩先是三吳女子相與簮白花望之如素柰𫝊言天公織女死為之着服至是而後崩晉書紹興五年寧徳皇后訃音從北庭來陳之茂䟽云十年罹難終弗返於蒼梧萬國啣寃徒盡簮于白柰實重七斤白馬寺浮圖前柰林葡萄異於餘處柰實重七斤葡萄實偉于棗至熟時帝取之或賜宫人宫人轉遺親以為竒異得者不敢輙食乃歴數家洛陽伽藍記承光柰承光寺亦多果木柰味甚美冠於京師上不顧落實楊愔字遵彦㓜年學庭前有柰樹實落于地群兒咸争之愔獨坐不顧其季父暐􅃴入學舘見之大用嗟異顧謂賔客曰此兒恬裕有我家風典畧朱奈貞觀中頓丘有人于黄河渚上拾菜得一樹栽子大如指持歸蒔之三年乃結子五顆味狀如柰又似林檎多汁異常酸美送縣縣上州以其竒味乃進之後樹長成漸至三百顆每年進之號曰朱柰至今猶存徳貝博等州取其枝接所在豊足人以為從西域浮來碍渚而住矣僉載永徽中魏郡人王方言拾得此樹以果獻刺史紀王慎王貢於高宗以為朱柰又名五色林檎或謂之聨珠果上重賜王方言文林郎亦號此果為文林果俗云頻婆果洽聞記冬柰崑崙山上有冬柰冬生子碧色須玉井之水洗之方可食拾遺記聖柰河州鳯林闗有靈巖寺每七月十五日溪宂流出聖柰大如盞以為常洽聞記春秋柰虎丘山下三面有春秋二柰虎丘山䟽大如兎頭白柰出凉州野猪澤大如兎頭酉陽似日給日給之華與柰相似也柰結實而日給零落虚偽之言與真實相似也虚偽敗而真實成杜恕篤論來禽林檎似赤柰子亦名黒禽亦名來禽言味甘熟則來禽也廣志此有三種大長者為柰圓者林檎夏熟小者味澀為梣秋熟本草杏歳星之精杏者東方歳星之精也典術三種滎陽有白杏鄴中有赤杏有柰杏廣志海杏范蠡宅在湖中有海杏大如拳地志縹杏瀬鄉老子祠有縹杏述異記文杏漢上林􅁐有文杏林有文彩西京雜記餘文杏以為梁相如長門賦􅅾萊杏上林􅁐有蓬萊杏東海郡都尉于吉所獻一株花雜五色六出云是仙人所食西京雜記號仙人杏述異記仙人杏天台山有杏花六出而五色杏園洲在南海中多杏海上人云仙人種杏處漢時常有人洲行遇風泊此洲五六月日食杏故免死云洲中有冬杏王充果賦云冬實之杏春熟之甘晉郭太儀果賦云杏或冬而實述異記金杏濟南郡之東南有分流山山上多杏大如棃黄如橘土人謂之漢帝杏亦曰金杏酉陽杏林董奉字君異居廬山為人治病重病得愈者令種杏五株輕病得愈者為栽一株數年之中杏有十數萬株欝然成林杏子熟奉於林中所在作簞食一器宣語買杏者不復須來報但自取之一器糓便得一器杏有人少糓徃而取杏多即有三四頭虎逐之奉悉以杏所得糓賑救貧窮神仙𫝊杏花北嶺上有樹百株今猶稱董先生杏林得陽記三𤣥紫杏仙人有三𤣥紫杏南岳夫人𫝊杏核如笠裴沆再從伯遇白衣老人裴渇甚求茗老人指一土龕此中有少漿可就取裴視龕中有杏核一扇如笠蒲中有漿漿色正白乃力舉飲之不復飢渇漿味如杏酪老人曰君向飲杏漿當哭九族親情且以酒色為誡也酉陽神仙感遇傳望杏三月杏花盛可葘白沙輕土之田四民月令杏花如何可耕白沙上救荒嵩山東北有牛山箕山多杏至五月爛然黄茂自中國䘮亂百姓飢饉皆資此為命人人充飽而杏不盡嵩髙山記靈山靈山之下其木多杏山經卜歳杏多實不蟲者來年秋禾善五木者五糓之先欲知五糓但視五木擇其木盛者來年多種之萬不失一故五果分五行所以表五谷也師矌占術桃五木之精桃者五木之精仙木也典術互見元日應氣驚蟄大壯初九桃始華不華倉庫多火易卦通騐桃棓王子慶忌死于劒羿死于桃棓棓大杖以桃木為之以擊殺羿由是以來鬼畏桃淮南氷桃扶桑東有磅磄山日所不及其地寒上有桃樹千圍其花青黒色萬歳一實西王母以食穆王拾遺記桃殳齊桓公出逰遇一丈夫衰衣應歩帶着桃殳桓公恠而問之曰是何名何經所在何篇所居何以斥逐何以避余丈夫曰是名二桃桃之為言亡也夫日日慎桃何患之有故亡國之社以戒諸侯庶人之戒在於桃殳桓公説其言與之共載来年正月庶人皆佩詩曰殷監不逺韓詩外傳垂行子産相鄭徃見壺丘子林與其弟子坐必以年是倚其相於門也夫相萬乘之國而能遺之故相鄭十八年刑三人殺二人桃李之埀於行説苑作街者莫之援也錐刀之遺於道者莫之舉也呂覽碧桃尹喜從老子西遊省太真王母共食碧桃之實内傳六果之下孔子御坐於魯哀公哀公賜之桃與黍哀公請用仲尼先飯黍而後㗖桃左右皆揜口而笑哀公曰黍者非飯之也以雪桃也仲尼對曰丘知之矣夫黍者五糓之長也祭先主為上盛果蓏有六而桃為下祭先王不得入廟丘聞之也君子以賤雪貴不聞以貴雪賤今以五糓之長雪果蓏之下是從一雪下也丘以為妨義故不敢以先於宗廟之盛也韓外儲二桃殺三士公孫接田開彊古冶子事景公勇而無禮晏子言于公曰此危國之器也不若去之因請公使人少餽之二桃曰三子何不計功而食公孫接田開彊各言功援桃而起古冶子又言其功曰二子何不反桃抽劍而起二子曰吾勇不子若功不子逮取桃不讓是貪也然而不死無勇也皆反其桃挈領而死古冶子曰二子死之冶獨生之不仁耻人以言而夸其聲不義恨乎所行不死無勇亦反其桃挈領而死晏子春秋餘桃昔彌子瑕有寵於衛君與君遊於果園食桃而甘不盡以其半啖君君曰愛我哉忘其口味以啖寡人及彌子色衰愛弛得罪于君曰是固嘗啖我以餘餘桃故彌子之行未變于初也而以前之所以見賢而後獲罪者愛憎之變也韓説難樹桃陽虎得罪于衛北見簡子曰自今以來不復樹人矣簡子曰何哉陽虎對曰夫堂上之人臣所樹者過半矣朝廷之吏臣所立者亦過半矣邊境之士臣所立者亦過半矣今夫堂上之人親却臣於君朝廷之吏親危臣於衆邊境之士親刼臣於兵簡子曰唯賢者為能報㤙不肖者不能夫樹桃李者夏得休息秋得食焉樹蒺藜者夏不得休息秋得其刺焉今子之所樹者蒺䔧也自今以來擇人而樹毋已樹而擇之説苑崔頥荅豫章王書云門有將相宜樹桃李隋書或謂狄仁傑曰天下桃李悉在公門通鑑王冷然上裴耀卿書云拾遺補闕容有種乎僕不佞亦相公一株桃李也摭言魏文侯時子質仕而獲罪焉去而北游謂簡主曰從今已後而不復樹徳於人矣云云韓詩外傳御覽李部引之按史六國年表趙簡子與魏獻子同時文侯元年簡子之子襄子巳卒其去簡子之死三十三年矣韓詩疑誤雅翼以韓詩作韓子亦誤剖腹周書云秦吏趙凱以私恨告國民吳旦生盜食宗廟御桃旦生對曰民不敢食也王曰剖其腹出其桃史記惡而書之曰食桃之肉當有遺核王不知此而剖人腹以求桃非禮也鍾離意别傳園亡一桃知伯庖人亡炙一篋而即知之韓魏將反而不能知邯鄲子陽園亡一桃而即覺之其自亡也而不能知斯皆鋭情於小而忘大者也劉子觀量篇獲桃得道寧都金精山係第三十五福地漢初張芒女麗英入山獲二桃得道長沙王吳苪一日至洞中見其女乘紫雲在半空謂苪曰吾為金星之精降治此山言訖即升天而去白玉蟾記勝覽三偷東郡獻短人帝疑其精召東方朔朔至呼短人曰巨靈阿母還來否短人不對因指朔謂上曰西王母種桃三千年一着子此兒不良已三過偷之矣漢武故事西王毋以七月七日降帝宫命侍女取桃須㬰以玉盤盛桃七枚大如􅬪子形圓色青以呈王母王母以四顆與帝三顆自食桃味甘美口有盈味帝􅀈録其核王母問帝帝曰欲種之耳母曰此桃三千歳一實中夏地土薄不生如何帝乃止内傳後上殺諸道士妖妄者百餘人西王母遣使謂上曰求仙而信邪欲見人而殺戮吾與帝絶矣又致三桃曰食此可得極壽故事桃湯王莾畏漢髙神靈乃令虎賁㧞劒四面斫髙廟桃湯赤鞭灑屋梅子巨桃漢明帝時恒山獻巨桃核霜下結花隆暑方熟亦云仙人所食帝使值于霜林園園皆植寒果積氷之節百果方盛俗謂之相陵聲之誤也拾遺記天台桃漢明帝永平五年剡縣劉晨阮肇共入天台山取糓皮迷路不得返經十餘日粮盡饑餒殆死遥望山上有一桃大有子實而絶巖㫁澗永無登路板縁藤葛然後得上各啖數桃而不飢下山一大溪邊有二女資質妙絶因要還家勅婢云劉阮二郎向雖得瓊實猶尚虚弊可速作食有胡麻山羊脯甚美遂留半載餘二人懷土求歸女曰宿福所率何復欲還因指示還路旣出無復相識問得七世孫傳聞上世入山迷不得歸洲明録桃源晉太元中武陵人捕魚從溪而行忘路逺近忽逢桃花林夾兩㟁芳華鮮美落英繽紛林盡得山山有小口初極狹行四五步豁然開朗邑屋連接鷄犬相聞男女衣着悉如外人見漁父驚為設酒食云先世避秦難率妻子來此遂與外人間隔問今是何世不知有漢不論魏晉旣出白太守劉歆即遣人隨徃尋之迷不復得路陶濳桃源記鬼不畏桃譙郡夏侯文規亡後見形還家經庭前桃樹邊過曰此桃我昔所種子乃美好其婦曰人言亡者畏桃君何不畏耶荅曰桃東南枝長二尺八寸向日者憎之或亦不畏也甄異傳奪帝食桃惠帝征成都王於安陽城北軍敗日已向中而大官未暇進食左右有賫秋桃一枚便以獻帝帝食三枚石超使人擘手奪三枚四王啟事斫桃武歴陽女嫁阮宣武絶忌家有一桃樹華葉灼燿宣歎美之即便大怒使婢取刀斫樹摧折其華柘婦記求桃桓𤣥素輕桓崖崖在京下有奴桃𤣥連就求之遂不得佳者𤣥與殷仲文書以為嗤笑曰徳之休明肅慎貢其楛矢如其不爾籬壁間物亦不可得也世説勾桃鄴華林苑有勾鼻桃子重三斤或二斤半亦有名棃几此衆果氣味甘美入口消汁人間有名果季龍作蝦蟆車四箱廣一丈深一丈合土在中植之則無不生也洽聞記仙人桃魏華林園景陽山南有百果園果列作林林各有堂有仙人桃其色赤表裏照徹得霜即熟亦出崑崙山亦曰王母桃也伽藍記洛城華林園内有冬桃十月始熟形如括蔞食之觧勞亦名西王母桃酉陽康國獻正觀十一年康國獻金桃銀桃詔令置於苑囿舊唐桃花宴四年春上宴於桃花園羣臣畢從學七李嶠等各獻桃花詩上令宫女歌之辭旣清婉歌仍妙絶獻詩者舞蹈稱萬歳上勅太常簡二十篇入樂府號曰桃花行景龍文竒記助嬌御􅁐新有千葉桃花帝親􅎥一枝挿於妃子寳冠上曰此箇花尤能助嬌態天寶遺事消恨明皇於禁苑中初有千葉桃盛開帝與貴妃日逐宴于花樹下帝曰不獨萱草忘憂此花亦能消恨上葉濶五寸桑苧翁謂李復云天寳末有韋長史虚舟寓于廬山瀑布泉時夏月多雨見瀑布之中流出一桃葉濶五寸長一尺二寸北户録核容一升至徳初徐正字凝于海䀋縣白塔沙渚之上得一桃核片可貯一升上水部員外郎杜陟嘗見江淮士人以桃核扇量米正容一升言於九嶷山溪中得酉陽桃大如椀史論在齊州時出獵憇蘭若中覺桃香異常訪其僧僧言近有人施二桃因取獻論大如飯椀論時饑盡食之核大如鷄􅆑論因詰其所自僧導論上山越澗至一處清泉恠石非人境也有桃數百株其香撲鼻論與僧各食一蔕取兩個而返酉陽仙桃咸通中越僧懷一居雲門寺遇一道流相與入山花木繁茂水石幽勝久之覺飢道流曰此有仙桃千歳一實可以療飢以一桃授之大如二升器竒香珍味非世所有懷一自此不食神仙感遇傳方冬培桃武宗朝術士王瓊妙于化物無所不能方冬以藥栽培桃杏數株一夕繁英盡發芳蕋濃艶月餘方謝劇談録核大如斗咸通中王􅎇為王屋令遇東極真人王太虚授以所注黄庭經復與桃核大如數斗器磨而服之身輕無疾王氏神仙傳思戒莊宗年邁多疾馮道因奏事言於帝曰臣願陛下􅃦膳之間動留調衛道指御前果實曰如食桃不康翊日見桃而思戒可也如食李不康翊日見李而思戒可也陛下幸思而戒之矣後唐史紅桃六出蜀孟知祥僭位召百官宴芳林園賞紅桃花其葉六出外史檮杌核濶尺餘蜀文谷好古之士也於中書舍人劉光祚處見桃核杯杯濶尺餘紋綵燦然真蟠桃之實也劉自云少時遊華岳見一道士以此核酌瀑泉􅏕潄觀之驚駭道士以半片授之野人閑話孟㫤二十年十二月中書舍人劉光祚進蟠桃核酒盃云得華山陳摶賜帛五十疋張唐英後蜀紀事外史檮杌亦載有人以桃核半枚獻王黼者中容米三四斗墨莊漫録大桃吐谷渾有桃大如石甕洽聞記大食勿斯離國桃子重二斤史木子之大者有積石山之桃實焉大如十斛籠𤣥中記東海有山名度索山有大桃樹屈盤三千里曰蟠桃十洲記大海中女人國土産蓮肉長尺餘桃核長二尺玉桃玉桃服之長生不死若不得早服之臨死日服之其尸畢天地不朽神農經桃梟桃實已乾著木上經冬不落者名桃梟又名桃奴正月採之本草偏桃偏桃出波斯國波斯呼為婆淡樹長五六丈圍四五尺葉似桃而濶大三月開花白色落落結實狀如桃子而形偏故謂之偏桃其肉苦澁不可噉核中仁甘甜西域諸國並珍之酉陽占畢國出偏核桃形如半月狀波斯人取食之絶香美極長氣力比於中夏桃仁療疾不殊㑹最云偏桃仁㪍律國尤多花殷紅色郎中觧忠順使安西以蘿蔔挿之而生桃仁肥大其桃皮不堪食北户録金桃貞觀二十一年康國獻黄桃大如鵝卵其色如金亦呼為金桃通典木桃桃之大者謂之木桃詩云投我以木桃是也獼猴洋州雲亭山生獼猴桃甚甘酸食之止渇海録綏山葛由好刻木作羊賣之一旦騎羊上綏山王侯追之皆得仙綏山多桃故諺曰得綏山一桃雖不得仙亦足以豪列仙𫝊雲臺綿州彰明縣雲臺山天柱崖下有一桃樹髙五丈餘外皮似桃内心似松張道陵與王長趙昇試法于此四百餘年桃迨今不朽有碑記之道經云雲臺山有一桃樹三年一花五年一實懸絶無底之谷趙昇乃自擲取得桃子餘者無能取之治應胃宿郡國志咒桃樊夫人與夫劉剛俱學道術各自言勝中庭有兩大桃樹夫妻各咒其一夫人咒者兩枝相闘擊良久綱所咒者桃走出籬外神仙𫝊仙桃仙桃出蘓眤仙壇有人至心祈之輙落壇上或至五六顆形如石塊赤黄色破之如有核三重硏飲之立愈衆疾尤治邪氣紅衣人歌天寶中處士崔元㣲東洛有宅入嵩山採术茯苓回宅中蒿萊滿院時春季夜風月清朗忽有青衣引十餘人有緑裳者前曰某姓揚指一人曰李氏又一人曰陶氏又指一緋衣小女曰姓石名醋醋各有侍女輩色皆殊絶香氣􅀈􅀈襲人處士命酒各歌以送之紅衣人送酒歌曰綘衣披拂路盈盈淡染臙脂一朶輕自恨紅顔留不住莫怨春風道薄情月中隨而送之踰􅁐墻入苑中乃桃花精也博異記石城玉桃古記云昔人于天目捕獵沮雨于石城之外見林間有白桃一顆摘入手如氷忽又變紅其熱如湯遂採木葉包之藏于白囊下山捫之猶在及至家惟木葉存杭州志接桃李接桃而本強者其實毛化書櫻桃含桃仲夏羞含桃先薦􅃦廟含桃櫻桃鸎鳥所含食故言含桃也吕覽一名朱桃一名麥美木草櫻桃有三種櫻桃其種有三大而殷者曰呉櫻桃黄而白者曰蠟珠小而赤者曰水櫻桃食之皆不如蠟硃楊膳夫録獻宗廟漢惠帝出離宫叔孫通曰禮有春嘗果方今櫻桃可獻願陛下出因取櫻桃獻宗廟諸獻果自此始漢書賜羣臣明帝於月夜宴羣臣於園太官進櫻桃以赤瑛為盤賜羣臣月下視之盤與桃同色羣臣皆笑云是空盤拾遺記餉櫻桃太宗將致櫻桃於鄭公稱奉則是尊言賜又似卑問之虞監曰昔梁帝遺齊巴陵王稱餉遂從之舊唐賜朱櫻四年夏四月上與侍臣於樹中摘櫻桃恣其食未後於蒲萄園太陳宴席奏宫樂至㝠每人賜朱櫻兩籠景覧舘記和以杏酪四年夏四月上幸兩儀殿命侍臣昇殿食櫻桃其櫻桃並盛以琉瑠和以杏酪飲酴醿酒上口􅎥𤣥宗紫宸殿櫻桃熟命百官皆摘之舊唐蠟帛丸雜果中李希烈始入汴聞户曹㕘軍竇良女桂娘美而能文強取之桂娘將出門顧其父曰慎無戚必能滅賊桂娘在希烈側能巧曲取信得聞密謀希烈歸蔡州桂娘常稱陳仙竒忠勇可用而妻亦竇姓願如姒媢者以固其夫希烈然之桂娘以姊事仙竒妻因論以禍福仙竒妻然之興元元年四月希烈暴死其子不發喪欲悉誅諸將自立未决有獻含桃者桂娘白希烈子分遺仙竒妻且以示無事于外因為蠟帛丸雜果中出所謀仙竒見之言于薛育明日各以所部兵譟而入子迫出遍拜語已斬之取首以獻后兩月吳少誠殺仙竒知桂娘謀因亦殺之杜樊川集賜太后文宗始即位嘗因内園進新櫻桃將以賜三宫太后上曰送太后焉可以為賜因援筆易其文簿曰奉太后自是以為常舊唐櫻桃宴唐時新進士尤重櫻桃宴乾符四年劉鄴第二子覃及第時狀頭已下方議醵率覃濳遣人預購數十樹獨置是宴大㑹公卿時京國櫻桃初出雖貴逹未􅃴遇而覃山積鋪席復和以糖酪者人享蠻畫一小盎亦不啻數升以至參御輩靡不霑足摭言夣遺櫻桃裴元裕羣從中有悦鄰女者夣妓遺二櫻桃食之及覺核墜枕側酉陽養櫻桃陳景思説勑使齊日昇養櫻桃至五月中皮皺如紅柿不落其味數倍人不測其法上饆饠韓約能作櫻桃饆饠其味不變上十二枚及一尺衛公言滑州櫻桃十二枚及一尺上賜櫻屈拜嚴綬為左僕射司空嘗預百寮廊中食上令中使馬江朝賜櫻桃綬為兩班之首舊識江朝叙語次不覺屈􅂰而拜江朝荅拜御史大夫高郢亦從而拜為御史所劾綬出鎮荆南江朝降一官續世説梨千樹淮北滎南河濟之間千樹梨其人皆與千户侯等漢書紫梨老子西游省太真王母共食碧梨紫梨尹喜内𫝊十梨上林苑有紫梨芳梨實小大谷梨細葉梨縹蔕梨金柯梨出瑯琊王野家太守王唐所獻瀚海梨出瀚海北耐寒不東東王梨紫條梨青玉梨西京雜記𤣥光太上之藥果有𤣥光梨内傳取小孔融年四歳與諸兄食梨輙取其小者人問其故荅曰我小兒法當取小者由此宗族竒之文士傳出血曹操自漢中至洛陽起建始殿使工蘓越從美梨掘之根傷盡血出越白狀操躬自視而惡之以為不祥還遂􅃦疾曹瞞傳賜梨介象為吳主所徴在武昌速求去不許象言病帝以美梨一奩賜之湏㬰象死帝殯而埋之以日中時死其日晡時到建業以所賜梨付守苑吏種之後吏以狀聞即發象棺視之惟一符耳神仙𫝊真定真定御梨大若拳甘若密脆若菱可以觧煩釋渇魏文帝詔洛陽北邙張公夏梨海内唯有一樹常山真定梨山陽鉅野梨梁國睢陽梨齊郡臨淄梨廣都梨又云鉅鹿豪梨重六斤數人分食之上黨楟梨小而加甘新豐箭谷梨闗以西𢎞農京兆右扶風界諸谷中梨多供御陽城秋梨夏梨廣志味出靈闗山名之陰旨珍玉津之澨豈徒真定歸美大谷慙滋謝眺賜紫梨啟睢陽東苑子圍三尺新豊箭谷枝懸六斤􅁃肩吾啟大谷張公大谷之梨潘岳賦梨則大谷各紫張公秋黄玉京洛都賦城南五十里有大谷舊名通谷華延洛陽記哀家桓南郡每見人不怏輙嗔云君得哀家梨當復不蒸食不世説舊説秣陵有哀仲家梨甚美大如升入口即消釋分遺道安公講僧常數百習鑿齒嘗餉十梨值講安公便於座中手自剖分梨盡人遍都無頗上同心梨吕光時燉煌太守宋歆獻同心之梨段龜龍凉州記八百梨王𤣥謨徑滑臺一疋布責民八百梨以此倍失人心宋書百果之宗張敷小名查父邵小名梨宋文帝嘗戯之曰查何如梨荅曰梨為百果之宗查何可比南史張敷從彭城還𫝊亮下船與别張不起授手着舫户外傳遂不執手熟視張面云查故是梨中不臧者便去俗説消梨宋廢帝太始年旣失彭城江南始盛傳種消梨先無此樹百姓争欲種植識者曰當有姓蕭而來者後齊受禪廣五行記南齊志高聰梨魏高聰以高肇之黨彈廢於家㫁絶人事帷修塋園果世稱高聰梨以為珍異北史鳯棲河中府土貢鳯棲梨地理志陜州峽石縣山中有梨一株甚偉古老𫝊云鳯止梨貞觀初有鳯止此木其後結實猶如合掌狀團團婉轉有赤黄之色其馨香脆美乃諸果之王職貢之珍也刺史韋堅為銘刻石紀異記梨杖唐三藏游西域經行梨州植棃杖云他日州治在此後果遷如其言其後棃成株高五丈圍九尺宋天聖間州治火人取其枝以接他株帝為燒梨肅宗嘗夜坐召頴王等三弟同於地爐􅄢毯上坐時李泌絶粒上自燒二棃以賜之頴王恃恩固求上不與曰汝常飽肉食先生絶粒何必争之賜以他果頴王曰先生恩渥如此臣等請聨句以為他年故事頴王曰先生年幾許顔色似童兒信王曰夜抱九仙骨朝着一品衣幽王曰不食千鍾粟惟飡兩顆棃旣而三王請上成之上曰天生此間氣助我化無為鄴侯家𫝊紫花梨武宗五年患心熱之疾青城山邢道士以赤城山之青芝太白溪南紫花棃所合青丹二粒愈之邢辭去後帝疾復作詔求紫花棃時恒州節度王逹尚壽春公主公主即㑹昌女弟聞真定李令有一株即遣就加封檢及秋實公主手選進之其記室李遵來作進棃表云紫花開處擅美春林縹蔕懸時回光秋浦離離玉潤落落珠圓甘不待嘗脆難勝口表逹闕下公卿笑之曰常山公何用進殘棃干天府也葢以其有脆難勝口之句有縣宰李尚嘗以守樹不謹曽風折一枝降為兾州典午耳目記按唐書壽春武宗女不着尚者名武宗年三十三不應有如此女大疑劉記為是實大如升李昇本徐氏湖州安吉人為安吉令先是其家有棃樹云結一實大如升其父異之將獻郡守有謂其父母此果非常年所有即上獻來年見徴安知復有此物不如勿獻其父然之因㑹鄰里將共食即席剖之有赤蛇在實中割者大驚投刄於地俄而赤蛇走其母榻下尋之了無所見未幾其母遂孕知誥吳越偕史五臟斧斤李建勲罷相出鎮豫章一日遊西山田間茅舍有老叟教數村童公觴于其廬連食數棃賓僚有曰棃號五臟斧斤不宜多食叟嘆曰鶡冠子五臟斧斤乃别離之離非謂棃也葢離别則殘賊胷懷有若刀斧因就架取鶡冠子呈之公大嘆服湘山野録紫輕梨塗山之北有棃大如斗紫色千年一花冬月乃實煎之有膏食之身輕亦曰紫輕棃洞㝠記種青田青田村人家多種棃樹名曰官棃子大一圍五寸恒以供獻名為御梨吏司守視土人有未知味者棃實落至地即融汁永嘉記報徳寺有含肖棃重六斤伽藍記仙梨融峰上有青壇方五丈有燒香行道處古形銅器數種有棃樹高三十丈子如斗至摇落時但見其汁核無得味者洽聞記樂遊此狄􅀈海果有樂遊之棃上赤梨扶桑國有赤棃經年不壞南史昫山果則昫山之棃齊都賦梨園山陽縣北有谷通得驢馬石勒十人騎昔在此啖棃王樹今有棃園三晉山險記可口三皇五帝之禮義法度其猶柤棃橘柚邪其味相友而皆可於口故禮義法度者應時而變者也莊天運夫柤棃橘柚果蓏之屬實熟則剥則辱大枝折小枝繼此以其能若其生者也故不終其大年而中道夭自掊擊於世俗者也上人論世棗核果律明五果一核果如棗杏等二膚果如棃柰是皮膚之果三殻果如椰子胡桃石榴等四檜果字書空外反麄糠皮謂之檜如松栢子五角果如大小豆等翻譯名義異名棗壺棗邊要棗樲酸棗洗大棗晳無實棗爾雅弱枝周文弱枝之棗閑居賦上林苑有弱枝棗玉門棗棠棗青華棗梬棗赤心棗西王棗出崑崙山陰岐黒棗穆王東廵大騎之谷西王母與王共玉帳高㑹進陰岐黒棗北極有岐峯之陰多棗樹百尋枝莖皆空實長二尺核細而柔百年一熟拾遺記玉文棗老子西遊省太真王母共食玉文之棗其實如瓶尹喜内傳東海棗景公謂晏子曰東海之中有木而赤其中有棗華而不實何也晏子曰昔者秦穆公乘龍理天下以黄布裹蒸棗至海而投其布故水赤蒸棗故華而不實公曰吾佯問子耳對曰晏聞之佯問者亦佯對晏子春秋食棗吐死鮑焦耕田而食鑿井而飲於山中食棗或曰此棗子所植耶遂强吐枯立而死風俗通雨棗魏世河内冬雨棗耆舊説周秦時河南雨酸棗遂生野棗今酸棗縣是也酸棗之甚小者謂之野棗述異記酸棗縣故城古韓國昔天子建國名都或以山林故豫章以樹氏都酸棗以棘名邦水經樂氏棗青州有樂氏棗細核多膏肥美為天下第一父老傳云樂毅破齊時從燕來齊所種也齊人要術如𤓰李少君以却老方見上曰臣曽遊海上見安期生食臣棗大如𤓰史記李少君謂武帝溟海之棗大如𤓰内傳玉門七月七日西王母為帝設玉門之棗上􅝜嵻細棗􅝜嵻細棗出􅝜嵻山山臨碧海上萬年一實如今之軟棗咋之有膏膏可燃燈西王母握核以獻帝因名曰握核棗洞𡨕記今本無末句來來武帝時上林苑獻棗上以所持杖擊未央前殿檻呼朔曰叱來叱來先生知此篋中何物朔曰上林獻棗四十九枚上曰何以知之朔曰呼朔者上也以杖擊檻兩木林也曰來來者棗也叱叱者四十九也上大笑賜帛十疋方朔𫝊思鄉棗宣帝時幽州刺史李宣尚范陽公主公主憶長安於易州築一城象長安故以為名城中有棗樹花而不結皆向西南而引俗謂思鄉棗寰宇記含棗不食孟節能含棗核不食可至十年後漢安邑御棗南方有龍眼荔枝寧北西國蒲萄石蜜乎酢且不如中國凡棗味莫若安邑御棗也魏文帝詔寘毒棗蔕魏文帝忌弟任城王驍壯因在卞太后所共圍棊並文棗文帝以毒着諸棗蔕中自選可食者而進王弗悟遂雜進之旣中毒太后索水救之帝豫勑左右毁器太后徒跣趨井無以汲須㬰遂卒世説纂纂棗下何攅攅榮華各有時棗欲初赤時人從四邊來棗適今日賜誰當仰視之古咄唶歌詠園桃之夭夭歌棗下之纂纂歌曰棗下纂纂棗花朱實離離宛其死矣化為枯枝人生不能行樂何以虚謚為潘安仁笙賦弱刺引羅衣朱實凌還幰且歡洛浦詞無羡安期逺棗下何纂纂簡文帝辭西王母棗石虎園有西王母棗味絶美枝葉忽茂四時不凋九月生花十二月乃熟三子一尺又有羊角棗亦三子一尺鄴中記海棗海棗樹身無閑枝直聳二四丈樹頭四面共生餘枝葉如栟櫚五年一實實大如杯盌核兩頭不尖雙卷而圓其味極甘美安邑御棗無以加也晉㤗康五年林邑獻百枚昔李少君謂棗大如𤓰非誕説也南方草物狀六竒沙門竺惠猷太元二年夜夣讀詩五首其一篇後曰陌南酸棗樹名為六竒木遣人以伐取載還柱馬屋異苑棗昏范􅁮撰和香方其序云棗膏昏鈍以比楊𤣥保也避亂遇棗太原王仲德年少時遭亂避胡賊絶粒二日草中卧忽有人扶其頭乎云可起㗖棗王便寤瞥見一小兒長四尺即隠乃有一囊乾棗在前噉之小有氣力便起幽明録仙人棗魏百果園中有仙人棗長五寸把之兩頭俱出核細如鍼霜降乃熟食之甚美俗傳云出崑崙山一曰西王母棗伽藍記筭棗數北齊綦母懷文云昔在晉陽為監館館中有一蠕蠕客同館胡沙門指語懷文云此人别有異筭術仍指庭中一棗樹云令其布筭子即知其實數乃試之并辦若干純赤若干赤白相半於是剥數之惟少一子筭者曰必不少但更撼之果落一實北史仲思棗信都獻仲思棗四百枚棗長四五寸正紫色細文文縐小核味甘勝于青州棗北齊時有山人仲思得此棗種之因以為名亦名仙棗時海内惟有數株大業拾遺碧棗處士元藏機大業元年為海使判官遇風浪壞船獨為破木所載忽逹于洲島洲人曰此乃滄洲有碧棗丹栗皆大如梨杜陽編食無核棗河中永樂縣出棗世傳得棗無核者食可度世里有蘇氏女自小獲而食之不食五糓年五十嫁顔如處子自亂離後不知所終北夣𤨏言河中永樂縣道净院居蒲中之勝境蒲中多大棗天下人傳歳中不過一二無核者侯道華比三年輙得啖之後仙去室室志枯枿復生邢州城東十餘里周世宗之祖庄也門側有井上有大棗一株世宗時柯葉茂盛埀蔭一畆恭帝旣祗棗遂枯死明道中枯枿復生一枝長一丈餘蔚然可愛井水中如覆錦綉柴氏懼遂塞井伐木明年詔求五代帝王之後柴氏自邢蔡虢等州諸族被甄叙入官者三十餘人井棗之祥亦非空應括異志夣食光禄卿李郁因晝􅃦夣食巨棗覺而有疾謂其親友曰嘗聞棗子重來呼魂之象今予神氣逼抑將不免乎未幾而卒晉史嫁棗正月一日日出時反斧班駁椎之名嫁棗不椎則花無實子易零落也齊民要術三星駢白河東安邑棗東郡糓城紫棗長二寸西王母棗大如李核三月熟在衆果之先洛陽宫後園河内汲郡棗一名墟棗一名安益棗東海蒸棗洛陽夏后棗安平信都大棗單父棗梁國夫人棗大白棗一名曰蹙咨小核多肌三星棗駢白棗灌棗此四者官園所種棗有狗牙鷄心牛頭羊矢獼猴細腰之名又有𤣥棗大棗崎亷棗桂棗夕棗之名廣志安邑千樹棗與千户侯等史記風摇羊角樹日映鷄心枝已聞安邑美永茂玉門埀簡文詠棗賦龍骨河中府貢龍骨棗地理志極美者有水菱棗圖經千年大食國有千年棗杜還經行記七寸北方有七寸棗述異記鶻莾拂菻南有國曰磨鄰人食鶻莾并食波斯棗也西域傳波斯棗出波斯國波斯呼為窟莾樹長三四丈圍五六尺葉如土藤不凋二月生花狀如蕉花有兩甲漸漸開罅中有十餘房子長二尺黄白色有核熟則紫色形類乾棗味甜如飴可食酉陽益氣北方荒中有棗林焉其高五十丈敷張枝條數里餘疾風不能偃雷電不能摧其子長六七等圍過其長熟色如朱乹之不縮氣味潤澤殊於常棗食之可以安軀益氣故方書云此棗枝條盛於常棗亦益氣安軀赤松子云北方大棗味有殊旣可益氣又安軀神異經黄齒齒居晉而黄養生論晉地多棗人常置之懷袖中若粤人之噉檳榔味甘傷脾故齒黄也醫説栗箕山伊尹曰果之美者江浦之橘箕山之栗吕覽千樹燕秦千樹栗其人與千户侯等漢書五方栗栗五方皆有周秦吳楊特饒唯漁陽范陽栗甜美長味他方不及也倭韓國上栗大如鷄子亦短味不美桂陽有栗叢生大如柿詩義䟽嶧陽栗上林􅁐有侯栗瑰栗魁栗榛栗嶧陽栗嶧陽都尉曹龍所獻大如拳西京雜記十五枚一升漢武帝果園栗十五枚為一升三秦記案其栗味甘而小不如三秦所説括地志中山栗安平好棗中山好栗魏郡好杏河内好稻真定好梨河晏九州論中山好栗地産不以為珍盧毓冀州論擲栗卜郡劉秀之為丹陽尹先是秀之從叔穆之為丹陽與子弟於㕔事上飲宴㕔事柱有一穿穆之謂子信及秀之曰汝等試以栗遥擲此柱若能入穿必得此郡唯秀之獨入焉其言果騐宋書世説䟽栗沈約常侍宴㑹豫州獻栗徑寸半竒之問衆栗事多少與約各䟽所知約少帝三事約出謂人曰此公䕶短前不讓即羞死帝以其言不遜欲抵其罪徐勉固諫得止梁書擲帝中面蕭琛嘗預御筵醉伏上以棗投琛乃乃取栗擲帝中面御史中丞在席帝動色曰此中有人不得如此豈有説也琛曰陞下投臣以赤心臣敢報之以戰栗上天台栗王可交居松江泛江見舫中有道士七人皆玉冠霞帔呼可交上舫與二栗青赤光如棗長二寸許肉脆而甘如飴食盡令去俄頃坐於石上問樵者何地即天台也續神仙傳鳯冠栗謝𤣥卿遇神仙設鳯冠栗續仙傳猴栗李徳裕一夕柑子宴㑹客盤中有猴栗無味陳堅處士云䖍州南有漸栗形如棗核酉陽河東飯晉王嘗窮追汴師粮運不繼蒸栗以食軍中遂呼栗為河東飯清異録栗之出南山其上多栗葛山銅山其未多栗山經大栗栗有闗中侯栗大如鷄子梁州獻栗徑寸半越中栗大如拳廣志諸曁産如拳之栗地理志馬韓出大栗如梨後四傳東夷魏國出大栗如梨魏志東荒栗東北方荒中有木名曰栗高二十丈有殻徑三尺三寸刺長尺餘實徑三尺殻赤肉黄白味甜食之多令人氣短而渴神異經栗堂汝水灣中有地數頃上有栗園不並固安之實然歳貢三百石以充天府水渚即栗洲也樹高茂望若屯雲積氣矣林中有栗射埻堂甚閑敞牧宰及英彦多所遊薄水經注朔濱西域獻崑山之蒲桃北燕薦朔濱之巨栗王逸荔枝賦胡栗蔡伯喈曰有胡栗齊民要術殻可為杯鄴中産巨栗脱其殻可以為杯鄴中記柿赤實果柿曰赤實果説文七絶俗謂柿樹有七絶一壽二多陰三無鳥巢四無蟲五霜葉可翫六嘉實七落葉肥大酉陽木中根固柿為最俗謂之柿盤上孝域韋順為東平相賞罰必信有柿樹生屋上從庭中遂茂順至孝行人以為感于天地而生東觀漢記烏皮梁侯烏枇之柿閑居賦梁侯園有烏椑八稜大如酒盞地理志徽章華林園柿六十一株徽章殿前柿一株晉宫閣名柿樹合條吳令顧修期言縣西鄉有柿樹殊本合條枝起居録柿酸番禺有酸柿甜梅李乂果賦云梅甜柿酸述異記金液懸霜照采凌冬挺潤甘清玉露味重金液梁簡文啟枯死復生景雲二年高祖故第有柿樹自天授中枯死至是復生五行志取葉肄書鄭䖍好書嘗苦無紙於是慈恩寺貯柿葉數屋遂徃日取葉肄書歳久殆遍本傳醂柿藏果實謂之醂今醂柿是也力感切楊彦齡筆録青埤上林苑有青椑赤葉椑烏椑西京雜記宜都出大椑荆州土地記石榴丹若石榴一名丹若酉陽若榴石榴也廣雅天漿李衛公云石榴甜者謂之天漿能已乳岩毒酉陽三尸酒安石榴有酸淡兩種道家謂之三尸酒云三尸得此果則醉本草水晶有一種子白瑩澈如水晶者味亦甘謂之水晶石榴上塗榴張騫使西域還得安石榴博物志張騫為漢使外國十八年得塗林安石榴陸機與弟雲書環榴吳王以潘夫人遊昭宣之臺志意幸愜旣盡酣醉唾於玉壺中使侍婢㵼於臺下得火齊指環即挂石榴枝上因其處起臺名曰環榴臺時有諫者云今呉蜀争雄還劉之名將為妖矣權乃翻其名曰榴環臺拾遺記江表記引稽神必宛子大如盞石虎苑中有安石榴子大如椀盞其味不酸鄴中記一蔕六實武陵臨沅獻安石榴子大如椀其味不酸一蔕六實晉安帝起居注求石榴元嘉末魏太武征彭城遣求甘蔗安石榴張暢曰石榴出自鄴下當非彼所有宋書冬生華實宋太始中劉亮為益州刺史齋前石榴樹陵冬生華實亮以問道士始康邵碩碩曰此為狂華宋諸劉滅亡之象南史始興王鑑𫝊白馬甜榴魏白馬寺有大榴京師語曰白馬甜榴一石直牛伽藍記海上浮來合肥浮槎山俗傳自海上浮來梁武帝女為尼於此山建道林寺寺有榴花根幹偉茂即帝女手植方興勝覽石榴多子齊安徳王延宗納趙郡李祖收女為妃後帝幸李宅宴而妃母宋氏薦二石榴於帝前問諸人莫知其意帝投之問魏收曰此竟何意收曰石榴房中多子王新婚妃母欲子孫衆多帝大喜詔收卿還將來仍賜美錦二疋北史開花不及春孔紹安仕隋高祖受禪自洛陽間行求奔高祖見之甚悦拜内史舍人時夏侯端亦嘗為御史監高祖軍先紹安歸朝受秘書監紹安因侍宴應制詠石榴詩可惜庭中樹移根逐漢臣秪為來朝晚開花不及春時人稱之舊唐作胭脂鄭䖍云石榴堪作胭脂睿宗女代國公主常為之弃其實于禁中叢生成林北户録榴花洞閩縣東山有榴花洞唐永㤗中樵者藍超遇白鹿逐之渡水入石門始極窄忽豁然有鷄犬人家主翁謂曰吾避秦人也留卿可乎超云欲與親舊訣乃來與榴花一枝而出恍然若夣中再徃竟不知所在方興勝覽術致武宗朝術士金陵許元長善變幻武宗謂之曰先朝明崇儼取羅浮山甘子萬里徃來止于旬日東都當進石榴時已熟矣卿今日當致十顆元長奉詔而出及且􅃦殿始開金盤貯石榴致于御榻俄有使奉進亦以所失之數上聞靈騐變通皆如此類劇談録金櫻兩浙避錢鏐之名號石榴為金櫻上雙實邵武郡庭有石榴一株士人視所實之數以為豋科之信熈寧康成歳有雙實於木末者又有附枝而雙實者是歳葉祖洽上官均名在一二何與京兄弟同牓祖洽有詩曰已分桂葉争雲路不負榴花給露枝葢謂此也海録挿石而生紹興間漢陽軍有石榴枝挿于石罅秀茂成陰歳有花實者初郡獄有誣孝婦殺姑婦不能自明屬行刑者挿髻上花于石罅曰生則可以騐吾寃行刑者如其言後果生宋志釀酒崖州婦人以安石榴花着釜中經旬即成酒其味香美仍醉人方輿勝覽頓孫國有安石榴取汁停杯中數日成美酒扶南傳三十八河陰石榴名三十八中只有三十八子也𤨏碎録味絶洛中南詔石榴子大皮薄如藤紙味絶於洛中酉陽重六斤大食勿斯離國石榴重五六斤上竒樹石榴者天下之竒樹九州之名菓也是以屬文之士或叙而賦之遥而望之煥若隋珠輝重淵詳而察之灼若列宿出雲間千房同様十子如一御飢療渴解醒止醉潘岳賦芳實惟木之珍莫美石榴擢鮮葩於清春結芳實於素秋徐藻妻陳氏賦彤子振緑葉於柔柯埀彤子之累衰王倫妻羊氏賦胡桃上林􅁐上林􅁐有胡桃西京雜記西域種張騫使西域還得胡桃博物志華林園華林園胡桃八十四株晉宫閣名植胡桃後蜀李雄玉衡十二年扶風人韓豹為太史令雄卒子期立以豹為太𫝊猶領侯職豹嘗言於期曰臣今老志在田園欲植胡桃願賜其種期不悟俄而李壽自涪率衆南向襲尅成都廢期自立廣五行記外剛内柔紐㴞母荅虞吳國書胡桃本生兩羗外剛内柔質似古賢欲以奉貢樂遊挺自禁園味逾井絡動物迴祗在㣲必應此乃胡羯奔逃吉之先見者也沈約啟陳倉陰平胡桃陳倉胡桃薄皮多肌陰平胡桃大而皮脆急捉則碎廣志梅杏類梅杏類也樹及葉皆如杏而黒煑而曝乾為蘇置羮矐虀中又可含以香口詩義䟽同心麗枝上林苑有朱梅紫葉梅紫蕚梅同心梅麗枝梅燕梅猴梅西京雜記梅梁越俗説㑹稽山夏禹廟中有梅梁忽一春而生枝葉述異記大梅山在鄞縣東七十里葢漢梅子真舊隠也山頂有木梅木其上則伐為㑹稽禹廟之梁其下則為它山堰之梁禹廟之梁張僧繇畫龍于其上夜或風雨飛入鏡湖與龍鬭後人見梁上水淋漓而萍藻滿焉始駭異之乃以鐵索鎻于柱四明圖經梅溪淹梅溪昔有梅樹呉國采為姑蘇臺後忽於此沉今湖州側猶有梅溪蘇州記遺梁越使諸發執一枝梅遺梁王梁王之臣曰韓子榮謂左右曰惡有以一枝梅以遺列國之君者乎請為二三子慙之出謂諸發曰大王有命客冠則以禮見不冠則否諸發曰彼越亦天子之封也不得冀兖之州乃處海埀之際屏外蕃以為居而蛟龍又與我争焉是以剪髪文身爛然成章以像龍子者將避水神也今大國其命冠則見以禮不冠則否假令大國之使時過敝邑敝邑之君亦有命矣曰客必翦髪文身然後見之於大國何如意而安之願假冠以見意如不安願無變國俗梁王聞之披衣出以見諸發令逐韓子説苑園梅邯鄲有故邯鄲宫基存焉中有趙王果園梅李至冬而花春得食述異記止渴魏武行役失道軍皆渴乃令曰前有大梅林饒子甘酸可以解渴士卒聞之口皆出水乘此得及前原世説梅下種樂蘇耽後園梅樹下種藥可治百病桂陽先賢傳寄驛使陸凱與范􅁮相善自江南寄梅花一枝詣長安與范并贈詩曰折花逢驛使寄與隴頭人江南無所有􅂓贈一枝春荆州記能啖梅范信至能啖梅人嘗置一斛奩信留食之須㬰而盡語林壽陽粧武帝女壽陽公主人日卧于含章殿簷下梅花落公主額上成五出之華拂之不去皇后留之看得幾時經二日洗之乃落宮女竒其異効之今稱梅花粧是也金陵志射梅柳惲嘗與瑯琊王瞻博射嫌其皮濶乃􅎥梅帖鳥珠之上發必命中觀者驚駭南史淡粧美人隋開皇中趙師雄遷羅浮一日天寒日暮於松林間見美人淡粧素服出迎時殘雪未消月色㣲明師雄與之語但覺芳香襲人語言極清麗因與之扣酒家共飲少頃有一緑衣童來笑歌戯舞頃醉􅃦但覺風寒相襲久之時東方已白起視乃在大梅花樹下上有翠羽啾嘈相頋月落參横但惆悵而已龍城録病市烏梅蕭倣為嶺南節度使倣性公亷南海雖富珍竒月俸之外不入其門家人疾病醫工治藥須烏梅左右於公厨取之倣知而令還之促買於市舊唐紅梅下婦人蜀郡有紅梅數本花之殊品也郡侯建閣扄鑰遊人莫得見一日梅開有兩婦人高髻大袖凭欄倚笑郡侯啓鑰閴不見人惟東壁有詩曰南枝向煖北枝寒一種春風有兩般憑仗高樓莫吹笛大家留取倚闌干摭遺大庾嶺上梅南枝落北枝開寒煖之候異也返魂香韓偓出内庭詩玉為通體尋常見香號返魂客易囘之句其題云嶺南梅花一歳再發金堂密記返魂香入嶺頭梅東坡誰信幽香是返魂和楊公濟梅花嚼梅前蜀王建判官馮㳙好戯時鳯翔遣張郎中通好來晨宴接王慮馮公先語而張子乘之或致失機乃令客將傳逹旦請緘黙坐旣定而賓主寂然無敢發其語端者馮乃取青梅鏗然一嚼之四坐流涎因成大笑楊彦贍六帖補紅羅亭李后主於宫中作紅羅亭四面栽紅梅作艶曲歌之韓熈載和之云桃李不須誇爛熳已輸了春風一半時已失淮南矣故云古今詩話大庾栽梅大庾嶺上有佛塔廟有婦人題云妾㓜年侍父任英州司冦旣代歸父以丈庾本有梅嶺之名而反無梅遂植三十株于道之右因題詩于壁今隨失之任端溪復至此寺前詩已汚漫矣因再書之云英江今日掌刑囘上得梅山不見梅輟俸買將三十本清香留與雪中開好事者因以夾道植梅矣倦游録方譽勝覽接梅紅梅清艶兩絶昔獨盛於姑蘇晏殊始移植西岡第中特珍賞之一日貴遊洛園吏得一枝分接由是都下有二本縐龜梅龍故蜀别苑在成都西南十五里多梅有兩大梅夭矯如龍人謂梅龍老學叢談梅槐合生洪亭村下有梅􅂞村舊云是梅槐合生成樹是以名之今音訛謂之梅􅂞江陵記四種許洛中有江梅椒萼梅緑萼梅千葉黄香梅凡四種曲洧舊聞煮魚横公魚長七八尺形狀如鯉而目赤晝在湖中夜化為人刺之不入煮之不死烏梅二七煮之即熟食之治邪病神異經楊梅子如彈丸楊梅其子如彈丸正赤五月中熟熟時如梅味甘甜酸臨海異物志楊梅葉如龍眼樹冬青一名机音求潘州有白色者甘而絶大北户録楊家果楊脩字德祖九歳聰慧孔文舉詣其父父在在乃呼脩脩為設菓菓有楊梅融指示兒曰此君家之菓耶脩應聲曰未聞孔雀是夫子之家禽郭子楊氏子九歳孔君平詣之云云世説楊周年七歳孔君平詣之云云此真君家果金樓子孝感齊王虚之庭中楊梅樹隆冬三實又每夜所居有光如燭墓上橘樹一冬再實時人咸以為孝感所致南史停採任昉為新安太守郡有蜜嶺及有楊梅舊為太守所採昉以冐險多毒物故即時停之梁書獻仁王薿字豐父守㑹稽童貫時方用事貫苦脚氣或云楊梅仁可療是疾豐父裒五十石以獻之後擢待制再任不歴貼職徑登次對惟豐父一人揮麈録楊梅塢杭州楊梅塢在南山近瑞峯石塢内有一老嫗姓金其家楊梅甚盛俗稱楊梅塢所謂金婆楊梅是也古蹟事實甘壺甘甘橘之屬滋味甜美特異者也有黄者有頳者謂之壺甘風土記甘實形如石榴者亦謂之壺甘古今注有黄甘一核有成都平蔕甘大如升色蒼黄犍為南安縣出黄甘廣志宜都郡舊江北甘園名宜都甘荆州記賂子丹陽張磐字子石為廬江太守尋陽令嘗餉一奩甘橘其小男年七歳就取一枚磐奪取付外卒以兩枚與之磐奪兒甘鞭卒曰何故行賂於吾子謝承書木奴吳李衡字叔平襄陽人習竺以女英習配之漢末為丹陽太守每以妻計得全衡每欲治家事妻輙不聽後密遣客十人徃武陵龍陽泛洲上作宅種甘橘千株臨死勑兒曰汝母惡吾治家故窮如是然吾州里有千頭木奴不責汝衣食歳上千匹絹亦可足用爾衡亡後二十餘日兒以白母母曰此當是種柑橘也汝家失十戸客來七八年必汝父遣為宅汝父恒稱太史公言江陵千樹橘當封君家吾荅云且人患無徳義不患不富若貴而能貧方好爾用此何為吳末衡柑橘成歳得絹數千匹家道殷足晉咸康中其宅止枯樹猶在襄陽耆舊傳三寸文帝時彭城王義康顓總朝政四方獻饋皆以上品薦義康而以次者供御上嘗冬月噉耳其形味並劣義康在坐曰今年甘殊有佳者遣人還東府取甘大供御者三寸宋書甘中有蛇唐光宅中李崇真為益州刺史㕔事前有甘樹有甘大如鷄子晚熟㣲小有孔如針羣官咸異之方欲將進久而方罷因剖之得一赤班蛇長尺餘崇真後為兵所殺廣五行記調露中連州見一柑樹四月中有子如斗大剖之有兩頭蛇布裹甘子益州歳進甘子皆以紙裹之他時長吏嫌紙不敬代之細布旣而恐柑子為布所損每懷憂懼俄有御史甘子布至長吏以為推布裹甘子事懼曰果為所推及子布到驛長吏叙以布裹甘子為敬子布初不知之久而方悟聞者莫不大笑唐新語禁中甘天寳中中書門下奏曰臣等今日因奏事承德音聞江南為橘江北為枳葢以地氣有殊物性因變朕近於宫内種甘子樹數株今秋以來結實一百五十顆乃與江南及蜀道所進無别亦可謂稍異也舊唐宰臣表賀曰雨露所均混天區而齊被草木有性憑地氣以濳通故兹江外之珍果為禁中之佳實緑蔕含霜芳流綺殿金衣爛日色麗彤庭云云乃頒賜大臣外有一合歡實上與妃子互相持翫上曰此果似知人意朕與卿固同一體所以合歡於是促坐同食焉因令畫圖傳之於後楊奴外傳不實羅浮山有御園甘子唐𤣥宗幸蜀子乃不生德宗梁亦不實僖宗狩蜀花實皆無樹亦枯瘁續南越志中和辛丑翠轝在巴州時以雲棧巗嶮罷貢同庭丹實是亦木奴之屬旣醢且瘠唐史羅浮甘子開元中始有山僧住於南樓寺其後嘗資進獻幸蜀幸奉天之歳皆不結實舊唐送甘安祿山將反宰臣韋見索請以平章事追之𤣥宗許焉草詔訖中留之遣中使輔璆琳送甘子且觀其變璆琳受賂而還因言無反狀𤣥宗謂宰臣曰禄山必無二心詔本朕已焚矣上嗅甘明皇食甘已千餘枚皆缺一瓣問進甘使者云途嘗有道士嗅之盖羅公逺也書術致宣宗朝有術者董元素自江南來上召見留于上林中宿泊夜召與語曰聞君頗有神術今南中柑橘正熟卿能致之否元素對曰請安一合于御榻前數刻時有㣲風入簾元素乃啓其合柑子滿其中奏曰此江陵枝江縣柑也逺處恐遲上嚐之驚嘆異聞集變甘新州出變甘有苞大如升許且皮薄如洞庭之柑餘柑之所弗及傳云移植不數百里形味俱變因以為名北户録東望甘南康郡有東望山山頂有果林周四里許衆果畢植行列整齊如人功也甘子熟嘗有三人造之共食致飽又懷二枚欲以示人􅂞旋半日迷不得歸聞空中語云放雙柑乃聽汝去懷柑者恐怖放甘於地轉眄即見歸徑乃相與俱返述異記遇虺南康歸美山石城内有甘橘橙柚就食其實任意取足晚持歸者便見大虺或顛仆失徑家人啖之亦病異苑獅頭雲南北勝州有獅頭柑狀如獅頭而色黄有大如椀其味最甘雲南志橘璇星璇星散為橘運斗樞千樹蜀漢江陵千樹橘與千户侯等史記美果伊尹告湯曰果之美者沙棠之實箕山之東青鳬之所有櫨橘焉江浦之橘雲夣之柚漢上之箞今本作石耳所以致之呂覽踰淮為枳晏子使楚王謂其左右曰晏嬰習辭者也吾欲傷之坐定而縳一人至問何為曰齊人坐盜王視晏子曰齊人善盜乎晏子對曰嬰聞橘生於淮北則為枳枝葉徒似其實味不同水土異也今民生於齊不盜入楚則盗得無楚之水土使民善盜耶王笑曰寡人反取病焉晏子食橘不剖晏子使楚楚王進橘置削晏併食不剖王曰橘當剖對曰臣聞賜人主前者𤓰桃不削橘柚不剖今者萬乘無教故不敢剖臣非不知也上樹橘陽虎去齊走趙簡子問曰吾聞子善樹人虎曰虎不善樹人云云主俛而笑曰夫樹橘柚者食之則甘嗅之則香樹枳棘者成而棘人故君子慎所樹韓子御覽引以柤棃橘柚者厭橘孝武帝平百越以為園圃而民皆厭橘鹽鐡論橘柚生於江南而民皆甘之於口味同也上嘉樹后皇嘉樹橘徠服兮受命不遷生南國兮深固難徙更壹志兮緑葉素榮紛其可喜兮行比伯夷置以為像兮楚辭僪頌得實繫樹沛國桓曄字文林一名嚴避地居楊州從事屈豫室中中庭有橘樹一株遇其實熟數垂室内嚴以竹藩樹四面風吹落兩實墮地以繩縳繫樹枝謝承書盧橘朱光禄為建安郡中庭有橘冬月樹上覆裹之至明年春夏色變青黒味尤絶美上林賦云盧橘夏熟盧黒色也葢近是乎吳録地理志盧橘屬土有給客橙似橘而非若柚而香冬夏華實相繼或如彈丸或如拳通歳實之亦名盧橘魏王花木志橘税越多橘柚園越人出橘税謂之橙橘户亦曰橘籍吳闞澤表曰請除臣之橘籍越中有王氏橘園胡氏梅園賀氏之𤓰述異記黄子孔安國閉宅忽有二人來云自帝庭來謁一衣緑曰藤子一衣黄曰黄子語吳大帝時事歴歴可聽及去遣人尋之入未央宫庭中衣緑者入於藤下衣黄者入於橘下三吳志橘官劉先主時巴郡結舫水居者五百家縣有橘官荔支園夏至則熟二千石常設厨膳命士大夫共㑹樹下食之縣北有稻田出御米水經一蔕十七實呉黄武中交趾太守士爕獻橘十七實同一蔕以為瑞異羣臣畢賀南方草本狀晉咸和六年西平將軍庾亮送橘十二實共同一蔕以為瑞異建武故事橘連理孝武大明中芳香琴堂東西有雙橘連理改芳香琴堂為連理堂宋書鬼命補橘豫章王嶷薨忽見形於第後園乘腰輿指麾處分呼直兵無手板左右授一玉手板與之曰橘樹一株死可覔補之因出後園閣直兵倒地仍失手板齊書一蔕二十五子梁侯景未平王僧辨獻嘉橘一蔕二十五子于湘東王王荅之曰昔文康獻橘十有二子用今方古彼有慙色今景之兇惡旣稔凱歌之聲已及嘉瑞逺臻但増哽慰三國典畧黄衣圍城陳後主夣黄衣人圍城繞城橘樹盡伐去之及隋兵至上下通服黄衣未幾為隋攻圍之應廣五行記橘中樂巴卭人家有橘園霜後諸橘盡收餘二大橘如三斗盎巴人異之剖開每橘有二叟鬚眉皤然肌體紅明皆相對象戯談笑自若一叟曰橘中之樂不減商山但不得深根固蒂為愚人􅎥下耳幽恠録洞庭韋蘇州寄橘書云書後欲題三百顆洞庭須待滿林霜後人多言率爾成章不知南朝有人於紙尾寄洞庭霜橘三百顆正用此事王右軍帖云奉橘三百顆霜未降不可多得同出于此芝田録序國子朱司業言南方柑橘雖多亦畏霜毎霜時亦不甚收唯洞庭霜雖多却不能損詢彼人云洞庭四面皆水也水氣上騰尤能閣霜所以洞庭柑橘最佳歳收不耗正為此耳文昌雜録分貢劉晏自江淮名橘珍柑常與本道分貢兢欲先至雖封山㫁道以禁前發晏厚資致之嘗冠諸府唐書弛橘禁薛戎遷浙東觀察使所部州橘未貢先鬻者死戎弛其禁上納質柳玭為嶺北節度副使癬中橘熟旣食乃納質于官上瑞橘清霜始降上命中使賜臣等朱橘各三枚葢靈囿之所植也臣伏以度淮而枳由地氣而不遷吹谷生黍信陽和之所感昔漢武致石榴於異國靈根遐布此西域柔服之應也魏武植朱橘於銅雀華實莫就乃吳人未格之兆也逺自湘山移根清禦始發素榮俄成丹寳臣貞葉凝碧蔚湘岸之夕陰華實變黄動江潭之秋色氷心獨潤金衣更鮮樹隠方塘此丹墀之効實盤映皎目與赤瑛而共硏并食不割竊愧晏嬰之知捧之以拜重感桓榮之賜瑞橘賦一品集豐城陳允升好道撫州危全諷迎置郡中嘗夜坐危謂之曰豐城橘美頗思之允升曰方有一船泊豐城港今為取之港去城十五里少頃便還擕一布囊數百異人録橘黄世説有枇杷黄醫者忙橘子黄醫者藏李太異囘醫生書云遺白金三十兩奉納以備橘黄之需御橘橘為樹白華赤實皮旣馨香又有善味江南則有之不生他所交趾橘有置官長一人秩三百石主歳貢御橘矣曹叔異物志洞庭緑橘出洞庭東西山北常橘特大未霜深緑色臍間一㸃先黄味最全可啖故名緑橘范成大蘇志大如斗成都有柚大如升廣志嶺南有柚大如冬𤓰本草讓木橘樹直竦枝葉不相妨蜀人謂之讓木江鄰幾雜志蟻食蒼梧土諺曰郡中甘橘多被黒蟻所食人家買黄蟻投于樹上因相闘黒蟻死柑橘遂成寰宇記覩屍橘覩屍而實繁榴得骸而葉茂類從結遲果中易生者莫如桃而結實遲者莫如橘諺云頭有二毛好種桃立不踰􅂰好種橘葢言桃可待橘不可待曲洧舊聞金橘其實小如彈黄如金謂之金橘花果録金橘産于江西都人初不甚貴後因溫成皇后好食之由是價重京師欲久留此果藏于菉豆中經時不變橘性熱而豆涼也歸田録齊珍呉楚之國有大木焉其名為櫾碧樹而冬生實丹而味酸食其皮汁已憤厥之疾齊州珍之渡淮而北而化為枳焉地氣然也列湯問故曰橘柚有林萑蒲有叢又曰橘柚凋於北徙若榴鬱於東移也埤雅荔枝南珍荔枝甘橘南珍之上廣志此木以荔枝為名者以其結實時枝弱而蒂牢不可摘取以刀斧劙取其枝故以為名耳扶南記荔字亦用欐字衛洪七間云蒲萄龍目椰子荔枝作此字北户注獻南越王尉佗獻高祖鮫魚荔枝髙祖報以蒲桃錦四匹西京雜記扶荔宫漢武帝破南越建扶荔宫扶荔者以荔枝得名自交趾移植百株于庭無一生者連年移植不息後數歳偶一株稍茂然終無花實帝亦珍惜之一旦忽萎死守吏坐誅死者數十遂不復茂其實則歳貢焉郵傳疲斃于道極為生民之患至後漢安帝時交趾郡守極陳其弊遂罷其貢三輔黄圖上林賦荅遝離支止獻舊南海獻龍眼荔枝十里一置五里一候奔騰阻險死者繼路和帝時臨武長汝南唐羗以縣接南海乃上書諫曰臣聞上不以滋味為徳下不以貢膳為功故天子食太牢為尊不以果實為珍伏見交趾七郡獻生龍眼等鳥驚風發南州土地惡蟲猛獸不絶於路至於觸犯死亡之害死者不可復生來者猶可救也此二物升殿未必延年益壽帝於是下詔曰逺國珍羞本以薦奉宗廟茍有傷害豈有愛民之本其勅太官勿復受獻由是遂省焉謝承書性堅毎歳進荔枝郵傳者斃死於道漢朝下詔止之今猶脩事荔枝煎進焉其樹自徑尺至於合抱葉密如冬青木性堅重其根工人多取為阮咸槽彈弓棊局廣州記嗜荔枝楊貴妃生於蜀好荔枝南海荔枝勝蜀者當時以馬遞馳載七日七夜至京人馬多斃於路百姓苦之然方暑而熱經宿者輙敗新舊唐一騎紅塵妃子笑無人知道荔枝來杜牧詩荔枝香曲天寶十四載六月六於驪山駐蹕是貴妃誕辰上命許雲封等小部音聲樂長生殿仍奏新曲未有曲㑹南海進荔枝因以曲名荔枝香左右歡呼聲動山谷是年禄山叛甘澤謡荔枝圖白居易為忠州刺史在郡為木蓮荔枝圖寄朝中親友各記其狀曰荔枝生巴峽間樹形團團如帷葢葉如桂冬青華如橘春榮實如丹夏熟朶如蒲桃核如枇杷殻如紅繒膜如紫綃瓤肉潔白如氷雪漿液甘酸如醴如酪大畧如彼其實過之若離本枝一日而色變二日而香變三日而味變四五日外色香味盡去矣舊唐宋家香宋公荔枝泉州所産者樹極髙大世傳已三百歳舊屬王氏黄巢兵過欲伐之時王氏主其木媼抱木願併戮巢兵為之不伐今雖老矣其實益滋繁味益甘滑真佳植也徐師仁湖山集莆田荔枝名品皆出天成雖以其核種之終與其本不相類宋香之後無宋香所存者孫枝爾陳紫之後無陳紫過墻則為小陳紫矣此果形狀變態百出不可以理求或以龍牙或類鳯𤓰釵頭紅之可簮緑珠子之旁綴非人力所能加也容齎閑筆十八娘十八娘荔枝色深紅而細長俚𫝊閩王王氏有女第十八好噉此品因而得名其塜今在城東報國院塜旁猶有此樹云荔枝譜鬼食治平中長沙趙琪作廣東提刑韶州公宇西軒有荔枝數本中夏時荔枝方熟琪將召刺史賞燕一夕荔枝皆空皮核滿地琪深訝之乃開西軒見壁上有詩曰吾儕今日㑹嘉賓滿酌洪鍾酒數廵遍地狼籍不知曉荔枝又是一畨新荔枝皆積其下二廣人多傳異之青𤨏高議入夣福建官譚徽之元符末出郊見一園荔枝埀熟徽之採食少憇樹下朦朧中夣至一室美人盛服出迎擕手而入飲間吟云妾生原在粤閩間六月南州始薦盤肉嫩色包丹鳯髓皮枯稜澁紫鷄冠咽殘風味消心渴嚼破天漿沁齒寒却憶當年妃子笑紅塵一騎過長安益人荔枝食之有益于人列仙傳云有食其華實為荔枝仙人本草云通神益知多食亦不傷人葛洪云蠲渴補髓譜荔枝閩中第一蜀川次之圖經燕實荔枝木之大者子至百斛其花青白狀若冠之蕤纓實如松花之初生者殻若羅紋初青漸紅肉淡白如肪玉味甘而多汁五六月盛熟時彼方皆燕㑹其下以賞之賓主極量取噉雖多亦不傷人少過度則飲蜜漿一盃便解扶南記臈枝梧州江前有火山上有荔枝四月先熟核大而味酸其高新州與南海産者最佳五月方熟形若小鷄子近蒂稍平皮殻殷紅肉瑩寒玉文有焦核者性熱液甘食之過度即蜜漿制之又有臈荔枝黄色味稍劣於紅者嶺表録異三種􅛳為􅈎道廣南荔枝熟時百鳥肥其名之曰焦核小次曰春花次曰朝偈此三種為美次鱉卵大而酸以為醢和率生稻田間廣志焦核荔枝冬青夏至日子始赤六七日可食甘酸可人其細核者謂之焦核荔枝之最珍也竺法真登羅山䟽日中採荔枝青華朱實核黄黒似熟蓮子實白如肪甘而多汁似安石榴有浸酢者至日將已時翕然俱赤則可食也廣志荔枝熟時人未採則百蟲不敢近人才採之烏鳥蝙蝠之類無不殘傷故採荔枝者日中而衆採之本草無核梧州火山者夏初先熟而味少劣其高潘者最佳五六月方熟有無核類鷄卵大者其肪瑩白不減水精性熱液甘乃竒實也北户録連理廣州信安縣有連理荔枝樹即傍挺龍目側生荔枝也寰宇記龍眼益智益智龍眼也廣雅比目龍眼一名比目本草一名亞荔枝海録蔓生龍眼樹葉似荔枝蔓延縁木生子大如酸棗色異純甜無酸廣志荔枝奴龍眼子樹如荔枝但枝葉稍小殻青黄色形圓如彈丸大核如木槵子而不堅肉白蒂漿其甘如蜜一朶恒三十十顆作穗如蒲桃然荔枝方過龍眼即熟故謂之荔枝奴以其常隨後也南方草木狀益智味辛益智葉如嫩荷莖如竹箭子從心中出一枝有十子内白骨四破去之取外皮蜜煮為粽子味辛廣州記益智子如筆毫長七八分二月華實色仍連著實五六月熟味辛雜五味中芬芳亦可鹽曝南方草物狀益智類薏苡長寸許如枳梖子味辛辣飲酒食之佳異物志遺粽安帝元年盧循為廣州刺史遺劉裕益智粽裕乃荅以續命湯二十六目春秋異味損餉六種深抱情至益智乃是一方異味即於僧中行之慧達法師荅虚循書香孟智子似亷薑香如荳蔲寰宇記銀杏鴨脚銀杏一名鴨脚因葉相似也格物總論京師舊無鴨脚李文和自南方來移植於私第因而著子自後稍稍蕃多不復以南方為貴詩話總脚杏唐鄭光讌飲把酒曰某改令身上取果子名云膍臍薛保遜還令云脚杏滿座大笑盧氏雜説挿枝汴人龔猗以殿中侍御史扈高宗南渡道經崑山貞義里所銀杏一株挿地祝曰若此枝得活吾於是居其枝長茂遂成大樹如癭如乳者凡七十餘順相傳為其子孫嗣世之數崑山志蒲萄得種漢武帝因張騫言遣李廣利伐宛而還又發使十餘輩抵宛西諸國求竒物漢使采蒲萄首蓿種歸漢大宛傳於是天子始種苜蓿蒲萄肥饒也及外國使來衆則離宫别觀旁盡種蒲萄苜蓿極望史記藝文引廣利破宛得種御覽因之誤味長中國􅎇果甚多且復為説葡萄當其末夏涉秋尚有餘暑酒醉宿醒掩露而食甘而不䬼脆而不酸冷而不寒味長汁多除煩解䬼又釀以為酒甘於麴蘖善醉而易醒道之固以流涎咽唾况親食之耶他方之果寧有疋之者魏文詔實偉于棗白馬寺浮圖前葡萄異于餘處枝葉繁衍子實甚大偉於棗味殊美冠於中京伽藍記竒味俗言葡萄蔓好引於西南庾信謂魏使尉瑾曰我在鄰遂大得葡萄竒有滋味陳昭曰作何形狀徐君房曰有類軟棗信曰君殊不體物何得不言似生荔枝魏肇師曰魏武有言云云道之固以流涎稱竒况親食之者瑾曰此物出自大宛張騫所致有黄白黒三種成熟之時子實逼側星編珠聚西域多釀以為酒每來歳貢在漢西京似亦不少柱陵田五十畆中有葡萄百樹今在京邑非直止禁林也信曰乃園種户植接蔭連架昭曰其味何如橘柚信曰津液勝竒芬芳減之瑾曰金衣素裏見苞作貢向齒自消良應不及酉陽報縑李元忠曽貢文襄葡萄一盤文襄報以百縑遺練書曰儀同立亞台鉉識懷貞素出藩入侍備經要重而猶家無擔石室若懸磬豈輕財重義奉時愛已故也久相嘉尚嗟詠無極恒思標賞有意無由忽辱蒲桃良深珮戴聊用絹百匹以酧清德也北齊通志貢玉蒲桃遺母高祖賜羣臣食於御前果有葡萄侍中陳叔逹執而不食高祖問其故對曰臣母患口乾求之不能得高祖曰卿有母可遺乎遂流涕嗚咽久之乃止因賜物百叚舊唐馬乳太宗時葉護獻馬乳蒲桃一房長二尺餘子亦稍大其色紫舊唐蒲萄酒西域有之前代或有貢獻人皆不識及破高昌收馬乳蒲桃實於苑中種之并得其酒法太宗目損益造酒為丸有八色芳辛酷烈味兼醍醐旣頒賜羣臣京師始識其味上飲漿四月上已日上辛司農少卿王光輔庄駕還􅉐後中書侍郎南陽岑義設茗飲葡萄漿與學士等討論經史景龍文館記王母葡萄貝丘之南有葡萄谷谷中葡萄可就其所食之或有取歸者即失道世言王母葡萄也天寶中沙門曇霄因遊諸岳至此谷得葡萄食之又見枯蔓堪為杖大如指五尺餘待還本寺植之遂活長高數仭蔭地幅員十丈仰觀若帷葢焉其房實磊落紫瑩如墜時人號為草龍珠帳酉陽鸞翼大月氏國善為葡萄花葉酒或以根及汁醖之其花似丁香而綠榮碧鬚春夏之時萬鬚兢發如鸞翼八月中風至吹葉上傷裂有似綾紈故人呼為葡萄風亦名為裂葉風金樓子鷄卵波斯國磨鄰老勃蕯嵗獻貴人葡萄大者如鷄卵大食國葡萄大如鷄子唐書崑山葡萄西旅獻崑山之葡萄王逸荔枝賦檳榔似螺檳榔菓也似螺可食周成雜字檳門檳榔一名檳門李富之藥録南遊竒觀豫章俞益期性氣剛直不下曲俗容身無所逺􅃴在南與韓康伯牋曰惟檳榔樹最南游之竒觀子旣非常木亦特異余在交州時度之大者三圍高者也丈餘葉聚木端房棲葉下花秀房中子結房外其擢穗似黍其綴實似糓其皮似桐而厚其節似竹而概其中空其外勁其屈如覆虹其伸如縋䋲本不大末不小上不傾下不斜調直亭亭千百若一步其林則寥廓庇其蔭則蕭條可以長吟可以逺想矣但性不柰霜不得北植必當遐立海南遼然萬里不遇長者之目自令人恨深齊民要術水經注贈檳榔王高麗年十四五時四月八日在彭城佛寺中謝混見而以檳榔贈之執王手謂曰王郎謝叔源可與周旋否風俗記金柈貯劉穆之少時家貧誕節嗜酒食不脩拘檢好徃妻兄家乞食多見辱不以為恥其妻江嗣女甚明識每禁不令徃江氏後有慶㑹屬令勿來穆之猶徃食畢求檳榔江氏兄弟戯之曰檳榔消食君乃常飢何乃須此妻復截髪市殽饌為其兄弟以餉穆之自此不對穆之梳沐及穆之為丹陽尹將召妻兄弟妻泣而稽顙以致謝穆之曰本不匿怨無所致憂及至醉穆之乃令厨人以金柈貯檳榔一斛以進之南史不嘗檳榔任昉父遥本性重檳榔以為常餌終嘗求之剖百許口不得好者昉以所嗜好深以為恨遂終身不嘗檳榔上謔㺯齊命通直散騎常侍辛徳源聘于陳陳遣主客蔡佞宴醻因談謔手㺯檳榔乃曰頃聞北間有人為噉檳榔獲罪人間遂禁此物定爾不徳原荅曰此是天保初王尚書罪狀辭耳猶如李固被責云胡粉餙貎搔頭㺯姿不聞漢世􅉐禁胡粉三國典畧液如朱南海地氣暑濕人多患胷中痞滯故常蹈檳榔數十口加勃蔞藤泊蜆反同咀之液如未色程思孟知番禺凡左右侍吏啖檳榔者悉杖之或問其故曰我惡其口唇如潄血耳宋朝類􅁐籜扇檳榔樹如㯶櫚高七八丈無枝柯上有十許葉正月結房一房二百餘子花甚香毎生即落一籜籜堪為扇至五月熟大如鷄子以海蠡殻燒作灰名曰蛤賁灰共扶畱葉藤和而嚼之香美除口氣久食令人齒黒故南人有雕題黒齒之俗雲南記寰宇記進客檳榔大如棗色青似蓮子彼人以為異婚族好客輙先進此物若邂逅不設用嫌恨南中八郡志直亭檳榔樹大圍丈餘高十餘丈皮似青桐節如桂竹下本不大上末不小調直亭亭千萬若一森秀無柯頂上有葉葉似甘蕉條𣲖開破仰望𣺌𣺌如挿叢蕉於竹杪風至觸動似舉羽扇掃天葉下繫數房房綴十數子家有數百掛扶踈如墜䋲也林邑記安南人自嫩及老採實啖之以不婁籐兼之瓦屋子灰競咀嚼之自云交州地溫不食此無以祛其瘴癘廣州亦噉檳榔然不甚於安南也嶺表録異紫檳榔紫檳榔即馬金囊狀類白荳􅅳嚼塗惡瘡甚効或食一枚飲冷水即無所傷雲南志山檳榔山檳榔一名蒳子幹似蔗葉類柞一叢千餘幹幹生十房房底數百子四月採竺法真豋羅浮山䟽橄欖内鹽子落橄欖樹身聳枝皆數丈其子深秋方熟閩中尤重其味云咀之香口勝含鷄舌香生喫及煮飲悉解酒毒有野生者子繁樹峻不可梯縁但刻其根下方寸許内鹽于其中一夕子皆自落樹枝節上生脂膏如桃膠南人採之和其皮葉煎之調如黒􅄳謂之橄欖糖用濯船損乾後牢於膠漆着水益乾堅耳嶺表録異三衢博羅縣有合成樹十圍去地二丈分為三衢東向一衢大葉似練子如橄欖而硬削去皮南人以為糝南向一衢橄欖西向一衢橄欖南越志有樹名獨根分為二枝其東向一枝是木威樹南向一枝是橄欖樹金樓子餘甘餘甘子初入口舌澁酸飲水乃甘又如梅實核兩頭鋭呼為餘甘橄欖同一物異名耳臨海異物志制魚橄欖木作楫魚皆浮出本草誤落橄欖在池中魚盡斃𤨏碎録薑制橄欖木開花如樗將採其實剥其皮以薑汁塗之則盡落江鄰幾雜志椰愈渴椰子樹似檳榔而高大葉長一尺無陰結實一房生三十餘子如𤓰其殻中有肉如熊白味似胡桃内有漿一升清如水甜如蜜飲之愈渴疾殻堪為酒器皮堪縳船土人多種之寰宇記越王頭椰樹高六七丈無枝葉葉如束蒲在上其實如瓠繫之顛實外皮如胡蘆􅀢中有汁升餘清如水味美于蜜食其膚則不飢食其汁則増渴又有如兩眼處俗人謂之越王頭異物志昔林邑王與越王有故怨遣俠客刺得其首懸之於樹俄化為椰子林邑王憤之命剖以為飲器南人至今效之當時刺時越王大醉故其漿猶如酒云南方草物狀椰酒訶陵國俗以椰樹花為酒其樹生花長三尺餘實大如人腦割之取汁以成酒味甘飲之亦醉唐書筒承椰子有漿截花以竹筒承其汁作酒飲之亦醉也交州記倚驕東南荒中有椰木焉高二三十丈或十餘丈圍丈餘或七八尺其枝喬直上二百歳葉落而生花花形如甘𤓰復二百歳一落盡而生萼下生子三歳而成熟成熟之後不長不減子形如寒𤓰似冬𤓰也長七八寸徑四五寸萼覆其頂此實不取萬世如故若取下子而留萼萼復生子如初其子形如甘𤓰瓤甘美如蜜食之令人身澤不可過三升令人冥醉半日乃醒木高人不能得唯木下有多羅樹人縁能得之一名無葉一名倚驕張茂先曰驕直上不可那也世人後生不見葉謂之無葉也一名綺縞人見無葉謂之綺縞神異經木𤓰子大如甒魚復縣地多木𤓰樹有子大如甒音武白黄實甚苦香爾雅所謂㮊也水經灰毒魚齊孝昭北伐庫莫奚至天池以木𤓰灰毒魚皆死而浮出庫莫奚竊相謂曰池有靈魚犯之不祥乃出長城北道齊主分兵追擊獲牛羊七萬振振而還三國典畧獻楊后思食酸味明皇以告張説因進經神出木𤓰以獻明皇雜録䕶聖天台石橋梁旣峭危下臨絶澗􅂈者心悸石罅有木𤓰華時有蛇盤紏至實落供大士乃去號為䕶聖𤓰方輿紙貼宣州人種木𤓰始成顆則鏇紙花以貼其上夜露日曝而變紅花紋如生可愛上天中記卷五十二
