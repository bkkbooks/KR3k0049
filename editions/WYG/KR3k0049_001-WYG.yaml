body:
  text: 天中記卷一明陳耀文撰天五號尚書説云天有五號尊而君之則曰皇天元氣廣大則稱昊天仁覆愍下則稱旻天自天監下則稱上天據逺視之蒼蒼然則稱蒼天周禮疏四名爾雅曰春為蒼天夏為昊天秋為旻天冬為上天李巡注曰春萬物始生其色蒼蒼故曰蒼天夏萬物壯盛其氣昊昊故曰昊天秋萬物成熟皆有文章故曰旻天旻文也冬隂氣在上萬物伏蔵故曰上天太清聖人之徳上及太清下及太寧中及萬靈則景星光潤膏露下朱草生醴泉出鶡冠子人之始天者人之始也父母者人之本也人窮則反本故勞苦倦極未嘗不呼天也疾痛慘怛未嘗不呼父母也史記屈原傳羣陽之精天羣陽之精合為太乙分為殊名春秋説題辭萬物之祖天地者元氣之所生萬物之祖也禮統董仲舒曰天者羣物之祖也故徧覆包涵而無所殊建日月風雨以和之經隂陽寒暑以成之本傳大髙饗大髙者而彘為上牲淮南子汜論下昭事上髙陳書世祖語羣神之精天者羣神之精日月星辰其著位也鄭𤣥周禮注青㝠楚詞據青㝠而攄虹注青㝠天也言青雲杳㝠泰元惟泰元尊媪神蕃釐注泰元天也媪神地也漢書上𤣥祈福乎上𤣥思所以為䖍平子東京賦太皓郎顗上事曰除灾昭祉順天致和斥黜酷害以安黎元則太皓悦和雷聲乃發注太皓天也後漢本傳靈曜蔡伯喈陳太邱碑文云稟岳瀆之精苞靈曜之純注云靈曜謂天也尚書緯有考靈曜按張衡靈憲渾天儀云夫覆載之根莫先於元氣靈曜之本分氣成元象百神主天百神主也道徳仁義天之道也戰栗恐懼天之心也廢道滅徳賤天之道嶮隘恣睢悖人之意論衡辨崇羣生大仰天者旋也均也積陽純剛其體迴旋羣生之所大仰又曰所以立天地者水也成天地者氣也水土之氣升而為天楊泉物理論大圓文選束晳補亡詩曰恢恢大圓茫茫九壤吕向註曰大圓天也按吕氏春秋云大圓在上大矩在下管子曰人能静正迺能戴大圓而履大方上靈文選顔延年曲水詩序云思對上靈之心以恵庶萌之願劉良注云上靈天也按曹子建魏文帝誄云上靈降瑞黄初攸祜宋志晉傅𤣥郊祀歌云我其夙夜祇事上靈南齊書宋謝莊登歌辭云昭事先聖懐濡上靈又云肇禪配祀克對上靈太后廢海陵王令上靈所以睠命億兆所以歸懐梁書武帝授禪詔云寅畏上靈用膺景業魏書彭城王勰傳云上靈無鑒聖躬違和源子恭上書云郊天享帝盖以對越上靈髙閭至徳頌曰上靈降鑒思皇反正乃眷有魏配天承命沮渠蒙遜表云上靈降祐祚歸有道靈徵志羣臣表云上靈垂顧徵善備集北齊書髙洋授禪詔云上靈厭徳允歸大命北史王邵𫝊帝通紀云叶靈皇者言大隋徳合上靈隋書樂志云上靈鍾百福羣神歸萬年圓儀宋厯志祖沖之表曰夫陽爻初九氣始正北𤣥武七列虚當子位若圓儀辨方以日為主冬至所舎當在𤣥枵而今之南極乃處東維圓靈謝莊月賦云柔祗雪凝圓靈水鏡李善曰柔祗地也圓靈天也圓精顔延年文元后哀䇿文云圓精初爍方祗始凝濟曰圓精天也舊唐書郭子儀肅宗呉皇后祔廟表云圓精挺質方祗稟秀蒼靈僧巖荅劉善明云耄耋之年指麾成務此自蒼靈特授假手成功𢎞明集周武帝誅宇文護追尊孝閔詔曰上協蒼靈之慶下昭后祗之錫周書𤣥儀北齊書詔曰上叶𤣥儀下符川嶽百神之君𤣥宗未行親郊之禮張九齡上疏曰天者百神之君而王者之所由受命也自古繼統之主必有郊祀之儀盖以敬天命以報所受舊唐書人之始祖黎幹郊祭難曰萬物之始天也人之始祖也新唐書本傳舊禮儀志地盖星衢王彪天賦云溥為地盖浩作星衢清異録顥穹司馬相如封禪書伊上古之初肇自顥穹生民師古曰顥穹皆謂天也顥言氣顥汗也穹言形穹隆也顥蒼班固賓戲奮靈徳合風雲超忽荒而躆顥蒼師古曰顥顥天也元氣顥汗故曰顥天其色蒼蒼故曰蒼天昊乾馬融廣成頌貳造化于后土㕘神施于昊乾後漢書九蒼阮籍與伏義書云夫九蒼之髙迅羽不能尋其巔四溟之深幽鱗不能測其底王簡棲頭陁寺碑仰蒼蒼之色者不足知其逺近莊子曰天之蒼蒼其正色耶其逺而無所至極耶九野吕氏春秋云天有九野中央鈞天東方蒼天東北昊天北方𤣥天西北幽天西方旻天西南朱天南方炎天東南陽天又廣雅九天東方皥天南方赤天西方成天餘同又太𤣥經九天一中天二羨天三從天四更天五晬天六廓天七減天八沈天九成天六氣左傳曰天有六氣降生五味杜預注曰六氣謂隂陽風雨晦明九闗招魂曰君無上天些虎豹九闗啄害下人些王逸曰天門九重使神虎豹執其開閉啄欲土之人而殺之八柱天問云八柱何當東南何虧注曰言天有八山為柱皆何當值東南不足誰虧缺之也楚辭九重天問云圜則九重孰營度之注曰言天圜而九重誰營度而知之乎楚辭九乾崔駰達旨云仰探逺乎九乾注九重也後漢八維東方朔七諌云引八維以自道兮含沆瀣以長生注天有八維以為綱紀也管子曰天或維之地或載之莫之維天已墜矣況於人乎九靈王褒九懐云登九靈兮遊神注想登九天放精神也九陔漢書樂志専精厲意逝九陔注陔重也謂九天之上也相如封禪書云大漢徳上暢九垓下泝八埏廣雅云九天之際曰九垠九天之外次曰九陔注云垠堮也陔階也言階次有九淮南曰若士謂盧敖吾與汗漫期乎九垓之上七衡孝經援神契云周天七衡六間注天有七衡而云間者從内衡以至中衡中衡以至外衡相去合十一萬七千里九閎揚雄解難云翠蚪絳螭不階浮雲翼疾風則不能騰九閎注九閎九天之門漢書十端天有十端天地陽隂水土人金木火凡十端天亦有喜怒哀樂與人相副以類合之天人一也春秋繁露九霄魏張淵觀象賦云陟秀峰以遐眺望靈象於九霄注九霄九天也道書云九霄謂神霄青霄碧霄丹霄景霄玉霄琅霄紫霄太霄楚辭載赤霄而臨太清四表二十八宿之外各有萬五千里是為四遊之極謂之四表考靈曜天有四表以布精魄地有四瀆以出圖書河圖天有四表三道四表者房星也三道者房間三道南間為上道中央為中道北間為下道也天鏡經四和三禮義宗天有四和崑崙之四方其氣和暖謂之和天道左轉一日一夜轉過一度日月左行於天而轉一日一夜帀於四和周髀云天地四極四和注謂四和者謂之極子午夘酉得東西南北之中三變漢天文志天運三十嵗一小變百年中變五百年大變三大變一紀三紀而大備九位天有九位地有九域天有三辰地有三形靈顯八紀天有精地有形天有八紀地有五里故能為萬物之父母素問鍊石補闕列子云天地亦物也物有不足故昔者女媧氏鍊五色石以補其闕斷鼇之足以立四極淮南子云往古之時四極廢九州裂天不兼覆地不周載火爁炎而不滅水浩洋而不息於是女媧氏鍊五色石以補蒼天斷鼇足以立四極殺黒龍以濟冀州積蘆灰以止淫水天柱共工與顓頊争為帝怒而觸不周之山折天柱絶地維故天傾西北日月星辰就焉地不滿東南故百川水潦歸焉列子唐勒大言賦云壯士憤兮絶天維北斗戾兮太山夷天宫好道者言黄帝乗龍升雲登朝霞上至列闕倒景經過天宫天體如車有盖日月懸著何可上哉皇覽冡墓記與唐叔虞母夢天謂武王曰余命汝生子名虞余與之唐及生子有文在手曰虞因命之史記授楚公孫歸父㑹楚子于宋宋人告急于晉晉侯欲救之伯宗曰不可天方授楚未可與争雖晉之彊能違天乎左傳仰視齊桓公曰王者何貴管仲曰貴天桓公仰視管仲曰所謂天者非蒼蒼莽莽之天也居人上者以百姓為天説苑夢壓初穆子去叔孫氏適齊娶於國氏生孟丙仲壬夢天壓已弗勝顧見人黒面而上僂深目而猳喙號之曰牛助余乃勝之左傳天醉西京賦云昔者天帝悦秦繆公而覲之饗以鈞天廣樂帝有醉焉乃為金䇿錫用此土而翦諸鶉首哀江南賦云以鶉首而錫秦天何為而此醉虞喜志林曰諺曰天帝醉秦暴金誤隕石墜謂秦穆公夢天帝奏鈞天樂已有此諺李文饒曰昔秦時金䇿謂之天醉豈天之常醉哉文選趙簡子疾五日不知人居二日半寤語大夫曰我之帝所甚樂與百神遊於鈞天廣樂九奏萬舞不類三代之樂其聲動人心扁鵲告董安于曰昔秦繆公嘗如此七日而寤告公孫支與子輿曰我之帝所甚樂所以久者適有學也史記杞人憂天杞國有人憂天地崩墜身亡所寄廢寢食者又有憂彼之所憂者因往曉之曰天積氣耳亡處亡氣若屈伸呼吸終日在天中行止奈何憂崩墜乎其人曰天果積氣日月星宿不當墜耶曉之者曰日月星宿亦積氣中之有光耀者只使墜亦不能有所中傷列子談天五經通義曰鄒衍大言天事謂之談天劉向别録曰騶衍之所言五徳始終天地廣大書言天事故曰談天騶史記云衍迂大而閎辨故齊人頌曰談天衍夢上天汝南舊有鴻郤陂成帝時翟方進奏毁敗之成帝夢自上天天帝怒曰何故敗我濯龍淵後漢許揚傳捫天和熹鄧皇后嘗夢捫天天體蕩蕩正青滑如餹䬾有若鍾乳狀乃仰嗽飲之以訊占夢言尭夢攀天而上湯夢及天而䑛之此皆聖王之前占吉不可言也後漢書天頭天耳天足天姓吳使張温來聘百官皆往餞焉而秦宓後至問宓曰天有頭乎宓曰有之温曰在何方也曰在西方詩云乃眷西顧以此推之頭在西方温曰天有耳乎宓曰天處髙而聴卑詩云鶴鳴九臯聲聞於天若其無耳何以聽之温曰天有足乎宓曰有詩云天步艱難之子不猶若其無足何以步之温曰天有姓乎宓曰有温曰何姓宓曰姓劉温曰何以知之宓曰天子姓劉故以知之温曰日生於東乎宓曰雖生於東而沒於西荅問如響應聲而出於是温大敬服之蜀志夢木破天許真君吳猛與郭璞同見王敦敦曰吾昨夜夢將一木上破天禪代可十全不許君曰此夢固非得吉木上破天是未字也明公未可妄動晉祚固未衰耳十二真君傳張斌舉孝㢘夢竪竿索紞曰此未字前涼録天公建武元年嵗星犯天闗庾翼與庾冰書曰嵗星犯天闗占云闗梁當澁比來江東無他故江道亦不艱難而石虎頻年閉闗不通信使此復是天公憒憒無皂白之徵也宋書天文志擊門陶侃夢生八翼飛而上天見天門九重已登其八惟一門不得進以翼摶天閽者以杖擊之因墮地折其左翼及寤左腋猶痛其後都督八州潜有闚擬之志每思折翅之祥自抑而止晉書天帝面方一尺晉咸康中有士人周謂者死而復生言天帝召見引升殿仰視帝面方一尺問左右曰是古張天帝耶荅云上古天帝久已聖去此近曹明帝也天門開晉書載記北燕主馮跋嘗夜見天門開神光赫然燭於庭内北齊書文宣帝髙洋從世宗行過遼陽山獨見天門開餘人無見者葆光録羊襲吉少見天開其内雲霞澒洞樓閣㕘差光明下照山岳逡巡乃閉王文公遺事旦幼見天門開中有己姓名四川制置劉雄飛亦見天門開夢天門開宋薛安都初征闗陜至臼口夢仰視天見天門開謂左右曰汝等見天門開不至孝武伐逆踐祚歎曰夢天門開乃中興之象耶以功封南鄉男南史榮光永明中天忽有黄色照地衆莫能解司徒法曹上金天頌王摛曰是非金天所謂榮光世宗大悦用為永陽太守齊書天中字梁沈瑀與范雲善齊末嘗就雲宿夢坐屋梁柱上仰見天中字曰范氏宅瑀為髙祖説之髙祖曰雲得不死此夢可驗梁瑀書傳雲亭宫隋萬寳常生而聰穎妙達鍾律常於野中遇十許異人召至前曰上帝以子天授音律之性使鈞天之官示𤣥㣲之要命坐授之良久俱凌空而去寶常還家已五日矣自后人間之樂無不精究忽一夕先所遇仙來降其家曰記得雲亭宫之㑹乎寶常懵然良久乃悟他日謂隣人曰吾偶自仙宫謫於人世即將去矣旬日不知所之仙傳拾遺白玉樓李賀嘗病見緋衣人駕赤虬童子持一板若太古篆曰上帝新作白玉樓成召君作記天上差樂賀隨氣絶本傳賀卒後母夢賀曰上帝神仙之君也近遷都月圃建白瑶宫以某業於詞召與文士數輩共為新宫記帝又作凝虚殿使某輩纂樂章今為神仙中人甚樂願夫人無以為念宣室志塵外志五徳周世宗觀泗州大水記以問竇儼儼對曰天地有五徳潤暵生成動玉海紺珠一手捧韓琦知秦州卧疾數日忽曰適夢以手捧天者再其後援英宗於藩邸翼神宗於東宫倦游録天象成文龐籍帥延安日冬至中夜恍惚間見天象成文云龐籍後十年作相當以仁佐天子駐視久之方滅後十年果為相曲洧舊聞玉京金闕王素嘗夢至玉京黄金闕殿上有紫服翠冠者曰吾乃東門侍郎公則西門侍郎昔以奏牘訐責于世公夢回題詩曰似去華胥國裏來雲霞深處見樓臺月明冷落雞牕急驚覺浮生夢一回晩嵗思玉京之夢詩曰碧落中蔵白玉京夢魂飛入鳳凰城何時再步雲霞外皓齒青瞳已許成古今詩話上帝圖書之府政和初莆田方朝散某為婺源宰病熱困卧三日而寤云到一城中有一道士拜曰先生唐人昔有隂功帝召見于白玉樓盖李長吉作記處也試大道無為賦先生有警句云帝鑿竅而喪魄蛇畫足而失杯帝覽之大喜拜脩文郎専職文章繼命為玉華侍郎後以恃才為衆所嫉下遷羣玉外監羣玉殿上帝圖書之府也自是接見稍疏一日帝遊瑶圃召先生先生與宋道華泛舟池上有人間夫婦之念為使者所劾謫墮人世不久當返夷堅志閶闔離騷云吾令帝閽開闗兮倚閶闔而望予淮南子曰排閶闔淪天門注云閶闔始升天之門也天門上帝所居紫㣲宫門也張淵觀象賦曰儼閶闔以洞開注云宫牆兩藩正南開如門象者名閶闔門張衡賦曰叫帝閽使闢扉兮覿天皇於瓊宫天門河圖括地象曰西北為天門東南為地户注天不足西北是天門地不滿東南是地户漢書樂志天門開詄蕩蕩注天體堅清之狀也神異經西北大荒中有金闕髙千丈上有明月珠徑三丈光照千里中有金階兩闕名天門天路枚乗樂府曰美人在雲端天路隔無期天鬭書稱天工人其代之𫝊曰夫成天地之功者未嘗不蕃昌也由此觀之世主欲無功之人而彊富之則是與天鬭也而欲久立未之嘗有也潜夫論天教俗人云先世欲赦常先遣馬分行市里聽於路隅咸云當赦以知天之教也誠令仁君聞此以為天教而輒從之誤莫甚焉上天語髙弁蒼蒼遥聞天語徐陵孝義寺碑張弓天之道其猶張弓乎髙者抑之下者舉之有餘者損之不足者補之天之道損有餘補不足老子圓不中規老子曰樸至大者無形狀道至大者無度量故天圓不中規地方不中矩文子無端天圓而無端故不得觀其形地方而無涯故莫窺其門天化遂無形狀地生長無計量文子清明天道無私是以恒正天常正是以清明申子鄭注考靈曜云天者純陽清明無形聖人則之制璿璣玉衡以度其象耳隂陽自極以南天之陽也自極以北天之隂也物理論清陽積陽為天故天者清陽也黄帝素問起牽牛河圖括地象云天左動起于牽牛地右動起于畢尸子云天左舒而起牽牛地右闢而起畢昴不足西北素問曰天不足西北故西北方隂也而人右耳目不如左明也地不滿東南故東南方陽也而人左手足不如右強也又曰天不足西北左寒而右涼地不滿東南右熱而左温注云中原地形西北髙東南下今百川滿凑東之滄海則東西南北髙下可知四方之氣東方之氣雷南方之氣電西方之氣虹霓北方之氣雲雨雹霰中央之氣露造化權輿天吏天使天期天忌四時者天之吏也日月者天之使也星辰者天之期也虹霓彗星者天之忌也淮南子天文訓如笠天形穹窿如笠而冒地之表浮元氣之上譬覆奩以抑水而不流者氣充其中也虞聳窮天論象盖説云顓頊造渾天儀黄帝為盖天皆以天象盖也劉氏厯正問欹盖古人言天地之形者有三一曰渾天二曰盖天三曰宣夜宣夜之説未嘗聞也後有虞昺作穹天論姚信作昕天論虞喜作安天論衆形殊象㕘差其間盖天之説又有三體一云天如車盖遊乎八極之中一云天形如笠中央髙而四邉下一云天如欹車盖南髙北下天文録覆盆天平正與地無異若覆盆之狀論衡説車輪天如車輪終而復始極則復反吕氏春秋靈憲云天以陽而迴轉地以隂而停輪雞卵天如雞子地如中黄孤居於天内天大而地小天表裏有水天各乗氣而立載水而浮周天三百六十五度四分度之一又中分之則半覆地上半繞地下故二十八宿半見半隠天轉如車轂之運也渾天儀蟻磨周髀家云天圓如張盖地方如棊局天旁轉如推磨而左行日月右行天左轉故日月實東行而天牽之以西沒譬之於蟻行磨石之上磨左旋而蟻右去磨疾而蟻遲故不得不隨磨以左迴焉天君馬韓諸國邑各以一人主祭天神號天君後四夷傳以天為兄倭國王以天為兄以日為弟天明時出聽政跏趺坐日出便停理務曰委為弟北史天神之名五經通義云天神之大者曰昊天上帝即耀魄寳也亦曰天皇大帝亦曰太一其佐曰五帝東方青帝威靈仰南方赤帝赤熛怒西方白帝白招拒北方黒帝叶光紀中央黄帝含樞紐一説蒼帝名靈符赤帝名文祖白帝名顯紀黒帝名𤣥矩黄帝名神斗河圖曰其精東為蒼龍南為朱鳥中央為麟西為白虎北為𤣥武木公木公亦云東王父亦云東王公亦號玉皇君居雲房之間以紫雲為盖青雲為城仙𫝊拾遺昔漢初有四五小兒路上畫地戲一兒歌曰著青裠入天門揖金母拜木公張子房往拜之曰此東王公之玉童也所謂金母者西王母也木公者東王公也仙人拜王公揖王母真誥老君中經云東王父者清陽之氣也萬神之先治東方下在蓬萊山姓無為字君解西王母者太隂之氣也姓自然字君思下治崑崙之金城九重雲氣五色萬丈之巔上直北斗華盖紫房北辰之下一云東王公名倪字君明西王母姓楊名回朱儒問天朱儒問徑天髙於脩人脩人曰不知曰子雖不知猶近於我故凡問事必於知者淮南説山天帝召歌宋賀道養工卜筮經遇工歌女人病死為筮之曰此非死也天帝召之歌耳乃以土塊加其心上俄頃而蘇南史賀玉帝居玉帝所居常有紅雲擁之雖真仙亦不得見其面翼聖𫝊東坡詩云侍臣鵠立通明殿一朶紅雲捧玉皇玉京五星經云天上白玉京黄金闕靈樞金景内經上界玉京注云玉京無為天也三十六天自𤣥都玉京以下合有三十六天其二十八天在三界内黄曽天玉完天何童天平育天文舉天七曜摩夷天六天為欲界越衡天濛翳天和陽天恭華天宗飄天黄笳天堂曜天端靖天恭慶天極瑶天元載孔昇天皇崖天極風天孝芒天翁重浮容天江由天阮樂天曇誓天十八天為色界霄度天元洞天翰寵妙成天秀樂禁上天四天為無色界三界外曰四人天常融天玉隆騰勝天梵度天平育賈奕天名為種民天亦名四梵天四人天外曰三清境玉清太清上清亦名三天清㣲天禹餘天大赤天最上大羅天合三十六天靈寳本元經雲笈七籖大羅大羅在𤣥都玉京之上紫㣲金闕七寳騫樹麒麟師子化生其中三世天尊治在其中元始經云大羅之境無復貞宰惟大梵之氣包羅諸天太空之上有自然五霞其色蒼黄號曰黄天黄天之上其色青蒼號曰蒼天蒼天之上其色𤣥空城青號曰青天故頌曰三界之上𦕈𦕈大羅上無色根雲層峩峩九天九天上第一天名鬱單無量天第二天名上上禪善無量夀天第三天名梵監天第四天名兜術天第五天名不驕樂天第六天名化應聲天第七天名梵寳天第八天名梵摩迦夷天第九天名波棃荅恕天其一天俱别置三天合三十六天大霄琅𫝊大冥大冥在九天之上盖謂冥氣極逺絶乎九𤣥大洞經異呼匈奴呼天為祁連漢書霍去病至祁連山師古注云魏書爾朱榮𫝊祁連池魏言天也西域曰提婆髙僧𫝊一翻譯八部胡元曰統格落菽園記三十三天須彌山半四萬二千由旬有四天王天須彌山頂為帝釋天上一倍為夜摩天上為兜率陀天化樂天他化自在天梵衆天梵輔天大梵天少光天無量光天光音天少浄天無量浄天徧浄天福生天福受天廣來天無想天無煩天無熱天善見天善現天色究竟天無邉空處天無邉識處天無所有處天非想非非想處天凡二十八天四天以下又有日月星宿天常憍天持鬘天堅首天凡三十三種所謂三十三天者即帝釋天宫也因本經道列三界諸天數與釋氏同但名别耳酉陽雜俎天翁天翁姓張名堅字剌渇漁陽人少不羈無所拘忌常張羅得一白雀愛而養之夢天劉翁責怒每欲殺之白雀輒以報堅堅設諸方待之終莫能害天翁遂下觀之堅盛設賓主乃竊騎天翁車乘白龍振䇿登天天翁乘餘龍追之不及堅既到𤣥宫易百官杜塞北門封白雀為上卿侯改白雀之𦙍不産于下土劉翁失治徘徊五岳作灾堅患之以劉翁為太山太守主生死之籍酉陽雜俎諸異記洞天六言真誥云世人有知酆都六天宫名者則百鬼不敢為害洞天六宫周一萬里髙二千六百里洞天六宫是為六天鬼神之宫六天一曰紂絶隂天宫二曰泰然諒事宗天宫三曰明辰耐犯武成天宫四曰恬照罪氣天宫五曰宗靈亡非天宫六曰敢司連宛屢天宫人死皆至其中人欲常念六天宫名空洞之小天三隂所治也又耐犯宫主生紂絶天主死禍福續命由恬照第四天鬼宫北斗君所治即七辰北斗之考官也項梁城酆都宫頌曰紂絶標帝晨諒事構重阿炎如霄漢烟勃若景耀華武陽滯神鋒恬照吞清河開闔臨丹井雲門鬱嵯峩亡非通竒靈連苑亦敷魔六天横北道此是鬼神家凡有二萬言此唯天宫名耳夜中㣲讀之辟鬼魅千柱殿閻摩那婆羅天娑羅樹中其殿浄如鏡第二樹中有千柱殿酉陽雜俎善法堂善法堂在歡喜園天帝都㑹天王之正殿也其堂七寳所作四壁皆白銀以黄金為地地生軟草其軟類綿天人足履之沒至足舉後其地自平佛經陽孛天圓十二綱地方十二紀天綱運闕三百六十輪為一周地紀推機三百三十輪為一度天運三千六百周為陽孛地轉三千三百度為隂蝕天氣極於太隂地氣窮於太陽故陽激則勃隂否則蝕隂陽勃蝕天地氣反天地氣反乃謂之小劫天運九千九百周為陽蝕地轉九千三百度為隂勃陽蝕則氣窮於太隂隂勃則氣極於太陽故隂否則蝕陽激則勃隂陽蝕勃則天地以易天地改易謂之大劫三清三天正法經天厄靈寳自然運度有大陽九大百六也小陽九小百六也三千三百年為小陽九小百六也九千九百年為大陽九大百六也夫天戹謂之陽九也地虧謂之百六也至金天氏之後甲申之嵗是其天地運度否泰所終陽九百六㑹至時道徳方明兇醜􅉐肆聖君受任於壬辰之年也靈寳天地運度經天非左旋通人揚子雲因衆人之説天以為盖常左旋日月星辰隨而東西乃圖畫形體行度㕘以四時厯數昏明晝夜欲為世人立紀律以垂法後嗣余難之曰春秋晝夜欲等平旦日出於夘正東方暮日入於酉正西今以天下人占視之此乃人之夘酉非天夘酉天之夘酉當北斗極北斗極天樞樞天軸也猶盖有保斗矣盖雖轉而保斗不移天亦轉周匝斗極常在知為天之中也仰視之乃在北不正在人上而春秋分時日出入乃在斗南若如盖轉則北方道逺南方道近彼晝夜漏刻之數何從等乎子雲無以解也後與子雲奏事坐白虎殿廊廡下以寒故背日曝背有頃日光去背不復曝焉因以示子雲曰天即盖轉而日西行其光影當照此廊下而稍東耳不當拔出去拔出去無乃是反應渾天家法焉子雲立壊其所作則儒家以為天左轉非也桓譚新論渾沌天地渾沌如雞子盤古生其中萬八千嵗天地開闢陽清為天隂濁為地盤古生其中一日九變神於天聖於地天日髙一丈地日厚一丈盤古日長一丈如此萬八千嵗天數極髙地數極深盤古極長後乃有三皇數起於一立於三成於五盛於七處於九故天去地九萬里徐整三五厯紀開子自天統開於子輕清之炁一萬八百年升而為天天之晶華凝結而為日月星辰成象既著功用乃行地統開於丑重濁之炁一萬八百年凝而為地地之靈氣融結而為山川河嶽成形既定肹蠁攸召祛疑説異名纂要云東西南北曰四方四方之隅曰四維天地四方曰六合天地曰二儀以人㕘之曰三才四方上下謂之宇往古來今謂之宙説文曰宙舟輿所極覆也或謂天地為宇宙日月謂之兩曜亦曰二紀張衡思𤣥賦察二紀五星之綢繆注二紀日月五星謂之五緯日月星謂之三辰國語帝嚳能序三辰以固民左傳三辰旂旗昭其明也周禮掌三辰之法注日月星亦曰三光漢文紀上以累三光之明淮南子紘宇宙而章三光注日月星亦曰三靈揚雄羽獵賦上獵三靈之流如淳曰三靈日月星垂象之應也亦曰三精後漢光武賛三精霧塞注日月星日月五星謂之七曜榖梁傳序七曜為之盈縮天門真臘抵占城旁有西棚國望見天有一竅極明土人稱天門一曰天際國古云女媧氏之所不至也即天門國天地相去考三五厯紀云數起于一立于三成于五盛于七處于九故天去地九萬里淮南子云天有九野九千九百九十九隅去地五億萬里春秋元命包云天不足西北陽極於九故周天九九八十一萬里洛書甄曜度云周天三百六十五度四分度之一夫一度為一千九百三十二里則天地相去十七萬八千五百里孝經援神契云周天七衡六間相去萬九千八百三十三里三分里之一合十一萬九千里從内衡以至中衡中衡以至外衡各五萬九千五里闗令内𫝊云天地南午北子相去九千萬里東夘西酉亦九千萬里四隅空相去九千萬里天去地四十千萬里天有五億五萬五千五百五十里地亦如之各以四海為脈論衡曰天行三百六十五度積凡七十三萬里天去地六萬餘里靈憲云天有九位自地至天一億萬六千二百五十里垂天之晷薄地之儀皆千里而差一寸周髀云天離地八萬里冬至之日雖在外衡常出極下地上二萬里周禮疏云案考靈曜從上臨下八萬里天以圓覆地以方載河圖括地象西北為天門東南為地户天門無上地户無下極廣長南北二億三萬一千五百里東西二億三萬三千里廣雅云天圜南北二億三萬三千五百里七十五步東西短減四步周六億十萬七百里二十五步從地至天億一萬六千七百八十七里半下度地之厚與天髙等天度云東方七宿其屬三十二星七十五度南方七宿其屬六十四星一百一十二度西方七宿其屬五十一星八十度北方七宿其屬三十五星九十八度四分度之一四方三百六十五度四分度之一度二千九百三十二里二十八宿間相距積百七萬九百一十三里徑三十五萬六千九百七十里月令正義考靈曜云一度二千九百三十二里千四百六十一分里之三百四十八周天百七萬一千里是天圓周之里數也以圍三徑一言之直徑三十五萬七千里此二十八宿周迴直徑之數也然二十八宿之外上下東西各有萬五千里是為四遊之極謂之四表據四表之内并星宿内總三十八萬七千里天之中央上下正半之處一十九萬三千五百里地在於中是地去天之數也長晉文志云地上去天八萬一千三百餘里酉陽雜俎云天地相去四十萬九千里四方相去萬萬九千里胡安定云南樞入地下三十六度北樞出地上三十六度狀如倚杵此天形也一晝一夜之間凡行九十餘萬里人一呼一吸謂之一息一息之間天行八十餘里人之一晝一夜有一萬三千六百餘息故一晝一夜而天行九十餘萬里學林云周禮以天圭之法南戴日下萬五千里地與星辰四遊升降于三萬里之中是以半之得地之中也潁川陽城為然此乃古之聖人推測天地髙深之法體圓經云天體東西南北徑三十五萬七千里每一方八萬九千二百五十里自地至上八萬里以日照陽城中之半為中乃天體正圓也以算勾股見之玉厯通政經天解天者身也天之為言鎮也居髙理下為人鎮也白虎通説題辭天鎮也神也珍也施生為本運轉精神功列效陳其道可珍重也禮統天顯也在上髙顯也坦也坦然髙而逺也釋名天顛也至髙無上説文日光實日者實也形體光實人君之象禮統無虧春秋元命包云日尊故曰滿滿故仁仁故明明故精在外注曰滿者常盛無虧也天精天地至寳精不兩明注天精為日地精為月援神契陽徳之母春秋内事曰日者陽徳之母也易辨圖備曰日之既陽徳消謝莊月賦云日以陽徳枚乘七發曰歸神日母衆陽之精日者衆陽之精内明𤣥黄五色無主以象人君精精似青翼翼似黒𤣥𤣥似赤縞縞似白煌煌似黄光照無主不可以一色名也易傳日神五色明照四方援神契盛哉日乎丙明離章五色淳光太𤣥注五色五行之方色也衆貴之象日者照明之太表光景之太紀羣陽之精衆貴之象也故日出而天下光明日入而天下冥晦此其效也故日者天之象君父夫兄之類中國之應也五行傳衆陽之長漢李尋疏曰日者衆陽之長輝光所燭萬里同晷人君之表也故日將旦清風發羣隂伏火精范子計然曰日者火精也火者外景主晝居晝而為明處照而有光淮南子曰積陽之熱氣生火火氣之精者為日故陽燧見日則燃而為火天光漢成帝報許皇后曰夫日者衆陽之宗天光之貴王者之象人君之位也外戚傳張衡東京賦云須消啓明掃朝霞登天光于扶桑吕向注曰天光日也太陽之精日者太陽之精也夏則陽盛隂衰故晝長夜短冬則隂盛陽衰故晝短夜長氣引之也行陽之道長故出於夘酉之北行隂之道短故出於夘酉之南春秋陽隂等故日行中平晝夜等也物理論人君之象夫日者天之所布以照察於下而垂示法則也日為太陽之精積而成象人君仰焉光明外發魄體内全匿精揚輝圓而常滿此人君之體也晝夜有節循度有常春生夏養秋收冬蔵人君之政也星月稟其光辰宿宣其氣生靈仰其照葵藿慕其恩此人君之徳也是以日主道徳養生福祐仁恩若人君有瑕必露其慝以告示焉乙巳占陽精之宗靈憲曰日者陽精之宗積精成象象成為禽金雞火烏也皆三足表陽之類其數竒道經漢志注不全史記龜筴傳孔子曰日為徳而君于天下辱于三足之烏春秋元命包云陽數起于一成于三故日中有三足烏者陽精也淮南子云日中有踆烏者謂三足烏也山海經云湯谷上有扶木一日方至一日方出皆載于烏論衡曰日者火也烏入火中燋爛安得而立盖日氣也又伏候古今注云漢元帝永元年中日無光其日長安無烏或言日中烏之去也物類相感志云凡日無光則日烏不見日烏不見則飛鳥隠竄陽烏廣雅云日一名陽烏蜀都賦陽烏迴翼於髙標郭璞十日賛曰羿乃控弦仰落陽烏隋書李徳林霸朝雜集序云陽烏垂曜㣲藿傾心一曰金烏隋康孟詩金烏升曉氣玉檻漾晨曦唐太宗詩靈烏帶景飛翔陽海賦翔陽逸駭于扶桑之津注翔陽日也淮南子曰日陽之主也日中有烏故言翔逸駭言出疾也大明禮曰大明生於東月生於西此隂陽之分夫婦之位也鄭注大明日也六韜云大明發而萬物皆照大義發而萬物皆利太陽正厯曰太陽日也吳越春秋范蠡為吳王夀詞云上感太陽降瑞翼翼漢元永元二年詔曰氛邪嵗増侵犯太陽郎顗四事云日者太陽以象人君政變於下日應於天曹子建求通親親表云夫葵藿之傾葉太陽雖不為迴光終向之者誠也南齊書王儉表云秋葉辭條不假風飈之力太陽躋景無俟螢爝之暉李平對魏世宗曰猶太陽之消㣲露巨海之蕩螢燭舊唐書温彦博云中國之於夷狄猶太陽之比列星東君廣雅云日一名東君楚詞九歌東君云暾將出兮東方照吾檻兮扶桑漢志云晉巫祠東君師古曰東君日也索隠曰東君見歸蔵易隋書樂志朝日歌云扶木上朝暾嵫山沈暮景曜靈廣雅云日名曜靈楚詞天問曰角宿未旦曜靈安蔵逺遊云曜靈煜而西征張平子歸田賦曜靈俄景繼以望舒皇輔謐年厯曰日者衆陽之宗陽精外發故日以晝明名曰曜靈齊書䇿命齊王曰太古初陳萬物紛綸開曜靈以鑑品物立元后以馭蒸人朱明廣雅云日一名朱明楚詞招魂云朱明承夜兮時不可掩朱光廣雅云日一名朱光楚詞云陽杲杲其朱光張孟陽七哀詩朱光馳北陸浮影忽西沈陽光桓帝詔曰間者日食毁缺陽光晦暗後書陸機雲賦云蔽陽光於暘谷暗天文乎常居北堂書抄陽景曹攄詩宻雲翳陽景霖潦淹庭除銑曰陽景日也江文通詩丹霞蔽陽景朱羲郭璞詩蓐收清西陸朱羲將由白善注朱羲日也扶光謝瞻送孔靖詩扶光迫西汜歡餘宴有窮濟曰扶光日也謝莊月賦擅扶光于東沼離光晉束晳𤣥居釋云離光夜隠望舒晝戢宋顔延之範連珠云魯陽傾首離光為之反舎梁劉孝綽詩園葵一何幸傾葉奉離光靈暉陸機演連珠云靈暉朝覯稱物納照翰曰靈暉日也太暉謝鎮之書云太暉灼兮昇曜列宿奄兮消蔽𢎞明六利眼陸機演連珠曰利眼臨雲不能垂照吕向注曰利眼日也論衡曰日月猶人之有目任子曰日月天下眼目而人不知徳山川為天下衣食人不能謝抱朴子曰日月之蝕乃至於盡天何為當故壊其眼目以行譴人乎九陽仲長統詩曰沆瀣當餐九陽代燭注九陽謂日也山海經曰湯谷上有扶桑十日所浴居水中有大木九日居下枝一日居上枝楚詞逺遊云朝濯髮於湯谷兮夕晞余身兮九陽羲和廣雅曰日御曰羲和楚詞曰吾令羲和弭節兮望崦嵫而勿迫虞世南徐堅引淮南子云爰止羲和爰息六螭是謂懸車注云日乘車駕以六龍羲和御之日至此而薄於虞泉羲和至此而迴六螭山海經云東南海外有羲和之國有女子名曰羲和是生十日常浴日於甘淵注云羲和天地始生主日月者也故堯因是立羲和之官以主四時左思蜀都賦羲和假道于峻岐晉皇甫謐釋勸曰羲和促轡大火西頺張華招隠士詩羲和䇿六龍弭節越崦嵫日亦可曰羲和漢崔篆慰志賦氛霓鬱以横厲兮羲和忽以潜暉王符愛日篇曰化國之日舒以長舒長者非謂羲和安行注羲和日也魏卞蘭許昌宫賦云望舒涼室羲和温房抱朴子什滯篇曰羲和外景而熱日出日入日出於暘谷浴于咸池拂于扶桑是謂晨明登于扶桑爰始將行是謂朏明至於曲阿是謂旦明至于曽泉是謂蚤食至於桑野是謂宴食至於衡陽是謂隅中至於昆吾是謂正中至於烏次是謂小還至于悲谷是謂餔時至於女紀是謂大還至於虞淵是謂髙舂至於連石是謂下舂至於悲泉爰止其女爰息其馬是謂懸車薄於虞淵是謂黄昏淪於蒙谷是謂定昏日入崦嵫亦曰落棠山經於細栁入於虞淵之汜曙於蒙谷之浦行九州七舎有五億萬七千三百九里注自暘谷至虞淵凡十六所為九州七舎淮南子東曰暘谷日之所出西曰濛汜日之所入隋天文志桑榆淮南子曰日西垂景在樹端謂之桑榆注曰言其光在桑榆樹上漢書谷永云太白出西方法當㕘天今已過期尚在桑榆之間後書注桑榆謂晚也光武勞馮異云可謂失之東隅收之桑榆劉休𤣥擬古詩曰願乘薄暮景照妾桑榆時日光異名日光曰景日影曰晷日氣曰晛初出為旭日昕曰晞日温曰煦日在午曰亭午在未曰映日晚曰旰日將落曰薄暮日西落光反照於東謂之反景在上曰反景在下曰倒景煦日温也皓日晝貌也暉日光也旰日晩也翌日明也曉日白也纂要説文朝旦為暉日中為光管輅别傳荅劉邠云太平太蒙孤竹北户西王母日下謂之四荒岠齊州以南戴日為丹穴東至日所出為太平西至日所入為太蒙爾雅楊炯渾天賦太平之人仁太蒙之人信徑千里湯泉之精上合為日徑千里周圍三千里下於天七千里徐整長厯揚雄解嘲云夫日月之徑不千里則不能燭六合燿八紘音義云八方之綱維也晉魯勝元康初遷建康令到官著正天論云以冬至之後立晷測影凖度日月星日月徑才百里無千里星十里不百里遂表上之光照所及尚書考靈曜曰日光照四十萬六千里地説書曰日照四十五萬里也周髀曰日光外照徑八十一萬里九道月令正義日有九道考靈曜曰萬世不失九道三道天有三道黄道者日月五星所乘黄帝占日月行房三道其政太平行上道昇平行中道霸世行下道可視瞻之短於厯舊影為行上道與厯合為行中道長於舊影為行下道古今占日道出於列宿之外萬有餘里考靈曜十煇周禮㫝祲氏掌十煇之法以觀妖祥辨吉凶一曰祲謂隂陽五色之氣祲淫相侵或曰抱珥背璚之屬如虹而短是也二曰象謂雲如氣成形象雲如赤烏夾日以飛之類是也三曰鑴日旁氣刺日形如童子所佩之鑴也四曰監謂雲氣臨在日上也五曰闇謂日月蝕或日光暗也六曰瞢謂瞢瞢不光明也七曰彌謂白虹彌天而貫日也八曰叙謂氣若山而在日上或曰冠珥背璚重叠次序在于日旁也九曰隮謂暈氣也或曰虹也詩所謂朝隮于西者也十曰想謂氣五色有形想也青饑赤兵白喪黒憂黄熟或曰想思也赤氣為人獸之形可思而知其吉凶隋天文志隨時出入仲春仲秋日出於夘入於酉夏日出於寅入於戌仲冬月日出於辰入於申尚書考靈曜寒暑在宿五經通義曰日在牽牛則寒在東井則暑牽牛宿外逺人故寒東井宿内近人故温雀立日傍春秋考異郵曰黄帝將興有黄雀赤頭立於日傍黄帝曰黄者土精赤者火榮爵者賞也余當立大功乎八夢生八子娵訾氏生而髮與足齊墮地能言及為髙辛帝室夢日而生八子皆有賢知世號八元異苑帝嚳之妃鄒屠氏之女也常夢吞日則生一子凡經八夢則生八子世謂為八神亦謂八翌翌明也亦謂八英亦謂八力言其神力英明翌成萬象億兆流其神睿焉拾遺記五色互照日五色陽之精君徳也少昊金天氏邑於窮桑日五色互照窮桑尸子羿射九日淮南子云尭時十日並出草木焦枯尭命羿仰射十日中其九日日中九烏皆死墜其羽翼莊子疏云尭時十日並出尭使羿射九烏落為沃焦歸蔵鄭母經云昔者羿善射彈十日果彈之天問云羿焉彈日烏焉解羽逐日夸父與日逐走入日渇欲得飲飲河渭河渭不足比飲大澤未至道渇而死棄其杖化為鄧林山海經升沈見異夏桀之時費昌之河上見二日在東者爛爛將起在西者沈沈將滅若疾雷之聲問於馮夷曰何者為殷何者為夏馮夷曰西夏東殷於是昌徙族歸殷論衡夢鬭桀為無道湯令伊尹往視曠夏聽于末嬉末嬉言曰今昔天子夢西方有日東方有日兩日相與鬭西方日勝東方日不勝伊尹以告湯乃令師從東方出於國西以進未接刃而桀走吕覽慎大乘船過傍伊摰將應湯命夢乗船過日月之傍乘雲繞日傅說賃為赭衣者舂于深巖以自給夢乘雲繞日而行筮得利建侯之卦嵗餘殷以玉帛聘為阿衡也拾遺記著身文王夢日月著其身帝王世紀比政周文王問鬻子曰敢問君子將入其職則於其民何如對曰君子將入其職則於其民也旭旭然如日之始出也既入其職則於其民也暵暵然如日之正中也既去其職則於其民也暗暗然如日之已入也故君子將入而旭旭者義先聞也既入而暵暵者民保其福也既去而暗暗者民失其教也文王曰受命矣賈誼冬日夏日左傳曰酆舒問於賈季曰趙衰趙盾孰賢對曰趙衰冬日之日也趙盾夏日之日也注冬日可愛夏日可畏鄧析書曰君人者當如冬日之陽夏日之隂萬物歸之夾赤鳥楚有雲如衆赤鳥夾日以飛三日楚子使問周太史太史曰其當王身若禜之可移於令尹司馬王曰移腹心之疾置之股肱何益王弗禜而死孔子曰昭王其不失國也宜哉左哀六辨日逺近孔子東遊見兩小兒辨鬭問其故一兒曰我以日始出時去人近而日中時逺也一兒以日初出逺而日中時近也曰爾何以知一兒曰日初出大如車盖及日中則如盤盂此不為逺者小而近者大乎一兒曰日初出滄滄涼涼及其日中如探湯此不為近者熱而逺者涼乎孔子不能決也兩小兒笑曰丘孰謂汝多知乎列子負暄宋有田夫曝日於野美之不識廣厦綿縞之麗謂其妻曰吾負日之暄以獻吾君將獲重賞上夜照齊有不夜城盖古者有日夜照於東境故春秋時萊子立此城以不夜為名解道康齊地記作橋視出始皇作石橋欲過海觀日出處時有神人驅石下海石去不速神輒鞭之皆流血至今石悉赤陽城山石盡起立嶷嶷東傾狀如相隨行三齊畧記日為再中燕丹子曰燕太子丹質於秦王遇之無禮急欲求歸秦王不聽􅍝與誓曰使日再中天雨粟乃得歸太子仰天嘆之日為再中天雨粟秦王不得已遣之風俗通曰成帝間劉向俗説文帝自為代王及徵當即位後期不得立日為之再中向曰文帝少即位不容再中日再中文帝十七年新垣平言候日再中居頃之日郤復中於是更為元年令天下大酺漢書日再中烏連嬉仁聖出握知時易辨終備日中王字文帝時日中有王字帝王世紀君應陽君臣和得道度則日含王字春秋緯神女捧日漢景帝夢神女捧日以授王夫人夫人吞之十四月而生武帝景帝曰吾夢赤氣化為赤龍占者以為吉可名之吉漢武内傳重光漢書云元封元年從登封太山倪寛上夀曰癸亥宗祀日宣重光李竒曰太平之世日抱重光謂日有重日也崔豹古今注曰漢明帝為太子樂人作歌詩四章一曰日重光云天子之徳光明如日太子比徳焉故云重光尚書五行傳曰明王踐位則日儷其精重光以見吉祥陸士衡演連珠云重光發藻尋虚捕景對日南北張重字仲篤明帝時舉孝㢘帝曰何郡小吏荅曰臣日南吏帝曰日南郡人應向北看日荅曰臣聞鴈門不見壘鴈為門金城郡不見積金為郡臣雖居日南未曽向北看日後漢書范泰古今善言云重曰今郡有雲中金城不必皆有其實負日靈帝王美人妊娠畏何后乃服藥欲除之而胎安不動又數夢負日而行四年生獻帝協後漢后紀納懐魏文帝為王時夢日墜地分為三分己得一分而内懐中談藪捧日程昱少時常夢上大山兩手捧日昱私異之以語荀彧及兖州反賴昱得完三城於是彧以昱夢白操操曰卿當終為吾腹心昱本名立操乃加日其上更名昱也魏書對日逺近晉明帝諱紹元帝子也初元帝鎮揚州時中原喪亂有人從長安來帝問洛陽消息潸然流涕帝年數嵗問何故具以東渡意告之因問帝汝意謂長安何如日逺荅曰不聞人從日邉來只聞人從長安來帝異之明日集羣臣宴㑹說以此荅明帝又以為日近帝動容問何故異昨日之言荅曰舉頭不見長安只見日以是知近帝大悦劉昭幼童傳夢日環城王敦將舉兵内向明帝宻知之乃乘巴滇駿馬㣲行至于湖隂察敦營壘而出敦正晝寢夢日環其城驚起曰此必黄鬚鮮卑奴來也帝母荀氏燕代人帝狀類外氏鬚黄敦故謂帝云晉書墮身袁愍孫世祖出為海陵守夢日墮身上尋而追還典機宻謝綽宋拾遺録夢抱後魏遼西王當英夢日墮所居黄山下水中村人以牛車挽致不出英獨抱戴而歸聞者異之北史化逐魏孝文皇后髙氏之懐宣武也夢為日所逐化而為龍而繞后后寤而驚悸遂成心疾馮太后召徐謇王顯為后診脈謇以為㣲風入蔵顯云按三部非有心疾將是懐孕生男之象果如其言顯𫝊初后之幼也曽夢在堂内立而日光自牕中照之灼之而熱后東西避之光猶斜照不已如是數夕以白其父颺颺以問遼東人閔宗宗曰此竒徵也日者人君之徳帝王之象也光照女身必有恩命及之女避猶照者主上來求女不獲已也昔有夢月入懐猶生天子況日照之徵此女必遂將被帝命誕育人君之象也遂生世宗后傳捧日納口陳武帝霸先常游義興館于許氏夢天開數丈有四人朱衣捧日而至納之帝口及覺腹内猶熱帝心獨喜南史夢兩日鬭陳文帝蒨梁大清初夢兩日鬭一大一小大者光滅墮地色正黄其大如斗帝三分取一懐之南史影長袁克上表云隋興以後日影漸長謹按春秋元命包云日月出内道璇璣得常天帝崇靈聖王相功京房别對曰太平日行上道昇平行次道霸世行下道伏惟大隋啓運上感乾元影短日長振古未之有也上大悅告天下將作役功因加程課丁匠苦之登山捧日楊炎未仕時嘗夢陟髙山之巔下瞰人境杳不可辨仰而視之見端日在咫尺紅光赫然洞照萬里因舉左右手捧之炎燠之氣如熱心目久而方寤因語於人有解者曰日者君象也此登相位而輔人君之祥也其後歴登相位果叶捧日之祥宣室志三日金梁鳳謂祠部郎中裴冕曰𤣥象有變半年間有兵起公此時當為宰相大富貴冕曰公乃狂言冕何至此梁鳳曰有一日向東京一日入蜀川一日來向朔方此時公得相冕懼其言深謝絶之未幾安祿山反哥舒翰奏冕為御史中丞冕問以三日之説梁鳳曰東京日即自磨滅蜀川日亦不能久此間日向轉分明其後安祿山僣號𤣥宗幸蜀肅宗即位靈武冕果為中書侍郎平章事舊唐書續世説首承日賈隠林朱泚之難扈徳宗於行在至卧内奏曰臣嘗夢日墜以首承之帝曰非朕耶因令糾察行在唐書車載日淄清鄭尚書光㑹昌六年春夢自御大車中載瑞日光燭天地自執靷行通衢中俄而驚寤且竒歎後月餘宣宗即位以元舅之故累拜尚書淄清節度果契前夢宣室志夢吞偽吳毛貞輔累為邑宰應選之廣陵夢吞日既寤腹猶熱以問侍御史楊廷式楊曰此夢至大非君所能當若以君而言當得赤烏場官也果如其言稽神録日車莊子徐無鬼篇小童荅黄帝曰若乗日之車而遊于襄城之野李尤九曲歌曰年嵗晩暮日已斜安得壯士飜日車南齊書庾易臨川王暎表薦之餉麥百斛易謂使人曰民馳騁日月之車得保自耕之祿于大王之恩亦已深矣辭不受南史齊禪梁武䇿曰文教與鵬翼齊飛武功與日車並進白駒莊子人生天地之間若白駒之過郤忽然而已註白駒或云日也漢書魏豹畔漢漢王使酈生往説之豹謝云人生一世間如白駒過隙漢王嫚人吾不忍見也迎日迎日之詞曰維某年某月上日明光于上下勤施于四方旁作穆穆維予又某敬拜迎日于郊尚書大傳倒景谷永説成帝云仙人䢣興輕舉登遐倒景注曰在日月上日月反從下照故曰倒景郊祀志長繩係景蕭大圜深信因果心安閑放常云人生若浮朝露寧俟長繩係景實所願言執燭夜游驚其迅速北史日箭南唐蘇洪進揚州版築發一塜不顯姓名刻石為銘曰日為箭兮天為弓射四時兮無窮鄭文寳江表志醉日衛元規酒後忤丁僕射以書謝曰自兹囚酒星於天獄焚醉日於秦坑摭言若華山海經云灰野之山有樹青華赤華名曰若木日所入處在崑崙西附西極也淮南子曰若木在建木西未有十日其華照下地髙誘注曰未端也若木端有十日狀如連珠華光也光照其下地一云狀如蓮花離騷曰折若木以拂日天問曰羲和之未揚若華何光曹子建與吳質書折若木之華閉濛汜之谷應休璉與從弟書折若華以閉日盈尺聖人身猶日也夫日圓盈尺光滿天下聖人居室彌綸六合猶聖人之身小其所燭逺矣尸子晨暉髙閭至徳頌云重光麗天晨暉疊旦魏書晨離曹毗晉穆帝歌云如彼晨離曜景扶桑梁元帝檄云霜戈照日則晨離奪暉龍騎蔽野則平原掩色晨曦胡義周統萬宫殿頌曰晃若晨曦照見列星馳暉謝朓贈西府馳暉不可接何況隔兩鄉善曰馳暉日也又至潯陽詩過客無留軫馳暉有奔箭傾羲謝靈運秋懐詩云頺魄不再圓傾羲無兩旦頺陽謝瞻詩頺陽照通津善曰楚詞云日晻晻而下頺濟曰頺陽落日也日足梁虞騫詩落暉散長足細雨織斜文李太白詩赤霞動金光日足森海嶠熟羊甲貞觀中史官所載鐵勒回紇部在薛延陁之北去京師六千九百里又有骨利幹居回紇北方瀚海之地草多百藥地出名馬駿者行數百里北又距大海晝長而夕短既日沒後天色正曛煮一羊脾纔熟而東方已曙盖近日出入之所舊唐天文沒即出欽察國去中國三萬餘里夏夜極短日漸沒即出元史托和傳拜日新羅每以元日拜日月神舊唐書契丹貴日每月朔旦東向而拜日五代史東門向日天竺屬國數十有泇沒路國其俗開東門以向日舊唐書燭龍山海經云鍾山之神名曰燭隂視為晝暝為夜吹為冬呼為夏不飲不食不喘不息身長千里人面蛇身赤色注曰即燭龍也又云西北海之外赤水之北有章尾山有神其暝乃晦其視乃明視燭九隂是謂燭龍詩含神霧曰天不足西北無隂陽消息故有龍銜火精以照天門中者也天問曰日安不到燭龍何照選雪賦云爛兮若燭龍銜燿照崑山淮南云燭龍在鴈門北蔽于委羽之山不見日其神人面龍身而無足張説賦南窮火鼠之譯北盡燭龍之㑹赤人頂輪揚州有趙都統號趙馬兒常提兵船往援李壇于山東舟至登萊滯留數月常于舟中見日初出海門時有人通身皆赤眼色純碧頭頂大日輪而上日漸髙人漸小凡數月所見皆然癸辛雜志日中無影白民之南建木之下日中無影呼而無響盖天地之中也吕氏春秋廣都衆帝所自上下日中無影盖天地之中淮南子河南陽城縣是為土中夏至之景尺有五寸所以為候太康紀何承天以博物著名問釋慧嚴佛國將用何厯嚴云天竺夏至之日方中無影所謂天中於五行土徳色尚黄數尚五八寸為一尺十兩當此土十二兩建辰之月為嵗首及討覈分至推校薄蝕顧步光影其法甚詳宿度年紀咸有條例承天無所厝難髙僧傳隨天入地或曰天北際下地中日隨天而入地地宻障隠故人不見如審運行地中鑿地一文轉見水源天行地中出入水中平實者天不在地中而日出上日入下者隨天轉運論衡葛稚川曰黄帝書曰天在地外水在天外水浮天而載地者也又易曰時乗六龍夫陽爻稱龍龍者居水之物以喻天天陽物也又出入水中與龍相似故比以龍也聖人仰觀俯察審其如此故晉卦坤上離下以證日出於地也又明夷之卦離下坤上以證日入於地也又需卦乾下坎上此亦天入水中之象也天為金金水相生之物也天出入水中當有何損而謂為不可乎王生必固謂為不然者疏矣隋志何承天云天形正圓而水居其半地中髙外卑水周其下言四方者東曰𤾉谷日之所出西曰濛汜日之所入莊子又云北溟有魚化而為鳥將徙於南溟斯亦古之遺記四方皆水證也四方皆水謂之四海凡五行相生水生於金是故百川發源皆自山出由髙趣下歸注於海日為陽精光曜炎熾一夜入水所經焦竭百川歸注足以相補故旱不為減浸不為益宋書濯曜羅𤣥門輪及太洞經云九天真人呼日為濯曜羅三天真人呼日為圓光蔚太素天中呼日為眇景皇上清真人呼日為九曜生泰清天中仙人呼日為太明太極天中呼日為圓明玉賢天中呼日為㣲𤣥東華真人呼日為紫曜明亦名圓珠亦謂始暉亦謂太明雲笈七籖圓曜羅方諸下真人呼日為圓曜羅右英夫人示許長史詩云圓曜暎南軒朱風扇幽室真誥鬱儀太洞經云日亦名鬱儀月亦名結璘玉京山經云左顧提鬱儀右眄攜結璘七聖記曰鬱華赤文與日同居結璘黄文與月同居鬱華日精結璘月精也黄庭經曰鬱儀結璘善相保梁邱注曰鬱儀奔日之仙結璘奔月之仙一云日月之神也蛾睂山洞石書云鬱儀引日精結璘致月神遶須彌劫初長成時天地大闇有大黒風吹大海水開漂出日月置于須彌山半安日道中行旋繞四天下照燭衆生閻浮提南日中弗婆提東日沒瞿耶尼西日出鬱單越北夜半長時含經難阨王問那伽斯那云日之在上其體是一何以夏時極熱冬時極寒夏則日長冬則日短斯那云須彌山有上下道日于夏時行于上道路逺行遲照于金山故長而暑熱冬時行于下道路近行速照大海水故短而極寒雜寶蔵經三界圖云其天中心皆有崑崙山又名須彌山也其山髙闗傍障四方日月繞山互為晝夜日在東方于逯境界日正中時光及南方浮利界境以為日出在南方於日正中時耶尼境界以為日出而方日正中時光及北方鬱單以為日出日在北方於正中時東方境界以為日出者今雖四序合宿是同冬夏二至晝夜不等日若繞山四方合停出沒既異則無山隔七二日宫日天宫殿正方如宅看遥似圓一面兩分皆天金成一面一分天頗梨成有五種風吹轉而行一持二住三隨順轉曰波羅阿􅂒五將行起紀蘇利耶此云日神或蘇利耶或脩利大孔雀寶王紀日姓名日月者天地之司徒司空也日姓張名表字長史月姓文名申字子光老子歴蔵中經金門洞陽宫金門之上日之通門也金門之内有金精冶鍊之池在西闗左之分故立春之節日更鍊魄于金門之内耀其光于金門之外四十五日乃止順行之洞陽宫洞陽宫日之上館也立夏之日止于洞陽宫吐金冶之精以灌于東井之中沐浴于晨暉收八素之氣歸廣寒之宫也三道順行經含虛大荒之中有山名曰含虚日月所出紅光所司岰山神蓐收居之是山也西望日之所入其氣圓神紅光之所司也山海經常陽大荒之中有山名曰常陽之山日月所入山海經入聲若雷沙弼茶國向無人至者祖葛尼曽到因立文字該載其國係日西沒之地至晩日入聲若雷霆國王每于城上聚千人吹角鳴鑼擊鼓混雜日聲不然則小兒驚死異域志日蝕陽不克日蝕説曰日者太陽之精人君之象君道有虧為隂所乗故蝕蝕者陽不克也後漢志日食從西舊説曰日有五蝕謂起上下左右中央是也漢尚書令黄香曰日蝕皆從西月蝕皆從東無上下中央者春秋魯桓三年日蝕貫中上下竟黒疑者以為日月正等月何得小而見日中鄭𤣥云月正掩日日光從四邉出故言從中起也南齊書謫見男教不脩陽事不得謫見於天日為之食故日食則天子素服而脩六宫之職蕩天下之陽事昏義日不食朔天下太平日不蝕朔月不食望顔延年讌曲水詩曰日完其朔月不掩望失徳之應管子曰日掌陽月掌隂星掌和陽為徳隂為刑和為事是故日蝕則失徳之國惡之月蝕則失刑之國惡之彗星見則失和之國惡之是故聖王日蝕則脩徳月食則脩刑彗星見則脩和日君裴子曰夫日者君也月者臣也一嵗十二㑹君臣相見之象君有失徳臣下専之故有日蝕之咎故伐鼔用幣責上卿是其禮退臣道也乙巳占曜魄之寳日者陽精之明曜魄之寳其氣布徳而主生在地曰徳徳者生之類也徳傷則亡故日蝕必有亡國死君之災上救日天子救日置五麾陳五兵五皷諸侯置三麾陳三兵三皷大夫擊門士擊柝凡有聲皆陽事也以厭隂氣也榖梁傳赤幘凡救日食皆著赤幘以助陽也決疑要注鼓用牲于社文公十五年辛丑朔日有食之鼓用牲于社非禮也日有食之天子不舉伐皷于社諸侯用幣于社伐皷于朝以昭事神訓民事君示有等威古之道也左傳朱絲縈社莊公二十五年夏六月辛未朔日有食之鼓用牲于社公羊傳曰鼓用牲于社求之隂之道也以朱絲縈社或曰脅之或曰為闇恐人犯之故縈之也何休注曰社者土地之主也月者土地之精也上敷于天而犯月故鳴皷而攻之脅其本也朱絲縈之助陽抑隂也脅之與責求同義務三昭七年夏四月甲辰朔日有食之晉侯問於士文伯曰誰將當日食對曰魯衛惡之衛大魯小公曰何故對曰去衛地如魯地於是有災魯實受之其大咎其衛君乎魯將上卿公曰詩所謂彼日而食于何不臧者何也對曰不善政之謂也國無政不用善則自取謫于日月之災故政不可不慎也務三而已一曰擇人二曰因民三曰從時左傳降物昭十七年夏六月甲戌朔日有食之祝史請所用幣昭子曰日有食之天子不舉伐皷于社諸侯用幣于社伐皷于朝禮也平子禦之曰止也唯正月朔慝未作日有食之於是乎有伐皷用幣禮也其餘則否太史曰在此月也日過分而未至三辰有災於是乎百官降物君不舉辟移時樂奏皷祝用幣史用辭故夏書曰辰弗集于房瞽奏皷嗇夫馳庶人走此月朔之謂也當夏四月謂之孟夏平子弗從昭子退曰夫子將有異志不君君矣左傳兆水昭公二十一年秋七月壬午朔日有食之公問于梓慎曰是何物也禍福何為對曰二至二分日有食之不為災日月之行也分同道也至相過也其他月則為災陽不克也故常為水於是叔輒哭日食昭子曰子叔將死非所哭也八月叔輒卒左傳常衮賀日當食不食表同道相遇則聞昭子之對兆旱昭公二十四年夏五月乙未朔日有食之梓慎曰將水昭子曰旱也日過分而陽猶不克克必甚能無旱乎陽不克莫將積聚也左傳不食春秋感精符云魯哀公時政彌亂絶不日食政亂之類當致日食之變而不應者譴之何益告之不悟故哀公之篇絶無日食之異漢明帝日食詔曰楚莊無災以致戒懼魯哀禍大天不降譴三朝食恵帝七年正月辛丑朔日有食之谷永以為嵗首正月朔日是為三朝尊者惡之漢書哀帝元夀元年正月辛丑日有食之不盡如鈎與恵帝七年同月日鮑宣上言今日食於三始誠可畏懼小民正月朔日尚恐毁敗器物況日虧乎本傳宋文帝與劉義慶書日食三朝天下之至忌晉孝武初有此異彼庸主也猶竟無他本傳食晦建武七年三月晦日食鄭興上疏曰日月交㑹數應在朔頃年日食每多在晦先時而合皆月行疾也日君象月臣象君亢急則臣下促迫故行疾也後漢本傳不隠延熹元年五月甲戌晦日有食之常侍徐璜曰言臣切見道術家常言漢死在戌亥今太嵗在丙戌五月甲戌日食栁宿朱雀漢家之貴國宿分周地今京師是也史官上言去重見輕璜召太史陳援詰問乃以實對冀怨援不為隠諱使人隂求其短發摘上聞上以亡失候儀不肅有司奏收殺獄中梁冀别傳如月之初黄琬祖父瓊為魏郡守時日食而京師不見瓊表日食之狀太后召問日食瓊久而無對琬年六嵗在傍謂瓊曰何不云日食之餘如月之初遂用其言荅詔後漢書刻期唐太史李淳風校新厯太陽合朔當食既於占不吉太宗不悦曰日或不食卿將何以自處曰如有不食臣請死之及朔帝候于庭謂淳風曰吾放汝與妻子别對以尚早一刻指表影曰至此則蝕如言而蝕不差毫髮國史異纂脩徳𤣥宗時日食帝素服俟變録囚多所貸遣宋璟曰恐議直以月蝕脩刑日蝕脩徳或言分野之變冀有揣合臣謂君子道長小人道消止女謁放䜛夫此所謂脩徳也囹圄不擾兵甲不瀆官不苛治軍不輕進此所謂脩刑也陛下常以為念雖有虧食將轉而為福又何患乎帝嘉納唐本傳移閏宋仁宗寶元元年正月丙辰朔日食六月戊子日官楊惟徳等言來嵗閏十二月則庚辰嵗正月朔日當食請移閏於庚辰則日食在前正月之晦帝曰閏所以正天時而授民事其可曲避乎不許宋史止賀嘉祐六年六月壬子朔日有食之時議稱賀脩起居注司馬光上言臣愚以為日之所照周徧華夷雲之所蔽至為近狹今若太陽實虧而浮雲翳塞雖京師不見四方必有見者此乃天戒至深不可不察也臣聞漢成帝永始元年九月日有食之四方不見京師見谷永以為沈湎于酒禍在内也二年二月日有食之四方見京師不見谷永以為百姓屈竭禍在外也臣愚以為永之所言似未協天意夫四方不見京師見者禍尚淺也四方見京師不見者禍浸深也日者人君之象天意若曰人君為隂邪所蔽灾慝明著天下皆知其憂危而朝廷獨不知也由是言之人主尤宜側身戒懼憂念社稷而羣臣乃始相率稱賀豈得不謂之上下相蒙誣罔大譴哉又所食不滿分數者厯官術數之不精當治其罪亦非所以為賀也宋史外壤内壤榖梁曰日有食之何也吐者外壤食者内壤闕然不見其壤有食之者也注曰凡所吐出者其壤在外所吞咽者壤入於内也龍麟鬭春秋元命包曰麟龍鬭日月薄食孔演圖曰麒麟鬭而日無精光宋均曰麒麟少陽之精鬭作于地則日月亦將争于上𤣥淮南子曰麒麟鬭而日月蝕許慎注曰麒麟大角之獸故與日相動日食祝董仲舒救日食祝曰炤炤大明纎滅無光奈何以隂侵陽以卑凌尊周官大祝注月隂精隂精為月日行十三度常朏任而受受明精在内故金水内景春秋元命包地理月者隂之精地之理春秋感精符天使孔子曰日者天之明月者地之理月上屬為天使婦從夫放月紀孝經援神契日月天之使也淮南子羣隂之本月羣隂之本月望則蚌蛤實羣隂盈月晦則蚌蛤虚羣隂廢夫月行乎天而羣隂化於淵吕氏春秋金精太隂之精上為月月者天地之隂金之精也史記隂宗淮南子云積隂之寒氣為水水氣之精者為月月者隂之宗也是以月虚而魚腦減月死而蠃蚘膲又云月盛衰于上則蠃蛖應于下同氣相動不可以為遠衆隂之長李尋上書曰月者衆隂之長消息見伏百里為品千里立表萬里連紀妃后大臣諸侯之象也朔晦正終始弦為繩墨望成君徳漢書水精物理論云月水之精潮有大小月有虧盈抱朴子曰月之精生水是以月盛而濤潮大太隂之精月者太隂之精積而成象魄質含影稟月之光以明照夜仁脩隂道以之配日女主之象也以之比徳刑罰之義也列之朝廷諸侯大臣之類也是以近日則光斂猶臣近君卑而屈也逺日則光滿為其守道循法蒙君榮華而體勢伸也當日則蝕猶臣僣君道而禍至於覆滅也盈極必缺示其不可久盈也月闕也隂道臣道妻道不可使盈理當恒缺也其行速臣下之道也行有弦望晦朔遲疾隂陽政刑之等威也乙巳占晦朔弦望月闕也滿則復缺也朔月初之名也朔蘇也月死復生蘇也晦月盡之名也晦灰也火死為灰月光盡似之也弦月半之名也其形一旁曲一旁直若張弓施弦也望月滿之名也月大十六日小十五日日在東月在西遥相望也釋名朏魄朏月未成明也魄月始生魄然也承大月月生二日謂之魄承小月月生三日謂之朏説文古文月采篇云三日曰朏注月出也月采説月之光采其書則亡朓朒晦而月見西方謂之朓朔而見東方謂之朒亦謂之側匿側匿則侯王其肅朓則侯王其舒漢書五行志月朝見曰朒夕見曰朓日則過中之謂昃至夜之謂匿月則與日相望謂之望既望之後漸虧謂之側至晦無光謂之匿宋朝以朓字避僖宗諱改為朏朒胡次和太𤣥索隠夜光廣雅曰夜光謂之月皇甫謐年厯曰月羣隂之宗光内日影以宵曜名曰夜光天問曰夜光何徳死則又肓金波漢書郊祀歌曰月穆穆以金波日華燿以宣明師古曰言月光穆穆若金之波流也謝朓詩金波麗鳷鵲玉衡低建章注曰金波月也圓景曹子建贈徐幹詩曰圓景光未滿衣鮮燦以繁善曰圓景月也謝靈運望遲客詩云圓景早已滿佳人殊未適靈輪張淵大象賦望舒縱轡以騁度靈輪浹旦而過周後漢本傳隂靈謝莊月賦曰日以陽徳月以隂靈南齊天文志賛曰陽精火鏡隂靈水存有果有射代為明昏唐田況月賦日有朝靈月有宵徳桂輪唐中宗三蔵聖教序云慧炬揚輝澄桂輪而含影注云桂輪月也月中有丹桂故稱為桂輪纂異記嵩岳嫁女記云桂輪已昇金樞海賦云大明攬轡於金樞之穴注云大明月也月有御故言轡金西方也河圖帝覽志曰月者金之精月有窟故言穴文選金樞理轡素月告望伏滔望清賦望舒淮南子曰月御曰望舒蔡邕清誨云元首寛則望舒朓侯王肅則月側匿郤正釋譏曰羲和逝而望舒陳魏卞蘭許昌宫賦望舒涼室羲和温房成公綏天地賦望舒彌節於九道羲和正轡於中央纎阿淮南子曰月御亦曰纎阿也束晳補亡詩曰纎阿按晷樂彦曰纎阿山名有女子處其巖月歴數度躍入月中因為月御也姮娥歸蔵曰昔嫦娥以西王母不死之藥服之遂奔月為月精淮南子曰羿請不死之藥於西王母嫦娥竊而奔月許慎曰姮娥羿妻也逃月中盖虚上夫人是也張衡靈憲曰姮娥竊藥奔月將往枚筮之於有黄有黄筮之曰吉翩翩歸妹獨將西行逢天晦芒毋驚毋恐後其大昌姮娥遂託身於月是為蟾蜍文心雕龍云歸蔵之書大明迂怪乃稱羿斃十日姮娥奔月殷湯如兹況諸子乎學齋佔􅖶以為常儀占月之誤淮南注又云奔月或作坌肉藥分肉以為死畜之肉可復生也蟾兔詩推災度曰月三日成魄八日成光蟾蜍體就穴鼻始明宋均注曰穴決也決鼻兔也五經通義曰月中有兔與蟾蜍月隂也蟾蜍陽也而與兔並明隂係於陽也春秋元命包曰月之為言闕也而設以蟾蜍與兔者隂陽雙居明陽之制隂隂之倚陽張衡靈憲曰月者隂精之宗積精而成象象成為獸玉兔蟾蜍也皆四足表隂之類其數偶春秋演孔圖曰蟾蜍月精也河圖曰蟾蜍去月天下大亂月􅙡揚雄賦曰西厭月􅙡東震日域顔延年詩月竁來賓日際奉土竁窟也杜子春周禮注曰今南陽人呼穿土為竁昭明大法頌西踰月窟東漸扶桑陶𢎞景賦云東卷長桑日窟西幹龍築月阿南齊禮志月域來賓日際奉土隋樂志北齊皇夏詞云月軌咸梯岫日域盡浮川似鏡京房云月與星辰隂也有形無光日照之乃有光如以鏡照日而有影見先師以為日似彈丸月似鏡體或以為月亦似彈丸日照處則明不照處則闇猶水舊厯説曰日猶火也月猶水也火則施光水則含影故朏生於向日魄生於背日當日則光盈近日則明滅一月與日合范子計然曰日者寸也月者尺也寸者制萬物隂陽之長短尺者紀度而成數也月行疾二十九日行遲三十日間一與日合取日之度以為月節月行三門天有三門猶房四表房中央曰天街天道也天門也黄道所經也南間曰陽環陽環南三尺曰陽裏陽裏南三尺曰太陽中道北間曰隂間隂間北三尺曰隂裏隂裏北三尺曰太隂中道故曰月順軌道由乎天街則天下和平由乎陽道則主喪由乎隂道則主水京房曰月行南道為旱月行北道為水行中道天門之間則天下大安五榖豐登人主益夀之兆天文總論徑千里徐整長厯曰月徑千里周圍三千里下於地七千里論衡曰月行一日一夜行二萬六千里與鳬飛相類地説書曰月照四十五萬里姊月春秋感精符曰人君日月同明四時合信故父天母地兄日姊月宋均注曰父天於圜丘之祀也母地於方澤之祭也兄日於東郊姊月於西郊蓂莢帝王世紀曰尭時有草夾階而生毎月朔始生一莢至月半則生十五莢十六日以後日落一莢至月晦而盡月小則餘一莢焦而不落王者以是占厯惟盛徳之君應和氣而生以為尭瑞名之蓂莢一名靈莢一名仙莢抱朴子曰昔黄帝候鳳鳴以調律唐尭觀蓂莢以知月夢過月中夏禹未遇夢乗舟月中過吞月精女狄暮汲石紐山下泉水中得月精如雞子愛而含之不覺而吞遂有娠十四月而生夏禹遁甲開山圖榮氏解白氣貫月主癸之妃曰扶都見白氣貫月意感以乙日生湯號天乙宋書夢射月楚晉將戰晉侯夢吕騎射中月退入於泥占之曰姬姓日也異姓月必楚王也及戰射恭王中目吕騎死之左傳眺蟾臺洞冥記云帝於望鵠臺西起俯月臺臺下穿池廣千尺登臺以眺月影入池中使宫人乗舟笑弄月影因名影娥池亦曰眺蟾臺池中有遊月船觸月船三輔黄圖云影娥池在建章宫武帝鑿以翫月其旁起望鵠臺以眺月云云又起眺蟾臺雞跖集云上官儀應詔詩中用影娥池學士時無解其事者令狐徳棻召張柬之等十餘人問出何書柬之引洞冥記為對徳棻嘆其博識月入懐漢元后母李親妊政君在身夢月入其懐揚雄元后誄曰太隂之精沙麓之靈作合于漢配元生成翟義傳王莽作大誥曰隂精女主聖明之祥謝莊月賦云淪精而漢道融兩夢入懐捜神記曰孫堅夫人吳氏孕而夢月入其懐既而生䇿及權在孕又夢日入其懐以告堅曰妾昔妊䇿夢月入我懐今也又夢日入我懐何也堅曰日月者隂陽之精極貴之象吾子孫其興乎謝莊月賦委照而吳業昌南史梁元帝母石氏為帝采女夢月墮懐中而孕名在月中㑹稽先賢傳曰闞澤年十三夢見名字炳然在月中月中物徐孺子年九嵗嘗月下戲人語之曰若令月中無物當極明耶穉曰不然譬如人眼中有瞳子無此必不明世説吳牛喘滿奮畏風在晉武帝坐北牕作琉璃屛實宻似疎奮有難色帝笑之奮荅曰臣猶吳牛見月而喘世説注云今之水牛唯生江淮間故謂之吳牛也南土多暑而此牛畏熱見月疑是日所以見月則喘又風俗通曰吳牛望見月則喘使之苦於日見月怖而喘焉滓穢太清㑹稽王道子齋中夜坐於時天月明浄都無纎翳歎以為佳謝景重在坐荅曰意謂乃不如㣲雲㸃綴王因戲謝曰卿居心不浄乃復強欲滓穢太清耶世説月夜登樓庾亮鎮武昌諸佐吏殷浩之徒乗秋夜往共登南樓俄而不覺亮至諸人將起避之亮徐曰諸君少住老子於此處興復不淺便據胡牀與浩等談詠竟坐其坦率行已多此類晉書謝觀在崔裔門下嘗作白賦云晚入梁王之苑雪滿羣山夜登庾亮之樓月明千里南唐野史登樓清嘯劉琨在晉陽嘗為敵騎所圍數重城中窘迫無計琨乃乗月登樓清嘯賊聞之皆凄然長嘆中夜奏胡笳賊又流涕歔欷有懐土之切向曉復吹之賊並棄圍而走晉本傳乗舫誦詩袁虎少貧嘗為人傭載運租謝尚鎮牛渚秋夜乗月率爾與左右㣲服泛江會袁宏在舫中諷誦聲既清㑹辭又藻拔遂駐聽久之遣問焉荅云是袁臨汝郎誦詩即其詠史之作也尚傾率有勝致即迎升舟與之談論申旦不寐自此名譽日茂晉書宏傳顯處視月世説褚季野語孫安國云北人學問淵綜廣博孫荅曰南人學問清通簡要支道林聞之曰聖賢固所忘言自中人以還北人看書如顯處視月南人學問如牖中窺日注云學廣則難周難周則識闇故如顯處視月學寡則易覈易覈則智明故如牖中窺日也月中人帶劍尹思者字少龍安定人也晉元康五年正月十五夜坐屋中遣兒視月中有異物否兒曰今年當大水月中有一人披蓑帶劍思自視之曰將有亂卒至兒曰何以知之曰月中人乃帶劍仗矛當大亂三十年後小清耳後果如其言神仙傳真誥月下長詠顧愷之矜伐過實諸年少因相稱譽以為戲弄為散騎常侍與謝瞻連省夜於月下長詠自云得先賢風致瞻每遥賛之愷之得此彌自力忘倦瞻將眠語槌脚人令代愷之不覺有異遂幾申旦而後止續晉陽秋對飲謝譓朏次子也不妄交接門無雜賓有時獨醉曰入吾室者但有清風對吾飲者惟當明月南史隨月讀書江泌字士清濟陽考城人少貧盡日斫屟夜讀書隨月光握卷升屋南齊書暈左角天與五年十月月暈左角太史令晁崇奏角蟲將死上慮牛疫乃命諸軍併重焚車牛果大疫死者十八九宫車所馭巨犗數百同日斃於路側首尾相屬麋鹿亦多死天文志夢食北齊釋曇遷嘗尋性識論遂感心疾専憑三寶不以醫術纒情夜夢月落入懐乃擘而食之脆如冰片甚訝香美覺罷所苦痊復一旬有餘流味在因其聖助食月成徳遂私改鄉名為月徳也續髙僧傳廣寒清虚之府開元六年八月望與申天師洪都客作術夜遊月宫見一宫府榜曰廣寒清虛之府下視王城嵯峩若萬里琉璃之田有素娥十餘人乗鸞舞於廣庭桂樹之下音樂清麗遂歸製霓裳羽衣之曲龍城録明皇嘗以手指上下按其腹髙力士曰豈聖體小不安邪上曰吾昨夜夢遊月宫諸仙子娯以上清之樂其曲凄楚動人吾回以玉笛尋得之慮忽遺忘故尋之耳力士拜賀請奏併求其名上曰此曲名紫雲回遂載於樂章刻石太常焉開天傳信記逸史云羅公逺為明皇擲杖化銀橋至月宫集異記及廣徳神異録謂過潞洲城明皇雜録謂至西川幽怪録謂正月望十五夜幸廣陵事半天瓊樓翟乾祐峽中人曽於江岸與弟子翫月或曰此中竟何有翟笑曰可隨吾指觀弟子中兩人見月規半天瓊樓金闕滿焉數息間不復見酉陽雜俎紙月長慶初山人楊隠之在郴州常尋訪道士有唐居士楊謁之因留楊止宿及夜呼其女曰可將一弦月子來其女遂貼月於壁上如片紙耳唐即起視之曰今夕有客可賜光明言訖一室朗若張燭酉陽雜俎長慶中有王先生者𢎞農晦之聞其術往謁焉王留之宿乃八月十二也先生召其女七娘謂之曰汝為吾刻紙狀今夕之月置於室東之垣上有頃七娘以紙月施於垣上忽月光洞然一室毫髮盡辨晦之驚嘆不測宣室志金背蝦蟆張周封云長慶中有人翫八月十五夜月光屬於林中如匹布其人尋視之見一金背蝦蟆疑是月中者酉陽雜俎梯繩取月太和中有周生者有道術次廣陵寺中時中秋夜與客㑹月色方瑩有説明皇遊月宫事者生笑謂坐客曰我能挈月置之懐袂因命虚一室取筯數百條繩而駕之曰我將梯取此月俄覺天地曛晦因開室曰月在某衣中因以手舉衣懐中取月寸許忽一室盡明寒入肌骨宣室志脩月户太和中鄭仁本表弟常與一王秀才遊嵩山迷歸路徙倚間忽覺叢中鼾睡聲見一人枕一樸物方眠敢因就問之其人笑曰君知有月七寶合成乎月勢如丸其影日爍其凸處也常有八萬二千户脩之予即一數事玉屑飯兩裹授與二人曰分食此可一生無疾乃指一支徑示二人言已不見酉陽雜俎天柱峯玩月趙知㣲有道術皇甫𤣥真等師事之咸通庚寅中秋自朔霖霪至望𤣥真謂同門生曰堪惜良宵而值苦雨知㣲忽命侍童曰可備酒果登天柱峯玩月衆竊有不然者既出門長天朗浄皓月如晝捫蘿援條吟飲山嶺至寒蟾隠於逺岑方歸山舎既各就榻而凄風飛雨宛然三水牘卜月延三刻南唐圓丘之祭太史奏月延三刻時上旬月當三更而沒升壇之際皎然如日禮畢而落先主初有禪代之志忽夜半寺僧撞鐘滿城皆驚旦將斬之云夜來偶得月詩云徐徐東海出漸漸上天衢此夜一輪滿清光何處無先主喜而釋之江南野史夢食月耶律伊遜幼慧黠嘗牧羊熟寢夢人持日月以食之已食月啗日方半為父所觸而覺后為魏王遼史夢攜入月後唐何仲舉其母嘗夢攜入月尋與范質登長興間進士至天䇿府學士道州志月重輪紹興壬午五月十六日五更初月外有環暈五重附近者紫紅色白者次之青者又次之黄者又次之最外深紅各相去一丈分寸不差其圓如規荆大聲曰是為月重輪前史所紀多不過兩三重而今五數但太隂極盛恐非太陽之利將曉未没未幾髙宗巽位夷堅志月桂俗傳月中仙人桂樹今視其初生見仙人之足漸以成形桂樹後生焉虞喜安天論舊言月中有桂有蟾蜍故異書言月桂髙五百丈下有一人常斫之樹創隨合人姓吳名剛西河人學仙有過謫令伐樹酉陽雜俎李賀箜篌引云吳質不眠倚桂樹月桂子月桂子今江東諸處每至四五月後每於衢路得之大如狸豆破之辛香古老相傳是月中下也洞冥記云有逺飛雞朝往夕還常銜桂實歸於南土所以北方無南方當月路所以有也本草唐垂拱中天台桂子落十餘日白樂天詩遥想吾師行道處天台桂子落紛紛宋天聖五年中秋餘杭靈隠寺桂子落其繁如雨色各不同僧式公種之林下後移植白猿峰凡二十五株遂改回軒亭為月桂亭玉㵎雜書月宫月天宫殿純以金銀天青琉璃而相間錯二分天銀一分天青琉璃亦為五風攝持而行起世經地影水影月宫中有影者須彌山大洲中有閻扶提樹因此樹故名閻浮洲其樹髙大影見月輪因此有影因本經大海中每有魚鼈等影現于月輪故其内有黒相現瑜珈論或言月中蟾桂地影也空處水影也酉陽雜俎廣靈堂月宫中有七寶浴池八騫之林秋分之日月宿東井之地上廣靈之堂三道順行經廣寒宫冬至後月養魄於廣寒之宫十方記月中仙人樂彦引老子道徳經云月中仙人宋無忌按白澤圖火之精曰宋無忌盖其人火仙也史封禪書注白月黒月西方一月分為黒白初月一日至十五日名為白月十六日已去至於月盡名為黒月此方通攝黒月合為一月也起世經法苑白分黒分印度國俗月盈至滿謂之白分月虧至晦謂之黒分或十四日或十五日月有大小故也黒前白後合為一月六月合為一行日遊在内北行也日遊在外南行也總此二行合為一嵗西域記蘇摩此云月神大孔雀明王經蘇上聲青瑶瀛洲有金巒之觀飾以衆寳懸火精為日刻黒玉為烏以水晶為月削青瑶為蟾兔於地下為機棙以測昏明不虧弦望拾遺記三珥荆州占曰月珥且戴不出百日主有大喜軍國占候曰若月三珥者大有喜若有冠而復暈者天下大有喜先節和帝時丁鴻封事曰間者月滿先節過望不虧此臣驕溢背君専功獨行也注月滿先節謂未及望而滿也後漢書質清月者隂之精也其形圓其質清日光照之則見其明日光所不照則謂之魄故月望之日日月相望人居其間盡覩其明故形圓也二弦之日日照其側人觀其傍故半明半魄也晦朔之日日照其表人在其裏故不見也隋書蘆灰淮南子曰畫蘆灰而月暈闕許慎注曰有軍士相圍守則月暈以蘆灰為環闕其一面則月暈亦闕於上隂燧淮南子曰方諸見月則津而為水髙誘注曰方諸隂燧大蛤也熟摩拭令熱以向月則水生也許慎注曰諸珠也方石也以銅盤受之下水數升唐新語云髙宗乾封初封禪李敬真上言須用明水以實尊彛乃依淮南法九月取蛤蚌一尺三寸者依法試之至半夜得水四五升便差送太山以供用焦兔置月婆羅􅂒斯國有三獸遭劫初有狐兔猨異類相悦時天帝釋化一老夫詣三獸求食於是狐銜鯉猨採果俱來唯兔空還自傷卑劣乃投火充餐時老夫收取焦兔傷歎謂狐猨曰吾感其心不泯其迹寄之月輪傳乎後世咸言月中之兔自斯而有西域記月蝕蕩隂事婦順不脩隂事不得謫見於天月為之食故月蝕則后素服而脩六宫之職蕩天下之隂事禮婚義擊皷柝月蝕后自提鼓階前把槌擊鼓者三中良人諸御者宫人皆擊柝救之月已蝕后乃齋服縞素三日不從樂以應其祥此先王之所以免天地之誅而解四境之患也荆州占擊鑑長安城中每月蝕時節士女取鑑向月擊之滿郭如是盖云救月蝕也開元遺事闇虚靈憲云當日之衝光常不足是謂闇虚在星則星㣲遇月則月食羅㬋此云障持化身長八萬四千由旬舉手掌障日月世云日月食成論去譬如天日月其性本明浄煙雲塵霧等互翳則不現等取脩羅故佛誡云脩羅脩羅汝莫吞月月能破暗能除衆熱翻譯名義星食月荆大聲云月體自若而星居月上此為星食月月遇之而星隠不見此為月食星天中記卷一
