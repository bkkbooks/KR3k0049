body:
  text: 天中記類書類提要臣等謹案天中記六十卷明陳耀文撰耀文學問該博所著有學圃萱蘇正楊集諸書皆别著於録此編見明史藝文志者六十卷今世傳刻本止五十卷不加標目葢當時初刋未定之本此本共六十卷目次與明史相合則其完書也明人類書所列舊籍大都沒其出處至於憑臆増損無可徴信此書援引繁富而皆能一一著所由來於體裁較善惟所著書名或在條首或在條末為例未免不純又如愆陽伏隂語出春秋左氏傳而引漢書五行志為據則事始不的又第一卷内篇目已畢而復綴以張衡大象賦一篇則編次失倫此類亦往往疎於檢㸃然其自九流毖緯以逮僻典遺聞廣事蒐羅實可為博聞多識之助且每條下間附案語如玉篇廣韻之解誕字為生水經注之以苗茨堂為茅茨堂世説注以錢唐為錢塘唐逸史之紀孫思邈年代舛錯新唐書之載安祿山死日乖互皆為抉摘其失其向來類家之相沿訛謬者如合璧事類以狄兼謩為魏謩錦繡萬花谷以浮圖泓為一行事文類聚以劉溉為到溉萬卷菁華以晉建元元年為漢武帝孔氏六帖以三陽宫為逭暑宫凡若此者於𨽻事之中兼資考據其典核尤諸家所未及范守已著曲洧新聞以是書鶴門無浮丘翁王子晉丁令威徐亞卿四事浦門無青浦黄浦等水頗譏其漏不知巻帙既富徴事偶疎原所不保至於川名澤號更僕難窮又安可以一二小水失於登載遽訾其採摭之不廣乎其稱天中記者以耀文所居近天中山故也乾隆四十二年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:a0d28831741ffaef70d21fba572f8f1a8769b5b22e504641bd4559ef7f40f737
