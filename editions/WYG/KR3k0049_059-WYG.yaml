body:
  text: 天中記卷五十九明陳耀文撰烏孝烏烏孝鳥也孔子曰烏盻呼也取其助氣故以為烏呼説文日禽烏者日中之禽上陽精烏者陽之精元命包白烏生衆烏天地之初有三白烏主生衆烏三五厯返哺飛翔羽翮為陽陽氣仁故烏哺公也運斗樞夫孝行之本替本而求末者未見得之者也如或得之君子不貴矣烏者而有返哺况人而無孝心者乎譙子法訓瑶光星散瑶光星散為烏運斗樞三足烏熒惑火精生朱烏古今注所謂赤烏者朱烏也其所居髙逺日中三足烏之精䧏而生三足烏何以三足陽數奇也是以有虞至孝三足集其庭曽參鋤𤓰三足萃其冠瑞應圖三足烏文王時見抱朴子爵生烏孔子曰存亡禍福皆在己而已天災地妖亦不能殺也昔者殷王帝辛之時爵生烏於城之隅工人占之曰凡小以生巨家國必祉王名必倍帝辛喜爵之徳不治國家凶暴無極外㓂乃至遂亡殷國此逆天之時詭福反為禍說􅁐蒼烏見文王時見蒼烏王者孝悌則至瑞應圖江海不揚波南海翰以蒼烏禮斗威儀赤烏􅔷珪赤烏􅔷珪降周之岐社命代殷也墨子文王之時赤烏􅔷丹書集於周社故其色尚赤吕覽火為朱烏周天子發渡孟津火自上復於下至於王屋流為烏其色赤其聲魄云中候火者陽也烏有孝名武王卒父大業故烏瑞臻尚書緯赤烏武王時銜榖至屋上兵不血刃而殷服瑞應圖師遁烏樂楚令尹子元以車六百乗伐鄭諸候救鄭楚師夜遁鄭人將奔桐丘諜告曰楚幕有烏乃止莊二十八晋侯伐齊齊師夜遁師曠告晋侯曰鳥烏之聲樂齊師其遁叔向告晋候曰城上有烏齊師其遁襄八仁烏魯哀公十四年晋文公焚山求介子推有白烏遶煙而噪或集介子推之側火不能焚晋人嘉之起一䑓曰思煙䑓種仁夀木似栢而枝葉長花可食其烏又云仁烏慈烏拾遺記望烏臺越王入國丹鳥夾王而飛故勾踐得入國也起望烏䑓言烏之異也上烏頭白燕太子丹質於秦秦王遇之無禮不得意欲歸秦王不聽謬言曰令烏白頭馬生角乃可丹仰天歎烏即白頭馬為生角秦王不得已而遣之燕丹子朝夕烏成帝時何武請以御史大夫為大司空備三公官時御史府中列栢樹常有野烏數千棲宿其上晨去暮來號曰朝夕烏烏去不來者數月長老異之漢書赤烏巢門吳叔和犍為人母沒負土成墳有赤烏巢門甘露降户師覽授孝子𫝊烏馴丹羽巢叔和之室鹿呈白毳止功文之廬晋孝友𫝊序啣皷東陽顔烏以純孝著聞後有群烏銜皷集顔所居之村烏口皆傷一境以為顔烏至孝故慈烏來萃銜皷之興欲令聾者逺聞即於皷處立縣而名為烏傷王莾改為烏孝以彰其行迹云異苑畫壁按明帝起居注曰東巡泰山到榮陽有烏飛鳴乗輿上虎賁王吉射之烏上告曰烏鳴啞引身射左腋陛下方萬嵗臣為二千石帝賜錢二百萬令亭壁畫為烏也風俗通􅋦鵲吳王為神主來立廟倉龍門外時有烏巢朱雀門上又有兩烏銜一雀置神座前或得神書説改元之意乃改赤烏為太元元年呉厯接丸彭澤有烏接丸行者丸飯投之髙下無失張勃吳録白烏赤足武皇帝雄泰成三年白烏赤足來翔帝以問免賢賢曰烏有反哺之義必有逺人懐惠而來果関中流民請降蜀李雄書為祟寧逺參軍𢎞景則其姊病四十餘年令吾卦之得明夷之小過然病每欲動時輙有烏來鳴即便發作案卦當得獨蹄猪畜之後婦人如欲眠見一丈夫衣服人黒在户前立遥呼婦人語其來前不肯言有所畏遂泣而去病始小間吾嘗與殷侯共論此事曰烏日之禽猪月畜水火相忌自然之數故取𤣥隂之伏物用消太陽之飛精日中三脚以獨足者當之洞林啞啞聲支道林入東見王子猷兄弟還人問見諸王何如荅曰見一群白頸烏伹聞啞啞聲世説䘖繖徐干木年少時嘗夢烏從天下銜長斗繖樹其庭前烏復上天銜繖下凡樹三繖竟烏大鳴作惡聲而去徐後果得遂以惡終上大如白鷺晋時營道縣令何潜之於縣界得烏大如白鶩膝上髀下自然有銅環貫之酉陽巢殿簡文帝咸安初有烏巢殿屋帝使人占之曰西南有女人師當能伏此怪時厯陽郡烏江寺有尼苦行通靈時號聖􅐣帝即遣召問之對曰脩徳可以禳災齋戒亦能轉障帝乃建齋七日忽烏運巢而去帝因為聖􅐣起新林亭晉南京寺記烏夜村海塩南三里有烏夜村晉何凖所居也一夕群烏啼噪凖適生女他日復夜啼乃穆帝立凖女為後之月志獻白烏髙帝時有獻白烏帝問此何瑞范雲位卑最後答曰臣聞王者敬宗廟則白烏至時謁廟始畢帝曰卿言是也感應之理一至此乎齊書三鴉引路後魏太和二十三年孝文親征馬圈行至賈復城昏霧得三鵶引路遂至南山因號通鵶城元和郡縣志樹烏免難齊大尉司馬殷齊之隨陳顯逹鎮江州辭付寳誌誌畫絹作一樹樹上有烏語云急時可登此後顯逹逆節留齊之鎮州及敗齊之叛入廬山追騎將及齊之見林中有一樹樹比有烏乃誌所􅀞悟而登之烏竟不飛追者見烏謂無人而返卒以見免髙僧𫝊馴庭蕭放梁武弟偉子也字希逸隨父祗至鄴祗卒放居喪以孝聞居廬室前有二慈烏來集各據一樹為巢自午以前馴庭飲啄午後更不下樹每臨時舒翼悲鳴全似哀泣家人測之未嘗有闕時以為至孝之感北齊至孝出明帝時順陽獻三足烏八月甲子群臣上表稱應詔曰夫天不愛寳地稱表瑞莫不威鳯巢閣圖龍躍沼豈直日月珠連風雨玉燭是以鈎命决曰王者至孝則出元命苞曰人君至治所有虞舜烝烝來茲異趾周文翼翼翔此靈禽文考至徳下覃遺仁爰被逺符千載降斯三足將使三方歸本九州翕定惟此大體景福在民予安敢讓宗廟之善弗宣大惠可大赦天下文武官普進三級周書烏啄譛人司馬申短毛喜於後主使其廢錮申嘗晝􅃦於尚書省下有烏啄其口流血時論以為譛賢所致陳書隨軍延和初孫佺為幽州都督北征奚出軍之日有一大星落於營内兵將無敢言者軍行後幽州界内鴉鳥鴟鳶並隊皆隨軍去經二旬而沒軍八萬烏鳶食其肉僉載凢軍出有鳶烏隨其後者皆敗亡之徴元和中有曽敬雲者嘗為北都禆將李師道叛時曽將行營兵士數千人每出軍有烏鳶隨其後即軍必敗率以為常宣室志䘖木為城貞元四年夏鄭汴境内烏皆群飛集魏博田緒淄青李納境衘木為城髙二三尺方十里緒納惡而焚之信宿如故烏口皆流血又十八年六月烏集徐州之滕縣嗛柴為城中有白烏一碧烏一集㦸栁仲郢自拜諌議後毎遷官群烏大集於昇平里第庭樹㦸架皆滿凢五日而散詔下不復集家人以為候唯除天平節度烏不復集舊唐遂卒於鎮長安志尺魏丞烏唐魏伶為西市丞養一赤觜烏每與人衆中乞錢人取一丈而衘以送伶處日收數百時人號為魏丞烏僉載挽鈴温璋為京兆尹勇於殺戮京邑憚之一日聞挽鈴而不見有人如此者三乃一鵶尹曰是必有人探其雛而來訴也命吏隨鵶所在而捕之其鴉盤旋引吏至城外樹間果有人探其雛尚憇樹下吏執送之府尹以事異於常乃斃之禁邪㑹稽釋全清能劾鬼神時有市儈王家婦病邪累年清為縳草人置壇呪禁之鞭驅錇中􅊯􅊯有聲以六乙泥緘瘞桑下婦遂差後劉漢宏董昌亂人謂為窖藏破之見一鵶飛立桑杪人語曰今得見日光矣時清公已卒也宋髙僧𫝊朝烏髙昌國有朝烏者旦旦集王殿前為行列不畏人日出然後散去南史拘耆昔有烏名拘耆逰在叢林梁言赤􅝢烏也法苑珠林知雨俗候烏飛趐重知天將雨酉陽鷙鳥烏一名鷙鳥古今注鬼雀烏之白脰者西南人謂之鬼崔嗚則凶咎禽經注雛烏武周縣火山亦名榮䑓其山出雛烏形類雅烏純黒而姣好音與之同繢彩紺發觜若丹砂性馴良而易附弁童㓜子捕而執之赤觜烏亦曰阿雛烏按爾雅純黒反哺謂之慈烏小而腹下白不反哺者謂之雅烏白頭而群飛者謂之燕烏大而白頭者謂之養烏爾雅曰鸒期卑居也孫炎曰卑居楚烏犍為舍人以為壁屋説文謂之雅雅楚烏莊子曰雅賈矣馬融亦曰賈烏者也又按瑞廣圖有三足烏赤烏白烏之名而無記於此烏故書其異耳水經注鵲神女鵲一名神女古今注一名飛駁鳥本草陽鳥鵲者陽鳥先物而動先死而應見於木風之象易通卦騐芻尼昔如來在雪山脩道芻尼巢於項上佛既成道芻尼受報為那提國王芻尼野鵲子𫝊燈録知風鵲識嵗之多風也去喬木而巢扶枝大人過之則探鷇嬰兒過之則挑其卵知備逺難而忘近患淮人間避風鵲知太嵗所在説文鵲巢開口避太嵗博物志向太乙淮注知來乾鵲知來而不知往此修短之分也淮南鵲不鵲史疾謂楚王曰張官置吏必曰亷㓗勝任今盗賊公行弗能禁止可謂烏不為鳥鵲不為鵲也乾鵲至而行人至樊將軍噲問陸賈曰自古人君皆云有瑞應豈有是乎賈曰有之乾鵲噪而行人至蜘蛛集而百事嘉况人君重位乎西京雜記順風而立孝武坐未央前殿東方朔執㦸階傍屈指獨語上從殿上見朔呼問之殿後栢樹上有鵲立枯枝上東靣而鳴使視之果然問朔何以知之對曰風從東方來鵲尾長傍風則傾皆風則蹷必當順風而立是以知之東方朔𫝊巢於㠶檣孫和為南陽王之長史行過蕪湖有鵲巢於㠶穡官僚皆憂慘以為穡木傾危之象既而和果敗焉呉志探取王澄為荆州將之鎮送者傾朝澄見樹上鵲巢便脱衣上樹探􅑹而㺯之神氣蕭然傍若無人晉書集承塵建平王宏子景素在蕃甚得人心而謗聲日積當廢帝時深懐憂懼常與故吏劉璡獨處曲䑓有鵲集於承塵上飛鳴相逐景素泫然曰若斯鳥者遊則參乎風煙之上止則隱於林木之下飢則啄渴則飲形體無累於物得失不関於心一何樂哉後果及禍南史宋書談藪作燕􅂒墮武衛奚永洛與河内人張子信對坐有鵲鳴於庭樹而墮焉子信曰鵲言不善向夕若有風從西南來厯樹拂堂角則今夜有人喚公不得往子信去後果有風來至夜髙儼使召永洛且云勅喚永洛欲赴其妻若留稱墜馬腰折免於難北齊書巢車髙祖圍堯君素於蒲州粮盡人相食鳥有鵲巢其􅀈石車之上人心遂離為李楚客斬首𫝊之京師舊唐白􅍎正觀二年九月嘗有白鵲巢於􅃦殿槐上合歡如腰鼓左右稱賀上曰此何足賀命毁其巢縱鵲於野外通鑑𤣥衣傳赦貞觀中南康黎景逸居於空青山嘗有鵲巢其側毎飯食以餧之後隣地失布者誣景逸盗之繫南康獄月餘劾不承欲訊之其鵲止於獄樓向景逸歡喜以𫝊語之狀其日𫝊有赦官司詰其由來云路逄𤣥衣素衿人所説三日而赦至景逸還山乃知𤣥衣素衿者鵲之所𫝊僉載焚巢禳狐貞元三年中書省梧桐樹上有鵲以泥為巢焚其巢可禳狐魅喜鵲竇申宰相參之族子叅特愛申毎議除受多詣於申或泄之以招權受賂毎所至人謂之喜鵲舊唐參敗申擬配流徳宗曰吾聞申欲至人家謂之喜鵲遂賜死僉載鵲梁鵲巢中必有梁崔圓相公妻在家時與姊妹戯於後園見二鵲捕巢共􅋦一木如筆管長尺餘安巢中衆悉不見俗言見鵲上梁必貴酉陽鵲梁蔽形鵲食歸酒靈鵲學士院有雙鵲嘗棲於西軒海棠枝上毎學士㑹食必徘徊翔集於玉堂之上畧無驚畏因謂之靈鵲或鳴噪必有大詔令或宣召之事金坡遺事喃喃後唐釋可止善律詩在定州日中山節度使王處直與太原陳義互相疑貳諸候兼并王令方欲繼好息民因命僧齋於慶雲寺㑹有獻白鵲者王曰燕人詩客試為詠題止即席而成後句云不知誰會喃喃語必向王前報太平王欣然宋髙僧𫝊填河七月七日鵲無故皆髠相傳以為是日河鼓與織女㑹於漢東役鵲為梁以渡故毛皆為脱去爾雅翼烏鵲填河成橋而渡織女風土記鵲玉天𤣥主物簿云鵲啄槐實結玉於腦謂之鵲玉此鵲終嵗不復鳴噪雖巢無胎卵又云戴玉之鵲巢於室與燕同群炙病鵲搆巢取在樹杪枝不取墮地者又𫝊枝受卵端午日午時取其巢炙病者立愈酉陽鵲枕番禺人逄端午日採鵲巢中獲兩小石號鵲枕此日得之者佳婦人遇之有抽金簪解耳璫而償其直者投羌雜録葢取以為媚人藥也鵲腦鵲腦令人相思取鵲一雄一雌頭中腦燒之於道中以與人酒中飲則相思淮萬畢術失時則起鵲上髙城危而巢於髙枝之巔城壊巢折凌風而起故君子之居世也得時則義行失時則鵲起莊子鳩鷹化仲春之月鷹化為鳩月令拂羽榖雨日又五日鳴鳩拂其羽鳴鳩不拂其羽國不治兵周書時訓五鳩郯子云少皥時祝鳩氏司徒也鶻鳩氏司事五鳩鳩民者也昭十七感鳩作歌舜耕於厯山思慕父母見鳩與母俱飛鳴相哺食益以感思乃作歌琴操白鳩張紘與袁紹書曰殷湯有白鳩之祥吳録成王時來至瑞應圖献鳩孔叢子曰邯鄲人正且献鳩於趙簡子厚賞之客曰正旦放鳩厚恩也得賞競捕之不如勿賞簡子曰善列子同放鳩榮陽有厄井漢王避項羽於中雙鳩集飛井上羽以為無人故沛公得免因以為名故漢世正旦放鳩為此也地理志俗説髙祖與項羽戰敗於京索遁叢薄中羽追求之時鳩正鳴其上追者以鳥在無人遂得脱及即位異此鳥故作鳩杖以賜老者按少皥五鳩鳩者聚聚民也周禮羅氏獻鳩養老漢無羅氏故作鳩杖以扶老風俗通仲秋之月縣道皆案户比民年始七十者授之以王杖餔之糜粥八十九十禮有加賜王杖長九尺端以鳩為餙鳩者不噎之鳥也欲老人不噎所以愛民也續漢禮儀志白鳩郎鄭𢎞遷臨淮大守郡民徐憲在喪致哀白鳩巢户側𢎞舉為孝亷朝廷稱為白鳩郎鳩化金鈞京兆長安有張氏獨處一室有鳩自外入止於床張氏患之披懐祝曰鳩來為我禍也飛上承塵為我福耶來入我懐鳩飛入懐以手探之則不知鳩之所在而得一金帶鈎是後子孫昌盛有為必偶貲財萬倍蜀客賈至長安中聞之乃厚賂婢婢竊鈎以與蜀客張氏既失鈎漸漸衰耗而蜀客亦數罹窮厄不為己利或告之曰天命也不可以力求於是賫鈎以反張氏張氏復昌故閏西稱張氏𫝊鈎云搜神記拂冠晉永康元年正月大會有鳩入御坐武帳中拂司空張華之冠蕭方寺三十國春秋雙鳩巢舟庾子與父域為巴守卒於郡子輿奉喪還鄉初發蜀有雙鳩巢舟中及至又栖廬側毎聞哭泣之聲必飛翔簷宇悲鳴激切南史鳩集鳯池唐王及善才行庸猥風神鈍濁為内史時人號為鳩集鳯池僉載集簷王庭湊武陵支屬也生於別墅嘗有鳩數十隻朝集庭樹暮集簷下有異人駱徳播異之後為三軍扶立為留後代田𢎞正歸别墅而庭樹婆娑暗此舍矣北夢𤨏言庭湊始生有鳩數十朝集庭樹暮宿簷户長駢脅厯居戎職值亂殺田𢎞正推為留後子孫相繼藩鎮一百年唐年小録孝鳥詩曰翩翩者鵻毛𫝊云鵻鳺鴀也一宿之鳥鄭箋云一宿者一意於所宿之木又云鳥之謹慤者人皆愛之此是謹慤孝順之鳥也陸璣云今小鳩也一名䳕鳩幽州人或謂之鷱梁宋之間謂之佳爾雅翼拙鳩物之拙者不能為巢纔架數枝往往破卵無巢不能居天將雨則逐其雌霽則呼而反之今人辨其聲以為無屋住爾猚翼拙者莫如鳩巧者莫如鶻禽經葚醉鳩食梁椹則醉貓食薄荷則醉虎食狗則醉子七詩鳲鳩在桑其子七兮𫝊鳲鳩秸鞠也鳲鳩之養其子朝從上下莫從下上平均如一老僧食鄧州有老僧日食二鳲鳩僧俗共非之老僧毫無所避當饌之際有士求飡分其二足而食食訖老僧盥潄雙鳩從口而出一則能行一則匍匐在地貧士驚駭亦吐其飯二脚亦生其僧後乃不食此味衆皆敬異號曰南陽鳲鳩和尚雲溪友議㘁咷楚鳩一名㘁咷廣志鶉機星散機星散為鶉徳義少殘之家則鶉生運斗樞䑕化三月田䑕化為鴽鴽鵪也變而之善故盡其辭也鴽為䑕變而之不善故不盡其辭也大戴禮鴽青州謂之鴾母周雒謂之鴽幽州謂之䳺吕覽注性淳陸璣云鶉性淳不越横草能不亂其匹尸子曰尭鶉居莊子云聖人鶉居而鷇食鬭竦翼鳥之闘竦其尾鶉之闘竦其翼甘氏星經鶉鷃為闘夣見鶉鷃憂閑闘也夣書雀生鶉宋康王時有崔生鶉占之曰小生巨必霸天下康王大悦射天笞地為齊所滅賈誼新書鶉觚鶉觚縣者秦使太子扶蘇及䝉恬築長城見此原水淺因欲築城遂以觚爵奠祭乃有鶉鳥飛升觚上以為靈異因以名縣周地國記安定原土築時奠祭以觚爵忽有一鶉飛於觚上因名鶉觚之城魏文帝天統中立為鶉觚縣窮神秘苑蛙變至道二年夏秋間京師鬻鶉者積於市門皆以大車載而入鶉纔直二文是時雨水絻無蛙聲人有得於水次者半為鶉半為蛙列子云蛙變為鶉注云事見列子事不謬矣談苑短頭細黄魚以九月中因秋風而變成鶉官吏捕取以塩炙食滋味肥羙出交趾合浦郡草木狀欺儒子夫俗士之牽逹人也猶鶉鳥之欺孺子也鶉鳥之性善近人飛不峻也不速也蹲蹲然似若將可獲也卒至乎不可獲是孺子之所以䠅膝跣足而不以為敝也俗士之與逹人言也若將可寤卒至乎不可寤是逹人之所以乾唇噎聲而不舍也中論瓜生種𤓰園東比饒鶉子以𤓰爛故老蛙於園東北即化為鶉子物類相感志千嵗羊肝化為地宰蟾蜍得苽卒時為鶉此皆因氣作以相感而成也淮萬畢術宛鶉宛鶉大於此鶉以供御廣志鶯楚雀離黄倉庚也鳴即蠶生説文黄鳥鸝鶹也閏西謂之鸝黄俗呼黄離留或謂之黄栗留幽州人謂之黄鶯一名啇庚一名倉庚一名鵹黄一名楚雀齊人謂之摶黍常以椹熟時來桑間里語曰黄栗留我離黄甚熟一應節趍時之鳥或謂之黄􅂁詩義疏止妬梁武平齊獲侍兒千餘軰頗娛於目為郄后所隔抝憤恚將成疹左右識其情者進言曰臣嘗讀山海經云以鶬鶊為膳可以止妬梁武從之郄茹之後妬殆减半帝神其事左右復言曰願陛下廣為羞以徧賜群臣使不才者無妬於才挾私者不妬其奉公濁者不嫉其清貪者不忌其亷亦助化之一端也帝然其言將詔虞人廣捕之㑹崇佛戒殺遂止英華金衣公子明皇毎於禁苑中見黄鶯常呼之為金衣公子開元遺事哺雛頃年有人取得黄鸎雛養於竹籠中其雌雄接翼既夜哀鳴於籠外絶不飲啄乃取鶵置于籠外則更來哺子人或在前畧無所畏忽一日不放出籠其雌雄繚遶飛鳴無從而入一投水中一觸籠而死剖腹視之其腸寸斷玉堂閑話􅁟卵􅍮州毎至冬月於田畆中得土堅圓如􅆑者輙取以賣破之則鸎在其中無腹毛羽葢以土自裏伏而土堅勁候春始生羽破土而出爾雅翼鸚鵡能言鸚鵡能言鳥也説文鸚鵡能言而不可使長是何則得其所言而不得其所以言故循迹者非能生迹者也淮説山慧烏黄山有烏焉其狀如鶉青羽赤喙人舌能言名曰鸚鵡鸚鵡舌似小兒舌脚折前後各兩扶南徼外出五色者其亦有純赤白者大如鷹也元經鸚鵡名烏棲林啄蕋四指中分行則以觜圖賛凢鳥下臉眨上獨此鳥兩臉如動如人目雜俎行則以口啄地然後足從之南州異物志鸚鵡瘴南中云養鸚鵡切忌以手捫摸其背犯者即不飲不啄而卒異物志廣南新春十州多鸚鵡食木葉榕實凢養之俗忌以手頻觸其背犯者即多病顫而卒土人謂為鸚鵡瘴北户録鸚鵡摩其背而瘖鸚鵒剪其舌而語禽經食麻子興平元年益州蠻夷獻鸚鵡三昭曰往者益州獻鸚鵡三枚夜食三升麻子今榖價騰貴此鳥無益有損可付安西將軍楊定國令歸本土劉斐漢帝𫝊藏甕張華有白鸚鵡華每出行還輙説僮僕善惡後寂無言華問其故鳥云見藏甕中何由得知公後在外令喚鸚鵡鸚鵡曰昨夜夣惡不宜出户公猶强之至庭為鸇所摶教其啄鸇脚獲免異苑赤謝莊為太子庻子時南平王鑠上赤鸚鵡普詔群臣為賦太子左衛率府袁淑文冠當時作賦畢賫以示莊莊賦亦竟淑見而歎曰江東無我卿當獨秀我若無卿亦一時之傑也遂隱其賦宋書能歌天監元年交州獻能歌鸚鵡詔不納梁紀南史異名隋開皇中栁歸舜自巴陵泛舟遇風吹至君山因維舟至一處有鸚鵡數十相呼姓字有名武遊郎阿仙郎阿蘇兒者有名自在先生武仙郎踏蓮露者有名鳯皇䑓戴蟬兒多花子者或有善歌者因問歸舜姓字來路乃曰為足下轉逹桂家三十娘子因遥呼曰阿春此間有客有青衣乗雲而下為之設食忽有道士自空飛下投一尺綺與歸舜曰以此掩眼即去矣歸舜從之忽如身飛却墜以逹舟所函怪録訢寒貞觀五年林邑獻五色鸚鵡數訴寒適新羅獻美女二人魏徴以為不宜受太宗喜曰林邑鸚鵡猶能自言苦寒思歸况女之逺別親戚乎并鸚鵡各付使者歸之首有十紅毛貞觀十八年陀洹國獻白鸚鵡毛羽皓素頭上有紅毛數十垂與趐齊舊唐夢折翅則天嘗夢一鸚鵡羽色甚佳兩趐俱折以問宰臣群臣黙然内史狄仁傑曰鵡者陛下姓也兩趐折者陛下二子廬陵相王也陛下起此二子兩翅舉也承嗣三思連項皆赤僉載雪衣女開元中嶺南獻白鸚鵡養之宫中嵗乆馴獶聰慧洞曉言詞上及貴妃皆呼雪衣女授以嗣臣詩篇數遍便可諷誦上毎與貴妃及諸王博戯上稍不勝左右呼雪衣娘必飛入局中鼓舞以亂其行列或啄嬪御及諸王手使不能争道忽一日飛上貴妃鏡䑓語曰雪衣娘昨夜夣為鷙鳥所摶將盡於此乎上使貴妃授以多心經以禳之後從校獵戯於殿上忽有鷹摶之而斃上與貴妃嘆息乆之遂命冢於苑中為立冡呼為鸚鵡冢明皇雜録諫𤣥宗時以林邑國進白鸚鵡慧利之性特異嘗者因暇日以金籠餙之示於三相上再三羙之時蘇頲初入相每以忠讜勵已因前進云鸚鵡能言不離飛鳥臣願陛下深以為志松忩録時樂𤣥宗時有五色鸚鵡能言上令左右試牽帝衣鳥輙瞋目叱咤岐府文學能延京獻鸚鵡篇以賛其事張説有表賀稱為時樂鳥酉陽緑衣使者長安有豪民楊崇義者妻劉氏與隣兒李弇私通遂謀害之埋枯井中其妻乃四散尋覔經府陳詞宫吏日夜追捕賊不得後縣官等再詣崇義家檢校其架上鸚鵡忽然聲屈曰殺家主者劉氏李弇也遂俱服罪欵府尹具事奏聞明皇取鸚鵡付后宫封為緑衣使者張説為𫝊開天遺事舍利貞元中有獻鸚鵡鳥者河東裴氏志樂金仙之道以此鳥名載􅆊經常狎而敬之始告以六齋之禁此及辰後非時之食終夕不視或教以持佛名號者則仰首奮翼若善承聽或俾之念佛則黙然而不荅或謂之不念即唱言阿隬陀厯試不爽貞元十九年七月悴爾不懌已日而甚馴養者知將盡乃鳴磬者曰將西歸乎為爾擊磬爾其存念每一擊磬一稱隬陀佛泊十擊磬而十念成歛翼委足揜然而絶命火以闍之法焚之得舍利十餘粒韋臯鸚鵡舍利塔記黄鸚鵡建隆二年隴州貢黄鸚鵡上以為瑞遂作金鸚鵡等旗中書舍人王著獻頌因以規諌詔褒之宋志本傳悲思故主宋徽宗時隴西嵗貢鸚鵡徽宗置之安妃閣教以詩文及宣和末遣中便送還本土後郭浩以秦鳯提㸃刑獄按邊至隴口見一白一紅鸚鵡鳴於樹問問知來自杭州因問上皇安否浩曰上皇崩矣鸚鵡皆悲鳴不已浩賦詩曰隴口山深草樹荒行人到此斷肝膓耳邊不忍聽鸚鵡猶在枝頭説上皇建炎實録呼琵琶蔡確貶新州侍兒名琵琶隨焉有鸚鵡甚慧公每扣響板鸚鵡傳呼其名琵琶卒後誤觸響板鸚鵡猶呼不已悒悒不樂有詩云鸚鵡言猶在琵琶事已非傷心瘴江水同渡不同歸又作送將歸賦未幾而卒青林詩話問主闗中啇有得鸚鵡於隴山能人言啇愛之啇偶以事下獄出而嘆恨不已鸚鵡曰即在獄數日已不堪鸚鵡遭籠閉累年柰何啇感而放之去後毎有同軰過隴者鸚鵡必於林間問其安否託以寄聲焉邵氏聞見録鸜鵒寒臯鴝鵒一名寒臯斷舌可使言語淮萬畢術一作乾睪𤣥鳥鸜鵒亦名𤣥鳥古今注來巢有鴝鵒來巢書所無也師已曰異哉吾聞文成之世童謡有之鸜之鵒之公出辱之鸚鵒之羽内在外弱鸜鵒跦跦公在乾候鸜鵒之巢逺哉遥遥闕鶴鵒往歌來哭童謡有是今鸜鵒來巢其將及乎闕有鸛鵒來巢於榆運斗樞鸛鵒者飛行屬之陽夷狄之鳥穴居於隂考異郵鸜鵒者非中國之禽也禮稽命報事晉司空桓豁在荆有參軍剪五月五日鴝鵒舌教令學語遂無所不名顧參軍善彈琵琶鸜鵒毎立聽多時又善能效人語聲司空大㑹吏佐令悉效四坐人語不絶似有生􅙄鼻語難學學之不似因内頭於甕中使效焉遂與􅙄者語聲不異主典人於鴝鵒前盗物參軍如厠鴝鵒同無人宻白主典人盗某物參軍䘖之而末發後盗牛肉鴝鵒復白參軍曰汝云盗肉應有驗鴝鵒曰以新荷裏著屏風後檢之果獲痛加治而盗者患之以熱湯灌殺參軍悲傷累日遂請殺此人以報其怨司空教曰原殺鴝鵒之痛誠合論殺不可以禽鳥故極之於法令止五嵗刑幽明録􅋦鈎唐秘書少監崔行功未得五品前忽有鴝鵒􅋦一物入其室置按上乃去乃魚袋鈎玦不數日加大夫也隋唐嘉話八哥南唐李主諱煜改鸜鵒為八哥負晅雜録亦曰八八兒王虚中勸孝文鷙擊宋龍圖孫正臣邵武人居髙郵嘗有疾得異方湏鸜鵒公素不殺故藥乆不就忽有鷙禽擊死之墮庭中公得而餌之疾遂愈髙郵志念佛生蓮宋天䑓黄巖寺僧畜一鴝鵒常隨僧念佛不待僧教亦自念得一日立死籠中僧葬之生紫色蓮花穿土而出大智律師為之頌曰籠中立死渾閑事化紫蓮花也大奇耕餘博覽媚藥鸜鵒交時以足勾足鳴皷翼如闘狀往往墮地俗取其勾足為媚藥酉陽取火鸜鵒舊言可使取火效人言勝鸚鵡取其目睛和人乳研滴眼中能見煙霄外物也上花鵒五月鸜鵒之毛羽新成俗好登巢取養之以教其語謂之花鵒荆楚嵗時記秦吉了結遼林邑國有結遼鳥謂之吉了鳥能人語唐㑹要以熟鷄子和飯飼之或云容州有純赤純白色者憶雌天后時左衛兵曹劉景陽使嶺南得秦吉了二隻能觧人語至都進之留其雌者雄煩怨不食則天問曰何乃無􅂓也鳥曰其配為使者所得頗思之乃呼景陽曰卿何故藏一鳥不進景陽叩頭謝罪乃進之則天不罪也僉載惠于鸚鵡嶺南有鳥似鸜鵒而稍大乍視之不相分辨籠養乆則能言無不通南人謂之吉了亦云料開元初廣州獻之言音雄重如丈夫委曲識人情惠於鸚鵡逺矣舊唐樂志珍禽普寧有亷州民獲赤白吉了各一頭献於刺史者其赤者尋卒白者乆而能言凡笑語悉皆效人斯珍禽也北户録不入夷瀘南有畜秦吉了者亦能人言有夷酋欲以錢三十萬買之其人告以貧將賣爾秦吉了曰我漢禽不願入夷中遂不食而死聞見録白鷴獻閩越獻髙帝白鷴黒鷴各一隻帝大悦厚賜之西京雜記羽族幽竒白鷴羽族之幽奇也素質黒章𤓰觜純丹体被冠距頗䫫夫鷄翟神貎清閑不雜於衆禽蕭穎士白鷴賦序家鷄所伏黄山胡公有雙白鷴葢是家雞所伏自小馴狎了無驚猜以其名呼之皆就掌取食然此鳥耿介難畜胡公贈我求詩因援筆三什以贈之李集鷴馴徽宗端邸時藝文之暇頗好馴養禽獸以供玩及即位貂璫奉承羅致稍廣江公望在諫省聞之函諌上大悦即日詔内禦盡縱勿復留殿中有一鷴蓄乆而馴不􅗃去上以親逐塵尾逐之迄不離左右乃刻公望姓名於塵柄曰朕以旌直也及江去國享上之論興浸滛及於良嶽矣都城廣莫秋風夜静禽獸之聲四徹宛如郊野識者以為不祥益思江之忠焉同主死難厓山之敗陸秀夫抱祥興帝與俱赴水時一舟一白鷴奮擊哀鳴與籠墜水中死鷹瑶光星散瑶光星散為鷹元命包鷙殺之鳥鷹者鷙殺之鳥易通卦驗異名有雉鷹有莬鷹一嵗為黄鷹二嵗撫鷹三嵗青鷹胡鷹獲章廣志不擊伏鷹不擊伏鶻不擊妊禽經變鳩驚蟄之日鷹變為鳩小暑之日鷹乃學習處暑之日鷹乃祭鳥周書鷹則為鳩鷹也者其殺之時也鳩也者非其殺之時也善變而之仁故具言之也鳩為鷹而之不仁故不盡其辭大戴禮春分之日鷹變為鳩秋分之日鳩變為鷹時之化也捜神記積怒虎豹無事行歩若將不勝其軀鷹在衆鳥之間若睡夣然故積怒而後全剛生焉裴氏新書虎聞聲而深伏鷹見形而髙飛陶𢎞景被八卦八卦生鷹集之所被六甲山靈龜之所負抱朴子爽鳩郯子云少嘷氏爽鳩氏司㓂者也左逐鳥雀季文子使太史克對宣公曰先大夫臧文仲教行父事君之禮行父奉以周旋弗敢失墜曰見無禮於其君者誅之如鷹鸇之逐鳥雀也文十八子産始知然明問為政焉對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀也襄二十五鷹擊殿上唐睢謂秦王曰要離刺慶忌蒼鷹擊於殿上國䇿蒼鷹郅都為濟南太守時人號為蒼鷹漢書佳名茂陵少年李亨好馳駿狗逐狡獸或以鷹鷂逐雉兎為之佳名鷹則有青趐黄眸青㝠金距之屬鷂則有從風鷂孤飛鷂西京雜記求鷹廣漢馮顥為謁者逐單于至雲中大將軍梁兾遣人求鷹止晉陽舍人不避顥收之使人擊鷹而亡顥追捕甚急兾辭乃止益部耆舊𫝊出籠馬融與伯世書曰憒憒愁思猶不解懐思在竹間放狗逐麋晚秋渉冬太蒼出籠黄棘下兔芼以乾菜自送餘日兹樂而已饑則為用吕布使陳登詣太祖登因陳布勇而無謀宜早圖之太祖悦布始因登求徐州牧不獲及登還布㧞㦸斫几責之登曰登見曹公言待將軍譬如虎當飽其肉否則噬人曰不然如養鷹饑則為用飽則颺去布乃解魏志飛集屋梁虞潭字思奥㑹沈充等逼京師潭起義軍至上虞有野鷹飛集屋梁衆懼潭曰起大義而剛鷙之鳥來破賊必矣後如其言青骹張載摧論曰青骹繁霜縶於籠中何以效其撮東郭於鞲下也白猿𤣥豹藏於檑檻何以知其接垂條於千仞也憎眼蘇峻時孔群在横塘為匡術所逼王丞相保存術因衆坐戯語令術勸群酒以釋横塘之憾群荅曰徳非孔子尼同匡人雖陽和布氣鷹化為鳩至於識者猶憎其眼世説孔愉與孔群共行在御道逄匡術賔從甚盛因往與愉共語群初不視直云鷹化為鳩衆鳥猶惡其眼術大怒便欲刃之愉下車抱術曰族弟發狂卿為我宥之始得全首領上飽則髙颺慕容垂請至鄴拜墓苻堅許之權翼諌曰垂猶鷹也飢則附人飽便髙颺若遇風塵之㑹必有凌霄之志唯宜急其覊絆不可任其所欲堅不從去果不還載記百頭元垣為冀州刺史不恤人事專為聚歛好畋漁無日不出秋冬獵禽獸春夏捕水族鷹犬常數百頭置綱十餘車自云寧三日不食不能一日不出三國典畧凌宵郡君北齊後主髙緯鷹犬皆有儀同郡君子號鷹曰凌霄郡君食縣邑鷹之入養者稍割大肉以飼之至數日乃死本紀北史髙思好友與諸貴書云仍縱於立奪馬於東門光弁掣鷹於西市光弁姓斫骨金脚齊王髙洋天保三年獲白兎鷹一聨不知所得之處合身毛羽如雪目色紫𤓰之木白向末為淺鳥羽如蠟脛並黄當時號為金脚髙帝武平初領軍將軍趙野夫獻白兎鷹一聨佳鷹太宗謂侍臣曰李大亮可謂忠直矣朕遣使至其所見有佳鷹諷令獻朕大亮因宻來責朕云陛下乆絶畋獵而使者求鷹若是陛下之意深乖背㫖如其自擅便是任使非人朕覽表嘉歎不能自己有臣若是朕復何憂於是賜之金壺以彰忠讜唐書取鷹雛永徽中萊州人劉幸性好鷹於界山懸崖自縋而下以取鷹雛欲至巢而䋲絶落於樹枝間下皆壁立進退無所據大鷹見人􅋦肉不至巢所乃内樹下聿接取肉餧雛已外即自食之經五六十日雛能飛乃裂裳以係鷹之足一臂上係三聨透身而下鷹飛掣其兩臂比至澗底一無所傷仍繫鷹而歸結叢源乾曜為京兆尹仍留守京師乾曜政存寛簡不嚴而理嘗有仗内白鷹因縱逸遂失所在上令京兆切捕之俄於野外獲之其鷹絓於叢棘而死官吏懼得罪相顧失色乾曜徐曰事有邂逅死亦常理主上仁明當必不以此寘罪必其獲戾吾自當之不湏懼也遂入自請失鷹之罪上不問舊唐得霜鷹蘇味道才學識度物望攸歸王方慶躰質鄙陋言辭魯鈍智不逾俗才不出凡俱為鳯閣侍郎或問郎中張元一曰蘇王孰賢荅曰蘇九月得霜鷹王如被凍蝇或問其故荅曰得霜鷹俊捷被凍蝇頑鈍時人服其能躰物也僉載决雲兒申王有髙麗赤獵鷹置駕前目為决雲兒酉陽津陽門詩赤鷹黄鶻雲中來妖狐狡兎無所依自注申王有髙麗赤鷹岐王有北山黄鶻逸氣奇姿特異他等上愛之每校獵必置於駕前目為决勝兒失白鷹詩鄭繇善五言開元初岐山王範為岐州刺史繇為長史範失白鷹深所愛惜繇為失白鷹詩當時以為絶唱其詩曰白錦文章亂丹霄羽翮齊雲間呼暫下雪裏放還迷梁苑驚池鶩陳倉拂野鷄不知遼郭外何處別依棲唐新語雙白鷹讃開元乙夘嵗東夷君長自肅慎扶餘而貢白鷹一雙皆皓如練色班若綵章積雪全映飛花碎㸃所謂金氣之英瑶光之精指麾應捷顧盻餘雄當落鵬之賞蔑仇鷂之敵實稀代之尤也英華蘇題贊五色鷹正元十一年二月同州進五色鷹八月潞州進白鶻唐㑹要鷹兎相刑王蜀先天元年太祖寢疾經旬文州進白鷹茂州貢白兎群臣議曰聖人本命是兎鷹兎至甚相刑貢禽非以為瑞退鷹留兎帝疾必痊敕命不從是嵗晏駕何光逺鑑戒録義鷹旴南陸氏子得山夫牡猴雛畜之甚馴縱其游息猴益老意向類姦見婦女必跳抃如將近之陸謀殺之未施手而猴先登屋避去無如之何㑹少年臂蒼鷹自䖍來者陸氏視其摶攝無虚向因告以猴害少年即俱還據髙隅發鷹鷹摩空下瞰猴伺鷹垂近舉瓦自扞鷹不能得即穿雲以逝主客不知所為明日忽聞空中鈴聲仰瞻之乃其鷹也方復摶翔下擊猴仍用前計鷹揚翮以過後一鷹繼至猴不擬也遂中其擒少年招得所臂鷹而遂擒者委猴而去葢少年之鷹往招之而來助者也彼豈有呴呴之語言沾沾之勢貌以相諷動者耶噫亦奇矣治平末吕􅀯公記虎鷹皷山有老僧云曽登靈源洞見一禽自海上至身大如牛翼廣二丈餘下於疃間低飛掠食俄攫一羖羊乃望海而去識者云是虎鷹能捕捉虎豹墨客揮犀受緤鷦鷯賦蒼鷹鷙而受緤戀鍾岱之林野善曰鍾岱二山鷹之所産漢書曰趙地鍾岱迫近胡㓂十洲記曰北海外有鍾山選惟兹禽之化育寔鍾山之所生資金方之猛氣禀火徳之炎精生於窟者則好伏巢於木者則常立雙骹長則起遲六翮短而飛急寅生酉就姿號為黄二周作鳴千日成蒼隋魏彦深賦取鷹法取鷹法七月二十日為上時内地者多寒外者殊少八月上旬為次時八月下旬為下時塞外鷹畢至矣相同鵰鷹相同鵰唯欲尾長趐短為異耳酉陽隼題肩隼鷂也齊人謂之擊征或謂之題肩或曰雀鷹春化為布谷此屬數種皆為隼詩義疏顔師古曰即今所謂鶻一曰鶉子龍脫鶙鵳鷸子籠脱鷂也資雀註鷣鷂也江東呼之為鷣善捉雀因名云爾雅翔隼秋興賦隰有翔隼善曰鷙擊之鳥通乎曰隼一曰鷂春化為布榖文子曰鷹隼未擊羅網不得張選貪殘之鳥易曰王用射隼於髙墉之上孔頴逹云隼者貪殘之鳥鸇鷂之屬玉篇云祝鳩也顔師古云隼鷙鳥即今日之鶚也劉向以為隼近異祥貪暴類也氣貪隂陽氣貪故題肩擊宋均曰題肩有𤓰芒為陽中隂故擊殺也考異郵矢貫仲尼在陳有隼積於陳候之庭而死楛矢貫之石弩其長尺有咫陳惠公使以隼如仲尼之舘問之仲尼曰隼之來也逺矣此肅慎氏之矢也國語殺鳩魏公子無忌方食有鳩飛入案下公子使人顧望見一鷂在屋上飛去公子乃縱鳩令出鷂逐而殺之公子暮為不食曰鳩避患歸無忌竟為鷂所得吾負之為吾捕得此鷂者無忌無所愛於是左右宣公子慈聲於國左右捕得鷂三百餘頭以奉公子欲盡殺恐無辜乃自按劔至其籠土曰誰獲罪無忌者耶一鷂獨低頭不敢仰視乃取殺之盡放其餘名聲布流天下歸焉列上𫝊傳書云魏公子為鳩報仇此虚言也夫鸇物也情心不同音語不同公子何能使鸇低頭自責鳥為鸇者以千萬數向擊鳩蜚去安可復得或時公子實捕鸇鸇得人持其頭折其頸低垂不能仰視縁公子惠義因褒稱言鸇服過也論衡順天氣鷹隼未擊矰弋不得施於溪隧漢書孫寳為京兆尹請候文為掾立秋日文謂寳曰今鷹隼始擊當順天氣成嚴霜之誅上白将軍唐太宗養一白鶻號白將軍取鳥常驅至於殿前然後擊殺故名落鷹殿上恒令送書從不至東都與魏王仍取報日徃返數迴亦陸機黄耳之徒歟僉載鷂死懐中太宗得鷂絶俊異私自臂之望見鄭公魏徴乃藏於懐公知之遂而白事因及古帝王逸豫㣲以諷諫語久帝惜鷂且死而素嚴謹徴欲盡其言徴語不時盡鷂死懐中舊唐放鷂楊徳幹髙宗朝為萬年令有䆠官恃貴寵放鷂不避人禾稼徳幹擒而杖之悉㧞其鷂頭䆠者涕泣􅃝背以示於帝帝曰爾情知此漢㣷何須犯他百姓竟不之問隋唐嘉話仁鴿滄州東光縣寳觀寺常有蒼鶻集重閣毎有鷂數鶻冬中每夕即取一鴿以暖足至曉放之而不殺自餘鷹鶻不敢侵之僉載長安薦福寺有鶻冬取小禽煖𤓰掌旦則縱之視其所適之方則是日不於是方擊摶朴集義鶻隂崖有蒼鷹養子巢栢顛白蛇登其巢黄口無半存其父從西歸翻身入長煙斯湏領徤鶻噭哮來九天修麟脱逺枝胞膓皆已穿杜囘鶻囘鶻北夷種其先匈奴元魏時號髙車部至隋曰韋紇亦曰囘紇唐元和四年遣使請改迴紇為鶻義取􅂞紇輕捷如鶻也傳韻㑹以為徳宗時誤海鷂薛嵩鎮魏時鄴郡中有好育鷹隼者一日有人持鷹來告於鄴人遂市之其鷹甚神俊鄴人家所育鷹隼極多皆莫能及常臂以玩不去手後有東夷人見請以繒百餘叚為直日吾方念此不知其所用其人曰此海鷂也若辟蛟螭患君直於鄴城南放之可以見其用矣先是鄴城南陂蛟常為人患郡民苦之有年矣鄴人遂持往其海鷂忽投陂水中頃之乃出得一小蛇既出食之且盡自是鄴再無其患有告於嵩乃命鄴人記其事鄴人遂以海鷂獻焉宣室志晉州鷂劉齊賢為人方正唐髙宗甚重之為晉州司馬將軍史興宗嘗從上獵苑中因言晉州産佳鷂劉齊賢今為司馬請使捕之上曰劉齊賢豈捕鷂者耶卿無以此待之通鑑東翅李藹應舉時勤敏絶人號束趐鷂子盧氏雜説􅇆以紙囊唐薛昭緯衘命梁園朱温宴接欵曲一日話及鷹鷂薛盛言鷙鳥之俊温欣然謂其亦曽於弄歸舘後𫝊語送鷂子一頭薛致書謝仍對使戒僮僕曰令公所賜直湏愛惜裏以紙囊安鞲袋中來人失笑聞於使衙北夣𤨏言復翎鷂子兩趐各有復翎左右掩風右名掠草𢃄兩翎出獵必當獲雜俎憫胎烏反哺仁也隼憫胎義也化書夣鷹鷂鷹鷂為攻剽殘忍也夣見鷹鷂憂賊人也夣書鶻生三子鶻生三子一為鴟雜俎鷹鶚之子或為鵰鷢夏崔生鶉楚鳩生鶚造化權與晨風晨風今之鷂也詩義問晨風鸇爾雅骨曰鶻瞭曰鷂􅱞曰鸇奪曰鵽禽經鷂為鸇鸇為布榖布榖復為鷂此物變也莊子鵰􅀈幟黄帝與炎帝戰於阪泉之野師熊羆狼豹貙虎為前驅鵰鶡鷹鳶為旗幟此亦力使禽獸者也列子青鵰春山爰有青鵰執犬豕食鹿穆傳委食周宣王之牧正有役人梁鴦者能養野禽獸委食於園庭之内雖虎狼鵰鶚之類無不柔馴者雄雌在前前尾成群異類雜居不相摶噬也列子射鵰李廣為上郡守匈奴入上郡武帝使中貴人從廣匈奴射傷中貴人廣曰是必射鵰者也廣射殺二人生得一人果射鵰者也漢書形如車輪斛律光嘗從世宗於洹橋校獵見一大鳥雲表飛颺光引引射之正中其頸此鳥形如車輪旋轉而下至地乃大雕也世宗取而觀之深壯異焉丞相屬邢子髙見而嘆曰此射鵰手也當時𫝊號落鵰都督北齊書化珬鵰入海化為珬戌可作馬勒謂之珂通典沸波鳥有沸波者河伯為之不潮畏其其誠也淮南鶚善摶鷙鳥之善摶者曰鶚竊𤣥曰鵰禽經鶚大人見而悚愕也注金鶚鶚金喙鳥也見則天下兵能擊殺麞鹿蒼頡解詁黄金鶚李華嘗目異鳥擊豊狐於中野雙晴耀宿六翮垂雲迅猶電馳厲若霜殺吻决肝腦𤓰刳腎膓昻藏自雄倐􅗄而逝問名於耕者對曰此黄金鶚也一鶚鄒陽諌吳王曰鷙鳥累百不如一鶚漢書孔融薦禰衡樊凖薦龎參孫權令吕蒙討廬陵賊語皆同鷲多子景山多鷲山經鷲鳥黒色多子師曠云南山有鳥名曰差鷲黄頭赤目五色皆備説文就羽或説王根曰匃奴有斗入漢地直張掖郡生奇材木箭竿就羽如得之於邊甚饒匈奴𫝊就大鵰也其羽可為箭竿注噉羊波斯國有土山山非過髙其勢連接其逺中有鷲鳥噉羊土人極以為患南史知吉凶西南逺界有靈鷲鳥能知吉㓙覘人將死食屍肉盡乃去家人取骨虎為灰投之漲海林邑國記靈鷲山耆崛山在王舍城北四里山有兩崖鷲鳥常群居其顛土人號為靈鷲山西域諸國記互見山鴟玉衡散玉衡星散為鴟運斗樞鳶翔鳶鳥醜其飛也翔爾猚鳶鴟也䟽隋䑕虞氏者梁富人也登髙樓臨大路設樂陳酒擊博於樓上遊俠相隨而行樓下博者射中而笑鳶堕腐䑕而中遊俠遊俠相與語曰虞氏富樂乆矣常有輕人之志乃辱我以腐䑕請滅其家乃攻於虞氏大滅之此謂類而非也列淮赫鳯惠子相梁莊子徃見之或謂惠子曰莊子來欲代子相於是惠子恐捜於國中三日三夜莊子往見之曰南方有鳥其名鵷鶵子知之乎夫鵷鶵發於南海而飛於北海非梧桐不止非練實不食非醴泉不飲於是鴟得腐䑕鵷鶵過之仰而視之曰嚇今子欲以梁國而嚇射鴟都将秦王翰弟幹善弓馬以騎從明元於白登之東北有雙鴟飛鳴於上帝命左右射之莫能中鴟旋飛稍髙幹以二箭下雙鴟帝賜之御馬弓矢以旌其能軍中於是號幹為射鴟都将後魏書北史鴟腦肅宗張皇后專權毎進酒常寘鴟腦酒鴟腦酒令人乆醉徤忘雜爼隋駕老鴟徳宗初登勤政樓外無知者見一緑衣人乘驢至樓下仰視乆之俛而東去上遣京尹物色之及至對曰某天寳教坊樂工也上皇時数登此樓毎來鴟必集樓上號隨駕老鴟某自罷居城外更不復見今見羣鴟盛集又覺景象宛如昔時心知聖人在上悲喜且欲泣下以此奏聞勅收係教坊因話録啄䑕太山之鴟啄腐䑕於窮澤非有害於人也今有司盗主財而食之焉得若太山之鴟乎塩鉄論不飲泉世俗相𫝊鴟不飲泉及井水唯遇雨濡翮方得水飲雜俎紙化梁武太清三年候景圍䑓城逺不通問簡文作紙鳶飛空告急於外候景謀臣王偉謂景曰此紙鳶所至即以事逹外令左右善射者射之及墮皆化為鳥飛入雲中不知所往獨異志鶡輝諸輝諸之山其鳥多鶡鶡似雉而大青色有毛勇徤闘死乃止出上黨也山經毅鳥鶡毅鳥也毅不知死禽經鶡之為鳥同群相為疇類被侵雖死不避毛餙武士兼厲以義郭璞賛鶡之為禽猛氣其闘終無勝負期於必死子建賦楊修荅子建牋云對鶡而辭作魏武賦鶡誤韻㑹謂選鶡冠虎賁武騎皆鶡冠鶡者勇雉也其闘對一死乃止故趙武靈王以表武士秦施安焉後輿服志徐廣曰鶡似黒雉荀綽晉百官表注曰冠挿兩鶡鷙鳥之暴疏者也毎所攫撮應𤓰摧衂天子武騎故以冠焉𫝊𤣥賦注曰羽騎騎者戴鶡注神雀京兆尹張敞舍鶡雀飛集丞相府丞相黄覇以為神雀議欲以聞敞劾奏之覇六慙漢書師古以為鳻雀未詳白鶡張方將移恵帝於長安入殿奉迎自領五千騎皆促鉄􅀈槊二節髪􅀈繫兠鍪皆用凉州白鶡毛天子見之大驚晉八王故事鸛異名鸛一名負釡一名背􅍳一名黒凥一名皂裙泥其巢一旁為池含水滿之取魚置池中食其雛若殺其子則一村致旱災詩義疏鸛井江淮謂群鸛旋飛為鸛井鸛亦好旋飛必有風雨人探巢取鸛子六十旱能飛群薄霄激雨雨為之散雜俎譽石鸛水鳥也伏􅆑時數入水卵冷則不毈取譽石周圍繞夘以助暖氣故方術家以鸛暖巢中譽石為真物也愽物志食蛇南方有鸛食蛇每遇巨石知其下有蛇即於石前如道士禹歩其石􅀈然而轉因得而噉里人學其法伺其養雛縁樹以蔑絙縳其巢鸛必作法而解之乃鋪沙樹底俾足跡所印而倣學之北夣𤨏言鳴鸛仰鳴則晴俯鳴則隂禽經不殺昔有鸛郡國皆殺之而三輔俗不敢取取或雷霹靂赴之原天不獨在此其殺取時正與偶耳桓譚新論聚水縻竺家有火厄火盛之時見數十青衣童子來撲之即㓕童子又云多聚鸛鳥之類以禳火災鸛能聚水於巢上也拾遺趂蛇姚元之長大行急魏光乗謂之趂蛇鸛雀僉載訴張次山元祐初知泰州素多才辨嘗有鸛集戒石前若有所訢次山諭鸛使先飛令兵官隨往鸛止一大木上葢隣側有烹其二雛食者即以其人至鸛亦同至次山為斷治鸛始飛去次山見知於司馬光者泰州志三子鸛生三子一為鸛鳩生三子一為鶚禽經影接鷺目成而受胎鸛影接而懐􅆑鴛鴦交頸野鸛𫝊枝自然論鷺春鋤鷺水鳥也好㓗而白謂之白鳥齊魯之間謂之春鋤遼東樂浪吳楊謂之白鷺詩義疏㓗白振鷺於飛於彼西雍薛君章句白鷺㓗白之鳥也西雍文王之雍也言文王之時辟雍學士皆㓗白之人也韓詩幕府初開博選清英雖振鷺之集西雍濟濟之在周庭無以或加蔡邕薦邊讓雙鷺出皷昔吳夫差啟地門以厭越越人為雷門以禳之擊大鼓於雷門之下而地門聞焉其後移鼓建康之端門有雙鷺呪皷而飛乎雲末或云鷺者皷之精朱鷺楚威王時有朱鷺合沓飛翔而來舞舊皷吹朱鷺曲是也詩義疏朱鳶不攫肉朱鷺不吞鯉禽經鷁舟乍動朱鷺徐鳴梁簡文與劉孝儀令𤣥龜夜夢終見取于宋王朱鷺晨飛尚張羅于漢后元帝放生池碑素衣女子錢塘士人姓杜船行時大雪日暮有女子素衣來杜曰何不入船遂相調戲杜闔船載之後成白鷺去杜惡之便病死也續捜神記鷺羽扇張融年弱冠同郡道士陸修静以白鷺羽扇遺之曰此異物奉異人南史白鷺縗齊東昏汀南徐二州出雄雉頭鶴氅白鷺縗南史鷺頭翅背上皆有長翰毛今江東人取以為睫䙰名之曰白鷺縗爾雅注碧繼翁篁棲叟剡人賈𫝊于鏡湖泊舟夜月縱步于清水芳荷中見二叟立語一曰碧繼翁一曰篁棲叟相與吟詩賈遽揖之化為白鷺飛去樹萱録雪客李昉五客鷺為雪客神驅薛弼紹興中帥福州儀門外夾道榕木鷺巢其上弼欲盡伐之是夜參議曾悟夢甲胄者懇云府主惡鷺穢可去之明日大雨鷺群悉空一統志先至鳥黎州通望縣毎嵗孟夏有鷺鷥一隻墜化古老傳云衆鳥避瘴臨去留一鷺祭山神又每郡主將有除替一日前須有白鷺鷥一對從大渡河飛徃州城盤旋栖泊三五日却為軍州號為先至鳥便迎新送故更無誤焉黎州圖經視而有胎蜷蛇聽而有孕白鷺視而有胎隂陽自然變化論咮長尾短山禽之咮多短水禽之咮多長山禽之尾多脩水禽之尾多促山禽鵲類水禽鷺類禽經好露鷺人養之於池塘馴若家禽每至白露日即飛騰而去有人養之或告其故不信及期果去有詩憶念幾成編集物類相感志鷙好風􅀈好雨鷞好霜鷺好露禽經絲偃鷺啄則絲偃鷹捕則角弭藏殺機也埤雅鷺頭上有長毛十數枚長尺餘毿毿然衆毛異好欲取魚時則弭之今呉人亦養焉詩陳風值其鷺羽疏昆明願識昆明鷺乗流飲復棲王僧孺朱鷺詩絲禽錦鯉衝風擲絲禽掠浪飛陸龜蒙詩一名帶絲禽海録鸕鷀似鶂鸕鷀似鶂而黒一名鷧倉頡篇鷀鷧即鸕鷀也觜頭曲如鉤食魚爾雅胎生鸕鷀能沒於深水取魚而食之不生卵而孕雛於池澤間既胎而又吐生多者八九少者五六相連而出若絲緒焉水鳥而巢髙樹之上楊孚異物志鸕鷀吐雛於八九鵁鶄銜翼而低昂杜䑓卿禽賦冦宗奭嘗官於澧州公宇後有大木一株其上有三四十巢日夕觀之既能交合兼有卵殻布地其色碧豈得雛吐口中是全未考尋可見當日聽人之誤言也本草衍義龍化貞元十三年四月上以自春以來時雨未降正陽之月可行雩祝遂幸興慶宫龍堂祈禱忽有白鸕鷀沉入水際群類翼從其後左右侍衛者咸驚異之俄然莫知所徃方悟神龍之變化遂相率舞蹈稱慶至乙丒果大雨逺近滂沱於是宰臣等上表陳賀舊唐㑹要作元和十三年烏鬼峽中人謂鸕鷀為烏鬼蜀人臨水居者皆養鸕鷀繩繫其頸使之捕魚得魚則倒捉出之杜家養烏鬼頓頓食黄魚䕫州圖經筆談取魚倭國草木冬青土地膏腴水多陸少以小環柱鸕鷀項令入水捕魚得百餘頭以充食隋書鴛鴦匹鳥鴛鴦水鳥鳬類雌雄未嘗相離人得其一則一者相思死故謂之匹鳥古今注鴛鴦鳥雄雌相類飛止相匹鄭氏謁文賛栖樹宋康王埋韓馮夫妻宿夕文梓生有鴛鴦雌雄各一恒栖樹上晨夕交頸音聲感人列異𫝊門化漢時鄢縣南門兩扇忽一聲稱鴛一聲稱鴦晨夕開之聲聞京師漢帝惡之令毁其門兩扇化為鴛鴦相隨飛去後改鄢為晏城縣僉載鷹獲元魏顯宗延興三年因田鷹獲鴛鴦一其偶悲鳴上下不去帝乃惕然問左右曰此飛鳴者為雌為雄左右對曰臣以為雌帝曰何以知對曰陽性剛隂性柔以剛柔推之必是雌矣帝乃慨然而嘆曰雖人鳥事别至於資識性情竟何異哉於是下詔禁斷鷙鳥不得畜焉魏書釋老志觀池呉𫝊朋云毛澤民受知于曾布曾南遷毛坐黨與得罪流落乆之蔡元度鎮潤州與澤民俱臨川王氏婿澤民傾心事之一日家集觀池中鴛鴦元度賦詩末句云莫學飢鷹飽便飛澤民和之云貪戀恩波未肯飛元度夫人笑云豈非適從曾相公池中飛過來者耶澤民慙不能舉首揮麈録化人宋時潮州有富人江行見二子美貌曰一兄一妹雙生也早失怙恃養於舅氏舅母不容丐以度日年十三矣因攜以歸兄能捕魚風雪不倦得魚獻主之外分為二生啖焉妹専繡刺鴛鴦毫毛俱備極其工巧居三年女長富人欲犯之輒辭年幼不可强題詩其襦間云覓得如花女朝朝依繡牀百花渾不愛只是繡鴛鴦兄曰依人為難不如去之女題詩于壁云終日繡鴛鴦懶把蛾眉掃且歸水雲鄉百年可偕老雙雙鴛鴦飛去江湖紀聞鸂鶒食狐鸂鶒水鳥毛有五色食短狐其在溪中無毒氣鸂􅠃勅鸂􅠃于水渚宿先後若有勅令也迹其溪㳺雄者左雌者右群伍皆有式度陳昭裕建州圖經下灘河南府尹闕縣前臨大溪每僚佐有入臺者即水中先有小灘漲出石礫金砂澄澈可愛牛僧孺為縣尉一旦忽報灘出翌日宰邑者與同僚列筵于亭上觀之因召耆宿詢其事有老吏云此必分司御史非西䑓之命若是西臺灘上當有雙鸂鶒立前後居人以此為則僧孺潛揣縣僚無出于己者因舉杯祝曰既能有灘何惜一雙鸂鶒宴未終俄有鸂鶒飛下不旬日拜西臺監察御史劇談録敕水鸂鶒能敕水故宿水而物不害鴆能巫步禁蛇啄木遇蠧以觜畫字成符而蠧自出鵲有隠巢木鷙鳥不能見燕銜避戊巳日則巢固而不傾鸛有長水石故能於巢中養魚而水不涸燕惡艾雀欲奪之則銜其中續博物志鷗水鴞鷖鷗也生藕葉上名水鴞倉頡解詁信鳥鷗信鳥也信不知用禽經鷗潮至則翔水嚮以為信反為鷙鳥所擊是知信而不知所以自害也注食鷗𤣥股國其人食鷗山經海鷗江鷗一名海鷗在漲海中隨潮上下常以三月風至乃還洲嶼生卵似雞卵色青頗知風雲若羣至岸必風漁人及渡海者皆以此為候南越志好鷗海上之人有好鷗鳥者毎旦之海上從鷗鳥逰鷗鳥之至者百數而不止其父曰吾聞鷗鳥皆從女逰取來吾翫之明日之海上鷗鳥舞而不下列子集殿咸和二年正月饗萬國有五鷗集于太極殿前晉起居注鷗集太極殿殿非鷗所處鷗湖澤鳥也時蘇峻作逆宫室被焚晉中興徴祥說獻賦崔湜既私附太平公主時人咸為之懼門客陳振鷺獻鷗賦以諷之湜雖稱善而心實不恱周書鷸翡翠赤羽雀翠青羽雀也說文鷸翠别名也倉頡解詁雄曰翡雌曰翠漢書音義翠鳥似鷰翡赤而翠青其羽可以為飾異物志鷸有文而貪禽經知風鷸如紺燕風則啼商羊一足雨則舞義訓知雨鷸水鳥天将雨則鳴故周逸書曰知天文者冠鷸冠禮圖謂述氏冠述鷸之别名也一名魚虎一名魚師埤雅爾雅異字書愛子翠鳥先髙作巢及生子愛之恐墮稍下作巢子生毛羽復益愛之又更下巢也異物志徙巢翡翠巢於樹顛生子夷人稍徙下其巢子未破便取之出交趾鬱林郡吳都賦劉注翠盖天子輅金根車翠羽盖皇后首飾步摇八雀九華加翡翠徐廣車服志獻翠成王時蒼梧獻羽翠周書尉佗獻文帝翠鳥千漢書薛綜上䟽曰日南逺致翡翠充備寶玩吳録白鷸計然者蔡邱漢上人晉三公子姓辛氏字文子博學無所不通范蠡知其賢人卑身事之請受道藏於石室乃刑白鷸而盟焉范子鷸冠鄭子臧奔宋好聚鷸冠鄭伯使盗誘殺之左僖相持趙且伐燕蘇代謂燕惠王曰今者臣來過易水蚌方出曝而鷸啄其肉蚌合而箝其喙鷸曰今日不雨明日不雨即見蚌脯蚌亦謂鷸曰今日不出明日不出必有死鷸蚌鷸兩者不肯解漁者得而併擒之今趙且伐燕燕趙乆相支以敝大衆臣恐强秦之為漁父也戰國䇿青衣婢陳朱崖太守袁洪兒小名誇郎嘗野見翡翠鳥命羅得之袁甚愛玩清夜月明徹燭長吟忽失翠鳥所在見一婢子立在其左袁洪甚異之曰汝是誰家青衣婢子曰某王家二十七娘子從嫁本名翡翠偶因化身逰行便為袁郎羅得因為邀封郎與相吟詠封郎名平仲遂為媒取王家女名從從第二十七乆之妻慘然飾行装誇郎問封生封生曰丈人晉侍中王濟也乆為隂交州牧近改并州刺史遂相與别及歸太守求不得已近一年幽怪録碧衣女張磪嘗逰霅上白蘋洲見二碧衣女子携手吟咏云碧水色堪染白蓮香正濃分飛俱有恨此别幾時逢藕隱玲瓏玉花藏縹緲容何當假雙翼聲影暫相從磪逐之化為翡翠飛去樹萱録鵁鶄厭火鵧鵁鶄注云似鳬脚髙毛冠江東人家畜之以厭火災爾雅交目其名鵧方目其名鴋旋目其名䴉禽經銜母鵁鶄巢於髙樹顛生子在窟中未能飛皆銜其母翼飛下地飲食異物志收養縻竺家人收鵁鶄數千頭養于池渠中以厭火拾遺食榖魯恭王好鬬鷄鴨及鵞鴈養孔雀鵁鶄俸榖一年費二千石西京雜記捕𤣥宗嘗遣中官徃西南採捕鵁鶄及諸水禽汴州刺史倪若水上疏諫曰方今九鳸時忙三農作苦田夫擁菜蠶婦持桑而以此時採捕竒禽異鳥供園池之玩逺自江嶺達於京師水備舟舫陸倦担負飯之以魚肉間之以稻梁道路觀者莫不以陛下賤人而貴鳥也陛下當以鳯凰為凡鳥麒麟為凡獸即鵁鶄鸂鶒曷足貴也唐書睛交而孕鵁鶄睛交而孕注云狀類鳬而足髙相視而睛不眩轉孕而生雛禽經鵜鶘鴮鸅爾雅曰鵜鴮鸅舍人曰鵜一名洿澤郭璞曰今之鵜鶘也好羣飛入水食魚故名洿澤俗呼之為淘河陸璣疏云鵜水鳥形如鴞而極大喙長尺餘直而廣口中正赤頷下胡大如數升囊若小澤中有魚便群共杼水滿其胡而棄之令水竭盡魚在陸地乃共食之故曰淘河本草云鵜一名逃河身是水沫惟胸前有兩塊肉如拳云昔為人竊肉入河化為此鳥今猶有肉因名逃河集池黄初二年五月有鵜鶘集靈芝池詔曰此詩人所謂汙澤也曹詩刺共公逺君子而近小人今豈有賢智之士處於下位乎否則斯鳥胡為而至其博舉天下雋徳茂才獨行君子以答曹人之刺魏志魚畏魚不畏網而畏鵜鶘網者公平無私鵜鶘有心故魚畏之明主行賞罰如網荘子飲水鵜鶘飲水數十而不足淮南師古曰一名木澤秃鶖䳭鴒雝渠䳭鴒雝渠飛則鳴行則摇爾雅大如鷃雀長脚長尾尖喙背上青赤色腹下白頸下黒如連錢杜陽人謂之連錢陸璣疏俗呼雪姑其色蒼白似雪鳴則天當大雪極為徴驗矣物類相感志在原鶺鴒在原兄弟急難鶺鴒共母者飛鳴不相離詩人取以喻兄弟相友之道也禽經集木唐明皇時有鶺鴒數十集麟徳殿廷木翔棲浹日魏光乘作頌以為天子友悌之祥精衛堙海發鳩之山有鳥如烏文首白喙赤足名曰精衛其鳴自詨是炎帝之少女名曰女娃媱女娃逰於東海溺而不返故為精衛常銜西山之木石以堙於東海山經怨鳥精衛銜木石以填海怨溺死故也海畔俗說精衛無雄耦海燕而生生雌狀如精衛生雄狀如海燕今東海畔精衛誓水處猶存溺於此川誓不飲其水一名誓鳥一名怨禽又名志鳥俗名為帝烏述異記􅖬􅖬精衛銜木償怨左思魏都賦鷓鴣南翥隨陽越雉鷓鴣也晉安曰懐南江左曰逐影禽經樹葉覆背南方有鳥曰鷓鴣其鳴自呼常向日而飛畏霜露早晚稀出有時夜飛則以樹葉覆其背上古今注飛逐月數鷓鴣飛逐月數如正月一日飛而止但伏巢中不復起矣十二月十二日起最難捕南人設網取之雜俎鳴鷓鴣鳥雖復東西􅂞翔命翮之始必先南翥其鳴自呼杜薄州南越志鷓鴣形似雌鷄其志懐南不北徂也其鳴云但南不北異物志自呼鉤輈格磔李群玉詩方穿詰曲﨑嶇路又聽鉤輈格磔聲一云鷓鴣聲若云行不得哥哥本草對啼衡州南靈鷓鴣解嶺南野葛諸菌毒及避瘟瘴又一名樢多對啼北戸録遇暖則相對而啼謂之山鴣羅浮志神取鷓鴣天地之神取每月取一隻饗至尊自死者不可食本草杜鵑望帝荆人鼈令死其尸隨水上荆人求之不得鼈令至汶山下邑復生起見望帝望帝者杜宇也從天下女子朱利自江源出為宇妻遂王於蜀號曰望帝望帝立以為相時巫山峽而蜀水不流帝使鼈令鑿巫峽通水蜀得陸處望帝自以徳不若遂以國禪號曰開明蜀論望帝死其魂化為鳥名曰杜鵑亦曰子規說文成都記蜀人聞杜鵑鳴曰是我望帝也寰宇記望帝使鼈靈治水去後與其妻通慙愧且以徳薄不及鼈靈乃委國授之去望帝去時子規方鳴故蜀人悲子規鳴而思望帝蜀王本紀怨鳥子規甌越間曰怨鳥夜啼達旦血漬草木啼苦則倒懸於樹禽經注田鵑鷤䳏一名田鵑春三月鳴晝夜不止音聲自呼俗言取梅子塗其口兩邊皆赤上天自言乞恩至商陸子熟鳴乃得止耳臨海異物志先鳴吐血杜鵑春至則鳴先鳴者吐血死嘗有人山行見一羣寂然聊學其聲即死初鳴先聽其聲者主離别厠上聽其聲不祥厭之法當為大聲應之異苑雜俎惟田家候其鳴則興農事華陽風俗録寄巢杜鵑生子寄之他巢百鳥為飼之博物志昔日蜀天子化為杜鵑似老烏我見常再拜重是古帝魂生子百鳥巢百鳥不敢嗔仍為餧其子禮若奉至尊聲音咽咽如有謂蜀人聞之皆起立杜異名爾雅云嶲周禽經嶲周子規也啼必北向離騷鷤鶗䳏之先鳴兮使夫百草不為芳髙唐賦姊歸思婦史厯書百草奮興秭鳺先􅗍博雅鷶􅀈子鳺謝豹子規自呼為謝豹閩中記呉人謂杜宇為謝豹杜宇初啼時漁人得蝦曰謝豹蝦市中賣筍曰謝豹筍唐顧况送張尉詩云綠樹村中謝豹啼老學菴筆記鵙百鷯鵙伯勞也爾雅五月鴂則鳴鴂者百鷯也鳴者相命也大戴禮鵙不始鳴令奸壅偪周書伯趙郯子云少皥時伯趙氏司至者也昭十七夏至小暑伯勞鳴博勞性好單棲其飛􅭙其聲嗅嗅夏至應隂而鳴冬至而止易通卦驗栖輿國人有以伯勞鳥獻諸庭者侍臣謂曰世同惡伯勞之鳴何謂也王曰月令仲夏鵙始鳴詩云七月鳴鵙七月夏五月鵙則伯勞也昔尹吉甫信後妻之䜛而殺孝子伯竒其弟伯封求而不得作黍離之詩俗𫝊云吉甫後悟追傷伯竒出逰于田見異鳥鳴於桑其聲噭然吉甫心動曰無乃伯竒乎鳥乃折翼其聲尤切吉甫曰果吾子也乃顧曰伯竒勞乎是吾子栖吾輿非吾子飛勿居言未卒鳥尋聲而棲其盖歸入門集于井幹之上向室而號吉甫命後妻載弩射之遂射殺後妻以謝之故俗惡伯勞鳴言所鳴之家必有凶也好事者附㑹為之說今俗人惡之其實否也伯勞以五月鳴應隂氣之動陽為生養隂為殘殺伯勞盖賊害之鳥也其聲鵙鵙故以其音名也陳思王惡鳥論仇綏慕容垂之起於闗東嵗在癸未符堅之分氏戸於諸鎮也趙整因侍援琴而歌曰阿得脂阿得脂伯勞舊交是仇綏尾長翼短不能飛逺徙種人留鮮卑一旦緩急語阿誰堅笑而不納至是整言驗矣晉載記殺蛇伯勞使蛇蜿蝉萬畢術仲夏隂作于下陽發于上伯勞夏至後應隂而殺蛇磔之於棘而鳴於上呂覽注鵙鳴在上蛇蟠不動鵲鳴在上蝟反不行類從鵞飛則蜮沉鵙鳴則蛇結物理論夢伯勞伯勞為憂口舌聲可惡也夢見伯勞憂口舌也夢書比翼鶼鶼古之封禪西海致比翼之鳥史記南方有比翼鳥不比不飛其名謂之鶼鶼蠻蠻崇吾之山有鳥其狀如鳬而一翼一目相得乃飛名曰蠻蠻見則天下大水西山經玉樊成王時燃邱國獻比翼鳥䳄􅱉各一以玉為樊拾遺記成王時巴人獻比翼鳥周書鵽冦雉鵽鳩冦雉鵽大如鴿似雌雉鼠脚無後指岐尾為鳥憨急群飛出北方沙漠地又謂之泆泆爾雅犯塞之兆調露元年突厥温𫝊等未叛時有鳴鵽羣飛入塞相繼蔽野邊人相驚曰此鳥一名突厥雀南飛突厥犯塞之兆也至二年正月還復北飛至靈夏已北悉墜地而死視之皆無頭裴行儉問右史苗神客曰鳥獸之祥乃應人事何也對曰人雖最靈而禀性含氣同於萬類故吉凶兆於彼而禍福應於此聖王受命龍鳯為嘉瑞者和氣同也故漢祖斬蛇而驗秦之必亡仲尼感麟而知己之将死夷羊在牧殷紂以滅鸜鵒來巢魯昭出奔鼠舞端門燕王誅死大鳥飛集昌邑以敗是故君子䖍恭寅畏動必思義雖在幽獨如承大事知神明之照臨懼患難之及已也雉升鼎耳殷宗側身而修徳鵩上坐隅賈生作賦以敘命卒以無患者徳勝妖也唐五行志鶖扶老扶老秃鶖也状如鶴而大大者髙八尺善與人鬬好啖蛇古今注一名舍利兆禍漢昭帝時有鵜鶘或曰秃鶖集昌邑王殿下王使人射殺之時王馳騁無度故𤯝祥見也野鳥入處宫室將空王不寤卒以亡國五行志大鳥孫皓問中書令張尚曰鳥之中大者唯鶴小者雀乎尚曰大者有秃鶖小者有鷦鷯皓忌勝已因徙之呉紀諫養正光二年八月獲秃鶖於宫内詔以示崔光表曰此即詩所謂有鶖在梁解云秃鶖也貪惡之鳥也澤所育不應入於殿庭臣聞野物入舍古人以為不善是以張臶惡􅀈賈誼忌鵩鵜鶘蹔集而去前王猶為至誡况今獲之宫禁方被畜養乎衛侯好鶴曹伯愛鴈身死國滅可為寒心願放無用之物委之川澤明帝覽表即棄之北史兆亡周大象二年二月有秃鶖集洛陽宫太極殿其年帝崩後宫常虚隋志唐昭宗光化元年有秃鶖鳴于昭敬殿殿中唐一十八帝御容在焉唐祚将終之兆也長安志颺摩訶池王蜀通正元年四月有狐據于寢室鵂鶹鳴于帳中有大秃鶖鳴颺于摩訶池上顧太尉瓊時為小臣直於内庭潛吟曰昔日曾看瑞應圖萬般祥瑞不如無訶摩池上分明見仔細看來是那胡至光天元年帝崩乃秃鶖之徴也鑑戒録鴆毒鳥鴆毒鳥也說文鴆鳥其雄謂之運日其雌謂之隂諧廣雅運日知晏隂諧知雨天晏静無雲則運日先鳴天將隂雨隂諧則鳴淮謬稱禁蛇廣志曰鴆似鷹而大如鶚毛紫黒色有毒食之殺人喙長七八寸黄赤如銅食蝮蛇及橡粟蛇入口則爛屎溺著石石爛如泥屎石則變為生金及雄黄其鳥有法知巨石大樹間有蛇虺即為禹步以禁之進退俯仰有度或獨為或結群逡巡石樹為之崩倒取蛇虺時呼同力數十聲石起蛇出皆啄食之有人入山見其步法歸向其妻學之婦正織而機翻倒凡鴆飲水處百鳥吸之皆死或得犀牛蘸角其中則水無毒此鳥與犀二物相伏今有犀處必有鴆鴆生處必有犀不然有毒氣傷物類故天資之以含育萬物物類相感志同力鷤鳥千嵗為鴆老則愈毒同力即鴆也禽經注鴆一名曇鳥亦曰同力鳥尾有綷文背上連綴不斷足生距雄者其鳴先顧寰宇記雲白白雉落黒鴆零蜀都賦鴆鳥一名雲白古人謂之鴆毒劉注渴者恣口於雲白之酒飢人之取飽於鬱肉漏脯也抱朴良規寘酒申生祭齊姜於曲沃歸福於絳公田驪姬受福乃寘鴆於酒置堇於肉公歸祭之地地焚飲小臣酒亦斃晉語韋注曰鴆運日也買酖駙馬共為荆使于巴見擔酖者問之是何以曰所以酖人也於是請買之金不足又益之車馬已得之盡注之於江尸子過江石崇為荆州刺史得鴆鳥鶵以與後軍將軍王愷而養之其大如鵞喙長尺餘純食蛇虺時制鴆鳥不得過江為其羽落酒中必殺人司𨽻校尉傅祇所糾詔原之燒鴆於都衙晉書避惡穆帝升平二年二月詔曰佽飛督王饒忽上吾鴆鳥一口云以避惡此凶物豈宜妄進於是鞭饒二百使殿中御史孫雲焚其鳥于四達之衢晉中興書送子出山有任嶺南者于山寺登厠忽見異禽集石上跳躍作聲若巫家禹步然須臾石下出一青蛇銜之而去問之寺僧云此鴆鳥也又蘄州黄梅山有鴆巢于山岩大木中巢下數十步無生草每春生一子能飛即送出山惟二雌雄獨留遯齋閒覽梟流離鳥少美長醜為鶹鷅爾雅􅆁風瑣兮尾兮流離之子陸璣疏云流離梟也自闗而西謂梟為流離其子適長大還食其母故張奐云鶹鷅食母許慎云梟不孝鳥是也注疏鴟梟食母眼睛乃能飛感應經疏烏反哺梟反噬盖順逆之習也北山録炎州有鳥其名曰梟嫗伏其子百日而長羽翼既成食母而飛劉子貪愛逃于絶漠堯在位七年鴟梟逃于絶漠拾遺記不入城郭曾子居曲阜鴟梟不入城郭水經注不至子産治鄭蒺藜不生鴟梟不至梁冀别𫝊李矩令郭誦禱鄭子産祠云君昔相鄭惡鳥不鳴凶胡臭羯何得過庭晉書禳梟齊景公為路寢之臺聞梟鳴而惡之成而不適焉栢常騫為置白茅禳之夜間甫一鳴而不復聞公使人徃視之梟當陛布翼伏地而死說苑梟羮夏至賜百官梟羮欲絶其類也夏至㣲隂始起育萬物梟害其母故以此日殺之漢官儀古天子常以春解祠祠黄帝用一梟破鏡如淳曰漢使東郡送梟五月五日作梟羮賜百官以其惡鳥故食之漢郊祀志化梟仇香字季和化陳元為孝子鄉邑為之諺曰父母何在在我庭化為隝梟哺所生後漢書化梟仰季和馴雉推仲康劉孝綽詩尅敵之兆張重華為石季龍所攻重華使謝艾為中堅將軍引師出振武夜有二梟鳴于牙中艾曰梟邀也陸博得梟者勝今梟鳴牙中尅敵之兆於是進戰大破之晉書集手乞伏乾歸畋于五谿有梟集于其手甚惡之六年為兄子公府所弑并其諸子十餘人載記鳴帳齊後主緯武成之長子也母曰胡太后夢於海上坐玉盆日入裙下遂有娠五月五日生于并州其日有鴞鳴于産帳之上三國典畧武成生後主初有梟升后帳而鳴梟不孝之鳥不祥之應也後主嗣位胡后淫亂事彰遂幽死於北宫焉隋志此一事而鴞梟字異知當是一物耳改官有梟鳴于張率更庭樹其妻以為不祥連唾之張聞之曰急灑掃吾當改官言未畢賀者已在門唐書不鳴𤣥宗令突厥入仗馳射呂向上疏曰鴟梟不鳴未為瑞鳥猛虎雖伏豈稱仁獸舊突厥𫝊嘯屏路敬潛為遂安令先是令多死敬潛欲辭妻曰君不死獄而得全非生死有命耶從之到官有梟嘯其屏鼠數十走於前左右驅之擁杖而號敬潛不為懼乆之遷衛令位中書舍人新唐更鳴梟逢鳩鳩曰子將安之梟曰我將東徙鳩曰何故梟曰鄉人皆惡我鳴以故東徙鳩曰子能更鳴可矣不能更鳴東徙猶惡子之聲說苑捕鼠北方梟人家以為怪異惡之南中晝夜飛鳴與烏鵲無異桂林人維取生養之家家養使捕鼠以為勝狸嶺表録異鴞惡聲鳥詩陳風云墓門有梅有鴞萃止毛𫝊云惡聲之鳥也一名鵩一名梟一名鴟大雅瞻卬云為梟為鴟陸璣云鴞大如斑鳩綠色惡聲之鳥也入人家凶賈誼所賦鵩鳥是也其肉甚美可以為羮臛又可為炙漢供御物各随其時鴞冬夏常施之以其美故也爾雅酉陽如鷄有鳥小如鷄體有文色土俗因形名之曰鵩不能逺飛行不出域巴蜀異物志為賦賈誼為長沙王太傅三年有鴞飛入賈生舍止於坐隅楚人命鴞曰鵩史鵩似鴞不祥鳥也選誼在長沙鵩鳥集其承塵而鳴長沙俗以為鵩至人家主人當死誼作鵩鳥賦齊死生等榮辱以遣憂累焉西京雜記鵂鶹鵅鵅鵋䳢今江東呼鵂鶹為鵋䳢亦謂之鴝鵅爾雅撮蚤鴟鵂夜撮蚤察毫末晝出瞑目而不見丘山殊性也莊結性拾爪甲鵂鶹一名鵄鵂晝日無所見夜則目至明人截爪甲棄露地此鳥夜至人家拾取爪分别視之則知有吉凶凶者輒便鳴於屋上其家有殃博物志人獲之者於嗉中猶有爪甲本草除爪甲埋之戸内恐此鳥得之也五行志鵂鶹白日不見人夜能食蚤虱也蚤爪音相近俗云鵂鶹拾人棄爪相其吉凶妄說也纂文聚鳥鵄鵂致鳥取鵄鵂折其大羽絆其兩足以為媒張羅其旁鳥聚矣萬畢術鵂鶹即鴟也為網可以聚諸鳥嶺表録異劉鵂鶹劉在朱方人不得共話若與之言人必遭禍難及身死疾惟一士謂無此理偶值人有屯塞耳劉聞之欣然而徃自說被謗君能見明答云世雷同何足恤須㬰火發資畜服玩蕩然於是舉世號為劉鵂鶹或遇諸途皆閉車走馬掩目奔避劉亦杜門自守嵗時一出則人驚散甚於見鬼異苑射侯景矯豫章嗣王棟命禪位於己將拜冊命忽有丹觜鵲集於冊書又夜有鵂鶹鳴於太極殿上景深以為惡自控弦伺之典畧景尋敗將亡入海中為羊􅀈所殺隋志訓狐僖宗廣明元年春絳州翼城縣有鵂鶹鳥群飛集縣署衆鳥逐而噪之鵂鶹一名訓狐唐五行志訓狐惡鳥也鳴則後竅應之酉陽有鳥夜飛鳴訓狐矜凶挾狡誇自呼韓詩闗西曰訓猴下幄光化二年劉仁恭為幽帥自破太原軍于安塞城南取鄴中圖袁曹之霸先下甘陵無少長悉坑之初泊甘陵城下有鵂鶹數頭飛下幄帳内逐之復來仁恭惡之竟為魏汴所敗殺其名將單可及仁恭單馬而遁唐書鬼車九頭鳥鬼車晦暝則飛鳴能入人室收人魂氣一名鬼鳥此鳥昔有十首一首為犬所噬今猶餘九首其一常下血滴人家則凶夜聞其飛鳴則捩狗耳猶言其畏狗也亦名九頭鳥本草胎生孔子與子夏渡江見而異之人莫能名孔子曰鶬也嘗聞河上人歌云鶬兮鴰兮逆毛衰兮一身九尾長兮韓詩昔孔子與子夏所見故歌之其圖九首今呼為九頭鳥也白澤圖謂之蒼鸆帝鵠書謂之逆鶬裴瑜注爾雅云鶬麋鴰是九頭鳥也酉陽止後園齊孝昭即位之後有鳥止於後園其色赤形似鴨而有九頭皆鳴其年帝崩隋五行志首互低昻郝氏夜祀佛鬼乗燭光而下翼廣丈餘九首互相低昂其家呼犬持杖逐之墜一羽長三尺許廣八九寸色類鵞鴈續博物志渠逸淳熈初李夀翁守長沙惡鬼車中夜鳴噪募得之身圓如箕十脰環簇其九有頭其一獨缺而鮮血㸃滴一脰各生兩翅當飛時十八翼霍霍而動亦有所向不同更相爭抝用力競進而翅翮有傷折者類野狐而黒嘴長洛中呼為渠逸鳥血落人家皆為灾咎遞推門作犬吠以恐之責令速去夷堅志乳母鳥姑獲能收人魂氣今人一云乳母鳥言産婦死變化作之能取人之子以為己子胸前有兩乳有小子之家則血㸃其衣以為誌今時人小兒衣不欲夜露者為此也時人亦名鬼鳥本草姑獲鳥夜飛晝隱如鬼神衣毛為飛鳥脫毛為婦人名為天帝少女一名夜行逰女一名釣星一名隱飛鳥無子喜取人子養之以為子人養小兒不可露其衣此鳥度即此兒死荆州為多昔豫章新喻男子見田中有六七女人皆衣毛衣不知是鳥扶匐徃得其一女所解毛衣取藏之即徃就諸鳥諸鳥各走取毛衣飛去一鳥獨不得去男子取以為婦生三女其母後使女問父知衣在積稻下得之衣而飛去後復以衣迎三女三女得衣亦俱飛去今謂之鬼車𤣥中記本草以姑獲鬼車為二鳥車載板車載板鬼車也總禽庶鳥羽嘉生飛龍飛龍生鳯凰鳯凰生鸞鳥鸞鳥生庶鳥凡羽者生於庶鳥淮南鳥陽鳥所以飛何鳥者陽也飄輕所飛也禽者何鳥獸之總名明為人所擒制也白虎通雌雄武帝問朔何知鳥之雌雄對曰雄左翼加右聲髙雌右翼加左聲小方朔𫝊一云燒毛納水中沉者雄浮者雌鳥數一鳥曰佳二鳥曰雔三鳥曰朋四鳥曰乗五鳥曰雇六鳥曰鶂七鳥曰鳦八鳥曰鸞九鳥曰鳩十鳥曰􅝄禽經棲宿陸鳥曰棲水鳥曰宿獨鳥曰止衆鳥曰集水鳥晚於林棲故曰宿也上視鳴鶴以怨望鴟以貪顧鷄以嗔睨鴨以怒瞋雀以猜瞿燕以狂䀪視也鸎以喜囀烏以悲啼鴛以飢鳴鶴以潔唳梟以凶叫鴟以愁嘯鳴也上鳴音鳥鳴啞啞鸞鳴噰噰鳯鳴喈喈凰鳴啾啾雉鳴嚖嚖鷄鳴吚吚鸎鳴嚶嚶鵲鳴唶唶鴨鳴呷呷鵠鳴哠哠鵙鳴嗅嗅鳥性冠鳥性勇帶鳥性仁纓鳥性樂注云冠鳥若鷹是也帶鳥若練鵲是也纓鳥若綬鳥是也脚短脚者多伏長脚者多立脚近尾者能步脚近臆者能躑多伏鴚鵞之類是也多立鸛鶴之類是也生陸生之鳥咮多銳而善啄水生之鳥咮多圓而善唼善唼亦鴚鵞之類善啄亦鸛鶴之類是也禽顧凡鳥左顧則怒作右盼則喜生飛而起則仰左翼飛而下則仰右翼故今鷙鳥下擊皆先側左翅也埤雅武生文死霜傅强枝鳥以武生者少雪封枯原鳥以文死者多禽經禽聲鶴聲宜學仙雉聲宜習武烏聲宜習醫鴈聲宜習卜筮鵲聲宜習工巧梟聲宜習符呪聴聲考詳篇四種鳥有四種聲好而形醜拘翅羅鳥是也形好而聲醜鷙鳥是也聲形俱醜土梟是也聲形俱好孔雀是也增一阿含經孕鶴以聲交而孕鵲以音感而孕白鷁相眂而孕烏以𫝊涎而孕禽經脂缾舊說鳥雀尾上有肉髙有穴者名脂缾鳥雀毎引觜取脂以塗翅毛則悅澤雨露不能濡海録熒熒子路顔淵浴於洙水見五色鳥顔淵問子路曰熒熒之鳥後日顔淵與子路又浴於泗水更見前鳥復問由識此鳥否子路曰識回曰何鳥子路曰同同之鳥顔回曰何一鳥而二名子路曰譬如絲絹煮之則為帛染之則為皂一鳥二名不亦宜乎衝波𫝊金吾漢武更中尉名為執金吾師古曰金吾鳥名也主辟不祥天子出行職主先導以備非常故執此鳥之象因以名官前百官志吾猶禦也應劭曰執金革以禦非常後志鳷鵲章帝永寧元年條支國來貢異瑞有鳥名鳷鵲形髙七尺解人語其國太平則鳷鵲群翔昔漢武帝時四夷賓服有獻馴鵲若有喜樂事則皷翼翔鳴按莊周云雕陵之鵲盖其類也拾遺記歸飛林邑城外香桂成林氣清澄煙時禽異羽翔集間闗兼比翼鳥不比不飛鳥名歸飛鳴聲自呼俞益期與韓豫章牋曰嘗對飛鳥戀土增思寄意謂此鳥其背青其胸赤丹心外露鳴情未達終日歸飛飛不十千路有萬里何由歸哉水經瑞鳥煬帝征遼回次於栁城郡之望海鎮步出觀望有大鳥二素羽丹嘴狀同鶴鷺出自霄漢翻翔雙下髙一丈四五尺長八九尺徘徊馴擾翔舞御營敕著作佐郎虞綽製瑞鳥銘以進上命鐫於其所仍敕殿内承閻毗圖寫其狀秘書郎虞世南上瑞鳥頌敕令寫於圖首大業拾遺周周周周尚衘羽蛩蛩亦念飢阮籍詩鳥有周周者首重而屈尾將欲飲於河則必顛乃銜羽而飲今人之所有飢不足者不可以不索其羽矣韓子鸇鸇之信不如鴈周周之知不如鴻禽經周周銜羽以濟荘子鴇詩曰肅肅鴇羽集於苞栩釋文云鴇似鴈而大無後趾注疏云鴇連啼性不樹止一名獨豹易林曰文山鴻豹肥腯多脂雜俎云鴇遇鷙鳥能激糞禦之糞著毛悉脫物類相感志云鵰翎能食諸鳥羽如群錯草中有鵰毛必衆鳥毛羽自落雅翼云鵰鷙服羽族此類之可推者鴇乃水鳥而鷙鳥為之落羽此類之不可推者鳥王交州有鳥王如鵲頭上有毛冠尾長一尺五寸純黒色若欲取諸鳥先選髙枝斫除枝柯惟留三兩枝以膠挿著取鳥王置其下鳥王鳴呼衆鳥聞聲皆爭集其處或銜果實或送蟲蟻皆送鳥王諸鳥著膠獠子之徒下收之也寰宇記冶鳥越地深山中有鳥大如鳩青色名曰冶鳥穿大樹作巢如五六升器其户口徑數寸周飾以土堊赤白相次狀如射侯伐木者見此樹即避之去或夜暝人不見鳥鳥亦知人不見己也鳴曰咄咄上去明日便宜急上樹去曰咄咄下去明日便宜急下樹去若不使去但言笑而已者可止伐也若有穢惡及犯其所止者則虎通夕來守人不知者即害人此鳥白日見其形鳥也夜聽其鳴亦鳥鳴也時觀樂便作人悲喜形長三尺入澗中取石蟹就人火間炙之不可犯也越人謂此鳥為越祝之祖博物志木客木客鳥大如雀數千百頭為群飛集有度不與衆鳥相厠又俗云木客化為此鳥也白黄文者謂之君長左翼後有綬飛特髙而正赤者在前謂之伍伯居前正黒者謂之鈴下緗色而赬雜者謂之功曹左脇有白帶似鞶囊者謂之主簿長次君後其伍曹官屬各有章色土人次第呼之凡飛不過百餘步廣陵異物志郡國志鸀鳥歸美山有石室色如黄金號為金室有鸀鳥形色鮮潔自愛羽毛其隻者或鑑水向影悲鳴自絶方知孤鸞對鏡為不虚矣南康記共命雪山有鳥名為共命一身二頭識神各異同共報命故曰共命雜寳藏經蓮香交響共命鳥金榜雙逥三足烏杜詩駝鳥和帝時安息國獻條支大爵時謂之安息雀後西域𫝊廣志云大爵頸及膺身蹄都似槖駝色蒼舉頭髙八九尺張翅丈餘食大麥其卵如甕即今之駝鳥也後紀波斯有大鳥形如槖駝有兩翼飛而不能髙食草與肉亦能噉火馳走甚疾一日能七百里魏書今本無末二句伏盧尼在波斯西北有大河南流中有鳥其形似人亦有如槖駝鳥者皆有翼常居水中出水便死北史髙宗永徽中吐火羅國遣使獻大鳥其色𤣥足如駝有翅而能飛日行三百里能噉銅鐵夷俗呼為駝鳥上以太宗懐逺所致獻於昭陵乃刻像於陵之内舊唐大食國有駝鳥髙四尺以上脚似駝蹄頭頸勝得人騎行五六里其卵大如三升器杜環經行紀攫食人真臘國有葛浪山髙萬丈半腹有洞先有浪鳥狀似老鴟大如駱駝人過即攫而食之騰空而去百姓苦之真臘王取大牛肉中安小劒子兩頭尖利令人載行鳥攫而吞之乃死無復種矣僉載骨托河州有禽名骨托狀類鵰髙三尺許常以名自呼能食鐵石郡守出以示客或疑之乃以絲繩繫白石擲其前即啄吞之良乆牽出視石已軟爛如泥矣墨客揮犀火鷄三佛齊國出火鷄大如鶴身圓而頸更長頸中有二紅軟冠狀如紅褐嘴尖渾身毛如羊毛稀長青色脚長鐵黒其爪甚利或爪破人腹腸出即死好食火炭因名火鷄用杖捶打不能死瀛崖勝覽獨立鳥一足曰獨立見其勇强也河圖說徴示越王越王鳥狀似鳶口勾喙可受二升許南人以為酒器珍於文螺不踐地不飲江湖不唼百草不下餌蟲魚唯噉木葉糞似薰陸香南人遇之既以為香又治雜瘡坐法真登羅山疏䴌􅀈一名越王鳥南越志􅀈䲴􅀈䲴鳴聲哀俗云繼母欲嫁因㸑使人守之母遂不還兒因呼母言􅀈䲴也臨海異物志百舌仲夏之月反舌無聲反舌有聲佞人在側周書時訓江充之害其萌反舌鳥入殿春秋保乾百舌春囀夏止惟食蚯蚓正月後凍開蚓出而來十月後蚓藏而徃盖物之相感也僉載狂鳥有五采之鳥有冠名曰狂鳥山經儀鳯屯集狂鳥穢之孔融周嵗論蝙蝠仙鼠蝙蝠自闗而東謂之服翼或謂之仙鼠自闗而西秦隴之間謂之蝙蝠北燕謂之蟙䘃方言一曰天鼠李氏本草忌庚申蝙蝠夜值庚申乃伏變化自然論百嵗色赤百嵗伏翼色赤止則倒懸千嵗伏翼色白得而食之使人神仙𤣥中記肉芝荆州清溪秀壁諸山山洞徃徃有乳窟窟中多玉泉交流中有白蝙蝠大如鴨按仙經云蝙蝠仙鼠千嵗之後體白如銀棲即倒懸盖飲乳水而長生也述異記仙經謂之肉芝紅蝙蝠紅蝙蝠出瀧州背深紅色唯翼脇淺黒多雙伏紅蕉花間採者若獲其一則一不去南人收為媚藥北户録化人百嵗蝙蝠於人口上服人精氣以求長生至三百嵗能化形為人飛逰諸天神異秘經取人髻宋初淮南郡有物髠人髪太守朱誕曰吾知之矣多置黐以塗壁夕有一蝙蝠大如鷄集其上不得去殺之乃絶觀之屋簷下已有數百人頭髻幽明録鳥鼠譬如蝙蝠人捕鳥時入穴為鼠人捕鼠時出穴為鳥正法念經猶蒼蠅招白黒之論蝙蝠有鳥鼠之譏上爭旦蘇舜舉知臨安縣獻役鈔規例於轉運副使王庭老庭老不喜命急足押出城後蘇軾云數日前入州却被訓狐押出蘇問訓狐事東坡云自來聞一小話云燕以日出為旦日入為夕蝙蝠以日入為旦日出為夕爭之不決訴之鳯凰至路次逢一禽語燕曰不須徃訴鳯凰在假或云鳯凰渴睡却是訓狐權攝意以譏庭老等如訓狐不知是非也蘇贈舜舉詩云餔糟睡方熟酒湎喚不醒奈何效燕蝠屢欲爭晨瞑烏䑓詩集天中記卷五十九
