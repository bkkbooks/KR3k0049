body:
  text: 天中記巻八明陳耀文撰崑崙山三成爾雅曰三成為崑崙丘注崑崙山三重故以名云崑崙山記云崑崙山一名崑丘五級下曰樊桐一名板松二曰𤣥圃一名閬風上曰層城一名天庭是謂太帝之居𤣥圃崑崙一曰𤣥圃一曰積石瑤房一曰閬風臺一曰華盖一曰天柱僊人所居也葛仙公傳天柱龍魚河圖曰崑崙山天中柱也晉郭璞崑崙丘賛曰崑崙月精水之靈府惟帝下都西羗之宇嵥然中峙號曰天柱地首河圖括地象曰崑崙之山為地首上為握契滿為四凟横為地軸上為天鎮立為八柱又曰地中央曰崑崙其東南方五千里曰神州銅柱崑崙有柱焉其高入天所謂天柱也圍三千里圓如削下有僊人九府治與天地同休息其柱銘曰崑崙銅柱其高入天圓周如削膚體美焉地位天高地部之位起形高大者有崑崙山廣萬里高萬一千里神物之所生聖人仙人之所集也出五色雲氣五色流水其泉南流入中國名曰河也其中山應于天最居中八十城匝繞之中國東南隅居其一分愽物志異名阿傉達山一名崑崙山括地志崑崙為無熱丘水經注日月所隠河出崑崙山山高三千五百餘里日月所相隠避為光明也其上有醴泉華池禹本紀天地之齊崑崙為天地之齊酉陽雜爼地之中崑崙墟地之中也水經崑閬西北之天門也楊烱碑帝之下都西海之南流沙之濱赤水之後黒水之前有大山名曰崑崙之丘實惟帝之下都其神陸吾是司天之九部及帝之圓時上有木禾長五㝷大五圍靣有九井以玉為檻傍有九門門有開明獸守之百神之所在其下有弱水之淵環之其外有炎火之山投物輙然有人戴勝虎齒有豹尾宂處名曰西王母山海經崐崚崐崘號崐崚山有三角其一角正于北辰名閬風巔其一正西𤣥圃臺其一正東名崑崙宫有五城十二樓金臺玉􅏱乃元氣之所合天帝治處處十洲記熊熊魂魂槐江之山實惟帝之平圃南望崑崘其光熊熊其氣魂魂山海經氣注北斗當崑崙上氣運注天下春夏為雨露秋冬為霜雪徐整長厯起宫黄帝巡逰四海登崐崙山起宫望于其上陸賈新語遺珠黄帝遊乎赤水之北登乎崑崙之丘而南望還歸遺其𤣥珠莊子掘虗禹以息土滇洪水以為名山掘崑崙虗以為下地或作池中有增城九重上有木禾珠樹玉樹璇樹不死樹在其西沙棠琅玕在其東絳樹在其南瑤樹在其北北門開以納不周之風淮南子宿阿周穆王肆意逰逺宿于崑崙之阿赤水之陽别日升崑崙之丘以觀黄帝之宫而封之以詔後世遂賓於西王母觴于瑤池之上列子承天范蠡為越王築城曰崑崙之象存焉越王曰崑崙之山乃地之柱上承皇上氣吐宇内下處后土稟受無外滋聖生神漚養帝㑹故五帝處其陽陸三王居其正地吾之國也偏何能與王者比隆盛哉吳越春秋去天數里蔡誕者自云被謫至崐崙初誕還人問云崑崙何似荅曰天不問其高㡬里要於仰視之去天不過十數里也抱朴子崑崙之體涼張駿酒泉太守馬岌言上酒泉南山即崑崙之體也周穆王見西王母樂而忘歸即謂此山山有石室王母堂珠璣鏤飾煥若神宫刪丹西河名曰弱水禹貢崑崙在臨羗之西即此明矣宜立西王母祠以裨朝廷無疆之福駿從之十六國春秋夢登許渾嘗夢登山有宫室凌雲人云此崑崙也既入見數人方飲酒招之至暮賦詩曰曉入瑤臺露氣清坐中惟有許飛瓊他日復夢至其處飛瓊曰何故顯余姓名于人間座上即改天風吹下歩虗聲曰善本亊詩嵩山嵩丘鶉火大火夀星豕韋為中州其神主乎嵩丘鎮星位焉唐天文志中岳中央之岳獨加高字者何中央居四方之中而高故曰嵩高山白虎通外方禹貢熊耳外方鄭𤣥毛詩譜云外方山即嵩也後郡國志二室嵩山東謂太室西謂少室相去十七里嵩其摠名也謂之室者以其下各有石室焉少室與太室相埒但小耳西征記㤗室中岳少室俗名太室山海注瞻眺昔傳亮北征在河中流從客問之曰潘安仁懷舊賦曰前瞻太室旁眺嵩丘嵩丘太室一山何云前瞻旁眺哉亮對曰有嵩丘山去太室七十里此是冩書誤耳小説負黍少室一名負黍山負黍城在南故因山以名城郡國志定思少室在嵩山西七十里從東角上四十里得下定思又上十里得上定思十里中有大石門為中定思自中定思而出至崖頭下有石室中有水多白石央内有自然經書自然飲食輿地志栖神靈藪嵩山最是棲神之靈藪長松緑柏生於嶺澗右左古人住止處有銅銚器物東北出雲有自然五榖神芝仙藥嵩山記明公嵩高山上有石室前有石柱似承露盤上有石脂滴下食之一合與天地相畢中步南下二百步亦有岳廟畫為神像有玉人高五寸玉色甚光䦞制作亦佳莫知早晚所造盖神岳之神相像謂明公山中人悉云屢常失之或經旬乃見上避世嵩高山右室十餘孔有石床池水食飲之具道士多逰之可以避世關中記融降國語曰夏之興也祝融降于崇山韋昭注曰崇嵩字古通用夏都陽城嵩山在焉登仙王喬周靈王太子晉也好吹笙作鳳鳴逰伊洛之浦招延道士浮丘公接以上嵩髙山三十餘年後求之于山見桓良曰告我家七月七日待我於緱氏山頭果控鶴斯阜靈王望而不得近舉手謝人時數日而去其家得遺屣亦謂之撫父堆堆有上子晉祠世俗有簫管之聲焉列仙傳水經玉膏陽城西谷名季室亦曰少室山巔有白玉膏服之得仙山有周昭王陵山海經注學仙鬼谷先生於嵩山東南學仙嵩山記嵩呼漢武帝至於中岳獲駮麃見夏后啓母石翌日親登嵩髙御史乗屬在廟旁吏卒咸聞呼萬嵗者三於是令祠官加增太室祠㠯山下戸三百為之奉邑名曰崈高本紀夢上武帝夜夢與李少君俱上嵩高山上半道有繡衣使者乗龍從雲中下持節言太乙君請少君覺告近臣曰朕夢少君將舎朕去矣漢武内傳三臺自岳神廟東北二十里至一名山曰東龍門其東有三臺山昔漢武東巡過此山見學仙女帝觀之遂以名焉雜道書萬嵗漢武於太室山作登仙臺及萬嵗亭西征記遇老父王猛至深山見一老父據胡床鬚鬢皓然猛進拜老父曰王公何因拜也遣人送猛出山顧視乃嵩高山也十六國春秋金璧冀州道人釋法稱告其弟子曰嵩神言江東有劉將軍漢家苖裔當受天命吾以璧三十二鎮金一餅與之劉氏卜世之數也宋符瑞志弟子法義於嵩髙廟所石壇下得玉璧三十二枚黄金一餅符彩潤潔河南太守毛脩之以靈岳降瑞送諸神府孫嚴宋書嵩岑裴衍字文舒自梁歸魏授通直郎衍欲辭朝命請隠嵩髙表曰伏見嵩岑極天包育名草脩生救疾多逰此岫臣攝性乖和誠希藥此沈疴庶偶影風雲永歌至徳詔曰知欲養痾中岳練石嵩嶺栖素雲根餌芝清壑深用嘉焉便從來請魏書寶神像魏太武時嵩陽太室中有寶神像長數寸乍見孝文太和中有人避癗於此廟見太武來造神因言今日朝天帝帝許移都洛陽當得四百年神言昨已得天符太武出神神左右曰虜性苛貪天符但言四十而已因言四百明年孝文遷都洛陽唯得四十年矣廣古今五行記訪隠田遊巖初以儒學累徴不起侍其母隠嵩山調露中高宗幸中嶽因訪其居逰巖出拜詔命中書侍郎薛元超入問其母御題其門曰隠居田逰巖宅徴拜𢎞文學士翰林盛亊山神移樹永淳時嵩岳閑居寺釋元珪廬嶽之龎塢一日有偉丈夫從部曲來謁曰我此岳神也請授正戒珪曰無我無汝孰能戒哉神曰我神通亞佛珪曰汝能㑦上帝東天行而西七曜乎汝能奪地祇融五嶽而結四海乎曰不能珪曰東巖寺之障莽然無樹北岫有之而背非屛擁汝能移北樹于東嶺乎神白聞命願師無駭是夜暴風吼雷物不定止詰旦和霽則北巖松栝盡移東嶺森然行植焉宋高僧傳神嶽則天證聖元年將有事於嵩山先遣使祭致下制號嵩髙為神嶽尊其神為天中王夫人為靈妃至天冊萬嵗二年臘月甲申親行登封之禮改元萬嵗登封丁亥禪于少室山三年二月辛巳尊天中王為天中皇帝靈妃為天中皇后舊志新紀十景盧鴻一字顥然博學善書隠于嵩山開元初禮召不至自圖十景有序有詞李參𤣥亂曰𤣥居十志者草堂以脩身蓄徳之府也樾館以延賓閲禮之用也洞𤣥室以談道衆妙之宗也幕翠庭以棲閒谷神之致也期僊磴以湛情傲睨之適也滌煩磯以藻性潔已之謂也雲錦淙以汰志日新其徳也金碧潭以端形鏡清其色也倒影臺熈熈春臺之樂也枕烟庭𣺌𣺌仙山之興也十者盖天地成數志者紀述之總名𤣥居道心惟㣲幽賞亦異可謂隠淪之竒札今昔所未聞故備焉貽諸好事君子也四銘嵩山之上有玉女𢷬帛石瑩徹光潔人莫能測岳下之人云立秋前一日中夜常聞杵聲響焉岳之西北一峯號望都峯云天氣晴暖即望見洛陽隠如車盖之狀又岳之東北一峯號雞鳴峯云五更之初便見目出岳頂有中天池開元中隠士盧鴻一凡有絶境之處皆勒銘其最妙者此四銘也紀異廬嵩山盧鴻廬嵩山賜隠居服官營草堂到山中廣學廬聚徒五百人唐書唐舊史鴻一盖二名與中岳劉真人碑所書合新史刪去一字不知何據當以舊史為正石林草堂圖序隠李渤字濬之隠於嵩山以讀書業文為事元和初以山人徴為左拾遺舊唐河南少尹杜兼遣吏持詔幣即山敦促不拜韓愈遺書曰朝廷士引頸東望若景星鳳凰爭先覩之為快想遺公冠𢃄就車恵然肯來舒所蓄積以補綴盛徳之缺渤心善其言始出家東都唐書題名元和四年三月二十六日余與著作郎樊宗師處士盧仝自洛中至少室謁李徴君渤樊次玉川疾作歸明日與盧李自少室而東上太室中峯宿封禅臺下石室遂自龍川寺釣龍潭水遇雷明日觀啟母石入天封觀閠四月三日韓愈題雲麓漫抄集不載武后封禅處有石記云人逰龍潭者毋笑語以瀆龍神龍怒則有雷恐集古録司真天中岳山洞名上帝司真之天即軒轅為黄帝治中岳主徳分精黄老駐蹕上有仙人貝多之樹玉女織錦之室石髓瓊環玉人金像下應栁宿之精下鎮周地之分野洞淵集㤗山嵗星降婁𤣥枵以負東海其神主於岱宗嵗星位焉唐志山尊太山山之尊一曰岱宗岱始也宗長也萬物之始隂陽交代故為五岳長受命王者恒封禅之風俗通參天太山之高參天入雲去之百里不見埵塊論衡更代東岳所以謂之岱者代謝之義陽春用事除故生新萬物更生相代之道故岱為名也三禮義宗天孫太山一曰天孫言為天帝孫也主召人魂東方萬物始成故知人生命之長短博物志封禪王者受命必封禪封者增高也禪者廣厚也皆刻石紀號著已之功績以自劾也天以高為尊地以厚為德故增㤗山之高以示報天禪梁甫之址以報地白虎通封㤗山告大平升中和之氣於天祭土為封謂負於土㤗山為壇而祭也項威漢書注夫東方者萬物之所始山嶽者靈氣之所宅故求之物本必於其始取其所通必於所宅崇其壇場則謂之封明其代興則謂之禪然則封禪者王者開務之大禮也袁宏漢紀神府㤗山多芝草玉石下有洞天周廻三千里鬼神之府福地記天門盤道屈曲而上凡五十餘盤經小天門大天門仰視天門如從穴中視天窻矣自下至古封禪處凡四十里山頂西巖為仙人石閭東巖為介丘黄河去㤗山二百餘里於祠所瞻黄河如𢃄若在山阯㤗山記日觀東南巖名日觀日觀者雞一鳴時見日始欲出長三丈所又東南名秦觀秦觀者望見長安吳觀者望見會稽周觀者望見齊也西地有石室壇以南有玉盤中有玉龜山南脅神泉飲之極清美利人封禪記神房㤗山之中有神房阿閣帝王録尸子易封而封易姓而王封為㤗山禅於梁父者七十有二代其有形兆垠堮勒石凡千八百餘處莊子古者登㤗山禪梁父者七十二家而夷吾所記者十有二焉管子介丘司馬相如禪封書曰周躍魚隕杭休之以燎微夫斯之為符也以登介丘不亦恧乎漢書鄭祀左傳鄭伯請釋太山之祀而祀用公以太山之祊易許田注鄭有助祭太山湯木邑在祊隐公望吳顔淵與孔子俱上魯太山孔子東南望吳閶門外有繫白馬引顔淵指以示之曰若見吳閶門乎顔淵曰見之孔子曰門外何有曰有如練係之狀孔子撫其目而止之因與俱下下而顔淵髮白齒落因以病死論衡五大夫秦始皇望祭山川遂上太山下風雨暴至因封其樹為五大夫史記始皇休于松下因封為五大夫漢官儀小天門秦時五大夫松見在太山記玉䇿古封秦山禪梁甫舊説岱宗上有金篋玉䇿能知人年脩知漢武帝探䇿得十八因倒讀曰八十其後果夀長八十風俗通仙人閭漢書曰武帝封㤗山禪石閭應邵注曰石閭在泰山下南方土人言仙人閭起雲漢武帝封泰山白雲起封中史記求仙武帝欲求神仙以扶方者言黄帝由封禪而後仙於是欲封禪封禪不常時人莫知後志木甲天門東上一里餘得木甲木甲者武帝時神也上神枕泰山下老父者失其姓名武帝巡狩見老父鋤於道間頭上白光高數丈仙傳稷丘君㤗山道士稷丘君武帝時以道術受賜後上東巡㤗山稷丘君擁琴來拜武帝曰陛下勿上也必傷足上必欲上及上數里左右足指果折乃止列仙傳金床玉几馬明者齊國臨淄人也本姓和字君賢為縣吏捕賊為所傷當時殆死良乆忽於道間見一女以肘後管中一丸藥大如小豆與明服之於是即愈血絶瘡合隨神女徃岱中室中上下懸絶重巖深隠去地千餘丈其中金床玉几乃人跡所不能至上雲氣成宫闕光武封山居亭百官布野比日山上雲氣成宫闕百官並見之二十一日夕牲時白氣廣一丈東南極望致濃厚時天清和無雲瑞命篇岱嶽之瑞以日為應也事畢皇帝冄拜群臣稱萬嵗音動山谷有氣屬天遙望不見山顛山顛人在氣中不知也封禅儀致書天帝臨淄蔡支曾至岱中山下見一官儀衛甚嚴謂曰掾為我致書於外孫也吏曰外孫為誰曰吾太山神也外孫天帝也吏驚出門乗馬所之有頃忽達天帝座太微宫殿支致書訖帝命坐賜酒食仍勞問之列異傳致書河伯捜神記後漢胡母班曾至㤗山之側為太山府君所召令致書於女婿河伯處云至河中流扣舟呼青衣當自有取書者果得達復為河伯致書府君云蜀志云班王匡之妹夫也石釡處士張忠隠于㤗山岩棲谷飲脩道養之法鑿石為釡㤗山人于今法之前㤗録府君高祖將封東嶽而天乆霖雨帝疑矣使劉仁軌問華山道士李播為奏玉京天帝播云待問㤗山府君遂令呼之良乆府君至拜謁甚㳟播云唐皇帝欲封禪如何對曰合封後六十年又合一封播揖之而去時仁軌在播側立見府君屢顧之播又呼廻曰此唐宰相不識府君無宜見怪既出謂仁軌曰府君薄怪相公不拜令左右録人此名所以呼廻處分耳仁軌惶汗乆之播曰處分了當無苦也其後帝遂封禪廣異記播李淳風父也皇后為亞獻唐高宗登封㤗山祝帝祇于社首皇帝為亞獻越國太妃燕氏為終獻百僚或竊笑之詔名封祀壇為舞鶴臺介丘壇為萬嵗臺降禪壇為景雲臺以紀當時所見之瑞舊唐書天齊王開元十三年冬𤣥宗登封太山登封之夕凝氣昏晦迅風激烈𤣥宗出齋宫露立以請及明清霽旛旗不摇事畢至山下日又抱戴明耀五色千官稱賀其日大赦以靈岳昭感封㤗山神為天齊王元和郡國志來蘇𤣥玄宗東封車駕至岳西來蘇頓有大風從東北來自午至夕裂幕折柱衆恐張説倡言曰此必是海神來迎也上三宫岱宗之洞名三宫空洞之天茅君内傳太山名蓬𤣥空峒之天即太昊為青帝治東嶽主萬物發生考校死魂鬼神之所厯代帝王報功封禪之岳上應奎婁之精下鎮魯地之分野洞淵集鬼帥東岳太山君領羣神五千九百人主治死生百鬼之主帥也血食廟祀所宗者也世俗所奉鬼祠邪精之神而死者皆歸太山受罪考焉金雞周易是謀類曰太山失金雞鄭𤣥注曰金雞太山之精無螫虫㤗山於所經諸山最高而岑崿軒舉陵跨衆阜霞雲草木藹然靈異苑囿神竒故無螫䖝猛獸從征記奉高㤗山東岳也瀛博二縣共界漢武封禪割此縣以供祀太山故曰奉高三十里有延陵児塜丘淵之齊記嶕嶢日月之徑不千里則不能燭六合耀八紘太山之高不嶕嶢則不能浡滃雲而散歊烝客雞厪附楊喬曰猶塵附太山露集滄海雖無補益誠欵至情猶不敢嘿也謝承書賣藥崔文子㤗山人好黄老術潛居山下作黄丸賣藥有疫氣者飲藥即愈列仙傳梁甫太山在左亢父在右亢父知生梁甫知死王者封太山禪梁父開山圖華山太白降翼鶉沈以負西海其神主於華山太白位焉華山西岳華山少隂用事萬物生華故曰華山白虎通山負有池生千葉蓮花服之羽化因曰華山華山記二華西京賦綴以二華山海經太華之山削成而四方其高五千仞其廣千里小華之山其陽多㻬琈之玉注少華也神開華山對河東首陽山黄河流於二山之間古語云此本一山當河河水過之而曲行河神巨靈以手擘聞其上以蹈足離其下中分為兩以通河流今岳上有指掌之形首陽山下足跡亦存焉西京賦注有巨靈胡者徧得神元之道能造山川出江河開山圖河靈矍踼掌華蹈襄揚雄河東賦雍州鄠縣南繫頭山者其山本舟人係船其頂故以名焉昔太乙未分山海太行王屋白鹿河水停于此川號為山海及巨靈大人秦供海者患水浩蕩以左掌托太華右足􅀈中條太一為之裂河通地出山遂高顯張華賦云巨靈贔屓高掌逺蹠以流河曲是也法苑珠林四合華山記曰華山高嵓四合重嶺秀起上有石池北有石鼓父老相傳云嘗有聞其鳴者二岑華山有二岑直上數千仭自下小岑疊秀迄于嶺表有如削成􅄒征記三峯山上有三峯直上晴霽可觀謂蓮花毛女檜也山記二泉華山頂上方七里有靈泉二所一名蒲池一名太上泉上天井華山中路名天井纔容人行迃迴頓曲而上可高六丈餘山上有㣲涓細水流入井内亦不沾人出井望空視月如在室窺窻水經注蓮花峯上有三峯上接三光中有石池二十八所上應二十八宿青松緑竹叢生高岡白雲翠靄旋於幽阜懷藴金玉蓄藏風雷為大帝之别宫廼神仙之窟宅也一稱太上山昭文館記敦物華山古文之敦物山也水經注玉女華山上有明星玉女持玉漿得上服之即成仙道險僻不通詩含神霧明星玉女者居華山服玉漿白日昇天山頂石龜其廣數畆高三仞其側有梯磴逺皆見玉女祠前有五石臼號曰玉女洗頭盆其中水色碧緑澄徹雨不加溢旱不減耗祠内有玉女馬一匹焉集仙録其馬神靈異常夜聞嘶噉之聲頂上隠者常見之山志柏箭秦昭王令工施鈎梯而上華山以松柏之心為博箭長八尺棊長八寸而勒之曰昭王嘗與天神博於此韓子遺璧秦始皇三十六年鄭客從關東來至華隂望見素車白馬從山上下知其非人止而待之遂至持壁與鄭客曰為我遺鎬池君明年祖龍死史記毛女毛女者在華隂山中山客獵師世世見之軆生毛自言秦始皇宫人列仙傳石榻脩羊公魏人也在華隂山上石室中有懸石榻臥其上石盡穿䧟畧不食時取黄精食之後以道干景帝帝問公有何能公不荅即化石也題其背云脩羊公謝天子後置石羊於通靈臺羊復去不知所之上集靈宫華山下有集靈宫武帝欲懷集仙者故名殿為存仙門為望仙桓譚仙賦序有神馬自華山出帝令置内棧馬不乆留令人㝷之見在此山中谷石龕下故名藏馬谷藏馬龕東北澗中石上馬跡尚存焉山志駕鹿衛叔卿常乗雲駕白鹿見漢武帝將臣之叔卿不言而去帝悔求得其子度世令追其父度世登華岳見其父與數人博於石上勑度世令還神仙傳騎龍呼子先者漢中關下卜師夀百餘嵗臨去呼酒家嫗急裝我與汝俱去夜有仙人持二茅狗來呼子先子先持一與嫗嫗得而俱騎騎乃龍也上華隂山嘗於山上大呼言子先酒母在此列仙傳金液馬明生從安期先生受金液神丹方乃入華隂山合金液不樂升天但服半劑為地仙上玉版石季龍使人採藥下華山得玉版前燕録捫蝨王猛隠華山桓温入關猛被褐而詣之一靣説當代之事捫蝨而言旁若無人上雲臺峯嶽東北有雲臺峯其山兩峯崢嶸四靣懸絶上冠景雲下通地脉嶷然獨秀有雲臺下有穴若昔有人入此穴出東方山行云經黄河底上聞流水之聲周武帝時有道士焦道廣獨居此峯辟粒餐霞常有三青鳥報未然之事周武帝親詣山庭臨軒問道因而谷口置雲臺觀後弟子洪仙等見道廣乘一物如麟往而不返矣東南有神土巖道廣精思所感欲構房廊石上湧出神土用盡復生于今尚然壁中有仙油碽道廣毎設齋醮天降油於此磧自道廣乘麟之後此油不復見矣山志素靈宫馬周者華山素靈宫仙官也唐氏將受命太上敕之下佐於國而沈湎於酒汨沒風塵間二十年袁天綱相其將死教之隨騎牛老叟入曰叟顧見之謂曰汝本素靈宫仙官今太華仙王使人召汝即引入宫闕至簾前有宣言責之者使人送之别院中視其門則姓名在焉忽有五人服五方之衣立於前曰我皆先生五臟之神也先生酣酒流蕩濁辱於身我等乆歸此矣但閉目將復於神室也周瞑目頃之勿覺心智明悟併憶前事二十餘年若旬日之間耳貞觀中累居大任一旦群仙降其室曰佐國功成可以退矣太乙徴命無復留也翌日無疾而終仙傳拾遺祝夢裴寂初貧無以自業每徒步詣京師經華嶽廟祭而祝曰窮困至此敢脩誠謁神之有靈鑒其運命若富貴可期當降吉夢再拜而去夜夢白頭翁謂寂曰卿年三十已後方可得志終當位極人臣耳舊唐神告李靖始困於貧賤因過華山廟訴於神且請告以官位所至辭色抗厲觀者異之佇立良乆乃去出廟門百許歩聞後大聲曰李僕射好去顧之不見人後竟至端揆國史補肖華司農卿趙履温為安樂公主繕治累石肖華山隥彴横斜回淵九折以石瀵水唐書金天王𤣥宗乙酉嵗生以華岳當本命先天二年七月正位八月癸丑封華岳神為金天王舊志嶽神迎謁車駕次華隂上嶽神見數里迎謁遂召諸巫問神安在獨老巫阿馬婆奏云在路左朱􅀢紫衣迎候陛下上顧笑之上至廟見神􅐤鞬俯㐲庭東南大柏樹下又召阿馬婆問之對如上見上加敬禮仍自書製碑文以寵異之其碑五十餘尺闊丈餘厚四尺天下碑莫比也傳信記詞云太華山者踞中土西偏當七官正位左抱桃林之塞右産藍玉之田諒少昊之下都即蓐收之别館也軒帝逰焉以㑹衆神虞帝柴焉以觀羣后下有方士真人金鼎石室上有明星玉女仙草瑤池文粹甕肚峯華嶽雲臺觀中方之上有山崛起半甕之狀名曰甕肚峯上賞望嘉其高逈欲於峰腹大鑿開元二字填以白石令百餘里望見諌官上言乃止傳信記生金李適之嘗與李林甫爭權不協林甫隂賊好䛕謂適之曰華山生金采之可以富國顧上未之知適之性疎信其言他日從容為帝道之喜喜以問林甫對曰臣知之舊矣顧華山陛下本命王氣之舎不可以穿治故不敢以聞帝以林甫為愛己而薄適之不親唐書七日上計趙郡李湜以開元年謁華岳廟過三夫人院忽見神女悉是生人邀入寶帳中迭與結歡臨訣謂湜曰每年七月七日至十二日岳神當上計於天至時相迎無宜辭讓今者相見亦是其時故得盡歡爾自爾七年每與之㑹問以官云合進士及第終小縣令皆如其言廣異記致書北海開元初有三衛自京還青州至華嶽廟前有一婦人容色慘悴曰已非人華嶽第三新婦夫壻極惡家在北海三年無書信聞君逺還欲以尺書仰累海池上第二樹但扣之當有應者言訖訣去及至北海如言送書讀書大怒乃傅教西伐華山命左右取絹二疋贈使者三衛後至華隂復遇前婦人拜謝曰三郎怒君違書將兵於潼関相害且可還京不乆大駕東幸鬼神懼鼓車君若坐於鼓車則無慮也後數日𤣥宗是幸洛三衛隨鼔車出關廣異記登華山韓文公登華山之巔顧視其窮極幽險心悸目眩不能下發狂號哭投書於家人别華隂令百計取之方能下國史補登蓮華峯王𤣥仲欲登蓮華峯約寺僧到峯頂當起煙為信翌日持火而登僧侯之數日果有煙起留二旬乃復下僧問之云峰頂有池䓧蓞盛開可愛其中又有破銕舟存焉三水小牘拜山東夷有識山者徧拜五嶽一拜而退惟入望関華山自關西門拜禮至山下仰望七日嘆咤而去謂京師衣冠文物之盛由此而致語林訊嶽靈樂坤舊名冲累舉不第元和十二年罷舉東歸至華隂夜禱嶽廟以卜進退之計中夜忽夢一青綬人檢簿書來報云來年有樂坤名已到𡨕簿不見樂冲也冲遂改為坤來年如其説春闈後經嶽折謝又祝官位主簿夢中稱官厯四資郡守而已乃終於郢州雲淡友議太山上元二年更華山曰太山寶應元年復故名地理志太極總仙華山名太極總仙之天即少昊為白帝治西岳上應井鬼之精下鎮秦地之分野洞天記衡山熒感星紀鶉尾以負南海其神主乎衡山熒惑位焉寶洞南岳衡山朱陵之靈臺太虗之寳洞上承􅁳宿銓徳鈞物故名衡山下踞離宫攝位火鄉故號南岳赤帝館其嶺祝融宅其陽威神堂堂䕃映峩峩是以宅藪神靈室宇仙羅南岳記宿當軫翼度應機衡故曰衡山山有錦石斐然成文相中記岣嶁衡山俗名岣嶁山海注湘中記岣嶁山有玉牒禹案其文以治水上有禹碑韓愈詩岣嶁山尖神禹碑宇青石赤形墓竒􅈞霍為副南岳周廻八百里回雁為首麓為足岳南岳記衡山一峯極高雁不能過遇春北歸故名迴雁或曰峯勢如鴈之回故名地記杜荀鶴詩猿到夜深啼嶽麓㕐知春信别衡陽五峯衡山軒翔聳拔九千餘丈尊卑差次七十二峯巖洞溪澗泉石之勝交錯於中又有數十洞十五巖三十八泉二十五溪九池九潭六源八洞九井三穿三漏此最著者七十二峯最大者五芙蓉紫盖石廪天柱祝融而祝融為最高長沙志三峯衡山有三峯其一名紫盖天景明徹有一雙白鶴徊翔其上一峯名石囷下有石室中聞常諷誦聲一峯名芙蓉峯最為竦桀自非清霽素朝不可望見峯上有泉飛𣲖如一幅絹分映青林直洷山下九向衡山九疑皆有舜廟遥望衡山如陣雲淞湘千里九向九背乃不復見湘中記石囷劉驎之好逰山澤採藥至衡山深入志返見有一澗水水南有二石囷一開一閉水深不可過欲還失道遇伐弓人問途僅得還家或説囷中皆仙靈方藥驎之欲更㝷終不復知處晉書執筆湘東姚祖太元末為郡吏經衡山望巖下有數年少並執筆作書祖謂是行侶休息乃枉道過之未至百許步少年相與翻然飛颺異苑憇與姑洗之旬始暨於衡岳於是假足輕輿宵言載馳憇輿素石映濯水湄仰瞻翠摽邈爾天際身凌太清獨交霞景桓𤣥遊山序詩執書初有採藥衡山見一老翁四五年少對坐執書荆州記結宇宗炳尋名山西陟荆巫南登衡岳因結宇衡山欲懷尚平之志宋書異人授術申太芝元之去俗脩道嘗登南岳遇異人授金丹火龍之術遂能乗虗神逰隠顯出入不可測天寶初奉詔祭羅浮訪㝷朱明洞得之道遇異人告以九疑山舊有天樂一部嵗乆化五野猪郡人捕之又化五古器太芝徃來亦訪得之扣之音律相和謂其徒曰此必有異後二十年當有應者及安祿山反形腯如豕俗謂猪龍嘗竊棃園樂部於凝碧池上奏之時謂䜟驗云仙傳願隠崔圓李輔國以李泌為肅宗所親信疾之泌畏禍願隠衡山有詔給三品祿賜隠士服為治室廬唐傳泌於衡嶽寺讀書懶殘所驚曰非凡人也中夜潛徃謁焉懶殘命坐發火出芋以㗖之謂泌曰慎勿多言領取十年宰相泌拜而退後居相位薨其月中使林逺於藍關逆旅遇泌竒騎常服言暫徃衡山話三朝之舊慘然乆之而别逺到長安方聞其薨鄴侯家傳游岳祠杜甫大厯中出瞿唐下江陵泝沅湘以登衡山因客耒陽岳祠唐書仙山李白送林公遊衡岳江南之仙山黄鶴之爽氣又登祝融之峯巒望長沙之煙火為宗五岳於中州衡山最逺南方之山巍然高而大者以百數獨衡為宗最逺而獨為宗其神必靈廖師郴民而學於衡山送廖道士序火維韓愈衡廟詩火維地荒足妖怪隂氣晦昧無清風潛心黙禱若有應豈非正直能感通湏臾静掃衆峯出仰見突元撐青空紫盖連延接天柱石廩騰擲堆祝融東坡潮州廟碑云公之精誠能開衡山之雲太虗天衡山洞名朱陵太虗之天即神農為赤帝治南岳者昔上帝降玉冊寶印賜注生真君永鎮靈岳即吾皇北夀之山上應翼軫璣衡之精故云衡山下鎮楚地之分野泂淵集鶴舞衡山有懸泉滴瀝嵓間聲泠泠如絃有白鶴迴翔其上如舞湘中記􅈞霍為副衡山者五岳之南岳也其來尚矣至於軒轅乃以􅈞霍之山為副焉故爾雅云霍山為南岳盖因其副焉至漢武南巡又以衡山夐逺䜟記皆以衡山為岳乃徙南岳之祭于廬江􅈞山此亦承軒轅副義也南岳記天柱天柱謂之霍山廣雅其山上侵神氣下固窮泉開山圖養物南岳謂之霍霍者䕶也言陽氣用事盛夏之日䕶養萬物故以為稱三禮義宗雲師雨虎霍山南嶽有雲師雨虎注雲師如蚕長六寸似兎雨虎如蛹長七八長似蛭雲雨之時出在石上肉甘可以熟而食之開山圖神水武帝徙南岳之祭於廬江潛霍山之上無水廟有四鑊可受四十斛至時祭水輙自滿用之足了事畢即空塵土樹葉莫之汙也積五十嵗嵗作四祭後但作三祭一鑊自敗捜神記出鐘廬江霍山數年來嘗有鐘聲十二潜發重壤帝將征關洛山崩有六鐘自出制度合式聲中律呂古上有古文書一百六十字宋書司命府霍山下有洞臺方三百里司命君之府也黄庭内景經恒山辰星大梁柝木以負北海其神主於常山星辰位焉并鎮周官并州其鎮山曰恒山𤣥岳恒山謂之𤣥岳水經昴畢散昴畢間為天􅀈散為冀州分為趙國立為常山有下有祠有安天王元命苞五名北岳有五别名一曰蘭臺府二曰列女宫三曰華陽臺四曰紫㣲宫五曰太乙宫或云大茂山括地志常山恒者常也萬物伏藏于北方有常也風俗通北方為恒恒者常也隂終陽始其道常乆故曰常山白虎通茂丘茂丘茂山也盖恒岳之别名𣲖水從西來甚大至茂山之西沈㐲于地過山而復出其大如初世言避恒岳之靈陽固北都賦四種五穫其山北臨代南俯趙東接河海之間早生而晚殺五穀之所蕃熟四種五穫焉管子太𤣥之泉恒山上有太𤣥之泉神草十九種服之可度世五缶圖天神貴客崔嵬北嶽天神貴客温仁正直主布恩徳易林安王石舜時十有一月巡狩北岳詣大茂山谷值大雪不能進而遙祭之忽廟之右飛一石冉冉而墜帝前名曰安王石又五載巡狩其石飛于曲陽建廟祀之蓬蔂昌容者常山道士自稱殷女食蓬蔂根徃來山下見者二百餘年顔色如二十許人列仙傳趙符趙簡子告諸子曰吾藏寶符于常山上先得者賞諸子馳之常山上求無所得無恤還曰已得符矣從常山上臨代代可取也簡子知其賢以為太子史記燕王慕容儁夀光二年常山寺大樹根下得璧七十珪七十三光色精竒有異常玉儁以為神岳之命以太牢祠之前燕録置祀禮神道武立廟於其上置大祀九十人嵗時所禱水旱至文成帝東巡親禮其神焉後魏書隂岳邁厯恒巒路隣隂岳惟靈作鎮出納炎水帝道資功坤儀慿徳魏孝文祭文靈山惟靈山之秀峙亘朔野而摽竒絶璧千尋孤峯萬仞桂華侵月松羅挂雲幽澗冬暄飛泉夏冷寶符臨代邦之美靈蛇表陣勢之竒唐太宗祭文乾門坤軸包括綿長經綸中外外夷有四昴宿主胡則延袤以限之中郡有五寶符在代則高襄以臨之其頂也上扶乾門黒帝之宫觀其足也下捺坤軸𤣥神之都府文粹張嘉貞碑鎮岳定州曲陽本恒陽元和十五年更名是年又更恒岳曰鎮岳有岳祠地理志總𤣥天􅁪山洞名太一總𤣥之天顓頊為黒帝治北岳上應畢昴之精下鎮燕地之分野主五穀蕃熟之司五岳神名太山君神姓圓名常龍衡山君神姓丹名靈峙華山君神姓浩名鬱狩恒山君神姓登名僧嵩山君神姓夀名逸羣呼之令不人病龍魚河圖姓名東岳姓𤣥丘名目陸南嶽姓爛名洋光西嶽姓浩嶽名元倉北嶽姓伏名通萌中嶽姓角名普生七籖佐命太山君羅浮括蒼佐命衡山君黄帝所命霍山潛山為儲嵩高山君少室武當佐命華山君地胏女几佐命恒山君河逢抱犢佐命五岳圖序將軍太山將軍姓唐名臣霍山姓朱名丹華隂姓鄒名尚恒山姓莫名恵嵩高山姓石名𤣥恒存之却百邪龍魚河圖海上五岳廣乗山廣乗山者天之東岳也在東海之中為五岳發生之首上有碧霞之闕瓊樹寒林紫雀翠鵉碧藕白橘莫可名狀即青帝天君靈威仰仙官統兵吏萬衆鎮此山上主嵗星之精居九氣青天之内矣長離山長離山者天之南岳也在南海之中上有朱宫絳闕赤室丹房朱草紫芝霞膏金醴若可名狀應天下初得道神仙皆詣此宫營形浴質肖隂煉陽為長生乆視之道即赤帝天君赤熛怒統領仙官神吏萬衆鎮此山上主熒惑之精居二氣丹田之内矣麗農山麗農山者天之西岳也在西海之中上有白華之闕三素之城玉泉之宫瑤林瑞獸莫可名狀即白帝天君白招拒統領仙官神吏鎮此山上主太白之精居七氣素天之内矣廣野山廣野山者天之地岳也在北海弱水之中形如崑崙鄷都羅山合為隂氣之主上多瓊樓寶闕金液龍芝莫可名狀即黒帝天君叶光紀統理仙官神吏鎮此山上主辰星之精五氣𤣥天之内矣崑崙山崑崙山者天之中岳也在八海之間上當天心形如偃盖上廣下狹三成而上與天齊日月黄赤二道交㑹其上三光行焉東曰崑崙西曰𤣥圃北曰浪苑南積石山大石山水泉山北戸山四靣各萬里一土有瓊華之闕光碧之堂瑶池翠水即西王母統衆仙居焉海中四岳為枝幹十洲四島八海大川圍繞其側絶頂之上有金臺五所玉樓十二金城千里地生金根之樹瓊柯瑶林紫雀翠鸞碧桃白李百寶妙岩莫可紀述即黄帝天君含樞紐統領天大聖衆鎮此山皆與五岳名山相連常有神仙徃來生校生籍上主鎮星之精居於中元一氣天中焉其海外之五岳即五氣之宗祖矣雲笈七籖石土精土精於石石氣之核也氣之生石猶人經絡之生爪牙也物理論地骨地以石為之骨慱物志隂精補陽周易艮為山為小石石隂中之陽陽中之隂隂精補陽故曰含石石之為言託也託立法也春秋説題觧山體山體曰石石硌硌也堅捍硌也山多大石曰礐礐學也大石之形學學然山多小石曰磝磝堯也每石堯堯獨處而出見也礫小石也什名磊衆石也碭文石也説文琅玕石似珠也經注碔砆石似玉也廣雅水沫為浮石抱朴子石觧散曰􅘧周禮嘉肺石周禮曰大司冦以嘉石平罷民有罪者坐諸嘉石以肺石達窮民凡㷀獨老㓜之欲復於上而未達者立於肺石注曰嘉石文石也肺石赤石也啟母石禹娶塗山治鴻水通轘轅山化為熊謂塗山氏曰欲餉聞鼔聲乃來禹跳石誤中鼔塗山氏徃見禹方作熊慙而去至嵩山高下化為石方生啓禹曰歸我子石破北方而生啟淮南子禹産於䃂石啟生於石隋巢子雨石武王伐殷得二大夫而問之曰殷國將亡亦有妖乎其一人對曰殷國常雨血雨灰雨石小者如雞子大者如箕武王曰大哉妖也六韜采石天子升于采山之山於是取采石鑄以成器穆天子傳石言石言於晉魏榆晉侯問於師曠曰石何故言對曰石不能言或慿焉不然民聽濫也抑臣又問之曰作事不時怨讟動於民有則非言之物而言今宫室之侈民力雕盡怨讟並作莫保其性石言不亦宜乎左昭三説苑晉平公築虒祁之室石有言者平公問云云隕石左傳曰隕石於宋五隕星也注曰但直言星則嫌星使石隕故言隕星史記始皇三十六年星墜于東郡至地為石或刻其文曰始皇死而地分始皇盡誅石旁人燔銷其石煑石卭䟽者周封史也能行氣錬形煑石髓而服之謂之石鍾乳至數百年往來入太室山中有卧石床枕焉列仙傳跪石范蠡吠于狗竇文種聞而拜之鮑龍跪石而吟仲尼為之下車聖賢觀察不待而功而知之也劉子知人燕石宋之愚人得燕石於吾臺之東歸而藏之以為大寶周客聞而觀焉主人端冕衣服以發寶華匱十重緹市十襲客見之盧胡而笑曰此燕石也與瓦甓不異主人大怒藏之愈固十山海經燕山多嬰石注云似玉有符彩嬰帶所謂燕石者石行周赧王二十年齊東有二石高三丈餘相從而行如海數百步春秋後傳五婦梓桐縣有五婦山昔秦王獻五美女於蜀王蜀遺五丁迎之至此五女見大蛇入山室中五丁引蛇大呼山崩五女上士化為石蜀記黄石張良見老人出一篇書讀是則為王者師後十三年見我濟北穀城山下黄石即我也良後果得黄石寶而祠之及死并𦵏黄公臈祀之史紀孟津河東去鄴城五里有濟北郡穀城縣有穀城山是黄石公所𦵏庭有人登此山見崩土中有文石石丈鮮明虎使採取以治宫殿又免穀城令不奏聞故也鄴中記為磬廣漢有青石山九州要記云此山音石天下無加于此可為磬李膺益州記云昔巴蜀爭界厯不嵗決漢高八年一朝宻霧山自裂自上至下開數尺若引繩焉於是州界始判巴蜀之民懼天責罰乃息所爭因為立祠民將採石必先祀之寰宇記燕銜竇太后在家嘗有白燕銜石大如指墮后績筐中后取石割為二中有文曰母天后地乃合之遂不復開後為皇后常并置璽櫝中號曰天璽也西京雜記馬肝元鼎中條支國貢馬肝石以和丸轉丹􅄠白者以此石拂之應手而黒洞𡨕記潛英李夫人死武帝常思夢一見之欲李少君言能致其神啟帝曰黒海北對都之野出潜英之石其色青輕如毛羽寒盛則石温夏盛則石涼刻為人像神悟不異真人乃求得之命工刻作夫人形置之幙裏宛若生時帝大悦欲近之少君曰此石毒可望不可迫也拾遺記碣石地理志曰大碣石山在右北平驪城縣西南武帝嘗登之以望巨海而勒其石於此今枕海有石如甬通數十里當山頂有大石如柱形徃往而見丘於巨海之中潮水大至及潮波退不動不没不知深淺世名之天橋柱也韋昭亦指此以為碣石也水經注化石臨賀溤乗縣東五里有故縣廟相傳淮南王安漢被誅其子奔迸來至一夜忽化為石人當縣門而立百姓恠而觀之其迫察者手足無不瘡爛荆州記石立昭帝元鳳時太山萊蕪山南有大石自立三石為足石立處有白鳥數千集其旁眭孟以為石隂類下民象太山岱宗之嶽王者易姓告伐之處當有庶人為天子者孟坐伏誅五行記哀帝時無鹽危山土自起覆草如馳道伏又報山石轉立東平王雲及后謁自之石所祭治石象瓠山立石束倍草并祠之知災異者高尚云石立宣帝起之表也息夫躬告之王自殺后謁棄市本傳支機成都卜肆支機石即海客自天河所得織女令問嚴平君者也太尉燉煌公好竒命鐫取一片欲為器用鐫刻之際工忽風瞀墜于石側者三公知其靈遂至止今則亦玉焉靈驗記互見天吞文石五鹿充宗授學於彌成子彌成子嘗遇人以文石如卵授之成子吞之遂聰悟後成子病吐出此石授亢宗吞之又為名學西京雜記孝子石隗相叔通􅈎道人也性至孝母毎食欲江中正流水相冬夏汲之一朝有横石生正流中叔通因之以汲江中有石號孝子石蜀記相哀帝世舉孝廉平帝時為郎華陽國志燒石虞詡為武都太守下辯東三十餘里有峽中當泉水生大石障塞水流每至春夏輙溢没秋稼壞敗營郭詡乃使人燒石以水灌之石皆坼裂因鐫去石遂無泛溺之患也續後漢書鵲化張顥為梁相新雨後有鳥如山鵲飛翔近地令人擿之墮地化為圓石顥命椎破得一金印文曰忠孝侯印靈帝時為太尉捜神記陣圖沔陽城泝漢上十五里有諸葛武侯所鎮在漢水南背山向水門前累石以為鎮水至壞其行列水去輙復故梁川記磨石魏文在東宫宴諸文學使甄夫人出拜劉禎仰觀之武帝怒罰令徒作后帝至尚方閲視禎坐磨石不動太祖問石如何性禎曰石出荆山懸巖之巔内含卞氏之珍磨之不加瑩雕之不增文武帝曰名豈虗哉文士傳石英明帝增崇宫殿雕鏤觀閣鑿太行之石英採穀城之文石起景陽山於芳林園建昭陽殿於太極之北魏志今作洛陽宫殿取白石工人鑚山索異石鑿石求雲母勞役之事莫過於此也魏名臣奏連理太山下有連理文石高十二丈狀如柏樹其文彪發似人雕鏤自下及上皆合而中開廣六尺望若真樹也父老云當秦末二石相去百餘步蕪沒有無蹊徑及明帝之始稍覺相近如雙闕土石隂類魏為土徳斯為靈徴拾遺記討曹明帝青龍三年張掖郡氐池縣大栁谷口夜激波涌溢其聲如雷曉而有蒼石立水中白石畫之為馬牛等形其文曰大討曹帝惡其討也使鑿去為計以蒼石塞之宿昔而白石滿焉至晉初其文愈明焉象皆煥徹如玉焉漢晉春秋文石為瑞馮乗縣有秦山孫權僣稱尊號之時此山夜忽有聲如雷因發洞穴其間可六七里其中石有文采又有石柱石鼔石彈丸郡上言之權以為祥瑞荆州記文理成字鄱陽厯陽縣有石山臨水高百丈其三十丈所有七穿駢羅穿中色黄赤不與本體相似俗相傳謂之石印又云石印封發天下當太平下有祠屋巫祝言石印神有三郎時歴陽長表上言石印發皓遣使以太牢祭厯山巫言石印三郎説天下方太平使者作高梯上看印文詐以朱書作二十字石云楚九州渚吳九州都揚州士作天子四世治太平始遷以啟皓皓大喜曰吳當為九州作都渚乎從大皇帝逮孤四世矣太平之主非孤復誰重遣使以印綬拜三郎為王江東傳石樹天璽元年臨海郡吏伍曜在海水際得石樹高二尺餘枝莖紫色詰曲傾靡有光采山海經所載王碧樹之類也宋志鬱林石陸績孫權初為鬱林太守罷秩而歸不載寶貨舟輕不可越海用巨石重之至姑蘓置其門人號鬱林石傳載石子介象字元則㑹稽人入山求神仙見谷有石子皆紫色大如雞子象取二枚見一美女被服五采象叩頭乞長生女曰急送汝于中物還着故處象送石還女授以還丹方一首神仙傳石髓嵇康遇邯鄲人王烈烈自言一百餘嵗共入太行山得石髓飴即自服半餘半與康皆凝而為石室中見一巻素書呼吸康取輒不見城榮緒晉書神仙五百年輒開其中石髓出得而服之夀與天相畢神仙經鳴石武帝時吳郡臨平岸崩出一石鼓打之無聲以問張華華曰可取蜀中桐材刻作魚形扣之則鳴於是如言扣之聲聞數十里異苑永康元年襄陽郡上鳴石似玉色青撞之聲聞七八里今零陵泉陵縣永正鄉有鳴石二所其一鼓狀如俗因名為石鼓山海注燃石豫章有石黄白色而理疎以水灌之便熱加鼎於上炊足以熱冷則灌之雷煥以問張華華曰燃石也出異物志祠石陳總遷殿中侍御史遣詣終南山請雨總先除小石祠唯存大石一所而祈之祈文曰峩峩大石佐岳通理含滋吐潤恵我四海王隱晉書文如竹葉江東太廟門北有石文如竹葉宋文帝元嘉中修廟所得陸澄以為晉武孝時郊禖石通典石來晉恵永寧中湖熟縣湖中有大石去渚二百步浮來登岸百姓驚觀或曰石來明年石氷入揚州丹陽記白㸃成宿張軌永嘉元年如姑臧送𤣥石白㸃如星成二十八宿前涼録石笥豫章縣東鄉吕里山中有石笥厯代不能開吳猛遂得發之多有石牒古字弟子莫有曉者猛亦不言弟子數十人合力舉盖不動如山猛亦平提若無重焉縣南山有石直立水中峻􅔌千仞猴猿不能致猛乃䇿梜升之令二弟子隨後忽若平路吳猛别傳石生日月初鄉里所居原丘地中石生日月馬勒鐡騎之象于時父老相者皆云此胡竒貌有大志其終不可量邑人厚遇之石勒别傳採石石季龍立河橋為雲昌津採石為中濟石無大小輒隨流用工五百餘萬不成季龍遣使致祭沈璧於河俄而所沈璧流于渚上地震水波騰上津所樓殿傾壞壓死者百餘人録異記礪齒孫子荆謂王武子曰當枕流潄石玉臼石非可漱流非可枕孫曰枕流欲洗其耳漱石欲礪其齒晉書浮水上赫連勃勃大有青石大如馬頭浮水上逆流而行行人見而送人羣臣咸賀以為石者沈物浮水者自出之義而上行荆吳入朝之象勃大悦前趙録醉石陶淵明所居栗里有大石淵明嘗醉眠其上名曰醉石廬山記兆祥宋元嘉七年五月武陵洪水善徳山崩两石高丈餘如人雕刻精竒形備古制式占者云武陵出天子其時八月孝武始誕後封武陵王即帝位洽聞記錦石錦沙村傍山依壑素波澄映錦石舒文冠軍吳喜聞之而造焉鼓枻㳺泛彌旬忘返歎曰名山美石故不虗賞使人䘮朱門之志新安記着符魏貞君五年張掖郡列言氐池縣大栁谷山大石有青質白章間成文字記國家祖宗之諱著受命歴數之符乃遣使圖寫其文羣臣奏曰斯乃上靈降命國家無窮之徴也靈徴八風黒石太和中造太和殿于平成殿之東階下有一碑石亦是洛陽八風谷之緇也水經出血玉琴卒后墓門前有石人獅子子賢寒㣲賣與氾氏致牛破牛死氾氏就打破皆血出敦煌實録靈石永明七年主書朱靈讓於浙江得靈石十人舉乃起在水深三尺而浮世祖親投于天淵池刻之試為佛像南齊志越王石虞愿為晉平太守海邉有越王石常隠霧雲相傳云清亷大守乃得見愿徃觀清徹無隠蔽齊書胏石梁天監初詔于公車府謗木胏石傍各置一函有龍蛇方懸才高抱歎豪門陵賤若欲自申並可投胏石函五年詔曰朕昧旦齋居惟刑是恤三辟五聽􅃦興載懷故陳胏石于都街增官司于詔獄本紀到公石到溉居近淮水齋前山池有竒礓石長一丈六尺梁武戲與賭之并禮記一部溉並輸焉召即迎置華林園宴殿前移石之日都下傾城縱觀所謂到石公也南史梁書無礓字實舸江草自會稽丞除都宫尚書將還贈遺一無所受依舊訂舫革並不納維乗臺所給一舸舸艚偏欹不得安卧或謂革曰船既不平濟江甚險當移徙重物以迮輕艚革既無物乃于西陵岸取石十餘許以實之梁書三侯徐陵後堂竪美人山銘曰峯因五婦石是三候海録三品臺城同㤗寺前四石各高丈餘陳之三品石也楊樹形周宣帝大定永州得白石二年割而為兩段中有楊樹之形黄根紫葉廣五行記變玉隋相州刺史内陽公薛胄所居堂礎忽變為玉胄謂為善徴也設齋慶之釋靈裕云斯琉璃耳宜慎之戒之可禳之以福胄不從其言後矣楊諒起逆事有相縁乃流之邉裔追悔晩矣續高僧傳釣臺石大業七年二月初造釣臺之時多運石者將船兵丁困弊於役嗟歎之聲聞於道路時運石者將船至江東岸山下取石累構為釣臺之基忽有大石如牛十餘自山頂飛下直入船内如人安置船無傷損大業拾遺青石丹書唐齊王元吉于晉陽宫獲青石若龜形文有丹書四字曰李淵萬吉元吉遣使獻之文字映徹宛若龜形見者咸異焉高祖曰令水漬磨以驗之其字愈明於是内外畢賀高祖曰上天明命貺以萬吉宜以少牢祀石龜而酧送之禎石太宗以武徳九年八月即位九月壬戌林州獻禎石隠起成文曰聖主某大吉子孫五千嵗素質𤣥字篆隸相參冊府青質白文貞觀十七年八月涼州昌松縣鴻池谷有石青質白文成字太宗遣使祭之曰天有成命表瑞貞石文字昭然厯數惟永五行志鳴石顯慶四年漁人於江中網得一青石長四尺濶九寸其色光潤異於衆石懸而繫之鳴聲清越行者聞之莫不駐足都督滕王表送納瑞府豫章記漁人網得一石甚鳴擊之聲聞數十里道王為洪州刺史破之得劍一雙視其銘一有許旌陽字一有萬仞字遂有萬仞師出焉朝野僉載唐書道王元慶未為洪州盖元嬰事誤盤石薛元超道衡孫也轉中書舎人省中有一盤石道衡為侍郎時嘗據而草制元超每見輒泫然流涕唐書偽石雍州永安縣人唐同㤗于洛水中得瑞石一枚上有紫脉成文云聖母臨朝永昌帝業進之授五品果毅置永昌縣乃是將石鑿作字以紫石末和藥嵌之後并州文水縣于谷中得一石還如此有武興字改文水為武興縣自是徃往作之后知其偽不得採用乃止國史補李嶠賀表云人稱同㤗縣實永安姓氏將國號𤣥符土地與石文相應英華魏王武承嗣偽造瑞石文云舊唐云書石連理永昌年中台州司馬孟詵奏臨海水下馮義得石連理樹三株皆白石洽聞記瑞石樊文進瑞石武后暴石朝堂示百官馮元奏常云偽妄不可以示羣臣后怒出為隴州刺史唐書赤心則天時有人於洛水中獲白石數㸃赤詣闕輙進諸宰相詰之對云此石赤心所以來進李昭徳叱之曰此石赤心洛水中餘石豈能盡反耶左右皆笑上祝石中宗為天后所廢於房陵仰天而歎心祝之因抛一石於空中曰我復帝此石不落其石遂為樹枝勾掛至今尚存獨異志化麵𤣥宗時王倕奏武威郡番禾縣嘉瑞鄉天寶山周迴五六里石化為麵在近村閭及諸部落自今載正月以來取食甘美益人孫逖表云豈來麰之足方何雨粟之能喻英華太和四年八月太原節度使栁公綽奏雲蔚代三州山谷間石化為麵人取食之唐㑹要蹶石開元年李嗣業討勃律通道葱嶺有大石塞隘以足蹶之抵窮谷識者以為至誠所感云唐書落星石秘省内落星石薛稷畫鶴賀知章章書郎餘令畫鳳相傳號為四絶南部新書寳符開元末於𢎞農古函谷闗得寳符白石赤文正成桑字識者解之云桑者四十字也八所以示聖上御歴數也及幸蜀之來嵗四十八矣得之時天下歌之遂改年天寳開天傳信鐵􅲱李齊物天寳初為陕州刺史開砥柱之險堅石中得古鐵犁鏵有平陸字因改河北縣為平陸縣上石魚開寳四年黔南上言江心有石魚見上有古記云廣徳元年二月大江水退石魚見部民相傳豐稔之兆廬陵異物志涪州鑑湖上流有石刻雙魚皆三十六鱗一銜萱草一銜蓮花魚見則年豐山川異紀履石釋明瓉居南岳一日刺史祭岳脩道路極嚴忽中夜風雷一峯頺下其縁山磴道為大石所攔乃多用人牛推挽物力竭而石愈固瓉曰我始去之遂履石而動忽轉盤而下聲若震雷太守奉如神明唐髙僧傳靈石僕固懷恩以叛入回紇沒其家入後宫大厯四年封其女為崇徽公主下降可汗道汾州以手掌托石壁遂有手㾗今靈石有崇徽公主手痕碑廣川書跋墜石李師誨兄弟于衲僧處得落星石一片僧云蜀于路早行見星墜于前遂掘之得一片石如斷磬其石端有雕刻狻倪之首亦如磬有孔穿縧處尚光滑豈天上奏樂器毁而墜與此石流傳安邑李吉甫宅中尚書故實載石顔真卿晚年嘗載石以行礱而藏之遇事以書隨其所在留其所鐫石石走寶厯元年資州資陽縣山有大石忽然吼踴下山越澗却上坡可百步其石走時有鋤禾人見之各手執鋤趕至止所其石高二丈抛石太和初滄景節度李同捷叛王知興帥兵討之同捷遣能言者登城罵知興有一卒曰此可用抛石擊去其首乃具抛發一石正中其首隨石迸落軍中歡呌城上飛動知興賞之千金獨異記卯石常侍崔元亮在洛中嘗閒步涉岸得一石子大如鷄卵黑潤可愛玩之行一里劃然而破有鳥大如巧婦飛去酉陽雜爼遺石白居易東都所居履道里䟽沼種樹搆石樓香山鑿八節灘新唐𢎞農楊貞一與青石三方長平滑可以坐卧舊太和九年山客贈余盤石轉致履道里第時屬炎暑坐卧其上愛而銘之曰質凝雲白文拆煙碧長慶集天竺白樂天罷杭州得天竺石一華亭鶴二蘇州得太湖石五折腰菱俱置千里苐池上舊唐掘石有宇甘露事敗王璠舉家無少長皆死初璠在浙西繕城壕役人掘得方石上有十二字云山有石石有玉玉有瑕瑕即休璠視莫知其㫖京口老人講之曰此石非尚書之吉兆也尚書祖名崟崟生礎是山有石也礎生尚書是石有玉也尚書之子名瑕休休絶也庸作吉徴果赤族舊書嘉石牛僧孺開成初留守東都治第洛陽之歸仁里多致嘉石美木與賓客相娱樂唐書太湖石竒章公嗜石其僚吏鎮守江湖者乃獻瑰納竒公于東第南墅列而致之㳺息之時與石為伍石有族聚太湖為甲羅浮天竺之徒次焉大有大小其數四等以甲乙丙丁品之毎品有上中下各刻于石隂曰牛氏石甲之上丙之中乙之下百仞一峯千里一瞬此所以為公適意之用也長慶集蛀蚛有達僚差軍將於浙西買太湖石軍將申狀云前件石蛀蚛不堪買盧氏雜説禮星石賛皇公平泉庒有禮星石縱廣一丈長尺餘有文理成斗極象獅子石高二三尺孔竅千萬遞相通貫其狀宛如獅子首尾鼻眼皆具全賈氏談録平石李徳裕平泉庄去洛城三十里卉木臺榭若造仙府有虗檻前引泉水縈迴疏鑿像巴峽洞庭十二峯九𣲖迄干海門江山景物之狀竹間行徑有平石以手摩之皆隠隠雲霞龍鳳草樹之形㩀談録醒酒石李徳裕於平泉别墅採天下珍木恠石為園池之玩有醒酒石徳裕尤所寶惜醉即踞之唐餘録河南長春殿南有婆羅亭貯青石處世傳李徳裕醒酒石以水沃之有林木自然之狀今謂之婆羅石河南記徳裕平泉山居記曰鬻平泉者非吾子孫也以平泉一樹一石與人者非佳子弟也會昌一品集唐莊宗時張全義為四鎮節度有監軍嘗得平泉醒酒石徳裕孫延古託全義復求之監軍忿然曰自黄巢亂後洛陽園宅無復能守豈獨平泉一石哉全義嘗在巢賊中以為譏已大怒奏笞殺之五代史平泉醒酒石昔為玉清昭應宫所取昭應焚蕩仁宗分其地賜濮潞潭越韓冀六王冀王之子丹陽郡王守節得其園地發土得巧石前後㡬萬塊多竒塊異狀醒酒石居其一有紋繞刻字云韓王抱清輝閒庭目瀟灑塊然天地間自是孤生者長慶癸夘嵗二月景盛題紹聖中輦歸禁中置宣和殿張右丞徴澹岩集平泉石李徳裕平泉莊天下竒異珍恠靡不畢置日觀震澤巫嶺羅浮桂水嚴湍廬阜漏潭之石在焉台嶺八公之怪石巫峽嚴湍琅瑘臺之水布于清渠之側仙人跡鹿跡之石列于佛榻之前㤗山石兖州從事所寄羅浮石畨禺連帥所遺漏潭魯客見遺釣石友人處求得者一品集又有思平泉似鹿石詩長石于季友為利州刺史時臨江有一寺寺前漁釣所聚有漁子下網舉之覺重壞網視之有一石如拳因乞寺僧置于佛殿中石遂長不已經年重四十斤張司封員外入蜀時親覩其事酉陽雜爼松風石㑹昌初夫餘國貢松風石方一丈瑩徹如玉其中有樹形若古松偃盖颯颯焉而涼飈生於其間至盛夏上令置諸殿内稍稍秋氣颼颼即令撤去杜陽雜編松化石馬自然大中時永康縣東天寶觀觀有古枯松湘指之曰此松已三千餘年即化為石自後松果化為石忽大風雷震石倒側作數截楊發自廣州節度責授婺州刺史性尚竒異乃徙兩截就郡齋兩截致之龍興寺九松院各高六七尺徑三尺餘其石松皮鱗皴今猶存焉續仙傳陸龜蒙二遺詩序越之東陽多名山永康之地亦蟬聯其間中饒古松徃徃化而為石盤根大柯文理具析好事者攻而置人間以為耳目之異太山羊振文得枕材趙郡李中秀得琴薦皆茲石也咸以遺予以二遺之竒賦詩以謝松陵集得金釵夏侯孜為宣宗山陵使開貞陵鑿皇堂深及袤丈於堅石中得折金釵半股其長如掌餘尚銜石中工乃抉取以獻孜孜以􅃦園方近其事稍異因隠而不奏唐闕史碑忽自鳴華岳金天王廟𤣥宗御製碑廣明初其石忽自鳴隠隠然聲聞數里浹旬而後定明年巢冦犯闕其廟亦為賊火所爇隳其門觀賈氏談録朱字唐䖍州刺史王哲在平康里治第家人掘得地一石子朱書其上曰脩此不吉家人揩拭轉分明乃呈哲哲家意人惰于朱鍤自磨朱深若石脉哲甚惡之其月哲卒酉陽雜爼沒唐石乾寧二年駱全瓘李繼鵬反帝幸莎城鎮帝欲入南山谷中自固以谷有没唐石惡之乃移石門鎮之佛宫新王重榮傳舊紀縮石天復中洪中霣石于越王山下昭仙觀前長七尺尺圍三丈餘青碧如玉節度使劉威命羿入觀内設齋祈謝七日之内稍小長三尺數日石長尺餘今只有七八寸留在觀内録異記化石㑹稽進士李眺偶拾得一小石青黒平正温滑可玩用為書鎮焉偶有蠅集其上驅之不去視之已化為石求他虫試之隨亦化焉殻落堅重與石無異上陊石徐少郎司業少時㳺天台山歇於大樹隂巖上石盤欲陊空中語曰下有人石矻然架樹回身乃落震地堛然葆光録異石蜀文谷嘗詣中書舎人劉光祚有道士劉雲出一白石圓如雞子其上有文彩隠出如畫乃是二童子持節引仙人眉目毛􅄠冠履衣帔纎悉皆具云於麻谷洞石穴中得之又有一客沈黙亦出石濶一寸五分長二尺五分上隠出盤龍鱗介瓜甲無不周備云於巫峽山中得之野人閑話佛座武肅王錢鏐自㓜嘗與鄉里児童聚戲于樹隂石上指其樹石曰我貴賞爵而覆之建功臣精舎遂以其石為佛座焉吴越備史碎石如粉譚紫霄廬山僧於溪滸剏亭苦大石横直累工不能平紫霄徃見曰斯固易也因以指捻訣含水噀之命鎚其石應手如粉南唐活石海陵東臺聖果院有古井欄相傳南唐保大中造舊有綆迹深寸許今復生合而誌文亦漫滅莫辨疑活石云晏溪志李陽氷晉縉雲三碑篆刻最細痩世言此三碑皆活嵗乆漸生刻處㡬合故細耳集古録金蠶右千牛兵曹王文秉丹陽人世善刻石其祖嘗為浙西亷使裴璩采碑於積石之下得一自然員石如毬形式如礱斵乃重疊如殻相包斵之至盡其大如拳復破之中有一蠶如蠐螬蠕蠕能動人不能識因棄之數年浙西亂王出奔至下蜀與鄉人夜㑹語及青蚨還錢事佐中或云人欲求富莫如得石中金蠶畜之則寶貨自致矣問其形狀則石中蠐螬也稽神記龍精石丁謂有小山高才數寸蒼翠嵌空盛夏常設盆水置小山其中一日張晏有客掬水洒之須臾雲霧自竅中出有光如電細視之蜿蜒小龍如線掛雲霧中已而散繹蜿蜒亦莫知所之衆客驚謂曰異此龍精石也龍交海上流精于石南墅閑居録見夢金陵有三大石甚古吳仲庶作守日夜夢三舉子求哀且曰若不垂祐明日當為煨燼矣公甚異之詰旦徧問僚屬莫能原其意既而視其牒見兵馬司狀申乞燒三醜石為灰供修造之用公遂悟敕寺僧愛䕶元祐中毛漸作漕欲移置廨舎掘之極深而石根不㫁不能動遂罷楊公筆録靈璧石政和間建艮壑異花竒石來自東南不可名狀忽靈璧縣貢一巨石高二十餘尺周圍稱是舟載至京師毁水門樓以入千夫羿之不動或啟于上云此神物也宜表異之裕陵親灑宸翰云慶雲萬態竒峯仍以金帶一條掛其上遂即可移省夫半頃刻至苑中揮塵録盤固侯宣和艮嶽一石高四十丈名神運昭功朱勔自平江府回造巨艦載太湖大石一塊至京以千人羿進勔被賞建節石封盤固侯淮波雅志巨石随流建炎三年鼎州巨石㵦大水流下有字曰無為大道天知人情無為𡨕窈神見人形心言意語鬼聞人聲犯禁滿盈地收人魂宋史未石朝議李芬好竒有異石高二尺許嵌硿可愛常置庭檻間毎至日方未時即有氣出石穴中若雲煙之狀依之候之萬不差一因目為之未石續墨客揮犀石中魚杜綰字季揚衍之孫也曽獲一蘭州黄河水中圓青石大如柿作鎮紙經宿連簡冊輙濕後以器貯之几移時有水浸潤一日忽墮地破而為三四段空有小魚一枚纔寸許跳躍頃刻即死雲林石譜如畫宋汴京天津橋上有竒石大片有自然華夷圖山青水緑河黄路白粲然如畫癸辛雜志貞婦石􅈎道有貞婦石相傳昔有貞婦夫沒無子事姑甚孝姑抑而嫁竟不從之終姑之世後身没其居之室有一大石湧出後人愛其貞操號其石為貞婦石寰宇記化女陽羡縣小吏吳龕嘗於溪中見五色浮石因取内床頭至夜化女子幽明録水火石崦嵫山有石赤白色以兩石相打則水潤打之不已潤盡則火出山石皆然炎起丈丈逕日不滅有大黒風自流沙出奄之乃滅其石如初言動火之事發疾經年故不敢輕近耳水經注帝臺石休與之山其上有石焉名曰帝臺之棋五色而文其狀如鶉卵帝臺之石所以禱百神者也服之不蠱山海經協金石有人得青石大如磚皆有鼻穿鉄索長數丈循環無㫁處海商見之以數十千易之云此恊金石垂于海中經夕引出上有金幕府宴閑録龍駒石有人曽畜一石羌人以十萬購之其人與之而詰其異胡人令取盆水置石其中視之有一馬現石中狀如飛動其人問其所用曰此龍駒石也以水浸之飲馬馬輙生龍駒無價寶也北囱炙輠消石消石出烏場國能消金石為水服之悉得長生其石出處氣極穢惡飛鳥不能過其上人或單服從過身上諸虫悉化為水而得長生矣形若鵝毛管者佳仙方云此帝𤣥珠也乞子石􅈎道有乞子石兩石夾青衣江對立如夫婦之相向古老相傳東石從西石乞子將歸故風俗云人無子祈禱有應寰宇記香石卞山在湖山下有無價香有老母拾得一文石光采可玩偶墜火中異香聞於逺近收而寶之毎投火中異香如初熱石新北市是景觀舊基有一巨石大如柱礎景人或坐之蹋之逡巡如火燒應而熱因便成疾往往心致死或云若聚火燒此石吼即瞿塘山吼而水沸古老相傳耳又蜀州晉原縣山亭中有二大石各徑二尺已來出地七八十人坐之或心痛徃往不救又星落星石東邉者坐即靈者西邉者與石無異色並帶諸青白也録異記響石南嶽呴嶁峯有響石呼喚則應如人共語而不可解也南州南河縣東南三十里丹溪之有響石高三丈五尺濶二丈狀如卧獸人呼之應笑亦應之塊然獨處亦號曰獨石也洽聞記金剛石徼外出金剛石石厲而似金有光彩可以刻玉外國人帶之云避惡氣山海經注畫眉石畫眉石武昌有之出於樊湖可以代七香圓鎻碎録凌水石凌水石出常山谷中以此石為末置水中夏月能為水不灰石安福縣長嶺山有石黒可以種火是為不灰石寰宇記質石渭州水中有虫頗類魚鳴或作質質處土人見者多以挺刃或堅物擊之多化為石石色青黒温潤堪為礪目之為質石長惟尺餘價值數十千凡兵刃用此磨泊者青光而不鏉石譜雷磨石臨賀郡有青石上有磨刀斧迹春夏明浄秋冬蕪穢云是雷磨石荆州記石鷰零陵有石鷰得風雨則飛翔如真燕風雨止還為石湘州記謝鴻云向在鄉中山寺為學見高巖石上有如燕狀者因以筆識之石為烈日所暴忽有驟雨過所識者徃往墜地盖寒熱相激而并落非能飛也倦逰雜録有石板上磊塊如燕形者呼為燕窩石譜屏石石屛出零陵白鶴山屈處静上昇之所紹興壬午間有宗子邑居一日艤舟山下於水中得一石光采絢異其文若峯巒聳秀渾然天成自是石工鑿取益衆煙雲雪月之景波瀾龍鳳之象隐然可觀大者方廣可四五尺雖巧畫者莫臻其妙零陵志魚石衡陽鄉湘縣有石魚山下多𤣥石石色黒而理若雲母發開一重輒有魚形鱗鰭首尾宛若刻畫長數寸魚形備足燒之作魚膏形因以名之南越志隴西地名魚龍掘地取石破而得之與湘鄉所産無異石譜杜詩有水落魚龍夜山空鳥鼠秋之句嫩石南雄縣出嫩石可以為鍋釡寰宇記石果廣西桂州隠山之北中有石室石臺又有石果作荔子胡桃栗棗之狀人採取之或以釘盤相遺韶石曲江有石高百丈廣圓五里兩石對峙相去一里小大畧均似雙闕名曰韶石南有靈石一名逃石高三十丈廣圓五百丈舊耆傳言石本桂陽武城縣因夜迅雷之變忽然遷此彼人來見歎曰石乃逃來因名逃石以其有靈運徙又曰靈石其傑處臨江壁立霞駁有若繢焉水石驚瀬傳響不絶啇舟淹留聆玩不已水經玉女房龍盤山有一石長四十丈高五丈當有戸及扇若人掩閉古老相傳為玉女房益州記女觀石南陵縣有女觀山俗傳云昔有婦人夫官於蜀屢愆期憂思感傷登此騁望因化為石如人之形所舝狗亦化為石今狗形獨存輿地志望夫石武當北山上有望夫石狀若人立者傳云昔有真女其夫從役逺赴國難携弱子餞送此山立望而化為石世説督郵宜都建平二郡之界有五六峯參差互出上有倚石如二人像攘袂相對俗謂二郡督郵爭界於此幽明録鹽石汶山有鹽石煎之得鹽華陽國志入湯口四十三里有石煑以為鹽石大者如升小者如拳煮之水竭鹽成晉分地道記承受石筑陽米水口有一石下不測出地尺餘圍可三尺色極青其上如研明可以鑒人相傳以為殞星縣西有孤石挺出其下臨潭時有見此石根如竹而黄色見者多㓙相與號為承受石州圖副記冷石馬嶺上橋多虺蛇毒殺人有泠石可以解之屑着瘡内即活郡國志譽石鸛水鳥也㐲卵時數入水卵泠則不段卵取譽石用繞卵以助煖氣故方術家以鸛巢中譽石為真物愽物志石猪蜻蛉縣有石猪圻長谷中有石猪子母數千頭長老傳言夷昔牧此一朝化為石迄今夷人不敢往牧水經石廩石廩狀似倉廪其内可容千斛廪口開則嵗儉閉則年豐臨川記石鏡石鏡山東一圓石懸崖明淨照人㣲細必察潯陽記宫亭湖邉傍石聞有石數枚形圓若鏡明可鑒人謂之石鏡後人過以火燎一枚今不復明其人眼遂失明幽明録合州涪江有石立水中正圓如月水落時即出高可三丈俗名石鏡山川紀異零陵中興崖有石鏡劉愿序云以水澤之其光燦然江山之盤紆草木之榮悴皆莫遁也盤陀石明州昌國東海中補陀伽山有盤陀石平廣可立百餘人下瞰大海正扶桑日出之地燭龍將駕天光煥發五色爛然頃焉一輪湧出其大有不可名者四明舊志支鼎辰州東有三山鼎足直上各高數十丈古語云夸父與日兢走至此煑飯此三山者夸父支鼎石也朝野僉載女媧石歸美山山石紅丹赫若采繪峩峩秀上切霄隣景名曰女媧石大風雨後天晴氣靜聞絃管聲南康記磨鏡石鏡湖俗傳軒轅氏鑄鏡於湖邉今有軒轅磨鏡石石上常潔不生蔓草􅄒異記九州圖魯班刻石為禹九州圖今在洛城石寶山上石泣桀時㤗山走山石泣先儒説桀之將亡㤗山三日泣今㤗山山石逺望之若人泣盖是也周武謂周公曰桀為不道走山石泣石押衙汴都之南百里有周公墓前一石人能作恠人或遇之稱魯校書石押衙洞㣲志月鏡周靈王時異方貢石鏡此石色白如月照靣如雪謂之月鏡拾遺記石龜海畔有大石龜俗云魯班所作夏則入海冬復止於山上陸機詩云石龜常懷海我寧忘故鄉述異記越王石興安縣水邉有平石其上有石櫛石履各一具俗云越王渡溪脱履墮櫛於此荆州記照石方丈山西有照石去石十里視人物之影如鏡焉碎石片片皆能照人而質方一丈則重一兩燕昭王舂此石為泥泥通霞之臺與西王母常逰居此臺拾遺記方坐㑹稽秦望山始皇刻石前有石廣數丈云是始皇坐之石兩邉有方坐八所云是丞相已下坐石故今有丞相石之名輿地記立石萊子國海上有石人長一丈五尺大十圍昔始皇遣此石人追勞山不得遂立酉陽雜爼金化石秦二世元年宫中雨金頃刻皆化為石述異記畫石董偃常卧延清之室以畫石為床文如錦也石體甚輕出郅支國拾遺記石人光武夜至趙州南迷路聞人語問之弗應見二人立傍怒拔劔斬之其一急走熟視之乃石人也野史趙州志石象河南府東有象莊舊傳漢時西僧以象䭾經至洛陽化為石今石象猶存山川紀異石床焦氏山北數山有漢司隸校尉魯恭家前有石祠石廟四壁皆青石隠起自書契以來忠臣孝子貞婦孔子及弟子七十二人形像像邉皆刻石記之文字分明又有石床長八尺磨瑩鮮明叩之聲聞逺近時太尉從事中郎傳珍之諮議叅軍周安穆折敗石床各取去為魯氏之後所訟二人並免官戴延之西征記雨石魏武帝末年鄴中雨五色石述異記石羊京口有石如羊謂之狼石諸葛壳嘗坐其上與孫權議拒曹操志狼石有十字斷痕先主與孫權私卜所斷也演義孫劉同獵醉各據一石羊後名石羊巷輿地記石像魏孝武永熈元年於平等寺造五層塔二年土木畢功帝率百僚作萬僧㑹其日寺門外有石像自故自動低頭復舉竟日乃止帝怪其詭異中書舎人卞靈景曰石立社移自古有之陛下何恠也帝乃還宫七月中帝奔長安十月遷都于鄴洛陽伽藍記神鉦武安縣南有鼓山上有二石如鼓南北相當世傳鼓鳴則有兵起高齊之末此鼓常鳴而齊為周所并隋文帝末年鼓又自鳴聲聞數百里而唐代隋以興故一名神鉦山川紀異金胡碑記天水北冀縣南有朱圉山山有石鼓開山圖謂之天鼓山九州害起則鳴有常應又云石鼓山有石鼓于星為河鼓星則動石鼓鳴石鼓鳴則秦土秧鳴淺殃萬物鳴深則殃君王矣水經有逢山在廣固南三十里有祠並鼔石齊地將亂石人輒打石鼓聞數十里述征記變王開皇末高祖於宫中埋二小石於地以誌置床之所未㡬變為玉劉向曰玉者至貴也賤將為貴為象及大業末盜皆僣名號隋志投符葉法善卜居夘酉山其門近山巨石當路毎還紆回以避師投符須臾飛去路乃平坦衆共驚異之仙傳拾遺賜石㕐楊𢎞裕河朔人一日出郊有使人自北騎馳來問子非楊裕乎北岳賜汝物可跪受之使者懷中探一物若帛褁者裕歸焚香啟之得二石㕐一雄一雌左趐掩右者雄也右翅掩左者雌也後生一男一女男名廷璋周朝為飛龍使女為周太祖妃縉紳雕説辟蠧熊山野好訪異物有石龜石桃石棗之類嘗夢人自云姓石相依附得一石人長尺餘眉目皆具後今世有石燕石蟹之類又松亦化為石隴州有魚石子置書籍中能辟蠧秘閣閑談石駞于􅂒國北五日行又有山山上石駱駞溺水滴下以金銀等器承之皆漏人掌亦漏唯匏取不漏或執之令人身臭皮毛改冾聞記石柱刼化他國中天竺之屬國也有石柱高七十尺紏色有光或觀其身隨其罪福悉見影中見之上擕練􅀈搗衣山一名靈山在瑯琅山南絶險巖有方石昔有神女於此搗衣其石明􅉷謂之玉女搗練碪述異記醢石段成式群從其言小時嘗毁鳥巢得一黒石如雀卵圓滑可愛後偶置醋器中忽覺石動徐視之有四足如綖舉之足亦隨縮酉陽雜爼華岳掌華岳掌其石丹紫正如人肉色毎太陽對照則盡見之及日暮則漸隠而不見樵者云仙掌者盖絶地之上群壑聚㑹之所石色頳然望之適類其掌爾賈氏閑談石九子母石九子母者坐高七尺在金州寺中九子悉附于石體傳云浮海而至士庶禱祀求子多騐交州記雲根詩人多以雲根為石以雲觸石而生也宋孝武登樂山詩屯煙擾風穴積水溺雲根元魏宣武裴粲詔云栖素雲根餌芝清壑白樂天天竺石詩下搶拂雲根杜詩穿水忽雲根錢起竒石雲根淺賈島移不動雲根阪陂陀爾雅曰陂者阪也郭璞注陂陀不平也長松天子南還昇于長松之阪東昇于三道之登穆天子傳九曲洛水東逕其地九曲十里有九阪之曲水經注穆天子西征升九阿郭曰疑今新安縣十里有九阪也東京賦西阻九阿東門于旋轘轅欒盈過周王使候出諸轘轅左傳張儀云塞轘轅之口秦䇿其阪有十二曲道將去復還故云志巔軨太陽縣傅巖東北十餘里有巔軨阪左傳所謂入自巔軨者也有東西絶澗壑中築道謂之軨橋虞城北對長坂二十里許謂之虞阪戴延之曰自上及下七山相重戰國䇿曰昔騏驥駕鹽車上虞阪遷延負轅而不能進盖其困處也水經寊零在吳城之北今謂之吳坂古今地名劉越石與盧諶書云昔緑騏倚輈于吳坂長鳴于伯樂知與不知也羊腸趙簡子上羊腸之坂羣臣皆推車宗會獨當㦸行歌簡子曰人臣而侮其主其罪若何㑹宗曰其罪死君亦聞之君而侮其臣乎則智不為謀辨者不為鬭者則其國危乎簡子曰以宗㑹為上客善新序高誘曰羊腸其山盤紆如羊腸是太行孟門之限魏武苦寒行羊腸阪詰屈車輪為之摧九折王陽為益州至卬􅈎坂九折歎曰奈何以先人之遺髓乘此險乎遂以病去及王遵為刺史至此坂問吏曰此非王陽所畏道也叱其馭駈之曰王陽為孝子王遵為忠臣漢書黄馬孫登揚駿逼迎之與語不荅賜布袍登借刀截㫁棄門中大呼云刺斫卒病死後人見在黄馬坂王隠晉書成皋北有黄馬坂孫登之去楊駿作書與洛中故人處也水經注潘尼惡道賦云若其坂名羊􅅅八特成皋黄馬八特坂函谷東坂謂之八特坂地理志旋門河水東逕成皋西旋門阪北今成皋四大阪者也昇陟此阪而東躋成皋城曹大家東征賦望河洛之交流看成皋之旋門義婦坂吕榮者吳郡許昇之妻也昇為賊所害榮頁固自守黄巾賊陳寶欲干穢之榮執節不聴寶遂殺榮是日疾風暴雨雷電晦㝠寶恐懼叩頭謝𦵏之而去靡府君聞榮高行遣主簿祭之又出錢助縣為冡於嘉興郭里墟北名曰義婦坂列女後傳赤須坂班彪北征賦登赤須之長坂入義渠之舊城注赤須坂在北地郡水經注赤須水出赤須谷西南流注羅水阪以水得名也選隴坂張衡四愁詩我所思兮在漢陽欲徃從之隴坂長應邵曰天水有大坡名曰隴坂選隴西關其坂九迴不知高㡬里欲上者七日乃越高處可容百餘家下處數十萬户其上有清水四注俗歌曰隴頭流水鳴聲幽咽遥望秦川心肝㫁絶去長安千里望秦川如帶關中人上隴者還望故鄉悲思而歌則有絶死者三秦記白馬馬垂拱中有詔白司馬阪營大像縻費鉅萬蘇珦以防農上疏切諫則天納焉舊侯思止為左臺侍御史嘗按中丞魏元忠獄曰急認白司馬不然即與孟青白司馬者洛陽有阪號白司馬坂孟青者將軍姓孟名青棒即殺瑯琊王沖者也思止高元禮庸奴常以此諸謂囚也思止言竟不正時人效之以為談謔之資舊酷吏傳崿坂乆視中則天幸三陽宫自夏涉秋不時還都張説上疏曰宫去洛陽一百六十里有伊水之隔崿坂之峻舊書新書云后逭暑三陽宫長樂坂張濬充招討置制使濬率軍騎發自京師昭宗御安喜樓臨送濬酒酣泣奏楊復恭聞之不悦中尉内使餞于長樂坂恭以酒屬濬濬辭復恭戲曰相公不領復恭意作靣子耶濬笑曰賊平後方見靣子復恭銜之舊唐傳玉輪阪汶江水源出玉輪坂下益州記牛叩頭􅈎道有牛叩頭坂馬摶頰坂華陽志洞三十六洞大天之内有𤣥中之洞三十六所其八海之中崑崙蓬萊方丈瀛洲滄波白山八停之神山山皆有洞宫不在三十六天之洞數也羅鄷山之洞周一萬五千里名曰北帝死生之天皆死神所治五帝之宫考謫之府也鬼神所治又有二十八山洞天之隂宫或地官所在者不能一一記其洞山之名其餘有六洞天隂宫山皆夷狄異類鬼所不治大戎鳥獸蠻祼夷之種也匈奴之天下北戎之善山南越之勾嶁是也句曲山洞宫之中本有神仙人郭四朝者治其宫亦司三官領羅酆師晨候四朝燕人也兄弟四人得道四朝是長兄也茅君内傳清涼洞鉅野金鄉山北有石洞山清涼深十餘丈内鑿石作四小閣閣外一堂陛高三尺堂外兩門門外兩大閣石道長三十丈濶十有六尺世傳秦始皇避暑宫也郡志諸葛洞黔中郡南石崖屹立傍有石洞數丈相傳諸葛亮征九溪蠻嘗過此留宿洞中設一床懸粟一握以秣馬後遂化為石床石粟至今猶存上寶仙洞元宗天寶九載十月庚申幸清華宫太白山人王元翼言𤣥皇元帝降于寶仙洞本紀玉泉洞荆州玉泉寺近青溪諸山山洞徃徃有玉泉窟中多乳窟交流有白蝙蝠如鴉千嵗之後體如白雪盖飲乳水而長生也白集猗玗洞元結作自什曰天下兵興逃亂入猗玗洞稱猗玗子唐書大隠洞韋夏卿晩嵗將罷歸署其居曰大隠洞唐書白鹿洞貞元中洛陽人李渤與兄涉同隠居讀書于廬山五老峯下洞中養白鹿自娛後因以名洞寶厯中渤為江州刺史即洞創臺榭引流植花焉郡志金沙洞驪山有金沙洞玉蕋峯楊妃外傳含輝洞薛景晦為道州刺史得異境於近郊有石穹然如夏屋因名其地曰含輝洞禹錫集南山乳洞有人逰南山乳洞深數里乳旋滴瀝成飛仙狀洞中已有數十若工玉石眉自衣服形製精巧一處滴至腰已上其人因手承潄之經年􅄪徃見所承滴像已成矣乳不復滴當手承處衣缺二寸不就酉陽雜爼龍洞魯國唐世旻字圖昌本零陵人在郡為衙校唐昭宗時盜起世旻團結鄉兵保里閭劉建鋒舉為永州刺史光化初馬殷攻之不屈而死後或聞鉦鼓聲且數晝見嘗有一木自洞流出止於石荆岸人送之中流詰旦復還如是者數四適天旱禱而雨遂取其木像而祠之湖南馬氏封為零陵王廟舊經穴神農穴夏平縣有重山即烈山也山下有一穴父老相傳是神農所生處也水經注禹穴漢書司馬遷傳云上㑹稽探禹穴又有禹井楊都賦云洞穴蒼梧汪云有零陵人言從禹穴入至蒼梧出也㑹稽記逃丹穴越人三世殺其君王子捜患之逃於丹穴而越人無君從之丹穴王子捜不肯出穴人薰之以艾承以玉輿莊子月穴已寡婦清其先得月穴而擅其利史貨殖傳五姓出穴巴蠻有五姓皆出於武落鍾離山其山有赤黒二穴巴氏之子生于赤穴四姓之子皆生黒穴未有君長俱事鬼神乃共擲劍于石穴約能中者奉以為君巴氏子務相乃獨中之衆皆歎因共立之是為廪君後漢馬穴中盧縣有馬穴山傍有地道漢時常有數疋白馬出其中形皆小似湞池馬遂名馬穴荆州圖記西陵北三十里有石穴名馬穿嘗有白馬出穴食人逐之入穴濳出漢中漢中人失馬亦嘗出此穴相去數千里冝都記地脉太湖中有包山下有洞庭穴傍行地中無所不通謂之地脉風土記吳國南有具區澤中包山有洞庭寶室入地下潛行通瑯琊東武𤣥中記洞庭山有三穴並有清泉流出惟西北一穴傴僂纔得入吳大帝使人行三十餘里而友云上聞有浪聲有大蝙蝠如鳥拂殺人火穴中高處火照不見穴有鵝管鍾乳氷寒可得入春夏不可入婁地記洞庭山有穴五門東通林屋西逺娥眉南接羅浮北連岱岳東有石樓樓下兩石扣之清越所謂神鉦者有青童乗獨飊飛輪之車至此其跡存焉上有天帝壇山山有金牛穴吳孫權時令人掘金金化為牛走上山其跡存焉故號為金牛穴述異記震澤中洞庭山有洞穴深百餘尺仰公􅀈誤墮洞中至一龍宫下有青泥晝夜常明飢食青泥味若粳米飯記得歸路得出事聞梁武帝帝問杰公公曰此洞穴有四支一通洞庭湖西岸一通蜀道青衣蒲北岸一通羅浮兩山間大谿一通枯桑島東􅂒梁四公記太湖中别有夫椒山下有大洞天宫潛通五岳吳地記潛通循州有龍穴潛通于海傍于洞庭吳都賦云目龍川而帶垌此也郡國志龍穴江陵龍穴洲有駕步口宋文帝車駕發江陵至此黒龍躍出負帝所乗舟左右失色上謂長史王曇首曰此乃夏禹所以受天命矣我何徳以堪之故有龍穴之名焉水經注風穴五臺山有風穴㳺人稍或諠呼及投物擊觸即大風震發掲屋拔木必為物害寶厯初燕人李球墜入穴中見二道士洞内弈棋以一杯水與之令人引出引者曰此山道家紫府洞也洞有三門一徑西通崑崙一徑出此巖之下一向來風穴是洞之端門也皆有龍蛇守之此有北巖之徑可還舊處球如言而歸仙傳拾遺大濩湘水中有宂名大濩不知通何許每春夏江漲數百步外皆奔入宂中有聲如雷開寶中有崑崙沈水視之但見厯年所沈板木縱横其間兩蚌大如輪車輿地紀勝天中記巻八
