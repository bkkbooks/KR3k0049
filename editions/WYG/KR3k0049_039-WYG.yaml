body:
  text: 天中記卷三十九明陳耀文撰生辰啟脅生吳回生陸終陸終娶鬼方國君之妹謂之女嬪孕而不育三年啟其母左脅三人出右脅三人出帝系化石生啟禹治洪水通轘轅山化為熊謂塗山氏曰欲餉聞皷聲乃來禹跳石誤中皷塗山氏徃見禹方作熊慙而去至嵩髙山下化為石方生啟禹曰歸我子石破比方而啟生淮南生于空桑有侁氏女子採桑得嬰兒于空桑之中獻之其君其君令烰人養之察其所以然曰其母居伊水之上孕夢有神告之曰白出水而柬走毋顧明日視白出水告其隣東走十里而顧其邑盡為水身因化為空桑故命之曰伊尹㠯本味伊尹母孕行汲水化為枯松其夫尋至水濵見桑穴中有兒乃收養之書大𫝊長有賢徳殷以為尹曰伊尹也水經十五觀白虹周昭王庻子食采翁山夫人觀白虹而有娠生子兩手壓拳不開昭王噀之即開左手有文曰公右手有文曰羽遂賜姓翁氏世説夢蘭鄭文公有賤妾燕姞夢天使與已蘭曰余為伯儵余而祖也以是為而子以蘭有國香人服媚之如是既而文公見之與之蘭而御之辭曰妾幸而有子將不信敢徵蘭乎公曰諾生穆公名之曰蘭穆公有疾曰蘭死吾其死乎吾所以生也刈蘭而卒宣四熊虎狀楚司馬子良生子越椒子文子良兄曰必殺之是子也熊虎之狀而豺狼之聲弗殺必滅若敖氏矣諺曰狼子野心是乃狼也其可畜乎子良不可子文以為大慼及將死聚其族曰椒也知政乃速行矣無及於難且泣曰鬼猶求食若敖氏之鬼不其餒而子文卒子越為司馬將攻王楚滅若敖氏上豺狼聲叔向欲娶申公巫臣氏其母止之曰甚美必有甚惡叔向懼不敢娶乎公強使娶之生于伯石伯石始生子容之母走謁諸姑曰長叔姒生男姑視之及堂聞其聲而還曰豺狼之聲非是莫喪羊石氏矣遂弗視二人豕喙牛腹叔魚生其母視之曰是子虎目豕喙鳶肩而牛腹谿壑可盈是不可饜又叔向曰晉有羊舌鮒者叔魚之母弟瀆貨無厭亦將及矣生而白首李母祠在老子祠北二里祠門之左有碑文曰老子聖母李夫人碑老子者道君也始起乗白鹿下託於李母胞中七十二年産于楚國淮陽苦縣瀬鄉曲仁里老子名耳星精也字伯陽號曰聃崔𤣥山瀬記老子母懐之七十嵗乃生啟其母左腋而生生而白首故為老子神仙傳老子既生廣顙大目踈齒方口耳有三門鼻有雙柱足蹈五字手把十文商芸小説絳霄繞身闗令尹喜内𫝊尹喜母夢綘霄流繞其身遂生喜雙光若日飛流滿堂良乆乃散文成相里昔子産初生執拳而出啟手觀之文成相里其後因而氏馬唐髙僧𫝊黒帝感生孔子母顔氏徵在㳺大澤之陂夣黒帝使請已徃夣交語曰汝乳必於空桑之中覺則若感生丘於空桑首類尼丘山故以為名孔演圖明珠感孕西子母浣帛於溪有明珠射體感而孕又夣有翠雞五色自空而下乆之化為鶚飛去翰府名談夢神乗雲孟子生時其母夣神人乗雲自泰山來將止于嶧母疑視乆之忽片雲墜而寢時閭巷皆見有五色雲覆孟氏之居焉初度屈原離騷云帝髙陽之苗裔兮朕皇考曰伯庸攝提貞于于陬兮惟庚寅吾以降皇覽揆余於初度兮肇錫余以嘉名名余曰正則兮字余曰靈均感星蕭何昂星精張良感弧星生樊噲感狼星生遇龍雜記云漢廷尉扶嘉朐䏰人也初嘉母于湯溪水側遇龍后生嘉長占吉凶巧發竒中髙祖為漢王時與嘉相遇嘉勸定三秦髙祖以嘉志在扶翼賜姓扶氏為廷尉食邑朐䏰嘉臨終有言曰三牛對馬嶺不出貴人出䀋井方輿勝覽太白星臨東方朔母田氏寡居夣太白星臨其上因有娠田氏歎曰無夫而娠人將弃我乃移向代都東方里為居五月旦生朔因以所居里為氏朔為名朔生三日而母田氏死隣母收養之朔生五嵗忽失經年乃歸母問之朔曰兒至紫泥海紫水汚衣乃過虞淵湔浣明發中還何言經年乎洞㝠記朔父張夷字少平今本神光照社後漢應樞生四子見神光照社樞見光以問卜者曰此天符也子孫其興乎乃探得黄金自是諸子官學有名至場七世通顯孝子𫝊疋練昇天虞延字子大陳留東莞人也其生時以夜適免母身母見其上若一疋練狀經上天明以問人人皆曰吉氣與天通長大仕宦位至司徒公論衡吉驗賜杖唐文伯河東蒲坂人也其生以夜半時適生有人從門呼其父名父出應之不見人有一木杖植其門側好善異於衆其父持杖入門以示人人占曰吉文伯長大學宦位至廣漢太守文伯當富貴故父得賜杖其占者若曰杖當子力矣上天人授書張道陵母夣天人自魁星中以蘅薇香授之遂感而孕高道𫝊雙珠老蚌韋元將弟誕仲將孔融與其父書曰前日元將來淵才亮茂雅度𢎞毅濟世之器也昨日仲將來思敏篤誠保家之主也不意雙珠近出老蚌白鵠聳雲吳張承家有白鵠聳雲占者曰鵠是延年之物從室入雲自卑升髙之象當使子孫位極人臣名擅江表若生子可以名曰鵠後承生昭至輔吳將軍拾遺胞聲震外闞澤字徳潤在母胞八月叱聲震外年十三夣見名字炳然在月中㑹稽先賢𫝊藍田生玉諸葛恪少有名孫權見其父瑾曰藍田生玉真不虚也香浴葛尚書年八十始有仙公一子時有天竺僧於市大買香市人怪問僧曰我昨夜夣見善思菩薩下生葛尚書家吾將此香浴之到生時僧至燒香右遶七匝禮拜㳟敬沭浴而止仙公起居注仙公生始數日沙門見而禮拜曰當㳺仙道白日昇天靈寳法輪經真英物桓温宣城太守彛之子也生未朞而太原温嶠見之曰此兒有竒骨可試使啼及聞其聲曰真英物也彛以嶠所賞故遂名曰温嶠曰果爾後將易吾姓也本𫝊墮地便坐太原温磐石母懷身三年然後生墮地便坐而笑髪覆靣牙齒皆具異死額創兒出魏興李宣妻樊氏義熈中懷妊過期不孕而額上有創兒穿之以出長為將今猶存名胡兒靈産譙郡胡馥之娶婦李氏十年無子而婦卒哭慟云竟無遺體遂此酷何婦忽然起坐曰感君哀悼我不即朽君可暝後見就依平生隂陽當為君生一男語畢即卧馥之如言不取燈燭闇而就之交接後歎曰亡人以無生理可别作屋見置瞻視滿十月然後殯爾來覺婦身微煖如未亡既及十月果生一男男名靈産幽明録旗鈴落懷任遥妻河東裴氏髙明有徳行嘗晝卧夣有五色采旗盖四角懸鈴自天而墜其一鈴落入懷中心悸因而有娠占者曰必生才子遂生昉斗十二從叔晷有知人之量見而稱其小名曰阿堆菩家千里駒也南史禇淵嘗謂遥曰聞卿有令子相為喜之所謂百不為多一不為少天人執爐陶𢎞景母夣兩天人手執香爐來至其所已而有孕生𢎞景本𫝊又雲笈經云陶隠居初生母夣日精在懷一天人手執金香爐隆腹啼南史王曇逸母晝寢夣靈鳯集身因有娠又聞腹中啼聲僧寳誌曰生子當為神仙宗伯雞祏集湔裙北齊竇泰母夣風雷有娠期而不産大懼有巫云渡河湔裙必易生因至水所忽一人云當生貴子可徙而南毋從之俄而生泰及長為御史中尉北史浮磬之精髙琳母嘗㧞禊泗濵見一石光彩可愛遂持歸是夕夣人謂曰此浮磬之精若保之必生令子俄而有孕生琳北史遺奴徐孝嗣聿之子也字始昌父被害孝嗣在孕母年少欲更行不願有子自床投地者無筭又以擣米杵折其腰并服堕胎藥胎更堅及生故小字遺奴啇史五石麒麟徐陵字孝穆母臧氏嘗夣五色雲化而為鳯集左肩上已而誕陵焉時有寳誌上人者世稱其有道陵年數嵗家人携以侯之誌手摩其頂曰天上石麒麟夢鳯集王逺知生母晝寝夣鳯集其身因有娠本𫝊湯餅唐明皇王皇后寵衰一日訴曰三郎獨不記何忠脫新紫半臂換一斗􅋗為三郎生日湯餅耶上戚然憫之松窻雜録劉禹錫送張盥詩云爾生始懸弧我作坐上賔引筯舉湯餅祝詞天麒麟本𫝊玉燕投懷張説母一玉燕自東南飛來投入懐中而有孕生説果為宰相其至貴之祥也天寳遺亊鶴集張九齡母夣九鶴自天而下飛集于庭遂生九齡家𫝊長庚李白欲生其母夣長庚星遂生白本𫝊七十生子三原縣南董橋店有孟嫗者自云吾年二十六嫁與張詧為妻詧為汾陽所任常在汾陽左右詧之貌酷相類吾詧卒汾陽傷之吾遂偽衣丈夫衣冠投名充詧弟請事汾陽令替代如此又寡居一十五年自汾陽之薨吾已年七十二軍中累奏兼御史大夫忽思㷀獨遂嫁此店潘老為婦邇來復誕二子曰滔曰渠滔五十有四渠年五十有二是兒也貞元末百餘嵗卒古物餉遺李寰鎮晉州表兄武㳟性誕妾又稱好道並愛古物遇寰生日無餉遺乃箱擎一故皂襖子與寰云此是李國公收復京師時所服願尚書功業一似西平寰以書謝之後值㳟生日亦以箱擎一破弊幞頭餉㳟曰知兄深慕髙真求得洪崖先生初得仙時幞頭願兄得道一如洪崖賔僚無不大笑因話録興門栁公綽字寛始生三日伯父子華視之謂其弟子温曰保惜此兒福祚吾兄弟不能及興吾門者此兒也因以起之為公綽字舊唐夢楓生腹張志和母夣楓生腹上遂生志和本𫝊鳩集王庭溱始生有鳩數十朝集庭樹暮宿簷户長駢脇厯居戎職值亂殺田洪正推為留後子後相繼藩鎮一百年唐年補録異人求嗣崔慎由鎮西川有異人張叟曰君四十無子為公求之終南翠微寺有僧絶粒五十年君遺以服玩受之則其嗣也果受之僧㝷卒遂生子叟復相曰貴則過公恐不得其終因字曰納僧又曰緇郎即崔𦙍也南部玉臺山靈蜀主孟知祥生時有火光照室隣里皆異之有僧見而撫之曰此五臺山靈也蜀檮杌白雀棲堂閩王延彬主之子審知姪也嗣圭封泉州初圭領兵至泉州舎于開寺始生延彬于寺之堂既生有一白雀棲于堂中迄延彬之終方失所在凡三十年仍嵗豐稔每發蠻舶無失墜者人因謂之招寳時三五記亊文武秀氣杭州新城縣鼉江舊常有二氣亘千江上終晝夜不滅及桂建徽羅隠生而二氣不復見議者以為文武秀氣焉吳越備史家寳廣南漢主劉隠乃次室叚氏所生初長母韋氏居家甚妬聞産隠韋仗劍於門令抱來將殺之家人不敢匿及見劍墜於地跪而接之曰此我家之寳三日叚氏亡韋鞠為己子后為偽漢髙祖劉氏興士録五國故亊作劉儼勿傷僕射崔仁冀父詢善射仁冀方娠而母病詢欲飲以藥毋一夕夢人謂已曰勿藥恐傷僕射及覺以語詢詢疑其誑弗聽自搆火煑藥見鐺上有蛇蜿蜓然遂覆其藥而沒後果遷左僕射九國志僧獻玉羊吳越錢元瓘先是有胡僧以玉羊一獻于鏐曰得此當生貴子元瓘果以丁未嵗生上周公山神王承肇雅州人蜀王宗侃之子母崔氏夢周公山神降祥遂生後一僧見之曰山氣減半乃孕靈此子耶後節制洋州為洛行軍司馬授五色筆宋范質母張氏夢人授以五色筆而生仙授字圖李至母張氏嘗夢八仙人自天降授字圖使吞之及覺猶若有物在胸中未幾生至宣聖拍背王沂公之父見字紙遺墜必掇拾以香湯洗燒之一夕梦宣聖拍其背曰汝何以重吾字紙之勤也恨汝老矣無可成就他日當令曽參來汝家受生顯君門户未幾果生一男遂命名曽後果狀元及第文昌化書懷玉山人楊大年祖父文逸為南唐玉山令大年將生一道士袖刺來謁自稱懐王山人冠褐秀爽斯湏遽失公遂生後三十七年學士晝寢於玉堂忽夢道士來謁稱懷玉山人故出一牒閲之寫三十七字大年驚曰得非數乎許添乎道士命筆一㸃為四十七字其數果卒玉壺清話大年初生母章氏夢羽衣人自言武夷仙託化既生則一鶴雛也盡室驚駭貯而棄之江其叔父曰吾聞間世之人其生必異如姜嫄有棄簡狄有契乃追至江濵開視之則鶴蛻而嬰兒具焉體尚有紫毳尺餘經月乃落詩序春渚作祖母啟視天赦富弼字彦國初毋韓有娠夢旌旗鶴雁降其庭云有天赦已而生弼宋史滅燭復明章得象字希言母方娠夢登山遇神人授以玉像及生父奐復夢家庭積筍如山上閩中惟建劍汀邵武四處殺子士大夫家亦然章邵公建州人生時家嫗將不舉凡滅燭而復明者三有呼於梁者曰相公家人懼甚遽收養之孫公談煑藥鼎覆吕公弼申公之次子始秦國妊娠而疾將去之醫工陳遜煑藥將熟已三鼓坐而假􅄰忽然鼎覆再煑再覆又煑而加火焉困甚就榻夢神人披金甲持劍叱曰在胞者本朝宰相汝何人敢以毒加害遜懼而窹以白相國後人公弼熈寧中位樞宻使括異志玉筯食􅃵邵康節母李氏其姑張氏遇之甚嚴一夕欲自盡夢神人令一玉筯食􅃵一杯告曰無自盡當生佳兒後生康節聞見録伊川丈人與李夫人因山行於雲霞間見大黒猿有感遂孕臨産時慈烏滿庭人以為瑞是生康節七嵗戲於庭蟻穴中别見天日雲氣徃來也本草携文選宋郊母夢朱衣人卑一大珠受而懷之既窹猶覺暖已而生郊後又夢前朱衣携文選一部與之遂生京文故小字選哥塵史手書興字韓億將生其父夢人手中大書一興字示之知門户之將起也及命名從人從意而字宗魏盖取畢萬之後必大萬盈數魏太名之意也桐隂舊話摘餌蓮葉韓億夫人王氏初未有子夢一僧貎甚異手持蓮花曰汝欲生男乎摘五葉餌之後生綜絳繹維績五子皆貴顯上蘿蔔謡晁之道嘗言蔡侍郎準少年時出入常有二人見於馬首或肩輿之前若先驅者或前或却問之從者皆無所覩準甚懼謂有寃魂百方禳禬皆不能遣既乆亦不以為事慶厯四年生京而一人不見又二年生卞乃遂俱滅元符末都城童謡有家中兩子蘿蔔精之語語多不能悉記而其末章云撞着潭州海藏神至崇寧中賣酸饀者又有一包菜之語其事皆驗而京於靖唐初貶死長沙豈潭州海藏亦應於此耶曲洧舊聞生立於辱李顯忠初名世輔其母當産數日不能免有僧過門曰所孕乃奇男子當以劍矢置母傍即生已而果生顯忠立於蓐咸異之宋史肉塊得兒宋儀王仲湜生有紫光照室及視則肉塊刃剖遂得嬰兒靖康時大軍欲推立之仗劍以却曉其徒曰自有真主其徒猶未退則欲伏劍死六軍遂與王約以踰月而真主不出則王當即大位王陽許而隂欵其期未㡬髙宗即位于應天王間闗而南上屢嘉歎之主祭濮王杭州志傷曇華是人甚希有過於優曇華疏云優曇華鉢名瑞應三千年一現現則金輪王出法華經七枝秀草西域有七枝秀草若羅漢聖人生則此草生清浄之地第三祖和修生時九枝秀草應時而生𫝊燈録白象入門第十祖脇尊者生時父夢白象背有寳坐上有明珠入門乃生𫝊燈録䧱申辰裴晉公有遺以槐癭者郎中庾威在坐曰此是睢樹生者公問郎中年甲對云與公同是甲辰公笑曰郎中便是雌甲辰雞跖小戊子程文惠與龐公同戊子生程已貴龐尚為小官常戲龐曰君乃小戊子矣後龐大拜文惠曰今日大戊子却為小戊子矣東軒前身張衡後身張衡之初死蔡邕母始懷孕二人才貎甚相類時人云蔡邕是衡之後身商芸小説語林桑中金環羊祜年五嵗令乳母取金環乳母曰無此物祜乃訪隣人李氏東園桑樹中探得之主人大驚曰此余亡兒所失物也乳母具言之李氏悲惋時人異之乃知李氏子乃祜前身本𫝊蛇精杜預醉卧嘔吐人竊窺之見一大蛇垂頭而吐史鼉精郭璞睡時有人見形變鼉云是鼉精文選注胡沙門中書令王珉字季琰相識有一胡沙門每瞻珉風采甚敬悦之輙語同學云若我後生得為此人作子於近願亦足也珉聞而戲之曰法師才行正可小弟耳頃之沙門病亡亡後嵗餘而生練始能言便解外國語及絶國奇珍銅器珠貝生所不見未聞其名即能名之識其産出又自然親愛諸胡過於漢人咸謂沙門審其先身故珉字之阿練遂為大名云㝠祥記羅刹齊文宣欲殺僧稠稠預待之帝愧悔躬負稠身謝愆因謂曰弟子前身曽作何等荅曰乃羅刹王是以今猶好殺即呪㿽水令帝自視見其影如羅刹像焉續髙僧許𤣥度許詢與沙門曇彦同建浮圖未成而詢亡彦長年及見詢後身為岳陽王鎮越州彦呼之曰許𤣥度來何暮昔日浮圖今如故王曰弟子姓蕭名詧彦乃以三昧力加被王恍然悟前身髙僧𫝊彌勒應身傅大士名善惠婺州人南齊時降于𫝊宣慈家納劉氏女名妙志生普建普成二子梁武帝時㑹天竺僧達麽號嵩頭陁謂大士曰我與汝毗婆尸佛所發誓出兠率宫衣鉢見在何日當還因命臨水觀其影見大士圓光寳盖大士笑時有法師聞法悟解言我師彌勒應身耳大士呵之天嘉二年大士於松山頂雙林寺行道人滅𫝊燈録𤣥是袁盎彭州什知𤣥於一夕有一珠自左足下流去苦楚萬端諦視其珠中明明有晁錯二字乃知𤣥是袁盎也曽因七國反盎奏斬錯以謝吳楚諸王故為嬰撓耳一云𤣥前身名知鉉漢州三學山講十地經感地變琉璃焉宋髙僧𫝊徐陵後身處州釋知威姓蔣氏天與多能富有辭藻時𫝊是徐陵後身上宋公後身開元中房琯為盧氏宰道士邢和璞來琯敬禮之暇日同出城因至夏谷村一廢寺松竹森映和璞坐於下以杖叩地使人掘之數尺得一瓶瓶中皆婁師徳與永公書笑謂琯曰頗憶此耶琯因洒然悟其為僧時乃永公後身也因語琯終身事無不驗明皇雜録諸葛後身劍南節度使韋臯既生一月其家召郡僧㑹食有一胡僧貎甚陋既食韋氏命乳母出嬰兒請郡僧祝其壽胡僧忽謂嬰兒曰别乆無恙乎嬰兒若有喜色衆皆異之胡僧曰此子乃諸葛武侯之後身耳吾徃嵗在劍門與此子有善今聞降於韋氏吾致不逺而來韋氏因以武侯字之後韋自少金吾節制劍南軍在蜀門十八年果契胡僧之語少室志蛇入懷中李公垂紳少時讀書剡州天宫佛寺一日晝􅄰舎中丹李柰方實有黒蛇據其二㑹僧至驅之蛇入李懷中忽不見及覺問之荅曰適夢在樹問食柰甚美僧大奇之雲溪友議西華和尚袁滋微時居汶州青溪山因賣藥得見異人曰此人大以西華坐禪和尚屈指亡來四十七年矣問滋以年適四十七逸史盧老崔鋭佐李抱貞為澤潞從事有道人自稱盧老曽事陏朝雲際寺李先生預知過徃未來之事屬河朔禁逰客鋭舘之於家一旦辭去且曰我死當與君為子因指口下黒子願以為志咸之生也果有黒子其形神即盧老也父即以盧老字之後累官大都督觀察使自旦至暮與賔僚痛飲恒醉不醒簿領推積夜分省覽訓析決断無毫釐之差胥吏以為神人太和八年卒舊唐文花𫝊白猪尚書鄭愚因醉眠左右見一白猪北夢三生劉三復者以文章見知於李徳裕在浙西遣諸門求試及登第歴任臺閣三復能記三生事云曽為馬馬常渇望驛而嘶傷其蹄則連心痛後三復乗馬磽确之地為緩轡有石必去之其家不置門限慮傷馬蹄也其子鄴勑賜及第登廊廟上表雪徳裕朱崖靈柩歸塟洛中報先恩也士大夫美之北夢曲沃縣尉孫􅃡家奴年六嵗忽視􅃡母笑云娘子總角時曽養一野狐今憶否毋亦省之奴云爾時野狸即奴身也見鷹得走入古冡後為獵人擊一見閫羅王王以無罪當得人身遂生海州為乞人子苦饑寒二十而死又見王王曰與汝作貴人家奴遂得至此今已三生矣廣異記兩世夫婦劉立者為長葛尉其妻楊氏忽一日泣謂立曰我以某日當死且以小女美美為托曰他日美美成長望君留之三二年其夕楊氏卒及罷官寓居長葛已十年矣有縣令某者邀立徃郭外看花令立先去舎趙長官莊行二三里見二杏園中看婦女十數人立駐馬觀之有一女年可十五六亦近敗垣中窺立至趙長官宅入門主人移時方出曰適女子與親族看花忽中暴疾所以不果奉迎坐未定有一青衣與趙耳語趙起入内聞趙公嗟歎之聲乃問立曰君某年為長葛尉婿楊氏乎曰然有女名美美僕名秋笋乎曰然趙又歎息驚異旋有人喚秋笋入宅中見一女涕泣謂曰美美安否對曰無恙也僕亦訝之徐問趙曰某未省與君相識何故知其行止也趙乃以實告曰女適看花忽行奏卒既蘓自言前身乃公之妻也適窺見公不覺悶絶立歔欷乆之須臾縣令亦至衆客俱集趙白共事衆咸異之立曰某今年尚未髙亦有名官願與小娘子尋隔生之好衆共成之於是成婿而美美長於母三嵗矣㑹昌解頥録蜥蜴錢武肅毎夜令老姥監直更聽一霄銀板燈有大蜥蝪沿油釭噏之將竭倐然不見亦不為意明日王曰昨作夜夢飲麻膏充腸而飽是何祥也宫中或有對者王微哂而已𫝊載廟蛇之精梓橦縣張惡子神乃五丁㧞蛇之所也或云雋州張生所養之蛇因而祠之人謂之張惡子其神甚靈蜀王建世子元膺聰明􅀶達騎射絶倫牙齒常露多以袖掩口左右不敢仰視蛇眼而黒色兇惡鄙䙝通夜不􅄰竟以作逆伏誅就誅之夕梓橦廟祝亟為惡子所責言我不在川今始方歸何以致廟宇荒穢如是耶由是蜀人方知元膺為廟蛇之精矣北夢靈運來謁江南邉鎬初生其父忽夢謝靈運持刺來謁自稱前永嘉守修髯秀采骨清神竦所披衣巾輕若煙霧曰欲托君為父子頓寄浙西飛來峯翻譯金剛經有未合佛㫖處願生君家刋正慎勿以葷羶噉我七嵗於我出家為僧以畢前經夢訖鎬生貌類夢中者父愛之小字康樂成童聰明堅求出家其父不允以葷廹之及冠強為娶妻後嗣主愛其博雅累用之而柔懦寡断唯好釋氏初從軍平建州唯務全活人號邉羅漢及至湘潭人號邉菩薩及帥潭政出多門絶無威断楚人失望人號邉和尚玉壺清話夜义精髙澧夜叉精也嘗請太學博士丘光庭校書於樓中澧亦屢徃視之一日襪而登光庭不之知因回顧見一青面鬼遂大呼俄而見澧撫之曰謹勿言之以是驗其非人吳越備史北平王馬仁裕徐州人唐北平王燧裔孫世為武寧軍校仁裕母方娠夢𫝊言北平王來歸生紫氣光庭南唐顔延之潘佑自言其母方娠夢古衣冠人告曰我顔延之也與夫人為子及生七嵗始能語曰兒誤傷白龍為上帝所罰也因吟詩曰朝㳺滄海東暮歸何太速只因騎折王龍腰謫在人間三十六果以其嵗罪死南唐相山夢牛相來劉沆曽祖景洪事楊行宻為江西牙將有彭旴者稱太守脇景洪附湖南偽許之復以歸行宻遂不任初景洪曰我不從彭旴因活萬餘人後必隆因名所居山曰復隆山山有牛僧孺讀書堂沆母夢牛相公來而生沆後沆赴舉有老人云公自是羅浮山玉源遵君漢將鄧禹范祖禹母夢一丈夫被金甲至寢曰吾故漢將鄧禹也祖禹是日生公遂以名初字夢得温公以𫝊稱鄧禹篤行淳備改字淳甫家𫝊琅琊僧張安道自禁林謫守滁州睱日逰琅琊精含恍然省記前生曽作寺僧手冩楞伽經四卷使人登佛屋梁間獲經凾發視筆畫手迹宛然悲喜太息夙障氷解樂全盖琅琊山僧後身也遂託東坡書此經入金山寺印施寓簡侯鯖録戒和尚元豐中東坡謫居黄州子由亦遷髙安時雲菴居洞山嘗夢與子由借出㳺郊云迓五祖戒禪師覺而異之遲明以語子由既而蜀僧聰禪來曰我祖夢吾三人同迎戒和尚此何祥也子由大駭歎曰世豈有同夢者耶與二士俱行二十餘里而東坡至東坡曰某八九嵗時時夢身是僧徃來陜右又云妣方孕夢一僧瘠而𦕈來託宿聰驚曰戒陜右人失一目暮年棄五祖終於犬遇逆數盖五十年矣後坡謫英州與僧書曰戒和尚又鑿脱也志林降鄒陽何逺一日謁氷華居士錢濟明文於其所居烟雨堂語次偶誦祭東坡先生文至降鄒陽於十三世天其偶然雖繼孟軻於五百年吾無間也之句氷華笑曰此老夫所為者因請降鄒陽事氷華云元祜初劉貢父夢至一官府紫間文軸甚多偶取一軸展視云在宋為蘇某逆數而上十三世云在西漢為鄒陽盖如皇帝時為大師周朝為柱下史只一老􅅨也春者紀聞前身女子黄山谷初與東坡同見清老者清語坡前身為五祖戒和尚而謂山谷云學士前身一女子我不能詳語后日學士至涪陵當自有見者山谷意謂涪陵非遷謫不至聞之亦似憒憒既坐罪人果遷涪陵未幾夢一女子云某生誦法華經而志歿後身為男子得大知惠為一時名人今學士某前身也學士近年來所患腋氣者縁某所塟棺朽為蟻穴居係兩腋之下故有此苦今此居後山有某墓學士能啟之除去蟻聚則腋氣可除也既覺果訪得之已無主矣因改去之而腋氣果除上秦王後身王介甫在鐘山讀書有一長老曰先輩必做宰相但不可念舊惡改壊祖宗格法介甫云一第未就奚暇問作宰相併壊祖宗格法僧戲言也老僧云曽坐禪入定見秦王入寺來知先輩秦王後身也貴耳集贊皇公至趙鼎初生時其母夢金紫偉人入其室前有贊引者喝曰贊皇公至夫人驚悟彷彿若有所見未幾而鼎生焉其后仕宦功名多與徳裕合徳裕自東都分司貶潮陽而鼎亦自四明以散官安置子潮陽徳裕明年貶朱崖而卒鼎亦卒于朱崖俱年十二坦齋筆衝萬年鬼王王萬年副都統因貽書岷峨山拗中和尚和尚不荅書但云𫝊語太尉卑歸人至問有書否堅不肯説王云我已知了你直説乆而方云和尚請太尉早歸三日後與潄間即逰人問拗中云王太尉是第六個萬年鬼王所以姓王名萬年貴耳集伯威後身王十朋將誕時母夢其族叔之師嚴伯威閔黎至家遂生後有僧見十朋云此郎嚴伯威後身也梅溪文集十朋石橋絶句云石橋未到神先到日裏還同夢裏時僧教我名劉道者前身曽冩石橋碑石橋乃天台五百尊羅漢洞口也闕説叢仙菴道人建寧浦城有道人於山間結菴煉丹將成忽一日入定語童子曰我去後或十日五日即還謹勿輕動我屋子後數日忽有叩門者曰我知汝師已為𡨕不所録留之徒臭腐耳童子不悟為魔遂舉而焚之道者旋歸繞菴呼號云我在何處如此月餘不絶聲適有老僧問其説厲聲荅之曰爾説尋我爾却是誰其聲乃絶時其母方娠忽見道者入室遂産徳秀齊東埜野婺女星胡寅夫人翁氏宻州司户揆之女也生之前一夕其祖殿撰夢有通謁者曰吾婺女星也當生君家翼日而翁氏生紅光滿室殿撰曰此必清貴而壽者也長歸於寅以婦徳聞見𤣥孫者三封太原寧郡大夫人内𫝊夢龍文天􅖤其母將誕夢有龍降其家公遂生其所居之傍有潭成巨浸自公之生潭水日淺長讀書秀水山中往來中途有客店一夕店主夢龍蛻爪於門外石上迨曉開户見公脱履於石少憇而去又公好與客奕水中客不能勝公鎮日怡然自若及公卒潭水復深國王唐裴休為于闐王北燕南唐後主為師子國王乗異記重生秦諜復蘓晉伐秦晉人獲秦諜殺諸絳市六日而蘇盖記異也左宣公記漢宫人漢末闗中大亂有發前漢時宫人冢者人猶活既出平復如舊魏郭后愛念之録置宫中常在左右問漢時宫内事説之歴歴皆有次叙郭崩哭泣過禮遂死博物志魏時人有開周王冡者得殉塟女子經數日而有氣數月而能語年可二十送詣京師郭太后愛養之十餘年太后崩哀思哭泣一年餘而死顧愷之啟䝉注張明友奴并州刺史畢軌送漢故度遼將軍范明友鮮畢奴年三百五十嵗言語飲食如常人奴云霍顯光後小妻明友妻光前妻女世語漢末發范友明冡奴猶活友明霍光女聓説光家事廢立之際多與漢書相似此奴常逰走於民間無止住處博物志崔涵菩提寺西域胡人所立沙門逹多發塜取甎得一人以進時太后與明帝在華林堂以為妖異使黄門侍郎徐紇問其姓名死來幾年何所飲食死者曰臣姓崔名涵字子洪博陵安平人也父名暢母姓魏家在城西財里死時年十五今滿二十七在地十有二年常似醉卧無所食也時復逰行或遇飯食如似夢中不甚辨了后即遣門下録事張雋詣財里訪涵父母果得雋還具以實聞后遣送涵回家母魏把桃枝急令速去涵遂捨去逰於京師常宿寺門下汝南王賜黄衣一具涵性畏日不敢仰視又畏水火及刀兵之屬常走於逵路遇疲則止不徐行也時人猶謂是鬼東藍記生食荷葉陏開皇三年京師西北凝觀寺有僧法慶造丈六挾貯像未成暴死時寳昌寺僧大智同日亦卒三日並蘓云見官曹殿上有人似王者儀仗甚衆見法慶在前有一像忽來謂殿上人曰慶造我未成何乃令死便檢文薄云慶食盡命未盡上人曰可給荷葉以終壽言訖忽然皆失所在大智便蘓衆異之乃徃凝觀寺問慶説皆符驗慶不復能食毎日朝進荷葉六枝齋時入枝如此終身同流請乞以成其像兩京記昭宗初年鳯翔釋寗師者忽暴終而蘓云初為𡨕司所攝也一判官云和尚壽在而無禄召吏檢之只有乾荷葉三石因令注於簿自此寗毎断中惟荷葉湯而已􅀈下號入𡨕和尚上法慶丸欲食時先以煖水令䙲濕方食之宋髙僧三百年復生竇建徳常發鄴中一墓無他物開棺見婦人顔色如生姿容絶麗可年二十餘衣物形制非近世者候之似有氣息乃收還軍養之三日而生能言云我魏文帝宫人随甄皇后在鄴死塟於此不知今乃何時也説甄后見害了了分明建徳甚寵愛之其後建徳為太宗所滅帝將納之乃具以事白且辭曰妾幽閉黄壤已三百年非竇公何以得見今日死乃妾之分也遂飲恨而卒帝甚傷之神異𫝊粥餅宋之末年姑蘓賣餅冢檢所鬻錢得𡨕幣焉因怪之毎粥餅必識其人與其錢乆之乃一婦人也跡其婦至一塜而滅遂白之官啟塜見婦人卧柩中有小兒坐其側恐其為人所覺必不復出饑死小兒有好事者收歸養之既長與常人無異不知其姓鄉人呼之曰鬼官人元初猶在後數年方死元吾衍子行間居録夀考老考也説文老朽也老而不死曰仙釋名期頥五十曰艾艾治也治事能断割芟刈無所疑也六十曰耆耆指也不從力役指事使人也七十曰耄頭髪白耄耄然也八十曰耋耋鐡也皮膚變黒色如鐡也九十曰鮐背皆有鮐文也或曰黄耉鬢髪變黄也耉垢也皮色驪悴恒如有垢者也或曰胡耉咽皮如雞胡也或曰凍梨皮有班黒如凍梨色也或曰齯齯大齒落盡更生細者如小兒齒也百年曰期頥頥養也老昏不復知服味善惡孝子期於盡養道而已也上五福一曰壽二曰富云云五曰考終命洪範四事楊朱曰生民之不得休息為四事故一為壽二為名三為位四為貨有此四者畏鬼畏人畏威畏刑此謂之遁人也不逆命何羡壽不矜貴可羡名不要勢可羡位不貪富可羡貨此之謂順民也列大齊楊朱曰百年壽之大齊得百年者千無一焉設有一者孩抱以逮昏老幾居其半矣夜眠之所弭盡覺之所遺又幾居其半矣痛疾哀苦亡失憂懼又幾居其半矣量十數年之中逌然而自得亡介焉之慮者亦亡一時之中爾則人之生也奚為哉奚樂哉上盗跖曰人上壽百嵗中壽八十下壽六十除病痩死喪憂患其中開口而笑者一月之中不過四五日而已矣莊盗跖長生黄帝曰治身柰何而可以長乆廣成子曰無視無聴抱神以静形將自五必静必清無勞女形無摇女精乃可以長生故我修身千二百嵗矣吾形未嘗衰八百彭祖姓籛名鏗堯臣封于彭城在啇為守藏史在周為柱下史年八百嵗猶自悔不壽枕髙杖晚而唾逺自喪四十九妻五十四子仙𫝊世本楚辭主莊子曰夫道自本自根未有天地自古以固存彭祖得之上及有虞下及五伯又曰吹呴呼吸吐故納新熊經烏伸為壽而已矣此導引之士養形之人彭祖壽考者之所好也周王壽文王祖父壽百二十而沒王季百年而沒文王壽九十七而沒六韜八十入文説苑云吕望年七十釣于渭渚三日三夜魚無食者望即忿脱其衣冠上有農人者古之異人謂望曰子姑復釣必細其綸芳其餌徐徐而投無令魚駭望如其言初下得鮒次得鯉刺魚腹得書書文曰吕望封于齊望知其異史注姚賈對秦王曰太公望齊之逐夫朝歌之廢屠子良之逐臣棘津之讎不庸文王用之而王秦䇿太公九十乃顯榮分誠未遇其匹合未玉九辨天問云師望在肆昌何識鼓刀揚聲后何喜王逸曰言太公鼓刀在市肆文王親徃問之對曰下屠屠牛上屠屠國文王喜載而歸楚辭淮南云吕望使老者奮太公鼓刀釣魚年七十始學讀書九十為文王師佐武王伐紂成王封之于齊髙誘註説林訓夫文王非無便辟親比已者超然乃舉太公於舟人而用之豈私之哉以為姣好耶即太公七十二齳然而齒堕矣韓詩外𫝊吕望行年五十賣食於棘津行年七十屠牛朝歌行年九十為天子師則其遇文王也説苑韓詩太公望故老婦之出夫也朝歌之屠佐也棘津迎客之舎人也年七十而相周九十而封齊説苑八遯齋閑覽梁灝八十二嵗狀元及第其謝啟云少伏生之八嵗多太公之二年未見所出而人遂皆云太公八十遇文王豈相沿之誤耶然國史及朝野雜記俱云灝中狀元年二十三非八十二也九十為師鬻子名熊楚人年九十見文王王曰老矣鬻子曰使臣捕獸逐麋已老矣使臣坐䇿國事尚少也文王師之著書二十二篇名曰鬻子鬻子世𫝊鬻子九十餘始遇文王而書乃載三監曲阜事篇名次第皆錯亂不可曉盖殘闕書也序史楚世家周文王之時季連之苗裔曰鬻熊鬻熊子事文王早卒楚武王熊通怒曰吾先鬻熊文王之師也早終成王舉我先公乃以子男田令居楚今書云昔者魯周公又曰周公使康叔徃封于殷皆文王後事也其為偽書無疑而無舉以證之者出入百嵗文王九十七而薨武王九十三而崩周公武王之弟也兄弟相差不過十年武王崩周公居攝七年復政退老出入百嵗矣邵公周公之兄也至康王之時尚為太保出入百有餘嵗矣𫝊稱邵公百八十髙宗享國百年周穆王享國百年并未享國之時皆出百三十四十嵗矣論衡交儆左史倚相迋見中公子亹子亹不出左史謗之舉伯以告子亹怒而出曰女無亦謂我老耄而舎我而又謗我左史曰唯子老耄故欲見以交儆子若子方壯能經營百事倚相將奔走承序於是不給而何暇得見昔衛武公年數九十有五矣猶箴儆於國曰自卿以下至於師長士苟在朝者無謂我老耄而舎我必㳟恪於朝朝夕以交戒我聞一二之言必誦志而納之以訓道我於是乎作懿戒以自儆也及其沒也謂之叡聖武公今子老楚國而欲自安也若常如此楚其難哉子亹懼曰老之過也乃驟見左史楚語登年魯叔孫僑如公孫歸父家皆侈劉康公告定王曰人臣而侈國家弗堪亡之道也若皆早世猶可若登年以載其毒必亡周語趙簡子曰雀雉魚鱉莫不能化惟不能哀夫竇犨曰君子哀無人不哀無賄哀名之不令不哀年之不登晉謂自養桓公之平陵見家人有年老而自養者公問其故對曰吾有子九韓子作三人家貧無以娶妻吾使傭而未返也桓公取外御者五人妻之説苑五桓公微服而行於民問有鹿門稷者年七十而無妻問子管伸令宫中女子未嘗御出嫁之韓子十四麦丘三祝齊桓公逐白鹿至于麦丘見邑人問曰叟年幾何對曰八十有三矣公曰美哉壽乎與之飲曰盍以叟之壽祝寡人邑人奉觴再拜曰祝主君使主君甚壽金玉是賤人為寳公曰善哉至徳不孤善言必再吾子復之曰祝主君使主君無羞學無惡下問賢者在謗諫者得人公曰善哉至徳不孤善言必三吾子復之曰祝主君無使羣臣百姓得罪於吾君無使吾君得罪於羣臣百姓公怫然作色曰此言者非復前二言之祝叟其草之矣麦丘邑人坐拜而起曰子得罪於父可因姑姊妹謝也父乃赦之臣得罪於君可使左右謝也君乃赦之昔桀得罪於湯紂得罪於武王此則君之得罪於臣者也莫有謝至今不赦公曰善抉而載之自御以歸禮之於朝封之以麦丘而㫁政焉韓詩新序二七宋襄公及楚人戰于泓不禽二毛公傷股子魚曰今之勍者皆吾敵也雖及胡耉獲則取之何有於二毛僖二十二無能為秦晉圍鄭佚之狐言於鄭伯曰國危矣若使燭之武見秦君師必退公從之辭曰臣之壯也猶不如人今老矣無能為也已公語之夜縋而出見秦伯曰隣之厚君之薄也夫晉何厭之有闕秦以利晉惟君圖之秦伯説與鄭盤僖三十七十三晉悼夫人食與人之城杞者絳縣人或年長矣無子而徃與於食有與疑年使之年使言其年曰臣小人也不知年紀臣生之嵗正月甲子朔四百有四十五甲子矣其季於今三之一也吏走問諸朝師曠曰魯叔仲恵伯㑹郤成子於承匡之嵗也七十三年矣史趙曰亥有二首六身下二如身是其日數也襄六種種齊侯田於莒盧蒲嫳見泣且清曰余髪如此種種余奚能為子雅曰彼其髪短而心甚長其或􅃦處我矣九月放盧蒲嫳于北燕昭三七十欲學晉平公問於師曠曰吾年七十欲學恐已暮矣師曠曰何不炳燭乎平公以為戲君師曠曰臣聞少而好學如日出之陽壯而好學如日中之光老而好學如炳燭之明炳燭之明孰與昧行乎平公曰善哉説苑㳟士魯有㳟士名曰機汜行年七十其㳟益甚冬日行隂夏日行陽市次不敢不行參行必随坐必危一食之間三起不羞見衣裘褐之士則為之禮魯君問曰機子年甚長矣不可釋㳟乎機汜對曰君子好㳟以成其名小人學㳟以除其刑對君之坐豈不安哉尚有差跌一食之上豈不美哉尚有哽噎今若汜所謂幸者也固未能自必鴻鵠飛沖天豈不髙哉矰繳尚得而加之虎豹為猛人尚食其肉席其皮譽人者少惡人者多行年七十常恐斧質之加於汜者何釋㳟為説苑㳟敬待命成回學於子路三年回㳟敬不已子路問其故何也回對曰臣聞之行者比於鳥上畏鷹鸇下畏綱羅夫人為善者少為䜛者多若身不死安知禍罪不施行年七十常恐行節之虧回是以㳟敬待大命子路稽首曰君子哉色若孺子南伯子葵問女偊曰子之年長矣而色若孺子曰吾聞道矣莊子三願齊宣王出獵於社山社山父老十三人相與勞王王賜之田不租父老皆拜閭丘先生獨不拜又賜無役役諸老復拜閭丘先生又不拜疑而問之對曰來見大王所望者三願賜臣壽賜臣富賜臣貴王曰天命有長短非寡人所則無所壽先生倉粟雖盈以備災害無以富先生大官無闕小官卑賤無以貴先生先生曰所望願王選良吏臣少可以得壽焉使民以時役無煩苛此臣所以得富焉使少者敬長長者敬老此臣所以得貴焉王賜臣田不租倉廩將虚賜臣無役則官無所使非所望也王曰賜先生為相可乎先生曰臣得三願足矣安用為相説苑御覽稍異春秋髙楚丘先生行年七十披裘帶索徃見孟嘗君欲趨不能進孟嘗君曰先生老矣春秋髙矣多遺忘矣何以教文楚丘先生曰噫將我而老乎噫將使我追車而赴馬乎投石而超距乎逐麋鹿而摶豹虎乎吾已死矣何暇老哉噫將使我深計逺謀乎定猶豫而決嫌疑乎出正辭而當諸侯乎吾乃始壯耳何老之有孟嘗君赧然汗出至蹱曰文過矣文過矣詩曰老夫灌灌小子蹻蹻言老夫欲盡其謀而少者驕而不受也秦穆公所以敗其師殷紂所以亡天下也故書曰黄髪之言則無所愆詩曰壽胥與試美用老人之言以安國也韓詩新序善飯亷頗奔魏趙王思復得亷頗使使者視頗尚可用否頗之仇郭開多與使者金令毁之趙使者既見亷頗頗為之一飯斗米肉十斤被甲上馬以示尚可用趙使還報王曰亷將軍雖老尚善飯然臣與坐頃之三遺矢矣趙王以為老遂不召本𫝊食乳張蒼身長大肥白如瓠為丞相十五嵗而免免相後老口中無齒食乳女子為乳母妻妾以百數嘗孕者不復生蒼年百有餘嵗而卒史逸樂益命文帝時得魏文侯時樂人竇公百八十嵗兩目皆肓文帝奇之問何能服食而至此耶對曰年十三失明父母哀之教使鼓琴日講習以為常事臣不能道固無所報弭也譚以為少肓恒逸樂所以益性命也新論九十授書伏生濟南人故為秦􅀶士文帝時聞其能治尚書欲召時伏生年九十餘老不能行使晁錯徃受之漢書漢興開設學校旁求儒雅以闡大猷濟南伏生年過九十失其本經口以𫝊授尚書序伏生老不能正言言不可曉也使其女𫝊言教錯齊人語多與頴川異錯所不知者凡十二三畧以其意屬讀而已衛宏古文尚書序車輪迎申公魯人少事齊人浮丘伯受詩武帝初即位使使束帛加壁安車以蒲裏輪駕駟迎申公弟子二人乗軺𫝊從至見上上問治亂之事申公時已八十餘老對曰為治者不在多言顧力行何如耳是時上方好文辭見申公對黙然漢書治詩轅固齊人以治詩孝景時為博士武帝初即位復以賢良徵諸儒多嫉毁曰固老罷歸之時固已九十餘矣公孫𢎞亦徵亥目而事固固曰公孫子務正學以言無曲學以阿世上三世不遇上嘗輦至郎署見一老髭鬚皓白衣服不完上問曰公何時為郎何其老矣對曰臣姓顔名駟江都人也文帝時為郎上問曰何不遇也駟曰文帝好文臣好武景帝好老臣又少陛下好少臣又老是以三世不遇上其言拜為㑹稽都尉漢武故事九千嵗東方朔元封中㳺鴻蒙之澤忽遇老母采桑於白海之積俄而有黄省翁指母以語朔曰昔為吾妻託形於太白之精今汝亦此精也吾却食吞氣已九千餘嵗目中瞳子皆有青光能見幽隠之物三千年一返骨洗随三千年一剥皮代毛吾生來已三洗髄一代毛矣洗沭澣裙石建為郎中令建白首萬石君尚無恙毎五日洗沐歸謁親入子舎竊問侍者取親中君厠牏身自澣洒復與侍者不敢令萬石君知之以為常漢書矍鑠劉尚擊武陵五溪蠻夷深入軍沒馬援因復請行時年六十二帝愍其老未許之援自請曰臣尚能被甲上馬帝令試之援據鞍顧盻以示可用帝笑曰矍鑠哉是翁也遂遣援後𫝊東觀記㬦哉是翁也字書㬦勇貎手自枝書向朗字巨達少時涉獵文學以吏能見稱自去長史優㳺無事垂三十年乃更潛心典籍孜孜不倦年踰八十猶手自校書刋定謬誤積聚篇卷於時最多開門接賔謗納後進但講論古義不于時事以是見稱劉楊同軌陳壽與譙周别周曰昔孔子七十二劉向楊雄七十一而沒今吾年過七十庻慕孔子遺風可與劉楊同軌恐不出後嵗必便長逝不復相見矣疑周以術知之假此而言也蜀志鐘鳴漏盡田豫為并州刺史徵為衛尉屢乞遜位司馬懿以為豫克壯書喻未聴豫書荅曰年過七十而以居位譬猶鐘鳴漏盡而夜行不休是罪人也遂稱篤疾年八十二薨魏志不倦書籍胡昭外同乎俗内秉純潔心非其好王公不能屈年八十而不倦于書籍者吾於胡徵君見之矣𫝊子鹿仙辛孟年七十與麋鹿同羣逰世謂之鹿仙潘岳中記命在日制劉寔字子真少貧苦賣牛衣以自給自少及老篤學不倦雖居職務卷不離手厯吏部尚書封遁陽子懷帝復授太尉固辭以老不許劉坦上言曰太尉寔懸車退老二十餘年浩然之志老而彌篤臣聞老者不以筋力為勞寔年踰九十命在日制聖詔殷勤斷章敦喻謂宜聴寔所守詔賜几杖不朝嵗餘薨時年九十一晉書髙其優禮劉毅字仲雄為尚書僕射以峭直不至公輔年七十告老乆之見許後司徒舉毅為青州中正尚書以毅懸車致仕不宜勞以碎務陳留相孫尹表曰昔鄭武公年邁八十入為司徒雖過懸車之年必有可用毅前為司𨽻多所按劾主者必疑其論議傷物故髙其優禮令去事實此為機閣毅使絶人倫之路也由是毅遂為州都上持更聲苦劉𢎞字和季為荆州刺史嘗夜起聞城上持更者歎聲甚苦遂呼省之兵年過六十羸疾無檽𢎞愍之乃讁罰主者遂給韋袍暖㡌轉以相付上百三十嵗羅結魏主太武初以河内鎮將遷侍中外都大官總三十六曹事年一百七嵗精爽不衰魏主以其忠慤甚見信待監典後宫出入卧内因除長信卿年一百一十詔聴歸老賜大寗東川以為居業并為築城即號曰羅侯城朝廷毎有大事驛馬詢訪焉年一百二十嵗卒魏書知足劉玩之字茂瑶以乆官年疾告退曰四十仕進七十懸車壯則馳驅老宜體息自頃以來衰耗漸篤為性不懶惰而倦怠頓來耳目本聰明而聾矒轉積脚不支身喘不緒氣朝露本光寧堪長乆且知足安分吾已足矣南齊書隂徳陽報髙允字伯㳟雖年漸期頥而志識無損晝夜嘗執書吟詠尋覽被召在方山作頌志氣猶不多損談説舊事了無所遺卒年九十八初允毎謂人曰吾在中書時有隂徳濟救人命若陽報不差吾壽應享百年矣其弟爕字季和毎詔徵辭疾不應恒笑允屈折乆官栖泊京邑從容千家餙老劉模髙允選為校書郎允修撰國記與俱緝著允所成篇卷預有功焉正始初為陳留太守時年七十餘矣而餙老隱年昧禁自效允𫝊賜杖致珍刀雍字淑和性寛柔好尚文典書不釋書皇興中雍與隴西王源賀中書監髙允等併以耆舊特見優禮賜几杖劍履上殿月致珍羞焉子遵字奉國年七十志力不衰嘗經篤疾㡬死見有神明救之言是福門子當享長年後卒於潞州刺史七十九御覽引致珍羞焉下即接嘗經篤疾是混父子為一事也誤跨鞍躍馬源懷賀子也正始初蠕蠕入冦詔加懐使持節侍中出據北蕃賜馬一匹紬鎧一具御稍一枚懷拜受訖乃於其庭跨鞍執矟躍馬大呼顧謂賔客曰氣力雖衰尚得如此蠕蠕雖畏壯輕老我亦未便可欺令奉廟勝之規總驍捍之衆足以擒其酋帥獻俘闕下時年六十一懐至雲中蠕蠕亡遁源𫝊跨鞍畢衆敬齊明帝殺廢帝子業授兖州刺史降魏後復為兖州徵還京師年已七十鬢髪皓白而氣力未衰跨鞍馳騁有若少壯太和中髙祖賔禮舊老衆敬與咸陽公髙允引至方山甚相愛敬接膝談欵有若平生後以篤老乞還桑梓朝廷許之衆敬臨還獻真珠襠刺虎矛等物文明太后引見於皇信堂賜酒饌車馬勞遣之魏書四十九白首彌勒趙逸字思羣性好墳典白首彌勤年踰七十手不釋卷北史崔浩同有隠士趙逸云是晉武時人晉朝舊事多所記録正光初來至京師逰于市里所經之處多記舊迹掘之皆驗號為聖人汝南王悦聞而異之拜為義父因而問何所服餌以致長年逸云吾不閑養生自然長壽郭璞常為吾筮云壽年五百嵗今始半餘帝給步挽車一乗三年以後遁去莫知所在伽藍記諱老魏中山王英伐義陽傅永為將軍自將馬步千人南逆齊將馬先琕琕將射永洞其左股永出箭復入大破之時年七十餘三軍莫不壯之後除恒農太守非心所樂毎言曰馬援充國竟何人哉吾獨皓首見拘此郡復為南兖州刺史年踰八十猶能馳射盤馬奮稍常諱言光毎自稱六十九魏書五十九四皓徐伯珍舉動有禮過曲木之下趨而避之早喪妻晩不復重娶自比曽參家甚貧窶弟兄四人皆白首相對時人呼為四皓南史養身静黙沈麟士字雲禎㓜而俊敏年七嵗聴叔父岳言𤣥賔散言無所遺失岳撫其肩曰若斯文不絶其在爾乎及長博通經史有髙尚之心織簾誦書口手不息鄉里號為織簾先生宋齊徵皆不就守操老讀書終不倦遭火燒書數千卷年過八十耳目猶聰明以反故抄冩火下細書復成二三千卷滿數十篋時人以為養身静黙所致南史隠逸𫝊頭有肉角梁蕭暎為北徐州刺史及徵將還鍾離人顧忠逺挺义行部伍中暎見其甚矣使人問之對曰年一百一十二嵗凡七娶有子十二死亡畧盡今惟小者已六十又無孫息家闕養乏是以行役暎大異之召賜之食食兼於人檢其頭有肉角長寸遂命後舟載還都謁見天子與之言徃事多異所𫝊擢為散騎侍郎賜以俸宅朝夕進見年百二十卒南史曽孫乳婦普通中北侵攻穰城城内有人年二百四十嵗不能能食穀唯飲曽孫婦乳簡文帝命勞之賜以束帛留枕荆州上津鄉人張元始年一百一十六嵗膂力過人進食不異至年九十七方生兒兒遂無影將亡人人告别乃至山林樹木處處履行少日而終時人以為知命湘東王愛竒重異遂留其枕上齒宿意新李百藥以年老致仕太宗嘗制帝京篇命百藥並作上歎其工手詔曰卿何身之老而才之壯何齒之宿而意之新乎百藥以名臣之子才行相繼四海名流莫不宗仰懸車告老怡然自得穿池築山文酒談賞以舒平生之志年八十二卒舊卧振髙風蕭徳言以年老請致仕太宗下詔曰頃年以來天下無事方欲建禮作樂偃武修文卿年齒已衰教將何恃所冀才徳猶茂卧振髙風使齊南伏生重在於茲日闗西孔子故顯於當今拜秘書少監兩宫禮賜甚厚不伏致仕武后時夏官侍郎侯知一以年老勅令致仕知一乃詣朝堂跳躍馳驅以示輕㨗時謂知一不伏致仕朝野僉載雪刺滿頭宋璟求致仕表云臣竊禄簮裳備員廊廟霜毫生額雪刺滿頭求歸耕養築墉巖穴樂太平之世允荷聖朝開元遺事百二十八開元東封有太原人于伯龍者年一百二十八嵗精爽不昧其子已卒兩孫随之各年七十八矣自北來詣闕引見上勞之曰老人無拜禮伯龍曰臣神堯皇帝之臣也荏苒嵗月得至今日復事郎君臣之幸矣郎君明聖功成封岳不以昏老千里而來上笑而憫之乃賜紫袍牙笏及優恤有功伯龍自言陏仁壽年生説大業末事了然可見似亡友蕭穎士嘗出㶚橋道左逢一老人眉髪皎白狀骨甚竒右蕭甚異之老人瞻顧蕭蕭問之老人云公似吾亡友耳蕭固請言之老人曰吾與鄱陽王恢善君甚類之乃穎士六代祖蕭其所來不應而去𫝊載氣海常温栁公度子華子也善攝生年八十餘步履輕便或祈其術曰吾初無術但未嘗以血氣佐喜怒氣海常温耳舊唐貴壽嚴綬才器不踰常品事兄嫂過為時所稱常以寛柔自特位嚌上公年至大耊前後統臨三鎮皆號雄藩所辟士親暏為將相者凡九十人其貴壽如此舊九老白居易暮節惑浮屠至經月不食葷稱香山居士常與胡杲等燕樂皆髙年不仕者人暮之繪為九老圖時洛陽遺老李元爽年一百三十六禪僧如滿歸洛年九十五白居易序一門壽考蕭愿字惟㳟梁宰相頃之子也初愿之曽祖倣唐僖宗朝入相接客之次愿為兒童傚倣𫝊呼之聲倣謂客曰余豈敢以得位為喜所幸奕世壽考吾今又有曽孫左目前矣及愿長事父母以孝稱後為兵部郎卒之時年七十餘母猶在堂一門壽考人罕及者矣周史二百餘嵗五代王仁裕家逺祖母二百餘嵗九代祖李守忠為承㫖奉使南方過海至瓊州界道逢一翁自稱楊遐舉年八十一邀守忠詣其居見其父曰叔連年一百二十二又見其祖曰宋卿年一百九十五語次見雞窼中有小兒出頭下視宋卿曰此九代祖也不語不食不知其年朔望取下子孫列拜而已洞微志党翁邵伯温言洛陽有老人曰党翁者賣藥洛水北南行走甚快自言五代清太中嘗為兵經事柴太宗有放停公帖可驗其衣服猶唐装也有妻無子有問以前事者皆不荅元豐中不知所在党翁在清太中已為兵則已不下二三十矣計其壽當一百七八十餘陳恩被呵劉類為𢎞農太守民尹昌年垂百嵗聞類出行當經過謂其兒曰扶我迎府君我欲陳恩兒扶昌在道右類望見呵其兒曰用是死人來見我其視人無禮皆此類也魏書苛吏𫝊四方人壽東方極豪林之墟名呵羅提國人壽四百嵗南方極洞陽之野其國人壽三百六十嵗西方極浩素之壟其國人壽六百嵗北方極朔隂之庭名旬羅之國人壽三百嵗上方上清陽灰空之内其國人髙上玉皇萬聖帝真惟刼為年直下極大風澤名寳真無量國人壽一千二百嵗放品經三老人嘗有三老人相遇或問之年其一曰吾年不可記但憶少時與盤古有中外一曰海水變桑田吾輒下一籌已滿十屋一曰吾師食蟠桃弃其核崑崙之下今樹與崑崙齊矣􅄷池筆記更老孝文詔曰天子父事三老兄事五更山陽公尉元鴻臚卿㳺明根並元亨利貞明兄誠素之著英風老敷雅迹公以八十之年宜處三老之重卿以七十之齡可充五更之選雖更老非官宜加殊養魏傳鄭𤣥注文王世子三老五更各一人皆年老更事致仕者也注樂記皆老人更知三徳五事者也蔡邕明堂論更應作叟叟長老之稱字與更相似書者澻誤以為更嫂字女傍叟今亦以為更故知應為叟也共摩銅狄薊子訓與一老翁共摩挲銅狄人相謂曰適見鑄此物而已近五百嵗後漢𫝊祅怪壽者百二十過此不死為失歸祅怪禮外𫝊不夀秀不實彭祖之知不出堯舜而上而壽八百顔淵之才不出衆人之下而壽不八列子力命郎顗云顔子十八天下歸仁後漢𫝊俗𫝊顔淵年十八升太山望見吳昌門外有係白馬論衡顔淵所以命短慕孔子殤其年也桓譚新論亞聖徳蹈髙蹤秀不實振芳風禰衡顔子碑徐勉子悱卒為客喻云秀而不實尼父為之歎息梁舊賦鵬賈誼曰十八以能誦詩属書聞于郡中吳廷尉為河南守聞其秀才乃言賈生年少頗通諸子百家之書文帝召以為博士是時賈生年二十餘最為少文帝悦之綘灌等盡害之適為長沙王太傅有鴞飛入害作賦以自廣後為梁懐王大𫝊而死時年三十三史記賦靈光王延壽字文考有儁才少逰魯國作靈光殿賦後蔡邕亦造此賦未成及見延壽所為甚竒之遂輟翰而已曽有異夢意惡之乃作夢賦以自厲後溺水死時年二十餘後漢王子山與叔父師到泰山從鮑子真學筭到魯賦靈光殿歸度湘水溺死博物志文考一字子山也豫知亡日陸績字公紀㓜有儁朗才數博學多通虞翻舊齒名盛龎統荆州令七年長於績共為交友仕至欝林太守自知亡日乃為辭曰有漢志士陸績㓜敦詩畫長玩禮易雨征遘疾嗚呼悲隔又曰從今已去六十年之外車同軌書同文恨不及見也年三十三卒文士傳吴志可言天人王弼字輔嗣山陽髙平人少而察惠十餘嵗便好壯老通辯能言為𫝊嘏所知吏部尚書何晏甚竒之題之曰後生可畏君斯人者可與言天人之際矣正始中遇癘疾亡時年二十四司馬師嗟歎累日婦亡神傷荀粲字奉倩彧子顗弟也常以為子貢稱夫子之言性與天道不可得聞然則六籍雖存固聖人之糠粃粲兄俁難曰易經云聖人立象以盡意繫辭焉以盡言則微言胡不可得而聞見哉粲荅曰盖理之甚微者非物象之所舉也今稱立象以盡意非此通于意外者也繫辭焉以盡言此非言乎繫表者也斯則象外之意繫表之言固藴而不出矣及當時能言者不能屈也又論父彧不如從兄攸彧立徳髙整軌儀以訓物而攸不治外形慎宻自居而已粲以此言善攸諸兄怒而不能迴也妻曹洪女有美色専房歡宴厯年後婦病亡不哭而神傷痛悼不能已嵗餘亦亡時年二十九粲簡貴不能與常人交接所交皆一時俊傑至塟夕赴者裁十餘人皆同時知名士也哭之感慟路人何恒為粲𫝊栁𢎞卒楊表誄之曰山陽王弼風流長逝穎川荀粲零落無時修行夾池永絶梁園之賦長楊映沼無復洛川之文朝野悲惜魏舒子混字延廣清恵有才行年二十七先舒卒朝野咸為舒悲惜舒毎哀慟退而歎曰吾不及莊生逺矣豈以無益自損乎於是終服不復哭詔曰舒惟一子薄命短折舒告老之年處窮獨之苦毎念怛然為之嘆悼思所以散愁養氣可更増之味品物仍給四望牛車庻出入觀望或足散憂也本𫝊不秀王戎喪兒萬子山簡徃省之王悲不自勝簡曰孩抱中物何至于此王曰聖人忘情最下不及情情之所鍾正在我輩簡服其言更為之慟世説萬子有大成之風苗而不秀上棟梁折衛玠字叔寳有虚令之秀清勝之氣在羣伍之中有異人之望祖衛瓘見玠五嵗曰此兒神爽聰令與衆大異恐吾年老不及見耳别𫝊及長好言𤣥理親友時請一言無不咨嗟以為入微以天下大亂移家南行永嘉六年卒時年二十七塟於南昌謝鯤哭之慟人問曰子有何恤而致斯哀荅曰棟梁折矣不覺哀耳咸和中丞相王導教曰衛洗馬明當改塟此君風流名士海内所瞻可修薄祭以敦舊好行善禍繁羊秉字長達少有令譽仕參撫軍將軍事將奮千里之足揮沖天之翼惜乎春秋三十有二而卒昔罕虎死子産以為無與為善自夫子之沒有子産之嘆矣亡後有子男又不肙是何行善而禍繁也豈非司馬生之所惑歟羊權為黄門侍郎侍簡文坐帝問曰夏侯湛作羊秉叙絶可想是卿何物有後不權澘然對曰亡伯令問夙彰而無有繼嗣雖名播天聴然𦙍絶聖世帝嗟慨乆之世説轉視塵尾王長史濛病篤􅆍卧燈下轉塵尾視之嘆曰如此人曽不得四十及亡劉尹惔臨殯以􅙈柄麈尾箸柩中因慟絶上年齊古人王修字敬仁小字苟子濛子也明秀有美稱善𨽻行書號曰流奕清舉轉中軍司馬未拜而卒時年二十四昔王弼之沒與脩同年故修弟熈乃嘆曰無愧於古人而年與之齊也文字志不可無年王珣疾臨困問王武岡謚曰世論以我家領軍比誰武岡曰世以比王比中郎坦之東亭轉卧向壁嘆人固不可以無年上祝予羊孚年三十一卒桓𤣥與羊欣書曰賢從情所信寄暴疾而殞祝予之歎如何可言蘭王夙凋謝恵連年十嵗能屬文才思富㨗彭城王義康修府城得古冢使恵連為祭文留信待成其文甚美文為雪賦以髙麗見竒靈運見其新文毎曰張華重生不能易也文章並行於世年三十七卒南史恨其蘭玉夙凋故長轡未騁詩國政衰王曇首太保𢎞之弟也武帝至彭城大㑹羣英臺賦詩曇首文先成帝問𢎞曰卿弟何如卿荅曰若但如下官門户何寄帝大笑為文帝鎮西長史武帝謂文帝曰曇首輔相才也汝可毎事􅖴之後乞吳郡文帝曰豈有欲建大厦而遺其棟梁卒時年三十七文帝臨慟嘆曰王詹事所疾不救國之衰也中書舎人周赴侍側曰王家欲衰賢者先殞上曰直是我家衰矣南史後進領袖王訓字懷範㓜聰敏有識量後拜郎中入見武帝帝問何敬容曰禇彦回年幾為宰相敬容曰少過三十上曰今之王訓無謝彦回訓美容儀善進止文章為後進領袖年二十六卒上珠樹王勃字子安六嵗善文辭九嵗得顔師古注漢書讀之作指瑕以擿其失聰驚絶衆文章邁㨗下筆則成尤好者書為虢州叅軍坐罪除名父福畤以左遷交趾令勃徃省道出江中為採蓮賦以見意其辭甚美渡南海堕水而卒時年二十八舊唐奴僕命騷李賀字長吉韓退之皇甫湜聨騎造門賀總角荷衣而出賦髙軒過操觚立成杜牧之序其文盖騷之裔理雖不及辭或過之生二十七年死世皆曰使賀且未死少加以理奴僕命騷可也神㑹天出邢君實恕子也自少有逸才大為蘇黄諸公所稱許而不幸早死作秋風三疊時年未弱冠神㑹天出如不經意同時之士名好古字皆不能及富鐘懸不移魯孟獻子聘於晉宣子觴之三徙鍾石之懸不移而具獻子曰富哉家宣子曰子之家敦與我家富獻子曰吾家甚貧惟有二士曰顔回兹無靈者使吾邦家安平百姓和恊惟此二者耳吾盡於此矣客出宣子曰彼君子也以養賢為富我鄙人也以鍾石金玉為富孔子曰孟獻子之富可著於春秋新序逃富鬬且曰昔鬬子文三舎令尹無一日之積䘏民故也成王毎出子文之禄必逃王止而後復入謂子文曰人生求富而子逃之何也對曰夫從政者以庇民也民多曠者而我取富焉是勤民以自封也死無日矣我逃死非逃富也楚語富淫齊慶封奔吳吳予之朱方聚其族焉而居之富於其舊子服恵伯謂叔孫曰天殆富淫人慶封又富矣楊子曰善人富謂之賞淫人富謂之殃天其殃之也其將聚而殱旃襄二十八幅利齊慶氏亡分其邑予晏子弗受子尾曰富人之所欲也何獨弗欲對曰慶氏之邑足欲故亡吾非惡富也恐失富也且夫富如布帛之有幅焉為之制度使無遷也夫民生厚而用利於是乎正徳以幅之使無黜嫚謂之幅利利過則為敗吾不敢貪多所謂幅也上怙富子産聘晉叔向問子晳于行人揮對曰其與幾何無禮而好陵人怙富而卑其上弗能乆矣昭元富得罪南宫敬叔以富得罪於定公奔衛衛侯請復之載其寳以朝夫子聞之曰若是其貨也喪不若速貧之愈子游侍曰敢問何謂如此孔子曰富而不好禮殃也敬叔以富喪矣而又弗改吾懼其將有後患也敬叔聞之驟如孔氏而後循禮施散焉家語陶朱公黄帝設五法布之天下用之無窮盖世有能知者莫不尊親如范子可謂曉之矣范蠡為越相三江五湖之間民富國強卒以擒吳功成而弗居變名易姓之陶自謂朱公行十術之計二十一年之間三致千萬再散與貧素王妙論逰宫范蠡相越日致千金家僮閑筭術者萬人收四海難得之貨盈積於越都以為器銅鐡之類積如山之阜或藏之井壍謂之寳井奇容麗色溢於閨房謂之逰宫歴古以來未之有也拾遺記猗頓猗頓魯之窮士問術于朱公乃畜㹀于猗氏之南以富興於猗氏故曰猗頓孔叢子君子之富楚王問莊辛曰君子之富柰何對曰君子之富假貨人不徳也不貴也其食飲人不使也不役也親戚愛之衆人喜之不肖者事之皆欲其壽樂而不傷於患此君子之富也楚王曰善説苑昔楚頓襄王問陵陽右曰君子之富何如云云後漢楚宏𫝊論觀時白圭曰吾營生猶伊尹吕尚之謀白圭樂觀時豐嵗熟取穀與之絲漆繭出取帛絮與之食趍時若猛獸鷙鳥之發史記卓氏卓氏用鐡冶富程鄭富埒卓氏上食貨稱首卓王孫家僮千數程鄭各八百人而郗公從禽巷無竹八簫鼓歌吹擊鐘肆懸富侔公室豪過田文漢家食貨以為稱首盖以地沃土豐奢侈不期而至也華陽國志銅山臨卭有古石山有石鑛大如蒜子火燒合之成流支鐡甚剛因置鐡官漢文帝時以鐡銅賜侍郎鄧通通假民卓王孫嵗取千疋故王孫貨累巨萬億鄧通錢亦盡天下王孫女文君能鼓琴時有司馬長卿者臨卭令王告與之逰王孫家文君因奔長卿上茂陵富人茂陸富人袁廣漢藏鏹巨萬家僮八九百人於北邙山下築園東西四里南北五里激流水注其内構石為山髙十餘丈連延數里養白鸚鵡紫鴛鴦釐牛青兕竒獸怪禽委積其間積沙為洲與激水為波潮其中致江鷗海鶴孕雛産鷇延漫林池竒樹異草靡不具植屋皆徘徊連属重閣修廊行之移晷不能徧也廣漢後有罪誅沒入馬官園鳥獸草木皆移植上林苑中西京髙訾自元成訖王莾京師富人杜陵樊嘉茂陵摯網平陵如氏茸氏長安丹王君房豉樊少翁王孫大卿為天下髙訾漢貨殖𫝊輦賄思𤣥賦或輦賄而違車兮孕行産而為對注云昔有周犨者家貧夫婦夜田天帝見而矜之問司命曰此可富乎司命曰命當貧有張子錢可以借之乃借而與之期曰車子生急還之田者稍富利及期婦夫輦其賄以逃同宿路逢夫妻寄車下宿夜生子問名於夫夫曰生車間可名車子也從是所向失利遂以貧困善曰見鬼神志搜神記富擬封君湖陽縣有樊重碑重居湖陽能治田殖至三百頃起廬舎髙樓連閣波陂灌注竹木成林六畜放牧魚嬴梨果檀棘桑麻閉門成市兵弩器械貲至百萬其興工造作無窮巧不可言富擬封君世祖之少數歸外氏及之長安受業賫送甚至世祖即位追封敬侯詔湖陽為重立祠水經注後書畧同金穴郭況光武皇后之弟也累金數億家僮四百餘人以黄金為器工冶之聲震於都鄙時人謂郭氏之室不雨而雷言其鑄鍜之聲盛也庭中起髙閣長廡置衡石於其上以稱量珠玉也閣下有藏金窟列武士以衛之錯雜寳以餙臺謝懸明珠於四垂晝視之如星夜望之如月里語曰洛陽多錢郭氏室夜日晝星富無疋其寵者皆以玉器盛食故東京謂郭家為瓊厨金穴拾遺記守錢虜馬援嘗謂賔客云丈夫為志窮當益堅老當益壯凡殖貨財産貴其能賑施也否則守錢虜耳本𫝊散施折像字伯式父國有貲財二億家僮八百人文卒感多藏厚亡之義乃散金帛資産周施親踈或諫像曰君三男兩女孫息盈前當増益産業何為坐自耗散乎像曰昔闘子文有言我乃逃禍非避富也吾門户植財日乆盈滿之咎道家所忌今世將衰子又不才不仁而富謂之不幸墻隙而髙其崩必疾也智者聞之感服焉後漢書實庭麋竺字子仲祖世貨殖僮客萬人貲産巨億蜀志竺用陶朱計術日益億萬之利貨擬王家有寳庫千間貨財如山不可筭計内以方諸盆缾設大珠如卵散滿於庭謂之寳庭而外人不得窺時三國交鋒軍中萬倍乃輸其寳物車服以助先主黄金一億斤錦繡氈􅄢積如丘壠駿馬萬疋拾遺於時困匱頼此復振志饑賴以濟刁逵字伯道彛子也隆安中廣州刺史其弟暢為始興相後為冀州刺史兄弟子姪並不拘名行以貨殖為務有田萬頃奴婢數千餘人貨稱是桓𤣥簒併為所用𤣥敗併誅刁氏素殷富奴客縱横固吝山澤為京口之蠧劉裕散其資畜令百姓稱力而取之彌日不盡時天饑弊編户賴之以濟焉晉三十九鑄全為龍齊時長沙寺僧業富沃鑄黄金為龍數千兩埋土中歴相𫝊付稱為下方黄鐡莫有見者蕭潁胄伎取此龍以充軍實南齊書樓觀出雲元魏時洛陽有劉寳者最為富室州郡都㑹之處皆立一宅各養馬一疋至于塩粟貴賤市價髙下所在一例舟車所通足跡所履莫不啇販焉是以海内之貨咸萃其庭産疋銅山家藏金穴宅宇踰制樓觀出雲車馬服餙擬于王者伽藍記流星入裙北齊後主武平初邑王氏與同邑人李家為婚載羊酒欲就親家宴㑹行不過三里日沒漸暗見南五十步外有赤物大如升若流星曵影直來着車輪牛即不動見者並怖其妻遂下車向而再拜張裙引之便入裙下昇車還家觀之乃真金遂盛于庫櫃毎至良辰恒以香火祈恩後四方異貨畢集其家田蠶毎年百倍至春其庭生一桑樹枝葉異于衆木數年之間遍滿一院竒禽異鳥莫不棲集其家大富將三十年王氏妻以老病終後凌朝有白鳥似鷺飛至桑樹側吐血乆之堕地而死日午後西北大漩風漲天而來旋遶此樹疎其枝柯如掃箒之形不經十日奴婢逃走首尾相繼家資畧盡及開櫃取金唯見熒火蜿蜓腐草之餘耳廣古今五行記金舸自随蠻酋馮盎族人子猷性豪俠貞觀中入朝載金一舸自随許敬宗嫁女與盎子多納金寳為有司所効左授鄭州刺史卒袁思古議謚曰弃長子於荒徼嫁少女于夷洛聞詩學禮事絶於趨庭納采問名唯聞於黷貨請謚為謬舊唐田彭侍中平恩公許郝師即郝俊之勇早同鄉里俱宦達於時又其鄉人田氏彭氏以貨貲見稱有彭志筠顯慶中上表請以家絹布二萬叚助軍詔受其絹萬疋特授奉儀郎仍布告天下故江淮間語曰貴如許郝富如田彭唐書鄒駱駝鄒駱駝長安人先貧嘗以小車推蒸餅賣之毎至勝業坊角有伏磚車觸之即翻塵土涴其餅駝苦之乃將钁㔉去十餘磚下有瓷甕容五斛許開看有金數斗於是巨富其子昉與蕭佺駙馬子善時人語曰蕭佺駙馬子鄒駱駝兒非闗道徳合只為錢相知僉載西京懐徳坊南門之東有富啇鄒鳯熾肩髙背曲有似駱駝時人號鄒駱駝其家巨富金寳不可勝計常與朝貴逰邸店園宅遍滿海内四方物盡為所牧雖古之猗白不是過也其家男女婢僕錦衣玉食服用器物皆一時驚異嘗因嫁女邀請朝士徃臨拜席賔客數千夜擬供帳備極華麗及女郎出侍婢圍遶綺羅珠翠垂釵曵履尤艶麗者至數百人衆皆愕然不知孰是新婦矣又嘗謁見髙宗請市終南山中樹估絹一疋自云山樹雖盡臣絹未窮事雖不行終為天下所驚後犯事流𤓰州㑹赦還及卒子孫窮匱兩京記居賄裴伷先流北庭無復名檢専居賄五年數千萬娶降胡女為妻妻有萬金駿馬牛羊以財自雄養客數百人自北庭属京師多其客詷侯朝廷事聞知十有七八舊唐炎傳元寳𤣥宗嘗召王元寳問其家私多少對曰臣請以絹一疋係陛下南山樹盡臣絹未窮又𤣥宗御含元殿望南山見一白龍横亘一山間問左右皆言不見令急召元寳問之元寳曰見一白物横在山頂不辨其狀左右貴臣啟曰何則臣等不見𤣥宗曰我聞至富可敵貴朕天下之貴元寳天下之富故見耳人以錢文有元寳字因呼錢為王老南部新書獨異志地癖李憕豐于産業伊州膏腴水陸上田自都至闗口田疇彌望别業相望與吏部侍郎李彭年皆有地癖鄭巖天寳中為少府監田産亞于憕舊唐忠義多田翁𤣥宗命字文融為括田使融方恣睢稍不附己者必加誣譖宻奏以盧從願有田數百頃帝素器重亦猗為相者數矣而又族望婚宦鼎重於一時故帝亦重言其罪但目從愿為多田翁明皇雜録京師髙貲胡証拜嶺南節度使卒廣有舶具竒賣証厚殖財自奉養奴數百人營第修行里彌亘間陌車服器用珍侈遂號京師髙貲舊唐多藏為鑑李叔明豪侈在蜀殖財廣地舎田産歿數年子孫驕縱貲産皆盡世言多藏者以叔明為鑒上足穀翁相國韋宙善治生江陵府東有别業良田美産最號膏腴積稲如坻皆為滯穂咸通初授嶺南節度使懿宗以番禺珠翠之地垂貪泉之戒宙從容奏曰江陵庒積穀尚有七十堆固無所貪矣帝曰此所謂之足榖翁也北夢𤨏言打鍾百下京輦自黄巢退後修葺殘毁之處鎮州王家有一兒俗號王酒胡居於上都巨有錢納錢三十萬貫助修朱雀門上有詔重修安國寺畢親降車輦以設大齋乃十撞新鐘捨錢一萬貫命諸大臣各取意擊之上曰有人能捨錢一千貫文者即打一搥齋罷王酒胡半醉入來徑上鐘樓連打一百下便於西市運錢十萬貫入寺玉泉子寶精王處回積鉅萬計蜀中富豪罕與北在太原家甚貧善相者周𤣥豹毎指謂知祥曰此子寳精也它日當大富果如言九國志積錢有聲五代袁象先子正辭積錢盈室室中常有聲如牛以為疾勸其散以禳之正辭曰吾聞物之有聲者求其類耳宜益以錢聞者以為笑本𫝊王石乞兒李昊事前後蜀五十年資貨巨萬奢侈踰度妓妾百數嘗讀王愷石崇𫝊笑曰窮儉乞兒以此為富可笑可笑蜀檮杌代輸宣和間朝廷收復燕雲科增郡縣兑夫錢海州懐仁縣有楊秀才妻劉氏獨與子居而家饒於財乃以十萬緍代下户之輸縣令欣然輦運庫藏為空翼日視之庫中之錢復滿毎緍首有青麻二字觀者異之或曰聞青州有麻十萬家豈非神運其錢至此耶劉氏宻令徃青州踪跡之果有麻氏失錢劉氏請歸錢於麻麻以為天授辭焉劉氏乃悉散施之其後家益富云春渚紀聞民怨劉徳字路叔寛厚好施家産過百萬則以振昆弟賓客食飲曰富民之怨也漢書玉豚餘杭人沈縱家素貧與父同入山得一玉豚從此所向如意田桑並収家遂大富幽明録金牛增城東北有牛潭洞深無極此岸有石周逥圍三丈許漁人見金牛自水而出盤於此石義熈中増城縣人常安到此潭於石中山躡得金鎻大如指尋之不已俄而有物從水中引之握不能禁忽㫁得數尺遂致富年登上夀其後義興周雲甫嘗見此牛宿伏石上傍有金鎻如索繩焉雲甫素勇往掩此牛掣㫁其鎖得二尺許遂以財雄寰宇記圈鹿楊子雲作法言蜀富人賫錢千萬願載於書子雲不聴夫富無仁義之行圈中之鹿欄中之牛也安得妄載論衡三患出則以車入則以輦務以自佚命之曰招財之機肥肉厚酒務以相彊命之曰爛腸之食靡㬅皓齒鄭衛之音務以自樂命之曰伐性之斧三患者富貴之所致也吕本生貴盛歸仰貴歸也物所歸仰也汝頴言貴聲如歸往之歸也釋名近危韓皋常言洪範五福獨不言貴者以近於髙危福之自至猶宜儆動奈何枉道以邀之𫝊載物禁太盛李斯長男由為三川守諸男皆尚秦公主女悉嫁秦諸公子李由告歸咸陽李斯置酒於家百官長令皆月前為夀門庭車騎以千數李斯慨然而嘆曰嗟乎吾聞之荀卿曰物禁太盛夫斯乃上蔡布衣閭巷之黔首上不知其駑下遂擢至此當今人臣之位無居臣上者可謂富貴極矣物極則衰吾未知所稅駕也史記位盛辭禄張安世以父子封侯在位太盛乃辭祿詔都都内别藏張氏無名錢以百萬數安世尊為公侯食邑萬户然身衣弋綈夫人自紡績家童七百人皆有手技作事内治産業累積纎微是以能殖其貨富於大將軍霍光天子甚尊憚大將軍然内親安世心宻於光焉前漢金張金張藉舊業七葉弭漢貂左思諫史漢書金日磾賛曰夷狄亡國羇虜漢庭七葉内侍何其盛也七葉自武至平也又張湯𫝊賛曰張氏之子孫相繼自宣元已來為侍中中常侍者凡十餘人功臣之後唯有金氏張氏親近貴寵比於外戚選七葉弭貂見崇西漢息倖論許史朝集金張舘暮宿許史廬左漢書盖寛饒曰上無許史之属下無金張之託孝宣許皇后元帝母元帝封外祖父廣漢為平恩侯史良娣宣帝祖母也兄恭宣帝立恭已死封恭長子髙為樂陵侯注本𫝊鄭昌上書頌寛饒語曰寛饒言誤江淹雜體詩金張服貂冕許史乘華軒天賜册何比干字少卿明經行修兼法通律為汝隂縣獄吏決曹掾平活數千人後為月陽郡尉獄無寃囚淮汝號曰何公征和三年三月辛亥天大隂雨比于在家日中夢貴客車騎滿門覺以語妻語未已而門有老嫗可八十餘頭白求寄避雨雨甚而衣履不霑漬雨止送出門乃謂比干曰公有隂徳今天錫君䇿以廣公之子孫因出懐中符䇿狀如簡長九寸凡九百九十枚以授比干子孫佩印綬者當如此筭言訖出門不復見比干有六男又生三子本始元年自汝隂徙平陵代為名族何氏家𫝊比干敞文髙六世祖也後書三組楊僕懐銀黄垂三組師古曰僕主爵都尉又為樓舩將軍并將梁侯三印故三組也漢書五侯成帝河平二年上悉封舅譚為平阿侯商成都侯立紅陽侯根曲陽侯逢時髙平侯五人同日封故世謂之五侯本𫝊元后群弟世權更持國柄五將十侯卒成新都讃司穎校尉觧光奏曲陽侯根宗重身尊三世據權五將秉政天下輻輳自效本𫝊五將世權謂王氏五大司馬鳯音商根莽也海録内云莽誤北平侯王譚不同王莽之政子興生五子並避時亂隠居涿郡西山光武即帝位封為五侯元才北平侯益才安喜侯顯才蒲隂侯仲才新市侯季才為唐侯所謂中山之五王也故其舊居世以為五大夫城俗又以為五公城岳讃云五王在中龎葛建績者也水經譚倨不肯事鳯不輔政而薨子仁嗣仁素剛正莽内憚之今人奏就國后遣使廹守令自殺本𫝊祖孫可謂中立不倚者矣云謂不同莽政誤七貴西征賦窺七貴於漢庭譸一姓之或在注七貴謂吕霍上官趙丁𫝊王也庾亮表曰向使西京七族皆非姻黨從而悉全决不盡敗大白詩昔在長安醉花栁五侯七貴同杯酒史丹男九人皆以丹任並為侍中自宣元成哀外戚與者許史三王丁𫝊之家皆重侯累將窮富極貴見其位矣未見其人也漢傳賛與漢興衰耿氏自中興以後訖建安之末大將軍九人卿十三人尚公主三人列侯十九人郎將護𦍑校尉及刺史二千石數十百人遂與漢興衰東觀記四世三公袁紹字本初髙祖父安為漢司徒自安以下四世居三公位由是勢傾天下魏志安章帝時為司徒生蜀郡太守京京弟敞為司空京子陽為太尉陽子逢逢弟隗皆為公華嶠書逢孽子紹出後伯父成袁山松書逢子術後書陶謙表先主為豫州先主云袁公路四世五公海内所歸可以州與之孔融謂主曰冡中枯骨何足介意司馬彪書曰安桓帝初遷太尉有三子逢成隗逢字周陽靈帝時為司空隗字次陽獻帝初為司空似誤天下盛族諸葛氏之先出自葛國漢司𨽻校尉諸葛豐以忠强立名子孫代居二千石三國之興蜀有亮吳有瑾魏有誕名並盖海内為天下盛族六世九公惟我之先生于有晋人物盈朝衮衣暐曄六世九公不亦偉乎磊落瓌竒光昭合同已獨坐於古今拊萬姓而駭之矣中興丞相王公歎曰自八龍以後榮寵莫二為天下貴門荀氏家𫝊故昔沈公沈慶之既通貴鄉里老舊素輕之後見者皆膝行而前慶之歎曰故是昔時沈公勤學所致董徵字文發頓丘衞國人也以輔國將軍除安州刺史徵因述職路次過家置酒髙會大享邑老乃言曰腰龜返國昔人稱榮仗節還家云胡不樂因誠二三子弟曰此之富貴匪自天降乃勤學所致耳時人榮之元魏儒林𫝊四貴觀徳王雄髙祖族子也貴寵冠絶一時與髙熲虞慶則蘇威稱為四貴隋書象笏百人隋髙祖受禪李穆來朝髙祖降坐禮之拜太師穆子孫雖在襁褓悉拜儀同其一門執象笏者百食人穆之貴盛當時無比本𫝊一榻執笏崔神慶子琳等皆至大官群從數十趍走省閵每嵗時家宴組佩輝映以一榻置笏疊於其上開元天寳間中外族属無緦麻之䘮其福履昌盛如此東都私第門琳與弟太子詹事珪光祿卿瑶俱列棨時號三㦸崔家唐書旟斾成隂􅅊氏自居京兆代有人物朱輪接軫旟斾成隂酒囊飯袋馬氏奢僣諸院王子僕從烜赫文武之道未嘗留意時謂之酒囊飯袋江湖近事公子行王建㳺龍華禪院召僧貫休坐令口誦近詩時諸王貴戚皆賜坐貫休欲諷之因誦公子行曰錦衣鮮華手檠鶻間行氣貎多輕忽艱難稼穡緫不知五帝三王是何物建稱善責倖皆怨之蜀檮杌貧賤貧富富則盛貧則病甚矣貧之為病也不惟形色粗黶或亦心神沮廢豈但交友踈棄必有家人誚讓非亷潔深識者何能不移其植故欲蠲憂患莫若懐古之志當自同古人見深則憂淺識逺則患浮昔有琴歌於編蓬之中用此道也顔延年庭誥十盜武王問太公曰貧富豈有命乎太公曰為之不宻宻而不富者盜在其室武王曰何為盜也公曰計之不熟一盜也収種不時二盜也娶婦無能三盜也養女太多四盜也棄事就酒五盜也衣服過度六盜也封藏不謹七盜也井竈不利八盜也舉息就禮九盜也無事燃燈十盜也取之安得富哉王王曰善六書説苑同推車寗戚衛人也欲仕齊家貧無以自資乃賃為人推車至齊國桓公出戚望見車駕乃於車下飯牛扣牛角而歌桓公聞之撫手曰異哉此人乃非常人也命管仲迎之以為上卿史記立錐孫叔敖之為楚相盡忠為亷以治楚死其子無立錐之地貧困負薪以自飲食上憂貧叔向見韓宣子憂貧叔向賀之宣子曰吾有卿之曰昔欒武子無一卒之田其官不備其宗器宣其徳行慎其憲則諸侯親之戎翟懐之今吾子有欒武子之貧吾亦為能其徳矣是以賀若不憂徳之不建而患貨之不足将弔不暇何賀之有也國語苫盖范宣子數我子駒支曰乃祖吾離被苫盖蒙荆棘以來歸我先君正義曰爾雅曰白盖謂之苫孫炎曰白以來歸我先君正義曰爾雅曰白盖謂之苫孫災曰白盖茅苫也郭璞曰白茅苫也正義曰被苫盖言無布帛可依唯草苫也左襄十四廣絶交闕由于湫隘刎頸起于苫盖士之常孔子見榮啟期衣鹿皮裘鼓瑟而歌孔子問曰先生何樂也對曰吾樂甚多天生萬物唯人為貴吾既已得為人是一樂也人以男為貴吾既已得為男是為二樂也人生不免襁褓吾年已九十五是三樂也夫貧者士之常也死者民之終也處常待終當何憂乎列子説苑無財謂貧原憲居魯環堵之室茨之生草蓬户不完桑以為樞而甕無二室褐以為塞上漏下濕匡坐而弦子貢乗大馬中紺而表素軒車不容巷徃見原憲原憲華冠縱履杖藜而應門子貢曰嘻先生何病原憲應之曰憲聞之無財謂之貧學而不能行謂之病今憲貧也非病也子貢逡巡而有愧色莊子曵縱而歌曽子居衛緼袍無素顔色腫會手足胼胝三日不舉火十年不製衣正冠而纓絶捉衿而肘見納履而踵決曵縰而歌啇頌聲滿天地若出金石上貧不願仕孔子謂顔回曰回來家貧居卑胡不仕乎顔回對曰不願仕回有郭外之田五十畆足以給飦粥郭内之田十畆足以為絲麻鼓琴足以自娛所學夫子之道者足以自樂也回不願仕孔子愀然變容曰善哉回之意上二旬九食子思居於衛緼􅂁無表二旬而九食田子方聞之使人遺狐白之裘子思曰汲聞之妄與不如遺棄物於溝壑汲雖貧也不忍以身為溝壑是以不敢常常餓數日恵子家常餓數日不舉火乃見梁王王曰夏麥方熟請以割子可乎恵子曰施方來遇羣川之水長有一人溺流而下呼施救之施應曰吾不善㳺方将為子告急于東越之王簡其善游者以救子可乎溺人我得一瓢之力則活矣子方告急于東越之王簡其善㳺者以救我是不如求我于重淵之下魚龍之腹矣符子緯蕭河上有家貧恃緯蕭而食者莊子緯織也蕭菰蒿也陸龜蒙蟹志云漁者緯蕭承其流而障之名曰蟹斷然蕭緯二字尤竒輟耕録入灌畦鬻蔬為供魚食之祭織絇緯蕭以充饑寒之費顔延年陶靖節誄胡叟救沙門法成于死成感之遺其珍物叟曰緯蕭何人能奔明帝魏書夫緯蕭不獨見蟹志陶以為竒詎未讀莊子耶分餘光甘茂亡秦奔齊逢蘓代為齊使於秦茂曰臣得罪於秦懼而逃遁無所容跡臣聞貧人女與富人女㑹績貧人女曰我無以買燭而子之燭光幸有餘子可分我餘光無損子明而得一斯便焉今臣困願君以餘光振之史記齊徐吾者在海上貧婦人與隣婦人李吾之屬合燭相從云云列女𫝊史通云甘茂㑹織之云盖戰國逰士寓言設理義之比興耳劉向乃為此婦定其邦國加其姓氏以彼時有特為指實何其妄哉貸布蘇秦如趙逢其隣子於易水上從貸一布布償千金隣子不與典畧繩樞陳渉甕牖䋲樞之子過秦窮巷之賔䋲樞之士廣絶交論禮記儒有蓬戸甕牖韋昭曰䋲樞以䋲扄戸為樞也王褒得賢臣頌長於茅茨之下徐幹詩顧念蓬室士江淹上書本蓬户桑樞之人布衣韋帶之士劉孝標辨命論玉室編蓬未足憂其慮貧原憲桑樞不易有官之宅席門陳平少時家貧為人長大美色戸牖富人張負獨偉視平隨平至其家家廼負郭窮巷以席為門然門外多長者車轍漢書徳非陳平門無結駟之跡學非楊雄堂有好事之客應休璉書家徒四壁司馬相如初與卓文君至成都家徒壁立卓文君居貧愁憊以所服鷫鸘裘就市人楊昌貰酒遂相與謀還成都賣酒相如親著犢􅈹禈滌器以耻王孫西京雜記漢書都養倪寛受業孔安國貧無資用嘗為弟子都養時行賃作帶經而鉏休息輙讀誦漢書師古曰都凡衆也養主給烹炊者也貧無資用故供諸弟子烹炊也庸作匡衡字稚圭好學家貧庸作以資供用漢書勤學而無隣獨隣舍有燭而不逮衡乃穿壁引其光以書映光而讀之西京雜記阿街卒孔嵩字仲山宛人與山陽范式有斷金契貧無養親賃為呵街卒遣迎式式下車把臂曰子懐道卒伍不亦痛乎嵩曰侯嬴賤役晨門掃肆卑下之位古人所不恥何痛之有故讃曰仲山通達巻舒無方屈身厮役挺秀含芳華嶠書水經結草而居范丹桓帝時以丹為萊蕪長不到官後辟太尉府自以狷急不能從容常配韋于朝徒行弊服賣卜於市遭黨人禁錮遂推鹿車載妻子捃拾自資或依宿樹䕃如此十餘年乃結草室而居焉閭里歌曰甑中生塵范史雲釜生魚范萊蕪續漢書併日而食郭林宗家貧初欲逰學無資就姊夫貸五千錢乃逺至成臯從師授業併日而食衣不蔽形常以盖幅自障出入入則護前出則掩後有道别傳冬月無被孫晨晟字允公家貧不仕居社城中織箕為業明詩書為郡功曹冬月無被有薪朝束暮卧旦收之三事備録排草入室葛洪字稚川夙失庭訓躬執耕穡承星履草衣不辟寒室不免漏食不充虚名不出户貧無僮僕籬落頓決荆棘叢於庭宇蓬莠塞乎階霤披榛出門排草入室枹子北門之歎李𢎞度充常歎不被遇殷楊州知其家貧聞君能属志百里不荅曰北門之歎乆已上聞窮猿奔林豈暇擇木遂授郯縣世為鬼所笑劉伯龍者少而貧薄及長歴位尚書左丞少府武陵太守貧窶尤甚常在家慨然召左右將營十一之方忽見一鬼在傍撫掌大笑伯龍歎曰貧窮固有命乃復為鬼所笑也遂止南史七劉毅同郡宗人也志見王智深字雲才少從謝超宗學属文家貧無人事嘗餓五月不得食掘莧根食之司空王僧䖍及子志分其衣食南齊文學𫝊三人擔穀瑯瑘諸葛氏兄弟三人寓居晋陂家甚貧耗嘗乏自給榖在園中計日用未應盡而早已空始則故謂是家中相竊盗故復書檢題識而耗如初後有宿客逺來至巷口見數人擔從門出客借問諸葛在不答云悉在客進語訖因問卿何得大糶榖主人云告乞充口云何糶之客云吾向來逢見人擔榖出謂是何事人兄弟相視竊自疑怪及看書題宛然如故試開困量視無一許斛始知前後所失非人為之也餒死空谷元徳秀退居安陸去家數十里值大雨水漲七日不通餓死空室膚載為誄曰誰為府君犬必㗖肉誰為府僚馬必食粟使我元公餒死空谷楚田録榆作粥陽城少好學家貧無積值嵗饑雖隣里所無求惟屑榆作粥而已耗鬼郭鄩罷櫟陽尉窮居京輦盻蠁間常有二物狀如猿玃出入無不相逐所造之間如碍枳棘病於寒餒者數年百計莫之能絶一夕愁坐忽來告别云某乆乗君危厄渾不相離今將詣勝業坊王氏散其金帛鄩究問其事云先得女子安品子郭言於表弟張生未甚信王素吝嗇一日與賔從同過鳴珂里見婦人靚粧倚門悦之遂召同列命酒為歡時張生與其末頗以為異宻問之則安品子也品子善歌王氏悉以金帛贈之自是資貨日輸其門毎歡洽酒酣畧無所恡未經數年遂至貧困詰録随僧飯羅史君向廬州人不事産業以至困窮常在福泉寺随僧飯而食後去嘗廢二十年間持節歸鄉里及境至僧房中書壁曰二十年前此布衣鳴鹿西上虎符歸故時賔從論前事到處松杉長舊圍野老共遮官路拜沙鷗遥認隼旟飛春風一宿琉璃殿惟有泉聲愜素機監戒録赤貧古人謂空盡無物曰赤如赤地千里南史稱其家赤貧是也赤族言盡沒無遺類耳漢書注以為流血丹赤族疑謬貧窮仁義禮善之於人也譬若貨財粟米之於家也多有之者富少有之者貧至無有者窮也記大畧天中記卷三十九
