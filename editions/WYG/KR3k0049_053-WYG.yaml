body:
  text: 天中記卷五十三明陳耀文撰蓮芙蓉荷芙蕖其莖茄其葉蕸其本蔤其華菡蓞其實蓮其根藕其中的的中薏李廵曰􅀏蕖其總名也别名芙蓉郭璞曰江東人呼荷華為芙蓉北方人便以藕為荷亦以蓮為荷蜀人以藕為茄或用其母為華名或用根子為母葉號此皆名相錯習俗傳誤失其正體者也爾雅芙蕖莖為荷其華未發為菡蓞已發為芙蕖其實蓮青皮裏白子為的的中有青長三分如鈎為薏語曰苦如薏者也詩義疏其葉名荷圖經詩陳風彼澤之陂有蒲與荷樊光注爾雅引詩有蒲與茄水芝丹芙蓉一名水芝丹一名澤芝一名水花古今注芳苓七發蔓草芳苓善曰苓古蓮字七啓寒芳苓之靈龜石蕖黄帝時有石蕖青色堅而甚輕從風靡靡覆其波上一莖百葉千年一花生于洹流其地一名沙瀾拾遺記崑流素蓮西王母與周穆王共玉帳髙㑹進崐流素蓮千常碧藕素蓮者一房百子凌冬而茂上鬱水在磅磄山東其水小流在大陂之下所謂沈流亦名重泉生碧藕長千常七尺為常也上花徑十丈老子語喜曰天崖之淵真人所遊各各坐蓮花之上一花輒徑十丈有返生香逆風聞十里真人闗令尹喜傳華山頂上有池池生千葉蓮花長十丈藕如大船服之羽化物類相感志隋煬帝步虚辭八行分寶樹十丈散芳蓮韓退之詩太華峯前玉井蓮花開十丈藕如船陸地生蓮闗令尹喜生時其家堂陸地自生蓮花光色鮮盛闗令内傳低光昭帝元始元年穿琳池廣千步中植分枝荷一莖四葉狀如駢盖日照則葉低䕃根莖若葵之衞足名曰低光荷實如𤣥珠可以飾佩花葉雖萎芬馥之氣徹十里餘食之令人口氣常香益人肌理宫人貴之毎遊宴出入必皆含嚼或剪以為衣或折以蔽日以為戲弄楚詞所謂折芰荷以為衣意在斯也拾遺記昭帝遊栁池有芙蕖素色大如斗花葉甘可食芬氣聞於十里之内蓮實如珠上見藝文初學記寒荷北極𤣥坂去崆峒十七萬里日月不至其地自明有紫河萬里流沫千丈中有寒荷霜下方香茂也洞冥紀望舒荷靈帝西園渠中植蓮大如葢枝長一丈南國所獻也其葉夜舒畫卷一莖有四蓮叢生名曰夜舒荷亦云月出則葉舒也亦名望舒荷拾遺記儀仗生蓮王敦在武昌鈴下儀仗生蓮華五六日而落説曰易稱枯楊生華何其乆也今狂花生枯木敦終逆而身死搜神記如車輪晉末黄祖至孝母病篤庭中稽顙俄頃天漢開明有一老翁以兩丸藥賜母服之衆患頓消翁曰汝入三月可汎河而來依期行見門題曰善福門内有水曰湎源池有芙蕖如車輪幽明録陸地生蓮新塗縣㕔事前陸地生蓮華入冬死十六年更生四枚今年復生故處繁殖轉多華有二十五枚鮮明可愛有異常蓮晉范寗為豫章郡守表白蓮社謝靈運恃才傲俗少所推崇一見逺公肅然心服乃即寺觀翻涅槃經因鑿為臺植白蓮池中名其臺曰翻經臺因號白蓮社廬山記嘉蓮泰始七年六月己亥東宫元圃池芙蓉二花一蔕謂之嘉蓮皇太子以獻符瑞志泰始二年八月嘉蓮一雙駢花並實合跗同莖生豫章鯉湖又六年雙蓮一蔕生東宫𤣥圃池起居注以荷覆頭臧質説南郡王義宣反兵敗無所歸乃入南湖逃竄無食摘蓮噉之追兵至緊急以荷覆頭自沈於水唯出鼻軍主鄭俱兒望見射之中心兵刃亂至腸胃纒縈水草宋書散血宋帝時太官作血䘓勘庖人削藕皮誤落血中遂皆散不凝乃用藕療血多效本草蓮花池王儉用庾杲之為衞將軍長史蕭緬與儉書曰盛府元僚毎難其選庾景行泛緑水依芙蓉何其麗也尋人以儉府為蓮花池南史時人呼儉府為入芙蓉池南齊一挺永明中巴東王子嚮殺行事劉寅等武帝聞之謂羣臣曰子嚮遂反戴僧静大言曰諸王應自反豈惟巴東武帝問其故荅曰天潢無罪而一時被囚一挺之藕一盃之漿皆諮籖師籖師不在則竟日忍渴上甖花生根晉安王子懋字雲昌武帝子也年七嵗時母阮叔媛常病危篤請僧行道有獻蓮花供佛者衆僧以銅甖盛水華更鮮子懋流涕禮佛誓曰若使阿姨獲祐願華竟齋如故七日齋畢華更鮮紅看視甖中稍有根鬚阮病尋差世稱其孝感法主吴均齊春秋閣下生蓮齊太和二年烏程縣閣下生蓮華萬嵗厯湖目歴城二里北有蓮子湖周環二十里湖中多蓮花紅緑間明乍疑濯錦又漁船掩映罟罾疎布逺望之者若蛛網浮杯也魏元翻曽在湖醼焦參軍張伯瑜諮公言向為血羮頻不能就公曰取洛水必成也遂如公語果成時清河王怪而異焉乃諮公未審何義得爾公曰可思湖目清河笑而然之而實未解坐散語主簿房叔道曰湖目之事吾實未曉叔道對曰藕能散血湖目蓮子故令公思清河嘆曰人不讀書其猶夜行二毛之叟不如白面書生酉陽採荷調江從簡光祿大夫革之子也頗有才學年十七為採荷調以刺何敬容其文曰欲持荷作鏡荷暗本無光欲持荷作柱荷弱不勝梁敬容弗覺唯唯嗟其工隋書作胡人面後主武平中特進侍中崔季舒宅中池内蓮莖皆作胡人面仍著鮮卑㡌俄而季舒見殺北齊逺人入款齊主還鄴髙麗新羅並遣使朝貢先是徐州蓮一莖兩蔕占云異木連枝逺人入欵斯其應也三國典畧金蓮元藏幾大業初為海使判官遇風漂于滄州其洲方千里有良金池可方數十里水石沙泥皆如金色其中有四足魚金蓮花州人研之如泥竹間彩繪光影煥鑠與真金無異但不能入火而已更有莖出其花如蝶毎微風則摇蕩如飛婦人競採之以為首飾即語曰不戴金莖花不得在仙家又以强木造船楫其上多飾珠玉以為遊戲强木不沈木也杜陽編花廣三尺貞觀二十年十月渝州相恩寺側泉内忽出紅蓮花面廣三尺旅遊往來無不歎訝經月不滅廣記靈異月華藕羅公逺謂中使輔仙玉云主人列月華之藕又云玉京交契之舊感遇傳解語花明皇秋八月太液池有千葉白蓮數枝盛開帝與貴戚宴賞焉左右皆歎羨乆之帝指貴妃示於左右曰争如我解語花天寶遺事同心開元二十一年六月癸丑絳州黄龍興觀池同心蓮一莖唐書合歡徳宗貞元十八年六月中西内神龍寺前水渠生合歡蓮其花一莖兩房宰臣權徳輿栁宗元等表賀英華青蓮栁宗元有賀西内定禮池青蓮花表重臺賛皇公平泉莊其水物之美者有白蘋州之重臺蓮芙蓉湖之白蓮茅山東溪之芳蓀山居草堂記碧蓮宣平相國盧公應舉時寄居夀州安豐縣别墅嘗遊芍陂見里人負薪者持碧蓮花一朶已傷器刃矣云於陂中得之尚書故實張舜民芸叟責郴州税郴多碧蓮根大如椀張嘗以墨印于詩稿上以詫北人孫公談圃花神中和中有士人蘇昌逺居蘇州屬邑有小莊去官道十里吳中水鄉率多荷芙忽一日見一女郎素衣紅臉容質絶麗若神仙中人自是與之相狎以莊為幽㑹之所蘇生惑之既甚嘗以玉環贈之結繫慇懃或一日見檻前白蓮花開敷殊異俯而翫之見花房中有物視乃所贈玉環也因折之其妖遂絶北夢宴用乾蓮子監軍張承業本朝舊人權貴任事人士脅眉低首候之唯馬郁滑稽侮狎毎賔僚宴集承業出異方珍果陳列于前客無敢先嚐當郁前者食之必盡承業私戒主膳者曰他日馬監至唯以乾蓮子置前而已郁至觀之知其不可啖異日鞾中置鐵鎚出以擊之承業大笑曰為公易饌勿敗予桉後唐史白蓮兆㓙蜀王先主將晏駕其年峨眉山婆羅花悉開白花又荆文獻王未薨前數年溝港城隍悉開白蓮葉長三丈雍熙中張君房寓泊廬山開先寺望黄石崖瀑布水中一大紅葉泛而下令僧行急取之乃紅蓮一葉長三丈餘濶一尺三寸嘗觀廬山記説沛水出雙劒峰頂有池闊數百尺其深莫測又有清源池生蓮花大如車輪今可信矣君房因分此花葉遺好事者磨湯飲之其蓮香經宿不散紹紳談説僧齊已芳塑匠蔡蟠曽於廬山瀑布見一蓮房房已乾其大如笠揚氏六被補柱蓮宋昭宣用臣卓有幹才元豐間掖庭水殿落成嘉致既滿偶失種蓮宋即購于都城得器缶所植者百餘本連缶沈水底再夕視之則蓮已開盈沼矣談撰傷荷藕蘇州進藕其最上者名傷荷藕或云荷名或云葉甘為蟲所傷或云故傷其葉以長其根近多重臺荷實中又生花亦甚異國史補食之無滓他産不滿九竅此獨過之以此為辨也睡蓮睡蓮葉如荇而大沈水面上有異浮根菱耳其花布葉數重不房而蕋凡五種色當夏晝開夜縮入水底晝而復出於水面也北户録紫芙蓉襄陽石梁山上有池池生紫芙蓉物類相感志黄蓮九疑山過半路皆行竹松下夾路有青澗澗中有黄色蓮華芳氣盈谷王韶之神境記朝日蜀中有朝日蓮花色或黄或白葉浮水上開則隨日所在日入輒歛藏葉下若葵藿傾太陽之北益部方物記劍脊豫章雩都縣有瑞蓮池池産異蓮其葉曰葉花劍脊其花曰雙頭丫髻三蕚二千四葉其實曰覆鍾金錠移之他處輒類常種俗傳雩山倒影所致陽志橡子為蓮白蓮入水必沈惟煎鹽鹹鹵能浮之鴈食之糞落山石間有百年不壊相傳橡子落水為蓮酉陽水羞顔延之碧芙蓉頌曰澤芝芳艶擅竒水屬劉孝威謝藕啓云凡厥水羞莫敢相輩田田江南可采蓮蓮葉何田田古樂府雖無田田葉及爾泚漣漪陸韓卿詩菱水栗王安貧武陵記言四角三角曰芰兩角曰菱芰一名水栗一名薢茩酉陽鉅野鉅野大菱大於常菱淮漢以南凶年以芰為蔬廣志嗜芰屈到嗜芰有疾召其宗老而屬之曰祭我必以芰及祥宗老將薦芰屈建命去之宗老曰夫子屬之子木曰夫子不以其私欲干國之典遂不用國語浮根菱漢武旦露池西有靈池中有浮根菱根出水上葉沈波下霜降彌美因名青氷菱洞𠖇記翻鷄菱𤣥都翠水水有菱碧色狀如鷄飛名翻鷄菱仙人鳬伯子常游翠水之涯採食之上倒生菱昭帝琳池中有倒生菱莖如亂絲一花千葉根浮水上實沈泥中名紫菱食之不老拾遺記採菱作飯魚𢎞為湘東王鎮西司馬述職西上道中乏食縁路採菱作菱米飯給所部𢎞度之所後人覓一菱不得梁書花開背日菱花開背日芡花開向日菱寒而芡煖仇池筆記芡加籩加籩之實蔆芡㮚脯周禮鷄頭䓈芡鷄頭也北燕謂之䓈青徐淮泗之間謂之芡南楚江湘之間謂之鷄頭或謂之鴈頭或謂之烏頭方言一名鴈喙實一名水陸丹本草雞㢕藥也其實堇也桔梗也雞㢕也豕零也是時為帝者也莊徐無鬼􅂒或作壅司馬云即雞頭也水硫黄地産之芡其甘滑可食名為水硫黄孫公談圃𤓰地芝地芝𤓰也其子謂之􅀈龍蹏虎掌羊骹兔頭桂支蜜筩􅀈􅀈貍頭白㼐無餘縑𤓰屬也廣雅稽含賦作土芝星主牽牛星荆州謂之河鼓主闗梁織女主𤓰果續漢書乃𤓰五月乃𤓰乃𤓰者治𤓰之辭也𤓰也者始食𤓰八月剥𤓰蓄𤓰之時也大戴禮冬𤓰夫差為越所敗遁去因得生𤓰已熟吳王掇而食之謂左右曰何冬而生𤓰近道人不食何也左右曰謂糞種之物人不食也吳王曰何謂糞種左右曰盛夏之時人食生𤓰起居道傍子復生秋霜惡之故不食吳越及𤓰齊侯使連稱管至父戍葵丘𤓰時而往曰及𤓰而代朞戍公問不至請代不許故謀作亂左莊七夜灌鄰𤓰昔梁大夫宋就為邊縣令與楚鄰界梁亭楚亭皆種𤓰梁亭劬力數灌其𤓰𤓰美楚人田窳而稀灌其𤓰𤓰惡楚令以梁𤓰美怒其𤓰之惡因往夜竊搔梁𤓰皆有死焦者矣梁亭覺之因請其尉亦欲竊往報搔楚𤓰宋就曰是搆怨招禍之道也令人竊為楚亭夜灌其𤓰令勿知也楚亭旦而往𤓰則以灌𤓰日以美楚亭怪而察之則梁亭之為也楚令大説因以聞楚王楚王曰此梁之隂讓也乃謝以重幣而請交於梁王賈子鉶谷𤓰秦始皇改古文為篆𨽻患苦天下不從所改更召諸生至者皆拜為郎凡七百人密令冬月種𤓰於驪山鉶阬谷中温處𤓰實乃使人上書曰冬𤓰有實詔下博士諸生説之人人各異乃令就視之先為伏機諸生賢儒皆至焉方發機從上填之以土為壓之終乃無聲衛宏古今竒字序東陵𤓰邵平者故秦東陵侯秦破為布衣貧種𤓰長安城東𤓰美故世俗謂之東陵𤓰從邵平以為名也史記蕭何世家邵平廣陵人黄圖昔聞東陵𤓰近在青門外連畛距阡陌子母相鈎帶五色曜朝日嘉賓四面㑹阮籍詩龍肝有龍肝𤓰長一尺花紅葉素生於氷谷所謂氷谷素葉之𤓰仙人瑕丘仲採藥得此𤓰食之千嵗不渴𤓰上恒如霜雪刮嘗如蜜滓及武帝封泰山從者皆賜氷谷素葉之𤓰洞𠖇記空同靈𤓰仙之上藥有空同靈𤓰四刼一實内傳明帝隂貴人夢食𤓰甚美帝使求諸方國時燉煌獻異𤓰種𤓰名窮隆長三尺而形屈曲味甘如飴父老云昔道士從蓬萊山得此𤓰云是空同靈𤓰四刼一實西王母遺于此地世代遐絶其實頗在拾遺記進𤓰遇仙王莽居攝二年唐公昉為漢中郡吏啖𤓰旁有真人左右莫察君獨進美𤓰又從而敬禮之真人者遂與期谷口山上乃與君神藥曰服藥以後當移意萬里知鳥獸言語公昉舉家仙去仙人唐君碑嘉𤓰安帝元初三年有𤓰異本共生一𤓰同蔕時以為嘉𤓰或以為𤓰者外延離本而實女子外屬之象也是時閻皇后初立後閻后與外親耿實共譛太子廢為濟隂王更外迎濟北王子犢立之續漢書五色𤓰吳桓王時㑹稽生五色𤓰今吳中有五色𤓰嵗充貢賦述異記徐光幻術吳時有徐光常行幻術于市里從人乞𤓰其主弗與便從索瓣種之俄而𤓰生蔓延成花實乃取食之因賜觀者鬻者反視所賣皆耗矣搜神記冬致生𤓰葛𤣥冬為客設生棗及生𤓰神仙傳遼東丁伯昭自説其有客字次節既死常為本家致竒物試臘月中從索𤓰得美𤓰數枚來在前不見形也列異傳孝感致𤓰焦華父遺常病甚冬中思𤓰夜夢一人黄冠謂曰我聞子父病思𤓰故送以助華拜受之及寤在手馨香非常父食而病愈孝子傳盜𤓰桑虞仁孝自天年十四喪父毁瘠過禮虞有園在宅北數里𤓰果初熟有人踰垣盜之虞以園後多棘刺恐偷見人驚走而致傷損乃使奴為之開道及偷負𤓰將出見道通利知虞使除之乃送所盜𤓰叩頭請罪虞乃歡然盡以𤓰與之晉書凉殿生𤓰凉天水太守史稜暴疾死五日而蘇云見凉光殿皆生白𤓰秦使梁熙滅凉小字白𤓰也三十國春秋運𤓰船郭原平以種𤓰為業大明七年大旱𤓰瀆不復通船縣官劉僧秀愍其貧老開瀆下水與之原平曰普天大旱百姓俱困豈可減溉田之水以通運𤓰之船乃步從他道往錢塘貨賣宋書分𤓰止渴齊武帝與到撝同從宋明帝射雉郊野渴倦撝得早春𤓰與上對剖而食之及帝即位一嵗三遷至御史中丞懐舊徳也南史勝事竟陵王子良禮才好士傾意賔客天下才學皆遊集焉善立勝事夏月客至為設𤓰飲及甘果南齊種𤓰營葬韓靈敏與兄靈珍早孤並有孝性尋母又亡家貧無以營凶兄弟共種半畆𤓰朝採𤓰子暮已復生以此遂辦塟事上用𤓰鎮心鄭灼字茂昭勵志好學多苦心熱若𤓰時輒偃卧以𤓰鎮心便起讀誦其篤志如此梁書早春𤓰郭祖深清儉常服故布褐素木案食不過一肉有姥餉以早春青𤓰祖深報以疋帛富人效之以貨利祖深鞭而徇衆朝野憚之上緑沈𤓰任昉卒武帝聞問方食西苑緑沈𤓰投之於盤悲不自勝因屈指曰昉少時常恐不滿五十今四十九可謂知命上削𤓰蘭欽為廣州刺史前刺史新渝侯映之弟南安侯恬權行州事冀得即真及聞欽至嶺厚貨㕑人塗刀以毒削𤓰進之欽及愛妾俱死帝聞大怒檻車收恬削爵土南史冬月求𤓰王薦母病篤渴思𤓰時冬月薦至深嶺值雪仰天而哭忽見岩石間青蔓離披有二𤓰焉摘歸以進母渴遂止貧人買𤓰楊愔典選多以言貌取人時謗詞云尚書典選似貧人買𤓰惟取大者後魏書置𤓰梁上蘇瓊為清河太守郡人趙穎以太守年老致仕在家五月中得新𤓰一雙自來奉瓊不受穎苦請遂便留乃致之聴事竟不割人聞其受𤓰欲貢新果到門知穎𤓰猶在相顧而去北齊食𤓰皮王羆性儉嘗有客與羆食𤓰客削𤓰侵膚稍厚羆意嫌之及𤓰皮落地乃引手就地取而食之客甚有愧色後周書輟𤓰置靈座杜如晦薨後太宗食𤓰毎愴然思之遂輟其半使置之靈座舊唐黄臺𤓰髙宗子八人武后所出者自為行第長曰孝敬皇帝監國仁明為后所忌而鴆之次曰雍王賢為太子次曰中宗次曰睿宗及孝敬遇害諸弟嘗所不安晨夕懐懼雖父母之前無由敢言乃作黄臺𤓰詞令樂人歌之欲微悟上意歌曰種𤓰黄臺下𤓰熟子離離一摘使𤓰好再摘令𤓰稀三摘尚猶可四摘把蔓歸然太子竟亦流竄于黔州上小兒市𤓰明皇召諸學士宴於便殿因酒酣故謂李白曰我朝與天后之朝何如白曰天后朝政出多門國尤姦幸任人之道如小兒市𤓰不擇香味惟揀肥大者我朝任人如淘沙取金剖石採玉皆得其精粹者明皇笑曰學士過有所飾緱氏𤓰髙宗四月憶𤓰明崇儼索百錢須臾以𤓰獻曰得之緱氏老人圃中帝召老人問故曰埋一𤓰失之土中得百錢矣唐書二月進𤓰王建華清宫詩云二月中旬已進𤓰注唐置温湯監監丞種𤓰蔬隨時供奉𤓰夏熟者二月而進𤓰葢譏明皇違時及物求口體竒巧之奉以説婦人逐兔踐𤓰酷吏王𢎞義始賤時求傍舍𤓰不與及為御史乃騰文言園有白兔縣為集人捕逐畦無遺蓏李昭徳曰昔聞蒼鷹獄吏今有白兔御史唐書坐上種𤓰馬湘有道術嘗於江南刺史馬植坐上冬月以酒杯盛土種𤓰須臾引蔓花實食之甚美續仙傳惡香𤓰惡香香中尤忌麝鄭注太和初赴職河中姬妾百餘盡騎香氣數里逆於人鼻是嵗自京至河中所過路𤓰盡死一蔕不獲酉陽廣明中巢冦犯闕僖宗幸蜀闗中道傍之𤓰悉皆萎死盖宫嬪多帶麝香所熏遂皆萎落耳負暄雜録西𤓰胡嶠為蕭翰掌書記隨翰入契丹至真珠寨始食西𤓰云契丹破回紇得西𤓰種種以牛糞覆棚而種大如中國冬𤓰而味甘五代史西𤓰形如匾蒲而圎色極青翠經嵗則變黄其瓞類甜𤓰味甘脆中有汁尤冷五代史四夷附録云以牛糞覆棚種之洪皓使虜攜以歸今禁圃鄉囿皆有亦可留數月但不能經嵗仍不變黄色鄱陽有乆苦目疾者曝乾服之而愈盖其性冷故也松漢紀聞草木子西𤓰元世祖征西域中國始有種誤也徵疏𤓰事宣和中蔡君安提舉秘書省夏日㑹館職于道山食𤓰君安令坐客徵𤓰事各疏所意毎一條食一片坐客不敢盡言君安所徴為優欲畢校書郎董彦逺連徴數事皆所未能聞坐客咸歎服之識者謂彦逺必不能安後數日果補外揮麈録異名𤓰之所出以遼東廬江燉煌之種為美有烏𤓰魚𤓰貍頭𤓰蜜筩𤓰女臂𤓰龍蹄𤓰羊髓𤓰縑𤓰𤓰州大𤓰如斛御𤓰也有青登𤓰大如三斗魁有桂枝𤓰長二尺餘蜀地温良𤓰冬熟有春日𤓰細小小瓣宜藏正月種三月熟有秋泉𤓰秋種十月熟形如羊角色蒼黒廣志分蔕𤓰滄州産分蔕𤓰長二尺其色如椹一顆二蔕杜陽編尋支大食園𤓰大者名尋支十餘人食一顆輒亦足越𤓰長四尺以上杜還經行記𤓰州燉煌𤓰州地出美𤓰因名狐食其𤓰不見首尾元和志大五六尺大食勿斯離國𤓰大五六尺麥毎粒長三寸四時𤓰靺鞨國西𤓰甜𤓰一枚用二人舉之古里國西𤓰四時皆有又有小𤓰大如小指長二寸許味如青𤓰瀛涯勝覽摘食有娠朝鮮靈岩郡西有崔氏園諺傳新羅人崔氏園中有𤓰長尺餘一家頗異之崔氏女潛摘食之歆然有娠彌月生子其父母惡其無人道而生置之竹林居數七日女往視之鳩燕來覆翼之還告於父母父母往見異之取而養之及長為僧名道詵入唐傳一行地里法而還後名其地曰鳩林志兩蔕𤓰有兩蔕兩鼻者食之殺人龍魚河圖甘蔗三種甘蔗有三種赤色者曰崑崙蔗白色者竹蔗亦名蠟蔗小而燥者曰荻蔗柘漿胹鼈炮羔有柘漿些招魂百末㫖酒布蘭生泰尊柘漿析朝酲漢郊祀歌為杖魏文帝嘗與平虜將軍劉勲奮威鄧展等共飲宿聞展有手臂曉五兵與之論劍酒酣耳熱方食甘蔗便以為杖下殿數交三中其臂左右大笑蔗錫孫亮使黄門以銀椀并盖就中藏吏取交州所獻甘蔗餳黄門先恨藏吏以鼠矢投餳中啓言藏吏不謹亮呼吏持餳器入問曰此器既盖之且有掩覆無縁有此黄門將有恨於汝邪吏叩頭曰嘗從某求宫中莞席宫席有數不敢與亮曰必是此也覆問黄門具首伏即於目前加髠鞭斥付外署江表傳消酒泰康六年扶南國貢蔗一丈三節南人云甘蔗可消酒南方草木狀扶南蔗一丈三節見日即消風吹即折漸入佳境顧愷之字長康噉甘蔗先食尾人問所以曰漸至佳境世説百挺魏王致意安北逺來渴乏若有甘蔗及酒可見分惠世祖遣人荅曰知行路多乏今付酒二器甘蔗百挺宋書送甘蔗庾仲文好貨劉雍自謂得其助力事之如父夏中送甘蔗若新發於州國吏運載樵蘇無輟于道南史射甘蔗宜都王鏗善射常以棚的大闊曰終日射侯何難之有乃取甘蔗挿地百步射之十發十中齊書設甘蔗范雲永明十年使魏魏使李彪宣命至雲所甚見稱美彪為設甘蔗黄甘粽隨盡請益彪笑謂曰范散騎小復儉之一盡不可復得不食庾沙彌性至孝母劉亡好噉甘蔗沙彌遂不食焉梁書矢下食蔗陸納反湘州分其衆三千人夜襲巴陵晨至城下宜豐侯脩出壘門坐胡床以望之納衆乘水來攻矢下如雨脩方食甘蔗曽無懼色部分軍旅鼓而進之遂獲其一艦生擒六十人納遂歸保長沙三國典畧作酒赤土國物産多同於交阯以甘蔗作酒雜以紫𤓰根酒色黄赤味亦香美隋書大業三年常駿使其國云色味愈西域磨偈佗太宗遣使取熬糖法即詔揚州上諸蔗榨瀋如其劑色味愈西域逺甚西域𫝊賜郭汾陽在汾上代宗賜甘蔗二十條節稀似竹唐韋齊休聘雲南㑹川都督劉寛使致甘蔗節稀似竹許削去後亦有甜味雲南記始治糖霜大厯間有僧鄒和尚不知所從來跨白驢登繖山結茅廬以居須鹽米薪菜之屬即書寸紙繫錢緡遣驢負至市區人知為鄒也取平直掛物於鞍縱驢歸一日驢下山踐黄氏蔗苗黄請償於鄒鄒曰汝未知因蔗糖為霜利當十倍吾語汝塞責可乎試之果信其色如琥珀遂為上品自是流傳其法鄒末年北走通泉縣靈鷲山龕中其徒追及之但見一文殊石像始知大像化身而白驢者獅子也王灼譜食蔗即愈盧絳痁疾逾月既乏資給疲瘵且極忽夢一白衣婦人頗有姿色謂之曰子之疾當食蔗即愈既詰朝見鬻者絳揣囊中且乏一鏹唯有唐韻一􅁽遂詣易之其人曰吾輩乃負販者將此安用哀君欲之志切遂遺數挺絳喜而食之至旦疾損江南野史石密甘蔗逺近皆有交趾所産甘蔗特醇好本末無薄厚其味至均圍數寸長丈餘頗似竹斬而食之既甘迮取汁如飴餳名之曰糖益復珎也又煎而曝之既凝而氷破如博其食之入口消釋時人謂之石蜜者也異物志糖氷甘蔗所在皆植獨福唐四明番禺廣漢遂寧有糖氷而遂寧為冠四郡所産甚微而顆碎色淺味薄纔比遂之最下者蔗有四色曰杜蔗曰西蔗曰艻蔗本草所謂荻蔗也曰紅蔗本草崑崙蔗也王灼譜􅦠􅀈林南方山有􅦠􅀈之林其髙百丈圍三尺八寸促節多汁甜如蜜咋囓其汁令人潤澤可以節蚘蟲人腹中蚘蟲其狀如蚓此消穀蟲也多則傷人少則穀不消是甘蔗能減多益少凡蔗亦然神異經若脛婆賄伽盧國蔗大若脛唐南蠻傳杖蔗杖必取材不必用味相必取賢不必欲愛都蔗雖甘猶不可杖佞人悦已猶不可相馮衍杖銘都蔗雖甘杖之必折巧言雖美用之必滅曹植詩芋土芝芋一名土芝本草芋魁漢書芋渠後書昴中收仲冬昴星中收莒芋宋均曰莒亦芋孝經援神契大芋實根駭人故謂之芋也齊謂芋為莒説文渠芋也其莖謂之􅀢葃姑水芋烏芋也廣雅君子芋蜀漢既繁芋民以為資凡十四芋有君子芋大如斗魁有百果芋魁大子繁多畆收百斛種一百畆葉以養彘廣志博士芋博士芋蔓生根如鵝鴨卵風土記岷山蹲鴟卓氏之先趙人秦破趙遷卓氏之蜀曰吾聞岷山之下沃野下有蹲鴟至死不飢乃求逺遷致之於臨卭史記徇蹲鴟之沃則以為世濟陽九吳都賦使種酒容者為梁丞使民益種芋菜曰三年當大飢卒如其言梁民不死列仙傳長自引芋袁安字邵公除隂平長時年饑荒民皆菜食租入不畢安聴使輸芋曰百姓飢困長何得食穀先自引芋吏皆從之種芋充飢薛直歸先人冡側種稻芋稻以祭祀芋以充飢耽道説禮𤣥虚無為汝南先賢傳芋償何隨字季業蜀郡郫人也除安漢令蜀亡去官時巴土饑荒所在無穀送吏行乏輒取道側民芋隨以帛繫其處使足所取直民視芋見帛相語曰聞何安漢清亷行過從者無糧必能爾耳持帛送還之終不受因為語曰安漢吏取糧令為之償市誓章仇置成都市誓文曰大亂不亂蜀有廣漢大飢不飢蜀有蹲鴟唐書對咽鮮于文宗漁陽人年七嵗喪父父以種芋時亡至明年芋時對芋嗚咽如此終身南史孝義傳著毛蘿蔔開元中蕭嵩奏請注文選東宫衞佐馮光進解蹲鴟云今之芋子即是著毛蘿蔔嵩聞大笑書懶殘食芋李泌在衡嶽有僧明瓉號懶殘泌察其非凡人夜往謁之瓉發火芋啗之曰勿多言領取十年宰相本傳芋壍閤皂山一寺僧甚專力種芋嵗收極多杵之如泥造壍為牆後遇大饑獨此寺四十餘僧食芋壍以度㓙嵗玉堂閒話野芋家芋野芋狀小于家芋食之殺人葢蘝也家芋種之三年不收旅生亦不可食博物志今浙江常生土芋狀磊磈自實若天雷頻則多生若耕種欲取之得名之曰若呼芋字則逡巡不見矣相感志天芋天芋生終南山中葉如荷而厚酉陽雀芋雀芋狀如雀頭置乾地反濕置濕處反乾飛鳥觸之墮走獸遇之僵上芋羞芋宜沙白土土宜深耕二月種為上時相去六七寸下一芋芋羞三日衆人來往眼目多見并聞刷鍋聲處多不滋𦙍務本新書度凶年芋可以度饑饉度凶年今中國多不以此為意後生有耳目所不見聞者及水旱風蟲雷雹之災便能餓死滿道白骨交横知而不種坐致泯滅悲夫人君者安可不督課之哉要術制蜂螫處士劉湯隠居王屋山嘗於齋中見一大蜂屑于蛛蛧蛛縛之為蜂所螫墜地俄頃蛛鼓腹欲裂徐徐行入草囓芋梗微破以瘡就囓處磨之良乆腹漸消輕躁如故自後人有為蜂螫者挼芋梗傅之則愈筆談藷似芋甘藷似芋亦有巨魁剥去皮肌肉正白如脂肪南人專食亦當米殻蒸炙皆香美賓客酒食亦施設有如果實也異物志出三輔儲藇東出三輔白色者善范子計然山藷山藥本名薯蕷避唐代帝諱豫改名薯藥宋英宗諱曙遂名山藥負暄雜録一名山芋秦楚名玉延鄭越名土藷一名脩脆一名兒草本草若欲掘取嘿然則獲唱名便不可得人有植之者隨所種之物而象之異􅁐手殖則如手鉏鍬等物植隨本物之形狀相感志景山景山北望少澤其草多藷藇郭璞云根似芋可食今江南人單呼藷語或有輕重耳北山經椒異名玉衡星散為椒運斗樞一曰蓎藙一曰南椒生于漢中者曰漢椒巴中者曰巴椒本草蜀椒出武都赤色者善秦椒出天水隴西細者善范子計然景山多秦椒山經檓檓大椒今椒樹叢生實大者名為檓爾雅椒樹如茱萸有針刺葉堅而滑澤蜀人作茶吳人作茗皆舍煮其葉以為香今成臯諸山間有椒謂之竹葉椒其樹亦如蜀椒可著飲食中又用蒸雞豚最佳香東海諸島上亦有椒樹枝葉皆相似子長而不圓甚香其味似橘皮島上獐鹿食此椒葉其肉自然作椒橘香詩義疏塗室皇后稱椒房取其實㬅延盈升以椒塗室亦取其温煖漢官儀天仙虜蘇割刺在荅魯之右大澤中髙百尋然無草木石皆赭色山産椒椒大如彈丸燃之香徹數十里毎然椒則有鳥自雲際蹁躚五色名赭爾鳥葢鳯凰種也昔漢武帝遣將軍趙破奴逐匈奴得其椒不能解因問東方朔朔曰此天仙椒也塞外千里有之能致鳯武帝植之太液池至元帝時椒生果有異鳥翔集燉煌新録天成元年宋王義潮使雲中云然傳飡椒致噤鍾繇嬖庶子㑹之母黜其夫人文帝命繇復焉繇恚忿湌椒致噤帝乃止魏氏春秋同異禦濕椒薑禦濕菖蒲益聰巨勝延年感喜辟兵此皆上聖之至言方術之實録也援神契芭蕉三種井蕉草類望之如樹株大者一圍餘葉長一丈或七八尺廣餘二尺許花大如酒杯形色如芙蓉著莖末百餘子大名為房根似芋魁大者如車轂實隨華長毎華一闔各有六子先後相次子不俱生花不俱落此蕉有三種一種子大如指長而銳有似羊角名羊角蕉味最甘好一種大如鷄卵有似牛乳味微減羊角蕉一種大如藕子長六七寸形正方少甘味最弱其莖如芋取以灰練之可以紡績南州異物志剥其皮食其肉味如蜜甚美食之四五枚可飽而其滋味猶在齒牙一名甘蔗上十丈赤巖山水石之間有甘蕉林髙者十丈遊名山志書芭蕉陸羽作僧懐素傳曰貧無紙可書常于故里種芭蕉萬餘株以供揮洒書法苑什文移植天水之地邇于邊陲土寒不産芭蕉戎帥使人於興元求之植二本於庭臺間毎至入冬即連土掘取之埋藏于地窟候春暖即再植之庚午辛未之間有童謡曰花開來裏花謝來裏而又節氣變而不寒冬即和煖夏即毒熱甚于南中芭蕉於是花開秦人不識逺近仕女來看者嗔咽衢路尋而蜀人犯我封疆年年一來不失芭蕉開謝之期其地竟為蜀人所有玉堂閒説閒話徴應移根槁瘁初朱勔之進花石也聚于京師艮嶽之土以移根之乆為風日所殘植之未乆即槁瘁時時欲一易之故花綱旁午於道一日内宴伶人因以諷之有持梅花而出者問曰此何物也應之曰芭蕉有持松檜而出者亦以芭蕉荅之如是者數四遂批其頰云此某花此某木何俱謂之芭蕉應之曰我但見巴巴地討來都焦了天顔亦為之少破中吳紀聞枸把地輔把一名枸檵郭云今枸杞也爾雅一名苦把詩義疏一名把根一名地骨一名枸忌一名地輔一名羊乳一名却暑一名仙人杖一名西王母杖本草家柴一名托盧或名天精或名却老抱朴花犬朱孺子嘉安國人幼事道士王𤣥真居大箬巖常登山嶺採黄精服餌一日就溪濯蔬忽見岸側有二小花犬相趂孺子異之乃尋逐入枸把叢下歸語𤣥真訝之遂與孺子俱往伺之復見二犬戲躍逼之又入枸把下𤣥真與孺子共尋掘乃得三枸把根形狀如花犬堅若石洗挈歸煮食之俄頃而孺子忽飛昇在前峯矣𤣥真驚異乆之孺子謝别𤣥真昇雲而去今俗呼其峯為童子峯續神仙傳雜果枳柜枳柜葉似蒲栁子似珊瑚廣志有子著枝端大如指長數寸噉之甘美如飴八九月熟江南者特美今官園種之謂之木蜜本從江南來其木能令酒薄若以為屋柱則一屋酒皆薄詩義疏昔有南人修舍用此悞有一片落在酒甕中其酒化為水味本草枳椇子一名樹蜜一名木餳實形拳曲核在實外一名白石一名木石古今注都念十二年四月南海郡送都念子樹一百株勅付西苑十六院内種此樹髙一丈許葉如楊枝柯長細花金色花葉正赤似蜀葵而大其子小於柿子甘酸至美蜜漬為粽益佳大業拾遺頭上有四葉如柿蔕食者必捻其蔕故謂之倒捻子或訛呼都念子今又訛念為撚嶺表録異劉劉一名劉杙其子可食郭云劉子生山中實如梨酢甜核堅出交趾爾雅劉三月華七月八月熟其色黄其味酢出交趾武平興古九真南方草木狀猪肉子端溪縣有樹冬榮其子號曰猪肉子大如杯其肉如肪炙而食之味似猪肉至美故名也寰宇記元和志猩猩果雲南大理府鄧川縣有猩猩果髙數丈春花秋實果如彈丸色如血故名味酸可食雲南志豆􅅳豆􅅳樹大如李二月花色仍連著實子相連累其核根芬芳成殻七月八月熟曝乾剥食核味卒香五味出興古南方草物狀豆􅅳生交趾其根似薑而大從根中生形似益智皮殻小厚核如石榴辛且香異物志鈎緑子鈎緑子形如𤓰皮似橙而金色胡人重之極芬香肉甚厚白如蘆菔女工競雕鏤花鳥漬以蜂蜜㸃燕檀巧妙麗絶妙無與為比太康五年太泰進十缶帝以三缶賜王愷助其珍味誇示于石崇南方草物狀千嵗子千嵗子有藤蔓出土子在根下鬚緑色交加如織其子一苞二百餘顆皮殻青黄色殻中有肉如栗味亦如之乾者肉殻相離撼之有聲似肉豆􅅳出交趾上那核婆印度出那核婆果大如冬𤓰熟則果赤剖之中有十小果大如鷄卵更又破之其汁黄赤其味甘美或在樹枝如衆果之結實或在樹枝如茯苓之在土北户録人面子樹人面子樹似含桃結子如桃實核正如人面故以為名以蜜漬之稍可食其核可翫稽含草木狀人面木春花夏實秋熟皮味甘酸實有核如胡桃兩邊似人面寰宇記古度古度樹不花而實實從皮中出大如安石榴色赤可食其實中如有蒲䔧者取之為粽數日不煮皆化成蟲如蟻有翼穿皮飛出著屋正黒交州記熙安縣有孤古度樹生其號曰古度俗人無子於祠炙其乳則生男以金帛報之廣州記沙棠崑崙之丘有木焉其狀如棠華黄赤實其味如李而無核名曰沙棠可以禦水食之使人不溺山經果之美者沙棠之實吕覽石南石南樹野生二月花色仍連著實實如鷰卵七八月熟人採之取核乾其皮中作肥魚羮和之尤美出九真南方記州樹州樹野生二月花色仍連著實五六及握煮如李子五月熟剥核滋味甜出武平上國樹國樹子如鴈卵野生三月花色連著實九月熟曝乾訖剥殻取食之味似栗出交阯上五子五子樹實如梨裏有五核因名五子治霍亂金瘡廣州記無花木饅頭無花果也倦游録波羅蜜占城國有果曰波羅蜜狀如冬𤓰皮似荔枝内有黄肉大如鷄子味甘如蜜中有子似鵝腰子炒食之味若栗瀛涯勝覽王壇王壇子如棗大其味甘出猴官越王祭太一壇邊有此果無知其名因見生樹遂名王壇其形小於龍服有似木𤓰異物志多感多感子黄色圍一寸交州記竹非草非木植類之中有物曰竹不剛不柔非草非木根榦將枯花􅘽乃縣䈙必六十復亦六年竹譜東南之美東南之美者有㑹稽之竹箭焉爾雅渭川渭川千畆竹與千户侯等史貨殖傳秦地有鄠杜竹林南山檀柘號陸海焉漢地理志箬楚謂竹皮曰箬説文籜竹皮也字書竹花曰華草本草萬个竹竿萬个貨殖傳竹曰个木曰枚采名竹性竹性愛向西南引故園東北角種之數嵗之後自當滿園諺云東家種竹西家治地為滋蔓而來生也其居東北角者老竹種不生亦不能滋茂故須取西南引少根也齊民要術不死髙陽氏有同産而為夫婦者帝怒放之於是相抱而死有神鳥以不死竹覆之七年男女皆活同頸異頭共身四足是為蒙雙民外國圖可為舟大荒之中附禺之山帝顓頊與九嬪葬焉爰有鳥獸瑶碧皆出衞于山在其山邊丘方圎三百里丘南帝俊舜竹林在焉大可為舟山經竹譜云員丘帝竹一節為船舫廣文初學作衞兵山俱誤賛寧筍譜作衞於山更誤斑竹湘水去岸三十許里有相思宫望帝臺舜南巡不返歿葬於蒼梧之野堯之二女娥黄女英追之不及相思慟哭淚下沾竹文悉為之斑斑然述異記洞庭之山帝尋竹禹殺共工臣相繇二臣膏流為水其處腥臊不植五穀禹三􅀈皆沮尋竹生焉在崑崙之北有嶽之山山經孤竹東海畔孤竹生焉斬而復生中為舟武王時孤竹人獻笋一株述異記淇園衞有淇園出竹在淇水之上詩曰瞻彼淇澳緑竹猗猗上淇園殷紂竹箭園也見班彪志竹譜武帝時河決上使發卒數萬人塞瓠子河下淇園之竹以為楗漢書烏號之弓貫淇衞之箭也淮南南山子路見孔子子曰君子何不學子路曰南山有竹不揉自直斬而用之達於犀革以此言之何學之有子曰括而羽之鏃而礪之其入之不亦深乎家語斬竹齊景公樹竹令吏守之公守過之有斬竹者拘之將加罪焉晏子曰君聞吾先君丁公乎公曰何如對曰丁公伐曲城勝之止其財出其財出其民有與死人以出者公怪之令視之則其中有金玉焉吏請殺其人丁公曰以兵攻城以衆圖財不仁且君人者寛惠慈衆身不妄誅令吏舍之公曰善令出斬竹之囚舍之晏子越王越王竹根生石上若細荻髙尺餘南海有之南人愛其青色用為酒籌云越王棄餘筭而生竹南方草木狀次有沙筯産于海島間其心若骨可為籌筯凡欲采者須輕步從之不爾聞人行聲則縮入沙中了不可取北户録晉安有越王餘筭菜白者似骨黒者似角異􅁐符竹葉峽州玉泉鬼谷子洞前有叢竹竹葉有文成符葉葉不同佩之可以辟患宋陳􅁮日華瑣碎録卭竹張騫至大夏見蜀布卭竹杖問之云賈人市之身毒國因説武事西南夷以通漢書張騫奉使尋河源得髙節竹植于卭山今縁領皆是堪為杖號曰卭竹杖蜀記笻竹髙節實中狀若人剡俗謂之扶老竹竹譜卭竹本出卭山張騫西至大夏所見也而此山左右時有之鄉老多以為杖羅浮山記龜山多扶竹即笻竹山經孝竹詩義云南中生子母竹今慈竹是也漢章帝三年子母竹筍生白虎殿前時謂之孝竹羣臣作孝竹頌述異記髙遷竹蔡邕避難宿于㑹稽髙遷亭見屋椽竹從東間數第至六可以為笛取用果有異聲文士傳㑹稽記千秋亭一名柯亭郡國志一云髙遷亭寰宇記竹王有竹王者興於遯水有一女浣於水濵有三節大竹流入女足間推之不去聞有兒聲持歸破竹得男長養有武才遂雄夷狄氏竹為姓所破竹於野成林今王祠竹林是也華陽國志抽竹吳褚瑶字孔珽為烏傷令罷去單船而歸故人太子中庶子羊衜乞土宜瑶乃抽船上竹一竿與之曰東南之美惟竹箭最真而有節幸堪嵗寒羊衜密令人視之舟中惟竹笠一枚蘆襏數領遂啓用瑶為昭信中郎篃竹篃亦箘徒是箭竹類一尺數節葉大如履可以作蓬亦中作矢其筍冬生廣志云魏時漢中太守王圖毎冬獻筍俗謂之笴北土寒氷至冬地凍竹根類淺故不能植唯根深故能晚生竹譜此君王子猷嘗暫寄人空宅住便令種竹或謂暫住何煩爾王嘯咏良乆直指竹曰何可一日無此君世説徑造竹下王子猷嘗行過吳中見一士夫家極有好竹主已知子猷當往乃灑掃施設在聴事坐相待王肩輿徑造竹下諷嘯良乆主已失望猶冀還當通遂直欲出門主人大不堪便令左右閉門不聴出王更以此入主人乃留坐盡歡而去上竹中髙士樂成張廌者隠居頤志家有苦竹數十頃在竹中為屋常居其中王右軍聞而造之廌逃避竹中不與相見郡號為竹中髙士永嘉郡記雉頭蛇身大元中汝南人入山伐木見一竹蛇形已成上枝葉如故吳郡桐廬人少嘗伐除遺竹一宿竿雉頭已盡就蛇身猶未變此亦竹為蛇為雉也異苑直造竹所宋袁粲為丹陽尹郡南一家頗有竹石粲率爾步往不通主人直造竹所嘯咏自得主人出語笑欵然俄而車騎羽儀併至門方知是袁尹南史竹枝如林宋郭仲産為南郡從事宅在枇杷寺南其村亦名枇杷元嘉末起齋屋以竹為窓櫺竹遂漸生枝葉長數丈扶疎葱翠欝然成林仲産以為祥及孝建中同義宣之謀被誅渚宫故事述異記燈纉枝生南齊南海王子罕字雲華武帝子也其母樂容華嘗寢疾子罕晝夜祈禱于時以竹為燈纉其燈照曜訖夜極明此纉經宿枝葉茂盛母病尋愈咸以為孝感所致主簿劉鬷侍讀賀子喬為之賦頌當時以為美談南史竹林堂竹林堂宋臨川王羲慶所作梁元帝因而修之堂前有竹名桂竹郭璞云桂竹出始興桂陽縣來風防露上合下疎毎日出羅紈金翠春光秋月隔林而望若花開也其西有篠爾雅篠箭冬月抽笋似桂而辛隆暑赫曦但有凉氣入其下者咸以御風寰宇記縁江採竹蘇良嗣為荆州長史髙宗使中官縁江採異竹植于苑内中官科船載竹所在縱暴還過荆州良嗣囚之上疏切諫髙宗謂則天曰吾約束不嚴整果為良嗣所怪下詔慰喻便令弃竹于江中唐新語枯苑後漢襄楷云國中竹栢枯者不出三年人主當之人家竹花枯死者家長當之開元二年終南山竹開花結子綿亘山谷大小如麥其嵗大饑其竹並枯死嶺南亦然人取而食之四年而太上皇崩僉載義竹太液池岸有竹數十叢牙笋未嘗相離密密如栽也帝因與諸王閒步于竹間謂諸王曰人世父子兄弟尚有離心離徳此竹宗本不相疎有人懐二心生離間之意覩此可以為鑒諸王皆唯唯帝呼為義竹百丈貞元五年秋番禺有海户犯鹽禁者避罪於羅浮山深入至第十三嶺遇巨竹百千萬竿連亘巖谷竹圍二十一尺有三十九節節長二丈即由梧類也海户因破之為篾㑹罷吏捕逐遂挈而歸時有軍人獲一篾以為竒者後獻於刺史李復復命陸子羽圖而記之舊記云李公顧謂門生廣州桑苧翁曰夫視聽之外經籍未録不合有而有者不知其極况兹竹載在圖記不足竒也許慎説文有長節竹謂之􅀢得非羅浮山之義耶北户仙翁鄜延長吏有大竹凌雲可三四圍伐剖之見内有二仙翁對云平生深根勁節惜為主人所伐言畢乘雲而去幽怪録報平安李衞公守北都惟童子寺有竹一窠纔長數尺相傳令其寺綱維毎日報平安酉陽規方李衞公罷鎮浙右遊甘露寺有老僧者熟于祇接談話多空敎所長李以大宛所遺笻竹杖贈别其杖雖竹而方所持向上節眼鬚牙四面對出李所寶也後再領朱方到院問柱杖何在則老僧規圓而漆之矣公嗟嘆再彌日桂苑叢談澄州産方竹其隔州亦出大者數丈北户桶大僧𤣥燭曽寓天台國清寺與同學尋山川旬日至一溪夾岸翠竹數百竿皆三尺圍𤣥燭伐得竹五六截凡遇樹木皆斫成文用記後來數日再遊竟尋不得斫樹之文亦皆迷沒其竹俱可桶大葆光録爆竹辟妖氣李畋鄰人有仲叟家為山魈所祟擲瓦石開户牖不自安叟求禱之以佛經報謝而妖祟彌盛畋謂其叟曰翁旦夜于庭落中若除夕爆竹數十竿叟然其言爆竹至曉寂然安帖遂止誤聞録或問鬼所惡荅云最惡金姑聲閩人謂破竹聲為金姑聲海録鬼神門竹實舊稱竹實鸞鳯所食今近道竹間時見開花小白如棗花亦結實如小麥子無氣味而澁江浙人號為竹珠以為荒年之兆及其竹即死信非鸞鳳之所食也近有江南餘千人來言彼有竹實大如雞子竹葉層層包裹味甘勝蜜食之令人心膈清凉生深竹林茂盛蒙密處頃因得之但日乆汁枯乾而味尚存耳因知鸞鳳之食必非常物也該聞録十二時竹張堂云同邑安福西鄉周俊叔家嘗得十二時竹一根植之家庭歴有十餘年笋而竹者纔三竹繞節凸生子丑寅卯辰巳午未申酉戌亥十二字㸃畫可數𤾉谷漫録旃檀紫竹紹興中四明有巨商泛海沮風抵一山下因攀躡而登至絶頂有梵宫焉商入見一僧獨坐禪榻窓外竹數箇榦葉如丹商堅求得一二竿持還就舟中截之為杖毎以刀鍥削輒隨刃有光心異之前至一國偶攜其杖登岸有老叟以簞珠易之因謂商曰君親至補陀落伽山此觀音坐後旃檀林紫竹也商驚悔歸舟取削棄餘札寶藏之有久病醫藥無効者取竹煎湯飲之輒愈陳仲謨知録説暌車志浮筠蓬山有浮筠之簳葉青莖紫子如大珠有青鸞集其上下有砂礰細如粉暴風至竹條翻起拂細砂如雪霰仙者來觀戲焉風吹竹折聲如鐘磬之音拾遺記蔓竹岑華山在西海之西有蔓竹為簫管吹之若羣鳳之鳴上金門金門之竹可以為律管金門山名在福昌縣九州記宜陽縣金門山竹以為律管河内葭以為灰可以候氣焉物理論鄒篠魯郡鄒山有篠形色不殊質特堅潤宜為笙管諸方莫及也笙賦所謂鄒山大竹嶧陽孤桐此山竹特能貞絶也竹譜笙賦鄒魯之珍有汶陽之孤篠焉此云大竹孤桐誤簫幹慈母山竹作簫笛有妙聲江圖江寧縣南慈母山積石臨江生簫管竹王褒洞簫賦云於江南之丘墟即此處也其竹圓緻異於餘處自伶倫採竹嶰谷其後唯此簳見珍故歴代常給樂府而俗呼曰鼓吹山今慈胡成常禁之丹陽記漢竹永昌有漢竹圍三尺餘大者一節受一斛小者數升為椑榼廣志晉竹吳王聞越王盡心自守因賜之以書増之以封越王乃使大夫種索葛布十萬狐皮五雙晉竹十廋以荅封禮吳越為船雲母竹一節為船出扶南南方草木狀節竹一名太極長百丈南方以為船神異經南方荒中有􅀢竹其長百丈圍三丈五六尺厚八九寸以為船其子美食之可以已瘡癘上為梁嶺南峯州糞泠縣有大竹數圍實中任屋梁柱覆用之則當瓦南征八郡志由梧竹吏民家種之長三四丈圍一尺八九寸作屋柱出交趾南方草物狀有竹曰䈏其大數圍節間相去局促節中實滿堅强以為屋榱斷截便以為棟梁不復加斤斧也異物志䈏實厚肥孔小幾於實中安成以南有之竹譜少室之山大竹堪為釡甑孝經河圖實心雲南有實心竹文采班駮殊好可為器物其上以為槍榦交牀雲南記􅓁簩􅓁簩竹皮薄而空多大者征不逾二寸皮上有粗澁文可以為錯子錯甲利勝於鐵若鈍以漿水洗之還復快利嶺表録異石林石林竹似桂竹勁而利削為刀割象皮如切芋出九真交趾南方草木狀林一作麻䈄􅀢䈄􅀢竹大如脚指堅厚脩直腹中白幕闌隔狀如濕麫生衣將成竹而筍皮未落輒有細蟲齧之隕籜之後蟲齧處往往成赤文頗似繡畫可愛肅肅畟畟南康所生見沈志也竹譜箛􅥺箛􅥺竹生于漢陽内實外澤時獻以為輅馬䇿見南郡賦上桂竹雲山有桂竹甚毒傷人必死山經桂竹髙四五丈大者二尺圍闊節大葉狀如甘竹而皮赤南康以南所饒也竹譜桃竹桃枝竹皮赤編之滑勁可以為席顧命篇所謂篾席者也上嶓冡之山其上多桃枝鈎端山經紅竹紅竹出峽州宜都縣飛魚口大者不過寸許鮮明可愛續竹譜篔簹篔簹竹生水邊長數丈圍一尺五六寸一節相去六七尺或去一丈廬陵界有之異物志建安有篔簹竹節中有人長尺許頭足皆具異苑王彪之閩中賦竹則篔簹涵人桃枝育蟲篔簹竹節中有物長數寸正似世人形俗説相傳云竹人時有得者育蟲謂竹䶉竹中皆有耳齊民篔簹竹堪作甑竹譜龍鍾羅浮山生竹皆大七八圍節長一二丈謂之龍鍾竹南越志常有鳯鸞棲宿食其實山東有溪曰羅陽永泰中暑雨漲有一竹葉若芭蕉葉大隨水出羅浮山記杜寄髙適岑參詩云何太龍鍾極於今出處妨薛蒼舒注按廣韻龍鍾竹名世言龍鍾謂其年老如竹之枝葉摇曳不自矜持取此義集此南裔異物人所希見者安得以年老取此義耶注杜者欺已誣人大率類此後記事珠等書遂據為故實更誤竹譜云籦龍竹名黄帝使伶倫伐之於崑崙之墟吹以應律按吕氏古樂云伶倫自大夏之西乃之阮隃之隂取竹于嶰谿之谷不云崑崙漢志云伶倫自大夏之西崑崙之隂取竹之嶰谷亦不云籦龍馬融笛賦云惟籠籦之竒生于終南之隂崖亦不云崑崙不知凱之何據而云伶倫所伐初學記引之似誤韻㑹云籠籦竹名吳都賦竹則籦籠注伶倫吹以為律選無此句盖誤引竹譜耳箖箊箖箊葉薄而廣越女試劒竹是也竹譜慈竹吳筠賦序云廣漢山中有竹名慈竹生必内向示不離本修莖巨葉攅根沓柢叢之大者或至千百株焉而縈結踰乎咫步好事者徙為堦庭之玩英華月竹蜀嘉定産月竹毎月生笋筀篥始興郡桂陽縣出筀竹大者圍二尺長四大又交趾有篥竹實中勁强有毒銳以刺虎中之則死山經注棘竹棘竹生交州諸郡叢生初有數十莖大者二尺圍肉至厚幾於實中夷人破以為弓枝節皆有刺彼人種以為城卒不可攻萬震異物志所謂種為藩落阻過層墉者也或卒崩倒根出大如十石物從横相承狀如繰車一名䇼竹見三蒼笋味落人鬚髮竹譜對竹其竹一邊青一畔二色相映可愛筍萌可食出成都孟咏據蜀作對青竹亭焉筍譜玳瑁弓竹如藤其節郄曲生多卧土立則依木長幾百尋狀若相續質雖含文須膏乃縟竹譜弓竹似筋藤班駁如玳瑁薛翊異物志二箭四苦謝靈運山居賦云其竹則二箭殊葉四苦齊味注云二箭一者苦箭大葉一者笄箭細葉宋書安思縣多苦竹竹之醜有四有青苦者白苦者紫苦者黄苦者要術電斑雷州土貢電斑竹地理志疎節竹通竹髙潘州有疎節竹五六尺一節僧道多以為杖又溱州通竹直上無節空心也北户録篁竹篁竹堅而促節體圓而質堅皮白如霜粉大者宜行船細者為笛篁見三蒼竹譜樂毅書薊丘之植植于汶篁史記初篁苞緑籜謝靈運詩風篁成韻月賦修篁壯下屬徐敬業詩竻竹廣新州石城狹隘宋紹興中州守黄濟植竻竹圍繞之竹有刺芒棘森然羔豚不能入志合歡合歡竹出南嶽下諸州山溪間郴州最多其筍初生合歡形勢及成竹也或三莖合或兩莖合斷其間有竅志三稜三稜竹狀若椶櫚葉莖柄三脊然筍細初抽川中人家竹林中忽有云吉兆也上䈽竹竹之良者惟有䈽竹謝靈運所游之澗今在鴈蕩其自死筍則謂之仙人杖通志靈運游名山志云神子溪南山與七里山分流去斤竹澗數里又有從斤竹澗越嶺溪行詩此云䈽竹似誤伐賣解賔王作利漕將代還凡有行衙所在竹皆伐賣之時人呼為解子猷雜志滔㳂儋州滔㳂井與淪水通有人以竹置井口淪水得之儋人呼竹為滔㳂因以為名郡國志竹醉種竹者多用辰日又用臘月惟五月十三日人謂之竹醉日又謂之竹迷日栽竹多茂盛或隂雨則鞭竹明年笋莖交出藝苑雌黄雌雄竹有雌雄雌者多筍故種竹常擇雌者物凡欲識雌雄當自根上第一枝觀之有雙枝者為雌即出筍若獨枝者是雄竹耳志林曳瑟知林唐言杖林其林修勁被滿山谷先有婆羅門聞釋迦佛身長丈六常懐疑惑未之信也乃以丈六竹杖欲量佛身恒於丈端出過丈六如是増髙莫能窮實遂投杖而去因植根焉西域記竹肉江淮有竹肉生節上如彈丸味如白樹鷄酉陽筍竹萌筍竹萌也爾雅筍竹胎也䈚竹萌也説文箈苴鴈醢鄭注箈箭萌越駱菌和之美者越駱之菌注云越駱山名菌竹筍也吕覽苞筍馬援好事至荔浦見冬筍名苞筍上言禹貢厥包橘柚疑謂是也其味美于春夏筍東觀漢記泣竹得筍孟宗字恭武至孝母嗜筍冬節將至時笋尚未生宗入竹林哀歎而笋為之出得以供母皆以為至孝所感楚國先賢𫝊吳丁固晉劉殷孟蜀程崇雅事同歸煮牀簀漢人有適吳吳人設笋問是何物曰竹也歸煮其床簀而不熟乃謂其妻曰吳人轣轆欺我如此笑林希見食筍歸煮竹根唐子鬻筍辛居士名宣仲家貧春月鬻筍充腸酌截竹為瞿用充盛酒人問其故宣仲曰我惟愛竹好酒欲令二物常相並耳南雍州記盧棲處州宣平響巖之東有盧棲溪溪上巖洞甚竒唐道士盧敖棲其中故名盧棲巖竹毎無風自動拂除巖石人以為竒其筍味嘉人號曰盧棲筍浙江志買筍寄林唐夏侯彪為益州新昌令問里胥曰筍一莖幾錢曰一錢五莖取十千買五萬莖謂之曰吾未要且寄林中養之至秋竹成一竿十文遂成五十萬僉載挿簪吉安城有魏夫人壇夫人煉丹時有村嫗屢以茶獻夫人感其意遂拔簪挿于籬下曰年年四月盡當生笋可供汝家食饌次年其地笋生味甘而無根苗鄉人名曰填補笋至今有之夷堅續志初出成竹園人云笋惟初出者盡成竹次者多為蟲所傷十不得五六玉簡雜書斑皮詩義疏笋皆四月生笆竹笋八月生篃竹笋冬夏生永嘉記含墮竹笋六月生竹譜棘竹落人鬚髮湘源縣十二月食斑皮竹笋滋味與北中七八月笋牙小類但甜脆過之諸笋無以及也北户録匾竹匾竹出廬山莖匾傳云釋惠逺使鬼神號辟蛇行者捻此竹為匾竹筍出皆匾堪食之筍譜般腸般腸實中與笆相類生東郡縁海諸山中其筍甚美云與笆竹相似出閩中竹譜浮筍浮竹長者六十尺肉厚而虚軟節闊而亞生水次彭蠡以南大嶺以北徧有之其筍未出時掘取以甜糟藏之極甘脆南人所重上鷄脛鷄脛篁竹之類纎細大者不過如指疎葉黄皮其肌無所堪施筍美青班色緑沿江山岡所饒也竹譜鷄脛竹筍肥美筍譜鹿頭邕管有鹿頭笋范旻邕管記孤竹筑陽薤山有孤竹三年而生一笋笋成代謝常如一荆州圖復生思摩竹如竹大而筍生其節筍既成竹春而筍復生節焉交廣所在有之南方草木狀夢筍夢折笋得財象也夢竹生筍者欲有子息也李淳風占夢書竹蒻笋竹之白蒻也竹之醜節種厥性弱於木而强於草實草木中别類也笋譜初篁初始也篁竹也梁簡文勉春賦云望初篁之傍領愛新荷之發池笋譜按謝靈運湖中瞻眺詩初篁苞緑籜新蒲含紫茸筍羮諺曰臘月煮筍羮大人道便是昔有新婦不得舅姑意凡所須索必昔時而逆意其婦善承須不違所要皆巧圖與夫求變而副舅姑無以取責姑一日嵗暮而索筍羮婦荅即煮供上妯娌問之曰今臘月中何處求筍婦曰且譍為貴以順攘逆責耳其實何處求筍姑聞而後悔倍憐新婦故又諺曰恭敬不如從命受訓莫如從順上冉冉冉冉孤生竹古詩檀欒檀欒䕃修竹和八公山詩嬋娟䕃修竹之嬋娟嘯賦㛹娟有㛹娟之茂篠寄江上而叢生玉潤桃枝之麗魚腸雲母之名梁文帝修竹賦牡丹事始牡丹前史中無説處唯謝康樂集中言竹間水際多牡丹成式檢隋朝種植法七十卷中初不記説牡丹則知隋朝花中所無酉陽世謂牡丹花近有盖以前朝文士集中無牡丹歌詩然楊子華有畫牡丹處極分明子華北齊人則知牡丹花亦乆矣劉賔客嘉話煬帝闢地二百里為西苑詔天下進花卉易州進二十相牡丹赭紅鞓紅飛來紅袁家紅醉妃紅雲紅天外紅一拂黄軟條黄延安黄先春紅顫風嬌等名海記按叚云隋朝所無而劉斧乃有此説其杜撰欺人往往如此髙承事物紀原似據之以為實者其亦為所誤矣雙頭牡丹髙宗後苑宴羣臣賞雙頭牡丹賦詩惟上官昭容一聯絶麗所謂勢如連璧友心似臭蘭人貶洛陽武后冬月游后苑花俱開而牡丹獨遲遂貶于洛陽故今言牡丹者以西洛為冠首事物紀原名花開元禁中重木芍藥得數本紅紫淺紅通白者上因移植于興慶池東沈香亭前㑹花方繁開上乘照夜白妃以步輦從乃命李龜年持金花牋宣賜李白進清平調詞三首上命梨園子弟歌之太貞外傳松窓雜録禁中呼木芍藥為牡丹開元花木記通志畧云芍藥著于三代之際風雅所流詠也今人貴牡丹而賤芍藥不言牡丹初無名依芍藥得名故其初曰木芍藥亦如木芙蓉之依芙蓉以為名也牡丹晚出唐始有聞貴游競趍遂使芍藥為落譜衰宗云按神農本草云一名鹿韭一名鼠姑唐本注云亦名百兩金博雅白􅙥牡丹也而康樂所云竹間水際子華有畫極分明何云至唐始著耶花妖初有木芍藥植于庭前其花一日忽開一枝兩頭朝則深紅午則深碧暮則深黄夜則粉白晝夜之内香艶各異帝謂左右曰此花木之妖不足訝也開元遺事醒酒明皇與妃子幸華清宫因宿酒初醒凭妃子肩同看木芍藥帝親折一枝與妃子遞嗅其艶帝曰不惟萱草忘憂此花香艶尤能醒酒天寳遺事百寶欄楊國忠初以貴妃專寵上賜以木芍藥數本植于家園忠以百寶粧飾欄楯雖帝宫之内不可及也四香閣楊國忠用沈香為閣檀香為欄以麝香乳香篩土和為泥飾壁毎于春時木芍藥盛開之際聚賔友于此閣上賞花焉禁中沈香之亭逺不逮此壯麗也鹿銜牡丹宫中牡丹品最上者御衣黄次曰甘草黄次曰建安黄次皆紅紫各有佳名終不出三花之上他日宫中貢一尺黄乃山下民王文仲所接也花面幾一尺髙數寸祗開一朶絳幃籠䕶之帝未及賞㑹為鹿銜去帝以為不祥有佞人奏云釋氏有鹿銜花以獻金仙帝私曰野鹿遊宫中非佳兆也殊不知應祿山之亂青瑣髙議花開一千朶開元末裴士淹為郎官奉使幽冀過汾州衆香寺得一株白牡丹移置長安私第天寶中為都城竒賞當時名士裴給事看牡丹詩又房琯有言牡丹之㑹琯不與焉至徳中馬僕射總鎮太原又得紅紫二色者今則至多與戎葵比矣興唐寺昔有一株開花一千朶有正暈側暈紅紫黄白之色各不同酉陽花師洛人宋單父字仲孺善吟詩亦能工藝術凡牡丹變易千種紅白鬭色人亦不能知其術上皇召至驪山植花萬本色様各不同賜金千餘兩内人皆呼為花師亦幻世之絶藝也龍城録異人録斸牡丹長安貴游尚牡丹三十餘年毎春暮車馬若狂以不就玩為恥人種以求利一本有數萬者元和末韓𢎞罷宣武節制始至長安私第有花命斸之曰吾豈效兒女輩耶國史補自從韓令功成後辜負穠華過此身羅隠合歡長安興善寺素師院牡丹色絶佳元和末一枝花合歡酉陽徐仲雅題合歡詩云平分造化中分去折破春風兩面開湘湖近事杭州牡丹白樂天初為杭州刺史令訪牡丹花獨開元寺僧惠澄近於京師得之始植於庭欄圈甚密他處未之有也時景方深惠澄設油幕覆牡丹自此東越分而而種之矣㑹徐凝自富春來不知而先題詩曰此花南地知難種慙愧僧門用意栽海燕解憐頻睥睨胡蜂未識更徘徊虚生芍藥徒勞妬羞殺玫瑰不敢開惟有數苞紅幙在含芳只待舍人來白尋到寺看花乃命徐同醉而歸雲溪友談覆以錦幄文宗朝朔方節度使李進賢苐階前有牡丹數叢皆覆以錦幄劇談録白牡丹詩長安三月五日看牡丹奔走車馬慈恩寺元果院牡丹半月開裴璘題詩于佛殿東頭虚壁之上曰長安豪貴惜春殘爭賞先開紫牡丹别有玉杯承露冷無人肯向月中看太和中文宗自夾城出芙蓉園幸此寺見所題詩吟玩乆之因令宮嬪諷念及暮此詩滿六宮矣南部新書紫牡丹尊賢坊田𢎞正宅中門外有紫牡丹成樹後發一徐朶花盛時毎月餘有小人五六長尺餘遊於花上如此七八年人將掩之輒失所在酉陽錦被堆王蜀號其苑曰宣華權相勲臣競起第宅上下窮極奢麗皆無牡丹惟蜀主舅徐延瓊聞秦州董成村僧院蜀總志有紅牡丹一株所植年代深逺使人取之掘土方丈盛以木櫃自秦州至成都三千餘里歴九折七盤望雲九井大小漫天懸險之路方至焉乃植之新第王氏新編至孟氏於宣華􅁐廣加栽植名之曰牡丹苑廣政五年牡丹雙開者十黄者白者三紅白相間者四後主宴苑中賞之蜀總志時彭門為輔郡典州者多其戚里得之上苑而彭門花之所始也天彭亦謂之花州而牛心山下謂之花村成都記蜀平花散落民間小東門外有張百花李百花之號皆培子分根種以求利毎一本或獲數萬蜀總志花品洛中舊品獨以姚魏為冠天彭則紅花以狀元紅為第一紫花以紫繡毬為第一黄花以禁苑黄為第一白花以玉樓子為第一上彭門牡丹在蜀為第一承平洛陽花最盛獨彭門有小洛陽之稱成都記宋景文帥蜀以彭門牡丹錦被堆為第一上姚黄姚黄初出邙山下白司馬坂下姚氏酒寺水北謂寺間有之府中多取以進魏紫出五代魏仁浦樞密園池中島上初出時園吏得錢以小舟載游人往過他處未有也邵氏聞見録竊移錢仁伉尚父之孫也為元帥府中書檢校司徒與中軍都虞候金沼鄰居沼所居堂東植牡丹花一本著花三百朶其色如血如之金含稜毎瓶子頂上有碎金絲如自然蛺蝶之狀一城以為殊異毎嵗花開張宴仁伉預焉開寶七年春三月纔一兩朶開仁伉一夕洪飲擊劍裎服中單背負大籃左手攜籃腰揷大匕首踰牆而過沼中外無知者鋤取牡丹置籃中乃平其地空中聞有吁歎之聲㣲細若遊蜂音辭曰一花三百朶含笑向春風明年三月裏朶朶斷腸紅仁伉異之移植於亭後明日沼覺矣花為非人力所及來年花盛開乃宴召沼沼一見無語得疾以歸至夜憤悶不已以刀决腸而卒腸皆寸寸斷果符空中之語洞㣲志作偈太祖問罪江南李後主用謀臣計欲興王師法眼禪師觀牡丹於大内作偈諷曰擁毳對芳叢由來趣不同髮從今日白花是去年紅艶曳隨朝露馨香逐晚風何須待零落然後始知空後主不省王師渡江酥煎牡丹孟蜀時兵部尚書李昊毎將牡丹花數枝分遺朋友以興平酥同贈且曰俟花凋缷即以酥煎食之無棄穠艶也東坡詩話明日春隂花未老故應未忍著酥煎復齋謾録歐碧洛中花工宣和中以藥壅培於白牡丹如玉千葉一百五玉樓春等根下次年花作淺碧色號歐家碧嵗貢禁府價在姚黄上嘗賜近臣外庭所未識也墨莊謾録碧花止一品名曰歐碧其花淺碧而開最晚獨出歐氏故以姓著無種淳熙三年二月桑子河堰東孝里莊園有牡丹一本無種而生明年三月花勝開始知紫牡丹也過者皆往觀之有杭州觀察推官東過通州見花甚愛欲移分一株掘土深尺許見一石如劒長二尺題曰此花瓊島飛來種只許人間老眼看遂不敢移以是鄉老有生日值花開時必造花下飲酒為夀間亦有約明日造花所而花一夕凋謝者多不吉惟一人李嵩者三月八日初度自八十看花至一百九嵗而終如皋志華王錢思公嘗曰人謂牡丹為花王今姚黄真其王而魏紫乃其后也歐陽永叔花什名萬花㑹兩京牡丹聞于天下花盛時太守作萬花㑹宴集之所以花為屏帳至于梁棟柱栱悉以竹筒貯水簪花釘掛舉目皆花也墨莊謾録三等冀王宫花品以五十種分為三等九品潛溪緋平頭紫居正一品姚黄居其下題景祐元年滄州觀察使記看花局僧仲殊越中牡丹花品序云越之所好尚惟牡丹其絶麗者三十二種始乎郡齋豪家名族梵宇道宫池臺水榭植之無間賞花者不問親疎謂之看花局澤國此月多有輕雨微雲謂之養花天里語曰彈琴種花陪酒陪歌丙戌嵗八月十五日移花日序丙戌雍熙三年也一擫紅一擫紅者多葉淺紅花葉杪深紅一㸃如人以三指擫之牡丹記明皇時有獻牡丹者謂之楊家紅乃楊勉家花也命力士將花上貴妃妃方對粧妃用手拈花時勻面脂在手即印于花上帝見之問其故妃以狀對上詔于仙春館栽來嵗花開上有脂印紅迹帝賞花驚異其事乃名為一捻紅後樂府中有一捻紅曲青瑣芍藥離草芍藥離草也韓詩芍藥有二種有草芍藥木芍藥木者花大而色深俗呼為牡丹非也牛亨問曰將離相别贈以芍藥何也荅曰芍藥一名何離故相贈猶相招召贈以文無文無一名當歸古今注勺藥之和七發曰勺藥之醬子虚賦曰勺藥之和具而後御之師古曰勺藥根主和五臟又辟毒氣故合之于蘭桂五味以助諸食因呼五味之和為芍藥耳韋昭曰今人食馬肝馬腸者合芍藥而煮之選萬花㑹東坡云揚州芍藥為天下冠蔡繁卿為守始作萬花㑹用花千餘萬枝既殘諸圉人吏因縁為奸民大病之萬花本洛陽故事錢惟演為留守始置驛貢洛花識者鄙之曰此宮妾愛君之意也漁隠叢話西京進花自李迪相國始菊日精蘜治蘠爾雅菊有筋菊有白菊黄菊菊花一名節花一名傳公一名延年一名白花一名日精一名更生又曰隂威一名朱周嬴盈一名女花一名女莖其白花者潁川曰回峯汝南曰茶苦蒿河南曰地薇蒿上黨及建安郡曰羊歡草本草日精治蘠皆菊之花莖之别名也生依水邊其華煌煌霜降之時唯此草盛茂九月律中無射俗尚九日而用候時之草也風土記紫菊背明國有紫菊謂之日精一莖一蔓延及數畆味甘食者至死不飢渴拾遺記滎陽郡西有靈源山其澗生靈芝石菌巖有紫菊王韶之神境記菊潭荆州菊潭其源旁芳菊被涯其滋液極甘馨香谷中有三十餘家不得穿井仰飲此水上夀二三百中夀百餘其七十八十者猶以為夭十道記採菊王子喬變白増年方甘菊三月上寅日採名曰玉英六月上寅日採名曰客成九月上寅日採名曰金精十二月上寅日採名曰長生長生者根莖是也玉函方菊與薏似菊花與薏花相似直以甘苦别之耳菊甘而薏苦所謂苦如薏者也抱朴子墨菊永夀漢之好畤也出墨菊其色如墨古用其汁以書見終南山五老洞碑今無蘭水香蘭一名水香俗呼燕尾香煮水以療風又名香水蘭葉如麥門冬而闊且靭長及一二尺四時常青花黄中間葉上有細紫㸃有春芳者為春蘭色深秋芳者為秋蘭色淡秋蘭稍難得二蘭移植小檻中置座右花開時滿室盡香與他花香又别本草都梁都梁縣有小山山有淳水既清且淺其中悉生蘭草緑葉紫莖芳風藻谷蘭馨逺馥俗謂蘭為都梁山因以號縣受名焉盛𢎞之荆州記蘭山蘭山在蜀叙州僰溪縣界蘭生于深林石門尤多有春蘭秋蘭崇蘭鳯尾蘭竹蘭石蘭春蘭花生于葉之下崇蘭花生于葉之上圖經王者香猗蘭操者孔子所作也孔子聘諸侯莫能任自衞反魯隠谷之中見香蘭獨秀喟然歎曰夫蘭當為王者香今乃獨茂與衆草為伍乃止車援琴鼓之自傷不逢時託辭於香蘭云琴操湛漸曽子將行晏子送之曰君子贈人以軒不若以言吾請以言乎夫蘭本三年而成湛之苦酒則君子不近庶人不珮湛之麋醢而價匹馬矣非蘭本美也所湛然也願子之必求所湛晏子漸于蘭則芳漸于鮑則臭論語撰考䜟傳曰蘭根與白芷漸之滫中君子不近庶人不服者所以漸然也史記燕王旦𫝊芳蘭當門曹操殺楊脩曰芳蘭當門不得不除典畧先主殺張裕諸葛亮救之先主曰芳蘭當門不得不鋤蜀志劉湛欲袁淑附已而淑不為改意由是大相乖失淑乃賦詩云種蘭忌當門懐璧莫向楚楚少别玉人門非植蘭所南史庭忽生蘭羅含致仕還家庭中忽蘭菊叢生人以為徳行之感别傳蘭摧毛𤣥字伯成既負其才氣常稱寧為蘭摧玉折不作蕭敷艾榮世説竟體梁武帝平建業朝士皆拜謝覽長揖而已意氣閒雅武帝目送良久謂徐勉云覺此生芳蘭竟體想謝莊正當如此梁書冬時煬帝在江都昏湎滋深往往為妖祟所惑嘗游吳公宅鷄臺恍惚間與陳後主相遇尚喚帝為殿下後主舞女數十許羅侍左右中一人迥美女帝屢目之後主云即麗華也乃以緑文測海蠡酌紅梁新醖勸帝帝飲之甚歡因請麗華舞玉樹後庭花麗華徐起終一曲後主問帝蕭妃何如此人帝曰春蘭秋菊各一時之秀也隋遺録春蘭秋菊各有時猪零苓桔梗時為帝莊徐無鬼異芬長夀二年裴子餘為鄠縣尉同列李朝隠程行諶皆以文法著稱子餘獨以詞學知名或問雍州長史陳崇業三人優劣孰先崇業曰譬之春蘭秋菊俱不可廢舊唐新同蘭菊異芬胡可廢者語林秋菊春蘭英華靡絶選蕳鄭風士與女方秉蕳兮蕳即蘭香草也春秋傳曰刈蘭而卒楚辭云紉秋蘭孔子云蘭當為王者香草皆是也其莖葉似藥草澤蘭廣而長節節中赤髙四五尺漢諸池苑及許昌宫中皆種之可著粉中藏衣著書中辟白魚詩疏秋蘭離騷曰紉秋蘭以為珮又曰秋蘭兮青青緑葉兮紫莖今沅澧所生花在春則黄在秋則紫然而春黄不若秋紫之芬馥也劉次莊樂府集九畹余既滋蘭之九畹兮又樹蕙之百畆離騷蘭之葉如莎首春則茁其牙長五六寸其杪作一花花甚芳香生深林之中清風過之其香藹然與蕙甚相類其一幹一花而香有餘者蘭一幹五六華而香不足者蕙今野人謂蘭為幽蘭蕙為蕙蘭雅翼薫草蕙草也廣雅一名燕草南越志即零陵香也本草樹蘭兩心不可以得一人一心可以得百人男子樹蘭美而不芳繼子得食肥而不澤情不相與往來也淮南莫服蘭生幽谷不為莫服而不芳君子行義不為莫知而止休上芳燒蘭以芳致燒膏以肥見焫翠以羽殃身蚌以珠破腹女惡蛾眉士惡勝已由來尚矣意林伊蘭辟如伊蘭與旃檀生末利山中牛頭旃檀生伊蘭叢中未及長大在地下時牙莖枝葉如閻浮提竹筍衆人不知言此山中純是伊蘭無有旃檀而伊蘭臭臭若胖屍熏四十由旬其華紅色甚可愛樂若有食者發狂而死上萱草療愁萱草一名紫萱又名忘憂草吳中書生呼療愁花述異記萱草是今之鹿葱也名醫别録説文作藼蕿萲三字宜男萱草一名宜男婦人懐妊佩其花生男交廣人佩之極有騐然其土為多男不厭女子故不常佩也南方草木狀忘憂神農經曰中藥養性合歡蠲忿萱草忘憂博物志皋蘇什勞萱草忘憂王朗與魏太子書雖萱草在背皋蘇在側悒憤不逞秪以増毒魏應瑒報龎惠公書甘棗令人不惑萱草可以忘憂束晢發䝉記鶴望還信以代萱蘇梁元帝與劉智藏書萱草辨俗謂母為萱堂考之詩云焉得諼草言樹之背願言思伯使我心痗注云背北堂也箋云憂以生疾恐將危身欲忘之是詩既以君子行役而作以忘憂解之極通于母何干預鼠璞願得萱草枝以解飢渴情李陵録别詩積憤成疢痗無萱將如何謝惠連獻康樂詩思君如萱草一見乃忘憂王融和南海王諫秋胡詩銷憂非萱草永懐寄夢寐江文通擬潘黄門悼婦詩始知萋萋萱草忘憂之言不實團團輕扇合歡之用為虚梁何遜為衡山侯與婦書海棠木竒木之奇者㑹稽之海棠草木記花中神仙唐相賈耽著百花譜以海棠為花中神仙花木録海棠色紅以木𤓰頭接之則色白長樂志海外來李賛皇花木記以海為名者悉從海外來惟紫綿色者謂之海棠餘悉棠棃花耳沈立海棠記睡未足明皇登沈香亭召太真于時卯醉未醒扶掖而至帝笑曰豈妃子醉是海棠睡未足耳太真外傳結巢海棠上徐儉樂道隠于藥肆中家植海棠結巢其上引客登木而飲紺珠集益州益州海棠尤多繁艶未開時如朱砂爛漫稍白半落如雪天下所無也寰宇記蜀花有香海棠有色無香惟蜀中昌州海棠花有香其木合抱故昌州號曰海棠香國州治前有香霏閣毎花或二十餘葉香氣醲郁花譜芙蓉同心木芙蓉㑹稽之百葉木芙蓉鐘陵之同心木芙蓉稽山之四時杜䳌山居草堂記弄色邛州有弄色木芙蓉一日白次日淺紅三日黄四日紅深比落紫色人號文官花記瓊花賦詩以狀揚州后土廟有瓊花與聚仙熟玩有不同者三大而瓣厚其色潔白可愛且其樹大而花繁不知實何木也俗謂之瓊花因賦詩以狀其態劉禹錫詩序移植揚州后土廟有瓊花宋郊搆亭花側榜曰無雙謂天下無别株也仁宗慶厯中嘗分植禁中明春輒枯遂復載還廟中欝茂如故聞見雜録徳祐乙亥北師至花遂不榮趙棠國炎有絶句弔之曰名擅無雙氣色雄忍將一死報東風他年我若修花史合傳瓊花烈女中山堂隨筆總花拂簾墜席范縝常稱無佛竟陵王子良曰君不信因果何得富貴貧賤縝曰人生如樹花同發隨風而墜自有拂簾幌墜於茵席之上自有關籬牆落於糞溷之間墜茵席者殿下是也落糞溷者下官是也南史薔薇梁元帝竹林堂中多種薔薇康家四出薔薇白馬寺黒薔薇長沙千葉薔薇多品彚並以長格校其上使花葉相連其下有十間花屋仰而望之則枝葉交暎迫而察之則芬芳襲人寰宇記司花女洛陽進合蒂迎輦花云得之嵩山塢中人不知名採者異而貢之㑹帝駕適至因以迎輦名之其花外紫内素粉蕋紅心枝幹甚翠狀類通草其香惹衣移日不散嗅之令不睡帝命袁寶兒持之號曰司花女隋遺録凌霄花馮慈明勸李寶歸國寳囚之死神龍中勅旌其門為忠臣門令大其標題見者莫不嘆美慈明號為凌霄花御史臺記凌霄花中露水損人目酉陽花裀學士許慎選放曠不拘小節多與親友結宴于花圃中未嘗具帷幄設坐具使僮僕輩聚落花鋪于座下慎選曰吾自有花裀何銷坐具開元遺事梔子諸花少六出者惟梔子花六出陶真白言梔子剪花六出刻房七道其花香甚相傳即西域薝蔔也酉陽蜀孟㫤常理花園兵花芳草畢集其間一日有青城山叟中迅入内進花兩粒紅梔子種宣令園子種之不覺成樹兩栽其葉婆娑則梔子花矣其花爛紅六出其香襲人蜀主甚愛重之及結梔子則顆大于常者用染則成赭紅色甚妍麗野人閒話廣政八年十月召百官宴芳林園賞之蜀素馨廣州城西九里曰花田彌望皆植素馨花南征録云南漢劉隠時美人死葬骨於此至今花香異於他處廣東志劉玉女塜在肇慶府陽江縣玉女名素馨死葬于此其墓上生那悉茗花因名素馨廣志陵葬其花舊名那悉茗因生於素馨塚上故名或云隠之女那悉茗那悉茗花末利花皆胡人自西國移植於南海南人憐其芳香競植之陸賈南越行紀曰南越之境五穀無味百花不香此二花特芳香者縁自胡國移至不隨水土而變與夫橘北為枳異矣彼之女子以綵絲穿花心以為首飾南方草木狀末利末利花似薔蘼之白者香愈於那悉茗上豆􅅳豆􅅳花其苗如蘆其葉似薑其花作穗嫩葉卷之而生花微紅穗頭深色葉漸舒花漸出舊説此花食之破氣消痰進酒増倍泰康二年交州貢一篚上試之有驗以賜近臣上指甲指甲花其樹髙五六尺枝條弱柔葉如嫩榆與那悉茗末利花皆雪白而香不相上下亦胡人自大秦國移置于南海而此花極繁細纔如米粒許彼人多折置襟袖間盖資其馥芬耳一名散沫花南方草木狀金銀金銀花一名鴛鴦草又曰老翁須藤蔓而生黄白花對開傍水依山處處有之食蕈中毒者生啖之可解治癰疽腫毒尤妙或服或𫝊之皆可沈存中良法所載本草名忍冬草墨莊謾録草卉草卉也木謂之華草謂之榮不榮而實者謂之秀榮而不實者謂之英爾雅草盛曰菶木茂曰葆服䖍通俗凡生草而初逵謂之䓲䓲小也荄杜根也東齊曰杜或曰茇方言知嵗黄帝問師曠曰吾欲知嵗之苦樂善惡可知不對曰嵗欲豐甘草先生甘草薺也嵗欲儉苦草先生苦草者葶藶也嵗欲惡惡草先生惡草者水藻也嵗欲旱旱草先生旱草者蒺莉也嵗欲潦潦草先生潦草者蓬也師曠占朱草炎帝敎民耒耜百穀滋阜朱草蔓于階拾遺記徳至草木朱草生朱草赤草也可以染絳别尊卑也白虎通君乘木而王其政升平則福草生廟中朱草别名禮斗威儀朱草日生一葉至十五日生十五葉十六日一葉落終而復始大戴明堂篇徳光地序則朱草生書大傳朱草草之精也世有聖人之徳則生宋志屈軼黄帝時羣瑞畢臻有屈軼之草生于庭佞人入朝則草指之是以佞人不敢進博物志太平之時屈軼生於庭之末若草之狀主指佞人論衡惟袁與薛人中屈軼唐書萐莆萐莆瑞草也堯時生於庖㕑扇暑而凉説文萐莆一名倚扇狀如蓬大枝葉小根根如絲轉而成風殺蠅堯時生於㕑宋志君和則孳於庖㕑潛潭巴一名倚萐倚扇賔閭舜時生於㕑瑞應圖龍芻東海島龍駒川穆天子養八駿處島中有草名龍芻馬食之日行千里古語云一株龍芻化為龍駒述異記虹草山戎之北有草莖長一丈葉如車輪根大如轂花如朝虹之色齊桓時山戎獻其種乃植于庭以表霸者之瑞拾遺記茂枯鄰人謂展禽曰魯聘夫子夫子三黜無憂何也禽曰春風鼔百草敷蔚吾不知其茂秋霜降百草零落吾不知其枯符子不生刺草魯城北孔子塋中不生刺人草木金樓子不死祖洲上有不死之草人已死三日者以草覆之即活服之令人長生昔秦始皇大􅁐中多枉死者横道有鳥如烏狀銜此草覆死人面當時起坐而自活也有司聞奏始皇遣使者齎草以問北郭鬼谷先生鬼谷先生云此草是東海祖洲上有不死之草生瓊田中或名為養神芝其葉似菰苗叢生一株可活一人始皇乃使使者徐福發童男童女入海採之十洲記精秀夫草之精秀者為英獸之特羣者為雄故人之文武茂異取名於此是謂聰明秀出謂之英膽力過人謂之雄聰能謀始明能見機膽能决之然後可以為英張良是也氣力過人勇能行之智足斷事乃可以為雄韓信是也人物志夢草有夢草似蒲色紅晝縮入地夜則出亦名懐草懐其葉則知夢之吉凶立驗也帝思李夫人之容不可得朔乃獻一枝帝懐之夜果夢夫人因改曰懐夢草洞㝠記却睡有五味草初生味甘花時味酸食之使人不眠名曰却睡草武帝時多末國獻此草上桂林有睡草見之則令人睡一名醉草亦呼懶婦箴出南海也述異記宵明宣帝時背明國貢宵明草夜視如列燭晝則無光自消滅也有黄渠草映日如火其堅靭若金食者焚身不熱有聞遐草服者耳聰香如桂莖如蘭拾遺記書帶鄭司農常居不其城南山中敎授黄巾亂乃避遣生徒崔琰王經諸賢於此揮涕而散所居山下草如薤葉長尺餘堅靭異常土人呼為康成書帶草三齊畧記神草魏明時􅁐中有合歡草狀如蓍一株百莖晝則衆條扶疎夜則合為一莖萬不遺一謂之神草拾遺記吉利吉利草其莖如金釵股形類石斛根類芍藥交廣俚俗多蓄蠱毒惟此草解之極驗吳黄武中江夏李俁以罪徙合浦始入境遇毒其奴吉利者偶得是草與俱服遂解吉利即遁去不知所之俁因此濟人不知其數遂以吉利為名草木狀救窮武當縣石堦山西北角有大松樹樹下生草名救窮冬夏不枯日食三寸絶穀不飢登之度世陶先生謂之西岳佐命是也福地記醒醉興慶池南岸有草數叢葉紫而心殷有一人醉過于草傍不覺失其酒態後有醉者摘草嗅之立然醒悟故目為醒醉草天寶遺事芝神草芝神草也芝為瑞服之神仙故曰神草説文芝生于土土氣和故芝草生論衡王者慈仁則芝生採食之則延年不終與真人同古瑞命記三秀芝一嵗三華瑞草一名菌爾雅采三秀兮於山間九歌冀一年之三秀思𤣥賦煌煌靈芝一年三秀嵇叔夜詩聖王休祥山川雲雨五行四時隂陽晝夜之精以生五色神芝皆為聖王休祥焉神農芝論飲六醴之清液兮食五芝之茂英馮涓志賦五芝含秀而晨敷天台賦青芝曰龍芝赤芝曰丹芝黄芝曰金芝白芝曰玉芝黒芝曰𤣥芝紫芝曰木芝本草赤者如珊瑚白者如截肪黒者如澤漆青者如翠羽黄者如紫金而皆光明洞徹如堅氷也晦夜去之二三百步便望見其光矣抱朴子九莖金色元封二年甘泉宫産芝有九莖金色六葉朱實夜有光乃作芝房之歌神爵元年金芝九莖産于函徳殿銅池中銅池承霤也漢舊儀甘泉歌美函徳書竒大真紅芝西王母云仙之上藥有大真紅芝草漢武内傳紫芝建初三年零陵泉陵女子𫝊寧宅土中忽生芝草五本長者尺四五寸短者七八寸莖葉紫色葢紫芝也太守沈酆遣門下掾衍盛奉獻皇帝悦懌賜錢衣食詔以芝告示天下論衡如冠章帝元和二年芝生沛如人冠又生章武如人抱三子狀建初五年芝出潁川常以六月中生一葉五嵗五重春青夏紫秋白冬黒色十月後黄氣出上尺五寸古今注似珊瑚魏青龍元年神芝生長平芝習陽其色紫肜上别為三幹分為九枝散為三十六莖有似珊瑚之形繆襲賛曰煌煌紫芝吐葩揚榮曩披其圖今握其形藝文鋤芝蔡誕求仙三年飢凍還家欺家云吾為老君守視班龍與諸仙博戲忽輸此龍為此罪見責送吾付崑崙山下芸鋤芝草三四頃並皆生細石中多荒穢治之勤苦不可論法當十年乃得原㑹偓佺子王喬諸仙來按行吾守請之並為吾作力且自放歸當更自修理求去抱朴子孝感崔希喬以孝友稱丁内憂哀毁過禮為鄭縣丞芝草生所居堂一宿而葩盖盈尺唐新語三花肅宗上元二年七月甲辰延英殿御座梁上生玉芝一莖三花親製玉靈芝詩三章章八句曰玉殿肅肅靈芝煌煌重英發秀連夜分房紫㣲間采白蕣呈色載啓瑞圖庶符皇極放此靈質賁其王猷神惟不愛永荷天休㑹要漢甘泉宫九莖效異唐延英殿三花吐秀榻下生仁宗降誕章懿后榻下生靈芝一本四十二葉以應享國四十二年之瑞云邵氏聞見后録兆禍政和中宗室士頓所居鈍軒忽生白芝數本于梁棟上因賜名芝軒賔客詠歌以為和氣次年士頓死王黼賜第有白芝生于正寢附臥榻後屏風而出又一本在㕔事照壁上隔六年而黼誅宣政雜録梁生宣和間王將明賜第既而以梁生芝草為奏車駕臨幸適乆雨梅潤芝墜地京師無名子有為十七字詩曰相公新賜第梁上生芝草為甚脱下來膠少古今詩話神芝名山生神芝不死之草上芝為車馬形中芝為人形下芝為六畜形博物志芝圃仙都有芝圃悉種靈芝或如車騎或如華盖或如樓閣或如飛鳥五色廣異記芝田崑崙山九層有芝田蕙圃羣仙種耨焉拾遺記菖蒲菖葉耕獲冬至五旬七日菖始生菖者草之先生者也於是始耕吕覽玉衡散玉衡星散為菖蒲逺雅頌著倡優則玉衡不明菖蒲冠環運斗樞昌本醢人朝事之豆其實有昌本麋臡鄭𤣥云昌本昌蒲根切之四寸為菹周禮蘭蓀菖蒲一名堯韭一名昌陽吳氏本草世又謂之蘭蓀衍義益聰菖蒲益聰援神契菖蒲放花人得食之長年風俗通菖蒲聖功濟天下者堯也天降精于庭為薤感百隂為菖蒲焉典術嗜􅉁屈到嗜芰文王嗜菖蒲􅉁非正味也韓十六饗有菖歜王使周公閲來聘饗有菖歜左服韓衆服菖蒲十三年身上生毛日視書萬言皆誦之冬袒不寒抱朴子九節漢武帝上嵩山忽見仙人長可二丈問之曰吾九嶷山人也聞中嶽有石上菖蒲一寸九節食之長生故來採之忽然不見内傳忘老熙安縣東北有菖蒲澗盤石上水從上過味甘冷異于常流廣州記澗昔交州刺史陸𦙍之所開也至今重之毎旦輒傾州連汲以充日用雖有井泉不足食大元中襄陽羅友累石澗側容百許人坐遊之者以為洗心之域咸安中姚成甫嘗採菊澗側遇一丈夫謂成甫曰此澗菖蒲昔安期生所餌可以忘老於是徊翔俯仰倐然不知所終葢仙者焉南越志生花兆禍永元中御刀黄文濟家齋前種菖蒲忽生花光影照壁成五采其兒見之餘人不見也少時文濟被殺南齊志見花富貴梁太祖后張氏嘗於室内忽見庭前菖蒲生花光彩照灼非世中所有後驚視謂侍者曰汝見不曰不見后曰嘗聞見者當富貴因遽取吞之是月産武帝見花建寺孝文帝南巡至新野臨潭水而見菖蒲花乃歌曰兩菖蒲新野樂遂為建兩菖蒲寺以美之後魏典畧瑞蒲吳興徳清有沈姓者其宅傍有潭水涯忽産蒲葉長幾尋仞俗以為異遇重午争來斬其葉以辟瘟腊其根以入藥遂表蒲以為瑞因名潭為瑞蒲潭西吳記苔緑錢苔蘚空室無人行則生或紫或青一名貟蘚一名緑錢一名緑蘚一名緑苔古今注苔錢亦謂之澤葵又名連錢草亦呼為員蘚南人呼為垢草述異記垣衣一名昔邪一名烏韭一名垣嬴一名天韭一名鼠韭在屋曰屋遊瓦苔在石上謂之烏韭在地上謂之地衣在井中謂之井中苔在牆垣則謂之垣衣土馬騣澤中石上謂之陟釐浮水中者名苔本草藫石衣也爾雅苔水衣也説文石髮石衣也廣雅石髮水衣也青緑色皆生於石也風土記海藻一名海苔或曰海羅南越志蔓金苔晉梁國獻蔓金苔色如金若螢火之聚大如鷄卵投之水中蔓延波瀾之上光出照日皆如火生水上也乃於宫中穿池廣百步時時觀此苔以樂宫人宫人有幸者則以金苔賜之以置漆椀中照耀滿室名曰夜明苔著衣襟則如火光矣拾遺記菭華殿塵兮玉階菭菭水氣所生也漢婕妤賦萍水簾萍一名䓑大者名蘋江東謂之薸一名水花一名水白一名水蘚一名水簾一名芣菜本草世説楊花入水化為浮萍崑崙菜之美者崑崙之萍焉吕覽水網藻漢武昆明池中有水網藻枝横側水上長八九尺有似網目鳬鴨入此草中皆不得出因名之酉陽萍實宋文帝為宜都王臨川人獻王萍實六子大者如升小者如鶴卵圎而赤初莫有識者以問長史王華曰此萍實也宣尼所謂王者之應宋祚當卜年六百頃之宜都王即位祚終於六十矣渚宫故事雜草􅞒草少陘之山有草焉名曰􅞒草葉狀如葵而赤莖白華實如蘡薁食之不愚山經薲草崑崙之丘有草焉名曰薲草其狀如葵其味如葱食之已勞上玉紅尸子赤縣洲為崑崙之墟其東則水島山左右玉紅之草生焉食其一實醉臥三百嵗文樞鏡要夀榮夀榮草出少室金山丘下服之令人不老取葉服之可通百神典通天餌玉長生草一名通天價值千金隂乾方寸七日再服之令人得仙上薰草君子國民帶劒使兩文虎衣野絲土方千里多薰華之草好讓故為君子國薫草朝生夕死大極山西有采華之草服之乃通萬里之言括地圖香茅永州之野有香茅芬馥數里貢以縮酒盖禹貢荆州所貢而楚包茅不入即此也山川記芒茅芒茅枯時瘴疫大作交廣皆爾也土人呼曰黄茅瘴又曰黄芒瘴草木狀䕶門常山北草名護門寘諸門上夜有人過輒叱之十里迴廣州草有大千金小千金守房郎千里迴萬里憶寰宇記媚草鶴子草蔓生也其花麴塵色淺紫蔕葉如栁而短當夏開花南人云是媚草甚神可比懐草夢芝採之曝乾以代面黛形如飛鶴狀翅嘴距無不畢備北户録南丹山中産相憐草媚藥也或有所矚密以草少許擲之草必著其身不脱彼必將從而不舍嘗得試輒驗癸辛雜志天中記卷五十三
