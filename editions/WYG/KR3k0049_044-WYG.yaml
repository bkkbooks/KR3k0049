body:
  text: 天中記卷四十四明陳耀文撰酒就人性酒就也所以就人性之善惡也一曰造也吉㓙所起造也説文酒酉也釀之米麴酉懌乆而味美也亦言踧也能否皆彊相踧待飲之也又入口咽之皆踧其面也釋名麥釀黍凢黍為酒陽㨿陰力能動故以麥釀黍為酒緯天之美禄酒者天之美禄帝王所以頥養天下享祀祈福扶衰養疾百禮之㑹非酒不行漢食貨志王莽詔曰夫鹽食肴之將酒百藥之長上酒始古有醴酪禹時儀狄作酒古史考儀狄始作酒醪變五味少康作秫酒世本昔者帝女令儀狄作酒而美進之禹禹飲而甘之遂䟽儀狄絶㫖酒曰後世必有以酒魏䇿成禮陳公子完奔齊為公正飲桓公酒樂公曰以火繼之辭曰臣卜其晝未卜其夜不敢君子曰酒以成禮不繼以滛義也以君成禮弗納于滛仁也左莊二十二日中齊桓公為大臣具酒期以日中管仲後至桓公舉觴以飲之管仲半棄酒桓公曰棄而後至飲而棄酒於禮可乎管仲對曰臣聞酒入舌出舌出者言失言失者身棄臣計棄身不如棄酒桓公笑曰仲父起就坐説􅁐遺冠齊桓公飲酒醉遺其冠恥之三日不朝管仲曰此非有國之恥也公胡不雪之以政公曰善因發倉賜貧窮論囹圄出薄罪處三日而民歌之曰公胡不遺冠乎韓子酒敗楚莊王攻宋厨有臰肉樽有敗酒將軍子重諫曰今君厨肉臰而不可食樽酒敗而不可飲而三軍之士皆有飢色欲以勝敵不亦難乎莊王曰請有酒推之士有食饋之賢王孫子新書出奔進酒晋師伐虢虢公出奔至澤中曰吾飢渇甚其御者進清酒腵脯問御曰汝何故謟䛕曰恐君必亡所以儲也虢公作色怒御者曰臣言誤也君所以亡者天下皆不肖疾公賢也虢公喜據軾而笑飢勌乃枕御者􅂰而卧御以塊代其􅂰而去虢公因餓死賈誼書獻飲而醉鄢陵之戰楚王召子反謀榖陽竪獻飲於子反子反醉而不能見王曰天敗楚也夫余不可以待乃宵遁左成下夜辱景公飲酒移於晏子之家晏子立于門曰國得無有故乎君公何為非時而夜辱公曰酒醴之味金石之聲願與夫子樂乎晏子曰臣不敢與焉公乃移於司馬穰直之家穰直荅如晏子公復移於梁丘㨿㨿左執琴右擁竿行歌而至公曰樂哉無彼二子何以持國無此一臣何以樂身晏子伐徳晏子飲景公酒日暮公呼具火晏子辭曰詩曰側弁之俄言失徳也屡儛傞傞言失容也既醉以酒醉飽以徳既醉而出並其福賔主之禮也醉而不出是謂伐徳賔主之罪也嬰以卜其日未卜其夜公曰善舉酒而祭之再拜而出曰豈過我哉吾託國于晏子也以其家貧善寡人不欲其滛侈也而况於寡人謀國乎説􅁐飲酒而泣叔孫婼聘于宋明日宴飲酒樂宋公使昭子右坐語相泣也樂祁佐退而告人曰今兹君與叔孫其皆死乎吾聞之哀樂而樂哀皆喪心也心之精爽是謂魂魄魂魄去之何以能乆昭二十五獻酒投川越王勾踐出行有獻酒一壺者王曰吾獨飲之若三軍何乃投于川命三軍飲之皆告醉吕氏春秋物類相感志昔良將用兵人有饋一簟醪者必投之于何言將士逓流而飲之其味同之也黄石公記百觚平原君與子髙飲强子髙酒曰昔有遺諺堯舜千鍾孔子百觚子路嗑嗑尚飲十榼古之聖賢無不能飲也吾子何辭焉子髙曰以穿所聞賢聖以道徳兼人来聞以飲食也此言生於嗜酒者蓋其勸厲奬戯之辭非實然也孔叢子魯酒薄魯酒薄而邯鄲圍聖人生而大盗起莊子楚宣王朝諸侯魯恭王後至而酒薄宣王怒欲辱之恭公不受命乃曰我周公之􅉙長於諸侯行天子禮樂勲在周室我送酒已失禮方責其薄無乃太甚遂不辭而還宣王怒乃發兵與齊攻魯梁惠王常欲擊趙而畏楚救楚以魯為事故梁得圍邯鄲言事相由也亦是感應注楚㑹諸侯魯趙俱獻酒於楚王魯酒薄而趙酒厚楚之主酒吏求酒於趙趙不與吏怒乃以趙厚酒易魯薄酒奏之楚王以趙酒薄故圍邯鄲也許慎注淮南舉白浮魏文侯與大夫飲酒使公乘不仁為觴政曰飲不嚼者浮以大白文侯飲而不盡嚼不仁舉白浮君君視而不應侍者曰不仁退君已罪矣不仁曰周書曰前車覆後車戒蓋言危也今君已設令令不行可乎君曰善舉白而飲飲畢曰以公乗不仁為上客説􅁐長夜之飲齊威王置酒後宫問淳于髠曰先生能飲幾何而醉對曰臣飲一斗亦醉一石亦醉王問故髠曰賜酒大王之前執法在前御史在後髠恐懼飲不過一斗徑醉矣若乃履舄交錯盃盤狼籍堂上燭㓕主人留髠而送客當此之時髠心醉歡能飲一石故曰酒極則亂樂極則悲萬事盡然言不可極極之而衰以諷諌焉齊王曰善乃罷長夜之飲史記醉􅄰亡裘紹績昧醉􅄰而亡其裘宋君曰醉足以亡裘乎對曰桀以醉亡天下而康誥曰母彛酒者彛酒常酒也常酒者天子失天下匹夫失其身韓非子巵酒激氣趙王武臣間出為燕軍所得燕囚之欲求分地使者徃十餘軰輙殺之有厮養卒請徃張耳陳餘遣之及見燕王燕王問之對曰賤人希見長者願請一巵酒已飲又問之復曰賤人希見長者願復請一巵酒與之酒卒乃為言之因曰耳餘名求趙王實欲燕殺之分趙自立耳燕王以為然乃歸趙王養卒為御而歸新序孔融與曹操書云趙之厮養東迎其主非巵酒無以激其氣九州春秋九醖漢制宗廟八月飲酎用九醖太牢皇帝侍祠以正月旦作酒八月成名曰酎一曰九醖一名醇酎西京雑記髙廟酎張晏曰正月旦作酒八月成名曰酎酎之言純也至武帝時因八月嘗酎㑹諸侯廟中出金助祭所謂酎金也師古曰酎三重釀醇酒未厚故以薦宗廟景紀使酒季布為河東守孝文時人有言其賢者孝文召欲以為御史大夫復有言其勇使酒難近至留邸一月見罷史記不䛕灌夫武帝即位以為淮陽太守入為太僕與長樂衞尉竇甫飲輕重不得夫醉摶甫甫太后昆弟上恐太后誅夫徒夫為燕相夫為人剛直使酒不好面䛕貴戚諸執在已之右欲必陵之士在已左愈貧賤尤益禮敬與釣稠人廣衆薦寵下軰士亦以此多之前漢無愁酒漢武作無愁酒飲之令人無憂王箱雜記百末漢禮樂志景星歌云百末㫖酒布蘭生師古曰百末百草華之末也㫖美也以百草末雜酒故香且美也晋灼曰芬香布外若蘭之生也枚乗七發曰蘭英之酒酌以滌口良注曰酒口漬蘭葉取其香也謝靈運詩蘭巵獻時哲㫖酒布蘭生龍城録謂漢武百味㫖酒名洪梁酒武帝思懐李夫人親侍者􅁴帝容色愁怨乃進洪梁之酒酌以文螺之巵巵出波袛之國酒出洪梁之縣此属右扶風至哀帝廢此邑南人受此釀法今言雲陽出美酒两聲相亂矣帝飲三爵色悦心歡拾遺記君山仙酒庾穆之湘州記云君山上有美酒數斗得飲之而不死為神仙漢武帝聞之齋居七日遣栾巴將童男女數十人來求之果得酒進御未飲東方朔在旁竊飲之帝大怒將殺之朔曰既酒有驗殺臣亦不死無驗安用酒為帝笑而釋之寺僧云春時徃徃聞酒香尋之莫知其處岳陽風土記道士言君山左右皆有美酒數斛得飲之者不死湘州記酒狂蓋寛饒京師為清平恩侯許伯入第丞相御史等皆賀寛饒不行許伯請之廼徃許伯白酌曰蓋君後至寛饒曰無多酌我我廼酒狂丞相魏侯笑曰今公醒而狂何必酒也坐者皆属目卑下之前漢數石于定國食酒至數石不亂冬月治請讞飲酒益精明上客轄投井陳遵字孟公嗜酒每大飲賔客滿堂輙關門取客車轄投井中雖有急終不得去上大雅流連富平侯張放淳于長等成帝愛幸出為微行入侍禁中設宴飲之㑹及趙李諸侍中皆引滿舉白談笑大噱班伯云沈湎于酒微子所有告去也式號式謼大雅所以流連也注言作詩之人嗟嘆而泣涕流連也詩書滛亂之戒其言皆在於酒上千日酒昔有人名劉𤣥石曽從中山酒家酤酒酒家與千日酒飲之忘言其節度歸至家大醉不醒數日家人不知以為死也具棺殮葬之後酒家至向千日滿乃憶𤣥石前來酤酒醉當醒矣遂徃索𤣥石家而問之云𤣥石亡已三年今服闋矣于是與家人至石掘冡開視𤣥石始醒起于棺中又俗云𤣥石飲酒一醉千日􅀶物志齊人田乃之能為千日酒飲過一升醉卧千日有故人趙英飲之喻量而去其家以為死埋之乃之計千日當醒徃至其家破棺出之尚有酒氣鬼神至怪録葡萄酒漢末政在閹䆠扶風孟佗獻西凉州葡萄酒十斛于張讓即拜凉州刺史換凉州見三輔决録大宛左右以蒲萄為酒富人藏酒至萬餘石乆者至數十年不敗史記俗傳飲之醉彌月不解􅀶物志王母嘗下帝設蒲萄之酒漢武内傳蒲萄讓以為酒甘于麯米逆之因以流涎咽噃魏文帝詔苻堅使吕光討西域至龜兹城胡人厚於養士家有蒲桃酒或至千斛十年不敗士卒淪沒酒藏者相繼矣史記李白進清平詞貴妃以玻璃七寳杯酌西凉葡萄酒飲白楊妃𫝊孟詵云葡萄不問土地但收之釀酒皆得美好凟􅀶物志三雅靈帝未有司槯酒斗酒直千錢劉表一子好飲乃製三爵大曰伯雅容七升次曰仲雅五升小曰季雅三升又設大鍼于杖端客有酒輙以刺之驗醉醒也魏文典論飲酒一石盧植飲酒一石不醉後漢書飲酒一斛袁紹總兵兾州遣使邀鄭𤣥大㑹賔客𤣥最後至乃延升上坐身長八尺飲酒一斛秀眉明日容儀温偉後漢酒令孔融集與曹操書云酒之為徳乆矣古先哲王類帝禋宗和神定人以濟萬國非酒莫以也故天垂酒星之燿地列酒泉之郡人著㫖酒之徳堯不千鐘無以建太平孔非百觚無以堪上聖樊噲解厄鴻門非豕肩鐘酒無以奮其怒趙之厮養東迎其王非引巵酒無以邀其氣髙祖非醉斬白蛇無以暢其靈景帝非醉幸唐姫無以開中興袁盎非醇醪之力無以脱其命定國不酣飲一斛無以决其法故酈生以髙陽酒徒著功於漢屈原不餔糟醨取困於楚由是觀之酒何負於政哉又書曰昨承訓荅陳二代之禍及衆人之敗以酒亡者實如來誨雖然徐偃王行仁義而亡今令不絶仁義燕噲以讓失社稷今令不禁謙退魯因儒而損今令不棄文學夏商亦以婦人失天下今令不斷婚姻而將酒獨急者疑但惜榖耳非以亡王為戒也後漢注坐客常滿孔融為大中大夫及退閑職賔客日盈其門常歎曰坐上客常滿尊中酒不空吾無憂矣與蔡邕善邕卒後有虎賁士貌於邕融每酒酣引與同坐曰雖無老成人尚有典刑本𫝊千文一斗孝靈末百司湎酒酒千文一斗常侍張讓子奉為太醫令與人飲輒去衣露刑為樂也典論祖裸進酒洛陽令郭珎家有巨億每暑召客侍婢數十盛粧飾羅縠披之祖祼其中使進酒上荒思廢業邴原初辭家求學原舊性能飲酒自行之後八九年間酒不向口單才負笈苦身持力至陳留則師韓子助潁川則宗陳仲弓汝南則交范孟慱涿郡則親盧子幹臨别師友以原不飲酒㑹米肉送原原曰本能飲酒但以荒思廢業故斷之耳今當逺别因見貺餞可以飲燕於是共坐飲酒終日不醉魏志劇飲葉歆能劇飲至石餘不亂衆人㣲察常以其整衣冠為異江南號之曰華獨坐華矯叔論中聖人曹公時禁酒而人竊飲之故難言酒以曰酒為賢人清酒為聖人上徐邈字景山魏國初建為尚書郎時科禁酒而邈私飲至於沉醉校尉趙逹門曹事邈曰中聖人逹白太祖太祖甚怒度遼將軍鮮于輔進曰平日醉客謂酒清者為聖人濁者為賢人邈性慎獨遇醉言耳坐刑後車駕幸許昌問邈曰頗復中聖人不邈對曰昔子反斃於榖陽御叔罸於飲酒臣嗜同二子不能自懲時復中之然宿瘤以醜見傳而臣已醉見識帝大笑顧左右曰名不虚立魏志鄒陽酒賦曰清者為酒濁者為醴清者聖明濁者頑騃西京雜記一石不亂王凌表滿寵年過躭酒不可居方任帝將召寵給事中郭謀曰寵為汝南太守豫州刺史二十餘年有勲方岳及鎮淮南呉人惮之若不如所表將為所闚可令還朝問以方事以察之帝從之寵既至進見飲酒至一石不亂帝慰勞之遣還魏畧酒徒時苖徳胄性嫉惡為夀春令蔣濟作揚州治中苖初至謁濟濟素嗜酒適㑹其醉不時見苖苖恚悵還刻木為人署曰酒徒蔣濟立于墻下旦夕射之州縣知無柰之何上化為酒壺鄭泉字文淵陳郡人慱學有竒志而性嗜酒其間居每曰願得美酒滿五百斛船以四時甘脆置两頭反覆沒飲之憊即住而啖肴膳酒有斗升减隨即益之不亦快乎權以為郎中使蜀臨卒謂同類曰必葬我陶家之側庶百嵗之後化而成土幸見取為酒壺實獲我心矣㫫書七升為限孫皓每饗宴無不竟日坐席無能否率以七升為限雖不悉入口皆澆灌取盡韋曜素飲酒不過二升初見禮異時常為裁减或宻賜茶荈以當酒至於寵衰更見偪彊輙以為罪又於酒後使侍臣難折公卿以嘲弄侵克發摘私短以為歡笑呉志誓神斷酒劉伶病酒渇甚從婦求酒婦捐酒毁器涕泣諫曰君飲太過非攝生之道必宜斷之伶曰甚善我不能自禁唯當祝鬼神自誓斷之耳便可具酒肉婦曰敬聞命供酒肉於神前請伶祝誓伶跪而祝曰天生劉伶以酒為名一飲一斛五斗解酲婦人之言慎不可聽便引酒進肉隗然已醉矣世説客有詣伶值其裸袒伶笑曰吾以天地為宅舎以屋宇為㡓衣諸君自不當入我㡓中又何惡乎鄧粲晉紀酌以大􅜍諸阮皆能飲酒仲容至宗人閒共集不復用常桮斟酌以大􅜍盛酒圍坐相向大酌時有羣猪來飲直接去上便共飲之世説杖挂百錢阮宣子常步行以百錢挂杖頭至酒店便獨酣畼雖當世貴盛不肻詣也上雜穢非類王戎弱冠諸阮籍時劉公榮在坐阮謂王曰偶有二斗美酒當與君共飲彼公榮者無預焉二人交觴酧酢公榮遂不得一桮而言語談戯三人無異或有問之者阮荅曰勝公榮者不得不與飲酒不如公榮者不可不與飲酒唯公榮可不與飲酒上不為身後張季鷹縱任不拘時人號為江東步兵或謂之曰卿乃可縱適一時獨不為身後名邪荅曰使我有身後名不如即時一桮酒上濬仲曰勝公榮故與酒不如公榮不可不與酒唯公榮可不與酒晋陽秋酒家覆􅀈鴻臚卿孔羣好飲酒王丞相語云卿何為􅁪飲酒不見酒家覆瓿布日月糜爛羣曰不爾不見糟肉乃更堪乆羣嘗書與親舊今年田得七百斛秫米不了麴蘖事世記三日僕射周伯仁風徳雅重深逹危亂過江積年􅁪大飲酒嘗經三日不醒時人謂之三日僕射上青州督郵桓公有主簿善别酒有酒輙令先嘗好者謂青州從事惡者謂平原督郵青州有齊郡平原有鬲縣從事言到臍督郵言在鬲上住上上頓王忱嗜酒醉輙經日自號上頓世喭以大飲為上頓起自忱也宋明帝文闕志王忱少慕逹好酒在荆州轉甚一飲或至連日不醒遂以此死晋安帝紀􅅐中壘塊王孝伯問王大阮籍何如司馬相如王大曰阮籍胷中壘塊故湏酒澆之世説形神相親王仲大歎言三日不飲酒􅁴形神不復相親痛飲讀騷王孝伯云名士不湏竒才但使常得無事痛飲酒讀離騷使可稱名士也飲傾家釀劉尹云見何次道飲酒使人欲傾家釀命酌酒酣元帝過江猶好酒王茂𢎞與帝有舊常流涕諫帝許之命酌酒一酣從是遂斷金貂換酒阮孚為散騎常侍終日酣縱常以金貂換酒為有司所弹三十六國春秋賀知章見李白呼為摘仙人以金龜換酒本傳方外司馬謝奕為桓温司馬謂之方外司馬因以酒逼温走入南康主門避之主曰君無狂司馬何由得相見奕遂引温一兵師於㕔事共飲曰失一老兵得一老兵亦可所怪晋書得趣孟嘉為桓温參軍嘉好酣飲愈多不亂温問嘉酒有何好而卿嗜之嘉曰公未得酒中趣耳上屏爵棄巵祖台州與王荆州書古人以酒為戒願君屛爵棄巵焚罍毁榼殛儀狄于羽山放杜康于三危餉酒是水孔嚴祖父變為全椒令明察過人時有遺之酒者始入門變遥曰餉吾两甖酒其一何故非曰檢視之果是水或問其故曰酒重水輕提酒者手有輕重故耳酒失見約陶侃每飲酒有定限常觀有餘而限已竭殷浩等勸更少進侃悽懐良乆曰年少曽有酒失亡親見約故不敢踰晋書昏醟孝武末年嗜酒好肉而㑹稽王道子昏醟尤甚唯狎昵謟邢於是國寳讒䛕之計稍竹於主相之間葛巾漉酒王𢎞為江州刺史欲識陶潜不敢致也潜常徃廬山𢎞令潜故人龎通之齎酒具於半道栗里要之潜有脚疾使一門生二児轝籃輿既至欣然便共飲酌俄頃𢎞至亦無忤也先是顔延之為劉栁後軍功曹在尋陽與潜情款後為始安郡經過日日造潜每徃必酣飲致醉延之臨去留二萬錢與潜潜悉送酒家稍就取酒嘗九月九日無酒出宅邊菊叢中坐乆值𢎞送酒至即便就酌醉而後歸潜不解音聲而畜素琴一張無絃每有酒適輙撫弄以寄其意貴賤造之者有酒輙設潜若先醉便語客我醉欲眠卿可去其真率如此郡將侯潜值其酒熟取頭上葛巾漉酒畢還復者之宋書餞送酒家顔延之在尋陽與陶淵明情欵後為始安郡經過潯陽日就淵明飲焉每徃必酣飲致醉延之臨去留二萬錢與淵明淵明悉遺送酒家稍就取酒唐陽城為諫議大夫每約二弟吾所俸入而可度月食米幾何薪菜塩幾錢先具之餘悉送酒家無留也以醉謁顔延之以醉謁何尚之尚之望見便佯眠延之發簾熟視曰杇木難雕尚之謂左右曰此人醉甚可畏㨿鞍索酒顔延之好騎馬遨遊里巷遇舊知輙㩀鞍索酒得必傾盡欣然自得宋書醇㫖顧憲之字士思元徽中為建康令清儉强力為政甚得人和故都下飲酒者醇㫖輙號為顧建康謂其清且美焉上醉多醒判孔顗為江夏内使性使酒仗氣每醉輙彌日不醒不治産業居常貧罄無有豊約朱嘗關懐為二府長史典籖諮事不呼不敢前不令去不敢去雖醉日居多而明曉政事醒時判決未嘗有擁衆咸云孔公一月二十九日醉勝他人二十九日醒也飲至五斗沈文季出為吳興太守文季飲酒至五斗妻王氏飲酒亦至三斗常對飲竟日而視事不廢無偶相邀袁粲嘗步屧白楊郊野閒道遇一士大夫便呼與酣飲明日此人謂被知顧到門求進􅙾曰昨飲酒無偶聊相邀了竟不與相見嘗作五言詩訪迹雖中宇循寄乃滄洲蓋其志也南史十六材父留連袁􅙾常酌於白楊路忽逢村父便留連笑語人怪而問之荅曰吾侣偶逰非知音也上行炙内妓大明中尚書僕射顔師伯豪貴下省設女樂王琨時為度支尚書要琨同飲傳酒行炙皆悉内妓琨以男女無親授傳行每至令置床上囬避之然後取畢文如此坐上莫不撫手談笑琨容色自若師伯後為設樂邀琨琨不徃南史不肯被驅宋明帝宴㑹朝臣以南臺御史賀藏為柱下史紏不醉者沈文季不肻飲酒被驅下殿南齊書明月對飲謝諫不妄交接有時酌曰入吾室者但有清風對吾飲者惟當明月口宜飲酒謝朏為呉興之弟􅊪於征虜渚送别朏指􅊪口曰此中唯冝飲酒􅊪建武之朝專以長酣為事與劉瑱沈昭畧交飲各至數斗朏既至郡致􅊪數斗酒遺曰力飲此物勿豫人事齊書三騶對飲謝幾卿性通脫為尚書左丞嘗預樂遊花宴不得醉而還詣道邊酒爐停車褰幔與車前三騶對飲觀之如堵幾卿自若曽於省閣裸飲小遺下霑為南司所彈酒訓髙允被勅論集徃世酒之敗徳以為酒訓孝文覧而悦之酒之為變惑情性雖曰哲人孰自能競在官者怠於政也為下者慢于令也聦逹之士荒于聽也柔順之倫興于諍也乆而不悛致于病也豈止于病乃損于命諺亦有云其益如毫其損如刀魏書西阿劉藻為東平别將辭孝文于洛水之南孝文曰與卿石頭相見藻對曰臣才非古人度亦不留賊虜而陛下輙當驪曲阿之酒以待百官髙大笑曰今未至曲阿且以酒東數石賜卿上梁武帝東行記有覆船山酒罃山髙驪山云昔髙驪有女東海神乗船致酒禮聘之女不肻行海神撥船覆酒流入曲阿故𫝊曲阿有􅃵酒曲阿在丹徒縣圖經輿地志云曲阿出名酒皆云後湖水所釀故醇烈也今按湖水上承丹徒髙驪覆船山馬林溪水水白味寰宇記千里酒任昉謂劉杳曰酒香千里當是虚言杳曰桂林程鄉有千里酒飲之至家而醉亦其例也昉大驚曰吾自當遺忘實不憶此杳曰出楊元鳯所撰置郡事其賦云三重五品商溪􅀈里又在昉坐有人饋昉􅙢酒而作榐字昉問杳此字是否杳曰葛洪字苑作木旁若􅙢音振木名其汁可以為酒梁書罰酒不變梁武帝招延後進二十餘人置酒賦詩臧盾以詩不成罰酒一斗飲盡顔色不變言笑自若蕭介染翰便成文無加㸃帝两美之曰臧盾之飲蕭介之文即席之美也上回授行觴隂鏗嘗與賔友飲宴見行觴者因廽酒炙以授之衆坐皆笑鏗曰吾儕終日酣飲而執爵者不知其味非人情也及侯景之亂鏗嘗為賊擒或救之獲免鏗問之乃前所行觴者上崑崙觴魏賈􅟚家累千金慱學善著作有蒼頭善别水常令乗小艇於黄河中以瓠匏接河源水一日不過七八升經宿器中色赤如絳以釀酒名崑崙觴酒之芳味世中所絶曽以三十斛上魏莊帝酉陽雜爼鶴觴洛陽城西張方橋即漢之夕陽亭也市西有退酤治觴二里里由之人多醖酒為業河東人劉白墮善能釀酒季夏六月時暑赫晞以甖貯酒暴於日中經一旬其酒不動飲之甚美而醉經月不醒京師朝貴多出郡登藩逺相餉饋踰于千里以其逺至號曰鶴觴亦名騎驢酒永熈年中南青州刺史毛鴻賔齎酒之蕃逄路賊盗飲之即醉皆被擒獲因復命擒奸酒逰俠語曰不畏張弓㧞刀唯畏白墮春醪伽藍記東坡詩獨看紅蕖傾白墮故張文潜戯之東坡以惟有杜康為應桑落汝南王悦兄清河王懌為元乂所害悦了無讎恨之意乃以桑落酒候伺之乂大喜以悦為侍中大尉魏書蒲坂西舜所都有姓劉名堕採楫河流醖成芳酎食同枯枝之年排于桑落之辰故酒得其名才經注河中桑落坊有井每至桑落時取其寒暄得所以井水釀酒甚佳故名後史補坐開桑落酒一云廬山有桑落洲杜詩桑落多美酒庾信從蒲州刺史乞酒詩云蒲城桑落酒㶚岸菊花秋世説索郎酒桑落時美因以為名續古今注釀桑落酒亦以九月索郎桑落反語也齊民要術送酒給祭胡叟字論許少聦敏披讀羣籍再閲于目皆誦于口仕魏家于宻雲蓬室草筵惟以酒自適謂友人金城宗舒曰我此生活似勝焦先志意所棲謝其髙矣叟少孤每言及父母則淚下若孺子之號春秋當祭之前則先求㫖酒美膳將其所知携榼執壺至郭外空静處設坐奠拜盡孝思之敬時燉煌汜潜家善釀酒每節送一壺于叟或謂潜曰再三之惠以為過厚子惠于叟何其􅁪也潜曰我給􅁪祭者以其􅁪於孝思也論者以潜為君子矣魏書私醖争認樂部郎祖長命妻張氏事姑王氏甚謹太安中京師禁酒張以姑老且患私為醖之為有司所紏王氏詣曹自告曰老病湏酒在家私釀王所為也張氏曰姑老私患張主家事姑不知釀其罪在張主司疑其罪不知所處平原王陸麗以狀奏髙祖義而赦之上孝義傳習字令王肅與孝文帝殿㑹帝因舉酒曰三三横两两縱誰能辨之賜金鍾御史中丞李彪曰沽酒老嫗甕注缻屠兒割肉與秤同尚書右丞甄琛曰呉人浮水自云二妓兒擲繩在虚空彭城王勰曰臣始解此是習字髙祖即以金鍾賜彪伽藍記不作僕射李元忠雖處要任初不以物務干懐唯以聲酒自娛大率常醉家事大小了不關心園庭羅種果藥親朋尋詣必留連宴賞每挾彈携壺逰遨里􅐬每言寕無食不可使我無酒阮步兵吾師也孔少府豈欺我哉後自中書令復求為太常卿以其有音樂而多美酒故神武欲用為僕射文襄言其放逹常醉不可委以臺閣其子搔聞之請節酒元忠曰我言作僕射不勝飲酒樂爾愛僕射時宜勿飲酒孫騰司馬子如嘗詣元忠逢其方坐樹下葛巾擁被對壺獨酌庭室蕪曠使婢卷两褥以質酒肉北史不為酒令湘東王時為京尹與朝士宴集屬王規為酒令規從容對曰自江左以來未有兹舉特進蕭琛金紫𫝊昭在坐並謂為知言梁書酒上加㡌阮孚性機辨好酒貎短而秃周文帝偏所眷顧嘗於室内置酒十缻缻餘一斛上皆加㡌欲戯孚孚適入室見即驚喜曰吾兄弟軰甚無禮何為竊入王家匡坐相對宜早還宅也因持酒歸周文撫手大笑北史竊酒乞婢齊郡王簡性好酒不能理公私之事妻常氏燕郡公喜女也文明太后以賜簡幹綜家事頗節簡酒乃至盗竊求乞婢侍卒不能禁北史三日病酒齊皇甫亮性質朴純厚終無斥言矯餙属有勅下司各列勤堕亮三日不上省文宣王親詰其故亮曰一日雨一日醉一日病酒文宣王以其實優容之北齊太平酒楊羲夢逰􅅾萊山㑹􅅾萊仙公洛廣休既下山半見許主簿相遇於夾石之間公語主簿曰吾為汝置酒四升在山上可徃飲之此太平家酒治人膓也諺曰欲得長生飲太平真誥洪醉梁元帝徐妃性嗜酒多洪醉帝還房必吐衣中南史酒猶兵陳宣嗜酒與兄子秀書曰汝以飲酒為非吾以不飲酒為過昔周伯仁度江唯三日醒吾不以為少鄭康成一飲三百盃吾不以為多然洪醉之後有得有失成厮養之志是其得也使次公之狂是其失也吾常譬酒之猶水亦可以濟舟亦可以覆舟故江諮議有言酒猶兵也兵可千日而不用不可一日而不備酒可千日而不飲不可一飲而不醉美哉江公可與共論酒矣何水部眼不識盃鐺吾口不離瓢杓汝寜與何同日而醉與吾同日而醉乎速营糟丘吾將老焉身沒之後題吾墓曰陳故酒徒陳君之神道上縹醪酒太宗引崔浩論事語至中夜大悦賜浩縹醪酒十斛水晶戎塩一两曰朕味卿言若此塩酒故與卿同其味也元魏書金叵羅齎著作郎祖珽有文字多技藝而踈率無行嘗因宴失金叵羅於珽髻上得之受酒酤賣鄭羲為西兖州刺史多所受納政以賄成性乂嗇吝人有禮餉者不與杯酒臠肉西門受羊酒東門酤賣之後魏斗酒學士王續字無功求為六合丞以嗜酒不任事髙祖武徳初以前官待詔門下省故事官給酒日三升或問待詔何樂耶荅曰良醖三升差可戀耳侍中陳叔逹聞之日給一斗時號斗酒學士貞觀初以疾罷復調有司時大樂署史焦革家善釀績求為丞吏部以非流不許績固請曰有深意竟除之革死妻送酒不絶嵗餘又死績曰天不使我酣美酒耶棄官去追述焦革酒法為經又采杜康儀狄以來善酒者為譜李淳風曰君酒家南董也所居東南有盤石立杜康祠祭之尊為師以其配著醉鄉記以次劉伶酒徳頌其飲至五斗不亂人有以酒邀者無貴賤輙徃著五斗先生𫝊杜之松故人也為刺史請績講禮荅曰門談糟粕棄醇醪也之松嵗時贈以酒脯本𫝊缸面唐太宗使蕭翼求蘭亭真跡于越僧辨才才一見欵宻留宿設缸面酒江東缸面猶河北曰甕頭蓋初熟酒也書法要録蒲萄八色太宗破髙昌收馬乳蒲桃實於􅁐中種之并得其酒法上自損益造酒酒成凢有八色芳辛酷烈味兼醍醐既頒賜羣臣京師始知其味唐書玉薤魏左相證能治酒有名曰醽渌翠濤常以大金甖内貯盛十年飲不歇其味即世所未有太宗文皇帝嘗有詩賜公稱醽渌勝蘭生翠濤過玉薤千日醉不醒十年味不敗蘭生即漢武百味㫖酒也玉薤焬帝酒名公此酒本學釀於西胡人豈非得大宛之法司馬遷所謂富人藏萬石葡萄酒數十嵗不敗者乎龍城録市酒李宻入關為邏所獲與支黨護送帝所出所有金元使者使者顧金禁漸㢮益市酒飲笑讙譁守者懈宻寺遂夜亡去白帖白雞盞栁亨飲未醉造白雞盞取其迅速僉載鶴樽唐韓王元嘉有一銅鶴樽背上注酒則一足倚滿則正不滿則危側上唱廻波樂李景伯景龍中為諫議大夫中宗嘗與宰臣貴戚内宴酒酣逓唱廽波樂甚喧雜失禮次日景伯歌曰廽波尔時酒巵微臣職在箴規禮飲只合三爵君臣雜混非宜席為之散時人稱之唐書麴生葉法善居𤣥真觀嘗有朝士詣之解帶淹留滿座思酒忽有一美措傲猊直入稱麴生秀才年二十餘肥白可觀笑揖諸公末席伉聲譁論良乆暫起法善曰此子突入詞辯如此豈非䰡魅為惑乎俟其復至宻以小釰擊之遂手墜于階下化為瓶榼一座驚攝遽視乃瓶醲醖也咸笑飲之其味甚佳白麴生風味不可㤀也開元記常持滿汝陽王飲葉静能静能曰有一生能飲當令來謁翊日有通謁者曰進士常持滿見之侏儒也談胚䐷之道飲以酒五斗醉倒乃是一甕耳河東記周穆王時有柸名常滿十洲記因酒損人上始入斜谷天尚早煙霧甚晦知䪺使給事中􅅊倜於野中得新熟酒一壺跪獻於馬首者數四上不為之舉倜懼乃注以他器引滿於前上曰卿以我為疑耶始吾御宇之初嘗飲大醉損一人吾悼之因以為戒迨今四十餘年未嘗甘酒味指力士及近侍者曰此皆知之非紿郷也從者聞之無不感悦上孜孜儆戒也如是栁氏舊聞夜宴晝决李適之雅好賔友飲酒一斗不亂夜則宴賞晝决公務廷無留事唐書金牌斷酒安禄山受帝睠愛常與妃子同食無所不至帝恐外人以酒毒之遂賜金牌子繫於臂上每有公王召宴欲沃以巨觥祿山即以牌示之云准勅斷酒天寳遺亊顛飲長安進士鄭愚劉參郭保衡王冲張道隠等十數軰不拘禮節旁若無人每春時選妖妓三五人乗小犢車指名園曲沼藉草躶形去其巾㡌呌笑喧呼自謂之顛飲上醉聖李白嗜酒不拘小節然沉酣中所撰文章未嘗錯誤而與不醉之人相對議事皆不出太白所見時人號為醉聖上歇馬杯長安自昭應縣至都門官道左右村店之民當大路是酒量錢數多少飲之亦有施者與行人解之故路人號為飲馬杯上自暖盃内庫有一酒盃青色而有紋如亂絲其薄如紙於盃足上有縷金字名曰自暖盃上令取酒注之温温然有氣相次如沸湯遂收於内藏上賜酴醿酒李絳字深之曰今法令不及者五十餘州内戎内淆加此水旱無年陛下焦心銷志求濟時之畧渠便髙枕而卧哉帝入謂左右曰綘言骨鯾真宰相也遣使賜酴醿酒白帖劇飲歡酒孟浩然字浩然採訪使韓朝宗約浩然偕至京師欲薦諸朝㑹故人至劇飲歡甚或曰君與韓公有期浩然曰業已飲遑恤佗卒不赴上䲻腦酒肅宗張皇后專權每進酒常寘䲻腦酒令人夕醉徤忘酉陽生春酒徳宗即位五月甲申劍南貢生春酒本紀釀宜春酒李泌字長源泌請里閭釀宜春酒以祭勾芒神祈豊年帝悦乃著令麻姑送酒李泌以虚誕自任嘗對客曰令家人速洒掃今夜洪崖先生來有人遺美酒㑹有客至乃曰麻姑送酒來與君傾未畢門者曰某侍郎取榼子泌命倒還畧無怍色國史補荷盃李宗閔暑月臨池以荷為盃銀海裴鈞大宴有裴𢎞㤗後至均不悦𢎞泰曰請在坐銀器盡滿飲之隨飲以賜可乎均許之遂竭坐上小爵至觥舡飲皆竭隨即寘器于懐有銀海受一斗以上𢎞泰一飲而盡踏其海卷抱之索馬徑去均使人問之方箕踞而坐稱所得銀器凡二百餘两乾饌子婪尾盃申屠澄與路旁茅舍老父嫗及處女環火而坐翁自外携酒壺至曰此君冐寒且進一杯澄因揖遜曰始自主人翁即廵澄當婪尾河東記蘇鶚云今人以酒廵匝為婪尾又云婪貪也謂處於坐未得酒既貪婪之故云宋景文守嵗詩云迎新送故只如此且盡燈前婪尾盃白樂天詩云三盃藍尾酒一堞膠牙􅄳但改婪為藍耳或云藍穎水其深三丈時人取之以為酒又藍當作啉侯白酒律云酒廵匝未坐者連飲二盃為藍尾末坐逺酒行到常遲故連飲以慰之以啉為貪婪之意石林燕語陶然自娱元徳秀罷魯山令愛陸渾佳山水乃定居不為墻垣扄鑰無僕妾嵗飢或不㸑嗜酒陶然彈琴自娛人以酒餚從之不問賢鄙為酣飲唐書老獻降階苖晋卿字元輔潞州壺關人充河北採訪使入計謁歸壺關太守迎槁吏所属令行酒酒至必立飲白釂侍老有獻降階拜而飲時美其恭魚兒酒斐晋公盛冬用龍腦凝結刻小魚兒每沸酒一盞投一魚在内隨即消釋名魚兒酒龍膏酒順宗時處士伊初𤣥召入宫飲龍膏酒黒如純􅂰飲之令人神爽此本鳥弋山離國所獻杜陽編澄明酒武宗㑹昌元年夫餘國貢火玉才人常用煎澄明酒其酒亦異方所貢也色如紫膏飲之令人骨香無憂武宗起望仙臺薦無憂酒氷寒郢氷李徳裕述夢詩云荷净􅅾池膾氷寒郢氷膠凡學士初上賜食皆悉是􅅾池魚膾夏至湏氷及酒以酒味濃和氷而飲禁中有郢酒坊一品集時酒以王林藴仕不稱意縱酒自適多忤時政刑部尚書白居易贈詩戒之曰世上如今重檢身吾儕恃酒似狂人西曹舊日多持論慎莫吐他丞相䄄閩中髙士傳狂酒武元衡之西川大宴從事楊嗣復狂酒逼元衡大觥不飲遂以酒沐之元衡拱手不動沐訖徐起更衣終不令散宴乾􅍧子如緑玉摇有一客僧長慶中届一寺呼净人酤酒寺僧見之怒其粗暴奪瓶擊其瓶百碎其酒凝滯著樹如緑玉摇之不散知僧云某常持般若經湏預飲此物一盃即諷詠瀏亮乃將瓶就樹盛之其酒盡落器中奄然流啜斯湏器窳酣􅀈矣釋氏㑹要鴿鼉進士顧非熊令狐相國楚聞其辨捷乃改一字令云水裏取一鼉岸上取一駞將者駞來䭾者鼉是為鼉䭾鼉非熊曰屋頭取一鴿水裏取一蛤將者鴿來合者蛤是謂鴿合鴿公大竒之紀異録象物令姚崇之孫巖傑與盧肇㑹于江亭時剻希逸在席肇改令曰欲目前取象一聮即發令曰逺望漁告不闊尺入姚遽飲酒一器凭欄吐噦湏㬰即席還肇令曰凭欄一吐已􅁴空喉摭言酒星宋人衛元規酒後忤宋州丁僕射謝書畧曰自兹囚酒星於天獄焚醉日於秦坑人多記之上醉時羞崔櫓酒後失䖍州陸郎中肱以謝謝之曰醉時顛蹶醒時羞麴蘖催人不自由叵耐一雙窮相眼不堪花卉在前頭上膍臍鄭光在河中日遇國忌行香便與判官及衆客寺宴飲微令時薛保遜為客在坐光把酒曰某改令身上取一果子多膍臍他人皆盡思不得薛乃還令曰脚杏滿坐皆大笑玉泉子地黄酒栁玭相國餗門人賈有奴頗横馮球愛賈召奴責之奴泣謝未幾馮謁賈未出有二青衣齎罌出曰公恐君寒奉地黄酒三杯馮説盡舉之忠孝飲爵大中年丞郎宴席蔣伸在坐忽斟一杯言曰席上有孝于家忠于國及名重于時者飲此爵衆皆肅然無敢舉者獨李公景讓起引此爵蔣曰此宜其然盧氏雜説酹酒恭跪孫㑹宗僕射即渥相大王父也宅中集内外親表開宴有一甥姪為朝官後至及中門見緋衣官人衣襟前皆是酒涴咄咄而出不相識頃即席説于主人訝無此官沉思之乃是行酒時階上酹酒草草傾􅀈也自此每酹酒止側身恭跪一酹而已自孫氏始今人三酹非也北夢𤨏言蹴踘損額王源中文帝時為翰林承㫖暇日與諸昆季蹴踘于大平里第毬子擊起誤中源中之額薄有所損俄有急召比至上訝之源中具以上聞上曰卿大雍睦命賜酒二盤每盤貯十金碗每碗各容一升許宣令并碗賜之源中飲之無餘畧無醉容摭言凝露漿桂花醖同昌公主上每賜御饌其酒則有凝露漿桂花醖酒吃焦遂口吃對客不出一言醉後酹酢如注當時目為酒吃唐史拾遺天性不飲陸相扆出典夷陵時有士子修謁相國與之從容因命酒酌勸此子辭曰天性不飲酒相曰誠如所言已校五分矣蓋平生悔吝有十分不為酒困自然减半也北夢𤨏言醉無户税竟陵人劉虚白擢進士第嗜酒有詩云知道醉郷無户税任他荒却下丹田上每飲益莊朱温初兼四鎮蜀先生遣潘􅖺持聘􅖺飲一斗每讌飲禮容益莊温飲酣謂曰押衙能飲一盤器物呼􅖺曰不敢乃簇在席器皿次第注酌􅖺並飲之􅖺愈温克温謂其歸舘多應傾㵼困卧遺人偵之􅖺簮筍籜冠子秤所得酒器令下人收之上獵酒五代漢韋思在上黨五年惟務聚歛未嘗與賔佐燕㑹有從事請見思怒曰必是來獵酒也命典客飲而遣之逺世記酒有别腸閩主廷曦與翰林學士周惟岳嘗㑹飲極酣因顧左右曰維岳身嫗甚小而能飲如詐酒左右對曰酒有别腸非可以肌體而論之延曦欣然曰果有别腸即使拽維岳下殿將取别腸而視之左右善對曰今侍奉飲樂惟維岳最有殊量取其别腸是無可陪奉者延曦然之遂獲免五國故亊冬𤓰片閩王延羲審知之子也即位后為長夜之飲闕銀葉為酒杯以賜飲羣下銀葉即柔弱因目之為冬𤓰片又名之曰醉如泥酒既盈不復置他所惟飲盡乃可置之自宗室臣宰而下多以拒命嘗一夕延羲乃為牛飲醉甚命宰相李凖棄市而凖方大醉卧於市中惟呼其婢春鶯而已刑者不敢殺置之他所明日視朝使召凖左右以夜來之命對之延羲都不能知乃急召復其位上治聾兵部李濤小字社翁時李公昉為翰林學士月給内醖兵部嘗因春社寄昉詩云社公今日沒心情為寄治聾酒一瓶惱亂玉堂將欲遍依稀廵到第三㕔社酒號治聾酒賈氏談録垂幃痛飲常楚錫為翰林剛正不附貴近或曰公剛直私門何以為樂常曰垂幃痛飲而已南唐近亊罵坐楊隆演嘗飲酒樓上命優人髙貴郷待酒徐知訓為叅軍隆演鶉衣髽髻為蒼鶻知訓嘗使酒罵坐語侵隆演隆演愧恥第泣而知訓愈辱之五代呉世家醉粧後蜀王衍後宫皆戴金蓮花冠酒酣免冠其髻髽然更施朱粉號醉粧國中人皆效之奉使不􅮮字陶榖使越越王因舉酒令曰白玉石碧波亭上迎仙客陶對曰口耳聖明王天子要錢塘宣和間林攄奉使契丹國其中新為碧室云如中國之明堂伴使舉令曰白玉石天子建碧室林對曰口耳王聖人坐明堂伴使曰奉使不識字只有口耳壬即無口耳王林詞窘罵之幾辱命雲麓漫抄酒惡金陵語中酒曰酒惡則知李後主詩云酒惡時拈蕋嗅用郷人語也侯鯖録賜酒辭醉冦凖在中書多召两制就第飲宴必閉關苛留之畏謹者甚懼李宗諤嘗於門扉下竊出得馬而其後為修宫使㤙顧漸深一日召至玉宸殿賜酒宗諤堅辭以醉且云日暮上令中使附耳語云此中不湏從門扉下出金坡遺亊唐酒價真宗皇帝嘗曲宴羣臣於太清樓君臣懽笑無間忽問􅆵沽尤佳者何處中貴人以實價對之上遽問近臣曰唐酒價幾何無能對者惟丁晋公奏曰唐酒每斗三百上曰安知丁曰臣嘗讀杜甫詩曰速來相就飲一斗恰有三百青銅錢是知一斗三百上大喜曰甫詩可為一時之史玉壺清話字傍令宋時有以進士為舉首者其黨人意侮之會其人出令曰以字偏傍為率曰金銀釵釧鋪次一人曰絲綿細絹綱至其黨人曰鬼魅魍魎魁貢父詩話體物令楊大年于丁謂席上舉令云有酒如線遇州必見丁云有餅如月因食則缺續青𤨏髙議卦名令東坡一日㑹客坐客舉令欲以两卦名證一故事一人云孟嘗門下三千客大有同人一人云光武兵渡滹沱未濟既濟一人云劉寛婢美汙朝衣家人小過東坡云牛僧孺父子犯罪先斬小畜後斬大畜蓋指荆公父子也玉集蓮花杯有王永年娶宗女監金耀書庫嘗置酒延竇卞楊繪於室出其妻間坐妻以左右手掬酒以飲卞繪謂之白玉蓮花盃後永年盗庫書下獄引卞繪受饋俱落職東軒筆記唐人有蓮子杯白公詩中稱之竇子野酒譜玉柱椀丁石韞監花黶槯塲一日數胡兒用綿褁一物至玉柱椀也表裏瑩徹無纎瑕製琢亦甚工胡兒云此未足為珍試注以酒頃刻即温已而果然椀底刻安美二字結之云得於長安古壙中淆波别志破壺盃劉卿任待制言宣和時王黼宴從官于私第各出一寳器勸酒侍兒捧一物至卿任前宛若疊縠俄而㵼酒錚然有聲隨酒漲起酒滿如常盃飲盡復如故名破壺盃云南方軟琉璃也南墅閑居録金液流暉王母㑹帝于嵩山飲帝以䕶神養氣金液流暉之酒又有延洪夀光之酒黄帝内傳酒徳武王見三神曰予既沉潰付于酒徳矣徃岐必此之晏子海録琬液穆王東廵大騎之谷指春宵宫西王母乗翠鳯之輦而來共玉帳髙㑹薦清澄琬琰之膏以為酒拾遺記瑶琨碧酒瑶琨去玉門九萬里有碧草如麦割之以釀酒則味如醇酎飲一合三旬不醒但飲甜淡水隨飲而醒帝坐神明臺設甜水之氷以備洪濯酌瑶琨碧酒炮青豹之脯果則有􅂗陰紫梨琳國碧李仙衆與食之洞冥記𤣥碧安期先生與神女㑹于圜丘酣𤣥碧之香酒列仙傳憂心如醉靈帝頗好學藝每引見劉寛常令講經寛常於坐被酒睡伏帝問太尉醉雅寛仰對曰臣不敢醉但任重責大憂心如醉帝重其言寛簡畧嗜酒不好盥浴京師以為諺嘗坐客遣蒼頭市酒迁乆大醉而還客不堪之罵曰畜産寛湏㬰遣人視奴疑必自殺顧左右曰此人也罵言畜産辱孰甚焉故吾懼其死也後漢歡伯焦氏易林坎之兑曰酒為歡伯除憂來樂竇子野酒譜曰蓋其可愛無貴賤賢不肖夷夏共耳而樂之敗酒楊之拒妻者劉懿公女也字恭璞貞勲逹禮有四男二女拒早亡教遵閨門動有法則長子元琮常出飲酒自輿而歸母不見十日因諸弟謝過乃數責之曰夫飲食有節不至流湎者禮也汝乃沉荒慢而無禮自為敗首何以師先諸弟益部耆舊傳酒泉太守晋有羗人桃馥字世芳充厩圉每醉中好言王者興亡之事常云九河之水不足以漬麯蘖八藪之木不足以為薪蒸七澤之䴢不足以充庖爼嘗言渇於酒羣軰呼為渇羗武帝授以朝歌令馥願且為馬圉時賜美酒以樂餘年帝曰朝歌紂之舊都地有酒池故使老羗不復呼渇固辭遷酒泉太守地有清池其味若酒馥乗醉拜受焉拾遺記九醖張華既貴有少時知識來候之華與共飲九醖酒為酣暢其夜醉眠華常飲此酒醉眠後輙勅左右轉側至覺是夕忘勑之左右依常時為張公轉側其犮人無人為之至明犮人猶不起華咄云此必死矣使視之酒果穿腸流床下滂沱世説消腸張華為醇酒煑三薇以漬麴蘖蘖出西羗麴出北胡胡中有指星麥四月火星出穫麥而食之蘖用水漬三夕而麥生萌芽以平旦時鷄初鳴而用之俗人呼為鷄鳴麥以釀酒清美鬯乆含令人歯動若大醉不摇蕩使人肝腸爛當時謂之消腸酒或云醇酒可為長宵之樂拾遺記飲人狂藥長氷校尉孫季舒嘗與石崇酣燕慢傲過度崇欲表免之裴楷聞之謂崇曰足下飲人狂藥責人正禮不亦乖乎楷傳客飲腐脅周顗在中朝時能飲酒一石及過江雖日醉每稱無對偶有舊對從北來顗遇之欣然乃出酒二石共飲各大醉及顗醒使視客已腐脅而死晉書禁京酤酒唐初無酒禁乾元元年京師酒貴肅宗以廩食方屈乃禁京城酤酒酒期以麥熟如初二年飢復禁酤食貨志王饋酒西北荒中有玉饋之酒酒泉注焉廣一丈長深三尺酒美如肉澄清如鏡上有玉尊玉籩取一尊一尊復生焉與天同依無乾時飲此酒人不生死神異經瓊􅏁酒謝𤣥卿遇神仙設瓊􅏁酒續仙傳仙漿拘樓國有仙樹腹中有水謂之仙漿飲者十日醉物類相感志瑞露酒田璆鄧韶携觴晩道遇書生曰某有瑞露之酒釀于百花之中不知與足下乾和五酘孰愈耳與飲其味甘香無比嵩岳嫁女記瓊蘇南嶽夫人設王子喬瓊蘇緑酒九霞觴許碏遍逰名山常作詩曰閬􅁐花前是醉郷誤飜王母九霞觴羣仙拍手嫌輕薄謪向人間作酒狂列仙傳酃渌酒衡陽縣東二十里有􅌕湖周二十里深八尺湛然緑色圡人取以釀酒其味醇美晋武平吳始荐􅌕酒於太廟郭仲堅湘中記長沙郡酃縣有酃湖周廽二里取湖水為酒酒極甘美杜佑曰衡州衡陽縣漢酃地孟康云酃音零又云渌水出豫章郡康樂縣其間烏程縣有井官取水為酒與湘東酃湖年常獻之世稱􅌕渌酒荆施記飛輕軒而酌渌酃呉都賦桂陽郴縣有緑水注于東謂之程郷溪郡置酒宫醖于山下名曰程酒獻同酃也水經箬下酒秦時有程林鳥金二家善釀美酒縣因以名吳興箬溪溪多生箭箬南岸曰上箬北岸曰下箬圡人取下箬水釀酒酒極醇美有上箬下箬惟下箬釀酒醇美吳興摘録顧野王輿地志長興若溪夾溪悉生箭箬南岸曰上箬北岸曰下箬二箬皆村名村人取下箬水釀酒醇美盛于雲陽俗稱若下酒􅅊昭吳録云烏程若下酒有名出謙之吳興記云上若下若村併出美酒張恊七命云酒則荆南烏程則此酒也寰宇記郫筒酒成都府西五十里因水標名曰郫縣蜀王杜宇所都以竹筒盛美酒號曰郫筒成都記郫人刳竹之大者傾春釀於筒包以藕絲蔽以蕉葉信宿馨庭于林外然後斷之以獻俗號郫筒酒風俗録相傳山濤治郫用筠管釀􅙐醿作酒兼旬方開香聞百步杜詩魚知丙穴由來美酒憶郫筒不用沽李義山詩錦石有棊子郫筒當酒壺郫蜀縣也巴鄉酒魚復有巴鄉村村人善釀故俗稱巴鄉清村側有溪中有魚其頭似羊豊肉少骨美於餘魚水經注宜城宜城醪蒼梧清酒名也釋名安成宜春縣出美酒謂之宜春醇酎隨嵗舉上貢刺史親付計吏晋鄭安道記王烈之安成記同梁劉杳要雅宜成酒酎見周禮䟽張華輕薄篇云蒼語竹葉清宜城九醖酒陸韓卿詩渤海方滛滯宜城誰勸酬昭明將進酒云宜城溢渠椀中山浮羽巵酒杯藤酒杯藤出西域藤大如臂葉似葛花實如梧桐實花堅可以酌酒自有文章暎徹可愛實大如指味如荳􅅳香美銷酒圡人提酒來至藤下摘花酌酒仍以實銷醒國人寳之不傳中圡張騫出大宛得之事出張騫出關志崔豹古今注沈釀川沈釀者漢鄭𢎞為靈文鄉嗇夫行官京洛未至宿一埭埭名沈釀於埭逢故舊友人四顧荒郊村落絶逺酤酒無處情抱不伸乃以錢投水中依口而飲飲盡酣暢皆得大醉因更為沈釀川上酒樹南海有䪺遜國有酒樹似安石榴採其花汁停甕中數日成酒甘美南史西南夷有樹頭酒其樹類㯶髙五六丈結實大如李土人以麯納罐中以索懸罐於實下倒其實取汁流于罐以為酒名曰樹頭酒或不用麯惟取其汁熬為白糖其葉即貝葉冩緬書用之今緬甸軍民宣慰司也雲南志棃花春杭州其俗釀酒趂棃花時熟號棃花春白樂天杭州春望詩曰紅袖織綾誇柿葉青旗沽酒趂棃花長度集杭州物産食貨有棃花乾酒之上者杭州圖經象洞象洞在潮海三日今属武平縣昔未開拓時羣象止於其中乃謂之象洞其地膏腴稼穡滋茂有美醖邑人重之曰象洞酒圖經石汁朱崖郡海中之洲也洲方千里自徐文涇度便風揚風帆一日一夕即至以圡為釡器用瓠瓢無水人飲石汁又有椒似安石榴花着甕中經旬即成酒其味香美甚醉人十道志女酒南方人有女數嵗即大釀酒俟陂水竭寘壺其中宻固其上侯女將嫁决水取之供賔客謂之女酒味絶美居常不可致也房千里投荒泉般若湯北僧謂酒為般若湯蓋廋詞以避法禁酒録酒名酒則郢之富水烏程之若下滎陽之圡窟春富平之石凍春劒南之燒春河東之乾和蒲桃嶺南之靈溪慱羅宜城之九醖潯陽之湓水京城之西市睦蝦蟇陵之郎官清河漠又有三勒漿類酒法書波斯二勒謂庵摩勒毗棃勒訶棃勒國史補異酒山海經㰂汁甘為酒齊民要術沈約集皮日休集皆有㰂酒烏丸有東墻酒交州有椰子酒南蠻有㯽榔酒貢臘有朋芽四酒辰溪有釣藤酒赤圡國有甘蔗酒鞾靼有馬潼酒訶陵國以桞花椰子為酒扶南有椰漿又有蔗及圡𤓰根酒房千里投荒録云南方有女數嵗積水釀酒侯彼水竭置壺其中宻固其上侯女將嫁决水取之供客謂之大酒味絶美常居不可致也古有崑䈁酒事見陸魯望詩蜀后玉有桃核两扇每扇着仁處約盛水五升良夕水成酒味醉人更五貯水以俱其宴見雜俎阿薩部多獵虫鹿剖其肉重疊之以石壓瀝汁波税斯拂蔴等國米及草子釀于肉汁之中經數日即變成酒飲之可醉同上天竺國謂酒為酥烈椰子本出伽盧國其地熱衢植椰子木為䕃剖其實中有酒能醉人孫公談圃三佛齊有栁花酒椰子酒㯽榔酒皆非麯蘖所醖飲之亦醉人扶南石榴酒辰溪釣藤酒赤圡國甘蔗酒孫公談圃抛青春韓詩百年未滿不得死且可勤買抛青春李太白詩堂中三千朱履客甕中百斛金陵春杜子美詩山蓋竹葉春聞道雲安麯米春呉志烏程酒有名竹葉春裴鉶傳竒亦有酒名松醪春三臺北齊髙洋毀銅雀臺築三箇臺宫人拍手呼上臺因以送酒劉賔客嘉話今之催酒三臺或云鄴中有三臺石崇逰一之地樂工以促飲又云蔡邕三日之間周厯三臺樂府以邕諳音律製此曲希其厚遇資暇集玉清碧摇杜陵􅅊弇㳺蜀春末南山鄭氏亭有仙女曰我玉清之女此玉清宫也命酒樂宴亭中曰吾有三寳將以贈君始出一杯其色碧而光瑩洞澈顧謂弇曰碧瑶盃也宣室志鸂鶒巵莊宗年十一從晋王討王行瑜初令入勤獻捷昭宗一見駭異之曰此子有竒表乃撫其背曰我兒將來之國棟勿忘忠孝於吾家乃賜鸂鶒酒巵翡翠盤北夢醉龍蔡邕飲酒乃至一石嘗醉在路上卧人名曰醉龍故在此醉卧扶而歸也語林紅犮元豊中東坡自黄移汝至荆溪寓滆湖别業一夕與單君錫步月于黄􅁟有餉紅灰酒者曰此紅犮也玻曰彼知有紅友不知有黄封真快恬也因就號為東坡酒圖經劉䟦字斯立命酒為玉犮仍為作傳百家詩序卷白波資暇集云黄巾餘黨起西河白波谷漢既擒白波戮之如卷席然故酒席倣之以快人情也青箱雜記曰杯名文選飛觴舉白蓋卷白上之酒波耳薛瑩後漢書曰黄中郭太等起于西河白波谷時謂之白波賊味江蜀有味江舊經蜀王征西畨有野人以壺酒獻王王使投之江中三軍飲之皆醉囚名酒山南昌國有酒山山有泉其味如酒飲之甚美醉經月不醒酒井衞青破月支月支有井色如酒因名酒井羊頭山記謹酒萍氏掌幾酒謹酒神農書萍能勝酒取不沉溺也示兒編始終空桑穢飯醖以稷麥以成醇醪酒之始也烏梅女麯甜醹九酘澄清百品酒之終也酒經狂花病葉或有勇於牛飲者以巨觥沃之既撼狂花復凋病葉飲流謂睚者為狂花日睡者為病葉醉鄉日月酉不㑹客杜康善造酒以酉日死故酉日不飲酒㑹客典論沉湎夫飲之禮不脱履而即序者謂之禮跣而上坐者謂之宴能飲者飲之不能飲者已謂之醧齊顔色均衆寡謂之沉閉門不出者謂之湎故君子可以宴可以醧不可以沉不可以湎韓詩外傳異名酴酒母也醴一宿成也醪渾汁酒也酎三薫酒也醨薄酒也醑㫖酒也曰􅀈曰醙白酒也曰釀曰醖造酒也買之曰沽當肆曰壚釀之再亦曰醙灑酒曰釃酒之清曰醥厚曰醹相飲曰配相强曰浮飲盡曰釂使酒曰􅒬甚亂曰醟飲而面赤曰酡病酒曰酲主人進酒于客曰酧客酌主人曰酢獨酌而醉曰醮出錢共飲曰􅀈賜民共飲曰酺不醉而奴曰奰婢集韻酒滓謂之酪母醪汁滓酒也竹根巴州以竹根為酒注子為時珍貴也段氏蜀記庾信謝趙王賜酒詩如聞傳上命定是賜中尊野爐燒樹葉山盃捧竹根杜詩傾銀注玉驚人眼共醉終同卧竹根酒譜云蓋以竹根為飲盃也江淹集杯賢扚聖壺隠仙人嘗吟詩曰杯賢與杓聖與我萬户封樹萱録軟脚樽𤣥宗幸諸楊第出有賜曰餞路及還有勞曰軟脚樽郭子儀自同州歸代宗詔大臣就宅作軟脚局人出三百千大唐遺記𤣥宗幸楊國忠第出有飲餞還有軟脚樽開天傳信記白擲劇飲元行恭少頗驕恣父文遥令與盧思道交逰文遥嘗謂思道曰小兒此日微有所知是大弟之力然白擲劇飲甚得師風思道荅云六郎情情俊邁自是克荷堂構而白擲劇飲亦天性所得北齊嵬峩我北齊盧思道嘗曰長安酒賤㪷價三百能可嵬峩我不可令嵬峩尔也楊松玠談藪酒秃茶風無柰筆酒秃不勝簮張祐酒經陶人之為器有酒經焉晋安人盛酒以瓦壺之製小頸環口修腹受一斗可以盛酒凡饋人牲兼云以酒器書云酒一經或二經至五經焉他境人有㳺于是邦不逹其義間五經至束帶迎於門乃知是酒五鉼為五經焉侯鯖録酒膽豩豩字呼關切頑也當在山字韻劉夢得有盃前膽不豩趙勰有吞舡酒膽豩之句禮部韻不收唐韻亦無漢臯詩話抱甕羊稚舒冬月釀酒令人抱甕速得味好語林審宜攻景凡醉有所宜醉花宜晝襲其光也醉雪宜夜消其潔也醉得意宣唱宜其和也醉將離宜擊鉢壯其神也醉文人宜謹節奏章程畏其侮也醉俊人宜加觥孟加旗幟助其烈也醉樓宜暑資其清也醉水宜秋泛其爽也此皆以審其宜攻其景以與恊合也侯鯖録麯晒凡造麴晒一月露一月釀酒清甚𤨏碎録茶南方嘉禾茶者南方之嘉禾也樹如𤓰蘆葉如梔子花如白薔薇實如栟櫚蔕如丁香根如胡桃其名一曰茶二曰檟三曰蔎四曰茗五曰荈茶經早采者為茶晩取者為名一名荈蜀人名之苦茶爾雅茶品風俗貴茶其品器益衆劒南有蒙頂石花或小方或散芽號為第一湖州有顧渚之紫笋東川有神泉昌明硤州有碧澗明月芳蕋菓茰簝福州有芳山之生芽䕫州有香山江陵有楠木湖南有衡山岳州有㴩湖之含膏常州有義興之紫笋􅄔州有來白睦州有鳩坑洪州有西山之白露夀州有藿山之黄芽蘄州有蘄門團黄浮梁商賈不在焉國史補建州有龍圑鳯夸上清明日湖州進紫笋茶荆楚嵗時記臯盧臯盧古平作飲止渇除疫不睡利水道明目生南海諸山中南人極重之本草拾遺酉平縣出臯盧茗之别名葉大而澁南人以為飲廣州記日鑄㑹稽有日鑄嶺其地産茶歐陽脩云两浙産茶日鑄第一方輿勝覧茶産建州之北苑先春龍􅀈東川之獸目綿州之松嶺福州之柏巖雅州之露芽南康之雲毋婺州之舉巖碧貌宣城之陽坡横紋饒池之仙芝福合祿合運合慶合蜀州之雀舌鳥觜麥夥片甲蟬翼潭州之獨行靈草彭州之仙厓石花臨江之玉津袁州之金片龍安之騎火涪州之賔化建安之青鳯髓岳州之黄翎毛建安之石巖白岳陽之令膏冷出茶譜通考茶論臆乗湖州紫笋袁州界橋其名甚著不若湖州之研膏紫笋烹之有陸脚埀下故公淑賦云雲埀緑脚蒙山露芽蜀雅州境上頂有蒙山榖芽皆云火前者言採造於禁火之前也火後者次之又有枳殻芽荀把芽桃杷芽者皆治風疾又有皂莢芽槐桞芽皆上春摘其芽和茶作之長洲沙泉湖州長洲縣啄木嶺金沙泉每嵗造茶之所也湖長二郡接界於此厥圡有境㑹亭每茶時二牧畢至斯泉也處沙之中居常無水將造茶太守具儀注拜勑祭泉湏之發源其夕清溢供御者畢水即微减供堂者畢水已半之太守造畢水即涸矣太守或還斾稽期則示風雷之變或見鷙獸毒蛇木魅𤾉晱之類焉商旅即以顧渚水造之無沾金沙者今之紫笋即顧渚者亦甚佳矣渠江鐡色潭郡之間有渠江中有茶而多毒蛇猛獸鄉人每年採􅀈不過十五六斤其色如鐡而芳香異常烹之無脚晋原嫩芽蜀州晋原洞口横原味江青城其横芽雀舌鳥觜麥顆蓋取其嫩芽所造以牙似之也又有片甲片甲者早春黄茶牙茶相把如片甲也蟬翼者其葉軟弱如蟬翼也皆散茶之最上也含膏白鶴岳陽灉湖舊出茶謂之灉湖茶李肇所謂灉湖之含膏也今惟白鶴僧園有千餘本一嵗不過一二十两圡人謂之白鶴茶味極甘香岳陽風圡記勝金徽黟茶有勝金嫩桑仙芝來泉先春運合瓊英之品又有不及號者曰片茶竹茶茶經云容州黄家洞有竹茶葉如嫩竹圡人作飲甚甘美杭州茶杭州寳雲山産者名寳雲茶下天竺香林洞者名香林茶上天竺白雲峯者名白雲茶金地茶西域僧金地藏所植今傳梗空筒者是大抵烟霞雲霧之中氣常温潤與地上者不同味自異也几華山志茶之别茶之别者有枳殻芽枸杞芽批杷芽皆治風疾又有皂筴芽槐芽栁芽乃上春摘其芽和茶作之故今南人輸官茶徃徃雜以衆葉惟茅蘆竹箬之類不可入自餘山中草木芽葉皆可和合椿柿尤竒真茶性極冷惟雅州蒙山出者温而主疾本草茶山茶溪臨城縣東北一百四十里有茶山茶溪括地國大茗丹丘出大茗服之生羽翼天台記真香茗西陽武昌晋陵皆出好茗巴東别有真香茗煎飲令人不眠桐君録花如梔子茶花狀如梔子其色稍白上明月峽明月峽在顧渚側二山相對石璧峭立大澗中流亂石飛走茶生其間尤為絶品張文規所謂明月峽月茶始生是也又峽中有夜橋昔顔魯公於此步月因名宋長興令許遵重建改名許公橋湖州茶湖州茶生長城縣顧渚山中與峽州光州同生白茅懸脚嶺與襄州荆南義陽郡同生鳯亭山伏翼澗飛雲曲水二寺啄木嶺與夀州常州同生安吉武康二縣山谷與金州梁州同界橋茶袁州界橋茶其名甚著不若湖州之研膏紫笋烹之有緑脚埀下茗菜嬰相齊景公時食脱粟之飯炙三弋五夘茗菜而已晏子春秋蒙塵上茶惠帝蒙塵還洛陽黄門以瓦盂盛上茶至尊晋四王起事賣茶虧體江統字應遷愍懐太子洗馬常上䟽諫云今西園賣醯麫藍子菜茶之属虧􅀢國體宋江氏家傳悶仰真茶劉琨與兄子南兖州刺史演書云前得安州乾薑一斤桂一斤黄芩一斤皆所湏也吾體中潰悶常仰真茶汝可置之茶經茶茗任瞻字育長少時有令名自過江失志既下飲問人云此為柔為茗􅁴人有怪色乃自分明云向問飲為熱為冷世説提茗鬻市晋元帝時有老姥每旦獨提一器茗徃市一鬻之市人競買自旦至夕其器不减所得錢散路傍孤貧乞人人或異之州法曹縶之獄中至夜老姥執所鬻茗器從獄牗中飛出黄陵老傳祠塜遺錢剡縣陳務妻少寡與二子同居好飲茶茗以宅中有古塜每飲輙先祀之二子患之曰古塜何知徒以勞意欲掘去之母苦禁而止其夜夢一人云吾止此塜三百餘年卿二子􅁪欲見毀頼相保䕶又享吾佳茗雖潜壤杇骨豈㤀翳桑之報及曉于庭中獲錢十萬似乆埋者但貫新耳母告二子慙之從是禱祠愈切異􅁐大茗餘姚人盧洪入山採茗遇一道士牽三青牛引洪至瀑布山曰吾丹丘子也聞子善具飲常思見惠山中有大茗可以相給祈子他日有甌犧之餘乞相遺也因立奠祀後常令家人入山獲大茗焉神異記苦茶輕身換骨昔丹丘子黄山君服之陶洪景雜録見鬼覔茶夏侯愷因疾死宗人字茍奴察見鬼神見愷來收馬拜病其妻著平上幘單衣入坐生時西壁大床就人覔茶飲搜神記讌飲茶果桓温為揚州牧性儉每讌飲唯下七奠拌茶果而已晋書穢吾素業陸納為吳興太守時衞將軍謝安常欲詣納納兄子俶恠納無所備不敢問之乃私蓄十數人饌安既至所設唯茶果而已俶遂陳盛饌珍羞必具及安去納杖俶四十云汝既不能光益叔父李何穢吾素業上採茗入叢晋孝武世宣城人秦精入武昌山中採茗忽見一人長一丈通體毛精見之太怖自謂必死毛人牽其臂將至山入大叢茗處放之便去精因留採湏㬰復來乃採懐中橘與精精甚怖負茗而歸續捜神記斛二瘕桓宣武有一督將因時行病後虚熱更能飲複茗必一斛二斗乃飽纔减升合便以為夫不足非復一日家貧後有客造之正遇其飲複茗亦先聞世有此病仍令更進五升乃大吐有一物出如升大有口形質縮縐狀以牛肚客乃令置之於盆中以一斛二斗複茗澆之此物噏之都盡而止覺小脹又增五升便悉混然從口中涌出既吐此物病遂差或問之此何病荅云此病名斛二瘕續搜神記水厄晋司徒長史王濛好飲茶人至輙命飲之士大夫皆患之每欲徃侯必云今日有水厄世説王肅初入國不食羊肉及酪漿等物常飯鯽魚美渇飲茗汁京師士子道肅一飲一斗號為漏巵髙祖謂肅曰卿中國之味也羊肉何如魚美茗飲何如酪漿肅對曰羊者是陸産之最魚者乃水族之長所好不同並各稱珍以味言之甚是優劣羊比齊魯大邦魚比邾莒小國唯茗不中與酪作奴髙祖太笑彭城王勰謂肅曰卿不重齊魯大邦而愛邾莒小國肅對曰鄉曲所美不得不好彭城王重謂曰卿明日顧我為卿設邾莒之食亦有酪奴因此復號茗飲為酪奴時給事中劉縞慕肅之風專習茗飲彭城王謂縞曰卿不慕王侯八珍好蒼頭水厄海上有逐臭之夫里内有學顰之婦以卿言之即是也其彭城王家有呉奴以此言戱之後蕭衍子西豊侯蕭正徳歸降時元义欲為之設茗先問卿於水厄多少正徳不曉义意荅曰下官生於水鄉而立身以來未遭陽侯之難元义與舉坐之客皆笑焉伽藍記服茶酥燉煌人單道開不畏寒暑常服小石子藥有松蜜薑桂茯苓之氣時復飲茶蘇一二升而已晉書比茗甘露新安王子鵉豫章王子尚詣曇濟道人於八公山道人設茶茗子尚味之曰此丼露也何言茶茗宋録飲茗治腦陏文帝微時夢神人易其腦骨自尔腦痛忽遇一僧云山中有茗草煑而飲之當愈服之有効由是人競採掇讃其畧云窮春秋演河圖不如載茗一車好文蛇種義興南岳寺有真珠泉稠錫禪師嘗飲之清甘可口曰得此泉烹桐廬茶不亦稱乎未幾有白蛇啣茶子墜寺前由此滋蔓茶味倍佳號曰蛇種圡人重之每嵗争先餉遺官司需索無絶寺僧苦之舊誌敲氷煑茗逸人王休居太白山下日與僧道異人徃還每至冬時取溪氷敲其精瑩者煑建茗其賔客飲之遺亊税茶貞元九年春初税茶先是諸道塩鐡使張滂奏曰伏以去秋水灾詔令减税令之國用湏有供備狀請出茶州縣及茶山外商人要畧委所定三等時估每十税一價錢充所放两税其明年以後所得税外收貯若諸州遭水旱賦税不辨以此代之詔曰可仍委張滂具處置條奏自是每年得錢四十萬貫茶之有税自此始也然税茶無虚嵗遭水旱處未嘗以茶税錢拯瞻唐史春後貢新太和七年正月呉蜀貢新茶皆於冬中作法為之上務茶儉不欲逆其物性詔所貢新茶宜於立春後作上𣙜茶使太和九年十月王涯獻茶以涯為槯茶使茶之有税自涯始槯茶不便太和九年十二月諸道塩鐡轉運槯茶使令狐楚奏槯茶不便於民請停從之歸茶園元和十四年歸光州茶園於百姓從刺史房免讓之請仙掌茶余聞荆州玉泉寺近清溪諸山其水邊處處有茗草羅生枝葉如碧玉唯玉泉真公常來而飲之年八十餘嵗顔色如桃花而此茗清香滑熟異於他者所以能還童振枯扶人夀也余遊金陵見宗僧中孚示余茶數十片拳然重疊其狀如手號為仙人掌茶蓋新出乎玉泉之山曠古未覿因持之見遺兼贈詩要余荅之遂有此作後之髙僧大隠知仙人掌茶發乎中孚禪子及青蓮居士李白也李詩瑠璃眼皇孫奉節王好詩初煎茶加酥椒之類求詩泌戯云旋沬畨成碧玉池添酥散出瑠璃眼奉節王即徳宗鄴侯家傳陸羽仙茶景陵僧有於水濵得嬰兒者育為弟子稍長自筮遇蹇之漸繇曰鴻漸於陸羽可用為儀乃姓陸氏字鴻漸名羽羽有文學多意思恥一物不盡其妙茶術最著始造煎茶法至今鬻茶之家陶為其像置於煬器之間把為茶神云宜茶足利鞏縣為瓷偶人號陸鴻漸買十茶器得一鴻漸市人沽茗不利輙灌注之一復州老僧是陸僧弟子常諷其歌云不羡黄金罍不羡白玉杯不羡朝入肖不羡幕入臺千羡萬羡西江水曾向竟陵城下來又有追感陸僧詩至多因話録飲必羽煎有積師者嗜茶素非漸兒煎侍不鄉口羽出游江湖四五載積師絶於茶味代宗召入内供奉命宫人善茶者以餉師一啜而罷上疑其詐私訪羽召入翌日賜師齋俾羽煎茗喜動顔色一舉而盡使問之師曰此茶有若漸兒所為也於是欲師知茶出羽見之紀異録見廣川盡䟦煎茶愽士御史大夫李季卿宣撫江南至臨淮或言常伯熊善茶者李公請之伯熊着黄衫烏紗㡌手執茶器口誦茶茗區别指㸃左右刮目茶熟李公為歠两杯至江外又召陸鴻漸鴻漸身衣野服隨茶具而入既坐敷攤如伯熊故事公心鄙之茶畢命奴子取錢三十分酧煎茶博士鴻漸乆逰江介通達勝流至此羞愧復着毀茶論語林判茶品第陸龜蒙字魯望嗜茶置園顧渚山下嵗取租茶自判品第張又新為氷説七種其一慧山泉三虎丘井六松江人助其好者雖百里為致之不乘馬升舟設蓬席齎束書茶􅍳筆牀釣居徃來時謂江湖散人或號天隨子甫里先生自比涪翁漁父江上丈人後以髙士召不至唐書𣙜茶拒詔何易于為益昌令鹽鐡官𣙜取茶利詔下所在毋敢隠易于視詔書曰益昌人不征茶且不可活矧厚賦毒之乎命吏閣詔吏曰天子詔何敢拒㬰坐死公得免竄邪對曰吾敢愛一身而暴于民乎亦不使罪爾曹即自焚之觀察使素賢之不劾也上受茶一串陸䞇字敬輿張鎰銄錢百萬止受茶一串曰敢不承公之賜變茶法玉涯始變茶法益其税以濟用度下益困而鄭注亦議𣙜茶天子命涯為使心知不可不敢争李訓敗乃及禍初民怨茶禁苛急涯就誅皆羣詬罵抵以瓦礫税茶王紹遷倉部員外郎是時兵旱無年詔户部收關官俸税茶及無名錢以修荒政紹由員外判務貢停刺史唐制湖州造茶最多謂之顧渚貢焙嵗造一萬八千四百八斤焙在長城縣西北大厝五年以後始有進奉至建中二年袁髙為郡進二千六百串并詩刻石在貢焙故鴻漸與楊祭酒書云顧渚山中紫笋茶两片此物但恨帝未得嘗實所嘆息一片上太夫人一片充昆弟同歠後開成三年以貢不如法停刺史裴充南部雪水滯陸羽品第水以雪水第甘云煎茶滯而太冷也海録茶癖酒狂鄧利云陸羽茶既為癖酒亦稱狂上囊緘茶末韓晋公滉聞奉天之難以夾練囊緘茶未遺使徤步以進國史補消食茶有人授舒州牧李徳裕謂之曰彼到郡日天柱峯茶可惠三數角其人献數十斤李不受明年罷郡用意精求獲數角投之李閔而受之曰此茶可以消酒食毒乃命烹一甌沃于肉食内以銀合閉之詰旦視其肉已化為水矣衆服其廣識中朝故事玉泉子茶利茶災右補闕母焸慱學有著述才性不飲茶致代茶餘序其畧曰釋滯消壅一日之利暫佳瘠氣侵精終身之累斯大獲益則歸功茶力貽患則不為茶灾豈為福近易知福逺難見焸直集賢無何以熱疾暴終矣唐語活火煎李約性嗜茶能自煎謂人曰茶湏緩火炙活火煎活火謂炭火之熖者也客至不限甌數竟日執持茶器不倦曾奉使行至陜州硤石懸東愛渠水清流旬日忘發因話録官自治園令狐楚為鹽鐡轉運使先是鄭注建㩁茶使王涯又議官自治園植茶人不便楚請廢使如舊法從之諫增茶賦李􅑻字待價鹽鐡使王播增茶税十之五以佐用度􅑻上號謂㩁率本濟軍與而税茶自貞元以來有之方天下無事忽厚歛以傷國體一不可茗為人飲鹽粟同資若重税之售必髙其弊先及貧下二不可山澤之産無定數程斤論税以售多為利若價騰則市者稀其税幾何三不可陛下初即位詔懲聚歛今反增茶賦必失人心帝不納莫茗能詩胡生者失其名以釘鉸為業居霅溪而近白蘋洲去厥居士餘步有古墳胡生若每茶必奠酹之嘗夢一人謂之曰吾姓栁平生善為詩而嗜茗及死塟室乃子今居之側常銜子之惠無以為報欲教子為詩胡生辭以不能栁强之曰但率子言之當有致矣既寤試搆思果有冥助者厥後遂工焉又一説列子終於鄭今墓在郊藪謂賢者之跡而或禁其樵焉里有胡生性落魄家貧少為洗鏡鎪釘之業倐遇甘果名茶美醖轍祭於列禦冦之祠壟以求聦惠而思學道厯稔忽夢一人刀劃其腹開以一卷之書置于心腑及睡􅁴而吟咏之意皆其美之祠所得不由於師友也既成卷軸尚不棄於猥賤之業真隠者之風逺近號為胡釘鉸南部新書時人謂之胡釘鉸詩栁當是栁惲也茶譜日飲百椀大中三年東都進一僧年一百二十嵗宣皇問服何藥而致此僧對曰臣少也賤素不知藥性本好茶至處唯茶是求或出日過百餘椀如常日亦不下四五十椀因賜茶五十斤令居保夀寺南部新書悔自潑茶杜􅃎公悰位極人臣冨貴無比嘗與同列言平生不稱意有三其一為澧州刺史其二貶司農卿其三自西川移鎮廣陵舟次瞿唐為駭浪所驚左右呼喚不至渇甚自潑湯茶喫也上緑華紫英同昌公主上每賜饌其茶則有緑華紫英之號杜陽編滌煩党魯使西蕃烹茶帳中蕃使問何為者魯曰滌煩消渇所謂茶也蕃使曰我亦有之命取出以指曰此夀州者此顧渚者此靳門者國史補擷山為茶藩鎮劉仁恭禁南方茶自擷山為茶號山曰大恩以邀利出茗輸帛楊行宻字化源議出鹽茗俾民輸帛幕府髙朂曰瘡破之餘不可以加歛且帑貲何患不足若悉我所有易四鄰所無不積財有餘矣行宻納八床主人劉建鋒死馬殷代髙郁又教殷民得自摘山故茗算募髙力置邸閣居茗號八床主人置邸賣茶楚馬殷始脩貢京師然嵗貢不過所産茶名而已乃自京師至襄唐郢復等州置邸務以賣茶其利十倍㧞茶置桑張詠令重陽民以茶為業公曰茶利厚官將𣙜之命㧞茶而置桑民以為苦其後𣙜茶他縣失其業而崇陽之桑已成其為絹嵗百萬匹其為政知所先後如此也言行録雪水團茶陶榖買得党大尉故妓取雪水烹團茶謂妓曰党家應不識此妓曰彼麄人安得有此但能銷金帳下淺斟低唱飲羊羔兒酒耳陶愧其言類􅁐鬭茶蘇才翁嘗與蔡君謨鬭茶蔡茶水用惠山泉蘇茶水劣改用竹瀝水煎遂能取勝天台竹瀝水彼人欲竹稍屈而取之盈瓮若以他水雜之則亟敗江隣幾雜志茗戰建人謂鬭茶為茗戰茶録草木仙骨丁謂云石乳出壑額斷崖缺石之間蓋草木之仙骨草大䖝宋崇寜後復𣙜茶法制日嚴私貶者固以抵罪而商賈官劵清納有限道路有程纎悉不如令則被擊斷罪或沒貨出告昏愚者徃徃不免其儕乃目茶籠為大䖝言傷人如虎也雜録品建茶陸羽茶經不第建安之品蓋前此茶事未興靈芽真笋委翳消腐而人不知耳夫體勢洒落神觀冲淡惟兹茗飲為冠天下借使陸羽復起閲其金餅味其需腴當爽然自失黄儒品茶要録宣和中復有白茶勝雪熊蕃曰使黄君閲今日則前乎此者未足詫也建安茶品陸羽茶經裴汶茶述不第建品説者俱謂二子未嘗至閩而不知物之發也固自有時蓋昔者山川尚閟靈芽未露至于唐末然後北􅁐出為之最時偽蜀毛文錫作茶品亦第言建有紫笋而臈面乃産于福五代之季建属南唐嵗率諸縣民採茶北􅁐初造研膏繼造臘面既又製其佳者號曰京挺宋太平興國二年始置龍鳯模遣使即北􅁐團龍鳯茶以别庻飲又一種茶叢生石崖枝葉尤茂至道初有詔造之别號石乳又一鍾號的乳文一種號白乳此四種出而臘面斯下矣貨宗咸平中丁謂為福建漕鹽御茶進龍鳯團始載之茶録仁宗慶厯中蔡襄為漕始改造小龍團茶以進甚見珍惜㫖令嵗貢而龍鳯遂為次矣歐陽脩聞襄進小龍團驚曰君謨士人也何至此作事神宗元豊間有㫖造宻雲龍其品又加于小團之上哲宗紹聖中又改為瑞雲翔龍至徽宗大觀初親製茶論二十篇以白茶者自為一種與他茶不同其條敷闡其葉瑩薄崖林之間偶然生出非人力可致正焙之有者不過四五家不過四五株所造止于二一銙而已淺焙亦有之但品格不及於是白茶遂為第一既又製三色細芽及試新銙貢新銙自三色細芽出而瑞雲翔龍又下矣夫至芽茶絶矣宣和庚子嵗漕臣鄭可間始創為根絲氷芽蓋將已揀熟芽再令剔去祗取其心一縷用珍器貯清泉漬之光瑩如銀絲然一制方寸新銙有小龍蜿蜒其上號龍團勝雪又廢白的石三鼎乳造化銙二十餘色初貢茶皆入龍腦至是慮奪其味始不用焉蓋茶之妙至勝雪極矣故合為首冠然猶在白茶之下者以白茶上所好也其茶嵗分十餘綱惟白茶與勝雪自驚蟄後興役浹日乃成飛騎疾馳不出仲春已至京師號為綱頭玉芽以下先後而發建至京夏過半矣然能焙初興貢數殊少累增至干元符以斤計者一萬八千今則四萬七千一百斤有竒貢茶録茶論并郡志歐陽公詩云建安三千五百里京師三月嘗新茶蓋御茶園自九窠十二隴至小山凡四十六所惟龍游窠小若張坑西際又為禁圍之先也負暄雜録宋製茶茗上林第一乙夜清供承平雅玩宜年寳玉萬眷銀葉延年石乳瓊林毓瑞浴雪呈祥清白可鍳風韻甚髙暘谷先春價倍南金雲英雪葉金錢玉華玉葉長春蜀葵寸金並宣和者政和曰太平嘉瑞紹聖曰南山應瑞北􅁐貢茶録異美之名謝氏論茶曰比丹丘之仙茶勝烏程之御荈不止味同露液白况霜華豈可為酪蒼頭便應代酒從事杜牧詩山實東南秀茶稱瑞草魁皮日休詩十盆前皋盧曹鄴詩劍外九華英施肩吾施茶為滌煩子酒為忘憂君南越志茗苦澁謂之果羅北􅁐曰葉布絶品也豫章曰白露曰白芽南劍曰石花曰錢芽東川曰獸目湖常俱曰紫笋夀州曰黄芽福閩曰生芽曰露芽岳陽曰含膏外此尤夥若蟾背鰕目龍舌蟹眼瑟瑟瀝霏霏靄鼔浪湧泉琉璃眼碧玉池又皆茶事中天然偶字也説郛臆來九難茶有九難一曰隂採夜焙非造也二曰嚼味嗅香非别也三曰膩鼎腥甌非器也四曰膏薪庖炭非火也五曰非湍擁潦非水也六曰外熟内生非炙也七曰碧粉縹塵非末也八曰操艱攪豦非煑也九曰夏興冬廢非飲也茶經茶病芽澤肥乳則甘香而粥面著盞而不散圡瘠而芽短則雲脚渙亂去盞而易散葉梗半則受水鮮白葉梗短則色黄而泛鳥蔕白合茶之大病不去鳥蔕則色黄熟則草木氣存去膏未盡則色濁而味重受煙則香奪壓黄則味失此皆茶之病也試茶録治熱故老云五十年前多患熱黄近代悉而無病腰脚者多乃飲茶所致也國史補片茶二類凡茶有二類曰片曰散片茶蒸造實捲模中串之惟建劒則既蒸而研編竹為格置焙室中最為精潔他處不能造其名有龍鳯石乳的乳白乳頭金蠟面頭骨次骨末骨麄骨山梃十二等以充嵗貢及邦國之用洎本路食茶餘州片茶有進寳雙勝寳山两府出興國軍仙芝嫩蕋福合祿合運合慶合指合出饒池州泥片出䖍州緑英金片出袁州玉津出臨江軍靈川福州先春早春華英來泉勝金出歙州獨行靈草緑茾片金金茗出潭州大石椀出江陵大小巴陵開勝開捲小捲生黄翎毛出岳州雙上緑牙大小方出岳辰澧州東首淺山薄側出光州總二十六名其两浙及宣江鼎州止以上中下或第一至第五為號散茶有太湖龍溪次號末號出淮南岳麓草子楊樹雨前雨後出荆湖清口出歸州茗子出江南緫十一名文獻通考京挺十餘品江左近日有蠟面之號李氏别命取其乳作片或號曰京挺的乳及骨子二十餘品名乳蠟面龍鳯茶等又有研膏茶即龍品也談􅁐顧渚陽美浙西湖州為上常州次之湖州出長城顧渚山中常州出義興君山懸脚嶺北岸下唐重修茶舎記貢茶御史大夫李栖筠典郡日陸羽以為冠於他境栖筠始進故事湖州紫筍以清明日到先薦宗廟後分賜近臣紫筍生顧渚在湖常間當茶時两郡太守畢至為盛集見蔡寛夫詩話玉川子謝孟諌議寄新茶有手閱月團三百片又云天子湏嘗陽羡茶則孟所寄乃陽羡茶也雲麓漫抄縷金茶之品莫貴於龍鳯團凡八餅重一斤慶厯間蔡君謨為福建運使始造小片龍茶其品絶精謂之小龍團几二十餅餘重一斤其價值金二两然金可有而茶不可得每因南郊致齋中書樞宻院各賜一餅四人分之宫人徃徃縷金其上其貴重如此歸田録沫餑凡酌茶置諸盌令沫餑均沫餑湯之華也華之薄者曰沫厚者曰餑細輕者曰花茶經南中傳巽七誨云蒲萄宛柰齊柿燕栗峘陽黄棃巫山未橘南中茶子西極石宻霜華𢎞君峯飲檄寒温既畢便下霜華之茗三爵而終應下諸蔗木𤓰元李楊梅五味橄欖懸豹葵美各一杯茶經七事茶之分茶千類萬狀畧而言之有如胡人鞾者蹙綜然幇牛臆者廉譫然浮雲出山者輪菌然輕颺拂水者􅉼澹然此茶之精好者也有竹籜者枝幹堅實艱于蒸搗故其形籭簁焉如霜苛者莖葉凋沮易其狀貌故其形萎瘁然此茶之瘠者者也自采至于封七經自胡鞾至于籭簁八等茶經蒙山中頂蜀之雅州名蒙山中頂山有頂頂有茶園􅀈中頂曰上清峯昔有僧病冷且乆嘗遇老父詢其病僧具告之客曰何不飲茶僧曰本以茶冷豈有能止乎父曰是非常茶仙家有雷鳴茶亦有聞乎僧曰未也父之䝉之中頂茶常以春分之元後多搆人力俟雷之發聲併手採摘以多為貴至三日乃止若獲一两以本處水煎服能祛宿疾二两當眼前無疾三两固以換骨四两即為地仙但精絜治之無不郊者僧因之中頂築室以俟及期獲一两餘服未竟而病瘥既不能乆及慱求但精徤至八十餘氣力不衰時到城市觀其貌若年三十餘眉髪紺緑後入青城山不知所終今四頂茶園不廢唯中頂草木繁茂重雲積霧蔽虧日月鷙獸時出人跡希到矣茶譜龍焙龍焙泉即御泉也北􅁐造貢茶社前芽細如針用御水研造每片計工直錢四萬分試其色如乳乃最精也種茶凡種茶樹必丁子移植則不復生故俗䏂婦必以茶為禮義固有所取也雲脚乳面凡茶少湯多則雲脚散湯少茶多則乳面聚龍團髙齊詩話大小龍團始於丁晋公而成於蔡君謨歐公聞而歎曰君謨士人也何至作此事苕溪詩話天中記卷四十四
