body:
  text: 天中記巻四十六明陳耀文撰菜菜䔩䔩者菜茹之緫名詩韓奕云其䔩維何維筍及蒲毛傳云䔩菜殽也凡菜之可食者名為䟽也爾雅註菜之美菜之羙者崑崙之蘋夀木之華指姑之東中容之國有赤木𤣥木之葉焉餘瞀之南巔極之崖有菜其名曰嘉樹其色若碧陽華之芸雲夣之芹具區之菁吕覧蕰藻周鄭交惡君子曰茍有明信澗谿沼沚之毛蘋蘩蕰藻之菜可薦於鬼神可羞於王公左隠桾菜奪畚楚文王伐鄧使王子革王子靈共捃菜二子出採見老丈人載畚乞焉不與摶而奪之王聞之令皆拘二子将殺之大夫辭曰取畚信有罪然殺之非其罪也君若何殺之言卒丈人造軍而言曰鄧為無道故伐之今君公子子之摶而奪吾畚無道甚於鄧呼天而號君聞之群臣恐君見之曰討有罪而横奪非所以禁暴也恃力虐老非所以教㓜也愛子弃法非所以保國也私二子㓕三行非所以從政也丈人舎之矣謝之軍門之外耳説􅁐賜田楚荘王賜虞丘子菜田三百號曰國老以孫叔敖為令尹上擇菜宣尼窮於陳蔡之間顔囬擇菜荘子金菜始皇聞鬼谷先生言因遣徐福入海求金菜玉蔬並一寸椹金樓子不窺園董仲舒專精於述古年至六十餘不窺園中菜桓譚新論琅菜西王母謂仙之上藥有碧海之琅菜漢武内傳老母求菜劉平與母俱匿野澤中平朝出求食逢餓賊将烹之平叩頭曰令但有老母求菜老母待平為命願得先歸食母畢還就死涕泣賊見其至誠哀而遣之平還既食母訖因白曰属與賊期義不可欺還還諸賊衆皆大驚相謂曰常聞義士乃今見之子去矣吾不忍食子於是得全後漢蔬食菜􅅅崔瑗愛士好賔客盛修餚膳殚極滋味不問餘産居常蔬食菜􅅅而已上竊菜拔遺汝南鐘南嚴府君少時鄉居有入其園竊菜者明日㧞菜悉遺鄉里鄉里人相約無復取菜者謝承書前種還外彭城刁躍字子卿為漁陽相前相所種菜悉付還外上非耕不食丁宻蒼梧人非家織布不衣非已耕種菜菓不食廣州先賢傳竊菜為橋袁下字叔隰陬慮人種菜一園左右竊取度清瀆下乃為之撟其敦義如此山東六賢傳耑蹄菜趙咨使魏魏人曰聞江東有耑蹄菜作若為食咨曰當得倉鰷以作􅅅吳書鬼目菜孫皓天紀三年有鬼目菜生二人黄耉家依縁棗樹長丈餘莖廣四寸厚三分又有買菜生三人呉平家髙四尺厚三分如枇杷形上廣尺八寸下莖廣五寸兩邊生葉緑色東觀案圖名鬼目作芝草買菜作平慮草遂以耉為侍芝郎平為平慮郎志仙蔬咸寜四年立芳蔬園於金墉城東多種異菜有菜名曰芸薇類有三種紫色者最繁味辛其根爛熳春夏葉宻秋蘂冬馥其實若珠五色随時而盛一名芸芝其色紫為上蔬其味辛色黄為中蔬其味甘色青者為下蔬其味鹹常以三蔬充御膳其葉可以藉飲食以供宗廟祭祀亦止人渇飢宫人採帶其莖葉香氣歴日不歇拾遺記食唯鹽菜皇甫謐姑子梁栁為城陽太守或勸謐餞之謐曰栁為布衣時過吾吾送迎不出門食不過鹽菜貧不以酒肉為禮也今而送之是貴城陽太守而賤梁桞也豈中古人之道哉晉書挑菜傷指范宣挑菜傷指大啼曰身體髮膚不敢毁傷故啼灌園鬻菜邵續為石勒所執身灌園鬻菜以供衣食勒屢遣察之歎曰此真髙人矣不如是安足貴乎嘉其清若賜糓帛毎臨朝嗟嘆以厲群官普書燕用菜果桓温性儉毎燕唯下七奠柈菜果而已上食不過菜吳隠之母喪哀毁甞食鹹葅以其味㫖轍而葉之及為廣州清操喻勵常食不過菜及乾魚而已帷帳器服皆付外庫時人頗謂其矯然亦始終不易上采拔更生晋永嘉五年曲陽縣民黄慶宅左右有園東南廣數丈毎種菜輙鮮異雖加采㧞更生夜嘗有白光似懸絹道士傅徳占使人掘之獲尺三玉印文曰長承萬福齊書設菜葅宗慤以軍功封洮陽侯先是鄉人庾業家甚富豪侯服玉食與賔客相對膳必方丈而為慤設粟飯菜葅謂客曰宗軍人慣噉麄食慤致飽而退初無異辭至是業為慤長史帶梁郡慤待之甚厚不以昔事為嫌宋書菜園供啖栁元景為三公時在朝勲貴多事産業唯元景獨無所營南岸有數十畆菜園守園人賣得錢二萬送還宅元景怒曰我立此菜園以供家中啖耳乃復賣以取錢奪百姓之利耶乃以錢乞守園人上􅂒醤調菜王𤣥謨栁元景桓護之雖並比人而𤣥謨獨受老傖之目凡諸稱謂四方書䟽亦如之嘗謂𤣥謨昨四時詩曰堇茶供春膳粟漿充夏飡􅂒醬調秋菜白醝觧冬寒上設菜􅅅朱修之姉在鄉里饑寒不立修之貴為刺史未曽供贍嘗徃視姉姉為設菜􅅅麄飯以激之上蔬食自悲宜都王鏗生三嵗喪母及有識問母所在左右告以早亡便思慕蔬食自悲不識母齊書食老葉江泌性仁孝食菜不食心以其有生意唯食老葉而已上竊園迯隠沈道䖍辟州府凡十二命皆不就有竊園菜者外還見之仍自迯隠待竊者去後乃出南史隠傳菜蔬三盞武帝大官常膳唯以菜蔬几桉所陳不過三盞梁書與妃種菜梁蕭棟字吉豫章安王㩲之子也侯景以法駕迎棟時棟與其妃執鋤種菜忽然見逼駭愕乆之典畧百里奉母甄琛母曹氏有孝性夫氏去家路踰百里毎得魚肉菜菓珍􅅅口實者必令僮僕走奉其母乃後食焉後魏書飯菜精㓗髙閭曽造胡叟短褐曵柴從田歸舎為閭設濁酒蔬食皆手自辨集其舘字卑陋園疇褊局而飯菜精㓗醯醤調美見其二妾並年衰跛眇衣布穿弊閭見其貧約以物直十餘疋贈之亦無辭媿上麥飯蔬食盧義僖性清儉不營財利雖居􅂋位毎至困乏麥飯蔬食欣然甘之上清風園北齊主以鄴清風園賜穆提婆於是官無蔬菜賖買於人負錢三百萬其人訴焉斛律光曰此園賜提婆一家足不賜提婆百官足三國典畧買菜出境庫狄士文為呉州刺史性清苦不受公料家無餘財其子嘗噉官厨士文枷之繫獄累日杖之一百步送還京師僮隷無敢出門所買菜必於出境凡有出入皆封署其門親故絶迹慶弔不通上蔬菲賜菓姚察陳亡入陏詔授秘書丞别勅成梁陳二代史又勅於朱華門長叅文帝知察蔬菲别日召入内殿賜菓菜指謂朝臣曰朕聞姚察學行當今無此我平陳唯得此一人陳書種蔬坑上太宗囬次易州界司馬陳元疇令百姓種蔬坑上而微火煦之欲其速生以擬供進太宗聞之責其謟媚詔免官唐書佛土菜太宗時徤逹獻佛土菜一莖五葉花赤中心正黄而蘂子紫色泥㜑羅獻波稜菜葉類紅藍實如蒺䔧火爇之能益食味又有酢菜状似芹而味香渾提葱其状猶葱而甘辛上司農鬻菜髙宗時司農欲以冬藏餘菜賣之百姓以墨勅示僕射蘇良嗣良嗣判曰昔公儀休相魯拔去園葵况臨御萬邦而販蔬鬻菜事遂不行上鬻菜自潤王界為刑部尚書性貪恡不常在公乃鬻公廨菜園收其價錢以自潤甚為時論所醜上數杯盧懐慎日晏設食菜數杯上旦一蔬食李輔國矯制遷明皇於西宫帝戚戚不樂且一蔬食山谷多薺髙力士逐於巫山山谷多薺而人不之食因為詩寄意兩京作斤賣五溪無人採夷夏雖有殊氣味終不改明皇雜録中書園蔬中書園蔬日給於衆官者主事白常衮减其數崔祐甫怒訶主事主事曰此相公之命祐甫太詬曰門下侍郎安得理中書之蔬叱左右棓主事而拽之自是與常衮不平唐書三宫冬菜貞元七年冬司農卿李謨免官初司農當供三宫冬菜二千車以度支給車直稍錢又阻雨菜敗謨以度支為辭上責其不先聞故免之先是模奏司農菜不足請京兆府市之尹薛珏萬年令􅅊彤乃禁人私賣上命奪珏俸一月彤俸三月上園蔬自閱貞元中奚陟為中書舎人以所得雜給均分省内官又躬親庶務下至園蔬皆悉自㸃閱人以為難而陟處之無倦上掇蔬供御渾瑊帝狩奉天朱泚兵薄城人心危惴或夜縋出掇蔬本以供御上啖肉可繼裴休有饋鹿者諸生共薦之休不食曰疏食猶不足今一啖肉後何以繼上半堂食呉初朝中大臣多蔬食月為十齋齋之明日太官具晚膳始復常珍謂之半堂食至是果盡割淮南之地去唐土封疆之半九國志交菜根汪信民嘗言人常咬得菜根則百事可做胡康侯聞之擊節嘆賞門見錄孟娘菜江淮有孟娘菜並益肉食酉陽雜爼生菜不食殺君之室雖生􅅅菜有義之士弗食尚書大傳古叛逆之國潴其宫室以為汗池名曰丘墟雖生菜而民不食漢張疎奏紫菜吳郡邉海諸山悉生紫菜魏王花木志葅檝葅荆揚州人謂葅為檝古今注盗菜轉身徐孝隷性仁孝嘗在園中晝卧見人盗菜徐徐轉身向裏恐偷者見之仁孝退讓皆此類也大業拾遺悉成荷花菜品中蕪菁菘芥之類遇旱其標多結成花或如蓮花或作龍蛇之形此常性無足怪者熈寜中李賔客及之知潤州園中菜花悉成荷花仍各有一佛坐于花中形如雕刻莫知其數暴乾之其相依然或云李氏之家奉佛甚謹故有此異韭豐本韭曰豊本曲禮韭根韭根曰荄通俗文霍山爾雅曰霍山韭註説文云菜名一種而乆者故謂之韭象形在一之上一地也生山中者名藿韓詩云六月食鬰及藿是也一種乆生青韭華韭菜一種乆而生也象形在地上也説文堯韭舜榮聖王之世功濟天下者堯也天星降精于庭為韭感而為菖蒲焉典術金鹽玉豉堯韭舜榮梁太子賫河南菜啓云堯韭未儔􅁎歜非喻梁元帝𤣥覧賦沃韭市處者僕妾膾灸而食市饒也壅泉沃韭纎屨之士從兄弟室父徃而不得粗糒焉非愛其僕妾惡其室父也此其饒羡之與不足也魯連子灌韭衛有一夫負缶入井灌韭終日一區鄧晳過教之曰有機重後輕前命曰桔槹終日訖九百區丈夫曰有智必有機心我非不知不欲為也説苑厭葱韭徐無鬼見武侯武侯曰先生居山林食芋票厭葱韭今老欲于酒肉之味耶無鬼曰君為萬乘之主以苦一國之民以養耳目鼻口夫神者不自許也夫神者好和而惡姦夫姦病也故勞之唯君所病之何也荘子畦韭龔遂為渤海太守勸民務農桑令口種一樹榆百本䪥五十本葱一畦韭漢書陳韭為􅅅成都王圍京邑城中無菜採陳韭芥以為􅅅晉書後畧𢷬韭雜麥石崇為客作豆粥咄嗟便辨每冬得韭䓑王愷每以此事為恨乃宻貨崇帳下問其所以荅云豆至難煑豫作熟末客來但作白粥以投之耳韭䓑是𢷬韭根雜以麥苗耳晋書剪韭温嶠㓕王敦先是童謡曰剪韭剪韭斷楊桞河東小子令我與子以為賊如韭栁尋得復生也上早韭周顒隠鐘山王儉謂曰卿在山中何所食荅曰赤菜白鹽緑葵紫蓼又問何者最佳曰春初早韭秋暮晚菘齊書二十七種庾杲之字景行為世租征虜功曹清貧自業食唯有韭葅􅊪韭生韭雜菜或戯之曰誰言庾即貧食鮭嘗有二十七種三韭言三九也上寒月韭芽北齊大上後宫無限衣皆珠玉一女嵗費萬金寒月盡食韭芽三國世畧赤韭西王母曰仙之次藥有八阮赤韭漢武内傳野韭交州平樂山多龍穴傍生野韭人徃乞者神許則風吹制分随偃而㧞不得過越不偃而㧞輙㐫也水為莧老韭為莧老􅀈為猿列子秦姚興及後周宣帝大象中葱皆化為韭説者以為戰伐之祥昜稽覧圖云政道得則隂物変為陽鄭康成注云若葱変為韭是也韭剪復生小民髪如韭剪復生頭如鷄割復鳴吏不必可畏後來必可輕柰何欲望致州厝乎三論韭不入園諸葛亮教張君嗣曰去婦不顧門荽韭不入園以婦人之性荽韭之情猶有所恥想忠壯者意何所之葱葱葱有四種曰冬葱漢葱胡葱茖葱又有一種樓葱亦冬葱類也江南人呼為龍角葱言其苖有八角故云耳凡葱皆能殺虫魚毒食品所不可缺也葱初生名葱針夏葱曰小冬葱曰大進食處末凡進食之禮葱㳿處末曲禮𤣥都綺葱西王母曰仙人上藥有𤣥都綺葱漢武内傳火生温氣召信臣為少府先是太官園種冬生葱韭菜葱覆以屋廡晝夜㸐火待温氣乃生信臣奏罷之漢書設葱食井丹信陽侯隂就使人要刼之丹至就故為設麥飯葱葉之食丹推去之曰以君侯能供甘㫖故來相過何其薄乎更置盛饌乃食後漢妻子葱菜孔奮字君魚為姑臧長時天下亂河西獨安前長居官數月輙致貲産奮在姑臧四嵗財物不増唯老母極膳妻子但食葱菜或嘲奮曰置脂膏中不能自潤東見漢記拔葱曹公既與先主語失言㑹天震雷先主曰賢人言迅雷風烈必変良有以也曹公亦悔失言使其窺之見其㧞葱公曰大耳公未覺也其夜先主急去華陽國志種葱免官十年有司奏太常謝澹遣四人還家種葱菜免官義熈起居注長流灌葱居洛陽城十里内有園菜欲以當課聽引其長流灌紫葱晋書葱虫害人石勒時石聦将叛佛圖澄戒勒曰今年葱中有虫害人百姓無食葱俄而聦走上葱化為韭姚興種葱皆化為韭其後兵戈日甚後秦書宣帝大象年左衛園中葱変作韭後周書販葱吕僧珍拜南兖州刺史從父兄子宏以販葱為業僧珍既至乃棄業求州官僧珍曰吾荷國重恩無以報効汝等自有常分豈可妄求叨越當速反葱肆耳梁書縮地新野趙真家園中所種葱未經抽㧞忽一日盡縮入地後經嵗餘貞之兄弟自相分散續搜神記葱䕘葱嶺在燉煌西八十里其山髙大上生葱故曰葱嶺也河源潜發其嶺分為二水一水西經休修國國在葱嶺中西河舊事休修國居葱嶺東其山多大葱郭義㳟廣志辛香天門山上有葱所種畦隴悉成行人㧞取者悉絶若請神而求即不㧞自出竒異辛香春秋元命苞菜之伯神仙消金玉漿法䓤者菜之伯雖臭而有用消金玉錫石也又以冬至日取葫蘆盛葱汁根茎埋干庭中到夏至發之盡為水以漬金玉銀青石各三分自消矣曝令乾如飴可休粮乆服神仙亦曰金漿也三洞要録盤盞葱盤盞葱趙魏間有之㡬如拄杖粗但盈尺耳淸異水晶葱金柑玉板笋銀杏水晶葱吉州土産也絶本末為君子擇葱薤則絶其本末少儀蒜菜蒜菜之美者雲夣之葷菜説文解毒孫炎云黄帝登蒚山遭蕕芋草毒将死得蒜乃嚙之觧毒乃收植之能殺䖝魚之毒攝諸腥羶氣葫又稱胡蒜陸法言切韻曰張騫使西域得大蒜胡荽則此物漢始有之以自胡中來故名胡蒜耳越王餘蒜越王餘蒜生南海水中如竹筭子長尺許白者似骨黒者如角古云越王曽於舟中作籌有餘者棄之水而生異苑蒜付從事李恂為充州刺史所種園小麥胡蒜悉付從事無所留東觀漢記江夏費遂字子竒為揚州刺丈悉出前刺史所種小麥胡蒜付從事謝承後漢書受蒜不食太原閔仲叔者代稱節士雖同黨之澡清自以弗及也同黨見其含蔌飲水遺之生蒜仲叔曰我欲省煩耳今更作煩耶受而不食後漢髙士傳豉蒜共筩平陵范氏南陽舊語曰前隧大夫范仲公鹽豉蒜顆共一筩言其亷儉也三輔决録顆當音魏顆之顆北土通呼為一段為一顆蒜是俗間常語耳故陳王崔鷂賦曰頭如蒜顆目似擘椒顔氏家訓蒜食惜餘袁子曰吾常與陳子息於鄴東門外見一老父方坐而食其子投之蒜食少有餘欲棄則惜欲持去則暑遂盡食於是太辛螫其腸胃兩目盡赤陳子笑之吾謂曰子之家中牛羊數千而不敢食天暑有􅀈死者而後食之病之子軀亦猶是也袁子正書供至尊蒜成都王頴奉惠帝還洛陽道中於客舎作食宫人持斗餘粳米飯以供至尊大蒜鹽豉到獲嘉市麄米飯瓦盂盛之天子噉兩盂燥蒜數株鹽豉而已晋四王起事種蒜得馬郄詵母病苦車及亡不欲車載乃養鷄種蒜得馬八匹輿棺至家王隠晋書欲蒜摇指豫章王大㑹賔僚張融食灸始畢人便去融欲求鹽蒜口終不言方摇食指半日乃息齊書設蒜顧食邵陵王使賊煞何智通後以計擒賊智通子敞之割肉炙食之即載出新亭四面火炙之燋熟敞之以車載錢設鹽蒜顧百姓食之撤一臠賞錢一千徒黨并食肉遂盡梁書持蒜報讎梁廬陵王蕭續在荆州時常遣從事量括民田南陽樂孟卿亦充一使公府舎人韋破虜發遣試勅失王本意及孟卿以數誤得罪破虜惶懼不敢引􅄽但誑孟卿云自當為公分雪無勞訴也數日之間遂斬於市孟卿號呌無由自陳唯語人以紙筆随殮死後少日破虜在􅵝上看牛忽見孟卿挈頭而入持一碗蒜虀與之破虜驚呼奔走不獲已而服之因而病未㡬乃卒寃報記蒜盡不住唐咸亨四年洛州司户唐望之冬集記至五品進止未出間僧有來覔初不相識延之共坐少項間曰貧道出家人得飲食亦少以公名故闇相記能設一頓編否司户欣然即處分買魚此僧云看有蒜否司户家人云蒜盡僧云蒜盡去也即起留之云蒜盡遣得買僧云蒜既盡不可更狂苦留不止司户果無疾暴亡廣五行記十子一株蒜茆蒜也俗語謂之小蒜胡國有蒜十子共為一株二蘀褁之名為胡蒜尤辛於小蒜俗人謂之大蒜古今注西戎潘尼鈞賦曰西戎之蒜南夷之姜大宛延篤與李文徳書曰五折張騫大宛之蒜五葷西方以大蒜小蒜興渠慈葱茖葱列為五葷以為熟之則發媱生噉増恚皆有損于性情故絶而不食道家五葷乃謂韭蒜芸䑓胡荽薤也無茖葱等尔雅翼葷而非辛阿魏是也辛而非葷薑芥是也是葷復是辛五辛是也梵網經云五辛者一葱二薤三韭四蒜五興渠翻譯名義釋慧日云僧徒多述五辛中興渠成云曇䑓胡荽或云阿魏唯净土集云土辛此土有四闕於興渠梵語稍訛正云形具餘國不見逥至于闐方得見也根麄如細蔓菁根而白其臭如蒜彼國人種取根食也于時冬天到彼不見枝葉薹荽非五辛所食無罪日親見為驗唐髙僧傳薤鴻薈薤似韭而無實雖辛而不葷五藏養生者服之可以安神養氣有赤白二種白者補而美赤者主金創不結子爾雅曰薤鴻薈本草衍義曰薤葉如金燈葉差狹而更光故古人言薤露者以其光滑難竚也説文曰薤菜山中者名蓻什草曰葝山薤也服薤且古言服薤者惟商時務光故列仙𫝊云務光剪薤以入清泠之淵今有薤葉篆𫝊者以為務光所作薤置屏前龎叅為南陽太守郡人任棠者有竒節隠居教授叅到先侯之棠不與言但以薤一本水一盂置户屏前抱孫見伏户下主簿白以為倨叅思其微矣良乆曰棠是欲曉太守也水者欲吾清也拔大本薤欲吾擊强宗也抱兒當户欲吾開門恤孤也於是歎息而還叅在職果在栁强助弱以惠政得人後漢不與不食李孚字子憲為諸生常種薤欲以成汁有求索不與一莖亦不自食時人謂之能行意魏畧掎蒸薤桓公座有恭軍掎蒸薤不時觧共食者又不助而掎終不食舉座皆笑世説噉薤留白蘇峻亂庾公南奔見陶侃侃雅相重及食庾噉薤因留白陶問用此何為庾云故可種侃嘆曰非惟風流兼有為政之實上菜芝夫物英華之美者莫如芝故蓮曰水芝芋曰土芝蜜曰衆口芝薤曰菜芝爾雅翼芥介鷄季郈之雞鬬季氏介其雞郈氏為之金距左昭二十五𢷬芥子播其羽也拾芥夏侯勝謂諸生曰士病不明經術經術茍明取青紫如拾地芥爾漢書芥死蓼虫蓼虫在蓼則生在芥則死非蓼仁而芥賊也本不可失也魏子種芥篇尹都尉書有種芥葵蓼韮葱諸篇劉尚别録芥壁生足唐孟館嘗入嶺表置芥菜置壁下忘食數日皆生四足有首尾能行走大如螳蝍但腰細身長嶺南物志髙五六尺南土芥髙者五六尺子如鷄卯廣州人以巨芥為醎􅉁埋地中有三十年者貴尚親賔以相餉遺上蔓菁變芥廣州地熱種麥則苗而不實北人将蔓菁子就彼種者出土即變為芥嶺表録異水蘇芥􅉁一名水蘇一名勞祖吳氏本草菜茹之美芥似菘而有毛味極辛辣其類甚多似菘者名青芥有紫芥莖葉皆紫作虀食之最美有白芥子麤大色白如梁米舊云從西戎來謂之白胡芥其餘南芥旋芥花芥石芥皆菜茹之美者尔雅翼葖蘆菔葖蘆萉爾雅釋曰紫花菘也俗呼温菘似蕪菁大根一名葖俗呼雹突一名蘆菔今謂之蘿蔔紫花菘温菘皆南人所呼吳人呼楚菘廣南人呼秦菘方言曰蕪菁紫者謂之蘆菔尔雅翼㧞根而食劉盆子在長安時掖庭中宫女猶有數百千人自更始敗後封閉殿内㧞庭中蘆菔根捕池魚而食之後漢鬻根張威陏文受禅遷青州刺史在州頗事産業遣家奴於人聞鬻菔其奴縁此侵擾百姓上深加譴責坐廢於家北史病無真藥理世不用賢猶治病無真藥當用人參反得蘿菔根正論解熱昔有婆羅門僧東來見食麥麺者云此大熱何以食之及見食中有蘿菔曰頼有此以觧之耳自此相𫝊食麺必食蘿菔尔雅翼葑蕪菁蕪菁亦作蔓菁塞北名九英一名湏一名薞蕪一名葑蓯禮坊記注云葑蔓菁也陳宋之間謂之葑陸璣云葑蕪菁幽州人謂之芥方言云蘴蕘蕪菁也陳楚謂之蘴齊魯謂之堯關西謂之蕪菁趙魏之部謂之大芥春食苗夏食心秋食莖冬食根菜之最益人者惟此耳多種可以備飢嵗菜美菜之美者具區之菁吕覽助食桓帝永興二年詔司隷曰湟水為災五榖不登令所傷郡國皆種蕪菁以助民食東觀漢記閉門種菁劉備歸曹公曹公使親近覘視諸将有賔客酒食者輙因事害之備時閉門将人種蕪菁公使人窺門即去備謂張飛曰吾豈種菜者乎曹公聞有疑意不可復留是夜輕馬而去吳催人種菘陸遜諸葛瑾攻襄陽遜遣親人韓扁賫表奉報扁還遇抄瑾聞之欲急去遜方催人種荳菘與諸将圍棋以示閑暇吳錄留飯設菘武陵王𦙍性清簡尚書令王儉詣𦙍𦙍留儉設飯盤中菘菜鮑魚而已儉重其真率為食菘魚盡歡而去齊書晩菘周顒清貧寡慾終日疏食雖有妻子獨處山舎甚機辨文惠太子問顒菜食何味最勝顒曰春初早韭秋末晩菘上盗菘為橋范元琰家貧唯以園疏為業嘗出行見人盗其菘菜元琰􅑈退走毋問其故具以状荅問盗者為誰荅曰向所以退畏其媿恥今啓其名願勿泄也于是母子秘之或有涉溝盗其笋者元琰伐木為橋以度之自是盗者大慚一鄉無復草竊梁書木盤菁葅孟卿為趙郡太守政尚寛和權豪無犯山中老人曽以㹠酒饋之信和顔接引殷勤勞問乃自出酒以鐡鐺温之素木盤菁蕪葅而已北史金釵股仲冬是月也菜結蕪菁葵等雜菜浸之並為醎葅有得其和者並作金釵色今南人作醎葅以糯米熬搗為末并研胡蔴汁和釀之石笮令熟葅既甜脆汁亦酸美呼其莖為金釵股醒酒所宜也荆楚嵗時記諸葛菜巂州界縁山野間有菜大葉而粗莖其根若大蘿蔔土人蒸煑其根葉而食之可以療飢名之謂諸葛菜云武侯南征用此菜蒔於山中以濟軍食亦猶廣都縣山櫪林謂之諸葛木也雲南記諸葛所止令兵士獨種蔓菁者取其絻出甲者生㗖一也葉舒可煑食二也乆居随以滋長三也棄去不惜四也囬則易尋而採之五也冬有根可斸食六也比諸蔬属其利不亦慱乎三蜀之人今呼蔓菁為諸葛菜江陵亦然劉賔客嘉話薺薺薺菜菜甚小自生園圃其實曰蒫爾雅云蒫薺實詩曰其甘如薺謂此菜之美也故以薺為薺菜也甘味薺以美冬水氣也薺甘味也乘於水氣故美者甘勝寒也薺之言濟所以濟大水也春秋繁露山谷多薺髙力士逐于巫山山谷多薺而人不之食因為詩寄意兩京作斤賣五溪無人採夷夏雖有殊氣味終不改明皇雜録艾刈薺薺觧小而引大了淺而伸深以牛刀割鷄長殳劉薺物論葵不樹葵桓公北伐山戎出冬葵布之天下桓公憂北郭民貧管子請禁去市三百步者不得樹葵菜此則亦有以相及也管子馬佚食葵魯監門女相從績中夜而泣其偶問其故曰宋桓司馬得罪於宋出於魯馬佚食吾園葵是嵗吾園人亡一年之利越攻吳諸侯畏其威魯徃獻女吾姉􅀈馬兄徃視之道畏而死由此觀之禍與福相及也韓詩外傳魯國失葵魯漆室有女過時未適人倚柱而哭隣婦謂曰何哭之悲也欲嫁乎女曰吾憂魯君老而太子少也婦曰此魯大夫憂焉女曰昔有晋客舎吾家繫馬於園馬佚踐吾園葵使吾終嵗不厭葵未隣女奔亡倩吾兄追霧出以求溺流而死使吾終身無兄吾聞河潤九里漸如三百步今魯國微弱禍将及人三年魯果亂列女傳葵能衞足齊慶克通於聲孟子鮑牽見之告國武子武子召慶克謂之夫人訴之乃則鮑牽仲尼曰趙荘子之智不如葵葵猶能衛其足左成下食茹拔葵公儀休為魯相食茹而美拔去園葵也史記賣葵虧體江統上天子書曰今西園賣葵菜藍子鷄麫之属虧敗國體貶損令門晉書書葵得偷彭城王攸字子深少孤獨種葵三畆數被人盗之攸宻令人書葵葉下明旦市中看之遂得偷者北齊冬得生葵丁次都不知何許人也為遼東丁氏作人丁氏嘗使買葵冬得生葵問冬何得有葵云從日南買來列仙傳傾葵聖人之於道猶葵之於日雖不能終始哉其鄉之者誠也淮南若葵藿之傾葉太陽雖不為之逥光終向之者誠也選曹子建求通親親表蘬廣雅曰蘬葵也注丘軌切齊民要術云蘬丘葵也疑誤胡葵廣志曰其花紫赤冬葵陶隠居曰似秋種葵覆養經冬至春作子謂之冬葵本草圖經云苗葉作菜茹更甘美蜀葵爾雅所謂菺戎葵者也郭璞云如木㨷華戎蜀蓋其所自因以名之花有五色有紅者又號一丈紅錦葵錦葵花小葉圓終葵終葵一名落葵一名天葵一名繁露一名承露一名藤葵爾雅所謂蔠葵蘩露是也郭璞云大莖小葉紫黄色陶隠居云人家多種之葉惟可􅔻鮓子紫色女人以漬粉𫝊面為假色俗呼為胡燕脂蜀本圖經云蔓生葉圓厚如杏葉子如五味子生青熟黒所在有之食療云其子令人面鮮華可愛取蒸烈日中曝乾挼去皮取仁細研和白宻𫝊之甚驗落葵人食落葵為向所齧作瘡則不瘥或至死𫝊物志龍葵本草唐本註云即關河間謂之苦菜者葉圓花白子若牛李子生青熟黒旦堪煑食不任生噉孟詵云其味苦挼去汁食之食醫心䭗云龍葵作􅅅粥食之並得圖經云惟北方有之北人謂之苦葵葉圓似排風而無毛莬葵爾雅曰莃莬葵郭璞註云頗似葵而小葉状如藜有毛汋啖之滑廣志云免葵淪之可食本草唐本註云苗如龍苪葉光澤花白似梅莖紫色煑汁極滑堪食劉禹錫所謂動摇春風者也荆葵荆葵一名芘芣爾雅曰荍蚍衃是也郭璞註云似葵紫色陸璣云似蕪菁華紫緑色可食微苦錢葵錢葵叢低又一種千葉可愛鳬葵馬融𫝊曰桂荏鳬葵葉圓似蓴生水中一名水葵蒲葵蒲葵可食葉似葵而大中作扇謝安取蒲葵扇中者捉之是也露葵顔氏家訓云蔡朗父諱純遂呼蓴菜為露葵王維詩云松下清齋折露葵意謂帶露之葵不指蓴菜蓋蓴菜非輞川所有宋玉諷賦云烹露葵之􅅅曹植七啓云霜蓄露葵語並在蔡朗前亦不指蓴菜楚葵楚葵即水中芹菜澤葵澤葵即莓苔鮑昭蕪城賦澤葵依井是也鴨脚葵今世葵有紫莖白莖二種種别復有大小之殊又有鴨脚葵也齊民要術别有鴨脚肫耳鮑明逺葵賦冬葵崔寔曰六月六日可種葵中伏後可種冬葵九月作葵菹乾葵家政法曰正月種葵上陶隠居云以種種葵覆養經冬至春作子謂之冬葵本草陳葵陳葵子微火炒令爆叱散着熟地中遍踏之朝種暮生逺不過宿陳葵子秋種覆蓋令經冬不死至春有子是也􅀶物志百菜主葵葉為百菜主其心傷人俗呼為西王母菜食之益人本草占牛馬黄帝問師曠曰欲知何牛馬貴賤秋葵下小葵生牛馬貴大葵不䖝牛馬賤師曠占摘葵古者葵稱露葵又終葵一名繁露今摘葵必待露解語曰觸露不搯葵日中不剪韭各有宜也爾雅翼潘岳閑居賦曰緑葵含露白薤負霜夢城生葵符堅将欲南師夣葵生城内明以問婦婦曰若征軍逺出難為将也異苑蓴蓴字本作蒓水葵也圖經云蓴乃菜之上味生水中葉似鳬葵三月至八月莖細如釵股短長随水淺深名蓴絲味甘而體軟霜降後萌在泥中粗短名瑰黄味苦而體澁又有石蓴似紫菜青色蓴龜蓴菜之根絶美江東人謂之蓴龜酉陽雜俎雉尾蓴四月蓴生莖而未葉名為雉尾蓴五月蓴葉舒長名絲蓴入七八月不中食有蝸蟲故也又至十月氷凍蟲死雖老猶可食雞跖集思蓴張翰晋惠朝齊王冏辟為東曹掾謂顧榮曰吾本山林間人無望于時子善以明防前以知慮後榮曰吾亦與子采南山蕨飲三江水耳翰因見秋風起乃思吳中菰菜蓴􅅅鱸魚膾嘆曰人生貴得適志耳何能覊宦數千里以要名爵乎遂命駕而歸晋書千里蓴􅅅陸機請王武子武子前置數斛羊酪指以示陸曰卿江東何以敵此陸云有千里蓴􅅅但未下鹽豉耳世説齊髙帝設蓴膾崔祖思曰此味故為南北所推沈文季曰千里蓴􅅅豈關魯衛然則千里蓋吳中地名前人以比末下鹽豉皆地名無疑也㝢簡世説新語陸機云云鹽豉耳觀但耳二字語意自眀魯三異乃謂末字誤書為未而以末下為地名欲與千里對言是未嘗閱世説新語也墅談斷蓴陶子鏘母嗜蓴母没終不味蓴客須蓴鱧丹陽張承先家有鬼長為取他物㑹有客湏蓴二斗鱧魚二十頭鬼将一小兒置驃騎令小兒睡眼覺看藍中已有魚鱧集異記獺船載蓴河東常醜奴泛湖邉㧞蒲暮宿空舎時日暮見一女姿容極美乘船載蓴至舎寄住變而為獺幽明録採蓴供食沈顗字處黙逢兵荒與家人并日而食或有餽其梁肉者閉門不受惟採蓴菜供食以樵採自資南齊呼為露葵梁世有蔡朗父諱蓴既不涉學遂呼蓴為露葵面墻之徒逓相倣效承聖中遣一士大夫聘齊齊主各即李恕問梁使曰江南有露葵否荅曰露葵是蓴江南所出卿今食者緑葵菜耳頗氏家訓蘘荷香脆急就章云老菁蘘荷冬日藏顔師古注蘘荷一名蓴苴莖葉似薑其根香而脆可以為葅又辟蠱毒嘉草本草云葉似初生甘蕉根似薑芽性好隂在木下生者尤美中蠱者服其汁卧其葉即呼蠱主姓名周禮庶氏以嘉草除蠱毒宗懍謂嘉草即此也桞子厚種白蘘荷詩庶氏有嘉草攻檜事乆冺注引本草隂地種蘘荷似葍苴而白葍苴色紫花生根中花未敗時可食乆置則銷爛不為實矣葉似姜宜隂翳地種之古今注蘘荷宜隂時藿向陽潘安仁閑居賦葍蒩説文一名葍蒩古今注紫者曰葍蒩白者曰蘘荷解毒用白蘘荷陶隠居葍作覆攻蠱蒋士有傭客得疾下血醫以中蠱乃宻以蘘荷根布席下不使知乃狂言曰食我蠱者乃張小人也乃呼小小亡去今世攻蠱多用蘘荷根徃徃驗蘘荷或謂嘉草搜神記人得蠱取蘘荷葉着卧席下不使知立呼蠱姓名葛洪方花似美蓉馬融廣成頌芝荋堇荳蘘荷􅇗渠章懐注曰蘘荷苗似薑根花紅紫似美蓉可食其葉似初生甘䉀根似薑芽其葉冬枯其根為菹亦可醤中藏古之為味者雜用膾炙切蘘荷以為香是為珍味爾雅翼預知子預知子傳云取二枚綴衣領上遇蠱毒物則聞其有聲當便知之故名預知子上落蘇美茄也錢王有子跛足以聲相近故止呼落蘇酉陽紫茄常餌蔡樽為吳興太守不飲郡井水齋前自種白莧紫茄以為常餌詔褒其清加信武将軍梁書崑崙紫苽四年改胡床為交牀改胡𤓰為白露苽改茄子為崑崙紫苽大業拾遺録樹髙二丈南土無霜雪生物不復凋枯種茄子十年不死生子皆攀緣摘之樹髙至二丈嶺南異物志梯樹摘南中草菜經冬不衰故蔬園之中栽種茄子宿根有二三年漸長枝翰乃為大樹毎夏秋熟則梯樹摘之三年後樹漸老子稀即伐去别栽嫩者嶺表録異茄子故事茄子本蓮莖名革遐反今呼伽未知所自成式因就節下食有茄子數蔕偶問張周封故事張去一名落蘇事具本草成式記得隠侯行園詩云寒𤓰方卧隴秋菰正滿陂紫茄紛爛漫緑芋鬰參差嶺南茄子宿根成樹髙五六尺姚向曽為南選使親見之酉陽雜俎茄子浦水經云石頭西對蔡浦浦長百里上有大荻浦下有茄子浦上子大如𤓰蘇門荅剌國有大茄樹髙丈餘經三四年不瘁子大如西𤓰重十餘斤人以梯摘之志薑禦濕姜禦濕之菜也援神契説文璇星散璇星散為姜風土失得逆時則姜有翼辛而不臭也春秋運斗樞辛不因地宋玉因其友見楚相待之無以無以異讓其友其友曰夫妻桂因地而生不因地而辛女因媒而嫁不因媒而親韓詩外傳楊樸和之美者楊樸之姜招摇之桂越駱之菌吕鑒蜀薑孫權嘗使介象作變化種菜𤓰百菓皆立生可食先主論鱠魚何者㝡美象曰鯔魚為上先主曰論近道魚耳此出海口安可得乎象曰可得耳乃令人於殿庭中作方坑汲水滿之并求釣象餌之埀綸於坑中不過項刻得鯔魚先主大驚喜問象曰可食否象曰故為陛下取安敢取不可食之物乃使厨下切之先主曰聞蜀薑作虀至佳此間薑永不及也恨此時無此薑爾象曰蜀薑豈不易得願差所使行者并付以直象自書一符以青竹丈使行人閉目騎杖杖止便買薑買薑畢復閉目此人承其言騎杖須臾已到成都不知是何處問人人言是蜀市乃買薑于時吳使張温市見之問曰與帝買薑於是甚驚作書寄象此人買薑畢捉書騎竹扙閉目復須臾已還吳厨切膾亦適了也神仙傳付信得薑即中喬翻於洋渚遇神人意欲啖薑而市無之神人以絹數疋并書一牒付信入市門南下任意所之須臾得薑數斗還以問神人神人曰問李先生當知我李先生傳煞薑伏波将軍唐資傳蜀人煞薑法先洒掃别麄細為三軰盛着籠中作沸湯沒籠着湯中湏臾取一片横截斷視其熱否薑既熱訖便内着甖中細𢷬米末以覆上令薑不見訖以向湯令復沸使相掩消息視甖中當自沸沸便隂乾之􅀶物志罷郡獻薑孔秀之為臨川太守在任清約罷郡還獻乾薑二斤武帝嫌其少知琇之清乃嘆息齊書未嘗食薑周捨占對辨捷嘗居直廬語及嗜好裴子野言從來未嘗食薑捨應聲曰孔稱不撤裴乃不嘗一座皆悦梁書解毒唐崔鉉暴亡梁新聞之診之曰食毒僕曰常好食竹雞多食半夏苗必是半夏毒命生薑捩汁灌之即活千畦萬家之城千畦薑韭其人與千户侯等史不知滋味倭國有薑不知其滋味魏志姙娠不啖姙娠者不可啖生薑令兒盈指博物志匏苦葉匏有苦葉匏瓠也葉小可為􅅅揚州人恒食至八月葉即苦故云苦葉陸機毛詩疏義苦匏共濟諸侯伐秦及涇莫濟叔向見叔孫穆子穆子曰豹之業及匏有苦葉矣不知其它叔向召舟虞與司馬曰夫苦匏不材與人共濟而已是行也魯人以莒人先濟諸侯從之魯語瓠落惠子曰魏王貽我大瓠之種我樹之成而實五石以盛水漿其堅不能自舉剖之以為瓢則瓠落無所容非不大也吾為其無用而剖之荘子曰夫子固拙於用大也荘子貽瓠􅅅魏文侯見箕季牆壊不治問其故曰不時又逢瓠􅅅文侯曰牆壊不築教民無奪民農功貽我瓠􅅅教我無多歛百姓新序繋狗頸杜預病癭呉人惮其智計以瓠繫狗之頸毎大樹以癭輙研使白題曰杜預頸及城平盡捕殺之晋書甘瓠脯祖逖在河南百姓感悦嘗置酒大㑹耆老中坐流涕曰吾等老矣更得父母死将何恨乃歌曰幸哉遺黎免俘虜三辰既朗遇慈父𤣥酒忘勞甘瓠脯何以詠恩歌且舞其得人心如此上求飲留瓠徐文伯曽祖熈好黄老隠於秦望山有過求飲留一瓠瓢與之曰君子孫宜以道術救世當得二千石熈開之乃扁鵲醫經一卷宋書大瓠為籠卞彬性好飲酒瓠臺瓠勺炕皮為肴着帛冠十二年不改易以大瓠為籠什物多諸詭異自號卜田居齊書瓠破子苦强練師不知何許人所至之處人皆敬而信之晋公護未誅之前曽手持一大瓠到護門外扺而破之乃大言曰瓠破子苦未㡬而護誅諸子並伏法後周書垂瓠城今豫州汝南郡城西北汝水左出西北流又屈而東轉又西南㑹汝形若垂瓠耆老云城取名焉水經刃磨瓠傷干将之刃未磨𤓰瓠不能傷論衡華名實少婦人疎孕者子活乳數者子死譬若瓠華多實少上燒穰殺瓠燒穰殺瓠俗説家人燒黍穰則使田中瓠苦死也風俗通用汁朱崖澹耳無水唯種大瓠藤斷其汁用之亦足太康地記不備國貧一年之計莫若樹榖十年之計莫若樹木終身之計莫若樹人𤓰瓠葷菜不備國之貧也管子牛踐子苦匏瓠牛踐苗則子苦草木子匏可為笙匏瓠也壺盧匏之無柄者也瓠有柄曰懸匏可為笙曲沃者尤善秋乃可用用則漆其裏古今注中流千金賤生於無所用中流失舡一壼千金壺即匏也鶡冠子壺盧外澤内麄張裔字君嗣如瓠壺外雖澤而内實麄蜀志瓠盧有月齊武成帝皇后胡氏安定人魏中書令兖州刺史延之女也母盧氏范陽道約女也初懐孕有胡僧來諸門曰此宅瓠盧中有月既而生后三國典畧長柄壺盧陸士衡初入洛諮張公所宜曰詣劉道真是其一既徃劉尚哀制中性耆酒禮畢初無他言唯問東吳有長柄壺盧卿得種來否陸兄弟殊入望乃云悔去世説胡盧笙胡盧笙交阯人多取無柄之瓠割而為笙上安十三黄吹之音韻清響雅合律吕嶺表録異芹獻芹宋國有田夫常衣緼黂自曝於日顧謂其妻曰負日之暄人莫知者以獻吾君将有重賞里之富室告之曰昔人有美戎菽甘枲莖芹萍子者對鄉豪稱之鄉豪取而嘗之蜇於口慘於腹衆哂而怨之其人大慙子此類也列子野人美芹願獻之至尊吕子覽荇脆美爾雅莕接余其葉苻陸璣云白莖葉紫亦色正圓徑寸餘浮在水上根在水底與水澡淺等大如釵股上青下白鬻其白莖以苦酒浸之脆美可案酒顔之推云荇先儒解釋皆云水草圓葉細莖随水淺深今是水悉有之黄花似蓴江南俗亦呼為猪蓴或呼為荇菜而河北俗人多不識之慱士皆以參差者是莧菜呼人莧為人荇亦可笑矣胡荽胡荽胡荽曰胡井州人呼為香荽為石勒諱也撤葫荽冲晦處士李退夫者為事矯怪居京師北郊一日種葫荽俗傳主人口誦猥語則茂退夫撤薑宻誦曰夫婦之道人倫之正時不絶于口忽有客至命其子畢之子執餘種曰大人已曽上聞皇祐中館閣中或談論則曰宜撒葫荽一巡江南野録蕨蕨蕨一名􅣀莾牙也四皓食之而夀夷齊食之而夭搜神記曰郗鑒鎮丹徒二月出獵有甲士折一枝食之􅁴心中淡淡成病後吐一小蛇垂之屋前漸成乾蕨此物不可生食草木疏曰周秦曰蕨齊魯曰􅣀薇薇薇生水傍葉如萍爾雅云薇埀水三秦記夷齊食之三年顔色不變武王戒之乃不食而死然詩云采薇者乃金櫻芽也紫菜紫菜吳郡縁海記曰郡中海邉諸山悉生紫菜吳賦云綸組紫綘是也注紫紫菜也生海水中正青附石生取乾之則紫色臨海常獻之苦買苦買義熈二年有苦買菜生揚州營士陳蓋家莖髙四尺六寸廣二尺二寸是後嵗多征伐人民疾苦故苦買者買苦也晋書安帝記唐景龍二年郿縣民王上賔家有苦買菜髙三尺餘上廣尺餘厚二分真珠船近長沙地名白鶴樓民家圃内有苦買菜開蓮花七日方謝鬼目似梅飲酒鬼目似梅南人以飲酒廣志柔嘉鬼目樹大者如李小者如鴨子二月花色仍蓮著實七八月熟其色黄味酸以宻煑之滋味柔嘉交趾武平興古九真有之也南方草物状為漿鬼目益知直尔不可噉可為漿也裴淵廣州記味酢鬼目樹似棠梨葉葉如楮皮白樹髙大如木𤓰而小耶傾不周正味酢九月熟又有草昧子亦如之亦可為糝用其草似鬼目王㣲廣州記鹿角猴葵色赤生石上南越謂之鹿角南越志羅勒步廊山有一樹如桃而氣是羅土人謂為山羅勒也遊名山志葙葙根以為菹香辛廣志優殿合浦有菜名優殿以豆醤汁茹食之甚香美可食南方草木状雍雍菜生水中可以為菹也廣州記冬風東風菜陸生置肥肉作􅅅味如酪香氣似馬蘭上糓字林曰糓菜生水中蔊菜音䍐味辛䔇胡對反吕氏春秋曰菜之美者有雲夣之荳荶似蒜生水中菹菜紫色有藤萴菜葉似竹生水傍􅀢菜繤菜似蕨􅀢菜似蕨生水中葟菜似蕨生水邉䕭菜徐鹽反似䓠荃菜也一曰深草蓶菜音唯以烏韭而黄䓠菜他合反生水中􅘂菜根似芋可食又云署預别名羞菜安南有羞菜蔓生水上甘美可食人過池中以手指尔羞否即時憔悴羞色待其人去漸青如初遂詩云言採其遂毛云惡菜也詩義疏曰今羊蹄似蘆菔菳赤煑如茹滑而不美多噉令人下痢齒陽謂之遂一名蓚齊民要術睡菜睡菜五六月生田塘中葉類茨菰根如藕梢土人採根為鹽葅或云食之好睡六合葵憲宗時有處士伊栁𤣥解縝髪童顔氣息香潔帝知其異人遂令宻詔入宫内舘於九華之室毎日親自訪問頗加敬仰因問之曰先生春秋髙而顔色不老何也𤣥解曰臣家于海上種靈草食之故得然也即於衣間出三等藥實為帝種於殿前一曰雙麟芝二曰六合葵三曰萬根藤六合葵色紅而葉類於莪葵始生六莖其上合為一株其生十二葉内出二十四花花如桃花而一朶千葉一葉六影其成實如相思子蘇爾雅曰蘇桂荏也方言曰周鄭之間謂之公􅀢湘沅之間謂之􅀢蘇之小者謂之薫葇蓼長沙定王故宫有蓼園云定王故園也菜之辛者謂之蓼任昉述異記組綸吳都賦云綸組紫菜爾雅注云綸似綸組似組綸乃有秩嗇夫所帶紏青絲綸揚子所謂五兩之綸半通之銅者也組綬也海中草生采理有象之者因以名焉蘋苹䓑其大者蘋葉正四方中折如十字根生水底葉敷水上不若小浮萍之無根而漂浮也故韓詩曰沈者曰蘋浮者曰薸薸音瓢即小萍也蘋亦不沈但比萍則有根不浮游爾五月有花白色故謂之白蘋吕氏春秋曰菜之美者崑崙之蘋萍焉陸璣詩莪疏曰可糁蒸為茹爾雅翼鹽鹽池鹽醎也鹽池河東鹽池袤五十里廣六十周一百四十里鹵西方鹹也東方謂之斥西方謂之鹵醝醎也河内謂之鹹説文䴛􅀈􅀈􅴴鹽也廣雅大夏鹽和之美者大夏之鹽吕覽虎形僖三十年冬王使周公閱來䏂饗有昌歜白黒形鹽辭曰國君文足昭也武可畏也則有備物之饗以象其徳薦五味羞嘉糓鹽虎形以獻其功吾何以堪之左守圉齊有渠展之鹽燕有遼東之煑十口之家十人䑛鹽百口之家百人䑛鹽凡食鹽之數一月丈夫五升少半婦人三升少半嬰兒二升少半鹽之重升加分耗而釡百升加十耗而釡千君伐葅薪煑泲水為鹽正而積之三萬鍾至陽春農事方作令民無得築垣牆毋得繕冢墓丈夫毋得治宫室立臺榭北海之衆無得聚庸而煑鹽然鹽之賈必四什倍君以四十之賈循河濟之流南輸梁趙宋衛濮陽􅁖食無鹽則腫守圉之本其用鹽獨重君伐葅薪煑泲水以籍於天下然則天下不减矣管子糴鹽桓公成鹽三萬六千鍾令使糴之得成金萬一千餘斤上桓公通齊國之魚鹽于東萊國語載鹽秦穆公使賈人載鹽百里奚使将車世説宿沙煑宿沙瞿子善煑鹽使煑滔沙雖十宿沙不能得也魯連子宿沙作煑鹽世本宿沙衛齊靈公臣齊濵海故衛為魚鹽之利宋志魚鹽之地張儀説趙王曰今日楚與秦為兄弟之國而韓魏稱為藩臣齊獻魚鹽之地斷趙之右臂春秋後語穿井煑鹽宣帝地節中始穿井數十所煑鹽蜀王本紀牢盆募民月給費用官器作煑鹽官牢盆史記海水為鹽吳東海水為鹽國用饒足漢書盗起獨完賈復為縣掾迎鹽河東㑹盗賊起等軰放欺其鹽復獨完還致縣中東觀漢記河東載鹽第五倫自以乆為官不逹遂将家属客河東變姓名自稱王伯齊載鹽徃來又太原上黨所過輙為糞除而去後漢道州所開陵州井乃東漢張道陵所開曰狼毒井有毒龍藏井中及鹽神玉女二十為崇天師以道力驅出毒龍禁玉女于井下然後人獲鹽泉之利郡志國之大寶衛凱與荀彧書曰夫鹽國之大寶也自亂以來放散宜如舊置使者監賣以其直盗市犁牛若有歸民以供給之魏志賜鹽周䘮朱桓卒家無餘財孫權賜鹽五千斛以周䘮事吳志府尉主鹽先主定益州置鹽府尉主鹽鉄之利蜀志食餅知鹽生衛倫以即應㑹于京師過予而論及于味倫稱魏故侍中劉子揚食餅知鹽生精味之至也予曰昔師曠織勞薪易牙别淄澠子揚之妙抑未乎倫曰晋師曠易牙古之精也魏之子揚今之妙也予何間焉皇甫諡𤣥晏春秋味鹽生晋符朗元逹識味㑹稽王道子設食食之極江左精饌食記問曰關内食熟若此朗曰皆好惟鹽味少生即問宰夫果如其言襄景春秦書􅐙鹽自供郭文子文舉隠居吳興無餘杭大辟山中桓著鹿裘葛巾不飲酒食肉區種菽麥採草葉木實􅐙鹽以自供人或酧下價者亦即與之晋書求鹽摇指豫章王大㑹賔僚張融食炙始行畢行炙人便去融欲求鹽蒜口終不言方食摇指半日乃息宋書䘮不食鹽崔慰祖父䘮不食鹽母曰汝既無兄弟又未有子息毁不㓕性故當不進肴羞耳如何去鹽吾今亦不食矣慰祖不得已從之齊書九種世祖南伐遣李孝伯賜劉義㳟等鹽各九種并胡皷季孝伯曰有後詔凡此諸鹽各有所宜白鹽食鹽主上自所食黒鹽治腹脹氣刮取末之六銖以酒下胡鹽治目痛戎鹽治諸瘡赤鹽駮鹽臰鹽馬齒鹽四種非食鹽後魏書鹽數十斛沮渠蒙遜平酒泉於宋繇室徳書數千卷鹽米數十斛而已蒙遜嘆曰孤不喜尅李氏欣得宋繇耳揾鹽大鹹侯景䧟臺城晏集其黨又召僧道取肉揾鹽以進景問曰好不景荅所根大鹹僧通曰不鹹則爛及景死王僧辨截其二乎送齊宣又傳首徃江陵果以鹽五斛置腹中送于建康暴之于市百姓争取屠膾􅅅食皆盡梁書竈官崔暹奏請海沂煑鹽有利軍國文襄以問崔昻昻曰亦既官煑斷之竈官力雖多不及人廣諸淮開市薄為竈稅私館給彼此有宜朝廷從之北齊不食水病房景伯母亡居䘮不食鹽菜因此遂為水病積年不愈上状如方印武徳中長安古城鹽渠水生鹽色紅白味甘状如方印唐書廢井生鹽左右神䇿鹽州行營節度使胡鹽昌皆表奏初城鹽州鹵中獲壤土又置烽堡水路逥逺即時有酒廢鹽井悉生鹽事符聖徳可謂天讃請宣付史館制可正鹽官灋劉晏正鹽官灋以禆用度地産瑞鹽韓滉判度支方是時潦敗河中鹽滉奏地産瑞鹽此土徳之瑞帝疑遣諌議大夫蒋鎮廉状鎮畏滉還乃賀帝且請置祠號寶應靈慶池官自鬻鹽韋處厚再遷中書舎人張平叔以言利得幸以帝建言官自鬻鹽寵天下之財宰相不能詰下群臣議處厚發下難誚其迂謬平叔愧縮遂􅃦三萬斛劉晏京師鹽暴貴詔取三萬斛以膽關中自揚州四旬至都人以為神官無遺利初摧鹽起於第五琦及劉晏伐其任法術精宻官無遺利初嵗入錢六十萬貫李嵗十倍而人無厭苦大厯末通計一嵗征賦所入而鹽醝當天下大半之賦致鹽靈座李晟既薨城鹽州復故池以新鹽賜宰相帝思晟乃致鹽靈座佐軍食王仲榮中人田令孜怒重榮據鹽池之饒于時巨冦甫定國用大乏諸軍無所仰而令孜為神䇿軍使建言請二池領属鹽鐡佐軍食重榮不許奏言故事嵗輸鹽三千乘于有司則斤所餘以贍軍天子遣使者輸㫖不聽蛤垜鹽池李師古棣州有蛤垜鹽池嵗産鹽數十萬斛李長卿以州入朱滔獨蛤垜為李納所據以專利後徳棣入武王俊納乃築壘徳州南跨河以守蛤垜謂之三􅆜煑海取鹽鄭畋請以嶺南鹽鐡委廣州節度使韋荷嵗煑海取鹽四十萬緡市䖍吉米以贍安具舟以載杜中立以䕃為義武節度使舊傜車三千乘嵗輓鹽海瀕民苦之中立置飛雪将數百人具舟以載自是民以勞軍食足矣鹽屯姜師度為河中尹安邑鹽屯涸廢師度大發卒洫引其流置鹽屯公私收利不貲條上新法盧𢎞正初兩池鹽法弊得費不相償𢎞正使判官司空與檢鈎釐正條上新法即表與兩池使自是課入嵗倍用度頼之計口授鹽盧商為蘇州刺史吏以鹽法求羸貲民愈困商令計口授鹽無常額人便之㩁鹽司空與當大中時盧𢎞正管鹽鐡表為安邑兩池㩁鹽使先是法疏闊吏輕觸禁與為立約數十條莫不以為宜火井煑鹽臨卭火井諸葛亮徃視之後火益盛以盤貯水煑之則得鹽後人以火投井中火即㓕至今不然􅀶物志倒鹽江中姚彪至武昌遇風與沈浙渚守風粮盡用江遣人從彪貸鹽百斛彪得書不荅勑左右倒鹽百斛着江水中曰明吾不惜所與耳笑林顆白似玉髙昌國遣使貢鹽二顆顆大如斗状白似玉帝以其自萬里絶域而來献數年方逹命杰公迓之謂其使曰鹽一顆是南燒羊山月望収之者一是北燒羊山非月望収之者使者具陳鹽奉王急命故非時尔因問紫鹽䃜珀云自中路遭北涼所奪不敢言之帝問杰公曰群物之異對曰南燒羊山鹽文理粗北燒羊山鹽文理宻月望収之者明徹如氷以毡槖煑之可驗交河之間平磧中掘深數尺有末鹽如紅如紫色鮮味甘食之止痛更深一丈下有䃜珀黒逾純漆或大如車輪末而服之攻婦人小腸癓瘕諸疾彼國珎異必當致貢是以知之渠四公子記酸水如雨陵州鹽井隂氣襲人入者輙死侯雨入井則随雨施王後人以木盤貯水鑿竅酸水如雨㸃於井上筆談至華鹽胡中有鹽瑩澈如水晶謂之玉華鹽金樓于白鹽崖有鹽如水精謂之君王鹽酉陽雜俎盤中只有水晶鹽石子鹽河東有印成鹽西方石子鹽胡中青鹽五原紫鹽波斯之鹽也廣志五色鹽按鹽有赤鹽紫鹽黒鹽青鹽黄鹽亦有如虎如印如繖如石如水晶状者北户録北狄有青鹽五原有紫鹽𫝊物志天竺國有黒鹽續漢書西海南有青鹽紫鹽池鹽方寸半食味甚美西域記紅鹽恩州有鹽塲色如絳雪驗之即由煎時染成差可愛也五代于闐晋天福二年遣使來貢紅鹽桃花鹽鄭公䖍云琴湖池桃花鹽色如桃花随月盈縮在張掖西北鹽花山龍巢山旁有鹽池水色白上有紫菱四邉青泥十一月中池左右十餘里地草上如霜彌日不什嘗之乃鹽味世謂之鹽花山襄記石鹽天竺有水其名恒源一號新陶水特甘香下有石鹽状如石英白如水精味過香鹵萬國畢仰由州異物志傘子鹽蜀瞿灘有鹽井一百所巴川資以自給粒大者方寸中央隆起形如張傘名曰傘子鹽有不制者形亦必方異于常鹽矣晋書地道記云入湯口四十三里有石煑以為鹽石大者如升小者如拳煑之水竭鹽成水經注為枕髙昌國出赤鹽其味甚美復有白鹽其形如玉髙昌人取以為枕貢之中國後魏書鹽澤朔方縣有大鹽池其鹽大而青白名曰青鹽又曰戎鹽入藥用漢置典官魏土地記炭神李嗣昭守上黨為汴人所圍城中鹽炭盡嗣昭告天地俄而地生鹹取以煎鹽其美又復掘得石炭晋王自将解圍躬奠其地立二廟曰鹽神炭神海録嵗給萬三千石髙保融明宗時嵗給以鹽萬三千石後不復給及世宗平淮故命奉州給之南平世家鹽池減水宋真宗祥符間解州鹽池减水帝遣使持詔至州祈禱使至夜夣城隍告曰鹽池涸者患在主鹽池之神蚩尤也昔蚩尤與軒轅帝争戰帝殺之至今遺跡尚存聞朝廷創立祖殿蚩尤懐讐故竭鹽池耳使者聞神語覺囬奏於帝既而蚩尤數數搆患形諸夣寐群臣具奏遣使信州龍虎山語天師至闕下舉英勇一将制之天師奉㫖召來即蜀關将軍乃真君也召至現形帝故喻之乃命徃解州勦除􅃖尤鹽池如故帝遣王欽若賫詔至王泉山致享祠下以謝神貺復新其廟賜額曰義勇武安王徽宗朝加封崇寜至道真君吳郡關柌宋刻穴湧鹽訶陵最富有穴自湧鹽鹽田鄯善之東龍城之西南地廣十里皆為鹽曰行人所經牛馬皆布氈卧焉酉陽龍城累棊姜頼之墟今稱龍城恒溪無道以感庭上帝赫怒溢海盪傾剛鹵千里蒺䔧之形其下有鹽累棊而生涼州異物志三色鹽山二岳三色為質者者如丹黒者如漆小大從意鏤之冩物作獸辟惡佩之為吉戎鹽可以療疾上鹹石汶山越雋煑鹽法各異汶山有鹹石先以水潰既而煎之越雋先燒炭以鹽井水沷炭刮取鹽益州記北海南海之貝北海之鹽尸子清池鹽有清池鹽正四方廣半寸其形扶踈似有人耕池旁地取池水波種之去勿逥頋即生此鹽金樓子石鹽漲海州有湾中常出自白鹽嶧嶧如灣細石子天竺國有新陶水水甘美下有石鹽白如水精南州異物志郇瑕延篤與季文徳書云晋國郇瑕氏之鹽江夏崔駰慱徒論云江夏之鹽鹽生於水鹽體因於水故或水但于水故或與土雜産于地多則于海濵但未必千里相此耳煑鹽與海同河東有印成鹽而方有石水鹽皆生於水北胡中有青鹽五原有紫鹽波斯國有白鹽如細石子廣志百事之鹽鹽人掌鹽之政令以共百事之鹽祭祀共其苦鹽散鹽賔客共其形鹽散鹽王之膳羞共餄鹽后及世子亦如之凡齊事鬻鹽以待戒令周礼油煎油無煙煎油水氣盡無煙不復沸則還冷得水而燄起飛散慱物志從風灌炬孫權至合肥新城滿寵馳徃赴募壮士數十人折松為炬灌以麻油從上風放火燒殘攻具魏志多持油炬黄初三年車駕幸宛使夏侯尚率諸軍與曹真共圍江陵權将諸葛瑾與尚軍對江權度入江中渚而分水軍於江中尚夜多持油船将步騎萬餘人於下流潜渡攻瑾諸軍夾江燒其舟船水陸並攻破之上麻膏火燃元康三年武庫火檢校是工匠盗庫中恐罪乃投燭着麻膏中火燃王隠晋書儲油縱火齊王冏起義孫秀多歛葦炬益儲麻油於殿省為縱火具上油灌髪瘕宫人患腰痛牽心發則氣絶徐文伯視之曰髪瘕以油灌之吐物如髪引之長三尺頭已成蛇能動滛懸之滴盡唯一髪木草减油㓕火沈約年十三而遭家難潜竄㑹赦乃免既而流寓孤貧篤志好學晝夜不釋卷毋恐其以勞生疾常遣减油㓕火梁書積油二百張纉為湘州刺史州境大寜曉好積聚多冩書數萬卷有油二百斛采千石他物稱是上灌油擲馿侯景攻臺城為曲項木馿攻城吞石不能制羊侃作雉尾炬施鐡鍦以油灌之擲馿上焚俄盡剥面油煎初侯景既南奔魏相髙澄命先剥景妻子面皮悉以油煎殺之灌木益火衛史王真作亂率其黨襲肅章門不得入乃縱火燒之尉遲運懼火盡真黨得盡乃取油灌木以益大火勢轉盛真不得進乃退後周書柰和凎燥柰油柰實和之以凎繪上燥而發之形似油也杏油亦如之釋名醬成於鹽醤成於鹽而醎於鹽夫物之變有時而重風俗通雷不作醤雷不作醤俗説令人腹内雷聲按子路感雷精而生尚剛好勇死衛人醢之孔子覆醢毎聞雷心惻怛耳上覆瓿劉歆謂楊雄云今學有禄利然尚不能明易又如𤣥何吾恐後覆醤瓿也漢書用醤濡鷄醢醤實蓼濡魚卯醤食蓼濡鼈醢醤實蓼魚膾芥醤麋腥醢醤禮記豆醤惡雷作豆醤惡聞雷此欲使人急作不欲積乆論衡覆瓮陸機入洛欲為三都賦聞左思作之撫掌而笑與弟書云此間有傖父欲作三都賦須其成當以覆醤􅀢耳世説匏醤調菜孝武嘗謂王𤣥謨作四時詩云匏醤調秋菜白醝解冬寒宋書吐餐覆醤阮孝緒外兄王晏貴顯屢至門孝緒度之必至顛覆聞其笳管穿籬逃匿不與相見曽㑹醤美問之云是王家所得便吐餐覆醤及晏誅親戚咸為之懼孝緒曰親而不黨唯坐之及竟獲免上醤美唾中鄙人有得脠醤而美之及飯惡與人共食即少唾其中而共者因涕其醤遂弃而俱不得食焉彼亡新王朗欲取天下時乃樂與人分之及已得而重愛不肯與是昔唾脠之類恒譚新論神藥醤西王母謂帝曰神藥上有連珠雲醤玉津金醤中有元靈之漢武内傳魚腸醤漢武帝逐夷至於海濵聞有香氣而不見物令人推求乃是漁父造魚腸于坑中以土覆之香氣上逹取而食之以為滋味逐夷得此物因名之置魚腸醤也齊民要術法蒟醤武帝使唐䝉使南越南越食蒟醤如桑椹取食為醤魚醤晋武帝與山濤書兼致魚醤一斗十二香漿十二香醤以沈香等油煎成服之神仙食經勺藥之醤枚乘七發曰熊蹯之􅳺勺藥之醤韋昭上林賦注曰勺藥和齊鹹酸美味也醋醯人醯人掌共五齊七菹凡醯物以共祭祀之齊菹凡醯醤之物賔客亦如之王舉則共齊菹醯物六十罋共后及世子之醤齊菹賔客之禮共醯五十罋凡事共醯周禮華池左味陶隠居云醋俗呼為苦酒丹家又加餘物謂為華池左味苦酒魏名臣奏曰中書監劉放曰官飯苦酒與百姓争錐刀之末宜其息絶苦酒城吳王築城以􅀈醯醢今俗人呼苦酒城吳録地理志風林鳴醋西王母謂帝曰仙藥有風林鳴醋漢武内傳灌鼻初薛仁杲拔泰州召富人磔於猛火之上或以醯灌鼻求其金寶唐書注鼻來俊臣鞠囚不問輕重皆注醯干鼻誤進任迪簡萬年人舉進士初為天徳軍使李景畧判官性重厚嘗有軍立行酒者誤以醯進迪簡知誤以景畧性嚴慮坐主酒者乃勉强飲盡之而為容其過以酒薄白景畧請換之於是軍中皆感悦芥醋愈疾有少年眼中常見一鏡子趙卿􅐷之曰來晨以魚膾奉候及期延於闑内從容乆飢侯客退方得攀接俄而臺上施一甌芥醋更無他味少年飢甚聞芥醋杳輕啜之逡巡再啜遂覺􅇩中豁然眼花不見卿云君喫魚膾膾太多芥醋不快故權誑而愈其疾也北夣𤨏言醋泥傳瘡孫光憲家婢抱小兒不覺落炭火上便以醋泥傳之無痕木草醢醢人醢人掌肆豆之實朝事之豆其實韭菹醯醢昌本麋臡菁菹鹿臡醯食之豆其食葵菹蠃醢䐷折醯醢蜃蚔醢豚拍魚醢加豆之實芹菹兎醢深蒲醯醢箈菹鴈醢筍菹魚醢周禮凡事共醢醢人為王及后世子共其内羞王舉則共醢六十罋以五齊七醢七菹三臡實之賔客之禮共醢五十罋上覆醢孔子哭子路于中庭有人弔者夫子拜之既哭進使者而問故使者曰醢之矣逐命覆醢作醢崔寔四民月令曰五月一日可作醢東里𢎞君舉食檄曰東里獨姥之醢羮􅅅爾雅曰肉謂之􅅅説文曰􅅅五味和粥也五味和合五味者各稱一族之名和合一鼎名曰􅅅猶威重亷平恩合而為信也奏子雉􅅅彭鏗斟雉帝何饗受夀永多夫何長鏗好和滋味進雉􅅅于堯堯饗之而錫以夀考至八百嵗荘子以為上及有虞下及五伯是也天問鵠􅅅縁鵠餙玉后帝是饗言伊尹始仕因縁烹鵠鳥之􅅅修玉鼎以事湯湯賢之遂以為相上熊􅅅紆王怒熊􅅅不熟而殺庖人新序食子􅅅文王長子曰伯邑考紂烹以為􅅅以賜文王曰聖人不食其子􅅅文王得而食之紂曰誰謂西伯聖者與食其子􅅅而不知帝王世紀􅅅羊不遍中山君享犬司馬子期在焉􅅅羊不遍子期怒走楚説王伐中山中山君王有二人挈矛随後問之曰臣父嘗餓且死之君下壺飱哺臣之父故來死君也中山君曰吾與一碗羊􅅅亡國以一壺飱得二士死國䇿􅅅中生肝昭僖侯之時宰人上食而􅅅中有生肝焉昭侯召宰人而誚之曰汝何為置生肝􅅅中宰人曰竊以為有欲去上食宰也韓子母作􅅅方陸續詣詔獄其母至京師餉食續對餉泣曰續母來使者問其故荅曰續母作􅅅截肉未嘗不方斷葱寸寸無不同是知毋來謝承後漢書啖􅅅無鹽陶􅀈字公超啖蕪菁􅅅無鹽上菜􅅅不給桓温表王濬之孫曰濬今有三孫年出六十室如懸磬餬口江濵四節蒸嘗菜不給晋書嘗膳魚􅅅湘州刺史王僧䖍引樂頥之為主簿以同僚非人棄官去吏部郎庾杲之嘗徃侯頥之為設食唯枯魚菜葅杲之曰我不能食此毋聞之自出嘗膳魚􅅅數種杲之曰鄉過於茅季偉我非郭林宗南史羊􅅅絶味毛修之被禽入魏敬事嵩山道士冠謙之在魏大武帝信敬營護之故不死修之嘗為羊􅅅薦魏尚書尚書以為􅀈味獻之太武大悦以為太官令被寵遂為尚書封南君公太官令常如故宋書歠􅅅冩􅎍宋末齊髙帝輔政劉彦節知運祚将遷宻懐異圖及沈攸之舉兵齊髙入屯朝堂袁燦鎮石頭潜與彦節及諸大将黄囬茅謀夜㑹石頭詰旦乃發彦節素怯恇擾不自安晡後便自丹陽郡車載婦女盡室奔石頭臨去婦蕭氏孫勸令彦食歠􅅅㵼􅎍中手振不自禁南北所推髙祖既為齊王置酒為樂􅅅膾既至崔祖思曰此味故為南北所推侍中沈文季曰􅅅膾吳食非祖思所解祖思曰炰鼈膾鯉似非勾吳之詩文季曰千里蓴􅅅豈關魯衛之説王甚悦曰蓴􅅅故應還沈齊書毋􅅅食盡朱緒無行毋病積年忽思菰􅅅緒妻到市買菰為􅅅欲奉毋緒曰病後安能食先嘗之遂併食盡毋怒曰我病欲此􅅅如何必併啖盡天若有知當令汝哽怨緒聞心中芥介然即吐血明日而死上􅅅胷前翻蕭勵為廣州一束史微為太子左衛率勵性率儉而器度寛裕左右嘗将􅅅正胷前翻之顔色不異徐呼更衣後梁書盗􅅅不食趙琰字叔起嘗送子兾州聘室過路旁主人設羊􅅅琰方知盗殺卒辭不食魏書􅅅不還直彭城王攸為滄州刺史顯沃縣主簿張逹嘗詣州投人舎食鷄􅅅察知之守令畢集攸對衆謂逹曰食􅅅何不還價直也逹即伏罪合境號為神明上須肉為􅅅魏元忠前後三坐弃市偶得不死復舊官因侍宴后曰卿累謗鑠何邪對曰臣猶鹿也羅織之吏如獵者茍湏臣肉為之􅅅爾唐書藜􅅅盧照隣字昇之客東龍門山布衣藜􅅅甘露􅅅李林甫子壻鄭平為户部外即一日林甫就院省女因邀之見其鬂髪班白謂平曰上明日當賜甘露􅅅鄭即其食此􅅅縱華皓亦必鬢黒明日果有中使至林甫第賜食因以􅅅與平食一夕鬢黒明皇雜録不二􅅅胾栁玭嘗述家計曰余舊府髙公先君兄弟三人俱居清列非速客不二􅅅夕食齕蔔瓠而已皆保重名於世調􅅅李白召見金鑾殿論當世事帝賜食親為調􅅅馬齒􅅅唐代宗崩徳宗即位食馬齒􅅅不設鹽酪注馬齒菜名今馬齒莧也一名五行草以其葉青梗赤花黄根白子黒也監五味晋平公問於叔向曰昔者齊桓公九合諸侯一匡天下不識其君之力乎其臣之力乎師曠侍曰臣請譬之以五味管仲善斷割之顯朋善煎熬之賔胥無善齊和之􅅅以熟矣奉而進之而君不食誰能彊之亦君之力也新序糲餐瓠􅅅魏文侯見箕季日晏進糲餐之食𤓰瓠之􅅅文侯語其僕曰食我以糲餐者季豈不能具五味哉教我無多歛於百姓以省飲食之養也上啜􅅅投漿太宰子朱食侍於令尹子國子國啜􅅅而熱投漿而沃之明日子朱辭官曰令尹輕行而簡禮其辱人不難明日伏即尹怒曰笞之三百淮南烹猴楚有烹猴而召其鄰人以為狗􅅅也而甘之後聞其猴也據地而吐之㵼盡其食此味始知味者也淮南修務􅅅中有髪昭帝時大官上食􅅅中有髮切中有土令承坐不謹敬皆論風俗通杯􅅅二萬李徳裕奢侈毎食一杯􅅅其費約錢二萬雜珠玉寶貝雄黄硃砂煎汁為之過三煎即棄其滓獨異志猴頭􅅅民皆好啖猴頭􅅅雖五肉臛不能及之其俗言寜自負人千石之票不願負人猴頭􅅅臛臨海水物志不録􅅅嶺表録異曰交趾之人重不録􅅅􅅅以羊鹿鷄猪内和骨同一釡煑之令極肥濃漉去肉進之葱薑調以五味貯以盆器置之盤中􅅅中有觜銀銀杓可受一升即揖讓多自主人先舉即滿斟一杓内觜入鼻仰首徐傾之飲盡傳杓如酒巡行之喫􅅅了然續以諸饌謂之不録㑹亦呼為先惱也交趾人或經營事務彌纔縫推要但備此者㑹無不諧者安南録異圖鑿穿心飛頭鼻飲者皆遺風也象鼻炙廣之属城循州雷州皆産里象牙小而紅土人捕之争食其鼻云肥脆偏堪為􅅅北户錄和􅅅齊公曰和與同異乎晏子曰異和如􅅅焉水火醯醢鹽梅以烹肉魚燀炊也之以薪宰夫和之齊之以味濟其不及以洩其過君子食之以平其心君臣亦然故詩曰亦有和􅅅既戒既平先王之濟五味和五聲也以乎其心成其政也以水濟水誰能食之昭二十露葵􅅅主人女為臣炊彫胡之飯烹露葵之􅅅披白縠之单杉垂珠步摇來排臣户相如諷賦臛臛臛肉􅅅説文臛者嵩也香氣嵩髙也釋名黄領臛虞悰家富於財而善為滋味豫章王嶷盛饌享賔謂悰曰餚羞有所遺否悰曰何曽食䟽有黄頷臛恨無之齊書土肉為臛九真太守陶璜立郡築城於土穴中得一白色形似蚕蛹無頭長數十丈大餘圍軟軟動莫能名割腹有肉如猪豚遂以為臛甚香􅅅璜啖一杯三軍盡食劉欣期交州記膾膾牛與羊魚之腥聶而切之為膾少儀膾春葱秋用芥豚春用韭秋用蓼肉腥細者為膾者大為軒内則切散㑹和膾細切肉也説文膾㑹也細切肉散分其赤白異㘦之乃㑹和之也釋名魚須膾伍子胥伐楚未還闔閭治魚作膾過時不至免臭猶須子胥之至也三師到闔閭膾而食之不知其臰後王重作之其味如故人作魚須膾者闔閭之時造也吳越春秋膾成虫陳登得􅎍中煩滿面赤不食華佗為脈曰府君胃中有虫數升欲成肉疽腥物所為也即将湯二升先服一升期須盡服之食須吐出三升許䖝赤頭皆動半身猶是生魚膾也魏志泉鯉供膳姜詩妻事姑姑嗜魚膾又不能獨味妻與詩常力作供膾呼隣母共食其含側忽有泉常出鯉魚一雙以供二母之膳烈女傳船上膾具桓車騎冲在荆州張𤣥為侍中使至江陵路經陽岐俄見一人持小籠生魚逕來造船云有魚欲寄作膾張乃維船而納之問其姓字云是劉遺民鱗之張素聞其名大相欣待既知張御命問謝安王文度並佳不張甚欲語言劉子無意既進膾便去云向得此魚觀君船上當有膾具是故來耳於是便去世説郎官鱠江南人喜作鱠名郎官鱠因張翰思鱠得名海物異名記乾膾六年吳郡獻海鮸乾膾四瓶瓶容一斗浸一斗可得經尺面盤并奏作乾膾法帝以示群臣云昔術人介象於殿庭鈞得海魚此㓜化耳亦何足珎異今日之㑹乃是真海魚所作求自數千里亦是一時竒味即出數盤以賜近臣大業拾遺金虀玉鱠南人魚鱠以細縷金橙拌之號曰金虀玉鱠隋時吳郡獻松江鱠煬帝曰所謂金薺玉鱠東南佳味也陏唐住話南部煙花録魚鱠吳中以魚作膾苽菓為美魚白如玉菜黄若金稱為金􅅅玉膾一時珎食春秋佐助吳昭徳善造鱸鱠時人朝之曰鱠若值吳縷細花鋪若非遇吳費醋及葫江東呼蒜為葫東坡云吳興庖人斫鱸鱠亦足一笑鄉土以此為盛饌製時鋪成花草鸞鳯或詩句詞章務臻其妙造虀亦甚得法謂之金虀玉膾飛刀和鼎李綱在東宫建成常徃温湯綱時以疾不從有進生魚於建成者将召饔人作鱠時唐儉趙元楷在座各自賛能為鱠建成從之既而謂曰飛刀鱠鯉調和鼎食公實有之至於審諭弼諧固属於李綱矣舊唐五色鱠陸希聲妻余媚娘能饌五色鱠妙不可及本傳鱠手刀子安禄山所賜有鯽魚并鱠手刀子酉陽縠薄絲縷進士叚碩常識南孝亷者善斫膾縠薄絲縷輕可吹起操刀響捷若合節奏因㑹客衒技先起魚架之忽暴風雨雷震一聲膾悉化為胡蝶飛去南驚懼遂折刀誓不復作上歿因食膾邢州人和璞嘗謂房琯曰君歿之時必因食魚膾既歿之後當以梓木為棺然不得歿於君之私弟不處出館不處𤣥檀佛寺不處親友之家其後讉於閬州寄居州人之紫極宫卧疾數日刺史忽具鱠邀房於群齊房亦欣然命駕既歸暴卒州主命攅櫝於宫中棺得梓木為之明皇雜録蓬池鱠李徳裕述夣詩荷浄蓬池鱠凡學士初上賊食悉是􅅾池魚鱠鯽魚膾膾莫先於鯽魚鯿魴鯛鱸次之鱭魿黄竹五種為下其他皆强為膳夫録𤓰臛八月雨後𤓰菜生於洿下地中作􅅅臛甚美春秘期佐􅂇脯乾燥相摶脯摶也乾燥相摶着也修縮也乾燥縮也釋名鬼侯紂脯鬼矦以享諸矦切脯約友散宜生閱夭南宫适三子者學乎太公見三子知三子之為賢遂酌酒切脯約為朋友尚書大傳袵受魯昭公出奔齊侯使髙子執簞食四脡脯公稽首以袵受公羊傳毎朝設脯鬭子文三舎令尹無一日之積成王聞子文之朝不及夕也於是乎毎朝設脯一束􅀈一筐以羞子文至于今令尹秩之成王毎出子文之祿必逃王止而後復國語餓人與脯趙宣子将之絳見翳桑之下有餓人宣孟與脯二胊拜受不敢食問其故曰臣有母持以遺之宣孟更賜之二束遂去吕覽獻蒲為脯二世時趙髙用事乃先獻蒲為脯指鹿為馬以驗群臣風俗通古今注野蒲變而為脯西征賦胃脯濁氏以胃脯而連騎貨殖傳晋灼曰今太官常以十月作沸湯燖羊胃以末椒薑坋之暴使燥是也束脯餉軍左慈詣劉表請餉軍有酒一斗器盛脯一束而十人共舉不勝慈乃自出取之以刀削脯投地請百人奉酒及脯以賜兵士酒三盃脯一片食之如常脯味凡萬餘人皆周足而器中酒如故脯亦不盡坐上又有賔客千人皆得大醉葛洪神仙傳麒麟脯王逺至蔡經家與麻姑共設餚膳擘脯而行去是麒麟脯上粮雜人脯初太祖乏食程昱掠其本縣供三旬粮頗雜以人脯由是失朝望故位不至公也世説失脯衣償桑虞嘗行宿寄逆旅同舎失脯疑虞為盗虞黙然無言便解衣償之主人曰此數失魚鷄鴨多是狐狸偷君何以疑人乃将脯徃山家問尋求果得之客求還衣虞投之不頋晋書盗脯推獲彭城王攸為滄州刺史有一人從函州來驢䭾鹿脯至滄州界脚痛行遲偶㑹一人為伴遂盗馿及脯去明旦告州乃令左右及府僚吏分布鹿脯不限其至日見識之推獲盗者北齊紅虬脯同昌公主上贈御饌有紅虬脯非虬也但貯於盤中則虬健如紅絲髙一尺以筋抑之無三數分撤即復其故杜陽編贈王績性嗜酒杜之松嵗時贈脯供滋膳元行冲狄仁傑器之嘗謂仁傑曰下之事上譬富家儲積以自資也脯腊膎胰以供滋膳削脯傷指代宗睿真皇后沈氏河南為史思明所没遂失后所在徳宗即位令州縣物色咨訪髙力士女頗能言禁中事與女官李真一嘗從后㳺年状差似后嘗削脯哺帝傷左指髙以剖𤓰傷指酥酪醍醐陶隠居云佛書稱乳成酪酪成酥酥成醍醐醍醐乃酪酥之精華太𤣥之酪西王母謂帝曰仙藥内有太𤣥之酪漢武内𫝊指酪陸機詣王武子武子有數斛羊酪指以示機曰東吳何以敵此機曰千里蓴􅅅未下鹽豉郭子語林食酪而病陸玩詣王道王公食以酪陸還遂病明日與王牋云昨食酪小過通夜委頓民雖吳人㡬為傖鬼世説强食酪吳人至京為設食者有酪蘇未知是何扵也强而食歸吐遂至困頓謂其子曰與傖人同死亦無所恨然汝故宜慎之笑林賜酪尚書令荀最既乆羸毁可賜乳酪太官随日給之晉起居注語分餉讓皇帝憲帝待益厚凡四方所獻酒酪皆分餉之馬酪安禄山其所賜有馬酪酉陽雜俎珍味穆賛兄弟俱有令譽而和粹世以滋味目之賛俗而有格為酥質美而多入為酥貟為醍醐賞為乳腐近代士大夫言家法者以穆氏為髙舊唐銀餅宣宗賜韋澳孫宏銀餅餤食之甚美皆乳酪膏腴之所為摭言瓊膏乳懿宗迎佛骨入内道場薦瓊膏乳訶陵國所獻也杜陽雜編湩酪囬鶻駮馬國資湩酪以食婦人食酪南蠻有望蠻婦人食乳酪粟沃以酪五代仲雲國其食栗沃以酪乳作汁駱澤也乳作汁所使人肥澤也釋名炙炙炙炙也炙於火上也脯炙以􅄳蜜豉汁淹之脯脯然也釜炙於釜汁中和熟之也䐄銜也銜炙細蜜肉和以薑椒鹽豉已乃以肉銜􅂻其表而炙之也貊炙全體炙之各自以刀割出於胡貊之為也釋名上炙髪繞文公之時宰臣上炙而髪繞之文公召宰人而譙之曰女欲寡人之哽耶奚為以髪繞炙宰人􅀈首再拜請曰有死罪三援礪砥刀利猶干将也切肉肉斷而髮不斷臣之罪一也援木而貫臠而不見髪臣之罪二也奉熾爐炭火盡赤紅而炙熟而髪不燒臣之罪三也堂下得無微有疾臣者乎公曰善乃召其堂下而譙之果然乃誅之一曰晋平公觴客云云韓非子魚炙屈到嗜芰有疾曰祭我必以芰及祥宗老将薦芰屈建命去之曰其祭典士有豚犬之奠庶人有魚炙之薦國語争食吳王闔閭女嬌恣嘗與王争食魚炙怨恚而死風土記髪寘炙中陳正字叔方為太官令與黄門侍即有隙因進御食以髪寘炙中光武見之怒将斬正正曰臣當萬死者三山炭増冶吐炎燋膚爛肉而髪不銷臣罪一也匣出佩刀砥礪而虧肌截骨曽不能斷髪臣罪二也臣少事眼目書奏章表猶讀五經具御食臣與丞及庖人六目齊視豈不如黄門兩目臣罪三也制赦之謝承後漢書欲炙之色顧榮與同僚宴飲見執炙者状貌不凡有欲炙之色榮割炙啖之曰豈有終日執之不知其味及趙王倫敗榮被執其人為督率救榮得免黄雀炙王祥後母病欲黄雀炙乃有黄雀數枚飛入其幕因以供母孝子傳牛心炙王羲之年十三謁周顗顗異之時重牛心炙座客未噉顗割羲之於是始知名晋書啖鵝炙陽桂之役詔檄乆之未就齊髙帝引江淹入中書省先賜酒食淹素能飲啖食鵝炙垂盡進酒數升訖文誥亦辨齊書炙肉籖眼煬帝初在藩魚俱羅弟賛以左右從累遷大都督及帝嗣位拜車騎将軍賛性凶暴雪其部下令左右炙肉遇不中意以籖刺瞎其眼有温者不適者立斷其舌陏書駞峯炙将軍曲良翰能為驢騣駞峯炙甚美酉陽雜俎牛炙杜甫字子美客來陽游岳祠大水遽至涉旬不得食縣令具舟迎之令嘗饋牛炙白酒送杜甫後漂寓湘潭間覊旅鷦􅀈於衡州来陽縣頗為令長所厭甫投詩於宰宰遂致牛炙白酒以遺甫甫飲過多一夕而卒集中猶有贈聶來陽詩也明皇雜録消靈炙同昌公主上賜饌則有消靈炙消靈炙者一羊之肉取之四兩雖經暑毒終不臭敗杜陽編杏炙鼃炙飲食有杏炙鼃炙鱟炙鱟魚其形如龜十二足子如麻子可為醤色黒足似蟹在腹雌負雄而行南方作炙噉之劉欣期交州記鯖醒酒鯖鮓武帝幸芳林園就虞悰求味悰獻粣及雜餚數十與大官鼎味不及也上就悰求諸飲食方悰秘不出上醉后體不怏悰乃獻醒酒鯖鮓一方而已南史三十七五侯鯖婁護字君卿厯㳺五侯之門毎侯五侯各遣餉之君卿口厭滋味乃試合五侯所饋之鯖而食甚美世所謂五侯鯖蓋君卿之為也語林或云護兼善五侯不偏食故合而為鯖小説五侯不相能賔客不得來徃婁護即辨傳食五侯間各得其歡心竸致竒膳護乃合以為鯖世稱五侯鯖以為竒味焉西京雜記鯖音征煎和之名鮓鮓鮓葅也以鹽米釀之如葅熟而食之也釋名還母孟仁為鹽池司馬自能結綱子以捕魚作鮓寄母還之曰汝為魚官而以鮓寄我非避嫌也吳志陶侃少時作魚梁吏常以一坩鮓餉母母封鮓付反書責侃曰汝為吏以官物見餉非唯不能益吾乃以増吾憂也世説至市買鮓費長房又能縮地脈坐客在家至市買鮓刻日之間人見之千里外者數處列異傳十斛鮓蘇峻上成帝十斛鮓陶侃故事坩鮓送婦謝𤣥與婦曰昨出釣獲魚作一坩鮓今奉送湖鯉肥美十二年六月吳郡獻大湖鯉腴膳四十坩純以鯉坩為之計一坩䱹用鯉魚三百頭肥􅅅之極冠於鱣鯖大業拾遺野猪鮓安禄山恩寵莫北其所賜品目有野猪鮓有馬酪酉阻雜俎養池魚昭宗至鳳翔帝輟所御膳賜韓全誨等茂貞食鮓美帝曰此後池魚茂貞曰臣養魚以侯天子聞者皆駭韓全誨傳嗜鮓陳陶所居不與俗接唯嗜鮓一㗖或至十臠江南野吏鱘鮓潤州土貢鱘鮓地理志秋鯖仲秋月取折頭鯉子去鱗破腹使膂割為漸米爛燥之以赤􅐕米飯鹽酒令糝之鎮不苦重踰月乃熟是謂秋鯖慱物志八珍八珎食醫掌王之八珎周礼天官八珎者淳熬也淳母也炮豚𢷬珍也漬也熬也糝也肝膋也炮牂也先儒不數糝而分炮豚炮牂為二皆非也后世八珎則曰龍肝鳳髄兔胎鯉尾鶚炙猩唇熊掌酥酪蝉以羊脂為之吕希哲雜記張悦詩云玉榮飛千日瓊筵麗八珎雞集北八珎醍醐麆沆野駝蹄鹿唇駝乳糜天鵝炙紫玉漿𤣥玉漿也𤣥玉漿即馬妳子輟耕録三群之蟲伊尹對湯曰天子然後可具夫三群之蟲水居者腥獲食者臊草食者羶吕氏春秋肉物肉之美者猩猩之唇貛貛鳥之灸雋觾之翠􅄒蕩獸之􅒆音椀旅象之約旄牛也沃鳳之丸沃西方國九古夘字魚之美者洞庭之鱄東海之􅀈醴水朱鼇蒮水之魚名曰鰩其状若鯉而有翼常從西海夜飛㳺于東海食物黄鳥食之止妬鮆魚食之止驕鶌居食之不飢酸餘食之不醉鮨魚食之已狂人魚食之已癡珍食宋景公待善星文者設以珍食施以寶衣其食則有渠滄之鳬前以桂髄叢庭之鷃蒸以宻沫淇漳之鱧脯以青茄九江珠穟爨以蘭蘇華清夏潔灑以纎縞華清井之澄華也拾遺記寒李善選注云寒今􅙰肉也寒與韓同劉熈什名曰韓羊韓兔韓鷄本出于韓國所為鹽鉄論曰煎魚切肝羊淹鷄寒崔駰傳亦有鷄寒曹植文寒鶬蒸麑名都篇膾鯉臇胎鰕寒鼈灸熊蟠資暇録合之湆肉謂之寒廣韻曰煑肉熟食曰􅙰嘉物江皋緑箷之筍洞庭紫鬛之魚昆山龍胎之脯𤣥圃鳳足之葅千里蓴􅅅萬丈名膾梁吳筠移安定噎鳩之麥洛陽董徳之糜河東長若之葱隴西舐背之犢抱罕赤髄之羊張掖北門之豉洞庭負霜之橘仇池連蔕之椒調以濟北之鹽剉以新豊之鷄餅説犓牛之腴肥狗之和熊蟠之臑芍藥之醤薄耆之灸鮮鯉之膾秋黄之蘇白露之茹山梁之粲豢豹之胎楚苗之食安胡之飯土發芳菰精粺霜蓄露葵𤣥熊素膚肥豢濃肌山鵽斤鷃珠翠之珍寒芳苓之巢穴膾西海之飛鱗臛江東之潜替􅀈漢南之鳴鶉七啓晨鳬露鵠霜鵽黄雀封熊之蟠翰音之跖䴏髀猩唇髦殘象白靈淵之􅅾萊黄之鮐丹穴之鷚𤣥豹之胎七命􅀈牛之股凝脂之飯調和乆而不弊熟而不爛甘而不噮酸而不酷醎而不减辛而不烈澹而不薄肥而不􅵛和之􅅅和之美者陽樸之薑招摇之桂越駱之菌鱣鮪之醢大夏之鹽宰楬之露其色如玉長澤之卯飯之美飯之美者𤣥山之禾不周之稻陽山之穄南海之秬以上并吕氏春秋本末篇冀野之梁㑹稽之菰雜俎大梁之黍七命逺味桀紂欲長樂以苦百姓珍怪逺味必南海之薑北海之鹽西海之菁東海之鯨禍天下厚矣武夷食味武夷山神人八月十五日㑹村人酒行命食或云軟即水苔也或云緗㽔即荇也或云石虭一作蛸䑎即小蟹也或云沙虹鮓即蝦也或云河祇脯即乾魚也味皆甘美諸山記禁臠肉晋元帝始鎮建業每得一豚以為珍膳項上一臠尤美輙以薦帝群臣未嘗敢食時呼為禁臠肉劉琨𫝊寒具晋人飲食中有寒具乃令環餅也桓𤣥嘗收書盡聚客觀之客有食寒具者不濯手熱書畫汚之自是不設􅨋􅀈亦名寒具也雞跖集鴨㔅南齊宫中語云趙鬼食鴨㔅諸鬼盡著調俗間以細剉肉粽以薑桂曰㔅南史熱洛河唐明皇命射生官射鹿取血煎鹿腸食之謂之熱洛河廣氏雜記食在火候貞元中有一将軍家出飰食每説物無不堪喫唯在火候善均五味嘗取敗障泥胡祿修理食之其味極佳酉陽雜俎食料前定韓晉公滉在中書嘗召一吏不時至怒将撻之吏曰某有所属不得􅑈至乞寛其罪晉公曰宰相之吏更属何人吏曰某不幸兼属隂司晉公以為不誠怒曰既属隂司有所何主吏曰某主二品以上食料晉公公曰若然某明日當以何食吏曰此非細事不可顯之請䟽于紙過後為驗乃恕之而繋其吏明日􅑈有詔命既對適遇太官進食有糕糜一器上以一半賜晉公食之美又賜之既退而腹脹歸私第召醫者視之曰食物所擁宜服少橘皮湯至夜可啖漿水粥明旦疾愈思前夕吏言召之視其書皆如其説因復問人間之食皆有籍耶荅曰三品以上日支五品以上而有權位者旬支凡六品至九品者季支其有不食祿者嵗支前定録逸史李栖筠事相同嗜味李令問開元中為秘書監頗事飲饌取味慘毒病毒有甲仗數百人隨一火車入門聞堂中人誦經甲仗人􅂞避良乆一朱衣鬼􅈳來踏開聲如震雷自内挟不問出擲火車中載之而去靈怪集嗜鷄合肥人劉最好食鷄每刖雙足置木櫃中膏肉瀝盡乃烹之謂之去腥後最病瘍既愈後闕中毎巾􅌨必傷血肉被而痛楚積嵗而卒徐鉉稽神録食鮑即􅃦杜邠飲食洪轉既飽即􅃦人有諌非攝生之理公曰君不見布囊盛米放倒即慢南部新書素麟脂班螭髓謝𤣥卿遇神仙設素麟脂班螭髄續神仙傳鵝毛廷恩州出鵝毛脡乃鹽藏其味絶美其細如針義恭云小魚一斤千頭未之過也肉食者鄙齊師伐我曹劌請見其鄉人曰肉食者謀之劌曰肉食者鄙未能逺謀左傳九飣食唐御厨進食用九飣食以牙盤九杖装食味干其間置上前亦謂之香食盧氏雜説腹腴魚腹下肥肉也禮記少儀云冬右腴夏右鰭注冬氣在上腴腹下也夏氣在下鰭春也匹製貔貍刀約使契丹有詩云餞行三匹製宻賜十貔貍匹製以小大甖為之如黄漆貔貍形如鼠而大北狄以為珎膳古今詩話雩肉南蠻室利佛逝有獸類野豕角如山羊名曰雩肉味美以饋膳頴知食物曹元理明筭術嘗過其友人陳廣漢廣漢為之取酒鹿脯數片元理筭曰藷蔗二十五區應收一千五百三十六枚蹲䲭三十七畆應收六百七十三石以牛産二百犢萬鷄将五萬雛羊豕鵝鴨皆道其數果蓏肴䔩悉知其所乃曰此資業之廣何供饋之偏耶廣漢慙曰有倉卒客無倉卒主元理曰俎上蒸豚一頭厨中荔枝一柈皆可為設廣漢再拜謝􅀢自入取之盡日為歡西京雜記又趙逹嘗過故知家故知具酒食紿曰倉卒乏酒肴如何逹取盤中雙箸再三從横之乃言卿東壁下有美酒一斛又有鹿肉三斤何以辭無主人慙曰知卿善射有無特欲相試耳吳志求餘鵝晉庾悦嘗食鵝劉毅字希樂求其餘不應毅御之義熈中奪悦豫章解其軍府使人微示其㫖悦忿懼而死熱洛河哥舒翰素與安祿山安思順不平帝每欲勸解之㑹三人俱來朝帝使驃騎大将軍髙力士宴城東翰等皆集詔尚食生擊鹿取血瀹賜為熱洛河以賜之珍味饋從官崔日用為芮城尉則天幸長安路次陜州宗楚客時為刺史日用祇供頓事廣求珍味稱楚客之命偏饋從官楚客知而大加賞歎盛稱薦之舊史諸王修事翰林學士每遇賜食有物若畢羅形麤大滋味香美呼為諸王修事盧氏雜説名食今衣冠家名食有蕭家餫飩漉去其湯不肥可以瀹茗庾家粽子白營如玉韓約能作櫻桃饆饠其色不變又能造冷胡突鱠鱧魚臆連蒸麞麞皮索餅酉陽雜俎酒餚之最梁劉孝儀食鯖鮓曰五侯九伯今盡征之魏使崔劼李騫在坐劼曰中丞之任未應已得分陜騫曰若然中丞四履當至穆陸孝儀曰鄴中鹿尾乃酒餚之最劼曰生魚熊掌孟子所稱雞跖猩唇吕氏所向鹿尾乃有竒味竟不載書籍毎用為恨孝儀曰寔自如此或古今好尚不同梁賀季曰青州蠏黄乃為鄭氏所記此物不書未解所以騫曰鄭亦稱益州鹿􅖖但未是尾耳䱉議何𦙍侈于味食必方丈後稍欲去其甚者猶食白魚䱉腊糖蟹使門人議之學士鍾􅖺議曰䱉之就腊驟于屈伸蠏之将糖躁擾彌甚仁人用意深懐惻怛至于車螯蠣眉目内缺慙渾淪之竒唇吻外緘非金人之慎不榮不悴曽草木之不若無馨無臭與瓦礫而何異故宜長充庖厨永為口實上䱉表後梁韋林京兆人南遷于襄陽天保中為舎人涉獵有寸藻善劇談嘗為䱉表以譏刺時人其詞曰臣䱉言伏見除書以臣為糝熬将軍油於校尉臛州刺史脯腊如故肅承将命含灰屏息憑籠臨鼎載戰載兢臣美愧夏鱣味慙冬鯉常恐鮐腹之譏懼貽鼈巖之誚是以𠻳流湖㡳枕石泥中不意髙賞殊臨曲蒙鈞拔遂得超昇綺席沗預玉盤逺厠玳筵猥頒象箸澤單紫腴恩加黄腹方當鳴薑動桂􅀈蘇佩欓輕瓢纔動則樞盤如烟濃汁暫停則蘭餚成列宛轉緑虀之中逍遥朱唇之内衘恩噬澤九殞弗辭無任屏營之誠謹詣銅鐺門奉表致謝以聞詔荅曰省表具悉卿池沼縉紳陂渠俊乂穿蒲入荇肥滑有聞允堪兹選無勞致謝上視肉海隅荒郊之外林石之間地生視肉形如牛肝有兩大眼食之盡更生如故其土人所感豆腐世傳豆腐本淮南王術粥烹榖黄帝始烹縠為粥周禮鬻糜也餬饘也爾雅糜煑使糜爛也粥濯於糜粥然也寒粥米投寒水中也釋名啜粥聲聞周時尹氏貴盛五世不别㑹食數千人遭飢荒羅鼎作粥啜聲聞數里食訖失三十人乃在鑊中齕取燋粥而已録異為粥與餓公叔文子卒其子請謚於君君曰昔者魏國㓙飢夫子為粥與國之餓者是亦惠乎礼記天下逹禮悼公文之䘮李昭子問於敬子曰為喪何食敬子曰食粥天下之逹禮也上深室納饘晉人執衛侯歸之于京師寘深室寗子納槖饘焉左傳食鬻非禮齊晏桓子卒晏嬰麤纕斬苴經帶杖管屨食鬻君倚蘆􅃦苦枕單其老曰非大夫之禮也上餬口正考父鼎銘云饘於是粥於是以餬余口上恃粥左師觸龍見趙太后曰食無衰乎太后曰恃粥耳史記嗜粥中實楊盧侯趙章病淳于意􅐷其脈曰迵風迵風者五日而死後七日乃死曰其人嗜粥故中藏實實故過期蕪蔞豆粥光武為王郎追至蕪蔞亭馮異上豆粥一椀明日上謂諸将曰昨得公孫豆粥飢寒俱解浚漢朝暮送粥楚儵事後母致孝及母卒哀思過禮毁病不自支世祖常遣中黄門朝暮送饘粥上致糜粥曹褒遷将作大匠上聞褒病遣使致醫藥麋粥東覌漢記賦粥無差髙陽陸續仕郡户曹史時飢荒太守尹興使續於都亭賦民饘粥續悉之簡閱其人訊以名氏事畢興問所食㡬何續因口説六百人皆分别姓字無有差謬興異之謝承後漢書廪賦不實帝在長安榖一斛五十餘萬帝使侍御史侯汶出太倉米豆為飢民作糜粥死者不絶帝疑廪賦不實勅取米豆五升於御前作糜得滿兩盆詔杖汶五十漢文帝傳薄粥共啜臧洪為青州刺史為袁紹所圍粮食已盡初尚掘鼠煑筋角後無可復食厨有米三升主簿啓進内稍以為糜粥洪歎曰吾獨食此何為命作薄粥與共啜之九州春秋粥流沾胷曹爽等令李勝辭司馬宣王并伺察焉宣王見勝自陳無他勞効横馬蒙時思當為本州詣閣拜辭不悟加恩得蒙引見宣王令兩婢侍衣衣落復上指口言渇求飲婢進粥宣王持杯飲粥粥皆流出沾胷勝愍然者乆之魏末傳作糜食飢李夀作糜以食飢者而不自名吳錄食粥感戴朱桓除餘姚長遇疫癘糓食荒貴桓分部良吏隠親醫藥食粥相繼士民感戴之上熱食白粥郄嘉賔三伏之月詣謝公炎暑重赫雖當風交扇猶霑汗流離謝著故練衣食熱白粥郄謝曰自非若體㡬不堪此世説作粥以待賊杜弢下蜀人飢陶侃多作粥以待之於是悉降王隠晉書麄粥不下桓𤣥敗走承石進以麄粥咽不能下晉安帝記屑麹供帝愍帝建興四年十月京師饑甚米斗金二兩人相食死者太半太倉有麹數十䴵麹允屑為粥以供帝晉記鬼喜偷粥劉他茍家在夏口忽有鬼來喜偷食劉即於他家煑冶葛取二升汁宻齎還家向夜令舉家糜食餘一既因寫冶葛汁著中於几上以瓮覄至人定後聞鬼發瓮啖糜湏臾在屋頭吐至四更中寂然於此遂絶也續搜神記藿糜自噉王東亭當之吳郡就汰公宿别汰公説豆藿糜自噉大甌東亭有難色汰公强進半甌俗説出財為粥王薈為吳郡内史其年大飢薈出私財為百姓饘粥别傳進粥不彈戴顒與兄彀並隠遁有名中書令王綏嘗携客之彀彀等方進豆粥綏曰聞卿善琴試欲一聽彀不荅綏恨而去宋書數合為粥何子平大明末東土飢荒繼以師旅家有大䘮八年不得營塟畫夜號哭常如袒括之日冬不衣絮暑不清涼一日以數合米為粥不進鹽菜上后夢與粥宣孝陳皇后髙帝髙帝年二嵗乳人乏乳后夢人兩甌麻粥與之覺而驚乳因此豊足齊書日止溢米昭明太子統母丁貴殯薨水漿不入口毎哭慟絶武帝命中書舎人顧恊宣㫖曰毁不㓕性聖人之制不勝䘮比於不孝有我在那得自毁如此耶即强進飲粥太子奉勅乃進數合自是至塟日進麥粥一升武帝又勑曰聞汝新進過少轉嬴瘐我比更無病症為汝胷中亦圮塞成疾故應加饘粥不使我恒懸心雖屢奉勑勸逼終䘮日止一溢米不嘗菜菓之味梁書食毋餘粥張𢎞䇿㓜以孝聞母嘗有疾五日不食𢎞䇿亦不食母强為進粥𢎞䇿乃食母所餘上饘粥於路蕭景為南州刺史㑹年荒計口振恤又為饘粥於路以賦之散俸為粥任昉為義興太守嵗荒散私俸米豆為粥活三千餘人為粥稱惠王志天監初為丹陽尹時年飢毎旦為粥於郡門以賦百姓衆悉稱惠廬墓食粥劉覽字孝智十六通老易位中書郎以所生母憂廬于墓再春不嘗鹽酪食麥粥而已無米食菜河南孝亷􅁗綿遭母䘮送塟不忍復還卿人為作庵仍止其中若遇有米食粥無米食菜而已旬方為粥庾沙彌母劉氏亡水漿不入口累目初進大麥薄飲經十年旬方為薄粥終䘮不食鹽酢日食麥粥張昭弟乾字𤣥明聦敏好學亦有至性父卒兄弟日唯食一升麥屑粥陳書賜御粥崔浩道武季年威風嚴峻官省左右以微過待罪莫不迯避隠匿自下皆變獨浩恭勤不怠或終日不歸帝知之輙命賜以御粥後魏書出米為粥薛真度為豫州刺史景明初豫州大飢真度輙表曰别出食米五十斛為粥救甚者詔曰真度所表甚有憂濟百姓之意宜在極恤也上感言進粥文明太后崩孝文五日不食楊椿諌曰聖人之禮毁不㓕性縱陛下欲自賢於萬代其若宗廟何帝感其言乃進一粥上州門造粥楊逸為光州刺吏時災儉連嵗逸欲以倉票賑給而所司懼罪不敢逸曰國以人為本人以食為命假令以此獲戾吾所甘心遂出粟然後中表右僕射元羅以下謂公儲難􅇅並執不許尚書令臨淮王或以為宜貸二萬詔聽貸五萬逸既出粟之後其老小殘疾不能自存活者又於州門造粥飼之将死而得濟者以萬數帝聞而善逸家粟造粥韋朏字遵顯少有志業年十八辟州主簿時属嵗儉朏以家粟造粥以飼飢人所活甚衆食粥和親房景逺字升遐重然諾好施與嵗儉分贍宗親人於通衢以粥食餓者存濟甚衆平原劉郁行逕兖境忽遇刼賊已殺十餘人次至郁郁曰與君鄉近何忍見殺賊曰若言鄉里親親是誰郁曰齊州主簿房陽是我姨兄陽是逺小字賊曰食其粥得活何得殺其親遂還衣服蒙活者二十餘人施粥於路李搔妹曰法行㓜出家為尼後遭嵗大儉施糜粥於路罄資為粥李士謙遇年飢多有死者士謙罄家資為之糜粥賴以全活者萬計為姊煮粥李勣既貴其姉病必親為煑粥火􅀢其鬚姉曰僕妾多矣何自苦若是勣對曰豈為無人耶顧姉年老勣亦年老雖欲乆為姉煑粥豈可得乎唐新語白粥吕方毅葬母通人即餘令以白粥𤣥酒生芻祭路隅屑榆陽城嵗飢屏跡不過隣里屑榆為粥講論不輟新唐天子食粥昭宗在鳳翔為梁兵所圍天子食粥食不托昭宗幸鳳翔梁軍圍之中人相與邀遮李茂貞來路以為生昭宗謂茂貞曰朕與六宫皆一日食粥一日食不托安得不與梁和乎五代史玉屑飯太和中有二人遊嵩山迷路見一人衣㓗白枕一樸物方眠二人且問所自因開襆兩褁授與二人曰分食此雖不足長生可一生無疾乃起與二人指路酉陽青精飯杜詩豈無青精飯使我顔色好青精飯一名南天燭又曰墨飯草以其可染墨飯也道家謂之青精飯仙經云服草木之正氣與神通食青燭之津命不復隕神仙傳鄧伯元王𤣥甫俱在霍山服青精飯呼食為頭晉元帝謝賜功徳浄饌一頭又謝齎功徳食一頭又劉孝威謝賜果食一頭北頭録餅麵餈餅麵餈也説文餅謂之飩或謂之餦或謂之餛方言餅并也溲麫使合并也胡餅作之大漫沍也亦言以胡麻著上也蒸餅湯餅蝎餅髄餅金餅索餅之属皆隨形而名之也釋名食胡餅靈帝好胡餅京師皆食胡餅後董卓擁胡兵破京師之應續漢書賣餅累紫莽之世賣餅小人皆得等級斗筲之徒兼金累紫楊子雲磪然忠貞之節形矣枹朴子遺母笥餅光武問第五倫曰卿為市掾人遺卿母一笥餅卿從外來見之奪母曰探口中餅出有之乎倫對曰實無此衆人以臣愚蔽故為出此言耳改名胡餅石勒諱胡胡物皆改名胡餅曰摶鑪石虎改曰麻餅趙錄遺餅不受王悦之為吏部隣省有㑹同者遺悦之餅一甌辭不受曰此費誠小然少來不願當之宋書賣餅家嚴翰字公仲學問特善春秋公羊司隷鍾繇不好公平而好左氏謂左氏為太官而謂公羊為賣餅家魏志餅作十字何曽性奢豪務在華侈幃帳車服窮極綺麗厨膳滋味過於王者每燕見不食大食官所設而不命取其食蒸餅上不坼作十字不食惠餅充日王歡躭學貧窶或人惠蒸餅一顆以充一日妻子常有菜色晉陽秋水引餅何戢為司徒左長史太祖為領軍與戯來徃復置歡宴上好水引餅戢令婦女躬自執事以設上焉齊書圻裂方食石虎好食蒸餅常以乾棗胡桃瓤為心蒸之便坼裂方食及為冉關所簒幽廢思其不裂者不可得趙録設豆餅庫狄連冬至日親表稱賀其妻為設豆餅連問此豆餅何處得來妻對曰於食中减連大怒北齊書拭手王羆鎮河東日嘗有臺使至為設食使乃使裂去薄餅緣羆怒曰耕種收穫其功已深春爨造成用力不少爾之選擇當是未飢命左右撤之使者大慙比史宇文士及嘗割肉以餅拭手太宗屢目陽若不省徐㗖之其機悟率類此唐書李英公為相有鄉人過宅為設食客去餅緣公責之客大慙南部新書肅宗為太子時嘗侍膳尚食置熟俎有羊臂臑上顧使太子割肅宗既割餘汚漫在刃以餅㓗之上熟視不懌肅宗徐舉餅啖之上甚悦謂太子曰福當如是愛惜栁氏舊聞鄭瀚以儉素自居尹河南召甥姪與之㑹食有蒸餅鄭孫去其皮而後食之澣大嗟怒謂曰皮之與中何以異也僕嘗病澆俗驕侈自奉柰何嚚浮甚於五侯家綺真乳臭兒也耶因引手取所棄者鄭孫錯愕失㨿噐而奉之瀚盡食之取浮上揉米屑王世充秦王𫝊城塹而守之世充糧具盡人相食至以水泊泥去礫取浮上揉米屑為餅籠餅侯思止懶不治業詭狠無良以告變拜游擊将軍遷左臺御史嘗命作籠餅謂膳者曰與我縮䓗作之故時人號為縮䓗侍御以珠易餅賀知章嘗謁賣藥王老問黄白術持一大珠遺之老人得珠即令易餅與賀食賀心念寶珠何以市餅口不敢言老叟乃曰慳吝未除術何由成原化記餅師寜王宅畔有賣餅者妻甚美王厚遺其夫而取之經嵗問曰頗憶餅師否召之使見淚下如雨本事集不暇唱渭城劉伯芻巷口有鬻餅者毎當鑪謳歌一旦劉怜其貧貸以萬錢自是不聞歌聲心計轉麄不睱唱渭城矣䄂中盛胡餅楊國忠自入市衣䄂中盛胡餅餅棄竇中武惠妃生日上與諸公主按舞於萬嵗樓下上乘步輦從複道窺見衛士食畢以餅餌棄水竇中上大怒命高力士枝殺之上方震怒左右莫敢言者寜王從容謂上曰從椱道窺見獲衛士之過而殺之恐人臣不能自安又失大体陛下志在勤儉愛物惡弃於地柰何性命至重重於踐飱者乎上蹶然大悟遽然赦之明皇雜録棄餅垣外楊瑶光厯沔綏二州刺史姆饋闕子以餅妻偽受而棄之垣外人咨其亷賣餅黄巢復入京師於時畿民柵山谷自保不得耕士人或賣餅自業五色餅刻木蓮花藉禽獸形按成之累積五色酉陽雜俎玉英粉有道人持湯餅語人曰此玉英粉食之七日當羽化廣異記五色飲隋仁夀間籌禪師常在内供養造五色飲以扶芳葉為青飲祓禊根為赤飲酪漿為白飲烏梅為𤣥飲江音桂為黄飲五香飲又作五香飲第一沈香飲次檀香飲次澤蘭香飲次丁香飲次甘松香飲皆有别法以香為主四時飲尚食直長謝諷造淮南玉食經有四時飲春以桃夏以酪秋以蓮實冬以枸杞俱大業雜記蜜兼採蜜蜂以兼採為味張璠易注序百草花蜜蜂百草花所作也韻集紫蜜西王母曰太上之藥有中華紫蜜雲山朱蜜漢武故事石蜜石蜜一名飴本草經天竺國出石蜜續漢書白蜜世祖與朱祐共買蜜合藥後上追念之即賜祐曰蜜一石問何如在長安共買蜜乎東覌漢記絶粮無蜜袁術為雷簿等所拒士衆絶粮時盛水暑欲得蜜漿又無蜜在床歎息良乆乃大咤曰袁術至於此乎吳書蜜中鼠矢孫亮使黄門至中藏取蜜漬梅蜜中有鼠失召問藏吏曰黄門從汝求蜜耶吏曰向求蜜實不敢與黄門不服亮曰此易知耳令破鼠矢矢裡燥亮曰若乆在蜜中中外當俱濕裏燥必是黄門所為黄門首服吳厯白蜜供服陶𢎞景永明十年脫朝服掛神武門上表求禄詔許之賜以米帛勅所在月給茯苓五斤白蜜二斤以供其服餌齊書蜜領任昉為新安太守郡有蜜嶺及楊梅舊為太守所採昉以冐儉多物故即時停絶梁書蜜巖勿封𫝊昭為臨海太守郡有蜜巖前後太守皆自封固專收其利昭以周文之囿與百姓共之大可喻小乃教勿封上刺蜜髙昌國遣使貢刺蜜帝命杰公迓之謂其使曰刺蜜是鹽城所生非南平城者使者曰其年風災刺蜜不熟故尔帝問杰公對曰南平城羊刺無葉其蜜色明白而味耳鹽城羊刺葉大其蜜色青而味薄以是知蜜之偽耳梁四公記和炭楊國忠家以炭屑和蜜塑成雙鳳開元遺事鸞蜂蜜貞元八年吳明國貢鸞蜂蜜其蜂之聲有如鸞鳳而身被五色大者可重十餘斤為窼於深巖峻嶺間大者占地一二畝國人採其蜜不過二合如過度則有風雷之異若悞螫人則生倉以石上菖蒲根𫝊之即愈其蜜色碧常貯之於白土杞表裏徹如碧琉璃乆食之令人長夀顔如童子髪白者應時而黒杜陽編紅蜜同昌公主疾既甚醫者欲難其藥餌奏云得紅蜜食之可愈上令内庫得紅蜜數石本兠離國所貢也竹蜜蜀中有竹蜜蜂好於青竹上結窠窠大如鷄子有蔕長尺許窠與蜜並紺色可愛甘倍於常蜜液蜜為人崔彦曽署張佛筵液蜜為人刻廬西域自拂菻西南度磧二千里有國曰磨鄰曰老勃薩刻石蜜為廬如轝状兒啖西域康者生兒以石蜜啖之置膠於掌欲長而甘言持珤若黏云粳沃以蜜仲雲國其食粳沃以蜜五代煎石蜜蕃胡國出石蜜中國貴之上遣使止摩伽池國取其法令楊州煎諸蔗之汁於中厨自造焉色味逾於西域所出唐書交阯草滋大者數寸煎之凝如氷破如愽暴謂之石蜜異物志蜜岡郡東有山百姓呼曰蜜岡焉王孚安成記百房赤馬山有蜜房二百所羅綴相望因名百房荆州圖記甘柘變凝蜜之滋甜如浮萍之類非假石之名實出甘柘變而凝輕涼州異物志百花醴蜜劉根墨子枕中記鈔曰百花醴蜜少餳沙餳石蜜逺國貢儲張衡七辨西垂之産沙餳西垂之産盛公子與劉頒書炊金饌玉駱賔王謂盛饌為炊金饌玉拾遺天中記卷四十六
