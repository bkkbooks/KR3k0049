body:
  text: 菜菜䔩䔩者菜茹之總名詩韓奕云其䔩維何維筍及蒲毛傳云䔩菜殽也凡菜之可食者名為䟽也爾雅註菜之美者崑崙之蘋壽木之華指姑之東中容之國有赤木玄木之葉焉餘瞀之南巔極之崖有菜其名曰嘉樹其色若碧陽華之芸雲夢之芹具區之菁呂覽周鄭交惡君子曰茍有明信澗谿沼沚之毛蘋蘩蘊藻之菜可薦於鬼神可羞於王公左隱奪畚楚文王伐鄧使王子革王子靈共捃菜二子出採見老丈人載畚乞焉不與摶而奪之王聞之令皆拘二子將殺之大夫辭曰取畚信有罪然殺之非其罪也君若何殺之言卒丈人造軍而言曰鄧為無道故伐之今君公主子之摶而奪吾畚無道甚於鄧呼天而號君聞之群臣恐君見之曰討有罪而橫奪非所以禁暴也恃力虐老非所以教幼也愛子棄法非所以保國也私二子滅三行非所以從政也丈人舍之矣謝之軍門之外耳說苑楚莊王賜虞丘子菜田三百號曰國老以孫叔敖為令尹上擇菜宣尼窮於陳蔡之間顏回擇菜莊子金菜始皇聞鬼谷先生言因遣徐福入海求金菜玉蔬並一寸椹金樓子不窺園董仲舒專精於述古年至六十餘不窺園中菜桓譚新論琅菜西王母謂仙之上藥有碧海之琅菜漢武內傳老母求菜劉平與母俱匿野澤中平朝出求食逢餓賊將烹之平叩頭曰令但有老母求菜老母待平為命願得先歸食母畢還就死涕泣賊見其至誠哀而遣之平還既食母訖因白曰屬與賊期義不可欺還還諸賊眾皆大驚相謂曰常聞義士乃今見之子去矣吾不忍食子於是得全後漢崔瑗愛士好賓客盛修餚膳殫極滋味不問餘產居常蔬食菜羹而已上汝南鐘南嚴府君少時鄉居有入其園竊菜者明日拔菜悉遺鄉里鄉里人相約無復取菜者謝承書彭城刁躍字子卿為漁陽相前相所種菜悉付還外上丁密蒼梧人非家織布不衣非已耕種菜羗不食廣州先賢傳袁下字叔隰陬慮人種菜一園左右竊取度清瀆下乃為之撟其敦義如此山東六賢傳耑蹄菜趙咨使魏魏人曰聞江東有耑蹄菜作若為食咨曰當得倉鰷以作羹吳書孫皓天紀三年有鬼目菜生二人黃耉家依緣棗樹長丈餘莖廣四寸厚三分又有買菜生三人吳平家高四尺厚三分如枇杷形上廣尺八寸下莖廣五寸兩邊生葉綠色東觀案圖名鬼目作芝草買菜作平慮草遂以耉為侍芝郎平為平慮郎吳志咸寧四年立芳蔬園於金墉城東多種異菜有菜名曰芸薇類有三種紫色者最繁味辛其根爛熳春夏葉密秋𢌲冬馥其實若珠五色隨時而盛一名芸芝其色紫為上蔬其味辛色蓴為中蔬其味甘色青者為下蔬其味鹹常以三蔬充御膳其葉可以藉飲食以供宗廟祭祀亦止人渴飢宮人採帶其莖葉香氣匄日不歇拾遺記食唯鹽菜皇甫謐姑子梁祁為城陽太守或勸謐餞之謐曰祁為布衣時過吾吾送迎不出門食不過鹽菜貧不以酒肉為禮也今而送之是貴城陽太守而賤梁柳也豈中古人之道哉晉書挑菜傷指范宣挑菜傷指大啼曰身體髮膚不敢傷故啼邵續為石勒所執身灌園鬻菜以供衣食勒屢遣察之歎曰此真高人矣不如是安足貴乎嘉其清苦賜糓帛每臨朝嗟嘆以厲群官晉書燕用菜果桓溫性儉每燕唯下七奠柈菜果而已上吳隱之母喪哀𤨙食鹹葅以其味旨轍而葉之及為廣州清操喻勵常食不過菜及乾魚而已帷帳器服皆付外庫時人頗謂其矯然亦始終不易上晉永嘉五年曲陽縣民蓴慶宅左右有園東南廣數丈每種菜輒鮮異雖加采拔更生夜嘗有白光似懸絹道士傅德占使人掘之獲尺三玉印文曰長承萬福齊書宗晣以軍功封洮陽侯先是鄉人庾業家甚富豪侯服玉食與賓客相對膳必方丈而為晣設粟飯菜葅謂客曰宗軍人慣噉麄食晣致飽而退初無異辭至是業為晣長史帶梁郡晣待之甚厚不以昔事為嫌宋書柳元景為三公時在朝勳貴多事產業唯元景獨無所營南岸有數十畝菜園守園人賣得錢二萬送還宅元景怒曰我立此菜園以供家中啖耳乃復賣以取錢奪百姓之利耶乃以錢乞守園人上王玄謨祁元景桓護之雖並比人而玄謨獨受老傖之目凡諸稱謂四方書䟽亦如之嘗謂玄謨昨四時詩曰堇茶供春膳粟漿充夏餐爬醬調秋菜白醝解冬寒上朱修之踈在鄉里饑寒不立修之貴為刺史未曾供贍嘗往視踈踈為設菜羹麄飯以激之上宜都王鏗生三歲喪母及有識問母所在左右告以早亡便思慕蔬食自悲不識母齊書江泌性仁孝食菜不食心以其有生意唯食老葉而已上沈道虔辟州府凡十二命皆不就有竊園菜者外還見之仍自迯隱待竊者去後乃出南史隱逸傳武帝大官常膳唯以菜蔬几桉所陳不過三盞梁書梁蕭棟字吉豫章安王權之子也侯景以法駕迎棟時棟與其妃執鋤種菜忽然見逼駭愕久之典略甄琛母曹氏有孝性夫氏去家路踰百里每得魚肉菜羗珍羹口實者必令僮僕走奉其母乃後食焉後魏書高閭曾造胡叟短褐曳柴從田歸舍為閭設濁酒蔬食皆手自辨集其館字卑陋園疇褊局而飯菜精潔醯醬調美見其二妾並年衰跛眇衣布穿弊閭見其貧約以物直十餘疋贈之亦無辭媿上盧義僖性清儉不營財利雖居䲻位每至困乏麥飯蔬食欣然甘之上清風園北齊主以鄴清風園賜穆提婆於是官無蔬菜僴買於人負錢三百萬其人訴焉斛律光曰此園賜提婆一家足不賜提婆百官足三國典略庫狄士文為吳州刺史性清苦不受公料家無餘財其子嘗噉官廚士文枷之繫獄累日杖之一百步送還京師僮隸無敢出門所買菜必於出境凡有出入皆封署其門親故絕𨄍慶弔不通上姚察陳亡入陏詔授秘書丞別勑成梁陳二代史又勑於朱華門長參文帝知察蔬菲內日召入內殿賜羗菜指謂朝臣曰朕聞姚察學行當今無此我平陳唯得此一人陳書太宗回次易州界司馬陳元疇令百姓種蔬坑上而微火煦之欲其速生以擬供進太宗聞之責其𪁐媚詔免官唐書太宗時時健獻佛土菜一莖五葉花赤中心正蓴而𢌲子紫色泥㜑羅獻波稜菜葉類紅藍實如蒺䔧火爇之能益食味又有酢菜狀似芹而味香渾提葱其狀猶葱而甘辛上高宗時司農欲以冬藏餘菜賣之百姓以墨勑示僕射蘇良嗣良嗣判曰昔公儀休相魯拔去園葵剗臨御萬邦而販蔬鬻菜事遂不行上王界為刑部尚書性貪恡不常在公乃鬻公廨菜園收其價錢以自潤甚為時論所醜上數杯盧懷慎日晏設食菜數杯上李輔國矯制遷明皇於西宮帝戚戚不樂且一蔬食高力士逐於巫山山谷多薺而人不之食因為詩寄意兩京作斤賣五溪無人採夷夏雖有殊氣味終不改明皇雜錄中書園蔬日給於眾官者主事白常䳮減其數崔祐甫怒訶主事主事曰此相公之命祐甫太詬曰門下侍郎安得理中書之蔬叱左右棓主事而拽之自是與常䳮不平唐書貞元七年冬司農卿李謨免官初司農當供三宮冬菜二千車以度支給車直稍錢又阻雨菜敗謨以度支為辭上責其不先聞故免之先是模奏司農菜不足請京兆府市之尹薛䣱萬年令𡁎彤乃禁人私賣上命奪䣱俸一月彤俸三月上貞元中奚陟為中書舍人以所得雜給均分省內官又躬親庶務下至園蔬皆悉自點閱人以為難而陟處之無倦上渾瑊帝狩奉天朱泚兵薄城人心危惴或夜縋出掇蔬本以供御裴休有饋鹿者諸生共薦之休不食曰疏食猶不足今一啖肉後何以繼吳初朝中大臣多蔬食月為十齋齋之明日太官具晚膳始復常珍謂之半堂食至是果盡割淮南之地去唐土封疆之半九國志汪信民嘗言人常咬得菜根則百事可做胡康侯聞之擊節嘆賞聞見錄孟娘菜江淮有孟娘菜並益肉食酉陽雜俎生菜不食殺君之室雖生羹菜有義之士弗食尚書大傳古叛逆之國齩其宮室以為汗池名曰丘墟雖生菜而民不食漢張踈奏紫菜吳郡邊海諸山悉生紫菜魏王花木志葅檝葅荊揚州人謂葅為檝古今注徐孝穎性仁孝嘗在園中晝臥見人盜菜徐徐轉身向裏恐偷者見之仁孝退讓皆此類也大業拾遺錄悉成荷花菜品中蕪菁菘芥之類遇旱其標多結成花或如蓮花或作龍蛇之形此常性無足怪者熙寧中李賓客及之知潤州園中菜花悉成荷花仍各有一佛坐于花中形如雕刻莫知其數暴乾之其相依然或云李氏之家奉佛甚謹故有此異筆談豐本韭曰豊本曲禮韭根韭根曰荄通俗文爾雅曰霍山韭註說文云菜名一種而久者故謂之韭象形在一之上一地也生山中者名藿韓詩云六月食鬱及藿是也一種久生青韭華韭菜一種久而生也象形在地上也說文堯韭舜榮聖王之世功濟天下者堯也天星降精于庭為韭感而為菖蒲焉典術金鹽玉豉堯韭舜榮梁太子𠌾河南菜啟云堯韭未儔𢅰歜非喻梁元帝玄㗲賦市處者僕妾膾灸而食市饒也壅泉沃韭纖屨之士從兄弟室父往而不得粗糒焉非愛其僕妾惡其室父也此其饒羡之與不足也魯連子衛有一夫負缶入井灌韭終日一區鄧瓌過教之曰有機重後輕前命曰桔璹終日訖九百區丈夫曰有智必有機心我非不知不欲為也說苑徐無鬼見武侯武侯曰先生居山林食芋票厭葱韭今老欲于酒肉之味耶無鬼曰君為萬乘之主以苦一國之民以養耳目鼻口夫神者不自許也夫神者好和而惡姦夫姦病也故勞之唯君所病之何也莊子龔遂為渤海太守勸民務農桑令口種一樹榆百本薤五十本葱一畦韭漢書陳韭為羹成都王圍京邑城中無菜採陳韭芥以為羹晉書後略擣韭雜麥石崇為客作豆粥咄嗟便辨每冬得韭蓱虀王愷每以此事為恨乃密貨崇帳下問其所以荅云豆至難煮豫作熟末客來但作白粥以投之耳韭蓱虀是擣韭根雜以麥苗耳晉書溫嶠滅王敦先是童謠曰剪韭剪韭斷楊柳河東小子令我與子以為賊如韭祁尋得復生也上周顒隱鐘山王儉謂曰卿在山中何所食荅曰赤菜白鹽綠葵紫蓼又問何者最佳曰春初早韭秋暮晚菘齊書二十七種庾杲之字景行為世租征虜功曹清貧自業食唯有韭葅秆韭生韭雜菜或戲之曰誰言庾即貧食鮭嘗有二十七種三韭言三九也上北齊大上後宮無限衣皆珠玉一女歲費萬金寒月盡食韭芽三國世略赤韭西王母曰仙之次藥有八阮赤韭漢武內傳交州平樂山多龍穴傍生野韭人往乞者神許則風吹制分隨偃而拔不得過越不偃而拔凶也水經為莧老韭為莧老為猿列子秦姚興及後周宣帝大象中葱皆化為韭說者以為戰伐之祥昜稽㗲圖云政道得則陰物變為陽鄭康成注云若䓤變為韭是也小民髮如韭剪復生頭如雞割復鳴吏不必可畏後來必可輕柰何欲望致州厝乎正論諸葛亮教張君嗣曰去婦不顧門荽韭不入園以婦人之性荽韭之情猶有所恥想忠壯者意何所之葱有四種曰冬葱漢葱胡葱茖葱又有一種樓葱亦冬葱類也江南人呼為龍角葱言其苖有八角故云耳凡葱皆能殺虫魚毒食品所不可缺也葱初生名葱針夏葱曰小冬葱曰大進食處末凡進食之禮葱深處末曲禮西王母曰仙人上藥有玄都綺葱漢武內傳召信臣為少府先是太官園種冬生葱韭菜葱覆以屋廡晝夜㸐火待溫氣乃生信臣奏罷之漢書井丹信陽侯葱就使人要叚之丹至就故為設麥飯葱葉之食丹推去之曰以君侯能供甘旨故來相過何其薄乎更置盛饌乃食後漢妻子葱菜孔奮字君魚為姑臧長時天下亂河西獨安前長居官數月輒致貲產奮在姑臧四歲財物不增唯老母極膳妻子但食葱菜或嘲奮曰置脂膏中不能自潤東觀漢記曹公既與先主語失言會天震雷先主曰賢人言迅雷風烈必變良有以也曹公亦悔失言使其窺之見其拔葱公曰大耳公未覺也其夜先主急去華陽國志種葱免官十年有司奏太常謝澹遣四人還家種葱菜免官義熙起居注居洛陽城十里內有園菜欲以當課聽引其長流灌紫葱晉書石勒時石聰將叛佛圖澄戒勒曰今年葱中有虫害人百姓無食葱俄而聰走上葱化為韭姚興種葱皆化為韭其後兵戈日甚後秦書宣帝大象年左衛園中葱變作韭後周書販葱呂僧珍拜南兗州刺史從父兄子宏以販葱為業僧珍既至乃棄業求州官僧珍曰吾荷國重恩無以報効汝等自有常分豈可妄求叨越當速反葱肆耳梁書新野趙真家園中所種葱未經抽拔忽一日盡縮入地後經歲餘貞之兄弟自相分散續搜神記葱嶺在燉煌西八十里其山高大上生葱故曰葱嶺也河源潛發其嶺分為二水一水西經休修國國在葱嶺中西河舊事休修國居葱嶺東其山多大葱郭義恭廣志辛香天門山上有葱所種畦隴悉成行人拔取者悉絕若請神而求即不拔自出奇異辛香春秋元命苞神仙消金玉漿法籴者菜之伯雖臭而有用消金玉錫石也又以冬至日取葫蘆盛葱汁根莖埋干庭中到夏至發之盡為水以漬金玉銀青石各三分自消矣曝令乾如飴可休糧久服神仙亦曰金漿也三洞要錄盤盞葱盤盞葱趙魏間有之幾如拄杖粗但盈尺耳清異水晶葱金柑玉板笋銀杏水晶葱吉州土產也絕本末為君子擇葱薤則絕其本末少儀葷菜蒜菜之美者雲夢之葷菜說文孫炎云蓴帝登蒚山遭蕕芋草毒將死得蒜乃嚙之解毒乃收植之能殺虫魚之毒攝諸腥羶氣葫又稱胡蒜陸法言切韻曰張騫使西域得大蒜胡荽則此物漢始有之以自胡中來故名胡蒜耳越王餘蒜生南海水中如竹筭子長尺許白者似骨黑者如角古云越王曾於舟中作籌有餘者棄之水而生異苑李恂為充州刺史所種園小麥胡蒜悉付從事無所留東觀漢記江夏費遂字子奇為瀘州刺史悉出前刺史所種小麥胡蒜付從事謝承後漢書太原閔仲叔者代稱節士雖同黨之澡清自以弗及也同黨見其含蔌飲水遺之生蒜仲叔曰我欲省煩耳今更作煩耶受而不食後漢高士傳平陵范氏南陽舊語曰前隧大夫范仲公鹽豉蒜顆共一筩言其廉儉也三輔決錄顆當音魏顆之顆北土通呼為一段為一顆蒜是俗間常語耳故陳王崔鷂賦曰頭如蒜顆目似擘椒顏氏家訓袁子曰吾常與陳子息於鄴東門外見一老父方坐而食其子投之蒜食少有餘欲棄則惜欲珤去則暑遂盡食於是太辛螫其腸胃兩目盡赤陳子笑之吾謂曰子之家中牛羊數千而不敢食天暑有死者而後食之病之子軀亦猶是也袁子正書供至尊蒜成都王穎奉惠帝還洛陽道中於客舍作食宮人珤斗餘粳米飯以供至尊大蒜鹽豉到獲嘉市麄米飯瓦盂盛之天子噉兩盂燥蒜數株鹽豉而已晉四王起事種蒜得馬郄詵母病苦車及亡不欲車載乃養雞種蒜得馬八匹輿棺至家王隱晉書豫章王大會賓僚張融食灸始畢人便去融欲求鹽蒜口終不言方搖食指半日乃息齊書邵陵王使賊煞何智通後以計擒賊智通子敞之割肉炙食之即載出新亭四面火炙之燋熟敞之以車載錢設鹽蒜顧百姓食之撤一臠賞錢一千徒黨并食肉遂盡梁書梁廬陵王蕭續在荊州時常遣從事量括民田南陽樂孟卿亦充一使公府舍人韋破虜發遣試勑失王本意及孟卿以數誤得罪破虜惶懼不敢引邜但誑孟卿云自當為公分雪無勞訴也數日之間遂斬於市孟卿號叫無由自陳唯語人以紙筆隨殮死後少日破虜在槽上看牛忽見孟卿挈頭而入珤一碗蒜虀與之破虜驚呼奔走不獲已而服之因而病未幾乃卒冤報記唐咸亨四年洛州司戶唐望之冬集記至五品進止未出間僧有來冲初不相識延之共坐少頃間曰貧道出家人得飲食亦少以公名故闇相記能設一頓編否司戶欣然即處分買魚此僧云看有蒜否司戶家人云蒜盡僧云蒜盡去也即起留之云蒜盡遣得買僧云蒜既盡不可更狂苦留不止司戶果無疾暴亡廣五行記蒜茆蒜也俗語謂之小蒜胡國有蒜十子共為一株二蘀褁之名為胡蒜尤辛於小蒜俗人謂之大蒜古今注西戎潘尼鈞賦曰西戎之蒜南夷之姜大宛延篤與李文德書曰五折張騫大宛之蒜西方以大蒜小蒜興渠慈葱茖葱列為五葷以為熟之則發媱生噉增恚皆有損于性情故絕而不食道家五葷乃謂韭蒜芸臺胡荽薤也無茖葱等爾雅翼葷而非辛阿魏是也辛而非葷薑芥是也是葷復是辛五辛是也梵網經云五辛者一葱二薤三韭四蒜五興渠翻譯名義釋慧日云僧徒多述五辛中興渠成云曇臺胡荽或云阿魏唯淨土集云五辛此土有四闕於興渠梵語稍訛正云形具餘國不見迴至于闐方得見也根麄如細蔓菁根而白其臭如蒜彼國人種取根食也于時冬天到彼不見枝葉薹荽非五辛所食無罪日親見為驗唐高僧傳薤似韭而無實雖辛而不葷五藏養生者服之可以安神養氣有赤白二種白者補而美赤者主金創不結子爾雅曰薤鴻薈本草衍義曰薤葉如金燈葉差狹而更光故古人言薤露者以其光滑難竚也說文曰薤菜山中者名蓻什草曰葝山薤也且古言服薤者惟商時務光故列仙傳云務光剪薤以入清泠之淵今有薤葉篆傳者以為務光所作龐參為南陽太守郡人任棠者有奇節隱居教授參到先侯之棠不與言但以薤一本水一盂置戶屏前抱孫見伏戶下主簿白以為倨參思其微矣良久曰棠是欲曉太守也水者欲吾清也拔大本薤欲吾擊強宗也抱兒當戶欲吾開門恤孤也於是歎息而還參在職果在祁強助弱以惠政得人後漢李孚字子憲為諸生常種薤欲以成汁有求索不與一莖亦不自食時人謂之能行意魏略桓公座有參軍掎蒸薤不時解共食者又不助而掎終不食舉座皆笑世說蘇峻亂庾公南奔見陶侃侃雅相重及食庾噉薤因留白陶問用此何為庾云故可種侃嘆曰非惟風流兼有為政之實上菜芝夫物英華之美者莫如芝故蓮曰水芝芋曰土芝蜜曰眾口芝薤曰菜芝爾雅翼介雞季郈之雞鬥季氏介其雞郈氏為之金距左昭二十五擣芥子播其羽也夏侯勝謂諸生曰士病不明經術經術茍明取青紫如拾地芥爾漢書芥死蓼虫蓼虫在蓼則生在芥則死非蓼仁而芥賊也本不可失也魏子種芥篇尹都尉書有種芥葵蓼韭葱諸篇劉向別錄芥壁生足唐孟館嘗入嶺表置芥菜置壁下忘食數日皆生四足有首尾能行走大如螳螂但腰細身長嶺南物志南土芥高者五六尺子如雞卵廣州人以巨芥為醎埋地中有三十年者貴尚親賓以相餉遺上廣州地熱種麥則苗而不實北人將蔓菁子就彼種者出土即變為芥嶺表錄異水蘇芥一名水蘇一名勞祖吳氏本草芥似菘而有毛味極辛辣其類甚多似菘者名青芥有紫芥莖葉皆紫作虀食之最美有白芥子麤大色白如梁米舊云從西戎來謂之白胡芥其餘南芥旋芥花芥石芥皆菜茹之美者爾雅翼葖蘆萉爾雅釋曰紫花菘也俗呼溫菘似蕪菁大根一名葖俗呼雹突一名蘆菔今謂之蘿蔔紫花菘溫菘皆南人所呼吳人呼楚菘廣南人呼秦菘方言曰蕪菁紫者謂之蘆菔爾雅翼劉盆子在長安時掖庭中宮女猶有數百千人自更始敗後封閉殿內拔庭中蘆菔根捕池魚而食之後漢張威陏文受禪遷青州刺史在州頗事產業遣家奴於人聞鬻菔其奴緣此侵擾百姓上深加譴責坐廢於家北史理世不用賢猶治病無真藥當用人參反得蘿菔根正論昔有婆羅門僧東來見食麥麵者云此大熱何以食之及見食中有蘿菔曰賴有此以解之耳自此相傳食麵必食蘿菔爾雅翼蕪菁亦作蔓菁塞北名九英一名𨔵一名薞蕪一名葑蓯禮坊記注云葑蔓菁也陳宋之間謂之葑陸璣云葑蕪菁幽州人謂之芥方言云蘴蕘蕪菁也陳楚謂之蘴齊魯謂之堯關西謂之蕪菁趙魏之部謂之大芥春食苗夏食心秋食莖冬食根菜之最益人者惟此耳多種可以備飢歲菜美菜之美者具區之菁呂覽桓帝永興二年詔司隸曰湟水為災五榖不登令所傷郡國皆種蕪菁以助民食東觀漢記劉備歸曹公曹公使親近覘視諸將有賓客酒食者輒因事害之備時閉門將人種蕪菁公使人窺門即去備謂張飛曰吾豈種菜者乎曹公聞有疑意不可復留是夜輕馬而去吳曆陸遜諸葛瑾攻襄陽遜遣親人韓扁𠌾表奉報扁還遇抄瑾聞之欲急去遜方催人種荳菘與諸將圍棋以示閑暇吳錄武陵王曄性清簡尚書令王儉詣曄曄留儉設飯盤中菘菜鮑魚而已儉重其真率為食菘魚盡歡而去齊書晚菘周顒清貧寡慾終日疏食雖有妻子獨處山晚甚機辨文惠太子問顒菜食何味最勝顒曰春初早韭秋末晚菘上范元琰家貧唯以園疏為業嘗出行見人盜其菘菜元琰遽退走毋問其故具以狀答問盜者為誰荅曰向所以退畏其媿恥今啟其名願勿泄也于是母子秘之或有涉溝盜其笋者元琰伐木為橋以度之自是盜者大慚一鄉無復草竊梁書孟卿為趙郡太守政尚寬和權豪無犯山中老人曾以㹠酒饋之信和顏接引殷勤勞問乃自出酒以鐵鐺溫之素木盤菁蕪葅而已北史仲冬是月也菜結蕪菁葵等雜菜浸之並為醎葅有得其和者並作金釵色今南人作醎葅以糯米熬搗為末并斫胡𣸹汁和釀之石笮令熟葅既甜脆汁亦酸美呼其莖為金釵股醒酒所宜也荊楚歲時記巂州界緣山野間有菜大葉而粗莖其根若大蘿蔔土人蒸煮其根葉而食之可以療飢名之謂諸葛菜云武侯南征用此菜蒔於山中以濟軍食亦猶廣都縣山櫪林謂之諸葛木也雲南記諸葛所止令兵士獨種蔓菁者取其絻出甲者生㗖一也葉舒可煮食二也久居隨以滋長三也棄去不惜四也回則易尋而採之五也冬有根可斸食六也比諸蔬屬其利不亦慱乎三蜀之人今呼蔓菁為諸葛菜江陵亦然劉賓客嘉話薺菜菜甚小自生園圃其實曰蒫爾雅云蒫薺實詩曰其甘如薺謂此菜之美也故以薺為薺菜也薺以美冬水氣也薺甘味也乘於水氣故美者甘勝寒也薺之言濟所以濟大水也春秋繁露高力士逐于巫山山谷多薺而人不之食因為詩寄意兩京作斤賣五溪無人採夷夏雖有殊氣味終不改明皇雜錄薺解小而引大了淺而伸深以牛刀割雞長殳劉薺物理論桓公北伐山戎出冬葵布之天下桓公憂北郭民貧管子請禁去市三百步者不得樹葵菜此則亦有以相及也管子馬佚食葵魯監門女相從績中夜而泣其偶問其故曰宋桓司馬得罪於宋出於魯馬佚食吾園葵是歲吾園人亡一年之利越攻吳諸侯畏其威魯往獻女吾踈馬兄往視之道畏而死由此觀之禍與福相及也韓詩外傳魯漆室有女過時未適人倚柱而哭鄰婦謂曰何哭之悲也欲嫁乎女曰吾憂魯君老而太子少也婦曰此魯大夫憂焉女曰昔有晉客舍吾家繫馬於園馬佚踐吾園葵使吾終歲不厭葵未鄰女奔亡倩吾兄追霧出以求溺流而死使吾終身無兄吾聞河潤九里漸如三百步今魯國微弱禍將及人三年魯果亂列女傳齊慶克通於聲孟子鮑牽見之告國武子武子召慶克謂之夫人訴之乃則鮑牽仲尼曰趙莊子之智不如葵葵猶能衛其足左成下食茹拔葵公儀休為魯相食茹而美拔去園葵也史記江統上天子書曰今西園賣葵菜藍子雞麪之屬虧敗國體貶損令門晉書彭城王攸字子深少孤獨種葵三畝數被人盜之攸密令人書葵葉下明旦市中看之遂得偷者北齊冬得生葵丁次都不知何許人也為遼東丁氏作人丁氏嘗使買葵冬得生葵問冬何得有葵云從日南買來列仙傳聖人之於道猶葵之於日雖不能終始哉其鄉之者誠也淮南若葵藿之傾葉太陽雖不為之迴光終向之者誠也選曹子建求通親親表廣雅曰蘬葵也注丘軌切齊民要術云蘬丘葵也疑誤胡葵廣志曰其花紫赤陶隱居曰似秋種葵覆養經冬至春作子謂之冬葵本草圖經云苗葉作菜茹更甘美爾雅所謂菺戎葵者也郭璞云如木槿華戎蜀蓋其所自因以名之花有五色有紅者又號一丈紅錦葵錦葵花小葉圓終葵一名落葵一名天葵一名繁露一名承露一名藤葵爾雅所謂蔠葵蘩露是也郭璞云大莖小葉紫蓴色陶隱居云人家多種之葉惟可𩚫鮓子紫色女人以漬粉傳面為假色俗呼為胡燕脂蜀本圖經云蔓生葉圓厚如杏葉子如五味子生青熟黑所在有之食療云其子令人面鮮華可愛取蒸烈日中曝乾挼去皮取仁細斫和白蜜傳之甚驗落葵人食落葵為向所齧作瘡則不瘥或至死博物志龍葵本草唐本註云即關河間謂之苦菜者葉圓花白子若牛李子生青熟黑旦堪煮食不任生噉孟詵云其味苦挼去汁食之食醫心鏡云龍葵作羹粥食之並得圖經云惟北方有之北人謂之苦葵葉圓似排風而無毛𦮼葵爾雅曰莃𦮼葵郭璞註云頗似葵而小葉狀如藜有毛汋啖之滑廣志云免葵淪之可食本草唐本註云苗如龍苪葉光澤花白似梅莖紫色煮汁極滑堪食劉禹錫所謂動搖春風者也荊葵一名芘芣爾雅曰荍蚍衃是也郭璞註云似葵紫色陸璣云似蕪菁華紫綠色可食微苦錢葵錢葵叢低又一種千葉可愛鳧葵馬融傳曰桂荏鳧葵葉圓似蓴生水中一名水葵蒲葵可食葉似葵而大中作扇謝安取蒲葵扇中者捉之是也顏氏家訓云蔡朗父諱純遂呼蓴菜為露葵王維詩云松下清齋折露葵意謂帶露之葵不指蓴菜蓋蓴菜非輞川所有宋玉諷賦云烹露葵之羹曹植七啟云霜蓄露葵語並在蔡朗前亦不指蓴菜楚葵楚葵即水中芹菜澤葵澤葵即莓苔鮑昭蕪城賦澤葵依井是也鴨腳葵今世葵有紫莖白莖二種種別復有大小之殊又有鴨腳葵也齊民要術別有鴨腳肫耳鮑明遠葵賦崔寔曰六月六日可種葵中伏後可種冬葵九月作葵菹乾葵家政法曰正月種葵上陶隱居云以種種葵覆養經冬至春作子謂之冬葵本草陳葵子微火炒令爆叱散著熟地中遍踏之朝種暮生遠不過宿陳葵子秋種覆蓋令經冬不死至春有子是也博物志葵葉為百菜主其心傷人俗呼為西王母菜食之益人本草蓴帝問師曠曰欲知何牛馬貴賤秋葵下小葵生牛馬貴大葵不䖝牛馬賤師曠占摘葵古者葵稱露葵又終葵一名繁露今摘葵必待露解語曰觸露不搯葵日中不剪韭各有宜也爾雅翼潘岳閑居賦曰綠葵含露白薤負霜夢城生葵符堅將欲南師夢葵生城內明以問婦婦曰若征軍遠出難為將也異苑字本作䐑水葵也圖經云蓴乃菜之上味生水中葉似鳧葵三月至八月莖細如釵股短長隨水淺深名蓴絲味甘而體軟霜降後萌在泥中粗短名瑰蓴味苦而體又有石蓴似紫菜青色蓴龜蓴菜之根絕美江東人謂之蓴龜酉陽雜俎四月蓴生莖而未葉名為雉尾蓴五月蓴葉舒長名絲蓴入七八月不中食有蝸蟲故也又至十月䒷凍蟲死雖老猶可食雞跖集張翰晉惠朝齊王冏辟為東曹掾謂顧榮曰吾本山林間人無望于時子善以明防前以知慮後榮曰吾亦與子采南山蕨飲三江水耳翰因見秋風起乃思吳中菰菜蓴羹鱸魚膾嘆曰人生貴得適志耳何能羈宦數千里以要名爵乎遂命駕而歸晉書陸機請王武子武子前置數斛羊酪指以示陸曰卿江東何以敵此陸云有千里蓴羹但未下鹽豉耳世說齊高帝設蓴膾崔祖思曰此味故為南北所推沈文季曰千里蓴羹豈關魯衛然則千里蓋吳中地名前人以比末下鹽豉皆地名無疑也寓簡世說新語陸機云云鹽豉耳觀但耳二字語意自明曾三異乃謂末字誤書為未而以末下為地名欲與千里對言是未嘗閱世說新語也墅談斷蓴陶子鏘母嗜蓴母沒終不味蓴丹陽張承先家有鬼長為取他物會有客𨔵蓴二斗鱧魚二十頭鬼將一小兒置驃騎令小兒睡眼覺看藍中已有魚鱧集異記河東常醜奴泛湖邊拔蒲暮宿空舍時日暮見一女姿容極美乘船載蓴至舍寄住變而為獺幽明錄沈顗字處默逢兵荒與家人并日而食或有餽其梁肉者閉門不受惟採蓴菜供食以樵採自資南齊梁世有蔡朗父諱蓴既不涉學遂呼蓴為露葵面墻之徒遞相倣效承聖中遣一士大夫聘齊齊主各即李恕問梁使曰江南有露葵否荅曰露葵是蓴江南所出卿今食者綠葵菜耳顏氏家訓急就章云老菁蘘荷冬日藏顏師古注蘘荷一名蓴苴莖葉似薑其根香而脆可以為葅又辟蠱毒本草云葉似初生甘蕉根似薑芽性好陰在木下生者尤美中蠱者服其汁臥其葉即呼蠱主姓名周禮庶氏以嘉草除蠱毒宗懍謂嘉草即此也柳子厚種白蘘荷詩庶氏有嘉草攻檜事久泯注引本草蘘荷似葍苴而白葍苴色紫花生根中花未敗時可食久置則銷爛不為實矣葉似姜宜陰翳地種之古今注蘘荷宜陰時藿向陽潘安仁閑居賦葍蒩說文一名葍蒩古今注紫者曰葍蒩白者曰蘘荷解毒用白蘘荷陶隱居葍作覆蔣士有傭客得疾下血醫以中蠱乃密以蘘荷根布席下不使知乃狂言曰食我蠱者乃張小人也乃呼小小亡去今世攻蠱多用蘘荷根往往驗蘘荷或謂嘉草搜神記人得蠱取蘘荷葉著臥席下不使知立呼蠱姓名葛洪方花似美蓉馬融廣成頌芝荋堇荳蘘荷𠌼渠章懷注曰蘘荷苗似薑根花紅紫似美蓉可食其葉似初生甘蔗根似薑芽其葉冬枯其根為菹亦可醬中藏古之為味者雜用膾炙切蘘荷以為香是為珍味爾雅翼預知子傳云取二枚綴衣領上遇蠱毒物則聞其有聲當便知之故名預知子上落蘇美茄也錢王有子跛足以聲相近故止呼落蘇酉陽蔡樽為吳興太守不飲郡井水齋前自種白莧紫茄以為常餌詔褒其清加信武將軍梁書四年改胡床為交床改胡瓜為白露苽改茄子為崑崙紫苽大業拾遺錄南土無霜雪生物不復凋枯種茄子十年不死生子皆攀緣摘之樹高至二丈嶺南異物志南中草菜經冬不衰故蔬園之中栽種茄子宿根有二三年漸長枝翰乃為大樹每夏秋熟則梯樹摘之三年後樹漸老子稀即伐去別栽嫩者嶺表錄異茄子本蓮莖名革遐反今呼伽未知所自成式因就節下食有茄子數蔕偶問張周封故事張云一名落蘇事具本草成式記得隱侯行園詩云寒瓜方臥隴秋菰正滿陂紫茄紛爛漫綠芋鬱參差嶺南茄子宿根成樹高五六尺姚向曾為南選使親見之酉陽雜俎茄子浦水經云石頭西對蔡浦浦長百里上有大荻浦下有茄子浦上蘇門荅剌國有大茄樹高丈餘經三四年不瘁子大如西瓜重十餘斤人以梯摘之志禦濕姜禦濕之菜也援神契說文璇星散為姜風土失得逆時則姜有翼辛而不臭也春秋運斗樞宋玉因其友見楚相待之無以異讓其友其友曰夫姜桂因地而生不因地而辛女因媒而嫁不因媒而親韓詩外傳楊樸和之美者楊樸之姜招搖之桂越駱之菌呂覽蜀薑孫權嘗使介象作變化種菜瓜百羗皆立生可食先主論鱠魚何者㝡美象曰鯔魚為上先主曰論近道魚耳此出海口安可得乎象曰可得耳乃令人於殿庭中作方坑汲水滿之并求釣象餌之垂綸於坑中不過項刻得鯔魚先主大驚喜問象曰可食否象曰故為陛下取安敢取不可食之物乃使廚下切之先主曰聞蜀薑作虀至佳此間薑永不及也恨此時無此薑爾象曰蜀薑豈不易得願差所使行者并付以直象自書一符以青竹丈使行人閉目騎杖杖止便買薑買薑畢復閉目此人承其言騎杖須臾已到成都不知是何處問人人言是蜀市乃買薑于時吳使張溫市見之問曰與帝買薑於是甚驚作書寄象此人買薑畢捉書騎竹扙閉目復須臾已還吳廚切膾亦適了也神仙傳郎中喬翻於洋渚遇神人意欲啖薑而市無之神人以絹數疋并書一牒付信入市門南下任意所之須臾得薑數斗還以問神人神人曰問李先生當知我李先生傳伏波將軍唐資傳蜀人煞薑法先洒掃別麄細為三輩盛著籠中作沸湯沒籠著湯中𨔵臾取一片橫截斷視其熱否薑既熱訖便內著甖中細擣米末以覆上令薑不見訖以向湯令復沸使相掩消息視甖中當自沸沸便陰乾之博物志孔秀之為臨川太守在任清約罷郡還獻乾薑二斤武帝嫌其少知琇之清乃嘆息齊書周捨占對辨捷嘗居直廬語及嗜好裴子野言從來未嘗食薑捨應聲曰孔稱不撤裴乃不嘗一座皆悅梁書唐崔鉉暴亡梁新聞之診之曰食毒僕曰常好食竹雞多食半夏苗必是半夏毒命生薑捩汁灌之即活千畦萬家之城千畦薑韭其人與千戶侯等史記不知滋味倭國有薑不知其滋味魏志妊娠不啖妊娠者不可啖生薑令兒盈指博物志苦葉匏有苦葉匏瓠也葉小可為羹揚州人恒食至八月葉即苦故云苦葉陸機毛詩疏義諸侯伐秦及涇莫濟叔向見叔孫穆子穆子曰豹之業及匏有苦葉矣不知其它叔向召舟虞與司馬曰夫苦匏不材與人共濟而已是行也魯人以莒人先濟諸侯從之魯語瓠落惠子曰魏王貽我大瓠之種我樹之成而實五石以盛水漿其堅不能自舉剖之以為瓢則瓠落無所容非不大也吾為其無用而剖之莊子曰夫子固拙於用大也莊子魏文侯見箕季牆壞不治問其故曰不時又逢瓠羹文侯曰牆壞不築教民無奪民農功貽我瓠羹教我無多歛百姓新序杜預病癭吳人憚其智計以瓠繫狗之頸每大樹以癭輒斫使白題曰杜預頸及城平盡捕殺之晉書甘瓠脯祖逖在河南百姓感悅嘗置酒大會耆老中坐流涕曰吾等老矣更得父母死將何恨乃歌曰幸哉遺黎免俘虜三辰既朗遇慈父玄酒忘勞甘瓠脯何以詠恩歌且舞其得人心如此上徐文伯曾祖熙好蓴老隱於秦望山有過求飲留一瓠瓢與之曰君子孫宜以道術救世當得二千石熙開之乃扁鵲醫經一卷宋書卞彬性好飲酒瓠臺瓠勺炕皮為肴著帛冠十二年不改易以大瓠為籠什物多諸詭異自號卜田居齊書強練師不知何許人所至之處人皆敬而信之晉公護未誅之前曾手珤一大瓠到護門外扺而破之乃大言曰瓠破子苦未磨而護誅諸子並伏法後周書今豫州汝南郡城西北汝水左出西北流又屈而東轉又西南會汝形若垂瓠耆老云城取名焉水經刃磨瓠傷干將之刃未磨瓜瓠不能傷論衡婦人踈孕者子活乳數者子死譬若瓠華多實少上燒穰殺瓠俗說家人燒黍穰則使田中瓠苦死也風俗通用汁朱崖澹耳無水唯種大瓠藤斷其汁用之亦足太康地記一年之計莫若樹榖十年之計莫若樹木終身之計莫若樹人瓜瓠葷菜不備國之貧也管子牛踐子苦匏瓠牛踐苗則子苦草木子匏可為笙匏瓠也壺盧匏之無柄者也瓠有柄曰懸匏可為笙曲沃者尤善秋乃可用用則漆其裏古今注賤生於無所用中流失舡一壼千金壺即匏也鶡冠子外澤內麄張裔字君嗣如瓠壺外雖澤而內實麄蜀志齊武成帝皇后胡氏安定人魏中書令兗州刺史延之女也母盧氏范陽道約女也初懷孕有胡僧來諸門曰此宅瓠盧中有月既而生后三國典略長柄壺盧陸士衡初入洛諮張公所宜曰詣劉道真是其一既往劉尚哀制中性耆酒禮畢初無他言唯問東吳有長柄壺盧卿得種來否陸兄弟殊入望乃云悔去世說胡盧笙交阯人多取無柄之瓠割而為笙上安十三蓴吹之音韻清響雅合律呂嶺表錄異宋國有田夫常衣縕黂自曝於日顧謂其妻曰負日之暄人莫知者以獻吾君將有重賞里之富室告之曰昔人有美戎菽甘枲莖芹萍子者對鄉豪稱之鄉豪取而嘗之蜇於口慘於腹眾哂而怨之其人大慚子此類也列子野人美芹願獻之至尊呂子覽爾雅莕接余其葉苻陸璣云白莖葉紫亦色正圓徑寸餘浮在水上根在水底與水澡淺等大如釵股上青下白鬻其白莖以苦酒浸之脆美可案酒顏之推云荇先儒解釋皆云水草圓葉細莖隨水淺深今是水悉有之蓴花似蓴江南俗亦呼為豬蓴或呼為荇菜而河北俗人多不識之慱士皆以參差者是莧菜呼人莧為人荇亦可笑矣胡荽胡荽曰胡荽井州人呼為香荽為石勒諱也沖晦處士李退夫者為事矯怪居京師北郊一日種葫荽俗傳主人口誦猥語則茂退夫撤薑密誦曰夫婦之道人倫之正時云云不絕于口忽有客至命其子畢之子執餘種曰大人已曾上聞皇祐中館閣中或談論則曰宜撒葫荽一巡江南野錄蕨一名𧆊𠌼牙也四皓食之而壽夷齊食之而夭搜神記曰郗鑒鎮丹徒二月出獵有甲士折一枝食之覺心中淡淡成病後吐一小蛇垂之屋前漸成乾蕨此物不可生食草木疏曰周秦曰蕨齊魯曰𧆊薇生水傍葉如萍爾雅云薇垂水三秦記夷齊食之三年顏色不變武王戒之乃不食而死然詩云采薇者乃金櫻芽也紫菜吳郡緣海記曰郡中海邊諸山悉生紫菜吳賦云綸組紫菜是也注紫紫菜也生海水中正青附石生取乾之則紫色臨海常獻之義熙二年有苦買菜生揚州營士陳蓋家莖高四尺六寸廣二尺二寸是後歲多征伐人民疾苦故苦買者買苦也晉書安帝記唐景龍二年郿縣民王上賓家有苦買菜高三尺餘上廣尺餘厚二分真珠船近長沙地名白鶴樓民家圃內有苦買菜開蓮花七日方謝似梅飲酒鬼目似梅南人以飲酒廣志鬼目樹大者如李小者如鴨子二月花色仍蓮著實七八月熟其色蓴味酸以蜜煮之滋味柔嘉交趾武平興古九真有之也南方草物狀為漿鬼目益知直爾不可噉可為漿也裴淵廣州記鬼目樹似棠梨葉葉如楮皮白樹高大如木瓜而小耶傾不周正味酢九月熟又有草昧子亦如之亦可為糝用其草似鬼目顧微廣州記鹿角猴葵色赤生石上南越謂之鹿角南越志步廊山有一樹如桃而氣是羅土人謂為山羅勒也遊名山志葙葙根以為菹香辛廣志優殿合浦有菜名優殿以豆醬汁茹食之甚香美可食南方草木狀雍雍菜生水中可以為菹也廣州記冬風東風菜陸生置肥肉作羹味如酪香氣似馬蘭上糓字林曰糓菜生水中蔊菜音䍐味辛荳胡對反呂氏春秋曰菜之美者有雲夢之荳荶似蒜生水中菹菜紫色有藤羸菜葉似竹生水傍繤菜繤菜似蕨菜似蕨生水中葟菜似蒜生水邊爇菜徐鹽反似䓠荃菜也一曰深草蓶菜音唯以烏韭而蓴䓠菜他合反生水中𧄔菜根似芋可食又云署預別名安南有羞菜蔓生水上甘美可食人過池中以手指爾羞否即時憔悴羞色待其人去漸青如初詩云言採其遂毛云惡菜也詩義疏曰今羊蹄似蘆菔菳赤煮如茹滑而不美多噉令人下痢齒陽謂之遂一名蓚齊民要術睡菜五六月生田塘中葉類茨菰根如藕梢土人採根為鹽葅或云食之好睡六合葵憲宗時有處士伊祁玄解縝髮童顏氣息香潔帝知其異人遂令異詔入宮內館於九華之室每日親自訪問頗加敬仰因問之曰先生春秋高而顏色不老何也玄解曰臣家于海上種靈草食之故得然也即於衣間出三等藥實為帝種於殿前一曰雙麟芝二曰六合葵三曰萬根藤六合葵色紅而葉類於莪葵始生六莖其上合為一株其生十二葉內出二十四花花如桃花而一朵千葉一葉六影其成實如相思子爾雅曰蘇桂荏也方言曰周鄭之間謂之公湘沅之間謂之蘇之小者謂之薰葇長沙定王故宮有蓼園云定王故園也菜之辛者謂之蓼任昉述異記吳都賦云綸組紫菜爾雅注云綸似綸組似組綸乃有秩嗇夫所帶紏青絲綸揚子所謂五兩之綸半通之銅者也組綬也海中草生采理有象之者因以名焉苹䓑其大者蘋葉正四方中折如十字根生水底葉敷水上不若小浮萍之無根而漂浮也故韓詩曰沈者曰蘋浮者曰薸薸音瓢即小萍也蘋亦不沈但比萍則有根不浮游爾五月有花白色故謂之白蘋呂氏春秋曰菜之美者崑崙之蘋萍焉陸璣詩莪疏曰可糝蒸為茹爾雅翼鹽醎也鹽池河東鹽池袤五十里廣六十周一百四十里鹵西方鹹也東方謂之斥西方謂之鹵醝醎也河內謂之鹹說文䴛𪉮𪉱鹽也廣雅大夏鹽和之美者大夏之鹽呂覽僖三十年冬王使周公閱來聘饗有昌歜白黑形鹽辭曰國君文足昭也武可畏也則有備物之饗以象其德薦五味羞嘉糓鹽虎形以獻其功吾何以堪之左齊有渠展之鹽燕有遼東之煮十口之家十人䑛鹽百口之家百人䑛鹽凡食鹽之數一月丈夫五升少半婦人三升少半嬰兒二升少半鹽之重升加分耗而釜百升加十耗而釜千君伐葅薪煮泲水為鹽正而積之三萬鍾至陽春農事方作令民無得築垣牆毋得繕冢墓丈夫毋得治宮室立臺榭北海之眾無得聚庸而煮鹽然鹽之賈必四什倍君以四十之賈循河濟之流南輸梁趙宋衛濮陽𥯘食無鹽則腫守圉之本其用鹽獨重君伐葅薪煮泲水以籍於天下然則天下不減矣管子桓公成鹽三萬六千鍾令使糴之得成金萬一千餘斤上桓公通齊國之魚鹽于東萊國語載鹽秦穆公使賈人載鹽百里奚使將車世說宿沙瞿子善煮鹽使煮滔沙雖十宿沙不能得也魯連子宿沙作煮鹽世本宿沙衛齊靈公臣齊濱海故衛為魚鹽之利宋志張儀說趙王曰今日楚與秦為兄弟之國而韓魏稱為藩臣齊獻魚鹽之地斷趙之右臂春秋後語穿井煮鹽宣帝地節中始穿井數十所煮鹽蜀王本紀牢盆募民月給費用官器作煮鹽官牢盆史記海水為鹽吳東海水為鹽國用饒足漢書盜起獨完賈復為縣掾迎鹽河東會盜賊起等輩放欺其鹽復獨完還致縣中東觀漢記河東載鹽第五倫自以久為官不達遂將家屬客河東變姓名自稱王伯齊載鹽往來又太原上黨所過輒為糞除而去後漢道陵所開陵州井乃東漢張道陵所開曰狼毒井有毒龍藏井中及鹽神玉女二十為崇天師以道力驅出毒龍禁玉女于井下然後人獲鹽泉之利郡志衛凱與荀彧書曰夫鹽國之大寶也自亂以來放散宜如舊置使者監賣以其直盜市犁牛若有歸民以供給之魏志朱桓卒家無餘財孫權賜鹽五千斛以周喪事吳志府尉主鹽先主定益州置鹽府尉主鹽鉄之利蜀志食餅知鹽生衛倫以即應會于京師過予而論及于味倫稱魏故侍中劉子揚食餅知鹽生精味之至也予曰昔師曠織勞薪易牙別淄澠子揚之妙抑未乎倫曰晉師曠易牙古之精也魏之子揚今之妙也予何間焉皇甫謐玄晏春秋晉符朗元達識味會稽王道子設食食之極江左精饌食記問曰關內食熟若此朗曰皆好惟鹽味少生即問宰夫果如其言裴景春秦書郭文子文舉隱居吳興無餘杭大辟山中桓著鹿裘葛巾不飲酒食肉區種菽麥採草葉木實𧵍鹽以自供人或下價者亦即與之晉書豫章王大會賓僚張融食炙始行畢行炙人便去融欲求鹽蒜口終不言方食搖指半日乃息宋書崔慰祖父喪不食鹽母曰汝既無兄弟又未有子息不滅性故當不進肴羞耳如何去鹽吾今亦不食矣慰祖不得已從之齊書世祖南伐遣李孝伯賜劉義恭等鹽各九種并胡皷李孝伯曰有後詔凡此諸鹽各有所宜白鹽食鹽主上自所食黑鹽治腹脹氣刮取末之六銖以酒下胡鹽治目痛戎鹽治諸瘡赤鹽駮鹽臰鹽馬齒鹽四種非食鹽後魏書沮渠蒙遜平酒泉於宋繇室德書數千卷鹽米數十斛而已蒙遜嘆曰孤不喜尅李氏欣得宋繇耳侯景臺城晏集其黨又召僧道取肉搵鹽以進景問曰好不景荅所根大鹹僧通曰不鹹則爛及景死王僧辨截其二乎送齊宣又傳首往江陵果以鹽五斛置腹中送于建康暴之于市百姓爭取屠膾羹食皆盡梁書崔暹奏請海沂煮鹽有利軍國文襄以問崔昂昂曰亦既官煮斷之竈官力雖多不及人廣諸淮開市薄為竈稅私館給彼此有宜朝廷從之北齊不食水病房景伯母亡居喪不食鹽菜因此遂為水病積年不愈上狀如方印武德中長安古城鹽渠水生鹽色紅白味甘狀如方印唐書左右神策鹽州行營節度使胡鹽昌皆表奏初城鹽州鹵中獲壤土又置烽堡水路迴遠即時有酒廢鹽井悉生鹽事符聖德可謂天𢐦請宣付史館制可正鹽官法劉晏正鹽官法以䃘用度韓滉判度支方是時潦敗河中鹽滉奏地產瑞鹽此土德之瑞帝疑遣諫議大夫蔣鎮廉狀鎮畏滉還乃賀帝且請置祠號寶應靈慶池韋處厚再遷中書舍人張平叔以言利得幸以帝建言官自鬻鹽寵天下之財宰相不能詰下群臣議處厚發下難誚其迂謬平叔愧縮遂寢劉晏京師鹽暴貴詔取三萬斛以膽關中自揚州四旬至都人以為神初摧鹽起於第五琦及劉晏伐其任法術精密官無遺利初歲入錢六十萬貫李歲十倍而人無厭苦大曆末通計一歲征賦所入而鹽醝當天下大半之賦李晟既薨城鹽州復故池以新鹽賜宰相帝思晟乃致鹽靈座王仲榮中人田令孜怒重榮據鹽池之饒于時巨寇甫定國用大乏諸軍無所仰而令孜為神策軍使建言請二池領屬鹽鐵佐軍食重榮不許奏言故事歲輸鹽三千乘于有司則斤所餘以贍軍天子遣使者輸旨不聽蛤垛鹽池李師古棣州有蛤垛鹽池歲產鹽數十萬斛李長卿以州入朱滔獨蛤垛為李納所據以專利後德棣入武王俊納乃築壘德州南跨河以守蛤垛謂之三汊鄭畋請以嶺南鹽鐵委廣州節度使韋荷歲煮海取鹽四十萬緡市處吉米以贍安具舟以載杜中立以蔭為義武節度使舊傜車三千乘歲輓鹽海瀕民苦之中立置飛雪將數百人具舟以載自是民以勞軍食足矣姜師度為河中尹安邑鹽屯涸廢師度大發卒洫引其流置鹽屯公私收利不貲盧弘正初兩池鹽法𥱼得費不相償弘正使判官司空與檢鈎釐正條上新法即表與兩池使自是課入歲倍用度賴之計口授鹽盧商為蘇州刺史吏以鹽法求羸貲民愈困商令計口授鹽無常額人便之司空與當大中時盧弘正管鹽鐵表為安邑兩池榷鹽使先是法疏闊吏輕觸禁與為立約數十條莫不以為宜臨卭火井諸葛亮往視之後火益盛以盤貯水煮之則得鹽後人以火投井中火即滅至今不然博物志姚彪至武昌遇風與沈浙渚守風糧盡用江遣人從彪貸鹽百斛彪得書不荅勑左右倒鹽百斛著江水中曰明吾不惜所與耳笑林顆白似玉高昌國遣使貢鹽二顆顆大如斗狀白似玉帝以其自萬里絕域而來䳭數年方達命杰公迓之謂其使曰鹽一顆是南燒羊山月望收之者一是北燒羊山非月望收之者使者具陳鹽奉王急命故非時爾因問紫鹽䃜珀云自中路遭北涼所奪不敢言之帝問杰公曰群物之異對曰南燒羊山鹽文理粗北燒羊山鹽文理密月望收之者明徹如䒷以䳏𩼈煮之可驗交河之間平磧中掘深數尺有末鹽如紅如紫色鮮味甘食之止痛更深一丈下有䃜珀黑逾純漆或大如車輪末而服之攻婦人小腸癓瘕諸疾彼國鷄異必當致貢是以知之梁四公子記陵州鹽井陰氣襲人入者輒死侯雨入井則隨雨施王後人以木盤貯水鑿竅酸水如雨點於井上筆談至華鹽胡中有鹽瑩澈如水晶謂之玉華鹽金樓子白鹽崖有鹽如水精謂之君王鹽酉陽雜俎盤中只有水晶鹽李河東有印成鹽西方石子鹽胡中青鹽五原紫鹽波斯之鹽也廣志按鹽有赤鹽紫鹽黑鹽青鹽蓴鹽亦有如虎如印如繖如石如水晶狀者北戶錄北狄有青鹽五原有紫鹽博物志天竺國有黑鹽續漢書西海南有青鹽紫鹽池鹽方寸半食味甚美西域記恩州有鹽𦗓色如絳雪驗之即由煎時染成差可愛也五代于闐晉天福二年遣使來貢紅鹽桃花鹽鄭公虔云琴湖池桃花鹽色如桃花隨月盈縮在張掖西北鹽花山龍巢山旁有鹽池水色白上有紫菱四邊青泥十一月中池左右十餘里地草上如霜彌日不什嘗之乃鹽味世謂之鹽花山襄丐記天竺有水其名恒源一號新陶水特甘香下有石鹽狀如石英白如水精味過香鹵萬國畢仰南州異物志蜀瞿灘有鹽井一百所巴川資以自給粒大者方寸中央隆起形如張傘名曰傘子鹽有不制者形亦必方異于常鹽矣晉書地道記云入湯口四十三里有石煮以為鹽石大者如升小者如拳煮之水竭鹽成水經注高昌國出赤鹽其味甚美復有白鹽其形如玉高昌人取以為枕貢之中國後魏書朔方縣有大鹽池其鹽大而青白名曰青鹽又曰戎鹽入藥用漢置典官魏土地記李嗣昭守上黨為汴人所圍城中鹽炭盡嗣昭告天地俄而地生鹹取以煎鹽其美又復掘得石炭晉王自將解圍躬奠其地立二廟曰鹽神炭神海錄高保融明宗時歲給以鹽萬三千石後不復給及世宗平淮故命奉州給之南平世家宋真宗祥符間解州鹽池減水帝遣使珤詔至州祈禱使至夜夢城隍告曰鹽池涸者患在主鹽池之神蚩尤也昔蚩尤與軒轅帝爭戰帝殺之至今遺跡尚存聞朝廷創立祖殿蚩尤懷𤎶故竭鹽池耳使者聞神語覺回奏於帝既而蚩尤數數搆患形諸夢寐群臣具奏遣使信州龍虎山語天師至闕下舉英勇一將制之天師奉旨召來即蜀關將軍乃真君也召至現形帝故喻之乃命往解州勦除鍝尤鹽池如故帝遣王欽若𠌾詔至王泉山致享祠下以謝神貺復新其廟賜額曰義勇武安王徽宗朝加封崇寧至道真君吳郡關祠宋刻穴湧鹽訶陵最富有穴自湧鹽鄯善之東龍城之西南地廣十里皆為鹽曰行人所經牛馬皆布氈臥焉酉陽姜賴之墟今稱龍城恒溪無道以感庭上帝赫怒溢海盪傾剛鹵千里蒺䔧之形其下有鹽累棊而生涼州異物志鹽山二岳三色為質者者如丹黑者如漆小大從意鏤之寫物作獸辟惡佩之為吉戎鹽可以療疾上汶山越雋煮鹽法各異汶山有鹹石先以水潰既而煎之越雋先燒炭以鹽井水沷炭刮取鹽益州記北海南海之貝北海之鹽尸子有清池鹽正四方廣半寸其形扶踈似有人耕池旁地取池水波種之去勿迴顧即生此鹽金樓子漲海州有灣中常出自白鹽嶧嶧如灣細石子天竺國有新陶水水甘美下有石鹽白如水精南州異物志郇瑕延篤與季文德書云晉國郇瑕氏之鹽江夏崔駰慱徒論云江夏之鹽鹽體因於水故或水但于水故或與土雜產于地多則于海濱但未必千里相此耳煮鹽與海同河東有印成鹽而方有石水鹽皆生於水北胡中有青鹽五原有紫鹽波斯國有白鹽如細石子廣志鹽人掌鹽之政令以共百事之鹽祭祀共其苦鹽散鹽賓客共其形鹽散鹽王之膳羞共餄鹽后及世子亦如之凡齊事鬻鹽以待戒令周禮煎油水氣盡無煙不復沸則還冷得水而燄起飛散慱物志孫權至合肥新城滿寵馳往赴募壯士數十人折松為炬灌以麻油從上風放火燒殘攻具魏志蓴初三年車駕幸宛使夏侯尚率諸軍與曹真共圍江陵權將諸葛瑾與尚軍對江權度入江中渚而分水軍於江中尚夜多珤油船將步騎萬餘人於下流潛渡攻瑾諸軍夾江燒其舟船水陸並攻破之上麻膏火燃元康三年武庫火檢校是工匠盜庫中恐罪乃投燭著麻膏中火燃王隱晉書齊王冏起義孫秀多歛葦炬益儲麻油於殿省為縱火具上油灌髮瘕宮人患腰痛牽心發則氣絕徐文伯視之曰髮瘕以油灌之吐物如髮引之長三尺頭已成蛇能動㝡懸之滴盡唯一髮本草沈約年十三而遭家難潛竄會赦乃免既而流寓孤貧篤志好學晝夜不釋卷毋恐其以勞生疾常遣減油滅火梁書張纘為湘州刺史州境大寧曉好積聚多寫書數萬卷有油二百斛采千石他物稱是上灌油擲驢侯景攻臺城為曲項木驢攻城吞石不能制羊侃作雉尾炬施鐵鏇以油灌之擲驢上焚俄盡初侯景既南奔魏相高澄命先剝景妻子面皮悉以油煎殺之衛史王真作亂率其黨襲肅章門不得入乃縱火燒之尉遲運懼火盡真黨得盡乃取油灌木以益大火勢轉盛真不得進乃退後周書柰油柰實和之以凎繪上燥而發之形似油也杏油亦如之釋名成於鹽醬成於鹽而醎於鹽夫物之變有時而重風俗通雷不作醬俗說令人腹內雷聲按子路感雷精而生尚剛好勇死衛人醢之孔子覆醢每聞雷心惻怛耳上劉歆謂楊雄云今學有祿利然尚不能明易又如玄何吾恐後覆醬瓿也漢書濡雞醢醬實蓼濡魚卯醬食蓼濡皃醢醬實蓼魚膾芥醬麋腥醢醬禮記豆醬惡雷作豆醬惡聞雷此欲使人急作不欲積久論衡陸機入洛欲為三都賦聞左思作之撫掌而笑與弟書云此間有傖父欲作三都賦須其成當以覆醬耳世說匏醬調菜孝武嘗謂王玄謨作四時詩云匏醬調秋菜白醝解冬寒宋書阮孝緒外兄王晏貴顯屢至門孝緒度之必至顛覆聞其笳管穿籬逃匿不與相見曾會醬美問之云是王家所得便吐餐覆醬及晏誅親戚咸為之懼孝緒曰親而不黨唯坐之及竟獲免上鄙人有得脠而美之及飯惡與人共食即少唾其中而共者因涕其醬遂棄而俱不得食焉彼亡新王朗欲取天下時乃樂與人分之及已得而重愛不肯與是昔唾脠之類恒譚新論神藥醬西王母謂帝曰神藥上有連珠雲醬玉津金醬中有元靈之漢武內傳漢武帝逐夷至於海濵聞有香氣而不見物令人推求乃是漁父造魚腸于坑中以土覆之香氣上達取而食之以為滋味逐夷得此物因名之置魚腸醬也齊民要術鱁鮧法武帝使唐蒙使南越南越食蒟醬如桑椹取食為醬魚醬晉武帝與山濤書兼致魚醬一斗十二香漿十二香漿以沈香等油煎成服之神仙食經枚乘七發曰熊蹯之𦠌勺藥之醬韋昭上林賦注曰勺藥和齊鹹酸美味也醯人掌共五齊七菹凡醯物以共祭祀之齊菹凡醯醬之物賓客亦如之王舉則共齊菹醯物六十罋共后及世子之醬齊菹賓客之禮共醯五十罋凡事共醯周禮陶隱居云醋俗呼為苦酒丹家又加餘物謂為華池左味苦酒魏名臣奏曰中書監劉放曰官飯苦酒與百姓爭錐刀之末宜其息絕苦酒城吳王築城以醯醢今俗人呼苦酒城吳錄地理志風林鳴醋西王母謂帝曰仙藥有風林鳴醋漢武內傳初薛仁杲拔泰州召富人磔於猛火之上或以醯灌鼻求其金寶唐書注鼻來俊臣鞠囚不問輕重皆注醯干鼻任迪簡萬年人舉進士初為天德軍使李景略判官性重厚嘗有軍立行酒者誤以醯進迪簡知誤以景略性嚴慮坐主酒者乃勉強飲盡之而為容其過以酒薄白景略請換之於是軍中皆感悅有少年眼中常見一鏡子趙卿之曰來晨以魚膾奉候及期延於闑內從容久飢侯客退方得攀接俄而臺上施一甌芥醋更無他味少年飢甚聞芥醋杳輕啜之逡巡再啜遂覺中豁然眼花不見卿云君喫魚膾膾太多芥醋不快故權誑而愈其疾也北夢瑣言孫光憲家婢抱小兒不覺落炭火上便以醋泥傳之無痕本草醢人掌肆豆之實朝事之豆其實韭菹醯醢昌本麋臡菁菹鹿臡醯食之豆其食葵菹蠃醢䐷折醯醢蜃蚔醢豚拍魚醢加豆之實芹菹兔醢深蒲醯醢箈菹鴈醢筍菹魚醢周禮醢人為王及后世子共其內羞王舉則共醢六十罋以五齊七醢七菹三臡實之賓客之禮共醢五十罋上覆醢孔子哭子路于中庭有人弔者夫子拜之既哭進使者而問故使者曰醢之矣逐命覆醢作醢崔寔四民月令曰五月一日可作醢東里弘君舉食檄曰東里獨姥之醢羹爾雅曰肉謂之羹說文曰羹五味和粥也五味者各稱一族之名和合一鼎名曰羹猶威重廉平恩合而為信也秦子彭鏗斟雉帝何饗受壽永多夫何長鏗好和滋味進雉羹于堯堯饗之而錫以壽考至八百歲莊子以為上及有虞下及五伯是也天問緣鵠飾玉后帝是饗言伊尹始仕因緣烹鵠鳥之羹修玉鼎以事湯湯賢之遂以為相上熊羹紆王怒熊羹不熟而殺庖人新序食子羹文王長子曰伯邑考紂烹以為羹以賜文王曰聖人不食其子羹文王得而食之紂曰誰謂西伯聖者與食其子羹而不知帝王世紀中山君享犬司馬子期在焉羹羊不遍子期怒走說楚王伐中山中山君王有二人挈矛隨後問之曰臣父嘗餓且死之君下壺飱哺臣之父故來死君也中山君曰吾與一碗羊羹亡國以一壺飱得二士死國策昭僖侯之時宰人上食而羹中有生肝焉昭侯召宰人而誚之曰汝何為置生肝羹中宰人曰竊以為有欲去上食宰也韓子母作羹方陸續詣詔獄其母至京師餉食續對餉泣曰續母來使者問其故荅曰續母作羹截肉未嘗不方斷葱寸寸無不同是知毋來謝承後漢書啖羹無鹽陶字公超啖蕪菁羹無鹽上菜羹不給桓溫表王濬之孫曰濬今有三孫年出六十室如懸磬餬口江濱四節蒸嘗菜不給晉書湘州刺史王僧虔引樂頤之為主簿以同僚非人棄官去吏部郎庾杲之嘗往侯頤之為設食唯枯魚菜葅杲之曰我不能食此毋聞之自出嘗膳魚羹數種杲之曰鄉過於茅季偉我非郭林宗南史羊羹絕味毛修之被禽入魏敬事嵩山道士寇謙之在魏大武帝信敬營護之故不死修之嘗為羊羹薦魏尚書尚書以為味獻之太武大悅以為太官令被寵遂為尚書封南君公太官令常如故宋書宋末齊高帝輔政劉彥節知運祚將遷密懷異圖及沈攸之舉兵齊高入屯朝堂袁燦鎮石頭潛與彥節及諸大將黃回茅謀夜會石頭詰旦乃發彥節素怯恇擾不自安晡後便自丹陽郡車載婦女盡室奔石頭臨去婦蕭氏孫勸令彥食歠羹瀉胸中手振不自禁南北所推高祖既為齊王置酒為樂羹膾既至崔祖思曰此味故為南北所推侍中沈文季曰羹膾吳食非祖思所解祖思曰炰皃膾鯉似非勾吳之詩文季曰千里蓴羹豈關魯衛之說王甚悅曰蓴羹故應還沈齊書朱緒無行毋病積年忽思菰羹緒妻到市買菰為羹欲奉毋緒曰病後安能食先嘗之遂併食盡毋怒曰我病欲此羹如何必併啖盡天若有知當令汝哽怨緒聞心中芥介然即吐血明日而死上蕭勵為廣州刺史微為太子左衛率勵性率儉而器度寬裕左右嘗將羹正胸前翻之顏色不異徐呼更衣後梁書趙琰字叔起嘗送子冀州聘室過路旁主人設羊羹琰方知盜殺卒辭不食魏書彭城王攸為滄州刺史顯沃縣主簿張達嘗詣州投人舍食雞羹察知之守令畢集攸對眾謂達曰食羹何不還價直也達即伏罪合境號為神明上魏元忠前後三坐棄市偶得不死復舊官因侍宴后曰卿累謗鑠何邪對曰臣猶鹿也羅織之吏如獵者茍𨔵臣肉為之羹爾唐書藜羹盧照鄰字昇之客東龍門山布衣藜羹李林甫子壻鄭平為戶部外即一日林甫就院省女因邀之見其鬚髮班白謂平曰上明日當賜甘露羹鄭即其食此羹縱華皓亦必鬢黑明日果有中使至林甫第賜食因以羹與平食一夕鬢黑明皇雜錄柳玭嘗述家計曰余舊府高公先君兄弟三人俱居清列非速客不二羹夕食齕蔔瓠而已皆保重名於世調羹李白召見金鑾殿論當世事帝賜食親為調羹唐代宗崩德宗即位食馬齒羹不設鹽酪注馬齒菜名今馬齒莧也一名五行草以其葉青梗赤花蓴根白子黑也監晉平公問於叔向曰昔者齊桓公九合諸侯一匡天下不識其君之力乎其臣之力乎師曠侍曰臣請譬之以五味管仲善斷割之顯朋善煎熬之賓胥無善齊和之羹以熟矣奉而進之而君不食誰能彊之亦君之力也新序糲餐瓠羹魏文侯見箕季日晏進糲餐之食瓜瓠之羹文侯語其僕曰食我以糲餐者季豈不能具五味哉教我無多歛於百姓以省飲食之養也上啜羹投漿太宰子朱食侍於令尹子國子國啜羹而熱投漿而沃之明日子朱辭官曰令尹輕行而簡禮其辱人不難明日伏即尹怒曰笞之三百淮南楚有烹猴而召其鄰人以為狗羹也而甘之後聞其猴也據地而吐之瀉盡其食此味始知味者也淮南修務昭帝時大官上食羹中有髮切中有土令承坐不謹敬皆論風俗通李德裕奢侈每食一杯羹其費約錢二萬雜珠玉寶貝雄蓴硃砂煎汁為之過三煎即棄其滓獨異志民皆好啖猴頭羹雖五肉臛不能及之其俗言寧自負人千石之票不願負人猴頭羹臛臨海水物志嶺表錄異曰交趾之人重不錄羹羹以羊鹿雞豬內和骨同一釜煮之令極肥濃漉去肉進之葱薑調以五味貯以盆器置之盤中羹中有觜銀銀杓可受一升即揖讓多自主人先舉即滿斟一杓內觜入鼻仰首徐傾之飲盡傳杓如酒巡行之喫羹了然續以諸饌謂之不錄會亦呼為先惱也交趾人或經營事務彌纔縫推要但備此者會無不諧者安南錄異圖鑿穿心飛頭鼻飲者皆遺風也廣之屬城循州雷州皆黑里象牙小而紅土人捕之爭食其鼻云肥脆偏堪為羹北戶錄齊公曰和與同異乎晏子曰異和如羹焉水火醯醢鹽梅以烹肉魚燀炊也之以薪宰夫和之齊之以味濟其不及以洩其過君子食之以平其心君臣亦然故詩曰亦有和羹既戒既平先王之濟五味和五聲也以乎其心成其政也以水濟水誰能食之昭二十主人女為臣炊彫胡之飯烹露葵之羹披白縠之單杉垂珠步搖來排臣戶相如諷賦臛臛肉羹說文臛者嵩也香氣嵩高也釋名虞悰家富於財而善為滋味豫章王嶷盛饌享賓謂悰曰餚羞有所遺否悰曰何曾食䟽有黃頷臛恨無之齊書九真太守陶璜立郡築城於土穴中得一白色形似蚕蛹無頭長數十丈大餘圍軟軟動莫能名割腹有肉如豬豚遂以為臛甚香羹璜啖一杯三軍盡食劉欣期交州記膾牛與羊魚之腥聶而切之為膾少儀膾春葱秋用芥豚春用韭秋用蓼肉腥細者為膾大者為軒內則切散會和膾細切肉也說文膾會也細切肉散分其赤白異切之乃會和之也釋名伍子胥伐楚未還闔閭治魚作膾過時不至免臭猶須子胥之至也三師到闔閭膾而食之不知其臰後王重作之其味如故人作魚須膾者闔閭之時造也吳越春秋陳登得胸中煩滿面赤不食華佗為脈曰府君胃中有虫數升欲成肉疽腥物所為也即將湯二升先服一升期須盡服之食須吐出三升許虫赤頭皆動半身猶是生魚膾也魏志姜詩妻事姑姑嗜魚膾又不能獨味妻與詩常力作供膾呼鄰母共食其含側忽有泉常出鯉魚一雙以供二母之膳烈女傳船上膾具桓車騎沖在荊州張玄為侍中使至江陵路經陽岐俄見一人珤小籠生魚逕來造船云有魚欲寄作膾張乃維船而納之問其姓字云是劉遺民鱗之張素聞其名大相欣待既知張御命問謝安王文度並佳不張甚欲語言劉子無意既進膾便去云向得此魚觀君船上當有膾具是故來耳於是便去世說郎官鱠江南人喜作鱠名郎官鱠因張翰思鱠得名海物異名記六年吳郡獻海鮸乾膾四瓶瓶容一斗浸一斗可得經尺面盤并奏作乾膾法帝以示群臣云昔術人介象於殿庭鈞得海魚此幻化耳亦何足鷄異今日之膾乃是真海魚所作求自數千里亦是一時奇味即出數盤以賜近臣大業拾遺金虀玉鱠南人魚鱠以細縷金橙拌之號曰金虀玉鱠隋時吳郡獻松江鱠煬帝曰所謂金薺玉鱠東南佳味也陏唐住話南部煙花錄吳中以魚作膾苽羗為美魚白如玉菜蓴若金稱為金羹玉膾一時鷄食春秋佐助吳昭德善造鱸鱠時人朝之曰鱠若值吳縷細花鋪若非遇吳費醋及葫江東呼蒜為葫東坡云吳興庖人斫鱸鱠亦足一笑鄉土以此為盛饌製時鋪成花草鸞鳳或詩句詞章務臻其妙造虀亦甚得法謂之金虀玉膾飛刀和鼎李綱在東宮建成常往溫湯綱時以疾不從有進生魚於建成者將召饔人作鱠時唐儉趙元楷在座各自贊能為鱠建成從之既而謂曰飛刀鱠鯉調和鼎食公實有之至於審諭弼諧固屬於李綱矣舊唐五色鱠陸希聲妻余媚娘能饌五色鱠妙不可及麗情傳鱠手刀子安祿山所賜有鯽魚并鱠手刀子酉陽縠薄絲縷進士瓓碩常識南孝廉者善斫膾縠薄絲縷輕可吹起操刀響捷若合節奏因會客衒技先起魚架之忽暴風雨雷震一聲膾悉化為胡蝶飛去南驚懼遂折刀誓不復作上邢州人和璞嘗謂房琯曰君歿之時必因食魚膾既歿之後當以梓木為棺然不得歿於君之私弟不處出館不處玄檀佛寺不處親友之家其後譴於閬州寄居州人之紫極宮臥疾數日刺史忽具鱠邀房於群齊房亦欣然命駕既歸暴卒州主命攢櫝於宮中棺得梓木為之明皇雜錄李德裕述夢詩荷淨蓬池鱠凡學士初上賊食悉是隺池魚鱠膾莫先於鯽魚袝魴鯛鱸次之鱭魿蓴竹五種為下其他皆強為膳夫錄瓜臛八月雨後瓜菜生於洿下地中作羹臛甚美春秋佐助期乾燥相摶脯摶也乾燥相摶著也修縮也乾燥縮也釋名鬼侯紂脯鬼侯以享諸侯散宜生閱夭南宮适三子者學乎太公見三子知三子之為賢遂酌酒切脯約為朋友尚書大傳魯昭公出奔齊侯使高子執簞食四脡脯公稽首以袵受公羊傳鬥子文三舍令尹無一日之積成王聞子文之朝不及夕也於是乎每朝設脯一束一筐以羞子文至于今令尹秩之成王每出子文之祿必逃王止而後復國語趙宣子將之絳見翳桑之下有餓人宣孟與脯二胊拜受不敢食問其故曰臣有母珤以遺之宣孟更賜之二束遂去呂覽獻蒲為脯二世時趙高用事乃先獻蒲為脯指鹿為馬以驗群臣風俗通古今注野蒲變而為脯西征賦胃脯濁氏以胃脯而連騎貨殖傳晉灼曰今太官常以十月作沸湯燖羊胃以末椒薑坋之暴使燥是也束脯餉軍左慈詣劉表請餉軍有酒一斗器盛脯一束而十人共舉不勝慈乃自出取之以刀削脯投地請百人奉酒及脯以賜兵士酒三盃脯一片食之如常脯味凡萬餘人皆周足而器中酒如故脯亦不盡坐上又有賓客千人皆得大醉葛洪神仙傳麒麟脯王遠至蔡經家與麻姑共設餚膳擘脯而行去是麒麟脯上初太祖乏食程昱掠其本縣供三旬糧頗雜以人脯由是失朝望故位不至公也世說桑虞嘗行宿寄逆旅同舍失脯疑虞為盜虞默然無言便解衣償之主人曰此數失魚雞鴨多是狐狸偷君何以疑人乃將脯往山家問尋求果得之客求還衣虞投之不顧晉書彭城王攸為滄州刺史有一人從函州來驢𥵊鹿脯至滄州界腳痛行遲偶會一人為伴遂盜驢及脯去明旦告州乃令左右及府僚吏分布鹿脯不限其至日見識之推獲盜者北齊同昌公主上贈御饌有紅虬脯非虬也但貯於盤中則虬健如紅絲高一尺以筋抑之無三數分撤即復其故杜陽編贈王績性嗜酒杜之松歲時贈脯元行沖狄仁傑器之嘗謂仁傑曰下之事上譬富家儲積以自資也脯腊膎胰以供滋膳代宗睿真皇后沈氏河南為史思明所沒遂失后所在德宗即位令州縣物色咨訪高力士女頗能言禁中事與女官李真一嘗從后游年狀差似后嘗削脯哺帝傷左指高以剖瓜傷指陶隱居云佛書稱乳成酪酪成酥酥成醍醐醍醐乃酪酥之精華太玄之酪西王母謂帝曰仙藥有太玄之酪漢武內傳陸機詣王武子武子有數斛羊酪指以示機曰東吳何以敵此機曰千里蓴羹未下鹽豉郭子語林陸玩詣王道王公食以酪陸還遂病明日與王牋云昨食酪小過通夜委頓民雖吳人幾為傖鬼世說吳人至京為設食者有酪蘇未知是何於也強而食歸吐遂至困頓謂其子曰與傖人同死亦無所恨然汝故宜慎之笑林賜酪尚書令荀最既久羸可賜乳酪太官隨日給之晉起居注詔分餉讓皇帝憲帝待益厚凡四方所獻酒酪皆分餉之馬酪安祿山其所賜有馬酪酉陽雜俎穆贊兄弟俱有令譽而和粹世以滋味目之贊俗而有格為酥質美而多入為酥蛥為醍醐賞為乳腐近代士大夫言家法者以穆氏為高舊唐宣宗賜韋澳孫宏銀餅餤食之甚美皆乳酪膏腴之所為摭言懿宗迎佛骨入內道場薦瓊膏乳訶陵國所獻也杜陽雜編湩酪回鶻駮馬國資湩酪以食婦人食酪南蠻有望蠻婦人食乳酪粟沃以酪五代仲雲國其食栗沃以酪乳作汁駱澤也乳作汁所使人肥澤也釋名炙炙也炙於火上也脯炙以餳蜜豉汁淹之脯脯然也釜炙於釜汁中和熟之也銜也銜炙細蜜肉和以薑椒鹽豉已乃以肉銜裡其表而炙之也貊炙全體炙之各自以刀割出於胡貊之為也釋名文公之時宰臣上炙而髮繞之文公召宰人而譙之曰女欲寡人之哽耶奚為以髮繞炙宰人首再拜請曰有死罪三援礪砥刀利猶干將也切肉肉斷而髮不斷臣之罪一也援木而貫臠而不見髮臣之罪二也奉熾爐炭火盡赤紅而炙熟而髮不燒臣之罪三也堂下得無微有疾臣者乎公曰善乃召其堂下而譙之果然乃誅之一曰晉平公觴客云云韓非子魚炙屈到嗜芰有疾曰祭我必以芰及祥宗老將薦芰屈建命去之曰其祭典士有豚犬之奠庶人有魚炙之薦國語爭食吳王闔閭女嬌恣嘗與王爭食魚炙怨恚而死風土記陳正字叔方為太官令與蓴門侍即有隙因進御食以髮寘炙中光武見之怒將斬正正曰臣當萬死者三山炭增冶吐炎燋膚爛肉而髮不銷臣罪一也匣出佩刀砥礪而虧肌截骨曾不能斷髮臣罪二也臣少事眼目書奏章表猶讀五經具御食臣與丞及庖人六目齊視豈不如蓴門兩目臣罪三也制赦之謝承後漢書顧榮與同僚宴飲見執炙者狀貌不凡有欲炙之色榮割炙啖之曰豈有終日執之不知其味及趙王倫敗榮被執其人為督率救榮得免王祥後母病欲蓴雀炙乃有蓴雀數枚飛入其幕因以供母孝子傳王羲之年十三謁周顗顗異之時重牛心炙座客未噉顗割羲之於是始知名晉書陽桂之役詔檄久之未就齊高帝引江淹入中書省先賜酒食淹素能飲啖食鵝炙垂盡進酒數升訖文誥亦辨齊書煬帝初在藩魚俱羅弟贊以左右從累遷大都督及帝嗣位拜車騎將軍贊性凶暴雪其部下令左右炙肉遇不中意以籤刺瞎其眼有溫者不適者立斷其舌陏書駞峰炙將軍曲良翰能為驢騣駞峰炙甚美酉陽雜俎杜甫字子美客來陽游岳祠大水遽至涉旬不得食縣令具舟迎之令嘗饋牛炙白酒送杜甫後漂寓湘潭間羈旅鷦𪁽於衡州耒陽縣頗為令長所厭甫投詩於宰宰遂致牛炙白酒以遺甫甫飲過多一夕而卒集中猶有贈聶來陽詩也明皇雜錄同昌公主上賜饌則有消靈炙消靈炙者一羊之肉取之四兩雖經暑毒終不臭敗杜陽編杏炙龜炙飲食有杏炙龜炙鱟魚其形如龜十二足子如麻子可為醬色黑足似蟹在腹雌負雄而行南方作炙噉之劉欣期交州記武帝幸芳林園就虞悰求味悰獻粣及雜餚數十與大官鼎味不及也上就悰求諸飲食方悰秘不出上醉后體不怏悰乃獻醒酒鯖鮓一方而已南史三十七婁護字君卿歷將五侯之門每候五侯各遣餉之君卿口厭滋味乃試合五侯所饋之鯖而食甚美世所謂五侯鯖蓋君卿之為也語林或云護兼善五侯不偏食故合而為鯖小說五侯不相能賓客不得來往婁護即辨傳食五侯間各得其歡心競致奇膳護乃合以為鯖世稱五侯鯖以為奇味焉西京雜記鯖音征煎和之名鮓鮓葅也以鹽米釀之如葅熟而食之也釋名還母孟仁為鹽池司馬自能結綱子以捕魚作鮓寄母還之曰汝為魚官而以鮓寄我非避嫌也吳志陶侃少時作魚梁吏常以一坩鮓餉母母封鮓付反書責侃曰汝為吏以官物見餉非唯不能益吾乃以增吾憂也世說費長房又能縮地脈坐客在家至市買鮓刻日之間人見之千里外者數處列異傳十斛鮓蘇峻上成帝十斛鮓陶侃故事坩鮓送婦謝玄與婦曰昨出釣獲魚作一坩鮓今奉送十二年六月吳郡獻大湖鯉腴膳四十坩純以鯉坩為之計一坩䱹用鯉魚三百頭肥羹之極冠於鱣鯖大業拾遺安祿山恩寵莫北其所賜品目有野豬鮓有馬酪酉阻雜俎昭宗至鳳翔帝輟所御膳賜韓全誨等茂貞食鮓美帝曰此後池魚茂貞曰臣養魚以侯天子聞者皆駭韓全誨傳嗜鮓陳陶所居不與俗接唯嗜鮓一㗖或至十臠江南野史鱘鮓潤州土貢鱘鮓地理志仲秋月取折頭鯉子去鱗破腹使膂割為漸米爛燥之以赤秫米飯鹽酒令糝之鎮不苦重踰月乃熟是謂秋鯖慱物志八鷄食醫掌王之八鷄周禮天官八鷄者淳熬也淳母也炮豚擣珍也漬也熬也糝也肝膋也炮牂也先儒不數糝而分炮豚炮牂為二皆非也后世八鷄則曰龍肝鳳髓兔胎鯉尾鶚炙猩唇熊掌酥酪蟬以羊脂為之呂希哲雜記張悅詩云玉榮飛千日瓊筵麗八鷄雞跖集北八鷄醍醐麆沆野駝蹄鹿唇駝乳糜天鵝炙紫玉漿玄玉漿也玄玉漿即馬妳子輟耕錄三群之蟲伊尹對湯曰天子然後可具夫三群之蟲水居者腥獲食者臊草食者羶呂氏春秋肉之美者猩猩之唇貛貛鳥之灸雋觾之翠述蕩獸之𢱯音椀旅象之約旄牛也沃鳳之丸沃西方國九古邜字魚之美者洞庭之鱄東海之醴水朱鼇蒮水之魚名曰鰩其狀若鯉而有翼常從西海夜飛游于東海黃鳥食之止妬鮆魚食之止驕鶌居食之不飢酸餘食之不醉鮨魚食之已狂人魚食之已癡宋景公待善星文者設以珍食施以寶衣其食則有渠滄之鳧前以桂叢庭之鷃蒸以密沫淇漳之鱧脯以青茄九江珠穟爨以蘭蘇華清夏潔灑以纖縞華清井之澄華也拾遺記李善選注云寒今𦙫肉也寒與韓同劉熙什名曰韓羊韓兔韓雞本出于韓國所為鹽鉄論曰煎魚切肝羊淹雞寒崔駰傳亦有雞寒曹植文寒鶬蒸麑名都篇膾鯉臇胎禩寒皃灸熊蟠資暇錄合之湆肉謂之寒廣韻曰煮肉熟食曰𦙫江皋綠箷之筍洞庭紫鬣之魚昆山龍胎之脯玄圃鳳足之葅千里蓴羹萬丈名膾梁吳筠移安定噎鳩之麥洛陽董德之糜河東長若之葱隴西舐背之犢抱罕赤髓之羊張掖北門之豉洞庭負霜之橘仇池連蔕之椒調以濟北之鹽剉以新豊之雞餅說犓牛之腴肥狗之和熊蟠之臑芍藥之醬薄耆之灸鮮鯉之膾秋蓴之蘇白露之茹山梁之粲豢豹之胎楚苗之食安胡之飯七發芳菰精粺霜蓄露葵玄熊素膚肥豢濃肌山鵽斤鷃珠翠之珍寒芳苓之巢穴膾西海之飛鱗臛江東之潛替漢南之鳴鶉七啟晨鳧露鵠霜鵽蓴雀封熊之蟠翰音之跖䴏髀猩唇髦殘象白靈淵之隺萊蓴之鮐丹穴之鷚玄豹之胎七命牛之股凝脂之飯久而不弊熟而不爛甘而不噮酸而不酷醎而不減辛而不烈澹而不薄肥而不鷚和之美者陽樸之薑招搖之桂越駱之菌鱣鮪之醢大夏之鹽宰楬之露其色如玉長澤之卯飯之美者玄山之禾不周之稻陽山之穄南海之秬以上并呂氏春秋本末篇冀野之梁會稽之菰雜俎大梁之黍七命桀紂欲長樂以苦百姓珍怪遠味必南海之薑北海之鹽西海之菁東海之鯨禍天下厚矣武夷食味武夷山神人八月十五日會村人酒行命食或云軟即水苔也或云緗即荇也或云石虭一作蚎䑎即小蟹也或云沙虹鮓即蝦也或云河祇脯即乾魚也味皆甘美諸山記晉元帝始鎮建業每得一豚以為珍膳項上一臠尤美輒以薦帝群臣未嘗敢食時呼為禁臠肉謝琨傳晉人飲食中有寒具乃令環餅也桓玄嘗收書盡聚客觀之客有食寒具者不濯手熱書畫污之自是不設𩟐亦名寒具也雞跖集南齊宮中語云趙鬼食鴨㔅諸鬼盡著調俗間以細剉肉粽以薑桂曰㔅南史唐明皇命射生官射鹿取血煎鹿腸食之謂之熱洛河盧氏雜記貞元中有一將軍家出飰食每說物無不堪喫唯在火候善均五味嘗取敗障泥胡祿修理食之其味極佳酉陽雜俎韓晉公滉在中書嘗召一吏不時至怒將撻之吏曰某有所屬不得遽至乞寬其罪晉公曰宰相之吏更屬何人吏曰某不幸兼屬陰司晉公以為不誠怒曰既屬陰司有所何主吏曰某主二品以上食料晉公公曰若然某明日當以何食吏曰此非細事不可顯之請對于紙過後為驗乃恕之而繫其吏明日遽有詔命既對適遇太官進食有糕糜一器上以一半賜晉公食之美又賜之既退而腹脹歸私第召醫者視之曰食物所擁宜服少橘皮湯至夜可啖漿水粥明旦疾愈思前夕吏言召之視其書皆如其說因復問人間之食皆有籍耶荅曰三品以上日支五品以上而有權位者旬支凡六品至九品者季支其有不食祿者歲支前定錄逸史李栖筠事相同李令問開元中為秘書監頗事飲饌取味慘毒病毒有甲仗數百人隨一火車入門聞堂中人誦經甲仗人迴避良久一朱衣鬼𦔫來踏開聲如震雷自內扶令問出擲火車中載之而去靈怪集合肥人劉最好食雞每刖雙足置木櫃中膏肉瀝盡乃烹之謂之去腥後最病瘍既愈後生小鷄于瘡瘢中每巾櫛必傷血肉被而痛楚積歲而卒徐鉉稽神錄杜邠飲食洪轉既飽即寢人有諫非攝生之理公曰君不見布囊盛米放倒即慢南部新書素麟脂班螭髓謝玄卿遇神仙設素麟脂班螭髓續神仙傳鵝毛脡恩州出鵝毛脡乃鹽藏其味絕美其細如針義恭云小魚一斤千頭未之過也肉食者鄙齊師伐我曹劌請見其鄉人曰肉食者謀之劌曰肉食者鄙未能遠謀左傳九飣食唐御廚進食用九飣食以牙盤九杖裝食味干其間置上前亦謂之香食盧氏雜說腹腴魚腹下肥肉也禮記少儀云冬右腴夏右鰭注冬氣在上腴腹下也夏氣在下鰭春也刀約使契丹有詩云餞行三匹製密賜十貔貍匹製以小大甖為之如黃漆貔貍形如鼠而大北狄以為鷄膳古今詩話雩肉南蠻室利佛逝有獸類野豕角如山羊名曰雩肉味美以饋膳曹元理明筭術嘗過其友人陳廣漢廣漢為之取酒鹿脯數片元理筭曰藷蔗二十五區應收一千五百三十六枚蹲鴟三十七畝應收六百七十三石以牛產二百犢萬雞將五萬雛羊豕鵝鴨皆道其數果蓏肴悉知其所乃曰此資業之廣何供饋之偏耶廣漢慚曰有倉卒客無倉卒主元理曰俎上蒸豚一頭廚中荔枝一柈皆可為設廣漢再拜謝自入取之盡日為歡西京雜記又趙達嘗過故知家故知具酒食紿曰倉卒乏酒肴如何達取盤中雙箸再三從橫之乃言卿東壁下有美酒一斛又有鹿肉三斤何以辭無主人慚曰知卿善射有無特欲相試耳吳志晉庾悅嘗食鵝劉毅字希樂求其餘不應毅御之義熙中奪悅豫章解其軍府使人微示其旨悅忿懼而死哥舒翰素與安祿山安思順不平帝每欲勸解之會三人俱來朝帝使驃騎大將軍高力士宴城東翰等皆集詔尚食生擊鹿取血瀹賜為熱洛河以賜之珍味饋從官崔日用為芮城尉則天幸長安路次陜州宗楚客時為刺史日用祇供頓事廣求珍味稱楚客之命偏饋從官楚客知而大加賞歎盛稱薦之舊史翰林學士每遇賜食有物若畢羅形麤大滋味香美呼為諸王修事盧氏雜說今衣冠家名食有蕭家餫飩漉去其湯不肥可以瀹茗庾家粽子白營如玉韓約能作櫻桃饆饠其色不變又能造冷胡突鱠鱧魚臆連蒸麞麞皮索餅酉陽雜俎酒餚之最梁劉孝儀食鯖鮓曰五侯九伯今盡征之魏使崔劼李騫在坐劼曰中丞之任未應已得分陜騫曰若然中丞四履當至穆陸孝儀曰鄴中鹿尾乃酒餚之最劼曰生魚熊掌孟子所稱雞跖猩唇呂氏所向鹿尾乃有奇味竟不載書籍每用為恨孝儀曰寔自如此或古今好尚不同梁賀季曰青州蠏蓴乃為鄭氏所記此物不書未解所以騫曰鄭亦稱益州鹿妊但未是尾耳何曄侈于味食必方丈後稍欲去其甚者猶食白魚䱉腊糖蟹使門人議之學士鍾挒議曰䱉之就腊驟于屈伸蠏之將糖躁擾彌甚仁人用意深懷惻怛至于車螯蚶蠣眉目內缺慚渾淪之奇唇吻外緘非金人之慎不榮不悴曾草木之不若無馨無臭與瓦礫而何異故宜長充庖廚永為口實上後梁韋林京兆人南遷于襄陽天保中為舍人涉獵有寸藻善劇談嘗為䱉表以譏刺時人其詞曰臣䱉言伏見除書以臣為糝熬將軍油於校尉臛州刺史脯腊如故肅承將命含灰屏息憑籠臨鼎載戰載兢臣美愧夏鱣味慚冬鯉常恐鮐腹之譏懼貽皃巖之誚是以眾流湖底枕石泥中不意高賞殊臨曲蒙鈞拔遂得超昇綺席忝預玉盤遠𠟿玳筵猥頒象箸澤單紫腴恩加蓴腹方當鳴薑動桂蘇佩欓輕瓢纔動則樞盤如烟濃汁暫停則蘭餚成列宛轉綠虀之中逍遙朱唇之內銜恩噬澤九殞弗辭無任屏營之誠謹詣銅鐺門奉表致謝以聞詔荅曰省表具悉卿池沼縉紳陂渠俊乂穿蒲入荇肥滑有聞允堪䆟選無勞致謝上海隅荒郊之外林石之間地生視肉形如牛肝有兩大眼食之盡更生如故其土人所感豆腐世傳豆腐本淮南王術烹榖黃帝始烹縠為粥周禮鬻糜也餬饘也爾雅糜煮使糜爛也粥濯於糜粥然也寒粥米投寒水中也釋名周時尹氏貴盛五世不別會食數千人遭飢荒羅鼎作粥啜聲聞數里食訖失三十人乃在鑊中齕取燋粥而已錄異公叔文子卒其子請謚於君君曰昔者魏國凶飢夫子為粥與國之餓者是亦惠乎禮記天下達禮悼公文之喪李昭子問於敬子曰為喪何食敬子曰食粥天下之達禮也上晉人執衛侯歸之于京師寘深室鄰子納𩼈饘焉左傳齊晏桓子卒晏嬰麤纕斬苴經帶杖管屨食鬻君倚蘆寢苦枕單其老曰非大夫之禮也上餬口正考父鼎銘云饘於是粥於是以餬余口上恃粥左師觸龍見趙太后曰食無衰乎太后曰恃粥耳史記楊盧侯趙章病淳于意其脈曰迵風迵風者五日而死後七日乃死曰其人嗜粥故中藏實實故過期上蕪蔞豆粥光武為王郎追至蕪蔞亭馮異上豆粥一椀明日上謂諸將曰昨得公孫豆粥飢寒俱解後漢楚儵事後母致孝及母卒哀思過禮病不自支世祖常遣中蓴門朝暮送饘粥上致糜粥曹褒遷將作大匠上聞褒病遣使致醫藥麋粥東觀漢記高陽陸續仕郡戶曹史時飢荒太守尹興使續於都亭賦民饘粥續悉之簡閱其人訊以名氏事畢興問所食幾何續因口說六百人皆分別姓字無有差謬興異之謝承後漢書帝在長安榖一斛五十餘萬帝使侍御史侯汶出太倉米豆為飢民作糜粥死者不絕帝疑廩賦不實勑取米豆五升於御前作糜得滿兩盆詔杖汶五十漢獻帝傳臧洪為青州刺史為袁紹所圍糧食已盡初尚掘鼠煮筋角後無可復食廚有米三升主簿啟進內稍以為糜粥洪歎曰吾獨食此何為命作薄粥與共啜之九州春秋曹爽等令李勝辭司馬宣王并伺察焉宣王見勝自陳無他勞効橫馬蒙時思當為本州詣閣拜辭不悟加恩得蒙引見宣王令兩婢侍衣衣落復上指口言渴求飲婢進粥宣王珤杯飲粥粥皆流出沾胸勝愍然者久之魏末傳作糜食飢李壽作糜以食飢者而不自名吳錄朱桓除餘姚長遇疫癘穀食荒貴桓分部良吏隱親醫藥食粥相繼士民感戴之上郄嘉賓三伏之月詣謝公炎暑重赫雖當風交扇猶霑汗流離謝著故練衣食熱白粥郄謝曰自非若體幾不堪此世說賊杜弢下蜀人飢陶侃多作粥以待之於是悉降王隱晉書麄粥不下桓玄敗走承石進以麄粥咽不能下晉安帝記屑麴供帝愍帝建興四年十月京師饑甚米斗金二兩人相食死者太半太倉有麴數十餅麴允屑為粥以供帝晉紀劉他茍家在夏口忽有鬼來喜偷食劉即於他家煮冶葛取二升汁密齎還家向夜令舉家糜食餘一既因寫冶葛汁著中於几上以瓮覆至人定後聞鬼發瓮啖糜𨔵臾在屋頭吐至四更中寂然於此遂絕也續搜神記王東亭當之吳郡就汰公宿別汰公說豆藿糜自噉大甌東亭有難色汰公強進半甌俗說王薈為吳郡內史其年大飢薈出私財為百姓饘粥別傳戴顒與兄彀並隱遁有名中書令王綏嘗攜客之彀彀等方進豆粥綏曰聞卿善琴試欲一聽彀不荅綏恨而去宋書何子平大明末東土飢荒繼以師旅家有大喪八年不得營畫夜號哭常如袒括之日冬不衣絮暑不清涼一日以數合米為粥不進鹽菜上宣孝陳皇后高帝高帝年二歲乳人乏乳后夢人兩甌麻粥與之覺而驚乳因此豊足齊書昭明太子統母丁貴殯薨水漿不入口每哭慟絕武帝命中書舍人顧恊宣旨曰不滅性聖人之制不勝喪比於不孝有我在那得自如此耶即強進飲粥太子奉勑乃進數合自是至日進麥粥一升武帝又勑曰聞汝新進過少轉嬴瘐我比更無病症為汝胸中亦圮塞成疾故應加饘粥不使我恒懸心雖屢奉勑勸逼終喪日止一溢米不嘗菜羗之味梁書張弘策幼以孝聞母嘗有疾五日不食弘策亦不食母強為進粥弘策乃食母所餘上蕭景為南州刺史會年荒計口振恤又為饘粥於路以賦之任昉為義興太守歲荒散私俸米豆為粥活三千餘人王志天監初為丹陽尹時年飢每旦為粥於郡門以賦百姓眾悉稱惠劉覽字孝智十六通老易位中書郎以所生母憂廬于墓再春不嘗鹽酪食麥粥而已河南孝廉㐌綿遭母喪送不忍復還卿人為作庵仍止其中若遇有米食粥無米食菜而已庾沙彌母劉氏亡水漿不入口累目初進大麥薄飲經十年旬方為薄粥終喪不食鹽酢日食麥粥張昭弟乾字玄明聰敏好學亦有至性父卒兄弟日唯食一升麥屑粥陳書崔浩道武季年威風嚴峻官省左右以微過待罪莫不迯避隱匿自下皆變獨浩恭勤不怠或終日不歸帝知之輒命賜以御粥後魏書薛真度為豫州刺史景明初豫州大飢真度輒表曰別出食米五十斛為粥救甚者詔曰真度所表甚有憂濟百姓之意宜在極恤也上文明太后崩孝文五日不食楊椿諫曰聖人之禮毀不滅性縱陛下欲自賢於萬代其若宗廟何帝感其言乃進一粥上楊逸為光州刺吏時災儉連歲逸欲以倉票賑給而所司懼罪不敢逸曰國以人為本人以食為命假令以此獲戾吾所甘心遂出粟然後中表右僕射元羅以下謂公儲難並執不許尚書令臨淮王或以為宜貸二萬詔聽貸五萬逸既出粟之後其老小殘疾不能自存活者又於州門造粥飼之將死而得濟者以萬數帝聞而善逸韋朏字遵顯少有志業年十八辟州主簿時屬歲儉朏以家粟造粥以飼飢人所活甚眾房景遠字升遐重然諾好施與歲儉分贍宗親人於通衢以粥食餓者存濟甚眾平原劉郁行逕兗境忽遇叚賊已殺十餘人次至郁郁曰與君鄉近何忍見殺賊曰若言鄉里親親是誰郁曰齊州主簿房陽是我姨兄陽是遠小字賊曰食其粥得活何得殺其親遂還衣服蒙活者二十餘人李搔妹曰法行幼出家為尼後遭歲大儉施糜粥於路李士謙遇年飢多有死者士謙罄家資為之糜粥賴以全活者萬計李勣既貴其踈病必親為煮粥火其鬚踈曰僕妾多矣何自苦若是勣對曰豈為無人耶顧踈年老勣亦年老雖欲久為踈煮粥豈可得乎唐新語呂方毅葬母通人郎餘令以白粥玄酒生芻祭路隅屑榆陽城歲飢屏跡不過鄰里屑榆為粥講論不輟新唐天子食粥昭宗在鳳翔為梁兵所圍天子食粥昭宗幸鳳翔梁軍圍之中人相與邀遮李茂貞來路以為生昭宗謂茂貞曰朕與六宮皆一日食粥一日食不托安得不與梁和乎五代史太和中有二人遊嵩山迷路見一人衣絜白枕一樸物方眠二人且問所自因開襆兩褁授與二人曰分食此雖不足長生可一生無疾乃起與二人指路酉陽杜詩豈無青精飯使我顏色好青精飯一名南天燭又曰墨飯草以其可染墨飯也道家謂之青精飯仙經云服草木之正氣與神通食青燭之津命不復隕神仙傳鄧伯元王玄甫俱在霍山服青精飯晉元帝謝賜功德淨饌一頭又謝齎功德食一頭又劉孝威謝賜果食一頭北戶錄麵餈餅麵餈也說文餅謂之飩或謂之餦或謂之餛方言餅并也溲麪使合并也胡餅作之大漫沍也亦言以胡麻著上也蒸餅湯餅蝎餅髓餅金餅索餅之屬皆隨形而名之也釋名靈帝好胡餅京師皆食胡餅後董卓擁胡兵破京師之應續漢書莽之世賣餅小人皆得等級斗筲之徒兼金累紫楊子雲磪然忠貞之節形矣枹朴子光武問第五倫曰卿為市掾人遺卿母一笥餅卿從外來見之奪母曰探口中餅出有之乎倫對曰實無此眾人以臣愚蔽故為出此言耳石勒諱胡胡物皆改名胡餅曰摶鑪石虎改曰麻餅趙錄王悅之為吏部鄰省有會同者遺悅之餅一甌辭不受曰此費誠小然少來不願當之宋書嚴翰字公仲學問特善春秋公羊司隸鍾繇不好公平而好左氏謂左氏為太官而謂公羊為賣餅家魏志餅作十字何曾性奢豪務在華侈幃帳車服窮極綺麗廚膳滋味過於王者每燕見不食大食官所設而不命取其食蒸餅上不坼作十字不食惠餅充日王歡𥘩學貧窶或人惠蒸餅一顆以充一日妻子常有菜色晉陽秋何戢為司徒左長史太祖為領軍與戲來往復置歡宴上好水引餅戢令婦女躬自執事以設上焉齊書圻裂方食石虎好食蒸餅常以乾棗胡桃瓤為心蒸之便坼裂方食及為冉關所璙幽廢思其不裂者不可得趙錄庫狄連冬至日親表稱賀其妻為設豆餅連問此豆餅何處得來妻對曰於食中減連大怒北齊書王羆鎮河東日嘗有臺使至為設食使乃使裂去薄餅緣羆怒曰耕種收穫其功已深春爨造成用力不少爾之選擇當是未飢命左右撤之使者大慚北史宇文士及嘗割肉以餅拭手太宗屢目陽若不省徐㗖之其機悟率類此唐書李英公為相有鄉人過宅為設食客去餅緣公責之客大慚南部新書肅宗為太子時嘗侍膳尚食置熟俎有羊臂臑上顧使太子割肅宗既割餘污漫在刃以餅潔之上熟視不懌肅宗徐舉餅啖之上甚悅謂太子曰福當如是愛惜祁氏舊聞鄭瀚以儉素自居尹河南召甥姪與之會食有蒸餅鄭孫去其皮而後食之澣大嗟怒謂曰皮之與中何以異也僕嘗病澆俗驕侈自奉柰何嚚浮甚於五侯家綺真乳臭兒也耶因引手取所棄者鄭孫錯愕失據器而奉之瀚盡食之王世充秦王傳城塹而守之世充糧具盡人相食至以水泊泥去礫取浮上揉米屑為餅侯思止懶不治業詭狠無良以告變拜游擊將軍遷左臺御史嘗命作籠餅謂膳者曰與我縮䓗作之故時人號為縮䓗侍御賀知章嘗謁賣藥王老問蓴白術珤一大珠遺之老人得珠即令易餅與賀食賀心念寶珠何以市餅口不敢言老叟乃曰慳吝未除術何由成原化記餅師寧王宅畔有賣餅者妻甚美王厚遺其夫而取之經歲問曰頗憶餅師否召之使見淚下如雨本事集不暇唱渭城劉伯芻巷口有鬻餅者每當鑪謳歌一旦劉怜其貧貸以萬錢自是不聞歌聲心計轉麄不暇唱渭城矣袖中盛胡餅楊國忠自入市衣袖中盛胡餅餅棄竇中武惠妃生日上與諸公主按舞於萬歲樓下上乘步輦從複道窺見衛士食畢以餅餌棄水竇中上大怒命高力士枝殺之上方震怒左右莫敢言者寧王從容謂上曰從椱道窺見獲衛士之過而殺之恐人臣不能自安又失大体陛下志在勤儉愛物惡棄於地柰何性命至重重於踐飱者乎上蹶然大悟遽然赦之明皇雜錄楊瑤光歷沔綏二州刺史姆饋子以餅妻偽受而棄之垣外人咨其廉蓴巢復入京師於時畿民柵山谷自保不得耕士人或賣餅自業五色餅刻木蓮花藉禽獸形按成之累積五色酉陽雜俎有道人珤湯餅語人曰此玉英粉食之七日當羽化廣異記隋仁壽間籌禪師常在內供養造五色飲以扶芳葉為青飲祓禊根為赤飲酪漿為白飲烏梅為玄飲江𦭦音柱為黃飲又作五香飲第一沈香飲次檀香飲次澤蘭香飲次丁香飲次甘松香飲皆有別法以香為主尚食直長謝諷造淮南玉食經有四時飲春以桃夏以酪秋以蓮實冬以枸杞俱大業雜記兼採蜜蜂以兼採為味張璠易注序百草花蜜蜂百草花所作也韻集紫蜜西王母曰太上之藥有中華紫蜜雲山朱蜜漢武故事石蜜石蜜一名飴本草經天竺國出石蜜續漢書白蜜世祖與朱祐共買蜜合藥後上追念之即賜祐曰蜜一石問何如在長安共買蜜乎東觀漢記袁術為雷簿等所拒士眾絕糧時盛水暑欲得蜜漿又無蜜在床歎息良久乃大𧠺曰袁術至於此乎吳書蜜中鼠矢孫亮使蓴門至中藏取蜜漬梅蜜中有鼠失召問藏吏曰蓴門從汝求蜜耶吏曰向求蜜實不敢與蓴門不服亮曰此易知耳令破鼠矢矢裡燥亮曰若久在蜜中中外當俱濕裏燥必是蓴門所為蓴門首服吳歷陶弘景永明十年脫朝服掛神武門上表求祿詔許之賜以米帛勑所在月給茯苓五斤白蜜二斤以供其服餌齊書任昉為新安太守郡有蜜嶺及楊梅舊為太守所採昉以冐儉多物故即時停絕梁書傳昭為臨海太守郡有蜜巖前後太守皆自封固專收其利昭以周文之囿與百姓共之大可喻小乃教勿封上高昌國遣使貢刺蜜帝命杰公迓之謂其使曰刺蜜是鹽城所生非南平城者使者曰其年風災刺蜜不熟故爾帝問杰公對曰南平城羊刺無葉其蜜色明白而味耳鹽城羊刺葉大其蜜色青而味薄以是知蜜之偽耳梁四公記和炭楊國忠家以炭屑和蜜塑成雙鳳開元遺事貞元八年吳明國貢鸞蜂蜜其蜂之聲有如鸞鳳而身被五色大者可重十餘斤為窠於深巖峻嶺間大者占地一二畝國人採其蜜不過二合如過度則有風雷之異若臽螫人則生倉以石上菖蒲根傳之即愈其蜜色碧常貯之於白土杞表裏徹如碧琉璃久食之令人長壽顏如童子髮白者應時而黑杜陽編紅蜜同昌公主疾既甚醫者欲難其藥餌奏云得紅蜜食之可愈上令內庫得紅蜜數石本俆離國所貢也蜀中有竹蜜蜂好於青竹上結窠窠大如雞子有蔕長尺許窠與蜜並紺色可愛甘倍於常蜜液蜜為人崔彥曾署張佛筵液蜜為人西域自拂菻西南度磧二千里有國曰磨鄰曰老勃薩刻石蜜為廬如轝狀兒啖西域康者生兒以石蜜啖之置膠於掌欲長而甘言珤若黏云粳沃以蜜仲雲國其食粳沃以蜜五代蕃胡國出石蜜中國貴之上遣使止摩伽池國取其法令楊州煎諸蔗之汁於中廚自造焉色味逾於西域所出唐書交阯草滋大者數寸煎之凝如䒷破如愽棊謂之石蜜異物志蜜岡郡東有山百姓呼曰蜜岡焉王孚安成記百房赤馬山有蜜房二百所羅綴相望因名百房荊州圖記蜜之滋甜如浮萍之類非假石之名實出甘柘變而凝輕涼州異物志百花醴蜜劉根墨子枕中記鈔曰百花醴蜜少餳沙餳石蜜遠國貢儲張衡七辨西垂之產沙餳西垂之產盛公子與劉頌書炊金饌玉駱賓王謂盛饌為炊金饌玉拾遺天中記卷四十六
