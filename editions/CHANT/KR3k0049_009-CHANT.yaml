body:
  text: 水立字水之為言演也陰化淖濡流施潛行也故其立字兩人交一以中出者為水一者數之始兩人譬男女言陰陽交物以一起也元命苞北方之行水準也北方之行象眾水並流中有微陽之氣也徐曰眾屈為水至柔能攻堅故一其內也說文包天水者天地之包幕五行之始焉萬物之所由生元氣之津液也元命包載地天在地外水在天外水浮天而載地者也黃帝書天下之多者水焉浮天載地高下無不至萬物無不潤玄中記太一中精棲三陽之正氣於水樞其專精之名曰太一太一正陽也水涵太一之中精故能潤澤萬物而行乎地中子華子潤下書稱水曰潤下坎為水位在北方終藏萬物者也為政令順時陰陽調和終始相成十二月咸得其氣則水得其性此之謂潤下若政令逆時山水暴出百川流溢壞鄉邑溺居人及淫雨傷稼是為水不潤下漢書立天地所以立天地者水也夫水者天地之本也吐元氣發日月經星辰皆由水而興九州之外皆水也余昔在會稽仰看南山見雲如瀑布方數十丈其聲硠磕須臾山下居民驚駭洪水大至物理論物原地者萬物之本原諸生之根苑也美惡賢不肖愚俊之所生也水者地之血氣如筋脈之通流者也故曰水具材也夫水淖弱以清而好猶人之有仁也視之黑而曰精也量之不可使概至滿而止正也唯無不流至平而止義也人皆赴高已獨赴下卑也卑也者道之室王者之器也而水以為都居管子物準水者萬物之準也諸生之淡也違非得失之質也是以無不滿無不居也集於天地而藏於萬物產於金石集於諸生故曰水神上五水水有大小又有遠近水之出於山而流入於海者命曰經水水別於他水入於大水及海者命曰枝水山之溝一有水一無水者命曰谷水水之出於他水溝流於大水及海者命曰川水出地而不流者命曰淵水此五水者因其利而往之可也因而扼之可也而不久常有危殆矣至德天下之物莫柔弱於水然而大不可極深不可測脩極於無窮遠淪於無涯息耗減益通於不訾上天則為雨露下地則為潤澤萬物不得不生百事不得不成大包群生而無所私澤及蚑蟯而不求報富贍天下而不既德施百姓而不費行而不可得窮極也微而不可得把握也擊之無創刺之不傷斬之不斷焚之不然淖溺流遁錯繆相紛而不可靡散利貫金石強濟天下動溶無行之域而翱翔萬物之上邅回川谷之間而滔騰大荒之野有餘不足任天下取與稟受萬物而無所前後是故無所私而無所公靡濫振蕩與天地鴻洞無所左而無所右蟠委錯繆與萬物始終是謂至德夫水所以能成其至德於天下者以其淖溺潤滑也淮南子異名水中可居者曰洲亦曰潭小洲曰渚小渚曰沚亦曰小沚曰坻又小沚曰磧凡水邊皆曰垂曰涯曰畔曰干曰漬曰濱涯上下坦曰漘一曰隄重涯曰岸岸上地曰滸曲涯曰澳一曰隈水草交曰湄禆增水邊土人所止曰澨水曲曰汭水北曰陽水南曰陰水出山石間曰潾山夾水曰澗水注川曰谿水注谿曰谷水通谷曰壑石絕水曰梁築土遏水曰塘一曰隄又曰防大防曰墳水所鍾曰澤廣澤曰衍澤曲曰皋障曰陂澤無水有草木曰藪水通流曰川水本曰源源曰泉泉正出曰檻泉側出曰氿泉泉所出同所歸異曰肥泉異出同流曰瀵深水曰潭急水曰流砂石上曰瀨亦曰湍曰灘曰磧水別流曰派大水有小口別通曰浦風吹水涌曰波亦曰浪大波曰濤小波曰淪平波曰瀾直波曰徑水朝夕而至曰潮風行水成文曰漣水波如錦文曰漪水行曰涉逆流而上曰泝洄順流而下曰泝游亦曰㳂流絕流而渡曰亂以衣涉水曰厲繇膝以下曰揭繇膝以上曰涉渡水處曰津亦曰濟潛行水下曰泳爾雅釋名說文上善上善若水水善利萬物而不爭處眾人之所惡故幾於道老子君子觀孔子觀于東流之水子貢問曰君子見大水必觀焉何也孔子曰夫水徧與諸生而無為也似德其流也卑下倨句必循其理似義浩浩乎不居似有道其赴萬仞之谷不懼似勇主量必平似法盈不求概似正綿弱微達似察以出以入就潔似善發源必東似志是以君子見大水必觀焉孫卿子孔子曰夫水者君子比德焉遍予而無私似德有所及者生似仁淺者流行深者不測似知受惡不讓似包蒙不清以入鮮潔以出似善化說苑智者樂夫智者何以樂於水也曰夫水者緣理而行不遺小間似有智者動而下之似有禮者蹈深不疑似有勇者障防而清似知命者歷險致遠卒亦不毀似有德者天地以成群物以生國家以寧萬事以平品物以正此智者所以樂於水也韓詩外傳得之則生失之則死其似有德者淑淑淵淵深不可測其似聖者說苑準物水準也平準物也廣雅非水無以準萬里之平非水無以通遠道任重也尚書大傳四德顧夷子與子華游於東池子華曰水有四德沐浴群生澤流萬世仁也揚清激濁蕩去滓穢義也柔而難犯弱而難勝勇也導江疏河變盈流謙知也顧子灰止往古之時四極廢九州裂水浩瀚而不息於是女媧積蘆灰以止滔水淮南子水瑞共工氏受水瑞百官師長以水為號蒙水瑞水也君乘土而王其政太平則蒙水出於山焉瑞應圖壤堙洪水滔天鯀竊帝之息壤以堙洪水山海經神瀵禹治水土為之一國無風雨霧露不生鳥獸有山名壺領頂有口若圓環名曰滋穴有水湧出名曰神瀵臭過椒蘭味過醪醴列子狎翫鄭子產謂子太叔曰唯有德者能以寬服民其次莫如猛夫火烈人望而畏之故鮮死焉水懦弱民狎而翫之則多死焉故寬難左傳灑除景公問晏子曰廉正而長久其行何也晏子對曰其行水也美哉水乎清其濁無不定塗其清無不灑除是以長久也晏子春秋辯水味白公問於孔子曰人可與微言乎孔子不應白公曰若以石投水如何孔子曰吳之善遊者能取之曰若以水投水何如孔子曰淄澠之合易牙嘗而知之白公曰人故不可以微言也列子香水吳故宮有香水溪俗云西施浴處人呼為脂粉塘吳王宮人濯妝於此溪上源至今猶香古詞云安得香水泉濯郎衣上塵又香水在并州其水香潔浴之去病述異記沫水沫水自蒙山至南安而溷崖山脈漂疾故害舟船歷代為患蜀郡太守李冰發卒鑿平溷崖河神贔怒冰乃操刀入水與神鬭遂平溷崖通正水路開處即冰所穿也水經水府漢沔會流處岸上有石銘云下至水府三十一里皆傳李斯刻石於此述異記天下水府一十八處神水負局先生上吳山語下人曰吾欲還蓬萊山為汝曹下神水崖頭一旦有水白色流從石間來下服之多愈疾列仙傳迴復水蜀有迴復水江神嘗流殺人文翁為守祠之勸酒不盡拔劍擊之遂不為害水經注竹王水漢武時有竹王興於遯水有一女子浣於水濱有三節大竹流於女子足間推之不去聞有聲持破之得一男兒遂雄夷濮氏竹為姓所損破竹於野成林王祠竹林是也王嘗從人止大石上命作羹從者曰無水王以劍擊石出水今竹王水是也上斬石人玉箱記云前漢劉子光西征過山而渴無水子光在山南見一石人問之曰何處有水石人不荅乃拔劍斬石人須臾窮山水出獨異志菊水南陽有菊水其源旁悉芳菊水極甘馨又中有三十家不復穿井即飲此水上壽百二十三十中壽百餘七十猶以為夭漢司空王暢太傅袁隗為南陽令縣月送三十餘石飲食澡浴悉用之太尉胡廣父患風羸南陽恒汲飲水此疾遂瘳此菊短葩大食之甘美異於餘菊廣又收其實種之京師遂處處傳置之荊州記爭水割指陽安令趙規與朗陵太守黃萌爭水規割指詛曰隨血所流入陽安界萌怒殺規小吏王朔復刺殺萌朗陵官屬又殺朔民於京山上為朔作祠壇每旱輒往祈禱汝南先賢傳飲水朱倉字雲卿什邡人也受學於蜀郡張寧餐豆飲水以諷誦同業憐其貧資給米肉終不受華陽國志飲水有娠漢末零陵太守史滿有女悅門下書佐使婢取盥手殘水飲之遂有娠既而生子至能行太守抱兒使求其父兒匍匐直入書佐懷中書佐推之兒仆地為水具省前事太守以女妻吏搜神記禁水左慈趙明等以氣禁水水為逆流一二丈禁水著中庭露之大寒不冰抱朴子大金元精諸葛孔明時有蒲元者劍術同歐冶風胡常為孔明鑄刀劍言蜀惟江水爽烈是天分其野大金之元精也漢水鈍弱及涪水皆不任淬刀劍或以涪水雜江水輒能辨之蒲元傳水脈孫權赤烏八年遣校尉陳勳漕句容中道鑿破碑掘得一黑物無有首尾形如數百斛船長數百丈蠢蠢而動有頃悉融液成汁時人莫能識得此之後獲泉源或謂是水脈每至大旱餘瀆皆竭唯此巨流焉異苑賣水王猛攻鄴慕容評拒猛而恒賣水與軍人眾思為亂猛因得破之車頴秦書地鏡苻堅時長安有水影遠觀若水視地則見人至堅晚年而止宋文帝元嘉二十五年冬青州城南遠望見地中如水有影謂之地鏡唐神龍二年二月壬子洛陽城東七里地色如水樹木車馬歷歷見影漸移至都月餘乃滅長安街中往往見水影大曆末深州束鹿縣中有水影長七八尺遙望見人馬往來如在水中及至前則不見水女水臨淄牛山下有女水齊人諺曰世治則女水流世亂則女水竭慕容超時乾涸彌載及宋武北征乃激洪流述征記燕建平六年水忽暴竭玄明惡之寖病而亡燕太上四年女水又竭超惡之燕祚遂淪水經讓水范柏年漢中人嘗謁宋明帝言次及廣州貪泉因問柏年卿州中復有此水不荅曰臣州中惟有文川武鄉廉泉讓水又問卿宅在何處曰居廉讓之間帝善其對南史鑿城遇水沈攸之事起齊武帝據湓口城掘塹得一大錢文曰太平百歲于時城內乏水欲引水入城始鑿城內遇伏泉涌出者九處用之不竭上沙池不漏荊州城內有沙池常漏水蕭頴胄為長史水乃不漏及頴胄亡乃復竭南齊書八功德水梁天監中有胡僧曇隱寓錫於蔣山山中乏水時有龐眉叟相謂曰予山龍也知師渴飲措之無難俄而一沼沸出後有西僧繼至云本西域八池已失其一似竭彼盈此也其泉一清二冷三香四柔五甘六淨七不涸八蠲痾故名八功德自梁以來皆取給御府曰飲之可以愈疾方輿勝覽一甘二冷三耎四輕五清淨六不臭七飲時不損喉八飲已不傷腹順正理論脩仁水韶州之曲江縣脩仁水西南注連水有三楓亭五渡水齊范雲為始興太守至脩仁水酌而飲之賦詩曰三楓何習習五渡何悠悠且飲脩仁水不挹背邪流韶州圖經見水神北齊盧元明聘于梁其妻乘車送至河濱忽聞水有香氣異常顧見水神湧出波中牛乃驚奔曳車入河其妻溺死兄子十住尚幼與同載投下獲免北史杯水奉餞趙軌為齊州別駕考績入朝父老相送者各揮涕曰別駕在官水火不與百姓交是以不敢以壺酒相送公清若水請酌一杯水奉餞軌受而飲之隋書鸚鵡水武德元年七月新豐鸚鵡谷水清世傳此水清天下平開皇初暫清復濁至是復清唐書橐水橐水即魯水也西北入城百姓賴之呼為利人渠是也陜縣圖經武德元年陜東道行臺金部郎中長孫操自郡東又引水入城以代井汲百姓賴之與上渠俱利於民唐史水入帝寢高宗幸萬年宮山水暴至夜突玄武門宿衛皆散走薛仁貴曰當天子緩急安可懼死遂登門大呼以警宮內帝遽出乘高俄而水入帝寢帝曰賴卿以免始知有忠臣也唐書丹水懷州北有丹水其源出長平山傳云秦殺趙卒其水變赤因以為名上在太原知其故詔改懷水國史異纂置坐孔若思常謂人曰仕至中郎足矣及遷庫部郎乃置一石止水於坐右示止足之意唐書滴水安西境內有前踐山山下有伽藍其水滴溜成音可愛彼人每歲一時采綴其聲以成曲調故耶婆瑟鷄開元中用為羯皷曲名樂工最難其權撩之術進寺近其滴水也宋高僧傳遏水頭李敬彝宅在洛陽毓財坊土地最靈家人張行周事之有應未大水前預夢告求飲食至其日率其類遏水頭並不衝圯南部新書水樂元子於山中尤所耽愛者有水樂水樂是南磳之懸水淙淙然聞之多美於耳尤便元次山水樂記蓬萊隔弱水謝自然聞司馬承禎居玉霄峰遂詣焉後告別承禎挈一席以投于海泛於波上隨新羅船載之俄到一山獨遊一處有一道士花冠霞帔自然入謁道士問欲何往自然曰蓬萊尋師道士笑曰蓬萊隔弱水此去三十萬里非舟楫可行非飛仙莫到承禎名在丹臺身居赤城乃良師也續仙傳西域傳烏弋國去長安萬五千餘里西行可百餘日至條枝國臨西海長老傳聞有弱水西王母云東夷傳亦曰長城外數千里亦有弱水皆所未見也淮南子云弱水出窮石窮石今之西郡郡冉蓋其派別之源耳山海注崑崙之弱水鴻毛不能起玄中記弱水在夫餘北不勝毛羽廣志漢武時月支國遣使獻香云乘毳車而濟弱淵策驥足以度飛沙契闊遙途辛勤蹊路十洲記南𤃩水代宗朝李季卿刺湖州至維揚逢陸鴻漸抵揚子驛將食李曰陸君別茶聞揚子南𤃩水又殊絕今者二妙千載一遇命軍士謹慎者深入南𤃩陸利器以俟俄而水至陸以杓揚水曰江則江矣非南𤃩似臨岸者使者曰某掉舟深入見者累百敢有紿乎陸不言既而傾諸盆至半陸遽止之又以杓揚之曰自此南𤃩者矣使者蹶然馳白某自南𤃩齎至岸舟蕩覆過半懼其尠挹岸水增之處士之鑒神鑒也其敢隱焉溫庭筠採茶錄水戲張志和酒酣為水戲鋪席於水上獨坐飲酌嘯詠其席來去遲速如刺舟聲續仙傳聖水汴宋觀察使令狐楚言亳州聖水出飲者疾輒愈裴度判曰妖由人興水不自作命在所禁塞唐書寶曆二年亳州言出聖水飲之者愈疾李德裕奏曰臣訪聞此水本因妖僧誑惑狡計丐錢數月以來江南之人奔走塞路每三二十家都顧一人取水擬取之時疾者斷食葷血既飲之後又二七日蔬餐危疾之人俟之愈病其水㪷價三貫而取者益之他水㳂路轉以市人老疾飲之多至危篤昨點兩浙福建百姓渡江者日三五十人臣於䔉山渡已加捉搦若不絕其根本終恐無益黎甿昔吳時有聖水宋齊有聖火事皆妖妄古人所非乞下本道觀察使令狐楚速令填塞以絕妖源從之舊唐聖水獲利人轉相惑德裕在浙西命於大市集人置釜取其水令取猪肉五斤煮云若聖水也肉當如故逡巡肉熟爛自此人心稍定妖者尋而敗露傳載辨水李德裕居廟廊日有親知奉使于京口李曰還日金山下楊子江泠水與取一壺來其人舉棹日醉而忘之泛舟至石城下方憶乃汲一瓶於江中歸京獻之李公飲後嘆訝非常曰江表水味有異於頃歲矣此水頗似建業石城下水其人謝過不敢隱也中朝故事水遞李德裕在中書喜飲常州惠山井泉自毗陵至京置遞舖號水遞有僧詣謁德裕曰所謁相公者為相公通常州水脈京師一眼井與惠山寺泉脈相通李大笑真荒唐也僧曰相公但取此泉德裕曰井在何坊曲曰昊天觀常住庫後是也李乃以惠山一甖昊天一甖雜以八瓶以十瓶暗記出處遣僧辨析僧因啜嘗取惠山寺與昊天餘八乃同味德裕大奇之當時停其水遞人不告勞浮議弭焉芝田錄水變芳醪宣皇在藩時常從駕墮馬雪中寒甚因渴求水於巡警者曰我光王也及以水進舉杯悉變為芳醪玉泉子主給用水契真先生李義範住北邙山玄元觀咸通末有李生者詣其所異常款狎忽一夕謂先生曰某將辭世矣某受命于寘曹主給一城戶口逐日所用之水今月限既畢後三日死矣先告別因曰人世用水不過日用三五升過此極有減福折算切宜慎之及期果卒錄異記水母王玄芝夜見一道士因隨之行在西江水底月光中不見泥沙水隨自開路傍一物如龍又如蛇長十丈許道士曰此水母也見者長生王氏神仙傳杜光庭雍觀熙寧時王荊公當國有人授泗州盱眙令自陳乞改名雍觀怪問其故云夢中神告如此後之官自城還邑渡浮橋沒于淮水事聞朝廷荊公云向疑此人無故改名及閱山海經乃知其為水官之名固慮其有水厄今果然後縣僚或夢雍觀騶從甚盛往來淮岸疑其死為水官也睽車志貢水天下貢賦惟長安縣貢土萬年縣貢水南部新書重水凡物有水水由土地故江東宜綾紗宜紙鏡水故也蜀人織錦初成必濯於江水然後文彩煥發鄭人滎人釀酒近邑水重斤兩與遠郊數倍國史補繢水陳留記曰襄邑渙水出其南睢水經其北傳云睢渙之間出文章故其黼黻絺繡日月華蟲以奉宗廟御服焉述異記曰睢渙二水波若五色有文章故名繢水陳琳為曹洪與魏文書云遊睢渙者學藻繢之綵錦水成都道西城故錦官也錦江織錦濯於江中則鮮明濯佗水則不如故名錦里城華陽國志湘水湘水出自陽朔至清深五六丈澄清見底了了然石子若樗蒱白沙如霜雪赤岸若朝霞羅含湘川記長沙志云涉湘千里聞漁父吟中流相和其聲綿遠可聽所謂過清湘燃楚竹款乃一聲山川動色豈俗漁境界耶孝水潘安仁西征賦澡孝水而濯纓嘉善名而在茲字林曰孝水在河南郡紫水武都紫水有泥其色紫而黏貢之用封璽書故詔誥有紫泥之美隴右記益水益陽縣在長沙郡界水在其陽縣治東望時見長沙城隍人馬形色悉可審辨或亭午覽矚移晷乃漸散滅縣去長沙尚三百里跨越重山理絕表顯將是山嶽炳露真像所傳者乎錄異記鳴水高安鳴水碧澗飛流空谷振響絕頂有石高數丈以物扣之其聲如鼓因以名之華陽實錄瓊漿水廣漢鹽亭負戴山有飛龍泉噴下南流入梓潼江水色清冷其味甘美時以為瓊漿水寰宇記六時水蜀青城有延慶宮西有常道觀其南有六時水六時洒水以代漏刻於陽時即洒然而下陰時即無晝夜凡六時洒水故名六時水方輿記丁東水葛璝化宮之西巨石之下有丁東水出于崖腹滴于窪石竅中積雨不加久旱不竭人或污之立致枯涸七籤百二十二粉水巴縣有清水穴巴人以此水為粉則膏輝鮮芳貢粉京師因名粉水故世謂江州墮林粉也華陽國志筑陽縣粉水源出房陵取其水為粉鮮潔異於餘水荊州記蕭何夫人漬粉處也南雍州記絳水絳水出絳山東至寒泉奮湧揚波北注縣流奔壑十一丈許青崖若點黛素湍若委練望之極為奇觀矣水經澮水出河東絳縣東澮交東高山左傳晉景公謀去故絳欲居郇瑕魏獻子曰不如新田有汾澮以流其惡遂居新田又謂之絳蓋在絳澮之陽上千秋水桂陽郴縣萬歲山山有石室室中有鍾乳山上悉生靈壽木溪下即千秋水也水側民居號萬歲村上圓水郴縣南湘陂村村有圓水廣圓可二百步一邊煖一邊冷冷處極清綠淺則見石深則無底暖處水白且濁玄素既殊涼煖亦異厥名除泉其猶江乘之半湯泉也水盛則瀉黃溪水耗則津徑輟流籠水梁鄒城西有籠水云齊孝婦誠感神明涌泉發於室內潛以績籠覆之由是無瓮汲之勞家人疑之時其出而搜其室試發此籠而泉遂涌流漂居宇故名籠水續述征記石門水廬山山北有石門水水出嶺嶺端有雙石高竦其狀若門因有石門之目焉水導雙石之中懸流作飛泉近三百許步下散漫十數步上望之連天若曳飛練於霄中矣下有磐石可坐數十人冠軍將軍劉敬宣每登陟焉水經白水白水在黃龍南即瀑布也水出山復挂流三四百丈飛湍林表望若懸素注處悉巨井其深不測其水下入江淵廬山記踈水中廬縣踈水中有物如三四歲小兒鱗甲如陵鯉射之不可入七八月中好在磧上自曝膝頭似虎掌爪常沒水中出膝頭示人小兒不知者欲取弄戲輒便殺人或曰人有生得者摘其鼻耳可小小使之名曰水虎襄沔記伊水伊水上源經新城陸渾二縣男女無少長皆病癭俗云水土所致伊水不可飲也西征記鬼彈漢時永昌郡不韋縣有禁水水有毒氣唯十一月十二月差可渡自正月至十月逕之無不害人其氣中有惡物不見其形其作有聲如有所以投擊內中木則折中人則害土俗號為鬼彈故郡有罪人徙之禁防不過十日皆死也搜神記左思蜀都賦云鬼彈飛丸以褫礉火井騰光以赫曦世說注今本無瀘水瀘津水東逕不韋縣北兩岸皆高山瀘峰最為傑秀孤高三千餘丈水之左右馬步之徑裁通而特有瘴氣三月四月逕之必死非此時猶令人悶吐五月以後行者差得無害故諸葛亮表言五月渡瀘并日而食臣非不自惜也顧王業不可偏全於蜀故也水經瀘水兩峰有殺氣暑月舊不行故武侯以夏渡為艱益州記今昆明道渡所有武侯道在按地記水浚急而多巉石土人以牛皮為船方涉津矣十道記梵音水黎州城南有梵音水唐僧三藏至此持梵音而泉湧出故名色如米瀋味甘宋政和間太守宇文侯過而飲之曰佳泉也易名粲玉泉泉南數十步有二巨石一號袈裟石五色相間一號曬經石皆三藏遺蹟地志相思水鄜州東百里有水名相思河河岸有郵置亦曰相思舖令狐挺題壁以詩曰誰把相思號此河寒垣車馬往來多只因自古征人淚洒向空川作浪波宋朝類苑國水齊之水道躁而復故其民貪粗而好勇楚之水淖弱而清故其民輕果而賊越之水濁重而洎故其民愚疾而垢秦之水泔最而稽淤滯而雜故其民貪戾罔而好者事齊晉之水枯旱而運淤滯而雜故其民諂諛而逆詐巧佞而好利燕之水萃下而弱沈滯而雜故其民愚戇而好貞輕疾而易死宋之水輕勁而清故其民簡易而好正是以聖人之化世也其解在水治於世也其樞在水管子水所輕水所多禿與癭人重水所多尰與躄人甘水所多好與美人辛水所多疽與矬人苦水所多尫與傴人呂氏春秋方圓凡水其方折者有玉其圓折者有珠清水有黃金龍淵有玉英尸子六水何謂六水曰河水赤水遼水黑水江水淮水淮南子清濁清水音小濁水音大湍水人輕遲水人重上水宜白水宜玉黑水宜砥青水宜璧赤水宜丹黃水宜金清水宜龜汾水濛濁而宜麻濟水通和而宜麥河水弱濁而宜菽雒水輕利而宜禾渭水多力而宜黍漢水重安而宜竹江水肥仁而宜稻平土之人慧而宜五榖淮南子帝之神泉河水出崑崙東北陬赤水出其東南陬洋水黑水出其西北陬凡四水者帝之神泉以和百藥以潤萬物山海淮南帝臺漿水高前之山其上有水焉甚寒而清帝臺之漿水也山海經寒暑水大荒之隅有山而不合名曰不周有寒暑之水上軨軨空桑之山有獸曰軨軨其狀如牛而虎文其鳴自叫見則天下大水剡山有獸名曰合窳見則天下大水敖岸之山有獸曰夫諸其狀如鹿而四角見則其邑大水蠻蠻崇吾之山有鳥一翼一目相得乃飛其名曰蠻蠻見則天下大水玉山有鳥其狀如翟而赤名曰胜遇見則其國大水玄州水玄州在北海中去南岸十萬里上有芝生玄澗澗水如蜜服之長生魚龍河圖甜水甜水去虞淵八十里有甜溪水味如蜜東方朔遊此水得數斛以獻帝投水於井井水常甜而寒洗浴則肌理柔滑洞冥記悉唐西海島間水如脂而黑他物盛之皆滴漏惟牛角可貯南海以媒野象塗少許于樹葉間象拂著身必遲迴不去崑崙奴亦塗身便乘之而歸若家畜焉路史畔怯婆羅門諸國有畔茶怯水出山石臼中有石象人守之水有七種色或冷或熱能銷草木金鐵人手探入輒爛以橐駝髑髏轉注瓠中新唐書灞水庭州灞水以金銀鐵器盛之皆漏惟瓠葉則不漏博物志拘夷國北山有石駝溺水滴滴溺下如飴以金銀銅鐵木瓦等器盛之皆漏掌承之亦透惟瓢不漏服之令人身上屍毛落盡得仙去屯煌二萬里異苑石駝溺其國有婆羅門守視西域記互見石澄綠滄州久視山下出澄綠水其泉闊一百步亦謂流綠渠雖投之金石終不沈沒故州人以瓦鐵為船舫杜陽編述異記石脂酒泉延壽縣南有山石出泉水大如莒注地為溝其水有肥如煮肉洎羕羕永永如不凝膏燃之極明不可食縣人謂之石漆博物記有苔如肥肉燃之極明水上有黑脂以草取用塗鴟夷酒囊及膏車周武帝突厥圍酒泉取此脂然火焚其攻具得水逾明酒泉賴以獲濟元和志匈奴縣石脂水水膩浮上如漆採膏車及燃燈極明酉陽雜俎鄜延脂即延安石油也生於水際沙石與泉水相雜惘惘而出士人以雉尾裛之乃採入缶中頗似淳漆燃之如麻以為煙墨松脂不及筆談雜志黑溪南荒有黑溪水漳州界有烏腳溪涉者足皆如墨數十里間水皆不可飲飲則病瘴行人皆載水自隨梅公儀墜之沒頂宿病盡除筆談驫驫水沁水南歷猗氏關又南與驫驫水合水出東北巨峻山乘高瀉浪觸石流響世人因聲以納稱水經落際水至彭湖漸低近琉球謂之落際際者水趨下不回也凡西岸漁舟到彭湖遇颶風作漂流落際回者百無一二元史陽侯論語摘輔相云陽侯為江海宋均云陽侯主江海文謂以陽侯為波神者蓋本此如祝融勾芒為海神之類九章哀郢云凌陽侯之氾濫兮忽翱翔之焉薄王逸曰陽侯大波之神韓策乘舟舟漏而弗塞則舟沈矣塞漏舟而輕陽侯之波則舟覆矣注博物志晉陽國侯溺水因為大海之神淮南子云武王伐紂渡於孟津陽侯之波逆而擊之高誘云陽侯陵陽國侯也其國近水溺死于水其神能為大波有所傷害謂之陽侯之波應劭曰陽侯古之諸侯有罪自投江其神為大波疑皆杜撰江賦陽侯遁形於大波又云陽侯砐硪以岸起海賦不汎陽侯天吳山海經朝陽之谷神曰天吳是為水伯海賦天吳乍見而髣髴琴賦天吳踊躍于重淵馮夷山海經曰中極之淵深三百仞唯冰夷都焉冰夷人面而乘龍穆天子傳云天子西征至于陽紆之山河伯無夷之所都居冰夷無夷即馮夷也淮南又作馮遲抱朴子釋鬼篇曰馮夷以八月上庚日渡河溺死天帝署為河伯清泠傳曰馮夷華陰潼鄉隄首人也服八石得水仙是為河伯龍魚河圖曰河伯姓名公子夫人姓馮名夷括地圖曰馮夷恒乘雲車駕二龍六郎韋浦遇鬼客歸元泉云早給事馮六郎于河中浦曰六郎何人歸曰馮六郎名夷即河伯軒轅天子之愛子也浦曰馮何得第六曰馮水官也水成數六耳河東記慶忌涸澤數百歲谷之不徙水之不絕者生慶忌慶忌者其狀若人其長四寸衣黃衣冠黃冠載黃蓋乘小馬好疾馳以其名呼之可使千里外一日反報此涸澤之精也涸川之精者生於蟡蟡者一頭而兩身其形若蛇其長八尺以其名呼之可以取魚鱉此涸川水之精也管子小人景王莽建國四年池陽有小人景長尺餘或乘車或步行操持萬物大小各自稱三日止然池陽之景者或慶忌也搜神記水飾圖經隋煬帝別敕學士杜寶脩水飾圖經十五卷新成以三月上巳日會群臣於曲水以觀水飾有神龜負八卦出河進於伏羲黃龍負圖出河玄龜銜符出洛大鱸魚銜籙圖出翠媯之水以授黃帝黃帝齋於玄扈鳳鳥降於洛上丹甲靈龜銜書出洛授蒼頡堯與舜坐舟浮河鳳鳥負圖赤龍載圖出河以授堯龍馬銜甲文出河授舜堯與舜遊河值五老人來告帝期堯見四子於汾水之陽舜漁於雷澤陶於河濱黃龍負黃文符璽之圖出河授舜舜與百工相和而歌魚躍於水白面長人而魚身捧河圖授禹舞而入河禹治水應龍以尾畫地導決水之所出鑿龍門疏河禹過江黃龍負舟玄夷蒼水使者授禹山海經遇兩神女神泉之上帝天乙觀洛黃魚雙躍化為黑玉帶以赤文姜嫄於河濱履巨人之跡棄后稷於寒冰之上鳥以翼薦而覆之文王坐靈沼於牣魚躍太子發渡河赤文白魚躍入王舟武王渡孟津操黃鉞以麾陽侯之波周公輔成王舉行舜禮樂榮光幕河穆天子奏鈞天樂於玄池獵於澡津獲玄貉白狐觴西王母於瑤池之上過九江黿鼉為梁塗脩國獻昭王青鳳丹鵠飲於浴溪王子晉吹笙于伊水鳳凰降秦始皇入海見海神漢高祖隱芒碭山澤上有紫雲武帝泛樓船於汾河遊昆明池去大魚之鉤遊洛水神上明珠及龍髓漢桓帝遊河值青牛自河而出曹瞞浴譙水擊水蛟魏文帝興師臨江不濟杜預造河橋成晉武帝臨會舉酒勸預五馬浮渡江一馬化為龍仙人酌醴泉之水金人乘金船蒼文玄龜銜書出洛青龍負書出河並進於周公呂望釣磻溪得玉璜文釣卞溪獲大鯉魚腹中得兵鈐齊桓公問愚公谷楚王渡江得萍實秦昭王宴於河曲金人捧水心劍造之吳大帝臨釣臺望葛玄劉備乘馬渡檀溪澹臺子羽過江兩龍夾舟淄邱訢與水神戰周處斬蛟屈原遇漁父卞隨投潁水許由洗耳趙簡子值津吏女孔子值阿谷女子秋胡妻赴水孔愉放龜莊惠觀魚鄭弘樵徑還風趙炳張蓋過江陽谷女子浴日屈原沈汨羅水巨靈開山長鯨吞舟若此等總七十二勢皆刻木為之或乘舟或乘山或乘平洲或乘盤石或乘宮殿木人長二尺許衣以綺羅裝以金碧及作雜禽獸魚鳥皆能運動如生隨曲水而行又間以妓航與水飾相次妓航水飾亦雕裝奇妙周旋曲池同以水機使之奇幻之異出於意表皆出自黃衮為之大業拾遺變血兆祥輔公祏據江東反命河間王孝恭擊之孝恭自荊州趣九江將發與諸將宴集命取水忽變為血在座者皆失色孝恭舉止自若徐諭之曰禍福無門唯人所召自顧無負於物諸公何見憂之深公祏惡積禍盈今承廟算以致討盌中之血乃公祏授首之後徵遂盡飲而罷時人服其識度而能安眾舊唐兆凶滎陽郡城西有永福湖引鄭水以漲之平時環岸皆植花木乃太守郊勞飲餞之所西南壖多脩竹喬林則故徐師崔常侍彥曾之別業也唐咸通中龐勛作亂彥曾為所執湖水赤如凝血者三日未幾而凶問至三水小牘道若黃帝曰道若川谷之水其出無已其行無止賈子穴石水經云古人有言水非石鑿而能入石劉子崇學篇云懸巖滴溜終能穴石規車牽索卒至斷軸水非石之鑽繩非木之鋸然而斷穴者積漸之所成也白水僧權道人居晉安霍山晨出澗忽見白水異常飲之甘如醴水過甚迅以器取得少許以餉陶晉安不復中飲權年百三十餘歲後不知所終名山略記鏡水古語君子不鏡於水而鏡於人鏡於水見面之容鏡於人則知吉凶墨子方諸取水陽燧取火於日方諸取水於月天地之間巧曆所不能與其數然以掌握之中引類於太極之上而水火可立致者陽陰因相動也論衡性清水之性欲清沙石穢之人之性欲平嗜欲害之故水激則波起炁亂則智昏昏智不可以為正波水不可以為平文子清濁水有濁有清河淮濁江濟清南陽有清冷之水丹水泉水汝南有黃水華山南有黑水天下之水類皆五色泞水不流博物志瀆水古之瀆水者因水之流也生稼者因地之宜也征伐者因民之欲也能因則無敵於天下矣文子水牒謝莊道里名詩山經亟旋覽水牒勌敷尋阿伽此云水形為四大氣冠五行禪源詮云水舉名濕指體澄之則清混之則濁堰之則止決之即流翻譯名義承穢海晦也主承穢濁其水黑如晦也釋名四海天地四方皆海水相通地在其中蓋無幾也七戎六蠻九夷八狄形類不同總而言之謂之四海言皆近於海也博物志百谷王江海所以能為百谷王者以其善下之故能為百谷王老子善為君者宜法江海江海不逆細流故為百谷長管子地脈天有五億五萬五千五百五十里地亦如之各以四海為脈關令內傳天池海天池以納百川者也說文北溟有魚其名為鯤化而為鳥其名為鵬海運則將徙于南溟南溟者天池也水擊三千里莊子水宗易林曰海為水宗聰明且聖百流歸德無有畔逆又云海為水王云云漢東海桓君海廟碑云浩浩滄海百川之宗金石錄朝夕池枚乘上書吳王曰遊曲臺臨上路不如挹朝夕之池吳都賦曰帶朝夕之濬池王簡棲頭陀寺碑曰挹朝夕之池者無以測其淺深地紀天以日月為綱地以四海為紀蜀都賦維浸大海為八維之浸日月為四方之燭法苑歸墟渤海之東不知幾億萬里有大壑焉實為無底者谷其下無底名曰歸墟八紘九野之水天漢之流莫不注之而無增無減焉列子尾閭莊子曰秋水時至百川灌河渚崖之間不辨牛馬河伯欣然自喜以天下之美為盡在已順流東行至於北海東面而視不見水端始旋其面目望洋向若而嘆北海若曰井蛙不可以語於海者拘於虛也夏蟲不可以語於冰者篤於時也曲士不可以語於道者束於教也天下之水莫大於海萬川歸之不知何時止而不盈尾閭泄之不知何時已而不虛春秋不變水旱不知此其過江河之流不可為量數計四海之在天地之間也不似鯨魚之在大澤乎計中國之在海內不似稊米之在太倉乎司馬云尾閭泄海水出外者也尾者在百川之下故稱尾閭者聚也水聚族之處故稱閭也楚辭使湘靈鼓瑟兮令海若舞馮夷沃焦玄中記曰天下之強者東海之惡燋焉水灌而不已惡燋者山名也在東海南方三萬里海水灌之而即消莊子疏云沃焦在碧海之東一石方圓四萬里厚四萬里海水注者無不焦盡故名沃焦山海經堯時十日並出堯使羿射九日落為沃焦佛藏云大海有石其名曰焦萬流沃之至石皆竭所以大海水不增長華嚴經云海有盡無餘寶能縮所注故無增減及娑竭龍宮水湧出有時是故潮不失時大壑諄芒將東之大壑適遇苑風於東海之濱苑風曰子將奚之曰將之大壑曰奚為焉曰夫大壑之為物也注焉而不滿酌焉而不竭吾將遊焉莊子渾沌南海之帝為儵北海之帝為忽中央之帝為渾沌儵與忽時相與遇於渾沌之地渾沌待之甚善儵與忽謀報渾沌之德曰人皆有七竅以視聽食息此獨無有嘗試鑿之日鑿一竅七日而渾沌死莊子禺疆莊子曰夫道禺疆得之立乎北極梁簡文云北海神也崔曰靈龜為之使大荒東經云黃帝生禺𧴆禺𧴆生禺京禺京處北海禺𧴆處東海是為海神注曰禺京即禺疆疏曰禺疆與顓帝並黃帝之孫也得道為水神歸藏曰昔穆王子筮卦於禺疆精衛填海發鳩之山有鳥如烏其名自詨是炎帝之少女名曰女娃女娃遊於東海溺而不返故為精衛常取西山之木石以堙于東海山海經東海之樂東海之鱉謂埳井之龜曰夫海千里之遠不足以舉其大千仞之高不足以極其深禹之時十年九潦而水弗為加益湯之時八年七旱而崖不為加損夫不為頃久推移不以多少進退者此亦東海之樂也莊子游海齊景公游海上而樂之六月不歸告左右曰敢有先言歸者死顏斶曰君樂治海不樂治國彼若有治國者君安得樂此海乎遂歸中道聞國人謀將不納之說苑韓子云田成子游海顏涿聚云云渡海秦始皇造觀日橋欲渡海或云非人所建海神為之驅石豎柱始皇感其惠乃通敬于神求與相見神曰我形醜約莫圖我形當與帝會始皇乃從石橋入海四十里與神相見左右有巧者潛以足畫神形怒曰帝負約可速去始皇轉馬前腳纔立後腳隨崩僅得登岸今咸陽山東入海道有豎石往往相望似橋石之狀又有柱石二乍有乍沒始皇標記也伏琛齊地記海神戰始皇夢與海神戰如人狀問占夢博士曰水神不可見以大魚蛟龍為候乃令入海者齎捕巨魚具而自以連弩候大魚出射之自瑯琊北至榮成山弗見至之罘見巨魚射殺一魚史記始皇碑海州海中去岸半里許有始皇碑高十一丈八尺廣五丈厚八尺三寸一行十一字潮水至加其上三文法則三尺見也地道記瀚海漢使驃騎將軍霍去病北伐單于至瀚海而還博物志海飛揚雄劇秦美新云神歇靈液海水群飛選海水群飛蔽于天杭太玄宋加齊高帝九錫策曰嗣君失德書契未紀神厭靈繹海水群飛南史紀九鼎共海水同飛兩日與洛川俱鬭薛道衡老氏碑王世充假隋恭帝禪位策文云海飛群水天出長星除舊之徵克著布新之祥允集河洛記唐公荅李密書崑山火烈海水群飛赤縣坵墟黔黎塗炭壺關錄李密與徐鴻客書壓海水之群飛憫蒼生之塗炭上照恕海王莽時韓博上言巨母霸出于蓬萊東南五城西北昭如海瀕漢書勃鞮海竇憲伐匈奴至勃鞮海後漢遭雕不害張霸字伯饒永元中為會稽太守入海捕賊遭疾風晦冥波水湧起士卒驚白霸霸曰無得恐太守奉法追賊風必不為害須臾風靜波止益部耆舊傳拔劍息風陳茂嘗為交阯別駕舊刺史行部不渡漲海刺史周敞涉海遇風船欲覆沒茂拔劍訶罵水神風即止息謝承書變桑田桓帝時麻姑與王方平降蔡經家麻姑云接待以來見東海三為桑田向到蓬萊水又淺於往者會時略半也豈將復還為陵陸乎方平笑曰聖人皆出東海行復揚塵耳神仙傳嘗有三老人相遇或問之年其一曰吾年不可記但憶少時與盤古有中外一曰海水變桑田吾輒下一籌已滿十屋矣一曰善師食蟠桃棄其核崑崙之下今與崑崙齊矣仇池筆記乘桴姜肱字伯維靈帝踐祚徵肱為太守肱告人曰吾以虛獲實蘊籍聲價盛明之際尚不委質今政在私門夫何為哉遂乘桴浮海莫知其極時人以為非凡風俗通李涓遼東人祖敏漢河漢太守去還鄉遼東太守公孫度欲強用之敏乘舟浮海莫知所終遇風悔過管寧避地遼東經海遇風船人危懼皆叩頭悔過寧思諐念向曾如廁不冠即便稽首風亦尋靜周景式孝子傳寧之歸也海中遇暴風船皆沒唯寧乘船自若時夜風晦冥船人盡惑莫知所泊望見有火光輒趣之得島島無居人又無火燼行人咸異焉以為神光之祐也傳子煮石濟海鮑靚為南海太守嘗行部入海遇風飢甚取白石煮食之以濟晉書海冰慕容皝將乘海討其弟仁襲其不意群臣以海道危阻宜從陸道皝曰舊海水無凌自仁反已來凍合者三矣昔光武因滹沱之水以濟大業天其或者欲吾乘此而尅之乎吾計決矣有沮謀者斬二月皝親率三軍擒仁賜死前燕錄晃上言成帝曰臣躬征平郭遠假陛下天地之威海為結冰凌行海中三百餘里臣及諸老言自立國初無海水冰凍之事王隱晉書望海荀中郎羡在京口登北固望海云雖未覩三山便自使人有凌雲意若秦漢之君必當蹇裳濡足世說泛海朱脩之陷魏後奔馮弘弘遣求救于宋泛海至東萊遇猛風柁折垂以長索船乃復正海師見飛鳥知其近岸須臾至東萊宋書海賦添鹽事齊書曰張融作海賦文詞詭激以示鎮軍將軍徐覬之覬之曰此賦實超玄虛但恨不道鹽爾融即求筆注曰漉沙搆白熬波出素積雪中春飛霜暑露安流梁汝南周捨少好學有才辨顧諧被使高麗以海路艱難問於捨捨曰晝則揆日而行夜則考星而泊海大便是安流從風不足為遠談藪鹿渾海太祖西征次鹿渾海後魏書不拜海神裴粲字文亮為膠州刺史屬時亢旱士民勸令禱于海粲憚違眾心乃為祈請直據胡床舉杯而言曰僕白君左右云前後例皆拜謁粲曰五嶽視三公四瀆視諸侯安有方伯而致禮海神也卒不肯拜上青海允吾縣西有卑禾羌海岱謂之青海李大亮討吐谷渾為河東道行軍總管與李靖俱出北道涉青海觀河源十三州記地獄門貞觀中遣新州刺史高表仁持節至倭國在大海中表仁浮海數月方至自云路經地獄之門其上氣色蓊鬱聞叫號鎚鍛之聲甚可畏懼唐會要失舟劉仁軌為李義府所惡出為青州刺史會討百濟仁軌當浮海運糧時未可行義府督之遭風失船丁夫溺死甚眾命御史袁異式往鞫之具獄以聞義府言於上曰不斬仁軌無以謝百姓舍人源直心曰海風暴起非人力所及上乃命除名以白衣從軍自效通鑑涉海則天革命使陸元方安輯嶺外將涉海時風濤甚壯舟人莫敢舉帆元方曰我受命無私神豈害我遽命之濟既而風濤果息舊唐封王天寶十載正月以東海為廣德王南海為廣利王西海為廣潤王北海為廣澤王分命卿監詣嶽瀆及山取三月十七日一時備禮兼冊祭通典不乘小艇歸崇敬充新羅冊立使至海中流濤波迅急舟船壞漏眾咸驚駭舟人請以小舟載崇敬曰舟人凡數十百我何忍獨濟哉少焉風息談賓錄鑿海交阯以北距南海有水路多覆舟船高駢往視之乃有橫石隱隱然在水中因奏以開鑿以通南海之利其表略云人操利楫石限橫津纔登一去之舟便作九泉之計時有詔聽之乃召工者啖以厚利竟削其石民至今賴之或言駢以術假雷電以開之北夢瑣言遇仙乾符末張建章為幽州行軍司馬曾齎府戎命往渤海遇風濤泊船忽有青衣泛一葉舟而至謂建章曰奉大仙命請大夫建章乃應之至一大島見樓臺巋然有仙女處之侍翼甚盛器食皆建章故鄉之常味也食畢告退女仙謂建章曰子不欺暗室所謂君子人也恐患風濤之苦吾令此青衣往來導之及還風濤寂然往來皆無所懼復命以水仙所遺鮫鮹自齎而進好事者為之立傳上海眼北海縣因發地得五銖錢取之不盡中得一石記云此是海眼以錢鎮之眾懼復掩之唐金華子鎖山齊郡接歷山上有古鐵鎖大如人臂繞其峰再浹相傳本海中山山神好移故海神鎖之挽鎖斷飛來於此矣酉陽雜俎甘棠港福建道以海口黃碕岸橫石巉峭常為舟楫之患閩王王審知思欲制置憚於力役乾寧中因夢金甲神自稱吳安王即伍子胥許助開鑿及覺命判官劉山甫躬往致祭三奠纔畢海內靈怪具見山甫因憑高觀之風雷暴興見一物非魚非龍黃鬣赤身可長千百丈奮躍攻擊凡三日風雷止霽已別開一港甚便行旅當時錄奏賜號甘棠港金溪閒談亦號此地為天威路北夢瑣言無恐段希堯使于吳越是時江淮不通凡使吳越者皆泛海而多風波之患希堯過海遭大風左右皆恐懼希堯曰吾平生不欺汝等恃吾可無恐也已而風亦止五代史蜃樓漢書曰海旁有蜃氣為樓臺登州海中時有雲氣如宮室臺觀人物車馬歷歷可見謂之海市歐公使河朔過高唐縣夜有鬼神自空中過人馬之聲可辨父老云二十年前晝過亦彷彿見人物謂之海市筆談海神移徙歐陽少師言為河北都轉運使冬月按部至滄景間於野亭夜半聞車旂兵馬之聲幾達旦不絕問宿彼處人云此海神移徙五七年間一有之春明退朝錄海人李仲游承議知同安縣日有人泛海舟交易外國經歲始還云為大風飄至一島嶼時月正明見十數人自海連臂而出登嶼笑語語不可解體貌與人無異但祼形耳舟人鳴鑼鼓以駭之復連臂大笑入海而去近嶼人云此名海人室在嶼下續墨客揮犀海洋宋楊康國錢勰使高麗豊稷為楊掌牋表言東海洋龍宮之寶藏所也氣如厚霧雖無風亦有巨浪使人臥木匣中雖蕩而身不搖食物盡吐唯餘少漿舟前大龜如屋兩目如巨燭光耀沙上舟人以此卜之見則無虞也孫公談圃三海釋鑑真姓淳于氏廣陵人日本國有沙門榮叡等東來募法真許往遂買舟齎經律法往焉俄漂入蛇海又入魚海復入鳥海既出泊一島池且泓澄人飲甘美相次達于日本高僧傳海井華亭市有一物如水桶而無底非金石竹木所製久未有知其名與所用者一日有海舶老商見之驚喜撫玩扣其所直其人漫索五百緡商即以三百償之其人因問之商曰此至寶也名曰海井凡航海必須以淡水自隨今但以大器滿貯海水置此井于水中汲之皆甘泉矣癸辛雜志海蛆凡海舟必用大板護其外不然則船身必為海蛆所蝕上泥油南海諸國有泥油今入海淺番船皆畜之淺番船相遇海中視其力之強弱則戰謂之併船凡併船則用四人立於柂斗上以泥油著小瓶中檳榔皮塞其口燃火於檳榔皮上自高投之泥油著板令人即仆又火得泥油遍延不息如以水沃之愈熾所制者乾泥與竈灰耳今官兵船不能近淺番者正畏此物也併船猶併國之謂無此不得戰具次之陰火海中所生魚蜃置陰處有光初見之以為怪異土人常推其義蓋鹹水所生海中水遇陰晦波如然火滿海以物擊之迸散如星火有月即不復見木玄虛海賦云陰火潛然豈謂此乎嶺南異物志紫海南昌國有紫海水色如爛椹可以染衣其龍魚龜鱉砂石草木無不紫色杜陽編幼海無皋之山南望幼海幼海少海也山經歧海甌閩皆在歧海中上漲海交阯七郡貢獻皆從漲海出入謝承書大秦西南漲海中可七八百里到珊瑚洲見洲底大盤石珊瑚生其上人以鐵網取之外國雜傳碧海扶桑在碧海之中有大帝宮太真東王公所治處東海外別有圓海繞蓬萊山海水正黑謂之溟海無風而洪波百丈惟飛仙能到其處十洲記有水為海李吉甫云河北得水便名為河塞北得水便名為海九水流注九嶷之山山有九峰峰有一水九江分流其下以注六合周而復始泝上於此以灌天河故九水源出此山也上下流注周于四海九水者一曰銀花水二曰復淑水三曰巢水四曰許水五曰歸水六曰沙水七曰金花水八曰永安水九曰晉水集仙傳海老易林遯之否曰海老水乾魚鱉蕭索高落無間獨有沙石海立杜少陵文九天之雲下垂四海之水皆立坡詩天外黑風吹海立浙東飛雨過江來西清詩話灌門海昌國縣海中有砥柱屹立中流望之如人拱立水匯于此旋涌若沸舟行必投以物殺其勢而後過風雨將作有聲如雷地志大渦寧海縣東海中有尾閭與海門馬筯相直自高山望之其水湍急陷為大渦者十餘舟楫不可近舊傳東海泄水處夷堅志金臺海中有金臺山高百丈結構巧麗窮盡神工橫立巖渚竦曜星門臺內有金機雕文備制幽明錄金銀城大意初入海中至白銀城次至黃金城次至水精城次至琉璃城龍王各與明月珠大志經三德海有三德一曰深廣無邊二曰清淨不受雜穢三曰藏積無量珍寶菩薩之德義同海也五德海有五德一澄淨不受屍二多出妙寶三大龍澍雨沛如車軸受而不溢四風月不能竭五淵深不測海志八德海有八未曾有大海漸深潮不過限不宿死尸百川來會無復異稱萬流悉歸而無增減出珍珠等寶大身眾生皆住其中同一鹹味是為八五分律海神東海君姓馮名脩夫人姓朱名隱娥南海君姓視名赤夫人姓翳名逸寥西海君姓勾太名邱夫人姓靈名素簡北海君姓是名禹張里夫人姓結名連翹龍魚河圖東海神名阿明南海祝融西海巨乘北海禺疆養生雜書海童不夜城淳于髡稱海童作妖城齊地記海童邀路馬銜當蹊海賦仙人齎持何等前謁海童吳歌川歸百川趨于海尚書大傳百川異源而皆歸于海淮南子百川派別歸海而會吳都賦噓噏百川洗滌淮漢海賦百川學海而至於海揚子渤海百川之大也隋地理志積水積石成山積水成海不積而能成者未之有也文子積土而為山積水而為海荀子不積跬步無以至千里不積小流無以成河海也上海不讓水積以成其大淮南子不辭水海不辭水故能成其大山不辭土石故能成其高管子海不辭東流大之至也莊子泰山不讓土壤故能成其大河海不擇細流故能就其深李斯書李權曰海以合流為大秦宓曰海以受淤歲一蕩清三國志潤千里三望者何望祭也祭太山河海也河海潤千里註能通氣致雨潤澤及于千里公羊僖三十一年無為古之善為君者法江海江海無為以成其大窊下以成其廣故能長久為天下谿谷其德乃足無為故能取百川不求故能得不行故能至文子天臺大荒中有山名曰天臺海水入焉山海經滄嶼海安縣南有小水南注乎海極目滄嶼渺望溟波南越志朝宗書曰江漢朝宗于海孔曰百川以海為宗詩云沔彼流水朝宗于海鄭云江水漢水其流遄疾又合為一共赴海也二溟袁彥伯三國名臣贊洪飈扇海二溟揚波莊子曰窮髮之北有溟海者天池也李弘範曰廣大窕冥故以溟為名謝莊赤鸚鵡賦禎流日域祥發鵬溟海澨顏延之詩且泛桂水潮映月游海澨南史停輿海澨駐蹕嵓址謂水邊土人所止者海錄瀛壖謝靈運詩周覽倦瀛壖況乃凌窮髮溟漲無端倪虛舟有超越渟海崇嶽渟海通瀆之神咸設壇場望受命之臻美新泛海謝安盤桓東山時與孫興公諸人汎海戲風起浪涌孫王諸人色並遽便唱使還太傅神情方怡吟嘯不言舟人以公貌閒意說猶去不止既風轉急浪猛諸人皆諠動不坐公徐云如此將無歸眾人即承響而回世說海決賁星墜而渤海決淮南子賁客星也海躍黃星騁海水躍考異郵宋均云黃星土精也熱海凌山葱嶺北隅坎雪積凌春夏不消懸釜而炊席冰而寢七日出山有青池熱海以其對凌山不凍故名之西域記海影翻諮議朱景玄見鮑容說陳司徒在揚州時東市塔影忽倒老人言海影翻則如此酉陽雜俎委輸於廓靈海長為委輸海賦委輸百谷歸朝宗萬川溢隋煬帝潮汐高麗圖經云潮汐往來為天地至信山海經云海鰌出入之度浮圖書云神龍變化所致竇叔蒙海嶠志云隨月盈虧盧肇海潮賦云日出于海衝擊而成抱朴子云天河激湧洞真經云地機翕張封演云月周天而潮應余安道云水往從月之禮弄潮浙江取其曲折為名源自歙州界東北流經界石山又東北流入海江濤每日晝夜再至常以月十日二十五最小月三日十八日極大小則水漸漲不過數尺大則濤湧高至數丈每年八月十八日數百里士女共觀舟人漁子泝濤觸浪謂之弄潮元和志子胥揚濤吳王賜子胥屬鏤之劍而死乃取其屍盛以鴟夷之器投之於江中子胥因隨流揚波依潮來往蕩激崩岸吳越春秋越王殺文種葬於國之西山葬一年伍子胥從海上穿山脇而持種去與之俱浮于海故前潮水潘侯者子胥也後重水者大夫種也上止濤夫差殺伍子胥煮之於鍋乃以鴟夷橐投之於江子胥恚恨驅水為濤以溺殺人今時會稽丹徒大江錢唐浙江皆立子胥之廟蓋欲慰其恨心止其猛濤也論衡時有見子胥乘素車白馬在潮頭之中因立廟以祠焉錄異記廬州城內淝河岸上亦有子胥廟每朝暮潮時淝河之水亦鼓怒而起至其廟前高一尺廣十餘丈食頃乃定俗云與錢唐潮水相應焉上鼓怒陸元輔胥山銘序曰屬鏤之賜竟及其身鴟夷盛屍投于水濱憤悱鼓怒配濤作神其神迄今一日再至來也海鴟群飛陽侯夾從奮于吳怫于越激于楚乃退於是仲秋朔望杭人以旗鼓迓之笳簫和之百城聚覩大耀威靈文粹投于河上自統波濤晝夜兩至懷沙類騷洗滌南北簸蕩東西雖非命祀不讓瀆齊銘呪潮唐靈隱寺釋寶達者以持密呪為務往時江潮大至激射湖上諸山達為誦咒之忽一夜江濤中有偉人至玄冠朱衣導從甚繁謂達曰身是子胥復讎雪恥者非他也師慈心為物已聞命矣言訖而滅明日寺僧怪其車馬之喧因言其事自爾西岸沙漲彌年高僧傳射潮梁開平四年錢武肅王始築捍海塘在候潮通江門外江濤晝夜衝擊沙岸版築不能就因命強弩數百以射濤頭又立子胥山祠仍為詩一章函置海門既而濤頭遂趨西北乃運巨石盛以竹籠植巨材捍之城基始定其重濠纍塹通衢廣陌亦由是而成焉吳越備史土人相傳吳越王箭所射止處嘗立鐵幢因名鐵幢浦臨安志錢王射潮退避後遂以鐵鑄成箭樣其大如杵作亭路傍埋箭亭中出土外猶七尺許以示鎮壓之義錢塘遺事辨濤傳書言吳王殺子胥投之於江實也言其恨恚驅水為濤者虛也屈原懷恨自投湘江湘江不為濤申徒狄蹈河而死河水不為濤夫地之有百川也猶人之有血脈也血脈流行汎揚動靜自有節度百川亦然其朝夕往來猶人之呼吸氣出入也論衡俗人云濤是子胥所作妄也子胥始死耳天地開闢已有濤水矣抱朴子沓潮早潮下晚潮上而水相合曰沓潮番禺記劉禹錫沓潮序云元和十年夏五月大風駕潮南海泛溢南人云沓潮率三歲有之瓊海潮瓊管志云江浙欽廉之潮皆有定候瓊海之潮半月東流半月西流潮之大小隨長短星不係月之盛衰寰宇記送女潮長興吳山下有溪名吳山灣昔吳王送女至此有潮高三尺倒流七十里名吳王送女潮西吳記聖水潮桂林府聖水巖則子時潮上午時潮落三五十年有一大潮廣西誌尹公潮苕溪在餘杭夾岸多苕花因得名相傳云古有尹公者善推候有異術鄉人王氏有女美質尹公求之不得叱水成潮以溺其居至今日暮則風生水長數寸號為尹公潮圖經山穴暗黑南海洲採珠人云海人入海必以繩係身岸上人持之或怪物潮來必動繩岸人與挽之助身而上又說或潮上海底山穴間必暗黑雷鳴水勃然而漲上及登岸則潮入浦漵矣物類相感志氣交氣變海潮每晝夜再至卯酉之月為陰陽之交氣以交而盛故潮獨大於餘月朔望之後為陰陽之變氣以變而盛故潮獨大於餘日臨安志觧江者貢也為其出珍物可貢獻也風俗通江者公也小水流入其中出物不私所公共也釋名源岷山江水出焉山海經岷山即瀆山也水曰瀆水矣又謂之汶阜山在徼外江水所導也水經注秦宓對夏侯纂曰蜀有汶阜之山江出其腹帝以會昌神以建福故能沃野千里淮濟四瀆江為首此其一也三國志井絡纏曜江漢昞靈泉流深遠盛為四瀆之首河圖括地象潤化牛女為江湖江湖者所以開神潤化故其氣喘息元命苞三江徐鉉云江出岷山至楚都名南江至潯陽為九道名中江至南徐州名北江入海二江蜀守李冰穿二江成都之中史記二江者郫江流江也益州記大江一名汶江一名管橋水亦名清江水江郫江一名成都江一名市橋江亦名中日江內江括地志五津大江自湔堰至犍為五津曰白華津萬里津江首津涉頭津江南津華陽國志龍負舟禹南省方濟乎江黃龍負舟舟中之人五色無主禹仰視而歎曰吾受命于天竭力以養民人生性也死命也余何憂於龍焉龍俛首曳尾而逝呂覽禹使迹之入於龍巢今在巴陵夏口浦十道四番志黿鼉為梁周穆王東至於九江叱黿鼉以為梁紀年深晏子曰吾聞江深五里海深十里補齊記濫觴子路盛服見孔子子曰由是裾裾何也昔者江出於岷山其始出也其源可以濫觴及其至江之津也不放舟不避風則不可涉也非維下流水多耶荀子甕口葉公諸梁問樂王鮒曰晉大夫趙文子為人何若對曰好學而受規諫葉公曰疑未盡矣對曰好學智也受規諫仁也江出汶山其源若甕口至楚國其廣十里無他故其下流多也人而好學受規諫宜哉其立也說苑飲江趙簡子問子貢曰孔子為人何如對曰賜不能識也簡子不說曰夫子事孔子數十年終業而去之而曰不識何也曰賜辟渴者之飲江海知足而已孔子猶江海也賜奚足以識之簡子曰善哉子貢之言也說苑齊景公問孔子於子貢子貢曰臣之事仲尼譬猶渴操壺杓就江海而飲之腹滿而去又安知江海之深乎韓詩外傳江上丈人伍員如吳過於荊至江上欲涉見一丈人刺小船方將漁從而請焉丈人渡之絕江問其名族則不肯告解其劍以予丈人曰此千金之劍也願獻之丈人丈人不肯受曰荊國之法得伍員者爵執圭祿萬檐金千鎰昔者子胥過吾猶不取今我何以子之千金劍為乎伍員過於吳使人求之江上則不能得也每食必祭之祝曰江上之丈人呂氏春秋中流推戈要離詐得罪於吳王出奔如衛見王子慶忌曰請與王子往奪之國王子慶忌曰善乃與要離俱涉於江中江拔劍以刺慶忌慶忌捽而投之於江浮則又取而投之如此者三其卒曰汝天下之國士也幸汝以成而名要離得不死歸於吳上漸臺著節楚昭王出遊留夫人貞姜漸臺江水大至遣使者迎夫人忘持符夫人曰王與宮人約召必以符今使者不持符妾不敢行於是使者取符臺崩夫人沈而死列女傳溺江澹臺滅明之子溺死于江弟子欲收葬之滅明止之曰此命也與螻蟻何親與魚鱉何仇弟子曰何夫子之不慈乎對曰生為吾子死非吾鬼遂不收葬博物志江妃江妃二女遊於江濱逢鄭交甫遂解佩與之交甫受珮而去數十步懷中無珮女亦不見列仙傳試水客艤輕舟娉江婓與神游吳都賦江妃含嚬而矊眇感交甫之喪珮江賦墜劍楚人有涉江者其劍自舟中墜於水遽契其舟曰是吾劍之所從墜舟止從其所契者入水求之舟已行矣而劍不行求劍若此不亦惑乎人有過於江上者見人方引嬰兒而欲投之江中嬰兒啼人問其故曰此其父善游其父雖善游其子豈遽善游哉呂覽江神鬭秦昭王使李冰為蜀守開成都兩江溉田萬頃神歲取童女二人為婦冰以其女與神為婚徑至神祠勸神酒酒杯恒澹澹冰厲聲以責之因忽不見良久有兩牛鬭於江岸傍有間冰還流汗謂官屬曰吾鬭大極當相助也南向腰中正白者我綬也主簿刺殺北面者江神遂死蜀人慕其氣決凡壯健者因名冰兒也風俗通要江神李冰於湔山下造大堋以壅江水外作石犀五頭以厭水精穿石犀溪於南江命曰犀牛里後轉犀牛二頭在府中一頭在市橋二頭沈之深淵水又自前堰上分穿羊摩江灌口西於玉女房下自涉郵作三石人立水中與江神要水竭不至足盛不沒肩迄今蒙福華陽國志燒崖僰道縣有蜀王兵蘭其神作大灘江中崖峻岨險不可穿鑿李冰乃積薪燒之故其處懸巖猶有赤白五色映水玄黃魚從楚來至此而止言畏崖嶼映其水故不更上也水經注錦江李冰鑿離碓辟沫水之害穿二江成都之中史記成都織錦既成濯於江水其文分明勝於初成益州志濯以佗江則錦色弱矣遂命之為錦里也水經注又名錦江杜甫詩錦江春色逐人來錦江春色來天地江伯秦時中宿縣十里外有觀亭江神祠堂甚靈異中宿縣民至洛及路見一行旅寄其書云吾家在觀亭亭廟前石間有懸藤即是也君至叩藤自有應者歸者如其言果有二人從水中出取書而淪尋還云江伯欲見君此人不覺隨去便覩屋宇精麗飲食鮮香言語接對無異世間今俗咸言觀亭有江伯神也南越志異苑王歆始興記作晉中朝有質子將歸云云迎母吳郡沈豐為郡主簿太守第五倫母老不能之官倫每至臘節常感戀垂泣遣豐迎母廣陵母見大江畏水不敢渡豐祭神令子孫對母飲酒因醉臥便渡謝承書治訟波清建初中張禹拜揚州刺史當過江行部中土民皆以江有子胥之神難於濟涉禹將度吏固請不聽禹厲言曰子胥如有靈知吾志在理察枉訟豈危我哉遂鼓楫而過續漢書飲江水廣漢姜詩妻龐氏事姑至孝姑好飲江水水距家七里妻常鷄鳴泝流而汲值風雪不得水詩責遣之妻往鄰家績紡供給因鄰母遺姑詩聞追還舍側忽有涌泉出味如江水華陽國志列女傳天隔南北魏文帝至廣陵臨江觀兵有渡江之志權嚴設固守時大寒冰舟不得入江帝見波濤洶湧嘆曰嗟乎固天所以隔南北也遂歸吳錄囊塞孫權詔曰呂岱諸葛恪道步隲說北人欲以布囊盛土塞江每讀此表令人連日失笑此江自天地以來寧有可塞者乎環齊吳紀遇風長嘯王廙字世將祖覽父正廙高明豪率王導庾亮遊于石頭會廙至爾日迅風飛颿廙倚樓船長嘯神氣甚逸導謂亮曰世將為復識事亮曰正是舒其逸耳別傳江神不守術士王猛過彭蠡遇天神云此江神不守其官覆溺生人吾奉帝命按之言終而失潯陽記沈書殷洪喬作豫章郡臨去都下人因附百許函書既至石頭悉擲水中因祝曰沈者自沈浮者自浮殷洪喬不能作致書郵世說萬里有人譏周覬與親言戲穢雜無檢節周曰吾若萬里長江何能不千里一曲上犁江王敦謂郭璞曰吾昨夜夢在石頭外江中扶犁耕占之璞曰大江扶犁耕亦自不成及反亦無成神仙傳擊楫渡江祖逖為奮威將軍及渡江中流擊楫而誓曰不清中原而復濟者有如大江晉書燃犀溫嶠至牛渚磯傳言水深不可測乃燃犀角照之須臾見水族奇怪或乘車馬至夜夢人謂曰與君幽冥道隔何苦相照嶠甚惡之未幾而卒上扇畫吳猛年四十許邑人丁義始授神方因還豫章江水甚急猛不假舟楫以白羽扇畫水而渡上漾舟世說云桓宣武在南洲與會稽王會于溧洲漾舟江側謝公亦在坐狂風忽起波浪鼓湧非人力所致桓有懼色會稽亦微異惟謝怡然自若頃間風止桓問謝曰向那得不懼謝徐笑曰何有三才同盡理金陵志五烈州下投鞭苻堅北定九州將大舉南伐苻融等咸諫止之不聽曰吾百萬之眾投鞭於江足斷其流又何險之足恃乎既至淝水大為謝玄等所敗臧榮緒晉書風止劉裕平慕容超將鎮下邳聞盧循反何無忌敗績舟次山陽過揚子江問行人曰朝廷如何對曰賊尚未至劉公若還無所憂也裕將濟而風急眾咸難之裕曰若有天命風當自息如天不助舟覆溺何足可怯耶命登舟舟移而風止三十國春秋蒿艾滿江紀僧真宋時為齊高帝尉軍府參軍主簿夢蒿艾生滿江驚而白之高帝曰詩人採蕭蕭即艾也蕭生斷流卿勿廣言南史告天安流王僧辨與陳霸先討侯景至盆口會于白茅洲為盟及發鵲頭中江而風浪師人咸懼僧辨再拜告天曰僧辨忠臣奉辭伐罪社稷中興當使風息若鼎命中淪請從此逝言訖風止自此遂泛安流有群魚躍水飛空引導遂大破之上江神楊素伐陳率水軍東下舟艫被江旌甲曜日素坐平乘大船容貌雄偉陳人望之懼曰清河公即江神也隋書天壍隋師將濟江群官請為備防後主未決孔範奏曰長江天壍古來限隔敵軍豈能飛渡南史杜預遣奇兵泛舟夜渡江都督孫歆懼曰北來諸軍乃飛渡江也晉書泛江長安中張柬之代楊元琰為荊州長史與元琰泛江中流言及則天革命議諸武擅權之狀元琰發言慷慨有匡復之意及柬之知政事奏引元琰為右羽林將軍至都柬之謂曰記昔江中之言乎今日之授意不細也舊唐廣源公天寶六載封江瀆為廣源公通典四十六祝文曰惟神總合大川朝宗巨海功昭潤化德表靈長敬用夏首脩其常典上一百二十楊溥順義二年正月封江瀆廣源王五代史出火楊渭武義二年冬十月濬東塘之楊林江水出火可以燃物九國志金湯孫忌使周對世宗云長江千里險過金湯方輿勝覽遊奕將陳堯咨泊舟三山磯有老叟云來日午後有大風舟行必覆宜慎之及日午黑雲起于天末大風暴至怒濤若山舟多沈溺公驚嘆之見前叟曰某江之遊奕將也以公他日當位宰相故當奉告翰府名談縈帶西陵江南岸有山孤秀從江中仰望壁立峻絕人自山南上至其嶺嶺容十許人四面望諸山略盡其勢俯臨大江如縈帶焉視舟船如鳧雁矣宜都記神朝君山荊江出巴蜀自高注下濁流洶湧夏秋暴漲則逆泛洞庭瀟湘清流頓皆混沖岳人謂之飜流水南至青草湖或三五日乃還俗云水神朝君山岳陽風土記三憮泉經媯水入東海釐降二女於媯汭豈其是乎江裏有上中下三憮言二女降時媯地高險迴曲使者至險輒憮然感嘆故曰三憮圖經三泠類集云江水至金山分為三泠中朝故事李德裕使取金山中泠水水記揚子江南泠水第一蔡祐竹窗雜記石排山北謂之北𤅷劉伯芻水品以中泠為第一陸羽茶經以為第二東坡詩中泠南旁石盤陀蔡肇詩中泠之西古石排丹徒志激赤岸京江禹貢北江也闊漫三十里通望大壑常以春秋朔望輒有大濤聲勢駭壯極為奇觀濤至江北激赤岸尤更迅猛山謙之南徐州記鼓洪濤於赤岸淪餘波乎柴桑郭璞江賦奇相江賦曰奇相得道而宅神廣雅曰江神謂之奇相江記云帝女也卒為江神蜀檮杌曰古史震蒙氏之女竊黃帝玄珠汎江而死化為此神即今江瀆廟是也山海經大禹生於石紐江瀆神生于汶川九江張須九江圖云九江參差隨水勢而分其間有洲或長或短百里至五十里始別於鄂陵終會于江口一云白烏江二云白蚌江三云烏土江四云嘉靡江五云甽江六云三里江七云菌洲江八云沙堤江九云廩江通典一百八十二書釋文不詳因出之長百川金人之銘曰江海雖左長於百川以其卑也家語大不三日趙襄子勝翟有憂色曰夫江河之大也不過三日飄風暴雨不終朝日中不須臾列子不惡小谷江河不惡小谷之滿已也故能大是故江河之水非一源之流墨子不擇小助太山不立好惡故能成其高江海不擇小助故能成其富韓非子開瀆累土不輟丘山崇成厭其源開其瀆江河可竭荀子塼塞以塼塗而塞江海也以僬僥而戴太山也上惡沱觀書者譬諸觀山及水升東嶽而知眾山之峛崺也況介邱乎浮滄海而知江河之惡沱也況枯澤乎揚子江南江以南水無大小俗人皆呼為江書正義湘江長沙湘江環城而下源出廣西興安縣海陽山西北流至分水嶺分為二派曰漓水流而南曰湘水流而北由靈渠與灌水會湘猶相也言有所合灕猶離也言違湘南流湘水至永州與瀟水合曰瀟湘至衡陽與蒸水合曰蒸湘至沅州與沅水合曰沅湘會眾流以達洞庭地志三江三江既入震澤底定書松江東北行七十里得三江口東北入海為婁江東南入海為東江并松江為三江是也吳地記浙江顧野王云浙江發源東陽新安之間不與岷山之江相涉至錢塘入于海虞喜志林注曰今錢塘江口浙江山正居江中潮水投山下折而曲一云江有反濤水勢折歸故云浙江史記云江水至會稽山陰為浙江是也水經曰浙江水出三天子都曲江觀于廣陵之曲江曲江今揚州也又始興郡有曲江今韶州是也又漢司焉相如弔秦二世賦曰臨曲江之隑州此即長安也以其水曲折甚類廣陵之江初學記水經注隴水南逕曲江縣東縣昔號曲紅曲紅山名也按漢桂陽太守周君碑陰自縣長區祉而下十七人皆書為曲紅又有綏民校尉桂陽曲紅灌陽長熊君碑則當時縣名曲紅無可疑者不知兩漢史皆云曲江何也金石錄溺錢韓滉鎮浙西浙右進錢船渡江為驚濤所溺篙公募人漉出兩辮不得眾以錢損其數滉至津部視之乃責江神因得其錢指曰此錢乾非水波得之者吏具實對復投詞詬責俄二緡浮出波上乃取之獨異志通漕興州長舉元和中節度使嚴礪自縣西疏嘉陵江二百里焚巨石沃醯以碎之通漕饋成州戍兵地理志解河下也隨地下處而通流也釋名河之為言荷也荷精分布懷陰引度也春秋說題辭水伯河者水之伯上應天漢援神契四瀆之精河者水之氣四瀆之精所以流化故曰河潤千里考異郵四瀆之源河最高而長從高注下水流激浚故其流急新論江淮河濟為四瀆瀆通也所以通中國垢濁風俗通其德著大故稱瀆白虎通瀆宗中國川原以百數莫著於四瀆而河為宗前漢志河四瀆之宗穆天子傳經亘河者經天亘地之水京房易傳經瀆谷永云河中國之經瀆聖王興則出圖書王道廢則竭絕潰溢橫流漂沒陵阜異之大者也脩政以應之災變自除溝洫志先河三王之祭川也皆先河而後海或源也或委也此之謂務本學記濁河山海經曰崑崙墟在西北河水出其東北隅爾雅曰色白所渠并千七百一川色黃物理論曰河色黃者眾川之流蓋濁之也百里一小曲千里一曲一直矣漢大司馬張仲議曰河水濁清澄一石水六斗泥而民競引河溉田今河不通利至三月桃花水至則河決以其噎不洩也禁民勿復引河是黃河兼濁河之名矣崑崙之輸河九折注海而流不絕者崑崙之輸也淮南子崑崙三層號曰天柱實惟河源水之靈府爾雅圖讚川瀆則洪河洋洋發源崑崙九流分逝北朝滄淵驚波而厲望沫揚奔徐幹齊都記咨靈川之遐源出崑崙之神邱涉津洛之浚泉播九道於中州應瑒靈河賦泑澤不周之山北望諸毗之山臨彼嶽崇之山東望泑澤河水所潛也其源渾渾泡泡山海經注泑澤即蒲澤一名蒲昌海廣三四百里其水停冬夏不增減去玉門關三百餘里即河之重源所謂潛行也渾渾泡泡水濆湧之聲也十二月水黃河十二月各有水名正月名凌解水二月三月名桃花水四月名麥黃水五月名瓜蔓水瓜正蔓也六月名礬山水七月八月名荻苗水荻花正開也九月名登高水十月名復槽水落復故道也十一月十二月名蹙凌水冰斷復結蹙起成層也水衡記九曲黃河出崑崙東北角剛山東自北行千里折西行干蒲山南流千里至文山東流千里至秦澤西流千里至潘澤陵門東北流千里至華山之陰東南流千里至下津然河水九曲其長九千里入渤海始誾圖上為星河導崑崙山名地首上為權勢星東流千里至規其山名地契上為距樓星北流千里至積石山名地肩上為別符星邠南千里入隴首山間抵龍門首名地根上為營室星龍門上為王良星為天橋神馬出河躍南流千里抵龍首至卷重山名地烟上為卷舌星東流貫砥柱觸閼流山名地喉上為樞星以運七政西距卷重山千里東至雒會名地神上為紀星東流至大岯山名地肱上為輔星東流過絳水千里至大陸名地腹幹上為虛星河圖始開黃帝問風后曰余欲知河之始開風后曰河凡有五皆始開乎崑崙之墟河圖始開圖授圖黃帝告天老曰余昔夢見兩龍挺白圖即帝以授余于河之都天老曰河有河圖洛有洛書天其授帝圖乎試齋以往視之黃帝乃齋河洛之間求象見者至千翠媯泉大盧魚折溜而至乃問天老子見中河折溜者乎見之與天老跪而受之魚泛白圖蘭采朱文以授黃帝舒而視之名曰錄圖上龍圖堯游河渚赤龍負圖以出圖赤如綈狀龍沒圖在元命苞負圖舜與諸侯觀河洛有黃龍負圖出置帝前入水而前去運斗樞去也孟門昔上古龍門未開呂梁未發河出孟門大溢逆流無有邱陵沃衍平原高阜盡皆滅之名曰鴻水禹於是疏河決江為彭蠡之障乾東土所活者千八百國呂覽砥柱昔禹治洪水山陵當水者鑿之故破山以通河河水分流包山而過山見水中若柱然故曰砥柱也三穿既決水流踈分指狀表日亦謂之三門矣其東千崤水注之河水翼岸夾山巍峰歧舉群山疊秀重嶺干霄鄭玄按地說河水東流貫砥柱觸閼流今世所謂砥柱者蓋乃閼流也砥柱當在西河未詳也按自西河當無山以礙之自砥柱以下五戶以上其間一百二十里河水竦石桀出勢連襄陸蓋以禹鑿以通河疑此閼流也其山雖闢尚梗湍流激石雲洄澴波怒深合有一十九灘水流迅急勢同三峽破害舟船自古所患水經注黃河中流有砥柱山一名三門山禹貢導河積石至于砥柱即此石形似柱故名山有三門禹鑿以通河南曰鬼門中曰神門北曰人門舟楫不通惟人門可通筏木陜州志龍門禹鑿龍門闢伊闕決江開岷導四瀆援神契注鑿龍門以通河鑿岷山以開江導淮於桐柏導濟於王屋故言導四瀆河下龍門其流駛如竹箭駟馬追弗能及慎子河津一名龍門禹鑿山斷門闊一里許黃河自中流下兩岸不通車馬每暮春之際有黃鯉魚逆流而上得者便化為龍三秦記河精禹理洪水觀於河見白面長人魚身出曰吾河精也授禹河圖而還於淵中候受綠字大禹觀於濁河而受綠字晉地理志綠圖姬氏之興也河出綠圖隋巢子榮光武王觀於河沈璧禮畢至於日昧榮光塞河青雲浮洛青龍臨壇銜元甲之圖吐之而去中候撝波武王伐紂渡于孟津陽侯之波逆流而擊疾風晦冥人馬不相見於是武王左操黃鉞右秉白旄瞋目而撝之曰余任天下誰敢害吾意者於是風濟而波罷淮南河宗天子西征騖行至于陽紆之山河伯無夷之所都居是惟河宗氏河宗伯夭逆天子燕然之山穆天子傳天子西征獵于滲澤獲白狐玄貉以祭河宗上沈璧秦伯納重耳及河子犯授公子載璧曰臣從君還軫巡於天下惡其多矣臣猶知之而況君乎不忍其死請由此亡公子曰所不與舅氏同心者有如河水沈璧以質國語史記河伯視之說苑有如白水河徙王平仲云周譜言定王五年河徙故道今所行處非禹所穿桓譚新論沈玉王子朝篡位與敬王戰乃改周之寶玉沈河以祈福後二日津人得之于河上敬王大夫陰不佞以溫人南侵將賣之則變而為石敬王位定得玉者獻之復為玉也左傳水經注游河范獻子游河大夫皆在君曰知欒氏之子乎大夫莫荅舟人清涓捨楫對曰君奚問欒氏之子君曰自亡吾欒氏者其老也未死少者壯矣清涓曰善脩晉國之政內得大夫外不失百姓雖欒氏子其若君何若不脩晉國之政內不得大夫而外失百姓則舟中之人皆欒氏子也君曰善尸子不祭韓褐子濟於河津人告曰夫人過於此者未有不快用者也而子不用乎韓褐子曰天子祭海內之神諸侯祭封域之內大夫祭其親士祭其祖禰褐也未得事河伯也津人申楫舟中水而運津人曰向也役人固已告矣夫子不聽役人之言也今舟中水而運甚殆治裝衣而下遊乎韓子曰吾不為人之惡我而改吾志不為我將死而改吾義言未已舟泆然行說苑沈河趙簡子沈鸞徼於河曰吾嘗好聲色矣而鸞徼致之吾嘗好宮室臺榭矣而鸞徼為之吾嘗好良馬善御矣而鸞徼來之今吾好士六年矣而鸞徼未嘗進一人也是長吾過而絀善也呂覽壅河梁山崩壅遏河三日不流晉君召伯尊伯尊遇輦者下車問焉為之奈何輦者曰天有山天崩之天有河天壅之雖召伯尊如之何君親素縞帥群臣而哭之既而祠焉斯流矣伯尊至君問之伯尊如其言而河流矣孔子聞之曰伯尊其無績乎攘善也榖梁傳左傳作伯宗為祟楚昭王有疾卜曰河為祟大夫請祭諸郊王曰三代命祀祭不越望江漢睢漳楚之望也河非所獲罪也遂弗祭孔子曰昭王知大道矣其不失國也宜哉左傳泣清費子陽謂子思曰吾念周室將滅涕泣不可禁也子思曰然今一人之身憂世之不治是憂河水濁而泣清也尸子以數集之壽憂天下之亂猶憂河水之涸泣而益之也文子負石申屠狄非世將自投於河崔嘉止之曰聖人民之父母也今為濡足之故不救溺人可乎申屠狄曰昔桀殺龍逢紂殺比干而亡天下吳殺子胥陳殺泄冶而滅其國非無聖知不用故也遂負石而沈於河韓詩外傳是以申徒狄蹈雍之河徐衍負石入海鄒陽書徐衍負石代子自甘守分亡身握石失軀論語讖墮水梁相死惠子欲之梁渡河而遽墮水中船人救之船人曰子欲何之而遽也曰梁無相吾欲往相之船人曰子居船楫之間而困無我則子死矣子何能相梁乎惠子曰子居船楫之間則吾不如子至於安國家全社稷子之比我蒙蒙如未視之狗耳說苑西閭過東渡河甘戊使齊事稍同德水昔秦文公出獵獲黑龍此其水德之瑞於是更名河曰德水封禪書玉牘秦王政以白璧沈河有黑頭公從河中出呼政曰祖龍來授天寶開中有尺二玉牘河圖考靈耀填河漢文帝時河決酸棗潰金隄元光中孝武決瓠子於是天子臨河沈白馬玉璧令群臣自將軍以下皆負薪填河下淇園之竹以為揵悼功之不成乃作歌曰瓠子決兮將奈何皓皓旰旰兮閭殫為河皇謂河公兮何不仁泛濫不止兮愁吾人齧桑浮兮淮泗滿久不反兮水維緩河湯湯兮激潺湲北渡回兮迅流難搴長茭兮湛美玉河公許兮薪不屬於是卒塞瓠子築宮其上名曰宣防史漢魚舞宣帝幸河東詔曰東濟大河天氣清靜神魚舞河幸萬歲宮神爵翔集前紀隄防建始五年河決東郡氾濫兗豫四郡漢史按圖緯當有能循禹之功在犍牁之資陽求之得王延世徵拜河堤謁者治河以竹落長四丈大九圍夾小船載小石治之三十六日隄防成帝嘉之改年曰河平華陽國志決溢哀帝時李尋說王根曰間者錯以山崩地動河不用其道請徵韓放放曉水掾周敞王望可與圖之又上言曰五行以水為本其星玄武婺女天地所紀終始所生水為準平王道公正脩明則百川理絡脈通偏黨失綱則踊溢為敗書云水曰潤下陰動而卑不失其道天下有道則河出圖洛出書故河洛決溢所為最大漢書廬堤涿郡王遵自益州刺史遷東郡太守河水盛溢泛浸瓠子全堤決壞遵躬率民吏投沈白馬祈水神河伯親執珪璧請身隕堤廬居其上吏民皆走遵立不動而水決齊足而止公私壯其勇節水經注潤九里郭伋為潁川太守光武召見辭謁帝勞之曰賢能太守去帝城不遠河潤九里冀京師並蒙其福也東觀漢記河清桓帝延熹九年濟陰東郡濟北平源河水清襄楷上疏曰春秋注記未有河清而今有之易乾鑿度曰上天將降嘉應河水先清京房易傳曰河水清天下平今天垂翼地吐妖民厲疫三者並作而有河清河者諸侯之相清者陽明之徵豈獨諸侯有窺京師也明年宮車晏駕徵解瀆侯為漢嗣是為靈帝續漢書河千年一清京房易傳黃河千年一清聖人之大瑞也拾遺記黃河清而聖人生運命論逆流梁冀專政天為見異河水逆流五星失次別傳張衡對策曰水者五行之首滯而逆流者人君之恩不能下及而教逆敦煌實錄悠悠袁紹將濟河沮授諫曰宜留屯延津分兵官渡紹弗從授臨濟嘆曰上盈其志下務其功悠悠黃河吾其不反乎獻帝傳鴻河戴延之西征記云陜城縣南倚山原北臨黃河懸水百餘仞臨之者咸悚惕焉西北帶河水湧起方數十丈有物居水中父老云銅翁仲所投處又云石虎載經終此沈沒二物並存水所以湧所未詳也或云翁仲頭髻常出水之漲減恒與水齊晉軍當至髻不復出今唯見水異耳嗟嗟有聲聲聞數里按鴻河巨瀆故應不為細梗躓湍長津碩浪無宜以微物屯流斯水之所以濤波者蓋史記所云魏文侯二十六年虢山崩壅河所致耳水經沈璧趙建武中造浮橋於津上採石為中濟石無大小下輒流去用功百萬經年不就石虎親閱作工沈璧于河明日璧流渚上波蕩上岸遂斬匠而還上河清頌宋元嘉中河濟俱清當時以為美瑞鮑照為河清頌敘曰歲宮乾維月躔蒼陸長河巨濟異源同清澄波萬壑潔瀾千里宋書義慶傳頌曰澄源崑岳鏡流葱山泉石凝澱水府清涓津波令爾朱榮之死也從子兆輕兵倍道掩襲京邑先是河邊有人夢神謂曰爾朱家欲渡河用爾作灅津波令為之縮水脈月餘夢者死及兆至有行人自言知水淺處以草往往表插而導焉忽失其所在兆遂策馬涉渡是日暴風迅怒黃塵揚天騎叩宮門宿衛乃覺一時散走莊帝步出雲龍門外為兆騎所擒北史祭河伯後魏高昂為西南道大都督徑趣商洛祭河伯曰河伯水中之神高敖曹地上之虎行經君所故相決酹北史靈源天寶六載河瀆封為靈源公通典祝文云惟神上通雲漢光啟圖書分導九枝旁潤千里素秋戒序用率典常上洋洋代宗初吐蕃犯便橋上幸陜常有紫氣如蓋以迎馬首及迴潼關上嘆曰河水洋洋送朕東去上至陜因望鐵牛蹶然謂左右曰朕年十五六宮中有尼號功德山屢撫吾背曰天下有災遇牛方迴今見牛也朕將迴爾杜陽雜編河瀆親家郭汾陽鎮蒲欲造浮橋而急流毀墠公酹酒許以小女妻之其夕水退木立墠上遂成橋而小女尋卒因塑廟中人因立公祠號河瀆親家翁乾饌子疏導薛平始河溢匏子東泛滑距城纔二里所平按求故道出黎陽西南因命其佐裴弘泰往請魏博節度使田弘正弘正許之乃籍民田所當者易以它地疏導二三十里以釃水繞還壖田七百頃於河南自是滑人無患唐書沈詔李彥佐在滄景太和九年有詔召浮陽兵比渡黃河時冬十二月至濟南郡使擊冰進舟冰觸舟舟覆詔失彥佐驚懼令津波不得詔盡死吏懼具請公一祝禱于河冀憑盻饗而有以復也彥佐乃令具爵酒及祝傳語詰河詞卒忽有聲如雷河冰中斷可三十丈乃沈鉤一釣隨鉤而出封角如舊惟篆印微濕耳唐闕史清流哀帝天祐二年朱全忠聚朝士貶官者三十餘人於白馬驛一夕盡投之投屍于河初李振屢舉進士竟不中第故深嫉縉紳之士言於全忠曰此輩常自謂清流宜投之黃河使為濁流全忠笑而許之唐書河源朵甘衛西鄙直馬湖蠻部正西三千餘里去雲南麗江府西北一千五百里水從地湧出百餘泓方七八十里履高瞰之燦若星列因名星宿海番名火敦腦兒東北流百餘里匯為大澤又東流為赤賓河又合忽蘭等河始名黃河又東北至陜西蘭縣始入中國又東北經沙漠地折而南流入山西境凡九千餘里元史土塞朱浮與彭寵書以區區漁陽而結怨天子此猶河濱之人捧土以塞河口多見其不知量也後書何武王嘉區區以一簣障江河用沒其身前書張儉以區區一掌而欲堙江河終嬰張讓之亂後書河赤晉昭公元年河赤于龍門三里梁惠成王四年河水赤于龍門三日竹書紀年河水赤下民恨京房易占計式水龜茲國南有大河東流號計式水即黃河也于闐國名樹枝水魏書委虵河以委虵故能遠山以陵遲故能高道以優游故能化淮南遶揚淮圍也圍遶揚州自北界東至海釋名均務淮出桐柏淮者均也均其務說題辭巫支祈禹治水三至桐柏山驚風迅雷石號木鳴五伯擁川天老肅兵不能興禹怒召集百靈乃命夔龍桐柏千君長稽請命禹因囚鴻蒙氏商章氏兜氏首盧氏犁婁氏乃獲淮渦水神名無支祈善應對言語辨江淮之淺深原隰之隰近形若猿猴縮鼻高額青軀白首金目雪牙頸伸百尺力踰九象摶擊騰踔疾奔輕利倏忽間視不可久禹授之童律不能制授之烏木田不能制授之庚辰能制鴟脾桓胡木魅水靈山妖石怪奔號藂繞以千數庚辰持戟遂去頸鎖大索鼻穿金鈴徙之淮陽之龜山足下俾淮水永安流注海也庚辰之後皆圖此形者免淮濤風水之難古岳瀆經水獸好為雲雨禹鎖之于軍山之下其名巫支祈山海經淮竭宋太始季年岷益有山崩淮水竭齊郡明僧紹竊謂其弟曰夫天地之氣不失其序陽伏而不泄陰迫而不蒸於是乎有山崩川竭之變昔伊洛竭而夏亡河竭而商亡三川竭岐山崩而周亡五山崩而漢亡夫有國必依山川而為固山川作變不亡何待今宋德如四代之季爾誌吾言而勿泄也竟如其言南史堰淮灌壽陽梁武帝時用魏降人王足計堰淮水以灌壽陽假康絢節督眾二十萬於鍾離南起浮山北抵巉石堰將合淮水漂疾復決潰眾患之或謂江淮多蛟能成風雨決壞崖岸其性惡鐵乃引東西二冶鐵器數千萬斤仍伐樹為幹填以巨石踰年堰成其長九里軍人列居其上其水清潔俯視邑居墳墓了然皆在其下或謂絢曰四瀆天所以節宣其氣不可久塞乃鑿湫東注魏壽陽城戍稍徙頓八公山居人散就岡壟絢徵還張豹子不脩堰至其秋淮水暴長堰壞奔流於海殺數萬人其聲若雷聞三百里水中怪物隨流而下或人頭魚身或龍形馬首殊類詭狀不可勝名北史梁書康絢傳亦載長源天寶六載淮瀆封為長源公通典祝文云惟神源流深泌潛潤溥洽阜成百榖疏滌三川青春伊始用遵典祑上楊溥二年正月封淮瀆長源王五代史隋薛道衡祭文云仰惟導源桐柏長邁蓬萊標四瀆而引百川擅五材而含七德淮神永泰元年楚州有漁人忽以淮中得古鎖不絕以告官刺史李陽大集人力引之鎖窮有獮猴躍出復沒後有驗山海經云水獸好為害禹鎖之名無支祁國史補截海而渡鷄林僧云本國瀕海島上其水多鹵或有如剉蘖投其中者惟淮波截海而渡味甘色徹愈病析酲其國或一歲怠于朝貢則淮水為之不至且多群疫水旱作唐闕史賦淵肅宗駐彭原第五琦奏事云今之急在兵兵彊弱在賦賦所出以江淮為淵唐書大計貞元八年淮南浙西大水權德輿建言江淮田一善熟則旁資數道故天下大計仰於東南上奧府江河淮海天之奧府眾利所聚可以饒有易林都市江河淮海天之都市商人受福國人富有上泫泫漢延熹六年王延壽桐柏廟碑云泫泫淮水聖禹所導湯湯其逝惟海是造疏穢濟遠柔順其道弱而能強仁而能武晝夜不舍明哲所取寔為四瀆與河合矩濟河而南濟濟也言源出河北濟河而南也釋名濟齊也齊度也圓也說題辭濟濟其度星也風俗通導沇禹貢導沇水東流為濟入于河溢為滎孔傳泉源為沇流去為濟出王屋沇水自王屋山頂崖下澄渟不流至孟州濟源縣西二里平地潛源重發名濟水王莽末旱此渠枯涸濟水但入河而已不復截流而南通典水尊麟德二年十月上發東都至濮陽問許敬宗曰濟水與濟源斷絕不相屬何故對曰禹貢導沇水東流為濟入于河自此潛流地下過河而南浸出為滎澤又潛流至曹濮之間散出平地漸合而東流為汶水自南至之古者五行皆有官守水官不失其職故辨其味與色潛流復出合而更分皆能識之尚書所載與今同矣上曰濟水細微而稱曰瀆何也對曰爾雅云瀆者獨也言不因餘水能獨赴海故也且天有五星運而為四時地有五嶽流而為四瀆人有五事用而為四支五陽數四陰數也陽者光曜陰者晦昧故星辰潛伏而難見濟水潛流而數絕狀雖細微其實尊也上稱善唐會要清泉天寶六載濟瀆封為清泉公通典祝文云惟神泉源清潔浸彼遐遠播通四氣作紀一方玄冬肇節聿脩典制上鬭口淀海畔有一沙阜高一丈周迴二里俗呼為鬭口淀是濟水入海之處海潮與濟相觸故名今淀上有甘泉可食海潮雖大淀終不沒百姓於其下煮鹽元和郡國志與河等秩唐李甘濟為瀆問今盡濟水之力載數石之舟廣不能橫深不能浮而曰與河同靈等秩吾不知先王班祀之意也視諸侯四瀆何以視諸侯能蕩滌垢濁焉能通百川於海焉能出雲雨千里焉為施甚大故視諸侯也說苑紀地晉高祖詔曰五嶽承天四瀆紀地冊府清濟濁河足以為限長城巨防足以為塞韓子天中記卷九
