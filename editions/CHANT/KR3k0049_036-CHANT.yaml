body:
  text: 浮圖名義真性即不垢不凈凡聖無差禪門則有淺有深階級殊等謂帶異計欣上厭下而修者是外道禪正信因果亦以欣厭而修者是凡夫禪悟我空偏真之理而修者是小乘禪悟我法二空所顯真理而修者是大乘禪若頓悟自心本來清凈元無煩惱無漏智性本自具足此心即佛畢竟無異依此而修者是最上乘禪亦名如來清凈禪亦名一行三昧亦名真如三昧上夫三藏之義者則內為戒定慧外為經律論以陀羅尼總攝之也陀羅尼者是菩提速疾之輪解脫吉祥之海三世諸佛生於此門慧照所傳一燈而已宋僧無畏傳法華經曰三乘者一曰聲聞乘二曰緣覺乘三曰菩薩乘聲聞者悟四諦而得道也緣覺者悟因緣而得道也菩薩者行六度而得道也然則羅漢得道全由佛教故以聲聞為名也辟支佛得道或聞因緣而解或聽環珮而得悟神能獨達故以緣覺為名也菩薩者大道之人也方便則止行六度真教則通修萬善功不為已志存廣濟故以大道為名也世說注沙門治心修凈其根業各差謂之三乘聲聞緣覺及以大乘取其可乘運以至道為名也魏釋老志釋道安上二教論云九流之教教止其身名為外教三乘之教教乘其心名為內教是以智度有內外兩經仁王辯內外二論方等明內外兩律百論言內外二道若通論內外則該彼華夷若局命此方則可云儒釋釋教為內儒教為外廣弘明大乘者蓋如來之道塲也故緣覺聲聞謂之小乘言法駕之通馳如舟車之致遠也李顒大乘賦序小乘列四果之梯大乘有十等之位從几入聖具有經論甄鸞笑道論一切諸佛皆有三身一者法身謂圓心所證二者報身謂萬善所感三者化身謂隨緣所現今釋迦牟尼佛者法身久證報身久成今之出現蓋化身耳禪林妙記佛道其始修心則依佛法僧謂之三歸若君子之三畏也又有五戒去殺盜婬妄言飲酒大意與仁義禮智信同云奉持之則生天勝處虧犯則墜鬼畜諸苦又善惡生處凡有六道焉釋老志此云調直定又云正定亦云正受圭峰疏云不受諸受名為正受遠法師云夫稱三昧者何專思寂想之謂也思專則志一不分想寂則氣虛神朗氣虛則智恬其照神朗則無幽不徹斯二乃是自然之玄符用一而致用也翻譯道家云貞一儒者云致一釋氏云三昧其義通也言一即有二遂至於三言三即昧在其間反覆存之而已佛書雜記苦集滅道是也苦謂一切生老病死之類集謂一切聚集骨肉財帛之類滅謂壞滅道謂修行類此名四諦謂其理審諦非徒說也經云見苦斷集因滅修道龍舒心經注四果預流即須陀洹為初果一來即斯陀含為二果不來即阿那含為三果無生即阿羅漢為四果自此以上獨覺菩提為辟支佛自覺覺他為一切菩薩摩訶薩行因果圓滿為諸佛無上正等菩提經云六通者三乘之功德也一曰天眼通見遠方之色二曰天耳通聞障外之聲三曰身通飛行隱顯四曰宅心通水鏡萬慮五曰宿命通神知巳往六曰漏盡通慧解累世三明者解脫在心朗照三世者也世說注佛身即法身也從六通生從三明生維摩經天眼宿命漏盡為三明僧肇五衍憑五衍之軾拯溺逝川選頭陀碑僧肇論曰聘六通之神驥乘五衍之安車五衍五乘天竺言衍此言乘五乘一人二天三聲聞四辟支佛五菩薩注一曰貪婬二曰瞋恚三曰愚癡四曰邪見五曰調戲別而言之求欲為貪耽著為婬外發為瞋內結為恚繫於縛著觸理倒惑為愚癡生死因緣癡為本一切諸著皆始於癡地獄苦酷多由於恚奉法要一曰施二曰戒三曰忍辱四曰精進五曰一心六曰智慧積而能散潤濟眾生施也謹守十善閑邪以誠戒也犯而不校常善下人忍辱也勤行所習夙夜匪懈精進也專心守意以約歛眾一心也凡此五事行以有心謂之俗度領以兼忘謂之道慧上三幡消一無於三幡選天台賦三幡色一也色空二也觀三也言三幡雖殊消令為一同歸於無也郤敬輿與謝慶緒書論三幡義曰近論三幡諸人猶多欲既觀色空別更觀識同在一有而重假二觀於理為長然敬輿之意以色空及觀為三幡識空及觀亦為三幡注二諦者一是真諦一名俗諦真諦亦名第一義俗諦亦名世諦勸臣以忠勸子以孝勸國以治勸家以和弘善示天堂之樂懲非顯地獄之苦此依俗諦也真諦彰本寂之理一性泯然所以實際理地不受一塵是非雙泯能所俱亡指萬象為真如會三乘歸實際此依真諦也翻譯一曰真智本來寂靜通達無涯二曰內智自覺無明割斷煩惱三曰外智分別根門識了塵境大涅槃經明三種報一順現報明王孝慈訓世則祥雲布壽星現仁君恩德及物則醴泉涌嘉苗秀善既有徵惡亦可驗樵客指熊而臂落酒客啖肉以皮穿二順生報今世雖行善惡之因次生方受苦樂之果缾沙轉報於四天有相改生於六欲三順後報因造今身報終後世伽吒七反而享餘慶那律久劫以受遠福此三種報皆名定業翻譯法身般若解脫是為三常樂我凈是為德無二生死為常不受二邊為樂具八目在為我三業清凈為凈金光明玄義第一為了自已輪回生死二為紹隆三寶三為六道四生皆令解脫古禪師語錄五濁劫濁見濁煩惱濁眾生濁命濁彌陀經六塵色聲香味觸法中論觀生如石女之懷兒觀住如陽焰之翻浪觀異同浮雲之萬變觀死猶狂花之謝空三有欲有色有無色有有者何謂一切有漏法是佛言若業能令後生相續是有又云生滅故名有墮苦集諦中是有婆沙論我今此身四大和合所謂毛髮爪齒皮肉筋骨腦髓垢色皆歸於地唾涕膿血涎沫津液痰淚精氣大小便利皆歸於水煖氣動火動靜歸風四大各離今者妄身當在何處圓覺經人生世間禍福從口生當護於口甚於猛火猛火能燒一世惡口能燒無數世猛火燒世間財惡口燒七聖財口舌皆鑿身之斧也七聖財謂一信二精進三戒四慚愧五聞捨六忍辱七定慧七者能資用成佛故名財報恩經法王立法周識心三界牢獄三科驗定一罪一福三道十使十惡此屬乎罪名為黑業報四惡趣五戒十善四禪四定此屬於福名曰白業報處人天三乘摩訶衍此屬乎道感報四聖此則凡聖界分因果事定以此三科收行盡矣翻譯謂色受想行識也色謂色身有形或黃或白是也受謂一切受苦受樂受用是也想謂一切思念是也行謂所行之事識謂曉解世間事五蘊即五陰道院集五陰是色陰受陰想陰行陰識陰十善者身不犯殺盜婬意不嫉恚癡口不妄言綺語兩舌惡口反十善者謂之十惡四過者上之所謂兩舌惡口妄言綺語也奉法要八正開八正之門大庇交喪頭陀碑維摩經曰雖行八正道而樂行無量佛道是菩薩行僧肇論曰啟八正之平路坦眾聖之夷塗大品經說八正曰正見正思惟正語正業正命正精進正念正定注六情一名六衰亦曰六欲謂目受色耳受聲鼻受香舌受味身受細滑心受識識者即上所謂識陰者也五陰六欲蓋生死之源本罪苦之所由奉法要金仙氏之道蓋本於孝敬而後積以眾德歸於空無其敷演教戒於中國者離為異門曰禪曰法曰律以誘掖迷濁柳永州龍興寺記白居易問惟寬禪師法何以說法師曰無上菩提被於身為律說於口為法行於心為禪應用者三其致一也譬如江湖淮漢在處立名名雖不一水則無二法要有三曰戒定慧唐宣宗問弘辨禪師曰云何名戒對曰防非止惡謂之戒帝曰云何為定對曰六根涉境心不隨緣名定帝曰云何為慧對曰心境俱空照覽無惑名慧五燈馬師云真如有變易豈不聞善知識者能回三毒為三聚凈戒回六賊為六神通回煩惱作菩提回無明作大智若真如無變易是外道也上古釋云遣妄曰真顯理曰如觀法師云無法非真何妄可遣無法不如何理可顯六祖謂智通曰三身者清凈法身汝之性也圓滿報身汝之智也千百億化身汝之行也若悟三身即名四智大圓鏡智平等性智妙觀察智成所作智傳燈慧日曜慧日於康衢則重昏夜曉頭陀碑劉蚪曰菩薩員凈照均明兩故曰慧日注慈雲如來慈心如彼大雲蔭注世界鷄跖集唐太宗手勑玄裝云慈雲欲卷收之廕四空慧日將昏朗之照八極舒朗之者其惟法師乎止能捨樂觀能離苦止能修心觀能修慧止如鑷鑷刺觀如剪剪髮心法雙亾止也心法雙照觀也大疾病中戒為良藥大恐怖中戒為守護大暗冥中戒為明燈三惡道中戒為橋梁五怖懼中戒為大船智度論梵云阿此云無梵語耨多羅此云上梵語三此云正梵語藐此云等梵語菩提此云覺是阿耨多羅三藐三菩提者乃無上正等正覺謂無上真性也心經注波羅蜜多梵經云波羅蜜多此云到彼岸彼岸者西土俗以設諭諸佛地謂之彼岸眾生輪回作業之地如在海中謂之此岸則佛地所以謂之彼岸上經云到者有六焉一曰檀檀者施也二曰毗黎黎者持戒也三曰羼提羼提者忍辱也四曰尸羅尸羅者精進也五曰禪禪者定也六曰般若般若者智慧也然則五者為舟般若為導導則俱絕有相之流升無相之彼岸也故曰波羅蜜也世說注彼岸者引之於有則高謝四流推之於無則俯弘六度頭陀碑遠法師阿毗曇敘曰阿毗曇者晉言大法也道標法師曰阿毗曇者秦言無比法也和南僧家謂合掌作禮曰和南禪苑清規口禮者如合掌問訊也觀音義疏云此方以拱手為恭外國以合掌為敬手本二邊今合為一表不散誕專至一心翻譯或云那漠婆南要律儀翻為恭敬善見論翻為度我法苑六宗之後為二泒一曰清原思思傳石頭遷其下為曹洞雲門法眼一曰南嶽讓讓傳馬祖其下為臨濟溈仰是為五家宗泒道一而已一棒一喝一唱一和機用縱橫南無此云歸命信順也佛覺也菩提亦覺也道之極者稱曰菩提菩提薩埵覺眾生也阿羅漢總音殺惱賊遠離諸惡堪總供養更不受三界生也釋迦能仁也牟尼寂默也彌勒慈氏也維摩詰凈名也婆羅門梵志也辟支獨覺也比丘乞士也上乞法下乞食也波羅蜜彼岸也多到也禪那靜慮也般若聰慧也三昧正定也又等特也奢摩它止息也瑜伽相應也阿耨多羅無上也三藐正也般涅槃般普也涅出也槃煩惱也叡堵波塔也茶毘亦云闍維焚燒也僧伽藍眾園也娑婆堪忍也懺悔懺謂懺摩請忍也羯磨作法辨事也阿僧祗無數也慈悲為佛眼正念為佛頭妙音為佛耳香林為佛鼻甘露為佛口四辯為佛舌六度為佛身四攝為佛首平等為佛指戒定為佛足種智為佛心四門入清涼地即方也所契之理平等大慧即等也維摩經以不思議為宗金剛經以無住為宗華嚴經以法界為宗涅盤經以佛性為宗千千重數故曰三十二過復千故曰大千迦維羅衛居其中也智度論蔥河以東名為震旦以日初出耀於東隅故得名也樓炭經琳法師云東方屬震是日出之方故云震旦或曰真丹或曰旃丹翻譯西域記云天竺舊云身篤或曰賢豆今從正音宜云印度印度者唐言月以其土聖賢繼軌導凡御物如月照臨五印度之境周九萬餘里三垂大海北背雪山北廣南狹形如半月劃野區分七十餘國時特暑熱地多泉濕成光子曰中天竺國東至震旦五萬八千里南至金地國西至阿拘遮國北至小香山阿耨達亦各五萬八千里則知彼為中國矣上印度常傳贍部一洲四王所治東謂脂那主人王也西謂波斯主寶王也南謂印度主象王也北謂獫狁主馬王也皆謂四國藉斯以治續玄裝傳布薩即說戒也凈住者即布薩之翻名布薩天言凈住人語或曰增進亦稱長養通道殊俗俱稟修行所謂凈身口意如戒而住故曰凈住也道宣凈行法門序練神練神者閉情關照期神曠劫幽靈不亡積習成聖階十地而逾明邁九宅而高蹈此什教所以弘也周什道安二教論遠辭九宅寧羅氏族之拘上清涼禪師云夫般若者苦海之慈航昏衢之巨燭也凈土傳云菩薩乘大願船住生死海就此世界呼引眾生上大願船如是送至西方如有往者無不得生維摩經曰以四大海水入一毛孔中不撓魚鱉等而彼大海本相如故又舍利佛住不思議菩薩斷取三千大千國界如陶家輪著右掌中擲過恒河沙國界之外其中眾生不覺不知又復還本處都不使人有往來相後漢西域傳注涅槃經曰阿闍王令醉象蹋佛佛以慈善根力舒其五指遂為五師子見爾時醉象惶懼而退上剎那無常者前滅後生剎那不住者也梁武記注剎那是天竺國音迅速之極名也弘明九俱舍云時之極少名剎那時之極長名為劫俱舍頌云極微字剎那色名時極少翻譯雖年百歲猶若剎那如東道之長波似西垂之殘照擊石之星火馳隙之迅駒風裏之微燈草頭之懸露臨崖之朽樹燦目之電光鳩摩羅什云天竺國俗甚重文製其工商體韻以入弦為善凡覲國王必有讚德見佛之儀以歌嘆為貴經中偈頌皆其式也但改梵為秦失其藻蔚雖得大義殊隔文體有似嚼飯與人非徒失味乃更嘔噦也長老莎伽陀降伏菴婆羅提陀惡龍及為酒困不能折伏蝦蟆故佛制戒小草頭一滴亦不得飲下酒是惡本酒是魔事梁武斷酒肉文釋善伏云不殺者佛教之都門也不能行之若講禮而為倨傲耳又勸行六道供以先祖諸亡者無越此途續二十一一不殺二不偷盜三不淫邪四不妄語五不飲酒六不坐高大床七不著花鬘瓔珞不用香油塗身董衣八不自歌舞不得輒往聽不過中食受此八戒名八關齋修行者不得食五辛言五辛者一葱二薤三韭四蒜五興渠梵網經釋慧日僧徒多迷五辛中興渠或云蕓薹胡荽或云阿魏唯凈土集中別行盡又云五辛此土唯有四一蒜二韭三葱四薤闕於興渠梵語稍訛正云形具餘國不見迴至于闐方得見也根粗如細蔓菁根而白其臭如蒜彼國人種取根食也于時冬天到彼不見枝葉薹荽非五辛所食無罪日親見為驗與唐高僧傳中國之西數萬里有國曰身毒釋迦牟尼如來示現之地彼佛言曰西方過十萬億佛土有世界曰極樂佛號無量壽如來其國無有三惡八難眾寶以為飾其人無有十纏九惱群聖以為友有能誠心大願歸心是土者茍念力具足則往生彼國然後出三界之外御淨土記鑿大昏夫佛之道可以轉惑見為真智即群迷為正覺捨大闇為光明夫性豈異物耶孰能為余鑿大昏之墉闢靈照之戶廣應物之軒者吾將與為徒龍興寺記懈慢國過此西方十二億那由他有懈慢國快樂安閑人欲往生阿彌陀佛國若從此國過人多染著即願生其中遂不得到阿彌陀佛國若人見此不貪不愛即得越過至安樂國此懈慢國亦曰疑城人遙見此城謂是極樂便生愛著菩薩處胎經心燈意蘂心燈夜炳意蘂晨飛晉安王書障火魔風障火焚心印魔風颺劫灰西域記云夫數量之稱踰繕那者舊曰由旬踰繕那者自古聖王一日軍行舊傳一踰繕那四十里印度國俗乃三十里聖教所載唯十六里大論云由旬三別大者八十里中者六十里下者四十里翻譯供父母曰恩田供佛僧曰敬田供貧病曰悲田總名曰福田見法論鬼宿佛教上屬鬼宿暗則佛教衰尚書故實太子出家時見鬼星與月合諸天唱大聲言大聖太子鬼宿已合今時至矣欲求勝法莫住于此佛本行經佛以二月八日沸星見時初成等正覺亦以二月八日沸星出時生以八月八日沸星出時轉法輪以八月八日沸星出時取般涅槃薩婆多論此云畜生婆沙云畜謂畜養謂彼橫生稟性愚癡不能自立為他畜養故名畜生翻譯白爭飯土言欲受八禁清凈齋戒所謂不殺生不偷盜不婬妷不妄語不飲酒不兩舌不惡口不無義語又願不貪欲不瞋恚不愚癡不生邪見本行經曇摩法也曇摩迦羅此云法時曇摩密多此云法秀曇摩流支此曰法希亦曰法樂曇亦法也曇無竭此云法勇亦云法上曇無德此云法密翻譯此翻為法唐明濬云契之於心然後以之為法在心為法形言為教法有自相共相教乃遮詮表詮上達摩流支此云法希善見論云此云乞食僧祗律云乞食分施僧尼衛護令修道業故云中食多論云從旦至中其明轉盛名之為時中後明沒名為非時今言中食以天中日午時得食僧祇云午時日影中一髮一瞬即是非時毗羅三昧經瓶沙王問佛何故日中佛食荅云早起諸天食日中三世佛食日西畜生食日暮鬼神食佛制斷六趣因令同三世佛食僧祇律敬袈裟如敬佛塔謂袈裟為福田衣衣名銷瘦取能銷瘦煩惱鎧名忍辱取能降伏魔軍亦喻蓮華不染泥滓亦為諸佛之所幢相則袈裟之為義其至矣廣弘明司戎議僧行薩婆多云臥具者三衣之名大凈法門經云袈裟者晉名去穢大集經名離染服賢愚經名出世服真諦雜記云袈裟是外國三衣之名名含多義或名離塵服由斷六塵故或名消瘦服由割煩惱故或名蓮華服服者離著故或名間色服以三如法色所成故言三色者律有三種壞色青黑木蘭青謂銅青黑謂雜泥木蘭即樹皮也應法師云韻作𣮫㲚音加沙葛洪字苑始改從衣翻高宗末疏勒國王遣使送釋迦牟尼佛袈裟衣一長二丈餘高宗以審是佛衣應有靈異遂燒之以驗虛實置於猛火之中經日不然觀者莫不悚駭心形俱肅魏書蜀金堂縣三學山開照寺衣群寇入寺劫掠緇徒聲盡寺元有釋迦藕絲袈裟為千載之異物也賊曹分取與其妻折而易之夫妻當時手指節節墮落鬚鬢俱墜尋事敗戮於市儆戒錄三衣僧祗云三衣者賢聖沙門之幖幟翻譯一曰僧伽梨即大衣也二曰鬱多羅僧即士條也三曰安陀會即五條也此是三衣若呼三條褊衫裙為三衣誤也員覺僧祗支西域記云正名僧迦鵄此云覆腋衣用覆左肩右開左合竺道祖云魏時請僧於內自恣宮人見僧偏袒不以為善遂作此衣施僧因綴於左邊祗支上因而受稱即褊衫右邊今隱祗支名通號兩袖曰褊衫隙棄羅此云錫杖由振時作錫錫聲故十誦名聲杖錫杖經又名智杖亦名德杖彰智行功德故聖人之幖幟賢士之明記道法之幢翻舒州潛山最奇絕而山麓尤勝誌公與白鶴道人皆居之因稟武帝帝以二人俱具靈通俾各以物識其地得者居之道人云某以鶴止處為記誌公云某以卓錫處為記已而鶴先飛去至麓將止忽聞空中錫飛聲誌公之錫遂卓於山麓而鶴驚止他所道人不懌然以前言不可食遂各以所識築室焉釋鑑釋子云遊行僧為飛錫安住僧為掛錫釋氏要覽聲論翻為磬亦翻鍾增一云阿難升講堂擊犍椎者此是如來信鼓也應法師準尼鈔云時至應臂吒犍搥梵語臂吒此云打犍搥此云所打之木翻又云凡有一箇銅鐵鳴者皆名犍椎又云但是金石板木砧鎚有聲可以集眾者皆名犍椎要覽梵語云唄者華言止斷外事外事止斷時任為法事唄者讚詠之聲也善見云聽汝作唄唄言說之辭也清而不濁雄而不猛流而不越凝而不滯遠聽則汪洋峻雅近屬則從容和肅法苑云尋西方之有唄猶東國之有讚讚者從文以結草唄者短偈以流頌比其事義名異實同佛道論衡云陳思王幼含珪章十歲能文每讀經文流連嗟玩以為至道之宗極也遂製轉讀七聲昇降曲折之響世之諷誦咸憲章焉嘗游魚山忽聞空中梵天之響清颺哀婉其聲動心獨聽良久而侍御莫聞植深感神理彌悟法應乃摹其聲節為梵唄撰文翻思王嘗登魚山臨東阿忽聞巖岫裏有誦經聲清道深亮遠谷流響肅然有靈氣不覺歛襟祗敬便有終焉之志即效而則之今梵唱皆植依擬所造異苑金言有譯梵響無授始有魏陳思王曹植深愛聲律屬意經音既通般遮之瑞響又感漁山之神製於是刪治瑞應本起以為學者之宗傳聲則三千有餘在契則四十有二高僧傳珠林齊僧辯能作梵契等音義云契之一字猶言一節一科也翻四姓釋迦者起自秦代釋道安云既存剃染紹繼釋迦子雖異父而姓無殊今者出家宜悉稱釋及翻四含果云四姓出家同一釋種眾咸歎其四姓一剎帝利此是王種二婆羅門是高行人三名毗舍如此土民四名首陀最為卑下如此土皂隸安當晉秦之時刪注群經自號彌天措摸季葉猶言譯胡為秦此一崑山之一礫未盡美焉法苑傳記梵稱泥犁秦言無有無有喜樂無氣味無歡無利故云無有或云無者更無赦處婆沙論名不自在謂彼罪人為獄卒阿傍之所拘制不得自在故名地獄又地者底也地最在下獄者局也謂拘局不得自在故名地獄梁言寄條城又言閉城也翻苑諸罪人未受罪之間共聚是處巧風所吹隨業輕重受大小身臭風所吹成就罪人粗醜之形香風所吹成就福人微細之體凈度三昧經云有三十地獄有五官主典一者鮮官禁殺二者水官禁盜三者鐵官禁婬四者言官禁兩舌五者天官禁酒法苑趙泰字文和宋太始中暴死而蘇云被捉將去遍歷地獄復見一城名為受變形城地獄考治已畢者當於此城更受變報泰入其城見大屋中有數百局吏對校文書云殺生者當作蜉蝣朝生暮死若為人常短命劫盜者當作猪羊受人屠割身屠肉償人婬逸者作鶴騖麞麋蛇身兩舌者作鵄梟鵂鶹人聞皆呪令死捍債者為驢騾牛馬魚鱉之屬冥報記幽冥錄阿鼻此云無間觀佛三昧經云阿言無鼻言救翻摩訶薩梵語摩訶薩者此云大有情即能救度人也地符觀音於諸先覺猶孔門之有亞聖其悲智應用鴻纖億剎常如視諸掌修多羅教函于藏輪周迴八角正道斯陳周迴八角角覺也佛以眼為八邪耳為八患鼻為八苦舌為八難迥八邪為八覺迥八患為八解脫迥八苦為八安樂迥八難為八王子指四八為三十二相由此八關返邪歸正成佛之境矣止則寂然無用引則轉而不窮動雖有聲靜乃無跡文苑轉關經藏記梵語修多羅此言經也什要覽梵云盂蘭此云救倒懸盆則此方器也華梵雙舉自目連救母始也要覽梵語鉢塞莫梁云數珠此是引接下根牽果修業之具也伽陀梵言伽陀此言諷誦祖廷事苑佛示滅後大弟子寅聖言而成經傳心印曰法承法而能傳曰宗由宗而分教曰支坐而攝化者勝義皆空之宗也行而宣教者推破邪山之支也釋子惠則生於像季思濟劫濁乃學于一支門役群迷以為盡妙理者莫如法門變凡夫者莫如佛土悟無深者莫如散花故業于凈名深達實相自京師涉漢沔歷鄢郢登熊湘劉禹錫送惠則歸上都夜雨山草濕爽籟雜枯木閒吟竺僊偈清絕過於玉貫休詩三禪沙門有三坐禪為上輩誦經為中輩助眾為下輩無為經荊州刺史李舟與妹書曰釋迦生中國設教如周孔周孔生西方設教如釋迦天堂無則已有則君子登地獄無則已有則小人入識者以為知言國史補含笑作姿以惑于人婬羅彌網人皆投身坐臥行立四面巧媚薄智愚人為之心醉執劍向敵是猶可勝女賊害人是不可禁毒蛇含毒猶可手捉女情惑人是不可觸智度論遍覽藏經無陰府寄庫之說譬如有人不為君子之行以交結賢人君子乃寄錢司理院獄子處待其下獄則用錢免罪豈不謬哉龍舒吃栗多梵云吃栗多唐言賤人寺寺司也官府所止故曰寺風俗通漢永平中佛教初至洛陽始置寺度騰蘭二德古者官之庭府稱寺蓋賓而尊之比干曹署此其源也李華杭州開元寺新塔碑寺者釋名曰嗣也治事者相嗣續於其內本是司名西僧乍來權止公司移入別居不忘其本還標寺號翻古德寺誥乃有多名或名道場即無生廷也或名為寺即公廷也或名凈往舍或名法同舍或名出世間舍或名精舍或名清凈無極園或名金剛凈剎或名寂滅道場或名遠離惡處或名親近善處並隨義立各有所表今道俗雜居豈得稱名也法苑白馬寺漢明帝所立也佛入中國之始帝夢金神號曰佛遣使向西域求之乃得經像焉時以白馬負經而來因以為名明帝崩起祗洹於陵上自此從後百姓冢上或作浮圖焉寺上經函至今猶存常燒香供養之經函時放光明耀於堂宇是以道俗禮敬之如仰真容伽藍記帝勑使西巡過四十餘國屆舍衛都僧云佛久滅度遂抄聖教六十萬五千言以白馬馱還所經嶮隘餘畜皆死白馬轉強嘉其神異洛陽立白馬寺焉漢明內記昔外國王欲滅佛法宣令毀壞塔寺次招提寺忽有一白馬從西方來繞塔悲鳴騰躍空中或復下地一日一夜鳴聲不絕以事啟王王即勑停已毀之塔並更修復由此白馬大法更興因改招提以為白馬故諸寺之號亦取是名焉法苑釋明概云化漸漢朝寺興白馬之號道流晉世剎建青龍之名廣弘明辨惑論劉禹錫集載僧靈徹詩云云經來白馬寺僧到赤烏年禹錫稱其工金石錄隋釋彥琮辨正論云至若開源白馬則語逐洛陽發序赤烏則言隨建業續高僧傳則天華嚴經序云鷲巖西峙象駕東驅注云謂白象馱經東來山川紀異云河南府有象庄象至洛陽化為石今石象猶存據此則白馬之說法苑似是釋慧遠屆潯陽見廬峰清靜足以息心始住龍泉精舍此處去水本遠乃以杖扣地曰若此中可得栖立當使朽壤抽泉言畢清泉湧出浚矣成溪少時潯陽亢旱遠詣池側讀龍王經忽有巨蛇從池上空須臾大雨歲以有年因號精舍為龍泉寺焉高僧傳時有沙門慧永居在西林與遠同門舊好遂要同上永謂刺史桓伊曰遠公方當弘道今徒屬已廣而來者方多貧道所棲褊狹不足相處如何桓乃為遠復於山東更立房殿即東林是也遠創造精舍洞盡山美却負香爐之峰傍帶瀑布之壑仍石疊基即松栽搆清泉環階白雲滿室復於寺內別置禪林森樹煙凝石逕苔冷凡在瞻履皆神清而氣肅焉既而謹律息心之士絕塵清信之賓並不期而至望風遙集上荊州河東寺者晉氏南遷郭璞多聞之士周訪地圖云此荊楚舊為王都欲於硤州置之嫌逼山遂止便有宜都之號下至松滋地有面勢都邑之像乃掘坑秤土嫌其太輕覆寫本坑土又不滿便止曰昔金陵王氣於今不絕固當經三百年矣便都建業仍於此置河東改遷裴薩柳杜四姓居之地在江曲之間類蒲州河曲故有河東目也有東西二寺法苑珠林泰山神通寺即南燕主慕容德為僧朗禪師之所立也上下諸院十有餘所長廊延袤千有餘間三度廢教人無敢撤欲有犯者朗輒現形以錫杖撝之病困垂死求悔先過還差如初寺立已來四百餘載佛像鮮榮色如新造眾禽不踐于今儼然古號為朗公寺以其感靈即目故天下崇焉開皇三年文帝以通徵屢感故改曰神通也續高釋慧受安樂人來遊京師常修福業嘗行至王坦之園夜輒夢於園中立寺如此數過受欲就王乞立一間屋處詣王陳之王大喜即以許焉初立一小屋每夕復夢見一青龍從南方來化為剎住受將沙彌試至新亭江尋覓乃見一長木隨流來下受曰必是吾所夢見者也於是雇人牽上豎立為剎架以一層道俗競集咸歎神異坦之即捨園為寺以受本鄉為名號曰安樂寺王雅劉鬥范鄰並施宅以成寺高僧傳景德靈隱寺在武林山之陰晉咸和元年梵僧慧理建理曰中天竺國靈鷲山之小嶺不知何年飛來佛在世日多為仙靈所隱今此亦復爾耶因掛錫造靈隱寺號其峰曰飛來葛洪書扁杭州志錢塘縣西有靈寺山者舊曰仙居峰吐蓮花洞藏龍穴信江東之秀嶽也續高僧貞觀傳宋元嘉中有慧嚴慧議道人並住東安寺學行精整為道俗所推時鬭塲寺多禪僧京師為之語曰鬭塲禪師窟東安談義林宋夷蠻傳天竺下金陵延祚寺宋太始中邦人所建也唐有靈知禪師生無雙目號羅㬋和尚經綸文子悉能明了時人號有天眼金陵志宋大明四年於丹陽中興寺設齋有一沙門容止獨秀舉眾往目皆莫識焉沙門惠璩往問之荅名惠明又問所住荅云從天安寺來語訖忽然不見天下無此寺名闔堂驚異以為明祥所賁幽應攸闡紫山可覩華臺不遠故上土盛士尅表大明之朝勸發妙身躬見龍飛之室意若曰陛下慧燭海縣明華日月故以慧明為人名繼興天祚式垂無疆故以天安為寺稱乃改中興曰天安寺宋蠻夷傳釋老志冥祥記崑山聚慧寺梁天監中沙門惠響欲建寺時忽見神請助千工是夜風雪頃刻暴作聞喑嗚之聲遲明基成帝賜名焉志梁武捨宅造光宅寺未成于小莊嚴寺造無量佛像長丈九尺未移前淮中佑客夜聞橋上數百人修道路往視不見人俄而像度光彩輝煥大覺寺大覺寺廣平王懷捨宅也北瞻芒嶺南眺洛汭東望宮闕西顧旗亭禪皋顯敞實為勝地是以溫子升碑云面水背山左朝右市是也環所居之堂上置七佛林池飛閣比之景明至於春風動樹則蘭開紫葉秋霜降草則菊吐黃花名僧大德寂以遣煩伽藍記陸馥為相州刺史假長廣公有善政其代還也吏人大歛布帛以遺之馥皆不受人亦不取於是以此物起佛寺焉因名長廣公寺北史俟傳修梵寺有金剛鳩鴿不入烏雀不棲菩薩達摩云得其真相伽藍記西域沙門跋陀者有深道業周太和所敬重詔于少室山陰立少林寺以居之公給衣供廣弘明義興安國寺陳武所營基址猶存釋慧弼修理之寺宇光華門房嚴麗故真觀法師製寺碑曰花塼錦石更累平階夏藻秋蓮環莊竦塔月臨月殿粉壁照於金波雲映雲臺畫梁承於玉葉是也續高釋童貞綜掇玄儒英猷秀舉抱操懷亮以德王當時隋文帝勑令往雍州置塔送舍利於終南山仙遊寺即古傳云秦穆公女名弄玉習仙升雲之所也上齊州靈巖荊州玉泉潤州棲霞台州國清世稱四絕晏殊類要歙溪據二浙上流古為新安郡溪西太平寺舊號興唐寺李太白嘗留題曰天台國清寺天下為四𤈦今到漢唐游奇蹤更無別枿木劃斷雲高僧頂殘雪檻外一條溪幾回碎明月溪即取太白詩名之也石刻尚存而集中不載曲淆舊聞唐云施無厭此伽藍南菴沒羅園中有池其龍名那爛陁旁建伽藍因取其稱西域記其寺周圍四十八里九寺一門是九天王所造西域伽藍無如其高廣矣常住僧眾四千餘人外客道俗通及邪正乃出萬數皆周給衣食無有窮竭故佛號寺為施無厭也中有佛院備諸聖迹精舍高者二十餘丈佛昔於中四月說法又有精舍高三十餘丈中諸變態不可名悉置立銅像高八丈餘六層閣盛莊嚴綺飾即戒日之兄滿胄王造也續高僧傳大中間裴休為宣州刺史建廣教寺其材皆松蘿惟安南有之相傳為黃蘖禪師所募時寺後有二金鷄相鬭入井中材皆從井中出寺成餘松蘿八株蘖師植之殿前輒敷榮長茂別有柏二株遇僧有異行者輒開異花數色今井中斷木尚存宣州志東海梅岑山耶補陀落伽山此云海島上有寶陀寺唐大中間有西域僧來燔盡十指頂禮洞前親感菩薩見大人相為說妙法授以七色寶石後日本僧慧諤自五臺得觀音瑞相欲返故國舟抵新螺嶕諤禱之曰使我國眾生無緣見佛當從所向立精藍有頃舟行竟泊于潮音洞下有居民張氏目覩斯異亟舍所居雙峰山卓庵奉之俗呼為不肯去觀音院郡聞遣迎其像置城中已而有僧即大眾中求嘉木刻像扃戶彌月工竟而僧不見宋元豐三年內殿王舜封使三韓至此有大龜負舟不得去望山作禮忽龜沒而舟行還以其事上之賜額寶陀寺惟大士以三十二應身入諸國土現八萬四千手臂接引群生與五臺之文殊峨眉之普賢為天下三大道塲寧波府志有咀落迦山南海有石天宮觀自在菩薩游舍西域記僧伽藍譯為眾園僧史略云為眾人園圃園圃生植之所佛弟子則生植道芽聖果也翻後魏太武帝始光元年造伽藍創立招提之名僧史伽藍之地本曰淨居栖心之所理尚幽寂唐高沙汰詔或云毗阿羅此云遊止處要覽經音義云梵去招鬭提奢唐言四方僧物後人寫之誤以拓為招又省去鬭奢二字只稱招提只今十方住持是也西溪叢語唐會昌五年毀招提蘭若四萬餘區又會要元和二年官賜額為寺私造者為招提蘭若及招挺菩薩皆古佛號故寺謂之招提或名伽藍釋書阿蘭若或名阿練若大論翻遠離處薩婆多論翻閑靜處天台云不作眾累名之為閑無憒鬧故名之為靜或翻無諍謂所居不潔之故即離聚落五里處也肇云忿競生乎眾娶無諍出乎空閑故佛讚住於阿蘭若應師翻空寂翻四分律云空靜處寺或名精舍釋迦譜云息心所栖故曰精舍靈裕寺誥曰非粗暴者所居故云精舍藝文類云非由其舍精妙良由精練行者所居也或名道場肇師云修道之場隋煬帝勑天下寺院皆名道場止觀云道場清淨境界或名僧坊者別屋謂之坊也翻雞園雞園在摩竭陀國無憂王造小乘大眾出家寺也佛滅後眾多名德比丘皆住雞園西域記雞頭摩竦疏釋雞園引智論云昔有野火燒林林中有雉入水漬羽以救其焚纂要云即雞頭摩寺翻鹿苑在羅茶柰國佛成道初轉法輪處也鹿園深義龍宮奧說廣弘明鴈堂毗舍離於大林為佛作堂形如鴈子一切具足要覽鷲嶺耆闍窟山中山形如鷲佛常居此中故號鷲嶺法華須達多長者白佛言弟子欲營精舍請佛住惟有祗陀太子園廣八十頃林木鬱茂幽凈可居白太子太子戲曰滿以金布便當相與須達出金布八十頃精舍告成凡千二百區經律異相須達多長者居舍衛國常施孤獨故曰給孤獨上祗洹林樹名梵云祗陁洹此云戰雖即太子名須達長者施園祗陁太子施樹為佛說法之處故後人曰祗園亦曰給孤園金剛經注或云金地即舍衛國給孤長者側布黃金買祗陀太子園建精舍諸佛居之處也雞跖五臺佛光寺願誠治棲金地禮行嚴為師宋僧傳寶坊給孤長者布黃金地為伽藍故寺宇號為寶坊雞跖梵論貧婆此云叢林譬如大樹叢叢故僧聚處得名叢林祖庭事苑方丈吠舍黧園有維摩故宅顯慶中王玄策因向印度過凈名宅以笏量基止有十笏故號方丈室唐高僧紫紺殿碧玉之樓昇堂未易紫紺之殿入室為難梁元帝紺園白帖紺殿橫江上李白殿宇餘丹紺韋蘇州菴羅園闡義云菴羅是果樹之名其果似桃或云似柰此樹開華華生一女國人嘆異以園封之園既屬女女人守護故言菴羅樹園宿善冥熏見佛歡喜以園奉佛佛即受之而為所住翻菴羅肇汪云柰也柰女經云維耶梨國梵志園中植此柰樹樹生此女梵志收養至年十五顏色端正王收為妃女乃以苑地施佛為伽藍故曰柰苑雞跖鷲嶺三層塔菴園一講堂沈炯香城究香城之妙理窮金河之奧說王僧孺香城金簡龍宮玉牒二教論鹿樹表光金河匿曜法苑千佛香界佛寺曰香界亦曰香阜因香所生以為香界楞嚴經高適詩香界泯群有江總詩息舟候香阜悵別在寒林齊竟陵王三界外樂門頌云燈祗開遠照香宇薦嘉薰蓮花界蓮花界蓮宮花宮金界金繩界道福界沈炯從遊中天寺應令曰福界開新草儴佉宮時我及眾僧俱出靈鷲山儴佉宮孱然可期弘明集引法華經伏承輿駕尋幸伽藍冀於此時得一覯止辨論青豆之房遣惑赤華之舍廣梁簡文楚王英為浮屠齋戒祭祀奉送縑帛以贖愆罪詔報曰楚王誦黃老之微言尚浮屠之仁祠何嫌何疑後漢常琮侍煬帝遊寶山帝曰幾時到上方琮曰昏暗應須到上頭左右失笑帝曰淳古君子也隋傳釋慧明欲移湖州佛川寺泉側有吳王古祠夜神謂明曰師欲移寺弟子願捨此處永奉禪宮後果移寺於祠側獲銅盤之底篆文有慧明二字焉高僧傳彼國名鴿達嚫國有迦葉佛伽藍穿大石山作之有五重最下為鴈形第二層作師子形第三層作馬形第四層作牛形第五層作鵠形為波羅越佛游天竺本記青鴛須彌山下有青鴛伽藍大藏經莊嚴下壓象迹歡喜之地上接蜂歌莊嚴之境叚成式愬像記二梵世尊說四梵福若能補理故寺是謂二梵之福阿含姚興如逍遙園引諸沙門于澄玄堂聽鳩摩羅什演佛經公卿已下莫不欽附沙門自遠而至者五千餘人起浮圖於永貴里立波若臺於中宮沙門坐禪者恒有千數州郡化之事佛者十室而九矣晉書阿含此云故涉法師云阿含此云傳所說義唯識論云謂諸如來所說之教長阿含序云阿含者秦言法歸所謂萬法之淵府摠時之林苑也翻正言駿迦佛住南海濱入楞伽國摩羅耶山而說此經梵語楞伽此云不可往唯神通人方能到也阿跋多羅此云入謂入此山中而說此寶或翻無上謂此經法是無上寶上是諸大乘經為滿子無欠少之義也小乘諸教悉為半字義未圓故云半字涅槃經張緒為中書令善談玄駕幸莊嚴寺聽僧達道人講維摩坐遠不聞緒言上難移緒乃遷僧達齊書張稷出為青冀二州刺史而不得志嘗閉閣讀佛經梁書盧景裕魏節閔帝時為國子博士後河間邢摩納與景裕從兄盧仲禮據鄉作逆連坐景裕繫晉陽獄景裕至心誦金剛經枷鎖自脫是時又有孫敬德負罪當死夢沙門教誦救坐觀世音經覺時如所夢謂誦千遍臨刑刀折主者以聞丞相高歡表請免死勑寫其經廣布於世今謂高王觀世音經北史續高僧報應記蕭瑀篤信佛法常持金剛經議伐高麗不合旨上大怒與賀若弼高熲同禁欲寘於法瑀就其所八日念金剛經七百遍明日桎梏忽自脫守者失色復為著至殿前獨宥瑀報應記大雲金仙降旨大雲之偈先彰則天華嚴經序北涼三藏曇無讖所譯大方等無相經大雲分云爾時眾中有一天女名曰凈光聞法歡喜供養如來佛即為說宿世因緣乃告之曰汝當來世即以女身當王國土得轉輪王所統領處四分之一得大自在受持五戒作優婆夷守護正法摧伏外道汝於爾時實是菩薩為化眾生現受女身注曰是大雲先彰讖武后為天子之文也寶雨玉扆披詳寶雨之文後及上寶雨經第一卷云佛記日月凈光天子宿種善根以是因緣我涅槃後第四五百年汝於贍部東支那國故現女身為自在主正法治化能於我法廣大住持清涼師云此時更無女主斯言不妄也懺之始本自齊南竟陵王因夜夢往東方普光王如來所聽彼如來說法後因述懺悔之言覺後即賓席梁武王融謝朓沈約共言其事王因茲乃述成竟陵集二十篇懺悔一篇後梁武得位思懺六根罪業即將懺悔一篇乃召真觀法師慧式遂廣演其文述引諸經而為之故第二卷中發菩提心文云慧式不惟凡品輕摽心志實由渴仰大乘貪求佛法依倚諸經取譬世事即非是為郗后所作今之序文不知何所作與本述不同近南人新開印本去其慧式二字蓋不知本末也南部漢桓帝於宮中鑄黃金浮圖老子像覆以百寶華蓋身奉祀之由是百姓向化事佛彌盛世人以金銀作佛像自此而始釋鑑金瑞像揚州育王金瑞像者吳孫皓時後園所獲皓使置穢處以為笑樂俄得腫疾隱處尤痛太史占曰犯大神也皓謝之有間因爾開信弘明法像瑞集會稽山陰靈寶寺木像者徵士譙國戴逵所製東夏製像之妙未有如其工者也道俗瞻仰忽若親遇高平郗嘉賓撮香呪曰若使有常將復覩聖顏如其無常願會彌勒之前所捨之香於手自然芳煙直上極目雲際餘芬徘徊馨盈一寺于時道俗莫不感厲像今在越州嘉祥寺法苑金像行襄州檀溪寺今像行者寧康中釋道安所造也及成就已乃行至萬山明迎返寺其夕又出至寺門至山蹋石現一足相周武滅法鎮副長孫哲志性兇粗先欲除毀令百人以索繫頸挽之不動哲大怒乃至加五百人方倒震地哲喜落馬尋卒當毀像時於腋下倒垂衣內銘云晉太元十九年歲次甲午比江道安於襄陽西郭造丈八金像此像更三周甲午百八十年當滅計勘年月興廢悉符同焉信知印手聖人崇建容範動發物心生滅之期世相難改業理之致復何虛矣續高僧傳秦將呂光伐龜茲將軍杜進夢金像飛越龜茲之城曰所謂佛神去之胡亡必矣晉書陳留王景皓夙善玄言道家之業捨半宅安置佛徒唱演大乘數部遂進京師大德菩提流支等時有奉朝請孟仲暉者學兼釋氏恒來造第與沙門論議時號為玄宗先生暉遂造人中夾貯像一軀相好端嚴希世所有置皓前廳須臾彌寶坐永安二年中此像每夜行遶其坐四面腳跡隱地成文於是士庶咸來觀矚永熙三年秋忽然自去莫知所之其年冬而京師遷鄴伽藍記普泰元年臨覺寺金像生毛眉髮悉皆具足尚書左丞魏季景謂人曰張天錫有此事其國遂滅此亦不祥之政至明年而廣陵被廢死上有沙門晏通於道傍造大漆像教化乞財所得物咸入常住嘗以杖敲此像號曰出課烏奴北齊玉華陰鐵礦瑞像者周武滅法有姜明者督事夜行每見山上光明旦往尋之有臥石狀如像便斲掘四邊乃是鐵礦不可傷損舉身三丈谷中有趺乃共村人拗舉忽然下流經趣趺孔卓然特立以狀聞奏時天元嗣曆改元大像勑其處為大像寺因開佛法廣弘明出涕襄州峴山華嚴寺盧舍那瑞像者本是周朝右像法滅藏之得存每有凶相以涕出為期隋文將崩一鼻涕出沾污于懷今薄剝起雖後修飾望還如涕貞觀末年四月內連涕不止塗污胸懷方可尺許太宗升遐方驗先兆上西小湖天台教寺舊名觀音教寺相傳唐乾符中有沈香觀音像泛太湖而來小湖寺僧迎得之有草繞像足投之小湖遂生千葉蓮花蘇州舊志長沙寺有阿育王像相傳是阿育王女所造太元中夜浮至江津漁人見異光如晝而諸寺以千人迎之嶷然不動長沙寺翼法師者操行精苦乃率十僧至誠祈啟即時就輦至齊末僧常夜行不知者以槊刺之作銅聲而倒每南朝大事及災疫必先流汗數日自像教已來最為靈應也渚宮遺事有邸嫗鋤桑拾得一銅觀音像穴壁安之皆將供養嫗有子時在潘葑軍前日夕祝之保其安寧其子當陣之際倒于草間聞背上連下三劍似擊銅器聲戰罷起看身並無所傷其母此日見銅像落在地背上有三刃痕罔知其由至子回說其事方知神助爾葆光錄二郗奉道二何奉佛皆以財賄謝中郎云二郗諂於道二何佞於佛世說何充性好佛道崇修佛寺供給沙門以百數久在揚州徵役吏民功賞萬計是以為遐邇所譏充弟準亦精勤唯讀佛經營治寺廟而已矣晉陽秋王恭性雖抗直而闇於機會自矜貴不閑用兵尤信佛道臨刑猶誦經神色無懼晉書齊竟陵王子良幼含勝慧結志隆雲誠感懇徵亟發靈應以永明七年二月八日於西第在內堂法會見佛從東來威容顯曜文宣望身頂禮因而侍立自覺已冠裁及趺踝佛俛而微笑既而咳唾白如凝雪以手承捧變為玉稻法苑子良嘗招致名僧講論佛法造經唄新聲數於邸園營齋戒大集朝臣眾僧至賦食行水或躬親其事世頗以為失宰相體武帝不豫子良啟進沙門於殿戶前誦經武帝為感夢見優曇鉢花子良案佛經宣旨使御府以銅為花插御床四角齊梁高祖崇信佛道於建業起同泰寺又於故宅立光宅寺皆窮極工巧殫竭財力百姓怨苦殆不聊生自以其身施同泰寺為奴朝廷共歛珍贖之有事佛精苦者輒加菩薩之號其下書皆云皇帝菩薩談藪高祖崇重釋侶欣尚靈儀造等身金銀像二軀於重雲殿晨夕禮敬五十許年初無替廢續高僧僧明傳後王沈皇后諱婺華身居儉約唯尋閱圖史及釋典為事常遇歲旱自暴而誦經應時雨降陳亡入隋及煬帝崩自廣陵過江於毘陵天靜寺為尼名觀音陳書令師踐髮武成帝河清二年帝築壇於內具問道禮儀請上法師授歸戒帝布髮于地令上踐其髮而升座帝授大戒畢次命八座重臣及妃后戚屬皆授菩薩戒刱報德寺移上法師主之上性儉素雖當大統位國師而壞衣布褐未嘗乘肩輿世益以此重之諺曰四海僧望道塲法上釋鑑隋文帝開皇十四年曇崇法師道重當時入大內為宣凈業帝每禮接自稱師兒皇后延德又稱師女師所獲外利盡施伽藍綠身資蓄衣鉢而已上俾僧據身楊希古性酷嗜佛法常置僧于第陳列佛像雜以幡蓋所謂道塲者每夌旦輒入其內以身俛地俾僧據其上誦金剛經三遍性又潔凈內逼如廁必散衣無所有然後高屐以往玉泉子嚴挺之與裴寬皆奉佛開元末惠乂卒挺之服縗麻送于龕所寬為河南尹僧普寂卒寬與妻子皆服縗絰設次哭臨妻子送喪嵩山故挺之自誌云葬于大照塔側祈其靈祐也挺之傳晚事白居易暮節惑浮屠尤甚至經月不食葷及致仕與香山僧如滿結香火社每肩輿往來白衣鳩杖自稱香山居士臨卒遺命葬於香山如滿師塔之側舊傳後履道第卒為佛寺新宰相裴休留心釋氏精於禪律師圭峰密禪師得達摩頓問密師注法界觀禪詮皆相國撰文序常被毳衲於歌妓院中持鉢乞食自言曰不為俗情所染可以說法為人每自發願願世世為國王弘護佛法後于闐國王生一子手文中有裴休二字聞於中朝其子弟請迎之彼國不允而止北夢李後主酷信浮屠每日與后頂僧伽帽衣袈裟誦佛書拜跪頓顙至為瘤贅親為桑門削作廁簡子試之腮頰少有澀滯者再為治之其手不扠學佛握印而行僧犯姦有司具牘還俗後主令禮佛三百拜免刑王師尅池州令僧俗兵士念救苦觀世音菩薩江南野錄鹵簿借飾釋寶瓊以至德二年卒有詔慰焉喪事所須隨由資給仍以天子鹵簿仗借為榮飾終古所希幸也續高漢帝隆禮於摩騰吳王屈節於康會曇始延魏君之席道林登晉主之床秦世道安榮膺共輦趙邦澄上寵懋錦衣皆道降極尊德迴萬乘良有以也辨正論代宗大曆十年興善寺胡僧不空卒贈開府儀同三司司空謚曰大辨正廣智不空三藏和尚魏世祖忿沙門非法崔浩毀其虛誕為世費害乃下詔曰昔後漢荒君信惑邪偽妄假睡夢事胡妖鬼以亂天常禮義大壞鬼道熾盛視王者之法蔑如也雖言胡神問今胡人共云無有皆是前世漢人無賴子弟劉元貞呂伯彊之徒乞胡之誕言用老莊之虛假附而益之皆非真實至使王法廢而不行蓋大姦之魁也釋老志梁武信重釋門寺像崇盛荀濟上表曰三墳五典帝皇之稱首四維六紀終古之規模及漢武祀金人黃新以建國桓靈祀浮圖閹豎以控權三國由茲鼎峙五胡仍其薦食衣冠奔於江東戎教興於中壤使父子之親隔君臣之義乖夫婦之和曠友朋之信絕海內殽亂三百年矣廣弘明朝夕敬妖怪之胡鬼曲躬供貪淫之賊禿上俗之謗佛者有五其一以世界外事及神化無方為迂誑也其二以吉凶禍福或未報應為欺誑也其三以僧尼行業多不精純為姦慝也其四以糜費金寶減耗課役為損國也其五以縱有因緣而報善惡安能辛苦今日之甲利益後世之乙乎為異人也顏氏家訓不行忠孝按釋迦出戎剖脇而誕摩耶遂殂事符梟獍年長爭立內不自安背父叛君逆節彌甚達多投石難陀引弓變革常道自餓形骸安能濟物九十六道此道最貪叶彼淫愚眾多崇信至如瑠璃誅釋瞿曇路左視之在生親尚不存既歿踈何能救斯即不行忠孝若牟尼能照而故縱婬殺便是詐稱慈悲徒能照而不救又是大覺於群生無益而天下不覺荀濟北齊劉晝上書言佛法詭誑避役者以為林藪又詆訶謠蕩有尼有優婆夷實是僧之妻妾損胎殺子其狀難言今僧尼二百許萬并俗女向有四百餘萬六月一損胎如是則年族二百萬戶矣驗此佛是疫胎之鬼也廣弘明魏時民多絕戶而為沙門李瑒上言禮以教世法道將來佛捐棄慈孝乖禮滅倫安有棄堂堂之政而從鬼教乎沙門都統僧暹等以瑒為毀謗佛法泣訴靈太后后責之瑒曰鬼神之名皆通靈達稱天地曰神祗人死曰鬼佛非天非地本出于人應世道俗其道幽隱名之為鬼愚謂非謗本傳崔浩不信佛道其族弟滎陽太守模深所歸向每雖糞土之中禮拜形像浩大笑之云持此頭顱不凈處跪是胡神也魏書浩非毀佛法其妻郭氏敬信釋典時時誦金剛般若經浩取而焚之捐灰於廁及幽執𣙍於城南使術士數十人行溲其上呼聲嗷嗷聞于行路自宰司之被戮辱未有如浩者世皆以為報應之驗也齊李公緒見有喪之家憂齋供福利便曰佛教者脫略父母遺蔑帝王捐六親捨禮義赭衣髡剔自比刑餘妄說眩惑唯利是親陰陽名墨雖紕繆奇察而四時節用有取至如茲術則傷化託幽滋為界道惜哉舉國皆迷彼眾我寡悲哉吾之死也福事一切罷之棄華即戎有識不許弟概字季節屬文讀佛經腳指夾之廣弘明佛在西域言妖路遠漢譯胡書恣其假託舊唐泥犂人傅奕自武德貞觀中嘗為太史令性不信佛法每輕僧尼至以石像為塼瓦之用貞觀十四年秋暴病卒初奕與同伴傅仁均薛頤並為太史令頤先負仁均錢五千未償而仁均死後頤夢見仁均言語如平常頤因問曰先所負錢當付誰人仁均曰可以付泥犁人問是誰答曰傅奕是也既而寤是日夜少監馮長命又夢已在一處多見先亡人長命問經文說罪福之報未知審定有否答曰皆悉有之又問如傅奕者生平不信佛死受何報答曰罪福定有然傅奕已配越州為泥犂人矣地獄苦記長命旦入殿庭見薛頤說所夢頤又說之二夢符合唐臨在其側同嗟嘆之頤即送錢付奕并說所夢後數日而奕卒案泥人者謂泥犂中人也泥犂即地獄之別名矣冥報記中宗時姚崇奏曰佛不在外求之於心佛圖澄最賢無益於金趙羅什多藝不救於亡秦何充符融皆遭敗滅齊襄梁武未免殃災但發心慈悲行事利益使蒼生安樂即是佛身臨終遺令曰佛者覺也在乎方寸假有萬像之廣不出五蘊之中平等慈悲行善不行惡則佛道備矣何必溺於小說惑於凡僧損耗生人無益亡者且如來普慈竟存利物損眾生之不足厚豪僧之有餘必不然矣萬年龜鏡舊唐今之佛經羅什所譯姚興執本與什對翻姚興造浮屠於永貴里傾竭府庫廣事莊嚴而興命不得延國亦隨滅又齊跨山東周據關右周則多除佛法而修繕兵威齊則廣置僧徒而依憑佛力及至交戰齊氏滅亡國既不存寺復何有修福之報何其蔑如梁武帝以萬乘為奴胡太后以六宮入道豈特身戮名辱皆以亡國破家近日孝和皇帝發使贖生傾國造寺太平公主武三思悖逆庶人張夫人等皆度人造寺竟術彌街咸不免受戮破家為天下所笑經云求長命得長命求富貴得富貴刀尋段段壞火坑變成池比來緣精進得富貴長命者為誰生前易知尚覺無應身後難究誰見有徵且死者是常古來不免所造經像何所施為夫釋迦之本法為蒼生之大弊吾亡後必不得為此弊法舊唐咸通中西川僧法進刺血寫經聚眾教化寺司申報高燕公判云斷臂既是凶人刺血必非美事貝多葉上不許塵埃俗子身中豈堪腥膩宜令出境無得惑人與一繩遞出東界所司不論繩絞賜錢一千送出東郭幸而誤免從卒於荊州玉泉寺北夢徽宗時濟南府開元寺因更修掘地得古碑蓋會昌中汰僧碑也字皆磨滅惟八字獨存云僧盡烏巾尼皆綠髻僧惡而碎之後有詔改德士遂符其言宣政雜錄塔者梵名塔婆此云方墳或云支提翻為滅惡生善處西梵正音名為叡堵波此云廟廟者貌也即是靈廟也法苑塔西國浮圖也言浮圖者此翻聚相戒壇圖經云依梵本瘞佛骨所名曰塔婆翻譯有舍利者名塔無舍利者名支提法苑凡人以塔廟者敬田也執于有為禪寂慧門也得于無物李邕嵩岳寺碑如來在日行化乞食因遇童子戲弄沙土以為米麪宿祐冥會以土麪施佛佛感其善心為受塗壁記此童子吾滅度後一百年滿作王出世號為阿育作鐵輪王王閻浮提一切鬼神並皆臣屬且使空中地下四十里內所有鬼神開往前入塔所獲舍利役諸鬼神於一日一夜一億家施一塔廣計八萬四千塔法苑三十八王殺八萬四千宮人夜聞宮中有哭聲王悔為起八萬四千塔今此震旦亦有在者什提恒因天上造三千偷婆阿育王經廣弘明十三晉廬山文殊師利菩薩像者昔傳云育王既統此洲學鬼王制獄酷毒尤甚文殊現處鑊中火熾水清生青蓮華王心感悟即日毀獄造八萬四千塔建立形像其數亦尒此其一也法苑十三周共和九年東天竺國阿育王盡收西域諸塔及龍宮舍利夜役鬼神碎七寶末造八萬四千寶塔命耶舍尊者舒指放光八萬四千道令捷疾鬼各隨一光盡處安置一塔遍娑婆界在此震旦國者一十九所釋鑑按此一事而四說不同漢譯胡書恣其假託傅奕之言信矣明帝幸白馬寺攝摩騰竺法蘭進曰寺東何館帝曰土有阜無因而起夜有異光民呼聖塜滕曰阿育王藏如來舍利於天下凡八萬四千所今震旦境中十有九處此其一也帝大驚即駕幸拜之忽有圓光現塚上三身現光中帝喜曰不遇二大士安知上聖遺祐哉詔塔其上釋鑑江州盧山有三石梁長數十丈廣不及尺下望無底晉咸康年中庾亮為江州登山過梁見一公殊偉廈屋崇峻玉堂眩目奇塔崇竦莫測是何循遶久之終非人宅乃拜謝而返法苑謝尚嘗夢其父曰西南有氣至衝人必死勿當其鋒家庶一全汝宜修福建塔寺可禳之若未暇立寺可杖頭刻作塔形見有氣來可擬之尚悟懼遂刻小塔施杖頭恒置左右後果有異氣遙見西南從天而下始如車輪漸彌大直衝尚家尚以杖頭指之氣便回散闔門獲全氣所經處數里無復孑遺後遂舍宅為莊嚴寺宋路太后改為謝鎮西寺宋盡建康實錄永寧寺靈太后胡氏所立也高九十丈有剎復高十丈合去地一千尺去京師百里已遙見之初掘基至黃泉下得金像三千軀太后以為信法之徵是以營建過度也常景碑云須彌寶殿兜率凈宮莫尚於斯也菩提達摩者波斯國胡人也見金盤炫日光照雲表寶鐸含風響出天外自云一百五十歲遍涉諸國而此寺精絕閻浮所無永熙三年浮圖為火所燒當時雷雨晦冥雜下霰雪其年五月中有人從象郡御覽東萊來云見浮圖於海中光明照耀儼然如新海上之民咸皆見之俄然霧起浮圖遂隱至七月中平陽王為侍中斛斯椿所使奔於長安十月而京師遷鄴伽藍記景明寺浮圖去地百仞邢子才碑云俯聞激電旁屬奔星妝飾華麗侔於永寧金盤寶鐸煥爛霞表上乾陁國都城東南七里有佛塔高七十丈周三百步所謂雀離佛圖也魏書健馱國有雀離浮圖元魏靈太后遣沙門道主等賫大旛長七百餘尺往彼掛之腳纔及地唐玄裝傳父老云此浮圖天火七燒佛法當滅道榮傳云王修浮圖木工既訖猶有鐵柱無有能上者王於四角起大高樓多置金銀及諸寶物王與夫人及諸王子悉在上燒香散花至心精神然後轆轤絞索一舉便到故胡人皆云四天王助之塔內物事悉是金玉旭日始開則金盤晃朗微風漸發則寶鐸和鳴西域浮圖最為第一伽藍記輸伽之建寶塔百鬼助以日工雀離之起浮圖四天扶其夜力廣弘明王明廣釋懷信淮南西靈寺塔同四種人得樹偷婆漢言冢謂輪王羅漢辟支如來也正法念經一如來二辟支佛三聲聞四輪王阿含經石敬塘欲出外藩捍太原陰遣人謝李崧曰為浮屠者必合其尖蓋欲崧終始成已事也五代史俗言塔頂為天門蘇國老有詩云上到天門最高處不能容物只容身蓋譏在位者古今詩話舍利舍利者西域梵語此云骨身有三種一是骨舍利其色白也二是髮舍利其色黑也三是肉舍利其色赤也菩薩羅漢等亦有三種若是佛舍利椎打不碎若是弟子舍利椎擊便破矣法苑光明云此舍利者是戒定慧之所薰修甚難可得最上福田翻梵語刺瑟胝此云竿今略名剎即旛柱也輔行云西域以柱表剎示所居處也長阿含云若沙門於此法中得一法者便當豎幡以告四遠法苑云阿育王取金華金幡懸諸剎上翻今守株桑門迷瞀俗士良繒碎于剎上丹金縻於塔下而謂為福田期以報業弘明蕭深論頭陀碑列剎相望翰云列剎佛塔也或因之併誤道家之源出於老子其自言也先天地生以資萬類上處玉京為神王之宗下在紫微為飛仙之主千變萬化有德不德隨感應物厥迹無常授軒轅於峨眉教帝嚳於牧德大禹聞長生之決尹喜受道德之旨至於丹書紫字昇玄飛步之經玉石金光妙有靈洞之說不可勝紀其為教也咸蠲去邪累澡雪心神積行樹功累德增善乃至白日昇天長生世上所以秦皇漢武甘心不息靈帝置華蓋於濯龍設壇塲而為禮魏什老志道經者云有元始天尊生於太元之先每至天地初開授人秘道謂之開劫度人故有延康赤明龍漢開皇是其年號其間相去經四十一億萬載所度皆諸天仙上品有太上老君太上丈人天真皇人五方天帝及請仙官轉共承命世人莫之與也所說之經亦稟元一之炁自然而有非所造為亦與天尊不滅天地不壞則蘊而莫傳劫運當開其文自見凡八字盡道體之奧謂之天書字方一丈八角垂芒光輝照耀驚心眩目雖諸天仙不能省視乃命天真皇人改轉天音而辨行之自天真以下至于諸仙展轉節級以次相授諸仙得之始授世人眾經或言傳之神人篇卷非一自云天尊姓樂名靜信例皆淺俗故世甚疑之其術業優者行諸符禁往往神驗而金丹玉液長生之事歷代糜費不可勝紀竟無效焉隋書萬物之奧道者蓋為萬物之奧聖人之至賾也隋經藉志萬物之祖大道起於無為萬物之祖也玄妙內篇道之玄妙出於自然生於無生先於無先彌綸無外布神化氣淡然無上制御諸天昇玄經無宗無上而獨能為萬物之始故名元始運道一切為極尊而常處二清出諸天上故稱天尊太玄真一本際經太上道君言我無量劫度人無數元始天尊以我因緣之勳賜我太上道君之號本行經女仙王奉仙云夫天尊行化天上數人以道延人以生主宰萬物覆育周徧如世人之父也釋迦行化世上勸人止惡誘人求福如世人之母也仲尼儒典行於人間示以五常訓以百行如世人之兄也雲笈上士學道輔佐帝王好生之德也中士學道欲度其家下士學道才脫其身太平經治心之最下忘須臾心神乃定定則入道其狀在外慎其言語懼觸物也節其飲食慮貪生也衣粗而靜在素淡也居陋而隱守靜篤也恭謹一切避凌辱也不敢為先免疾謗也始終淳信潛化導也進止和光密行教也挫銳解紛明道有時也出處變化見神應之速也定真玉籙氣精化生昔兩儀未分溟涬濛澒日月未具狀如鷄子混沌玄黃乃有盤古真人天地之精自號元始天王遊乎其中天地既分相去三萬六千里元始天王在天脊膂中住名曰玉京山山中有宮殿並金玉常呼吸天炁俯飲地泉忽生太元王女在石間出能言人形具足天姿絕妙號曰太元聖母元始君下遊見之乃招還上宮元始上真記無上大道若治在五十五重無極大羅天中玉京之上七寶玄臺金床玉几仙童玉女之所侍衛住在三十三天三界之外大霄隱書無上真書等大道天尊大道天尊治太玄之都玉光之州金貞之郡天保之縣元明之鄉定志之里災所不及神仙五岳圖大羅是五億五萬五千五百五十五重天之上天也靈書經都者觀也太上大道道之中道神明君最守靜居太玄之都五岳圖天與諸仙鳴樓都之鼓朝妄玉京以樂道君諸天內音高蓋天道君處太玄都坐高蓋天上羅三清下包三界居七瑛之房出九宮之上行神布氣造作萬物四民天三界之外次四民天所謂東華南離西靈北貞行仁者生東華陰行禮者生南離宮行義者生西靈宮行德者生北貞宮言三界之內大劫交時有四行者堪為種民王母迎之登上四天為下民種也四見論八百道君玉皇諸錄有百八道君群仙隨業以補其職三善道者聖真仙也上品曰聖中品曰貞下品曰仙三清之間各有正位聖登玉清真登上清仙登太清玉清有大省宮殿皇帝王公卿大夫吏民率以聖呼之如聖皇聖帝之類是也男女貴賤各有次第上清玄都玉京七寶紫微率以真呼之太清有大極宮殿率以仙呼之其上清太清之品列位男女次第之統數與玉清同太真道家厥品有三一者老子無為二者神仙餌服三者符籙禁厭就其章式大有精粗粗者厭人殺鬼精者練屍延壽更有青籙受須金帛王侯受之則延年益祚庶人受之則輕健少疾孔子貴知命伯陽去奇尚奚取鬼符望致其壽若言受之必益今佩符道士悉可長年無籙生民並應短壽事既不徵何道之有二教論與人君言則惠於國與人父言則慈於子與人師言則愛於眾與人兄言則悌於行與人臣言則忠於上與人子言則孝於親與人友言則信於交與人婦言則忠於夫與人夫言則和於室與人弟言則恭於禮與野人言則勸於農與道士言則正於道與國人言則各守其域與奴僕言則慎於事智慧經中黃道君曰天生萬物人為貴也人身包含天地無所不法立天子置三公九卿二十七大夫八十一元士九州百二十郡千二百縣也膽為天子大道君脾為皇后心為太尉左腎為司徒右腎為司空封八神及擠為九卿珠樓神十二胃神十二三焦神三合為二十七大夫四肢神為八十一元士合之百二十以法郡數也又肺為尚書府肝為蘭臺府五符經上清者宮名也明乎混沌之表煥乎大羅之天靈妙虛結神奇空生高浮澄淨以上清為名乃眾真之所處大聖之所經也宮有丹青金書玉字上皇寶經皆玄古之道自然之章雲笈方諸天仙上真之宮室也高九千丈有大方諸小方諸大方諸對會稽東南七萬里小方諸之上多有奉佛者人皆服五星精讀夏歸藏經用以飛行真誥夫欲修道惟滅動心不滅照心但凝空心不凝住心有事無事常若無心處靜處喧其志惟一制而不動處喧無惡涉事無惱者皆是真定以無事為真宅有事為應迹不求惠而惠自生此名真惠定觀經道門大論云三洞者洞言通也通玄達妙其統有三故云三洞第一洞真第二洞玄第三洞神乃三景之玄旨八會之靈章鳳篆龍金編玉字修服者因茲入悟研習者得以還源故玉經隱注云三洞經符道之綱紀太虛之玄宗上真之首經矣豈中仙之所聞哉本際經云若有經文具十二部應三洞者是名正法洞真以不雜為義洞玄以不滯為名洞神以不測為用故洞言通也三洞上下玄義相通洞真者靈祕不雜故得名真洞玄者生天立地功用不滯故得名玄洞神者召制鬼神其功不測故得名神此三法皆能通凡入聖同契太乘故得名洞也雲笈仙宮上下次秩有左右府左右公左右卿左右大夫左右御史明大洞真經者為仙卿服金丹者為大夫服眾芝為御史若得大極隱芝服之便為仙公真人矣學道者有九患有志無時有時無友有友無志有志不遇其師遇師不覺覺師不勤勤不守道或志不固固不能久皆人之九患也五難上元夫人三天上元之官統領十萬玉女名籙者謂武帝曰汝好道乎數招方術登山祀神亦為勤矣然汝胎性暴胎性淫胎性奢胎性酷胎性賊五者恒舍於榮衛之中五藏之內雖獲良針固難愈也暴則使氣奔而攻神是故神擾而氣竭淫則使精漏而魂疲是故精竭而魂消奢則使真離而魄穢是故命逝而靈失酷則使喪仁而自攻是故失仁而眼亂賊則使心鬭而口乾是故內戰而外絕此五事者皆是截身之刀鋸刳命之斧斤矣雖復志好長生不能遣茲五難亦何為損性而自勞乎若從今閉諸淫養汝神放諸奢從至儉勤齋戒節飲食絕五穀去羶腥鳴天鼓飲玉漿蕩華池叩金梁按而行之阿母必能致汝於玄都之墟迎汝於昆閬之中位以仙官遊於十方子勵之哉漢武內傳武帝問長生之道王母曰汝能賤榮樂卑躭虛味道自復佳耳然汝道恣體欲淫亂過甚殺伐非法奢侈恣性夫侈者裂身之車也淫者破身之斧也殺者嚮對奢者心爛積欲則神隕聚穢則命斷以子蕞爾之身而宅殘形之賊盈尺之材乃攻之者百刃欲以解脫三尸全身永久不可得也有似無翅之鷃願鼓天池朝生之䓢而樂春秋者哉若能蕩此眾亂撥穢易意保神氣於絳府閉淫宮而不開靜奢侈於寂室愛眾生而不危守慈務施鍊氣惜精儻有若斯之事豈無髣髴耶若不爾者譬如抱石而濟長河耳墉城集仙錄王母傳真君則太上也為神明宗極獨在於窅冥之先高居紫微之上陰隲兆庶詩稱上帝臨汝書曰天監孔明福善禍淫不差毫末而迷悟之子日用不知背本向末故遠於仙道者有七焉近於仙道亦有七焉當世之士未能窺妙門洞幽賾雷同以泯滅為真實生成為假幻但所取者性所為者形甘之死地乃為常理放彼七遠取此七近謂之拔陷區出溺塗碎禍車登福輿始可與涉神仙之津矣神仙可學論太上告王母曰夫人愛天地之氣生氣之來也謂之精精之搆也謂之靈靈之變化之謂神神之化也之謂魂隨魂往來之謂識隨魂出入之謂魄主管精魄之謂心心有所從之謂情情有所屬之謂意意有所指之謂志志有所憶之謂思思而遠慕之謂慮慮而用事之謂智智者盡此諸見者也眾真語錄視過其目明不居聽過其耳精泄漏愛過其心神出去妙真經罪莫大於淫禍莫大於貪咎莫大於僭此三者禍之車也小則亡身大則殘家上何謂為多言然一言而致大凶是為上多言人也一言而致辱是為中多言人也一言而見窮是為下多言人也太平經欲者凶害之根也氣者天地之元也莫知其根莫識其元是故聖人去欲入無以輔其身西昇經七竅者精神之戶牖也志氣者五藏之使候也耳目誘於聲色鼻口悅於芳味肌體之於安適其情一也則精神馳騖而不守志氣縻於趣捨則五藏滔蕩而不安嗜慾連綿於外心腑壅塞於內曼衍於荒淫之波留連於是非之境而不敗德傷生者蓋亦寡矣雲笈知足天下有富貴者三貴莫大於無罪樂莫大於無憂富莫大於知足知足之為足天道之祿不知足之為止害乃反已上五色重而天下爽珠玉貴而天下勞幣帛通而天下傾是故五色者䧟目之錐五音者塞耳之椎五味者截舌之斧聖母元君曰功術之秘者惟符藥與氣也符者三光之靈文天真之信也藥者五行之英華池之精液也氣者陰陽之和萬物之靈爽也三者致道之機要求仙之所寶也眾真語錄西城真人謂王子登褒曰夫學道者諒不可以倉卒期求生者不可以立爾綜子求生雖篤而未見其涯慕道雖勤而未啟其門殆猶㳂湧波以索鳥巢尋長木而訪淵鱗爾是故子心疲於導引而朱宮為之喪潰肺弊於理炁故神華為之凋落肝勞於視盼而魂精為之遼索脾竭於守神而丹田為之閡滯腎困於經緯而津液為之不澤膽銳於趣競故四肢為之亂作五臟相攻六府顛覆三焦滯而不瀉八關絕而無續賴釩飯以勁汝身恃丹青以固汝內爾正可却衰白之凋折猶不免必死之期會徒有萬年之壽豈足貴乎王君內傳彭祖告采女曰養壽之道但莫傷之而已夫冬溫夏涼不失四時之和所以適身也美色淑資幽閒娛樂不致思慾之惑所以通神也車服威儀知足無求所以一志也八音五色以悅視聽所以導心也凡此皆以養壽而不能斟酌之者反以速患夫遠思彊記傷人憂喜悲哀傷人喜樂過差忿怒不解傷人汲汲所願傷人陰陽不順傷人有所傷者數種而獨戒於房中豈不惑哉神仙傳九貞者九天之貞氣凝而成也上中下三貞生於太清是元始之澄氣也各置宮室次第上清行衛之宮太上太道君萬貞之主也居玉殿造上帝之章以為寶經於王清宮中以度後學得貞之士太上正法經中極貞人主人命籍九華貞人主九幽之上宿對生死太元貞人受天地之符度長夜之魂太極貞人治赤城玉洞之府司校大山死生之籙三元貞人主紫微行道靈寶隱書崑崙瑤臺刊定真經之所也上品居上清擬皇帝之尊中品處中道皆公卿之位下品居三元之末並大夫之流三貞品經各有條次登真隱訣閬野閬野者閬風之府是也崑崙上有九府是為九宮太極為太宮諸仙皆是九宮之官僚耳至於真人乃九宮之公卿也南真記陽臺王屋山仙之別所謂陽臺也始得道者皆詣陽臺是清靈之宮也道科凡故意凌毀大道及福地靈壇殃流三世道家立法厥品有三上標老子次述神仙下襲張陵太上為宗夫標名大道而教甚於俗舉號太上而法窮下愚何故知耶貪壽忌天含識所同故肉芝石華譎以翻騰好色觸情世所莫異故黃書御女誑稱地仙肌革盈虛群生共愛故寶惜洟唾以灌靈根避災苦病民之恒患故斬縳魑魅以快愚情憑威恃武俗之舊風故吏兵鉤騎以動淺心至於消災淫術厭勝姦方事合氓庶故比屋歸宗是以張角李弘毒流漢季盧悚孫恩亂盈晉末餘波所被寔蕃有徒糜費產業蠱惑士女運迍則蠍國世平則蠹民弘明集滅惑論首冠黃巾者卑鄙之相也皮革苫頂者莫非華風也販符賣籙者天下邪俗也搏頰扣齒者倒惑之至也反縛伏他者地獄之貌也符章含氣者姦狡之窮也戎華論陸修靜宋明帝太始七年因勑而上上清經目既云隱在天宮爾來一百餘年不聞天人下降不見道士上昇不知此經從何至此昔文成書以飯牛詐言王母之命而黃庭元陽以道換佛張陵創造靈寶吳赤烏時始出上清起於草玄宋齊之間乃行鮑靜造三皇事露而被誅文成書飯牛致戮於漢世今之學者又踵其術又可悲乎笑道論老子語尹喜曰若求學道先去五情一父母二妻子三情色四財寶五官爵若除者與吾西行喜精銳因斷七首來老笑曰吾試子心所殺非親乃禽獸耳伏視七頭為七寶七尸為七禽喜疑反家七親皆存消冰經僊老而不死曰仙僊遷也遷入山也故制字人傍山也釋名惟昔聖賢懷玄抱貞體服九鼎化淪與并含精養神通德三元精液腠理筋骨致堅眾邪鬥除正氣常存累積長久變形而仙周易參同契魏伯陽者吳人也好道不仕修已養高後入山餌神丹仙去撰參同契其說以周易爻象論作仙丹之意而世不知神丹之事多作陰陽注之殊失其旨三洞珠囊求仙者要當以忠孝和順仁信為本若德不修而但務方術終不得長生也行惡行大者司命奪紀小過奪筭隨所犯輕重故所奪有多少抱朴子蓬萊方丈瀛洲此三神山者其傳在渤海中蓋嘗有至者諸仙人及不死之藥皆在焉其物禽獸盡白而黃金銀為宮闕未至望之如雲及到三神山反居水下臨之風輒引去終莫能至云世主莫不甘心焉史記黃帝采首山銅鑄鼎於荊山下鼎既成有龍垂胡䫇下迎黃帝黃帝上騎群臣後宮從上龍七十餘人龍乃去餘小臣不得上乃悉持龍䫇龍䫇拔墮墮黃帝之弓百姓卬望黃帝既上天乃抱其弓與龍䫇號故後世因名其處曰鼎湖其弓曰烏號郊祀志黃帝得道以登雲天莊子赤將子輿者黃帝時人不食五穀啖百草花至堯時為木工能隨風雨上下列仙傳鄰封子者為黃帝陶正有人過之為其掌火能出五色烟積火自燒而隨烟氣或上或下上偓佺者槐山採藥父也好食松實形體生色長數寸兩目更方能飛行逐馬走以松子遺堯堯不暇服也松者簡松也時人受服者皆至二三百歲焉上彭祖姓籛名鏗帝顓頊之孫陸終氏之中子歷夏至殷末八百餘歲常食桂芝善導引行氣歷陽有彭祖仙室前世禱請風雨莫不輒應上莊子疏云堯封於彭城其道可祖故謂之彭祖列仙傳云歷夏經殷七百六十歲而不衰老後西游之流沙不知其終也故羅隱碑文云水運降靈始分輝於玄帝仙源啟祚乃襲慶於彭墟星辰浮濮渚之陽雲鸐度游沙之境也仙苑編珠趙次公云徐州彭城縣以彭祖得名寰宇記云今墓此故邑號大彭廬山名賢傳云彭鏗曾過彭蠡之濱造其名嶽今廬山是也真仙通鑑弄鳳蕭仙者以周宣王十七年五月五日生宣王之末史籍散亂蕭仙能文著本末以備史之不及人以史目之實無名也行第三浪迹入秦善吹簫能致孔雀白鶴於庭穆公有女名弄玉善吹笙無和者求得吹笙者以配孟明薦史因召見秦侯問史云善簫曰吾女好笙子簫也奈何史以不稱旨退女在屏門呼曰試使吹之一聲而清風生再吹而彩雲起三吹而鳳凰來女曰是吾夫也願嫁之史曰女亦且吹笙且三吹之如史所感於是孟明為媒蹇叔為賓仙鑑公以弄玉妻之遂教弄玉作鳳鳴居十數年吹簫似鳳聲鳳凰來止其屋公為作鳳臺夫婦止其上不飲不食不十數年一旦美玉乘鳳蕭史乘龍昇天而去秦為作鳳女祠時聞簫聲仙傳拾遺老子者姓李氏名耳字伯陽諡曰聃周守藏室之史也孔子適周將問禮於老子老子修道德其學以自隱無名為務居周久之見周之衰乃遂去至關關令尹喜曰子將隱矣彊為我著書於是老子乃著書上下篇言道德之意五千餘言而去莫知其所終蓋老子百有六十餘歲或言二百餘歲以其修道而養壽也老子隱君子也老子之子名宗宗為魏將封於叚于宗子注注宮宮玄孫假假仕於漢孝文帝而假之子解為膠西王卬太傅因家于齊焉李耳無為自化清靜自正史記聃父張重華讌群寮于閑豫庭講論經義顧謂索綏曰老聃父字為何綏曰聃父名乾字元果胎刵無耳雙目不明孤單年七十二無妻與鄰人益壽氏老女野合懷胎十年乃生老子前涼萬史記王儉百家譜云李者高陽之後始祖咎繇為掌理官因遂氏焉李氏之興起於聃也自聃之前未有李姓唯氏理焉以樹下生乃稱李氏老子之子名宗仕魏文侯蓋春秋之末六國時人也文王之世既無李姓何得有聃出為周師乎辨正論有黃巾李仲卿太上老君託神玄妙玉女剖左腋而生上案盧景裕戴詵韋處玄等集解五千文及梁元帝周弘政等考義類云太上有四謂三皇及堯舜是也言上古有此大德之君臨萬民之上故云太上也郭莊云時之所賢者為君材不稱世者為臣老子非帝非皇不在四種之限有何典據輒稱太上耶老子或云上三皇時為玄中法師下三皇時為金闕帝君伏羲時為鬱華子神農時為九靈老子祝融時為廣壽子黃帝時為廣成子顓頊時為赤精子帝嚳時為祿圖子堯時為務成子舜時為尹壽子夏禹時為貞行子殷湯時為錫則子文王時為文邑先生一云守藏史或云在越為范蠡在齊為鴟夷子在吳為陶朱公皆見於群書不出神仙正經皆由晚學之徒好奇尚異茍欲推崇老子故有此說神仙傳陶朱者即范蠡也既事越王勾踐君臣囚吳石室嘗屎飲尿亦以甚矣今尊崇其術不亦昧乎又蠡子被戮於楚何為不行父術變化而自免乎笑道論造天地經老子託幽王皇后腹即幽王之子也身為柱史即幽王之臣也若審知者幽王為犬戎所殺豈可不授君父與神符令不死乎化胡經云老子在漢為東方朔夫漢武窮兵疲役中國天下戶口至減大半老子為東方朔者何忍不與辟兵辟穀之符厭人咒鬼之方以護漢國乎眼看流弊若此無心取救將非欺誑之謬乎安期先生者瑯琊阜鄉人也賣藥於東海邊時人皆言千歲翁秦始皇東遊請見與語三日三夜賜金璧度數千萬出於阜鄉亭皆置去留書以赤玉舄一量為報曰後數年求我於蓬萊山始皇即遣使者徐市盧生等數百人入海未至蓬萊山輒逢風波而還列仙傳李少君字雲翼好道入泰山採藥修絕穀全身之術遇安期生少君疾困叩頭乞活安期以神樓散一匕與服之即愈乃上言臣能凝澒成白銀飛丹砂成黃金服之白日升天身竦則凌天伏入無間控飛龍而入遐遍乘白鴻而九陔周冥海之棗大如瓜鍾山之李大如瓶臣食之遂生奇光師安期授臣口訣是以保萬物之可成也於是上甚尊敬為立屋第漢武內傳少君言於帝曰臣嘗遊海上見安期生食巨棗大如瓜安期生仙者通蓬萊中合則見人不合則隱史武紀少君有不死之方而家貧無以市其藥物故出於漢以假途求其財道成而去董仲舒少君家錄少君之將去也武帝夢與之共登嵩高山半道有使者乘龍持節從雲中下云太一請少君帝覺以語左右曰如我之夢少君將舍我去矣數日而少君稱病死久之帝令人發其棺無尸唯衣冠在焉漢禁中起居注上士舉形昇虛謂之天仙中士遊於名山謂之地仙下士先死後蛻謂之尸解仙仙經韓眾告劉根云夫仙道有昇天躡雲者有遊行五岳者有服食不死者有尸解而仙者凡脩仙道要在服藥藥有上下仙有數品不知房中之事及行氣導引并神藥者亦不能仙也神仙傳淮南王安愛道術之士有八公詣門曰聞王好士故來相從王乃朝夕朝拜授王丹經三十六卷時雷被伍被乃告王反八公謂王曰可以去矣乃使安登山大祭埋金地中即白日昇天八公與安所至山上石皆陷成跡至今人馬跡猶存時人傳八公安臨去時餘藥器置在中庭雞犬䑛啄之盡得昇天故雞鳴天上犬吠雲中也上鞠道龍說淮南王好方士方士授之術見遂有畫地成江河撮土為山巖噓吸為寒暑吐眾為雨霧王亦卒與諸方士俱去西京雜記河東蒲坂有項㬅都者與一子入山學仙十年而歸家家人問其故㬅曰在山中三年精思有仙人來迎我共乘龍而昇天及到天上先過紫府金床玉几晃晃昱昱真貴處也仙人但以流霞一盃與我飲之輒不飢渴忽然思家到天帝前謁拜失儀見斥來還令當更自修積乃可得更後矣昔淮南王劉安昇天見上帝而箕坐大言自稱寡人遂見謫守入廚三年吾何人哉河東因號㬅都為斥仙抱朴論衡仙人將我上天居月傍甚寒夫神仙之書道家之言一云傳說上為辰尾宿歲星降為東方朔淮南王安誅於淮南而謂之獲道輕舉鉤戈死於雲陽而謂之屍逝柩空其為虛妄甚矣哉又世虛然有仙人之說仙人者儻猱猨之屬與世人得道化為仙人乎夫雉入海為蛤䴏入海為蜃當其徘徊其翼差池其羽猶自識也忽然自投神化體變乃更與黿鱉為群豈復自識翱翔林薄巢垣屋之娛乎牛哀病而為虎逢其兄而噬之若此者何貴于變化耶而顧為匹夫所謂納虛妄之詞信眩惑之說隆重以招弗臣傾產以供虛求散王爵以榮之清閒館以居之經年累稔終無一效或歿於沙丘或崩乎五柞臨時雖誅其身滅其族紛然足為天下笑矣然壽命長短骨體強劣各有人焉善養者終之勞擾者半之虛用者殀之其斯之謂歟辨道論劉根不覺飢渴或謂能忍盈虛王仲都當盛夏之月十爐火炙之不熱當嚴冬之時裸之而不寒桓君山以為性耐寒暑桓君山以無仙道好奇者為之愽物志仙術誕妄源流久矣韓終徐福始詐於秦邦文成五利紹偽於漢國敘控鶴弗目陵雲之實言餐霞莫覩療飢之信致有猱猨蜃蛤之論繫風捕影之談故棄實瓠者以非器也廢石田者以難蓺也賤左道者以虛偽也辨正論絕穀道家潛居斷糧以修仙術僕聞老氏有五味之誡而無絕穀之訓矣是以蟬蛾不食君子誰重蛙蟒穴藏聖人何貴且自古聖賢莫不歸終吾子獨云不死何斯濫乎故舜有蒼梧之墳禹有會稽之陵周公有改葬之篇仲尼有兩楹之夢曾參有啟足之辭顏回有不幸之歎慧通駁夷夏論鼎湖亡返嶠山之冢獨存流沙不歸扶風之隴空樹皇覽云黃帝冢在嶠山老子冢扶風辨正論西王桃實屢熟而靡延東海桑田數變而非永五雲九轉悲繩鳥之暫留飛雪玄霜比遊駒以難固信終馗無大椿之久蜉蝣罕龜鶴之年上夫滅身以懼大患絕智以避長勞議生靈於懸疣齊泯性於王樂蓋老莊之談也且綿綿常住古皇則不死不終繩繩無名老氏則復歸無物然常存非永沒之稱無物豈長生之化耶上周乂山遇羨門子高叩頭乞長生羨門曰子名在丹臺玉室之中何憂不仙真人周君內傳謝自然泛海將詣蓬萊求師船為風飄到一山見道人指言天台山司馬承禎名在丹臺身居赤城此真良師也蓬萊隔弱水三十萬里非舟楫可行非飛仙無以到續仙傳青童君告趙旭曰君宿世有道骨法應仙然名已在金格相當與吹洞簫於紅樓之上撫雲璈于碧落之中心死可以身生保精可以致神通幽記宣平坊賣錢貫王老善黃白之術賀知章信重之與夫人持一明珠上老人自云保惜多時者老人即付童子市胡餅延賀賀意甚不快老人曰夫道者可以心得慳惜未止術無由成須山谷勤求非市朝所授也賀悟謝而去數日失老人所在賀因求入道還鄉原化仙墟薛玄貞者遨遊雲泉得長生之道常於五嶺間棲憩每遇人曰九疑五嶺神仙之墟山水幽奇烟霞勝異如陽朔之峰巒挺拔博羅之洞府清虛不可忘也所以祝融棲神於衡阜虞舜登仙於蒼梧赫胥耀跡於潛峰黃帝飛輪於鼎湖其餘高貞列仙人臣輔相騰翥逍遙者無山無之仙傳拾遺韋子威躭玩道術叔採訪使有步卒丁約者周旋恪勤子威頗私之一日辭欲他適謂子威曰何謂兩塵對曰儒謂之世釋謂之劫道謂之塵善堅此心亦復遐壽唐闕史人行大道號曰道士士者何理也事也身心順理唯道是從從道為事故稱道士太霄書經周穆王尚神仙因尹貞人草制樓觀遂召幽逸之人置為道士樓觀本記凡道士道德為父神明為母清淨為師太和為友大戒三百以杜未兆之禍威儀二千以興自然之福陸法師道士有五一天貞道士高玄皇人之流也二神仙道士杜冲尹軌之例也三山居道士許由巢父之比也四出家道士宋倫彭諶之匹也五在家道士黃瓊籛鏗之倫也三洞道科上座道士有上中下深於道多者名上座老子立德經朱字鳳文明光映軒上座玄黃中序天貞洞貞隱玄經凡遵三景稱三景弟子已度三人付師友已從傳授得稱三景法師太上八素貞經天師張陵字輔漢沛國豐人也本大儒晚學長生之道得九鼎丹經聞蜀中多名山乃入鳴鵠山著道書二十篇仙去貞誥張天師道陵隱龍虎山修三元默朝之道得黃帝龍虎中丹之術丹成服之能分形散景天師自鄱陽入嵩高山得隱身制命之術集仙錄陵學道於蜀鶴鳴山時蜀中人鬼不分災疾競起感太山老君降授正一盟威法如分人鬼置二十四治至今民受其福有戒鬼壇見在正一經陵七試弟子與趙昇王長三人皆白日冲天而去眾弟子仰視之久乃沒于雲霄也神仙傳上清真符令玉女二人引陵與夫人雍氏于雲臺峰白日昇天仙鑑陵將秘籙斬邪劍玉冊玉印授子衡與雍氏上昇上按一道陵而所載紛紛若此故知罔世惑眾係風捕影谷永之說信矣漢書曰張陵子衡為係師衡子魯為嗣師號曰三師三人之妻為夫人皆云白日昇天笑道論張鎮南在北洞北石壇上燒香禮拜固伏而不起遂乃夜解明旦視之形如生此壇今猶存真誥衡以真人之法付係師與妻盧氏得道陽平山白日飛昇仙鑑操西征魯以手板畫地成河兵不得渡使者以水師至岸魯又以手板蓋其河水中輒出高峰兵不能進曹公遣使封之不固後脩諫白日乘龍昇天上沛國張陵學道於蜀鶴鳴山遊作道書自稱太清玄元以惑百姓其來學者初名鬼卒受道者用金帛之物號為祭酒各領部眾眾多者名治頭其供通限出五斗米故世號米賊道陵死子衡行其道衡死魯復行之魯母有姿色兼挾鬼道往來益州牧劉焉之家焉以魯為督義司馬住漢中焉死子璋立以魯驕恣不順盡殺魯母家室魯遂據漢中以鬼道化氏自號師君大都與張角相似雄據巴漢垂三十年曹操征魯魯走巴中弟衛橫山下陽平城以拒之夜有野糜數千突壞衛營衛大驚懼以為大軍見掩遂降閻圃說魯降曹公或西歸劉備魯勃然曰寧為曹公作奴不為劉備上客遂委質曹公拜鎮南將軍華陽志蜀魏志世語破邪論張陵避瘧丘社中得咒鬼之術書遂解使鬼法熹平末為蟒蛇所噏子衡奔出尋屍無所畏負清議之譏乃假設權方以素靈化之迹生縻鵠足置石崖頂謀事辨畢尅期發之到光和元年遣使告曰正月七日天師昇玄都米民山獠蟻集閾外雲臺治民等稽首再拜言伏聞聖駕玄都臣等常辭蔭接尸塵方享九幽方夜衡入久之乃出詭稱曰吾旋駕晨華爾各還所治凈心持行存師念道衡便密抽遊罥鶴直衝虛空民獠愚戇僉言登仙販死利生欺罔天地逆莫過此之甚也李膺蜀記玄光辨惑論見梁弘明集後漢順帝中有沛人張陵客游蜀土聞古老相傳云昔漢高祖應二十四氣祭二十四山遂王有天下陵不度德遂搆此謀殺牛祭祀二十四所置以土壇戴以草屋稱二十四治治館之興始乎此也二十三所在于蜀地尹喜一所在于咸陽於是誑誘愚民招合兇黨歛租稅米謀為亂階時被蛇吞逆舋弗作至孫張魯禍亂方興起于漢中明㮣決對傳奕事于時假託神言黃衣當王魯因與張角相應合集部眾並戴黃巾披道士之服數十萬人自據漢中垂三十載後為曹公所破黃巾始滅破邪論張陵棄婦見陵傳上夫國志等書去陵不遠其三張之偽接于耳目者當不誣也而道書依託詭說流傳不悟焉悲夫三張後魏之世嵩山道士寇謙之自謂遇太上老君云張陵去世無所師授授汝天師之位賜汝雲中音舖科誡二十篇號曰並進汝宜宣吾新科清整道教除去三張偽法租米錢稅及男女合氣之術大道清虛寧有斯事什老志道家方術以昇仙為神因而誑惑偷潤目下昔徐福欺妄分國於夷丹文成五利妖偽於漢世三張詭惑於西梁孫恩搔擾於東越此之巨蠹自古稱誣辨惑論潁川郤儉能辟穀餌茯苓甘陵甘始名善行氣老而少容廬江左慈知補導之術並為軍吏初儉至之所茯苓價暴貴數倍議郎安平李章學其辟穀食茯苓飲寒水水寒中泄利殆至殞命後始來眾人無不鴟視狼顧呼吸吐納軍祭酒弘農董芬為之過差氣閉不通良久乃蘇左慈到又競受其補導之術至寺人嚴峻往從問受奄豎真無事於斯術也人之逐聲乃至於是也典論世有方士吾王悉所招致甘陵有甘始廬江有左慈陽城有郗儉始能行氣導引慈曉房中之術儉善辟穀悉號三百歲本所以集之於魏國者誠恐斯人之徒接姦詭以欺眾行妖慝以惑人故聚而禁之豈復欲觀神仙於瀛洲求安期於邊海釋金輅而顧雲輿棄文驥而求飛龍哉甘始者老而有少容自餘術士咸共歸之然始詞繁寡實頗竊有怪言余嘗密問其所行始言本師姓韓字世雅嘗與師於南海作金投數萬斤於海又言取鯉魚一雙令其一著藥投沸膏中鯉奮尾鼓鰓其遊行沈浮有若處淵其無藥者已熟而可噉余問寧可試不言此藥去此踰萬里始不自行不能得也始若遭秦始皇漢武帝則復徐福欒大之徒矣桀紂殊世而齊惡姦人異代而等偽乃如此耶辨道論術道相須張殖遇道士姜玄辨以六丁驅役之術授之謂曰術之與道相須而行道非術無以自致術非道無以延長若得術而不得道亦如欲適萬里而足不行也術者雖萬端隱見未除死籙固當棲心妙域注念丹華立功以助其外鍊魄以存其內內外齊一然後可適道可以長存也仙傳拾遺毘陵道士李褐性偏急好陵侮人忽有貧士詣褐乞食褐不之與加以叱責弗顧數日有乘白馬來者禮接之曰頗相記乎視其貌乃前之貧士也謂褐曰子知有寒山子邪答曰知曰即吾是矣吾始謂汝可教今不可也修生之道除嗜去欲嗇神抱和所以無累也內抑其心外檢其身所以無過也先人後已知柔守謙所以安身也善推於人不善歸諸身所以積德也功不在大立之無怠過不在大去而不貳所以積功也然後內行充而外丹至可以冀道於髣髴耳子之三毒未剪以冠簪為飾可謂虎豹之鞟而犬豕之質也出門乘馬而去竟不復見上濁穢道家方術濁穢不清乃扣齒為天鼓咽唾為醴泉馬屎為靈薪老鼠為芝藥資此求道焉能得乎辨惑論喚婦女為朱門呼丈夫為玉柱口唾為玉液破邪論火仙外道名吉波頭水仙外道名夷叔羅自黃老風澆容服亦變非道非俗諺號閹人善詛善罵古名鬼卒其救苦也則解髮繫頸以繩自縳牛糞塗身互相鞭打其法律也若失符籙則倒銜手板逆風掃地楊枝百束自斫自負盜奏章也則匍匐灰獄背負水漚責罰尤重同奴隸之法罪譴銜伏比畜生之類辨正樓觀者昔周康王大夫關令尹喜所立也以其結草為樓因即為號周穆王西遊秦文東獵並枉駕迴輪親崇道教始皇建廟於樓南漢武立宮於觀北晉宋謁板于今尚存樓觀碑漢武時玉笥山民感山之靈異或愆旱災蝗祈之無不應乃相謂曰可置一觀彰表靈跡構殿闕中梁一條邑民將選奇材經數旬未獲忽一夜震雷風烈達曙乃晴天降白玉梁一條可其尺度嚴安其上光彩瑩目因號為玉梁觀至魏武時遣使取之至其山門去觀數里亭午之際雷霆大震烈殿脊化為白龍擘烟霧而去沒觀之東山下自玉梁飛去後其處莫能近之皆為猛獸毒蛇所逼玉笥山錄成都玉局觀相傳永壽初老君與張道陵至此有局腳玉床自地而出老君昇坐為陵說南北斗經既去而座隱地中因成洞穴故以玉局名之彭乘記陽平沙門號曰道人陽平呼為道士僧順三破論凡有二十四治而陽平一治最為大者今道士上章及奏符厭皆稱陽平重其本也以上清為洞玄靈寶為洞真三皇為洞神故曰三皇蜀記張守珪有役人將去自云陽平洞謫仙守珪曰洞府大小與人間城闕相類否對曰二十四化各有一大洞或方千里五百里三百里其中皆有日月飛精謂之伏晨之根下照洞中與世間無異其中皆有仙王仙官卿相輔佐如世之職司有得道之人及積功遷仙返生之士皆居其中以為民庶每年三元大節諸天各有上真下遊洞天以觀其所為善惡人世生死興廢水旱風雨預關於洞中焉龍神祠廟血食之司皆為洞府所統二十四化之外青城峨嵋益登慈母繁陽嶓冢皆亦有洞不在十大洞天三十六小洞天之數仙拾亳州真源縣太清宮老君降生之宅也九井三儈俱存咸通中龐勛據徐州欲奪宮為營壘有黑氣自九井中出昏曀一川勛黨迷道自相蹤踐廣明中黃巢將領欲焚其宮亦有黑霧遍川迷失行路刺史潘稠奏云自大寇犯闕之後群兇誅殄以來大小寇逆前後一十八度欲犯太清宮或迷失道途或龍神示見終挫兇計宮城宴然清移真源縣就宮安置道教靈驗記天中記卷三十六
