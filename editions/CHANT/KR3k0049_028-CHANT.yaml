body:
  text: 假譎齊襄公即位憎公孫無知收其祿無知不說殺襄公公子糾走魯公子小白奔莒既而國殺無知未有君公子糾與公子小白皆歸俱至爭先入公家管仲扞弓射公子小白中鉤鮑叔御公子小白僵管子以為小白死告公子糾曰安之公子小白已死矣鮑叔因疾驅先入故公子小白得以為君鮑叔之智應射而令公子小白僵也其智若鏃矢也呂貴卒叔向之讒萇弘也為書曰萇弘謂叔向曰子為我謂晉君所與君期者時可矣何不亟以兵來因佯遺其書周君之庭而急去行周以萇弘為賣周也乃誅萇弘而殺之韓子叔向之殺萇弘也數見萇弘於周因佯遺書曰萇弘謂叔向曰子起晉國之兵以攻周吾廢劉氏而立單氏劉氏請之君曰此萇弘也乃殺之說苑鄭桓公將欲襲鄶先問鄶之辨智果敢之士書其名姓擇鄶之良臣而與之為官爵之名而書之因為設壇於門外而埋之釁之以猳若盟狀鄶君以為內難也盡殺其良臣桓公因襲之遂取鄶上獻珥齊王夫人死有七孺子皆近薛公欲知王所欲立乃獻七珥美其一明日視珥所在勸王立為夫人齊策吞珠張丑為質於燕燕王欲殺之走且出境境吏得丑丑曰燕王所為將殺我者人有言我有寶珠也王欲得之今我已亡之矣而燕王不我信今子且致我我且言子之奪我珠而吞之燕王必當殺子刳子腹及子之腸矣夫欲得之君不可說以利吾要且死子腸亦且寸絕境吏恐而赦之燕策韓子吳子胥事同有獻不死之藥於荊王者謁者操以入中射之士問曰可食乎曰可因奪而食之王怒使人殺中射之士中射之士使人說王曰臣問謁者謁者曰可食臣故食之是臣無罪而罪在謁者也且客獻不死之藥臣食之而王殺之是死藥也王殺無罪之臣而明人之欺王王乃不殺楚策眾辱之爰盎常引大體忼慨宦者趙談以數幸常害盎盎患之兄子種為常侍騎諫盎曰君眾辱之後雖惡君上不復信於是上朝東宮趙談驂馬盎伏車前曰臣聞天子所以共六尺輿者皆天下豪英今漢雖乏人陛下獨奈何與刀鋸之餘共載於是上笑下趙談談泣下車漢書呂布詣袁紹紹患布欲殺之遣三十六兵被鎧迎布使著帳邊臥布知之使於帳中鼓箏諸兵臥布出帳去兵不覺也英雄記時有一道士頗能治病從中國來欺人言我數百歲玄知其誑後會眾坐玄謂所親曰欲知此公年否所親曰善忽有人從天上下舉座矚目良久集地著朱衣進賢冠入至道士前曰天帝詔問公之定年幾許而欺誑百姓道士大怖下床長跪答曰無狀寔年七十三玄因撫手大笑忽然失朱衣所在道士大慚遂不知所之神仙傳鞭拂晉元帝叔父東安王繇為成都王穎所害懼禍及謀出奔其夜月明禁衛甚嚴不能得去有頃天暴風雨晦冥游者散帝乘間得脫至河陽為津吏所止從者宗典後至以馬鞭拂之謂曰舍長官禁貴人而汝亦被駐耶因大笑由是被釋晉中興書溫嶠知王敦不可復諫乃潛謀滅之先夙夜綜其府事而附其欲錢鳳敦所信也嶠謂人曰錢世儀精神滿腹嶠素有知人之稱鳳聞而悅之結好於嶠會丹陽尹闕嶠說敦曰京尹輩穀喉舌宜得文武兼能之公宜自選其才敦然之問嶠誰可作者嶠曰愚謂錢鳳可用然裁之在公敦思惟良久無復勝君嶠即舌辭敦不從表補丹陽君猶懼錢鳳為之奸謀因敦置酒與嶠別嶠曰違離宇下情戀不已願自起行酒以展岐路之心行酒至鳳未及飲嶠因偽醉以手扳擊鳳幘為之墜作色曰錢鳳何人溫太真行酒而敢不飲鳳不悅敦以為醉兩釋之明日鳳曰嶠與朝廷甚密未必可信或懷反噬宜更思之敦曰太真昨醉小加聲色豈得以此便相讒貳由是鳳謀不行而得還都上醉眠王允之年在總角敦深知之謂為似已入則共寢嘗夜飲辭曰醉先眠敦將錢鳳計逆允之悉聞慮敦或疑於眠處大吐敦果照視見眠吐中不復疑之上王文度弟阿智惡乃不翅當年長而無人與婚孫興公有一女亦僻錯又無嫁娶理因詣文度求見阿智既見便陽言此定可殊不如人所傳那得至今未有婚處我有一女乃不惡但吾寒士不宜與卿計欲令阿智娶之文度欣然而啟藍田云興公向來忽言欲與阿智婚藍田驚喜既成婚女之頑囂欲過阿智方知興公之詐世說引神為誓齊王敬則為暨陽令縣有一部劫逃入山中為民患敬則遣人致意劫帥令出首當相申論郭下廟神甚酷烈百姓信之敬則引神為誓必不相負劫帥既出敬則於廟中設酒會劫帥於坐收縳之曰吾啟神若負誓還神十牛今不得違誓即殺十牛解神遂斬諸劫百姓悅之南史范雲齊建元初竟陵王子良為會稽太守雲為主簿王未之知後尅日登秦望山乃命雲雲以山上有秦始皇刻石此文三句一韻人多作兩句讀之並不得韻又皆大篆人多不識乃夜取史記讀之令上口明日登山子良命賓僚讀之皆茫然不識末問雲雲曰下官嘗讀史記見此刻石文進乃讀之如流子良大悅以為上賓自是寵冠府朝上永安三年逆賊爾朱兆囚莊帝於寺時太原王位極心驕功高意侈與奪臧否肆意帝恐謂左右曰朕寧作高貴卿公死不作漢獻帝生乃請計于城陽王徽徽曰以生太子為辭榮必入朝因以斃之莊帝曰后懷孕於十月今始九月可爾已否徽曰婦生產子有延月者有少月者不足為怪帝納其謀遂唱生太子遣徽特至太原王第告云皇儲誕育值榮與上黨王天穆博戲徽脫榮帽懽舞盤旋徽素大度量喜怒不形於色遶殿內外懽叫榮遂信之與穆並入朝莊帝聞榮來不覺失色中書舍人溫子升曰陛下色變帝連索酒飲之然後行事榮穆既誅拜徽太師司馬洛陽伽藍記爾朱兆入洛陽擒莊帝崩于晉陽建明二年長廣王從晉陽赴京師至郭外世隆以長廣本枝踈遠政行無聞逼禪與廣陵王恭是莊帝從父兄也正光中為黃門侍郎見元義秉權政歸近習遂佯啞不語不預世事永安中遁於上洛山中州刺史泉企執而送之莊帝疑恭姦詐夜遣人盜掠衣物復拔刀劍欲殺之恭張口以手指舌竟乃不言莊帝信其真患於令歸第恭常住龍華寺上至是世隆將謀廢立恐實不語乃令王所親申其意且兼迫脅王遂答曰天何言哉魏紀於是即皇帝位改號曰普泰黃門侍郎邢子才為赦文敘述莊帝枉殺太原王之狀廣陵王曰永安手翦強臣非為失德直以天未厭亂逢成濟之禍謂左右將詔來朕自作之直言門下朕以寡德運屬樂推思與億兆同茲大慶肆眚之科一依恒式廣陵杜口八載至是始言海內庶士咸稱聖君伽藍記尔朱敞字乾羅榮之族子也父彥伯齊神武韓陵之捷盡誅爾朱氏敞小隨母養於宮中及年十二自竇而走至於大街見童兒群戲者敞解所著綺羅金翠之服易衣而遁追騎尋至初不識敞便執綺衣兒比究問知非會日已暮由是得免隋書犀板換竹齊文襄疑文宣佯愚慮其有後變將陰圖之以問崔暹暹曰嘗與二郎俱在行位試以手板拍其背而不瞋乃將犀手板換暹竹者自揩拭而翫視之以是知其實癡不足慮也帝既鎖暹責其往昔打背暹自陳所對文襄之言明已功以贖死帝悟曰我免禍乃暹之力釋而勞之北史籠東宇文泰與侯景合戰泰馬中流矢驚逸遂失所之泰墮地東魏兵追及之左右皆散李穆下馬以策擊泰罵之曰籠東軍士爾曹主何在而獨留此追者不疑因以馬授泰與之俱逸上元稹便騎射為南豫州刺史太胡山蠻時時鈔掠前後守牧多羈縻而已稹乃設畫召新蔡襄城蠻魁三十餘人稹盛武裝於州西為置酒使之觀射先遣左右能射者二十餘人稹自發數箭皆中然後命左右以次而射先出一囚犯死罪者使服軍衣亦參射限命射不中稹即責而斬之蠻魁等相視股栗又預教左右取死囚十人皆著蠻衣云是鈔賊稹乃臨坐偽舉目瞻天微有風動稹謂蠻曰風氣少暴似有鈔賊入境不過十人當在西南五十里許即命騎追掩果縳送十人稹告諸蠻曰爾鄉里作賊如此合死以不蠻等皆叩頭曰合萬死稹即斬之乃遣蠻還諸蠻大服自是境無暴掠魏書五君詠張說謫岳州常鬱鬱不樂時宰以說機辨才略互相排擯蘇頲方大用說與瓌善說因為五君詠致書封其詩以貽頲誡其使曰當候忌日近暮送之使者近暮吊客至多說先公僚舊頲覽詩嗚咽流涕翌日上對大陳說忠正謇諤人望所屬不宜淪滯遐方上因降璽書勞問俄遷荊州長史由是陸象先韋嗣立張庭珪賈曾皆以譴逐歲久因加甄敘頲以父之執友事之甚謹唐詩紀事詩曰淒涼丞相府餘慶在玄城單騎入敵憲宗時戎羯亂華詔下南梁起甲士三千人令赴闕下將起師人作叛逐其帥因團集拒命者歲餘憲宗深以為患京兆尹溫造請以騎往至其界梁人見止一儒生皆相賀無患及至但宣召敕安存一無所問然梁帥負過出入者皆不捨器仗溫亦不誡之他日毬場中設樂三軍併赴令於長廊下就食坐筵前臨階南北兩行設長索二條令軍人各於面前索上掛其刀劍而食酒至鼓噪一聲兩頭齊力抨舉其索則刀劍去地三丈餘矣軍人大亂無以施其勇然後闔戶而斬之南梁人自爾累世不敢復叛王氏見聞汴州相國寺言佛有汗流節度使劉元佐遽命駕自持金帛以施日中其妻亦至明日復起齋場由是將吏商賈奔走道路惟恐輸貨不及因令官為簿書以籍所入十日乃閉寺曰佛汗止矣得錢巨萬以贍軍資國史補匿名王鍔為淮南節度使嘗聽理有遺匿名書于前者左右取以授鍔鍔納之鞾中鞾中先有他書以雜之及吏問鍔探取他書焚之人言其所匿者焚也既歸省其所告者異日乃以他微事連其所告者同窮拘驗之以譎眾下吏以為神明舊唐令狐楚除守兗州境方旱米價甚高遣吏至公署問米價幾何州有幾倉問訖屈指獨語曰舊價若干四倉各出米若干以若干定價糶則可以賑救矣左右聽之流語遍郡中富人競發所畜物價方平人心欣然得稔芝田錄張濬唐昭宗朝親統扈駕六師往討太原遂致失律陷其副師侍郎孫揆尋謀班師路由平陽牧守姓張即蒲帥王珂之大校珂變詐難測復慮軍旅經過落其詭計濬乃先數程而行泊于平陽之傳舍六軍相次由陰地關而進濬深忌晉牧及張郊迎既駐郵亭濬令張使君升廳茶酒設食留至張燈乃許辭去自旦及暮不交一言口中咀少物遙觀一如交談之狀珂性多疑動有警察時偵事者已密報之珂果疑召張問之曰相國與爾自旦至暮所話何對云並不交言王殊不信謂其不誠戮之六師乃假途歸京了無纖慮后判邦計諸道各致綺紈之類並不受之乃命專人面付之曰爾述吾意以此改充軍行所費之物鍋幕布槽啖馬藥土產所共之物咸請備之於是諸藩欣然奉之以至軍行十萬所需無闕朱溫深忌之令刺客殺之於長水莊上玉堂閒話芻為人李克用遣人入魏博覘云有旗幟來往晉王曰劉鄩一步一計更令探審果縛芻為人縛旗于上以驢負之循堞而行鄩軍已去二日矣北夢瑣言李抱貞鎮潞州軍資匱闕計無所出有老僧大為郡人信服抱貞因請之曰假和尚之道以濟軍中可乎僧曰無不可抱貞曰但言擇日鞠場焚身某當於便宅鑿一地道通連俟火作即潛以相出僧喜從之遂陳狀聲言抱貞命於鞠塲積薪貯油因為七日道塲晝夜香燈梵唄雜作抱貞亦引僧入地道使之不疑僧乃升壇執鑪對眾說法抱貞率監軍僚屬及將吏俱拜其下以俸入檀施堆於其傍由是士女駢填捨財億計滿七日遂送柴積灌油發熖擊鐘念佛抱貞密已遣人填塞地道俄傾之際僧薪並灰數日籍所得貨財輦入軍資庫別求所謂舍利者數十粒造塔貯焉尚書故實玉泉子國君黃雲趙王李德誠鎮江西有日者自稱世人貴賤一見輒分王使女伎數人與其妻滕國君同妝梳服飾偕立庭中請辨良賤客俯躬而進曰國君頭上有黃雲群伎不覺皆仰首日者曰此是國君也王悅而遣之南唐近事南俗尚鬼狄武襄青征儂智高時大兵始出桂之因祝曰勝負無以為據乃取百錢自持之且與神約果大捷則投此期盡錢面左右諫止儻不如意恐沮師武襄不聽萬眾方聳視已而揮手倏一擲則百錢盡紅矣於是舉軍歡呼聲震林野武襄亦大喜顧左右取百釘來即隨錢踈密布地而釘帖之加諸青紗籠覆手自封焉曰伺凱旋當謝神取錢其後砍崑崙關取智高平邕管及師還如言取錢與幕府士大夫共視之乃兩面錢也曹瑋知渭州有告戍卒叛入夏國者瑋方對客奕棋遽曰吾使之行也夏人聞之即斬叛者投其者境上宋史天雄軍豪家芻茭亘野時訪姦人穴官坻為弊咸平中趙昌言為守廉知其事未問一日堤潰吏告急昌言命亟取豪家所積給用塞堤自是不敢盜穴官堤為姦寓簡安豐茍陂孫叔敖所創為南北渠溉田萬頃民因旱多侵耕其間雨水溢則盜決之遂失灌溉之利李若谷知壽春下令陂決不得起兵夫獨調瀕陂之民使之完築自是無盜決者上种世衡知澠池縣旁山有廟世衡葺之其梁重大眾不能舉世衡乃令縣幹翦髮如手摶者驅數對於馬前云欲詣廟中教手搏傾城人隨往觀既至謂觀者曰汝曹先為我致廟梁然後觀手搏眾欣然移下山共舉之須臾而上其權數皆此類涑水紀聞禁中賜酒秦檜一日見高宗不懌奏云何事上勞聖慮上云郊祀匹帛闕五萬丈檜云臣為陛下任此事忽一日奏云乞禁中賜臣酒四金壺將某日宣賜秦約張韓二將來議事自早至午未得入謁但見中使宣賜御酒來心愈惑且驚移時秦與張韓進並不發一語忽云御前賜酒同飲一杯張韓捧扈戰慄不敢飲秦先取酒飲一勺少定緩云主人要與二將各假一千萬緡以奉郊祀祭畢後撥賜張韓謹奉令奏知高廟得旨正五百萬緡貴耳集殿內紫幕建炎之初虜使講和云使來必須百官郊迎其書在廷失色秦檜恬不為意盡遣部省吏人迎之朝見使人必要褥位此非臣子之禮是日檜令朝見殿廷之內皆以紫幕銷滿北人無辭而退上京下忽闕見錢市間頗皇皇忽一日秦檜呼一鑷工櫛髮以五千當二錢犒之諭云此錢數日間有旨不使早用了鑷工親得鈞旨遂與外人言之不三日間京下見錢頓出此宰制天下之小術貴耳集檜在相位頤指上下無敢弗從時都下貨壅之見鏹市闤大開府尹以聞檜笑曰易耳即召文思院官未至促者絡繹奔而來諭之曰適得旨欲變錢法可鑄祿錢一緡進呈廢見鏹不用約翌午畢事院官唯唯而出召工為之富家聞者盡出宿鏹市金粟物價太昂泉溢于市既而樣錢上省寂無聞矣秦檜夫人常入禁中顯仁太后言近日子魚大者絕少夫人對曰妾家有之當以百尾進歸告檜檜咎其失言與其館客謀進青魚百尾顯仁拊掌笑曰我道這婆子村果然鶴林玉露反儉奢張也反儉曰奢從大者言誇大於人也說文昔者桀之時女樂三萬人晨譟於端門樂聞於三衢無不服文綉衣裳者管子丹桓公之楹刻其桷皆非禮也御孫諫曰臣聞之儉德之共也侈惡之大也先君有共德而君納諸大惡無乃不可乎莊二十四齊慶封來聘其車美孟孫謂叔孫曰慶季之車不亦美乎叔孫曰豹聞之服美不稱必以惡終美車何為襄二十七慶封來奔獻車於季武子美澤可以鑑展莊叔見之曰車甚澤人必瘁宜其亡也二十八亡家之主齊高子容與宋司徒見知伯女齊相禮賔出司馬侯言於知伯曰二子皆將不免子容專司徒侈皆亡家之主也知伯曰何如對曰專則速及侈將以其力斃專則人實斃之將及矣二十九吳師在陳楚大夫皆懼子西施今聞夫差次有臺榭陂焉宿有妃嬙嬪御焉一日之樂所欲必成玩好必從珍異是聚觀樂是務視民如仇而用之日新夫差先自敗也已安能敗我襄五吳王夫差築姑蘇臺三年乃成周環詰屈橫互五里崇飾土木殫耗人力宮妓數千人又別立春宵宮為長夜之飲造千石酒鍾又掘大池池中造青龍舟舟中陳妓樂日與西施為水戲又於宮中作海靈館館娃閣銅鋪玉檻宮之楹檻皆珠玉飾之述異記衛端木叔者子貢之世也藉其先貲家累萬金不治世故放意所好其生民之所欲為人意之所欲玩者無不為也無不玩也墻屋臺榭園囿池沼飲食車服聲樂嬪御擬齊楚之君焉至其情所欲好耳所欲聽目所欲視口所欲嘗雖殊方偏國非齊土之所產育者無不必致之猶藩墻之物也賓客在庭者日百住庖廚之下不絕烟火堂廡之上不絕聲樂奉養之餘先散之宗族宗族之餘次散之邑里邑之餘餘乃散之一國行年六十氣幹將衰棄其家事都散其庫藏珍寶車服妾媵一年之中盡焉不為子孫留財及其病也無藥石之儲及其死也無瘞埋之資一國之人受其施者相與賦而藏之反其子孫之財焉禽骨釐聞之曰端木叔狂人也辱其祖矣段干生聞之曰端木叔達人也德過其祖矣列楊朱韓嫣好彈常以金為丸一日所失者十餘長安為之語曰苦饑寒逐金丸京師兒童每聞嫣出彈輒隨逐之望丸之所落而競拾取焉西京雜記梁冀為大將軍權震中外其四方調發歲時貢獻皆先輸上第於冀乃大起第舍而妻孫壽亦對街為宅殫極土木互相誇競堂寢皆有陰陽奧室連房洞戶柱壁雕鏤加以銅漆牕牖加有綺疏青瑣圖以雲氣仙靈臺閣周通更相臨望飛梁石蹬陵跨水道駭鷄犀夜光璧充實帑藏名駒龍馬株於內廄與妻乘輦青蓋車張羽葆飾以金玉琥珀每遊觀池亭及第內多從倡優鳴鐘鼓吹竽酣謳竟路日夜相繼及桓帝誅冀收其資產以實國庫詔減天下一歲租稅之半後漢劉琰字威碩為車騎將軍車服飲食號為侈靡侍婢數十皆能為聲樂又悉教誦讀魯靈光殿賦蜀志甘寧好游俠其出入步則陳車騎水則連輕舟侍從被文繡所如光道路住止常以贈錦維舟去或割棄以示奢也吳書石崇資產累巨萬金宅室輿馬僭擬王者庖膳必窮水陸之珍後房百數皆曳紈繡珥金翠而絲竹之蓺盡一世之選築榭開沼殫極人巧與貴戚羊琇王愷之徒競相高以侈靡而崇為居最之首琇等每愧羨以為不及也續文章志石崇為荊州刺史好俠無賴遣使劫遠使商客致家大富有別館在河陽之金谷財產盈積室宇宏麗與貴戚武帝舅王愷奢靡相尚愷以𨹋燠釜崇以蠟代薪愷作紫紗步障四十里崇作錦步障五十里愷以赤石脂塗屋崇以椒塗之武帝助愷珊瑚樹一株高二尺愷以示石崇崇以鐵如意擊破愷不悅崇曰無恨令取六七株還之惠帝知富無以誇之時外國進火浣布天下更無帝為衫來幸崇家崇奴僕五十人皆衣火浣布衫抵承帝大慚御覽晉書王濟字武子被責移第比邙下于時人多地貴濟好馬射買地作埒編錢匝地竟埒時人號曰金溝世說何曾字穎考性奢豪務在華侈帷帳車服窮極綺麗廚膳滋味過於王者每燕見不食太官所設帝輒命恥其食蒸餅上不坼作十字不食食日萬錢猶曰無下箸處人以小紙為書者勑記室勿報劉毅等數劾奏曾侈奢無度帝以其重臣一無所問子劭字敬祖驕奢簡貴亦有父風衣裘服玩新故巨積食必盡四方珍異一日之供以錢二萬為限時論以為太官御膳無以加之晉書任愷字元褒既失職乃縱酒耽樂極滋味以自奉養初何劭以公子奢侈每食必盡四方珍饌愷乃踰之一食萬錢猶云無可下筯處上洛下少林木炭正如粟狀羊琇驕奢乃擣小炭為屑以物和之作獸形後何劭之徒共集乃以溫酒炎勢既猛獸皆張口向人赫赫然諸豪相矜皆服而效之晉朝雜記徐湛之字孝源貴戚豪強產業甚厚室宇園池貴游莫及伎樂之妙冠絕一時門生千餘皆三吳富貴子資質端美衣服鮮麗每出入行游塗巷盈滿泥雨日悉以後車載之文帝每嫌其侈縱時安成公何勗無忌之子臨汝公孟靈休昶之子也並時奢豪與湛之以肴膳器服車馬相尚都下為之語曰安成食臨汝飾湛之美兼何孟南史宋阮佃夫宅舍園池諸王邸第莫及女妓數十藝貌冠絕當時金玉錦繡之飾宮掖不逮也每製一衣造一物都下莫不法效焉於宅內開瀆東出十許里塘岸整潔汎輕舟奏女樂中書舍人劉休嘗詣之遇佃夫出行中路相逢要休同反就席便命施設一時珍差莫不畢備凡諸大劑並皆始熟如此者數十種佃夫常作數十人饌以待賓客故造次便辦類皆如此雖晉世王石不能過也上佞幸傳魚弘有眠床一張皆蹙柏四面周匝無一有異通用銀鏤金花福壽兩重為腳南史為湘東王鎮西司馬述職西止逢勑迎瑞像王令送像下都弘率部曲數百悉衣錦袍赫奕滿道頗為人所慕塗經夏首李抗學其為人抗舅元法僧聞之杖抗三百上徐君蒨字懷簡孝嗣孫琨子也幼聰明好學尤長于部書問無不對善絃歌為湘東王鎮西諮議參軍頗好聲色侍妾數十皆佩金翠曳羅綺服玩悉以金銀飲酒數升便醉而閉門盡日酣歌每遇歡謔則飲至斗有時載伎肆意游行荊楚山川靡不畢踐朋從游好莫得見之時襄陽魚弘亦以豪侈稱於是府中謠曰北路魚南路徐然其服玩次于弘也上梁時勳豪子弟多縱恣以淫盜屠殺為業父祖不能制尉羅不能禁車服牛馬號西豐駱馬樂山烏牛董暹金帖織成戰襖直七百萬西豐侯正德樂山侯正則暹潮溝董當門子世謂之薰世子者也後皆不得其死上夏侯道遷好言宴務口實京師珍羞罔不畢有於京城之西水次市地大起園池植列疏果延致秀彥時往遊適妓女十餘常自娛樂國秩歲入三千餘匹專供酒饌不營家產每誦孔融詩曰坐上客恒滿樽中酒不空餘非吾事也識者多之魏書高陽王雍貴極人臣富兼山海居止第宅匹於帝宮白殿丹檻窈窕連豆飛簷反宇轇轕週通僮僕六千妓女五百隋珠照日羅衣從風自漢晉以來諸王豪侈未之有也出則鳴騶御道文物成行鐃吹響發笳聲哀轉入則歌姬舞女擊筑吹笙絲管迭奏連宵盡日其竹林魚池侔於禁苑草草如積珍木連陰雍嗜口味厚自奉養一日必以數萬錢為限海陸珍羞方丈於前陳留侯李崇謂人曰高陽一日敵我千日洛陽伽藍記魏時帝族王侯外戚公主擅山海之富居川林之饒爭修園宅互相誇競崇門豐室洞戶連房飛館生風重樓起霧高臺芳樹家家而築花林曲池園園而有莫不桃李夏綠竹柏冬青而河間王琛最為豪首常與高陽爭衡造文柏堂形如徽音殿置玉井金罐以金五色績為繩諸王服其豪富琛語人云晉室石崇乃是庶姓猶能雉頭狐腋畫卯雕薪况我大魏天潢不為華侈造迎風館於後園牕戶之上列錢青瑣玉鳳銜鈴金龍吐佩素柰朱李枝條入簷伎女樓上坐而摘食琛常會宗室陳諸寶器金瓶銀瓮百餘口甌擎盤盒稱是自餘酒器有水晶鉢瑪瑙琉璃碗赤玉巵數十枚作工奇妙中土所無皆從西域而來又陳女樂及諸名馬復引諸王按行府庫錦罽珠璣冰羅霧縠充積其內繡纈油綾絲綵越葛錢絹等不可數計琛忽謂章武王融曰不恨我不見石崇恨石崇不見我經河陰之役諸元殲盡王侯第宅多題為寺壽丘里閭列剎相望祇洹鬱起寶塔高凌四月初八日京師士女多至河間寺觀其廊廡綺麗無不歎息以為蓬萊僊室亦不是過入其後園見溝瀆蹇產石磴礁磽朱荷出池綠萍浮水飛梁跨閣高樹出雲咸皆唧唧雖梁王瓦苑想之不如也上崔冏臨終戒其二子曰夫恭儉福之輿傲侈禍之機乘福輿者侵以康休蹈禍機者忽而傾覆可不誡歟北史十二韓晉明好酒誕縱招引賓客一席之費動以萬錢猶恨儉率北齊孫瑒字德璉性通泰有財散之親友居家頗失於侈家庭穿築極林泉之致歌童舞女當世罕儔賓客填門軒蓋不絕及出鎮郢州乃合一餘船為大舫於中立亭池植荷芰每良辰美景賓僚並集泛長江而置酒亦一時之勝賞焉南史秦王俊盛治宮室窮極侈麗俊有巧思每親運斤斧工巧之器飾以珠玉為妃作七寶羃籬又為水殿香塗粉璧玉砌金階梁柱楣棟之間周以明鏡間以寶珠極榮飾之美每與賓客妓女弦歌於其上隋書隋煬帝幸廣陵至汴帝御龍舟蕭妃乘鳳舸錦帆綵纜窮極侈靡舟前為舞臺臺上垂蔽日簾簾即蒲澤國所進以負山蛟睫紉蓮根絲貫小珠間睫編成雖曉日激射而光不能透每舟擇妙麗長白女子千人執雕版鏤金楫號為殿腳女隋遺錄煬帝巡狩北邊作大行殿七寶帳容數百人飾以珍寶光輝洞徹引匈奴啟民可汗宴會其中可汗恍然疑非人世之有識者云大行殿者不祥之兆也是非王莽輕車之比此寔天心非關人事也僉載裴矩字弘大帝至東都矩以蠻夷朝貢者多諷帝令都下大戲徵四方奇技異藝陳於端門街衣錦綺珥金翠者以十數萬又勑百官及民士女列坐柵闌而縱觀焉皆被服鮮麗終月乃罷又令三市店肆皆設帷帳盛列酒食遣掌蕃率蠻夷與民貿易所至之處悉令邀延就坐醉飽而散蠻夷嗟歎謂中國為神仙隋書許敬宗奢豪嘗造飛樓七十間令妓女走馬于其上以為戲樂獨異記張易之為母阿臧七寶帳金銀珠玉寶貝之類罔不畢萃曠古以來未曾聞見鋪象牙床織犀角簟鼲貂之褥蛩蟁之氈汾晉之龍鬚臨河之鳳翮以為席阿臧與鳳閣侍郎李迥秀畏其盛嫌其老乃荒飲無度昏醉是務常頻喚不覺出為恒州刺史易之敗阿臧入官逈秀被坐降為衡州長史僉載安樂公主改為悖逆庶人奪百姓莊田造定昆地四十九里直抵南山擬昆明池累石為山以象華岳引水為澗以象天津飛閣步簷斜磴道被以錦繡畫以丹青飾以金銀瑩以珠玉又為九曲流杯池作石蓮花臺泉于臺中流出窮天下之壯麗言之難盡悖逆之敗配入司農每日士女游觀車馬嗔咽奉敕輒到者官人解見任凡人決一頓乃止上景龍中妃主家競為奢侈駙馬楊慎交武崇訓至以油灑地築毬塲國史纂異玄宗將幸華清宮貴妃姊妹競飾車服為一處車飾以金翠間以珠玉一車之費不啻數十萬貫既而重甚牛不能引因復上聞請各乘馬於是競購名馬以黃金為銜勒組繡為障泥共會于國忠宅將同入禁中炳煥照燭觀者如堵自國忠宅至子城東南隅僕御車馬填委其間虢國每入禁中常乘驄馬使小黃門御紫驄之俊健黃門之端秀皆冠絕一時明皇雜錄萬花谷楊貴妃得寵兄銛錡國忠諸姨五家第舍聯亘治錦繡琢金玉者大抵千人變化若神仙每帝幸華清宮五家扈從每家為一隊著一色衣五家隊合照映如萬花煥發川谷成錦繡遺鈿墮舄瑟瑟珠翠狼藉於道香聞數十里上舊唐韋陟逍遙公性奢縱喜飾服馬侍兒閹童列左右常數十侔於王宮主第窮治饌羞擇膏腴地蓺穀麥以鳥羽擇米每食視廚中所棄其直猶不減萬錢宴公侯家雖水陸具陳曾不下筯常以五采牋為書記使侍婢主之其裁答授意而已本傳天寶九年諸貴戚競以進食相尚玄宗命官姚思藝為司校進食使水陸珍羞數千盤一盤費中人十家之產續世說王元寶都中巨豪也常以金銀疊為屋壁上以紅泥泥之於宅中置一禮賢堂以沉檀為軒檻以碔砆甃地面以錦文石為柱礎又以銅線穿錢甃於後園花徑中貴其泥雨不滑也四方賓客所至如歸故時人呼為王家富窟天寶遺事林畔香童元寶好賓客務於華侈器玩服用僭於王公而四方之士盡歸而仰焉常於寢帳床前雕矮童二人捧七寶博山鑪自暝焚香徹曉其驕貴如此上冠絕元載於城中開南北二甲第室宇宏麗冠絕當時又於近郊起亭榭所至之處帳帷什器皆如宿設儲不改供城南膏腴別墅連疆接畛凡數十所婢僕曳羅綺亦百餘人恣為不法侈僭無度舊唐曝衣元載妻字韞秀王縉女也初縉鎮北京以女嫁載歲久而見輕怠親戚以為乞兒皆厭薄之載遂游秦既到京屢陳時務肅宗擢拜中書及代宗兩朝宰相貴盛無比太原內外親屬悉來謁賀韞秀安置于閒院忽因天晴之景以青紫絲絛四十條各長三十丈皆施羅紈綺繡之飾每條絛下排金銀鑪二十枚皆焚異香香至其服乃命諸親戚西院閒步韞秀問是何物侍婢對曰今日相公與夫人曬曝夜服王氏謂諸親曰豈料乞索兒婦還有兩事蓋形麤衣也於是諸親羞赧稍稍辭去杜陽編三府空耗杜亞為淮南競渡採蓮龍舟錦纜繡帆之戲費金數十萬于頔為襄州日點山燈一上油二千石李昌夔在荊州打獵大修裝飾其妻獨孤氏亦出女隊二千人皆著紅紫繡襖子及錦鞍韉此三府亦因而空耗傳載乾符中東洛有貴家子弟承籍勳蔭錦衣玉食常饌必以炭炊往往不愜其意有李使君出牧罷歸感其恩舊託門於聖剛者選日廣求珍異邀之至日兄弟列坐餚羞每至曾不入口主人揖之再三唯沾果食而已李莫究其由明日使聖剛往問之曰凡以炭炊饌先燒令熟謂之煉炭不然猶有烟氣李宅炭不經煉是以難食僧曰非所知及巢寇䧟洛昆仲與聖剛同竄不食者三日步至河橋僧以囊中數錢買脫粟餐於土杯中同食僧笑而謂之曰此非煉炭所炊不知堪與郎君吃否皆低頭無詞劇談錄淮南楊渥居喪晝夜酣飲作樂十圍之燭以擊毬一燭費錢數萬史朱梁朱瑾有所乘名馬冬以錦帳貯之夏以羅幬護之續世說石晉吐谷渾酋長白承福家甚富飼馬用銀槽上馬希範性剛愎好以誇大為事雖去半仗而軍國制度皆擬乘輿乃大興土功建天策府中構九龍殿以沉香為八龍各長百尺抱柱相向作趣捧勢而已坐其間自謂一龍也幞頭腳長丈餘以象龍角凌晨將坐先使人焚香於龍腹中煙氣鬱然而出若口吐焉近古以來諸侯王奢僣未有如此之盛也上蜀主王衍奢縱無度常例錦步障毬其中往往遠適而外人不知爇諸香晝夜不絕久而厭之更爇皂莢以亂其氣結繒為山及宮殿樓觀於其上或為風雨所敗則更以新者易之或樂飲繒山經旬不下山前穿渠通禁中或乘船夜歸令宮女秉燭炬千餘居前船却立照之水面如晝或酣飲禁中鼓吹沸騰以至達旦以是為常上郭從義鎮河朔於洛中造大第以香柏為棟文梓為梁花石甃池無不備具第成約費白金五千錠初或勸阻不必大奢多費不聽後被召適家秉燭周覽至東郡而卒家人不能居為世所譏張筠初代康懷英為永平節度使掠其家資又於唐故宮掘地得金玉貲巨萬出帝時居洛陽以酒色聲妓自娛者十餘年人謂之地仙五代史南唐孫晟為右僕射家富恣豪侈凡飲宴不用几案令女伎各執一器環侍其側號肉臺盤遺事楊國忠事同又冬月令妓女圍之曰肉屏風南唐遺事宋太祖伐蜀蜀主昶降舉族至汴帝見昶溺器以七寶裝飾即命撞破之曰溺器以此飾之當以何器貯食耶所為如是不亡何待續編魯俗魯人俗儉嗇而曹邴氏尤甚以鐵冶起富至巨萬然自父兄子孫約俛有拾仰有取史記平陵士孫奮貲至一億七十萬富聞京師而性儉吝從子端辟梁冀掾奮送絹五疋食以乾魚嘗宿客舍顧錢直甚少主曰君惜錢如此欲作士孫景卿耶三輔夬圖不敢自用漢世有人年老無子家富性儉嗇侵晨而起侵夜而息營理產業聚斂無厭而不敢自用或從之求濟者不得已入內取錢十自堂而出隨步輒減比至於外才餘半在閉目以授乞者尋復囑云我傾家贍君慎勿他說復相效而求老人俄死田資沒入內帑笑林吳沈峻字叔山性儉𠫤張溫使蜀時詣沈別沈入內良久出語溫曰向擇一端布欲以送卿而絕無麤者溫佳其無隱又嘗經太湖岸上使從者取鹽水已而恨多敕令還減之尋亦自愧曰此吾天性也笑林司徒王戎既貴且富區宅僮牧膏田水碓之屬洛下無比契疏鞅掌每與夫人以象牙籌晝夜算計家資世說戎性至儉不能自奉養財不出外戶下人謂為膏盲之疾王隱晉書女適裴頠貸錢數萬久而未還女後歸寧戎色不悅女遽還直然後乃懽從子將婚戎遺其一單衣訖而更責取世說晉書和嶠字長輿家產豐富擬於王者然性至吝以是獲譏於世杜預以為嶠有錢癖晉書王導儉節帳下甘果盈溢不散涉春爛敗都督白之公令舍去曰慎不可令太郎悅知世說太元十二年外國道人有幻術既至國中有一家巨富而性慳恡語擔人曰吾試為君破奴慳即至其家有好馬甚珍之繫在柱下忽失去尋索不知處明日見馬在五升甖中終不可破便語言君作百人廚以周窮乏馬得出耳主人即狼狽作之畢馬還在柱下明日其公母老在堂上忽復不見舉家惶怖不知所在開妝器忽見父母澤壺中不知何由得出復往守請之其人云當更作千餘人食飴百窮者乃當得出既作其父母自在床上靈鬼志尚書令符雅為人樂施乞人填門常曰天下物何常吾今日富后日貧耳忽一日不施則意不太時人為之語曰不為權興富寧作雅貧秦云王琨儉于財用設酒不過兩盌輒云此酒難遇鹽豉薑蒜之屬並掛屏風酒漿悉置床下內外有求琨手自賦之南史十三曹虎為右衛將軍晚節好貨賄吝嗇在雍州得見錢五千萬伎女食醬菜無重肴每好風景輒開戶拍張向之東昏凝虎舊將搶奪其財殺之南齊書鄧差南郡臨沮人臨江道逢估人先不相識道邊相對共食羅布殊品比差與焉差曰君遠行商估勢不在豊何為頓爾珍羞美食估人曰人生在世終止為身口耳一朝死病安能得進甘味乎終不如臨沮鄧生平生不用為守錢奴耳差不告姓名歸至家宰鵝食動筯齩骨哽其喉而死廣五行記梁朱异及諸子自潮溝列宅至青溪其中有臺池玩好每暇日與賓客遊焉四方饋遺財貨充積性吝嗇未嘗有散施廚下珍羞恒腐爛每月常棄十數車雖諸子別房亦不分贍南史夏侯亶性儉率不事華侈晚年頗好音樂有妓妾十數人並無被服姿容每有客常隔簾奏之時謂簾為夏侯妓衣梁書二十二服麤弊王筠為臨海太守在郡侵刻還資有芒屩兩舫家累千金性儉嗇外服麤弊所乘牛常飼以青草及遇亂為盜所攻墜井卒家人十三口同遇害棄尸空井中南史草率南陽有人為生奧博性殊儉吝冬至日女壻謁之乃設一銅甌酒數臠麞肉壻恨其草率一舉盡之主人愕然俛仰命益如此者再退而責其女曰某郎好酒故汝常貧及其死後諸子爭財遂兄殺弟顏氏家訓元徽性多嫉妒又恡惜財用自家及國於是有所賞錫咸出薄少或多而中減與而復追徒有糜費恩不感物魏書封述字君義厚積財產一無分饋雖至親密友貧病困篤亦絕於拯濟物論甚鄙之前妻河內司馬氏一息為娶隴西李士元女大輸財聘及將成禮猶競懸違述忽取所供養像對士元打像為誓士元笑曰封公何處常得應急像須誓便用一息娶范陽盧莊之女述又經府訴云送騾乃嫌腳跛評田則云鹹薄銅器又嫌古廢皆為恡嗇所及每致紛紜北史北齊庫狄伏連性鄙恡其妻病以百錢買藥每自恨之家口百餘盛夏人料倉米二升不給鹽菜常有饑色積年賜物藏在別庫一婢專掌管籥每入庫檢閱必語妻子此官物不可輒用至死時惟著敝褌而積絹至二萬疋簿錄並歸天府北史躬提冠履沈眾約孫也性恡嗇內治產業財帛以億計無所分遺其自奉養其薄每於朝會之中衣裳破裂或躬提冠履永定二年兼起部尚書監起太極殿恒服布袍芒屩以麻繩為帶又攜乾蔬菜囊麥飯䬳入獨噉之朝士共誚其所為陳書韋莊頗讀書數米而炊秤薪而釁炙少一臠而覺之一子八歲而卒妻斂以時服莊剝取以故席褁屍殯訖擎其席而歸其憶念也嗚咽不自勝惟慳吝爾出朝野僉載夏侯彪夏月食飲生蟲在下未曾瀝口嘗送客出門奴盜食臠肉彪還覺之大怒乃捉蠅與食令嘔之朝野僉載天寶中相州王叟者家鄴城富有財物唯夫與妻更無兒女積粟近至萬斛而夫妻儉嗇頗甚常食陳物纔以充腸不求豐厚莊宅尤廣客二百餘戶叟常巡行客坊忽見一客方食盤餐豐腴叟問其業客云唯賣雜粉香藥而已叟疑其作盜問汝有幾而衣食過豐也此人云唯有五千之本逐日食利但存其本不望其餘故衣食常得足耳叟遂大悟歸謂妻曰彼人小得其利便以充身可謂達理吾今積財巨萬而衣食陳敗又無子息將以遺誰遂發倉庫廣市珍好恣其食味不數日夫妻俱夢為人所錄枷鎖禁繫鞭撻俱至云此人妄破軍糧夫妻並卒官軍圍安慶緒于相州盡出其廩以供軍馬原化記胡訥聞見錄梓州民陳氏事同噉肉封殘歸登尚書性甚吝嗇常爛一羊脾旋割旋噉封其殘者一日登妻誤於封處割食登不見元封大怒其內由是沒身不食肉登每浴必屏左右或有自外窺之乃巨龜也北夢瑣言裴司徒璩姓靳嗇廉問江西日凡什器圖障皆新其制閒屋貯之未嘗施用每有宴會即於朝士家借之上漢吏部侍郎張允家資萬計而性吝不委妻子自係鑰匙于衣下如環佩聲郭威入京師允匿佛殿藻井之上板壞而墜凍餧而死續世說獵酒漢韋思在上黨五年無令譽可稱唯以聚斂為事性又鄙吝未嘗與賓佐有酒食之會有從事欲求謁見者思覽刺而怒曰必是來獵酒也命典客者飲而遣之其鄙吝如此上陳繼善自江寧尹拜少傅致仕富於資產性鄙屑別墅林池未嘗暫適既不嗜學又杜絕賓客惟自荷以鋤理小圃成畦以真珠之餘顆若種蔬狀布土壤之間既顆俯拾周而復始以此為樂焉南唐近事南漢鍾元章劉晟時為中書舍人性吝嗇歲獲賜賚甚厚然未嘗分遺故人其妻牢氏有賢行常語允章曰妾昔聞君子家無釜鬵烹茶作糜止用一銚尚且接待朋友今寶貨盈室而乂路榛蹇雖富且貴何鄙尚也乃出銚以示允章允章大慚自是稍揮散矣九國志孟蜀范禹中為翰林學士性吝嗇好聚財令輸錢數千緡三掌貢舉賄厚者登高科面評其置無有愧色與馮贊堯為布衣交家貧無貲終不放登第後從昶歸宋為鴻臚卿有門生自陽城至相見甚歡延話終日乃曰吾近鑿一井水甚甘乃各飲一杯竟不設席其人鄙嗇如此蜀禱機張眼視錢馬援平交趾上言太守蘇定張眼視錢呼牒切日討賊怯於戰功宜加切勑後定果下獄東觀漢記羊元群宛陵人漢桓帝時罷北海郡贓污狼藉郡舍有溷軒制作奇巧亦載以歸河南尹李膺表按其罪元群厚賂宦官膺竟反坐輸作左校出鑑李盛為蜀郡守貪財重賦國人刺之曰盧鵲何諠諠有吏來在門披衣出門應府記欲得錢華陽國志交州刺史朱符多以鄉人虞褒劉彥之徒分作長吏侵虐百姓彊賦於民黃魚一枚收稻一斛百姓怨叛山賊並出攻州突縣吳志薛綜傳東門奐歷吳郡濟陰太守所在貪濁謠曰東門奐取吳半吳不足濟陰續魯國先賢傳商則仕廩丘尉性廉縣令丞多貪因宴會舞令丞舞皆動手尉則回身而已令問其故則曰長官動手贊府亦動手惟有一箇又動手百姓何容活耶人皆大笑嘲曰令丞俱動手縣尉止回身裴啟語林單衣石勒參軍周雅為館陶令盜官絹數百疋下獄後每設大會使與俳兒著介幘絹單衣優問曰汝為何官在我俳中曰本館陶令計贓三千數單衣曰致坐是耳故入輩中以為大笑趙書宋該字宣弘為右長史太祖會群僚以該性貪故賜布百餘疋令負而歸重不能勝至僵頓以愧辱之燕書殷仲文性貪吝多納貨賄桓玄為劉裕所敗仲文隨玄西走其珍寶玩好悉藏地中皆變為土晉書庾炳之字仲文領選頗通貨賄諸見人有物鮮或不求聞劉遵考有材便乞材見好燭盤便復乞之劉伯龍大慷慨仲文所行有人送張幼緒語人吾雖得一縣負錢三十萬荀萬秋嘗詣仲文逢一客姓夏侯主人問有好牛不言無問有好馬不又言無政有佳驢耳仲文便答甚是所欲客出門遂相聞索之在尚書令奴沽酃酒利其百十亦是立臺閣所無宋書止云仲文謝朏孝武初為吳興以鷄卵賦人收鷄數千及遁節不全為清議所少南史齊武帝賾為太子時性貪惏常謂人曰惟王惠景知我貧嘗至其益州刺史劉悛宅晝臥覺悛自捧金澡盤面廣三尺愛姬執金澡罐受四升以充沃盥因以奉賾納之魏島夷傳劉悛為益州貪暴刻剝至富浴盆以金為之餘物稱是事露齊王貰死禁錮終身鑑梁臨川王蕭宏性愛錢百萬為一聚黃牓標之千萬為一庫懸一紫標如此三十餘間帝與他卿屈指計見錢三億餘萬餘屋貯布絹絲綿漆蜜紵蠟朱沙黃屑雜貨但見滿庫不知多少晉財有錢神論豫章王綜以宏貪吝遂為錢愚論其文甚切帝知以激宏宣與與綜天下文章何限那忽作此雖令急毀而流布已遠宏深病之聚斂稍改南史白劫元修乂為齊州刺史在州多受納累遷吏部尚書及在銓衡唯事貨賄授官大小皆有定價時中散大夫高居者有旨先敘去黨郡缺居遂求之修義私已許人抑居不與居大言不遜修義命左右牽曳之居對大眾呼天唱賊人問居曰白日公庭安得有賊居指修義曰比坐上者違天子明詔物多者得官京師白劫此非大賊乎修義失色居行罵而出北史魏右衛將軍元暉與侍中盧昶皆有寵於魏主而貪縱時人謂曰餓虎將軍饑鷹侍中暉尋選吏部尚書用官皆有定價大郡二千疋次郡下郡減其半餘官皆有等差選者謂之市曹通鑑不將宮來魏河間嗣王琛字曇寶世宗時拜定州刺史憑恃內外多所受納貪惏之極及還朝靈太后詔曰琛在定州惟不將中山宮來自餘無所不致何可更復敘用由是遂廢于家後以金寶巨萬計賂劉騰得為秦州刺史充都督既總軍省求欲無厭百姓患害有甚虎狼魏書元慶智安州刺史法壽子也性貪鄙為太尉主簿事無大小得物儀後判或十段誠或二十誠得便取之府中號為十錢主簿北史宇文述貪鄙知人有珍異之物必求取之富商大賈皆恩接之呼之為兒隋書賜繩江王元祥高祖子也高宗時歷金鄜鄭三州刺史性貪鄙多聚金寶營求無厭為人吏所患時滕元王嬰蔣王惲虢王鳳亦稱貪暴有授得其府官者以北嶺南惡處為之語曰寧向儋崖振白不事汪滕蔣虢舊唐滕王嬰蔣王惲皆不能廉慎文帝賜諸玉帛各五十惟不及二王勑曰滕叔蔣兄自解經紀不勞賜物與之繩萬條以為錢貫二王大慚朝官莫不自勵皆以取受為贓污有終身為官莫敢犯者僉載益州新昌縣令夏侯彪之初下車問里正曰鷄子一錢幾顆曰參顆彪之乃遣取十千錢令買三萬顆謂里正曰吾未要且寄鷄母抱之遂成三萬頭鷄經數月長成令便與我賣却一鷄三十錢半年之間成三萬又問竹笋一錢幾莖一錢五莖又取十千錢付之買得五萬莖謂里正曰吾未須笋且林中養之至秋竹成每一莖十錢遂成五十萬其貪猥不道皆此類僉載汴州刺史王志愔飲食精細對賓下脫粟飯商客有一騾日行三百里曾三十千不賣市人報價云四千愔曰四千金少更增一千又令買單絲羅疋至三千愔問用幾兩絲對曰五兩愔令豎子取五兩絲來每兩別與十錢手功之直僉載鄭愔為吏部侍郎掌選贓汙狼籍有選人繫百錢於靴帶上愔問何故荅曰當今之選非錢不行愔默然不言僉載翹關負鼎崔湜為吏部侍郎掌銓有選人引過自訴云某能翹關負鼎湜曰若壯何不兵部選荅曰外人皆云崔侍郎下有氣力者即得僉載鄭仁凱為蜜州刺史有少奴告以履穿凱曰阿公為汝經營耶有頃門夫著新鞋著凱廳前樹上有鴷啄木也窠遣門夫上樹取其子門夫晚鞋而緣之凱令奴著鞋而去門夫徒跣訴之仁凱曰刺史不是守鞋人僉載江夏李色之為海州也日本國使至海州凡五百人載國信有十船珍貨數百萬邕見之舍於館厚給所湏禁其出入夜中盡取所載而沉其船既明諷所館人白云昨夜海潮大至日本國船盡漂失不知所在於是以其事奏之勑下邕令造船十艘善水者五百人送日本使至其國邕既具舟及水工使者未發水工辭邕邕曰日本路遙海中風浪安能却返前路任汝便宜從事送人喜行數日知其無備夜盡殺之遂歸邕有好客養亡命數百人所在攻劫事露則殺之後竟不得死且坐其酷濫也紀聞宮中所無福建鹽錢院官盧昂坐贓三十萬簡辭按之於其家得金床瑟瑟枕大如斗昭愍見之曰此宮中所無而盧昂為吏可知也舊唐簡辭按鞠累月乃得以進召市人估之或云寶無價或云美石非真瑟瑟也國史補衛中行自福察有贓流於播州會赦北還死於播之館置於臼塘中南地送死無棺槨之具稻熟時理米鑿木若小舟以為臼土人呼為臼塘南部新書薛逢吉在中書除吏多納貨賄市權鬻官謗者謹飭鳳翔李永吉初朝京師逢吉以永吉故秦王從曮子家世王侯當有奇貨使人告永吉許以一州而求其先王玉帶永吉以無為解逢吉乃使人市一玉帶直數千緡責永吉償之前客省使王筠自晉末使楚至是還逢吉意筠得楚王重賂遣人求之許以一州筠怏怏以其橐裝之半獻之而皆不得州五代史孟蜀眉州刺史申貴殘虐聚歛諭獄吏令賊徒引富民為黨以納其賂常指獄門曰此吾家錢窟被訴下獄責維州司戶至犀浦賜死民家相賀蜀禱杌錢罏九國志王魯為當塗宰頗以資產為務會部民連狀訴主簿貪賂於縣尹魯乃判曰汝雖打草吾已驚蛇其為好事者口實焉南唐近事趙在禮之在宋州也所為不軌百姓苦之一旦遷制移鎮永興百姓欣然相賀曰此人若去可謂眼中拔釘子何快哉在禮聞之怒欲報拔釘之謗遽上表更求宋州一年時朝廷姑息勳臣詔許之在禮於是命吏藉管內戶口不論主客每歲一千納之於家號曰拔釘錢莫不公行督責有不如約則加之鞭朴雖租賦之不若也是歲獲錢百萬五代史補魏王徐知訓為宣州帥苛政歛下百姓苦之因入覲賜宴伶人戲作綠衣大面胡人若神鬼狀突然而出傍一人問曰何為者綠衣人對曰吾宣州土地神也問汝來何為曰王入覲和地皮掠來故某因至於此上大笑南唐近事張崇帥廬州好為不法士庶苦之常入覲江都廬人幸其改任皆相謂曰渠伊必不復來矣崇復歸乃計口索渠伊錢明年又入覲盛有罷府之議人不敢指實道路相見皆捋鬚相慶崇歸又徵捋鬚錢嘗因燕次一伶人假為死者被譴當作水族陰吏請於主者主者判云焦湖百里一任作獺崇因大慚上西京留守同平章事王守恩性貪鄙導事聚歛喪車非輸錢不得出城下至抒廁行丐之人不免課索或縱麾下令盜人財有富室娶婦守恩與俳優數人往為賀客得銀數鋌而返通鑑後漢隱帝開寶中神泉縣令張某者新到官外以廉潔自矜內則貪黷自奉其例甚多一日自榜縣云某月某日是知縣生日門示門外與給使諸色人不得輒有獻送有一曹吏與眾議曰宰君明言生辰日意令我輩知也言不獻送謙也眾曰然至日各持縑獻之命曰續壽衣宰一無所拒感領而已復告之曰後月某日是縣君生日更莫將來無不嗤者得之於神泉進士黃鳳時王嵒以鷺鶿詩諷之云飛來疑似鶴下處欲尋魚㝡為中的該聞錄宋禮部員外王子韶修說文畢作進書表以示同舍龐元英云前漢藝文志稗官之說亦自可用有一士人遽云富丞相曾用此故事眾問其故曰貪以敗官舉坐笑之文昌雜錄薛吉不厲清節守汾州有納聚之響猶言有聚納聲也海錄高遵貪酷之響帝頗聞之魏書衛鞅內刻刀鋸之刑外深斧鉞之誅步過六尺者有罰棄灰於道者被刑一日臨渭水而論囚七百餘人渭水盡赤號哭之聲動於天地新序郅都遷為中尉是時民樸畏罪自重而都獨先嚴酷政行法不避貴戚列侯宗室見都側目而視號曰蒼鷹本傳甯成事景帝好氣為少吏必陵其長為人上操下急如束濕猾賊任威本傳成家居上欲以為郡守公孫宏曰臣居山東為小吏時成為濟南都尉其治如狼牧羊成不可令治民上乃拜成為關都尉歲餘關吏稅肄郡國出入關者號曰寧逢乳虎無直甯成之怒義縱傳義縱為定襄太守縱至掩定襄獄中重罪二百餘人及賓客昆弟私入相視者亦二百餘人縱一切捕鞠曰為死罪解脫是日皆報殺四百餘人郡中不寒而栗猾民佐吏為治是時趙禹張湯為九卿矣然其治尚寬輔法而行縱以鷹擊毛鷙為治上嚴延年少學法律為涿郡太守吏皆股弁道不拾遺選河南太守冬月傳屬縣囚會論府上流血數里河內號曰屠伯張敞以書喻之延年報曰莠盛苗穢不可不除延年母從東海來欲從延年臘適見報囚母大驚母畢正臘謂延年天道神明不可獨殺我不意當老見壯子被刑戮也行矣去女東歸除掃墳地耳後歲餘果敗本傳茍悕為青州刺史多置參佐轉易守令以嚴刻立功日加斬戮流血成川人不堪命號曰屠伯及弟純代領青州刑殺更甚於晞百姓號小茍酷於大茍晉書尹賞字子心成帝時選守長安令修治長安獄穿地方深各數丈致令辟為郭以大石覆其口名為虎穴收輕薄少年惡子劾以為通行飲食群盜賞親閱見十置一其餘盡以次內虎穴中百人為輩覆以大石數日一發視皆相枕藉死漢書李嚴為都護用法深刻人歌之曰難可狎李鱗甲江表傳羊聃元帝時遷廬陵太守剛克麤暴恃國戚縱恣尤甚睚眦之嫌輒加刑殺疑郡人簡良等為賊盜二百餘人誅及嬰孩所髡鏁復百餘庾亮執之歸於京都罪當死以羊后是其祖姑應入議成帝詔曰此書古今所無何入議之有有賜命獄所羊后入殿叩頭請命王導為啟原之除名頃之遇疾恒見簡良等為祟旬日而死晉書殺具苻捷凶淫暴虐常彎弓露刃以見朝臣鉗錘鋸鑿所可為殺人之具備置左右即位未幾自公卿以下至於僕隸殺五百餘人晉中興書載記苻生事郭黁略地之際王孫八人年幼悉隨乳母先在東苑黁遂盡投王孫於鋒刃之上或肢分節解飲血盟眾覩者無不掩目寒心而黁意氣修然涼州記赫連勃勃凶殘好殺常居城上置矛劍於側有所嫌忿手自戮之群臣忤視者毀目笑者決脣諫者截其舌而斬之崔鴻夏錄宗越御眾嚴酷好行刑誅睚眥之間動用軍法時王玄謨御下亦少恩將士為之語曰寧作五年徒不逢王玄謨玄謨猶尚可宗越更殺我宋書大明中奚顯度常使主領人功而苛虐無道動加捶撲暑雨寒虐不聽暫休人不堪命或有自經死者人役聞配顯度如就刑戮時建康縣考囚或用方材壓及踝民間謠曰寧得建康壓雒不能受奚度拍又相戲曰勿反顧付奚度其酷暴如此前廢帝嘗戲云顯度刻虐為百姓所疾比當除之左右因倡諾即日宣旨殺焉時人北之孫皓殺岑昏上宋孝武帝時蕭惠開明識過人嘗三千沙門一閱其名退無所失拜益州刺史嚴用威刑蜀人號曰臥虎南史董宣為洛陽令京師號為臥虎後漢書拳擊木人汝陽太守王道標下縣作木人二枚高八尺豎着郡門有犯事者使拳擊木人令倒倒者免罪力弱者手拳傷剝元嘉起居注汝南王悅好讀佛經覽書史後絕房中而更好男色輕忿妃妾至加捶撻同之婢使孝昌中除州司牧為大剉碓置於州門盜者便欲斬其手姦偷畏之而蹔息魏書羊祉字靈祐魏宣武帝時自當官不憚強禦朝廷時有檢覆每令出使然好慕刑名頗為深文所經之處人號天狗下及出將臨州並無恩潤兵人患其嚴虐北史魏書段乂雲酷暴殘忍非人理所及為家尤甚子姓僕隸恒瘡痍徧體李彪為中尉號為嚴酷以姦款難得乃為木手擊其胸腋氣絕而復屬者時有焉又慰喻汾州叛胡得其兇渠皆鞭面殺之及彪病體上往往創潰痛毒備極北史魏宋飜為河陰令縣舊有大枷時人號曰彌尾青及飜為縣上吏請焚之飜曰且置於南墻下以待豪家後內監楊小駒詣縣請事辭色不遜命取彌尾青以鎮之於是威振京師本傳谷楷眇一目而性甚嚴忍前後奉使皆以酷暴為名時人號曰瞎虎魏書盧裴字子章性殘忍以強斷知名齊天保中京畿詔獄酷濫非人情所為無問事之大小拷掠過度於大棒車幅下死者非一或嚴冬至寒置囚於冰雪之上盛夏酷熱暴之日下枉䧟人至死者前後百餘伺察官人罪失動即奏聞朝士見之莫不重跡屏氣皆目之為校事裴與李庶俱鞭杖死獄中北史魚贊俱羅弟也性凶暴虐其部下令左右炙肉遇不中意以籤刺瞎其眼溫酒不適口者立斷其舌隋書燕榮隋文帝時除幽州總管嚴酷有威容鞭笞左右動至千數流血盈前飲噉自若嘗按部道次見叢荊堪為笞箠命取之輒以試人人或自陳無咎榮曰後有罪當免及後犯細過將撾之人曰前日被杖許有罪宥之榮曰無過尚爾况有過邪榜捶如舊北史元宏嗣文帝時為幽州總管每鞫囚多以酢灌鼻或椓弋其下竅無敢隱情姦偽屏息上趙仲卿性粗暴文帝時遷朔州總管時塞北盛興屯田仲卿總統之微有不理者仲卿輒召主掌撻其胸背或解衣倒懸於荊棘中時人謂之於菟上生羅剎或和思斷獄囚無問善惡貴賤必被枷鎖杻械困苦備極囚徒見者破膽喪魂號生羅剎其妻前後孕男女四人臨產即悶絕求死所生男女皆著肉鏁手腳並有肉杻束縛連絆墮地後為縣令坐法杖死廣記大業中有卒酷暴諸囚後生一子肩上有若肉枷無頸五行記崔宏度性嚴酷為襄州總管吏人戰栗時有屈突蓋者亦嚴刻長安為之語曰寧飲三斗醋不見崔宏度寧炙三斗艾不逢屈突蓋蓋兄通為左衛將軍涖官勁正時語曰寧食三斗葱不逄屈突通隋書湯德幹歷刺史立威人語曰寧食三斗炭不逢湯德幹唐書噉人隋末荒亂狂賊朱粲起於襄鄧間歲飢米斛萬錢亦無得處人民相食粲乃取嬰兒蒸而噉之因令軍士曰食之美者寧過於人肉乎但令他國有人我何所慮即勒所部有略得婦人小兒皆烹之分給軍士乃稅諸城堡取小弱男女以益兵糧後遣使請降高祖令段磪迎勞之磪因醉侮粲曰聞卿噉人作何滋味粲曰若噉嗜酒之人正似糟藏猪肉磪怒慢罵曰狂賊入朝後一頭奴耳更得噉人乎粲懼於坐收磪及從者數十人奔於王世充舊唐洛州都督竇太穆皇后三從兄性剛嚴好殺為益州行臺僕射多殺將士其部眾無貴賤少長不恭命即立斬之每日吏士多被鞭撻流血滿庭見者莫不重足股栗軌初入蜀將其甥以為心腹嘗夜出呼之不以時至怒而斬之每誡家僮不得出外嘗遣奴就官廚取漿而悔之謂奴曰我誠使汝要當斬汝頭以明法耳遣其部將收奴斬之其奴稱冤監刑者猶豫未決軌怒俱斬之行臺郎中趙宏安知名士也軌動輒榜箠歲至數百上又害行臺尚書韋雲起貞觀二年在洛病甚忽言有人餉我瓜來左右報之冬月無瓜軌曰一盤好瓜何謂無耶既而驚視曰非瓜並是人頭軌曰從我償命又曰扶我起見韋尚書言畢而死廣記周唐革命將相陰謀非其父兄即其子弟往往事洩多被論告差使推勘獲實即酬官賞由是告密之輩推覈之徒因相誣搆共行深刻新開揔監之內洛州牧院之中遞成秘獄互為峻網塞窗墐戶麤杖大枷追攝掩捉匪朝伊夕炬火圍宅刀棒闌門苦楚拷掠非承不放來俊臣既便決雲𢎪嗣亦手刃張處勗郭𢎪霸傳李思徵之首王𢎪義亦梟毛玄素之元朝野屏氣道路以目通典則天稱制懼天下不服欲制以威漸引酷吏務令深文以案刑獄時周興來俊臣等相次受制推究大獄乃於都城麗景門內別置推事院俊臣推勘必獲專令俊臣等按鞫亦號為新開門但入新開門者百不全一王𢎪義戲謂麗景門為例竟門言入此門者例皆竟也上來俊臣傳十枷來俊臣每鞫囚無問輕重多以醋灌鼻禁地牢中或盛之瓮以火圍遶炙之兼絕其糧餉至有抽衣絮以噉之者其所作之大枷凡有十號一曰定百脈二曰喘不得三曰突地吼四曰著即承五曰失魂膽六曰實同反七曰反是實八曰死猪愁九曰求即死十曰求破家又令寢處糞穢備諸苦毒每有制書寬宥囚徒俊臣必先遣獄卒盡殺重罪然後宣示上志後俊臣將羅告武氏諸偽王及太平公主張易之等遂忠發之則天屢保持而諸武及公主恐懼共毀之乃棄市國人無少長皆怨恨競剮其肉斯須而盡則天降勑曰來俊臣諸王等磐石宗枝必期毀敗南北衙文武將相咸擬傾危宜加赤族之誅以雪蒼生之憤既族之無問士庶男女相慶於道路咸曰自此後臥乃背得着床不爾朝不謀夕矣御史臺記人爭抉目擿肝醢其肉湏臾盡以馬踐其骨無孑遺唐酷吏傳周興拷縛罪人有仙鶴曬翅胡孫碾茶鬼曳鑽牛拔橛之名時人呼為牛頭夜乂談賓錄僉載作牛頭阿婆索使周推事使元索禮時人號為索使太后得告密者輒令元禮等推之競為訊囚酷法或以椽關手足而轉之謂之鳳凰曬翅或以物絆其腰引枷向前謂之驢駒拔橛或使跪捧枷累甓其上謂之仙人獻果或使立高木之上引枷尾向後謂之玉女豋梯或倒懸石縋其首或以醋灌鼻或以鐵圈轂其首而加楔至有腦裂髓出者每得囚輒先陳其械具以示之皆戰栗流汗望風自誣僉載通鑑索元禮以酷毒轉甚則天收人望而殺之天下之人謂之來索言酷毒之極又首按制獄也載初元年十月周矩上疏諫曰頃者小人告訏習以為常推劾之吏皆以深刻為功鑿空爭能相矜以虐泥耳籠頭枷研揳總摺脅籤爪懸髮薰耳臥鄰穢溺曾不聊生號為獄持或累日節食連宵緩問晝夜搖撼使不得眠號曰宿囚此等既非木石且救目前茍求賒死本傳王宏義每暑月繫囚必於小房中積蒿而施氈褥遭之者斯湏氣絕矣茍自誣引則易於他房與俊臣常行移牒州縣慴懼自矜曰我之文牒有如狼毒野葛也舊唐書郭宏霸嘗推芳州刺史李思懲栲捶考禁不勝而死聖曆中屢見思徵甚惡之嘗因退朝遽歸命家人曰速請僧轉經設齋湏臾見思徵從數十騎上其廷曰汝枉䧟我我今取汝霸周章惶怖援刀自刳其腹斯湏蛆爛矣是日閭里亦見兵馬數十騎駐於門少頃不復見矣上時洛陽橋壞行李弊之至是而成自春大旱至霸死雨足則天嘗問群臣比在外有所好事舍人張元一素滑稽對曰外有三慶旱降雨一慶中橋新成萬代之利二慶郭霸身死百姓皆歡三慶也天后笑曰霸見憎如此耶二唐書俱載稍略侍御史萬國俊令史出身殘忍為懷楚毒是務奏六道使誅斬流人殺害無數後從臺出至天津橋南有鬼滿路遮截馬足不得前進口云叩頭緩我連聲忍痛俄而據鞍舌長數尺遍身青腫輿至宅夜半而卒三豹監察御史李嵩李全交殿中王旭京師號為三豹嵩為赤黧豹交為白額豹旭為黑豹皆恨虐憕刻每訊囚必鋪棘臥削竹籤指方梁壓踝碎瓦搘膝遣作獮猴鑽火上麥索下闌單人不聊生囚皆乞死京人相要作呪曰若違心負教橫遭三豹其毒害也如此僉載御史李全交等以羅織為業臺中號為人頭羅剎殿中王旭號為鬼面夜乂上御史魏靖上言曰臣聞郭宏霸自刺而唱快萬國俊被遮而遽亡霍獻可臨終膝拳於項李敬仁將死舌至於臍皆眾鬼滿庭群妖橫道惟徵集應若響隨聲備在人謠不為虛說唐志左史江融耿介正直揚州徐敬業反被羅織酷吏周興等枉奏殺之斬於東都都亭驛前融將被誅請奏事引見興曰囚何得奏事融怒叱之曰吾無罪枉戮死不捨汝遂斬之尸乃激揚而起蹭蹬十餘步行刑者踏倒還起坐如此者三乃絕雖斷其頭似怒不息無何周興死僉載楊務廉孝和時奏開陜州三門鑿山燒石巖側施棧道牽船河流湍急牽船夫皆令其繫二鈲於胸皆落棧著石百無一存道路聲號悲動山谷皆稱揚務廉為人妖天生此妖以破殘百姓上開元九年有王鈞為洛陽尉十八年有嚴安之為河南丞皆性毒虐笞罰人畏其不死皆杖訖不放起湏其腫憒徐乃重杖之懊血流地苦楚欲死鈞與安之始眉目喜暢故人吏懾懼舊唐上御五鳳樓酺宴觀音樂隘不得奏金吾白梃如宣語不能遏上患之高力士奏河南丞嚴安之為理嚴為人所畏請使止之上從之安之以手板繞塲畫地曰犯此者死於是盡三日人指其畫以相戒無敢犯者通鑑玄宗吉溫性禁害果於推劾李林甫將起刑獄除不附已者引之於門與羅希奭同鍛鍊詔獄時稱羅鉗吉網惡其深刻也舊唐吉溫之按楊慎矜侍御史盧鉉同其事鉉先與張瑄同臺情旨素厚貴取媚於權臣誣瑄與楊慎矜共解圖讖持之為驢駒拔橛以成其獄及被貶為廬江長吏在郡忽見瑄為祟乃云端公何得來乞命不自由鉉湏臾而卒上敬羽肅宗時為監察御史以苛刻見委任作大枷有鱉新作尾榆著即悶絕又臥囚於地以門關輾其腹號為肉飥掘地為坑實棘刺以敗席覆其上領囚臨坑訊之必墜其中萬刺攢之及嗣薛王珍潛謀不軌詔羽鞫之羽召支黨羅於廷索鱉榆枷之布拷訊之具以繞之信宿成獄珍坐死上敬羽與毛若虛在臺若虛眉毛覆於眼其性殘忍五六年間臺中囚繫不絕又有裴昇畢曜同為御史皆酷毒人之䧟刑當時有毛敬裴畢之稱裴畢尋又流黔中羽寶應元年貶為道州刺史尋有詔殺之上肅宗收復兩都崔器為三司使性刻樂禍陰忍寡恩希旨深文奏䧟賊官陳希烈達奚珣等數百人皆抵死李峴執奏乃以六等定罪上後為御史大夫上元元年病腳腫月餘漸函瞑目即見達奚珣但口稱叩頭大尹不自由左右問之良久荅曰達奚尹訴冤我求之如此經三月不止而死談賓錄建中中李希烈攻汴州城未䧟驅百姓婦女及輜重以實濠塹謂之濕稍傳載襄陽人善為漆器天下取法謂之襄樣及于司空為帥多暴鄭元鎮河中亦暴遠近呼為襄祿節度國史補王悅為𥂕厔鎮將軍士犯令杖而枷之百日乃脫未及百日而脫者有三我死則脫爾死則脫天子之命則脫由是秋毫無犯上王悅為唐昌令殺錄事李之而不辜之既死長子作靈語曰王悅不道枉殺子予必報其聲甚厲經數日悅晝坐廳事忽拳歐其腰聞者殷然驚顧無人既暮擊處即腫焉且痛其日李之男又言曰吾已擊王悅正中要害處即當殺之悅疾甚則至蜀郡謁醫不愈未死之前日李之命其家造數人饌仍言曰吾與三人至蜀郡錄王悅食畢當行明日悅死而悅腫潰處正當右腎即李之所為也紀聞蜀李匡遠為少府監性巖刻一日不斷刑則慘然不樂常聞捶楚之聲謂人曰此吾一部肉鼓吹臨終曰吾平生殺數十僧道以此享壽八十二及葬盜伐其墓斷其四肢及殘刑之報也外史檮杌劉銖漢高祖時為永興軍節度使用法亦自為刻深民有過者問其年幾何對曰若干即隨其數杖之謂之隨年杖一人必兩杖俱下謂之合歡杖又增民租畝出錢三十以為公用民不堪之五代史燒錢灼臂錢惟濟字巖夫仁宗時知定州有婦人待前妻子不仁至燒銅鐵灼臂惟濟取婦人所生兒置雪中械婦人往視見死其慘毒多此類宋史韓縝字玉汝神宗時知秦州嘗宴客夜歸指使傳勍被酒誤隨入州宅與侍妾遇縝怒令軍校以鋏褁杖箠殺之勍妻持血衣撾豋聞鼓以訴坐落職分司南京秦人語曰寧逢乳虎莫逢玉汝上李稷字長卿神宗時為陜西轉運使秦民作舍道傍者創使納侵街錢一路擾怨與李察皆以苛暴著稱時人語曰寧逢黑殺莫逢稷察張竦為劉嘉作奏曰今天下聞劉崇之反也咸欲搴衣手劍而叱之其先至者則拂其頸衝其胸刃其軀切其肌後至者欲撥其門仆其墻夷其屋焚其器應聲倒地則時成創而宗社尤甚言必切齒焉何則以其背畔恩義而不知重德之所在也王莽傳郭霸初舉集召見于則天前自陳忠鯁云往年征徐敬業臣願抽其筋食其肉飲其血髓其髓則天悅拜殿中侍御史時人號為四其御史舊唐和士開母喪託附者咸往奔哭鄴中富商丁鄒嚴興等並為義孝有一士人亦在哭限封孝琰入弔出謂人曰嚴興之南丁鄒之北有一朝士號呌甚哀聞者傳之士開知而大怒北史和士開用事人多附之有一人士曾參士開病醫者云湏服黃龍湯士開有難色參曰此湯甚易王不湏疑惑請先嘗之一舉而盡士開深感其意為之強服遂得汗病愈續世說嗅膿趙元楷為交河道行軍大總管時侯君集為元帥君集馬病蚛顙元楷以指霑其膿而嗅之以諛君集為御史所劾左遷括州刺史談賓錄太宗嘗指一樹下曰此嘉樹宇文士及從而美之不容口太宗正色謂之曰魏徵嘗勸我遠佞人我不悟佞人為誰矣意常疑汝而未明也今及果然士及叩頭謝曰南衙群臣面折廷事陛下常不舉手今臣幸在左右若不少順從陛下雖貴天子復何聊乎太宗怒乃解大唐新語武后有疾詔遍祭神廟以祈福消災閻朝隱詣少室山時為給事中因親撰祝文以身代犧沐浴伏於俎盤令僧道迎至神所觀者如堵會后疾愈特加賞賫左司郎中張元一畫代犧圖以進后大笑雖厚賜然亦鄙其為人易齋笑林郭宏霸再遷右臺侍御史大夫魏元忠病僚屬省候宏霸獨後入憂見顏間請示便液即染指嘗驗疾輕重賀曰甘者病不瘳今味苦即當愈矣喜甚元忠惡其媚暴語于朝舊唐天后時張岌謟事薛師掌擎黃幞隨薛師後于馬旁伏地承薛師馬鐙侍御史郭霸嘗來俊臣糞穢宋之問捧張易之溺器並偷媚取容實名教之罪人也僉載太子少保薛稷雍州長史李晉中書令崔湜蕭至忠岑義等皆外飾忠鯁內藏謟媚脅肩屏氣而䑛痔折肢阿附太平公主十月三日家破身戮上趙履溫為司農卿折支勢族䑛痔權門謟事安樂公主為公主奪百姓田園造定昆池言定天子昆明池也用庫錢百萬億斜褰紫衫為公主背挽金犢車險詖皆此類誅逆韋之際上御承天門履溫詐喜舞蹈稱萬歲上令斬之刀劍亂下與男同戮人割一臠骨肉俱盡上張說前為并州刺史謟事特進王毛仲餉致金寶不可勝數後毛仲巡邊會悅于天雄軍大宴酒酣恩勑忽降授兵部尚書同中書門下三品說拜謝訖便把毛仲手起舞嗅其靴鼻上將軍高力士特承玄宗恩寵遭母喪左金吾大將軍程伯獻少府監馮紹正二人直就力士母喪前披髮而哭甚於已親朝野聞之不勝其笑上省疾涕泣成敬奇為大理正與姚崇有姻親崇嘗感疾敬奇造宅省焉對崇涕泣懷中置生雀數頭乃一一持出請手執而後放之祝云願令公速愈也崇勉從之敬奇既出崇惡其諛媚謂其子弟曰此淚亦從何而來自茲不復接遇唐新語御史臺記竇懷貞傾巧進用累遷晉州長史謟事中貴盡得其歡心韋庶人乳母王氏本蠻婢也懷貞聘之為妻封莒國夫人俗為妳母之聓曰阿㸙懷珍每因謁見及進奏表狀列其官次署日翊聖皇后阿㸙時人鄙之呼為㸙懷貞欣然其得韋庶人敗遂斬其妻持首其獻居憲臺及京尹每視事見無鬚者誤以為中官必曲加承接至有士人無鬚而懷貞誤為之禮者睿宗踐祚懷貞位極人臣道諛不悛以至放貶光天中玄宗戡內難懷貞投水死唐新語敬宗時李逢吉用事私怒龐嚴遠貶之於敖為給事中封還詔書時人以為觸宰相之怒以辨朋友之非辜其仁大矣及駁奏出乃是論貶嚴大輕中外無不大噱敖即遷工部侍郎通鑑杜邠公守揚州耽於游宴宣宗除崔鉉為代以詩送之曰一方獄市獲來蘇揚州押衙傳希聞御詩即教習來蘇隊舞以迎崔公杜頗銜之至歸洛每遇維揚人必問曰來蘇健否謂傳希金華子善佞大曆中荊州有馮希樂者善佞見人見鼠穴亦佞常到長林謁縣令留宴語令云仁風所感猛獸出境昨初入縣界虎狼相尾西去有項村吏來報昨夜有虎食人令戲詰之馮遽曰是必掠食便過得寶歌詞韋堅廣運潭成陜縣尉崔成甫作得寶歌詞白衣缺胯綠衫錦半臂偏袒膊紅羅抹額於第一舩作號頭唱之婦人百餘人和之續世說中書主簿滑渙與內官典樞密劉光琦相通宰相議事與光琦異同者令渙達意未嘗不遂所欲宰相杜佑鄭絪皆姑息之佑呼為滑八上崔元略戶部侍郎出於宣授時諫官有䟽指言內侍崔潭峻方有權寵元略以諸父事之元略上章自辯上詔荅云朕所命官奚恤人言然終不能逃父事內官之名上李輔國權盛宰相李揆山東甲族位居台輔見輔國執子弟之禮謂之五父上蘇循莊宗將即位張承業意未欲莊宗遽稱尊號人亦無敢贊成者循自河中來入衙城見府廨即拜謂之拜殿見莊宗即呼萬歲舞抃泣而稱臣翌日又獻大筆三十管謂之畫日筆莊宗大悅承業深惡之上鍾傳起於商販尤重學士諸葛浩因擇其行事赫赫者十條形於啟事以投之謂之十德啟凡五千字傳驚嘆每一字以一千錢酹之凡五千緡五代史補嘉祐中有王永年者娶宗女求舉于竇卞楊繪得監金耀門書庫永年嘗置酒延卞繪出其妻間坐妻以左右手掬酒以飲卞繪謂之白玉蓮花盃韓佗胄用事時其誕日高似孫獻詩九章每章用一錫字辛棄疾以詞贊其用兵則用司馬昭假黃鉞異姓真王故事宋史賈似道柄國時折漕朱浚每有劄子稟事必稱其萬拜覆時人謂之朱萬拜浚晦翁曾孫也蘇筆記曾子謂子思曰昔者吾從夫子巡守於諸侯夫子未嘗失人臣之禮而猶聖道不行今吾觀子有傲世主之心無乃不容乎子思曰時移世異人有宜也當吾先君周制雖毀君臣固位上下相持若一體然夫欲行其道不執禮以求之則不能入也今天下諸侯方欲力爭競招英雄以自輔翼此乃得士則昌失士則亡之秋也伋於此時不自高人將下吾不自貴人將賤吾舜禹揖讓湯武用師非故相詭乃各時也孔叢子田子方之魏魏太子從車百乘而迎之郊太子再拜謁田子方田子方不下車太子不說曰敢問何如則可以驕人矣田子方曰吾聞以天下驕人而亡者有矣以一國驕人而亡者有矣由此觀之則貧賤可以驕人矣夫志不得則授履而適秦楚耳安往而不得貧賤乎於是太子再拜而後退田子方遂不下車韓詩外傳趙壹字元叔恃才倨傲為鄉里所擯光和元年舉郡上計到京師是時司徒袁逢受計計吏數百人皆拜伏庭中莫敢仰視壹獨長揖而已逢望而異之令左右往讓之曰下郡計吏而揖三公何也對曰昔酈食其長揖漢王今揖三公何遽怪哉逢則歛衽下堂執其手延置上坐因問西方事大悅顧謂坐中曰此人漢陽趙元叔也朝臣莫有過之者吾請為諸君分坐坐者皆屬觀後漢十月朝黃祖在朦衝船上大會賓客設黍臛禰衡年少在坐黍臛至衡先自飽食都不顧眾賓唯舉摶以弄戲時江夏有張伯雲亦在坐調之曰禮教云何而食此正平不答弄黍如故祖曰處士不當答之也衡謂祖曰君子寧聞車前馬㩌祖呵之衡熟視祖罵曰死鍛錫公祖大怒令五伯將出欲杖之而罵不止遂令絞殺黃射來救無所復及悽愴流淚曰此有異才曹操及劉荊不殺大人奈何殺之祖曰人罵汝父作鍜錫公奈何其不殺別傳鍜錫范作死公云道張飛嘗就劉巴宿巴不與語飛遂忿恚葛亮謂巴曰張飛雖實武人敬慕足下主公今方收合文武以定大事足下雖天素高亮宜少降意也巴曰大丈夫處世當交四海英雄如何與兵子共語乎輔吳將軍張昭嘗對孫權論巴褊阨不當拒張飛太甚權曰若令子初與世沉浮容悅玄德交非其人何足稱為高士乎零陵先賢傳簡雍字憲和少與先主有舊隨從周旋為昭德將軍優游風儀性簡傲跌宕在先主坐席猶箕踞傾倚威儀不肅自縱適諸葛亮已下則獨擅一榻項枕臥語無所為屈蜀志鍾士季精有才理先不識嵇康鍾要於時賢儁之士俱往尋康康方大樹下鍛向子期為佐鼓排康揚槌不輟傍若無人移時不交一言鍾起去康曰何所聞而來何所見而去鍾曰聞所聞而來見所見而去世說嵇康與呂安善每一相思千里命駕安後來值康不在喜出戶延之不入題門上作鳳字而去喜不覺猶以為欣故作鳳字凡鳥也上安嘗從康或遇其行康兄喜拭席而待之弗顧獨坐車中康母就設酒食求康兒共語戲良久則去其輕貴如此干寶晉紀孫楚字子荊才藻卓絕爽邁不群多所陵傲缺鄉曲之譽後參石苞驃騎軍事楚既負其材氣頗侮易於苞初至長揖曰天子命我參卿軍事因此而嫌隙遂構初參軍不敬府主楚既輕苞遂制施敬自楚始也晉書馬曹王子猷作桓沖騎兵參軍蓬首散帶不綜知府事桓問曰卿何署答曰不知何署時見牽馬來似是馬曹桓又問官有幾馬答曰不問馬何由知其數又問馬北死多少答曰未知生焉知死世說慧業太守孟顗事佛精懇而為謝靈運所輕嘗謂顗曰得道應湏慧業丈人生天當在靈運前成佛必在靈運後顗深恨此言又與王宏之諸人出千秋亭飲酒倮身大呼顗深不堪遣信相聞靈運大怒曰身自大呼何礙癡人事南史謝超宗為南郡王中軍司馬人問曰承有朝命定是何府超宗怨望答曰不知是司馬為是司驢既是驢府政應為司驢為有司奉以怨望免禁錮十年上張敷永初初遷秘書郎嘗在省直中書令傅亮貴宿權要聞其好學過候之敷臥不即起亮怪而去宋書江夏王義恭就文帝求一學義沙門會敷赴假還江陵入辭文帝令以後車載沙門往謂曰道中可得言晤敷不奉詔曰臣性不耐雜上甚不悅南史王融假還鄉詣王儉別儉立此地舉袂不前融亦舉手呼儉曰歜曰王前儉不得已趨就之融曰使融不為慕勢而令君為趍士豈不善乎常歎云不恨我不見古人所恨古人又不見我融與吏部尚書何戢善往詣戢誤通尚書劉澄下車入門乃曰非是至戶望澄又曰非是既造席賜澄曰都自非是乃去其為異如此上王贍字明遠負氣傲俗好貶裁人物仕宋為王府參軍嘗謁劉彥節直登榻曰君侯是公孫僕是公子引滿促膝唯余二人彥節不悅續世說黃門郎路瓊之太后之兄慶之之孫也與王僧達鄰居盛束服以謁僧達僧達不與語謂曰身昔門下駿路慶之者是君何親遂焚瓊之所坐床太后怒涕泣訴於孝武帝帝曰瓊之年少無事謁王僧達見辱乃其宜爾上蕭子顯自負才氣為吏部尚書見九流賓客不與交言但舉扇一撝而已衣冠竊恨上卞延之為上虞令有剛氣會稽太守孟嚴以令長裁之積不能容脫幘投地曰我所以屈者政為此幘爾今已投之卿矣卿以一世勳門而傲天下國士拂衣而去上延之彬父也續世說作彬誤朱异輕傲朝賢不避貴戚人或誨之异曰我寒士也遭逢以至今日諸貴皆恃枯骨見輕我下之則為蔑尤甚我是以先之上劉孝綽仗氣負才多所凌忽每於朝集會同公卿間無所與語反呼騶卒訪道途間事上吳興吳規頗有才學邵陵王綸引為賓客深相禮遇及綸作牧郢藩規隨從江夏遇張讚出之湘鎮路經郢服綸餞之南浦纘見規在坐意不能平忽舉盃曰吳規此酒幸汝得陪今宴規尋其還其子翁孺見父不悅問而知之翁孺因氣結爾夜便卒規恨纘慟兒憤病兼至信次之間又致殞規妻深慟夫子翌日又亡時人謂張纘一盃酒殺吳氏三人其輕傲皆此類也上鮑泉為通直侍郎嘗乘高隱車從數十繖蓋服玩甚精道逢國子祭酒王承承疑非舊貴遣訪之泉從者答曰鮑通直承怪焉復欲辱之遣逼車問鮑通直復是何許人而得如此都下少年遂為口實見尚豪華人相戲曰鮑通直復是何許人而得如此以為笑謔上不與鴈行庾蓽子喬為荊州別駕時元帝為荊州刺史而州人范興話以寒賤仕叨九流選州主簿又以皇太子令及之故元帝勒喬聽興話到職及屬元日府州朝賀喬不肯就列曰庾喬忝為端右不能與小人范興話為雁行元帝聞乃進喬而停興話羞慚還家憤卒上陳暄慶之子也文才逸俊嗜酒無節陳太康中徐陵為吏部尚書精簡人物搢紳之士皆嚮慕焉暄以玉帽簪插髻紅絲布褁頭袍拂踝靴至膝不陳爵里直上陵坐陵不之識命吏持下暄徐步而出舉止自若竟無怍容作書謗陵陵甚病之後主即位侍遊宴為狎客甚親昵而輕侮之嘗倒懸於渠臨之以刃而傲弄轉甚後主稍不能容遂縛艾為帽加於其首火以爇之然及於髮垂泣求哀而弗之釋柳莊矯赦之敕引出經數日暄發悸而死上崔瞻字彥通性簡傲以才地自矜所與周旋皆一時名望在御史臺恒宅中送食備盡珍羞別食獨食處之自若有一河東人士姓裴亦為御史伺贍食便往造焉瞻不與交言又不命匕筯裴坐觀瞻食罷而退明日自攜七筯恣情飲噉瞻謂曰我初不喚君食亦不共君語遂能不拘此節昔劉毅在京口冒請鵝炙豈亦異是君定名士於是每與之同食北史崔鑣字岐叔少與范陽盧思道同志友善每以讀書為務負恃才地大署其戶曰不讀五千卷書者無得入此室為散騎常侍聘陳還以聾常得無事一醉輒八日越國公楊素時方貴幸重鑣門地為子玄縱娶其女為妻聘禮甚厚親迎之始公卿滿坐素令騎迎之儦敝衣冠騎驢而至素推令上坐儦禮甚倨言又不遜素忿然拂衣而起竟罷坐後數日儦方來謝素待之如初詔授易州刺史或言其未合乃追停儦語人曰易州刺史何必勝道義上鄭世翼弱冠有盛名數以言辭忤物稱為輕薄時崔信明矜其門第頗蹇傲自伐多所凌轢常賦詩吟嘯自謂文章獨步過於李百藥世翼遇諸江中謂之曰嘗聞楓落吳江冷信明欣然示有餘篇世翼覽之未終曰所見不如所聞投之於江信明不能對擁楫而去舊唐王績性簡傲刺史崔喜請相見曰奈何坐召嚴君平耶杜之松請講禮曰吾不能揖讓邦君門新唐杜審言甫之祖也恃才蹇傲為時輩所嫉乾封中蘇味道為天官侍郎審言預選試判訖謂人曰味道必死人問其故審言曰見吾判自當羞死矣又嘗謂人曰吾之文章合得屈宋作衙官吾之書跡合得王羲之北面其矜誕如此舊唐續世說乾封作登封何氏語林因之俱誤替人杜審言與李嶠崔融蘇味道為文章四友將死時語宋之問武平一曰吾在久壓公等今且死固大慰但恨不見替人新唐鄭仁表泊之子也文章尤稱俊拔然恃才傲物人士薄之自謂門第人物文章俱美嘗曰天瑞有五色雲人瑞有鄭仁表劉鄴少時投於泊仁表兄弟嗤鄙之咸通末鄴為宰相仁表竟貶死南荒上宣皇好微行溫庭筠遇於逆旅溫不識龍顏傲慢而詰之曰公非長史司馬之流帝曰非也又曰得非六參簿尉之類帝曰非也謫為方城尉北夢瑣言羅隱恃才傲物落第契闊東歸黃寇事平朝賢議欲官之韋貽範沮之曰某曾與之同舟而載雖未相識舟人告云此有朝官羅曰是何朝官我腳夾筆可以敵得數輩必若豋科通籍吾徒為粃糠也由是不果召上天中記卷二十八
