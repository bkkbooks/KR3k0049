body:
  text: 封爵五等之制始於黃唐郡縣之治創自秦漢故設官分職所以輕其任也並建五長所以弘其治也五等諸侯論三光易曰伏羲氏之王天下也爵有五等以法五行也或三等者法三光也白虎通重民王者立三公九卿二十七大夫足以教道照幽隱必復封諸侯何重民之至也善惡比而易知故擇賢而封之使治其民以著其德極其才上以尊天子備蕃輔下以子養百姓施行其道開賢者之路謙不自專故列土封賢因而象之象賢重民也上王者即位先封賢者憂民之急也故列土為疆非為諸侯張官設府非為卿大夫皆為民也封諸侯以夏何陽氣盛養故以封諸侯盛養賢也封立人君陽德之盛者也上受命之王致太平之美群臣上下之功故盡封之乃中興征伐大功皆封所以褒大功也盛德之士亦封之所以尊有德封者必試之為附庸三年有功因而封之五十里凡士有功者亦為附庸失其位大夫有功成封五十里卿成封七十里公成封百里上諸侯封不過百里象雷震百里所潤雲雨同也雷者陰中之陽也諸侯象也諸侯比王者為陰南面賞罰為陰法雷也上公爵有五等公者無私也故文背私為公環濟要略伯能移善于眾與百姓同謂之公周書什名云公貢也才德兼於人人咸貢薦于王而用之也辨曰公直也取其正直無私也字從入從厶人音背厶古私字背厶則為公韋昭辨釋名入猶皆也厶姦衺也韓非曰蒼頡作字自營為私背私為公說文公之為言公正無私也白虎通爵位盛大以無私為德者公也孟子正乂立制及眾曰公謚法侯能樹名生物與天道俱謂之侯侯能成群謂之君周書侯侯也所以守藩也援神責侯者候也候順逆也白虎通執應入方曰侯謚法斥候於外以君人為德者侯也正乂伯胄子成人能治上官謂之士士率眾時作謂之曰伯周書伯把也持政事也要略伯者長也白也言其咸建五長功實明白也風俗通體人足以長人者伯也正乂子子猶孳孳恤下之稱也要略子者孳也孳孳無已也白虎通子字也字養也而其德足以養人者故曰子也正乂男男任也任治政事受王命為君也要略男任也任安也而其德足以安人者故曰男也正乂太史公曰殷以前尚矣周封五等公侯伯子男然封伯禽康叔於魯衛地各四百里親親之義真有德也太公於齊兼五侯地尊勤勞也武王成康所封放百而同姓五十地上不過百里下三十里以輔衛王家史記百官表注記曰王者之制公侯伯子男凡五等上大夫卿下大夫上士中士下士凡五等周室興隆三聖制法立爵五等封國八百親親建國則周公宅魯康叔啟衛賢賢表德則太公封齊去五等爵春秋鄭莊公封母弟於京祭仲曰都城過制國之害也其後卒相攻伐國內大亂故過度則有強臣之禍鄙小則有微弱之憂秦以列國之勢而并天下自以由諸侯而起之也於是去五等之爵而置郡縣雖有親子母弟皆為匹夫及其政衰一夫呼而天下去及至漢家見亡秦以孤特亡也於是大封子弟或連城數十廓地千里自關已東皆為王國力多而權重故亦有七國之難袁子漢雜事曰天子太社以五色土為壇封諸侯者取其土苴以白茅授之各有所封方之色以立社於其國故謂之受茅土漢興惟皇子封為王者得茅土其他臣以戶賦租入為節不受茅土不立社功臣封侯東觀漢記曰上封功臣皆為列侯大國四縣餘各有差博士丁恭等議曰古帝王封諸侯不過百里故利易建侯取法於雷上曰古之亡國皆以無道未嘗聞封功臣地多而滅也夜行至國武王已平商而王天下封師尚父於齊營丘東就國道宿行遲逆旅之人曰吾聞時難得而易失客寢甚安殆非就國者也太公聞之夜衣而行犂明至國萊侯來伐與之爭營丘史世家太公封於齊宿於逆旅主人晨起有一人謂曰客寢甚甘殆非就國者也太公蹶起即路俄有追者至以其出關遂止獨異志鄭桓公東會封於鄭暮舍於宋東之逆旅同說苑十三呂太公望封於齊周公旦封於魯二君者甚相善也相謂曰何以治國太公望曰尊賢上功周公旦曰親親上恩太公望曰魯自此削矣周公旦曰魯雖削有齊者亦必非呂氏也其後齊日以大至於霸二十四世而田成子有齊國魯公以削至於覲存三十四世而亡呂長見魯公伯禽之初受封之魯三年而後報政周公周公曰何遲也伯禽曰變其俗革其禮喪三年然後除之故遲太公亦封於齊五月而報政周公周公曰何疾也曰吾簡其君臣禮從其俗為也及後聞伯禽報政遲乃歎曰嗚呼魯後世其北面事齊矣史記齊之所以不如魯者太公之賢不如伯禽伯禽與太公俱受封而各之國三年太公來朝周公問曰何治之疾也對曰尊賢先䟽後親後仁也此霸者之迹也周公曰太公之澤及十世五年伯禽來朝周公問曰何治之難對曰親親者先內後外先仁後義也此王者之迹也周公曰魯之政及十世故魯有王迹者仁厚也齊有霸迹者武政也齊之所以不如魯也太公之賢不如伯禽也說苑辛寬見魯繆公曰臣而今而後知吾先君周公之不若太公望封之知也昔者太公望封於營丘之東山其山高險固之地也是故地日廣子孫彌隆吾先君周公封於魯無山林谿谷之險諸侯四時以達是故地日削子孫減殺辛寬出南宮括入見公以語南宮括對曰寬少者弗識也君獨不聞成王之定成周之說乎其辭曰惟余一人營居于成周惟余一人有善易得而見也有不善易得而誅也故曰善者得之不善者失之古之道也夫賢者豈欲其子孫之阻山林之險以長為無道哉小人哉寬也固妄誹訾豈不悲哉呂長利辛擽見魯穆公曰周公不如太公之賢也周公擇地而封曲阜太公擇地而封營邱爵土等其地不若營邱之美人民不如營邱之眾不徒若是營邱又有天固穆公心慚不能應也辛櫟趨而出南宮邊子入穆公具以辛櫟之言語南宮邊子南宮邊子曰昔周公王之卜居成周也其命龜曰予一人兼有天下辟就百姓敢無中土乎使予有罪則四方伐之無難得也周公卜居曲阜其命龜曰作邑乎山之陽賢則茂昌不賢則速亡季孫行父之戒其子也曰吾欲室之俠於兩社之間也使吾後世有不能事上者使其替之益速如是則曰賢則茂昌不賢則速亡安在擇地而封哉或示有天固也辛櫟之言小人也說苑昔者太公望周公旦受封而見太公問周公何以治魯周公曰尊尊親親太公曰魯從此弱矣周公問太公曰何以治齊太公曰舉賢賞功周公曰後世必有劫殺之君矣後齊日以大至於霸二十四世而田氏代之魯日以削二十四世而亡猶此觀之聖人能知微矣詩曰惟此聖人瞻言百里韓詩外傳無驕士成王封周公周公辭不受乃封周公子伯禽於驕士辭去周公戒之曰去矣子其無以魯國驕士矣我文王之子也武王之弟也今王之叔父也又相天子吾於天下亦不輕矣然嘗一沐而三握髮一食而三吐哺猶恐失天下之士吾聞之曰德行廣大而守以恭者榮土地博裕而守以儉者安祿位尊盛而守以卑者貴人眾兵強而守以畏者勝聰明睿智而守以愚者益博聞多記而守以淺者廣此六守者皆謙德夫貴為天子富有四海不謙者先天下亡其身桀紂是也可不慎乎故易曰有一道大足以守天下中足以守國家小足以守其身謙之謂也夫天道毀滿而益謙地道變滿而流謙鬼神害滿而福謙人道惡滿而好謙是以衣成則缺袵宮成則缺隅屋成則加錯示不成者天道然也易曰謙亨君子有終吉詩曰天降不遲聖敬日躋其戒之哉子其無以魯國驕士矣說苑敬慎成王封伯禽為魯公召而告之曰爾知為人上之道乎凡處尊位者必以敬下順德規諫必開不諱之門撙節安靜以藉之諫者勿振以威毋格其言博采其辭乃擇可觀夫有文無武無以威下有武無文民畏不親文武俱行威德乃成既成威德民親以服清白上通巧佞下塞諫者得進忠信乃畜伯禽再拜受命而辭上君道成王與唐叔虞燕居援梧葉以為珪而授唐叔虞曰余以此封女叔虞喜以告周公周公以請曰天子其封虞邪成王曰余一人與虞戲也周公對曰臣聞之天子無戲言天子言則史書之工誦之士稱之於是遂封叔虞于晉周公旦可謂善說矣一稱而令成王益重言明愛弟之義有輔王室之固呂重言史作史佚見親王三公參天子坐而議政無不總統故不以一職為官後世宰相兼三公之事玉海三台六星兩兩而居起文昌列抵太微一曰天柱三公之位也在人曰三公在天曰三台主開德宣符也晉書三台一名三能天文錄鄭司農云三能三階也三台六星西近文昌二星曰上台為司命次一星曰中台為司中東二星曰下台為司祿所以昭德塞違也晉志三台一名天柱上台司命為太尉中台司中為司徒下台司祿為司空武陵太守星傳三公在天為三台九卿為北斗三公象五岳九卿法四年三十七大夫法山陵八十一元士法谷阜合為帝佐以匡綱紀春秋漢含孳三公者司空司馬司徒也司馬主天司空主土司徒主人故陰陽不和四時不節星辰失度災變非常則責之司馬山陵崩竭川谷不流五榖不植草木不茂則責之司空君臣不正人道不和國多盜賊下怨其上則責之司徒故三公典其職憂其分舉其辨明其隱此三公之任也韓詩外傳論道之官三公論道之官蓋以佐天子理陰陽平邦國無所不統故不以一職名其官六典三公者謂太師太傅太保也師王所尊也傳助王事保安也保王身也凡此皆內與王論道中參六官之事三公者象鼎三足共承其上也環濟要略五星順行異官同爵共立別職與人隆化幽贊神明者謂之太尉和五教理人倫使風行俗平萬國咸寧者謂之司徒使無國枉禮法錯刑清事均民聚者謂之司空若仁義之路開升平之氣通則五星順行庶績咸熙古今通語太師太傅太保為三公訓護天子導以德義天子加拜待以不臣之禮非人則闕矣漢制保傅在三公上號曰上公自後常然宋書明由曉升級必育受稅俗成博受古諸隕丘受延嬉右燧人四佐燧人出天四佐出洛論語摘輔象金提主化俗鳥明主建福視默主災惡紀通為中賦仲起為海陸陽侯為江海右伏羲六佐六佐出世風后受金法天老受天籙五聖受道級知命受糾俗窺紀受變復地典受州絡力墨受準斥右黃帝七輔州選舉翼佐帝德上配三台黃帝以風后配上台天老配中台五星配下台謂之三公其餘知天地規紀地典力牧常先封胡孔甲等或以為師或以為將帝王世紀三公擬三台黃帝以風后云配下台陶氏職官要錄黃帝置三公之秩以親黎元晉志昔者黃帝得蚩尤而明於天道得太常而察於地利得奢龍而辨於東方得祝融而辨於南方得太封而辨於西方得后土而辨於北方黃帝得六相而天地治神明至蚩尤明乎天道故使為當時大常察乎地利故使為廩者奢龍辨乎東方故使為土師祝融辨乎南方故使為司徒大封辨乎西方故使為司馬后土辨乎北方故使為李管子五行通典奢龍作蒼龍易通卦驗云天地成位君臣道生君有五期輔有三名注三名公卿大夫政教君臣起自人皇之世至伏羲因之故文耀鉤云伏羲作易名官者也論語撰考云黃帝受地形象天文以制官伏羲已前雖有三名未必具立官位至黃帝名位乃具周禮疏九佐顏斶云堯有九佐戰國策堯之佐九人禹皋稷契夷垂益夔龍淮南子赤龍負圖以出河見堯典太尉舜等百二十年集發藏大麓春秋運斗樞堯坐舟中與太尉舜臨觀鳳皇授圖合誠圖堯三公堯之治天下也舜為司徒契為司馬禹為司空注三公之官文子高陽氏才子八人蒼舒隤敳檮戭六臨龍降庭堅仲容叔達謂之八愷高辛氏才子八人伯奮仲堪叔獻李仲伯虎仲熊叔豹季貍謂之八元舜臣堯舉八愷使主后土以揆百事莫不時序地平天成舉八元使布五教于四方內平外成舜舉十六相去四凶有大功二十而為天子左十八契夔契為司徒百姓和親夔主賓客遠人必至典略尚書刑德放勳曰益為司馬咼為司徒禹為司空聖帝即位三公象三能矣刑德放五丞顏斶曰舜有七友禹有五丞湯有三輔戰國策湯問伊尹曰古者所以立三公九卿大夫列士者何也伊尹對曰三公者所以參五事也九卿者所以參三公也大夫者所以參九卿也列士者所以參大夫也故參而有參是謂事宗事宗不失外內若一說苑湯問伊尹曰三公九卿大夫列士其相去何如伊尹對曰三公者知通於大道應變而不窮辨於萬物之情通於天道者也其言足以調陰陽正四時節風雨如是者舉以為三公故三公之事常在於道也九卿者不失四時通於溝渠隄防樹五榖通於地理者也能通不能通能利不能利如此者故以為九卿故九卿之事常在於德也大夫者出入與民同眾取去與民同利通於人事行猶舉繩不傷於言言之於世不害於身通於關梁實於府庫如是者舉以為大夫故大夫之事常在於仁也列士者知義而不失其心事功而不獨專其賞忠政疆諫而無有姦詐去私立公而言有法度如是者舉以為列士故列士之事常在於義也故道德仁義定而天下正凡此四者明王臣而不臣湯曰何謂臣而不臣伊尹對曰君之所不名臣者四諸父臣而不名諸兄臣而不名先王之臣臣而不名盛德之士臣而不名是謂大順也上中輔諸侯外蕃三公為中輔春秋演孔圖今尚書夏侯歐陽說天子三公一曰司徒二曰司馬三曰司空九卿二十七大夫八十一元士凡百二十在地為山川古周禮說天子立三公曰太師太傅太保無官屬與王同職故曰坐而論道謂之三公又立三少以為之副曰少師少傅少保是謂三孤家宰司徒宗伯司馬司寇司空是謂六卿之屬大夫士庶人在官者凡萬二千石臣謹案周公為傅召公為保太公為師周公太公無為司徒司空文知師保傅三公官名也五帝三王不同物此周之制也許慎五經異義古周禮說天子無爵三公無官昌號於天何爵之名參職於天子何官之稱上天設三光以照記天子立公卿以明治故曰公卿者四海之表儀神化之丹青也上有輔明主之事下有遂聖坐之事和陰陽調四時安眾庶育群生使百姓輯睦無怨思之色四夷順德無叛逆之憂此公卿之職而賢者之所務也若伊尹周召三公之才太顛閎夭九卿之人鹽鐵論淮南齊俗日月之所照誋此記字誤殷時有阿衡伊摯佐之太甲改為保衡皆三公官也有三少少師少傅少保是謂三孤副助三公者也孤者不掌官桀然孤特環濟要略後漢朱祐馬武傳論或任以阿衡之地阿倚也衡平也記曰虞夏商周有師保有疑丞設四輔及三公不必備惟其人語使能也禮記古者天子必有四鄰前曰疑後曰丞左曰輔右曰弼天子有問無以對責之疑有志而不志責之丞可正而不正責之輔可揚而不揚責之弼其爵視卿其祿視大國之君尚書大傳明堂之位曰篤仁而好學多聞而道慎天子疑則應問而不窮者謂之道道者導天子以道者也常立於前是周公也誠立而敢斷輔善而相義者謂之充充者充天子之志常立於左是太公也潔廉而切直匡過而諫邪者謂之弼弼者拂天子之過者也常立於右是召公也博聞強記接給而善對者謂之承承者承天子之遺忘者也常立於後是史佚也故成王中立而聽朝則四聖維之是以慮無失計而舉無過事大戴保傳道者有疑則問或謂之疑充者輔善或謂之輔注周成王幼在襁褓之中召公為太保周公為太傅太公為太師保保其身體傅傅其德義師導之教訓此三公之職也於是為置三少皆上大夫也曰少保少傅少師是與太子宴者也大戴周禮建外朝之法左九棘孤卿大夫位焉群士在其後右九棘公侯伯子男位焉群吏在其後面三槐三公位焉州長眾庶在其後三公一命衮若有加則賜也不過九命春秋九命作伯尊公曰宰言於海內無不宰統焉通典雨無正大夫刺幽之也三事大夫莫肯夙夜箋三公也書周官王曰嗚呼三事暨大夫敬爾有官漢書韋玄成詩於赫三事匪俊匪作又云三事惟囏莫我肯矜三吏晉侯使鞏朔獻齊捷於周王使委于三吏左成二三吏三公也曲禮云五官之長曰伯其擯于天子也曰天子之吏鄭玄曰謂三公也注疏秦悼武王二年始置丞相官以樗里疾甘茂為左右丞相史記應劭曰丞承也相助也高祖定天下置丞相以統文德立大司馬以整武事為二府焉物理論車千秋代劉屈釐為丞相封富民侯千秋無他材能術學又無伐閱功勞特以一言寤意旬月取宰相封侯世未嘗有也後漢使者至匈奴單于問曰聞漢新拜丞相何用得之使者曰以上書言事故單于曰茍如是漢置丞相非用賢也妄一男子上書即得之矣漢書丞相丙吉病自上臨問曰君有不諱誰可代者吉曰西河太守杜延年廷尉于定國太僕陳萬年此三人皆在臣右惟上察之後三人居位皆稱職皆稱吉知人同上柱石田延年謂霍光曰將軍為國柱石何不建白大后更選賢而立之光傳前丞相王商者內行篤有威重位歷將相國家柱石臣也其人守正不肯詘節隨鳳委曲為鳳所罷身以憂死眾庶愍之元後傳陸凱疏曰宰相國之柱也不可不彊是故漢有蕭曹之佐先帝有顧步之相吳志王尊劾奏丞相匡衡御史大夫張譚位三公典五常九德以總方略壹統類廣教化美風俗為職知石顯等專權擅勢不時白奏無大臣輔政之義本傳成帝時何武為九卿建言古者民樸事約國之輔佐必得賢聖然猶則天三光備三公官各有分職宜建三公官定卿大夫之任分職授政以考功效本傳蕭望之奏三公非其人則三光為之不明今首歲日月少光咎在臣等本傳王莽秉政專權彭宣上書言三公鼎足承君一足不任則覆亂美實臣年齒老耗昏亂遺忘願乞骸骨竢寘溝壑本傳永平六年王雒山出寶鼎詔曰鼎象三公豈公卿奉職得其理邪後紀丞相官缺群臣多舉翟方進上亦器其能遂擢為丞相方進智能有餘兼通文法吏事以儒雅緣飭法律號為通明相本傳夫以韓安國翟方進之操為漢之明宰然猶不能振一貧賢薦一孤士又汎其下者乎後朱穆傳元始中賜馬策策曰入稱四輔出備三公四輔之職為國維綱三公之任鼎足承君不有鮮明固守無以居位本傳自孝武興學公孫弘以儒相其後蔡義韋賢玄成匡衡張禹翟方進孔光平當馬宮及當子晏咸以儒宗居宰相位服儒人冠傳先王語其醞藉可也然皆持祿保位被阿諛之譏彼以古人之迹見繩烏能勝其任乎匡衡等傳贊哀帝策免師丹曰夫三公者朕之腹心也啟善相過匡率百僚和合天下者也朕既不明委政於公腹心如此謂疏者何殆謬於二人同心之利焉將何以率示群下附親遠方本舊制州牧奏二千石長吏不任位者事皆先下三公光武時用明察不復委任三府而權歸刺舉之吏朱浮上疏曰即位以來不用舊典信刺舉之官黜鼎輔之任後傳崔琰從弟林少無名望雖姻族猶多輕之而琰常曰此所謂大器晚成者也終必遠至涿郡孫禮盧毓始入軍府琰又名之曰孫疏亮亢烈剛簡能斷盧清警明理百鍊不消皆公才也後林禮毓咸至鼎輔魏志仲長說昌言法誡篇云光武矯枉過直政不任下雖置三公事歸臺閣自此以來三公之職備員而已政有不理猶加譴責策免又中世之選三公也務於清謹慎循常習故者是婦女之檢束鄉曲之常人耳惡足以居斯位邪執既如彼選乂如此而欲望三公勳立於國家績加於生民不亦遠乎後本傳胡廣自在公台三十餘年歷事六帝禮任甚憂其所辟命皆天下名士與故吏陳蕃李咸並為三司蕃等每朝會輒稱疾避廣時人榮之上郎顗拜帝曰三公上應台階同元首政失其道則寒陰反節而今之在位競託高虛選舉牧守委任三府本陳忠疏薦劉愷曰臣聞三公上則台階下象山岳股肱元首鼎足居職恊和陰陽調訓五品考功量才以序庶僚遭烈風不迷遇迅雨不惑位莫重焉而今上司缺職未議其人往者孔光師丹近世鄧彪張酺皆去宰相復序上司誠宜簡練卓異以猒眾望愷傳三九郎顗七事曰刳舟剡楫將欲濟江海也聘賢選佐將以安天下也昔唐堯在上群龍為用文武創德周召作輔是以能建天地之功增日月之耀者也陛下踐祚以來勤心眾政而三九之位未見其人是以災害屢臻四國未寧本孫皓每於會因酒酣輒令侍臣嘲謔公卿以為笑樂萬彧既為左丞相王蕃嘲或曰魚潛於淵出水照沬何則物有本性不可橫處非分也彧出自谿谷羊質虎皮虛受光赫之寵跨越三九之位犬馬猶能識養將何以報厚施乎彧曰唐虞之朝無謬舉之才造父之門無駑蹇之質蕃上誣明選下訕楨幹亦何傷於日月適多見其不知量耳吳錄運動樞極順帝之世梁商稱為賢輔夫宰相運動樞極感會天人中於道則易以興政乖於物務則難乎御物本傳論象極李固奏記梁商理王龔曰夫三公尊重承天象極未有詣理訢冤之義上國禎三公國之禎幹朝廷取正以成斷金大司農李固公族之苗忠正不撓有史魚之風其以固為太尉漢官義太尉劉虞讓位於羊續靈帝時為三公者皆輸禮錢千萬續奉褞袍以示之曰臣之所有唯此而已遂不代虞袁山松後漢中興以後居台相總權衡多矣其能以任職取名者豈非先遠業後小數哉故惠公伏湛造次急於鄉射之禮君房侯霸入朝先奏寬大之令伏湛等論傳上司楊震為太尉每諫爭中常侍樊豐等譖之收印綬遣歸本郡到城西夕陽都亭顧謂子及門生曰吾蒙恩居上司姦臣狡猾而不能誅嬖女傾亂而不能禁帑藏空虛賞賜不節而不能實何面目復見日月遂飲醜而死東觀漢記名公賢宰楊秉字叔節為太尉奏中常侍侯覽具瑗曰鄭詹來而國亂四佞放而眾服若斯之人非恩所宥書奏尚書召對秉掾屬問故事秉使對曰漢世故事三公之職無所不統尚書不能詰嘗從容言曰我有三不惑酒色財也本天下稱為名公張璠漢紀陳蕃楊秉世稱賢宰王暢李膺彌縫衮闕左雄傳論楊賜卒策曰司空賜華岳所挺九德純備三葉宰相輔國以忠五登衮職弭難乂寧本延光之間震為上相抗直方以臨權枉先公道而後身名可謂懷王臣之節識所任之體矣累葉載德繼踵宰相信哉積善之家必有餘慶先世韋平方之蔑矣論漢興惟韋平父子至宰相前書韋賢子玄成樂當子晏楊氏載德仍世柱國震畏四知秉去三惑賜亦無諱彪誠匪忒楊震贊上衮牟融經明才高明帝數嗟嘆以為才堪宰相明年為司空舉動方重甚得大臣節本傳牟公簡帝身終上衮上贊晉司徒闕武帝問其人於荀最荅曰三公具瞻所歸不可用非其人昔魏文帝用賈詡為三公孫權笑之別傳詡文帝初即位首登上司魏略任天地人太康七年正旦日蝕詔公卿大臣各上封事咎其安在汝南王亮與司徒魏舒司空衛瓘上言三司之任天地人也乾道不普故水旱為災人倫失序故奸穴不禁乃者荊州之城妖災仍興任城國都水流變赤延三朝之始日有蝕之孟陽節過堅冰未消臣等瑣才聽優高位可謂小人而乘君子之器宜就顯戮以答天意謹免官徒跣上所假章綬夫陰陽失序朕于天道刑政失中之所致也其使冠履勿復道八王故事摯虞隴王為太尉冊曰朕惟君行為時表親則宗臣論道經邦保乂皇家是用進登上台君其上清三元下寧九域永正其範以康濟宇宙敬哉上武帝詔曰三司之任以翼宣皇極弼成土事者也故經國論道賴之明喆裴秀思心通遠勳德茂著宜正位居體以康庶績其以秀為司空晉書武帝詔以鄭袤為司空曰宜登三階之曜補衮職之闕遣國坦就第拜授袤謂坦曰魏以徐景山為司空吾時為侍中受詔譬旨徐公語吾曰三公當上應天心茍非其人實傷和氣不敢以垂死之年累辱朝廷也終於不就遵大雅君子之迹可不務乎上光飪鼎實懷帝以劉寔為太尉固辭不許劉坦上言曰古之哲王莫不師其元臣崇養老之教厲廉高之風太尉寔國之碩老邦之宗模年踰九十命在日制聖詔必使正位上台光飪鼎實臣謂宜聽所守上時三導郗鑒庾亮相繼薨殂朝野憂懼以陸玩德望乃拜司空玩辭讓不獲乃嘆息謂朋友曰以我為三公是天下無人矣時人以為知言別傳玩拜司空有人詣之索美酒得便自起瀉箸梁柱間地祝曰當今乏才以爾為柱石之用莫傾人棟梁笑曰戢卿良箴世說風流宰相王儉字仲寶丹陽尹袁粲聞其名及見之曰宰相之門也栝柏豫章雖小已有棟梁氣矣終當任人家國事儉作解散幘斜插簪朝野慕之相與放效儉常謂人曰江左風流宰相惟有謝安蓋自汛也南史茹法亮呂文度並勢傾天下太尉王儉常謂人曰我雖有大位權寄豈及茹公上華林宴集使各效伎藝王敬則脫朝服𥘵以絳紏髻奮臂拍張故動左右上不悅曰豈聞三公如此荅曰臣以拍張故得三公不可忘拍張時以為名荅上豫章王嶷永明初啟上曰叨授台首心魂如失臣窮生如浮質操空素任居鼎右已移氣序南齊明帝顧命群公而意寄多在江祐兄弟永元初江兄弟及始安王遙光尚書令徐孝嗣領軍蕭坦之更日帖勑時呼為六貴皆宰相也上祐傳梁武使張弘策陳計於王懿曰昔晉惠庸主諸王爭權遂內難九興外寇三作今六貴爭權人握王憲制始安欲為趙倫形迹已見蹇人上天信無此理祐怯而無斷暄弱而不才折鼎覆餗翹足可待蕭坦之胸懷猜忌動言相傷徐孝嗣才非柱石聽人穿鼻若隙開舋起必中外主崩梁紀南史紀弘策陳計語在懿傳懿傳無之載弘策傳中英宰臨戎元渠時殄滅大啟南康爰登中鉉職雖職輕于衮司而任隆于百辟暫冲職改授朝端王儉禇淵碑晉穆宗昭曰實錄英疏淵謀晉中興書謝石疏曰尸素朝端忽焉五載上惠帝詔曰揔百揆之得夫管王政之開塞端右之職也其以王戎為尚書令上郭祚以尚書右僕射領太子少師祚曾從聿東宮明帝幼祚持一黃㼐出之時應詔左右趙桃弓與御史中尉王顯迭相脣齒深為帝所信祚私事之時人謗祚者號為桃弓僕射黃㼐少師北史來恒及第濟相次知政事時以為榮初濟父護兒居陼為猛將而恒濟俱以學行見稱時虞世南子昶既無才術歷將作少匠工部侍郎累居工作之司濟初升相位許敬宗歎曰士之登庸不繫世業履道則為衣冠失緒則為匹庶來護兒兒作宰相虞世南男作木匠忠賢文武固無種也舊唐自武德已來稱賢相者房杜姚宋四公皆遭無賴子弟汙圮先業張說二字均垍務束夫節賊庭非獨燕國之不幸也上蘇味道前後居相位數載竟不能有所發明但脂韋其間茍度取容而已嘗謂人曰處事不欲決斷明白若有錯誤必貽咎譴但摸稜以持兩端可矣時人由是號為蘇摸稜上盧懷慎與紫徵令姚崇對掌樞密懷慎自以為吏道不及崇每事皆推讓之時人謂之伴食宰相玄宗善八分書凡命將相皆先以御札書其名置案上會太子入侍上舉金甌覆其名以告之曰此宰相名也汝庸知其誰耶肅宗拜而稱曰非崔琳盧從愿乎上曰然因舉甌以示之乃賜巵酒是時琳與從愿皆有宰相望玄宗將倚為相者數矣竟以宗族繁盛而記者眾卒不用柳氏舊聞景龍三年蘇瓌除尚書右僕射時公卿大臣初拜官者例計獻食名曰燒尾瓌因侍內宴將作大匠宗晉卿謂曰拜僕射竟不燒尾豈不善邪帝默然瓌奏曰臣聞宰相者主陰陽助天理物今粒食踊貴百姓不足臣見宿衛兵至有三日不得食者臣愚不稱職所以不敢燒尾談賓錄李林甫性沉密城府深阻苞藏安忍時已寢疾猶扶疾從幸華清宮數日增劇巫言一見聖人差減帝欲視之左右諫止乃勑林甫出於庭中上登降聖閣遙視舉紅巾招慰之林甫不能興使人代拜於席翌日尋卒舊唐玄宗幸蜀裴士淹從駕馬上商較當時卿相士淹曰姚元之如何上曰才而健者也宋璟如何答曰賢而泥者也論及數十人皆當其目末問李林甫如何上曰妬賢嫉能古今無比士淹曰若此陛下如之何委用如是之深也上俛首而無言獨異志天寶賊陷兩京玄宗西幸肅宗即位明皇馬上看除目顧裴士淹曰有新相士淹問為誰上曰房琯然亦不是滅手士淹曰陛下不須言之上小慚支田錄鎮楊綰字公權元載伏誅綰拜相綰久積公輔之望及詔出朝野相賀綰素以德行著聞質性貞廉車服儉朴居廟堂未數月人心自化御史中丞崔寬劍南四川節度使寧之弟家富於財有別墅在皇城之南池館臺榭當時第一寬即日潛遣毀拆中書令郭子儀在邠州行營聞綰拜相座內音樂減散五分之四京兆尹黎幹以承恩每出入騶馭百餘亦即日減損車騎唯留十騎而已其餘望風變奢從儉者不可勝數其鎮俗移風若此綰凡所知友皆一時名流或造之者清談終日未嘗及名利或有客欲以世務于者見綰言必玄遠不敢發辭內愧而退大曆中德望日崇天下雅正之士爭趨其門至有數千里來者以清德坐鎮雅俗時比之楊震邴吉山濤謝安之儔也舊唐史臣曰楊綰入相數日遽致移風易俗周召伊傳簫張房杜歷代為相之顯者蔑聞斯道也嘗讀諸集賞善多溢美書罪多溢惡如楊綰拜相之麻贈官之制改諡之詔則當時秉筆者無媿色矣上盧杞自新州員外司馬除澧州刺史給事中袁高以杞邪佞蠹政貶未塞責停詔執表遂授澧州別駕他日上謂李勉曰眾人皆言盧杞姦邪朕何不知卿知其狀乎李勉對曰天下皆知其姦邪獨陛下不知所以為姦邪也時人多其正直上帝嘗從容言盧杞清介敢言然少學不能廣朕以古道人皆指其姦而朕不覺也李勉對曰陛下能覺杞之惡安致建中禍邪李揆和蕃顏真卿使希烈其害舊德多矣又楊炎罪不至死杞擠陷之而相關播懷光立功逼使其叛此欺天也帝曰卿言誠有之唐書張嘉貞子延賞延賞子弘靖三代掌書命在台座前代未有楊巨源贈詩曰伊陟無聞祖韋賢不到孫時稱其能與張家說家門因語錄劉禹錫曰官不前定何名真宰乎永徽中盧齊卿卒亡及蘇說見其舅李某為冥司判官有吏押案曰宇文融合為宰相舅曰宇文融豈堪為宰相吏曰大曹符已下數日多少即由判官舅乃判一百日既而拜宰相果百日而罷嘉話紗籠李藩字叔翰嘗寓東洛妻庶子崔謙女年近三十未有名宦多寄托崔氏待之不甚盡禮李患足瘡欲挈家居揚州甚愁悶迺詣中橋問卜胡蘆生生曰公在兩紗籠中豈畏此迍厄更遠亦可李問紗籠事終不復言遂往揚州居參佐橋左近有高員外素相善一旦來詣既去際晚又至云朝來看公歸困就寢夢見舊使庄客卒已十年某問汝安得在此曰為陰吏蒙差與李三郎當直知員外與三郎往還故此祗候某曰三郎安得如此曰是紗籠中人詰之不肯言特報此好消息李笑而謝之數年張建封鎮揚州奏為巡官會有新羅僧能相人言張不得為宰相因令使院看諸判官曰並無及李至僧降階迎謂張公曰巡官是紗籠中人僕射且不及張大喜因問紗籠事曰宰相冥司必潛以紗籠護之恐為異物所擾餘官則不得也方悟胡蘆生及高所說李公竟為相原化記逸史兩京記太和中崔紹暴死為所事一字天王救免復生云入一樓門滿壁悉是金榜銀榜備列人問貴人姓名將相二色名列金榜將相已下書列銀榜更有長鐵榜列州縣府僚屬姓名所見三榜之人悉是在世人若謝世者則隨所注落藉玄怪錄兩京記大和七年六月二十七日文宗欲拜德裕平章事已進麻詔曰命相絕是重事適看曆日日辰非佳且宣麻二十八日放下宣布獻替記凡拜相禮絕班行府縣載沙填路自私第至於子城東街名曰沙堤有服假問疾百僚就第有司設幕次排班元日冬至立仗大官皆備珂傘列燭有五六百炬謂之火城宰相火將至則皆撲滅以避國史補李德裕初作相罷京兆築沙堤兩街上朝衛兵本傳德裕初作相兩街使請准例每早朝令兵衛送予判云在具瞻之地自有國容當無事之時何勞武備衛送宜停獻替記李德裕自潤州年五十四除揚州五十八再入相皆及吉甫之年縉紳榮之感定錄令狐綯在相每朝廷大事一取決於子滈如元載之用伯和李吉甫之用德裕南部新書語林歇後作相光化初昭宗還宮庶政未愜鄭綮每形於詩告而嘲之中人或誦其語於上前昭宗見其激訐謂有蘊蓄就常奏班簿側注云鄭綮可禮部侍郎平章事中書胥吏㩜其家參謁綮笑而問之曰諸君大悞俾天下人並不識字宰相不及鄭五也胥吏曰出自聖旨特恩來日制下抗其手曰萬一如此笑殺他人明日果制下親賓來賀搔首言曰歇後鄭五作宰相時事可知矣舊唐光化中朱朴自毛詩博士拜相而朴恃其口辨謂可立致太平由藩王引導聞於昭宗遂有此命對之日而陳言數條每言臣必為陛下致之洎操大柄殊無所成自是恩澤日衰中外騰沸內宴日俳優穆刀綾作念經行者至前朗諷曰若見朱相即是非相翌日出宮北夢瑣言廢帝時馬徹孫為相臨事多不能決當時號為三不開謂其不開口以論議不開印以行事不開門以延士大夫也五代史徹孫入相親舊未嘗延接時號三不開相公入朝印不開見客口不開歸宅門不開紀異錄明宗入朝安重誨用事取謀于孔循舊相豆盧革韋說出官孔循不欲以河朔人入相極薦崔協而任圜爭之云崔協者少識文字時人呼為無字碑有李琪者學際天人奕代軒冕論才校藝可敵時輩百人讒夫巧沮忌害其能必捨李琪而相崔協如棄蘇合之丸取蛣蜣之轉也重誨笑而止然以孔循故終相之帝據馮書記先帝判官與物無競可以相矣由是道與協並命而捨李琪識者惜之北夢瑣言閣下生麻梁相國鄭玨與李相國愚同為學士忽一日鄭之閣下有一麻生李曰承旨入相矣指麻示之曰此天命也願得當制以盡荒虛時亢陽既久其麻益茂高丈餘若雨露之偏滋焉及霜降成實取而視之真白麻也是夜制出果鄭登庸而李復寓直得不為乾坤之命朋友之分乎鄭年十九赴舉凡十九年登第又十九年入相時人謂之三九相公李嘗居忽遇暴雨一廷俱為白沙公甚惡之及薨葬于伊闕得吉地于白沙里時人謂之白沙相公皆前定也駱中紀異愍帝即位有意於治數召學士問以時事以李愚為迂未嘗有所問廢帝亦謂愚等無所事常目宰相曰此粥飯僧爾以謂飽食終日而無所用心也五代史廢帝欲擇宰相問於左右左右皆言盧文紀及姚顗有人望廢帝因悉書清望官姓名內琉璃瓶中夜焚香咒天以筯挾之首得文紀欣然相之五代史晉相和凝少年時好為曲子詞布於汴洛洎入相專託人收拾焚毀不暇然相國厚重有德終為艷詞玷之契丹入夷門號為曲子相公馬徹孫用廣順中卒于洛陽其家婢有為徹孫語者初崔協為明宗相在位無所發明既死而有降語其家徹孫又然時人嘲之曰生而不能言死而後語云五代史王安石上元夕從駕乘馬入宣德門衛士訶止之策其馬安石怒上章請逮治御史蔡確言宿衛之士拱扈至尊而已宰相下馬非其處所應訶止帝卒為杖衛士斥內侍安石猶不平宋史王荊公罷相鎮金陵是秋江左大蝗有無名子題詩賞心亭曰青苗免役兩妨農天下嗟嗷怨相公惟有蝗虫感恩德又隨鈞斾過江東荊公一日餞客至亭上覽之不悅命左右物色竟莫知其為何人也王介甫先封舒公改封荊公詩曰戎狄是膺荊舒是懲識者云宰相不學之過也仇池筆記王珪神宗時自執政至相凡十六年無所建明率多諛順當時目為三旨相公以其上殿進呈云取聖旨上可否訖云領聖旨退諭稟事者云已得聖旨續編秦檜兩據相位凡十九年劫制君父包藏禍心倡和誤國忘讎斁倫一時忠臣良將誅鋤略盡競進之徒獻媚納交無所不至台州曾惇獻詩稱聖相靜江有驛名秦城知府呂愿中率賓僚共賦秦城王氣詩張扶請乘金根車又有乞置益國官屬及議九錫者檜聞之安然察事之卒布漸京城小涉譏議即捕治中以深文又陰結內侍及醫師王繼先伺上動靜郡國事惟中省無一至上前者每事與帝爭勝曹筠言水漲詔逐之檜陞為從官周葵欲言梁汝嘉檜不待帝言即改除之檜病帝幸其第問焉帝還宮命沈虛中革檜及熺制並令致仕檜既死帝謂楊存中曰朕今日始免防檜逆謀矣史鑑唐侍中中書令是真宰相餘以他官參掌者無定員但加同中書門下三品及平章事知政事參知機務參與政事及平章軍國政事之名者並為宰相亦漢行丞相事之例也舊制宰相常於門下省議謂之政事堂至永淳三年十月中書令裴炎以中書執政事筆其政事堂合在中書遂移在中書省開元十一年張說奏改政事堂為中書門下通典古者重武官以善射者掌事故曰僕射僕射者僕役於射事也秦世有左右曹諸吏官無職事將軍大夫以下皆得加此官宋百官志嗣後職務漸重唐左右二僕射因前代本副尚書令自尚書令廢闕二僕射則為宰相故太宗謂房玄齡杜如晦曰公為僕射當洞開耳目訪求賢才是為宰相弘益之道通典堂老宰相相呼為堂老國史補江總自敘曰歷涉清顯不涉權幸嘗太息曰莊青翟位至丞相無迹可紀趙元叔為上計吏光乎列傳陳書侍中宋文帝元嘉中主華王曇首殷景仁等並為侍中情在親密與帝接膝共語貂拂帝手拔貂置案上語畢復手挿之孝武時侍中何偃南郊陪乘鑾輅過白門闘偃將匐帝乃接之曰朕乃陪卿南齊志唐朝擇中官一人為樞密院使與兩軍中尉謂之四貴梁之崇政使唐樞密之職盖出納之任也唐常以宦者為之至梁戒其禍始更用士人其備顧問參謀議於中則有之未始專行事於外也至郭崇韜安重誨為之始復唐樞密之名然權侔於宰相矣後世因之遂分之為二文事任宰相武事任樞密樞密之任既重而宰相自此失其職也五代史唐張居翰掖庭令張從玫之養子同光中為樞密使偽蜀王衍既降詔遷其族於洛陽行及川秦時關東已亂莊宗慮衍為變遣中官馳騎賫詔殺之詔王衍一行並宜殺戮其詔已經書時居翰在密地覆視其詔乃揩去行字改為家字及衍就戮於秦州驛止族其近属而已其偽官及從行者尚千餘人皆免其枉濫居翰力也上晋復置樞密院以桑維翰為使事無巨細一以委之数月之間百度寖理上樞密使宋首命趙普號稱二府禮遇無間每朝奏事共中書先後上所言以聞異同用分宰相之權會要學士之職本以文學言語備顧問出入侍從因得參謀議納諫諍其禮尤寵而翰林院者待詔之所也百官志翰林院前代即無舊名貞觀中祕書監虞世南等一十八人或秦府故寮或當時才彥皆以弘文館學士會于禁中內參謀猷延引講習出侍輿輦入陪宴私十數年間多至公輔當時號為十八學士天下慕向謂之登瀛洲翰林故事十八文星連輝炳耀舊唐禇亮贊乾封中劉懿之劉禕之兄弟周思茂元萬頃范履冰皆以文詔召入待詔常於北門侯進止舊志禕之上元中禕之遷弘文館直學士與著作郎元萬頃左史范履冰苗楚客右史周思茂韓楚賓等皆召入禁中共撰列女傳臣軌百寮新誡樂書凡千餘卷時又密令參決以分宰相之權時人謂之北門學士禕之兄懿之時為給事中兄弟並居兩省論者美之傳玄宗即位以萬機委積詔誥悉由中書或慮當劇而不用務速而時滯始選朝官有詞藝學識者故事張說陸堅張九齡徐安貞張洎等召入禁中謂之翰林待詔王者尊極一日萬機四方進奏中外表疏批答或詔從中出宸翰所揮亦資其檢討謂之視草故嘗簡當代四人以備顧同舊志太元二十六年始以翰林供奉改稱學士由是遂別建學士院俾專內命於是太常少卿張垍起㞐舍人劉光謙等守居之而集賢所掌於此悉罷自後李白等在舊翰林院但假其名並無所職翰林故事張垍說子也以主壻玄宗特深恩寵許於禁中置內宅侍為文章嘗賜珍玩不可勝數時兄均亦供奉翰林院常以所賜示均均戲謂垍曰此婦翁與女壻非天子賜學士也舊志李白天寶中皇祖下詔徵就金馬降輦步迎如見綺皓以七寶床賜食御手調羹以飯之謂曰卿是布衣名為朕知非素畜道義何以及此置于金鑾殿出入翰林中問以國政潛草詔誥人無知者醜正同列害能成謗格言不入帝用踈之本集李陽冰序至德已後天下用兵軍國多務深謀密詔皆從中出尤擇名曰翰林學士德充選者文士為榮亦如中書舍人例置學士六人內擇年深德重者一人為承旨所以獨承密命故也上召對移院德宗雅尚文學注意是選乘輿每幸學士院顧問錫賚無所不至御饌珍肴輟而賜之又嘗召對於玉堂移院於金鑾殿對御起草詩賦唱和或旬日不出吳通微昆季同時櫂用與陸贄爭恩不叶甚於水火天下醜之翰林志陸贄初入翰林特承德宗異顧歌詩戲狎朝夕陪遊及出居難阻之中雖有宰臣而謀猷參決多出於贄故當時目為內相舊唐吳通玄父道瓘德宗在東宮師也通玄兄弟恒侍太子游貞元初召充翰林學士與兄通微同職禁林人士榮之昭德王后崩詔李紓為謚冊文宰相張延賞柳渾為樂章及進皆不稱旨並召通玄重撰凡中旨撰述非通玄之筆無不慊然重之如此舊文苑傳吳通玄充翰林學士知制誥與陸贄吉中孚韋執誼等同視草贄富于詞藻特承德宗重顧經歷艱難通玄兄弟又以東宮侍上由是爭寵頗相嫌恨贄性褊急屢於上前短通玄通玄傳既與二吳不協漸加浸潤恩禮衰薄陸傳贄又上疏曰國朝典故詔令合由中書如或墨制施行所司不須承受蓋以示王者無私之義為國家不易之規貞觀中有學士十八人太宗但與講論墳籍時務悉不相于玄宗末方置翰林張垍國親承寵然止唱和批答樞密略不與知肅宗奔播之時翰林始掌書詔因循迄今漸逾職分物議不平皆云天子私人侵敗綱紀致使聖代虧至公之休宰相有備位之名制書職分宜歸中書學士之名宜革前弊德宗以贄指斥微玄故不可其奏翰林志韋綬德宗時以左補闕為翰林學士密政多所參逮帝常幸其院韋妃從會綬方寢學士鄭絪欲馳告之帝不許時大寒以妃蜀襭袍覆而去其待遇若此唐書李程為翰林學士以階前塼日影為入候程性懶每入必踰八塼故號為八塼學士傳載唐之貴文至矣後王纂承多以國柄付文士元和初憲宗遵聖祖故事視有宰相器者貯之內庭繇是釋筆硯而操化權者十嘗八九劉汝錫李絳集記順宗不懌儲位未立王叔文起於非類竊學士之名內連牛美人李忠言外結姦黨取兵柄美神器天下震駭是時鄭絪為內庭之老首定大計憲宗即位授絪中書侍郎平章事翰林志德宗昇遐時東宮疾急方甚蒼卒召學士鄭絪等至金鑾殿中人或云內中商量所立未定眾人未對衛次公遽言曰皇太子雖有疾地居冢嫡內外繫心必不得已當立廣陵王若有異圖禍難未己絪等隨而唱之眾議方定舊唐草制不言李吉甫除中書侍郎平章事適與裴垍同直裴垍草吉甫制吉甫草武元衡制垂簾揮翰兩不相知至暮吉甫有歎惋之聲垍終不言書麻尾之後乃相慶賀禮絕之敬生於座中及明院中使學士送至銀臺門而相府官吏候於門外禁署之盛未之有也翰林志沈傳師入翰林為學士翰林缺承旨次當傳師穆宗欲面命辭曰學士院長參天子密議次於宰相臣自知必不能願治人一方為陛下長養之因稱疾出唐書三俊李紳字公垂能為歌詩鄉賦之年諷誦多在人口元和初登進士第穆宗召為翰林學士與李德裕元禎同在禁署時稱三俊情意相善舊唐三人以學識才名相類情頗款密德裕傳大手筆李德裕穆宗即位召入翰林充學士帝在東宮素聞吉甫之名既見德裕尤重之禁中書詔大手筆多詔德裕草之是月召對思政殿賜金紫之服舊唐鈴有聲李德裕鎮蜀時謂幕賓韋絢云翰林院有懸鈴以備夜直警急文書出入皆引之以代傳呼也長慶中予為學士時河北用兵一夜鈴有聲如人引其索者使視之則無人後往往如此使人待棒潛伺於下終無所覩而數數鳴動不已院中諸公私共准其鳴時皆應用兵處耗聲則急緩亦如之曾莫之差眾咸異之元相詩云神撼引鈴索申文炳續翰林故事李德裕述夢詩曰荷淨蓬池鱠冰寒郢水醪注每學士初上賜食悉是蓬萊池魚鱠夏至復賜及頒燒香酒以酒味稍濃每和水而飲蓋禁中郢水酒切也一品集此文饒詩也事文類聚乃云李白詩白詩注豈未見於本集耶抑止抄謄故紙耶合璧因之殊誤觀者門客我后憐詞客吾僚並巂髦注先朝曾宣諭卿等是我門客上事文作唐武后朝云云李衛公詩話誤崔郾字廣略姿儀偉秀人望而慕之敬宗即位拜翰林侍講學士旋進中書舍人謝曰陛下使臣侍講歷半歲不一問經義臣無功不足副厚恩帝慚曰朕少間當請益唐書文宗召兵部尚書王起禮部尚書許康佐為侍講學士中書舍人柳公權為書學士每有疑義即召學士入便殿顧問討論率以為常謂之三侍學士恩寵異等熊望登進士第粗有文學而務進不已時京兆尹劉栖楚以不次驟居清貫廣樹朋黨門庭無畫夜填委不息望出入栖楚之門有同密戚陰計密畫人無知者敬宗嬉遊之隙學為歌詩以翰林學士崇重不可褻狎乃議別置東頭學士以備曲宴賦詩令採卑官才堪任學士者為之栖楚以望名薦送事未行而昭愍崩文宗即位韋處厚輔政大去姦黨既逐栖楚流望漳州司戶舊唐令狐綯為翰林承旨夜對禁中燭盡帝以乘輿金蓮華炬送還院吏望見以為天子來及綯至皆驚唐書畢諴太和中進士擢第為翰林學士自大中末党項羌叛屢擾河西懿宗召學士對邊事諴即援引古今論列破羌之狀上悅曰吾方擇能帥安集河西不期頗牧在吾禁署卿為朕行乎諴忻然從命即用諴為河西節度等使舊唐崔貽範於鳳翔圍城中據李茂真起復作相偓當草制抗疏論其不可夜半以授翰林院學士使中人馬從皓語渥曰學士無以性命為戲渥不答扄戶而寢明日無麻制宣讀茂真曰陛下命相學士不肯草制與反何異昭宗曰卿薦貽範朕不拒渥不草制朕亦不拒其如道理分明何金鑾密記姚垍曰使我當直亦繼以死唐書韓寅亮渥之子也嘗言渥捐館之日溫陵帥聞其家藏箱笥頗多而緘鐍其密人罕見者意其必有珍玩使親信發觀惟得燒殘龍鳳燭金縷紅巾百餘條蠟淚尚新巾香猶鬱有老僕泫然而言曰公為學士日常視草金鑾內殿深夜方還韓苑堂時皆宮妓秉燭炬以送公悉藏之自西京之亂得罪南遷十不存一二矣延平家有老尼說斯事與寅亮之言同尼即渥之妾云南唐近事偓見惡於朱全忠貶榮懿廚天祐二年復召為學士還故官偓不敢入朝挈其族南依王審知而卒唐傳昭宗召韓偓入院試文五篇萬邦咸寧賦拜昌言詩武臣授東川節度制答佛誓國王進貢書批三功臣讓圖形表繳狀云臣才不邁群器非拔俗待價既殊於櫝玉窮經有愧於籯金遭遇清時𣷉濡睿澤峨冠振佩已塵象闕之班䑛筆和鉛更金門之詔擊鉢謝捷篡組非工撫已循涯以榮為懼金鑾密記長興元年翰林學士劉昫奏本院舊例學士入院除中書舍人不識餘皆試麻制答蕃書批答各一道詩賦各一首號曰試五題續通典斯文不墜陸扆字祥文文思敏速初無思慮揮翰如飛文理俱愜同舍服其能天子顧待特異嘗金鑾作賦命學士和扆先成帝覽而嗟挹之曰朕聞貞元時有陸贄吳通玄兄弟能作內廷文書後來絕不相繼今吾得卿斯文不墜矣舊唐陸扆援學士承旨同平章事故事三署除拜有光署錢以宴舊僚內署即無斯例扆拜輔將之月送學士光院錢五百貫特舉新例內署榮之上陸扆撰光院例榜于院臺云費調金鼎能視草之煩勞擁出碧幢釋援毫之羇束固人臣之極摰亦翰院之榮華至於察風俗於一方賞貨泉于三使其為盛也抑又次焉各請出錢用光玉署翰林舊規下水船裴廷裕乾寧中在內廷文書敏捷號為下水船梁朱溫受禪為洎為學士嘗從容問及廷裕行止洎對曰須歲左遷今聞旅寄衡水上曰頗知其人搆思甚捷對曰向在翰林號為下水船上應聲謂洎曰卿便是上水船也洎微笑深有慚色議者以洎為急灘頭上水船也唐摭言封受卿梁時知貢舉辱門生鄭致雍同受命入翰為學士致雍有俊才舜卿才思拙涉及試五題不勝困弊因託致雍秉筆當時議者為座主辱門生同光初致仕北夢鎖言後唐同光中賜承旨盧質論思翊佐功臣旋授節制河中王道詩云視草北來唐學士擁髦西去漢將軍時人榮之續翰林志李澣為翰林學士常陞殿侍宴翰衣緣左右揖令退澣叱之遂賜緋與坐主和凝同任學士會疑入相澣常草制命開疑閣盡取器玩圖書以歸其縱率如此會廢學士院出為吏部員外郎遷禮部郎中知制誥復置翰林遷中書舍人再為學士時在西掖搢縉榮之分紀南唐李璟即位馮延巳喜形於色璟未聽政延巳屢入白事璟不悅曰書記自有常職餘各有司存何不匣煩也俄拜諫議大夫充翰林學士復結魏岑侵損時政與其弟延魯及陳覺查文徽等更相推唱時人謂之五鬼九國志宿儒建隆元年學士王著以酒失扈蒙以請求皆貶官太祖謂宰相曰深嚴之地當以宿儒處之范質對曰竇儀清介重厚然頃自翰林遷端明矣帝曰禁中非此人不可卿當諭以朕意勉令就職分紀宋史淳化四年以張洎錢若水為翰林學士洎等赴上帝曰學士之職清切貴重非他官可比朕常恨不得為之故事學士赴上有勑設久罷其事當令設之仍召樞密直學士及知制誥預坐洎愽涉經史多知典故每上有著述或賜近臣詩什洎必上表援引經傳以將順其意上因賜詩褒美有翰長老儒臣之句後判吏部銓嘗引對選人上顧之謂近臣曰張洎富有文藝至令尚苦學江東士人之冠也上洎字師黯南唐為清輝殿學士入宋與蘇易簡同在禁林甚被寵顧與蘇易簡不恊事文引作張垍置之劉褘之柳公權之間誤太宗以玉堂之設其來尚矣但虛得其號而無正名乃於紅綃上御書飛白四字題曰玉堂之罪以賜蘇易簡易簡公捧歸私宅以慶耀其親擇日懸掛仍具扄鐍于玉堂之上自待詔院吏而下減列賀于庭公曰自唐置學士來幾三百年今日方知貴矣即日詔宰輔暨兩制司臣就院勑設宴帳仍各賦長韻詩以紀其事其詩目曰禁林讌會集分紀太宗至上林春融千花萬卉妍麗冠絕上必曲宴宰衡勳舊召兩制詞臣俯龍池垂金鉤舉暢賦詩終日而罷上嘗謂近臣曰詞臣實神仙之職也翊日凡所進詩悉廻御毫屬和以賜焉分紀玉堂東承旨閣子窗格上有火然太宗嘗夜幸玉堂蘇易簡為學士已寢遽起無燭具衣冠宮嬪自牕格引燭入照之至今不欲更易以為玉堂一盛事筆談鼇禁宋白賈黃中皆先達鉅儒同在鼇禁筆談李衛公詩畫壁看飛鶴僊圖見巨鼇注內署垣壁北畫松鶴先是西壁畫海中曲龍山憲宗曾欲臨幸中復懼而塗焉舊制凡入兩府許薦館職試出身任監司者各一員樞相王公德用自圃田復召入長府即有千薦館職王曰以君才進士登科所薦應格矣然某武人素不閱書若奉薦則色叫矣世以為知言蓋今人以事理不相當為色叫麈史冀州城南有張耳家在送客亭北契丹使者林牙以翰林學士使宋問知州王仲平不知張耳何代人其大使耶律防謝曰契丹家翰林學士名目而已職難翰林樞機宥密之地翰林志夫發揮大猷藻飾上命隻簡片削可以動乎人神風行四方萬里如覩故議定於內而事脩於外言發於上而旨敷於人微乎斯文百度闋矣況此院之置尤為近切左接寢殿右瞻彤樓晨趍瑣闥夕宿嚴衛密之至也驂鑣得御廄之駿出入有內司之導豐餚潔膳取給大官衾裯服御資於中庫恩之厚也備待顧問辯駮是非典持縑牘受遣群務凡一世得失動為臧否職之重也非夫格謹而有立秉貞而通理俾義樞要簡乎宸心言不及溫樹之名慎不遺轅駒之數處其職者不亦難乎翰林故事建中以來簡拔尤重故必密如孔光博如延州文如卿雲學如向歆器如黃顏直如史魚然後得中第士之游心處已景行於六如者而又飾之以潔球瑋之行貫金石之誠雖潛聲匿迹莫能脫乎漢時始建置尚書郎五人平天下奏議分直建禮含香握蘭居錦帳食大官則今之翰林名異而實同也時論以為登玉清翔紫霄豈蓬山瀛州而足喻乎韋處厚翰林廳壁記亦曰玉署玉堂焉翰林志位學士上唐舊制學士無得以承為名者應對顧問參會第班以官為上下憲宗永貞元年始命鄭絪為承旨位在諸學士上居東第一閣承旨院記凡內宴坐次於宰相坐居一品班之上翰林志後唐明宗勑今後學士入院並以先後為定惟承旨出自朕意不計官資先後在學士上其年十一月勑新除翰林學士張昭遠早踐綸闈久司史筆曾居憲府累陟貳卿今既擢在禁林所宜別宣班序其立位宜次崔稅五代職官志學士每下直出門相見謂之小三昧出銀臺乘馬謂之大三昧如釋氏之去纏縳而自在也翰林志梅詢為翰林學士一日書詔頗多構思甚苦推觚循階而行忽見老卒臥於日中欠伸甚適梅忽歎曰暢哉徐問之曰識字乎曰不識梅曰更快活也大學士上欲以張燕公大夫學士辭曰學士本無大稱中宗欲以崇寵大臣修文館乃有大學士之名如臣未學動陛下規模豈敢首以大為稱辭再三從之集賢記注後宴集賢院故事官重者先飲說曰吾聞儒以道相高不以官閥為先後太宗時脩史十九人長孫無忌以元舅每宴不肯先舉爵長安中與脩珠英當時學士亦不品秩為限於是引觴同飲時伏其有體唐書時又賜錢一千貫文以充食本時院內供擬稍厚中書舍人陸堅亦充翰林供奉每日入院堅以學士咸非其人而所司祗候供儗優厚將為糜費嘗曰此何益國家空致如此費損將建議請一切罷之燕公明之曰吾聞自古帝王功成理定則有奢縱之戒或造地臺或耽聲色豈如今日聖上崇儒重道親自講諷刊校圖書詳延學者今日麗正即是聖主禮樂之司求代棤模不易之道也所費者細所益者大陸子之言未為達也上聞其言堅之恩眷漸減初也集賢記注張燕公等因獻賦詩上各賜贊以褒美之勑曰得所進詩甚有佳妙風雅之道斯焉可觀並據才能略為贊述具如別紙宜各領之上自於五色牋八分書之賫付院散付學士張說德重和鼎功踰濟川詞林魁首翰苑光鮮徐堅校文天祿論經上庠華詞宛麗詩賦抑楊賀知章禮樂之司文章之苑學優藝博才高思遠趙冬曦白簡端嚴青史良直清詞雅韻博賢強識康子元才識清遠言談幽祕四科文學六書仁義侯行果洪鍾佇叩明鏡不疲理窮繫象動中威儀韋述職參山甫業篡玄成六藝述作四始飛英敬會真名乃會真迹惟契道樞衣講習臨筵振藻趙玄默才比丘明學兼儒墨敘述微婉講論道德東方顥地遊天祿門嗣滑稽三冬足用六藝斯齊李子釗干木流慶指樹貽芳諷諫遺闕啟發篇章呂向族茂非熊才方班馬考李篇籍抑揚風雅母照軒轅之任諫諍之職聞詩聞禮有才有識陸去泰才光於晉價重於張州縣斯屈文翰尤長咸廙業郁郁高文英英博識持我刑憲是稱諒直余欽文章兩贍才術兼美思在專經學通舊史孫季良蓬山之秀芸閣之英雄詞卓傑雅思縱橫尋勑善寫真人貌學士等欲畫像書贊於含象亭屬車駕東行竟不果注記十三年三月因奏封禪儀注勑學士等賜宴於集仙殿上制詩序群臣賦詩上於坐上口詔改為集賢殿時預宴者宰臣源侍中乾曜燕公學士徐堅賀知章康子元趙冬曦侯行果敬會真趙玄默韋述李子釗陸去泰呂向咸廙業毋照余欽孫季良馮朝隱等時新進櫻桃上令遍於席上散布各領諸官拾取之飲以醇醪清酤之酒酒酣簾內出彩牋令燕公賦官韻群臣賦詩並出彩羅令擲雙陸頭子得重彩者分之宴金盞銀盤雜綵有差上張燕公嘗謂人曰學士者文儒之美稱皆須詔勑特授豈合因循自名時賀知章從太常少卿遷禮部侍郎兼授學士一日併謝訖謁宰臣源侍中曰賀公久著盛名今日一時加二榮命並為學士之光輝雖然學士與侍郎二者孰為美燕公曰侍郎自皇朝已來為衣冠之華選自非履歷清要望實具美者無以居之雖然終是具員之吏又非往賢所慕學士者懷先王之道為搢紳軌儀蘊楊班之詞彩兼遊夏之文學始可處之無愧二美之中此為愈也上張說前後三入相三十餘年掌文學之任為唐文宗上嘗為文引於禁中令說視草說亦善用已長引文儒侍從之臣以左右王化天子始以經術之道開集賢院殿置十八學士以修太宗之政當時綴文之士始尚古風上之好文自說始也分紀固辭加大李泌為相加集賢殿崇文館大學士修國史泌建言學士加大始中宗時及張說為之固辭乃以學士知院事至崔圓復為大學士亦引泌為讓而止唐書貞元四年八月月蝕東壁泌曰東壁圖書府大臣當有憂者吾以宰相兼學士當之矣昔燕國公張說由是以亡又可免乎明年果卒上學士兩人後唐天成元年命馮道趙鳳充端明殿學士非舊號也馮道笏記云天下儒生僅餘萬數殿前學士只有兩人時輩榮之續翰林志南唐徐鍇為虞部員外郎專掌集賢院由此銳意群籍不復問家事常言即賢院即是吾家指所居曰此寄宿之所爾九國志鍇字楚金與兄鉉同有大名於江左鍇兄弟俱參近侍而其文相軋議者方晉之二陸云南唐書偽蜀辛夤遜夢掌中抽筆占者曰君必遷翰林學士未幾果然太宗時宋白賈黃中李至呂蒙正蘇易簡五人皆同時拜翰林學士承旨扈蒙贈之以詩云五鳳齊飛入翰林其後呂蒙正至宰相賈黃中李至蘇易簡皆至參知政事宋白官至尚書老於承旨皆為名臣歸田錄真宗作歌一首賜新授翰林學士兼龍圖閣學士陳彭年因謂向敏中等曰頃命學士罕曾賜歌詩因曰彭年詞學優長擢居清近久益慎密多聞好學鮮有偕者平居寫萬餘言復精詳典禮深明法令人或請益應答如流皆有依據常令檢討典故質正文義每一事具載經史子籍所出備而後已自非強記何由至此敏中曰彭年全才也豈止於文雅雍容侍從而已至如參酌時務詳求物理皆出人意表上然之因曰詳定所事無大小皆俟彭年裁制而後定此一句不可廢也往者參酌典禮雖偏歷攸司而所見皆出胥史今以為式長編楊億以文章擅天下然性勁剛寡合有惡之者因事譖之大年在學士院忽夜召見於一小閣深在禁中既見賜茶從容顧問久之出文藁數篋以示大年云卿識朕書蹟乎皆朕自起草未嘗命臣下大年惶恐不知所對頓首再拜而出乃知必為人所譖矣由是佯狂奔于陽翟真宗好文初待大年恩禮漸襄亦由此也歸田錄楊億為學士時草答契丹書云鄰壤交歡草既進真宗自注其側曰杇壤糞壤億遂改為鄰境明旦引唐故事學士作文書有所為不稱職當罷因亟求解職真宗語宰相曰楊易不通商量真有性氣上舊翰林學士地勢清切皆不兼他務文館職任自校理以上皆有職錢唯內外制不給楊太年久為學士家貧請外表辭千餘言其間兩聯曰虛忝甘泉之從臣終作莫敖之餧鬼從者之病莫興方朔之饑欲死筆談自後乃得判他局東軒筆錄夢宣召對蔡子直誠英宗于藩邸為最舊既即位久之以樞密直學士知秦州英宗上仙不及見一日夢宣召賜對又賜茶既而辭出固留之曰只住此更毋得去寤而既憶乃靈駕發引曰因大慟哭遂得即日中而卒其幽冥之感有如此焉東齋記事元厚之少時曾夢人告之異日當為翰林學士須兄弟數人同在禁林厚之自思素無兄弟疑此夢為不然熙寧中厚之除學士同時相先後入院為學士者一拜持國維一除和叔繹一鄧文約綰一楊元素繪並厚之名絳五人名背從系始悟兄弟之說蘇子瞻年十餘歲在鄉里見老蘇誦歐公謝宣召赴學士院仍謝對衣并馬表老蘇令坡擬之其間有云匪伊垂之帶有餘非敢後也馬不進老蘇喜曰此子他日當自用之至元祐中再召入院作承旨仍益之云枯羸之質匪伊垂之帶有餘歛退之心非敢後也馬不進侯鯖錄蘇子瞻為學士日鎖院召至內東門小殿時子瞻半醉命以新水漱漱口解酒已而入對授以除目呂公著司空並平章軍國事呂大防范純仁右左僕射旨畢宣仁忽謂官家在此子瞻曰適已起居矣宣仁曰有一事要問內翰前年任何官職子瞻曰汝州團練副使曰今為何官曰備員翰林充學士曰何以至此子瞻曰遭遇陛下曰不千老身事子瞻曰必出自官家曰亦不關官家子瞻曰豈大臣薦論邪曰亦不關大臣事子瞻驚曰臣雖無狀必不別有干請曰久待要學士知此是神宗皇帝之意當其飲食而倚筯看文字謂內人曰蘇軾文字也神宗忽時稱之曰但未及用學士而上仙耳子瞻哭至笑聲宣仁與上左右皆泣已而賜坐喫茶曰直須盡心事官家以報先帝知遇子瞻拜而出撤金蓮燭送歸院隨手雜錄宣仁高氏英宗后也慈聖曹后一日見神宗不悅問其所以神宗答曰廷臣有競訕朝廷者欲議施行慈聖曰莫非軾轍也老身嘗見仁祖時策士大悅得二文士問是誰曰軾轍也朕留與子孫用神宗色漸和東坡始有黃州之謪貴耳集慈聖仁宗后也張廷建中靖國間例復官職有請十首一曰陽城論事蓋當世陸贄草詔傾諸公翰林若要真學士喚取澹州禿鬢翁東坡也侯鯖錄周麟之為學士姿儀洒落進止凝重班冠玉筍望之者意神仙中人言行錄麟之受召撰張循王碑文成奏御天筆批其後十八字曰鋕銘敘事詳盡造語簡要披閱數四但有難嘉士林傳翫以為寵韓門下維以賜出身熙寧末特除翰林學士崇寧中林彥振攄賜出身用韓例亦除翰林學士國朝以來不由科第除者此二人翰苑群書按韓省試中以兄億執政不就廷試後為館者以至兩制未嘗賜第也同上李昉素病心悸每數歲一發常語諸子曰我典誥命三十年勞役憂思而致是疾爾曹當戒之唐玄宗開元三年制曰朕應政之暇常覽史書但關理道實所留心中有闕疑時須咨問宜選耆儒博碩一人每日入內侍讀公卿薦光祿卿馬懷素因拜左散騎常侍與右散騎常侍禇無量更入侍讀舊唐師資馬懷素為秘監兼昭文館學士性篤學手不釋卷謙恭謹慎深為玄宗所禮令與左散騎常侍禇無量同為侍讀每次閤門則令乘肩轝以進上居別館以路遠則命宮中乘馬或親自送迎以申師資之禮上禇無量景雲中初玄宗在春宮拜業兼皇太子侍讀嘗撰翼善記以進之皇太子降書嘉勞賫絹丁憂解職服闋復為侍讀以其年老每隨仗出入特許緩行又為造腰輿令內給使輿於內殿初無量與馬懷素俱為侍讀顧待甚厚及無量等卒後祕書少監康子原國子愽士侯行果等又入侍講雖屢加賞賜而禮遇不逮禇馬白履志博涉文史嘗隱居于古大梁城時人號為梁丘子景雲中徵拜校書郎尋棄官而歸開元中王志愔表薦履忠隱居讀書貞苦守操有古人之風堪代禇無量馬懷素入閣侍讀徵赴京師及至履忠辭以老病不任職事上詔拜朝散大夫乞還手詔許游京師徐返里閭履忠留數月乃去開元時王晙將井州兵西濟討叛虜間行倍道趨之夜於山中忽遇風雪甚盛晙恐失期仰天誓曰晙若事君不忠不討有罪明靈所殛固自當之而士眾何辜令其苦若誠心忠烈天艱孔明當止雪迴風以濟戎事言訖風迴而雪止上韋斌每朝會不敢離位笑言嘗大雪在廷者皆振裾更立斌不徒足雪甚幾至沒靴亦不失恭安石傳天寶初安思順進五色帶上怪近日西貢無五色玉令責安西諸蕃蕃言為小勃律所劫沮上怒李林甫贊成上意命王天運將四萬人往征之屠其城虜二千人及其珠璣而還勃律中有術者言將軍無義不祥天將大風雪矣行數百里忽驚風四起雪花如翼風激小海水成冰柱起而復摧經半日小海漲湧四萬人一時凍死酉陽雜俎王元寶每大雪之際則令僕夫門巷掃雪為徑迎揖賓客飲宴為暖寒之會天寶遺事大曆初鍾陸崔希真工繪事冬日晨出見一老人避雪門下延入具大麥麵食之又獻松花酒老人懷中取一丸藥置酒中酒頃耳美仍似數丸遺崔崔入宅復出見老人已去有圖于所畫素上者皆非常意所及遂踏雪尋至蘆洲中見船中數人而樵客在側顧笑曰葛三乃見逼于伊人李極光天師曰此真人葛洪第薛放登進士第性端厚寡言憲宗以儲皇詩書求端士輔導經義選充皇太子侍讀及穆宗嗣位未聽政間放多在左右密參機命穆宗常謂放曰小子初承大寶懼不克荷先生宜為相以匡不逮放叩頭曰臣實庸淺獲侍冕旒固不足猥塵大位輔弼之任自有賢能其言無矯飾皆此類也穆宗深嘉其誠因召對思政殿賜以金紫之服舊唐韋溫字弘育綬子也為翰林學士先是綬在禁廷積憂畏病廢故誡溫不得任近職至是固辭帝怒曰寧綬治命邪換知制誥初兼莊恪太子侍讀晨詣宮日中見太子諫曰殿下盛年宜雞鳴蚤作問安天子如文王故事太子不悅辭侍讀見聽太子得罪詔諭群臣溫曰陛下訓之不早非獨太子罪時頗直其言唐書綬貫之兄也與前條韋綬同名耳丁公著充皇太子諸王侍讀因著太子及諸王公十訓十卷穆宗立遷工部侍郎寵青宮之舊也舊唐王起字舉之文宗好文尚古學時鄭覃長於經義起長於博洽俱引入翰林講論經史起僻於嗜學雖官位崇重耽玩無斁書無不覽經目靡遺以太子登儲欲令儒者授經乃以兵部尚書兼太子侍讀為太子廣五運圖及文場秀句獻之帝數訪逮時政題詩太子笏以賜詔畫象便殿號當世仲尼邢昺字叔明真宗始置翰林侍讀學士首以命昺即於便坐令講左氏春秋嘗講孝經禮記論語書易詩據傳疏敷引之多及時事真宗甚嘉獎之東都事略仁宗常詔翰林侍讀學士張錫講書禁中錫敷暢經旨議論該洽上嗟賞久之錫時年六十七鬢髮皓然上曰卿老矣記問不衰乃以飛白書博學字賜之因訪以治道錫曰節慾者治身之本也慎刑賞者治平之本也時貴妃被幸故以此諷之上改容曰卿言甚嘉朕恨用卿晚矣國史夏竦之子安期除侍讀學士經術不甚深而登進經筵日夕旋閱經史以備顧問自厭之乃懇求外補帥延州庾亮字元規元興初拜中書郎領著作侍講東宮其所論釋多見稱述與溫嶠俱為太子布衣之好時元帝方任刑法以韓子賜太子亮諫以申韓刻簿傷化不足以留心太子甚納焉晉書蕭德言愽涉經史尤精左氏春秋好屬文晚年尤篤志於學自晝達夜略無休倦每欲開五經必束帶盥濯危坐對之妻子候間請曰終日如是無乃勞乎德言曰敬先聖之言豈憚如此時高宗為晉王詔德言受經講業及升春宮仍兼侍讀舊唐學有師法韋處厚字德載通五經博覽史籍而文思贍逸穆宗以其學有師法召入翰林為侍讀學士處厚以幼主荒怠不親政務既居納誨之地宜有以啟導性靈乃銓擇經義雅言以類相縱為二十卷謂之六經法言獻之錫以繪帛銀器仍賜金紫與司勳員外郎史館修撰路隨並充翰林侍講學士召入太液亭命分講毛詩關雎尚書洪範等篇訪以理體處厚等演經義以廣規風之道從容開納賜酒果而罷經史要錄鄭澣餘慶子也文宗初擢為翰林侍讀學士上命撰經史要錄二十卷書成上喜其精博因以十九書語類上親自發問澣應對無滯錫以金紫舊唐崔郾愍即位選侍講學士轉中書舍人入思政殿謝恩奏曰陛下用臣為侍講半歲有餘未常問臣經義令蒙轉改實慚戶素有媿厚恩帝曰朕機務稍閑即當請益郾退與同列高重抄撮六經加言要道區分事類凡十卷名曰諸經纂要冀人主易於省覽上嘉之賜綵二百疋高元裕自侍講為中丞文宗難其代元裕表言兄少逸才可任因遷少逸議諫大夫代元裕為侍講學士兄弟迭處密時人榮之王起開成三年入翰林為侍講學士文宗或僻字疑事令中使口宣起具榜子附使者上凡十篇號曰寫宣唐書鄭覃太和三年充翰林侍講學士覃長於經學稽古守正文宗尤重之李宗閔牛僧孺以覃與李德裕善惡覃禁中言事奏為工部尚書能侍講學士上好經義心頗思之六年二月復召為侍講學士七年德裕作相上嘗于延英謂宰相曰殷侑通經學為人頗似鄭覃宗閔曰覃誠有經學於議論不足聽覽德裕曰殷鄭之言他人不欲聞陛下切欲聞之覃嘗嫉人朋黨為宗閔所薄故也舊書流人補李訓太和八年自流人補四門助教召人內殿面賜緋魚充翰林侍講學士入阢日賜宴宣法曲第子二十人就院奏法曲以寵之兩省諫官鄭肅高元裕等伏閣切諫言訓姦邪海內聞知不宜令侍宸扆帝終不聽鄭注始以藥術游長安始李愬病痿注治之有狀王守澄神其術太和八年注進藥方一卷上令守澄召對浴堂門賜金紫召對之夕慧出東方九年充翰林侍講學士召自九仙門帝面賜告身時李訓附注以進己在禁庭二人相洽日侍君側講貫太平之術以為朝夕可致昇平兩姦合從天子益惑其說既得行其志生平恩讎絲毫必報朝士相繼斥逐班列為之一空後敗籍沒其家財得絹一百萬匹他貨稱是給事太子詹事秦官掌皇后皇太子家應劭云詹省也給也言給事太子竇嬰景帝初為詹事帝弟梁孝王母竇太后愛之孝王朝因燕昆弟飲是時上未立太子酒酣上從容曰千秋萬歲後傳王太后驩嬰引巵酒進上曰天下者高祖天下父子相傳漢之約也上何以得傳梁王太后由此憎嬰前漢晉以保傳位尊不宜親細務武帝咸寧初用黃門侍郎楊珧為詹事掌東宮之任珧遷為少傳六典陸曄字士光少有雅望從兄機每稱之曰我家世不乏公矣太興元年遷太子詹事以清貞著稱晉書願言匪獲羊琇字稚舒泰山人通濟才術與世祖同年相善謂世祖曰後富貴時見用作領護軍太子詹事世祖即位累遷左將軍中護軍特進晉諸公讚謝琰字瑗度安少子也為輔國將軍距氏進號征虜左僕射領詹事陳邵謝錄漢朝選德禮儀峻于竇卿晉代任賢光榮歸於謝琰大唐詔令寬制武帝以王恭為丹陽尹領詹事恭讓表曰今皇儲始建四方是式總司之任崇替所由宜妙簡才賢盡一時之勝豈臣蕞庸所可叨忝晉起居注太原王恭為中書令領詹事學問清操過人中興書卞壺為世子師前後居師征之任盡匡輔之節一府貴而憚焉中興建補太子中庶子侍講東宮遷太子詹事世稱卞壺裁斷切直敷實忠於事上也晉書江夷為右僕射主上欲用領詹事語王淮卿可覔北例淮對曰臣當出外尋訪淮後見主上問近所道事卿已得例未淮曰謝琰右僕射領詹事琰即謝公子子恐夷非其例事遂不行俗說彈肅詹事彈肅一宮如尚書令中丞矣王珉荅徐邈書彈違是屬宜肅事於東韓嗣許王制慱望斷機之規輿情僉屬承華彈肅之寄任賢斯在李寬制密函宋殷景仁不為文而敏有思致不談義而深達理至於國典朝章舊章記注莫不撰錄識者知其有當世之志也宋少帝時與王華王曇首劉湛四人並為侍中以風力局幹冠冕一時同升之美近代莫及元嘉中丁母憂起為領軍將軍固辭服闋遷尚書僕射太子詹事劉湛代為領軍後以劉湛等毀停家養病者五年雖不見上而密函去來日中以十數後將收湛上召入華林園誅討處分一皆委之代義康為楊州刺史南史風素孔稚珪字德璋少學涉有美譽永明中歷中庶子永元中遷太子詹事辭表曰太子霞騫青殿日光春官駕紫谷之英振洛笙之響自非器上白雲韻同明月何以延芳芝苑插羽瓊條竇嬰戚貴於西京陸曄風素於東國伊人之美方曰可舉臣亦何斯而敢參冒也陸倕字佐公少勤學善屬文晝夜讀書如此者數歲所讀一遍必誦于口舉秀才高祖雅愛倕才遷太子庶子除詹事免讓表曰儲端華重實異恒司南章馬宮已擇儒雅竇嬰許商爰取姻戚自茲已降名器日隆歷選才賢若何叨越也孔奐為吏部尚書陳後主時在東宮欲以江㧾為太子詹事令管記陸瑜言之奐奐曰江有潘陸之華而無園綺之實輔弼儲貳竊謂非材後主深以為恨乃自言於宣帝宣帝將許之奐乃奏曰江㧾文華之人今皇太子文華不少無籍於㧾如臣愚見願選敦重之才以居輔導帝曰誰可奐曰都官尚書王廓代有懿德識性敦敏可以居之後主時亦在側乃曰廓王泰之子不可居太子詹事奐又曰宋朝范曄即范泰之子亦為太子詹事後主固爭之帝以㧾為詹事由是忤旨南史十七㧾性寬和溫裕尤工五言七言溺於浮靡及為宮端與太子為長夜之飲養良娣陳氏為女太子亟微行㧾家宣帝奴免之上二十六審諭李綱武德初為太子詹事隱太子建成初甚禮遇建成常往溫湯綱疾不從有進生魚者將召饔人作鱠時唐儉趙元楷自贊其能建成從之既而謂曰飛刀鱠鯉調和鼎食公實有之至於審諭弼諧固屬於李綱矣舊唐諫近閹官于志寧為太子詹事太子承乾所為多不法令閹官多在左右諫之及承乾敗太宗謂志寧曰知公數有親諫深嘉勉勞右庶子令狐德棻等以無諫章皆從貶貴唐書張玄素為少詹事轉右庶子時承乾居春廉頗以遊獵廢學玄素上書諫曰弘道在于學古學古必資師訓殿下地居儲兩當須廣樹嘉猷既有好畋之淫何以主斯斯鬯又諫曰殿下睿資已隆尚須學文以飾其表至如孔頴達趙弘智等非惟宿德鴻儒亦兼達政要望令數得侍講開釋物理覽古諭今增暉睿德而雕蟲小伎之流秪可時命追隨以代愽奕耳承乾並不能納屈階資高宗為皇太子轉李勣為太子詹事太宗謂曰我兒新登儲貳卿舊長史今以宮事相委故有此授雖屈階資可勿怪也上龍朔二年以詹事府改曰端尹府詹事曰端尹少詹事曰少尹武后光宅元年改曰宮尹府詹事曰宮尹少詹曰少尹中宗還東宮豆盧欽望為宮尹志通典會要張行成為太子少詹事太宗東征皇太子於定州監國即行成本邑也太子謂行成曰今者送公衣錦還鄉於是令有司祀其先人墓舊唐劉憲景雲初遷太子詹事時玄宗在東宮雅意經籍憲曰殿下儲副非以尋章摘句要通大意而已侍讀禇元亮經明行修宜召問以察其言上張說女嫁盧氏嘗為舅盧公求官侯父下朝而問焉父不語但指搘床龜而示之女歸告其夫曰舅得詹事矣蘇弁德宗時改太子詹事弁初入朝班位失序殿中侍御史鄒儒立對仗彈之於金吾待罪數刻特釋放舊制太子詹事班次太常宗卿之下貞元三年御史中丞竇參敘定班位移詹事在河南太原尹之下弁乃引舊班制立臺官詰之仍紿云已白宰相請依舊故為儒立彈之舊唐禮上文宗時馮定改太子詹事宰臣鄭覃拜太子太師欲於尚書省上事定奏曰據六典太師居詹事府不合於都省禮上乃詔於本司上事人推美之上庶子主宮中并諸吏之適子及支庶在版籍者也行其秩序作其徒役授八次八舍之職以徼侯環濟要略肅敬王商字子威少為太子中庶子以肅敬敦厚稱漢書霍弋字紹先峻子也後主立太子璿以弋為中庶子璿好騎射出入無度弋援引古義盡言規諫甚得切磋之體蜀志武帝咸寧初詔曰男子皇甫謐沈靜履素守學好古與流俗異趣其以謐為太子中庶子謐固辭篤疾帝初雖不奪其志晉書齊王攸與山濤書曰太子中庶子東宮顯職加侍接左右誠宜得篤粹有行檢之人想悉在尊意必允眾望也上中庶子缺宜得俊茂者以濟陰太守留儼陽城太守石崇參選不審可有合聖意者不山公啟事鄭默字思元袤子也考覈舊文刪省浮穢武帝受禪與太原郭奕俱為中庶子朝廷以太子官屬宜稱陪臣默上言皇太子體皇極之尊無私於天下宮臣皆受命天朝不得同之藩國事遂施行晉書溫嶠元帝時遷太子中庶子在東宮深見寵遇太子與為布衣之交僚屬莫與為比數陳規諷又獻侍臣箴甚有弘益上明帝之在東宮孔衍領太子中庶子于時中興肇構庶事草創衍經學淵博該識舊典朝儀軌制多取正焉由是元明二帝並親愛之上王珣啟以桓謙為中庶子曰東宮之選中庶子管緫門下尤不可不得其才也上正始遺風袁粲言於帝曰張緒有正始遺風宜為宮職復轉中庶子齊書王瑒父冲嘗為瑒辭領中庶子世宗顧謂冲曰所以久留瑒於承華正欲使太子微有瑒風法耳陳書劉行本拜太子左庶子皇太子虛袊敬憚時唐令則亦為左庶子太子昵狎之每令以絃歌教內人行本責之曰庶子當匡太子以正道何有嬖昵房帷之間哉令則甚慚而不能改隋書劉行本為庶子時左衛率長史夏侯福為太子所昵太子嘗得良馬令福乘而觀之太子甚悅因欲令行本復乘之行本不從正色而進曰至尊置臣于庶子之位者欲令輔導殿下以正道非為殿下作弄臣也太子慚而止行本卒後而太子勇廢文帝曰若使劉行本在勇當不及於此上薛元超永隆二年拜中書令兼太子左庶子高宗幸東都太子於京師鹽國因留元超以侍太子帝臨行謂元超曰朕之留卿如去一臂但吾子未閒庶務關西之事悉以委卿所寄既深不得默爾舊唐吳競為左庶子玄宗東封在路多射獵競諫曰陛下爰自洛邑將告禪岱宗行經數州屢以畋獵為事誠外方之漸非致禮之所急況登封告成禮容甚大畋遊之事克損威儀又正觀時太宗文皇凡在巡行則慱選識達古今之士以在左右每至前代興亡之地皆詢其所由用為鑒誠伏願陛下遵而行之則與夫騁奔馬於澗谷要狡獸於叢林不慎垂堂之厄不思馭朽之變不可同日而論也職官分紀晉王珉曰中庶子稱坊詹事稱寺寺同於九卿坊如天朝之稱臺徐邈問王珉漢制洗馬冠高山冠職如謁者中朝新制洗馬進賢冠出則在馬前清道故曰洗馬職官分紀勾踐入官於吳執干戈為吳王洗馬故能殺夫差於姑蘇韓子善宦汲黯字長孺孝景時為太子洗馬黯姊子司馬安亦少與黯為太子洗馬安文深巧善宦四至九卿漢書不空有名李密晉武徵為太子洗馬詔累下郡縣逼遣密上數疏武帝覽其表曰密不空有名嘉其誠款賜奴婢二人郡縣供其祖母俸贍後劉終復以洗馬徵襄陽耆舊兄弟同任解系字少連次弟結字仲連次弟育字稚連各清身潔已仕皆為洗馬州里榮焉王隱晉書云江統字應元為太子洗馬在東宮累年甚被親禮太子頗闕朝覲又奢費過度多諸禁忌統上五事諫之晉書統召補洗馬每有疑滯大事章奏表議輒為同官所推常為之作草文上傳裴松之字世期宋武帝北伐領司州刺史既尅洛陽松之居州行事宋國初建毛德祖使洛陽武帝敕之曰裴松之廊廟之才不宜久居邊務今召為太子洗馬與殷景仁同可令知之南史庾於陵字子介天監中為太子洗馬舊事東宮官屬通為清選洗馬掌文翰尤其清者近世用人皆取甲族有才望時於陵與周捨竝擢充職高祖曰官以人而清豈限以甲族時論以為美梁傳李綱字文紀開皇末為太子洗馬皇太子勇嘗以歲首宴宮臣左庶子唐令則自請奏琶琶又歌武媚娘之曲綱白勇曰令則身任宮僚職當調護乃於宴座自比倡優進淫聲穢視聽事若上聞令則罪在不測豈不累於殿下臣請舉正其罪勇曰我欲為樂耳君勿多事綱趨而出舊唐唐司經局洗馬掌經籍出入侍從圖書上東宮者受而莊之龍朔二年改洗馬為司經大夫三年改司經局為桂坊以洗馬為桂坊大夫紏正違失通典志常衮為相先是百官俸料寡薄衮與宰相楊綰奏請加之時韓滉判度支衮滉各騁私懷所加俸料厚薄由已滉惡國子司業張參衮惡太子詹事趙惎因皆少給之太子洗馬實司經局長官文學為之貳衮有親戚任文學者乃給十二千而給洗馬十千其輕重任情如此舊唐書秦景通與弟暐尤精漢書當時習漢書者皆宗師之常云景通為大秦君暐為小秦君若不經其兄弟指授則謂之不經師匠無足也景通貞觀中為洗馬上漢制太子五日一朝其非朝日即遣僕及中允入朝問起居隋有內允貞觀初曰中允掌侍從贊相駁正啟奏總司經皇太子出則版奏外辦中嚴入則解嚴龍朔元年改門下坊曰左春坊中允曰左贊善大夫通典王珪孔穎達杜淹陸游明王維為中允裴諝字士明少舉明經為史思明捕得嘗疏賊短長以聞賊平除太子中允代宗居陝赴行在上見而謂之曰疾風知勁草果信矣舊唐書諭道德左右諭德掌諭太子以道德也皇太子朝宮臣則列侍於左右階出入則騎從於正道之左右其內外庶政有可為規諷者隨事而贊諭焉六典員半千武后時入弘文館為學士武三思用事以賢見忌出豪蘄二州刺史半千不顓任吏常以文雅粉澤故所至禮化大行睿宗初召為太子右諭德仍學士職唐書韋承慶字延休弱冠舉進士辭藻之美擅于一時累遷太子司議郎太子賢監國不近聲色承慶上書諫曰殿下岳峙淵渟金貞玉裕百僚仰重曜之暉萬姓聞洊雷之響居處服玩必循節儉毀獵遊娛不為縱逞則可以克享終吉長保利貞又當為諭善箴以獻太子太子賜予甚厚久之以病免改授太子諭德上德宗拜崔芊為諭德芊對東宮曰臣不識朝廷典故見殿下合稱臣否東宮曰卿是東寮自合知也上左右贊善大夫龍朔二年初置左贊善大夫贊中冗置右贊善大夫贊中舍人咸寧元年中允復舊而贊善大夫別自為官皆掌侍從翊贊太子以規諷也皇太子出入動靜茍非其德義則必陳右以箴焉六典通典歸崇敬字正禮少勤學以經業擢第天寶末對箂高帝授左拾遺改秘書郎遷起居郎贊善大夫兼史館修撰舊唐貞元十六年以山人崔羊為右贊善大夫充太子侍直新名也上白居易授左贊善大夫盜殺宰相武元衡居易首上疏論其冤急請捕賦以雪國恥宰相以宮官非諫職不當先諫官言事會有素惡居易者掎摭居易言浮華無行其母因看花墮井而死而居易作賞花及新井詩甚傷名教不宜寘彼周行執政方惡其言王涯上疏論之貶江州司馬上贊相上齒太子賓客掌侍從規諫贊相禮儀而先後焉凡皇太子有賓客宴會則為之上齒六典漢書高祖欲廢太子呂氏用張良計致商山四皓以為賓客又孝武帝為太子立愽望苑使通賓客則其義也若有宴賜諸司長官太子賓客則皆預焉上楊元琰與張柬之等定計誅張易之兄弟俄而柬之等為武三累所搆琰竟以先覺獲全睿宗即位三遷刑部尚書開元初拜太子賓客詔設位東宮太子為拜舊良吏新四十五李固言太和五年將作監王堪修秦太廟施慢罰俸仍改官為太子賓客制出固言封還曰東宮調護之地不可令施慢被罰之人處之改為均王傳舊唐侹天節鄭肅開成二年拜吏部侍郎帝以肅嘗侍太子言論典正復令兼太子賓客為東宮受經既而太子失寵上不悅有廢斥意肅因召見深陳邦國大本君臣父子之義上改容嘉之而太子竟以楊妃故得罪武宗思太子永之無罪盡誅陷永之黨朝議稱肅忠正侹侹有大臣之節上武德中秘書丞令狐德棻請修五代史詔蕭瑀等分修之歷年不就貞觀三年復勑修撰乃令德棻仍總知類會諸史武德以來創修撰之源自德棻始也會詔改撰晉書房玄齡奏德棻令預修撰當時同修一十八人並推德棻為首其體例多取決焉舊唐唐史館修撰掌修國史天寶後他官兼史職者曰史館修撰元和中宰相裴垍建議登朝官領史職者為修撰以官高一人判館事志歸登字冲之崇敬子也充皇子侍讀尋加史館修撰順宗初以東朝舊恩賜金紫尋加史館修撰上蔣義字德源愽通群籍史才尤長貞元中史館修撰居史任二十年好學不倦老而彌篤子係太和中拜史館修撰典實有父風伸太中初入朝右補闕史館修撰召入為翰林學士偕有史才以父任歷官左拾遺史館修撰蔣氏世以儒史稱與柳氏沈氏父子相繼修國史實錄時推良史京師云蔣氏日曆士族靡不家藏焉舊唐兩宮恩顧徐岱字處仁貞元初史館修撰並依舊侍讀承兩宮恩顧時無與比而謹慎遇甚來嘗洩禁中語亦不談人之短南唐李翱轉史館修撰以史官記事不實奏曰臣謬秉筆以記注為職夫觀善懲惡正言直筆史官之任今善惡皆取行狀謚議蓋行狀多是其門生故吏欲虛美于受恩之地今請但指事實直載事功假如作魏徵傳但紀其諫諍之辭足以為正直叚秀實但記其倒用司農印以追道兵以象笏擊朱泚足以為忠烈若考視行狀依此則考功下太常牒史館然後定謚從之上周賈偉充史館脩撰晉初桑維翰為相惡緯侍之甚薄及為翰傳言翰死有白金八千鋌學士徐台符以為厚誣偉乃更為數百儕類不平目為賈鐵嘴五代史慶曆四年賈昌朝建言修唐書命王堯臣宋祈楊察張方平為修撰曾公亮范鎮宋敏求呂夏卿為編修其後相繼出外獨宋祈秉筆編年夏卿愽覽強記而於歷代史尤該洽東都事略宋太平興國八年八月以國子監主簿楊文舉為國子監丞史館編修天聖中修國史王安簡謝楊夏李邯鄲黃唐卿為編修官安簡神情冲澹唐卿刻意篇什謝安嘗戲為句曰王貌閒如鶴黃吟苦似猿袁樞字機仲為編修官分修列傳故相章子厚家以同里宛轉求釋其事公曰吾為史官書法不隱寧可負鄉人不可負天下後世公議時宰相趙雄總史事歎曰無愧古之良史行狀淳化二年以殿中丞郭延澤太子右贊善大夫董元亨並為史館檢討李燾權同修國史先是子垕兼國史編修實錄檢討遷校書著作父子同典史事搢紳榮之言行錄漢東京圖籍在東觀故使名儒碩學著作東觀撰述國史箸作之名自此始也宋志馬融安帝時為大將軍鄧隲所召拜校書郎中在東觀十年窮覽典籍上廣成頌又寶章居貧蔬食講讀不輟太僕鄧康重章學行是時學者稱東觀為老氏藏室道家蓬萊山康薦章入東觀為校書郎中續後漢書桓帝延喜二年初置秘書監掌典圖書古今文字考合異同東觀漢記應亨五葉應亨讓著作表曰自司隸校尉奉至臣五葉著作不絕卿族以為美談崔駰三世繼其後無間若乃談遷武彪固踵跡亦各一世之良也集荀勗字公曾領秘書監與中書令張華依劉向別錄整理錯亂又得汲冢周書身自撰次以為中經列於秘書經傳闕文多所證明王隱晉書諸公讚束晢元康四年晚應司空府入月餘亦除著作佐郎著作西觀撰晉書草創三帝紀及十志文士傳梁秘書郎後漢校書郎也龍朔二年改秘書省曰蘭臺天授初改曰麟臺龍朔改著作為司文郎宋書六典宋太宗崇尚儒術以史館之比建秘閣仍送三館書萬餘卷以實其中內諸司舍屋唯秘閣最宏壯閣下穹隆高敝相傳謂之木天職官分紀天中記卷三十
