body:
  text: 企羡九京與歸趙文子與叔向游于九京曰死者若可作也吾誰與歸其隨武子乎納諫不忘其師言身不失其友事君不援而進不阿而退晉語方晏子伏莊公尸哭之成禮然後去豈所謂見義不為無勇者邪至其諫說犯君之顏此所謂進思盡忠退思補過者哉假令晏子而在余雖為之執鞭所忻慕焉史記得見與游人或傳韓非書至秦秦王見孤憤五蠹之書曰嗟乎寡人得見此人與之游死不恨矣李斯曰此韓非之所著書也秦因急攻韓韓王始不用非及急迺遣非使秦秦王悅之未信用李斯姚賈害之上陸賈為漢高帝著書十二篇每奏一篇高帝未嘗不稱善左右呼萬歲稱其書曰新語漢書韓非之書傳於秦庭始皇歎曰獨不得與此人同時陸賈新語每奏一篇高祖左右稱曰萬歲夫嘆思其人與喜稱萬歲豈可空為哉誠見其美懽氣發於內也論衡文帝思賈誼徵之至入見宣室問鬼神之本至夜半文帝前席既罷曰吾久不見賈生自以為過之今不及也前漢蜀人楊得意為狗監侍上上讀子虛賦而善之曰朕獨不得與此人同時哉得意曰臣邑人司馬相如自言為此賦上驚乃召問相如相如曰有是請為天子游獵賦賦成奏之復奏大人頌天子大悅飄飄有凌雲之氣似游天地之間意史記孝武善子虛之賦徵司馬長卿孝成玩弄眾書之多善楊子雲出入遊獵子雲乘從故曰玩楊子雲之篇樂於居千石之官挾桓君山之書富於積猗頓之財論衡佚文趙咨字文楚舜帝時拜東海相之官道經滎陽令敦煌曹暠咨之故孝廉也迎路謁候咨不為留暠送至亭次望塵不及謂主簿曰趙君名重今過界不見必為天下笑即棄印綬追至東海謁咨畢辭歸家其為時人所貴若此後漢張楷字公超通嚴氏春秋古文尚書門徒常百人賓客慕之自父黨宿儒偕造門焉車馬填街徒從無所止黃門貴戚之家皆起舍巷次以候過客往來之利楷疾其如此輒徙避之學者隨之所居成市後華陰山南遂有公超市上李膺字元禮性簡亢無所交接唯以同郡荀淑陳實為師友荀爽嘗就謁膺因為其御既還喜曰今日乃得御李君矣其見慕如此上膺恒以疾不送迎賓客二十日乃一通客唯陳仲弓來輒乘轝出門迎之膺家錄膺居陽城時門生在門下者恒有四五百人膺每作一文出手門下共爭之不得墮地陳仲弓初令大兒元方來見膺與言語訖遣廚中食元方喜以為合意當復得見焉商芸小說郭太字林宗始至京師陳留人符融見而嘆曰高雅奇偉達見清理行不茍合言不夸毗此異士也言之於河南尹李膺與相見曰吾見士多矣未有如郭林宗者也其聰識通朗高雅密博今之華夏鮮見其儔友而親之陳留人韓卓有知人之鑒融見原以己言告之卓曰此太原士也他日又以泰言告之卓曰四海內士也吾將見之於是驟見泰謂融曰此子神氣冲和言合規矩高才妙識罕見其倫後漢紀郭太游於洛陽始見河南尹李膺膺大奇之遂相友善於是名震京師後歸鄉里衣冠諸儒送至河上車數千兩林宗唯與李膺同舟而濟眾賓望之以為神仙焉後漢黃憲字叔度汝南慎陽人時論者咸云顏子復生而族出孤鄙父為牛醫潁川荀季和執憲手曰足下吾師範也後見袁奉高曰卿國有顏子寧知之乎奉高曰卿見吾叔度耶典略鄙吝復存黃叔度同郡陳蕃周舉常相謂曰時月之間不見黃生則鄙吝之萌復存乎心及蕃為三公臨朝嘆曰叔度若在吾不敢先佩印綬矣後漢郭林宗少游汝南先過袁閎車不停軌鸞不輟軛詣黃叔度乃彌日信宿或薛恭祖問其故林宗曰奉高之器譬諸汎濫雖清而易挹叔度汪汪若萬千頃之波澄之不清擾淆之不濁其器深廣難測量也後漢世說庾乘字世遊少給事縣庭為門士林宗見而拔之勸遊學宮遂為諸生傭後能講論自以卑第每處下坐諸生博士皆就讎問由是學中以下坐為貴後漢孔融為北海相黃巾復來侵暴融乃出屯都昌為賦管亥所圍融逼急乃遣東萊太史慈求救於平原相劉備備驚曰孔北海乃復知天下有劉備邪即遣兵三千救之賊乃散走上或以方謝仁祖不乃重者桓大司馬曰諸君莫輕道仁祖企腳北窗下彈琵琶故自有天際真人想世說王長史為中書郎往敬和洽許爾時積雪長史從門外下車步入尚書著公服敬和遙望嘆曰此不復似世中人上王司州先為庾公記室參軍後取殷浩為長史始到庾公欲遣王使下都王自啟求住曰下官希見盛德淵源始至猶貪與少日周旋上宋纖字令艾敦煌人少有遠操沈靜不與世交隱居酒泉南山不應辟命張祚時太守楊宣畫其象於閣上出入視之作頌曰為枕何石為漱何流身不可見名不可求太守馬岌造焉纖距而不見岌歎曰名可聞而身不可見德可仰而形不可覩先生人中之龍也銘詩於石璧曰丹巖百丈青壁萬尋奇木蓊鬱蔚若鄧林其人如玉維國之琛室邇人遐實勞我心晉書千載盛美王弘之字方平家貧性好山水義熙中辟召一無所就家在會稽上虞始寧沃川有佳山水弘之依巖築室謝靈運顏延之並相欽重靈運與廬陵王義真牋會境既豊山水是以江左嘉遁竝多居之至若弘之拂衣歸耕踰歷三紀孔淳之隱約窮岫自始迄今阮萬齡辭事就閑纂戎先業既遠同羲唐亦激貪厲競若遣一箇有以相存真可謂千載盛美也南史袁顗圖避禍於襄陽當時皆羡之謂為陵霄駕鳳遂與義嘉同滅明帝答王景文詔子無所恨王訓字懷範小字文殊年十六召見文德殿應對爽徹上目送之久謂朱昇曰可謂相門有相初補國子生問說師袁昂昂曰久籍高名有勞虛想及觀容止若披雲霧俄而諸袁子弟來昂謂諸助教曰我兒出十數若有一子如此實無所恨南史到溉字茂灌少孤貧與兄沼弟洽俱知名起樂安任昉大相賞好提攜溉洽二人廣為聲價梁天監初昉出守義興要溉洽之郡為山澤之遊昉還為御史中丞後進皆宗之時有彭城劉孝綽劉苞劉孺吳郡陸倕張率陳郡殷芸沛國劉顯及溉洽車軌日至號曰蘭臺聚陸倕贈昉詩云和風雜美氣下有真人遊壯矣荀文若賢哉陳大邱今則蘭臺聚萬古信為傳任君本達識張子復清修既有絕塵到復見黃中劉時謂昉為任君比漢之三君到則溉兄弟也上阮孝緒字士宗屏居一室未嘗出戶親友呼為居士天監初御史中丞任昉尋其兄履之欲造而不敢望而嘆曰其室雖邇其人甚遠其為名流所欽尚如此自是欽慕風譽者莫不懷刺歛袵望塵而息上韓顯宗字茂親性剛直有才學沙門法撫三齊稱其聽悟常與顯宗校試抄百餘人名各讀一遍隨即覆呼法撫猶有一二舛謬顯宗了無誤錯法撫歎曰貧道生平以來唯服郎耳魏書神人李諧字處和幼有風采趙郡李搔嘗過元義門下見之歸謂其父元忠曰領軍門下見一神人元忠曰必李諧也問之果然諧與盧元明聘梁梁武使朱異覘客異言諧元明之美諧等見及出梁武目送之謂左右曰朕今日遇勍敵卿輩常言此間都無人物此等何處來謂異曰過卿所談北史盧元明字幼章風采閑潤善自摽置不妄交遊飲酒賦詩遇興忘返性好玄理少時常從鄉還道途遇相州刺史中山王熙熙博識之士見而歎曰盧郎有如此風神唯須誦離騷飲美酒自為佳器遂留之數日贈帛及馬而別上陽休之字子烈早得才名為人物所傾服外如踈放內實謹厚少年頗以峻急為累晚節以通美見稱重衿期好游賞太常卿盧元明人地華重罕所交接非一時名士不得與之游休之始為行臺郎便坦然投分文酒會同相得甚款鄉曲人士莫不企羡焉上封軌字廣度深為郭柞所知柞常謂子景尚曰封軌高綽二人並幹國之才必應遠至吾平生不妄進舉而每薦此二人非直為國進賢亦為汝等之津梁其見重如此軌既以方直自業高綽亦以風概立名高肇拜司徒綽送迎往來軌竟不詣綽顧不見軌乃遽歸曰吾一生自謂無愆規矩今日舉措不如封生矣上盧玄字子真太武辟召天下儒雋以玄為首崔浩每與言輒嘆曰對子真使我懷古之情更深上袁叔德候李僧伽先臧僕從然後入門曰見此賢令吾羞對軒冕元彧字文若少有才學時譽甚美侍中崔光見或退而謂人曰黑頭三公當此人也少與從兄安豊王延明中山王熙並以宗室博古文學齊名時人莫能定其優劣尚書郎范陽盧道將謂吏部清河崔休曰三人才學雖無優劣然安豊少於造次中山皂白太多未若濟南風流寬雅時人為之語曰三王楚琳瑯未若濟南備圓方王誦見之未嘗不心醉忘疲魏書冦儁字祖儁每造司徒崔光常清談移日小宗伯盧辨以儁業行俱崇待以師友之禮每有閑暇輙詣儁讌語彌日恒謂人曰不見西安君煩憂不遣北史袁尚書翻朕之杜預欲以此杯敬屬元凱今為盡之侍坐者莫不羡仰北史溫子昇字鵬舉博覽百家文章清婉梁使張皋寫其文筆傳於江外梁武稱之曰曹植陸機復生于北土恨我詞人數窮百六魏書陸慶少好學節操甚高仕梁為婁令陳永陽王為吳郡太守聞其名欲與相見慶辭以疾時宗人陸榮為郡五官掾慶嘗詣焉王乃微服往榮宅穿壁以觀之王謂榮曰觀陸慶風神凝峻殆不可測嚴君平鄭子真何以尚茲南史為異代交蕭允字升佐為會稽郡丞行經延陵季子廟設蘋藻之薦託為異代之交為詩以敘意辭理清典後主嘗問蔡徵曰卿世與蕭允相知此公志操何如徵曰其清虛玄遠殆不可測至於文章可得而言因誦允詩以對後主嗟賞久之陳書閻立本家代善畫至荊州張僧繇舊迹曰定虛得名耳明日更往曰名下定無虛士坐臥觀之留宿其下十日不能去隋唐嘉話率更令歐陽詢行見古碑索靖所書駐馬觀之良久而去數百步復還下馬佇立疲則布毯坐觀因宿其傍三日而後去上高宗承貞觀之後天下無事上官儀獨持國政嘗凌晨入朝巡洛水隄步月徐轡詠詩曰脈脈廣川流驅馬歷長洲鵲飛山月曙蟬噪野風秋音韻清亮群公望之若神仙國史異纂崔湜弱冠進士登科不十年掌貢舉後三登宰輔年始三十六崔之初執政也方二十七容止端雅文詞清麗嘗暮出端門下天津橋馬上自吟春遊上林苑花滿洛陽城張說昔為工部侍郎望之杳然而嘆曰此句可效此位可得其年不可及也翰林盛事開元中朝廷選用群官必推精當文物既盛英賢出入皆薄具外任雖雄藩大府由中朝冗員而授時以為左遷班景倩自揚州採訪使入為大理少卿路由大梁倪若水為郡守西郊盛設祖席宴罷景倩登舟若水望其行塵謂掾吏曰班公是行何異豋仙乎為之騶殿良所甘心默然良久方整回駕既而為詩投相府以道其誠其詞為當時所稱賞明皇雜錄李邕自刺史入計京師邕素負才名頻被貶斥皆以邕能文養士賈生信陵之流執事忌勝剝落在外人間素有聲稱後進不識京洛阡陌聚看以為古人或將眉目有異衣冠望風尋訪門巷又中使臨問索其新文譚賓錄李太白初自蜀至京師舍於逆旅賀監知章聞其名首訪之既奇其姿又請所為文白出蜀道難以示之讀未竟稱歎數四號為謫仙人白自幼好酒於兗州習業平居多飲又於任城縣搆酒樓日與同志荒宴其上少有醒時邑人皆以白重名望其重而加敬焉本事詩李白與韓荊州書聞天下談士相聚而言曰生不用萬戶侯但願一識韓荊州何令人之景慕一至於此耶豈不以周公之風躬吐握之事使海內豪俊奔走而歸之一登龍門則聲譽十倍所以龍盤鳳逸之士皆欲收名定價於君侯房琯每見元德秀歎息曰見紫芝眉宇使人名利之心都盡蘇源明常語人曰吾不幸生衰俗所不耻者識元紫芝也唐書李渤字濬之與兄涉偕隱廬山更涉少室元和初以右拾遺召不拜洛陽令韓愈遺書曰有詔河南敦諭拾遺公朝廷士引頸東望若景星鳳鳥始見爭先覩之為快想冠帶就車惠然肯來利加于時名垂將來踴躍懷企頃刻以冀上泰山北斗昔孟軻拒楊墨去孔子才二百年愈排二家乃去千餘歲撥衰反正功與齊而力倍之所以過况雄為不少矣自愈沒其言大行學者仰之如泰山北斗云上裴度退然纔中人而神觀邁爽操守堅正善占對既有功名震四夷使外國者其君長必問度年今幾狀貌孰似天子用否其威譽德業比郭汾陽而用不用常為天下重輕事四朝以全德始終及歿天下莫不思其風烈上獨孤郁權相之子壻也歷掌內外綸誥有美名憲宗歎曰我女壻不如德輿女壻國史補五年召充翰林學士郁以婦公辭內職憲宗曰德輿乃有此佳壻舊唐陸鴻漸名羽少事竟陵禪師師去世作寄情歌云不羡黃金壘不羡白玉杯不羡朝入省不羡暮入臺千羡萬羡西江水曾向竟陵城下來國史補傳載宣州當塗隱居山巖有僧名彥範俗姓劉雖為沙門而通儒學邑人呼為劉九經執經受業者數十人年八十猶強健能飲穆兵部贄事之最謹有得其遺彥範書云某偶忝名宦皆因善誘自居班列終日塵屑却思昔歲臨清澗蔭長松接侍座下獲聞微言未知何時復遂此事遙瞻水中月嶺上雲但馳攀想而已和尚薄於滋味深於酒德所食僅同嬰兒所飲或如少壯常恐尊體有所不安中夜思之實懷憂戀其誠切如此日月之下稱門人姓名狀和尚前語林爵祿盡受上元瓦官寺僧守亮通周易李衛公鎮浙西以南朝舊寺多名僧求知易者帖下諸寺令擇送至府守亮請行既至公初見未之敬及與言論分條析理出沒幽賾公凡欲質疑亮已演其意公不覺前席命甘露寺設館舍自於府中陳講席命從事以下皆橫經聽之逾年方畢既而請再講講將半亟請歸甘露既至命浴浴畢整巾縷白公云大限今至不及回辭言訖而終公聞驚異明日率賓客致祭適有南海使送西國異香公於龕前焚之其煙如弦穿屋而上觀者悲敬公自草祭文謂舉世官爵俸祿皆加於亮亮盡受之可以無愧語林李襲譽好寫書謂子孫曰吾近京城有賜田十頃耕之可以充食河內有賜桑千株蠶之可以充衣江東所寫之書讀之可以求官吾沒之後爾曹但勤此三事何羡於人續世說承暉貞祐初拜尚書右丞妻子留滄州滄州破妻子皆死宣宗遷汴與皇太子留守中都元兵至中都不守仰藥死暉生而貴富居家類寒素常置司馬光蘇軾像於書室曰吾師司馬而友蘇公金史荒聃子產相鄭有兄曰公孫朝有弟曰公孫穆朝好酒穆好色朝之室也聚酒千鍾積麴成封望門百步糟漿之氣逆於人鼻方其荒於酒也不知世道之安危人事之悔吝室內之有無九族之親踈存亡之哀樂也雖水火兵刃交於前弗知也穆之後庭比房數十皆擇稚齒婑媠者以盈之方其聃於色也屏親昵絕交游逃于後庭以晝足夜三月一出意猶未愜鄉有處子之娥姣者必賄而招之媒而挑之弗獲而後己子產以為戚造鄧析謀之析曰子奚不喻以性命之重誘以禮義之尊乎子產用析之言因間以謁而告之朝穆曰凡生之難遇而死之易及以難遇之生俟易及之死可孰念哉且若以治國之能夸物夫善治外者物未必治而身交苦善治內者物未必禮而好交逸若欲以彼術而教我哉子產忙然無以應之列楊朱何貪須臾莊周病劇弟子對之泣應曰我今死則誰先更百年生則誰後必不得免何貪於須臾桓譚新論戴良字叔鸞少誕節母憙驢鳴良常學之以娛樂焉及母卒兄伯鸞居廬啜粥非禮不行良獨食肉飲酒哀至乃哭而二人俱有毀容或問良曰子之居喪禮乎良曰然禮所以制情佚也情茍不佚何禮之論夫食旨不甘故致毀容之實若味不存口食之可也論者不能奪之良才既高達而論議尚奇多駭流俗同郡人季孝問曰子自視天下孰可為比良曰我若仲尼長東魯大禹出西羗獨步天下誰與為偶後漢化土為壺鄭泉字文淵陳邑人博學有奇志而性耆酒其閑居每曰願得美酒滿五百斛船以四時甘脆置兩頭反覆沒飲之憊即住而啖餚膳酒有斗升減隨即益之不亦快乎臨卒謂同類曰必葬我陶家之側庶百歲之後化而成土幸見取為酒壺實獲我心矣吳書阮公鄰家婦有美色當壚酤酒阮與王安豊常從婦飲酒阮醉便眠其婦側夫始殊疑之伺察終無他意世說阮籍鄰家處子有才色未嫁而卒籍與無親生不相識往哭盡哀而去其達而無檢皆此類也王隱晉書步兵校尉缺廚中有貯酒數百斛阮籍乃求為步兵校尉世說母終飲酒阮籍性至孝母將死正與人圍碁對者求止籍與決賭既而飲酒二十舉聲一號吐血數升及將葬食一蒸豚飲二斗酒然後臨訣直言窮矣舉聲一號因又吐血數升毀瘠骨立殆致滅性裴楷往弔之籍散髮箕踞醉而直視楷弔喭畢便去晉書籍遭母喪在晉文王坐進酒肉司隸何曾亦在坐曰明公方以孝治天下而阮籍以重喪顯於公坐飲酒食肉宜流之海外以正風教文王曰嗣宗毀頓如此君不能共憂之何謂且有疾而飲酒食肉固喪禮也籍飲噉不輟神色自若世說魏晉之間有被髮夷傲之事皆死忘生之人反謂行禮者籍為之也于寶晉紀魏末阮籍嗜酒荒放露頭散髮祼𥘵箕踞其後貴游子弟阮瞻王澄謝鯤胡母輔之之徒皆祖述於籍謂得大道之本故去巾幘脫衣服露醜惡同禽獸甚者名之為通次者名之為達也王隱晉書阮籍時率意獨駕不由徑路車迹所窮輒慟哭而反嘗登廣武觀楚漢戰處歎曰時無英雄使豎子成名晉書劉伶字伯倫放情肆志常以細宇宙齊萬物為心與阮籍嵇康相遇欣然神解攜手入林初不以家產有無介意常乘鹿車攜一壺酒使人荷鍤而隨之謂曰死便埋我其遺形骸如此上劉伶恒縱酒放達或脫衣祼形在屋中客有詣者見而譏之伶笑曰吾以天地為宅舍以屋宇為惲衣諸君自不當入我惲中又何惡乎其自任若是鄧粲晉紀阮渾字長成風氣韻度似父亦欲作達步兵曰仲容已預之卿不得復爾世說諸阮皆能飲酒仲容至宗人閒共集不復用常桮斟酌以大甕盛酒圍坐相向大酌時有群猪來飲直接去上便共飲之上王平子澄胡母輔之彥國諸人皆以任放為達或有祼體者樂廣笑曰名教中自有樂地何為乃爾上胡母謙之字子光才學不及父而傲縱過之至酣醉常呼其父字輔之亦不以介意談者以為狂輔之正酣飲謙之闚而厲聲曰彥國年老不得為爾將令我尻背東壁輔之歡笑呼入與共飲其所為如此晉書胡母彥國至湘州爾時三伏中彥國坐正衙搖扇視事其子子光從容顧語曰彥國復何為自貽伊戚光逸字孟祖以世難避亂渡江依胡母輔之初至屬輔之與謝鯤阮放畢卓羊曼桓彝阮孚散髮祼袒閉室酣飲已累日逸將排戶入守者不聽逸便於戶外脫衣露頭於狗竇中窺之而大叫輔之驚曰他人決不能爾必我孟祖也遽呼入遂與飲不捨晝夜時人謂之八達晉書張季鷹翰縱任不拘時人號為江東步兵或謂之曰卿乃可縱適一時獨不為身後名邪荅曰使我有身後名不如即時一桮酒世說賀司空入洛赴命為太孫舍人經吳閶門在船中彈琴張季鷹本不相識先在金閶亭聞弦甚清下船就賀因共語便大相知說問賀卿欲何之賀曰入洛赴命正爾進路張曰吾亦有事北京因路寄載便與賀同發初不告家家追問迺知上阮孚字遙集渡江為安東參軍被髮飲酒不以王務嬰心時元帝既用申韓以救世而率之徒未能無也雖然不以事任處之孚端拱嘯詠以樂當年嘗以金貂換酒為所司彈劾帝宥之上王導與周顗及朝士詣尚書紀瞻觀伎瞻有愛妾能為新聲覬於眾中欲通其妾露其醜穢顏無怍色有奏免顗官詔特原之鄧燦晉紀謝奕字無奕與桓溫善溫辟為安西司馬猶推布衣好在溫坐岸幘笑詠無異常日桓溫曰我方外司馬奕每因酒無復朝廷禮常逼溫飲溫走入南康主門避之主曰君若無狂司馬我何由得相見奕遂攜酒就聽事引溫一兵帥共飲曰失亦老兵得亦老兵亦何所在溫不之責晉書劉尹云孫承公狂士少誕任不羈家於會稽性好山水及求鄞縣遺心細務縱意游肆名阜勝川靡不歷覽每至一處賞翫累日或回至半路却返中興書羅友作荊州從事桓溫為王洽集別友進坐良久辭出溫曰卿向欲咨事何以便去答曰友聞白羊肉美一生未曾得喫故冒求前耳無事可咨今已飽不復須駐了無慚色世說王忱字元達性任達不拘末年尤嗜酒一飲連月不醒或祼體而游每嘆三日不飲便覺形神不相親婦父常有慘忱乘醉吊之婦父慟哭忱與賓客十許人連臂被髮祼身而入繞之三匝而出其所行多此類晉書謝安愛好聲律朞功之憕不廢妓樂衣冠效之遂以成俗王坦之非而苦諫之安遺坦之書曰知君思相愛惜之至僕所求者聲謂稱情義無所不可為聊復以自娛耳若絜軌跡崇世教非所擬議亦非所屑常謂君粗得鄙趣者猶未悟之濠上邪故知莫逆未易為人坦之答曰具君雅旨此是誠心而行獨往之美然恐非大雅中庸之謂吾子少立德行體議淹允加以令地優游自居僉曰之談咸以清遠相許至於此事實有疑焉公私二三莫見其可以此為濠上悟之者得無鮮乎且天下之寶故為天下所惜天下之非何為不可以天下為心乎想君幸復三思書往反數四安竟不從坦之傳安又於土山營墅樓館林竹甚盛每攜中外子姪往來游集肴饌亦屢費百金世頗以此譏焉而安殊不以屑意安傳王孝伯恭言名士不必須奇才但使常得無事痛飲酒熟讀離騷便可稱名士世說王長史廞登茅山大慟哭曰琅邪王伯輿終當為情死上文帝嘗召顏延之傳詔頻日尋覔不值文帝曰但酒店中求之自當得也傳詔依旨訪覔果見延之在酒肆躶身自挽歌了不應對他日醉醒乃往謝綽宋拾遺錄謝靈運以文帝不甚任遇意不平多稱疾不朝直穿池植援種竹樹重驅課公役無復期度出郭游行或一百六七十里經旬不歸既無表聞又不請急賜假東歸與族弟惠連何長瑜荀雍羊璿之以文章賞會共為山澤之游時人謂之四友靈運因祖父之資生業甚厚奴僮既眾門生數百鑿山浚湖功役無已尋山涉嶺必造險峻巖嶂數十重莫不備盡登躡常著木屐上山則去其前齒下山去其後齒嘗自始寧南山伐木開徑直至臨海從者數百臨海大守驚駭謂為山賊知是靈運乃安宋書王僧達為宣城太守性好游獵而山郡無事僧達肆意馳騁或五日三日方歸受辭辯訟多在獵所人或逢不識問府君所在僧達且曰在此南史袁粲領丹陽尹愛好虛遠雖位任隆重不以事務經懷獨步園林詩酒自適家居負郭每杖策逍遙當其意得悠然忘返嘗步屧白楊郊野間道遇一士大夫便呼與酣飲明日此人謂被知顧到門求進粲曰昨飲酒無偶聊相要耳竟不與相見嘗作五言詩訪迹雖中字循寄乃滄洲蓋其志也上何點字子晳容貌方雅真素通美不以門戶自矜雖不入城府性率到好狎人物遨遊人間不簪不帶以人地並高無所與屈大言踑踞公卿敬下或乘馬車躡草屩恣心所適致醉而歸故世論以點為孝隱士弟胤為小隱士大夫多慕從之時人稱重其通號曰游俠處士上王裕之字敬弘為臨川王道規諮議參軍時府主簿宋協亦有高趨道規並以事外相期嘗共酣飲敬弘因醉失禮為外司所白道規即便引還重申初讌左右嘗使二老婦女戴五條辨著青紋袴湏飾以朱粉女適尚書僕射何尚之弟述之敬弘嘗往何氏看女遇尚之不在因寄齋中臥俄頃尚之還敬弘還使二婦女守閤不聽尚之入云正熱不堪相見君可且去尚之於是移於他室閉車新婦曹景宗字子震頗愛史書每讀穰苴樂毅傳輒放卷歎息曰丈夫當如是為人自是尚勝每作書字有不解不以問人皆以意造焉出行常欲褰車帷幔左右輒陳以位望隆重人所具瞻不宜然景宗謂所親曰我昔鄉里騎快馬如龍與年少輩數十騎拓弓弦作霹靂聲箭如餓鴟叫平澤中逐麞數肋射之渴飲其血饑食其肉甜如甘露漿覺耳後風生鼻頭出火此樂使人忘死不知老之將至今來楊州作貴人動轉不得路行開車幔小人輒言不可閉置車中如三日新婦遭此邑邑使人無氣為人嗜酒好樂臘月於宅中使作野雽逐除遍往人家乞酒食梁書三騶對飲謝幾卿會意便行不拘朝憲嘗預樂遊苑晏不得醉而還因詣道邊酒壚停車褰幔與車前三騶對飲時觀者如堵幾卿處之自若後以在省署夜著犢鼻禈與門主登閣道飲酒酣嘑為有司糾奏坐免官居宅在白楊石井朝中交好者載酒從之賓客滿坐時左丞庾仲容亦免歸二人意志相得並肆情誕縱或乘露卓歷遊郊野既醉則執鐸挽歌不屑物議上歌衡山縣侯蕭恭性尚華侈而尤好賓友酣晏終辰坐客滿筵言談不倦時元帝居蕃頗事聲譽勤心著述巵酒未嘗妄進恭每從容謂曰下官歷觀時人多有不好懽興乃仰眠床上看屋梁而著書千秋萬歲誰傳此者勞神苦思竟不成名豈如臨清風對朗月登山泛水肆意酣歌也南史胡叟字倫許自涼歸魏賜爵始復男家於密雲蓬室草筵惟以酒自適謂友人金城宗舒曰我此生活似勝焦先志意所栖謝其高矣尋歸家不治產業常苦飢貧然不以為耻養子字螟蛉以自給養每至貴勝之門恒乘一牸牛敝韋袴褶而已作布囊容三四斗飲噉醉飽便盛餘肉餅以付螟蛉見車馬榮華者視之蔑如也魏書李元忠雖處要任初不以物務于懷唯以聲酒自娛大率常醉家事大小了不關心園庭羅種果藥親朋尋詣必留連宴賞每挾彈攜壺關敖里閈每言寧無食不可使我無酒阮步兵吾師也孔少府豈欺我哉神武欲用為僕射文襄言其放達常醉不可委以臺閣其子搔聞之請節酒元忠曰我言作僕射不勝飲酒樂爾愛僕射時宜勿飲酒北齊韓晉明軌子也有狹氣諸勳貴子孫中最留心學問好酒誕縱招引賓客一席之費動至萬錢猶恨儉率朝庭處之貴要之地必以疾辭告人云廢人飲美酒對名勝安能作刀筆吏返披故紙乎北齊傳九高季式字子通豪率好酒又恃舉家勳功不拘檢節與光州刺史李元忠生平遊款在濟州夜飲憶元忠開城門令左右乘驛馬持一壺酒往光州飲之朝廷知而容之黃門郎司馬消難左僕射子如之子又是神武壻勢盛當時因退食暇尋季式酣歌留宿旦日重並關消難固請去季式曰君以地勢脅我邪消難拜謝請出終不見許酒至不肯飲季式索車輪括消難頸又更索一車輪自括頸引滿相勸消難不得已笑而從之方俱脫車輪更留一宿及消難出方具言之北史允傳引客為歡李孝基字元操仕齊為給事中隋初以字行為蒙州刺史不復留意於文筆人問其故慨然嘆曰五十之年倏然而過鬢垂素筋力已衰宦情文意一時盡矣悲夫每暇日輒引賓客絃歌對酒終日為歡北史不須名位劉含度性虛遠有氣調風流跌宕名高一時嘗云不須名位所須衣食不用身後之譽惟重目前所免韓朝宗會為山南采訪使謂孟浩然深閑詩律寘諸周行必詠穆如之頌因入奏挾與偕行先揚於朝約日引謁及期浩然會友生文酒講好甚適或曰子與韓公諾而怠之無乃不可乎浩然曰僕已飲矣身行樂耳遑恤其他遂畢席不赴王士源浩然集序賀知章晚年尤加縱誕無復規檢自號四明狂客又稱秘書外監遨遊里巷醉後屬詞動成卷軸文不加點咸有可觀又善草隸書好事者供有牋翰每紙不過數十字共傳寶之舊唐李白待詔翰林日與飲徒醉於酒肆玄宗有感欲造樂府新詞亟召白白已臥於肆中矣召入以水洒面即令秉筆頃之成十余首帝頗嘉之嘗沉醉令高力士脫靴由是斥去乃浪迹江湖終日沉飲侍御史崔宗之謫官金陵與白詩酒相歡嘗月夜乘舟採石達金陵白衣宮錦袍於舟中顧瞻笑傲旁若無人續世說白酷好酒知章因鮮金龜換酒與傾盡醉期不間日李白開元中謁宰相封一版上題曰海上釣鼇客李白宰相問曰先生臨滄海釣巨鼇以何為鉤線曰以風浪逸其情乾坤縱其志虹蜺為絲明月為鉤又曰何物為餌曰以天下無義氣丈夫為餌時相竦然摭遺張祐嘗謁李紳自稱釣巨鼇客李盛怒因詰之曰以何為竿曰以虹為竿問以何為鉤曰以月為鉤又問以何為餌曰以短李相為餌紳默然厚贈之疑即一事杜佑字君卿在維揚日嘗語賓幕曰我致政後著一粗布襴衫跨小馬入市看盤伶傀儡足矣後致政果如其言諫官䟽言三公不合入市公曰此自無意正欲爾裴鈞僕射鎮襄州大宴巡官裴弘泰後至鈞不悅弘泰曰請在座銀器盡酌酒滿之隨飲以賜弘泰可乎鈞許之遂揭座上小爵至觥舩凡飲皆竭隨即填于懷有銀海受一斗以上以手捧而飲盡踏其海捲抱之索馬而去鈞使人視弘泰方箕踞而坐秤所得銀器二百餘兩不覺大笑乾𦠆子敗案後唐馬郁事武莊莊宗禮遇甚厚累官至秘書監監軍張承業權貴任事與賓僚宴集出珎菓陳列於前客無敢先嘗者當郁前者食之必盡承業私戒主者曰他日馬監至唯以乾藕子置前而已郁知不可啖異日鞾中出一鐵撾碎而食之承業大笑曰為公易之勿敗吾案其俊率如此續世說何承裕韶州曲江人有逸才為小詞尤工與陶穀素不叶周世宗欲以為知制誥穀奏沮之遂已何知之及陶之判銓一旦方偃息何自外抗聲唱挽歌而入陶甚驚駭承裕曰尚書豈長生不死者耶幸甚無恙聞其一兩曲又何妨陶無以抗及知商州有舉人投卷初甚欣慰及覽其詩有日暮猿啼旅思悽之句遽曰足下此句甚佳但上句對屬未切奉為改之何不云曉來犬吠張三婦日暮猿啼旅思悽舉人大慚而去五代史補何承裕晉天福末舉進士有清才而嗜酒狂逸為盩厔咸陽二縣令醉則露首跨牛趨府府尹王彥升以其名士而容之然為治清而不煩民頗安焉每覽牒訴必戲判以喻曲直訴者多心伏引去往往召豪吏接坐引滿吏因醉挾私白事承裕悟之笑曰此見罔也當受杖杖訖復召與飲其無檢多類此朱文苑趙鄰幾傳馮吉字惟一道子也性滑稽無操行周顯德中為太常少卿頗不得意以桮酒自娛每朝士宴集雖不召亦常自至酒酣即彈琵琶彈罷賦詩詩成起舞時人愛其俊逸謂之三絕上歐陽彬孟昹以為嘉州刺史喜曰青山綠水中為二千石作詩飲酒為風月主人豈不嘉哉蜀檮杌范純仁云或相勉以攝生之理不知人非久在世間物假如丁令威千歲化鶴歸鄉見城郭人民皆非則獨存亦何足樂蚩書劉表嘗自作書欲與孫伯符以示禰衡衡蚩之言如是為欲使孫策帳下兒讀之邪將使張子布見乎典略表嘗作上事極以為快衡見之便滅投地曰作此筆者為食飯不別傳管寧少便恬靜常笑邴原華歆有仕宦意及華為司徒上書讓寧寧聞之笑曰子魚本欲作老吏故榮之耳王太尉問眉子玄汝叔澄名士何以不相推重眉子曰何有名士終日妄語世說何處活阮裕聞何充為宰相嘆曰我當何處生活語林袁貞為監軍時范玄平汒為吏部尚書大坐語袁卿此還不失為護軍袁曰卿何事人中作市井聚溷謝幼輿謂周顗曰卿類社樹遠望之峨峨拂青天就而視之其根則群狐所託下聚溷而已答曰枝條拂青天不以為高群狐亂其下不以為濁聚溷之穢卿之所保何足自稱世說王右軍與王敬仁許玄度並善二人亡後右軍為論議更克孔巖誡之曰明府昔與王許周旋有情及逝沒之後無慎終之好民所不取右軍甚愧孫興公綽少與許詢俱有高尚之志嘗鄙山濤而謂人曰山濤吾所不解吏非吏隱非隱若以元禮比之龍津則當點額暴鱗矣晉書孫盛字安國與桓溫俱伐蜀還與溫牋而辭旨放蕩稱川遣從事觀採風聲進無威鳳來儀之美退無鷹鸇摶擊之用徘徊湘川將為怪鳥上吏部郎王忱與兄國寶命駕請之沙門法汰問朗曰見王吏部兄弟未朗曰非一狗面人心又一人面狗心者是邪忱醜而才國寶美而狠故也秦書王右軍在南丞相與書每歎子姪不令云虎㹠虎犢還其所如禇太傅南下孫長樂於船中視之言次及劉真長死孫流涕因諷詠曰人之云亡邦國殄瘁禇大怒曰真長平生何嘗相比而卿今日作此面向人謝鎮西書與殷揚州為真長求會稽殷答曰真長標同伐異俠之大者常謂使君降階為甚乃復為之驅馳邪袁虎伏滔同在桓公府桓公每遊燕輒命袁伏袁甚耻之恒歎曰公之厚意未足以榮國士與伏滔比肩亦何辱如之孫綽作列仙商邱子贊曰所物何物殆非真豬儻遇風雲為我龍攄時人多以為能王藍田語人云近見孫家兒作文道何物真豬也孫長樂兄弟就謝公宿言至款雜劉夫人在壁後聽之具聞其語謝公明日還問昨客何似劉對曰亡兄門未有如此賓客謝深有愧色世說王中郎與林公絕不相得王謂林公詭辨林公道王云箸膩顏帢𦅖布單衣挾左傳逐鄭康成車後問是何物塵垢囊上王北中郎不為林公所知乃箸論沙門不得為高士論大略云高士必在於縱心調畼沙門雖云俗外反更束於教非情性自得之謂也失鷹師王興道謂謝望蔡霍霍如失鷹師上和之也王僧達性好鷹犬何尚之致仕復膺朝命於宅設八關齋大集朝士自行香次至僧達曰願郎且放鷹犬勿復游獵僧達答曰家養一老狗放無處去已復還尚之失色南史去復還何尚之在家常著鹿皮帽及拜開府天子臨軒百僚倍位沈慶之於殿庭戲之曰今日何不著鹿皮冠慶之累辭爵命朝廷敦勸甚苦尚之謂曰主上虛懷側席詎宜固辭慶之曰沈公不效何公去而復還也尚之有愧色上孟顗嘗就徐羡之因敘關洛中事顗歎劉穆之終後更無繼者王弘亦在甚不平曰昔魏朝酷重張郃謂不可一日無之及郃死何關興廢顗不悅眾賓笑而釋之南史顏公顏延之嘗與何偃同從上南郊於路中遙呼延之曰顏公延之以其輕脫恠之答曰身非三公之公又非田舍之公又非君家阿公何以見呼為公偃羞而退南史顏延之每薄湯惠休詩謂人曰休上人制作委巷間歌謠耳何長瑜為臨川王義慶參軍嘗于江陵寄書與宗人何勗以語序義慶州府僚佐陸展等而輕薄少年遂演而廣之凡厥人士並為題目皆加劇言苦句其文流行乂慶大怒除為增城令宋書謝靈運傳賣袁劉司徒禇彥回送湘州刺史王僧虔閣道壞墜水僕射王儉嘗驚跣下車謝超宗拊掌笑戲曰落水三公墜車僕射彥回出水霑濕狼籍超宗先在僧慶航抗聲曰有天道焉天所不容地所不受投畀河伯河伯不受彥回大怒曰寒士不遜超宗曰不能賣袁劉得富貴焉免寒士前後言誚稍布朝野南史羞面見人劉祥字顯徵少好文學性韻剛踈輕言肆行不避高下司徒禇淵人朝以腰扇鄣日祥從側過曰作如此舉止羞面見人扇鄣何益淵曰寒士不遜祥曰不能殺袁劉安得免寒士永明中作連珠有以啟上者令任遐奏祥飲酒無度言語闌逸非可稱紙墨上敕曰卿位涉清塗於分非屈何意輕肆口噦詆目朝士造席立言必以貶裁為口實諠議朝廷不避尊賤肆口極辭彰暴物聽近見卿影連珠寄意悖慢彌不可長齊書大明時皇太子冠上臨宴東宮與顏師伯柳元景沈慶之等並摴蒱愍孫勸師伯酒師伯不飲愍孫因相裁辱曰不能與佞人周旋師伯見寵於上上常嫌愍孫以寒素陵之因此發怒曰袁濯兒不逢朕員外郎未可得也而敢寒士遇物將手刃之命引下席愍孫色不變沈柳並起謝久之得釋南史張暢以䧟南譙王義宣見原孝武宴朝陽暢亦在坐何偃因醉曰張暢故是奇才同義宣作賊亦能無咎非才何以致此暢乃厲聲曰太初之時誰黃其閤帝曰何事相苦初元凶時偃父尚之為元凶司空義師至新林門生皆逃尚之父子與婢妾共洗黃閤故暢譏之張敬兒拜開府儀同王敬則戲之呼為禇彥回敬兒曰我馬上所得終不能作華林勳閤也敬則甚恨焉南史范鎮字子真不信因果著神滅論出朝野諠譁子良集僧難之而不能屈太原王琰乃著論譏縝曰鳴呼范子曾不知其先祖神靈所在欲杜縝後對縝又對曰嗚呼王子知其先祖神靈所在而不能殺身以從之其險詣皆此類也上韋粲字長倩為右衛率領直頗擅權誕倨不為時輩所平右衛朱異嘗於酒席厲色謂粲曰卿何得色作領軍面向人初韋黯為太僕卿而兄子粲為左衛率黯以常怏怏謂人曰韋粲已落驊騮前朝廷是能用才不識者頗以此闚之柳津字元舉慶遠子也雖乏風華性甚強直人或勸之聚書津曰吾常請道士上章驅鬼安用此鬼名耶張纘字伯緒負其才氣無所與讓定襄侯祇無學術頗有文性與兄衡山侯恭俱為皇太子愛賞時纘從兄謐聿並不學問性又凡愚恭祇嘗預東宮盛集太子戲纘曰丈人謐聿皆何在纘從容曰纘有謐聿亦殿下之衡定太子色慚或云纘從兄聿及弼愚短湘東王在坐問纘曰大人二從聿弼藝業何如纘曰下官從弟雖並無多猶賢殿下之有衡定舉坐愕然南史胡叟於高允館見中書侍郎趙郡李璨璨被服華靡叟貧老衣褐璨頗忽之叟謂之曰老子今若相許脫體上袴褶衣幆君欲作何計也譏其惟假盛服璨惕然失色魏書孫搴字彥舉學淺行薄邢邵嘗謂曰卿更須讀書孫曰我精騎三千足敵君羸卒數萬搴嘗服棘刺丸李諧詼之曰卿應自足何假外求坐者皆笑北史雄狐畢義雲家富于時恣情驕侈門門穢雜聲偏朝野為郎時與左丞宋游道因公事忿競游道廷辱之云雄狐之詩千載為汝義雲一無所答徐之才父雄祖成伯並善醫術世傳其業祖孝徵戲之呼為師公之才曰既為汝師復為汝公在三之義頓居其兩之才嘗以劇談調魏收收熟視之曰面似小家方相之才答曰若爾便是卿之葬具談藪徐之才聰辨強識尤好劇談李諧於廣坐因稱其父名曰卿嗜熊白生否之才曰平耳又曰卿此言於理乎否諧遽出避之道逄其甥高德正德正曰舅顏色何不否諧告之故德正徑造坐席連索熊白之才謂坐者曰箇人諱底眾莫知之才曰生不為人所知死不為人所諱此何足問唐邕白建方貴時人言云并州赫赫唐與白之才蔑之元日對邕為諸令史祝曰見卿等位當作唐白又以小史好嚼筆故嘗執管就元文遙口曰借君齒其不遜如此北齊書魏收叔季景有文學歷官著名並在收前然收常所欺忽季景收初赴并頓邱李庶者故大司農諧之子也以華辨見稱曾謂收曰霸朝便有二魏收率爾曰以從叔見比便是邪輸之比卿邪輸者故尚書令陳留公繼伯之子愚癡有名好自入市肆高價買物商賈共所嗤玩收忽以季景方之不遜例多如此北史祖孝徵珽所乘老馬自稱騮駒又與寡婦王氏姦通每人前相聞往復裴讓之與珽早狎嘗於眾中嘲珽曰卿那得如此詭異老馬十歲猶號騮駒姦耳順上稱娘子于時喧然傳之梁庾信從南朝初至北方文士多輊之信將枯樹賦以示於眾後無敢言者時溫子昇作韓陵山寺碑信讀而寫其本南人問信曰北方文士何如信曰唯有韓陵山一片石堪共語薛道衡盧思道少解把筆其餘驢鳴狗吠聒耳而已朝野僉載疥駱駞劉晝字孔昭制一首賦以六合為名自謂絕倫乃歎儒者勞而寡功曾以賦呈魏收而不拜收忿之謂曰賦名六合已是太愚文又愚於六合君四體又甚於文晝不忿又以示邢子才子才曰君此賦正似疥駱駞伏而無娬媚晝常自謂博物奇才言好矜大每言使我數十卷書行於後世不易齊景之千駟也北史何妥字棲鳳性勁急有口才好是非人物蘇威時兼五職上親重之威先嘗隱武功妥奏云今當官之人不度德量力既無呂望傅說之能自負傳巖渭水之氣不慮憂深責重惟畏聰領不多書奏威大銜之二年威定考文學妥更相訶詆威勃然曰無何妥不慮無博士妥應聲曰無蘇威亦何憂無執事於是與有隙隋書蕭頴士李林甫採其名欲援用之乃召見時頴士寓廣陵居母喪即縗麻而詣京師徑謁林甫於政事省林甫素不識遽見縗麻大惡之即令斥去頴士大忿乃為伐櫻桃賦以刺林甫云擢無庸之瑣質蒙本枝而自芘洎群林而非據專朝廷之右地雖先寢之或薦豈和羹之正味其狂率不遜皆此類也舊唐頴士開元二十三年及第恃才傲物曼無與比常自攜一壺逐勝郊野偶憇於逆旅獨酌獨吟會有風雨暴至有紫衣老人領一小僮避雨於此頴士見之散冗頗肆陵侮逡巡風定雨霽車馬驟至老人上馬呵殿而去賴士倉忙覘之左右曰吏部王尚書也頴士常造門未之面極驚愕明日具長牋造門謝罪命引至廡下坐責之且曰所恨與子非親屬常庭訓之耳頃曰子負文學之名踞忽如此止於一第乎頴士終楊州功曹妄貶李詳字審已有才華膽氣故蕩不羇解褐鹽亭尉詳在鹽亭因考為錄事參軍所擠詳謂刺史曰錄事恃糺曹之權當要害之地為其妄褒貶耳若使詳秉筆亦有其詞刺史曰公試論錄事考狀遂授筆詳即書錄事考曰怯斷大按好勻小稽自隱不清言他總濁階前兩兢鬥悃方休獄裏囚徒非赦不出天下以為談笑之最焉御史臺記韓十八愈直是太輕薄謂李二十六程曰某與丞相崔大群同年往還直是聰明過人李曰何處是過人者韓曰共愈往還二十餘年不曾共說著文章此豈不是敏慧過人也韓愈初貶之制舍人席夔謂之詞曰早登科第亦有聲名席既物故友人多言曰席無令子弟豈有聲陰毒傷寒而與不潔喫耶韓曰席十八喫不潔太遲人問之曰何也曰出語不是蓋忿其責辭云亦有聲名耳劉賓客家話裴勛容貌么麼而性尤率易慈恩寺連接曲江及京輦諸境每歲新得第者畢列姓名于此勛常與親識游見其父及諸家牓率多物故謂人曰此皆鬼錄也玉泉牛不勝載唐進士曹唐遊仙詩才情縹緲岳陽字李遠每吟其詩而思其人一日曹往謁之李倒屣而迎曹儀質充偉李戲之曰昔者未見標儀將謂可乘鸞鶴此際拜見安知壯水牛亦恐不勝其載時人聞而笑之北夢瑣言宣宗愛唱菩薩蠻詞狐楚假溫庭筠新撰密進之戒令勿泄而遽言於人由是踈之溫亦有言云中書內坐將軍譏相國無學也北夢瑣言大中中孝太尉三貶至朱崖時在兩制者皆為擬制往往有俗傳之制云蛇用兩頭狐搖九尾鼻不正而身其正眼既斜而心亦斜此仇家謗也南部新書薛能會昌間進士自負過高從事西川日每短諸葛功業為詩曰陣圖誰許可廟貌我揶揄又云焚却蜀書宜不讀武侯無可律吾身譏李白曰我生若在開元日爭遣名為李翰林又曰李白終無取陶潛固不刊自題其集云詩源何代失澄清四方聯絡盡蛙聲咸通中荊州書生號唐五經學識精博常謂人曰不肖子弟有三變第一變為蝗蟲謂鬻莊而食也第二變為蠹魚謂鬻書而食也第三變為大蟲謂賣奴婢而食也三食之輩何代無之北夢瑣言張曙與杜荀鶴同年嘗醉中謔荀鶴曰杜卜幸而大榮荀鶴曰何榮曙曰與張五十郎同年爭不榮荀鶴應聲答曰是公榮小子爭得榮曙笑曰何也荀鶴曰天下祇知有杜荀鶴阿沒處知有張五十郎摭言李山甫咸通中不第後流落河朔為樂彥禎從事多怨朝廷之執政嘗有詩云勸君不用誇頭角夢裏贏輸㹅未真南部新書丹砂丸光啟中蔣嶓以丹砂授善和韋中令張鵠吳人有文而不貧或刺之曰張鵠只消千馱絹蔣嶓唯用一丸丹摭言漢賈緯文筆未能過人而議論剛強儕類不平之目之為賈鐵嘴受詔脩高祖實錄誣桑維翰身沒之日有白金八千鋌又以所撰日歷示監修王峻皆媒孽豆貞固蘇禹珪之短歷詆朝士之先達者峻惡之謂同列曰賈給事家有子亦要門閥無玷今滿朝並遭非毀教士子何以進身乃於太祖前言之出為平盧行軍司馬續世說笑端禮部尚書崔貽孫年過八十求進不休囊中乏資素有貯積性好于人喜得小惠左降之後二子爭財旨甘醫藥咸不供侍書責其子曰生有明君真宰死有天曹地府無老朽豈放爾耶為縉紳之笑端北夢瑣言韓昭仕王蜀至禮部尚書文思殿大學士粗有文章至於琴棋書算射法悉皆涉獵以此承恩於後主有朝士李台嘏曰韓八座事藝如拆襪線無一條長時人題之瑣言昭字德華長安人衍北巡以為文思殿學士京城留守判官李台嘏云韓公凡事如僧剃髮無有寸長蜀史檮杌宋齊丘自署碑碣每求韓熙載寫之熙載以紙塞鼻或問之對曰文臭而穢南唐書孫晟字文達又名忌與馮延已並相元宗晟輕延已為人嘗曰金碗玉盃而盛狗尿可乎南唐忌鄙延已謂人曰玉巵象甌盛穢鷄樹鳳池棲集梟翟遂即罷相江南野史落韻詩唐介為臺官時言文潞公燈籠錦獻張貴妃事上怒甚謫春州李承之送以詩有去國一身輕似葉高名千古重如山並遊英俊顏何厚未死奸諛骨已寒之句後介用潞公薦官於朝廷無所言承之以書從介索所送詩介無以報取詩還之曰我固不用落韻詩也以山寒二字韻不同故云卲氏聞見錄劉貢父為給事中時學士鄭宏中穆表請致仕狀過門下省劉謂同舍曰宏中請致仕為年若干也答者曰鄭年七十三矣劉遽云慎不可遂其請問曰何故也劉曰且留取伴八十四底時潞公年八十四再起或云潞公聞之甚不懌明道雜志劉貢父晚年得惡疾鬚屑墜落鼻梁斷壞苦不可言一日與東坡會飲心各引古人一聯相蘇子瞻遽言曰大風起兮眉飛揚安得猛士兮守鼻梁坐中大噱貢父默然無言但感愴而已事林廣記東坡一日會客坐客舉令欲以兩卦名證一故事一人云孟嘗門下三千客大有同人一人云光武兵渡滹沱未濟既濟一人云劉寬婢羹汗朝衣家人小過東坡云牛僧孺父子犯罪先斬小畜後斬大畜蓋指荊公父子也唾王集司馬溫公薨時程正叔以臆說歛之正如封角狀東坡嫉其怪妄因怒詆曰此其信物一角附上閻羅大王者耶寓簡吳堯卿為高駢知揚州兼摧糴使盜用塩鐵錢六十萬緡及廣陵城䧟軍人識者堯卿咸請啗之夜堯卿以他服而遁至楚州遇變為仇人所殺棄屍衢中其妻以紙絮葦棺歛之未及就壙好事者題其上云信物一角附至阿鼻地獄請去斜封送上閻羅大王時人以為笑端廣陵妖亂志劉臻字宣摯性恍惚耽悅經事世事多所遺忘時有劉訥者與臻俱為儀同臻住城南訥住城東臻嘗欲尋訥謂從者汝知劉儀同家乎從者不知尋訥謂臻還家答曰知於是引之而去既扣門臻尚未悟謂至訥家乃據鞍大呼曰劉儀同可出矣其子迎門臻驚謂曰汝亦來耶其子答曰此是大人家於是顧盼久之乃悟因叱從者曰汝大無意吾欲造劉訥耳北史王皓字季高少立名行性懦緩嘗從文宣北伐乘赤馬旦蒙霜氣遂不復識自言失馬虞侯為求不得須臾日出馬體霜盡繫在幕前方云我馬尚在北史郗昂與韋陟交善因話國朝宰相誰最無德昂誤對曰韋安石也已而驚走而去逢吉溫於街中溫問何故蒼惶如此答曰適與韋尚書話國朝宰相最無德者本欲言吉頊誤言韋安石既言又鞭馬而走扺房相之第琯執手慰問之復以房融為對昂有時稱忽一日犯三人舉朝嗟嘆唯韋陟遂與之絕國史補貞元中給事中鄭雲逵與國醫王彥伯鄰居嘗有蕭俛求醫誤造雲逵雲逵為診之曰熱風頗甚又請藥方雲逵曰藥方即不如東家王供奉俛既覺失錯驚遽趨出是時京師有乖儀者曰熱風而已裴子羽為下邳令張晴為縣丞二人俱有聲氣而善言語曾論事移時吏人竊相謂曰縣官甚不和長官稱雨贊府即道晴贊府稱晴長官即道雨終日如此不和封氏見聞以姓相弄陽伯博任山南一縣丞其妻陸氏名家女也縣令婦姓伍他日會諸官之婦既相見縣令婦問贊府夫人何姓答曰姓陸次問主簿夫人答曰姓漆縣令婦勃然入內諸夫人不知所以欲却回縣令聞之遽入問其婦婦曰贊府婦云姓陸主簿婦云姓漆以吾姓伍故相弄耳餘官婦賴吾不問必曰姓八姓九令大笑曰人各有姓何如此復令其婦出封氏見聞唐司空于順以樂曲有想夫憐其名不雅將改之客有笑曰南朝相府曾有瑞蓮故歌為相府蓮自是後人語訛乃不改國史補舊說董仲舒墓門人至皆下馬謂之下馬陵語訛為蝦墓陵今荊襄之人呼提為提留絳之人呼釜為付皆訛謬所習也上方口尖口唐之進士有姓單者就試有司司誤書為單生訴曰雖則陋宗然姓氏不欲為人所轉易乞改正之有司曰方口尖口亦何足辨單生曰若不足辨則台州吳兒縣改作荊州矣兒縣可乎主司無以應善謔集有一野廟中繪后稷母踐巨人跡及生稷棄之及岐嶷種樹長乞穀種於神農神農使馬皇載穀種賜之乃畫水蛭無數謂馬皇也水蛭一名馬皇爾雅翼陳州城外有厄臺寺乃夫子絕糧之地今其中有一字王佛云是孔子像舊榜文宣王因風雨洗剽但存一王字而什子附會為一字王佛也其侍者冠服猶是顏淵之狀如杜甫之作十姨天下如是者並不可勝數鷄肋篇溫州有土地杜十姨無夫五撮鬚相公無婦州人迎杜十姨以配五撮鬚合為一廟問杜十姨為誰曰杜拾遺也五撮鬚為誰曰五子胥也席上腐談南中有一泉多有桂葉流出因名流桂泉後乃立屋其上為漢祖廟而祠之又有胥廟者其像分其鬚謂之五髭鬚並有靈應也國史補江陵有村民事伍子胥神誤呼五髭鬚乃書五丈夫皆祝呼之祭云一髭鬚二髭鬚至五髭鬚北夢瑣言有自中原來者北方有牛王廟百牛於壁而牛王居其中問牛王為何人乃冉伯牛也伯牛乃為牛王腐談襄州漢高祖廟本為交甫解佩於漢之義今為高祖悞也傳載河南廣武山有流桂泉史思明於其上立漢高廟上文州有橋曰陰平淳熙初有為郡守者大書立石於橋下曰鄧艾取蜀路過者笑之老學菴記錢王名其居曰握髮殿吳音握惡相亂錢塘人遂謂其處曰此大王惡發殿也上彭郎小姑江南有大小山巍然獨立而世俗轉孤為此江側有一石磯謂之澎磯遂轉為彭郎磯云彭郎小姑婿也小孤山廟像一婦人勑額為聖母廟西京龍門山夾伊水上有湍闕望之如雙闕故謂之闕塞而山口有廟謂之闕口廟其像甚勇手持刀按膝而坐曰豁口大王歸田錄曹橾與孔融既積嫌忌而郗慮復搆成其罪遂令路粹枉狀奏融曰融昔在北海見王室不靜而招合徒眾欲規不執云我大聖之後而見滅於宋有天下者何必卯金刀又融為九列不遵朝議禿巾微行唐突宮掖又前與白衣禰衡跌蕩放言云父之於子當有何親論其本意實為情欲發耳子之於母亦復奚親譬如寄物瓶中出則離矣既而與衡更相贊揚衡謂融曰仲尼不死融答曰顏回復生大逆不道宜極重誅書奏下獄棄市後漢書種會為司馬大將軍兄弟所暱聞嵇康名而造焉會名公子以才能貴幸乘肥衣輕賓從如雲康方箕踞而鍜會至不為之禮魏氏春秋移時不交一言鍾起去康曰何所聞而來何所見而去鍾曰聞所聞而來見所見而去世說康與東平呂安親善安罹事康詣獄以明之鍾會庭論康曰今皇道開明四海風靡邊鄙無詭隨之入街巷無異口之議而康上不臣天子下不事王侯輕時傲世不為物用無益於今有敗於俗昔太公誅華士孔子戮少正卯以其負才亂群惑眾也若不誅康無以清潔王道於是錄康上成都王頴長史盧志與機弟雲趣舍不同又黃門孟玖求為邯鄲令於頴頴教付雲雲時為左司馬曰刑餘之人不可以君民玖聞此怨雲與志讒搆日至及機於七里澗大敗玖誣機謀反所致頴乃使牽秀斬機軍士莫不㳅涕是日天地霧合大風折本平地尺雪別傳初陸抗誅步闡百口皆盡有識尤之及機雲見害三族無遺干寶晉紀孝武甚親敬王國王雅雅薦王珣於帝帝欲見之嘗夜與國寶及雅相對帝微有酒色令喚珣垂至已聞卒傳聲國寶自知才出珣下恐傾奪其寵因曰王珣當今名流陛下不宜有酒色見之自可別詔召也帝然其言心以為忠遂不見珣世說王緒數讒殷荊州於王國寶殷其患之求術於王東亭曰卿但數詣王緒往輒屏人因論它事如此則二王之好離矣殷從之國寶見王緒問曰比與仲堪屏人何所道緒云故是常往來無它所論國寶謂緒於已有隱果情好日踈讒言以息上因輕見讒謝朓輕江祏為人祏常詣朓朓因言有一詩呼左右取既而便停祏問其故云定復不急祏以為輕已後祏及弟祀劉渢劉晏俱候朓朓謂祏曰可謂帶二江之雙流以嘲弄之祏轉不堪至是搆而害之臨終謂門賓曰寄語沈公君方為三代史亦不得見沒南史徐摛梁武帝問以經史百家未論釋教摛商較縱橫應答如響帝加歎異寵遇日隆朱异不悅謂所親曰徐叟出入兩宮漸來見逼我須早為之所遂乘間白帝曰摛年老又愛泉石意在一郡帝謂摛欲之乃召摛曰新安大好山水任昉等並經為之卿為我臨此郡遂出為新安太守上豐水草道武寵待李順政無巨細無所不參崔浩惡之順凡使涼州十二回太武稱其能而蒙遜數與順游宴頗有悖言恐順泄之以金寶納順懷中故蒙遜罪釁得不聞又西域沙門曇無懺有方術右涼州詔追之順受蒙遜金聽殺之浩密言於帝帝未之太延五年議征涼州順以涼州乏水草不宜遠征崔浩固以為宜征帝從浩議及至姑臧甚豐水草帝與景穆書頗嫌順後謂浩曰卿昔所言今果驗矣克涼州後聞受蒙遜金而聽其殺曇無懺益嫌之後以差群臣爵位頗受納品第不平涼州人徐桀發其事浩又毀之帝大怒刑順於城西順死後數年其從父弟孝伯為太武知重居中用事及浩誅帝怒甚謂孝伯曰卿從兄往雖誤國語意亦未至此田浩遂殺卿從兄北史浩搆李順事互見夢部彭城王勰有功于國尚書令高肇性兇愎其兄女入為夫人順皇后崩帝欲以為后勰固執以為不可肇憾之引魏偃高祖珍證其逆謀永平信之召勰宴于禁中酖殺之云過醉而薨勰妃李氏司空冲之女也號哭曰高肇枉害忠良如使天道有靈汝亦行當如我及肇誅復於此室論者知有報應焉魏書高隆之見信神武性陰毒儀同三司崔孝芬以結婚姻不果太僕卿任集同加營搆頗相乖異瀛州刺史元晏請託不遂並搆成其罪誅害之終至家門殄滅論者謂有報應焉北史諸葛頴煬帝所親倖出入臥內帝每賜之曲宴輒與皇后嬪御連席共榻頴因間隙多所譖毀時人謂之冶葛續世說李靖破突厥禽頡利溫彥博害其功譖靖軍無綱紀致令虜中奇寶散於亂兵之手太宗大加貴之未幾太宗謂靖曰前有人讒公今朕意已悟公勿以為懷舊唐太宗自遼東還發定州在道不康劉洎與中書令馬周入謁洎周出禇遂良傳問起居洎泣曰聖體患臃極可憂懼遂良誣秦曰洎云國家之事不足慮正當傳少主行伊霍故事大臣有異志者誅之自然定矣太宗疾愈詔問其故洎以實對又引馬周以自明周對與洎同遂良又執證不已乃賜洎自盡舊唐許敬宗既助立武后遂謀䧟長孫無忌遣人上封事稱監察御史李巢與無忌交通謀反帝令敬宗鞫之敬宗云無忌與先朝謀取天下眾人服其智作宰相三十年百姓畏其威攘裌一呼嘯命同惡必為宗廟深憂又引漢文帝薄昭事帝听其說流黔州敬宗又遣大理正袁公瑜就黔州重鞫無忌反狀公瑜逼無忌令自縊本傳高宗欲立武昭儀為后禇遂良固執不可后立左遷遂良為潭州都督轉桂州都督許敬宗李義府奏言長孫無忌所搆逆謀並遂良扇動本傳又希皇后之旨奏遂良潛謀不軌以桂州用武之地故授遂良桂州刺史實以為外援於是更貶為愛州刺史韓瑗傳長孫無忌禇遂良與江夏王道宗有宿怨誣與房遺愛善流義州道病死無忌以吳王恪地親望高中外所向以遺愛事譖殺之以絕人望恪曰使社稷有靈無忌族滅遂良亦譖殺劉洎陵高宗欲立武氏無忌遂良不從無忌貶黔州自殺遂良貶愛州而卒吉凶影響錄事具新唐書唐宗室吳國公孝逸有破徐敬業之功時望益重武承嗣深忌之使人誣告孝逸自云走遶兔兔常在月中月既近天合有天分則天以孝逸常有功臧死配徒儋州尋卒續世說召飲擇人武后禁屠殺右拾遺張德生男三日私殺羊會同僚補闕杜肅懷一餤上表告之明日太后對仗謂德曰聞卿生男甚喜德拜謝太后曰何從得肉德叩頭服罪太后曰朕禁屠宰吉凶不預然卿自今召客亦須擇之出肅表示之肅大慚舉朝欲唾其面上嚴挺之為絳郡太守玄宗欲進用之李林甫忌嫉召梃之弟損之至門敘故舊云當以子為員外郎又云聖人待賢兄極深須作一計入京既見當有大用令損之取絳郡一狀云有少風氣乞入京師就毉林甫持狀奏云梃之年高近患風氣且授與一閑官玄宗歎咤久之林甫奏授員外詹事便令東京養疾盧杞忌張鎰名重道直無以䧟之以方用兵西邊杞乃偽請行上固以為不可因薦鎰以中書侍郎為鳳翔隴右節度使鎰竟為亂兵所殺舊唐殿中侍御史鄭儋與張鎰善每伺杞晝眠輒詣鎰杞知之他日杞假寢佯熟伺詹果來方與鎰語杞遽至鎰閤中詹趨避杞杞遽言密事鎰曰殿中鄭侍御在此杞佯愕曰向者所言非他人所宜聞時三司使方按詹郢獄未具而奏殺詹貶郢為驩州刺史鎰尋罷相出鎮鳳翔上養俠上清者竇參女奴也參流驩州沒入家資名掖庭後在德宗左右問曰竇參之財何止養俠刺兼亦甚大有贓污前時納官銀器至多上清流涕曰參自御史中丞歷宰相首尾六年月入數十萬賞賜不知紀極迺者郴州所送納官銀器皆是恩賜當部錄日妾在郴州親見州縣希陸贄恩旨盡刮去所進銀器上刻藩鎮官銜姓名誣為贓物伏乞下驗之於是宣索竇參沒官銀器覆視其刮字處皆如清言時貞元十二年德宗又問養俠刺事上清曰本實無此悉是陸贄䧟害使人為之德宗至是大悟因怒陸贄曰老僚奴我脫却伊綠衫便與紫看又常呼伊作陸九我任使竇參方稱意次須教我枉殺却他及至權入伊手其為軟弱甚於泥團乃下詔雪竇參時裴延齡探知陸贄恩衰得恣行媒乘間攻之贄意受譴不回後上清特敕削丹書度為女道士終嫁為金忠義妻世以陸贄門生名位多顯達者世不敢傳說故此事絕無人知異聞集李晟平朱泚之亂德宗覽收城露布曰臣已肅清宮禁祇謁寢園鍾簴不移廟貌如故上感涕失聲左右六宮皆嗚咽露布乃于公異之辭也議者以朝廷捷書露布如無此者公異後為陸贄所忌誣以家行不謹賜孝經一卷故坎坷而終國史補人士惜其才惡贄之褊急焉舊唐唐次無故貶斥久滯蠻荒孤心抑鬱乃采自古忠賢遭罹放逐雖至殺身而君猶不悟著書三篇謂之辨謗略上之德宗省之猶怒謂左右曰唐次乃方吾古之昏主憲宗即位召還累官至中書舍人憲宗因閱書禁中得次所上三篇善之謂學士沈傳師曰唐次所上辨謗書人君宜時觀覽朕疑編錄未盡命傳師廣為十卷號元和辨謗略其序曰聖德先辨謗何由興續世說李逢吉字虛舟天與姦回妬賢傷善結朝臣之不逞者造作謗言百端中傷裴度賴李紳韋處厚殺解逢吉結王守澄澄言於敬宗誣紳曾請立深王為太子乃貶紳端州司馬朝士代逢吉鳴吠者張又新李續之張權輿劉棲楚李虞程昔範姜洽李仲言時號八關十六子又新等八人居要劇而胥附者又八人上李逢吉惡李紳張又新李續之劉棲楚為之鷹犬同嗾紳貶端州司馬朝臣表賀又至中書賀宰相及門門者止之云張補闕在相公齊內俄而又新揮汗而出旅揖群官曰端溪之事又新不敢多讓人皆辟易憚之與續之等時號八關十六子續世說裴度有用兵伐叛之功皇甫鏄心疾之與李逢吉令狐楚合勢擠度出鎮大原崔群有公望為搢紳所重屢言時政之弊鏄惡之因議憲宗尊號乃奏曰昨群臣議上徽號崔群於陛下惜孝德兩字憲宗怒黜群為湖南觀察使舊唐韓愈至潮州上表帝感悔欲復用之鏄素忌愈直即奏言愈終狂踈可且內移乃改袁州刺史新唐負婦人齊桓公多內寵內嬖如夫人者妻姑姊妺七人負婦人而朝諸侯管仲告諸侯吾君背有疽創不得婦人創不衰愈論衡桓公宮中女市女子七百國人非之管仲故為三歸之家以掩桓公非自傷于民也戰國策夏姬者陳大夫徵舒母也狀美好老而復壯者三三為王后諸侯爭之莫不迷惑陳靈公與孔甯儀父皆通焉或衣其衣或裝其幡蔽膝以戲於朝列女傳秦宣太后愛魏醜夫太后病將死出令曰為我葬必以魏子為殉魏子患之庸芮為魏子說太后曰以死者為有知乎太后曰無知也曰若太后之神靈明知死者之無知矣何為空以生所愛葬於無知之死人哉若死者有知先王積怒之日久矣太后救過不贍何暇乃私魏醜夫乎太后曰善乃止戰國策晉劉寶字道真子婦始入門遣婢修度劉聊之甚苦婢固不從劉乃下地叩頭婢懼而從之明日語人曰手推故是神物一下而婢子服淫語林顏延之有愛姬非姬食不飽寢不安姬憑寵嘗盪延之墜床致損竣殺之延之痛惜甚至常坐靈上哭曰貴人殺汝非我殺汝以冬日臨哭忽見妾排屏風以壓延之延之懼墜地因病南史王鸚鵡東陽公主應閣婢也初公主有奴陳天興鸚鵡養以為子而與之淫通鸚鵡天興並與元凶劭巫蠱事公主薨劭慮言語泄嫁與始興王濬府佐沈懷遠為妾後事泄上驚惋即收鸚鵡家得劭濬手書皆咀呪巫蠱之言劭行弒逆既敗妻殷氏賜死於廷尉臨刓謂獄丞江恪曰汝家骨肉相殘何以枉殺天下無罪人恪曰受拜皇后非罪而何殷氏曰此權時耳當以鸚鵡為后也懷遠坐納鸚鵡孝武徙之廣州兄懷文因此失調為治書侍御史南史劭懷文傳鸚鵡娥如袞露紅鏡前眉樣自新宮稍教得以紅兒貌不嫁南朝沈侍中比紅兒詩張瓌字祖逸還吳後居室豪富伎妾盛房或有譏其衰暮畜伎瓌曰我少好音律老而方解平生嗜欲無復一存唯未能遣此耳南史元魏孝武帝之在洛也從姊不嫁者三一曰平原公主明月南陽王寶炬同產也二曰安德公主清河王懌女也三曰蒺藜亦封公主帝內宴令諸婦人詠詩或詠鮑照樂府曰朱門九重門九閨願逐明月入君懷帝既以明月入關蒺藜自縊宇文太使元氏諸王取明月殺之本紀殺婢葬代神武欲至洛陽京兆王昂弟仲景遂棄妻子追駕至長安封順陽王仲景既失妻子乃娶故爾朱夫光妻也列氏本倡女有美色仲景甚重之經數年前妻叔袁紇氏自洛陽間行至也列遂徙居異宅久之有姦事露詔仲景殺之仲景寵情愈至謬殺一婢蒙其屍首重葬以代焉後謀殺袁紇奴告周文帝周文依奏詔苦仲景一百也列以自告而逐之仲景猶私不已又有告者詔重笞一百官爵盡陳仲景仍通焉後周文奏復官爵也列袁紇於是同居北史琅邪公主名玉儀魏高陽玉斌庶生妺也文襄遇諸途悅而納之遂被殊寵奏魏帝封焉文襄謂崔季舒曰爾由來為我求色不如我自得一絕異者崔暹必當造直諫我亦有以待之及暹諮事文襄不復假以顏色居三日暹懷刺墜之於前文襄問何用此為暹悚然曰未得通公主文襄大悅把暹臂入見焉季舒語人曰崔暹常忿吾佞在大將軍前每言叔父合殺及其自作體佞乃體過於吾主儀同產姊靜儀先適黃門郎崔括文襄亦幸之皆封公主括父子由是超授賞賜甚厚焉上高洋兇暴貴嬪薛氏有小過遽殺之解之抱其股為琵琶彈之復嘆曰佳人難再得獨異志文宣薛嬪者本倡家女也年十四五時為清河王岳所好其父求內宮中大被嬖寵其姊亦俱進御文宣後知先與岳通又為其父乞司徒公帝大怒先銘殺其姊薛嬪當時有娠過產亦從戮北史臨賀王正德妺長樂主適陳郡謝禧正德姦之燒主第縛一婢加玉釧於手以金寶附身聲云主被燒死檢取婢屍并金王葬之仍與主通呼為柳夫人生二子焉日月稍久風聲漸露南史畢乂雲酷暴殘忍有孽子善昭與其侍婢姦通榜掠無數為其著籠頭繫之庭樹食以芻秣十餘日乃仆之夜中乂雲被賊害即善昭所佩刀也北史天后時張昌宗得幸又薦其兄易之傳粉施朱衣錦繡服俱承辟陽之寵置奉宸府以易之為令令選美少年為左右奉宸供奉右補闕朱敬則上疏云陛下內寵已有薛懷義張易之昌宗固應足矣近聞尚舍奉御柳模自言子良賓潔白美鬚眉左監門衛長史侯祥云陽道壯盛過於懷義堪奉宸內供奉無禮無儀溢于朝聽則天勞之曰非卿直言朕不知此賜綵百叚易之舊傳閩主王曦納金吾使尚保殷之女為賢妃有殊色曦嬖之醉中妃所欲殺則殺之所欲宥則宥之世說出館虞集未遇時為許衡門客虞有所私午後輒出館許每往不遇病之因書於簡云夜夜出游知虞公之不可諫虞回即對云時時來擾何許子之不憚煩許明日又至見而嘆賞遂荐於朝耕餘博覽許虞相去甚遠蓋誤襄二十七年齊慶封來聘其車美叔孫曰豹聞之服美不稱必以惡終美車何為叔孫與慶封食不敬為賦相鼠亦不知也次年來奔叔孫穆子食慶封慶封汜祭穆子不說使工為之誦茅鴟亦不知左傳王子建出守於城父與成公乾遇於疇中問曰是何也成公乾曰疇也疇也者何也所以為麻也麻者何也曰所以為衣也成公乾曰昔者莊王伐陳舍於有蕭氏謂路室之人曰巷其不善乎何溝之不浚也莊之猶知巷之不善溝之不浚今吾子不知疇之為麻麻之為衣吾子其不主社稷乎王子果不立說苑范氏之亡也百姓有得鍾者欲負而走則鍾大不可負以椎毀之鍾况然有音恐人聞之而奪已也遽揜其耳惡人聞之可也惡已自聞之悖矣呂自知楚人有涉江者其劍自舟中墜於水遽契其舟曰是吾劍之所從墜舟止從其所契者入水求之舟已行矣而劍不行求劍若此不亦惑乎上齊湣王亡居衛謂公王丹曰我何如主也王丹對曰王賢主也臣聞古人有辭天下而無恨色者臣聞其聲於王而見其實王名稱東帝實辨天下去國居衛容貌充滿顏色發揚無重國之意王曰甚善丹知寡人寡人自去國居衛也帶益三副矣過自理人之目以照見之也瞑者目無由接而言見戎人見暴布者而問之曰何以為之莽莽也指麻而示之怒曰孰之壤壤也可以為之莽莽也知接圈鹿欄牛楊子雲作法言蜀富人賫錢千萬願載於書子雲不聽夫富無仁義之行圈中之鹿欄中之牛也安得妄載論衡失史孝明之世讀蘇武傳見武官名曰移中監以問百官百官不知論衡漢司徒崔烈辟上黨鮑堅為掾將謁見自憂不過問先到者儀適有答者曰隨典儀口唱既謁見曰可拜堅亦曰可拜讚者曰就位堅亦曰就位因復著履上坐將離席不知履所在讚者曰著腳堅亦曰履著腳也咲林後漢葛龔字元甫善文奏或有人請龔奏于人者龔為作之其人忘自載其名并寫龔名以進時語曰作奏雖工宜去葛龔裴榮期語林魏人夜暴疾命門人鑽火是夕陰瞑督迫頗急門人忿然曰君責人亦大無理今闇如漆何以不把火照我當得覔鑽火具然後易得耳孔文舉聞之曰責人當以其方也笑林司馬文王與劉禪宴為之樂故蜀技旁人皆為之感愴而禪喜笑自若王謂賈充曰人之無情乃可至於是乎雖使諸葛亮在不能輔之久全而况姜維邪充曰不如是殿下何由并之他日王問禪曰頗思蜀否禪曰此間樂不思蜀郤正聞之求見禪曰若王後問宜改而答曰先人墳墓遠在隴蜀乃心西悲無日不思因閑其目會王復問對如前王曰何乃似郤正語邪禪驚視曰誠如尊命左右皆笑三國志毛嘉魏明帝毛后父也封博平鄉侯嘉本典虞車工卒報富貴明帝令朝臣會其家飲宴其容止舉動甚蚩騃語輒自謂侯身時人以為笑三國志胡慶字文亮靈太后族孫也為左僕射度頑蔽每與人言自稱僕射時人方之毛嘉北史陳壽將為三國志謂丁梁州曰若覔千斛米見借當為尊公作佳傳丁不與米遂不為立傳時論以此少論梁州敬禮子也語林任育長瞻童少時神明可愛時人謂育長影亦好自過江便失志王丞相請先度時賢共至石頭迎之猶作疇日相待一見便覺有異坐席竟下飲便問人云此為茶為茗覺有異色乃自申明云向問飲為熱為冷耳嘗行從棺邸下度流涕悲哀王丞相聞之曰此是有情癡世說謝虎子據嘗上屋熏鼠胡兒既無由知父為此事聞人道癡人有作此者戲笑之時道此非復一過太傳既了已之不知因其言次語胡兒曰世人以此謗中郎亦言我共作此胡兒懊熱一月日閉齋不出太傳虛託引已之過以相開悟可謂德教上鬼兵相助王凝之羲之子也王氏世事張氏五斗米道凝之彌篤孫恩之攻會稽寮佐請為之備凝之不從方入靖室請禱出語諸將佐曰吾已請大道鬼兵相助賊自破矣既不設備遂為孫恩所害晉書顧愷之字長康嘗以一廚畫糊題其前寄桓玄皆其深所珍惜者玄乃發其廚後竊取畫而緘開如舊以還之紿云未開愷之見封題如初但失其畫直云妙畫通靈變化而去亦猶人之登仙了無怪色上戲弄遙贊顧愷之矜伐過實少年因相稱譽以為戲弄又為吟詠自謂得先賢風制或請其作洛生詠答曰何至作老婢聲義熙初為散騎常侍與謝瞻連省乃於月下長詠瞻每遙贊之愷之彌自力忘倦瞻將眠令人代已愷之不覺有異遂申旦而止晉書秦符生時太白犯東井有司奏東井秦之分也太白罰星必有暴兵起于京師生曰星入井者必將渴耳何所怪乎載記南燕慕容垂建平四年妖賊王始聚眾於太山萊蕪谷自稱太平皇帝號父冏為太上皇號兄休為征東將軍太為征西將軍假署公卿誑動百姓德遣車騎將軍慕容鎮討擒之將斬於馬市有人謂之曰何為妖妄自貽族滅父及兄弟何在答曰太上皇蒙塵在外征東征西為亂兵所害如朕今日復何聊賴其妻趙氏怒曰君止坐此口以至於死如何臨刑猶自不革始答曰皇后不達天命自古迄今豈有不破之家不亡之國哉行刑者以刀鐶築其口始曰朕今為爾所苦崩即崩矣終當不易尊號德聞而笑謂左右曰熒惑之人死猶狂語何可不殺出十六國春秋劉韞字彥文道欣子也人才凡鄙特為明帝所寵在湘州雍州使善畫者圖其出行鹵簿羽儀常自披玩嘗以圖示征西將軍蔡興宗興宗戲之陽若不解畫者指韞形問之曰此何人而在輿韞曰政是我其庸底類如此南史劉韞弟述字彥思亦甚庸劣從子俁疾危篤父彥節母蕭對之泣述嘗侯之便命左右取酒肉令俁進之皆莫知其意或問焉答曰禮云有疾飲酒食肉述又嘗新有緦慘或詣之問其母安否述曰唯有愁惛次訪其子對曰所謂父子聚麀蓋謂麀為憂也上劉義綦封營道縣侯凡鄙無識始興王濬嘗謂曰陸士衡詩云營道無烈心其何意苦阿父如此義綦曰下官初不識士衡何忽見苦其庸塞皆然彭城王義康素無術學待文義者甚薄袁淑嘗詣義康義康問其年答曰鄧仲華拜衮之歲義康曰身不識也淑又曰陸機入洛之年義康曰身不讀書君無為作才語見向其淺陋若此上劉義宣之敗還江陵也帶甲尚萬餘人義宣既入城仍出聽事見客左右翟靈寶誡使撫慰眾賓以臧質違指授之宜用致失利今治兵繕甲更為後圖昔漢高百敗終成大業而義宣忘靈寶之言誤云項羽千敗眾咸掩口而笑宋書謝超宗鳳子也好學有文辭選補新安王子鸞國常侍王母殷淑儀卒超宗作誄奏之帝大嗟賞謂謝莊曰超宗殊有鳳毛恐靈運復出時右衛將軍劉道隆在御坐出候超宗曰聞君有異物可見乎超宗曰懸磬之室復有異物耶道隆武人無識正觸其父名曰旦侍宴至尊說君有鳳毛超宗徒跣還內道隆謂檢覔鳳毛至暗待不得乃去南史遷合朔阮佃夫嘗正旦應合朔尚書奏遷元會佃夫曰元正慶會國之大禮何不遷合朔日耶其不稽古如此張敬兒欲移羊叔子墮淚碑於其處置臺綱紀諫云此羊太傳遺動不宜遷動敬兒曰太傳是誰我不識張敬兒始不識書及為方伯乃習學讀孝經論語初徵為護軍乃潛於密室中屏人學揖讓答對空中俯仰妾侍竊窺笑焉將拜三司謂其妻嫂曰我拜後府開黃閤因口自為鼓聲初得鼓吹羞便奏之於新林姥廟為妾祈子祝神口自稱三公其鄙俚如此梁武丁貴嬪父道遷初為歷陽太守廬陵王續主武帝謂之賢女復育一男答曰莫道猪狗子世人以為笑廟諱不憶侯景之篡也王偉請立七廟景曰何謂七廟偉曰天子祭七世祖考故置七廟并請七世諱敕太常具祭祀之禮景曰前世吾不復憶惟阿爺名摽且在朔州伊那得來敢是眾聞咸笑之胡僧祐梁元時拜領軍將軍厚自封殖以所加鼓吹恒置齋中對之自娛人曰此是羽儀公名望隆重不宜若此答曰我性愛之恒湏見耳出遊亦以自隨人士笑之胡僧佑性好讀書愛緝綴然文辭鄙野多被嘲謔而自謂實工矜伐彌甚南史北齊并州有士族好為可笑詩賦輕蔑邢魏諸公眾共嘲弄虛相稱讚必擊牛釃酒延之其妻明鑒人也泣而諫之此人嘆曰才華不為妻子所容何况行路至死不覺顏氏家訓何令貴隔勢傾朝野筆迹踈漏遂遭十穢之書彼人恭拜忽曰永感答人借車還白不具真本流傳合朝耻辱是其第七穢也庾元威論書江南有一權貴讀誤本蜀都賦注解蹲鴟芉也而為羊字後有人餉羊肉答書云損惠蹲鴟舉朝驚駭不解事義久後尋繹方知如此顏氏家訓源師字踐言為尚書郎攝祠部後屬孟夏以龍見請雩時高阿那肱為錄尚書事謂為真龍出見大驚喜問龍所在云作何顏色師整容云此是龍星初見依禮當雩祭郊壇非謂真龍別有所降阿那肱忿然作色曰漢兒多事強知星宿祭事不行師出竊歎曰國家大事在祀與戎禮既廢也其能久乎齊亡無日矣北史賀傳北齊何處龍見作何物顏色隋傳何乃于星宿開府薛榮宗常自云能使鬼後主信之經古冢榮宗謂舍人元行恭是誰家行恭戲之曰林宗冢復問林宗是誰行恭曰郭元貞父榮宗前奏曰臣向見郭林宗從冢出著大帽吉莫靴插馬鞭問臣我阿貞來不北齊熊安生字植之在山東時歲歲遊諸從之者傾郡縣或誑之曰某村古塜是晉河南將軍熊光去七十二世舊有碑為村人埋匿安生掘地求之不得連年訟焉冀州長史鄭大讙判之曰七十二世乃是羲皇上入河南將宣喪無此號訴非理記安生率其族向塜而號北史祖孝徵珽放縱不羇曾至交州刺史司馬世雲家飲酒遂藏銅疊二面廚人請搜諸客果於孝徵懷中探得又魏神武嘗宴僚屬於坐失金叵羅竇太后令飲者皆脫帽果在孝徵髻中見者以為深耻孝徵怡然不屑上庫狄干為太宰不知書署名為干字逆上畫之時人謂之穿錐又有武將王周者署名先為吉而后成其外二人至子孫始並知書北齊榖梁傳稱公子友與莒拏相搏左右呼曰孟勞孟勞者魯之寶刀名亦見廣雅近在齊時有姜仲岳謂公子左右姓孟名勞多力之人為國所寶顏氏家訓太山羊肅亦稱學問讀潘岳賦周文弱枝之條為杖策之杖世本容成造曆以曆為碓磨之磨上王莽漢書王莽贊云紫色蛙聲餘分閏位謂以偽亂貞顏之推共人讀書言及王莽形狀有一俊士自許史學名價甚高乃云王莽非直鴟目虎吻亦紫色蛙聲尉瑾外雖通顯內闕風訓意在引接名流而不知別好學吳人搖唇振足為人所哂見人好笑時論北之寒蟬又少威儀子德載以蒲鞭責之便自投井瑾自臨井上呼云兒出聞者皆笑北史繁于蘇威立條章每歲責民間五品不遜或答者乃云管內無五品之家不相應領類多如此郎茂以為繁紆不急奏罷之隋書李子雄明辨有器幹煬帝甚任之新羅嘗遣使朝貢子雄至朝堂與語因問其冠制所由其使者曰皮弁遺象安有大國君子而不識皮弁也子雄曰中國無禮求諸四夷使者曰自至以來此言之外未見無禮憲司以子雄失詞劾奏其事竟坐免隋書自撻呼走蘇世長初在陜州部內多犯法世長莫能禁乃責躬引咎自撻於都街五伯嫉其詭鞭之見血世長不勝痛大呼而走觀者咸以為笑議者方議其詐舊唐張由古有吏才而無學術累歷臺省嘗於眾中歎班固有大才而文章不入選或謂之曰兩都賦燕山銘典引等並入文選何為言無由古曰此是班孟堅文章何關班固事聞者掩口而笑又謂同官曰昨買得王僧襦集蓋僧孺也大有道理杜文範知其誤應聲曰文範亦買得佛袍集倍勝僧襦集由古竟不之覺唐新語楊纂為雍州長史尹伊任坊州司戶尚藥奏求杜若敕下度支有省郎以謝眺詩云芳州採杜若乃委坊州貢之尹君判申云坊州本無杜若應由讀謝眺詩誤華省名郎如此判事不畏二十八宿向下笑人耶太宗聞之改授雍州司法御史臺記及國史補周考功令史袁琰國忌眾人聚會充錄事勾當遂判曰曹司繁鬧無時暫閑不因國忌之辰無以展其歡笑合坐嗤之朝野僉載權龍褒景龍中為瀛州刺史新遇歲京中人附書云改年多感敬想同之乃將書皇判司以下云有恩改年號為多感元年眾人大笑龍褒復側聽怪赦書來遲褒不知忌謂府史曰何名私忌對曰父母亡日請假獨坐房中不出褒至日于房中靜坐有青狗突入褒大怒曰衝破我忌日更陳牒改作明朝好作忌日談者笑之僉載周定州刺史孫彥高被突厥圍城數十重不敢詣廳文符須徵發者於小牕接入鏁州宅門及賊登壘乃入櫃中藏令奴曰牢掌鑰匙賊來索慎勿與昔有愚人入京選皮袋被賊盜去其人曰賊偷我袋將終不得我物用或問其故答曰鑰匙子在我衣帶上彼將何物開之此孫彥高之流也僉載蘇良嗣高宗時為荊州刺史有河東寺本蕭詧為兄河東王所建良嗣見而驚曰此在江漢之間與河東有何于涉遂奏易之而當世恨其少學云唐新語賀知章風流文雅而不達吏事知禮部取舍非允子弟喧訴知章乃以足登牆頭出決事人大笑之開元中中書令王智注文選是先代舊業欲注釋之奏請左補闕王智以東宮衛佐李玄成進士陳居亮等注文選先是東宮衛佐李光震入院校文選兼復注釋解蹲鴟云今之羊子即是芋毛蘿蔔院中學士向外說蕭嵩聞之撫掌大笑大唐新語乾𦠆子同林甫自無學術僅能秉筆有才名於時者尤忌之而郭慎微苑咸文士之闒茸者代為題尺林甫典選部時選人嚴逈判語有用杖杜二字者林甫不識伏字謂吏部侍郎韋陟曰此云杖杜何也陟俛首不敢言太常少卿姜度林甫舅子度妻誕子林甫手書慶之曰聞有弄麞之慶客視之掩口舊唐書林甫引蕭炅為戶部侍郎炅嘗與嚴挺之同行慶吊客次有禮記蕭炅讀之曰蒸嘗伏獵炅早從官無學術不識伏獵之意誤讀之挺之戲問炅對如初挺之白張九齡曰省中豈有伏獵侍郎由是出為岐州刺史林甫深恨之上韓昹昌黎子也雖教有義方而性頗闇劣嘗為集賢校理史傳有說金根處皆臆斷之曰豈其誤耶必金銀車也悉改根為銀字至除拾遺果為諫議不受所謂上馬不落即着作校書何如即秘書信不虛矣泉子尚書故賓善謔集唐有姓房人好矜門地但有姓房為官必認云新屬知識親疾其如此乃謂之曰豊邑公相豊邑坊在上都是肆出方相是君何親曰是某乙再伯父人大笑曰君既是方相姪兒只堪嚇鬼啟顏錄鄭玨同光元年莊宗敗王彥章於中都長驅趍汴梁帝聞王師將至召宰相李振敬翔等號哭謀所向皆猶豫不次玨對曰有一策可以緩外寇不知陛下能行乎梁帝曰卿意如何玨曰願得陛下傳國寶懷之以入晉軍可以緩其師以俟叚凝梁帝曰事急矣此物固何惜但卿此行得事了否卿更籌之玨俛首曰了則不易了左右縮首竊笑翼日莊宗入汴州玨率百官馬前迎謁是日賞授萊州司戶薛史李克用擒劉仁恭父子命掌書記王緘草露布緘不知故事書之於布遣人曳之續世說石晉康福鎮天水日嘗有疾幕客謁問福擁錦衾而坐客有退謂同列曰錦衾爛兮福聞之遽召言者怒視曰吾雖生於塞下乃唐人也何得以為爛奚因叱出之世說党進吾正契丹何奚之有腳患小瘡那至於爛蓋謂奚之種賤也談苑元宗幼學之年馮權常給使左右上深所親幸每曰我富貴為爾置銀靴保太初命親王及東宮舊僚擊鞠極歡頒賫有等因語及前事即日賜銀三十斤以代銀靴遂命工鍜靴著之人皆笑焉南唐近事党進過市見縳搆欄者問汝誦何言優者說韓信進怒曰汝對我說韓信見韓信即當說我此三頭兩面之人即命杖之談苑党進命畫工寫真寫成大怒詰畫師云我前時見畫大虫猶用金箔貼眼我豈消不得一對金眼睛雜志宋庠留守西都同年為河南令好述利便以農家藝麥費耕耨改用長錐刺地下種以畝試之自旦至暮不能遍又值蝗災科民畜一鷄云不惟去蝗之害亦可自養令民悉呈所畜鷄既集紛然而鬥莫能間止百姓喧嘩塞路共觀兩鷄相鬥罷之塵史人面起草有朝士陳東通判蘇州而權州事因斷流罪命黥其面曰特刺配某州牢城黥畢幕中相與白曰凡言特者罪不至是而出於朝廷一時之旨今此人應配矣又特者非有司所得行東大恐即改特刺字為準條字再黥之頗為人所笑後有薦東之才於兩府者石參政聞之曰吾知其人矣得非權蘇州日於人面上起草者乎東軒筆錄汴渠舊例十月關口則舟楫不行王介甫欲通冬運遂不令閉口水既淺澀舟不可行而流冰頗損舟楫於是以船腳數千前設巨碓以搗流冰而役夫苦寒死者甚眾京師有諺曰昔有磨法磨平漿水今見巨碓搗冬凌上程覃尹京日有治聲唯不甚知字嘗有道民投牒乞執狀造橋覃夫書昭執二字其人白云合是照執今是昭執乃漏四點爾覃取筆於執字下加四點乃為昭熱庠舍諸生作傳以譏之白獺髓易卜各字知晉州焦敏寡聞謂國子監印本九經不真眾言此雖起於五代群儒精較固為真本敏曰公輩全不細看只如周易各字却總卜殺文會叢談天中記卷二十九
