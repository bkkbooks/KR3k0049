body:
  text: 四時四時四時四方各一時時期也不失期也物之生死各應節期而止也釋名陰陽大經陰陽者天地之大理也四時者陰陽之大經也刑德者四時之合也刑德合於時則生福詭則生禍管子四方東方曰歲星其時曰春其氣曰風風生木南方曰日其時曰夏其氣曰陽陽生火西方曰辰其時曰秋其氣曰陰陰生金北方曰月其時曰冬其氣曰寒寒生水管子四選四時天之四選也春者少陽之選夏者太陽之選秋者少陰之選冬者太陰之選四選之中各有孟仲季故一歲之中有四時一時之中有三長天之節也春秋繁露六合孟春與孟秋為合仲春與仲秋為合季春與季秋為合孟夏與孟冬為合仲夏與仲冬為合季夏與季冬為合孟春始盈孟秋始縮仲春始出仲秋始內季春大出季秋大內孟夏始緩孟冬始急季夏德畢季冬刑畢淮南子陰陽專精陰陽之專精為四時四時之散精為萬物斗指斗指東方曰春斗指南方曰夏斗指西方曰秋斗指北方曰冬公羊隱元年注日行日行北陸謂之冬西陸謂之秋南陸謂之夏東陸謂之春後律歷志四禁明王有四禁春無殺伐無割大陵伐大木斬大山行大火誅大臣收榖賦錢夏無遏水達名川塞大谷動土功射鳥獸秋無赦過釋罪緩刑冬無爵賞祿傷伐五藏故春政不禁則五榖不成夏政不禁則草木不榮秋政不禁則姦邪不勝冬政不禁則地氣不藏四者俱犯則陰陽不和風雨不時管子至禁天下之君發號施令必順于四時四時不正則陰陽不調寒暑失常如此則歲惡五榖不登聖主發令必審于四時此至禁也越絕天生天生四時地生萬物春道生萬物榮夏道長萬物成秋道歛萬物盈冬道藏萬物靜盈則藏靜則復起六韜乘時授事魏相奏曰明王謹于尊大慎于養人故立義和之官以乘四時節授民事高帝時謁者趙堯舉春李舜舉夏兒湯舉秋貢禹舉冬四人各職一時漢書時政和帝時鬱林養奮對策曰天有陰陽陰陽有四時四時有政令春夏則子惠布施寬仁秋冬則剛猛盛威行刑賞罰殺生各應其時則陰陽和四時調五榖升廣州先賢傳太順夫春生夏長秋收冬藏此天地之大經也弗順則無以為天下紀綱故曰四時之大順不可失也司馬遷傳陰陽太少立天之道曰陰與陽陰陽各有少太是生四時少陽為春太陽為夏少陰為秋太陰為冬也蔡邕月令章句四時解春之言蠢也萬物蠢然而生也夏假也寬假萬物使生長也秋緧也緧迫萬物使時成也冬終也物終成也釋名玉燭四時和為玉燭爾雅皇帝王伯夫三皇象春五帝象夏三王象秋五伯象冬皇王德運也伯者繼空續乏以成歷數故其道駁漢王莽傳立四時神農治天下立四時之節居子代御日月遞照四時代御繁啟蕃長於春夏畜積收藏於秋冬是禹桀之所同也禹以治桀以亂治亂非時也荀天論翻校老成子學幻於尹文先生遂能存亡自在翻校四時列穆王邦禁范子曰天生萬物之時聖人命之曰春春不生送者故天不重為春春者夏之父也故春生之夏長之秋成而殺之冬受而藏之春肅而不生者王德不究也夏寒而不長者臣下不奉主命也秋順而復榮者百官刑不斷也冬溫而泄者發府庫賞無功也此所謂四時者邦之禁也越絕書四時之節春者陽氣始上故萬物生夏者陽氣畢上故萬物長秋者陰氣始下故萬物收冬者陰氣畢下故萬物藏故春夏生長秋收冬藏四時之節也管子將心將軍之心滔滔如春曠曠如夏湫漻如秋典凝如冬因形而與之化隨時而與之移淮南子物繫於時夫名之繫於實也猶物之繫於時也生物者春也吐華者夏也布葉者秋也收成者冬也斯無為而自成者若強為之則傷其性矣徐幹中論三時太子以三妃故故白淨王為立三時殿依西方一年立為三時春夏冬不別立秋用四月為一時故云三時也翻譯八王提謂經明八王日何等為八王日謂立春春分立夏夏至立秋秋分立冬冬至是謂八王日天地諸神陰陽交代故名八王日上歲始公羊傳曰春者何歲之始也註春者天地開辟之端養生之首法象所出四時本名也青陽爾雅云春為青陽一曰發生漢郊祀歌青陽開動根荄以遂群生啿啿惟春之祺抱朴子用刑篇青陽闡陶育之和素秋厲肅殺之威融風扇則枯瘁攄藻白露凝則繁英雕零郭璞詩青陽暢和氣谷風穆以溫發陳春三月此謂發陳天地俱生萬物素問布德方春東作布德之元陽氣開發養道萬物後即顗傳敷和東方生風風生木其德敷和敷和之紀木德周行陽舒陰布五化宣平素問日行東陸日春行東方青道曰東陸昜通統圖斗柄指東天下皆春鶡冠子招搖東指黎景熙上書曰招搖東指天下識其春人君布德率土懷其惠周書大皡執規漢書魏相奏曰東方之神大皞乘震執規司春月令春月其日甲乙其帝大皞其神勾芒註此蒼精之君木官之臣自古以來著德立功者也勾芒五行之官也木正曰勾芒者物始生皆勾屈而芒角因用為官名也三禮義宗精華結紐春秋元命苞曰春者神明推移精華結紐註神明猶陰陽也相推使物精華結成紐結要也物出東方者何也動方也物之動也何以謂之春春出也物之出也故謂之東方春也尚書大傳春為忠春為忠也東方而春春動也是故鳥獸孕榮華生萬物遂忠之至也尸子蒼靈顏延年曲水詩序春官聯事蒼靈奉塗註蒼靈青帝也尚書帝命驗曰帝者承天立五府蒼曰靈府鄭玄曰蒼帝靈威仰之府佳辰淑節梁元帝纂要曰春曰芳春青春陽春三春九春風曰陽風春風暄風柔風惠風景曰媚景和景韶景時曰良時嘉時芳時辰曰良辰嘉辰芳辰節曰華節芳節嘉節良節韶節淑節草曰弱草芳草芳卉木曰華木華樹芳樹陽樹林曰茂林芳林烏曰陽烏時烏候烏好烏禽曰陽禽時禽好禽發生之令立春之節初五日東風解凍次五日蟄蟲始振後五日魚上冰次雨水氣初五日獺祭魚次五日鴻鴈來五日草木萌動次仲春驚蟄之節初五日小桃華次五日倉庚鳴後五日鷹化為鳩次春分氣初五日玄鳥至次五日雷乃發聲芍藥榮後五日始電次季春清明之日初五日桐始華次五日田鼠化為鴽牡丹華後五日虹始見次穀雨氣初五日萍始生次五日鳴鳩拂其羽後五日戴勝降于桑凡此六氣一十八候皆春陽布發生之令故養生者必謹奉天時也王冰素周註斗指周天玉衡六間曰大寒後十五日斗指艮為立春後十五日斗指寅為雨水後十五日斗指甲為驚蟄後十五日斗指卯為春分後十五日斗指乙為清明後十五日斗指辰為穀雨孝經緯春律正月律謂之大簇何太亦大也簇者湊也言萬物始大湊地而出也二月律謂之夾鍾何夾者孚也言萬物孚甲種類分也三月律謂之姑洗何姑者故也洗者鮮也言萬物皆去故就新莫不鮮明也白虎通月辰正月之辰謂之寅寅者律也謂生物之律途也二月之辰名為寅寅者茂也言陽氣生而孳茂也三月之辰名為辰辰者震也謂時物盡震動而不長也晉樂志春為規規之為度也轉而不復圓而不堄復而不縱廣大以寬感動有理發通有紀優優簡簡百怨不起規度不失生氣乃理淮南子少陽者東方東動也陽氣動物於時為春春蠢也物蠢生迺動運故為規前律歷志東方春龍房位其規仁好生不賊其帝青表聖明行趨德尚書緯春臺眾人熙熙若亨大牢如登春臺老子春風風人管仲曰吾窮必矣吾不能以春風風人不能以夏雨雨人吾窮必矣說苑負暄宋國有田夫常衣黂縕以過冬暨春東作自暴於日不知天下之有廣廈隩室綿纊狐貉顧其妻曰負日之暄人莫知者以獻吾君將有賞博物志養之如春帝王之道包之如海養之如春朝錯新書孟陽玉燭寶典曰正月為端月梁元帝要纂曰正月曰孟陽孟陬上春開春發春獻春首春首歲獻歲發歲初歲肇歲方歲華歲仲陽纂要曰二月曰仲陽又曰令月張子歸田賦云仲春令月時和氣清晚春纂要曰三月曰暮春末春晚春去祅邪賈佩蘭云在宮中時正月上辰出池邊盥濯食蓬餌以去祅邪西京雜記獻果史記曰孝惠帝曾春出遊離宮叔孫生曰古者有春嘗果令方櫻桃熟願陛下因取櫻桃獻宗廟上乃許之諸果獻由此興也議貸漢文帝詔曰方春時和草木群生之物皆有以自樂而吾百姓或阽於死亡其議所以振貸之展月漢書曰王溫舒事張湯為酷吏及為河內太守及春溫舒頓足曰嗟乎令冬益展一月足了吾事矣其不愛人如此也春行太守常以春行縣至縣勸人農桑振救乏絕第五倫為太守因春行見鄉嗇夫鄭弘奇之置都郵續漢志戒伐樹木章帝行幸敕御史司空道橋所過歷樹木方春月無得有所伐輅車可引避也東觀漢書助陽育物章帝元和二年春正月詔三公曰方春生養萬物孚甲宜助萌陽以育時物其令有司罪非殊死且勿案驗後漢書取紅花北齊盧士深妻崔林義之女有才學春日以桃花靧兒面呪曰取紅花取白雪與兒洗面作光悅取白雪取紅花與兒洗面作光華取白雪取花紅與兒洗面作華容虞世南史略武后宣詔花發武后天授二年將遊上苑遣宣詔曰明朝遊上苑火急報春知花湏連夜發莫待曉風吹於是凌晨名花瑞草布苑而開若有神助卓異記賜柳圈高宗春幸梨園並渭水祓除賜群臣細柳圈辟厲帝有所感即賦詩李適傳擊春曲明皇好羯鼓云八音之領袖諸樂不可為比嘗遇三月初詰旦巾櫛方畢時宿雨初晴景色明麗小殿亭前柳杏將吐暏而歎曰對此景物豈可不與他判斷乎左右相目將命備酒獨高力士遣取羯鼓旋命之臨軒縱擊一曲名春光好神思自得反顧杏柳皆已發折指而笑之謂嬪嬙內宦曰此一事不喚我作天工可乎皆呼萬歲羯鼓錄護花鈴天寶初寧王少時好聲色風流醞藉諸王弗如也每春時於後園中紐紅絲繩綴金鈴掛繫花梢之上有鳥鵲翔集則令園吏掣鈴索以驚之號護花鈴天寶遺事隨蝶幸開元末明皇每春時旦莫宴於宮中使嬪妃輩爭插艷花帝親捉粉蝶放之隨蝶所止幸之後楊妃專寵遂不復用此戲開元遺事探春宴都人士女每至正月半後各乘車跨馬供帳於園囿或郊野中為探春之宴天寶遺事作樂車楊氏子弟恃后族之貴極於奢侈每春遊以大車結綵為樓載女樂數十人自私第聲樂前引出遊園苑中長安豪民貴族爭傚之上載油幕長安貴家子弟每至春時遊宴供帳於園圃中隨行載以油幕或遇陰雨以幕覆之盡歡而歸上掛裙幄長安士女遊春野步遇名花則設席藉草以紅裙遞相插掛以為宴幄其奢逸如此唐輦下歲時記駐馬飲長安俠少每春時結朋聯黨各置矮餙以錦金絡並轡於花下往來使僕從執酒盃而隨之遇好花則駐馬而飲天寶遺事鬭奇花長安中士女春時鬭花戴插以奇花多者為勝皆用千金市名花植於庭中以備春時之鬭上插御花長安春時盛於遊賞園林日無閒地蘇頲應制詩云飛埃結紅霧遊蓋翻青雲帝覽詩嘉焉遂以御花插頲之巾上時人榮之上探花使進士杏花園初會為之探春宴以少俊二人為探花使徧遊名園若他人先折得名花則二使皆有罰秦中歲時記擲金錢內庭嬪妃每至春時於禁中結伴擲金錢為戲出開元遺事移春檻楊國忠子弟春時移名花植木檻中下設輪腳挽以綵絙所至自隨號移春檻天寶遺事花裀許慎選與親友結宴于花囿中未嘗具帷幄設坐具使僮僕聚落花鋪于坐下曰吾自有花裀何銷坐具上載妓私遊進士會宴曲江盧彖請假不赴乃以雕幰載妓微服遊觀為團司所發崔沆為主罰錄事判云深覽席帽密映鑽車紫陌尋春便隔同年之面青雲得路可知異日之心摭言踏春歌洞徵志云齊州有人病中每歌踏陽春之曲曰踏陽春人間二月雨和塵陽春踏盡秋風起腸斷人間白髮人酉陽雜俎云元和初有士人醉臥廳中及醒見古屏上婦人悉於床前踏歌歌曰長安少女踏春陽無處春陽不斷腸舞袖弓腰渾忘却蛾眉空帶九秋霜其中問曰如何是弓腰歌者曰首髻及地腰勢如規也士人驚叱之忽皆上屏栽雜木汜勝之書栽樹正月為上時二月為中時三月為下時然棗鷄口槐兔目桑蝦蟇眼榆負瘤散其餘雜木鼠耳趄各其時凡種栽並插皆用此等形象望杏花汜勝之書曰杏始華榮輒耕輕土弱春望杏花落復耕之輒藺之此謂一耕而五穫四人月令清明節令蠶妾理蠶室是月也杏花盛又云杏花生種百穀王元長菜秀才文云杏花菖葉耕獲不愆梁元帝耕籍令云三農務業尚看天桃敷水四人有令猶及落杏飛花蜀主孟昶勸農詔云望杏敦耕瞻蒲勸穡看菖葉呂氏春秋冬至後五旬七日菖葉生乃耕菖者百艸之先生也於是始耕又云菖始生於是耕儲光羲詩云蒲葉日已長杏花日已滋農人要看此貴不違天時占雨霧正月朔雨春早人食一升二日雨人食二升三日雨人食三升四日雨人食四升五日雨主大熟五日內霧穀傷民飢元日霧歲必飢占書青祇張恊雜詩曰太皥啟東節春郊禮青祗青逵劉臻妻獻春頌曰玄陸降坎青逵升震陰祗送冬陽靈迎春驗歲草黃帝問師曠曰吾欲苦樂善心可知否對曰歲欲甘甘草先生薺是也歲欲苦苦草先生葶藶是也歲欲雨雨草先生藕是也歲欲旱旱草先生蒺藜是也歲欲流流草先生蓬是也歲欲惡惡草先生水藻是也歲欲病病草先生艾是也皆在孟春占之迎富蜀萬州風俗正月七日鄉市士女渡江南娥眉磧上作鷄子卜擊小鼓唱竹枝歌二月二日攜酒饌鼓樂於郊外飲宴至暮而回謂之迎富寰宇記天穿池陽俗號正月二十三日為天穿日以紅縷係煎餅擲屋上謂之補天穿相傳云女媧以是日補天故也千春節清泰小字二十三蓋正月二十三日生也以是日為千春節人臣奏對但云兩旬三日或數物則云二十二更過二十四不敢斥尊也續博物志照百鬼正月未日夜蘆茞火照井側百鬼皆走荊楚歲時記乞巧山東風俗正月取五姓女年十餘歲共臥一榻覆之以衾以箕扇之良久如夢寐或欲刺文繡事筆硯理管絃俄頃乃寤謂之扇天卜以乞巧續博物志正月思日真誥曰正月庚申上帝殺害日不可請乞百事無益登真隱談曰正月午天地凶門日不可建造穿鑿正月亥地破日不可開山動土上辛王方慶奏天子以孟春上辛日於南郊緫受十二月之政藏于祖廟月取一政頒於明堂本傳獻鳩周禮羅氏仲春獻鳩於國老鄭玄注云春以鷹化為鳩變舊為新冝以養老助生氣獻羔開冰開冰月令曰仲春之月天子獻羔開冰注獻羔謂祭祀寒也祭祀寒而出冰薦於宗廟祠高禖仲春之月玄鳥至之日以太牢祠于高謀呂氏春秋女夷司和淮南子曰二月之夕女夷鼓歌以司天和以長百穀禽獸草木注云女夷春夏長養之神也震節中平三年歲在攝提二月震節紀日上旬漢張遷碑辟官事二月十五日取土泥蠶屋冝蠶上辰日取道中土泥門應辟官事曆書種辰瓜齊民要術二月辰日㝡冝種瓜山谷詩云夏栽醉竹餘千個春糞辰瓜滿百區售農用四川記同州以二月二日與八日為市四遠村民畢集其蠶農所用以至車檐椽木果樹器用雜物皆至其直千緡至萬緡者郡守就子城東北隅龍興寺前立山棚設幄幕聲樂以宴勞將吏累日而後罷蠶月詩曰蠶月條桑蠶月三月也吳民載詩云條風著野方蠶月高樹移陰又麥秋唐百家詩云蠶月桑葉青鸎時柳花白草青為春突厥不知年曆惟以草青為記綴花為蓋夏侯湛春可樂歌曰春可樂兮綴雜花以為蓋集葳蕤以飾裳握月擔風虞松方春謂握月擔風且留後曰吞花臥酒不可過時春宴錄飛英會范蜀公居許下作長嘯堂前有荼醾架每春季花時宴客其下有花墮酒中者飲一大白微風過則滿坐無遺當時以為飛英會曲洧舊聞九春阮嗣宗詩悅澤若九春春秋元命苞云陽氣數成於三故時三月陽數極于九故三月一時九十日宋衷曰四時皆象此類不惟春也上春顏延年宋郊祀歌皇乎備矣有事上春江淹別賦羅與綺兮嬌上春秧開五葉蕭結廬陵人五代時為祁陽縣令不畏強禦方暮春時有州符下取競渡舡刺史將臨觀結怒批其符云秧開五葉蠶長三眠人皆忙迫詎任渡船守乃罷競摸石遊成都三月有海雲山摸石之遊山有小池遊人競來摸瓦石於池中以為求子之兆得石者為男得瓦者為女太守設宴於春閣以觀之長月武德二年正月甲子下詔曰佛典微妙凈業始於慈悲道教冲虛至德去其殘暴况乎四時之禁毋伐麛卯三驅之禮不取順從蓋欲敦崇仁惠蕃衍庶物立政經邦咸率斯道朕祇膺靈命撫遂群生言念亭育無忘鑒寐殷帝去網庶踵前脩齊王捨牛實符本志自今每年正月五月九月十直日並不得行刑所在公私冝斷屠殺此三長月斷屠殺之始也祖實錄盛德在木禮記月令曰孟春之月是月也立春太史以先三日謁於天子曰某日立春盛德在木天子乃齋立春之日親率公卿諸侯大夫以迎春於東郊還乃賞公卿大夫於朝令相佈德和行賀慶施惠下及兆民書雲物傳曰凡分至啟閉必書雲物為備故也立春為啟立冬為閉司啟傳曰郯子對孔子曰少絙摰為鳥師而鳥名青鳥氏司啟者也青鳥鶬鶊也以立春鳴立夏止青旛土牛立春之日夜漏未盡五刻京師百官皆衣青衣郡國縣道官下至斗食令史皆服青幘立青旛施土牛耕人于門外以示兆民後漢禮儀志下寬大書立春之日下寬大書曰制詔三公方春東作敬始慎微動作從之罪非殊死且勿案驗皆須麥秋退貪殘進柔良下用者如故事同上獻帝起居注曰建安二十二年二月壬申詔書絕立春寬緩詔書不復行青陽雲翹立春之日迎春于東郊祭青帝勾芒月令章句曰東郊去邑八里因木數也車旗服飾皆青歌青陽八佾舞雲翹之舞及因賜文官太傳司徒以下縑各有差祭祀志助天生皇覽曰迎禮春夏秋冬之樂又順天道是故距冬至日四十六日則天子迎春於東堂距邦八里堂高八尺堂階三等青稅八乘旗旄尚青田車載矛號曰助天生唱之以角舞之以羽翟此迎春之樂也農祥晨正農祥房星也晨正謂晨見南方立春之日也國語戴春燕荊楚歲時記曰立春日悉剪綵為燕以戴之帖冝春之字傅咸燕賦有其言矣傅咸燕賦曰四序代王敬逆其始彼應運而方臻乃設燕以迎至翬輕易之岐岐若將飛而未起何夫人之功巧式儀形之有似御青書以贊時著宜春之嘉祉拖鉤立春日為拖鉤之戲以緶作篾纜相罥綿亘數里鳴鼓牽之按公輸自遊楚為載舟之戲退則鉤之進則強之名曰鉤強遂以鉤為戲起此荊楚歲時記食生菜東晉李鄂立春日命以蘆菔芹芽為菜盤相餽貺摭遺立春日春鉼生菜號春盤四時寶鏡齊民月令云凡立春日食生菜不過多取迎新之意而已及進漿粥以導和氣刻龍像御春書北朝媚人立春日進春書以青綌為幟刻龍像啣之或為蝦蟇酉陽雜俎祀青帝開元禮曰立春祀青帝於東郊立春後丑日祀風師於郭東北剪采花景龍四年正月八日立春上令侍臣自芳林門經苑東展仗入至望春宮迎春內出綵花樹人賜一枝景龍中中宗孝和帝以立春日宴別殿內出剪采花令學士賦之唐書宋之問詩今年春色早應為剪刀催五辛盤安定郡王立春日五辛盤以黃柑釀酒謂之洞庭春色摭言神水立春貯水謂之神水釀酒不壞四時纂要竹管葭灰立春之日取冝陽金門竹為管河內葭草為灰以候陽氣玉泉記出土牛月令出土牛以示農耕之早晚謂於國城之南立土牛其言立春在十二月望筞牛人近前示其農早也立春在十二月晦及正月朔則筞牛人當中示其農中也立春在正月望筞牛人在後示其農晚也為國之大計不失農時故聖人急於養民務成東作今天下州郡立春日制為土牛飾以文綵即以綵杖鞭之既而碎之各持其土以祈豐稔不亦乖乎解凍立春之日東風不解凍號令不行蟄虫不震陰氣姧陽魚不上冰甲胄私藏雨水之日獺不祭魚國多盜賊鴻雁不來遠人不服草木不萌動果瓜不熟也周書時訓三素雲修真入道祕言曰立春日清朝北望有紫綠白雲者為三元君三素飛雲也乘八輿之輪上詣天帝天子候見再拜自陳某乞得侍給輪轂三過見元君之輩者向日昇天雲洞真黃老經唐試進士以立春日望三素雲詩為題蓋出於此陶洪景水仙賦曰迎九玄於金闕謁三素於太清李義山送宮人入道詩九枝燈外朝金殿三素雲中侍玉樓黃庭經注曰紫青紅謂之三素雲蘇魏公作春貼子詞萬年枝上看春色三素雲中望玉晨許冲元春貼詞三素雲飛依北極九農星正見南方四時卒始史記天官書云立春日四時之卒始也索隱曰謂立春日是去年四時之終卒今年之始也三微正朔有三本天有三統謂三微之月也明王者當敬始重本也禮三正記曰三微者何謂也陽氣始施黃泉萬物動微而未著也十一月之時陽氣始養根於黃泉之下萬物皆赤赤者盛陽之氣也故周為天正色尚赤也十二月之時萬物始牙而白白者陰氣故殷為地正色尚白也十二月之時萬物始達莩甲而出皆黑人得加功故夏為人正色尚黑尚書大傳曰夏以孟春月為正殷以季冬為正周以仲冬為正夏以十一月為正色尚黑以平旦為朔殷以十二月為正色尚白以鷄鳴為朔周以十一月為正色尚赤以夜半為朔不以二月後為正者萬物不齊莫適所統故必以三微之月也白虎通易乾鑿度曰三微而成著二著而體成當此之時天地交萬物通也三元漢書曰立春四時之始又曰曆者序四時之端正分至之節故聖人考曆數以正三元此聖人知命之術歲之元時之元月之元三朝書傳曰六沴之作歲之朝曰三朝其應至重迺正月辛丑朔日有食之變見三朝之會上天聰明茍無其事變不虛生師古曰歲之朝月之朝日之朝故曰三朝漢孔光傳三始哀帝時正月朔日書言陛下父事天母事地子養黎民即位已來父虧明母震動子訛言相驚恐今日蝕於三始誠可畏懼小民正月朔日尚恐毀敗器物何况於虧乎本傳四始史記天官書四始者候之日正義曰謂正月旦歲之始時之始日之始月之始故云四始獻鳩邯鄲之民以正月之旦獻鳩於簡子大悅厚賞之客問其故簡子曰正旦放生示有恩也客曰民之君欲放之故競而捕之死者眾矣君而欲生之不若禁民勿捕捕而放之恩過不相補矣簡子曰善列子重精堯在位七十年有鸞雛歲歲來集麒麟遊於藪澤梟鴟逃於絕漠有秪支之國獻重明之鳥一名重精言雙睛在目狀如鷄鳴似鳳時解落毛羽肉翮而飛能搏逐猛獸虎狼使妖災群惡不能為害飴以瓊膏或一歲數來或數歲不至國人莫不掃灑門戶以望重明之集其未至之時國人或刻木或鑄金為此鳥之狀置於門戶之間則魑魅醜類自然退伏今人每歲元日或刻木鑄金或圖畫為鷄於牗上蓋重精之遺像也拾遺記正月一日帖畫雞戶上懸葦索於其上插符於旁百鬼畏之歲時記放雀邯鄲民以正月旦獻雀於趙王而綴以五綵王大悅申叔告子順子順曰王何以為也對曰正旦放之示有生也子順曰此委巷之鄙事非先王之法且又不順夫雀者取其名則冝受之於上不冝取之於下一國之王受民雀將何悅焉孔叢子放鳩三齊略曰榮陽有厄井漢沛公避項羽追逃於井中有雙鳩集其上人云沛公逃入井羽曰井有人鳩不集其人遂不追沛公遂免難後漢元日放鳩蓋為此也除殺成帝詔除正旦殺雞與雀可謂仁用于心萬歲曆幻術永寧元年西南夷撣國王獻樂及幻人能吐火自支解易牛馬頭明年元會作之於庭安帝與群臣共觀大奇之陳禪獨離席舉手大言曰昔齊魯為夾谷之會齊作侏儒之樂仲尼誅之帝王之庭不冝設夷狄之技後漢書上壽吳良字大儀初為郡吏歲旦賀太守門下掾王望諂稱太守功德曰今日歲守請上雅壽掾史皆稱萬歲良勃然進曰望佞邪之人願勿受其觴盜賊未盡人庶困乏今良曹掾尚無絝望曰議曹惰窳自無絝寧足為不家給人足乎太守曰此生言是賜良鰒魚百枚後漢書東觀記紏儀陳翔為侍御史時正旦朝賀大將軍梁冀威儀不整翔奏冀恃貴不敬請收案罪時人奇之後漢書獄中引杯李膺家錄曰膺坐黨事與杜密荀翊同繫新汲縣獄時歲日翊引杯曰正朝從小起膺謂翊云死者人情所惡今子無悕色者何翊曰求仁得仁又誰恨也膺乃嘆曰漢其亡矣善人天地之紀而多害之何以存國講經奪席戴憑字次仲為侍中正旦朝賀百僚畢會帝令群臣能說經史更相難詰義有不通輒奪其席以蓋通者憑遂重坐五十餘席東觀漢記如願有商人區明者過彭澤湖有車馬自稱青湖君要明過厚禮之問何所須有人教之但乞如願及問以此言荅之青湖君甚惜如願不得已許之乃其婢也既而送出自爾商人或有所求如願並為即得後至正旦如願起晚乃打如願如願走入糞中商人以杖打糞掃喚如願竟不還也歸異記今人正旦以細繩繫偶人投糞掃中云令如願荊楚歲時記廢朝建安中劉劭為計吏詣許太史言正日當日蝕劭時在荀彧所坐者數十人或云當廢朝或云冝却會劭曰梓慎裨竈古之良史猶占水火錯失天時然則聖人垂制不為變豫廢朝禮者或災消異伏或推術謬誤也或善其言勑朝會如故日亦不食魏書化鵠來朝鄧德明南康記曰昔有盧耽仕州為治中少學仙術善解飛騰每夕輒凌虛歸家曉則還州嘗元會至晚不及朝列化為白鵠至閣前徊翔欲下威儀以箒擲之得一隻履耽驚還就列內外左右莫不駭異時步騭為廣州刺史意甚惡之便以狀列聞遂至誅滅西京故事明帝使愽士馬均作司南車水轉百戲正月朝造巨獸魚龍蔓延弄馬倒騎備如漢西京故事典略白獸樽元會設白獸樽於殿上樽蓋上施白獸若有能獻直言者則發此樽飲酒按禮曰白獸樽乃杜舉之遺式為白獸監後代所為示不忌憚也臧榮晉書百華燈禮志云元會文昌殿用漢儀又設百華燈樂志云百華照曉千門洞晨會計吏王渾集曰詔問明年正旦會四方計吏入見臨朝當何所冝渾奏舊正會前計吏軒下侍中讀詔書計吏跪奏臣以詔常文相承陛下留心訪問之意可令中書令宣詔問方土所冝士人賢才隱伏未達風俗好尚禮教之冝勸農務本以盡懇殖之利刑獄清理無枉之失郡守長吏勤心治政為民興利除害訓化之績授以紙筆盡意陳聞以明聖旨垂心四遠御覽觀禮臧榮緒晉書曰熊遠議曰履端元日正始之初有識之士於是觀禮樂榮耳目之觀崇玩弄之好周處風土記曰月正元日百禮兼崇登御床元帝正會引丞相王導登御床王公固辭中宗引之不已文獻曰使太陽與萬物同暉臣下何以仰贍帝乃止世說坐覓孟嘉庾亮元規正旦大會州府人士河南褚裒問亮江州有孟嘉其人何在亮曰在坐卿但自覓裒歷觀遂指嘉謂亮曰將無是耶亮欣然而笑喜裒之得嘉奇嘉為裒之所得陶淵明嘉傳賜酒十二月庚子詔曰正會日百僚增祿賜淥醽酒人二升晉咸康起居注椒花頌劉臻妻元日獻椒花頌曰旋穹周廻三朝肇建青陽散輝澄景載渙美哉靈葩爰採爰獻聖容映之永壽于萬晉六十六懸羊磔壍正朝縣官殺羊懸其頭於門又磔雞以副之俗說以厭厲氣玄以問河南伏君伏君曰是土氣上升草木萌動羊食百草鷄啄五穀故殺之以助生氣裴玄新語壞銀鐺建武慕儉欲鑄壞太宮元日上壽銀酒鎗尚書令王宴等咸稱盛德蕭頴胄曰朝廷盛禮莫過三元此一器既是舊物不足為侈帝不悅后預曲宴銀器滿席頴胄曰陛下前欲壞酒鎗恐冝移在此器也帝甚有慚色南齊書頴胄字雲長為戲詩梁褚緭同陳伯之降魏魏人欲用之魏元會緭戲為詩曰帽上着籠冠袴上着朱衣不知是今是不知非昔非魏人怒出為始平太守日日行獵墮馬而死南史朌鬼丸梁武帝正月賜群臣却鬼丸海錄碎事放囚張華原為兗州刺史獄有繫囚謂之曰三元之始念卿幽閉今給假五日足得展謁親親期盡當還也囚果應期而至北齊書夢鍾馗明皇開元講武驪山翠華還宮上不悅因痁疾作晝夢一小鬼衣絳犢鼻跌一足履一足腰懸一履搢一筠扇盜太真繡香囊及上玉笛繞殿奔戲上前上叱問之小鬼奏曰臣乃虛耗也上曰未聞虛耗之名小鬼奏曰虛者望空虛中盜人物如戲耗即耗人家喜事成憂上怒欲呼武士俄見一大鬼頂破帽衣藍袍繫角帶靸朝靴徑捉小鬼先刳其目然後劈而啖之上問大者爾何人也奏云臣終南山進士鍾馗也因武德中應舉不捷羞歸故里觸殿階而死是時奉旨賜綠袍以葬之感恩發誓與我王除天下虛耗妖孽之事言訖夢覺痁疾頓瘳乃詔畫工吳道子曰試與朕如夢圖之道子奉旨恍若有覩立筆成圖進呈上視久之撫几曰是卿與朕同夢耳賜與百金唐逸史傳坐酒唐長安市里風俗每至歲元日已後遞作飲食相邀迎號為傳坐冥報記獻壽部郎中元正一日陳設于太極殿皇帝衮冕臨軒展宮縣之樂陳歷代寶玉與輅備黃麾仗二王後百官朝集使皇親諸王並朝服陪位皇太子獻壽次上公次中書令奏諸州表黃門侍郎奏祥瑞戶部尚書奏諸州貢獻部尚書奏諸蕃貢獻太史令奏雲物侍中奏禮畢然後中書令又與供奉官獻壽殿上皆呼萬歲六典御樓御殿元日御樓御殿發號施令慶賜遂行輦下歲時記火城宰相禮絕班行元日百官已集而宰相方至珂傘列燭多至數百炬謂之火城國史補貢筐柳冕德宗時為福建觀察使上表乞朝覲曰夫朝會禮之本也聖唐稽古天下朝績三考一見皆以十月上計京師十一月禮見會尚書省應考績事元日陳貢棐集於考堂唱其考第進賢以興善簡不肖以黜惡自安史亂常始有不朝戎臣恃險或不悔過鄉國人情之不忘也闕庭臣子所戀也朝覲國家大禮也三者臣之大願臣思一入覲率先天下使朝覲之禮廢而復舉唐書歸寧李晟治家以嚴正歲崔氏女歸寧讓曰爾有家而姑在堂婦當治酒食且以待賓客即卻之不得進唐書大饗含元宣帝元日大饗含元殿盧鈞年八十升降如儀音吐鴻暢舉朝咨歎唐書時大中十一年也次年元日受朝柳公權年亦八十復為百官首殿庭蔓遠力已綿憊稱賀後誤上尊號被彈罰一季俸料七十致仕舊典也老而受辱人多惜之東觀奏記敷于散劉謂者見鬼以正旦至市見一書生入市眾鬼悉避劉謂謂書生曰子有何術以至於此書生云我本無術出之日家師以一丸藥絳囊褁之令以繫臂防惡氣耳於是劉就書生借此藥至所見鬼處諸鬼悉走所以世俗行之天醫方序五薰周處風土記月正元日五薰鍊形注五辛所以發五藏氣五辛即大蒜小蒜韭菜雲臺胡荽是也莊子云正月飲酒茹葱以通五藏也食醫心鏡曰食五辛以辟厲氣練形周處風土記云正旦當吞生雞子一枚謂之練形葛洪練化篇云正月吞雞子赤豆各七枚辟瘟氣張仲景方云歲有惡氣中人不幸便死取大豆二十七枚雞子白麻并酒吞之荊楚歲時記云梁有天下不食葷荊自此不復食雞子以從常則進椒柏酒董勛云歲首酌椒酒而飲之以椒性芬香又中為藥故此日椒花以貢尊者崔寔四民月令曰元日進椒柏酒椒是玉衡星精服之令人身輕能老柏是仙藥成公子安椒花銘云肇惟歲首用正元日厥味惟珍蠲除百疾服桃湯荊楚歲時記曰元日服桃湯典術曰桃者五行之精厭伏邪氣制百鬼五木湯雜脩養書曰正月一日取五木煮作湯以浴令人至老鬚髮黑案道家謂青木香為五木香亦云五木道家多以此浴是其義也膠牙餳元日食膠牙𩛿取膠固之義荊楚歲時記折七松董勛荅問歲首折松枝男七女二以為藥飲之決八風魏占候正月旦決八風風從南來大旱西南小旱西方有兵西北豆成北方中歲東北為上歲東方大水東南疾疫歲惡八風常與其對課多勝少久勝亟疾勝徐漢天文志仙木玉燭寶典曰元日造桃板著戶謂之仙木像鬱壘山桃樹百鬼畏之山海經曰東海度朔山有大桃樹蟠屈三千其卑枝向東北曰鬼門萬鬼出入也有二神一曰神荼一曰鬱儡主閱領眾鬼之惡害人者執以葦索而用食虎於是黃帝法而象之歐除畢因立桃梗於門戶上畫神荼鬱儡持葦索以禦凶鬼畫虎于門當食鬼也風俗通曰黃帝上古時有神荼鬱壘昆弟二人性能執鬼括地圖曰桃都山有大桃樹盤屈三千里上有金雞日照則鳴下有二神一曰神一曰鬱並執葦索以伺不祥之鬼得則殺之後漢注桃梗梗者更也歲終更始受介祉也虎者陽物百獸之長能擊摰性食魑魅者也東都賦云度朔作梗守以欝壘神荼副焉對操索葦目察區陬司執遺鬼京室密清罔有不韙屠蘇歲華紀麗屠蘇乃草菴之名昔有人居草菴之中每歲除夕遺里閭藥一貼令囊浸井中至元日取水置酒尊召合家飲之不病瘟疫今人得其方而不識其名但曰屠蘇而已四時纂要云屠蘇孫思邈庵名一云屠割也蘇腐也飲從小起四民月令云正旦進酒次第當從小起以年少者起先晉海西令問董勛曰俗人正日飲酒先飲小者何也勛曰俗云小者得歲先酒賀之老者失歲故後飲酒唐劉夢得白樂天元日舉酒賦詩劉云與君同甲子歲酒讓先杯白云與君同甲子歲酒合誰先白又有歲假內命酒一篇云歲酒先拈辭不得被君推作少年人顧况云不覺老將春共至更悲攜手幾人全還丹寂寞羞明鏡手把屠蘇讓少年裴夷直云自知年幾偏應少先把屠蘇不讓春倘過數年逄此日還應惆悵羨他人成文幹云戴星先捧祝堯觴鏡裏堪驚兩鬢霜好是燈前偷失笑屠蘇應不得先嘗方干云陁酌屠蘇定年齒坐中皆笑鬢毛斑厭不祥正旦五更人整衣冠於家庭中爆竹貼畫鷄子或鏤五色土於戶上厭不祥也易通卦驗松柏頌風俗記正旦楚人上松柏頌周庾信有柏葉銘隨銘至椒花逐頌來首祚王羲之月儀書云日往月來元正首祚太簇告辰微陽始布罄無不冝和神養素分朋卜歲㾞西域寧遠每元日王及首領判二朋朋出一人被甲鬭眾以瓦石相之有死者止以卜歲善惡拜日新羅俗以元日拜日月神唐書雲開節岳州自元正獻歲鄰里以飲宴相慶至十二日罷謂其日為雲開節岳陽風土記立春顓帝以孟春正月為元其時正月朔旦立春五星會于天歷營室也冰凍始泮蟄蟲始發雞始三號天曰作時地曰作昌人曰作樂鳥獸萬物莫不應和故顓帝聖人為歷宗也晉律歷志魏董巴議旋璣正月上日受終于文祖在旋璣玉衡以齊七政旋璣者何也傳曰旋者還也璣者幾也微也其變幾微而所動者大謂之旋璣是故旋璣謂之北極受謂舜也上日元日也尚書大傳九醞漢制宗廟八月飲酎用九醞太牢皇帝侍祠以正月旦作酒八月成名曰酎一曰九醞一名醇酎西京雜記九賓樂正旦天子行陽德殿作九賓樂舍利從東來戲於庭入殿前激水化成比目魚跳躍漱水作霧化成黃龍高八十丈出水戲於庭以兩大絲纏繫兩頭中間相去數丈兩娼女對舞行於繩上道逄功肩不傾又踏蹁屈身藏形於斗中鐘磬並唱樂畢作魚龍曼延黃吹三匝漢官典職七日為人晉議郎董勛荅問禮俗云正月一日為鷄二日為猪三日為羊四日為狗五日為牛六日為馬七日為人正旦畫鷄於門七日帖人於帳今一日不殺鷄二日不殺狗三日不殺羊四日不殺猪五日不殺牛六日不殺馬七日不行刑於此日向晨至門前呼牛羊雜畜令來乃置粟豆於灰撒之宅內云以招牛馬按一說云天地初開以一日作鷄七日作人也御覽剪綵荊楚歲時記曰正月七日為人日以七種菜為羹剪綵為人或鏤金箔帖屏風上亦戴之頭鬢董勛問禮俗云人入新年形容從新改舊也陟安人魏東平王翕七日登壽張縣安民山鑿山頂為會望處刻銘於壁文字猶在銘云正月七日厥日為人策我良駟陟彼安仁郭緣生述征記造華勝賈充李夫人典戒曰人日造華勝相遺像瑞圖全勝之形又像西王母戴勝也李商隱詩鏤金作勝傳荊俗剪綵為人起晉風登剡西晉李充正月七日登剡西寺詩曰命駕升西山寓目眺原疇登高晉代桓溫參軍張望亦有正月七日登高詩梅花粧宋書曰武帝女壽陽公主人日臥於含章殿簷下梅花落公主額上成五出花拂之不去皇后留之看得幾時經三日洗之乃落宮女奇其異競效之今梅花粧是也金陵志登雲龍魏孝靜帝以人日登雲龍門崔瞻與其父㥄俱侍宴為詩詔問邢邵等曰今贍此詩何如其父咸曰㥄愽雅張麗贍氣調清新並詩人之冠冕宴罷咸共嗟賞之云今日之宴併為崔瞻父子北史問故事魏帝宴百僚問何故名人日皆莫能知其故魏收對曰晉議郎董勛云正月一日為鷄云云七日為人時邢邵亦在側亦甚恧焉北史談藪曰北齊高祖七日升高宴群臣魏收云云上人勝劉臻妻陳氏進見儀曰正月七日上人勝於人思歸詩薛道衡聘陳為人日詩云入春纔七日離家已二年南人嗤之曰是底言誰謂此虜解作詩及云人歸落鴈後思發在花前乃喜曰名下固無虛士隋唐嘉話朝謁鄭公嘗出行以正月七日謁見太宗太宗勞之曰卿今日至可謂人日矣上煎餅膳部有節日食料謂正月七日煎餅唐六典清暉閣中宗景龍三年正月七日上御清暉閣登高遇雪因賜金綵人勝令學士賦詩是日甚歡宗楚客詩云窈窕神仙閣參差雲漢間九重中禁啟七夕早春還太液天為水蓬萊雪作山今朝上林樹無處不堪攀劉憲詩風尋歌曲颺雪向舞行縈趙彥昭詩庭樹千花發蓂階七葉新李嶠詩三陽偏勝節七日最靈辰行慶傳芳蟻升高綴綵人又七言詩千鐘聖酒御筵披六出群英亂繞枝即此神仙對瓊圃何煩轍迹向瑤池景龍文館記大明殿景龍四年七月宴大明殿賜王公以下綵鏤人勝又觀打毬李又應制詩鐵鳳曾騫搖瑞雪銅烏細轉入祥風馬懷素詩三陽候節金為勝百福延祥玉作盃李嶠詩桂吐半輪迎此夜蓂開七葉應今朝蘇頲詩七葉仙蓂承月吐千株玉柳拂煙開初年競帖宜春勝長命先浮獻壽杯崔日用詩曲江苔色冰前液上苑梅花雪裏嬌韋元且詩青韶既肇人為日綺勝初成目作人武平一打毬詩令節重遨遊分鑣戲彩毬驂驔迴上苑蹀躞繞通溝影就紅塵沒光隨赭汗流賞闌清景暮歌舞樂時休上踏磧夔州人重諸葛武侯以人日傾城出八陣磧上謂之踏磧婦人拾小石之可穿者貫以綵索係于釵頭以為一歲之祥府師宴於磧上圖經脩油卜故事蜀嘉定金燈山有淵每歲人日郡守于此脩油卜故事謂以油灑水面觀其紋驗一歲之豐歉祈蠶渠有樂山正月七日邑人鼓吹酒食娛樂於此以祈蠶事宕渠事陰晴占東方朔占書云歲後八日一日為鷄云云七日為人八日為穀其日晴主所生之物育陰則災奪賜花正月八日立春內出綵花賜近臣武平一應制云鑾輅青旂下帝臺東郊上苑望春來黃鶯未解林間囀紅蘂先從殿裏開畫閣條風初變柳銀塘曲水半含苔欣逄睿藻光韶律更促霞觴畏景催是日中宗手勑批云平一年雖最少文甚警新悅紅蘂之先開訝黃鶯之未囀循還吟咀賞嘆兼懷今更賜花一枝以彰其美所賜學士花並令插在頭上後所賜者平一左右交插因舞踏拜謝時崔日用乘酣飲欲奪平一所賜花上於簾下見之謂平一曰日用何為奪卿花平一跪奏曰讀書萬卷從日用滿口虛張賜花一枝學平一終身不獲上及侍臣大笑因更賜酒一杯當時嘆美景龍文館記上元正月十五日為上元白帖膏粥祠門玉燭寶典曰正月十五日作膏粥以祠門戶荊楚歲時記曰今州里風俗望日祭門先以楊柳插門隨楊枝所指仍以酒脯飲食及豆粥挿箸而祭之祀太一漢家祀太一以昏時杞到明史記樂書今人正月望日夜遊觀燈是其遺事漁陽摻檛禰衡被魏武謫為鼓吏正月半試鼓衡揚枹為漁陽摻檛淵淵有金石聲四坐為之改容孔融曰禰衡罪同胥靡不能發明王之夢世說祭蠶神吳縣張成夜起忽見一婦人立於宅上南角舉手招成成即就之婦人曰此地是君家蠶室我即是此地之神明年正月半宜作白粥泛膏於上祭我也必當令君蠶桑百倍言訖而去絕失所在成如言作膏粥自此後大得蠶今正月半作白膏粥自此始也齊諧記一云正月半有神降陳氏之宅云是蠶神登高正月十五日有登高之會石虎鄴中記召元胄隋文帝嘗於正月十五日與近臣登高時元胄不在上即令馳召之胄見上謂曰公與外人登高未若就朕也賜宴極歡隋書角扺戲隋時都邑百姓每至正月十五日為角抵之戲遞相誇競至於糜費財力柳彧上奏曰近代以來京邑及外州每以正月望夜充街塞陌聚戲朋遊鳴鼓聒天燎炬照地倡優雜技詭狀異形內外共觀曾不相避高棚跨路廣幕陵雲袨服靚粧車馬嗔噎肴醑肆陳絲竹繁會竭貲破產競此一時浸以成俗實損于民請頒行天下併即禁斷詔可其奏上賣半照陳太子舍人徐德言之妻後主叔寶之妹封樂昌公主才色冠絕時陳政方亂德言知不相保謂其妻曰以君之才容國亡必入權豪之家斯永絕矣儻情緣未斷猶冀相見冝有以信之乃破一照人執其半約曰他日必以正月望日賣於都市我當在即以是日訪之及陳亡其妻果入越公楊素之家寵嬖殊厚德言流離辛苦僅能至京遂以正月望日訪都市先有蒼頭賣半照者大高其價人皆笑之德言直引至其居備食具言其故出半照以合之仍題詩曰照與人俱去照歸人不歸無復嫦娥影空留明月輝陳氏得詩涕泣不食素知之愴然改容即召德言還其妻仍厚遺之聞者無不感歎仍與德言陳氏偕飲令陳氏為詩曰今日何遷次新官對舊官笑啼俱不敢方驗作人難遂與德言歸江南竟以終老本事詩金吾禁夜西都京城街衢有金吾曉暝傳呼以禁夜行惟正月十五日夜蟵許金吾弛禁前後各一日韋述西都雜記士女夜遊唐朝正月十五夜許三夜夜行其寺觀街巷燈明若晝山棚高百餘尺神龍以後復加嚴餙士女無不夜遊車馬塞路有足不躡地浮行數十步者雍洛靈異小錄微服過市景龍四年上元夜中宗與韋后微服過市彷徉縱觀因幸中書令蕭至忠之弟是夜放宮女數千人看燈因此多有亡逸者丁卯夜又微行看燈幸韋安石長寧公主弟唐書韋安石為侍中中宗與韋后以正月望夜幸其弟賚賜不貲上按此一事而紀傳不同御輪睿宗先天二年正月十五日十六十七夜於京安福門外作燈輪高二十丈衣以錦綺飾以金銀燃五萬盞燈望之如花樹宮女千數衣羅綺曳錦繡耀珠翠施香粉一花冠一巾帨皆至萬錢裝束一妓女皆至三百貫鈔簡長安萬年少女婦千餘人衣服花釵婢子亦稱是於燈輪下踏歌三日夜歡樂之極未始有之朝野僉載御延喜睿宗好樂聽之忘倦玄宗又善音律先天二年正月望胡僧婆陁請夜開門燃千百燈睿宗御延喜門觀樂凡經四日嚴挺之上䟽曰誰何驚夜伐鼓通晨以備非常存之善教今陛下不深惟戒慎輕違動息重門弛禁巨猾多徒倘有躍馬奔車流言駭叫一塵聽覽有累宸衷臣以為不可也舊唐本傳出宮女歌舞先天初上御安福門觀燈太常作歌樂出宮女歌舞朝士能文者為踏歌聲調入雲唐輦下歲時記李摹偷曲明皇幸上陽宮夜新番一曲明夕正月十五日潛遊忽聞酒樓上有笛奏前夕所番曲大駭之密捕笛者詰之自云其夕於天津橋上翫月聞宮中奏曲愛其聲遂以瓜畫譜記之即長安少年李摹也元稹連昌宮詞云李摹擫笛傍宮墻偷得新番數聲曲連昌詞注建燈樓上在東都遇正月望夜移仗上陽宮大陳燈影設庭燎自禁中至於殿庭皆設蠟炬連屬不絕時有方都匠毛順巧思結創繒綵為燈樓二十間高一百五十尺懸珠玉金銀微風一至鏘然成韻其燈為龍鳳虎豹之狀明皇雜錄造麵蠒都下上元日造麵蠒以官位帖字卜官位高下或賭筵宴以為戲笑天寶遺事歲時雜記云麵蠒以肉或素餡其實厚皮饅頭也諫遊上在驪山華清宮值元夜欲出遊陳玄禮奏曰宮外曠野須有預備必欲夜游願歸城闕上不能奪南部新書遊廣陵開元十八年正月望夕帝謂葉仙師曰四方之盛陳乎此夕何處極麗對曰天下無踰於廣陵帝曰何術一觀之師曰侍御皆可俄而虹橋起於殿前板閣架虛欄楯若畫師奏橋成但無迴顧於是帝步而上太真高力士及樂官數十人從行步步漸高直造雲中俄頃已到廣陵寺觀陳設之盛燈火之光照灼基殿士女華麗皆仰望曰仙人現於五色雲中帝大步師曰請勑伶官奏霓裳羽衣一曲後可驗矣後數旬廣陵奏曰正月十五二更仙人乘綵雲自西來臨孝感寺高數十丈又奏霓裳羽衣一曲終西去初元朝禮之晨而慶雲現小臣踐脩之地而仙樂陳上覽表大悅方信仙師之不妄也幽恠錄上與葉師善游西涼州明皇雜錄百枝燈樹韓國夫人置百枝燈樹高八十尺豎之高山上元夜點之百里皆見光明奪月色也天寶遺事千炬燭圍楊國忠子弟每至上元夜各有千炬紅燭圍於左右上五宅夜遊天寶十載上元節楊氏五宅夜遊遂與廣寧公主騎從爭西市門楊氏奴揮鞭誤及公主衣公主墮馬駙馬程昌裔扶公主因及數檛公主泣奏之上令決殺楊家奴一人昌裔停官不許朝謁於是楊家轉橫出入禁門不問京師長吏為之側目故當時謠曰男不封侯女作妃君看女却是門楣太真外傳燃燈奏樂穆宗皇后蕭氏文宗立上尊號皇太后開成三年正月望夜於咸泰殿陳燈燭奏仙韶樂三宮太后俱集奉觴獻壽如家人禮諸親王公主駙馬戚屬皆侍宴舊唐書鶴林遊趙渭南嘏嘗家于浙西有美姬嘏甚溺惑洎計偕以其母所阻遂不攜去會上元為鶴林之遊浙帥窺之遂為其人奄有明年嘏及第因以一絕箴之曰寂寞堂前日又曛陽臺去作不歸雲當時聞說沙叱利今日青娥屬使君浙帥不自安遣一介歸之於嘏嘏時方出關途次橫水驛見兜舁人馬甚盛偶訊其左右對曰浙西尚書差送新及第趙先輩娘子入京姬在舁中亦認嘏嘏下馬揭簾視之姬抱嘏慟哭而卒遂葬於橫水之陽摭言高明世界陳犀罷司農少卿省女兄于姑蘇適上元夜觀燈車馬喧騰目奪神醉嘆曰涉冰霜泛烟冰乍見此高明世界遂覺神明頓還舊觀清異錄五夜元霄乾德五年詔云朝廷無事區宇咸寧况年穀屢豐宜士民之縱樂上元日更增十七十八兩夜宋朝類要京師上元放燈三夕錢氏納土進錢買兩夜今十七十八兩夜燈因錢氏而添也江鄰幾雜記元宵破賊狄青宣撫廣西時儂智高守崑崙關青至賓州值上元大張燈燭首夜享將佐次夜宴從軍官一鼓青稱疾輒起令孫元規暫主席數使人勞座客至曉各未敢退忽有馳報是夜三鼓青已奪崑崙矣筆談長燈書夜蔡君謨守福州上元日命民間一家點燈七盞陳烈作大燈長丈餘大書云富家一盞燈太倉一粒粟貧家一盞燈父子相對哭風流太守知不知猶恨笙歌無妙曲君謨見之還輿罷燈晁民客話迎紫姑正月十五日其夕則迎紫姑以卜劉敬叔異苑云紫姑本人家妾為大婦所妬正月十五日感激而死故後人作其形于廁間迎之卜祝云子胥不在云是其婿曹夫已行云是其姑小姑可出平昌孟氏嘗以此日迎之穿屋而去自爾廁中著以敗衣蓋為此也洞覽云是帝嚳氏女將死云平生好樂至正月半可以衣見迎又其事也雜五行書云廁神名後帝異苑云陶侃如廁見人自云後帝著單衣平上幘謂侃曰三年莫說貴不可言將后帝之靈憑紫姑而言矣俗云溷廁之間必須淨然後能至紫姑荊楚歲時記異苑云世人以十五日迎紫姑於廁間或猪欄邊迎之捉者覺重便是神來奠設酒果亦覺面貌輝輝有色即跳躁不住能占眾事卜將來蠶桑又善射鉤好即大躍惡則仰眠平昌孟氏恒不信躬試往捉便自躍穿屋頂而去永失所在也一曰世俗元日請戚姑之神蓋漢時戚夫人死于廁故凡請之者必詣其中召之唐紫姑神萊陽人也姓何氏名媚字器卿自幼讀書辨利唐牲拱三年壽陽刺史李景納為妾妻妬殺之於廁時正月十五日也後遂顯靈云顯異錄擊毬淮南上元三夜燈火排戶命河市壯女畫杖擊毬至於捽髻毀膚破額流血者止之方罷燕吳行役記舍利放光摩喝陁國正月十五日僧徒俗眾雲集觀佛舍利放光雨花西域記三官朝天正一脩真指要云上元日天地水三官朝天張靈源真人張元精真人飛昇之辰上元十天靈官神仙兵馬與上聖高真妙行真人同下降人間考定罪福鶉火中古詩云是時鶉火中日月正相望鶉火中即正月望也貴戚傳柑上元夜登樓貴戚例有黃柑相遺謂之傳柑預借元宵宣和五年令都城自臘月初一日放鰲山燈至次年正月十五日夜謂之預賞元宵徽宗至日出觀之時有謔詞末句云奈吾皇不待元宵景色來到恐後月陰晴未保宣和遺事淳祐三年京尹趙節齋與竹請預放元宵十二日十四日諸巷陌橋道皆編竹為張燈之計臣僚劄子引此詞末二句為次年五月五日金入寇之讖十五日早晨遂盡折去清夜錄馬上樂神龍之際京城正月望日盛飾燈影之會金吾弛禁貴遊戚屬及下俚工賈無不夜遊車馬駢闐人不得顧王主之宅馬上作樂以相誇競文士皆賦詩以紀其事惟蘇味道郭利貞崔液為絕唱利貞詩九陌連燈影千門度月華傾城出寶騎四路轉香車爛熳惟愁曉周旋不問家更逄清管發處處落梅花餘詩不載唐新語耗磨日正月十六日古謂之耗磨日張說耗日飲酒詩耗磨傳茲日縱橫道未宣但令不至醉翻是樂無為又云上月今朝減流傳耗磨辰還將不事事同醉俗中人此日謂之耗日官司不令開倉庫而已槁齋贅筆提月公羊傳提月六鷁退飛過宋都提月者何僅逮是月晦日也何休注提月邊也魯人語也在是月之幾盡酺聚荊楚歲時記元日至于月晦並為酺酒飲食士女汎舟或臨水宴樂注每月皆有弦望晦朔以正月初年時俗重之以為節度厄元日至月晦人並為酺食度水士女悉湔裳酹酒置水湄以為度厄今世人惟晦日臨河解除婦人或湔裙玉燭寶典送窮鬼高陽氏子瘦約好衣弊食糜正月晦日巷死世作糜棄破衣是日祀於巷曰送窮鬼歲時記汛舟北齊正月晦日中書舍人奏袚除汎舟則皇帝乘輿鼓吹至行殿升御座乘版輿以與王公登舟置酒非與汎者坐于便幕隋禮志魏收汎舟應詔詩裊裊春枝弱汎舟新鳥呼棹唱忽逶迤菱歌時顧慕睿賞芳月色宴言忘日暮游豫慰人心照臨匡國步晦朝朔夕若合於子正則晦日之朝猶朔日之夕也是以月或多見之矣曆志晦日膏糜膳部有節日食料注晦日膏糜六典昆明池賦詩中宗正月晦日幸昆明池賦詩群臣應制百餘篇帳殿前結綵樓命昭容選一首為新翻御製曲從臣悉集其下湏紙落如飛各認其名而懷之既退唯沈宋二詩不下又移時一紙飛墜競取而觀乃沈詩也及聞其評曰二詩工力悉敵沈詩落句云微臣彫朽質羞覩豫章才蓋詞氣已竭宋詩云不愁明月盡自有夜珠來猶涉健舉沈乃伏不敢復爭宋之問詩曰春豫靈池近滄波帳殿開舟凌石鯨動槎拂斗牛回節晦蓂全落春遲柳暗催象溟看浴景燒劫辨沉灰鎬飲周文樂汾歌漢武才不愁明月盡自有夜珠來沈佺期詩法駕乘春轉神池象漢迴雙星移舊石孤月隱殘灰戰鷁逄時去恩魚望幸來岸花緹騎遶隄柳幔城開思逸橫汾唱流觀宴鎬杯微臣凋朽質羞覩豫章材景龍文館記滻水賦詩景龍四年正月二十八日晦上幸滻水宗楚客應制詩御輦出明光乘流泛羽觴鄭愔詩素滻接宸居青門盛袚除摘蘭喧鳳野浮藻溢龍渠上選地近賞貞元四年九月二日勑今方隅無事烝庶小康其正月晦日三月三日九月九日宜任文武百僚選勝地追賞為樂仍各賜錢以充宴會舊唐書窮九池陽風俗以正月二十九日為窮九掃除屋室塵穢投之水中謂之送窮中和節二月一日為正節道經中和節二月一日為中和德宗方置此節唐輦下歲時記令節德宗以前世上巳九日皆大宴集而寒食多與上巳同時欲以二月名節自我為古若何而可李泌請廢正月晦以二月朔為中和節因賜大臣戚里尺謂之裁度民間以青囊盛百穀瓜果種相問遺號為獻生子里閭釀宜春酒以祭勾芒神祈豐年百官進農書以示務本帝悅乃著令與上巳九日為三令節中外皆賜緡錢燕會新唐書代晦貞元五年正月十一日詔四序嘉辰歷代增置漢宗上巳晉紀重陽或說禳除雖因舊俗與眾宴樂誠洽當時朕以春方發生候維仲月勾萌畢達天地同和俾其昭蘇冝均暢茂自今以後二月一日為中和節內外官司並休假一日先勑百寮以三令節集會今宜以中和節代晦日舊唐書進農書其月二十八日中書侍郎李泌奏伏以仲春初吉制嘉節以徵之更晦日於往月之中揆明辰於來月之始請令文武百辟以是日進農書司農獻穜稑之種王公戚里上春服士庶以刀尺相遺村社作中和酒祭勾芒神聚會宴樂名為饗勾芒以祈年穀仍望各下州府所在頒行從之上獻黍貞元六年上以中和節宴百僚於曲江亭上賦詩七韻賜之百官皆和焉是日百僚進兆人本業三卷司農獻黍粟各一斗上呂渭和皇心不向晦改節號中和賜詩中和節德宗製詩朝臣奉和詔寫本賜戴叔倫於容州天下美之中和變梅柳萬槀生春光中和紀月令芳與天地長耽樂豈不尚懿茲特景良庶遂亭育恩同致寰海康君臣永終始交泰符陰陽曲沼水新碧華池桃稍芳勝賞信多歡戒之在無荒廣卓異記節序白居易中和節頌序于時數惟上元歲惟仲春乃命初吉肇為中和中者揆三陽之中和者酌仁氣之和于是以九八節七六氣排重陽而為上巳煦元氣于厚壤則齒蟄蘇而勾萌達噫和氣于窮荒則桀驁化而獷俗淳長慶集節頌天命神聖為天下君纂承九葉照臨八方齷齪唐虞趢趗羲皇乃紀良辰號為中和和維大和中維大中以暢中氣以播和風萌芽昆蟲昭蘇有融如幹元化如運神功上拾菜二月二日曲江拾菜遊觀甚盛秦中記賜尺中尚書令每年二月二日進鏤牙尺及木畫紫檀尺六典注是日賜紅牙銀寸尺各一白居易狀當晝夜平分之時頒度量合同之令乞鄰秦人得本家婢生一子惡之乞與鄰家鄰家大富貴本家貧後以二月二日取歸後復富鄰家貧雲嶠類要踏青節蜀中風俗舊以二月二日為踏青節杜氏壺中贅錄芳春節二月八日為芳春節道經二月望日蜀人二月望日鬻蠶器於市因作樂縱觀謂之蠶市花朝二月十五日為花朝提要錄風土記云浙間風俗言春序正中百花競放乃遊賞之時花朝月夕世所常言宋條制守土官于花朝日出郊勸農撲蝶會東京二月十五日為撲蝶會土地之主社土地之主也土地闊不可盡祭故封土為社而祀之以報功也孝經緯元日命社月令二月之節安萌芽擇元日命民社注為祀社稷也春事興故祈農祥元日近春分前後戊日元吉也高誘呂氏春秋注元善也日從甲至癸也社祭后土所以為民祈穀也嫌日有從否重農事故卜擇之五戊為社曆官以立春後五戊為社配食禮記及國語云共工氏之子曰句龍為后土官能平九土故祀以為社烈山氏之子曰柱能植百穀䟽自夏以上祀以為稷至殷以柱久遠而堯時棄為后稷亦植百穀故廢柱祀棄為稷鄭玄云古者官有大功則配食其神故勾龍配食於社棄配食於稷漢書立社王為群姓立社曰太社王自為立社曰王社諸侯為百姓立社曰國社自為立社曰侯社大夫以下立社曰置社禮親地天子曰太社必受霜露風雨以達天地之氣也社所以親地也地載萬物天垂象取財于地取法于天是以尊天而親地教人美報焉家主中霤而國主社示本也故言報本反始禮盧植曰諸王祭以上地為本也中霤其神后土即句龍也既祀於社又祀中霤求福王者諸侯所以立社稷者為萬人求福報功也人非土不立非穀不生不可偏敬故立社稷而祭焉孝經說曰社者土地之神稷者能生五穀之神孝經援神契云稷乃原隰之中能穀五穀之祇今按本無正神人感其功欲美報之因以稷名所以稷名神者五穀之長故也通典春求秋報凡人非土不生非穀不食土穀不可偏祭故立社稷以主祀古先聖王法施於人則祀之故以勾龍主社周棄主稷而配焉歲凡再祭蓋春求而秋報隋書枌榆漢高帝初起禱豐枌榆社二年東擊項籍還入關因命縣為公社後四年天下定詔御史令豐謹理枌榆社其後又令縣常以春三月及臘祠后稷以羊村人里各自裁以祠漢書枌榆鄉名也移社太上皇徙長安居深宮悽愴不樂高祖問知其憶平生少年屠沽之輩乃作新豐移諸故人實之太上乃悅高祖少時常祭枌榆之社及移新豐亦還立焉高帝既作新豐并移舊社衢巷棟宇物色惟舊士女老幼相攜路首各知其室放犬羊鷄鴨於通塗亦競識其家其匠人胡寬所營也西京雜記分肉里中社平為宰分肉甚均里父老曰善陳孺子之為宰平曰嗟乎使平得宰天下亦如此肉矣漢書罷社王脩年七歲喪母母以社日亡來年社鄰里社脩感念母哀甚鄰里聞之為之罷社魏志伐樹阮脩字宣子伐社樹有人止之宣子曰社而為樹伐樹則社亡樹而為社伐樹則社移矣世說白蓮社遠法師結白蓮社以書召陶淵明淵明曰弟子性嗜酒法師若許飲即往矣遠因許之遂造焉因勉入社淵明攢眉而去廬阜雜記社樹董龍盩厔人家貧與里人共祀社眾買牲牢龍撰文以祭祭畢分胙久之眾不平逐出龍龍造泥飯以祭祭畢泣于樹下將焚文有白鼠啣文入地穴掘之獲白金一斗龍不自私率眾首官縣令賢之奏聞旌表其閭曰義夫里遂名董龍社樹通志圖經春秋二社張文琮出為建州刺史州尚淫祀不立社稷文琮乃下教曰春秋二社本于農今此州廢不立尚何觀於是始建祠場治聾酒翰林學士月給內醞兵部李相濤好滑稽嘗因春社寄七言詩云社翁今日沒心情為乏治聾酒一瓶惱亂玉堂將欲徧依稀巡到第三廳俗傳社日酒喫治耳聾故兵部有是句兵部小字社翁海錄碎事設黍李士謙字子約謐子也髫齔以孝聞伯父瑒稱為吾家顏子刺史高元海稱為菩薩李氏宗黨豪盛每春秋二社必高會極宴無不沈醉諠亂嘗集士謙所盛饌盈前而先為設黍謂群從曰孔子稱黍為五穀之長荀卿亦云食先黍稷古人所尚寧可違乎少長肅然無敢弛惰退而相謂曰既見君子方覺吾徒之不德也北史開聰明社日小兒以葱係竹竿於窗中擉之曰開聰明或又加蒜欲能計筭也上社公雨社公社母不食舊水故社日必有雨謂之社翁雨陸龜蒙詩云幾點社翁雨一番花信風提要錄社雨報年豐社日霜江南人渭社日有霜必雨丙辰年社日繁霜覆瓦次日果大雨莊助鷄肋編停針線張藉吳越歌詞云庭前春鳥啄林聲紅夾羅襦縫未成今朝社日停針線起向朱櫻樹下行今人家閨房遇春秋社日不作組紃謂之忌作墨庄謾錄司分玄鳥氏司分者也左青氣震東方也主春春分日青氣出直震此正氣也氣出右物半死氣出左蛟龍出震氣不出則歲中少雷萬物不實人民疾熱易通卦驗春半一年分為四時時皆九十餘日春之半秋之半書夜長短等晝夜中分百刻故春秋之半稱春秋分左昭五正乂中衡春分之日日在中衡斗指卯為春分孝經說明庶風春分至王者脩封疆理田疇白虎通春門說文云卯冒也二月萬物冒地而出象開門之形故二月為天門又酉注云古文卯從卯卯為春門萬物已出酉為秋門萬物已入一閉門象也百五節去冬節一百五日即有疾風甚雨謂之寒食荊楚歲時記桐華清明之日桐不華歲有大寒田鼠不化國多貪殘虹不見婦人亂色戴勝不降桑政教不平周書時訓麥粥陸翽鄴中記曰寒食三日醴酪又煮粳米及麥為酪擣杏仁煮作粥玉燭寶典曰今人悉為大麥粥研杏仁為酪引𩛿沃之孫楚祭子推文云黍飯一盤醴酪二盂是其事喗壍玉燭寶典曰此節城市尤多鬭鷄卵之戲左傳有季郈鬭鷄其來遠矣古之豪家食稱畫鷄今代猶染藍茜雜色仍加雕鏤遞相餉遺或置盤俎管子曰彫卵然之所以發積臧散萬物張衡南都賦曰春鷄夏筍秋韭冬菁便是補益滋味其鬭卵則莫知所出董仲舒書云心如宿卵為體內藏以據其剛髣髴鬭理也禁火琴操曰晉文公與介子綏俱亡子綏割腕股以啖文公文公復國子綏獨無所得子綏作龍蛇之歌而隱文公求之不肯出乃燔左右木子綏抱木而死文公哀之令人五月五日不得舉火又周舉魏武陸翽並云寒食斷火起於子推琴操所云子綏綏即推也五月五日與今有異皆因流俗所傳據左傳及史記並無介子推被焚之事案周書司烜氏仲春以木鐸循火禁于國中注云為季春將出火也今寒食准節氣是仲春之末清明是三月之初然則禁火蓋周之舊制初學記太原舊俗以介子推焚骸一月寒食莫敢烟爨汝南先賢傳並州俗冬至後百五日為介子推斷火冷食三日作乾粥是今之糗也陸翽中記龍忌後漢周舉遷並川刺史太原一郡舊俗以介子推焚骸有龍忌之禁至其亡月咸言神靈不樂舉火由是士民每冬中輒一月寒食莫敢烟爨老小不堪歲多死者舉既到州乃作弔書以置子推之廟言盛冬去火殘損民命非賢者之意以宣示愚民使還溫食於是眾惑稍解風俗頗革注云龍星木之位也春見東方心為大火懼火之盛故為之禁火俗傳云子推以此日被火而禁火絕火魏武帝明罰令曰聞太原上黨西河鴈門冬至後百有五日皆絕火寒食云為介子推且北方極寒之地老少幼弱將有不堪之患令例人不得寒食若犯者家長半歲刑主吏百日刑令長奪一月雹異石勒時雹起西河界山歷太原樂平武鄉趙郡廣平鉅鹿千餘里勒以問徐光光曰去年禁寒食介推帝鄉之神也歷代所尊或者以為未宜替也縱不能令天下同爾介山左右晉文之所封也宜任百姓奉之勒令定議有司奏以子推歷代攸尊請普復寒食韋謏曰按春秋藏冰失道陰陽發洩為雹自子推以前雹者復何所致子推賢者曷為暴害如此緜介之間奉之為允於天下則不通矣勒從之載記拔河四年清明中宗幸棃園命侍臣為拔河之戲以大麻絙兩頭繫十餘小索每索數人執之以挽力弱為輸時七宰相二駙馬為東朋三相五將為西朋僕射韋巨源少師唐休璟以年老隨絙而踣久不能起帝以為笑樂韋承慶應制詩舊火收槐燧餘寒入桂宮鶯啼正隱葉鷄鬭始開籠景龍文館記喗壍戲玄宗在藩邸時樂民間清明鬭鷄戲及即位治鷄坊以賈昌為小兒長每至是日萬樂具舉昌導群鷄敘立于廣場勝負既決隨昌在行歸于鷄坊東城老父傳上墓明皇詔云寒食上墓禮經無文近代相承浸以成俗編入五禮永為定式半仙戲天寶宮中至寒食節競築鞦韆令宮嬪輩戲笑以為宴樂帝呼為半仙之戲都中士民因而呼之天寶遺事古今藝術圖云鞦韆北方山戎之戲以習輕趫者後中國女子學之乃以綵繩懸木立架士女坐立其上推引之謂之鞦韆或曰本山戎之戲自齊威公北伐山戎此戲始傳中國一云作千秋字本出漢宮祝壽祠後世誤倒讀為秋千耳涅槃經謂之罥索漢宮傳燭德宗擇知制誥批云與韓翊時有同姓名者遂具奏後批曰春城無處不飛花寒食東風御柳斜日暮漢宮傳蠟燭輕煙散入五侯家與此韓翊本事詩頒銀燭韋綬除宣察鄭處誨為判作謝新火狀節及桐華恩頒銀燭綬削之曰非不巧但非大臣所宜言孔帖灑掃杜宣猷自閩中除宣城中官力也諸道每歲進閹人所謂私白者閩為首焉大閹以下桑梓多係于閩時以為中官藪澤宣猷既至每寒食節散遣將吏挈荷食物祭諸閹塚墓所謂灑掃者也時號為敕使看墓玉泉子鑽火長安每歲諸陵當以寒食薦錫粥鷄毬等又薦雷子車至清明尚食內園官小兒于殿前鑽火先得火者進上賜絹三匹金椀一口都人並在延興門看內人出城灑掃車馬喧鬧新進士則于月燈閣置打毬之宴或賜宰臣以下酴釀酒即重釀酒也輦下歲時記繡草宣臺寒食日賜侍臣帖綵毬繡草宣臺酉陽雜俎獻毬中尚署寒食獻毬百官志清明進新綵鷄子唐書不禁火淮南寒食風俗不禁火連夕燈火至曉燕吳行役記繩橛寒食節內僕司車與諸軍使為繩橛之戲合車轍道兩頭打大撅張繩橛上高二尺許須緊榜定駕車盤轉碾輪於繩上過不失者勝落輪繩下者輸皆裝飾車牛賭物動以千計秦京雜記焚紙錢寒食野祭而焚紙錢則禮樂刑政幾何其不壞矣五代周本紀後序寒食假五代王峻請用顏衍陳同代李穀范質為相論請不已語漸不遜日亭午太祖未食峻爭不已是日寒食假太祖曰俟假開當為卿行莓母生宋徽宗在北作清明詩云莓母初生認禁煙無家對景倍凄然帝城春色誰為主遙指鄉關涕淚連莓母草名北地寒食莓母生尺會錄楊桐飯蜀人遇寒食日採楊桐葉染飯色青而有光食之資陽氣謂之楊桐飯道家謂之青飢飯錙碎錄蹴鞠劉向別錄曰蹴鞠黃帝所造本兵勢也或云起於戰國案鞠與毬同古人蹋蹴以為戲汎舟曲江江淮間寒食家家折柳插門汎舟曲江曲江池天祐初因大風雨波濤震盪累日不止一日無故其水盡竭自後宮闕成荊棘矣今為耕民畜作陂塘資澆溉之用每至清明節都人士女猶有汎舟於其間者南部新書桃花水韓詩曰溱與洧方渙渙兮惟士與女方秉蕳兮薛君注云渙渙盛貌蕳蘭也謂當三月桃花水盛流之時眾士與眾女方執蘭袚除耶惡鄭國之俗三月上巳之辰此雨水之上招魂續魄除拂不祥故時人願與所悅者俱往觀之也除沴周官曰女巫掌歲時袚除釁沴鄭玄云如今三月上巳水上之類也乘舟月令暮春天子始乘舟蔡邕章句云陽氣和暖鮪魚時至將取以薦寢廟故因是乘舟禊於名川也論語暮春浴乎沂自上及下古有此禮今三月上巳袚於水濱蓋出此也邕之言然張衡南都賦袚於陽濱又是也禊是月上巳官民皆絜於東流水上曰洗濯袚除去宿垢疢為大絜絜者言陽氣布暢萬物訖出始絜之矣後漢書注謂之禊也張樂流水戚夫人侍兒賈佩蘭說戚夫人嘗以正月上辰出池邊盥濯食蓬餌以袚妖邪三月上巳張樂於流水如此終歲焉西京雜記袚還三月中呂后袚還過軹道見物如蒼犬據高后掖忽弗復見卜之云趙玉如意為祟高后遂病掖傷史記太后春幸蠶館率皇后列侯夫人桑遵灞水而袚除漢書過平陽主武帝即位數年無子平陽主求良家女十餘人飾置家帝袚霸上還過平陽主主見所侍美人帝不說既飲謳者進帝獨說子夫前漢書歌䪥露永和六年三月上巳日梁沈大會賓客讌乎洛水周舉時稱疾不往沈與親暱酣飲極歡及酒闌倡罷繼以䪥露之歌坐中聞者皆為掩涕太僕張种時亦在焉會還以事告舉舉歎曰此所謂哀樂失時非其所也殃將及乎沈至秋果薨後漢書陽瀕張衡西都賦暮春之禊元己之辰方規齊軫袚于陽瀕杜篤袚禊賦王侯公主暨乎富沈用事伊洛帷幔玄黃索婚盧充因見麞便射中之隨逐不覺遠忽見一黑門如府舍問鈴下對曰崔少府也進見少府少府語充云尊府君為索小女婚故相迎爾三日婚畢以車送充至家母問之具以狀對與崔別後四年充三月三日臨水戲遙見水傍有犢車充往開車戶見崔女與所生男共載情意如初抱兒還充又與金錠乃別續搜神記薄落津後漢書曰袁紹三月上巳大會賓徒於薄落津聞魏郡兵黑山賊于毒等數萬人共覆鄴城殺郡守坐中客家在鄴者皆憂怖失色或起而啼泣紹容貌自若不改常度獻帝春秋曰紹勸督引投壺言笑容貌自若水經注漳水經鉅故城西謂之落津奏樂不視夏統字仲御詣洛到三月三日洛中王公以下莫不方軌連軫並南浮橋邊禊男則朱服耀路女則錦綺粲爛仲御時在船中曝所市藥雖見此輩穩坐不搖賈充望見之深奇其節顧相與語此人有心膽有似冀缺走往問船中安坐者為誰仲御不應重問徐乃荅曰會稽北海間民夏仲御充更就船與語其應如響欲使之任即俛而不答充欲耀以文武鹵薄覬其來觀因而謝之又使女伎服袿襡炫金翠繞其船三匝統危坐如故若無所聞充等各散曰此吳兒是本人石心也別傳晉書水心劍晉武帝問尚書郎摯虞曰三日曲水其義何指答曰漢章帝時平原徐肇以三月初生三女至三日而俱亡一村以為怪乃相攜之水濱盥洗因水以泛觴曲水義起於此也帝曰若如所談便非嘉事尚書郎束晳曰摯虞小生不足以知之臣請說其始昔周公城洛邑因流水以泛酒故逸詩云羽觴隨波又秦昭王三日置酒河曲見有金人出捧水心劍曰令君制有西夏及秦霸諸侯乃因此處立為曲水祠二漢相緣皆為盛集帝曰善賜金五十斤左遷摯虞為陽城續齊諧記祈農三月曲水會禊祭也漢儀濯東流水上不見東流為何水晉中朝公卿庶民皆禊洛水之側趙王倫篡位三日會天淵地誅張林懷帝亦會天淵地賦詩陸機云天淵地南石溝引御溝水池西積石為禊堂跨水流杯飲酒亦不言曲水元帝又詔罷三日㺯具今相承為百戲之具雕㺯伎巧損益無常案禊與曲水其義參差舊言陽氣布暢萬物訖出姑洗聚之也巳者祉也言祈介祉也一說三月三日清明之節將脩事於水側禱祀以祈豐年應劭云禊者絜也言自洗濯也或云漢世有郭虞者有三女二以三月上辰一以上巳二日而產三女並不育今時俗以為大忌是月是日女忌諱不復止家皆適東流水上為祈禳自潔濯謂之禊祠分流行觴遂成曲水案高后袚霸上馬融梁冀西第賦云西北戍亥玄石承輸蝦蟇吐寫庚辛之域即曲水之象也今據禊為曲水事應在永壽之前已有袚除則不容在高后之後祈農之說於事為當南齊志戲樂王濟諸名士當解禊洛水還樂廣問於夷甫曰今日戲樂乎王曰裴僕射善談名理混混有雅致張茂先論史漢靡靡可聽我與王安豐說延陵子房亦超超玄箸七賢論世說晉上巳集宴華林園濟平吳後有華林詩華林華林園中千金堤上作兩銅龍相向吐水以注天泉池通御溝中三月三日石季龍及皇后百官臨池賞會陸翽鄴中記走馬步射石虎三月三日臨水會公主妃主名家婦女無不畢出臨水施張幔車服燦爛走馬步射飲宴終日鄴中記天泉戴延之西征記曰天泉之南有東西溝承御溝水水之北有積石壇云云三月三日御坐流杯之處騎從王導謂王敦曰王仁德未著而名位憂輕兄名已振冥有以共相匡舉會三月三日中宗出禊乘肩輦敦導並騎從紀瞻使人覘之既聞敦導騎從乃大驚自出拜於道左中宗從容謂導曰卿吾之蕭何也晉中興書蘭亭永和九年歲在癸丑暮春之初會于會稽山陰之蘭亭脩禊事也群賢畢至少長咸集蘭亭記南澗孫綽詩序曰以暮春之始解禊于南澗之濱高嶺千尋長湖萬頃東堂晉起居注太和六年三月庚午朔詔云三日臨流杯池依東堂小會宋志云海西於鐘山後流杯曲水延百僚柳泉丘淵之征齊道里記曰城北十五日有柳泉符朗常以為解禊處賦詩李暠三日讌于曲水命群僚賦詩暠為之序崔鴻十六國春秋八公山武帝三月三日登八公山劉安故臺望曰城郭如匹帛之繞藂花也宋書得石生子高琳字季氓琳母嘗袚禊泗濱見一石光彩朗潤遂持以歸是夜夢一人謂之曰此浮磬之精若能寶持必生令子俄而有妊及生子因名琳後周書興慶宮每歲上巳許宮女于興慶宮大同殿前與骨肉相見縱其問訊家眷更相贈遺一日之內人有千萬有初到親戚便相見者有及暮而呼喚姓第不至者涕泣而去歲歲如此中朝故事踏青上巳錫宴曲江都人於江頭禊飲踐踏青草曰踏青李綽歲時記三月三日上踏青鞋履盧公範饋餙儀龍門天后上巳日宴從臣於龍門命賦詩翰林志樂遊園漢宣帝所立唐長安中太平公主于原上置亭遊賞其地四望寬敞每三月上巳九月重陽七夕遊戲就此袚禊登高幄幕雲布車馬填塞綺羅耀日馨香滿路朝士詞人賦詩翌日傳于京師西京記後賜寧申岐薛王其地居京城之最高京師之內俯視指掌每正月晦日三月三日九月九日京城士女咸就此登賞袚禊長安志賜柳圈唐制上已袚禊賜侍臣細柳弮云帶之免蠆毒瘟疫中宗四年上已袚禊于渭濱賦七言詩賜細柳圈李乂應制詩此日欣逢臨渭賞昔年空道濟汾詞沈佺期詩寶馬香車清渭濱紅桃碧柳禊堂春皇情尚憶垂竿佐天瑞先呈捧劍人景龍文館記蓮池蕭頴士蓬池禊飲序云禊逸禮也鄭風有之蓋取諸勾萌發達陽景敷煦握芳蘭臨清川乘和蠲絜用激介祉厥義存矣晉氏中朝始參燕咠之樂江右宋齊又間以文詠風流遂遠鬱為盛集焉天寶乙未暮春三月河南連帥領陳留守李公率府郡佐吏二三賓客帳飲於蓬池備袚除之禮也文粹滍濱歐陽詹魯山三日宴序云三月三日有酒食出于野曰禊飲古俗也貞元十三年季春是日魯山令李胄令宴于縣南滍濱上藩帥同宴貞元十三年冬徐州刺史張建封入覲德宗禮遇加等次年春上巳賜宰臣百僚宴于曲江亭特令建封與宰相同座而食及將還鎮御製詩以送人舊唐書九龍池上巳日亦為士女汎舟遊嬉之所南部新書燕太學韓昌黎上巳燕太學聽彈琴序云天子肇置二令節詔公卿群有司至日率官屬飲酒以樂司業武公於是摠太學儒官三十有六人列燕于祭酒之堂有一儒生抱琴而來鼓有虞氏之南風賡之以文王宣父之操優游夷愉及暮而退皆充然若有得也本集改十三日文宗開成元年歸融為京兆尹時兩公主出降府司供帳事繁又偪近上巳曲江賜宴奏請改日上曰去年重陽取九月十九日未失重陽之意今改取十三日可也獻詩開成二年三月三日河南尹李待價以人和氣稔將禊于洛濱前一日啟留守裴令公公明日召白居易劉禹錫等一十五人合宴於舟中由斗亭歷魏堤扺津橋登臨沂沿自晨及暮簪組交映歌笑間發盡風光之趣極流泛之娛美景良辰賞心樂事盡得于今日矣晉公首賦一章白居易為十二韻以獻末句云夜歸何用燭新月鳳樓西長慶集湘中怨沈亞之作湘中怨云鄭子况為岳陽太守因上巳日攜家登岳陽樓下望鄂渚鄭追想汜人俄有所見聞汜人歌曰泝青山兮江之湄泳湖波兮裊綠裾意拳拳兮心莫舒舟中人亦歌非樓上之人所能辨岳陽風土記陶裒化三月三日以木雕為兔分朋走馬射之先中者勝其負朋下馬奉朋人酒勝朋於馬上接盞飲之番呼此節為陶衰花陶衰是兔化是射武珪燕北雜記龍橋蠶市三月三日遠近祈福於龍橋命曰蠶市成都記油花卜池陽上巳日婦女以薺花點油祀而灑之水中若成龍鳳花卉之狀則吉謂之油花卜圖經袚於素秋漢書八月袚於霸上劉禎魯都賦素秋二七天漢指隅人胥袚除國子水嬉又是用七月十四也自魏以後但用三日不以已也宋書癸辛雜志云上巳當作十干之已蓋古人用日例以十干如上辛上戊之類無用支者若有午尾夘則上旬無已矣故王季夷嵎上巳詞云曲水裙三月二按公謹此說豈偶遺宋晉書耶曲江覆舟李梢雲盧若虛壻也輕率縱酒其妻一夜夢捕梢雲等輩十數人雜以娼妓以長繩係之連驅而去驚覺說之而梢雲夢亦相符會因大畏惡遂斷葷持經三年後以夢滋不驗梢復縱酒如初明年上已與李蒙裴士南梁褒等十餘人泛舟曲江中盛選長安名倡大縱歌妓酒正酣舟覆盡皆溺死廣異記開元春司天密奏玄象有謫見當有名士三十餘人同日死數及第進士正應其數內李蒙者貴主家壻也玄宗以事戒主曰無令愛壻遊宴主居昭國里時大合樂音曲遠暢曲江聯舟進士畢集蒙聞之踰垣走赴忽風暴起畫舸半沉聲伎篙工不知紀極三十八人無一生者獨異志天中記卷四
