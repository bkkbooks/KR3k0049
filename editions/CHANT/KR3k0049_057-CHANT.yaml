body:
  text: 龜甲蟲之長甲之蟲三百六十而神龜為之長大戴禮神靈之精靈龜者玄文五色神靈之精也雒書靈龜文五色似玉似金背陰向陽上隆象天下平法地槃衍象山四趾轉運應四時文著象二十八宿蛇頭龍翅左精象日右精象月千歲之化下氣上通能知存亡吉凶之變寧則信信如也動則著矣說苑神龜神龜之象上圓法天下方法地背上有盤法丘山玄文交錯以成列宿五光昭若玄錦文運轉應四時長尺二寸禮統龜一千年生毛壽五千歲謂之神龜壽萬年曰靈龜述異記靈龜者神龜也王者德澤湛清漁獵山川從時則出五色鮮明三百歲游於蕖葉之上三千歲嘗游於卷耳之上知存亡明於吉凶宋符瑞志千歲之龜五色具焉其額上兩骨起似角浮於蓮華之上或在叢蓍之下其上或時有白雲蟠蛇龜蛇潛蟄則食氣夏恣口而甚瘦冬月蟄而大肥抱朴子天子龜尺二寸諸侯八寸大夫六寸士民四寸龜者陰蟲之老也老者先知故君子舉事必考之逸禮子路問孔子曰猪肩羊膞可以得兆藿葦藁芼可以得數何必以蓍龜孔子曰不然蓋取其名夫蓍之為言蓍也龜之為言舊也明狐疑之事當問耆舊也論衡龜之言久也千歲而靈此禽獸而知吉凶者也洪範五行嘉林萬畢石朱方傳曰有神龜在江南嘉林中嘉林者獸無虎狼鳥無鴟梟草無毒螫野火不及斧斤不至是為嘉林龜在其中常巢於芳蓮之上左脅書文曰甲子重光得我者匹夫為人君有土正諸侯得我為帝王史記上有禱蓍下有神龜蓍生滿百莖者其下常有龜守之其上有青雲覆之南方老人用龜支床足行二十餘歲老人死移床龜尚生不死龜能氣導引上記曰能得名龜者財物歸之家必大富至千萬一曰北斗龜二曰南辰龜三曰五星龜四曰八風龜五曰二十八宿龜六曰日月龜七曰九州龜八曰玉龜凡八名龜圖各有文在腹下云云者此某之龜也取此龜不必滿尺二寸民人得長七八寸可寶矣上一曰神龜二曰靈龜三曰攝龜四曰寶龜五曰文龜六曰筮龜七曰山龜八曰澤龜九曰水龜十曰火龜爾雅易損五爻云或益之十朋之龜鄭注引之龜人掌六龜之屬各有名物天龜曰靈屬地龜曰繹屬東龜曰果屬西龜曰靁屬南龜曰獵屬北龜曰若屬各以其方之色與其體辨之凡取龜用秋時攻龜用春時各以其物入於龜室上春釁龜祭祀先卜周禮神龜出於江水中盧江郡常獻生龜於大卜其含神知為効之大南越志神屋龜甲一名神屋出南海生池澤中吳越謂之元佇神龜大如拳而色如金上甲兩邊如鋸齒爪至利而能緣大木捕鳴蟬至美可食不中於卜以其小故也上龜一千二百歲可卜天地之終始何以言之三千四十二占於天地千歲之龜甲黑龜有五色依時用之青靈之龜春宜用之西坐東向赤靈之龜夏宜用之北坐南向柳莊龜經萬物先伏闇能存而能亡者蓍龜與龍是也龜生於水發之於火於是為萬物先為禍福正管子先知龜為前列先知也金次之見情也禮器郊特牲合璧作禮運誤號為先知君抱朴子灼龜祝曰假之玉靈夫子夫子玉靈荊灼而心令而先知而上行於天下行於淵諸靈數制莫如汝信史記山中辰日稱雨師者龍也稱河伯者魚也稱時君者龜也抱朴子玄衣督郵龜一名玄衣督郵古今注龜燋黃帝五十年秋七月庚申天霧三日三夜晝昏黃帝以問天老乃召史卜之龜燋史曰臣不能占也其問之聖人帝曰已問天老力牧容成矣史北面再拜曰龜不違聖智故燋宋符瑞志高祖將遷都謂元丕云昔軒轅兆卜龜焦卜者請訪諸賢哲軒轅乃問天老天老謂為善遂從其言終致昌吉然則至人之未然審於龜矣魏書黃帝東巡河過洛修壇沉璧受龍圖於河龜書於洛赤文篆字水經堯時與群臣賢智到翠媯之川大龜負圖來投堯堯敕臣下寫取告瑞應寫畢龜還水中龍魚河圖陶唐之世越裳國獻千歲神龜方三尺餘背上有文皆科斗書記開闢已來帝命錄之龜曆伏滔述帝功德銘曰朱書龜曆之文述異記禹時有神龜於洛水負文列於背以授禹文即治水文也洛陽記禹卑宮室靈龜見宋志白若昔夏后開使蜚廉折金於山川而陶鑄之於昆吾是使翁難乙灼白若之龜初學記見墨子今本作毚玄龜玄龜書者天符也王者德至淵泉則洛出龜書宋志周公旦攝政七年與成王觀於河洛沉璧於洛玄龜青龍蒼光止於壇背甲刻書赤文成字周公援筆以世文寫之書成文消龜墮甲而去其言自周公訖於秦漢盛衰之符上桓公曰何謂御神用寶管仲對曰北郭有掘闕而得龜者此檢數百里之地也令過之平盤之中而藏諸泰臺立寶曰無貲後果得丁氏粟而伐孤竹管山權數孔子問漆雕憑平曰子事臧文仲武仲及孺子容此三大夫孰賢對曰臧氏家有守龜焉名曰蔡文仲三年而為一兆武仲三年而為二兆孺子容三年而為三兆憑從此之見君問三人之賢與不賢所未敢識也孔子曰君子哉漆雕氏之子其言人之美也隱而顯言人之過也微而著智而不能及明而不能見孰克如此家語臧武仲自邾使告滅賈且致大蔡焉曰紇不佞失守宗祧敢告不吊紇之罪不及不祀子以大蔡納請其可賈曰聞命矣再拜受龜襄二十三明月之珠出於蠬蜄周之簡圭生於垢石大蔡神龜出於溝壑淮說山元龜為蔡非四民所得居食貨志鄭玄云龜出蔡地因以為名師古曰本以蔡出善龜故因名孔頴達正義曰鄭注非也臣瓚曰蔡是大龜名也書曰九江納錫大龜大龜不出蔡國也若龜出楚不可名龜為楚也又鄿春蔡山出大龜尚書曰九江納錫大龜即此山之龜也寰宇記僂句臧昭伯如晉臧會竊其寶龜僂句以卜為信與僣僣吉後會出奔見執平子怒及昭伯從公平子立臧會會曰僂句不余欺也昭二十五昭兆魯侵鄭不假道於衛靈公怒使追之公叔文子曰昭公之難君將以文之舒鼎成之昭兆定之鞶鑑茍可以納之擇用一焉今將以小忿蒙舊德無乃不可乎定五青純盜竊寶玉大弓寶者何璋判白弓繡質龜青純公羊定八純緣也謂緣甲𩑺也千歲之龜青髯明於吉凶註青黑緣者天子之寶龜也樂記諸侯以龜為寶以圭為瑞家不寶龜不藏圭禮器平準書人用莫如龜索隱云禮云諸侯以龜為寶是也史左正義以所盜無龜公羊之妄也宋元君夜半而夢人被髮闚阿門曰予自宰路之淵予為清江使河伯之所漁者余且得予元君覺使人占之曰此神龜也君曰漁者有余且乎左右曰有君曰令余且會朝明日余且朝君曰漁何得對曰且之網得白龜焉箕圓五尺君曰獻若之龜龜至君再欲殺之再欲活之心疑卜之曰殺龜以卜吉乃刳龜七十二鑽而無遺筴仲尼曰神龜能見夢於元君而不避余且之網知能七十二鑽而無遺筴不能避刳腸之患如是則知有所困神有所不及也莊外物莊子釣於濮水楚王使大夫二人往先焉曰願以竟內累矣莊子持竿不顧曰吾聞楚有神龜死已三千歲矣王巾笥而藏之廟堂之上此龜者寧其死為留骨而貴乎寧其生而曳尾於塗中乎二大夫曰寧生而曳尾塗中莊子曰往矣吾將曳尾於塗中上秋水邦人獻燕昭王以大豕者曰於今百二十歲邦人謂之豕仙其群臣言於昭王曰是豕無用王命宰夫膳之豕既死乃見夢於燕相曰今仗君之靈而化吾生也始得為魯津之伯而浮舟者食我以粳糧之珍而欣君之惠將報子焉後燕相遊於魯津有赤龜銜夜光而獻之符子龜筴鬼神不足以舉勝左右背鄉不足以專戰然而恃之愚莫大焉越王勾踐恃大明之龜與吳戰而不勝身臣入宦於吳反國棄龜明法親民以報吳則夫差為擒故恃鬼神者慢於法恃諸侯者危其國鑿龜數筴兆曰大吉而以攻燕者趙也鑿龜數筴兆曰大吉而攻趙者燕也劇辛之事燕無功而社稷危鄒衍之事燕無功而國道絕韓餙邪元龜岠冉長尺二寸直二十一百六千為大貝十朋公龜九寸直五百為壯貝十朋候龜七寸以上直三百為么貝十朋子龜五寸以上直百為小貝十朋是為龜寶四品食貨志人有出行墮深泉澗者無出路饑餓分死左右見龜蛇甚多朝暮引頸向東方人因伏地學之遂不復饑體殊輕便能登巖岸經數年後試竦身舉臂遂超出澗上即得還家顏色悅懌頗更黠慧勝故還食穀啖滋味百餘日中復其本質博物志張廣定籠懸幼女於古塚中事同見異聞記郗儉少時行獵墮空塚中饑餓見有一大龜數數迴轉所向無常張口吞氣或俛或仰儉素聞龜能導引乃試隨龜所為遂不復饑百餘日後竟能咽氣斷榖魏王棄置土室中閉試之一年不食顏色悅懌氣力自若抱朴子魏文帝嘗試郗儉辟榖百日猶與寢處行步起居自若也夫人不食七日則死而儉乃能如是典論吳孫權時永康縣有人入山遇一大龜即束之以歸龜便言曰遊不量時為君所得人甚怪之擔出欲上吳王夜泊越里纜里於大桑樹宵中樹呼龜曰勞乎元緒奚事爾邪龜曰行不擇日今方見烹雖盡南山之樵不能潰我樹曰諸葛元遜識性淵長必致相困今求如我之徒計將安泊龜曰子明無多辭禍將及爾樹寂而止既至建業權命煮之焚柴萬車語猶如故諸葛恪曰燃以老桑乃熟獻者仍說龜樹共言權使伐桑取煮之立爛故今烹龜猶多用桑野人呼龜曰元緒異苑海畔有大石龜俗云魯班所作夏則入海冬復止於山上陸機詩云石龜常懷海我寧忘故鄉述異記晉長沙王乂坐同產兄楚王瑋事徙封常山後還復國在常山穿井入地四丈得白玉方三四尺玉下有大石其中有龜長二尺餘時人以為復國之祥宋志論者曰仲尼獲麟而卒是亦有不終之象也後果如讖言寰宇記龜顧孔愉字敬康嘗至吳興縣餘于亭見入籠龜於路愉求買放之於溪中龜行至水反顧愉及封此亭侯而檮印龜首迴屈三鑄不正有似昔龜之顧靈德應感如此愉悟乃取而佩焉會稽後賢傳咸康中豫州刺史毛寶戎邾城有一軍人於武昌市見人賣一白龜子長四五寸潔白可愛便買取持歸着瓮中養之曰白大近欲尺許其人憐之持至江邊放水中視其去後邾城遭石季龍販毛寶棄豫州既赴江莫不沈溺於時所養龜人被鎧持刀亦同自投既入水中覺如墮一石上水裁至腰須臾浮出中流視之乃是先所養白龜甲六七尺即送至東岸出頭視此人徐游而去中江猶迴首數顧焉續搜神記幽冥錄按本傳邾城之役寶亦溺死庾亮痛哭發疾遂薨其軍人放龜事亦附傳末白氏六帖引搜神記直以為寶事而後之合璧記纂對類等書俱承誤不改爾雅翼復以毛寶過江白龜載之而度為異何耶鄱陽縣民黃赭入山採荊楊子遂迷不知道數日饑餓忽見一大龜赭便呪曰汝是靈物吾迷路不知道今騎汝背示吾路龜即回右轉赭即從行去十餘里便至溪水見賈客行船赭即往乞食便語船人云我向者於溪邊見一龜甚大可共往取之言訖面即生瘡既往亦復不見龜還家病數日而死續搜神記苻堅建元十二年高陸縣民穿井得龜大三尺背文負八卦古字堅命以石為池養之十六年而死藏其骨於太廟以問吉凶名為客龜是夜廟丞高虜夢龜言曰我將出龜江南遭時不遇殞命秦庭虜於夢中自解曰龜三萬六千歲而終終必亡國之徵也未幾為謝玄破於淮淝自縊新城浮圖中秦祚因即淪矣車穎麈書水經載記泰始二年八月丙寅六眼龜見東陽長山文如爻卦太守劉勰以獻宋志先天三年丁未江州獻靈龜六眸腹下有玄文象卦爻唐書翠毫徐湛之翠龜表曰句容縣人獲龜一頭體披翠毫騰躍飛集中候劉交居若耶溪忽聞有人採蓮喧笑聲交以溪左右無人居甚訝之乃斷柳枝蔽身視之忽見十餘女子從一華林而出皆衣青綠年十六七入叢蓮相對而歌交乃棹舟以逼之諸女皆化為龜入水五色線齊王奐夜泊江州叢葦中見綠青碧衣女子十餘人相語事同見九江記臨江郡民留京孝行鄉里推敬時江水暴溢居者皆漂溺京負其母號泣忽有大龜至其前舉家七口俱上龜背行十餘里及一高岸龜遂去之上梁天監二年安豐得一角龜龜武帝遂作一鼎投得龜處鼎錄遺龜梁時烏程有蘇氏女于霅溪西南岸遇一道士曰汝後大貴因遺一五彩龜云三年當有徵蘇氏後適張氏生陳高祖宣后高祖即位拜后母為安吉縣君遂名其浦為貴溪寰宇記掘地得龜陸法和嘗至襄陽城北大樹下畫地方二尺令弟子掘之得一龜長尺半以杖叩之曰汝欲出不得得已數百歲不逢我者豈見天日乎為受三歸龜乃入草北齊開皇中掖庭宮每夜有人來挑宮人宮司以聞帝曰門衛甚嚴人何從而入當是妖精耳因戒宮人曰若逢但斫之其後有物如人夜來登床宮人抽刀斫之若中枯骨其物落床而走宮人逐之因入池而沒明日帝令涸池得一龜徑尺餘其上有刀迹殺之遂絕隋志道州營陵中龜甲長八尺下自然有文字前後四足各踏一龜踏龜有時行或踰山越水俗莫敢犯錄異記金樓子武德末太宗平內難苑中池內有白龜游於荷葉之上太宗取之化為白石瑩潔如玉故登極之後降制曰皇天眷祐錫以寶龜錄異記金龜唐明皇帝嘗有方士獻一小龜徑寸而金色可愛云此龜神明而不食可置之枕筒之中辟巨蛇之毒後小黃門有竄南徼者上以賜之至象郡屬邑於旅館出之階下果祛報冤蛇之毒於一方云上王勣遊嵩山少室遇日暮止一石室中月夜有人面闊白鬚眉長黑而矮稱毛生與勣談議勣疑怪取鏡照之其人失聲俯伏化而為龜身帶綠毛焉異聞集李德裕曰揚雄蜀王本紀張儀築城依龜行迹築之予未至郡日嘗聞龜殼猶在城內昨詢訪耆舊有軍資庫官宇文遇者言比常在庫中見龜殼長六尺元和初節度使高崇文知之命工人截為腰帶胯具自張儀至崇文千餘載龜殼尚在而武臣毀之深可惜也戎幕閒談續博物志孔帖引德裕鎮西川龜殼猶在後為高崇文截作腰帶胯按本傳崇文元和初討劉闢拜東川節度德裕太和四年時徙西川相去已二十餘年矣云後誤貞元末福州有村人賣一籠龜其數十三販藥人徐仲以五鍰獲之村人云此聖龜不可殺徐置庭中一龜藉龜而行八龜為導悉大六寸徐遂放於乾元寺後林中一夕而失雜俎張鋋見巴西侯飲酒命樂久之有告者曰洞玄先生在門言訖有一人被黑衣頸長而身甚廣揖之與坐曰席上人將有圖君巴西怒曰歡宴方洽何遽有怪命殺之天將曉鋋悸悟見身臥石龕中一龜形甚巨於龕前乃向所殺洞玄先生也宣室志徐太尉彥若赴廣南將渡小海從者於淺中得一琉璃瓶中有一龜長可以寸旋轉而不停而瓶項極細不知何自而入取置舟中其夕忽覺舟偏重視之則眾龜層疊就船而上其人懼而取瓶投之眾龜遂散既而話於海舶胡人曰此乃龜寶也希世之靈物惜其遇而不能有蓋福薄之人不勝也茍得而藏於家何慮寶藏之不豐哉胡客惋嘆不已金華子道士陳釗云南人採龜溺以其性妬而與蛇交或雌蛇至有相趁闘噬力小致斃者採時取雄龜置瓷盌及小盤中於龜後以鏡照之既見鏡中龜即淫發而失溺又以紙炷火上㶸熱點其尻亦致失溺然不及鏡照也又海上人云龍生三卵一為吉弔也其吉弔上岸與鹿交或於水邊遺精流槎遇之枯褁木枝如蒲桃焉色微青黃復似灰色號紫稍花益陽道別有方說北夢晉成帝時尚書徐恬因夜井發光遂奏請捨宅為寺賜名靈光錢文穆王時立山門掘地得一小龜介甲分明尾繞身一匝遂改靈龜寺嘉興志大觀元年閏十月丙戌都水使者趙霖得龜兩首於黃河獻以為瑞蔡京曰此齊小白所謂罔象見之而霸者也鄭居中曰首豈有二帝命棄龜金明池宋志及居中傳路允迪公弼政和中奉使三韓舟行海中忽見黑山湧起山頂有光如兩日並出者官吏大恐舟師曰此大龜出遊兩日者其雙目也當即以三牲祠之公弼口占祝詞率官寮焚香再拜投牲良久乃沒寓簡客有投縉雲山寺中宿者僧為具饌羞鱉甚美但訝其無裙耳入後屋見黃泥數十團大如缶問其徒即向所食者在其中取龜以黃泥褁之三日龜服氣肥息特異江鄰幾雜志惠州海豐海中有巨龜其大不知幾千里今渡海往往見巨龜在沙嶼間背上生樹木如洲島昔有商者或依以採薪及作食龜既熱便入海於是死者輒數十人然後知其龜也寰宇記金樓子同夫龜甲黃足赤眼白尾青腹黑者蓋稟受乎五行之粹也然而性畏刀鐵之器聞其聲則不能動矣龜經骨白龜經云欲知龜有神視骨白如銀蘇氏演義中文名曰千里其通首橫文之第一級左右有斜理皆接於千里者龜王之文也今取常龜驗莫有也金華子海陽以南濱大海得名有官鄣湖出名龜以卜勝於含洭龜也元和郡縣志宗淵字叔林晉太元中為潯陽太守得十頭龜付廚曰每日以二頭作臛其夜夢十丈夫皁衣袴褶扣頭求哀明夜復夢八人求命方悟乃放之後夢八人來謝續搜神記夢雋有龜被野千所包藏六而不出野干怒而捨去佛告諸比丘當如龜藏六自藏六根魔不得便雜阿含經昔有道人河邊學道但念六塵心無寧息龜從河出水狗將噉龜龜縮頭尾四腳藏於甲中不能得便狗去還出便得入水道人因悟我不及龜放恣六情不知死至法句經巨鼇鼇巨龜也以背負山周迴千里玄中記韻會云大鱉也雅翼云列子灼其首以卜則鼇之為龜無疑者渤海之東有大壑焉其中有五山根無所連着常隨波上下往還不得蹔峙焉仙聖毒之訢於上帝上帝恐流於西極失群聖之居乃命禺彊使巨鼇十五舉首而戴之迭為三番六萬歲一交焉五山始峙而龍伯之國有大人舉足不盈數步而暨五山之所一釣而連六鼇合負而趣歸其國灼其骨以數焉列湯問北極之神名曰禺彊靈龜為之使大荒經鼇抃鼇戴山抃何以安之天問有巨靈之龜背負蓬萊之山而抃舞戲滄海之中列仙傳登蓬萊而容與兮鼇雖抃而不傾張衡賦于頔在海南日一夜方三更忽曉如日初出移時復暗徧嶺南悉然後有海客言其夜海中見大金鼇浮出目光照耀天地如白晝徐徐復沒驗其日正同方知鰲光紀聞譚贔負巨鼇贔負首冠靈山蜀都賦雌鼇贔負鼇也一曰雌鼇為贔韻會魏都賦靈巨贔負薛注作力貌則韻會誤或引爾雅為九種龍更誤江鼉江水多鼉似蚚蝪長二丈有麟彩皮堅可以冒皷山經口內涎有毒長一丈者能吐氣成霧致雨力至猛能攻䧟江岸性嗜睡但目閉形如龍大長者自嚙其尾極難死聲甚可畏人於穴中掘之百人掘亦須百人牽一人掘亦須一人牽不然終不可出本草於物難死沸湯沃口入腹良久乃剝爾老者多能變化為邪魅上鼉皷李斯書樹靈鼉之皷史記鼉宵鳴如桴皷今江淮謂鼉鳴為鼉皷其數應更吳越謂之鱓更趙辟公雜說云鼉聞鼓聲則鳴埤雅㹠將風則踴鼉欲雨則鳴上土龍鼉長一丈一名土龍鱗甲黑色能橫飛不能上騰其聲如鼓續博物志鼉魚有四足尾如蝘蜓而大南方嫁娶必得食之魏武赤壁還所掘得之是也廣志孫亮初公安有白鼉鳴謠曰鼉鳴龜背平南郡城中可求生求死不去來無成明年諸葛恪敗弟融鎮公安被收融刮金印龜背一服而死吳志梁周興嗣常食其肉後為鼉所噴便為惡瘡此物靈強不可食也本草燉煌李鷸開元中為邵州刺史絜家之任沃洞庭時時景登岸因鼻衂沙上為江鼉所䑛俄然復生一鷸與之無異鷸之本身為鼉法所制繫於水中其家奉鼉妖就任為郡幾數年因天下大旱西江可涉道士葉靜能自羅浮赴詔過洞庭忽沙中見一人面縛問之鷸以狀對靜能書符帖巨石上石即飛起空中鼉妖方擁案晨衙為巨石所壓乃復本形時張說為岳州刺史具奏並以舟楫送鷸赴郡家人妻子乃信今舟行者相誡不瀝血於波中以此故也獨異志中宗時國子祭酒葉靜能善符禁小術出入宮掖帝遇毒韋后臨朝謀危社稷臨淄王舉兵誅其黨靜能等悉見誅舊紀聞有人撰集恠異記傳云玄宗令道士葉靜能書符不見國史不知葉靜能中宗朝坐妖妄伏誅在玄宗時有道術者乃法善也談詁之小誤差尚可若著於文字其誤甚矣因話錄介物上元二年有鼉集揚州城門節度使鄧景山以問族弟珽對曰鼉介物兵象也未幾宋州刺史劉展反傳志鼉城貞元中有湘媼常以丹篆救人疾一日告鄉人曰欲往洞庭救數百人性命里人張珙為具舟楫送之欲至洞庭前一日有大風濤蹙一巨舟泊一君山島上而碎所載近百餘人各星居於島上忽有一白鼉長丈餘遊於河上數十人攔之撾殺分食其肉明日有城如雪圍繞島上其城漸窄束其人為簇其間不廣三數丈岳陽人亦遙望雪城莫能曉也媼遂登島飛劍刺之白城一聲如霹靂遂崩乃一大白鼉長千餘丈蜿蜒而斃媼乃劉綱妻樊夫人也女仙傳傳奇宣和己亥都城北小民家晨起見一物如龍伏床下大驚都人競往觀之禁中取去驗之鼉也杖殺之已而大水數年有金人之禍猗覺寮河伯使者黿一名河伯使者古今注屠黿解其肥肉唯腸連於頭而經日不死猶能齧物鳥往食之則為所得漁者或以張鳥雀博物志黿其狀如鱉腹下赤者為黿白者為鱉俗云黿之身有十二屬肉漁人捕得之雖支分臠解隨其巨細未投湯鑊者皆能跳走鱉與黿雖至大者如蚊蚋噆之一旦乃死錄異記為梁禹洛巨海黿鼉為梁拾遺記穆王三十七年起師至九江以黿鼉為梁也竹書楚人獻黿於鄭靈公公子宋與子家將見子公之食指動以示子家曰他日我如此必嘗異味及大宰夫將解黿相視而笑公問之子家以告及食大夫黿召子公而弗與也子公怒染指於鼎嘗之而出公怒欲殺子公子公與子家謀夏弒靈公宣四齊景公渡江沅之河黿銜左驂沒之眾皆愓懼古冶子於是拔劍從之邪行五里逆行三里至於砥柱之下乃黿也左手持黿頭右手挾左驂䴏躍鵠踴而出仰天大呼水為逆流三百步觀者皆以為河伯也搜神記水經云江沅景公不至河伯本非江神晏子云從黿濟河事或在茲樊噲披帷入見高祖高祖踞洗以對酈生當此之會乃黿鳴而鱉應也應間黿鳴岐野鱉應於泉焦氏易林白黿命鱉蜀都賦化黿漢靈帝時江夏黃氏之母浴伏盤水中久而不起變而為黿入于深淵其後時時出見初浴簪一銀釵及見猶在其首於是黃氏累世不敢食黿搜神記後志孫皓時宣騫母事同廣古今五行志黃河中舊不生黿時有得者以獻石季龍佛圖澄見而嘆之曰桓溫入河其不久乎溫字元子後果如其言澄傳韋丹未第時於洛陽中橋見漁者得一大黿長數尺繫之橋柱引頭四顧有求救之意丹以乘驢贖之放于水中徒步而歸後數日韋詣胡蘆生問命生與共往元長史家有老人元濬之向韋盡禮款待懷中出文字一通授之曰此公一生官祿行止聊報活命之恩即其黿也唐史原化記吉凶影響錄千鈞海黿大一畝重千鈞廣雅黿脂黿脂得火可以然鐵燒黿致鱉淮萬畢術人語千歲龜黿能與人語搜神記能鱉三足能龜三足賁爾雅從山多三足鱉大山三足龜山經吳興郡陽羨縣君山上有池池中出三足鱉又有六眼龜雅註河伯從事鱉一名河伯從事古今注守神鱉無耳為守神酉陽鱉無耳而目不可以瞥蔽精於明也淮說林鱉目白腹下有三易註作天字者卜一作十字者不可食酉陽鱉九肋者勝易註沅江鱉甲九肋者稀摭言青泥殺鱉得見復生體鱉剉令如棊擣赤莧汁和合厚以茅苞五六月作投池澤中經旬臠臠成鱉博物志怒小公父文伯飲南宮敬叔酒以露睹父為客羞鱉焉小睹文怒相延食鱉辭曰將使鱉長而後食之遂出文伯之母聞之怒曰吾聞之先子曰祭養尸饗養上賓鱉子何有而使夫人怒也遂逐之魯語飲渴鄭縣人乙子妻之市買鱉以歸過潁水以為渴也因縱而飲之遂亡其鱉韓非子後漢溪夷田彊遣子魯居上城次子玉居中城小子倉居下城三壘相次以拒王莽光武遣劉尚征之尚未至倉獲白鱉為臚乃舉烽請兩兄兄至無事及劉向軍來倉舉火魯等以為不實遂戰死焉酉陽汝南有妖常作太守服詣門椎鼓郡中患之及費長房來知是魅乃呵之即解衣冠叩頭乞自改變為老鱉大如車輪長房令復就太守服作一札敕葛陂君魅叩頭流涕持札去視之以札立陂邊以頸繞之而死列異傳石季龍時利州谷綿縣山北溪中有鱉數千頭登岸暴田苗發軍殘毀至今鱉無頭也北戶錄注昔有人與奴俱得心腹病治不能愈奴死乃刳腹視之得有白鱉赤眼甚鮮淨以諸藥內鱉口中終不死後有人乘白馬者馬溺濺鱉縮頭藏血乃試取溺灌之豁然消成水病者頓飲一升即愈志怪方革云食鱉不可食莧因並啖之自此苦腹痛作時幾不知人疑鱉莧所致乃以二物令小蒼頭食之蒼頭遂得疾與革類而委頓尤劇未幾遽死舁屍置馬廄未殮也忽小鱉無數自九竅涌出散走廄下惟遇馬溺者輒化為水革聞自臨視掊聚眾鱉以馬溺灌之皆即為水於是革飲馬溺遂差或云白馬溺尤良瑣碎錄嗜鱉張澤為房知溫從事性素嗜鱉忽暴卒經宿而活云為太山府君所追責其食鱉過差為群鬼投於沸鼎中支解烹飪亦如治鱉之狀既熟為諸鬼分噉其慘毒苦痛名狀所不及如此者近數十度府君始恕之且問曰汝受諸苦敢再犯乎荅曰不敢始令遣歸五代史補偽蜀豐資院使李延福晝寢公廳夢烏帽三十人伏於堦下但云乞命驚覺僕使報門外有村人獻鱉三十頭因悟所夢遂放之儆戒錄晉崔梲姑家來晨會客夜夢十九人衣青綠羅衣乞命事同玉堂閒話黃德瓌家人烹鱉將箬笠覆其釜揭見一鱉仰把其笠背皆蒸爛然頭足猶能伸縮家人愍之潛放河涇間後因患熱將殛德瓌徙於河邊屋中將養夜有一物徐徐上身覺甚冷及曙視胸臆悉塗淤泥其鱉在上間三曳三顧而去即日病差韜光錄宋傅慶嘗得數鱉付廚廚婢放大鱉報同括異志南唐僧謙光有才辨而無拘檢性尤嗜鱉國主嘗以從容語及什氏果報對曰老僧無他願但得鵝生四隻腿鱉長兩重裙足矣國主大笑五代史補長鬚鱉為臛數食可長鬚酉陽闕子曰義渠之人烹龜鱉不熟臊穢腥臭中國之民雖饑餓三日不啟口至死不食也吳章莊吉受而和之病人食之為之體輕萬乘食之為之解怒故龜鱉至腥臊不可加然而病人為之體輕萬乘為之解怒何也吳章莊吉之調存也唐進士李詹平生廣求滋味每食鱉輒絏其足曝於烈日鱉既渴即飲以酒而烹之鱉方醉已熟矣玉泉子玳瑁大如扇似龜甲有文解毒兼辟邪唐嗣薛王鎮南海海夷廬亭獻生玳瑁一枚王令揭取背甲小者二片帶於左臂腕以辟毒玳瑁亦甚苦楚復養於使宅後池伺其揭處漸生復遣廬亭送於海畔並無傷矣或云玳瑁若生帶之有蟲毒即自搖動死者則不能神本草鱟鱟形如惠文冠十二足似蟹山經注亦似便面廣志骨眼眼在背上口在腹下雌常負雄而行捕者必雙得之若摘去雄者雌者即自止背負之方行腹中有子如菉豆南人取以為醬尾中有珠如粟色黃雄小雌大置之水中雄者浮雌者沉嶺表錄異其相負雖風濤終不解失雌則不能獨活廣志故號鱟媚雅翼其珠南人或帶或磨飲之云利市北戶錄殼可為冠次於白角南人取其尾為小如意雜俎背上有骨如扇酉陽云如石珊瑚乘風而行名鱟帆其眾如簰筏名鱟簰番寓雜記昔有漁者庶其廉與婦不和一日獲此既而悔曰是物也人人或不如可乎歸召婦與居禮之終身對類乘鱟黿鼉同罛共羅吳都賦天文十二星宮有巨蟹焉釋典無腸公子山中無腸公子者蟹也抱朴子雌雄蟹蛫也雄曰𩷕䱺雌曰博帶廣雅蟹胥庖人共祭祀之好羞鄭注好羞謂四時所謂膳食若荊州之鱔魚揚州之蟹胥周禮胥蟹醢也說文蟹醬也音什盈車王會海陽大蟹注海水之陽一蟹盈車周書姑射國大蟹在海中注女丑有大蟹廣千里也山經天下之大物有北海之蟹焉舉一螯能加于山上身故在水中玄中記蟹始窟穴於沮洳中秋冬交必大出江東人云稻之登也率執一穗以朝其魁然後從其所之蚤夜觱沸指江而奔漁者緯蕭承其流而障之曰蟹斷斷其江之道焉耳陸蟹志輟耕錄云緯蕭二字尤奇緯蕭字見莊子漁父篇已具龍部魏書云胡叟救蜀僧法成之死法成感之多遺珍物叟曰緯蕭何人能棄明珠吾為德請財何為也一無所受夫讀史者多止檢南北吏陶遺魏書固也而莊亦不及豈悔讀南華第二篇耶蟹六跪而二螯非虵蟺之穴無所寄託者用心躁也荀勤學跪足也韓子以刖足為刖跪注太玄蟹之郭索後蚓黃泉范明叔云言蟹之與蚓者用心之不一雖有郭索多足之蟹不如無足之蚓者以其用心之一也銳前一漢武帝善苑國嘗貢一蟹長九尺有百足四螯因名百足蟹煮其殼勝於黃膠亦謂之螯膠勝於鳳喙之膠也洞冥記朱登為東海相遺敞蟹醬報書曰蘧伯玉受孔氏之賜必及鄉黨謹分斯貺於三老尊行者曷敢獨享之張敞集晉太康四年會稽郡蟛蚑及蟹皆化為鼠其眾覆野大食稻為災始成有毛肉而無骨其行不得過田塍數日之後則皆為壯搜神記張華裴頠之被誅也趙王倫以宿仇收繫兄弟將殺之梁王彤救之倫等怒曰我見水中蟹猶惡之况此人兄弟輕我耶遂並戮其妻子解系傳蠏醬石崇冬月得蠏醬齊王愷貨崇帳下求取去釋名左持畢卓字茂世嘗謂人曰左手持蟹螯右手執酒杯拍浮酒池中便足了一生世說蟚蜝蔡謨初渡江見蟚蜞大喜曰蟹有八足加以二螯令烹之既食吐下委頓方知非蟹後詣謝尚說此事尚曰卿讀爾雅不熟幾為勸學死上埤雅云蔡謨食之瀕死嘆曰讀爾雅不熟幾為勸學所誤豈因隱居本草之誤耶蟛椶蠏也嘗通夢於人自稱長卿今臨海人多以長卿呼之搜神記證俗音有毛者曰蟛蜞無毛者為蟛螖堪食俗呼蟛越訛耳北戶錄異物志云擁劍狀如蟹但一螯偏大爾俗謂之越王鈴下何遜詩云躍魚如擁劍是不分魚蟹也顏氏家訓其螯赤一名執火古今注又名桀步本草吳郡獻蜜蟹二千頭作如糖蟹法蜜擁劍四瓮吳都賦所謂烏擁劍是也大業拾遺煬帝幸江都吳中貢糟蟹糖蟹每進御則旋潔拭殼面以鏤金龍鳳花貼上清異錄螗蟹平原郡貢糖蟹採於河間界每年生貢斲冰火照懸老犬肉蟹覺犬肉即浮因取之一枚直百錢以氈蜜束於驛馬上馳之至京酉陽近世有波斯乘舶泛海往天竺漂入大海至一島中得諸寶甚多隨風掛帆而行遙見峰上有赤物如虵形久之漸大胡曰此山神惜寶來逐我也為之奈何舟人莫不戰懼俄見兩山從海中出高數百丈胡喜曰此兩山者大蠏螯也其蟹常好與山神闘神多不勝甚懼之今其螯出無憂矣大虵尋至蟹許盤鬥良久蟹夾虵頭死於水上如連山船人因是得濟也廣異記昔有人行海得洲林木甚茂乃維舟登岸爨於水傍半炊而林沒於水遽斷其纜乃得去詳視之大蟹也異物志僕射嚴續位高寡學為時所鄙江文蔚作蟹賦以譏之云外視多足中無寸腸口裏雌黃每失途而相煦胸中戈甲常聚眾以橫行續深赧之湘山野錄一代不如一代陶榖奉使吳越忠懿王宴之因食蝤蛑詢其族類忠懿命自蝤蛑至蟛凡十餘以進穀曰真所謂一代不如一代也聖宋拾遺艾子何一蟹不如一蟹也甲胄乞貸餘杭尉范達夜夢甲胄而拜於庭北七人云某等皆錢氏時歸順人今海行失道死在君手幸見貸也既覺人有以蝤蛑七枚為獻因遣縱之于江春渚紀聞鄒浩為蔡京所忌謫居昭州使役者濬感應泉一二尺許於亂石之下得蟹一枚自放於江曰予至五嶺不睹此物數年矣亂石之下又非所宜穴處也何從而出耶易不云乎物不可以終難故受之以解蟹者解也天實告之矣蒙恩歸侍立可待也於是乎書道鄉集故老相傳建陽縣南興上里山谷中水極清冽嘗產白蟹有直行之異遇歲旱鄉人入谷以盆貯之迎而歸即雨建寧志十二種呂亢守台州命工作蠏圖凡十二種一曰蝤蛑二曰撥棹三曰擁劒四曰彭螖五曰竭朴六曰沙狗七曰望潮八曰倚望九曰石𧋕十曰蜂江十一曰蘆虎十二曰蟛蜞又海商言海中纏鼊島之東一島多蟹種類甚異有虎頭者有翅能飛者有能捕魚者有殼大兼尺者傅嘉祐十二種論紅蟹殼殷紅色巨者可以裝為酒杯也虎蟹殼上有虎班可裝為酒器與紅蟹皆產瓊崖海邊雖非珍奇亦不易採得也嶺表錄異蝤䗋大者長尺餘兩螯至彊八月能與虎闘虎不如隨大潮退殼一退一長酉陽蟹八月腹內有芒芒真稻芒也長寸許向東輪與海神未輪芒不可食上開腹中猶有海水本草腹毛蟹腹下有毛殺人酉陽敗漆磁石引鐵蟹之敗漆雖在明知弗知然也淮南若蟹之化漆麻之壞酒此不可以理者也抱朴蟹漆相合成水博物志蟹性敗漆燒之致鼠本草以蟹投於漆中化為水服之長生以黑犬血灌之三日燒之諸鼠畢至仙方夫釋大道而任小數無以異於使蟹捕鼠蟾蜍捕蚤不足以禁奸塞邪亂乃逾滋注以艾灼蟹匡上納置穴中迺熟走窮穴適能擒一鼠也淮廣志云蜅小蟹大如貨錢又蟹奴如榆莢在其腹中生死不相離北戶錄海鏡廣人呼為膏葉盤兩片合以成形殼圓中甚瑩滑日照如雲母光內有少肉如蚌胎腹中有紅蟹子其小如黃豆而螯具足海鏡饑則蟹出拾食蟹飽歸腹海鏡亦飽或迫之以火則蟹子走出離腸腹立斃或生剖之有蟹子活在腹中逡巡亦斃嶺表錄異蒯南海有水蟲名蒯蛤之類也其中有小蟹大如榆莢蒯開甲食則蟹亦出食蒯合甲蟹亦還入為蒯取以歸始終死不相離博物志璅蛣璅蛣腹蟹水母目蝦江賦璅蛣長寸餘大者長二三寸腹中有蟹子如榆莢合體共生俱為蛣取食南越志伐木而寄生枯芟草而葱絲萎川蟹不歸而蛣敗桑木見斷而蠹殄抱朴蟹大小殼上多作十二點深燕支色亦如鯉之三十鱗耳其殼如虎蟹螜堪作壘子至於鸚巵螺杯不同年而語也北戶錄鰝鰝大鰕長二三丈鬚長數尺今青州呼鰕魚為鰝爾雅珠蝦舜攝天子有援耳貫胸之民來獻珠蝦金樓子有丹蝦長十丈鬚長八尺有兩翅其鼻如鋸載紫桂之林以鬚纏身急流以為栖息之處馬丹嘗折丹蝦鬚為杖後棄杖而飛鬚化為丹石在海傍洞冥記吳南陽滕修為廣州刺史或語修蝦鬚長一丈修不信其人後故至東海取蝦鬚長四丈四尺封以示修修乃服之交廣記南海以蝦頭為杯鬚長數尺金餙鏤之晉康州刺史常以杯獻簡文以盛酒未及飲酒躍於外時廬江太守曲安廉頗解術數即今筮之曰即三旬當後庭有告變者果有生子人面犬身南越志大足初有士人隨新羅使風吹至長鬚國地曰扶桑洲其署官品有匠長戢波臣役島邏等號拜士人為司風長兼駙馬見姬嬪悉有鬚因賦詩曰花無橤不妍女無鬚亦醜丈人試遣惣無未必不如惣有王大笑曰駙馬竟未能忘情於小女顧頷間乎後至海龍王所見鐵鑊滿中是鰕有五六頭色赤大如臂見客跳躍似求救狀引者曰此鰕王也龍王命放之酉陽劉悔者登海船忽見窓板懸二巨蝦殼頭尾鉗足具全各七八尺首占其一分觜尖利如鋒刃觜尖上有鬚如紅筯各長二三尺長雙腳有鉗鉗麤如人大指長二尺餘上有芒刺如薔薇枝赤而銛硬手不可觸腦殼烘透彎環尺餘何止於盃盂也嶺表錄異廣中邕容道常有籀蛤隨雨至謂之天蝦天蛤人取鹵之不取亦化蓋為海風攝至者番禺記紅蝦出潮州番州南巴縣大者長二尺土人多理為盃或釦以白金轉相餉遺北戶錄水母水母廣州謂之水母閩人謂之鮀嶺表錄異東海有物狀如凝血縱廣數丈正方圓名曰鮓魚無頭目處無腹臟所處則眾蝦附之隨其東西南北越人煮食之博物志蜡一名摴蒲魚生東海如血𩹴大者如床小者如斗無腹胃眼目以蝦為目蝦動蛇沈故曰水母目蝦如駏驉之與𪀛𪀛相假矣本草南中好食之云性煖治河魚之疾嶺表錄異海鏡蟹為腹水母蝦為目越絕書閩中五色蝦長尺餘具五色梅蝦梅雨時有之蘆蝦青色相傳蘆葦所變白蝦青蝦各以其色泥蝦相傳稻花變成多在田泥中一名苗蝦又海中有蝦姑狀如蜈蚣云管蝦雅翼授醢鱉人祭祀共蠯蠃蚳以授醢人鄭司農云蠯蛤也杜子春云蠯蜯也周禮公輸般見蠡出頭潛以足畫之蠡引閉其戶終不可開因傚之設於門戶欲使閉藏當如此固密也風俗通今門戶猶以蠃為輔首古之遺制雅翼女化桂陽貞女峽傳云秦世有數女取螺於此遇風雨一女忽化為石人今形高七尺狀如女子始興記武帝幸瓠子河聞水底有絃歌之聲有老翁出獻帝一紫螺殼中有物狀如牛脂帝問東方朔曰紫螺殼中何物朔曰是蛟龍髓以傅面令人好顏色又女子在孕產之必易令後宮產難者試之殊有神効帝以脂塗人面便白澤幽明錄衛瓘大康永熙中家人炊飲墮地盡化為螺出足而行瓘終見誅世說晉武帝時裴楷家炊黍在甑或變為螺其年楷卒石崇家稻米化螺崇亦被誅廣五行記唐光啟中潤州大荒亂有居民家蓄絕多可一斗五百文先定價後人擁俟開倉倉中悉化小螺子人皆驚恠有收盛分去者至今有收得此螺子傳載廣陵王龍潭寺僧有夢數百人求濟者翌早見人擔螺蛤往市忽憶所夢贖放於潭數日忽于潭上獲一小盆非銅非錫非瓦非石持歸以為盥晨起索盥忽見禹餘糧子盈於中詢之其徒云某昨置數粒耳僧不之信試貯菽麥白銀等一夕皆充仞僧始寶之于是以所積金盛修剎宇及僧老且病弟子爭其器僧云此水宮神物也無上事不可妄費乃取擲於潭遂化為金鴈飛去人目其處曰金鴈地志南康有女採螺為業夜宿亭上聞風雨聲見眾螺張口而至亂噉其肉明日惟有骨在焉故號其亭曰螺亭述異記南康記事稍同晉安書生謝端海岸得一大螺大如一石米斛割之中有美女曰予天漢中白衣素女天帝矜君純正令為君作婦端以為妖呵之女嘆息升雲而去上搜神記稍同互見天漢部義興吳堪為縣吏家臨荊溪忽得大螺已而化女子號螺婦縣令聞而求之堪不從乃以事虐堪曰今要蝦䗫毛鬼臂二物不獲致罪堪語螺婦即致之令乃謬語曰更要禍斗堪又語螺婦婦曰此獸也須臾牽至如犬而食火糞以為火令與火試之忽遣糞燒縣宇令及一家皆焚死焉原化記鸚鵡螺旋尖處屈而朱如鸚鵡觜故以此名殼王青綠班大者可受二升肉內光瑩如雲母裝為酒杯奇而可翫嶺表錄異螺離殼出食飽則還殼中若為魚所食殼乃浮出為人所得質白而紫文如鳥形與觴無異故因其象鳥為作兩目兩翼異物志螺常脫殼而遊朝出則有虫類如蜘蛛入其殼中螺夕還則此虫出庾闡所謂鸚鵡內遊寄居負殼者也異苑紅螺大小亦類鸚鵡螺殼薄而紅亦堪為酒器刳小螺為足綴以膠漆尤可佳尚也嶺表錄異文螺海文蠡數種其大者受一斗南人以為酒杯廣志雲螺南人目螺之有文者曰雲螺用以酌酒陸詩註蒼鷹蒼鷹螺江東人以為椀異物志海螺海螺鳴主大風螺吐光主陰雨螺蛤閉賊軍生亂玄珠蛤有三皆生於海蛤蠣千歲鳥所化也海蛤百歲鷰所化也魁蛤一名復累老服翼所化說文淮水中黃雀至秋化為蛤至春復為黃雀五百年化為蜃蛤述異記海蛤東越海蛤周書王會靈蛤西王母曰仙藥次有白水靈蛤漢武內傳真臘國進萬年蛤不夜珠光采皆若月照人無妍醜皆美艷帝以蛤賜飛燕以珠賜婕妤曰吾晝視后不若夜視之美且令人忽忽如失婕妤即以不夜珠為后壽終不道帝語趙后外傳文蛤晉書后妃傳論云惠皇識闇鳴蛙知昏文蛤沈光云文蛤即吳人所食文蛤得環周天和元年夏齊冀州人於蜯蛤中得瑤環一雙三國典略唐麟德中封禪用取明水李敬真曾八九月取蛤蚌一尺三寸者依法試之至半夜得水四五升唐新語成龍開寶六年漢陽軍獻蛤有文隱起成龍長五寸許金色鱗甲皎然禮部侍郎李常云少監孫莘老莊居在高郵湖邊嘗一夕陰晦莊客報湖中珠見與數同人至水際見微有光彩俄而光明如月陰霧中人面相覩忽見蚌蛤如蘆席大一殼浮水上一殼如張帆狀其疾如風舟子航小艇競逐之終不可及既遠乃沒文昌雜錄新安蠻婦人於耳上懸金環子聯貫琴瑟帖於髻側又繞腰以螺蛤聯穿繫之謂為珂珮雲南記東海有蛤鳥常啖之其肉消盡殼起浮出更薄在沙中岸邊潮水往來碏薄蕩白如雪入藥最精勝採取自死者博物志鳧鴈嘗在河邊沙上食沙石悉皆銷爛惟食蛤不消隨糞而出用以為藥倍勝常者古今注雷鳴不閉凡蛤之屬開口聞雷鳴不復閉口南越志蒲盧十月雉入淮為蜃蜃者蒲盧也大戴禮申屠狄謂周公曰賤人何可薄耶周之靈蛙出於土石楚之明月出於蚌蜄少家大豪出於污澤天下諸侯皆以為寶狄今請退也墨子說文云鮚蚌也漢律會稽獻鮚醬二升漢書注鄞有鮚埼亭師古曰鮚音結蚌也長一寸廣二分有一小蟹在其腹中埼曲岸也其中多鮚故以名亭李后主下屬州責蚌醬供宗廟恐滋味作冉切䣸而琰切味薄也其下惶懼不敢寧廣川書跋大觀中吳興邵宗益剖蚌將食中有珠現羅漢像偏袒右肩矯首左顧衣紋畢具僧俗創見遂奉以歸慈感寺寺臨溪流建炎中憲使楊應誠與客傳玩之之次不覺越檻躍入水中亟禱佛求之於烟波渺茫之中一索而獲葉少蘊曾公衮皆有詩贊之藝苑雌黃處士李璞居壽春一日登樓見淮灘雷雨中一龍騰起雨霽行灘上得一蚌頗大偶拾視之其中有龍蟠之迹宛然鱗鬣爪角悉具老學菴筆記片帆洞庭湖中舊有巨蚌其大如片帆夜深側立一殼乘風往來煙波間中吐巨珠與月相射漁者一日端取之終不可得近久不見岳陽風土記南方林邑有大蜯盈車明珠至寸不以為貴國人不採拾遺錄含醬蚌含醬蚌即蜃也爾雅蜃小者名珧一名玉珧可飾佩刀鞘詩傳云天子玉琫而珧珌是也山海經蠌皋山皋水出焉東注激汝水其中多蜃珧爾雅海物異名云江琲柱厥甲美如瑤玉肉柱膚十曰江珧柱郭景純江賦云玉珧海月土肉石華退之謂馬柱甲是此也世人不用此珧字是未知耳侯鯖錄東南之人食水之產西北之人食六畜產食水產者龜蛤螺蚌以為珍味不覺其腥臊也食六畜產者狸葱兔鼠雀以為珍味不覺其膻燋也博物志鳥無胃肺蛤蜃無臟蛭以空中而生蠶以無胃而育裴頠崇有論魁陸蚶魁陸本草云魁狀如海蛤圓而厚外有理縱橫即今之蚶也字書云蚶蛤也出會稽可食爾雅天臠炙瓦屋子蓋蛤蜯之類也南中舊呼而為蚶子頃因盧鈞尚書作鎮遂改為瓦屋子以其殼上有稜如瓦壠故名焉殼中有紫色肉而滿腹廣人尤重之多燒以薦酒俗呼為天臠炙喫多即壅氣背膞煩疼未測其本性也嶺表錄異進海蚶元和中嶺南節度使崔詠卒宰臣奏擬皆不可上謂裴度曰嘗有諫進海蚶淡菜者詞甚中正卿可求此人與之度出以訪人或有言孔戣諫者度即日以聞乃命之唐書奏貢蚶元禎為浙東觀察使明州歲貢蚶役郵子萬人不勝其疲禎奏罷之專車紫蚖如渠洪蚶專車江賦蚶則徑四尺背似瓦壟有文臨海水土物志玉覽入蚌下誤以殼為翅蛤蜊候風雨能以殼為翅飛酉陽文宗好食蛤蜊一日左右以方盤而進中擘不破裂者上疑其異乃焚香祝之俄頃自開中有二人形眉端秀體質悉備螺髻瓔珞足履菡萏謂之菩薩上遂置之於金粟檀香合以玉線覆之賜興善寺令致敬至會昌中毀佛舍遂不知所在杜陽編隋煬帝嗜蛤事稍同酉陽油煎北方人喜用麻油煎物慶曆中群學士會於玉堂使人置得生蛤蜊一簣令雍人烹之久而不至使人往視則云焦矣而尚未爛坐客莫不大笑筆談牡蠣一名蠣蛤一名牡蛤陶隱居云是百歲鵰所化此物附石而生磈蠝相連如房故名蠣房讀如阿房之房一名蠔山晉安人呼為蠔莆初生海邊才如拳石四面漸長有一二丈者嶄巖如山海一房內有蠔肉一塊肉之大小隨房所生大房如馬蹄小者如人指面每潮來則諸房皆開有小蟲入則合之以充腹海人取之皆鑿房以烈火逼開之挑取其肉而其殼左顧者雄右顧者則牝蠣耳本草牝蠣言牡非謂雄也介蟲中唯牡蠣是鹹水結成也酉陽合澗南山謂蠣為蠔甲為牡蠣合澗洲圓蠣土人重之語曰得合澗一蠔雖不足豪亦可以高南越志何胤侈於味食必方丈後稍欲去其甚者猶食白魚䱉脯糖蟹以為非見生物疑食蚶蠣使門人議之學生鍾岏曰䱉之就脯驟於屈申蟹之將糖躁擾彌甚仁人用意深懷如怛至於車螯蚶蠣眉目內闕慚渾沌之奇獷殼外緘非金人之慎不悴不榮曾草木之不若無馨無臭與瓦礫其何算故宜長充庖廚永為口實竟陵王子良見岏議大怒汝南周顒與胤書勸令食菜胤末年遂絕血味南史樂城縣新溪口有蠣嶼方圓數十畝四面皆蠣其味偏好永嘉郡記古賁古賁灰牡蠣殼異物志車螯是大蛤一名蜄能吐氣為樓臺海中春夏間依約島漵常有此氣本草廬陵王義真出為南豫州刺史劉湛為長史義真出時居高祖憂使帳下備膳湛禁之義真乃於齋內別立廚帳會湛入煗酒炙車螯正色曰公當今不宜有此設義真曰旦甚寒一杯酒亦何傷酒既至湛因起曰既不能以禮自處又不能以禮處人沈約宋書前月十二日至永嘉郡蠣不如鄞縣車螯亦不如北海謝靈運荅弟書揚葩石𧉧應節而揚葩江賦石𧉧形如龜腳得春雨則生花花似草華南越志龜角生石上有甲其子如栗春夏生苗如海藻亦有花所謂石鮭揚葩其狀甚異海錄東海夫人生南海似珠母一頭尖中銜少毛海人亦名淡菜又名殼菜雖形狀不典而甚益人本草烏頭烏頭似蚶臨海水土物志𧍧蛤下來𧍧雖似烏頭各自有種上越王越王形似𧍧殼赤尾如人爪形上土肉純黑如小兒臂大長五寸重五六斤有腹無口目有三十足大如釵脯堪炙食臨海水土物志蝦蟇一名蟾蜍一名𪓰一名去甫一名苦蠪其肪塗玉則刻之如蠟故云能合玉石但肪不可多得取肥者剉煎膏以塗玉亦軟滑易截古玉器有奇特非雕琢人功者多是昆吾刀及蝦蟇肪所刻也本草取眉間有白汁謂之蟾酥衍義淮南謂之去蚊無腸蝦蟆無腸龍蛇屬也衝波傳月精紀乖政則蟾蜍月精四頭感翔春秋運斗樞蟾蠩去月天下大亂河圖月為刑而佐日見食於蝦蟆騰蛇之神而殆於即且史記月照天下蝕於詹諸淮說林蟾蜍食明月虹蜺薄朝日傳玄注韓詩外傳曰嬿婉之求得此戚施薛君曰戚施蟾蜍喻醜惡也辟兵蟾蜍辟兵壽在五月之望文子蘭芝以芳未嘗見霜鼓造辟兵壽盡五月之望淮說林肉芝者謂萬歲蟾蜍頭上有角頷下有丹書八字體重以五月五日中時取之陰乾百日以其左足盡地即為流水帶其左手於身辟五兵若敵人射已者弓弩矢皆反還自向也抱朴仙藥辟兵法或以月食時刻三歲蟾蜍喉下有八字者血以書所持之刀劍上陸機漏刻賦云伏陰蟲以承波吞恒流其如揖孫綽銘靈虬吐注陰蟲承瀉陸倕銘靈虬承注陰蟲吐噏翰曰陰蟲蝦蟆也張暢弟收嘗為猘犬所傷醫者云宜食蝦蟇膾可療收甚難之暢含笑先嘗收因此乃食瘡亦即愈宋書唐高宗嘗患頭風令宮人修藥餌初穿地置爐忽有一蝦蟆躍出色如黃金背有朱書武字帝命放于苑池宮人別穿地得蝦蟆如初帝深以為不詳命殺之其夕宮人暴卒後武后竟革命瀟湘錄如鼎神龍中渭水有蝦蟆大如鼎里人聚觀數日而失五行志蛇閗先天二年六月京師朝堂磚下有大蛇出長丈餘有大蝦蟆如盤而目赤如火相與閗俄而蛇入於大樹蛇蟆入於草蛇蝦蟆皆陰類朝堂出非其所也天使李揆乾元中為禮部侍郎嘗一日坐於堂之前軒忽聞堂中動盪喧豗執燭入視見一蝦蟆大如三斗釜即命人大銅盆覆之客曰夫蝦蟇月中之物亦天使也今天使來公堂豈非上帝以榮命付公乎黎明啟視之已亡見矣後數日果拜中書侍郎平章事酉陽裴度太和中再在中書荐引李宗閔宗閔既得志長諧度度謂人曰養蝦蟆得水病其附下罔上如此牛羊日曆新繁縣有東湖李德裕為宰日所鑿夜夢一老父曰某潛形其下幸庇之明府富貴今鼎來七九之年當相見於萬里外後於土中得一蟇徑數尺投之水中而德裕以六十三卒於朱崖果應七九之讖北夢瑣言偽蜀廣都縣百姓陳弘秦者家富於財嘗假貨錢一萬弘秦徵之甚急人曰請無慮吾先養蝦蟆萬餘頭貸之足奉償秦聞之惻然已其債仍別與錢十千令放蝦蟇於江中經月餘秦因夜歸馬驚不進前有物光明視之乃金蝦䗫也儆誡錄蝦蟆牙張氳自號洪崖子雅好古物張守珪贈海蝦蟆牙長一尺八寸開元二十五年范陽人得二大牙皆一尺八寸以獻上上遣使就問氳荅曰頃見崑崙之下有蝦蟆大者踰百尺殆是耶仙鑑二十六百越人好食蝦蟆凡有筵會斯為上味先于釜中置水次下小芋煎之候湯沸如魚眼即下其蛙乃一一捧芋而熟如此呼為抱芋羹又云疥皮者最佳擲於沸湯即躍出其皮自脫皮既脫乃可以修饌時有一叟聞玆味大以為不可云切不得除此錦襖子其味絕珍聞之者莫不大笑南楚新聞眉州人水濱釣蝦蟆置籃中皆兩兩相負牢不可折極力分之旋即相負如初市之以為珍味成都人最重之以料物和酒炙之曰炙蟾括蒼亦以為珍品名曰風蛤游宦紀聞蝦蟆大者名田父能食蛇蛇行田父逐之蛇不得去田父銜其尾久之蛇死尾後數寸皮不損肉已盡也洽聞記德興有毛山環三州界廣袤數百里每歲間山旁人夜持火炬入深溪或山洞間捕大蝦蟆名曰石撞見游宦紀聞有一種生山谷中黑色肉紅名石鱗魚並可食通志土檳榔狀如檳榔在孔穴間得之新者尤軟相傳云蟾蜍矢也能已毒瘡雜俎蟾蜍擲糞自其口出自然論壽蟾蜍壽三千歲枹朴蟾蜍頭生角得而食之壽千歲又能食山精玄中記蟾蜍萬歲背生芝草出為世之祥瑞道書活師藟山湖水出焉東流於食水其中多活師山經科斗活東注蝦蟆子也爾雅生水中有尾和蜍魚漸大腳生尾脫本草一名玄針一名玄魚古今注蟈氏掌去鼃黽焚牡蘜以灰洒之則死注齊魯之間謂鼃為蟈黽耿黽也周禮衍義曰鼃其色青腹細觜尖後腳長故善躍大其聲則曰蛙小其聲則曰蛤月令所謂雀入大水化為蛤者也圖經似蝦蟇而背青綠色俗謂之青蛙亦有背作黃文者人謂之金線鼃陶隱居云蜂蟻鼃蟬其類最多大腹而脊青者俗名土鴨其鳴甚壯即爾雅所謂在水曰鼃者是也黑色者南人呼為蛤子食之至美即今所謂之蛤亦名水鷄是也閩蜀浙東人以為珍饌小形善鳴喚者名鼃子本草一名田鷄越王句踐慮伐吳欲人之輕死也出見怒鼃乃為之式御者曰何為式王曰鼃有氣如此可無為式乎士人聞之曰鼃有氣王猶為式兄士人之有勇者乎是歲人有自剄死以其頭獻者韓內儲井鼃魏公子牟謂公孫龍曰子獨不聞夫塪井之鼃乎謂東海之鱉曰吾樂與吾跳梁乎井幹之上入休乎缺甃之崖赴水則接掖持頤蹶泥則沒足滅跗還虷蟹與科斗莫吾能若也且夫擅一壑之水而跨跗塪井之樂此亦至矣夫子奚不時來入觀乎東海之鱉左足未入而右膝已縶矣於是逡巡而却告之東海之大樂於是塪井之鼃聞之適適然驚規規然自失也莊秋水投鼃燕太子丹自喜得荊軻永無秦憂日與軻遊東宮臨池而觀軻拾瓦投鼃太子令人捧槃金丸進之燕丹子武帝元鼎五年秋蛙與蝦蟇群闘是歲四將軍眾十萬征南越開九郡漢志鼃黽也似蝦蟆而長腳其色青武紀注蛙蟆二物此說甚明本草分條載之是矣御覽孔帖爾雅翼通志略混而一之俱誤鄭樵又云凡蝦蟆之類俱不交合惟雌雄相對吐沫漸成魚子遂變成科斗夫此物水中相負孰不見之而乃云云豈自序所謂廣覽動植漢唐諸儒所不得聞者耶武帝欲舉籍阿城以南盩厔以東宜春以西除為上林苑東方朔諫以謂此地土宜姜芋水多䵷魚貧者得以人給家足無飢寒之憂朔傳注蓋人亦取食之霍禹夢車騎聲正讙來捕禹舉家憂愁山曰丞相擅減宗廟羔菟鼃可以此罪也本傳注所以供祭惠帝為太子在華林園聞蛙鳴聲問左右曰此鳴者為官乎為私乎太子令賈胤對曰在官地為官在私地為私惠帝令曰若是官蛙可給廩先是有讖云蝦蟆當貴晉中州記鼓吹齊孔稚珪字德璋風韻清踈不樂世務門庭之內草萊不剪南有山池春日蛙鳴或問之曰欲為陳蕃乎稚珪笑曰我以此當兩部鼓吹何必期效仲舉僕射王晏嘗鳴笳鼓造之聞群蛙鳴晏曰此殊聒人耳荅曰我聽卿鼓吹殆不及此晏有愧色南齊書談藪賦卞彬賦蝦蟆云紓青拖紫名為蛤魚世以此令僕也又云科斗唯唯群浮闇水維朝繼夕聿役如鬼比令史諮事也南史呪厭沈僧昭別名法朗少事天師道士中年為山陰縣梁武陵王紀為會稽太守宴坐池亭蛙鳴聒耳王曰殊廢絲竹之聽僧昭呪厭十許口便息及日晚王又曰欲其復鳴僧昭曰王歡已闌今恣汝鳴即便喧聒上石憲貨於鴈門關行道中因偃大木下忽夢一僧蜂目披褐衲邀浴於玄陰池有一僧曰可聽吾徒之梵音也於是合聲而噪明日徑往尋之行數里窮林積水有蛙甚多其水果謂玄陰池者其僧乃群蛙耳宣室志唐林藹為荊州太守有鄉野小兒牧牛聞田中有蛤鳴牧童遂捕之蛤跳入一穴中遂掘之乃蠻首家也得一銅鼓其色翠綠土射數處損缺其上隱起多鑄蛙黽之狀疑其鳴蛙即銅鼓精也嶺表錄異曹著機辨有客試之因作謎云一物坐也坐臥也坐立也坐行也坐著應聲曰在官地在私地復作一謎云一物坐也臥立也臥行也臥走也臥臥也臥客不能曉曹曰我謎吞得你謎客大慚廬陵官下記蛙性熱甚補人人有折其足於瓶中以水養之不三五日其損如故亦有以蘇剪食者北戶錄注注鳴蠑螈蛇醫以注鳴者也在草曰蜥蜴在壁曰蝘蜓蝘蜓守宮也說文石龍子一名守官一名山龍子吳氏本草一曰蛇師北戶錄桂林之中守宮大者能鳴者謂之蛤蚧方言射覆上嘗使諸數家射覆置守宮盂下射之皆不能中對曰臣以為龍又無角謂之為蛇又有足跂跂脈脈善言壁是非守宮即蜥埸上曰善賜帛十疋漢書硃砂養蜥蜴或謂之蝘蜓以器養之食以硃砂體盡赤所食滿七斤治擣萬杵以點女人支體終年不滅唯房室則滅故號守宮傳云東方朔語漢武帝試之有驗博物志魚跳躍則蜥蜴從草中下稍相依近供浮水上而相合事竟魚還水底蜥蜴還草中三教珠英蛤蚧首如蟾蜍背有細鱗如蚕子上黃色身短尾長多藏於山谷城牆或大樹間一雌一雄行常相隨常自呼其名曰蛤蚧本草南民曰蛤蚧生一歲每鳴一聲二歲每鳴二聲有至十聲者土人以老蛤蚧尤重之物類相感志其聲絕大或曰一年一聲驗之非也端州大廳有蛤蚧州吏云有年多年至今每鳴或三聲或一聲不定也北戶錄蛤蚧大月三聲小月兩聲海錄不過螳蜋蛑螳蜋有斧痕江東呼為石蜋其子蜱蛸爾雅世謂之天馬一名齕疣兗豫謂之拒斧淮南注齊杞以東謂之馬榖方言一名斫父說文深秋乳子至夏之初始生孫炎爾雅正義齊莊公出獵有螳蜋舉足將搏其輪問其御曰此何蟲對曰此螳蜋也其為蟲也知進而不知却不量力而輕就敵公曰此為人必為天下武勇矣迴車而避之勇武聞之知所盡死矣故田子方隱一老馬而魏國寶之齊莊公避一螳蜋而勇武歸之淮人間蘧伯玉謂顏闔曰汝不知夫堂蜋乎怒其臂以當車轍不知其不勝任也是其才之美者也莊人間世螳蜋氣蟲摶斧奮臂當轍不迴勾踐是避勇士致斃勵之以義郭璞贊晉文迴輪於勇蟲而壯士雲赴句踐曲躬於怒蛙而戎卒輕死抱朴齊莊公迴車韓詩淮南俱同而郭以為句踐葛以為文豈各別有見耶吳王夫差令於邦中曰寡人伐齊有敢諍者死太子友欲因諷諫以激於王清旦懷丸持彈從後園而來衣洽履濡王怪而問之太子友曰適游後園聞秋蜩之聲往而觀之夫秋蟬登高樹飲清露隨風撝撓長吟悲鳴自以為安不知螳蜋超枝緣條曳腰聳距而稷其形夫螳蜋翕心而進志在有利不知黃雀盈綠林徘徊枝陰𨃂微進欲啄堂蜋也夫黃雀但知伺螳蜋之有味不知臣挾彈危擲蹭蹬飛丸而集其背也吳越此三者皆務欲得其前利而不顧其後之有患也說苑韓詩孫叔敖諫楚莊王事同楚人足貧讀淮南方得螳蜋伺蟬自鄣葉可以隱形遂於樹下仰取葉螳蜋執葉伺蟬以摘之葉落樹下樹下先有落葉不能復分別掃取數斗歸一一以葉自鄣問其妻曰汝見我不妻時始恒荅言見經日乃厭倦不堪紿云不見嘿然大喜齎葉入市對面取人物吏縳詣縣官受辟自說本末官大笑放而不治邯鄲笑林蟬楚謂之蜩宋衛之間謂之螗蜩陳鄭之間謂之蜋蜩秦晉之間謂之蟬海岱之間謂之䗁方言蟬未脫時名復育相傳言蛣蜣所化秀才韋翾庄在社曲常冬中掘樹根見復育附於朽處怪之村人言蟬固朽木所化也翾因剖一視之腹中猶實爛木酉陽蟬生於復育開背而出論衡蟬鳴取子羿五歲父母與之入山處之木下以待蟬鳴還欲取之而群蟬俱鳴遂捐而去羿為山間所養年二十習於弓矢仰天大嘆曰我將射四方矢至吾門止因捍弓即射矢靡地截草徑至役之門乃隨矢去括地象牛亨問仲舒曰蟬名齊女者何故荅曰昔齊王之后怨王而死屍變為蟬登庭樹嘒唳而鳴王悔恨之故曰齊女仲舒荅問古今注仲尼適楚出於林中見痀慺者承蜩猶掇之也仲尼曰子巧乎有道耶曰我有道也五六月累垸二而不墜則失者錙銖累三而不墜則失者十一累五而不墜猶掇之也吾處身若橛株駒吾執臂若槁木之枝雖天地之大萬物之多而唯蜩翼之知吾不反不側不以萬物易蜩之翼何為而不得孔子顧謂弟子曰用志不分乃疑於神其痀僂丈人之謂乎列黃帝莊達士貂蟬胡服也貂者取其有文而不煥外柔而易內剛而勁也蟬者取其清虛而識時變也在位者有文而不自耀有武而不示人清虛自牧識時而動古今注五德昔人稱蟬有五德頭上有緌則其文也含氣飲露則其清也黍稷不亨則其廉也處不巢居則其儉也應候守節則其信也陸雲寒蟬賦顧愷之好諧謔人多愛狎之尤信小術以為求之必得桓玄嘗以一柳葉紿之曰此蟬所翳葉也取以為蔽人不見已愷之喜引葉自蔽玄就溺焉愷之信其不見已也甚以珍之晉書唐時京城游手夏日採蟬貨之唱曰只賣青林樂婦人小兒爭買以籠懸窓戶間亦有驗其聲長短為勝負者清異錄異名蟋蟀蛬劉邵注云謂蛚蜻也孫炎曰梁國謂之蛬爾雅南楚謂之王孫方言一名吟蛩一名蛩濟南呼為懶婦一名紡緯古今注幽州人謂之促織里語趣織鳴懶婦驚詩義疏蟋蟀食蠅而化成詩義問代簫管道賁聞蟋率曰時聞此聲是代簫管高僧傳金籠蟋蟀每至秋時宮中妃妾輩皆以小金籠捉蟋蟀閉於籠中置之枕函畔夜聽其聲庶民之家皆效之也開天遺事朽葦之為蛬也稻之為𧉪也搜神記蜂燕趙之間謂之蠓螉大者有蜜謂之壼蜂或呼笛師方言蜂君蜂有君禮也化書蜂無王而盡死自然論聖人師蜂立君臣師蜘蛛立網罟師拱鼠制禮師戰蟻置兵關尹子兼採蜜蜂以兼採為味張璠易注序周武王東伐紂夜濟河時雲明如晝八百之族皆齊而歌有大蜂狀如丹鳥飛集王舟因以鳥畫其旗翌日而梟紂名其船曰蜂舟魯哀公二年鄭人擊趙簡子得其蜂旗則其類也拾遺記垂芒蜂蠆垂芒援神契邾人以須句故出師公卑邾不設備而禦之臧文仲曰國無小不可易也無備雖眾不可恃也君其無謂邾小蠭蠆有毒而况國乎僖二十二豫章嚴豐字孟侯為郡主簿太守賈萌舉兵欲誅王莽有飛蜂附萌車衡豐諫以為不祥之徵萌不從果見殺謝承書陶侃以袁謙為高涼太守未至百餘里浦中有蜜蜂蔽日而下謙舡上明早進西南卒遇大風飛砂天地晦合不復得還浦遂歿海中王隱晉書鄒湛對武帝曰猛禽在田荷戈而出凡人能之蜂蠆作於懷袖勇夫為之驚駭出於意外故也晉書元嘉元年建安郡山賊百餘人掩破郡治抄掠百姓子女資產遂入佛圖搜掠財寶先是諸供養具別封置一室賊破戶忽有蜜蜂數萬頭從衣麓出同時噬螫群賊身首腫痛眼皆盲合先諸所掠皆棄而走宣驗記孔昇翁東都龍門有一處天寶中北宗雅禪師於此建蘭若庭多古柏枝幹拂地一年中桐始華有異蜂聲如人吟詠禪師諦視之具體人也但有翅長寸餘禪師異之乃網取一焉置紗籠中意嗜桐華採苑置其傍終日集於一隅微聆吁嗟之聲忽有數人翔集籠外若相慰狀又一日其類數百有乘車輿者其大小相稱積於籠外語聲甚細亦不憚人僧密聽之有曰孔昇翁為君筮不祥頗記無有曰君已除死籍又何懼焉有曰叱叱予與青桐君奕勝獲琅玕紙數十幅君出可為扎星子詞當為料理語皆非人世事終日而云禪師舉籠放之因祝謝之次日有人長三尺黃羅衣步虛止禪師屠蘇前曰我三清使者上伯仙致意多謝指顧失所在酉陽貞元八年吳明國貢鸞蜂蜜云其蟲之聲有如鸞鳳而身被五彩大者可重十餘斤為巢於深巖峻嶺間大者占地二三畝國人採其蜜不逾三二合如過度即有風雷之異若螫人則生瘡以石上菖蒲根傳之即愈久食之令人長壽顏如童子髮白者應時而黑杜陽編皇甫湜性褊急嘗為蜂螫手指因大躁怒命臧獲及里中小兒輩箕斂蜂窠購以善價俄頃出窠於庭命碎於杵臼絞取津液以酹所痛唐闕史啖蜂劉恂曾遊宣歙間見彼中人好食蜂兒狀如蚕蛹而瑩白大蜂結房於山林間其大如巨鍾其中不知幾百層村人採時必以草衣蔽身以捍毒螫復以烟火逼散蜂母然後攀援崖樹斷其根一扇有蜂兒五斗或一石二分之一翅足具矣即入鹽酪炒之曝乾以小紙囊貯之寄入京洛以為方物嶺表錄異丁文杲善射覆宋太宗一日置一物急令射之杲乃曰葩葩華華山中採花雖無官職一日兩衙啟之乃數蜂也玉壺清話若壺赤蟻若象玄蜂若壺楚辭五原蔡誕云崑崙山大蜂一丈其毒殺象抱朴夫牛蹄之涔不能生鱣鮪而蜂房不容鵠卵小形不足以苞大体也淮汜論喜母蠨蛸長踦爾雅小鼅鼄長腳者一名蠨蛸一名長踦俗呼為喜子䟽蠨蛸長足蜘蜘也詩義問一名長腳荊州河內人謂之喜母此蟲來著人衣當有親客有喜也幽州人謂之親客亦如蜘蛛為羅網居之陸機䟽赤斑者俗名絡新婦本草陶網蟲網蟲垂戶織夕鳥傍簷飛沈休文學省愁臥詩結網太昊師蜘蛛而結網抱朴湯出見羅者湯下車命解其三面置其一面更致祀曰昔蛛蝥作網今人學結欲左者左欲右者右欲高者高欲下者下吾取其犯命者帝王世紀晉公子重耳奔齊與五臣游乎大澤中見蜘蛛布網曳繩執豸而食之公子重耳乃撫撲之于駐駟而觀之顧謂其臣咎犯曰此蟲也智之薄者矣而猶役其智布其網曳其繩執豸而食之况乎人之有智而不能廓垂天之網布絡地之罟以供方丈之御是曾不如蜘蛛之智孰可謂之人乎咎犯曰公子慎勿言也若終行之則有邦有嗣矣符子楚國龔舍初隨楚王朝宿未央宮見蜘蛛大如栗四面縈羅網有蟲觸之而死者退而不能得出焉舍乃嘆曰吾生亦如是耳仕宦者人之網羅也豈可淹歲於是挂冠而退時人笑之謂舍為蜘蛛之隱金樓子張文成景雲二年為鴻臚寺丞帽帶及綠袍並鼠嚙有蜘蛛大如栗當寢門緣絲上經數月大赦加階授五品僉載相傳裴旻山行有山蜘蛛垂絲如匹布將及旻引弓射殺之大如車輪因斷其絲數尺收之部下有金瘡者剪方寸貼之血立止酉陽道士許相之言以盆覆寒食飯於暗室地上入夏悉化為蜘蛛上洛陽有歌婦楊苧羅聰惠有才思解嘲辨楊凝式甚憐之時有僧雲辨者善講經有口才楊尤重之長壽年五月雲辨對講歌者忽有蜘蛛於簷前垂絲而下正對楊與雲辨前楊笑謂歌者曰試嘲得着奉絹一匹歌者不思應聲嘲之意不離雲辨辨體充肚大楊見詩絕倒大叫和尚將絹來雲辨慚且笑與絹五匹詩曰吃得肚嬰撐尋思繞寺行空中設羅網只待殺蟲生洛陽舊聞記江夏城南鐵佛寺內有蜘蛛井世傳唐時有紅白二蜘蛛化為妖婦以媚人故鑄鐵佛鎮王志十有二月玄駒賁玄駒者也者螘也賁者走於池中也大戴禮牛亨問曰蟻名玄駒者何也荅曰河南人並河而見人馬數千萬皆如黍米遊動往來從旦至暮家人以火燒之人皆是蚊蚋焉皆是大蟻故今人呼蚊蚋曰黍民名蟻曰玄駒也古今注吾見玄駒之步雉之晨呴也法言蚍蜉蚍蜉大螘其子蚳爾雅其場謂之坻或謂之垤方言東海有鼇焉冠蓬萊而浮游於滄海騰躍而上則干雲之峰類邁於群岳沉沒而下則隱天之丘潛嶠於重川有蚳蟻聞而悅之與群蟻相要呼海畔欲觀鼇之形月餘鼇潛未出群蟻將反遇長風激浪崇濤萬仞海水沸地雷震群蟻曰此將鼇之作也數日風止雷默海中隱起如岊群蟻曰彼之冠山何異我之戴粒逍遙封壤之巔歸伏乎窟穴之下此乃物我之適自已而然何用數百里勞形而觀之乎符子管仲隰朋從於桓公而伐孤竹行山中無水隰朋曰蟻冬居山之陽夏居山之陰蟻壤一寸而仞有水乃掘地遂得水管子空城寥廓所聞者悲風所見者鳥雀昔陳司空為邑宰所在幽閑獨坐愁思幸賴游蟻以娛其意以今况之知不虛矣應璩與曹昭伯牋殷仲堪父病虛悸聞床下蟻動謂是牛閗孝武不知是殷公問仲堪有一殷病如此不仲堪流涕而起曰臣進退唯谷世說吳富陽董昭之嘗乘舩過錢塘江中央見一蟻著一短蘆走一頭迴復向一頭甚遑遽畏死因以繩繫蘆着舡船至岸蟻得出其夜夢一烏衣人謝云僕是蟻中之王也感君見濟之恩君後有急難當相告語歷十餘年時所在劫盜昭之被橫錄為劫主繫餘姚昭之忽思蟻王之夢結念之際同被禁者問之昭之具以實告其人曰但取三兩蟻着掌中語之昭之如其言夜果夢烏衣云可急投餘杭山中天下既亂赦令不及也既寤蟻齧械已盡因得出獄過江投餘杭山旋遇赦遂得無他齊諧記西京化度廢寺有礓石徑三尺餘孔穴通連若欄椅樓臺之狀號曰蟻宮昔有於中見蟻金色其大若蜂動逾因掘地及泉得此石焉兩京記忠州墊江縣吏冉端唐開成初父死有嚴師者善山岡為卜地云合有王氣群聚之物掘深丈餘遇蟻城方數丈外重雉堞皆具子城譙櫓工若彫刻城內分徑街小垤相次每垤有蟻數十憧憧不絕徑甚淨滑樓中有二大蟻一紫色長寸餘足作金色一有羽細腰稍小白翅翅有經脈疑是雌者眾蟻約有數斛其城隅小壞上以堅土為蓋故中樓不損既掘露蟻擾擾若求救狀端懼而掩之酉陽長尺馬緒謫潮得巨蟻長尺餘鹽漬之歸誇北人續博物志蚍蜉王徐玄之夜讀書有人物如粟粒數百皆具甲胄擁一赤幘紫衣者行案上傳呼曰蚍蜉王欲觀漁於紫石潭顧左右索漁具凡數百齊入硯中獲小魚數千頭玄之以書卷蒙之執燭以觀一無所見異聞集玄之捨卷而寢方寐間忽被甲士逮去其王曰蚍蜉王其官有馬知玄螱飛其㞐有候兩殿陵雲臺玄之夢覺明日掘得蟻穴如三石缶盡焚之纂異記螻蟻之有君也一拳之宮與眾處之一塊之臺與眾臨之一粒之食與眾蓄之一蟲之肉與眾師之一罪無疑與眾戮之化書嶺南暑月欲雨則朽壞中白蟻蔽空而飛入水翅脫化為蝦土人遇夜於水次乘燭蟻見火光悉投水中則以竹漉取摶之每搏以豚臠糝之為鮓號天蝦鮓又有大赤蟻作窠於木梢如數升器者取其卵並蟻以糝泊薑鹽釀焉味極辛辣倦遊錄交廣溪洞間酋長多蟻卵陶澤令淨鹵以為醬或云其味酷似肉醬非官客親友不可得也嶺表錄異蛺蝶一名野蛾一名風蝶江東呼為撻末色白皆青者是也其大如蝙蝠者或黑色或青斑名曰鳳子一名鳳車一名鬼車生江南柑橘園中古今注陵舄得鬱棲則為烏足烏足之根為蠐螬其葉為胡蝶胡蝶胥也莊至樂木蠹生蟲羽化為蝶搜神記麥之為蛺蝶也羽翼生焉眼目成焉心智存焉此自無知而化為有知而氣易也上夢蝶昔者莊周夢為蝴蝶栩栩然胡蝶也自喻適志與不知周也俄然覺則蘧蘧然周也不知周之夢為胡蝶與胡蝶之夢為周與周與胡蝶則必有分矣此之謂物化莊子劉子卿居廬山有五綵雙蝶來遊花上其大如燕夜間有二女子曰感君愛花間之物故來相諧君子豈有意乎子卿曰願伸繾綣一女曰今宵讓姊次夜姊曰昨夜之歡今留於汝自是每旬一至者數年廬山有廟泥塑二神女容貌如二婦人六朝錄稽神秘苑驚蛺蝶魏收昔在洛京輕薄尤甚人號曰魏收驚蛺蝶文襄曾遊東山令給事黃門侍郎顥等宴文襄曰魏收恃才無宜適須出其短往復數番收忽大唱曰楊遵彥理屈己倒愔從容曰我綽有餘暇山立不動若遇當塗恐翩翩遂逝當塗者魏翩翩者蛺蝶也文襄先知之大笑稱善北齊書長安城禁苑內一大樹冬月雪中忽花葉茂盛及凋落後結實其子光明燦然如火之照焉數日皆化為紅蛺蝶飛去至明年唐高祖自唐國入長安此其前兆也瀟湘錄劉魯封云見滕王蝶圖有名江夏班大海眼小海眼村裡來菜花子酉陽白蛺蝶尺蠖繭所化也秀才顧非熊少時見鬱栖中壞綠裙幅旋為蝶張周封言百合花合之泥其隙經宿化為大蝴蝶上叚公路常見盧肇說捉得一粉蝶如兩手大上有散綠點丁香眼前翅頭兩畫臙脂色後翅為燕尾分亦蝶之異也北戶錄注叚公路南行歷懸獲峽維舟飲水覩崖側有一木五綵初謂丹青之樹命僕採獲一枝尚綴軟蝶凡二十餘個有翠紺縷者金眼者丁香眼者紫班眼者黑花者黃白者緋脈者大如蝙蝠者小如俞莢者因登岸視之乃知木葉化焉北戶錄如蒲帆常有人游南海泊于孤岸有物如蒲帆飛過海將到舟舟人競以物擊之如帆者盡破碎墮地視之乃蛺蝶也海人去其翅足稱之得肉八十斤噉之極肥美嶺南異物志羅浮山有蝴蝶洞在雲峰巖下古木叢生四時出綵蝶世傳葛仙遺衣所化舊志媚蝶鶴子草蔓上春生雙只食其葉越女收於粧奩中養之如養蠶法虫老不食而蛻為蝶蝶赤黃色女子佩之如細鳥皮號為媚蝶嶺表錄異北戶錄蝶粉蝶交則粉退蜂交則黃退水蠆為𧐟矛務蜻蛉也淮南一名桑根說文一名白宿呂覽注淮南人呼康伊方言注蜻蛉一曰青亭色青而大者是也小而黃者曰胡離一名胡黎小而赤者曰赤卒一曰絳騶一名赤衣使者海錄作青弁一名赤弁丈人紺蝶一名蜻蛉似蜻蛉而色玄紺江東人呼為紺幡亦曰童幡亦曰天鷄好以七月群飛暗天海邊夷貊食之者謂海中青鰕化為之也古今注一名虰蛵一名負勞爾雅鄱陽人呼江鷄雅翼楚莊王命養由基射蜻蛉曰吾願生得之養由基援弓射之拂左翼尸子海上之人有好蜻蛉者每居海上游蜻之至者百數而不止前後左右盡蜻也終日玩之而不去其父告之曰聞蜻皆從汝居取而來吾將翫之明日之海上而蜻無至者矣呂覽莊辛對楚襄王曰夫蜻蛉六足四翼飛翔乎天地之間俛啄蚊虻而食之仰承甘露而飲之自以為無患與人無爭也不知夫五尺童子方將調飴膠絲加已乎四仞之上而下為螻蟻食也楚策化珠五月五日埋蜻蜓頭於西向戶下埋至三日不食則化成青真珠又云埋於正中門博物志青蛉之首瘞而為珠類從異名螢火一名即炤爾雅一名景天一名丹良一名夜光一名宵燭古今注一名放光一名夜照本草丹鳥丹鳥羞白鳥丹鳥者謂丹良也白鳥者謂蚊蚋也其謂之鳥也重其養者也有翼者為鳥羞也者進也不盡食也大戴禮光熹元年秋張讓叚珪劫少帝及陳留王走小平津帝與王夜逐螢火光行數里得民家露車共乘還宮後漢車胤字武子好學不倦家貧不常得油夏月用練囊盛數十螢火以夜繼日焉續晉陽秋車胤好學嘗囊螢光讀書時值風雨胤嘆曰天不遣我成其志業耶言訖有大螢傍書窓比常螢數倍讀書訖即去來如風雨至獨異志成應元事統煬帝大業末天下已盜起帝於景華宮徵求螢火數斛夜出遊山如放火光徧巖谷隋書五伎螻蛄一名天螻一名螜本草梧鼠五技而窮荀子螻蛄一名石鼠古今注碩鼠五能不成一技術注云能飛不能過屋能緣不能窮木能窮不能度谷能穴不能掩身能走不能絕人蔡邕勸學篇如牛黃帝起有大螻見河圖鄒衍言黃帝土德有螻蛄如牛劉向別錄黃帝時有大螻如羊宋符瑞志廬陵太守龐企自云其乃祖非罪係獄將上有螻蛄行其左右謂曰爾有神能活我死否因投食與之螻蛄食飲盡去有頃復來形體稍大意每異之乃復與食如此數月間其大如豚及將刑之夜螻蛄掘壁為大穴乃破械從之出亡後遇赦免故龐氏世祀螻蛄焉搜神記醜扇蠅醜扇青蠅之類好搖翅自扇爾雅灰生爛灰生蠅淮蠅生積灰蜂出蜘蛛發蒙記蠅墮水死者置於灰中須臾即活相感志或曰大麻蠅茅根所化酉陽腐聚腐肉所在青蠅集聚辨別白黑敗亂邦國易林蒼蠅之飛不過十步託驥之旄乃騰千里之路然無損於騏驥得使蒼蠅絕群也張敞集光武與隗囂書曰蒼蠅之飛不過三數步託驥之尾得以絕群東觀漢記附騏驥之旄端軼歸鴻於碣石廣絕交論虞翻放逐南方自恨犯上獲罪當長沒海隅生無可與語死以青蠅為弔客使天下一人知己者足以不恨別恨逐蠅王思正始中為司農性急嘗執筆作書蠅集筆端驅去復來如是再三思恚怒自起逐蠅不能得還取筆擲踏壞之苛吏傳魏何晏嘗夢見青蠅數十頭來集鼻上驅之不肯去以問管輅輅曰鼻者艮此天中之山今青蠅臭惡而集之焉位峻者顛輕豪者亡不可不思害盈之數盛衰之期至明年晏及鄧颺皆伏誅廣五行記苻堅時鳳凰集於東閣大赦天下初將為赦與王猛符融議於甘露堂悉屏左右堅自為文有一大蒼蠅入自牖間鳴聲甚大集於筆端驅而復來堅惡之久而方去俄而長安街巷市里民相告曰官今大赦有司以聞堅驚謂融曰禁中無屬耳之垣事何從而泄也勑外推之咸言有一小人衣青衣大呼於市曰官今大赦須臾不見堅嘆曰其向蒼蠅乎聲狀非常吾固惡之前秦錄異苑作晉明帝杖閣厙狄伏連居室患蠅杖門者曰何故放入北史王方慶體質鄙陋言辭魯鈍為鳳閣侍郎張元一謂之被凍蠅僉載鷹頭袁楚客規魏元忠書云閹宦君側之人眾所畏懼所謂鷹頭之蠅廟垣之鼠者也張芬在韋皋幕中有一客於宴席上以籌椀中綠豆擊蠅十不失一一座驚笑芬曰無費吾豆遂指起蠅拈其後腳略無脫者酉陽武儒衡為中書舍人時元稹依倚內官得知制誥儒衡深鄙之會食苽閣下蠅集於上儒衡以扇揮之曰適從何處來而遽集於此同僚失色儒衡意氣自若舊唐蠅類有蒼者聲雄壯負金者聲清聒其聲在翼也青者能敗物巨者首如火酉陽一名景跡謍謍營營青蠅止于林說文齊桓公臥於柏寢謂仲父曰吾國富民殷無餘憂矣一物失所寡人猶為於邑白鳥營肌而求飽寡人因之開翠紗之幬進蚊子焉其蚊有知禮者不食公之肉而退有知足者㗱公之肉而退有不知足者遂長噓短吸而食之及其飽也腹腸為之破潰公曰嗟乎民生亦猶是矣金樓子景公問晏子曰天下有極細乎對曰東海有虫巢於蚊睫再乳再飛而蟁不為驚名曰焦螟晏子江浦之間生麼虫其名曰焦螟群飛而集於蚊睫弗相觸也栖宿去來蚊弗覺也離朱子羽方晝拭皆揚眉而望之弗見其形𧣾俞師曠方夜擿耳俛首而聽之弗聞其聲唯黃帝與容城子居空峒之上同齋三月心死形廢徐以神視塊然見之若嵩山之阿徐以氣聽砰然聞之若雷霆之聲列子南方蚊翼下有小蜚蟲焉目明者見之每生九卵伏成九子蜚而俱去蚊遂不知神異經郭舍人曰願問朔一事朔得臣願榜百朔窮臣當賜帛曰可從何處來歌謳且行不從門入踰我垣牆游戲中庭上入殿堂擊之拍拍死者欀欀格鬭而死主人被創是何物也朔曰長喙細身晝亡夜存嗜肉惡烟為掌所捫臣朔愚戇名之曰蟁舍人辭窮當復脫褌方朔傳荊州高齋盛夏之月無白鳥餘極寢處於其中及移餘齋則聚蚊之聲如雷矣數丈之間如此之異吁可怪哉金樓子嶺表有樹如冬青實生枝間形如枇杷子每熟即折裂蚊子群飛唯皮殼而已土人謂之蚊子樹嶺南異物蚊母鳥蚊母鳥形如青鷁嘴大而長於池塘捕魚而食每叫一聲則有蚊蚋飛出其口俗云採其翎為扇可辟蚊子亦呼為蚊鳥嶺表錄異煮鱉煮鱉煮羊以䶉煮鱉以蚊燕山錄螫鱟鱟性畏蚊蚊小螫之輒斃埤雅相弔湯沐具而蟣虱相弔大廈成而鷰雀相賀淮今頭虱着身皆稍變而白身虱處頭皆漸化而黑是玄素果無定質移易在乎所漸也抱朴齊魯爭汶陽之田魯侯有憂色魯隱者周豐往見曰臣嘗晝寢啾然有群虱之閗乎衣中甘臣膏腴之肌稱臣項膂之膚相與樹黨爭之日爭不息相殺者大半虱父止之曰我與你所慮不過容口而已奚用交戰為哉群虱止今君以七百里為君之城亦以足矣而以汶陽數畝之田惑君之心曾不如一虱之知竊為君羞之魯侯曰善齊卞彬為蚤虱賦序曰虱有諺言朝生暮孫若吾之虱者無湯沐之慮絕相弔之憂晏聚乎久袴爛布之裳復不懃之討捕孫孫子子三十五歲南史叚成式曾一夕堂中會時妓女玉壺忌魚炙見之色動因訪諸妓所惡者有蓬山忌鼠金子忌虱尤甚坐客乃兢徵虱挐鼠事多至百餘條以擾之予戲摭其事作破虱錄酉陽化青虫汝陰尉李仲舒漢臣山陽人平生戒殺去釋教令置虱於綿絮骨筒中久亦飢死有人教放青葉草上經宿占霧則為青蟲飛去視之信然皆拆背而化鷄肋編夢虱夢梳蔑為憂解也蟣虱盡去百病愈也蟣虱為憂囓人身也夢見蟣虱而有憂至也夢書相傳人將死虱離身或云取病者虱於床前可以卜病將差虱行向病者背則死酉陽濡需者豕虱是也擇䟽鬣自以廣宮大囿奎蹄曲隈乳間股腳自以為安室利處不知屠者之一旦鼓臂布草操烟火而已與豕俱焦也莊徐無鬼瓜牛李云蝸蟲有兩角俗謂之蝸牛三蒼云小牛螺也俗名黃犢莊注蛞螔蝓一名陵蠡一名土蝸一名附蝸一名蠡牛亦曰瓜牛入三十六禽限又是四種角蟲之類熒室星之精矣本草此即負殼蜒蚰也日華子蝸角戴晉人告魏惠王曰有國於蝸之左角者曰觸氏有國於蝸之右角者曰蠻氏時相與爭地而戰伏尸數萬逐北旬有五日而後反莊則陽瓊州地名胊䏰胊䏰是蚯蚓也故土多此蟲常至夜江畔出其身半跳於空中而鳴其形胊䏰劉賓客嘉話一名蜜蟺一名曲蟺善長吟於地中江東謂之歌女或謂鳴砌亦呼為䗙蚓古今注一名土龍一名地龍子其屎呼為蚓螻本草按月令螻蟈鳴蚯蚓出蓋蚯蚓與螻蟈同處鳴者螻蟈非蚯蚓也吳人呼螻蟈為螻蛄故諺云螻蟈叫得腸斷曲蟮乃得歌名席上輔談如虹黃帝起大蚓見河圖說徵螾大如虹世紀螾土精大五六圍長十餘丈索隱孟州王雙宋元帝元嘉初忽不欲見明常取水沃地以菰蔣覆上眠息飲食悉入中云恒有女着青裙白領中來就其寢母聽聞薦下有聲歷歷發之見一青色白纓蚯蚓長二尺許云此女常以一奩香見遺氣甚清芬奩乃螺殼香則菖蒲根于時咸謂雙暫同阜螽矣異苑隋煬帝大業中河南婦人養姑不孝姑兩目盲婦以蚯蚓為羹以食之姑怪其味竊藏一臠以示兒兒還欲送婦詣縣未及忽然雷雨乃失其婦少頃從空而落身衣如故易為白狗頭語言不異因問其故荅云以不孝姑天神所罰冥報記眾鳴成曲上都渾令宅戟門外一小槐樹有穴大如錢每夏霽後有蚓大如巨臂長二尺餘白頸紅班領蚓數百條如索隱樹枝幹及曉悉入穴或時眾鳴往往成曲學士張乘言渾令時堂前忽有樹從地湧出蚯蚓遍挂其上酉陽昔有病腹大夜聞蚯蚓鳴於身有人教用鹽水浸之而愈崇寧末年隴州兵士暑月中在倅廳前跣立廳下為蚯蚓所中遂不救後數日又有人被其毒博識者教以先飲鹽湯一盃次以鹽湯浸足乃愈本草閩越江北山間蠻夷啖蚯蚓脯為羞容州人好食虀菜人以為諱或云以蚯蚓為之廣志蕃禺記蚯蚓土精無心之蟲交不以分淫於阜螽觸而感物乃無常雄郭璞贊阜螽如蝗蟲江東人呼為蚱蜢與蚯蚓雖異類而為雌雄蚯蚓鳴則阜螽跳躍五月五日伺其偶合牧而佩之令人相愛物類相感志鼠負蟲巨者多化為蝎蝎子多負于背舊說過滿百為蝎所螫蝎前謂之螫後謂之蠆蝎常為蝸牛所食以跡規之蝎不復去酉陽今人或為蝎螫者取蝸涎以塗之痛立止相感志杜伯蠆蝎也安陽城南有亭宿者輒死有書生入亭宿明掘得老蝎大如琵琶毒長數尺亭遂安靜搜神記安邑縣北門縣人云有一蝎如琵琶大每出並不毒人傳載北齊南陽王綽為定州刺史後主高緯徵至行在問在州何者最樂對曰多取蝎混蛆中觀之極樂後主即夜索蝎一斗比及二三升置諸浴斛使人祼臥其中號叫宛轉帝與綽臨觀喜噱不已謂綽曰如此樂事何不早馳驛奏聞本傳通志多取蝎混蛆中觀之通鑑作狙潤州金壇縣大曆中雜俎云開元中有北人為主簿以竹筒齎蝎十餘枚置於廳事之尌后遂孳育數百枚為土氣所蒸而不能螫人南人不識呼為主簿蟲傳載黃靖國死見冥中治武后獄以大甕貯萬蝎螫之吉凶影響錄蛜𧌴蠍緊小者名蛜𧌴蜀本草制蛇蝍蛆吳公也廣雅蝍且甘帶司馬彪曰帶小蛇也蝍蛆喜食其眼莊齊物蜈蚣性能制蛇見大蛇便緣而噉其腦本草禁蛇南人入山皆以竹管盛活吳公吳公知有蛇之地便動作於管中如此則草中便有蛇也吳公見蛇能以氣禁之蛇即死抱朴蛇虺見之而蟠伏蝍蛆當其前似施禁法蛇即為之開口蝍蛆入食其腸復穴其旁而出物類相感志瓜肉唐杜暐使嶺南至康州見蜈蚣大如箏天寶四載廣州因海潮海一蜈蚣死割其爪得肉一百二十斤紀聞李勉在汴州得異骨一節可為硯南海時得於海商云是蜈蚣脊骨續博物志開寧縣多蜈蚣大者其皮可以𩊭鼓取其肉曝為脯美於牛肉南越志晉安東南吳嶼山吳公千萬積聚或云長丈餘者以作脯味似大蝦臨海異物志噉牛東南海中蜈蚣長數丈能噉牛里人秋冬間遇之則鳴皷然火炬以驅逐之異物志綏安縣多蜈蚣大者能以氣吸兔小者吸蜥蜴相去三四尺骨肉自消酉陽珠崖人每睛明見海中遠山羅列如翠屏而東西不定悉蜈蚣也嶺南異物志畏蝸蜈蚣畏蛞蝓不敢過所行之路觸其身則蜈蚣死本草蜈蚣制蛇而畏蚯蚓每遇蚯蚓即不敢動蚯蚓以涎沫繞其足盡落通志他書不見此說疑鄭誤互食蝍蛆食蛇蛇食蛙蛙食蝍蛆互相食也關尹子蜘蛛灑溺以殺蜈蚣鶴林玉露蜣蜋蜣蜋一名蛣蜣一名弄丸一名轉丸古今注俗名推丸本草一名天社一作天桂廣雅轉丸蛣蜣之知在於轉丸而笑蛣蜣者乃以蘇合為貴莊齊物注無鼻蛣蜣無鼻而聞香衝波傳玄蟬潔肌不羨蜣蜋穢飽抱朴蜣蜋轉丸丸成而精思之而有蝡白者存丸中俄去殼而蟬彼蜣不思彼蝡奚白關尹子異名食苗心螟食葉蟘食節賊食根蟊爾雅蝗蟲腹下有梵字或自天下來者乃切利天梵天來者西域驗其字作木天壇法禳之今蝗蟲首有王字固目不可曉或言魚子變近之矣舊言蟲食榖者部吏所致侵魚百姓則蟲食穀蟲身黑頭赤武吏也頭黑身赤儒吏也酉陽司冀青雍蝗茅草皆盡石勒與蝗競取民禾百姓謂之胡蝗晉陽秋魚伯蟱𧍪魚伯青蚨也廣雅南方有蟲名𧍡蠋如蟬而狀稍大其味辛美可食每生子必依草葉大如蚕子人將子歸其母亦飛來不以近遠雖潛取其母必知處殺其母塗錢子塗貫用錢則自還搜神記𧑒𧍪謂之青鳧束暫云青鳧可以還錢或云青蚨郡國志其雄雌常處不相捨人採得以法制之用塗錢以貨易晝用夜歸異物志域一名水狐玄中記一名短狐射工射影抱朴溪鬼蟲本草水弩錄異記深山窮谷多毒虐之物氣則有瘴癘人則有工蟲獸則有虎鳥則有鴆蛇則有蝮蟲則有射工沙虱草則有鉤吻野葛其餘則蛟蟒之屬生焉博物志天中記卷五十七
