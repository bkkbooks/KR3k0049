body:
  text: 御史臺上卿御史大夫秦官位上卿掌副丞相漢百官表應劭曰侍御史之率故稱大夫云初學記位次上卿御覽同御史大夫寺在司馬門內門無塾其門署用梓板不艧色題曰御史大夫寺漢舊儀漢御史大夫副丞相事若今之同平章及參知機務之類所以漢書曰薛貢韋匡迭為宰相薛宣韋賢匡衡則是丞相而貢禹但為御史大夫通典御史大夫所居之署漢謂之御史府亦謂之御史大夫寺亦謂之憲臺後漢以來謂之御史臺亦謂之蘭臺寺上御史臺率執憲中司朝會獨坐內掌蘭臺督諸州刺史糾察百寮出為二千石蔡質漢儀初漢御史中丞掌蘭臺秘書圖籍故歷代置都邑建臺省以秘書與御史為鄰六典注漢高祖以御史大夫周昌為趙王相曰吾極知其左遷吾私憂趙堯之有母無可者於是徙昌為趙王相既行高祖持御史之印玩弄之曰誰可以為御史大夫者熟視趙堯曰母已老矣遂拜堯御史大夫始堯為昌符璽御史人謂昌曰君之史趙堯奇才必代君為相昌曰堯刀筆小吏何至是乎後果然史記長者張歐字叔武帝時代韓安國為御史大夫歐為吏未嘗言按人剸以誠長者處官官屬以為長者亦不敢大欺上具獄事有可卻卻之不可者不得已為涕泣面而封之其愛人如此漢書上知人武帝將封禪拜倪寬為御史大夫從東封泰山初梁相褚大通五經為博士時寬為弟子及御史大夫缺徵褚大大自以為得御史大夫至洛陽聞兒寬為之褚大笑及至與寬議封禪於上前大不能及退而服曰上誠知人寬為御史大夫以稱意任職故久無有所匡諫於上官屬易之上張湯為御史大夫鉏豪彊并兼之家舞文巧詆以輔法湯每朝奏事語國家用日旰天子忘食丞相取充位天下事皆決湯百姓不安其生上居父府杜周刻深上以為盡力無私遷為御史大夫子延年字幼公五鳳中徵入為御史大夫居父官府不敢當舊位坐臥皆易其處上魏相字弱翁宣帝即位遷御史大夫故事諸上書者皆為二封署其一曰副領尚書者先發副封所言不善屏去不奏相復因許伯白去副封以防雍蔽上丞相司直䋣延壽奏御史大夫蕭望之知御史有令不得擅使望之多使守史自給車馬之杜陵護視家事少史冠法冠為妻先引又使賣買私所附益凡十萬三千不奉法自脩踞慢不遜攘讓請逮捕係治上于是策免望之黃霸代為御史大夫上貢禹字少翁元帝時御史大夫陳萬年卒禹代為御史大夫列於三公自禹在位數言得失書數十上又言孝文皇帝時貴廉絜賤貪汙今天下奢侈官亂民貧盜賊並起姦軌不勝則取勇猛能操切百姓者以寄暴威服下者使居大位故亡義而有財者顯於世欺謾而善書者尊於朝誖逆而勇猛者貴於官故黥劓而髡鉗者猶復攘臂為政於世行雖犬朞家富勢足目指氣使是為賢耳故謂居官而置富者為雄桀處姦而得利者為壯士兄勸其弟父勉其子俗之壞敗乃至於是上嘉其質直之意上元帝時琅邪貢禹為御史大夫而華陰守丞嘉上封事言治道在於得賢御史之官宰相之副九卿之右不可不選平陵朱雲兼資文武忠正有智略可使試守御史大夫以盡其能上迺下其事問公卿匡衡對以為大臣者國家之股肱萬姓所瞻仰明王所慎擇也今御史大夫禹絜白廉正經術通明有伯夷史魚之風海內莫不聞知而嘉猥稱雲欲令為御史大夫妄相稱舉疑有姦心宜下有司案驗以明好惡嘉竟坐之上薛宣字贛君以明習文法詔補御史中丞是時成帝初即位宣為中丞執法殿中外總部刺史數言政事便宜舉奏部刺史郡國二千石所貶退稱白黑分明由是知名累遷少府月餘御史大夫于永卒谷永上疏曰御史大夫內承本朝之風化外佐丞相統理天下任重職大非庸才所能當今當選於群卿以充其闕竊見少府宣才茂行潔達於從政前為御史中丞執憲轂下不吐剛茹柔考績功課簡在兩府文臣足以謀王體斷國論臣是用越職陳宣行能唯陛下留神考察上然之遂以宣為御史大夫漢興襲秦官置丞相御史大夫及成帝時何武為九卿建言依古置三公改御史大夫為司空是時御史府吏舍百餘區井水皆竭及其府中列柏樹常有野烏數千棲宿其上晨去暮來號曰朝夕烏烏去不來者數月長老異之後二歲餘朱博為大司空奏言高皇置御史大夫位次丞相典正法度以職相參總領百官上下相監臨歷載二百年天下安寧今中二千石未更御史大夫而為丞相權輕非所以重國政也臣愚以為大司空官可罷復置御史大夫為百寮率哀帝從之迺更拜博為御史大夫上師古曰史言井竭烏去著御史大夫之職當休廢也後謂御史臺為柏臺烏臺者皆此事也事文類聚烏府下引此而云成帝時御史臺有烏集故謂之烏臺誤合璧復因之亦誤門北闢北齊楊楞伽鄴都故事云御史臺在宮闕西南其門北開取冬殺之義斯事久矣今東都臺門所以不北向者蓋欲變古之制或建造者不習故事耳龍朔中改司經局為桂坊置司直為東宮之憲府亦開北門以象御史臺其例明矣或云隋初移長安城造御史臺時以兵部尚書李員通檢校御史大夫欲於尚書省近故開北門此說則非也通典韋挺拜御史大夫太宗嘗謂挺曰卿之任御史大夫獨朕意耳左右大臣無為卿地者卿勉之哉挺陳謝曰臣駑下不足以辱陛下高位且臣非勳非舊而超處藩邸故寮之上臣願後之以勸立功者太宗不許舊唐韋挺為御史大夫見侍御史坐不起時馬周為監察韋恃性使氣略於知人馬以才幹特達至於奏事韋猶作常人相處及韋為太常卿馬累遷中書舍人太宗嘗欲復用韋在門下馬密陳其傲狼非宰相器遂寢十九年征遼擇運糧人馬云韋挺中粗使上然之竟以此敗分紀二唐稍異後周曰司憲隋及大唐皆曰御史臺龍朔二年改為憲臺故御史為風霜之任彈糺不法百寮震恐官之雄峻莫之比焉舊制但聞風彈事提綱而已通典劉仁軌為給事中與中書令李義府不協出為青州刺史時有事遼海義府逼仁軌運糧果漂沒勑御史袁異式按之異式希義府意遇仁軌不以禮或對之猥洩曰公與當朝讎者為誰何不引決仁軌曰劉仁軌豈失却死耶坐此除名大將軍劉仁願尅百濟奏以為帶方州刺史仁願凱旋高宗謂之曰卿將家子處置補置皆稱朕意何也仁願拜謝曰非臣能為乃前青州刺史教臣耳遽發詔徵之至則拜大司憲御史大夫也初仁軌被徵次于萊州驛舍於西廳夜已久有御史至驛人曰西廳稍佳有使止矣御史曰誰答曰帶方州刺史命移仁軌於東廳既拜大夫此御史及異式俱在臺內不自安仁軌慰之曰公何瘐也無以昔事不安耶知君為勢家所逼仁軌豈不如韓安國但恨公對仁軌臥而洩耳又謂諸御史曰諸公出使當舉冤滯發明耳目興行禮儀無為煩擾州縣而自重其權指行中御史曰只如某御史夜到驛驛中東廳西廳復有何異乎苦移乃公就東廳豈忠恕之道也願諸公不為也唐新語仁軌雖貴顯不自矜踞接舊故如布衣時嘗為御史袁異式所劾慢辱之脅使引決及拜大司憲異式尚在臺不自安因醉以情自解仁軌持觴曰所不與公者有如此觴後既執政薦為司元大夫新唐韋思謙在憲司每見王公未嘗行拜禮或勸之答曰鵰鶚鷹鸇豈眾禽之偶柰何設拜以狎之且耳目之官固當獨立也則天光宅元年分置左右肅政臺復以思謙為右肅政大夫大夫舊與御史杭禮思謙獨坐受其拜或以為辭思謙曰國家班列自有差等柰何以姑息為事耶舊唐薛登本名謙光景雲中拜御史大夫時僧惠範恃太平公主權勢逼奪百姓店肆州縣不能理謙光將加彈奏或請寢之謙光曰憲臺理冤滯何所廻避朝彈暮黜亦可矣遂與殿中慕容珣奏彈之反為太平公主所構出為岐州刺史上御史大夫李承嘉嘗召諸御史責之曰近日御史彈事不咨大夫禮乎眾不敢對監察御史蕭至忠進曰故事臺中無長官御史人君耳目比有事主得自彈事不相關白若先白大夫而許則彈大夫不知白誰也承嘉默然會要至忠曰御史人君耳目俱握雄權豈有奏事先咨大夫臺無此例新語競為官政崔隱甫開元十四年代程行諶為御史大夫在職強政無所廻避自貞觀年李乾祐為御史大夫別置臺獄有所鞫訊便輒繫之由是自中丞侍御史已下各自禁人牢扉常滿隱甫引故事奏以為不便遂掘去之又憲司故事大夫已下至監察御史競為官政略無承稟隱甫一切督責事無大小悉令諮決稍有忤意者便列上其罪前後貶黜者殆半群寮側目帝嘗謂曰卿為御史大夫海內咸云稱職甚副朕之所委也舊唐故事侍御史以下與大夫抗禮光宅元年韋思謙除左肅政大夫遂坐受拜其後大夫又與之抗禮至開元十八年有勑申明隔品致敬其禮由之不改至二十四年六月李適之為大夫又坐受拜其後與之抗禮至今不改通典尹思貞睿宗初為將作大匠時左僕射竇懷貞興造金仙玉真兩觀調發夫匠思貞常節減之懷貞怒頻詰責思貞思貞曰公職居端揆任重弼諧不能翼贊聖明光宣大化而乃盛興土木害及黎元豈不愧也又受小人之譖輕辱朝臣今日之事不能茍免請從此辭拂衣而去闔門累日上聞而特令視事其年懷貞伏誅乃下制曰國之副相位亞中台自匪邦直孰司天憲將作大匠尹思貞剛不護缺清而畏知簡言易從莊色難犯徵先王之體要敷袵必陳折佞臣之怙權拂衣而謝故以事聞海內名動京師鷹隼是擊豺狼自遠必能條理前弊發揮舊章宜承弄印之榮式允登車之志可御史大夫舊唐肅宗幸靈武李峴應召至行在拜扶風郡太守兼御史大夫既收京師拜禮部尚書守京兆尹復兼御史大夫時峴兄峘為戶部尚書兼成都尹乾元初玄宗還京峘自蜀至又兼御史大夫兄弟俱判臺事自國初以來兄弟並拜大夫未有其比時長安士庶皆賦美之上李朝隱代崔隱甫為御史大夫天下以其有素望每大夫闕冀朝隱得之及居職不爭引大體惟先細務由是名少衰唐書方挺元載當國久益恣橫代宗不能堪陰引剛骾大臣自助欲收剛權以黜載會御史大夫敬恬卒即召李栖筠與河南尹張延賞擇可為大夫者延賞先至遂代括會李少良陸珽等上書劾載陰事詔御史問狀延賞稱疾不敢鞫少良珽覆得罪死帝殊失望出延賞為淮南節度使引拜栖筠為大夫始栖筠見帝敷奏明辨不阿附帝心善之故制麻自中以授朝廷莫知也中外竦眙栖筠素方挺無所屈於是華原尉侯莫陳怤以優補長安尉當參臺栖筠物色其勞怤色動不能對乃自言為徐浩杜濟薛邕所引非真優也始浩罷嶺南節度使以瓌貨數十萬餉載而濟方為京兆邕吏部侍郎三人者皆載所厚栖筠并劾之上故事賜百官宴曲江教坊倡顐雜侍栖筠以任國風憲獨不往臺遂以為法帝比比欲召相憚載輒止然有進用皆密訪焉多所補助上李叔明字晉族兄仲通字向叔明與仲通俱尹京兆及兼秩御史中丞並節制劍南又與子昇俱兼大夫蜀人推為盛門上繩治如平日顏真卿遷御史大夫方朝廷草昧不暇給而真卿繩治如平日侍郎崔漪諫議李何忌皆被劾斥降廣平王總兵二十萬平長安辭日當闕不敢乘趨出梐乃乘王府都虞候管崇嗣先王而騎真卿劾之帝還奏慰答曰朕子每出諄諄故戒故不敢失崇明老而躄卿姑容之百官肅然上李元素徵拜御史大夫自貞元中位缺久難其人至是元素以名望召拜中外聳聽及居位一無脩舉但規求作相久之寢不得志見客必曰無以其官散相踈也見屬官必先拜脂韋在列大失人情舊唐崔渙博綜經術長論議遷御史大夫元載輔政與中官董秀盤詰固寵渙疾之因進見慨然論載姦代宗曰載雖非重慎然協和中外無間然能臣也對曰和之為貴者由禮節也不節之以禮焉得和今干戈甫定品物思乂載為宰相宜明制度易海內耳目而怙權樹黨毀法為通鬻思為恕附下茍容乃幽國卑主術臣所未喻帝默然渙玄暉孫也子縱橫宗時為御史大夫處大體不急細事獄訴付成僚屬而已新李景讓大中中進御史大夫甫視事劾免侍御史孫王汝監察御史盧植威肅當朝為大夫三月蔣伸輔政景讓名素出伸右而憲宗擇相盡書群臣當選者以名內器中禱憲宗神御前射取之而景讓名不出世謂除大夫百日有他官相者謂之辱臺景讓愧艴不能平見宰相自陳考深當代即拜西川節度使以病丐致仕李景讓轉御史大夫正色立朝言無避忌時宣宗皇舅鄭光卒詔贈司徒罷朝三日景讓曰國舅雖親朝典有素無容過越有天下者尤不可使外戚強盛故西漢有呂氏之侈幾滅劉氏國朝有則天之纂殆革唐命蓋非一朝一夕其所由來漸也今鄭光輟朝日數與親王公主同設使陛下速改詔命輟朝一日或兩日示其昇降有差恩禮無僣優詔報之乃罷朝兩日舊唐大中元年御史臺奏伏以御史臺臨制百司糾繩不法若事簡則風憲自肅事煩則紀綱轉輕唐會要避車要秩非德靡升專席雄班惟賢是屬侍中楊再思投水陳謨邁漢朝之三傑霑砂作相掩虞日之五臣佇因獻替兼肅權豪宜分務於鸞鳳俾效能於烏署烏臺峻秩望總鐵冠蒼佩崇班威高石室蘇詞吞楚澤量湛黃陂西京展驥道掩題輿右輔憑熊風超露冕朱帷霧撤初停州縣之勞白簡霜凝宜屏權豪之氣俱中宗制職司天憲御史臺事總朝綱職司天憲五代會要大憲吳武義元年改御史大夫為御史大憲九國志御史臺御史大夫一人朝會則率其屬正百官之班序監察御史顓舉不如法者百官志御史大夫本有兩丞其一曰御史丞一曰御史中丞謂之中者以其別在殿中掌蘭臺秘書外督部刺史內領侍御史受公卿章奏糾察百僚休有光烈漢官丞故二千石為之或遷侍御史高第執憲中司朝會獨坐內掌蘭臺督諸州刺史糾察百寮蔡質漢儀臺率御史中丞御史大夫之丞也舊別監御史在殿中密舉非法及御史大夫轉為司空因別留中為御史臺率後志漢官尚書御史謁者為三臺自漢罷御史大夫而憲臺猶置以丞為臺主中丞御史謝靈運晉書釋名曰御史中丞居中丞相者也辦云此中丞自御史大夫下丞有二其一別居殿中舉不法故曰中丞韋昭辨中丞有石室以藏秘書圖讖之屬以其居殿中故曰中丞環濟要略殿中蘭臺秘書圖籍在焉而中丞居之宋志減宣遷至御史及中丞使治主父偃及治淮南反獄所以微文深詆殺者甚眾稱為敢決疑數廢數起為御史及中丞者幾二十歲史記陳咸字子康沛郡人為中丞總領州郡奏事課第諸刺史執法殿中公卿已下皆敬慊之漢書建武以來省御史大夫官屬入侍蘭臺蘭臺有十五人特置中丞一人以總之此官得舉非法其權次尚書漢官解詁注宣秉建武元年拜御史中丞上特詔御史中丞與司隸校尉尚書令會同並專席而坐故京師號曰三獨坐東觀漢記陳謙字伯讓拜御史中丞執法奉憲多所糺正為百寮所敬尚書選舉序位旌賢常諮問謙自陳蕃雖尊為宰相論議褒貶每往質疑皆服其清識高亮謝承後漢書奉法察舉馬嚴字威卿拜御史中丞賜冠幘衣服車馬嚴舉劾案章車明舊典奉法察舉無所廻避百僚憚之續漢書鮑勛字叔業黃初四年尚書令陳群僕射司馬懿並舉勛為宮正宮正即御史中丞也帝不得已而用之百寮嚴憚罔不肅然魏志故事御史中丞與洛陽令相遇則分路而行以土主多逐捕不欲稽留也魏氏春秋宋文帝元嘉十三年有司奏御史中丞劉式之議楊州刺史丹陽尹建康令並是京輦土地之主或檢校非違或赴救水火事應神速不宜稽駐並合分道通典註周處字子隱為御史中丞奏征虜將軍石崇大將軍梁王彤等正繩直筆權豪震肅王隱晉書不憚權勢熊遠字孝文為御史中丞時尚書刁協用事眾皆憚之尚書郎盧綝將入直遇協於大司馬門外協醉使綝避之綝不廻協令威儀牽捽綝墮馬至協車前而後釋遠奏免協官詔令白衣領職初遠遷太子中庶子尚書左丞散騎常侍帝每歎其忠公謂曰卿在朝正色不茹柔吐剛忠亮至到可謂王臣也吾所欣賴卿其勉之晉書初學記遠遷中丞中宗每歎其公忠云云豈要其官之所至云然耶御覽合璧等俱因之欠審譙王恬字元愉為御史中丞值海西公廢太宗即位未解嚴大司馬桓溫屯中堂夜吹警角恬奏劾溫大不敬請理罪明日溫見奏事歎曰此兒乃敢彈我真可畏也恬忠正有器局在朝憚之晉中興書恬晉宗室也初學記止云王恬誤江左拜御史中丞不得復入尚書省中丞鹵簿至百官避路隘淖排濟溝中但得鹵簿者雖皆清道而中丞尤嚴四世中丞王准之字元魯高祖彬尚書僕射高祖彪之尚書令祖臨之父納之並御史中丞彪之博聞多識練悉朝儀自是家世相傳並諳江左舊事緘之青箱世人謂之王氏青箱學准之兼明禮傳贍於文辭宋臺建除御史中丞為僚友所憚准之父納之祖臨之高祖彪之至准之四世居此職准之嘗作五言范泰嘲之曰卿唯解彈事耳准之正色答猶差卿世載雄狐宋書鄭鮮之字道子宋武起義兵遷御史中丞性剛直甚得司直之體外甥劉毅權重當時朝野莫不歸附鮮之盡心武帝獨不屈意於毅毅甚恨焉南史荀伯子遷御史中丞莅職懃恪有匪躬之稱立朝正色外內憚之凡所奏劾莫不深相謗毀或延及祖禰示其切直又頗雜嘲戲故世人以此非之宋書孔琳之字彥琳永初二年為御史中丞明憲直法無所屈撓奏劾尚書令徐羨之虧違憲典時羨之領揚州刺史琳之弟璩之為中從事羨之使璩之解釋琳之使停寢其事琳之不許曰我觸忤宰相正當罪止一身汝必不應從坐何須勤勤邪自是群僚震肅莫敢犯禁武帝甚嘉之行經蘭臺親加臨幸上蕭惠開拜御史中丞世祖與劉秀之詔曰今以惠開為憲司冀當稱職但一往眼額已自殊有所震及在任百寮畏憚之八年入為侍中詔曰惠開前在憲司奉法直繩不阿權戚朕甚嘉之可更授御史中丞上南史不載後授中丞已失紀事之實鄭樵通志略因之豈于宋書不一經目耶乃詆班固高至武帝六世之前盡竊遷書不以為慚自昭至平資于逵歆不以為恥寧非自道也哉劉瑀字茂琳孝武初為御史中丞瑀使氣尚人為憲司甚得志彈蕭惠開云非才非望非勳非德彈王僧達云蔭藉高華人品冗末朝士莫不畏其筆端上顏延之為御史中丞何尚之與延之書曰絳騶清路白簡深刻取之仲容或有虧耶通典永平八年沈約為中丞奏彈王源云源官品應黃紙臣輒奉白簡以聞選王球甚矜曹地遇從弟僧朗除御史中丞球謂曰汝為此官不復成膏粱矣通典江左中丞雖亦一時髦彥然膏粱名士猶不樂上王僧虔為御史中丞領驍騎將軍甲族由來多不居憲臺王氐分枝居烏衣者位宦微減僧虔為此官乃曰此是烏衣諸郎坐處我亦可試為耳南史僧虔曇首子也為太子舍人退默少交接與袁淑謝莊善淑每歎之曰卿文情鴻麗學解深拔而韜光潛實物莫之窺雖魏陽元之射王汝南之騎無以加焉上沈冲字景綽與兄淡深並歷御史中丞兄弟三人皆為司直晉宋所末有也中丞案裁之職被惡者多結怨永明中深彈吳興太守袁彖建武中彖從弟昂為中丞到官數日奏彈深子繢父在僦白幰車免官與錮冲母孔氏在東鄰家失火疑為人所焚爇大呼曰我三兒皆作御史中丞與人豈有善者方恐肌分骨散何但焚如上江淹為御史中丞時明帝作相謂淹曰君昔在尚書非公事不妄行在官寬猛能折衷今為南司足以震肅百僚也淹於是彈中書令謝朏等及二千石大縣官長多被奏劾內外肅然明帝謂曰自宋以來不復有嚴明中丞君今日可謂近世獨步上何敬容為宰相後妾弟費惠明為導倉丞夜盜官米為禁司所執送領軍府時河東王譽為將軍敬容以書解惠明譽前經屬事不行因此即封書以奏帝大怒付南司推劾御史中丞張綰奏敬容協私罔上合棄市詔特免職到溉謂朱异曰天時便覺開霽其見嫉如此張緬字元長為御史中丞緬居憲司推繩無所顧望號為勁直武帝乃遣圖其形於臺省以勵當官執憲直繩張綰字孝卿少與兄纘齊名為宣城王長史遷御史中丞武帝遣其弟中書舍人絢宣旨曰為國之急唯在執憲直繩用人之本不限升降晉宋時周閔蔡廓兼以侍中為之卿勿宜是左遷時宣城王府望重故有此旨焉舊例僕射中丞坐位東西相當大同四年元日大會張綰為中丞兄纘為僕射及百司就列兄弟並導騶分趍兩塗陛前代未有也時人榮之梁書不畏強禦陸杲字明霞為御史中丞性婞直無所顧望時山陰令虞肩在任贓汙數百萬杲奏收劾之中書舍人黃睦之以肩事託杲杲不答梁武聞之以問杲杲答曰有之帝曰識睦之不答曰臣不識其人時睦之在御側上指示曰此人是也杲謂曰君小人何敢以罪人屬南司睦之失色領軍將軍張稷是杲從舅杲嘗以公事彈稷稷因侍宴訴帝曰陸杲是臣親通小事彈臣不貸帝曰杲職司其事卿何得為嫌杲在臺號不畏強禦南史木手擊脅後魏改中丞為中尉官氏志李彪字道固為御史中尉領著作郎彪既為孝文所寵性又剛直遂多劾糾遠近畏之豪右屏氣帝嘗呼為李生從容謂群臣曰吾之有李生猶漢之有汲黯始彪為中尉號為嚴酷以姦款難得乃為木手擊其脅腋氣絕而復屬者時有焉又慰喻汾州叛胡得其兇渠皆鞭面殺之及彪病體上往往創潰痛毒備極北史高恭之字道穆莊宗時為御史中尉外執直繩內參機密凡是益國利人之事必以奏聞諫爭盡言無所顧憚選用御史皆當世名輩僕射尒朱世隆當朝權盛因內見衣冠失儀道穆便即彈糾帝姊壽陽公主行犯清路執赤棒卒呵之不止道穆令卒棒破其車公主深恨泣以訴帝帝曰高中尉清直人彼所行者公事豈可私恨責之也道穆後見帝帝曰一日家姊行路相犯深以為愧道穆免冠謝帝曰朕以愧卿卿反謝朕後尒朱榮死帝召道穆付赦書令宣於外謂曰今當得精選御史矣先是榮等常欲以其親黨為御史故有此詔魏書通典以為北齊誤御史中尉酈道元字善長素有嚴猛之稱司州牧汝南王悅嬖近左右邱念常與臥起及選州官多由於念念匿於悅第時還其家道元收念付獄悅啟靈太后請全之敕赦之道元遂盡其命因以劾悅魏書宋游道神武啟以為中尉文襄執請乃以吏部郎中崔暹為御史中尉以游道為尚書左丞文襄謂暹游道曰卿一人處南臺一人處北省當使天下肅然游道入省省中豪吏王儒之徒並鞭斥之始依故事於尚書省立門名以記出入早晚令僕已下皆側目北史崔暹字季倫為御史中尉文襄與諸公出之東山遇暹在道前驅為赤棒所擊文襄回馬避之魏帝宴華林園謂神武曰自頃所在百司多有貪暴朝廷中有用心公平直言彈劾不避親戚者王可勸酒神武降階跪言唯御史中尉崔暹一人謹奉明旨敢以酒勸并臣所射賜物千段乞以回賜帝又褒美之上莊宗時崔氏暹字元欽累遷瀛州刺史上酷吏傳赤棒琅邪王儼字仁威武成第三子也兼為御史中丞魏氏舊制中丞出清道與皇太子分路行王公皆遙住車去牛頓軛於地以待中丞過其或遲違則赤棒棒之自都鄴後此儀𥧲絕武成欲雄寵儼乃使依舊制初從北宮出將上中丞凡京畿步騎領軍之官屬中丞之威儀司徒之鹵簿莫不畢備時儼總領四職帝與胡后在華林園東門外張幕隔青紗步障觀之遣中貢驟馬趣仗不得入自言奉敕赤棒應聲碎其鞍馬驚入墜帝大笑以為善更敕令駐車傳語良久觀者傾京邑北齊徐陵字孝穆為御史中丞時安成王頊為司空以帝弟之尊勢傾朝野直兵鮑僧汝假王威權抑塞辭訟大臣莫敢言者陵聞之乃為奏彈導從南臺官屬引奏案而入世祖見陵服章嚴肅若不可犯為斂容正坐陵進讀奏版時安成王殿上侍立仰視世祖流汗失色陵遣殿中御史引王下殿遂劾免侍中中書監自此朝廷肅然陳書子儉為御史中丞性公平無所阿附尚書令江總望重一時亦為儉所糾劾後主深委任焉上宋璟為左御史臺中丞張易之與弟昌宗縱恣益橫傾朝附之昌宗私引相工李弘泰觀占吉凶言涉不順為飛書所告璟廷奏請窮究其狀則天曰易之等已自奏聞不可加罪璟曰易之等事露自陳情在難恕且謀反大逆無容首免請勒就御史臺勘當以明國法易之等久蒙驅使分外承恩臣必知言出禍從然義激於心雖死不恨則天不悅內史楊再思御覽引作姚璹恐忤旨遽宣敕令璟出璟曰天顏咫尺親奉德音不煩宰臣擅宣王命則天意稍解乃收易之等就臺將加鞫問俄有特敕原之仍令易之等詣璟辭謝璟拒而不見曰公事當公言之若私見則法無私也舊唐盧奕懷慎之少子也與兄奐齊名天寶十一年為御史中丞始懷慎及奐並為此官父子三人為中丞清節不易時人美之退位盧坦字保衡為御史中丞裴均為僕射右班踰位坦請退之均不受坦曰姚南仲為僕射例如此均曰南仲何人坦曰南仲是守正而不交權倖者也尋罷為右庶子時人歸咎於均盧坦遷中丞初諸道長吏罷還者取本道錢為進奉帝因赦令一切禁止而山南節度使柳晟浙西觀察使閻濟美格詔輸獻坦劾奏晟濟美曰白衣待罪帝諭坦曰二人所獻皆家財朕已許原不可失信坦曰所以布大信者赦令也今二臣違詔陛下柰何以小信失大信乎帝曰朕既受之柰何坦曰出歸有司以明陛下之德帝納之新唐溫造字簡輿為御史中丞性剛褊人或激觸不顧貴勢以氣凌籍嘗遇左補闕李虞於街怒其不避捕祗承人打脊十下左拾遺舒元褒等上䟽論之曰國朝故事供奉官街中除宰相外無所廻避溫造蔑朝廷典禮凌陛下侍臣恣行凶臆曾無畏忌凡事有小而關分理者不可失也分理一失亂由之生遺補官秩雖卑陛下侍臣也中丞雖高法吏也侍臣見凌是不廣敬法吏壞法何以持繩前時中書舍人李虞仲與造相逢造乃曳去引馬知制誥崔咸與造相逢造又捉其從人元和長慶中中丞行李不過半坊今乃遠至兩坊謂之籠街喝道但以崇高自大不思僣擬之嫌勑曰憲官之職在指佞觸邪不在行李自大侍臣之職在獻可替否不在道路相高其臺官與供奉官同道聽先後而行道途即祗揖而過今後傳呼前後不得過三百步舊唐韓皋為御史中丞常有所陳必於紫宸殿對百寮而請未嘗詣便殿上謂之曰我與卿言於此不盡可來延英當與卿從容或無遺事親友或謂皋曰自乾元已來群臣啟事皆詣延英方得詳盡公何獨於外庭對眾官以陳之無失於慎密乎韓曰御史天下之持平也權剛直枉唯在公共所言之事貴人知之柰何求請便殿避人竊語以私國家之法且延英之置也肅宗皇帝以苗晉卿年老艱步故設之後來臣寮得詣便殿多以私自售希求恩寵欲盡其身柰何以此為望哉傳載狄兼謨仁傑曾孫為御史中丞謝日文宗顧謂之曰御史臺朝廷綱紀臺綱正則朝廷理朝廷正則天下理凡執法者大抵以魏忌顧望為心職業由茲不舉卿梁公之後自有家法豈復為常常之心哉兼謨謝曰朝法或未得中臣固悉心彈奏舊唐合璧以為魏謨語誤魏謨字申之魏徵五代孫也為御史中丞謝日面賜金紫之服彈駙馬都尉杜中立贓罪貴戚憚之兼戶部侍郎判本司事謨奏曰御史臺紀綱之地不宜與泉貨吏雜處乞罷中司專主戶部公事從之謨儀容魁偉言論切直與同列上前言事他宰相必委曲規諷唯謨讜言無所畏避宣宗每曰魏謨綽有祖風名公子孫我心重之上中丞為大夫之貳緣大夫秩崇官不常置中丞常為憲臺之長今九寺少卿及秘書少監國子司業京兆少尹等並省寺之貳皆為四品惟御史中丞官業雖至品秩未崇望昇為從四品會昌一品集歸融兼御史中丞胡南觀察使盧周仁違勑進羨餘錢十萬貫融奏曰天下一家何非君土中外財賊皆陛下府庫也周仁輒陳小利妄說異端入財貨以市恩待朝廷而何淺臣恐天下放效以羨餘為名因緣刻剝生人受弊請行重責以例列藩臺儀自大夫以下至監察通謂之五院御史國朝歷踐五院者共三人焉李尚隱張延賞溫造也尚書故實憲府故事三院御史臺中大夫中丞自辟請命于朝獨孤朗為御史中丞時崔沔鄭居中不由憲長而除授皆丞相之僚舊也敕命雖行朗拒而不敢納沔改太常博士居中分司東臺宰相銜之李傑本名務光代宋璟為御史大夫時皇后妺壻尚衣奉御長孫昕與其妺壻楊仙玉因於里巷遇傑遂敺擊之上大怒令斬昕等散騎常侍馬懷素以為陽和之月不可行刑累表陳情乃下敕決殺之以謝百寮舊唐持憲平直南唐江文蔚保太初遷御史中丞持憲平直無所阿枉宰相馮延己弟延魯與魏岑陳覺竊弄威權及代閩敗績詔斬覺及延魯以謝國人而延己岑置不問文蔚對仗彈奏略曰昨天兵敗衂統內震驚將雪宗社之羞宜醢姦臣之肉已誅二罪未塞群情盡去四凶方袪眾怒請行典法以謝四方文蔚將上疏先具小舟載老母以待左降元宗果怒貶江州司士參軍而覺延魯以宋齊邱救解復皆不死延已雖蹔罷旋復柄用方宣延己制百官在廷常夢錫大言白麻雖佳要不如江文蔚疏耳逾年召遷九國志陸游南唐書文蔚常為御史中丞國朝自王義方後曠數百年未有危言激論如此之彰灼者故權右振竦朝野喧騰謄寫彈文為之紙貴徐騎省為志馬令南唐書云文蔚居諫職時宋齊邱陳覺馮延己魏岑皆以容悅得用人情不平文蔚上表其言曰二公移去未稱民情四罪盡除方明國典云後事亡豈其誤耶九國志及陸書所載君章事甚詳此云諫官不云申丞且云後事亡何耶御史臺有閽吏隸臺中四十年聲喏之時以所執之挺待中丞賢否賢則橫其挺不賢則直其挺凡為中丞惟恐其直時范諷為中丞一日視其挺直范問曰爾挺忽直豈我之失耶吏曰昨日中丞召客諭庖人造食指揮者數四去又教戒之數四大凡役人者授以法觀其成何俟喋喋之繁若使宰天下如此不亦勞乎某心却之不知杖之直也范大笑慚明日視之挺復橫矣東軒筆錄御史中丞舊持書御史中丞也初漢宣帝元鳳中感路溫舒尚德緩刑之言秋季後請讞時帝幸宣室齋居而決事令侍史二人持書持書御史起于此也通典梁毗為持書侍御史時京師饑上令禁酒劉昉使妾任屋當鑪酤酒毗劾奏昉曰臣聞處貴則戒之以奢持滿則守之以約昉既位列郡公秩高庶尹縻爵稍久厚祿已淹正當戒滿歸盈鑒斯止足何乃規麴蘖之潤競錐刀之末身昵酒徒家為逋藪若不糺繩何以肅厲有詔不治昉鬱鬱不得志隋書柳彧字幼文遷治書侍御史當朝正色甚為百寮之所敬憚上嘉其婞直謂彧曰大丈夫當立名於世無容容而已右僕射楊素當塗顯貴百寮慴憚無敢忤者嘗以少譴敕送南臺素恃貴坐彧床彧從外來見素如此於階下端笏整容謂素曰奉勑治公之罪素遽下彧據案而坐立素於庭辨詰事狀素由是銜之隋書熒惑火之精御史之象主禁令刑罰收捕糺正黃石公陰謀秘法周官宗伯屬官御史掌邦國都鄙及萬民之治令以贊冢宰凡治之者受法令焉以其在殿柱之間亦謂之柱下史老聃嘗為之秦改為侍御史史記張蒼自秦時為御史主柱下方書即其任也冠法冠一名柱後名鐵柱以鐵為柱言其審固不橈也法冠者秦事云始皇滅楚以其君冠賜御史亦名獬豸冠以獬豸獸主觸不直故執憲者以為冠六典武帝時侍御史又有繡衣直指者出討姦猾理大獄而不常置注直指而行無阿私也衣以繡者尊寵之也漢表江充字次倩拜為直指繡衣使者督三輔盜賊禁察踰侈貴戚近臣多奢僣充皆舉劾奏請沒入車馬令身待北軍擊匈奴奏可充即移書光祿勳中黃門逮召近臣侍中諸當詣北軍者移劾門衛禁止無令得出入宮殿於是貴戚子弟惶恐皆見上叩頭求哀願得入錢贖罪上許之令各以秩次輸錢北軍漢書王賀字翁孺為武帝繡衣御史逐捕不誅賊盜堅盧等黨與及吏畏懦逗遛當坐者翁孺皆縱之去它部御史暴勝之等奏殺二千石誅千石以下及通行飲食坐連及者大部至斬萬餘人翁孺以奉使不稱免嘆曰吾聞活千人有封子孫吾所活者萬餘人後世其興乎元后傳御覽作王禁誤威振州郡武帝末郡國盜賊群起暴勝之為直指使者衣繡持斧逐捕盜賊督課郡國誅不從命威振州郡嚴延年字次卿少學法律舉侍御史是時大將軍霍光廢昌邑王尊立宣帝宣帝初即位延年劾奏光擅廢立亡人臣禮不道奏雖寢然朝廷肅焉敬憚陳寵高祖父咸哀平間以明律為侍御史王莽篡位父子相將歸鄉里閉門不出乃收家中律令文書壁藏之以俟聖主咸常戒子孫曰為人議法當依于輕雖有百金之利慎無與人重東觀漢記持節觀風譙玄為繡衣使者持節分行天下觀覽風俗所至專行誅賞後漢埋輪張綱字文紀為御史時順帝委縱宦官有識危心綱常感激慨然嘆曰穢惡滿朝不能奮身出命埽國家之難雖生吾不願也漢安元年選遣八使徇行風俗皆耆儒知名多歷顯位唯綱年少官次最微餘人受命之部而綱獨理其車輪於洛陽都亭曰豺狼當路安容狐狸遂奏曰大將軍冀河南尹不疑蒙外戚之援荷國厚恩專為封豕長蛇貪縱無底多樹諂諛以害忠良誠天威所不赦大辟所宜加也謹條其無君之心十五事斯皆臣子所切齒者也書御京師震竦上桓典字公雅拜侍御史是時宦官秉權典執政無所回避常乘驄馬京師畏憚為之語曰行行且止避驄馬御史上种暠字景伯順帝時為侍御史監護太子承光宮中常侍高梵受敕迎太子不齎詔書以衣車載太子欲出太子太傅高襄後漢作杜喬不知所以力不能止開門臨去暠至橫劍當車御史受詔監護太子太子國之儲副人命所繫常侍來無一尺詔書安知非挾姦耶今日之事有死而已梵不敢爭續後漢書陳翔字子麟少知名拜侍御史時正旦朝賀大將軍梁冀威儀不整翔奏冀恃貴不敬請收案罪時人奇之後漢韋約字季明司徒則愷甚敬重之謂曰君以輕於去就大位不躋今歲垂盡選御史實欲煩君約曰大馬齒盡既無膂力又無考課所以躊躇戀慕者以明公禮遇隆崇未能自割因稱素有風疾眩冒不堪久侍遂徒跣趍出公追不及三輔夬錄楊仁字文義明帝引見問當代政治之事仁對上大奇之拜侍御史明帝崩是時諸馬貴盛各爭入官仁被甲持戟遮敕勑門不得令入章帝既立諸馬更譖仁刻峻於是上善之陳留耆舊傳魏當大會殿中御史簪白筆側陛而坐帝問左右此何官何主辛毗曰此謂御史舊時簪筆以奏不法當如今者直備位但眊筆耳魏略呂岱字定公親近吳郡徐原慷慨有才志岱知其可成賜中賜與共言論後逐薦拔官至侍御史原性忠壯好直言岱時有得失原輒諫諍又公論之人或以告岱岱嘆曰是我所以貴德淵者也及原死岱哭之甚哀曰德淵呂岱之益友今不幸岱復於何聞過談者美之吳志御覽以德淵為岱字誤庾峻字山甫魏高貴鄉公時為秘書丞遍觀古今見聞益廣長安有大獄久不決拜峻侍御史往斷之朝野稱慶王隱晉書劉暾字長升毅子也正直有父風為侍御史武庫火尚書郭彰率百人自衛而不救火暾正色諾之彰怒曰我能截君角也暾勃然謂彰曰君何敢恃寵作威作福天子法冠而欲截角乎求紙筆奏之彰伏不敢言眾人解釋乃止彰久貴豪侈每出輒從百餘人自此之後務從簡素晉書中書屬通事令史孫綝限滿久習內事才宜殿中侍御史須空補之不審可否詔曰可山公啟事清要李素立丁憂高祖令所司奪情授以七品清要官所司擬雍州司戶參軍高祖曰此官要而不清又擬秘書郎高祖曰此官清而不要遂擢授侍御史高祖曰此官清而復要舊唐宣宗欲與韋宙好官拜侍御史職林李義甫執權用事有洛州婦人淳于氏有美色坐事係大理義甫聞而悅之囑大理丞畢正義求為別宅婦特為雪其罪卿竇寶玄疑其故遽以狀聞高宗敕給事劉仁軌侍御史張倫重案其事正義惶懼自縊而死高宗特原義甫之罪侍御史王義方彈奏曰臣去歲冬初雲陽下縣丞耳今春及夏陛下擢臣著作郎極文學之清選未幾又拜臣侍御史濫朝廷之雄職顧視生涯隕首非報惟欲有犯無隱以廣天聽伏以李義甫枉殺寺丞陛下已赦之臣不應更有鞫問但陛下撫育萬邦蠻陬夷落猶懼踈網況輦轂咫尺姦臣肆虐足使忠臣憤抗又士扼腕縱令正義自縊彌不可容便是畏義畏之權勢能殺身以滅口此則生殺之威上非主出賞罰之柄下移佞寵臣恐履霜堅冰積小成大因言其初容貌為劉洎馬周所幸由此得進請重鞫正義死由雪冤氣于幽泉誅姦臣于白日對仗叱義甫合下義甫直視不退義方三叱上既無言義甫趨出高宗以義方毀辱大臣言辭猥褻出正義為萊州司戶而不問義甫姦濫之罪義甫云王御史妄相彈奏得無愧乎義方對云仲尼為魯司寇七日誅少正卯於兩觀之下義方任御史旬有六日不能去姦邪於雙闕之前實以為愧上李靖為岐州刺史人或私有告其謀反高祖命一御史按之謂之曰李靖反且實便可處分御史知其誣罔與告事者行數驛佯失告狀驚懼鞭撻行典乃祈求於告事者曰李靖反狀分明親奉進旨今失告狀幸救其命更請狀告事者乃疏狀與御史驗與本狀不同即日還以聞高祖大驚御史具奏靖不坐亡御史名氏惜哉唐新語唐臨初為殿中侍御史大夫韋挺以朝列不整責臨臨曰此為小事不足介意請今之後革之明日江夏王道宗自以貴戚共韋挺對立私語趨至曰王亂班臨彈王江夏答曰共公大夫語何至於是臨曰大夫亦自亂班韋失色而退諸人莫不悚動徐有功起為左臺侍御史則天特褒異之時遠近聞有功授職皆欣然相賀潤州刺史竇孝諶妻龐氏為奴誣告云夜解祈福則天令給事中郎季昶鞫之季昶鍛鍊成其罪龐氏當坐斬有功獨明其無罪而季昶等返陷有功黨援惡逆奏付法法司結刑當棄市而功方視事令史垂泣以告有功曰豈吾獨死而諸人長不死耶乃徐起而歸則天覽奏召有功詰之曰卿比斷獄失出何多對曰失出臣下之小過好生聖人之大德願陛下弘大德則天下幸甚則天默然於是龐氏減死流於嶺表有功除名為庶人雄權韋仁約字思謙授監察御史嘗謂人曰御史出都若不動搖山岳震慴州縣誠曠職耳時中書令褚遂良賤市中書譯語人地思謙劾奏其事因出為清水令謂人曰吾狂鄙之性假以雄權觸機便發固宜為身災也大丈夫當正色之地必明目張膽以報國恩終不能為碌碌之臣保妻子耳舊魏元忠遷監察御史高宗嘗從容曰外以朕為何如主對曰周成康漢文景也然則有遺恨乎曰有之王義方一世豪英而死草萊議者謂陛下不能用賢帝曰我適用之聞其死顧已無及元忠曰劉藏器行副於才陛下所知今七十為尚書郎徒歎彼而又棄此帝默然慚新唐劉藏器為侍御史時衛尉卿尉遲寶琳抑人為妾藏器請還其父母帝既可其奏寶琳私奏乞之帝從之藏器復執奏帝又可之寶琳又請如是再三藏器進言曰法者海內之懸衡上下之所共若刑罰不中則人無所措手足陛下若用舍恣情愛憎由已則國之刑憲何所施陳今寶琳請陛下從之臣所執奏陛下亦從之今日從之明日又改之欲令下人何以遵奉夫人無信不立匹夫匹婦尚不可失信況為天子安可戲言今陛下二三其言處分不定臣恐四海之內無所適從帝意從藏器所奏上供奉赤墀上官儀同東西臺三品時以雍州司戶參軍韋絢為殿中侍御史或疑非遷儀曰比野人爾爾御史供奉赤墀下接武夔龍簉羽鵷鷺豈雍州判佐比乎時以為清言狄仁傑為侍御史左司郎中王本立怙寵自肆仁傑劾奏其惡有詔原之仁傑曰朝廷惜之賢如本立者不尠陛下惜有罪虧成法柰何臣願先斥為群臣戒本立抵罪由是朝廷肅然陽嶠長安中左右御史中丞桓彥範袁恕已爭取為御史楊再思素嶠吾知其意不樂抨彈事為與語彥範彥範曰為官擇人豈待情樂乎唯不樂者固與之以伸難進抑躁求也遂為右臺侍御史酷吏王弘義為左臺侍御史弘義嘗於鄉里傍舍求瓜主恡之弘義乃狀言瓜園中有白兔縣官命人捕逐斯須園苗盡矣內史李昭德曰昔聞蒼鷹獄吏今見白兔御史郭弘霸初舉集召見於則天前自忠鯁云往年征徐敬業臣願抽其筋食其肉飲其血絕其髓則天悅拜左臺監察御史時人號為四其御史崔琬為監察御史彈奏宰相宗楚客紀處訥等驕恣跋扈請收劾之舊制大臣有被御史彈者皆俯僂趨出待罪朝堂楚客瞋目作色稱以忠鯁被誣中宗令琬與楚客約為兄弟時人切歎焉兩解之謂帝為和事天子唐書王志愔神龍中為左臺侍御史執法剛正百僚畏憚時人呼為皁鵰言其顧瞻人吏皆如鵰鶚之視燕雀也殿中侍御史郭震劾刑部尚書趙彥昭太子賓客韋嗣立青州刺史韋安石曰彥昭以女巫趙五娘左道亂常託為諸姑潛相影援既因提挈乃踐台階驅車造門著婦人之服攜妻就謁申猶子之情于時南憲直臣劾以霜憲蹔加微貶旋登寵秩同惡相濟一至於此請付紫微黃門處法處分又張易之兄弟勢傾朝野嗣立此際結為舅甥神龍之初已合誅死天網踈漏腰領誤全與安石阿韋編諸屬籍中宗晏駕削太皇輔立之制定阿韋臨朝之策此時朝野危懼人神恐憤臣忝司請憲敢不糺彈彥昭等並請准法處分於是並貶官蘇瓌案問鄭普思其妻有寵於韋庶人特敕令對御辦折上屢抑瓌而伸普思侍御史范獻忠歷階而前曰臣請先罪蘇瓌上問其故獻忠曰蘇瓌國之大臣荷榮貴久矣不斬逆賊而後聞奏今使眩惑天聰搖動刑柄而普思反狀昭露陛下曲為申理此則王者不死今聖躬萬福豈有兩天子耶臣請先死終不能事普思上意乃解獄遂定李勉拜監察御史屬朝廷右武勳臣恃寵多不知禮大將管崇嗣於行在朝堂背闕而坐言笑自若勉劾之拘於省司肅宗特原之歎曰吾有李勉始知朝廷之尊溫造拜侍御史請復置彈事朱衣豸冠於外廊大臣阻而不行李祐自貢州入拜金吾違制進馬一百五十疋造正衙彈奏祐肱戰汗流祐私謂人曰吾踰蔡州城擒吳元濟未嘗心動今日膽落于溫御史吁可畏哉兄弟憲府楊假楊收並遣直之子假自浙西觀察判官入為監察御史收亦自西川入為監察兄弟並居憲府持為新例韋澳字子斐性貞退寡慾大和六年登第後十年不仕伯兄溫與御史中丞高元裕友善溫請用澳為御史謂澳曰高二十九持憲綱欲與汝相面汝必得御史澳不答溫曰高君端士汝不可輕澳曰然恐無呈身御史竟不詣元裕之門均御史職唐法殿中侍御史遷拜及職事與侍御史均職林侍御史之職有四謂推推者掌推鞫也彈掌彈舉公廨知公廨事雜事臺事總判定殿中監察以下職事及進名改轉臺內之事悉主之號為臺端他人稱之曰端公共知雜事者謂之雜端最為雄劇食坐之南設橫榻謂之南床殿中監察不得坐亦謂之癡床言處其上者皆驕傲自得使人如癡是故謂之癡床凡侍御史之例不出累月則遷登南省故號為南床通典烘堂御史故事大朝會則監察押班常參則殿中分班入閣則侍御史監奏蓋含元殿最遠用八品宣政其次用七品紫宸最近用六品殿中得立花塼綠衣用紫案褥之類號為七貴監察院長與同院禮隔語曰事長如事端凡上堂絕言笑有不可忍雜端大笑則合座皆笑謂之烘堂烘堂不罰國史補戶部郎侯味虛著百官本草題御史曰大熱有毒又朱書云大熱有毒主除邪佞杜姦回振冤滯止淫濫尤攻貪濁無大小皆摶之畿尉簿為之相畏遠使惡暴直忌按權豪出於雍洛州諸縣其外州出者尤可用日炙乾硬者為良服之長精神減姿媚久服令人冷峭僉載賈言忠撰監察本草云服之心憂多驚悸生白髮時義云裏行及試員外者為合口椒最有毒監察為開口椒毒微歇殿中為蘿蔔亦曰生薑雖辛辣而不為患侍御史為脆梨漸入佳味遷員外郎為甘子可久服或謂合口椒少毒而脆梨毒者此由觸之則發亦無常性唯拜員外郎號為摘去毒歡悵相半喜遷之惜其權也御史臺記拘局不樂柳渾拜監察御史臺中執法之地動限儀矩渾性放曠不甚檢束察長拘局忿其踈縱渾不樂乞外任執政惜其才奏為左補闕唐書名望素高吳楊廷式為侍御史知雜事廷式強立忠直名望素高及為憲職人皆屬望雖功臣武將亦嚴憚之徐知誥輔政漸革貪弊張崇為廬州刺史好聚斂會廬江民訟其縣令掊刻者時議以崇難制使廷式往按之廷式謂知誥曰雜端推事其威至重職業人可不行也知誥曰君將若何廷式曰將械繫張崇使使往金陵簿責都統知誥曰所刻者縣令爾何至於是廷式曰縣令卑官也今取於民皆張崇使為之轉以獻都統爾其可捨其大而詰其細乎知誥俯首謝之曰吾知小事不足仰煩乃止遷大理司直九國志皇祐中詔委御史中丞孫抃舉御史抃舉太常博士吳中復或云公平生不識中復何由知之抃曰聞中復知犍為縣廢淫詞以禁民之非開河灘以通民之利又嘉州舊產紫竹桶癭木等任于蜀者競採之以為器民甚苦之中復作嘉陽四詠詩以悼之及替還舟中並不載嘉陽一物其愛民清謹如此使之立朝必不茍且昔人恥為呈身御史今我豈薦識面臺官遂除殿中侍御史言宰臣劉沆之過出知拙州召還為侍御史分紀漢尚書郎直宿建禮門奏事明光殿下筆為詔誥出語為誥令乃今中書舍人也通典忠慎劉超遷中書舍人時臺省初建內外多事出內書命以忠慎稱加以治身清苦衣不重帛每上所賜皆固辭曰凡陋小臣橫竊賞賜無德而祿殃咎必至上益嘉之晉中興書儒素徐邈字景山東莞姑幕人也少有學問尤善經傳時烈宗始覺典籍招延理學之士謝安舉邈補中書舍人左西省撰正五經音訓學者宗之每預顧問輒有獻替多所補益烈宗甚愛之上通事舍人自晉宋以來唯掌呈奏宣王言甚用事至梁用人殊重多以尊官兼領並入閣內始專掌中書詔誥其後除通事二字直曰中書舍人陳及北朝皆因之掌制詔初學永明元年熒惑入紫微時中書通事舍人四人各住一省謂之四戶既總重權勢傾天下乖玄象失度太史奏宜修福禳之太尉王儉謂帝曰天文乖忤此由四戶仍其舍人王文明等奏之齊書明帝踐祚引傳昭為中書舍人時居此職者皆權傾天下昭獨廉靜無所干預器服率略身安粗糲常插燭板床明帝聞之賜漆合燭槃曰卿有古人之風故賜卿古人之物上勢利之職茹法亮久為中書通事舍人後出為大司農中書勢利之職法亮戀之垂涕而去上顧協字正禮少清介有志操為舍人同官者皆潤屋協在省十六載器服飲食不改於常有門生始來事協知其廉絜不敢厚餉止送錢三千協發怒杖二十因此事者絕於饋遺南史荀士遜好學有思理為文有清典見賞知音世祖時轉中書舍人狀貌甚醜以文辭見用曾有事須奏值世祖在後庭因左右轉通者不得士遜姓名乃云醜舍人世祖曰必士遜也看封題果是內人莫不忻笑北齊顏之推字介天保末從至天池以為中書舍人令中書郎段孝信將敕書出示之推之推營外飲酒孝信還以狀言顯祖乃曰且停由是遂寢之推聰頴機悟博識有才辯工尺牘應對閑明俄領中書舍人帝時有取索恒令中使傳旨之推稟承宣告館中皆受進止所進文章皆是其封署於進賢門奏之待報方出兼善於文字監校繕寫處事勤敏號為稱職帝甚加恩接顧遇逾厚為勳要者所嫉上魏收兼中書舍人與溫子昇邢子才齊名世號三才北史虞世基拜內史舍人煬帝即位顧遇彌隆秘書監河東柳顧言博學有才罕所推謝至是與世基相見歎曰海內當共推此一人非吾儕所及也隋書貞觀中中書舍人高季輔上封章曰時已平矣功已成矣然而刑典未措者何哉良由謀猷之臣不弘簡易之政臺閣之吏昧於經遠之道執憲者以深刻為奉公當官者以侵下為益國未有坦平恕之懷副聖明之旨伏願隨方訓諭使各揚其職人敦朴素俗革澆浮家識孝慈人知廉恥杜其利欲之心載以清淳之化自然家富國肥禍亂何由而作太宗善之特賜鍾乳一劑曰卿進藥石之言故以藥石報之也唐書顏籀字師古唐初為起居舍人遷中書舍人專掌機密于時軍國多務凡有制誥皆成其手師古達於政理冊奏之工時無及者舊唐岑文本字景仁才名既著李靖復稱薦之擢拜中書舍人漸蒙親顧初武德中詔誥及軍國大事文皆出於顏師古至是文本所草詔誥或眾務繁湊即命書僮六七人隨口並寫須臾悉成亦殆盡其妙時中書侍郎顏師古以譴免職頃之溫彥博奏曰師古諳練時事長於文法時無及者冀蒙復用太宗曰我自舉一人公勿憂也於是以文本為中書侍郎專典機密上不見便思馬周字賓王太宗時拜給事中轉中書舍人周有機辨能敷奏深識事端動無不中太宗嘗曰我於馬周暫不見則便思之中書侍郎岑文本謂所親曰吾見馬君事論多矣援引事類揚搉古今舉要刪蕪會文切理一字不可加一言不可減聽之靡靡令人亡倦昔蘇張終賈正應此耳上朱子奢武德四年隨杜伏威入朝授國子助教貞觀初高麗百濟同伐新羅連兵數年不解新羅遣使告急乃假子奢員外散騎侍郎充使喻可以釋三國之憾雅有儀觀東夷大欽敬之三國王皆上表謝罪賜遣甚厚初子奢之出使也太宗謂曰海夷頗重學問卿為大國使必勿籍其束修為之講說使還稱旨當以中書舍人待卿子奢至其國欲悅夷虜之情遂為發春秋左傳題又納其美女之贈使還太宗責其違旨猶惜其才不至深譴上中書舍人唐初為內史舍人至武德三年改為中書舍人龍朔以後隨省改號而舍人之名不易專掌詔誥侍從署敕宣旨勞問授納訴訟敷奏文表分判省事自永淳以來天下文章道盛臺閣髦彥無不以文章達故中書舍人為文士之極任朝廷之盛選諸官莫比焉通典龍朔改西臺舍人先宅改鳳閣舍人開元改紫微舍人又曰紫微省會要武后天授元年壽春郡王成器兄弟五人初出閣同日受冊有司撰儀注忘載冊文及百寮任列方知闕禮宰臣相顧失色中書舍人王勮立召小吏五人各令執筆口授分寫同時須臾俱畢詞理典贍時人歎伏舊唐徐堅西臺舍人齊聃子也少好學徧覽經史聖曆中車駕在三陽宮御史大夫楊再思左庶子王方慶為東都留守引堅為判官表奏專以委之方慶賞其文章典實常稱曰掌綸誥之選也再思亦曰此鳳閣舍人樣如此才識走避不得上齊聃少善屬文高宗時累遷蘭臺舍人善於文誥甚為當時所稱高宗愛其文令侍周王等屬文以職在樞劇仍勑間日來往焉文苑堅長姑為太宗充容次姑為高宗婕妤並有文藻堅父子以詞學著聞議者方之漢世班氏堅傳則天嘗引中書舍人陸餘慶入草誥餘慶回惑至晚竟不能裁一言由是轉左司郎中上孫處約為中書舍人累年中令杜正倫奏請更授一舍人與處約同知制誥高宗曰處約一人足辦我事何須多也會要韋承慶字延休仁約子也補雍王府參軍府中文翰皆出于承慶辭藻之美擅於一時長壽中累遷鳳閣舍人屬文迅速雖軍國大事下筆輒成未嘗起草弟嗣立與承慶俱以學行齊名長壽中代承慶為鳳閣舍人上思如湧泉蘇頲神龍中拜中書舍人尋而頲父同中書門下三品父子同掌樞密時以為榮機事填委文誥皆出頲手中書令李嶠歎曰舍人思如湧泉嶠所不及也上景龍四年初定內難惟中書舍人頲在太極殿後文詔填委動以萬計而手操口對無毫釐差誤主書韓禮談子陽轉書詔草謂頲曰乞公稍遲禮等書不及恐手腕將脫廢王徽高祖擇從擇從兄易從天后朝登進士第從弟朋從言從睿宗朝並以進士擢第昆仲四人開元中三至鳳閣舍人故時人號鳳閣王家上許景先轉中書舍人自開元初景先與中書舍人齊澣王邱韓休張九齡掌知制誥以文翰見稱中書令張說嘗稱曰許舍人之文雖無峻峰激流嶄絕之勢然屬辭豐美得中和之氣亦一時之秀也上孫逖開元十年登文藻宏麗科二十四年拜中書舍人制敕所出為時流歎服議者以為自開元以來蘇頲齊澣蘇晉賈胄許景先及逖為王言之最逖尤善思文理精練加之謙退不伐人多稱之上張九齡視其草欲易一字卒不能也新武德及開元中有顏侍郎陳叔達蘇頲云大手筆掌書王命故一朝言語煥成文章唐文詔令蕭嵩開元初為中書舍人與崔琳王邱齊澣同列皆以嵩寡學術未異之而紫微令姚崇許其致遠眷之特深上玄宗欲命蘇頲為相前一日上祕密不欲令人知逮夜艾方令草詔謂侍臣曰外庭直宿者誰遽命秉燭召來至則中書舍人蕭嵩上手以頲姓名授之既成其詞曰國之瓌寶上謂嵩曰頲瓌之子朕不斥其父名卿當為刊削嵩久之復獻上以前詞非工謂沉思既久必當精密不覺前席及觀惟改曰國之珍寶上擲其草於地上曰虛有其表爾左右皆笑嵩頤大多髯故上有是言韋陟字殷卿安石子也與弟斌文華當代俱有盛名于時才名之士王維崔顥盧象等常與陟唱和遊處廣平宋公見陟歎曰盛德遺範盡在是矣張九齡一代辭宗為中書令引陟為中書舍人與孫逖梁陟對掌文誥時人以為美談斌天寶初轉國子司業徐安貞王維崔顥當代辭人特為推挹天寶中拜中舍兄陟先為中舍未幾遷禮部侍郎陟在南省斌又掌文誥舊唐齊澣開元初姚崇復相用為給事中中書舍人論駮及告詔皆援準古誼朝廷大政必諮之時號解事舍人陽滔為中書舍人時促命制敕令史持庫鑰他適無舊本檢尋乃斲窗取得之時人號為斲窗舍人僉載賈曾授中書舍人曾以父名忠固辭議者以為中書是曹司名又與曾父音同字別於禮無嫌曾乃就職與蘇晉同掌制誥皆以詞學見知時人稱為蘇賈子至天寶末為中書舍人祿山之亂從上皇幸蜀時肅宗即位於靈武上皇遣至為傳位冊文上皇覽之歎曰昔先帝遜位於朕冊文則卿之先父所為今朕以神器大寶付儲君卿又當演誥累朝盛典出卿父子之手可謂難矣至伏於御前嗚咽感涕舊唐常揚楊炎字公南父播隱居不仕肅宗賜號玄靜先生炎美鬚眉風骨峻峙文藻雄麗汧隴之間號為小楊山人遷中書舍人與常衮並掌綸誥衮長於除書炎善為德音自開元已來言詔制之美者時稱常揚焉上綸音除中書舍人李文為學士制云綸省推高文館記焚制草高郢掌誥累年家無制草或謂曰人皆留制草公焚之何也曰王言不可存私家時人重其慎密舊唐憲宗元和十二年七月以中書侍郎平章事裴度為門下侍郎平章事充彰義軍節度申光蔡等州觀察淮西宣慰處置等使其制翰林學士中書舍人令狐楚所草也度以是行既兼招撫請改其辭中未剪其類為未革其志又以韓弘已為都統請改更張琴瑟為近輟樞軸又改煩我台席為授以成算憲宗皆從之乃罷楚內職守中書舍人舊唐冊府路隋敬宗初登極拜中書舍人翰林學士仍錫金紫有以金帛謝除制者必叱而却之曰吾以公事接私貺耶終無所受舊白居易穆宗時為中書舍人凡朝廷文字之職無不守居其選然多為排擯不得用其才時天子荒縱不法執政非其人制御乖方何朔復亂居易累上疏論其事天子不能用乃求外任除杭州刺史封敖字碩夫拜中書舍人敖構思敏速語近而理勝不務奇澀武宗深重之嘗草賜陣傷邊將詔警句云傷居保體痛在朕躬帝覽而善之賜之宮錦李德裕在相位定策破廻鶻誅劉稹議兵之際同列或有不可之言唯德裕籌計指畫竟立奇功武宗賞之封衛國公守太尉令制語有遏橫議於風波定奇謀於掌握逆稹盜兵壺關晝鏁造膝嘉話開懷靜思意皆我同言不他惑也封敖往慶之德裕口誦此數句撫敖曰陸生有言所恨文不迢意如卿此語秉筆者不易措言座中解其所賜玉帶以遺敖深禮重之殷鵬姿顏若婦人而性巧媚晉天福中拜中書舍人同職馮玉本非代言之才所得詞旨多託鵬為之玉嘗以姑息字問于人人則以辜負字示玉玉乃信之當時以為笑端鵬之才比玉雖優纖佞過之訝其高岸陳義長興中自舍人御命冊公主於太原公主即帝后也帝深待之但訝其高岸人或有獻言於義曰宜陳一謳頌以稱帝之美可邀其異待耳義曰人生貧富咸有定分未有持天子命違禮以求利既損國綱且虧士行義今生所不為也聞者無不嘉之晉史馬希廣初襲位有其弟萼叛於朗州鍾允章聘湖南還晟問曰馬公復能經略南士乎允章曰馬公兄弟為梗天論絕以臣觀之敗亡可待況能害我晟於是發兵復昭賀之地楚人果不能救因授允章中書舍人性吝嗇歲獲賜賚甚厚然未嘗分遺故人其妻牢氏有賢行常語允章曰妾昔事君子家無釜呪烹茶作糜止用一銚尚且接待朋友金寶貨盈室而義路棒塞雖富且貴何足尚也乃出銚以示允章允章大慚自是稍揮散矣王翊乾亨初拜中書舍人賜金魚紫四年文德殿成著作郎陳光又獻賦龑賜珠數斤翊見之色動後南詔獻朱鬣馬南宮白龍見昭陽殿成翊皆獻賦頌每賜予稍緩必於同列颺言曰吾賦字字作金聲何受賜之脫也龑聞之大笑王延為中書舍人權知貢舉有崔頎者協之子也授郾師簿簿甚卑屑棄去數年應進士延將入貢院見舊相吏部尚書盧文紀素與協不睦謂延曰舍人以謹重聞于時所以老夫去冬與諸相首以長者聞奏然此一途取事者頗多面目說者云越人善泅生子方晬乳母浮之水上或駭然止之乳母曰其父善泅子必無溺今若以名下取士徵泅之類也舍人當求實才以副公望延退而笑曰盧公之言為崔頎也縱與其父不悅致意何至此耶來春以頎登甲科其仁而徇公皆此類也周史偪下之甚閩王昶立晉高祖遣散騎常侍冊封昶閩王昶遣中書舍人劉乙勞損于館乙衣冠偉然騶僮甚盛佗日損遇乙于塗布衣芒屩而已損使人誚之曰鳳閣舍人何偪下之甚也乙羞媿以手掩面而走世家南唐韓熙載為和州司馬久之召為中書舍人乃始親制誥典雅有元和之風九國志真宗時日本國入貢求本國神光寺記舍人辭不工令學士張君房代之張退食多潛飲市樓掖垣求之不得大窘時种放以司諫歸華山楊大年為閑忙令云世上何人號最閑司諫拂衣歸華山世上何人號最忙紫微失却張君房湘山野錄六押李泌曰給舍分司押事故舍人謂之六押李泌傳宰相判官中舍時目為宰相判官盧氏雜說太宗嘗云朝廷每除一舍人六親相賀諺云一佛出世國史禁門曰黃闥以中人主之故號曰黃門令然則黃門郎給事黃闥之內故曰黃門郎興服志名儒國親諸給事中日上朝謁平尚書奏事分為左右以有事殿中故曰給事中多名儒國親為之掌左右顧問漢儀注給事中常侍從左右無員位次侍中常侍或名儒或國親胡廣集夕郎黃門郎屬黃門每日暮入對青瑣門拜名曰夕郎漢舊儀漢儀夕則兩郎向瑣闥拜謂之夕郎柳子厚朝日說尚書郎奏事於明光殿省中皆調粉塗壁其邊以丹漆地故曰丹墀尚書郎含鷄舌香伏其下奏事黃門侍郎對揖跪受上賜帛東方朔為中郎賜帛百疋給事中東方朔記胡伯始曰給事常侍從或名儒或國親東方朔中郎為給事中劉向諫議大夫為給事中後胡廣傳蕭望之漢元帝詔曰望之傳朕八年厥功茂焉可賜爵關內侯給事中贊曰身為儒宗有輔佐之能近古社稷臣也漢本傳有言而治陳紀父實實子群魏使持節給事中文帝曰卿何如祖父群曰臣父有言而治臣有言而不治梁湘東王繹孝子傳軒軒煦煦王黎為黃門郎軒軒然得志煦煦然自樂傳子武帝太康七年詔曰郎中張建忠篤履素為江表士大夫所稱宜在中朝其以建為給事中晉書起居注陳邵字節艮太始六年詔曰燕王師邵清貞廉潔博通六籍宜在左右以敦儒訓可給事中太子竊於東宮遣徐文景造乘輿御物文景父陶仁時為給事中謂文景曰汝終當滅門政當掃墓待喪耳仍移家避之後太子薨事泄文景賜死陶仁遂不哭時人以為有古人風南史太子長懋齊武帝長子給事中凡百司奏抄侍中審定則先讀而署之以駁正違失凡制勑宣行大事則稱揚德澤褒美功業覆奏而請施行小事則署而頒之凡文武六品已下授職所司奏揚則校其任歷深淺功狀殿最訪其德行量其才藝若官非人理失其事則白侍中而退量焉其弘文館圖書繕寫讎校亦課而察之凡天下冤滯未申及官吏刻害者必聽其訟與御史及中書舍人同計其事宜而申理之六典掌侍左右分判省事弘文館繕寫校讎之課凡百司奏抄侍中既審則駁正違失詔敕不便者塗竄而奏還謂之塗歸季終奏駮正之目百官志張行成遷給事中太宗嘗臨軒謂侍臣曰朕所以不能恣情欲取樂當年而勵節苦心卑宮菲食者正為蒼生耳我為人主兼行將相之事豈不是奪公等名昔漢高祖得蕭曹韓彭天下寧晏舜禹湯武有稷契伊呂四海義安此事朕並兼之行成退而上書諫曰陛下聖德含光規模弘遠雖文武之烈實兼將相何用臨朝對眾與其校量以萬乘至尊共臣下爭功哉太宗深納之舊唐東臺給事中龍朔二年改為東臺舍人六典劉伯芻除給事制曰東闥實掌駁議白集崔璪除給事制曰左省駁議不畏強禦杜牧之集李嶠高宗時遷給事中時酷吏來俊臣構陷狄仁傑李嗣貢裴宣禮等三家奏請誅之則天使嶠與大理少卿張德裕侍御史劉憲覆其獄德裕等雖知其枉懼罪並從俊臣所奏嶠曰豈有知其枉濫而不為申明哉乃與德裕等列其枉狀由是忤旨出為潤州刺史詔入轉鳳閣舍人則天深加接待朝廷每有大手筆皆特令嶠為之舊唐盧粲幽州范陽人也景龍二年遷給事中時節愍太子初立韋庶人以非已所至深加忌嫉勸中宗下勑令太子却取衛府封物每年以供服用粲駁奏曰皇太子處繼明之重當主鬯之尊歲時服用自可百司供擬又據周官諸應用財器歲終則會唯王及太子應用物並不會此則儲君之費咸與王同今與列國諸侯齊衡入封豈所謂憲章在昔垂法將來者也必謂青宮初啟服用所資自當廣支庫物不可長存藩封詔從之上盧粲遷給事中時安樂公主壻武崇訓為節愍太子所殺特追封為魯王令司農少卿趙履溫監護葬事李溫諷公主奏請依永泰公主故事為崇訓造陵詔從其請粲駁奏曰伏尋陵之稱謂本屬皇王及儲君等自皇家已來諸王及公主墓無稱陵者惟永泰公主承恩特葬事越常途不應假以為名請比貞觀以來諸王舊例足得豐厚手敕答曰安樂公主與永泰無異同冗之義右令不殊魯王緣此特為陵制不煩固執粲又奏曰臣聞陵之稱謂施於尊極至屬王公已下且魯王若欲論親等第則不親於雍王守禮雍王之墓尚不稱陵魯王則不可因上公主而加號且君之舉事則載於方冊或稽之往典或考自前朝臣歷檢貞觀已來駙馬墓無得稱陵者且君人之禮服絕於傍朞蓋為不獨親其親不獨子其子陛下以膝下之恩愛他及其夫贈賵之儀哀榮足備豈得使上下無辯君臣一貫者哉帝竟依粲所奏上王維字摩詰天寶末為給事中祿山陷兩都玄宗出幸維扈從不及為賊所得祿山宴其徒於凝碧宮其樂工皆黎園弟子教坊工人聞之悲惻潛為詩曰萬戶傷心生野煙百官何日再朝天秋槐花落空宮裏凝碧池頭奏管絃賊平陷賊官三等定罪維以詩聞肅宗嘉之特宥之給事中駁正制敕定其是非開元中李義多駁正姚崇惡其異已薦為紫薇侍郎實去其權自後唯署案牘而已柳氏家學錄袁高為給事中德宗復用盧杞為饒州刺史命高草詔書高執詞頭謁宰相曰盧杞作相三年矯詐陰賊退斥忠良若更授大郡恐失天下之望宰相不悅命舍人草之詔出執之不下乃奏論之舊史李藩為給事中制勑有不可遂於黃勑後批之吏曰宜別連白紙藩曰別以白紙是文狀豈曰批勑耶裴言於帝以為有宰相器舊唐憲宗以同州刺史呂元膺復為給事中初元膺自給事中除同州及入謝上問以時政得失元膺論奏詞甚激切上嘉其剛正翌日謂宰相曰呂元膺讜言直氣今欲留在左右使言得失卿等以為何如李藩裴進賀曰陛下納諫超冠前王乃宗社無疆之福臣等不能廣求直士又不能數進直言孤負聖心合當罪責今請以元膺復為給事中以備顧問上悅而從之上李遜為給事中嘗論時政以為事君之義有犯無隱陳誠啟沃不必擇辰今君臣敷奏乃候隻日是畢歲臣下睹天顏獻可否能幾何憲宗嘉之上韋弘景為給事中屢有封駁時有劉士經以駙馬交通邪倖自檢校官用為太僕卿弘景執奏不可中人宣諭再三弘景不為之廻穆宗怒令弘景使安南邕容宣慰時論翕然推重上繼有封駁郭承嘏為給事中開成元年出為華州刺史詔方下兩省迭詣中書求承嘏出麾之由給事中盧載封還詔書奏曰承嘏自居此官繼有封駁能奉其職宜在瑣闈牧守之才易為推擇文宗謂宰臣曰承嘏久在黃扉欲優其祿俸暫令廉問近關而諫列拜章惜其稱職甚美事也乃復為給事中上封還詔書狄兼謨長慶大和中歷鄭州刺史以治行稱入為給事中開成初度支在藏庫妄破漬污縑帛等贓罪文宗以事在赦前不理兼謨封還敕書文宗召而諭之曰嘉卿舉職然朕已赦其長官典吏亦宜在宥然事或不可卿勿以封敕為艱上左右補闕掌供奉諷諫扈從乘輿凡發令舉事有不便於時不合於道大則廷議小則上封若賢良之遺滯於下忠孝之不聞於上則條其事狀而薦言之六典補闕唐垂拱中所置言國家有過闕而補正之故以名官焉詩云衮職有闕仲山甫補之蓋取此義後漢伏湛出入禁闈拾遺補闕魏志文帝勑侍臣曰公卿等宜拾朕之遺補朕之闕晉武帝詔曰公卿等宜補闕拾遺獻可替否晉職官志御登殿侍中居佐散騎常侍居右備切問近對拾遺補闕後魏孝文帝令侍中李中補闕左右垂拱中因其義而創立其才可則登不拘階敘又置內供奉無員數才識相當不待闕而授其資望亦與正官同上垂拱中所置言國家有遺事拾而拾之故以名官焉史記及黯曰臣願為中郎署長出入禁闥補過拾遺漢書元帝初立給事中劉向侍中金敞拾遺於左右後漢張衡為侍中恒居帷幄從諫議拾遺左右後魏初置內侍長主拾遺應對若今之侍中散騎又孝文帝命侍中邱惟拾遺左右垂拱中因其義而創立餘同上李邕少知名長安初內史李嶠及監察御史張廷珪並薦邕詞高行直堪為諫諍之官由是召拜左拾遺俄而御史中丞宋璟奏侍臣張昌宗兄弟有不順之言請付法推斷則天初不應邕在階下進曰臣觀宋璟之言事關社稷望陛下可其奏則天色稍解始允宋璟所請既出或謂邕曰吾子名位尚卑若不稱旨禍將不測何為造次如是邕曰不愿顛不狂其名不彰若不如此後代何稱也舊唐中宗即位以妖人鄭普思為秘書監李邕上書諫曰陛下今若以普思有奇術可致長生久視之道則爽鳩氏久應得之永有天下非陛下今日可得而求若以普思可致仙方則秦皇漢武久應得之永有天下亦非陛下今日可得而求若以普思可致佛法則漢明梁武久應得之永有天下亦非陛下今日可得而求若以普思可致鬼道則墨翟干寶各獻於至尊矣而二王得之永有天下亦非陛下今日可得而求此皆事涉虛妄歷代無效臣愚不願陛下復行之於明時上竇群隱居毗陵以節概聞著書三十四卷號史記名臣疏貞元中蘇州刺史韋夏卿以園丘茂異薦兼獻其書不報復薦群召拜左拾遺遷侍御史充入蕃使判官群因入對奏曰陛下即位二十年始自草澤擢臣為拾遺是難其進也今陛下以二十年難進之臣用為和蕃判官一何易也德宗異其言留之復為侍御史元和中以左拾遺杜從郁為秘書丞從郁司徒佑之子也初自司議即為左補闕崔群韋貫之左拾遺獨孤郁等上䟽以為宰相之子不合為諫諍之官於是降為左拾遺群等又奏云拾遺與補闕雖資品不同而皆是諫官父為宰相而子為諫官若政有得失不可使子論父於是改授之上王源忠字正蒙遷左補闕時典禁軍者不循法度至有臺府人吏皆為追擒源忠上䟽其略曰夫臺府者紀綱之地府縣者責成之所設有罪犯宜歸司存安有北軍勢重於南衙輦下權傾於仗內乞還法司庶守職分憲宗可其請裴垍在中書有獨孤郁李正辭嚴休復自拾遺轉補闕及參謝之際垍廷語之曰獨孤與李二補闕孜孜獻納今之遷轉可謂醜勞無愧矣嚴補闕宦業或異於斯昨者進擬不無疑緩休復悚恧而退文宗以魏謨為補闕上嘗言於宰臣曰太宗皇帝得魏徵採拾闕失弼成聖政今我得魏謨於疑似之間必極匡諫雖不敢希及貞觀之政庶幾處於無過之地命授謨左補闕於狀內備述諫疏激切詔中書善為之詞王直方開成中為右補闕上䟽曰陛下即位之始宣徽教坊悉令停減人數聞近來稍不如此樂工子弟賜與至廣每有此事向外流傳傷陛下聖德豈容易也臣以為鄭聲娛人音樂動聽能使人情迷性亂捨棄萬事而為樂不足也臣伏以聖體未安加以聲色之翫侵蠹聖祚得不憂乎帝覽奏嘉歎賜帛百匹并以表示宰臣令宣付史官冊府白居易上疏云蒙恩授臣左拾遺依前翰林學士謹按六典云云其選甚重其秩甚卑所以然者抑有由也大凡人之情位高則惜其位身貴則愛其身惜位則偷合而不言愛身則茍容而不諫此必然之理也故拾遺之置所以卑秩者使位未足惜身未足愛也所以重其選者使下不忍負心上不忍負恩夫位未足惜恩不忍負然後能有闕必規有違必諫朝廷得失無不察天下利病無不言此國朝置拾遺之本意也元稹為東臺御史召還京宿敷水驛內官劉士元後至爭廳士元怒排其戶稹襪而走廳後士元追之以箠擊傷稹面執政以稹年少後輩務作威福貶為江陵府士曹參軍白居易為拾遺上疏云聞士元蹋破驛門奪將鞍馬仍索弓箭嚇辱朝官承前已來未有此事今中官有罪未聞處置御史無過却先貶官遠近聞知實捐聖德臣恐從今已後中官出使縱暴益甚朝官受辱必不敢言縱有被凌辱毆打者亦以元稹為戒但吞聲而已陛下從此無由得聞韋溫為右補闕忠鯁救時宋申錫被誣溫昌言曰宋公履行有素身居台輔不當有此是姦人陷害也吾輩諫官豈避一時之雷電而致聖君賢相蒙蔽惑之咎耶因率同列伏閤切爭之由是知名諫上尊號韋溫為右補闕內史群臣上尊號溫上疏曰德如三皇止稱皇功如五帝止稱帝徽號之稱乃聖王之末事今歲三川水災江淮早歉恐非崇飾徽稱之時帝深嘉之通事舍人宣詔舊命拾遺團句把麻者盡謁者不知書多失句度故用拾遺低摘聲句以助之及呂溫為拾遺被喚把麻不肯去遂成故事拾遺不把麻者自呂始也時柳宗元戲呂云幸識一文半字何不與他把也嘉話錄大中十一年右補闕陳嘏左拾遺王譜右拾遺薛廷傑上疏諫遣中使往羅浮山迎軒轅先生詔曰朕以萬機事繁躬親庶務訪聞羅浮山處士軒轅集善能攝生年齡亦壽乃遣使迎之或冀有少保理也朕每觀前史見秦王漢武為方士所惑常以之為誡卿等位當論列職在諫司閱示來章深納誠意仍謂崔慎由曰為吾言於諫官雖少翁欒大復生不能相惑如聞軒轅生高士欲與之一言耳舊紀白居易與元稹書云古人云名者公器不可以多取僕是何者竊時之名已多既竊時之名又欲竊時之富貴使已為造物者肯兼與之乎況詩人命蹇如陳子昂杜甫各授一拾遺屯剝至死集陳子昂轉右拾遺數上疏陳事詞皆典美時有同州下邽人徐元慶父為縣尉趙師韞所殺後師韞為御史元慶變姓名於驛家傭力候師韞手刃殺之議者以元慶孝烈欲捨其罪子昂建議以為國法專殺者死元慶以正國法然後旌其閭墓以褒其孝義可也當時議者咸以子昂為是舊唐天授三年舉人無賢愚咸加擢用高者試鳳閣侍郎給事中次或試員外郎侍御史補闕拾遺校書郎當時頗為濫雜著於謠誦謠曰補闕連車載拾遺平斗量杷椎侍御史椀脫校書郎諫議大夫諫議大夫掌侍從贊相規諫諷諭凡諫有五一曰諷諫二曰順諫三曰規諫四月致諫五曰直諫六典孔子曰忠臣之諫君有五義焉一曰譎諫二曰戇諫三曰降諫四月直諫五曰風諫唯度主而行之家語諫者何諫間也因也更也是非相間革更其行也人懷五常故有五諫謂諷諫順諫窺諫指諫伯諫諷者智也禍患之萌深睹其事未彰而諷告此智性也順諫者仁也出辭遜順不逆君心仁之性也窺諫者禮也視君顏色不悅且卻悅則復前以禮進退此禮之性也指諫者信也指質相其事也此信之性也伯諫者義也惻隱發於中直言國之害勵志忘生為君不避喪身義之性也白虎通宣帝時選愽士諫大夫通政事者補郡國守相以蕭望之為平原太守望之雅意在本朝遠為郡守內不自得乃上䟽曰陛下哀愍百姓恐德化之不究悉出諫官以補郡吏所謂憂其末而忘其本者也朝無爭臣則不知過國無達士則不聞善願陛下選明經術溫故知新通於幾微謀慮之士以為內臣與參政事諸侯聞之則知國家納諫憂政亡有闕遺若此不怠成康之道其庶幾乎外郡不治豈足憂哉前漢揚雄字子雲以耆老久次轉為諫議大夫疾免復召為諫議大夫家至貧嗜酒人稀至其門時有好事者載餚酒以從遊學上江革轉諫議大夫賜告歸天子思革篤行詔齊相曰諫議大夫江革前以病歸今起居何如夫孝者百行之冠眾善之始也縣以見數千斛賜巨孝常以八月長吏存問致美酒以終身後漢李尤字伯仁侍中賈逵薦尤有揚雄之才明帝召作東觀辟雍德陽諸觀賦銘拜諫議大夫晉書張普惠字洪賑身長八尺容貌魁偉精於三禮兼善春秋百家之說任城王澄重其學業為其聲價轉諫議大夫澄謂普惠曰不喜君得諫議唯喜諫議得君將靈太后父司徒胡國珍薨贈相國太上泰公普惠以前世后父無太上之號詣闕上䟽陳其不可太后覽表親至國珍宅召集五品已上愽議其事遣使召普惠與相問答又令侍中元又中常侍賈璨監觀得失太后復遣元義賈璨宣令謂普惠曰朕向召卿與群臣對議往復既終皆不同卿表朕之所行孝子之志卿之所陳忠臣之道群公已有成議卿不得苦奪朕懷後有所見勿得難言普惠於是拜令辭還初普惠被召傳詔馳驊騮馬來甚迅速佇立催去普惠諸子憂怖涕泣普惠謂曰我當休明之巿掌諫議之職若不言所難言諫所難諫便是唯唯曠官尸祿人生有死死得其所夫復何恨然朝廷有道汝輩勿憂及議罷旨勞還宅親故賀其幸甚時中山杜弼遺書普惠曰明侯淵儒碩學身負大才秉此公方來居諫職謇謇如也諤諤如也一昨承胡司徒第當面折庭諍雖問難鋒至而應對響出宋城之帶始縈魯門之柝裁警終使群后逡巡庶寮拱默雖不見用於一時固已傳美於百代聞風快然敬栽此白普惠美其此書每為口實魏書蹇諤不顧隋煬帝驕矜自負以為堯舜莫已若而諱亡憎諫乃曰有諫我者當時不殺後必殺之大臣蘇威欲開一言不敢發因五月五日獻古文尚書帝以為乩己即除名蕭瑀諫無伐遼出為河西郡守董純諫無幸江都就獄賜死自是蹇諤之士而不顧外雖有變朝臣鉗口帝不知也身死人手子孫勦絕為天下笑唐吳競䟽王珪為諫議大夫嘗有論諫太宗稱善詔每宰相入內平章大計必使諫官隨入與聞政事唐書武后垂拱二年有魚保宗者上書請置匭以受四方之書乃鑄銅匭四區共為一室列於朝堂東方春色青有能告以養人及勸農可投書於青匭銘之曰延恩南方夏色赤有能正諫論時政之得失可投書於丹匭銘之曰招諫西方秋色白有能自陳抑屈可投書於玄匭銘之曰申脕北方水色玄有謀智者可投書於玄匭銘之曰通玄令宣正諫大夫補闕拾遺等一人充使人匭事每日所有投書至暮即進天寶九載玄宗以匭聲近鬼理匭使為獻納使上陽城為諫議大夫裴延齡說讚陸贄等坐貶黜德宗怒不解在朝無救者城聞而起曰吾諫官不可使天子殺無罪人而信用姦臣即率拾遺王仲舒等數人守延英門上疏論延齡姦佞贄等無罪狀德宗大怒召宰相入語將加城等罪良久乃解今宰相論遣之於是金吾將軍張萬福聞諫官伏閤諫趍往至延英門大言賀曰朝廷有直臣天下必太平矣遂遍拜城及王仲舒等曰諸諫議能如此言事天下安得不太平已而連呼太平萬歲萬福武人時年八十餘自此名重天下上李絳見浴堂殿憲宗曰比諫官多朋黨論奏不實皆陷謗訕欲黜其尤者若何絳曰此非陛下意必憸人以此營誤上心自古納諫昌拒諫亡夫人臣進言於上豈易哉君尊如天臣卑如地加有雷霆之威彼晝度夜思始欲陳十事俄而去五六及將以聞則又憚而削其半故上達者纔十二何哉于不測之禍顧身無利耳雖開納獎勵尚恐不至今乃欲譴訶之使直士杜口非社稷利也帝曰非卿言我不知諫之益上不䘏國事鄭覃以父蔭累諫議大夫穆宗立不䘏國事覃與崔郾等廷對曰陛下新即位宜側身勤政而內耽宴嬉外盤游畋今吐蕃在邊徂候中國假令緩急臣下乃不知陛下所在不敗事乎夫金繒所出固民膏血可使倡優無功濫被賜予願節用之毋今有司重取百姓帝不懌顧宰相蕭俛曰是皆何人俛曰諫官也帝意解乃曰朕之有闕下能盡規忠也因詔覃曰閤下殊不款款後有為我言者當見卿延英時閤中奏久廢至是士相慶上忠良腹心憲宗皇后郭氏武宗喜畋游他日問后起居從容謂曰如何可為盛天子后曰諫臣章疏宜審覽度可用用之有不可以詢宰相毋拒直言勿納偏言以忠良為腹心此盛天子也帝再拜還索諫章閱之往往道游獵事自是畋幸稀小兒武抃等不復橫賜矣牛叢任補闕數數言事會宰相請廣諫員宣宗曰諫臣惟能舉職為可奚用眾耶今張符趙璘牛叢使臣聞所未聞三人足矣閩王曦惡其宗室多以事誅之諫議大夫黃峻舁襯詣朝堂極諫曦怒貶峻漳州司戶參軍校書郎陳光逸上書疏曦過惡五十餘事曦命衛士鞭之百而不死以繩繫頸掛于木久而乃絕五代史受諫漢高赦周昌桀紂之對晉武受劉毅桓靈之譏吳兢天中記卷三十二
