body:
  text: 天中記巻十二明陳耀文撰誕聖履跡詩含神霧曰太跡出雷澤華胥履之生宓犧宋均註曰雷澤地名華胥伏犧母孝經鈎命訣曰華胥履跡恠生皇犧註跡靈威仰之跡也履跡而生以為竒恠也青虹繞身庖犧所都之國有華胥之洲神母遊其上有青虹繞身母久而方㓕即覺有身歴十二年而生庖犧長頭脩目龜齒龍脣眉有白毫鬚垂委地拾遺記仇夷山四絶孤立太昊之治伏犧生處遁甲開山圖伏犧人頭蛇身以十月四日人定時生帝系譜龍感炎帝神農氏姜姓也母曰任已有蟜氏女也曰女登為少典正妃游華山之陽有神龍首感女登於尚羊生炎帝人身牛首長於姜水有聖徳繼無懐之後世紀帝魁孝經鈎命訣曰任巳感龍生帝魁鄭𤣥曰任巳帝魁之母也魁神農名已或作姒仰不覩炎帝帝魁之美東京賦電繞斗樞黄帝名軒北斗黄帝之精母地祇之女附寶之郊野大電繞斗樞星耀感附寶生軒胷文曰黄帝子河圖挳拒黄帝有熊氏少典之子姬姓也母曰附寶其先即炎帝母家有蟜氏之女附寶見大電光繞北斗樞星照於郊野感附寶孕二十四月而生黄帝於夀丘長於姬水世紀司空季子曰昔少典取于有蟜氏生黄帝炎帝黄帝以姬水成炎帝以姜水成成而異徳故黄帝為姬炎帝為姜二帝用師以相濟也異徳之故也晋語孝經鈎命訣曰附寶出降大靈生帝軒註電黄精軒轅氣也軒黄帝名虹流華渚春秋元命苞曰黄帝時大星如虹下流華渚女節夢接意感生白帝朱宣宋均曰華渚渚名也朱宣少昊氏渚為陵少昊生於稚華之渚其渚一旦化而為陵鬱鬱葱葱焉休子瑶光貫月顓頊髙陽氏母曰景僕蜀山氏女為昌意正妃謂之女樞金天氏之末世紀瑶光之星如蜺貫月正白感女樞于幽房之宫生黑帝顓頊河圖著命顓頊生十年而佐少昊十二年而冠二十二而登帝位世紀閭丘卭對齊宣王曰昔者顓頊行年十二而治天下新㡰龍婚堯母慶都有名於世盖大帝之女生於斗維之野常在三河之南天偶大雷電有血流潤大石之中生慶都長大形像大帝常有黄雲覆盖之夢食不饑及二十年寄伊長孺家出觀三河之首常若有神隨之者有赤龍負圖出慶都督讀之云赤受天運下有圖人衣赤光面八彩鬚􅀢長七尺二寸鋭上豊下足履翼宿署曰赤帝起成天下寶奄然隂風四合赤龍與慶都婚有娠龍消不見既乳視堯如圖表及堯有知慶都以圖予堯春秋合誠圖赤龍感之孕十四月而生堯於丹陵宋符瑞志感樞星瞽瞍妻曰握登見大虹意感而生舜於姚墟故姓姚氏世紀書帝命驗云姚氏縱華感樞注縱生也舜母握登感樞星生舜重華樞如虹也河圖注命云握登見大虹意生黄帝謂舜流星貫昴崇伯鯀取有莘氏女謂之女志系本志是謂脩已出行見流星貫昴夢接意感又吞神珠薏苡胷拆而生禹於石紐帝王紀鯀娶於有莘氏之女名曰女嬉年壯未孳嬉於砥山得薏苡而吞之意若為人所感因而姙孕剖胷而產髙密呉越春秋月精女狄莫及石紐山下泉中得月精如雞子愛而吞之遂孕十四月生夏禹開山圖荣氏注白帝精禹白帝精以星感帝命驗命星貫昴鈎命訣生發于背繁露首戴鈎鈐足文履已胷懷玉斗雒書靈准聴姚氏以禹胷有黑子如北斗鄭謂懷旋璣玉衡之道戴鈐謂有骨表如鈎鈐星也吞卵高莘氏之世妃曰簡狄以春分𤣥鳥至之日從帝祀郊禖與其妹浴於𤣥丘之水有𤣥鳥銜卵而墜之五色甚好二人競取覆以玉筐簡狄先得而吞之遂孕胷剖而生契受封于商宋符瑞志𤣥鳥翔水遺卵于流娀簡拾吞生契封啇書中候有娀氏有二佚女為之九成之臺飲食必以皷帝令燕往視之鳴若謚隘二女愛而争摶之要以玉筐少選發而視之燕遺二卵北飛遂不及二女作歌一終曰燕燕往飛呂覽音初𤣥玉衛彪傒見單穆公曰昔孔甲亂夏四世而殞𤣥王勤商十有四葉今本作世而興帝甲亂之七世而殞后稷勤周十有五世而興周語宗有司謂夏父弗忌曰自𤣥王以及主癸莫若湯自稷以及王季莫若文武魯語賈逵注曰𤣥王謂契也白氣貫月契後十三世生主癸主癸之妃曰扶都見白氣貫月意感以乙日生湯號天乙上感生黑帝湯河圖狼星成湯母感狼星之精又感黑龍而成金樓子履大人迹髙辛氏之世妃曰姜嫄助祭郊禖見大人迹履之當時歆如有人道感已遂有身而生男以為不祥棄之阨巷羊牛避而不踐又送之山林之中㑹伐林者薦覆之又取而置寒氷土大鳥來以一翼藉覆之姜嫄以為異乃收養焉名之曰棄長為堯稷官有功於民宋志􅘞于豕牢后稷之孫曰公劉公劉之後十三世而生季歴季歴之妃曰太任夢長人感已􅘞于豕牢而生昌是為周文王上文公對胥臣曰昔者太任娠文王不變少􅘞于豕牢而得文王不加病焉文王在母不憂在𫝊弗勤處師弗煩事王不怒晉語生而有頿王子朝使告諸侯曰定王六年秦人降祅曰周其有頿王亦克能脩其職至于靈王生而有頿王甚神聖無惡於諸侯左傳吞玉英漢髙帝父曰劉執嘉執嘉之母夢赤鳥若龍戯已而生執嘉母名含始是為昭靈后昭靈后㳺於洛池有玉雞銜赤珠刻曰玉英吞此者王昭靈后取而吞之又寢於大澤之陂夢與神遇是時靁電晦冥太公視之見蛟龍在其上遂有身而生季是為髙帝宋志夢龍據胷文帝母薄姬髙祖召欲幸之對曰昨暮夢青龍據妾胷上曰我是也是貴徴吾為爾成之一御而生文帝生猗蘭殿景帝坐崇方閣上有丹霞起赤龍盤棟間使王夫人居之改崇方閣為猗蘭殿漢武内事得幸有娠夢日入懷景帝亦夢髙祖謂己曰王美人得子可名為彘及生男因名焉是為武帝帝以乙酉年七月七日旦生於猗蘭殿故事互見日類生甲觀孝成皇帝元帝太子也母王皇后元帝在太子宫生甲觀畫堂本紀周世宗天清節百寮表曰候屬澄河時當降聖是甲觀懸弧之日乃銅律禦户之時冊府師古曰甲者甲乙丙丁之次也元后傳言見於丙殿嘉禾光武父欽初為濟陽令有武帝行宫常封閉上將生欽以令舍下濕開宫後殿居之建平元年十二月甲子夜上生時有赤光照室中盡明如晝欽異之使卜者王長卜之長辟左右曰此善事不可言是嵗嘉禾生一莖九穗長大異於凡禾縣界大豐熟因名上曰秀是嵗鳯凰來集濟陽故宫皆畫鳯凰之瑞東觀漢記光武赤光照室影如五麟七鳯金樓子神光之異晉元帝諱睿字景文世祖咸寧二年生于洛陽初誕有神光之異一室盡明所籍藁如始刈中興書神光照室宋武帝居在丹徒始生之夜有神光照室其夕甘露降于墓樹皇考以髙祖生有竒異名為竒奴皇妣既殂養於舅氏改為寄奴焉符瑞志光屬天魏道武母賀氏初因遷徙遊於雲澤既而寢息夣日出室内寤而見光日牖屬天歘然有感以建國三十四年七月七日生於參合陂北其夜復有光明本紀天地氛氲孝文母李夫人皇興元年八月戊申生於平城紫宫神光照於室内天地氛氲和氣充塞上日化龍繞宣武母髙夫人初夣為日所逐避於牀下日化為龍繞已數匝寤而驚悸既而有娠太和七年閏四月生帝於平城宫上抱日梁武帝母張氏嘗夣抱日已而有娠遂產帝南史紀初后嘗於室内忽見庭前昌蒲生花光彩照灼非世中所有后驚視謂侍者曰汝見不對曰不見后曰常聞見者當富貴因遽取吞之是月產髙祖將產之夜后見庭内若有衣冠陪列焉梁傳紫胞孝元帝母阮脩容帝母在采女次侍始褰户幔有風囘裾武帝意感幸之采女夢月墮懷中一云夢龍罩其牀遂孕天監七年八月丁巳生帝舉室中非常香有紫胞之異武帝竒之因賜采女姓阮進為脩容南史紀從來甚異隋髙祖母吕氏以大統七年六月癸丑夜生髙祖于馮翊波若寺紫氣充庭有尼來自河東謂皇妣曰此兒所從來甚異不可於俗間處之尼將髙祖舍於别館躬自撫養皇妣嘗抱髙祖忽見頭上角出遍身鱗起皇妣大駭墜髙祖於地尼自外入見曰已驚我兒致令晩得天下隋紀紫氣充庭唐髙祖以後周天和元年十一月丁酉生於長安是日紫氣充庭神光照室冊府慶雲見太宗以隋開皇十八年嵗次戊午生于武功之别館初太宗在孕而語聲達于外后心異之將誕育后不之覺而大宗已生有慶雲見彌漫數里上屬于天二龍戯于門外水中經三日乃冲于天而去見者驚焉上千秋節𤣥宗以垂拱元年八月五日生於東都開元十七年八月癸亥宴百寮於花蕚樓下丞相源乾曜張説上表曰少昊著流虹之感商湯本𤣥鳥之命陛下二氣合神九龍浴聖月惟中秋日在端五常星不見之夜祥光照室之朝請以為千秋節著之甲令布之天下咸令宴樂羣臣以是日獻甘露醇酎上萬嵗夀酒王公戚里進金鏡綬帶士庶以結絲承露囊相遺問村社作夀酒宴樂名為賽白帝報田神上明𤣥天光啟大聖下彰皇化垂俗無窮帝手詔報曰凡是節日或以天氣推移或以人事表記當朕生辰卿等請為令節上獻嘉名自我作古是為美事依卿來請宣付所司唐實録金鑑録張九齡表云千秋節日王公以下悉以金寶鏡進獻臣愚以謂明鏡所以鑑形住事所以鑑心臣敢縁此義謹于生辰節上事鑑十章名曰千秋金鑑録雖聞見褊淺所擇不深至于區區效愚庶乎萬一李集諷諭𤣥宗誕日崔日用采詩大小雅二十篇及相如封禪書獻之借以諷諭且致勸戒詔賜衣物天長天寶七載百官蕭照等請改千秋節為天長節從之實録獨孤及于肅宗初天長節進鏡表云當白露戒序之秋是黄河澄清之日臣幸逢嘉節願展微誠謹進二鏡一獻聖皇一獻陛下輒以愚悃上續聖夀伏以聖皇執契垂化有如金玉之式陛下時乗御天騁飛龍于國步故以金龍飾鏡以表聖徳伏冀纎塵莫翳朗鑒常懸掛仙臺如日之升含萬物而無私不照英華賦詩張彚千秋鏡賦伊惟仲秋日在端午我皇帝出震蘭殿誕應紫微祥光夜合佳氣晨飛英華張説皇帝誕日集賢殿宴詩曰瑞表壬寅露光傳甲子宵杜甫詩御氣雲樓敞含風綵仗髙天成地平莭𤣥宗在東宫為太平公主所忌宫中左右持兩端而濳附太平者必隂伺察事雖纎介皆聞于上太子心不自安后時方娠太子密謂張説曰用事者不欲告多嗣息恐禍及此婦人密令説懷去胎藥而入太子於曲室躬自煮藥瞑然似寐夣神人覆鼎既寤又夣如是者三太子異之以告説説曰天命也宜無他慮既而太平誅后果生肅宗舊唐書肅宗以景雲二年九月二日乙亥生于東宫之别殿祥光照室即位後號天成地平節上天興節肅宗呉皇后坐父事没入掖庭開元二十二年𤣥宗幸忠王邸見王服御蕭然傍無媵侍命髙力士選掖庭宫人以賜之而呉后在籍中舊書頃之后侍寢厭不寤吟呼若有痛氣不屬者肅宗呼之不解秉燭視之良乆方寤肅宗問之后手掩其左脇曰妾向夢有神人長丈餘介金操劒謂妾曰帝命與汝作子自左脇以劒决而入腹痛殆不可忍及今未之已也肅宗驗之于燭下有若綖而赤者存焉遂生代宗栁氏舊聞代宗以開元十四年十月十三日生于東都上陽宫之别殿𤣥宗幸汝州之温湯有望氣者云宫中有天子氣𤣥宗即日遷宫是夜遂降誕冊府獨孤及表置天興節其日慶雲見常衮賀表曰十月良月逺膺盈數之期後天奉天近和下元之厯從風蕭索抱日縈迴色涵流渚之虹影雜繞樞之電講三教徳宗不立節止于羣臣稱觴上夀樂志徳宗孟夏十四日降誕節昭義節度使王䖍休獻繼天誕聖樂候嘉作獻夀文玉海聖夀節順宗正月二十日號聖夀節齊杭寺碑進衣憲宗亦不置節名元和七年二月降誕日宰臣舉舊制例進衣一副李吉甫獨進馬二疋賜通天犀帶一條金石凌一合實録賀太后穆宗七月六日降誕太常禮院奏准故事合休假上從之先是尚書左丞韋綬以東朝舊恩多所陳奏請降誕日請百官詣光順門先賀皇太后然後上皇帝夀書之史册光示萬古帝欣然納焉其後竟以降誕受賀禮無所據罷之上慶成節文宗太和七年八月中書門下奏云階下馭三統之元膺千年之運當誕聖之日為河清之祥夫四時成嵗百榖成實必在首冬用成神化臣等請以十月十日為慶成節是日於宫中奉迎太皇太皇與昆弟諸王盛陳宴樂羣臣詣延英門奉觴上千萬嵗夀州府置宴一日上悦從之上慶陽武宗六月十一日生號慶陽節夀昌宣宗六月二十二日壽昌節延慶懿宗十月十四日延慶節應天僖宗五月八日應天節嘉㑹昭宗三月二十二日生龍紀元年帝載誕之日羣臣表為嘉㑹節從之羣臣表賀曰陛下徳邁方圓道融三五因社鳴而正位逢井聚以樂推值清明馭氣之時當仁夀悦隨之始固可年同鶴筭嵗比山呼永符垂拱之風長保後天之慶乾和哀帝九月三日號乾和節羣臣表曰階下九五飛龍四三應運國稱利見天表殊休當誕聖之日感真人以衛室居在藩之際實羽客以獻符敢循故典爰定美文萬夀唐莊宗以天啟元年十月癸亥生于晉陽宫在妊時太后常夣神人黑衣擁扇夾侍左右載誕之辰紫氣出于庭户即位以誕日為萬夀節應聖明宗九月九日號應聖節千春末帝正月二十三日生清泰元年九月日宰臣李愚等表曰以獻嵗元正三日是倚蘭降聖之辰梅花映雪于上林椒酒迎春于秘殿謂于是月特舉嘉名請以降聖日為千春節從之天和晉髙祖二月二十八日生馮道等表曰斗柄正卯律吹仲春當帝王出震之方是天地同和之日請以其日為天和節庶夫稱觴萬夀稍申將順之心節配四時永洽好生之徳從之啟聖少帝六月二十一日生馮道等表曰大電繞樞哲后繼羲農之運五星聚井真人啟文景之基昌圖允恊于千年嘉慶宜光于載誕當大雨時行之日乃常星不見之辰請以其日為啟聖節使地角天涯望南山而祝壽九州四海仰北極以傾心從之聖夀漢髙祖二月四日號聖夀節嘉慶隱帝三月初九日生百寮上表曰色變長瀾啟皇靈之寳搆光流華渚開聖緒於瑶圖當九龍浴聖之辰是五緯聮光之夕凡蒙地載共祝天長請以其日為嘉慶節從之天清周世宗九月二十四日生百寮上表曰夀丘降跡爰符出震之期里社應祥式契乗乾之運候屬澄河時當降聖鰈水鷬林望堯雲而獻祝桓圭榖璧趨禹㑹以駿奔請奉是日為天清節所冀金相玉振負寶厯以彌新地久天長煥天編而不朽從之天夀恭帝八月四日生名天壽節長春唐明宗登極每夕於宫中焚香祝天曰某胡人因亂為衆所推願天早生聖人為生民主明年丁亥二月十六日宋太祖生于洛陽夾馬營初太祖母杜氏夣日入懷而孕生之夕神光照室胞如菡萏體被金色三日不變異香馥郁經月不散人因號其地為香孩兒營受命録建隆元年羣臣上表云軒帝生于夀丘發繞樞之異夏禹誕于石紐流貫昴之祥莫不炳燿靈符延長寶厯諒惟聖徳允協昌符請以二月十六日為長春節長編乾明太宗母杜氏夣神人捧日以授已而有娠遂生帝於浚儀官舍是夜赤光上騰如火閭巷聞有異香時晉天福四年十月十七日甲辰也宋史太平興國二月五月宰臣上表云乾元發祥萬物資始以聖繼聖謂之大明願合二義之稱用表無彊之慶請以十月十七日為乾明節淳化元年改為夀寧節田錫獻祝夀詩承天初乾徳五年五星如連珠聚于奎當魯分從鎮星辰見東方占曰有徳受慶大人奄有四方子孫蕃昌明年正月元徳皇后李氏夣以裙承日有娠十二月二日生真宗於開封府第赤光照室左足指有文成天子至道三年即位八月以生日為承天節羣臣上夀於崇徳殿晏殊作承天節述聖賦楊億作承天節頌乾元仁宗母李氏夣一羽衣之士跣足從空而下云來為汝子時上未有嗣聞之大喜云當為汝成之是夕召幸有娠明年四月十四日生仁宗而幼年每穿履韈即亟令脱去常徒步禁中皆呼為赤脚仙人盖古之得道李君也一云仁宗以祥符三年生章懿夣二日在天其一忽墜以裙承之乾興元年即位二月宰臣丁謂等上表云玉瑶誕祥式契貫星之兆璿樞紀厯爰標出震之期階下清寧毓粹聰哲凝華候囘炎律氣應薰風協離徳之融輝仰榮河之啟瑞請以四月十四日為乾元節從之天聖五年八月趙良規上乾元節祝聖夀賦召試學士院十四日賜及第初真宗未有仁宗嘗遣左璫詣茅山祈嗣遇王異人言王真人已降生于宋朝璫問王真人本是何人曰古燧人氏章懿亦夣羽衣數百人從一仙官自空而下曰此托生于夫人及生宫中火光燭天始行步常持槐木簡以筯鑽之真宗問何用曰試鑽火耳帝顧后妃曰異人之言信不虛矣元符宫石刻壽聖英宗濮王允譲子也天聖十年正月三日生于宣平坊赤光滿室或見黄龍游光中初王夣兩龍與日並墮以衣承之復戱于空中其一龍視王曰吾非王所能有後仁中立為皇子亊實嘉祐八年即位宰臣請以生日為夀聖節詔答曰赤制告圖肇承題序青煒動陸俯協誕期卿等緣華封之素祝建夀聖之嘉名是用依允治平元年正月己亥親王樞密以下詣垂拱殿宰臣百官以下及契丹使詣紫宸殿上夀同天神宗慶厯八年四月十日生于濮王宫羣鼠吐五色氣成雲治平四年正月即位二月宰臣等表曰誕聖題期表靈源之濬發揆時紀節昭皇徳之開光當正陽統月之辰乃甲觀襲祥之日慶由運㑹道與天同請以其日為同天節熙寧元年垂拱紫宸殿上夀史亊實當神宗之未生也武夷山道士吳懷玉有道術指武夷君像曰嵗在戊子降為人主又指魏王像曰三十有八載當繼世御極撫平四海後其語皆騐武夷志宋建守陳覺民過武夷山詩昇真洞口接天門靈草丹桃日日春聴説列仙來瑞世三朝徳業在斯民盖真宗神宗哲宗皆武夷仙真降世故有三朝徳業之句方輿勝覽興龍哲宗十二月八日生宰臣表云夣日儲祥預席有開之慶奉符踐阼適丁利見之期請以其日為興龍節天寧徽宗以十月十日生宰臣章惇等表曰詩紀生民易稱出震時惟陽月瑞集樞星肇開震風之祥永御光華之旦離明繼照敷同四海之歡天徳出寧咸祝萬年之節請以其日為天寧節互見五月五日乾龍欽宗四月十三日乾龍節天申髙宗建炎元年以五月二十一日為天申節詔寢上夀禮羣臣拜表稱賀吳芾表云華渚呈祥預紀有開之慶薰風從律式逢載夙之辰史亊實髙宗韋后生也徽宗夣吳越王引御衣云我好來朝便留住我終須還我山河夣覺與鄭后言朕夜來被錢王乞取兩浙甚急鄭后奏云昨夜韋妃生子及建炎渡江都錢塘百有餘年豈非應乞兩浙之夣乎貴耳集洪皓在北買一妾東平人偕其母來曾侍明節劉后言韋后初生髙宗時夣金甲神人自稱錢武肅王即錢鏐也年八十一髙宗亦年八十一卜都錢塘事不偶然湖海新聞㑹慶孝宗太祖七世孫也父秀王母張氏夣府君擁一赤羊來遺之曰以此為識已而有娠以建炎元年十月二十二日生于秀州青杉牐之官舍紅光滿室如日正中紹興三十二年受禪八月以生日為㑹慶節十月詔節日權免上夀吳芾表云祐格髙穹方啟明昌之運慶鍾良月聿逢震夙之期史事實秀州外醫張浩云少為徳清閘官一日過嘉興忽覩丞㕔赤光照天疑為囘祿亟入視之乃趙縣丞室中適免娠是誕育孝宗也揮塵録重明光宗以九月四日為重明節瑞慶寧宗以十月十九日為瑞慶節天基理宗以正月五日為天基節乾㑹度宗理宗兄榮王子也方母娠時有飛語遂密使女醫治藥毒之而榮王不知也煮藥者見有金龍于上知將生貴人懼不敢煮因傾㵼其器以故得不進遂產孟啟孟啟度宗舊諱也夷堅續志景定五年即位十二月甲辰詔以生日為乾㑹節史天瑞恭帝以九月生日為天瑞節史降誕誕大也天子生曰降誕玉篇夫謂生為降似矣乃曰降誕謂天子之生之大耶書多方乃大降罰崇亂有夏乃大降顯休命於成湯亦可云誕降耶謝宣逺答靈運詩華宗誕吾秀之子紹前休南齊紀天誕叡聖河嶽炳靈魏髙允房氏頌誕兹令哲幽感孔昭以誕為生此外無多見王篇廣韻疑本諸此左思贈妹詩峩峩令妹應期誕生陸機詩誕育洪曺纂又魯左九嬪誄篤生公主誕膺休真若以誕為生則重矣詩書中凡云誕者乃也濶也欺也生民詩上云明言載生載育故下文云誕彌厥月誕寘之隘巷誕皆訓大非訓生育也今人直謂慶生為慶誕生辰為誕節是為慶大與大節矣潁川語小按大禹謨帝乃誕敷文徳則訓乃亦非書武成云誕膺天命以撫方夏又云惟九年大統未集大誥云有大艱于西土殷小腆誕敢紀其序又云天降戾於周邦惟大艱人誕隣胥伐於厥室康誥云天乃大命文王殪戎殷誕受厥命多士云誕滛厥泆罔顯于天惟時上帝不保降若兹大喪多方云有夏誕厥逸乃大滛昏不克終日又云誕作民主罔可念聼惟求爾多方大動以威康王之誥云改大邦殷之命惟周文武誕受羑若按書大誕多連言之則誕字訓大似不可拘拘如孔文毛鄭所云也朱氏曰生民之什多誕字皆訓大後有不甚通者疑但發語詞吕氏讀詩記按此説似是誕先登於岸依毛鄭注則牽强矣上靈不替朕命誕敢不祗承後張衡語尚書無逸云乃諺既誕孔安國曰欺誕也荀子修身篇曰匿行曰詐易言曰誕淮南説林云管子以小辱成大榮蘇秦以百誕成一誠許慎説文詞誕也袁氏漢紀云西方有神其名曰佛世俗之人以為虚誕劉琨答盧諶書然後知𥅆周之為虛誕嗣宗之為妄作文士傳阮籍放誕侮傲世情晉中興書孫承公少誕任不覊晉陽秋羅友誕肆非治民才孫楚莊周賛謾弔鼓缶放此誕言世説有任誕篇宋符瑞志武帝少時誕節嗜酒魏大武紀沙門之徒假西戎虛誕坐致妖孽按此誕字正解也習非不悟特詳正之符命五星入昴堯在位七十年將以天下禪舜乃潔齊脩壇塲于河雒率舜等升首山遵河渚有五老㳺焉盖五星之精也相謂曰河圖將浮龍銜玉苞刻版題命可巻金泥玉檢封書成知我者重瞳黄姚視五老飛流星上上入昴宋書比考䜟互見星門任彦昇宣徳皇后令五老㳺河飛星入昴李翰注云堯見五老入于河一老人曰河圖將來告帝期又一曰河圖推龜告帝謀又一曰山川魚鱉荷聖恩又一曰河圖推龍銜玉䋲歌訖五老飛于天入于昴不知出何典記海錄碎事引之得玉厯舜方耕于厯山得玉厯于河際之巖知天命在已體道不倦捜神記耕于厯山夣眉長與髪等宋志擁璿舜在位十有四年奏鍾石笙筦未罷而天大雷雨疾風發屋㧞木桴鼔播地鐘磬亂行舞人頓伏樂正狂走舜乃擁璿持衡而笑曰明哉夫天下非一人之天下也亦乃見于鐘石笙筦乎乃薦禹于天使行天子事舜乃設壇于河依堯故事至于下昃榮光休氣至黄龍負圖出于壇畔赤文緑錯其文言當授禹宋志神降夏道將興青龍止於郊祝融降于崇山國語宋志天變禹將受位天意大變迅風靡木雷雨晝㝠以明將去虞而適夏也樂稽曜嘉白虎通金徳湯背有四肘在亳能脩其徳東巡而至於洛觀帝堯之壇沉璧退立黄魚雙踴黑鳥隨魚至于壇化為黑玉又有黑龜並赤文成字言夏桀無道湯當代之檮杌之神見于邳山有神牽白狼銜鉤而入商朝金徳將盛􅀈自山溢湯將奉天命放桀夣及天而舓之遂有天下宋志赤爵銜書初黄帝之世䜟言曰西北為王期在甲子昌制命發行誅旦行道及公劉之後十三世而生季厯季厯之十年飛龍盈於殷之北野此盖聖人在下位將起之符也子昌為西伯作邑于豊文王之妃曰太姒夣商庭生棘太子發植梓樹於闕間化為松栢棫柞以告文王文王幣率羣臣與發並拜告夣季秋之甲子赤爵銜書及豐置于昌户昌拜稽首受其文要曰姬昌蒼帝子亡殷者紂竹書季秋之月甲子赤爵銜丹書入于鄷止于昌户其書云敬勝怠者吉怠勝敬者㓕義勝欲者從欲勝義者凶凡事不强則不枉不敬則不正枉者廢滅敬者萬世以仁得之以仁守之其量百世以不仁得之以仁守之其量十世以不仁得之不仁守之不及其世尚書帝命騐鳯銜書有鳯凰銜書游文王之都書又曰殷帝無道虐亂天下皇命已移不得復久靈祗逺離百神吹去五星聚房昭理四海宋志魚烏武王伐紂度孟津中流白魚躍入王舟王俯取魚長三尺目下有赤文成字言紂可伐王冩以世字魚文消燔魚以告天有火自天止于王屋流為赤烏烏銜榖焉榖者紀后稷之徳火者燔魚以告天天火流下應以吉也遂東伐紂勝於牧野兵不血刃而天下歸之上武王得白魚喉下文曰以予發論衡魚水精白者殷之色也烏者鳥鳥赤者周之應氣也先得白魚後得赤烏殷之統絶色移在周矣世見武王伐紂出遇魚烏則謂天用魚烏使武誅紂盖魚遭自躍王舟逢之火偶為烏王仰見之非魚聞武王之徳而入其舟烏知周家當起集於王屋也論衡指瑞赤虹化玉魯哀公十四年孔子夜夣三槐之間豊沛之邦有赤煙氣起乃呼顏淵子夏往視之驅車到楚西北范氏街見芻兒摘麟傷其左前足薪而覆之孔子曰兒來汝姓為赤誦名子喬字受紀孔子曰汝豈有所見耶児曰見一禽巨如羔羊頭上有角其末有肉孔子曰天下已有主也為赤劉陳項為輔五星入井從嵗星兒發薪下麟示孔子孔子趨而往麟䝉其耳吐三巻圖廣三寸長八寸每巻二十四字其言赤劉當起曰周亡赤氣起大耀興𤣥丘制命帝卯金孔子作春秋制孝經既成使七十二弟子向北辰星罄折而立使曾子抱河洛事北向孔子齋戒向北辰而拜告備于天曰孝經四巻春秋河洛凡八十一巻謹已備天乃洪鬱起白霧摩地赤虹自上下化為黄玉長二尺上有刻文孔子跪受而讀之曰寶文出劉季握邜金刀在軫北字禾子天下服宋志孔子夣三槐間豊沛市有赤飈起呼顔淵子夏往觀之見赤蛇化為黄金上有文曰卯金刀後髙祖起豊沛金樓子哀公時西狩薪者獲麟擊傷左足將以示孔子孔子見俛而泣抱麟曰爾孰為來哉孰為來哉反袂拭面仰視其人龍顔日角夫子奉麟之口須臾吐三巻圖一為赤伏劉季興為王二為周㓕夫子將終三為漢制制作孝經夫子還謂子夏曰新主將起其人如得麟者琴操天子氣占氣者云山東有天子氣秦始皇乃東遊欲以厭之漢紀髙祖即自疑亡匿隱於芒碭山澤巖石之間吕后與人俱求常得之髙祖怪問之吕后曰季所居上常有雲氣故從往常得季髙祖心喜沛中子弟或聞之多欲附者矣史漢抱朴子云班史云吕氏望雲而知髙祖所在天豈獨開吕氏之目而掩衆人之目耶天授初劉媪妊髙祖而夢與神遇震電晦冥有龍虵之怪及長而多靈有異於衆是以王武感物而折契吕公覩形而進女秦皇東游以厭其氣吕后望雲而知所處始受命則白虵分西入闗則五星聚故淮隂留侯謂之天受非人力也王命論俱見史記姬宗之在水滸也鸑鷟鳴於岐山劉姓之在中陽也蛟龍降於豊澤史通朱光赫矣髙祖肇載天禄沈跡中鄉飛名帝録慶雲應輝皇階授木彤雲晝聚素靈夜哭金精仍頺朱光以渥功臣頌始起沛澤則神母夜號以彰赤帝之符王命論徴應盖在髙祖其興也有五一曰帝堯之苗裔二曰體貎多竒異三曰神武有徴應四曰寛明而仁恕五曰知人善任使上大横文帝初為代王丞相太尉共誅諸吕使人迎之帝報太后計猶豫未定卜之兆得大横占曰大横庚寅余為天王夏啟以光帝曰寡人固己為王又何王乎卜人曰所謂天王者天子也漢書白衣天子昭帝元鳯二年太山有大石自起立上林有栁樹枯僵自起生枝葉蟲齧其葉成文曰公孫病以立陳留襄邑王社忽移至長安博士眭孟占之曰石隂類太山岱宗王者禪代之處將有廢故之家姓公孫名病已從白衣為天子者時昭帝㓜少霍光輔政以孟妖言誅之及昭帝崩昌邑王又廢光立宣帝曾孫曽孫本名病已在民間白衣三世如孟言焉漢書雉集秦文公時陳倉人獵得獸若彘不知名牽以獻之逢二童子童子曰此名為媦宋志作􅀈常在地中食死人腦即欲殺之拍捶其首媦亦語曰二童子名陳寳得雄者王得雌者霸陳倉人乃逐二童子化為雉雌上陳倉北坂為石秦祠之列異傳晉太原地志其雄者飛至南陽其後光武起於南陽搜神記宋志云穆公得之至文公立祠文是穆逺祖也大誤白水真人哀帝時夏賀良上言漢家厯運中衰當再受命於是改號為太初元年稱陳聖劉太平皇帝以厭聖之及王莽纂位忌惡劉氏以錢文有金刀故改為貨泉或以貨泉字文為白水真人後望氣者蘇伯阿為王莽使至南陽遥望見春陵郭唶曰氣佳哉鬱鬱葱葱然及始起兵還春陵遠望舍南火光赫然屬天有頃不見初道士西門君惠李守等亦云劉秀當為天子後紀徴符世祖之興有四一曰帝皇之正統二曰形相多異表三曰體文而知武四曰履信而好士若其徴符初育則靈光鑒于室隩嘉禾滋于邑壤其望舊廬有火光之異其渡呼沲有河合之應西門君惠先識其諱强華獻符千里同騐劉歆改名而隕其身王長錯封而見吉兆故王遵謂之天授非人力也傳幹王命論俱見後書嘉禾生懷帝初載嘉禾生于南昌望氣者又云豫章有天子氣及國家多難宗室迭興皆卒於傾覆而懐帝以豫章王登天位劉向之䜟云滅亡之後有少而水名者得之起事者據秦川西南乃得朋按愍帝盖秦王之子得位於長安長安秦地也西以南陽王為右丞相東以琅邪王為左丞相上諱業故改鄴為臨漳漳水名也由此推之亦有徴祥而皇極不建禍辱及身豈上帝臨我而貳其心將由人能𢎞道非道𢎞人者乎淳耀之烈未渝故大命重集于元帝晉紀論真人之應初秦始皇東巡濟江望氣者云五百年後江東有天子氣出於呉而金陵之地有王者之勢於是秦始皇乃改金陵曰秣陵鑿北山以絶其勢孫權之稱號自謂當之孫盛以為始皇逮于孫氏四百三十七載考其厯數猶為未及元帝之渡江也乃五百二十六年真人之應在於此矣晉紀湖開呉之未亡也呉郡臨平湖一旦自開湖邊得石函中有小青石刻作皇帝字舊言臨平湖塞天下亂開則天下太平呉人以為美祥俄而呉滅後元帝興於江左呉亡後蔣山上常有紫雲數術者亦云江東猶有帝王氣宋志元帝渡江望氣者云蔣山紫氣時時晨見庾闡揚都賦梓樹更榮松陽門内有大梓樹大四十五圍舉樹盡枯死永嘉中一旦忽更榮茂太興中元帝果繼大業豫章記瘣木薈蔚于豫章庾仲初楊都賦弊梓擢秀于祖邑宣帝祖為豫章太守故云祖邑郭璞南郊賦王廙為鄱陽太守有枯樟樹更生王敦表勸進中宗曰皓獸應瑞而來臻樟樹久枯而更榮臧榮緒晉書雀登鷄背中宗為丞相時有鷄雛者而雀飛集其背驅而復來如此再三占者云鷄者酉酉者金火雀變而來赴之即王踐阼之象也又云元帝時三雀共登一雄鷄皆三入安東㕔占者以為當進三爵為天子洞林記青氣出社武帝咸寧元年大風吹帝社樹折有青氣出社中占者以為東筦有天子氣時琅邪武王伷封東筦伷元帝祖也初武帝伐呉琅邪武王伷率衆出塗中而王渾逼歴陽王濬已次近路孫皓欲降送天子璽綬近越二將而逺送詣伷識者咸怪之宋志倒柳忽生康寧初為呉王成帝咸和六年五月曲阿有柳樹倒地六載是月忽復起生九年五月甲戌呉雄家有死榆樹是日因風雨起生與漢上林㫁桞起生同象于時雖改封琅邪而猶食吳郡為邑是帝超正體饗國之象也曲阿先亦吳地象見吳邑雄之舍皆天意也晉志僵栗起生孝武帝始四嵗時哀帝興寧三年五月廬陵西昌縣脩明家有僵栗樹是日忽復起生及得位嗣統識者竊曰西昌脩明之祥帝諱實應之矣是與漢宣帝同象也上神告玉璧晉安帝時冀州釋法稱將死告其弟子普嚴曰嵩山神告我江東有劉將軍漢家苗裔當受天命吾以璧三十二枚并鎮金一餅與之劉氏卜世之數也嚴告同學法義法義以義熙十三年于嵩廟石壇下得玉璧三十二枚三十二者二三十也宋有天下相承八帝享祚六十年廣古今五行記社樹重盛漢光武社於南陽漢末而其樹死劉𤣥徳有蜀乃應之而興及晉季年舊根始萌至宋武初而盛南史紀醉卧異形宋帝少時誕節嗜酒自京都還息於逆旅逆旅嫗曰室内有酒自入取之帝入室飲於盎側辭卧地時司徒王謐有門生居在丹徒還家亦至此逆旅逆旅嫗曰劉郎在室内可入共飲酒此門生入室驚出謂嫗曰室内那得此異物嫗遽入則見帝已覺矣嫗密問向何所見門生曰見有一物五采如蛟龍非劉郎門生還以白謐謐戒使勿言而與結厚宋志帝表貧嘗負刁逵社錢三萬經時無以還被逵執謐密以已錢代償由是得釋南史紀龍章武帝嘗游京口竹林寺獨卧講堂前上有五色龍章衆僧見之驚以白帝帝獨喜曰上人無妄言行止時見二小龍附翼樵漁山澤同侣或亦覩焉及貴龍形更大又經客下邳逆旅㑹一沙門謂帝曰江表當亂安之者其在君乎上乗龍逐日齊髙帝年十七時嘗夣乗青龍上天西行逐日又孫奉伯亦夢見帝乗龍上天於下捉龍脚不得及覺叙夢因謂曰兖州當大庇生靈而弟不得與也南紀天十九子参軍崔靈運夣天謂已蕭道成是我第十九子我去年已使授其天子位考自三皇五帝以降受命之次至帝為十九也上元徽四年帝為領軍從南郊望氣者陳安寶見太祖身上黄紫氣屬天安寶謂親人王洪範曰我少時未嘗見人身有如此氣也志九錫齊太祖在淮隂里城塹掘得古錫九枚下有篆書荀伯玉諸人皆不能識時紀僧貞獨言曰何須辨此乆逺之物錫而有九九錫之徴也帝喜而賞之談藪天墜王璽昇明三年四月二十四日榮陽郡人尹千於嵩山東南隅見天雨石墜地石開有玉璽在其中璽方三寸文曰戊丁之人與道俱肅然入草應天符掃平河洛清魏都又曰皇帝興千奉璽詣雍州上刺史蕭赤斧赤斧以獻南史紀異夢武帝諱願字宣逺小諱龍兒生於建康青溪宅其夜陳孝后劉昭后同夢龍據屋上故字上焉南齊紀年十三夢舉體生毛髮生至足又夢人指上所踐地曰周文王之田又夢虛空中飛又夢着孔雀羽衣廋温云雀爵位也又夢鳯皇從天飛下青溪宅齋前兩翅相去十餘丈翼下有紫雲氣及在襄陽夣着桑皮行度太極殿階廋温云屐者運應木也及在郢州夣人從天飛下頭插筆來畫上衣兩邊不言而去廋温釋云畫者山龍華蟲也志居室雲氣梁武帝生而有異光狀貎殊特日角龍顏重岳虎顴舌文八字項有浮光身映日無景兩骻駢骨項上隆起有文在右手曰武帝為兒時能蹈空而行及長所居室中常若雲氣人或遇者體輙肅然初為衛軍王儉一見深相器重謂何憲曰此蕭郎三十内當作侍中出此則貴不可言王融識鑒過人尤敬異帝謂所親曰宰制天下必在此人行經牛渚逢風入泊龍瀆有一老人謂帝曰君龍行虎步相不可言天下方亂安之者其在君乎問其名氏忽然不見南史紀六龍守柱初齊髙帝夢屐而登殿顧見武明二帝後一人手張天地圖而不識問之答曰順子後及崔慧景之逼長沙宣武王懿入援至越城夣乗馬飛半天而墜帝所馭化為赤龍騰虛獨上時臺内有宿衛士為覡常見太極殿有六龍各守一柱末忽失其二後見在宣武宅時宣武為益州覡乃往蜀伏事及宣武在郢此覡還都乃見六龍俱在帝所寢齋遂去郢之雍中途遇疾且死謂同侣曰蕭雍州必作天子具以前事語之上手文王字隋文帝為人龍顔額上有五柱入頂其光外射有文在手曰王周文帝見而歎曰此兒風骨不似世間人定州城門久閉不行齊文宣時或請開之以便行路文宣不許曰當有聖人來啟之及帝除揔管至而開之莫不驚異隋書唐興西京朝堂北頭有大槐樹隋曰唐興村門首文章移長安城將作太監髙熲常坐此樹下檢校後栽樹行不正欲去之帝曰髙熲坐此樹下不須殺之至今先天一百三十年其樹尚在柯葉森竦根株盤礴與諸樹不同承天門正當唐興村門首今唐家居焉朝野僉載武徳初大行山大聲曰唐國興理萬年太原事跡雜記天子氣隋末望氣者云龍門有天子氣連太原甚盛故煬帝置離宫數遊汾陽以厭之後髙祖起義兵汾陽遂有天下咸定錄阿婆隋煬帝與神堯俱是獨孤外家後因賜宴煬帝於衆中因戱神堯神堯髙額面皺帝目為阿婆面神堯忿恚怏悵歸語竇后竇后欣躍曰公封於唐阿婆乃是堂主堂者唐也神堯喜悦與秦齊諸王私相賀焉芝田錄空中言是天子唐髙祖仕隋為殿内少監時尚食奉御郭𢎞道善相言於髙祖曰公天中伏犀下接于眉此非人臣之相髙祖取𢎞道銀盆置地引弓射之謂曰向言有驗當一發中之既發應弦而中𢎞道曰願公事驗之日賞賜金盆髙祖大悦後為太原留守鎮并州時武士彠詰朝嘗於街内獨行聞空中有言曰唐公是天子士彠尋聲不見有人乃以白髙祖并進兵書髙祖悦之其夜士彠夢髙祖乗龍上天旦以狀聞髙祖大悦于是出入卧内委以心腹後起兵太原次臨汾去絳郡二十餘里有紫雲如華盖樓閣之形正臨髙祖之上石中靴迹武徳六年車騎將劉山濤上書言髙祖龍潜時數往來洛郊之莊曾踐二石靴迹見于石中至今猶在髙祖令鑿之深二寸餘其迹愈明乃止名在圖籙許世緒并州人見隋祚將亡言於髙祖曰天道輔徳人事與能臨機不發必貽後悔今隋政不綱天下鼎沸公姓當圖籙名應歌謡舊唐竇抗與髙祖少相親狎及楊𤣥感作亂髙祖統兵隴右抗言於髙祖曰𤣥感抑為發縱耳李氏有名圖籙可乗其便天之所啟也髙祖曰無為禍始何言之妄也上帝王之徴髙祖將舉義師西入長安夜夢忽身死墜于牀下為羣蛆所食及覺甚惡之乃詣智滿禪師而密話之滿即賀曰公得天下矣帝大驚謂滿曰何謂也滿曰人臣不敢直指天子故曰階下死是斃也墜牀是下也蛆趨附也羣蛆共所食者是億兆趨附至尊之象也甚吉又曰貧道為沙彌日嘗工易今敢為公占之及卦成曰得乾飛龍在天又是帝王之徴也帝至霍邑又夢甲馬無數飛滿空中帝問是何軍伍對曰是公身中之神也若無此何以威制天下言訖並飛入帝身帝覺召太宗言之復曰吾事濟矣太宗拜於前連呼萬嵗者數四帝復大悦其後即位即命復營其寺賜額為興義寺以太原帝舊宅産業並賜之永充常住今之寺内見有圖夢堂及塑師像並在洛中紀異服泰階羲寧二年五月甲子髙祖即位本宫曰甲水宫曰子支干相生成字為李雖子卯不舉而以是為戒此臣子所以服泰階也顧况髙祖造唐表命名髙祖之臨岐州太宗時年四嵗有書生自言善相謁髙祖曰公貴人也且有貴子見太宗曰龍鳯之姿天日之表年將二十必能濟世安民矣髙祖懼其言泄將殺之忽失所在因採濟世安民之義以為名焉舊唐成定録作太宗生之三日太宗為秦王髙祖有製詩云聖徳合皇天五宿連珠見和風拂世民上下同歡宴帝于宫西造宅初成髙祖送玉璽以至于帝所縉紳相謂曰詩及玉璽盖秦國之祥瑞者歟冊府龍飲池中太宗未建義時常飲酒醉卧劉文静家文静坐樓上見宅南大池中有白龍下飲水池中大魚皆躍上岸以百數良久乃隐家人共見極驚駭太宗睡覺謂文靜云醉中渴甚夢入公家池中飲水極清冷快意文靜視其體猶濕也寓簡紫雲屬天髙祖既舉義師之日太宗所居處有紫雲當其上俄變為五色狀如飛龍武徳八年拜中書令嘗夜於嘉徳門見神人長數丈素衣冠呼太宗曰我當令汝作天子太宗再拜忽不見所居𢎞義宫中有一大池常時有佳氣鬱鬱數百尺太宗心獨異之至九年其氣轉盛上屬于天六月定内難立為皇太子又有方士喬伏仁善言命見建成元吉俱有争心因謂所親曰秦王上應天籙當為元君此二人乃驅除耳息隱海陵之未發也太史奏云太白入南斗秦王得天下其鋒不敢當自非皇天眷顧何以得此冊府蝸迹成天睿宗初生含凉殿則天乃於殿内造佛氏有玉像焉及長閒觀其側玉像忽言爾後當為天子冊府為冀王時寢齋壁上蝸跡成天字上懼拭去之經數日如初及即位雕玉鑄黄金為蝸形分置於釋道像前酉陽雜爼墜樓無損𤣥宗始三嵗封楚王時則天因御髙樓抱之眺望誤墜于地左右失聲奔下扶擁帝怡然無虧損之狀則天甚竒之紫雲在上𤣥宗兼潞州别駕州境有黄龍白日昇天嘗出畋有紫雲在其上後從者望而得之前後符瑞凡一十九事所居宅外有水池浸溢頃餘望氣者以為龍氣四年四月中宗幸其第因遊其池結綵為樓船令巨象踏之舊唐潜龍變海池亦呈慶冊文赤龍據案𤣥宗臨潞州景龍二年四月十七日在㕔事假寐白鶴觀道士宋大辨等三十人同見赤龍據案潘炎賦十四上微時嘗至洛陽令崔日知具供膳尚未熟明皇因寢庭前一架藤花初開日知見巨蛇食藤花逡巡不見上覺曰機甚夢中食藤花甚美日知乃知他日啟聖之驗也逸史蓍立四年中宗將祀南郊來朝京師将行使術士韓禮筮之蓍一莖孑然獨立禮驚曰蓍立竒瑞非常之事也不可言舊唐將入朝有軍人韓凝禮自謂知兆上因以食箸試之既布卦一箸無故自起凡三偃三起觀者以為大吉徴國史纂異隋唐佳話凝禮曰大人之瑞也潘炎賦寢堂紫氣上還京後州内所居寢堂上有紫氣七日不散宅内及州街有大人迹長二尺五寸唐隆元年六月二十日夜除妖孽明日索崇嗣聞空中有人云臨淄王誅韋氏相王得天下玉海名應上所居里名隆慶時人語訛以隆為龍韋庶人稱制改元又為唐隆皆符御名上益自負舊唐開元二年八月太子賔客薛謙光獻東郡九鼎銘其豫州鼎銘武后所製文曰犧農首出軒昊應期唐虞繼踵湯禹乘時天下光宅域内雍熙上𤣥降祉方建隆基宰相姚崇盧懷慎等奏曰聖人啟運休兆必彰故化馬為龍預流謡頌秀為天子早著㝠符臣等今見薛謙光所獻東郡鼎銘大聖天后所製其文云上𤣥降祉方建隆基豫州處秦地之中所以逺包四海銘文獨聖后所製固必先感二儀靈慶昭彰曠絶今古臣等忝陪近侍喜萬常情請宣付史官并頌示内外許之冊府上黨天子氣開元八年鄭州人元承微上封事曰謹按魏典及北齊志後魏太平真君九年内學者奏言上黨有天子氣在壺闗大王山于時太武南巡親幸上黨掘大王山累石為三封又軒其北鳯皇山南足以㫁之大武之後百有餘年髙歡以内學之言復欲妄干符命因勒兵馬來在晉陽舍大王山六旬而去更有上黨百姓從在晉陽因名上黨之坊實曰晉陽之地歡有居此偽以應之論其僣竊則髙歡不比于孫權語以虛攘則太武有同于嬴政暗于時運豈不惜哉臣等㳟尋符命壺闗天子之氣正是陛下當焉𤣥穹上睠符命下鍾故使歴試潞州所以用當其應此天意也豈人事乎然而一幸潞州三移灰琯壺闗之地嵗時為蒐狩之塲大王之山朝夕即豫遊之所始而龍潜上黨尋乃鳯舉咸京内學之言果合符契又按内學所奏符應年曰太平真君太平則叶今辰真君則更明陛下自唐至魏三百餘年觸類而推無不僉應伏願陛下上承天命下諭人心昭告寰瀛編列國史從之氣成樓閣肅宗初為皇太子天寶十三載觀安祿山有悖逆之狀恐危宗廟遂精誠祈夢其夜夢故内侍普寂等二人舁一案覆以黄帕自天而下直至帝前素版丹書文字甚多既寤所記者惟四句曰厥不云乎惟其惟時上天所保福禄不虧十五載𤣥宗幸蜀留上在後宣諭百姓賊追至渭北便橋已斷水瀑漲無舟楫上號令水濱百姓歸者三千餘人渭水可涉又遇潼闗散卒誤以為賊與之戰士衆多傷乃收其餘衆北上軍既濟其後皆溺上喜以為天之佑時從上惟廣平建寧二王及四軍將士纔二千人自奉天而北夕次永夀百姓遮道獻牛酒有白雲起西北長數丈如樓閣之狀議者以為天子之氣自是紫雲擁帝所乗馬聚散不時至平凉郡路傍遇一伏兎命左右索弓箭因謂左右曰吾若破賊射則中之不然則否一發而斃左右咸稱萬嵗上初發平凉有彩雲浮空白鶴前引出軍之後有黄龍自上所憇屋騰空而去上行至豊寧南見黄河天塹之固欲整軍北渡以保豊寧忽大風飛沙跬步之間不辨人物及迴軍趨靈武風沙頓止天地廓清于後彭原郡受冊太上皇下誥曰間者日抱載赤雀白狼之瑞接武荐臻此皆皇帝聖敬之符孝友之感也冊府舊唐夢為虎趂武宗夢為虎所趂命京兆同華格虎以進至大中即屬虎南部新書光曜燭身宣宗初封光王十餘嵗時遇重疾沈綴忽有光輝燭身厥然而興正身拱揖如對臣寮乳媪以為心疾穆宗視之撫其背曰此吾家英物非心憊也賜以玉如意御馬金帶當夢乗龍昇天言之於鄭后乃曰此不宜人知者幸勿復言舊唐改名兆㑹昌末年武宗忽改御名為火下火及宣宗以光王龍飛于古文光字實從光焉噫先兆之明若是耶真陵十七事水變芳醪宣宗在藩時常從駕囘而誤墜馬人不之覺比二更方能興時天大雪四顧悄無人聲上寒甚㑹巡警者至大驚上曰我光王也不悟至此方困且渴若為我求水警者即于旁近得水以進遂委而去上良久起舉甌將飲顧甌中水盡為芳醪矣上喜獨自負舉一甌已而體微煖有力歩歸藩邸後遂即帝位上㧞暈懿宗初封鄆王藩邸時常經重疾郭淑妃侍醫藥見黄龍出入於卧内既間妃以異告帝曰慎勿復言宣宗制泰邊陲樂曲詞有海岳晏咸通之句又大中末京城小兒疊布漬水紐之向日謂之㧞暈帝果以鄆王即大位以咸通為年號舊唐神首煙騰晉髙祖在晉陽時牙城有僧坊曰崇福坊之㢘下西首隅有泥神神之首忽一日有煙生其騰郁如曲突之狀坊僧奔赴以為人火所延乃俯而視之無所有焉事尋達帝帝召僧之臘髙者問之僧曰貧道見莊宗將得天下曾有此烟觀其噴湧甚于當時可知矣冊府木中朱字梁開平二年使其將李思安改潞州營于壺闗伐木為柵破一大木中朱書文六字曰天十四載石進思安表上之其羣臣皆賀以為十四年必有逺夷貢寶者司天少監徐鴻獨謂其所親曰自古無一字為年號者上天符命豈缺文乎吾以丙申之嵗必當有石氏王此地者天字取四字中兩畫加之于傍則丙字也移四字外圍以十貫之即申字也後至丙申嵗晉髙祖以石姓起并州如鴻之言稽神錄又易云晉者進也冊府葭蘆如旗漢髙祖後為河東節度使天福十一年天下大火太原葭蘆茂盛最上一葉如旗狀皆南指焉明年遂即帝位虺出鼻間周太祖微時嘗晝寢有如小虺五色出入顴鼻之間在太原時有神尼同尼見太祖謂李瓊曰我宗天上大仙當為世界主瓊詰其故曰頂上有肉角也及為樞密時北征如澶淵旭旦日邊有紫光氣果當太祖馬首之上髙不及百尺從官異之至鄴都一夕在亭院齋忽有黄氣起於前繚繞而上遽際于天太祖於黄氣中仰見星文紫微文昌爛然在目駭曰予在室中而見天象不其異乎密告知星者乃拜賀曰坐見天衢物不能隔至貴之祥也異日又于署衙中有紫氣起于幡竿龍頭之上凡二日觀者異之及討李守真于河中守真登陴瞰陣氣色不懌獨言曰是何妖變後城中人言見太祖軍上有紫氣如樓閣車盖之狀故也蓍躍卓立世宗在民間嘗與商頡跌販貨至江陵有卜者王處士世宗因頡跌氏同往問焉方布卦忽有一蓍躍出卓然而立卜者大驚曰吾家筮法十餘世矣常記曾祖以來遺言凡卜筮而蓍自躍出者其人貴不可言况又卓立不倒得非為天下之主乎遽起再拜世宗雖佯為詰責而私心甚喜五代史補紫雲黄龍董遵誨父宗本仕漢為隋州刺史宋太祖微時客遊至漢東依宗本遵誨憑藉父勢嘗侮之一日謂太祖曰每見城上紫雲如盖又夢登高臺遇黑蛇約長百尺餘俄化龍飛騰東北去雷電隨之是何祥也太祖皆不對他日論兵戰事遵誨理多屈掘衣而起太祖乃辭宗本去自是紫雲漸散及即位一日便殿召見遵誨因諭之曰卿尚記往日紫雲及龍化之夣乎遵誨再拜呼萬嵗觸墜無傷太祖嘗試惡馬不施銜勒馬逸上城斜道額觸門楣墜地人以為首必碎太祖徐起更追馬騰上一無所傷又嘗與韓令坤博土室中雀鬬户外因競起掩雀而室隨壞宋史紀氷合靖康之變康王嘗質金人軍中及遣還康王奔相州召兵勤王因登郡圃飛仙亭視其牌額持弓矢而祝曰若中此牌則必聞京師音耗果三發三中左右動色相賀又語幕府曰夜來夢皇帝脱所御袍賜吾吾解舊衣而服所賜此何祥也頃時詔來命為大元帥速領兵入衛時王發兵相州使臣馳報黄河未凍衆失色王禱天地河神乃行至河側而河氷凍已合遂渡河時徽宗欽宗已北狩矣續夷堅志將子入宫顯仁后在北地未知髙宗即位嘗用象戯局子裏以黄羅書康王字貼於將上焚香禱曰令三十二子俱擲於局若康王字入九宫者王必得天位一擲其將子果入九宫他子皆不近后喜甚即具奏徽廟大喜復謂后曰瑞卜昭應異常可無慮矣揮塵錄掛閣屹立佛宇掛鐘之閣多虛其中宋孝宗㓜嵗時偶至秀州東塔寺登鐘樓游戯而僧徒先以蘧蒢覆空處上誤履其上遂併墜焉傍觀者失色亟視之乃屹立席上畧無怖容上先夕主山者夢金龍挂于鐘閣間翌日而見孝宗之事嘉興志莾操懿温事不錄閏位事别見后妃后天子之配謂之后后者君也天子之配至尊故謂后也后者何也明海内之小君也白虎通大倫自古受命帝王及繼體守文之君非獨内徳茂也盖亦有外戚之助焉故易基乾坤詩首闗睢書叙釐降春秋譏不親迎夫妻之際人道之大倫也史外戚侍君古者后夫人將侍君前息燭後舉燭至于房中釋朝服襲燕服然後入御史奏鷄鳴于階下然後夫人鳴佩玉于房中告去也然後應門擊柝告闢也然後少師奏質明于階下然後夫人入庭立君出朝書大傳彤管古者后夫人必有女史彤管之法后妃羣妾以禮御于君所女史書其日月授之以環以進退之生子月辰則以金環退之當御者以銀環進之著于左手既御著于右手左者陽也以當就男故著左手右手隂也既御而復故此女史之職也五經要義宣隂化周禮王者立后后正位宫闈同體天王夫人坐論婦禮九嬪掌教四徳世婦主喪祭賓客女御序于王之燕寢頒官分務各有典司女史彤管記功書過居有保阿之訓動有環佩之響進賢才以輔佐君子哀窈窕而不淫其色所以能述宣隂化脩成内則閠房肅雍隂謁不行也後漢理隂陽后妃正已以郊天祀地祗奉祖宗外以肅恭明神内以帥正九嬪理隂陽者猶天之有地陽之有隂後盧植奏事令淑古之王者必求令淑以對揚至徳恢王化於闗睢致淳風於麟趾及臻三季並亂兹緒義以情溺位由寵昏貴賤無章下陵上替興衰隆廢皆是物也晉漢春秋統六宫棧潜䟽曰在昔帝王之治天下不惟外輔亦有内助治亂所由盛衰從之是以聖哲慎立元妃必取先代世族之家擇其令淑以統六宫䖍奉宗廟隂教聿脩由内及外先王之令典也若因愛登后使賤人暴貴臣恐後世下陵上替開張非度亂自上起也魏志椒房皇后稱椒房詩云椒聊之實蔓衍盈升美其繁興以椒塗石亦取温煖除惡氣也猶天子赤泥殿上曰丹墀應劭漢官儀長樂宫有椒房殿黄圖上官桀父子並為將軍有椒房中宫之親霍光傳抑損椒房玉堂之盛寵谷永傳後宫則掖庭椒房后妃之室西都賦正位椒房並體宸極後紀椒庭綺觀淫糚怪飾宋后傳寶命方昌椒廷虚位南齊傳升蘭殿以正位踐椒庭而齊體北史椒掖之中舊制不願生太子元魏胡后傳椒掖播晨牝之風蘭殿絶河睢之響晉傳序簡文元帝出自儲藩妃並先爼不建椒閨梁后傳初踐椒宫逞梟心于長樂晉傳蘭殿長隂椒塗弛衛選椒宫御史臺記乗輦皇后媫妤乘輦餘皆以茵四人輿以行漢舊儀湯沐邑皇后太子各食三十縣曰湯沐邑上玉璽皇后玉璽文與帝同皇帝之璽金璃虎紐上皇后有金璽盤螭鈕文曰皇后之璽隋志六宮内宰以隂禮教六宫鄭𤣥曰六宫謂后也婦人稱寢曰宫后象王立六宮而居之亦正寢一燕寢五之六宫若今稱皇后為中宫矣周禮輔君徳夫后妃専夕配以徳升姬嬙并御進非色幸欲使情有覃被愛罔偏流專貞内表妖蠱外息至於降班在四簪珥成行同列者三環珮係響乃可以燮理隂教輔佐君徳宋書配皇極作配皇極齊體紫宸象玉牀之連後星喻金波之合義璧晉書璇宫少昊以金徳王母曰皇娥處璇宫而夜織或乗桴木而晝遊拾遺記唐媛昔在軒轅陶化正形刑于壺閤以臨百官煌煌后妃𤣥紞是閑穆穆夫人爰採潔繁闗睢首化萬國承流實有淑女允作好逑唐媛興媯文母成周徳音不囘𢎞濟大繇皇甫規女師箴古先哲王莫不明后妃之制順天地之徳故二妃嬪媯虞道克昌任姒配周周室用光魏收後魏書魏收書皇后傳亡此段見初學記因載之翼夏降暨三代創業之君亦賴賢妃用佐厥勲塗山翼夏有莘賛殷謝承三夫人箴三代興滅夏之興也以塗山而桀之放也用末喜殷之興也以有娀及有㜪而紂之滅也嬖妲己周之興也以姜嫄及太姒而幽王之禽也淫襃姒史漢稱號秦并天下多自驕大官備七國爵列八品後漢漢初因秦稱號帝母稱皇太后后稱皇后而加以美人良人八子七子之屬至孝武制媫妤之徒凡十四等降及乎晉母后之號皆因漢法自夫人以下世有增損焉梁書吕后遷園中元元年告祠高廟或曰吕太后不冝配食薄太后慈仁孝文皇帝賢明子孫賴福延至于今宜配食地祗髙廟今上薄太后尊號為髙皇后遷吕太后于園東觀觀記求故劍漢宣帝許后起㣲賤及帝即位大臣議立后皆心儀霍光女亦未有言上乃詔求㣲時故劔大臣知㫖遂白立許后字平君漢書沙麓兆祥元帝王皇后齊田氏之苗裔祖父翁孺自東平陵徙元城元城建公曰昔春秋沙鹿崩晉史卜之陽為隂雄土火相乗故沙鹿崩後六百四十五年宜有聖女興其田氏乎今翁孺之住正值其地日月當之元城郭東有五鹿之墟即沙鹿地後八十年當有貴女興天下翁孺生禁禁妻李氏方妊身夢月入其懷生女是為元后每許嫁未行所許者輒死卜相者云當大貴遂為元帝皇后生成帝宋書厯集周邦徽音克嗣氣淳漢國沙麓發祥宋書文帝路淑媛傳一清漢表靈曾沙應慶齊后哀冊白鷰銜石元后在家嘗有白鷰銜白石大如指墜后績筐中后取之石自剖為二其中有文曰母天地后乃合之遂復還合乃寶錄焉後為皇后常并置璽笥中謂為天璽也西京雜記辭輦孝成班偼伃居增成舍成帝遊於後庭嘗欲與偼伃同輦載偼伃辭曰觀古圖畫賢聖之君皆有名臣在側三代末主迺有嬖女今欲同輦得無近似之乎上善其言而止太后聞之喜曰古有樊姬今有班偼伃後趙后得幸偼伃退處東宫作賦以自傷云陳女圖以鏡監兮顧女史而問詩悲晨婦之作戒兮哀襃閻之為郵美皇英之女虞兮榮任姒之母周前漢色如紅玉趙飛鷰為皇后其女弟為昭儀在昭陽殿后體輕腰弱善行步進退昭儀不能及也但昭儀弱骨豊肌尤工笑語二人並色如紅玉為當時第一皆擅寵後宫西京雜記椒風哀帝寵愛董賢又召賢女弟以為昭儀位次皇后更名其舍為椒風以配椒房云前漢國廢投火平帝即位年九嵗成帝母太皇太后稱制王莽欲以女配帝以固其權太后意不欲也莽設變詐奏言皇帝即位三年長秋宫未建掖庭尉媵未充令人奏言其女漸漬徳化有窈窕之容宜承天序奉祭祀詔遣䇿告宗廟雜加卜筮皆曰兆遇金水王相卦遇父母得位所謂康强之占逢吉之符也便時迎入未央宫立為后嵗餘平帝崩立孺子嬰尊皇后為皇太后莽簒改皇太后為安定公太后太后時年十八矣為人腕瘱有節操自劉氏廢常稱疾不朝㑹莽敬憚傷哀欲嫁之乃更號為黄皇室主令立國將軍成新公孫建世子緣飾將毉往問疾后大怒笞鞭其旁侍御因發病不肯起莽遂不復彊也及漢兵誅莽燔燒未央宫后曰何面目以見漢家自投火中而死前漢率八妾明帝明徳馬皇后援之女也永平三年有司奏立長秋宫以率八妾上未有所言皇太后曰馬貴人徳冠後宫即其人也遂立為后東觀漢記先是數日夢有小飛蟲無數附着身又入皮膚中而後飛出既正位宫闈愈自謙肅本紀觀畫鄧后美於色厚於徳帝用嘉之嘗於觀畫過虞舜像見娥皇女英帝指之戯后曰恨不得如此為妃又前見陶唐之像后指堯曰嗟乎羣臣百僚恨不得為君如是帝顧而笑陳思王畫賛序日角偃月順帝順烈梁皇后名妠大將軍商之女永建三年與姑俱選入掖庭相工茅通見之驚賀曰此所謂日角偃月相之極貴也太史卜兆得夀房遂以為貴人常特被引御從容辭於帝曰願思雲雨之均澤識貫魚之次序帝加敬焉陽嘉元年有司奏立長秋宫紀帝貴人有寵者四人莫知所建議欲探籌以神定選胡廣等上疏曰詔以立后大事欲假之籌䇿决疑靈神恃神在筮既不必當賢就值其人猶非徳選夫岐嶷形於自然俔天必有異表宜参良家簡求有徳徳同以年年鈞以貎稽之典經斷之聖慮廣傳乗氏侯商元帝外戚春秋之義娶先大國梁小貴人宜配天祚正位坤極帝從之乃于夀安殿立貴人為皇后紀抵璽獻帝曺皇后名節操中女也操使華歆郗慮弑伏后明年立節為后魏簒漢遣使求璽綬后怒不與如此數輩后乃呼使者入親數讓之以璽抵軒下因涕泣横流曰天不祚爾左右皆莫能仰視後漢月下聚雪先主甘后體貎特異玉質柔肌態媚容冶先主召入綃帳中於户外望者如月下聚雪河南獻玉人髙三尺乃取玉人置后側晝則講説軍謀夜則擁后而玩玉后與玉人潔白齊潤觀者殆相亂惑拾遺記絳紗繫臂胡貴妃名芳奮女也晉武帝多簡良家子女以充内職自擇其美者以絳紗係臂芳既入選拜為貴嬪時帝多内寵平吳之後復納孫皓宫人數千自是掖庭殆將萬人而並寵者甚衆帝莫知所適常乗羊車恣其所之至便就寢宫人乃取竹葉插户以鹽汁灑地而引帝車然芳最蒙愛幸殆有專房之寵焉帝嘗與之摴蒱争矢遂傷上指帝怒曰此固將種也芳對曰北伐公孫西距諸葛非將種而何帝甚有慚色晉傳一夜齒生成恭杜皇后諱陵陽少有姿色然長猶無齒生有來求婚者輒中止及帝納采之日一夜齒盡生上羊為徘徊宋文帝潘淑妃者本以貎進始未見賞帝好乗羊車經諸房淑妃每莊飾褰帷以候并密令左右以鹹水灑地帝每至户羊輒䑛地不去帝曰羊乃為汝徘徊况於人乎於此愛傾後宫南史擬賦見意孝武殷淑妃南郡王義宣女也義宣敗後帝密取之寵冠後宫假姓殷氏及薨帝常思見之遂為通替棺欲見輒引替覩屍如此積日形色不異追贈貴妃上痛愛不已精神罔罔立别廟于都下時有巫者能見鬼説帝言貴妃可致帝大喜令召之有少頃果於帷中見形如平生帝欲與之言黙然不對將執手奄然便歇帝尤哽恨於是擬李夫人賦以見意焉止葬畢數與羣臣至殷墓謂劉徳願曰卿哭貴妃若悲當加厚賞徳願應聲便號慟撫膺擗踴涕泗交流上甚悦以為豫州刺史又令醫術人羊志哭殷氏志亦嗚咽他日有問志卿那得此副急涙志時新喪愛姬答曰我爾日自哭亡妾耳宋傳賦見始平王子鸞傳寢卧雲氣齊髙昭劉皇后諱智容夀之女也后母栢氏夢吞玉勝生后時有紫光滿室以告夀之夀之曰恨非是男栢笑曰雖女亦足興家矣后寢卧見有羽盖䕃其上家人試察之常見其上掩藹如似雲氣年十七裴方明為子求婚酬許已定后夢見先有迎車至猶如常家迎法后不肯去次又迎至龍旂豹尾有異於常后喜而從之既而與裴氏不成婚竟嬪于上南史傳景陽鐘聲武帝數逰幸諸苑囿載宫人從後車宫内深隱不聞端門鼓漏聲置鐘於景陽樓上宫人聞鐘聲早起裝飾至今此鐘唯應五鼓及三鼓也車駕數幸琅琊城宫人常從早發至湖北埭雞始鳴南齊傳故呼為雞鳴埭南史步生蓮花東昏侯所愛潘貴妃名玉兒帝大起芳藥諸殿又别為妃起神仙永夀玉夀三殿皆帀飾以金璧其玉夀中作飛仙帳四面繡綺窓間盡畫神仙又鑿金為蓮花以帖地令妃行其上曰此步步生蓮華也服御極選珍寶虎珀釧一隻直百七十萬南紀齊亡梁武帝見玉兒有國色將留之王茂曰亡齊者此人留之恐貽外議帝乃出之軍主田安啟求為婦玉兒泣曰昔嘗見遇時主今豈下匹非類死而後已義不受辱及見縊潔美如生輿出尉史俱行非禮傳四十五半面糚元帝徐妃諱昭佩妃無容質不見禮帝三二年一入房妃以帝眇一目每知帝將至必為半面糚以俟帝見則大怒而出妃性嗜酒多洪醉帝還房必吐衣中與荆州後堂瑶光寺智逺道人私通帝左右暨季江有姿容又與淫通季江每嘆曰栢直狗雖老猶能獵蕭漂陽馬雖老猶駿徐娘雖老猶尚多情時有賀徽者美色妃要之於普賢尼寺書白角枕為詩相贈答南史新聲陳後主張貴妃名麗華年十嵗為龔良婦給使後主見而悦之因得幸甚被寵遇後主於光昭殿前起臨春結綺望仙三閣極其瑰麗後主自居臨春閣張貴妃居結綺閣龔孔二貴妃居望仙閣並複道交相往來又以宫人袁大捨等為女學士每引賓客游宴則命諸貴人女學士與狎客共賦新詩采其尤豔麗者以為曲調被以新聲其曲有玉樹後庭花臨春樂等其畧云璧月夜夜滿瓊樹朝朝新大抵所歸皆美張貴妃孔貴嬪之容色也張貴妃嘗於閣上靚糚臨于軒檻宫中遥望飄若神仙後隋軍剋臺城貴妃與後主俱入井隋軍出之晉王廣命斬之於青溪中上鑄金元魏故事將立皇后必令手鑄金人以成為吉不成則不得立也後宫産子將為儲貳其母皆賜死道武劉氏鑄金人不成慕容氏成遂立之劉生明元道武末以舊法薨魏書天地母宣武靈皇后胡氏國珍女也母皇甫氏産后之日赤光四照京兆山北縣有趙胡者善於卜相國珍問之胡云賢女有大貴之表方為天地母生天地主勿過三人知也宣武聞其姿行召入掖庭為世婦生明帝後臨朝得志逼幸肆情武泰初爾朱榮稱兵沉之于河上楊白花楊華本名白花父大眼為魏明將華勇力容貎雄偉魏胡太后逼通之華懼及禍乃率其部曲來降胡太后追思之不能已為作楊白華歌辭使宫人晝夜連臂蹋足歌之辭甚悽惋焉梁傳其詞曰陽春二三月楊桞齊作花春風一夜入閨闥楊花飄蕩落南家含情出户脚無力拾得楊花淚沾臆秋去春還雙燕子願銜楊花入窠裏古樂府握槊北齊武成胡后其母盧道約女初懷孕有胡僧詣門曰此宅葫蘆中有月既而生后武成寵幸和士開每與后握槊因此與后奸通自武成崩後數出詣佛寺又與沙門曇獻通布金錢于獻席下又挂寶装胡牀于獻屋璧武成平生之所御也置百僧于内殿以獻為昭𤣥都統僧徒遥指太后以㺯獻乃至謂之為太上者北史續命後主馮淑妃名小憐大穆后從婢也穆后愛衰以五月五日進之號曰續命慧黠能彈琵琶工歌舞後主惑之坐則同席出則並馬願得生死一處命淑妃處隆基堂淑妃惡曺昭儀所常居也悉令反換其地周平齊後主至長安請周武帝乞淑妃帝曰朕視天下如脱屣一老嫗豈與公惜也仍以賜之及帝遇害以淑妃賜代王王甚嬖之禪代憤惋周宣帝楊后名麗華隋文帝女也初宣帝不豫詔隋文入禁中侍疾受遺輔政后初不豫謀及嗣立㓜冲后知有異國意頗不平及行禪代憤惋愈甚隋文内甚愧之開皇初封后為樂平公主後又議奪其志后誓不許乃止三女俱后後周獨孤信三女俱為后各生周隋唐一朝天子長生周武帝次生隋煬帝次生唐髙祖獨異志女則唐太宗文徳后長孫氏晟之女也嘗撰古婦人善事勒成十巻名曰女則自為之序又著論駮漢明徳馬皇后以為不能抑退外戚令其當朝貴盛乃戒其龍馬水車此乃開其禍源而防其末事耳唐書㓜擬楚辭太宗賢妃徐氏名惠生五月而能言四嵗誦論語毛詩八嵗好屬文其父孝徳試擬楚辭云山中不可以乆留詞甚典美自此徧渉經史手不釋巻太宗聞之納為才人其所屬文揮翰立成詞華綺贍上糚殿長安崇聖寺有賢妃糚殿太宗曾召妃久不至怒之因進詩曰朝來臨鏡臺糚罷暫徘徊千金始一笑一召詎能來傳載誕夕雉雊則天初誕之夕雌雉皆雊右手中指有黑毫左旋如黑子引之長尺餘酉陽雜俎配地象月髙宗廢王后韓瑗諫曰王者立后配天地象日月匹夫匹婦尚知相擇况天子乎唐書天子之與后猶日之與月隂之與陽相須而成者也昏義后妃者猶天之有地陽之有隂也盧植奏事氶祖廟母天地髙宗將以武氏為后來濟諫曰王者立后以承宗廟母天下宜擇禮義名家幽閒令淑者副四海之望稱神祗之意故文王興姒闗睢之化蒙被百姓其福如彼成帝從欲以婢為后皇統中微其禍如此陛下祥察之唐書花子掩痕天后每對宰臣令上官昭容坐于牀裙下記所奏事一日宰相李某對事昭容竊窺上覺退朝怒甚取小刀劄于面上不許㧞昭容遽為乞㧞刀子詩後為花子以掩㾗也北户錄秉機政昭容名婉兒西臺侍郎儀之孫父庭芝與儀死武后時母鄭方姙夢巨人畀大秤曰持此秤量天下昭容生踰月母戲曰秤量者豈爾耶輒啞然應後内秉機政符其夢云自通天以來内掌詔命中宗立進拜昭容帝引名孺賜宴賦詩婉兒常代帝及后長寧安樂二公主衆篇並作而來麗益新又差第羣臣所賦賜金爵故朝廷靡然成風當時屬辭太抵浮靡然皆有可觀昭容力也韋后之敗斬闕下唐詩紀事半臂易麫𤣥宗王皇后始以色進及上登位不數年恩寵日衰后憂畏不自安撫下有恩幸免䜛譛之危焉忽一日泣訴於上曰三郎獨不記阿忠脱新紫半臂更得一斗麫為三郎生日湯餅耶何忍不追念於前時上聞之戚然改容松窓雜錄阿忠后自呼其父名也異質楊妃廣西容州普寧縣雲陵里人父維母葉氏生妃有異質都部署楊康求為女時楊𤣥琰為長史又從康求為女攜至京進入夀王宫城西至今有楊妃井廣西志娘子開元初武惠妃特承寵遇故王后廢黜惠妃薨上悼惜久之後庭數千無可意者舊唐上心忽忽不樂使髙力士潜搜外宫得𤣥琰女于夀邸既笄矣度為女道士號太真冊韋詔訓女配夀邸太真髪鬢膩理纎穠中度舉止閑徳光彩煥發轉動照人上甚悦於鳯凰園冊為貴妃進見之日奏霓裳羽衣以導之定情之夕授金釵鈿合以固之上又自執麗水鎮庫紫磨金琢成步揺至糚閣親與插鬢上謂宫人曰朕得貴妃如得至寶也乃製曲子曰得寶子自是六宫無復進幸者宫中呼為娘子寶數實同皇后遺韈𤣥宗至馬嵬驛令髙力士縊貴妃於佛堂棃樹之前馬嵬媪得韈一隻過客求而翫之百錢一觀獲錢無數國史補香囊貴妃初瘞時以紫褥裹之肌膚已壞而香囊仍在内官以獻上皇視之悽惋乃令圖其形於别殿朝夕視之舊唐梅精梅妃姓江氏名采蘋開元中髙力士使閩越見其少麗選侍明皇大見寵幸性喜梅上以其所好戲名曰梅妃上與妃鬬茶顧諸王戲曰此梅精也吹白玉笛作驚鴻舞一座光輝鬬茶今又勝我矣後楊妃入侍遷於上陽東宫上在花蕚數㑹夷使至命封珍珠一斛密賜妃妃不受以詩付使者曰為我進御前也曰柳葉雙眉久不描殘妝和涙汚紅綃長門自是無梳洗何必珍珠慰寂寥上覽詩悵然不樂令樂府以新聲度之號一斛珠曲名始此也妃傳花見羞後唐明宗淑妃王氏邠州餅家子也有美色號花見羞少賣梁將劉鄩為侍兒鄩卒明宗納之本傳鬼神在前京兆李植字化光觀察使士衡之孫初為侍禁約婚曺彬女孫娶迎入門見鬼神千萬在前驚走踰牆避之曺即時還父母家俄而仁宗聘入宫郭后廢冊為皇后即慈聖光獻也玉銍黙記光獻在父母家時與羣女共為撚錢之戲而后一錢輒獨旋轉盤中凡三日方止陸游避暑謾抄待康宋髙宗吳皇后開封人父近嘗夢至一亭扁曰待康傍植芍藥獨放一花殊妍麗可愛花下白羊一近寤而異之后以乙未嵗生方產時紅光徹户外年十四髙宗為康王被選入宫人謂待康之徴宋史四星中宫天極星後有四星末大星正妃後三星後宫之屬也史煌煌四星著天垂矅赫赫后妃是則是效後漢傳幹皇后箴軒轅權軒轅黄龍體前大星女主象旁小星御者後宫屬漢書軒轅十二星後宫屬援神契軒轅龍體主后妃也石氏星讃壺政穆宣房樂韶理坤則順成星軒潤飾顔延年宋文后哀冊奉軒景以柔明發迹處椒風以婉孌升名謝莊殷妃謚策軒曜懷光素舒佇徳謝𤣥暉齊明后冊長秋後漢明帝永平三年有司奏立長秋宫注皇后所居宫也長者久也秋者萬物成熟之初也故以名焉請立皇后不敢指言故以宫稱之記秋宫亦遽軒景前虧南齊書配徳早終長秋曠位梁書將行秦官景帝更名大長秋應劭曰皇后卿也師古曰秋者收成之時長者桓久之義故以為皇后宫名前百官表貴相為后魏豹為魏王魏媪納薄姬于宫許負相曰當生天子豹心喜背漢後豹虜而薄輸織室生文帝前書劉焉入蜀有異志聞善相者言吳懿妹當大貴為子瑁納之先主定益州以為夫人蜀志太和初李錡反有相者言爾朱氏當生天子錡納為侍人錡誅沒入掖庭侍郭后憲宗幸之生宣宗唐書符彦卿女術者曰此天下母也李守真素有異志為子崇訓娶之據河中叛及城破用髙祖以歸彦卿世宗即位納為皇后五代史補鵲巢燈山謝皇后宰相深甫之孫后生而黧黑瞖一目太后擇配理宗未定㑹元夕有鵲巢燈山衆以為后妃之祥忽病疹膚蜕瑩白如玉及醫藥去目瞖太后曰此女端重有福帝厚遇之天正位天閨禮亢尊極而衰懕易兆恩宴難留天母虞潭武帝楊后配食議曰楊駿肆逆禍延天母晉書太子世子太子王世子云者唯王之貳也天子世子世天下也穀梁傳所以名之為世子何言欲其世世不絶也韓詩内傳春秋傳曰王世子㑹于首止晉有太子申生鄭有太子華齊有太子光則周制太子世子亦不定也漢制天子稱皇帝其嫡嗣稱皇太子諸侯王之嫡稱世子後代咸因之白虎通立嫡君在立太子者所以防簒殺壓臣子之亂也君薨適夫人無子有遺腹必待其産而立之何尊適重正也立子以貴不以長者塞愛憎也故春秋公羊傳曰立嫡以長不以賢立子以貴不以長也上前星心三星天位正位也中星曰明堂天子位也其前星太子也後星庶子也晉志國之上嗣古者元良觀象于天應前星之環極取法于地視少海之朝宗常兖表文昌着於前星環極由於守器周王褒箴蒼震發前星之輝黄離表重輪之瑞劉禹錫箋前星􅉼瑞采洊雷揚逺聲梁劉孝威詩少微少微星一名處士星儲君副主之宫荆州星占儲貳副天庭延三吏儲二謂太子一星在帝座張淵觀象賦東宫卞壼議曰太子所居宫稱東宫不謂之太宫者二宫以東西為稱明是天子之離宫使太子居之也文選注北齊議者引晉舊事太子在東宫西面為避尊位通典保傳不可不髙天下之選羊祐秉徳義克己復禮東宫少事養徳而已山濤啟事魏收按東宫舊事太子宴㑹多以西面為禮通典青宫東方外有東明山有宫焉左右有闕而立其髙百尺畫以五色青石為墻門每一門有銀榜以青石碧鏤題曰天地長男之宫神異經武后有青宫要記章懷有青宫要記舊唐志孫革奏青宫列屬䕶翼元良唐㑹要春宫元良繼體麗正離暉秋坊通梦春宫養徳周王褒箴穆宗爰自主鬯春宫齒胄國學韓退之表少陽聖人在後曰望羊苞懷至徳據少陽演孔圖正體毓徳于少陽注東宫少陽也鄭𤣥曰東郊少陽諸侯象也選武載陽兩實惟少陽梁王哀策正少陽之位主承桃之則梁簡文表洊雷居震春方應守器之禮明兩作離少陽纂重暉之業周王褒表姬周久長實係元良嬴秦短祚亦由少陽後周蕭圓肅箴天后撰少陽政範賜太子賢舊傳孟侯太子年十八曰孟侯孟侯者於四方諸侯來朝迎於郊者問其所不知也問人民之所好惡土地所生山川所有無及父在時皆知之尚書大傳鄭元注十八嚮入太學為成人博問庻事東序凡學世子及學士必時春夏學干戈秋冬學羽籥皆於東序禮記震維禮絶離景事尊養徳北宫賛業東序梁簡文表易稱明兩禮云上嗣東序養徳震方主器周書離景承宸樞光陪極毓問東華飛英上序宋謝莊表儀宸中宸天地交㑹之際也儀宸太子居也韻林榣山西北海之外有榣山其上有人號曰太子長琴顓頊生老童老童生祝融祝融生太子長琴是處榣山始作樂風山海經孝敬皇帝𢎞龍朔初命許敬宗上皇儀等於文思殿博採古今文集摘其英詞麗句以類相從勒成五百巻名曰榣山玉彩表上之舊唐裴光庭為𢎞文館學士造榣山徃則維城前軌二篇獻之明皇詔皇太子諸王於光順門見光庭謝所以規諷意唐書榣山盛風樂抽簡薦從謡虞世南從鑾輿詩嗜鮑魚文王使太公望傳太子發嗜鮑魚公不與曰鮑魚不登俎豈有非禮而可養太子哉賈傳新書鶴駕周靈王太子晉七月七日乗白鶴駐山巔謝時人而去後世稱太子之駕曰鶴駕禁曰鶴禁類聚漢宫闕疏曰白鶴太子所居之地凡人不得輒入故云鶴禁也白帖冢子晉侯使太子申生伐東山臯落氏里克諫曰太子奉冢祀社稷之粢盛以朝夕視君膳者也故曰冢子左閔二君行太子居以監國也君行太子從以撫軍也今君居太子行未有此也公曰寡人聞之立太子之道三身鈞以年年同以愛疑决之以卜筮子無謀吾父子之問晉語太子帥師公衣之偏衣佩之金玦將戰狐突諫曰不可昔辛伯諗周桓公内寵並后外寵二政嬖子配適大都耦國亂之本也周公弗從故及於難今亂本成矣立可必乎孝而安民子其圖之與其危身以速罪也左思賢苑漢文帝為太子立思賢苑以招賓客苑中有堂隍六所客館皆廣廡髙軒屛風幃褥甚麗西京雜記博望苑武帝年二十九乃得太子甚喜為立禖使東方朔枚臯作禖祝及冠就宫上為立博望苑使通賓客從其所好故多以異端進者前傳副主元帝以史丹舊臣皇考外屬親信之詔丹護太子家前傳輔助有力紀丹之輔道副主掩惡揚美傳㑹善意雖宿儒達士無以加焉賛龍樓門成帝初居桂宫上嘗急召太子出龍樓門不敢絶馳道西至直城得絶乃度還入作室門上遲之問其故以狀對上大説乃著令令太子得絶馳道云四重明帝為太子羣臣為之作歌詩四章以賛太子之徳一曰日重光二曰月重輪三曰星重輝四曰海重潤漢末其二章亡舊説云天子之徳光明如日規輪如月衆耀如星浩潤如海太子皆比徳焉故云重古今注𤣥圃七月七日皇太子㑹於𤣥圃園宣猷堂有令賦詩潘尼詩云置酒宣猷庭擊鐘靈沼濱霑恩洽明兩遭徳㑹陽春洛陽記云東宫之北曰𤣥圃園宣猷承華陸機太子宴元圃宣猷堂賦詩曰體輝重光承規景數茂徳淵沖天􅐾玉裕蕞爾小臣振纓承華匪願伊始惟命之嘉選太子宫在大宫東中有承華門洛陽記思媚皇儲髙步氶華陸機將僕儲皇奉轡承華潘岳坐氊着針杜錫字世嘏為太子中舍人屢諫愍懷太子言辭懇切太子患之後置針着錫常所坐處氊中刺之流血他日太子問錫向著何事錫對醉不知太子詰之曰君喜責人何自作過也晉書東朝東朝既建淑問峩峩陸機昔余與子繾綣東朝潘安仁帝體麗明儀辰作貳君彼東朝金昭玉粹顔延年詩東儲齊文惠太子長懋正位東儲善立名嘗疾篤上表曰地屬元良業微三善攝生舛和顧隂待謝守器難永視膳長違本傳正體東儲方樹年徳史臣文惠飬徳東朝同符作者爰造九言實該百行竟陵狀文惠以晉明帝為太子時立西池乃啟世祖引前例求東田起小苑上許之本傳東田反語為顛童文惠竟薨樂賢堂劉孝綽為太子僕掌東宫管記時昭明太子好士愛文孝綽與陳郡殷芸吳郡陸倕琅邪王筠鼓城到洽等同見賓禮太子起樂賢堂仍使先圖孝綽焉梁書氣逸風雲昭明光契生知晉安徳光天縱遨逰禮樂之囿馳騁仁義之塲洛濱之譽振古莫儔河曲之文於焉靡逮夏開方而且愧姬誦擬以多慙昆季八王連枝十俊并學窮百氏文統九流絢氣逸於風雲好詞光於日月辨正論進食去蒿邢峙為國子助教授太子經厨宰進太子食菜有邪蒿峙令止之曰此采有不正之名非殿下宜食文宣聞而嘉之北齊書雙龍符傳符之制太子監國給雙龍之符左右各十両左者進内右者付外唐六典直東宫劉洎上書曰太子宗祧是繫晁錯上書令通政術賈誼奏計務知禮教古者問安而退以廣敬也異宫而處以逺嫌也太宗勅洎與文本馬周遞日直東宫唐書減膳乾封初太子宏稀見宫臣典膳丞邢文偉减膳上啟曰竊見禮大戴記曰太子既冠成人免於保𫝊之嚴則有司過之史虧膳之宰史之義不得不書過不書則死之宰之義不得不徹膳不徹則死之近者以來談議不接謁見尚稀三朝之後但與内人獨處何由發輝聖智史雖闕官宰當奉職謹守禮經輒申减膳太子答曰觀尋來請良符宿志自非義均弼諧渠能進此藥石文偉由是益知名其年左史闕上曰邢文偉以吾兒不讀書不肯與肉此人甚正直遂拜焉唐書㑹要玉契崔神慶為庶子時突厥使入朝凖舊儀太子合預朝叅先降勅書崔神慶上疏曰伏以五品已上所以佩龜者比為别勅徴召恐有詐妄内出龜合然後應命况太子元良國本萬方所瞻古來徴召皆用玉契此誠重慎之極防萌之慮則天甚然之舊唐春禁梁晉安王上昭明太子𤣥圃講頌啟云殿下體髙𤣥賾養道春禁牢籠文圃渉獵羲河廣𢎞明集交㦸舊制太子食湯沐十縣設周衛交㦸五日一朝因坐東箱省視膳食其非朝日使僕中允旦旦請問而已明不喋黷廣其敬也後漢班彪傳初拜太子初拜有石山安車一建九旗青色四馬有眊幢一鹵簿有黄麾太子大小㑹庭設三箱樂舞六佾納妃四望車羽葆前後部鼓吹有織成衮帶白玉佩步揺一具九鈿凾盛之晉東宫舊事儲兩禇遂良疏曰周兩問安三至必退漢儲視膳五日乃來崔融表云周儲故事一日三至於寢門晉兩舊儀一月五朝於殿閣親王茅土王者封五色土為社則各割方色土與之更立社燾以黄土苴以白茅茅取其潔土取黄者覆被四方孔書注天子太社在朝之右以五方之土為之凡封王者受天子太社之土以所封之方色東方受青土他如其方色藉以白茅授之歸國以立社故謂之茅土獨㫁顯諸侯周王兼制天下立七十一國姬姓獨居五十三人周之子孫茍不狂惑者莫不為天下之顯諸侯荀君道脤膰太宗伯之職以脤膰之禮親兄弟之國以賀慶之禮親異姓之周禮春官削桐唐叔虞者成王弟也成王與叔虞戲削桐葉為珪以與叔虞曰以此封若史佚因請擇日立叔虞成王曰吾與之戲耳史佚曰天子無戲言言則史書之禮成之樂歌之於是遂封叔虞於唐史記後為晉故毛詩曰此晉也而謂之唐上慶表裁梧徳成觀梓上官儀冊殷王文門膺魯拜地冠虞封蘇頲冊汴王文蕃屛襄王伐鄭富辰諫曰昔周公弔二叔之不咸故封建親戚以蕃屛周管蔡郕霍魯衛毛𥅆郜雍曺滕畢原鄷郇文之昭也邘晉應韓武之穆也凡蔣邢茅胙祭周公之裔也召穆公思周徳之不類故糾合宗族于成周而作詩曰常棣之華鄂不韡韡凡今之人莫如兄弟其四章曰兄弟䦧于墻外禦其侮如是則兄弟雖有小忿不廢懿親今天子不忍小忿以棄鄭親其若之何周之有懿徳也猶曰莫如兄弟故封建之其懷柔天下也猶懼有外侮扞禦侮者莫如親親故以親屛周左僖二十四子魚曰武王克商成王定之選建明徳以藩屛周左定四珍玉孔子曰古者分同姓以珍玉所以展親親也分異姓以逺方之職貢所以無忘服也家語分魯公以夏后氏之璜左定四分寶玉于伯叔之國時庸展親旅􅋙夾輔展喜曰昔周公太公股肱周室夾輔成王成王勞之而賜之盟曰世世子孫無相害也載在盟府太師職之左僖一十六枝葉昭公將去羣公子樂豫曰不可公族公室之枝葉也若去之則本根無所庇廕矣葛藟猶能庇其本根况國君乎親之以徳皆股肱也誰敢攜貳若之何去之文公犬牙髙帝王子弟地犬牙相制所謂磐石之宗也前紀諸侯王自以骨肉至親先帝所以廣封連城犬牙相錯者為磐石宗也中山靖王勝傳周稱百代抑聞麟趾之美漢命六官亦樹犬牙之制唐彭王僅傳叶犬牙於漢制光麟趾於周詩陸扆棣王制好詩楚元王交髙祖少弟也好書多材藝少時嘗與魯穆生白公申公俱受詩於浮丘伯元王好詩諸子皆讀詩申公始為詩傳號魯詩元王亦次之詩傳號曰元王詩王敬禮申公等穆生不嗜酒元王每置酒常為穆生設醴及王戊即位常設後忘設焉穆生退曰可以逝矣醴酒不設王之意怠不去楚人將鉗我於市遂謝病去上千里駒魯王少時數言事召見甘泉宫武帝謂之千里駒前傳事文類聚以千里駒入河間王事内盖同名之誤平臺梁孝王文帝子也築東苑方三百餘里廣睢陽城七十里大治宫室為複道自宫連屬於平臺三十餘里前傳孝王與鄒枚司馬相如之徒遊於平臺之上齊隨郡王子隆居序云西園多士平臺盛賔鄒馬之客咸在伐木之歌屢陳是用追芳昔娱神逰千古水經注兎園孝王好營宫室苑囿之樂作矅華宫築兎園園中有百靈山有膚寸石落猿巖栖龍岫又有鴈池池問有鶴洲鳬渚其諸宫觀相連延亘數十里竒果異樹珎禽恠獸畢有王日與宫人賓客弋釣其中三輔黄圖忘憂館孝王逰於忘憂之館集諸逰士各使為賦韓安國作几賦不成鄒陽代作鄒陽安國罰酒三升賜枚乗路喬如絹人五匹西京雜記宗英河間獻王徳修學好古實事求是從民得善書必為好冩與之留其真加金帛賜以招之所得尚書周官儀禮禮記其學舉六藝脩禮樂被服儒術造次必於儒者山東諸儒者從而遊武帝時獻王來朝獻禮樂對三雍宫前傳景十三王河間賢明禮樂是脩為漢宗英上夫唯大雅卓爾不羣河間獻王近之矣賛閑詩西楚好禮北河沈約為晉安王謝章好禮慙河敦詩愧楚為安樂王謝章日華宫河間王築日華宫置客館二十餘區以待學士自奉養不踰賓客西京雜記為善最樂東平王蒼光武子也好經書美須髯腰帶十圍永平中朝京師還國明帝手詔國中傳曰辭别之後瞻望永懷誦及采菽以增歎息日者問東平處家何等最樂王言為善最樂其言甚大副是要腹矣又上光武受命中興頌帝甚善之以其文典雅特令賈逵為之䚯詁本傳法琳上秦王啟云殿下好善為樂邁彼東平温易是歡更方西楚廣𢎞明十一晉鄭佐周功宣於寅亮間平輔漢業崇于藩屛唐荆王元景冊善書北海敬王睦齊王縯孫也少好學博通書傳能屬文又善史書當世以為楷則及寢病帝驛馬令作草書尺牘十首後漢西園曺子建公讌詩云公子敬愛客終宴不知疲清夜游西園飛盖相追隨明月澄清景列宿正參差秋蘭被長坂朱華冒綠池隋于仲文答譙王詩未陪東閣賞獨詠西園篇禇亮和望月應魏王教詩所欣東館裏預奉西園篇上官儀詔册周王文西園孤月秀心鏡而齊明小山叢桂偃情由而並烈引曠獨秀齊豫章王嶷在宋時嘗詣袁粲粲謂人曰後來佳器也建元中頗有代嫡之意而嶷事世祖恭悌盡禮未嘗違忤顏色故世祖友愛亦深及薨武帝哀痛特至敕王融為銘云半岳摧峯中河墜月帝流涕曰此正吾所欲言也羣吏中樂藹劉繪與竟陵王子良牋欲率僚吏立碑藹又與沈約書請文刻石約答曰丞相風道引曠獨秀生民冠冕彛倫儀刑㝢内自非一世辭宗難或與此歘酧令㫖便是以禮許人南史齊書儒林館清河王懌親王中最有名行第宅豊大於髙陽西北有樓出凌雲臺目極京師樓下有儒林館退賓堂土山釣臺冠於當世叙峯入牖曲沼環堂樹響飛嚶堦叢花藥懌愛賓客重文藻至於清晨明景眺望南臺芳醴盈􅀢佳賓滿席使梁王愧兎園之遊陳思慙雀臺之燕伽藍記登僊臨淮王彧博通典籍辨慧清恬性愛林泉又重賓客至於春風扇揚花樹如錦晨食南館夜遊後園俊民滿席羽觴流行詩賦並陳清言乍起莫不飲其𤣥奥忘其偏恡焉是以入彧室者謂登僊也上撰書彭城王勰字彦和敏而耽學雅好屬文既無山水之適又絶知己之逰敦尚文史物務之暇披覽不輟撰自古帝王賢達及魏世子孫為三十巻名曰要畧魏書書史宗室領袖任城王澄少而好學文明太后引見誡屬之顧謂李冲曰此兒風神吐發徳音閑婉當為宗室領袖后為中書令蕭賾使庾蓽來朝見澄音韻遒雅風儀秀逸謂主客郎張彛曰往魏任城以武著稱今魏任城乃以文見美也本傳文宣貞固俊逺鬱為宗傑社稷是任其棟梁之望也史臣俊悟樂梁王蕭大圜簡文子也㓜而聰敏神情俊悟元帝嘗自問五經要事數十條大圜辭約指明應答無滯元帝甚歎美之因曰昔河間好學爾既有之臨淄好文爾亦兼之然有東平為善彌髙前載吾重之愛之爾當效焉周書梁書南史俱不載無長霍王元軌髙祖子也太宗嘗問羣臣曰朕子弟孰賢魏徴對曰臣愚闇不盡知其能唯吳王數與臣言未嘗不自失上曰卿以為前代誰比徴曰經學文雅亦漢之東平也後在徐州唯與處士劉𤣥平為布衣之交人或問𤣥平王之長𤣥平答曰無長問者怪而復問之𤣥平曰夫人有短所以見其長至於霍王無所不備吾何以稱之哉舊唐朱邸朱邸方開效蓬心於秋實謝眺牋分以白茅錫其朱邸陸扆棣王制公主公主天子嫁女于諸侯必使諸侯同姓者主之諸侯嫁女于大夫必使大夫同姓者主之公羊莊元天子不親主婚故謂之公主諸王即自主婚故其女曰翁主翁者父也言父主其婚也亦曰王主言王自主其婚也漢書注劉攽曰公主之稱本出秦舊男為公子女為公主古者大夫妻稱主故以公配之若謂同姓主之故謂之公主古之嫁女當如周使大夫主之何不謂之夫主乎然則謂之王主者猶言王子也謂之翁主者緣公而生耳初學記云至周中葉天子女始謂之公主秦代因之豈因公羊傳云然耶未詳所據尚主非古尚主之制非古也釐降二女陶唐之典歸妹元吉帝乙之訓王姬歸齊宗周之禮以隂乗陽違天以婦陵夫違人違天不祥違人不義後漢女亂漢家列侯尚公主諸侯則國人承翁主使男事女夫詘於婦逆隂陽之位故多士亂前王吉傳平陽武帝衛后字子夫為平陽主謳者帝祓霸上還過平陽主因見所偫美人既飲謳者進帝獨説子夫帝起更衣子夫侍尚衣軒中得幸還坐驩甚賜平陽主金千斤主因奏子夫送人宫子夫上車主拊其背曰行矣強飯勉之即貴願無相忘前傳昇仙遺履公主山在華山中漢末王莾秉政南陽公主避莽亂於此峯學道後得昇仙至今嶺上有一隻朱履傳云公主既於山中得道駙馬王咸聞追之不及故留一履以示之潘安仁有公主峯記述異記奪沁水園竇憲字伯度恃宫掖聲埶遂以賤直侵奪沁水公主園田主畏逼不敢計後章帝駕出過園指以問憲憲隂喝不得對後發覺帝大怒切責憲曰何用愈趙髙指鹿為馬貴主園尚見枉奪何况小人哉後漢歌舞平陽第園亭沁水林李適詩平陽館外有仙家沁水園中好物華李乂詩望鄉館晉永嘉亂既已渡江諸公主不得隨去安陽公主平城公主奔入兩河界悉為民家妻常怏怏不悦有故鄉之思村民感之共築一臺以居之謂之公主望鄉之館至今巋然王朗懷舊賦云將軍出塞之臺公主望鄉之館述異記義陽神晉惠末羣盗蜂起義陽公主自洛中出奔至洛南士卒二千餘人留守不去以衛京都劉曜攻破之主有殊色矅特逼之主手刃矅不中遂自刃曜竒其正節遣葬之立義陽公主祠民憐之為立廟今義陽神是也按晉書都不載此三公主事豈任昉獨見晉别史耶置面首宋山隂公主孝武女也適何戢景和中滛恣過度謂帝曰妾與階下雖男女有殊俱託體先帝陛下六宫萬數而妾唯駙馬一人事不均平一何至此帝乃為主置面首左右三十人帝每出與朝臣常共陪輦主以吏部禇淵貎美就帝請以自侍帝許之宋紀帝召彦囘西上閣宿十日公主夜就之備見逼廹彦囘整身而立從夕至曉不為移志公主謂曰君鬚髯如㦸何無丈夫意彦囘曰囘雖不敏何敢首為亂階禇傳彦囘終不肯從與戢同居止凡月餘由是特申情好戢傳山隂名楚王天姻宋世諸主莫不嚴妬明帝每嫉之江斆當尚孝武女上乃使人為斆作表讓婚曰伏承詔㫖嘗以臨海公主降嬪顇門寒族本隔天姻顧審輶蔽伏用憂惶雖門泰宗榮於臣非幸自晉氏以來配尚王姬者雖累經美胄亟有名才至如王敦懾氣桓温歛威貞長佯愚以求免子敬炙足以違詔王偃無仲都之質而倮露於北階何瑀闕龍工之姿而投軀於深井謝莊殆自同於矇叟殷沖㡬不免於疆鉏王藻雖復疆狠頗經學涉戲笑之事遂為寃魂禇曖憂憤用致夭絶傷理害義難以具聞是以仰冒非宜披露丹實非唯止陳一已規全身願實乃廣申諸門憂患之切帝以此表遍諭諸主以諷切之并為戲笑南史王誕傳險虐武帝與殷叡故舊以女永興公主妻其子鈞自宋齊以來公主多驕滛無行永興主加以險虐鈞形貎短小為主所憎每被召入先滿壁為殷叡字鈞輒流涕以出主命婢束而反之鈞不勝怒而言於帝帝以犀如意擊立碎於背然猶恨鈞南史稱下官豫章歸魏明帝拜綜太尉封丹陽王又尚帝女夀陽公主公主字莒犂客色美麗綜甚敬之與公主語常自稱下官及京師傾覆綜棄州北走時爾朱世隆專權遣取公主至洛陽世隆逼之公主罵曰逆賊敢辱天王女乎世隆怒遂縊殺之伽藍記娘子軍髙祖女平陽公主歸柴氏舉義兵於司竹園號娘子軍即柴紹之妻也南部新書毁垣太平公主武后所生后愛之傾諸女弟擇薛紹尚之假萬年縣為婚館門隘不能容翟車有司毁垣以入自興安門設燎相屬道樾為枯當時羣臣劉禕之詩云夢梓光青陛穠桃藹紫宮元萬頃云離元應春夕帝子降秋期任奉古云帝子升青陛王姬降紫宸郭正一云桂宫初服冕蘭掖早升笄皆納妃出降之意也文館記光艶安樂公主中宗季女也下嫁武崇訓光艶動天下新唐附㑹韋氏熱可炙手道路懼焉萬迴望見車騎連唾曰血腥血腥不可近也不乆而夷㓕矣南部觀拜蕭嵩子衡尚永昌公主嵩夫人賀氏入觀拜席𤣥宗呼為親家母禮儀甚盛舊唐觀戲鄭顥尚宣宗女萬夀公主詔公主執婦禮皆如臣庶之法茍違吾戒必有太平安樂之禍顥弟顗嘗得危疾上遣使問之還問公主何在曰在慈恩寺觀戲塲上怒嘆曰我怪士夫家不欲與我家為昏良有以也亟命召主入宫責之曰豈有小郎病不往省視乃觀戲乎遣歸鄭氏由是責戚皆競競守禮法如東山衣冠之族通鑑折筯宣宗選于琮尚永福公主事忽中寢丞相上請聖㫖上曰此女子近因與之㑹食對朕輒折匕筯性情如此恐不可為士夫妻許别尚廣徳公主東觀奏記進食千盤成徳軍節度使王元逵自領藩垣頗革父風職貢結轍於道文宗詔尚夀安主公新史絳王悟女元逵遣叚氏姑詣闕納娉禮叚氏進食二千盤并御衣戰馬公主糚奩及私白身女口等其從如雲朝野榮之舊唐合壁事類以千盤字為進食于牙盤大誤觀者粉侯宋世以駙馬都尉為粉侯文及甫抵書邢恕謂駙馬韓嘉彦兄忠彦為粉兄劉摰傳明經俊才漢結叔髙晉姻武子禇淵碑叔髙以明經顯於漢武子以俊才聞於晉天中記巻十二
