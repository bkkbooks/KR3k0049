body:
  text: 中記卷二十六明陳耀文撰言語言語直言曰言論難曰語説文言宣也宣彼此之意也語叙也叙己所欲説也釋名心聲捈中心之所欲通諸人之所發者矣如言故言心聲也揚問神四術言有四術言敬以莊朝廷之言也文言有序祭祀之言也并氣折聲軍旅之言也言若不足喪紀之言也賈誼新書善言與人善言煖於布帛傷人之言深於矛㦸荀榮辱故贈人以言重於金石珠玉觀人以言美於黼黻文章聽人之言樂於鐘鼔琴瑟非相身之文晉侯賞從亡者介之推不言祿祿亦弗及推曰獻公之子九人唯君在矣天實置之而二三子以為己力不亦誣乎竊人之財猶謂之盜況貪天之功以為己力乎難與處矣其母曰盍亦求之以死誰懟對曰尤而效之罪又甚焉且出怨言不食其食其母曰亦使知之若何對曰言身之文也身將隠焉用文之是求顯也其母曰能如是乎與女偕隠僖二十四慎辭鄭伐陳入之使子産獻捷于晉晉人曰何故侵小對曰先王之命惟罪所在各致其辟且昔天子一圻列國一同自是以衰周之制也今大國多數圻矣若無侵小何以至焉晉人曰其辭順家語仲尼曰志有之言以足志文以足言不言誰知其志言之無文行而不逺晉為伯鄭入陳非文辭不為功慎辭哉襄二十五釋辭子産相鄭伯以如晉晉侯見鄭伯有加禮厚其宴好而歸之叔向曰辭之不可以已也如是夫子産有辭諸侯賴之若之何其釋辭也詩曰辭之輯矣民之懌矣辭之繹矣民之莫矣其知之矣三十一利溥景公繁于刑晏子言踊貴屨賤景公為是省于刑君子曰仁人之言其利溥哉晏子一言而齊侯省刑昭三一言而善昔叔向適鄭鬷蔑惡欲觀叔向從使之收器者而往立於堂下一言而善叔向飲酒聞之曰必鬷明也下執其手以上今子少不颺子若無言吾幾失子矣言之不可以已也如是遂如故知昭二十八九言鄭子太叔卒晉趙簡子為之臨甚哀曰黄父之㑹夫子語我九言曰無始亂無怙富無恃寵無違同無敖禮無驕能無復怒無謀非徳無犯非義定四送言孔子適周問禮於老子老子曰子所言者其人與骨皆已朽矣獨其言在耳今本無此三句辭去而老子送之曰吾聞富貴者送人以財仁人者送人以言吾不能富貴竊仁人之號送子以言曰聰明深察而近於死者好議人之非也博辨宏達而危其身者發人之惡者也為人子者無以有己為人臣者毋以有己史記家語無以有己為人子者無以惡己為人臣者衣韋林既衣韋而朝齊景公景公曰君子之服也小人之服也林既作色曰夫服何足以端士行乎昔荆為長劍危冠令尹子西出焉齊短衣而遂偞之冠管仲隰朋出焉越文身鬋髮范蠡大夫種出焉西戎左衽而椎結由余亦出焉即如君言衣狗裘者當犬吠衣羊裘者當羊鳴且君衣狐裘而朝意者得無為變乎景公曰子真為勇悍矣説苑正言趙良見商君商君請得交於良良曰僕請終日正言而無誅可乎商君曰語有之矣貌言華也至言實也苦言藥也甘言疾也夫子果肯終日正言鞅之藥也鞅將事子史記下説窟中蘇秦初與張儀俱習從横之術于鬼谷先生十一年皆通六藝百家之言鬼谷先生弟子五百餘人為作土窟窖深二丈先生曰有能獨下説窟中令我泣出者則能分人主之地矣久之蘇秦下説窟中鬼谷先生泣下沾襟張儀繼下説窖中鬼谷先生泣亦沾襟曰蘇秦辭説與張儀一體也上見御覽論衡同立談奪地邯鄲之北有蘇大侯者蘇秦往説之大侯送以黄金百鎰其家丞諌曰君侯之與客無故舊而送之百金其説可得聞耶蘇大侯曰客天下辨士也立談之間再奪吾地而復歸之吾地雖小豈直百金耶典畧戒子東方朔將仙戒其子曰明者處世莫尚於中庸優哉游哉與道相從首陽為拙柱下為工飽食安步以仕代農依隠玩世詭時不逢本集聽者竦然樓護字君卿為人短小精辯論議常依名節聽之者竦然與谷永俱為五侯上客長安號曰谷子雲之筆札樓君卿之脣舌言其見信用也漢書如流郭宏為上計吏朝廷問宏潁川風俗所尚土地所出及先賢將相儒林文學之士宏援經以對陳事荅問出言如浮引議如流後漢郡名非實明帝問張重曰日南郡人應向北看日重曰臣聞鴈門郡不見壘鴈為門金城郡不見積金為城雲中郡不見中天而居東海郡不見宫室在於水中臣雖居日南未嘗向北看日東觀記交川名士𫝊互見日部如雲浚儀符融幅巾奮褏談詞如雲李膺毎捧手歎息上如雲者奔踊而出也注嘘枯孔公緒伷清談髙論嘘枯吹生後鄭太𫝊辨出問表袁紹總兵冀州遣使要鄭𤣥大㑹賓客𤣥辨對咸出問表時汝南應劭亦歸于紹因自賛曰故太山太守應仲逺北面稱弟子何如𤣥笑曰仲尼之門考以四科回賜之徒不稱官閥劭有慙色𤣥𫝊荅問袁次陽妻者扶風馬季長之女也下車禮畢隗問曰為婦之道貞順而已何輜軿僮婢數十黼黻𤣥黄珠璣之飾耶夫人荅曰女有三從之義在家係於父母情愛無已欲其豐麗故不敢逆命今君欲擬鮑子都之風不受婦家之送此乃清髙異行也妾亦欲察君志悉還所有以成君之髙不亦可乎隗又問曰弟先兄舉猶以為鄙髙士不為也賢姊未嫁而新婦先行有何汲汲乎荅曰家姊有宋伯姬之風梁髙之行節操槩於青雲貞介皦於白日家君效尭之配舜孔子妻公冶長之義世乏此賢故躊躇妾固陋不才遭人則可隗嘿然悵恨外聽者曰使君努力如何為婦所困列女𫝊隗又問曰南郡君學窮道奥文為辭宗而所任之職輒以貨財為損何邪對曰孔子大聖不免武叔之毁子路至賢猶有伯寮之愬家君獲此固其宜耳後列女蜀俗張裔為雍闓縛送于吳鄧芝使吳孔明令芝言次可從權請裔裔臨發權乃引見問裔曰蜀卓氏寡女亡奔司馬相如貴土風俗何以乃爾乎裔對曰愚以為卓氏之寡女猶賢于買臣之妻權又問裔曰君還必用事西朝終不作田父於閭里也將何以報我裔對曰裔負罪而歸將委命有司若蒙僥倖得全首領五十八以前父母之年也自此以後大王之賜也權意笑歡悦有器裔之色裔出閣深悔不能陽愚即便就船權果追之不及蜀志受兵鄧芝自江州還來朝謂宗預曰禮六十不服戎而卿甫受兵何也預荅曰卿七十不還兵我六十何為不受耶時預為屯騎尉芝為車騎將軍不效書生吳趙咨字伯度使魏魏主丕嘲咨曰吳王頗知學乎咨曰吳王浮江萬艘帶甲百萬任賢使能志存經畧雖有餘閒博覽經𫝊歴史籍采竒異不效書生尋章摘句而已丕曰吳可征不對曰大國有征伐之兵小國有備禦之固丕曰吳難魏乎對曰帶甲百萬江漢為池何難之有丕曰吳如大夫者幾人對曰聰明特達者八九十人如臣之比車載斗量不可勝數吳志衛故主吳平後晉侍中庾峻等問皓侍中李仁曰聞吳主披人面刖人足有諸乎仁曰以告者過也君子惡居下流天下之惡皆歸焉盖此事也若信有之亦不足為怪昔唐虞五刑三代七辟肉刑之制未為酷虐皓為一國之主秉殺生之柄罪人陷法加之以懲何足多罪夫受尭誅者不能無怨受桀賞者不能無慕此人情也又問曰云歸命侯乃惡人横睛逆視皆鑿其眼有諸乎仁曰亦無此事𫝊之者􅍝耳曲禮曰視天子由袷以下視諸侯由頥以下視大夫由衡視士由平面得游目五步之内視士於衡則傲下於帶則憂旁則邪以禮視瞻髙下不可不慎況人君乎哉視人君相迂是乃禮所謂傲慢傲慢則無禮無禮則不臣不臣則犯罪犯罪則陷不測矣正使有之將有何失吳志注竒人陸遜聞車浚令名請與相見謂曰早欽風彩何乃龍蟠鳳峙不肯降顧邪荅曰誠知公侯敦公旦之博納同尼父之善誘然蜥蜴不能假重雲以升舉鷃雀不能從激風以飛揚是以無因爾時坐上賓客多是吳人皆相顧謂曰武陵蠻夷郡乃有此竒人也浚曰吳泰伯端委之化以改被髮文身之俗今乃上挺聖主下生賢佐亦何常之有遜歎曰國其昌也乃有斯人劉氏小説問識嵇中散語趙景貞瞳子白黒分明卿有白起之風恨量小狹趙云尺表能審璣衡之度寸管能測往復之氣何必在大但問識何如耳世説得一晉武帝始登阼探䇿得一王者世數繫此多少帝既不説羣臣失色莫能有言者侍中裴楷進曰臣聞天得一以清地得一以寧侯王得一以為天下貞帝説羣臣歎服異才蔡洪赴洛洛中人問曰幕府初開羣公辟命求英竒於仄陋采賢儁於巖穴君呉楚之士亡國之餘有何異才而應斯舉蔡荅曰夜光之珠不必出於孟津之河盈握之璧不闕之山大禹生於東夷文王生於西羌聖賢所出闕伐紂遷頑民於洛邑得無諸君是其苗裔乎世説戲樂諸名士共至洛水戲還樂令問于夷甫曰今日戲樂乎王曰裴僕射善談名理混混有雅致張茂先論史漢靡靡可聽我與王安豐説延陵子房亦超超𤣥箸上竹林七賢論及語林作王濟云九牛毛或謂華譚曰諺言人之相去如九牛毛寧有此理乎譚曰昔許由巢父讓天子之貴市道小人争半錢之利此之相去何異九牛毛也聞者稱善晉書言談林藪裴頠字逸民𢎞雅有逺識周弼見而歎曰頠若武庫五兵縱横一時之傑也樂廣嘗與頠清言欲以理服之而頠辭論豐博廣笑而不荅時人謂頠為言談之林藪上崔陳崔正熊詣都郡都郡將姓陳問正熊君去崔杼幾世荅曰民去崔杼如明府之去陳恒玉振衛价少有名理善易老自抱羸疾初不于外擅相酧對時友歎曰衛君不言言必入真琅琊王平子澄髙氣不羣邁世獨傲每聞玠之語議至于理㑹之間要妙之際輒絶倒於坐前後三聞為之三倒時人遂曰衛君談道平子三倒价别𫝊王敦為大將軍鎮豫章玠避亂從洛投敦至武昌見敦敦與之談論彌日信宿敦顧謂僚屬謝鯤曰昔王輔嗣吐金聲於中朝此子今復玉振於江表㣲言之緒絶而復續不悟未嘉之中復聞正始之音阿平若在當復絶倒上此云阿平即前所云平子也晉書云何平叔若在當復絶倒按何劭王弼𫝊云弼字輔嗣何晏為吏部尚書甚竒弼歎之曰仲尼稱後生可畏若斯人者可與言天人之際乎正始中黄門侍郎累缺晏議用弼丁謐沮之以弼補臺郎與曹爽論道移時無所他及爽以此嗤之並無絶倒字晉書云云豈阿何字誤耶通志畧因之似亦欠審佳言如屑胡母輔之字彦國少擅髙名王澄嘗與人書曰彦國吐佳言如鋸木屑霏霏不絶誠為後進領袖也晉書泠若琴瑟裴遐字叔道綽子也善言𤣥理音辭清暢泠然若琴瑟嘗與河南郭象談論一坐歎服上天下為家元帝始過江謂顧驃騎曰寄人國土心常懐慚榮跪對曰臣聞王者以天下為家是以耿亳無定處九鼎遷洛邑願陛下勿以遷都為念三十萬石摯瞻曽作四郡太守大將軍户曹㕘軍復出作内史年始二十九嘗别王敦敦謂瞻曰卿年未三十已為萬石亦太蚤瞻曰方於將軍少為太蚤比之甘羅已為太老世説故物庾穉恭為荆州以毛扇上武帝武帝疑是故物侍中劉劭曰栢梁雲構工匠先居其下管絃繁奏鍾䕫先聽其音穉恭上扇以好不以新庾後聞之曰此人宜在帝左右上更讓簡文作撫軍時嘗與桓宣武俱入朝更相讓在前宣武不得已而先之因曰伯也執殳為王前驅簡文曰所謂無小無大從公于邁授縣李𢎞度常歎不被遇殷揚州知其家貧問君能屈志百里不李荅曰北門之歎久已上聞窮猿奔林豈暇擇木遂授剡縣徳音孝武將講孝經謝公兄弟與諸人私庭講習車武子難苦問謝謂袁羊曰不問則徳音有遺多問則重勞二謝袁曰必無此嫌車曰何以知爾袁曰何嘗見明鏡疲於屢照清流憚於恵風北方物張天錫為涼州刺史稱制西隅既為符堅所擒用為侍中後於夀陽俱敗至都為孝武所器每入言論無不竟日頗有嫉心者於坐問張北方何物可貴張曰桑椹甘香鴟鴞革響淳酪養性人無嫉心知見有餘王中郎甚愛張天錫問之曰卿觀過江諸人經緯江左軌轍有何偉異後来之彦復何如中原張曰研求幽邃自王何以還因時脩制荀樂之風王曰卿知見有餘何故為符堅所制荅曰陽消隂息故天步屯蹇否剝成象豈足多譏如流張天錫世雄涼州以力弱詣京師雖逺方殊類亦邉人之傑也王彌有儁才美譽當時聞而造焉既至天錫見其風神清冷言話如流陳説古今無不貫悉又諳人物氏族中來皆有證據天錫訝服要捷袁宏字彦伯陳郡人臨汝令朂之子也謝安賞宏機捷辨速自吏郎出為東陽郡乃祖之冶亭時賢皆集安欲卒迫試之執手將别顧左右取一扇而贈之宏應聲荅曰輒當奉揚仁風慰彼黎庶合坐嘆宏要捷晉陽秋劭令王濛能清言談道貴理中簡而有㑹商畧古賢顯黙之際辭㫖劭令往往有髙致謝公云長史語甚不多可謂有令音濛别𫝊珠玉謝公云劉尹語審細世説孫綽為惔誄叙云神猶淵鏡言必珠玉好語疏取晉孝武帝好與虞嘯父飲酒醉拜不能起嘯父荅曰臣位未及扶醉未及亂非分之賜所不敢當帝美之勅疏取語於是為風俗人相嘲啁輒云好語疏取語林已老謝晦為荆州將之鎮詣從叔澹别晦色自矜澹問晦年荅曰三十五澹笑曰昔荀中郎年二十九為北府都督卿比之已為老矣晦色甚愧日始可中文帝嘆重竺道生後設㑹親同衆御于地筵下食良久衆咸疑日晩帝曰始可中耳生曰白日麗天天言始中何得非中衆咸歎其樞機得中髙僧傳農器遺後宋武帝㣲時嘗躬耕丹徒及受命蔵農器於宅以遺後元嘉中文帝幸舊宅見而色慚近侍進曰大舜耕于歴山伯禹親事水土陛下不觀列聖之遺物何以知稼穡之艱難先帝之至徳乎銜命明僧暠宋大明中再使魏于時新誅司空劉誕孝武問曰若問廣陵之事何以荅之對曰周之管蔡漢之淮南帝大悦及至魏魏主問曰卿銜此命當縁上國無相踰者耶荅曰聰明特達舉袂成帷比屋之􅡦又無下僕晏子所謂看國善惡故再辱此庭賜劍孝武嘗賜謝莊寶劍劍以與豫州刺史魯爽後爽叛帝因宴問劍所在荅曰昔以與魯爽竊為陛下杜郵之賜上甚悦當時以為知言北史十城内婚姻沈攸之攻郢城夜嘗風浪米船沈沒倉曹㕘軍崔靈鳳女先適栁世隆子攸之正色謂曰當今軍糧要急而君不以在意猶與城内婚姻耶靈鳳荅曰樂廣有言下官豈以五男易一女攸之懽然意解南齊書名遺子孫裴昭明歴郡皆清勤常謂人曰人生何事須聚畜一身之外亦復何須子孫若不才我聚彼散若能自立則不如一經故終身不事産業南史栁世隆性清亷唯盛事墳典張緒問曰觀君舉措當以清名遺子孫栁荅曰一身之外亦復何須子孫不才將為争府如其才也不如一經上徐勉雖居顯位不營産業門人故舊或從容致言勉乃荅曰人遺子孫以財我遺之以清白子孫才也則且致輜軿如其不才終為他有梁書不老劉懐珍為豫章王子尚車騎㕘軍母憂去職服闋見江夏王義恭義恭曰别子多年那得不老對曰公恩未報何敢便老義恭善其對南齊書吞刀飲灰齊髙帝有故吏東筦竺景秀嘗以過係作部帝謂伯玉曰卿比看景秀不荅曰數往候之往加責誚云若許某自新必吞刀刮腸飲灰洗胃帝善其荅即釋之卒為忠信士南史何諡齊武帝嘗與朝臣商畧酒後謂羣臣曰我後當得何諡羣臣莫有荅者王儉因目庾杲之從容曰陛下夀等南山方與日月齊明千載之後豈是臣子輕所預量時人雅歎其辨荅杲之常兼主客郎對魏使使問杲之曰百姓那得家家題門帖賣宅荅曰朝廷既欲掃蕩京洛克復神州所以家家賣宅耳魏使縮鼻而不荅上沐浴唐風齊王儉為吏部尚書時客有姓譚者詣儉求官儉曰齊桓滅譚那得有汝荅曰譚子奔莒所以有僕儉賞其善據卒得職焉帝嘗幸樂遊苑宴羣臣奏樂帝曰卿好音樂孰與朕同儉對曰沐浴唐風事兼比屋亦既在齊不知肉味帝稱善談藪南史發口成句周顒音辭辨麗出言不窮宫商朱紫發口成句賓友晤語辭韻如流與張融相遇輒以𤣥言相滯彌日不解清貧寡欲終日常蔬食雖有妻子獨處山舎衛將軍王儉謂顒曰卿山中何所食顒曰赤米白鹽緑葵紫蔓文恵太子問顒菜食何味顒曰春初早韭秋末晩菘上人生如花齊竟陵王子良多招賓客范縝與焉子良精信釋教而縝盛稱無佛子良問曰君不信因果何得富貴貧賤縝曰人生如樹花同發隨風而墮自有拂簾幌墮于茵蓆之上自有敗籬牆落于糞溷之中墮茵蓆者殿下是也落糞溷者下官是也貴賤雖復殊途因果竟在何處梁書為仁由己阮孝緒嘗與吳郡范元琰同徵不起陳郡袁峻語之曰往者天地閉賢人隠今世路已清而子猶懐栖遁耶居士曰昔周徳雖興夷齊不厭薇蕨漢道方盛黄綺無間山林為仁由己何闗人世不妄有名梁武伐齊袁昂不屈後梁以為民部尚書帝謂曰齊明帝用卿為黒頭尚書我用卿為白頭尚書良以多愧對曰臣生四十七年於兹矣四十以前臣之自有七年以後陛下所養七嵗尚書未為晩達帝曰士固不妄有名梁書玉環梁武帝起兵栁惔舉漢中應之武帝之鎮襄陽惔祖道帝解茅贈土玉環贈之天監二年元㑹帝謂曰卿所佩玉環是新亭所贈耶對曰既而瑞感神衷臣謹服之無斁帝因勸之酒帝又嘗謂曰徐元瑜違命嶺南周書父子兄弟罪不相及朕已放其諸子如何惔曰罰不及嗣賞延于世今便見之聖朝時以為知言上虎入郭梁武帝初有虎入郭上意不悦以問羣臣羣臣莫對尚書令王瑩在御筵乃斂板荅曰昔擊石拊石百獸率舞陛下膺籙御圖虎象来格帝大悦衆咸服焉静壇梁侍中周捨立壇于鍾山下武帝問其壇如何對曰風不鳴條雲無膚寸鹿巾黄帔甚多白簡朱衣罕至因名静壇金陵志公庭私禮甄深魏遣李道固来使齊帝讌之深于御筵舉酒勸道固道固不受曰公庭無私禮不容受勸深徐荅曰詩所謂雨我公田遂及我私座者皆服道固乃受酒梁書丙蕭何敬容在選日嘗有一客詣之此人姓吉敬容問之曰卿與丙吉逺近荅曰如明公之於蕭何朱雀門災大同三年正月朱雀門災髙祖謂羣臣曰此門制卑狹我始欲構遂遭天火並相顧未有荅何敬容獨曰此所謂陛下先天而天弗違時以為名對梁書符命魏使李諧聘梁至石頭武帝遣其主客郎范胥當接胥曰金陵王氣兆于先代黄旗紫盖本出東南君臨萬邦故宜在此諧荅曰帝王符命豈得與中國比隆紫盖黄旗終于入洛無乃自害也有口之説乃是俳諧亦何足道多士如林梁武親問李諧曰魏朝人士徳行四科之徒凡有幾人諧對曰多士如林無以備啓武帝曰武王有亂臣十人魏雖人物之盛豈得頓如卿言諧曰愚謂周稱十人本舉佐命至於濟濟多士實是文王之詩皇朝廊廟之才足與周人有競魏書李平𫝊僧董狐魏李騫崔劭至同泰寺主客王克舎人賀季及三僧迎之引接至浮屠中傍有執板筆者僧謂騫曰此是尸頭専記人罪騫曰便是僧之董狐復入一堂佛前有銅鉢中然燈劭曰可謂日月出矣爝火不息酉陽名對梁武帝嘗從容謂蕭子顯云我造通史此書若成衆史可廢子顯對曰仲尼賛易道黜八索述職方除九邱聖製符同復在今日時以為名對梁書四聲沙門重公嘗謁梁髙祖問曰聞在外有四聲何者為是重公應聲荅曰天保寺刹既出逢劉綽説以為能綽曰何如道天子萬福談藪引論易老程駿字驎駒師事劉昞性機敏好學後為著作郎獻文屢引與論易老之義又問其年對曰臣六十有一帝曰昔太公既老而遇文王卿今遇朕豈非早乎駿曰臣雖才謝吕望而陛下尊過西伯覬天假餘年竭六韜之效元魏書出軍婦人徐君蒨字懐簡辯於辭令湘東王常出軍有人將婦人從者王曰才愧李陵未能先誅女子將非孫武遂欲驅戰婦人君蒨應聲曰項籍壯士猶有虞兮之愛紀信成功亦資姬人之力南史五日暉粉壁釋寳海還蜀梁武陵王紀作鎮井絡敬愛無已每就宿至旦王將盥手日影初出王曰日暉粉壁狀似城中風動刹鈴方知寺裏其晨車盖迎王馬復嘶鳴海曰遥看盖動喜遇陣思忽聽馬鳴慶逢龍樹相與歡笑而出髙僧𫝊贈刀梁孝元屢遣使于蜀召劉璠威靈王紀知不為己用乃厚贈而遣之臨别紀又解其佩刀贈璠曰想見物思人對曰敢不奉揚威靈克翦奸宄北史簡要魏愷辭長史積年沈廢後遇楊愔於路㣲自披陳楊荅曰發詔授官咸由聖旨非選曹所悉公不勞見訴愷應聲曰雖復零雨自天終待雲興四嶽公豈得言不知楊欣然曰此言極為簡要更不須多語數日除霍州刺史北齊書假毛羽陳宣帝嘗披瑣事指蕭引署名曰此字勢翻翻似鳥之欲飛引謝曰此乃陛下假其毛羽耳帝又謂引曰我每有所忿見卿輒意解何也引曰此陛下不遷怒臣何與此恩陳書兄替李孝貞字元操好學善屬文仕齊與弟孝基同見吏部郎中陸昂昂戲之曰弟名孝基兄其替矣孝貞對曰僕雖不肖請附子臧昂握手曰士固不妄有名吾賢必當逺至孝貞後遷蒙州刺史吏民安之自此不復留意於文筆人問其故慨然嘆曰五十之年倐焉而過鬢垂素髮筋力已衰宦意文情一時盡矣悲夫隋書龍因雲出隋太子勇男儼雲定興女生也初誕帝曰此乃皇太孫何乃生不得地靈曰天生龍種所以因雲而出時人以為敏對北史金剛弩目隋吏部侍郎薛道衡嘗遊鍾山開善寺謂小僧曰金剛何為弩目菩薩何為低眉僧荅曰金剛弩目所以降伏四魔菩薩低眉所以慈悲六道道衡憮然不能對辛舊太公辛郁舊名太公弱冠遭太宗於行所問何人曰辛太公太宗曰何如舊太公郁曰舊太公八十始遇文王臣今適年十八已遇陛下過之逺矣太宗命直史館御史臺記回天太宗欲脩洛陽宫張𤣥素上書諌上歎曰吾思之不熟乃至於此魏徵聞之嘆曰張公論事有回天之力可謂仁人之言哉本𫝊切理馬周有機辯中書侍郎岑文本常稱馬君論事援引事類揚搉古今舉要刪繁㑹文切理一字不可増減聽之靡靡令人忘倦本𫝊口伐可汗鄭元璹尚文藝突厥攻太原元璹持節往勞敵以不信咎中國元璹隨語折責無所屈因謂頡利曰今掠財資劫人口皆入所部豈若仆旗接好則金玉重幣一歸可汗口伐可汗如約朕何惜金石賜公哉孔帖一言賢十萬衆馬盎或告盎叛太宗詔蘭謨發江淮甲卒將討之魏徵諌曰王者兵不宜為蠻夷動勝之不武不勝為辱盎反未狀當懐之以徳盎懼必自來帝乃遣散騎常侍韋叔詣喻盎盎遣智戴入侍帝曰徵一言賢於十萬衆上姑姪則天以武承嗣為左相李昭徳奏曰不知陛下委承嗣重權何也則天曰我子姪委以心腹耳昭徳曰君以姑姪之親何如父子何如母子則天曰不如也昭徳曰父子母子尚有逼奪何諸姑之能容使其便可乗御寳位其遽安乎且陛下為天子陛下之姑受何福慶而委重權於姪手事之去矣則天矍然曰我未思也即日罷承嗣政事大唐新語自託蕭至忠素有雅望自託於太平公主公主引為刑部尚書嘗自公主第門出遇宋璟璟曰非所望於蕭𫝊耶至忠笑曰善乎宋生之言然不能自返也唐書下坂走丸張九齡善談論每與賓客議論經日滔滔不竭如下坂走丸也時人服其辨天寳遺事粲花李白天才俊逸每與人談論皆成句讀如春葩麗粲於齒牙之下時人號曰李白粲花之論上㢘無厚畜洛陽人盧坦字保衡為河南尉時杜黄裳為尹召坦立堂下曰某家子與惡人游破産盍察之坦曰凡居官㢘雖大臣無厚畜其能積財者必剝下以致之如子孫善守是天富不道之家不若恣其不道以歸於人黄裳驚其言自是遇加厚唐書皇王道盡劉迅字捷卿陳郡殷寅名知人見迅歎曰今黄叔度也劉晏毎聞其論曰皇王之道盡矣上折文臣訓注之禍宦者氣盛凌轢南司延英議事中貴必引訓注以折文臣李石曰京師之亂始自訓注訓注之起始自何人仇士良等不能對其勢稍抑續世説一片文章李建勲字致尭博覽羣籍頗善理論宋齊邱當國深忌同列少所推遜然獨稱建勲曰李相清談不必潤色自是一片文章矣南唐近事直道嫉惡楊文公危言直道獨立一世嫉惡如讎在翰苑日有新幸近臣意欲扳入其黨中因間語公曰君子知㣲知彰知柔知剛公正色疾聲荅曰小人不恥不仁不畏不義幸臣大沮心切銜之竟以事中公逐之寓簡黄龍府宋焦守節其宗時奉使契丹館伴丁求説指逺山謂曰此黄龍府也守節應聲曰不知燕然山去此幾許求説慙服宋史項贅蔣之竒字頴叔既貴項上大贅每忌人視之為六路大漕至金山寺僧了元與蔣相善一日見蔣即手捫其贅蔣心惡之了元徐曰沖卿在前穎叔在後蔣大喜了元佛印也慈聖后嘗夢神人語云太平宰相項安節神宗宻求諸朝臣無有此人久之吳沖卿為上相瘰癤生頸間一日立朝項上腫如拳后見之告上曰此真項安節也朱或可談稱書宋髙宗問尹焞曰紂亦君也孟子何以謂之獨夫焞對曰此非孟子之言武王誓師之言也獨夫受洪惟作威髙宗又問曰君視臣如草芥臣可遽視君如寇讎乎焞對曰此亦非孟子之言書云撫我則后虐我則仇髙宗大喜融結孝宗曽謂王過曰李融字若川謂何過對曰天地之氣融而為川結而為山李融之字若川如元結之字次山也上大喜坦齋筆衡非急一聲而非駟馬不能追一言而急駟馬不能及故惡言不出苛聲不入耳此謂君子也登析子多言何益子禽問多言有益乎墨子曰蝦蟇蛙虫日夜鳴舌乾擗然而不聽今鶴雞時夜而鳴天下振動多言何益唯其言之時也墨子正倚明君治國三寸之機運而天下定方寸之謀正而天下治一言正而天下定一言倚而天下靡申子矯尾厲角鬼谷先生曰蘇秦張儀一體也然其矯尾厲角含吐縱横張儀不如蘇秦是能分人主之地也入前義烈重義賢者之於義曰貴乎義乎曰義是故尭以天下與舜曰富乎義乎曰義是故子罕以不受玉為寳曰生乎義乎曰義故務光投水而殪三者人之所重而不足以易義尹子髙義佛肸以中牟叛置鼎於庭致士大夫曰與我者受邑不吾與者烹大夫皆從之至田基卑曰義死不避斧鉞之罪義窮不受軒冕之服無義而生不仁而富不如烹褰衣將就鼎佛肸脱屨而生之趙氏聞其叛也攻而取之聞田基不肯與也求而賞之田基曰不可也一人舉而萬夫俛首智者不為也賞一人以慚萬夫義者不取也我受賞使中牟之士懐恥不義辭賞從處曰以行臨人不道吾去矣遂之楚新序楚王髙其義待以司馬説苑知命白公勝將弑楚恵王王出亡令尹司馬皆死拔劍而屬之於屈廬曰子與我將舎子子不與我必殺子廬曰子殺叔父而求福於廬也可乎吾聞知命之士見利不動臨死不恐為人臣者時生則生時死則死是謂之人臣之禮故上知天命下知臣道其有可劫乎子胡不推之白公勝乃内其劍新序辭王白公勝既殺令尹司馬欲立王子閭以為王王子閭不肯劫之以刃王子閭曰王孫輔相楚國匡正王室而後自庇焉閭之願也今子假威以暴王室殺伐以亂國家吾雖死不子從也白公勝曰楚國之重天下無有天以與子子何不受也王子閭曰吾聞辭天下者非輕其利也以明其徳也不為諸侯者非惡其位也以絜其行也今吾見國滅而忘主不仁也劫白刃而失義不勇也子雖告我以利威我以兵吾不為也白公強之不可遂殺之葉公髙率衆誅白公而反恵王於國上成義齊人有子蘭子者事白公勝勝將為難乃告子蘭子曰吾將舉大事於國願與子共之子蘭子曰我事子而與子殺君是助子之不義也畏患而去子是遁子於難也故不與子殺君以成吾義契領於庭以遂吾行説苑持釜置車俗説齊人有空車行魯人有負釜者便持釜置車中行三百里臨别取釜不相問亦不謝後車家繫獄當死釡主徑往纂之穿壁未達曰極哉車者怒不肯出釡主慙欲俱死明日主者以事白齊君齊君義而原之風俗通理畢就烹欒布梁人也梁王彭越為家人時嘗與布游後布為人畧賣為奴于燕為其主家報仇燕王臧荼舉以為都尉荼為燕王布為將燕反漢擊燕虜布越聞之贖布為梁大夫使於齊未反漢召彭越責以謀反夷三族梟首洛陽詔有收視者輒捕之布還奏事彭越頭立祠而哭之吏捕以聞上召布罵令趣烹之布理越畢請就烹上釋之拜為都尉漢𫝊金尉陳翼字春卿廬江舒人也行到藍鄉見道邉有一馬傍有一病人呼曰我是長安魏公卿聞廬江樂土來遊今病不能復前倘可相救翼扶歸眷視積日病困曰有金十餅素二十匹死則賣以殯斂餘謝主人既死翼賣素買棺衣衾殯葬以金置棺下騎馬出入後其兄長公見翼乗馬告吏捕翼翼具言之棺下得金長公叩頭以金十餅投其門中翼送長安還之翼後為魯陽尉號魯陽金尉廬江七賢𫝊范晏隂徳𫝊直亮不容平陵云敞在呉章門下往往好斥人過以為輕薄世人皆以為然章後為王莽所殺人無敢有收葬者弟子皆更易姓名以從他師敞時為司徒掾獨稱吳章弟子收葬其屍方知直亮者不見容於冗輩中矣平陵人生為立碑於吳章墓側在龍首山南幕嶺上西京雜記漢書云敞字幼孺志膽㢘范受業博士薛漢㑹漢坐楚王事誅故人門生莫敢視范獨往收斂之吏以聞顯宗大怒召范入詰責曰漢與楚王同謀交亂天下范公府掾不與朝廷同心而反收斂罪人何也范叩頭曰臣無狀愚戅以為漢等皆已伏誅不勝師資之情罪當萬坐帝怒稍解問范曰卿㢘頗後耶與右將軍褒大司馬丹有屬乎范對曰褒臣之曽祖丹臣之祖也帝曰怪卿志膽敢爾因貰之由是顯名後漢還孫遺産闞敞字子張平輿人仕郡為五官掾時太守第五常被徵臨發倉卒有俸錢百三十萬留付敞敞埋著堂上遂遭世倉卒道路斷絶敞年老飢羸其妻曰第五府君所寄錢可取自給然後償之敞曰吾窮老何明當有用故君之財邪道通當送飢寒何損常舉門遭疫妻子皆死常病臨困惟有孤孫年九嵗常謂之曰吾寄故五官掾平輿闞敞錢三十萬氣遂絶後孫年長大步擔至汝南問敞敞見之悲喜與共臨發穿錢百三十萬孤孫曰亡祖臨終言有三十萬耳今乃百三十萬不敢當也敞曰府君病困氣索言謬誤耳即無疑也汝南先賢𫝊脚攣楊彪字文先建安時見漢祚將終遂稱脚攣不復行積十年及曹丕受禪欲以彪為太尉先遣吏示旨彪辭曰彪備漢三公遭世傾亂不能有所補益耄年被病豈可賛惟新之朝遂固辭後漢撫哭脂習字元升京兆人也中平中仕郡公府辟舉髙第與少府孔融親善曹操為司空威徳日盛而融故以舊意書疏倨傲習常責融欲令改節融不從㑹融被誅當時許中百官先與融親善者莫敢收恤而習獨往撫而哭之文舉卿捨我死我當復與誰語者哀歎無已太祖聞之收習欲理之尋以其事直見原黄初詔欲用之以其年老然嘉其敦舊有欒布之節賜拜中散大夫魏畧義士曹操引軍攻袁譚於南皮王脩時運糧在樂安聞譚急將所領兵及諸從事數十人往赴譚至髙宻聞譚死下馬號哭曰無君焉歸遂詣操乞收葬譚屍操欲觀脩急黙然不應脩復曰受袁氏厚恩若得收斂譚屍然後就戮無所恨操嘉其義聽之三國志曹公既誅袁譚梟其首令曰敢哭之者戮及妻子於是王叔治田子泰相謂曰生受辟命亡而不哭非義也畏死亡義何以立世遂造其首而哭之哀動三軍軍正白行其戮操曰義士也赦之𫝊子感義司馬昭弑魏主髦收王經誅之故吏向雄哭之哀動一市鍾㑹誅雄復收葬之昭聞召而責之曰往者王經之死卿哭於東市而我不問今鍾㑹躬為叛逆而又輒收葬若復相容其如王法何雄曰王誅既加於法已備雄感義收葬教亦無闕何必使雄背死違生以立於時殿下讎懟枯骨捐之中野百嵗之後為臧獲所笑豈仁賢所掩哉昭悦與宴談而遣之漢晉春秋表葬諸葛恪亡後臨淮臧均表乞收葬曰昔項籍受殯葬之施韓信獲收斂之恩此則漢髙發神明之譽也欒布矯命彭越臣竊恨之不先請主上而専名以肆情其得不誅實為幸耳吳志篤義紀瞻字士逺歴陽太守沛國武嘏臨亡以家後不立遂手書寄託瞻悉迎接為居宅衣食取足有若骨肉少與陸機兄弟親善機一門被誅瞻復相營恤機女為嫁之由是稱其篤義晉中興書代姪江都王延年年十五喪二親奉叔父孝聞子良孫及弟從子為噉人賊所掠延年追而請之賊以良孫歸延年延年拜請曰我以少孤為叔父所養此叔父之孤孫也願以子易之賊曰君義士也免之崔鴻十六愚狷石勒謂右長史張賓曰鄴魏之舊都吾將營建誰可任也賓曰晉故東萊太守趙彭忠亮篤敏將軍若任之以鄴必能允副神規勒於是徵拜魏郡太守彭至泣而辭曰臣往曽䇿名晉室食其祿矣且受人榮寵復事二姓者臣志所不為且豈愚臣之狷志恐亦明公之許有死而已未敢聞命若賜其餘年全臣一介之願者則明公大造也於是賜安車駟馬養以卿秩後趙録不屈龔頴遂寧人也少好學益州刺史毛璩辟為勸學從事璩為譙縱所殺故佐吏並逃亡穎號哭奔赴殯送以禮縱後設宴延穎不獲已而至樂奏穎流涕起曰北面事人亡不能死何忍聞舉樂蹈跡逆亂乎縱大將譙道福引出將斬之道福母則穎姑跣出救之故得免縱既僣號備禮徵又不至乃收穎付獄脅以兵刃執志彌堅終無回改至於蜀平遂不屈節元嘉二十四年刺史陸徵上表曰若王斶之抗辭燕軍同周苛之肆詈楚王方之於穎蔑以加焉誠當今之忠壯振古之遺烈宋書小過徐廣字野人初桓𤣥篡位安帝出宫廣陪列悲慟哀動左右及武帝受禪恭帝遜位廣又哀感涕泗交流謝晦見之謂曰徐公將無小過廣收淚荅曰身與君不同君為宋朝佐命吾乃晉室遺老憂喜之事固不同時乃更歔欷因辭衰老乞歸桑梓性好讀書老猶不倦代弟孫棘大明五年發三五丁弟薩應充行坐違期不至棘自詣郡辭引已為家長令弟不行罪當在己乞以身代薩薩又辭自引太守張岱疑其不實以棘薩各置一處報云聽其相代顔色並悦甘心赴死焉棘妻許氏又寄語囑夫曰君當門户豈可委罪小郎大家臨亡以小郎囑君今竟未婚娶家道不立君已有二子死復何恨岱依事表上孝武詔特原罪宋書不僵陸超之吳人以清静雅為晉安王子懋所知子懋起兵既敗于琳之勸其逃亡荅曰人皆有死此不足懼吾若逃亡非唯孤晉安之眷亦恐田横客笑人𤣥邈等以其義欲囚將還都而超之亦端坐待命超之門生姓周者謂殺超之當得賞乃伺超之坐自後斬之頭墜而身不僵𤣥邈嘉其節厚為殯斂周又助舉棺未出户棺墜政壓其頭折即死聞之者莫不以為有天道焉南史髙節明帝疾不豫南康王琳於第賜死獨江泌守尸晝夜號泣悲動路人于時諸王並見誅翦故舊無敢瞻看唯泌及衡陽王子浚侍讀嚴植各為營理喪事時人髙其節泌字士清濟陽人也呉均齊春秋族人兖州中從事泌黄門郎悆子也與泌同名世謂泌為孝泌以别之南史欒王魏神龜末清河王元懌領太尉辟陽固從事中郎屬懌被害元乂秉政朝野震悚懌諸子及門生吏寮莫不慮禍隠避不出素為懌所厚者彌不自安固以常被辟命遂獨詣喪所盡哀痛哭良久乃還僕射游肇聞而嘆曰雖欒布王脩無以尚也君子哉若人本𫝊書求葬首梁王琳舉義為陳將吳明徹所殺𫝊首建康懸之於市琳故吏朱瑒致書陳僕射徐陵求琳首曰竊以典午將滅徐廣為晉家遺老當塗已謝馬孚稱魏室忠臣梁故建寧公琳輕躬殉主以身許國徒藴包胥之念終遘萇𢎞之𤯝至使身没九泉頭行千里身首異處封樹靡卜瑒早造末僚預㕘下席降薛君之吐握荷魏公之知遇是用霑巾雨袂痛可識之顔回腸疾首切猶生之面伏惟聖恩博厚明詔爰發赦王經之哭許田横之葬瑒雖芻賤竊亦有心琳經莅夀陽曽游江右願歸彼境還脩窀穸庶孤墳既築或飛銜土之鷰豐碑式樹時留墮淚之人近故舊王綰等已有論牒仰䝉制議不遂所陳昔㢘公造逝即淝川而建塋域叔孫云亡仍芍陂而禃楸檟由此言之抑有其例不使夀春城下唯𫝊報葛之人滄洲島上獨有悲田之客昧死陳祈伏待刑憲陵嘉其志節又明徹亦數夢琳求首並為啓陳主而許之南史散米徐陵字孝穆性清簡無所營樹祿俸與親族共之大建中食建昌邑邑户送米至于水次陵親戚有貧匱者皆令取之數日便盡陵家尋致乏絶府僚怪而問其故陵云我有車牛衣裳可賣餘家有可賣不陳書忠貞司馬暠字文昇承聖中除太子庶子江陵陷隨例入闗而梁室屠戮太子瘞殯失所暠以宫室乃抗表周朝求還江陵改葬辭甚酸切周朝優詔荅曰昔主父從戮孔車有長者之風彭越就誅欒布得陪臣之禮庶子鄉國已改猶懐送往之情始驗忠貞方知臣道即勅荆荆州以禮安厝上至行王元規字正範性孝事母甚謹晨昏未嘗離左右梁時山隂縣有暴水流漂居宅元規唯有一小船倉卒引其母妹并孤姪入船元規自執檝棹而去留其男女三人閣於樹杪及水退獲全時人皆稱其至行上不遜榮建緒性甚亮直時髙祖有舊及為丞相拜息州刺史將之官時髙祖隂有禪代之計因謂建緒曰且躊躇當共取富貴耳建緒自以周之大夫因義形於色曰明公此旨非僕所聞髙祖不悦建緒遂行開皇初来朝上謂之曰卿亦悔不建緒稽首曰臣位非徐廣情類楊彪上笑曰朕雖不解書語亦知卿此言不遜也隋書祖孫仗義李綱字文紀周齊王憲引為㕘軍宣帝將害憲召僚屬證成其罪綱誓之以死終無撓詞及憲遇害露車載屍而出故吏皆散惟綱撫棺痛哭躬自埋瘞哭拜而去舊唐憲女孀居孑立綱自以齊王故吏贍恤甚厚及綱卒其女被髮號哭如喪所生焉上綱孫安仁永徽中為太子左庶子屬太子被廢歸于陳邸官寮皆逃散無敢辭送者安仁獨涕泣拜辭而去朝野義之上篤義王義方泗州漣水人少孤貧事母甚謹博通五經而謇傲獨行初舉明經因詣京師中路逢徒步者自云父為潁上令聞病篤倍道將往焉徒不前計無所出義方解所乗馬與之不告姓名而去後為太子校書無何坐與刑部尚書張亮交通貶為儋州吉安丞貞觀二十三年改授洹水丞時張亮兄子皎配流在儋州來依義方而卒臨終託以妻子及致屍還鄉義方與皎妻自誓於海神使奴負柩令皎妻抱其赤子乗義方之馬身獨步從而還先之原武葬皎告祭張亮送皎妻子歸其家而往洹水上濟大事郭元振年十六入太學薛稷趙彦昭為友時有家信至寄錢四十萬以為舉糧忽有縗服者扣門云五代未葬各在一方今欲同時遷窆乏於資財聞公家信至頗能相濟否公即命以車一時載去畧無留者亦不問姓氏深為薛趙所誚元振怡然曰濟彼大事亦何誚焉其年糧絶竟不成舉摭言宻行李約為兵部員外汧公之子也識度清曠迥出塵表嘗江行與一商胡舟檝相次商胡病篤邀相見以二女託之皆絶色也又遺一珠約悉唯唯及商胡死財寶約數萬悉籍其數送官而以二女求配始殮商胡時約自以夜光含之人莫知也後死胡有親屬来理資財約請官司發掘檢之夜光果在其宻行皆此類也尚書故實語林汧公勉崔樞事並同犯難徐晦進士擢第登直言極諌授櫟陽尉皆自楊憑所薦及憑得罪貶臨賀尉交親無敢視送者獨晦送至藍田與憑言别故相權徳輿與憑交分最深知晦之行因謂晦曰今日送臨賀誠為厚矣無乃為累乎晦曰晦自布衣受楊公之眷方兹流播争忍無言而别如他日相公為奸邪所譛失意於外安得與相公輕别徳輿嘉其真懇大稱之於朝不數日御史中丞李夷簡請為監察晦白夷簡曰生平不識公門公何取信而見奬拔夷簡曰聞君送楊臨賀不顧犯難肯負國乎由是知名舊唐報徳無私栁仲郢字諭䝉為牛僧孺辟客李徳裕知其無私奏為京兆尹仲郢謝曰自言曰不期太尉思奬及此仰報感徳敢不如竒章公門館徳裕不以為嫌仲郢常感徳裕之知大中朝李氏無祿仕者仲郢領鹽鐡時取徳裕兄子從質為推官知蘇州院事令以祿利贍南宅令狐綯為宰相頗不悦仲郢與綯書曰任安不去常自愧於昔人吳詠自裁亦何施於今日李太尉受責既久其家已空遂絶蒸嘗誠増痛惻綯深感歎與從質員官續世説燕趙美談吕兖為滄州節度判官劉守光攻陷滄洲兖被擒族誅子琦年十五將就戮有趙玉者幽薊義士也久游兖門見琦臨危紿謂監刑者曰此子某之同氣也幸無濫焉乃引之俱去琦病足玉負之而行逾數百里變姓名乞食於路乃免於禍琦常以玉免已於難欲厚報之玉遇疾琦親為扶持供其醫藥玉卒代其家營葬事玉之子曰文度既孤而幼琦誨之甚篤及其成人登進士第尋升宦路琦之力也時議者以非玉之義不能存吕氏之嗣非琦之仁不能撫趙氏之孤唯仁義二公得之燕趙之士流為美談上徒步逺送盧多遜門下士有种英蘇冠者平生最器重之被罪之後賓客雲散二人徒步送抵天涯而還英後易名放即明逸冠易名易簡魁天下為㕘知政事范陽家誌焚券還宅建中靖國中坡公自儋北歸卜居陽羡士人邵民瞻從學於坡為坡買一宅為緡五百坡傾囊僅能償之卜吉入居既得日矣夜與邵步月偶至村落聞婦人哭聲極哀坡徙倚聽之與邵推扉而入問嫗何為哀傷至是嫗曰吾有一居相𫝊百年吾子不肖舉以售人吾今日遷徙百年舊居一旦訣别此吾所以泣也坡亦為之愴然問其故居所在則坡所得者也因再三慰撫謂曰嫗不必深悲當以是居還嫗即命取屋劵對嫗焚之呼其子命翌日迎母還舊居不索其直坡自是遂還毗陵不復買宅借顧塘橋孫氏居暫住焉是嵗七月坡竟殁于借居白雪偶談方正縮屋顔叔子獨處于室鄰之嫠婦又獨處于室夜暴風雨至而室壊婦人趨而至顔叔子納之而使執燭放於平旦而蒸盡縮屋而繼之自以為避嫌之不審矣若其審者若魯人然魯人有獨處室者鄰之嫠婦亦獨處一室夜暴風雨至嫠婦室壊趨而託焉魯人閉户而不納嫠婦自牖與之言何不仁而不納我乎魯人曰吾聞男女不六十不同居今子幼吾亦幼是以不敢納爾也婦人曰子何不如栁下恵然嫗不建門之女國人不稱其亂魯人曰栁下恵則可吾固不可吾將以吾之不可學栁下恵之可孔子聞之曰善哉欲學栁下恵者未有似於此者期於至善而不襲其為可謂智乎毛詩𫝊不與席光武嘗問宋𢎞通博之士𢎞乃薦沛國桓譚才學洽聞幾能及揚雄劉向父子於是召譚拜議郎給事中帝毎讌輒令鼓琴好其繁聲𢎞聞之不悦悔於薦舉伺譚内出正朝服坐府上遣吏召之譚至不與席而讓之曰吾所以薦子者欲令輔國家以道徳也而今數進鄭聲以亂雅頌非忠正者也能自改耶將令相舉以法乎譚頓首辭謝良久乃遣之後大㑹羣臣帝使譚鼓琴譚見𢎞失其常度帝怪而問之𢎞乃離席免冠謝曰臣所以薦桓譚者望能以忠正導主而令朝廷耽悦鄭聲臣之罪也帝改容謝使反服其後遂不復令譚給事中後漢不私祭遵從征河北為軍市令上舎中兒犯法遵格殺之上怒命收遵時主簿陳嗣諌曰明公欲衆整齊今遵奉法不避是教命行也上乃貰之以為刺奸將軍謂諸將曰當備祭遵吾舎中兒犯令即殺之必不私諸卿也東觀漢記松父友馬援嘗有疾梁松来候之獨拜牀下援不荅松去後諸子問曰梁伯孫帝壻貴重朝廷公卿已下莫不憚之大人奈何獨不為禮援曰我乃松父友也雖貴何得失其序乎松由是恨之後漢不能為郎世祖選丁邯為郎邯託疾不就詔問實病著為郎乎對曰臣實不病恥以孝㢘為令史耳世祖怒使虎賁杖之數十詔問欲為郎否對曰能殺臣者陛下不能為郎者臣也詔出不為郎三輔決録大人蘇純字桓公有髙名性強切而特毁譽親友咸憚之至乃相謂曰見蘇桓公患其教責人不見又忌之三輔號為大人後漢舞屬不報蔡邕徙朔方及將就還路五原太守王智餞之酒酣智起舞屬邕邕不為報智者中常侍王甫弟也素貴驕慙於賓客詬邕曰徒何敢輕我邕拂衣而去智銜之宻告邕怨於囚放謗訕朝廷内寵惡之邕慮卒不免乃亡命江海逺跡吳㑹上歌舞不盼盧植少與鄭𤣥俱事馬融能通古今學好研精而不守章句融外戚豪家多列女倡歌舞於前植侍講積年未嘗轉盼融以是敬之上危坐有吕子義當世清賢士也有舊人往存省嫌其設酒食懐乾糒而往主人榮其降已乃盛為饌義出懐中乾糒求一杯冷水而食之為率更令有人就之宿非其度數之内子義燃燭危坐通曉目不轉睛膝不移處陽泉物理論不拜布之破也陳羣父子時亦在布之軍見曹操皆拜袁渙獨髙揖不為禮操甚嚴憚之袁氏世紀嘔血髙貴鄉公之殺内外諠譁司馬昭召朝臣謀其故太常陳泰不至使其舅荀顗召之告以可不泰曰世之論者以泰方於舅今舅不如泰也子弟内外咸共逼之垂涕而入昭待之曲室謂曰𤣥伯卿何以處我于寳晉紀泰云唯殺賈充以謝天下昭曰可復下此否對曰但見其上未見其下世説遂嘔血死魏氏春秋作士人中書令王球以名公子遺務事外中書舍人王𢎞為太祖所愛遇上謂曰卿欲作士人得就王球坐自當判耳若往詣球可稱旨就廣𢎞如言往王舉扇撝曰吾不得爾𢎞還依事啓聞太祖曰我便無如此何移坐張敷為正員中書郎時舎人秋當周赳並管要務以張同省名家嘗欲詣之周曰彼恐不相容接不如勿往秋言我等並已員外郎矣何憂不得共坐敷先設二席去壁三四尺許二客就席張呼左右曰移我逺客周等失色而退宋書拂衣中書舎人阮佃夫在㑹下請假東歸客勸王僧䖍以佃夫要倖宜加禮接僧䖍曰我立身有素豈能曲意此輩彼若見惡當拂衣而去耳佃夫言於宋明帝因而免官南齊雅步袁粲字景倩初名愍孫早以操行見知俊于儀範廢帝倮之迫使走愍孫雅步如常顧而言曰風雨如晦雞鳴不已素寡往来門無雜賓閒居髙卧一無所接談客文士所見不過一兩人南史乞作士夫紀僧真得幸於齊世祖容表有士風嘗請於世祖曰臣出自本縣武吏邀逢聖時階榮至此為兒婚得荀昭光女即時無復所須唯就陛下乞作士大夫上曰此由江斆謝瀹我不得措意可自詣之僧真承旨詣斆登榻坐定斆顧命左右曰移吾牀逺客僧真喪氣而退以告世祖世祖曰士大夫故非天子所命上稜岸沈文季風采善于進止司徒褚淵彦回當時貴重頗以門户裁之文季不為之屈武帝在東宫時宴朝臣文季數舉酒勸彦回回甚不平語武帝曰沈文季謂淵經為其部依然猶有故情文季曰惟桑與梓必恭敬止豈如明府亡國失主不識枌榆上升堦長揖游雅云宗愛之任勢也威震四海嘗召百司於都坐王公以下望庭拜畢髙允獨升階長揖由此觀之汲長孺可以見衛青何抗禮之有魏書不同凡俗裴粲字文亮時僕射髙肇以外戚之貴勢傾一時一時朝士見者皆望塵拜謁粲候肇惟長揖而已家人尤責之粲曰何可自同凡俗也上拒境梁武帝起兵州郡望風皆降袁昂獨拒境帝手書喻之曰竭力昏主未足為忠家門屠滅非所謂孝忠孝俱盡將欲何依昂荅曰一飱㣲施尚復投殞況食人之祿而頓忘一旦非惟物議不可亦恐明公鄙之南史不食憤卒齊御史中丞顔見逺梁武帝受禪見逺不食發憤數日而卒武帝聞之曰我自應天從人何豫天下士大夫而顔見逺乃至於此續世説詠詩昭明與名士游𤣥圃後池畨禺軌孰盛稱此中宜奏女樂昭明不荅直詠左思招隠詩云何必絲與竹山水有清音軌慙而止梁書無私徐勉為吏部尚書嘗與門人夜集客有虞暠求詹事五官勉正色荅云今夕止可談風月不宜及公事時人服其無私上不染尉聿字成興性耿介明帝時為武衛將軍是時領軍元乂秉權百寮莫不致敬而聿獨長揖不拜尋出為平西將軍東涼州刺史涼州緋色天下之最乂送白綾二千匹令聿染拒而不許魏書不為身計蕭引字升休為建康令時殿内朋主吳璡及宦官李善度蔡脱兒等多所請屬引一皆不許引族子宻時為黄門郎諌引曰李蔡之勢在位皆畏憚之亦宜少為身計引曰吾之立身自有本末亦安能為李蔡改行就令不平不過解職耳吳璡竟作飛書李蔡證之坐免官陳書陳汝風袁憲字徳章君正子昂之孫也大同時生徒對䇿多行賄賂門客岑文豪請具束脩君正曰我豈能用錢為兒買第耶學司銜之尋舉髙第以貴公子尚簡文南沙公主陳武帝作相除司徒户曹初謁遂抗禮長揖中書令王勱謂憲曰卿何矯衆不拜録公憲曰於理不應致拜衛尉趙知禮曰袁生舉止詳中故有陳汝之風大建三年遷御史中丞時豫章王叔英不奉法度逼取人馬憲依事劾奏免叔英自是朝野嚴憚嘗陪宴承香閣賓退後宣帝留憲與衛尉樊俊徙席山亭談宴終日帝謂俊曰袁家故為有人後主欲廢太子知憲有規諌之事荅曰袁徳章實鯁骨臣即日詔為尚書僕射禎明三年隋軍來伐隋將賀若弼進燒宫城北掖門兵衛皆散走朝士各蔵唯憲侍左右後主謂曰我從来待卿不先餘人今日見卿可謂嵗寒知松栢後凋也非惟由我無徳亦是江東衣冠道盡及至長安隋文帝嘉其雅操下詔以為江表稱首南史形讃陸徳明受學於周𢎞正善言𤣥理王世充僣號封其子為漢王署徳明為師就其家將行束脩之禮徳明恥之因服巴豆散卧東壁下充之子入跪牀下徳明佯紿之遺痢竟不與語遂移病成臯及入唐太宗引為文學館學士使閻立本寫真形褚亮為之讃曰經術為貴𤣥風可師勵學非逺通儒在兹唐新語真宰相韋安石為納言甚為張易之武三思等所忌嘗於内殿賜宴易之引蜀商宋霸子等數人於前博戲安石跪奏曰蜀商等賤類不合預登此筵因顧左右令逐出之座者皆為失色則天以安石辭直深慰勉之時鳳閣侍郎陸元方在座退而吿人曰此真宰相非吾等所及也舊唐髙士圖張易之昌宗嘗命畫工圖寫武三思李嶠蘇味道等十八人形象號為髙士圖每引朱敬則預其事固辭不就其髙潔守正如此上飲巵腹痛王毛仲有寵於𤣥宗百官附之一日毛仲嫁女上問何所須毛仲頓首謝曰臣萬事已備但未得客上曰張説源乾曜輩豈不可召耶對曰此則得之上曰知汝所不能致者一人耳必宋璟也對曰誠如聖旨上笑曰朕明日為汝召客明日上謂宰相朕奴毛仲有婚事卿等宜與達官悉詣其第既而日中客未敢舉箸待璟久之方至先執酒西向拜謝飲不盡巵遽稱腹痛而歸續世説時毛仲恩寵莫比每入侍讌賞與諸王姜皎等御幄前連榻而坐𤣥宗或時不見則悄然如有所失見之則歡洽連宵有至日晏其妻已邑虢國夫人賜妻李氏又為國夫人每入内朝謁二夫人同承賜賚舊唐不與交言宋璟為廣府都督𤣥宗思之使内臣楊思朂馳驛往追璟就路竟不與思朂交一言思朂以將軍貴倖殿中訴于𤣥宗上嗟嘆良久拜刑部尚書唐語林公直魏元忠男昇娶滎陽鄭逺女昇與節愍太子謀誅武三思廢韋庶人不克為亂兵所害元忠坐繫獄逺以此乃就元忠求離書今日得離書明日改醮殿中侍御史麻察不平之草狀彈逺曰鄭逺納錢五百萬將女易官既連婚國相父子崇赫迨元忠下獄遂誘私離今日得書明日改醮若言齊鄭非偶不合結褵既冰玉交歡則理資同穴下山之夫未遽御輪之聓已周無聞寄死託孤見危授命斯所謂滓穢流品㸃辱衣冠名教所先理資懲革請裁以憲綱禁錮終身逺從此廢棄朝野咸賞察之公正唐新語駁正安定公主初降王同皎後降韋濯又降崔詵詵先卒及公主薨同皎子繇為駙馬奏請與其父合葬勅特許之給事中夏侯銛駁曰公主初昔降姻梧桐半死逮乎再醮琴瑟兩亡則生存之時已與前夫義絶殂謝之日合從後夫禮葬今若依繇所請却祔舊婚但恐魂而有知王同皎不納於幽壤死而可作崔詵必訴於𤣥天國有典章事難逾越銛謬膺駁正敢廢司存請傍移禮官以求指定朝廷咸壯之上銛幽壤四句皇甫松續牛羊日厯援之以譏牛僧孺矣新書乃云主義絶王廟恩咸崔室逝者有知同皎將拒諸泉銑或訴于帝乃止其文誠省于前矣可云信史耶且幽壤直可云泉耶守直李吉甫字𢎞憲貞元十九年為饒州刺史先是郡城已連失四牧故府癈者七稔公莅任後命啓鑰翦荆棘而居之郡吏以有怪堅請公曰神好正直守直則神避妖不勝徳失徳則妖興居之在人唐語林除穢李吉甫之為相也政事堂有㑹食之牀吏人相𫝊移之則宰臣當罷不遷者五十年公曰朝夕㑹道之所豈可使朽蠧之物穢而不除俗言拘忌何足聽也以此獲免余之願焉令徹而焚之其下鏟去聚壤十四畚議者稱正焉𫝊載不信術數裴度不信術數不好服食每語人曰雞猪魚蒜逢著則喫生者病死時至則行因話録耳語崔咸字重易獨行守正時望甚重裴度自興元入覲李逢吉不欲度復入中書京兆尹劉栖楚逢吉黨也栖楚等十餘人駕言排度而朝士持兩端者日擁度門一日度留客命酒栖楚矯求度之歡曲躬附裴耳而語咸疾其矯舉爵罰度曰丞相不當許所由官囁耳而語度笑而飲之栖楚不自安趨出坐客皆壯之舊唐餓死不為長安中争為碑若市賈大官薨其門如市至有喧競不由喪家裴均之子乞銘於韋貫之縑帛萬匹却之曰寧餓死不茍為之國史補不犯韓愈與人交榮悴不易而觀諸權門豪士如僕隷焉瞪然不顧穆宗以愈為京兆尹六軍不敢犯法私相謂曰是尚欲燒佛骨何可犯之續世説聞語矍然李師中字承之為童子時論其父緯之功於朝久不報自詣漏舎以狀白韓魏公公曰君果讀書自當取科名不用紛紛論賞也承之云先人功罪未辯深恐先犬馬溝壑無以見於地下故忍痛自言若欲求官消釋字第二人及第固不難魏公王尭臣榜第二人登科承之故云公聞其語矍然或云魏公徳量服一世獨於承之終身不能平承之既登第官浸顯益有直聲後王安石相神宗以三不足畏為述承之深詆之至吕獻可中丞死承之以詩哭之有奸進賢須退忠臣死國憂吾生竟何益願卜九泉遊之句安石之黨吕恵卿益怨之終其身不至大用邵氏聞見録逺佞王安石初㕘大政一日因閲晏元獻小詞安石曰為宰相何詎作詞王安國曰彼亦偶然自喜而為爾顧其事業亦不止此時吕恵卿為館職亦在坐遽曰為政必先放鄭聲況自為之乎平甫正色曰放鄭聲不若逺佞人吕大慚東軒雜録不受謁神宗嘗對章惇稱張安道之美問惇識否惇退以告吕恵卿恵卿明日與安道同行入朝告以上語且曰行當大用矣安道縮鼻不對其夕安道適與客坐惇呵引到門謁入安道使謝曰素不相識不敢受謁惇慙怍而退雅量絶纓楚莊王賜羣臣酒日暮酒酣燈燭滅有引美人之衣者美人援絶其冠纓告王趣火來上視纓絶者王曰賜人酒使醉失禮奈何欲顯婦人之節而辱士乎乃命羣臣百餘人皆絶去其冠纓而上火盡懽而罷居三年晉與楚戰有一臣常在前五合五奮首却敵卒得勝之莊王怪問之對曰臣乃夜絶纓者也説苑隠過張安世字子孺為光祿勲郎有醉小便殿上主事白行法安世曰何以知其不反水漿邪如何以小過成罪郎淫官婢婢兄白言安世曰奴以恚怒誣汙衣冠告曰適奴其隠人過失皆此類也前漢汙車茵丙吉字少卿宣帝時為丞相於官屬掾吏務掩過揚善吉馭吏嗜酒數逋蕩嘗從吉出醉嘔丞相車上西曹主吏白欲斥之吉曰以醉飽之失去士使此人將復何所容西曹地忍之此不過汙丞相車茵耳遂不去也上優容何武字君公九江太守戴聖禮經號小戴者也行治多不法前刺史以其大儒優容之及武為刺史行部録囚徒有所舉以屬郡聖曰後進生何知迺欲亂人治皆無所決武使從事㢘得其罪聖懼自免後為博士毁武於朝廷武聞之終不揚其惡而聖子賓客為羣盜得繫廬江聖自以子必死武平心決之卒得不死自是後聖慙服上差彊人意吳漢字子顯性彊方每從征伐諸將見戰陳不利或多惶懼失其常度漢意氣自若唯整厲器械激揚士吏帝時遣人觀大司馬何為還言方脩戰攻之具乃歎曰吳公差彊人意隠若一敵國矣後漢認馬卓茂為丞相史時嘗出行有人認其馬茂問失馬幾日對曰月餘日矣茂曰然此馬畜已數年遂解馬與之曰即非所失幸至丞相府還我乃步輓車去後馬主自得馬慙媿詣茂叩頭謝之東觀記長者劉寛嘗行有人失牛者乃就寛車中認之寛無所言下駕步歸有頃認者得牛而送還乃謝曰慙負長者寛曰物有相類事容悞脱幸勞見歸何為致謝後漢擲杯郭林宗常不睡夜間命作粥魏徳公為之進焉林宗一歠以杯擲地怒而呵之曰為粥不加味如何可食如此之進一呵徳公無變色别𫝊隠几孔融領青州刺史為袁譚所攻自春至夏戰士所餘裁數百人流矢雨集戈矛内接融隠几讀書談笑自若後漢鋤園司馬徽有人倫鑒識時人有以人物問徽者初不辨其髙下每輒言佳其婦諌曰人質所疑君宜辨論而一皆言佳豈人所以咨君之意乎徽曰如君所言亦復佳劉表子琮往候徽遣問在不㑹徽自鋤園琮左右問司馬君在邪徽曰我是也琮左右見其醜陋罵曰死傭將軍諸郎欲求見司馬君汝何等田奴而自稱是邪徽歸家頭著幘出見琮左右見徽故是向老翁恐向琮道之琮起叩頭辭謝徽乃謂曰卿真不可然吾甚羞之此自鋤園唯卿知之耳别𫝊可人費禕字文偉魏軍次于興勢假禕節率衆往禦之光祿大夫來敏至禕語别求共圍棊于時羽檄交馳人馬擐甲嚴駕已訖禕與敏留意對戲色無厭倦敏曰向聊觀試君耳君信可人必能辦賊者也禕至敵遂退蜀志豁情豫章太守顧劭是雍之子劭在郡卒雍盛集僚屬自圍棊外啓信至而無兒書雖神氣不變而心了其故以爪掐掌血流沾褥賓客既散方歎曰已無延陵之髙豈可有喪明之責於是豁情散哀顔色自若説苑眼光出牛背王夷甫嘗屬族人事經時未行遇於一處飲燕因語之曰近屬尊事那得不行族人大怒便舉樏擲其面夷甫都無言盥洗畢牽王丞相臂與共載去在車中照鏡語丞相曰汝看我眼光迺出牛背上世説白眼遂作王夷甫與裴景聲志好不同景聲惡欲取之卒不能回乃故詣王肆言極罵要王荅已欲以分謗王不為動色徐曰白眼兒遂作上如意帖文殷荆州有所識作賦是束晳慢戲之流殷甚以為有才語王恭適見新文甚可觀便於手巾函中出之王讀殷笑之不自勝王看竟既不笑亦不言好惡但以如意帖之而已殷悵然自失上麤食致飽宗慤字元幹少任氣好武不為鄉曲所稱孝建中累遷豫州刺史監五州軍事先是鄉人庾業家甚富豪方丈之膳以待賓客而慤至設以菜葅粟飯謂客曰宗軍人串噉麤食慤致飽而去至是業為慤長史帶梁郡慤待之甚厚不以前事為嫌宋書不競劉訏字彦度家甚貧苦併日而食隆冬之月或無氊絮訏處之晏然人不覺其飢寒也自少至長無喜愠之色每於可競之地輒以不競勝之或有加陵之者莫不退而愧服南史象逸不動梁武帝開講於同泰寺㑹者數萬人南越所獻馴象忽在逸衆皆駭散唯臧盾裴之禮嶷然不動帝甚嘉焉續世説殺鵠不罪梁安成王秀性仁恕喜愠不形於色左右嘗以石擲殺所養鵠齋師請治其罪秀曰吾豈以鳥傷人在京師日臨公事廚人進食誤而覆之去而登車竟朝不飯亦不之誚也梁書把詔温子昇字鵬舉莊帝殺爾朱榮也子昇預謀當時赦詔子昇詞也榮入内遇子昇把詔書問是何文字子昇顔色不變曰勅榮不視之北史擊墜長笑崔康帶毋極令時甄琛為長史曽因公事言競之間以拳擊琛墜牀琛以本縣長笑而不論魏書讓田元文遥字徳逺初自洛遷鄴惟有地十餘頃家貧所資衣食魏之將季宗姓被悔有人冒相侵奪文遥即以與之及貴此人尚在乃將家逃竄文遥大驚追加撫慰還以與之彼人愧而不受彼此俱讓遂為閒田北齊書癡人崔暹字季倫好薦人士言邢邵宜親重言論之際邵遂毁暹文襄不悦謂暹曰卿説子才長子才専言卿短此癡人也暹曰子才言暹短暹説子才長皆是實事不為癡也北史簡澹韋夐字敬逺志尚夷簡澹於榮利所居之宅枕帶林泉夐對翫琴書蕭然自逸時人號為居士焉至有慕其閒素者或載酒從之夐亦為之盡歡接對忘倦子瓘行隨州刺史因疾物故孝寛子總復於并州戰殁一日之中凶問俱至家人相對悲痛而夐神色自若謂之曰死生命也去來常事亦何足悲援琴撫之如舊周書射牛不問牛𢎞弟弼好酒而酗嘗因醉射殺𢎞駕車牛𢎞來還宅其妻迎謂之曰叔射殺牛矣𢎞聞之無所怪問直荅云作脯坐定其妻又云叔忽射殺牛大是異事𢎞曰已知之矣顔色自若讀書不輟隋書僮誤不言唐臨儉薄寡欲不治第宅服用簡素寛於待物嘗欲弔喪令家僮自歸家取白衫家僮誤將餘衣懼未敢進臨察知之使召謂曰今日氣逆不宜哀注向取白衫且止之也又嘗令人煑藥失制潜知其故謂曰隂闇不宜服藥宜即棄之竟不揚言其過其寛恕如此舊唐遺犀碎盤裴行儉嘗令醫人㑹藥請犀角麝香送者誤遺失已而惶懼潜竄又有勅賜馬及新鞍令史輒馳驟馬倒鞍破令史亦逃行儉委所親招到謂曰爾曹豈相輕耶皆錯誤耳待之如故初平都友遮匐大獲環寳蕃酋將士願觀之行儉因宴設遍出歴示有瑪瑙盤廣二尺餘文彩殊絶軍吏王休烈捧盤歴階趣進誤攝衣足跌便倒盤亦隨碎休烈驚惶叩頭流血行儉笑而謂曰爾非故也何至於是更不形顔色舊唐韓琦吏碎玉盞事同寵辱不驚盧承慶總章初考内外官有一官督運遭風失米盧考之曰監運失糧考中下其人容止自若無一言而退盧重其雅量改注曰非力所及考中中既無喜容亦無愧詞又改曰寵辱不驚考中上國史異纂莫窺其際婁師徳樸忠沈厚心無適莫狄仁傑入相也師徳宻薦之及為同列頗輕師徳頻擠之外使師徳知之而不憾則天覺之問仁傑曰師徳賢乎對曰為將謹守賢則臣不知又問師徳知人乎對曰臣嘗同官未聞其知人則天曰朕之用卿師徳所薦也亦可謂知人矣因命左右取筐箧得十許通薦表以賜仁傑仁傑大慙退而嘆曰婁公盛徳我為其所容莫窺其際也吾不逮逺矣新語語林新書王旦薦寇準事同墨汙婁師徳在夏官注選選者就案閲簿師徳曰容我擇之可乎選者不去乃灑筆曰墨汙爾新書弦斷殺子宋則家奴執弩弦斷誤殺其子則不之罪獨異為父禳災李勉字𤣥卿為江西觀察使部人有父病以蠱道為木偶人署勉名位瘞于其壠或以告勉勉曰為父禳災亦可矜也捨之舊唐酒沐不動武元衡之西川大宴從事楊嗣復狂酒逼元衡大觥不飲遂以酒沐之元衡拱手不動沐訖徐起更衣終不令散宴乾􅍧子以米易酒陽城嘗絶糧遣奴糴米奴以米易酒醉卧于路城怪其故與弟迎之奴未醒乃負以歸及覺奴痛咎謝城曰寒而飲何責焉唐書房文烈性温柔未嘗嗔怒為吏部郎中時霖雨絶糧遣婢糴米因以逃竄三四日方還文烈徐謂曰舉家無食汝何處来竟無捶撻北史僮折馬足歸登寛博容物嘗使僮飼馬蹄䟪僮怒擊折馬足登知而不責晩年頗好服食有饋金石之藥者且云先嘗之矣登服之不疑藥發毒幾死方訊云未之嘗他人為之怒登視之無愠常慕陸象先之為人論者亦以為近之舊唐羽化栁公權字誠信志躭書學不能治生為勲戚家碑板問遺嵗時鉅萬多為主蔵豎海鷗龍安所竊别貯酒器杯盂一笥緘縢如故其器皆亡訊海鷗乃曰不測其亡公權哂曰銀杯羽化耳不復更言所寳唯筆硯圖畫自扃鐍之上盜飲具王潜夜宴盜入其家盡取飲具逮明方知笑曰亦好飲耶竟不問九國志血紙墮食吳越王錢俶在國日嘗大㑹賓客食魚羮而庖人因刃傷手以紙濡血紙墮食器中俶得之蔵之袖間顧左右曰無令掌膳者知家王故事屋崩不問王崇文任兼將相而平居被服儒雅風度夷曠在武昌方閲騎士於鞠場旁古屋數十間忽崩聲震數里聞者莫知所為崇文指麾號令訖事不失常度竟亦不問唐書紀𫝊排調嘲戲嘲相調戲相弄也説文滑稽滑謂亂也稽同也以言辯捷之人言非若是説是若非能亂同異也楚詞云將突梯滑稽如脂如韋崔浩云滑音骨稽流酒器也轉注吐酒終日不已言出口成章詞不勝窮若滑稽之吐酒故揚雄酒賦云鴟夷滑稽腹大如壺盡曰盛酒人復藉沽是也又姚察云滑稽猶俳諧也滑讀如字稽言計也以言諧語滑利其知計疾出故云滑稽也靳之宋萬歸宋公靳之曰始吾愛子今子魯囚也吾不愛子矣萬病之遂弑閔公左莊十一御覽敬作愛注戲而相愧曰靳白帖御覽作戲而相狎持狹欲奢齊威王八年楚大發兵加齊齊王使淳于髠之趙請救兵齎金百斤車馬十駟于髠仰天大笑冠纓索絶王曰先生少之乎髠曰何敢王曰笑豈有説乎髠曰今者臣從東方来見道傍有穰田者操一豚蹄酒一盂而祝曰甌窶滿篝汙邪滿車五榖蕃熟穰穰滿家臣見其所持者狹而所欲者奢故笑之於是威王乃齎金璧車馬至趙楚聞之夜引兵去史記人中八寸漢武帝對羣臣云相書云鼻下人中長一寸年百嵗東方朔在側因大笑有司奏不敬方朔免冠云臣誠不敢笑陛下實笑彭祖面長耳帝問之朔曰彭祖正八百嵗果如陛下之言則彭祖人中可長八寸以此推之彭祖面長一丈餘矣帝大笑别𫝊滑稽之雄東方朔名過實者以其該達多端不名一行應諧似優不窮似智正諌似直穢徳似隠非夷齊而是栁下蹠戒其子以上容首陽為拙柱下為工飽食安步以仕易農依隠玩世詭時不逢其滑稽之雄乎前漢夷齊愚夫武帝見畫伯夷叔齊形像問東方朔此何人曰古之愚夫帝曰天下㢘士何為愚夫耶對曰賢者居世與時推移不凝滯於物何不汎汎然如水中之鳬與波俱逝何自苦於首陽乎朔𫝊邪揄光武令王霸至薊市中募人將以擊王郎市中人皆大笑舉手邪揄之霸慙懅而還東觀漢記手相笑也説文三牲備身漢有牛通為隴西主簿馬文淵為太守羊喜為功曹涼部云三牲備身風俗通妲己賜周公初曹操攻屠鄴城袁氏婦子多見侵畧而操子丕私納袁熈妻甄氏孔融與操書稱武王伐紂以妲己賜周公操不悟後問出何經典對曰以今度之想當然耳後操討烏桓又嘲之曰大將軍逺征蕭條海外昔肅慎氏不貢楛矢丁零盜蘇武羊可并案也後漢淫具簡雍字憲和時天旱禁酒釀者有刑吏於人家索得釀具論者欲令與作酒者同罰雍與先主游觀見一男女行道謂先主曰彼人欲行淫何以不縛先主曰卿何以知之雍對曰彼有其具與欲釀者同先主大笑而原欲釀者蜀志談啁流速張裔領留府長史比詣諸葛亮諮事送者數百車乗盈路裔還書與所親曰近者涉道晝夜接賓不得寧息人自敬丞相長史男子張君嗣附之疲倦欲死其談啁流速皆此類也上蜀吳蜀張奉使呉於權前列尚書闞澤姓名以嘲澤澤不能荅薛綜下行酒因勸酒曰蜀者何也有犬為獨無犬為蜀横目勾身虫入其腹奉曰不當復列君吳耶綜應聲曰無口為天有口為吳君臨萬邦天子之都於是舉坐大笑吳志費禕聘吳諸葛恪云有水者濁無水者蜀云吳下臨滄海天子帝都江表𫝊向天穿針諸葛恪對南陽韓文晃誤呼其父字晃詰之曰向人子前呼其父字為是禮也恪笑而荅曰向天穿針而不見者非離于天意有所在耳孫權使太子嘲恪曰諸葛元遜食馬矢一石恪荅曰臣得戲君子得戲父荅明太子未敢上曰可恪曰乞太子食雞卵三百枚上問恪曰人令君食馬矢卿令人食雞卵何也恪荅曰所出同耳呉主大笑啓顔録父名鍾毓為黄門郎有機警在司馬師坐燕飲時陳羣子𤣥伯武周子元夏同在坐共嘲毓師曰臯繇何如人對曰古之懿士顧謂𤣥伯元夏曰君子周而不比羣而不黨世説五伯市魁賈充嘗宴朝士而庾純後至充謂曰君行常居人前今何以在後庾曰且有小市井事不了是以来後世言純之先嘗有五伯者充之先有市魁者充純以此相譏焉晉書俗物敗人意嵇阮山劉在竹林酣飲王戎後往步兵曰俗物已復来敗人意王笑曰卿輩意亦復可敗耶世説勿作常怪荀鳴鶴陸士龍二人未相識俱㑹張茂先坐張令其語以其並有大才可勿作常語陸舉手曰雲間陸士龍荀荅曰日下荀鳴鶴陸曰既開青雲覩白雉何不張爾弓布爾矢荀荅曰本謂雲龍騤騤定是山鹿野麋獸弱弩彊是以發遲張乃撫掌大笑風至塵飛陸機詣王武子武子有百解羊酪指以示之曰卿東吳何以敵此陸曰有千里蓴羮未下鹽豉耳機在坐潘安仁至陸便起去安仁曰清風至塵飛揚陸應聲荅曰衆鳥集鳳凰翔語林無勲頒賚元帝皇子生普賜羣臣殷洪喬謝曰皇子誕育普天同慶臣無勲焉而猥頒厚賚中宗笑曰此事豈可使卿有勲邪聚溷謝幼輿謂周侯曰卿類社樹逺望之峨峨拂青天就而視之其根則羣狐所託下聚溷而已荅曰枝條拂青天不以為髙羣狐亂其下不以為濁聚溷之穢卿之所保何足自稱圖作佛何次道往瓦棺寺禮拜甚勤阮思曠語之曰卿志大宇宙勇邁終古何曰卿今日何故忽見推阮曰我圖數千郡尚不能得卿迺圖作佛不亦大乎忘食孫安國往殷中軍許共論往反精苦客主無間左右進食冷而復煗者數四彼我奮擲麈尾悉脱落滿餐飯中賓主遂至暮忘食殷乃語孫曰卿莫作強口馬我當穿卿鼻孫曰卿不見缺鼻牛人當穿卿頰遇物斯乗顧愷之見謝萬因論神仙顧問云仙者之乗或羊或鹿使君當乗何物耶對曰居家者遇物斯乗卿輩即轅中客也顧氏家𫝊鬼揶揄晉羅友家貧乞祿桓温雖以才學遇之而謂其誕肆非治民才許而不用同府人有得郡者温為坐序别友亦被命至尤遲晚温問之荅曰臣昨奉教旨出門於中路見鬼揶揄云我只見汝送人上郡何不見人送汝上郡友始怖終慙不覺成淹緩之罪温笑其滑稽而顧愧焉後以為襄陽太守晉宫故事續晉陽秋牽船劉道貞遭亂於河側自牽船見一老嫗採梠劉調之曰女子何不調機弄杼因甚傍河採梠嫗荅曰丈夫何不跨馬揮鞭因甚傍河牽船又嘗與一人共飲牽拌草舎中食見一嫗將兩小兒過並著青衣劉調之曰青羊將兩羔嫗荅曰兩猪共一槽道真無以對語林錐槌祖士言與鍾雅相嘲鍾云我汝潁之士利如錐卿燕代之士鈍如槌祖曰以我鈍槌打爾利錐鍾曰自有神錐不可得打祖曰既有神錐亦有神槌鍾遂屈啓顔録王母辛恭静見司馬太傅問卿何處人荅曰西人太傅應聲戲之曰在西頗見西王母不恭静荅曰在西不見西王母過東已見東王公太傅大愧語林一物二稱謝公始有東山之志後嚴命屢臻勢不獲已始就桓公司馬于時人有餉桓公藥草中有逺志公取以問謝此藥又名小草何一物而有二稱謝未即荅時郝隆在坐應聲荅曰此甚易解處則為逺志出則為小草謝甚有愧色桓公目謝而笑曰郝㕘軍此過乃不惡亦極有㑹更相推前王文度范榮期俱為簡文所要范年大而位小王年小而位大將行更相推在前既移久王遂在范後王因謂曰簸之揚之糠粃在前范曰洮之汰之沙礫在後著絮挂閡王文度在西州與林法師講韓孫諸人並在坐林公理每欲小屈孫興公曰法師今日如著敝絮在荆棘中觸地挂閡禁臠孝武屬王珣求女壻曰王敦桓温磊砢之流既不可復得且小如意亦好豫人家事酷非所須正如真長子敬比最佳珣舉謝混後袁山松欲擬謝婚王曰卿莫近禁臠刻畫無鹽庾元規語周伯仁諸人皆以君方樂周曰何樂謂樂毅邪庾曰不爾樂令耳周曰何乃刻畫無鹽以唐突西子也彈棊發八勢王裕之字敬𢎞桓𤣥姊夫也形狀短而起坐端方桓𤣥謂之彈棊發八勢所居舎亭山林澗環周備登臨之美故時人謂之王東山南史妳母何承天徐廣之甥也除著作佐郎年已邁諸佐郎並名家年少潁川荀伯子嘲之常呼為嬭母何曰卿當云鳳凰將九子何言嬭母耶談藪晉穆帝昇平四年鳳凰將九雛見于豐城須古物江夏王乂恭性愛古物常遍就朝求之侍中何朂已有所送而王徵索不已何意不平常出行于道中見狗枷敗犢鼻乃命左右取之還以箱擎送之牋云承復須古物今奉李斯狗枷相如犢鼻謝綽宋拾遺録父諱殷淳字粹逺子孚有父風嘗與侍中何朂嘗共食孚羮盡朂云益殷蓴羮朂司空無忌子也孚徐輟筯曰何無忌諱南史流湎謝瀹字又潔莊子也嘗與劉悛飲推讓久之悛曰謝莊兒不可云不能飲瀹曰茍得其人自可流湎千日悛甚慙無言悛劉勔子也上連璧王儉與王敬則同拜開府儀同三司時徐孝嗣於崇禮門候因嘲之曰今日可謂連璧儉曰不意老子遂與韓非同𫝊上敬别𫝊許而不與張融嘗乞假還武帝問所居荅曰臣陸居無屋舟居無水上未解問其從兄緒緒曰融近東出未有居止權牽小船上岸住在其間上大笑太祖嘗面許融為司徒長史敕竟不出融乗一馬甚痩太祖曰卿馬何痩給粟多少融曰日給一石帝曰何痩如此融曰臣許而不與明日即除司徒長史融與帝寳積俱謁太祖融與御前放氣寳積起謝曰臣兄觸忤宸扆上笑而不問須臾食至融排寳積不與同食上曰何不與賢弟同食融曰臣不能與洩氣之口同盤上大笑談藪執鍮釋寳海嘗因講經執鍮石香爐梁武帝曰法師雖斷慳貪香爐非鍮不執海應聲曰陛下位居宸極帽簮非纛不戴帝大悦衆咸驚嘆髙僧𫝊戴纛梁周捨學通内外兼有口才謂沙門法云曰孔子不飲盜泉之水法師何以捉鍮石香爐荅曰檀越既能戴纛貧道何為不執鍮談藪不遊髙座齊僕射東海徐孝嗣脩葺髙座寺多在彼宴息法雲師亦治蕭寺日夕各遊此二寺隣接而不相往來孝嗣常謂法雲曰法師嘗在髙座而不遊髙座寺荅曰檀越既事蕭門何不至蕭寺談藪學作貴人到溉掌吏部尚書時何敬容以今㕘選事有不允溉輒相執敬容謂人曰到溉尚有餘臭遂學作貴人初溉祖彦之初以擔糞自給故世以為譏云南史到洽一日問劉孝綽吾甚欲買東隣地以益宅而其主難之奈何綽曰但多輦糞於其旁以苦之洽怒竟因事害之劾勉之一目角䲭濟州長史李翥常為主人朝士咸集幽州長史陸仁恵不來翥甚銜之周彦淵曰一目之羅豈能獲鳥翥眇一目陸號角䲭又崔儦謂彦淵曰我拙于書不能儦字使好彦淵曰正可長牽人脚斜飄麃尾談藪使知寒暑徐陵字孝穆摛子也太清二年使魏魏人授館宴賓是日甚熱其主客魏收嘲陵曰今日之熱當由徐常侍來陵即荅曰昔王肅至此為魏始制禮儀今我來聘使卿復知寒暑收大慙南史殷餘梁陸晏子聘魏魏遣李諧郊勞過朝歌城晏子曰殷之餘人正應在此諧曰永嘉南渡盡在江外談藪不林下立盧思道嘗在賓客日中立内史李徳林謂之曰何不就樹䕃思道曰熱則熱矣不能林下立酉陽共甑分炊北齊盧思道聘陳設宴聮句作詩先留者譏北人云榆生欲飽漢草長正肥驢謂北人食榆吳地無驢故有此句思道即續之曰共甑分炊飯同鐺各煮魚謂南人無義同炊異饌也吳人愧之談藪羅刹鬼國隋令盧思道聘陳陳主用觀世音語弄思道曰是何商人齎持重寳思道即以觀世音語報曰忽遇惡風漂墮羅刹鬼國陳主大慙啓顔録毗舎闍鬼隋薛道衡為聘南使時南朝一僧甚辯捷道衡向寺禮拜至佛堂門僧大引聲讀法華經云鳩盤荼鬼今在門外道衡即應聲還以法華經荅云毗舎闍鬼乃在其中僧徒愧服上枷中坐隋河間郡劉焯與從弟炫並有儒學嘗俱犯法被禁縣吏不知其大儒也咸與之枷焯曰終日枷中坐而不見家炫曰終日負枷坐而不見婦上陽貨杜伯隋京兆杜公瞻衛尉臺卿猶子也嘗邀楊玠過宅酒酣因而嘲謔公瞻謂兄既姓陽陽貨實辱孔子玠曰弟既姓杜杜伯嘗射宣王殿内將軍隴西牛子充寮友推其機辨嘗謂玠曰君羊有玠恐不任廚玠曰君牛既克正可烹宰又見玠食芥葅曰君身名玠何得復噉芥葅玠曰君既姓牛何得不斷牛肉有太倉令張䇿者在雲龍門與玠議理屈謂玠曰卿本無徳量忽共叔寳同名玠抗聲曰爾既非英雄敢與伯符連諱太子洗馬蘭陵蕭詡爽俊有才辨嘗謂玠曰流共工於幽州易北恐非樂土玠曰放驩兜於崇山江南豈是勝地談藪榤刁霸長侯白捷辨揚素與相善素闗中人白山東人素嘗卒難之欲其無對而闗中下俚人言音謂水為霸山東亦言擎將去為榤刁素嘗戲白曰山東固多仁義借一而得兩曰何為得兩曰有人從某借弓者乃曰榤刀去豈非借一而得兩白應聲曰闗中人亦甚聰明問一知二素曰何以得知曰日有人問比來多雨渭水漲否荅曰霸長豈非問一知二素服其辨捷啓顔録刺蝟橡斗侯白在散官隷屬楊素愛其能劇談每上番日即令談戲弄或從旦至晚始得歸纔出省門即逢素子𤣥感乃云侯秀才可以𤣥感説一箇好話白被留連不獲已乃云有一大蟲欲向野中尋肉見一刺蝟仰卧謂是肉臠便欲銜之忽被蝟卷著鼻驚走不知休息直至山中困乏不覺昏睡刺蝟乃放鼻而去大蟲忽起歡喜走至橡樹下低頭見橡斗乃側身語云旦來遭見賢尊願郎君且避道上問病裴𤣥本好諧談為户部郎中時左僕射房𤣥齡疾甚省郎將問疾𤣥本戲曰僕射病可須問之既甚矣何須問也有洩其言者既而隨到看𤣥齡笑曰裴郎中來𤣥齡不死也唐新語卷耳韋慶本女選為妃詣明堂謝而慶本兩耳先卷朝士多呼為卷耳時長安令杜松夀見而賀之曰僕固知足下女得妃慶本曰何以知之松夀乃自摸其耳而卷之曰巻耳后妃之徳也羣居解頥賢室相諳吏部侍郎李安期隋内史徳林之孫安平公百藥之子性機警嘗有選人被放訴云羞見來路安期問從何闗來曰從蒲津闗來安期曰取潼闗路去選者曰恥見妻子安期曰賢室本自相諳亦應不笑又一選人引銓安期看判曰第書稍弱對曰昨墜馬損足安期曰損足何廢好書為讀判曰向看書判非但傷足兼以内損其人慙而去僉載㑹昌解頥李迥秀事同佩人崔行功與敬播相逐播帶櫚木欛刀子行功問播云此是何木播對曰是栟櫚木行功曰惟問刀子不問佩人啓顔録尭典舜李尚書巽性嚴毅不好戲笑時周愿知江西鹽鐵留後事將至李公戒從事曰周生好諧謔幸諸賢稍莊以待之及愿至數燕李公寒温外不與之言周亦無由得發一日饌親賓愿亦預焉李公有故人子弟來投落拓不事李公遍問舊别墅及家僮有技者圖書有名者悉云賣却李責曰郎君未官家貧産業從賣何至書籍古畫破除惆悵久之復問曰有一本虞永興手寫尚書此又在否其子慚懼不敢言賣云暫將典錢愿忽言曰此尚書大屯李公忘却先拒其詼諧之事遂問曰尚書何屯愿曰已遭尭典舜又被此兒郎典之李公忿怒之顔大開因話録十二相屬陸長源以舊徳為宣武軍行司馬韓愈為巡官同在使幕或譏年輩相懸周愿曰大蟲老鼠俱為十二相屬何怪之有旬日𫝊於長安中國史補掌印李程在夏口日有過客辭焉李相留更住三兩日客曰業已行矣舟船已在漢口程曰但相信住那漢口不足信其客盧胡掩口而退程又因與從祖弟丞相留守石飲石誤收骰子糾者罰以大白石曰何罰之有程曰汝向忙鬧時把他堂印將去又何辭焉酒家謂重四為堂印盖譏石太和九年冬因李訓之亂倉卒登庸也嘉話又嘗問石汝曽服鍾乳否曰近服之甚覺得力程曰吾全不得汝力盖譏石在相府無急難之效也語林善謔集枉死人面劉𤣥佐鎮汴嘗以䜛怒欲殺軍將翟行恭内外哀之然無敢辨者處士鄭涉能諧隠往見𤣥佐都無言既將辭曰聞翟行恭抵刑乞令所由付屍一觀𤣥佐怪問之對曰嘗聞枉死人面一生未識故借看耳𤣥佐稍悟乃免善謔集窮兵獨舞于頔聞韋臯進奉聖樂亦撰順聖樂以進每宴必使奏之其曲將半行綴皆伏而一人舞于中央幕客韋綬笑曰何用窮兵獨舞以調頔為襄帥暴虐人呼為襄様節度國史補白澤釘門羅隠與顧雲同謁淮南髙駢雲為人素雅重而隠性傲睨髙公留雲而逺隠隠欲歸武陵與賓幕酌餞于雲亭時盛暑青蠅入座髙命扇驅之因謔隠云青蠅被扇扇離席隠見白澤圖釘在門上即應聲曰白澤遭釘釘在門盖譏雲也鑑戒録郡閣閒談謂是寇豹謝觀得好膏藥王建在許下嘗坐事遭徒但無杖痕爾及據蜀得馬涓為從事涓好詆訐建恐為所譏因間曰竊聞外議以吾曽遭徒刑有之乎涓對曰有之建恃無杖痕且對衆因袒以示涓曰請足下試看有遭杖責而肌肉如是耶涓知其詐乃撫背而嘆曰大竒當時何處得此好膏藥來賓佐皆失色而涓晏然五代史補大還丹僧貫休有機辨杜光庭欲挫其鋒每相見必伺其舉措以戲調一旦因舞轡於通衢而貫休馬忽墜糞光庭連呼大師大師數珠落地貫休曰非數珠盖大還丹耳上頭陀左街僧録恵江威儀程紫霄俱辨捷毎相嘲誚江素充肥㑹暑袒露霄忽見之曰僧録琵琶腿江曰先生觱栗頭又見駱駝數頭霄指一大者曰此必頭陀也江曰此輩滋息亦有先後此則先生者非頭陀也紀異録厚朴從容盧質字子徵性好翫謔為莊宗管記㑹醫官陳𤣥補太原府醫學博士所司請稿質立草之末句云既得厚朴之才宜典從容之職莊宗覽之久為啓齒紀異何代無賢湖南馬希聲聞梁朱温嗜食雞牧之殺五十雞為膳居其父武穆王喪發引之夕頓食雞臛數盤吏部侍郎潘起譏之曰昔阮籍居喪食蒸豚何代無賢水草大王李茂真子從曮為鳳翔節度使因生辰秦鳳持禮使陋而多髯魏博使少年如美婦人魏博戲云今日不幸與水草大王接坐秦鳳曰夫人無多言四座皆笑五代史補彌天太保天筞學士徐仲雅有清才性好滑稽周行逢素聞名召為節度判官初王逵之起兵也知設官有輕重權欲得其衆茍能應募皆置司空太保以誘之自是武陵村落廛市豪横之輩稱司空太保者無算三楚新録行逢生日諸道各遣使致賀行逢有矜色謂仲雅曰四鄰亦畏我乎仲雅曰侍中境内彌天太和徧地司空四鄰那得不畏續世説陜西竊盜泰定中西戎寇邉王師失律當國一相以老得謝同列就第為賀飲酣自矜曰某一山民耳遭時得君告老於家當天下無一事之辰可謂太平幸民也石中立曰只有陜西一夥竊盜未獲滿座大笑湘山野録别開太湖王荆公為相大講天下水利時至有願乾太湖云可得良田數萬頃人皆笑之荆公因與客話及之時劉貢父在坐遽對曰此易為也荆公曰何也貢父曰但旁别開一太湖納水則成矣公大笑明道雜志東牕雜録太湖作梁山泊拆名劉貢父與王介甫最為故舊介甫嘗戲拆貢父名曰劉攽不直分文謂其名也貢父遂拆介甫名曰失女便成宕無宀真是妬下交亂真如上頭誤當宁介甫大慙而心銜之王氏黙記漢無子雲王介甫論揚子投閣為史臣之誤劇秦美新之作亦後人誣子雲它日與東坡論及此東坡曰軾亦疑一事荆公曰疑何事東坡云不知西漢果有子雲否聞者皆大笑北牕炙轘六眼龜東坡謁吕㣲仲值晝寢久之方出見便坐有昌蒲盆豢綠毛龜坡指曰此易得耳若六眼則難得㣲仲問六眼龜出何處坡曰昔唐莊宗同光中林邑國嘗進六眼龜時敬新磨在殿下獻口號云不要鬧聽取這龜兒口號六隻眼兒睡一覺抵别人三覺㳺宦紀聞東臯雜録千里更生嘉禾方千里一日㑹相識張更生千里乃作一令戲曰古人是劉更生今人是張更生手内執一卷金剛經問你是胎生卵生濕生化生更生謂方曰古人是馬千里今人是方千里手執一卷刑法志問汝是五千里一千里三千里葦航紀談名字詩張乂延平人入太學為齋長其人眇小而動以苛禮律諸生莆田林叔弓亦輕薄士也乃以其名字作詩賦嘲之其賦云身材短小欠曹交六尺之長腹内空虚乏劉義一㸃之墨其詩云中分爻兩段風使十横斜文上全無分人前強出些聞者絶倒齊東野語死後佳葉衡罷相歸金華里居常召布衣交日飲一日覺意中忽忽不怡問諸客曰某且死所恨未知死後佳否耳一姓金士人曰甚佳葉驚顧問曰何以知之曰使死而不佳死者皆逃歸矣一死不反是以知其佳也滿坐皆笑明年丞相竟不起柱史王觀之云駿馬價錢故事邉郡納粟三千斛授本州助教岐山王生納粟授官以厚價市駿馬猶不愜意每以為恨嘗騎過市醫工李生盛稱壯健以為價錢王怪問之李曰䭾得三千石穀豈非壯健耶葦航紀談夾註轎子施道民為孫威敏所黥既而復得為民借小字軍人肩輿而出曽子固見之曰好一隻夾註轎子志林竿頭吉州士子赴省書先牌廬陵魁選歐陽伯樂或誚之曰有客遥來自吉州姓名桃在擔竿頭雖知汝是歐陽後畢竟從來不識修夷堅支志風之始吳給事女敏慧工詩詞後歸華陽陳子朝名儒也晚年惑一妾縁此遂染風疾一日親戚來問吳同妾在側因指妾曰此風之始也後西南士夫凡有所惑者皆以風之始為口實蕙畝拾英集雋永録天中記卷二十六
