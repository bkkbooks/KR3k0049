body:
  text: 天中記卷六明陳耀文撰律萬事根本王者制事立法物度軌則一禀於六律六律為萬事根本焉其於兵械尢所重故云望敵知吉凶聞聲効勝負百王不易之道也史記律本黄帝使泠綸自大夏之西昆侖之隂取竹之解谷生其竅厚均者斷兩節間而吹之以為黄鍾之宫闕二筩以聽鳯之鳴其雄鳴為六雌鳴亦六闕而皆可以生之是為律本至闕風天地之風氣正闕之谷聲管月令章句曰律率也聲之管也上古聖人本闕别風聲審清濁而不可以文載口傳也於是始鑄金作鍾以主十二月之聲然後以放升降之氣鍾難分别乃截竹為管謂之律律者清濁之率法也聲之清濁以制長短為制宫商所生夫聲有清濁故協以宫商形有長短故檢以丈尺器有大小故定以斛斗質有輕重故平以鈞石故虞書曰乃同律度量衡然則律吕宫商之所由生也宋志候氣夫五音生於隂陽分為十二律轉生六十皆所以紀斗氣效物類也天效以景地效以響即律也隂陽和則景至律氣應則灰除是故天子常以日冬夏至御前殿合八能之士陳八音聽樂均度晷景候鍾律權土灰放隂陽冬至陽氣應則樂均清景長極黄鍾通土灰輕而衡仰夏至隂氣應則樂均濁景短極𬎼賔通土灰重而衡低進退於先後五日之中八能各以候狀聞太史封上效則和否則占候氣之法為室三重戸閉塗釁必周密布緹縵室中以木為案每律各一内庳外高從其方位加律其上以葭莩灰抑其内端案歴而候之闕者灰去其為氣所動者其灰散人及風闕殿中候用玉律闕日如其厯後漢志六律相生元帝自曉音律郎官京房知五聲闕之數因使韋𤣥成等雜試問房房對受學焦延夀闕律相生之法以上生下皆三生二以下生上皆三生四陽下生隂隂上生陽終於中吕而十二律畢矣中吕上生執始執始下生去㓕上下相生終於南事六十律畢矣夫十二律之變至於六十猶八卦之變至於六十四也上九律相生五聲之本生於黄鍾之律九寸為宫或損或益以定商角徵羽九六相生隂陽之應也律十有二陽六為律隂六為吕律以統氣類物一曰黄鍾二曰太族三曰姑洗四曰𬎼賔五曰夷則六曰亡射吕以旅陽宣氣一曰林鍾二曰南吕三曰應鍾四曰大吕五曰夾鍾六曰中吕有三統之義焉前志函三太極元氣函三為一極中也元始也隂陽合徳氣鍾於子化生萬物者也故孳萌於子紐牙於丑引達於寅冐茒於夘振美於辰巳盛於巳咢布於午昧薆於未申堅於申畱孰於酉畢入於戌該閡於亥出甲於甲奮軋於乙明炳於丙大盛於丁豐楙於戊理紀於己斂更於庚悉新於辛懐任於壬陳揆於癸故隂陽之施闕物之終始既類旅於律吕又經歴於日辰闕可見矣上相生周十一辰在六律為陽則當闕六吕為隂則得其所衡而上生於陽推等闕生下之法也所謂律取妻吕生子隂陽升降律吕闕經也晉志娶妻生子九六隂陽夫婦子母之道也律娶妻而吕生子天地之情也六律六吕而十二辰立矣前志注異類為子母謂黄鍾生林鍾也同類為夫婦謂黄鍾以大吕為妻也律娶妻黄鐘生林鐘吕生子林鐘生太族相生相攝凡十二律各有所攝引而申之至於六十相生者相變始黄鍾之管下生林鍾以陽生隂故變也相攝者相通如中吕之管攝於物應以母權子故相變者異時而各應相通者同月而繼應應有早晩者非正律氣乃子律相感寄母中應也毛爽律譜天道一律而生五音十二律而為六十音因而六之六六三十六故三百六十音以當一嵗之日故律厯之數天地之道也淮南子聲生於音楊子雲曰聲生於日律生於辰聲以情質律以和聲聲律相協而八音生宫商角徴羽謂之五聲金石匏革絲竹土木謂之八音聲和音諧是謂五樂日謂甲己為角乙庚為商丙辛為徴丁壬為羽戊癸為闕謂子為黄鍾丑為大吕寅為太簇夘為夾闕巳為中吕午為𬎼賔夫為林鍾申為夷則闕為無射亥為應鍾宋志玉紀聖人觀四時之變刻玉紀其盈虚察闕金均其清濁所以遂八風而宣九徳和大樂而成闕然金質從革侈弇無方竹體圓虚脩短利制是以神瞽作律用寫鍾聲叶時日於晷度效地氣於灰管律之為言法也言陽氣施生各有法也吕之為言助也所以助隂成陽功也晉志截管截管為律吹以考聲列以物氣道之本也後志律之始造以竹為管取其自然圓虚也楊泉物理論曰聽清濁五聲之和然後制為鍾律取𢎞農宜陽縣金門山竹為管河内葭莩為灰或云以律著室中隨十二辰埋之上與地平以竹莩灰實律中以羅縠覆律吕氣至吹灰動縠小動為和大動君弱臣强不動君嚴暴之應也晉志定姓黄帝吹律定姓帝王世紀聖人興起不知姓名當吹律聽聲以别其姓律者六律也易是類謀聖王吹律有姓援神契作律黄帝始作律管通昔黄帝採竹昆崙之隂聽鳯岐陽之下斷自然之物寫自然之音音既協矣黄鍾以立數既生矣氣亦證之於是備數和聲審度嘉量權衡之用皆出於兹後魏志律譜云黄帝遣伶倫氏取竹于嶰谷吹以為黄鍾之宫曰含少聽鳯阿閣之下始造十二律焉乃致天地氣應是則數之始也陽管為律隂管為吕其氣以候四時其數以紀萬物云𨽻首作數盖律之本也故有虞氏用律和聲鄒衍改之以定五始隋志玉管黄帝吹玉律正璇衡拾遺記黄帝作律以玉為管長尺六孔為十二月音至舜時西王母獻昭華之琯以玉為之及漢章帝時零陵文學奚景於冷道舜祠下得白玉琯又武帝太康元年汲郡盗發六國時魏襄王冢亦得玉律則古者又以玉為管矣以玉者取其體含廉潤也晉志淳古葦䈁創覩人籟之源女蝸笙篁仍昭鳯律之首伶倫含少乃擅比竹之工虞舜昭華方𫝊刻玉之美隋志正律舜以䕫為樂正於是正六律和均五聲以通八風吕覽吹律聽聲武王伐商吹律聽聲推孟春以至季冬殺氣相并而音尚宫史律書武王問太公曰律音之聲可以知三軍之消息勝負之決乎太公曰夫律管十二其要有五音宫商角徴羽此真正聲也萬代不易五行之神道之常也金木水火土各以其勝攻也其法以天清淨夜半徃至敵壘去九百步外徧持律管當耳大呼警之有聲應管其來甚微角聲應管當以白虎徴聲應管當以𤣥武商聲應管當以朱雀羽聲應管當以勾陳五管聲盡不應者宫也當以青龍此五行之符佐勝之徴成敗之機微妙之音皆有外候敵人驚動則聽之聞枹鼓之音者角也見火光者徴也聞金鐵矛㦸之音者商也聞人嘯呼之音者羽也寂寞無聞者宫也此五者聲之符也龍韜同律周禮大師執同律以聽軍聲而詔吉凶武王出兵書云王者行師出軍之日大師吹律合音商則戰勝軍士强角則軍擾多變失士心宫則軍和士卒同心徴則將急數怒軍士勞羽則兵弱少威明玉律武帝太康元年汲郡發魏襄王冢得古周時玉律及鍾磬與新律聲韻闇同于時郡國或得漢時故鍾吹律命之皆應晉志主衣從上相承有周時銅尺一枚古玉律八枚今餘七枚檢考參差惟夾鍾玉琯有昔題刻未必是舜時白琯觀其玉色要非近物迺制為尺以相參驗鍾律緯毛爽云梁武時猶有汲冢玉律宋蒼梧時鑚為横吹然其長短厚薄大體具存隋志立均出度景王將鑄無射問律於伶州鳩對曰律所以立均出度也古之神瞽考中聲而量之以制度律均鍾百官軌儀紀之以三平之以六成於十二天之道也夫六中之色也故名之曰黄鍾所以宣養六氣九徳也由是第之二曰太簇所以金奏贊陽出滯也三曰姑洗所以脩潔百物考神納賓也四曰𬎼賔所以安靖神人獻酬交酢也五曰夷則所以詠歌九則平民無二也六曰無射所以宣布哲人之令徳示民軌儀也為之六間以揚沈伏而黜散越也元間大吕助宣物也二間夾鍾出四隙之細也三間中吕宣中氣也四間林鍾和展百事俾莫不任肅純恪也五間南吕贊陽秀也六間應鍾均利器用俾應復也律吕不易無姦物也國語六始為律六間為吕注陽為始隂為間於子為律於丑為吕太元經七律景王曰七律者何對曰凡神人以數合之以聲昭之數合聲龢然後可同也故以七同其數而以律龢其聲於是乎有七律國語七音齊侯至自田晏子曰五聲六律七音八風九歌以相成也清濁小大短長疾徐哀樂剛柔遲速高下出入周疏以相濟也君子聽之以平其心昭二十年注武王伐紂自午及子凡七日王因此以數合之以聲昭之故以七同其數以律和其聲謂之七音吹律知世孔子生不知其父其母匿之吹律自知殷宋大夫子氏之世也論衡孔子曰丘援律而吹命隂得羽之宫演孔圖黍谷方士傳言鄒衍在燕燕有谷地美而寒不生五穀鄒子居之吹律而温氣至而穀生今名黍谷劉向别録師曠之清角鄒衍之吹律列子東風入律武帝時有西胡月氏國王遣使獻香曰臣國去此三十萬里國有常占東風入律百旬不休青雲千吕連月不散者閻浮國將有好道之君矣十洲記協律漢初興張蒼定律乃推五勝之法以為水徳寔因戰國官失其守後秦㓕樂其道浸微蒼補綴之未獲詳究及孝武創制乃置協律之官用李延年以為都尉頗解新聲變曲未達音律之源故其服色不得而定也律譜定氏京房字君明好鍾律知音聲房本姓李推律自定為京氏漢書銅律平帝時王莽凡律度量衡以銅為之銅者名自名也所以同天下齊風俗也銅為物之至精不為燥濕寒暑變其節不為風雨暴露改其形介然有常有似於士君子之行是以用銅也用竹為引者事之宜也漢書鍾律劉歆鍾律書云春宫秋律百卉必彫秋宫春律萬物必榮夏宫冬律雨雹必降冬宫夏律雷必發聲隋牛𢎞傳魏晉律後漢尺度稍長魏代杜䕫亦制律吕以之候氣灰悉不飛晉光禄大夫荀朂得古銅管校䕫所制長古四分方知不調事由其誤乃依周禮更造古尺用之定管聲韻始調左晉之後漸又訛謬律譜以管候氣北齊神武霸府田曹叅軍信都芳深有巧思能以管候氣仰觀雲色嘗與人對語即指天曰孟春之氣至矣人往驗管而飛灰已應每月所候言皆無爽又為輪扇二十四埋地中以測二十四氣每一氣感則一扇自動他扇並住與管灰相應若符契焉志祖珽謂芳曰律管吹灰術甚㣲妙絶來既乆吾思所不至卿試思之芳畱意十數日便報珽云吾得之矣然終須河内葭莩灰祖對試之無驗後得河内灰用術應節便飛餘灰即不動也為時所重竟不行用故此法遂絶北史廢八懸七後周明帝時裴政上書以為昔者大舜欲聞七始下洎周武爰制七音持林鍾作黄鍾以為正調之首及武帝讀史書見武王克殷而作七始又欲廢八懸七并除黄鍾之正宫用林鍾為調首長孫紹逺奏云天子懸八百王共軌下逮周武甫修七始之音詳諸經義又無廢八之典且黄鍾為君天子正位今欲廢之未見其可后竟廢懸七紹逺疾中與齊樹書云古之先聖殊塗一致逮周武克殷逆取順守專用干戈事乖揖讓反求經義是用七音盖非萬代不易之典又命其子覽曰夫黄鍾者天子之宫太吕者皇后之位今廢黄鍾之位是禄去王室若用林鍾為首是政出私門將恐八百之祚不得同姬周之永也北史律譜陳毛爽受京房律法布管飛灰順月皆驗隋開皇九年遣爽及太樂令蔡子元等候節氣令爽草定其法名曰律譜其畧曰班氏漢志盡歆所出也司馬彪志並房所出也爽兄喜陳武帝時以十二管衍為六十律私候氣序並有證應隋志協律郎協律郎掌和六律六吕以辨四時之氣八風五音之節陽為六律所以統氣類物仲冬為黄鍾孟春為太簇季春為姑洗仲夏為𬎼賔孟秋為夷則季秋為無射隂為六吕所以振陽宣氣季冬為大吕仲春為夾鍾孟夏為仲吕季夏為林鍾仲秋為南吕孟冬為應鍾凡律管之數起干九以九相乘八十一以為宫三分去一五十四以為徴三分益一七十二以為商三分去一四十八以為羽三分益一六十四以為角黄鍾為宫太簇為商姑洗為角林鍾為徴南吕為羽還相為宫以生其氣焉唐六典造律以黍始求聲者以律而造律者以黍自一黍之廣積而為分寸一黍之多積而為龠合一黍之重積而為銖兩此造律之本也故為之長短之法而著之於度為之多少之法而著之於量為之輕重之法而著之於權衡唐志合天地之情周世旋宫因孝孫而再設京房灰管遇毛爽而重彰漢章和世實用旋宫漢世羣儒備言其義牛𢎞祖孝孫所由准的也杜䕫漢世之樂郎不識旋宫之義荀勉晉朝之博識莫知古律之則厯動而右移律動而左轉律以厯合氣以錯行金奏隨律而變宫以宣地靈登歌與厯而改調以應天氣歌奏相命所以合天地之情也劉貺太樂令壁記厯詔作事昔者聖王之造厯數也察紀律之行觀運機之動原星辰之迭中寤晷景之長短於是營儀以准之立表以測之下漏以考之布筭以追之然後元首齊乎上中朔正乎下寒暑順序四時不忒夫厯數者先王以憲殺生之期而詔作事之節也使萬國之民不失其業者也徐幹中論至精夫厯數者聖人之所以測靈耀之賾而窮𤣥妙之情也非天下之至精孰能致思焉授時夫隂陽二氣陶育羣品精象所寄是為日月羘生之性章為五才五才之靈五星是也厯所以擬天行而序七耀紀萬國而授人時正厯厯譜者序四時之位正分至之節以㑹日月五星之辰以考寒暑殺生之實故聖王必正厯數以定三統服色之制又以探知五星日月之㑹凶阨之患吉隆之喜其術皆出焉此聖人知命之術也非天下之至林其孰與焉前漢志制術昔者聖人之作厯也觀璿璣之運三光之行道之發斂影之長短斗綱所建青龍所躔參伍以變錯綜其數而制術焉後漢志紀綱萬物昔者聖人擬宸極以運璿璣揆天行而序景曜分辰野辨躔厯敬農時興物利皆以繫順兩儀紀綱萬物者也然則觀象設卦扐閏成文厯數之原存乎此也晉志六徳夫厯有聖人之徳六焉以本氣者尚其體以綜數者尚其文以考類者尚其象以作事者尚其時以占徃者尚其源以知來者尚其流大業載之吉凶生焉是以君子將有興焉咨焉而以從事受命而莫之違也後漢志受命治厯天道之動則當以數知之夫為國家者履端立極必體其元布政考績必因其嵗禮動樂舉必正其朔三農百工必順其時五刑九伐必順其氣庶務有為必從其日月是以聖人受命必治厯數故五紀有常度庶徴有常應正朔行之於天下也五代司天考王朴甲厯伏羲在位百一十年始有甲厯五運通歴神農厯神農始治農功正節氣審寒温為早晩之期故立厯日楊泉物理論調厯炎帝分八節以始農功黄帝紀三綱而闡書契乃使羲和占日常儀占月車區占星氣伶倫造律吕大撓造甲子𨽻首作筭數容成綜斯六術考定氣象建五行察發斂起消息正閏餘述而著焉謂之調厯晉志容成氏造厯黄帝臣也博物記天步有常張衡應間曰渾元初基靈軌未紀吉凶分錯人用瞳矇黄帝為斯深慘有風后者是焉亮之察三辰於上跡禍福乎下經緯厯數然後天步有常則風后之為也後漢風后善於伏羲氏之道故推演隂陽之事春秋内亊黄星黄帝有黄星之祥考定厯紀拾遺記五官太史公曰黄帝攷定星厯建立五行起消息正閏餘於是天地神祗物類之官是謂五官各司其序民有信神有明徳故神降之嘉生史書律隂陽黄帝治天下力牧太山稽輔之以治日月之行律隂陽之氣節四時之度正律厯之數淮南子少昊厯郯子曰鳯鳥氏厯正也左傳厯宗魏董巴議曰伏羲始造八卦作三畫以象二十四氣黄帝因之初作調厯厯代十一更年五千凡有七顓帝以今之孟春正月為元其時正月朔旦立春五星㑹子天厯營室也冰凍始泮蟄蟲始發雞始三號天曰作時地曰作昌人曰作樂鳥獸萬物莫不應和故顓帝聖人為厯宗也晉律厯志絶地天通少皥之衰也九黎亂徳民神雜糅不可方物夫人作享家為巫史民匱于祀禍灾荐臻顓頊受之乃命南正重司天以屬神命火正黎司地以屬民使復舊常無相㑴瀆是謂絶地天通楚語申理當少昊清陽之末九黎亂徳重黎又相顓頊而申理之日月即次則重黎之為也人各有能因蓻受任鳥師别名四叔三官正無二業事不並濟應間立羲和官其後三苗服九黎之徳故二官咸廢所職而閏餘乖次孟􅑍殄㓕攝提無紀厯數失序史記尭復育重黎之後不忘舊者使復典教之故書曰乃命羲和欽若昊天厯象日月星辰敬授民時於是隂陽調和災厲不作休徴時至嘉生蕃育民人樂康鬼神降福舜禹受之循而勿失也中論造厯者羲和之子也尸子厯官文曜鉤曰高辛受命重黎説文唐尭即位羲和立禪夏后制徳昆吾列神成周改號萇𢎞分官革命治厯祐術開業淳燿天光重黎其上也承聖帝之命若昊天典厯象三辰以授民事立閏定時以成嵗功羲和其隆也取象金火革命創制治厯明時應天順民湯武其盛也後漢志瑞厯荀子日月星辰瑞厯是禹桀之所同也禹以治桀以亂注當時星辰書之名也天論殷厯命厯序曰孔子治春秋退脩殷之故厯使其數可傳於後春秋宜以殷厯正之今攷之交㑹不與殷厯相應晉志喪其甲子夏后之時羲和淫湎廢時亂日𦙍乃征之紂作淫雪喪其甲子武王誅之後漢志日官夏殷承運周氏應期正朔既殊創法斯異傳曰火出於夏為三月於商為四月於周為五月是故天子置日官諸侯有日御以和萬國以協三辰至乎寒暑晦明之徴隂陽生殺之數啓閉升降之紀消息盈虚之節皆應躔次而無淫流故能該浹生靈堪輿天地晉志和人道夫厯春秋者天時也列人事而因以天時以作事厚生易金火相革之卦曰湯武革命順乎天而應乎人又曰治厯明時所以和人道也前漢志一月武成惟一月壬辰鄭𤣥曰一月周之正月泰誓一月戊午度師孟津正義曰不言正月而言一月者易革卦彖曰湯武革命順乎天而應乎人象曰君子以治厯明時然則改正治厯必自武王始矣既入商郊始改正朔其初發猶是殷之十二月故史以一月名之五紀周武王訪箕子箕子言大法九章而五紀明厯法自殷周皆創業改制咸正厯紀服色從之順時氣以應天道前漢志周魯厯武王作周厯周公作魯厯董巴議疇人函厲之後周室徴陪臣執政史不記時君不告朔故疇人子弟分散或在諸夏或在夷狄是以其機祥廢而不統史記如淳曰家業世世相傳為疇律年一十三傳之疇官各從其父學韋昭云疇類也孟康云同類之人明厯者也樂彦云疇昔知星人也注祖沖之曰周漢之際疇人喪業曲技競設圖緯寔繁宋志疇官隋劉炫上太子啟曰自木鐸寢聲緒言成燼羣生蕩析諸夏沸騰曲技雲浮疇官雨絶厯紀廢壊千百年矣隋志贊天經時帝王興作未有奉賛天時以經人事者也故孔子制春秋書人事而因以天時以明二物相須而成也故人君不在分至啟閉則不書其時月蓋刺怠慢也中論人事之本後秦姚興甲申天水姜岌造三紀甲子元厯其略曰治厯之道必審日月之行然後可以上考天時下察地化一失其本則四時變移故仲尼之作春秋日以繼月月以繼時時以繼年年以首事明天時者人事之本是以王者重之晉書合璧事類作姚興白誤揆天竹厯者聖人所以揆天行而紀萬國也孔子作春秋正春正秋所以重厯也五家之厯多疎闊唯顓頊厯為微近故張蒼用顓頊厯元封中立太初厯測彌望皆最密推部五行傳十月為正周徳既衰史官廢職疇人分散機祥莫理秦兼天下頗推五勝自以獲水徳之瑞以十月為正漢氏初興多所未暇百有餘載猶行秦厯至于孝武改用夏正隋志太初厯武帝元封七年公孫卿壺遂用司馬遷等言厯紀壊廢宜改正朔上迺詔御史曰迺者有司言厯木定廣延宣問以考星度未能讎也蓋聞古者黄帝合而不死名察發斂定清濁起五部建氣物分數然則上矣書缺樂弛朕甚難之依違以惟未能脩明其以七年為元年造漢太初厯乃選治厯鄧平方士唐都巴郡洛下閎與焉都分天部而閎運筭轉厯其法以律起厯與鄧平所治同更以筭推如閎平法名曰陽厯隂厯迺詔遷用鄧平所造八十一分律厯罷廢尤疏逺者十七家復使校厯律昏明淳于渠復罷太初厯晦朔弦望皆最密日月如合璧五星如連珠陵渠奏遂用鄧平厯前律厯志改厯落下閎字長公明曉天文隠於落下武帝徴待詔太史於地中轉渾天改顓頊厯作太初厯拜侍中不受曰後八百嵗此厯差一日當有聖人定之益部耆舊傳漢厄三七路温舒從祖父受厯數天文以為漢厄三七之間上封事以豫戒成帝時谷永亦言如此漢書三統厯孝成世劉向總六厯列是非作五紀論向子歆究其微眇作三統厯及譜以説春秋推法密要前志三萬六千嵗王莽見盗賊多乃令太史推三萬六千嵗厯紀六嵗一改元布天下書曰紫門圖曰太一黄帝皆僊上天張樂崑崙䖍山之上後世聖主得瑞者當張樂秦終南山之上子之不敏奉行未明乃今諭矣欲以誑燿百姓銷解盗賊衆皆笑之本傳四分厯自太初元年始用三統厯百有餘年者真行日有退無進月有進無退建武八年朱浮言厯不正宜改更至永平五年詔岑普與官課起七月盡十一月弦望凡五官厯皆失元和二年太初失天益逺章帝詔曰朕聞古先聖王先天而天不違後天而奉天時春秋保乾圖曰三百年斗厯改憲史官用太初鄧平術冬至之日日在斗二十二度而厯以為牽牛中星先立春一日則四分數之立春也而以折獄斷大刑於氣已迕用望平和蓋亦逺矣今改行四分以遵於尭以順孔聖奉天之文後律厯志天事函微昔太初厯之行也發謀于元封啟定于天鳯積百三十年是非乃審及用四分建武草創其端元和課校其實永元宣行其法七十餘年然後儀式備立司候有準天事函微若此其難也上乾象厯光和元年蔡邕劉洪補續厯志邕能著文清濁鍾律洪能為筭敘述之光後志劉洪字元卓善筭當世無偶作七曜術及在東觀與蔡邕共述律厯記考驗天官及造乾象術十餘年考驗日月與象相應袁山松書又制遂疾厯以步月行方於太初四分轉更精妙耳宋志獻帝違安元年鄭𤣥受其法以為窮函極微之加注什焉晉志景初厯景初元年山茌縣言黄龍見有司奏以為魏得地統宜以建丑之月為正乃定厯年改大和厯為景初厯魏志蜀呉厯先主在蜀仍漢四分厯呉中書令闞澤受劉洪乾象法於東萊徐岳又加解注中常侍王蕃以洪術精妙用推渾天之理以制儀象及論故呉用乾象厯晉志丙寅厯大象元年太史上士馬顯等上丙寅元厯奏曰臣案九章五紀之旨三統四分之説咸以節宣發斂考詳晷緯布政授時以為皇極者也而乾維難測斗憲易荖盈縮之期致舛咎徵之道斯膺寧止虵或乘龍水能沴火因亦玉羊掩曜金雞喪精王化關以盛衰有國由其隆替厯之時義於斯為重自炎漢已還迄於有魏運經四代事涉千年日御天官不乏於世命元班朔互有㳂改驗近則疊璧應辰經逺則連珠失次義難循舊其在兹乎臣等監考疎密共定今術開元發統肇自丙寅至於兩曜虧食五星伏見叅校積時最為精密庶鐵炭輕重無失寒燠之宜灰箭飛浮不爽隂陽之度隋志抱書慟哭高祖作輔方行禪代之事欲以符命曜于天下道士張賔揣知上意自云𤣥相洞曉星厯因盛言有代謝之徵及受禪之初議造新厯賔等依何承天法微加増損四年二月撰成奏上高祖詔用之張賔厯既行劉孝孫與冀州秀才劉焯並稱其失言學無師法刻食不中所駮凡有六條賔有寵於高祖劉暉附㑹之二人叶議共短孝孫言其非毁天厯孝孫焯等竟以他事斥罷後賔死孝孫仍直太史累年不調寓宿觀臺乃抱其書弟子輿襯來詣闕下伏而慟哭執法拘以奏之高祖異焉以問國子祭酒何安妥言其善即日擢授大都督遣與賔厯比校短長隋志隋新厯隋文帝時張胄𤣥直太史參議律厯時輩多出其下太史令劉暉等甚忌之然暉言多不中胄𤣥所推步甚精密上異之擢兼太史令暉及黨與皆斥逐之定新厯言前厯差一日内史通事顔慜楚上言曰漢時落下閩改顓頊厯作太初厯云後當差一日八百年當有聖者定之計今相去七百一十年術者舉其成數聖者之謂其在今乎本傳皇極厯開皇二十年袁充奏日長影短高祖因以厯事付皇太子遣更研詳著日長之候劉焯以太子新立復増修其書名曰皇極厯駁正胄𤣥之短太子頗嘉之焯為太學博士負其精博志解胄𤣥之印官不滿意稱疾罷歸仁夀四年焯言胄𤣥之誤于皇太子又造厯家同異名曰稽極大業四年帝召焯欲行其厯袁充方幸於帝左右胄𤣥共排焯厯厯竟不行隋志作厯之難昔鄧乎洛下閎造漢太初厯非之者十七家後劉洪蔡伯喈何承天祖中之皆數術之精粹者至於宣考厯書之際猶為横議所排斯道寂寥知音盖寡所以張胄𤣥佩印而沸騰劉孝孫輿棺而慟哭俾諸後學益用為疑舊唐志麟徳厯唐高宗時𫝊仁均戊寅厯推步既益疏李淳風増損劉焯皇極厯作甲子元厯以獻詔頒用之詔曰朕仰稽七曜旁摠五家古所未通今印備載而改之初考此厯嵗推甲子合於天正合朔之夜應以嘉祥五緯若連珠二曜如合璧如此授農昇平可致昔洛下閎漢厯云後八百嵗當有聖人受之自火徳暨我年將八百事合當仁可名麟徳厯㑹要千嵗厯王勃聰警絶衆於推步厯筭尤精嘗作大唐千嵗厯言唐徳靈長千年合承周漢運厯不合承周隋短祚其論大旨云以土王者五十代而一千年金王者四十九代而九百年水王者二十代而六百年木王者三十代而八百年火王者二十代而七百年此天地之長期符厯之大數也自黄帝至漢並是五運真主五行之匝土運復歸唐徳承之宜矣魏晉至于周隋咸非正統五行之沴氣也故不可承之大率如此唐書昔在唐虞之際以斗精受命者七神得四均間氣而生者又二十八人所謂三十五際者也禹以金徳王故夏后之有天下也生數四百年契以水徳王故殷人之有天下也成數六百年稷以木徳王故周人之有天下也成數八百年伯益之命中天而尭族以火徳乘之故漢室之有天下也生數再及二百年其間距王而興不能復大禹九州之跡及勝殘百年之命者皆五神之餘氣也臯繇降徳皇唐復興土精應王厚徳載物生數五百成數千年命厯有歸此其大較轉筭之徒莫能究也緯以入元三百四嵗為徳運七百六十嵗為代軌千五百二十嵗為天地出符四千五百六十嵗為七精返初天人相應合若符節開元張説握符頌序神龍厯武后有光宅厯後又有神龍厯止因麟徳厯法李嶠神龍厯序云自麟徳創紀四十餘年雖斗憲未移而渾儀漸變蔡伯喈所謂術無恒是洛下閎所謂厯後當差爰命典司更從刋正究天道之精㣲開日官之軌憲容成再出不能添黍累之功夀王重生無以議分毫之失豈比夫時乖兩閏始載鄒人之語亥有二首方聞絳老之年英華大衍厯開元中僧一行精諸家厯法言麟徳厯行用既乆晷緯漸差宰相張說言之𤣥宗召見令造新厯推大衍數立術以應之較經史所書氣朔日名宿度可攷者皆合十五年草成而一行卒臨張説與厯官等次成之目太初至麟徳厯有二十二家與天雖近而未密至一行密矣其倚數立法固無以易也後世雖有改作者皆依倣而已畧例所以明逑作本旨也厯議所以攷古今得失也皆足以為將來折𠂻唐志光大殿一行初奉詔於光大殿改撰厯經後移在麗正殿與學士參校厯術集賢注記大衍厯序開元十有三祀詔沙門一行上本黄顓夏商周魯五王一侯之遺式下集大初至于麟徳二十三家之衆議比其同異課其疎密振古未探之象必發揮於神筭大鈞不測之氣盡覼縷於天聰迺更審晷度之長短度星間之廣狹繩九道之朓朒糾五精之進退參大衍天地之數綜八卦六爻之序一轍於文王也覆春秋交蝕之辰研九疇五紀之奥同符於孔子也杼軸萬象優柔四載奏章朝竟一公夕落臣説奉詔金門成書冊府緯合編次勒成一部名曰開元大衍厯所以貫三才周萬物窮數術先鬼神非軒后至聖不啟履端之業非容成詣業不就歸餘之經據其圖也七政之天心不逺守其術也千嵗之日月可知蓋中黄之寶符大紫之神器者也謹以十六年八月端午赤光照室之夜皇雄成紀之辰當一元之出符獻萬夀之新厯伏望藏之書殿録於記言掌之大史頒於司厯文苑張説握符大厯開元正厯握乾符頌序云以數推氣以氣定朔以星正時以閏成嵗考星間而革疎度置嵗差而辨誤日立大衍之紀參大渾之晷合鍾律之聲鬼神之情是謂聖人握符之大厯也彼洛下閎者漢太初時一巧厯耳其云後八百嵗當差一日有聖人正之斯人也抑將露才揚術預證來聖有耆舊之傳記無史䇿之明文然至隋之開皇及麟徳聖厯三家創法一引為徵約之年代則鄰近稽之圖籙則曖昧未有如新厯之昭昭者矣自尭典命羲和修重黎之舊理顓頊之厯上元甲子千五百餘嵗得孔聖而春秋之厯序暨開元十二年甲子凡三千四十嵗遇聖上而大衍之厯興是時也土徳入生數之元天命當出符之㑹信矣玉匱賀表云天旨裁其紀綱日官考其精要梁天監中陶𢎞景著玉匱記云盛徳木子以肇來運一行推璿衡厯得皇家天命成數千年古今祥兆若合符契厯數既在於聖躬卜年又表於長厯和六氣伏見景寅制書以開元厯握乾符垂示天下幸甚其沙門等所言益部耆舊傳洛下閎改顓厯推數最為精密而曰後八百嵗其厯差一日當有聖人定之洛下閎極其數而知來耆舊傳尚其占而示後下協黄鍾上稽𤣥象以和六氣以協三光張曲江集司厯司厯掌國之厯法以頒于四方有戊寅厯麟徳厯神龍厯大衍厯凡天下測景之處分至表準其可載故參考星辰稽驗晷影各有常典六典八改唐始終二百九十餘年而厯八改曰戊寅之厯曰麟徳甲子元厯曰開元大衍厯曰寶應五紀厯曰建中正元厯曰元和觀象厯曰長慶宣明厯曰景福崇元厯而止矣唐志又有至徳厯几九改正一氣天福三年馬重績上言厯象王者所以正一氣之元宣萬邦之命而古今所紀考審多差五代本傳欽天厯王朴為人明敏多材智隂陽律厯之法莫不通焉周顯徳二年詔朴校定大厯乃削去近世符天流俗六經之學設通經統三法以嵗軌離交朔望周變率策之數步日月五星為欽天厯上劉羲叟曰前世造厯者其法不同而多差至唐一行始以天地之中數作大衍厯最為精密後世善治厯者皆用其法惟寫分擬數而已至王朴亦能自為一家朔望正二曜協交㑹密晷漏實五緯齊然不能宏深簡易而徑急是耴至其所長聖人不能廢也上變厯疏密二代之厯多至八百年少至四百年而一變者非厯之差也正朔既改厯不容不變也漢厯率百年一變唐厯率百年三變宋朝厯率百年而六變以其用之乆近觀之則法之疏密可知矣王海求詳朱差日蔡邕杜預用新術治厯至何承天祖沖之考索愈精承天以月蝕之衝推日躔次沖之言古衝之作在漢初周未所謂求詳於未差之前蓋劉歆班固所不能到也上厯數綱紀董巴議云聖人迹太陽於晷景效太隂於弦望明五星於見伏正是非於晦朔弦望伏見者厯數之綱紀檢驗之明者也晉志敬天育物厯者先王所以明時授人敬天育物者也辰極常居斗運不息晦明相推而變月寒暑徃來而成嵗日月右進周天之度啓星辰左旋正時之氣合積餘分而致閏配甲子而設蔀張説序該羅厯義張載弟前烏程令冗依蔡邕注明堂月令中台要解又綴諸家厯數而為厯讚秘書監荀崧見讚異之云信該羅厯表義矣王隠晉書白猿厯周羣妙閒筭術䜟説遊岷山採藥見一白猿從絶峯而下化為一老翁握中有玉版長八寸以授羣羣問其年答曰今已衰邁忘其生之年月憶從軒轅之時始學厯數風后容成皆黄帝之史就余授厯術至顓頊更考定日月星辰之運多差異及春秋時有子韋子野裡竈之徒權畧雖驗未得其門爾來世代不復可紀因以相襲至大漢之時有洛下閎得其大旨羣復其言更精勤筭術乃考校年厯之運驗于圖緯知蜀應㓕及明年歸命皆稱周羣詳隂陽之精妙也蜀人謂之後聖拾遺閏王在門中餘分之月五嵗再閏也告朔之禮天子居宗廟門中故其字從王在門中也周禮曰閏月王居門中終月也説文陽餘月猶閏何周天三百六十五度四分度之一十二月日不匝十二度故三年一閏五嵗再閏也明隂不足陽有餘閏也者陽之餘也白虎通閏餘黄帝起消息正閏餘史記乖次三苗服九黎之徳故重黎二官咸廢所職而閏餘乖次孟􅑍殄㓕攝提無紀厯數失序土正時文公元年閏三月非禮也先王之正時也履端於始舉正於中歸餘於終履端於始序則不愆舉正於中民則不惑歸餘於終事則不悖左傳不告朔文公六年閏月不告朔非禮也閏以正時時以作事事以厚生生民之道於是乎在矣不告閏朔弃時政也何以為民上注云四時漸差則致閏以正之蔀首周道既衰幽王既喪天子不能班朔魯厯不正以閏餘一之嵗為蔀首自文公閏月不告朔至此百有餘年莫能正厯數故子貢欲去其餼羊孔子愛其禮而著其法於春秋前志司厯過哀公十二年冬十有二月螽季康子問於孔子曰今周十二月夏之十月而猶有螽何也對曰火伏而後蟄者畢今火猶西流司厯過也康子曰所失者幾月也曰於夏十月火既沒矣今火見再失閏也家語左傳閏在嵗後漢祖受命因秦之紀十月為年首閏常在嵗後不稽先代違於帝典後志天氣備光武詔張純曰禘祫之祭不行乆矣純奏曰三年一閏天氣小備五年再閏天氣大備三年以祫五年以禘注閏者嵗之餘後本傳告朔武后詔羣臣議告朔于明堂張齊賢曰穀梁氏稱閏月天子不告朔它月故告朔矣左氏言魯不告閏朔為棄時政則諸侯雖閏告朔矣唐本傳非常月閏月不告朔曷為不告朔天無是月也閏月矣何以謂之天無是月非常月也公羊文公六年附月餘日閏月者附月之餘日也積分而成於月者也天子不以告朔而喪事不數也糓梁傳叢殘之數閏是叢殘之數非月之正糓梁注二終并終數為十九易窮則變故為閏法前志孟康曰天終數九地終數十窮終也言閏亦日之窮餘故取二終之數以為義注合二終以紀閏餘唐志無中氣書稱朞三百六旬有六日以閏月定四時成嵗允釐百工庶績咸熙是以天子必置日官諸侯必置日御世修其業以考其術舉全數而言故曰六日真實五日四分之一日日行一度而月日行十三度十九分度之有畸日官當㑹集此之遲疾以考成晦朔錯綜以設閏月閏月無中氣而北斗邪指兩辰之間所以異於他月也積此以相通四時八節無違乃得成嵗其微密至矣得其精微以合天道事叙而不悖然隂陽之運隨動而差差而不已遂與厯錯故仲尼􅉌明每於朔閏發文蓋矯正得失因以宣明厯數也杜預長厯周禮云王出居寢門故為閏字門中從王也是月也不舉百事以無中氣也荆楚嵗時記天度岐伯曰天以六六為節地以九九制㑹者所以正天之度氣之數也天度者所以制日月之行也氣數者所以紀化生之用也天為陽地為隂日為陽月為隂行有分紀周有道理日行一度月行十三度而有竒焉故大小月三百六十五日而成嵗積氣餘而盈閏矣立端於始表正於中推餘於終而天度畢矣注云端首也始初也表彰示也正斗建也中月半也推退位也言立首氣於初節之日示斗建於月半之辰退餘閏於相望之後是以閏之前則氣不及月閏之後則月不及氣故常月之制建初立中閏月之紀無初無中縱厯有之皆他節氣也故厯無云其候閏某月節閏某月中也推終之義斷可知乎故曰立端於始表正於中推餘於終也由斯推日成閏故能令天度畢焉素問十九年七閏𤣥始厯以為十九年七閏皆有餘分是以中氣漸差據渾天二分為東西之中而晷景不等二至為南北之極而進退不齊此古人所未達也唐厯志二中厯本議曰天數中於五地數中於六合二中以通律厯天有五音所以司日也地有六律所以司辰也參伍相周究於六十聖人以此究天地之心唐律志此係厯藕楊應閏藕生應月至閏月益一節東坡詩惟有黄楊厄閏年小月减日陽月者所以補小月之减日以正嵗數故三年一閏五年再閏獨斷嵗陽甲子記稱大橈作甲子𨽻首作數二者既立以比日表以管萬事後志吕氏春秋曰黄帝師大橈月令章句大橈探五行之情占斗綱所建於是始作甲乙以名日謂之幹作子丑以名日謂之枝枝幹相配以成六旬注干支于幹也其名有十亦曰十母即甲乙丙丁戊己庚辛壬癸是也支枝也其名一十有二亦曰十二子即子丑寅卯辰巳午未申酉戌亥是也蔡邕獨斷太嵗太嵗在甲曰閼逢在乙曰旃蒙在丙曰柔兆在丁曰强圉在戊曰著雍在己曰屠維在庚曰上章在辛曰重光在壬曰𤣥黓在癸曰昭陽爾雅閼蓬許慎注曰言萬物鋒芒欲出擁遏未通故曰閼蓬也旃蒙在乙言萬物遏蒙甲也柔兆在丙萬物皆生枝布葉故曰柔兆也强圉在丁言萬物剛盛故曰强圉也著雍在戊言位在中央萬物繁養四方故曰著雍也屠維言在萬物各成其性故己曰屠維屠别維離也上章在庚言隂氣上升萬物畢生故曰上章也重光在辛言萬物就成熟其煌煌故曰重光𤣥黓在壬言嵗終包任萬物故曰𤣥黓也昭陽在癸言陽氣始萌萬物合生故曰昭陽以上俱淮南子甲漢律厯志出甲於甲史記曰甲者言萬物剖符甲而出也説文甲位東方之孟陽氣萌動从木載孚甲之象徐曰孚猶葭孚殻蘀也乙志奮軋於乙史乙者言萬物生軋軋也說文乀象春草木寃曲而出隂氣尚强其出乙乙也徐曰乙乙未展也京房易傳乙屈也釋名乙軋也自抽軋而出也丙志明恊於丙史丙者言陽道著明故曰丙説文位南方萬物成炳然隂氣初起陽氣將虧从一入門一者陽也徐曰冂猶門也天地隂陽之門戸也功成將去冂也釋名丙炳也物生炳然皆著見也丁志大盛於丁史丁者言萬物之丁壯也故曰丁説文夏時萬物皆丁壯成實徐曰物挺然成立之貌萬物盛於丙成於丁釋名丁壯也物體皆丁壯也戊志豐茂於戊釋名戊茂也物皆茂盛也説文戊中宫也象六甲五龍相拘絞也徐曰五土無定居主在中往來不相越故曰拘絞月令其日戊巳注戊言茂己言起己志理紀於己釋名已紀也皆有定形可紀識也説文己中宫也象萬物辟藏詘之形也徐曰萬物與隂陽之氣藏則歸土屈曲包容象人腹圜曲也庚志斂更於庚史庚者言隂氣庚萬物故曰庚説文位西方象秋時萬物庚庚有實也徐曰史記大横庚庚堅强之貌辛志悉新於辛史辛者言萬物之辛生故曰辛説文秋時金剛味辛辛痛泣出徐曰言萬物方盛初見斷制故辛痛也釋名辛新也物初新者皆收成也壬志懐妊於壬史壬之為言任也言陽氣任養萬物於下也説文壬位北方也隂極陽生故易曰龍戰于野戰者接也象人懐妊之形承亥壬以子生之敘也釋名壬妊也隂陽交接懐妊也至子而萌也癸志陳揆於癸史癸之為言揆也言萬物可揆度故曰癸説文冬時水土平可揆度象水從四方流入也釋名癸揆也揆度而生乃出之也爾雅癸歸也五行屬水五運屬火嵗名太嵗在寅曰攝提格在卯曰單閼在辰曰執徐在巳曰大荒落在午曰敦牂在未曰恊洽在申曰涒灘在酉曰作噩在戊曰閹茂在亥曰大淵獻在子曰困敦在丑曰赤奮若攝提格李巡注爾雅云萬物承陽而起故曰攝提格起也孔文祥云以嵗在寅正月出東方為衆星之紀以攝提宿故曰攝提以其為嵗月之首起於孟􅑍故曰格正也索隠曰天官書云攝提三星若鼎足句直斗杓所指以建時節故為攝提格格至也言攝隨月建至也楚辭攝提貞于孟􅑍兮王逸注孟始也正月為􅑍史記作正月其名監徳單閼許慎注曰單盡閼止也言陽氣推萬物而起隂氣盡止也史二月其名降入執徐執蟄徐舒也言伏蟄之物皆散舒而出也史三月其名青章大荒落荒大也方萬物熾盛而大出霍然落落大布散史四月其名跰蹟敦牂言萬物皆盛壯也敦牂敦盛牂壯也史五月名啟明協洽恊和洽合也言隂陽化生萬物和合史六月其名長烈涒灘涒大灘脩也言萬物皆脩其精氣也李巡云涒灘物吐秀傾垂之貌吕氏春秋曰維秦八年嵗在涒灘高誘注涒大也灘循也萬物皆大循其情性也涒灘誇人短舌不能言為涒灘也史七月其名大晉作噩作鄂零落也萬物皆陊落李巡云作鄂萬物皆落㧞起之貌史八月其名長王閹茂掩蔽茂冐言萬物皆蔽冐史九月其名天睢大淵獻淵藏獻迎也言萬物終於亥大小深藏窟伏以迎陽孫炎云淵深也大獻萬物於天深謂盖藏之於外者也史十月其名大章困敦困混敦沌也言陽氣皆混沌萬物牙孽也孫炎云言萬物初萌混沌於黄泉之下史十一月其名天泉赤奮若奮起也若順也言陽氣奮迅萬物而起無不順其性也赤陽色李巡云言陽氣奮迅史十二月其名天皓志作昊子前志隂陽合徳氣鍾於子化生萬物者也故孽萌於子史記子者滋也滋者言萬物滋於下也説文子十一月陽氣動萬物滋入以為稱徐曰十一月夜半陽氣所起人承陽故以為稱白虎通曰子孶也孶孶無已也釋名子孶也陽氣始萌孶生於下也於易為坎坎險也丑志紐牙於丑史丑者紐也言陽氣在上未降萬物厄紐未敢出也説文丑紐也十一月萬物動用事象手之形時加丑亦舉手時也徐曰丑象手有所執也昧爽為丑人皆起有為也釋名丑紐也寒氣自屈紐也於易為艮艮限也時未可聽物生限止之也寅志引達於寅史寅言萬物始生螾然也説文寅髕也正月陽氣動去黄泉欲上出隂尚彊也象穴不達髕寅於下也徐曰髕擯斥之意人陽氣上鋭而出閡於寅也臼所擯也釋名寅演也演生物也夘志茂茆於卯師古曰茆謂叢生也史卯之為言茂也言萬物茂也説文卯冐也二月萬物冐地而出象開門之形故二月為天門徐曰二月隂不能制陽冐而出也天門萬物畢出也晉樂志卯茂也謂陽氣生孶孶茂也釋名於易為震二月之時雷始震也辰志振美於辰史辰者言萬物之蜄也説文辰震也三月陽氣動雷電振民農時也釋名辰伸也物皆伸舒而出也巳志巳藏於巳史巳者言陽氣之巳盡也説文巳也四月陽氣巳出隂氣巳藏萬物見成文章故巳為蛇象形徐曰巳主蛇象蛇之變化有文章也釋名巳巳也陽氣畢布巳也於易為巽巽散也物皆生布散也又云巳巳也如出有所為畢巳復還而入也毛氏曰陽氣生於子終於巳巳者終巳也象陽氣既極囘復之形故又為終巳字午志咢布於午史午老隂陽交故曰午説文午牾也五月隂氣午逆陽冐地而出也徐曰人為陽一為地亅為隂氣貫地午逆陽也五月陽極隂生仵者正衝之也午亦象衝逆也釋名午仵也隂氣從下上與陽相仵逆也於易為離離麗也物皆附麗陽氣以茂也未志昧薆於未師古曰薆蔽也史未者言萬物皆成有滋味也説文未味也六月之辰也五行木老於未象木重枝葉也釋名未昧也日中則昃向函昧也申志申堅於申史申者言隂用事申賊萬物故曰申淮南子申者呻之也説文申神也七月隂氣成自申束杵臼自持也吏以餔時聽事申旦政也釋名申身也物皆成其身體各申束之使備成也酉志畱孰於酉史酉者萬物之老也故曰酉淮南子酉者飽也説文酉就也八月季秋可為耐酒徐曰就成熟也釋名酉秀也秀者物皆成也於易為兊兊恱也物得備足皆喜恱也戌志畢入於戌史戌者言萬物盡滅故曰戌説文滅也九月陽氣微萬物畢成陽下入地戌舍一也五行土生於戊盛於戊釋名戌恤也物當收斂矜恤之也亦言脱也落也亥志該閡於亥史亥者該也言陽氣藏於下故該也孟康云閡藏塞也隂雜陽氣藏塞為萬物作種也説文亥荄也有微陽起接盛隂徐曰言萬物之荄皆動也从上者陽㣲在下也十月盛隂感陽萬物皆舍育於内象人之懐妊也釋名亥核也收藏百物核取其好惡真偽也亦言物成皆堅核也十二辰禽五行之氣相賊害含血之蟲相勝服其驗何在曰寅木也其禽虎也戌土也其禽犬也丒未亦土也丒禽牛未禽羊也木勝土故犬與牛羊為虎所服也亥水也其禽豕也巳火也其禽蛇也子亦水也其禽鼠也午亦火也其禽馬也水勝火故豕食蛇火為水所害故馬食鼠屎而腹脹然亦有不相勝者午馬也子鼠也酉鷄也卯兔也水勝火鼠何不逐馬金勝木鷄何不啄兔亥豕也未羊也丑牛也土勝水牛羊何不殺豕巳蛇也甲猴也火勝金蛇何不食獼猴猴畏鼠者也囓獼猴者犬也鼠水獼猴金也水不勝金獼猴何故畏鼠戌犬也申猴也土不勝金猴何故畏犬十二辰之禽以氣性相克則尤不相類應大凡含血之蟲相服至于相啖食者以齒牙頓利觔力優劣自相勝服也論衡相屬隂陽日家璩公選云子寅辰午申戌俱陽數取相屬之竒數以為名鼠五指虎五指龍五指馬單蹄猴五指狗五指丑卯巳未酉亥俱隂數取相屬之隂數以為名牛四𤓰兔兩𤓰蛇雙舌羊四𤓰鷄四𤓰猪四𤓰暘谷謾録肖形不足術家以十二肖配十二辰每肖各有不足之形焉如鼠無牙牛無齒虎無脾兔無唇龍無耳蛇無足馬無贍羊無神猴無臀鷄無腎犬無腸猪無筋人則無不足也草木子月陽月在甲曰畢在乙曰橘在丙曰脩在丁曰圉在戊曰厲在己曰則在庚曰窒在辛曰塞在壬曰終在癸曰極爾雅月名正月為􅑍二月為如三月為寎四月為余五月為臯六月為且七月為相八月為壯九月為𤣥十月為陽十一月為辜十二月為涂上疏此辨以日配月之名也設若正月得甲則曰畢􅑍二月得乙則曰橘如三月得丙則曰脩寎四月得丁則曰圉余五月得戊則曰厲臯六月得己則曰則且七月得庚則曰窒相八月得辛則曰塞壯九月得壬則曰終𤣥十月得癸則曰極陽十一月得甲則曰畢辜十二月得乙則曰橘涂周而復始亦可知也若史記歴書云月名畢聚也載祀載嵗也夏曰嵗商曰祀周曰年唐虞曰載爾雅疏夏曰嵗取嵗星行一次夏書曰毎嵗孟春遒人以木鐸狥子路是也商曰祀取四時一終則以祀者嗣也取其興來繼往之義孫炎曰取四時祭祀一訖商書曰惟元祀十有二月乙丑伊尹祀于先王是也周曰年者取禾一熟也案說文云年穀熟也從禾千聲春秋曰大有年然則年者禾熟之名每嵗二熟故以為嵗名左傳曰卜年七百是也唐虞曰載載始也取物終更始尭典曰朕在位七十載舜典曰五載一巡守是也行事直辰春秋元命苞曰嵗之為言遂也注遂出也出行事於所直辰也釋名曰嵗越也越故限也年進也進而前也祀巳也新氣生故氣巳也載載生主言年五運岐伯曰五日謂之候三候謂之氣六氣謂之時四時謂之嵗而各從其主治焉五運相襲而皆治之終朞之日周而復始時立氣布如環無端候亦同法素問天氣周孔子曰嵗三百六十日而天氣周八卦用事各四十五日而備嵗用事易乾鑿度改節易常太隂治春則欲行柔恵温良太隂治夏則欲布施宣明太隂治秋則欲脩備繕兵太隂治冬則欲猛毅剛强三嵗而改節六嵗而易常故三嵗而一饑六嵗而一衰十二嵗而一康淮南子天道嵗在申酉乞漿得酒嵗在辰巳嫁妻賣子夫盛衰更代豐荒相半天之常道也袁子正書語四仲四孟律厯志分二十八宿為十二次晉灼注天文志云太嵗在四仲則嵗行三宿太嵗在四孟四季則嵗行二宿二八十六三四十二面行二十八宿十二嵗而周天是嵗星年行一次也後律厯志日行一度積三百六十五度四分度之一而周天一匝名曰嵗四時備成日周于天一寒一暑四時備成萬物畢改攝提遷次青龍移辰謂之嵗嵗首至也月首朔也至朔同日謂之章同在日首謂之蔀蔀終六旬謂之紀嵗朔又復謂之元後志二吕目嵗前志春秋二吕目嵗鄧展曰春秋則為二矣孟康曰春為陽中萬物以生秋為隂中萬物以成舉春秋以目一嵗終陽董仲舒曰天使陽出布施於上而主嵗功使隂入伏於下而時出佐陽陽不得隂之助亦不能獨成嵗終陽以成嵗為名此天意也前漢書統首嵗星主嵗事為統首號令所紀上嵗朝尚書大傳曰凡六沴之作嵗之朝月之朝日之朝后王受之嵗之中月之中日之中則正卿受之嵗之夕月之夕日之夕則庶民受之鄭𤣥曰自正月盡四月為嵗之朝後志曰凡六氣相傷謂之沴一白二十二祖摩拏羅至月氏國鶴勒那問祖曰我止林間已經九白印度以一年為一白傳燈録斗指斗正月指寅二月指卯三月指辰四月指巳五月指午六月指未七月指申八月指酉九月指戌十月指亥十一月指子十二月指丑終而復始淮天文訓旬浹十日曰旬十二日曰浹十日亦曰浹禮信次一宿為舍二宿為信過信為次左傳十時日之數十故有十時之數亦當十位自王已下其二為公其三為卿注日中當王食時為公平旦為卿鷄鳴為士夜半為皁人定為輿黄昏為𨽻日入為僚晡時為僕日昳為臺隅中日出闕不在第尊王公曠其位昭五剛柔五剛甲丙戊庚壬五柔乙丁己辛癸注王制注敬日故善日者王善時曰霸王者敬日霸者敬時茍强國篇愛日孔子愛日又或曰君子愛日乎楊五百篇有四子産曰君子有四時朝以聽政晝以訪問夕以脩令夜以安身左傳惜隂聖人不貴尺之璧而重寸之隂時難得而易失也禹之趨時也履遺而弗取冠挂而弗顧非争其先也而争其得時也淮南子競辰辰乎辰曷來之遲去之速也君子競諸淮南子握太嵗晁良正性剛不怖鬼每年常掘太嵗地掘後忽見一肉物良正打之三日送於河其夜使人視之三更後車馬甚衆來至肉所問太嵗何故受此屈辱不讎報之太嵗曰彼正榮盛無奈之何暨明失所在廣異記董表儀家在河沙塘東嘗欲撤屋掘土隂陽人云太嵗居北方不可興工既而掘深三尺許得肉塊漫漫然董惡之投諸河訖亦無禍傳載築牆太嵗工部員外張周封言舊莊在城東狗梁觜西嘗築牆於太嵗上一夕盡崩且意其基虚工不至率莊客指揮復築之高未數尺炊者驚呌曰怪作矣遽視之飯數斗悉躍出地著牆匀若蠶子無一粒重者矗牆之半如界焉因謁巫酹地謝之亦無他酉陽雜俎掘嵗得禍上元末復有李氏家不信太嵗掘之得一塊肉相傳云得太嵗者鞭之數百當免禍害李氏鞭九十餘忽然騰上因失所在李氏家有七十二口死亡畧盡惟小葪公尚存李氏兄弟恐其家滅盡夜中令奴悉作鬼裝束劫小葪便藏之唯此子得存其後襲封葪公廣異記寧州有人亦掘得太嵗大如方狀類赤菌有數千眼其家不識移至大路遍問識者有胡僧驚曰此太嵗也宣速埋之其人遽送舊處經一年人死畧盡上萊州即墨縣有百姓玉豐兄弟三人豐不信方位所忌嘗於太嵗上掘坑見一肉塊大如斗蠕蠕而動遂填其坑肉隨填而出豐惧棄之經宿肉長塞於庭兄弟奴婢數日内悉暴卒惟一女子存焉酉陽雜俎熱熱煑釋名曰熱爇也如火之燒熱也或曰暑煑也如煑物也溽暑禮曰季夏之月土潤溽暑説文曰溽濕暑也焦金爛石夏至隂陽之㑹北方而物動於下南方物動於上故至日後為熱焦金爛石也春秋繁露䕃暍武王䕃暍人於柳下而天下懐淮南子武王見暍人王自左擁而右扇之世説身熱阪罽賔國武帝時剽殺漢使成帝時復遣使奉獻謝罪杜欽説大將軍王鳯不令使使向罽賔國曰此國道經大頭痛小頭痛之山赤土身熱之阪令人身熱無色頭痛嘔吐驢畜盡然漢書夀麻夀麻之國爰有大暑不可以往山海經赤帝所司南方之極自北戸之界至炎風之野赤帝祀融之所司淮南子穿岸為室馬援征武陵五溪蠻夷進營壺頭賊乘高守隘水疾舩不得上㑹暑甚士卒多疫死援亦中病遂因乃穿岸為室以避炎氣本傳武陵記曰壺頭山邉有石窟即援所穿室也室内有蛇如百斛舩大云是援之餘靈也渡瀘諸葛亮出師表曰五月渡瀘深入不毛蜀志益州記曰瀘水即武侯渡處水有熱氣暑天不敢行入水避暑葛洪從祖仙公毎大醉及夏天盛熱輒入深水底入日乃出者正以能閉氣胎息故耳抱朴子露臺桂館一名甘泉作迎風觀寒露臺以避暑潘岳關中記熱身熨婦荀奉倩與婦至篤冬月婦病熱乃出中庭自取冷還以身熨之婦亡奉倩後少時亦卒以是獲譏於世世説𤓰鎮心鄭灼字茂昭勵志好學多苦心熱若𤓰時輒偃臥以𤓰鎮心便起讀誦其篤志如此梁書避暑九成宫太宗欲幸九成宫馬周上疏曰宫去京三百里本為避暑行也太上皇畱熱處而陛下走凉處温清之道臣所未安太宗善其言唐書童子叅見岑文本避暑山亭忽有報上清童子元寶衣淺服青衣曰此上清五銖服出門不見伺之東行數步於院牆下瞥然而沒文本命工力掘之古墓中得古錢一枚文本方悟上清童子是青銅名元寳錢之文也愽異志積氷成山𤣥宗起凉殿拾遺陳知節上疏極諫上令九士召對時暑毒方甚上在凉殿座後氷激扇車風獵衣襟知節至賜坐石塌隂􅋼沉吟仰不見日四隅積氷成山簾水飛灑坐内含凍復賜氷屑麻飲陳體生寒粟腹中雷鳴再三請起方許上猶拭汗不已陳纔及門遺洩狼籍逾日復召謂曰卿論事宜審勿以己方萬乘也廬陵官下記冷蛇申王有肉疾腹垂至骭𤣥宗召南方取冷蛇數脩賜之蛇長數尺色白不螫人執之冷如握氷申王腹有數約夏月置于約中不復覺煩暑酉陽雜俎出征冐暑王承宗叛詔吐突承璀出討兵老不決白居易上言今暑濕暴露兵氣薫蒸雖不顧死孰堪其苦本傳辟暑犀文宗延學士於内庭討論經義李訓講周易微義頗叶於上意時方盛夏遂命取氷玉腰帶及辟暑犀如意以賜訓訓謝之上曰如意足以與卿為談柄也神異龍皮避暑韋澳孫宏大中時同在翰林盛暑上在太液池中宣二學士既赴召中貴人頗以絺綌為訝初殊未悟及就坐但覺寒氣逼人熟視有龍皮在側尋宣賜銀餅饀食之甚美既而醉以醇酎二公因兹苦河魚者數夕上竊知笑曰卿不奈事朕日進十數未嘗有損銀餅饀皆乳酪膏腴所製也摭言鴈臣元魏時北夷酋長遣子入侍者常秋來春去以避中國之熱時人謂之鴈臣伽藍記熱風西域大流沙多熱風觸人及六畜皆迷仆唐書土熱牂柯無城郭土熱多霖雨稻粟再熟上陽水有雲大如車蓋十餘此陽水之氣必暑有暍者京房易飛候褦襶古樂府詩云今世褦襶子觸熱向人家炙轂子云褦襶笠子也集韻解云褦襶不曉事不畏盛暑吕公著居家夏不排窻不揮扇冬不附火一日盛夏楊大夫懐寳字器之將赴鎮戎軍倅來辭器之乃吕氏甥公著於西窻下烈日中公裳對飲三盃器之汗流浹背公凝然不動雜志氷鼠北方曾氷萬里厚百丈有磎鼠在氷下土中焉行如鼠食草木肉重千斤可以作脯食之已熱其毛八尺可以為褥臥之却寒其皮可以蒙鼓聲聞千里有美尾可以來鼠此尾所在鼠聚今江南鼠食草木為災此類也神異經鑠石楚辭云魂兮歸來東方不可以託十日代出流金鑠石抱朴子云朱颷鑠石不能靡蕭􅉌之木南方生熱隂陽應象大論云南方生熱注陽氣炎灼故生熱暄暑成燠熱之用也五運行大論注云暄暑鬱蒸熱之化也炎赫沸騰熱之用也又云太虚昏翳其若輕塵山川悉然熱之氣也大明不彰其色如丹鬱然之氣也若形雲恭升從然闕乍盈下闕也内經伊鬱感乎溽暑之伊鬱而慮性命之所乎景福殿賦爛渭賈誼旱雲賦隆盛暑而無聊兮煎砂石而爛渭湯風至而含熱兮羣生悶滿而愁憒畝畝枯槁而失澤兮壤石相聚而為害焦金隂陽之㑹冬合北方而物動於下夏合南方而物動於上上下之大動皆在日至之後為寒則凝氷烈地為熱則焦沙爛石氣之精異於是繁露寒捍釋名曰寒捍也捍格也􅀢説文曰􅀢寒也從雨執聲凛清寒也義氣天地嚴凝之氣始於西南而盛於西北此天地之義氣也禮記北方生寒應象論云北方生寒注隂氣凝冽故生寒藏清慘冽寒之用也運行論注云凝慘氷雪寒之化也凛冽霜雹寒之用也柔耎之物遇寒則堅寒之化也大虚澄净黑氣浮空天色黯然髙空之寒氣也若氣似散麻本末皆黑㣲見川澤之寒氣也太虚清白空尤雪映遐邇一色山谷之寒氣也太虚白昏火明不翳如霧雨氣遐邇肅然北望色𤣥凝雰夜落此水氣所生寒之化也太虚凝隂白埃昏翳天地一色逺視不分此寒濕凝結雪之將至也地裂水氷河渠乾涸枯澤浮鹹木斂土堅是土勝水氷不得自清水所生寒之用也大火中大火寒暑之候也火星中而寒暑退豳七月注單襄公曰火見而清風戒寒國語張趯曰火中寒暑乃退注心以季夏昏中而暑退季冬旦中而寒退左昭三挾纊楚子圍蕭申公巫臣曰師人多寒王巡三軍拊而勉之三軍之士皆如挾纊左宣十二出裘衣寒賈子云楚王當戸而立愀然有寒色曰寡人尚然奈百姓何乃出府裘以衣寒者也北堂書抄築臺景公起火臺嵗寒役之凍餒者有焉公延晏子坐飲酒樂晏子歌曰庶民之凍我若之何奉上靡弊我若之何歌終喟然流涕公止之曰子殆為大臺之役夫寡人將罷晏子春秋鑿池衛靈公天寒鑿池宛春諌曰天寒起役恐傷民公曰天寒乎宛春曰公衣狐裘坐熊席􅑍隅有竈是以不寒今民衣敝不補履決不組君則不寒矣民則寒矣公曰善令罷役左右以諌曰君鑿池不知天之寒也而春也知之以春之知之也而令罷之福將歸于春也而怨將歸于君公曰不然夫春也魯國之匹夫也而我舉之夫民未有見焉今將令民以此見之曰春也有善於寡人有也春之善非寡人之善歟吕氏春秋解裘田單為齊相過淄水有老人涉淄而出不能行寒坐于沙中乃解裘衣之襄王曰單之後施欲取我國乎有貫珠者聞之曰不如因以為已善乃下令曰寡人憂民之寒而單解裘衣人稱寡人之意於是閭里相與語曰田單之愛人乃王之教也戰國䇿加衣昔者韓昭侯醉而寢典冠者見君之寒也故加衣於君之上覺寢而説問左右曰誰加衣者左右對曰典冠君因兼罪典衣與典冠其罪典衣以為失其事也其罪典冠以為越其職也非不惡寒也以為侵官之害甚於寒故明主之畜臣臣不得越官而有功不得陳言而不當越官則死不當則罪守業其官所言者貞也則羣臣不得朋黨相為矣韓子天寒後門戎夷違齊如魯天大寒而後門與弟子一人宿於郭外寒愈甚謂其弟子曰子與我衣我活也我與子衣子活也我國士也為天下惜死子不肖人也不足愛也子與我子之衣弟子曰夫不肖人也又惡能與國士之衣哉戎夷太息歎曰嗟夫道其不濟夫解衣與弟子夜半而死弟子遂活吕氏春秋賜綈袍范睢相秦魏須賈使秦睢微行弊衣間出見須賈賈曰今叔何事范睢曰臣為人傭賃須賈意哀之畱與坐飲食曰范叔一寒如此哉乃取一綈袍以賜之史記四月寒秦始皇九年四月寒凍民有死者洪範五行傳墮指上聞韓王信降匈奴上將擊之連戰乘勝逐北至樓煩㑹天寒士卒墮指者十二三漢書積隂鼂錯上疏曰夫狐貉之地積隂之處也木皮三寸水厚六尺食肉而飲酪其人密理鳥獸毳毛其性能寒漢書忍寒元帝時漢中道人王仲都能忍寒乃於盛寒日令袒衣載以駟馬於昆明池上環水而走御者厚衣狐裘甚寒而仲都獨無變色桓譚新論月旁寒河東項曼都好道學仙去家二年而反曰去時有數仙人將上天離月數里而止月之旁其寒凄凄論衡八月大寒王莽天鳯四年八月莽親之南郊鑄作威斗是日大寒百官人馬有凍死者漢書不得歸寢嚴遵者與光武俱為諸生逰涉汝頴同行精學暮夜宿息二人勤學寒不得歸寢更相謂曰後日豪貴憶此之難勿相忘别後數年光武即位下詔徵遵遵不至鐘離意别傳上豆粥王郎起兵上自東南馳夜至蕪蔞亭時天寒冽衆皆饑疲馮異上豆粥明旦上謂諸將曰昨得公孫豆粥饑寒俱解東觀漢書盛夏寒盛夏多寒韋彪上疏諫曰臣聞政治之本必須隂陽伏見立夏以來當暑而寒殆刑罰刻急郡國不時令之所致也謝承書六月如冬獻帝初平四年六月寒風如冬時續五行志大寒吐火葛仙公與客談語時天大寒仙公謂客曰居貧不能人人得爐火請作一大火共致煖者仙公因吐氣火赫然從口出須臾火滿屋客皆熱脱衣别傳毒害竇武上表曰今日大寒過節毒害鳥獸城旁竹栢皆為傷死龍涸常寒六月二十六日發龍涸晝夜肅肅常寒不復得脱𥜗袴將從七十二人面盡黎黒口唇青􅀈沙州記辟寒金嗽金鳥出昆明國形如雀色黄常翺翔於海上魏明帝時其國來獻此鳥飴以真珠飲以龜腦鳥常吐金屑如粟鑄之可以為器此鳥不畏霜雪乃起小臺處之名曰辟寒臺皆用水精為户牖使内外通光宫人争以鳥吐之金用餙釵珮謂之辟寒金故宫人相嘲曰不服辟寒金郍得帝王心不服辟寒鈿郍得帝王怜拾遺記誰似辟寒金聊借與空牀暖古樂府凌破河橋永寧二年十二月大寒凌破河橋晉朝雜事八月寒凍十三年春二月虎率三公九卿躬耕籍田后率三夫人命婦先蠶近都是嵗八月雨雪大寒行旅凍死石虎别傳鶴語寒大興二年冬大雪南州人見二白鶴語於橋下曰今兹寒不减堯崩年也於是飛去異苑傷民大興四年大寒傷民氷厚時王敦肆亂殺戮忠良晉朝雜事入宫酷寒桓𤣥入建康宫逆風迅激旌旗不立法章儀餙一皆傾偃是月酷寒晉中興書竒寒魏使崔劼曰今嵗竒寒江淮亦氷酉陽雜俎辟寒犀開元二年冬至交趾國進犀一株色黄如金使者請以金盤置於殿中温温然有暖氣襲人上問其故使者對曰此辟寒犀也頃自隋文帝時本國曾進一株至今日上甚悦厚賜之天寳遺事裂膚凉州都督楊敬述使官屬盧公等勒兵討突厥㑹大寒裂膚士卒不能張弓矢乃敗唐書引避錢徽拜左丞㑹宣墨麻羣臣在庭方大寒稍稍引避徽素恭謹不去立乆而仆上嵗苦寒文宗時大臣新族死嵗苦寒外情不安李石傳却寒簾咸通九年同昌公主下降錫錢五百貫仍罄内庫寳貨以實其宅更賜金麥銀粟數斛堂設連珠之帳績真珠以成也却寒之簾類玳瑁班有紫色云寒鳥骨所為也則未知何出杜陽雜編辟寒香同昌公主乘七寳步輦綴五色玉香囊貯辟寒香異國所獻也杜陽編辟寒香丹國所出𫐠異國辟寒鯽東南方海中有祖洲上有烜湖其内鯽魚出焉長八尺食之宜暑而避風寒之氣此魚狀即與江湖小鯽相類耳神異經尋陽有青林湖鯽魚大者二尺餘小者滿尺食肥美亦可止寒熱也酉陽雜俎沈寒陸業通連珠曰烈火流金不能焚景沈寒凝海不能結氷不周不周之國地寒括地圖思𤣥賦縱余緤乎不周五寒單快曰國有五寒而氷凍不與焉一曰政外二曰女厲三曰謀泄四曰不敬卿士而國家敗五曰不能治内而務外此五者一見雖祠無福除禍必得致福則貸說苑折綿阮籍歌云陽和微弱隂氣竭海凍不流綿絮折呼吸不通寒冽冽庾肩吾詩勁氣方凝酒清威正折綿折骨魏應璩新詩曰嵐山寒折骨面目盡生瘡嵐山羌中山名寒暴䜟曰寒者小人暴雪專權居位無道有位適罰無法又殺無罪其寒必暴殺寒門北方有北極之山曰寒門淮南子注積寒所在故曰寒門楚辭踔絶垠于寒門大人賦軼先驅於寒門宂居挹樓國地寒人多宂居廣志隂陽避忌氣異隂陽氣不同處萬物生焉冬三月之時草木既死萬物各異藏故陽氣避之藏伏壯於内使隂陽得成功於外夏三月之時萬物遂長隂氣避之下藏伏壯於内而萬物親而信之陽者主生萬物方夏三月之時大熱不至則萬物不能成隂氣主殺方冬三月之時地不内藏則根荄不成即春無生故一時失度即四序為不行越絶䕃揚隂䕃也氣在内奥䕃也陽揚也氣在外發揚也釋名三合獨隂不生獨陽不生獨天不生三合然後生穀梁莊天道天道之天者在隂陽陽為徳隂為刑刑主殺而德主生是故陽常居大夏而以生育養長為事隂常居大冬而積於空虚不用之處以此見天之任徳不任刑也天使陽出布施於上而主嵗功使隂入伏於下而時出佐陽陽不得隂之助亦不能獨成嵗終陽以成嵗為名此天意也前漢董仲舒傳推移利用春秋冬夏隂陽之推移也時之短長隂陽之利用也日夜之易隂陽之化也管子天地大理隂陽者天地之大理也四時者隂陽之大經也刑徳者四時之合也上處隂處陽春采生秋采蓏夏處隂冬處陽此言聖人之動靜開闔詘信浧儒取與之必因於時也上分晝夜一晝一夜隂陽分索夜道極隂晝道極陽陽不極則隂不萌隂不極則陽不牙𤣥摛徳義順帝梁后云夫陽以慱施為徳隂以不專為義螽斯則百福之所由興後漢書天經立天之經曰隂與陽陽不隂無與合其施隂陽所以抽嘖也嘖情也抽理也𤣥攡舒慘張平子西京賦夫人在陽時則舒在隂時則慘此牽乎天者也施化陽尊隂卑蓋乃天性陽性純而能施隂體順而能化後茍爽傳閉開甘泉賦帥爾隂閉霅然陽開晉灼曰帥聚也霅散也文子曰與隂俱閉與陽俱開韓文春生秋殺陽開隂閉饒乏陽動吐隂靜翕陽道常饒隂道常乏隂陽之道也𤣥告閉隔萬物之中以人為貴故聖人養之以君成之以化順四時之宜適隂陽之和隂陽閉隔則二氣否塞二氣否塞則人物不昌風雨不時風雨不時則水旱成灾後漢天地之方一隂一陽天地之方乃文乃質王道之綱賔戲抱負萬物負隂而抱陽中氣以為和老子動静知天樂者靜而與隂同徳動而與陽同波莊天道肅赫至隂肅肅至陽赫赫肅肅出乎天赫赫發乎地兩者交通成和而物生焉田子方錯行隂陽錯行則天地大絯於是乎有雷有霆莊外物氣大天地者形之大者也隂陽者氣之大者也隂陽相照相蓋相治莊則陽徳刑天道之常一隂一陽陽者天之徳也隂者天之刑也天之道任陽不任隂王者之道任徳不任刑順天也繁露陽行於順隂行於逆逆行而順順行而逆者隂也是故天以隂為權以陽為經陽出而雨隂出而北經用於盛權用於末以此見天之顯經隠權前徳而後刑也故曰陽天之徳隂天之刑也陽氣煖而隂氣寒陽氣子而隂氣奪陽氣仁而隂氣戾陽氣寛而隂氣急陽氣愛而隂氣惡陽氣生而隂氣殺是故陽常居實位而行於盛隂常居空虚而行於末天之好仁而近惡戾之變而逺大徳而小刑之意也先經而後權貴陽而賤隂也上據隂陽之行終各六月逺近同度而所在異處隂之行春居東方秋居西方夏居空右冬居空左夏居空下冬居空上此隂之常處也隂之行春居上冬居下此陽之常處也隂終嵗四移而陽常居實非親陽而疎隂任徳而逺刑與位休陽氣始出東北而南行就其位也西轉而北入藏其休也隂氣始東南北行亦就其位也西轉而南入屏其服是故陽以南方為位以北方為休隂以北方為位以南方為休陽至其位而大暑熱隂至其位而大寒凍陽至其休而入化於地隂至其伏而避徳於下是故夏出長於上冬入化於下者陽也夏入守虚地於下冬出守虚位於上者隂也陽出實入實隂出空入空天之任陽不任隂好徳不好刑如是也故隂陽終嵗各一出上治隂陽武后詔問調元氣之道陳子昂對曰元氣天地之始萬物之祖王政之大端也天地莫大於隂陽萬物莫靈於人王政莫先於安人故人安則隂陽和隂陽和則天地平天地平則元氣正昔黄帝合宫有虞總期尭衢室夏世室皆所以調元氣治隂陽也夏商之末桀紂昏暴隂陽乖行天地震怒唐書瀆為災武后嘗以季秋出朝視事宰相以為祥杜景儉曰洪範五行傳隂陽不相奪倫瀆之即為災春秋云冬無純陽夏無伏隂春無凄風秋無苦雨今已秋矣草木黄落而忽生此花瀆隂陽也舊唐愆候開元初張廷珪上疏頃隂陽愆候五穀失稔關輔尤劇唐書天地之道黄帝曰隂陽者天地之道也萬物之綱紀變化之父母生殺之本始神明之府也故積陽為天積隂為地隂靜陽躁陽生隂長陽殺隂藏陽化氣隂成形素問把握上古有真人者提挈天地把握隂陽中古有至人者淳徳全道和於隂陽調於四時上天隂天陽隂中有隂陽中有陽平旦至日中天之陽陽中之陽也日中至黄昏天之陽陽中之隂也合夜至鷄鳴天之隂隂中之隂也鷄鳴至平旦天之隂隂中之陽也彰兆天地之動靜神明為之紀隂陽之升降寒暑彰其兆阜生肅殺陽面阜生隂而肅殺天之能也陽而藝樹隂而揫斂人之能也劉禹錫天論尊卑陽者隂之長也其在鳥則雄為陽雌為隂其在獸則牡為陽而牝為隂其在民則夫為陽而婦為隂其在家則父為陽而子為隂其在國則君為陽而臣為隂故陽貴而隂賤陽尊而隂卑天之道也説苑隂陽家隂陽之術大詳而衆忌諱使人拘而多畏夫隂陽四時八位十一度二十四節各有教令曰順之者昌逆之者亡未必然也故曰使人拘而多畏司馬遷傳隂陽家者流蓋出於羲和之官敬順昊天歴象日月星辰敬授民時此其所長也及拘者為之則牽於禁忌泥於小數舍人事而任鬼神藝文志象法天失隂陽則亂其道地失隂陽則亂其財人失隂陽則絶其後君臣失隂陽則其道不理五行四時失隂陽則為灾今天垂象為人法故當承順之也太平經為御大丈夫以四時為馬隂陽為御文子五行行首九疇天錫禹洪範九疇初一曰五行一曰水二曰火三曰木四曰金五曰土水曰潤下火曰炎上木曰曲直金曰從革土爰稼穡潤下作鹹炎上作苦曲直作酸從革作辛稼穡作甘洪範人用水火者百姓之求飲食也金木者百姓之所興作也土者萬物之所資生也是為人用書大義五材天生五材民並用之廢一不可誰能去兵襄左傳五行即五材也言五者各有材幹也謂之行者若在天則五氣流行在地世所行用也書正義五體微著萬物之本有生於無著生於微及其成形亦以微著為漸五行先後亦以微著為次五行之體水最微為一火漸著為二木形實為三金體固為四土質大為五洪範疏更王古之王者易代改號取法五行五行更王終始相生亦蒙其宜是以太皥配木炎帝配火黄帝配土少皥配金顓頊配水家五帝分時季康子問五帝之名不知其實孔子曰天有五行木水金火土分時化育以成萬物其神謂之五帝上五正季康子曰勾芒為木正祝融為火正蓐收為金正亢宜為氷正后土為土正此五行之主而不亂稱曰帝者何子曰五正者五行之官名五行佐成土帝故稱王帝上五神木神則仁金神則義火神則禮水神則智土神則信中庸鄭注五音協之五行則角為木商為金祉為火羽為水宫為土前律歴志勝負夫火熱而水滅之金剛而火銷之木强而金伐之水流而土遏之惟造化者物莫能勝也淮南子五物萬物盈於天地之間而其為物最大且多者有五曰水火木金土其用於人也非此五物不能以為生而闕其一不可是以聖王重焉夫所謂五物者其見象於天也為五星分位於地也為五方行於四時也為五徳禀於人也為五常播於音律為五聲發於文章為五色而總其精氣之用謂之五行唐志五官天地之氣合而為一分為隂陽判為四時列為五行行者行也其行不同故謂之五行五行者五官也比相生而間相勝也繁睿天次天有五行木五行之始水五行之終土五行之中也此其天次之序也木生火火生土土生金金生水水生木此其父子也木居左金居右火居前水居後土居中央此其父子之序相受而布是故木受水而火受木土受火金受土水受金也諸授之者皆其父也受之者皆其子也常因其父以使其子天之道也是故木已生而火養之金已死而木藏之火樂木而養以陽水克金而喪以隂土之事天竭其忠故五行者乃孝子忠臣之行也上母子相生水生木木生火火生土土生金金生水子生母曰義母生子曰保子母相得曰專母勝子曰制子勝母曰困淮南子三辰生狀木生於亥壯於卯死於未也三辰皆木也火生於寅壯於午死於戌三辰皆火也土生於午壯於戌死於寅三辰皆土也金生於巳壯於酉死於丑三辰皆金也水生於申壯於子死於辰三辰皆水也上五勝岐伯曰五勝更立木得金而伐火得水而滅土得木而達金得火而鈌水得土而絶萬物盡然不可勝竭實命全形論勾如曰桓繆據五勝之便而列六國呉越春秋五運太虚廖廓肇基化元萬物資始五運終天天元紀大論五運相襲周而復始時立氣布如環無端六節藏象論夫五運之政猶權衡也高者抑之下者舉之化者應之變者復之此生長化成收藏之理氣之常也失常則天地四塞矣氣交變大論注五運謂五行之氣應天之運而王化者也宋均保乾圖注曰五運五行用事之運五化木曰敷和火曰升明土曰備化金曰審平水曰靜順敷和之紀木徳周行陽舒隂布五化宣平升明之紀正陽而治徳施周普五化均衡僃化之紀氣協天休徳流四政五化齊脩審平之紀收而不争殺而不犯五化宣明静順之紀藏而勿害治而善下五化咸整其不及木曰委和火曰伏明土曰卑監金曰從革水曰涸流其太過木曰發生火曰赫曦土曰敦阜金曰堅成水曰流衍素問更用易乾鑿度孔子曰立徳之數先立木金水火土徳各三百四嵗五徳備凡千五百二十嵗太終復初故曰五行更用郎顗傳注相本地秉隂竅於山川播五行於四時五行之動迭相竭也五行四時十二月還相為本也禮運更運應吉甫華林集詩五徳更運膺籙受符注七畧曰鄒子有終始五徳言土徳不勝木徳繼之金徳次之火徳次之水徳次之春秋命歴次曰五徳之運同徴合符膺籙次相代生殖展禽曰天之王辰民所以瞻仰也地之五行所以生殖也魯語雜成岐伯曰先王以土與金木水火離以成百物鄭語萬物之本五行萬物之本天地百物莫不用之洪範疏九穀之宗唐志五行者九穀之宗也人禀五行之全氣以生故於物為最靈九疇五行之說前賢所以窮治亂之變談天人之際菁華雨暘木為雨金為暘火為燠水為寒土為風禮器注協竒五常協之五行則角為木商為金徴為火羽為水宫為土前志異位五行異位千變萬化繁育庶類晉志尊天五行者猶言為天行氣之義也地之承天猶婦之亊夫臣之事君也謂其位卑卑者事親故自周於一行尊於天也水位在北方者隂氣在黄泉之下任養萬物水之為言准也隂化沾濡水生木木在東方者陽氣始動萬物始生木之為言觸也陽氣動躍火在南方者陽在土萬物垂枝火之為言委隨萬物布施火之為言化也陽氣用事萬物變化也金在西方者隂始起萬物禁止金之為言禁也土在中央中央者主土含萬物土之為言吐也白虎通徳性清潔潤下水之用也炎上翕赩火之性也柔軟曲直木之性也堅勁從革金之性也安靜稼穡土之徳也素問注體用澄澈流衍水之體也漂蕩没溺水之用也光顯炳明火之體也燔燎焦然火之用也長短曲直木之體也幹舉機發水之用也從革堅剛金之體也鋒刃銛利金之用也敦靜安鎮羣品以生土之體也含垢匿穢為變化母土之徳也上五行神遁甲開山圖云五龍見教天皇榮氏解云五龍爰皇後君也兄弟四人皆人面龍身長曰角龍木仙也次曰徴龍火仙也次曰商龍金仙也次曰羽龍水仙也父曰宫龍土仙也父與諸子同得仙治在五方今五行之神也五常形氣五行者五常之形氣也書云初一曰五行次二曰羞用五事言進用五事以順五行也貌言視聽思心失而五行之序亂五星之變作皆出於律歴之數而分為一者也漢藝文志五性順逆田獵不宿飲食不享出入不節奪民農時及有姦謀則木不曲直棄法律逐功臣殺太子以妾為妻則火不炎上治宫室飾臺榭内淫亂犯親戚侮父兄則稼穡不成好戰攻輕百姓飾城郭侵邉城則金不從革簡宗廟不禱祠廢祭祀逆天時則水不潤下洪範五行傳洪範五行箕子為武王陳禹所有洪範之書條其事為九類别其說為九章謂之九疇考其說初不相附屬而劉向為五行傳乃取其五亊皇極庶證附於五行以為八事皆屬五行至於八政五紀三徳稽疑福極之類又不能附至俾洪範之書失其倫理所謂旁引曲取而遷就其說也然自漢以來未有非之者唐志先後大禹謨曰水火金木土穀惟修洪範曰水火金木土月令曰春木夏火中央主秋金冬水其言先後不同者大禹謨之所主者養民之政故以五行之相尅而言之尅下為財故也洪範之所主者自然之數故以五行之生數言之舉生數則成數可知矣月令之所主者四時之令故以五行相生之序言之示兒編厯數岑羲為敬暉等論武氏表帝王之厯數必應乎五行水盛則火衰木衰則金盛天地之運也必合乎四時春往則夏來暑退則寒集則知五行之數帝王不可違違之則宗社不安生人不理四時之序天地不能變變之則霜露不均水旱交錯唐文粹藴達水潜故藴為五精火飛故達為五臭木茂故華為五色金堅故實為五聲土和故滋為五味關尹子天中記卷六
