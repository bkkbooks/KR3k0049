body:
  text: 天中記卷十六明陳耀文撰公𪠘官府太宰以八法治官府註百官所居曰府周禮公衙近代通謂府廷為公衙即古之公廟字本訛牙作為衙續世說府寺自漢以來三公所居謂之府九卿所居謂之寺風俗通曰府聚也公卿牧守府道德之所聚也藏府私府貨財之所聚也寺司也庭有法度令所所止皆曰寺左傳疏寺嗣也治事者相嗣續於其内釋名官舍何並性清㢘為頴川太守妻子不至官舍漢書繕葺陸抗與諸葛恪換屯柴桑臨去皆更繕完其城圍葺其墻屋居廬桑果不得妄敗恪入屯儼然若新而恪柴桑故屯頗有毁壊深以為慙吴志禁毁羊祐都督荆州時長吏䘮官後人惡之多毀壊舊府祐以死生有命非由居室書下征鎮普加禁斷晋傳擅飾杜預為秦州刺史石鍳奏預擅飾城門官舎稽之軍興遣御史檻車徴詣廷尉以預尚主在八議以候贖論本傳壊舍阮籍為東明相乘驢到郡壊府舎屏障使内外相望法令清簡旬日而還晋傳作廨匿錢光武建武二年西河鮮于兾為清河太守作公𪠘未就而亾後守趙髙計功用二百萬五官黄秉功曹劉適言四百萬錢于是兾乃鬼見白日道從入府與髙及秉等對共計校定為適秉所割匿兾乃書表自理其畧言髙貴不尚節畝壟之夫而箕踞遺類研宻失機婢妾其性媚世求顯偷竊銀艾鄙辱天官易譏負乘誠髙之謂臣不勝鬼言謹因千里驛聞付髙上之便西北去三十里車馬皆滅不復見秉等皆伏地物故髙以狀聞詔下還兾西河田宅妻子焉兼為差代以旌幽中之訟水經注治廨王導治揚州𪠘舎按行而言曰我正為次道治此爾何少爲王公所重故屢發此嘆世說新語䧟穴恒恭為桓石民参軍在丹徒所住𪠘牀前一小䧟穴詳視是古墓桓食常先以鮭􅀈投穴中如此經年後眠始覺見一人在床前云吾終沒以來七百餘年後緣嗣滅蒸嘗莫寄君恒食見播及感激無已依君籍當應為寧州刺史後果如言幽明録神據蕭惠明泰始初為呉興太守郡界有卞山山下有項羽廟相承云羽多居郡㕔事前後太守不敢上㕔惠明謂網紀云孔季恭曽為此郡未聞有災因命盛設筵榻接賔數日見一人長丈餘張弓挾矢向惠明既而不見因發背旬日而卒南史異苑舍怪樂廣爲河南尹先是官舎多妖怪前尹皆不敢處正寢廣居之不疑嘗外户自閉左在皆驚廣獨自若顧見墻有孔使人掘墻得狸而殺之其恠亦絶上諠擾羅含字君章為州駕别以𪠘舎諠擾于城西池小洲上立茅屋伐木為材織葦為席而居布衣蔬食晏如也志入隍傅昭字茂逺梁天鑒中為安成内史郡自宋來兵亂相接府舎稱凶毎昏旦間人鬼相觸在任者鮮以吉終及昭至有人夜見甲兵出曰傅公善人不可侵犯乃騰虚而去有頃風雨忽至飄郡聽事入湟中自是郡遂無患咸以昭貞正所感南史脩𪠘蔡凝字子居為中書侍郎遷晋陵太守及將之郡更令左右作中書廨守謂賔犮曰庻來者無勞上息妖徐孝克禎明元年入為都官尚書自晋以來尚書官僚皆攜家屬居省省在䑓城内下舎門中有間道東西跨路通于朝堂其第一即都官省西抵閣道年代乆逺多有鬼怪毎夜昏之際無故有聲光或見人著衣冠從井中出湏㬰復沒或門閣自然開閉居多死亾尚書周磪卒于此省孝克代確便即居之經兩日妖變皆息時以咸以為貞正所致上繕理房琯開元中歴慈溪宋城濟源縣令所在為政多興利除害繕理𪠘宇頗能著名舊唐遇神相州刺史宅舊凶王道堅李使君朱希玉前後為太守皆不生出郡城茍不留死則貶開元中張嘉祐初至郡便有鬼祟備極擾亂祐不之惧徃觀之見一女子云已是周故大將軍相州刺史尉遲府君女徃者楊堅簒奪廻死王事一門遇害合家六十餘口骸骨在此㕔下欲白于人悉皆惧死明公幸垂顧盼祐許諾他日以禮𦵏于㕔後便以㕔為廟嵗時禱祀焉祐有女年八九嵗家人欲有所問則令啓白神必有應神欲白祐亦令小女出見以為常也后三年嘉祐入拜大金吾至呉兢加以冕服其後皆榮遷云紀聞廣異記獨異志葺脩李聽起為邠寧節度使邠州衙㕔相傳不利葺修以至隳壊聽曰帥臣鑿凶門而出豈有拘于巫祝而隳公署耶遂命葺之足無變異舊唐市第趙惠伯為河南尹時嘗市楊炎第為官廨御史劾炎宰相抑吏市私第貴取其直盧杞召大理正田晋評罪晋曰輔相于庻官比監臨計羡利罪奪官杞怒謫晋衡州司馬于是當監主自盗罪絞新唐菑除李吉甫改郴饒二州㑹前刺史繼死咸言牙城下物怪不敢居吉甫命菑除其署以視事吏由是安上緑莎㕔河中府有緑莎㕔唐治平時好事者常加澆溉兵興以來而好事者劉吉之王禹偁送柴諫議河中中詩云紗莎㕔事舊鳴蛩雞跖集無廨宗初京師職事官舊皆無公𪠘雖宰相執政官亦僦舎而居毎遇出省或有中批外奏急速文字則省吏遍持于私舎呈押既稽緩又多漏泄石林燕語邸驛邸驛郡國朝宿之舎在京者謂之邸郵驛傳遽之館在四方去謂之驛玉海驛置騎也說文乗傅梁山崩晋侯以傳召伯宗伯宗辟重曰辟傳重人曰我待不如㨗之速也左成五田横乘傳詣洛陽如淳曰律四馬髙足為置傳四馬中足為馳傳四馬下馬為乗傳一馬二馬為軺傳急者乘一傳傳師古曰傳者若今之驛古者以車謂之傳車其後又單蜀馬謂之驛騎髙紀乗遽公孫黒將作亂駟氏與諸大夫欲殺之子産在鄙聞之惧弗及乘遽而至昭二伐叛克勝則使傳遽告功于王江漢毛詩注士曰乘遽之臣注云傳遽以車馬給使者也謂若今明乘驛遞傳而遽疾故謂之傳遽也玉藻以車曰傳以馬曰遽釋文廣成蘭相如奉璧西如秦秦王舍相如廣成舎索隐廣成是傳舎之名史營客館以周坊飭賔旅之所集廣成之傳無以儔槀街之邸不能及魏都賦高陽沛公至髙陽傳舎使人召酈食其師古曰傳舎者人所止息前人已去後人復來轉相傳也傳置文帝二年詔曰以給傳置師古曰置者置傳驛之所因名置紀田横至尸鄉廐置臣瓉曰廐置謂置馬以傳驛者曹参取狐父祁善置文頴曰善置置名也李陵騎置以聞師古曰騎置謂驛騎也各傳郵亭平帝詔置宗師考察不從敎令者宗師得因郵亭書言宗伯紀薛惠為彭城令橋梁郵亭不脩父宣過縣心知惠不能留彭城數日案行舎中處置付噐觀視園菜終不問惠以吏事傳說文郵境上行書舎从邑垂垂邊也徐曰郵之言過使所過也廣雅曰郵馹也置驛也風俗通曰漢改郵為置置者度其逺近之間置之也増韻又馬傳曰置歩傳曰郵置驛鄭當時孝景時為太子舎人毎五日洗沐常置驛長長安諸郊請謝賔客夜以繼日明旦常恐不徧前漢詐止魏相為茂陵令御史大夫桑𢎞羊客詐稱御史止傳丞不以時謁客愁縳丞相疑其有奸收捕案致其罪論棄市市茂陵大治上具馬王温舒為河内太守令郡具私馬五十疋為驛自河内至長安奏行不過二日得可論事報河内皆怪其奏以為神速上飾傅宣帝元康詔吏或飾厨傳稱過使客以取名譽韋昭曰厨謂飲食傳謂舎言脩飾意氣以稱過使而已師古曰使人及賔客來者稱其意而遣之令過去也紀列傅衛颯建武時遷桂陽太守三縣去郡逺且千里毎一吏出徭及數家颯乃鑿山通道五百餘里列亭傳置郵驛於是役省勞息本傳不納趙孝字長平父普王莾時為田禾將軍任孝為郎毎告歸常白衣歩擔嘗從長安還欲止郵亭亭長先時聞孝當過以有長去客洒掃待之孝既至不自名長不肯内因問曰聞田禾將軍子當從長安來何時至乎孝曰尋到矣于是遂去後漢劉寵累登卿相家無貨積嘗出京師欲息亭舎亭吏止之曰整頓洒掃以待劉公不可得也寵無言而去時人稱其長者上籌筆籌筆驛在利州諸葛孔明籌畫于此山水最秀殷潜之詩沉處經謀際揮毫决勝時之觚當八畫前著此操持山秀扶英氣川流入妙思算成功在彀運去事終虧杜牧之詩永安宫受詔籌筆驛沉思晝地乾坤在濡毫勝負知川流縈智思山聳助扶持子夜星纔落鴻都鼎便移郵亭自世換白日事長垂李義山詩魚鳥猶疑畏簡書風雲長為䕶儲胥徒令上將揮神筆終見降王走傳車管樂有才原不忝闗張無命欲何如他年錦里經祠廟梁甫吟成恨有餘羅隐詩抛擲南陽為主憂北征東討盡良籌時來天地皆同力運去英雄不自由千里山河輕孺子兩朝冠劎恨譙周惟餘巖下多情水猶觧年年傍驛流滋水滋水驛在長樂驛之東睿皇在藩日經此亭㕔西壁畫一胡頭因題曰喚出眼何用苦深藏縮却鼻何畏不聞香南部新書晨侯鄭審開元中為殿中侍御史充館驛使令毎傳舎立晨候自公始也傳載開元十六年七月敕傳驛因御史出使察之二十五年五月御史鄭察檢校兩京館驛使未稱使今驛門前十二辰堆即審剏焉㑹要郎當梓潼縣有上亭驛明皇幸蜀問黄幡綽曰車上鈴聲頗似人語言對曰似言三郎郎當三郎郎當故又名琅璫驛羅隐詩山雨㣲㣲宿上亭雨中因想雨淋鈴志長樂郭子儀乾元元年破賊河上因朝京師詔百官迎於長樂馹帝御望春樓待之志舘驛使裴潾元和中兩河用兵初憲宗寵任内官以充館驛使有曹進五者恃恩暴戾遇四方使多据有至捽辱者宰相李吉甫奏罷之十二年淮西用兵復以内官為使潾上疏云舘驛之務毎處皆有專知官畿内有京兆尹外道有觀察使刺史迭相監臨䑓中又有御史充館驛使專察過闕若令宫闈之臣出参館馹之務則内臣外事職分各殊切在塞侵官之源絶出位之漸言雖不用帝意嘉之舊唐相思舖鄜州東百里有水名相思河傳舎曰相思舖令狐楚詩曰誰把相思號此河塞垣車徃來來多只應自古征人淚灑向空川作碧波詩話總龜萬春延和中敬昭道遷監察御史先是䕫州征人舒萬福等十人次于巴陽灘溺死昭道因使巴渝至萬春馹方睡見十人祈哀始寐覺至于再三乃召馹吏問之馹人對如夢昭道即募善㳺者出其屍具酒餚以酎之乃移牒近縣備槥櫝歸之故鄉征人聞者無不感激大唐新語女巫乗傅肅宗以王璵為相尚鬼神之事分遣女巫遍禱山川有巫者少年盛服乘傳而行中使随之而行誅求與惡少惡數輩横行州縣至黄州震左為刺史晨至驛門扄户不啓震命壊􅀈而入曵巫斬階下惡少皆死籍其緍鉅萬悉列上曰臣已斬巫請以所籍錢代臣貧民輸税其中使送上臣請死朝廷慰奬之唐詔林驛官江西有驛官以幹事自任白刺史馹已理請一閱之乃徃初一室為酒庫諸醖畢熟其外畫神問曰何也曰杜康刺史曰功有餘也又一室曰茶庫諸茗畢貯復有神問何也曰陸鴻漸刺史益喜又一􅀢庫諸茹畢備復問何神曰蔡伯喈刺史大笑曰君悞矣國史補高塘濠州西有髙塘館俯近淮水御史閻敬爱宿此館題詩曰借問襄王安在哉山川此地勝陽䑓今朝寓宿髙塘館神女何曽入夢來軺軒來徃莫不吟諷有李和風者至此又題詩曰髙唐不是這髙塘淮畔江南各一方若向此中求薦枕参差笑殺楚襄王讀者莫不觧顔後因失印求新鑄始添濠字南部新書敷水元􅍬為御史分司東都召還次敷水驛中人仇士良夜至􅍬不讓中人怒擊􅍬敗面宰相以􅍬年少輕樹威失憲臣體貶江陵士曹参軍新唐褒城元􅍬為御史奉使東川於褒城驛竇明府㕔虞鄉黄丞犯令逃去再使東川至褒城驛黄丞餽酒􅋈舟􅍬與同酌徧問褒陽山水則褒姒所奔之城在其左諸葛所征之路在其右感今懐古作詩贈黄曰昔年曽痛飲黄令困飛觥席上當時走馬前今日迎迤邐七盤路坡坨數丈城花疑褒女笑棧息武侯征一種埋幽石空聞千載名本事詩褒城驛號天下第一孫樵記青雲元􅍬青雲驛詩岧嶤青雲嶺下臨千仞谿謂言青雲馹繡户青雲閨昔遊蜀關下有驛名青泥聞之意惨愴若墜牢與狴本集陽城元􅍬陽城驛詩啇有陽城驛名同陽道州陽公沒已乆感我涙交流祠曹諱羊祜此驛何不侔我願避公諱名為避賢郵上條檢栁公綽長慶元年為京兆尹時河朔復叛朝廷用兵捕授行營諸將朝令夕改驛騎相望公綽奏曰自幽鎮用兵使命繁併館遞匱乏鞍馬多闕又勅使行李人數都無限約其衣緋紫乘馬者二十三十匹衣黄緑者不下十匹五匹驛吏不得視劵牒随口即供驛馬既盡遂奪路人鞍馬衣冠士庻驚擾怨嗟逺近喧騰行李將絶伏望聊為定限乃下中書條流人數自是吏不告勞舊唐管城太和二年滎陽守陽歸厚奉詔成新驛周以髙墉乃樓其門勞迎展蠲潔之敬餞别起登臨之思走轂奔蹄遄征急宣入而㤀勞出必屢顧其傳舎之尤乎劉禹錫管城驛記三鄉劉禹錫至三鄉驛睹明皇望女几山詩斐然有感云開元天子萬事足惟惜當時光景促三鄉陌上望仙山歸作霓裳羽衣曲仙心從此在瑶池三鄉八景相追随天上忽乘白雲去世間惟有秋風辭本集㑹昌時有題三鄉者云余本家若耶溪東從良人西入凾關寓居晋昌里第不幸良人已矣邈然無依帝里方春吊影東邁渉滻水歴渭川背終南陟太華經虢畧抵陜郊揖嘉祥之清流面女几之蒼翠凡經過之所皆昔燕笑之地遂命筆聊題終不能滌其懐抱翰墨非女子之事名字故隐而不書詩曰昔逐良人西入闗良人身歿妾空還謝娘衛女不相待為雨為雲歸舊山和者十一首王祝詩曰女几山前嵐氣低佳人留恨此中題不知雲雨歸何處空使王孫見即迷劉谷詩曰蘭蕙芬芳見玉姿路傍花笑景遲遲苧蘿山下無窮意併向三鄉惜别時張綺詩曰洛州依舊好風光蓮帳無因見女郎雲雨散來音信斷此生遺恨寄三鄉雲溪友議五花荆南舊有五花館待賔之上地也故蔣肱上成汭詩云不是上名台姓字五花賔館改從容南部新書稷山稷山驛吏王全作吏五十六年人稱有道術徃來多贈篇什故李義山贈詩云過客不勞詢甲子唯言亥字與時人上皇華廣州押衙崔慶成轄香藥綱詣内庫抵黄花驛舍見羙婦人曰今日見君君必有疑今日君從我寧不悔俟君囬轅别圖後㑹擲書云川中狗百姓眼馬撲児御厨飯洎還不敢宿皇華寓宿旅邸前婦人來曰今日之事可諧否十二字能辯否慶成不對因命青衣進酒終不舉􅊦乃作詩云妖魄才魂自古靈多情心膽似平生知君不是風流物却上幽原怨月明青衣曰小娘子嘗養鸚鵡十餘年竟不言今其驗乎婦人嘆曰是矣乃作啞鸚鵡詩云彫籠馴養許多時終嵗曽無一句詞深恨化工情太誤因何偏與好毛衣擲紙于地燈火俱滅丁晉公嘗見十二字曰川中狗蜀犬也獨字百姓眼民目也眠字馬撲児𤓰子也孤字御厨飯官食也館字乃獨眠孤館四字􅀈匱白沙白沙驛在未州一百二十里祁縣縣下臨湘水西岸門外有亭以形勝盡在此也詩話緫龜草上烟河東馬鋪有驛馹善行者鋪卒名為草上烟有勢力使命常數程打過好事作詩云過此為尋草上烟數程打過苦尤偏迃齋詩話閭里閭里小宰以官府之八成經邦治三曰聽閭里以版圖周禮爾雅巷門謂之閭説文里門也周禮五家為比五比為閭閭侣也二十五家相郡侣也説文里居也周禮五家為鄰五鄰為里風俗通云五家為軌十軌為里里者止也五十家共居止也清節齊稷門外東北二百歩有晏平仲冡宅左傳晏子之宅近市景公欲易之而嬰弗更為試曰吾生則近市死豈敢易乃葬故宅後人名之曰清節里水經注勝母里名勝母曽子不入邑號朝歌墨子廻車鄒陽書錦里張儀築益州城故錦澗也號錦里益州記樗里樗里子名疾髙誘曰其里有樗樹故曰樗里然疾居渭南隂鄉之樗里故號曰樗里子又紀年則謂之禇里疾史記閭左秦二世發閭左戍漁陽九百人師古曰發閭左之人皆遣戍也漢書應劭曰入閭取其左發之未及取右而秦亡食貨志注中陽髙皇帝家在沛豐中陽里及為天子祠豐故宅漢舊儀宋謝莊求賢表曰升歴中陽英賢起于徐沛受籙白水茂異出于荆宛南史姫宗之在水滸也鸑鷟鳴於岐山劉姓之在中陽也蛟龍降于豐澤史通里母客謂蒯通曰先生之于曹相國拾遺舉過顕賢進能齊國莫先生生者先生知梁石君東郭先生何不進之於相國乎通曰諾臣之里婦與里之諸毋相善也里婦夜亾肉姑以為盗怒而逐之婦且去過所善諸母語以事而謝之里母曰汝安行我今令而家追汝矣即束縕請火於亡肉家曰昨暮夜犬得肉争鬬相殺請火治之亡肉家遽追呼其婦故里婦非談說之士也束緼乞火非還婦之道也然物有相感事有適可臣請乞火於曹相國漢書戚里石奮髙祖召其姊為羙人徙其家長安中戚里師古曰於上有婚姻者則皆居之故名其里為戚里本傳陵里萬石君奮徙居陵里史史慶醉歸入外門不下車萬石君讓曰内史貴人入閭里里中長者皆走匿而内史坐車中自如固當廼謝罷慶慶及諸子入閭門趨至家前漢長安長安閭里一百六十室居櫛比門巷修直有宣明建陽昌隂尚冠修城黄棘北煥南平等里宣帝在民間時常在尚冠里劉向列女傳節女長安大昌里人也黄圖高陽荀淑有子八人儉緄靖燾汪爽肅旉並有名稱時人謂八龍初荀氏舊里名西豪潁隂令渤海苑康以為昔髙陽氏有才子八人今荀氏亦有八子故改其里曰髙陽里後漢賀德仁在陳與從兄徳基師事周𢎞正以文辭稱人為語曰學行可師賀德基文質彬彬賀德仁兄弟八人時比漢荀氏太守鄱陽王伯山改所居井滂里為髙陽云新唐冠葢冝城縣有太山山下有廟漢末多士其中刺史二千石卿長數千人朱軒華葢同㑹於廟下荆州刺史行部見之雅嘆其盛號為冠盖里而刻石銘之水經注互見亭冝春左思賈謐請講漢書謐誅退居冝春里專意典籍齊王冏命為記室督辭疾不就晉書四望元魏伊洛之間夾御道作四夷舘道東有四里一曰歸正二曰歸德三曰慕化四曰慕義吴人投國者處金陵舘三年已後賜宅歸正里北夷來附者處燕然館賜宅歸德里東夷來附者處扶桑舘賜宅慕化里西夷來附者處崦嵫舘賜宅慕義里洛陽伽藍記穢里劉繪字士章為南康相郡人有姓頼者所居名穢里刺謁繪繪戯嘲之曰君何何穢而居穢里此人應聲曰未審孔子何闕而居闕里繪黙然無忤意嘆其辨速南史仁里明山賔造宅昭明太子聞築室不就有令曰明祭酒雖出撫大藩擁族推轂珥金拖紫而恒事屢空聞構宇未成今送薄助并詒詩曰平仲古稱竒夷齊昔擅美令則挺伊賢東秦固多士築室非道傍置宅歸仁里庚桑方有係原生今易擬必來三徑人將招五經士南史里上仁之所廬選匪仁里其焉宅匪義跡而焉居上三柱劉仁軌咸亨中進爵為公子及兄子授上柱國者三人州黨榮之號所居為樂城鄉三柱里新唐居巢劉知幾封居巢縣子鄉人以知幾兄弟六人進士及第文學知名改其鄉里為髙陽鄉居巢里舊鳴珂張嘉祐嘉貞弟嘉貞為相時任右金吾衛將軍昆弟毎上朝軒葢騶導盈閭巷時號所居坊曰鳴珂里新愴别吐蕃請婚中宗以所養雍王守禮女為金城公主妻之帝為幸始平縣設殿帳於百頃泊側餞别因改始平縣為金城又改其地為鳯池鄉愴别里舊吐蕃傳同里韋貫之名純為長安丞或薦之京兆尹李實實舉笏示所記曰此其名姓也與我同里素聞其賢願識之而進於上或者喜以告曰子今日詣實而明日賀者至矣貫之唯唯不徃官亦不遷唐安邑李吉甫居安邑里時號安邑李丞相志靖恭咸通中楊汝士與諸子位皆至正卿所居靖恭里第弟兄並列門㦸南部新書脩行楊收兄發假弟嚴皆顯貴號脩行楊家與靖恭諸楊相比長安志近俗以權臣所居坊呼之安邑李吉甫也靖安李宗閔也驛坊韋澳也樂和李景讓也靖恭修行二楊也皆放此南部新書坊邑里之名說文坊方也言人所在里為方蘓演白沙李愚所居暴雨一庭俱為白沙及薨得地于白沙里時號白沙相公紀異録不遊崔稅遭世亂寓居于滑䑓不遊里巷十餘年人罕識其面梁貞明三年舉甲科五代史栗里陶淵明所居栗里兩山門有大石可坐十人敎坊記孝義魏世宗詔曰李謐屢辭徴辟志守冲素可逺傍惠康近凖𤣥晏謐曰貞静處士表其門閭以旌髙節於是表其門曰文德里曰孝義云北史二薛曲東京昭國坊有薛繪子姪十人冠冕茂盛時號薛曲西京記市市市時也言交易而退恃以不匱也市亦謂之市井言人至市有所鬻賣者當於井上洗濯令香潔然後到市也或曰古者二十畝為井因井為市故云也風俗通市買賣之所也說文闤市垣也闠市門也古今注市巷謂之闤市門謂之闠巷謂之閎顔延之纂要市中空地謂之㕓鄭衆周禮注作市神農作市衰陽氏衰市官不修祝融修市古史考祝融作市世本祝融顓頊臣為髙辛氏大正宋𠂻注九市武王伐紂得二夫人問曰殷國將亡亦有妖乎曰殷君喜脩宫室大者宫室九市太公六韜夜市郡國志曰豳州有邠亭新論曰豳縣邠亭本太王所部其人將與夜市不為則有童害焉市升夫田之義有五一曰無泄天時地氣二曰無費一家三曰同風俗四曰合巧拙五曰通財貨因井為市交易而退故稱市井也春秋井田記學齊佔俾云後漢循吏傳曰首不入市井注引井田記云謂不見于他書今劉寵傳注無之妄刪古籍可恨也哉斧牛啇太宰使少庻子之市顧反而問之曰何見于市對曰無見也太宰曰雖然何見也對曰市南門之外甚衆牛車僅可以行耳太宰因誡使者無敢告人吾所問於女因召市吏而問之曰市門之外何多牛屎市吏甚恠太宰知之疾也乃悚懼其所也韓内儲市南仲尼之楚楚莊王觴之孫叔敖執爵而立市南宜僚受酒而祭曰古之人乎曰丘也聞不言之矣市南冝僚弄丸而兩家之難觧孫叔敖甘寢乘羽而郢人投兵丘願有喙三尺彼之謂不道之道此之謂不言之辯莊庚桑楚孔子之楚舍於蟻兵之漿其鄰有夫妻臣妾登極者子路日是稷稷何為者耶仲尼曰是自埋于民自藏于畔其聲銷是陸沉者也是其市南冝僚耶則陽近市景公過晏子曰子宫小近市請徙子家䂊章之圃晏子再拜而辭曰且嬰家貧待市食而朝暮趨之不可以逺景公笑曰子家習市識貴賤乎是時景公繁於刑晏子對曰踴貴而屨賤景公曰何故對曰刑多也景公造然變色曰寡人其暴乎於是損刑五韓非子七市齊桓公宫内有七市韓娥女之齊乏糧過雍門鬻歌於市乃此也上吹箎伍子胥之吴乃佯狂塗面行乞於市市人罔有識者翌日吴市吏善相者見之與俱入見王僚吴越春秋子胥至吴徒跣被髪乞於呉市三日市正疑之而道於闔廬曰市中有非常人徒跣被髪乞于呉市三日矣闔廬曰吾聞荆平王殺其臣伍子奢而非其罪其子子胥勇且智彼必經諸侯之邦可以報其父仇者王即使召子胥入呉王下階迎上殿與語三日三夜語無復者越絶書鶴舞呉王闔廬有女怒王先食蒸魚乃自殺闔廬痛之葬於邦西閶門外乃舞白鶴於呉市中令萬民随而觀之還使男女與鶴俱入羡門因發機以掩之呉越春秋市虎龎恭與太子質於邯鄲謂魏王曰今一人言市有虎王信之乎曰不信二人言市有虎王信之乎曰不信三人言市有虎王信之乎王曰寡人信之龎恭曰夫市之無虎也明矣然而三人言而成虎今邯鄲之去魏也逺於市議臣者過于三人願王察之龎恭從邯鄲反竟不得見韓非子争利司馬錯欲伐蜀張儀曰不如伐韓臣聞争名者於朝争利者于市今三川周室天下之朝市也而王不争焉顧争於戎翟去王業逺矣史記求存孟嘗君逐於齊而復反譚拾子曰之於境謂孟嘗曰君復無有所怨於齊士大夫孟嘗君曰然譚拾子曰事有必至理有固然富貴則就之貧賤則去之此事之必至理之固然者請以市諭市朝則滿夕則虚非朝愛市而夕憎之也求存故徃亡故去願君勿怨孟嘗君不敢以為言戰國䇿魯連子同史記馮驩謝客語稍同亷頗之免長平歸也失勢之時故客盡去及復用為相客又復至亷頗曰客退矣客曰吁君何見之晚也夫天下以市道交君有勢我則從君君無勢則去此固其理也有何怨乎史本傳擊筑荆軻既至燕愛燕之狗屠及善擊筑者髙漸離荆軻嗜酒日與狗屠及髙漸離飲於燕市酒酣以徃髙漸離擊筑荆軻和而歌於市中相樂也已而相泣旁若無人者史記直市雍州富平西南十五里有直市城秦王文造物無二價以直市為名郡國志地市始皇作地市與生死人交易令云生人不得欺死者物市吏告始皇云死人陵生人生人定入市門斬斷馬脊故徐云秦地市有斷馬三秦記始皇陵有銀蠶金鴈以多竒物故俗云秦王地市郡國志東市司馬季主者楚人也卜於長安東市宋忠賈誼二人同輿而之市游於卜肆中史記坐市嵗小旱上令百官求雨卜式言曰縣官當食租衣稅而已今桑𢎞羊令吏坐市列販物求利烹𢎞羊天乃雨食貨志鬬變大將軍霍光秉政諸霍在平陽奴客持刀兵入市鬭變吏不能禁及尹翁歸為莫敢犯敢犯者漢書栁市萭章字子夏長安熾盛街閭各有豪俠章在城西栁市號曰城西萭子夏志門如哀帝責鄭宗曰君門如市人何以欲禁切主上崇對曰臣門如市臣心如水記第市司𨽻校尉觧光奏王根曰縱横恣意大治室第第而立圡山而立兩市殿上赤墀戸下青璅記賣市嚴君平卜筮於成都市裁日閱數人得百錢足自養則閉肆下簾而授老子俱同上槐市元始四年起明堂辟雍為博士舍人萬區為㑹市但列槐樹數百行為隊無墻屋諸生朔望㑹此市各持其郡所出貨物及經書傳記笙磬噐物相與買賣雍雍揖讓論議樹下侃侃誾誾黄圖王莽作宰衡時弟子子舍萬區起市郭上林苑中三輔舊事云漢太學中有市有獄上市卒梅福元始中王莾專政棄妻子去後人有見福于㑹稽者變姓名為呉市門卒云漢書越州梅市即梅福為市門卒之所郡國志閱曹王充字仲任㑹稽人也家貧無書常游洛陽市肆閱所賣書一見輙能誦憶遂至博通衆經謝承後漢書公超張楷字公超門徒常百人隐居𢎞農山中學者随之所居成市後華隂山南遂有公超市後漢不二價韓康字伯休常採藥名山賣於長安市口不二價三十餘年時有女子從康買藥康守價不移女子怒曰公是韓伯休耶乃不二價乎上蒲胥郢城内有市名蒲胥故南齊校尉府也郡國志苑市齊東昏以閱武堂為芳樂苑於苑中立店肆模大市日游市中雜所貨物與宫人闡竪共為禆販以潘妃為市令自為市吏録事將鬬者就潘妃罰之又開渠立埭躬自引船埭上設店坐而屠肉于時百姓歌云閱武堂種楊栁至尊屠肉潘妃酤酒南史紀市易大業六年諸夷來朝請入市交易焬帝許之於是修飾諸行葺理邸店皆使甍宇齊正髙卑如一壊貨充積人物華盛時諸行鋪竟崇侈麗至買菜者亦以龍鬚藉之夷人有就店飲噉皆令不取直故夷驚視寢以為常兩京記豊都洛陽南市即隋之豐都市也初築外垣之時掘得一塜無甎甓棺中有平上朱衣銘曰筮言居朝龜言近市五百年廟於斯見矣校其年月當魏黄初二年隋唐嘉話利人西市隋曰利人市市西北隅有海池長安中僧法成所穿分未安渠以注之以爲放生之所穿池得古石銘云百年為市而後為池自置立市至是時百餘年矣兩京記賣卜武攸緒則天兄惟良子也恬淡寡欲好易莊周書少變姓名賣卜長安市得錢輒委去新唐宫市德宗時宦者主宫市置數十百人閱物㕓左謂之白望無詔文驗覈但稱宫市則莫敢謂何大率與直十不償一諫官交章列上皆不納上呉湊以戚里為京兆尹深言其弊張建封入覲具奏之德宗頗深嘉納蘇弁希宦者之㫖因入奏言便于堕業之徒宫市不為之改舊唐德宗晩年政出多門宫市之弊諫官論之不聼韓愈嘗上章數千言極論之不聼怒貶為連州山陽令上三公入杜司徒常言我致政之後必買小駟飽食訖跨之着麄布襴衫入市看盤鈴傀儡即足矣後致仕果行其志諫官上䟽言三公不合入市公曰在吾計中矣劉禹錫嘉話置權量栁仲郢拜京兆尹置權量於東西市使買易用之禁私製者北司吏入粟違約仲郢殺而尸之自是人無敢犯新書草市蜀東西川之人常互相輕薄西川人言梓州者乃我東門之草市也豈得與我耦哉栁仲郢為東川節度使聞之謂幙賔曰吾立朝三十年清華備歴今日始得為西川作市令聞者皆笑之故世言東西兩川人多輕薄南部新書鬼市軰俗說務本坊西門是鬼市或風雨曛晦皆聞其喧聚之聲秋冬夜多聞賣乾柴云是枯柴精也又或中秋望夜聞鬼吟六街鼓絶行人歇九衢茫茫空有月有和者云九衢生人何勞勞長安土盡槐根髙嵗時記海邊時有鬼市半夜而合雞鳴而散人從之多得異物畨禺雜記虚所嶺南謂材市為虛栁子厚童區寄傳云之虚所賣之又詩曰青篛褁塩歸洞客緑荷包飯趂虛人市之所在有人則滿無人則虛嶺南村市滿時少虚時多故曰虚青箱雜記亥市分寧縣本常州亥市也嶺南村落有市謂之虚不常㑹多虚日也西蜀曰痎如瘧疾間曰復作也江南人惡以疾稱故止曰亥耳又荆呉俗有寅申巳亥日集于市故稱亥市徐筠水志蜀有痎市間日一集如痎瘧之發其俗又以冷爇發歇為市喻青箱市禁孔子告仲弓曰其餘禁者十有四焉命服命車不粥於市珪璋璧琮不粥于市兵車旍旗不粥於市犧牲秬鬯不粥於市戎噐兵甲不粥於市噐用不中度不粥於市布帛精麤不中數廣狹不中量不粥於市姦色亂正色不粥於市文錦珠玉之噐雕飾靡麗不粥於市衣服飲食不粥於市菓實不時不粥于市五木不中伐不粥於市鳥獸魚鼈不中殺不粥於市凡執此禁以齊衆者不赦過也家語九市廟記六長安市有九六市在道西三市在道東凡四里為一市致九州之人在突門夾横橋大道市樓皆重屋又曰旗亭樓在杜門大道南又有當市樓有令署以察啇賈貨財買賣貿易之事三輔都尉掌之西京賦云郭開九市通闤𢃄闠旗亭重立俯察百隧是也黄圖四通後魏立市於洛水南號曰四通市民間謂永橋市伊洛之魚多于此賣士庻湏鱠皆請取之洛陽伽藍記市語長安市人語各不同有葫蘆語鏁子語紐語練語三摺語通名市語兩京雜記三市三市大市名也金市在大城西南市在大城南馬市在大城東按金市名啇觀西兊為金故曰金市洛陽記肆店肆者所以陳貨鬻之物也店者所以置貨鬻之物也古今注青羊老子為關令尹喜著道經臨别曰子行道千日後於成都青羊肆尋吾今為青羊觀也蜀本紀葱肆吕僧珍從父兄子先以販䓤為業僧珍至乃棄業求州官僧珍曰汝等自有常分豈可妄求叨越當速反葱肆耳南史鷄肆長安富民羅㑹以剔糞自業里中謂之雞肆言若雞之因剔糞而有所得也㑹世副其業家財巨萬有士人陸景晹㑹邀過所止舘舍甚麗入内梳洗衫又極鮮屏風氊褥烹無所不有景晹問曰主人即如此快活何為不罷惡事㑹曰吾中間停廢一二年奴婢死亡牛馬散失復業已來家園稍遂非情願也分合如此朝野僉載女肆葱嶺以東俗志淫龜兹于闐置女肆征其錢新唐星貨肆有以筐以筥或倚或垂鱗其物以鬻者曰星貨鋪言其列貨叢雜如星之繁今俗呼為星火鋪誤也李濟翁資暇集駔儈子貸金錢十貫節駔儈貪賈三之㢘賈五之孟康曰節節物貴賤也謂除估儈其餘利師古曰儈者合㑹二家交易者也駔者其首率也前貨殖傳大駔段干木晉國之大駔也駔廥人也學於子夏髙何縣子石齊國之暴者也指於鄉曲學於子墨子呂覧尊師市師王孫卿以財養士與雄傑交王莾以為京司市師漢司東市令也貸殖道路道路道蹈也路露也言人所蹈而露見也城下路謂之豪歩所用道謂之蹊釋名一逹謂之道路二逹謂之岐旁三逹謂之劇旁四逹謂之衢五逹謂之康六逹謂之莊七逹謂之劇驂八逹謂之崇期九逹謂之逵廟中路謂之唐大路謂之奔爾雅墿亦軌堩亘衘徑㽘航􅳚干道也廣雅阡陌南北為阡東西為陌風俗通長安中有九陌漢宫殿疏東西經七陌南北越九阡子建詩四逹帝顓頊之法婦人不辟男子於路者拂之於四逹之衢今之國都男女切踦肩摩於道其於俗一也淮南齊俗棄灰殷之法刑弃灰于街者子貢以為重問之仲尼仲尼曰知治之道也夫棄灰於街必掩人掩人人必怒怒則闘闘必三族相殘也此殘三族之道也雖刑之可也且夫重罪者人之所惡也而無棄灰人之所易也使人行之所易而無離所惡此治之道也一曰殷之法棄灰於公道者斷其手子貢曰棄灰之罪輕斷手之罰重古人何太毅也曰無棄灰所易也斷手所惡也行所易不闗所惡古人以為易故行之韓非子道茀定王使單襄公聘宋假道于陳火朝覿矣道茀不可行也司空不視途道無列樹單子歸告王曰陳侯不有大咎國必亡夫辰角見而雨畢天根見而水涸故先王之敎曰雨畢而除道水涸而成梁故夏令曰九月除道十月成梁周制有之曰列樹以表道立鄙食以守路陳國道路不可知是廢先王之法制者也其能久乎周語失道管仲隰朋從於桓公而伐孤竹春徃冬反迷惑失道管仲曰老馬之智可用也乃放老馬而随之遂得道韓非子争道楚野辨女者昭氏之妻也鄭簡公使大夫聘於荆至於狹路有一婦人乘車與大夫轂擊而折大夫車軸大夫怒將執而鞭之婦人曰君子不遷怒不貳過今於狹路之中妾避之已極矣而子大夫之僕不肯少引是以敗子夫夫之車而反執妾豈不遷怒哉既不怒僕而反怨妾豈不貳過哉列女傳術子産相鄭十八年刑三人殺二人桃李之垂於街者莫之授也錐刀之遺于道者莫之舉也呂覧下賢孟春察端徑術注端正其徑路不得邪行也吕覧畛涂陳術亦道路别名初學記别途孔子用魯三年男子行乎塗右女子行乎塗左財物之遺者民莫之舉吕樂成五父季孫相魯子路為郈令魯以五月起衆為長溝當此之為子路以其私秩粟為民飯要作溝者于五父之衢而飡之孔子聞之使子貢徃覆其飯色毁其噐曰魯君有民子奚為乃飡之子路怫然怒攘肱而入請曰夫子疾由之為仁義乎孔子曰由之野也女之飡之為愛之也夫禮天子愛天下諸侯愛境内大夫爱官職士愛其家過其所愛曰侵今君有民而子擅愛之此是子侵也不亦誣乎言未卒而季孫使者至讓曰肥也起民而使之先生使弟子今徒役而飡之將奪肥之民耶孔子駕而去魯韓外儲多岐楊子之鄰人亡羊既率其黨又請楊子之䜿追之楊子曰嘻亾一羊何追者之衆隣人曰多岐路既反問獲羊乎曰亡之矣曰奚亾之曰岐路之中又有岐焉吾不知所之所以反也心都子曰大道以多岐亡羊學者以多方䘮生列說符楊子見逵路而哭之為其可以南可以北墨子見練絲而泣之為其可苡黄可以黒淮說林堙郤中山之國有風繇者智伯欲攻之而無道也為鑄大鍾方車二軌以遺之風繇之君將斬岸堙谿以迎鍾赤章蔓枝諫曰諫云唯則定國我胡則以得是於智伯夫智伯之為人也貪而無信必欲攻我而無道也故為大鍾方車二軌以遺之君因斬岸堙谿以迎鍾師必随之弗聽有頃諫之君曰大國為懽而子逆之不韓子釋之赤章蔓枝曰為人臣不忠貞罪也忠貞不用逺身可也斷榖而行至衛七日而風繇亾吕權勳風繇韓子作伉繇衛作齊金牛昔蜀王從卒數千餘出獵於褒谷而溪奏惠王亦畋於山中怪而問之以金一筐遺蜀王及報欺之以土秦王大怒其臣曰此秦得之端秦王未知蜀道乃刻石牛五頭置金于尾下偽如養之者言此天牛能屎金蜀人見而信之乃令五丁共引牛成道致之成都秦始知蜀道使張儀伐之蜀王開戰不勝而亡十三州志馳道秦紀始皇二十七年治馳道注曰馳道天子道也蔡邕曰馳道天子所行道也今之中道然漢令諸侯有制得行馳道中者行旁道無得行中央三丈也不如令沒入其車馬黄圖賈山至言曰秦為馳道於天下東竆燕齊南極呉楚江湖之上瀕海之觀畢至道廣五十歩三丈而樹厚築其外隐以金椎樹以青松為馳道之麗至於此使其後世曽不得邪徑而託足焉漢書鮑宣為司𨽻丞相孔光四時行園陵官屬以令行馳道中宣沒入其車馬本傳行必以車馬故以名馳選注年不順成馳道不脩毛詩注甬道漢王屯榮陽築甬道屬河以取敖倉粟應劭曰恐敵抄錙重故築垣墻如街巷也紀棧道張良至褒中因説漢王燒絶棧道以備諸侯盗兵亦視項羽無東意注棧即閣也今謂之閣道紀復道髙祖居南宫從復道上見諸將徃徃耦語如淳曰上下有道故謂之復紀惠帝為東朝長樂宫及間徃數蹕煩民作復道方築武庫南紀桂宫周回十里内有複道横渡西至神明䑓三輔故事間道韓信欲東下井陘擊趙李左車說趙王曰願假臣等三萬兵從間路絶其輜注㣲路也黥布已先從間道破闗下軍本傳靈山司馬相如畧定西南夷通靈山道橋孫水注鑿開靈山道置靈道縣本藁街丼延夀陳湯上疏云斬郅支首及名王以下冝縣頭藁街蠻夷邸間本傳長安城中有藁街三輔故事子午平帝元始五年秋王莾以皇后有子孫顓通子午道子午道從杜陽直絶南山徑漢中師古曰子北方也午南方也言通南北道相當故謂之子午耳今京城古南山有谷通梁漢道名子午谷又冝州西界慶州東界有山名子午嶺計南北直相當此則北山者是子南山者是午共為子午道漢傳子午長安正南山名三秦記王莾以皇后有子孫瑞通子午道葢以子午為隂陽之王氣也括地志九逵長安城面三門四面十二門皆通逹九逵以相經緯衢路平正可並列車軌十二門三塗洞闢隐以金椎周以林木左右出入為徃來之徑行者升降有上下之别三韓央録披三條之廣路立十二之通門西都賦城郭之制則旁開三門参塗夷庭方軌十二街衢相經西京賦飛狐建武十三年盧芳與匃奴烏桓連兵㓂盗詔王霸將弛刑徒六千餘人與杜茂治飛狐道堆布土石築起亭障自代至平城三百餘里注飛狐道在今蔚州飛狐縣北通媯州懐戎縣即古飛狐口也後漢距飛狐之口注曰在代郡西南與馬肅宗崩亷范奔赴敬陵時廬江郡掾嚴麟奏章弔國俱㑹於路麟乘小車塗深馬死不能自進范見而愍然命從騎下馬與之不告而去麟事畢不知馬所歸乃縁縱放之或謂麟曰故蜀郡太守亷叔度好周人窮急今奔國䘮獨當是耳麟亦素聞范名以為然即牽馬造門謝而歸之世伏其好義後漢嶠道建初八年鄭𢎞為大司農舊交趾七郡貢獻轉運皆從東冶汎海而至風波艱阻沉溺相系𢎞奏開零陵桂陽嶠道至今為常路本傳褒斜延光四年詔益州刺史罷子午道通褒斜路漢書褒斜漢中谷名南曰褒北曰斜三秦記褒水東南歴小石門穿山通道六丈有餘刻石言漢永平中司𨽻校尉楊厥所開建和二年王升琢石頌德葢因石牛道而廣之水經注諸葛孔明揚聲由斜谷道郿避泥鍾皓字季明為司徒掾公出道路泥濘導從惡其相灑去公與從者公雖在城司徒今日為獨行耳先賢行狀街卒孔嵩字仲山宛人與山陽范式有斷金契貧無養親賃為阿里街卒遣迎式式下車把臂曰子懐道卒伍不亦痛乎嵩曰侯嬴賤役晨門卑下之位古人所不恥何痛之有故其讃曰仲山通逹卷舒無方屈身所役拱令含芳水經嵩在阿里正身厲行街中子弟皆服其訓化後俗閣道諸葛孔明與兄瑾書云前趙子龍退軍燒壊赤崖以北閣道縁谷一百餘里其閣梁一頭入山腹牛一頭立柱於水中今水大而急不得安柱此其窮極不可强也又云頃大水暴出赤崖以南橋閣悉填有居子龍與孔明議之哉其路山谷常有患難人挂待縁崖與伯苖相聞而已水經銅駞洛陽太尉司徒兩坊間謂之銅駞街魏明帝置銅駞諸物於閶闔南街陸璣云駞髙九尺積出太尉坊者也上銅駞街在洛陽宫南金馬門外人物繁盛俗語云金馬門外聚羣賢銅駞街上集少年陸璣洛陽記左擔江油在擔道按圖在隂平縣北於成都為西其道至險自北來者擔在左肩不得度擔也鄧艾束馬懸車之處任豫益州記開道天紀二年衛尉岑昏表脩百府自官門至朱雀橋夾路作府舍又開大道使男女異行夾道皆築髙墻瓦覆或作竹藩環濟呉紀避道王戎簡脱不持儀刑好乘巴滇馬雖為三司率爾私行廵省園田不從一人以手巾揷腰戎故吏多至大官相逢戎輙下道避之竹林七賢哭途阮籍常率意獨駕不由徑路車跡所窮輙慟哭而反魏氏春秋四逹晉穆帝升平二年二月詔曰佽飛督王饒忽上吾鴆鳥一口云以避惡此是凶物豈冝妄進於是鞭饒二百使殿中御史孫雲焚其鳥於四逹之衢中興書樹栁符堅滅燕趙之後自長安至於諸州皆夾路槐樹栁二十里一亭四十里一旅行者取給於塗工啇資販於道崔鴻前秦録盤道氐人揚難當居仇池山髙二十里羊腸盤道三十六廽王智深宋紀相逢司馬膺之神氣甚髙性方古舊典楊愔同為黄門即至愔為尚書令抗禮如初曽路逢愔威儀導别乃於樹下側避愔望見令呼謂曰兄何意避弟膺之曰我自避赤棒本不避卿愔甚重之北齊植槐李孝寛為雍州刺史先是路側一里置一圡堠經雨頺壊毎煩修之自孝寛臨州乃勒部内當堠處植槐木代之既免修復行旅又得庇䕃周文後見恠問知之曰豈得一州獨爾當天下同之於是分諸州道路一里植一木十里植二木百里植五木焉北史御道隋煬帝大業元年發淮南民十餘萬開䢴溝自山陽至揚子入江渠廣四十歩旁皆築御道樹以栁街皷舊制京城内金吾曉暝傳呼以戒行者馬周獻封章始置街皷俗號􅕣􅕣公私便焉有道人裴修然雅有篇詠善畫好酒常戯馬為渭川歌詞曰遮莫鼕鼕動湏傾湛湛杯金吾儻借問報道玉山頺甚為時人所賞大新新語龍尾舍元殿側龍尾道自平階至凡詰曲七轉由丹鳯門北望宛如龍尾下垂於地焉兩垠欄檻悉以青石為之至今石柱猶有存者賈氏談録安禄山逆謀日熾毎過朝堂龍尾道南北睥睨乆乃去本傳别開髙宗將幸汾陽宫以狄仁傑為知頓使并州别駕李冲𤣥以道出妬女祠俗云盛服過者必致風雷之災乃發數萬人别開御道仁傑曰天子之行千乘萬騎風伯清塵雨師灑道何妬女之害耶遽令罷之髙宗聞之嘆曰真大丈夫也舊唐鑿山陸象先為益州長史奏嘉卭路逺請鑿岷山之南以從㨗近發卒從役居人不堪多道亾瘉死行族無利左拾遺張宣明監姚雋諸軍事兼招慰使乃親驗其路審其難險移牒益州曰此路髙山臨雲深谷無景至有斗絶巨險殆不通人蹤經之者必摶壁旁崖脅息而度雖竟日登頓二十許里木人猶堪淚下鉄馬亦可蹄穿象先覧之兢惕遽罷役仍舊路以聞蜀人頼焉唐新語避遲初房琯嘗尉馮翊陸象先下孔目官党芬于廣衢相遇避馬遲琯拽芬下决脊數十下芬訴之象先曰汝何處人芬曰馮翊人又問房琯何處官人芬日馮翊尉象先曰馮翊尉决馮翊百姓告我何也琯亦入見訢其事請去官象先曰如党芬所犯打亦得不打亦得官人打了去亦得不去亦得太平廣記蜀道李白嘗為蜀道難歌曰蜀道難難于上青天白以刺嚴武也後陸暢復為蜀道易曰蜀道易易于履平地暢佞韋臯也初暢受知于臯乃作蜀道易獻之臯大喜贈羅八百疋尚書文實道槐貞元中度支欲取兩京道中槐樹為薪更栽小樹先下符牒華隂華隂尉張造判牒曰召伯所憇尚不剪除先皇舊遊豈冝斬伐乃止國史補迷道貞元二年李晟收復京城朱泚以千餘人西走昏忽迷道不辨南北因問路於田父父曰豈非朱太尉耶偽宰相源休之曰曰漢皇帝田父曰天不長兇地不生惡蛇不為龍鼠不為虎天網恢恢去將何適泚怒將殺之忽亾其所在杜陽編偏道貞元七年刺史李西華自藍田至内鄉開新道七百餘里廽山取塗人不病渉謂之偏路地理志掃街蜀之士子莫不沽酒慕相如滌噐之風陳㑹郎中家以當壚為業為不掃官街吏歐之其母甚賢勉以進修不逹不要歸鄉以成名為期毎嵗舉粮紙筆衣服僕馬皆自成都齎至中都助業後業成元和元年及第李相固言覧報將處分廂界收下酒斾闔其户家人猶疑之逡廵賀登第實聖善奬諭之力也唐語林天威髙駢鎮安南使者嵗至乃鑿道五所置兵䕶送其徑有青石或傳馬援所不能治既攻有震碎其石乃得通因名其道曰天威云唐書置耳呉崔太初多疑好察毎通街交㑹之所牆必置耳謂人曰還聞牆有耳否非牆耳乃吾耳行路之人鮮敢偶語志天街天街兩畔槐樹俗號為槐衙曲江江畔有栁亦號為栁衙意謂其成行列如排衙也中朝故事裙腰白樂天杭州春望云誰開湖寺西南路草緑裙腰一徑斜注孤山寺路在湖州中草緑時望如裙腰長慶集鳥道交趾郡治龍編自興古鳥道四百里南中志李太白詩西當太白有鳥道可以横絶峨眉巔畏途夫畏塗者十殺一人則父子兄弟相戒也必盛卒徒而出敢出焉不亦智乎人之所取畏者祍席之上飲食之間而不知為之戒者過也莊逹生畏途嚵巖不可攀李太白詩末路詩云行百里者半於九十此言末路之難秦䇿古道南唐元宗廬山百花亭刻石云蒼苔迷古道紅葉亂朝霞迷途廽朕車而復路及迷途之未逺楚辭寔迷途而未逺覺今是而昨非歸去來辭迷途知反徃哲是與邱希範與陳伯之書邪逕焦先孝然行不踐邪徑必循阡陌闕京兆仟武帝時京兆尹曹氏葬茂陵民謂其道為京兆仟渉慕之為買地開道立表署曰南陽仟人不肯從謂之原天仟前書郟鄏杜預釋地曰河南縣王城西有郟鄏陌水經注紫陌漳水北逕祭陌西戰國之世徐巫為河伯取婦祭於此陌西門豹投巫河中淫祀雖斷地留祭陌之稱舊融以為紫陌也趙建武十一年造紫陌浮橋於水上為浮圖澄又造生墓於紫陌即此處也水經晉書自啓塋墓於鄴西紫陌織路庸織路於四裔兮斯與彼其何瘳思𤣥賦言渉路東西有似於織也邯鄲漢文帝至覇陵居北臨厠是時愼夫人從上指示愼夫人新豐道曰此走邯鄲道也史記陳倉諸葛孔明與兄瑾書曰有綏陽小谷雖山崕絶重溪水縱横難用行軍者羅候徃來要道通人今使前軍斫治此道以向陳倉足以扳連賊勢使不得分兵東行者也水經逆旅就國師曲父東就國道宿行遲逆旅之人曰吾聞時難得而易失客寢處安殆非就封者也太公聞之夜衣而行犁明至國菜侯來伐與之争營丘史記太公蹶起即路俄有追者至以其出關遂王獨異志假道荀息假道於虞曰今虢為不道保於逆旅以侵弊邑之南鄙左傳僖公暮舍鄭桓公東㑹封於鄭暮舍于宋東之逆旅逆旅之叟從外來曰客將焉之曰東封於鄭逆旅之叟曰吾聞之時難得而易失也今客之寢安殆非封也鄭桓公聞之援轡自駕其僕接浙而載之行十日夜而至釐何與之争封故以鄭桓公之賢㣲逆旅之叟幾不㑹封也説苑宋東楊朱過宋東之於逆旅逆旅人有人二人其一人羙其一人惡惡者貴而美者賤楊子問其故逆旅小子對曰其美者自美吾不知其美也其惡者自惡吾不知其惡也楊子曰弟子記之行賢而去自賢之行安徃而不愛哉列子玉桂蘓秦之楚三日乃得見乎王談卒辭而行王曰寡人聞先生若聞古人今先生乃不逺千里而臨寡人曽不肯留願聞其説對曰楚國之食貴於玉薪貴於桂謁者難得見如鬼王難得見如天帝今令臣食玉炊桂因鬼見帝王曰先生就舍寡人聞命矣楚䇿投宿帝即位為㣲行嘗至柏谷夜投亭長宿亭長不納乃宿逆旅翁惡少年十餘人皆持弓矢刀劒令主人嫗出遇客婦謂其翁曰吾觀此丈夫非常人也且有備不可圖也天寒嫗酌酒多與其夫夫醉嫗自縛其夫諸少年皆走嫗出謝客殺雞作食平旦上去還宫乃召逆旅夫妻見之賜嫗金千斤擢其夫為羽林郎漢武故事漢武㣲行栢谷遇辱竇門又感其妻深識之饋既返玉階厚賞賚焉賜以津河令其鬻渡今竇津者是也故潘岳西征賦酬匹婦其已泰故厥夫之謬官袁豹之徒並以為然余按穆天子傳曰天子自竇軨乃次於浢水之陽丁亥入於南鄭考其㳂歴所鍾路直斯津以是推之知非因門矣水經除糞第五倫自度仕宦牢落遂將家屬客河東變易姓名自稱王伯齊常與奴載塩北至太原販賣毎所止客舍去輙為除糞陌上號曰道士開門請求不復責舍宿直東觀漢記供客周防字偉公父楊少孤㣲常修逆旅以供過客而不受其報後漢洒掃郭林宗毎行宿逆旅輙躬洒掃及明去後人至見之曰此必郭有道昨宿處也别傳客舍靈帝數遊戱於西園中令後宫采女為客舍主身為啇賈服行至舍采女下酒食因共飲食以為戱樂後五行志客議謹按客舍逆旅乆矣其所由來漸矣行者頼其頓止居者薄收其直交易貨還各得其所役賦而因民利誠惠加百姓而公無所費語曰許由辭帝堯之命而舍於逆旅自唐到今未有不得客舎之法潘岳客舎議償衣桑虞嘗行寄宿逆旅同宿客失脯疑虞為盗虞黙然無言便觧衣償之主人曰此舎數失魚肉雞鴨多是狐狸偷去君何以疑人乃將脯主至山冡間尋求果得之客求還衣虞投之不顧晋書獨酌馬周西行長安至新豐宿於逆旅主人唯供諸啇販而不顧周遂命酒悠然獨酌主人翁深異之乃為常何陳便冝二十餘事太宗怪其能問何何荅曰此非臣發慮乃臣家客馬周也太宗召見甚悦随大用敕求勝地為周起宅談賔録失家口滄州南皮丞郭務静性糊塗與主簿劉思莊宿于逆旅謂莊曰從駕大難静嘗從駕失家口三日于侍官幕下討得之莊曰公夫人在其中否静曰若不在中更論何事朝野僉載訪謫仙李太白初自蜀至京師舍于逆旅賀監知章聞其名首訪之既竒其姿又請所為文白出蜀道難以示之讀未竟稱嘆數四號為謫仙人本事詩輟馬熊執易赴舉行次潼關秋霖月餘滯于逆旅俄聞隣店有一士吁嗟數次執易潜問之曰前堯山令樊澤舉制科至此馬斃囊空莫能自進執易造焉遽輟所乘馬倒囊濟之執易其年罷舉澤明年登科摭言賦詩李義山遊長安投宿旅店適㑹客因召與坐不知為義山也酒酣客賦木蘭花詩衆皆誇示義山后成詩曰洞庭波冷曉侵雲日日征㠶送逺人幾度木蘭舟上望不知花是此船身坐客大驚詢之方知是義山古今詩話零陵緫記陸龜蒙所作村禹㑹濠州鍾離縣塗山禹娶所也山西南有禹墟及禹㑹村葢禹㑹諸侯之地輿地志石紐禹汶山廣柔人生於石紐村其地名刳児坪元和郡縣志今夷人共營其地方百里不敢畜牧有罪迯其野中捕者不敢追之畏禹神能藏三年不為人得則共原之言為禹神所祐也華陽國志禄里呉太湖中洞庭中西南中號禄里村角里先生所居也史正義昭君王昭君生於峽州今有昭君村緑珠生於白州今有緑珠江貴妃生於蜀嘗誤墜池中後人呼為落妃池楊妃外傳羣山萬壑赴荆門生長明妃尚有村杜詩烏夜村晋穆帝后父何凖寓居海塩南三里后將産之夕有羣烏夜驚于聚落爾後烏更鳴衆共異之及明大赦乃穆帝立凖女為后之日錦沙睦州清溪縣錦沙村傍山依壑素波澄映錦石舒文冠軍呉喜聞之而造焉鼓枻㳺汎彌旬忘返歎曰名山美石故不虚賞使人忘朱門之志睦州記昉村歙縣有昉村俗說任昉為新安太守因行春至此愛其雲溪縁源尋幽累日不返百姓因名其溪為昉溪溪旁村為昉村村旁有山故近北野縣毎山石石墜則不利縣官縣廢後其事亦止大中十年刺史盧藩改曰任公村任公溪寰宇記浣花奉乞桃栽一百根春前為送浣花村杜詩甫于成都浣花里種竹植樹結廬枕江縱酒嘯咏與田夫野老相狎舊唐埋懐馬燧計李懐光自太原引兵至寳􅀢下營問其地名埋懐村乃大喜曰擒賊必矣國史補朱陳徐州古豐縣有村曰朱陳一村唯兩姓世世為婚姻白詩箬下長興若溪夾溪悉生箭箬南岸曰上箬北岸曰下箬二箬皆村名村人取下箬水釀酒醇美勝於雲陽俗稱箬下酒輿地志巴鄉魚復尉戍江之左岸有巴鄉村村人善釀故俗稱巴鄉清郡出名酒村側有溪溪中多靈夀木中有魚其頭似羊豐肉少骨美於餘魚水經平樂魚腹縣東狠山縣舊屬武陵縣北十餘里有神穴平居無水時有渴者誠啓請乞輙得水或戯求者水終不出縣東十許里至平樂村又有石穴出清泉中有潜龍毎至大旱平樂村左近村居輦草穢著穴中龍怒湏㬰水出蕩其草穢傍側之田皆得澆灌東亭從平樂順流五六里東亭村北山甚髙峻上合下空空徼東西廣二丈許起髙如屋中有石林甚整頓傍生野韭人徃乞者神許則風吹制分随偃而輸不過過越不偃而輸輸肉徃觀者去時特平暨處自然恭肅矣石塘桂陽陽山縣西北有石塘村村之流水側有豫章木本逕可二丈其株根猶存伐之積載而斧跡若新羽族飛翔不息其傍衆枝飛散逺集鄉亦不測所如唯見一枝獨在尋水涯矣萬嵗桂陽郴縣有千秋水出西南萬嵗山山有石室室中有鍾乳山上悉生靈壽木溪下即千秋水也水側民居號萬嵗村其水下合黄水湘陂郴縣南湘陂村邨有圓水廣圓可二百歩一邊暖一邊冷冷處極清緑淺則見石深則無底暖處水白且濁𤣥素既殊冷暖亦異厥名除泉其猶江乘之半湯泉也水盛則㵼黄溪水耗則律徑輟流斷石休寧縣西斷石村舊名呉口村西南有石壁下臨深溪舊經云昔有兩舟泊此一祭一否夜有神人徙祭者舟北岸有石自絶壁墜碎不祭者舟石墜處遂成石室輿地志梅花羅浮山髙三千六百丈周囬三百餘百嶺十五峰三十二其峰之秀者曰飛雲玉鵝錦繡玳瑁飛雲峰路側有梅花村南越志蘓軾詩羅浮山下梅花村玉雪為骨氷為魂木香冝城縣西六十里有木香邨唐段成式别業也地志梅廻洪亭村下有梅廻村舊云是梅槐合生成樹是以名之今音訛謂之梅廻王端休江陵記木客越有木客村鄱陽山中有木安秦時造阿房宫者食木實得不死時下山就民間取酒為詩云酒盡君莫沽壺傾我當發城市多囂塵還山弄明月徐鉉帖老人蜀青城山有老人村其溪有枸杞根飲其水故夀圖經野狐野狐泉店在潼關之西泉在道南店後坡下舊傳云野狐掊而泉涌店人改為冷淘過者行旅止焉今法饌中有野狐泉者以菉粉為之亦象此也南部新書原原廣平曰原下濕曰隰爾雅春秋説題辭曰髙平曰太原原端也平而有度廣延曰大鹵太原也釋名曰地不生物曰鹵盧榖梁傳曰中國曰太原夷狄曰大鹵尚書大傳曰東原底平大而髙平者謂之太原下而平者謂之隰水經上平曰原下平曰隰公羊傳地理風俗記曰原慱平也故曰平原矣水經土地寛慱而平正名之曰原李廵爾雅注畢原周文正𦵏于畢長安東南有原名畢原関中記劉向曰文武周公𦵏于畢師古曰畢陌在長安西北四十里漢書始平長安城北有始平原數百里無山川湖水其民井汲巢居井深五十丈有伯夷墓人食薇可常食或云夷叔食三年顔色如故漢時亦謂之北芒巖三秦記白鹿長安東則驪山西則白鹿原北望雲陽悉見山阜之形而恒若雲霧之中述征記周平王東遷有白鹿遊于此原以是得名葢春運之象三秦記杜陵狗枷川東亦曰白虎原上有狥枷堡三秦記曰驪山西有白鹿原原上有狗枷堡言襄公時有大狗來下有賊則狗吠之故一堡無患故川得厥目水經三畤三畤原在岐州雍縣南二十里封禪書云秦文公作鄜畤襄公作西畤靈公作呉陽上畤並此原上因名也括地志御覧引封禪書曰文公作鄜畤靈公作呉陽上畤宣公作宻下畤葢三畤在此原故號三畤原九原京陵縣故城於春秋為九原之地也國語曰趙文子與叔向遊於九原曰死者若可作也吾誰與歸叔向曰其陽子乎文子曰其智不足稱也叔向曰其舅犯乎文子曰其仁不足稱也其随武子乎納諫不忘其師矣故其京尚存漢興増陵于其下故曰京陵焉水經皇天玉澗水出土漢北流逕皇天原西首上平慱方可里餘三靣壁立髙千許仭漢世祭天于其上名之為皇天原上有漢武帝思子䑓上樂遊宣帝少依許氏長於杜縣樂之後𦵏于南原立廟於曲池之北亭曰樂遊原關中記少陵少陵原南接終南北至滻水即漢鴻固原也宣帝許后𦵏於此俗號少陵原長安志五丈諸葛亮據渭水南原司馬懿謂諸將曰亮若出武功依山東轉者是其勇也若西上五丈原諸君無事矣亮果屯此原與懿相禦水經長安符徤攻張琚于冝秋還登石安原而嘆曰美㦲斯原也悵然有終焉之志崔鴻前秦録萬壽髙祖校獵於華池之萬夀原白鹿見髙祖新御弧矢射而獲之舊唐鳯凰韋嗣立營搆别業于驪山鳯凰原鸚鵡谷有重崖洞壑飛流瀑水中宗新徃幸焉因封嗣立逍遥公名其所居曰清虚原幽棲谷後漢延光二年鳯凰集新豐即此原也亦驪山之别麓長安志舊唐韓原韓馮翊有原詩曰有卓其道韓侯受命是此原也又古今地名云韓武子食菜於韓原亦秦晋戰于此地即獲杜囬又秦獲晉惠侯以歸之處郡國志七山河東塩池東呉坂登七山原毎登一原輙峭起五六里原圡平廣不知巨極戴延之西征記風涼麗山之西川中有阜名曰風凉原在磈山之隂雍州之福地關中圖野郊外邑外謂之郊郊外謂之牧牧外謂之野爾雅襄城黄帝將見大隗于具茨之山方明為御昌宇参乘至於襄城之野七聖皆迷無所問塗適遇牧馬童子乃問途焉莊子洞庭北門成問黄帝曰帝張咸池之樂於洞庭之野吾始聞之而懼後聞之而怠卒聞之而惑蕩蕩黙黙乃不自得上絶轡炎帝戮蚩尤于中兾名其地曰絶轡之野帝王世紀青冦禹東至摶木之野日出九津青羗之野鳥谷青邱之鄉南至九陽之山不死之鄉西至積金之山共肱一臂三面之鄉光至夏海之窮夸父之野吕覧求賢牧野自朝歌以南南極清水土地平衍據臯跨澤悉坶野突即國志曰朝歌縣南有牧野竹書紀年曰周武王率西方諸侯伐殷敗之于坶野詩所謂坶野洋洋檀車煌煌者也水經激物秦自非子受封至昭王滅周之嵗在大梁前後七遷皆在禹貢雍州之域荆山終南敦物之野東井輿鬼之分鶉火之次也帝王世紀謀四子産之從政也擇能而使之禆諶能謀謀于野則獲謀于邑則否鄭國將有諸侯之事子産乃與禆諶乘以適野使謀可否而告馮簡子使斷之周禮少原孔子出遊少源之野有婦人中澤而哭其音甚哀孔子使弟子問焉曰夫人何哭之哀婦人曰鄉者刈蓍薪亾吾蓍簮吾是以哀也弟子曰刈蓍薪而亾蓍簮有何悲焉婦人曰非傷亾簮也盖不忘故也韓詩外傳丹野桓温北征姚襄在伊水上許遜曰不見得襄而有大功見襄走入太𤣥中問曰太𤣥是何等也荅曰南為丹野北為太𤣥必西北走也果如言幽明録廣莫莊子謂惠子曰子有大樹患其無用何不樹之于無何有之鄉廣莫之野彷徨乎無為其側逍遥乎寢卧其下莊逍遥壙垠無名人曰予方將與造物者為人厭則又乘失莽𦕈之鳥以出六極之外而遊無何有之鄉以處壙埌之野應帝王無極廣成子曰夫夫百昌皆生于土而反于土故余將去女入無窮之門以遊無極之地在宥霄雿大丈夫恬然無思澹然思慮縱志舒節以馳大區天地上游于霄雿翟之野下出于無垠之門執要道之柄而游于無窮之地淮原道罔浪若士曰我南游乎㒺浪淮南作䆡之野北息乎沉薶墨之鄉論衡道虚泱漭鏡機子駕超野之駟乘追風之輿經逈漢出幽墟入乎泱漭之野七啓過乎泱漭之壄上林賦莽䍚袒禓徒摶拔距投石之部参譚翋􅢣相與騰躍乎莽䍚之野呉都賦沃野西有王母之山有沃之國沃民是處沃之野鳯島之卵是食甘露是飲凡其所欲其味盡存鸞鳥自歌鳯鳥自舞爰有百獸相羣是處是謂沃之野有軒轅之䑓射者不敢西嚮射畏軒轅之䑓山海經天穆西南海之外赤水之南流沙之西有人乘兩龍名曰夏后開開上三嬪于天得九辯與九歌以下此天穆之野髙二千仞同上闗塞關西河天闕其星為天關天文志司闗掌國貨之節以聽關市周禮關在境所以察出禦入蔡邕月令章句九塞何謂九塞大汾冥淮作澠阨荆阮方城殽淮下有阪字井陘令疵字注居庸吕有始散関周無極元年老子度關關令尹喜先勅門吏曰若有老翁從東來乘青牛薄板車者勿聽過関其日果見老翁乘青牛車求度関関吏入白喜曰諾道今來矣我見聖人矣即帶印綬出迎設弟子之禮關令傳老子西遊遇闗令尹于散關抱朴子六關臧文仲其不仁者三不知者三下展禽廢六關注塞關陽關之屬凡六関所以禁絶末游而廢之左文二陽關汶水西南逕陽關故城西春秋襄公十七年逆臧紇自陽關者也陽虎居之以叛伐之虎焚菜門而奔齊者也水經鹿門季孫攻臧氏臧紇斬鹿門之關以出奔邾季孫用孟椒之言盟臧氏曰無或如臧孫紇干國之紀犯門斬關臧孫聞之曰國有人焉誰居其孟椒乎襄二十三昭關伍子胥與太子建子勝俱奔呉夜行晝伏出到昭關關吏欲執之胥因詐曰上之所以索我者以我有美珠也今我已亡之矣我將告子欲取之關吏因舎焉呉越春秋子胥橐載而出昭関夜行晝伏至于陵水無以餬其口膝行蒲伏稽首肉袒鼓腹吹箎乞食于呉市卒興呉國闔閭為伯史莊即傳督關楚肅王四年蜀伐楚取兹方楚為扞關以拒之世家楚自巫山起方城屬巫黔中設關扞以距秦塩鉄論江水自闗東逕弱関捍關注捍闗廪君浮夷水所置也弱闗接連平秭歸界昔巴楚數相攻伐藉險置關以相防捍水經巴郡魚腹扞水有扞關郡國志焉氐西秦小主夫人用奄變羣賢不悦自匿百姓欎怨非上公子連亡存魏聞之欲因羣臣臣與民從鄭所之塞右主然守塞弗入曰臣有義不兩主公子起去矣公子連去入翟從焉氐寒􅌲改入之夫人聞之大駭令吏興卒奉命曰冦在邊卒與吏其始發也皆曰徃擊㓂中道因變曰非擊冦也迎主君也公子連因與卒俱來至雍圍夫人夫人自殺公子連立是為獻公怨右主然而將重罪之徳菌改而欲厚賞之監突争之曰不可秦公子之在外者衆若此則秦人争入亡公子矣此不便主獻公以為然故復右主然之罪而賜菌改官大夫賜官塞者人米二十石獻公可謂能用賞罰矣吕覧當賞四塞秦四塞之國也史蘓秦傳秦地被山帶河四塞中為固婁敬傳秦地左肴函右隴阺前蜀漢後山河四塞以為固金城千里塩鉄險固凾谷蘓秦約從山東六國共攻秦楚懐王為從長至函谷關秦出兵擊六國六國兵皆引而歸史記函谷闗邃岸天髙空谷幽深澗道之峽車不方軌號曰天險故西京賦曰巖嶮周固衿帶易守所謂秦得百二并呑諸侯也是以王元說隗囂曰請以一丸泥東封函谷闗圖王不成其弊足覇矣水經蒲坂魏襄王七年秦王來見于蒲坂闗竹書紀年鷄鳴孟嘗君夜出秦闗雞未鳴而闗不闓下坐賤客皷臂為雞鳴而雞皆和之關得開而孟嘗得出論衡定賢燕丹去秦夜到關闗門未開丹為雞鳴衆雞皆鳴遂逃逃歸燕丹子燕丹孟嘗君義動雞鳴于其下可謂深心有感至誠難奪矣昔老子西入闗尹喜望氣于此也故趙至與稽茂齊書曰李叟入秦及関而嘆水經白馬倪說宋人善辯者也持白馬之非白馬也齊稷下之辯者乘白馬而過闗則顧白馬之賦故籍之虚辭則能勝一國考實按形不能謾于一人韓非子公孫龍常争論曰白馬非白人不能屈後乘白馬無符傳欲出闗闗吏不聽此虛言難以奪實也桓譚新論虎牢左魯襄公二年七月晋成公與諸侯㑹于戚遂城虎牢以逼鄭穆天子傳曰天子射鳥獵獸于鄭圃命虞人掠林有虎在於葭中天子將至七萃之士髙奔戎生擒虎而獻之天子命之為狎畜之東虞是曰虎牢矣然則虎牢之名自此始也秦以為闗漢乃縣之城西北隅有小城周三里北面列觀臨河迢迢孤上路直兹邑昇眺清逺勢盡川陸羈途㳺至有傷深情水經金事關吏衛嗣公使人為客過闗市闗市苛難之因争闗市以金與闗吏乃舎之嗣公謂闗吏曰其時有客過而所與女金而女因遣之関吏乃大恐而以嗣公為明察韓非子發薪沛公西入武闗居於㶚上遣將軍閉凾谷闗無内項王項王大將亞夫至闗不得入怒曰沛公欲反耶即令家發薪一束欲燒闗門闗門乃開楚漢春秋終軍終軍初從濟南當詣慱士入闗闗吏與軍繻軍問以此何為吏曰為復傳還當以合符軍曰大丈夫西遊終不復傳還棄繻而去後軍為謁者使行郡國建節東出闗闗吏識之曰此使者乃前棄繻生也漢書榆林衛青西定河南地案榆溪舊塞本傳伍被諫淮南王曰今漢廣長榆開朔方匈奴折傷雖未及古太平時然猶為治本傳上郡之北有諸次山諸次水出焉其水東逕榆林塞世又謂之榆林山自溪西去悉榆栁之藪矣縁歴沙陵屇龜兹縣西出故謂廣長榆也王恢云樹榆為塞謂此矣水經長榆塞名或謂之榆中漢書注枚乘説呉王曰秦北備榆中之闗南距𦍑筰之塞本傳徙關凾谷闗舊在𢎞農湖城縣西元鼎三年冬樓船將軍楊僕數有大功恥為闗外民上書乞徙東闗請以家僮七百人築塞以家財給其用度武帝意亦好廣濶於是徙闗于新安去𢎞農三百里武紀臨晋所為建武闗函谷臨晉闗者大抵為備山東諸侯也今大諸侯多其力因建闗而備之豈若定地勢使無可備之患賈誼新書蕭關元封四年冬行幸雍祠五畤通囬中道遂北出簫闗歴獨鹿鳴澤武紀孝文十四年匈奴單于十四萬騎入朝那蕭闗匈奴傳五原甘露二年呼韓邪單于欵五原塞願朝就邸留月餘遺歸國單于自請願留光禄塞下漢發邊郡士馬送單于出朔方雞鹿塞匈奴傳居庸建武十五年二月徙鴈門代郡上谷民置常山闗居庸闗以東武紀濕餘水出上谷居庸闗東溪之東岸有石室三層其户牖扇扉悉石也葢古闗之候䑓矣南則絶谷累石為闗址崇墉峻壁非輕功可舉山岫層深側道褊峽林彰蘧嶮路才容軌曉禽暮獸寒鳴相和覊官遊子聆之莫不傷思矣水經封符郭丹初之長安從宛人陳兆買入闗符以入函谷闗既入封符乞人曰不乘使者車不出闗丹自從入闗後不歸家十二年後奉使乃出闗竟不本心東觀漢記玉門光武閉玉門闗謝西域之貢紀班超乆在絶域年老思土上疏云不敢望到酒泉郡但願生入玉閧闗本傳自敦煌西出玉門闗陽闗渉鄯善北通伊吾千餘里後西域傳西域以孝武時始通東接漢阸以玉門闗闗西則限以葱嶺前西域傳上黨馮異北攻天井闗拔上黨二城注天井闗在太行山下本傳䢴水出太行之阜山則五行之異名也淮南子曰武王欲築宫于五行之山用公曰五行嶮固徳能覆也納貢廽矣使吾暴亂則伐我難矣君子以為能持滿髙誘曰今太行山也在河内野王縣西北上黨闗也詩所謂徒殆野王道傾盖上黨闗即此山矣水經馮衍遺田邑書曰上黨有四塞之固東帶三闗西為國蔽注三闗謂上黨壺口石陘也本傳白水關李固出為廣漢令至白水闗觧印綬還漢中本傳城闗西南百八十里有白水闗固觧印綬處也梁州記金牛縣南有故白水闗通典八關散闗鄣自南山横洛水北屬于河皆塞也也即楊僕家僮所築矣其城西岨塞垣北抗惠水靈帝中平元年以河南尹何進為大將軍五營士屯都亭置凾谷闗廣成伊闕太谷轘轅旋門津小平孟津入闗都尉官治此凾谷為之首在八闗之限故後人緫其統目有八闗之名矣水經洛陽四關升髙臨四闗鮑昭樂府漢洛陽四關東成臯闗南伊闕闗西凾谷闗北孟津洛陽記潼關魏延欲請精兵萬人與諸葛亮異道㑹于潼闗亮制而不許蜀志河在闗内南流潼激闗山因謂之潼闗或説因潼谷水以名地也潼闗東北水側有長坂謂之黄卷坂旁絶澗歩此坂以升潼闗所謂泝黄卷以濟門闗也水經蜀三關三闗電埽于令升晉紀論賀邵曰劉氏據三闗之險守重山之固呉志蜀有陽平闗江闗白水闗此為三闗張華漢南記漢中褒城漢褒中縣有漢陽平闗在縣西北蜀先主破魏軍于此通典照烈起舘築亭彰從成都至白水闗四百餘區典畧白馬蜀孟逹降魏文帝以為新城太守治房陵有白馬山山石似馬望之逼真側水謂之白馬塞逹登之而嘆曰劉封申躭據金城千里而更失之乎為上堵吟音韻哀切有惻人心今水次尚歌之水經木蘭漢水石岸有城名陵城周廻數里左岸壘石數十行重壘數十里中謂是處為木蘭塞云呉朝遣軍救孟逹于此矣上鬼門関鬼門闗去北流縣南三十里有兩石相對其間濶三十里俗號為鬼門闗漢伏波將軍馬援討林邑蠻路由于此立碑石龜尚在昔時趨交趾皆由此闗其南尤多瘴癘去者罕得生還諺曰鬼門關十人去九不還唐宰相李徳裕貶崖州日經此關因賦詩云一去一萬里千知千不還崖州在何處生渡鬼門關寰宇記唐詩記事楊炎作李太尉之在崖州也郡有北亭子謂之望闕亭太尉毎登臨未嘗不北睇悲咽有詩曰獨上江亭望帝京鳥飛猶是半年程青山也恐人歸去百匝千遭繞郡城昔崖州今瓊州是也南部新書瘴江西去火為山炎徼南窮鬼作闗張均流浦州詩容州鬼門關其土少鉄以營石為燒噐以烹魚􅀈北人謂之五侯燋石一經火乆之不冷今之滑石也方輿勝覧桃林桃林塞在長安東四百里若有軍馬經過好行則牧華山休息林下惡行則決河漫延人馬不得過矣三秦記鴈門山海經曰鴈門之水出于鴈門之山鴈出其間在髙栁北髙栁在代中其山重巒疊巘霞舉雲髙連山隐隐東出遼塞水經鴈塞鴈塞北接梁汶陽郡鴈至矯翮而度同于鴈門也荆州記梁伯縣界有鴈塞傳云此山有大池水鴈栖集之故名鴈塞梁州記楚塞郡西泝江六十里南岸有山名曰荆山北岸有山名曰虎牙二山相對楚之西塞也荆門上合下開開逹山南有門之形故曰荆門荆州記魯陽魯陽縣有魯陽關左右連山揷漢秀木干雲是以張景陽詩云朝登魯陽關峽路峭且深水經橋橋橋水梁也榷水上横木所以度也亦曰彴今謂之畧􅀈東楚謂橋為圯説文石杠謂之猗爾雅聚石水中以為歩度彴也註百官上虞縣一名虞賔晋太康地記曰舜避丹朱于此故以名縣百官從之故縣北有百官橋亦云禹與諸侯禽事訖因相虞樂故曰上虞水經黿鼉周穆王三十七年伐楚九起九師至于九江架黿鼉以為梁竹書紀年恨賦方架黿鼉以為梁善引竹書周武王伐紂東至九江云云舜命禹疏川奠岳濟巨海則黿鼉以爲橋梁拾遺記梁溠楚令尹鬬祁除道梁溠營軍随架左莊四溠水名臭梁晉平公警守而下㑹于溴梁襄十六梁莫大于溴梁爾雅機橋燕太子丹質于秦秦王遇之無禮乃求歸秦王為機發之橋欲以䧟丹丹過之橋不為發又一說交龍捧轝而機不發但言今不知其故處矣水經七星蜀有七橋一冲里橋二市橋三江橋四萬里橋五夷里橋六笇橋七長升橋李氷沿水造橋上應七宿故光武謂呉漢曰安軍冝在七星橋間也華陽國志横橋秦造横橋漢承秦制廣六丈三百八十歩置都水令以掌之號為石柱橋三輔舊事横橋以象牽牛黄圖橋之北首壘石水中舊有忖留神象此神嘗與魯班語班令其人出忖留曰我貌狠醜卿善圖物容我不能出班于是拱手與言曰出頭見我忖留乃出首班於是以脚畫地忖留覺之便還沒水故置其象於水唯背以上立水上忖留之像曹公乘馬見之驚又命下之水經渭橋渭橋在長安北三里跨渭水為橋始皇造渭橋鉄鐓重不能乃刻石作力士孟賁等像祭之鐓乃可移動今石人在黄圖渭橋有三所一在城西北咸陽路曰西渭橋一在東北髙陵路曰東渭橋其中渭樓在故城之北索隐張釋之傳覇橋覇橋在長安東跨水作橋漢人送客至此橋折桞贈别王莾時覇橋災數千人以水沃救不滅更覇橋為長存橋黄圖飲馬漢時七里渠有飲馬橋長安圖丞相夏侯嬰墓在飲馬橋東大道南人謂之馬冢三輔舊事昇仙蜀城北十里有昇仙橋送客觀司馬相如初入長安題其柱曰大丈夫不乘赤車駟馬不過汝下也華陽國志竹橋諸葛亮表云臣遣虎歩監孟琰據武功水東司馬懿因渭水漲攻琰營臣作竹橋越水射之橋成遂馳去水經注萬里萬里橋在成都縣南八十里蜀使費褘使呉諸葛亮送之于此嘆曰萬里之路始於此橋因名萬里橋華陽國志河橋杜預啓建河橋于富平津衆論以為殷周所都經聖賢而不作者必不可作故也預曰昔造舟為梁則河橋之謂也遂作橋成上從百官臨㑹舉杯勸預曰非君此橋不立也預曰非陛下之明臣亦不獲奉承聖制也衆咸稱善旅人洛陽七里澗有石梁即旅人橋也昔孫登不欲乆居洛陽知榮氏榮不保終思遁遁跡林鄉隐淪妄死楊駿埋之於此橋之東駿後尋亾矣朱超石與兄書云橋去洛陽宫六七里悉用大石下員以通水可受大舫過也制作竒狀水經猪蘭猪蘭橋其本名荻蘭橋橋之左右豐蒿荻于橋東劉季和大養猪襄陽太守曰此中作猪屎臭可易名猪蘭橋初如戯言而百姓遂以為名矣襄陽耆舊傳浮橋趙建武中造浮橋于水津上採石為中濟石無大小下輒流去用功百萬經年不就石虎親閱工作沈璧于河明日璧流渚上波蕩上岸遂斬將而還水經朱雀明帝太寧二年六月丁夘以應詹為護軍將軍假節督朱雀橋南諸軍事晋紀呉時南津橋橋又名朱雀桁五丈慕容垂與劉牢之戰于五丈橋澤因大敗車騎慕容德等引兵逼之五丈橋牢之馳馬跳五丈澗㑹符丕救至而免崔鴻十六國春秋後燕録河厲吐谷渾于河上作橋謂之河厲長一百五十歩兩岸累石作基陛節節相次犬木從横更鎮壓兩邊俱來相去三丈並大村以板横次之施勾欄甚嚴飾段國沙州記長分閶闔門城外七里長分橋中朝時以榖水浚急注于城下多壊民家立石橋以限之長則分流入洛故名曰長分橋或云晉河間王在長安遣張方征長沙王營軍于此因為張方橋也今民間訛語號為張夫人橋朝士送迎多在此處伽藍記崔公崔亮為雍州刺史城北渭水淺不通舡行人艱阻㑹天大雨山水暴至浮出長木數百根藉此橋用橋遂成立百姓利之至今猶名崔公橋後周書天津天津橋在河南縣北四里隋大業元年初造用大舡維舟以鐡鏁鉤連南北夾路對起四樓其樓為日月表勝之象正觀十四年更令石工累方石為脚爾雅斗牛之間為天漢之津故取名元和志石橋趙州石橋甚工磨櫳蜜緻如削焉望之如初月出雲長虹飲澗上有勾欄皆石也勾欄並有石獅子龍朔年中髙麗謀者盗三獅子去後後募匠修之莫能相類者至天后大足年黙啜破趙之定州賊欲南過至石橋馬跪地不進但見一青龍卧橋上奮迅而怒賊乃遁去朝野僉載野郡洨河石橋隋匠李春之跡也制造奇特張嘉正栁渙張彧為銘文粹大陽大陽橋長七十六丈廣二丈架黄河為之左陜縣東北三里正觀十一年太宗東廵遣武候將軍邱行㭟營造元和志肥鄉神龍中韋景駿為肥鄉令縣北瀕漳水連年泛濫舊坊廹漕渠雖峭岸随即壊决景駿相其地勢益南千歩因髙築漳水至隄距輙去其北燥為腴田雖漕以梁其上而廢長橋功少費約人立石著功數年後刺趙州道出肥鄉民曰學廬舘舎橋彰皆公所治夲傳利渉初都城洛水天津之東立徳坊西南隅有中橋及利渉橋以通行李上元中司農卿韋機始移中橋置于安衆坊之左街當是夏門都人甚以為便因廢利渉橋所省萬計然嵗為洛水衝注常勞治葺李昭徳創意積石為脚鋭其前以分水勢自是竟無漂損舊唐河橋蒲津河橋天下之要津也唐明皇詔鑄鉄牛八頭縶䌫柱二十四條連鎻一十二條山架八所牧人八枚於中潭分立亭亭有虹蜺之狀實萬伐之竒絶也又詔中書令張說制河橋賛置于中潬之上紀異記銷魂長安東㶚陵有橋來迎去送皆在此橋為離别之地故人呼之銷魂橋也天寳遺事拆栁陶雍典陽安送客至情盡橋問其左右曰送迎之地止此故橋名情盡陶命筆題其柱曰折栁橋自後送别必吟其詩曰從來只有情難盡何事名為情盡橋自此改名為折栁任他離恨一條條唐詩紀事鬼橋方輿縣鬼橋忽一夜聞人呼喚聲車行雷駭曉而石橋自成家家牛皆喘息未定述征記呉興駱駝橋在霅溪上唐初建又名迎春橋以其直迎春門也舊傳此橋梁或摧圯將墜夜逺處聞橋上若有千餘人工作呼聲及旦橋梁之將墜者煥然一新皆啇舶上桅檣木也居處近橋者一無所聞覺或云此魯班仙也百花元徹栁實二人泛海底孤島上見玉壺尊師南冥夫人拜揭求歸路夫人曰有百花橋可行俄有長橋上有異花二人登岸囬視已無橋矣傳竒擲巾崔生入山遇仙女為妻還家得隐形符潜㳺宫禁為術士所知追捕甚急生逃還山中隔洞見其妻告之妻擲其領巾成五色虹橋度崔追者遂不及矣逸史魚鼈髙麗國王有侍婢自云有氣如雞子來下我故有身后生子名東明東明善射王恐其害國欲殺之東明走至淹水以弓擊水魚鼈浮為橋既渡魚鼈觧散論衡夫余王得河伯女而生一卵一男子破卵而出名曰朱蒙夫余之臣將殺之朱蒙東南走遇一大水曰我河伯外孫於是魚鼈積而成橋遂渡隋書天中記卷十六
