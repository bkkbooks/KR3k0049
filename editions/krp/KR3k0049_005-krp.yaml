body:
  text: 天中記巻五明陳耀文撰夏朱明夏曰朱明亦云長嬴爾雅朱明盛長敷與萬物敷華就實既阜既昌漢郊祀歌任方南方者何也任方也任方者物之方任何以為之夏夏者假耆吁茶萬物養之外者也故曰南方夏也尚書大傳夏大也為萬物長大也夏謂南者南任也三禮義宗夏為樂南方為夏夏興也南任也是故萬物莫不任興蕃殖充盈樂之至鄒子炎帝執衡漢魏相奏曰南方之神炎帝乘離執衡司夏月令夏月其日丙丁其帝炎帝其神祝融三禮義宗火正曰祝融者祝甚也融明也言夏時物氣甚明也蕃秀夏三月此謂蕃秀天地氣交萬物華實素問南陸夏日月行東南赤道曰南陸易通綂圖日行南陸謂之夏續漢志日之行夏南從赤道長育萬物月為之佐月令注斗南指鶡冠子曰斗柄南指天下皆夏孝經説曰斗指午為夏陽上夏者陽氣畢上故萬物長管形勢禮三年一祫五年一禘禘祭以夏四月夏者陽氣在上隂氣在下故正尊卑之義也後張純傳火王夫在地為火在天為日夏則火王其精在天温煖之氣養生百木是其孝也後荀爽傳九暑南方曰日其時曰夏其氣曰陽陽生火與氣九暑乃至時雨迺降五穀百果乃登此謂日徳管四時九夏梁元帝纂要曰夏曰朱夏炎夏三夏九夏天曰昊天風曰炎風節曰炎節草曰茂草雜草木曰蔚林茂林密樹茂樹夏律四月律謂之中吕何言陽氣極將彼故復中難之也五月律謂之㽔賔何㽔者下也賔者敬也言陽氣上極隂氣始賔敬之也六月律謂之林鍾何林者衆萬物成熟種類衆多也白虎通徳論月建四月之辰謂為己巳者起也物至此時畢盡而起也五月之辰謂為午午者長也大也言物皆長大也六月之辰謂之未未者味也言時萬物向成有滋味也晉樂志夏節立夏為四月節小滿為四月中氣小滿者言物長於此小得盈滿芒種為五月節夏至為五月中氣芒種者言有芒之穀可稼種也小暑為六月節大暑為六月中氣小暑大暑者就極熱之中分為大小月初為小月半為大三綂歴六氣立夏之節初五日螻蟈鳴次五日蚯蚓出後五日赤箭生次小滿氣初五日呉葵華次五日靡草死後五日麥秋至次仲夏芒種之節初五日螗蜋生次五日鵙始鳴後五日反舌無聲次夏至氣初五日鹿角解次五日蜩始鳴後五日半夏生木减榮次季夏小暑之節初五日温風至次五日蟋蟀居壁後五日鷹乃學習次大暑氣初五日腐草化為螢次五日土潤溽暑後五日大雨時行凡此六氣一十八候皆夏氣揚蕃秀之令故養生者必敬順天時也素問注月令赤箭生作王𤓰生呉葵華作苦菜秀無木堇榮句正月左傳曰六月辛未朔日有食之惟正月之朔慝未作杜注正月夏之四月周之六月謂正陽之月慝隂氣疏詩云正月繁霜鄭𤣥云夏之四月建巳純陽用事是謂正月為正陽之月慝惡也人情愛陽而惡隂故謂隂為惡未作謂隂氣未起也隂月董仲舒曰陽徳用事則和氣皆陽建巳之月是也故謂之正陽之月四月陽雖用事而陽不獨存此月純陽疑於無隂故亦謂之隂月西京雜記孟夏孟夏戴勝降立秋促織鳴考異布穀鳴于孟夏蟋蟀吟于始秋後㐮楷傳滔滔孟夏九章收恢台之孟夏九辨始夏魯恭曰今始夏百穀權輿陽氣胎養之時後漢書首夏纂要曰四月曰首夏謝靈運詩首夏猶清和乏月四月也是謂之乏月冬穀既盡夏麥未登宜賑乏絶救饑窮九族不能自活者救之無固藴蓄而忍人之貧貪貨殖之宜忘種福之利君子弗取四時纂要臯月爾雅五月為臯注五月得戊則曰厲臯長夏岐伯曰春勝長夏長夏勝冬注長夏者六月也土生於火長在夏中既長而王故云長夏也素問諫獵紂嘗以六月獵於西土發民逐禽民諫曰今六月天務覆施地務長養今盛夏發民逐禽而元元懸於野君踐一日之苗而民百日不食天子失道後必無福紂以為妖言而誅之後數日天暴風雨發屋折樹太公金匱斷罟宣公夏濫於泗淵里革斷其罟而棄之曰古者大寒降土蟄發水虞於是乎講罛罶取名魚登川禽而嘗之寑廟行諸國人助宣氣也山不槎櫱澤不伐夭魚禁鯤鮞獸長麑􅀢鳥翼鷇夘蟲舍蚳蝝蕃庶物也今魚方别孕不教魚長又行網罟貪無蓻也公聞之曰吾過而里革匡我不亦善乎是良罟也國語招凉珠黑蚌珠千年一生燕昭王常懐此珠當盛暑之月體自輕凉號消暑招凉之珠拾遺記皓露曲洞庭山浮於水上其下有金堂數百間玉女居之四時聞金石絲竹之聲徹於山頂楚懐王之時舉羣才賦詩於水湄每四仲之節王常繞山以遊宴舉四仲之氣以為樂章仲春律中夾鍾乃作輕風流水之詩醼於山南時中㽔賔乃作皓露秋霜之曲上鐶鑪元帝被病廣求方士漢中逸人王仲都者詔問所能為對曰但能忍寒暑耳因為待詔至夏大暑日使暴坐又環以十鑪火不言熱而身汗不出桓子新論招商靈帝初平三年遊於西園起裸遊館千間引渠繞砌乘船遊漾使宫人執篙檝摇漾渠中其水清澄以盛暑之時奏招商之歌以來凉氣也渠中有望舒荷帝盛夏避暑於裸遊館長夜飲宴帝嗟曰使萬歲如此則上仙也拾遺記竹篠飲語林曰陸機夏在洛忽思東頭竹篠飲語劉寶曰吾思鄉轉深矣腹熨棊局劉真長始見王丞相時盛暑之月丞相以腹熨彈棊局曰何乃渹呉人以冷為渹劉既出人問見王公云何劉曰丞相何竒止能作呉語及細唾也語林小舫周鎮罷臨川郡還都未及上住泊清溪渚王丞相徃看之時夏月暴雨卒至舫至狹小而又大漏殆無復坐處王曰胡威之清何以過此世説高臥北窻陶潜嘗言夏月虚閒高臥北窻之下清風颯至自謂羲皇上人晉書重裘桑汲清河貝􅉌人力能扛鼎殘惡少恩六月盛暑重裘累茵使十餘人扇之忽不清凉便斬扇者并州大姓田蘭薄盛斬於平原士女慶賀奔走道路而歌之曰奴為將軍何可羞六月重茵披狐豹裘不識寒暑斷人頭雄兒田蘭為報讎中夜斬首謝并州樂府廣題趙書同書裙羊欣年十二随父不疑為鳥程令呉興太守王獻之愛之欣嘗夏月著新絹裙晝寢獻之入縣見之書裙數幅而去宋書雲物凝彩元魏高祖有事於方澤質明羣臣問起居高祖曰昨日方澤殊自大暑遇天雲䕃密行人差得無弊咸陽王禧曰陛下徳感天地故雲物凝彩雖復雨師灑埽風伯清塵豈過於此高祖曰伊洛南北之中此乃天地氤氲隂陽風雨之所交㑹自然之應非寡徳所能致此魏書盛夏嘘雪庾肩吾少事陶先生頗多藝術嘗夏㑹客向室大嘘氣盡成雪廣異記逐樹隂僕射魏收字伯起初習武不成改節讀書夏日坐板床随逐樹隂諷讀累年床為之轉遂工辭令也北齊宴蒲萄園唐高宗時天子饗㑹夏宴蒲萄園賜朱櫻㳺豫惟宰相及學士得從從行給翔麟馬帝賦詩學士屬和李適傳紾絺乘小駟𤣥宗幸洛時屬炎暑上曰姚崇多計令力士探囘奏曰崇方紾絺乘小駟按轡木隂上乃命小駟頓忘繁溽開元遺事犀如意𤣥宗夏月授楊妃却暑犀如意楊妃外傳氷獸贈王公楊國忠子弟以姦媚結識朝士每至伏日取堅氷令工人鏤為鳯獸之形或餙以金環綵帶置之雕盤中送與王公大臣惟張九齡不受此恵含玉嗛津貴妃素有肉體至夏苦熱常有肺渴每日含一玉魚兒於口中蓋籍其凉津沃肺也紅汗貴妃每至夏月常衣輕絹使侍兒交扇鼓風猶不解其熱每有汗出紅膩而多香或拭之於巾帕之上其色如桃紅也迎凉草李輔國家夏則於堂中設迎凉草其象類碧而幹似苦竹葉細如松雖若乾枯而未嘗彫落盛暑掛之牕戸間則凉風日至杜陽編龍皮扇王元寶都中巨豪也家有皮扇製作甚精寶每暑月宴客即以此扇置於坐前使新水洒之則颯然風生酒筵之間客有寒色遂命撒去明皇亦曾差中使取看愛而不授曰此龍皮扇子也開元遺事氷絲裀康老子本長安富家子生計蕩盡遇老嫗持舊錦褥貨鬻乃以半千獲之尋有波斯人見之乃曰此是氷蠶絲所織暑月置於座滿室清凉即酬千萬樂府雜録龍髯拂元載有紫龍髯拂色如爛椹刻水晶為柄置於堂中夜則蚊蚋不敢入拂之有聲鷄犬無不驚逸杜陽編臨水宴李少師宗閔善飲酒與賔僚宴暑月臨水以荷為杯滿酌密繫將近入口以筯刺之不盡則重飲讌罷有人言昨飲大歡者公曰今日言歡則明前日之不懽無論好惡一不得言因話録白龍皮李徳裕嘗因夏日邀同列及朝士宴時畏景赫曦咸有鬱蒸之苦既延入小齋列坐開尊煩署都盡清颷凛冽如涉高秋及昏而罷出戸則火雲烈日熇然焦灼有好事者求親信問之云此日以金盆貯水浸白龍皮置於座末龍皮者新羅僧得自海中劇談録賦杞菊陸龜蒙自號天随子常食杞菊及夏五月枝葉老硬氣味苦澁猶食不已因作杞菊賦以自廣云爾杞未棘爾菊未莎其如余何聨句文宗夏日與諸學士聨句曰人皆苦炎熱我愛夏日長公權續曰薰風自南來殿閣生微凉五學士屬和帝獨諷公權兩句令公權題於壁上字方圓五寸帝視之嘆曰鍾王復生無以加矣唐詩紀事澄氷帛同昌公主一日大㑹韋氏族於廣化里玉饌俱列暑氣將甚公主命取澄氷帛以水蘸之掛于南軒良乆滿座皆思挾纊澄氷帛長八九尺似布而細明薄可鑒中有龍涎故能消暑毒也杜陽編造榜天陸扆累遷翰林學士始扆舉進士時方遷幸六月牓出至是每盛暑他學士戲輒曰造牓天也以譏扆進非其時作夏課長安舉子落第者六月後不出謂之過夏多借淨坊廟院作文章曰夏課時語曰槐花黄舉子忙南部新書㳺浣花成都之俗每歲四月十九日士女泛舟浣花溪之百花潭府尹亦至潭上置酒高㑹設水戲渡盡樂而返相傳唐冀國夫人故事也冀國姓任漢上小家女任媪嘗禱于神祠夢神人授以大珠覺而有娠明年四月十九日而生年稍長奉什氏教甚謹有僧過其家瘡疥滿體衣服垢弊見者心惡女獨敬事之一日僧持衣從以求浣女欣然濯之溪邊每一漂衣蓮花輒應手而出里人驚異求僧已不知所在因識其處為百花潭㑹唐寧節度西川微服行民間見女心悦之拜其家納以為妾寜妻死遂為繼室累封至冀國既貴每生日即來置酒其家艤船江上訪漂衣故處徘徊終日後日因之遂以為常四月十九日成都謂之浣花遨頭宴于杜子美草堂滄浪亭傾城皆出錦繡夾道自開歲宴遊至是而止故最勝於它時蜀人云雖戴白之老未嘗見溪花日雨也老學菴筆記鮫綃乾符末張建章為函州行軍司馬曽齎府戎命徃渤海遇風濤泊船忽為女仙邀至一島遺一鮫綃自齎而進后唐明宗有事郊邱建章鄉人掌東序之寶見建章所進鮫綃篋而貯之軸之如箸以紅線三道扎之亦云夏天清暑展開可以滿室凛然比夢瑣言撫軍蜀孟知祥其軍戰勝董璋時軍中暑熱知祥巡行撫問三軍忻然如熱而濯入寒泉天毒國最大暑熱夏木皆乾死民善沒水以避日遇時暑常入寒泉之下括地圖激凉風拂菻國盛暑之節乃引水潜流上通於屋宇機制巧密人莫之知觀者唯聞屋上泉鳴俄見四簷飛澑懸波如瀑布激氣成凉風唐書南火李白夏日登龍興閣序槿榮芳園蟬嘯珍木蓋紀乎南火之月也可以處臺榭居高明本集夏樹夏雨夏樹名連隂夏雨名綿雨陸機纂要麥秋百谷各以其初生為春熟為秋故麥以孟夏為秋蔡邕月今章句蒜枯謂夏必長而蒜麥枯謂冬必凋而竹栢茂日盛陽宜暑夏天未必無凉日極隂宜寒隆冬未必無暫温也尸子曹處曹處季夏之位土地勁急音中徵其聲清以急詩含神霧離位離位克明火中宵見峯雲暮起景風晨扇文粹鼓翣盛夏之時當風鼓翣隆冬之月嚮日然爐然而天終不為冬夏易氣者寒暑有節不為人改變也論衡斗建孟夏之月日月㑹於實沈而斗建巳之辰也仲夏之月日月㑹於鶉首而斗建午之辰也季夏之月日月㑹於鶉火而斗建未之辰也月令鄭注立夏迎夏立夏之日夜漏未盡五刻京都百官皆衣赤衣迎夏於南郊續禮儀志逸禮曰夏則乘赤輅駕赤駵載赤旗以迎夏於南郊其祭先黍與鷄居明堂正廟啓南户皇覽赤璋周禮大宗伯以青圭禮東方以赤璋禮南方注禮東方以立春謂蒼精之帝而太昊勾芒食焉禮南方以立夏謂赤精之帝而炎帝祝融食焉圭銳象春物初生半圭曰璋象夏物半死疏云象萬物半死者夏時薺麥死是半死云盛徳在火太史以先立夏三日謁於天子曰某日立夏盛徳在火天子乃齊立夏之日天子親帥三公九卿大夫以迎夏於南郊月令𤣥氷丸或問不熱之道答曰立夏之日或服𤣥氷丸或服飛霜散及六壬六癸之符則不熱㓜伯子王仲都此二人衣之以重裘暴之於夏日周以十爐之火口不稱熱身不流汗蓋用此方也抱朴子四月八日佛節佛以周昭王二十四年甲寅四月八日生于母之右脇十九歲于四月八日夜半踰城徃雪山入道六年思道不食又四月八日成佛歲華記麗浴佛荆楚人以四月八日諸寺設齋以五色香水浴佛共作龍華㑹歲時記四月八日浴佛以都梁香為青色水鬱金香為赤色水􅉌隆香為白色水附子香為黄色水安息香為黑色水以灌佛頂高僧傳大慧禪師浴佛上堂語云今朝正是四月八淨飯王宫生悉達吐水九龍天外來捧足七蓮從地發佛運綂紀百金襯齋宋王子鸞建齋灌佛張融獨襯百金為母灌像劉敬宣四月八日見人灌佛乃下頭上金鏡為母灌像因悲泣不自勝桓序歎息謂其父牢之曰卿此兒既為家之孝子必為國之忠臣宋書洗佛藥山四月八日見遵布衲洗佛云汝只洗得這箇還洗得那箇遵云請將那人來山遂黙然歸方丈密印禪師曰藥山無風起浪被遵布衲一靠直得鋒鋩結舌羅麽一塲印語録結夏荆楚歲時記云四月十五日天下僧尼就禪刹掛搭謂之結夏又謂之結制蓋夏乃長養之節在外行則恐傷草木蟲類故九十日安居什苑宗規云祝融在候炎帝司方當法王禁足之辰是什子䕶生之日至七月十五日應禪寺掛搭僧尼盡皆散去謂之解夏又謂之解制禪苑宗規云金風漸漸玉露瀼瀼當覺皇解制之辰是法歲周圓之日大藏經云四月十五日坐樹下至七月十五日僧尼坐草為一歲禪談語録謂之法歲櫻筍厨長安四月已後自堂厨至百司厨通謂之櫻筍厨公餗之盛常日不同秦中歲時記端午天節五月五日午時為天中節提要録地臘五月五日為地臘五帝校定生人官爵血肉盛衰外滋萬類内延年夀記録長生此日可謝罪求請移易官爵祭祀先祖道書蓄蘭大戴禮曰五月五日蓄蘭為沐浴楚辭曰浴蘭湯兮沐芳華荆楚歲時記今謂之浴蘭節採艾懸戸玉燭寶典曰五月五日採艾懸於户上荆楚歲時記云五月五日荆楚人採艾以為人懸門户上以禳毒氣又曰宗則字文度常以五月五日未鷄鳴時採艾見似人處攬而取之用炙有驗是日競採雜藥蓄藥夏小正此月蓄藥以蠲除毒氣朱索後漢書曰五月五日朱索五色印為門戸飾以難上惡氣風俗通曰五月五日以五色絲綵繫臂辟兵及鬼令人不病一名長命縷一名續命縷一名辟兵繒一名五色縷一名五色絲一名百索裴𤣥新語曰五月五日集五色繒辟兵余問伏君君曰青赤白黑以為四方黄居中央名曰襞方綴于胷前以示婦人蠶功也織麥􅀈懸于門以示農工成傳者誤以襞方為辟兵􅀈音涓麥莖也角黍仲夏端五烹鶩角黍端初也謂五月初五日也俗重五日與夏至同先節一日又以菰葉褁粘米以栗棗灰汁煑令熟節日啖煑肥龜極爛去骨加鹽豉䔉蓼名葅龜粘米一名糭一曰角黍蓋取隂陽尚包褁未分之象也龜骨表肉裏陽内隂外之形取以贊時也風土記蹋百草四民並蹋百草今人又有鬭百草之戲荆楚歲時記條達端五又有條達等織組雜物以相贈遺孝經援神契曰仲夏繭出婦人染練咸有作務玉燭寶典云此節俻擬甚多其來尚矣又有日月星辰鳥獸之狀文繡金縷帖畫獻貢所尊詩云繞臂雙條達是也辟兵符或問辟五兵之道抱朴子曰以五月五日作赤靈符著心前歲時記云今釵頭符是也賜梟羹漢令郡國賜梟五月五日為梟羹賜百官以惡鳥故食之也樂書注泛蒲酒端午以菖蒲或縷或屑泛酒歲時記競渡五月五日競渡俗為屈原投汨羅日傷其死所並命舟檝以拯之舸舟取其輕利謂之飛鳬又曰水車又曰水馬州將及土人悉臨水而觀之歲時記俗五月五日為競渡戲自襄州以南所尚相傳云屈原初沉江之時其鄉人乘舟求之意急而爭前後因為此戲隋唐嘉話祀屈屈原五月五日投汨羅而死楚人哀之每于此日以竹筒貯米投水祭之漢建武中長沙歐囘白日忽見一人自云三閭大夫謂囘曰聞君當見祭甚善但常年所遺並為蛟龍所竊今若有恵可以楝樹葉塞上以五色絲轉縳之此二物蛟龍所憚囘依其言今五月五日作粽并帶五色絲及楝葉皆汨羅之遺風續齊諧記誕子齊田文嬰賤妾子也以五月五日生嬰勑令勿舉之后母私舉文長成因兄弟以見嬰怒文啓曰君所以不舉五月子者何故嬰曰五月子者長與戸齊將不利其父母文曰人生受命於天乎將受命於户邪嬰黙然文曰必受命於天君何憂焉必受命於戸則高其戸耳誰能至者嬰曰子休矣後文立是為孟嘗君史記王鳳以五月五日生其父以俗諺欲不舉其叔父曰昔田文以此日生後為孟嘗君號其母為薛公大家以古事推之非不祥也遂舉之西京雜記胡廣本姓黄以五月五日生父母惡之藏之葫蘆弃之河流岸側居人收養及長有盛名父母欲取之廣以為背其所生則害義背其所養則忘恩兩無所歸託葫蘆而生也乃姓胡名廣后七登三司有中庸之號殷芸小說廣後不治其本親服云我本親以我為已死也世以為深譏焉世說紀邁五月五日生其母弃之村人紀淳妻養之年六歲本父母云汝是我兒邁涕泣傭所得輒上母孝子傳王鎮惡猛孫也以五月五日生家人以俗忌欲出令繼疎宗猛見竒之曰此非常兒昔孟嘗君以此日生相齊是兒亦將興吾門矣故名之為鎮惡宋書南陽王綽以五月五日丙時生彊暴無度后為韓長鸞令親信誣謀反被殺經四百餘日大斂顔色毛髮皆如生俗云五月五日生者腦不壊故也北齊書崔信明以五月五日正中時生有異雀類頭身形甚小五色畢備集于樹鼓翼齊鳴其聲清亮隋太史令史良使至青州遇而占之曰五月為火火為離離為文彩日正中文之盛也又雀五色奮翼而鳴此兒必文藻煥爛聲名播於天下雀形既小禄位殆不高矣及長博聞强記下筆成章鄉人高孝基有知人之鑒每謂人曰崔信明才學富贍雖名冠一時但恨其位不達耳舊唐書唐肅宗時張嘉字伯達以五月五日生名五郎少好儒術以節義自負年十五㳺長安與李泌長源為友禄山叛詣闕上書補參軍平賊有功為雲居宰有善政卒年二十三邑人立祠祀之大著靈應李泌遣文弔之陜西志宋徽宗以五月五日生以俗忌因改作十月十日為天寧節癸幸雜志金轉運田特秀字彦實易縣人大定十九年進士所居里名半十行第五以五月五日生小名五兒年二十五應鄉府省殿四試俱第五名年五十五以八月十五日卒困學雜録祭陳陳臨為蒼梧太守推誠而理導人以孝悌臨徵去後本郡以五月五日祠臨東城門上令小童潔服舞之謝承書泝濤女子曹娥者㑹稽上虞人父能絃歌為巫漢安帝二年五月五日於縣江泝濤迎波神溺死不得尸骸娥年十四乃縁江號哭晝夜不絶聲七日遂投江而死㑹稽典録忌蓋屋曝席薦風俗通云此月蓋屋令人頭秃又曰不得曝床席薦異苑曰新野庾寔嘗于五月五日曝席忽見一小兒死于席上俄失所在其后寔子亡因相傳以為忌五色縷并州俗以介子推五月五日燒死世人為其忌故不舉餉食非也北方五月五日自作飲食餉神及作五色縷五色新盤相問遺不為介子推也鄴中記共浴習鑿齒與褚常侍書曰想徃日與足下及江州五月五日共澡浴戲追尋舊約髣髴玉儀心實悲矣五時圖北朝婦人五月進五時圖五時花施帳之上是日又進長命縷宛轉繩皆結為人像帶之酉陽雜俎太常借裙襦唐武徳初孫伏迦以三事上諫曰百戲散樂本非正聲此謂滛風不可不改近者太常官司於民間借婦女裙襦五百餘具以充散妓之服云擬五月五日於𤣥武門逰戲非所以為子孫法也舊書飛白書貞觀十八年五月五日太宗為飛白書作鸞鳯蝶龍等字筆勢驚絶謂司徒長孫無忌吏部尚書楊師道曰五日舊俗必用服玩相賀今朕各賜君飛白扇二庶動清風以增美徳唐㑹要射粉團角黍開元宫中端午造粉團角黍貯金盤中以小角造弓子纎妙可愛架箭射盤中團粉中者得食蓋粉團滑膩而難射也都中盛行此戲天寳遺事端午作水團又名白團或雜五色人獸花果之狀其精者名滴粉團或加麝香又有乾團不入水者歲時記剪靈運鬚晉謝靈運鬚美臨刑因施為南海袛洹寺維摩誥像鬚唐中宗朝安樂公主五日鬭百草欲廣其物令馳驛取之又恐為他所得因剪棄其餘陏唐嘉話賜鍾乳端午日𤣥宗賜宰臣鍾乳宋璟既拜賜而命醫人鍊之醫請將歸家錬子弟諫曰此乳珍異他者不如今付之歸恐招欺換璟誡之曰自隠爾心然疑他心耶仗信示誠猶恐不至特有猜責豈可得乎唐新語宴武成開元中五月五日宴武成殿賜羣臣襲衣特以紫服金魚賜李元絃及蕭嵩羣臣無與比本傳擁㓜女肅宗廢后張氏端午日帝召見山人李唐帝方擁㓜女顧唐曰我念之勿怪也唐曰大上皇今日亦當念陛下帝澘然涕下而内制于后卒不敢謁西宫后傳龍生日五月十三日謂之龍生日栽竹多茂盛岳州風土記夏至司至郯子曰少昊氏以鳥臣伯趙氏司至者也注伯趙伯勞也以夏至鳴冬至止也左昭七年正氣離南方也夏至日中赤氣出直離此正氣也氣出右萬物半死氣出左赤地千里易通卦驗景風夏至離五景風用事今君當爵有徳封有功京房易占三義夏至為五月中者至有三義一以明陽氣之至極二以助隂氣之始至三以明日行之北至故謂之至三禮義宗三光盛周髀云冬至三光微夏至三光盛范子朱索連葷仲夏之月萬物方盛日夏至隂氣萌作恐物不楙其禮以朱索連葷桃印書文以施門户代以所尚為餙也後漢志八風立魏相奏曰天地變化必由隂陽隂陽之分以日為紀日冬夏至則八風之序立萬物之性成各有常職不得相干漢書止行人魯恭疏曰易五月姤用事經曰后以施命誥四方言君以夏至之日施命令止四方行者所以助㣲隂也行者尚止之况於逮召考掠奪其時後書寢兵鼓夏至隂氣始起麋鹿解角故寢兵鼓身欲寧志欲静不聽事送迎五日獨斷祀大宗夏至而麥熟天子祀大宗其盛以麥麥者穀之始也管子不賀夏至隂氣始君道衰故不賀獨斷五綵辟兵夏至著五綵辟兵題曰㳺光厲鬼知其名者無温疾五綵辟五兵也風俗通浚井夏至日浚井改水冬至日鑽燧改火可去温病也續禮儀志禬祭宗伯以夏至致地祗物鬽昧以禬國之凶荒民之禮喪周禮天地合日道家以五月十六日為天地合日夫婦當異寢違犯者必夭死故世以為忌分龍節池州俗以五月二十九日三十日為分龍節雨則多大水閩人以夏至為分龍而各有方圖經六月六日禹生日蜀石泉有禹廟相傳禹六月六日生呉越春秋注天貺節祥符四年六月六日天書再降詔以此月為天貺節宋㑹要清暑日六月六日為清暑之日道經此日北極府君生夢兼録伏金藏厯忌釋曰伏者何也金氣伏藏之日也四時代謝皆以相生立春木伐水水生木立夏火代木木生火立冬水代金金生水至於立秋以金代火金畏火故至庚日必伏庚者金也三伏從夏至後第三庚為初伏第四庚為中伏立秋後初庚為後伏謂之三伏曹植謂之三旬隂陽書始為伏祠史記曰秦徳公二年初伏以狗禦蠱年表云初作伏祠社磔狗邑四門漢郊祀注孟康云六月伏日也周時無至此乃有之師古曰伏者謂隂氣將欲迫于殘陽而未得升故為藏伏因名伏日也自擇伏日風俗通曰漢中巴屬自擇伏日俗云其地温暑草木宻生晩落氣異中國夷狄畜之故令自擇伏上按漢書高帝分四郡之衆用良平之策還定三秦席巻天下蓋君子所因者本也論功定封加金帛重復寵異令自擇伏日不同凡俗祠黄石張子房始所見下邳圮上老父與大公書者後十三年從高帝過濟北果見穀城山下黄石取而寳祠之畱侯死并黄石葬每上塜伏臘祠黄石史記割肉東方朔為郎伏日詔賜從官肉大官丞日晏不來朔獨拔劔割肉謂其同官曰伏日當密歸請受賜即懐肉去大官奏之朔入上曰昨賜肉不待詔以劍割肉而去之何也朔免冠謝上曰先生起自責也朔再拜曰朔來朔來受賜不待詔何無禮也拔劍割肉一何壯也割之不多又何亷也歸遺細君又何仁也上笑曰使先生自責迺反自譽復賜酒一石肉百斤歸遺細君漢書避伏書儀曰六月三日伏日昔賈誼於湘南六月三庚日有鵬鳥來時以南方毒惡以助太陽銷鑠萬物故損人因避之伏臘楊惲報孫㑹宗書曰田家作苦歲時伏臘烹羊炮羔斗酒自勞潘安仁閒居賦牧羊酤酩以俟伏臘之費書儀云漢魏伏日有酒食之㑹伏閉盡日和帝永元六年初令伏閉盡日注漢官舊儀曰伏日厲鬼所行故盡日閉不干它事避暑飲大駕都許使光禄大夫劉松北鎮袁紹軍與紹子弟日共宴飲嘗以三伏之際晝夜酣飲極醉至於無知云以避一時之暑故河朔有避暑飲典論碧筩酒歴城北有使君林魏正始中鄭公殻三伏之際每率賔僚避暑於此取大蓮葉置硯格上盛酒二升以簪刺葉令與柄通屈莖上輪茵如象鼻焉持翕之名碧筩酒酉陽雜俎賜氷石季龍于氷井臺藏氷三伏之月以氷賜其奩鄴中記當風交扇郗嘉賔三伏之月詣謝公炎暑薫赫雖復當風交扇猶沾汗流離謝著故絹衣食熱白粥晏然無異郗謂謝公曰非君幾不堪此世説氷山辟暑楊氏子弟每至伏中取大氷使匠琢為山周圍於宴席間座客雖酒酣而各有寒色亦有挾纊者其驕貴如此也遺事錦結凉棚長安富家子劉逸李閑衛曠家世富豪而好待士每至暑伏中各於林亭内植晝柱以錦結為凉棚設坐具召長安名妹間坐逓請為避暑㑹人皆愛羡開元遺事辟惡伏日進湯餅名為辟惡荆楚歲時記薦𤓰初伏薦麥𤓰于祖禰四民月令秋白藏秋為白藏亦曰收成爾雅西方西方者何也鮮方也鮮訊也訊者始入之貌始入者何以謂之秋秋者愁也愁者物方愁而入也故曰西方者秋也尚書大傳容平秋三月此謂容平天氣以急地氣以明注云萬物夏長華實以成容狀至秋平而定也少昊執矩漢書魏相奏曰西方之神少昊乘兊執矩司秋月令秋月其日庚辛其帝少皥其神蓐收禰衡賦少昊司辰蓐收整轡禮肅秋為禮西方為秋秋肅也萬物莫不禮肅敬之至也尸子虚為秋候尚書考靈曜曰虚星為秋候昴為冬期隂氣相佐徳乃不邪子助母收母合子符註虚星北方宿也昴星西方宿也隂稱母也日行西陸日行西陸謂之秋易通綂圖曰日行西方白道曰西陸律歴志斗柄指西斗柄指西天下皆秋鶡冠子六氣立秋之節初五日凉風至次五日白露降後五日寒蟬鳴次處暑氣初五日鷹乃祭鳥次五日天地始肅後五日禾乃登次仲秋白露之節初五日育風至鴻鴈來次五日𤣥鳥歸後五日羣鳥養羞次秋分氣初五日雷乃收聲次五日蟄蟲坯户景天華後五日水始涸次季秋寒露之節初五日鴻鴈來賔次五日雀入大水為蛤後五日菊有黄華次霜降氣初五日豺乃祭獸次五日草木黄落後五日蟄蟲咸俯凡此六氣一十八候皆秋氣正收斂之令故養生者必謹奉天時也素問注月令無景天華三字秋律七月律謂之夷則何處傷則灋也言萬物始傷破刑法也八月律謂之南吕何南者任也吕者拒也言陽氣尚有任生薺麥也故隂氣拒之也九月之管名無射射者出也言時陽氣上升萬物收藏無復出也白虎通月辰七月之辰謂為申申者申也言時萬物身體皆成就也八月之辰謂為酉酉者綇也謂時物皆綇縮也九月之辰謂為戌戌者滅也謂時物皆衰滅也晉樂志月建孟秋之月日月㑹於鶉尾而斗建申之辰也仲秋之月日月㑹于夀星而斗建酉之辰也季秋之月日月㑹於大火而斗建戌之辰也月令注秋㝠酉西方也秋也物皆成象而就也有形則復於無形故曰㝠也太𤣥經九秋一時為三月一月為一秋三月為三秋又一月為三秋故三月有九秋之名也隂陽五行歴庚辛庚之言更也辛之言新也日之行秋西從白道成熟萬物月為之佐萬物皆肅然改更秀實新成人因以為日名焉鄭氏素秋素秋素商高商天曰旻天風曰商風素風凄風高風凉風激風悲風景曰朗景澄景清景時曰凄辰霜辰節曰素節高節草曰衰草木曰疎木衰林霜柯霜條纂要蘭秋七月孟秋首秋上秋肇秋蘭秋纂要七月為蘭月提夢録仲商八月仲秋亦曰仲商亦曰桂月同上菊月九月季秋亦曰暮秋末秋暮商季杪秋亦曰授衣亦曰𤣥月菊月上秋樹名成秋雨名愁陸機要蓼風蔡邕月令章句曰仲秋白露節肓風至秦人謂蓼風為肓風鄭云肓風疾風也皇氏云秦人謂疾風為肓風梁文帝初秋詩云肓風度函谷墜露下芳枝悲秋宋玉九辨曰悲哉秋之為氣也蕭瑟兮草木摇落而變衰憭慄兮若在逺行登山臨水兮送將歸潘岳秋興賦云善乎宋生之言彼四慼之疾心兮遭一塗其難忍嗟秋日之可哀兮諒無愁而不盡賔雀為蛤淮南子曰季秋之月候鴈來賔雀入大水為蛤許慎注云賔雀者老雀也栖宿人家堂宇之間如賔客者也故謂之賔大水海水也傳曰雀入海為蛤也吕覽高誘注同鄭注月令賔字屬上讀五政秋三月以庚辛之日發五政一政曰禁博賽二政曰無見五兵之刃三政曰慎旅農趣聚收四政曰補缺塞坼修垣墻謹門閭五政曰敬時五穀之皆入也管子決獄斷刑尚書曰寅餞納日平秩西成大傅曰天子以秋命王公將率選士厲兵以征不義決獄訟斷刑罰趣收斂以順天道以佐秋殺西顥郊祀歌曰西顥沆碭秋氣肅殺注西方少昊也沆碭白氣之貌也漢禮樂志秦地秦地處仲秋之位男懦弱女高膫白色秀身音中商其言舌舉而仰聲清以揚詩含神霧邠詩周禮籥章掌土鼔豳籥中春晝擊土鼓􅀈豳詩以逆暑中秋夜迎寒亦如之鄭注逆暑以晝求諸陽也迎寒以夜求諸隂也王元長曲水詩序云籥動邠詩祫祭周祫以秋者萬物新成可以奉荐宗廟故合先祖之神而祭之故祫宜在秋也三禮義宗寒露九月寒露為節者九月之時露氣轉寒故謂之寒露節降為中露變為霜霜降為中同上蠧書仲秋甲戌天子東逰次雀梁蠧書于羽陵注謂暴書蠧蟲因曰蠧書也穆天子傳圍棊局戚夫人在宫内八月四日出雕房北户竹下圍棊勝者終年有福負者終年多病取絲縷就北辰星求長命乃免西京雜記霜月韓明府脩孔子廟器碑云永夀二年歲在涒灘霜月之靈皇極之日蓋九月五日也韓名勑字叔節集古録思蓴張翰字季鷹辟齊王冏東曹掾在洛見秋風起因思呉中蓴菜羹鱸魚鱠曰人生貴適意耳何能從宦千里以要名乎遂命駕便歸俄而齊王敗人皆謂見幾而作世説五明囊鄧紹以八月一日入華山見一童子執五綵囊盛栢葉上露紹問之答曰赤松先生取以明眼又梁簡文帝云婦人八月旦多錦翠為眼明囊凌晨取露拭目續齊諧記又述仙記云八月一日作五明囊盛百草露以洗眼鷄􅀈集登慈恩浮圖唐高宗時凡天子遊幸秋登慈恩浮圖獻菊花酒稱夀李適傳製秋風高曲明皇嘗製秋風高曲每至秋空逈徹纎埃不起即奏之必逺風徐來庭葉墜下羯鼔録千秋節源乾曜張說以八月初五明皇生之日請為千秋節百姓祭皆就此日名為賽白帝羣臣上萬歲夀王公戚里進金鏡綬帶士庶結絲承露囊更相遺問隋唐嘉話張說上大衍厯序云謹以開元十六年八月端午赤光照室之夜獻之宋璟請為節表月惟仲秋日在端午㸃灸杖盧公範饋餉儀曰凡八月旦取承露盤赤松子栢上露為囊以膏面皮古人用㸃灸杖以梨枝為之反銀盞中者朱硃銀枝子也盧公範者盧懐慎家之法也天灸八月一日是六神日以露水調朱砂蘸小指宜㸃灸去百病風俗通楚俗以八月十日以朱墨㸃小兒額為天灸以壓疾病荆楚歲時記隂氣下西方曰辰其時曰秋其氣曰隂秋者隂氣始下故萬物收管子廪秋皇天平分四時兮竊獨悲此廪秋白露既下百草兮奄離披此梧楸收恢台之孟夏兮然欿傺而沈藏九辯蕭晨殷仲文九井詩哲匠感蕭晨肅此塵外軫注秋晨蕭瑟也火旻靈運詩秋岸澄夕隂火旻團朝露注七月流火秋為旻天張景陽詩大火流坤維七命龍火西頺暄氣初收素秋魏劉禎書肅以素秋則落晉陸機詩肅肅素秋節湛湛濃露凝盧諶詩凛凛素秋日促宵長江逌詩祝融解炎轡蓐收起凉駕長林悲素秋茂草思朱夏述歸賦云時運逝其何速素秋奄以告季虚栁中於昏日羲和宿于房位郭景純詩潛潁怨青陽陵苕哀素秋素節張景陽七命云白商素節月既授衣又雜詩云金風扇素節注秋為白藏故曰素節金素詩靈運詩述職期闌暑理棹變金素注秋為金而色白故曰金素迅商楚詞曰商風肅而害之百草肓而不長王逸曰商風西風也秋氣起則西風疾潘岳詩清商應秋至溽暑隨節闌陶淵明賦云悲商扣林白雲依山仰睇天路俯促鳴絃謝宣逺詩輕霞冠秋日迅商薄清穹謝恵連詩寒商動清閨孤燈曖函幔梁周𢎞譲詩兹晨戒流火商颷早已驚商天范絳詩戊日辭巢燕商天向浦鴻海録碎事隂中春為陽中萬物以生秋為隂中萬物以成是以事舉其中禮取其和漢律歴志萬寳成庚桑子曰夫春氣發而百草生正得秋而萬寳成夫春與秋豈無得而然哉天道已行矣注云天道以萬物為寳至秋而成也莊子輶軒使周太常以八月輶軒使采異俗方言藏之袐府風俗通開秋阮嗣宗詩開秋兆凉氣蟋蟀鳴床帷始秋王義方彈李義府云春鸎鳴於獻歲蟋蟀吟於始秋唐新語杪秋謝靈運詩杪秋尋逺山山逺行不近神㑹日八月十八日四海龍王神㑹之日道經立秋盛徳在金先立秋三日太史謁之天子曰某日立秋盛徳在金天子親帥三公九卿諸侯大夫以迎秋於西郊月令用白立秋之日夜漏未盡五刻京都百官皆衣白施皁領縁中衣迎氣於白郊禮畢皆衣絳後漢志逸禮曰秋則衣白衣佩白玉乘白輅駕白駱載白旗以迎秋於西郊皇覽貙劉立秋之日白郊畢始楊武斬牲於郊東門以薦陵廟還宫遣使者齎束帛以賜武官肄兵習戰陣之儀斬牲之禮名曰貙劉續禮儀志續漢書云武帝令天下膢五日蔡邕曰貙獸常以立秋日食母猛蟲之搏擊王者亦以此日出獵還以祭宗廟漢書音義曰貙獸以立秋日祭獸王者亦此日出獵用祭宗廟冀州北郡以八月朝作飲食為膢其俗語曰膢臘社伏漢儀註立秋貗婁楊子曰不膢臘也與注八月旦也今河東奉以為祭祀北堂書抄云膢音劉劉殺也古今注曰永平元年六月乙夘初令百官貙膢白幕皆霜風俗通稱韓子書山居谷汲者膢臘而寘水楚俗常以十二月祭飲食也又曰當新始殺食曰貙膢舞雲翹立秋迎氣於黄郊樂奏黄鍾之宫歌帝臨冕而執干戚舞雲翹肓命所以養時訓也後書取姦孫寳為京兆尹以立秋日署故吏侯文東部督郵入見勑曰今日鷹隼始擊當順天氣取姦惡以成嚴霜之誅掾部渠有其人乎文卬曰無其人不敢空受職寳曰誰也文曰霜陵杜穉季寳曰其次文曰豺狼横道不宜復問狐狸漢書謀刼申屠建等與御史大夫隗囂合謀以立秋日貙膢時共刼更始劉能卿以告執建斬之後書坤王易說曰坤西南主秋秋京房易占曰立秋坤王凉風用事五行休王論曰立秋坤王兊相乾胎坎沒艮死震囚巽廢離休報地徳凉風立秋至王者報地徳禮西郊白虎通立秋西風閶闔風至一名颷風符瑞圖七月七日天漢白氣七月七日其夜灑掃於庭露施几筵設酒脯時果散香粉於河鼓織女言此二星神當㑹守夜者咸懐私願或云見天漢中有奕奕正白氣有耀五色以此為徵應見者便拜而願乞富乞夀無子乞子唯得乞一不得兼求三年乃得言之頗有受其祚者周處風土記乞巧七夕婦人結綵縷穿七孔針或以金銀鍮石為針陳𤓰果於庭中以乞巧有喜子網於𤓰上則以為得荆楚歲時記宋孝武七夕詩曰迎風披綵縷向月貫𤣥針乘白鶴王子喬見桓良曰告我家七月七日待我於緱氏山頭其家候之至日果乘白鶴於山頭望之不可到舉首謝時人而去王子喬者周靈王太子晉也列仙傳騎赤龍陶安公者六安鑄冶師也一朝火散上紫色衝天安公伏冶下求哀須㬰朱雀止冶上曰安公安公冶與天通七月七日迎女以赤龍至時安公騎赤龍東南去上百子池戚夫人在宫時至七月七日臨百子池作于闐樂畢以五色縷相覊謂為連愛西京雜記開襟樓漢綵女常以七月七日穿七孔鍼於開襟樓俱以習之上竇后神光竇后少小頭秃不為家人所齒遇七夕日人皆看織女獨不許出乃有神光照室為后瑞世王傳猗蘭殿景帝夢高祖謂已曰王美人生子可名為彘以乙酉年七月七日旦生武帝於猗蘭殿漢武故事景帝夢一赤彘從雲中下崇芳閣帝覺而坐於閣上果見赤氣如林來蔽户乃改閣為猗蘭殿洞㝠記九華燈元封元年四月戊辰帝閒居承華殿東方朔董仲舒在側忽見一青衣女子曰我墉宫玉女王子登也王母遣來語帝七月七日王母暫來帝于其日乃脩除宫掖燔百和之香張雲錦之帷燃九光之燈列玉門之棗酌蒲萄之酒以候雲駕忽見西南如白雲起鬱鬱然直來起宫有頃王母乘紫雲之輦駕九色班龍扶二侍女上殿頭上太華髻戴太真晨纓之冠履𤣥璚鳯文之舄視之可年三十許自設天厨珍妙非常漢武内傳青鳥集殿前七月七日上於承華殿齋正中忽有一青鳥從西而來集殿前上問東方朔朔曰此西王母欲來有頃王母至有二青鳥如烏侍王母傍漢武故亊曝衣閣太液池西有武帝曝衣閣常至七月七日宫女出后衣登樓曝衣宋卜子楊苑疏織女嫁牽牛後漢桂陽成武丁有仙道常在人間謂其弟曰七月七日織女渡河諸仙悉還宫吾向已被召不得停與爾别矣弟問織女何事渡河兄何當還答曰織女暫詣牽牛吾去後三千年當還耳明日失武丁所在世人至今云織女嫁牽牛續齊諧記淮南子云烏鵲填河而渡織女風俗記云織女七夕渡河使鵲為橋故古詩云寂然香滅後鵲散渡橋空梁范雲詩不辭精衛苦河流未可填庾肩吾詩寄語雕陵鵲填河未可飛爾雅翼涉秋七日鵲首無故皆髠相傳是日牽牛與織女㑹於漢東役鳥鵲為梁以渡故毛皆脱去良日魏時人或問董勛云七月七日為良日飲食不同於古何也勛云七月黍熟七日為陽數故以糜為􅡋今此日唯設湯餅無復有糜矣風土記曝犢鼻褌阮咸字仲容籍兄子也諸阮前世皆儒學内足於財唯咸一生尚道弃事好酒而貧舊俗七月七日法當曬衣諸阮庭中爛然莫非綈錦咸時總角乃竪長竿標大布犢鼻禈曝於庭中曰未能免俗聊復爾耳竹林七賢論曬腹中書郝隆七月七日見隣人皆曝曬衣物隆乃仰臥曝腹於庭曰我曝腹中書世説伺織女度宋廢帝昱七月七日微行因承露車徃青園尼寺晚至新安寺偷狗就曇度道人煑之飲酒是夜令楊玉夫伺織女度報已因與内人穿針訖大醉臥于仁夀殿東阿氊幄中玉夫見昱醉熟無所知乃與楊萬年同入取千牛刀殺之南史穿針樓齊武帝起層城觀七月七日宫人多登之穿針以乞巧謂之穿針樓輿地志參合殿道武帝七月七日生於參合殿後魏書登舜山魏僕射臨代七月七日登舜山徘徊顧眺謂主簿崔曰吾所經多矣至於山川沃壤衿帶形勝天下名州不能過此唯未審東陽何如崔對曰青有古名齊得舊號二處山川形勢相似曽聽所論不能踰越公遂命筆為詩於時新故之際存司缺然求筆不得乃以五伯杖畫堂北壁為詩曰述職無風政復路阻山河還思麾蓋日畱謝此山阿酉陽雜俎步虚歌李行言中宗時為給事中能唱步虚歌帝七月七日御兩儀殿㑹宴帝命為之行言於御前長跪作三洞道士音詞歌數曲貌偉聲暢上頻嘆美紀事長生殿私語𤣥宗與楊貴妃避暑驪山宫七日牛女相見之夕夜半妃獨侍上上凭肩密相誓心願世世為夫婦故長恨詞曰七月七日長生殿夜半無人私語時在天願為比翼鳥在地願為連理枝長恨傳蛛絲卜巧帝與貴妃每至七月七日夜在華清宫逰宴時宫女輩陳𤓰花酒饌列於庭中求恩於牽牛織女星也又各捉蜘蛛閉於小合中至曉開視蛛網稀密以為得巧之候密者言巧多稀者言巧少民間亦效之天寳遺事乞巧樓宫女以錦結成樓殿高百尺上可以勝數十人陳以𤓰果酒炙設坐具以祀牛女二星嬪妃各以九孔針五色線向月穿之過者為得巧之候動清商之曲宴樂達旦士民之家皆效之上秦人風俗夜張錦繡陳飲食樹花旛香於庭號為乞巧宫掖間尤尚之長恨傳真如得五寳開元中有李氏為尼號曰真如天寳七年七月七日忽見五色雲墜地一嚢中有五物乃寳玉也肅宗元年貞如為神人召徃化城見天帝授以八寳俾獻于朝貞如乃併前五物皆獻之唐寳記空中車幄郭子儀從軍沙漠間因入京催軍食迴至銀州夜見左右皆赤光仰視空中軿車綉幄中有一美女坐床垂足自天而下子儀拜祝云今七月七日必是織女降臨願賜長夀富貴女笑曰大富貴亦夀考言訖冉冉昇天猶正視子儀良乆而隠子儀後立功貴盛威望烜赫大厯初鎮河中疾甚三軍憂惧子儀謂御醫及幕賔王延昌等曰吾此疾自知未到衰殞因話其事衆稱賀后九十餘薨神仙感遇集喬琳興元元年七月七日斬偽官喬琳將臨刑書曰琳以七月七日生亦以此日死豈非命也國史補金針鄭代肅宗時為潤州刺史兄侃嫂張氏女年十六名采娘七夕夜陳香筵祈于織女是夕夢雲輿羽蓋蔽空駐車命采娘曰吾織女祈何福曰願乞巧耳乃遺一金針長寸餘綴于紙上置裙帶中令三日勿語汝當竒巧不再化為男子經二日以告其母母視之則空紙矣其針迹猶在張數女皆卒至娠女病而不言張氏有恨言將服藥以損之藥至采娘驚曰某若終當為男子母之所懐是也母異之而止采娘尋卒未逾月生一男子張氏哭女孩兒即啼哭罷即止及能言常戲弄之物乃采娘後身也因名曰叔子及長位至柱史桂苑叢談金梭蔡州丁氏女精于女工每七夕禱以酒果忽見流星墜筵中明日𤓰上有金梭自是巧思益進祕閣閒話武后七夕曽得金梭于庭乃宫人為之耳席上輔談天門開雜異書曰時有女子尚㓜七夕見家人出㕔望候天門開獨在室中不出曰若合當見者雖暗室中亦應見之至夜深忽見天上門開雲氣赫奕因求富及長嫁而富家累鉅萬有賈客貨其絹百疋去而船覆溺資貨皆沒其女子偶開後房見絹在其中但濕耳後賈客歸女子曰絹歸矣驗之而信唐夷堅録祭杼織染署七月七日祭杼唐百官志金鈿針中尚署七月七日進七孔金鈿針唐六典置酒前蜀王建子元膺是月七夕元膺召諸王大臣置酒而集王宗翰樞密使潘峭翰林學士毛文錫不至元膺怒曰集王不來峭與文錫教之耳五代史元膺以延巧之夕將請建宴于宫遂謀作亂事發元膺伏誅五國故事羅為天河狀南唐后主李煜每七夕延巧必命紅白羅百疋以昱為日宫天河之狀一夕而罷乃散之五國故事作麴合藥崔寔四民月令曰七月七日作麴合藥丸及蜀漆丸暴經書及衣裳初學記化生七夕俗以臘作嬰兒浮水中以為戲為婦人女子之祥謂之化生本出於西域謂之摩㬋羅歲時紀事俗云摩喝樂嶺池魚㳺武陵一孤山嶺有池魚鱉無不偹有其七月七日皆出㳺嶺顛族類各别黄閏武陵記中元大慶月七月中元乃大慶之月修行記中元道經云七月十五日中元地官勾搜選衆人分别善惡以其日作𤣥都大獻於玉京山以世間竒異好妙幡幢寳蓋供養之具精膳飲食獻諸衆聖道士於其日講誦老經十方大聖高詠靈篇正一旨要云九地靈官名山洞府神仙兵馬同下人間校定罪福又云七氣地官主禄百司上詣天闕進呈世人罪福宴殊類要云當地官校籍之辰是白帝乘時之運盂蘭盆目連以母生餓鬼中佛令作盂蘭盆至七月十五日以百味五果以著盆中供養十方大徳而後母得食目連白佛凡弟子孝順者以應奉盂蘭盆供養佛言大善後世因之廣為華飾乃至刻木割竹飴蠟剪綵摸花葉之形極工妙之巧盂蘭盆經七月十五日僧尼道俗悉營盆供諸寺院案盂蘭盆經云有七葉功徳並幡花歌鼔果食送之蓋由此荆楚歲時記中尚署七月十五日進盂蘭盆唐六曲天竺云盂蘭此云倒懸救器謂目連救母飢厄如解倒懸之具也今人遂餙食味於盆亦誤矣海録碎事觀禮三元日宜今崇元學士講道徳南華等經羣公咸就觀禮明皇實録步輦召學士明皇在便殿甚思姚元崇論時務七月十五苦雨不止泥濘盈尺上令待制者擡步輦召學士來時元崇為翰長中外榮之開元遺事不典代宗七月望日於内道塲造盂蘭盆飾以金翠所費百萬又設高祖已下七聖神座備幡節龍􅏛衣裳之制各書尊號于幡上以識之舁出内庭陳於寺觀是日排儀仗百寮序立於光順門以候之幡花鼓舞迎呼道路歲以為常而識者嗤其不典其傷教之源始於王縉也舊唐書觀禮空王韓愈直諫表近聞陛下七月十五日幸安國寺觀禮空王以為崇福施信示天下仁心孔帖中秋月夕八月十五為月夕提要録觀濤廣陵客曰將以八月之望與諸侯逺方交㳺兄弟並徃觀濤乎廣陵之曲江七發撤去燈燭蘇頲與李乂對掌文誥八月十五夜於禁中直宿諸學士翫月偹文酒之宴時長天無雲月色如晝蘇曰清光可愛何用燈燭遂使撤去天寳遺事銀橋升月宫羅公逺開元中中秋夜侍𤣥宗於宫中翫月公逺奏曰陛下莫要至月中看否乃取柱杖向空擲之化為大橋其色如銀請𤣥宗同登約行數十里精光奪目寒氣侵人遂至大城闕公逺曰此月宫也見仙女數百皆素練寛衣舞於廣庭𤣥宗問曰此何曲也曰霓裳羽衣曲也𤣥宗密記其聲調遂囘却顧其橋隨步而滅旦召伶官依其聲作霓裳羽衣之曲唐逸史互見月門翫月翫月詩序云月可翫翫古月也謝賦鮑詩朓之庭前亮之樓中皆翫也貞元秋八月十五予與鄉人夜詣陳君可封之居修厥翫事八月於秋季始孟中於夜又月之中稽於天道則寒暑均取於月數則蟾兎圓肌骨與之疎凉神氣與之清冷歐陽四門集武夷合樂武夷山神號武夷君秦始皇二年一日語村人曰汝等以八月十五日㑹山頂是日村人畢集見幔亭彩屋設寳座施紅雲紫霞褥器用甚設令男女分坐食酒殽須㬰樂作但見樂器不見其人酒行命食味皆甘美惟酒味差薄諸仙既去衆皆欣喜與神君同㑹因名其地曰同亭諸山記玉皇與太姥魏真人武夷君建幔亭綵屋是日與鄉人宴飲曰汝等皆吾之曾孫也武夷記文簫遇綵鸞鍾陵西山有逰帷觀每至中秋車馬喧闐十里若闤闠豪傑多召名妹善謳者夜與丈夫間立握臂連踏而唱惟對荅敏捷者勝太和末有書生文簫徃觀覩一妹甚妙其詞曰若能相伴陟仙壇應得文簫駕綵鸞自有綉𥜗并甲帳瓊臺不怕雪霜寒生意其神仙植足不去妹亦相盻歌罷獨秉燭穿大松逕將盡陟山捫石冐險而升生躡其蹤妹曰莫是文簫耶相引至絶頂坦然之地後忽風雨裂帷覆機俄有仙童持天判曰呉綵鸞以私慾洩天機謫為民妻一紀妹乃與生下山歸鍾陵傅竒秋分中氣秋分八月之中氣也秋分之時日出於夘入於酉分天之中隂陽氣等晝五十刻夜五十刻一晝一夜二氣中分故謂秋分也歴日疏物成老子曰天地之炁莫大於和和者隂陽調日夜分故萬物春分而生秋分而成生與成必得和之精故積隂不生積陽不化隂陽交接乃能成和文子九月九日律中無射九月九日律中無射而數九俗尚此日折茱茰房以挿頭言辟除惡氣而禦初寒風土記登高重陽之日必以肴酒登高眺逺為時讌之遊賞以暢秋志酒必採茱茰甘菊以泛之既醉而還齊人月令籍野荆楚歲時記曰九月九日四民並籍野飲讌杜公瞻云九月九日宴㑹未知起於何代然自漢迄今未改今北方亦重此節近代宴㑹設於臺榭菊花酒戚夫人侍兒賈佩蘭後出為扶風人叚儒妻其在宫内峕九月九日佩茱茰食蓬餌飲菊曄酒令人獻夀菊曄舒峕并採莖葉雜黍米釀之至來年九月九日始熟就飲焉故謂之菊曄酒西京雜記按此賈佩蘭者戚夫人侍兒也初學記引之謂為漢武宫人其事類中又云賈餌夫戚之死及武帝之初已六十年矣徐公之不審若此而白氏六帖太平御覽及事文類聚合璧事類等俱互相抄録不為改正何耶茱茰囊汝南桓景隨費長房逰學累年長房謂曰九月九日汝家中當有災宜急去令家人各用絳囊盛茱茰以繫臂登高飲菊花酒此禍可除景如言舉家登山夕還見鷄犬牛羊一時暴死長房聞之曰此可代也今世人九日登高飲酒婦人帶茱茰囊蓋始於此續齊諧記仙書云茱茰為辟邪翁菊花為延夀客故假此二物以消陽九之厄陽數歲徃月來忽復九月九日九為陽數而日月並應俗嘉其名以為宜於長乆故以享宴高㑹魏文帝與鍾繇書落㡌孟嘉為征西桓温參軍温甚重之九月九日温逰龍山叅僚畢集時佐史並著戎服有風至吹嘉㡌堕落嘉不之覺温勑左右及賔客勿言以觀其舉止嘉良乆如厠温令取還之時孫盛在坐温授紙筆令嘲之置嘉坐處嘉還見而笑之請紙作答畧不容思其文甚美王隱晉書講孝經寧康三年九月九日上嘗講孝經謝安侍坐陸納卞耽執讀謝石袁宏執經車𦙍王温摘句晉陽秋白衣送酒陶潜嘗九月九日無酒出宅邉菊叢中摘菊盈把坐其側久之望見白衣至乃王𢎞送酒也即便就酌醉而後歸續晉陽秋九井賦詩姑熟至直瀆十里東通丹陽湖南有銅山一名九井山山有九井井與江通更仲雍江圖九井山即殷仲文九日從桓公九井賦詩之所姑熟記講武九月九日馬射或説云秋金之節講武習射立秋之禮也晉書南齊志同望楚山望楚山舊名馬鞍山宋武陵王駿為刺史改為望楚山後遂龍飛人號為鳯嶺高處有三隥即劉𢎞山簡九日宴賞之所襄陽記戲馬臺宋武帝為宋公在彭城九月九日出項羽戲馬臺至今相承以為舊準南齊禮志孔靖字季恭宋臺初建以為尚書令讓不受辭事東歸高祖餞之戲馬臺百僚咸賦詩以述其美宋書商飊館武帝永明五年九月己丑詔曰九日出商飊館登高宴羣臣辛夘車駕幸商飊館館上所立在孫陵崗世呼為九日臺者也南齊紀雲物甚美蕭子顯為邵陵王友天監六年始預九日朝宴稠人廣坐獨受旨云今雲物甚美卿將不裴然賦詩詩既成又降旨曰可謂才子子顯退謂人曰一顧之恩非望而至遂方賈誼何如哉未易當也南史宴滕王閣王勃道出鍾陵九月九日都督大宴滕王閣宿命其婿作序以夸客因出紙筆徧請客莫敢當至勃汎然不辭都督怒起更衣遣吏伺其文輒報一再報語益竒乃矍然曰天才也請遂成文極歡罷唐書臨渭亭景龍三年九月九日中宗幸臨渭亭登高賦詩學士皆屬和御製序云茰房薦馥菊蕋含芬陶潜盈把既浮九醖之歡畢卓持螯須盡一生之興人題四韻同賦五言其最後成罰之引滿得秋字云九日正乘秋三杯興已周泛桂迎尊滿吹花向酒浮長房茰早熟彭澤菊初收何借龍沙上方得恣淹畱韋安石得枝字云金風飄菊蕋玉露泫茰枝蘇瓌得暉字云恩深答効淺畱醉奉晨暉李嶠得歡字云令節三秋晩重陽九日歡蕭至忠得餘字云寵極茰房遍恩深菊酹餘趙彦伯得花字云簮挂丹茰蕋杯㴠紫菊花楊廉得亭字云逺日瞰秦坰重陽坐㶚亭岑䂀得涘字云爰豫矚秦坰登高臨㶚涘盧藏用得開字云茰依珮裏發菊向酒邉開李咸得直字云菊黄近酒泛松翠凌霜直沈佺期得長字云年年重九慶日月奉天長竇希玠得明字云九晨陪聖膳萬歲奉承明薛稷得厯字願陪九九辰長奉千千厯李乂得濃字捧篋茰香遍稱觴菊氣濃馬懐素得酒字蘭將葉布席菊用香浮酒于經野得樽字桂筵羅玉俎菊醴溢芳樽盧懐慎得還字云鶴似聞琴至人疑宴鎬還是宴也韋安石蘇瓌詩先成于經野盧懐慎最後成罰酒文館記菊花上夀九月九日中宗幸慈恩寺登浮圖羣臣獻菊花酒稱夀上官昭容詩云帝里重陽節香園萬乗來却邪茰入佩獻夀菊傳杯塔類承天湧門疑待佛開睿詞懸日月長得仰昭囘上閏節中宗閠九月九日幸總持登浮圖李嶠應制詩閠節開重九貞逰下大千花寒仍薦菊座晩更披蓮刹鳯迴雕輦幡虹間綵旃還將西梵曲助入南薰絃上賜馬故事每三月三日九月九日賜王公以下射中鹿鳴賜馬第一賜綾其餘布帛有差至開元八年秋舍人許景先以為徒耗國用而無益於是罷之嘉話射鴈明皇重陽日獵于沙苑有鴈飛帝射中之鴈帶箭西南而去益州道觀第一院有道士徐佐卿寄寓一日自外持一箭來曰吾行山中為飛矢所傷已無恙因掛箭于壁書其月日且云此後十年箭主到此付之後明皇幸蜀至此觀乃見箭集異記文峯歌開元中永新縣尹氏女姿容頗麗性識敏恵不因保母而妙善唱歌因重陽與羣女戲登南山文峯而同輩命之歌乃顰眉緩頰怡然一曲聲逗數十里故俗耆舊云尹氏之歌聞于長安刺史行部聞而召見之表進入宫為唱歌供奉南唐近事宴曲江貞元四年九月賜宴曲江亭帝為詩序因詔曰卿等重陽㑹宴朕想歡洽欣慰良多情發于中因製詩序今賜卿等一本文詞士應制同用清字由是百寮皆和上自考其詩為等第唐詩紀事黄菊歌韋綬為學士以心疾還第㑹九日徳宗作黄菊歌顧左右曰安可不示韋綬即遣使持徃綬遽奉和附使進帝曰為文不已豈頤養耶勑自今勿復爾唐書曲江别㑹韋綬為集賢院學士九月九日宴羣臣曲江綬請集賢院學士得别㑹帝一順從不忍食餻袁徳師給事中高之子九日出餻謂人曰某不敢喫請諸公破除且言是其先諱俛首乆之嘉話録題東閣李義山乃令狐楚故吏楚子綯繼相殊不展分重陽日義山詣綯㕔事題云曽共山翁把酒巵霜天白菊正離披十年泉下無消息九日樽前有所思莫學漢臣裁苜蓿還同楚客詠江籬郎君官重施行馬東閣無由得再窺綯乃閉此㕔終身不處北夢瑣言鶴林開花潤州鶴林寺杜鵑花高丈餘毎春末花爛熳節使賔僚一城士庶無不賞玩者時或見三女子紅裳艶麗共㳺樹下俗傳花神也周寳鎮浙西一日謂殷七七曰鶴林之花天下竒絶常聞君能開非時花今重九將近可能開副此日乎七七乃前二日鶴林宿焉中夜女子來謂七七曰妾為上𤣥所命下司此花今與道者共開之來日晨起寺僧忽訝花漸拆蕋及九日爛熳如春乃以聞寳與一城士庶咸驚之㳺賞復如春間續仙傳五色餻九月重陽日上五色餻菊花枝茱茰樹飲菊花酒佩茱茰令人長夀盧公範龍沙堆南昌有龍沙堆北𢃄江沙阜逶迤潔白高峻而陂有龍形連亘五六里俗為九日登高處豫章記權得輿龍沙宴㑹詩云龍沙重九㑹千騎駐旌旗藥市梓州易𤣥子以九日上昇今梓州每於初八夜易𤣥龍池中買藥謂之藥市成都九日為藥市人盡入市吸藥氣是日雨則仙人在其中湖山郡北四十里有湖山形平正可容數百人坐民俗極重九日每菊酒之晨讌㑹於此山者常至三四百人登之見邑屋悉委江海分明臨海記麻葛餻膳部節日食料九月九日麻葛餻㑹典陽數節蘇頲應制詩願陪陽數節億萬九秋期菊花節王維詩四海方無事三秋大有年芍藥和金鼎茱茰挿玳筵無窮菊花節長奉栢梁篇冬上天冬終也萬物所以終成也冬曰上天其氣上騰與地絶也故月令曰天氣上騰地氣下降釋名𤣥英冬為𤣥英亦曰安寧爾雅顓頊執權漢書魏相奏曰北方之神顓頊乘坎執權司冬月令冬月其日壬癸其帝顓頊其神𤣥𡨕漢郊祀歌𤣥冥陵隂蟄蟲盖藏淮南子冬為權權者所以權萬物也權正不失萬物乃藏閉藏冬三月此謂閉藏水氷地折無擾乎陽素問日行北陸日行北陸謂之冬後律厯志日東行北方黑道曰北陸易通統圖斗柄指北斗柄指北天下皆冬鶡冠子呼吸北方者何也伏方也伏方者萬物之方伏也伏方何以謂之冬冬者中也中也者物方藏於中也故曰北方冬也陽盛則吁茶萬物而養之外也隂盛則呼吸萬物而藏之内也故曰呼吸者隂陽之交接萬物之始終尚書大傳徳寒冬之徳寒寒不信其地不成剛地不成剛則凍閉不開天地之大四時之化而猶不能以不信成物又况人乎吕覽為信冬為信北方為冬冬終也北伏方也是故萬物冬皆伏貴賤若一美惡不减信之至也尸子太隂者北方也北伏也陽氣伏于下於時為冬冬終也物終藏乃可稱前律歴志月徳北方曰月其時曰冬其氣曰寒其徳淳起温怒周密斷刑致罰以符隂氣大寒乃至五穀乃熟此謂月徳月掌罰罰為寒管子月律十月律謂之應鍾何鍾動也言萬物應陽而動下藏也十一月謂之黄鍾何黄中和之色也鍾動也言陽氣動於黄泉之下動養萬物也十二月律謂之大吕何大大也吕者拒也言陽氣欲出隂不許也吕之為言拒也旅抑拒難之也白虎通月辰十月之辰謂為亥亥者劾也言時隂氣劾殺萬物也十一月之辰謂之子子者孳也謂陽氣至此更孳生也十二月之辰謂之丑丑者紐也言終始之際故以紐結為名也晉樂志月建孟冬之月日月㑹於析木之津而斗建亥之辰仲冬之月日月㑹於星紀而斗建子之辰季冬之月日月㑹於𤣥􅑎而斗建丑之辰月令注陽潜易曰潜龍勿用言十一月十二月陽氣潜藏未得用事雖煦嘘萬物養其根荄而猶盛隂在上地凍水氷陽氣否隔閉而成冬後魯恭傳六氣立冬之節初五日水始氷次五日地始凍後五日雉入大水為蜃次小雪氣初五日虹藏不見次五日天氣上騰地氣下降後五日閉塞而成冬次仲冬大雪之節初五日氷益壯地始坼鵙鳥不鳴次五日虎始交後五日芸始生荔挺出次冬至氣初五日蚯蚓結次五日麋角解後五日水泉動次季冬小寒之節初五日鴈北鄉次五日鷙鳥厲疾後五日水澤腹堅凡此六氣一十八候皆冬氣正養藏之令故養生者必謹奉天時也素問注𤣥冬冬曰𤣥冬三冬九冬風曰寒風勁風嚴風厲風哀風隂風景曰冬景寒景時曰寒辰節曰嚴節鳥曰寒鳥寒禽草曰寒卉黄草木曰寒木寒柯素木寒條梁元帝纂要陽月隂徳用事則和氣皆隂建亥之月是也故謂之正隂之月十月隂雖用事而隂不孤立此月純隂疑於無陽故謂之陽月所謂日月陽止者也爾雅云十月為陽孫炎注云純隂用亊嫌於無陽故以名云馬融傳至於陽月隂慝害作又云吉月之陽朔注云陽朔十月朔也良月良月十月也就盈數也左傳小春十月天氣和暖似春故名曰小春荆楚歲時記上冬十月孟冬亦曰上冬纂要亦曰開冬顔延年田收詩云開冬眷狙物殘悴盈化先濟曰開冬十月也暢月吕氏春秋曰仲冬命之曰暢月汪云隂氣在上民人空閒無所事作故命之曰暢月也辜月十一月為辜爾雅杪冬十二月季冬亦曰暮冬杪冬除月暮節暮歲窮稔窮紀纂要日月㑹於龍􅔀國語云日月㑹於龍􅔀國家於是乎蒸嘗也賈逵曰􅔀龍尾也月令孟冬日在尾東京賦日月㑹於龍􅔀恤民事之勞疚祀先十月一日閩中風俗皆作􅀈糍或作京飩以祀先祖蓋告冬之義也南粤志天統感精符曰天統者十一月建子天始施之端也注周以為正漢書紀律以黄鍾為天統魏地唐地魏地處季冬之位土地平夷唐地處孟冬之位得常山太岳之風音中羽其地磽确故其民險而好畜詩含神霧鑿山穿陵夏桀之時以十月發民鑿山穿陵通於河民諫曰孟冬鑿山穿陵是泄天之氣發地之藏天子失道後必有敗桀殺之朞年岑山崩為大澤湯率諸侯伐之太公金匱抱氷越王念復呉怨目臥則攻之以蓼足寒則漬之以水冬則抱氷夏還握火呉越春秋赤鳯來戚夫人在宫内峕十月十五日其入靈女廟以豚黍樂神吹笛擊筑歌上靈之曲既而相與連臂踏地為節歌赤鳯凰來西京雜記搜神記曰乃巫俗也文史足用東方朔初來上書曰臣朔年十二學書三冬文史足用斷囚流涕虞詡祖父經為郡縣獄吏案法平正務寛恕冬月上其狀嘗流涕隨之後漢書作徒衣鍾離意辟大司徒侯霸掾詔部送徒詣河内時冬寒徒病不能行路過𢎞農輒移屬縣使作徒衣縣不得已與之上書言狀意亦具以聞光武得奏以見霸曰君所使掾何乃仁於用心誠良吏也後漢書書法垂泣盛吉為廷尉每至冬月罪囚當斷其妻執燭吉持丹筆相向垂泣㑹稽典録教織崔寔為五原太守土地不知緝續冬積草伏臥其中若見吏以草纒身而出寔至官乃賣儲峙得三十餘萬諸鴈門廣武迎織師使巧手作機及紡以教民織政論寔母劉氏有母儀淑徳慱覽書傳初寔在五原常訓以臨民之政寔之善績母有其助焉無被孫辰字允公家貧不仕居社城中織箕為業明詩書為郡功曹冬月無被有藁一束暮臥其中旦收之三輔決録嵗餘董遇好學人從學者遇不肯教云當先讀書百遍而義自見從學者云苦渇無日遇曰當以三餘冬者歲之餘雨者晴之餘夜者日之餘魏略致薪顔裴字文林為京兆尹課民當輸租時車牛各致薪兩束為冬寒氷炙筆硯上涕泗凝氷晉武帝哭羊祜冬月涕泗交下凝鬚為永獨異志季冬學余家貧晝則愍於作勞夜則甘於疲寐以三時之務巻帙生塵篋不解緘唯季冬末纔得一旬學爾皇甫謐𤣥晏春秋冬月扇面王敦素憚周顗每見輒面熱雖復冬月扇面不得休晉書單衣晉孝武年十二時冬天晝日不著複衣但著單練衫五六重夜則累茵褥謝公諫曰聖體宜令有常陛下晝過冷夜過熱恐非攝養之術帝曰晝動夜靜謝公出嘆曰上理不减先帝世說浴湯池唐高宗時凡天子享㑹冬幸新豐歴白鹿觀上驪山賜浴湯池給香粉蘭澤帝賦詩學士皆屬和李適傳寳研爐内庫有七寳研爐一所曲盡其巧每冬寒硯凍置於爐上硯凍自消不勞􅀢火冬月帝常用之天寳遺事妓圍申王每至冬月有風雪苦寒之際使宫妓密圍於坐側以禦寒氣自呼為妓圍上肉陣楊國忠於冬月常選婢妾肥大者行列於前令遮風蓋籍人之氣相暖故謂之肉陣天寳遺事鳯炭楊國忠家以炭屑用密揑塑成雙鳯至冬月則燃於爐中及先以白檀木鋪於爐底餘炭不可參雜也上美女呵筆李白于便殿對明皇撰詔誥時十月大寒筆凍莫能書字帝勑宫嬪數人侍于李白左右令冬執牙筆呵之遂取而書其詔其受聖眷如此天寳遺事置鳯木李輔國嚴凝之時置鳯首木於高堂大厦中其木高一尺而雕刻如鸞鳯之形龢照之氣如二三月故别名曰常春木杜陽編暖金合進士張無頗遇袁天罡女袁大孃受藥以暖金合盛之曰寒時但出此合則一室暄熱不假爐炭矣金合乃廣利王宫中之寳裴鉶傳竒星迴節南詔以十二月十六日為星迴節是日登避風臺命清平官賦詩彼國謂詞臣曰清平官天子曰震旦玉溪編事除障十二月八日沭浴轉除罪障荆楚歲時記灌佛十二月八日佛成道日據經佛初成道浴於泥蓮池故北人以是日灌木佛像歲時雜記僧家以乳簟胡桃百合等造七寳粥亦謂之鹹粥供佛及僧道檀越宋時東京十二月初八日都城諸大寺作浴佛㑹并送七寳五味粥謂之臘八粥大閲此月戸部奏大閱天下貢物於都堂其日於朝宰相與百官皆赴戸部宴㑹一時特盛開元中曽以大閱一日貢物賜李林甫九州任土盡歸人臣之家國史書其事也輦下歲時記合習俗冬民既入婦人同巷相從夜續一月得四十五日必相從者所以省費燎火同巧拙而合習俗也漢書飲飛羽王莽知太后厭居深宫中欲虞樂以市其權迺令太后四時巡狩四郊春幸繭館遵霸水而袚除夏㳺篽宿鄠杜之間秋歴東館望昆明集黄山宫冬饗飲飛羽校獵上蘭登長平館臨涇水而覽焉漢元后傳立冬盛徳在水孟冬之月是月也立冬先立冬三日太史謁之天子曰某日立冬盛徳在水天子乃齊立冬之日天子親帥三公九卿大夫以迎冬於北郊還反賞死事恤孤寡月令黒郊六冬之日夜漏未盡五刻京都百官皆衣皂迎氣於北郊後續禮儀志冬則衣黑衣佩𤣥玉乘𤣥輅駕鐵驪載𤣥旂以迎冬於北郊其祭先豕居明堂後廟啟北户逸禮節名十月立冬為節者冬終也立冬之時萬物終成為節名小雪為中者氣叙轉寒雨變成雪故以小雪為中三禮義宗卦名立冬乾王坎相艮胎震沒巽死離困坤廢兊休五行休王論十月十五下元十月十五為下元道經水神校籍下元九江水帝十二河源溪谷大神暘谷神王水府靈官同下人間校定罪福正一脩真㫖要水官解厄下元三品解厄水官主録百司檢察人間善惡上詣天闕進呈上張燈開寳四年七月中元節京城張燈㑹要太平興國五年十月下元京城始張燈如上元之夕至淳化元年六月始罷中元下元張者冬至履長十一月建寅月之正月冬至日南極景極長隂陽日月萬物之始行堂黄鍾其管最長故有履長之語玉燭寳典亞嵗魏晉則冬至日受萬國使百寮稱賀因小㑹其儀亞於歲旦于志魏曹植表一陽嘉節萬物昭蘇亞歲迎祥履長納慶君道長冬至陽氣始動夏至隂氣始起麋鹿角廢故寢兵鼓身欲安志欲静故不聽事迎送冬至陽氣起君道長故賀夏至隂氣起君道衰故不賀𤣥明天冬至日行逺道周四極命之曰𤣥明天吕氏春秋辰星升日冬至辰星升春秋考異郵三至十一月大雪為節者形於小雪為大雪時雪轉甚故以大雪名節冬至為中者亦有三義一者隂極之至二者陽氣始至三者日行南至故謂之冬至也三禮義宗三極冬至十馬疑極有三焉晝漏極短去極極逺晷景極長極者至極而還之辭也斗北中繩日冬至則斗北中繩隂氣極陽氣萌故曰冬至為徳日夏至則斗南中繩陽氣極隂氣萌故曰夏至為刑淮南子日道發南日道發南去極彌逺其景彌長逺長乃極冬乃至焉日道斂北去極彌近其景彌短近短乃極夏乃至焉二至之中道齊景正春秋分焉後律厯志成天文易通卦驗曰冬至成天文鄭𤣥注云天文謂之三光運行照天下冬至而數訖於是時也祭而成之所以報也樂叶圖徵曰八能之士常以日冬至成天文日夏至成地理作隂樂以成天文作陽樂以成地理諧律厯冬至始人主致八能之士或調黄鍾或調六律或調五行或調律厯或調隂陽或調正徳易通卦驗度晷景天子常以冬夏至日御前殿合八能之士陳八音聽樂均度晷景候鍾律權土灰效隂陽也司馬彪續漢書蘭射干生陳寵傳云夫冬至之節陽氣始萌故十一月有蘭射干芸荔之應注易通卦驗云十一月廣莫風至則蘭射干生射音夜即今之烏扇也迎至易通卦驗曰冬至始人主與羣臣左右從樂五日從者就也冬至臣俱就大司樂之公臨其律祭天圜􅉌之樂以為祭事莫大於此懸璧連月日月五星冬至起牽牛日月若懸璧仰觀天形如車盖衆星纍纍如連貝尚書孝靈曜立日表易通卦驗曰冬至之日立八神樹八尺之表日中視其晷晷如度其歲美人民和順不如度者則歲惡人民多譌言政令為之不平晷進則水晷退則旱進一尺則日食退一尺則月食月食則正臣下之行日食則正人主之道注進謂長於度也天地交讓冬至隂陽合精天地交讓天為尸濕地為不凍君為不朝百官為不親事不可出㳺必有憂悔神農書初嵗凡候歲美惡謹候歲始歲始或冬至日産氣始萌臘明日人衆卒歲一㑹飲食發陽氣故曰初歲史記懸土炭史記曰冬至短極懸土炭炭動麋鹿解角蘭根出泉出躍略以知日至要決晷景孟康曰先冬至三日懸土炭於衡兩端輕重適均冬至日陽氣至則炭重夏至日隂氣至則土重晉灼曰蔡邕律厯紀候鍾律權土炭冬至陽氣應黄鍾通土炭輕而衡仰夏至隂氣應𬎼賔通土炭重而衡低進退先後五日之中天官書扶氣成務至日所以休兵不興事閉關商旅不行何此日隂陽氣㣲王者承天理物故率天下静不復行役以扶助㣲氣成萬物也夏至隂始起反大熱何隂氣始起陽氣推而上故大熱也冬至陽始起隂氣推而上故大寒也白虎通迎日黄帝得寳鼎宛朐問於鬼臾區對曰黄帝得寳鼎神策是嵗已酉朔旦冬至得天之紀終而復始於是黄帝迎日推策後率二十嵗復朔旦冬至史封禪書書雲春王正月辛亥朔日南至公既視朔遂登觀臺以望而書禮也凢今至啓閉必書雲物為俻故也左傳五年令狐楚冬至進鞍馬狀云迎日良辰書雲令節始生一陽之數首出三統之正英華獻履襪冬至進履襪崔駰襪銘有建子之月助養元氣之事陽升于下日永于天長履景福至千億年魏曹植獻襪履表曰伏見舊儀國家冬至獻履貢襪所以迎福踐長後魏崔浩女儀云近古婦人常以冬至日進履襪於舅姑踐長至之義也酉陽雜俎云北朝婦人常以冬至日進襪及鞾添線晉魏間宫中以紅線量日影冬至後日添長一線嵗時記唐宫中以女功揆日之長短冬至後日覺漸長比常日増一線之功唐雜録舉觴晉周顗母李氏字絡秀生顗及嵩謨元帝時並列顯位嘗冬至舉觴賜三子曰吾本謂度江託足無所爾家有相爾等並羅列吾前復何憂嵩起長跪而泣曰不如阿母言伯仁為人志大而才短名重而識闇好乘人之弊此非自全之道嵩性狼抗亦不容於世唯阿奴碌碌當在母目下耳阿奴謨小字也世說放囚王志字次道僧䖍子也為東陽太守郡獄有重囚十餘冬至日悉遣還家過節皆反惟一人失期志曰此自太守事主者勿憂明旦果至以婦孕吏人益歎服之南史梁書席闡為東陽太守傳岐為始新令冬至放囚俱同設豆餅庫狄伏連冬至之日親表稱賀其妻為設豆餅伏連問此豆何因而得妻曰於馬豆中分减伏連大怒北齊書朔日冬至上御含元殿受朝太史奏曰朔日冬至厯數之元嘉辰之㑹按樂叶徵圖云朔日冬至聖主厚祚又按春秋感精符云冬至隂雲祁寒有雲迎日者來嵗大美此並聖徳光被上感天心請付有司以彰嘉瑞從之𤣥宗實録駿狼冬至日在狼駿之山淮南子郭璞客傲云狼駿之長暉𤣥陸之短景黄鍾天日正南黄鍾踐長粥饘追萌微納休徵風土記令狐楚表云建子實三微之宗黄鍾為六律之本冬氣方至壁星正中英華荐黍羊四民月令曰冬至日荐黍羊先薦𤣥㝠以及祖禰其進拜謁賢君師一如元日先後冬至各五日買白犬養之以供祖禰作赤豆粥荆州嵗時記曰十一月冬至日作赤豆粥注共工氏有不才之子以冬至死為疫鬼畏赤小豆故冬至日作赤豆粥以禳之除夜通函録是夕冬至除夜盧頊家方偹粢盛之具廣記三百四十日影在北赤土國直崖州南渡海經鷄籠島冬至之日影在北夏至之日影在南開户皆向北洽聞記數日驗嵗淮南曰以冬至日數至來嵗正月朔日五十日者民食不足不滿五十日者减一升有餘則日日益一升四時纂要云此占最有據也天竺冬至西域諸國志云天竺十一月十六日為冬至則麥秀十二月十六日為臘則麥熟齊氏臘三戌臘冬至後三戌臘祭百神也説文蜡禮記曰天子大蜡八伊耆氏始為蜡蜡索也嵗十二月合聚萬物而索饗之五經要義曰三代名臘夏曰嘉平殷曰清祀周曰大蜡總謂之臘晉博士張亮議曰蜡者合聚百物索饗之嵗終休老息民也臘者祭宗廟五祀傳曰臘接也祭宜在新故交接也俗謂之臘臘明日為初嵗秦漢以來有賀此皆古之遺語也不臘左傳曰晉侯假道於虞以伐虢宫之竒諌弗聽以其族行曰虞不臘矣御覽注云臘祭名也日月㑹于龍尾百物備合因於是祭羣神也嘉平秦恵文王十二年初臘始皇三十一年十二月更名臘曰嘉平史記尋仙改名太原真人茅盈内紀曰始皇三十一年九月庚子盈曽祖父蒙乃於華山之中乘雲駕龍白日升天先是其邑謠歌曰神仙得者茅初成駕龍上升入泰清時下𤣥洲戲赤城繼世而徃在我盈帝若學之臘嘉平始皇聞謠歌而問其故父老具對此仙人之謡歌勸帝求長生之術於是始皇欣然乃有尋仙之志因改臘曰嘉平臘日祀竈宣帝時隂子方者當臘日晨炊而竈君神形見子方再拜受慶家有黄羊因以祀之自是以後暴至巨富故後常以臘日祀竈捜神記王氏臘沛國陳咸為廷尉監王莽簒位還家杜門不出莽改昜漢法令及臘日咸常言我先祖何知王氏臘乎謝承後漢書臘取瘦羊甄宇北海人建武中青州從事徵拜博士每臘詔賜博士羊人一頭羊有大小肥瘦時博士祭酒議欲殺羊稱分其肉宇曰不可又欲投鈞宇復恥之宇因先自取其最瘦者後召問瘦羊博士所在京師因以為號東觀記放囚虞延建武初除細陽令每至嵗時伏臘輒休遣徒繫各使歸家並感其恩徳應期而還有囚於家被病自載論獄既至而死本傳華陽志王長文元康初試守江源令梁書何鳯為建安太守放囚事同思母第五倫母老不能之官每至臘日常悲戀垂淚謝承書遺錢章帝尊崇舅氏馬廖兄弟並居職任廖等傾身交結第五倫欲令抑損其權上疏曰聞衛尉廖臘日遺其在洛中錢各五千越騎校尉光臘用羊三百頭米四百斛肉五千斤臣以為不應經義本傳竊食祭先韓卓字子助陳畱人臘日奴竊食祭其先人卓義其心即日免之袁山松書隨母還家鄭𤣥年十二隨母還家正臘宴㑹同列十數人皆美服盛飾語言閒通𤣥獨漠然如不及父母私督數乃曰此非我志不在所願别傳僵仆陳修烏傷人家貧為吏常步檐上下恒食乾物每至正臘僵仆不起同僚飲食請不肯徃㑹稽典録學華王朗毎以識度推華歆歆蜡日嘗集子姪燕飲王亦學之有人向張華説此事張曰王之學華皆是形骸之外去之所以更逺世説盗樹范喬字伯孫外黄人臘夕盗斫其樹有告者喬佯不聞邑人愧而歸之喬曰取柴欲與父母相懽耳何以愧為晉書賜臘景龍三年臘日帝于苑中召近臣賜臘晚自北門入于内殿賜食加口脂臘脂盛以碧鏤牙筩文館記伏臘蕭炅李林甫所引不知書嘗與嚴挺之言稱蒸嘗伏臘乃為伏獵挺之白張九齡曰省中而有伏獵侍郎乎出炅為岐州刺史林甫恨之嚴復傳停兎貞元九年十一月上此日來京兆府每年及臘日府縣捕養老兎以充進獻自今以後宜停唐㑹要三驅貞元十一年十二月臘日畋於苑中止多殺行三驅禮軍士無不知感祭先蔡邕獨斷云臘者嵗終大祭縱吏民宴飲非迎氣故但送不迎應劭風俗通云案禮夏曰嘉平殷曰清祀周曰大蜡漢改曰臘臘者獵也田獵取獸祭先祖也周時獵與大蜡各為一祭漢改曰臘不蜡而為臘矣左傳注勞農季冬之月星迴嵗終隂陽以交勞農大享臘後漢志行衰為臘王者各以其行盛日為祖衰日為臘漢以火徳火衰於戌故戌日為臘魏以土徳土衰於辰故辰日為臘晉以金徳金衰於丑故丑日為臘臘與蜡同魏臺訪議高堂隆曰帝王各以其行之盛而祖以其終而臘火生於寅盛於午終於戌故火家以午祖以戌臘秦靜曰古禮出行有祖祭嵗終有蜡臘無正月必祖之祀漢氏以午祖以戌臘午南方故以祖冬者嵗之終物畢成故以戌臘而小數之學者因為之說非典文也後漢志注禮止門内蜡本施祭故不賀其明日為小嵗賀稱初嵗福始罄無不宜正旦賀稱元正首慶百福惟新小嵗之賀既非大慶禮止門内徐瑗家儀臘酒十月上幸命典饋清麴釀冬酒以供臘祀臘明日謂小嵗進酒尊長脩刺賀君師四民月令藻豆凡臘日上藻豆袋及頭膏面脂口脂盧公家範駐顔膏臘日賜銀合子駐顔膏牙香等繡香袋一枚臘鼓東夷三韓俗以臘日家家祭祀俗云臘鼓鳴春草生也謝承書五臘道家有五臘正月一日為天臘五月五日為地臘七月七日為道徳臘十月一日為民嵗臘十二月正臈日為王侯臘王侯臘五帝校定生人處所分野降注三萬六千神炁其日可謝罪祈求延年益夀道書除夕大儺東都賦卒嵗大儺毆除羣厲譙周論語注曰儺却之也吕覽注曰大儺逐盡隂氣為陽導也嵗前一日擊鼓驅疫謂之逐除漢舊儀曰昔顓頊氏之有三子已而為疫鬼一居江水為瘧鬼一居若水為罔兩􅈮鬼一居人宫室區隅善驚人為小鬼於是以嵗十二月使方相氏蒙虎皮黄金四目𤣥衣丹裳執戈持盾帥百𨽻及童子而時儺以索室中而毆疫鬼也月令章句曰日行北方之宿北方大隂恐為所抑故命有司大儺所以扶陽抑隂也盧植禮記注曰所以逐衰而迎新宿嵗嵗除家家具肴蔌謂宿嵗之儲以迎新年相聚酣飲畱宿嵗飯至新年則棄之街衢以為去故納新也荆楚記藏鈎荆楚記曰嵗前為藏鈎之戲始於鈎弋夫人按漢武故事云上巡狩河間見清光自地屬天望氣者云下有貴子上求之見一女子在空室中姿色殊絶兩手皆拳數百人擘之莫舒上自披即舒號拳夫人善素女術大有寵即鈎弋夫人也辛氏三秦記曰漢昭帝母鈎弋夫人手拳有國色世人藏鈎起於此周處風土記云呼為行彄盖婦人所作金環以錔指而纒者臘日祭後叟嫗各随其儕為藏彄之戲分為二曹以較勝負得一籌者為勝其負者起拜謝勝者俗云戲令人生離有禁忌之家廢不脩也彄音鈎載土洪矩呉時作廬陵郡載土船頭逐除人就乞矩指船頭云無物載土耳宣城記逐除京師每嵗除日行儺今所謂逐除也結黨連羣通夜達曉家至門到責其送迎孫興公嘗著戲為儺至桓宣武家温覺其應對不凡推問之乃興公建康實録儺亦呼為野雩戲俗訛儺為野胡放囚謝方明晉末宋武帝加晉陵太守為驃騎長史南郡相嘗年終江陵縣獄囚事無輕重悉放還家使過正三日還到罪重者二十餘人主簿𢎞季咸等固諫方明不納一時遣之囚及父兄並驚喜涕泣以為就死無恨至期有重罪一人醉不能歸違二日乃反餘一囚十日不來巡逡墟里不能自歸鄉村責讓率領將送竞無迯者逺近歎服焉南史舊唐書吕元膺為蘄州刺史放囚事同著野雩曹景宗嗜酒好樂臘月于宅中使作野雩逐除徧徃人家乞酒食本以為戲而部下多剽輕因㺯人婦女奪人財貨高祖頗知之景宗乃止梁書設火山唐太宗盛飭宫掖明然燈燭與蕭后同觀之謂曰朕施設孰與隋主蕭后笑而不答固問之曰彼乃亡國之君陛下開基之主奢儉之事固不同爾帝曰隋主何如蕭后曰每至除夜殿前諸院設火山數十車沉水香根每一山焚沉香數車以甲煎沃之熖起數丈香聞數十里一夜之中用沉香二百餘乘甲煎二百餘石房中不然膏火懸寳珠一百二十以照之光比白日妾觀陛下殿前所焚是柴木殿内所爇是膏油但覺煙氣薰人太宗良乆不言口刺其奢心服其盛續世説阿奢竇懐貞㑹嵗除中宗宴近臣謂懐貞曰聞卿喪妻今欲繼室可乎懐貞唯唯俄而禁中寳扇障衞有衣翟衣出者已乃韋后乳媪所謂莒國夫人者故蠻婢也懐貞納之不辭世謂媪婿為阿奢懐貞每奉事輒自署皇后阿奢而或謂國奢軒然不慚本傳進儺嵗除日太常卿領官屬樂吏并䕶童侲子于人晚入内至夜於寢殿前進儺燃蠟燭燎沉檀熒煌如晝上與親王妃主以下觀之其夕賞賜甚多是日衣冠家子弟多覔侲子之衣而竊看宫中有進士臧童老者矣偶為人牽率同入其間為樂吏所驅時有一跌不敢擡頭望視執㹈牛尾拂子鞠躬宛轉隨隊唱夜好于匝於廣庭之中及將旦得出不勝困劣扶舁而歸一病六十日而就試不得南部新書擊鬼圖呉起錢佐卒弟琮以次立嵗除畫工獻鍾馗擊鬼圖倧以詩題圖上胡進思見之大悟知倧將殺已是夕擁兵廢倧迎俶立之五代史爆竹李畋隣人有仲叟家為山魈所􅑂擲瓦石開戸牖叟求報謝而妖崇彌盛畋謂叟曰公旦夜於庭落中若除夕爆竹數十竿叟然其言爆竹至曉寂然安帖遂止該聞集山臊在西方深山中長尺餘性不畏人犯之令人寒熱病畏爆竹聲神異經張說守嵗詩爆竹好驚眠荆楚嵗時記曰元日庭前爆竹以辟山臊惡鬼也守嵗蜀之風俗晩嵗相與餽問謂之餽嵗酒食相邀為别嵗至除夕達旦不眠謂之守嵗風土記儺翁嵗除日儺皆作鬼神狀二老人儺翁儺母秦中嵗時記三儺論語疏儺逐疫鬼也為隂陽之氣不節厲鬼隨而作禍故天子使方相氏黄金為四目熊皮為㡌口作儺儺之聲以驅疫鬼一年三變為之海録碎事丹首𤣥製儺選侲子皆赤幘皂製執大鼗方相帥之及百𨽻以桃旅棘矢土鼓鼓且射之以赤丸五穀播洒之持火炬送疫出端門外騶騎傳炬出宫五營騎士傳火棄洛水中仍土天池絶其橋梁使不得還後漢志天中記巻五
