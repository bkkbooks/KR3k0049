body:
  text: 天中記卷三十明陳耀文撰封爵五等五等之制始於黃唐郡縣之治創自秦漢故設官分職所以輕其任也並建五長所以𢎞其治也一等諸侯論三光易曰伏羲氏之王天下也爵有五等以法五行也或三等者法三光也白虎通重民王者立三公九卿二十七大夫足以教道照幽隠必復封諸侯何重民之至也善惡比而易知故擇賢而封之使治其民以著其徳極其才上以尊天子備蕃輔下以子養百姓施行其道開賢者之路謙不自專故列土封賢因而象之象賢重民也上陽徳王者即位先封賢者憂民之急也故列土為疆非為諸侯張官設府非為卿大夫皆為民也封諸侯以夏何陽氣盛養故以封諸侯盛養賢也封立人君陽徳之盛者也上褒功尊徳受命之王致太平之美羣臣上下之功故盡封之乃中興征伐大功皆封所以褒大功也盛徳之士亦封之所以尊有徳封者必試之為附庸三年有功因而封之五十里凡士有功者亦為附庸失其位大夫有功成封五十里卿成封七十里公成封百里上象雷諸侯封不過百里象雷震百里所潤雲雨同也雷者陰中之陽也諸侯象也諸侯比王者為陰南面賞罰為陰法雷也上公爵有五等公者無私也故文背私為公環濟要畧伯能移善于衆與百姓同謂之公周書什名云公貢也才徳兼於人人咸貢薦于王而用之也辨曰公直也取其正直無私也字從入從厶人音背厶古私字背厶則為公韋昭辨爵名入猶皆也厶姦衺也韓非曰蒼頡作字自營為私背私為公說文公之為言公正無私也白虎通爵位盛大以無私為徳者公也孟子正義立制及衆曰公謚法侯能樹名生物與天道俱謂之侯侯能成羣謂之君周書侯侯也所以守藩也援神契侯者候也候順逆也白虎通執應入方曰侯諡法斥候於外以君人為徳者侯也正義伯胄子成人能治上官謂之士士率衆時作謂之曰伯周書伯把也持政事也要畧伯者長也白也言其咸建五長功實明白也風俗通體人足以長人者伯也正義子子猶孳孳恤下之稱也要畧子者孳也孳孳無已也白虎通子字也字養也而其徳足以養人者故曰子也正義男男任也任治政事受王命為君也要畧男任也任安也而其徳足以安人者故曰男也正乂輔衛王室太史公曰殷以前尚矣周封五等公侯伯子男然封伯禽康叔於魯衛地各四百里親親之義真有徳也太公於齊兼五侯地尊勤勞也武王成康所封放百而同姓五十地上不過百里下三十里以輔衛王家史記親賢百官表注記曰王者之制公侯伯子男凡五等上大夫卿下大夫上士中士下士凡五等周室興隆三聖制法立爵五等封國八百親親建國則周公宅魯康叔啟衛賢賢表徳則太公封齊去五等爵春秋鄭莊公封母弟於京祭仲曰都城過制國之害也其後卒相攻伐國内大亂故過度則有強臣之禍鄙小則有微弱之憂秦以列國之勢而并天下自以由諸侯而起之也於是去五等之爵而置郡縣雖有親子母弟皆為匹夫及其政衰一夫呼而天下去及至漢家見亡秦以孤特亡也於是大封子弟或連城數十廓地千里自闗已東皆為王國力多而權重故亦有七國之難袁子社壇漢雜事曰天子太社以五色土為壇封諸侯者取其土苴以白茅授之各有所封方之色以立社於其國故謂之受茅土漢興惟皇子封為王者得茅土其他臣以户賦租入為節不受茅土不立社功臣封侯東觀漢記曰上封功臣皆為列侯大國四縣餘各有差博士丁恭等議曰古帝王封諸侯不過吾里故利易建侯取法於雷上曰古之亡國皆以無道未嘗聞封功臣地多而滅也夜行至國武王已平啇而王天下封師尚父於齊營中東就國道宿行遲逆旅之人曰吾聞時難得而易失客寢甚安殆非就國者也太公聞之夜衣而行犂明至國萊侯來伐與之争營丘史世家太公封於齊宿於逆旅主人晨起有一人謂曰客寢甚甘殆非就國者也太公蹶起即路俄有追者至以其出闗遂止獨異志鄭桓公東㑹封於鄭暮舎於宋東之逆旅同説苑十三上功上恩吕太公望封於齊周公旦封於魯二君者甚相善也相謂曰何以治國太公望曰尊賢上功周公旦曰親親上恩太公望曰魯自此削矣周公旦曰魯雖削有齊者亦必非吕氏也其後齊日以大至於霸二十四世而田成子有齊國魯公以削至於覲存三十四世而亡吕長見魯公伯禽之初受封之魯三年而後報政周公周公曰何遲也伯禽曰變其俗革其禮喪三年然後除之故遲太公亦封於齊五月而報政周公周公曰何疾也曰吾簡其君臣禮從其俗為也及後聞伯禽報政遲乃歎曰嗚呼魯後世其北面事齊矣史記齊之所以不如魯者太公之賢不如伯禽伯禽與太公俱受封而各之國三年太公來朝周公問曰何治之疾也對曰尊賢先䟽後親後仁也此覇者之迹也周公曰太公之澤及十世五年伯禽來朝周公問曰何治之難對曰親親者先内後外先仁後義也此王者之迹也周公曰魯之政及十世故魯有王迹者仁厚也齊有覇迹者武政也齊之所以不如魯也太公之賢不如伯禽也說苑海阻山髙辛寛見魯繆公曰臣而今而後知吾先君周公之不若太公望封之知也昔者太公望封於營丘之東山其山髙險固之地也是故地日廣子孫彌隆吾先君周公封於魯無山林谿谷之險諸侯四時以達是故地日削子孫減殺辛寛出南宫括入見公以語南宫括對曰寛少者弗識也君獨不聞成王之定成周之説乎其辭曰惟余一人營居于成周惟余一人有善易得而見也有不善易得而誅也故曰善者得之不善者失之古之道也夫賢者豈欲其子孫之阻山林之險以長為無道哉小人哉寛也固妄誹訾豈不悲哉吕長利辛擽見魯穆公曰周公不如太公之賢也周公擇地而封曲阜太公擇地而封營邱爵土等其地不若營邱之美人民不如營邱之衆不徒若是營邱又有天固穆公心慙不能應也辛櫟趨而出南宫邊子入穆公具以辛櫟之言語南宫邊子南宫邊子曰昔周公王之卜居成周也其命龜曰予一人兼有天下辟就百姓敢無中土乎使予有罪則四方伐之無難得也周公卜居曲阜其命龜曰作邑乎山之陽賢則茂昌不賢則速亡季孫行父之戒其子也曰吾欲室之俠於兩社之間也使吾後世有不能事上者使其替之益速如是則曰賢則茂昌不賢則速亡安在擇地而封哉或示有天固也辛櫟之言小人也説苑知微昔者太公望周公旦受封而見太公問周公何以治魯周公曰尊尊親親太公曰魯從此弱矣周公問太公曰何以治齊太公曰舉賢賞功周公曰後世必有刼殺之君矣後齊日以大至於霸二十四世而田氏代之魯日以削二十四世而亡猶此觀之聖人能知微矣詩曰惟此聖人瞻言百里韓詩外𫝊無驕士成王封周公周公辭不受乃封周公子伯禽於驕士辭去周公戒之曰去矣子其無以魯國驕士矣我文王之子也武王之弟也今王之叔父也又相天子吾於天下亦不輕矣然嘗一沐而三握髮一食而三吐哺猶恐失天下之士吾聞之曰徳行廣大而守以恭者榮土地博裕而守以儉者安禄位尊盛而守以卑者貴人衆兵强而守以畏者勝聰明睿智而守以愚者益博聞多記而守以淺者廣此六守者皆謙徳夫貴為天子富有四海不謙者先天下亡其身桀紂是也可不慎乎故易曰有一道大足以守天下中足以守國家小足以守其身謙之謂也夫天道毁滿而益謙地道變滿而流謙鬼神害滿而福謙人道惡滿而好謙是以衣成則缺袵宫成則缺隅屋成則加錯示不成者天道然也易曰謙亨君子有終吉詩曰天降不遲聖敬日躋其戒之哉子其無以魯國驕士矣説苑敬慎人上之道成王封伯禽為魯公召而告之曰爾知為人上之道乎凡處尊位者必以敬下順徳規諫必開不諱言行撙節安静以藉之諫者勿振以威毋格其言博米其辭乃擇可觀夫有文無武無以威下有武無文民畏不親文武俱行威徳乃成既成威徳民親以服清白上通巧佞下塞諫者得進忠信乃畜伯禽再拜受命而辭上君道桐珪成王與唐叔虞燕居援梧葉以為珪而授唐叔虞曰余以此封女叔虞喜以告周公周公以請曰天子其封虞邪成王曰余一人與虞戲也周公對曰臣聞之天子無戲言天子言則史書之工誦之士稱之於是遂封叔虞于晉周公旦可謂善說矣一稱而令成王益重言明愛弟之義有輔王室之固吕重言史作史佚見親王三公宰相㕘天子三公㕘天子坐而議政無不總統故不以一職為官後世宰相兼三公之事開徳宣符三台六星兩兩而居起文昌列抵太微一曰天柱三公之位也在人曰三公在天曰三台王開徳宣符也晉書三台一名三能天文録鄭司農云三能三階也昭徳塞違三台六星西近文昌二星曰上台為司命次一星曰中台為司中東二星曰下台為司禄所以昭徳塞違也晉志三台一名天柱上台司命為太尉中台司中為司徒下台司祿為司空武陵太守星𫝊帝佐三公在天為三台九卿為北斗三公象五岳九卿法四年三十七大夫法山陵八十一元士法谷阜合為帝佐以匡綱紀春秋漢舍孳三公之任三公者司空司馬司徒也司馬主天司空主土司徒主人故陰陽不和四時不節星辰失度災變非常則責之司馬山陵崩竭川谷不流五榖不植草木不茂則責之司空君臣不正人道不和國多盜賊下怨其上則責之司徒故三公典其職憂其分舉其辨明其隠此三公之任也韓詩外傳論道之官三公論道之官葢以佐天子理陰陽平邦國無所不統故不以一職名其官六典象鼎三公者謂太師太傅太保也師王所尊也𫝊助王事保安也保王身也凡此皆内與王論道中㕘六官之事三公者象鼎三足共承其上也環濟要畧五星順行異官同爵共立别職與人隆化幽賛神明者謂之太尉和五教理人倫使風行俗平萬國咸寜者謂之司徒使無國枉禮法錯刑清事均民聚者謂之司空若仁義之路開升平之氣通則五星順行庶績咸熙古今通語三公太師太傅太保為三公訓䕶天子導以徳義天子加拜待以不臣之禮非人則闕矣漢制保傅在三公上號曰上公自後常然宋書四佐明由曉升級必育受稅俗成博受古諸隕丘受延嬉右燧人四佐燧人出天四佐出洛論語摘輔象六佐金提主化俗鳥明主建福視黙主災惡紀通為中賦仲起為海陸陽侯為江海右伏羲六佐六佐出世七輔風后受金法天老受天籙五聖受道級知命受糾俗窺紀受變復地典受州絡力墨受準斥右黄帝七輔州選舉翼佐帝徳上配三台黄帝以風后配上台天老配中台五星配下台謂之三公其餘知天地規紀地典力牧常先封胡孔甲等或以為師或以為將帝王世紀三公擬三台黄帝以風后云云配下台陶氏職官要録黄帝置三公之秩以親黎元晉志六相昔者黄帝得蚩尤而明於天道得太常而察於地利得奢龍而辨於東方得祝融而辨於南方得太封而辨於西方得后土而辨於北方黄帝得六相而天地治神明至蚩尤明乎天道故使為當時大常察乎地利故使為廪者奢龍辨乎故使為土師祝融辨乎南方故使為司徒大封辨乎西方故使為司馬后土辨乎北方故使為李管子五行通典奢龍作蒼龍五名易通卦驗云天地成位君臣道生君有五期輔有三名注三名公卿大夫政教君臣起自人皇之世至伏羲因之故文耀鉤云伏羲作易名官者也論語撰考云黃帝受地形象天文以制官伏羲已前雖有三名未必具立官位至黃帝名位乃具周禮疏九佐顔斶云堯有九佐戰國䇿堯之佐九人禹皋稷契夷垂益䕫龍淮南子圖藏大麓赤龍負圖以出河見堯典太尉舜等百二十年集發藏大麓春秋運斗樞堯坐舟中與太尉舜臨觀鳯皇授圖合誠圖堯三公堯之治天下也舜為司徒契為司馬禹為司空注三公之官文子十六相髙陽氏才子八人蒼舒􅀈敳檮戭六臨龍降庭堅仲容叔達謂之八愷髙辛氏才子八人伯奮仲堪叔獻李仲伯虎仲熊叔豹季貍謂之八元舜臣堯舉八愷使主后土以揆百事莫不時序地平天成舉八元使布五教于四方内平外成舜舉十六相去四㓙有大功二士而為天子左十八司徒契為司徒百姓和親䕫主賓客逺人必至典畧尚書刑官放勲曰益為司馬卨為司徒禹為司空聖帝即位三公象三能矣刑徳放五丞顔斶曰舜有七友禹有五丞湯有三輔戰國䇿㕘五事湯問伊尹曰古者所以立三公九卿大夫列士者何也伊尹對曰三公者所以㕘五事也九卿者所以㕘三公也大夫者所以㕘九卿也列士者所以㕘大夫也故㕘而有㕘是謂事宗事宗不失外内若一說苑事道湯問伊尹曰三公九卿大夫列士其相去何如伊尹對曰三公者知通於大道應變而不窮辨於萬物之情通於天道者也其言足以調陰陽正四時節風雨如是者舉以為三公故三公之事常在於道也九卿者不失四時通於溝渠隄防樹五榖通於地理者也能通不能通能利不能利如此者故以為九卿故九卿之事常在於徳也大夫者出入與民同衆取去與民同利通於人事行猶舉繩不傷於言言之於世不害於身通於闗梁實於府庫如是者舉以為大夫故大夫之事常在於仁也列士者知義而不失其心事功而不獨專其賞忠政疆諫而無有姦詐去私立公而言有法度如是者舉以為列士故列士之事常在於義也故道徳仁義定而天下正凡此四者明王臣而不臣湯曰何謂臣而不臣伊尹對曰君之所不名臣者四諸父臣而不名諸兄臣而不名先王之臣臣而不名盛徳之士臣而不名是謂大順也上中輔諸侯外蕃三公為中輔春秋演孔圖今尚書夏侯歐陽説天子三公一曰司徒二曰司馬三曰司空九卿二十七大夫八十一元士凡百二十在地為山川古周禮説天子立三公曰太師太傅太保無官屬與王同職故曰坐而論道謂之三公又立三少以為之副曰少師少傅少保是謂三孤家宰司徒宗伯司馬司寇司空是謂六卿之屬大夫士庶人在官者凡萬二千石臣謹案周公為傅召公為保太公為師周公太公無為司徒司空文知師保傅三公官名也五帝三王不同物此周之制也許慎五經異義古周禮説天子無爵三公無官昌號於天何爵之名㕘職於天子何官之稱上神化丹青天設三光以照記天子立公卿以明治故曰公卿者四海之表儀神化之丹青也上有輔明主之事下有遂聖坐之事和陰陽調四時安衆庶育羣生使百姓輯睦無怨思之色四夷順徳無叛逆之憂此公卿之職而賢者之所務也若伊尹周召三公之才太顛閎夭九卿之人鹽鐡論淮南齊俗日月之所照誋此記字誤阿衡殷時有阿衡伊摯佐之太甲改為保衡皆三公官也有三少少師少傅少保是謂三孤副助三公者也孤者不掌官桀然孤特環濟要畧後漢朱祐馬武𫝊論或任以阿衡之地阿倚也衡平也使能記曰虞夏商周有師保有疑丞設四輔及三公不必備惟其人語使能也禮記古者天子必有四鄰前曰疑後曰丞左曰輔右曰弼天子有問無以對責之疑有志而不志責之丞可正而不正責之輔可揚而不揚責之弼其爵視卿其禄視大國之君尚書大𫝊四輔明堂之位曰篤仁而好學多聞而道慎天子疑則應問而不窮者謂之道道者導天子以道者也常立於前是周公也誠立而敢斷輔善而相義者謂之充充者充天子之志常立於左是太公也潔亷而切直匡過而諫邪者謂之弼弼者拂天子之過者也常立於右是召公也博聞强記接給而善對者謂之承承者承天子之遺忘者也常立於後是史佚也故成王中立而聽朝則四聖維之是以慮無失計而舉無過事大戴保𫝊道者有疑則問或謂之疑充者輔善或謂之輔注三公之職周成王幼在襁褓之中召公為太保周公為太傅太公為太師保保其身體傅傅其徳義師導之敎訓此三公之職也於是為置三少皆上大夫也曰少保少傅少師是與太子宴者也大戴九棘三槐周禮建外朝之法左九棘孤卿大夫位焉羣士在其後右九棘公侯伯子男位焉羣吏在其後面三槐三公位焉州長衆庶在其後三公一命衮若有加則賜也不過九命春秋九命作伯尊公曰宰言於海内無不宰統焉通典三事雨無正大夫刺幽之也三事大夫莫肯夙夜箋三公也書周官王曰嗚呼三事暨大夫敬爾有官漢書韋𤣥成詩於赫三事匪俊匪作又云三事惟囏莫我肯矜三吏晉侯使鞏朔獻齊捷於周王使委于三吏左成二三吏三公也曲禮云五官之長曰伯其擯于天子也曰天子之吏鄭𤣥曰謂三公也注疏左右相秦悼武王二年始置丞相官以樗里疾甘茂為左右丞相史記應劭曰丞承也相助也統文徳髙祖定天下置丞相以統文徳立大司馬以整武事為二府焉物理論一言取相車千秋代劉屈釐為丞相封富民侯千秋無他材能術學又無伐閲功勞特以一言寤意旬月取宰相封侯世未嘗有也後漢使者至匈奴單于問曰聞漢新拜丞相何用得之使者曰以上書言事故單于曰茍如是漢置丞相非用賢也妄一男子上書即得之矣漢書知人丞相丙吉病自上臨問曰君有不諱誰可代者吉曰西河太守杜延年廷尉于定國太僕陳萬年此三人皆在臣右惟上察之後三人居位皆稱職皆稱吉知人同上柱石田延年謂霍光曰將軍為國柱石何不建白大后更選賢而立之光𫝊前丞相王商者内行篤有威重位歴將相國家柱石臣也其人守正不肯詘節隨鳯委曲為鳯所罷身以憂死衆庶愍之元後𫝊陸凱疏曰宰相國之柱也不可不彊是故漢有蕭曹之佐先帝有顧步之相呉志壹統類王尊劾奏丞相匡衡御史大夫張譚位三公典五常九徳以總方畧壹統類廣教化美風俗為職知石顯等專權擅勢不時白奏無大臣輔政之義本𫝊則三光成帝時何武為九卿建言古者民樸事約國之輔佐必得賢聖然猶則天三光備三公官各有分職宜建三公官定卿大夫之任分職授政以考功效本𫝊蕭望之奏三公非其人則三光為之不明今首嵗日月少光咎在臣等本𫝊鼎足王莽秉政專權彭宣上書言三公鼎足承君一足不任則覆亂美實臣年齒老耗昏亂遺忘願乞骸骨竢寘溝壑本𫝊永平六年王雒山出寶鼎詔曰鼎象三公豈公卿奉職得其理邪後紀通明相丞相官缺羣臣多舉翟方進上亦器其能遂擢為丞相方進智能有餘兼通文法吏事以儒雅縁飭法律號為通明相本𫝊夫以韓安國翟方進之操為漢之明宰然猶不能振一貧賢薦一孤士又汎其下者乎後朱穆𫝊鼎足承君元始中賜馬宫策曰入稱四輔出備三公四輔之職為國維綱三公之任鼎足承君不有鮮明固守無以居位本𫝊儒宗居位自孝武興學公孫𢎞以儒相其後蔡義韋賢𤣥成匡衡張禹翟方進孔光平當馬宫及當子晏咸以儒宗居宰相位服儒人冠𫝊先王語其醖藉可也然皆持禄保位被阿䛕之譏彼以古人之迹見繩烏能勝其任乎匡衡等𫝊賛腹心哀帝策免師丹曰夫三公者朕之腹心也啟善相過匡率百僚和合天下者也朕既不明委政於公腹心如此謂疏者何殆謬於二人同心之利焉將何以率示羣下附親逺方本𫝊鼎輔舊制州牧奏二千石長吏不任位者事皆先下三公光武時用明察不復委任三府而權歸刺舉之吏朱浮上疏曰即位以來不用舊典信刺舉之官黜鼎輔之任後𫝊崔琰從弟林少無名望雖姻族猶多輕之而琰常曰此所謂大器晚成者也終必逺至涿郡孫禮盧毓始入軍府琰又名之曰孫疏亮亢烈剛簡能斷盧清警明理百鍊不消皆公才也後林禮毓咸至鼎輔魏志譴責策免仲長說昌言法誡篇云光武矯枉過直政不任下雖置三公事歸臺閣自此以來三公之職備員而已政有不理猶加譴責策免又中世之選三公也務於清謹慎循常習故者是婦女之檢束鄉曲之常人耳惡足以居斯位邪執既如彼選乂如此而欲望三公勲立於國家績加於生民不亦逺乎後本𫝊公台胡廣自在公台三十餘年歴事六帝禮任甚憂其所辟命皆天下名士與故吏陳蕃李咸並為三司蕃等每朝㑹輒稱疾避廣時人榮之上上應台階郎顗拜帝曰三公上應台階同元首政失其道則寒陰反節而今之在位競託髙虚選舉牧守委任三府本水象山岳陳忠疏薦劉愷曰臣聞三公上則台階下象山岳股肱元首鼎足居職恊和陰陽調訓五品考功量才以序庶僚遭烈風不迷遇迅雨不惑位莫重焉而今上司缺職未議其人往者孔光師丹近世鄧彪張酺皆去宰相復序上司誠宜簡練卓異以猒衆望愷𫝊三九郎顗七事曰刳舟剡楫將欲濟江海也聘賢選佐將以安天下也昔唐堯在上羣龍為用文武創徳周召作輔是以能建天地之功増日月之耀者也陛下踐祚以來勤心衆政而三九之位未見其人是以災害屢臻四國未寧本𫝊孫皓每於㑹因酒酣輙令侍臣嘲謔公卿以為笑樂萬或既為左丞相王蕃嘲或曰魚潛於淵出水照沬何則物有本性不可横處非分也或出自谿谷羊質虎皮虚受光赫之寵跨越三九之位犬馬猶能識養將何以報厚施乎或曰唐虞之朝無謬舉之才造父之門無駑蹇之質蕃上誣明選下訕楨幹亦何傷於日月適多見其不知量耳吳録運動樞極順帝之世梁商稱為賢輔夫宰相運動樞極感㑹天人中於道則易以興政乖於物務則難乎御物本傳象極李固奏記梁商理王龔曰夫三公尊重承天象極未有詣理訢寃之義上國禎三公國之禎幹朝廷取正以成斷金大司農李固公族之苗忠正不撓有史魚之風其以固為太尉漢官義輸禮太尉劉虞譲位於羊續靈帝時為三公者皆輸禮錢千萬續奉褞袍以示之曰臣之所有唯此而已遂不代虞袁山松後漢台相中興以後居台相緫權衡多矣其能以任職取名者豈非先逺業後小數哉故惠公伏湛造次急於鄉射之禮君房侯霸入朝先奏寛大之令㐲湛等論傳上司楊震為太尉每諫争中常侍樊豐等譛之收印綬遣歸本郡到城西夕陽都亭顧謂子及門生曰吾䝉恩居上司姦臣狡猾而不能誅嬖女傾亂而不能禁帑藏空虚賞賜不節而不能實何面目復見日月遂飲醜而死東觀漢記名公賢宰楊秉字叔節為太尉奏中常侍侯覽具瑗曰鄭詹來而國亂四佞放而衆服若斯之人非恩所宥書奏尚書召對秉掾屬問故事秉使對曰漢世故事三公之職無所不統尚書不能詰嘗從容言曰我有三不惑酒色財也本傳天下稱為名公張璠漢紀陳蕃楊秉世稱賢宰王暢李膺彌縫衮闕左雄傳論三葉楊賜卒䇿曰司空賜華岳所挺九徳純備三葉宰相輔國以忠五登衮職弭難乂寧本傳延光之間震為上相抗直方以臨權枉先公道而後身名可謂懐王臣之節識所任之體矣累葉載徳繼踵宰相信哉積善之家必有餘慶先世韋平方之蔑矣論漢興惟韋平父子至宰相前書韋賢子𤣥成樂當子晏柱國楊氏載徳仍世柱國震畏四知秉去三惑賜亦無諱彪誠匪忒楊震賛上衮牟融經明才髙明帝數嗟嘆以為才堪宰相明年為司空舉動方重甚得大臣節本傳牟公簡帝身終上衮上賛具曕晉司徒闕武帝問其人於荀最荅曰三公具瞻所歸不可用非其人昔魏文帝用賈詡為三公孫權笑之别傳詡文帝初即位首登上司魏畧任天地人太康七年正旦日蝕詔公卿大臣各上封事咎其安在汝南王亮與司徒魏舒司空衛瓘上言三司之任天地人也乾道不普故水旱為災人倫失序故奸宂不禁乃者荆州之城妖災仍興任城國都水流變赤延三朝之始日有蝕之孟陽節過堅氷未消臣等𤨏才聽優髙位可謂小人而乗君子之器宜就顯戮以答天意謹免官徒跣上所假章綬夫陰陽失序朕于天道刑政失中之所致也其使冠履勿復道八王故事上清三元摯虞隴王為太尉冊曰朕惟君行為時表親則宗臣論道經邦保乂皇家是用進登上台君其上清三元下寧九域永正其範以康濟宇宙敬哉上翼宣皇極武帝詔曰三司之任以翼宣皇極弼成土事者也故經國論道頼之明喆裴秀思心通逺勲徳茂著宜正位居體以康庶績其以秀為司空晉書上應天心武帝詔以鄭袤為司空曰宜登三階之曜補衮職之闕遣國坦就第拜授袤謂坦曰魏以徐景山為司空吾時為侍中受詔譬㫖徐公語吾曰三公當上應天心茍非其人實傷和氣不敢以垂死之年累辱朝廷也終於不就遵大雅君子之迹可不務乎上光飪鼎實懐帝以劉寔為太尉固辭不許劉坦上言曰古之哲王莫不師其元臣崇養老之教厲亷髙之風太尉寔國之碩老邦之宗模年踰九十命在日制聖詔必使正位上台光飪鼎實臣謂宜聽所守上傾棟梁時三導郗鑒庾亮相繼薨殂朝野憂懼以陸玩徳望乃拜司空玩辭譲不獲乃嘆息謂朋友曰以我為三公是天下無人矣時人以為知言别傳玩拜司空有人詣之索美酒得便自起㵼箸梁柱間地祝曰當今乏才以爾為柱石之用莫傾人棟梁笑曰戢卿良箴世説風流宰相王儉字仲寳丹陽尹袁粲聞其名及見之曰宰相之門也栝栢豫章雖小已有棟梁氣矣終當任人家國事儉作解散幘斜插簮朝野慕之相與放效儉常謂人曰江左風流宰相惟有謝安葢自汛也南史茹法亮吕文度並勢傾天下太尉王儉常謂人曰我雖有大位權寄豈及茹公上拍張華林宴集使各効伎藝王敬則脱朝服袒以絳紏髻奮臂拍張呌動左右上不悦曰豈聞三公如此荅曰臣以拍張故得三公不可忘拍張時以為名荅上台首豫章王嶷永明初啓上曰叨授台首心魂如失臣窮生如浮質操空素任居鼎右已移氣序南齊六貴明帝顧命羣公而意寄多在江祐兄弟永元初江兄弟及始安王遥光尚書令徐孝嗣領軍蕭坦之更日帖勑時呼為六貴皆宰相也上祐傳梁武使張𢎞䇿陳計於王懿曰昔晉惠庸主諸王争權遂内難九興外冦三作今六貴争權人握王憲制始安欲為趙倫形迹已見蹇人上天信無此理祐怯而無斷暄弱而不才折鼎覆餗翹足可待蕭坦之胸懐猜忌動言相傷徐孝嗣才非柱石聽人穿鼻若隙開舋起必中外主崩梁紀南史紀𢎞䇿陳計語在懿傳懿傳無之載𢎞䇿傳中英宰英宰信戎元渠時殄滅大啓南康爰登中鉉職雖職輕于衮司而任隆于百辟暫冲職改授朝端王儉禇淵碑晉穆宗昭曰實頼英衮淵謀晉中興書謝石疏曰尸素朝端忽焉五載上惠帝詔曰㧾百揆之得夫管王政之開塞端右之職也其以王戎為尚書令上黄㼐少師郭祚以尚書右僕射領太子少師祚曽從聿東宫明帝㓜祚持一黄㼐出之時應詔左右趙桃弓與御史中尉王顯迭相脣齒深為帝所信祚私事之時人謗祚者號為桃弓僕射黄㼐少師北史文武固種來恒及第濟相次知政事時以為榮初濟父䕶兒居陼為猛將而恒濟俱以學行見稱時虞世南子昶既無才術歴將作少匠工部侍郎累居工作之司濟初升相位許敬宗歎曰士之登庸不繫世業履道則為衣冠失緒則為匹庶來䕶兒兒作宰相虞世南男作木匠忠賢文武固無種也舊唐自武徳已來稱賢相者房杜姚宋四公皆遭無頼子弟汙圮先業張説二字均垍務束夫節賊庭非獨燕國之不幸也上摸稜蘇味道前後居相位數載竟不能有所發明但脂韋其間茍度取容而已嘗謂人曰處事不欲决斷明白若有錯誤必貽咎譴但摸稜以持兩端可矣時人由是號為蘇摸稜上伴食宰相盧懐慎與紫㣲令姚崇對掌樞密懐慎自以為吏道不及崇每事皆推譲之時人謂之伴食宰相金甌覆名𤣥宗善八分書凡命將相皆先以御札書其名置案上㑹太子入侍上舉金甌覆其名以告之曰此宰相名也汝庸知其誰耶肅宗拜而稱曰非崔琳盧從愿乎上曰然因舉甌以示之乃賜巵酒是時琳與從愿皆有宰相望𤣥宗將倚為相者數矣竟以宗族繁盛而記者衆卒不用栁氏舊聞燒尾景龍三年蘇瓌除尚書右僕射時公卿大臣初拜官者例計獻食名曰燒尾瓌因侍内宴將作大匠宗晉卿謂曰拜僕射竟不燒尾豈不善邪帝黙然瓌奏曰臣聞宰相者主陰陽助天理物今粒食踊貴百姓不足臣見宿衛兵至有三日不得食者臣愚不稱職所以不敢燒尾談賔録紅巾李林甫性沉密城府深阻苞藏安忍時已寢疾猶扶疾從幸華清宫數日増劇巫言一見聖人差減帝欲視之左右諌止乃勅林甫出於庭中上登降聖閣遥視舉紅巾招慰之林甫不能興使人代拜於席翌日尋卒舊唐𤣥宗幸蜀裴士淹從駕馬上商較當時卿相士淹曰姚元之如何上曰才而健者也宋璟如何答曰賢而泥者也論及數十人皆當其目末問李林甫如何上曰妬賢嫉能古今無比士淹曰若此陛下如之何委用如是之深也上俛首而無言獨異志滅賊手天寶賊陷兩京𤣥宗西幸肅宗即位明皇馬上看除目顧裴士淹曰有新相士淹問為誰上曰房琯然亦不是滅手士淹曰陛下不須言之上小慚支田録清徳坐鎮楊綰字公權元載㐲誅綰拜相綰乆積公輔之望及詔出朝野相賀綰素以徳行著聞質性貞亷車服儉朴居廟堂未數月人心自化御史中丞崔寛劔南四川節度使寜之弟家富於財有别墅在皇城之南池館臺榭當時第一寛即日潜遣毀拆中書令郭子儀在邠州行營聞綰拜相座内音樂減散五分之四京兆尹黎幹以承恩每出入騶馭百餘亦即日減損車騎唯留十騎而已其餘望風變奢從儉者不可勝數其鎮俗移風若此綰凡所知友皆一時名流或造之者清談終日未嘗及名利或有客欲以世務于者見綰言必𤣥逺不敢發辭内愧而退大厯中徳望日崇天下雅正之士争趨其門至有數千里來者以清徳坐鎮雅俗時比之楊震邴吉山濤謝安之儔也舊唐史臣曰楊綰入相數日遽致移風易俗周召伊傳簫張房杜歴代為相之顯者蔑聞斯道也嘗讀諸集賞善多溢美書罪多溢惡如楊綰拜相之麻贈官之制改諡之詔則當時秉筆者無媿色矣上姦邪盧把自新州員外司馬除澧州刺史給事中袁髙以把邪佞蠧政貶未塞責停詔執表遂授澧州别駕他日上謂李勉曰衆人皆言盧杞姦邪朕何不知卿知其狀乎李勉對曰天下皆知其姦邪獨陛下不知所以為姦邪也時人多其正直上帝嘗從容言盧把清介敢言然少學不能廣朕以古道人皆指其姦而朕不覺也李勉對曰陛下能覺把之惡安致建中禍邪李揆和蕃顔真卿使希烈其害舊徳多矣又楊炎罪不至死把擠陷之而相闗播懐光立功逼使其叛此欺天也帝曰卿言誠有之唐書能説家門張嘉貞子延賞延賞子𢎞靖三代掌書命在台座前代未有楊巨源贈詩曰伊陟無聞祖韋賢不到孫時稱其能與張家説家門因語録前定劉禹錫曰官不前定何名真宰乎永徽中盧齊卿卒亡及蘇説見其舅李某為𡨕司判官有吏押案曰宇文融合為宰相舅曰宇文融豈堪為宰相吏曰大曹符已下數日多少即由判官舅乃判一百日既而拜宰相果百日而罷嘉話紗籠李藩字叔翰嘗寓東洛妻庶子崔謙女年近三十未有名宦多寄托崔氏待之不甚盡禮李患足瘡欲挈家居揚州甚愁悶迺詣中橋問卜胡蘆生生曰公在兩紗籠中豈畏此迍厄更逺亦可李問紗籠事終不復言遂往揚州居參佐橋左近有髙員外素相善一旦來詣既去際晩又至云朝來看公歸困就寢夢見舊使庄客卒已十年某問汝安得在此曰為陰吏䝉差與李三郎當直知員外與三郎往還故此祗候某曰三郎安得如此曰是紗籠中人詰之不肯言特報此好消息李笑而謝之數年張建封鎮揚州奏為廵官㑹有新羅僧能相人言張不得為宰相因令使院看諸判官曰並無及李至僧降階迎謂張公曰巡官是紗籠中人僕射且不及張大嘉因問紗籠事曰宰相冥司必潛以紗籠䕶之恐為異物所擾餘官則不得也方悟胡蘆生及髙所説李公竟為相原化記逸史兩京記金榜太和中崔紹暴死為所事一字天王救免復生云入一樓門滿壁悉是金榜銀榜備列人問貴人姓名將相二色名列金榜將相已下書列銀榜更有長鐵榜列州縣府僚屬姓名所見三榜之人悉是在世人若謝世者則隨所注落藉𤣥怪録兩京記命相重事大和七年六月二十七日文宗欲拜徳裕平章事已進麻詔曰命相絶是重事適看厯日日辰非佳且宣麻二十八日放下宣布獻替記沙堤凡拜相禮絶班行府縣載沙填路自私第至於子城東街名曰沙堤有服假問疾百僚就第有司設幕次排班元日冬至立仗大官皆備珂􅏛列燭有五六百炬謂之火城宰相火將至則皆撲滅以避國史補李徳裕初作相罷京兆築沙堤兩街上朝衛兵本傳徳裕初作相兩街使請准例每早朝令兵衛送予判云在具瞻之地自有國容當無事之時何勞武備衛送宜停獻替記及父年李徳裕自潤州年五十四除揚州五十八再入相皆及吉甫之年縉紳榮之感定録事决於子令狐綯在相每朝廷大事一取决於子滈如元載之用伯和李吉甫之用徳裕南部新書語林歇後作相光化初昭宗還宫庶政未愜鄭綮毎形於詩告而嘲之中人或誦其語於上前昭宗見其激訐謂有藴蓄就常奏班簿側注云鄭綮可禮部侍郎平章事中書胥吏詣其家㕘謁綮笑而問之曰諸君大悞俾天下人並不識字宰相不及鄭五也胥吏曰出自聖㫖特恩來日制下抗其手曰萬一如此笑殺他人明日果制下親賓來賀搔首言曰歇後鄭五作宰相時事可知矣舊唐朱相非相光化中朱朴自毛詩博士拜相而朴恃其口辨謂可立致太平由藩王引導聞於昭宗遂有此命對敡之日而陳言數條每言臣必為陛下致之洎操大柄殊無所成自是恩澤日衰中外騰沸内宴日俳優穆刀綾作念經行者至前朗諷曰若見朱相即是非相翌日出宫北夢𤨏言三不開廢帝時馬徹孫為相臨事多不能決當時號為三不開謂其不開口以論議不開印以行事不開門以延士大夫也五代史徹孫入相親舊未嘗延接時號三不開相公入朝印不開見客口不開歸宅門不開紀異録取蛣蜣轉明宗入朝安重誨用事取謀干孔循舊相豆盧革韋説出官孔循不欲以河朔人入相極薦崔協而任圜争之云崔協者少識文字時人呼為無字碑有李琪者學際天人奕代軒冕論才校藝可敵時輩百人讒夫巧沮忌害其能必捨李琪而相崔協如棄蘇合之丸取蛣蜣之轉也重誨笑而止然以孔循故終相之帝據馮書記先帝判官與物無競可以相矣由是道與協並命而捨李琪識者惜之北夢瑣言閣下生麻梁相國鄭珏與李相國愚同為學士忽一日鄭之閣下有一麻生李曰承㫖入相矣指麻示之曰此天命也願得當制以盡荒虚時亢陽既久其麻益茂髙丈餘若雨露之偏滋焉及霜降成實取而視之真白麻也是夜制出果鄭登庸而李復寓直得不為乾坤之命朋友之分乎鄭年十九赴舉凡十九年登第又十九年入相時人謂之三九相公李嘗􅀈居忽遇暴雨一廷俱為白沙公甚惡之及薨葬于伊闕得吉地于白沙里時人謂之白沙相公皆前定也駱中紀異粥飯僧愍帝即位有意於治數召學士問以時事以李愚為迂未嘗有所問廢帝亦謂愚等無所事常目宰相曰此粥飯僧爾以謂飽食終日而無所用心也五代史琉璃瓶廢帝欲擇宰相問於左右左右皆言盧文紀及姚顗有人望廢帝因悉書清望官姓名内琉璃瓶中夜焚香咒天以筯挾之首得文紀欣然相之五代史曲子相公晉相和凝少年時好為曲子詞布於汴洛洎入相専託人收拾焚毁不暇然相國厚重有徳終為艷詞玷之契丹入夷門號為曲子相公死而後語馬徹孫用廣順中卒于洛陽其家婢有為徹孫語者初崔協為明宗相在位無所發明既死而有降語其家徹孫又然時人嘲之曰生而不能言死而後語云五代史乗馬入宣徳門王安石上元夕從駕乘馬入宣徳門衛士訶止之策其馬安石怒上章請逮治御史蔡確言宿衛之士拱扈至尊而已宰相下馬非其處所應訶止帝卒為杖衛士斥内侍安石猶不平宋史無名詩王荆公罷相鎮金陵是秋江左大蝗有無名子題詩賞心亭曰青苗免役兩妨農天下嗟嗷怨相公惟有蝗虫感恩徳又隨鈞斾過江東荆公一日餞客至亭上覽之不悦命左右物色竟莫知其為何人也舒荆王介甫先封舒公改封荆公詩曰戎狄是膺荆舒是懲識者云宰相不學之過也仇池筆記三㫖宰相王珪神宗時自執政至相凡十六年無所建明率多䛕順當時目為三㫖相公以其上殿進呈云取聖㫖上可否訖云領聖㫖退諭禀事者云已得聖㫖續編聖相秦檜兩據相位凡十九年刼制君父包藏禍心倡和誤國忘讐斁倫一時忠臣良將誅鋤畧盡競進之徒獻媚納交無所不至台州曾惇獻詩稱聖相静江有驛名秦城知府吕愿中率賓僚共賦秦城王氣詩張扶請乗金根車又有乞置益國官屬及議九錫者檜聞之安然察事之卒布漸京城小涉譏議即捕治中以深文又陰結内侍及醫師王繼先伺上動静郡國事惟中省無一至上前者每事與帝争勝曹筠言水漲詔逐之檜陞為從官周葵欲言梁汝嘉檜不待帝言即改除之檜病帝幸其第問焉帝還宫命沈虚中革檜及熺制並令致仕檜既死帝謂楊存中曰朕今日始免防檜逆謀矣史鑑唐宰相唐侍中中書令是真宰相餘以他官參掌者無定員但加同中書門下三品及平章事知改事參知機務參與政事及平章軍國政事之名者並為宰相亦漢行丞相事之例也舊制宰相常於門下省議謂之政事堂至永淳三年十月中書令裴炎以中書執政事筆其政事堂合在中書遂移在中書省開元十一年張説奏改政事堂為中書門下通典僕射古者重武官以善射者堂事故曰僕射僕射者僕役於射事也秦世有左右曹諸吏官無職事將軍大夫以下皆得加此官宋百官志嗣後職務漸重唐左右二僕射因前代本副尚書令自尚書令廢闕二僕射則為宰相故太宗謂房𤣥齡杜如晦曰公為僕射當洞開耳目訪求賢才是為宰相𢎞益之道通典堂老宰相相呼為堂老國史補無迹江總自敘曰厯涉清顯不涉權幸嘗太息曰莊青翟位至丞相無迹可紀趙元叔為上計吏光乎列𫝊陳書翰林院待詔所學士之職本以文學言語備顧問出入侍從因得㕘謀議納諫諍其禮尤寵而翰林院者待詔之所也臣官志登瀛洲翰林院前代即無舊名貞觀中祕書監虞世南等一十八人或秦府故寮或當時才彦皆以𢎞文館學士㑹于禁中内㕘謀猷延引講習出侍輿輦入陪宴私十數年間多至公輔當時號為十八學士天下慕向謂之登瀛洲翰林故事北門學士乾封中劉懿之劉禕之兄弟周思茂元萬頃范履氷皆以文詔召入待詔常於北門侯進止舊志禕之上元中禕之遷𢎞文館直學士與著作即元萬頃左史范履氷苗楚客右史周思茂韓楚賓等皆召入禁中共撰列女𫝊臣軌百寮新誡樂書凡千餘卷時又密令㕘決以分宰相之權時人謂之北門學士禕之兄懿之時為給事中兄弟並居兩省論者美之𫝊視草𤣥宗即位以萬機委積詔誥悉由中書或慮當劇而不用務速而時滯始選朝官有詞藝學識者故事張説陸堅張九齡徐安貞張洎等召入禁中謂之翰林待詔王者尊極一日萬機四方進奏中外表疏批答或詔從中出宸翰所揮亦資其檢討謂之視草故嘗簡當代四人以備顧同舊志翰林學士太元二十六年始以翰林供奉改稱學士由是遂别建學士院俾専内命於是太常少卿張垍起㞐舎人劉光謙等守居之而集賢所掌於此悉罷自後李白等在舊翰林院但假其名並無所職翰林故事賜女壻張垍説子也以主壻𤣥宗特深恩寵許於禁中置内宅侍為文章嘗賜珍玩不可勝數時兄均亦供奉翰林院常以所賜示均均戲謂垍曰此婦翁與女壻非天子賜學士也舊志御手調羮李白天寶中皇祖下詔徵就金馬降輦步迎如見綺皓以七寶牀賜食御手調羮以飯之謂曰卿是布衣名為朕知非素畜道義何以及此置于金鑾殿出入翰林中問以國政潛草詔誥人無知者醜正同列害能成謗格言不入帝用疎之本集李陽氷序承㫖至徳已後天下用兵軍國多務深謀密詔皆從中出尤擇名曰翰林學士徳充選者文士為榮亦如中書舎人例置學士六人内擇年深徳重者一人為承㫖所以獨承密命故也上召對移院徳宗雅尚文學注意是選乗輿每幸學士院顧問錫賚無所不至御饌珍肴輟而賜之又嘗召對於玉堂移院於金鑾殿對御起草詩賦唱和或旬日不出呉通微昆季同時櫂用與陸贄争恩不叶甚於水火天下醜之翰林志内相陸贄初入翰林特承徳宗異顧歌詩戲狎朝夕陪遊及出居難阻之中雖有宰臣而謀猷㕘決多出於贄故當時目為内相舊唐兄弟禁林呉通𤣥父道瓘徳宗在東宫師也通𤣥兄弟恒侍太子游貞元初召充翰林學士與兄通微同職禁林人士榮之昭徳王后崩詔李紓為謚冊文宰相張延賞栁渾為樂章及進皆不稱㫖並召通𤣥重撰凡中㫖撰述非通𤣥之筆無不慊然重之如此舊文苑𫝊天子私人呉通𤣥充翰林學士知制誥與陸贄吉中孚韋執誼等同視草贄富于詞藻特承徳宗重顧經厯艱難通𤣥兄弟又以東宫侍上由是争寵頗相嫌恨贄性褊急屢於土前短通𤣥通𤣥𫝊既與二呉不協漸加浸潤恩禮衰薄陸𫝊贄又上疏曰國朝典故詔令合由中書如或墨制施行所司不須承受葢以示王者無私之義為國家不易之規貞觀中有學士十八人太宗但與講論墳籍時務悉不相于𤣥宗末方置翰林張垍國親承寵然止唱和批答樞密畧不與知肅宗奔播之時翰林始掌書詔因循迄今漸逾職分物議不平皆云天子私人侵敗綱紀致使聖代虧至公之休宰相有備位之名制書職分宜歸中書學士之名宜革前弊徳宗以贄指斥微𤣥故不可其奏翰林志袍覆韋綬徳宗時以左補闕為翰林學士密政多所參逮帝常幸其院韋妃從㑹綬方寢學士鄭絪欲馳告之帝不許時大寒以妃蜀襭袍覆而去其待遇若此唐書八塼學士李程為翰林學士以堦前塼日影為入候程性懶每入必踰八塼故號為八塼學士𫝊載貯相唐之貴文至矣後王纂承多以國柄付文士元和初憲宗遵聖祖故事視有宰相器者貯之内庭繇是釋筆硯而操化權者十嘗八九劉汝錫李絳集記内庭老順宗不懌儲位未立王叔文起於非類竊學士之名内連牛美人李忠言外結姦黨取兵柄㺯神器天下震駭是時鄭絪為内庭之老首定大計憲宗即位授絪中書侍郎平章事翰林志徳宗昇遐時東宫疾急方甚蒼卒召學士鄭絪等至金鑾殿中人或云内中商量所立未定衆人未對衛次公遽言曰皇太子雖有疾地居冡嫡内外繫心必不得已當立廣陵王若有異圖禍難未己絪等隨而唱之衆議方定舊唐草制不言李吉甫除中書侍郎平章事適與裴垍同直裴垍草吉甫制吉甫草武元衡制垂簾揮翰兩不相知至暮吉甫有歎惋之聲垍終不言書麻尾之後乃相慶賀禮絶之敬生於座中及明院中使學士送至銀臺門而相府官吏候於門外禁署之盛未之有也翰林志院長沈𫝊師入翰林為學士翰林缺承㫖次當傳師穆宗欲面命辭曰學士院長參天子密議次於宰相臣自知必不能願治人一方為陛下長養之因稱疾出唐書三俊李紳字公埀能為歌詩郷賦之年諷誦多在人口元和初登進士第穆宗召為翰林學士與李徳裕元禎同在禁署時稱三俊情意相善舊唐三人以學識才名相類情頗欵密徳裕𫝊大手筆李徳裕穆宗即位召入翰林充學士帝在東宫素聞吉甫之名既見徳裕尤重之禁中書詔大手筆多詔徳裕草之是月召對思政殿賜金紫之服舊唐鈴有聲李徳裕鎮蜀時謂幕賓韋絢云翰林院有懸鈴以備夜直警急文書出入皆引之以代𫝊呼也長慶中予為學士時河北用兵一夜鈴有聲如人引其索者使視之則無人後往往如此使人待棒潛伺於下終無所覩而數數鳴動不已院中諸公私共准其鳴時皆應用兵處耗聲則急緩亦如之曽莫之差衆咸異之元相詩云神撼引鈴索申文炳續翰林故事蓬池鱠李徳裕述夢詩曰荷浄蓬池鱠氷寒郢水醪注每學士初上賜食悉是蓬萊池魚鱠夏至復賜及頒燒香酒以酒味稍濃每和水而飲蓋禁中郢水酒切也一品集此文饒詩也事文類聚乃云李白詩白詩注豈未見於本集耶抑止抄謄故紙耶合璧因之殊誤觀者門客我后憐詞客吾僚並巂髦注先朝曾宣諭卿等是我門客上事文作唐武后朝云云李衛公詩話誤請益崔郾字廣畧姿儀偉秀人望而慕之敬宗即位拜翰林侍講學士旋進中書舍人謝曰陛下使臣侍講厯半嵗不一問經義臣無功不足副厚恩帝慙曰朕少間當請益唐書三侍文宗召兵部尚書王起禮部尚書許康佐為侍講學士中書舎人栁公權為書學士每有疑義即召學士入便殿顧問討論率以為常謂之三侍學士恩寵異等東頭學士熊望登進士第粗有文學而務進不已時京兆尹劉栖楚以不次驟居清貫廣樹朋黨門庭無畫夜填委不息望出入栖楚之門有同密戚陰計密畫人無知者敬宗嬉遊之隙學為歌詩以翰林學士崇重不可䙝狎乃議别置東頭學士以備曲宴賦詩令採卑官才堪任學士者為之栖楚以望名薦送事未行而昭愍崩文宗即位韋處厚輔政大去姦黨既逐栖楚流望漳州司户舊唐華炬送院令狐綯為翰林承㫖夜對禁中燭盡帝以乗輿金蓮華炬送還院吏望見以為天子來及綯至皆驚唐書禁中頗牧畢諴太和中進士擢第為翰林學士自大中末党項羌叛屢擾河西懿宗召學士對邊事諴即援引古今論列破羌之狀上悦曰吾方擇能帥安集河西不期頗牧在吾禁署卿為朕行乎諴忻然從命即用諴為河西節度等使舊唐不草制崔貽範於鳯翔圍城中據李茂真起復作相偓當草制抗疏論其不可夜半以授翰林院學士使中人馬從皓語渥曰學士無以性命為戲渥不答扄户而寢明日無麻制宣讀茂真曰陛下命相學士不肯草制與反何異昭宗曰卿薦貽範朕不拒渥不草制朕亦不拒其如道理分明何金鑾密記姚垍曰使我當直亦繼以死唐書龍鳯燭韓寅亮渥之子也嘗言渥捐館之日温陵帥聞其家藏箱笥頗多而緘鐍其密人罕見者意其必有珍玩使親信發觀惟得燒殘龍鳯燭金縷紅巾百餘條蠟淚尚新巾香猶鬰有老僕泫然而言曰公為學士日常視草金鑾内殿深夜方還韓苑堂時皆宫妓秉燭炬以送公悉藏之自西京之亂得罪南遷十不存一二矣延平家有老尼説斯事與寅亮之言同尼即渥之妾云南唐近事偓見惡於朱全忠貶榮懿厨天祐二年復召為學士還故官偓不敢入朝挈其族南依王審知而卒唐𫝊試五題昭宗召韓偓入院試文五篇萬邦咸寜賦拜昌言詩武臣授東川節度制答佛誓國王進貢書批三功臣讓圖形表繳狀云臣才不邁羣器非㧞俗待價既殊於櫝玉窮經有愧於籝金遭遇清時涵濡睿澤峩冠振佩已塵象闕之班䑛筆和鉛更金門之詔擊鉢謝謝捷簒組非工撫已循涯以榮為懼金鑾密記長興元年翰林學士劉昫奏本院舊例學士入院除中書舎人不識餘皆試麻制答蕃書批答各一道詩賦各一首號曰試五題續通典斯文不墜陸扆字祥文文思敏速初無思慮揮翰如飛文理俱愜同舎服其能天子顧待特異嘗金鑾作賦命學士和扆先成帝覽而嗟挹之曰朕聞貞元時有陸贄呉通𤣥兄弟能作内廷文書後來絶不相繼今吾得卿斯文不墜矣舊唐光院錢陸扆援學士承㫖同平章事故事三署除拜有光署錢以宴舊僚内署即無斯例扆拜輔將之月送學士光院錢五百貫特舉新例内署榮之光院例陸扆撰光院例榜干院臺云費調金鼎能視草之煩勞擁出碧幢釋援毫之羇束固人臣之極摰亦翰院之榮華至於察風俗於一方賞貨泉于三使其為盛也抑又次焉各請出錢用光玉署翰林舊規下水船裴廷裕乾寜中在内廷文書敏捷號為下水船梁朱温受禪為洎為學士嘗從容問及廷裕行止洎對曰須嵗左遷今聞旅寄衡水上曰頗知其人搆思甚捷對曰向在翰林號為下水船上應聲謂洎曰卿便是上水船也洎微笑深有慙色議者以洎為急灘頭上水船也唐言座主辱門生封受卿梁時知貢舉辱門生鄭致雍梁書玉堂署太宗以玉堂之設其來尚矣但虚得其號而無正名乃於紅綃上御書飛白四字題曰玉堂之罪以賜蘇易簡易簡公捧歸私宅以慶耀其親擇日懸掛仍具扄鐍于玉堂之上自待詔院吏而下減列賀于庭公曰自唐置學士來㡬三百年今日方知貴矣即日詔宰輔暨兩制司臣就院勑設宴帳仍各賦長韻詩以紀其事其詩目曰禁林讌㑹集分紀仙職太宗至上林春融千花萬卉妍麗冠絶上必曲宴宰衡勲舊召兩制詞臣俯龍池垂金鈎舉暢賦詩終日而罷上嘗謂近臣曰詞臣實神仙之職也翊日凡所進詩悉廻御毫屬和以賜焉分紀然牕玉堂東承㫖閣子窓格上有火然太宗嘗夜幸玉堂蘇易簡為學士已寢遽起無燭具衣冠宫嬪自牕格引燭入照之至今不欲更易以為玉堂一盛事筆談鼇禁宋白賈黄中皆先達鉅儒同在鼇禁筆談李衛公詩畫壁看飛鶴僊圖見巨鼇注内署垣壁北畫松鶴先是西壁畫海中曲龍山憲宗曾欲臨幸中復懼而塗焉色呌舊制凡入兩府許薦館職試出身任監司者各一員樞相王公徳用自圃田復召入長府即有千薦館職王曰以君才進士登科所薦應格矣然某武人素不閲書若奉薦則色呌矣世以為知言葢今人以事理不相當為色呌麈史名目冀州城南有張耳家在送客亭北契丹使者林牙以翰林學士使宋問知州王仲平不知張耳何代人其大使耶律防謝曰契丹家翰林學士名目而已職難翰林樞機宥密之地翰林志夫發揮大猷藻飾上命隻簡片削可以動乎人神風行四方萬里如覩故議定於内而事脩於外言發於上而㫖敷於人微乎斯文百度闋矣況此院之置尤為近切左接寢殿右瞻彤樓晨趍瑣闥夕宿嚴衛密之至也驂鑣得御廐之駿出入有内司之導豐餚潔膳取給大官衾裯服御資於中庫恩之厚也備待顧問辯駮是非典持縑牘受遣羣務凡一世得失動為臧否職之重也非夫格謹而有立秉貞而通理俾義樞要簡乎宸心言不及温樹之名慎不遺轅駒之數處其職者不亦難乎翰林故事六如建中以來簡㧞尤重故必密如孔光博如延州文如卿雲學如向歆器如黄顔直如史魚然後得中第士之游心處已景行於六如者而又飾之以潔球瑋之行貫金石之誠雖潛聲匿迹莫能脫乎漢時始建置尚書郎五人平天下奏議分直建禮含香握蘭居錦帳食大官則今之翰林名異而實同也時論以為登玉清翔紫霄豈蓬山瀛州而足喻乎韋處厚翰林㕔壁記亦曰玉署玉堂馬翰林志位學士上唐舊制學士無得以承㫖為名者應對顧問㕘㑹第班以官為上下憲宗永貞元年始命鄭絪為承㫖位在諸學士上居東第一閣承㫖院記凡内宴坐次於宰相坐居一品班之上翰林志後唐明宗勑今後學士入院並以先後為定惟承㫖出自朕意不計官資先後在學士上其年十一月勑新除翰林學士張昭逺早踐綸闈久司史筆曾居憲府累陟貳卿今既擢在禁林所宜别宣班序其立位宜次崔稅五代職官志三昧學士每下直出門相見謂之小三昩出銀臺乗馬謂之大三昧如釋氏之去纒縳而自在也翰林志歎老卒梅詢為翰林學士一日書詔頗多構思甚苦推觚循堦而行忽見老卒卧於日中欠伸甚適梅忽歎曰暢哉徐問之曰識字乎曰不識梅曰更快活也大學士上欲以張燕公大夫學士辭曰學士本無大稱中宗欲以崇寵大臣修文館乃有大學士之名如臣未學動陛下規模豈敢首以大為稱辭再三從之集賢記注後宴集賢院故事官重者先飲說曰吾聞儒以道相髙不以官閥為先後太宗時脩史十九人長孫無忌以元舅每宴不肯先舉爵長安中與脩珠英當時學士亦不品秩為限於是引觴同飲時伏其有體唐書錢充食本時又賜錢一千貫文以充食本時院内供擬稍厚中書舎人陸堅亦充翰林供奉每日入院堅以學士咸非其人而所司祗候供儗優厚將為糜費嘗曰此何益國家空致如此費損將建議請一切罷之燕公明之曰吾聞自古帝王功成理定則有奢縱之戒或造地臺或耽聲色豈如今日聖上崇儒重道親自講諷刋校圖書詳延學者今日麗正即是聖主禮樂之司求代棤模不易之道也所費者細所益者大陸子之言未為達也上聞其言堅之恩眷漸減初也集賢記注獻詩賜贊張燕公等因獻賦詩上各賜贊以褒美之勑曰得所進詩甚有佳妙風雅之道斯焉可觀並據才能畧為賛述具如别紙宜各領之上自於五色牋八分書之賫付院散付學士張說徳重和鼎功踰濟川詞林魁首翰苑光鮮徐堅校文天禄論經上庠華詞宛麗詩賦抑楊賀知章禮樂之司文章之苑學優藝博才髙思逺趙冬曦白簡端嚴青史良直清詞雅韻博賢強識康子元才識清逺言談幽祕四科文學六書仁義侯行果洪鍾佇叩明鏡不疲理窮繫象動中威儀韋述職參山甫業簒𤣥成六藝述作四始飛英敬㑹真名乃㑹真迹惟契道樞衣講習臨筵振藻趙𤣥黙才比丘明學兼儒墨叙述微婉講論道徳東方顥地遊天禄門嗣滑稽三冬足用六藝斯齊李子釗干木流慶指樹貽芳諷諫遺闕啟發篇章吕向族茂非熊才方班馬考李篇籍抑揚風雅母照軒轅之任諫諍之職聞詩聞禮有才有識陸去泰才光於晉價重於張州縣斯屈文翰尤長咸廙業郁郁髙文英英博識持我刑憲是稱諒直余欽文章兩贍才術兼美思在専經學通舊史孫季良蓬山之秀芸閣之英雄詞卓傑雅思縱横尋勑善冩真人貎學士等欲畫像書賛於含象亭屬車駕東行竟不果注記擲雙陸頭子十三年三月因奏封禪儀注勑學士等賜宴於集仙殿上制詩序羣臣賦詩上於坐上口詔改為集賢殿時預宴者宰臣源侍中乾曜燕公學士徐堅賀知章康子元趙冬曦侯行果敬㑹真趙𤣥黙韋述李子釗陸去泰吕向咸廙業毋照余欽孫季良馮朝隠等時新進櫻桃上令遍於席上散布各領諸官拾取之飲以醇醪清酤之酒酒酣簾内出彩牋令燕公賦官韻羣臣賦詩並出彩羅令擲雙陸頭子得重彩者分之宴金盞銀盤雜綵有差上文儒之美張燕公嘗謂人曰學士者文儒之美稱皆須詔勑特授豈合因循自名時賀知章從太常少卿遷禮部侍郎兼授學士一日併謝訖謁宰臣源侍中曰賀公久著盛名今日一時加二榮命並為學士之光輝雖然學士與侍郎二者孰為美燕公曰侍郎自皇朝已來為衣冠之華選自非履歴清要望實具美者無以居之雖然終是具員之吏又非往賢所慕學士者懷先王之道為搢紳軌儀藴楊班之詞彩兼逰夏之文學始可處之無愧二美之中此為愈也上十八學士張說前後三入相三十餘年掌文學之任為唐文宗上嘗為文引於禁中令說視草說亦善用已長引文儒侍從之臣以左右王化天子始以經術之道開集賢院殿置十八學士以修太宗之政當時綴文之士始尚古風上之好文自說始也分紀固辭加大李泌為相加集賢殿崇文館大學士修國史泌建言學士加大始中宗時及張説為之固辭乃以學士知院事至崔圓復為大學士亦引泌為讓而止唐書月蝕東壁貞元四年八月月蝕東壁泌曰東壁圖書府大臣當有憂者吾以宰相兼學士當之矣昔燕國公張說由是以亡又可免乎明年果卒上學士兩人後唐天成元年命馮道趙鳯充端明殿學士非舊號也馮道笏記云天下儒生僅餘萬數殿前學士只有兩人時輩榮之集賢是家南唐徐鍇為虞部員外郎専掌集賢院由此鋭意羣籍不復問家事常言即賢院即是吾家指所居曰此寄宿之所爾九國志鍇字楚金與兄鉉同有大名於江左鍇兄弟俱㕘近侍而其文相軋議者方晉之二陸云南唐書夢堂抽筆偽蜀辛夤遜夢掌中抽筆占者曰君必遷翰林學士未㡬果然五鳯齊飛太宗時宋白賈黄中李至吕䝉正蘇易簡五人皆同時拜翰林學士承㫖扈䝉贈之以詩云五鳯齊飛入翰林其後吕䝉正至宰相賈黄中李至蘇易簡皆至㕘知政事宋白官至尚書老於承㫖皆為名臣歸田録賜詩真宗作歌一首賜新授翰林學士兼龍圖閣學士陳彭年因謂向敏中等曰頃命學士罕曾賜歌詩因曰彭年詞學優長擢居清近久益慎密多聞好學鮮有偕者平居冩萬餘言復精詳典禮深明法令人或請益應答如流皆有依據常令檢討典故質正文義每一事具載經史子籍所出備而後已自非強記何由至此敏中曰彭年全才也豈止於文雅雍容侍從而已至如參酌時務詳求物理皆出人意表上然之因曰詳定所事無大小皆俟彭年裁制而後定此一句不可廢也往者參酌典禮雖偏厯攸司而所見皆出胥史今以為式長編寡合見譛楊億以文章擅天下然性勁剛寡合有惡之者因事譛之大年在學士院忽夜召見於一小閣深在禁中既見賜茶從容顧問久之出文藁數篋以示大年云卿識朕書蹟乎皆朕自起草未嘗命臣下大年惶恐不知所對頓首再拜而出乃知必為人所譛矣由是佯狂奔于陽翟真宗好文初待大年恩禮漸襄亦由此也歸田録不稱求解楊億為學士時草答契丹書云隣壤交歡草既進真宗自注其側曰杇壤糞壤億遂改為隣境明旦引唐故事學士作文書有所為不稱職當罷因亟求解職真宗語宰相曰楊易不通商量真有性氣上地勢清切舊翰林學士地勢清切皆不兼他務文館職任自校理以上皆有職錢唯内外制不給楊太年乆為學士家貧請外表辭千餘言其間兩聨曰虚忝甘泉之從臣終作莫敖之餧鬼從者之病莫興方朔之饑欲死筆談自後乃得判他局東軒筆録夢宣召對蔡子直誠英宗于藩邸為最舊旣即位久之以樞密直學士知秦州英宗上仙不及見一日夢宣召賜對又賜茶既而辭出固留之曰只住此更毋得去窹而既憶乃靈駕發引曰因大慟哭遂得即日中而卒其幽冥之感有如此焉東齋記事夢同禁林元厚之少時曽夢人告之異日當為翰林學士須兄弟数人同在禁林厚之自思素無兄弟疑此夢為不然熈寧中厚之除學士同時相先後入院為學士者一拜持國維一除和叔繹一鄧文約綰一楊元素繪並厚之名綘五人名背從系始悟兄弟之説擬謝表蘇子瞻年十餘嵗在鄉里見老蘇誦歐公謝宣召赴學士院仍謝對衣并馬表老蘇令坡擬之其間有云匪伊垂之帶有餘非敢後也馬不進老蘇喜曰此子他日當自用之至元祐中再召入院作承㫖仍益之云枯羸之質匪伊垂之帶有餘歛退之心非敢後也馬不進侯鯖録金蓮燭送蘇子瞻為學士日鎖院召至内東門小殿時子瞻半醉命以新水漱漱口解酒已而入對授以除目吕公著司空並平章軍國事吕大防范純仁右左僕射㫖畢宣仁忽謂官家在此子瞻曰適已起居矣宣仁曰有一事要問内翰前年任何官職子瞻曰汝州團練副使曰今為何官曰備員翰林充學士曰何以至此子瞻曰遭遇陛下曰不千老身事子瞻曰必出自官家曰亦不闗官家子瞻曰豈大臣薦論邪曰亦不闗大臣事子瞻驚曰臣雖無狀必不别有干請曰久待要學士知此是神宗皇帝之意當其飲食而倚筯看文字謂内人曰蘇軾文字也神宗忽時稱之曰但未及用學士而上仙耳子瞻哭至笑聲宣仁與上左右皆泣已而賜坐喫茶曰直須盡心事官家以報先帝知遇子瞻拜而出撤金蓮燭送歸院随手雜録宣仁髙氏英宗后也慈聖曹后一日見神宗不恱問其所以神宗答曰廷臣有競訕朝廷者欲議施行慈聖曰莫非軾轍也老身嘗見仁祖時策士大恱得二文士問是誰曰軾轍也朕留與子孫用神考色漸和東坡始有黄州之謪貴耳集慈聖仁宗后也秃鬢翁張廷建中靖國間例復官職有請十首一曰陽城論事葢當世陸贄草詔傾諸公翰林若要真學士喚取澹州秃鬢翁東坡也侯鯖録神仙中人周麟之為學士姿儀洒落進止凝重班冠玉筍望之者意神仙中人言行録麟之受召撰張循王碑文成奏御天筆批其後十八字曰鋕銘敘事詳盡造語簡要披閲數四但有難嘉士林𫝊翫以為寵特賜韓門下維以賜出身熙寜末特除翰林學士崇寜中林彦振攄賜出身用韓例亦除翰林學士國朝以來不由科第除者此二人翰苑羣書按韓省試中以兄億執政不就廷試後為館者以至兩制未嘗賜第也同上戒子李昉素病心悸每數嵗一發常語諸子曰我典誥命三十年勞役憂思而致是疾爾曹當戒之侍讀耆儒唐𤣥宗開元三年制曰朕應政之暇常覽史書但闗理道實所留心中有闕疑時須咨問宜選耆儒博碩一人每日入内侍讀公卿薦光禄卿馬懐素因拜左散騎常侍與右散騎常侍禇無量更入侍讀舊唐師資馬懷素為秘監兼昭文館學士性篤學手不釋卷謙恭謹慎深為𤣥宗所禮令與左散騎常侍禇無量同為侍讀每次閤門則令乗肩轝以進上居别館以路逺則命宫中乗馬或親自送迎以申師資之禮上顧待甚厚禇無量景雲中初𤣥宗在春宫拜業兼皇太子侍讀嘗撰翼善記以進之皇太子降書嘉勞賫絹丁憂解職服闋復為侍讀以其年老每隨仗出入特許緩行又為造腰輿令内給使輿於内殿初無量與馬懷素俱為侍讀顧待甚厚及無量等卒後祕書少監康子原國子愽士侯行果等又入侍講雖屢加賞賜而禮遇不逮禇馬有古人風白履志博涉文史嘗隠居于古大梁城時人號為梁丘子景雲中徵拜校書郎尋棄官而歸開元中王志愔表薦履忠隠居讀書貞苦守操有古人之風堪代禇無量馬懷素入閣侍讀徵赴京師及至履忠辭以老病不任職事上詔拜朝散大夫乞還手詔許游京師徐返里閭履忠留數月乃去稽古之力王逥質開元十年拜集賢院學士仍侍讀迴質山東宿儒褐衣召拜既入侍讀仍令侍皇太子讀書及夀王通孝經賜束帛酒饌及床褥衣被等令逥質坐床上羅列所賜物金吾奉歸其家里巷觀者如堵家人入門歡􅀈皆歎曰稽古之力信不虚也職官分紀獻龍樓箴順宗為太子歸崇敬與登父子侍讀及即位復為皇太子諸王侍讀獻龍樓箴以諷戲言取悦韋綬字子章元和中充太子諸王侍讀時穆宗在東宫方幼好戲綬講書之隟頗以朝誚恱之嘗密齎家所造食入宫餉太子憲宗嘗召對綬奏曰太子學書至依字輒去旁人臣問之太子云君父以此字可天下奏事臣子不合全書上益嘉太子之賢賜綵錦綬無威儀時以人問鄙說戲言以取悦太子太子因入侍道綬語憲宗不悦謂侍臣曰凡侍讀者當以經義輔導太子納之䡄物而綬語及此予何望耶乃罷侍讀出為䖍州刺史穆宗即位以師友之恩召為尚書右丞兼集賢院學士甚承恩顧出入禁中舊唐劉納言乾封中歴都水監主簿以漢書授沛王賢及賢為太子皇累遷太子洗馬兼充侍讀常撰詼諧集十五卷以進太子及賢廢髙宗見而怒之曰劉納言自府入内久淹嵗月朝遊夕處竟無匡贊闕忠孝之良規進詼諧之鄙説儲宫敗徳抑有所由配流振州而死上固嗣相位薛放登進士第性端厚寡言憲宗以儲皇詩書求端士輔導經義選充皇太子侍讀及穆宗嗣位未聴政間放多在左右密㕘機命穆宗常謂放曰小子初承大寶懼不克荷先生宜為相以匡不逮放叩頭曰臣實庸淺獲侍冕旒固不足猥塵大位輔弼之任自有賢能其言無矯飾皆此類也穆宗深嘉其誠因召對思政殿賜以金紫之服舊唐辭侍讀韋温字𢎞育綬子也為翰林學士先是綬在禁廷積憂畏病廢故誡温不得任近職至是固辭帝怒曰寜綬治命邪換知制誥初兼莊恪太子侍讀晨詣宫日中見太子諫曰殿下盛年宜雞鳴蚤作問安天子如文王故事太子不恱辭侍讀見聴太子得罪詔諭羣臣温曰陛下訓之不早非獨太子罪時頗直其言唐書綬貫之兄也與前條韋綬同名耳十訓丁公著充皇太子諸王侍讀因著太子及諸王公十訓十卷穆宗立遷工部侍郎寵青宫之舊也舊唐當世仲尼王起字舉之文宗好文尚古學時鄭覃長於經義起長於博洽俱引入翰林講論經史起僻於嗜學雖官位崇重耽玩無斁書無不覽經目靡遺以太子登儲欲令儒者授經乃以兵部尚書兼太子侍讀為太子廣五運圖及文場秀句獻之帝數訪逮時政題詩太子勿以賜詔畫象便殿號當世仲尼敷引時事邢昺字叔明真宗始置翰林侍讀學士首以命昺即於便坐令講左氏春秋嘗講孝經禮記論語書易詩據𫝊疏敷引之多及時事真宗甚嘉奨之東都事畧敷暢經㫖仁宗常詔翰林侍讀學士張錫講書禁中錫敷暢經㫖議論該洽上嗟賞久之錫時年六十七鬢髮皓然上曰卿老矣記問不衰乃以飛白書博學字賜之因訪以治道錫曰節慾者治身之本也慎刑賞者治平之本也時貴妃被幸故以此諷之上改容曰卿言甚嘉朕恨用卿晩矣國史旋閲經史夏竦之子安期除侍讀學士經術不甚深而登進經筵日夕旋閱經史以備顧問自厭之乃懇求外補帥延州侍講諫申韓庾亮字元䂓元興初拜中書郎領著作侍講東宫其所論釋多見稱述與温嶠俱為太子布衣之好時元帝方任刑法以韓子賜太子亮諫以申韓刻簿傷化不足以留心太子甚納焉晉書受經講業蕭徳言愽涉經史尤精左氏春秋好屬文晩年尤篤志於學自晝達夜畧無休倦每欲開五經必束帶盥濯危坐對之妻子候間請曰終日如是無乃勞乎徳言曰敬先聖之言豈憚如此時髙宗為晉王詔徳言受經講業及升春宫仍兼侍讀舊唐學有師法韋處厚字徳載通五經博覽史籍而文思贍逸穆宗以其學有師法召入翰林為侍讀學士處厚以幼主荒怠不親政務既居納誨之地宜有以啟導性靈乃銓擇經義雅言以類相縱為二十卷謂之六經法言獻之錫以繪帛銀器仍賜金紫與司勲員外郎史館修撰路隨並充翰林侍講學士召入太液亭命分講毛詩闗雎尚書洪範等篇訪以理體處厚等演經義以廣䂓風之道從容開納賜酒果而罷經史要録鄭澣餘慶子也文宗初擢為翰林侍讀學士上命撰經史要録二十卷書成上喜其精博因以十九書語類上親自發問澣應對無滯錫以金紫當時榮之舊唐書詹事給事太子詹事秦官掌皇后皇太子家應劭云詹省也給也言給事太子巵酒進上竇嬰景帝初為詹事帝弟梁孝王母竇太后愛之孝王朝因燕昆弟飲是時上未立太子酒酣上從容曰千秋萬嵗後𫝊王太后驩嬰引巵酒進上曰天下者髙祖天下父子相𫝊漢之約也上何以得傳梁王太后由此憎嬰前漢掌東宫晉以保𫝊位尊不宜親細務武帝咸寜初用黄門侍郎楊珧為詹事掌東宫之任珧遷為少𫝊六典清貞陸曄字士光少有雅望從兄機每稱之曰我家世不乏公矣太興元年遷太子詹事以清貞著稱晉書願言匪獲羊琇字稚舒泰山人通濟才術與世祖同年相善謂世祖曰後富貴時見用作領䕶軍太子詹事世祖即位累遷左将軍中䕶軍特進晉諸公讃功髙後至謝琰字瑗度安少子也為輔國將軍距氏進號征虜左僕射領詹事陳邵謝録漢朝選徳禮儀峻于竇卿晉代任賢光榮歸於謝琰大唐詔令寛制總司武帝以王恭為丹陽尹領詹事恭讓表曰今皇儲始建四方是式總司之任崇替所由宜妙簡才賢盡一時之勝豈臣蕞庸所可叨忝晉起居注太原王恭為中書令領詹事學問清操過人中興書裁斷卞壺為世子師前後居師征之任盡匡輔之節一府貴而憚焉中興建補太子中庶子侍講東宫遷太子詹事世稱卞壺裁斷切直敷實忠於事上也晉書比訓江夷為右僕射主上欲用領詹事語王淮卿可覔北例淮對曰臣當出外尋訪淮後見主上問近所道事卿已得例未淮曰謝琰右僕射領詹事琰即謝公子子恐夷非其例事遂不行俗説彈肅詹事彈肅一宫如尚書令中丞矣王珉荅徐邈書彈違是屬宜肅事於東韓嗣許王制慱望斷機之規輿情僉屬承華彈肅之寄任賢斯在李寛制審函宋殷景仁不為文而敏有思致不談義而深達理至於國典朝章舊章記注莫不撰録識者知其有當世之志也宋少帝時與王華王曇首劉湛四人並為侍中以風力局幹冠冕一時同升之美近代莫及元嘉中丁母憂起為領軍将軍固辭服闋遷尚書僕射太子詹事劉湛代為領軍後以劉湛等毁停家飬病者五年雖不見上而密函去來日中以十數後將收湛上召入華林園誅討處分一皆委之代義康為楊州刺史南史風素孔稚珪字徳璋少學渉有美譽永明中歴中庶子永元中遷太子詹事辭表曰太子霞騫青殿日光春官駕紫谷之英􅀈洛笙之響自非器上白雲韻同明月何以延芳芝苑插羽瓊條竇嬰戚貴於西京陸曄風素於東國伊人之美方曰可舉臣亦何斯而敢參冐也儲端陸倕字佐公少勤學善屬文晝夜讀書如此者數嵗所讀一遍必誦于口舉秀才髙祖雅愛倕才遷太子庶子除詹事免讓表曰儲端華重實異勲司南章馬宫已擇儒雅竇嬰許商爰取姻戚自兹已降名器日隆歴選才賢若何叨越也宫端孔奐為吏部尚書陳後主時在東宫欲以江揔為太子詹事令管記陸瑜言之奐奐曰江有潘陸之華而無園綺之實輔弼儲貳竊謂非材後主深以為恨乃自言於宣帝宣帝將許之奐乃奏曰江揔文華之人今皇太子文華不少無籍於揔如臣愚見願選敦重之才以居輔導帝曰誰可奐曰都官尚書王廓代有懿徳識性敦敏可以居之後主時亦在側乃曰廓王泰之子不可居太子詹事奐又曰宋朝范曄即范泰之子亦為太子詹事後主固争之帝以揔為詹事由是忤㫖南史十七揔性寛和温裕尤工五言七言溺於浮靡及為宫端與太子為長夜之飲養良娣陳氏為女太子亟㣲行揔家宣帝奴免之上二十六審諭李綱武徳初為太子詹事隠太子建成初甚禮遇建成常往温湯綱疾不從有進生魚者将召饔人作鱠時唐儉趙元楷自賛其能建成從之既而謂曰飛刀鱠鯉調和鼎食公實有之至於審諭弼諧固屬於李綱矣舊唐諫近閹官于志寧為太子詹事太子承乾所為多不法令閹官多在左右諫之及承乾敗太宗謂志寧曰知公數有親諫深嘉勉勞右庶子令孤徳棻等以無諫章皆從貶貴唐書諫遊畋張𤣥素為少詹事轉右庶子時承乾居春宫頗以遊獵廢學𤣥素上書諫曰𢎞道在于學古學古必資師訓殿下地居儲兩當須廣樹嘉猷既有好畋之滛何以主斯斯鬯又諫曰殿下􅌖資已隆尚須學文以飾其表至如孔頴達趙𢎞智等非惟宿徳鴻儒亦兼達政要望令數得侍講開釋物理覽古諭今増暉睿徳而雕蟲小伎之流秪可時命追隨以代博奕耳承乾並不能納屈階資髙宗為皇太子轉李勣為太子詹事太宗謂曰我兒新登儲貳卿舊長史今以宫事相委故有此授雖屈階資可勿怪也上宫尹龍朔二年以詹事府改曰端尹府詹事曰端尹少詹事曰少尹武后光宅元年改曰宫尹府詹事曰宫尹少詹曰少尹中宗還東宫豆盧欽望為宫尹志通典㑹要衣錦還鄉張行成為太子少詹事太宗東征皇太子於定州監國即行成本邑也太子謂行成曰今者送公衣錦還鄉於是令有司祀其先人墓舊唐啓薦劉憲景雲初遷太子詹事時𤣥宗在東宫雅意經籍憲曰殿下儲副非以尋章摘句要通大意而已侍讀禇元亮經明行修宜召問以察其言上指牀龜張説女嫁盧氏嘗為舅盧公求官侯父下朝而問焉父不語但指搘牀龜而示之女歸告其夫曰舅得詹事矣班位失序蘇弁徳宗時改太子詹事弁初入朝班位失序殿中侍御史鄒儒立對仗彈之於金吾待罪數刻特釋放舊制太子詹事班次太常宗卿之下貞元三年御史中丞竇叅叙定班位移詹事在河南太原尹之下弁乃引舊班制立臺官詰之仍紿云已白宰相請依舊故為儒立彈之舊唐禮上文宗時馮定改太子詹事宰臣鄭覃拜太子太師欲於尚書省上事定奏曰據六典太師居詹事府不合於都省禮上乃詔於本司上事人推美之上庶子主宫中庶子主宫中并諸吏之適子及支庶在版籍者也行其秩序作其徒役授八次八舍之職以徼侯環濟要畧肅敬王商字子威少為太子中庶子以肅敬敦厚稱漢書古義規諫霍弋字紹先峻子也後主立太子璿以弋為中庶子璿好騎射出入無度弋援引古義盡言規諫甚得切磋之體蜀志流俗異趣武帝咸寧初詔曰男子皇甫謐沈静履素守學好古與流俗異趣其以謐為太子中庶子謐固辭篤疾帝初雖不奪其志晉書顯職齊王攸與山濤書曰太子中庶子東宫顯職加侍接左右誠宜得篤粹有行檢之人想悉在尊竟必允衆望也上俊茂中庶子缺宜得俊茂者以濟陰太守留儼陽城太守石崇叅選不審可有合聖意者不山公啓事陪臣鄭黙字思元袤子也考覈舊文刪省浮穢武帝受禪與太原郭奕俱為中庶子朝廷以太子官屬宜稱陪臣黙上言皇太子體皇極之尊無私於天下宫臣皆受命天朝不得同之藩國事遂施行晉書獻侍臣箴温嶠元帝時遷太子中庶子在東宫深見寵遇太子與為布衣之交僚屬莫與為比數陳規諷又獻侍臣箴甚有𢎞益上朝儀取正明帝之在東宫孔衍領太子中庶子于時中興肇構庶事草創衍經學淵博該識舊典朝儀軌制多取正焉由是元明二帝並親愛之上管緫門下王珣啓以桓謙為中庶子曰東宫之選中庶子管緫門下尤不可不得其才也上正始遺風袁粲言於帝曰張緒有正始遺風宜為宫職復轉中庶子齋書又留承華王㻛父中嘗為㻛辭領中庶子世宗顧謂冲曰所以久留㻛於承華正欲使太子㣲有㻛風法耳陳書教絃歌劉行本拜太子左庶子皇太子虚袊敬憚時唐令則亦為左庶子太子昵狎之毎令以絃歌教内人行本責之曰庶子當匡太子以正道何有嬖昵房帷之間哉令則甚慙而不能改隋書㺯臣劉行本為庶子時左衛率長史夏侯福為太子所昵太子嘗得良馬令福乗而觀之太子甚悦因欲令行李復乗之行本不從正色而進曰至尊置臣于庶子之位者欲令輔導殿下以正道非為殿下作弄臣也太子慙而止行本卒後而太子勇廢文帝曰若使劉行本在勇當不及於此上去臂薛元趨永隆二年拜中書令兼太子左庶子髙宗幸東都太子於京師鹽國因留元趨以侍太子帝臨行謂元超曰朕之留卿如去一臂但吾子未閒庶務闗西之事悉以委卿所寄既深不得黙爾舊唐諫獵吳競為左庶子𤣥宗東封在路多射獵競諌曰陛下爰自洛邑將告禪岱宗行經數州屢以畋獵為事誠外方之漸非致禮之所急況登封告成禮容甚大畋遊之事克損威儀又正觀時太宗文皇凡在巡行則慱選識達古今之士以在左右毎至前代興亡之地皆詢其所由用為鑒誠伏願陛下遵而行之則與夫騁奔馬於澗谷要狡獸於叢林不慎垂堂之厄不思馭朽之變不可同日而論也職官分紀坊寺晉王珉曰中庶子稱坊詹事稱寺寺同於九卿坊如天朝之稱䑓洗馬清道徐邈問王珉漢制洗馬冠髙山冠職如謁者中朝新制洗馬進賢冠出則在馬前清道故曰洗馬職官分紀執干戈勾踐入官於吳執干戈為吳王洗馬故能殺夫差於姑蘇韓子善宦汲黯字長孺孝景時為太子洗馬黯姊子司馬安亦少與黯為太子洗馬安文深巧善宦四至九卿漢書不空有名李密晉武徴為太子洗馬詔累下郡縣逼遣密上數疏武帝覽其表曰密不空有名嘉其誠欵賜奴婢二人郡縣供其祖母俸贍後劉終復以洗馬徴襄陽耆舊兄弟同任解系字少連次弟結字仲連次弟育字稚連各清身潔已仕皆為洗馬州里榮焉王隠晉書云上五事江統字應元為太子洗馬在東宫累年甚被親禮太子頗闕朝覲又奢費過度多諸禁忌統上五事諫之晉書統召補洗馬毎有疑滯大事章奏表議輙為同官所推常為之作草文上𫝊廊廟才裴松之字世期宋武帝北伐領司州刺史既尅洛陽松之居州行事宋國初建毛徳祖使洛陽武帝敕之曰裴松之廊廟之才不宜久居邊務今召為太子洗馬與殷景仁同可令知之南史甲族才望庾於陵字子介天監中為太子洗馬舊事東宫官屬通為清選洗馬掌文翰尤其清者近世用人皆取甲族有才望時於陵與周捨竝擢充職髙祖曰官以人而清豈限以甲族時論以為美梁𫝊正庶子罪李綱字文紀開皇末為太子洗馬皇太子勇嘗以嵗首宴宫臣左庶子唐令則自請奏琶琶又歌武媚娘之曲綱白勇曰令則身任宫僚軄當調䕶乃於宴座自比倡優進滛聲穢視聽事若上聞令則罪在不測豈不累於殿下臣請舉正其罪勇曰我欲為樂耳君勿多事綱趨而出舊唐掌閣籍唐司經局洗馬掌經籍出入侍從圖書上東宫者受而莊之龍朔二年改洗馬為司經大夫三年改司經局為桂坊以洗馬為桂坊大夫紏正違失通典志經局長官常衮為相先是百官俸料寡薄衮與宰相楊綰奏請加之時韓滉判度支衮滉各騁私懐懐所加俸料厚薄由已滉惡國子司業張參衮惡太子詹事趙惎因皆少給之太子洗馬實司經局長官文學為之貳衮有親戚任文學者乃給十二千而給洗馬十千其輕重任情如此舊唐書秦君秦景通與弟暐尤精漢書當時習漢書者皆宗師之常云景通為大秦君暐為小秦君若不經其兄弟措授則謂之不經師匠無足敎也景通貞觀中為洗馬上中允朝請起居漢制太子五日一朝其非朝日即遣僕及中允入朝問起居隋有内允貞觀初曰中允掌侍從賛相駁正啓奏緫司經皇太子出則版奏外辦中嚴入則解嚴龍朔元年改門下坊曰左春坊中允曰左贊善大夫通典王珪孔穎達杜㤿陸徳明王維為中允疾風勁草裴諝字士明少舉明經為史思明捕得嘗疏賊短長以聞賊平除太子中允代宗居􅴶赴行在上見而謂之曰疾風知勁草果信矣舊唐書諭徳諭道徳左右諭徳掌諭太子以道徳也皇太子朝宫臣則列侍於左右階出入則騎從於正道之左右其内外庶政有可為規諷者隨事而賛諭焉六典文雅粉澤員半千武后時入𢎞文館為學士武三思用事以賢見忌出豪蘄二州刺史半千不顓任吏常以文雅粉澤故所至禮化大行睿宗初召為太子右諭徳仍學士職唐書諭善箴韋承慶字延休弱冠舉進士辭藻之美擅于一時累遷太子司議郎太子賢監國不近聲色承慶上書諫曰殿下岳峙淵渟金貞玉裕百僚仰重曜之暉萬姓聞洊雷之響居處服玩必循節儉毁獵遊娛不為縱逞則可以克享終吉長保利貞又當為諭善箴以獻太子太子賜予甚厚久之以病免改授太子諭徳上東寮徳宗拜崔芉為諭徳芉對東宫曰臣不識朝廷典故見殿下合稱臣否東宫曰卿是東寮自合知也上賛善翊賛左右賛善大夫龍朔二年初置左賛善大夫賛中冗置右賛善大夫賛中舍人咸寧元年中允復舊而賛善大夫别自為官皆掌侍從翊賛太子以規諷也皇太子出入動静茍非其徳義則必陳右以箴焉六典通典經業歸崇敬字正禮少勤學以經業擢第天寳末對箂髙帝授左拾遺改秘書郎遷起居郎賛善大夫兼史館修撰舊唐新名貞元十六年以山人崔羊為右賛善大夫充太子侍直新名也先諫官言白居易授左賛善大夫盜殺宰相武元衡居易首上疏論其寃急請捕賦以雪國恥宰相以宫官非諫職不當先諌官言事㑹有素惡居易者掎摭居易言浮華無行其母因看花墮井而死而居易作賞花及新井詩甚傷名教不宜寘彼周行執政方惡其言王涯上疏論之貶江州司馬上賔客賛相上齒太子賔客掌侍從規諫賛相禮儀而先後焉凡皇太子有賔客宴㑹則為之上齒六典立博望苑漢書髙祖欲廢太子吕氏用張良計致商山四皓以為賔客又孝武帝為太子立博望苑使通賔客則其義也若有宴賜諸司長官太子賔客則皆預焉上太子為拜楊元琰與張柬之等定計誅張易之兄弟俄而柬之等為武三累所搆琰竟以先覺獲全睿宗即位三遷刑部尚書開元初拜太子賔客詔設位東宫太子為拜舊良吏新四十五㢮慢政官李固言太和五年将作監王堪修秦太廟㢮慢罰俸仍改官為太子賔客制出固言封還曰東宫調䕶之地不可令㢮慢被罰之人處之改為均王𫝊舊唐侹侹大節鄭肅開成二年拜吏部侍郎帝以肅嘗侍太子言論典正復令兼太子賔客為東宫受經既而太子失寵上不悦有廢斥意肅因召見深陳邦國大本君臣父子之義上改容嘉之而太子竟以楊妃故得罪武宗思太子永之無罪盡誅陷永之黨朝議稱肅忠正侹侹有大臣之節上修撰名始武徳中秘書丞令狐徳棻請修五代史詔蕭瑀等分修之歴年不就貞觀三年復勑修撰乃令徳棻仍總知類㑹諸史武徳以來創修撰之源自徳棻始也㑹詔改撰晉書房𤣥齡秦徳棻令預修撰當時同修一十八人並推徳棻為首其體例多取决焉舊唐修國史唐史舘修撰掌修國史天寳後他官兼史職者曰史舘修撰元和中宰相裴垍建議登朝官領史職者為修撰以官髙一人判舘事志父子同職歸登字冲之崇敬子也充皇子侍讀尋加史舘修撰順宗初以東朝舊恩賜金紫尋加史舘修撰上蔣義字徳源博通羣籍史才尤長貞元中史舘修撰居史任二十年好學不倦老而彌篤子係太和中拜史舘修撰典實有父風伸太中初入朝右補闕史舘修撰召入為翰林學士偕有史才以父任歴官左拾遺史舘修撰蔣氏世以儒史穪與栁氏沈氏父子相繼修國史實録時推良史京師云蔣氏日厯士族靡不家藏焉舊唐兩宫恩顧徐岱字處仁貞元初史舘修撰並依舊侍讀承兩宫恩顧時無與比而謹慎遇甚來嘗洩禁中語亦不談人之短南唐正戴李翺轉史舘修撰以史官記事不實奏曰臣謬秉筆以記注為職夫觀善懲惡正言直筆史官之任今善惡皆取行狀謚議葢行狀多是其門生故吏欲虚美于受恩之地今請但指事實直載事功假如作魏徴傳但紀其諫諍之辭足以為正直叚秀實但記其倒用司農印以追道兵以象笏擊朱泚足以為忠烈若考視行狀依此則考功下太常牒史舘然後定謚從之上賈鐵嘴周賈偉充史舘脩撰普衫桑維翰為相惡緯侍之甚薄及為翰傳言翰死有白金八千鋌學士徐台符以為厚誣偉乃更為數百儕類不平目為賈鐵嘴五代史修唐書慶厯四年賈昌朝建言修唐書命王堯臣宋祈楊察張方平為修撰曽公亮范鎮宋敏求吕夏卿為編修其後相繼出外獨宋祈秉筆編年夏卿博覽强記而於歴代史尤該洽東都事畧編修始立宋太平興國八年八月以國子監主簿楊文舉為國子監丞史館編修貎閒吟苦天聖中修國史王安簡謝楊夏李邯鄲黄唐卿為編修官安簡神情冲澹唐卿刻意篇什謝安嘗戲為句曰王貎閒如鶴黄吟苦似猿不負公議袁樞字機仲為編修官分修列傳故相章子厚家以同里宛轉求釋其事公曰吾為史官書法不隠寧可負鄉人不可負天下後世公議時宰相趙雄緫史事歎曰無愧古之良史行狀檢討檢討淳化二年以殿中丞郭延澤太子右賛善大夫董元亨並為史館檢討父子同典李燾權同修國史先是子垕兼國史編修實録檢討遷校書著作父子同典史事搢紳榮之言行録天中記卷三十
