body:
  text: 天中記卷四十明陳耀文撰隱逸王政所先孔子稱舉逸民天下歸心焉是以洪崖先生創高於上皇之世許由善卷不降唐虞之朝易有束帛之義禮有𤣥纁之制詩人發白駒之歌春秋顯子臧之節故月令以季春聘名士禮賢者然則高讓之士王政所先高士𫝊序許卞堯讓天下於許由許由不受恥之逃隱及夏之時有卞隨務光者此何以稱焉史記委位舜王天下臯陶佐政北人無澤深隱不見禹王天下伯益輔治伯成子高委位而耕論衡虛無堂李耳著道德五千餘言為道家之宗以其年老著子故號其書曰老子居亳今亳州南宫九龍井井前有昇仙檜再生檜老君鍊丹井井北有虗無堂石壁鐫道德經高士𫝊序五往乃見齊桓公時有處士曰小臣稷桓公三往而弗得見桓公曰吾聞布衣之士不輕爵禄無以助萬乘之主萬乘之主不好仁義亦無以下布衣之士於是五往乃得見之韓非子王坐欣飽亥唐晉人也高恪寡素晉國惮之雖疏食菜羮平公毎為之欣飽公與亥唐坐有間亥唐出叔向入平公伸一足曰吾向時與亥子坐腓痛足痺不敢伸叔向勃然作色不悅公曰子欲貴乎吾爵子欲富乎吾禄子夫亥先生乃無欲也吾非正坐無以養之子何不悅乎嵇康高士𫝊飯牛魯君聞顔闔得道之人也使人以幣先焉顔闢守陋閭苴布之衣而自飯牛魯君之使者至顔闔自對之使者曰此顔闔之家與顔闔對曰此闔之家也使者致幣顔闔對曰恐聼者謬而遺使者罪不若審之使者還反審之復來求之則不得已莊吕立倦不息魏文侯見段干木立倦而不敢息及見翟黄距於堂而與之言翟黄不說文侯曰段干木官之則不肯禄之則不受今女欲官則相位欲禄則上卿既受吾實又責吾禮無乃難乎吕覽歸真反璞齊宣王見顔斶云願先生與寡人遊食必太牢出必乘車妻子衣服麗都顔斶辭去曰夫玉生於山制則破焉非弗寶貴矣然太璞不完七生乎鄙野推選則禄焉非不尊遂也然而形神不全斶願得歸晩食以當肉安歩以當車無罪以當貴清淨貞正以自虞遂辭而去君子曰斶知足矣歸貢反璞則終身不辱戰國䇿鶡冠鶡冠子或曰楚人隱居幽山衣敝履穿以鶡為冠莫則其名因服成號著書言道家事馮煖常師事之煖後顯於趙鶡冠子懼其薦已也乃與煖絶袁淑真隱𫝊灌園陳仲子楚王聞其賢欲以為相遣使持金百鎰至於陵聘仲子仲子入謂妻曰楚王欲以我為相今日為相明日結駟連騎食方丈於前意可乎妻曰夫子左琴右書樂在其中矣結駟連騎所安不過容膝食方丈於前所甘不過一肉今以容膝之安一肉之味而懷楚國之憂亂世多害恐先生不保命也於是出謝使者遂相與逃去為人灌園高士𫝊齊使使者問趙威后威后問曰於陵子仲尚存乎是其為人也上不臣於王下不治其家中不索交諸侯此率民而出於無用者何為至今不殺乎齊策鄭長者鄭長者隱德無名著書十篇言道家事韓非稱之世𫝊是長者之辭因以為名袁淑真隱𫝊淮陽一老應曜本自周武王左傳曰邢晉應韓武之穆也漢有應曜隱於淮陽山中與四皓俱徴曜獨不至時人謂之曰商山四皓不如淮陽一老八代孫應邵集解漢書云白帖五音集韻淮韻作漁隱矦盧元明緱山記漢王𤣥奕者隱於此山景帝毎徴不屈遂就山而封侯因以為名宋亮緱山詩王奕拜隱侯􅛪居士摰峻字伯陵與司馬遷交好隱於􅛪山遷以書勸峻進曰太上立德次立功次立言伏惟伯陵才能絶人高尚其志氷清玉潔不以細事荷累然未盡太上之所由也峻報曰君子料能而行度德而處故悔吝逺於身利不可以虗受名不可以茍得漢興以來帝王之道於斯始顯能者見利不肖者自屏亦其時也二人自是各從所欲遷果以悔吝被辱峻遂高尚不仕卒於􅛪􅛪人立祠號􅛪居士高士𫝊鄭嚴鄭樸字子真隱於谷口高節不屈耕於岩石之下名震京師時人因子貢所居名為鄭泉雲陽宫記谷口鄭子真蜀有嚴君平皆修身自保非其服弗服非其食弗食成帝時元舅大將軍王鳯以禮聘子貢子貢遂不詘而終君平卜筮於成都市以其業終蜀人愛敬至今稱焉楊雄著書言當世士稱此二人其論曰或問君子疾没世而名不稱盍執諸名卿可幾曰君子德名為幾梁齊楚趙之君非不富且貴也惡乎成其名谷口鄭子真不詘其志而耕於巖石之下名震於京師豈其卿豈其卿楚兩龔之潔其清矣乎蜀嚴洪㝠不作茍見不治茍得久幽而不改其操雖隨和何以加諸舉茲以旃不亦實乎不慕由即夷矣何毚欲之有楊問明前漢書蜀有富人羅沖者問君平曰君何以不仕君平曰無以自發沖為君平具車馬衣糧君平曰吾病耳非不足也我有餘而子不足奈何以不足奉有餘沖曰吾有萬金子無儋石乃云有餘不亦謬乎君平曰不然吾前宿子家人定而役未息晝夜汲汲未嘗有足今我以卜為業不下牀而錢自至猶餘數百塵埃厚寸不知所用此非我有餘而子不足耶沖大慙君平歎曰益我貨者損我神生我名者殺我身竟不仕高士𫝊通志畧云臣謹按類說云云豈未見高士𫝊耶梅真嚴平澄漠於塵肆梅真隱淪乎市卒郭璞客傲四明餘姚之南七十里仙尉梅子真之舊隱也福初入山見多龍穴神蛇毎吐氣成樓閣雲雨晦㝠邉有石庫内貯仙藥神仙經籍貞元十二年釋法常寄宿於房夢神人謂之曰石庫中聖書懸記既往將來之事受之者為地下主不然為帝王之師傅矣唐高僧𫝊三徑杜陵蔣詡字元卿為兖州刺史以廉直為名王莾居攝以病免官歸鄉里荆棘塞門舍中有三徑不出惟東仲羊仲從之遊二人不知何許人皆治車為業挫亷逃名時人謂之二仲三輔决録詡為兖州王莾為宰衡詡奏事到覇上移病歸杜陵荆棘塞門舎中三徑終身不出時人諺曰楚國二龔不如杜陵蔣翁嵇康高士𫝊惟開蔣生徑永懷求羊蹤謝靈運詩都尉掃門龍丘萇吳郡人篤志好學王莾簒隱居大山以耕稼為業公車不應徴更始時任延年十九為郡東部尉折節下士鍾離意為主簿自請萇為門下祭酒教曰龍丘先生清過夷齊志慕原憲都尉洒掃其門猶懼辱之何召之有謝承後漢書東陽有高山班固謂之九岩山後漢龍丘萇隱處也山多龍鬚檉柏望之五采亦曰婦人岩海録山有九石特秀林表色丹白逺望之狀肖芙蓉故一名九峯巖山漢龍丘萇隱居於此與嚴子陵友善終年百嵗山際有三疊巖外則如牕牖中有石床東陽記蜘蛛隱龔舎初仕楚王非其欲見飛虫觸蜘蛛網而死歎曰仕宦亦人之網羅也遂掛冠而退時人謂蜘蛛隱金楼子雖執節若夷齊去就若兩龔皆不録也高士𫝊序隱屠肆胡剛清高有志節值王莾居攝解其衣冠縣府門而去遂亡命交跡隱於屠肆之間後漢選注清高士牛虫字君直世祖為布衣時與牢遇夜講說䜟言云劉秀當為天子世祖曰安知非我萬一果然各言爾志牢獨黙然世祖問之牢曰丈夫立義不與帝友衆大笑及世祖即位徴牢稱疾不至詔曰朕幼交牛君真清高士也恒有疾州郡之官者常先到家致意焉刺史郡守是以每輙奉詔就家存問牢恒被髮稱疾不荅詔命高士𫝊折芰鄭敬字次卿汝南人閑居不修人倫都尉逼為公曹辭病去於蟻陂之陽隱處精學同郡鄧敬公為督郵過存敬敬方釣魚於大澤因折芰為坐以荷薦肉瓠瓢盈酒言談彌日蓬廬蓽門琴書自娛世祖公車徴不行隂就虞延並辟不至謝承書折芰焚枯此焉自足任彦升表勅斷家事向尚長字子平有道術為縣功曹休歸自入山擔薪賣以供食飲英雄記王莾大司空王邑辟之連年乃至欲薦之於莾固辭而去潛隱於家讀易至損益卦喟然歎曰吾已知富不如貧貴不如賤但未知死何如生耳建武中男女娶嫁既畢勑斷家事勿相關當如我死也於是遂肆意與同好北海禽慶俱避五嶽名山竟不知所終高士𫝊存神養和臺佟字孝威魏郡鄴人也隱於武安山鑿穴為居採藥自業建初中州辟不就刺史行部乃使從事致謁佟載病往謝刺史曰孝威君身如是甚苦如何佟曰佟幸得保終性命存神養和如明使君奉宣詔書夕惕庶事反不苦耶遂去隱逸終不見後漢蓬蒿没人張仲蔚平陵人與同郡魏景卿俱修道德隱身不仕常居窮素所處蓬蒿没人唯開一徑閉門養性不治榮名時人莫識唯劉龔知之高士傳𤣥德先生法真字高卿性恬静寡欲不渉人間事凡辟公府賢良皆不就同郡田羽薦之順帝虛心欲致前後四徴真曰吾既不能遯形遠世豈飲洗耳之水哉遂深自隱絶終不降屈友人郭正稱之曰法真名可得而聞身難得而見逃名而名我隨避名而名我追可謂百世之師矣乃共刋石頌之號曰𤣥德先生上有道大夫李恢字仲興李佐車十四世孫也漢桓靈間高尚不仕號有道大夫北史李士謙𫝊二代不仕陸著字文伯漢桓靈間府州交辟不就惟娯棲遁臨卒戒諸子弟云吾少未嘗官於世四十餘年以汝等必矜義勿茍仕濁世子孫奉遵舊遺訓遂二代不仕皆有盛名王僧䖍呉地記割席公沙孚字允慈與荀爽共約出不得事貴勢而爽當董卓時脫巾未百日位至司空后相見以爽違約割席而坐北海耆舊傳設東面坐徐稚忽榮禄陳蕃欽其高行以禮詔請署為功曹及師友祭酒又特為設東靣之坐重席佩巾几以候之稚辭疾不到雜亊記蘇門蘇門先生嘗見採薪於阜者先生嘆曰汝將以是終乎哀哉薪者曰以是終者我也不以是終者我也且聖人無懷何所為哉聖人以道德為心不以富貴為志因歌二章莫知所終袁淑真隱𫝊采桑南郡龎士元聞司馬德操在潁川故二千里候之至遇德操采桑士元從車中謂曰吾聞丈夫處世當帶金佩紫焉有屈洪流之量而執絲婦之事德操曰子且下車子適知邪徑之速不慮失道之迷昔伯成耦耕不慕諸侯之榮原憲桑樞不易有官之宅何有坐則華屋行則肥馬侍女數十然後為竒此乃許父所以忼慨夷齊所以長歎雖有竊秦之爵千駟之富不足貴也士元曰僕生出邉陲寡見大義若不一叩洪鐘伐雷鼔則不識其音響也世說釋耕壟上龎德公居峴山之南未嘗入城府夫妻相敬如賔劉表数請之德公不為屈乃就候之表曰夫保一身孰若保天下乎德公笑曰鴻鵠巢於髙林之上暮而得所棲黿鼉穴於深淵之下夕而得所宿夫取舎行止亦人之巢穴也各得其棲宿而已天下非所保也因釋耕於壟上而妻子耘於前表歎息而去後遂擕其妻子豋鹿門山因采藥不反後書龍種龎德公子奐字世文晉太康中為牂牁太守去官歸鄉居白沙里鄉人宗敬之相語曰我家池中龍種來里中化其德讓少壯皆代老者擔襄陽記清高不仕高陽許詢字𤣥度丹陽許𤣥字逺遊並清高不仕詢有才藻能清言𤣥山居服食志求仙道遊㑹稽臨海山誓不歸家乃與婦書令改適後入刻深山莫知所止或以為昇仙晉中興書𤣥度巖許詢徴司徒掾不就乃䇿杖披裘隱於永興西山慿樹搆堂蕭然自致至今此地名為蕭山常與沙門支遁及謝安石等同遊往來至今臯屯呼為𤣥度巖金陵志竹中高士張廌隱居頥志家有苦竹数十頃在竹中為屋常居其中王右軍聞而造之廌逃避之竹中不與相見一郡號為竹中高士永嘉郡志充隱桓𤣥謀逆以厯代咸有肥遁之士而已獨無乃徴皇甫謐六世孫希之為著作并洽其資用者皆令讓而不受號曰高士時人名為充隱晉書六十九潯陽四隱晉翟莊字祖休湯之子以孝友著名守父操州致禮命並不就莊子矯亦高節家居無事好種竹辟命屡至歎曰吾焉能易吾種竹之心以從事於籠鳥盆魚之間哉竟不就矯子法賜節概尤佳武帝以散騎郎召客勉之就聘乃正色曰吾家不仕四世矣使白璧㸃汚可乎亦不從之祖父子孫皆有行義世稱潯陽四隱南康志三葉肥遁桐廬縣東有大漢溪九里注廬口溪南通新安東出富陽青山緑波連霄亘壑昔徴士散騎常侍戴勃遊此自言山水之極致也勃字長雲譙國銍人父散騎侍郎逵字安道弟子常侍國子祭酒顒並高蹈俗外三葉肥遁為海内所稱呉地記三隱周續之字道祖閑居樂志好讀老易入廬山事沙門釋慧逺時彭城劉遺民遁迹廬山陶淵明亦不應徴命時人謂之潯陽三隱宋高祖嘗稱續之曰心無偏吝真高士也宋書或問續之時賤王庭何也笑荅曰心馳魏闕者以江湖為桎梏情致兩忘者市朝亦巖谷耳廬山記人外之遊孔淳之字彦深居㑹稽剡縣性好山水每有所遊必窮其幽峻或旬日忘歸與徴士戴顒王𢎞之王敬宏等為人外之遊㑹稽太守謝方明苦要之不能致使謂曰茍不入吾郡何為入吾郭淳之笑曰濳遊者不識其水巢棲者非辯其林飛沉所至何問其主終不肯往嘗遊山遇沙門釋竺法崇因留共止遂停三載毎與盤遊極日輙信宿忘歸披襟領契自以為得意之交也崇乃歎曰緬想人外三十餘年傾葢於茲不覺老之將至後淳之别遊崇咏曰浩然之氣猶在心目山林之士往而不反其若人之謂乎宋書高僧𫝊真隱𫝊何尚之為尚書令致仕於方山著退居賦以明所守而議者咸謂其不能固志文帝與江夏王義恭詔曰羊孟尚不得告謝尚之未宜申許尚之還攝職於是袁淑乃録古來隱士有迹無名者為真隱𫝊以嗤焉南史禄如腐草衡陽王義季問宗納曰欲屈先生以重禄可乎曰禄如腐草盛衰幾何廬山記愛竹酒辛居士名宣仲截竹為罌以酌酒曰吾性甚愛竹及酒欲令二物並耳宋巴陵王休若謁之呼兒取豹皮下五文錢買𤓰南雍州記辛居士隴西人大明末寓居襄陽縣西六里多植松竹棲遲其下林中起一草廬容膝而已善弹筝與淮南胡陶京兆洛惠度同志為友常共讌集此林陶能吹笛惠度工歌什林下管絃道韻時人謂之公樂襄汚記今之臺尚杜京産字景齊與同郡顧歡同契於始寧東山開舎授學齊高帝遣劉瓛入東為武陵王曄講瓛故往與之遊曰杜生今之臺尚也南史朱沖字巨容每聞徴書至即逃入深山時人以為梁管之流晉書朝隱王逺子僧祐字𦙍宗雅為從兄儉所重好博古善老莊不尚繁華亭然獨立不交當世劉瓛上書薦之謝病不與公卿遊齊高帝謂王儉曰卿從可謂朝隱荅曰臣從非敢妄同高人直是愛閑多病耳時何㸃王思逺之徒請交並不降意自天子至於侯相未嘗與一人遊南史十一王應琚反招隱詩小隱隱陵薮大隱隱朝市不受黔劓沈麟士字雲禎居貧高尚織簾誦書張永為呉興欲請為功曹麟士曰必欲節渾沌以蛾眉冠越客於文冕走雖不敏請附高節有蹈東海死耳不忍受此黔劓永乃止南史量腹度形宗測字敬㣲炳孫也豫章王嶷兩徵之測荅府召曰何為謬傷海鳥横斤山木今髮鬢已白豈容課虛責有限魚慕鳥哉魚復候子響為江州厚遣贈遺測曰尋山採藥量腹而進松术度形而衣薜蘿淡然已足豈容當此横施南齊書北山移文周顒字彦倫於鍾山西立隱舎休沐則歸之南齊書汝南周顒昔經在蜀以蜀草堂寺林壑可懷乃於鍾嶺雷次宗學舘立寺因名草堂亦名山茨梁簡文草堂𫝊孔德璋移文云世有周子儁俗之士竊吹草堂濫巾北岳務光涓子不能儔至其紐金章綰墨綬使我高霞孤映白雲誰侣列壑爭譏攅峯聳誚今又促裝下邑浪拽上京雖情投於魏闕或假歩於山扄豈可使碧嶺再辱丹崖重滓宜掩雲關截來轅請回俗士駕為君謝逋客鍾山在都北其先周彦倫隱於此山後應詔出為海塩令欲却過此山孔德璋乃假山靈之意移之使不許得至故云北山移文選吕向注齊書曰顒字彦倫汝南人釋褐海陵國侍郎元徽中出為剡今建元中為長沙王後軍叅軍山隂令稍遷國子博士卒於官未嘗云為海塩令也吕之云云豈杜撰耶被褐先生東莞臧榮緒與友河東關康之俱隱在京口時號三隱榮緒敦愛五經常以宣尼生庚子生陳五經拜之自號披褐先生南齊書東海繆裴宇文雅東海蘭陵人世亂將家避北海濵不以遯世為悶不以窮居為傷浣衣濯冠以俟守義孝德𫝊阮居士阮孝緒幼有至性與羣兒遊戲便以穿池及冠父誡之孝緒荅曰願迹松子於瀛海追許由於窮谷庶保促生以免塵累自是屏居一室雖家人亦罕窺其面人遂呼為阮居士天監十二年與吳郡范元珪俱徴不至袁峻謂曰往古天地閉賢人隱今世路已清而子猶遁可乎荅曰昔周德雖興夷齊不厭薇蕨澤道方盛黄綺無悶山林為仁由已何關人世南平王偉聞其名致書要之不赴曰非志驕富貴但性畏廟堂若使劣馬可驂何以異夫驥騄南史神人劉訏字彥度隱居求志本州刺史張稷辟為主簿不就主者敦召訏乃掛檄於樹而逃於族兄歊並遨遊林澤以山水書籍相娯曽與歊聽講鍾山諸寺因共小築宋熈寺東澗有終焉之志尚書郎何烱嘗遇之於路曰此人風神穎俊葢荀奉倩衛叔寶之流也命駕造門拒而不見嘗著穀布巾披納衣每遊山澤輙留連忘返神理閑正姿貌甚華在林谷之間意氣彌遠或有遇之者皆謂神人南史月食四斗梁武初詔何胤為光禄大夫遣王杲之以手勑諭意并徴謝朏杲之先至胤所恐朏不出先示以可起乃单衣鹿皮巾執經卷下床受詔就席伏讀及杲之從謝朏所還問胤出期以應詔荅杲之曰吾年已五十七月食四斗米不盡何容復有官情杲之失色不能荅擁書棄産李謐字永和鄉黨有神童之號屡辭徴辟志守冲素結宇依巖憑崖鑿室耽學守道不悶於時每曰丈夫擁書萬卷何假南靣百城遂絶跡下帷杜門却掃棄産營書手自刪削隆冬達曙盛暑通宵雖仲舒不窺園君伯之閉户高氏之遺潔張生之忘食未足為異也而祐善空聞年三十二暴疾而卒詔謚真靜處士魏書物外司馬王晞字叔朗閑談寡欲雖王事鞅掌而雅操不移良辰美景嘯咏遊遨登山臨水以談讌為事人士謂之物外司馬北齊逍遥公韋夐字敬逺志向夷簡淡於榮利一見徴辟皆不應命所居之宅枕帶林泉對翫琴書蕭然自逸時人號為居士周太祖備加禮命竟不能屈明帝禮敬愈厚為詩以遺之夐荅帝詩願不時朝謁帝勑有司日給河東酒一斗號之曰逍遥公陳使周宏正贈詩曰德星猶未動真車詎肯來周書假隱杜淹字執禮開皇中與其友韋福嗣謀曰上好嘉遁蘇威以幽人召得美官乃共入太白山為不仕者文帝惡之謫戍江表唐書杜淹問隱子曰非伏其身而不見也時命大謬則隱其德矣惟有德者能之故謂之退藏於宻文中子天隱王績字無功綘州龍門人有田十六頃在河渚間仲長子光者亦隱者也無妻子結廬北渚凡三十年非其力不食績愛其真徙與相近子光瘖未嘗交語與對酌酒歡甚遊北山東臯著書自號東臯子南史或問東方朔人隱者也仲長子光天隱者也無往而不適矣文中子泉石膏盲田遊巖入箕山就許由廟東築室而居自稱許由東鄰高宗幸嵩山親問之對曰臣所謂泉石膏盲煙霞痼疾者後出仕宦坐於裴炎交結特放還山唐書逍遥谷潘師正居嵩山逍遥谷服松葉飲水而已高宗召見問山中所湏師正對曰所湏松樹清泉山下不乏續世說高宗幸嵩山主逍遥谷見室中大瓠問潘師正字子真荅曰中有青􅨯昔西城王君以南燭草為之服食得道上乃命道士葉法善往江東造青􅨯飯海録隨駕隱士盧藏用字子濳與陳伯玉趙貞因友善隱居之日頗以貞白自衒往來於少室終南二山時人目為假隱自登朝奢靡淫縱趑趄詭佞専事權貴時議乃表其醜行以阿附太平公主流隴州談賔録初隱山時有意當世人目為隨駕隱士司馬承禎嘗召至闕下將還山藏用指終南山曰此中大有佳處承禎徐曰以僕視之乃仕宦之㨗徑耳藏用慙唐書白雲記司馬承禎苦辭還山勑賜寶琴花帔遣之工部侍郎李適賦詩朝士咸属和散騎常侍祭彦伯撮其美者二十一首為製序名為白雲記海録見山合眼任轂有經學居懷谷望徴命而蒲輪不至自入京中訪問有朝士戲贈詩云雲林應訝鶴書遲自入京來探事宜從此見山湏合眼被山相賺已多時後至補衮幽閑鼔吹踈逸方外顧况志向疎逸近於方外有時宰曽招致將以好官命之况以詩荅之曰四海如今已太平相公何事喚狂生此身還似籠中鶴東望滄溟呌數聲後呉中皆言况得道解化去尚書故實煙波釣徒張志和字子同親既喪不復仕居江湖自稱煙波釣徒陸羽嘗問孰為往來者曰太虛為室明月為燭與四海諸公並處未嘗少别也何有往來志和謁顔真卿於湖州真卿以舟敝漏請更之志和曰願為浮家泛宅往來苕霅間嘗撰漁歌憲宗寫真求訪之不能致李德裕𤣥子記云漁父賢而名隱鴟夷智而功高未若𤣥真隱而名彰顯而無事不窮不達其嚴光之比歟唐書一品集刺史顔真卿與陸鴻漸等共唱和二十五首江湖散人陸龜䝉字魯望居松江甫里不喜與流俗交雖造門不肯見不乘馬升舟設蓬席齎束書茶竈筆床釣具往來時謂江湖散人或號天隨子甫里先生自北涪翁漁父江上丈人後以高士召不至唐書天隨生宅荒少墻屋多隙地前後皆樹把菊以供盃案至夏枝葉老硬氣味苦澀猶責僮兒采掇人言千乘之邑非無好事之家日為繫鮮為具以飽君君猶閉關不出率空腸貯古賢遺言何自苦如此天隨生笑曰我幾年來忍饑誦經豈不知屠沽兒有酒食邪陸龜䝉别𫝊遺名子大厯中處士韋渠牟隱鍾山號遺名子顔真卿題其所隱之堂曰遺名先生三教㑹宗堂金陵志韋與竟陵陸鴻漸杼山僧皎然為方外之侣沉㝠博約為日最夕而不名一行不滯一方故其曵羽衣也則曰遺名攝方袍也則曰塵外披儒服也則今之名字著焉權載之文序離俗陳琡鴻之子也咸通中佐亷使郭常侍銓於徐性耿介有所不合挈家居茅山平居焚香習禅與妻子罕靣惟流溝寺長老與之接欵臨行留一章與其僧云行若獨輪車常畏大道覆止若圓底器常恐他物觸行止既如此安得不離俗乾符中第璉佐薛能幕於徐琡自丹陽掉小舟與相見能重其人延入城不可曰某已有誓不踐入公門矣薛移舟赴之話道永日不宿而去玉堂三高石晉鄭雲叟本名遨棄家入少室山聞西嶽有五粒松脂淪入地千嵗化為藥能去三尸因居華隂與李道隂羅隱之友善時人目為三高士道殷有釣魚之術鈎而不餌又能化石為金無所不至雲叟目擊其事而不求續世說呉興長興縣西南有玉竇深廣皆二尺色紺碧味甘唐處士鄭遨與羅隱道士李道殷築屋泉石號三隱詠詩張令問本唐興人隱居不仕號天國山人與杜光庭詩云試問朝中為宰相何如林下作神仙一壺美酒一爐藥飽聽松風白晝眠孟蜀辛酉嵗有隱迹於陶沙者文谷禮遇之嘗詠詩曰九重天子人中貴五等諸侯閫外尊那似布衣雲外客不將名字掛乾坤絶意世事史虛白字畏名南遊九江至落星灣家焉往來廬山絶意世事保大初元宗南遷至蠡澤虛白迎謁道傍元宗勞問令誦近詩曰風雨掇却屋全家醉不知元宗變魚賜粟帛上樽酒徐鉉高越謂之曰先生高不可屈盍使二子仕乎虛白曰野人有子賢則立功業以道事明主愚則負薪捕麋以養其母僕未嘗介意也不敢以累公鉉越媿歎江南别録南唐書無後段荆臺隱士梁震唐末豋第開平間歸蜀過江陵高季昌愛其才識留之震終身止稱前進士季昌甚重之以為謀主呼曰先軰後從誨時震曰先王待我如布衣交以嗣王囑我今嗣王能自立不墜其業吾老矣不復事人矣遂固請退居從誨為築室於土州震披鶴􅌁自稱荆臺隱士每詣府跨黄牛至㕔事從誨時過其家五代史灌園蘇雲卿少與張浚為友紹興間來豫章東湖結廬灌園人莫測也浚為相属豫章帥及漕親為致之帥漕宻物色得灌園蘇翁因更服入其圃案上有西漢書意是雲卿也扣其鄉里徐曰廣漢客曰張德逺翁當識之曰然何如人曰賢人也苐長於知君子短於知小人德有餘而才不足因問張今何官客曰今朝廷起張公欲了此事翁曰恐未便了得在客起致張意因出書幣翁意色若自咎者二客力請共載辭以詰朝上謁旦伺之翁已遁矣帥漕復命浚拊几歎悔作箴識之宋史退休楊萬里退休十有六年寧宗初與朱元晦同召楊不起朱與書速之楊决意不出有江風山月之贊醫赭鞭黄帝赭鞭鞭百草盡知其平毒寒温之性臭味所主以播百穀故號神農皇帝搜神記神農拖赤鞭而歐毒楊炯藥圖序黄帝使岐伯甞味草木典醫療疾今經方本草之書咸出焉帝王世紀岐伯祖世之師曰僦貸季素問神農甞草殆死者数十黄帝稽首受針於岐伯理惑論巫咸巫咸以鴻術為帝堯之醫郭璞巫咸山賦序劉聦信用王沉等誅王琰等陳元達等諫曰陛下心腹四肢無處無患後誅巫咸戮扁鵲臣恐成桓侯膏肓之疾後雖欲療之其如病何載記巫彭作醫吕氏春秋古醫曰苗父説苑腠理扁鵲見蔡桓公立有間扁鵲曰君有疾在腠理不治將恐深桓侯曰寡人無病扁鵲出桓侯曰醫之好治不病以為功居十日扁鵲復見曰君之病在肌膚不治將益深桓侯不應扁鵲出桓侯又不悦居十日扁鵲復見君之疾在腸胃不治將益深桓侯又不應扁鵲出桓侯又不悅居十日扁鵲望桓侯而還走桓侯故使人問之扁鵲曰疾在腠理湯熨之所及也在肌膚鍼石之所及也在腸胃火齊之所及也在骨髓司命之所属無奈何也今在骨髓臣是以無請也居五日桓侯體痛使人索扁鵲已逃秦矣桓侯遂死故良醫之治病也攻之於腠理此皆争之於小者也夫事之禍福亦有腠理之地故曰聖人蚤從事焉韓喻老刺骨古扁鵲之治其病也以刀刺骨聖人之救危國也以忠拂耳刺骨故小痛在體而長利在身拂耳故小逆在心而久福在國故甚病之人利在忍痛猛毅之君以福逆耳忍痛故扁鵲盡巧拂耳則子胥不失夀安之術也病而不忍痛則失扁鵲之巧危而不拂耳則失聖人之意如此長利不逺垂功名不久立安危上池水扁鵲者姓秦氏名越人長桑君過扁鵲私坐間與語曰我有禁方年老𫝊與公乃出其懷中藥予扁鵲飲是以上池之水三十日當知物矣乃悉取其禁方盡書與扁鵲扁鵲以其言飲藥三十日視見垣一方人以此視病盡見五藏癥結特以胗脉為名耳為醫或在齊或在趙在趙者名扁鵲扁鵲以醫術名聞天下隨俗為變秦太醫令李䤈自知伎不如扁鵲使人刺殺之史記周禮釋文云史記扁鵲姓秦名少徐越人然扁鵲對虢中庶子云臣齊渤海秦越人也家在於鄭是自言也而釋文引史何所本耶血脉治晉昭公時趙簡子疾五日不知人扁鵲入視病出董安于問扁鵲扁鵲曰血脉治也昔秦穆公嘗如此七日而寤云云今主君之病與之同不出三日必間間必有言也居二日半簡子寤語諸大夫云云史五見天索隱曰案左氏簡子専國在定頃二公之時非當昭公之世且趙系家叙此事亦在定公之初能生死人扁鵲過虢虢太子死扁鵲至宫門下曰臣能之中庶子入報虢君出見扁鵲扁鵲曰太子之病所謂尸厥者也乃使弟子子陽厲鍼砥石使子豹為五分之熨以入减之齊和煑之以更熨兩脅下太子起坐更適隂陽但服湯二旬而復故故天下盡以扁鵲為能生死人扁鵲曰越人非能生死人也此自當生者越人能使之起耳史記索隱曰案𫝊𤣥曰虢是晉獻公所㓕先此百二十餘年此時安得有虢此云虢太子非也然案虢後改稱郭春秋有郭公葢郭之太子也春秋郭公在莊二十四年晉之㓕虢虢公醜奔京師在僖五年安得虢後改郭也說苑扁鵲過趙太子與虢太子事同然頃公十三年簡子不知人定公十二年毋䘏為太子時别無趙氏扁鵲又有别適耶醫之好利扁鵲過齊齊桓侯客之入朝見曰君有疾在腠理不治將深桓侯曰寡人無疾扁鵲出桓侯謂左右曰醫之好利也欲以不疾者為功云云事與蔡桓同索隱曰案傳𤣥曰是時齊無桓侯裴絪云謂是齊侯田和之子桓公午也葢與趙簡子頗亦相當簡子晉頃公九年在位與田常同時和田常曾孫也至和子桓公午一百三年安得相當也病在耳目扁鵲見秦武王武王示之病扁鵲請除左右曰君之病在耳之前目之下除之未必已也將使耳不聰目不明君以告扁鵲扁鵲怒而投其石曰君與知之者謀之而與不知者敗之使此知秦國之政也則君一舉而亡國矣秦策按扁鵲與趙簡子同時至是百三十年矣注昆弟善醫扁鵲兄弟三人並善醫魏文侯問曰子昆弟三人孰最善對曰長兄視色故名不出家仲兄視毫毛故名不出門鵲鍼人血脉投人毒藥故名聞諸侯鶡比子以一扁鵲而所載互異史世家扁鵲𫝊更先後乖舛韓非去簡子未逺止云古醫故寘諸首云膏肓醫緩晉景公疾求醫於秦秦伯使醫緩為之未至公夢疾為二竪子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何醫至曰疾不可為也在肓之上膏之下攻之不可達之不及藥不至焉不可為也公曰良醫也厚禮而歸之左成十醫國晉平公疾秦景公使醫和視之出曰疾不可為也是謂逺男而近女趙文子曰醫及國家乎對曰上醫醫國其次醫人固醫官也國語趙孟曰良醫也厚其禮而歸之左𫝊良藥孔子有疾哀公使醫視之醫曰居處飲食何如子曰丘之春居葛籠夏居宻陽秋不風冬不焬飲食不餔飲酒不醉醫曰是良藥也公孫龍子三折肱梁丘㨿遇虺毒三旬而瘳齊君㑹大夫慶之衆賔復獻改療之方宰我曰諸夫子意欲復有虺害當用之乎衆坐黙然宰我以告夫子夫子曰汝說非也夫三折肱為良醫凡言其方者稱其良也且以参㨿所以已之方之優劣也孔叢子荀寅范吉射將代晉厲公齊高彊曰三折肱知為良醫惟伐君為不可民弗與也成十二九折臂而成醫兮吾今而知其信然楚辭九章重怒已疾文摯齊人也齊威王病發使召文摰摰至謂太子曰王病怒則愈王若即殺臣奈何太子曰無慮我當救之文摰於是不時來見王及來不脱履而登床以重怒王王叱而起疾乃遂已王大怒將烹之后及太子亟争之而不能得果以鼎生烹文摰㸑之三日三夜顔色不變文摰曰誠欲殺我則胡不覆之以絶隂陽之氣王使之復之文摰乃死吕氏至忠委治尸子曰醫竘者秦之良醫也為宣王割坐為惠王治痔皆愈張子之背腫請竘治之竘曰背非吾背也任子治焉醫治之遂愈竘成善治疾也張子委治焉夫為身與國亦猶此必有所以委治然後治矣竘音叩又音四難郭玉少師程高學方診六徴之技隂陽隱測之術和帝時為太醫丞多有效應帝竒之玉仁愛不矜雖貧賤厮養必盡其心力而療治貴人時或不愈帝乃令貴人羸服變處一針即差召玉即詰問其狀對曰醫之為言意也腠理至㣲隨氣用巧針石之間毫芒即乖神存於心手之際可得解而不可得言也夫貴者處尊高以臨臣臣懷怖懼以承之其為療也有四難焉自用意而不任臣一難也將身不謹二難也骨節不彊不能使藥三難也好逸惡勞四難也針有分寸時有破漏重以恐懼之心加以裁慎之志臣意且猶不盡何有於病哉此其所為不愈也帝善其對後漢書仲景方南陽張機字仲景總角造何顒謂曰君用思精而韻不高後將為良醫卒如其言顒先識獨覺言無虛發玉仲宣年十士嘗遇仲景仲景曰君有病宜服五石湯不治且成後年三十當眉落仲宣以其貰長逺不治也後至三十果疾成竟眉落其精如此仲景在京師為名醫於當時為上手時以為扁鵲倉公無以加之何顒别𫝊脉經王叔和性沉静好著述考覈遺文探摭羣論撰成脉經十卷編序次張仲景方論編為三十六卷大行於世高湛養生論刳破腹背華佗字元化一名旉遊學徐土兼通曉養性之術年且百嵗而猶有壯容時人以為仙精於方藥處不過数種心識分銖不假稱量針炙不過数處若疾發之於内針藥所不能及者乃令先以酒服麻沸散既醉無所覺因刳破腹背抽割積聚若在腸胃則斷截􅀢浣除去疾穢既而縫合𫝊以神膏四五日創愈一月之間皆平復後漢虢中庶子曰上古俞跗治病不以湯液乃割皮解肌湔浣腸胃潄滌五臟史記白帖作扁鵲云誤越人救虢太子於既殞胡巫活絶氣之蘇武淳于能解臚以理腦元化能刳腹以濟胃文摰衍期以瘳危困仲景穿胸以納赤餅此但醫家猶能若是抱朴出眼瞳司馬景王嬰孩時有目疾宣王令華佗治之出眼瞳割其疾而納之𫝊藥沈約晉書巴豆杏子丸程㨿為太醫令武帝初受魏禪改元為太始而㨿貢雉頭裘帝以竒伎異服典禮所禁焚之於殿前㨿以醫術承恩出入禁闥因為賈后合巴豆杏子丸害愍懷太子遂就戮焉晉中興書自利利人于發開深思孤發妙通醫法或問法師高明剛簡何以醫術經懷荅曰明六度以除四魔之病調丸候以療風寒之疾自利利人不亦可乎高僧𫝊八毒丸許永為豫州刺史鎮歴陽其弟得病心腹堅痛居一夜忽聞屏風後有鬼言何不速殺之明日李子豫當以赤丸打汝汝即死矣腹中鬼對曰吾不畏之及旦遂使人迎子豫既至病者忽聞腹中有呻吟之聲子豫遂於巾箱中出八毒赤丸與服之湏臾腹中雷鳴彭轉大利所病即愈續搜神記鬼遺方劉涓子於丹陽郊外較射忽有一物高二丈許因射而中之走如電激聲若風兩夜不敢追明日率数十人尋其蹤跡至山下見一小兒問曰何往小兒云主人昨夜為劉涓子所射取水以洗瘡因問主人是誰荅曰是黄父鬼乃依小兒還未至聞搗藥聲遥見三人一人卧一人閲書一人搗藥即齊聲呌突而進三人並走遺一帙癰疽方並一臼藥時涓子得之從宋武帝北征有被創者以藥塗之隨手而愈論者謂聖人作事天必助之葢天以此授武帝也涓子用方為治千無一失演為十卷號曰鬼遺方龔慶宣鬼遺方序通靈錢塘徐秋夫善治病宅在湖溝橋東夜聞空中呻吟聲甚苦秋夫起至呻吟處問曰汝是鬼邪何為如此饑寒湏衣食邪抱病湏治療邪鬼曰我是東陽人姓斛斯平昔為樂游吏患腰痛死今此湖北雖為鬼苦亦如生為君善醫故來相告秋夫曰但汝無形何由治鬼曰但縛茅作人按穴鍼之秋夫如其言為針四處又針肩井三處設祭而埋之明日見一人來謝曰䝉君療疾復為設祭除饑解疾感惠實多忽然不見當代服其通靈秋夫宋元嘉六年為奉朝請齊諧記談天使謝善孫法宗忽苦頭痛夜有女人至曰我是天使來相謝行創本不關善人使者誤相及但取牛糞煑𫝊之即驗一𫝊便瘥一境頼之宋書徙癰薛伯宗善徙癰公孫㤗患發背伯宗為氣封之徙置齋前柳樹上明日而癰消樹邉便起一瘤如拳大稍稍長二十餘日瘤大濃爛出黄赤汁升餘樹為之痿損南史靈府許智藏高陽人少以醫術自達陳亡入隋使詣揚州㑹秦王浚有疾上馳召之夜夢其亡妃崔氏泣曰本來相迎如聞許智藏將至其人若到當必相苦為之奈何明日俊又夢崔氏曰妾得計矣當入靈府中以避之藏至為俊診脉曰疾已入心即當發癎不可救也果如言俊数日而夢隋書名手别脉許𦙍宗醫術若神或謂曰公何不著書以貽將來𦙍宗曰醫者意也在人思慮又脉候幽㣲苦其難别意之所解口莫能宣且古之名手唯是别脉脉既精别然後識病夫病之於藥有正相當者唯湏單用一味直攻彼病藥力既純病即立愈今人不能别脉莫識病源以情臆度多安藥味譬之於獵未知兔所多發人馬空地遮圍或冀一人偶然逢也如此療疾不亦踈乎假令一藥偶然當病復共他味相和君臣相制氣勢不行所以難差諒由於此脉之深趣既不可言虛設經方豈加於舊故不能著作耳舊唐書談賔録醫王本草序云醫王子姓韋名古字老師元是踈勒國得道人也身被毳袍腰懸数百葫蘆頂戴紗巾手持藜杖常以一黑犬同行壽年五百餘嵗洎開元中孟夏之月有人疾患稍多疼困師發願心存目想遂普施藥餌無不痊平覩之者便愈後乃圖形供養皇帝敬禮為藥王菩薩神仙𫝊云昔堯舜之時殷湯之際周秦以後大漢至唐凡五度化身來救貧病其犬化為黑龍背負老師沖天而去翻譯名義福醫王彦伯自言醫道將行列三四竈煑藥於庭老幼塞門而請彦伯指曰熱者飲此寒者飲此風者飲此氣者飲此各負錢帛來酧無不効者國史補六氣六淫虞少卿洮蜀之上醫也長興初佐蜀董太尉璋久患渴疾遣求醫孟蜀遣虞卿而往董公曰璋之所患經百名醫而無㣲差何也虞卿對曰君之疾非惟渴漿而似渴士得其多士不勞藥石而自愈矣董公大悦時董公有面南之志虞卿故以譏之又曰洮聞天有六氣降為六淫淫生六疾攻於六腑六氣者隂陽風雨晦明也是以六隂隨焉六疾者寒熱末腹惑心也是以六腑隨焉故脾為離宫腎為水藏晦明勞役百疾生焉大此視聼至煩皆有所損心煩則亂事煩則變機煩則失兵煩則反五音煩則損耳五色煩則損目滋味煩則生疾男女煩則减壽古者男子莫不戒之君今日有萬思時有萬機樂淫於外女淫於内渴之難療其由此乎董公疾既平復於是厚禮歸之鑑戒録筆頭蘸藥李王公主患喉癰数日痛腫飲食不下纔召到名醫言煩鍼刀開方得潰破公主聞用鍼刀哭不肯治痛逼水穀不入忽有草澤醫曰某不使鍼刀只用筆頭蘸藥癰上霎時便潰公主喜令召之方兩次上藥遂潰出濃血一盞餘便覺兩日瘡無事令供其方醫云乃以鍼繫筆心中輕輕劃破其潰散耳别無方言醫者意也以易取效耳名醫録不用古方張元素字潔古學醫夜夢有人用大斧長鑿鑿心開竅納書数卷於其中自是洞徹其術治病不用古方其説曰運氣不齊古今異軌古方新病不相能也自為家法云金史選名姓後夫醫者非仁愛不可託也非聰明理逹不可任也非亷潔淳良不可信也是之古之用醫必選名姓之後其能能仁恕博愛其智能宣暢曲解能知天地神祗之次能明性命吉凶之数處虛實之分定逆順之節原疾疹之輕重而量藥齊之多少貫㣲達幽不失細小如此乃謂良醫且道家則尚冷以草木用冷生醫家則尚温以血脉以煗通徒知其大趣不達其細理不知剛柔有輕重節氣有多少進退盈縮有節却也名醫達脉者求之寸口三候之間則得之矣度節氣而候温冷叅脉理而合輕重量藥石則相應此可謂名醫醫有名而不良者有無名而良者人主之用醫必叅知而隱括之物理論異名天狗人参也天猪菖蒲也天牛雌黄也天羊雄黄天鼠防風也日精雲母也地髓地黄也道人頭蒼耳茱茰别名秋子古人謂术為山精兔縷絲也海録胡王使者羗活也史系甘草市語名國老杭州小說假君子牽牛也含丸使者花椒也九日三官呉茱茰也時美中蒔蘿也魏去疾阿魏也骨鯁元君萆薢也野父白頭翁也玉虛飯龍腦也黑龍衣鱉甲也沙田髓黄精也無聲虎大黄也草兵巴豆也琥珀孫松脂也一寸楼臺蜂窠也八月珠茴香也吉祥杵桔梗也丒寶牛黄也化米先生神麯也混沌螟蛉寄生草也清異録丹山魂雄黄青要女空青酉陽不周聼于志寧與司空李勣修定本草並圖合五十四篇曰昔陶宏景以神農經合雜家别録注名言之江南偏方不周曉藥石往往紕繆四百餘物今考正之唐書藥籠中物元行冲狄仁傑器之嘗謂仁傑曰下之事上譬富家儲積以自資也脯腊膎胰以供滋膳参术芝桂以防疾疢門下充㫖味者多矣願小人備一藥石可乎狄仁傑笑曰此正吾藥籠中物也禦疾夫三牲五穀稟五行以生也發為五味天地生之所以奉人聖人節調以致康强若乃藥劑餌者所以禦疾豈常進之餌哉裴𫝊對脉宫中以診脉為對脉大中遺亊桐君門擅桐君之術家𫝊葛氏之方白拈葛洪有金匱方卜筮龜筴龜為卜筴為筮卜筮者先聖王之所以使民信時日敬鬼神畏法令也所以使民决嫌疑定猶豫也故曰疑而筮之則弗非也曲禮蓍龜者禽獸草木之久而能知吉凶也洪範五行𫝊乾草槁骨衆多獨以蓍龜何龜之言久也蓍之言耆也白虎通大卜官各以牲祠龜䇿塗以牲血謂之釁者龜田所以卜也蓍草所以筮也蔡邕月令章句法天地卜者以法天地象四時順於仁義分䇿定卦按式正綦然後言天地之利害事之成敗昔先王定國必先龜䇿日月而乃敢代正時日乃後入家産子先必占吉凶後乃有之自伏羲作八卦周文王演三百八十四爻而天下治勾踐倣文王八卦以破敵國覇天下史記日者三兆太卜掌三兆之法一曰玉兆二曰瓦兆三曰原兆周禮杜子春云玉兆帝顓頊之兆瓦兆帝堯之兆原兆有周之兆始筮庖犧氏作始有筮古史考伏羲得神蓍而定龜䇿鄭魴禹穴碑古司怪主卜元命包巫咸作巫世本飛燕梁元帝洞林序云周王白雉之筮殷人飛燕之卜蓍名聚雪非關北極之山卦有宻雲能擁西郊之氣占于熒惑昔者桀筮伐有湯唐而枚卜占於熒惑云不吉不利出征惟利安處彼為狸我為鼠勿用作事恐傷其父歸藏遇太公西伯將出獵卜之曰所獲非龍非彪非虎非羆所獲覇王之輔於是周西伯獵果遇太公齊世家六韜曰文王卜田史編曰卜田渭陽將大得焉非熊非羆非虎非狼兆曰得公侯天遺汝師以之佐昌施及三王大吉言千字文吕望非熊或者以為誤豈止㨿史記耶卜居昔周成王之卜居成周也其命龜曰予一人兼有天下辟就百姓敢無中土乎使予有罪則四方伐之無難得也周公卜居曲阜其命龜曰作邑于山之陽賢則茂昌不賢則速亡季孫行父之戒其子也曰吾欲室之俠於兩社之間也使吾後世有不能事上者使其替之益速如是則曰賢則茂昌不賢則速亡安在擇地而封哉或示有天固也說苑至公决疑楚伐鄖莫敖曰盍請濟師於王對曰師克在和不在衆商周之不敵君之所聞也成軍以出又何濟焉莫敖曰卜之對曰卜以决疑不疑何卜遂敗鄖師於蒲騷左桓十一筮短龜長初晉獻公欲以驪姫為夫人卜之不吉筮之吉公曰從筮小人曰筮短龜長不如從長弗聼立之生奚齊僖四韓簡告惠公曰龜象也筮数也物生而後有象象而後有滋滋而後有数十五杜注云龜象筮数故象長数短遷繹邾文公卜遷於繹史曰利於民而不利於君邾子曰茍利於民孤之利也天生民而樹之君以利之也民既利矣孤必與焉左右曰命可長也君何弗為邾子曰命在養民死之短長時也民茍利矣遷也吉莫如之遂遷於繹五月邾文公卒君子曰知命文十王為祟弗祭楚昭王有疾卜曰河為祟王弗祭大夫請祭諸郊王曰三代命祀祭不越望江漢睢漳楚之望也禍福之至不是過也不穀雖不德河非所獲罪焉遂弗祭孔子曰楚昭王知大道矣其不失國也宜哉哀六偶筮得旅仲尼魯人生不知易本偶筮其命得旅請益於商瞿氏曰子有聖知而無位孔子泣而曰天也命也鳯鳥不至河無圖至嗚呼天命之也歎訖而息志庖犧先文乘舟而來孔子使子貢往外久而不來孔子謂弟子占之遇鼎皆言無足不來顔子掩口而笑子曰囘也哂謂賜來也曰無足者乘舟而來賜至矣其朝也子貢果朝至驗如顔回之言衝波𫝊鼎折足魯將伐越筮之得鼎折足子貢占之以為凶何則鼎而折足行用足故謂之凶孔子占之以為吉曰越人水居行用舟不用足故謂之吉魯伐越果克之論衝筮賁愀然孔子常自筮其卦得賁焉愀然有不平之狀子張進曰師聞卜者得賁卦吉也而夫子之色有不平何也孔子對曰以其離耶在周易山下有火謂之賁非正色之卦也夫質也黑白宜正焉今得賁非吾兆也吾聞丹漆不文白玉不雕何也質有餘不受師故也家語病卜孔子病子貢出卜孔子曰子待也吾坐席不敢光居處若齋飲食若祭吾卜之久矣上陽豫孔子修春秋九月而成卜之得陽豫之卦孔演圖宋均云夏殷卦名鑿龜数筴趙嘗鑿龜数筴而北伐燕將刼燕以逆秦兆曰大吉始攻大梁而秦出上黨矣兵至釐而六城㧞矣至陽城秦㧞鄴矣龎援揄兵而南則鄣盡矣臣故曰趙龜雖無逺見於燕且宜近見於秦秦以其大吉辟地有實救燕有名趙以其大吉利削兵辱主不得意而死又非秦龜神而趙龜欺也韓飾邪詐卜鄒忌與田忌不相善公孫閔謂鄒忌曰何不詐令人操千金卜於市曰我田忌之人也吾三戰而三勝聲威天下欲為大事亦吉乎卜者出因令人捕為卜者驗其辭於三之所鄒忌從之田忌懼無以自白遂率其徒攻臨淄欲殺鄒忌不勝而奔春秋後語法天象時司馬季主卜於長安市宋忠賈誼謂之曰何居之卑何行之汗季主捧腹大笑二君曰夫卜筮者世俗之所賤簡也世皆言曰夫卜者多言誇嚴以得人情虛高人禄命以說人志擅言禍災以傷人心矯言鬼神以盡人財厚求拜謝以私於己此吾之所耻季主曰夫卜者必法於天地象四時順於仁義分䇿定卦按式正綦然後言天地之利害事之成敗夫卜筮者之為業也積之無委藏之不用府庫徙之不用輜車負裴之不重止而用之無盡索之時持不盡索之物㳺無窮之世雖莊氏之行未能增於是也子何故而云不卜哉史記賤業惠衆嚴君平卜筮於成都市以為卜筮者賤業而可以惠衆人有邪惡非正之問則依蓍龜而言利害與人子言依於孝與人弟言依於順與人臣言依於忠各因執導之以善從吾言者已過半矣裁日閱数人得百錢足自養則閉肆下簾而授老子博覽無不通依老子嚴周之指著書十萬餘言漢書聖人上原道徳之意下揆天地之心崇髙顯榮吉祥盛徳深閎浩大尊寵窮極莫大乎生萬物陳列竒怪珍寶金玉珠璧利深得巨莫大乎身禍世之匠亂國之工絶利天地傷害我身莫大乎名生橋長溢困民貧國擾濁精神使心多欲叛天違道争為盗賊天下不親世多兵革莫大乎貨故得之與亡或病或利得名得貨道徳不居神明不留大命以絶天不能救失名失貨道徳是祐神明是助明顯自然富配天地故細身大名未可與論至道也輕身重國未可與圖利也君平老子指歸此段非卜筮事以所見者少故附之青葢入洛陸抗之克歩闡孫皓意張乃使尚廣筮并天下遇同人之頥對曰吉庚子嵗青盖當入洛陽故皓不修其政乃嘗有窺上國之志呉志百二晉元帝以丁丑嵗稱晉王置宗廟使郭璞筮之云享二百年自丁丑至劉裕禅之嵗年在庚申為一百四嵗然丁丑始係西晉庚申終入宋年所餘惟一百有二数僕葢以百二期促而婉而倒之為二百年其驗如此晉書改元庾翼幼時嘗令璞筮公家及身卦成曰立始之末丘山傾長順之初子凋零及康帝即位將改元為建元或謂庾氷曰子忘郭生之言邪立始建元也丘山土名此號不宜用氷撫心歎恨帝崩何充改元為永和庾翼曰天道精㣲乃當如是長順者永和也吾庸得免乎其年翼卒上自卦知凶郭璞毎自為卦知其凶終嘗行建康柵塘逢一趣歩少年便牽住脱絲布袍與之此人乃受及當死果此人行刑傍人皆為求属璞曰我託之久矣此人為之歔欷哽咽續搜神記别龜甲柳世隆善卜别龜甲價至萬永明初世隆曰永明九年我亡後三年丘山崩齊亦於此季矣屏人命典籖李黨取筆及高齒屐題簾箔旌曰永明十一年因流涕謂黨曰汝當見吾不見也齊書鬼賊所留梁武昌太守朱買臣聞元帝議遷都入勸梁王云建業舊都茔陵攸在荆鎮邉疆非王侯宅願陛下勿疑致後悔也臣家在荆州豈不願陛下但恐是臣富貴非陛下富貴耳乃召卜者杜景豪决去留遇兆不吉荅曰未去景豪退而言曰此兆為鬼賊所留也三國典畧後生可畏釋曇遷俗姓王氏年十三初學於舅氏權㑹長以周易隨言即曉始學其半餘半自通有一嫗失物就㑹决之得兊卦㑹令遷試辨之遷曰若如卦判定失金釵嫗驚喜曰實如所辨遷曰兊是金位字脚兩垂似於釵象耳舅曰更依卦審悉盗者為誰對曰夫者西家白色女子奉口總角可年十四五者將去尋可得之後如言果獲有問其故遷曰兊是西方少女之位五色分方西為白也兊字上㸃表總角之象内有失形表奉口之相推測而知非有異術舅乃釋䇿而歎曰方驗後生可畏宣尼不誣矣續高僧𫝊筮遇乾鼎宋景業明周易為隂陽緯候之學齊文宣作相在晉陽遷至并州令景業筮遇乾之鼎景業曰乾君也天也易曰時乘六龍以御天鼎五月卦也宜以仲夏吉辰順天受禪或曰隂陽書五月不可入官犯之卒於其位景業曰此乃大吉王為天子無復下期豈得不終於其位帝大悅北史三錢並舞長慶時鄴中有五明道士者善隂陽厯数尤攻卜筮成德軍節度田宏正時王庭凑為部將遺使於鄴詣五明䆒平生之泰丕士耳為卜之卦成而三錢並舞良久方定而六位俱重道士曰此卦純乾變為坤坤土也大夫將來秉旄不逺兼有土地山河之分事將集矣速宜歸乎及還家未踰旬值軍民大變宏正為亂兵所害士大夫將校共推庭凑庭凑既立甚有治聲在位十三年子孫嗣立至趙王鎔凡五世六姓一百餘年㓕初庭凑之立也遣人就鄴迎五明置於府曾從容問已將來禄壽道人曰三十年願明公竭節勤王保神嗇氣必享殊壽後裔兼有二王春秋所謂五世其昌八世之後莫之與京公曰素無勲德此言非所敢望因以数百金為壽二王景崇封常山王鎔為趙王也耳目記胡蘆生劉闢初登第詣卜者胡蘆生筮卦以質官禄生雙瞽卦成謂劉闢曰自此二十年禄在西南然不得善終闢留束素與之釋褐從韋臯於西川至御史大夫軍司馬既二十年韋病命闢入奏請益東川如開元初之制詔未允闢乃㣲服單騎復詣胡蘆生筮之生揲著成卦謂闢曰吾二十年前嘗為一人卜乃得無妄之隨今得前卦得非曩賢乎闢聞之即依阿唯諾生曰若審其人禍將至矣闢甚不信乃歸蜀果叛憲宗擒戮之原化記易聖昭宗時有董賀者自云鞏洛人也因避地來渉河遊趙家於常山以卜筮為業而言吉凶必效時人謂之易聖公留巖曽詣之生謂曰君他日必成偉器然勿以春日為恨初不曉其意及老乃悟葢遲遲之謂也耳目記龜精錢元懿終年六十六初元懿之為新定有士方生時人號為龜精嘗疏卜辭以貽元懿曰太一接天河金華寳貝多君侯六十六别處下經過至是皆如其言呉越備史精誠陸龜䝉雜說季扎以樂卜趙孟以詩卜襄仲歸父以言卜子游子夏以威儀卜沈尹氏以政卜孔成子以禮卜其應也如響無他圖在精誠而已不精誠者不能自卜况吉凶他人乎蠡卜蘇秦事鬼谷子學終辭歸道乏困行以燕人蠡卜𫝊說自給春秋後話雜卜卜之流雜書𫝊虎卜紫姑卜灼骨卜牛蹄卜鳥卜雖不法於蓍龜亦有可以稱者北户録邕州南有鷄卵卜卵卜嶺表凡小事必卜名雞卜鼠卜米卜著卜牛骨卜雞卵卜田螺卜篾竹卜畨禺雜録鷄卜時滅南越越人勇之言越人俗信鬼昔東甌王敬鬼夀至百六十嵗後世謾忌故衰耗乃令越巫立越祝祠而以雞卜上信之越祠雞卜始用焉史記御覽引史武武帝令越巫立祠祝祠而以雞卜上信之誤謀及蓍龜者聖人之所用也書曰女則有大疑謀及卜筮易曰定天下之吉凶成天下之亹亹者莫善於蓍龜及至蓍龜解於齋戒而婁煩卜筮神明不應故筮凟不告易以為忌龜厭不告詩以為刺漢藝文志月卜前九汾州有易生非卜筮而前知柳公綽嘗問之易曰僕射只怕八井後果於并州遇疾柳氏家訓序日者墨子比之齊遇日者日者曰帝以命日殺黒龍於北方而先生之色黑不可以北墨子不聼遂北至淄水墨子不遂而反鳥日者曰我謂先生不可以北墨子古人占候卜筮通謂之日者史注命書李虛中字常容學無所不通最深於五行書以人之始生年月日所耳日辰支於相生勝衰死旺相斟酌推人夀大貴賤利不利輙先處其年時百不失一二其說汪洋奥美枉錯重出學者就𫝊其法昌黎集厄在白馬李賛皇初掌北門奏記有日者說曰公他日位極人臣但厄在白馬爾及豋相位雖族中亦並未有畜白馬者㑹昌初入廟堂専持國柄然性多忌刻當金之士有不恊者必遭譴逐翰林學士白敏中大懼遂諷給事中韋宏景上有霜府不合兼領三司錢穀専政大甚武宗由是疑之及宣帝即位白自内庭豋庸出徳裕為荆南節度使旋属淮南李相有呉汝納之獄上刑部侍郎馬植専鞠其事盡得德裕黨庇之迹因是坐罪竄南海殁而不返厄在白馬其信乎要氏談録按㝠太尉衛國公為并州從亊到職未旬月忽有王山人者詣門請謁公命與坐乃曰某善按㝠也公初未之竒因請正寢備几案紙筆者水而已因令垂簾伺之主與公偕坐於西廡下頃之王生曰可驗矣紙上書八字甚大且有楷注曰位極人臣夀六十四王生遂請歸竟不知所去及㑹昌朝三䇿一品薨於海南果符王生所按之年松窓雜録軌革西川費孝先善軌革世皆知名有大若人王旻因貨殖至成都求為卦孝先曰教住莫住教洗莫洗一石穀搗得三斗米遇明即活遇暗即死再三戒之令誦此数言足矣旻志之及行途中遇大雨憇一屋下路人盈塞乃思曰教住莫住得非此耶遂冒雨行未幾屋顛覆獨得免焉旻之妻己私鄰比欲講終身之好俟旋歸將致毒謀旻既至妻約其私人曰今夕新沐者乃夫也日欲晡呼旻洗沐重易巾櫛旻悟曰教洗莫洗得非此也堅不從婦怒不省自沐夜半反被害既覺驚呼隣里共視皆罔測其由遂被囚繫拷訊獄就不能自辨郡守録狀旻泣言死即死矣但孝先所言終無驗耳左右以是語上達郡守守命未得行法呼旻問曰汝隣比何人也曰康七遂遣人捕之殺汝妻者必此人也已而果然因謂僚佐曰一石穀搗得三斗米非康七乎由是辯雪誠遇明即活之效捜神秘覽晉書符融辯董豊馮昌事相類驗於事後自至和嘉祐以來費孝先以術名天下士大夫無不作卦影而應者甚多獨王平甫不喜之嘗謂人曰占卜本欲前知而卦影驗於事後何足問耶東軒羊録拆字謝石潤夫成都人宣和間至京師以拆字言人禍福求相者但隨意書一字即就其字離拆而言無不竒中者名聞九重徽宗因書一朝字令中貴人持往試之石見字即端視中貴人曰此非觀察所書也然謝石賤術據字而言今日遭遇即因此字黥配逺行亦此字也但未敢遽言之耳中貴人愕然且謂之曰但有所據盡言無懼也石以手加額曰朝字離之為十月十日字非此月此日所生之天人當誰書也一座盡驚中貴馳奏翊日召至後苑令左右及宫嬪書字示之皆據字論說禍福俱有精理錫賚甚厚並與補承信郎縁此四方求相者其門如市有朝士其室懷袵過月手書一也字令其夫持問石是日座客甚衆石詳視字謂朝士曰此閣中所書否曰何以言之石曰謂助語者哉焉乎也固知是公内助所書尊閣盛年三十一否曰是也以也字上為三十下為一字也然吾官寄此當力謀遷動而不可得否曰正以此為撓耳葢也字着水則為池有馬則為馳今池運則無水陸馳則無馬是安可動也又尊閣父母兄弟近身親人當皆無一存者以也字著人則是他字今獨見也字而不見人故也又尊閣其家物産亦當蕩盡否以也字着土則為地字今又不見土也二者俱是否曰誠如所言也朝士即謂之曰此皆非所問者但賤室以懷姙過月方竊憂之所以問耳石曰是必十三箇月也以也字中有十字并兩傍二竪下一畫為十三也石熟視朝士曰有一事似渉竒怪固欲不言則吾官所問正决此事可盡言否朝士因請其說石曰也字着䖝為蛇字今尊閣所姙殆蛇妖也然不見蟲蠱則不能為害謝石亦有薄術可為吾官以藥下驗之無苦也朝士大異其說固請至家以藥投之果有数小蛇而體平都人益共神之而不知其竟挾何術也春者紀聞太字徽宗令中官索東宫書一字來乃以太字進又問石石曰此天子也左右為大懼上詢謂何石曰太子㸃㣲横此必太子也他日移置諸上豈非天字耶上以金帶錫之鐡圍山叢談問字徽宗書問字筆勢兩直飛開命一𨽻持往石宻于側緘付之戒其到家方可發封𨽻歸奏上啓讀乃曰左看是君右看是君聖人萬嵗遂補承信郎有道士聞其事亦以問字占石曰門雖大只有一口道士愕然葢所住觀無他黄冠唯童僕数軰猶未以為竒復書器字倩俗人往占曰人口空多皆在户外於是大服之乃字謝石既歸蜀有士人文覺戚以乃字為問謂其無可拆也石曰及字不成君終身不及第石在徽宗時常特補承信郎後因范覺民作相討論追奪一日謂石我亦能拆字石詰之則曰爾姓謝所謂身在討論之中石則終身右字不能出頭聞者大笑三老堂雜志杭字高宗未登杭時用杖就地上書一字令測曰土上一字王字也終王天下議都杭州書杭字曰烏珠又來烏珠金國大酋也後果再至江湖紀聞春字高宗一日寫春字命相之其上半體墨重石曰春頭太重壓日無光時秦檜専權秦字春頭也日君象也檜聞其言以為為已發恨之求其罪竄逺州拆謝石字謝石既以相字著名常遊丹陽見道姑行市中執巨扇其上大書拆字如神石笑曰此術豈有勝我者何物老嫗敢爾呼入室書石字示之姑曰為名不成得召卻退逢皮則破遇卒則碎石視之不樂然心服其言明日訪所在無識之者葢異人也建炎中石為利路一尉武將王進邀之飲使拆其名石曰家欲走若圖事必敗時進以謀叛結黨欲發不以其語為然將起亂之夕乳媪踰墻告官逮捕下獄始歎息曰悔不用謝石之言郡守疑石同謀而知反不告亦逮治坐削藉黥配蓬州後詢王進鄉里乃滄州南皮且起於卒伍悉如道姑言石赴配所道復遇之道姑道姑靠山而立令石相之人倚山而立莫非仙乎道姑批其頰曰爾以多口致累仍復然乎自爾黥迹盡滅竒字賈似道有異志有一術士能拆字賈以䇿畫地作竒字術曰公相之志不諧矣道立又不可道可又立不成賈黙不語禮而遣之恐泄其事使人害諸也草本子桑相元僧格丞相元名桑哥拜相後延術者書桑字令測曰今已相矣但欲知相位日月久近曰木字十八字也上有三箇十字在相位當有四十八箇月相哥不滿遂更名相哥復書相字令測曰目字横看又是四字若是則横直只四十八箇月至元辛夘正月販時其言果驗五星言五星奥而慧善辨寶玉能别婦人妍醜聞其聲咳扣問數語即知其人美惡情性趙信相丞相専俾置姫妾并玉器云癸孝雜志巫以舞降神巫祝也女能事無形以舞降神也象人兩襄舞形與工同意古者巫咸初作巫説文巫覡古者民神不雜民之精爽不􅠬貳者而又能齊肅𠂻正其知能上下比義其聖能光逺宣朗其明能光照之其聰能聼㣲之如是則明神降之在男曰覡在女曰巫是使制神之處位次主楚語周禮司巫掌羣巫之政令若國大旱則率巫而舞雩有男巫女巫桑田巫晉侯夢大屬被髪及地摶膺而踊曰殺余孫不義余得請於帝矣壞大門及寢門而入公懼入於室又壞户公覺召桑田巫巫言如夢公曰何如曰不食新麥矣晉侯欲麥使甸人獻麥饋人為之召桑田巫示而殺之將食張如厠䧟而卒成卜愚婦人嵗旱穆公召縣子而問然曰天久不雨吾欲暴巫而奚若曰天則不雨而望之愚婦人於以求之毋乃已疏乎檀弓信巫昔楚靈王驕逸輕下信巫祝之道躬儛壇前呉人來攻其國人告急而靈王鼓舞自若桓子新論何不告祀哀公射而中稷其口疾不食肉祠稷而善卜之巫官巫官變曰稷負五種託株而從天下未至於地而株絶獵谷之老人張祍以受之何不告祀之公從之而疾去說苑鄴令沈巫西門豹為鄴令鄴三老廷掾嵗歛百姓錢為河伯娶婦巫行視小家女好者浮之河上行數十里乃没鄴至呼河伯婦視之曰是女子不好煩大巫嫗為入報河伯更求好女送之使吏卒抱太巫姫投河中復以弟子一人投河中趣之有頃曰弟子何久也凡三投弟子復投三老河中史記神巫鄭有神巫曰季咸云人之死生存亡禍福夀夭期以嵗月旬日若神鄭人見之皆棄而徙列子巫咸欲從靈氛之吉占兮心猶豫而狐疑巫咸將夕降兮懷椒糈而要之離騷巫咸古神巫也當殷中宗之世椒香物所以降神糈精米所以享神注巫陽帝告巫陽曰有人在下我欲輔之魂魄離散汝筮予之巫陽乃下招曰魂兮歸來些宋玉招魂求馬漸巫班超使西域于間王廣徳聞超至禮意甚踈其俗信巫巫言神怒何故欲向漢漢使有驪馬急求取以祠我廣德就超請馬超許之而令巫自求取馬有頃巫至超即斬其首送廣德因辭讓之東觀漢記巾書兩口董卓信巫軍中常有巫都言祈求福利言從卓求布倉卒無布有手巾言曰可用耳便取書手巾上作兩口一口大一口小相累以舉謂卓曰慎此也卓後為吕布所殺幽明録丹珠夏統字仲御從父敬寧祠先人迎女巫章丹陳珠二人並有國色裝服甚麗善歌舞又能隱形匿影甲夜之初擊鼓撞鐘間以絲竹丹珠乃㧞刀破舌吞刀吐火雲霧杳㝠流光電發統諸從兄弟欲往觀之難統於是共紿之俱行統入門忽見丹珠在中庭輕歩囬舞靈談鬼笑飛觸桃拌酧酢翩翩統驚愕而走不由門破籓而出晉書宣教無虛義熈五年宋武帝北討鮮卑大勝進圍廣固軍中將佐乃遣使奉牲薦幣謁岱廟有女巫秦氏奉高人同縣索氏之寡妻也能降靈宣教言無虚唱使使者設禱因訪克㨗之期秦氏乃稱神教曰天授英輔神麾所擬有征無戰蕞爾小虜不足制也到來年二月五日當尅如期而三齊定焉述異記楊婆欝林王在西州令女巫楊氏禱祠速求天位及大惠薨謂由楊氏之力倍加敬信呼楊婆宋氏以來人間有楊婆兒歌葢此徴也武帝有疾又命楊氏日夜祈禱齊書刻期得魅宋高祖永初中張春為武昌太守時人有嫁女未及升車忽便失性出外歐擊人乘自云已不樂嫁俗人巫説是邪魅將女至江際擊鼓以術呪療春以為欺惑百姓刻期湏得妖魅翌日後有一青蛇來到巫所即以大釘釘其頭至日中復見大龜從江來伏於巫前更以朱書龜背作符更遣入江至暮有大白鼉從江中出乍沉乍浮向龜隨後催逼鼉自分死冒來先入慢與女辭訣女慟哭云失其好姻自此漸差或問巫曰魅者歸於一物今安得有龜蛇巫云蛇是𫝊通龜是媒人鼉是其對所獲二物悉以示春春始知靈驗幽明録廣五行記天神賜符宋文帝時務本業使宫内皆蚕欲以風勵天下有女巫嚴道育夫為刼坐没入奚官劭姊東陽公主應閣婢王鸚鵡白公主道育通靈主乃白上託云善蚕求召入道育云所奉天神常賜符應時主夕卧見流光相隨狀若螢火遂入巾箱化為雙珠圓青可愛於是主及劭並信惑之號曰天師後遂為巫蠱行弑逆而敗南史誡有暴禍魏道武開頗有學問曉天文先是有神巫誡云當有暴禍惟誅清河殺萬民乃可以免開乃滅清河一郡常手自殺人欲令其数滿萬夜恒變易寢處人莫能知惟愛妾名萬人知其處萬人與門子清河王私通慮事覺欲殺開令萬人為内應夜伺開獨處殺之開臨死曰清河萬人之言乃汝等也宋書索虜𫝊妖妄顔之推曰吾家巫覡符章絶於言議汝曹所見勿為妖妄家訓湏衣為信袁君正字世忠昻子也少聰敏以貴公子早得時譽為豫章内史性不信巫有師萬世榮稱通術為一郡巫長君正在郡小疾主簿熊岳薦之師云湏疾者衣為信命君正以所着襦與之事竟取襦云神將送與北斗君君王使檢諸身於衣裏獲之以為亂政即刑于市而焚其神一郡無敢行巫南史十六衆鬼為厲衛昭王爽討突厥明年徴為納言高祖甚重之未幾爽寢疾上使巫者薛榮宗視之云衆鬼為厲爽令左右驅逐之数日有鬼物來擊榮宗榮宗走下階而斃其夜爽薨隋書左道肅宗重隂陽鬼神之事或命巫媪行郡縣令厭勝之術有祓人王璵遂以左道為相代宗亦篤信之凡所修築動牽禁忌而奸人黎幹得以左道尹京又内集衆工編刺珠繡為御衣既成而焚以為禳除且無虛月唐書分祈山川肅宗嘗不豫太卜云祟在山川王璵乃遣女巫分行天下祈祭名山大川巫皆盛服來𫝊而行上令中使監之因縁為姦所至干託長吏以邀賂遺一巫盛年而美以惡少數十自隨尤為蠧弊與其徒宿於黄州之𫝊舍刺史左震晨至驛門扄鐍不可啓震破鎖而入曵女巫階下斬之所從惡少年皆斃閲其贓賂數十萬震籍以上聞仍請贓錢貸貧民租稅其中使發遣歸京肅宗不能詰上月明致雪朔方先鋒兵馬使南陽郡王白元允與回紇合兵於涇州靈臺縣西共破吐蕃等十餘萬衆初元白光等到靈臺縣欲探知城勢為月明思少隂晦回紇使師巫便致風雪及逹明戰吐蕃盡寒凍弓矢皆廢披攬徐進元光與回紇隨而殺之上天師㑹昌中晉陽令狄惟謙梁公之後善為政州境亢陽於晉祠者数旬無應有女巫郭者攻符術厭勝之道有監軍携至京師因縁出入宫掖其後告歸遂號天師旣而亢旱滋甚境内莫知所為皆曰若得天師至晉祠則旱不足憂矣惟謙請於主師主師親自為請巫者許之惟謙迎自私室躬為控馬既至祠所陳設供饌自旦及夕立於庭下如此者兩日語惟謙曰為爾飛符於上帝請雨三日雨當足矣觀者雲集三夕雨不降又曰此土灾沴亦由縣令無德為爾再請七日當有雨惟謙引罪於己奉之愈恭及期又無應郭乃驟索馬入州宅惟謙曰天師已為百姓此來更乞祈禱勃然怒罵曰庸瑣官人不知禮天時未肯下雨留我將復奚為誰謙對曰明日排比相送遲明郭將歸肴醴一無所設坐於堂上大怒惟謙曰左道女子妖惑日久當湏斃此焉敢言歸叱左右曵於神堂前杖背三十投於潭水祠後有山極高即令設席焚香端笏立於其上闔縣該云長官打殺天師馳走者紛紜祠上忽有雲如車葢覆惟謙逡巡四合雷震数聲甘澤大㴻数尺於是士民自山頂擁惟謙而下州將以専殺巫者初亦怒之既而嘉其精誠有感與監軍表言其事制書褒曰狄惟謙劇邑良才忠臣華胄覩此天厲將殫下民當請禱於晉祠類投巫於鄴縣曝山椒之畏景事等焚軀起天際之油雲法同剪𤓰遂使旱風潛息甘澤旋流是天心猶鑒於克誠余志豈忘於褒善特頒朱綬俾耀銅章勿替令名更昭殊績賜章服并錢五十萬厯絳隰二州刺吏所治皆有名稱劇談録狂巫太僕卿韋覲欲求夏州節度使有巫者知其所希忽詣之欲為禱祝韋不知其詐擇日為壇手書官衘一道與之巫即大呌曰韋覲有異志韋大懼凡所玩用財物盡占之時崔侃充京尹有府囚叛獄謂巫者是其一軰里胥詰其衣裝忽異巫情窘乃具言其事既當申奏宣宗召覲至殿前獲明寃狀復召宰臣諭曰韋覲城當盛族昨為求官遂招誣謗無令酷吏加之罪愆巫便付京兆處死韋貶潘州司馬聖溪友議為人延筭唐長道縣山野間有巫曰權師善巫卜至於邪魅鬼怪隱伏逃亡地秘山藏生期死限罔不預知之或人請命則焚香呼請神僵仆於茵褥上奄然而逝移時方喘息瞑目而言其事一日卧於民家瞑目幹十指云筭天下死簿数其遐邇州縣死数甚多次及本州村鄉亦十餘人合死者内有豪士張夫子名行儒與焉人有急告行儒者聞而懼遂命之至謂張曰可以奉為牒閻羅山免之於是閉目於紙上書之半如篆籀祝焚之既訖張以含胎馬奔奉之巫曰神只許其母子即奉還以俟異日所言本州十餘人筭盡者應期而殁惟張行儒免之及牝誕駒遂還其主其牝呼為和尚云此馬曽為僧不了是有報自爾為人延筭者不少為人掘取地下隱伏者亦多言人筭盡者不差晷刻以至其家大富取民家牛馬資財遍山盈室玉堂閑話禳災有里人為鄰巫所惑謂當有灾宜謝神乃殺家犢釀酒聲鼔以祀時官禁屠牛私釀法甚峻又當國忌不合動樂併犯三罪為吏所擒家長鄰保皆抵重罪連及數十人此乃禳灾適所以致灾也其愚如此因話録斬巫絶火錢元懿牧新定一日閭里間輙数處火起居民頗憂恐有巫楊媪因之遂與妖言曰某所復當火皆如其言民由是竟禱之元懿謂左右曰火如巫言巫為火也宜殺之乃斬媪於市自此火遂絶呉越備史恣為神語錢偡年十八出為湖州刺史有妖巫豋衙門大樹恣為鬼神語人皆警畏偡曰妖由人興命工弩而射巫果請命因鞭之州人咸服上命狗命子齊有田果者命狗曰富命子為樂將欲祭也狗入室果呼之曰富出巫曰不祥也家果大禍長子死哭曰樂乎而不似悲也尸子靈山大荒中有靈山巫咸巫即巫眠巫彭巫姑巫真巫禮巫槌巫謝巫羅十人從此升降百樂爰在山海經今本無何婆唐張鷟在江南洪州聞土人何婆善琵琶遂與同行人郭司法質焉郭再拜下錢問其品秩何婆乃調絃柱和聲氣曰箇丈夫富貴今年得一品明年得二品後年得三品更後年得四品郭曰何婆錯品少者官高品多者官小何婆曰今年減一品明年減二品後年減三品更後年減四品忽更得五六年總没品郭大罵而起朝野僉載來婆崇仁坊阿來婆弹琵琶卜朱紫填門張鷟往觀之見一玉帶將軍下一匹細綾請卜來婆鳴絃柱燒香合眼而唱東告東方朔西告西方朔南告南方朔北告北方朔上告上方朔下告下方朔將軍頂禮告請甚多必望細看以决疑惑遂即隨意支配上神巫天寶初有范氏尼者知人休咎顔魯公妻黨之親也魯公尉於醴泉詣范尼問命曰神巫某官階盡得五品否范笑曰鄰於一品顔郎所望何其卑耶魯公曰官階盡五品著緋衫帶銀魚兒子補齋郎某之望滿矣范指座上紫絲布簟曰顔郎於衫色如此其功勞名節皆稱是夀過七十已後不要苦問魯公再三窮詰范曰顔郎聰明過人問事不必到底及魯公為太師使於蔡州大歎曰如范師姨之言吾命懸於賊心矣戎幕閑談常侍言㫖禁射丁侯武王代殷丁侯不朝尚父乃畫丁侯于䇿三旬射之丁侯病大劇問卜者占云祟在周丁侯恐懼乃遣使者詣武王請舉國為臣虜武王許之歸為太師尚父謂使曰歸矣吾已告諸神言丁侯前畔義今已遣人來降勿復過也比使者歸子之君所自愈矣使者辭去尚父乃以甲乙日㧞其頭箭丙丁日㧞其目箭戊己日㧞其腹箭庚辛日㧞其股箭壬癸日㧞其足箭及至丁侯病稍愈四夷聞之皆懼各以其職來貢越裳氏獻白雉太公金匱六韜止有甲乙丙丁戊己日㧞箭云變人劉安善用藥及符能令人含笑則為婦人蹙面則為老人踞地則為小兒抱朴令人自縳章帝時有夀光侯者能劾百鬼衆魅令人自縳見形帝聞而徴之曰吾殿下夜光後常有數人絳衣披髪持杖相隨豈能劾之乎侯曰此小怪易消耳帝偽使三人為之侯劾三人頓卧扑地無氣帝大驚曰非魅也朕相試耳解之而蘇後漢神仙𫝊劉平子同不禁無刄賀齊討山賊賊中有善禁者毎當交戰官軍刀劍皆不得㧞弓弩射矢皆還自向輙致不利齊長情有思乃曰吾聞金有刄者可禁蟲有毒者可禁其無刄之物無毒之蟲則不可禁彼能禁吾兵必不能禁吾刄物矣乃多作勁木白掊選有力精卒五千人為先豋盡捉掊彼山賊恃其善禁了不嚴備於是官軍以白掊擊之彼賊禁者不復行所擊殺者乃有萬計抱朴禁目鏃出陳顕達討桂陽賊出杜姥宅大戰破賊矢中左眼㧞箭而鏃不出地黄村潘嫗善禁以釘釘柱嫗禹歩作氣釘即時出乃禁顯達目中鏃出之南齊書刄傷不怒張文詡常有腰疾㑹醫者自言善禁文詡令禁之遂為刄所傷至於頓伏床枕醫者叩頭請罪詡即遣之隋書奏章朱書墮地唐貞元初丹陽令王瓊三年調集皆黜落甚惋憤乃齋宿於茅山道士葉虚中求奏章以問吉凶虚中年九十餘强為奏之其章隨香烟飛上縹緲不見食頃復墮地有朱書批其末云受金百兩折禄三年枉殺二人死後處分後一年瓊果得暴疾終獨異志探懷得文李翺刺合淝郡郡客有李處士者自云能通神人之言合郡肅敬翺不信巫覡處士來謁命械繫之明日夫人背疽内潰遍召醫藥無少瘳愛女十人環繞而泣自歸咎於文公之桎梏李生也公不得已解縲絏而叩祈則曰若手翰一文俟夜當祈之又誡曰慎勿箋易鉛槧公即潔手草祝語繕札稍嚴而官位之中竟箋一字既逾時刻并符以焚焚畢呻吟頓減黎明李生候謁公深德之生曰禍則見免猶謂遲逢誡公無得漏畧何為復注一字公曰無之生曰祝詞在斯因探懷以出示則昨夕所燼之文也公驚愕慚謝竟無所取旬日告别不知所往闕史奎宿奏事徽宗寶籙宫醮筵常親臨之一日啓醮其主醮道流拜章伏地久之方起上詰其故荅曰適至上帝所值奎宿奏事良久方畢始能達其章故也上歎訝之問曰奎宿何神為之所奏何事對曰所奏不可得知然為此宿者乃本朝之臣蘇軾也上大驚唐溪詩話宋革命咸淳十年度宗大漸大内建醮保安太乙宫唐道録行持唐素以禳奏精䖍著名伏壇出神上至層霄忽被罡風吹擊遂排神馭氣方得至魔王界内且為天花下墜所壓復努力作法直造天門三天監門大神又行揮下乃黙叩祖師張真君真君曰曽聞上帝敕命不許受宋國章表但其辭意䖍切不可抑遏乃命有司引唐詣玉帝前適逢議下界公事稠衆中見真官引致二神人衣裝皆如天帝但簮下辮髪耳後有十數人各荷青冊一檐在庭下伺候忽𫝊帝㫖云宋國人民疆土盡一付汝神人者跪拜祗領而退荷青冊人皆隨之傍有天丁謂唐某說宋國人數盡矣汝章之不達有由也唐辭祖師還神不敢彰露丙子革命後方與人言續夷堅志返魂少翁齊人少翁以鬼神方見上上有所幸王夫人夫人卒少翁以方術葢夜致王夫人及竈鬼之貌云天子自帷中望見焉於是乃拜少翁為文成將軍武紀封禪書王夫人漢書作李夫人桓譚新論同少翁新論作李少君拾遺記作董仲君營陵人漢北海營陵有道人能令人與已死人相見其同郡婦死已數年聞而往見之曰願令我一見亡婦死不恨矣道人曰卿可往見之若聞鼓聲即出勿留乃語其相見之術於是與婦言語悲喜恩情如生良久聞鼓聲恨恨不能得往當出户時奄忽其衣裾户間掣絶而去至後嵗餘此人身亡室家𦵏之開塚見婦棺葢下有衣裾列異傳捜神記江淹擬潘岳詩我慙北海術爾無帝女靈血淚許至雍妻早亡雍毎感歎悲泣一日忽覺有人行吁嗟聲良久聞語云乃是亡妻云若欲得相見遇趙十四每惜三貫六百錢自此常記其言後數年至蘇州將謁吳太伯廟遇男巫趙十四具陳懇切之意遂教其見言語悲喜恩情如生良久趙生曰可去矣許相隨涕泣曰願惠一物可以為記妻泣曰幽㝠惟有淚可以傳於人代令許雍汗衫懸樹枝掩面大哭而去許取汗衫視之皆血㾗也許痛悼數日不食趙生名何蘇州人皆𫝊其事靈異記金衣京兆韋進士納洛妓頗惑之五年而卒生悲咽痛悼棄事而寐意其夢覩有言嵩山任處士有返魂之術韋固求見之任曰湏得一經衣之衣以導其魂韋捜得一裙之金縷者任為致之無異平生任曰漚珠槿艶不必多懷遂去韋為詩曰惆悵金泥簇蝶裙春來猶得伴行雲不教布苑剛留得渾似初逢李少君唐史八十不返徐肇者徐温諸孫也蘇徳哥必返祖先魂云死經八十一年以上即返之不可也洞㣲志幻術立興雲霧鞠道龍善為幻術嘗云有東海人黄公少得為術能制龍御虎佩赤金刀以絳繒束髪立興雲霧坐成山河及衰老氣力羸憊飲酒過度不能復行其術南京佯死方士董仲君以事業獄𦍕死目陷䖝爛故知其功術靡所不有又能鼻吹口歌聳眉動目荆州有鼻飲之蠻南城有頭飛之夷非為幻也桓譚新論九賔樂安帝時作九賔樂舍利之獸從西方來戲於庭入前殿激水化成比目魚𠻳水作霧化成黄龍長八丈出水遊戲於庭炫熠目光漢官典職大術悅般國真君九年遣使朝貢并送幻人稱能割人喉脉令斷擊人頭令骨䧟皆血出或数升或盈斗以草藥内其口中令嚼咽之湏臾血止養瘡一月復常又無㾗瘢世祖疑其虛乃取死罪囚試之皆驗云又言其國有大術者蠕蠕來抄掠術人能作霖雨狂風大雪及行潦蠕蠕凍死漂亡者十二三魏書渡汾止虎由吾道榮瑯琊人也初晉陽人某大明法術為人傭力無識之者道榮聞之訪得其人以道榮好尚乃悉授之謂道榮曰我本恒岳仙人有罪為天官所謫今限滿將歸卿宜送吾至汾水及至汾河河水暴長其人乃臨水禹歩以一符投水中流便絶俄頃水積將至天是人徐自沙石上渡道榮嘗往晉陽至潦山中夜逢猛獸以杖畫地即成火坑猛獸遂走北齊書變池崇仁縣有鹽池相𫝊陳司空黄法魹有竒術嘗欲變置鹽池於家山之下幅員六十餘畆至今水味獨鹹於他水而湛然清澈禽畜不敢觸之臨川記致婦楊素有美妾姿色絶倫時有千牛桑和有妖蠱異術常一見婦人即便能致煬帝宻使竊之素宅深邃和朝奉詔夜便竊以送至帝竒其能詔素賜之兩京記弄幻弄幻之士因時而作殞𤓰種菜立起尋䇿投芳送臭賣黄售白麾天興雲露畫地成江湖孔傳七引吞刀元始十四年七月西域貢吞刀吐火秘幻竒伎北京録天中記卷四十
