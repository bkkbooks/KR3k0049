body:
  text: 天中記卷五十七明陳耀文撰龜甲蟲之長甲之蟲三百六十而神龜為之長大戴禮神靈之精靈龜者𤣥文五色神靈之精也雒書靈龜靈龜文五色似玉似金背隂向陽上隆象天下平法地槃衍象山四趾轉運應四時文著象二十八㝛蛇頭龍翅左精象日右精象月千歳之化下氣上通能知存亡吉凶之變寧則信信如也動則著矣説苑神龜神龜之象上圓法天下方法地背上有盤法丘山𤣥文交錯以成列㝛五光昭若𤣥錦文運轉應四時長尺二寸禮統龜一千年生毛夀五千歳謂之神龜夀萬年曰靈龜述異記五色靈龜者神龜也王者徳澤湛清漁獵山川從時則出五色鮮明三百歳游於藻葉之上三千歳嘗游於卷耳之上知存亾明於吉凶宋符瑞志千歳之龜五色具焉其額上兩骨起似角浮於蓮華之上或在叢蓍之下其上或時有白雲蟠蛇龜蛇潜蟄則食氣夏恣口而甚痩冬月蟄而大肥抱朴子隂蟲之老天子龜尺二寸諸侯八寸大夫六寸士民四寸龜者隂蟲之老也老者先知故君子舉事必考之禮子路問孔子曰猪肩羊膞可以得兆藿葦藁芼可以得數何必以蓍龜孔子曰不然葢取其名夫蓍之為言蓍也龜之為言舊也明狐疑之事當問耆舊也論衡龜之言久也千歳而靈此禽獸而知吉凶者也洪範五行嘉林萬畢石朱方𫝊曰有神龜在江南嘉林嘉林中者獸無虎狼鳥無鴟梟草無毒螫野火不及斧斤不至是為嘉林龜在其中常巢於芳蓮之上左脅書文曰甲子重光得我者匹夫為人君有土正諸侯得我為帝王史記引氣上有禱蓍下有神龜蓍生滿百莖者其下常有龜守之其上有青雲覆之南方老人用龜支牀足行二十餘歳老人死移牀龜尚生不死龜能氣導引上名龜記曰能得名龜者財物歸之家必大富至千萬一曰北斗龜二曰南辰龜三曰五星龜四曰八風龜五曰二十八㝛龜六曰日月龜七曰九州龜八曰玉龜凡八名龜圖各有文在腹下云云者此某之龜也取此龜不必滿尺二寸民人得長七八寸可寶矣上十朋一曰神龜二曰靈龜三曰攝龜四曰寶龜五曰文龜六曰筮龜七曰山龜八曰澤龜九曰水龜十曰火龜爾雅易損五爻云或益之十朋之龜鄭注引之六龜龜人掌六龜之屬各有名物天龜曰靈屬地龜曰繹屬東龜曰果屬西龜曰靁屬南龜曰獵屬北龜曰若屬各以其方之色與其體辨之凡取龜用秋時攻龜用春時各以其物入於龜室上春釁龜祭祀先卜周禮含神神龜出於江水中盧江郡常獻生龜於大卜其含神知為効之大南越志神屋龜甲一名神屋出南海生池澤中吳越謂之元佇神龜大如拳而色如金上甲兩邊如鋸齒爪至利而能縁大木捕鳴蟬至美可食不中於卜以其小故也上龜經龜一千二百歳可卜天地之終始何以言之三千四十二占於天地千歳之龜甲黒龜有五色依時用之青靈之龜春宜用之西坐東向赤靈之龜夏宜用之北坐南向柳莊龜經萬物先伏闇能存而能亡者蓍龜與龍是也龜生於水發之於火於是為萬物先為禍福正管子先知龜為前列先知也金次之見情也禮器郊特牲合璧作禮運誤號為先知君抱朴子玉靈夫子灼龜祝曰假之玉靈夫子夫子玉靈荆灼而心令而先知而上行於天下行於淵諸靈數制莫如汝信史記時君山中辰日稱雨師者龍也稱河伯者魚也稱時君者龜也抱朴子𤣥衣督郵龜一名𤣥衣督郵古今注龜燋黄帝五十年秋七月庚申天霧三日三夜晝昏黄帝以問天老乃召史卜之龜燋史曰臣不能占也其問之聖人帝曰已問天老力牧容成矣史北面再拜曰龜不違聖智故燋宋符瑞志髙祖將遷都謂元丕云昔軒轅兆卜龜焦卜者請訪諸賢哲軒轅乃問天老天老謂為善從從其言終致昌吉然則至人之未然審於龜矣魏書受書黄帝東巡河過洛修壇沈璧受龍圖於河龜書於洛赤文篆字水經負圖堯時與羣臣賢智到翠媯之川大龜負圖來投堯堯敕臣下寫取告瑞應寫畢龜還水中龍魚河圖龜厯陶唐之世越裳國獻千歳神龜方三尺餘背上有文皆科斗書記開闢已來帝命録之龜厯伏滔述帝功徳銘曰朱書龜厯之文述異記授文禹時有神龜於洛水負文列於背以授禹文即治水文也洛陽記禹卑宫室靈龜見宋志白若昔夏后開使蜚㢘折金於山川而陶鑄之於昆吾是使翁難乙灼白若之龜初學記見墨子今本作毚𤣥龜𤣥龜書者天符也王者徳至淵泉則洛出龜書宋志周公旦攝政七年與成王觀於河洛沈璧於洛𤣥龜青龍蒼光止於壇背甲刻書赤文成字周公援筆以世文寫之書成文消龜墮甲而去其言自周公訖於秦漢盛衰之符上無貲桓公曰何謂御神用寶管仲對曰北郭有掘闕而得龜者此檢數百里之地也令過之平盤之中而藏諸泰臺立寶曰無貲後果得丁氏粟而伐孤竹管山權數大蔡孔子問漆雕憑平曰子事臧文仲武仲及孺子容此三大夫孰賢對曰臧氏家有守龜焉名曰蔡文仲三年而為一兆武仲三年而為二兆孺子容三年而為三兆憑從此之見君問三人之賢與不賢所未敢識也孔子曰君子哉漆雕氏之子其言人之美也隠而顯言人之過也微而著智而不能及明而不能見孰克如此家語臧武仲自邾使告臧賈且致大蔡焉曰紇不佞失守宗桃敢告不弔紇之罪不及不祀子以大蔡納請其可賈曰聞命矣再拜受龜襄二十三明月之珠出於蠬蜄周之簡圭生於垢石大蔡神龜出於溝壑淮説山元龜為蔡非四民所得居食貨志鄭𤣥云龜出蔡地因以為名師古曰本以蔡出善龜故因名孔頴達正義曰鄭注非也臣瓉曰蔡是大龜名也書曰九江納錫大龜大龜不出蔡國也若龜出楚不可名龜為楚也又鄭春蔡山出大龜尚書曰九江納錫大龜即此山之龜也寰宇記僂句臧昭伯如晉臧㑹竊其寳龜僂句以卜為信與僣僣吉後㑹出奔見執平子怒及昭伯從公平子立臧會會曰僂句不余欺也昭二十五昭兆魯侵鄭不假道於衛靈公怒使追之公叔文子曰昭公之難君將以文之舒鼎成之昭兆定之鞶鑑茍可以納之擇用一焉今將以小忿䝉舊徳無乃不可乎定五青純盜竊寳玉大弓寳者何璋判白弓繡質龜青純公羊定八純縁也謂縁甲􅏋也千嵗之龜青髯明於吉凶註青黑縁者天子之寶龜也樂記諸侯以龜為寶以圭為瑞家不寶龜不藏圭禮器平準書人用莫如龜索隠云禮云諸侯以龜為寶是也史左正義以所盜無龜公羊之妄也清江使宋元君夜半而夢人被髪闚阿門曰予自宰路之淵予為清江使河伯之所漁者余且得予元君覺使人占之曰此神龜也君曰漁者有余且乎左右曰有君曰令余且㑹朝明日余且朝君曰漁何得對曰且之網得白龜焉箕圓五尺君曰獻若之龜龜至君再欲殺之再欲活之心疑卜之曰殺龜以卜吉乃刳龜七十二鑚而無遺筴仲尼曰神龜能見夢於元君而不避余且之網知能七十二鑚而無遺筴不能避刳腸之患如是則知有所困神有所不及也莊外物曳尾莊子釣於濮水楚王使大夫二人往先焉曰願以竟内累矣莊子持竿不顧曰吾聞楚有神龜死已三千歳矣王巾笥而藏之廟堂之上此龜者寧其死為留骨而貴乎寧其生而曳尾於塗中乎二大夫曰寧生而曳尾塗中莊子曰往矣吾將曳尾於塗中上秋水豕化邦人獻燕昭王以大豕者曰於今百二十歳邦人謂之豕仙其羣臣言於昭王曰是豕無用王命宰夫膳之豕既死乃見夢於燕相曰今仗君之靈而化吾生也始得為魯津之伯而浮舟者食我以粳糧之珍而欣得之惠將報子焉後燕相逰於魯津有赤龜銜夜光而獻之符子大明龜筴鬼神不足以舉勝左右背鄉不足以専戰然而恃之愚莫大焉越王勾踐恃大明之龜與吳戰而不勝身臣入宦於吳反國棄龜明法親民以報吳則夫差為擒故恃鬼神者慢於法恃諸侯者危其國鑿龜數筴兆曰大吉而以攻燕者趙也鑿龜數筴兆曰大吉而攻趙者燕也劇辛之事燕無功而社稷危鄒衍之事燕無功而國道絶韓餙邪龜寶四品元龜岠冉長尺二寸直二十一百六千為大貝十朋公龜九寸直五百為壯貝十朋候龜七寸以上直三百為么貝十朋子龜五寸以上直百為小貝十朋是為龜寶四品食貨志引頸人有出行墮深泉澗者無出路饑餓分死左右見龜蛇甚多朝暮引頸向東方人因伏地學之遂不復饑體殊輕便能登巖岸經數年後試竦身舉臂遂超出澗上即得還家顔色悦懌頗更黠慧勝故還食穀啖滋味百餘日中復其本質博物志張廣定籠懸㓜女於古塚中事同見異聞記吞氣郄儉少時行獵墮空塚中饑餓見有一大龜數數迴轉所向無常張口吞氣或俛或仰儉素聞龜能導引乃試隨龜所為遂不復饑百餘日後竟能咽氣㫁榖魏王棄置土室中閉試之一年不食顔色悦懌氣力自若抱朴子魏文帝嘗試郄儉辟榖百日猶與寢處行步起居自若也夫人不食七日則死而儉乃能如是典論元緒吳孫權時永康縣有人入山遇一大龜即束之以歸龜便言曰逰不量時為君所得人甚怪之擔出欲上吳王夜泊越里䌫里於大桑樹宵中樹呼龜曰勞乎元緒奚事爾邪龜曰行不擇日今方見烹雖盡南山之樵不能潰我樹曰諸葛元遜識性淵長必致相困今求如我之徒計將安泊龜曰子明無多辭禍將及爾樹寂而止既至建業權命煑之焚柴萬車語猶如故諸葛恪曰燃以老桑乃熟獻者仍説龜樹共言權使伐桑取煑之立爛故今烹龜猶多用桑野人呼龜曰元緒異苑石龜海畔有大石龜俗云魯班所作夏則入海冬復止於山上陸機詩云石龜常懷海我寧㤀故鄉述異記石下龜晉長沙王乂坐同産兄楚王瑋事徙封常山後還復國在常山穿井入地四丈得白玉方三四尺玉下有大石其中有龜長二尺餘時人以為復國之祥朱志論者曰仲尼獲麟而卒是亦有不終之象也後果如䜟言寰宇記龜顧孔愉字敬康嘗至吳興縣餘干亭見入籠龜於路愉求買放之於溪中龜行至水反顧愉及封此亭侯而鑄印龜首迴屈三鑄不正有似昔龜之顧靈徳應感如此愉悟乃取而佩焉㑹稽後賢傳報徳咸康中豫州刺史毛寶戎邾城有一軍人於武昌市見人賣一白龜子長四五寸㓗白可愛便買取持歸着瓮中養之曰白大近欲尺許其人憐之持至江邊放水中視其去後邾城遭石季龍叛毛寶棄豫州既赴江莫不沈溺於時所養龜人被鎧持刀亦同自投既入水中覺如墮一石上水裁至腰須臾浮出中流視之乃是先所養白龜甲六七尺即送至東岸出頭視此人徐㳺而去中江猶迴首數顧焉續捜神記幽㝠録按本𫝊邾城之役寶亦溺死庾亮痛哭發疾遂薨其軍人放龜事亦附𫝊末白氏六帖引捜神記直以為寶事而後之合璧記纂對類等書俱承誤不改爾雅翼復以毛寶過江白龜載之而度為異何耶右轉鄱陽縣民黄赭入山林荆楊子遂迷不知道數日饑餓忽見一大龜赭便呪曰汝是靈物吾迷路不知道今騎汝背示吾路龜即回右轉赭即從行去十餘里便至溪水見賈客行船赭即往乞食便語船人云我向者於溪邉見一龜甚大可共往取之言訖面即生瘡既往亦復不見龜還家病數日而死續捜神記客龜符堅建元十二年高陸縣民穿井得龜大三尺背文負八卦古字堅命以石為池養之十六年而死藏其骨於太廟以問吉凶名為客龜是夜廟丞髙虜夣龜言曰我將出龜江南遭時不遇殞命秦庭虜於夢中自解曰龜三萬六千歳而終終必亾國之徴也未幾為謝𤣥破於淮淝自縊新城浮圖中秦祚因即淪矣車穎麈書水經載記爻卦泰始二年八月丙寅六眼龜見東陽長山文如爻卦太守劉勰以獻宋志先天三年丁未江州獻靈龜六眸腹下有𤣥文象卦爻唐書翠毫徐湛之翠龜表曰句容縣人獲龜一頭體披翠毫晬毫飛集中候緑衣女子劉交居若耶溪忽聞有人採蓮喧笑聲交以溪左右無人居甚訝之乃斷柳枝蔽身視之忽見十餘女子從一華林而出皆衣青緑年十六七入叢蓮相對而歌交乃棹舟以逼之諸女皆化為龜入水五色線齊王奐夜泊江州叢葦中見緑青碧衣女子十餘人相語事同見九江記孝感臨江郡民留京孝行鄉里推敬時江水暴溢居者皆漂溺京負其母號泣忽有大龜至其前舉家七口俱上龜背行十餘里及一髙岸龜遂去之上一角梁天監二年安豐得一角龜武帝遂作一鼎投得龜處鼎録遺龜梁時烏程有蘇氏女於霅溪西南岸遇一道士曰汝後大貴因遺一五彩龜云三年當有徴蘇氏後適張氏生陳髙祖宣后髙祖即位拜后母為安吉縣君遂名其浦為貴溪寰宇記掘地得龜陸法和嘗至襄陽城北大樹下畫地方二尺令弟子掘之得一龜長尺半以杖叩之曰汝欲出不得得已數百歳不逢我者豈見天日乎為受三歸龜乃入草北齊為妖開皇中掖庭宫每夜有人來挑宫人宫司以聞帝曰門衛甚嚴人何從而入當是妖精耳因戒宫人曰若逢但斫之其後有物如人夜來登牀宫人抽刀斫之若中枯骨其物落牀而走宫人逐之因入池而没明日帝令涸池得一龜徑尺餘其上有刀迹殺之遂絶隋志踏龜道州營陵中龜甲長八尺下自然有文字前後四足各踏一龜踏龜有時行或踰山越水俗莫敢犯録異記金樓子化石武徳末太宗平内難苑中池内有白龜㳺於荷葉之上太宗取之化為白石瑩縈如玉故登極之後降制曰皇天眷佑錫以寶龜録異記金龜唐明皇帝嘗有方士獻一小龜徑寸而金色可愛云此龜神明而不食可置之枕筒之中辟巨蛇之毒後小黄門有竄南徼者上以賜之至象郡屬邑於旅館出之階下果祛報寃蛇之毒於一方云上毛生王勣逰嵩山少室遇日暮止一石室中月夜有人面濶白鬚睂長黑而矮稱毛生與勣談議勣疑怪取鏡照之其人失聲俯伏化而為龜身帶緑毛焉異聞集龜殻李徳裕曰揚雄蜀王本紀張儀築城依龜行迹築之予未至郡日嘗聞龜殻猶在城内昨詢訪耆舊有軍資庫官宇文遇者言比常在庫中見龜殻長六尺元和初節度使髙崇文知之命工人截為腰𢃄胯具自張儀至崇文千餘載龜殻尚在而武臣毁之深可惜也戎幕閒談績博物志孔帖引徳裕鎮西川龜殻猶在後為髙崇文截作為腰帶胯按本傳崇文元和初討劉闢拜東川節度徳裕太和四年時徙西川相去已二十餘年矣云後誤聖龜貞元末福州有村人賣一籠龜其數十三販藥人徐仲以五鍰獲之村人云此聖龜不可殺徐置庭中一龜藉龜而行八龜為導悉大六寸徐遂放於乾元寺後林中一夕而失雜俎洞𤣥先生張鋋見巴西侯飲酒命樂久之有告者曰洞𤣥先生在門言訖有一人被黒衣頸長而身甚廣揖之與坐曰席上人將有圖君巴西怒曰歡宴方洽何遽有怪命殺之天將曉鋋悸悟見身囚在龕中一龜形甚巨於龕前乃向所殺洞𤣥先生也宣室志龜寶徐太尉彦若赴廣南將渡小海從者於淺中得一琉璃瓶中有一龜可以中旋轉而不停而瓶項極細不知何自而入取置舟中其友忽覺舟偏重視之則衆龜層疊就船而上其人懼而取瓶投之衆龜遂散既而話於海舶胡人曰此乃龜寶也希世之靈物惜其遇而不能有葢福薄之人不勝也茍得而藏於家何慮寶藏之不豐哉胡客惋嘆不已金華子性妬道士陳釗云南人採龜溺以其性妬而與蛇交或雌蛇至有相趂鬬噬力小致斃者採時取雄龜置瓷盌及小盤中於龜後以鏡照之既見鏡中龜即淫發而失溺又以紙炷火上㶸熱㸃其尻亦致失溺然不及鏡照也又海上人云龍生三卵一為吉弔也其吉弔上岸與鹿交或於水邉遺精流槎遇之䊀褁木枝如蒲桃焉色微青黄復似灰色號紫稍花益陽道别有方説北夢尾繞身晉成帝時尚書徐恬因夜井發光遂奏請捨宅為寺賜名靈光錢文穆王時立山門掘地得一小龜介甲分明尾繞身一匝遂改靈龜寺嘉興志兩首大觀元年閏十月丙戌都水使者趙霖得龜兩首於黄河獻以為瑞蔡京曰此齊小白所謂㒺象見之而霸者也鄭居中曰首豈有二帝命棄龜金明池宋志及居中傳兩目如日路允迪公弼政和中奉使三韓舟行海中忽見黒山湧起山頂有光如兩日並出者官吏大恐舟師曰此大龜也遊兩日者其雙目也當即以三牲祠之公弼口占祝詞率官寮焚香再拜投牲良久乃没寓簡食龜客有投縉雲山寺中㝛者僧為具饌羞鱉甚美但訝其無裙耳入後屋見黄泥數十團大如缶問其徒即向所食者在其中取龜以黄泥褁之三日龜服氣肥息特異江隣幾雜志背上生樹惠州海豐海中有巨龜其大不知幾千里今渡海往往見巨龜在沙嶼間背上生樹木如洲島昔有商者或依以採薪及作食龜既熱便入海於是死者輙數十人然後知其龜也寰宇記金樓子同五行之粹夫龜甲黄足赤眼白尾青腹黒者葢禀受乎五行之粹也然而性畏刀鐡之器聞其聲則不能動矣龜經骨白龜經云欲知龜有神視骨白如銀蘇氏演義龜直中文名曰千里其通首横文之第一級左右有斜理皆接於千里者龜王之文也今取常龜騐莫有也金華子含洭龜海陽以南濱大海得名有官鄣湖出名龜以卜勝於含洭龜也元和郡縣志皁衣宗淵字叔林晉太元中為潯陽太守得十頭龜付厨曰每日以二頭作臛其夜夢十丈夫皁衣袴褶扣頭求哀明夜復夢八人求命方悟乃放之後夢八人來謝續捜神記夢雋龜六有龜被野千所包藏六而不出野干怒而捨去佛告諸比丘當如龜藏六自藏六根魔不得便雜阿含經昔有道人河邉學道但念六塵心無寧息龜從河出水狗將噉龜龜縮頭尾四脚藏於甲中不能得便狗去還出便得入水道人因悟我不及龜放恣六情不知死生法句經鼇巨鼇鼇巨龜也以背負山周迴千里𤣥中記韻㑹云大鱉也雅翼云列子灼其首以卜則鼇之為龜無疑者巨鼇戴山渤海之東有大壑焉其中有五山根無所連着常隨波上下往還不得蹔峙焉仙聖毒之訢於上帝上帝恐流於西極失羣聖之居乃命禺彊使巨鼇十五舉首而戴之迭為三番六萬歳一交焉五山始峙而龍伯之國有大人舉足不盈數步而暨五山之所一釣而連六鼇合負而趣歸其國灼其骨以數焉列湯問北極之神名曰禺彊靈龜為之使大荒經鼇抃鼇戴山抃何以安之天問有巨靈之龜背負蓬萊之山而抃舞戱滄海之中列仙傳登蓬萊而容與兮鼇雖抃而不傾張衡賦螯光于頔在海南日一夜方三更忽曉如日初出移時復暗徧嶺南悉然後有海客言其夜海中見大金鼇浮出日光照耀天地如白晝徐徐復没騐其日正同方知鰲光紀聞譚贔屓巨鼇贔屓首冠靈山蜀都賦雌鼇贔屓鼇也一曰雌鼇為贔韻㑹魏都賦靈巨贔屓薛注作力貎則韻㑹誤或引爾雅為九種龍更誤鼉江鼉江水多鼉似􅔼蝪長二丈有麟彩皮堅可以冒皷山經口内涎有毒長一丈者能吐氣成霧致雨力至猛虎攻䧟江岸性嗜睡但目閉形如龍大長者自嚙其尾極難死聲甚可畏人於穴中掘之百人掘亦須百人牽一人掘亦須一人牽不然終不可出本草於物難死沸湯沃口入腹良久乃剥爾老者多能變化為邪魅上鼉皷李斯書樹靈鼉之皷史記鼉宵鳴如桴皷今江淮謂鼉鳴為鼉皷其數應更吳越謂之鱓更趙辟公雜説云鼉聞皷聲則鳴埤雅㹠將風則踴鼉欲雨則鳴上土龍鼉長一丈一名土龍鱗甲黒色能横飛不能上騰其聲如皷續博物志嫁娶之用鼉魚有四足尾如蝘蜓而大南方嫁娶必得食之魏武赤壁還所掘得之是也廣志鼉鳴孫亮初公安有白鼉鳴謡曰鼉鳴龜背平南郡城中可求生求死不去來無成明年諸葛恪敗弟融鎮公安被收融刮金印龜背一服而死吳志食鼉梁周興嗣常食其肉後為鼉所噴便為惡瘡此物靈强不可食也本草為妖燉煌李鷸開元中為邵州刺史絜家之任沃洞庭時晴景登岸因鼻衂沙上為江鼉所䑛俄然然復生一鷸與之無異鷸之本身為鼉法所制繫於水中其家奉鼉妖就任為郡幾數年因天下大旱西江可涉道士葉静能自羅浮赴詔過洞庭忽沙中見一人面縳問之鷸以狀對静能書符帖巨石上石即飛起空中鼉妖方擁案晨衙為巨石所壓乃復本形時張説為岳州刺史具奏並以舟檝送鷸赴郡家人妻子乃信今舟行者相誡不瀝血於波中以此故也獨異志中宗時國子祭酒葉静能善符禁小術出入宫掖帝遇毒韋后臨朝謀危社稷臨淄王舉兵誅其黨静能等悉見誅舊紀聞有人撰集怪異記𫝊云𤣥宗令道士葉静能書符不見國史不知葉静能中宗朝坐妖妄伏誅在𤣥宗時有道術者乃法善也談話之小誤差尚可若著於文字其誤甚矣因話録介物上元二年有鼉集揚州城門節度使鄧景山以問族弟珽對曰鼉介物兵象也未幾宋州刺史劉展反𫝊鼉城貞元中有湘媪常以丹篆救人疾一日告鄉人曰欲往洞庭救數百人性命里人張珙為具舟檝送之欲至洞庭前一日有大風濤蹙一巨舟泊一君山島上而碎所載近百餘人各星居於島上忽有一白鼉長丈餘逰於河上數十人攔之撾殺分食其肉明日有城如雪圍繞島上其城漸窄束其人為簇其間不廣三數丈岳陽人亦遥望雪城莫能曉也媪遂登島飛劍刺之白城一聲如霹靂遂崩乃一大白鼉長千餘丈蜿蜒而斃媪乃劉綱妻樊夫人也女仙傳傳奇兆水宣和己亥都城北小民家晨起見一物如龍伏牀下大驚都人競往觀之禁中取去騐之鼉也杖殺之已而大水數年有金人之禍猗寮黿河伯使者黿一名河伯使者古今注腸連於頭屠黿解其肥肉唯腸連於頭而經日不死猶能齧物鳥往食之則為所得漁者或以張鳥雀博物志腹赤黿其狀如鱉腹下赤者為黿白者為鱉俗云黿之身有十二屬肉漁人捕得之雖支分臠解隨其巨細未投湯鑊者皆能跳走鱉與黿雖至大者如蚊蚋噆之一旦乃死録異記為梁禹洛巨海黿鼉為梁拾遺記穆王三十七年起師至九江以黿鼉為梁也竹書染指楚人獻黿於鄭靈公公子宋與子家將見子公子食指動以示子家曰他日我如此必嘗異味及入宰夫將解黿相視而笑公問之子家以告及食大夫黿召子公而弗與也子公怒染指於鼎嘗之而出公怒欲殺子公子公與子家謀夏弑靈公宣四銜驂齊景公渡江沅之河黿銜左驂没之衆皆愓懼古冶子於是㧞劍從之邪行五里逆行三里至於砥柱之下乃黿也左手持黿頭右手挾左驂䴏躍鵠踴而出仰天大呼水為逆流三百步觀者皆以為河伯也捜神記水經云江沅景公不至河伯本非江神晏子云從黿濟河事或在兹應黿樊噲披帷入見髙祖髙祖踞洗以對酈生當此之㑹乃黿鳴而鱉應也應間黿鳴岐野鱉應於泉焦氏易林白黿命鱉蜀都賦化黿漢靈帝時江夏黄氏之母浴伏盤水中久而不起變而為黿入於深淵其後時時出見初浴簪一銀釵及見猶在其首於是黄氏累世不敢食黿捜神記後志孫皓時宣騫母事同廣古今五行志河生黄河中舊不生黿時有得者以獻石季龍佛圖澄見而嘆之曰桓温入河其不久乎温字元子後果如其言澄𫝊放黿韋丹未第時於洛陽中橋見漁者得一大黿長數尺繫之橋柱引頭四顧有求救之意丹以乗驢贖之放於水中徒步而歸後數日韋詣胡蘆生問命生與共往元長史家有老人元濬之向韋盡禮欵待懐中出文字一通授之曰此公一生官禄行止聊報活命之恩即其黿也唐史原化記千鈞海黿大一畝重千鈞廣雅黿脂黿脂得火可以然鐵燒黿致鼈淮萬畢術人語千歳龜黿能與人語捜神記鼈能鼈鼈三足能龜三足賁爾雅從山多三足鼈大􅟣山三足龜山經吳興郡陽羨縣君山上有池池中出三足鼈又有六眼龜雅註河伯從事鼈一名河伯從事古今注守神鼈無耳為守神酉陽鼈無耳而目不可以瞥蔽精於明也淮説林腹字鼈目白腹下有三易註作天字者卜一作十字者不可食酉陽鼈九肋者勝易註沅江鼈甲九肋者稀摭言竟生青泥殺鼈得見復生體鼈剉令如棊𢷬赤莧汁和合厚以茅苞五六月作投池澤中經旬臠臠成鼈博物志怒小公父文伯飲南宫敬叔酒以露睹父為客羞鼈焉小睹父怒相延食鼈辭曰將使鼈長而後食之遂出文伯之母聞之怒曰吾聞之先子曰祭養尸饗養上賓鼈子何有而使夫人怒也遂逐之魯語飲渇鄭縣人乙子妻之市買鼈以歸過潁水以為渇也因縱而飲之遂亡其鼈韓非子白鱉後漢溪夷田彊遣子魯居上城次子玉居中城小子倉居下城三壘相次以拒王莽光武遣劉尚征之尚未至倉獲白鼈為臚乃舉烽請兩兄兄至無事及劉向軍來倉舉火魯等以為不實遂戰死焉酉陽為魅汝南有妖常作太守服詣門椎鼓郡中患之及費長房來知是魅乃呵之即解衣冠叩頭乞自改變為老鼈大如車輪長房令復就太守服作一札敕葛陂君魅叩頭流涕持札去視之以札立陂邉以頸繞之而死列異傳暴田石季龍時利州谷綿縣山北溪中有鼈數千頭登岸暴田苗發軍殘毀至今鼈無頭也北户録注馬溺消鼈昔有人與奴俱得心腹病治不能愈奴死乃刳腹視之得有白鼈赤眼甚鮮净以諸藥内鼈口中終不死後有人乗白馬者馬溺濺鼈縮頭藏血乃試取溺灌之豁然消成水病者䪺飲一升即愈志怪方革云食鼈不可食莧因並啖之自此苦腹痛作時幾不知人疑鼈莧所致乃以二物令小蒼頭食之遂得疾得疾與革類而委頓尤劇未幾遽死舁屍置馬廐未殮也忽小鼈無數自九竅涌出散走廐下後遇馬溺者輒化為氷革聞自臨視掊聚衆鼈以馬溺灌之皆即為水於是革飲馬溺遂差或云白馬溺尤良瑣碎録嗜鱉張澤為房知温從事性嗜鱉忽暴卒經一宿而活云為太山府君所追責其食鱉過差為羣鬼投於沸鼎中支解烹飪亦如治鱉之狀既熟為諸鬼分噉其慘毒苦痛名狀所不及如此者近數十度府君始恕之且問曰汝受諸苦敢再犯乎荅曰不敢始今遣歸五代史補烏帽乞命偽蜀豐資院使李延福晝寢公㕔夣烏帽三十人伏於階下但云乞命驚覺僕使報門外有村人獻鼈三十頭因悟所夢遂放之儆戒録晉崔税姑家來晨㑹客夜夢十九人衣青緑羅衣乞命事同玉堂閒話三曳三顧黄徳瓌家人烹鼈將箬笠覆其釡掲見一鼈仰把其笠背背蒸爛頭足猶能伸縮家人愍之遂潜放河涯間後因患熱將殁徳瓌徙於河邊屋中將養夜有一物徐徐上身覺甚冷及曙視胸臆悉塗淤泥而其鼈在上間三曳三顧而去即日病差韜光録宋傅慶嘗得數鱉付厨厨婢放大鱉報同括異志雙裙南唐僧謙光有才辨而無拘檢性尤嗜鱉國主嘗以從容語及什氏果報對曰老僧無他願但得鵝生四隻腿鱉長兩重裙足矣國主大笑五代史補長鬚鱉為臛數食可長鬚酉陽調鱉闕子曰義渠之人烹龜鱉不熟臊穢腥臭中國之民雖饑餓三日不啟口至死不食也吳章莊吉受而和之病人食之為之體輕萬乗食之為之解怒故龜鱉至腥臊不可加然而病人為之體輕萬乗為之解怒何也吴章莊吉之調存也醉鱉唐進士李詹平生廣求滋味每食鱉輙絏其足曝於烈日鱉既渇即飲以酒而烹之鱉方醉已熟矣王子玳瑁辟毒玳瑁大如扇似龜甲有文解毒兼辟邪唐嗣薛王鎮南海海夷廬亭獻生玳瑁一枚王令掲取背甲小者二片帶於左臂腕以辟毒玳瑁亦甚苦楚復養於使宅後池伺其掲處漸生復遣廬亭送於海畔並無傷矣或云玳瑁若生帶之有蟲毒即自摇動死則不能神本草鱟鱟鱟形如惠文冠十二足似蟹山經注亦似便便面廣志骨眼眼在背上口在腹下雌常負雄而走捕者必雙得之若摘去雄者雌者即自止背負之方行腹中有子如菉豆南人取以為醤尾中有珠如粟色黄雄小雌大置之水中雄者浮雌者沈嶺表録異其相負雖風濤終不解矣雌則不能獨活廣志故號鱟媚雅翼其珠南人或帶或磨飲之云利市北户録殻可為冠次於白角南人取其尾為小如意雜俎背上有骨如扇酉陽云如石珊瑚乗風而行名鱟㠶其衆如簰筏名鱟簰番禺雜記昔有漁者庶其亷與婦不和一日獲此既而悔也是物也人人或不如可乎歸召婦與居禮之終身對類乗鱟黿鼉同罛共羅吴都賦蟹天文十二星宫有巨蟹焉釋典無腸公子山中無腸公子者蟹也抱朴子雌雄蟹蛫也雄曰􅀈䱺雌曰博帶廣雅蟹胥庖人共祭祀之好羞鄭注好羞謂四時所謂膳食若荆州之鱔魚揚州之蟹胥周禮胥蟹醖也説文蟹醬也音什盈車王㑹海陽大蟹注海水之陽一蟹盈車周書千里之蟹姑射國大蟹在海中注女丑有大蟹廣千里也山經螯加山上天下之大物有北海之蟹焉舉一螯能加於山上身故在水中𤣥中記蟹斷蟹始窟穴於沮洳中秋冬交必大出江東人云稻之登也率執一穗以朝其魁然後從其所之蚤夜觱沸指江而奔漁者緯蕭承其流而障之曰蟹斷斷其江之道焉耳陸蟹志輟耕録云緯蕭二字尤奇緯蕭字見莊子漁父篇已具龍部魏書云胡叟救蜀僧法成之死法成感之多遺珍物叟曰緯蕭何人能棄明珠吾為徳請財何為也一無所受夫讀史者多止檢南北吏陶遺魏書固也而莊亦不及豈悔讀南華第二篇耶心躁蟹六跪而二螯非虵蟺之穴無所寄託者用心躁也荀勤學跪足也韓子以刖足為刖跪注郭索太𤣥蟹之郭索後蚓黄泉范明叔云言蟹之與蚓者用心之不一雖有郭索多足之蟹不如無足之蚓者以其用心之一也鋭前一百足漢武帝善苑國嘗貢一蟹長九尺有百足四螯因名百足蟹煮其殻勝於黄膠亦謂之螯膠勝於鳯喙之膠也洞㝠記遺蟹朱登為東海相遺敞蟹醬報書曰蘧伯玉受孔氏之賜必及鄉黨謹分斯貺於三老尊行者曷敢獨享之張敞集化䑕晉太康四年㑹稽郡蟛蚑及蟹皆化為䑕其衆覆野大食稻為災始成有毛肉而無骨其行不得過田塍數日之後則皆為壯捜神記誅解張華裴頠之被誅也趙王倫以宿仇收繫兄弟將殺之梁王彤救之倫等怒曰我見水中蟹猶惡之况此人兄弟輕我耶遂並戮其妻子解繫傳蟹醬石崇冬月得蟹醬齊王愷貨崇帳下求取去釋名左持畢卓字茂世嘗謂人曰左手持蟹螯右手執酒杯拍浮酒池中便足了一生世説蟚蜝蔡謨初渡江見蟚蜝大喜曰蟹有八足加以二螯令烹之既食吐下委䪺方知非蟹後詣謝尚説此事尚曰卿讀爾雅不熟幾為勸學死上埤雅云蔡謨食之瀕死嘆曰讀爾雅不熟幾為勸學所誤豈因隠居本草之誤耶長卿蟛􅒹蠏也嘗通夢於人自稱長卿今臨海人多以長卿呼之捜神記證俗音有毛者曰蟛蜞無毛者為蟛螖堪食俗呼蟛越訛耳北户録誤用擁劍異物志云擁劒狀如蟹但一螯偏大爾俗謂之越王鈴下何遜詩云躍魚如擁劍是不分魚蟹也顔氏家訓其螯赤一名執火古今注又名桀步本草蜜蟹吳郡獻蜜蟹二千頭作如糖蟹法蜜擁劒四瓮吳都賦所謂烏擁劒是也大業拾遺糖蟹煬帝幸江都吴中貢糟蟹糖蟹每進御則旋潔拭殻面以鏤金龍鳯花貼上清異録螗蟹平原郡貢糖蟹採於河間界毎年生貢斵冰火照懸老犬肉蟹覺犬肉即浮因取之一枚直百錢以氊蜜束於驛馬上馳之至京酉陽螯如兩山近世有波斯乗舶泛海往天竺漂入大海至一島中得諸寶甚多隨風掛帆而行遥見峯上有赤物如虵形久之漸大胡曰此山神惜寶來逐我也為之奈何舟人莫不戰懼俄見兩山從海中出髙數百丈胡喜曰此兩山者大蟹螯也其蠏常好與山神鬬神多不勝甚懼之今其螯其無憂矣大虵尋至蠏許盤鬬良久蠏夾虵頭死於水上如連山船人因是得濟也廣異記如洲昔有人行海得洲林木甚茂乃維舟登岸㸑於水傍半炊而林没於水遽斷其䌫乃得去詳視之大蠏也異物志蠏賦僕射嚴續位髙寡學為時所鄙江文蔚作蠏賦以譏之云外視多足中無寸腸口裏雌黄每失途而相煦胸中戈甲常聚衆以横行續深赧之湘山野録一代不如一代陶糓奉使吴越忠懿王宴之因食蝤蛑詢其族類忠懿命自蝤蛑至蟛􅀈凡十餘以進糓曰真所謂一代不如一代也聖宋拾遺艾子何一蠏不如一蟹也甲胄乞貸餘杭尉范達夜夢甲胄而拜於庭北七人云某等皆錢氏時歸順人今海行失道死在君手幸見貸也既覺人有以蝤蛑七枚為獻因遣縱之於江春渚紀聞石下得蟹鄒浩為蔡京所忌謫居昭州使役者濬感應泉一二尺許於亂石之下得蟹一枚自放於江曰予至五嶺不睹此物數年矣亂石之下又非所宜穴處也何從而出耶易不云乎物不可以終難故受之以解蟹者解也天實告之矣蒙恩歸侍立可待也於是乎書道鄉集白蟹故老相𫝊建陽縣南興上里山谷中水極清冽嘗產白蟹有直行之異遇歳旱鄉人入谷以盆貯之迎而歸即雨建寧志十二種吕亢守台州命工作蠏圖凡十二種一曰蝤蛑二曰撥棹三曰擁劒四曰彭螖五曰竭朴六曰沙狗七曰望潮八曰倚望九曰石􅀈十曰蜂江十一曰蘆虎十二曰蟛蜞又海商言海中􅔢鼊島之東一島多蠏種類甚異有虎頭者有翅能飛者有能捕魚者有殻大兼尺者傅嘉祐十二種論紅蟹紅蟹殻殷紅色巨者可以裝為酒杯也虎蟹殻上有虎班可裝為酒器與紅蟹皆産瓊崖海邉雖非珍奇亦不易採得也嶺表録異蝤䗋蝤䗋大者長尺餘兩螯至彊八月能與虎鬬虎不如隨大潮退殻一退一長酉陽輸芒蠏八月腹内有芒芒真稻芒也長寸許向東輪與海神未輪芒不可食上開腹中猶有海水本草腹毛蠏腹下有毛殺人酉陽敗漆磁石引鐵蟹之敗漆雖在明知弗知然也淮南若蠏之化漆麻之壊酒此不可以理者也抱朴蟹漆相合成水博物志蟹性敗漆燒之致䑕本草以蟹投於漆中化為水服之長生以黒犬血灌之三日燒之諸䑕畢至仙方捕䑕夫釋大道而任小數無以異於使蟹捕䑕蟾蜍捕蚤不足以禁奸塞邪亂乃逾滋注以艾灼蟹匡上納置穴中迺熟走窮穴適能擒一䑕也淮南蟹奴廣志云蜅小蟹大如貨錢又蟹奴如榆莢在其腹中生死不相離北户録海鏡海鏡廣人呼為膏葉盤兩片合以成形殻圓中甚瑩滑日照如雲母光内有少肉如蚌胎腹中有紅蟹子其小如黄豆而螯具足海鏡饑則蠏出收拾蟹飽歸腹海鏡亦飽或迫之以火則蟹子走出離腸腹立斃或生剖之有蟹子活在腹中逡巡亦斃嶺表録異蒯南海有水蟲名蒯蛤之類也其中有小蟹大如榆莢蒯開甲食則蟹亦出食蒯合甲蟹亦還入為蒯取以歸始終死不相離博物志璅蛣璅蛣腹蟹水母目蝦江賦璅蛣長寸餘大者長二三寸腹中有蟹子如榆莢合體共生俱為蛣取食南越志伐木而寄生枯芟草而絲萎川蟹不歸而蛣敗桑木見斷而蠧殄抱朴殻㸃蟹大小殻上多作十二㸃深燕支色亦如鯉之三年鱗耳其殻如虎蟹􅥿堪作壘子至於鸚巵螺杯不同年而語也北户録蝦鰝鰝大鰕長二三丈鬚長數尺今青州呼鰕魚為鰝爾雅珠蝦舜攝天子有援耳貫胸之民來獻珠蝦金樓子丹蝦有丹蝦長十丈鬚長八尺有兩翅其鼻如鋸載紫桂之林以鬚纒身急流以為栖息之處馬丹嘗折丹蝦鬚為杖後棄杖而飛鬚化為丹石在海傍洞㝠記蝦鬚吳南陽滕修為廣州刺史或語修蝦鬚長一丈修不信其人後故至東海取蝦鬚長四丈四尺封以示修修乃服之交廣記蝦頭杯南海以蝦頭為杯鬚長數尺金餙鏤之晉康州刺史常以杯獻簡文以盛酒未及飲酒躍於外時廬江太守曲安逺頗解術數即今筮之曰即三旬當後庭有告變者果有生子人面犬身南越志長鬚國大足初有士人隨新羅使風吹至長鬚國地曰扶桑洲其署官品有匠長戢波臣役島邏等號拜士人為司風長兼駙馬見姬嬪悉有鬚因賦詩曰花無橤不妍女無鬚亦醜丈人試遣惣無未未不如惣有王大笑曰駙馬竟未能忘情於小女頤頷間乎後至海龍王所見鐵鑊滿中是鰕有五六頭色赤大如臂見客跳躍似求救狀引者曰此鰕王也龍王命放之酉陽海蝦劉悔者登海船忽見忩板懸二巨蝦殻頭尾鉗足具全各七八尺首占其一分觜尖利如鋒刃觜尖上有鬚如紅筯各長二三尺長雙脚有鉗鉗粗如人大指長二尺餘上有芒刺如薔薇枝赤而銛硬手不可觸腦殻烘透彎環尺餘何止於盃盂也嶺表録異天蝦廣中邕容道常有鰕蛤隨雨至謂之天蝦天蛤人取鹵之不取亦化葢為海風攝至者番禺記紅蝦紅蝦出潮州番州南巴縣大者長二尺土人多理為盃或釦以白金轉相餉遺北户録水母水母廣州謂之水母閩人謂之􅬅嶺表録異東海有物狀如凝血縱廣數丈正方圓名曰鮓魚無頭目處無腹臟所處則衆蝦附之隨其東西南北越人煮食之博物志蜡一名摴蒲魚生東海如血䘓大者如牀小者如斗無腹胃眼目以蝦為目蝦動䖳沈故曰水母目蝦如駏驉之與􅀢􅀢相假矣本草南中好食之云性煖治河魚之疾嶺表録異海鏡蟹為腹水母蝦為目越絶書蝦姑閩中五色蝦長尺餘具五色梅蝦梅雨時有之蘆蝦青色相𫝊蘆葦所變白蝦青蝦各以其色泥蝦相𫝊稻花變成多在田泥中一名苗蝦又海中有蝦姑狀如蜈蚣云管蝦雅翼螺授醢鼈人祭祀共蠯蠃蚳以授醢人鄭司農云蠯蛤也杜子春云蠯蜯也周禮法螺公輸般見蠡出頭潜以足畫之蠡引閉其户終不可開因傚之設於門戸欲使閉藏當如此固宻也風俗通今門户猶以蠃為輔首古之遺制雅翼女化桂陽貞女峽𫝊云秦世有數女取螺於此遇風雨一女忽化為石人今形髙七尺狀如女子始興記紫螺武帝幸瓠子河聞水底有絃歌之聲有老翁出獻帝一紫螺殻中有物狀如牛脂帝問東方朔曰紫螺殻中何物朔曰是蛟龍髓以傅面令人好顔色又女子在孕産之必易令後宫産難者試之殊有神効帝以牛脂塗人面便白澤幽明録飯化衛瓘大康永熙中家人炊飲墮地盡化為螺出足而行瓘終見誅世説晉武帝時裴楷家炊黍在甑或變為螺其年楷卒石崇家稻米化螺崇亦被誅廣五行記粟化唐光啟中潤州大荒亂有居民家蓄絶多可一斗五百文先定價後人擁俟開倉倉中悉化小螺子人皆驚怪有收盛分去者至今有收得此螺子傳載放報廣陵王龍潭寺僧有夢數百人求濟者翌早見人擔螺蛤往市忽憶所夢贖放於潭數日忽於潭上獲一小盆非銅非錫非瓦非石持歸以為盥晨起索盥忽見禹餘糧子盈於中詢之其徒云某昨置數粒耳僧不之信試貯菽麥白銀等一夕皆充牣僧始寶之於是以所積金盛修刹宇及僧老且病弟子争其器僧云此水宫神物也無上事不可妄費乃取擲於潭遂化為金鴈飛去人目其處曰金鴈地志螺亭南康有女採螺為業夜宿亭上聞風雨聲見衆螺張口而至亂噉其肉明日惟有骨在焉故號其亭曰螺亭述異記南康記事稍同素女晉安書生謝端海岸得一大螺大如一石米斛割之中有美女曰予天漢中白衣素女天帝矜君純正令為君作婦端以為妖呵之女嘆息升雲而去上捜神記稍見互見天漢部螺婦義興吳堪為縣吏家臨荆溪忽得大螺已而化女子號螺婦縣令聞而求之堪不從乃以事虐堪曰今要蝦䗫毛鬼臂二物不獲致罪堪語螺婦即致之令乃謬語曰更要禍牛堪又語螺婦婦曰此獸也須㬰牽至如犬而食火糞以為火令與火試之忽遣糞燒縣宇令及一家皆焚死焉原化記鸚鵡鸚鵡螺旋尖處屈而朱如鸚鵡觜故以此名殻有青緑班大者可受二升肉内光瑩如雲母裝為酒杯奇而可翫嶺表録異螺離殻出食飽則還殻中若為魚所食殻乃浮出為人所得質白而紫文如鳥形與觴無異故因其象鳥為作兩目兩翼異物志螺常脱殻而逰朝出則有蟲類如蜘蛛入其殻中螺夕還則此蟲出庾闡所謂鸚鵡内逰寄居負殻者也異苑紅螺紅螺大小亦類鸚鵡螺殻薄而紅亦堪為酒器刳小螺為足綴以膠漆尤可佳尚也嶺表録異文螺海文蠡數種其大者受一斗南人以為酒杯廣志雲螺南人目螺之有文者曰雲螺用以酌酒上蒼鷹南人目江東人以為椀異物志海螺海螺鳴主大風螺吐光主隂雨螺蛤閉賊軍生亂𤣥珠蛤海蛤蛤有三皆生於海蛤蠣千歳鳥所化也海蛤百歳鷰所化也魁蛤一名復累老服翼所化説文黄雀化淮水中黄雀至秋化為蛤至春復為黄雀五百年化為蜃蛤述異記海蛤東越海蛤周書王㑹靈蛤西王母曰仙藥次有白水靈蛤漢武内𫝊萬年蛤真臘國進萬年蛤不夜珠光采皆若月照人無妍醜皆美艷帝以蛤賜飛燕以珠賜媫妤曰吾晝視后不若夜視之美且令人忽忽如失媫妤即以不夜珠為后夀終不道帝語趙后外𫝊文蛤晉書后妃𫝊論云惠皇識闇鳴蛙知昏文蛤沈光云文蛤即吳人所食文蛤得環周天和元年夏齊冀州人於蜯蛤中得瑶環一雙三國典畧取水唐麟徳中封禪用取明水李敬真曽八九月取蛤蚌一尺三寸者依法試之至半夜得水四五升唐新語成龍開寶六年漢陽軍獻蛤有文隠起成龍長五寸許金色鱗甲皎然大如蓆禮部侍郎李常云少監孫莘老莊居在髙郵湖邉嘗一夕隂晦莊客報湖中珠見與數同人至水際見微有光彩俄而光明如月隂霧中人面相覩忽見蚌蛤如蘆席大一殻浮水上一殻如張帆狀其疾如風舟子航小艇競逐之終不可及既逺乃没文昌雜録珂珮新安蠻婦人於耳上懸金環子聨貫琴瑟帖於髻側又繞腰以螺蛤聨穿繫之謂為珂珮雲南記如雪東海有蛤鳥常啖之其肉消盡殻起浮出更薄在沙中岸邊潮水往來碏薄蕩白如雪入藥最精勝採取自死者博物志食沙鳬鴈嘗在河邊沙上食沙石悉皆銷爛惟食蛤不消隨糞而出用以為藥倍勝常者古今注雷鳴不閉凡蛤之屬開口聞雷鳴不復閉口南越志蚌蒲盧十月雉入淮為蜃蜃者蒲盧也大戴禮明月申屠狄謂周公曰賤人何可薄耶周之靈蛙出於土石楚之明月出於蚌蜄少家大豪出於汚澤天下諸侯皆以為寶狄今請退也墨子鮚醬説文云鮚蚌也漢律㑹稽獻鮚醬二升漢書注鄞有鮚埼亭師古曰鮚音結蚌也長一寸廣二分有一小蟹在其腹中琦曲岸也其中多鮚故以名亭蚌醬李后主下屬州責蚌醬供宗廟恐滋味䤔作冉切䣸而琰切味薄也其下惶懼不敢寧廣川書䟦現羅漢像大觀中吳興邵宗益剖蚌將食中有珠現羅漢像偏袒右肩矯首左顧衣紋畢具僧俗創見遂奉以歸慈感寺寺臨溪流建炎中憲使楊應誠與客𫝊玩之之次不覺越檻躍入水中亟禱佛求之於烟波渺茫之一索而獲葉少藴曽公衮皆有詩賛之藝苑雌黄龍蟠處士李璞居夀春一日登樓見淮灘雷雨中一龍騰起雨霽行灘上得一蚌頗大偶拾視之其中有龍蟠之迹宛然鱗鬛爪角悉具老學菴筆記片帆洞庭湖中舊有巨蚌其大如片帆夜深側立一殻乗風往來煙波間中吐巨珠與月相射漁者一日端取之終不可得近久不見岳陽風土記盈車南方林邑有大蜯盈車明珠至寸不以為貴國人不採拾遺録含醬蚌含醬蚌即蜃也爾雅玉珧蜃小者名珧一名玉珧可飾佩刀鞘詩𫝊云天子玉琫而珧珌是也山海經蠌臯山臯水出焉東注激汝水其中多蜃珧爾雅海物異名云江琲柱厥甲美如瑶玉肉柱膚十曰江珧柱郭景純江賦云玉珧海月土肉石華退之謂馬柱甲是此也世人不用此珧字是未知耳侯鯖録水産東南之人食水之產西北之人食六畜產食水產者龜蛤螺蚌以為珍不覺其腥臊也食六畜產者狸兎䑕雀以為珍味不覺其膻燋也博物志無臟鳥無胃肺蛤蜃無臟蛭以空中而生蠶以無胃而育裴頠崇有論蚶魁陸蚶魁陸本草云魁狀如海蛤圓而厚外有理縱横即今之蚶也字書云蚶蛤也出㑹稽可食爾雅天臠炙瓦屋子葢蛤蜯之類也南中舊呼而為蚶子頃因盧鈞尚書作鎮遂改為瓦屋子以其殻上有稜如瓦壠故名焉殻中有紫色肉而滿腹廣人尤重之多燒以薦酒俗呼為天臠炙喫多即壅氣背膞煩疼未測其本性也嶺表録異進海蚶元和中嶺南節度使崔詠卒宰臣奏擬皆不可上謂裴度曰嘗有諫進海蚶淡菜者詞甚中正卿可求此人與之度出以訪人或有言孔戣諫者度即日以聞乃命之唐書奏貢蚶元禎為浙東觀察使明州歳貢蚶役郵子萬人不勝其疲禎奏罷之専車紫蚖如渠洪蚶専車江賦蚶則徑四尺背似瓦壟有文臨海水土物志玉覧入蚌下誤蛤蜊以殻為翅蛤蜊候風雨能以殻為翅飛酉陽菩薩文宗好食蛤蜊一日左右以方盤而進中孹不破裂者上疑其異乃焚香祝之俄頃自開中有二人形眉端秀體質悉備螺髻瓔珞足履菡蓞謂之菩薩上遂置之於金粟檀香合以玉線覆之賜興善寺令致敬至㑹昌中毁佛舍遂不知所在杜陽編隋煬帝嗜蛤事稍同酉陽油煎北方人喜用麻油煎物慶厯中羣學士㑹於玉堂使人置得生蛤蜊一簣令雍人烹之久而不至使人往視則云焦矣而尚未爛坐客莫不大笑筆談牡蠣鵰化牡蠣一名蠣蛤一名牡蛤陶隠一云是百歳鵰所化此物附石而生磈蠝相連如房故名蠣房讀如阿房之房一名蠔山晉安人呼為蠔莆初生海邊才如拳石四面漸長有一二丈者嶄巖如山海一房内有蠔肉一塊肉之大小随房所生大房如馬蹄小者如人指面每潮來則諸房皆開有小蟲入則合之以充腹海人取之以鑿房以烈火逼開之挑取其肉而其殻左顧者雄右顧者則牝蠣耳本草牝蠣言牡非謂雄也介蟲者唯牡蠣是鹹水結成也酉陽合澗南山謂蠣為蠔甲為牡蠣合澗洲圓蠣土人重之語曰得合澗一蠔雖不足蠔亦可以高南越志口實何𦙍侈於味食必方丈後稍欲去其甚者猶食白魚䱉脯糖蟹以為非見生物疑食蚶蠣使門人議之學生鍾岏曰䱉之就脯驟於屈申蟹之將糖躁擾彌甚仁人用意深懐如怛至於車螯蚶蠣眉目内闕慙渾沌之奇獷殻外緘非金人之慎不悴不榮曽草木之不若無馨無臭與瓦礫其何算故宜長充庖厨永為口實竟陵王子良見岏議大怒汝南周顒與𦙍書勸令食菜𦙍末年遂絶血味南史蠣嶼樂城縣新溪口有蠣嶼方圓數十畝四面皆蠣其味偏好永嘉郡記古賁古賁灰牡蠣殻異物志車螯吐氣車螯是大蛤一名蜄能吐氣為樓臺海中春夏間依約島溆常有此氣本草炙設廬陵王義真出為南豫州刺史劉湛為長史義真出時居髙祖憂使帳下備膳湛禁之義真乃於齋内别立厨帳㑹湛入煗酒炙車螯正色曰公當今不宜有此設義真曰旦甚寒一杯酒亦何傷酒既至湛因起曰既不能以禮自處又不能以禮處人沈約宋書北海前月十二日至永嘉郡蠣不如鄞縣車螯亦不如北海謝靈運荅弟石􅎕揚葩石􅎕應節而揚葩江賦石􅎕形如龜脚得春雨則生花花似草華南越志龜角石鮭龜角生石上有甲其子如栗春夏生苗如海藻亦有花所謂石鮭揚葩其狀甚異海録淡菜海夫人東海夫人生南海生珠母一頭尖中銜少毛海人亦名淡菜又名殻菜雖形狀不典而甚益人本草烏頭烏頭似蚶臨海水土物志􅒕蛤下來􅒕雖似烏頭各自有種上越王越王形似􅒕殻赤尾如人𤓰形上土肉土肉純黒如小兒背大長五寸重五六斤有腹無口目有三十足大如釵脯堪炙食臨海水土物志蝦蟇蟾蜍蝦蟇一名蟾蜍一名􅀈一名去甫一名苦蠪其肪塗玉則刻之如蠟故云能合玉石但肪不可多得取肥者剉煎膏以塗玉亦軟滑易截古玉器有竒特非雕琢人功者多是昆吾刀及蝦蟇肪所刻也本草取眉間有白汁謂之蟾酥衍義淮南謂之去蚊無腸蝦蟇無腸龍蛇屬也衝波傳月精紀乖政則蟾蜍月精四頭感翔春秋運斗畧蟾蠩去月天下大亂河圖月為刑而佐日見之於蝦蟇騰蛇之神而殆於即且史記月照天下蝕於詹諸淮説林蟾蜍食明月虹蜺薄朝日𫝊𤣥注戚施韓詩外𫝊曰嬿婉之求得此戚施薛君曰戚施蟾蜍喻醜惡也辟兵蟾蜍辟兵夀在五月之望文子蘭芝以芳未嘗見霜鼓造辟兵夀盡五月之望淮説林肉芝者謂萬歳蟾蜍頭上有角頷下有丹書八字體重以五月五日中時取之隂乾百日以其左足盡地即為流水帶其左手於身辟五兵若敵人射已者弓弩矢皆反還自向也抱朴仙藥辟兵法或以月食時刻三歳蟾蜍喉下有八字者血以書所持之刀劍隂蟲陸機漏刻賦云伏隂蟲以承波吞恒流其如揖孫綽銘靈虬吐注隂蟲承瀉陸倕銘靈虬承注隂蟲吐噏韓曰隂蟲蝦蟆也醫瘡張暢弟收嘗為猘犬所傷醫者云宜食蝦蟆膾可療收甚難之暢含笑先嘗收因此乃食瘡亦即愈宋書背有朱書唐髙宗嘗患頭風令宫人修藥餌初穿地置爐忽有一蝦蟆躍出色如黄金背有朱書武字帝命放之其夕宫人暴卒後武后竟革命瀟湘録如鼎神龍中渭水有蝦蟆大如鼎里人聚觀數日而失五行志蛇鬬先天二年六月京師朝堂磚下有大蛇出長丈餘有大蝦蟆如盤而目赤如火相與鬬俄而蛇入於大樹蛇蟆入於草蛇蝦蟆皆隂類朝堂出非其所也天使李揆乾元中為禮部侍郎嘗一日坐於堂之前軒忽聞堂中動盪喧嘩執燭入視見一蝦蟆大如三斗釡即命人大銅盆覆之客曰夫蝦蟆月中之物亦天使也今天使來公堂豈非上帝以榮命付公乎黎明啟視之已亡見矣後數日果拜中書侍郎平章事酉陽養蟆裴度太和中再在中書荐引李宗閔宗閔既得志長譛度度謂人曰養蝦蟆得水病其附下㒺上如此牛羊日厯鑿湖得蟇新繁縣有東湖李徳裕為宰日所鑿夜夢一老父曰某潜形其下幸庇之明府冨貴今鼎來七九之年當相見於萬里外後於土中得一蟇徑數尺投之水中而徳裕以六十三卒於朱崖果應七九之䜟北夢瑣言金蝦蟆偽蜀廣都縣百姓陳𢎞秦者家富於財嘗假貨錢一萬𢎞秦徴之甚急人曰請無慮吾先養蝦蟆萬餘頭貸之足奉償秦聞之惻然已其債仍别與錢十千令於蝦蟇於江中經月餘秦因夜歸馬驚不進前有物光明視之乃金蝦䗫也儆誡録肉芝蜀有村夫鬻有蝦蟇甚大兩目如丹皆云肉芝也有醫工買歸慮其走逸以大石臼合於地至曉石臼透明如燭籠醫工駭愕齋沐負鐺絜蟾辭家入青城山不知存亡茅亭客話抱芋羮百越人好食蝦蟆凡有筵㑹斯為上味先於釡中置水次下小芋煎之候湯沸如魚眼即下其蛙乃一一捧芋而熟如此呼為抱芋羮又云疥皮者最佳擲於沸湯即躍出其皮自脱皮既脱乃可以修饌時有一叟聞滋味大以為不可云切不得除此錦襖子其味絶珍聞之者莫不大笑南楚新聞炙蟾眉州人水濱釣蝦蟆置籃中皆兩兩相負牢不可折極力分之旋即相負如初市之以為珍味成都人最重之以料物和酒炙之曰炙蟾括蒼亦以為珍品名曰風蛤㳺宦紀聞田父蝦蟆大者名田父能食蛇蛇行田父逐之蛇不得去田父銜其尾久之蛇死尾後數寸皮不損肉已盡也洽聞記石撞徳興有毛山環三州界廣袤數百里每歳間山旁人夜持火炬入深溪或山洞間捕大蝦蟆名曰石撞見㳺宦紀聞有一種生山谷中黒色肉紅名石鱗魚並可食通志土檳榔土檳榔狀如檳榔在孔穴間得之新者尤軟相𫝊云蟾蜍矢也能已毒瘡雜俎蟾蜍擲糞自其口出自然論夀蟾蜍夀三千歳枹朴蟾蜍頭生角得而食之夀千歳又能食山精𤣥中記蟾蜍萬歳背生芝草出為世之祥瑞道書活師藟山湖水出焉東流於食水其中多活師山經科斗活東注蝦蟇子也爾雅生水中有尾和蜍魚漸大脚生尾脱本草一名𤣥針一名𤣥魚古今注蛙蟈蟈氏掌去鼃黽焚牡蘜以灰洒之則死注齊魯之間謂鼃為蟈黽耿黽也周禮衍義曰鼃其色青腹細觜尖後脚長故善躍大其聲則曰蛙小其聲則曰蛤月令所謂雀入大水化為蛤者也圖經似蝦蟇而背青緑色俗謂之青蛙亦有背作黄文者人謂之金線鼃陶隠居云蜂蟻鼃蟬其類最多大腹而脊青者俗名土鴨其鳴甚壯即爾雅所謂在水曰鼃者是也黒色者南人呼為蛤子食之至美即今所謂之蛤亦名水鷄是也閩蜀浙東人以為珍饌小形善鳴喚者多鼃子本草一名田鷄式怒越王句踐慮伐吳欲人之輕死也出見怒鼃乃為人聞之者曰何為式王曰鼃有氣如此可無為式乎士人聞之者鼃有氣王猶為式兄士人之有勇者乎是歳人有自剄死以其頭獻者韓内儲井鼃魏公子牟謂公孫龍曰子獨不聞夫塪井之鼃乎謂東海之鱉曰吾樂與吾跳梁乎井幹之上入休乎缺甃之崖赴水則接掖持頤蹶泥則没足滅跗還虷蟹與科斗莫吾能若也且夫擅一壑之水而跨跗塪井之樂此亦至矣夫子奚不時來入觀乎東海之鱉左足未入而右膝已縶矣於是逡巡而却告之東海之大樂於是塪井之鼃聞之適適然驚規規然自失也莊秋水投鼃燕太子丹自喜得荆軻永無秦憂日與軻逰東宫臨池而觀軻拾瓦投鼃太子令人捧槃金丸進之燕丹子羣鬭武帝元鼎五年秋蛙與蝦蟇羣鬭是歳四將軍衆十萬征南越開九郡漢志鼃黽也似蝦蟇而長脚其色青武紀注蛙蟆二物此説甚明本草分條載之是矣御覧孔帖爾雅翼通志畧混而一之俱誤鄭樵又云凡蝦蟆之類俱不交合惟雌雄相對吐沫漸成魚子遂變成科斗夫此物水中相負孰不見之而乃云云豈自序所謂廣覧動植漢唐諸儒所不得聞者耶取食武帝欲舉籍阿城以南盩厔以東宜春以西除為上林苑東方朔諫以謂此地土宜姜芋水多鼃魚貧者得以人給家足無飢寒之憂朔𫝊注葢人亦取食之供祭霍禹夢車騎聲正讙來捕禹舉家憂愁山曰丞相擅減宗廟羔菟鼃可以此罪也本傳注所以供祭給廩惠帝為太子在華林園聞蛙鳴聲問左右曰此鳴者為官乎為私乎太子令賈胤對曰在官地為官在私地為私惠帝令曰若是官蛙可給廩先是有䜟云蝦蟆當貴晉中州記皷吹齊孔稚珪字徳璋風韻清踈不樂世務門庭之内草萊不剪南有山池春日蛙鳴或問之曰欲為陳蕃乎稚珪笑曰我以此當兩部鼓吹何必期效仲舉僕射王晏嘗鳴笳鼔造之聞羣蛙鳴晏曰此殊聒人耳荅曰我聴卿鼓吹殆不及此晏有愧色南齊書談藪賦卞彬賦蝦蟆云紓青拖紫名為蛤魚世以此令僕也又云科斗唯唯羣浮闇水維朝繼夕聿役如鬼比令史諮事也南史呪厭沈僧昭别名法朗少事天師道士中年為山隂縣梁武陵王紀為㑹稽太守宴坐池亭蛙鳴聒耳王曰殊廢絲竹之聴僧昭呪厭十許口便息及日晚王又曰欲其復鳴僧昭曰王歡已闌今恣汝鳴即便喧聒上𤣥隂池石憲貨於鴈門闗行道中因偃大木下忽夢一僧蜂目披褐衲邀俗於𤣥隂池有一僧曰可聴吾徒之梵音也於是合聲而噪明日徑往㝷之行數里窮林積水有蛙甚多其水果謂𤣥隂池者其僧乃羣蛙耳宣室志皷精唐林藹為髙州太守有鄉野小兒牧牛聞田中有蛤鳴牧童遂捕之蛤跳入一穴中遂掘之乃蠻首家也得一銅皷其色翠緑土射數處損缺其上隠起多鑄蛙黽之狀疑其鳴蛙即銅鼓精也嶺表録異蛙謎曹著機辨有客試之因作謎云一物坐也坐卧也坐立也坐行也坐著應聲曰在官地在私地復作一謎云一物坐也卧立也卧行也卧走也卧卧也卧客不能曉曹曰我謎吞得你謎客大慚廬陵官下記性熱蛙性熱甚補人人有折其足於瓶中以水養之不三五日其損如故亦有以蘇剪食者北户録注蜥蜴注鳴蠑螈蛇醫以注鳴者也在草曰蜥蜴在壁曰蝘蜓蝘蜓守宫也説文石龍子一名守官一名山龍子吴氏本草一曰蛇師北户録桂林之中守宫大者能鳴者謂之蛤蚧方言射覆上嘗使諸數家射覆置守宫盂下射之皆不能中方朔對曰臣以為龍又無角謂之為蛇又有足跂跂脈脈善言壁是非守宫即蜥埸上曰善賜帛十疋漢書硃砂養蜥蜴或謂之蝘蜓以器養之食以硃砂體盡赤所食滿七斤治𢷬萬杵以㸃女人支體終年不滅唯房室則滅故號守宫𫝊云東方朔語漢武帝試之有騐博物志蜥蜴與魚交魚跳躍則蜥蜴從草中下稍相依近供浮水上而相合事竟魚還水底蜥蜴還草中三教珠英蛤蚧蛤蚧首如蟾蜍背有細鱗如蚕子上黄色身短尾短多藏於山谷城牆或大樹間一雌一雄行常相隨常自呼其名曰蛤蚧本草南民曰蛤蚧生一歳每鳴一聲二歳每鳴二聲有至十聲者土人以老蛤蚧尤重之物類相感志其聲絶大或曰一年一聲騐之非也端州大㕔有蛤蚧州吏云有年多年至今每鳴或三聲或一聲不定也北户録蛤蚧大月三聲小月兩聲海録螳蜋拒斧不過螳蜋蛑螳蜋有斧痕江東呼為石蜋其子蜱蛸爾雅世謂之天馬一名齕疣兖豫謂之拒斧淮南注齊把以東謂之馬糓方言一名斫父説文深秋乳子至夏之初始生孫炎爾雅正義當轍齊莊公出獵有螳蜋舉足將摶其輪問其御曰此何蟲對曰此螳蜋也其為蟲也知進而不知却不量力而輕就敵公曰此為人必為天下武勇矣迴車而避之勇武聞之知所盡死矣故田子方隠一老馬而魏國寳之齊莊公避一螳蜋而勇武歸之淮人間蘧伯玉謂顔闔曰汝不知夫堂蜋乎怒其臂以當車轍不知其不勝任也是其才之美者也莊人間世螳蜋氣蟲摶斧奮臂當轍不迴勾踐是避勇士致斃勵之以義郭璞賛晉文迴輪於勇蟲而壯士雲赴句踐曲躬於怒蛙而戎卒輕死抱朴齊莊公迴車韓詩淮南俱同而郭以為句踐葛以為文豈各别有見耶捕蟬吳王夫差令於邦中曰寡人伐齊有敢諍者死太子友欲因諷諫以激於王清旦懐丸持彈從後園而來衣洽履濡王怪而問之太子友曰適游後園聞秋蜩之聲往而觀之夫秋蟬登高樹飲清露隨風撝撓長吟悲鳴自以為安不知螳蜋超枝縁條曳腰聳距而稷其形夫螳蜋翕心而進志在有利不知黄雀盈緑林徘徊枝隂􅀈􅀈微進欲啄堂蜋也夫黄雀但知伺螳蜋之有味不知臣挾彈危擲蹭蹬飛丸而集其背也吴越此三者皆務欲得其前利而不顧其後之有患也説苑韓詩孫叔敖諫楚莊王事同鄣葉楚人足貧讀淮南方得螳蜋伺蟬自鄣葉可以隠形遂於樹下仰取葉螳蜋執葉伺蟬以摘之葉落樹下樹下先有落葉不能復分别掃取數斗歸一一以葉自鄣問其妻曰汝見我不妻時始恒荅言見經目乃厭倦不堪紿云不見嘿然大喜齎葉入市對面取人物吏遂縳詣縣官受辟自説本末官大笑放而不治邯鄲笑林蟬異名蟬楚謂之蜩宋衛之間謂之螗蜩陳鄭之間謂之䗅蜩秦晉之間謂之蟬海岱之間謂之䗁方言復育蟬未脱時名復育相傳言蛣蜣所化秀才韋翾莊在社曲常冬中掘樹根見復育附於朽處怪之村人言蟬固朽木所化也翾因剖一視之腹中猶實爛木酉陽蟬生於復育開背而出論衡蟬鳴取子羿五歳父母與之入山處之木下以待蟬鳴還欲取之而群蟬俱鳴遂捐而去羿為山間所養年二十習於弓矢仰天大嘆曰我將射四方矢至吾門止因捍弓即射矢靡他截草徑至役之門乃隨矢去括地象齊女牛亨問仲舒曰蟬名齊女者何故荅曰昔齊王之后怨王而死屍變為蟬登庭樹嘒唳而鳴王深恨之故曰齊女仲舒荅問古今注承蜩仲尼適楚出於林中見痀慺者承蜩猶掇之也仲尼曰子巧乎有道耶曰我有道也五六月累垸二而不墜則失者錙銖累三而不墜則失者十一累五而不墜猶掇之也吾處身若橜株駒吾執臂若槁木之枝雖天地之大萬物之多而唯蜩翼之知吾不反不側不以萬物易蜩之翼何為而不得孔子顧謂弟子曰用志不分乃疑於神其痀僂丈人之謂乎列黄帝莊達士識時貂蟬古服也貂者取其有文而不煥外柔而易内剛而勁也蟬者取其清虚而識時變也在位者有文而不自耀有武而不示人清虚自牧識時而動古今注五徳昔人稱蟬有五徳頭上有緌則其文也含氣飲露則其清也黍稷不亨則其廉也處不巢居則其儉也應候守節則其信也陸雲寒蟬賦翳葉顧愷之好諧謔人多愛狎之尤信小術以為求之必得桓𤣥嘗以一柳葉紿之曰此蟬所翳葉也取以為蔽人不見已愷之喜引葉自蔽𤣥就溺焉愷之信其不見已也甚以珍之晉書青林樂唐時京城㳺手夏日採蟬貨之唱曰只賣青林樂婦人小兒争買以籠懸忩户間亦有騐其聲長短為勝負者清異録蟋蟀異名蟋蜶蛬劉邵注云謂蛚蜻也孫炎曰梁國謂之蛬爾雅南楚謂之王孫方言一名吟蛩一名蛩濟南呼為懶婦一名紡緯古今注幽州人謂之促織里語趣織鳴懶婦驚詩義疏蟋蟀食蠅而化成詩義問代簫管道賁聞蟋率曰時聞此聲是代簫管髙僧傳金籠蟋蟀每至秋時宫中妃妾輩皆以小金籠捉蟋蟀閉於籠中置之枕函夜聴其聲庶民之家皆效之也開天遺事葦化朽葦之為蛬也稻之為加虫也捜神記蜂異名蜂燕趙之間謂之蠓螉大者有蜜謂之盡蜂或呼笛師方言蜂君蜂有君禮也化書蜂無王而盡死自然倫聖人師蜂立君臣師蜘蛛立網罟師拱䑕制禮師戰蟻置兵闗尹子兼採蜜蜂以兼採為味張璠易法序蜂舟周武王東伐紂夜濟河時雲明如晝八百之族皆齊而歌有大蜂狀如丹鳥飛集王舟因以鳥畫其族翌日而梟紂名其船曰蜂舟魯哀公二年鄭人擊趙簡子得其蜂旗則其類也拾遺記垂芒蜂蠆垂芒捜神記邾人以須句故出師公卑邾不設備而禦之臧文仲曰國無小不可易也無備雖衆不可恃也君其無謂邾小蠭蠆有毒而况國乎僖二十二附車豫章嚴豐字孟侯為郡主簿太守賈萌舉兵欲誅王莽有飛蜂附萌車衡豐諫以為不祥之徴萌不從果見殺謝承書集船陶侃以袁謙為高凉太守未至百餘里浦中有蜜蜂蔽日而下謙船上明早進西南卒遇大風飛砂天地晦合不復得還浦遂殁海中王隠晉書懐袖卒驚鄒湛對武帝曰猛禽在田荷戈而出凡人能之蜂蠆作於懷袖勇夫為之驚駭出於意外故也晉書逐賊元嘉元年建安郡山賊百餘人掩破郡治抄掠百姓子女資産遂入佛圖摶掠財寶先是諸供養具别封置一室賊破户忽有蜜蜂數萬頭從衣麓出同時噬螫羣賊身首腫痛眼皆盲合先諸所掠皆棄而走宣記孔昇翁東都龍門有一處天寶寺北宗雅禪師於此建蘭若庭多古柏枝榦拂地一年中桐始華有異蜂聲如人吟詠禪師諦視之具體人也但有翅長寸餘禪師異之乃網取一焉置紗籠中意嗜桐華採苑置其傍終日集於一隅微聆吁嗟之聲忽有數人翔集籠外若相慰狀又一日其類數百有乗車輿者其大小相稱積於籠外語聲甚細亦不憚人僧蜜聴之有曰孔昇翁為君筮不祥頗記元有曰君已除死籍又何懼焉有曰叱叱予與青桐君奕勝獲琅玕紙數十幅君出可為扎星子詞當為料理語皆非人世事終日而云禪師舉籠放之因視謝之次日有人長三尺黄羅衣衣虚止禪師屠蘓前曰我三清使者上伯仙致意多謝指顧失所在酉陽鸞蜂貞元八年吴明國貢鸞蜂蜜云其蟲之聲有如鸞鳯而身被五彩大者可重十餘斤為巢於深巖峻嶺間大者占地二三畝國人採其蜜不逾三二合如過度即有風雷之異若螫人則生瘡以石上菖蒲根𫝊之即愈久食之令人長夀顔如童子髪白者應時而黒桂陽編怒螫皇甫湜性褊急嘗為蜂螫手指因大躁怒命臧獲及里中小兒輩箕斂蜂窠購以善價俄頃出窠於庭命碎於杵白絞取津液以酧所痛唐闕史䗊蜂劉恂曽逰宣歙門見彼中人好食蜂兒狀如蚕蛹而璧白大蜂結房於山林間其大如巨鍾其中不知幾百層村人採時必以草衣蔽身以􅀈毒螫復以烟火逼散蜂母然後攀援崖樹㫁其根一扇有蜂兒五斗或一石二分之一翅足具矣即入鹽酪炒之曝乾以小闕貯之寄入京洛以為方物嶺表録異射覆丁文果善射覆宋太宗一日置一物急令射之果乃曰葩葩華華山中採花雖無官職一日两衙啟之乃數蜂也玉壺清話若壺赤蟻若象𤣥蜂若壺楚辭五原蔡誕云崑崙山大蜂一丈其毒殺象抱朴蜂房夫牛蹄之涔不能生鱣鮪而蜂房不容鵠卵小形不足以苞大體也淮記論蜘蛛喜母􅀈蛸長踦爾雅小鼅鼄長脚者一名􅀈蛸一名長踦俗呼為喜子䟽􅀈蛸長足蜘蜘也詩義問一名長脚荆州河内人謂之喜母此蟲來著人衣當有親客有喜也幽州人謂之親客亦知蜘蛛為羅網居之陸機䟽赤班者俗名絡新婦本草陶網蟲網蟲垂户織夕鳥傍簷飛沈休文學省愁卧詩結網太昊師蜘蛛而結網抱朴解網湯出見羅者湯下車命解其三面置其一面更致祀曰昔蛛蝥作網今人學結欲左者左欲右者右欲髙者高欲下者下吾取其犯命者帝王世紀執􅀢晉公子重耳奔齊與五臣游乎大澤中見蜘蛛布網曳繩執􅀢而食之公子重耳乃撫撲之於駐駟而觀之顧謂其臣咎犯曰此蟲也智之薄者矣而猶役其智布其網曳其繩執􅀢而食之况乎人之有智而不能廓垂天之網布絡地之罟以供方丈之御是曽不如蜘蛛之智孰可謂之人乎咎犯曰公子慎勿言也若終行之則有邦有嗣矣符子蜘蛛隠楚國龔舍初隨楚王朝宿未英宫見蜘蛛大如栗四面縈羅網有蟲觸之而死者退而不能得出焉舍乃嘆曰吾生亦如是耳仕宦者人之網羅也豈可淹歳於是挂冠而退時人笑之謂舍為蜘蛛之隠金樓子如栗張文成景雲二年為鴻臚寺丞帽帶及緑袍並䑕嚙有蜘蛛大如栗當寢門縁絲上經數月大赦加階授五品僉載如輪相𫝊裴旻山行有山蜘蛛垂絲如匹布將及旻引弓射殺之大如車輪因斷其絲數尺收之部下有金瘡者剪方寸貼之血立止酉陽飯化道士許相之言以盆覆寒食飯於暗室地土入夏悉化為蜘蛛上蛛嘲洛陽有歌婦楊苧羅聰惠有才思解嘲辨楊凝式甚憐之時有僧雲辨者善講經有口才楊尤重之長夀年五月雲辨對講歌者忽有蜘蛛於簷前垂絲而下正對楊與雲辨前楊笑謂歌者曰試嘲得着奉絹二匹歌者不思應聲嘲之意不離雲辨辨體充肚大楊見詩絶倒大叫和尚將絹來雲辨慙且笑與絹五匹詩曰吃得肚嬰撑尋思繞寺行空中設羅網只待殺蟲生洛陽舊聞記為妖江夏城南鐵佛寺内有蜘蛛井世𫝊唐時有紅白二蜘蛛化為妖婦以媚人故鑄鐵佛鎮王志蟻𤣥駒十有二月𤣥駒賁𤣥駒者也螘也賁者走於池中也大戴禮牛亨問曰蟻名𤣥駒者何也荅曰河南人並河而見人馬數千萬皆如黍米逰動往來從旦至暮家人以火燒之人皆是蚊蚋馬皆是大蟻故今人呼蚊蚋曰黍民名蟻曰𤣥駒也古今注吾見𤣥駒之步雉之晨呴也法言蚍蜉蚍蜉大螘其子蚳爾雅其場謂之坻或謂之垤方言戴粒東海有鼇焉冠蓬萊而浮游於滄海騰躍而上則干雲之峯類邁於羣岳沈没而下則隠天之丘潜嶠於重川有蚳蟻聞而悦之與羣蟻相要呼海畔欲觀鼇之形月餘鼇潜未出羣蟻將反遇長風激浪崇濤萬仞海水沸地雷震羣蟻曰此將鼇之作也數日風止雷黙海中隠起如岊羣蟻曰彼之冠山何異我之戴粒逍遥封壤之巔歸伏乎窟穴之下此乃物我之適自已而然何用數百里勞形而觀之乎符子知水管仲隰朋從於桓公而伐孤竹行山中無水隰朋曰蟻冬居山之陽夏居山之隂蟻壤一寸而仞有水乃掘地遂得水管子娱意空城寥廓所聞者悲風所見者鳥雀昔陳司空為邑宰所在幽閒獨坐愁思幸賴游蟻以娱其意以今况之知不虚矣應􅟛與曹昭伯牋牛鬭殷仲堪父病虚悸聞牀下蟻動謂是牛鬭孝武不知是殷公問仲堪有一殷病如此不仲堪流涕而起曰臣進退唯谷世説蟻王吳富陽董昭之嘗乗船過錢塘江中央見一蟻著一短蘆走一頭迴復向一頭甚遑遽畏死因以繩繫蘆着舡船至岸蟻得出其夜夢一烏衣人謝云僕是蟻中之王也感君見濟之恩君後有急難當相告語厯十餘年時所在刼盜昭之被横録為刼主繫餘姚昭之忽思蟻王之夢結念之際同被禁者問之昭之具以實告其人曰但取三兩蟻着掌中語之昭之如其言夜果夢烏衣云可急投餘杭山中天下既亂赦令不及也既寤蟻齧械已盡因得出獄過江投餘杭山旋遇赦遂得無他齊諧記蟻宫西京化度廢寺有礓石徑三尺餘孔穴通連若欄櫓樓臺之狀號曰蟻宫昔有於中見蟻金色其大若蜂動逾因掘地及泉得此石焉兩京記蟻城忠州墊江縣吏冉端唐開成初父死有嚴師者善山岡為卜地云合有王氣羣聚之物掘深丈餘遇蟻城方數丈外重雉堞皆具子城譙櫓工若彫刻城内分徑街小垤相次每垤有蟻數十憧憧不絶徑甚净滑樓中有二大蟻一紫色長寸餘足作金色一有羽細腰稍小白翅翅有經脈疑是雌者衆蟻約有數解其城隅小壞上以堅土為葢故中樓不損既掘露蟻擾擾若求救狀端懼而掩之酉陽長尺馬緒謫潮得巨蟻長尺餘鹽漬之歸誇北人續博物志蚍蜉王徐𤣥之夜讀書有人物如粟粒數百皆具甲胄擁一赤幘紫衣者行案上𫝊呼曰蚍蜉王欲觀漁於紫石潭一赤幘紫衣者凡數百齊入硯中獲小魚數千頭𤣥之以書卷蒙之執燭以觀一無所見異聞集𤣥之捨卷而寢方寐間忽被甲士逮去其王曰蚍蜉王其官有馬知𤣥螱飛其㞐有候兩殿陵雲臺𤣥之夢覺明日掘得蟻穴如三石缶盡焚之纂異記有君螻蟻之有君也一拳之宫與衆處之一塊之臺與衆臨之一粒之食與衆蓄之一蟲之肉與衆師之一罪無疑與衆戮之化書化蝦嶺南暑月欲雨則朽壞中白蟻蔽空而飛入水翅脱化為蝦土人遇夜於水次乗燭蟻見火光悉投水中則以竹漉取摶之每摶以豚臠糝之為鮓號天蝦鮓又有大赤蟻作窠於木梢如數升器者取其卵並蟻以糝泊薑鹽釀焉味極辛辣倦㳺録蟻醬交廣溪洞聞酋長多蟻卵陶令净鹵以為醬醬或云其味酷似肉醬非官客親友不可得也嶺表録異蝴蝶鳯車蛺蝶一名野蛾一名風蝶江東呼為撻末色白皆青者是也其大如蝙蝠者或黒色或青斑名曰鳯子一名鳯車一名鬼車生江南柑橘園中古今注化陵舄得鬰棲則為烏足烏足之根為蠐螬其葉為胡蝶胡蝶胥也莊至樂木蠧生蟲羽化為蝶捜神記麥之為蛺蝶也羽翼焉眼目成焉心智存焉此自無知知而化為有知而氣易也上夢蝶夢者莊周夢為蝴蝶栩栩然胡蝶也自喻適志與不知周也俄然覺則蘧蘧然周也不知周之夢為胡蝶與胡蝶之夢為周與周與胡蝶則必有分矣此之謂物化莊子大如燕劉子卿居廬山有五綵雙蝶來逰花上其大如燕夜間有二女子曰感君愛花間之物故來相諧君子豈有意乎子卿曰願伸繾綣二女曰今宵讓姊次夜姊曰昨夜之歡今留於汝自是每旬一至者數年廬山有廟泥塑二神女容貎如二婦人六朝録稽神秘苑驚蛺蝶魏收昔在洛京輕薄尤甚人號曰魏收驚蛺蝶文襄㑹逰東山令給事黄門侍郎顥等宴文襄曰魏收恃才無宜適須出其短往復數畨收忽大唱曰楊遵彦理屈己倒愔從容曰我綽有餘暇山立不動若遇當塗恐翩翩遂逝當塗者魏翩翩者蛺蝶也文襄知知之大笑稱善北齊書樹子化蝶長安城禁苑内一大樹冬月雪中忽花葉茂盛及凋落後結實其子光明燦然如火之照焉數日皆化為紅蛺蝶飛去至明年唐髙祖自唐國入長安此其前兆也瀟湘録滕王蝶圖劉魯封云見滕王蝶圖有名江夏班大海眼小海眼村裡來菜花子酉陽白尺蠖化白蛺蝶尺蠖繭所化也秀才顧非熊少時見鬰栖中壞緑裙幅旋為蝶張周封言百合之合之泥其隙經宿化為大蝴蝶蝶異段公路常見盧肇説捉得一粉蝶如兩手大上有散緑㸃丁香眼前翅頭兩畫臙脂色後翅為燕尾分亦蝶之異也北户録注木葉化段公路南行厯懸獲蛺維舟飲水覩崖側有一木五綵初謂丹青之樹命僕採獲一枝尚綴軟蝶凡二十餘個有翠紺縷者金眼者丁香眼者紫班眼者黒花者黄白者緋脉者大如蝙蝠者小如俞莢者因登岸視之乃知木葉化焉北户録如蒲帆常有人㳺南海泊於孤岸有物如蒲帆飛過海將到舟舟人競以物擊之如帆者盡破碎墮地視之乃蛺蝶也海人去其翅足稱之得肉八十斤噉之極肥美嶺南異物志衣化羅浮山有蝴蝶洞在雲峯巖下古木叢生四時出綵蝶世𫝊葛仙遺衣所化舊志媚蝶鶴子草蔓上春生雙只食其葉越女收於糚奩中養之如養蠶法蟲老不食而蜕為蝶蝶赤黄色女子佩之如細鳥皮號為媚蝶嶺表録異北户録蝶粉蝶交則粉退蜂交則黄退蜻蜓赤弁使者水蠆為􅩜矛􅀈務蜻蛉也淮南一名桑根説文一名白宿吕覧注淮南人呼康伊方言注蜻蛉一曰青亭色青而大者是也小而黄者曰胡離一名胡黎小而赤者曰赤卒一曰綘騶一名赤衣使者海録作青弁一名赤弁丈人紺蝶一名蜻蛉似蜻蛉而色𤣥紺江東人呼為紺幡亦曰童幡亦曰天鷄好以七月羣飛暗天海邊夷貊食之者謂海中青鰕化為之也古今注一名虰蛵一名負勞爾雅鄱陽人呼江鷄雅翼射蜻楚莊王命養由基射蜻蛉曰吾願生得之養由基援弓射之拂左翼尸子忘機海上之人有好蜻蛉者毎居海上㳺蜻之至者百數而不止前後左右盡蜻也終日玩之而不去其父告之曰聞蜻皆從汝居取而來吾將翫之明日之海上而蜻無至者矣吕覧童子戯莊辛對楚襄王曰夫蜻蛉六足四翼飛翔乎天地之間俛啄蚊䖟而食之仰承丼露而飲之自以為無患與人無争也不知夫五尺童子方將調飴膠絲加已乎四仞之上而下為螻蟻食也楚䇿化珠五月五日埋蜻蜓頭於西向户下埋至三日不食則化成青真珠又云埋於正中門博物志青蛉之首瘞而為珠類從螢異名螢火一名即炤爾雅一名景天一名丹良一名夜光一名宵燭古今注一名放光一名夜照本草丹鳥丹鳥羞白鳥丹鳥者謂丹良也白鳥者謂蚊蚋也其謂之鳥也重其養也有翼者為鳥羞也者進也不盡食也大戴禮逐螢光行光熹元年秋張讓叚珪刼少帝及陳留王走小平津帝與王夜逐螢火光行數里得民家露車共乗還宫後漢囊螢車𦙍字武子好學不倦家貧不常得油夏月用練囊盛數十螢火以夜繼日焉續晉陽秋車𦙍好學嘗囊螢光讀書時值風雨𦙍嘆曰天不遣我成其志業耶言訖有大螢傍書忩比常螢數倍讀書訖即去來如風雨至獨異志成應元事統微螢逰山煬帝大業末天下已盜起帝於景華宫徴求螢火數斛夜出㳺山如放光火徧巖谷隋書螻蛄五伎螻蛄一名天螻一名􅕪本草梧䑕五技而窮荀子螻蛄一名石䑕古今注碩䑕五能不成一技術注云能飛不能過屋能縁不能窮木能㳺不能度谷能穴不能掩身能走不能絶人蔡邕勸學篇如牛黄帝起有大螻見河圖鄒衍言黄帝土徳有螻蛄如牛劉向别録黄帝時有大螻如羊宋符瑞志穿獄廬陵太守龎企自云其乃祖非罪係獄將上有螻蛄行其左右謂曰爾有神能活我死否因投食與之螻蛄食飲盡去有頃復來形體稍大意每異之乃復與食如此數月間其大如豚及將刑之夜螻蛄掘壁為大穴乃破械從之出亡後遇赦免故龎氏世祀螻蛄焉捜神記蠅醜扇蠅醜扇青蠅之類好摇翅自扇爾雅灰生爛灰生蠅淮蠅生積灰蜂出蜘蛛發蒙記蠅墮水死者置於灰中須臾即活相感志或曰大麻蠅茅根所化酉陽腐聚腐肉所在青蠅集聚辨别白黒敗亂邦國易林託驥蒼蠅之飛不過十步託驥之旄乃騰千里之路然無損於騏驥得使蒼蠅絶羣也張敞集光武與隗囂書曰蒼蠅之飛不過三數步託驥之尾得以絶羣東觀漢記附騏驥之旄端軼歸鴻於碣石廣絶交論青蠅為弔客虞翻放逐南方自恨犯上獲罪當長没海隅生無可與語死以青蠅為弔客使天下一人知己者足以不恨别恨逐蠅王思正始中為司農性急嘗執筆作書蠅集筆端驅去復來如是再三思恚怒自起逐蠅不能得還取筆擲踏壞之苛吏傳夢集鼻魏何晏嘗夢見青蠅數十頭來集鼻上驅之不肯去以問管輅輅曰鼻者艮此天中之山今青蠅臭惡而集之焉位峻者顛輕豪者亡不可不思害盈之數盛衰之期至明年晏及鄧颺皆伏誅廣五行記蠅赦符堅時鳯凰集於東閣大赦天下初將為赦與王猛符融議於丼露堂悉屏左右堅自為文有一大蒼蠅入自牖間鳴聲甚大集於筆端驅而復來堅惡之久而方去俄而長安街巷市里民相告曰官今大赦有司以聞堅驚謂融曰禁中無屬耳之垣事何從而泄也敇外推之咸言有一小人衣青衣大呼於市曰官今大赦須臾不見堅嘆曰其向蒼蠅乎聲狀非常吾固惡之前秦録異苑作晉明帝杕閣厙狄伏連居室患蠅杖門者曰何故放入北史號凍蠅王方慶體質鄙陋言辭魯鈍為鳯閣侍郎張元一謂之被凍僉載鷹頭袁楚客規魏元忠書云閹宦君側之人衆所畏懼所謂鷹頭之蠅廟垣之䑕者也豆擊蠅張芬在韋臯幕中有一客於宴席上以籌椀中緑豆擊蠅十不失一一座驚笑芬曰無費吾豆遂指起蠅拈其後脚畧無脱者酉陽食苽蠅集武儒衡為中書舍人時元稹依倚内官得知制誥儒衡深鄙之食食苽閣下蠅集於上儒衡以扇揮之曰適從何處來而遽集於此同僚失色儒衡意氣自若舊唐聲蠅類有蒼者聲雄壯負金者聲清聒其聲在翼也青者能敗物巨者首如火酉陽一名景跡謍謍營營青蠅止于林説文蚊白鳥營肌齊桓公卧於栢寢謂仲父曰吾國富民殷無餘憂矣一物失所寡人猶為於邑白鳥營肌而求飽寡人因之開翠紗之幬進蚊子焉其蚊有知禮者不食公之肉而退有知足者㗱公之肉而退有不知足者遂長嘘短吸而食之及其飽也腹腸為之破潰公曰嗟乎民生亦猶是矣金樓子蚊睫景公問晏子曰天下有極細乎對曰東海有蟲巢於蚊睫再乳再飛而蟁不為驚名曰焦螟晏子江浦之間生麽蟲其名曰焦螟羣飛而集於蚊睫弗相觸也栖宿去來蚊弗覺也離朱子羽方晝拭皆揚眉而望之弗見其形􅚞俞師曠方夜擿耳俛首而聴之弗聞其聲唯黄帝與容城子居空峒之上同齋三月心死形廢徐以神視塊然見之若嵩山之阿徐以氣聴砰然聞之若雷霆之聲列子南方蚊翼下有小蜚蟲焉目明者見之每生九卵伏成九子蜚而俱去蚊遂不知神異經射覆郭舍人曰願問朔一事朔得臣願榜百朔窮臣當賜帛曰可從何處來歌謳且行不從門入踰我垣牆㳺戯中庭上入殿堂擊之拍拍死者欀欀格鬭而死主人被創是何物也朔曰長喙細身晝亡夜存嗜肉惡烟為掌所捫臣朔愚戅名之曰蟁舍人辭窮當復脱褌方朔𫝊髙齋無蚊荆州髙齋盛夏之月無白鳥餘極寢處於其中及移餘齋則聚蚊之聲如雷矣數丈之間如此之異吁可怪哉金樓子蚊子樹嶺表有樹如冬青實生枝間形如枇杷子每熟即折裂蚊子羣飛唯皮殻而已土人謂之蚊子樹嶺南異物蚊母鳥蚊母鳥形如青鷁嘴大而長於池塘捕魚而食每叫一聲則有蚊蚋飛出其口俗云採其翎為扇可辟蚊子亦呼為􅀈蚊鳥嶺表録異煑鱉煮鱉煮羊以䶉煮鱉以蚊燕山録螫鱟鱟性畏蚊蚊小螫之輒斃埤雅虱相弔湯沐具而蟣虱相弔大厦成而鷰雀相賀淮南無定質今頭虱着身皆稍變而白身虱處頭皆漸化而黒是𤣥素果無定質移易在乎所漸也抱朴虱父齊魯争汶陽之田魯侯有憂色魯隠者周豐往見曰臣嘗晝寢啾然有羣虱之鬭乎衣中丼臣膏腴之肌稱臣項膂之膚相與樹黨争之日争不息相殺者大半虱父止之曰我與你所慮不過容口而已奚用交戰為哉羣虱止今君以七百里為君之城亦以足矣而以汶陽數畝之田惑君之心曽不如一虱之智竊為君羞之魯侯曰善風賦齊卞彬為蚤虱賦序曰虱有諺言朝生暮孫若吾之虱者無湯沐之慮絶相弔之憂晏聚乎久袴爛布之裳復不懃之討捕孫孫子子三十五歳南史破虱録段成式曽一夕堂中㑹時妓女玉壺忌魚炙見之色動因訪諸妓所惡者有蓬山忌䑕金子忌虱尤甚坐客乃兢徴虱挐䑕事多至百餘條以擾之予戯摭其事作破虱録酉陽化青蟲汝隂尉李仲舒漢臣山陽人平生戒殺去釋教令置虱於綿絮骨筒中久亦飢死有人教放青葉草上經宿占霧則為青蟲飛去視之信然皆拆背而化鷄肋編夢虱夢梳蔑為憂解也蟣虱盡去百病愈也蟣虱為憂囓人身也夢見蟣虱而有憂至也夢書卜病相𫝊人將死虱離身或云取病者虱於牀前可以卜病將差虱行向病者背則死酉陽濡需濡需者豕虱是也擇䟽鬛自以廣宫大囿奎蹄曲隈乳間股脚自以為安室利處不知屠者之一旦鼓臂布草操烟火而已與豕俱焦也莊徐無鬼蝸牛𤓰牛李云蝸蟲有兩角俗謂之蝸牛三蒼云小牛螺也俗名黄犢莊注蛞螔蝓一名陵蠡一名土蝸一名附蝸一名蠡牛亦曰𤓰牛入三十六禽限又是四種角蟲之類熒室星之精矣本草此即負殻蜒蚰也日華子蝸角戴晉人告魏惠王曰有國於蝸之左角者曰觸氏有國於蝸之右角者曰蠻氏時相與争地而戰伏尸數萬逐北旬有五日而後反莊則陽蚯蚓胊䏰瓊州地名胊䏰胊䏰是蚯蚓也故土多此蟲常至使江畔出其身半跳於空中而鳴其形胊䏰劉賓客嘉話歌女一名蜜蟺一名曲蟺善長吟於地中江東謂之歌女或謂鳴砌亦呼為䗙蚓古今注一名土龍一名地龍子其屎呼為蚓螻本草鳴非蚯蚓按月令螻蟈鳴蚯蚓出葢蚯蚓與螻蟈同處鳴者螻蟈非蚯蚓也吴人呼螻蟈為螻蛄故諺云螻蟈叫得腸斷曲蟮乃得歌名席上輔談如虹黄帝起大蚓見河圖説徴螾大如虹世紀螾土精大五六圍長十餘丈索隠白巾女孟州王雙宋元帝元嘉初忽不欲見明常取水沃地以菰蔣覆上眠息飲食悉入中云恒有女着青裙白領中來就其寢母聴聞薦下有聲厯厯發之見一青色白纓蚯蚓長二尺許云此女常以一奩香見遺氣甚清芬奩乃螺殻香則菖蒲根於時咸謂雙暫同阜螽矣異苑為羮食姑隋煬帝大業中河南婦人養姑不孝姑兩目盲婦以蚯蚓為羮以食之姑怪其味竊藏一臠以示兒兒還欲送婦詣縣未及忽然雷雨乃失其婦少頃從空而落身衣如故易為白狗頭語言不異因問其故荅云以不孝姑天神所罰㝠報記衆鳴成曲上都渾令宅㦸門外一小槐樹有穴大如錢每夏霽後有蚓大如巨臂長二尺餘白頸紅班領蚓數百條如索縁樹枝幹及曉悉入穴或時衆鳴往往成曲學士張乗言渾令時堂前忽有樹從地湧出蚯蚓遍挂其上酉陽蚓毒昔有病腹大夜聞蚯蚓鳴於身有人教用鹽水浸之而愈崇寧末年隴州兵士暑月中在倅㕔前跣立㕔下為蚯蚓所中遂不救後數日又有人被其毒博識者教以先飲鹽湯一盃次以鹽湯浸足乃愈本草啖蚓閩越江北山間蠻夷啖蚯蚓脯為羞容州人好食虀菜人以為諱或云以蚯蚓為之廣志蕃禺記土精蚯蚓土精無心之蟲交不以分淫於阜螽觸而感物乃無常雄郭璞賛阜螽如蝗蟲江東人呼為蚱蜢與蚯蚓雖異類而為雌雄蚯蚓鳴則阜螽跳躍五月五日伺其偶合收而佩之令人相愛物類相感志蝎蠆䑕負蟲巨者多化為蝎蝎子多負於背舊説過滿百為蝎所螫蝎前謂之螫後謂之蠆蝎常為蝸牛所食以跡規之蝎不復去酉陽今人或為蝎螫者取蝸涎以塗之痛立此相感志杜伯􅀢蠆蝎也大琵琶安陽城南有亭宿者輒死有書生入亭宿明掘得老蝎大如琵琶毒長數尺亭遂安静捜神記安邑縣北門縣人云有一蝎如琵琶大每出並不毒人𫝊載螫人為樂北齊南陽王綽為定州刺史後主髙緯徴至行在問在州何者最樂對曰多取蝎混蛆中觀之極樂後主即夜索蝎一斗比及二三升置諸浴斛使人祼卧其中號叫宛轉帝與綽臨觀喜噱不已謂綽曰如此樂事何不早馳驛奏聞本𫝊通志多取蝎混蛆中觀之通鑑作狙主簿蟲潤州金壇縣大厯中雜俎云開元中有北人為主簿以竹筒齎蝎十餘枚置於㕔事之樹后遂孳育數百枚為土氣所蒸而不能螫人南人不識呼為主簿蟲𫝊載萬蝎螫黄靖國死見㝠中治武后獄以大甕貯萬蝎螫之吉凶影響録蛜􅖉蠍𦂳小者名蛜􅖉蜀本草蜈蚣制蛇蝍蛆蜈蚣也廣雅蝍且丼帶司馬彪曰帶小蛇也蝍蛆喜食其帯莊齊物蜈蚣性能制蛇見大蛇便縁而噉其腦本草禁蛇南人入山皆以竹管盛活蜈蚣蜈蚣知有蛇之地便動作於管中如此則草中便有蛇也蜈蚣見蛇能以氣禁之蛇即死抱朴蛇虺見之而蟠伏蝍蛆當其前似施禁法蛇即為之開口蝍蛆入食其腸復穴其旁而出物類相感志𤓰肉唐杜暐使嶺南至康州見蜈蚣大如筝天寶四載廣州因海潮浮一蜈蚣死則割其𤓰得肉一百二十斤紀聞骨硯李勉在汴州得異骨一節可為硯南海時得於海商云是蜈蚣脊骨續博物志作脯開寧縣多蜈蚣大者其皮可以􅯍鼓取其肉曝為脯美於牛肉南越志晉安東南吳嶼山蜈蚣千萬積如山云長丈餘者以作脯味似大蝦臨海異物志噉牛東南海中蜈蚣長數文能噉牛里人秋冬間遇之則鳴鼔然火炬以驅逐之異物志吸綏安縣多蜈蚣大者能以氣吸兔小者吸蜥蜴相去三四尺骨肉自消酉陽如翠屏珠崖人每明睛見海中逺山羅列如翠屏而東西不定悉蜈蚣也嶺南異物志畏蝸蜈蚣畏蛞蝓不敢過所行之路觸其身則蜈蚣死本草蜈蚣制蛇而畏蚯蚓每遇蚯蚓即不敢動蚯蚓以涎沫繞其足盡落通志他書不見此説疑鄭誤互食蝍蛆食蛇蛇食蛙蛙食蝍蛆互相食也關尹子蜘蛛灑溺以殺蜈蚣鹤林玉露蜣蜋蜣蜋蜣蜋一名蛣蜣一名弄丸一名轉丸古今注俗名推丸本草一名天社一作天桂廣雅轉丸蛣蜣之知在於轉丸而笑蛣蜣者乃以蘇合為貴莊齊物注無鼻蛣蜣無鼻而聞香衝波傳𤣥蟬潔肌不羨蜣蜋穢飽抱朴蝡白蜣蜋轉丸丸成而精思之而有蝡白者存丸中俄去殻而蟬彼蜣不思彼蝡奚白闗尹子蝗異名食苗心螟食葉蟘食節賊食根蟊爾雅梵字蝗蟲腹下有梵字或自天下來者乃切利天梵天來者西域騐其字作木天壇法禳之今蝗蟲首有王字固自不可曉或言魚子變近之矣舊言蟲食糓者部吏所致侵魚百姓則蟲食糓蟲身黒頭赤武吏也頭黒身赤儒吏也酉陽胡蝗司冀青雍蝗茅草皆盡石勒與蝗競取民禾百姓謂之胡蝗晉陽秋蜻蚨魚伯蟱􅘿魚伯青蚨也廣雅南方有蟲名􅀈蠋如蟬而狀稍大其味辛美可食每生子必依草葉大如蠶子人將子歸其母亦飛來不以近逺雖潜取其母必知處殺其母塗錢子塗貫用錢則自還捜神記􅝒􅘿謂之青鳬束暫云青鳬可以還錢或云青蚨郡國志其雄雌常處不相舍人採得以法制之用塗錢以貨易晝用夜歸異物志蜮域一名水狐𤣥中記一名短狐射工射影抱朴溪鬼蟲本草水弩録里記深山窮谷多毒虐之物氣則有瘴癘人則有工蟲獸則有虎鳥則有鴆蛇則有蝮蟲則有射工沙虱草則有鈎吻野葛其餘則蛟蟒之屬生焉博物志天中記卷五十七
