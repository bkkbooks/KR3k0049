body:
  text: 天中記卷六十明陳耀文撰麟毛蟲之長毛蟲三百六十而麟為之長家語毛類之俊鳯為羽族之美麟為毛類之俊龜龍為介蟲之長楩枏為衆材之最是物之貴也任子𤣥枵之獸麒麟者𤣥枵之獸隂之精也鶡冠子禽獸之瑞麟有五采腹黄髙丈二金獸之瑞京房五行之精天宫五獸中有大角軒轅麒麟之信凡麟生於火游於土故脩其母致其子五行之精也視明禮脩則麒麟臻蔡邕月令四靈之首麟鳯龜龍謂之四靈麟以為畜則獸不狘禮運景星㪚彩星㪚為麟保乾圖機星得機星得則麒麟生萬人夀春秋運斗樞仁獸麒麟者仁獸也牡曰麒牝曰麟不刳胎剖卵則至麕身而牛尾狼項而一角黄色而馬足含仁而戴義音中鍾吕步中規矩不踐生蟲不折生草不食不義不飲洿池不入坑穽不行羅網明王動静有儀則見牡鳴曰逝聖牝鳴曰歸和春鳴曰扶幼夏鳴曰養綏宋符瑞志狼題肉角博雅擇土而後踐位平然後處不羣居不旅行紛兮其有質文也幽閒則循循如也動則有容儀説苑嘉祥麟王者嘉祥也食嘉禾之實飲珠玉之英瑞應圖一角麟一角明海内共一主也王者不刳胎不剖卵則出於郊春秋感精符一角獸者六合同歸則至瑞應圖麟有角示有武有肉示不用正義好生古之王者其政好生惡殺麒麟在郊野孫卿子恩至蟲羽則麒麟至張網焚林則麒麟去春秋繁露在囿黄帝時麒麟在囿中候黄帝之世以麟為畜三五世紀游田堯時麒麟在郊藪唐傳唐虞之世麟鳯遊於田孔叢子步庭禹時鳯凰棲於木麒麟步於庭吳越春秋游苑成王時麒麟遊苑宋志木精蒼之滅也麟不榮也麟木精也宋均曰麟木精生水故曰隂木氣好土土黄木青故麟色青黄不榮謂見絏也孔演圖走宗麟叔孫氏之車子曰鉏商樵於野而獲麟焉衆莫之識以為不祥棄之五父之衢冉有告夫子曰麕身而肉角豈天之妖乎夫子曰今何在吾將觀焉遂徃謂其御高柴曰若求之言必其麟乎到視之果信言偃問曰飛者宗鳯走者宗麟為其難致也敢問今見其誰應之子曰天子布德將致太平則麟鳯龜龍先為之兆今宗周將滅天下無主孰為來哉遂泣曰予之於人猶麟之於獸也麟出而死吾道窮矣乃歌曰唐虞世兮麟鳯遊今非其時吾何求麟兮麟兮我心憂孔叢子子貢問曰夫子何泣爾麟之至為明王也出非其時而見害吾是以傷焉家語何敞云鸜鵒来巢昭公有乾侯之戹西狩獲麟孔子有兩楹之殯後本傳五蹄終軍從武帝幸雍祀五畤獲白麟一角而五蹄時又得竒木其枝旁出輒復合於木上上異此二物博謀羣臣軍上對曰野獸并角明同本也衆枝内附示無外也殆將有觧編髪削左袵習冠𢃄要衣裳而蒙至化者焉對奏上甚異之由是改元為元狩後數月越地及匃奴諸王有率衆來降者時皆以軍言為中本傳元狩元年行幸雍獲白麟作白麟之歌曰朝隴首覽西垠雷電燎獲白麟爰五趾顯黄德禮樂志九眞竒獸宣帝時神爵元年詔曰迺元康四年九真獻竒獸晋灼曰漢註駒形麟色牛角仁而愛人西都賦九眞之麟如麟昔人未見麟問嘗見者曰麟何類乎曰麟如麟也問者曰若吾嘗見麟則不問子矣而云麟如麟寜可解哉見者曰麟麕身牛尾鹿蹄馬背問者霍解牟子理惑論壽抱朴子曰麟壽三千嵗廣雅曰壽一千嵗靈獸李巡曰麟瑞應獸名孫炎曰靈獸也論衡曰太平之瑞也獸聖夫鳯凰鳥之聖者也麒麟獸之聖者也五帝三王臯陶孔子人之聖也十二聖相各不同而欲以麞戴角則謂之麒麟相與鳯凰象合者謂鳯凰如何論衡講瑞避害儒者説鳯凰麒麟仁聖禽也思慮深避害逺中國有道則來無道則隱夫孔子見麟而自泣者據其見得而死也使麟有知為聖王來時無聖王何為来哉思慮深避害逺何故為魯所獲殺乎上指瑞不為瑞嗟乎鉏商一獲而周室衰孝武一獲而漢祚微章帝何人而元和二三年間郡國上麟者五十一安帝延光亦且三見孝獻延康之元一年之間至十獻於郡國石季龍開華林郡國上送蒼麟二八爰俾張司虞調之以駕芝盖晉宋以降無代無有而孟蜀之邦乃至多於大彘不知果何物耶路史禽不祥神龍見喪風雲之象也鳯凰來失尊戴之象也麒麟出亡國土之象也觀我之義禽必不義也以彼為祥禽必不祥也譚子化書五靈援神契曰德至鳥獸則麒麟臻是非有明王則五靈不至也榖梁䟽哀十四年左傳服䖍注云視明禮修而麟至思睿信立白虎擾言從義成則神龜在沼聽聰知正而名山出龍貎恭體仁則鳯凰來儀詩麟趾序騶虞義獸騶虞義獸也白虎黒文不食生物王者有至信之德則應之瑞應圖珍獸林氏國有珍獸大似虎白質黒章尾長於身名曰騶虞仁獸王者仁而不害則白虎見白虎者仁獸也虎而白色縞身如雪無雜色嘯則風生徵祥記義獸白虎者義獸也一名騶虞王者德至禽獸澤洞幽㝠則見瑞應圖騶虞贖罪文王拘羑里散宜生取怪獸尾倍於身獻紂以贖其身名曰騶虞尚書大𫝊紂囚文王閎夭之徒詣林氏國求得騶虞獻之紂大悦乃釋之般般司馬相如封禪書云囿騶虞之珍羣頌曰般般漢作股之獸樂我君囿白質黒章其儀可喜􅌈􅌈穆穆君子之態史作能盖聞其聲今視其來南郡獲宣帝詔曰迺元康四年南郡獲白虎威鳯為寳朕之不明震於珍物漢紀昔文王應九尾狐而東夷歸周武王獲白魚而諸侯同心周公受秬鬯而鬼方臣宣王得白狼而夷狄賓今南郡獲白虎亦偃武興文之應也四子講德論虎導宋元嘉二十五年白虎見蜀郡二赤虎導前二十六年白虎見南琅邪半陽山二虎随從符瑞志鹿隨王蜀永平三年五月騶虞見璧山有二鹿隨之五代史角端解四夷語角端日行萬八千里又曉四夷之語聖王在位明通方外幽逺之事則奉書而至宋符瑞志旄星之精元太祖提兵回回國與速不䚟追至印度國鐵門闗侍衛見一獸高數百丈鹿形馬尾緑毛而角能為人言謂之曰此非帝世界汝主宜早還左右皆震懾元主怪之以問耶律楚材對曰此獸名角端乃旄星之精也日行萬八千里能解四夷語是惡殺之象今大軍征西已四年盖上天惡殺遣之以告陛下也且此獸靈異如鬼神不可犯也願承天心宥此數國人命元主即日班師元史輟耕録癸辛雜志獬廌性忠東北荒中有獸如牛一角毛青四足似熊見人鬭則觸不直聞人論則咋不正名曰獬豸一名任法獸故立獄皆東北依所在也神異經張華曰今御史法冠曰獬豸神遺獬廌似山牛一角古者决訟令觸不直古者神人以廌遺黄帝帝曰何物何處曰食薦春夏處水澤秋冬處松栢説文御覽引秋冬處竹箭松筠毛為帳堯時有獬廌緝其尾為帝帳田求子一角羊觟􅚞者一角之羊也性知有罪臯陶治獄其罪疑者令羊觸之有罪則觸無罪則不觸斯盖天生一角聖獸助獄為騐故臯陶敬羊起坐事之論衡不學武后時侍御史侯思止本賣餅人以羅告人授五品官高元禮呼為侯大曰上不次用人若言侯大不識字即奏云獬廌獸亦不識字而能觸邪陛下用人安事識字無何后問思止以對后大悦舊唐産神羊開元二十一年富平縣産一角神羊肉角當頂白毛上捧識者以為獬豸雜俎舊唐神羊獬廌神羊也輿服志獅日走五百里虓獅子也説文狻猊如虥猫食虎豹爾雅狻猊日走五百里郭璞曰獅子也穆天子傳毛羣之長獅子形似虎正黄有髯耏尾端茸毛大如斗銅頭鐵額鉤爪鋸牙彌耳跪足目光如電聲吼如雷能食虎豹外國之産毛羣之長也東觀漢記似麟無角章帝章和元年安息國遣人獻獅子形似麟而惟無角後漢雞犬無鳴吠後魏武帝伐冐頓經白狼逄獅子使人格之殺傷甚衆王乃自率常從軍數百擊之獅子哮吼奮起左右咸驚王忽見一物從林中出如狸起上王軍軛師子將至此獸便跳起上獅子頭上即伏不敢起於是遂殺之得師子一還來至洛陽三千里雞犬皆伏無鳴吠博物志擊象梁伯玉説沙門釋僧吉云嘗從天竺欲向大嶺其間忽聞數十里外哮哮檻檻驚天怖地頃之但見百獸率走伏地欲絶而四巨象虓焉而至以鼻卷泥自厚塗數尺數數噴鼻隅立俄有獅子三頭見於山下直搏四象崩血若濫泉巨樹草偃宋炳擊象圖序禦象宋宗慤字元幹隨檀和之伐林邑入象浦林邑王范陽邁傾國來拒以具裝被象前後無際慤曰吾聞獅子威服百獸乃制其形列陣以禦象果驚奔衆因潰散遂克林邑收其異寳雜物不可勝計宋書伏熊元魏波斯國獻獅子永安末始達京師莊帝謂侍中李或曰朕聞虎見獅子必㐲可覔試之於是詔近山郡縣捕虎以進鞏縣山陽并進二虎一豹見獅子悉瞑目不敢仰視園中素有一盲熊性甚馴善帝令取試之虞人牽盲熊至聞獅子氣驚怖跳踉曳鎖而起帝大笑伽藍記舊説獅子虎見之而伏豹見之而瞑羆見之而躍黄白獅梁武帝時波斯獻生獅子帝問曰獅子有何色劉顯曰黄獅子超不及白獅子超南史畫獅顧光寳能畫建康陸溉患瘧經年光寳詣之遂命筆以墨圖一獅子謂溉曰此出手便靈異可於戸外牓之䖍誠祈禱溉如其言是夕中夜戶外有窸􅀢之聲良乆乃不聞明日所畫獅子口中臆前有血淋漓及於戸外皆有㸃焉溉病遂愈時人異之歴朝家怪録蒲延昌者孟蜀廣政中進畫授翰林待詔時福感寺禮塔院僧模寫宋展於䖍獅子於壁延昌一見曰但得其様未得其筆耳遂畫獅子一圖獻于蜀王昭逺公有嬖妾患痁是日懸於臥内其疾頓減王乃召而問其神異延昌云宋展氏子䖍於金陵延祚寺佛殿之内畫此二獅子患人因坐壁下或有愈者梁昭明太子偶患風恙御醫無減吳興太守張僧繇模此二獅子宻懸寢堂之内應夕而愈故題曰辟邪有此神驗乆矣益州名畫録獸王蒲州沙門寳澄初于蒲坂普濟寺創營大像百丈未成而卒道積修建十年雕裝始就初積受請之夕夜夢崖傍見二獅子於大象側連吐明珠相續不絶既寤惟曰獸王自在則見法流無滯寳珠自湧又喻財施不窮㝠運潛開功成斯去即命工匠圖夢所見於彌勒大像前㝠報記停獻中宗時有大石國使請獻獅子姚璹上疏諫曰獅子猛獸唯止食肉逺從碎葉以至神都肉既難得極為勞費陛下以百姓為心慮一物有失鷹犬不畜漁獵總停運不殺以闡大慈垂好生以敷至德凡在翾飛蠢動莫不感荷仁恩豈容自菲薄於身而厚資給於獸求之至理必不然乎疏奏遽停來使舊唐獅子王客有問於浮休子曰來俊臣之徒何如對曰昔有獅子王於深山攫一豺將食之豺曰請為王送二鹿以自贖獅子王喜周年之後無可送者王曰汝殺衆生亦已多今次到汝汝其圖之豺黙無對遂齚殺之俊臣之輩何異豺也未幾俊臣之徒皆遇禍浮休子近井哮吼開元末西國獻獅子至安西道中繫於驛樹近井獅子哮吼若不自安俄頃風雨大至有龍出井而去國史補尾辟蠅蚋集賢校理張希復言舊有獅子尾拂夏月蠅蚋不敢集其上酉陽雜俎吹毛元朝大㑹羣臣盡出諸獸於萬嵗山若虎豹熊象之屬一一置列訖然獅子至身才短小絶類人家所畜金毛猱狗諸獸見之畏懼俯伏不敢仰視及各飼以雞鴨野味之類諸獸不免以爪按定用舌去其毛羽惟獅子則以掌擎而吹之毛羽紛然脱落此其所以異於諸獸也輟耕録溺虎元時有貢獅子者首類虎身如狗青黒色宫中以為不類所畫者疑非眞其使牽入虎牢皆俯首帖耳不敢動獅子遂溺於虎之首虎亦莫敢動也乃知為眞獅子癸辛雜志畏鉤㦸獅子五色而食虎於巨山之岫一噬而百人仆惟畏鈎㦸束晳發䝉記筋能絶絃釋氏書言獅子筋為絃鼔之衆絃皆絶西域有黒獅子棒獅子舊説蘇合香獅子糞也酉陽雜俎西海聚窟洲在西海中艮方之地地方三千里北接崑崙二十六萬里有獅子辟邪巨齒天鹿長牙銅頭鐵額之獸十洲記吼譬如大獅子吼小獅子聞悉皆勇健一切禽獸逺避竄伏新華嚴僧伽彼或似多此云獅子僧伽梁云小師子翻譯名義象摇光星散摇光之星散而為象運斗樞希見人希見生象也而得死象之骨按其圖以想其生也故諸人之所以意想者皆謂之象也韓子解老豫象之大者曰豫賈侍中云不害於物白象神靈滋液百寳為用則白象至援神契王者自養有道則白象至負不死藥來瑞應圖梁山南方之美者有梁山之犀象焉爾雅象耕舜𦵏蒼梧下有羣象常為之耕禹葬㑹稽祠下有羣象耕田帝王世紀至味伊尹説湯以至味曰肉之美者腥腥之脣旄象之約吕本味駕白象仙人王子喬駕白象游於髙安之荷山其象化為石山中有池多紅蓮豫章記焚身晉范宣子為政子産寓書於子西以告宣子曰長國家者非無賄之患而無令名之難象有齒以焚其身賄也襄二十四燧尾吳伐楚鍼尹固與王同舟王使執燧象奔吳師杜預曰燒燧火繫象尾吳師驚却之左定四久識舊説象性乆識見其子皮必泣一枚重千斤酉陽雜俎莊周婦死而歌曰通性命者以卑及尊死生不悼周不可論也夫象見子皮無逺近必泣周何忍哉莊子萬機論牙為火籠漢制天子以象牙為火籠西京雜記獻馴象武帝時南海獻馴象成帝咸康六年林邑王獻象一能拜跪漢書象莊河南府有象莊舊傳漢時西域僧以象䭾經至洛陽化為石今石象猶存山川紀異舟稱孫權遣使詣闕獻馴象二頭魏太祖欲知其斤重咸莫能出其理時鄧王沖尚幼乃曰置象大船刻其所至稱物以載之可知也太祖大悦即施行焉江表傳作樂舞象賀齊還新都孫權出祖道作樂舞象權謂齊曰今定天下都中國使殊俗貢珍狡獸率舞非君而誰吳書手頓象鼻魏文帝時南越獻白象子在帝前任成王曹彰手頓其鼻象伏不動拾遺記傷人伏罪晉時南越致馴象於臯澤中養之為作車黄門鼔吹數十人令越人騎之每正朝大㑹皆入充庭帝行則以象車導引以試橋梁後象以鼻擊害人有司祝之而殺象象垂鼻泣血流地不敢動自後朝議以象無益於事悉送還越晋諸公賛夢會稽張茂嘗夢大象以問萬推曰君當為大郡而不能善終夫象者大獸取其音獸者守也象以齒焚其身後必為人所殺茂永昌中為吳興太守値王敦問鼎執正不移敦遣沈充殺之而取其郡異苑大客始興郡陽山縣人行田忽遇一象以鼻卷之遥入深山見一象脚有巨刺此人牽挽得出病者即起載入入一紆絀地以鼻掘出數條長牙送還本處本境苗稼常為象所困其象俗呼大客因語曰我田稼在此恒為大客所犯若念我者勿見侵便覺躑躅如有馴觧於是一家業絶無其患上自格宋沈攸之為荆州刺史時有象三頭至江陵城北數里攸之自出格殺之南史壞牆元魏永平二年乾羅國胡王獻白象背施五彩屏風七寳坐牀容數人眞是異物常養象於乘黄曹象嘗壞屋敗牆走出於外逄樹即拔遇牆即倒百姓驚怖奔走交馳太后令徙於永橋南道象坊伽藍記束刃於鼻周軍通江陵梁人出戰梁以二象被之以甲束刃於鼻令崑崙奴馭之周軍使衆射之象反走三國典略掘坑陷象隋文帝遣大將軍劉方等擊林邑其王梵志乘巨象而戰方軍不利方乃多掘小坑草覆其上因以兵挑之方與戰偽北梵志逐之其象陷軍遂亂方大破之志棄城走方入其郡獲其廟主十八枚皆鑄金為之盖其國十有八世北史四牙五足髙宗時周澄國遣使上表云訶伽國有白象首垂四牙身運五足象之所在其土必豐既有威靈又弭災患力兼十象强制百獸以水洗牙飲之愈疾請發兵迎取以獻之上謂侍臣曰夫作法於儉其弊猶奢誰能制之故聖人越席以昭儉茅茨以誡奢書云珍禽竒獸不育於國知無益之源不可不遏朕安用其象令其逺獻乃勞其使而遣之唐書舞象明皇每賜酺御樓引大象犀牛或拜或舞動中音律及西幸蜀禄山驅掠舞象舞馬盡入洛陽一日大設聲樂出幽燕戎王畨胡酋長多未之見因出象紿之曰此自南海奔至以吾有天命雖異類必拜舞左右教之象皆瞪目憤怒略無拜舞者禄山慙怒盡坑殺之明皇雜録放馴自永徽以來文單國累獻馴象凡三十有二皆拳於禁中頗有善舞者以偹元㑹充庭之飾及德宗即位曰王者不尚異物不貴難得之貨今官用費而物性不得非宜也悉放於荆山之陽舊書宏詞獨孤綬所司試馴象賦及其本上上吟其句曰化之式孚則必受乎來人物或違性斯用感於至仁上以綬為知去就故特書第三先是代宗朝越人獻象三十有二上悉放之於山之南而綬不辱其受獻不傷其放棄故賞其知去就焉杜陽編又云返諸林邑之野歸爾梁山之隅時在寢兵豈嬰乎燧尾上惟賤賄寧惜乎焚軀象膽宋淳化中上苑一象斃太宗命取膽不獲徐鉉曰當在前左足果得之問其故鉉曰象膽隨四時在足今方春故知之類苑龍象龍象六十嵗骨方足今荆地象色黒兩牙江猪也象膽隨四時在四腿春在前左夏在前右如無定體也鼻端有爪可拾針肉有十二般唯鼻是其本肉陶貞白言夏月合藥宜置牙於藥傍南人言象尤惡犬聲獵者裹糧登髙樹構熊巢伺之有羣象過則為犬聲悉舉鼻吼呌循守不復去或經五六日困倒則下潛刺殺之耳穴薄如鼔皮一刺而斃胷前小横骨灰之酒服令人能浮水出没食其肉令人體重紅牙廣之屬郡潮循州多野象牙小而紅最堪作笏潮循人或捕得象争食其鼻云肥脆偏堪作炙或云象膽不附肝隨月轉在腿肉楚越之間象皆青黒唯西方拂林大食國即多白象劉恂有親表曾奉使雲南彼中豪族各家養象負重致逺如中夏之畜牛馬者蠻王宴漢使於百花樓帳前入舞象曲動樂作優倡齊入象以金羈絡首錦繡垂身隨拍騰蹋動頭摇尾皆合節奏嶺表録異知人曲直安南有象能知人曲直有鬬訟者行立而齅之有理者即過負心者以鼻捲之擲空中數丈以牙接之應時碎矣莫敢競者朝野僉載供牡環王國野象成羣一牡管牝三十餘牝者牙纔二尺迭供牡者水草臥則環守牝象死共挖地埋之號吼移時方散又國人養馴者可令代樵酉陽哀雌昔人南貢四象各有雄雌其一雌死於九貢至南海百有餘曰其雄泥土著身獨不飲酒食肉長史問其所以輒流涕焉博物志象被傷則羣黨相扶將去則向南跪拜鳴三匝以木覆之寰宇記象死首南向林邑人殺象象怒布陣以鬭人人登樹取衣掛樹枝縁它樹而走象見衣以為人存以鼻汲水灌樹且枝倒不見人怒踏碎其衣而去象病首必向南而死肉麄連皮煑易熟牙笋足掌肉稍佳安南志跪象自咎驃國王宫有巨白象高百尺訟者焚香跽象前自思是非而退有災疫王亦對象跽自咎唐書其王近適則舁以金繩牀逺適則乘象舊唐踐罪南蠻環王衛兵五千戰乘象率象千馬四百分前後不設刑有罪者使象踐之舊唐藏牙象牙長一丈餘脱其牙則深藏之削木代之可得不爾窮其主得乃已南越志俗傳象牙嵗脱猶愛惜之掘地而藏之人欲取當作假牙潛徃易之覺則不藏異物志乳象三嵗一乳説文古訓言象孕子五嵗始生酉陽性妒禱過之山多象注性妒不畜滛子山經牙生理什氏書言象牙生理必因雷聲酉陽山性發象耳中有油出謂之山性發徃徃奔逸傷人牧者視象耳有油出則多以索縻之孔平仲談苑模象僧順法師三破論云或有三盲模象得象耳者争云象如簸箕得象鼻者争云象如舂杵雖獲象一方終不得全象之實説泥洹是死眞模象之一盲矣𢎞明集青象凡象白者西天有之又供御陀國有青象皆中夏所無也北户録象鞋鄭文振潮陽人言象為南方之患土人苦之不問蔬穀守之稍不至踐食之立盡性嗜酒聞酒香輒破屋壁入飲之人皆於其來處架高木若望火樓然常有人知象獨畏煙火先用長竿接茅把於其杪望見其來共然火把持竿以指之即去隨之三數里方敢回恐其復來也眼惡蠅蚋有日色則不出羣行者猶庶幾其獨行者最喜傷人盖勢孤恐人害之也土人懸巨木設機壓之能殺惟象鞋者用厚木當中鑿深竅方容其足中植大錐其末上向竅之外周回浚鑿之如今之唾盂而加峻密密埋於其徃來之所以草覆之倘投足木上必滑下竅中其既著錐洞貫其足不能自拔即仆負其痛不能食展轉謂之著鞋然猶能以牙傷人人未敢近數日後稍困則衆鎗攢殺之而分其肉留其皮趂濕切作條絣乾連枷等用自潮陽來必經由䕫江嶺此處最多先使人行前探之或遇其大羣有候數日不去不敢行者監司巡歴則其保甲鳴邏鼔趕逐之頑然若無聞也必俟其自散去乃敢過宋莘視聽抄明罪燕京昔有一雄象甚大凡傷死數人官使殺之不得已乃明其罪象遂帖耳就殺凡得象油四十八大甕癸辛雜志獻佛牙有一僧行遇羣象上樹避之象隨倒樹負之至林中有一病象足瘡而臥引沙門手至所苦處乃竹刺沙門為拔去之裂裳與裹俄頃一象持金函授病象病象轉授沙門發視之乃佛牙也西域記伽郍梁禪法師云象一名伽郍北戸録或那先翻譯讃象之為獸形體特詭身倍數牛目不踰豕鼻為口役望頭若尾馴良承教聽言則跪素牙玉潔載籍所美服重致逺形如丘徙南州異物志犀食棘禱過之山多犀兕注云犀形似水牛猪頭庳脚脚似象有三蹄大腹黑色三角一在頂上一在額上一在鼻上在鼻上者小而不墮食角也好噉棘口中常洒血沫山經犀出九德縣其毛如豕蹄有三甲頭如馬有三角鼻上角短額上頭上角長劉欣明交州記山犀二角以額上者勝本草犀體兼五種肉舌有棘常食草木棘刺不食棘葉也異物志駭雞太公使南宫适至義渠得駭雞犀以獻紂韓詩楚王獻駭雞犀為上瑞國策文犀武帝時吠勒國貢文犀四頭狀如水犀角表有光因名明犀置暗中有光影亦曰影犀織以為簟如錦綺之文洞𠖇記黄攴元始二年黄攴國獻犀牛應劭曰黄攴在日南之南去京師三萬里平紀白犀章帝元和元年曰南獻白雉白犀東觀漢記除凶西南夷土有異犀三角夜行如大炬火照數千步或時解脱則藏於深密之處不欲令人見之王者貴其異以為簪能消除凶逆梁祚魏國統犀纛東海蔣潛嘗至不其縣見林下踣一屍已臭爛烏來食之輒見一小兒長三尺許來驅烏烏乃起如此非一潛異之乃就看之見死人頭上著通天犀導價數萬錢乃拔取之既去衆烏争集無復驅者潛後以此導上晉武陵王王薨以襯衆僧王武剛以九萬錢買之後落禇太宰處禇以餉齊故丞相豫章王王死後内人江夫人遂斷以為釵每夜輒見一兒繞牀頭啼呌云何為見屠割必當相報終不獨受枉酷江夫人惡之月餘遂薨續齊諧記兼名苑云宋岑獲通犀賣與廬陵王義眞又元康末婦以犀角為斧鉞戈㦸戴之用也北户注辟寒犀開元元年冬至交趾國進犀角一株色如金使者請以金盤置放殿中温然煖氣襲人上問其故使者對曰此辟寒犀也開元遺事水犀匣貴妃紅漆屏風以玳瑁水犀為匣外傳馴犀唐德宗貞元十二年南海獻馴犀詔納苑中至十二年冬大寒馴犀死英華夜明犀敬宗寳厯元年南昌國進夜明犀其狀類通天夜則光明可照百步覆繒千重終不能掩其輝煥上令解為腰帶每逰獵夜則不施蠟炬有如晝日杜陽編辟暑犀文宗延學士於内庭李訓講周易時方盛夏上命取水玉腰𢃄及辟暑犀以賜之響犀文宗時宫人沈那翹吳元濟之妓女進白玉方響光明皎潔可照十數步玉犀槌即響犀也凡物有聲乃響應其中焉䨇龍犀大中初女蠻貢䨇龍犀有二龍鱗鬛爪牙悉備牀若拏攫放還仁宗時山南西道觀察使奏渠州犀牛見差官押赴闕庭既至牽入内殿閲之仍於月華門外宣示百寮上慮傷物性命中使押還本道復放於渠州之野東觀奏記蠲忿犀懿宗同昌公主出降𢃄蠲忿犀其犀圓如彈丸入土不朽爛𢃄之令人蠲忿怒杜陽臥魚楊収女適裴坦長子嫁資豐厚坦尚儉聞之不樂一日夫人至新婦院臺上觀果楪乃臥魚犀遽令撤之北夢瑣言雲龍形占城國用顯德中貢方物有雲龍形通犀𢃄菩薩石雲鶴水犀錢武肅王時有獻雲鶴水犀𢃄者武肅登碧波亭命許彦方係𢃄試水水開七尺許辟塵李司封宗易嘗言石駙馬保吉知陳州其州廨一皆新之每毁舊屋則坐於下風塵自分去人皆驚怪之盖其所服辟塵犀也本草辟塵犀為婦簪梳塵不著髪嶺表誌異試毒通天犀有白理如線者以盛米置羣雞中雞欲徃啄未至輒驚却故南人名為駭雞也得其角一尺以上刻為魚而衘以入水水常為開方三尺可得氣息水中以其角為义導者得煑毒藥為湯以此义導攪之皆生白沫無復毒物則無沫起也通天犀所以能殺毒者為物食百草之毒及衆木棘嵗一觧角藏於山中人以木如其角代之犀不覺後年輒復觧抱朴子通犀置大霧重露下終不霑濡又堪辨毒藥酒藥酒生沫或中毒箭刺於瘡中立愈盖犀食百毒棘刺故也北戸録注海中出離水犀似牛其出入有光水為之開南越志惡影犀之通天者必惡影常飲濁水當其溺時人趂不復移足角之理形似百物或云犀角通者是其病然其理有倒插正插腰鼔插倒者一半已下通正者一半已上通腰鼔者中斷不通故波斯謂牙為白暗犀為黑暗醫人吳士臯常職於南海郡見舶主説本國取犀先於山路多植木如徂栻云犀前脚直常倚木而息木木爛折則不能起犀牛一名奴角有鴆處必有犀也犀三角一孔劉孝標言犀墮角埋之以假角易之酉陽王燦遊海賦云羣犀代角巨象解齒棘開林邑國記曰犀行過叢林不通便開口露齒前向直指棘林自開火炬犀有特神者角有光耀白日視之如角夜暗之中理皆粹然光由中出望如火炬欲知此角神異置之草野飛鳥走獸過皆驚萬震南州異物志雞昧白犀角之好者稱雞昧白廣志墮羅犀墮和國多美犀世謂墮和羅犀唐書犀中最大者墮和犀一株有重七八斤者云是枯犀額角其花多作撒豆斑色深者堪𢃄胯斑散而色淺者即拍為盤楪器皿之類嶺表録異雲龍周顯德五年占城王釋利因德漫遣其臣莆訶散貢方物有雲龍形通犀𢃄菩薩石宋史兕為鎧兕如野牛青皮堅厚可以為鎧説文嶓冢之山獸多犀兕禱過之山其下多犀兕注兕似水牛青色一角重三十斤山經兕有一角長三尺餘形似馬鞭柄交州記雌陳藏器云兕是犀之雌者而形不同本草蒼兕武王東伐師行師尚父左杖黄鉞右把白旄以誓曰蒼兕蒼兕總爾衆庶與尔舟楫後至者斬遂至盟津齊世家太師尚父為周司馬將師伐紂至孟津之上杖鉞把旄號其衆曰蒼兕蒼兕夫蒼兕水中之獸也善覆人船因神以化令汝急渡不急渡蒼兕害汝河中有此異物時出浮揚一身九頭人惡畏之未必能覆舟也論衡邢子才文蒼雉奉職靈鼉自梁索隐云本兕或作蒼雉殪兕徒林平公射鴳不死使豎襄搏之失公怒拘將殺之叔向聞之夕君告之叔向曰君必殺之昔吾先君唐叔射兕於徒林殪以為太甲以封於晉今君嗣吾先君唐叔射鴳不死搏之不得是揚吾君之耻者也君其必速殺之勿令逺聞君忸怩顔乃趣赦之晉語射隨兕荆莊哀王獵於雲夢射隨兕中之申公子培劫王而奪之王以為不敬命立誅之左右諫乃止未三月子培死荆興師戰於兩棠大勝晉師而賞有功者申公子培之弟進請賞於軍旅曰臣兄與有功於車下也王曰何謂也對曰臣之兄嘗讀故記曰殺隨犀者不出三月是以臣之兄驚懼而争之故欲王持千嵗之壽也伏罪而死王令人發視秘府而視之於故記果有乃厚賞之吕覽説苑作射科雉狂兕楚王遊於雲夢結駟千乘旌旗蔽天野火之起也若雲霓兕虎嘷之聲若雷霆有狂兕䍧車依輪而至王引弓而射之一發而殪王抽旃旄而抑兕首仰天而嘆曰樂矣今日之遊也寡人萬嵗千秋之後誰與樂此矣趙策招魂云與王趨夢兮課後先君王親發兮憚青兕有域夫兕虎有域動静有時避其域省其時則免其兕虎之害也壯獸兕惟壯獸似牛青黑力無不傾自焚以革皮充武備角助文德山經圖賛熊熊蟄熊能攀援上髙樹見人則顚倒投地而下冬入穴而蟄始春而出詩義子路熊獸藏於山穴穴裏不得見穢及傷殘則合穴自死又有居大樹孔中東土呼熊為子路以物擊樹云子路可起於是便下不呼則不動也述異記五百嵗玉策記稱熊壽五百嵗五百嵗則能化為狐狸抱朴子熊膽熊膽春在首夏在腹秋在左足冬在右足酉陽赤熊神靈滋液百珍寳用則赤熊見赤熊見則奸宄自逺援神契黄熊周文王拘於羑里散宜生得黄熊獻紂免西伯之難六韜成王時東胡獻黄熊周書王㑹青熊成王時不屠國進青熊周書黄熊入寢鄭子産聘於晉晉侯有疾韓宣子逆客私焉曰寡君寢疾於今三月矣竝走羣望有加而無瘳今夢黄熊入於寢門其何厲鬼也對曰以君之明子為大政其何厲之有昔堯殛鯀於羽山其神化為黄熊以入於羽淵實為夏郊三代祀之晉為盟主其或者未之祀也乎韓子祀夏郊晉侯有間昭七赤熊窺屏晋平公夢見赤熊窺屏惡之而有疾使問子産子産曰昔共工之御曰浮遊既敗於顓頊自没深淮之淵其色赤其言善笑其行善顧其狀如熊常為天下祟見之堂則王天下者死見堂下則邦人駭見門近臣憂見庭則無傷窺君之屏病而無傷祭顓頊共工則瘳公如其言而疾間瑣語射熊晉平公夢見知人五日寤而曰我之帝所見一熊欲援我帝命我射之中熊熊死又有一羆來又射之中羆羆死帝甚喜賜我二笥後有當道者曰帝令主君㓕二卿熊與羆皆其祖也忽不見史記熊皮蔽泥漢武時貳師得天馬帝以玫瑰石為鞍鏤以金銀鍮石以綠地五色錦為蔽泥後稍以熊羆毛有綠光皆可二尺者直百金卓王孫有百餘雙詔使獻二十枚西京雜記入宫兆亡昭帝時昌邑王賀聞人聲曰熊視而見大熊左右莫見以問莭中令龔遂遂曰熊山野之獸而來入宫室王獨見之此天戒大王恐宫室將空危亡象也賀不改寤後卒失國漢五行志綠熊席趙飛燕女弟居昭陽殿玉牀白象牙簟綠熊席席毛長二尺餘人眠而擁毛自蔽望之不能見坐則没膝其中雜熏爐香一坐此席餘香百日不歇西京雜記當熊元帝馮昭儀上幸虎圈鬭獸後宫皆坐熊出圈攀檻欲上殿昭儀乃當熊而立及左右格殺熊上問人情驚懼汝何故前當昭儀對曰夫猛獸得人而止妾恐熊至御座故身當之耳帝嗟嘆以此陪敬重之漢書米飴無益咸和七年左右啟以米飴熊上曰此無益而費於穀且是惡獸所不宜畜使遣打殺以肉賜左右直人建武故事白熊元嘉二十年白熊見新安歙縣太守到元度以獻宋書烏熊南蠻東謝蠻貞觀三年其酋元深入朝冠烏熊皮天鐵熊高宗時加一曰伽毗葉國獻天鐵熊擒白象師子置櫃中寧王嘗獵於鄠縣界草中得一櫃發之乃一少女也自言姓莫氏莊居昨夜遇賊却某至此賊中二人是僧王命載以后乘時方獲一生熊置櫃中如舊鎖之時上方求極色王以莫氏衣冠子女即日表上之具其所由上令充才人經三日京兆奏鄠縣食店有僧賃店作法事惟舁一櫃入店中夜久腷膞有聲店戸人怪日出不啓門撤戸視之有熊衘人走出二僧已死體骨悉露上覽之大笑書報寧王曰寧哥大能處置此僧酉陽能火紹興己酉永嘉火災前日有熊自南溪至江渡於城下初不懼人命獵士射之悴謂趙允蹈曰熊於字為能火宜愼火燭趙笑以為不然果延燒官民舍十七八獨州治存焉陶朱新録熊白埤雅云熊當心白脂如玉俗呼熊白好舉木引氣謂之熊經莊子熊經烏伸是也熊館熊於山中行數十里悉有跲伏之所必在石嵓枯木中山民謂之熊館唯虎出百里外則迷所出道路墨客揮犀不食鹽熊食少許鹽即宛轉而死胡孫亦然瑣碎録熊掌熊方冬唯自䑛其掌故其掌特美烹之難熟晉靈公殺宰夫之胹熊蹯不熟者而楚成見圍請食熊蹯而死以其難熟冀於外救也爾雅不熟桀王天下酒濁而殺厨人紂王天下熊蹯不熟而殺厨人墨子羆拔樹羆如熊黃白文爾雅注曰羆似熊而長頭似馬有髮高脚猛憨多力能拔樹木闗西呼曰貑羆陸璣曰有黄羆赤羆大於熊其脂如熊白而麄理不如熊美嶓冢嶓冢之山多熊羆山經非羆文王將田史編卜曰田於渭陽非龍非彲非虎非羆兆得公侯天遣汝師及田渭陽見太公立為師六韜夢羆符健字建業初母姜氏夢大羆而孕及長男果便弓馬載記當道王羆字熊羆齊神武遣韓軌司馬子如從河東宵濟襲羆羆不覺比曉軌衆已乘梯入城羆尚臥未起聞閣外洶洶有聲便袒身露髻徒跣持一白棒大呼而出謂曰老羆當道臥貉子那得過敵見驚退北史力猛獵者云熊是其雄羆則熊之雌者羆力尤猛爾雅翼鹿畏貙貙畏虎虎畏羆羆之狀被髪人立絶有力而甚害人栁宗元羆説虎樞星樞星散而為虎運斗樞樞精嘯谷韻清籟於驚蘋震徳升乾靉𤣥枝而布族駱賔王集山獸之君虎山獸之君也説文百獸之長虎者陽物百獸之長也能噬食鬼魅今人卒得病燒皮飲之繫其衣服亦辟惡此甚驗風俗通李耳風俗通曰呼虎為李耳俗説虎本南郡中廬李氏所化為呼李耳即喜呼班便怒又方言曰陳魏宋楚之間或謂之李父江淮南楚之間謂之李耳自闗東西謂之伯都虎食物遇耳即止以觸諱故也般文三九二十七日陽氣成故虎七月而生陽立於七故虎首尾長十尺般般文者隂陽雜也考異部虞吏山中寅日稱虞吏者虎也枹朴子諸禽之雄變復之家謂虎食人者功曹為奸所致也其意以為功曹衆吏之率虎以諸禽之䧺也功曹為奸來漁於吏故虎食人以象其意論衡託幽虎豹獸之猛者也居深林廣澤之中則人畏其威而載之人主天下之有勢者也深居則人畏其勢故虎豹去其幽而近於人則人得之而易其威人君去其門而迫于民則民易之而傲其勢故曰虎豹託齒而威可載也管子夀千嵗虎及鹿兎皆夀千嵗滿五百嵗色白枹朴子前驅黄帝與炎帝戰於阪泉之野師熊羆狼豹貙虎為前驅鵰鶡鷹鳶為旗幟此亦力使禽獸者也列黄帝駭人傑之時女樂三萬人放虎於市觀其驚駭管子白虎湯池七十里内懐聖明白虎戯朝其終白虎在野演孔圖虎牢西游有虎在於葭中七萃之士髙奔戎請生捕虎必全之乃生捕虎而獻之天子命為柙而畜之東虞是為虎牢穆天子𫝊叱虎周王欲殺王子宜咎立伯服釋虎將執之宜咎叱之虎彌耳而服𤨏語臯比宋師次於郎學偃自雩門竊出蒙臯比而先犯之莊子臯比虎皮樂記倒載干戈包之以虎皮名之曰建􅐤􅐤韜也而其字或作建臯故服䖍引以解此注疏虎乳初若敖娶於䢵生闘伯比若敖卒從其母畜於䢵滛於䢵子之女生子文焉䢵夫人使棄諸夣中虎乳之䢵子田見之懼而歸夫人以告遂使收之楚人謂乳榖謂虎於莵漢書作㮿故名榖於莵宣四苛政猛於虎孔子過泰山側有婦人哭於墓者而哀夫子式而聽之使子貢問之曰子之哭也一似重有憂者對曰然昔吾舅死於虎吾夫又死於虎今吾子又死焉夫子曰何為不去曰無苛政子曰小子識之苛政猛於虎也家語拔尾孔子嘗遊於山使子路取水逄虎於水所與共戰攬尾得之内懐中取水還問孔子曰上士殺虎如何子曰上士殺虎持虎頭又問中士殺虎如何子曰中士捉冄又問下士殺虎如何子曰捉虎尾子路出尾棄之因恚孔子曰夫子知水所有虎使我取水是欲死我乃懐石盤欲中孔子又問上士殺人如之何子曰上士殺人用筆端又問中士殺人如何子曰中士殺人用舌唇又問下士殺人如之何子曰下士殺人懐石盤子路出而棄之於是心服倒波傳見般芸小説及金樓子卑勢吳王將赦越王伍子胥諌曰夫虎之卑勢將以有擊也狸之卑身將以所取也越王既歸大夫扶同謂越王曰猛獸將擊必􅀈毛帖伏鷙鳥將搏必卑飛戢翼吳越摶虎中黄伯曰余左執太行之獶而右搏雕虎惟心之未與吾心試吾惑焉有力者則又願為牛欲與象闘以自試今二王子以為義矣將惡乎試之夫人貧窮太行之獶也疏賤義之雕虎也而吾日遇之亦足以自試矣尸子中行繆伯手摶虎而不能生也葢力優而克不能及也准繆稱雕虎嘯而清風起廣絶交論戾蟲陳軫曰卞莊子欲刺虎舘竪子止之白虎者戾蟲人者甘餌今兩虎争人而闘則大者傷小者死從傷而刺之一舉必有雙虎之名卞莊子以為然立頓之兩虎果闘大者傷小者死一舉果有雙虎之功史秦䇿春秋後語寝石勇士一呼而三軍皆避士之誠也昔者楚熊渠子夜行見寢石以為仗虎彎弓而射之沒金飲羽下視知其為石石為之開而况人乎夫倡而不和動而不隨中心有不全者矣夫不降席而匡天下者求之已也韓詩或曰養由基見寢石以為兕也射之矢飲羽論衡養由基射先中石矢乃飲羽誠乎先也伯樂學相馬所見無非馬者誠乎馬也吕精通謂石為虎射之洞開精之至也積嵗解牛恢然游刃習之乆也北齊文苑序飬虎梁鴦言養虎之法凡順之則喜逆之則怒血氣者之性也夫食虎者不敢以生物與之為其殺之之怒也不敢以全物與之為其决之之怒也列黄帝時其飢飽逹其怒心虎之與人異類而媚養己者順也射白虎秦昭襄王時白虎為害乃募能殺者時夷人胸䏰廖仲藥秦精等伏弩於髙樓射殺之昭襄王曰虎厯四郡凡害千二百人一朝降之功莫大焉乃刻石與盟華陽國志虎圈秦召公子無忌公子不行使朱亥奉壁一雙秦王大怒將朱亥著虎圈中亥曠目視虎皆裂血出濺虎終不敢動列士傳牛哀化虎昔公牛哀轉病也七日化為虎其兄掩户而入覘之虎搏而殺之方其為虎也不知其嘗為人也方其為人不知其且為虎也淮俶直訓牛哀病而化虎雖逄昆而必噬思𤣥賦幻術厭虎鞠道龍善為幻術嘗云東海人黄公少時為術能制蛇御虎秦末有白虎見東海黄公以赤刀徃厭之術既不得遂為虎所殺三輔人俗用以為戯漢帝亦取以為角抵之戯焉西京雜記祭虎漢景帝好遊獵有獵人見虎無便得之乃為珍饌祭所見之虎帝夣虎死在祭所乃命剥取皮牙餘肉悉化為虎而去獨異志射石李廣與兄弟共獵於𡨕山之北見卧虎焉䠶之一矢即斃斷其髑髏以為枕示服猛也鑄銅冩其形為溲噐示厭辱之也他日復獵於㝠山之陽又見卧虎䠶之沒矢飲羽進而視之乃石也其形類虎退而䠶更鑑破簳折而石不嘗余嘗以問楊子雲子雲曰至誠則金石為間西京雜記虎東渡江宋均遷九江郡多虎暴數為人患常募設檻穿而猶多傷害均到下記屬縣曰夫虎豹在山龜魚在水各有所托勞勤張捕非其性之本也其務退不肖思進忠善可一去檻􅀢除削課制其後𫝊言虎相與東浮渡江後漢按虎山栖穴虎毛能妾娑豈能犯陽侯陵濤瀬而横厲哉里語曰狐欲渡河無奈尾何舟人尚懼况於虎耶若使徳被四海虎豈咜至之方絶域之地乎風俗通衛刺史䘮王業字子香漢和帝時為荆州刺史有徳政天子徴之道卒於枝江有三白虎低頭曵尾宿衛其側及卒去之州境忽然不見百姓追美甘棠共立碑文號曰枝江白虎王君其子孫今猶云白虎王耆舊傳送物助葬歐寳者後漢人居父喪鄰人格虎虎走超其廬中即以衣覆藏之鄰人尋跡問寳寳白虎豈有可念而藏之乎此虎後送鹿獸以助寳祭時人以為孝慈通於神明由是知名王孚友汶記騖禽投案猶請命於魏君窮獸入廬乃祈生於歐氏法苑殺生部理感上虞楊威少失父事母至孝嘗與母入山採薪為虎所逼自計不能脱於是抱母且薪且行虎見其情遂彌耳而去自非誠貫精㣲孰能理感於英獸矣水經注封邵使君漢宣城大守封邵一日忽化虎食郡民民呼曰封使君時人語曰無作封使君生不治民死食民述異参代靈帝光和三年夏虎見年樂觀下又見憲陵王詔問楊賜賜對曰虎者金行参代之精狠戾之獸也張均白虎者西方之獸為禽剛猛强梁之物也漢紀曳虎尾魏文帝時樂浪獻虎文如錦班以鐵為檻梟殷之徒莫敢視任城王彰曵虎尾以繞背虎弭耳無聲拾遺白頞周處年少時兇暴挾氣為鄉里所患又義興水中有蛟山中有邅跡一作白額志怪有邪足虎並皆暴死百一義興人謂為三横而處尤劇或説處殺虎斬蛟實冀三横唯餘其一處即刺殺處又入水擊蛟蛟或浮或沒行數七里處與之俱經三日三夜鄉里皆謂已死更相慶竟殺蛟而出鄉里人相慶始知為人情所患有自艾意乃自吳尋二陸平原不在正見清河具以情告并云欲自脩改而年已蹉跎終無所成清河曰古人貴朝聞夕死况君前途尚逺且人患志之不立亦何憂令名不彰耶處遂改厲終為名臣孝子世説虎人安帝隆安元年五月凉州牧李暠微服出城逢一虎在道邉因化為人迎語暠為西凉君暠因弓弧待人又遥呼暠曰汝無疑也暠知其異乃投弓於地虎人乃前謂暠曰燉煌日虚不是福地君之子孫王於西凉不如遷徙酒泉言訖乃化未幾暠乃移都酒泉建國稱號西凉王載記枕背邵都梁馮恭永初中醉臥於山路夜有虎來以頭枕其背恭中宵展轉乃以手搏之復大寢向曉始醒猶見虎蹲在脚後茍有宿命非智士所知也異苑搖尾䕶人劉牧字子仁嘗居南山埜中喜山鳥之啼愛松風之韻植果種蔬為人欺侮多伐樹踐囿牧曰我不負人人何負我俄有二虎近居惟見牧則摇尾牧曰汝來䕶我也虎輒俯首歴年牧卒虎乃去成應元亊獨異志亭長漢江之域貙人能化為虎長沙居民作檻捕虎檻發明日衆人共徃格之見一亭長赤幘大冠在檻中坐民問君何以入此中亭長大怒曰昨被縣召夜避雨誤入此中急出我民曰君見召必當有文書即出懐中詔文書於是出之尋視之化為虎即上走捜神記識虎嘯齊沈僧照别名法朗攸之之孫也少事天師道説人吉凶頗有應驗嘗校獵中道而還左右問何故荅曰國家有邊事須還處分問何以知之曰向聞南山虎嘯知耳俄而使至梁典老道士梁衡山侯蕭泰為雍州刺史鎮襄陽時虎甚暴村門設檻機發村人炬火燭之見一老道士自陳云從村告乞還誤落檻裏共開之出檻即成虎奔馳而去廣古今五行記擒生虎朱子榮好射獵不舍晝夜法禁嚴重若一鹿出乃有數人殞命曾有一人見虎便走謂曰欲求活耶遂即斬之自此獵如登戰塲曾見一虎在窮谷中乃令人重衣空手搏之不令復損於是數人被殺遂擒得之持此為樂焉北史揜于後周楊忠從太祖狩於龍門獨當一虎左挾其腰右拔其舌太祖壯之北臺謂虎為揜于因以字之周書十一酋耳食虎天后時涪州武龍界多虎暴有一獸似虎而絶大日正午逐一虎直入人家噬殺之亦不食其肉自是縣界不復有虎矣録奏檢瑞圖乃酋耳不食生物有虎豹則殺之僉載周書云來林酋耳酋耳若虎尾參於身食虎豹大傳謂之侄獸嗅醉唐傳黄中為越州諸暨令有部人飲大醉在中山行臨崖而睡忽有虎臨其上而嗅之虎鬚入醉人鼻中遂噴嚏聲振虎遂驚躍便即落崖腰胯不遂為人所得僉載黒虎入觀天寳中河南緱氏縣仙鶴觀每年九月二日夜有一道士得仙其夜皆不扄戸以求上昇之應後張竭忠攝令疑之至時令一勇者以兵器潛覘之至三更後見一黒虎入觀須臾銜出一道士二人射之不中竭忠大獵於太子陵東石穴中格殺數虎或金簡玉籙或冠帔人髪或多博異志斑子天寳中巴人伐太白廟前大松有神人以神樹止之巴人不聼老人乃登山呼斑子俄羣虎出噬巴人又嶺南山魈亦呼虎為斑子並廣異記眞虎裴旻為龍華軍使守北平北平多虎旻善射嘗一日斃虎三十有一既而入山下四顧自矜有父老至曰此皆彪也似虎而非將軍若遇眞虎無能為也旻曰眞虎安在父老曰自此而北三十里徃徃有之旻躍馬而徃次叢薄中果有一虎騰出狀小而勢猛據地一吼山石震裂旻馬辟易弓矢皆墜殆不得免自此慙懼不復射虎國史補禁屍起拜張俊者宣州深水縣尉元澹莊客也其妻為虎所取俊誓欲報讐乃挾矢入山於近虎穴處上大樹伺之乃見其妻已死為虎所禁屍自起拜虎訖自解裳衣裸而復僵虎又於穴中引四子皆大如狸掉尾歡躍以舌䑛死人虎子競來爭食俊連射斃之截虎頭并殺四子取其首負妻而歸原化記鬼畏虎陽朔蘇太𤣥妻徐氏卒既殯忽一日還家但聞語而不見形云某年命未終㝠司不録經旬月知占卜吉凶有鄉人在府充職染疾其眷屬遂徃卜之俄頃云去至凉風館南地名柘木林遇虎當道不敢過遂郤回卜者堅請再徃俄頃云疾者已愈因述所居坊曲疾人形貎卜者始信服桂林風土記南山斑寅將軍大中年甯茵秀才於南山莊夜吟有叩門者曰南山斑寅將軍拜謁相與吟咏明騐之乃虎也傳竒寅獸寅獸白齒亦能見機亦云寅客眞誥白額侯張鋋次巴西遇白額候於巴西侯席上明騐之乃虎也宣室志大空小空潭州華林善覺禅師觀察使裴休訪之問有侍者否師曰有一兩箇乃喚大空小空二虎自菴後出師曰有客且去二虎咆哮而去休問作何行業感得如斯師曰山僧常念觀音大青小青聰道人者姓仰氏名德聰姑蘇人太平興國三年結廬於雲間余山之東峯有二虎為之衞名大青小青行則隨待前後志虎鬚治齒虎交而月暈仙人鄭思逺常騎虎故人許隱齒痛求治鄭曰唯得虎鬚及熱插齒間即愈即為拔數莖與之因知虎鬚治齒也酉陽按古方剖虎牙治犬咬瘡神效無比北戸録虎骨如乙字虎殺人能令屍起自解衣方食之虎威如乙字長一寸在脇兩旁皮内尾端亦有之佩之臨官佳無官人所媢嫉夜視一目放光虎夜視一目放光一目㸔物獵人候而射之光墜入地成白石治小兒驚同上虎卜虎知衝破又能畫地卜今人有畫物上下者推其竒偶謂之虎卜博物志生角漢中有虎生角道家云虎千嵗則牙脱而角生述異説説文委虒虎之有角者斑奴登山履谷與虎相觸猬為功曹斑奴奔比易林虎臥山林鹿過後朐猬為功曹遂全其軀上虎飢欲食見猬而伏上猬見虎則跳入虎耳酉陽人化江陵有貙人能化為虎俗云貙虎化為人好著紫葛衣足無踵有五指者人化為虎博物志越俚之民老者化為虎括地圖龍編功曹左飛曾化虎數月還作吏交州記缺耳凡虎若食一人耳上缺㾗若割裂以騐食人之數無差物類相感志結壇有神能結壇召虎人有疑罪令登壇有罪者虎傷無罪者不顧名虎噬僉載辨訟扶南王范尋常畜虎五六頭鰐魚十頭若有訟未知曲直便投於魚虎虎不噬則為有理穢貊之人祭虎為神將有以也異苑波羅南詔謂虎為波羅玉谿編事羅羅雲南蠻人呼虎為羅羅老則化為虎有羅藏山虎市求那跋摩采元嘉元年至南海文帝勅州郡跋發下京路由始興經停嵗許始興有虎市儀形聳峙峯嶺高絶跋摩謂其髣髴靈山改名靈鷲此山木多有虎災自跋摩居之晝行夜徃或時値虎以杖按頭抒之而去於是山旅水賔去來無梗感德歸化者十有七八焉述異記曲江縣靈鷲山舊多虎一名虎市晋義熙中有天竺僧居此而虎絶舊經食犬則醉虎類能識人氣未至百歩輒伏而嘷聲震山谷須臾奮躍搏人人有勇者不為之動止而坐逡巡弭耳而去又虎骨甚異雖咫尺淺草能身伏不露及其虓然作聲則嵬然大矣又虎不食小兒兒癡不知虎之可懼故不得而食兼不食醉人必坐守以俟其醒非俟其醒俟其懼也又人或罹虎口其神魂被虎所役徃徃為之前導今之人凡死於虎者衣服巾履皆别置於地非虎之威能使之自解是鬼之為也又虎飢則兼果實皆啖不特獸也凡食男子必自勢起婦人必自乳起惟不食婦人之陰或遇之者當作勢與之敵而屢退引至曲路即可避去盖虎不行曲路故也又虎食犬則醉犬虎之酒也癸辛雜志天虎人虎俗言四指者天虎也五指者人虎也國史補豹豹胎紂為象箸而箕子怖以為象箸必不加於土鉶必將犀玉之杯象箸玉杯必不羮菽藿則必旄象世紀作熊蹯豹胎韓子𤣥豹文王拘於羑里散宜生求得𤣥豹以獻紂免西伯之難瑞應圖侈靡武王為侈靡令人貂檐豹裘方得入廟故貂皮百金功臣之家糶千鍾未得一豹皮管子赤豹舂山百獸所聚也爰有赤豹熊羆穆天子傳乘赤豹兮從文貍楚辭泰山多赤豹詩云赤豹黄羆山海尾赤而文黑謂之赤豹陸機疏獻皮翟人有獻豐豹𤣥豹之皮於晋文公文公受客皮而嘆曰此亦皮之美自為罪韓子青豹元封中起神明之臺炮青豹之脯青豹出浪坂之山狀如虎色如翠殺之為脯食之不愚洞㝠記樹尾武昌記云樊口南有大姥廟孫權嘗獵於山下依夕見一姥問權獵何所得曰止得一豹姥曰何不豎豹尾忽然不見應劭漢官儀云豹尾過役執金吾罷屯解圍天下鹵簿中後屬車施豹尾於道路豹尾之内為省中盖權事應在此故為立廟也水經注管窺王獻之數嵗時嘗㸔諸門生樗蒱見有勝負因曰南風不競門生輩輕其小兒乃曰此即亦管中窺豹時見一斑獻之怒曰逺慚荀奉倩近愧劉眞長拂衣而去世説建安八年庚申令曰明君不官無功之臣不賞不戰之士治平尚德行有事賞功能論者之言一似管窺虎與魏志注見學狄伯竒少曾遊獵得豹見其文采煥炳遂自感嘆始學書藝後秦記白豹屠州有黒豹有白豹列名貘王會文豹夫豐狐文豹棲於山林伏於巖穴静也夜行晝居戒也雖飢渴隱約猶且胥疏於江湖之上而求食焉定也然且不免於羅網機辟之患是何罪之有哉其皮為之災也莊子首山狐死首丘豹死首山是性之異也廣志果下羅山高入雲霧諸仙所遊上有豹獸文采蔚然小似猿猴南海人名之為果下非凡豹也山記它牛室利佛逝國有橐它豹文而犀角以乘且耕名曰它牛豹唐南蠻傳狼狼烟狼大如狗蒼色作聲諸竅皆沸䏶中筋大如鴨卵有犯盗者薰之當令手攣縮或言狼筋如織絡小囊蟲所作也狼糞烟直上烽火用之或言狼狽是兩物狽前兩足絶短行常駕兩狼失狼則不能動故世言事乖者稱狼狽酉陽白狼白狼者金狼精也王者仁智明哲即至動凖法度則見瑞應圖商湯為天子都於亳有神手牽白狼口銜金鉤而入湯庭田俅子荒服不至周穆王將征犬戎祭公謀父諫不聽遂征之得四白狼四白鹿以歸自是荒服者不至國語周宣時白狼見而犬戎服瑞應圖避狼城周幽王時牛化為虎羊化為狼洛南有避狼城是其處也述異記狼圈秦故虎圈周匝三十五步狼圈廣八十步長二十步西去長安十五里漢宫殿疏嚙人江都昜王非卒子建立宫人有過縱狼嚙之觀以為樂本傳狼乳烏孫王昆莫初生傳父置草中為求食還見狼乳之又烏衘肉翔其旁以為神張騫傳山無豺狼王業為荆州刺史山無豺狼搜神記銜衣王懿字仲德初遇苻氏之敗與兄叡同起義兵與慕容垂戰被重創走困臥大澤林中苦飢餓忽有青衣童兒攜食與之食畢欲行㑹水潦暴至莫知所如有一白狼至前仰天而號號訖衘仲德衣渡水上仲德隨之獲濟與叡相及後仲德三臨徐州威德著於彭城立佛寺作白狼童子像於塔中以河北所遇也卒後亦於廟立白狼童子壇每祭必祠之宋書後魏事稍同配狼匃奴單于生二女姿容甚美國人皆以為神單于築髙臺置二女其上曰請天自迎之經三年餘有一老狼晝夜守臺嘷呼其小女下為狼妻而産子後遂滋繁成國故其人好引聲長歌又似狼嘷北史附離突厥之先匃奴之别種也為隣國所破其族有一小兒棄草澤中有牝狼以肉飼之及長與狼交合遂有孕焉逃於高昌之國北山洞穴遂生十男大外託妻孕其後各為一姓阿史那即其一也後周四夷傳突厥旗纛之上施金狼頭侍衞之士皆為附離夏言亦狼盖本狼生志不忘本耳北史狼頭人薛延陀部落嘗有一客乞食於主人者主人引與入帳命妻具饌其妻顧視客乃狼頭人也主人不之覺妻告隣人共視之狼頭人已食主人而去相與逐之見二人迎來問其故二人曰我是也我即神人薛延陀當滅我来取之其妻懼而反走舊唐繩絡武后人遊擊將軍朱佛兒於魏縣長夀鄉界内逄白狼馴狎無懼人意遂以繩絡頭繫得隨送於縣縣令孟神符諜稱崔融為賀表㸔羊龍朔中楊思𤣥恃外戚典選多排斥選士為選人夏彪訟之中丞郎餘慶彈奏免官許南陽曰故知楊吏部之敗或問之許曰一彪一狼共㸔一羊不敗何待南部知女百嵗狼化為女人名曰知女狀如人坐道傍告丈夫曰我無父母兄弟丈夫娶為妻三年而食人以其名呼之則逃去白澤圖兒啼狼能為小兒啼聲以誘人去數十步止其猛健者人不能制雖善用兵者亦不能尅也其膏可以煎和其皮可以為裘毛詩疏狼卜志云狼卜食狼將逺逐食必先倒立以卜所向故今獵師遇狼輒喜盖狼之所在獸之所在也故古之造式者木用槐癭棗瘤而以狼牙為柱取其靈知也猿五月生五九四十五五主音音主猿猿故五月而生淮南猿與獮猴不共山宿臨且相呼元康地記引氣猿似猴大而黒長臂所以夀者好引其氣也繁露化猿周穆王南征一軍皆化君子為猿為鶴小人為蟲為沙抱朴子射猿荆王有神白猿王自射之則搏樹而嬉使養由基射之始調弓矯矢未發猿擁樹而號吕覽養流涕而猿號幽通賦袁公越王問范蠡手戰之術范蠡曰臣聞越有處女國人稱之願王請問手戰之道於是王乃請女女將北見王道逢老人自稱袁公袁公問女聞子善為劔願得一觀之處女曰妾不敢有所隱也唯公所試公即挽林内之竹以枯槁末折墮地女接取其末袁公操其本而刺處女處女應即入之三入因舉杖擊袁公袁公則飛上樹化為白猿異越授圖黄石不無師表之心學劔白猿遂得風雲之志吏信字文盛墓誌授圖黄石老學劒白猿翁杜牧之詩逞能莊子衣大布而補之正緳係履而過魏王魏王曰何先生之憊邪莊子曰衣敝履穿貧也非憊也此所謂非遭時也王獨不見夫騰猿乎其得柟梓豫章也攬曼其枝而生長其間雖羿蓬蒙不能眄睨也及其得柘棘枳枸之間也危行側視振動悼慓此筋骨非有加急而不柔也處勢不便未足以逞其能也今處昏上亂相之間而欲無憊奚可得邪莊子新序宋玉事楚襄王稍同射猿蜀車騎將軍鄧芝征涪陵見猿猴縁山芝性好弩手自射猿中之猿拔其箭卷木葉塞其創芝曰嘻吾違物之性其將死矣華陽志芝見猿抱子在樹上引弩射之中猿母其子為拔箭以木葉塞創芝乃嘆息投弩水中自知當死晋五行志腸斷桓公入蜀至三峡山中部伍中有得猿子者其母緣岸哀號行百餘里不去遂跳上船至便即絶破視其腹中腸皆寸寸斷公聞之怒命黜其人世説白猿𣑽劉宋時錢塘釋智一者善長嘯於靈山澗適養一白猿有時驀山踰澗久而不還一乃吮吻張喉作梵呼之則猿至矣時人謂之白猿梵名一公為猿父為狙公也其後澗邉羣狙聚焉每至衆僧齋訖歛生飯送猿臺所後令山童呼二三聲則羣猿競至洎唐武宗廢教寺遂圯焉飯猿於臺事皆埋滅宋高僧𫝊求子猿齊魚復侯子響為蕭順之所殺武帝出景陽山見一猿透擲悲鳴問後堂丞此猿何意答曰猿子前日墮崖致死其母求之不見故耳上因憶子響歔欷良久不自勝順之慙懼以憂卒南史闕長猨鳴三聲淚沾裳荆州記峽中猨鳴至清山谷傳其聲泠泠不絶行者歌之曰巴東三峽猨鳴悲猨鳴三聲淚沾衣宣都山川記膽甜猿食果故其膽黒甜善縁猨寓屬也或黄黒通胂輕巢善縁能於空輪轉好吟雌為人所得終不徒生周索氏茅子𫝊臂笛猿臂可為笛吹之其聲圓於竹酉陽猴王孫猴一名狙一名王孫一名胡孫廣猚沐猴􅀈獨猴也楚人謂之沐猴老者為獑猢駿捷其鳴噭噭而悲詩疏人君山中申日稱人君者猴也猴夀八百嵗枹朴子玉䇿記狙伐巧呉王浮於江登於狙之山衆狙見之恂然棄而走逃於深秦有一狙為委蛇攫搔見巧乎王王射之敏給掉捷矣王命相者趍射之狙死王顧謂其友顔不疑曰之狙也伐其巧持其便以傲予以至此極也戒之哉嗟乎無以汝色驕人哉莊子狙公宋有狙公者愛狙養之成群能解狙之意狙亦得公之心損其家口充徂之欲俄而匱焉將限其食恐衆狙之不馴於己也先誑之曰與若子朝三而暮四足乎衆徂皆起而怒俄而曰與若子朝四而暮三足乎衆徂皆伏而喜物之以能鄙相籠皆猶此也聖人以智籠群愚亦猶狙公之以智籠羣狙也列子烹猴楚人有烹猴而召其隣人以為狗羹也而甘之後聞其猴也據地而吐之盡㵼其食此為未始知味者也邯鄲師有出新曲者託之李奇諸人皆争學之後知其非也而皆棄其曲此未始知音者也淮南猴鬼滕永叔常養大獼猴鎖著牀間犬忽嚙殺之永叔便合鎖埋之後百許日有見鬼者徃見獼猴走上永叔承塵上不悟是鬼也驚指之曰獼猴何以被傷血流斷走乎永叔曰始乃知猴死復有鬼也山家小兒天監中有釋寳誌曰掘尾狗子自發狂又曰山家小兒果攘背掘尾狗子山家小兒皆猴伏也後侯景叛梁書為脯魚𢎞為湘東王鎮西司馬述職西上道中乏食於窮洲之上捕得數百獼猴膊以為脯以供酒食南史四十五獻白猴交州刺史阮表言林邑王范績云晝觀望天氣知中國有聖主臣乞内附為臣兼獻白猴一頭天監起居注熱熬胡孫楊仲嗣躁率魏光乘目為熱𨫼上胡孫僉載縱火唐大厯中有猴數百集古田杉林中里人欲伐木殺之中一老猴忽躍去隣近一家縱火焚屋里人懼亟走救火於是羣猴脱去汀州記孫供奉唐昭宗播遷隨駕技藝人止有弄猴頗馴能隨班起居昭宗賜以緋袍號孫供奉羅隱下第詩云何如學取孫供奉一笑君王便著緋朱梁簒位取此猴令殿下起居猴望殿陛見全忠徑趨其所跳躍奮擊遂令殺之唐臣愧此猴多矣幕府燕聞録猴部頭猿父也衣以俳優服常在昭宗側朱梁云嘉祐雜志教猴語蜀中有楊千度者善弄胡孫㑹人言語一日内廏上孫絶維上殿閣蜀主令射之三日不得内豎奏千度能弄胡孫試令捉之楊遂以十餘頭戲於殿前内廏者亦在舍上窺之楊高聲曰奉勅把舍上胡孫來果立致於殿前蜀主大悦厚賜千度内臣因問其教之之術對曰胡孫乃獸實不㑹人語先餌以靈砂變其獸心然後可學耳野人閒話觸網南唐李後主獵青龍山一牝狙觸網見主兩淚稽顙指其腹戒虞人保守之是夕誕二子還幸大寺寺録囚繫有大辟婦以孕在獄未幾誕二子煜感狙事罪止於流湘山寺録馬留京師優人以雜物數十種布地使人暗記物色然後遣沐猴認之每沐猴得之優人即曰道著也馬留馬留盖優人呼沐猴之名古今詩話猴頭羮南方人以獼猴頭為鮓異物志安家夷以好噉猴頭羮諺言人能負人千石之粟不願負人猴頭羮臛臨海異物志如拳武夷山多獼猴其小者僅如拳崇安志胡孫脂胡孫脂人摘去毛髪者以塗之則不出猴王外夷爪哇國山多猴不畏人呼以霄霄之聲則出或投以果實則其二大猴先至土人謂之猴王猴夫人食畢羣猴食其餘狐三德狐妖獸也鬼所乘也有三德其色中和小前大後死則首丘謂之三德説文阿紫狐者先古之滛婦也其名曰紫化而為狐故其怪多自稱阿紫名山記搜神記舊説野狐夜繫尾出火將為怪必戴髑髏拜北斗髑髏不墜則化為人矣酉陽狐變為巫狐五十嵗能變化為婦人百嵗為美女為神巫或為丈夫與女人交接能知千里外事善蠱魅使人迷惑失智千嵗即與天通為天狐𤣥中記狐及狸狼皆壽八百嵗滿三百嵗暫變為人形抱朴子玉䇿記聽氷盟津河津恒濁方江為狹比淮濟為濶寒則冰厚數丈冰方合車馬不敢過要須狐行云此物善聼冰下無水乃過人見狐行方渡述征記按風俗通云里語稱狐欲渡河無如尾何且狐性多疑故俗有狐疑之説亦未必一如緣生之言也九尾青丘之國有狐九尾大荒東經太平則出為瑞也注九尾狐者神獸也其狀赤色四足九尾出青丘之國有如嬰兒食者令人不逄妖邪之氣及蠱毒之類瑞應圖應夏禹二十未娶行列山恐時之暮失其度制曰吾之娶也必有應矣乃有白狐九尾造於禹曰白者吾服也九尾者王證也塗山之歌曰綏綏白狐九尾龎龎成家成室我造彼昌禹娶塗山女吳越瑞周周文王拘羑里散宜生至㑹稽得九尾青狐以獻紂免西伯之難瑞應圖昔文王應九尾狐而東夷歸王褒講德論天命文王以九尾狐春秋元命苞狐死首丘不㤀本也德至鳥獸則九尾狐見九者子孫繁息也於尾者後當盛也白虎通栢柕子征於東海及三壽得一狐九尾竹書白狐文王拘羑里散宜生之西海之濵取白狐青翰獻紂紂大悦翰長毛也大𫝊馬化周宣王三十三年幽王生是嵗有馬化為狐搜神記狐白齊管子對桓公曰代出狐白之皮狐白應隂陽之變六月而一見公貴買之代人㤀其難得利其貴價必相率而求之因令齊載金錢之代谷求狐白之皮代王聞之果去其本入山林之中求狐白之皮二十四月而不得一離支聞而侵之代王即將其士卒下於齊鳥愛晋平公異曰出朝有鳥環平公不去平公顧謂師曠曰吾聞之也霸王之王鳳下之今者出朝有鳥環寡人終朝不去是其鳯鳥乎師曠曰東方有鳥名諫珂其為鳥也文身而朱足憎鳥而愛狐今者吾君必衣狐裘以出朝乎平公曰然師曠曰鳥為狐裘之故非吾君之故非吾君之德義也君奈何而再自誣乎説苑衣狐林既衣韋衣而朝齊景公齊景公曰此君子之服也小人之服也林既逡巡而作色曰夫服飾何足以端士行乎即如君言衣狗裘者當犬吠衣羊裘者當羊鳴且君衣狐裘而朝意者得無為變乎景公曰子眞為勇悍矣上狐白之裘天子被之而在廟堂為狐計者不若走於平澤金樓子假虎畏楚宣王問羣臣曰吾聞北方之民畏昭奚恤亦誠何如江乙對曰虎求百獸而食之得狐狐曰子無食我天帝令我長百獸子若食我是逆天帝之命子以我為不信我為子先行隨我後觀百獸見其能無走乎虎以為然隨狐而行百獸見皆走虎不知獸之畏已反以為畏狐也今王地方五千里𢃄甲百萬而任之於昭奚恤然北方非畏奚恤實畏王之甲兵春秋後語稷狐客謂孟嘗君曰狐者人之所攻也鼠者人之所燻也臣未見稷狐見攻社䑕見燻何則所託者然也説苑傷狐報廣川王去疾聚無頼少年遊獵無度國内冢墓盡發之嘗發欒書冢無餘物有一白狐見人驚走左右㦸之不得傷左足於是王夢一丈夫髮眉盡白來謂王何故傷吾左足以杖叩王左脚上乃患脚至死不差西京雜記忌犬胡道洽自云廣陵人好音樂醫術之事體有臊氣常以名香自防惟忌猛犬自審死日誡弟子曰氣絶便殯勿令狗見我尸也死於山陽斂畢覺棺空即開看不見尸體時人咸謂狐也劉敬叔異苑胡博士有一書生吳中皓首稱胡博士教授諸生忽復不見九月初九日士人相與登山遊觀聞講書聲命僕㝷之見空冢中羣狐羅列見人即走老狐獨不去是皓首書生搜神記足𢃄香嚢習鑿齒從桓温出獵時大雪於江陵城西見草上有氣出伺一物射之應箭死徃取之乃老雄狐足上𢃄絳繒香囊渚宫故事截髮後魏有挽歌者孫岩娶妻三年妻不脱衣而臥岩私怪之伺其睡陰解其衣有尾長三尺似狐尾岩懼而出之妻臨去將刀截岩髮而走隣人逐之變為一狐追之不得其後京邑被截髮者一百三十人初變為婦人衣服净莊行於道路人見而悦之近者被截髪當時婦人著綵衣者指為狐魅洛陽伽藍記狐神唐初以來百姓多事狐神房中祭祀以乞恩飲食與人同之事者非一主當時有諺曰無狐魅不成村僉載天狐科神龍中有何讓之者上已於洛中光武原陵上見老翁吟曰野田剥棘春閨閣綺羅新出没頭上日生死眼前人訝其非人遽欲前執翁倐然躍入丘中讓之從焉遽見一狐跳出尾有火復如流星讓之見一几案上有文書二紙其一曰五行七曜成此閏餘上帝降靈嵗旦涒涂蛇蜕其皮君亦神攎九九六六來自天除何以充喉吐納太虛何以蔽裸霞袿雲􅀈哀爾浮生擲此荒墟吾復浩氣還形之初在帝左右道濟忽諸題云應天狐超異科策八道後文甚繁難以詳載讓之獲此書帖喜而懷之遂躍出丘穴後數日狐化為僧持縑來易復化讓之弟紿取去未幾有勅捕盗内府絹者遂執讓之付法乾􅍧子𤣥狐若牛李林甫方居相位嘗退朝至於堂之前軒見一𤣥狐其身甚大若牛馬而毛色黯黒有光自堂中忽馳至庭顧望左右林甫命弧矢將射之未及已亡見矣自是凡數日每晝坐輒有一𤣥狐出焉其嵗林甫籍没宣室志白狐祥唐丞相李揆乾元初為中書舍人嘗退朝見一白狐在庭中搗練石上命侍僮逐之已亡見矣時有客於揆門者因話其事客曰此祥符也某敢賀至明日果遷禮部侍郎宣室志通天狐楊虞卿漢公兄弟黨附闗節節常嫉不附己者令其黨赤舌而攻之輦下謂三楊為通天狐三十餘年為朝廷之隂蠧牛羊日厯咋狐犬睢陽郡宋王冢旁有一老狐每至衙中邑中之狗悉徃朝之狐坐冢上狗列其下東都王老有䨇犬能咋狐前後殺魅甚多宋人相率以財僱犬咋狐王老驅雙犬至乃逕詣諸犬之下伏而不動大失宋人之望今世人有不了其事者相戲云取睢陽咋狐犬廣異記𤣥丘校尉張鋌為巴西侯所邀坐中有稱𤣥丘校尉者明日視之乃狐也宣室志衣草惑人僧志𤣥者河朔人曾至絳州夜泊墓林中其夜月色如晝見一狐從林下將髑髏置首摇之落者不顧不落者戴之更取芳草墮葉遮蔽其身俄成美女素服立於道左微聞有車馬行聲女子哀泣悲不自勝少選有乘馬郎至與言久之欲將偕去𤣥從林出謂之曰此狐也其人不信𤣥乃振錫胡語女遂化狐而走其人叩頭悔過焉宋高僧傳天狐術中有天狐别行法言天狐九尾金色役於日月宫有醮有符目可洞逹陰陽酉陽潛上伏類從曰燕識戊巳不啣泥狐潛上伏不越度阡陌又曰狐狼知虚實虎豹識衝破卑體夫狐之捕雉也必先卑體弭耳以待其來也雉見而信之故得而擒也使狐瞋目直睹見必殺之勢雉亦知驚憚逺飛以避其怒矣淮人間訓畏犀犀角駭狐淮南犀角置狐穴中狐不歸萬畢術狸不來徐廣曰狸一名不來封禅書注鉛錫之精鉛錫之精化為狐狸𤣥中記自為夫婦靈狸一體自為夫婦故能媚人異物志狸乳齊惠公之妾蕭桐叔子見御有身以其賤不敢言也取薪而生頃公於野又不敢舉也狸乳鸇覆之人見而収之因名無野搜神記知雨漢董仲舒嘗下帷獨詠忽有客來風姿音氣殊為不凡與論五經究其微奥仲舒素不聞此人因而疑其非常乃謂之曰巢居却風穴處知雨卿非狐狸即是老鼠客聞此言色動形壞化成老狸蹶然而走幽明録盗馬費長房曾與人共行見一書生黄巾被裘無鞍騎馬下而叩頭長房曰還他馬赦汝死罪人問其故長房曰此狸也盜社公馬耳後漢千嵗張華為司空于時燕昭王墓前有一斑狸化為書生欲詣張公過問墓前華表曰以我才貎可得見司空耶華表曰子之妙解無為不可但張公智度恐難籠絡出不遇辱殆不得返非但喪子千年之質亦當深誤老張狸不從乃持刺謁華華引入談論三日不屈華甚疑之曰此必妖也乃掃塌延留留人防禦言卒便請退華已使人防門不得出既而又謂華曰公門置甲兵欄騎當是疑於僕也將恐天下之人捲舌而不言智謀之士望門而不進深為明公惜之華不應而室人禦防甚嚴時豊城令雷煥博物士也來訪華華以書生白之孔章曰若疑之何不取獵犬試之乃命犬以試竟無憚色且曰我天生才智反以為妖以犬試我公莫千試萬慮其能為患乎華聞益怒曰此必眞妖也乃曰聞魑魅忌犬所别者數百年物耳惟有千年老精不復能别惟有千年枯木照之則形見孔章曰千年神木何由可得華曰世説燕惠王墓前有華表木已經千年乃遣人伐之使人欲至木所空中有一青衣小兒來問使曰君何來也使曰張司空忽有一少年多才巧辭疑是妖異使我取華表照之青衣曰老狸不智不聽我言今日禍已及我其可逃乎乃發聲而泣倐然不見使乃伐其木血流便將木歸燃之以照書生乃一斑狸華嘆曰此二物不植我千年不可復得華乃烹之齊諧記捜神記作狐戸閉樂廣為河南尹郡中前㕔多妖怪後人皆於廊下督郵傳中治事無敢在㕔事者惟廣處之白日戸自閉二子凱模等懾怖廣使掘牆孔得狸乃絶傳子鸚鵡王度至長安程雄家雄新受寄一婢頗端麗名曰鸚鵡度疑其精魅引鏡逼之化為老狸而死異聞録孝感武𢎞度士䕶兄子也父卒廬墓側晨夕哀號有野狸每至齋時必來求食徃來甚馴狸無驚懼時以為孝感舊唐兔月精者明月之精典畧明眎祭宗廟之禮曰明眎禮玉衡星散玉衡星散而為行世瑶光則出月運斗樞吐子䑛雄毫而孕及生子從口中出論衡望月而孕口中吐子博物志五月而吐子陶氏書白壽千嵗五百嵗其色白外國圖云西王母國前弱水有玉山白抱朴子扑朔迷離木蘭歌雄脚扑朔雌眼迷離一本又作扑握生角商紂之時大龜生毛兎生角兵甲將興之兆述異記走街楚恭王多寵子而世子之位不定屈建曰楚必多亂夫一走於街萬人逐之一人得之萬人不復走分未定則一走使萬人擾分已定則雖貪夫知止今楚多寵子而嫡位無主亂自是生矣夫世太子者國之基也而百姓之望也國既無基又使百姓失望絶其本矣本絶則撓亂猶􅊵走也恭王聞之立康王為太子其後猶有令尹圍公子棄疾之亂也説苑走於市百人追之貪人俱存人莫之非者非為兔未分定耶積滿市過不能顧非不欲也分定之後雖鄙不争慎子腸鐵楚王與群臣獵於雲夢縱良犬逐狡兔三日乃獲之其腸是鐵良工曰可以為劍異苑守株宋人有耕田中株兎走觸之折頸而死因釋而耕守株兾復得為宋國笑韓子三穴馮諼謂孟嘗君曰狡有三窟僅得免其死耳齊䇿和丹北極有潰陽之山有如鼠能飛毛色光如漆以腦和丹食之則不死武帝使放於昭祥苑苑在丹食宫西周十里萬國獻異物皆積此中洞㝠記刻毛梁兾起園於河南移檄所在調發生刻其毛以識民有犯者罪至死西域嘗有賈胡來不知禁誤殺一兔轉相告坐罪者十餘人張璠漢記互見苑擾室蔡邕性篤孝母嘗滯病三年邕自非寒暑莭變未嘗解衿𢃄不寐七旬母卒廬於冢側動静以禮有兔馴擾其室傍後漢白兔慕容既田於南鄙見父老曰此非獵所言卒不見既明日又出見白兔馳射之墜馬輦而還宫遂薨前燕録入宫有兔入於後宫檢問門官無從得入太祖令崔浩推其咎徵浩以為當有隣國貢嬪嬙者明年姚興果來獻女後魏書匿膝華秋汲郡人喪母負土成墳廬於墓側有人欲助之者秋輒拜止之大業初調狐皮郡縣犬獵有一兔人逐之奔入秋廬中匿秋膝下獵人異而免之自爾此常宿廬中馴其左右郡縣嘉其孝感具以狀聞隋書趙毫漢諸郡獻兔毫書鴻都門題唯趙國毫中用廣志中山出兔毫為筆精妙元和郡志溧水中山古老相傳有白兔世稱為筆最精寰宇記獺知水鵲巢知風之向背獺穴知水之高下淮南嗜鯔魏明帝遊洛水水中有白獺數頭美浄可憐見人輒去帝欲見之終莫能遂侍中徐景山曰獺嗜鯔魚乃不避死畫板作兩生鯔魚懸置㟁上於是羣獺競逐一時執得帝甚佳之曰聞卿善畫何其妙也答曰臣亦未嘗執筆然人之所目可庶幾耳帝曰是善用所長顔公庭誥云徐景山之畫獺是也續齊諧記白獺膸孫和悦鄧夫人嘗置膝上和於月下舞水精如意悞傷夫人頰血流染姱嬌姹彌苦自䑛其瘡命太醫合藥醫曰得白獺膸雜玉與琥珀屑當滅此痕即購致百金能得白獺膸者厚賞之有富春漁人云此物知人欲取則逃入石穴伺其祭魚之時獺有鬭死者穴中應有枯骨雖無膸有骨可合玉舂為粉歕於瘡上其痕則滅和乃命合此藥琥珀太多及差而有赤㸃如朱逼而視之愈益其妍諸嬖人欲邀寵皆以丹脂㸃頰而後進幸妖惑相動遂成滛俗拾遺記青衣少婦昔有吏丁初於長塘湖堤見一青衣戴青􅏛後呼初疑為鬼物便疾行去之轉逺顧視婦人乃自投波中泥然作聲衣盖飛散視是大蒼獺衣􅏛皆荷葉也盖以多魚乃有獺以敺之耳搜神記并上道四蕃志養獺捕魚元和末均州鄖鄉縣民有百姓年七十養獺十餘頭捕魚為業隔日一放將放先閉於深溝石門内令飢然後放之無網罟之勞而獲甚厚令人抵掌呼之群獺皆至縁衿藉膝馴若守狗戸部郎中李福親見之酉陽雜俎猩猩知人名猩猩知人名如豕而人靣山經能言笑猩猩能言笑亦二足無尾而君子啜其羮食其胾故人非以二足無尾為知禮也孫卿子肉辟穀武平封溪縣有獸曰猩猩猿形人面顔容端正善與人音聲妙麗如婦人對語聞之無不酸楚其肉食之窮年無厭可以辟穀水經注染朱永昌郡有猩猩能言其血可以染朱罽色鮮不黯或曰若刺其血問之爾與我幾許猩猩曰二升果足其數若加之鞭捶則問之則隨所加而得至於一斗弗如此未肯頓輸華陽國志有靈漢黄霸為封溪令部人陳亷攜酒並猩猩以獻霸問曰何物人未及應囊中語曰斗酒並僕耳霸以其物有靈開囊放之徃徃悲啼而去獨異志好酒及屐阮研曾使封溪見人説猩猩好好酒及屐里人置之山谷常行路百數為羣見酒物等知人設張取之此獸甚靈先知其人祖父姓名而詈曰奴欲殺我捨爾去也去而復還因相呼曰試共嘗酒及飲乃甘其味逮於醉因取屐而著之乃為人之所擒皆獲輒無遺者遂置檻中隨其所欲而飲之將烹里人索其肥者乃自推肥泣而遣之楚太原王綱著傳裴炎銘兒啼猩猩似狟聲如兒啼不聞其言出交趾封溪縣廣志杜佑云廣志足徵諸家之説不加考覈逓相祖述耳血染朱罽徧問胡商元無此事通典似雄鴨談苑云宋太祖平嶺南求得猩猩如雄鴨而大取其血染色如渥丹與傳記所載不同雲嶠類要知徃歸終知來猩猩知徃萬畢術狒狒山都狒狒如人被髪迅走食人爾雅山海經云梟羊其状如人面長脣黑身有毛反踵見人則笑交廣及南康郡山中亦有此物大者長丈許俗呼之曰山都一名曰贑註蹈飛豹羂嘄陽羽獵賦梟羊喜獲先笑後愁張衡𤣥圖猩猩啼而就擒􅍛􅍛五臣作鷽笑而被格吳都賦狒狒怪獸被髪操竹獲人則笑脣蔽其目終亦號咷反為我戮郭讃吐嘍周成王時州靡國獻􅍛􅍛人身反踵自笑笑則上脣翕其目食人北方謂之吐嘍周書王會人言馬聲宋建武中獠子以西波尸地高城郡安西縣主簿韋文禮進􅍛􅍛雌雄二頭帝曰吾聞􅍛􅍛能負千鈞若既力如此何能致之彼土人丁鑾進曰􅍛􅍛見人喜笑則上脣掩其目人以釘釘著額上任其奔馳候死而取之髪極長可為頭髪血堪染􅀈其毛一似獼猴人而紅赤色作人言馬聲善知生死飲其血使人見鬼帝聞而欣然命工圖之本草果然讓老果然獸似獼猴以名自呼色蒼黒群行老者在前少者在後得果食輒與老者似有義焉交趾諸山有之獠人射之以其毛為裘褥甚温煖山經尾長四尺交州以南有果然獸其鳴自呼身如猨犬面通身白色其體不過三尺而尾長四尺餘反尾度身過其頭視其鼻仍見兩孔仰向天其毛長柔細滑澤色以白為質黑為文視如蒼頭鴨脇邉斑文集十餘皮可得一褥繁文麗好細厚温煖南州異物志人心劒南人之采猓􅛊者得一果然其數十果然可得何哉果然有傷其類者聚族悲啼雖殺之不去此禽獸之狀而人心也樂羊張仁愿史牟則人之狀而禽獸心也國史補三色褥戎人進果然褥皂褐碧三色相間段氏遊蜀記歌然果然九眞土人號曰歌然總獸天祿辟邪天䴪者純靈之獸五色光耀洞明王者道偹則至瑞應圖中平元年注天祿蝦蟆吐水於平門外橋東轉水入宫宦者張讓𫝊鄧州南陽縣北有宣資碑旁有兩石獸鐫其膊一曰天祿一曰辟邪據此即天祿辟邪並獸名也漢有天祿閣亦因獸以立名靈帝紀注滍水南有漢中常侍長樂大僕吉侯苞冢冢前有碑基人有掘出一獸猶全不破甚高壯頭去地减一丈許作制甚工左膊上刻作辟邪字水經聚窟洲有辟邪天祿十洲記唐肅宗賜李輔國玉辟邪二各長二尺五寸杜陽雜編桃拔章帝章和元年安息國遣使獻獅子符拔符拔形似麟而無角後西域傳是年月氐國遣使獻扶拔章紀烏弋有桃拔孟康曰桃扳一名符拔似鹿長尾一角者或為天鹿兩角者或為辟邪前西域傳能高紀云吾非敢自愛恐能薄正義曰能材能也能者獸形色似熊足似鹿為物堅中而强力故人之有賢材者皆謂之能也史記招賢招賢獸出摩伽陀國性善不干人形如獅子若國人見賢良相訪則出現獨步獨步獸出良州形如獅子頭尾虎豹文身黄一角行有意氣故名獨步食草木可以辟群魅雙雙山海經云南海之外有三青獸相并名曰雙雙注云言體合為一也公羊傳雙雙而俱至朏朏山海經曰霍山有獸其狀如狸而白尾有鬛名曰朏朏養之可以已憂蛩蛩孔子曰北方有獸其名曰蟨前足䑕後足兎是獸浴子北齊髙昻字敖曹其母張氏始生一男二嵗令婢為湯將浴之婢置而去養􅀈繫解以兒投鼎中􅀈而死張使積薪於村外縳婢及猿焚殺之揚其灰於漳水然後哭之昻性似其母北史十九山公王續遊嵩山月夜見一人胡鬢眉皓而瘦稱山公與績談文異義出於言外繞疑其怪潜開匣取鏡鏡光出而胡者失聲俯伏化為猿而殞異聞集一李約多藏古噐養一猿名山公嘗以之隨逐月夜泛江登金山擊鐵皷琴猿必嘯和傾壼連且不俟外賔約汧公子也因話録守火執㸑魏元忠素强正其㣲時家貧止一婢厨中方㸑出外汲水囘乃見老猿為其守火婢驚白元忠猿執㸑曰猿恐我乏使為我㸑不亦善乎後亦無他廣異傳山猿報時啇山隠士髙大素累徴不起在山中構道院二十餘間太素起居清心亭下皆茂林秀竹奇花異卉每至壹時即有猿一枝詣亭前鞠躬而啼不易其候太素因目之為報時猿天寳遺亊四叟唐王縉讀書嵩山有四叟携榼來相訪自稱木巢南林大節孫文蔚石媚虬髙談劇飲既醉俱化為猿升木而去白猿脂同昌公主疾甚醫者云紅宻白猿脂食之可愈内庫得紅宻數石木兠離國所貢白猿脂數甕本南海所獻杜陽編巴兒叚公路咸通十年徃髙凉程次青山鎮其山多猿有黄緋者絶大毛彩殷鮮真謂奇獸多群行𤣥者善啼啼數聲則衆猿呌嘯騰擲如相呼焉其音凄入䏏脾韻含宫徴方知當一部鼓吹不獨蛙聲矣因召獵者捕而養之名曰巴兒極馴不貪食於樹杪間呼之則至後自潘州囘路厯仙虚聞舊山猿啼不食而卒乃積薪藏坎北户録巴西侯呉郡張􅀈罷秩歸蜀行次巴西㑹日暮有人道左出拜曰吾君巴西候奉邀鋋既能飲酒命樂夜將半鋋假寐將曉悸而窹見身卧石龕中有巨猿醉卧於地宣室志野賔五仁㭲畜一猿號野賔呼之則應後因為患項上係紅絲一縷題詩送之孤雲兩角山有棲宿兑勞青嶂夣躋攀應愜碧雲心之句後入蜀行次嶓冡廟前見群猿飲於清流有巨猿捨群而前於道畔右木之間垂身下顧紅綃髪髴而在從者指之曰此野賔也呼之聲聲相應移時哀呌數聲而去許逺尚聞鳴咽之聲疑其腸斷矣繼作一篇未句云數聲腸斷和雲呌識是前年舊主人王氏見聞鳴哀峽長十百里兩岸連山畧無絶處重巖疊障隱天蔽日自非亭午分夜不見曦月每至晴初霜旦林寒澗肅常有髙猨長嘯屬引清逺漁者歌曰巴東三峽巫峽而徃抵􅠅之人有凶惡而徃依憑之天使其然名曰軍沌一名無耳一名無心空居無常咋尾囘轉向天而笑神異經雅翼引山經帝江為渾敦誤窮奇西北有獸其狀似虎有翼能飛便勦食人知人言語聞人闘輙食直者聞人忠信輙食其鼻聞人惡逆不善輙殺獸往饋之名曰窮奇上封山有獸狀如牛而蝟毛名曰窮奇音如狗嘷是食人西山經窮奇之獸厥形甚醜馳逐妖邪莫不奔走是以一名號曰神狗郭銘文王出獵所獲御覧檮机西方荒中有獸焉其狀如虎而大毛長三尺人面虎足猪口牙尾長一丈八尺攪亂荒中名檮杌一名傲狠一名難訓神異經飬餮鉤吾之山有獸狀如羊身人面其目在腋下虎齒人𤓰其音如嬰兒名曰狍鴞是食人山經左傳所謂饕餮是也像在夏鼎注周鼎著饕餮有首無身食人未咽害及其身以言報更也吕先識骨長數十里西域有沙海正據要津其水熱如湯不可向邇終古未嘗通中國忽一夕有巨獸浮水而至其骨長數十里横於兩涘如津梁然骨中有髓竅可容並馬於是西極之地始通中國其國課往來者每以膏油塗其骨令潤懼其枯朽摧折則無復可通故耳癸辛雜志天中記卷六十
