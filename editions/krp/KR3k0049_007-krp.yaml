body:
  text: 天中記巻七明陳耀文撰地萬物之祖地者元氣所生萬物之祖也地之言施也諦也應施變化審諦不誤敬始重終故謂之地也白虎通含吐應節地者易也言養物懐仁交易變化含吐應節故其立字土力於一者為地元命包右轉地所以右轉者氣濁精少含隂而起遲故轉右迎天佐其道上後定太極初構清濁始分故天先成而地後定抱朴子濁隂積隂為地故地者濁隂也素問方廣地承天故定寜地定寜萬物形地廣厚萬物聚定寜無不載廣厚無不容地勢深厚水泉入聚地道方廣故能乆長文子政本地者政之本也地不均平和調則政不可正也管子萬物之本地者萬物之本原諸生之根苑上經緯牝牡子夏曰啇聞山書曰地東西為緯南北為經山為積德川為積刑高者為生下者為死丘陵為牡谿谷為牝蜯蛤龜珠與日月而盛虗是故堅土之人剛弱土之人柔墟土之人大沙土之人細息土之人羙㘪土之人醜家語天根地者底也底之言着也隂體下著也其神曰祗祗成也育生萬物備成也形有高下氣有剛柔物有巨細味有甘苦鎮之以五嶽積之以丘陵播之以四瀆流之以百川盖氣自然之體也發氣黄泉周伏回轉以生萬物也天之根本也雲雨于是乎出日月星辰于是乎陳霜雪于是乎降形西北高而東南下東西長南北短其盡四海者也炎氣欝蒸景風盪物地之張也秋風蕩生凉氣肅然地之閑也物理論媪神地者其卦曰坤其德曰母其神曰祗亦曰媪大而名之曰黄地祗小而名之曰神州亦名后土上漢書曰惟㤗元尊媪神蕃釐經紀天地作成四時師古曰媪地神也又曰海内安寜興文匽武后土冨媪昭明三光張晏曰媪老母稱也坤為母故稱媪海内安定富媪之助耳人下子貢問孔子曰賜為人下未知所以為人下之道也孔子曰為人下者其猶土乎種之則五穀生焉掘之則甘泉出焉草木植焉禽獸育焉生人立焉死人入焉多其功而不言為人下者其猶土乎説苑人臣猶土夫人臣猶土也萬物載焉而不辭其重水瀆汚焉而不辭其下草木植焉而不有其功杜恕篤論上地凡居地有大利而無小害者此上地也物理論下元下元者地氣也為萬物始生育長養盖藏之主樂聲儀萬物所陳元氣初分輕清為天重濁為地萬物所陳列也徐曰地者迆也迆而高也山嶽丘陵墳衍迆而卑也臯隰汙潢故曰地有二形高下平也説文牧生地之為言嫓也承天行其義也山陵之大非地不制含功以牧生也春秋説題辭仁禽子問天與地孰仁墨子曰翟以地為仁太山之上則封禪焉培塿之側則生松栢下生黍苖莞蒲水生黿鼉龜魚民衣焉食焉家焉死焉地終不責德焉故翟以地為仁墨子地理天有日月星辰謂之文地有山川陵谷謂之理論衡丘陵墳衍普天之下華岳列居河海所流丘陵墳衍緫謂之地聖證論丘陵原隰阪險緫而曰地月令章句地無兩形夫土地者百姓之所蹈也殊無兩形之致矣而談者强謂之異體地云者都大之名土者細属之號國寜有有地無土有土無地之處乎萬機論任萌地順受澤謙虗開張含泉任萌滋物歸中援神契吐物土地之吐生萬物者也二象地之土地之中吐物出形也説文地當隂陽之中能吐生萬物者土書鄭注孔鼂云能吐生百穀謂之土聖證論王四季土所以王四季者何木非土不生火非土不榮金非土不成水非土不高扶㣲助衰歴成其道故五行更生亦曰土白虎通上五行之中央主於四季各十八日金父土者金之父也句吉帝命驗積塊杞人有憂地壊身亡所寄者曉者曰地積塊耳充塞四虚亡處亡塊若躇歩跐蹈終日在地上行止柰何憂其壊刻子積形長廬子曰山岳也河海也金石也火木也此積形之成乎地者也上食本四海之内六合之間曰奚貴曰貴土土食之本也申子常静地道不作是以常静地道常静是以正方上貴貞天道貴信地道貴貞不信不貞萬物不生漢書方貞反騷云正皇天之清則兮度后土之方貞應劭曰平正司法者莫過於天養物均調者莫過於地上方輿束晳補亡詩曰漫漫方輿廽廽洪覆翰曰方輿地也宋玉大言賦曰方地為輿圓天為盖曽子曰天道曰員地道曰方淮南子曰大丈夫以天為葢則無不覆也以地為輿則無不載也方儀盧子諒詩亹亹圓象運悠悠方儀廓注天地曰兩儀故曰方儀也棊局陽動而隂静天廻而地遊地若浮舟方如棊局楊渾天賦骨脉皮毛地以山為之輔佐石為之骨川為之脉草木為其毛土為其肉三尺以上為糞三尺以下為地慱物志太空地厚萬里其下得太空四角下有自然金然金柱輙方圓五千里闗令内傳兩戒唐天文志初貞觀中李淳風撰法象志北戒自積石負終南地絡之隂東及大華踰河並雷首底柱王屋太行北抵常山之右乃東循塞垣至濊貊朝鮮是謂北紀所以限戎狄也南戒自岷山嶓冢負地絡之陽東及太華連啇山熊耳外方桐栢自上洛南逾江漢擕武當荆山至于衡陽乃東循嶺徼達東甌閩中是謂南紀所以限蠻夷也故星傳謂北戒為胡門南戒為越門四㳺地有四㳺冬至地上行北而西三萬里夏至地下行南而東三萬里春秋二分是其中矣地常動移而人不知譬如人在大舟中閉牗而坐舟行不覺也尚書考靈耀四極四荒東至㤗逺西至邠國南至濮鈆北至祝栗謂之四極孤竹北户西王母日下謂之四荒九夷八狄七戎六蠻謂之四海距齊州以南載日為丹穴北載斗極為空同東至日所出為太平西至日所入為太䝉爾雅四方溟渤漲洋此天地之所以限東徼也惡溪沸海此天地之所以阻南徼也䧟河懸度之設乎西潮海沙子之設乎比北天地之所遮西而制北者也激漳霧于東維界黒水于南極泄流沙于西陲决弱水于北滅此天地之所以界四維也路史前紀巻四五沃五沃之土其土冝杏管子五地周禮曰大司徙掌天下地土之圖周知九州之地域廣輸之数辯五地之物生一曰山林動物冝毛植物冝皁物二曰川澤動物冝鱗植物冝膏物三曰丘陵動物冝羽植物冝覈物四曰墳衍動物冝介植物冝筴物五曰原隰動物冝羸植物冝叢物注曰東西為廣南北為輪皁栢栗膏楊桞覈李梅筴王棘叢萑葦之属五土夫地有五土之冝各有高下范子計然分别五土視其高下若田冝黍稷下田冝稻麥丘陵阪險宜種棗栗孝經鄭注六區思𤣥賦上下無常窮六區注六區上下四方也六極天有六極注四方上下六體裴秀武帝時為司空為地圖十八篇制圖之體有六一曰分率以辯廣輪之度二曰凖望以正彼此之體三曰道理以定所由之数四曰高下五曰方邪六曰迂直此三者各因地制冝以校夷險之異以六者參而考之晉書隋宇文愷曰裴秀輿地以二寸為千里六幕禮樂志紛紜六幕浮大海師古曰六幕猶言六合也七表天有五行地有五岳天有七星地有七表天有八氣地有八風天有九道地有九州天有四維地有四凟河圖括地象八區楊雄傳咸營于八區師古曰八區八方也八紘燭六合耀八紘師古曰八紘八方之綱維也八埏封襌書下泝八埏孟康曰埏地之八際也言徳下流於地之八際八荒過秦論并吞八荒師古曰八荒八方荒忽極逺之地也八柱天有九部八紀地有九州八柱東南神州曰晨土正南卭州曰深土西南戎州曰㴞土正南弇州曰开土正中冀州曰白土西南柱州曰肥土北方𤣥州曰成土東北咸州曰隠土正東揚州曰信土崑崙山為柱氣上通天崑崙者地之中也地下有八柱柱廣十萬里有三千六百軸互相牽制名山大川孔穴相通河圖括地象八殥九州之外乃有八寅亦方千里自東北方曰大澤曰無通東方曰大渚曰少海東南方曰具區曰無澤南方曰大夣曰浩澤西南方曰渚資曰丹澤西方曰九區曰泉澤西北方曰大夏曰海澤北方曰大𡨕曰寒澤凡八寅八澤之雲是雨九州淮南子八紘八寅之外乃有八紘亦方千里自東北方曰和丘曰荒土東方曰棘林曰桑野東南方曰大窮曰衆女南方曰都廣曰反户西南方曰焦僥曰炎土西方曰金丘曰沃野西北方曰一目曰沙所北方曰積氷曰委羽凡八紘之氣是出寒暑以合八正必以風雨上八極八紘之外乃有八極自東北方曰方土之山曰蒼門東方曰東極之山曰開明之門東南方曰波母之山曰陽門南方曰南極之山曰暑門西南方曰編駒之山曰白門西方曰西極之山曰閶闔之門西北方曰不周之山曰幽都之門北方曰北極之山曰寒門凡八極之雲是雨天下八門之風是節寒暑八紘八寅八澤之雲以雨九州而和中土上伯昬無人曰夫至人者上闚青天下潜黄泉渾斥八極神氣不變莊子八方司馬相如傳六合之内八方之外師古曰四方四維謂之八方河圖龍文曰鎮星光明八方歸德八聴天有八風噫氣也地有八聽孔竅也九則楚詞曰地方九則何以墳之康回憑怒地何以西南傾注墳分也謂九州之地凡九品禹何以能分别之康回共工也九地凡九地一為沙泥二澤池三沚崖四下田五中田六上田七下山八中山九上山太𤣥經九土登徒子好色賦周覽九土足歴五都思𤣥賦思九土之殊風曹子建責躬詩朱旗所拂九土披攘九壤補亡詩茫茫九壌注九壌九州九域韓詩曰方命厥后奄有九域薛君曰九域九州選注十形夫土地皆有形名而人莫察焉有龜龍體有鱗鳯貌有弓弩勢有斗升象有張舒形有塞閉容有隠真之安有累夘之危有膏腴之利有塉埆之害此十形者氣勢之始終隂陽之所極也物理論方載從上臨下八萬里天以圓覆地以方載考靈耀地户天不足西北地不足東南西北為天門東南為地户天門無上地户無下河圖括地象坤靈坤靈定位川澤攸同澤有所注川有所通後漢楊厥碑舒形地以舒形萬象咸載鉤命决靈静天成於外地定於内天躰於陽故圓以動地體於隂故平以静動以行施静以合化天以陽廻地以隂淳是故天致其禀氣舒光地致其静承施候明天以以順動不失其中則四時順至寒暑不减致生有節故品物用生地以靈静作合承天清化致養四時而後育故品物用成凡至大莫如天至厚莫若地至多莫若水至空莫若土至華莫若木至實莫若金至無莫若火靈憲出雲起雨土無位而道在故太一不興化人主不任部地出雲起雨以合從天下動勞出於地功歸於主元命包不能天不能冬蓮春菊是以聖人不違時地不能洛橘汶貉是以聖人不違俗文始真經黄泉天以不見為𤣥地以不形為𤣥人以心腹為𤣥天奥西北鬰化精也地奥黄泉隠魄榮也人奥思慮含至精也太𤣥經十二分地有十二分王侯之所居也春秋内事得一天得一以清地得一以寜谷得一以盈天無以清將恐裂地無以寜將恐發谷無以盈將恐竭老子九圃洛書曰人皇始出於提地之口九男兄弟相像以别長九州為九囿人皇乃有中州八輔九􅀢淮南子曰神農皇帝剖判大宗竅領天地襲九窽重九􅀢注竅通也領理也襲法也􅀢形也言因九天九地之形法以通理也黃壚淮南子曰女媧功烈上際九天下契黄壚注上與九天接下契至黄壚黄泉下有壚土也又云放乎九天之上蟠乎黄壚之下曹植詩抱罪黄壚方州淮南子曰女媧氏背方州抱圓天注方州地也文子作負方州九州人皇氏分九州神農始立地形甄度四海逺近山川林薮故至東西九十萬里南北八十一萬里春秋命厯序黄帝受命風后受圖割地布九州周公職録黄帝旁行天下方制萬里畫壄分州得百里之國萬區漢地理志圖地形元命苞云神農世怪義生白阜圖地形脉道注怪義白阜母名白阜為神農圖畫地形通水道之脉使不壅塞也任地顓項養材以任地載時以象天北至於幽陵南至於交趾西至於流沙東至於蟠木日月所照莫不砥屬史記益地圖西王母於大荒之國得益地圖慕舜徳逺來獻之書帝照期黄帝在位王母遣使乘白鹿集帝庭授以地圖舜在位遣使獻白玉環反益地圖遂廣黄帝九州為十二州又獻三琯吹之以和八風集仙録息壌洪水㴞天鯀竊帝之息壌以堙洪水山海經㴞滔洪水無所止極伯鯀乃以息石息壌以填洪水開筮息謂子也填物不耗减掘之益多故禹用填洪水以為名凡土有輕重肥瘦色澤氣不同自江而南掘土不過五尺見泉厥無息掘土還填禆補多欠故南中井淺自淮而北土實掘井動經二三丈或再填穴則多於始取重輕不足定以北校秤之也相感志括地圖禹長於地理得括地象圖尭以為司空尚書刑德倣禹觀於河始受圖括地象也圖言治水之意帝王世紀禹歩禹乃使太章歩自東極二億三萬三千五百里七十五歩使堅亥步自北極至于南極二億三萬三千五百里七十五歩淮南子禹迹虞人之箴曰芒芒禹迹畫為九州經啓九道民有寢廟獸有茂草各有攸處左襄四禹治八極之廣東西二億三萬三千里南北二億三萬一千五百里夏禹所治四海内地東西二萬八千里南北二萬六千里括地象九有九圍啇書曰以有九有之師九有以亡啇頌曰奄有九有九有有截毛傳曰九州也又曰式是九圍釋語云謂九州為九圍者盖以九分天下各為九處規圍然故謂之九圍土訓版圖之貳月司㑹掌之土地之圖司書記之天官之屬也形體之法遂人造之地事之圖土訓詔之則地官之職也春卿有小史外史掌其志夏卿有司險職方掌其圖至於邦國土地之圖地域廣輪之数載在司徒維見可睹玉海獻土晉文公過衛衞文公不禮去過五鹿饑而從野人乞食野人盛土器中進之重耳怒趙衰曰土者有土也君其拜受之史記金化蜀王本紀曰蜀王獵於褒谷見秦王以金一笥遺蜀王蜀王報以禮物盡化為土秦王大怒臣以下賀曰土地也今秦當得蜀矣九土楚蒍掩為司馬書土田度山林鳩薮澤辨京陵表淳鹵数疆潦規偃豬町原防牧隰臯井衍沃量入脩賦注量九土之所入左㐮二十五年海外九州鄒衍曰儒者所云中國者於天下乃八十一分居其一分耳中國名曰赤縣神州赤縣神州内自有九州禹之序九州是也不得為州数中國外如赤縣神州者九乃所謂九州也於是有禆海環之人民禽獸莫能相通者如一區中者乃為一州如此者九乃有大瀛海環其外天地之際焉史記崑崙東南方五千里謂之神州中有和羹鄉方三千里五嶽之城帝王之宅聖人所生也王嬰古今通論崑崙東南有亦縣之州風雨有時寒暑有節茍非此土南則多暑北則多寒東則多陽西則多隂故聖人不處焉靈憲幽都土伯䰟兮歸來君無下此幽都些土伯九約其角觺觺些敦脄血拇逐人駓駓些參目虎首其身若牛些招䰟崑崙之東北地轉下三千六百里有八𤣥幽都方二十餘萬里慱物志六合汰沃盧敖㳺乎北海經乎太隂入乎𤣥闕至於蒙榖之上見一士焉深目而𤣥鬚淚注而鳶肩豐上而殺下軒軒然方迎風而舞顧見盧敖慢然下其臂遯迯乎碑盧敖就而視之方捲龜殻而食蛤梨盧敖與之語曰唯敖為背羣離黨窮觀於六合之外者非敖而已乎敖㓜而好㳺至長不渝周行四極唯北隂之未闚今卒睹夫子於是子殆可與敖為友乎若士者齤而笑曰曰嘻子中州之民寜肯而逺至此此猶光乎日月而載列星隂陽之所行四時之所生其比夫不名之地猶􅀢奥也若我南㳺乎岡䆡之野北息乎沉墨之鄉西窮窅㝠之黨東開鴻濛之先此其下無地而上無天聽焉無聞視焉無眗此其外猶有汰沃之汜其餘一舉而千萬里吾猶未能之在今子㳺始於此乃語窮觀豈不亦逺哉然子處矣吾與汗漫期于九垓之外吾不可以乆駐若士舉臂而竦身遂入雲中盧敖仰而視之弗見乃止駕止柸治悖然若有䘮也曰吾比夫子猶黄鵠與蠰蟲也終日行不離咫尺而自以為逺豈不悲哉淮南子論衡淚注作􅂒頸􅀢奥作􅀈􅀈沉墨作沉薶地市驪山始皇陵作地市生死人交易市平不得欺死人云秦王地市有斷馬利三秦記地脉二世遣使殺䝉恬恬喟然太息曰我何罪而死乎良乆曰恬罪固當死矣起臨洮屬之遼東城塹萬餘里此其中不能無絶地脉哉史記八鎮校獵賦戲八鎮而開闗應劭曰四方四隅為八鎮如淳曰不言九者一鎮在中天子居之故也客土永始元年秋七丹詔曰昌陵作治五年尚事加功天下虗耗百姓罷勞客土䟽惡終不可成其罷昌陵服䖍曰取他處土以増高為客土也成帝紀客土無氣唐方伎傳杜生真土成帝時陳湯上封事起昌陵卒不就有司皆議曰昌陵因卑為高積土為山度便房猶在平地土客土之中不保幽冥之靈淺外不固取土東土且與穀同價故陵因天性㨿真土處勢高敞冝還復之陳湯傳四表大漢左東海右渠捜前畨禺後陶塗東南一尉西北一候解謿甘泉賦東燭倉海西燿流沙北爌幽都南煬丹厓師古曰四表也踊長元帝時臨淮徐縣地踊長五六里高二丈山海經記四履秦地則西臨洮北沙漠東縈西帶皆臨大海漢興地東西九千三百二里南北萬三千三百六十八里此漢之極盛也東樂浪西敦煌南日南北鴈門西南永昌四履之盛亦如前漢通典縮地脉費長房遇壺公有神術能縮地脉千里聚在目前放之復如舊神仙傳土神俗間有土公之神云土不可動𤣥有五嵗女孫卒得病詣市卜云犯土云即依方治之病即愈然後知天下有土神矣裴𤣥新言坑掘晉氏南遷郭璞周訪地圖云荆楚舊為王都欲於硤州置之嫌逼山遂止便有冝都之號下至松滋地有靣勢都邑之像乃掘坑稱土嫌其太輕復㵼本坑土又不滿便止曰昔金陵王氣於今不絶固當經三百年矣便都建業宣律師感應記赤如丹祖約府内地忽赤如丹戴洋曰按河圖徴云地赤如丹血丸丸當有下反上者恐胡馬當來飲准水后果石勒騎大至攻城大戰晉書夣吞丸劉敬宣在觧卑夣土丸而服之既而占焉或荅曰此服土吞丸也既覺而喜曰丸者桓也既吞矣我復本土矣旬日中聞桓𤣥敗得來歸晉安帝紀地䧟桓𤣥既篡位後御牀㣲䧟羣臣失色侍中殷仲文進曰當由聖德淵重厚地所以不能載時人善之世説侯景篡位及升御床床脚自䧟南史夣吞梁簡文乆見幽縶謂舍人殷不害曰吾昨夣吞土試思之不害曰昔重耳饋塊卒友晉國陛下所夣將符是乎帝曰儻幽冥有徴兾斯言不妄後王偉彭儁五脩纂進觴于帝帝醉而寢儁進土囊脩纂坐上乃崩竟恊於夣南史食土開元二十八年春二月懐州武德武陟脩武三縣人無故食土云味美異於他先是武德期城村婦人相與採聚而言曰今未貴人饑幸為生活有老父紫衣白馬從十人來過之謂婦人曰何憂無食此渠水傍土甚佳可食女試嘗之婦人取食味頗異遂失老父乃取其土至家伴其麵為餅餅甚美由是逺近競取之渠東西五里南北十餘歩土并盡牛肅時在懐親遇之紀聞地癖李憕豐於産業伊川膏腴水陸上田脩竹茂樹自城及闗口别業相望與吏部侍郎李彭年皆有地癖鄭巖田産亞于憕舊唐穿地姜師度既好溝洫所在必發衆穿鑿雖時有不利而成功亦多先是太史令傳孝忠善占星緯時人為之語曰傳孝忠兩眼看天姜師度一心穿地傳之以為口實舊唐時為語曰孝忠知仰天師度知相地嘲所嗜也新唐王地浮屠泓與張説置永樂東南第一宅有永巷者戒曰此宅西北隅最是王地慎勿於此取土越月泓又至謂悦曰此宅氣候忽然索莫其必恐有取土于西北隅者與説並視果有取土坑三数坑皆深丈餘泓大驚曰禍事令公冨貴一身而已更二十年外諸郎君皆不得天年説懼將乎之泓曰客土無氣與地脉不相連今欲填之猶人有瘡痏補以他肉無益也説子均垍闕禄山委任克復后均賜死垍長流常恃言㫖彈丸劒南自𤣥宗還京後於綿益二州各置一節度百姓劳弊高適因西山三城置戍上三䟽曰平戎以西数城邈在窮山之顛埀于絶險之未運粮于束馬之路坐甲於無人之鄉以戎狄言之不足以利戎狄以國家言之不足以廣土宇柰何以險阻彈丸之地而困全蜀太平之人哉舊唐書地理賈躭好地理學凡四夷之使及使四夷還者必與之從容訊其山川土地之終始是以九州之夷險百蠻之土俗區分指畫備䆒源流上貢土天下貢賦唯長安縣貢土萬年縣貢水南部新書益土建中初魏縣西四十里忽然土長土長四五尺数畆里人駭異之明年魏博田悦反德宗命馬燧等討之朱㴞王武俊帥兵救田悦引軍與王師對壘三年㴞僣稱兾王武俊稱趙王田悦稱魏王悦時壘正當土長之所及僣署告天乃因其長土為壇以祭魏州功曹韋稔為益土頌以媚悦馬燧聞之笑曰田悦異常賊也舊唐厚薄朱朴遷都議曰江南土薄水淺人心囂浮輕巧不可以都河北土厚水深人心疆愎狠戾不可以都惟㐮鄧實惟中原人心質良去秦咫尺而有上洛為之限永無夷狄侵軼之虞此建都之極選也唐書青牛嫗遼太祖皇后述律氏嘗至遼土二河之㑹有女子乘青牛車倉卒避路忽不見未㡬童謠曰青女嫗曽避路盖言謂地祗為青牛嫗云遼史黄金母汾晉村野間語曰欲作千箱主問取黄金母意謂多稼厚畜由耕所致也凊異青銅海汴老圃紀生一鉏庇三年口病篤呼子孫戒曰此二十畆地便是青銅海也起西北崑崙柱天萬脉萬山之脉由起西北綿亘幽寒莫詣為背為項西北近崑崙如人之背項為脊為毳漸逺也下為􅀢臋上為髪際靣居秦雍耳目口鼻秦雍為天下之面分耳目口鼻也幽冀川蜀分左右背懸心闗脑腹埀洛汭胃脘出納為汧為渭大河大江經絡縈衞大腸膀胱震澤壘濟青徐以降是為髖髀泄為尾閭茫洋無際海洲萬國糞滓塵穢張子房赤霆經雌雄中原為雄魁傑竒偉江南為雌淸楚嬌麗言其孕人物然也上沃瘠公父文伯之母曰昔聖王之處民也擇瘠土而處之沃土之民不材淫也瘠土之民莫不嚮義勞也國語生反廣成子曰百昌皆生於土而反于土故余將去汝入無窮之門以㳺無極之野莊子上方下方翼奉封事曰上方之情樂也下方之情哀也孟康曰上方謂北與東也陽氣所萌生故為上下方謂南與西也隂氣所萌生故為下前漢地垠甘泉賦天閫決兮地垠開八荒恊兮萬國諧上地絡振天維衍地絡西京層峯亘天維曠渚綿地絡宋孝武白土隋圖經云常山高邑縣房子城出白土細滑膏潤可以塗餙兼用之濯錦可致鮮潔一名赤石岡酈道元水經云白土細滑如膏可用濯錦色奪霜雪光彩鮮異潔于常錦俗以美談言房子之纊也抑亦蜀中之濯錦江矣嵗貢其錦以充御府魏都賦織纊房子響地邢州尚書房東井地周百餘步其所鳴響人馬行土轟作雷聲掘之即火出郡國志可食雲南臨安府唐黎州也有落容山在府治西南三里其土香美作餅炙熟可食僰婦嗜之雲南志堅土丹徒界内土堅緊如蠟故諺云生東呉死丹徒言呉多産出可以攝生自奉養丹徒地可以􅌾也輿地志瘞薶爾雅曰祭地曰瘞貍孫炎曰瘞者翳也既祭瘞藏也祭法曰瘞埋于泰折吕氏春秋曰天下時地生財不與民謀有年瘞土無年瘞土注有穀祭土報其功也無穀祭土讓其神也六幽典引曰光被六幽蔡邕曰六幽謂上下四方也向曰六幽謂天地四方幽逺之處六漠逺遊曰經營四荒兮周流六漠注六合也楚辭别讓計九州之别壤山陵之大川澤所注菜沮所生鳥獸所聚凡九百一十萬八千二十四頃磽埆不墾者千五百萬二千頃援神契蚤蝨鑿山鑚石則地痛人民多若蚤蝨蚤蝨衆多則地癢也劉向别録夢地地為隂其下𡨕𡨕也夢見地者身安寧夢書地震止殃剪妖文王立國八年寢疾五日而地動東西南北不出國郊百吏皆請曰臣聞地之動為人主也請舉事動衆増國城以移之文王曰不可天之見妖也以罰有罪也請改行重善以移之無幾何疾乃止此文王所以止殃剪妖也吕氏春秋三川震幽王三年西周三川皆震伯陽父曰周將亡矣夫天地之氣不失其序若過其序民之亂也陽伏而不能出隂遁而不能烝於是有地震今三川實震是陽失其所而鎮隂也陽失而在隂川源必塞夫水土演而民用也水土無演民乏財用不亡何待國語句星在房心間景公謂太卜曰子之道何能對曰能動地公以告晏子晏子黙然不對出見太卜曰昔吾見句星在房心之間地其動乎太卜曰然晏子出太卜走往見公曰臣非能動地地固將動也田子陽聞之曰晏子黙然不對者不欲太卜之死往見太卜者恐公之欺也晏子可謂忠於上而惠於下矣晏子春秋晏子曰吾見維星絶樞星散其地動乎説苑維星散句星信則地動有星守三淵地動後志天西河中九星曰鈎星鈎星伸則地動者以水動也辰星赤黄而小則地大動土勝水也鈎鈐者天之管籥鈎鈐折則地動者天之管鑰動也漢上未氏易觧地之將動鈎鈐開鈐即房星上埀二星若磔開則始震盛張則大動漸合則止晉志云西河中九星如鈎狀曰鈎星直則地動地動儀張衡字平子造候風地動儀以精銅鑄成圓徑八寸合盖隆起形似酒樽餙以篆文山龜鳥獸之形中有都柱旁行八道於開機外有八龍首銜銅丸下有蟾蜍張口承之牙機巧制皆在鐏中覆盖周宻無際如地動鐏則震龍機發吐丸而蟾蜍承之振聲激揚因此覺知雖一龍發機而七首不動㝷其方靣乃知震動之所在騐之合契若神自書典所記未之有也曽一龍發機而地不覺動京師學者初咸恠其無徴数日驛至果地動由是皆服其神妙後漢越隂安帝永初元年郡國十八地震李固曰地者隂也法當安静今乃越隂之職專陽之政故應以震動通考失性初平二年地震董卓問蔡邕對曰天為陽故轉運於上地為隂故安静於下今而地震是失其性以隂為陽也明公車不當青盖冝改之以應變卓改為緑盖獻帝春秋邕曰地動隂盛大臣踰制後漢臣象永徽元年晉州地震不息高宗顧謂侍臣曰朕政教不明使晉州之地屢有震動侍中張行成曰天陽也地隂也陽君象隂臣象君冝轉動臣冝安静今晉州地震彌旬不休臣將恐女謁用事大臣隂謀且晉州陛下本封今地屢震尤彰其應伏願深思逺慮以杜其萌帝深然之舊唐隂盈京房易傳曰臣事雖正專必地震其震於水則波於木則摇於屋則瓦落大經在辟而易臣茲謂隂動又曰小人剥廬厥妖山崩茲謂隂乗陽弱勝强劉向曰金木水沴土地所以震春秋災異先書地震日蝕惡隂盈也上風寒盛隂陽太甚作雨日乆不為星變則為地震或大風作而為地震地寒盛則裂風盛則震也玉厯通政經海波薄海水三歲一周流波相薄故地動莊子山土聚太子晉曰古之長民者不墮山不崇薮不防川不竇澤夫山土之聚也薮物之歸也川氣之導也澤水之鍾也夫天地成而聚於高歸物於下䟽為川谷以導其氣陂唐汚痺以鍾其羙是故聚不阤崩而物有所歸氣不沈滯而亦不散越國語含澤布氣春秋説題辭曰山之為言宣也含澤布氣調五神也又云隂含陽故石凝為山含精山者氣之包含所以含精藏雲故觸石而出元命包地基春秋運斗樞曰山者地基也地鎮張晏曰元延中岷山崩山地之鎮冝固而崩所以示人患也翟方進傳註産物山産也言産萬物釋名山宣也宣氣散生萬物有名而高象形也説文緫山山頂曰冡亦曰巔亦曰椒山脊曰岡山大而高曰嵩嵩高稱也今中岳嵩山盖依此亦作崧小而高曰岑鋭而高曰嶠卑而大曰扈小而衆曰巋土大下小曰巘山有草木曰岵無草木曰垓石載土曰岨土載石曰崔嵬此因形而名之山東曰朝陽山西曰夕陽随日照而名之山足曰麓山穴曰岫山邉曰崖崖之高曰巖上秀者曰峯陬隅高者曰岊山坡曰坂山三襲曰陟山再成曰坯山中絶曰陘未及上曰翠微一説山氣青縹色曰翠㣲山屬曰嶧言絡繹相連金魯國有嶧山純石相積搆連屈成山盖謂此也山狹而高曰巒巒山曰墮徒果反謂山形長狹狹者荆州記又謂之巒詩云墮山喬岳土山曰阜阜厚也言其高厚曲阜曰阿大阜曰陵小陵曰丘山精曰䕫亦曰跂亦曰雲陽祭山曰庪説文釋名爾雅㠝岏鋭山也字林岬山脇也淮南注出雲導風仁者何以樂山山者萬物之所瞻仰草木生焉衆物立焉飛禽萃焉走獸休焉寳藏殖焉竒夫息息育羣物而不倦焉四方並取而不限焉出雲導風嵸乎天地之間天地以成國家以寜有似夫仁人志士是仁者所以樂山也説苑孔子曰夫山生材用無私為焉四方皆伐無私與焉出雲雨以通乎天地之間隂陽和合雨露之澤萬物以成百姓以饗此仁者之樂于山也尚書大傅上為星精蟠冡山上為狼星武闗山為地門土為天高星主囹圄荆山為地雌上為軒轅星大别為地理以天合地以通三危山在鳥獸之西南上為天苑星岐山在崑崙東南為地乳上為天糜星汶山之地為井絡帝以㑹昌神以建福土為天井桐栢山為地穴上為維星鳥䑕同穴山地之幹也土為掩畢星熊耳山地門也精上為畢附耳星河圖九山何謂九山會稽㤗山王屋首山㤗華岐山太行羊腸孟門吕氏春秋名山凡天下名山五千三百七十出鉄之山三千六百有九上有丹砂者下有黄金上有磁石者下有銅金上有緑石者下有鉛錫上有赭下有鐡管子山上有葱下有録山上有薤下有金山上有薑下有銅錫山有寳玉木旁枝皆下埀酉陽雜爼五百歲天下名山一開開時金玉之精涌出闗令尹喜内傳入名山必先齋五十日牽白犬抱白鷄以塩一升山神大喜芝草異藥寳玉為出未到山百步呼曰林林央央此山王名知之却百邪地鏡五嶽視三公五嶽者㤗山東嶽也霍山南嶽也華山西嶽也常山北嶽也嵩高山中嶽也五嶽何以視三公能大布雲雨焉能大歛雲雨焉雲觸石而出膚寸而合不崇朝而雨天下施德慱大故視三公也説苑疊崿秀峰西陵峽疊崿秀峰竒構異形難以詞叙林木蕭森離離蔚蔚乃在雲氣之表仰瞩俯映彌習彌流連信宿不覺忘返目所履歴未嘗有也既自欣得此竒觀山水有靈亦當驚知已於千古矣水經造雲兩山壁立崇隆造雲漢武都太守李翕碑竒形異勢袁山松曰夷陵江北多連山登之望江南諸山数十百重莫識其名高者千仞多竒形異勢自非煙褰雨霽不辨見此逺山矣水經欲界仙都陶宏景云高峯入雲清流見㡳夕日欲流沉鱗競躍實是欲界之仙都也隂成水架方丈之西北有隂成大山滄浪之西有陽長大山此二山是陽九百六厯数之標掲也百六之運將至則陽長水竭隂成水架陽九之運將至則隂成水竭陽長水架海録碎事文章嶺九域志青州有文章嶺渠江志有禮義山圖經涪州有錦繡洲丹梯謝𤣥暉敬亭山詩要欲追竒趣即此陵丹梯善田丹梯謂山也眺鼓吹登山曲曰暮春春服羙逰駕陵丹梯升嶠既小魯登巒且悵齊謝靈運登石門最高頂詩共登青雲梯靈嶽荀晞曰淮陽之地北組塗山南枕靈嶽王隠晉書靈山紀地德險峭資岳靈沈休文鍾山詩崇丘瞻彼崇丘其林藹藹補亡詩振策陟崇丘陸士衡赴洛道中詩崇嶽峩峩崇嶽吐符降神郭有道碑羽斾臨崇基鍾山詩隠天楊䧱蜀都賦蒼山隠天岎崯廻叢西都賦其陽則崇山隠天幽林窮谷干雲山則交錯糾紛上干青雲子虗賦干雲非一狀沈林文詩合沓敬亭詩茲山亘百里合沓與雲齊鍾山詩合沓共隠天參差互相望沓嶂丘希範詩鳴鞞響沓嶂太白詩廻崖沓嶂凌蒼蒼爾雅曰山上正曰嶂天阻曹子建朔風詩俯降千仞仰登天阻千仞易陟天阻可越九成長笛賦託九成之孤岑兮臨萬仞之石磎注山海經栢山四成郭璞曰成亦重也言九者数之多也挿漢淯水由分頭嶺南流逕魯陽闗左右連山挿漢秀木干雲是以張景陽詩云朝登魯陽闗峽路峭且深水經峯柱月駕武都南入秦岡山山高入雲逺望増狀若嶺紆曦軒峯柱月駕矣水經注軼雲蔽日四明山高峯軼雲連岫蔽日孔瞱會稽記山峻高以蔽日九章自三峽七百里中兩岸連山畧無闕處重巖疊嶂隠天蔽日自非亭午夜分不見䂀月水經干天入漢故鄣縣東有青山絶壁干天孤峯入漢縁嶂百重青川萬轉信足蕩累頥物悟𠂻散賞吴筠與施從事書争霞限日石門山森壁爭霞孤峯限日幽岫含雲與顧章書空同山黄帝立為天子十九年令行天下聞廣成子在於空同之上故往見之問至道之精莊子汝州臨汝縣廣成坡之西垠有小山曰崆峒即黄帝訪道地廣成子所隠也其顛洞穴如盎將有大風雨則白犬自穴出田夫以為候亦名山曰玉犬峯耆老云若九春三秋天景清麗必有素霧自㞯起湏臾粉堞青㭝彌亘数里樓殿轇轕花木煥爛数息中霧勢漫散不復見矣庸軰不知神仙窟宅以為廣成子化城乃俚談也三水小牘爾雅曰北戴斗極為崆峒其地絶逺華夏之君所不至禹跡之内山名崆峒者有三焉其一在臨洮秦築長城之所起也其一在安定二山高大可取財用彼人亦各於其處為廣成子立廟而莊生述黄帝問道崆峒遂言逰襄城登具茨訪大騩皆與此山接壌則臨洮安定非問道之所明矣汝州刺史盧貞碑黄帝西見中黄子受九品之方過崆峒從廣成子受自然之經抱朴子内篇青城黄帝破山通道遍歴五岳封青城山為五岳丈人乃岳瀆之上司真仙之宗秩一月之内羣岳再朝六時洒泉以代晷漏一名赤城一名青城都一名天國山亦為第五大洞寳仙九室之天對郡之西北在岷山之南羣峯掩映互相連接靈仙所宅祥異甚多玉匱經青城觀北上十餘里有一臺孤聳獨秀霞表名曰軒轅臺下望衆山如螘蛭焉連抱之樹有若薺也此臺非得仙之人不可居之山記岷山連峯接岫千里不絶青城乃第一峯也前號青城峯後名大靣山山有七十二小洞應七十二候有八大洞應八節天倉諸峯屹然三十有六杜光庭記具茨黄帝登具茨之山升於洪隄之上受神芝圖於黄蘆童子陽城記縉雲括蒼縣縉雲山黄帝㳺仙之處有孤石特起高二百丈峯数十或如羊角或似蓮花謂之三天子都有龍鬚草云羣臣攀所墜者郡國志尭山蒲城有堯山亦名浮山舊圖經云昔堯時洪水為災諸山盡没惟此山若浮因以為名桂陽有山盤紆数百里有赭嵓迭起冠以青林與雲霞亂米山上有白石英山下有平陵有大堂基耆舊云堯行宫所水經武夷武夷山者列仙傳籛鏗錬丹之所也籛鏗進雉羹於堯堯封於彭城故謂之彭祖年七百七十七嵗而卒鏗有子二人其一曰武其二曰夷因以名山山志白玉蟾記武夷巖石悉紅覺望若朝霞顧野王謂之地仙之宅建安記羅浮羅浮者盖緫稱焉羅羅山也浮浮山也二山合體謂之羅浮羅山頂有桂所謂賁隅之桂又有天池一鑑周可五里水應海潮是曰神湖浮山者本蓬萊之一峯堯時洪水泛海澌來傳於羅山崖巘皆合至今卉木不同浮山皆海中類也又有平田七畆水旱不及禾稼異常陳郡袁彦伯東筦徐履道皆云蓬萊有三島此其一焉峯嶺秀㧞四百餘里峯巒晻映三十二所峯崛起上披重霄下有深洞幽䆳旁達約数十里山顛飛雲頂又曰聚霞峯常有紫霞在于峯土夜半登之則見日出真誥呼為層城山記洞名朱明耀真之天茅君内傳朱明之陽宫耀真之隂室謝靈運賦洞中常有五百首真人逰㑹開元二十六年奉勑建蘸于花首臺天寳初詔道士申太芝祭山欲㝷朱明洞時邑簿任知宣領耆舊㝷見一洞以藤儋籠石斛埀一人下約五丈餘却出云下視無㡳日月星辰無不傋初有白雲湏㬰散漫五色羅浮異記巫咸山盖巫咸者實以鴻術為帝堯醫生為上公死為貴神豈封斯山而因以名之乎伊巫咸之名山崛孤停而嵥峙配華霍以助鎮致靈潤乎百里郭璞賦九嶷南方蒼梧之丘蒼梧之淵其中有九嶷山舜之所𦵏在長沙零陵界中山海經九嶷山盤基蒼梧之野峯秀数郡之開羅巖九舉各導一浮岫壑負岨異嶺同勢遊者疑焉故曰九疑水經連峯接岫競秀争高含霞巻霧分天隔日荆州記魯妙典入九疑十餘年有神人語之曰此山大舜所理天地之總司九州之宗主也古有高道之士作三處麓床可以棲庇風雨宅形念真集仙録九峯一曰蕭韶二曰女羙三曰石城四曰娥皇五曰朱明六曰桂林七曰華盖八曰巴林九曰石樓周回百餘里圖記君山洞庭之山帝之二女居之山海經君山洞庭之山也帝之二女居之曰湘夫人帝女遣精衛至王母取西山之玉印印東海北山慱物志湘夫人者帝堯女也秦始皇浮江至湘山逢大雨而問慱士湘君何神慱士曰聞之堯二女舜妃也死而𦵏此河圖玉版始皇欲入湘觀衡山而遇風浪溺敗至此山而免因號為君山湘州記湘君所逰故曰君山有神祈之則利渉荆州圖記君山有道與吴包山潜通上有羙酒数斗得飲者不死漢武帝齋七日遣男女数十人至君山得美酒欲飲之東方朔曰識此酒請視之因一飲致盡帝欲殺之朔乃曰殺朔若死此為不騐以其有騐殺亦不死乃赦之慱物志龍冢禹生於石紐起於龍冡江源岷山也有禹廟填許山上廟平八十畆每朔望池自漏繼有水給千口禹所遺弓青城記宛委會稽山南有宛委山其上有石形似簣俗呼為石匱壁立千雲有懸度之險升者累梯然後至焉孔靈符㑹稽山記禹案黄帝中經見聖人所記曰在九疑山東南曰天柱山號宛委承以文玉覆以盤石其書金簡青玉為字編以白銀禹乃東廵衡山殺白馬以祭之見赤繡文衣男子自稱𤣥夷滄水使者謂禹曰欲得我簡書知導水之方者齋於黄帝之岳禹乃齋登石簣山果得其文乃知四瀆之根百川之理鑿龍門通伊闕遂周行天下使伯益記之名為山海經吴越春秋禹開宛委山得赤珪如日碧如月長一尺二寸也開山圖包山禹治洪水至牧德之山見神人焉謂禹曰劳子之形役子之慮以治洪水無乃怠乎禹知其神人再拜請誨神人曰我有靈寳五符以役蛟龍水豹子能傳之不日而就因授禹而誡之曰事畢可秘之于靈山禹成功后乃藏之于洞庭苞山之穴至吴王闔閭之時有龍威丈人得符獻之吴王以示羣臣皆莫能識乃令賫符以問孔子曰吴王閑居有赤烏衘此書以至王所莫辨其文故令逺問孔子曰昔禹治水于牧徳之山遇神人授以靈寳五符后藏于洞庭之苞山君王所得無乃是乎赤烏之事某所未詳使者反白闔閭乃尊事之先是江左童謡云禹治洪水得五符藏之洞庭之苞山湖龍威丈人竊禹書得五書者喪國廬㝷而吴果㓕吴越春秋越絶書甄正論吴王闔閭出逰包山見一人自言姓山名隠居闔閭扣之乃入洞庭取素書一巻呈闔閭其義不可識令人賫之問孔子曰某聞童謡曰吴王出逰觀震湖龍威丈人山隠居北土包山入靈墟乃入洞庭竊禹書天帝大文不可舒此文長傳百六初若强取出喪國廬灵寳要畧砥柱昔禹治洪水山陵當水者鑿之故破山以通河河水分流包山而過山見水中若柱然故曰砥柱也三穿既決水流踈分指狀表目亦謂之三門矣水經㑹稽禹到大越上苖山大㑹計爵有德封有功因而更名苖山曰㑹稽因病死𦵏焉越傳㑹稽之山古防山也亦謂之為茅山又曰棟山越絶云棟猶鎮也盖周禮所謂揚州之鎮矣山形四方上多金玉下多瑛石山下有禹廟廟有聖姑像禮樂緯云禹治水旱天賜神女聖姑即其像也山上有禹冡昔大禹即位十年東廵狩崩于㑹稽因而𦵏之有鳥來為之耘春㧞草根秋啄其穢是以縣官禁民不得妄害此鳥犯則刑無赦山東有硎去廟弋里深不見㡳謂之禹井云東游者多探其穴也水經山有陽明洞一名極𤣥大元之天白玉上經廬山廬山出三天子都一曰天子鄣山海經古名天子三嶂山洞𤣥集古名南障山郡國志武王時方輔先生與李老跨白驢入山煉丹得道仙去惟廬存故名廬山九㣲志輔山即廬山也豫章古今記殷周之際匡俗先生受道於仙人而共逰此山時人謂其所止為仙之廬因名匡廬山慧師山記匡俗字子孝周武王時人生而神靈廬於此山後仙化空廬尚存世稱廬君故號廬山焉周景式山記威烈王以安車迓匡續續僊去惟廬存因命其山為靖廬山邦人以先生姓呼匡山又曰匡阜謝顥廣福觀碑匡俗字君孝父東野王共潯陽令吴芮佐漢定天下而亡漢封俗於潯陽曰越廬君兄弟七人皆好道術遂寓精爽於洞庭之山故世謂之廬山漢武南廵封俗大明公豫章舊志慱物志曹著傳其神自云姓徐受封廬山後吴猛經過山神迎猛猛語曰君王此山近六百年符命已盡不冝乆居非據水經廬山彭澤之山也雖非五嶽之数窮隆嵯峨實峻極之名山也王彪之賦叙潯陽郡南有廬山九江之鎮也臨彭蠡之澤按平敞之原孫放賦山四方周四百餘里疊彰之巖萬仞懐靈抱異苞諸仙迹山圖崇標峻極辰光隔輝幽澗澄深積清百仞阻絶重險非人跡之所逰窈窕冲融常舍霞而貯氣真可謂神明之區域列真之苑囿矣湛方生神仙詩序廬山者江陽之名嶽其大形也背岷流靣彭蠡潘根所據亘数百里重嶺桀嶂仰挿雲日俯瞰川湖之流焉伏㴞逰山序廬山者亦南國之德鎮雖林石異勢而雲霞共色東瞻洪井識曳帛之在兹西望石梁見指寳之可拾梁元帝山碑序其山川明浄風澤清廣氣爽節和土沃民逸嘉遁之士繼響窟巖龍潜鳯采之賢往者忘歸矣秦始皇漢武帝及太史公司馬遷咸升其巖望九江而眺鍾彭焉水經廬山名山靈詠真之天茅君内傳廬山之南有上霄石高壁緬然與霄漢連接秦始皇三十六年嘆斯岳逺遂記為上霄焉上霄之南大禹刻石誌其丈尺里数今猶得刻石之號焉水經峯去平地七千仞上有古迹云是夏禹治水之時泊船之所鑿石為竅以繫䌫焉磨崖為碑皆科斗文字隠隠可見玉堂聞話東南有香鑪山孤峯獨秀起游氣籠其上則氤氲若香煙白雲映其外則炳然與衆峯殊别將雨其下水氣湧出如馬車盖此龍井之所吐慧逺山記西南有石門山兩巖間㣲有門形故以為稱瀑布飛㵼丹翠交矅謝靈運游名山志廬山頂上一池水池中有三石鴈霜落則飛山北有五老峯於廬山最為峻極横隠蒼窮積石巖逈壓彭蠡其形勢如河中虞鄉縣前五老之形故名之潯陽記峯下有李太白書堂三宫僧景衡陽湘鄉人永明中夣廬山之神云廬山惟岳峻極于天是曰三宫壁立萬仞欲屈真人居之又夣受請而行至香爐峯石門頂見銀閣金樓丹泉碧樹希世而有後振錫登峯宛如夣中所見虞羲景法師行狀廣𢎞明集羣玉天子北征東還至于羣玉之山阿平無險四輙中繩先王之所謂策府寡草木而無禽獸天子於是取玉三乗玉器服物載玉萬隻天子休羣玉之山乃命邢侯得攻玉者穆天子傳春山穆王北升于春山之上以望四野曰春山是惟天下之高山也先王所謂𤣥圃百獸之所聚也飛鳥之所接也愛有赤豹白虎烏青鵰執犬羊食豕鹿穆穆王觀子春山之上乃為銘迹于𤣥圃之上以詔後世穆天子傳山海注作鍾山弇山甲子天子賔于西王母乃執白圭𤣥璧以見西王母西王母闕再拜受之乙丑天子觴西王母于瑶池之上西王母為天子謡曰白雲在天山䧙自出道里悠逺山川間之將子無死尚能復來天子荅之曰子歸東上和治諸夏萬民平均吾顧見汝比及三年將復而野天子遂驅升于弇山乃紀丌跡于弇山之石而樹之􅼥眉曰西王母之山穆天子傳注即崦嵫山也禹大傳曰涓盤之水出崦嵫山離騷云望崦嵫而勿迫大形王屋二山方七百里高萬仞北山愚公者年且九十靣山而居懲山北之塞出入之迂也謀平之河曲知叟止之而不得操蛇之神聞之懼其不已也告之於帝帝感其誠命夸蛾氏二子負二山一厝朔東一厝雍南自此冀之南漢之隂無隴斷焉列子天子命駕八駿之乗赤驥之駟造父為御南征翔行逕絶翟道升于太行南濟于河馳驅千里遂入于宗周穆天子傳中黄伯曰余左執太行之優而右摶彫虎唯象之未與吾心試焉有力者則又願為牛欲與象鬬以自試今二三子以為義矣將惡乎試之夫貧窮大行之獶也䟽賤義之彫虎也而曰遇之亦足以試矣尸子太行附路之精圖緯降象武王尅殷欲築宫於五行之山今太行山周公曰不可夫五行之山固塞險阻之地也淮南子王屋本冀州之河陽山也古今地名山狀如垣慱物記王屋山號小有清虚洞天太行折山為佐命中條古鍾為輔翼三十六洞小有為羣洞之尊四十九山王屋為重山之最實不死之靈鄉真人之洞境也仙經王屋山仙之别天所謂陽臺也始得道者皆詣陽臺是清虚之宫也南嶽夫人言明日當詣王屋清虚宫真誥天目老子説云欲度南及避水災天目海陵山是為第一寰宇記天目山極高峻嶺上有泉水甚羙東南有瀑布下注数畆吴興記天目有兩峯峯頂各一池左右相對為天公之左右目元和地志晉郭璞錢唐天目山詩云天目山前兩乳長龍飛鳯舞到錢唐海門一㸃巽峯起五百年間出帝王及高宗中興建邦天目乃主山至度宗甲戌山崩京城騷動時有建遷蹕之議者未幾宋鼎遂移有人作詩云天目山前水齧磯天心地脉露危機西周浸冷觚移月未必遷岐説果非古杭雜記昔有登天目山北遇雨見雲霧在山腰雷似嬰児聲遯齋閑覧天目山有洞三十六每秋必有一月風雨晦暝土俗云是山神與江神㑹也圖經山雖多矣莫若天目之為大其高也凡三萬九千尺仰太虚兮日月低生絶頂兮乾坤窄唐杭都賦元天閼奕之𨽻與殷翼之孫遏士之子三士相與謀致人於造物共之元天之上元天者其高四見列星司馬彪云元天山名荘于顔延年詩元天高北列沙鹿秋八月辛卯沙鹿崩左傳十四年晉史卜之曰隂為陽堆土火相乘故有沙鹿崩後六百四十五年冝有聖女興其齊田乎漢元后傳孔子山黄州東百里有孔子山相傳孔子適楚嘗登山上有坐石草木不侵有硯石每雨墨水浸出城北二十里有小﨑山上有飛來石下有石柱推之者可轉而不仆山川紀異䱉山闔閭出入游卧秋冬治於城中春夏治於城外治姑蘓之臺旦食䱉山晝㳺蘇臺射於鷗陂馳於游臺興樂石城走犬長洲吴越春秋謁泉西河謁泉山一名隠泉山山有石室子夏退居之所随圖經謁泉山俗雨睗雨愆時謁禱是應故山得其名其山石岸地險壁立天固爰有層松餙岩列柏綺望水經虎丘虎丘先名海涌山王珀銘闔廬死𦵏於國西北名虎丘穿土為川積壤為丘發五都之士十萬人共治千里使象摙土冡地四周水深丈餘槨三重傾水銀為池池廣六十歩黄金珠玉為鳬鴈扁諸之劒魚腸三千在焉𦵏之已三日金精上楊為白虎㨿墳故曰虎丘吴越春秋虎丘山絶嵒聳壑茂林深篁為江左丘壑之表吴興太守禇淵昔嘗述職路經吴境淹畱数日登覽不足乃嘆曰今之所稱多過其實今觀虎丘逾于所聞王僧䖍吴地記巨䴡之名山大吴之勝壤顧野土山序三江五湖洞庭巨䴡其中之秀異者實虎丘之靈阜焉沈烱荅張種書吴山杭之吴山吴人憐子胥以諌死立祠其上又名胥止左臨大江右瞰西湖為一郡勝槩郡國志金主亮將南侵乃宻隠畫工於奉使中俾冩臨安湖山以歸為屏而圖已之像策馬于吴山絶頂題詩其上有立馬吴山第一峯之句史記怪山越王欲築城郭范蠡乃觀天文擬法于紫宫築作小城城既成而怪山自生者瑯瑘東武海中山也一夕自來百姓怪之故名怪山吴越春秋水經注云飛來徙此壓殺数百家亦云越王無疆為楚所伐去瑯瑘止東武人随居山下逺望此山其形似龜故亦有龜山之稱也越起靈臺於山上又作三層樓以望雲物川土明秀亦為勝地故王逸少云從山隂道上猶如鏡中行也水經三神山齊威宣燕昭使人入海求蓬萊方丈􅌡洲此三神山者其傳在渤海中去人不逺患且至則船風引而去盖嘗有至者諸僊人及不死之藥皆在焉其物禽獸盡白而黄金銀為宫闕未至望之如雲及到三神山反居水下臨之風輙引去終莫能至云史記渤海之東有大壑中有五山岱輿員嶠方壺􅌡洲蓬萊臺觀皆金玉所居之人皆仙聖之種五山之根無所連著常随潮波上下往來得暫峙仙聖訢于帝帝怒流於西極命禺禺疆使巨鼇十五舉首而戴之五山始峙湯問齊人徐市等上書言海中有三神山名曰蓬萊方丈􅌡洲僊人居之請得齋戒與童男女求之於是遣徐市發童男女数千人入海求僊人秦紀東方朔寳甕銘曰寳雲生于露壇祥風起于月舘望三壺如盈尺視八鴻如榮𢃄三壺海中三山也一曰方壺則方丈也二曰蓬壺則蓬萊也二曰􅌡壺則􅌡洲也此三山形如壺器八鴻者八方之名鴻大也登月舘以望四海三山則如聚米縈𢃄者矣拾遺記蓬萊亦名防丘一名雲來方丈一名巒雉瀛洲亦名魂洲亦名環洲員嶠一名環丘上三峯燕王仙臺東有三峯甚為崇峻騰冠峯高霞翼嶺岫壑冲深合煙罩霧耆舊言燕昭王求仙䖏水經玉笥屈潭之左玉笥山屈平之放棲於此山而作九歌焉甄烈湘中記漢武好仙於玉笥山頂上置降真壇大還丹竈道士晝夜祈禱天感其誠乃降白玉笥置壇上武帝遣使取之至其壇側飄風大震巻玉笥而去因此則為玉笥山焉玉笥山録巫山大巫山非惟三峽所無乃當抗峯岷娥偕領衡疑其附翼羣山並概青雲更就霄漢辨其優劣耳其間首尾一百六十里謂之巫峽盖因山為名也水經楚㐮王與宋玉逰於雲夣之野望朝雲之館有氣焉湏㬰之間變化無窮王問此是何氣玉對曰昔先王逰於高唐怠而晝寢夣見一婦人自云我天帝之季女名曰瑶姫未行而亡封於巫山之臺精䰟為草實為靈芝所謂巫山之女高唐之姫聞王來逰願薦枕席王因幸之去乃言妾在巫山之陽高丘之阻旦為朝雲暮為行雨朝朝暮暮陽臺之下旦以視之果如其言為之立館名曰朝雲宋玉集十二峯曰望霞峯翠屏峯朝雲峯松巒峯集仙峯聚鶴峯净壇峯上昇峯起雲峯飛鳯峯登龍峯聖泉峯武擔武都丈夫化為女子顔色羙絶盖山精也蜀王納以為妃無幾物故王哀念之遣武丁之武都擔土為妃作冡盖地数畆高七丈號曰武擔以石作鏡一枚表其墓其石俗今名為石笋蜀王本紀華陽國志吴山雍州其山鎮曰吴嶽周禮國語謂之西吴古文以為汧山秦都咸陽以為西岳漢地理名一名吴嶽馬融作開山書䟽吴山三峯霞舉秀出雲霄崩巒傾返山頂相捍望之恒有落勢水經秦望㑹稽秦望山為衆峯之傑陟境便見史記云秦始皇登之以望南海自平地以取山頂七巠縣嶝孤危峭路險絶記云扳蘿捫葛然後能升山上無高木當由地逈多風所致山南有嶕峴峴裏有大城越王無餘之舊都也上四明四明名丹山赤水之天上有石窟四穴通日月星辰之光故曰四明秦時驅山塞海鬼神勞役奔入四明洞不出因名鬼藏山其巔五峯絶高形如芙蓉良常秦始皇登句曲北埀嘆曰廵狩之樂莫過於山海自今以往良為常也爾羣臣并稱夀嘆曰良為常矣乃改句容北埀為良常山金陵志大翮居庸縣有大翮小翮山高巒截雲層陵斷霧雙阜共秀兢舉羣峯之上郡人王次仲少有異志年及弱冠變蒼頡舊文為今𨽻書秦始皇時宫務煩多以次仲所易文簡便於事要竒而召之三徴而輙不至次仲履真懐道窮数術之羙始皇怒其不恭令檻車送之次仲行次忽化為大鳥出車外翻飛而去落二翮於斯山故其峯巒有大翮之名矣水經注次仲匿術匿術于秦始落雙翮而冲天陽固北都賦驅山鐸冝春界鍾山有峽数十里其水即冝春江也迴環澄澈深不可測曽有漁人埀釣得一金鎻引之数百尺而獲一鐘又如鐸形漁人舉之有聲如霹靂天晝晦山川震動鍾山一靣崩摧五百餘丈漁人皆沉舟落水其山摧處如削至今存焉或有識者云此即秦始皇驅山之鐸也玉堂間話拒神山牟州有拒神山在州東五里始皇取石為橋此山拒而不去因遂名焉山南四里有黄銀冗續高僧傳八素八素山在武義縣東陽山水記云秦末有八士來隠於此故名五嶺秦北為長城之役南有五嶺之戍漢書五嶺大庾始安臨賀桂陽掲陽廣州記大庾嶺一名塞嶺又曰塞上武帝元鼎四年南越相吕嘉殺漢將韓千秋凾封漢使節置塞上即此嶺也南康記云漢兵擊嘉衆潰有監軍姓庾城是嶺以其姓庾因謂之大庾又以其上多梅而先發亦曰梅嶺海録古人云五嶺者天地以隔内外況綿塗於海衣顧九嶺而彌邈非復行路之逕岨信幽荒之㝠域者矣水經茅山句曲山秦時名為華陽之天三茅君居之因而為名外金山因壇為號矣周時名其源澤為句曲之穴案山形曲折後人名為句曲之山山間有金陵之地四十七八頃是金壇之地肺也居其地必得度世茅君内傳句曲洞天東通林屋北通岱宗西通峨嵋南通羅浮真誥句曲山深曲而有所容故號為句容里史記方山湖熟西北有方山頂正方上有池水輿地志山形方如印故曰方山亦名天印山丹陽記始皇時望氣者云江東有天子氣乃東游以厭之又鑿金陵以斷其勢今方山石硊是其所斷之地也輿地志酉陽小酉山石穴中有書千巻相傳秦人於此而學因留故梁湘東王云訪酉陽之逸典是也荆州記終南荆山中南九州之險也成傳終南一名中南言在天中居都之南也闗中記太一在驪山西山之秀者也一名地胏山可避洪水三秦記孟門終隆之山不能禁注終隆終南淮南子扶風武功縣有太一山古文以為終南漢地理志秦時四皓共入啇雒隠地肺山以待天下定及秦敗漢高聞而徴之不至深自匿終南山不能屈已高士傳盧藏用初隠居之時有貞險之操性來于少室終南二山時人稱為随駕隠士後登朝趑􅂒詭佞專事權貴道士司馬子㣲歸天臺山羣公祖道藏用指終南山曰此中甚有佳處何必天臺子㣲曰以吾觀之此乃仕宦之捷徑爾藏用有慙色舊唐㨿西京賦終南太一隆窟崔崒西征賦靣終南而背雲陽跨平原而連蟠冡九嵕􅏭嶭太一巃嵸則終南太一非一山也元和志盖終南南山之緫名太一一山之别號五經要乂按四皓先隠地胏後匿終南則地胏終南亦非一山矣天階將樂縣天階山下有寳華洞即赤松子採藥之所洞中有石燕石蝙蝠石室石柱并石臼石井俗云其井南通沙縣溪復有乳泉自上而滴人以服之登山頂者若昇碧霄故有天階之號建安記孤雲兩角興元南有路通巴州深谿峭巖捫蘿摸石三日始達于山頂復登措大嶺盖稍平處也其絶頂謂之孤雲兩角彼中諺云孤雲兩角去天一楃淮隂侯廟在焉昔韓信亡去蕭何追及於茲山王仁裕題詩云孤雲不掩興亡策兩角曽懸去住心玉堂間話八公山夀春八公山山無樹木唯重阜耳山上有淮南王劉安廟安折節下士篤好儒學養方術之徒数十人皆為俊異焉多神仙祕法鴻寳之道忽有八公皆鬚眉皓素詣門希見門者曰吾王好長生今先生無住衰之術未敢相聞八公咸變成童王甚敬之八士並能錬金化丹出入無間乃與安登山埋金於地白日升天餘藥在器雞犬䑛之者俱得上昇其所昇之處踐石皆䧟人馬跡存焉故山即以八公為目晉世謝𤣥北禦符堅祈八公山及置陣於肥水之濵堅望上山草木咸為人狀非八公之靈有助盖符氏將亡之感也水經凾山齊郡凾山有鳥足青觜赤黄素翼綘顙名王母使者昔漢武登此山得玉凾長五寸帝下山玉凾忽為白鳥飛去世傳山上有王母藥凾常令鳥守之酉陽雜爼天台天台山者盖山嶽之神秀也渉海則有方丈蓬萊登陸則有四明天臺皆𤣥聖之所逰化靈仙之所窟宅孫綽賦序明帝永平五年剡縣劉晨阮肇共入天臺山度山出一大溪溪邉有二女子姿質妙絶遂晋半年後懐土求歸既出親舊零落邑屋改異無復相識訊問得七世孫幽明録天台山上應台星超然秀出山有八重視之如一㠶高一萬八千丈周廻八百里臨海經天台山去天不逺路楢溪溪水險清冷前有石橋路徑不盈尺長数千丈下臨絶㝠之澗唯忘其身然後能濟濟者梯巖壁捫蘿葛之莖度得平路見天台山蔚然綺秀列雙嶺於青霄上有瓊樓玉閣天堂碧林醴泉仙物華具晉隠士白道猷得過之獲醴泉紫芝靈樂啓蒙記注赤城山天台之南門也瀑布山天台之西南峯水從南巖懸注望之如曵布天台山圖赤城山土色皆赤岩岫連㳫狀似雲霞懸霤十仞謂之瀑布飛流灑散冬夏不竭山谷絶澗峥嶸無㡳長松蔓藟幽藹其上内有天台虚嶽仙室璿臺㑹稽記赤城山亦名燒山名山畧記此山舊名五縣之餘地五縣餘姚鄞句章剡始寜㑹稽記濟楢溪而直進落五界而迅征孫賦天臺山有八桂嶺地理記白石之山望之如雪山有湖傳云金鵝之所集八桂之所植臨海記八桂森挺以凌霜賦天臺山赤城阻其逕瀑布激其衢石有莓苔之險淵有不測之深異苑燕然竇憲與單于戰于稽落山大破之憲遂登燕然山刻石勒功班固作銘曰封神丘兮建隆嵑後漢築山梁冀廣開園囿採土築山十里九坂以象二崤深林絶澗有若自然竒禽馴獸飛走其間後漢祁山漢水北連山秀舉羅峯競峙祁山在蟠冢之西山上有城極為巖固昔諸葛亮攻祁山即此城也開山圖曰漢陽西南有祁山溪徑委迤山高巖嶮九州之名岨天下之竒峻水經鍾山建康東北十里有鍾山舊名金山漢末金陵尉蔣子文討賊戰亡靈發於山因立蔣侯祠焉故號曰蔣山諸葛亮以為鍾山龍盤即蔣山也徐爰釋問畧京師南北並有連領而蔣山獨隆崫峻異其形象龍實楊都之鎮也孫權𦵏山南因山為名號曰孫陵丹陽記蔣山輿地圖謂之鍾山元皇未渡江之年望氣者云蔣山上有紫雲時時晨見庾闡楊都賦注蔣山舊名金陵山因此立名金陵輿地志秦始皇時望氣者云金陵有天子氣埋金玉雜寳於鍾山乃斷其地更名曰秣陵金陵地記大帝祖諱鍾因改名曰蔣山吴録蕭士贇李白金陵歌注云大帝為子文立廟子文祖諱鍾改曰蔣山一統志亦云誤石城石頭城山嶺嶂千里相重若一㳺歴者以為吴之石城猶楚之九疑也山上有城因以為名漢建安十六年吴孫權脩理改名石頭城今清凉寺西是也江乗地記諸葛亮謂吴大帝曰秣陵地形鍾山龍蟠石城虎踞真帝王所都也景陽黄初元年文帝愈崇宫殿雕餙觀閣取白石英及紫石英五色大石於太行穀城之山起景陽山于芳林園樹松竹草木捕禽獸以充其中于時百役繁興帝躬自掘土率羣臣三公以下莫不展力孫盛魏春秋北芒明帝欲平北芒令於其上作臺觀則見孟津辛毗曰天地之性高高下下今而反之既非其理加以損費人功民不堪役且若九河盈溢洪水為害而丘陵皆夷將何以禦之帝乃止魏志北邙山是隴山之尾一名平逢山一名郟山郡國志北山連嶺脩豆四百餘里實古今東洛九原之地也洛陽記南臨洛水北㨿邙山託崇􅀈以為宅因茂林以為䕃應璩與程文信書蘓韶卒見形于蘓節求改𦵏曰吾性愛好京洛每往來出入瞻視邙山樂哉萬世之基也北背孟津洋洋之河南望天邑濟濟之盛王隠晉書太白吉茂蘇則值亂隠於扶風南太白山中以經籍自娱魏畧太白山不知高幾許俗云武功太白去天三百山下軍行不得鳴鼓角鳴鼓角則疾風暴雨兼至也三秦記嵩梁武陵郡嵩梁山高峯孤聳素璧千㝷望之苕亭有似香爐永安六年其山洞開𤣥朗如門高三百丈廣二百丈門角上各生一竹倒埀下拂謂之天箒孫休以為嘉祥分武陵置天門郡水經荆州記隋文帝改曰石門山崑山海塩縣東北二百里有長谷昔陸遜陸凱居此谷東二十里有崑山父祖𦵏焉陸道瞻吴地記陸氏之先𦵏此士衡兄弟生焉時人以玉出崑岡比之故名士衡贈從兄車騎詩所謂婉孌崑山隂也輿地廣記峴山羊祜嘗與從事鄒湛共登峴山埀泣曰自有宇宙便有此山由來賢達勝士登此逺望如我與卿者多矣皆湮滅無聞念此使人悲傷我百年後䰟魄猶當登此山也湛對曰公德冠四海道符前哲令聞令望當與此山俱傳若湛軰乃當如公語耳襄陽耆舊傳沉碑杜預好為後世名常言高岸為谷深谷為陵刻石為二碑紀其勲績一沉萬山之下一立峴山之上曰焉知此後不為陵谷乎晉書時人多使沉碑峴首唐賢往往有之按晉書云云沉碑峴首誤也當為沉碑萬山南部新書五臺五臺山有五巒巍然故曰五臺晉永嘉三年鴈門郡人五百餘家避亂入此山見山中人為先驅因而不返遂寜巖野往還之士稀有望見有村居者至詣㝷訪莫知所在故俗人以為仙者之都矣中臺之山山頂方三里西北􅀈有一泉水不流謂之太華泉盖五臺之層秀仙經云此山名為紫府仙人居之其北臺之山冬夏常氷雪不可居即文殊師利常鎮毒龍之所今多佛寺四方僧徒善信之士多往禮焉水經注内經以為清凉山元和志雲代之間有靈山焉與竺乾鷲嶺角立相望而往山東峯有離岳火球西峯有麗農瑶室南峯有洞光珠樹北峯有玉澗瓊芝中峯有自明之金環光之璧太平廣記太和武當山亦曰太和山亦曰叅山山形特秀又曰仙室晉咸和中歴陽謝乆捨羅邑宰隠遁斯山故亦曰謝羅山水經武當山區域周廻四五百里中央有一峯名四叅嶺高二十餘里望之秀絶出於雲表清朗之日然後見峯一月之問不見四五輕霄盖扵上白雲帶其前旦必西行夕而東返嘗謂之朝山盖以衆山朝揖之生也山記武當山山高巄峻若慱山香爐苕亭峻極于霄出霧學道者常百数相繼不絶若有於此山學者心有隆替輙為獸所逐南雍州記印渚印渚山上承浮溪水從渚以上至縣悉石瀬惡道不可行舡以下水道無險故行旅集焉晉王胡之為吴興太守至渚中歎曰非唯使人心情開滌亦覺日月清朗傳云渚次石文似印因以為名吴興記東山王右軍語劉尹故當共推安石劉尹曰若安石東山志立當與天下共推之世説謝公在東山朝命屢降而不動後出為桓宣武司馬將發新亭朝士咸出瞻送高靈時為中丞亦往相祖先時多少飲酒因倚如醉戯曰卿屢違朝㫖高卧東山諸人每相與言安石不肯出將如蒼生何今亦蒼生將如卿何謝笑而不荅上東永安西永安為安石之東山臨要圖記安石每㳺賞必以女妓自随今山絶頂有謝公調馬路白雲明月二亭遺跡地志後於建康土山營築以擬東山六朝事迹濟勝許詢字𤣥度好逰山水而體便登渉時人云許非徒有勝情實有濟勝之具世説買山支道林因人就深公買印山深公荅曰未聞巢由買山而隠世説遁得深公之言慙悪而已高逸沙門傳競秀顧愷之從會稽還人問山川之羙顧云千巖競秀萬壑争流草木蒙籠其上若雲興霞蔚世説映發會稽境特多名山水峯崿隆峻吐納雲霧松栝楓柏擢榦竦條潭壑鏡徹清流寫注會稽郡記王子敬云從山隂道上行山川自相映發使人應接不暇若秋冬之際尤難為懐世説采藥許邁小名阿映上山采藥經月不返每言映好山林猶魚得水也真誥天姥天姥山與括蒼山相連石壁上有刋字科斗形高不可識春月樵者聞簫鼓笳吹之聲䀨耳元嘉中遣名畫冩狀於圖扇即此山也郡國志瞑投剡中宿明登天姥岑謝靈運與惠連詩東南山水越為首剡為靣沃洲天姥為眉目沃洲禪院記登躡謝靈運尋山陟嶺必造幽峻巖嶂千重莫不備盡登躡常著木履上山則去前齒下山去其後齒宋書神明境嵊山帶山臨江松嶺森蔚與始寜縣嶀山峯嶺相連其間傾澗懐烟泉溪引霧吹畦風馨觸岫延賞是以王元琳謂之神明境事備謝康樂山居記水經東則天台桐栢方石太平二韭四明五奥三菁表神異於緯牒驗感應於慶靈連岡則積嶺以隠嶙舉峯則羣竦以􅏭􅙙山賦觀景陽孝文曽幸華林園因觀故景陽山祚曰山以仁静水以智流願陛下脩之帝曰魏明以舉失於前朕何為襲之於後祚曰高山仰止帝曰得非景行之謂北史山雲陶𢎞景性愛林泉齊高祖問之曰山中何所有𢎞景賦詩以荅之曰山中何有所英英多白雲只可自怡悦不堪持寄君高祖賞之談薮齊無高祖疑梁武也秀山池州秀山峯巒秀麗屹然于雲昭明太子薨其神附于秀山之民曰吾昔愛此今帝賜我矣民為立祠山阿圖經慶山則天時新豐縣東南露臺鄉因大風雨雹震有山踊出高二百尺有池周三頃池中有龍鳯之形禾麥之異則天以為休徴名為慶山荆州人俞文俊詣闕上書曰臣聞天氣不和而寒暑隔人氣不和而疣贅生地氣不和而堆阜出今陛下以女主居陽位反易剛柔故地氣隔塞山變為災陛下以為慶山臣以為非慶也則天怒流于嶺南舊唐志給事中魏叔璘曰地生骨堆何足可慶或以上聞坐賜死兩京道里記山移永昌中華州赤水南岸大山晝日忽風昏有聲隠隠如雷頃之漸移東数百歩擁赤水壓張村民三十餘家山高二百餘丈水深三十丈坡上草木宛然唐志金庭山嵊縣桐栢山上有金庭洞道書以為第二十七洞天下有丹池赤水唐天寳六載改名曰丹池山晏殊類要云越有桐栢之金庭養真之福地輔唐太和先生王旻得道者也常逰名山五岳𤣥宗雅敬信之南岳道者李遐周恐其戀世樂勸旻令出旻乃請于高宻牢山合煉𤣥宗許之因改牢山為輔唐山許旻居之紀聞九華九華山録云峯巒異狀其数有九故號九子李白以九峯如蓮花更號九華劉禹錫云九華山自是天地一尤物陸渾元德秀為魯山令秩滿南㳺陸渾見佳山水杳然有長往之志乃給廬山阿陶陶然遺身物外舊唐徛玕元結天寳中師中行子始在啇於之山稱元子逃難入猗玕之山稱猗玕子或稱浪士漁者乎為聲叟酒徒呼為漫叟及為官呼漫郎國史補九日秦系字公緒天寳末客泉州南安有九日山大松百餘章俗傳東晉時所植系結廬其上姜公輔之謫别駕見系輙窮日不能去築室與相近忘流落之苦卒南安人思之為立小亭號其山為高士峯云唐書買山錢于頔鎮㐮陽匡廬符載山人遣書乞買山錢百萬公遂與之仍加紙墨衣服等雲溪友議造山懿宗末年長安役人取石於苑中造山􅀈危詰曲有若天成又命東終南草木植之山禽野獸縱其往復及造屋室如庶民家帝與嬪妃逰處由是王公貴㳺争效之未及半年竒花異草自然生滿宫殿識者以為丘墟之象後黄巢入京焚焼殆盡悉為瓦礫紀異録錦維王鎔好左道與道士王若訥留㳺西山登王母祠使婦人維錦繡牽持而上逾月忘歸五代史衣錦山臨安石鏡山東峯有圓石徑二尺七寸其光如鑑吴越王錢鏐布衣時嘗照此鏡鏡起而聳戰顧其形服皆冠冕如王者狀寰宇記其後唐昭宗改鏐所居營曰衣錦營又昇衣錦營為衣錦城石鑑山曰衣錦山大官山曰功臣山鏐游錦城宴故老山林皆覆以錦號號其㓜所嘗戯大木曰衣錦將軍五代史金山金山始名浮玉言自玉京諸峯浮而至也道藏經此山大江環繞每風濤四起勢欲浮動故南朝謂之浮玉山唐有裴頭陀于此開山得金因名金山周必大雜志麥積山北跨清渭南漸兩當其半崛起一石塊高百萬㝷望之團圑如民間積麥之狀故有此名其青雲之半峭壁之間鐫石成佛萬龕千室雖自人力疑其鬼工随文分𦵏神尼舍利凾於東閣下傍室之中有庾信記刋于巖中古記云六國共脩自平地積薪至于巖巔從上鐫鑿其龕室佛像功畢旋旋折薪而下然後梯空架險而上其上千房萬屋縁空躡虗登之者不可回顧將及絶頂有萬菩薩堂鑿石而成自此室上更有一龕謂之天堂空中倚一獨梯攀縁而上至此則萬人無一人敢登者於此下顧其羣山皆如培塿王仁裕前唐末年辛未獨能登之題詩于天營西壁上曰躡盡懸空萬仞梯等閑身共白雲齊簷前下視羣山小堂上平分日月低云云玉堂閑話斗山興元有斗山觀自平川内聳起一山四靣懸絶其上方如斗㡳故號之薜蘿松檜景象幽竒上有唐公昉飲李八百仙酒全家㧞宅之跡其宅基三畆許䧟為坑此盖連地而上昇也王仁裕辛巳嵗為節度判官嘗以片板題詩于觀舊説斗山一洞西去二千里通于青城大靣山又與嚴貢觀井相通仁裕癸未年入蜀因入嚴貢觀見斗山詩牌在焉詰之不知所来人皆異之上皖公李家明從元宗遷南都時已失江北十四郡舟楫多行南岸至趙屯因輟樂停觴北望皖公山謂家明曰好青峭数峯不知何名也家明應聲對曰龍舟輕颯錦㠶風正值宸逰望逺空回首皖公山色翠影斜不到夀盃中元宗慙之俛首而過南唐皖山在山天柱峯相連其山三峯鼎峙疊嶂重巒拒雲槩日登渉無由漢地理志山王有舊南漢韶州釋如敏者知來事多異迹初以一苦行為侍者呼曰所由一日随登山脊間却之前令下山廻顧見敏入地焉苦行隠草中伺之乆之乃出迎問曰師焉往平曰吾與山王有舊邀命言話來如是時或亡者乃穴地而出嚴誡之曰所由無宜外説洩吾閑務高僧傳天中宋劉敞云豫州天地之中而汝南又為豫州之中故汝寜北三里有山名天中一名天臺云自古測影植圭莫凖於此鴈宕西成書云第五位尊者諾詎那大羅漢續居震旦南大海際鴈蕩山又云龍湫鴈宕乃吾佛弟子諾詎那尊者之化都也詎那至山中觀瀑遂坐化焉唐貫休詩云鴈宕經行雲漠漠龍湫宴坐雨濛濛宋太宗時永嘉僧全了至荆州至玉泉山遇天竺一神僧謂之曰嘉有諾詎羅者道塲数適當興師冝往訪以成其事了詰其所在曰地以花名山以鳥名中有龍湫宴坐此尊者棲錫地也了遍訪諸山行至海濵見山水清奥因問其村曰芙蓉問其山曰鴈宕了大感悟遂住山結菴於山水要會處曰芙蓉菴即今能仁寺也大芙蓉小芙蓉者鴈山西外谷山名也山志蕩在山之絶頂中多葭葦每深秋鴻鴈來集故名其地險逺至者絶少山下有東西二谷東谷有剪刀峯瀑布泉頗竒大龍湫在其上西谷有長雲峯在馬鞍巖之東展旗石屏天柱玉女卓筆諸峯皆竒崝聳直高挿天半而不沾寸土其北最高且大横十數石石理如湧浪名平霞嶂靈岩寺在諸峯㠝岏中於此獨立西顧心目驚悸清氣砭骨似非人世令人眷戀裴回不忍舍去回視西湖飛來等峯便覺塵俗無餘韻矣平霞嶂西一洞中有石下埀泉涓涓出二竅中名象鼻泉括蒼五岳圖序曰括蒼山東岳之佐命登真隠訣註及吴録云括録山登之俯視雷雨也鵜鶘山鵜鶘山有二峯峻極于天高崖雲峯亢石無階㣪徒䘮其捷巧鼯族窮其輕工及其長霄骨鎮層霞冠峯方乃就辨優劣耳故有大小鵜鶘之名矣水經百梯河東涷水南鹽道山其西則石壁千尋東則􆀸溪萬仞方嶺雲廻竒峯霞舉孤標秀出罩絡羣山之表翠栢䕃峯清泉灌頂郭景純云世所謂鴦漿也發于上而潜於下矣厥頂方平有良藥神農本章曰地有固活女踈銅芸紫菀之族也是以緇服思𤣥之士鹿裘念一之夫代往遊焉路出北巘勢多懸絶來去者咸援蘿騰崟尋葛降深於東則連木乃陟百梯方降巖側縻鎻之跡仍今存焉故亦曰百梯山也土鳯凰山杭州鳯凰山下瞰大江直望海門勢若鳯凰欲飛之狀有石如片雲援地高数丈將巔有一竅已餘名曰月巖惟中秋之月穿数而出十四十六日則外此竅矣餘月尤斜積書巖積石河北有層山山甚靈秀山峯之上立石数百丈亭亭築竪競勢争高逺望叅􅀢若攅圖之記霄上其下層巖峭舉壁岸無階懸巖之中多石室焉室中若有積巻矣而世士罕有津逮者因謂之積書巖巖堂之内每時見神人往還矣盖鴻衣羽裳之士練精餌食之夫耳俗人不悟其仙者乃謂之神鬼彼羗目鬼曰唐述復因名之為唐述山指其堂宻之居謂之唐𫐠窟其懐道宗𤣥之士皮冠净髪之徒亦往棲託焉水經竒山臨沮縣西有青山青溪之源也尋源浮溪竒為深峭盛𢎞之云稠水傍生凌空交合危樓傾岳恒有落勢風泉傳響於青林之下巖􅀈流聲於白雲之上遊者常若目不周翫情不給賞是以林徒栖託雲客宅心泉側多結道士精廬焉上龍門北徐州東南有石門世俗謂之龍門也其山上合下開開處高六丈飛氷歴其間南出乘崖傾瀾泄注七丈有餘渀盪之音竒為壯猛觸石成井水深不測素波白激濤襄四陸闞之者驚神臨之者駭魄矣上朱提􅛳為朱提山羊腸繩屈八十餘里或攀木而升或繩索相牽而上縁陟者若將階天故袁休明巴蜀志云高山嵯峨巖石磊落傾側縈廻下臨峭壑行者扳縁牽援繩索三蜀之人及南中諸郡以為至嶮浮岳始興曲江縣有浮岳山山躡一處則百餘歩動若在水也因名浮岳山水經注高梁山南浦郡高梁山尾東跨江西首劍閣東西数千里嶺長峻其峯崔嵬於蜀市望之若長雲埀天一日行之乃極其頂俯視衆山冺若平原劍閣銘所謂巖巖梁山積石峩峩即述此也江源記石鍾山南康都昌縣有石鐘山西枕彭蠡連峯疊嶂壁立削峻南西北靣皆水四時如一白波撼山其聲若鍾四名之李渤辨山鍾山記云水經云彭蠡之口有石鐘山酈元謂下臨深潭㣲風鼓浪水石相摶響若洪鍾因受其稱予㝷繹東湖躋崖穿洞次于南隅忽遇雙石欹枕潭際影淪波中詢諸水濵乃曰石鍾也有銅鉄之異焉扣而聆之南音凾胡北音清越扣之響騰餘韻徐歇若非澤滋其山山含其英聮氣凝質發為至靈不然則安能産兹竒石乎乃知山仍石名舊矣如善長之論則瀕流庶峯皆可以斯名貫之聊刋前謬留遺將來寰宇記馬當馬當山高八十丈週廻四里在古彭澤縣北其山横枕大江山象馬形廻風急擊波浪涌沸舟船上下多懐憂恐山際立馬當山廟以祠之九江記唐王勃沮風泊舟其下遇老叟助以順風一夕至洪都作滕王閣序陸魯望銘云天下之險者在山曰太行在水曰吕梁合二險而為一吾又聞乎馬當一山四名史記匈奴傳驃騎將軍擊匈奴過居延攻祁連山注西河舊事曰匈奴歌云失我祁連山使我六畜不畨息祁連一名天山亦曰白山也霍去病傳注小顔曰匈奴謂天為祁連明帝紀擊破白山虜于蒲類海上章懐注曰西河舊事云白山冬夏有雪故曰白山匈奴謂之天山過此皆下馬拜又竇固破呼衍王于天山注天山即祁連山一名雪山今名折羅漢山在伊州北祁音時靈鷲山西域耆闍崛此云靈鷲山大論云耆闍石鷲崛名頭是山頂似鷲因名靈鷲觀經䟽云諸聖仙靈因之而住西域記云既棲鷲鳥又類高臺故云鷲峯亦云鷲臺應法師云按𣑽本無靈義此鳥有靈知人死活故號靈鷲波沙云其山三峯如仰鷄足似狼之迹亦名狼迹又云普賢山白墡山仙人山負重山翻譯名義竺法無云胡語羅閲祇國有靈鷲山胡語云耆闍崛山山是青石頭似鷲鳥阿育王使人鑿石假安兩翼兩脚鑿治其身今見存逺望似鷲鳥形故曰靈鷲山也水經始興曲江靈鷲山本名虎郡山亦曰虎市山以虎多暴故也晉義熈中沙門釋僧律葺宇巖阿猛虎逺跡盖律仁感所致因改曰靈鷲山上荆門州靈鷲山有宂曰龍洞深五里石臺甚高春月水聲如鐘皷管䈁聽者忘倦宋熈寜中山泉溢有髹器􅀈車流出誌字曰嘉州盖泉與蜀通也志湏彌西域記云蘓迷盧唐言妙高舊曰湏彌法苑云三千大千世界之中四天下以蘓迷盧山為中因本經云其山四寳合成在大海中㨿金輪上日月之所廻泊諸天之所游舍七山七海環峙環列四靣各有一色東黄金南琉璃西白銀北頗梨随其方靣水同山色毗曇俱舍云妙高七寳所成故名妙出七金山故名高鉄圍四洲地心即是湏彌山山外别有八山其外鹹海廣於無際海外有山即大鉄圍山四周圍輪長阿起世經山名斫伽羅一曰柘伽羅應法師云此翻輪山舊云鉄圍翻譯湏彌為帝釋所居鐡圍為藩墻之城法苑補陀落迦此云海島又云小白花西域記云有咀落迦山南海有石天宫觀自在菩薩㳺舍翻譯山在明州定海昌國東海中約一潮可到佛書稱海岸孤絶處也一名梅岑山或謂梅福煉丹於此因名有善財巖潮音洞乃觀音大士化現之地志䮚迦西域記云僧伽羅國東南隅有䮚迦山巖谷幽峻神鬼㳺舍昔佛於此説䮚迦經舊曰楞迦經訛也翻譯彌樓此云光明七金山也金色光明故俱舍湏彌亦云彌樓法華云内外彌樓山湏彌及鉄圍則非一山鷄足西域記云屈叱播陁唐言鷄足山峻起起三峯慈氏將登此山彈指峰開迦葉授衣火化入㓕四靣忽魯謨斯國有一大山四靣各産一物一靣海邉出塩如紅礬可末而食之不潮濕鑿之一塊有三四百斤者一出紅土如硃一出白土可堊一出黄土色如姜黄其王令人守視各處人貨而用之羸涯勝覧勢羅西域記唐言山鄔波世羅翻為小山山精如人一足長三四尺食山蟹夜出晝藏𤣥中記其得曰蚨一曰超空一曰􅏈一曰飛龍呼其名不敢為害抱朴子天中記卷七
