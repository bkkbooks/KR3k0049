body:
  text: 天中記卷三十一明陳耀文撰尚書省案韋昭辯釋名曰尚上也言最在上總領之也辯云尚猶奉也百官言事當省案平處奉之故曰尚書尚食尚方亦然納言尚書唐虞官也龍作納言詩云惟仲山甫王之喉舌秦改稱尚書漢亦尊此官典機宻也漢官儀漢明帝詔曰尚書蓋古之納言出納朕命機事不宻則害成可不慎歟上唐虞曰納言周官為内史機事所總號令攸發漢官觧詁秦時少府遣吏四人在殿中主發書尚猶主也宋志大麓昔堯試舜於大麓者領録天下事如今之尚書官矣冝得大賢智乃可使處議持平桓譚新論文昌尚書令緫攝諸曹出納王命敷奏萬機蓋政令之所由宣選舉之所由定罪賞之所由正斯乃文昌天府衆務淵藪内外所折𠂻逺近所稟仰百官表陏志通典司㑹天官司㑹中大夫二人周禮㑹大計也司㑹主天下之大計計官之長若今之尚書鄭𤣥注文昌政本司㑹化經陳後主授江搃尚書令冊文三獨坐尚書令主賛奏事揔領紀綱無所不統與司𨽻校尉御史中丞朝㑹皆專席而坐京師號曰三獨坐後漢八座古者重武事貴射御取其㨗御如僕各置一人尚書六人謂之八座叅攝百揆出内王命古元凱之任也謝靈運晉書天興元年置八部大夫於皇城四方四維面置一人以擬八座謂之八國魏官氏志三臺尚書漢因秦置之故尚書為中臺謁者為外臺御史為憲臺謂之三臺唐光宅元年改為文昌臺垂拱元年又改為都臺神龍初復舊為尚書省亦謂之南省明習故事侯霸字君房光武時拜尚書令時無故典朝廷又少舊臣霸明習故事収録遺文條奏前世善政法度有益於時者皆施行之毎春下寛大之詔奉四時之令皆霸所建也後漢天下樞要韋彪字孟逹肅宗時上疏曰夫欲急人所務當先除其所患天下樞要在於尚書尚書之選豈可不重而間者多從郎官超升此位宜簡嘗歴州宰素有名者鍳嗇夫㨗急之對深思絳侯木訥之功也上喉舌陽嘉二年李固對曰陛下之有尚書猶天之有北斗也斗為天喉舌尚書亦為陛下喉舌斗斟酌元氣運平四時尚書出納王命賦政四海權尊執重責之所歸若不平心灾眚必至漢書春秋合誠圖曰天理在斗中司三公也如人喉在咽以理舌語也天有北斗所以斟酌元氣帝有尚書所以出納王命若賦役平均則百姓以安萬機不治則天下以亂漢紀閒舊典太尉李固薦楊淮累世服事臺閣既閑練舊典且有幹用宜在機宻特拜尚書固薨免官尚書令陳蕃表淮行狀復徴為尚書匡弼左雄字伯豪順帝即位虞詡善之曰雄有王臣蹇蹇之節周公謨成王之風宜擢在喉舌之官必有匡弼之益由是拜雄尚書再遷尚書令後書詰孝亷左雄為尚書令奏崇經術郡國耆儒年六十已上為郎不滿四十不得察舉若茂才異行不拘年齒帝從之有廣陵孝亷徐淑年未及舉臺郎疑而詰之對曰詔書曰有如顔子子竒不拘年齒是故本郡以臣充選郎不能詰雄詰之曰昔顔子聞一知十孝亷聞一知幾邪淑不能對乃譴却郡自是牧守莫敢輕舉自雄在尚書天下不敢妄選十餘年間稱為得人上雄為尚書令限年四十九先試經然後舉孝亷故雄為令在位者各肅清時稱曰左伯豪為尚書天下皆慎選舉漢紀韓厥之舉初左雄薦周舉宣光為尚書又舉馮直為將帥而直嘗坐贓受罪舉以此劾雄雄悦曰吾曽事馮直父又與直善今宣光以此奏吾乃韓厥之舉也由是天下服焉後書奏章為故事自雄掌納言多所匡肅毎有奏章臺閤以為故亊上條奏為故事陳忠為尚書令數進忠言辭㫖𢎞麗前後所奏悉條於宫闕以為故事上周歴三臺董卓為司空聞蔡邕名髙辟之稱疾不就卓大怒詈曰我力能族人蔡邕遂偃蹇者不旋踵矣又切𠡠州郡舉邕詣府邕不得已到署祭酒甚見敬重舉髙第補侍御史又轉侍書御史遷尚書三日之間周歴三臺後書才力相懸費褘字文偉代蔣琬為尚書令于時戰國多事公務煩猥褘識悟過人毎省讀書記舉目暫視已究其意㫖其速數倍於人終亦不忘常以朝晡聽事其間接納賔客飲食嬉戯加之博奕毎盡人之歡事亦不廢董允代褘為尚書令欲斆褘之所行旬日之中事多愆滯允乃歎曰人才力相懸若此甚逺此非吾之所及也聽事終日猶有不暇爾三民望尚書令李𦙍遷處缺宜得其人征南將軍羊祐體儀玉立可以整肅朝廷征南將軍衞瓘真正静一中書監荀朂達于事物三人皆民望不審可参舉否山濤啟事總事三者昔六官所掌冡宰為首秦公卿賛以丞相御史為冠今者尚書令總事此三者非臣駑闇所宜忝竊荀朂集總叅機衡武帝詔曰尚書令百揆之首總叅機衡出納朝政治績之所由也車騎將軍賈充忠允清正通理經逺廸文武謨勲𢎞著其以充守尚書令晉起居注九錫命劉頌為尚書孫秀等推崇趙倫功宜加九錫百寮莫敢異議頌獨曰昔漢之錫魏魏之錫晉皆一時之用非可通行今宗廟乂安雖嬖后被退勢臣受誅昔周勃誅諸吕而尊孝文霍光廢昌邑而奉孝宣並無九錫之命亂舊典而習權變非先王之制九錫之議請所無施晉書八座之任蔡謨為尚書上疏曰八座之任非賢莫居前後選用名賢有常孔愉諸葛恢並以清節令才素有名望臣名軰不同階及殊懸今猥以輕鄙超踰等疋上亂聖朝貫魚之次下違羣士凖平之論豈唯㣲臣斯亡之誡實貽聖政維塵之累晉中興書萬事本尚書萬事之本朕所責成也而廩秩儉薄甚非治體今雖軍國多費不為元凱惜禄其依令僕給尚書各親信五十人廪賜晉康帝起居注詔夅奏辝疾卞壼明帝時為尚書令與王導等俱受顧命輔㓜主成帝即位羣臣進壐司徒王導以疾不至壼正色於朝曰王公豈社稷之臣邪大行在殯嗣皇未立寧是人臣辝疾之時專任無敬事寢不行舉朝惮之晉中興書總括百揆謝石為尚書令上疏遜位曰尚書令國之冢司總括百揆憲範王猷式是羣辟故必簡徳而㧞量才而受晉紀王恭嘗寓于司馬道子室尚書令謝石為吳歌恭曰居端石之重集宰相之坐而效流俗之音乎石有慙色語林並受詞訴徐湛之為尚書僕射令何尚之以湛之國戚任遇隆重欲以朝政推之并諸詞訴絶不科省湛之亦以尚書令敷奏出納事無不縂令缺則僕射縂任又以事歸尚之互相推委御史中丞袁淑奏並免官詔特無所問乃使湛之與尚之並受詞訴尚之雖為令而朝事悉歸湛之南史北坐右銘王僧䖍為尚書令嘗為飛白書題尚書省壁曰圓行方止物之定質修之不已則溢髙之不已則慄馳之不已則質𢎞之不已則迭是故去之宜疾當時嗟賞以此坐右銘上百官元本宋孝建元年詔曰尚書百官之元本庶績之樞機丞郎列曹局司有任自頃事無巨細悉歸令僕非所以詔能濟業也更可明體制責厥成也通典奏事自晉以後八座及郎中多不奏事梁天監元年詔曰自禮闈凌替歴茲永久郎署備員無取職戚糠粃文案貴尚虚閒空有趍墀之名子無握蘭之實曹郎可依昔奏事自是始奏事矣又詔尚書中有疑事先於朝堂叅議然後啓聞通典端揆尚書令為端揆之官武德初太宗為秦王時嘗居之其後人臣莫敢當至廣德中郭子儀勲業既盛乃特拜焉子儀以文皇帝故譲不敢受六典通典德望𤣥宗欲以牛仙客為尚書張九齡諫曰不可尚書古之納言有唐以來多用舊相居之不然歴踐内外清貴之地妙選有德望者充之仙客本河湟一使典耳㧞昇清流齒班常伯此官邪也唐新語彈八座尚書左丞彈八座以下居萬機之㑹斯乃皇朝之司直天臺之管轄𫝊咸荅辛曠詩序賀雅賀琛字國寶為尚書左丞竝参禮儀事琛前後居職凡郊廟諸儀多所創定毎見髙祖與語當移晷刻故省中為之語曰上殿不下有賀雅琛容止都雅故時人呼之梁書清正無私劉覧字孝智為尚書左丞性聪敏尚書令史七百人一見並記名姓當官清正無所私姊夫御史中丞禇湮從兄吏部郎孝􅀈在職頗通贓貨覧劾奏並免官孝綽怨之嘗謂人曰犬齧行路覧噬家人上競銀窟郎茂字慰之為尚書左丞時工部尚書宇文愷右翊衞大將軍于仲文競河東銀窟茂奏劾之曰臣聞貴賤殊禮士農異業所以人知局分家識亷耻字文愷位望已隆禄賜優厚㧞葵去織寂爾無聞求利下交曽無愧色于仲文大將宿衛近臣趨侍階庭朝夕聞道虞芮之風抑而不慕分銖之利知而必争何以貽範庶察示民軌物若不紏治將虧政教愷與仲文竟坐得罪的書左轄元夀字長夀為尚書左丞開府蕭摩訶妻患且死奏遣其子向江南収家産御史見而不言夀奏劾之曰人倫之義伉儷為重資愛之道烏鳥弗􅀈摩訶逺念資財近忘匹好又命其子捨危惙之母為聚歛之行一言纔發名教頓盡而侍御史韓徵之等親所聞見竟不紏弹治書侍御史劉本行職攝憲臺虧失憲體臣忝居左轄無容寢勲上方管轄劉洎上疏曰尚書萬機實為政本是以八座比於文昌二丞方於管轄茍非稱職竊位興譏貞觀之初左丞戴胄右丞魏徵並曉達吏方質性平直事應弹舉無所囘避及杜正倫續任右丞頗亦吏下比者綱維不舉並為勲親在位者非其任功勢相傾將救茲弊且宜精簡得人自然綱維畧舉亦當矯正趍競豈惟息其稽滯哉書奏永幾拜洎為尚書右丞肅機隋左右丞掌分尚書諸司糺駮唐因隋制龍朔二年改為左右肅機其年有宇文化及子孫理資䕃朝廷以事隔兩朝且其家親族亦衆多為言者所司之理至于勾留右肅機陽昉未詳其案狀訴者以道理已成無復疑滯勃然逼昉昉曰適朝退未食食畢當詳案訴者曰公云未食亦知天下有累年霸旅訴者乎昉遽命案立批之曰父弑隋主子訴隋資生者猶配逺方死者無宜更叙時人深賞之通典新䓵錦製儀鳯四年韋仁約除尚書左丞約奏曰陛下為官擇人非其人則闕今不惜美錦令臣製之此陛下知臣之深亦㣲臣盡命之秋振舉綱目畧無留事朝廷肅然後分置左右肅政臺復以思謙為右肅政大夫通典舊唐先謁陵廟顔真卿為尚書右丞車駕自陜將還真卿請皇帝先謁五陵九廟而後還宫宰相元載謂真卿曰公所見雖美其如不合事宜何真卿怒前曰用捨在相公耳言者何罪然朝廷之事豈堪相公再破除耶載深銜之舊唐百職綱維勑庾承宣尚書右丞制昔我太宗嘗謂尚書丞百職綱維事一失中則天下有受其弊者因命戴胄魏徵及杜正倫劉洎軰繼領是職分居左右官脩事理人到于今稱之故吾前命崔戎持左綱今命承宣操右轄承宣端諒勤敏周知典故必能為我紐有條之綱柅妄動之輪坐曹得出入郎官立朝得奏弹御史㑹决政要扶樹理本無俾戴魏劉杜專美於貞觀中長慶集名教倚頼韋𢎞景為尚書左丞駮正吏銓所除六十餘官不當進資於是鄭綱丁公著楊嗣復皆奪俸郎吏肅然望風脩整吏部員外郎楊虞卿以累下吏詔𢎞景與御史詳讞虞卿私造門𢎞景厲言曰有詔按公尚私謁邪虞卿多朋助自謂必見納及是惶恐去𢎞景以直道進議論持正有守當時風教所倚頼為長慶名卿唐書𢎞景先為吏部侍郎銓綜平序貴幸惮其嚴不敢慁以私吏部尚書綂均冢宰掌邦治綂百官均四海天官太宰之職掌建邦之六典以佐王治邦國周禮冢大也宰者官也鄭目録濟其清濁和其剛柔而納之中和曰宰于氏宰變冢言太者進退異名也百官緫焉則謂之冢宰列職於王則謂之太宰宰主也建立也邦理王所居之邦國佐猶助也周公居攝而作六典之職以佐王理邦國唐武后遂以吏部為天官户部為地官禮部為春官兵部為夏官刑部為秋官工部為冬官以承周六曹官之制通典唐虞建官法天地四時以分職羲和天地之官也四岳四時之官也夏因虞制甘誓召六卿是也殷大宰至司冦乃周之六官也六官總治閔子騫為費宰問古之為政子曰古之御天下者以六官緫治焉冢宰之官以成道司徒之官以成德宗伯之官以成仁司馬之官以成聖司㓂之官以成義司空之官以成禮六官在手以為轡均仁以為納天子以内史為左右手以六官為轡已而與三公為執六官均五教齊五法故亦唯其所引無不如志以之道則國治以之德則國安以之仁則國和以之聖則國平以之禮則國安以之義則國義此御政之術故官属不理分職不明法政不一百事失紀曰亂亂則飾冢宰地而不殖財物不蕃萬民饑寒教訓不行風俗淫僻人民流散曰危危則飭司徒父子不親長幼失序君臣上下乘離異志曰不和不和則飭宗伯賢能而失官爵功勞而失賞禄士卒疾怨兵弱不用曰不平不平則飭司馬刑罰暴亂姦邪不勝曰不義不義則飭司㓂度量不審舉事夫理都鄙不脩財物失所曰貧貧則飭司空職主隂陽堯命羲和使主隂陽之職羲伯司天即天官也后稷服事虞夏敬授民時尊稷為天官夏衰稷後不窋失官由是廢官殷以其官為冢宰周公在鄷為太宰召公又居之齊職儀建邦理太宰於殷為六太於周為六卿亦曰冢宰周武王時周公始居之掌建邦之理通典貳王周禮六典冢宰貳王而理天下貳謂副貳也一曰理典以理官府二曰教典以化萬姓三曰禮典以諧萬姓四曰政典以均萬姓五曰刑典以紏萬姓六曰事典以生萬姓也仲長統事言求令與尉安定梁鵠善八分書初為吏部尚書太祖求為洛陽令鵠以為北部尉鵠避地荆州太祖定荆州求鵠鵠乞以書贖死乃令書信幡宫門題世語易風俗昔毛玠為吏部尚書無敢好衣美食者魏武歎曰孤之法不如毛尚書今使吏部用心如毛玠風俗之易在不難矣傳咸集表玠雅亮公正在官清恪其典選舉㧞貞實斥華偽進遜行抑阿黨諸宰官治民功績不著而私財豊足者皆免黜停廢乆不選用于時四海翕然莫不勵行至乃長吏還者垢面羸衣常乗柴車軍吏入府朝服徒行人擬壺飡之絜家象濯纓之操貴者無穢欲之累賤者絶姦貨之求吏㓗于上俗移乎下民到于今稱之先賢行狀玠嘗為東曹掾與崔琰並典選舉其所舉用皆清正之士雖於時有盛名而行不由本者終莫得進務以儉率人由是天下之士莫不以亷節自勵魏志天下稱平崔琰清忠髙亮雅識經逺推方直道正色於朝魏氏初載委授銓衡揔齊清議十有餘年文武羣才多所明㧞朝廷歸髙天下稱平先賢行狀畫地作餅盧毓為吏部尚書前此諸葛誕鄧颺等馳名譽有四窓八達之誚帝疾之時舉中書郎詔曰得其人與否在盧生耳選舉莫取有名名如畫地作餅不可啖也毓對曰名不足以致異人而可以得常士常士畏教慕善然後有名非所當疾也毓於人及選舉先舉性行而後言才黄門李豊嘗以問毓毓曰才所以為善也故大才成大善小才成小善今稱之有才而不能為善是才不中器也豊等服其言魏志心精體宻薛綜字敬文為選曹尚書固讓顧譚心精體宻貫道達㣲才照人物德允衆望誠非愚臣所可越先後遂代綜呉志甄録得才李肅字偉恭南陽人少以才聞善論議臧否得中甄竒録異薦達後進題目品藻曲有餘貫衆人以此服之權擢為選曹尚書選舉號為得才歩隲傳吳書二賢王濬冲裴叔則二人惣角詣鍾士季湏㬰去後客問二童是誰曰裴王曰何如鍾曰裴楷清通王戎簡要後二十年此二賢當為吏部尚書爾時天下無復滯才世説官人致化山濤為太常遭母喪年踰耳順居喪過禮負土成墳手植松栢詔曰吾所共致化者官人之職是也方今風俗陵遲人心進動宜崇明好惡鎮以退讓山太常雖尚居諒闇情在難奪方今務殷何得遂其志邪其以濤為吏部尚書晉書各事山濤再居選職十有餘年毎一官缺輒啓擬數人詔㫖有所向然後顯奏隨帝意所欲為先故帝之所用或非舉首衆情不察以濤輕重任意或譛之於帝故帝手詔戒濤曰夫用人惟才不遺疎逺卑賤天下便化矣而濤行之自若一年之後衆情乃寢濤所奏甄㧞人物各為題目時稱山公啓事上舉無失才山司徒前後選殆周遍百官舉無失才凡所題目皆如其言唯用陸亮是詔所用與公意異争之不從亮亦尋為賄敗世説戸調門選王戎為左僕射領吏部戎以晉室方亂慕蘧伯玉之為人與時舒卷無謇諤之節自經典選未嘗進寒素退虚名但與時浮沉戸調門選而已晉書一字正人蔡克素有格量及居選官茍進之徒望風畏憚初克未仕時山簡嘗與琅邪王衍書曰蔡子尼今之正人衍以書示衆曰山子以一字㧞人然未易可稱後衍聞克在選官曰山子正人之言驗於今矣通志無功遺美樂廣為吏部尚書所在為政無當時功譽毎去職遺愛為人所思論人必先引其長屈其所短不明而自顯人有訾過先盡容𢎞恕而後善惡自著值世多難清白自將交無内外任誠保真人莫見其際者是以能自全當世以此多之王隠晉書樂彦輔雍容自守當時恨其寡譽山巨源意在㧞竒不免與世沉浮張纉表人中市井袁貞為監軍范𤣥平作吏部尚書大坐語袁卿此段還不失護軍袁曰卿何事人中作市井語林人倫之職山濤曰臣欲以郄詵為温令詔可尋又啓曰訪聞詵喪母不時葬遂於所居屋後假葬有異同之議請更選之詔曰君為管人倫之職此輩應為清議與不便當裁處之啓事擬崔毛郭撫初為吏部尚書與郎姚範清心虚求搜揚俊乂内外稱之以郭姚擬崔毛崔鴻春秋署紙尾宋廢帝時徵豫章太守蔡廓為吏部尚書廓至因北地𫝊隆以聞傳亮選事若悉以見付不論不然不能拜也亮以語録尚書徐羡之羡之曰黄門郎以下悉以委蔡吾徒不能厝懐自此以上故宜共参同異廓曰我不能為徐干木署紙尾遂不拜干木羡之小子也選案黄紙録尚書與吏部連名故廓言署紙尾也南史方嚴能荷蔡興宗廓之少子也為左户尚書轉掌吏部時上方盛淫宴虐侮羣臣自江夏王義恭以下咸加穢辱唯興宗以方直見憚不被侵媟尚書僕射顔師伯謂儀曹郎王耽之曰蔡尚書常免昵戯去人實逺耽之曰蔡豫章昔在相府亦以方嚴不狎武帝宴私之日未嘗相召毎至官賭常在勝朋蔡尚書今日可謂能荷矣上事異意同少帝即位以蔡廓為吏部尚書不肯拜以王惠代焉惠被召即拜未嘗接客人有與書求官得輒聚閣上及去職印封如初時以廓不拜惠即拜事異而意同也南史令史留宿庾炳之字仲文為吏部尚書為人強急而不耐煩領選既不緝衆論又頗通貨賄吏部令史錢泰能琵琶主客令史周伯齊善歌詣炳之宅諮事因留宿尚書舊制令史諮事不得宿停外雖有八座命亦不許為所司奏免官宋書六代五人光禄大夫謝莊子朏朏子㵸㵸子覧覧弟舉六代五人皆為吏部尚書並有文集梁書覧字景滌朏之弟㵸之子覧弟舉字言楊遷掌吏部尚書舉祖莊宋代再典選至舉又三為此職前代未有也上明贍范雲性機警有識且善属文下筆輙成時人毎疑其宿構為吏部尚書寄任隆重書牘盈案賔客滿門應荅如流無所壅滯官曹文墨發擿若神時人莫不服其明贍梁書止談風月徐勉字修仁遷吏部尚書勉居選官彛倫有序既閒尺牘兼善辭令雖文案填積坐客充滿應對如流手不停筆又該綜百氏皆為避諱常與門人夜集客有虞髙求詹事五官勉正色答云今夕止可談風月不宜及公事故時人咸服其無私上奬擢人倫楊愔字遵彦武定來以望實之美超拜吏部尚書典選二十餘年奬擢人倫以為己任然取士多以言貌時致謗言以為愔之用人似貧士市𤓰取其大者愔聞不屑焉其聦記强識半面不忘毎有所召問或單稱姓或單稱名無有誤者後有選人魯漫漢自言猥賤獨不見識愔曰卿前在元子思坊騎秃尾草驢經見我不下以方趜鄣面我何不識卿漫漢驚服又謂之曰名以定體漫漢果自不虛又令吏唱人名誤以盧土深為琛士深自言愔曰盧郎玉潤所以從玉自尚公主後衣紫羅袍金􅍢大𢃄遇李庶頗以為耻謂曰我此衣服都是内裁既見子將不能無愧北齊東魏以楊愔典選嘗六十人為一甲愔令其自叙訖不省文簿使次第呼之呼誤以慕容為長孫一人而已三國典畧銓衡折𠂻辛術字懐哲遷吏部尚書遷鄴以後大選之職知名者數四互有得失未能盡美文襄少年髙朗所弊者疎袁叔德沈宻謹厚所傷者細楊愔風流辯給取士夫於浮華惟術性尚貞明取士以才以器循名責實新舊参舉管庫必擢門閥不遺考之前後銓衡在術最為折𠂻甚為當時所稱舉北史亷平韋世康為吏部尚書選用平允請託不行後復拜尚書前後十餘年間多所進㧞朝廷稱為亷平嘗因休暇謂子弟曰吾聞功遂身退古人常道今年將耳順志在懸車汝軰以為云何子福嗣荅曰大人澡身浴德名立官成盈滿之戒先哲所重欲追蹤二疎伏奉尊命上選舉為最牛𢎞字里仁為吏部尚書其選舉先德行後文才要在審慎雖致緩滯所有進用竝多稱職吏部侍郎髙孝基鍳賞機晤清慎絶倫然爽俊有餘迹似輕薄時宰多以此疑之唯𢎞深識其貞推心任委隋之選舉於斯為最時論服𢎞識度之逺上宰臣知選魏知古先天二年冬令往東都知吏部尚書事深以為稱職手制曰卿以宰臣往知大選官人之委情寄尤切遂能端本革弊忘私狥公正色而行措心不撓鏡已激則妍􅑦必鍳衡已舉則輕重罔違朕逺聞之益用嘉歎舊唐知古姚崇所引及同列稍輕之出攝吏部尚書知東都選知古憾焉時崇二子在洛通賔客饋遺憑舊請託知古歸悉以聞他日帝召崇曰卿子才乎皆安在崇揣知帝意曰臣二子分司東都其為人多欲而寡慎是必嘗以事干魏知古帝始以崇私其子或為隠㣲以言動之及聞乃大喜問安從得之對曰知古臣所薦也臣子必謂其見德而請之帝於是愛崇不私而薄知古罷為工部尚書唐書資格唐初因隋制以吏部典選主者將親其人覈之吏事始取州縣府寺疑獄課其斷决而觀其能否此判之始焉後日月淹久選人滋多案牘淺近不足為准乃採經籍古義以為問目其後官員不充選人益衆乃徵僻書隠義以試之唯懼選人之能知也道麗者號為髙等拙弱者號為藍羅至今以為故事開元中裴光庭為吏部始循資格以一賢愚遵平轍者喜其循常負材用者受其抑屈宋璟固爭不得唐新語選人非負譴者皆有升無降其庸愚沈滯者皆喜謂之聖書通鑑朱筆㸃頭開元十八年蘇晉為侍郎而侍中裴光庭毎過官應批退者但對衆披簿以朱筆㸃頭而已晉遂傍選院門下㸃頭者更注擬光庭以為侮已不悦唐㑹要初裴光庭與蕭嵩爭權不恊及為吏部奏用循資格并促選限至正月三十日畢其流外行者署亦令門下省之光庭卒後嵩又奏請一切罷之光庭所引進者盡出為外職時有門下主事閻麟之為光庭腹心專知吏部選官毎麟之裁定光庭隨而下筆時人語曰麟之口光庭手太常慱士孫琬將議光庭謚以其用循資格非奬勸之道建議謚為克平人以為希嵩意㫖上聞而特下詔賜謚曰忠獻舊唐頻伸裴均加吏部尚書初均與崔太素俱事中人竇文塲太素嘗晨省文塲入卧内自謂待已至厚徐觀後榻有頻伸者乃均也德宗以均任方鎮欲遂相之諫官李約上疏斥均為文塲養子不可汙台輔乃止唐書負天下神龍初韋巨源為吏部尚書時要官缺執政以次用其親巨源秉筆當除十人楊再思得其一試問餘授皆諸宰相近属再思喟然曰吾等誠負天下巨源曰時當爾耳是時雖賢有德終莫得進士大夫莫不觧體不屈貴門張纉字伯緒大同二年徵為吏部尚書後門寒素一介者皆見引㧞不為貴門屈意人士翕然稱之武帝詔曰纉外氏英華朝中領袖南史立碑天寶十年楊國忠兼吏部尚書故事吏部三銓三注三唱自春及夏才終其事國忠使胥吏於私第暗定官員集百寮於尚書省對注唱一日令畢以誇神速資格差謬無復倫序舊唐明年大選因就第唱補帷女兄弟觀之不問資序短小者道州参軍胡者湖州文學簾中大笑聲徹于外㑹要嘉話其所昵京兆尹鮮于仲通中書舎人竇華侍御史鄭昴諷選人舊唐鄭怤等二十餘人率錢于勤政樓設齋兼為國忠立碑于尚書省南以頌國忠銓綜之能舊唐詔仲通為頌帝為易數字因以黄金識其處唐書所注吏部三銓選人事務鞅掌不能躬親皆委典及令史孔目官為之國忠但押一字猶不可遍㑹要侍郎貳尚書隋煬帝即位於尚書六曹各益侍郎一人以貳尚書之職隋書今之侍郎其置自此始也通典司列少常晉宋以來吏部尚書資位尤重龍朔二年改吏部尚書為司列太常伯侍郎為司列少常伯天寶士一年改為文部通典甄别陸彦師為吏部侍郎隋承周制官無清濁彦師在職凡所任人頗甄别於士庶論者美之隋書知人之鍳髙構字孝基煬帝初為吏部侍郎時為吏部者多以不稱職去官唯構最有能名前後典選之官皆出其下時人以構好劇談頗謂輕薄然其内懐方雅特為吏部尚書牛𢎞所重後以老病觧職𢎞時典選凡將有所擢用輙遣人就第問其可不河東薛道衡才髙當世毎稱構有清鍳所為文筆必先以草呈構而後出之構有所詆訶道衡未嘗不嗟伏所舉杜如晦房𤣥齡其後皆自致公輔論者稱構有知人之鍳上隨到注擬唐武德初因隨舊制以十一月起選至春即停至貞觀二年劉林甫為吏部侍郎以選限促多不空悉遂奏四時聴選隨到注擬當時以為便㑹要時天下初定州府及詔使多有赤牒授官至是停省盡來赴集將萬餘人林甫隨才銓擢咸得其宜時人以林甫典選比隨之髙孝基選舉志辯詰貞觀元年温彦博為吏部郎中知選意在沙汰多所擯抑而退者不伏囂訟盈庭彦博惟騁辯與之相詰終日喧擾頗為識者所嗤上紿欺貞觀八年十一月唐皎除吏部侍郎常引人入銓問何方穏便或云其家在蜀乃注與呉復有云親老先住江南即唱之隴右論者莫測其意有一信都人希河朔因紿云願得江淮即注與河北一尉由是太被選人紿言欺之賜鏡貞觀十七年吏部侍郎髙季輔知選凡所銓綜時稱允愜至十八年於東都獨知選事上賜金鏡一面以表清鍳上越局貞觀二十二年二月文部侍郎盧承慶兼檢校兵部侍郎仍知五品選事承慶辭曰五品選事職在尚書臣今掌之便是越局太宗不許曰朕今信卿卿何不自信也通典彪狼共羊龍朔二年司列少常伯楊思𤣥恃外戚貴待選流多不以禮而排斥之為選者夏侯彪所訟御史中丞郎餘慶彈奏免官時中書令許敬宗曰必知楊吏部之敗或問之對曰一彪一狼共㸔一羊不敗何待㑹要延譽咸亨二年有楊烱王勃盧照鄰駱賔王並以文章見稱吏部侍郎李敬𤣥咸為延譽引以示裴行儉曰才名有之爵禄蓋寡楊應至令長餘並鮮能令終上强記李敬𤣥緫章二年檢校司列少常伯典選累年銓綜有序自永徽以後選人轉多當其任者罕聞稱職及敬𤣥掌選天下稱其能預選者嵗有萬餘人毎於街衢見之莫不知其姓名其被放有訴者即口陳其書判失錯及身負殿累畧無差殊時咸服其强記莫之敢欺舊唐無私證聖元年劉竒為吏部侍郎注張文長司馬鍠為監察御史二人因申屠㻛以謝之竒正色曰舉賢本自無私二君何為見謝上鄧渇𢎞道元年十二月吏部侍郎魏克巳銓綜人畢放長榜遂出得留人名於是衢路喧嘩大為冬集人援引指擿貶為太子中允遂以中書舎人鄧𤣥挺替焉又無藻鍳之目又患消渇選人因號鄧渇上丁王如意元年九月天官郎中李至逺權知侍郎事時有選人姓刁又有王元忠並被放乃宻與令史相知減其㸃畫刁改為丁王改為士擬授官後即添成文字至逺一覧便覺曰今年銓覆萬人看識姓名安有丁士者哉此刁某王某也省内以為神明上平配天后以許子儒為天官侍郎儒不以藻鏡為意其補官悉委令史勾直時謂勾直曰平配後崔𤣥暐為之介然自守絶於請謁為執政者所忌轉文昌左丞選司令史乃設齊自慶武太后聞之復拜為天官侍郎唐書裴馬盧李景雲元年盧從愿為侍郎精心條理大稱平允其有冐名偽選虚増功狀之類皆能擿發其事典選六年頗有聲稱時人曰前有裴馬後有盧李裴即行儉馬謂戴李謂朝隠㑹要布棘防史姜晦為吏部侍郎性聦悟識理體舊制吏曹舍宇悉布棘以防令史為與選人交通及晦領選事盡除之大開銓門示無所禁私引署者晦輙知之召問莫不首伏初朝廷以晦改革前規咸以為不可竟銓綜得所賄賂不行舉朝歎伏唐新語振理風俗馬載為吏部侍郎時考功員外劉思立子憲為河内慰思立今日亡明日選人有索憲闕者載深咨嗟以為名教所不容乃書其無行注冬集朝廷咸曰真銓綜流品之司可謂振理風俗也其人北出選門為衆目所視衆口所謂趦趄失歩上闕待淹滯韋陟為吏部侍郎常病選人冐名接脚竊授闕員既少取士良難正調者被擠偽集者冐進陟剛毅嫉惡風采􅑐正見選人疑其有瑕按聲盤詰無不首伏毎嵗皆䞉得數百員闕以待淹滯常謂所親曰使陟掌銓衡一二年則無人可選矣唐書推其强直韋陟嘗任吏部侍郎有一致仕官叙五品陟判之曰青壇展慶曽不立班朱紱承榮無冝卧時人推其強直政能唐新語無蹊徑李乂字尚貞為吏部侍郎仍知制誥與宋璟等同典選事請謁不行時人語曰李下無蹊徑制敕不便輒駮正貴幸有求官者􅀢宗曰朕非有靳顧李乂不可過耳唐書王崔王丘為吏部侍郎典選累年甚稱平允擢用山隂尉孫逖桃林尉張鏡㣲湖城尉張晉明進士王泠然皆稱一時之秀舊唐崔沔分掌吏部十銓事以清直歴秘書監上時為語曰丘山岌岌連天峻沔水澄澄徹底清分紀四代選部房頴叔拜天官侍郎自其髙祖景伯至頴叔四代咸居選部時論榮之士多附李季卿拜吏部侍郎俄而兼御史大夫奉使河南江淮宣撫振㧞幽滯進用忠亷時人稱之在銓衡數年季卿有宇量性識博達與善人交襟懐豁如其在朝以進賢為務士以此多附之江南典選興元初劉滋為吏部侍郎往洪州知選事時京師冦盗之後天下蝗旱糓翔貴選人不能赴價調乃命滋江南典選以便江嶺之人時稱舉職貳職太和四年吏部奏吏部為文昌首曹侍郎為尚書貳職銓庭所宜順序㕔事故有等衰㑹要郎中郎位太㣲五星五帝坐後聚十五星曰哀烏郎位漢書一十五星蔚然曰郎位史記郎位五星在太㣲中帝坐東北周之元士漢之光禄中散諫議議郎此三署郎中是今之尚書郎占欲其大小均耀光潤有之吉也正義一曰依烏郎府也晉書下大夫周官太宰属官有下大夫蓋郎中之任也秦有郎中以其為郎侍衞居中故曰郎中漢選尚書郎初從三署郎次補之初入尚書䑓稱郎中滿嵗稱侍郎故郎中之名猶因三署舊號也六典稱號不同漢魏以來尚書属或有侍郎或有郎中或曰尚書郎或曰某曹郎或則兩置或為互名雖稱號不同其職一也皆今郎中之任通典握蘭明光殿省中皆以胡粉塗壁畵古賢烈女以丹朱漆地故謂之丹墀尚書郎握蘭含鷄舌香以其奏事荅對欲使氣息芬芳也奏事則與黄門侍郎對揖黄門侍郎稱已聞乃出丞郎月賜赤管大筆一雙隃麋墨一丸六典通典隃麋今泝陽縣出墨不聼所私趙戬字叔茂長陵人也質而好學言稱詩書愛恤於人不論疎宻辟公府入為尚書選部郎董卓欲以所私並充䑓閣戬拒不聼卓怒召戬欲殺之觀者皆為戬懼而戬自若及見卓引辭正色陳說是非卓雖㓙戾而謝之典畧明雅山濤為吏部郎文帝與書曰足下蒞事明雅邁時念多所乏今致錢二十萬絲百斤糓二百斛晉書正人人才既自難知中人已下情偽又難吏部郎以碎事日夜相接非但當正已而已乃當能正人議郎杜黙德履亦佳太子庶子崔諒中郎陳淮皆有意正人其次不審有可用者不山濤啓事吏部郎主選舉宜得能整風俗理人倫者通典真素寡欲阮咸為吏部郎史曜出處缺當選山濤薦阮咸曰真素寡欲深清濁萬物不能移也昔在官人之職必妙絶於時詔用陸亮山濤啟事佳吏部徐寧字安期通朗有德素少知名初為輿縣令時廷尉桓彛稱有人倫鍳識護軍庾亮毎属之訪一佳吏部郎彛嘗去職至廣陵尋親舊還遇風停浦中累日憂悒因上岸見一室宇有似廨署彛訪之云輿縣廨也令姓徐名寧彛既獨行思逢悟賞聊造之寧清惠博渉相遇怡然遂停宿因留數夕與寧結交而别至都謂庾亮曰吾為卿得一佳吏部郎矣亮問所在彛曰人所應有而不必有人所應無而不必無徐寧真海岱清士即遷吏部郎左將軍江州刺史本傳晉傳世說本事褰惟王藴字叔仁為吏部郎欲使時無屈滯曽下鼓急出日迭乃至家去䑓數里髙褰車帷先後與語不得進也一官缺求者十軰時簡文帝為㑹稽王輔政藴輒連状白之曰某人有地某人有才務存進達各隨其方不得者甘心無怨列𫝊本𫝊夷曠似玉吏部郎中温畿字元甫世論以其為人夷曠似玉永嘉官名名士阮放與從弟孚齊名為吏部郎銓官之任甚有稱譽性清約不理産業為郎不免飢乏王導庾亮以其名士供給衣食放由是得仕晉中興書送吏部郎何尚之字彦德以操立見稱為陳郡謝混所知與之㳺處為吏部郎告休定省傾朝送别於治渚及至郡父叔度謂曰聞汝來此傾朝相送可有幾客荅曰殆數百人叔度笑曰此是送吏部郎耳非關何彦德也昔殷浩亦嘗作豫章定省送别者甚衆及廢徙東陽舩泊征虜亭積日乃至親舊無復相窺者南史與書辭舉王㣲字景𤣥吏部尚書江湛舉㣲為吏部郎㣲與湛書曰君平生云揚我名者殺我身天爵且猶㓕名安用吏部郎哉其舉何陋其事不經非獨縉紳者不道僕妾皆笑之宋書任巳獨行陸慧曉字叔明清介正立不雜交㳺㑹稽内史同郡張珪稱之曰江東裴樂也齊髙帝輔政除為尚書殿中郎鄰族來相賀慧曉舉酒曰陸慧曉年踰三十婦父領選始作尚書郎卿輩乃復以為慶邪遷吏部郎尚書令王晏選門生補内外要局慧曉為用數人而止晏恨之送女妓一人欲與申好慧曉不納吏曹郎令史歴政來諮執選事任巳獨行未嘗與語帝遣主書單景儁謂曰都令史諳悉舊貫可共叅懐慧曉謂景儁曰六十之年不復能諮都令史為吏部郎也上若謂身不堪便當拂衣而退帝甚憚之後欲用為侍中以形短小乃止南史江漢崇望庾果之字景行㓜有孝行宋司空劉勔見而竒之謂曰見卿足使江漢崇望把梓發聲遷吏部郎叅大選上庭植嘉樹梁顧憲之字士思為吏部郎初其祖凱之嘗為吏部於庭植嘉樹謂人曰吾為憲之種耳至是憲之果為此官然自過江吏部郎不復典大選通典才望兼允孝文在洛欲創革舊制選置百官謂羣臣曰與朕舉一吏部郎必使才望兼允者給卿三日假又一日孝文曰朕已得之不煩卿輩也驛徵亮兼吏部郎孝明親政仍兼吏部郎亮自叅選事垂將十年亷慎明决為尚書郭祚所委毎云非崔郎中選事不辦北史欣得宋繇字體業沮渠蒙遜平酒泉於繇室得書數千卷塩米十斛而已蒙遜歎曰孤不喜尅李歆欣得宋繇耳拜尚書吏部郎中委以銓衡之任後魏書鬻官定價皇甫瑒光兄椿齡子也位吏部郎性貪婪多所受納鬻賣吏官皆有定價後以丞相髙陽王雍之婿為豫州刺史為政殘暴百姓患之北史齊裴叔業之歸魏也衣冠之士預叔業勲者安定皇甫光者地梁祐清河崔髙客天水閻慶㣧河東桞僧習等魏書此見本𫝊北史同杜氏通典乃以為韋瑋蓋見傳中有伯昕名而誤耳御覧因之以為韋瑋職官分紀亦以為瑒俱誤銓衡庶品銓衡庶品歴選賔僚阮咸直素屡薦未登陸亮忠心裁居敗職自非李重清識李毅恬正何以區分管庫式鍳胥吏陸杜拜吏部郎表設長名榜吏部郎中裴行儉始設長名榜列銓注期限等法又定州縣升降官資髙下以為故事長名榜自此始也選舉志先捧紫泥桞公綽字起之武元衡罷相鎮西蜀與裴度俱為元衡判官尤相善先度入為吏部郎度以詩餞别有兩人同日事征西今日君先捧紫泥之句分紀登第集部李建為吏部郎中常曰方今秀茂皆在進士使僕得志當令登第之嵗集於吏部使尉緊縣既罷復集稍尉望縣既罷乃尉畿縣而升於朝大凡中人三十成名四十乃至清列遲速為宜既登第遂食禄既食禄必登朝誰不欲也無淹翔以守常限無紛競以來奔捷下曹得其循舉上位得其更歴就而言之其利甚博議者多之國史補掄選有序吳王潜吳國建遷左司郎中典選事時喪亂之後官失其守譜諜靡散甲簿湮没真偽相蒙潜雍容欵接坐客常滿隨才而接人人自以為得徐知誥相吳掄選有序潜之力也或亡失官諜才無可用者多稟給之九國志風稜劉鼎清泰中為吏部郎中亷侍御史知雜事鼎性若寛易而典選曹按吏有風稜五代史員外郎省眼吏部郎二㕔先小銓次格式員外郎二㕔先南曹次廢置舊説吏部為省眼分紀吏事第一裴遵度遷吏部員外郎專判南曹天寶中海内無事九流輻凑㑹府毎嵗吏部選人盈萬遵度敏識強記精覈文贍詳而不滯時稱吏事第一由是大知名判析有條李栖筠遷吏部員外郎判南曹栖筠判析有條奸吏氣奪號為神明唐書南宫眉目韋陟字啇衡為吏部員外郎是曹在南宫為眉目在選士為司命公執直筆閲簿書紛拏盤錯一瞬而剖劉禹錫撰神道碑銓叙稱美崔郾姿質秀偉神清重雅人望而愛之為吏部員外郎奸吏不敢孤寒無㧞者不至留滯銓叙之美為時所稱唐書材幹無累岑羲長安中為廣武令有能名則天嘗令宰相各舉堪為員外郎者鳯閣侍郎韋嗣立薦羲且奏曰恨其從父長倩犯逆為累則天曰茍有材幹何恨㣲累遂拜天官員外郎後遷吏部侍郎時吏部侍郎崔湜太常少卿鄭愔大理少卿李允恭分掌選事皆以贓貨聞羲最守正時議美之舊唐尚氣賈言忠曽之父也累轉吏部員外郎李敬𤣥兼尚書言忠尚氣及主選不能下貶邵州司馬失武懿宗意下獄幾死唐書滌除宿弊劉崇望字希從轉吏部員外郎崔安潜為吏部尚書崇望判南曹滌除宿弊復清選部舊唐喻遣李逈秀任考功員外郎知貢舉有進士姓崔者文筆非佳逈秀覧之良久謂曰清河崔郎儀貎不惡鬚眉如㦸精彩甚髙出身處何量必湏進士再三喻而遣之聞者莫不大噱唐書典舉得士席豫開元中累官主考功員外郎典舉二年大稱得士為時所稱入為吏部侍郎𤣥宗謂之曰卿已前為考功職事平允故有此授預典選六年復有令譽願無權周墀輔政以韋澳為考功員外郎墀初作相私謂澳曰才小任重何以相救澳曰荷公重知願公無權足矣墀愕然不喻其指澳曰爵賞刑罰非公共欲行者願不以喜怒憎愛行之但令百司羣官各舉其職則公歛袵於廟堂之上天下自理何要權耶墀深然之上不避權幸李渤穆宗即位召為考功員外郎校定京官考不避權幸皆行陞黜奏曰三品官考先具如前其四品以下官績具聞奏狀入留中不下議者以宰輔曠官自宜上疏論列而越職釣竒非盡事君之道也上户部尚書地官户部尚書周之地官卿也周禮曰地官司徒帥其属而掌邦教以佐王安擾邦國應劭云徒衆也司徒主人衆也張鷟云虞書五教實委司徒之班周禮六卿爰開地官之位祝鳩郯子曰祝鳩氏司徒也昭十七百姓不親五品不遜則責司徒尚書太𫝊素王司徒仲尼為素王顔淵為司徒論語摘輔相銅臭靈帝賣官廷尉崔烈入錢五百貫以買司徒烈子均字孔乎亦有時名烈問曰吾作公天下人謂何如對曰大人少有髙名不謂不當為公今登其位海内嫌其銅臭烈舉杖擊之均走烈曰子授父撾而走可謂孝乎均曰舜之事父小杖則受大杖而走不䧟父於不義烈曰爾以吾為瞽瞍耶司馬彪九州春秋階下讀奏吳孫休初即位户部尚書階下讀奏通典備物濟時當陽侯杜元凱為度支尚書内以利民外以救邉備物置用以濟當時之益者五十餘條晉書度支要總咸寧五年詔一拜不収使公私俱貴不惟天時乃人事有不盡故也要總者正在度支尚書也其以散騎常侍中書令張華為度支尚書晉起居注量計運漕初帝與羊祐謀伐吳而羣臣多以為不可唯華賛成其䇿及將大舉以華為度支尚書乃量計運漕決定廟筭及吳㓕詔褒其勲進封為廣武縣侯晉書坐無氊席吳隠之為度支尚書以竹蓬為屏風坐無氊席後遷中領軍清儉不改毎月所得禄才留身糧餘悉分賑親族家人績紡以供朝夕時有困絶或并日而食身布衣不完妻子不沾寸禄上示有朝章到溉字茂灌為左民尚書溉長八尺眉目如㸃白晢美鬚髯舉動風華善於應荅所莅以清白自脩性又率儉不好聲色虗室單牀傍無姬侍自外車服不事鮮華冠履十年一易朝服或至穿補𫝊呼清路示有朝章而已南史到洽為御史中丞兄溉為左民尚書舊制中丞不得入尚書下舎洽引服親不應有礙刺省評决左丞蕭子雲議許入溉省亦以其兄弟素篤不能相别也上到溉到洽梁書自有傳南史見到彦之傳分紀錯書作劉溉而事文合璧俱因之豈以到姓稍異遂承其誤耶殊誤觀者白衣何𦙍為左民尚書後辭官隠於若耶山雲門寺𠡠給白衣尚書禄𦙍固辭梁書拜官令早蔡景歴字茂世入守度支尚書舊式拜官在午後景歴拜日適逢輿駕幸𤣥武觀在位皆侍宴宣帝恐景歴不預特令早拜其見重如此南史義倉長孫平字處均拜度支尚書平見天下州縣多罹水旱百姓不給奏令民間毎秋家出粟麥一石已下貧冨差等儲之閭巷以備凶年名曰義倉自是州里豊衍民多頼焉隋書民部開皇三年改度支為民部國家修隋志謂之户部蓋以廟諱故也唐永徽初復改民部為户部廟諱故也顯慶元年改户部為度支龍朔二年改度支尚書為司元太常伯初户部居禮部之後武太后改置天地四時之官以户部為地官由是遂禮部前通典通典云國家杜祐為唐言也通考因之不改何耶正身奉法鄭善果檢校大理卿兼民部尚書正身奉法甚有善績制與裴寂等十人毎奏事及侍立並令升殿與從兄元璹在其數時以為榮分紀内相王琚佐明皇平内難為户部尚書帝於琚眷委特異豫大政事號内宰相本𫝊凶官畢構遷戸部尚書開元四年遇疾上手疏方以賜之時議戸部尚書為凶官遽改授太子詹事兾有瘉瘳尋卒分紀版使韋燠辭判戸部歸謂甥姪曰已讓版使矣佳話録侍郎司元少常周官小司徒中大夫之任也隋煬帝始置民部侍郎唐因之後改為户部龍朔二年改為司元少常伯通典問歴代戸口盧承慶思道孫也美風儀有才幹太宗竒其明辨累拜民部侍郎太宗嘗問歴代户口多少之數承慶叙夏殷以後迄于周隋皆有依據太宗嗟賞久之舊唐精擇開元十三年户部侍郎楊瑒白知慎坐支度失所皆出為刺史上令宰臣及公卿已下精擇堪為戸部者多有薦元紘者將授以戸部尚書時執政以其資淺未宜超授加中大夫拜戸部侍郎元紘因條奏人間利害及時政得失以奏之上大悦因賜衣絹上議戸版楊瑒為户部侍郎帝嘗召宰相大臣議天下戸版延英殿瑒言利病尤詳帝咨賞於是宇文融建檢脱戸餘口瑒執不便融方貴公卿啽黙唯唯獨瑒抗議故出為華州刺史唐書無進獻李綘為戸部侍郎判本司事嘗因次對憲宗曰戸部北有進獻至卿獨無何也對曰將户部錢獻入内藏是用物以結私恩上聳然益嘉其直舊唐不受賂牛僧孺拜戸部侍郎初韓𢎞入朝以宣武舊事人多流言其子公武以家財厚賂權幸及多言者班列之中悉受其遺俄而父子俱卒孤孫幼小穆宗恐為厮養竊盗乃命中使至其家閲其宅簿以付家老而簿上具有納賂之所唯於僧孺官側朱書曰某月日送牛侍郎物若干不受却付訖穆宗按簿甚悦居無何議命相帝首可僧孺之名上自稱老奴張平叔長慶中為戸部侍郎狡險大言因王播以進既掌財用常屈公利以便私嬖倖多狎之既有寵於上進退便僻雜以優諧或自稱老奴復無大臣之體嘗奏事畢降階復升又有論奏佻盪輕脫上毎為笑容之在班列間玩狎郎吏譁肆無忌奕權監法請宰相為之使因以自求樞機之任毎有内制出輙疑授已􅀢衣冠以俟後人多笑之上張平叔國之材臣也計能析秋毫吏畏如夏日司㑹逾月綱條甚張况師旅未息調食方急倚成取濟非爾而誰非智能則事不可成非諒直則吾難近噫職局之外得不思稱官望而厭我心乎白氏長慶年未四十潘孟陽父炎禮部侍郎母劉晏女也公卿多父友及外祖賔從故得薦用德宗末王紹以恩倖數稱孟陽之才因擢戸部侍郎憲宗初命孟陽巡江淮且察東南鎮之政理時孟陽以氣豪權重領行從三四百人所歴鎮府但務逰賞與婦女為夜飲至塩鐵轉運院廣納財賄補吏職而已及歸大失人望罷為大理卿後復拜户侍孟陽氣尚豪俊不拘小節居第頗極華峻憲宗㣲行至樂逰原見其宏敞工猶未巳問之左右以孟陽對孟陽懼而罷工作性喜宴公卿朝士多與之逰時指怒者不一俄以風緩不能行憲宗毎事求理常發江淮宣慰使左司郎中鄭敬奉使辭上誡之曰朕宫中用度一匹已上皆有簿籍唯賑䘏貧民無所計筭卿經明行修今登車𫝊命宜體吾懐勿學潘孟陽奉使所至但務酣飲逰山寺而已舊唐初孟陽為侍郎年未四十其母謂曰以爾之才而位丞郎使吾憂之唐書俛首父題盧汝弼簡求子也從昭宗遷後至太原李克用累奏户部侍郎太原使府有龍泉亭簡求節制時手書詩一章在亭之西壁汝弼復為亞師毎亭中讌集未嘗居賔位西向俛首而已舊唐郎中下大夫周官司徒属官有下大夫蓋郎中之任也六典魏有農部郎中通典魏為左民右民後又為民部民曹皆户部也上吳張温為户曹郎事類詞理愜當髙構字孝基徵拜比部侍郎尋轉民部時内史侍郎晉平東與兄子長茂爭嫡尚書省不能斷朝臣三議不决構斷而合理上以為能召入内殿勞之曰我聞尚書郎上應列宿觀卿才識方知古人之言信矣嫡庶者禮教之所重我讀卿判數徧詞理愜當意所不能及也賜米百石由是名知隋書二妙韋維少嘗業儒博渉文史舉進士自大理丞累至户部郎中善於剖判時員外郎宋之問工於詩時人以為户部有二妙唐書初維為郎蒔桞于廷及虚心兄弟居郎省對之輒歛容自叔前後至郎中者數人世號郎官家上湊字彦宗祖叔諧貞觀中為庫部郎中與弟吏部郎中叔謙兄主爵郎中季武同省時號三列宿上論事風彩武儒衡累遷户部郎中時皇甫鏄以宰相領度支剥下以媚上無敢言其罪者儒衡上疏論列鏄宻訴其事帝曰勿以儒衡上疏卿將報怨耶鏄不復復言儒衡氣岸髙雅論事有風彩羣邪尤惡之舊唐圡山頭晉宋以還尚書省置員外郎分判曹事唐朝事彌重其選舊例郎中不歴員外選謂之土山頭景龍中趙謙光自彭州司馬入為大理正遷户部郎中賀陟為員外乃戯詠之曰員外從來美郎中望不優誰言粉署裏翻作土山頭謙光酬之曰錦帳隋時設金爐任意薰唯慙員外置不應列星文唐新語賫本對唱崔仁師為度支郎中嘗奏度支財物數千言手不執本太宗恠之令黄門侍郎杜正倫賫本仁師口對唱一無差殊太宗大竒之唐書無愧幽明盧昌衡字子均為僕射祖孝徵所薦遷尚書金部郎孝徵毎曰吾用盧子均為尚書郎自謂無愧幽明矣隋書受命無言畢諴歴駕部員外郎倉部郎中故事勢門子弟鄙倉駕二曹居之者不恱惟諴受命恬然恭遜口無異言執政多之唐書員外郎俊㧞吕太乙遷户部員外户部與吏部隣司吏部移牒戸部令牆宇悉竪棘以防令史交通太乙報牒曰眷彼吏部銓綜之司當湏簡要清通何必竪籬挿棘省中賞其俊㧞唐新語聞其理行裴向字傃仁為京兆府户曹轉櫟陽渭南縣令奏課皆第一朝廷亟聞其理行擢為户部員外郎舊唐正色挺然長慶中孟簡遷倉部員外郎属順宗登極王叔文竊政驟為户部侍郎簡為其属中立正色挺然不附叔文心忌而不敢退黜言於宰相韋執誼換刑部員外郎唐上書貪猥李石用金部員外郎韓益判度支案益坐贓繫臺石奏曰臣以韓益曉錢糓録用之不謂貪猥如此帝曰宰相但知人則用有過則懲卿所用人且不掩其惡可謂至公從前宰相用人有過曲為蔽之不欲人弹劾此大謬也但知能則舉舉不失職則奨之自然易得其人何必容隠舊唐獻糗餌張濬為支部員外郎黄巢將逼關輔濬託疾請告侍其母挈族避亂啇州賊犯京師僖宗出幸途無供頓衞軍不得食漢隂令李康獻糗餌數百騾網軍士始得食僖宗召康問之曰卿為縣令安操心及此康對曰臣為塵吏安敢有此進獻張濬員外教臣也帝異之上禮部尚書春官禮部尚書周之春官也唐虞之時秩宗典三禮周禮春官大宗伯掌建邦之天神人鬼地祗之禮通典主賔契為司徒百姓和親䕫主賔客逺人必至典畧昔舜命伯夷典禮后䕫典樂至周并為宗伯之任今禮部尚書蓋其任也南豊擬制綰攝二曹宋弁字義和文帝征馬圈留弁以宫官兼祠部尚書攝七兵事及行執其手曰國之大事在祀與戎兵服卿綰攝二曹弁頓首辭謝弁劰勞王事恩遇亞於李冲南史司禮太常伯東晉宋齊梁陳皆有祠部尚書隋置禮部尚書唐因之龍朔二年改為司禮太常伯光宅元年改禮部為春官通典荅讜言陳叔達字子聦太宗時拜禮部尚書建成元吉嫉害太宗隂行譛毁髙祖惑其言將有貶責叔達固諫乃止至是太宗勞之曰武德時危難潜構知公有讜言今之此拜有以相荅也舊唐祝蝹禮部尚書祝欽明頗渉經史不閒時務博碩肥腯頑滯多疑䑓中小吏號之為蝹蝹者肉塊無七竅秦穆公時野人得之僉載穰災祈福韋綬字子章轉禮部尚書穆宗嘗問穰災祈福其可必乎綬對曰昔宋景公以一善言而法星退之三舍此禳災以德也漢文帝除秘祝每於祠祭盡敬而已言無所祈以明福不可以求致也而二君卒能變已變之災享自致之福著於史傳其理甚明如失德以祈災消媚神以祈福至神茍有知當因以致譴非祈禳之道也時人主失德綬因以諷之祀郊之典典朕三禮大舜委於伯夷分勑六卿成王任於彤伯建茲嵗首實曰春官敦叙九族之親欽若五常之教祀天郊地之典舉其宏綱朝日夕月之儀撮其機要張鷟集侍郎小宗伯小宗伯之職掌建國之神位周禮禮部侍郎周之春官小宗伯也六典大宗伯亦曰春卿小宗伯亦曰秩宗白帖今侍郎隋煬帝置龍朔二年改為司禮少常伯先責舊文韋陟為禮部侍郎陟好接後軰尤鍳于文雖詞人後生靡不諳練曩者主司取與皆以一塲之善登其科目不盡其才陟先責舊文仍令舉人自通所工詩筆先試一日知其所長然後依常式考覈斥善無遺美聲盈路舊唐以梯登墻賀知章遷禮部侍郎属惠文太子薨有詔禮部選挽郎賀知章取舎非允門䕃子弟諠訴盈庭乃以梯登墻首出决事時人咸嗤之由是改授工部侍郎上勢傾當時舊制考功員外郎掌貢舉開元二十三年考功員外郎李昻為進士李權所詆朝議以考功位輕不足以臨多士至二十四年遂以禮部侍郎掌焉開元天寶之中昇平既久羣士務進天下髦彦由其取舍故勢傾當時資與吏部侍郎等同通典美聲上聞李揆字端卿乾元初兼禮部侍郎揆嘗以主司取士多不考實徒峻其隄防索其書䇿殊未知藝不至者文史之囿亦不能摛詞深昧求賢之意也其試進士文章請於庭中設五經諸史及切韻本於牀而引貢士謂之曰大國選士但務得才經籍請恣尋檢由是數月之間美聲上聞舊唐聞所未聞鮑防進禮部侍郎得穆質等時比嵗旱䇿問隂陽祲袗質對漢故事免三公卜式請烹𢎞羊指當時輔政者右司郎中獨孤愐欲下質防不許曰使上聞所未聞不亦善乎卒致質髙第帝見䇿嘉揖唐書為侍郎時嘗遇知雜侍御史竇参於通衢道騎不時引避僕人為叅所鞭及叅秉政處令致仕防謂親友曰吾與蕭昕之子齒而與昕同日懸車非朽邁之致以餘忿見廢防文學舊人歴職中外不因罪戾而為俗吏所擯竟以憤終衆頗憫防而咎叅故叅之敗不旋踵非不幸也舊唐甄幽抑華髙郢字公楚為禮部侍郎時四方士務朋比更相譽薦以動有司狥名亡實郢疾之乃謝絶請謁顓行藝司貢部郎三嵗甄幽獨抑浮華流競之俗為衰唐書抑浮先實韋貫之名純為禮部侍郎所取士抑浮華先行實于時流競為息嘗從容奏曰禮部侍郎重於宰相憲宗曰侍郎是宰相除安得重曰然則陛下柬宰相者得無重乎帝美其言改尚書右丞上姦人建中初令狐峘為禮部侍郎宰相楊炎出故宰相杜鴻漸門下其子封求𢎞文生以託峘峘謝使者曰得公手署峘得以識炎不疑著送之峘即日奏言宰相迫臣以私從之負陛下不從則害臣帝以詰炎炎具道所以然帝怒曰此姦人無可奈何欲殺之炎苦救觧乃貶衡州别駕上薦託不行錢徽字蔚章長慶元年為禮部侍郎時宰相叚文昌出鎮蜀川文昌好學尤喜圖書古畫故刑部侍郎楊凴兄弟以文學知名家多書畫鐘王張鄭之蹟在書斷畫品者兼而有之凌子渾之求進盡以家藏書畫獻文昌求致進士第文昌將發面託錢徽繼以私書保薦翰林學士李紳亦託舉子周漢賔於徽及牓出渾之漢賔皆不中選李宗閔與元􅍬素相厚善初􅍬以直道譴逐久之及得還朝大改前志由逕以徼進達宗閔亦急取二人遂有嫌隟楊汝士與徽有舊是嵗宗閔子壻蘇巢及汝士季弟殷士俱及第故文昌李紳大怒文昌還朝一日内殿面奏言徽所放進士鄭朗等十四人皆子弟藝薄不當在選中穆宗以其事訪於學士元􅍬李紳二人對與文昌同遂命中書舎人王起主客郎中知制誥白居易於子亭重試内出題目孤竹管賦鳥散餘花落詩而十人不中選尋貶徽為江州刺史中書舍人李宗閔劔州刺史右補闕楊汝士開江令初議貶徽宗閔汝士令徽以文昌李紳私書進呈上必開悟徽曰不然茍無愧心得喪一致修身慎行安可以私書相證耶令子弟焚之人士稱徽長者既而穆宗知其朋比之端舊唐避是非失職王起字舉乏代錢徽為禮部侍郎掌貢二年得士尤精先是貢舉猥濫勢門子弟交相酬酢寒門俊造十棄六七及元􅍬李紳在翰林深怒其事故有覆試之科及起考貢士奏當司所選進士據所考雜文先送中書令宰臣閲視可否然後下當司放牓從之議者以為起雖避是非失貢職也上擢孤進髙鍇開成元年為禮部侍郎凡掌貢部三年每嵗登第者四十人三年牓出後勑曰進士每嵗四十人其數過多則乖精選官途填委要窒其源宜改每年限放三十人如不登其數亦聽然鍇選擢雖多頗得實才抑豪華擢孤進至今稱之上兩都試舉賈至轉禮部侍郎是嵗至以時艱嵗歉舉人赴省者奏請兩都分試從之兩都試舉人自此始也唐書詭隨德宗貶劉太真為信州刺史太真為禮部侍郎性怯懦詭隨其掌貢舉宰臣姻族方鎮子弟先収擢之又嘗叙陳少逰勲勣擬之桓文大招物議因斯貶上不迎門生後唐同光初裴皥拜禮部侍郎前後三知貢舉晉髙祖時宰相桑維翰亦成名於皥牓下嘗謁皥於私第皥不迎不送或問之荅曰皥見維翰於中書則庶寮也維翰見皥於私館則門生也何送之有人亦重於耿介五代史郎中屢箴闕體孔逷字世逺好典故學與王儉至交昇明中為齊臺尚書儀曹郎屡箴闕體多見信納上謂王儉曰逷貞所謂儀曹不叅闕職也南史大儀專委劉杳字士深博綜羣書沈約任昉以下每有遺忘皆訪問焉累遷尚書儀曹郎僕射徐勉以臺閣大儀專委杳焉上詳練故事梁武帝問吏部尚書徐勉求一有學藝觧朝儀者為尚書儀曹郎勉曰孔休源識見清通詳練故事自晉宋起居注誦畧上口武帝亦素聞之即日除尚書儀曹郎時多所改作毎建訪前事休源即以所誦記隨機斷决曽無疑滯吏部任昉常謂之孔獨誦上三世祠部賀德基字承業世傳禮學祖文發父淹仕梁俱為祠部郎並有名當世德基少㳺學都下積年不歸衣資罄乏又耻服故弊盛冬止衣裌𥜗袴嘗於白馬寺前逢一婦人容服甚盛呼德基入寺門脫白綸巾以贈之仍謂曰君方為重器不久貧寒故以此相遺耳問姓名不荅而去德基於禮記稱為精明位尚書祠部郎雖不至大官而三世儒學俱為祠部郎時論美其不墜上時吳郡顧越弱冠㳺都下通儒碩學必造門質疑討論無倦與文發相埒故都下謂之發越焉上員外郎撰定儀注韋叔夏授春官員外郎則天將拜洛及享明堂别受制與當時大儒祝欽明郭山惲撰定儀注衆咸推服之唐書令式執奏許孟容字公範為濠州刺史徳宗知其才召為禮部員外郎有公主之子請補𢎞文館諸生孟容舉令式不許公主訴於上命中使問狀孟容執奏竟得遷本曹郎中上清廟器李珏字待價幼孤事母以孝聞甫冠舉明經李絳為華州刺史見之曰日角珠廷非庸人相明經碌碌非子所宜乃更舉進士髙第為殿中侍御史宰相韋處厚曰清廟之器豈擊摶才乎除禮部員外郎上名德為首崔澹舉止秀峙累進禮部員外郎當時士大夫以流品相尚推名徳者為之首咸通中世推李都為大龍甲涓豪放不得預雖自抑下猶不許而澹與焉上瑞錦窠舊説員外郎為瑞錦窠碎廢印員外郎㕔前有大石諸州府納到廢印皆於石上碎之又圖冩祥瑞亦員外㕔所掌令狐楚元和初任詩曰移石幾回敲廢印開箱何處送新圖氷㕔祠部呼為氷㕔言其清且冷也因語録南省舍人舊説吏部為省眼禮部為南省舎人考功度支為振行比部得廊下食以飯從者號北盤二十四曹呼左右司為都公省中語曰後行祠屯不慱中行都門中行禮部不慱前行駕庫國史補舊説禮部郎中掌省中文翰謂之南宫舎人唐職林宋神宗與宰執議更官制至禮部郎中曰此南宫舎人非他曹比可除劉摯王鞏聞見録兵部尚書司馬夏官大司馬之職掌以九伐之法正邦國制軍誥禁以紏邦國領校人牧師職方司兵之属即今兵部之任也通典尚書大司馬亦曰夏卿職林大司馬馬武也大緫武事也大司馬亦曰古者兵車一車四馬故以馬名官韋昭辨釋名訓馬為武者取其建行釋名夏官謂之大司馬後周統六師司馬掌邦政統六師平邦國書蠻夷猾夏冦賊奸宄則責之司馬書大傳雎鳩雎鳩氏司馬也左昭大司馬其在少昊則雎鳩氏之任顓頊以司馬主火堯命羲叔為司馬夏官也虞夏二代以司夏官棄居其職周成王以畢公髙為司馬楚漢之際曹無咎周殷始居其職齊王珪之職儀司戎陏有兵部尚書蓋因後周兵部之名兼前代五兵之職龍朔二年改兵部尚書為司戎太常伯侍郎為少常伯光宅元年改為夏官通典乗欵叚馬李懐逺中宗時為兵部尚書雖久居榮位而彌尚簡率園林宅室無所改作常乗欵叚馬左僕射豆盧欽望謂曰公榮貴如此何不買駿馬乗之荅曰此馬幸免驚蹶無假别求聞者莫不歎美舊唐軍容不整郭震字元振為兵部尚書𤣥宗初即位十一月講武驪山既三令帝親鼓之元振遽奏禮止帝怒軍容不整引坐纛下將斬以狥劉幽求張説於焉前諫曰元振有翊賛大功雖有罪當從原宥乃赦之流於新州尋又思其舊功起為饒州司馬上方鎮叅辭令狐楚檢校兵部尚書奏諸道新授節度使等執弓弩帯器仗就尚書省兵部叅辭伏以軍國異容古今定制事不由舊斯為改常未聞省閣之門忽内弓刀之器鄭注外蒙恩寵内畜兇狂首創姦謀將興亂兆致王璠郭行瑜之軰敢驅將吏直詣闕庭震驚乗輿騷動京國雖既往不咎而其源尚開伏乞速令停罷如湏叅謝即具公服從之舊唐嚴整儀衞元祐七年上祀南郊公以兵部尚書為鹵簿吏上因太廟宿齋行禮畢特至青城儀衞甚肅五使乘車至景靈宫東櫺􅀈門外忽有赭蓋犢車百餘兩衝突而來東坡呼御營巡檢使立於車前曰西來誰何敢爾亂行曰皇后并某國太夫人國婆婆某國大長公主也東坡曰可以狀來比至清城諭儀仗使御史中丞李端伯之純曰中丞職當肅政不可不聞李以中宫不敢言東坡曰軾當自奏即於青城上疏劾之明日中使傳命申敕有司嚴整仗衞談記侍郎小司馬兵部侍郎夏官小司馬中大夫之任也六典有家風太宗有事遼東以楊𢎞禮有文武林擢拜兵部侍郎專典兵機之務𢎞禮毎入叅謀議出則統衆攻戰駐蹕之陣所向摧破太宗自山下見𢎞禮所統之衆人皆盡力殺獲居多甚壯之謂許敬宗等曰越公兒郎故有家風矣舊唐託諷楊𢎞武為司戎少常伯髙宗謂云某人何因輙授此職對曰臣妻韋氏性剛悍以此人見嘱臣若不從恐有後患以諷帝用后言也帝笑不罪隋唐嘉話新唐父子同省崔湜為兵部侍郎父挹為禮部侍郎父子同為南省副貳有唐已來未之有也舊唐勲不限格衞次公字從周為兵部侍郎選人李勣徐有功之孫名在黜中次公召而謂之曰子之祖先勲在王府豈限常格並優秩而遣之舊唐同直召見韋澳字子斐遷兵部侍郎與同寮蕭寘深為宣宗所遇每二人同直無不召見詢訪時事毎有邦國刑政大事中使傳宣草詞澳心欲論諌即曰此一事湏降御札方敢施行遲留至旦必論其可否上㫖多從之不以死諫韋處厚字德載正拜兵部侍郎謝恩於思政殿時昭愍狂恣屡出畋逰毎月坐朝不三四日處厚因謝從容奏曰臣有大罪伏乞面首帝曰何也處厚對曰臣前為諫官不能先朝死諌縱先聖好畋及色以至不夀臣合當誅然所以不死諫者亦為陛下此時在春宫年已十五今則陛下皇子始一嵗矣臣安得更避死亡之誅上深感悟其意賜錦綵一百匹銀器四事上綽繼門風盧元輔字子望把子也為兵部侍郎元輔自祖至曽以名節著於史册元輔簡絜貞方綽繼門風歴踐清貫人亦不以父之醜行為累人士歸美上力詆和議兵部侍郎張燾力詆拜詔之議秦檜患之燾託疾在告檜使樓炤諭之曰北扉闕人上欲以公為直院宜早出燾大駭曰愈不敢出矣若使草國書豈能曲徇意㫖哉燾嘗思之不過一去檜不能奪遂止中興係年録郎中詭對仗数顧琛字𢎞瑋遷尚書庫部郎元嘉七年文帝遣到彦之經畧河南大敗悉委棄兵甲武庫為之空虚文帝宴㑹有歸化人在座上問琛庫中伏猶有幾許琛詭辝荅有十萬人仗舊庫仗祕不言多少上既發問追悔失言及琛詭對上甚善之南史固辝不拜江智深元嘉末除尚書庫部郎時髙流官序不為臺郎智深門孤援寡獨有此選意甚不悦固辝不拜上闇對無遺馮子琮字子琮皇建初為尚書駕部郎中攝庫部孝昭曽閲簿領試令口陳子琮闇對無有遺失北史剖析若流姚崇遷夏官郎中時契丹冦䧟河北數州兵機填委元崇剖析若流皆有條貫則天甚竒之超遷夏官侍郎舊唐所歴有聲盧奕懐慎之子與兄奐齊名開元中任京兆司録参軍天寶初為鄠縣令兵部郎中所歴有聲皆如奐之所治也上吏幹有稱李憕驟歴兵部郎中憕有吏幹明於几案甚有當官之稱上父代視印蕭愿梁宰相傾之子性淳謹承事父母未嘗不束𢃄而見然性嗜酒無節職事弛慢為兵部郎中日掌告身印覃恩之次頗怠職事父傾為吏部尚書代愿視印篆其散率如此五代史職方觀圖韋執誼始未顕時不喜人言嶺南州縣既為郎嘗詣職方觀圖至嶺南輙瞑目命左右徹去及為相所坐堂有圖不就省既易旬試觀之崔州圖也以為不祥惡之果貶死唐書員外郎古今難匹杜正倫太宗聞其名令直秦府文學館魏徴表薦正倫以為古今難匹遂擢授兵部員外郎太宗謂曰朕今令舉行能之人非朕獨私於行能者以其能益於百姓也朕於宗親及以勲舊無行能者終不任之以卿忠直朕今舉卿卿宜勉稱所舉舊唐廷無稽牒張嘉貞字嘉貞遷兵部員外郎時功狀盈几郎吏不能決嘉貞為詳處不閲旬廷無稽牒進中書舍人唐書家畜聲伎王翰字子羽并州人長史張嘉貞厚遇之翰自歌以舞属嘉貞神氣軒舉自如張説至禮益加舉超㧞羣䫫擢駕部員外郎家畜聲伎目使頥令自視王侯人莫不惡之上農國之本李渤字濬之擢為庫部員外郎㑹皇甫鎛輔政務剥下佐用度渤上言渭南源鄉户四百今纔四十閺郷户三千今纔一千他州縣大抵類此其敝始於攤逃人之賦願下詔賜禁止計不三年人必歸于農夫農國之本本立然後可以議太平又言道途不修驛馬多死憲宗覧疏驚異即以飛龍馬數百匹付畿内諸驛舊唐郎官清選韋温字𢎞育姚朂知河隂院嘗雪寃獄塩鐵使崔琪奏加酬奬乃令權知職方員外郎制出令朂省上温執奏曰國朝已來郎官最為清選不可以賞能吏上令中使宣諭言朂能官且放入省温堅執不奉詔乃改朂檢校禮部郎中翌日帝謂楊嗣復曰韋温不放姚最入省有故事否嗣復對曰韋温志在銓擇清流然姚最士行無玷梁公元崇之孫自殿中判塩鐵案陛下奬之冝也若人有吏能不入清流孰為陛下當煩劇者此衰晉之風也上素重温亦不奪其操上刑部尚書秋官周之秋官卿也唐虞之時士官以正五刑周禮秋官大司㓂掌邦之三典以佐王刑邦國蓋其任也通典爽鳩郯子曰爽鳩氏司冦也左國之二柄在德與刑邦之三典惟清與慎大舜有欽恤之言穆王有哀矜之教爽鳩之為司冦務在擇人臯陶之作士師期於致理張鷟賊曹尚書二曹論曰劉道真問薛令長在吳何官荅曰為吏部尚書問曰吳待吏部何如餘曹荅曰並通髙選吏部特一時之俊劉曰晉魏以來俱爾獨謂漢氏重賊曹為是吳晉重吏部為非薛君曰八座秩同班等其選並清宜同一揆若人才或多或少選例難精如不得已吏部職掌人物人物難明謂吳晉為得而君何是古而非今劉難曰今吏部非為能刋虚名舉沉朴者故録以成人位處三署聼曹探卿論而用之耳無煩乎聰明賊曹職典刑獄刑獄難精是以尤重之荅曰今之賊曹不能聼聲觀色以别真偽縣不能斷讞之尚書也夫在獄者率小人在朝者率君子小人易檢君子難精俱不得已吏部宜重賊曹宜輕也華譚集美其貞正羊侃為都官尚書尚書令何敬容用事與之並省未嘗㳺造左衞蘭欽同侍宫宴詞色少交侃於坐折之曰小子汝以銅鼓買朱异作父韋粲作兄何敢無宜適朱時在席後宦者張僧𦙍嘗候侃侃曰我牀非閹人所坐竟不前之時論美其貞正南史貞正息祅徐孝克陳禎明元年入為都官尚書自晉以來尚書官僚皆擕家属居省省在臺城内下舍中門有閣道東西跨路通于朝堂其第一即都官省西抵閣道年代久逺多有鬼怪毎夜昏之際無故有聲光或見人著衣冠從井中出須臾復没或門閣自然開閉居多死亡尚書確卒於此省孝克代確便即居之經兩載祅變皆息時人咸以為貞正所致上司刑隋初有都官尚書開皇三年改為刑部尚書唐龍朔三年改刑部尚書為司刑太常伯侍郎為少常伯武后改刑部為秋官天寶初改為憲部通典覆獄歔欷劉祥道遷司刑太常伯毎覆大獄必歔欷累歎奏决之日為之再不食唐書庭無留事李適之拜刑部尚書適之雅好賔友飲酒一斗不亂夜則宴賞晝决公務庭無留事上不屈仙客崔隠甫㓗介自守以强正稱為刑部尚書帝欲相之也牛仙客可與語卿常見否曰未也帝曰可見之隠甫終不詣他日又問對如初帝乃不用子弟或問故荅曰吾不以其人㣲易之也其材不逮中人可與之對耶賛曰嚴挺之拒宰相不肯見李林甫崔隠甫違詔不屈牛仙客信剛者乎二人坐皆是不得相彼亦各申志也唐書朝堂流涕涇師之亂關播與盧把等從駕幸奉天既而盧把白志貞趙賛等並貶黜播尚知政事中外囂然以為不可遂罷相改刑部尚書大臣韋倫等泣於朝曰宰相不能嘉猷翊賛以至今日而尚為尚書天下何由致理可痛心也聞者敬憚之舊關韋傳刑斷减死栁公綽為刑部尚書京兆人有姑鞭婦致死者府斷以償死公綽議曰尊歐卑非闘且其子在以妻而戮其母非教也竟减死唐書侍郎小司㓂周之秋官小司冦中大夫也六典小司冦之職掌外朝之政以致萬民而詢焉周禮大三司使唐有大獄即命御史中丞刑部侍郎大理卿充謂之大三司使唐職林妙擇其人太宗謂侍臣曰張亮有義兒五百畜養此軰將何為也正欲反耳命百寮議其獄多言亮當誅唯將作少匠李道裕言亮反形未具明其無事太宗既盛怒竟斬于市籍没其家嵗餘刑部侍郎有闕令執政者妙擇其人累奏皆不可太宗曰朕得其人也往者李道裕議張亮云反形未具此言當矣當時雖不即從至今追悔遂授道裕刑部侍郎舊唐閲案得實奚陟字殷卿遷刑部侍郎裴延齡惡京兆尹李充有能政專意䧟害之誣奏充結陸贄數厚賂遺金帛充既貶官又奏充比者妄破用京兆府錢糓至多請令比部勾覆以比部郎中崔元翰䧟充留惡贄也詔許之元翰曲附延齡劾治府史府史到者雖無過犯皆笞决以立威時論喧然陟迺躬自閲視府案且得其實具獄上充既免元翰既不遂其志因此憤恚而卒上詳决如神王播字明敡轉刑部侍郎播長於吏術雖案牘鞅掌剖析如流黠吏詆欺無不彰敗時天下多故法寺議讞科條繁雜播備舉前後格條置之座右凡有詳决疾速如神當時属僚歎服不暇上衰彚敕令劉瑑遷刑部侍郎乃衰彚敕令可用者由武德訖大中凡二千八百六十五事類而􅀈之叅訂重輕號大中刑律統類以聞法家推其詳唐書郎中湏有素行李林甫開元中遷大子中允時源乾曜為侍中乾曜之男㓗曰其父曰李林甫求為司門郎中乾曜曰郎官湏有素行才望髙者哥奴豈是郎官耶哥奴林甫小字也滯郎位蔣沇以刑部郎中兼侍御史元載持政守道士類不遷沇以故滯郎位不得調衮代相問士議恨沇屈故擢御史中丞唐書元四制馮宿字拱之為都官員外郎淮德平除比部郎中制詞曰亟則失情緩則留獄深則礙恕縱則生姦准是四者持刑之難唐書孔帖忝官正秩鄭谷為都官郎中作詩自賀且為序云故許昌薛尚書能嘗為都官郎中後數嵗故建州李員外頻自憲府内彈拜都官員外郎皆一時騷雅宗師都官之曹振盛於此余早年請益實受深知今忝此官復是正秩分紀鄭谷詩名盛於唐末號雲臺編而世俗但稱鄭都官詩其詩多佳句但格不甚髙梅聖俞晩年官亦至都官一日㑹飲劉原父戲之曰聖俞官必止於此坐客皆驚原父曰昔有鄭都官今有梅都官也聖俞頗不樂未幾聖俞病卒其詩為宛陵集而今人但謂之梅都官詩一言之䜟後遂果然斯可嘆也員外郎小三司使唐有大獄以刑部員外郎御史大夫大理寺官為之以决疑謂之小三司使時林放情事外武元衡為華原令時畿輔有鎮軍督將恃恩務功者多撓吏民元衡苦之乃稱病去官放情事外沉浮醼詠者人之德宗知其才召授比部員外郎至閤草册劉迺大厯十二年召拜司門員外郎十四年崔祐甫秉政素與迺友善㑹加郭子儀尚父以册禮久廢至是復行之祐甫令兩省官撰册文未稱㫖召迺至閣草之立就詞義典裁祐甫歎賞久之遂擢為給事中請獨按鞫德宗時盧南史坐事貶信州司馬至郡准例得聼吏一人毎月請紙筆錢一千文刺史姚驥初奏以為贜又劾南史買鈆燒黄丹德宗遺御史鄭楚相刑部員外郎裴澥大理評事陳正儀充三司同往按鞫裴澥獨奏曰臣按姚驥奏狀事非巨蠧上曰燒鈆何如澥曰燒鈆為丹格令不禁今忽録此小事令三司使往恐逺方聞之各懐憂懼臣堪任此行即請獨往德宗忻然曰卿言是矣諌厚山陵令狐峘大厯中改刑部員外郎德宗即位將厚奉元陵垣上疏諌畧曰臣讀漢書劉向傳見論王者山陵之誠良史稱歎萬古芬芳詔荅曰朕頃議山陵心方迷謬卿聞見該通識度𢎞逺深知不可形於至言非惟中朕之病抑亦成朕之躬免朕獲不子之名皆卿之力也敢不聞義而徙收之桑榆奉以始終期無失墜古之遺直何以加焉夣得杜牧嘗於宰執求小儀不遂請小秋又不遂嘗夢人謂曰辭春不及秋昆脚與皆頭後果得比部員外工部尚書冬官工部尚書周之冬官卿也晏類要尚書大司空亦曰冬卿白帖爽鳩爽鳩氏司空也左危東六星兩兩而北曰司空主水金守之天下憂水春秋元命苞下理上和下理坤道上和乾光謂之司空漢官觧話溝瀆壅遏水為民害田廣不墾則責之司空尚書大傳主圡司空主圡不言圡而言空空尚主之况於實乎白虎通冬官司空掌邦事營城廓都邑立社稷宗廟造塋宅器械監百工環濟要畧決九州禹為司空披九山通九澤決九州使各以其職來貢地方五千里至于荒服魚通典畧位當𤣥武之官職在司空之任虞舜之代伯禹統其班周成之朝毛公處其地張鷟集宋以武公之諱改司空為司城楚改司空為莫敖秦置御史大夫省司空齊職儀禹長於地理水泉九州得括象圖故堯以為司空尚書刑徳放别五圡孔子中仕為中都宰二年定公以為司空乃别五圡之性而物其所生之宜咸得厥所家語赤伏符王梁初為野王令世祖議選大司空而赤伏符曰王梁主衞作𤣥武帝以野王衞之所徙衛文君自濮陽徙於野王𤣥武水神之名司空水圡之官也於是擢拜梁為大司空華嶠後漢書司平晉宋以來有起部尚書陳沈衆為起部尚書后周有冬官大司空卿掌五材九範之法隋有工部尚書因後周工部之名兼前代起部之職龍朔二年改工部尚書司平太常伯侍郎為司平少常伯武后改為冬官通典名稱職長孫平字處均為工部尚書名為稱職時有人告都督邴紹非毁朝廷為憒之者上怒將斬之平諌曰川澤納汚所以成其深山岳藏疾所以就其大臣不勝至願願陛下以山海之量茂寛裕之徳鄙誇曰不癡不聾未堪作大家翁此言雖小可以喻大隋書兄弟代為閻立本顕慶中代兄立德為工部尚書兄弟相代為八座時人榮之總章元年以司平太常伯拜右相二唐時立本為右相姜恪為左相立本無他才識時以善畫稱之恪嘗累為將軍立功塞外是嵗京師飢旱𢎞文崇賢司成三館學生並放歸本貫當時為之語曰左相宣威沙漠右相馳譽丹青三館學生放散五臺令史明經通典右相馳價丹云明經以末使進身者可為烱戒新語時人以千文為語曰左相云丹青舊于時左相云丹青之嘲唐事與工書無于立本事三書不同附之侍郎有宰相望李栖筠字貝一為工部侍郎關中舊仰鄭租二渠溉田而豪戚壅上㳺取磑利且百所奪農用十七栖筠請皆撤毁嵗得租二百萬民頼其入魁然有宰相望元載忌之唐書出使不辱胡証字啓中太和中以校檢工部尚書為回鶻和親使舊制行人有私覿禮縣官不能具召富人子納貲於使而命之官証請儉省費以絶鬻官之濫次漠南虜人欲屈脅之且言使者必易胡服又欲主便道疾驅者証固不從以唐官儀自將訖不辱命還拜工部侍郎証旅力絶人晉公裴度未顕時羸服私飲為武士所窘証聞突入坐客上引觥三釂客皆失色因取鐵燈檠摘枝葉櫟合其跗横膝上謂客曰我欲為酒令飲不釂者以此擊之衆唯唯証一飲輙數升次授客客流離盤杓不能盡証欲擊之諸惡少叩頭請去証悉驅出故時人稱其俠上判請㦸栁彧字幼文為屯田侍郎時制三品已上門皆列㦸左僕射髙熲子𢎞德封應國公申牒請㦸彧判曰僕射之子更不異居父之㦸槊已列門外尊有壓卑之義子有避父之禮豈容外門既設内閤又施事竟不行熲聞而歎伏隋書通典云煬帝除侍字武德三年加中子官故置侍郎郎中之間郎中能賦詩裴讓之字士禮吳見田郎中省中語曰能賦詩裴讓之與楊愔友善相遇則清談竟日愔毎云此人風流警㧞斐文季為不亡矣梁使至常令讓之攝主客郎北史宣撫之才沈扶為屯田郎中充山南道宣撫使至鄧州奏内郷縣行布黄澗兩場倉督鄧琬等先主掌湖南江西運到糙米至淅川縣於荒野中囤貯除支用外六千九百四十九石裛爛成灰塵度支牒徵元掌所由自貞元二年鄧琬父子兄弟至元孫相成二十八年前後禁死九人今琬孫及元孫見在枷禁勑曰如聞鹽鐵度支兩使此類極多其鄧琬等四人資産全賣納禁繫三代庾死獄中實傷和氣鄧琬等並疎放天下州府監院如此類不得禁經三年已上速便疎理以聞議嘉扶有宣撫之才唐書員外郎六典六部主事隋煬初置唐以後無事可見改令張文瓘遷水部員外郎時兄文琮為户部侍郎舊制兄弟不許並居臺閣遂出為雲陽令舊唐不数省中司門都官屯田虞部主客皆閒簡無事時諺曰司門水部入省不數人角􅀈之戲有假作吏部令史及虞部令史相見忽然俱到悶絶良久云冷熱相激南部諸郎天官陳蕃上書云昔明帝公主為子求郎不許賜千萬左右問之帝曰郎天官也以當叙德何可妄與人耶今陛下以郎比一把菜臣以為反側也汝南先賢𫝊用第二人王坦之郎中少年時江彪為僕射領選擬之尚書郎人有詔王者王曰自過江來尚書郎正用第二人何以擬我聞之而止世説兄弟同省故事叔父兄弟不許同省為郎然官格令不載亦無正勑正觀二年韋叔謹除刑部員外郎三年韋季武除庫部郎郎中太宗謂曰知卿兄弟近任尚書省故授卿此官欲成一家之美無避稍屈資也其後同省者甚多近日非特恩除拜即湏相回避也通典前行後行尚書郎自兩漢已後妙選其人唐武德貞觀已來尤重其職吏兵部為前行最為要劇自後行改入皆為美選考功員外專掌試貢舉人員外郎之最望者司門都門屯田虞水膳部主客皆在後行閒簡無事先天中王上客為侍御史自以才望清雅妙當入省常望前行忽除膳部員外郎㣲有悵惋吏部郎中張敬忠戲詠之曰有意嫌兵部專心望考功誰知脚踜蹬却落省􅀈東膳部在省中最東北隅故有此句兩京新記省官趙華旱擅髙名在官途五十年累經貶謫蹇躓備至而入仕三十年方霑省官身在郎署天中記卷三十一
