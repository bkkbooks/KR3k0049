body:
  text: 天中記卷五十八明陳耀文撰鳯羽蟲之長羽蟲三百六十而鳯為之長也家語鶉火之精鳯凰鶉火之禽𤾉之精也徳能致之其精畢至鶡冠子火精鳯火精也孔漢圖雄曰鳯雌曰凰其雛為鸑鷟或曰鳯凰一名鸑鷟一名鶠毛毛詩草蟲經鳯非梧桐不棲非竹實不食非醴泉不飲在天為朱雀詩義䟽六像九包鳯有六像九包六像者一曰頭像天二曰目象日三曰背像月四曰翼像風五曰足像地六曰尾像緯九包者一曰口包命二曰心合度三曰耳聴達四曰舌詘伸五曰彩色光六曰冠矩州七曰距銳鈎八曰音激揚九曰腹戸行鳴曰歸嬉止鳴曰提扶夜鳴曰善哉晨鳴曰賀世飛鳴曰郎都知我唯黄持竹實來故子欲居九夷從鳯嬉論摘衰聖丹穴丹穴之山其上有鳥焉其狀如雞五采而文名曰鳯凰首文曰徳翼文曰義背文曰禮膺文曰仁腹文曰信是鳥也飲食自然自歌自舞見則天下安寧南山經夫木行為仁為青鳯頭上青故曰戴仁也金行為義為白鳯纓白故曰纓義也火行為禮為赤鳯背赤故曰負禮也水行為智為黒鳯胸黒故曰向智也土行為信為黄鳯足下黄故曰蹈信也抱朴子朔至徳鳯凰之翔至徳也雷霆不作風雨不興川谷不澹草木不摇而燕雀佼之以為不能與之争於宇宙之間還至其曽髙逝其萬仞之上翺翔於四海之外遇崑崙之䟽圃飲砥柱之湍瀨邅回蒙汜之渚尚佯冀州之際徑躡都廣入日抑節羽翼弱水暮宿風穴當此之時鴻鵠鶬鸖莫不僤驚伏竄注喙江裔又况直燕雀之類乎淮覧㝠鳯凰上擊九千里絶雲霓負蒼天翺翔乎杳𠖇鳯象黄帝即位宇内和平思見鳯凰之象以問天老天老曰夫鳯象鴻前而麟後虵頭而魚尾龍文而龜身燕頷而鷄喙駢翼而中注首戴徳項掲義背負仁心抱忠翼挾信足履正尾繫武小音合鍾大音合鼓延頸奮翼五彩備舉光動八風氣應時而食有質飲有儀往即文始來即嘉成㳺必擇所飢不妄下其鳴也雄曰節節雌曰足足昏鳴曰保章舉鳴曰上翔集鳴曰歸昌此謂鳯像夫唯鳯為能究萬物通天祉象百狀達於道律五音成九徳去則有灾見則有福覧九州觀八極備文武正王國嚴照四方仁聖皆伏故得鳯像之一者則鳯過之得二者鳯下之得三者則春秋下就之得四者則四時下之得五者則終身居之黄帝曰於戯盛哉於是乃備黄冕帶黄紳齋於中宫鳯乃蔽日而降黄帝降自東階西面稽首曰皇天降兹敢不承命於是鳯乃遂集東囿食帝竹實棲帝梧樹終身不去韓詩説苑阿閣黄帝黄服齋於中宫坐於𤣥扈洛水之上有鳯凰集不食生蟲不履生草或止帝之東園或巢於阿閣或鳴於庭其雄自歌其雌自舞黄帝以問天老天老曰臣聞之國安其主好文則鳯凰居之國亂其主好武則鳯凰去之今鳯凰翔於東郊而樂之其鳴音中夷則與天相副以是觀之大有嚴教以賜帝帝勿犯也宋志黄帝治天下鳯凰翔於庭律之初生寫鳯之音二皇鳯至於庭伏羲神農三代鳯止於門堯舜禹周室鳯至於澤徳彌澆所至彌逺徳彌精所至彌近淮南聲若簫詩曰鳯凰秋秋其翼若干其聲若簫有鳯有凰樂帝之心此不蔽之福也詳觧蔽篇逸詩帝葢謂堯也注鳯凰蹌蹌匪堯之庭楊子銜米舜父有目失在家調治邑市而居舜父夜卧夢見一鳯凰自名為鷄口銜米以食已言鷄為子孫視之是鳯凰以黄帝夢書占之此子孫當有貴者舜占猶之比年糴稻糓中有錢舜也乃三日三夜仰天自告過舜前䑛之目霍然開劉向孝子𫝊司晨帝舜曰朕惟不入百獸鳯晨中候百獸率舞鳯凰司晨鳴注元帝論云鳯闕司晨之功火無内照之美梁書食竹實孟戯人首鳥身其先為虞氏馴百禽夏后之末民始食卵孟戯去之鳯凰隨焉止於丹山去九疑萬八千里此山多竹長千仞鳯凰食竹實孟戯食木實括地圖翠虬覩化益而登𤣥雲靈鳯值孟戯而反丹穴抱朴子麟鳯以形狀為别聖人以心神為異古者太平之世鳯凰常居其國而生乳至夏后始食卵而鳯去之此則鳯有種明矣上鳯雛成王時㫋塗國獻鳯雛育於靈禽苑及封泰山禪社首之後文彩炳耀飛走之類不復喧鳴至成王崩冲飛而去拾遺洪邁光堯挽詩鼎湖龍去逺社首鳯來遲上琴操周公旦攝政七年制禮作樂鳯凰翔庭成王援琴而歌曰鳯凰翔兮於紫庭余何徳兮以感靈賴先王兮恩澤湊臻于胥樂兮民以寧琴操成王著儀鳯之歌宋志鳴鳥耉造徳不降則鳴鳥不聞矧曰其能有格書君奭鳴鳥謂鳯也鄭注魏明帝詔管寧曰夫以姬公之聖而茍徳不降則鳴鳥弗聞國志居積石莊子曰老子見孔子從弟子五人問曰為誰對曰子路為勇其次子貢為智曽子為孝顔回為仁子張為武老子嘆曰吾聞南方有鳥其名為鳯凰之所居也積石千里河水出下鳯鳥居止天為生食其樹名瓊枝髙百仞以璆琳琅玕為實天又為生離珠一人三頭遞卧遞起以伺琅玕鳯鳥之文戴聖嬰仁右智左賢逸篇九色西王母曰仙之上藥有九色鳯腦次藥有蒙山白鳯之脯漢武内傳金鳯宣帝以皂葢一乗賜霍光悉以金鉸具至夜夜車轄上鳯凰輒亡去莫知所之至曉乃還如此非一守車人亦嘗見後南郡黄君仲北山羅鳥得鳯凰入手即化成紫金毛羽冠翅宛然具足可長尺餘守車人列上云今月十二日夜車轄止鳯凰俱飛去曉則俱還今則不返恐為人所得光甚異之具以列上後數日君仲詣闕上鳯凰云今月十二夜北山羅鳥所得帝聞而疑之置承露盤上俄而飛去帝使尋之直入光家止車轄上乃知信然帝取其車每㳺行即乗御之至帝崩鳯凰飛去莫知所在稽康詩云翩翩鳯轄逢此網羅齊諧記威鳯宣帝元康四年南郡獲威鳯宋志宣帝神爵元年詔曰南郡獻白虎威鳯為寶晉灼云鳯之有威儀者與尚書鳯凰來儀同意紀威鳯以難見為神走麝以遺香不捕闗尹子孫盛與桓温牋云州遣從事觀採風聲進無威鳯來儀之美退無鷹鸇摶擊之用徘徊湘川將為怪鳥晉書梁簡文為太子時與劉孝儀令曰賢從弟遵威鳯一羽足以見其五徳南史劉傳太宗嘗追思王業艱難佐命之力乃作威鳯賦賜長孫無忌曰有一威鳯憇翮朝陽晨逰紫霧夕飲𤣥霜資長風以舉翰唳天衢而髙翔舊唐五色五鳯三年詔曰三月辛丑鸞鳯集長樂宫東闕中樹上飛下止地文章五色留十餘刻吏民並觀前漢紀羣鳥向立丼露三年二月鳯凰集新蔡羣鳥四面行列皆向鳯凰立以萬數宋志五彩建武十七年鳯凰至髙八九尺毛羽五彩集穎川郡羣鳥從之葢地數頃留十七日乃去東觀記將九子晉穆帝升平四年二月辛亥鳯皇將九子見鄖鄉之豐城十二月甲子又見豐城衆鳥隨從宋志銜詔石季龍與皇后在觀上有詔書五色紙着鳯口中鳯既銜詔待人放數百丈緋繩轆轤迴轉鳯凰飛下鳯以木作之五色漆畫硃脚皆用金鄴中記鳯里文帝元嘉十四年大鳥二集秣陵民王覬園中李窠上狀如孔雀頭足下小毛羽鮮明文彩五色音聲諧和衆鳥如山鷄者隨之行三十步頃東南飛去彭城王義康以聞改鳥所集永昌里謂之鳯凰里宋志起臺於山因名鳯凰臺金陵志鳯凰樓在鳯凰臺上宫苑記鵠引孝武帝孝建元年正月庚申鳯凰見丹徒愒賢亭雙鵠為引衆鳥陪從征虜將軍武昌王渾以聞宋志翊從長夀三年十一月陳州上言苑丘縣鳯凰集衆鳥數萬前後翊從行列齊整色别為羣後三日改元儀鳯唐志冠如金杯宗景徳元年五月七日午時白州有三鳯自南入城衆禽周繞至萬歳寺前棲髙木上身如龍長九尺髙五尺其文五色冠如金杯至申時飛向北去州畫圖來上貽謀録鳯集得劒金泰和四年六月磁州武安縣南皷山北石聖臺鳯凰見鳯從東南來衆鳥周圍之大者近内卜者在外以萬萬計地在屯區村村民懼為官司所擾謀逐去之驅牛數十頭擊柝從之牛未至二里即有鷙鳥振翼而起翼長丈餘下擊二水牯肉盡見骨水牯即死於是衆始報官鳯凰髙丈餘尾作鯉萬狀而色殷九子差小翼其傍鳯為日景所照則有二大鳥更迭盤旋庇廕之至日入則下留三日乃從西北摩空而上縣中三日無鳥雀鳯去後人視其處有鯉魚重五六十斤者食餘尚有數頭臺傍禽鳥糞兩溝皆滿小禽不敢飛動餓死者不可勝計村民疑臺下有異私掘之三尺餘石罅中直挿金劍一取不能盡擊析得其半以火煆欲分之劍見火光金蟬散飛而去癸辛雜志鳯頭徐知諤知潤州好奇寶怪物所蓄不可計有蜀估持鳯首至自言得之徼外蠻夷狀如雄雞廣五寸冠上正平可用為枕朱冠金喙文彩煥爛如生人咸異之陸㳺南唐書扇女洞𤣥本行經云西方衛羅國王有女字曰配瑛與鳯共處於是靈鳯常以羽翼扇女面後十二年中女忽有胎王意怪之因斬鳯頭埋着長林丘中後生女名曰皇妃王女思靈鳯之􅂒好駕而臨之長林丘中歌曰杳杳靈鳯綿綿長歸悠悠我思永與願違萬刼無期何時來飛是鳯鬰然而生抱女俱飛逕入雲中仁鳥梅福上成帝書云夫䳒鵲遭則仁鳥増逝愚者蒙録則知士深退本𫝊䳒音縁鴟也梧禽梧禽不與鴟梟同枝麟虞不與豺狼連羣抱朴子交際篇梧禽激響於朝陽麟雲覿靈而來出龜龍吐藻於河湄景老摛耀於天路詰鮑篇靈鳥簫韶未九成靈鳥未紆儀也抱朴靈禽嗈嗈於阿閣儀禽均儀禽於唐序同舞獸於虞庭張率舞馬賦五鳯五鳯皆五色為瑞者一為孽者四其四皆似鳯並為妖一曰鷫鸘鳩喙圓目身義戴信嬰禮膺仁負智至則役之感也二曰發明烏喙大頸身仁戴智嬰義膺信負禮至則喪之感也三曰焦明長喙䟽翼圓尾身義戴信嬰仁膺智負禮至則水之感也四曰幽昌兊目小頭大身細足脛若鱗葉身智戴信負禮膺仁至則旱之感也國語曰周之興也鸑鷟鳴岐説文曰五方神鳥東方曰發明南方曰焦明西方曰鷫鸘北方曰幽昌中央曰鳯凰樂叶圖徵青鳯謂之鶡赤鳯謂之鶉黄鳯謂之鸞白鳯謂之鷫紫鳯謂之鷟禽經凡五方之鳥皆似鳯而非也東方發明全身總青西方鷫鸘全身總白南方焦明全身總赤北方幽昌亦曰退居全身總黒中央鳥名玉雀亦曰鳯凰全身總黄人鏡經鳯盃南恩州北丼山壁立千仞有瀑水飛下猿狖不能至鳯凰巢其上彼人呼為鳯凰山所食亦蟲魚遇大風雨或飄墮其雛小者猶如鶴而足差短南人截取其觜謂之鳯凰盃爾雅翼在笯屈原賦鳯凰在笯兮鷄雉翔舞笯鳥籠也朱鳥思𤣥賦纚朱鳥以承旗朱鳥鳯也楚辭曰鳯凰翼其承旗也弔鳥李彤四部曰弔鳥山俗𫝊曰鳯死於上歳七月至九月羣帝來集其上刻鳯公輸之刻鳯也冠距未成翠羽未樹人見其身者謂之鳩鵄見其首者名曰鴮鸅皆訾其醜而笑其拙及鳯之成翠冠雲聳朱距電摇錦身霞散綺翮炎發翽然一翥翻翔雲棟三日而不集然後讃其奇而稱其巧劉子鸞火離火離為鸞元命包天樞得則鸞集運斗樞瑞鳥鸞瑞鳥一曰鷄趣首翼赤曰丹鳯青曰羽翔白曰化冀𤣥曰隂翥黄曰土符禽經鳯凰之佐鸞鳥者赤神之精鳯凰之佐鷄身赤色色亦被五彩鳴中五音肅肅雍雍喜則鳴舞人君進退有度親踈有序則至一本曰心識鍾律律調則至鳴舞以和之瑞應圖鳯鳥之亞鸞者鳯鳥之亞始生類鳯久則五彩變易故字從變省禮斗儀曰天下太平安寧則見其音如鈴巒巒然也周之文物大備法車之上綴以大鈴如鸞之聲也後改為鑾禽經注女牀女牀之山有鳥焉其狀如翟而五彩文名曰鸞鳥見則天下安寧西山經自歌軒轅之國諸夭之野鸞鳥自歌鳯鳥自舞鳯凰卵民食之海外西經廣都之野鸞鳥自歌海内經沃野鸞鳥自歌大荒西經北狄之國有桂山有五彩鳥三名一曰皇鳥一曰鸞鳥一曰鳯鳥上孔穎達曰燕雀有啁噍之感鸞鳯有歌舞之容説文長離長麗前掞光耀明瓉曰長麗靈鳥也故相如賦云前長離而後矞皇舊説云鸞也張衡思𤣥賦亦曰前長麗使拂羽漢樂志後書思𤣥注長離鳯也潘岳贖陸機詩婉婉長離凌江而翔英英朱鸞來自南岡𫝊咸贈何劭王濟詩雙鸞㳺蘭渚二離揚清暉皆以離為鳯雌和崑崙圖云鸞鳥似鳯而白纓聞樂則蹈節而舞至則國安樂其雌曰和抱朴子氐羌獻成王時氐羌獻鸞説文蒼鸞西王母曰神仙藥次有靈丘蒼鸞漢武内傳舞庭王阜為重泉令鸞鳥集止學宫阜使掾沙疊為張雅樂擊磬烏舉足垂翼應聲而舞止縣庭留十餘日乃去東觀記棲槐辛繕字公文治春秋䜟緯隠居華隂光武徴不至有大鳥髙五尺鷄頭鷰頷虵頸魚尾五色備舉而多青棲繕槐樹旬時不去𢎞農太守以聞詔問百寮咸以為鳯太史令蔡衡對曰凡象鳯者有五多赤色者鳯多青色者鸞多黄色者鵷雛多紫色者鸑鷟多白色者鵠今此鳥多青乃鸞非鳯也上善其言王公聞之咸遜位避繕不起決疑注對鏡舞罽賓國王結罝峻岐之山獲一鸞鳥王甚愛之欲其鳴而不能致乃飾以金樊享以珍羞而鸞對之愈戚三年不鳴夫人曰聞鳥見其類而後鳴可懸鏡以映之王從言鸞觀影感契慨焉悲鳴哀響中宵一奮而絶范太鸞鳥詩序鸞陂豫章洪井有鸞岡洪厓先生乗鸞所憇泊也謝莊嘗逰豫章觀井賦詩言鸞岡四周有水謂之鸞陂水經注紅鳥梁武帝太清元年捨身光嚴重雲殿時海中浮鵠山去餘姚岸可千餘里上有女人年三百歳有女官道士四五百人年並出百但在山學道遣使獻紅席帝方捨身時其使適至云此草嘗有紅鳥居下故其為名觀其圖狀則鸞鳥也南史本紀儀鸞隋煬帝大業十一年有二孔雀自西苑飛集寶城朝堂前親衛校尉髙徳孺十餘人見之奏以為鸞時孔雀已飛去無可得騐於是百官稱賀詔以徳孺誠心㝠㑹肇見嘉祥擢拜朝散大夫餘人皆賜束帛仍於其地造儀鸞殿通鑑雜記云馬徳儒煬帝好聞祥瑞常有野雀集於殿上當衛校尉唱云此是鸞鳥有衛士報云村野之中大有此物校尉乃令衛士仍奏為鸞煬帝不究真虚即以為瑞仍名此殿為儀鸞嗤笑至今未弭唐㑹要繡鸞軒渠國多九色鳥青口緑頸紫翼紅膺紺頂丹足碧身緗背𤣥尾亦名九尾鳥亦名錦鳯其青多紅少謂之繡鸞常從弱水西來或云是西王母之禽也通典大秦後鸞吪鳯翥鸞舉百羽從之鳯靡鸞吪百鳥瘞之禽經天勝乾臯斷舌則坐歌孔雀拍尾則立舞人勝之也鸞入夜而歌鳯入朝而舞天勝之也埤雅特栖感鸞鷖之特栖兮悲淑人之希合思𤣥賦駟玉虬以乗鷖兮溘埃風余上征王逸曰鷖鳯别名也廣雅曰鷖鳯屬也山海經曰蛇山有鳥五色飛蔽日名鷖鳥九疑山有五彩之鳥名鷖鵬圖南北溟有魚其名為鯤鯤之大不知其幾千里也怒而飛其翼若垂天之雲是鳥也海運則將徙於南溟溟者天池也齊諧者志怪者也諧之言曰鵬之徙於南溟也水擊三千里摶扶摇而上者九萬里去以六月息者也故九萬里則風斯在下矣而後乃今培風背負青天而莫之夭閼者而後乃今將圖南莊子闕大夫家皆養之鷄鳴時亦鳴詩義䟽鶴知夜半説題辭鶴水鳥也夜半水傍感其生氣則喜而鳴不止或問曰多言有益乎對曰蝦蟇日夜鳴口乾而人不聴之鶴鷄時夜而鳴天下振動多言何益墨子警露鳴鶴戒露此鳥性警至八月白露降流於草上滴滴有聲因集髙鳴相警移徙所宿處慮有變害也風土記露禽鶴也露下則鶴鳴凡鶴之馴養於家庭者飲露則飛去禽經注𤣥鶴千載則變蒼又千載則變黒所謂𤣥鶴也古今注鶴羮離騷曰縁鶴飾玉后帝具饗古帝謂殷湯也言伊尹始仕縁烹鶴鳥之羮修飾玉鼎以事殷湯湯賢之遂以為相也李嶠攀龍臺砰蓄𢎞圖於縁鶴之鼎丹鶴周昭王時塗修國獻青鳯丹鶴各一雌一雄以潭臯之粟飴之以溶溪之水飲之拾遺記化鶴周穆王西征一軍盡化君子為猿為鶴小人為蟲為沙抱朴子獻血天子飲於孟氏爰舞白鶴二八穆天子𫝊至於巨蒐氏巨蒐之人乃獻白鶴之血以敬天子上乗軒狄人伐衛懿公好鶴鶴有乗軒者將戰國人受甲者皆曰使鶴鶴實有禄位予焉能戰左傳衛侯喜鶴有飾以文繡而乗軒者賈子銜珠而舞晉平公鼓琴有𤣥鶴二八而下銜明珠舞於庭一鶴失珠覔得而走師曠掩口而笑瑞應圖六翮晉平公逰於河而樂曰安得賢士與之樂此也舡人葢嘗跪而對曰君不好士耳何患無士乎公曰吾食客門左千人門右千人可謂不好士乎對曰夫鴻鵠髙飛逺翔一舉千里所恃者六翮耳背上之毛腹下之毳無分寸之數益一把飛不為加髙損一把飛不加下不知門下左右客左右者亦有六翮之用乎將皆背上之毛腹下之毳耶韓詩外𫝊班固薦郭基云進有羽翮奮翔之用後漢桓帝時楊喬薦孟嘗曰實羽翮之美用非徒腹背之毛上郭祖深上武帝封事曰今之所任腹背之毛耳梁書蔡景厯與陳霸先書且為腹背之毛脱充鳴吠之數陳書白鵠翔師曠鼓通於神明而白鵠翔瑞應圖一舉千里田饒事魯哀公而不見察謂哀公曰夫鷄有五徳猶曰瀹而食之者以其所從來近也夫黄鵠一舉千里止君園池啄君稻梁君猶貴之以其所從來逺也故臣將去君黄鵠舉矣獻鶴齊王使淳于髠獻鶴於楚出邑門道飛其鶴徒掲空籠造詐成辭往見楚王曰齊王使臣來獻鶴過於水上不忍鶴之渇出而飲之去我飛亡吾欲刺腹絞頸而死恐人之議吾王以鳥獸之故令士自傷殺也鶴毛物多相類者吾欲買而代之是不信而欺吾王也欲赴他國奔亡痛吾兩主使不通故來服過叩頭受罪大王楚王曰善齊王有信士若此哉厚賜之財倍鵠在也史記説苑魏文侯使舍人蔡無澤獻鶴於齊凌風莊辛謂楚襄王曰黄鵠逰乎江海淹乎大沼俯噣鱔鯉仰囓䔖衡奮其六翮而凌清風飄摇乎髙翔自以為無患與人無争也不知夫射者方將修其碆盧治其矰繳將加已乎百仞之上被㔋磻引微繳折清風而抎矣故晝㳺乎江河夕調乎鼎鼐楚䇿還丹使大司命君茅盈與弟定録中君固保命小君𠂻曽各來白鵠集分句曲之山時人互有見者父老謡歌曰茅山連金陵江湖據下流三神乗白鵠各治一山頭召雨灌旱稻陸田亦復柔妻子咸保室使我百無憂白鵠青天何時復來逰漢明明帝永平二年詔立廟祀之邑人呼為白鵠廟昔人有至心好道入廟請命者或聞二君在帳中與人言語或見白鵠在帳中白鵠者是服九轉還丹使能分形之變化也亦可化作數十白鵠或可乗之以飛行而本形故在所止也茅君内𫝊金衣菊裳昭帝始元元年春二月黄鵠下建章宫太液池中公卿上夀賜諸侯王列侯宗室金錢各有差漢書黄鵠太鳥一舉千里非白鵠也師古注上為歌曰黄鵠飛兮下建章羽肅肅兮行蹌蹌金為衣兮菊為裳唼喋荷荇出入蒹葭自顧菲薄愧爾嘉祥西京雜記黄鵠出東海以其來集為祥廣志銜珠報恩曾参養母至孝曽有𤣥鶴為弋人所射窮而歸之参牧養治療瘡愈放之後鶴夜到門外参炳燭視之雌雄各至銜雙明珠報参焉捜神記張氏家𫝊曰禧字彦祥除效轂令有鶴負矢集禧庭禧以丼草湯洗之𫝊藥留養十餘日瘡愈飛去月餘銜赤玉珠二枚置禧庭中鶴髓王莽以鶴髓漬縠種學仙漢書丁令威遼東城門有華表柱忽有一白鶴來集徘徊空中言曰有鳥有鳥丁令威去家千歳今來歸城郭如故人民非何不學仙去空伴冢纍纍遂上冲天續捜神記駕鶴夏口城據黄鵠磯世𫝊仙人安子黄鵠過此土也邊江峻險樓櫓髙危瞰臨沔漢應接司部南齊志費禕登仙嘗駕黄鶴返憇於此遂以名樓唐圖經荀環字叔偉事母孝好屬文及道術潜栖却粒嘗東逰憇江夏黄鶴樓上望西南有物飄然降自霄漢俄頃已至乃駕鶴之賓也鶴止戸側仙者就席羽衣紅裳賓主歡對已而辭去跨鶴騰雲眇然烟滅述異記閻伯理梅記云王室載懷思仲宣之能賦僊蹤可揖嘉叔偉之芳塵黄鶴來時歌城郭之並是浮雲一去惜人世之俱非英華華亭鶴世説云陸機河橋敗為盧志所讒被誅臨刑嘆曰欲聞華亭鶴唳可復得乎八王故事曰華亭吳豢縣郊外墅也有清泉茂林吴平後陸機兄弟共逰於此十餘年語林云機為河北都督聞驚角之聲謂孫丞曰聞此不如華亭鶴唳鶴澤晉羊祜鎮荆州江陵澤中多有鶴常取之教舞以娱賓客因名鶴澤後人因之遂呼江陵郡名為鶴澤方輿羊公鶴劉遵祖爰之少為殷中軍所知稱之於庾公庾公甚忻然便取為佐既見坐之獨榻上與語劉爾日殊不稱庾小失望遂名之為羊公鶴昔羊叔子有鶴善舞嘗向客稱之客試使驅來氃氋而不肯舞故稱比之世説凌霄僧支道林好鶴時有遺其雙鶴者翅長欲飛林意惜之乃鎩其翮鶴軒翥不能復起乃舒翼反顧視之如似懊喪意林公曰既有凌霄之姿何肯為人作耳目近玩養令翮成置使飛去上合璧引冲天白帖冲雲世説俱誤雷門鶴郡西有白鶴山古老相𫝊云此山昔有晨飛鵠入㑹稽雷門皷中於是雷門皷鳴洛陽聞之孫恩時斫此皷見白鶴飛出翺翔入雲此後皷無復逺聲後人呼為潜鶴皷臨海記頸長石虎時揚州獻黄鵠雛五泛之於𤣥武池頸長一丈聲聞十餘里載記化女晉安帝元興中一人年出二十未婚然目不干色曽無穢行嘗行見一女甚麗謂少年曰聞君自以柳季之儔亦復有桑中之歡耶女便歌少年微有動色後復重見之少年問姓云姓蘇名瓊家在途中遂邀還盡歡從弟突入以杖打女即化雌白鵠廣記斷腸廬山逺法師未出家善弩射嘗於鶴窟射得鶴雛後復伺鶴母見將射之鶴不動翔觀之已死於窠中疑其愛子致死破視心腸皆寸絶法師於是放弩發菩薩心江揔記養雛宋元嘉初鎮北將軍王仲徳鎮彭城左右出獵遇一鶴將二子悉禽之歸以獻王王使養其小者口為人所裂遂不能飲食大者輒含粟哺之飲輒含水飲之先令其飽未嘗㤀也王甚愛之令精加養視大者羽翮先成每翥冲天小者尚未能飛大者終不先出留飲飴之又於庭中騫躍教其飛颺六十餘日小者能飛乃與俱去述異記闕齊高帝鎮淮隂為宋明帝所疑被徴為黄門郎深懷憂慮見平澤有羣鶴乃命筆詠之曰八風舞遥翮九野弄清音一摧雲間志為君苑中禽以示荀伯玉玉占之言帝不成行俄而帝卒復本任主病不食謝昌寓陳郡人也為劉悛廣州參軍孝性甚至嘗養一鵠昌寓病二旬而鵠二旬不食昌寓亡而鵠遂飛去南史孝義𫝊好鶴唳梁書曰庾域母好鶴唳域在位營求孜孜不怠一旦雙鶴來下論者以為孝感所致南史雄鶴赴雌湘東王修竹林堂新陽太守鄭裒送雌鶴於堂留其雄者尚在裒宅霜天月日無日不鳴啇旅江津聞者墮淚時有野鶴飛赴堂中驅之不去即裒之雄也交頸頡頑撫翼聞奏鐘磬翻然共舞婉轉低昻妙契絃節渚宫故事向影武成二年春二月雙白鶴飛集上林園大將鄭偉布戈設罝並皆禽獲六翮已摧雙心俱怨相顧哀鳴孤雄先絶孀妻向影天子愍焉立使庾信為讃英華自投􅌁毛煬帝大業二年太府少卿何稠課州縣送羽毛民求捕之網羅被水陸禽獸有堪氅眊之用者殆無遺類烏程有樹髙踰百尺旁無附枝上有鶴巢民欲取之不可上乃伐其根鶴恐殺其子自投氅衣投於地時人或稱以為瑞曰天子造羽翼鳥獸自獻毛羽隋書五行記集壇天皇東封鶴集其壇使諸州為老氏築宫號以白鶴杜光庭靈騐記病鶴李衛公逰嵩山見鶴呻吟曰我鳥仙為樵者傷脚得人血則愈李公解衣即刺血鶴曰世間少至少公且未是乃令㧞眼睷毛持往來都下但映眼照之即知矣李公中路自視乃馬頭也至東洛所遇非少悉非全人皆犬彘驢馬之類惟一老翁是人李公言病鶴之意老翁笑下驢宣臂刺血李公得之以塗鶴即愈鶴謝曰公即為明時宰相復當上昇相見非遥慎無懈惰李公謝鶴遂冲天而去逸史丹歌池州鳯凰山道士趙自然夢隂真君與柏葉一枝九疊食之因不食神氣異常為詩曰嘗欲棲山島閒眠玉洞寒丹歌時引舞來去跨雲鸞或問何名丹歌曰鶴也秘閣閒談萬花谷道士趙自然以丹歌為鳯秘閣誤放鶴徐州雲龍山西麓有放鶴亭宋山人張天驥所築也山人有二鶴旦則望山西而放暮則傃山東而歸因以為名跨鶴有客相從各言所志或願為揚州刺史或願多貲財或願騎鶴上昇其一人曰腰纒十萬貫騎鶴上揚州欲兼三者小説青田有沐溪野去青田九里中有雙白鶴年年生子長大便去只恒餘父母一隻耳精白可愛多云神仙所養浮丘公相鶴經云青田之鶴永嘉郡記曲頸而息龜鶴夀有千百之數性夀之物也道家之言鶴曲頸而息龜潜匿而噎此其所以為夀也服氣養性者法焉養生要論皂鶴平凉西有崆峒山乃廣成修道之所山之絶壁有石穴謂之皂鶴洞鶴頂如丹毛羽皆黒日照之金色燦所據其上有金衣亭歳不過一二出金其地乃為僧徒所據鶴或見則僧徒必有死亡返初者墨容揮犀青田朝鮮知異山中有異鶴洞其境虚曠四隅皆良田沃壤宜播殖惟青鶴栖息其中故以為名志登木玉策記云千歳之鶴隨時而鳴能登於木色純白腦盡成骨其未千歳者終不集於林也抱朴子蘭巖雙鶴榮陽郡西有蘭巖山常有雙鶴素羽皦然日夕偶形翔集𫝊云昔夫婦俱隠此山年數百歳化成此鶴忽一旦一鶴為人所害其一鶴歳常哀鳴至今嚮動巖谷莫知年歳王韶之神境記鵠鶴鵠即是鶴音之轉後人以鵠名頗著謂鶴之外别有所謂鵠故埤雅既有鶴又有鵠葢古之言鵠不口浴而白白即鶴也鵠名哠哠哠哠鶴也以龜龍鴻鵠為夀夀亦鶴也故漢昭時黄鵠下建章宫太液池而歌則名黄鶴神異經鶴國有海鵠其餘諸書文或為鶴或為鵠者甚多以此知鶴之外無别有所謂鵠也爾雅翼兵甲鶴左右脚裏第一指名兵爪孔雀火離火離為孔雀元命包影相釋氏書言孔雀因雷聲而孕酉陽孔雀不必配合正以音影相接便孕亦與蛇偶一云雌見雄舞而有子南越志或云雄鳴上風雌鳴下風亦孕博物志都䕶羅州山中多孔雀羣飛者數十為偶雌者尾短無金翠雄者生三年有小尾五年成大尾始春而生三四月後復凋與花萼相榮衰然自喜其尾而甚妬凡欲山棲必先擇有置尾之地然後止焉南人生捕者候甚雨往尾霑而重不能髙翔人雖至且愛其尾恐人所傷不復騫翔也雖馴養頗久見美婦人好衣裳與童子絲服者必逐而喙之芳時媚景聞管絃笙歌必舒張翅尾盻睇而舞若有意焉山谷夷民烹而食之味如鵝解百毒人食其肉飲藥不能愈病其血與其首解大毒南人得其卵使鷄伏之即成其脚稍屈其鳴若曰都䕶土人取其尾者持刀於叢篁可隠之處自蔽伺過急斷其尾若不即斷迴首一顧金翠無復光彩紀聞迎晨鳴和孔雀自背及尾皆作圓文五色頭戴三毛長寸以為冠足有距迎晨則鳴相和異物志來翔雲南郡出孔雀常以二月來翔月餘而去華陽國志方物交趾郡人多養孔雀或遺人以充口腹或殺之以為脯腊人又養其雛為媒傍施網罟捕野孔雀伺其飛下則牽網横掩之採其金翠毛裝為扇拂或全株生截其尾以為方物云生取則金翠之色不减嶺表異物志尾為車葢魏文帝詔朝臣曰前于闐王山習所上孔雀尾萬枚文彩五色以金根車葢遥望曜人眼解人語世祖時西域獻孔雀解人語彈指應聲起舞晉公卿賛銜衣檀道濟元嘉中鎮潯陽十二年入朝與家分别顧瞻城闕嘘欷涕零深識者是知道濟之不南旋也故時人為其歌曰生人作死别荼毒當奈何濟將發舟所養孔雀來銜其衣驅去復至如此數焉以十三年三月伏誅異苑中瑞宋武帝大明五年廣郡獻白孔雀以為中瑞述異記織毛為裘齊文惠太子蕭長懋性奢麗製珍珍之物織孔雀毛為裘光彩金翠過於雉頭逺矣南史本𫝊解舞貞元中新羅國獻孔雀解舞徳宗召邊鸞於𤣥武門寫貌一正一背翠彩生動金鈿遺妍若運清聲宛轉繁節畫斷辟惡李衛公言孔雀辟惡酉陽與蛇相偶盧肇住在京南海見從事王軒有孔雀一日一奴告曰蛇盤孔雀且毒死矣軒令救之其走卒笑而不救軒怒卒云蛇與孔雀偶耳紀聞鵲見蛇則噪而賁孔見蛇則宛而躍禽經九徳孔雀有九徳一顔貌端正二音聲清徹三行步庠序四知時而行五飲食知節六常念知足士不分散八少媱九知反覆佛以此喻比丘之行儀也増經珠毛孔雀尾端一寸名珠毛翣南蠻婆利左右持孔雀翣飾纛盤盤以孔雀羽飾纛南蠻盤盤𫝊家乳龜兹國孔雀羣飛山谷間人取養而食之家乳如鷄䳱其王家恒千餘隻後魏書毛綴龍腦孔雀毛著龍腦則相綴禁中以翠尾作帚每幸諸閣擲龍腦以避穢過則以翠尾帚之皆聚無有遺者亦若磁石引針琥珀拾芥物類相感然也墨莊謾録鴻鴈朱鳥能來能往者朱鳥之謂與鴈一名朱鳥法言朔禽謝靈運山居賦海鳥違風朔禽避凉荑生歸北霜降客南接響雲漢侣宿江潭注云朔禽鴈也寒月轉往衡陽禮記霜始降鴈來賓歳暮云鴈北向政是陽初生時荑生歸北霜降客南山宋書陽動鴈之言鴈鴈起聖以招期知晚蚤故鴈南北以陽動也春秋説題辭知時孟春之月鴻鴈來季秋之月鴻鴈來賓季冬之月鴈北鄉禮記白露之日鴻鴈來鴻鴈不來逺人背畔小寒之日鴈北鄉鴈不北鄉民不懷至周書為贄大夫執鴈取其候時而行也婚禮下達納采用鴈鄭𤣥云納其采擇之禮用鴈取順隂陽往來也周官以六禽作贄大夫執鴈以知保身儀禮贄用鴈者取其隨時南北不失其節明不奪女子之時也白虎通凡贄大夫用鴈鴈有類長者在民上必有先後鴈有行列故以為贄春秋繁露以鴈為贄有長㓜之禮説苑鴻翼桓公在位管仲隰朋見立有間有二鴻飛而過之桓公嘆曰仲父今被鴻鵠有時而南有時而北有時而闕聞弦者音烈而髙飛故瘡隕也楚䇿不鳴見殺莊子曰莊子行於山中見大木枝葉茂盛伐木者止其傍而不取也問其故曰無所可用莊子曰此木以不材得終其天年出於山舍於故人之家故人喜令豎子殺一鴈而烹之竪子請曰其一能鳴其一不能鳴請奚殺主人曰殺不能鳴者明日弟子問曰昨日山中之木以不材得終其天年今主人之鴈以不材死先生將何處莊子笑曰周將處夫材與不材之間莊山木張單雙災木鴈兩失宋明帝譬王彧𫝊鴻山闗定州唐縣中有鴻山闗者昔項羽於此闗見羣鴻乃誓衆曰我當南面必中其一乃引滿射之莫有中者乃折弓投地而去時知項羽終不能濟伐也朱鴈武帝太始三年幸東海獲赤鴈作朱鴈之歌其辭曰赤鴈集六紛員殊翁雜五采文紛員多也六數也翁鴈頸也員音云漢書五色宣帝於西河築世宗廟告祠有五色鴈集殿前上鴈門食鴈度遼將軍皇甫規解官歸安定鄉人有以貨買鴈門太守者亦去職還家刺謁見規規卧不迎既入而問卿前在郡食鴈美乎上隨逐虞固㑹稽典録曰虞固字季鴻少有孝行為日南太守常有鴈止宿㕔事上每行縣輒飛逐焉及卒官雁隨喪至餘姚墓前厯三年乃去謝承後漢書指鴻示使晉郭瑀燉煌人也張天錫使葢公明徴之瑀指翔鴻以示之曰此鳥也安可籠哉遂深逃絶迹公明拘其門人瑀嘆曰吾逃祿非避罪也豈得隠居行義害及門人乎乃出就徴隠逸傳白鴈集庭石季龍饗羣臣於大武殿前有白鴈百餘集於馬道南李龍命射之無所獲既將討三方諸州兵至者百餘萬太史令趙攬私於季龍曰白鴈集殿庭宫室將空不宜行也季龍納之晉載記鴈臣元魏時北夷酋長遣子入侍者常秋春去避中國之熱時人謂之鴈臣伽藍記鳬乙張融門律云道之與佛追極無二吾見道士與道人戰儒墨道人與道士獄是非昔有鴻飛天首積逺難亮越人以為鳬楚人以為乙人自楚越鴻常一耳齊顧歡𫝊夢射鴈建義陽城太守薛令伯聞太原王誅百官立莊帝棄城而走忽夢射得鴈以問楊元慎元慎曰卿執羔大夫執鴈君當得大夫之職俄而令伯除為諫議大夫伽藍記孤鴻賦盧思道周時為武陽太守位下不得志為孤鴻賦以寄情其序云有離羣之鴻為羅者所獲野人馴養貢之於余置諸池庭朝夕賞玩既用銷憂兼以輕疾大易稱鴻漸于陸羽儀盛也楊子曰鴻飛㝠㝠騫翥髙也淮南子曰東歸碣石違溽暑也平子賦云南翔衡陽避祁寒也若其雅步清音逺心髙韻鵷鸞以降罕見其儔而鎩翮牆隂偶形獨立唼喋粃稗鷄鶩為伍不亦傷乎余五十之年忽焉已至永言身事慨然多緒乃為之賦聊以自慰云北史十八贄用白鴈高宗太子𢎞納裴居道女為妃所司奏以白鴈為贄㑹苑中獲之帝喜曰漢獲朱鴈遂為樂府今獲白鴈得為婚贄彼禮但成謡頌此禮使首人倫異代相望無慙徳也裴氏甚有婦禮帝嘗謂侍臣曰東宫内政吾無憂矣舊唐雅翼漢武太子昏得白鴈為贄似誤陽鴈集嶺南大厯二年嶺南節度使徐浩奏十一月二十五日當管懷集縣陽鴈來乞編入史從之先是五嶺之外翔鴈不到浩以為陽為君徳鴈隨陽者臣歸君之象也唐㑹要朱落鴈朱漢賓少時善射嘗因與同輩出獵指一飛鴈隨矢而落其鏃中正其臆上貫一金錢有篆文示其郡之碩儒皆無識者人甚異之由是人皆號之曰朱落鴈晉史夢鴈員外郎趙化成嘗夢與友人張某坐庭中忽有一鴈自天而下徘徊庭中共掩得之明日詣張言之方坐庭中果有一鴈下於庭際因共逐而得之相與驚駭乃以帛為詩繫其足放去秘閣閒談鴈丘元裕之赴試并州道逢捕鴈者獲一鴈殺之矣其脱網者悲鳴不能去竟自投於地而死予因買得之塟之汾水之上累石為誌號為鴈丘與同行者楊正卿李仁卿俱為卿摸魚兒詞梅磵詩話𫝊書元郝經字伯常澤州陵川人世祖中統初拜學士充國信使宋館於真州凡十有六年始得歸先是有以鴈者獻公命畜之鴈見公鼓輒翼引吭似有所訴者公感悟擇日率從者具香案北向拜畀鴈至前手書尺帛親繫鴈足而縱之其詩曰霜落風髙恣所如歸期回首是春初上林天子援弓繳窮海纍臣有帛書後虞人獲之苑中以聞上惻然曰四十人留江南者曽無一人鴈比乎遂進師南伐越二年宋亡輟耕録二十鷹奴陽鳥也飛作八字在天人若張其一則飛行中缺一位也大曰鴻小曰鴈夜宿洲中鴻在内鴈在外遂更驚避備狐與人之捕已也物類相感志智禽智禽銜蘆以避網水牛結陣以却虎抱朴子夫鴈從風而飛以愛氣力銜蘆而翔以避弋繳淮南鴈自河北渡江南痩瘠能髙飛不畏繒繳江南沃饒每至還河北體肥不能髙飛恐為虞人所獲嘗銜蘆數寸長以防繒繳焉古今注愛力鴻鴈愛力遇風迅舉孔雀愛毛遇雨髙止禽經鴈曰翁鷄曰􅀢鶉曰䳸上捕鴈鴈宿於江湖之岸沙渚之中動計千百大者居其中令鴈奴圍而警察南人有採捕者俟其天色隂暗或無月時於瓦罐中蔵燭持棒者數人屏氣潜行將欲及之則累舉燭便藏之鴈奴警叫大者亦驚頃之復定又復前舉燭鴈奴又驚如是數四大者怒喙鴈奴秉燭者徐徐逼之更舉燭則鴈奴懼喙不復動矣乃高舉其燭持棒者齊入羣亂擊之所獲甚多淮南張凝評事事説云親曽採捕玉堂閒話取翅禦暑臨邑縣有鴈翅泊旁無樹木土人至春夏常於此澤羅鴈取其翅以禦暑酉陽治田上虞縣有鴈為民田春㧞野草根秋喙除其穢是以縣官禁民不得妄害此鳥犯則有刑無赦十三州記鴈浮山沮陽縣西北有鴈浮山是山經所謂景山也髙三十餘里周迴三百餘里修巖遐亘擢幹干霄鴈南翔北歸偏經其上土人由兹改山名焉荆州圖食粟鴈食粟翼重不能飛博物志毛囊鴻毛為囊可以渡江不漏異名􅕯加鵝倉􅕯鴈也廣雅自廣而東謂鴈􅕯鵝南楚之外謂之鵝或謂之倉􅕯方言鵝舒鴈舒鴈鵝爾雅私覿愉愉焉出如舒鴈金鵝海昏侯沈戎卒塟於烏程之金鵝山上有金鵝飛集三鳴而去其後沈氏通顯諺云金鵝鳴沈氏興後漢志鵞鬼景帝有疾使巫視鬼欲試之乃殺一鵝埋之於苑中駕屋施牀几以婦人服物著上乃使巫視之若能説此冢中婦形狀者加賞此巫視日竟晝夕無所道帝催問之急乃曰實不見有鬼但見一頭白鵞在墓上所以不即白疑是神鬼變化而作定無復改易不知何如景帝乃厚賜之抱朴吴志注觀鵞㑹稽有孤居老姥養一鵞鳴喚清長時王逸少為太守就求市之未得逸少乃擕親故命駕共往觀之姥聞二千石當來即烹以待之逸少既至殊喪往意嘆息彌日世説紅鵞山隂道士管霄霞求王羲之寫道徳經舉紅鵞一雙相贈而去後鵞冲霄飛去仙𫝊拾遺山隂有道士好養鵞羲之往觀焉意甚悦固求市之道士云為寫道徳經當舉羣鵞相贈羲之欣然寫畢籠鵞而去地出鵞董養字仲道太始初到洛下干禄求榮永嘉中洛城東北角廣里中地䧟中有二鵞蒼者飛去白者不能飛問之博識者不能知養聞嘆曰昔周時所盟㑹狄泉此地也卒有二鵞蒼者北色後胡入洛白者不能飛此國諱也王隠晉書食鵞知色符朗食鵞知黒白之處人不信既而試之果然秦記直五萬京下劉光禄養好鵞劉後軍從京師還鎮尋陽以一隻鵝為後軍别純蒼色頸長四尺許頭似龍此一隻鵞可堪五萬自後不復見有此類俗説殺鬭鵞桓南郡小兒時與諸從兄弟各養鵞共鬭南郡鵞每不如甚以為忿迺夜往鵞欄間取諸兄弟鵝悉殺之既曉家人咸以驚駭云是變怪以白車騎車騎曰無所致怪當是南郡戯耳問果如之失鵞𫝊承為江夏守有一隻鵞失之三年忽引導得三十餘頭來向承家異苑鵞女溪昔太元中章安郡史悝有駮雄鵞善鳴悝女常養之鵞非女不食荀僉苦求得之鵞輙不食乃以還悝又數日晨起失女及鵞隣家聞鵞向西追至一水唯見女一及鵞毛在水邊今名此水為鵞女溪廣古今五行記金色雄鵞義熙中羌中姚畧壞洛陽溝取博得一雙雄鵞並金色交頸長鳴聲聞於九臯養之此溝幽明録四尺九寸太康中得大蒼鵞從喙至足四尺有九寸體色豐麗鳴聲驚人三年而為暴犬所害晉沈充鵞賦序蒼鵝入帳胡蕃為髙祖從事征廣固累月及未㧞忽有鳥如鵞蒼赤色飛入髙祖帳裏皆駭愕蕃起賀曰蒼色赤色者戎虜戎虜歸我大吉之祥也明日攻城䧟之宋書隻鵞送别何逺為永康令人甚稱之太守王彬廵屬縣諸縣皆盛供帳以待焉至永康逺獨設糗水而已彬去逺送之拜斗酒隻鵞而别彬戯曰卿禮有過陸納將不為古人所笑乎南史鵞浦濟南郡張公城西北有鵞浦南燕世有漁人居水側常聴鵞聲而衆鵞中有鈴聲甚清亮候之見一鵞咽頸極長因羅得之項上有銅鈴綴以銀鏁有隠起元鼎元年字酉陽繫鵞求妾庾信自建康遁歸江陵湘東因賜妾徐氏妾與任掞通欲求之無致言者信庭前有一蒼鵞乃繫書於鵞頸視之乃掞啟遂題紙尾曰畜生乞汝三國典畧係木鵞髙祖義兵至河東隨將堯君素城守時圍甚急君素乃為木鵞置表於頸且論亊勢浮之黄河下河陽守者得之達於東都越王伺見而嘆息舊唐獻金鵞貞觀二十年吐蕃遣其大臣禄東賛奉表曰聖天子討髙麗奴纔聞陛下發駕少選之間已聞歸國鴈飛迅越不及陛下速疾奴沗預子婿喜百常夷矣夫鵞猶鴈也故作金鵞奉獻其鵞黄金鑄成髙七尺中可實酒三斛唐書鵞聴講經净影寺沙門慧逺講經初在鄉養一鵝常隨逺聴經及逺入京留在寺晝夜鳴叫不止僧徒送入京至此寺大門放之自然知逺房便入馴狎每聞講經即入堂伏聴若聞泛説他事則鳴翔而出如是六年忽哀叫庭宇不肯入堂二旬而逺卒寺内有逺碑亦述其事兩京記向天歌駱賓王七歳詠鵞云鵞鵞鵞曲項向天歌白毛浮緑水紅掌撥清波唐詩紀事長生鵞久視年中越州有祖録事不得名早出見擔鵞向市中者鵞見録事頻顧而鳴祖乃以錢贖之至僧寺令牧為長生鵞竟不肯入寺但走逐祖後經坊厯市稠人廣衆之處一步不妨祖牧養之左丞張錫親見其親也僉載孝鵞天寳末徳清沈朝家有鵞育卵而腸出以死其雛悲鳴不復食啄敗薦覆之又銜雛草母前若祭奠狀長吁數聲而死沈氏異而埋之後人因呼為孝鵞寰宇記十萬錢僖宗好鬭鵞數幸六王宅興慶池與諸王鬭鵞一鵞值五十萬錢税雙卵鵞李先主以國用不足税民間鵞卵出雙子者柳花為絮者伶人獻詞云惟願普天多瑞慶柳條結絮鵞雙生聞見録祈雨宋祈雨雪法擇靈祠為壇取白鵞割項盛血并鵞奠之次日俱於壇前瘞之事實東坡云鵞能警盜亦能却蛇且又有祈雨之厄悲夫志林毛煖南道酋豪多選毛之細毛夾以白布絮而為被復縱横衲其温柔不下於挾纊也俗云鵞毛柔煖而性冷宜履嬰兒辟驚癎也嶺南異物志差翅鵞見異類差翅鳴鷄見同類附翅鳴禽經鴨舒鳬鶩鴨也一名舒鳬李巡曰野曰鳬家曰鶩禮記内則辨鳥之不可食者云舒鳬翠爾雅䟽王勃滕王閣序落霞與孤鶩齊飛是又以鶩為野鴨矣摯周官庶人執鶩鄭曰鶩取其其飛遷説苑曰鶩無他心故庶人以為摯曲禮曰庶人之摯匹匹鶩也脛短鳬脛雖短續之則憂鶴脛雖長斷之則悲莊權二無復什復禮書云續晨鳬之足鑿混沌之竅鷄伏鷄伏鴨卵鶵或入水鷄母隨岸呼之鶵出而不隨母鴨鷄異類能相隨也風俗通青鴨帝昇望月臺時暝望南端有三青鴨羣飛俄而止於臺上帝悦之至夕鴨宿於臺端日色已暗帝求海肺之膏以為燈焉取靈􅀈布為纒火光甚微而光色無幽不入青鴨化為三小童皆着青絹文繻各握鯨文大錢五枚置帝几前身止影動因名輕影錢升渠鴨𤣥都翠水中有鴨丹毛而輕登於英渠唼露而食名曰升渠鴨洞㝠記鶩當鳬張湯欲以鶩當鳬祀宗廟董仲舒曰鶩非鳬鳬非鶩愚以為不可繁露鳬藻杜詩光武上䟽云陛下起兵十有三年將帥和睦士卒鳬藻注云言其和睦和悦如鳬之戯於水藻也後漢桓帝時劉陶上議曰聖王承天制與與人行止建功則衆悦其事興戎而師樂其旅是故靈臺有子來之人武旅有鳬藻之士注武旅周武王之旅鳬得水藻言喜悦也上捨車道往路鳬藻馳目成顔延年秋胡詩鳬興藻抃獨瑩心靈梁簡文公圃園頌序孝感頓琦至孝母喪感慕哀聲不絶有飛鳬白鳩棲廬側見人即去見琦而留又丁宻遭父艱致飛鳬一雙㳺廬旁小池見人則馴附如家所畜後遭母喪宻歸至所居一宿故雙鳬復㳺戱池中廣州先賢𫝊求鬭鴨魏文帝遣使求鬭鴨羣臣宜奏勿與權曰彼在諒隂中所求若此豈可與言禮哉具以與之江表傳用此何為建昌侯孫慮於堂前作鬭鴨欄頗施小巧陸遜正色曰君侯勤覧經典用此何為慮即毁之吴志設樂羣翔吾嘗㑹賓設樂天忽雲興繼以大雨有羣鶩成列飛翔而過此偶耳何異𤣥鶴二八也唐子辨海鳬毛人有得鳬鳥毛長三丈以示張華華見曰不然此謂海鳬毛也出則天下亂博物志烏衣人栢邈為汝南郡人齎四烏鴨作禮大兒夢四烏衣人請命覺忽見鴨捋殺遂救之買肉以代施夢四人來謝而去夢雋白頭翁周訪少時與商人共入宫亭廟宿起如厠見一白頭翁昉逐擒之化為雄鴨昉捉還船欲烹之因而飛去後亦無他述異記狸咋鬭鴨齊王祐太宗第五子好養鬭鴨方未反前忽有野狸入籠中咬四十餘鴨皆斷其頭去及敗同惡而誅者四十四人舊唐費鴨被鞭唐安南郡都䕶登祐詔州人也家巨富奴婢千人莊田綿亘口腹自供未嘗設客孫子將鴨費用祐以擅破家私鞭二十僉載鴨金廣州浛洭縣金池王家有養鵞鴨池嘗於鴨糞中見麩金遂多收掏之日得一兩縁此而致富貴子孫皆為使府劇職三世後池即無金王氏力殫矣嶺南異物志陳懷卿嶺南人也養鴨百餘頭後於鴨欄中除糞糞中有光爚然試以盆水沙汰之得金十兩乃覘所食處於舍後山足下土中有麩金銷得數千金遂巨富禽載緑頭鴨李逺為杭州刺史嗜㗖緑頭鴨貴客經過無他饋餉相厚者乃緑頭鴨一對而已志林自呼名陸龜蒙居震澤之南巨積莊有鬭鴨一欄有驛使過挾彈斃其尤者龜蒙手一表云此鴨能作人語待附蘇州上進使者奈何斃之使人恐以槖中金酬之俟其稍悦徐問其人語魯望曰能自呼其名耳使人憤且笑拂袖上馬復召之還其金曰吾戯耳葆光録争藻太祖車駕幸城南園臨水亭見雙鳬争藻戯於池面引弓射之一發而雙貫從官歡呼拜賀上命翰林繪工寫之縑素周書白纓水戰之鴨何必白鸚盈俎之鷄何必長鳴蔡氏清經青纓之鴨翰音之鷄望視之白蹄之豕短喙之狗修頸之鳥君子之貌何獨異耶太元經養鴨方君云養鴨者每年五月五日不得放棲只喂乾食不得與水吃則日日生卵不然或生或不生凡家用此法其卵未有一日缺一法以土硫黄拌糓飼之易肥瑣碎録海鴨海鴨大如常鴨斑白文亦謂之文鴨金樓子露華鶩野鴨雄者赤頭有似鶩生百卵一日再生有露華鶩以秋冬生卵並出蜀晨鳬而耐寒宜為臛廣志松鳬化䝉縣祠山上有池池中有松鳬如金野鳬棲息松間故俗謂之松鳬南越志金羮蜀廣安有金羮玉飯紅腊紫黎金羮謂鴨也鷄時夜鷄一名時夜古今注玉衡精玉衡星散為鷄逺雅頌著倡優則雄鷄五足春秋運斗樞積陽鷄為積陽南方之象火陽精物炎上故陽出鷄鳴以類感也雞之為言佳也佳而起為人期莫寶也説題辭巽為鷄九家易曰應八風也風應節而變變不失時鷄時至而鳴與風相應也二九十八主風精為鷄故鷄十八日剖而成雛二九順陽厯故鷄知時而鳴也蜀鶤鷄大者蜀蜀子雜未成鷄曰僆絶有力奮鷄三尺為鶤棲於杙為桀鑿垣而棲為塒爾雅司時京房易𫝊曰鷄知時劉向云鷄者小畜主司時起居人師古曰至時而鳴以為人起居之節漢五行志應旦鷄應旦鳴考異郵竇憲論曰當青病奴僕之時竇將軍念咎之日乃庸力之不暇思鳴之無晨後書武選令云諺云候晨之鷄思補更鳴魏志諸葛瑾理周瑜子𦙍使失旦之鷄復得一鳴抱罪之臣展其後效吴志鳯為黄帝之時以鳯為鷄徐整正厯木鷄紀渻子為周宣王養鬭鷄十日而問鷄可鬭已乎曰未也方虚驕而恃氣十日又問曰未也猶應影嚮十日又問曰未也猶疾視而盛氣十日又問曰幾矣鷄雖有鳴者已無變矣望之似木鷄矣其徳全矣異鷄無敢應者反走耳列子先鳴齊莊宗朝指殖綽郭最曰是寡人之雄也州綽曰君以為雄誰敢不雄然臣不敏平隂之後先二子鳴襄二十五戰如鬭鷄勝者先鳴尸子日膳公膳日雙鷄饔人竊更之以鶩御者知之則去其肉而以其洎饋子雅子尾怒慶封告盧蒲嫳盧蒲嫳曰譬之如禽獸吾寢處之矣襄二十八憚犧賓孟適郊見雄鷄自斷其尾問之侍者曰自憚其犧也昭二十二金距季郈之鷄鬭季氏介其鷄郈氏為之金距昭二十五季氏與郈氏鬭鷄郈氏介其鷄而季氏為之金距季氏之鷄不勝季平子怒因侵郈氏之宫而築之郈昭伯怒譛之魯昭公使昭伯將卒以攻之仲孫氏叔孫氏救之郈昭伯不勝而死昭公奔齊故禍之所從生者始於鷄足及其大也至於亡社稷淮人間五徳田饒謂魯哀公曰夫鷄頭戴冠者文也足摶距者武也敵在前敢鬭者勇也見食相呼者仁也守夜不失時者信也鷄有五徳也韓詩吳均云鷄有呼羣之徳鹿有食苹之美死化朱文繡與羅子鍾為友俱仕於梁文繡既死羅子鍾哭之其夜俱亡梁南七里有山塟繡於其中北九里有澗埋鍾於其内繡神靈變為鷄鍾魂魄化為雉清鳴哀響往來不絶故詩曰鷄山别飛響雉澗和清音異苑鼎烹鷄白圭對魏王曰帝丘之鼎以烹鷄多洎之則淡不可食少炙之則焦而不熟也吕覧蔡邕荐邊讓於何進曰𫝊曰函牛之鼎以烹鷄多汁則淡而不可食少汁則熱而不可熟後書連鷄秦惠王謂寒泉子曰蘇秦欺弊邑欲以一人之智反覆山東之君夫諸侯之不可一猶連鷄之不能俱止於棲也戰國䇿呼鷄祝祝祝鷄翁雒陽人居尸鄉北山下養鷄百餘牢闕短鳴魏文帝遣使求長鳴短鳴鷄羣臣以非禮砍不與孫權敕付之吴録連鷄莞營殷浩以江逌為長史及丁令反叛浩令逌伐之乃取數百鷄以長繩連之脚皆繫火一時驅放羣鷄駭散飛過壍集莞營皆燃因其驚亂縱兵擊之晉中興書用卵支遁㓜時嘗與師共論物類謂鷄卵生用未足為殺師不能屈師尋亡忽現形投卵於地㲉破雛行頃之俱滅遁乃感悟由是䟽食終身髙僧傳四𤣥致兖州刺史沛國宋處宗嘗買一長鳴鷄愛養甚至恒籠置忩前後鷄作人語與處宗論極有𤣥致終日不輟處宗因此功業大進幽㝠録黄卵烏伏晉袁喬妻于氏上表論養子議曰鄙諺有之黄鷄生卵烏鷄伏之但知其為烏鷄之子不知為黄鷄之兒小可以喻大通典荒鷄祖逖與劉琨為司州主簿情好綢繆共被同寢中夜聞荒鷄鳴逖蹴琨覺曰此非惡聲也因起舞晉書雀登背晉元帝未登極有三雀共登一雄鷄背三入安東府㕔事占者當三進爵為天子也洞林有將雛鷄雀集其前皆驅去復至於再三宋書家棲裴景仁符秦書曰符健皇始四年冬山鷄束入人家棲宿養子而去羣聚傍渭水而㳺翔與家鷄無異夜鳴符堅將入冦江右其妾張氏諫云諺言鷄夜鳴者不利行師犬羣嘷者宫室必空兵動馬驚軍敗不歸秋冬以來羣犬皆嘷衆鷄夜鳴廐馬驚逸武庫兵器有聲願詳思之堅不聴晉傳知鷄露棲符朗善知味㑹稽王道子殺鷄以食之既進朗曰此鷄棲常半露檢之騐焉上長鳴請命凉州罪人於市將刑忽有一白雄鷄飛於人邊請命引頸長鳴伏地向吏驅之去輒來刺史張義免其坐西河記頭鳴盤中徐州人吴清以大元五年差征殺鷄求福置頭盤中忽然而鳴後得賊帥邵寶首以功拜清河太守越自行伍猥䝉榮位鷄之妖更為祥甄異記鷄卵賦謝朏莊子也宋孝武初為吴興以鷄卵賦人收鷄數千及遁節不全為清談所少南史四足四翼崔光字長仁正始元年夏有典事史元顯獻四足四翼鷄詔趙邕以問光光表曰翅足衆多羣下相扇動之象雛而未大脚羽差小其勢尚微易制御也帝大悦後數日茹皓等並以罪伏法於是禮光逾重後魏和沐梁時有人常以鷄卵白和沐使髪光黒每沐輒破二三十枚臨終但聞髪中啾啾數千鷄雛之聲翻譯白團周武帝好食鷄卵㧞虎為監膳儀同開皇中死而復蘇云被攝證武帝白團事儀同不識左右告曰名鷄卵為白團也㝠報記戴冠郎汴人張琦家有女子入夜哀痛白日即安已經年歳王勣至其家停宿聞女子聲開口鏡照之痛者曰戴冠郎被殺其病者牀下有大雄鷄死矣乃是主人七八歳老鷄異聞集勃公子韓琬與張昌宗王本立同逰太學博士姓張即昌宗之族叔精五經懵於時事畜一鷄呼為勃公子愛之不已每講集輒巢於學徒中或攫破書叱逐之必被嗔責昌宗嘗為此鷄被杖本立與琬不平曰為公殺此鷄張生索取學徒回殘食料本立以業長乃見問合否本立曰明文案即得張生喜每日受之皆立文案他日張生請假本立舉牒數鷄罪殺而食之及張生歸學不見鷄報已殺之大怒云索案來見數鷄之罪張以手再三拍案曰勃公子有案時更知何道當時長安以有案動為口實御史臺記鷄肆長安富民羅㑹以剔糞目業里中謂之鷄肆言若歸之因剔糞而有所得也㑹世副其業家財巨萬有士人陸景𤾉㑹邀過所止館舍甚麗入内梳洗衫又極鮮屏風氊褥烹宰無所不有景陽問曰主人即如此快活何為不罷惡事㑹曰吾中間停廢一二年奴婢死亡牛馬散失復業已來家園稍遂非情願也分合如此僉載鷄不三年渤海髙疑巨富忽患月餘日帖然而卒心口仍煖經日而蘇云有一白衣人眇目把牒㝠司訟殺其妻子嶷對元不識此老人㝠官云君命未盡且放還遂悟白衣人乃是家中老瞎麻鷄也令射殺魅遂絶上捜神記王子珍父事同鷄不三年犬不六載烏衣婦人衛鎬為縣官下縣至里人王幸在家方假寐夢一烏衣婦人引十數小兒着黄衣咸言乞命叩頭再三須㬰又至鎬甚惡其事遂催食欲前適鎬所親者報曰王幸在家窮無物設饌有一鷄見抱兒已得十餘日將欲殺之鎬方悟烏衣婦人果烏鷄也遂命解放是後復夢感欣然而去僉載靈鷄唐杭州徑山釋法欽姓朱氏嘗養一鷄不食生類隨之若影不㳺他所其入長安長鳴三日而絶今鷄冢在山之冢宋高僧傳日烹五十楚馬殷王希聲立嘗聞梁太祖好食鷄慕之日烹五十鷄以供膳塟殷希聲不入泣頓食鷄肉數器而起潘起曰昔阮籍居喪而食蒸豚世豈乏賢耶五代史天鷄東南有桃都山上有大樹曰桃都枝相去三千里上有天鷄日初出照此木天鷄即隨之𤣥中記温庭筠詩漏轉霞髙滄海暗頗黎枕上聞天鷄羊溝羊溝之鷄三歳為株相者視之則非良鷄也然而時勝人者以狸膏塗其頭也注羊溝鬭鷄處株魁師也鷄畏狸膏莊子郭璞爾雅注陽溝巨鶤古之名鷄龍鄉允吾縣者宋雜陳楚地故梁國寧陵種龍鄉也今闕四距重翼鷄有四距重翼者龍也殺之震死白澤圖覆卵鷄鶩覆卵忌磨物類相感志工商執鷄工商執鷄周禮大宗伯取其守時而動也鄭𤣥注屬陽野鷄屬隂先嗚而後鼓翼家鷄屬陽先鼓翼而後鳴相感志鷄亷狼吞鹽鐡論鑚籬僧家謂鷄為鑚籬菜金骹鷄有胡髯五指金骹反翅之種大者蜀小者荆白鷄金骹者美并州所獻吳中送長鳴鷄長倍於常鷄永昌郡無鷄廣志石鷄白水南行十餘里有鷄山傍有大山竦上有石鷄冠距如生道士李鎮於此下住常寶玩之鷄一旦忽摧毁鎮告人曰鷄卒如此吾其終乎因與親知訣别後月餘果卒似知命云周景式廬山記兊畜徐季龍曰世有軍事則感鷄雉先鳴何也管輅曰夫鷄者兊之畜金者兵之精雉者離之鳥獸者武之神故太白揚輝則鷄鳴熒惑流行則雉驚各感類而動别傳雉介鳥雉介鳥也禽經雉耿介之鳥韓詩耿介而一志者雉也劉禹錫明贄論士執春官大宗伯曰士執雉鄭𤣥注云取其守介不失節儀禮士相見曰相見之禮各用雉注取其耿介交有時别有倫也雉異雉有十四種鸕諸雉鷂雉鷮雉􅀈雉鷩雉秩秩海雉鸐山雉雗雉鵫雉雉絶有力奮伊洛而南素質五彩皆備成章曰翬江淮而南青質五彩皆備成章曰鷂南方曰東方曰鶅北方曰鵗西方曰鷷説文爾雅林慮山下人語曰四足之美有鹿兩足之美有鷮詩義疏雷動而雊雷始動雉鳴而雊其頸説文蔡邕月令云雷在地中雉性精剛故獨知之應而鳴也漢五行志撞鐘於遲郊雉皆雊注鐘聲似雷震淮南矩信雀交不一雉交不再禽經雉不再合信也化書機星散機星散為雉運斗樞䟽趾祭宗廟雉曰䟽趾曲禮華蟲日月星辰山龍華蟲書華蟲鷩雉也注楊炯冕服議華蟲者雉身被五彩象聖人體兼文明也舊唐丹鳥郯子曰少皥贄之立也鳯鳥適至故紀於鳥為鳥師而鳥名丹鳥氏司閉者也五雉為五工正昭十七飛昌耳武丁祭成湯有雉飛升鼎耳而雊祖已曰雉者野鳥升於鼎者欲為用也逺方將有來朝者乎武丁思先王之道絲髪重譯至者六國尚書大𫝊大𫝊云髙宗祭成湯之廟有雉升鼎耳而鳴髙宗問祖乙祖乙曰逺方君子殆有至者祖乙見雉有似君子之行今從外來則曰逺方君子將有至者矣論衡雉尾扇商髙宗有雉雊之徴章服多用翟故有雉尾扇古注獻白雉周成王時越裳獻白雉云京師三萬里王者祭祀不相踰晏食袍服有節則至援神契白雉有種南越尤多今之九徳則古之越裳也成王以為瑞者貴其所自來之逺明其徳化所被之廣謂此為奇也抱朴子煑食白雉渤海王髙歡攻鄴時瑞物無歳不有令史焚連理木煑白雉而食之三國典畧銜環魯昭公時白雉銜環入感精符雉之為言弟也喻昭公弟為季氏入為君也注奉雉叔孫豹奔齊及庚宗遇婦人使私献以雉為食而宿焉及歸所宿庚宗之婦人問其姓曰予子長矣能奉雉而從我矣乃召見之號之曰牛昭四謁由捧雉孕本貿絲因家乏主遂登顯秩晉書王浚論集庭兆祥有鳥飛從南方來質白五色皆備集平公之庭相見如讓公召叔嚮問之叔嚮曰吾聞師曠曰西方有白質鳥五色皆備其名曰翬南方赤質五色備其名曰摇來為吾君臣其祥先至矣瑣語諫射孫休好射雉至其時則晨往夕返羣臣莫不上諫曰此何物何足甚躭荅曰雖為小物耿介過人朕之所以好也語林休鋭意於典籍欲畢覧百家之言大好射雉春秋之間常晨出夜還惟此時捨書吴志焚雉頭裘太醫司馬程據上雉頭裘詔於殿前燒之晉咸康起居注蛇化司馬軌之善射雉太元中將媒下翳此媒屢雊野敵亦應試令尋覔所應者頭翅已成雉半身後故是蛇晉中朝武庫内忽有雉時人咸謂為怪張司空云此蛇之所作耳即披庫中果得蛇蜕異苑繡衣丈夫後魏裴安祖曽行值天熱舍於樹下有鷙鳥逐雉雉急投之遂觸樹而死安祖愍之乃取置隂地徐徐䕶視良久得蘇喜而放之後夜忽夢見一丈夫衣冠甚偉著繡衣曲領向安祖再拜安祖怪而問之此人云感君前者見放故來謝徳聞者異之北史射雉無得禇炫從宋明帝射雉至日中無所得帝時猜羞召問侍臣曰吾旦來如臯遂空行可笑座者莫荅炫獨曰今節候雖適而雲露尚凝故斯翬之禽驕心未警但得神駕㳺豫羣情便為載懽帝意解乃於雉場置酒南齊書廣置射場齊東昏侯在位置射雉場二百九十六處翳中帷帳及步障皆祫以緑紅錦金銀鏤弩牙瑇瑁帖箭每出輒與鷹犬隊主徐令孫媒翳隊主俞靈韻齊馬而走左右争逐之南史雉媒梁臨賀王正徳其妹長樂公主太子家令謝憘之妻也姿容國色悦而私之生子二人乃燒主第投婢於火唱言主死黄門郎張凖有雉媒正徳見而奪之準於重雲殿法㑹所罵之曰張準雉媒非長樂公主何可畧奪太子綱恐梁王聞遣武陵王紀急相解喻準罵乃止正徳即以雉媒還之三國典畧聴經生人道陳宣帝時釋僧安住王室山講涅槃有雌雉伏聴三卷未了遂絶不至安曰雉生人道矣安至越州人家喚雌雉一女走出如舊相識父母異之引安設食其父言見此女生時髪如雉毛因以為名安大笑為述本縁釋氏通釋雌雉雊則天初誕之夕雌雉皆雊遼澤𤣥宗賜安禄山品目有遼澤野鷄酉陽二雉雊寢髙駢進東面都統中和二年五月雉雊於揚州廨舍㑹二雉雊寢占者曰野鳥入室軍府將空駢心惡之其月盡出兵於東塘結壘而處如赴難之勢凡百日復還廣陵葢禳雊雉之異也舊唐翟雉翟雉長尾雨雪惜其尾棲髙樹杪不敢下食往往餓死博物志候隂晴商人置雉尾於舟中之止以候隂晴天當晴則尾直竪天將雨則尾下垂中和集畜樊澤雉十步一啄百步一飲不畜於樊中莊子擅澤鷄有専棲之雄雉有擅澤之鷮蟻有兼弱之智蜂有攻巢之計相役御亦猶是耳抱朴子羽葢天子金根車馬上挿以翟毛皇后法駕乗重翟羽闕相𫝊泰姓仁恕徳感禽獸初塟時有羣鷰數千銜土於塚獨髙大與他有異村鄉歳時迄今祭祀蘇州塚墓記吐豆丞相薛宣對曰茂陵寢上食日𤣥鳥來集吐所含大豆紫黒色翺翔殿上此陛下永與天無極天下天下幸甚漢書名臣奏識燕語安清字世髙安息國王太子也漢桓帝時人聰敏博學鳥獸之聲無不綜達嘗行見羣燕忽謂伴曰燕云應有送食者頃之果有致焉衆咸奇之金徳魏禪晉之歳北闕下有一白燕以為神物以金為籠置於宫中旬日不知所在論者以晉金徳之瑞昔師曠時有白燕來巢檢瑞應圖果如所論白色叶於金徳師曠事晉古今之議相符矣王子年拾遺食蟄燕中原喪亂鄉人遂共推郗鍳為主與千餘家避難於魯國嶧山山有重險百姓飢饉野無生草掘野䑕蟄燕而食之晉中興書頭有竪毛慕容儁時燕來於儁正陽殿之西椒生三頭頭上有竪毛凡城獻異鳥五色成章儁謂羣僚曰是何祥也咸稱燕者燕鳥也首有毛冠者言大燕龍興冠通天章甫之象也巢正陽西椒者言至尊臨軒朝萬國之徴也三子者數應三統之騐也神鳥五色言聖朝將繼五行之籙以御四海者也儁覧之大悦載記白燕元嘉元年七月有白燕集於齊郡逰翔庭宇經九闕貞燕元元貞二年雙燕巢於燕人柳湯佐之宅一夕家人舉燈照蝎其雄驚墮為猫所食雌徬徨悲鳴不已朝夕守巢哺諸雛成翼而去明年雌獨來復巢其處人視巢上二卵疑其更偶徐伺之則抱雛之殻耳自是春去秋來鷙水底燕凡狐闕䑕之類燕見之則毛脱或言燕鷙於水底舊説燕闕室是井之虚也取桐為男女各一投井中燕必來㳺波㳺波鳥燕也新効云海竭江枯投游波而立泛言江海乾投燕於其中水立漲物類相感志處帷天下無道攻擊不已甲生蟣虱燕雀處帷幄韓子鴿上肩崔光曽於門下省晝讀經有鴿飛集膝前遂入於懷縁臂上肩久之乃去道俗賛詠詩頌者數十人後魏書求鴿羽北齊李繪字敬文河間太守崔諶恃其弟暹勢從繪乞麋角鴿羽繪荅書文鴿有六翮飛則冲天麋有四足走便下海下官膚體䟽懶手足遲鈍不能近追飛走逺事佞人北史李靈𫝊蒼鴿蜀有蒼鴿狀如春花越絶書赤鴿楊素見赤鴿映棘髙二尺隋書鴿兒并州石壁釋明度者貞觀末有鴿巢楹乳二雛度每以餘粥就哺之曰乗我經力羽翼速成忽一日學飛墮地俱殞度為瘞之旬餘夢二小兒曰兒本鴿也今轉生寺東某家矣度信訪求果孿生二子入視之呼曰鴿兒一時迴顧應諾後俱成立焉宋髙僧傳平安信大理丞鄭復禮言波斯舶上多養鴿鴿能飛行數千里輙於一隻至家以為平安信飛奴張九齡少年時家養羣鴿每與親知書信往來只以書繫鴿足上依所教之處飛往投之九齡目之為飛奴時人無不愛訝開元遺亊投懷陳誨嗜鴿馴養千餘隻誨自南劍牧拜建州觀察使去郡前一月羣鴿先之富沙舊所無孑遺矣又嘗早衙有一鴿投誨懷袖中為鷹所擊故誨感之之不復食鴿南唐近亊宫中養髙宗紹興間宫中養鴿每日羣飛於外太學士人以諷其詩流於大内髙宗惻然惻然自是宫中不復畜鴿其詩云萬鴿飛翔繞帝都朝昏收放費工夫何如養取雲邊鴈沙漠能𫝊二聖書古杭雜記縱鴿張浚嘗按視曲端軍執撾以軍禮見闐無一人公異之謂欲㸃視端以所部五軍籍進公命㸃其一部於廷間開籠縱一鴿以往而所㸃之軍隨至張為愕然既而欲盡觀於是悉縱五鴿則五軍頃刻而集戈甲煥燦旗幟精明魏公雖奬而心甚忌之齊東野語雀瑶光星散瑶光星散為雀運斗樞嘉賓季秋之月候鴈來賓雀入大水為蛤吕淮賓雀者老雀也栖宿人家堂宇之間有似賓客故謂之賓雀許高注雀一名嘉賓古今注九月雀不入水則多淫泆周蒙續古今注化蛤趙簡子曰雀入於海為蛤雉入於淮為蜃惟人不能哀夫國語千歳之雉入海為雉百年之雀入江為蛤捜神記火化秦穆公出狩至於咸陽日稷庚午天震大雷有火下化為白雀銜籙丹書集於公車公俯取其書言繆公之霸也訖胡亥秦家世事尚書中候探雀齊景公探雀􅀢弱反之晏子再拜賀曰吾君有聖人之徳矣探雀􅑹弱故反之是長㓜也育禽獸而若此况人乎晏子黄口孔子見羅者所得雀皆黄口也孔子曰黄口盡得大雀獨不得何也羅者對曰黄口從大雀者不得大雀從黄口者得孔子顧謂弟子曰君子慎所從家語獻雀邯鄲民以正月日獻雀於趙王而綴以五彩止肩北史曰潘樂字相貴初生有一雀止其母左肩占者咸言富貴之徴因名相貴後以為字北齊書解鳥語侯瑾字子瑜解鳥音嘗出門見白雀與羣雀同行慨然嘆曰今天下大亂君子小人相與雜居燉煌實録入懷髙祖於太原斬王威有白雀飛入髙祖之懷唐書食􅀈蚄開元二十二年秋八月甲申幽州長史張守珪榆闗界内􅀈蚄蟲食田稼曼延入平州俄頃有羣雀來食此蟲一日食盡平州稼穯無有傷者上知更雀裴耀卿勤於王事夜看案牘晝決獄訟嘗養一雀每夜至初更時有聲至五更則急鳴耀卿呼為知更雀又於􅈦前有一桐樹至曉則有羣鳥翔集以此為出㕔之候故呼為報曉鳥時人美焉開元遺事銜錢右驍衛大將軍張籛始在雍州因春景舒和出逰近郊憇於大塚之上忽有黄雀銜一銅錢置之而去未幾復於衙院晝卧見二雀相鬭畢各銜一錢落於前籛後以所三三錢嘗祕於巾箱識者以為大富之徴右晉書夷中無熙州有唐碑宋朝未下時一日有家雀數千集其上人惡之曰豈此地將為漢有耶因焚之葢夷中無此禽也已而果然邵氏聞見録雀盲雀皆至夕而不見物人有至夕昏不見物者謂之雀盲是也鵂鶹夜察毫末晝暝目不見丘山殊性感應經天中記卷五十八
