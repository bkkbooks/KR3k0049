body:
  text: 天中記卷二十二明陳耀文撰頭頭頭獨也處體高而獨尊也首始也釋名首頭也顝碩顒頒𩔖大頭也顆小頭也説文神居頭者神所居上圓象天氣之府也嵗必十二故人頭長一尺二寸元命苞精主頭者精明之主也素問牛首神農牛首伏羲人頭蛇身帝系譜長頭湯長頭而寡髪晏子投棘豎牛奔齊孟仲之子殺諸塞闗之外投其首于寧風之棘上昭二沈首景公田於梧丘夜坐睡夢見五丈夫倚徙稱無罪公問晏子曰昔先公靈公出畋有五丈夫來驚獸悉斷其頭而葬之命曰丈夫丘命人掘之五頭具在公令厚葬之晏子飲器知伯兼范中行而攻趙不已韓魏反之軍敗晉陽身死高梁之東趙襄子最怨智伯漆其頭以為飲器國䇿智伯身死三國分其首以為杯韓子此智伯之所以國亡而身死頭為飲杯之故也韓子難二襄子擊智伯斷其頭以為觴吕覽義賞智伯遂卒被分漆其首以為溲器韓喻老三頭相咬眉間尺逃楚入山道逢一客客問曰子眉間尺乎答曰是也吾能為子報讐尺曰父無分寸之罪枉被荼毒君今惠念何所用耶客曰須子之頭并子之劔尺乃與頭客與王王大賞之即與鑊煮其頭七日七夜不爛客曰此頭不爛者王親臨之王即看之客於後以劍斬王頭入鑊中二頭相齧客恐尺不勝自以劍擬頭入鑊中三頭相咬七日後一時俱爛不可識别乃分其湯肉而葬之今在汝南北宜春縣界名曰三王冡也吳越春秋魏惠王徙都于宋城號梁王為眉間尺任敬所殺三人同葬故謂三王陵晉北征記小頭白起平原君勸趙孝成王受馮亭王曰受之秦兵必至武安君必將誰能當之者乎對曰澠池之㑹臣察武安君小頭而面鋭瞳子白黒分明視瞻不轉小頭而面鋭者敢斷決也瞳子白黒分明者見事明也視瞻不轉者執志强也可與持久難與爭鋒亷頗為人勇鷙而愛士知難而忍恥與之野戰則不如持守足以當之王從其計嚴尤二將敘持頭往謝周末巴國有亂巴國將軍㬅子請師於楚許以三城楚王與師㬅子既平巴國既而楚遣使請城㬅子曰吾城許予之君矣持頭往謝楚王城不可得乃自刎以頭與楚子楚子嘆曰吾得臣若巴㬅子何以城為乃以上卿禮葬㬅子頭巴國葬其身亦然譙周三巴記刎墮荆軻謂樊於期曰今得將軍之首與燕地圖秦王必喜而見軻軻將左手把其袖右手椹其腰則將之積忿除矣於是起扼腕執刀曰是日夜所欲而今同命於是自刎頭墮背後兩目不瞑以函盛於其首與軻入秦燕丹子無頭佳漢武時蒼梧賈雍為豫章太守有神術出界討賊為賊所殺失頭雍上馬還營營中咸走來視雍雍胷中語曰戰不利為賊所殺諸君視有頭為焦無頭佳乎吏泣曰有頭佳雍曰不然無頭亦佳言畢遂死録異傳花敬定長安人至德中從崔光逺入蜀討段子璋有功封嘉祥縣公後又平冦單騎鏖戰已喪其元猶騎馬荷戈至鎮下馬沃盥適浣沙女語云無頭何以盥為遂僵仆居民葬之溪上廟祀之杜甫歌成都猛將有花卿學語小兒知姓名懸梁孫敬字文寳好學晨夕不休及至眠睡疲寢以繩繫頭懸屋梁後為當世大儒漢書觸屛御史大夫陳萬年子咸亢直有異才萬年常召咸於床下教戒之咸睡頭觸屏風萬年怒之咸叩頭謝曰具曉所言大要教咸諂也萬年因不復言上頭為白岑彭引兵從車駕破天水與吳漢圍隗囂於西城勅彭曰兩城若下便可將兵南擊蜀虜人苦不知足既平隴復望蜀每一發兵頭鬢為白東觀漢記長頭賈逵自為兒童常在大學不通人間事身長八尺二寸諸儒為之語曰問事不休賈長頭後漢書設祭袁紹辟牽招為督軍從軍紹卒事袁尚後遼東送尚首懸在馬市牽招覩之悲感設祭頭下太祖義之魏志夢生角魏延字文長義陽人延夢頭上生角以問占夢趙直直告人曰角之為字刀下用也頭上用刀其凶甚矣延後果誅楊儀蹋延頭曰庸能復能作惡不蜀志落頭秦時南方有落頭民其頭能飛其種人部有祭杞號曰蟲落故因取名焉吳時將軍朱桓一婢每夜卧後頭輒飛去或從狗竇或從天窗中出入以耳為翼將曉復還數數如此傍人怪之夜中照視唯有身無頭其體微冷氣息纔屬乃蒙之以被至曉頭還礙被不得安兩三度墮地噫咤甚愁而其體氣急狀若將死乃去被頭復起附頸有頃平和桓以為巨怪不敢畜乃故遣之捜神記占城國即什書所言王舍城也有尸頭蠻本人家婦女但眼無瞳人為異夜寢則頭飛去食人家小兒糞尖被妖風侵腹必死飛頭回合其體如舊前知而俟頭飛去移體别處回不能合則死人家有此若不報官除殺者罪及一家瀛涯勝覽玉枕劉壽少時遇相師曰君腦有玉枕必至公也後至太尉長沙蓍舊傳照鏡不見蒼梧太守吳臣據郡邑不恭王命孫權遣步隲為交州喻臣臣照鏡不見其頭隲因入斬之王隱晉書頭在樹上甘卓還襄陽意氣騷擾舉動失常自照鏡不見其頭視庭樹而頭在樹上心甚惡之晉甘卓為楊威將軍歴陽内史郡人陳訓私語人曰甘公頭低視仰目中有赤脙當厄於兵勿為將可也果為王敦所害上巾韲杵秦始元年頭責秦子羽曰吾託子為頭萬有餘日矣大塊稟我以精造我以形我為子置髪膚置鼻耳安眉須插牙齒眸子摛光雙顴隆起每至出入之間遨遊市里行者辟易坐者竦跽或稱君侯或言將軍捧手傾側佇立崎嶇如此者故我形之足偉也吾欲告爾以養性誨爾以優游而以蟣蝨同情不聴我謀悲哉俱寓人體而獨為子頭且擬人其倫喻子儕偶子不如太原温顆潁川荀㝢范陽張華士卿劉許南陽鄒湛河南鄭詡此數子者或謇喫無宫商或尫陋希言語或淹伊多姿態或讙譁少智諝或口如含膠飴或頭如巾韲杵而猶文采可觀意思詳序攀龍附鳯並登天府夫䑛痔得車沈淵得珠豈若夫子徒令脣舌腐爛手足沾濡哉世説縮頭祖廣字淵度行恒縮頭詣桓南郡始下車桓曰天甚清朗祖叅軍如從屋漏中來上易頭河東賈弼之晉義熈時為琅琊府叅軍夜夢一人面􅖟靤甚多鬚大鼻閻目請之曰愛君之貌欲易君頭可乎弼曰人各有頭面容有此理明日又夢意甚惡之乃于夢中許之明日朝起自不覺而人悉驚走藏云那漢何處來弼取鏡自看方知怪異因還家家人悉驚入内婦女走藏云那得異男子弼坐自陳説良久併遣至府檢閲方信後能半面笑半面啼兩手足及口中各捉一筆俱書辭意皆美皆為異也餘並如先俄而安帝崩恭帝立幽明録尖頭古弼為尚書令大武大閲將校獵於河西弼留守詔以肥馬給騎人弼命給弱者世祖大怒曰尖頭奴敢裁量朕也朕還臺先斬此奴弼頭尖世祖常名之曰筆頭是以時人呼為筆公後世祖云筆公必不與我魏書范長頭范岫長七尺八寸姿容奇偉范雲謂人曰諸君進止威儀當問范長頭以岫多識前代舊事也南史角出高祖生馮翊波若寺皇妣抱帝忽見頭上角出遍身鱗起大駭墜帝於地為人龍顔額上有五柱入頂目光外射有文在手曰王隋紀三首三首國其為人一身三首山經九首共工之臣曰相柳氏九首以食于九山上魂兮來歸若無上天些一夫九首拔木九千些楚辭三台頭為三台君洞神經崑崙太一流珠安崑崙黄庭内經子欲不死脩崑崙上外經注頭為崑崙高臺頭為高臺腸為廣野上泥丸一面之神宗泥丸腦神精根字泥丸黄庭經腦神名覺元子字道都神回元經斷頭易冠今有人於此斷頭以易冠殺身以易衣世必惑也是何也冠所以飾頭衣所以飾身今殺所飾而要所以飾則不知所以為矣世之趨利似此亦不知所為也吕覽面顔面面顔前也顔眉目之間也闕面不正也頢短面也頷面黄也闕面瘦淺闕也赧面慙赤也大宅靈宅既清玉帝游面為靈宅一名尺宅以眉目口鼻之所居故為宅大洞經云面為尺宅或為赤澤字黄庭經太子陽氣見于眉宇之間浸淫而上㡬滿大宅注大宅面也七發神庭九華真妃云面者神之庭心悲則面憔妾有童面之經真誥帝面蒼帝方面赤帝圓面白帝廣面黒帝深面河圖如生晉侯敗狄于箕先軫免胄入狄師死焉狄人歸其元面如生僖三十三不同鄭子産曰人心之不同也如其面焉吾豈敢請子面如吾面乎襄六長三尺衛靈公有臣曰公孫吕身長七尺面長三尺焉廣三寸鼻目耳具而名動天下荀子得艾楚白公作亂殺子西子期于朝而刼惠王子西以袂掩面而死葉公在蔡方城之外皆曰可以入矣及北門乃胄而進又遇一人曰君胡胄國人望君如望嵗焉曰日以㡬若見君面是得艾也哀十六有光孔子謂盜跖曰將軍身長八尺二寸面目有光脣如激丹齒如齊貝音中黄鍾而名曰盜跖丘竊為將軍恥不取焉莊子絮覆吳王將死曰吾以不用子胥言以至於今死者無知則已死者有知吾何面見子胥也遂䝉絮覆面自刎説苑怒面田光曰竊觀太子客無可用者夏扶血勇之人怒而面赤宋意脈勇之人怒而面青武陽骨勇之人怒而面白光所知荆軻神勇之人怒而色不變燕丹子創面哀帝初即位博士申咸毁給事中薛宣不供養行喪服薄於骨肉不宜復列封侯使在朝省宣子況為右曹侍郎數問其語賕客揚明欲令創咸面目使不居位㑹司𨽻缺況恐咸為之遂令明遮砍咸宫門外斷鼻脣身八創事下有司況減死一等宣坐免為庶人漢書希見朱博為人亷儉不好酒色游宴自微賤至富貴食不重味案上不過三柸夜寢早起妻希見其面上創頰朱博為左馮翊長陵大姓尚方禁少時曽盜人妻見斫創著其頰府功曹受賂白除禁調守尉博聞知以他事召見視其面果有瘢博辟左右問禁是何等創也禁自知情得乃叩頭服博笑曰大丈夫固時有是因親以為耳目上滅瘢孔休守新都相休謁見莽莽縁恩意進其玉具寳劍欲以為好休不肻受莽因曰誠見君面有瘢美玉可以滅瘢欲獻其玉璏耳犁面耿秉為征西將軍鎮撫單于以下及囊南單于舉國發哀犁面流血東觀漢記半面應奉字世叔年二十時嘗詣彭城相袁賀賀時出行閉門造車匠於内開扇出半面視奉奉即委去後數十年於路見車匠識而呼之後漢書堊面徐庶名福本單家子少好任俠擊劍中平末嘗為人報讐白堊突面被髪而走魏畧似驢諸葛恪父瑾面長似驢孫權大㑹羣臣使人牽一驢入長檢其面題曰諸葛子瑜各跪請筆續其下曰之驢舉坐歡笑乃以驢賜恪吳志炙面真女謝仙女者謝承孫也吳歸命候采仙女充後宫仙女乃炙面服醇醯以取黄瘦竟得免㑹稽後賢記不洗稽康性復疎嬾筋駑肉緩頭面常一月十五日不洗不大悶癢不能沐也絶交書疪面趙孟字長舒入鋪尚書都令史善於清談有國士之風其面有疪㸃諸事不決皆言當問疪面也王隱晉書最窟琅琊諸葛忘名而病鼠痿劉真長見歎曰鼠乃復窟宂人面乎郭于白面陳郡謝石字石奴少患面創諸治莫愈乃自幽逺止於岩下中宵有物來䑛其創隨䑛隨除既不見刑竟為是龍而䑛處悉白故世呼為謝白面異苑槊刺初王恭販梟首於東街王平之袖槊刺其面晉書紫面劉牢之面紫赤鬚目驚人而沈毅多計如鐵劉裕於東府聚樗蒲大擲一判應至數百萬餘人並黒犢唯裕及劉毅在後毅次擲得雉大喜褰衣繞床呌謂同座曰非不能盧不事此耳裕因援五木久之曰老兄試為卿答即成盧焉毅意殊不快然素黒其面如鐵色焉上白面書生沈慶之謂帝曰耕當問奴織當問婢今論爭伐問白面書生事何由濟宋書如田明帝大㑹新亭接勞諸軍王摴蒲暏官李安人五擲皆盧帝大驚目安人曰鄉面方如田封侯狀也上作面劉瑀為右衛將軍因求益州甚不得意至江陵與顔峻書曰朱脩之三世叛兵一日居荆州青油幕下作謝宣明面見向族叔秀之為丹陽瑀又與親故書曰吾家黒面阿秀遂居劉安衆處朝廷不為多士南史如刻畫崔㥄字長儒狀貌偉麗善于容止李渾將聘梁名輩畢萃于詩酒正歡㥄復到一坐無復談話鄭伯猷嘆曰身長八尺面如刻畫聲欬為洪鐘響胷中著千卷書使人那得不畏服北史破面齊東昏即位多行殺戮沈昭畧與沈丈季徐孝嗣同召入省例賜藥酒昭各罵孝嗣曰廢昏立明古今令典宰相無才致有今日即擲甌投孝嗣面曰使作破面鬼齊書馬面斛律光字明月馬面彪身神爽雄傑少言笑工騎射初為侯景部下彭樂謂高敖曹曰斛律家小兒不可三度將行後奪人名北史狹長宗如周南陽人有才學以府僚隨詧後至度支尚書如周面狹長蕭詧以法華經云聞經隨喜面不狹長嘗戲之曰卿何為謗經如周踧踖自陳不謗詧又謂之如初如周懼出告蔡大寳大寳知其㫖笑謂之曰君當不謗餘經正應不信法華耳如周乃悟如虎袁天綱與韋挺游謂挺面如虎當以武處官挺善隱太子薦為左衛率唐書似高麗楊再思張易之兄司禮少卿同休請公卿宴其寺戲曰公面似高麗上黄面兒賈餗㑹曲江故事尹自門步入揖御史餗騎而入御史揚儉蘇特固爭餗曰黄面兒敢爾上白面兒劉鄩末帝遣使者監督其軍鄩召諸將謀曰主上深居禁中與白面兒謀必敗人事上面部三無李寛為常侍有門下士姓盧善相或問李公如何曰據其面部所無者三無子無宅無塜公有數子皆先公卒有宅未嘗還鄉居死于池州乗舟歸舟破沈其骨金華子能寒人面獨能寒何也曰頭者諸陽脈之㑹也諸隂脈皆至頸項還不上獨諸陽一脈上頭故面能寒耳素問諸陽之㑹皆在于面十二經脈三百六十五絡其血氣皆上于面而走空竅其精陽氣上走於目而為睛其别氣走於耳而為聴其宗氣上出於鼻而為臭其濁氣出於胃走脣舌而為味其氣之津液皆上燻于面而皮又厚其肉堅故天氣甚寒不能勝之也靈樞經飾面夫心猶面首也一旦不脩飾則塵垢穢之人心不思善則邪惡入之人盛飾其面而莫脩其心惑矣蔡邕女戒眉娬媚眉媚也有娬媚也釋名華蓋眉號華蓋覆明珠明珠目也黄庭經八采堯眉八采春秋元命苞有古强者自云已四千嵗云見堯舜禹湯説之了了世云堯眉八采不然也直兩眉頭甚竪似八字耳抱朴子虎眉文王虎眉帝王世紀十二彩孔子眉十二彩世家廣一尺伍子胥眉間廣一尺吳越春秋莫耶子赤鼻眉間一尺列仙傳干將子赤鼻眉廣三寸列士傳去眉豫讓又漆身為厲滅鬚去眉自刑以變其容為乞人而往乞國䇿旴衡陳崇奏莽功德曰旴衡振色振揚武怒孟康曰眉上曰衡旴衡舉眉揚目也漢書揚雄謂揚眉曰揚衡續博物志赤眉天鳯五年樊崇起兵於莒王莽使平均公亷丹征之崇等欲戰恐其衆與莽兵亂乃皆朱其眉由是號曰赤眉東觀漢記後書作赤糜愁眉元嘉中京都婦女作愁眉啼糚折要步齲齒笑所謂愁眉者細而曲折啼糚者薄拭目下若啼處墮馬髻者作一邉折要步者足不在體下齲齒笑者若齒痛樂不欣欣始自大將軍梁冀家所為京都歙然諸夏皆放效天誡若曰兵馬將往收捕婦女憂愁踧眉啼泣吏卒掣頓折其要脊令髻傾邪雖强語笑無復氣味也後漢志白眉蜀馬良字季常宜城人也兄弟五人並有才名鄉里為之諺曰馬氏五常白眉最良眉中有白毛故以稱之襄陽蓍舊傳布置庾公道王尼子非唯事事勝於人布置鬚眉亦勝人我輩皆出其轅下語林炙眉王澄在荆州終日酣飲不以衆務在意郭舒常切諫之荆土士人宗廞常因酒忤澄澄怒叱左右棒廞舒厲色謂左右曰使君過醉汝輩何敢妄動澄恚曰别駕狂耶誑言我醉因遣掐其鼻炙其眉頭舒跪而受之澄意少釋而廞遂得免後事王敦諌敦敦曰平子以卿病狂故掐鼻炙眉頭舊疾復發耶舒曰古之狂也直汲黯朱雲豈癡乎伸眉頭宋王𤣥謨在雍州人間訛言欲反𤣥謨馳啟孝武具陳本末帝知其虚馳遣主書吳喜公慰撫之又答曰七十老公反欲何求聊復為笑想足以伸卿眉頭耳𤣥謨性嚴未曽妄笑時人言𤣥謨眉頭未曽伸故以此見戲南史過目袁天綱帝在九成宫令視岑文本曰學堂瑩夷眉復過目文才振于天下覆眼毛若虚眉毛覆於眼性殘忍天寳末為武功丞眉宇房琯見元德秀歎曰見紫芝眉宇使人名利之心都盡通眉李賀字長吉為人纎瘦通眉長指𤓰能疾書唐書不伸郭崇韜莊宗思得高樓避暑乃遣王允平營之宦官曰郭崇韜眉頭不伸陛下雖欲有作其可得乎五代史目黙限目黙也黙而内識也眼限也曈子限限而出也釋名目肝目肝之使春秋元命苞大目伏犧大目孝經援神契四目蒼頡四目是謂並明春秋引演圖舜曈舜重曈子是謂慈原上應提攝下應三元元命苞膠目管子縳束於魯鮑叔曰君欲霸王則臣不若管夷吾桓公曰夷吾寡人之賊也射我者也不可鮑叔曰夷吾為其君射人若得之則彼亦將為君射人君不聴鮑叔固讓果聴之於是使告魯曰管仲寡人讐也願得而親加手焉魯許諾乃使吏鞟其拳膠其目盛之以鳴夷置之車中至齊境桓公使人以朝車迎之吕覽如星衛蒯瞶亂子路興師往有狐黯者當師曰子欲入耶曰然黯從城上係蔴繩釣子路半城問曰為師也耶為君耶曰在君為君在師為師黯因投之折其左股不死黯開城欲殺之子路目如明星之光曜黯不能前黯曰畏子之目願覆之子路以衣袂覆目黯遂殺之論語隱義河目夫子適周見萇𢎞言終退萇𢎞語劉文公曰吾觀孔仲尼有聖人之表河目而隆顙黄帝之形貌也脩肱而龜背長九尺有六寸成湯之容體也孔叢子目論越王無彊與中國爭强北伐齊齊王使人説于越王越王不納齊使者曰幸也越之不亡也吾不貴其用智如目之見毫毛而不自見睫也今王知晉之失計不知越之過是目論也史記察毫離朱之明察毫末於百步之外下水尺不能見淺深非目不明其勢難覩也慎子䀹目田駟欺鄒君鄒君將殺之田駟恐告惠子惠子見鄒君曰有人見君則䀹其一目奚如君曰我必殺之惠子曰瞽䀹兩目君奚弗殺駟東欺齊侯南欺荆王駟之於欺人瞽也君奚怨乃弗殺韓子眥裂漢王詣鴻門謝項羽羽欲殺漢王樊噲帶劔擁盾入軍門披帷西向立瞋目視羽鬚髪上指目眥盡裂史記重瞳周生曰舜目蓋重瞳子又聞項羽亦重瞳子羽豈其苗裔耶何興之暴也上顔回重瞳劉子王莽重瞳子本傳吕光字世明身長八尺四寸目重瞳子左肘有肉印涼州記沈約左目重瞳子腰有紫痣聰明過人好墳籍聚書至二萬卷都下無比梁書隋魚俱羅相表異人目有重瞳言聞數百步隂為煬帝所忌梁敬真希㫖奏殺之北史梁康王友孜目重瞳子嘗竊自負以為當為天子五代史李煜重瞳子南唐懸珠東方朔上書云臣朔長九尺三寸目若懸珠齒如編貝漢書生蛆杜根諫和熹鄧后以安帝宜親政事太后大怒囊盛撲殺之根詐死三日目中生蛆東觀漢記目盲曹操與丁沖親善聞其子儀為令士欲以愛女妻之五官將曰女人觀貌而正禮目不便恐愛女未必悦也後儀到與論議曰丁椽好士也即使其兩目盲尚當與女何況但眇魏書李神儁沙苑之敗䇿眇馬而起曰丁椽力馬倒曰丁椽誤我北史八十八刮膜魏武帝病眼令華佗以金箆刮膜出瞳景王嬰孩時有目疾宣王令華佗治之出眼瞳割去疾而納之傳藥沈約晉書初司馬師目有瘤疾使醫割之文鴦之來攻也驚而目出懼六軍之恐蒙之以被痛甚囓被而左右莫知焉遂卒晉書青白眼阮籍能為青白眼見禮俗之士以白眼對之及稽喜來吊籍作白眼喜不懌而退弟康聞之乃齎酒挾琴造焉籍大悦乃見青眼由是禮俗之士疾之若讎爛爛王戎形狀短小眸子洞徹視日而眼照不虧裴楷見而目之曰戎眼爛爛如巖下電閃閃裴令公有儁容姿一旦有疾至困惠帝使王夷甫往看裴方向壁卧聞王使至强回視之王出語人曰雙眸閃閃若巖下電精神挺動體中故小惡世説睕睕石季龍時太子詹事孫珍問侍中崔約曰吾患目疾何方療之約素狎珍戲之曰溺中則愈珍曰目何可溺約曰卿目睕睕正耐溺中珍恨之以白石宣宣於諸子中最胡狀目深聞之大怒誅約父子載記目痛方范甯字武子嘗患目痛就張湛求方湛因嘲之曰古方宋陽里子少得其術以授魯東門伯魯東門伯以授左丘明遂世世相傳及漢杜子夏鄭康成魏南堂隆晉左太沖凡此諸賢並有目疾得此方云用損讀書一減思慮二專内視三簡外觀四旦晚起五夜早眠六凡六物熬以神火下以氣簁藴於胷中也七日然後納諸方寸脩之一時近能數其目睫逺視及捶之餘長服不已洞見墻壁之外非但明目乃亦延年晉書引刀刺血符生驍果粗暴嗜酒無賴祖洪甚惡之生無一目年七嵗洪戲之問侍者曰吾聞瞎兒一淚信乎侍者曰然生怒引佩刀自刺出血曰此亦一淚也洪大驚崔鴻十六國春秋屍瞳明亮潯陽周虓字孟威晉康寜中鎮於巴西為符堅所獲守節不屈堅使使者道虓躬治逵陌謂使者云煩君語賊符堅何至仰煩國士如此又潜圖襲堅堅聞之曰小人正欲覔死殺之適足成名耳乃苦考楚不食而卒斂已經旬堅怒猶未歇剖棺臨視虓屍歘逥眸鬢髭張裂精瞳明亮迴盻矚堅堅覩而喜稱乃厚加贈賻異苑道眇輒泣宋袁粲初忤于孝武其母候乗輿出負磚叩頭流血磚碎傷目自此後粲與人語有誤道眇目者輒涕泣彌目南史十六白虹貫日禇彦回美姿貌善容止時以方何平叔袁粲曰禇公眼睛白多所謂白虹貫日亡宋者終此人也上謎眼魏威陽王元禧謀反遁是左右惟尹龍虎從之禧近不知所為謂龍虎曰吾憒憒不能堪試作一謎當思解之以什毒悶龍虎欵憶舊謎云眠則俱眠起則俱起貪如豺狼贓不入已都不有心於規刺也禧亦不以為諷已因解之曰此是眼也而龍虎謂之是魏書大眼王肅弟秉之初歸國也謂大眼曰在南聞君之名以為眼如車輪及見乃不異於人大眼曰旗鼓相望瞋眸奮發足使君目不能視何必大如車輪北史千里眼楊逸為南秦州刺史為政愛人尤憎豪猾廣設耳目善惡畢聞其兵出使下邑皆自持糧人或為設食者雖在闇室終不敢進咸言楊使君有千里眼那可欺之魏書眇目梁元帝武帝第七子也初武帝夢眇目僧執香爐稱託生王宫帝初生患眼醫療必増武帝自下意療之遂肓一目南紀劉諒字求信好學有文才為湘東王所善王嘗游江濱歎秋望之美諒對曰今日可謂帝子降於北渚王有目疾以為刺已應曰卿言眇眇以愁予耶從此嫌之傳元帝一目失明深忌諱之為湘東王荆鎮州嘗使博士講論語至于見瞽者必變色語不為隱帝大怒乃酖殺之廣異記王偉協侯景謀謨其文檄並偉所製景敗見禽上五百字詩于元帝帝愛其才將捨之朝士多忌乃請視偉作檄文云項羽重瞳尚有江東之敗湘東一目寧為四海所歸帝大怒殺之景傳元帝母阮脩容曽失一珠元帝時㓜竊吞之謂是左右所盜乃炙魚眼以厭之信宿之間珠遂便出帝尋一目致眇蓋魚之報也韻對邵陵王綸賦詩戲之曰湘東有一病非啞復非聾相思下隻淚望直有全功眄速高澄賈子儒相之曰人有七尺之軀不如一尺之面一尺之面不如一寸之眼大將軍臉薄眄速非帝王相也果如其言奕奕琅琊王儼武成帝第三子後主時儼惡和士開駱提波奢恣二人相謂曰琅琊王眼光奕奕數步射人由是忌之北齊青睛徐陵目有青睛時人以為聰慧之相也南史五十二眼方眼方者壽千嵗陶𢎞景晚年一眼有時而方仙書視日不眩劉炫字光伯眸子精明視日不眩左手畫方右手畫圓口誦目數耳聴五事同舉無所遺失隋書視逺劉焯字士元犀額龜背望高視逺與劉炫結盟為友以儒學知名世稱二劉黒白明澈李密額鋭角方瞳子黒白明澈煬帝見之謂宇文述曰左仗下黒色小兒為誰曰蒲山公李寛子密帝曰箇小兒瞻視異常無令宿衛唐書孔帖以方字帶下讀誤白眼相公張公素允伸性暴厲眸子多白燕人號白眼相公新唐紫光武攸緒晚年肌肉殆盡目有紫光晝見星月又能辨數里外語酉陽目光如火郭子儀身長七尺二寸初在行伍李白客并州於哥舒翰座上見之曰此壯士目光如火照人不十年當擁節旄屢脱其刑責翰因署為牙門將後子儀勘定安史之亂歴諸道節度及永王璘及事于李白子儀請以官爵贖翰林上許之因而免誅樂史序四白裴珪妻張憬藏相之曰夫人目脩緩法曰目有四白五夫入宅夫人且得罪俄坐姦没入掖庭如秋水賀知章見李泌曰此稚子目如秋水必一拜卿相鄴侯家傳鼠目元載李揆為相苗晉卿數薦元載于李揆揆輕載地寒謂晉卿曰龍章鳯姿士不見用獐頭鼠目子乃求官耶後載聞銜之及秉政揆流落十六年唐書目禁闗播與盧把論事帝前播意不可避坐欲有所言把目禁輒止眼語韓建昭宗東遷建從至洛昭宗舉酒屬朱温與建曰遷都之後國步小康社稷安危繫卿兩人次何皇后舉觴建躡朱温足乃陽醉去建出謂朱温曰天子與宫人眼語幕下有兵仗聲恐公不免也太祖以故尤德之五代史獨眼龍李克用少驍勇軍中號曰李鵶兒其一目眇及其貴也又號獨眼龍蓋威名蓋於代北上王延稟審知之養子眇一目人亦謂之獨眼龍後為延鈎所殺五國故事陽疾楊行密為吳王其妻兄朱延壽為壽州節純潜以宗姓通于梁祖將規淮甸行密謀之且慮召之不至乃陽為目疾每接延夀使者必錯亂其所見以示之嘗行故觸柱而仆凡三年其妻旦夕視其動静以為信至於私於僕𨽻悉避餘人唯不避行密密一日謂其妻曰吾目疾不瘳矣諸兒且不克省軍府之事當屬於舅汝宜召之其妻自以書召延壽既至行密處正㕔潜兵以見之俄而開目曰數年不見舅今旦果相覩延夀惶駭遂叱勇士執而殺之仍廢其妻焉五代史五國故亊去㢓錢鏐年老一目失明中朝國醫胡某曰可無療此當延五七嵗壽若決膜去内瘴眼即復舊但慮損福鏐曰吾得不為一目鬼於地下足矣醫為治之復故凡賂醫金帛計五萬緡未㡬鏐卒談苑夜光張彦澤為人驍悍殘忍目睛黄而夜有光顧視如猛獸以善射為騎將數從莊宗明宗戰伐五代史瞬如電吳主昇身長七尺姿貌瑰特目瞬如電語音厚重望之懾人與語可愛五國故事鬼眼陶糓少時夢數吏云奉符換眼吏附耳求錢十萬安第一眼糓不應又云錢五萬安第二眼復不答吏曰上安第三眼即以二彈丸納眼中既覺眼色深碧後有善相道士陳紫陽曰好貴人貴氣奈一雙鬼眼竟不至大位卓異記太祖嘗謂陶糓一雙鬼眼畫謾録木睛周寳唐立武選以高上擊毬較其能否而黜陟之至有致鐵鈎于毬仗以相擊寳嘗與此選為鐵鈎所摘一目暗失寳取睛吞之復擊毬獲頭籌遂授官原勑賜木睛以代之一日晨起潄木睛墜水棄之侍姬竊笑寳怒曰瞎漢何足笑遂殺之注木睛莫知何木置中無所礙視之如真睛矣吳越備史眼多白李承之在仁宗朝官州縣因邸吏報包拯拜參政或曰朝廷自此多事矣承之正色曰包公無能為今知鄞縣王安石者眼多白甚似王敦他日亂天下者此人也邵氏聞見録潘陽仲見王敦小時謂曰君蜂目已露但豺聲未振耳必能食人亦當為人所食世語楚令尹子上謂世子商臣蜂目而豺聲忍人也不可立也左文元抗陽蔡京嘗入朝已立班上御殿差晚杲日照耀衆莫敢仰視京注目久而不瞬或曰大貴相也陳子翁曰貴則貴矣然區區精神敢抗太陽他日得志必無君為天下患也百家詩序秦檜眼有夜光身鏡眼者身之鏡視多則鏡昏妾有磨鏡之石真誥眼神眼神明上字英𤣥黄庭目神名虚監生字道童神回元銀海肩為玉樓眼為銀海道經亦曰銅闗眼泉鮑溶詩謂淚曰眼泉三水小牘養目凡視五色皆損目惟黒色無損李氏有江南日中書皆用皂羅糊屛風所以養目也倦游雜録昧襄王將以狄伐鄭富辰諫曰目不别五色之章為昧禧二十四五色令人目盲老失性有五一曰五色亂目使人目不明莊目不能決黒白之色則謂之盲盲則不能避晝日之險韓解老見百步目見百步之外而不能見其眥胡非子楚莊王欲伐越杜子諫曰王之伐越何也王曰政亂兵弱杜子曰臣患知之如目也能見百步之外而不能自見其睫王之弱亂非越王之下也而欲伐越此知之如目也韓子眼能察天衢而不能用項領之間抱朴子不見太山夫目察秋毫之末而耳不聞雷霆之音耳調玉石之聲而目不見太山之高何則小有所志而大有所忘也淮南察度察色單穆公曰夫目之察度也不過步武尺寸之閒其察色也不過墨文尋常之閒國語耳心候耳者心之候元命苞洗耳堯聘許由為九州牧由聞之洗耳於河高士傳耳長務光夏時人耳長七寸陽都女耳細而長衆皆言此天人也列仙傳心樞景公將鑄大鐘單穆公曰夫耳目心之樞機也故必聴龢而視正聴龢則聰視正則明國語耳塞梁亡自亡也湎于酒淫于色心昏耳目塞上無正長之治大臣背叛民為冦盜梁亡自亡也穀梁傳三門老子耳有三門瀨鄉記老君耳長七寸抱朴子免洗鶡冠子常居深山耳聾謂妻子曰吾免為巢由洗耳清溪唾耳燕丹使田光往候荆軻值其醉唾其耳中軻覺曰此出口入耳之言必大事也則往見光列士傳重聴黄霸為穎川太守長吏許丞老病聾督郵白欲逐之霸曰許丞亷吏雖老尚能拜起送迎頗重聴何傷且善助之母失賢者意顧見其耳曹公擒吕布布顧劉備曰𤣥德卿為上坐客我為降虜繩縳我急獨不可一言耶操曰縳虎不得不急曹公欲緩之備曰不可公不見布事丁建陽董太師乎操額之布目備曰大耳兒最叵信英雄記先主身長七尺五寸垂手下膝顧自見其耳蜀志王蜀后主衍方頥大口垂手過膝顧目見耳五代史稱聾先主定蜀杜微嘗稱聾閉門不出丞相亮領益州牧以微為主簿固辭轝而致之亮以微不聞人語坐上與書曰君但以德輔時耳不責君軍事君何為汲汲求去乎蜀志枕流孫子荆年少時欲隱語王武子當枕石漱流誤曰漱石枕流王曰流可枕石可漱乎孫曰所以枕流欲洗其耳世語許由為堯所讓其友巢父責之由乃過清泠水洗耳拭目曰向聞貪言負吾之友逸士傳天柱太尉劉壽少遇相師曰耳為天柱今君耳有城郭必典家邦長沙蓍舊傳相望武皇帝李雄美容貌相工相之曰此君口如方器耳如相望位必過二公不疑也蜀書垂肩王導多病每自憂慮陳訓曰公耳竪垂肩必壽亦大貴晉書戲弄齊杜臺卿字少山為尚書左丞省中以其耳聾戲弄之下辭不得理者至大罵臺卿見其口動謂為自陳令史又不曉諭訓對往往乖越聴者以為嗤笑北史佯聾王笠不仕佯狂作聾每説話則畫字後隱嵩山隋文帝召不起三耳秀才隋兖州佐史董慎性公直明法理一日出州門逢一黄衣使者曰太山府君呼君為録事即内慎於大布囊負之既至府君命坐因與之論天曹疑獄慎舉張審通自代審通為狀申天曹天符下罰府君府君大怒審通即命左右取方寸肉塞却一耳遂無聞審通更為判申天曹允之府君悦命左右割下耳中肉令一小鬼擘之為一耳安於審通額上既寤數日額角痒遂踴出一耳通前三耳而踴出者尤聰時人笑曰天有九頭鳥地有三耳秀才亦呼雞冠秀才者幽怪録耳中天地薛君曹見二青衣駕赤犢出耳二童子曰兠𤣥國在吾耳中一童子傾耳示君曹乃别有天地花卉因捫耳投之至一都㑹城池樓堞窮極瓌麗因作思歸賦自童子耳中落上耳栢許公宇文述素好著奇炫燿時人又遇天寒雲定興曰入内宿衛必當耳冷述曰然乃製梜頭巾令深栢耳人學之名為許公栢勢述大悦曰雲兄所作必能變俗我聞作事可法故不虚也北史無根袁天綱工相術馬周就之相天綱曰馬侍御伏犀貫腦兼有玉枕又背如負物當富貴不可言公面包赤命門色暗耳後骨不起耳無根只恐非壽者周後伍至中書令兼吏部尚書年四十八卒舊唐龜息李嶠㓜有清才詣袁天綱綱曰郎君神氣清秀而壽若不永母憂之天綱請同於書齋連榻而坐寢袁登床穩睡李獨不寢至五更忽睡袁適覺視李嶠無喘息以手候之鼻下氣絶初大驚怪良久偵候其出入息乃在耳中撫而告之曰得矣遂起賀其母曰數候之皆不得今方見之矣郎君必大貴壽是龜息也貴壽而不富耳後果如其言定命録驢耳汴州節度李忠臣嘗因奏對德宗謂之曰卿耳甚大貴人也忠臣對曰臣聞驢耳甚大龍耳即小臣耳雖大乃驢耳也上悦之上耳冷孟𢎞微對宣宗曰陛下何以不知有臣不以文字召用帝怒曰朕耳冷不知有卿翊日喻輔臣曰此人躁妄欲求内相乃黜之缺左商成已生而鈌左耳通人老子曰言者所以通已於人也聞者所以通人於已也既闇且聾人道不通故有闇聾之病者莫知事通豈獨形骸有闇聾哉心亦有之塞也莫知所通此闇聾之類也文子神聴文子問道老子曰學問不精聴道不深凡聴者將以達智也將以成行也將以致功名也不精不明不深不達故上學以神聴中學以心聴下學以耳聴以耳聴者學在皮膚以心聴者學在肌肉以神聴者學在骨髓故聴之不深即知之不明知之不明即不能盡其精不能盡其精即行之不成上豆塞夫耳之主聴目之主明一葉蔽目不見太山兩豆塞耳不聞雷霆道開而否未之聞也鶡冠子耳苦傾聴求聲者則耳苦而目樂定心管物者則神勞而形安同在一身之上而休戚異者是天理殊宜造化自隔身牖九華真妃曰耳者身之牖聴衆則牖閉妾有決牖之術真誥嬌女耳神空閑字幽田黄鹿經嬌女窈窕翳霄時真誥曰嬌女耳神名耳相耳門不容麥百嵗樊氏相法耳門小富而恡相書垂肩珠崖儋耳其渠師耳垂肩三寸後漢為翼南方落頭民其頭能飛以耳為翼博物志龍虎沐胥國人左耳中出青龍右耳中出白虎龍虎初出之時如繩縁頰手特面如龍虎皆飛去地十餘丈而雲氣繞龍風吹虎俄而以手一揮龍虎皆還入其耳王子年拾遺録鼻心門鼻者心之門養生經鼻者肺之使白虎通天臺天中之岳謂鼻也一名天臺黄庭經玉壟鼻神玉壟字靈堅亦曰玉廬上鼻神名沖靈玉字道微四命山源鼻中隔之際名曰山源山源者一名鬼井一名神池一名邪根一名魂臺也真誥虎鼻伏羲山準禹虎鼻援神契夏禹蛇身人面牛首虎鼻而有大聖之德列子叩鼻邾婁人執甑子用之社蓋叩其鼻以血社也公羊傳鼻柱老子鼻柱瀬鄉記彈鼻蘇子南使齊謂齊王曰臣聞當世之舉王必誅暴正亂今宋王射天笞地鑄諸侯之像使侍屏匽展其臂彈其鼻此天下無道而王弗伐王名終不成矣國䇿堊鼻莊子過惠子之墓顧謂從者曰郢人堊漫其鼻端若羽翼使匠石斵之匠石運斤成風聴而斵之盡堊而鼻不傷郢人立不失容宋元君聞之召匠石曰嘗試為寡人為之匠石曰臣則嘗能斵之雖然臣之質死久矣自夫子之死也吾無以為質矣吾無與言之矣莊子鼻醜秦割國之君劓殺其民於是赭衣塞路有鼻者醜故百姓鳥驚獸駭不知所歸命崔寔政論長準始皇蜂目長準蓋鼻高起史注隆準高祖為人隆準而龍顔史記嶽鼻衛太子嶽鼻太子來省疾至甘泉宫江充告太子勿入陛下有詔惡太子鼻嶽尚以紙蔽其鼻充語武帝曰太子不欲聞陛下膿臰故蔽鼻武帝怒太子太子走還三輔故事氣户太尉郅壽少遇相師相師曰凡鼻為氣户君鼻大貴之象也長沙蓍舊傳廣莫顧長康拜桓宣武墓作詩云山崩溟海竭魚鳥將何依人問之曰卿憑重桓乃爾哭之狀其可見乎顧曰鼻如廣莫風眼如懸河決溜世語鼻音謝安本能為洛下書生詠有鼻疾故其音濁名流愛其詠而弗及或掩以効之面山康僧淵目深而鼻高王丞相每調之僧淵曰鼻者面之山目者面之淵山不高則不靈淵不深則不清世説齇鼻宋廢帝常入武帝廟指其畫像曰此渠不好色不擇尊卑顧謂左右渠大齇鼻如何不齇即令畫工齇談藪世齇王慧龍愉之孫也㓜聰慧愉以為諸孫之龍故名焉避劉裕之難奔魏崔浩弟恬聞其為王氏子以女妻之浩既婚姻及見慧龍信王家子也王氏世齇鼻江東謂之齇王慧龍鼻大浩曰真貴種矣魏書易鼻徐郎中筠少夢神人狀甚偉乎攜竹籃其中皆人鼻端視徐曰形像非薄但其鼻曲而小吾與若易之遂于籃中擇一鼻先劓徐鼻擲去以所擇鼻安之仍以手指周固四際夢中亦覺痛楚神笑曰好一正即鼻也徐之鼻素隆不正自夢易之後自然端直歴官駕􅀈郎中治平巾卒括異志息主割鼻飴口喪其息主大𤣥經􅙄鼻不知臰為􅙄人不知是非為閇論衡􅨮􅡩刺天王沈什時論鼻􅨮􅡩而刺天謂仰鼻也上寥下堯口言食口人之所以言食也説文言門口者言之門周生烈子機闗口者機闗也所以門閉情意也可以食不可以言鬼谷子口者闗也舌者機也出言不審駟馬不能追也説苑華池口為華池養生要尹氏解軍營軍營之中有甘泉軍營口也甘泉唾也養生經監謗厲王虐國人謗王王怒得衛巫使監謗者召公曰是障之也防民之口甚于防川川壅而潰傷人必多民亦如之是故為川決之使導為民者宣之使言民之有口猶土之有山川也夫民慮之於心而宣之於口成而行之胡可壅也若壅其口其與能幾何王弗聴於是國人莫敢出言國語不闔桓公與管仲謀伐莒未發已聞於國東郭郵至公問之曰子言伐莒者乎東郭曰然臣也君子善謀而小人善意臣視二君在堂上口開而不闔是言莒也舉手而指勢當莒也管子三緘孔子觀周入于太廟右陛之前有金人焉三緘其口而銘其背曰古之慎言人也戒之哉戒之哉無多言多言多敗無多事多事多患誠能慎之福之根也曰是何傷禍之門也强梁者不得其死好勝者必遇其敵夫江河長百谷者以其卑下也戒之哉戒之哉孔子顧謂弟子曰小子識之此言實而中情而信行身如此豈以口遇禍哉説苑襄州榖城縣城門外道傍石人缺剥腹上有字云磨兠鞬慎勿言是亦金人之流也浮休間目集方口李母碑曰老子方口瀨鄉記海口孔子海口言若含擇援神契斗繞子貢山庭斗繞口謂面有三庭言山在中鼻高有異相也故子貢至孝顔淵至仁論語摘輔相口説哀公問取人之法孔子對曰毋取拑者無取倢者毋取口鋭者拑者大給利不可盡用倢者必欲兼人不可以為法也口鋭者多誕而寡信後恐不驗也説苑無取捷捷無取鉗鉗無取啍啍捷捷貪也鉗鉗亂也啍啍誕也家語口臭越王勾踐入臣於吳吳王病入問病適遇吳王之便太宰嚭奉溲惡以出勾踐以手捧其便與惡而嘗之後遂病口臭范蠡令左右食岑草以亂其氣吳越天口齊田駢游稷下好談論號天口言不可窮盡七畧虎口秦始皇虎口日角河圖口吃韓非口吃不能道説而善著書史記司馬相如口吃而善著書漢書期期周昌為人吃高帝欲廢太子昌曰臣口不能言然臣期期知其不可陛下欲廢太子臣期期不奉詔上欣然而笑即罷漢書乳臰漢王擊魏豹謂酈食其曰魏大將者其人為誰曰栢直也漢王曰是口尚乳臰漢書從理入口周亞夫為河内守許負相之曰君當封侯而餓死亞夫曰既已貴又何説餓死指視我負指其口曰從理入口此餓死法也漢書不能劇談長安有儒生曰惠莊聞朱雲折五鹿充宗之角乃歎息曰栗犢反能爾耶吾終恥溺死溝中遂褁糧從雲雲與言莊不能對逡巡而去拊心謂人曰吾口不能劇談此中多有西事雜記揚雄口吃不能劇談而好深湛之思哆口王莽為人哆口漢書無擇言馬援在交阯還書戒兄子曰龍伯高敦厚周慎口無擇言謙約節儉亷公有威吾愛之重之後漢方口明德馬后身長七尺三寸青白色方口美髪東觀漢記含香桓帝時侍中刁存年蓍口臭上出雞舌香使含之自疑有過賜毒歸舍辭訣欲就便宜賴僚友求眎其藥更為含食意遂解漢官儀大口孫堅為下邳丞時孫權生方頥大口目有精光堅異之以為有貴像江表傳艾艾鄧艾以口吃不得作幹佐為稻田守叢草吏魏志嘗語稱艾艾晉文王戲之曰卿云艾艾定是幾艾對曰鳯兮鳯兮故是一鳯世説雌黄王衍善談老莊義理有所不安隨即更改世號口中雌朝野翕然謂之一世龍門矣晉書食不知口司馬流與蘇峻戰食不知口處下動申弼烈祖常從容問諸侍臣曰夫口以下動乃能制物鐵鎻為用亦噬嗑之意而從上下何也弼答曰口之下動上使下也鐵鎻之用上斬下也烈祖稱善燕書宜飲謝朏出為吳興郡守與弟瀹於送别朏指瀹口曰此中唯宜飲酒南史度啟公焦度為人質直木訥口不能出言欲就齊高帝求州比見竟不涉一語後求竟陵郡不知所以置辭親人授之百餘言於大衆中欲自陳臨時卒忘所教乃大言曰度啟公度啟公度無食帝笑曰卿何憂無食即賜米百斛上酧據精悉崔慰祖字悦宗沈約謝脁嘗于吏部省中賓友俱集各問慰祖地里中所不悉十餘事慰祖口吃無華辭而酧據精悉一坐稱服之朓歎曰假使班馬復生無以過此南齊書讀謝詩梁高祖重陳郡謝𤣥微詩常曰不讀謝詩三日覺口臭談藪吃怒效已後周鄭偉姓吃當逐鹿於野失之過牧竪而問焉牧竪答之其言亦吃偉怒謂其效已遂射殺之其忍暴如此𫝊二十八木丸窒郝象賢為太子通事舍人后素銜處俊因事誅之臨刑極罵乃死自是訖後世刑人必先以木丸窒口云口過宋之問天后朝求北門學士不許作明河篇以見志則天見其詩謂崔融曰非不知宋之問有奇才但恨有口過耳宋終身慚憤口過謂口臭也雞鳴唐華原令崔思海口吃每共表弟杜延業遞相戲弄杜嘗語崔云延業死遣兄作雞鳴但有所問兄即須報旁人云他口應須自由何得遣人驅使若不肻作何能遣之杜即云能得既而旁人即共杜私賭杜將一把穀來崔前去此是何物崔云穀榖旁人大笑因輸延業啟顔録鉗口元載引用私黨懼朝臣論奏其短乃請百官凡欲論事皆先白長官長官白宰相然後上聞顔真卿上疏曰朝廷開不諱之路猶恐不言況懷厭怠令宰相宣進止御史臺作條目不得直進從此人不奏事矣陛下聞見止於數人耳目天下之士方鉗口結舌陛下漸成孤立後悔無及矣唐書稜等登唐世進士及第放榜訖則須謁宰相其導答詞語一出榜元俯仰疾徐尤宜精審時盧肇首冠有故不至次乃丁稜稜口吃又形體小陋迨引見則俯而致詞意本言稜等登科而稜頳然汗發鞠躬移時乃曰稜等登稜等登竟不能發其後語而罷左右皆笑翌日友人戲之曰聞君善箏可得聞乎稜曰無之友人曰昨日聞稜等登稜等登豈非箏聲耶王泉子談辯風生孫晟口吃遇人不能道寒暄已而坐定談辯風生聴者忘倦南唐嘲吃王汾口吃劉攽嘲曰恐是昌家又疑非類不見雄名唯聞艾氣以周昌韓非揚雄鄧艾皆吃也倦游録如鼻束脩之業其上在於不言其次在于寡知也故諺曰使口如鼻至老不失杜如體論口銘神以感通心由口宣情莫多妄口莫多言病從口入禍從口出存亡之機開闔之術傳子脣脣吻脣縁也口之縁也吻免也入之則碎出則免也又取抆也漱唾所出恒加抆拭因以為名也釋名咡謂之吻舌藩脣者舌之藩周生烈子齒垣脣者齒之垣所以扶神設端若有列星外有限故曰脣亡齒寒元命苞斗脣仲尼斗脣吐教陳機授度孝經鈎命決反脣張蕩與顔異有隙人有告異以他事議下湯治異云異與客語云初令下有不便者異不應微反脣湯奏異九卿見令不便不入言而復誹論死自是後有復誹之法漢書弄脣樊伷顧能弄脣吻實無才畧兔缺魏詠之字長道生而兔缺有善相者謂之曰卿當富貴年十八聞荆州刺史殷仲堪帳下有醫能療貧無行裝謂家人曰殘醜如此用活何為遂齎數斛米西上以投殷仲堪仲堪嘉其意召醫視之醫曰可割而補之但須百日進粥不得笑語詠之曰半生不語而有半生亦當療之況百日耶仲堪於是處之别屋療之詠之遂閉口不語惟食薄粥其勵志如此晉書騰蛇騰蛇鎻脣梁武飢亡臺城上騰蛇即法令紋也梁武帝都建康為侯景逼臺城飲膳被景裁損帝憂憤成疾口苦索蜜不得再曰荷荷遂殂神異賦補脣方干為人脣缺有司以為不可與科名連應十餘舉遂隱居鑑湖後數十年遇醫補脣年已老矣人號曰補脣先生又性好侮人嘗與龍丘李主簿同酌李目有翳干改令譏曰措大喫酒㸃鹽軍將喫酒㸃醬只見門外著籬未見眼中安障李答曰措大喫酒㸃鹽下人喫酒㸃鮓只見手臂著欄未見口脣開袴摭言齒毁齒齓毁齒也男八月生齒八嵗而齓女七月生齒七嵗而齓説文長㓜齒始也少長之别始乎此也以齒食多者長食少者㓜也釋名身寳夫齒者年也身之寳也藏之斧鑿所以調諧五味以安性氣者也楊泉物理論秉度帝嚳駢齒河圖矩起帝駢駢齒上法曰叅秉度成紀以理隂陽白虎通駢齒武王駢齒是謂剛强取象叅房誅害以從天心元命苞房為明堂主布政叅為大辰生斬刈兼此二者故重齒為表注夫子駢齒象鈎星也孝經鈎命決牽折陳僖子使召公子陽生立之將盟遂誣鮑子曰子之命也鮑子曰汝忘君之為孺子牛而折其齒乎孺子荼也累公後銜繩為牛使荼牽之恭須地救折其齒也左傳摺齒范睢事魏中大夫須賈賈使齊睢從齊襄王聞睢辨賜金及牛酒賈以為睢持魏隂事告齊故得此饋以告魏相魏齊大怒使舍人笞擊睢折脇擢齒睢佯死史記無齒張蒼長八尺餘免相後老口中無齒食乳女子為乳母妻妾以百數嘗孕者不復幸年百餘嵗而卒上梭折謝鯤隣家高氏女有美色鯤嘗挑之女投梭折其兩齒時人語曰任達不已㓜輿折齒鯤聞之傲然長嘯曰猶不廢我嘯歌齒疾温嶠先有齒疾因抜中風而卒晉書相須王子猷詣謝萬林公先在坐瞻矚甚高王曰若林公鬚髪並全神情當復勝此不謝曰脣齒相須不可以偏亡鬚髪何闗於神明林公意甚惡曰七尺之軀今日委君二賢世説狗竇張𤣥之年八嵗虧齒先達知其不常故戲之曰君口中何為開狗竇張應聲答曰正使君輩從此中出入上利齒簡文在殿上行右軍與孫興公在後右軍指簡文語孫曰此噉名客簡文顧曰天下自有利齒兒後王光禄作㑹稽謝車騎出曲阿祖之王孝伯罷祕書丞在坐謝言及此事因視孝伯曰王丞齒似不鈍王曰不鈍頗亦驗上齒冷隆昌末樂預謂丹陽尹徐孝嗣曰外傳藉藉似有伊周之事君蒙武帝殊常之恩荷託付之重恐不得同人此事人笑楮公至今齒冷無為効尤南史智牙齊太上主生齻牙問於尚藥典御鄧宣以對太上主怒而撻之中書監徐之才拜賀曰此智牙生者聰明長壽太上悦而賞之三國典畧齒生則天春秋高左右不悟其衰俄而二齒生詔改元長壽李敬仁賀表云易有四營金牙為壽考之象詩具六義玉齒載神仙之謠還年而輔車不虧却老而瓠犀仍出堅而不詭聞於導養之方落而更生得自靈飛之散乞宣示海内仍録付史官擊墮張果帝謂高力士曰吾聞飲堇無苦者奇士也時天寒因取以飲果三進頺然曰非佳酒也乃寢頃視齒燋縮顧左右取鐵如意擊墮之藏帶中更出藥傳其齗良久齒已生粲然駢潔帝益神之妨物元退處士年七十三口中無齒每磨裝胡餅疾齧如刀年少不及常言而今方知齒為妨物齒碎張巡每戰大呼嚼齒皆碎及尹子奇視之其齒存者不過三四唐書晉黄頸處險而癭齒居晉而黄養生論醫説云晉地多棗人常置之懷袖中若粤人之噉檳榔味甘傷脾故齒黄也齒落國人年五十以上四齒皆落將由地寒多障氣也段國沙州記齒黒屠移在海外以皁染齒因號黒齒異物志山梁氏泥於西屠而染其齒袁子正書䕶牙溧水有伍牙山一名䕶牙輿地廣地云子胥伐楚還吳經此山故名伍牙建康志云俗傳伍子胥美齒牙避楚至此恐為人所識以石擊毁其牙山神為震䕶之不毁因名䕶牙堅齒或問堅齒之道答曰養以華池瀨以濃液永不動永不動次則服靈非散既脱更生抱朴子舌舒洩舌洩也舒洩所當言也釋名四寸舌之為言達也陽立於三故舌在口中者長三寸象斗玉衡隂合有四故舌論入溢内者長四寸元命苞玉衡三星也魁四星也宋均注和候舌者和之候也養性經舌出齊桓公約大臣具酒期以日中管仲後至桓公舉觴以飲之管仲半棄酒桓公曰期而後至飲而棄酒於禮可乎管仲對曰臣聞酒入舌出舌出者言失言失者身棄臣計棄身不如棄酒桓公笑曰仲父起就坐説苑示舌常摐有疾老子往問焉曰先生疾甚矣無遺教可以語諸弟子者乎常摐張其口而示老子曰吾舌存乎老子曰然吾齒存乎老子曰亡常摐曰子知之乎老子曰夫舌之存也豈非以其柔耶齒之亡也豈非以其剛耶常摐曰嘻是已天下之事已盡矣無以復語子哉上老子曰學於常摐見舌而守柔仰視屋樹退而因川觀影而知持後文子尚存韓平子問於叔向曰剛與柔孰堅對曰臣年八十矣齒再墮而舌尚存老𣆀有言曰天下之至柔馳騁乎天下之至堅又曰人之生也柔弱其死也剛强柔弱者生之徒也剛强者死之徒也吾是以知柔之堅於剛也平子曰善哉説苑七重仲尼舌理七重陳機授度孝經鈎命決不能為舌子思見老萊子老萊子曰若子事君將何以為乎子思曰順吾性情以道輔之無死亡焉老萊子曰不可順子之性也子不見夫齒乎齒堅剛卒盡相磨舌柔順終以不弊子思曰吾不能為舌故不能事君孔叢子舌在張儀嘗從楚相飲已而楚相亡璧門下意儀盜璧共執儀掠笞數百不服釋之其妻曰子無讀書游説安得此辱乎儀張口曰視吾舌尚在否妻曰在也儀曰足矣史記三寸平原君既已定從而歸至於趙曰毛先生以三寸之舌強於百萬之師史記蒯通謂韓信曰酈生一士伏軾掉三寸之舌下齊七十城上留侯曰今以三寸舌為帝者師封萬户位列侯此布衣之極於良足矣上吞舌荆軻見燕太子太子曰田先生今無恙乎軻曰光臨送軻之時言太子戒以國事恥以丈夫而不見信向軻吞舌而死矣燕丹子舌舉公孫龍口吐而不合舌舉而不下莊子切食東海公賓就斬王莽傳首更始懸宛市百姓共提擊之或切食其舌漢書咋舌馬援與隗嚚將楊廣書曰豈有知其一成而但萎膢咋舌义手從族乎後漢流血曹操與劉備密言備泄於袁紹紹知操有圖已之意操自咋其舌流血以失言誡後世英雄記舌耕賈逵博通墳典門徒來學皆口授經文贈獻者積粟盈倉或云逵非力耕所謂誦經口倦世所謂舌耕也拾遺記妙舌沈友字子正弱冠博學多所貫綜善屬文辭又辯於口每所至衆人皆黙然莫與為對咸言其筆之妙舌之妙刀之妙三者皆過絶於人吳録竹攙諸葛誕殺樂綝有典農都尉數讒誕於是收而斬之罵曰卿坐舌先人以竹攙其舌然後殺之魏末傳斷舌永嘉中有天竺胡人能斷舌先吐舌示賓客然後乃截血覆地乃取置器中傳以示人取舌還合有頃如故搜神記拔舌温嶠密啟肅祖陳王敦敦聞曰果為小物所欺表誅奸臣以嶠為首募生得嶠者當自投其舌中興書舌强殷仲堪云三日不讀道德經便覺舌本間强郭子舌短南都王義宣生而舌短言澀宋書釘柱穎川王偉有才學為侯景左僕射景敗被擒送江陵湘東王欲活之左右妬其才乃曰為作檄文繹視之大怒釘偉舌於柱談藪錐刺賀若弼父敦以武烈知名仕周宇文䕶忌而害之臨刑呼弼謂之曰吾以舌死汝不可不思因引錐刺弼舌出血戒以慎口隋書不可禁張延賞怙權嫉柳渾遣親厚謂曰明公舊德第謹言于朝則位可久渾曰為吾謝張公渾頭可斷舌不可禁卒為所擠唐書剪舌䕫州道士王法朗舌長呼字不正乃日誦道德經後夢老君剪舌上生毛馮延已鎮臨川聞朝議已有除替一夕夢通舌生毛翊有僧解之曰毛生舌間不可剃也相公其未替乎果已南唐近事三疊宋崔公度與文同嘗言為館職思同京南同曰吾聞人不妄語者舌可過鼻即吐其舌三疊之如餅狀引之至眉間公度大驚即京中傳同死公度乃悟所見非生者文苑傳同東坡從表兄也舌端傳曰鳥之美羽勾啄者鳥畏之魚之侈口垂腴者魚畏之人之利口贍辭者人畏之是以君子避三端避文士之筆端避武士之鋒端避辯士之舌端韓詩外傳舌神舌神通命字正倫内經舌神名始梁峙字道岐髪蒼華髪神蒼華字太元腦神精振字泥丸内經九華真妃云髪者腦之華腦減則髪素妾有還白之法真誥髪神名𤣥文華字道衡髪與足齊帝嚳高辛氏娶於娵氏女女生而髪與足齊墜地能言乃納於帝拾遺記朱髪共工人面蛇身朱髪歸藏啟筮剪髪殷湯尅夏而大旱湯乃以身禱於桑林剪其髪自以為犧牲祈福於上帝吕覽斷髪子貢答太宰嚭曰大伯端委以治周禮仲雍嗣之斷髪文身臝以為飾豈禮也哉襄七太伯虞伯知古公欲立季歴以傳昌二人亡如荆蠻文身斷髪以讓季歴史記種種齊侯田于莒盧蒲嫳見泣且請曰余髪如此種種余奚能為公曰諾吾告二子歸而告之子尾欲復之子雅不可曰彼其髪短而心甚長其或寢處我矣昭二生白老𣆀初生而髪白故號老子帝王世紀髠髢衛桓公欲逐石圃圃攻公公入于戎州已氏初公自城上見已氏之妻髪美使髠之以為吕姜髢也既入焉而示之璧曰活我吾與女璧已氏曰殺女璧其焉往遂殺之而取其璧哀十七髢髲也進炙髪繞晉平公觴客少庶子進炙而髪繞之平公趣殺炮人毋有反令炮人呼天曰嗟乎臣有三罪也而不自知乎平公曰何謂也對曰臣刀之利風靡骨斷而髪不斷是臣之一死也火炭炙之肉紅白而髪不焦是臣之二死也炙熟又重睫而視之髪繞炙而目不見是臣之三死也意者堂下其有翳憎臣者乎殺臣不亦蚤乎韓非子文公之時宰臣上炙而髪繞之上斷髪公孫𢎞斷髪而為越王騎公孫喜使人絶之曰吾不與子為昆弟矣公孫𢎞曰我斷髪子斷頸而為人用兵我將謂子何周南之戰公孫喜死焉上遞剪張儀蘇秦二人共遞剪髪以相活或傭力寫書行遇聖人之文無以題記則以墨畫於掌内及股裏夜還更以竹寫之拾遺記衝冠藺相如使秦相如持璧却立倚柱怒髪上衝冠史記荆軻入秦取道而歌復為羽聲忼慷士皆瞋目髪盡上衝冠國䇿史作指冠擢髪須賈使秦范睢謂賈曰汝罪有幾曰擢賈之髪以續賈之罪尚未足也史記被髪上敗彭城薛人丁固追上上被髪而顧曰丁公何相急之甚乃罵而去上即位欲陳功上曰使項羽失天下是子也為人臣兩心非忠也下吏笞之楚漢春秋拭白漢元鼎間郅支國貢馬肝石百升以之拭髪白者皆黒帝坐羣臣於甘泉殿有髪白以此拭髪應手皆黒是時公卿語曰不願方伯惟願拭肝石染髪更始元年置百官王莽聞之愈恐欲外示自安乃染其髪鬢漢書四起髻馬皇后身長七尺二寸方口美髪為四起大髻但以髪成尚有餘繞髻三匝眉不施黛獨在眉角小結補之如粟嘗稱疾而終身得意東觀漢記截髪供費樂羊學書其妻貞義截髪以供其費列女傳援劍割髪曹操嘗行經麥中令士卒無敗麥犯者死騎士皆下馬持麥以相付時操馬騰入麥中操曰制法而自犯之何以師下然孤為軍帥不可殺請自刑因援劔割髪以置地曹瞞傳立髪委地明帝天姿秀出立髪委地口吃少言而沈毅好斷魏氏春秋垂髪至地初武帝未為世子文帝問裴秀曰人有相不秀曰中撫軍垂髪至地伸手過膝非人臣之相也王隱晉書五截故中牟令蘇韶字孝先咸寧初亡諸子迎喪至襄城第九子節夢見鹵簿行列甚肅見韶曰卿犯鹵簿應髠刑節俛受剃驚覺摸頭得斷髪如大指大後又夢見韶截之節素美髪五截而盡上長七尺廣陵公陳逵妹才色葚美髪長七尺石虎以為夫人鄴中記為髲陶侃少酷貧與母湛氏同居同郡范逵素知名舉孝亷投侃宿于時氷一積日侃室如懸磬而逵馬僕甚多侃母湛氏語侃曰汝但出外留客吾自為計湛頭髪委地下為二髪賈得數斛米日夕遂設精食從者皆無所乏逵既歎其才辯又深愧其厚意及洛遂稱之於羊晫顧榮諸人大獲美譽世説髪與身齊劉曜王子胤風骨俊茂爽朗卓然身長八尺三寸髪與身齊載記冠裂王遜為寧州刺史李雄將李驤冦寜州遜使姚崇拒戰大破之遜以崇不窮追執崇鞭之怒甚髪上衝冠冠為之裂夜中卒晉書髪鬢謝靈運欲入逺公社逺公拒之曰子髪鬢而鬚美面與身戾非令終之相運怒曰學道在心安以貌耶逺公笑而不答後果如所料盧循反逺與之執手言笑知人之鍳何明于靈運而暗于循如此耶嵩仲虚鈔書紀事青青何長瑜臨川王義慶招集文士長瑜自國侍郎至平西記室叅軍嘗於江陵寄書與宗人何朂以韻語序義慶州府僚佐云陸展染鬢髪欲以媚側室青春不解久星星行復出如此者五六句宋書靈拔白廢帝昭業高帝為相王鎮東府時年五嵗戲床前高帝方令左右拔白髪問之曰兒言我誰耶答曰太翁高帝笑謂左右曰豈有為人作曽祖而拔白髪者乎即擲鏡鑷齊紀宿白謝超宗下廷尉一宿髪白皓首齊書徐夤嘗有罪係獄旦日原之而髪皓白武帝問其故曰臣思愆於内而髪變方外當時稱之上須鬢如畫簡文帝器宇寛𢎞尊嚴若神方頥豐下須鬢如畫直髪委地雙眉翠色項毛左旋連錢入背手執玉如意不相分辨眄睞則目光燭人讀書十行俱下南史紀惡白後梁蕭詧惡見人髪白事之者必方便避之擔輿者冬月必須褁頭夏月則加蓮葉帽髪光可鑑陳后主張貴妃麗華髪長七尺鬒黒如漆其光可鑑容色端麗每瞻視眄睞光彩溢目照映左右南史身齊高祖太穆皇后竇氏毅之女也后生而髪垂過頸三嵗與身齊周武帝特愛重之養於宫中舊唐侍母髪白唐李日知神龍初為給事中母老病取急調侍數日鬚髪輒白引刀斷髪𤣥宗貴妃楊氏天寳九載妃復得譴還外第帝感動輒食詔中人張韜光賜之妃因韜光謝帝曰妾有罪當萬誅然膚法外皆上所賜今且死無以報引刀斷一繚髪奏之曰以此留訣帝見駭惋遽召入禮遇如初上髪動顔杲卿初杲卿被殺狗首干衢莫敢收有張湊者得其髪持謁上皇是昔見夢帝寤為祭後湊歸髪于其妻妻疑之髪若動云氣攻軒轅先生居羅浮山宣宗召禁中問道術能散髪箕踞用氣攻其髪條條如鐵線直大中遺事長五尺李山甫美姿容而多髪翳然長五尺餘嘗沐後令二婢捧金盆承而梳之有客造焉見理髪趣出疑其婦人山甫連呼之方悟牧竪閒談中虚魏時有句驪客善用鍼取寸髪斬為十餘段以鍼貫取之言髪中虚也其妙如此酉陽黒光如漆信都蘇氏巨室有十女擇良壻張文成往成蘇曰子雖有才不能富貴得五品官即死時魏知古方及第蘇曰此雖黒小必貴以長女妻之女髪長七尺黒光如漆相者云大富貴後知古拜相封夫人脈望建中末書生何諷嘗買得黄紙古書一卷讀之卷中得髪捲規四寸如環無端諷因絶之斷處兩頭滴水升餘焼之作髪氣諷嘗言於道者道曰吁君固俗骨遇此不能羽化命也據仙經曰蠧魚三食神仙字則化為此物名曰脈望夜以規映當天中星星使立降可求還丹取此水和而服之即時換骨上昇因取古書閲之數處蠧漏尋義讀之皆神仙字諷方嘆伏原化記酉陽拳髪金鈎相士相文天祥云官雖極貴然當受極刑如其故云頂有拳髪此受刑之相也凡人若具此相無得免者癸辛雜志宋臧賢長六尺七寸出面露口頽頂拳髪後以與南郡王義宣同謀敗走被殺依王莽事漆其頭藏于武庫南史須髪為矟旄竟陵劉誕在廣陵左右直眠夢人告之曰官須髪為稍旄則覺已失髪矣如此數十人續異記髭鬚髭鬚口上曰髭髭姿也為姿容之美也頥下曰鬚鬚秀也物成乃秀人成而鬚生也亦取須體幹長而後生也在頰耳旁曰髯隨口動搖髯髯然也釋名委地庖羲鬚垂委地世紀有古彊者自言四千嵗敢為虚言云見堯為人長大美鬚髪抱朴生而有頿周定王六年秦人降妖曰周其有頿髭王亦克能修其職至於靈王生而有頿王甚神聖昭二十六不舉生鬢鬚子俗説人十四五乃當生鬢鬚今生而有人妨害父母也謹按周書靈王生而有髭王甚神聖亦克脩其職諸侯服享二世休和安在其有害乎風俗通于思宋城華元為植巡功城者謳曰睅其目皤其腹棄甲而復于思于思棄甲復來宣二思音顋多鬚之貌長鬛楚子享公于新臺使長鬛者相好以大屈既而悔之昭七滅髭衛蒯瞶亂子羔滅髭鬚衣婦人之衣逃得出曰父子爭國吾何為其間乎幽通賦注滅鬚䂊讓吞炭漆身為厲人不識其形子貢滅鬚為婦人不知其狀論衡宗炳答何承天難釋白黒論云顔夭冉疾由醢予族賜滅其鬚匡陳之苦不可勝言𢎞明集奮髯朱博為琅邪太守曹掾史皆移病卧博問其故對曰故事二干石新到遣吏致意乃敢就職博奮髯抵儿曰觀齊兒欲以此為俗耶乃斥罷諸病吏白巾走出府門郡巾大驚漢書發兵為白岑彭吳漢國隗囂於西城公孫述將李育守上邽帝留蓋延耿弇圍之車駕東歸勅彭書曰兩城若下便可將兵南擊蜀虜人苦不知足既平隴復望蜀每一發兵頭鬚為白後銜鬚温序拜謁者遷䕶羌校尉序行郡至襄武為隗囂將茍宇所拘刼宇謂序曰子若與我并威同力天下可圖也序大怒叱宇因以節檛殺數人宇曰此義士死節可賜以劍序受劍銜鬚於口顧左右曰既為賊所廹殺無令鬚汚土遂伏劍死上諸毛繞居先主與劉璋㑹涪時張裕為璋從事侍坐其人饒鬚先主嘲之曰昔吾家涿郡特多毛姓東西南北皆諸毛也涿令稱曰諸毛繞涿居乎裕即答曰昔有作上黨潞長遷為涿令去官還家時人與書欲署潞則失涿署涿則失潞乃署曰潞涿君先主無鬚故裕以此反之先主常銜其不遜後誅之蜀志虬鬚崔琰字季珪聲姿高暢眉目疎朗鬚長四尺甚有威重朝士瞻望而太祖亦嚴憚焉後有白琰怨謗者罰為徒𨽻使人視之辭色不撓太祖令曰琰雖見刑而通賓客虬鬚直視若有所瞋遂賜琰死魏志黄鬚任城王彰為北中郎將討烏桓有功歸太祖喜時彰鬚曰黄鬚兒竟大奇也上太祖在漢中而劉備栖於山頭使劉封下挑戰太祖罵司賣履舍兒長使假子拒汝公乎待呼我黄鬚來令擊之彰鬚黄故以呼之魏畧于羝根黒山黄巾諸帥自相號字謂騎白馬者為張白騎謂輕捷者為張飛燕謂聲大者為張雷公其饒鬚者則自稱于羝根典畧多髯者謂之羖公寰宇志美髯馬超來降闗羽䕶前書問諸葛亮亮答書曰孟起當與孟德並驅爭先未若髯之絶倫逸羣也羽美鬚髯故亮謂之髯蜀志紫髯張遼問吳降人曰向有紫髯將軍長土短下大便馬善射是誰降人答曰是孫㑹稽也獻帝春秋帛纒張華為人多姿制又好帛繩纒鬚陸雲見而大笑不能自已晉傳兩頭羝鍾毓兄弟警悟過人每有嘲語未嘗屈躓毓語㑹聞安陸能作調試共視之於是與弟盛飾共載從東門至西門一女子笑曰車中央殊高二種都不覺車後一門生云向已被嘲鍾愕然門生曰中央高者兩頭羝毓兄弟多鬚故以此調之世語赤毫劉淵姿儀魁偉身長八尺四寸鬚長三尺餘當心有赤毫毛三根長三尺六寸晉載記土汚劉聰以讒慝故誅詹事曹光光臨刑舉止自若謂刑者曰取席敷之無令土汚吾鬚前趙録長五尺劉曜身長九尺三寸垂手過膝生而眉白目有赤光鬚髯不過百餘根而皆長五尺晉載記毛蠧東中郎叅軍周雅琰封蠶蛾蛓虫使璞射之璞曰射覆得此大落度必是蠶蛾及毛蠧雅琰饒鬚故曰以調之也郭璞洞林内羊闌中滇陽令羊嗣貪而不治縣功曹吏共逐嗣嗣饒鬚乃以嗣内羊闌中始興太守尹虞聞之大怒手劔功曹節粲晉紀蝟毛桓温少與沛國劉惔善惔常稱之曰温眼如紫石稜鬚以蝟毛磔孫仲謀晉宣王之流上􅐖叅軍王珣郗超並有奇才為大司馬所眷拔珣為主簿超為記室叅軍超為人多須珣狀短小于時荆州為之語曰􅐖叅軍短主簿能令公喜能令公怒世説珠毛有人詣謝益壽云向在劉丹陽坐見一客珠毛謝曰正是我家阿瞻瞻多鬚故云爾俗説過膝謝靈運鬚美長至過膝臨刑施為南海祗洹寺維摩語像鬚寺中寳惜初不虧損中宗時安樂公主五日鬪百草欲廣其物色令馳騎取之又恐為他人所得因剪棄其餘遂絶國史纂異嘉話比羊宋津武狎侮羣臣隨其狀貌各有比類多鬚者謂之羊顔師伯缺齒號之曰齴劉秀之儉吝呼為老慳黄門侍郎宗靈秀體肥拜起不便每至集㑹多所賜與欲其瞻謝傾賠以為歡笑宋書鬚落李元䕶為齊州刺史元䕶妾姬十餘聲色自縱情慾既甚支骨消削鬚長二尺一時落盡魏書五十九種鬚李庶以清辯每接梁客徐陵謂其徒曰唯有李庶可語耳庶無鬚髯人謂天閹崔諶嘗翫庶曰教弟種鬚取錐刺而為竅以馬尾插之世傳諸崔多惡疾以滹沱河為崔氏墓田故庶答曰先以方回施貴族藝眉有効然後種鬚邢邵笑謂諶曰卿不詣李庶何故犯之北史酉陽截鬚許惇為司徒主簿以明斷見稱人號為入鐵主簿又美鬚髯下垂至帶省中號為長鬛公齊文宣常因酒酣握惇鬚髯稱美遂以刀截之惟留一握惇懼因而不敢復長時人又號為齊髯公三國典畧辮鬚鮑泉字潤岳少事梁元帝美鬚髯善舉止后以征長沙不尅帝書責之云面如冠玉還疑木偶鬚似蝟毛徒勞繞涿南史侯景使宋子仙等執梁湘東王世子方諸及中撫軍長史鮑泉司馬虞預于郢州是日子仙等至百姓奔告方諸以五色雜綵編鮑泉白鬚對之雙陸弗之信也告者既衆方命闔門縣門未下子仙已入城方諸等膜拜而鮑泉遁入床下子仙窺見泉素髯間綵疑愕憚之及其被執莫不驚笑三國典畧命閉門賊已入城方諸方踞泉腹以五色眊辮其鬚南史本出自骨王頒字景彦僧辨子也痛父為陳武帝所殺隋開皇中獻取陳之䇿陳平召父時壯士潜發其陵剖棺見陳武帝鬚皆不落其本皆出自骨中北史十二垂腰文中子之韓城自龍門闗先濟闗吏仇璋問賈瓊程元曰先濟者為誰吾視其顙頽如也重而不亢目燦如也澈而不瞬口敦如也闞而不張鳯頸龜背鬚垂至腰參如也是必有異人者也程元曰是王通者也文中子虬鬚太宗虬鬚嘗戲張弓挂矢好用四羽大笴長常箭一膚射洞門闔酉陽大好髭鬚太宗幸翠微宮授司農卿李緯為民部尚書房𤣥齡時在京城留守㑹有自京師來者太宗問曰𤣥齡聞李緯拜尚書如何對曰𤣥齡但云李緯大好髭鬚更無他語太宗遽改授緯洛州刺史唐書剪鬚和藥李勣病騐方鬚灰可以燎之太宗乃自剪鬚為其和藥勣頓首見血泣以陳謝帝曰吾為社稷計耳不煩深謝上少白裴洎入相之年纔四十四鬚髪盡白南部新書鬚生若黳海州司馬韋敖曽往嘉興道遇釋子希遁深於繕生之術又能用日辰可代藥石見敷鑷白日貧道為公擇日拔之經五六日僧請鑷其半及生色若黳矣凡三鑷之鬢不復變座客有祈鑷者僧言取時稍差拔後髭色果帶緑其妙如此剃鬚郭忠恕漢湘隂公辟從事宋太宗素聞其名召入館于内侍竇神興舍恕先長髯而美忽盡剃鬚神興驚問之對曰聊以效顰耳神興怒白之除國子主簿談苑寘髯蔡君謨美鬚髯一日屬清閒之燕偶顧問曰卿髯甚美長夜覆之於衾下乎將寘之於外乎君謨無以對歸舍暮就寢思聖語以髯寘之内外悉不安一夕不能寢蓋無心與有心異也鐵圍山叢談婦有鬚李光進母李有鬚數十長五寸忽生髭宣和六年都城有酒肆號豐樂樓酒保朱氏子之妻年四十餘楚州人忽生髭長僅六七寸疏秀而美宛然一男子特詔度為女道士宋史纒繩崔文仲祖思宗人也為徐州刺史嘗獻齊高帝纒鬚繩一枚上納受之南史頰頷面旁煩面旁也輔頰也説文頰夾也面旁稱也頥養也動於下止於上上下咀物以養人也輔車其骨强所以輔持口也或曰牙車牙所載也或曰頷頷含也口含物之車也或曰頰車亦所以載物也釋名牙車頷車牙下骨之名也頰之與輔口旁朋之名也蓋輔車一處分為二名耳輔為外表車是内骨左僖疏􅀢有美一人碩大且􅀢韓詩􅀢重頥也薛注相依晉侯復假道於虞以伐虢宫之奇諫曰虢虞之表也虢亡虞必從之諺所謂輔車相依脣亡齒寒者其虞虢之謂也僖五䇿貫白公勝慮亂罷朝倒杖而䇿銳貫顊血流至于地而不知鄭人聞之曰顊之忘將何為忘哉韓喻老燕頷班超字仲升為人有大志不脩小節嘗行詣相者相者曰祭酒布衣諸生而當封侯萬里之外超問其狀相者曰生燕頷虎頸飛而食肉此萬里侯相也後漢樹頰許子將褒貶不平以拔樊子昭而抑許文林劉曄曰子昭發自賈堅年至耳順退能守靜進能不茍濟答曰子昭誠自長㓜完潔然觀其搖牙樹頰自非文休敵也蔣濟萬機論益毛顧長康畫裴叔則頰上益三毛人問其故顧曰裴楷儁朗有識具正此是其識具看畫者尋之定覺益三毛如有神明殊勝未安時世説拄頰王子猷作桓車騎叅軍桓謂王曰卿在府久此當相料理初不答直高視以手版拄頰云西山朝來致有爽氣上手手掌手須也事業之所須也掌言可以排掌也釋名法天掌圓法天以運動元命苞法五行指五者法五行上握褒舜手握褒孝經援神契手中有褒字也喻從勞苦起受褒飾致天祚宋均注手字武王與叔虞母㑹時夢天謂武王曰余命女生子名虞余與之唐及生子文在其手曰虞故遂因名之曰虞史記宋武公生仲子仲子生而有文在其手曰為魯夫人故仲子歸於我生桓公隱元成李之將生也桓公使卜楚丘之父卜之曰男其名曰友及生有文在其手曰友遂以命之閔二啖手齊桓公北伐中山還倚柱歎曰天下珍寳悉易得但未得食人肉耳易牙歸斷其兒手以啖於君也論語隱義管仲曰易牙蒸其首子而進之韓子桓公曰易牙烹其子以慊寡人吕覽割指管仲射小白中其鈎白陽僵鮑叔割指血塗之傾蓋以覆之哭曰吾君死矣魯攝兵班固幽通賦注虎掌仲尼虎掌是謂威射鈎命決澹臺滅明岐掌是謂正直樀輔象握文仲弓鈎文在手是謂知始宰我守握户是謂守道子㳺手握文雅是敏士公冶長握輔是謂習道子貢手握正是謂受相公伯周手握直期是謂疾惡上傷指夫差聞孔子至吳微服觀之或人傷其指王怒欲索國而誅之子胥諫乃止吳越春秋焠掌有子惡卧而焠掌荀子有子刺掌脩名立齊竟陵王努力門頌有若好卧則刺其掌桓範世要論手拳孝武帝鈎弋趙媫妤家在河間上巡狩過河間有紫青氣自地屬天望氣者以為其下當有奇女天子之祥上使求之見有一女子在空館中姿貌殊絶兩手皆拳上令開其手數十人劈之莫能舒上於是自披手手即伸由是得幸號拳夫人生昭帝漢書文奇公孫述自言手文有奇瑞數移書中國上賜述書曰瑞應手掌成文亦非吾所知東觀漢記三公公長七尺八寸多鬚髯手握三公之字李郃别傳唾掌公孫瓉為袁紹所圍曰天下兵起我謂可唾掌而決今視孫之兵革方始不如休兵積榖九州春秋手文曰淵劉淵父豹母呼延氏淵生而左手有文曰淵遂以命之三十六國春秋彭神符生而有文在其手曰神符上尊拳劉伶嘗醉與俗人相忤其人攘袂奮拳而往伶徐曰雞肋不足以安尊拳其人笑而止晉書毒手初石勒與李陽鄰居嵗常爭麻地迭相歐擊至是謂父老曰李陽壯士也何以不來漚麻是布衣之恨孤方崇信于天下寧讎匹夫乎乃使召陽既至勒與酣謔引陽臂笑曰孤往日厭卿老拳卿亦飽孤毒手因賜甲第一區拜叅軍都尉上載記晉王與梁有隙交兵累年後晉王數困欲與梁通和使李襲吉為書諭梁辭甚辨麗梁太祖使人讀之至於毒手尊拳交相於莫夜金戈鐵馬蹂踐於明時歎曰李公僻處一隅有士如此使吾得之傳虎以翼也顧其從事敬翔曰善為我答之五代史文達中指陶侃左手有文直達中指至上横節便絶占者以為此文若過位在無極侃鍼挑令徹血流彈壁乃作公字又取紙褁公迹愈明異苑手文曰武梁武帝母張氏嘗夢抱日已而有娠遂産帝帝生而有異光狀貌殊特日角龍顔重岳虎顧舌文八字項有浮光身映日無景兩骻駢骨項上隆起有文在右手曰武帝為兒時能蹈空而行南史偏直梁劉之遴字思真文範先生虬之子也博綜文史尚書令沈休之深敬器之右手偏直不得屈伸每書則以紙就筆三國典畧夢落十指魏莊帝之將圖爾朱榮也夜夢手持一刀自害落十指甲都不覺惡之以告城陽王徽及楊侃徽解夢曰蝮蛇螫手壯士解腕割指節與解腕何異去患乃是吉祥聞者皆言善北史三十六無左隋文帝未貴時常舟行江中夜泊中夢無左手及覺甚惡之及登岸詣一草菴中有一老僧道極高具以夢告之僧起賀曰無左手者獨拳也當為天子後帝興建此菴為吉祥寺居武昌下三十里獨異志摸書知字隋盧大翼㓜稱神童後目盲以手摸書而知其字北史長尺餘隋煬帝時楊𤣥感反餘杭民劉元進起兵應之元進手長尺餘臂垂過膝自以表相非常隂有異志隋書翟天師名乾祐長六尺手大尺餘每揖人手過胷前酉陽好手承乾數引侯君集入内問以自安之術君集以承乾劣弱意欲乗釁以圖之遂賛承乾隂謀不軌常舉手謂承乾曰此好手當為殿下用之唐書右指黒毫則天初誕之夕雌雉皆雊右手中指有黒毫左旋如黒子引之長尺餘酉陽畫圓方元嘉少聰俊左手畫圓右手畫方口誦經史目數羣羊兼成四十字詩一時而就足書五言一絶六事齊舉伐號神仙童子僉載名實相須而成形體相應而生故一手獨抃雖疾無聲故曰左手畫圓右手畫方則不兩成韓子重五斤陸餘慶善論事而謬於判時人嘲之曰説事喙長三尺判事手重五斤疾從指入崔渾御史性至温恭能盡色養父母少不安輒祈幽靈以身代母嘗有疾渾跪請病授已有頃覺疾從十指入俄而偏身母所苦遂愈丁父艱勺飲不入口哀毁瘠立無何不勝哀而卒朝野傷心僉載霹靂手裴琰之為同州司户名動一州號霹靂手繡迹於衣莊宗嘗問高季興曰吾已滅梁欲征吳蜀何者為先季興曰宜先蜀臣請以本道兵先進莊宗大悦以手拊其背季興因命工繡其手迹於衣歸以為榮耀季興已去歸而謂梁震曰主上百戰以取河南對功臣誇手抄春秋又曰我於手指上取天下其自矜伐如此而荒于遊畋政事多廢吾可無慮矣五代史乂手卧王文公凝每寢必乂手而卧慮夢中見先靈也北夢瑣言重蹠烏滸人以人掌蹠為珍重以保長老南方異物志足趾足趾足也爾雅無事曰趾陳設曰足元鼎録注足底也續也言續脛也趾止也言行一進一止也脚却也以其坐時却在後也釋名䕫一足魯哀公問孔子曰吾聞䕫一足信乎對曰䕫人也獨通於聲堯曰䕫一而足矣使為樂正韓子足文履已大禹右足文履已子帝王世紀下有八卦老君足下有八卦抱朴不能衛足鄭伯治與於雍糾之亂者則强鉏君子謂强鉏不能衛其足左莊葵衛足齊刖鮑牽仲尼曰鮑莊子之智不如葵葵猶能衛其足成十三玉趾楚使薳啟彊召魯公辭曰今君若步玉趾辱見寡君寵靈楚國昭七不良衛襄公夫人姜氏無子嬖人婤姶生孟縶孟縶之足不良能行上輒衛侯之兄輒何為君也曰有天疾者不得入乎宗廟輒兩足不能相隨齊謂之纂楚謂之蹶衛謂之輒榖梁傳韈登衛侯輒為靈臺于藉圃與諸大夫飲酒焉禇師聲子韈而登席公怒辭曰臣有疾異于人若見之君將驚懼是以不敢公愈怒大夫辭之禇師出公握其手曰必斷而足哀二十五曳足晉平公與唐亥坐而出叔向入公曳一足叔向問之公曰吾待唐子腓痛足痺而不敢申叔向不悦公曰子欲貴吾爵子子欲富吾禄子夫唐先生無欲也非正坐吾無以養之韓子重繭申包胥如秦乞師踰越險阻曽繭重胝立於秦庭號哭七日幽通賦注楚欲攻宋墨子聞之自魯至而十日十夜足重繭而不休息至郢見楚王斷足孫臏嘗與龎涓俱學兵法龎涓􅀈事魏得為惠王將軍而自以為能不及孫臏乃隂使召孫臏臏至恐其賢於已疾之則以法刑斷其兩足而黥之欲隱勿見史記摩足張湯有所愛史魯謁居病卧閭里主人湯自往視病為謁居摩足趙王上書告湯人臣也史謁居有病湯至為摩足疑與為大姦事下廷尉漢書足下有毛宣帝高才好學足下有毛居止數有神光照矅每買餅所從買家輒大售漢紀身足下有毛漢書履龜文李固郃之子也貌狀有奇表鼎角匿犀足履龜文後漢自割申足留贊字正明㑹稽人少為郡吏與黄巾賊帥吳桓戰手斬得桓贊一足被創遂屈不伸然性烈好讀書史每覽古良將戰攻之勢輒自歎躄廢因呼諸近親欲割引申足幾復見用衆皆難之有問贊乃以刀自割其筋血流滂沱氣絶良久家人驚怖亦以既爾遂引申之足申創愈以得蹉步凌統奇之乃表薦試用屢立戰功吳志伸脚局下王濟嘗與武帝圍棋濟伸脚在局下因問孫皓曰聞君生剥人面皮何也皓曰見人臣無禮于君者則剥之武子大慚遽縮脚三十國春秋賈充問皓何以剥人面皮皓曰憎其顔之厚也語林病廢習鑿齒以脚病廢於里巷符堅滅樊鄧素聞其名與釋道安俱舉而致焉與語大説以其蹇疾裁堪半下與諸鎮書曰晉氏平吳利在二陸今得漢南得士一人半耳續晉曰脚病陶潛無履江州刺史王𢎞顧左右為之造履左右請履度潛便於座伸足令度焉𢎞要之還州問其所乗答云素有脚病向未藍輿亦足自反乃令一門生二兒共輿之晉書躄疾多忌齊始安王遙光生而躄疾多忌人有餉履者以為戲已大被嫌責劉繪餞云智不及葵亦以忤㫖南史洗足致敗梁隂子春雖無佗才行臨人以亷潔稱閨門混雜而身服垢汙脚數年一洗言每洗則失財敗事云在梁州以洗足致梁州敗上肉瘤侯景左足上有肉瘤狀似龜戰應克捷瘤則隱起分明如其不勝瘤則低下至石頭之役瘤隱肉中云典足下黒子安禄山初為張仁愿帳下走使之吏仁愿嘗令洗足仁愿脚下有黒子禄山因竊窺之仁愿顧笑曰黒子吾貴相也禄山曰某賤人雙足俱有之比將軍者黒而加大不知其何祥也仁愿觀而異之益親厚之約為義兒而加寵薦焉明皇雜録定命録郭子儀渾瑊具行曽事同龍脚馬希範二脚左右長尺餘謂之龍脚人或誤觸則終日頭痛幙府燕閒録天中記卷二十二
