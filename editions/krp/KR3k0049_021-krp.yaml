body:
  text: 天中記卷二十一明陳耀文撰美丈夫美而艷宋公子鮑禮於國人鮑美而艷襄夫人欲通之而不可乃助之施左文十六容冶楚襄王時宋玉休歸唐勒䜛之於王王謂玉曰身體容冶口多㣲辭不亦薄乎玉曰身體容冶受之二親口多㣲辭聞之聖人宋玉風賦好女張子房之知以為其人計魁梧竒偉至見其圖狀貌如婦人好女史記冠玉陳平少時家貧為人長大美色富人張負獨視偉平曰固有美如陳平長貧者乎以女與之後沛公以平為亞將或譛平曰平雖美丈夫如冠玉耳其中未必有也本傳如瓠沛公略地過陽武張蒼以客從攻南陽蒼當斬解衣伏質身長大肥白如瓠時王陵見而怪其美士乃言沛公赦勿斬漢書甚麗公孫𢎞對策時百餘人太常奏𢎞第居下策奏天子擢𢎞對為第一召入見容貌甚麗拜為博士待詔金馬門上甚都司馬相如車騎雍容閑雅甚都上姣好董偃始與母賣珠為事年十三隨母至館陶公主家左右言其姣好主召見曰吾為母養之因留弟中教書計射御年十八而冠入則侍内温柔愛人以主故諸公接之名稱城中號曰董君美麗董賢字聖卿為太子舎人哀帝時為郎𫝊漏在殿下為人美麗哀帝望見悦其儀貌拜為黄門郎寵愛日甚出則参乗入御左右常與上卧起嘗晝寢偏籍上褏上欲起賢未覺不欲動賢迺斷褏而起其恩愛至此絶人王啇長八尺餘身體鴻大容貌甚過絶人单于來朝仰視遷延却退天子聞而嘆曰此真漢相矣如玉陸閎字子春呉縣人暢之子也世為族姓篤行好學聰明有令徳欲尚寜平公主辭疾不應建武中為尚書令閎姿容如玉喜着越布单衣先武升䑓見而偉之歎曰南方固多佳人自是常敇㑹稽郡獻越布焉謝承漢書呉地記如畫馬援長七尺五寸色理髮膚眉目容貌如畫東觀記偉麗陳喬為尚書容儀偉麗數上言政事桓帝愛其才貌詔妻以公主喬固辭不聴還閉口不食七日而死謝承後漢書狀異恒人蔡邕字伯喈謂從弟谷曰董卓性剛難濟吾且遁逃山東以待何如谷曰君狀異恒人每行觀者盈集以此自匿不亦難乎乃止𫝊粉何平叔美姿儀面至白魏明帝疑其𫝊粉正夏月與熱湯䴵既噉大汗出以朱衣自拭色轉皎然世説晏性自喜動静粉帛不去手行歩顧影魏畧倚玉時人目夏侯太初朗朗如日月之入懐明帝使后弟毛曽與夏侯𤣥共坐時人謂蒹葭倚玉樹世説穨唐李安國穨唐如玉山之將摧崩上李豐字安國識别人物海内注意明帝得呉䧏人問江東聞中國名士為誰以安國對之是時豐為黄門郎改名宣上問安國所在左右公卿即具以豐對上曰豐名乃被於呉越邪魏畧龍章鳯姿嵇康身長七尺八寸偉容色土木形骸不加飾厲而龍章鳯姿天質自然正爾在羣形之中便自知非常之器别傳見者歎曰蕭蕭肅肅爽朗清舉或云肅肅如松下風髙而徐引山公曰嵇叔夜之為人也巖巖若孤松之獨立其醉也傀俄若玉山之將崩世説有人語王戎曰嵇延祖卓卓如野鶴之在鷄羣荅曰君未見其父耳上無雙石苞字仲容渤海南皮人也雅矌有智容儀偉麗不脩小節故時人為之語曰石仲容姣無雙晉書擲果潘岳妙有姿容好神情少時挾弹出洛陽道婦人遇者莫不連手共縈之世説安仁至美每行老嫗以果擲之滿車語林連璧潘安仁夏侯湛並有美容喜同行時人謂之連璧岳與湛著契故好同遊世説玉人裴楷字叔則為吏部侍郎風神髙邁容貌俊爽博涉羣書特精義理時人謂之玉人晉書裴令公有儁容儀脕冠冕麤服亂頭皆好時人以為玉人見者曰見裴叔則如玉山上行光映照人世説風塵外物王衍天行竒特明秀若神名士傳總角若造山濤濤嗟嘆良乆既去目而送之曰何物老嫗生寜馨兒晉書夷甫容貌整麗妙於談𤣥恒捉白玉柄塵尾與手都無分别王戎云太尉神姿髙徹如瑶林瓊樹自然是風塵外物王公目太尉巖巖清峙壁立千仞王敦稱太尉處衆人中似珠玉在瓦石間世説石勒見夷甫謂長史孔萇曰吾行天下多矣未嘗見如此人當可活不萇曰彼晉三公不我為用勒曰雖然要不可加以鋒刃也夜使推墻殺之八王故事璧人衞玠在羣伍之中寔有異人之望齠齔時乗白羊車於洛陽市上咸曰誰家璧人於是家門州黨號為璧人别傳王丞相見衞洗馬曰居然有羸形雖復終日調畼若不堪羅綺世説王澄及王𤣥王濟並有盛名皆出玠下世云王家三子不如衞家一兒晉書玠從豫章至下都人乆聞其名觀者如堵墻玠先有羸疾體不堪勞遂成病而死時人謂看殺衞玠世説神仙中人王右軍見杜𢎞治歎曰面如凝脂眼如㸃漆此神仙中人時人有稱王長史形者蔡公曰恨諸人不見杜𢎞治耳上永和中劉惔謝尚共啇畧中朝人士或曰杜乂清標令上為後來之英粗可得方諸衞玠尚曰安得相比其間可容數人惔又云杜乂膚清叔寳神清桓彛亦云江左名士傳晋書琳琅珠玉有人詣王太尉遇安豊大將軍丞相在坐往别屋見季𦙍平子還語人曰今日之行觸目見琳琅珠玉世説不復似世人王濛字世祖有好儀形每覽鏡自照曰王文開那生如馨兒又酷貧㡌敗自以形美乃入㡌肆就㡌就嫗戯乃得新㡌語林林公道王長史飲襟作一來何其軒軒韶舉長史為中書郎往王敬和許爾時積雪長史從門外下車歩入尚書着公服敬和遥望嘆曰此不復似世中人世説風槩桓温豪爽有風槩姿貌甚偉面有七星少與沛國劉惔善惔嘗稱之曰温鬢如反猬皮眉大如紫石稜自是孫仲謀司馬宣王一流人晉書書説初桓温自以雄姿風氣是宣帝劉琨之儔有以其比王敦者意甚不平及是征還於北方得一巧作老婢訪之乃琨妓女也一見温便澘然而泣温問其故荅曰公甚似劉司空温大悦出外整理衣冠又呼婢問婢云面甚似恨薄眼甚似恨小鬚甚似恨赤形甚似恨短聲甚似恨雌温於是裭冠解帶昏然而睡不怡者數日晉書玉舉劉萬安即道真從子庾琮所謂灼然玉舉又云千人亦見百人亦見世説遊雲時人目王右軍飄如遊雲矯若驚龍上朝霞海西時諸公每朝朝堂猶暗唯㑹稽王來軒軒如朝霞舉姿神荀羡字令則七嵗隨父崧在石頭蘇峻愛其姿神恒置膝上年十五將擬國婚乃遁長沙鹽司追尋不得已尚潯陽公主風氣英秀明鬚眉俯仰眄睞容止可則家傳濯濯春月桞張恭美姿儀人多愛悦或目之云濯濯如春月桞嘗被鶴氅裘涉雪而行孟昶窺見之歎曰此真神仙中人也晉書得葛無恨鄢陽陳忠女名豊隣人葛勃有美姿豊與村中數女共聚絡絲戯相謂曰若得壻如葛勃無所恨也異苑兩玉人宋謝晦美風姿善言笑眉目分明鬢髮如黒漆渉獵文義博贍多通時人以方楊徳祖㣲將不及晦聞猶以為恨時謝混風華為江左第一嘗與晦俱在武帝前帝目之曰一時頓有兩玉人耳南史九雙珠孟顗字彦重平昌安丘人衞將軍昶弟也昶顗並美風姿時人謂之雙珠上哺啜可觀王彧字景文㓜為從叔球所知憐美風姿為一時所推讓袁粲見之歎之曰景文非但風流悦乃哺啜亦復可觀有一客少時及見謝混荅曰景文方謝叔源則為野父矣粲惆悵良乆曰恨眼中不見此人宋書藍田生玉謝莊字希逸七嵗能属文及長韶令美容儀宋文帝見而異之謂尚書僕射殷景仁領將軍劉湛曰藍田生玉豈虛也哉上荆楚仙人龔祈字盖道漢夀人也風姿端雅容止可觀中書郎范述見之歎曰此荆楚之仙人也風器庾杲之風範和潤善音吐世祖令對虜使兼侍中上每嘆其風器之美王儉在坐曰杲之為蝉冕所照更生風采南齊二雙宋孝武選侍中四人並以風貌王彧謝莊為一雙玩韜與何偃為一雙常充兼假上方何禇彦囬美儀貌善容止俯仰進退咸有風則每朝會百僚逺國使莫不延首目送之明帝嘗嘆曰禇彦囬能遲行緩歩便得宰相矣時人以方何平叔南史方嵇伏曼容字公儀宋明帝好周易集羣臣於清暑殿講詔曼容字公儀容執經風采帝每以方嵇叔夜使畫人陸探㣲畫叔夜像以賜之梁儒林傳衞杜在目何烱字士光白晳美容貌從兄求㸃每稱之曰叔寳神清𢎞治膚清今觀此子復見衞杜在日上孝行傳衆望禇向字景政淵之孫翔之父也為侍中風儀端麗眉目如㸃每公庭就列為衆所瞻望後卒官外兄謝表為製墓銘云𢎞治推華子嵩慙量酒歸月下風清琴上誦者以為擬得其人上精神大遒崔㥄字長儒貌偉麗善於容止端嶷如神後生第一崔瞻字彦通㓗白善容止神采嶷然侍中李神儁雅有風譽晩年無子見瞻嘆謂邢邵曰昨見崔㥄兒便為後生第一我遂無此物楊愔引為中書侍郎曰昔裴瓉晉世為中書郎神情髙邁每於禁門出入宿衞者皆肅然動容崔生堂堂亦當無愧裴子二天人崔子約長八尺餘姿神儁異潜觀梁使劉孝儀賔從見者駭目武定中與兄子瞻俱詣晉陽寄居佛寺每退朝乆立子約憑几對之儀望俱華儼然相映沙門竊窺之以為二天人也北史面似蓮張易之白晳美姿容與弟昌宗俱侍宫中皆𫝊粉施朱衣錦繡服俱承辟陽之寵武承嗣等呼易之為五郎昌宗為六郎楊再思諛之曰人言六郎面似蓮再思以為蓮花似六郎非六郎似蓮花也舊唐秀整𤣥宗早朝百官趍班上見張九齡風儀秀整有異於衆謂左右曰朕每見張九齡精神頓生語林朝廷羽儀李揆美風儀善奏對肅宗賞歎之嘗謂揆曰卿門第人物文章皆當代第一信朝廷羽儀乎故時人稱為三絶舊唐盧杞令李揆入蕃既至蕃長曰聞唐家第一人李揆公是否揆曰非也第一人李揆争肯到此恐其拘留以此謾之也揆致仕東都大司徒杜公罷淮海也入洛見之言及頭頭第一之説揆曰若道門户有所自承餘裕也官職遭遇爾今形骸凋悴看即下世一切為空何第一之有語林玉而冠崔澹舉止秀峙時謂玉而冠者子逺文采清麗風致整俊人皆慕其為人目為飣坐棃言為席上之珍也唐崔琯傳生菩薩薛調季瓉同年進士調美姿貌人號為生菩薩瓉俊爽人號為劒調寛恕而瓉猜忌論者以時人所稱協其性也劉元章罷江夏入朝以風標自持一日調謁之倒屣出迎愛其風韻去而復留者數四既去謂左右曰若不見其美也調為翰林學士郭妃悦其貌謂懿宗曰駙馬盍若薛調乎語林路巖路侍中巖風貌之美為世所聞鎮成都日委執政於孔目吏邊咸日以技藥自隨宴於江淮都人士女懐擲果之美雖衞玠潘岳不足為比善巾褁蜀人見必効之後乃剪紗巾之脚以異於衆也閭巷有眩服脩容者人必譏之曰爾非路侍中邪比至出豚之肆見膾豕者謂屠生曰此豚端正路侍中不如用之比方良可笑也端美沈詢侍郎清粹端美神仙中人也除山北節旄京師咸重之誦曹唐遊仙詩云玉詔新除沈侍郎便分茅土領東方不知今夜遊何處侍從皆騎白鳯凰即風姿可知也北夣水月觀音蔣凝侍郎亦有人物每到朝士家人以為祥瑞號水月觀音上唐末朝士中有人物者時號玉筍班王界尺趙逢仕唐及梁卒於天成中文學徳行風神秀異號曰玉界尺兩登廊廟四退丘園縉紳仰之北夢美男晉獻公欲伐虞而憚宫之竒存荀息曰周書有言美男破老乃遺之美男教之惡宮之竒宫之竒以諫而不聴遂亡因而伐遂取之秦䇿分桃彌子瑕有寵於衞靈公衞國之法竊駕君車者刖彌子母病人間徃夜告彌子彌子矯駕君車以出君聞而賢之曰孝哉為母之故忘其刖罪異日與君㳺於果園食桃而甘不盡以其半㗖君君曰愛我哉忘其口味以㗖寡人及彌子色衰愛弛得罪於君君曰是固嘗矯駕吾車又嘗㗖我以餘桃韓子色交安陵君纒以顔色美壯得幸於楚共王江乙曰以財交者財盡而交絶以色交者華落而愛渝是以嬖色不敝席寵臣不敝軒願君必請從死以身為殉楚䇿説苑女寵不敝席男愛不盡輪真誥前魚魏王與龍陽君共船而釣龍陽君得十餘魚而泣下以後得大魚而棄前之所得魚喻復得美人而弃己注魏之倖臣國䇿長孫佐輔古宫怨云重逺豈能慙沼鵠棄前方見泣船魚於武陵長信宫云一從悲晝扇幾度泣前魚是皆宫人用也似誤男色諺曰力田不如逢年善仕不如遇合固無虚言非獨女以色媚而仕宦亦有之昔以色幸者多矣史侫幸傳柔曼之傾意非獨女徳蓋亦有男色焉漢書賛男寵自咸寜太康之後男寵大興甚於女色士大夫莫不尚之天下相倣或至夫婦離絶多生怨曠晉志専寵符堅初㓕燕慕容冲姊清河公主年十四有殊色堅納之寵冠后宫冲年十二亦有龍陽之姿堅又幸之姊弟専寵宫人莫進長安歌之曰一雌復一雄雙飛入紫宫咸懼為亂王猛切諌堅乃出冲後冲進逼長安堅遺之錦袍曰朕於卿恩分知何而於一朝忽為此變載記習累沈約懴悔文云追尋少年血氣方壯習累所纒事難排豁淇水上宫誠無云幾分桃斷䄂亦足稱多此實生死牢穿未易洗㧞廣𢎞明集别榻蕭韶字徳茂昔為㓜童庾信愛之有斷䄂之歡衣食所資皆信所給遇客韶亦為信𫝊酒後為郢州刺史信西上江陵途經江夏韶接信甚薄坐青油幕下引信入宴坐信别榻有自矜色信稍不堪因酒酣乃徑上韶牀踐蹋餚饌直視韶面謂曰官今日形容大異近日時賔客滿坐韶甚慙耻南史柔媚王義方彈李義府䟽云義府善柔成信佞媚為心昔事馬周分桃見寵後交劉洎割䄂承恩生其羽翼遂階通逹文粹美婦人娃媛美女為媛毛詩注娃媠窕豔美也呉楚衡淮之間曰娃南楚之外曰媠宋衞晉鄭之間曰豔陳楚周南之間曰窕故呉有館娃宫秦有榛娥䑓秦晉之間美貌謂之娥或謂之姣趙魏燕代之間曰姝自關而西秦晉之故都曰妍美狀為窕美色為豔美心為窈奕偞容也自關而西凡美容謂之奕或謂之偞宋衞曰偞陳楚汝頴之間謂之奕方言容麗曰媌形美曰媠容媚曰婠南楚以好為娃肥骨柔弱曰婐娜頰妍美曰嫌媚容貌曰㜰服䖍通俗􅩱好也詩曰静女其􅩱秦晉謂好曰娙娥吴楚之外謂好曰媠説文有仍昔有仍氏生女黒而甚美光可以鑑人乃曰𤣥妻樂正后䕫取之生伯封實有豕心貪惏無饜忿怒無忌謂之封豕有窮后羿㓕之䕫是以不祀昭二十八昌容殷時有仙女名昌容隔窓見骨帝王世紀玉女紂囚文王於羑里散冝生受命而行宛懐條塗之山有玉女三人冝生得之因費仲而獻之於紂以免文王六韜赤烏赤烏之人獻二女於天子女聰女列為嬖人赤烏氏美人之地也穆天子傳三為粲恭王游於涇上宻康公從有三女奔之其母曰必致之於王夫獸三為羣人三為衆女三為粲夫粲美之物也衆以美物歸女而何徳以堪之王猶不堪况爾小醜康公弗獻一年王㓕密國語目送宋華父督見孔父之妻於路目逆而送之曰美而豔因攻孔氏殺孔父而取其妻公怒督懼遂弑殤公君子以督為有無君之心而後動於惡驪姫驪姫者國色也公羊傳晉獻公伐驪戎克之獲驪姫以歸有寵立以為夫人史蘇告大夫曰夫有男戎必有女戎如其色必授之情從其惡心必敗國且深亂亂必自女戎君子曰知難本矣國語毛嬙麗姫人之所美也魚見之深入鳥見之髙飛麋鹿見之决驟麗之姫艾封人之子也莊子昔秦穆公與晉獻公共伐麗戎之國得美女一玉環二秦取環而晉取女即麗戎國艾地守封彊人之女也成公英麗姫崔本作西施破舌獻公欲伐虢而憚舟之僑存荀息曰周書有言美女破舌乃遺之女樂以亂其政舟之僑諌而不聴遂去因而伐郭遂破之國䇿内美人而虞虢亡晉獻公伐虞虢乃遺之屈産之乗垂棘之璧女樂六以榮其意而亂其政韓内儲南威晋文公得南之威三日不聴朝遂推南之威而逺之曰後世必有以色亡其國者魏䇿三少陳靈公與孔寧儀行父通於夏姫皆𠂻其衵服以戯於朝洩冶諌曰公卿宣滛民無効焉且聞不令君其納之公告二子二子遂殺洩冶宣九靈公與孔寜儀行父飲酒於夏氏公謂行父曰徴舒似女對曰亦似君徴舒病之公出自其廄射而殺之二子奔楚宣十一楚之討陳夏氏也莊王欲納夏姫申公巫臣曰不可君召諸候以討罪也今納夏姫貪其色也貪色為滛滛為大罰君其圖之王乃止子反欲取之巫臣曰是不祥人也是天子蠻殺御叔弑靈侯戮夏南出孔儀䘮陳國何不祥如是天下多美婦人何必是子反乃止王以予連尹襄老襄老死其子黒要烝焉巫臣以夏姫行遂奔晉成二子反怨之後與子重殺巫臣之家成七夏姫内挾伎術老而復壯三為王后七為夫人九為寡婦春秋之初有晉楚之諺曰夏姫得道鷄皮三少宇文士及粧䑓記尤物叔尚欲娶於申公巫臣氏夏姫女其母曰子靈之妻殺三夫一君一子而亡一國兩卿矣可無懲乎吾聞之甚美必有甚惡是鄭穆少妃姚子之子子貉之妺也子貉早死無後而天鍾美於是將必以是大有敗也且三代之亡共其之廢皆是物也女何以為哉夫有尤物足以移人茍非徳義則必有禍叔尚懼不敢取平公强使取之生伯石狼子野心竟㓕羊舌氏昭二十八西施越王以呉王滛而好色大夫種乃使相者國中得苧蘿山鬻薪之女曰西施鄭旦餙以羅榖教以容歩習於土城臨於都巷三年學服而獻於呉乃使相國范蠡進之呉越越謀㓕呉有美女二人一名夷光二名脩明即西施鄭旦之别名以貢於呉呉䖏以椒華之房貫紬珠為簾幌朝下以蔽景夕捲以待月二人當軒並坐理鏡靚粧於珠幌之内竊窺者莫不動心驚魂謂之神人矣乃嗟而目之若雙鸞之在輕霧沚水之漾芙蕖呉王妖惑怠於國政及越兵入國乃抱二女以逃呉苑越軍亂入見二女在樹下皆言神女望而不敢侵拾遺記西施越之美女欲見者先輸金錢一文孟子註䟽曼頰皓齒形姱骨佳不待𫝊粉芳澤而性可悦者西施陽文也淮修務西施之沈其美也墨子嘉興縣南有女兒亭勾踐令范蠡取西施以獻夫差西施於路與范蠡潜通三年始達於呉遂生一子至此亭其子一嵗能言因名女兒亭越絶書云西施亡呉國後復歸范蠡因泛五湖而云唐陸廣㣲呉地記西施山下有浣沙石十道志西施自窺於井不恃其美猶佐湯沐堯舜自窺於世不恃其美猶湏才徳况中庸而距諌嫫母自窺於井以為媚於西施桀紂自窺於世以為賢於堯舜闞子魯仲連謂孟嘗君曰君後宫十妃皆衣縞紵食梁肉豈毛廧先施哉國䇿使先施陽文呉娃𫝊予之徒嬿服而御七發莊齊物厲與西施司馬云夏姫誤毛嬙毛嬙西施天下之美人也盛怨氣於面不能以為可好管子小稱毛嬙西施天下之至姱也衣以皮褐則見者皆走易以𤣥錫則行者皆止慎子國色天子誅邾婁顔而立其弟叔術顔夫人者嫗盈女也國色也其言曰有能為我殺殺顔者吾為其妻叔術為之殺殺顔者而以為妻公羊昭三十一閭娵魯君舉觥於梁惠王曰左白台而右閭湏南威之美也魏䇿閭娵子奢莫之媒也荀佹詩孫子賦閭姝子奢草之媒兮楚䇿謂閭娵為醜惡騷七諫隴㢘與孟娵同宫哀時命後語作明娵集韻引荀子閭娶子奢王質燕昭王即位二年廣延國來獻善舞者二人一名旋娟一名提謨竝玉質凝膚體輕氣馥綽約而窈窕絶古無倫或行無跡影或積年不飢昭王處以錦綃華幄飲以瓀珉之膏飴以丹泉之粟拾遺記苕榮趙武靈王逰大陵夢見䖏女鼓琴後語作瑟而歌詩曰美人熒熒兮顔若苕之榮命乎命乎曽無我嬴異日王飲酒樂數言所夢想見其狀呉廣聞之因夫人而内其女娃嬴孟姚也孟姚有寵於王史記朝雲楚襄王逰雲夢望朝雲之館上有雲氣宋玉曰昔先王懐逰髙唐怠而晝寢夢一婦人曖乎若雲皦乎若星將行未至如浮如傾對曰我赤帝季女名曰瑶姚姫未行而䘮塟於巫山之陽精魂為草實為靈芝所謂巫山之女髙唐之姫王因幸之去而辭曰妾在巫山之陽髙丘之咀旦為行雲暮為行雨朝朝暮暮陽䑓之下且朝視之果如其言故為立廟號曰朝雲襄陽耆舊傳東家登徒子以好色短宋玉於楚王宋玉曰天下之佳人莫若臣里東家之子東家之子増之一分則太長减之一分則太短著粉則太白施朱則太赤眉如翠羽肌如白雪腰如束素齒如含具嫣然一笑惑陽城迷下蔡宋玉賦粉白黛黒張儀之楚見楚王曰彼鄭周之女粉白黛黒立於衢閭之間非知而見之者以為神王曰楚僻陋之國寡人未見中國之女如此其美乃資以珠玉南后鄭䄂聞之大恐令人謂張子曰聞君將之晉有金十斤請供蒭秣長子請王􅜠之王召南后鄭䄂而􅜠之張子再拜曰儀有死罪儀行天下遍矣未嘗見人如此其美面儀言得美人是欺王也王曰吾固以為天下莫若兩人也秦䇿犀角偃月隂姫與江姫争為后司馬喜為隂姫乃謂趙王曰臣聞趙天下善為音佳麗人之所出也今至境入都邑容貌顔色殊無佳麗好美者臣未嘗見人如山中隂姫者也不知者時以為神人若其眉目凖額權衡犀角偃月乃帝王之后非諸侯之姫也趙王大悦欲請之司馬喜歸謂中山君曰趙王非賢主也乃欲請隂姫王宜立以為后以絶趙王之意中山君遂立為后上中相楚考烈王相春申君吏李園園女弟女環謂園曰我聞王老無嗣可見我於春申君我欲假於春申君我得見於春申君徑得見於王矣園曰春申君貴人也千里之佐吾何託敢言女環曰即不見我汝求謁於春申君才人告逺道客請歸待之彼必問汝汝家何等逺道客者因對曰園有女弟魯相聞之使使者來求之園才人使告園者彼必有間汝女弟何能對曰能鼓者讀書通一經故彼必見我園曰諾明日辭春申君才人有逺道客請歸待之春申君果問汝家何等逺道客對曰園有女弟魯相聞之使使求之春申君曰何能對曰能鼓音讀書通一經春申君曰可得見乎明日使待於離亭園曰諾既歸告女環曰吾辭於春申君許我明日夕待於離亭女環曰園冝先供待之春申君到園馳人呼女環到黄昏女環至大縱酒女環鼓琴曲未終春申君大悦留宿明日女環謂春申君曰妾聞王老無嗣屬邦於君君外滛不顧政事使王聞之君上負於王使妾致下負於夫人為之柰何無泄此口君召而戒之春申君以告官屬莫有聞滛女也皆曰諾與女環通未終月女環謂春申君曰妾聞王老無嗣今懐君子以一月矣見妾於王幸産子男君即王公也而何為佐乎君戒念之五日而道之邦中有好女中相可屬嗣者烈王曰諾即召之烈王悦取之十月産子男是為王越絶書畫像齊王起九重之䑓募國中有畫者賜之錢狂卒敬君常居飢寒妻端正敬君工畫貪賜畫䑓去家日乆思念其妻遂畫其像向之嘻笑旁人贍見之以白王王即設酒與敬君相樂謂敬君曰國中獻女無好者以錢百萬請妻可乎不者殺汝敬君慞惶聴許説苑圖形或曰陳平為帝解平城之圍其事秘而不𫝊子知之乎曰城平使畫工圖美女形間遣人遺閼氏云漢有好麗美女其容貌天下無有今皇帝困厄已馳使歸迎取欲進於單于單于見此人必大好愛之愛之則閼氏日不逺踈不如及其未到令漢得脱去去亦不持女來矣閼氏婦女有妬媔之性恐漢女美奪已寵因謂單于曰漢天子亦有神靈得有土地非能有也於是開其一角得突出以計鄙秘不𫝊也桓譚新論漢書音義金屋貯長公主嫖有主欲與太子婚后長主還宫武帝數嵗主抱置膝上問曰兒欲得婦否主指左右長御百餘人皆云不用指其女曰阿嬌好否笑對曰好若得阿嬌作婦當作金屋貯之長主大悦乃若要上遂成婚焉漢武故事萬花谷作景帝問兒欲得婦誤自痛不如尹夫人邢夫人同時并幸武帝有詔不得相見尹夫人自請武帝願見邢夫人帝許之即令他夫人餙從御者數十人為邢夫人來前尹夫人前見之曰此非邢夫人身也帝曰何以言之對曰覩其身貌形狀不足以當人主矣於是帝乃詔使邢夫人衣故衣獨身來前尹夫人望見之曰此真是也於是乃低頭俛而泣自痛其不知也史外戚世家絶世李延年性知音善歌舞侍武帝起舞歌曰北方有佳人絶世而獨立一顧傾人城再顧傾人國寜不知傾城與傾國佳人難再得上歎息曰善世豈有此人乎平陽主因言延年有女弟上乃召見之實妙麗善舞由是得幸李夫人蚤卒上憐閔焉圖畫其形於甘泉宫漢書麗娟武帝所幸宫人名麗娟年十四玉膚柔軟吹氣勝蘭不欲衣纓拂之恐體痕也每歌李延年和之於長生殿唱㢠廻風之曲庭中花皆飜落置麗娟於明離之帳恐塵垢汚其體也帝常以衣帶繫麗娟之𬒮閉於重幕之中恐隨風而去也麗娟以琥珀為佩置衣裾裏不使人知乃言骨節自鳴相與為神恠也洞冥記趙飛燕世祖楊霓拂翳皮軒記鼓汾河而祠祀后土登甘泉而祭昊天奉常獻儀謂之大駕車千乗而騎萬匹以幸姫趙飛燕置屬車間豹尾中晉輿服志燕趙上起明光宫發燕趙美女二千人充之率取十五以上二十以下年滿三十者出嫁凡諸宫美人選二百人常從行郡國載之後車輿上同輦者十六人員數恒使滿皆自然美麗不使粉白黛黒侍尚衣軒者亦如之漢武故事玉女武帝在甘泉宫有玉女䧏常與帝圍棊相娯女丰姿端正帝宻悦乃逼之玉女因吐帝面而去遂病瘡經年故漢書云避暑甘泉宫此其時也幽明録臉若芙蓉卓文君姣好眉色如望逺山臉際常若芙蓉肌膚柔滑如脂十七而寡為人放誕風流故悦司馬長卿之才而越禮焉長卿素有消渇疾及還成都悦文君之色遂以發痼疾乃作美人賦欲以自刺而終不能改卒以此疾至死文君為誄傳於世西京雜記昭君元帝宫人既多乃令畫工圖之欲有呼者輙披圖召之其中常者皆行貨賂王明君姿容甚麗志不茍求工遂毁為其狀後匈奴來和求美女於漢帝帝以明君充行世説及去召見貌為後宫第一善應對舉止閑雅帝悔之而名籍已定帝重信於外國故不復更人乃窮案其事畫工皆棄市西京雜記文頴曰昭君本蜀郡秭歸人也琴操曰昭君者齊國王穰女也年十七儀形絶麗以節聞國中長者求之者王皆不許乃獻元帝石季倫曰昭以觸文帝諱故改為明世説錢蕭娘昭君漢云早信丹青巧重貨洛陽師千金買蟾鬢百萬寫蛾眉松忩雜録飛燕合徳馮萬金善歌世事江都王王孫女嫁江都趙曼萬金又是曼因與主通曼有疾不能近婦人主有身恐乃稱疾一産二女歸於萬金長曰宜主次曰合徳冐姓趙氏宜主聰敏家有彭祖方脉之事善行氣㣲長而纎膩舉止翩然謂之飛燕帝幸之曰豐若有餘柔若無骨遷延謙畏若逺若近禮義人也合徳美容體膚滑出浴不濡善音詞輕緩可聴新沐膏九廽沉水香為巻髪號新興髻為薄眉號逺山黛施小朱號慵來粧左右嘖嘖嗟賞淖夫人在帝后唾曰此禍水也㓕火必矣既進帝大悦以輔屬體無所不靡謂為温柔鄉謂樊嬺曰吾老是鄉矣不能效武帝求白雲鄉也飛燕外傳體無軫粟飛燕初居貧與妺合徳共被嘗通鄰人羽林射鳥者夜露雪立閉息順氣體無軫粟射鳥者以為神仙上唾花飛燕與其妺婕妤坐后誤唾其䄂合徳曰姊唾染人紺碧正似石上花假令尚方為之未必能若此衣之華乃號石華廣䄂上體香趙后浴五藴七香湯踞通香沉水坐燎降神百藴香婕妤浴荳蔲湯𫝊露花百英粉帝嘗私語樊嬺曰后雖有異香不若婕妤體自香也上昭陽趙飛燕為皇后其女弟在昭陽殿遺飛燕書曰今日嘉辰䝿姊懋膺洪册謹上禭三十五條以陳踊躍之心西京雜記后立後寵少衰而弟絶幸為昭儀居昭陽舍漢書妖態梁翼妻孫夀色美而善為妖態作愁眉啼粧墮馬髻折腰歩齲齒笑以為媚惑後漢身推鹿車趙喜與友人韓仲伯欲入武関仲伯以其婦有姿色恐有强暴者而已受其害欲棄之喜責怒仲伯以泥塗其婦面載以鹿車身自推每逢賊輙為求哀言其病遂脱東觀漢記惠而有色魏甄后惠而有色先為袁熈妻甚獲寵曹公之屠鄴也令疾召甄左右白五官中郎已將去公曰今年破賊正為奴世説建安中袁紹為中子熈娶甄會女紹死熈出在幽州甄留侍姑及鄴城破五官將從而入紹舍魏畧見婦人被髪垢面垂涕立紹妻劉後文帝問知是熈妻使令攬髪以䄂拭面姿貌絶倫既過劉謂甄曰不復死矣遂納之有寵世語五官將納熈妻也孔融與曹公書曰武王伐紂以妲己賜周公太祖以融博學真謂書𫝊所記後見融問之對曰以今度古想其然也魏氏春秋感甄記曰魏東阿王漢末求甄逸女既不遂太祖囬與五官中郎將植殊不平晝思夜想廢寢與食黄初中入朝帝示植甄后玉鏤金帶枕植見之不覺泣下時已為郭后䜛死帝意亦尋悟因令太子留宴飲仍以枕賚植植還度轘轅少許時將息洛水上思甄后忽見女來自云我本託心君王其心不遂此枕是我在家時從嫁前與五官中郎將今與君王遂用薦枕席懽情交集豈常辭能具為郭后以糠塞口今被髪羞將此形貌重覩君王爾言訖遂不復見所在遣人獻珠於王王荅以玉佩悲喜不能自勝遂作感甄賦後明帝見之改為洛神賦得妾殺子建安二年春正月曹操征張繡繡䧏其季弟濟妻國色也操以妾為繡由是媒叛襲操七軍大敗之殺其二子袁宏後紀國志繡濟族子鍼神魏文帝所愛美人姓薛名雲芸常山人也芸年十七容貌絶世時文帝選良家子入宫靈芸别父母歔欷累日淚下沾衣至升車就路之時以玉唾壺承淚壺郎如紅色及至京師壺中之淚凝如血色矣帝改靈芸之名曰夜來來妙於鍼工雖處深帷重幄之内不用燈燭裁製立成非夜來縫製帝則不服宫中號為鍼神拾遺記四絶文帝宫人絶所愛者有莫瓊樹薛夜來田尚衣段巧笑四人日夕在側瓊樹乃制蟬鬢縹𦕈如蟬狀故曰蟬鬢巧笑始以錦衣絲履作紫粉拂面尚衣能歌舞夜來善為衣裳一時冠絶古今注絳樹今之妙舞莫巧於綘樹清歌莫激於宋臈文帝與文欽書神女呉主潘夫人父坐法夫人輸入織室容態少儔為江東絶色同幽者百餘人謂夫人為神女敬而逺之有司聞於呉主使圖其容貌夫人憂戚不食减瘦改形工人冩之以進呉主見而喜悦以虎魄如意撫按嗟曰此神女也愁貌尚能惑人况在懽樂乃命雕輪就織室納於後宫果以姿色見寵四姫孫亮作琉璃屏風甚薄而瑩澈每於月下清夜舒之常與愛姫四人皆振古絶色一名朝姝二名麗居三名㓗華四名洛珍刻像孫皓以張布女為美人有寵皓問曰汝父所在荅曰賊以殺之皓大怒棒殺之後思其顔色使巧工刻木作美人形像恒置座側問左右布復有女否荅曰布大女適故衞尉馮朝子純即奪純妻入宫大有寵拜為左夫人晝夜與夫人房宴不聴朝政㑹夫人死皓哀愍思念葬於苑中大作冢使工匠刻栢作木人内冢中以為兵衞江表傳神傷荀􅙾常以婦人才智不足論自宜以色為主驃騎將軍曹洪女有色􅙾於是聘焉容服帷帳甚麗専房燕婉歴年後婦病亡未殯𫝊嘏往喭􅙾􅙾不哭而神傷蝦問曰婦人才色並茂為難子之聘也遺才存色非難遇也何哀之甚􅙾曰佳人難再得顧逝者不能有傾城之異然未可易遇也痛悼不能已已嵗餘亦亡世説光麗韓夀美姿容賈充辟以為掾充每聚㑹賈女於青璅中看見夀説之恒懐存想光麗豔逸端美絶倫夀聞之心動遂請婢潜修音問及其往宿夀蹻捷絶人踰牆而入家中莫知自是充覺女盛自拂拭説畼有異於常後㑹諸吏聞夀有竒香之氣是外國所貢一箸人則歴月不歇充計武帝唯賜已及陳騫餘家無此香疑夀與女通而垣牆重宻門閣急峻何由得爾乃託言有盗令人脩牆使反曰其餘無異唯東北角如有人跡而牆髙非人所踰充乃取女左右婢考問即以狀對充祕之以女妻夀别傳郭子謂與韓夀通者乃是陳騫女即以妻夀之未婚而女亡夀因娶賈氏故世因𫝊是充女晉諸公賛曰夀字徳真敦家風性忠厚豈有若斯之事諸書無聞唯見世説自未可信注騫弟與其子興興忿争遂説騫子女穢行騫表徙弟以此獲譏於世晉書章丹陳珠夏統從父祀先人迎女巫章丹陳珠二人並有國色莊服甚麗善歌舞又能隠形匿影吞刀吐火統破藩而走歸責諸人曰昔滛亂之俗興衞文公為之悲惋螮蝀之氣見君子尚不敢指季桓納齊女仲尼載馳而退子路見夏南憤恚而忼愾吾常恨不得頓叔向之頭䧟華父之眼柰何諸君迎此妖物夜與游戯放傲逸之情縱奢滛之行亂男女之體破貞髙之節何也遂隠床上被髪而卧不復言上六劉劉聰使大鴻臚李𢎞拜太保劉殷二女為左右貴嬪長曰英字麗芳次曰娥字麗華又納殷孫女四人為貴人謂𢎞曰此女軰皆姿色絶世女闕且太保館朕實自不同𢎞曰太保裔自有周與闕聰大晤賜𢎞黄金六十斤於是六劉之寵二靳劉聰如中䕶軍靳凖第遂納其二女為左右貴嬪大曰月光小曰月華皆國色也數月立月光為皇后靳氏有滛穢之行陳元達奏之聰廢靳靳慙恚自殺門薛張天錫疾篤門薛二姫並有國色天錫謂曰吾死之後汝二人豈可更為他妻皆曰尊若不諱請効死尊前誓無他志二人自殺天錫疾瘳追悼二姫𦵏以夫人禮續帝王世説陳琬晉元興末魏郡民陳氏女名琬家在查浦年十六飢疫之嵗父母相繼死沒唯有一兄傭賃自活女容色甚艷隣中士庶見其貧弱竟以金帛招要之女力操貞氣未嘗有許後直盧循之亂賊衆將加凌逼女厲然不廽遂以被害祖冲之述異記化生邢巒在漢中時掠良人為奴婢盧㫤與巒有隙與元暉計令崔亮劾之巒懼乃以漢中所得巴西太守龎景民女化生等二十餘口與暉化生等數人竒色也暉大悦乃背㫤為巒言於世宗遂得不坐魏書五十三美人石梁石靈寳本餘姚人寓居武康生女有姿容北齊始安王遥光納焉遥光敗入東昏宫建康城平為武帝采女生元帝為脩容賜姓阮氏拜其父為朝請時人因名其所居之溪曰阮公溪溪中有大青石曰美人石南史西呉里語重臺蓮梁呉興蘇氏女嘗於霅溪西南岸遇道士以小龜遺已光彩五色曰三年有徴蘇適章景明生女名要兒為陳覇先後因名其地曰貴涇浦又曰章浦其中生重臺蓮花識者云主出美人後果生后后生紫光照室因失龜所在后少聰慧美容儀手𤓰長五寸色竝紅白每有朞功之服則一𤓰先折陳書呉興志光彩照映陳後主張貴妃名麗華髪長七尺䰅黒如漆其光可鑒特聰慧有神彩進止閑雅容色端麗每瞻視眄睞光彩益目照映左右陳書司花女長安貢御車女袁寳兒年十五腰肢纎堕騃情多態帝寵愛之特厚時洛陽進合􅺓迎輦花帝命寳兒持之號曰司花女陏遺録秀色一日帝將登風舸凭殿脚女呉絳仙肩喜其柔麗不與羣輩齒愛之甚乆不移歩綘仙善畫長蛾眉帝色不自禁由是殿脚女争効為長蛾眉帝海倚簾視綘仙移時不去顧内謁者云古人言秀色若可飡如綘仙真可療飢矣時越溪進耀光綾帝獨賜司花女洎綘仙他姫莫預也殿脚女自至廣陵悉用備月觀行宫由是綘仙不得親侍寢殿有即將自𤓰州宣事廽獻合歡水果一器帝命小黄門以一雙騎馳賜綘仙遇馬急摇解綘仙拜賜因附紅牋小簡上進曰馹騎𫝊雙果君王寵念深寜知辭帝里無復合歡心帝省章不悦顧黄門曰綘仙如何來辭何怨之深也黄門言其故帝曰綘仙不獨貌可觀詩意深切乃女相如也何謝左貴嬪乎上來夢兒煬帝自達廣陵沉湎失度每睡湏摇頓四體方就一夢侍兒韓俊娥尤得帝意每寢必召令振聳支節然後成寢别賜名為來夢兒他日蕭后誣罪去之帝一日登迷樓憶之題云黯黯愁侵骨綿綿病欲成湏知劉岳鬢强半為多情飲乳侯君集既誅録其家得二美人容色絶代太宗問其狀曰自爾已來常食人乳而不飯又君集之破髙昌得金簟二甚精御府所無亦隠而不獻至時并得焉陏唐嘉話花鳥使天寳中天下無事選六宫風流艷態者名花鳥使主宴溥載素面朝天𤣥宗妃楊太真姿質豊艶知筭過人每倩盼承迎動移上意舊書有姊三人皆豊碩脩整工於謔浪巧㑹㫖趣每入宫中移晷方出𤣥宗並封國夫人之號長曰大姨封韓國三姨封虢國八姨封秦國同日拜命皆月給錢十萬為脂粉之資然虢國不施粧粉自衒美艶常素面朝天當時杜甫有詩云虢國夫人承主恩平明上馬入宫門却嫌脂粉涴顔色淡掃娥眉朝至尊楊妃外傳明秀梅妃善屬文自比謝女淡妝雅服而姿態明秀筆不可描畫明皇大見寵幸長安大内大明興慶三宫東都大内上陽兩宫幾四萬人自得妃視如塵土宫中亦自以為不及梅妃傳秀曼都雅韓𢎞為汴帥惡李光顔力戰隂圖撓屈遂舉大梁城求得一美婦人教以歌舞絃管六博之藝餙之以珠翠金玉衣服之具計費數百萬命使者送遺光顔翼一見悦惑而怠於軍政也詰朝光顔乃大宴軍士命使者進妓之至秀曼都雅殆非人間所有一軍驚視光顔乃謂來使曰令公憐我乆離室家捨美妓見贈誠有以荷徳也然今戰卒皆負妻子蹈白刃光顔柰何獨以好色為樂因涕泣鳴咽厚酬來使俾領其妓自席上而廽舊書飛鸞輕鳯寳厯二年浙東國貢舞女二人一曰飛鸞一曰輕鳯脩眉黟首蘭氣融冶冬不纊衣夏不汗軆上琢玉芙蓉以為二女歌舞臺每歌聲發如鸞鳯之音及觀於庭際舞態艷逸更非人間所有每歌罷上令内人藏之金屋寳帳蓋恐風日所侵故也由是宫中語曰寳帳香重重一雙紅芙蓉杜陽雜編絶色畢誠宣宗恩顧特異許以為相令孤綯所忌連徙之鎮皆綯緩其入相之謀也誠思有以結綯在北門得絶色非人所有者盛餙珠翠専使獻綯綯一見心為之動謂其子曰尤物必害人畢太原於吾無分今以是餌吾將傾吾家族也一見立反之使人不敢將囬驛候誠意誠又瀝血書輸啓事於綯綯終不納乃命吏貨之東頭醫李𤣥伯伯所狎昵者以錢七十萬致於家乃舍上堂坐之𤣥伯執賤伇以事之踰月盡得其歡心焉乃進於上上見大惑之寵冠六宫𤣥伯燒伏火丹進以市恩睪上瘡疾作𤣥伯之罪也懿宗即位與山人王岳道士盧仙芝俱棄市東觀奏記窅娘李后主宫嬪窅娘纎麗善舞后主作金蓮六六尺作品色瑞蓮令窅娘以帛纆脚令纎小屈上作新月狀素襪舞蓮中囬旋有凌雲態齊鎬詩云蓮中花更好雲裏月常新因窅娘作也自是人皆効之道山青話顰笑後主保儀黄氏容態華麗冠絶當世顧眄顰笑無不妍姣其書學伎能皆出於天性南唐書花蕋夫人費氏蜀之青城人以才色入蜀宫後主嬖之號花蕋夫人效王建作宫詞百首國亡入備後宫宋祖聞之召使陳詩誦其國亡詩云君王城上竪􅑙旗妾在深宫那得知十四萬人齊解甲寜無一介是男兒祖悦蓋蜀兵十四萬而王師纔數萬爾後山詩話花蕋夫人入宫太祖幸之晉王諌為未黜一日與宋祖獵於園中射殺之鐡圍山叢談瓊仙南漢劉鋹才人名盧瓊仙五國故事花不如完顔亮侍寢妃花不如者長安貧家女慧麗專亮寵凢打毬縱獵出入無不從之亮死亦被殺采石𤓰州斃亮託青琴青琴􅀢妃之徒絶殊離俗􅨩冶閑都靚莊刻餙便嬛繛約上林賦南部青琴姣冶之極而必俟盛餙以増麗囬賜㳺夏雖天才雋朗而實湏墳誥以廣智抱朴醜丈夫醜耗土之人醜家語仳􅀈媒􅀈􅀢䫂噅睢頦顝䫏醜也廣推異貌伏羲牛首女媧蛇軀臯陶鳥喙孔子牛唇後漢周蔡傳註顔惡禹長頸鳥啄面目顔色亦惡矣天下獨賢之尸子􅎦蔑醜男鬷蔑醜女鍾離泰束晳發蒙記法琳云陽文與鬷蔑争麗孟陬與隴亷兢妍廣𢎞英集􅀈他魯哀公問仲尼曰衞有惡人焉曰哀駘他丈夫之與處者思而不能去也婦人見之請於父母曰與人為妻寜為天子妾者十數而未止也是必有以異乎人也寡人召而觀之果以惡駭天下莊子徳充符魯惡魯有惡者其父出而見啇咄反而告其鄰曰啇咄不若吾子矣且其子至惡也啇咄至美也彼以至美不如至惡尤乎愛也吕去尤讎糜陳有惡人焉曰敦洽讎糜雄顙廣顔色如浹頳垂眼臨鼻長肘而短陳侯見而甚説之外使治其國内使制其身楚合諸侯陳侯病不能往使敦洽讎糜往謝焉楚王恠其名而先見之客有進狀有惡其名言有惡狀楚王怒合大夫而告之曰陳侯不知其不可使是不知也知而使之是侮也侮且不智不可不攻也興師伐陳三月然後䘮惡足以駭人言足以䘮國而友之是於陳侯而無上也至於亡而友不衰上遇合支離支離䟽者頥隠於齊肩髙於頂㑹撮指天五管在上兩髀為脅莊人間世闉跂支離無脤説衞靈公靈公説之而視全人其脰肩肩甕㼜大癭上徳充符不相唐舉相蔡澤曰先生曷鼻臣肩魋顔蹙齃膝攣吾聞聖人不相殆先生乎史史秦相蔡澤歛頥折頞初學記澤歛頥蹙頞周爕注頞鼻莖也貌陋子髙見齊王齊王問誰可臨淄宰稱管穆焉王曰穆容貌陋民不敬荅曰夫見敬在徳且臣所稱稱其材也君王聞晏子趙文子乎晏子長不過三尺面貌惡齊國上下莫不宗焉趙文子其身如不勝衣其言如不出口非但體陋辭氣又呐呐然其相晉國晉國以寜諸侯敬服皆有徳故也以穆軀形方之二子猶悉賢之良臣嘗行臨淄市見屠啇焉身脩八尺鬚髯如㦸面正紅白市之男女未有敬之者無徳故也王曰是所謂祖龍始者也帎如先生之言於是乃以管穆為臨淄宰孔叢予眩名承宫字少子朝廷憚其節名播匈奴時北單于遺使求得見官顯宗勅自整餙宫對曰夷狄眩名非識實者也臣聞虚稱故欲見臣醜陋形寢不可以示逺不如選長大有威容者帝乃以大鴻臚魏應代之後漢異貌汝南周爕歛頥折頞狀醜駭人毋欲不舉其父不聴曰吾聞聖賢多有異貌興我宗者必此兒也遂育之汝南先賢傳後漢書形陋魏武將見匈奴使目以形陋不足雄逺國使崔季珪代帝自捉刀立床頭既畢令閒諜問曰魏王何如匈奴使荅曰魏王雅望非常然床頭捉刀人此乃英雄也魏武聞之追殺此使世説貌寢王􅙾容狀短小有異才西京擾亂乃之荆州依劉表表以粲貌寢而體弱通侻不甚重也魏志二十一初粲與族兄凱俱避地荆州劉表欲以女妻粲而嫌其形陋而用率以凱有風貌乃以妻凱博物記醜顇左思貌醜顇不持儀餙續文章志思貌醜陋而口訥晉書太冲絶醜效潘岳遊遨於是羣嫗齊共亂唾之委頓而返世説投石張孟陽至醜每行小兒以瓦石投之滿車語林甚醜劉伶字伯倫長六尺貌甚醜悴常乗鹿車携鋤壺酒使人荷鍤而隨之謂曰死便埋我晉書真猴宋何尚之與顔延之少相狎好為嘲調二人並坐小何常謂顔公為猴顔亦以何為猴嘗共逰戯西池顔問路㑹吾二人誰似猴路人指何為似延之大喜人曰彼似猴尔君乃真猴也謝綽宋拾遺録短陋張融字思光形貌短陋精神清澈王敬則見融革𢃄垂寛殆將至骼謂之曰革𢃄太急融曰既非歩吏急𢃄何為南齊陋小晉安王出成石頭髙祖謂周捨曰為我求一人文學俱長兼有行者欲令與晉安逰處捨曰臣外弟徐摛形質陋小若不勝衣而堪此選髙祖曰必有仲宣之才亦不簡其容貌以摛為侍讀梁書生犀陸驗為少府丞本無藝業而容貌特醜先是外國獻生犀其形甚陋故閭里以驗為生犀南史恩倖傳竒醜昔王池國有民婿面竒醜婦國色鼻齆壻乃求媚此婦終不肯迎顧遂往西市無價名香而燻之還入其室婦既齆豈知分香臭哉金樓子無情宋逰道使氣黨俠時人語曰㳺道彌猴面陸操科斗形意識不闗貌何謂醜者必無情李構嘗因遊道會客因戯之曰賢從在門外大好人宜自迎接為通名稱族弟遊山遊道出見之乃獼猴衣㡌也將與構絶構謝之豁然如舊北齊麽陋長孫太尉見歐陽率更姿形麽陋嘲之曰聳膞成山字埋肩畏出頭誰言麟間上畫此一獼猴詢亦酬之曰索頭連背煖漫襠畏肚寒柢縁心混混所以面團團太宗聞之而笑曰詢此嘲曽不為皇后邪本事詩貞觀十年文徳皇后崩百官縗經率更令歐陽詢狀貌醜異衆或指之許敬宗見而大笑為御史所劾左授洪州都督舊唐許郝許欽明與郝處俊鄉黨親族兩家子弟類多醜陋而盛餙車馬以㳺里巷京洛為之語曰衣裳好儀貌惡不姓許即姓郝韋𫐠兩京記鬼視盧妃貌陋而色如藍人皆鬼視之舊唐崑崙慕容彦超吐渾部人也父亮彦超即漢髙祖之同産弟也嘗冐姓閻氏體黒面胡故謂之閻崑崙周史醜婦嫫母黄帝納醜女號嫫母使訓宫人而有淑徳奏上徳之頌帝周㳺行時元妃嫘祖死於道令次妃嫫母監護於道以時祭之因以嫫母為方相氏軒轅本紀人之於色也無不知説美者而美者未必遇也故嫫母執乎黄帝黄帝曰屬女徳而弗忘與女正而弗衰雖惡奚傷吕遇合西施媞媞而不得見兮嫫母勃屑而入侍七諫軒皇愛嫫母之􅀈貌不易落英之麗容陳侯悦敦洽之醜狀弗貿陽文之婉姿劉子仳􅀈啳􅢦哆噅籧篨戚施雖粉白黛黒弗能為美者嫫母仳􅀈也註仳􅀈古之醜女淮修務仳􅀈醜面也説文仳􅀈璋珪雜於甑窐兮隴簾與孟娵同宫注云隴簾醜婦也孟娵好女也哀時命效矉西施病心而矉其里其里之醜人見而美之歸亦捧心而矉其里其里之富人見之堅閉門而不出貧人見之挈妻子而去之走彼知美矉而不知矉之所以美莊天運倭傀毛嬙西施善毁者不能藪其好嫫母倭醜善譽者不能掩其醜四子諧徳論厚送齊王厚送女欲妻屠牛吐為婦吐辭以疾其友曰子終死腥臭之肆而已乎何為辭之吐應之曰其女醜其女曰子何以知之吐曰以吾屠知之其友曰何謂也吐曰吾肉善之量而去苦少耳吾肉不善雖以他附益之尚猶不售今厚送子子醜故耳其友後見之果醜𫝊曰目如擗杏齒如編貝韓詩外傳卬鼻齊鍾離春者齊無䀋色女也其為人極醜無雙白頭深目長脂大節卬鼻結喉肥項少髪折腰出胸皮膚若漆行年三十無所容入衒嫁不售於是拂拭短褐自謁宣王宣王方宴於漸臺左右聞之掩口大笑曰此天下强顔女子也宣王召見揚目䘖齒謂有四殆宣王喟然而嘆納之為后列女傳項瘤齊宿瘤女者齊東郭採桑之女也項有大瘤故號宿瘤閔王出㳺百姓盡觀宿瘤採桑如故王曰此竒女也命後車載之歸告諸夫人曰今日出逰得一聖女遲其至也宿瘤駭宫中失貌不能自止女與衆言閔王大感以為后上五逐齊孤逐女者即墨之女也孤無父母其狀甚醜三逐於鄉五逐於里過時無所容乃造襄王之門而求見王輟食而起左右曰三逐於鄉者不忠五逐於里者少禮何足為貴王曰子不識也夫牛鳴而馬不應者異類故也此人必有與人異者遂見與之語而悦之遂以為齊相妻上登徒妻登徒子其妻蓬頭攣耳齞唇歴齒旁行踽僂又疥且痔登徒子悦之使有五子好色賦允婦許允婦是阮衞尉女徳如妹竒醜交禮竟允無復入理家人深以為憂會桓範至語許云阮家既嫁醜女與卿故當有意卿宜察之許便囬入内既見婦既欲出婦料其此出無復入理便捉𥚑停之許因謂曰婦有四徳卿有其幾婦曰新婦所乏唯容爾然士有百行君有幾許云皆備婦曰夫百行以徳為首君好色不好徳何謂皆備允有慚色遂相敬重世説卑下王公淵娶諸葛誕女入室言語始交王謂婦曰新婦神色卑下殊不似公休婦曰大丈夫不能仿佛彦雲而令婦人比蹤英傑酒家婢兵部郎中朱前疑貌醜其妻有美色天后時洛中殖業坊西門酒家有婢蓬頭垢面傴肩皤腹寢惡之狀舉世所無而前疑大悦之殆忘寢食乃知前世言宿瘤䝉愛信不虚也僉載美室張郎中又新與楊䖍州齊名友善楊妻李氏即鄘相之女有徳無容楊未嘗意敬待特甚張嘗語楊曰我少年成美名不憂仕矣唯得美室平生之望斯足楊曰必求是但與我同好必諧君心張深信之既婚殊不愜心楊以笏觸之曰君何太癡言之数四張不勝其忿廽應之曰與君無間以情告君君誤我如是何謂癡楊歴數求名從宦之由曰豈不與君皆同邪曰然然則我得醜婦君詎不聞我邪張色解問君室何如我曰特甚張大笑遂如初張既成家乃詩曰牡丹一朶直千金將謂從來色最深今日滿欄開似雪一生辜負看花心本事詩長人骨節轉車呉伐越墮會稽獲骨焉節轉車呉子使來好聘且問之仲尼仲尼爵之即徹爼而宴客執骨而問曰敢問骨何為大仲尼曰昔禹致羣神於會稽之山防風氏後至禹殺而戮之其骨節轉車此為大矣客曰防風氏何守也仲尼曰汪芒氏之君也守封隅之山者也為漆姓在虞夏啇為汪芒氏於周為長翟氏今為大人客曰人長之極幾何仲尼曰僬僥氏長三尺短之至也長者不過十尺數之極也身横九畆文公十年冬十月叔孫得臣敗狄于鹹長狄也弟兄三人佚宕中國瓦石不能害叔孫得臣最善射者也射其目身横九畆斷其首而載之眉見於軾穀梁傳十一年冬十月甲午敗狄于鹹獲長狄僑如富父終甥摏其喉以戈殺之埋其首於子駒之門以命宣伯左傳長狄弟兄三人各長百尺狄者隂氣時中國衰有夷狄明春秋考異郵長狄長蓋五丈餘也洪範五行傳十尺孔子長十尺大九圍坐如蹲龍立如牽牛就如之昂望之如斗春秋演孔圖一丈伍子胥見呉王僚僚望其顔色甚可畏長一丈大十圍眉開一尺王僚與語三日辭無復者胥知王好之每入言倍有勇壯之氣呉越春秋大人十二秦始皇帝二十六年有大人長五丈足履六尺闗中記身長百尺皆夷狄服凡二十人見于臨洮天戒若曰勿大為夷狄之行將受其禍是嵗始皇初并六國反喜以為瑞銷天下兵器作金人十二以衆之遂自賢聖築長城故大人見於臨洮明禍亂之起前五行志鑄金狄人十二各重二十四萬斤立阿房殿前三輔舊事昔大人見臨洮而銅人鑄臨洮生卓而銅人毁天下大亂卓身㓕抑有以也餘二人魏明帝欲徙詣洛陽清明門裏載至覇城重不可致便留之英雄記後石季龍徙之鄴符堅又移入長安而銷之闗中記銅人翁仲其名也謝承後漢書阮翁仲翁仲安南人身長二丈三尺氣質端勇異於常人少為縣吏為督郵所笞歎曰人當如是耶遂入學究書史秦始皇併天下使翁仲將兵守臨洮聲振匈奴秦以為瑞翁仲死遂禱銅為其像置咸陽宫司馬門外匈奴至有見之者猶以為生宕渠獻秦襄王時宕渠郡獻長人長二十五丈六尺蜀王本紀巨毋覇王莾夙夜連率韓博上言有竒士長一丈大十圍來至臣府曰欲奮擊匃奴自謂巨母覇出於蓬萊東南五城西北昭如海瀕軺車不能載三馬不能勝即日以大車四馬建虎旗載覇詣闕卧則枕皷以鑯着食此皇天所以輔新室者也莾聞惡之留覇在所新豐更其姓曰巨母氏謂因文母太后而覇王符也前漢娶長馮勤字偉伯魏郡繁陽人也曽祖父揚宣帝時為𢎞農太守有八子皆為二千石趙魏間榮之號曰萬石君焉兄弟形皆偉壯唯勤祖父偃長不滿七尺常自耻短陋恐子孫之似也乃為子伉娶長妻伉生勤長八尺三寸八嵗善計姚期薦於光武在事精勤遂見親識每引進帝輙顧謂左右曰佳乎吏也後歴官司徒號稱任職勤母年八十每㑹見詔勅勿拜令御者扶上殿謂諸王曰使勤貴寵者此母也後漢魁岸郭太字林宗身長八尺儀貌魁岸善談論聲音如鍾後漢紀温偉大將軍袁紹總兵翼州遣使要鄭𤣥太㑹賔客𤣥最後至乃延升上坐身長八尺餘飲酒一斛秀眉明目儀容温偉後書八尺諸葛孔明身長八尺每自比於管仲樂毅蜀志見襄武咸熈二年有大人見襄武縣長二丈餘脚跡長二尺二寸白髮著黄單衣黄巾柱杖呼民王始語云今當太平魏志屐七尺符健皇始四年有長人見身長五丈語張靖曰今當太平新平令以聞健以為妖妄召靖擊之是月也雨河渭泛溢滿坂津監㓂登於河中流得大履一隻長七尺三寸足跡稱屐指長尺餘文深七寸健歎曰覆載之中何所不有張靖所見定不虚也乃赦之祖冲之述異記丈八符堅以乞活夏黙為左鎮即胡人䕶磨那為右鎮即奄人申香為拂蓋即黙等身長一丈八尺並多力善射三人每食飯一石肉三十斤崔鴻前秦録二丈燉煌西盡大秦隔海心無憂遇善風不經二十日得渡心憂數年不得渡諺曰心無憂患不經二旬心若憂患逺離三春士人賢直男女皆長二丈端正國主風雨不和則讓賢而治之三秦記脛長丈六神武時盧曹率其徒自薊入海島得長人骨以髑髏為馬皂脛長丈六尺以為二矟送其一於神武諸將莫能用唯彭樂彊舉之未幾曹遇疾烔聲聞於外巫言海神為祟遂卒北齊書身長七尺盧文進幽州人也身長七尺狀貌偉然至江南李氏封范陽王嘗至天定河見人脛骨大如柱長可七尺陸㳺南唐詩長丈二淳熈間蘇州有唐姓者兄妹皆長丈二日㗖斗餘行倦則倚市簷憇坐如堵墻不可出出則傾市觀之詔廪之殿前司徳夀欲見之遣詣北宫懼其聚民乃卧而泛河之至望仙橋專舟焉續夷堅志龍伯佻人從崑崙以北九萬里得龍伯國人長三十丈皆夀至千嵗而死從崑崙以東得大秦人長十丈皆衣帛從此以東千萬里得佻人國長三十丈五尺從此以東十萬里得中秦國人長一丈河圖玉版朴父東隅大荒之中有朴父馬夫婦竝髙千里腹圓百輔天初立時使夫妻導開百川嬾不用意謫其夫妻竝立東南男露其勢女彰其殺氣息如人不畏寒暑不飲不食湏黄河清復更使其夫妻導百川神異東夷東夷長人者類長三丈鋸牙鈆爪黒毛覆身不火食噬禽獸或摶人以食支提有支提國人長三丈二尺有三手三足一手當胸手足各三指洞冥記大秦大秦國人長一丈五尺猿臂長脇好騎駱駝外國圖丈五六晉永嘉王年有鶖鳥集于始安縣南其里之鷔陂中民周虎張得之木矢貫之鐡銀其長六尺有半以箭計之其射者人身應長一丈五六尺也又平州别駕髙㑹語曰倭國人嘗行遭風吹度大海外見一國人皆長丈餘形狀似胡蓋是長翟别種箭殆將從此國來也山經短人帝舜帝堯長帝舜短文王長周公短仲尼長子貢短葉公子髙㣲小短瘠行若將不勝其衣然白公之亂也葉公子髙入據楚誅白公定楚國如反手耳荀非相黒短齊景公伐宋過太山夢二人怒曰謂㤗山之神晏子謂宋相湯與伊尹也為言其狀湯晢容多髪伊尹黒而短即所夢也景公進軍不聴軍鼓毁公怒散軍伐宋博物志晏子𤨏語湯作寅七寸齊桓公獵得一鳴鵠宰之嗉中得一人長三寸三分著白圭之袍𢃄劍持刀車罵詈瞋目後又得一折齒方圓三尺問羣臣曰天下有此及小兒否陳章荅曰昔秦胡充一舉渡海與齊魯交戰折傷版齒昔李子敖於鳴鵠嗉中㳺長三寸三分博物志有李子昂長七寸日行千里一旦被海鵠所吞居鵠腹中三百年不死神異經朱儒邾人莒人伐鄫臧紇救鄫侵邾敗於狐駘國人誦之曰我君小子朱儒是使朱儒朱儒使我敗於邾左襄五使楚晏子使楚以晏子短楚人為小門於大門之側而延晏子晏子不入曰使狗國者從狗門入今臣使楚不當從此門入儐者更道從大門入見楚王王曰齊無人耶晏子對曰臨淄三百閭張扇成隂揮汗成雨比肩繼踵而在何為無人王曰然則子何為使乎晏子對曰齊命使各有所主其賢者使使賢王不肖者使使不肖王嬰最不肖直使楚矣晏子𦕈小孟嘗君之趙趙人出觀之笑曰始以薛公為魁然也今視之𦕈小丈夫耳史記短小齊遣淳於髠到楚為人短小楚人甚薄之謂曰齊無人而使子來何長也對曰臣無所長臣腰中七尺之劍欲斬無狀王王曰止吾但戯子耳即與髠共飲酒説苑巨靈東郡送一短人長七寸衣冠具足上疑其山精常令在案上行召東方朔問朔至呼短人曰巨靈汝何忽叛來阿母還未短人不對因謂上曰王母使臣來告陛下求道之法唯在清净不宜躁擾復五年與帝會言終不見漢武故事尺二漢光武時頴川張仲師長一尺二寸纂文沈約問劉杳云何承天纂竒博其書載張仲師及長頸王事此何所出杳曰仲師長尺二寸唯出論衡長頸是毗騫王宋建安扶南以南記云古來至今不死約即取二書尋檢一如杳言南史小吏張重字仲篤南郡人也明帝永明元年舉孝㢘送京師正月朝於徳明殿帝怪其短小問曰何郡小吏荅曰昔子竒十六為河東太守甘羅十二為秦相陛下欲得才耶抑將稱骨度肉也帝嘉其善對賜以金帛東觀記交州名士傳短陋周舉字宣光姿貌短陋有晏子之風汝南先賢傳博學洽聞為儒者所宗故京師為之語曰五經從横周宣光後漢黝歙短人孫權黄武五年有大秦賈人字秦論來到交趾交趾太守呉邈遣送詣權權問方土謡俗論具以事對時諸葛恪討丹陽獲黝歙短人論見之曰大秦希見此人權以男女各十人差吏會稽劉咸送論還本國宋書諸夷中天竺下甚短山濤子淳字子𤣥允字叔真並少尫病形甚短小而總敏過人武帝聞而欲見之濤不敢辭以問於允允自以尫陋不肯行濤以為勝已乃表曰臣二子尫病宜絶人事不敢受詔論者竒之晉書過軀之用齊孟業有盛名初司州牧清河王岳聞業名召為法曹見其容貌短小笑而不言及尋斷决之處乃謂業曰卿决斷之明可謂有過軀之用三國典畧三短李諧為人短小六指因癭而舉頥因跛而緩歩因謇而徐言人言李諧善用三短北史三十一短秃阮孚性機辯好酒貌短而秃周文帝偏所愛重常於室内置酒十瓶瓶大一斛上皆加㡌欲以戯孚孚適入室即見驚喜曰吾兄弟軰甚無禮何為入王家上坐相對宜早還宅因持酒去周文帝憮然大笑短人行唐長孫元同㓜有譏辨貞觀中嘗在諸公主席衆莫能當髙宻公主乃云我段家兒郎亦有人物走令喚取段恪令對𤣥同段恪雖㣲有詞其儀容甚短小召至始入門𤣥同即云為日已暗公主等並大驚怪云日始是齋時何為道暗𤣥同乃指段恪若不日暗何得短人行坐中大笑恪面大赤更無以荅啓言録功徳竇曉形容短小眼大露睛樂彦偉身長露齒彦偉先弄之云足下甚有功徳旁人怪問彦偉曰既已短肉又復精進豈不大有功徳竇即應聲荅曰公自有大功徳因何道曉人間其故竇云樂工小來長髙又問長髙之意竇云身長如許口嘴髙崖豈不是長髙衆皆大笑上短向上北省班諌議在給事中上中書舎人在給事中下裴佶為諌議形質短小諸舎人戯之曰如此短何得向上裴佶曰若怪即曵向下衆人皆大笑因話録𦕈小無髯李希烈叛闗播盛稱李元平徳宗拜汝州别駕始至募王築郛浚隍希烈隂使亡命應募縳元平馳見希烈遺矢于地希烈以其𦕈小無髯戯李克誠曰使爾取元平乃以其子來也因嫚罵曰育宰相使汝當我何待我淺耶新唐半人桑維翰身短面黄每對鑑自歎曰七尺之身何如一尺之面後登第同榜四人秦王幕客陳保極戯謂人曰今嵗有三箇半人及第以維翰短陋故謂之半人續世僬僥從中州以東四十萬里得僬僥國人長一尺五寸東北極有人名曰諍人長九寸烈湯問詩含人霧周僥國其人短小冠帶一曰僬僥國山海僬僥國人長一尺六寸迎風則偃背風則伏眉目俱足但野宿外國圖有小人國名靖人山海僬僥極麽靖人唯小四體俱足眉目才了郭圖賛長安中嘗見有人腊長尺許眉目手足悉俱或以為焦僥人也南部新書蝼蛄東方有人其長三尺君長出行導衞威儀有若中國人又有小人如螻蛄手撮之滿手得之二十枚廣忠侏儒國倭南有侏儒國其人長三四尺去女王國四千餘里魏畧短人國短人國在康居西北男女皆長二尺衆人多去康居可萬餘里上西域傳陀移員嶠山有陀移國人長三尺夀萬嵗廣延之國人長二尺拾遺記小人西北荒中有小人焉長一寸圓如長朱衣𤣥冠乗軺車導引有威儀人遇其乗車並食之其味辛楚終不為䖝像所咋並識萬物名字殺腹中三䖝神異經鵠國西海之中有鵠國男女皆長七寸自然有禮好經論跪拜夀三百嵗行人如飛日千里百物不敢犯之唯畏鵠鵠遇吞之上夀三百嵗在鵠腹不死而鵠一舉千里上肥弱土弱土之人肥家語肥多肉也腴腹下肥也説文脯腊古諺云堯舜至聖心如脯腊桀紂無道肥膚三尺備亊析言應客楚莊王圍宋子反乗堞而闚宋城見華元曰子之國何如華元曰易子而食之析骸而炊之子反曰吾聞圍國者鉗馬而秣之使肥者應客是何子之情也華元曰吾聞君子見人之惡則矜之小人見人之惡則幸之吾見子之君子也是以告情于子也公羊宣十五言勝閔子騫肥子貢曰何肥也子騫曰吾出見其美車馬則欲之入聞先王之言則又欲之兩心相與戰今先王之言勝故肥户子義勝子夏見曽子曽子曰何肥也對曰戰勝故肥也曽子曰何謂也子夏曰吾入見先王之義則榮之出見富貴之樂又榮之兩者戰於胷中未知勝負故臞今先王之義勝故肥韓子食言魯哀公至自越郭重僕孟武伯惡重曰何肥也公曰是食言多矣能無肥乎公與大夫始有惡左哀食糠陳平少時家貧好讀書有田三十畆獨與兄弟常耕縱平㳺學平為人長而美色人或謂平貧何食而肥若是其㛐疾平不親家産曰亦食糠覈耳有叔如此不如無有伯聞逐其婦漢書如瓠張蒼當斬解衣伏質身長大肥白如瓠時王陵見而怪其美士乃言沛公赦勿斬上副腰東平憲王蒼腰𢃄八圍顯宗甚重之詔曰日者問東平王處家何等最樂王曰為善最樂其言甚大副是腰腹矣後漢代兄梁國車成字子威兄恩都為赤眉賊所待欲臠之成叩頭曰兄瘦我肥欲得代之賊感其義俱放之謝承書東觀記臨淄倪萌字子明為赤眉所得事同代弟趙孝字長平沛國蘄人王莾時天下亂人相食孝弟禮為餓賊所得孝聞即自縳詣賊曰禮乆餓羸瘦不如孝肥餓賊大驚並放之東觀記脂流王允使吕布等誅董卓尸卓於市天時始熱卓素充肥脂流於地守尸吏然火置卓臍中光明達曙如是積日後漢逃則曹操父嵩在太山操令㤗山太守應邵送家詣兖州陶謙宻遣數十騎掩捕嵩家懼穿後垣先出其妾肥不出逃於厠與妾俱被害世語不能動京邑有一人失姓名食噉兼十許人遂肥不能動其父曽作逺方長吏被縣令故義共𫝊食之一二年中一鄉為儉博物志服肥呉質黄初五年朝京師詔上將軍及特進以下皆㑹質所太官給供具酒酣質欲盡歡時上將軍曹真性肥中領軍朱鑠性瘦質召優使説肥瘦真負貴恥見戯怒謂質曰卿欲以部曲將遇我邪曹洪王忠言將軍必欲使上將軍眼肥即自宜為瘦真愈恚㧞刀瞋目言俳敢輕脱吾斬爾遂罵坐質案劒内曹子丹汝非屠机上肉呉質吞爾不摇喉咀爾不摇牙何敢恃勢驕邪質别傳肥奴司馬懿奏免曹爽桓範踰城出為爽畫二䇿爽不能用範怒爽曰肥奴曹子丹好人生五六頭肉今桓範隨卿㓕門也魏志今木無曹子丹佳人生汝兄弟豚犢耳魏氏春秋千斤孟業為幽州其人甚肥或以為千斤武帝為稱之難其大乃作一大秤掛壁業入見武帝曰朕欲自秤有幾斤業荅曰陛下欲秤臣耳無煩復勞聖躬於是稱業果得千斤語林自娯孫權問諸葛恪頃何以自娯而更肥澤恪對曰臣聞富潤屋徳潤身臣非敢自娯脩已而已恪别傳食糠王戎子綏字萬子有美名少而大肥戎令食糠而肥愈甚年十九卒晉書肉潰司𨽻校尉髙平滿奮字武秋豐肥肉潰膚裂每至暑夏輙膏汗流溢其有愛妾夜取以燃照炎灼發於屋表奮大惡之悉盛而埋之暨永嘉之亂為胡賊所燒皎若燭光異苑納李趙伯翁肥大夏日醉卧孫兒縁其腹上戯因以李八九枚内臍中至後日李大爛汁出乃泣謂家人曰我腸將死明日李核出乃知孫兒所納李子也笑林忽肥庾公造周伯仁伯仁曰君何所欣説而忽肥庾曰君復何所憂惨而忽瘦伯仁曰吾無所憂直是清虚日來滓穢日去耳世語笨伯兖州既有八伯之號其後更置四伯大鴻臚陳留江淵以能食為穀伯豫章太守陳留史疇以大肥為笨伯散騎侍郎髙平張嶷以狡妄為猾伯廬陵太守羊𣆀㬅以狠戾為璅伯盖擬古之四㓙晉中興書肥癡沈昭畧字茂隆性狂儁使酒仗氣無所推讓嘗醉晩日負杖携家賔子弟婁湖苑逢王景文子約張目視之曰汝是王約耶何乃肥而癡約曰汝沈畧昭耶何乃瘦而狂昭畧撫掌大笑曰瘦已勝肥狂又勝癡柰何王約柰汝癡何南史十七肥婢明皇在百花院便殿因覽漢成帝内傳時妃子後至以手整上衣領曰看何文書上笑曰莫問知則又殢人覔去乃是漢成獲飛鷰身輕欲不勝風恐其飄翥帝為造水晶盤令官人掌之而歌舞又製七寳避風臺間以諸香安於上恐其四肢不禁也上又曰爾則任吹多少蓋妃㣲有肌也故上有此語戯妃楊妃外傳梅妃以楊妃之寵遷於上陽東宫後上憶妃召至􅀢華西閣叙舊愛繼而上失窹侍御驚報曰妃子已至上匿之遺舄并翠鈿命封賜妃謂使者曰上棄我之深乎使曰上非棄妃誠恐太真惡情耳妃笑曰恐怜我則動肥婢情豈非棄也腹垂過膝張守珪為幽州節度安禄山盗羊事覺守珪剥坐欲打殺之大呼曰大夫不欲㓕兩蕃邪何為打殺禄山守珪見其肥白壯其言而釋之令與鄉人史思明同捉生行必尅獲㧞為偏將軍嫌其肥以守珪威風素髙畏懼不敢飽食以驍勇聞遂養為子晩年益肥壯腹垂過膝重三百三十斤每行以肩膞左右擡挽其身方能移步至𤣥宗前作胡旋舞疾如風馬禄山肚大每著衣帶三四人助之兩人擡起肚豬兒以頭戴之始取裙褲帶及繫腰𢃄𤣥宗寵禄山賜華清宫湯浴皆許豬兒等人助解著衣服然終見刳者豬兒也舊唐肥醜中宗與羣臣晏欽明自言能八風舞帝許之欽明體肥醜據地摇頭睆目左右顧眄帝大笑吏部侍郎盧藏用歎曰是舉五經掃地矣新唐相嘲王淇張亢同在南京晏元獻幕張肥大王以太牢目之王瘦小張以獼猴目之一日有米綱至八百里村水淺當剥載張往督王曰所謂八百里剥也張曰未若三千年精矣黽水燕談琪嘗嘲亢口張亢觸墻成八字亢應聲曰王琪望月呌三聲歸田録肥喘盛度體豐肥一日自前殿趨出宰相在後盛初不知忽見即欲趨避行百餘歩乃得直舍隠於其中石學十中立見其喘甚問之盛告其故石曰相公問否盛曰不問别去十餘歩乃悟罵曰奴乃以我為牛布袋和尚明州布袋和尚形裁腲腇蹙額皤腹蓋彌勒化身也𫝊澄不澤繼子得食肥而不澤情不相與往來也適子懐於燕慈母喻於荆情相往來也淮南穀氣勝穀氣勝元氣其人肥而不夀物理論䑋益梁之間凢諱其肥盛謂之䑋方言瘦臞約省瘦也臞省約少之言也釋名羸委也瘠瘦也説文墳衍墳衍之人哲而瘠周禮地官司徒堯衍神農形顇堯瘦將欲利萬人也文子瘠甚楚子使子馮為令尹訪於申叔豫叔豫曰國多寵而王弱國不可為也遂以疾辭方暑闕地下氷而床焉重繭衣裘鮮食而寢楚子使醫視之復曰瘠則甚矣而血氣未動乃使子南為令尹襄二十一心憂宓子賤治單父有若見之曰子何臞也宓子曰君不知賤不肖使治單父官事急心憂之故臞也有若曰昔者舜鼓五絃歌南風之詩而天下治今以單父之細也治之而憂治天下將柰何乎故有術而御之身坐於於廟堂之上有處女子之色無害於治無術而御之身雖瘁臞猶未益韓外儲悲思和熹鄧后自遭大憂及新野君仍䘮諸兄嘗悲傷思慕嬴瘦骨立不能自勝宋觀漢記瘦貴張氏得釣何氏得算故三輔舊語曰何氏筭張氏釣何氏肥張氏瘦言何氏有肥人輙貴瘦人輙賤張氏瘦者輙貴肥者輙賤故二族以釣筭知㓙吉以肥瘦知貴賤二輙决録注瘦甚楊彪見漢祚將移遂稱脚攣不復行積十餘年後子脩為曹操所殺曹見彪問曰公何瘦甚對曰愧無日殫先見之明猶懐老牛乳犢之愛操為之改容謝承後漢書瘦恨得晩曹操攻吕布於下邳吕布登西北白門上城䧟士擒以諸操布曰明公何瘦操曰君何以識孤布曰昔在洛㑹温氏園操曰然孤忘之矣所以瘦恨不早相故也獻帝春秋雞骨王戎和嶠同時遭大䘮俱以孝稱王雞骨支床和哭泣備禮武帝謂劉仲雄曰卿數省王和不聞和哀苦過禮使人憂之仲雄曰和嶠雖備禮神氣不損王戎雖不備禮而哀毁骨立臣以和嶠生孝王戎死孝陛下不應憂嶠而應憂戎世語禁語衞玠好言𤣥理素抱羸疾母恒禁其語晉書别傳更瘦鄧竟陵免官後赴山陵過見大司馬桓公桓問之曰卿何以更瘦遐曰有愧於叔達不能不恨恨於破甑世説苦役甄法崇永初中為江陵令在任嚴明于時南平僇士為江安令䘮官至其年末崇在㕔上忽見一人從門入云僇江安通法崇法崇知士已亡因問卿貌何故瘦荅曰我生時所行善不補惡今繫苦役窮極理盡述異記革帶移孔沈約乆處端揆有志台司武帝終不用乃與徐勉書陳情言已老病百日數旬革帶常應移孔以手握臂率記月小半分欲謝事求歸老之秩勉為請三司之儀帝弗許但加鼓吹而已梁書貌瘦韓休為相峭直時政所得失言之未嘗不盡𤣥宗嘗臨鏡黙然不樂左右曰韓休為相陛下殊瘦於彼何不逐之上歎曰吾貌雖瘦天下必肥唐書通鑑説法馬留元祐間王景亮與任族無名子結為一社紀事嘲哨士大夫無問賢愚一經諸人之目即被不雅之名號曰猪觜闗吕惠卿察訪京東吕質清瘦語話之際喜以雙手指畫社人呼為説法馬留又凑為七字曰説法馬留為察訪社中彌嵗不能對一日邵箎因上殿氣泄出知東平邵髙鼻捲髯社人名為凑氛獅子仍對曰凑氛獅子作知州惠卿衘之諷部使者發以他事舉社遂為虀粉桐江詩話馬留蓋優人呼沐猴之名古今詩話形體形體身伸也可屈伸也形有形象之異也軀區也是衆名之大總若區域也體第也骨肉毛血表裡大小相次第也釋名參天地人受天地變化而生一月而膏二月血脈三月而懐四月而胎五月而筋六月而骨七月而成形八月而動九月而躁十月而生形骸已成五藏乃分肝主目腎主耳脾主舌肺主鼻膽主口天有四時五行九曜三百六十日人有四支五藏九竅三百六十節天有風雨寒暑人有取與喜怒膽為雲肺為氣䏪為風腎為雨肝為雷人與天地相類而心為之主耳目者日月也血氣者風雨也日月失行薄蝕無光風雨非時毁折生災五星失行州國受其殃天地之道尚由愛其神明人之耳目何能乆燻而不息精神何能馳騁而不乏是故聖人守内而不失外文子像法人頭圓像天足方法地五臟像五行四胑法四時九竅法九分目法日月肝仁肺義腎志心禮膽斷脾信膀胱决難髪法星辰節法日嵗腸法鈐孝經援神契五藏推天命本人情人有五藏六腑何謂五藏精藏於腎神藏於心魂藏於肝魄藏於肺志藏於脾何為六腑咽喉量入之府胃曰五穀之府大腸轉輸之府小腸受成之府膽積精之府膀胱液之府也韓詩外傳精氣形者生之舎也精神者所受於天形體所受於地也血氣者人之華也而五藏者人之精也孔竅者精神之戸牗也而氣志者五藏之使候也是故五色亂目使目不明五聲譁耳使耳不聰五味亂口使口爽傷趣舎滑心使行飛楊故嗜欲使人氣滛好憎使人精勞不疾去之則志氣日耗淮南文子生異堯八眉舜四瞳子禹其跳湯扁文王四乳八者如八字者也其跳者踦也扁者枯也言皆不善也尚書大傳堯眉八彩九竅通洞而公正無私一言而萬民齊舜二瞳子是謂重明作事成法出言成章禹耳參漏是謂大通興利除害䟽河决江文王四乳是謂大仁天下所歸百姓所親臯陶馬喙是謂至信决獄明白察於人情淮南且徐偃王之狀目可瞻焉仲尼之狀面如蒙倛周公之狀身如斷菑臯陶之狀色如削𤓰閎夭之狀面無見膚𫝊説之狀身如植鰭伊尹之狀面無湏麋禹跳湯偏堯舜參牟子荀子𫝊言黄帝龍顔顓頊戴午帝嚳駢齒堯眉八采舜目重瞳禹耳三漏湯臂冄肘文王四乳武王皇陽周公背僂臯陶馬口孔子反羽蒼頡四目為皇帝史晉公子重耳仳脇為諸侯霸蘓秦骨鼻為六國相張儀仳脇亦相秦魏項羽重瞳云虞舜之後與髙祖分王天下論衡老子老子身長八尺八寸黄色美眉長耳大目廣額踈齒方口厚唇額有三五達理日角月懸鼻純骨雙柱耳有三門足蹈二五手把十文史記孔子孔子適鄭與弟子相失獨立東郭門外姑布子卿謂子貢曰東門外有一人焉其長九尺有六寸河目隆顙其頭似堯其頸似臯繇其肩似子産然自腰已下不及禹者三寸纍纍然如䘮家之狗子貢以告孔子欣然而歎曰形狀末也如䘮家之狗然乎哉然乎哉家語老萊子之弟子出薪遇仲尼反以告曰有人於彼脩上而趍下末僂而後耳視若營四海不知其誰氏之子老萊子曰是丘也莊子日角子産日角晏平仲月角尾生犀角栁下惠史魚反角管子昜貌子思適齊齊君之嬖臣美鬚眉立乎側齊君指之而笑且言曰假貌可相易寡人不惜此之鬚眉於先生也子思曰非所願也昔堯身脩十尺眉乃八彩實聖舜身脩八尺有竒面頷無毛亦聖禹湯文武及周公勤思勞體或折臂望視或秃骭背僂亦聖􅀈也不以鬚眉美鬛為稱也人之賢聖在徳豈在貌乎孔叢子體方安里王欲以馬囘為相問子順曰囬為人梗梗亮直之丈夫也順曰聞諸孫卿云其為人也長目而豕視者必體方而心圓臣見馬囬非不偉其體幹也然甚疑其目王卒用之三月果以謟得罪上法貴武帝諱雄字仲雋姓祖第三子帝生長八尺三寸美容貌相工相之曰此君將貴其相有四目如重雲鼻如龜龍口如方器耳如相望法為貴人位過三公不疑也蜀李書竒表李郃長七尺八寸多鬚髯八眉左耳有竒表腦􅀈如鼎形手握二公之字别傳堂堂華温琪少從黄巢為盗巢敗温琪走滑州顧其狀貌魁偉懼不自容乃投白馬河流數十里不死河上人援而出之又自經於桑林輙枝折乃之胙縣有田父見之曰子狀貌堂堂非常人也乃匿干家五代史銅筋鐡肋鄧弼字伯翊秦人也身長八尺雙目有紫稜開合閃閃如電聲如虎吼以力雄人隣牛方閗不可擘拳其脊折仆地市門石皷十人弗能舉兩手持之行㤗定末徳王薦之㑹丞相格其事弼環視四體歎曰天生一具銅筋鐡肋不使立薫萬里外乃槁死三尺蒿下命也遂入王屋山為道士人為貴中黄道君曰天生萬物人為貴也人身包含天地無所不法立天子置三公九卿二十七大夫八十一元士九州百二十郡千二百縣也天子天子大道君脾為皇后心為太尉左腎為司徒右腎為司空封八神及臍為九卿珠樓神十二胃神十二三焦神三合為二十士大夫四肢神為八十一元士合之百二十以法郡數也又胏為尚書府肝為蘭臺府五符經三官為道當調三官口為天闗足為地闗手為人闗三官調則五臟安五臟安則舉身無病真誥精明精者體之神明者身之寳勞多則精散營多則明消妾有益精之道延明之經上十二官心者君主之官神明出焉肺者相𫝊之官治節出焉肝者將軍之官謀慮出焉膽者中正之官决斷出焉膻中臣使之官喜樂出焉在兩乳間為海之氣脾胃倉廪之官五味出焉大腸傳道之官變化出焉小腸受盛之官化物出焉腎者作强之官伎巧出焉三焦决瀆之官水道出焉膀胱州都之官津液藏焉凡十一官不得相失脾胃二藏共一官素問内經得强五藏者身之强也頭者精明之府頭傾視深精神將奪矣背者胷之府背曲肩隨府將壊矣腰者腎之府轉摇不能腎將敗矣膝者筋之府屈伸不能行筋將憊矣得强則生失强則死上臟神心神丹元字守靈肺神皓華字虚成肝神龍煙字含明腎神𤣥冥字育嬰脾神常在字魂庭膽神龍曜字威明黄庭經五入酸入肝辛入肺苦入心醎入腎甘入脾是為五入内經狀貌無憑庾􅗥少聰慧家富于財好賔客食必列鼎又狀貌豐美頥頰開張人皆謂􅗥必為方伯無餒乏之慮及魏尅江陵卒致餓死時又有水軍都督禇蘿靣甚尖危有從理入口竟保衣食而終南史庾果之傳天中記卷二十一
