body:
  text: 射射之為言者繹也繹者各繹已之志也故射者進退周還必中禮內志正外體直然後持弓矢審固持弓矢審固然後可以言中此可以觀德行矣禮射義陳音曰黃帝之後楚有弧父者生於楚之荊山生不見父母為兒之時習用弓矢所射無脫以其道傳於羿羿傳逢蒙吳越春秋逢蒙作射世本射起于黃帝禮正義修臂史皇產而能書羿修臂而善射淮修務帝羿有窮氏與吳賀北遊賀使羿射雀曰生之乎殺之乎賀曰射其左目羿引弓射之誤中右目羿仰首而愧終身不忘故羿之善射至今稱之帝王世紀御覽不載晉楚將戰潘尫之黨與養由基蹲甲而射之徹七札焉左成下楚有養由基者善射去柳葉者百步而射之百發百中左右皆曰善有一人過曰善射可教射也矣養由基曰人皆善子乃曰可教射子何不代我射之也客曰我不能教子支左屈右矢射柳葉者百發百中而不以善息少焉氣力倦弓撥矢鉤一發不中前功盡矣周策楚庭嘗有神白猿楚之善射者莫能中莊王自射之搏矢而熙使養由基射之矯弓操矢而往未之發猿擁柱而號矣發之則應矢而下王大悅楚史槫杭淮南子幽通賦養由睇而猿號大甘蠅古之善射者彀弓獸伏鳥下弟子飛衛學射於甘蠅而巧過其師紀昌又學射於飛衛衛曰視小如大視微如著而後告我昌以𣮖懸虱於牖間南面而望之旬日之間浸大也三年之後如車輪焉以覩餘物皆邱山也乃以燕角之弧朔蓬之箭射之貫虱之心而懸不絕昌既盡衛之術乃謀殺飛衛一日相遇於野二人交射中路矢鋒相觸而墜於地而塵不揚飛衛之矢先窮紀昌遺一矢既發飛衛以棘刺之端扞之而無差焉於是二子泣而投弓相拜於塗請為父子列湯問蒲且子之弋也弱弓纖繳乘風振之連雙創于青雲之際用心專動手均也列子蒲且子見雙鳧過之其不被弋者亦下汲冢書張華勵志詩蒲盧縈繳神感蒼禽舊說蒲盧即蒲且也孔子觀於鄉射於是退而與門人習射於矍相之圃觀者如堵牆射至於司馬使子路執弓矢出誓射者又使公罔之裘序點揚觶而語令射決訟李悝為魏文侯上地之守而欲民之善射也乃下令曰民之有狐疑之訟者令人射的中之者勝不中者不勝令下而民皆疾習射日夜不休及與秦人戰大敗之以民之善射故也韓子御覽的作杓摽也李廣為人長猿臂其善射亦天性雖子孫他人學者莫能及漢書後漢陳王寵善弩射十發十中中皆同處華嶠書云寵射其秘法以天覆地載參連為奇三微三小三微為經三小為緯經緯相將萬勝之方然要在機牙袁術遣將紀靈率步騎三萬攻劉備呂布遣人招備并請靈等饗飲謂靈曰布性不喜合鬭但喜解鬭耳乃令植戟於營門彎弓曰諸君觀布射戟小枝中者當解兵不中各自鬭布一發中戟枝遂罷兵英雄記太史慈美鬚髯猨臂善射弦不虛發嘗從孫策討麻保賊賊於屯裏緣樓上行詈以手持樓棼慈引弓射之矢貫手著棼圍外萬人莫不稱善吳志魯肅南徙州追騎至肅自樹盾引弓射之矢皆洞貫騎度不能制乃相率還肅渡江上五十四魏舒字陽元少工射着韋布入山澤每獵大獲為鍾毓長史毓與參佐射戲舒常為坐畫後值朋人少以舒充數於是發無不中加客範閑雅殆盡其妙舉坐愕然莫有敵者毓歎謝曰吾之不足盡卿才有如此射矣王隱晉書庾稚恭既常有中原之志傾注漢之力窮舟車之勢師次於襄陽大會參左陳其旌甲親授弧矢曰我之此行若此射矣遂三起三疊徒眾屬目其氣十倍世說劉曜雄武過人鐵厚一寸射而洞之於時稱為神射載記前燕慕容翰字元邕晉成帝時北投宇文歸既而逃歸乃遣勁騎百餘追之翰遙謂追者曰汝可百步豎刀吾射中者汝便宜反不中者可來前也歸騎解刀豎之翰一發便中刀鐶追騎乃散晉書慕容盛字道運遇盜陜中盛曰汝欲當吾鋒乎試豎爾手中箭百步我若中之宜慎爾命如其不中當束身相授盜乃豎箭盛以發中之盜曰郎貴人之子故相試耳資而遣之上不中為奇賈堅彎弓三百餘烈祖以堅善射故親試之乃取一牛置百步上召堅使射曰能中之乎堅曰少壯之時能令不中今已年老正可中之恪大笑射發一矢拂脊再一矢摩腹皆附膚落毛上下如一恪曰能復中乎堅曰所貴者以不中為奇中之何難一發中之堅時年六十餘矣觀者咸服其妙十六國春秋燕書百步射蔗宜都王蕭鏗字宣儼少善射常以堋的太闊曰終日射侯何難之有乃取甘蔗插地百步射之十發十中南史齊柳惲字文暢常與琅琊王瞻博射嫌其皮闊乃摘梅帖烏珠之上發必命中觀者驚駭上靈邱南有山高四百餘丈群臣仰射山峰無能踰者文成帝彎弓發矢出三十餘丈過山南二百三十步遂刊石勒銘魏書宣武景明中幸鄴帝親射遠及一里五十步群臣勒銘於射所後於河內懷縣親射矢一里五十餘步侍中高顯等奏聖武自天神藝夙茂巧會騶虞之節妙盡矍圃之儀威稜攸疊甝兕懾氣才猛所振勍慇弭心足以肅截九區赫服八宇盛事奇跡請勒銘射宮魏北海王詳字季豫孝文自洛北巡詳嘗與侍中彭城王勰並在輿輦陪侍左右至文成射銘所帝停駕詔諸弟及侍臣皆試射遠近諸人皆去一二十步唯詳箭及之帝拊掌欣笑遂詔勒銘親自為制北史宣武靈后胡氏幸西林園法流堂命侍臣射不能射者罰之又自射孔中之尋關溫水登鷄頭山學射象牙簪一發中之神武迎蠕蠕公主還尔朱氏迎於木井北與蠕蠕公主前後別行不相見公主引角弓仰射翔鴟應弦而落妃引長弓斜射飛烏亦一發而中神武喜曰我此二婦並堪繫賊北史后妃傳李遠賢之弟陵之後也當校獵於莎柵見石於叢薄中以為伏兔射之而中鏃八寸餘就而視之乃石也周文聞而異之賜書曰昔李將軍廣親有此事公今復爾可謂世載其德雖熊渠之名不得獨擅其美周書豆盧寧字永昌嘗與梁永定遇於平涼川相與肄射乃相去百步懸莎草以射之七發五中永定服其能贈遺甚厚上蕭琮字溫文後梁明帝之子昭明曾孫也博學有文義兼善弓馬遣人伏地持帖琮馳馬射之十發十中持帖者亦不懼隋書隋末有督君謨善閉目而射志其目則中目志其口則中口有王靈智者學射於君謨久之曲盡其妙欲射君謨獨擅其美君謨時無弓矢執一短刀箭來輒截之末後一矢君謨張口承之遂齧其鏑於是笑曰汝學射三年不教汝齧鏃法耳僉載雜俎緩箭強弓唐宋國公蕭瑀不能射太宗賜射俱不着𡽢歐陽詢作詩嘲曰急風吹緩箭弱手馭強弓欲高番覆下應西還更東十迴俱着地兩手併檠空借問誰為此多應是宋公後帝見此詩謂蕭瑀曰此乃四十字章疏也由是與詢有隙啟顏錄張元一滑稽善謔時西戎犯邊則天欲諸武立功因行封爵命武懿宗統兵以禦之寇未入塞懿宗始逾邠郊畏懦而遁懿宗短陋元一嘲之曰長弓短度箭蜀馬臨高蹁去賊七百里隈牆獨自戰忽然逢着賊騎猪向南竄則天聞之初未悟曰懿宗無馬邪何故騎猪元一解之曰騎猪者是夾豕走也則天乃大笑本事詩薛仁貴領兵擊九姓突厥於天山將行高宗內出甲令仁貴試之上曰古之善射有穿十扎者卿且射五重仁貴射而洞之高宗大驚更取堅甲以賜之時九姓令驍健數十人逆來挑戰仁貴發三矢射殺三人餘皆請降擒其護葉兄弟三人而還軍中歌曰將軍三箭定天山壯士長歌入漢關舊唐俱三十步唐殿中內供奉盧廙與李畬俱非稱善射者常三元禮射廙畬雖引滿射俱不及𡽢而墜互言其工拙畬戲曰畬與盧箭俱三十步左右不曉畬箭畬箭去𡽢三十步盧箭去身三十曰歡笑久之御史臺記玄宗東封徵突厥大臣扈從發都下至加會頓時有兔起于御馬之前上引弓旁射獲之頡利發下馬持兔舞蹈曰聖人神武超絕若天上則不知人間無也上因令問饑否對曰仰觀聖武如此十日不食猶為飽也續世說羽林將劉洪善騎射常對御使人於風中擲鵝毛洪連箭射之無有不中帝賞歎厚賜焉天寶遺事王栖曜善射嘗與文士遊虎邱寺平野齊日先以一箭射空再發中之江東文士梁肅已下咸歌詠之南部新書天寶末逆將邢超然據曹州栖曜攻之超然乘城號令栖曜曰彼可取也一箭殞之城中氣懾遂拔曹州舊唐肅宗初為忠王嘗與諸王射苑中矢三發連中的觀者以為神宣宗幸苑中回顧仗外舍屋際有倚竹一竿可見者止尺餘去御馬百步外遂命弓橫綜正扶矢曰朕以法制威天下而黨羗窮寇敢來干我連年兵不解我今射此竹卜其濟否左右聳觀上攘袖挽弓一發洞其竹分而為二矢貫於外左右呼萬歲賀於馬前未踰月羗果滅語林石雄徐州人初討劉稹水次見白鷺謂眾曰使吾射中其目當成功一發如言帝聞下詔褒美李克用為李琢所敗亡入達靼久之鬱鬱不得志又常懼人圖已於暇日從其群豪射獵或掛針于木或立馬鞭百步射之輒中群豪皆伏以為神五代史唐莊宗時薛昭文使福州假道江西劉信出勞之謂曰亞次聞有信否昭文曰天子新有河南未孰公名也信曰漢有韓信吳有劉信君還其語亞次當來較射於淮上也乃酌大巵望牙旗鎞首百步謂昭文曰一發而中願以此巵為壽否則亦以自罰言訖而箭已穿矣王建次子元膺能射錢中孔嘗自抱盡毬擲馬上馳而射之無不中五代史翰林學士毛文錫作賦美之元曰窮措大畏此神箭否外史檮杌崔仁冀父詢天成中有蕃使假道來聘蕃以弧矢大誇于吳人武肅宴於龍山擊場酒酣因以酒瓶置射棚之上命蕃使射之蕃一發中瓶之竇武肅命詢曰汝能賽之乎詢曰詢雖不能願假王之威德請兼中嘴竇以勝之遂授以親箭二一發中瓶之竇再發中瓶之嘴蕃使慚服久之王大悅因賜金瓶併帛器以獎之吳越備史宋太宗時康保裔善騎射弋飛走不中嘗握矢三十引滿以射筶鏑相連而墜無服其妙宋史手熟陳堯咨宇嘉謨真宗時舉進士第一工隸書善射嘗以錢為的一發貫其中宋史堯咨善射亦以此自矜嘗射於家圃有賣油翁釋擔而睨之久而不去見其發矢十中八九但微頷之問曰汝亦知射乎吾射不亦精乎翁曰無他但手熟耳陳忿然曰爾安敢輕吾射翁曰以我酌油知之乃取一葫蘆置於地以錢覆其口徐以油酌油瀝瀝自錢孔入而錢不濕因曰我亦無他唯手熟爾陳笑而遣之金波遺事范廷召善騎射嘗出獵有群鳥飛過廷召發矢並貫其三觀者駭異所至處彈射殆絕宋史曹子建白馬篇控弦破左的右發摧月支邯鄲淳藝經云馬射左邊為月支三枚馬蹄三枚五馭保氏掌教國子以五馭一曰鳴和鑾二曰逐水曲三曰過君表四曰舞交衢五曰逐禽左周禮作御乘雅作駕寒哀作御呂覽世本韓作寒造父之師曰秦竇氏造父之始從習御也執禮甚卑秦竇氏三年不告造父執禮愈謹迺告之曰古語曰良弓之子必先為箕良冶之子必先為裘汝先觀吾趨趨如吾然後六轡可持六馬可御造父曰唯命所從秦竇氏乃立木為塗僅可容足計步而置履之而行趨走往還無趹失也造父學之三日盡其巧秦竇歎曰子何敏也得之捷乎凡所御者亦如此也列子造父善御者也善視其馬節其飲食量其馬力故能取遠道而馬不罷明主猶造父也善治其民度量其力也管子周穆王王乘驊騮騄耳使造父為御日行千里往見西王母史記延陵卓子乘蒼龍與翟文之乘前則有錯飾後則有利錣筴則引之退則筴之馬前不得進後不得退逐避而逸因下抽刀而刎其腳造父見之泣終日不食因仰天而歎曰筴所以進之也錯錣在前引所以退之也利錣在後韓子昔者王良造父之御也上車攝轡馬為整齊而歛諧投足調均勞逸若一心怡氣和體便輕畢安勞樂進馳騖若滅左右若鞭周旋若環世皆以為巧淮南恣欲造父御四馬馳驟周旋而恣欲於馬恣欲於馬者擅轡筴之制也然馬驚於出入而造父不能禁制者非轡筴之嚴不足也威分於出入也韓子閔子騫為費宰問政於孔子子曰以德以法夫德法者御民之具猶御馬之有銜勒也君者人也吏者轡也刑者策也夫人君之政執其轡策而已善御馬正銜勒齊轡策均馬力和馬心故口無聲而馬應轡策不舉而極千里棄其銜勒而專用箠策其不制也可必矣夫無銜勒而用箠策馬必傷車必敗故曰御四馬者執六轡御天下者正六官是故善御馬者正身以總轡均馬力齊馬心回旋曲折唯其所之故可以取長道可赴急疾此聖人所以御天下與人事之法則也家語王子於期為宋君為千里之逐已駕察手吻文且發矣驅而前之輪申繩引而却之馬掩迹拊而發之馬逸出於竇中馬退而却筴不能進前也馬逸而走轡不能正也韓子子貢問治民於孔子子曰懔懔焉若持腐索之扞馬子貢曰何其畏也孔子曰夫通達御皆人也以道導之則吾畜也不以道導之則吾讎也如之何其無畏也家語魯定公問於顏回曰子亦聞東野畢之善御乎對曰聞其善矣雖然其馬將必佚定公色不悅顏回退後三曰物來訴之曰東野畢之馬佚兩驂曳兩服入于廄公聞之促駕召顏回問曰子何以知畢馬之佚也對曰以政知之昔者帝舜巧於使民造父巧於使馬舜不窮其民力造父不窮其馬力是以舜無逸民造父無佚馬今東野畢之御也升馬執轡銜體正矣步驟馳騁朝禮畢矣歷險致遠馬力盡矣然而猶乃求馬不已臣以此知之公曰善誠若吾子之言也上韓詩外傳同荀子謂問于顏闔莊子謂東野稷見莊公顏闔云云孔子曰以禮齊民譬之御則轡也以刑齊民譬之於御則鞭也執轡於此而動於彼御之良也無轡而用策則馬失道矣古之善御者執轡如組兩乘如舞非策之助也孔子趙襄王學御於王子期俄而與於期逐三易馬而三後襄王曰子之教我御術未盡也對曰術已盡用之則過也凡御之所長馬體安于車人心調于馬而後可以進速致遠今君後則欲逮臣先則恐逮于臣夫誘道爭遠非先則後也而先後心在于臣尚何以調于馬此君之所以後也韓子尹儒學御三年而無得焉私自苦痛常寢想之中夜夢受秋駕於師明日往朝師望之謂之曰吾非受道於子也恐子不可予也今日教子以秋駕尹儒反走北面再拜曰臣有天幸今夕固夢受之淮南鉗且大丙之御除轡銜去鞭棄策車莫動而自舉馬莫使而自走也日行月動星耀而玄運電奔而鬼騰故不招指不咄叱騁若飛騖若絕矢躡風追電歸朝發搏桑日入落棠此假弗用而能以成其用者也夫鉗且大丙不施轡銜而以善御聞於天下伏戲女媧不設法度而以至德遺於後世何則至虛無純一而不羈喋苛事也上昔者馮夷大丙之御也乘雲車入雲蜺游微霧騖杳忽歷遠彌高以極往經紀山川蹈騰崑崙排閶闔淪天門末世之御雖有輕車良馬勁策利錣不能與之爭先是故大丈夫以天為蓋以地為輿四時為馬陰陽為御乘雲凌霄縱志舒節以馳大區令雨師洒道使風伯掃塵電以為鞭策雷以為車輪上遊於層霄之野下出於無垠之門劉覽偏照復守以全原道夫馬者良工御之則和馴端正致遠道矣僕人御之則遲奔毀車矣民者譬之馬也堯舜御之則天下端正桀紂御之則天下奔於歷山尸子夫御者馬體調乎車御心和乎馬則雖歷險致遠進退周旋無不如意雖有騏驥騄耳之名而使烏獲御之則馬反自恣而人不御也淮南九數大司徒六藝注數九數之計周官包犧氏始畫八卦作九九之術以合六爻之變魏劉勰九章筭經序黃帝定三數為十等隸首因以著九章漢備五數夏侯陽筭經序十十謂之百十百謂之千十千謂之萬十萬謂之億十億謂之兆十兆謂之經十經謂之垓十垓謂之補十補謂之選十選謂之載十載謂之極有物者有事者紀於此矣過此往者則其數可紀其名未之或聞也夫數一為特候奇隻二為再兩偶雙三為參四為乘風俗通數度之道以六為法數度之始始於微細有形之物莫細於毫故立一毫以為度十毫為髮十髮為釐十釐為分十分為寸十寸為尺備於六故先王以為天下用也賈誼書山海經曰帝令豎亥步自東極至於西極五億十選九千八百八十步豎亥右手把筭左手指青邱曰五億十萬九千八百天地東西二億三萬二千里南北二億一千五百里天地相去一億五萬里也一行筭法曰萬萬穰為載數之極矣或問之曰何以數之為載按孫子筭經云古者積錢上至於天天不能容下至於地地不能載天不能蓋地不能載故名曰載數者一十百千萬也所以筭數事物順平衡之理也書曰先其筭命紀於一恊於十長於百大於千衍於萬其法在筭術宣於天下漢律歷志九九齊桓公設庭燎為士之欲造見者朞年而士不至於是東野鄙人有以九九之術見者桓公曰九九何是以見乎鄙人對曰臣非以九九為足以見也臣聞主君設庭燎以待士朞年而士不至夫士之所以不至者君天下賢君也四方之士皆自以論而不及君故不至也夫九九薄能耳而君猶禮之况賢於九九乎夫泰山不辭壤石江海不逆小流所以成大也詩云先民有言詢於蒭蕘言博謀也桓公曰善乃因禮之朞月四方之士相攜而並至說苑晉安有越王餘筭尺長尺許白者似骨黑者似角云越王行海作筭有餘棄之於水生焉異苑學算南郡宜城王子山到剎泰山從鮑子真學筭博物志玄菟曹元理嘗從其友人陳廣漢廣漢曰吾有二囷米忘其石數子為計之元理以食筋十餘轉曰東囷若干西囷若干遂大署囷門後出米西囷中有一鼠大堪一升東囷不差圭合元理後歲復過廣漢廣漢以米數告之元理以手擊床曰遂不知鼠之殊米不如剝去面皮矣廣漢為之取酒鹿脯數片元理復筭其資業曰何供饋之偏耶廣漢慚曰有倉卒客無倉卒主人元理曰姐上蒸㹠一頭廚中荔枝一枚皆可為設廣漢再拜謝辜自入取之盡日為歡其術後傳南季南季傳項瑫瑫傳子陸皆得其分數而失玄妙焉西京雜記趙達河南人治九宮一算之術究其微旨是以能應機立成對問若神至計飛蝗射隱伏無不中效或難答曰飛者固不可校誰知其然此殆妄耳達使其人取小豆數斗播之席上立處其數驗覆果信吳志顧譚每省簿書未嘗下算徒屈指心計盡發疑謬下吏以此服之吳志鷄兔算國史譜紀之尚不明上上頭下下腳腳即折半下見頭除腳見腳除頭上是鷄下是兔南部新書度之起起於何答曰度之起起於忽忽是神蟲口中吐絲名也十忽為一絲十絲為一毫發蒙算經量量之起起於何答曰量之起起於粟粟是陰陽而生從六甲而出故六粟為一圭十圭為一抄上秤之起起於何答曰秤之起起於黍黍是三棱草子也十黍為一絫十絫為一銖上傳言黃帝龍顏顓頊戴午帝嚳駢齒堯眉八采舜目重瞳禹耳三漏湯臂再肘文王四乳武王望陽周公背僂皋陶馬口孔子反羽斯卜二聖者皆在帝王之位或輔主憂世蒼頡四目為黃帝史晉公子重耳仳脇為諸侯霸蘇秦骨鼻為六國相張儀仳脇亦相秦魏項羽重瞳云虞舜之後與高祖分王天下論衡世人固有身虛而志立體小而名高者於是則否是以堯眉八彩舜目重瞳禹耳參漏文王四乳然則世亦有四乳者則駑馬一毛似驥耳上師曠見太子晉曰汝聲清浮汝色赤火色不壽王子曰後三年上賓於帝汝慎毋言殃將及汝師曠歸未及三年告死者至周書王使內史叔服來會葬公孫敖聞其能相人也見其二子焉叔服曰穀也食子難也收子穀也豐下必有後於魯國左文元姑布子卿姑布子卿見趙簡子簡子徧召其子使相之子卿曰無為將軍者簡子曰趙氏其滅乎子卿曰吾嘗見一子於路殆君之子也簡子召子母恤母恤至則子卿起曰此真將軍矣簡子曰其母賤翟婢也奚道貴哉子卿曰天所授也雖賤必貴簡子於是廢太子伯魯而以母恤為太子史記孔子適鄭與弟子相失獨立東郭門外或人謂子貢曰東門外有一人焉其長九尺有六寸河目隆顙其頭似堯其頸似皋繇其肩似子產然自腰已下不及禹者三寸纍然如喪家之狗子貢以告孔子欣然而歎曰形狀末也如喪家之狗然乎哉然乎哉家語史索隱篇載家語布姑子卿為相者蔡澤從唐舉相曰吾聞先生相李兌百日之內持國秉政有之乎曰有之曰若臣者何如唐舉熟視而笑曰先生曷鼻巨肩魋顏蹙齃膝攣吾聞聖人不相殆先生乎蔡澤知唐舉戲之乃曰富貴吾所自有所不知者壽也願聞之唐舉曰先生之壽從今以往四十三歲矣澤笑謝而去謂其御者曰吾躍馬疾驅懷黃金之印結綬於腰揖讓人主之前食肉富貴四十三歲亦足矣史記古者有姑布子卿今之世梁有唐舉相人之形狀顏色而知其吉凶妖祥世俗稱之古之人無有也學者不道也故相形不論心論心不如擇術形不勝心心不勝術術正而心順之則形相雖惡而心術善無害為君子也形相雖善而心術惡無害為小人也故長短小大善亦形相非吉凶也蓋堯長帝舜短文王長周公短仲尼長子弓短楚之孫叔敖突禿長左軒較之下而以楚霸葉公子高微小短瘠行若將不勝其衣白公之亂入據楚誅白公定楚國如反掌長短大小美惡形相豈論也哉且徐偃王之狀目可瞻焉仲尼之狀面如蒙倛周公之狀身如斷菑皋陶之狀色如削瓜閎夭之狀面無見膚傅說之狀身如植鰭伊尹之狀面無須麋禹跳湯偏堯舜參牟子從者將論志竟比類文學耶直將差長短辨美惡而相欺傲耶荀非相魏安釐王問子順曰馬回之為人雖少文梗亮直有丈夫節也吾欲以為相可乎答曰知臣莫若君何有不可至於亮直之節臣未明也聞諸孫卿其為人也長目而豕視者必體方而心圓每以其法相人千百不失臣見回而甚疑其目王用之三月果以詐得罪孔叢大梁人尉繚說秦始皇以并天下之計始皇從其冊與之亢禮衣服飲食與之齊同繚曰秦王為人隆準長目鷙膺豺聲少恩虎視狼心居約易以下人得志亦輕視人我布衣也然見我常身自下我誠使秦王須得志天下皆為膚矣不可與交遊乃亡去論衡有龍淵者桓帝時善相人也於聽音聲尤妙二千石相者龍淵下床贊之令長起侍贊之自六百石以下皆坐而言之先相張濟嘗以財得三公濟常依淵以觀視有相者輒往來之會解瀆侯往相到門淵曰公當有至相何憂貧乎侯去淵謂濟曰可厚事之濟遂往盡為償債別以數百萬修居置業桓帝崩無嗣解瀆侯入為天子日濟遂至司空項氏始學篇註朱建平善相術文帝為五官將坐上會客三十餘人文帝問已年壽又命徧相眾賓建平曰將軍當壽八十至四十時當小有厄願謹護之後文帝皇初十年年四十病困謂左右曰建平所言八十謂晝夜也吾其決矣頃之果崩魏志孝武李太后本出微賤始簡文帝為會稽王有三子繼夭其後諸姬絕孕將十年乃令善相者徧相宮人時后在織坊中形長而色黑宮人皆謂之崑崙既至相者驚云此其人也而有虎厄帝召侍后數夢兩龍枕膝日月入懷生孝武及會稽王道子既登尊位服相者之驗而怪有虎害且生所未見乃令人畫作虎因以手打虎戲便患手腫痛遂以疾而崩幽明錄晉書初桓玄篡位妻劉氏尚書躭之女也聰明有智鑒常見帝因為玄曰劉裕龍行虎步瞻視不凡恐不為人下宜早為之所玄曰我方平蕩中原非裕莫可待關隴平定然後議之宋書高紀宋長城僧願善相宗愨微時謂之曰宗君應為三州刺史後果鎮廣豫等州宋廢帝召見之取東監囚及一奴美顏色者飾以衣冠令相願指囚曰君多危難下階便應鉗鎖謂奴曰君下賤人暫得免耶南史齊明帝脾上有赤痣常秘不傳江祐勸帝出以示人晉壽太守王洪範罷任還上袒示之曰人皆謂此是日月相卿幸勿泄言洪範曰公日月之相在軀如何可隱轉當言之公卿上大悅南齊江祐傳梁武帝初為同州刺史有沙門自稱僧暉謂帝曰君頂有伏龍非人臣也復求莫知所之梁書武帝起兵時呂僧珍一夜忽頭痛壯熱及明而顙骨益大其骨法蓋有異焉又嘗語親舊曰吾昔在蒙縣熱病發黃時必謂不濟主上見語卿有富貴相必當不死俄而果愈及僧珍童兒時從學有相工歷觀諸生指僧珍曰此有奇聲封侯相也後隨武帝起義平東昏封平國侯南兗州刺史齊書許負之術宣修容善許負之術曾正會登樓還語人曰太尉今年必當不濟時靖惠王宏尚康勝或以為不然曰行步向前氣轉殊下若其不爾不復言相至其年末靖惠王薨及昭明入朝又云必無嗣立之相俄而昭明薨金樓子梁宜豐侯修參軍陳晃善相人修因法會將晃自隨令相簡文有天下否晃言簡文九州骨成必踐帝位而地部過弱非但王畿蹙侵兼恐不得善終三國典略梁元帝初從劉景授相術因訊以年答曰未至五十當有小厄禳之可免帝曰茍有期會禳之何益及四十七為魏所滅南史庾喬子幼少聰慧家富於財好賓客食必列鼎又狀貌豐美頤頰開張人皆謂其必為方伯無餒乏之慮及魏尅江陵卒致餓死時又有水軍都督禇蘿面甚尖危有從理入口竟保衣食而終上朱建平善相鍾繇以為唐舉許負何以復加然相王肅年踰七十位至三公肅六十二終于終領軍耳史氏以為蹉跌吾以為相不可憑也念賢字蓋盧為兒童時在學中讀書有善相者遇學諸生竟詣之賢獨不往笑謂諸生曰男兒生死富貴在天也何遽相乎周書東魏御史賈子儒善相太常卿崔暹引子儒潛觀齊王儒曰人有七尺之形不如一尺之面一尺之面不如一寸之眼大將軍臉薄顧速非帝王相也皇甫王又竊觀王於道曰此不作物會是流涕者謂太原公洋三國典略龐晃知高祖非常人深自結納及高祖去官歸京師晃迎見高祖於襄邑高祖甚歡晃因白高祖曰公相貌非常名在圖籙九五之日幸願不忘高祖笑曰何妄言也頃之有雌雉鳴於庭高祖命晃射之曰中則有賞然富貴之日持以為驗晃射而中高祖撫掌大笑曰此是天意公能感之而中也隋書郭弘道字大實善相謂隋高祖曰公天中伏犀下相接於眉此非人臣之相願深自愛高祖取弘道銀盆置之於地引弓射之謂弘道曰向言有驗當一發中之既發應弦而中弘道曰願公事驗之後賞金盆高祖大悅唐書四五得大官來和善相術同郡韓則嘗詣和相謂之曰後四五當大官人初不知所謂則至開皇十五年五月而終人問其故和曰十五年為三五加以五月為四五大官槨也和言多此類著相經四十卷乙弗弘禮善占相初刺史泗州薛大鼎隋時當坐事沒為奴貞觀初與數人詣弘禮次至大鼎曰君奴也欲何所相咸曰何以知之弘禮曰觀其頭目真是賤人但不知餘處何如耳大鼎有慚色乃解衣視之弘禮曰看面不異前言占君自腰以下當為方岳之任其占相皆此類也貞觀末卒焉唐書馬周詣袁天綱相綱曰馬侍御伏犀貫腦兼有玉枕又背如負物當富貴不可言近代以來君臣道合罕有如公者公面色赤命門色暗耳後骨不起耳無根恐非壽者周後至中書令年四十八卒舊唐岑文本謂所親曰馬君論事會文切理無一言可損益聽之纚纚令人忘倦蘇張終賈正應此耳然鳶肩火色騰上必速恐不能久新袁天綱相竇軌伏犀貫玉枕當於益州立功名果然又相李嶠曰睡則氣從耳出名龜息必貴芝田錄袁客師常與一書生同過江登舟訖遍視中舟人顏色謂同侶曰不可速也遂相引登岸私語曰吾視舟中數十人皆鼻下黑氣大厄不久豈可知而從之但少留舟未發間忽見一丈夫神色高朗跛一足負杖驅驢登舟客師見此人乃謂侶曰可以行矣貴人在內吾儕無憂矣登舟而發至中澪風濤忽起危懼雖甚終濟焉詢驅驢丈夫乃是婁師德也後位至納言焉定命錄孫思邈年百餘歲善醫術謂高仲舒曰君有貴相當數政刺史若為齊州刺史邈有一兒作尉事使君雖合吃杖君當憶老人言願放之後果如其言已剝其衣訖忽記憶遂放上張柬之任青城縣丞已六十二矣有善相者云後當位極人臣眾莫之信後應制策被落則天怪中第人少令於所落人中更揀有司奏一人策好緣書寫不中程律故退則天覽之以為奇才召入問策中事特異之即收上第拜王屋縣尉後至宰相封漢陽王上韋處厚在開州也常有李潼崔冲二進士來謁留連百餘日會有過客西川軍將某者能相術於席上言李潼三日內有虎厄後三日處厚與諸客遊山寺自上方抵下方日已暮矣李先下崔冲後來冲大呼李云待冲來李聞待冲來聲謂虎至顛蹶墜下山趾絕而復蘇數日方愈及軍將迴謂李曰君厄過矣傳載常相衮之在福建也有僧某者善占色言事若神相國惜其僧老命弟子就學其術僧云此事天性非其造次為傳某常於相君左右見一人可教遍召得小吏黃徹焉相命就學老僧遂於闇室中置五色彩絲架令視之曰世人皆用眼力不盡淬熟看之旬日後乃稀認其白者後半載看五色即洞然而得矣命之曰汝若闇中之視五綵迴之白晝占人因傳其方訣且言後代當無加也李忠公吉甫云黃徹之占袁許之亞次也五代錢鏐縣錄事鍾起有子數人多竊從之遊豫章人有善術者望斗牛間有王氣斗牛錢塘分也因遊錢塘占之在臨安遂以相法隱市中陰求其人私謂起曰占君縣貴人求之市中不可得視君之相貴矣然不足當之術者過起家鏐適從外來見起反走術者望見之曰此真貴人也召之熟視之顧起曰君之貴因此人乃慰鏐曰子骨法非常願自愛李周盧嶽謂之曰吾少學星曆且工相人子方頤隆準眉目踈澈身長七尺真將相也吾占天象晉必有天下子宜留事晉以圖富貴上術士崔玄豹以相法言人事多中莊宗尤信重之以為北京巡官明宗為內衙指揮使重誨欲試玄豹乃使他人與明宗易服而坐明宗於下坐召玄豹相之玄豹曰內衙貴將也此不足當之乃指明宗於下坐曰此是也因為明宗言其後貴不可言明宗即位思玄豹以為神召至京師趙鳳諫曰好惡上所謹也今陛下神其術而召之則傾國之人皆將奔走吉凶之說明宗遂不復召上宋齊邱微時日者相之曰君貴不可言然亞夫下獄相君實有之位極之日當早引退庶幾保全齊邱登相位數載致仕復以大司徒就徵未幾坐陳覺詩干紀事乃賜死南唐足下龜文晉太常卿程遜足下有龜文嘗召相者視之相者告曰君終有沉溺之厄其後使於浙右竟葬於海魚之腹常讀李固傳云固足履龜文而位至三公卒無水害同事而異應也玉堂閑話足履龜文者二千石相書歐公嘗曰少時有僧相我耳白於面名滿天下唇不着齒無事得謗其言頗驗仇池筆記李承之在仁宗朝官州縣因邸吏報包拯拜參政或曰朝廷自此多事矣承之正色曰包公無能為今知鄞縣王安石眼多白甚似王敦他日亂天下者此人也邵氏錄慶曆中河南道士許眾妙善相以為顏魯公脊骨如龍王荊公目睛如龍蓋人能得龍之一體者皆貴極人爵見豫章人黃庠手曰左手得龍爪雖得魁天下而不仕若右手得之則貴之庠果為南省第一未及廷對而死老學菴筆記蕭注臨江新喻人熙寧中上殿奏對上問今臣僚中孰貴曰文彥博其次韓琦又問王安石何如注曰牛形人任重而道遠又一說云裕陵問文彥博跛履韓琦嘶聲何為皆貴注曰若不跛履嘶聲陛下不得而臣因問韓絳王安石馮京注云安石牛耳虎頭視物如射徑行直前敢當天下大事然不如絳得和氣多清波雜志東坡自謫海南歸人有問其遷謫艱苦者坡答曰此乃骨相所招少時入京師有相者云一雙學士眼半箇配軍頭異日文章當知名然有遷徙不測之禍今日悉符其語瑞桂堂暇錄蜀人云李順敗后逃至荊渚入一僧寺有僧熟視曰汝有異相當為百日偏伯之主何自在此汝宜急去今年不死尚有數十年壽又云方順之作有術士拆順名曰是一百八日有西川耳安能久也如期而敗老學菴筆記相形不如論心心相有三十六善不近小人不忘故舊不念舊惡常行陰德之類三十六善全有位極人臣諺曰有心無相相逐心生有相無心相隨心滅青箱雜記貴人之福有三愛談清虛常親文史衣不嫌舊食無重味此修福貴人志願許國氣義邁倫好賢樂善急流勇退此積福貴人廣務華飾慣為奢侈多歡少憂深居簡出此享福貴人又云文人似武必率武人似文必執略舉此數事則知相非止於氣色形神今之議相徒啟其倖心增其妄想爾故荀子有云擇術之謂也就日錄廣雅云畫類也爾雅云畫形也說文云畫畛也象田畛畔所以畫也釋名云畫掛也以彩色掛象物也陸士衡云丹青之興比雅頌之述作美大業之馨香宣物莫大於言存形莫大於畫六法謝赫云畫有六法一曰氣韻生動二曰骨法用筆三曰應物寫形四曰隨類傅彩五曰經營位置六曰傳模移寫畫品夫畫者成教化助人倫窮神變測幽微與六籍同功四時並運發於天然非由述作古先聖王受命應籙則有龜字效靈龍圖呈寶自巢燧已來皆有此瑞迹映乎瑤鈴事傳乎金冊庖犧氏發於榮河中典籍圖畫萌矣黃軒氏得於溫洛中籀蒼頡狀焉歷代名畫記曹子建云觀畫者見三皇五帝莫不仰戴見三季暴主莫不悲惋見篡臣賊嗣莫不切齒見高節妙士莫不忘食見志節死難莫不抗首見放臣斥子莫不歎息見淫夫妬婦莫不側目見令妃順后莫不嘉貴是知有乎鑒者畫也圖畫之宗世本云史皇作圖黃帝臣也其唐虞之文章夏后之鼎象則圖畫之宗也其後繪事逾精丹青轉妙客有為齊王畫者齊王問曰畫孰最難者曰犬馬難孰易者曰鬼魅最易夫犬馬人所知也旦暮罄於前不可類之故難鬼神無形者不罄於前故易之也韓子漢孝武帝欲以鉤弋趙婕妤少子為嗣命大臣輔之惟霍光任重大可屬社稷乃使黃門畫者畫周公輔成王朝諸侯以賜光圖畫見聞誌元帝後宮既多不得常見乃使畫工圖形案圖召幸之諸宮人皆賂畫工獨王嬙不肯遂不得見匈奴入朝求美人為閼氏於是上案圖以昭君行及去召見貌為後宮第一善應對舉止閑雅帝悔之而名籍已定帝重信於外國故不復更人乃窮案其事畫工皆棄市籍其家資皆巨萬畫工有杜陵毛延壽為人形醜好老少必得其真安陵陳敞新豐劉白龔寬並工為牛馬飛鳥眾勢人形好醜不逮延壽下杜陽望亦善畫尤善布色樊育亦善布色同日棄市京師畫工於是差稀西京成帝遊於後庭欲以班婕妤同輦載婕妤辭曰觀古圖畫聖賢之君皆有名臣在側三代末主乃有嬖倖今欲同輦得無近似之乎上善其言而止太后聞之喜曰古有樊姬今有班婕妤圖畫見聞誌足指畫獸張衡字平子昔建州蒲城縣山有獸名駭神豕身人首狀貌惡百鬼惡之好出水邊石上平子往寫之獸入潭中不出或云此獸畏畫故不出可去紙筆即去之獸果出平子拱手不動替以足指畫獸今號曰巴獸潭歷代名畫記靈帝詔蔡邕畫赤泉侯伍代將相於省兼命為讚及書邕書畫與讚皆擅名於代時稱三美東觀漢記孫暢之述畫邕有講學圖小列女圖傳於代名畫記雲臺北風漢桓帝時人劉褒曾畫雲臺閣一作雲漢圖人見之覺熱又畫北風人見之覺涼官至蜀太守孫暢之述畫博物志蜀南夷其俗徵巫鬼好盟詛投石結草官常以盟記要之諸葛亮乃為夷作圖先畫天地日月君長城府次畫神龍及牛馬駝羊後畫部主吏乘馬張蓋遠行安䘏又畫夷牽牛負酒𠌾金寶詣之以賜夷夷甚重之上楊修字德祖有俊才與陳思王友善善畫有西京圖嚴君平像吳季札像並晉明帝題字傳於代上吳曹不興畫屏風墨落點素因就畫為蠅孫權以為真以手拂之吳興雜錄張彥遠名畫記云或以為楊脩曹弗興嘗於溪中見赤龍夭矯波間因寫以獻孫皓皓賞激珍藏之至宋文帝時累月旱乾祈禱無應於是取弗興龍置水傍應時雨足又陳朝謝赫善畫嘗閱秘閣歎服曹不興所畫龍首以為若見真龍尚書故實鍾會是荀濟北從舅二人情好不恊荀有寶劍可直百萬常在母鍾夫人許會善書學荀手迹作書與母取劍仍竊去不還荀勗知是鍾而無得也思所以報之後鍾兄弟以千萬起一宅始成甚精麗未得移住荀極善畫乃潛往畫鍾門堂作太傅形像衣冠狀貌如平生二鍾入門便大感慟宅遂空廢世說孔氏志怪曰于時咸謂勗之報會遇于所失彼此書畫巧妙之極畫聖抱朴子云衛恊張墨並為畫聖孫鴻之上林苑圖恊蹤最妙嘗畫七佛圖不點眼睛人或疑而有請恊謂七佛與烈女圖偉而有情勢毛詩北風圖巧密於情思而自以所畫為不及謝赫云古畫皆略至此始精六法頗為兼善雖不備該形似而有氣顏陵跨群雄曠代絕筆在第一品曹不興下張黑荀勗上名畫記戴安道就范宣學親范所為范讀書亦讀書范抄書亦抄書唯獨好畫范亦為無用不宜勞思戴乃畫南都賦圖范看畢咨嗟甚以為有益始重畫世說晉王廙字世將善屬詞攻書畫過江後為晉朝書畫第一音律眾妙畢綜元帝時為左衛將軍封武康侯時鎮軍謝尚於武昌樂寺造東塔戴若恩造西塔並請廙畫廙畫為晉明帝師書為右軍法時右軍亦學畫於廙廙畫孔子十弟子贊云余兄子羲之幼而岐嶷必將降余堂構今始年十六學藝之外書畫過目便能就余請書畫法余畫孔子十弟子圖以勵之嗟爾羲之可不勗哉畫乃吾自畫書乃吾自書吾餘事雖不足法而書畫固可法欲汝學書則知積學可以玫遠學畫可以知師弟子行已之道名畫記王獻之善丹青恒溫使畫扇筆誤落因就畫一鳥駁悖牛甚妙晉書子敬又書駁牛賦於扇上此扇義熙中尤在名畫記古來未有顧愷之字長康小字虎頭多才藝尤工丹青傳寫形勢莫不妙絕世說云謝安謂長康曰卿畫自生人以來未有也又云卿畫蒼頡古來未有也顧常悅一女鄰乃畫女於璧當心釘之女患心痛告於長康拔去釘乃愈搜神記云思江陵美女畫像簪之於璧玩之顧虎頭為人畫扇作阮籍嵇康都不點眼睛送還扇主曰點眼睛便能欲語俗說顧云畫人四體妍媸本無關于妙處傳神寫照正在阿堵中世說登樓去梯顧凱之建層棲為畫所疾風暴雨烈暑祁寒並不下筆炎涼皆遇天地明朗時乃染毫登樓去梯妻子罕見畫品宋陸探微善畫事明帝人謂畫有六法探微衛恊得法為備平生多愛圖古聖賢像唐張彥遠謂體運遒舉風力頓挫一點一拂動筆新寄固自不凡矣顧景秀武帝嘗賜何戢蟬雀扇是景秀晝後戢為吳興太守齊高帝求好盡扇戢持獻之陸探微顧寶光見之皆歎其巧絕扇畫蟬雀自景秀始也名畫記顧光寶能畫建康有陸溉患瘧經年光嘗詣溉卧前謂光曰我患此疾久不得療君知否光寶曰不知即伏室命筆以墨圖一獅子令於外戶榜之謂之曰此出手便靈異可虔誠致禱明日當有驗溉命張旭外遣家人焚香拜之已而是夕中夜戶外有騰踏之聲良久乃不聞明日所畫獅子口中臆前有血淋漓及于戶外皆點焉溉病乃愈時人異之八朝窮怪錄謝莊字希逸性多巧思善畫制木方丈圖天下山川土地各有分理離之則州郡殊合之則寓內為一作畫琴帖序自序其畫云名畫記劉瑱字士溫繪弟也文藻篆隸丹青並為當時所稱時有滎陽毛惠遠善畫馬瑱善畫婦人並為當世第一瑱妹為齊鄱陽王妃伉儷甚篤王為齊明帝所誅妃追傷遂成痼疾醫所不療有陳郡殷蒨善寫人面與瑱不別瑱乃令蒨畫王形像併圖王平生所寵姬共照鏡狀如欲偶寢瑱乃密使媼妳示妃妃視畫仍唾之因罵曰故宜其早死於是情遂歇病亦痊除此妃亦被廢苦因即以此畫焚之南史三十九晉元帝初為荊州刺史起州學宣尼廟嘗置儒林參軍一人勸學從事二人生三十人加稟餼帝工書善畫自圖宣尼像為之贊而書之時人為之三絕南史元帝嘗畫聖僧武帝親為作讚任荊州刺史時畫蕃客入朝圖帝極稱善具梁書又畫職貢圖并序外國貢獻之事序本集武烈太子方等偏能寫真坐上賓客隨宜點染即成數人以問童孺皆知姓名矣蕭賁字文和好學有文才能善書尤於扇上圖山水咫尺之內便作萬里為遙矜慎不傳自娛而已南史三十四梁張僧繇吳人也江陵天皇寺明帝置內有柏堂僧繇畫盧合那佛像及仲尼十哲帝怪問釋門內如何畫孔聖僧繇曰後當賴此耳及後周滅佛法焚天下寺塔獨此殿有宣尼像乃不毀拆名畫記潤州興國寺苦鳩鴿棲梁上穢汙尊容張僧繇乃東壁上畫一鷹西壁上畫一鷂背側首向簷外看自是鳩等不敢復來朝野僉載張僧繇于金陵安樂寺畫四龍不點眼睛每云點之即飛去人以為妄誕固請點之因為落筆才及二龍果雷電破壁二龍乘雲騰上天未點睛者見在初吳曹不興圖青溪龍僧繇見而鄙之乃廣其象於龍泉亭其畫留在秘府時未之重至太清中雷振龍泉亭遂失其壁方知神妙名畫記畫龍湖鬭鄞縣大梅山頂有梅木伐為會稽禹廟之梁張僧繇畫龍于其上夜或風雨飛入鑑湖與龍鬭後人見梁上有水淋漓始駭異之以鐵索鎖於柱四明圖經三祖晉宋以來以顧長康陸探微張僧繇為畫家三祖談賓錄像人之美張得其肉陸得其骨顧得其神妙名畫記顧野王字希馮宣城王為揚州刺史野王及琅邢王褒竝為賓客王甚愛其才野王又好丹青善圖寫王於東府起齋乃令野王畫古賢命王褒書贊時人稱為二絕陳書尤工畫草蟲畫妖後魏元兆能行法治病有軍士女為物所憑兆曰此畫妖也天下有至神之妖至靈之怪有在陸之精在水之魅以法治之乃廣化寺壁畫妖魅林登博物志北齊廣寧郡王博涉多才藝常於廳壁畫蒼鷹觀者疑其真鳩雀不敢近名畫記楊子華常畫馬於壁每夜嘗聞蹄齧長鳴如索水草聲圖龍於素卷舒之輒雲氣縈集世祖重之使居禁中天下號為畫聖非有詔不得與外人畫時有三子冲善恭通神號為二絕名畫記李嗣真古畫后品劉殺鬼與楊子華同時世祖俱重之畫鬭雀於壁開帝見之以為生拂之方覺錫賚巨萬名畫記隋展子虔歷北齊周至隋為朝散大夫而所畫臺閣雖一時如董展不得以窺其妙寫江山遠近之勢尤工故咫尺有千里趣繪圖寶鑑董展字伯仁汝南人以才藝稱鄉里號為智海尤長於畫雖無祖述不愧前賢風德名流見者歎伏與展子虔齊名魯作道經變相為時所稱自非書本性情參靈酌妙入華胥之國與化人同遊何以臻此上輕嗣真云董展同品董有展之車馬展亡董之臺閣名畫記唐滕王元嬰善畫蜂蟬燕雀驢子水牛曾見一幅能巧之外曲盡情理名畫錄史博不載惟張彥遠歷代名畫記中書之及覩王建宮詞云內中數日無宣喚傳得滕王蛺蝶圖乃知其善畫也見聞志嗣滕王湛然善畫花鳥蠭蜨官圖繪寶鑑閻立德父毗在隋以丹青得名與弟立本齊名立本嘗寫秦府十八學士凌烟閣功臣等悉皆輝映前古時人咸稱其妙上李嗣真云大安博陵難兄難弟自江右陸謝云亡見朝子卿長逝象人之妙實為中興至如萬國來庭奉塗山之玉帛百蠻朝貢接應門之序位折旋矩規端蘇秦笏之儀魁詭譎怪鼻飲頭飛之俗莫不盡該毫末備行精神談賓錄立本至荊州視張僧繇舊跡曰定虛得名耳明日又往曰猶是近代佳手明日又往曰名下足無虛士坐臥觀之留宿其下十日不能去劉賓客嘉話蘇稷字嗣通畫蹤如閻立本尤善畫花鳥人物雜畫畫鶴知名屏風六扇鶴樣自稷始也名畫記今秘書省有畫鶴時號一絕畫斷秘書省內落星石上有畫鶴賀知章草書郎餘令鳳相傳號為四絕元和中韓公武為校書郎校射中鶴一眼詩人乃謂之五絕南部張孝師為驃騎尉善畫嘗死而後生故畫地獄相為尤工吳道元見之因效為地獄變相圖繪寶鑑唐王右丞維家於藍田玉山遊止輞川兄弟以科名文學冠絕當代故時稱朝廷左相筆天下右丞詩者也其畫山水松石蹤似具生而風標特出今京都十福寺西塔院有掩障一畫楓戊一圖輞川山谷鬱盤雲水飛動意出塵外怪生筆端嘗自題詩云夙世謬詞客前身應畫師慈恩寺東院王維與畢庶子鄭廣文各畫一小壁時號三絕故庾右丞宅有壁圖山水兼題記亦當時之妙也畫斷王維嘗至招國坊庾敬體宅見屋壁有畫奏樂圖維熟視而笑或問其故維曰此霓裳羽衣曲第三疊第一拍好事者集樂工驗之無一差者國史補寧王善畫馬開元後花萼樓壁上有六馬躍塵圖內明皇最眷愛玉面花驄謂無纖悉不備風鬃霧鬣信偉如也後壁間惟有五馬其一失去信知神物持與變化俱也龍城錄韓幹藍田人天寶中召入供奉上令師陳閎畫馬怪其不同詔因詰之奏云臣自有師陛下內廄馬皆臣之師也上甚異之畫斷幹閑居之際忽有一人朱衣玄冠而至幹問曰何得及此對曰我鬼使也聞君善圖良馬願賜一匹幹立畫焚之數日因出有人揖而問之蒙君惠駿足免為山川跋涉之勞亦有以酬效明日友人送素縑百疋不知其來幹收而用之獨異志建中初曾有人牽馬訪醫稱馬患腳以二千求治其馬毛色骨相醫未嘗見笑曰君馬酷似韓幹所畫者真馬者固無也因請馬主遶市門一匝馬醫隨之忽值韓幹幹亦驚曰真是吾設色者乃知隨意所匠必冥會所肖也遂摩手馬若蹶因損前足幹心異之至舍視其所畫馬本腳有一點點鈌方知妙通靈矣馬醫所獲錢用歷數主乃成沈錢酉陽維俎玄宗好大馬御廄至四十萬遂有沛艾大馬命王毛仲為監故使燕公張說作曯牧頌時主好藝韓君間生遂命悉圖其駿則有玉花驄照夜白等時岐薛王賜第廄中皆有善馬幹並圖之遂為古今獨步祿山之亂沛洼馬種遂絕名畫記嘉祐中有使江南者渡采石牛渚磯風大作不可渡於是禱中元水府祠是夕夢神告留馬當相濟既寤乃獻所藏韓幹馬已而風止乃渡米芾畫史張萱周昉皆工士女韓幹畫馬戴嵩工牛或問曰何以但舉韓幹而不言曹霸止引戴嵩而弗稱韓滉答曰韓師曹將軍戴法韓晉公但舉其弟可知其師也至如韋鑒暨猶子鶠皆善畫馬但取其尤著者明之難即遍舉也世俗見馬即命為曹韓韋見牛即命為韓滉戴嵩甚可笑諺云牛即戴嵩馬即韓幹鶴則杜荀象即章得也吳道子開元中將軍裴旻居喪詣吳道子請於東都天宮寺畫神鬼數壁以資冥助道子答曰吾畫筆久廢若將軍有意為吾纏結舞劍一回以因猛勵以通幽冥旻於是脫去纕服若常時裝束走馬如飛左旋右轉揮劍入雲高數十丈若電光下射旻引手執鞘承之劍透室而入觀者數千人無不驚慄道子於是援毫圖壁颯然風起為天下之壯觀道子平生繪事得意無出於此見聞志其畫在寺之西廡又張旭長史亦書一壁都邑士庶皆云一日之中獲覩三絕明皇雜錄吳道子凡圖圓光皆不用尺度規畫一筆而成有尹老云吳道子畫興善寺中門內圖圓光時長安市肆老幼士庶俱至觀者如堵其圓光三筆揮掃勢甚風旋人皆謂之神助畫錄吳道子畫內殿五龍其鱗飛動每天欲雨即生烟霧名畫要錄吳道子訪僧請茶僧不加禮遂精筆硯于壁上畫驢一頭而去一夜僧房家具並踏破被惱亂不可堪僧知是道子邈邀到院祈求乃塗却畫處盧氏雜說吳道子畫景雲寺地獄變相寺僧云吳生畫北寺時京都人來觀感懼罪修福田兩寺屠沽魚肉不集朱景雲畫斷三階院西中三門裏南吳生畫龍及刷天王鬚筆跡如鐵有執爐天女竊眸欲語寺塔記道玄傳神寫照如欲笑語開元記凈城寺西廊萬菩薩院門裏南壁有皇甫軫畫鬼神及鵰鵰若脫壁軫與吳道子同時吳以其藝過已募人刺殺之見聞志明皇天寶中忽思蜀道嘉陵江水遂假吳生驛駟令往寫貌及回日帝問其狀奏曰臣無粉本並比在心遺于大同殿圖之嘉陵江三百餘里山水一日而畢時有李思訓將軍山水擅名亦畫大同殿壁累月方畢明皇云李思訓數月之工吳道子一日之跡皆極其妙也明日雜錄畫斷玄宗召李思訓畫大同殿壁兼掩障異日因奏對詔云卿所畫掩障夜聞水聲通神之佳手也畫斷鄭虔善畫山水淡墨樹柀老硬黃筌山水有法虔者好書嘗自寫其詩并獻於明皇明皇書其尾曰鄭虔三絕繪圖寶鑑天寶中有尚書郎張璪性善繪畫多出意象之表松石尤奇東宮庶子畢宏亦以韻度擅名一時然每見璪翰墨未嘗不心服因問璪筆法所授璪曰吾外師造化中得心源宏驚歎而已寓簡貌獅韋無蠶玄宗朝以畫馬異獸擅名時稱韋畫四足無不妙也曾見貌外國所獻獅子酷似其真後獅子放歸本國唯畫者在圖時因觀覽百獸見之皆懼畫斷李林甫思訓弟思誨子也亦善丹青高詹事與林甫詩曰中興唯白雲身外即丹青其畫迹甚佳山水小類李中舍名畫記李思訓子昭道變父之劫玅又過之官至太子中舍創海圖之妙世上言山水者稱大李將軍小李將軍昭道雖不至將軍俗因其父呼之上張孝師為驃騎尉善畫嘗死而後生故畫地寫馬神采曹霸高貴鄉公髦之後髦之筆迹獨高魏代天寶末詔寫御馬及功臣相筆墨沉著神采生動張志和號煙波子常漁釣於洞庭湖顏魯公於吳興知其節以漁砍五首贈之張乃為卷軸乃隨句賦象人物舟船烟波風月鳥獸皆依其文寫之曲盡其妙為世之雅律名畫要錄顧況字逋翁文詞之暇兼攻小筆嘗求知新亭監人或詰之謂曰余要寫貌海中山耳仍辟畫者王默為副尚書故實王默早年授筆法於鄭廣文處平生大有奇事顧著作知新亭監時默請為海中都巡問其意云要見海中山水耳為職半年解去爾後落筆有奇趣名畫周昉善屬文窮丹青之妙郭汾陽婿趙縱侍郎嘗令韓幹寫真眾稱其善後復請昉寫之二者皆有能名汾陽嘗以二畫張於坐側未能定其優劣一日趙夫人歸寧汾陽問曰此畫誰也云趙郎也復曰何者最似云二畫皆似後盡者為隹蓋前畫者空得趙郎狀貌後畫者兼得趙郎情性笑言之姿爾後畫者乃昉也汾陽嘉曰今日乃決二子之勝負於是令送錦綵數百疋以酧之見聞志田家水牛韓滉字太沖公退之暇留意丹青書師張顛畫師陸探微能圖田家風俗人物水牛曲盡其妙議者謂驢牛雖山前之畜狀最難圖也惟晉公於此工之能絕其妙畫錄戴嵩初韓滉鎮浙西命為巡官師滉畫皆不及獨於牛能畫野性過滉遠甚至於田家川原亦各臻妙弟嶧亦以盡牛得名善作奔逸之狀嵩善盡水牛畫飲水之牛則水中見影畫牧牽牛則牛瞳中有牧影拾遺有藏戴崧牛鬥與客觀旁有一牧童曰牛鬥力在前尾在兩股間今尾棹何也馬正惠嘗得鬥水牛一軸云厲歸真畫甚愛之一日展曝於書室雙扉之外有輸租莊實適立於砌下疑玩久之既而竊哂公見而詰之莊實曰某非知畫者但識真牛其鬥也尾夾於髀間雖壯夫旅力不可少開此畫牛尾舉起所以笑其失真見聞志張南本畫佛像鬼神甚工猶善畫火中和年嘗於成都金華寺大殿畫八明王有一僧遊禮至寺整衣升殿壁間見所畫火劫熖逼人驚怛幾仆時孫位於盡水得名世之論盡水火之妙者獨推此二字蓋水幾於道而應於神非筆端深造理窟未易形容也唐常州太平寺中有一徐處士友能作清濟貫河一筆紆繞尋其端末長四十丈不斷却立而觀濤瀾河湧目為之昡仰首近之凜然若飛流之濺於面而覺有寒色也時楊公觀而讚矣賞之不已畫鑒宋戚文秀工畫水畫清濟灌河圖一筆長五丈自邊際起通貫於波浪之間與眾寡不失次序超騰回摺圖繪寶鑒張詢南海人不第後流寓長安以畫自適後至蜀中因假館於昭慶寺為僧夢休作早午晚三景圖於壁間率取吳中山水氣象用以落筆焉謂之三時山僖宗幸蜀見之歡賞彌日蓋早晚二景人皆能為之而午景為難狀也其後王蜀主欲遷于所居與棟相連移之則損於是遂止荊浩河內人自號洪谷子博雅好古以山水專門頗得趨向善為雲中山頂四面峻厚自撰山水訣一卷嘗語人曰吳道子畫山水有筆而無墨項容有墨而無筆吾當采二子所長成一家之體故關仝北面事之世論荊浩山水為唐末之冠蓋有筆無墨者見落筆蹊徑而少自然有墨無筆者去斧鑿痕而多變態邊鸞京兆人攻丹青最長於花鳥折枝之妙古所未有窮羽毛之變態奮春華之芳麗貞元中新羅國獻孔雀解舞德宗召於玄武門寫貌一正一背翠彩生動金鈿遺妍若運清聲宛應繁節畫斷劉商郎中愛畫松石時畢宏官至庶子亦善畫松樹水石時人云劉郎中松樹孤標畢庶子松根絕妙名畫畫出象外王宰者家於西蜀貞元中韋皋以客禮待之畫山水樹石出於象外於興善寺畫四時屏風若移造化風候雲物八節四時於一座之內妙之至也上鄭谷有雪詩云亂飄僧舍茶烟濕密灑歌樓酒力微江上晚來堪畫處漁人披得一蓑歸時人多傳誦之叚贊善善畫因採其詩意景物圖寫之曲盡瀟灑之思持以贈谷谷珍領之復為詩寄謝見聞志畫鷂止棲江南道士厲歸貞善畫牛虎兼工鷙禽雀竹綽有奇思嘗遊洪州信果觀有三官殿夾紵塑像是玄宗時所作體製妙絕嘗被雀鴿糞穢其上歸貞畫一鷂於壁間筆跡奇絕自此雀鴿無復棲止玉堂閑話李夫人西蜀名家善屬文尤工書畫郭崇韜伐蜀得之夫人以崇韜武弁常鬱悒不樂月夕獨坐南軒竹影婆娑可喜即起揮毫濡墨模寓窗紙上明日視之生意具足或云自是人間往往效之遂有墨竹龍德中何尊師喜戲弄筆墨工作花石尤以畫猫專門凡猫寢覺行坐聚戲散走伺鼠捕禽澤吻摩牙無不曲盡其態度嘗謂猫與虎獨有眼大耳黃不相同云南唐梅行再思善畫人物牛馬最工於鷄以此得名世號曰梅家鷄為鬭鷄尤精其赴敵之狀昂然而來竦然而待磔毛怒目莫不如生至於飲啄閑暇雌雄相將眾雛散漫呼食助叫態度有餘曲盡赤幘之妙又梅行思江南人工畫鬭鷄至於瓜起項引廻環相擊宛有角勝之勢畫評陳康肅家籠鷄一軸號為神絕見聞志梁于兢善畫牡丹幼年從學因覩學舍前檻中牡丹盛開乃命筆倣之不浹旬奪真矣後遂酷思無倦動必增有人贈詩曰看時人步澀展處蝶爭來見聞志重鑒別梁劉彥齊善畫竹為時所稱世族豪石重鑒別其所藏名迹不啻不卷每暑伏曬曝一一親自卷舒終日不倦能自品藻無非精當故當時識者皆謂唐朝吳道子手梁朝劉彥齊眼也上黃筌字要叔善畫花竹翎毛兼工佛道人物山川龍水全該六法遠過三師孟蜀後主廣政甲辰歲淮南通聘信幣中有生鶴數隻蜀主命筌寫鶴於偏殿之壁警露者啄苔者理毛者整羽者唳天者翹足者精彩態體更愈於生往往生鶴立于畫側蜀主歎賞遂目為六鶴殿焉先是蜀人未曾得見生鶴皆傳薛少保畫鶴為奇筌寫此鶴之後貴族豪家竟將厚禮請畫鶴圖少保自此聲漸臧矣時諺云黃筌畫鶴蘇稷臧價益州畫錄八卦殿廣政癸丑歲新搆八卦殿藻井之上輪排八卦故以號焉命筌與其子于四壁畫四時花竹兔雉鳥雀其年冬御斯殿有五坊節級羅師進呈雄武軍先進者白鷹其鷹見壁上所畫野雉離韝奮舉再三臂者不能制遂縱之直入殿搏之絕賞良久曰昔聞其事令見其人遽令所進呈者引退無至搦損茲壁召其學士歐陽炯作八卦殿畫壁記仍付史館以表能事又寫白兔於縑素蜀主常懸坐側見聞志益州畫錄畫評趙元長字慮善仕孟蜀國破赴闕配文思院為匠人常備禁中之役畫馴雉於御座會五坊人按鷹有離韝欲舉者上命縱之出入殿宇以搏畫雉上驚賞久之畫評昔吳道子畫鍾馗衣藍衫鞹一足眇一目腰笏巾首而蓬髮以左手捉鬼以右手抉其鬼目筆迹遒勁實繪事之絕格也有得之以獻蜀主者蜀主甚愛重之常掛臥內一日召黃筌令觀之筌一見稱其絕手蜀主因為筌曰此鍾馗若用拇指搯其目則愈見有力試為我改之筌遂請歸私室數日看之不足乃別張絹素畫一鍾馗以拇指搯其鬼目翊日并吳本一時獻上蜀主問曰向止令卿改胡為別畫筌曰吳道子所畫鍾馗一身之力氣色眼貌俱在第二指不在拇指以故不敢輒改也臣今所畫雖不迨古人然一身之力併在拇指是敢別畫耳蜀主嗟賞之仍以錦帛鋈器旌其別識見聞志每年杪冬末旬翰林工畫鬼神者例進鍾馗焉丙辰歲忠義進鍾馗以第二指挑鬼眼睛蒲師訓進鍾馗以拇指剜鬼睛二人鍾馗相似惟一指不同蜀主問此畫孰為優劣筌以師訓為優蜀主曰師訓力在拇指忠義力在第二指二人筆力相敵難議昇降並厚賜金帛益州畫錄孟蜀有一術士稱善畫蜀主遂令於庭之東隅畫野鵲一隻俄有眾禽集而噪之次令黃筌於庭之西隅畫野鵲一隻則無有集禽之噪蜀王以故問筌對曰臣所畫者藝畫也彼所畫者術畫也是乃有噪禽之異蜀主然之宋初有道士陸希直者每畫花一枝張於壁間則遊蜂立至向使邊黃徐趙輩措筆定無來蜂之驗此抑非眩惑取功沽名亂藝者乎至於野人騰壁美女下牆禁五彩於水中起雙龍於霧外皆出方術怪誕推之畫法闕如也故不錄見聞志王耕善畫而牡丹最嘉春張於庭廡間則蜂蝶萃至本業文因畫所掩竟不成事葆光頭足兩展黃筌飛鴈頭足皆展不知飛鳥縮頭則展足縮足則展頭無兩展者仇池筆記王元俊精於圖畫嘗畫一扇於齋中壁上客至遂誤取之吳越備史甲寅歲春末蜀主或夜夢一人破帽故襴龐眉大目方頤廣顙立於殿階跂一足曰請修理之言訖寢覺翌日因檢他籍見此古畫是前夕所夢者神故絹穿損畫之左足遂命蒲師訓令驗此畫是誰之筆師訓對云唐吳道玄之筆曾應明皇夢云痁者神也因令重修此足呈進後蜀王復夢前神謝曰吾足履矣上慮為祟即命焚之益州畫錄董羽字仲翔善畫魚龍海水其洶湧瀾翻咫尺汗漫莫知其涯涘也圖繪寶鑑得山神氣董源事南唐善畫山水樹石幽潤峰巒清深得山之神氣上李成字咸熙唐宗室世業儒寓興於畫師關仝兄烟雲變滅水石幽間樹木蕭森山川險易莫不曲盡其妙議者謂得山之體貌為古今第一上五代婦人童氏江南人工道釋人物當時縉紳家婦女往往求寫照焉有文士題童氏畫詩云林下材華雖可尚筆端人物清且妍如何不出深閨裡能以丹青寫外邊又所畫六隱圖記范蠡至張志和等六人乘舟而隱居者山水樹石人物如豆許甚可愛畫鑒雲烟過眼云不知六隱故實為何事見宣和畫譜蘇子瞻作墨竹從也一直起至頂米芾問何不逐節分曰竹生時何嘗逐節生運思清拔出於文同與可作成林竹甚精子瞻作枯木枝幹虬屈無端石皴硬亦怪怪奇奇無端如其胸中盤鬱也畫史集古名手李公麟字伯時號龍眠居士博覽法書名畫故悟古人用筆意作書有晉宋風格繪事集顧陸張吳及前世名手所善以為已有專為一家論者謂鞍馬愈幹佛像追吳道玄山水似李思訓人物似韓滉瀟灑似王維當為宋畫中第一照映前古者也寶鑑互見馬部程堂字公明善畫墨竹好畫墨尾竹又登峨嵋山見菩薩竹有結花於節外之枝者茸密如裘即寫其形於中峰乾明寺僧堂壁間儼如生也又象耳山有翠竹紫竹風竹雨竹好事者已刻之石畫繼宗宗室婦曹氏善丹青所畫皆非優柔軟媚取悅兒女子者真若有得於游覽見江湖山川間勝概以集於筆端耳嘗畫桃溪圖蓼岸圖極妙有品題者云詠雪才華稱獨秀回紋機杼更誰如如何鸞鳳鴛鴦手畫得桃溪蓼岸圖由此益顯其名宣和畫譜吳郡顧士端出身湘東國侍郎後為鎮南府刑獄參軍有子曰庭西朝中書舍人父子並有琴書之藝尢妙丹青常被元帝所使每懷羞恨彭城劉岳橐之子也仕為驃騎府管記平氏縣令才學快士而畫絕倫後隨武陵王入蜀下牢之敗遂為陸游軍畫支江寺壁與諸工巧雜處向使三賢直運素業豈見此耻乎顏氏家訓太宗嘗與侍臣學士泛舟於春苑池中有異鳥隨波容與太宗擊賞數四詔座者為詠召閻立本令寫焉時閣外傳呼云畫師立奉時已為主爵郎中奔走流汗俛伏池側手揮丹粉瞻望座賓不勝媿赧退誡其子曰吾少好讀書幸免面牆緣情染翰頗及儕流唯以丹青見知躬厮役之務辱莫大焉汝宜深誡勿習此末技唐書金軸見剔王播居永寧里蓄法書名畫以金玉為畫軸鑿垣貯之重復固秘及被誅為人破垣剔取金玊而棄書畫於道中且王播元載之禍書畫與胡椒無異長輿元凱之病錢僻與傳僻何殊名雖不同其惑一也李義安金石錄序容齋隨筆無此二句昔蕭繹江陵陷沒不惜國亡而毀裂書畫楊廣江都傾滅不悲身死而復取圖書豈人性之所嗜生死不能忘之矣上自昔屠龍氏沒龍不復擾所謂上飛于天晦隔層雲下歸於泉深入無底人不可得而見也畫龍惟五代四明僧傳古大師其名最著畫龍者析出三停分成九似窮游泳蜿蜒之妙得回蟠升降之宜仍要騣鬛肘毛筆畫壯快直自肉中生出為佳也凡畫龍開口者易為巧合口者難為功畫家稱開目猫與合口龍言其兩難也見聞志三代已前人皆跣足三代已後始服木屐伊尹以草為之名曰屨秦世參用絲革靴本胡服趙靈王好之制有司衣袍者宜穿皂靴唐代宗朝令宮人侍左右穿紅錦皂靴凡在經營所宜詳辨又如閻立本畫王昭君妃虜戴帷帽以據鞍王知慎畫卞武南郊有衣冠而跨馬殊不知帷帽創從隋代軒車廢自唐朝吳道害畫仲由戴木劍不知木劍創於晉代亦丹青之病耳上且觀代開有古今圖畫者多矣如張僧繇畫群公祖二踈而兵士有着芒屩者閻立本畫昭君入匈奴而婦人有着帷帽者夫芒屩出於水鄉非京華所有帷帽創于隋代非漢宮所作議者豈可徵此二畫以為故實者乎舊唐書劉子玄太子什議俗有圍棋或言是兵法之類上者張置疏遠多得道而為勝中者務相遮絕要以爭便求利下者守邊趍作罫白生於小邦猶薛公之言黥布反也上計取吳楚廣道者也中計取成皋遮要爭利者也下計據長沙以臨楚此守邊趍作罫者也更始帝將相不能防衛而令罫中死棊皆生桓譚新論北方之人謂棋為奕局必方正象地則也道必正直神明德也棋有白黑陰陽分也駢羅布列效天文也班固棋局縱橫各十七道合二百八十九道白黑棋子各一百五十枚邯鄲淳藝經九品夫圍棋之品有九一曰入神二曰坐照三曰具體四曰通幽五曰用知六曰小巧七曰鬥力八曰若愚九曰守拙九品之外今不復云張擬一不得貪勝二入界宜緩三攻彼顧我四棄子爭先五捨小就大六逢危須棄七慎勿輕速八動須相應九彼強自保十勢孤取和劉仲甫視君如棋衛獻公將入國甯喜許之太叔文子聞之曰甯子視君不如奕棋何以免乎奕者舉棋不定不勝其偶而况置君而不定乎必不免矣九世之卿族一舉而滅之可哀也哉次年衛殺甯喜左襄二十五杜陵杜夫子善奕棋為天下第一人或譏其費日夫子曰精其理者足以大裨聖教西京雜記后帝延熙七年魏曹爽寇漢中帝遣費禕禦之將行光祿大夫來敏詣禕別求計圍棋時羽檄交至人馬環甲嚴駕已訖禕與對戲了無倦色敏曰聊以試君耳君信可人必能辦賊禕至敵遂退無益孫權太子和常言當世士人宜請修術校習射御以周世務而但交游博奕以妨事業非進取之謂也後群寮侍宴言及博奕以為妨事費日而無益於用勞精損思而終無所成非所以進德修業積累功緒者也且志士愛日惜力君子慕其大者高山景行恥非其次夫人情猶不能無嬉娛嬉娛之好亦在於飲宴琴書射御之間何必博奕然後為歡乃命侍坐者八人各著論以矯之於是中庶子韋曜退而論奏和以示賓客時察頴好奕真事在置者頗學焉故以此論之吳志棋聖嚴武字子卿衛尉畯再從子也圍棋莫與為輩吳錄善圍棋者世謂之棋聖故嚴子卿馬綏明有棋聖之名也抱朴手談王中郎以圍棋是坐隱支公以圍棋為手談世說王以圍棋為手談故其在哀制中祥後客來即用方幅為會戲語林中興之冠江霦善交為中興之冠徐廣晉紀王恬字敬豫與濟陽江霦俱善交棋為中興第一晉中興書江霦與王恢等棋第一品道第五品范汪綦品陳留阮蘭字弘茂為開卦令縣側有劫賊外白甚急數蘭方圍棋長嘯吏云劫急簡曰局上有劫亦甚急陳留志奕其投江陶侃為荊州見州佐史愽交具投之于江曰圍棋堯舜以教愚子愽殷紂所造諸君並國器何以此為將吏則加鞭朴曰樗蒲者牧猪奴戲耳王導嘗共其子悅圍棋道導曰與汝有瓜葛得爾耶世說江僕射霦年少王導呼與共棊王手嘗不如兩道許而欲敵導戲試以觀之江不即下王曰君何不行曰恐不得耳傍有客曰此年少戲乃不惡王徐舉手曰此年少非惟圖棊見勝上殷仲堪在都嘗往看棋諸從在瓦棺寺前宅上子時袁羗與人共在窗下圍棋仲堪在裏問袁易義袁應答如流圍棋不輟袁意傲然殊有餘地殷撰辭致難每有往復俗說祖納逖兄也好奕棋王隱謂之曰禹惜寸陰不聞奕棋納曰聊以忘憂耳隱曰古人遭時則以功達其道不遇則以言達其才裁成國史俱取散愁何必圍棋必然後亡憂也祖逖傳王隱傳裴遐綽子也嘗在東平將軍周馥坐與人圍棊馥司馬行酒遐未即飲司馬醉怒曳遐墮地曳徐起還坐顏色不變復棊如故其性虛和如此晉書惟許圍棊參軍于瓚陳節戲事曰夫嬉戲非為治之本自令摴蒲擲馬諸不急戲宜一斷之翼曰今惟許其棋餘悉斷庾翼集空如龍鳳晉羅什與人棊拾敵死于空處如龍鳳形信安邵石室中晉時樵者王質伐木入山見二童子棋與一物如棗亥食之不覺飢以所持斧置坐而觀童子指謂之曰汝斧柯爛矣質歸鄉閭無復時人述異記昔有人駕牛採樵入蒙秦山見二老人奕棋其人係牛坐斧而觀局未終老人謂曰非汝久留之所樵人起而斧柯已爛牛己枯矣黎州圖經何承天素好奕棋頗用廢事又善彈箏文帝賜以局子及銀榮箏承天表謝上答曰局子之賜何必非張正之金耶南史羊玄保為黃門侍郎善奕棊品第三宋文帝亦好奕與賭郡玄保戲勝以補宣城太守常中使至玄保曰今日上何召我耶其子戎曰金溝清泚銅池搖颺既佳風景當得劇棊上宋大明時瑯琊王喜善棋第一品吳郡禇思莊會稽夏赤松第二品赤松思速善于大行思莊思遲巧于鬥棋宋文帝世羊玄保為會稽帝遣思莊入東宮與玄保戲因置局圖還于帝前覆之蕭道成使思莊與王杭交賭自食時至日暮一局始竟上倦遣還省至五更方決杭睡于局後思莊達旦不寐時或云思莊所以品第致高緣其用思深久人不能對也永明中敕杭品棋竟陵王子良使蕭惠基掌其事惠基善隸書及奕棋南齊書宋明帝好圍棋棋甚拙去格七八直物議共欺以為第三品與第一品王杭圍棋依品賭戲杭饒借帝曰皇帝飛棋臣杭不能斷帝終不覺以為信然好之愈篤虞愿曰堯以此教丹朱非人主所宜好也南史宋明帝好圍棋賭州邑以建安王休仁為圍棋州都大中正王湛與太子右衛率沈勃尚書水部郎庾珪之彭城丞王杭四人為小中正朝請禇思莊傅楚之為清定訪問上齊高帝性寬嘗與直閣將軍周覆給事中禇思莊累局不倦覆乃抑上手不許易行其弘厚如此上齊武陵王畢嘗於武帝前與竟陵王子良圍棋子良大北及退豫章文獻王謂畢曰汝與司徒手談故當小相推讓答曰畢立身以來未嘗一口妄語初畢少時無棋局乃破荻為片縱橫以為棋局指點形勢遂至名品上崔慰祖字悅宗為始安王遙光記室遙光好棋數召慰祖對戲慰祖輒辭拙非朔望不見也南齊書梁武帝好奕棋使柳渾品定棋譜登格者二百七十八人第其優劣為棋品三卷渾為第二焉帝謂周捨曰吾聞君子不可求備至于柳渾可謂具美分其才藝足了十人南史二十八梁到溉為侍中與武帝棋達旦或復失寢加以低睡帝嘲曰狀若喪家狗又似懸風槌高祖時有范甯兒者善圍棋曾與李彪使梁蕭頤頤令江南上品王杭與甯兒制勝而還魏書到溉奕棋入第六品與朱异韋黯於御座校棋比勢覆局不差一道陸雲公大同未受武帝詔校定棋品到溉朱异以下並集雲公瓊年八歲於客前覆局由是都下號曰神童异言之武帝召見風神警亮進退詳審帝甚異之南史古弼入奏事遇世祖與給事中劉樹棋志不聽事弼侍坐良久不獲申聞乃起于世祖前捽樹頭掣下床以手搏其耳以拳擊其背曰朝廷不治實爾之罪世祖失容放碁曰不聽奏事實在朕躬樹何罪置之弼奏事訖曰為大臣而逞志於君前者非無也乃許公車自劾請罪世祖曰吾聞築社之役蹇而築之端冕而事之神與之福然則卿有何罪魏書甄琛字思伯舉秀才入都積歲頗以奕棋棄日至乃通宵不止手下蒼頭常令秉燭或時睡頓大加其秋如此非一奴後不勝楚痛乃白琛曰郎君辭父母仕宦京師若為讀書執燭奴不敢辭罪乃以圍棋日夜不息豈是向京之意而賜加杖罰不亦非理琛惕慚感遂從許獻李彪假書研習聞見益優上北齊楊子華善畫于子冲善棊通神號為二絕名畫夏日明星與親王棊令賀懷智獨奏琵琶妃子立於局前觀之上欲輸次妃子將康國猧子放之令於局上亂其輸贏上甚悅焉天寶遺事楊妃外傳一行本不解棋因會燕公宅觀王積薪茶一局遂與之敵笑謂燕公曰此但爭先耳若念貧道四句承除語則人人為國手酉陽語資翰林碁者王積薪從明皇西幸寓宿深溪之家但有婦姑止給水火纔暝闔戶積薪夜聞姑謂婦曰良宵無以為適與子手談可乎堂內無燭婦姑各在東西室對談已而姑曰子已此矣吾止勝九枰耳遲明至具禮請問出局盡平生之好布子未及數十姑謂婦曰是子可教以常勢因指示攻守殺奪救應防拒之法其意甚略曰此已無敵人間矣謝而別回顧失向之室矣異叢談記自是積薪之藝絕無其倫即布所記婦姑對敵之勢罄竭心力較其九秤之勝終不得也因名鄧艾開蜀勢至今棋圍有焉而世人終莫得而解矣集異記開元二十五年使鴻臚少卿邢璹為新羅弔冊使將進發上謂璹曰新羅號君子之國頗知書記卿到可闡揚經典使大國儒教之盛又聞其人多善奕棋因令善棋人率府兵曹楊季鸞為璹之副璹等至彼大為番人所敬其國棋者皆在季鸞之下於是厚賂璹等金寶及藥物等舊唐韋延祐圍棋與李士秀敵手秀惜其名不肯先寧輸延祐籌終繞兩路延祐本應明經舉道過大梁其護戎知其善棋表進之遂因言江淮足棋人就中奕棋明經者多解嘉話錄圍棋工者近有韋延祐楊芃首出國史補肅宗在彭原廨舍隘狹帝與張良娣博打子聲聞於外李泌言帝乃潛令刻乾樹子不欲有聲良娣以是怨泌入侍東宮順宗為太子王叔文以善棋得侍東宮李訥僕射性卞急酷尚奕棋每下子安詳極于寬緩往躁怒作家人輩則密以奕具陳于前訥覩便忻然改容以取其子布弄都忘其怒矣南部新書令狐相擬李遠為杭州宣宗曰李遠云長日惟消一局棋豈可臨郡相曰詩人之言非有實也幽通鼓吹日本國王子入貢善奕宣宗令待詔顧師言與之對王子不勝問曰此第幾手答曰第三手王子歎曰小國之一不及大國之三王子出本國楸玊棋局冷煖玊棋子蓋玉之蒼者如楸玉色其冷煖者冬煖夏冷北夢瑣言唐咸通中翰林待詔滑能棋品最高有張生者年可四十請對局初饒一路滑生精思久之方下一子張隨手應之或起行庭際候滑生更下又隨應之及黃寇犯闕僖宗幸蜀滑將赴行在欲取金州路入張曰不必前適某非棋客天帝命我取公棋耳滑驚愕妻子啜泣奄然而逝上唐僖宗自普王即位幼而多能素不曉棋一日夢人以棋經三卷焚而使吞之及覺命待詔觀棋凡所指畫皆出人意補錄紀傳偽為不勝李道古便佞巧宦常以酒肴棋博游公卿門角賭之際偽為不勝而厚償之故得一時虛名而嗜利者悉與之狎續世說亂局石晉陳保性極鄙吝每與人奕棋敗輒手亂其局懼所賭金錢不欲償也及卒家無妻兒惟有白金十鋌為他人所有上韓偓姚洎俱為翰林學士從照宗幸岐偓每與兩使勑令棋兩使不勝洎即以手壞之偓呼為白鸚鵡若洎不在兩使將輸必大呼曰白鸚鵡洎應聲至蜀簡州刺史安重霸瀆貨無厭州民有油客者姓鄧能棋其家亦贍重霸召對敵只令立侍每落一子俾其退立于西北牖下候我算路乃始進之終日不下十數子而已鄧生倦立且饑殆不可堪次日又召或有諷鄧生曰此侯好賂本不為棋何不獻賂而自求退乃獻中金三錠獲免北夢瑣言後主初嗣位數與嬖倖奕棋蕭儼入見作色投局于地後主大駭詰之曰汝欲效魏徵耶儼曰臣非魏徵則陛下亦非太宗矣後主為罷奕陸南唐書宜春王從謙李璟之第九子好學善為詩璟於苑中與宰相奕棋從謙在焉令賦觀棋詩曰竹林二君子盡日意沉吟相對雖無語爭先各有心恃強知易失守分固難侵若算機籌處滄溟想未深潘慎修善奕棋太宗屢召對奕因作棋說以獻大抵謂棋之道在乎恬然而安舍為急仁則能全義則能守禮則能變知則能兼信則能克君子知斯五者庶幾可以言棋矣因舉十義以明其要宋史葉濤好奕棋王介甫作詩切責之終不肯已奕者多廢事不以貴賤嗜之率皆失業故人目棋秤為木野狐言媚惑人如狐也元懷挹掌錄魏時浮陽高光宗善樗蒲趙國季幼序洛陽邱何奴並工握槊此蓋胡戲近入中國云胡王有弟一人遇罪將殺之弟從獄中為此戲以上之意言孤則易死也世宗以後大盛於時魏書握槊胡中戲即今雙陸也續事始陳思王製雙陸局置骰子二骰合作投投擲之義今作骰非聲譜爾朱世隆曾與吏部尚書元世雋握槊忽聞局上詨然有聲一局子盡倒立世隆甚惡之北史齊武成時恒令和士開與胡太后握槊又出入臥內遂與太后為亂上則天時南海郡獻集翠裘珍麗異常張昌宗侍側則天因以賜之遂命披裘供奉雙陸宰相狄仁傑時入奏事則天令畀座因命梁公與昌宗雙陸梁公拜恩就局則天曰卿二人賭何物梁公對曰爭先三籌賭昌宗所衣毛裘則天謂曰卿以何物為對梁公指所衣紫絁袍曰臣以此敵則天笑曰卿未知此裘價逾千金卿之所指為不等矣梁公起曰臣此袍乃大臣朝見奏對之衣昌宗所衣乃嬖倖寵遇之服對臣之嫩臣猶怏怏則天業已處分遂依其說而昌宗心赧神沮氣勢索莫累局連北梁公對御就禠其裘拜恩而出及至光範門遂付眾奴衣之乃促馬而去集異記雙陸不勝武后問石泉公王方慶曰朕夜夢雙陸不勝何也曰蓋謂宮中無子意者恐有神靈儆夫陛下因陳人心在唐之意后大悟召廬陵王復其儲位俾石泉公為宮相以輔翊之李繁大唐說纂后問狄仁傑曰朕昨夜夢與人雙陸頻不見勝何也對曰雙陸輸者蓋謂宮中無子此是上天之意假此以示陛下安可久虛儲位哉李邕狄梁公傳后欲以武三思為太子以問宰相仁傑曰非廬陵莫可后怒恨議久之召謂曰朕數夢雙陸不勝何也於是仁傑與王方慶俱在二人同辭對曰雙陸不勝無子之兆蓋其意者以儆陛下也唐書此一事也而所傳各異新史詎合而一之謂之信史得乎中宗在房州時常謂韋后曰一朝見天日誓不相禁忌及得志受上官昭容邪說引武三思入宮中升御床與后雙陸帝為點籌以為歡笑醜聲日聞于外舊唐后與三思升御床博戲帝從旁點籌不為忤新家語曰君子不博為其兼行惡道故也論語云博奕猶賢古為大博則六著小博則二焭今無曉者比世所行一焭十二棋數術淺短不足可翫穆天子傳天子北入邴與井公博三日而決則博非雙陸也舊云雙陸新曰博戲混而一之何耶自投子以飾四朱者因明皇與貴妃采戰將北唯重四可轉敗為勝上擲而連呼叱之宛轉良久而成重四上大悅命高力士賜四緋也潘氏紀聞樗蒲老子入胡日作樗蒲焉博物志頃聞諸君有樗蒲過差者初為是政事閑暇以娛意耳故未有言也今知大相聚集漸以成俗聞之能不憮然庾翼集劉裕初名微位薄輕狡無行盛流皆不與相知惟王謐獨奇貴之裕嘗與刁逵樗蒲不時輸直逵縛之馬上謐責逵而代償由是裕憾逵而德謐桓玄之敗謐為公而逵亡族成帝好蹴踘群臣以蹴踘為勞體非至尊所宜帝曰朕好之可擇似而不勞者奏之劉向作彈棋以獻帝大悅賜青羔裘紫絲履服以朝覲西京雜記彈碁者仙家之戲也昔漢武帝平西域得胡人善蹴踘者蓋玄其便捷跳躍帝好而為之群臣不能諫侍臣東方朔因以此藝進之帝就舍蹴踘而上彈碁焉彈碁經序傅玄彈碁賦序亦以為劉向為武帝作彈碁始自魏文帝宮內裝器戲也文帝於此伎特妙用手巾拂之無不中者有客自云能帝使為客着之葛巾拂棋妙逾於帝世說唐順宗在春宮日甚好之時有吉達高釴崔同楊同愿之徒悉為名役有竇深崔長孺甄偶獨孤邃亦為亞焉至於長慶之末好事之家猶見有局尚多解者彈棊經後序彈碁亦近世雅戲消愁釋潰時可為之顏氏家訓為藏彄之高辛氏以為鉤弋夫人所起周處成公綏並作彄字藝經庾閑則作鉤字其事同也俗云此戲令人生離有禁忌之家廢不修也荊楚歲時記晉海西公時有貴人會因藏鉤欻有一手間在眾臂之中修骨巨指毛色麤黑舉座咸驚尋為桓大司馬所誅舊傳藏彄令人生離斯驗深矣異苑矯懈正心投壺者所以矯懈而正心也晉傅玄投壺賦序投壺之禮主人奉矢司射奉中使人執壺主人請曰某有枉矢哨壺請以樂賓賓曰子有旨酒嘉肴某既賜矣又重以樂敢辭主人曰枉矢哨壺不足辭也敢固以請賓曰敢不敬從中雋晉侯以齊侯宴中行穆子相投壺晉侯先穆子曰有酒如淮有肉如坻寡人中此為諸侯師中之齊侯舉矢曰有酒如澠有肉如陵寡人中此與君代興亦中之伯瑕謂中行穆子曰子失辭吾固師諸侯矣壺何為焉其中雋也齊君弱吾君歸弗來矣昭十二武帝時郭舍人善投壺以竹為矢不用棘也古之投壺取中而不求還故實小豆於中惡其矢躍而出也郭舍人則激矢令還一矢百餘反謂之為驍言如博之堅棋於輩中為驍傑也每為武帝投壺輒賜金帛西京雜記隔屏石崇有妓善投壺隔屏風投之晉書梟不絕王胡之善於投壺言手熟閉目晉陽秋齊竟陵王常宿晏明旦將朝見柳惲投壺梟不絕停舉久之進見逐晚齊武帝遲之王以實對武帝復使為之賜絹二十匹南史投壺之禮近世愈精古者實以小豆為其矢之躍也今則唯欲其驍益多益喜乃有倚竿帶劍狼壺豹尾龍首之名其尤妙者有蓮花驍汝南周璝弘正之子會稽賀徽賀革之子並能一箭四十餘驍賀又嘗為小障置壺其外隔障投之無所失也至鄴以來亦見廣寧蘭陵諸王有此校具舉國遂無投得一驍者家訓薛不惑者善投壺龍躍隼飛矯無遺箭置壺於背后却反以投之百發百中僉載翼星主南宮之羽儀文物聲名之所豈茂為樂庫為天倡先王以賓於四門而列天庭之衛王俳偕近太微而為尊元命包孫叔敖病甚臨卒將無棺槨令其子曰優孟會許千金貸吾孟楚之樂長與相君相善雖言千金實不負也卒後數年莊王置酒以為樂優孟乃言孫君相楚之功即慷慨商歌曰貪吏不可為而可為廉吏可為而不可為貪吏而不可為者當時有汙名而可為者子孫有以家成廉吏而可為者當時有清名不可為者其后躬祖而負薪貪吏常苦富廉吏賞苦貧獨不見楚相孫叔敖廉潔不受錢涕泣數行王心感動覺悟問孟孟具列對即求其子封於潘國潘即固始也漢延熹中立碑史記云優孟為叔敖衣冠抵掌談語歲餘像孫叔敖楚王左右不能別也莊王置酒優孟前為壽莊王大驚以為孫叔敖復生也欲以為相優孟曰請歸與婦計之三日為相莊王許之三日後優孟復來王曰婦言謂何孟言婦言慎無為楚相不足為也如孫叔敖為楚相持廉至死方今妻子窮困負薪而食不足為也於是楚莊王封其子於寢邱言優孟則可謂莊王以為叔敖復生也欲以為相殊未可憑又葬馬云齊趙陪位於前韓魏翼衛於後楚莊時安得有趙韓魏也又云孟後二百餘年秦有優旃莊王至始皇止二百年耶趙襄子飲酒五日五夜不廢酒謂侍者曰我誠邦士也夫飲酒五日五夜矣而殊不病優莫曰君勉之不及紂二日耳紂七日七夜今君五日襄子懼謂優莫曰然則將亡乎優莫曰不亡襄子曰不及紂二日耳不亡何待優莫曰桀紂之亡也遇湯武令天下盡傑也而君紂也桀紂並世焉能相亡然亦殆矣新序優旃者秦倡侏儒也善為笑言然合於大道秦二世立又欲漆其城優旃曰善主上雖無言臣固將請之漆城雖於百姓愁費然隹哉漆城蕩蕩寇來不能上即欲就之易為漆耳顧難為蔭室於是二世笑之以其故止史記苻堅嘗如鄴狩于西山旬餘樂而忘返伶人王洛叩馬諫曰臣聞千金之子坐不垂堂萬乘之主行不屐危故文帝馳車袁公止轡孝武好畋相如獻規坒下為百姓父母蒼生所係何可盤于游畋以玷聖德若禍起湏臾變在不測其如宗廟何甚如太后何堅曰吾過也自是遂不復獵載記北齊石動筩嘗於國學中看愽士論孔子弟子達者七十二人幾人已著冠幾人未著者冠博士曰經傳無文動筩曰先生讀書豈合不解孔子弟子已著冠有三十人未著冠有四十三人愽士曰據何文以知之曰論語云冠者五六人五六三十人也童子六七人六七四十二人也豈非七十二人坐中皆大笑博士無以應之啟顏錄侍中宋璟疾負罪而妄訴不已者悉付御史臺治之謂中丞李謹度曰服不更訴者出之尚訴未已者且係由是人多怨者會天旱有魃優人皆魃狀戲於上前問魃何為出對曰奉相公處分又問何故曰負冤者三百餘人相公悉以係獄抑之故魃不得不出明皇心以為然又璟使御史蕭隱之充使括江淮惡錢隱之嚴急擾煩怨嗟盈路上於是貶隱之官罷璟為開府儀同三司通鑑安祿山之叛也玄宗播遷於蜀有䧟在賊中者多為祿山所脅從而黃幡綽同在其數亦得出入左右及收復幡綽被拘至行在上憐其敏捷釋之有於上前曰黃綽幡在賊中與大逆圓夢皆順其情而忘陛下積年之恩祿山夢見衣袖長忽至階下綽曰當垂衣而治之祿山夢見殿中槅子倒綽曰革故從新推之皆此類也綽曰臣實不知大駕塵蒙赴蜀既䧟在賊中寧不苟悅其心以脫一時之命今日得再見天顏若與大逆圓夢必知其不可也上曰何以知之對曰逆賊夢衣袖長是出手不得也夢槅子倒者是胡不得也以此臣故先知之上大笑而止明皇十七事僖宗頗工眾藝於音律愽蹴踘鬥雞自以為能于步打嘗謂優人石野猪曰朕若作步打進士舉湏為狀元野猪對曰若遇堯舜作禮部侍郎恐陛下不免落第北夢瑣言續世說作若應擊毬進士舉唐昭宗時財用窘乏李茂貞令榷油以助軍需俄有司言官油沽賣不行多為諸門放入松明攙奪乞行禁止蓋民間然松明為燈故也優人張堥範曰此事大好更有一例便可并月明禁之茂貞大笑松明之禁遂止易齊笑林洛中記異作李茂貞時安轡新王延彬獨據建州稱偽號一旦大設為伶官作戲辭云只聞有泗州和尚不見有五縣天子南部新書石頭擦倒仁宗時賞花釣魚宴賦詩往往宿製天聖中永興軍進山水石因命賦山水石歌出於不意多荒惡者中坐優人入戲各執紙筆若吟詠狀一人忽仆於石上曰數日來作賞花釣魚詩准備應制却被這石頭倒明日降出詩令中書銓定內鄙惡者與外任東齋遺事遼令官羅衣輕滑稽通變多所規諷興宗於大弟重元狎昵宴酣許以千秋萬歲後傳位重元甚喜驕縱不法又因變陸賭以居民城吧帝屢不競前後已償數城重元既恃梁孝王之寵又多鄭叔叚之過朝臣無敢言者道路以目一日侵愽羅衣輕指其局曰雙陸好癡和你都輸去也上始悟不復戲遼史伶官傳蔡京作宰弟卞為元樞卞乃王安石婿尊崇婦翁當孔廟釋茵時祭於配享而封舒王人設孔子正坐顏孟於安石侍側孔子令之坐安石揖孟子㞐上孟辭曰天下達導爵居其一軻近蒙公爵望公貴為真王何必謙光如此遂揖顏曰回也陋巷匹夫平無生毫分事業公為各世儒位貌有間辭之過矣安石遂處其上夫子不能安席亦避位安石惶懼拱手云不敢往復末央子路外入憤憤不能堪經趍從祝堂挽公冶長臂而出公治為宭迫之狀謝曰長何罪乃貴數之曰汝全不救護丈人看取別人家女婿其意以譏卞也時方議欲升安石於孟子之右為此而止夷堅志紹興壬戍省試秦檜之子熺姪昌時昌齡皆奏名公議籍籍而無敢輙語至乙丑春首優者即戲塲設為士子赴南宮相與推輪知舉官為誰指侍從某尚書某侍郎當主文柄優長者非之曰今年必差彭越問者曰朝廷之上不聞有此官員曰漢梁王也曰彼是古人死已千年如何來得曰前舉是楚王韓信越一等人所以知今為彭王問者雖言其妄且扣厥指笑曰若不是韓信如何取得他三秦四坐不敢領略一關而出秦亦不敢明行讉罰云三勝環秦檜以紹興十五年四月丙子朔賜第望僊橋丁丑賜銀絹萬匹兩錢千萬綵千縑有詔就第賜燕假以教坊優伶宰執咸與中席優長誦致語退有參軍者前褒檜功德一伶以荷葉交倚從之詼語雜至賓歡既洽參軍方拱揖謝將就倚忽墬其幞頭乃總髮為髻如行伍之巾後有大巾鐶為雙晶宜勝伶指而問曰此何鐶曰二勝鐶遽补擊其首曰爾但坐太師交倚請取銀絹例物此鐶掉腦後可也一坐失色檜怒明日下令於獄有死者於是語禁始蓋繁苪燁令袊等吻禍蓋其末流焉桯史彌遠彌堅史彌遠用事選人改官多出其門制閫大宴有優為衣冠者數輩皆稱為孔門弟子相與言吾儕皆選人遂各言其姓曰吾為常從事吾為於從政吾為吾將仕吾為路文學別有二人出曰吾宰予也夫子曰於予與改可謂僥倖其一曰吾顏回也夫子曰回也不改吾為四科之首而不改汝何為獨改曰吾鎖故改汝何不鑽回曰吾非不鑽而鑽彌堅耳曰汝之不改宜也何不鑽彌遠乎韓平原在慶元初其弟仰冑為知閣門事頗與密護時人謂之大小韓求捷徑者爭趨之一日內燕優人有為衣冠到選者自敘履歷材藝應得美官而留滯銓曹自春徂冬未有所擬方徘徊浩歎又為日者弊帽持扇過其旁遂邀使談庚申問以得祿之期日者厲聲曰君命甚高但於五星局中財帛宮若有所礙目下若欲亨達先見小寒更望成事必見大寒可也僈蓋以寒為韓侍燕者皆縮頭匿笑程史金章宗蒲察皇后沒世中宮久虛宮人李師兒性慧黠大蒙愛幸欲立以為后金朝故事其娶后尚主皆諸部部長之家而李氏微甚其大臣固執不從臺諫以為言章宗不得已進封為元妃而勢位熏赫與皇后侔其兄弟皆握顯近勢傾朝廷四方射利競進之徒爭趣其門一日章宗宴宮中優人玳瑁頭者戲於前或問上曰有何符瑞優曰汝不聞鳳凰見乎其人曰知之而未聞其詳優曰其飛有四所應亦異若向上飛則風兩順時向下飛則五谷豊登向外飛則四國來朝向裏飛則加進祿上大笑而罷金史妃傳宋瑞平間真德秀應召而起百姓仰之若元祐之𠇗涑水也繼參大政未及有所建置而卒魏了翁帥師亦未及有所經略而罷臨安優人裝一生儒手持一鶴別一生儒與之邂逅問其姓名曰姓鍾名庸問所持何物曰大鶴也因傾蓋歡然呼酒對飲其人大嚼洪吸酒肉靡有孑遺忽顛仆子地群數人曳之不動一人乃批其頰大罵曰說甚中庸大學喫了許多酒食一動也不動遂一笑而罷鶴林玉露嘉泰末年平原公恃有扶日之功凡事自作威福政事皆不由內出會內宴伶人王公瑾曰今日政如客人賣傘不由裏面後寧宗恭淑后上仙而曹氏為婕妤平原特以為親屬偶值真里富國進馴象至平原語公瑾曰不聞有真里富國公瑾曰如今有假楊國忠平原雖憾之而罪加焉白獺髓天中記卷四十一
