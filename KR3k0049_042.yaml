body:
  text: 禮本於太一夫禮必本於太一分而為天地轉而為陰陽變而為四時列而為鬼神禮運承天治人孔子曰夫禮先王以承天之道以治人之情故失之者死得之者生詩曰相鼠有體人而無禮人而無禮胡不遄死是故夫禮必本於天殽於地列於鬼神達於喪祭射御冠昏朝聘故聖人以禮示之故天下國家可得而正也上禮者君之大柄也所以別嫌明微儐鬼神考制度別仁義所以治政安君也上決嫌疑夫禮者所以定親踈決嫌疑別同異明是非也道德仁義非禮不成教訓正俗非禮不備分爭辨訟非禮不決君臣上下父子兄弟非禮不定宦學事師非禮不親班朝治軍涖官行法非禮威嚴不行禱祀祭祀供給鬼神非禮不誠不莊是以君子恭敬樽節退讓以明禮曲禮故禮義也者人之大端也所以講信修眭而固人肌膚之會筋骸之束也所以養生送死事鬼神之大端也所以達天道順人情之大竇也故唯聖人為知禮之不可以巳也故壞國喪家亡人必先去其禮故禮之於人也猶酒之有蘖也君子以厚小人以薄禮運故朝覲之禮所以明君臣之義也聘問之禮所以使諸侯相尊敬也喪祭之禮所以明臣子之恩也鄉飲酒之禮所以明長幼之序也婚姻之禮所以明男女之別也夫禮禁亂之所由生猶防止水之所自來也故以舊坊為無所用而壞之者必有水敗以舊禮為無所用而去之者必有亂患故禮之教化也微其止邪也於未形使人日徙善遠罪而不自知也是以先王隆之也經解有本有文禮器是故大備大備盛德也禮釋回增美質措則正施則行其在人也如竹箭之有筠也如松柏之有心也二者居天下之大端也先王之立禮也有本有文忠信禮之本也義理禮之文也無本不立無文不行禮器哀公問於孔子曰大禮何如君子之言禮何其尊也孔子曰吾聞之民之所由生禮為大非禮無以節事天地之神也非禮無以辨君臣上下長幼之位也非禮無以別男女父子兄弟之親婚姻疏數之交也君子以此之為尊敬然哀公問子張子貢言游侍縱言至於禮子貢曰敢問何如子曰敬而不中禮謂之野恭而不中禮謂之給勇而不中禮謂之逆子貢曰敢問將何以謂此中者也子曰禮乎禮夫禮所以制中和言游曰敢問禮也者領惡而全好者與子曰然仲尼燕居夫禮者所以章疑別微以為民坊者也故貴賤有等衣服有別朝廷有位則民有所讓坊記禮之動搖也與天地同氣四時合信陰陽為符日月為明上下和洽則物獸如其性命禮稽命徵設容禮者所以設容明天地之體也春秋說題辭治之粉澤太公對文王曰禮者治之粉澤也六韜緣情禮者因人之情緣義之理為之節文者也管子禮從俗政從上使從君國有貴賤之體無賢不肖之禮有長幼之禮無勇怯之禮有親踈之禮無愛惡之禮也慎子人生有欲欲則求求則爭爭則亂亂則窮先王惡其亂也故制禮義以養之禮者養也稻粱五味所以養口也椒蘭芬芳所以養鼻也雕琢刻鏤黼黻文章所以養目也疏房越席床第几筵所以養體也荀子禮有三本天地者生之本也先祖者類之本也君師者治之本也貴本之為文親用之為理兩者合而成文以歸太一夫是之謂大隆上禮者人道之極也然而不法禮不足禮謂之無方之民法禮足禮謂之有方之士上國之幹天王使召武公內史過賜晉侯命受至惰過歸告王曰晉侯其無後乎王賜之命而過於受瑞先自棄也已其何繼之有禮國之幹也敬禮之輿也不敬則禮不行禮不行則上下昏何以長世左僖十一禮順天道齊侯侵我西鄙遂伐曹入其郛討其來朝也季文子曰齊侯其不免乎吾則無禮而討於有禮者曰女何故行禮禮以順天天之道也已則反天而又以討人難以免矣在周頌曰畏天之威于時保之不畏于天將何能保以亂取國奉禮以守猶懼不終多行無禮弗能在矣左文十五晉侯使郤錡來乞師將事不敬孟獻子曰郤氏其亡乎禮身之幹也敬身之墓也郤子無墓且先君之嗣卿也受命以求師將社稷是衛而惰棄君命也不亡何為成十二政之輿曹武伯來朝會於商任齊侯衛侯不敬叔向曰二君者必不免會朝禮之經也禮政之輿也政身之守也怠禮失政失政不立是以亂也襄二十一公至自楚孟僖子病不能相禮乃講學之茍能禮者從之及其將死也召其大夫曰禮人之幹也無禮無以立吾聞將有達者曰孔丘聖人之後也我若獲沒必屬說南容與何忌仲孫於夫子使事之而學禮焉以定其位昭七鄭子太叔見趙簡子簡子問揖讓周旋之禮焉對曰是儀也非禮也簡子曰敢問何謂禮對曰吉也聞諸先大夫子産曰夫禮天之經也地之義也民之行也天地之經而民實則之簡子曰甚哉禮之大也對曰禮上下之紀天地之經緯也民之所以生也是以先王尚之故人之能自曲直以赴禮者謂之成人大不亦宜乎上二十五齊景公曰善哉吾今而後知禮之可以為國也對曰禮之可以為國也久矣與天地並君令臣恭父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令臣不違臣忠而不二父慈而教子孝而針兄愛而友弟敬而順夫和而義妻柔而正姑慈而從婦聽而婉禮之善物也二十六嘉事不體邾隱公來朝子貢觀焉邾子執玉高其容仰公受玉卑其容俯子貢曰以禮觀之二君者皆有死亡焉夫禮死生存亡之體也將左右周旋進退俯仰於是乎取之朝祀喪戎於是乎觀之今正月相朝而皆不度心已亡矣嘉事不體何以能久高仰驕也卑俯替也驕近亂替近疾君為主其先亡乎定十五齊景公登射晏子修禮而待公曰選射之禮寡人厭之矣吾欲得天下勇士與之圖國晏子對曰君子無禮是庶人也庶人無禮是禽獸也夫禮者所以御民也轡者所以御馬也無禮而能治國家者嬰未之聞也景公曰善乃飭射更席以為上客終日問禮說苑晏子聘魯下堂則趣授玉則跪子貢怪之問孔子孔子問晏子晏子對曰夫上堂之禮君行一臣行二也今君之授幣也卑臣敢不跪乎孔子曰善禮中又有禮焉韓詩外傳景公縱酒醉而解衣冠鼓琴以自樂顧左右曰仁人亦樂此乎左右曰仁人耳目猶人何為不樂乎景公曰駕車以迎晏子晏子聞之朝服而至景公曰今者寡人此樂願與大夫同之晏子曰君言過矣自齊國五尺已上力皆能勝嬰與君所以不敢者畏禮也故自天子無禮則無以守社稷諸侯無禮則無以守其國為人上無禮則無以使其下為人下無禮則無以事其上大夫無禮則無以治其家兄弟無禮則不同居人而無禮不若遄死景公色愧離席而謝曰寡人不仁無良左右淫湎寡人以至於此請殺左右以補其過晏子曰左右無過君好禮則有禮者至無禮者去君惡禮則無禮者至有禮者去左右何罪乎景公曰善哉乃更衣而坐觴酒三行晏子辭景公拜送上孔子過宋與弟子習禮於大樹下宋司馬桓魋使拔其樹去適鄭典略漢興撥亂反正日不暇給猶命叔孫通制禮儀以正君臣之位高祖說而歎曰吾乃今日知為天子之貴也以通為奉常遂定儀法前志通與弟子百餘人為綿蕞野外習之本傳宣帝時諫議大夫王吉上疏願與大臣延及儒生述舊禮明王制驅一代之人躋之仁壽之域漢書曹褒上疏具陳禮樂之本制改之意詔班固問改定禮制之宜固曰宜廣招集議得失帝曰諺言作舍道邊三年不成會禮之家名為聚訟帝令黃門持班固所上叔孫通漢儀十二篇敕褒曰此制散略多不合經宜依禮條正使可施行褒乃撰次天子至庶人冠婚吉凶制度以為一世大典帝以衆論難一故但納之後漢理者天所為也文者人所為也人所為謂之禮禮者因人情以為節文以救其亂夫隄者水之防也禮者人之防也刑防其末禮防其本也董生書夫禮者陰陽之際也百事之會也所以尊天地賓鬼神序上下之道也白虎通禮者履也律也義同而名異五禮者吉凶賓軍嘉也物理論禮者緣人情而為節度者也嚴父愛親之情也尊親敬長之義也袁淮正書順時施宜王者必因前王之禮而順時施宜有所損益節人之心稍稍制作漢書張六星星明則王者行五禮得天之中翼二十度星天之樂府俳倡星明大禮樂興晉志凡治人之道莫急於禮禮有五經莫重於祭夫祭者非物自外至者也自中出生於心者也心怵而奉之以禮是故惟賢者能盡祭之義祭統周傳曰祭之為言察也察者至也至者人事也人事至然後祭祭者薦也薦之為言在也在也者在其道也尚書蔡傳祭不欲數數則煩煩則不敬祭不欲疏疏則怠怠則忘祭義說命曰黷于祭祀時為弗欽凡祭祀之義有二一曰報功二曰修先報功以勉力修先以崇恩也論衡古者尊祭重神祭宗廟追養也祭天地報德也楊泉物理論宮室不設不可以祭祭者薦其時也薦其敬也薦其義也非享味也穀傳春祭曰祠夏祭曰杓秋祭曰嘗冬祭曰蒸祭天曰燔柴祭地曰瘞薶祭山曰縣祭川曰浮沈祭星曰布祭風曰傑是禷是禡師祭也既伯既儔馬祭也禘大祭也繹又祭也周曰繹商曰肜夏曰復胙爾雅除惡之祭為祓會福之祭曰襝告事永福曰禱道上之祭為禓潔意以享為禋以類祭神為禷祭司命為䃾祭豕先為䄚月祭為祽說文古者歲四祭因四時所生熟而祭先祖父母也春曰祠祠者以正月始食韭也夏曰禴禴者以四月煮糜餅也秋曰嘗嘗者以七月嘗黍稷也冬曰蒸蒸者以十月進初稻也春秋繁露天子祭天地祭四方祭山川祭五祀歲遍諸侯方祀祭山川祭五祀歲遍大夫祭五祀歲遍士祭其先凡祭有舉之莫敢舉也有其舉之莫敢廢也非其所祭而祭之名曰淫祀淫祀無福支子不祭祭必告於宗子凡祭宗廟之禮牛曰一元大武豕曰剛鬣豚曰腯肥羊曰柔毛雞曰翰音犬曰羹獻雉曰踈趾兔曰明視脯曰尹祭修脆曰商祭鮮魚曰脡祭水曰清滌酒曰清酌黍曰薌合粱曰薌箕稷曰明黍稻曰嘉蔬韭曰豐本鹽曰鹹醝玊曰嘉玉幣曰量幣曲禮國之大節海鳥曰爰居臧文仲使國人祭展禽曰越哉臧孫之為政也夫祀國之大節也而節政之所成也故慎制祀以為國典今無故而加典非政之宜也夫聖王之制祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能扞大患則祀之非是否也不在祀典凡禘郊宗祖報此五者國之典祀也加之以社稷山川之神皆有功烈於民者也及前哲令德之人所以為明質也及天之三辰民所以瞻仰也及地之五行所以生殖也氏九州名山川澤所以出財用也非是不在祀典國語聖王之法追祭天地日月星辰山川萬物皆古之人也能紀天地五行氣奉其功以成人者也故其奉祀皆以人事之禮食之所食也非祭食與土地金木水火石也又祭三皇五帝九皇六十四氏皆古帝王凡八十一姓漢舊儀國典屈到嗜芰有疾召其宗老而屬之曰祭我必以芰及祥宗老將薦芰屈建命去之宗老曰夫子屬之子木曰不然其祭典有之曰國君有牛享大夫有羊饋士有豚犬之奠庶人有魚炙之薦不羞珍異不陳庶侈夫子不以其私欲干國之典遂不用楚語子期祀平王祭以牛爼於王王問於觀射父曰祀牲何及對曰祀加于舉天子舉以太牢祀以會諸侯舉以特牛祀以太牢卿舉以少牢祀以特牛大夫舉以特牲祀以少牢士食魚炙祀以特牲庶人食菜祀以魚上下有序民則不慢王曰其小大何如對曰郊禘不過璽栗蒸嘗不過把握王曰何其小也對曰夫神以精明臨民者也故求備物不求豐大是以先王之祀也以一純二精三牲四時五色六律七事八種九祭十日十二辰以致之百姓千品萬官億醜兆民經入畡數以奉之明德以昭之和聲以昭之以告遍至則無不受休王曰祀不可以已乎對曰祀所以昭孝息民撫國家定百姓也不可以已天子遍祀群神品物諸侯祀天地三辰及其土之山川卿大夫祀其禮士庶人不過其祖上所以教民處也下所以昭事上也天子親春禘郊之盛王后親繅其服自公以下至於庶人其誰敢不齊肅恭敬致力于神民所以攝固者也若之何其舍之也上祭祀招禍昔楚靈王驕逸輕下簡賢務鬼信巫祝之道齊戒潔鮮以祀上帝禮群神躬執羽紱起舞壇前吳人來攻其國人告急而靈王鼓舞自若顧應之曰寡人方祭上帝樂明神當蒙福祐焉不敢赴救而吳兵遂至俘獲其太子及后姬以下甚可傷桓子新論夫差師諸群臣出國東祠子胥江水濱諸臣並在夫差乃言曰寡人蒙先王之遺恩為千乘之主昔不聽相國之言乃用讒佞之辭至令相國處投江海自亡以來濛濛惑惑如霧蔽日莫誰與言泣下沾襟悲不自勝左右群僚莫不傷悲吳越春秋越王既往平吳春祀三江秋祀五湖因以其時為之立祠垂之來世傳之萬載鄰邦樂德皆來取之越絶魯公索氏將祭而亡其牲孔子聞之曰公索氏不及二年將亡後一年而亡門人問曰昔公索氏亡其祭牲而夫子曰不及二年必亡今過期而亡夫子何以知其然孔子曰夫祭者孝子所以自盡於其親將祭而亡其牲則其餘所亡者多矣若此而不亡者未之有也家語將祭叱富齊有貧者命其狗為富命其子為樂方將祭入於室叱之曰富出祝曰不祥家果有禍長子死守之曰樂乎而不自悲也尸子高祖微時聞魏公子賢及即位每過大梁常祀公子高祖十二年從擊黥布還為公子置守冢歲四時奉祀公子矣漢書張子房從高帝過濟北果得穀城山下黃石取而寶祠之及留侯死并葬黃石每上冢伏臘祠黃石上初朱邑且死囑其子曰我故為桐鄉嗇夫其吏民愛我必葬桐鄉後世子孫奉嘗我不如桐鄉民及死其子葬之桐鄉西郭外民果共立祠歲時祠祭至今不絶郊祀志鄉里為榮桓談字君山沛人章帝元和中行巡狩至沛令使者祠談冢鄉里以為榮東觀漢記永平中詔京兆右扶風以中牢祠蕭何霍光出郡錢穀給蕭何子孫在三百里內悉令侍祠上元和一年春帝東巡狩還過魯幸闕里以太牢祀孔子及七十弟子作八代之樂大會孔子男子二十以上者六十人孔叢子元始四年詔書祀百辟卿士有益於民者蜀郡以文翁九江以召父應詔書歲時郡二千石率官屬行禮奉祠信臣家在南陽亦為立祠漢書諸葛亮初亡所在各求為立廟朝議以禮秩不聽百姓遂因時節私祭之於道陌上言事者或以為可聽立廟於成都者後主不從冒險向充等共上表曰臣聞周人懷召伯之德耳棠為之不伐越王思范蟊之功鑄金以存其像況亮德範遐邇勳蓋季世而蒸嘗止於私門廟像闕而莫立使百姓巷祭戎夷野祀非所以存德念功述追在昔者也宜因近其墓立之於陽使所親屬以時賜祭於是始從之襄陽記羊玄保自少至老謹於祭奠四時珍新未得祠薦者口不妄嘗宋書張沖永明八年為假節監青冀二州行刺史事沖父初卒遺命曰祭我必以卿土所産無用牲物沖在鎮西府時還吳國取果菜每至嘗蒸輒流涕薦焉齊書胡叟少孤言及父母則淚下若孺子之號墩煌范潛家善釀酒每節送一壺與叟何其恆也潛曰我恆給祭者以其恆於孝思也論者以潛為君子矣後魏酌水祭海王義方初為太子校書魏徵張亮皆厚禮之亮誅坐與交遊貶授儋州吉安丞行至南海舟人將以酒酺致祭義方曰黍稷非馨義在明德乃酌水而祭唐書太壇太折祭天曰燔迆祭地曰瘞埋爾雅圓丘太壇祭天方澤太折祭地廣雅五祀南郊北郊西郊東郊中兆正謀五者天子公侯伯子男卿大夫士所以承天也禮含文嘉祭帝於郊所以定天位也祀社於國所以列地利也禮運今尚書夏侯歐陽說類祭天名也以事類祭之奈何天位在南方就南郊祀之是也五經異義王者所以祭天地何王者父事天母事地故以子道事之也祭日以丁與辛何丁者反覆自丁寧辛者當自尅辛也五經通義成帝初即位丞相御史大夫相談奏言帝王之事莫大於承天之序承天之序莫重於郊祀故聖王盡心極慮以建其制祭天於南郊就陽之義瘞地於此郊則陰之象也因其所都而各饗焉昔者周文武郊於酆鄗成王郊于雒邑由此觀之天隨王者所居而饗之可見也耳泉泰畤河東后土之祠宜可徒置長安漢書畫瞑丹陽方儲聰明善天文為洛陽令章帝欲出南郊儲上言當有疾風暴雨乘與不可以出上疑其妄儲飲而死果有大風暴雨洛陽晝瞑後書靈帝建寧二年迎氣黃郊道於洛水西橋逢暴風雨尊從鹵薄車或發蓋百官霑濡還不至郊使有司行禮迎氣北郊上漢制天地以下群臣所祭凡千五百四十新益為萬五千四十漢法三歲一祭天為雲陽宮甘泉壇以冬至日祭天天神下三歲一祭地於河東汾陰后土宮以夏至日祭地地神出五帝祭於雍五時漢舊儀祭地河東汾陰后土宮宮曲入河古之祭地澤中方澤也禮儀如祭天名曰汾葵一曰葵癸也上晉太始二年詔群臣儀五帝即天也天氣時異故殊其號雖名有五其實一神明堂南郊宜除五帝之坐五郊改五精之號皆同稱昊天上帝各設一坐而已禮志晉太始二年十一月有司又議古者社郊不異宜并圓丘方丘於南北郊更修治壇兆其二至之祠合於二郊帝又從之如宣帝所用王肅議也是月庚寅冬至帝親祀圓丘於天自是後圓丘方澤不別立宋志合祭古者祭天於圓丘在國之南祭地於澤中之方丘在國之北所以順陰陽因高下而事天地以其類也其方位既別而其燎壇瘞坎樂舞變數亦皆不同而後世有合祭之文則天萬歲元年親饗南郊始合祭天地睿宗即位有事於南郊實録議曰三輔故事祭於圓丘上帝后土位皆南面則漢嘗合祭矣禇無量郭山惲等皆以曾言為然是時睿宗將祭地於北郊故曾之議寢貴德廣孝祭宗廟所以禘祫何尊人君貴功德廣孝道位尊德盛所及彌遠白虎通祫禘三年一祫五年一禘以衣服想見其容色三日齊思親志意相見所好意喜然後入廟禮稽命曜合食王者諸侯所以三年一祫五年一禘何三年一閏天道小備故三年一祫祫者皆取未遷廟主合食太祖廟中五歲再閏天道大備故五歲一禘禘者諦也取已遷廟主食合太祖廟中五經通義古春秋左氏說古者先王日祭於祖考月薦於曾高時享及二桃歲禱於壇及郊宗萬室五經異義劉歆曰春秋傳曰日祭月祀時望歲貢終王祖禰則日祭曾高則月祀二祧則時享壇壝則歲貢大禘則終王彌遠彌尊故禘為重矣漢書今春秋公羊說祀宗廟筮而不卜傳曰禘祫不卜五經異義建武二十六日詔問張純禘祫之禮純奏三年一祫五年一禘禘昭穆尊卑之義以夏四月陽氣在上陰氣在下故正尊卑之義祫以冬十月五穀成熟故骨肉合聚飲食續漢書祭祀志凡禘祫大祭則神主悉出廟堂為昭穆以安坐不復停室也宋禮志王儉議按禮記王制天子先祫後時祭諸侯先時祭後祫春秋魯禧二年祫明年春禘自此以後五年再殷齊禮志元和中太常上言按禮祭不欲數太廟禘祫祭禮重於時饗與禘祫同月即其月但行禘祫祭不行時饗蓋不欲煩是禮先重者今時饗重於朔望薦食稽求禮情參酌輕重請每時至及臘但行饗禮其月朔望薦食請停如告廟日與朔望薦食日同請先行告禮然後薦食唐書舜典曰禋于六宗鄭注曰六宗謂星辰司中司命風雨師也萬物非天不生非地不載非春不動非夏不長非秋不收非冬不藏故書曰禋於六宗此之謂也尚書大傳古尚書說六宗者天地屬神之尊者謂天宗三地宗三天宗日月北辰也地宗岱山河海也日月為陰陽宗北辰為星宗岱為山宗河為水宗海為澤宗也祀天則天文從祀地則地理從也五經異義乾坤六子明帝問王肅六宗竟幾對曰坎為水離為火震為雷巽為風艮為山兌為澤此乾坤六子也魏書社土地之主也土地闊不可盡敬故封土為社以報功也稷五谷之長也穀衆不可遍祭故立稷神以祭之孝經緯社者五土之神也稷者百穀之神也天子為天下之人立社曰太社壇方五丈諸侯為境內之民立社曰國社地之勢有禮生物各隨所宜九州之人各居其土食其利者各報祭之籍田之後則告五穀既登又報功也國以民為本人以食為天故建國君民先命立社地廣穀多不可偏祭故立國城之內立壇祭之親之也日用甲尊之也唯天子祭天地諸侯祭社稷而已禮外傳厲烈山氏之有天下也其子曰柱能植百穀夏之衰也周棄繼之故祀以為稷神共工氏之霸九州也其子曰勾龍為后土能平九州故祀為社禮孔子曰古之平水土及播植百穀者衆矣然唯勾龍兼食於社而棄為稷歷代奉之無敢易者明不可與等也家語禹勞天下死而為社周棄作穡死而為稷淮南示尊封土立社示有所尊稷五穀之長故封稷而祭之稷者得陰陽中和之氣而為用又多故為長也歲再祭之白虎通王者自親祭社稷何社者土地之神也土生萬物天下之所主也尊重之故自祭也上邴原避地遼東多虎原之邑落獨無虎患嘗行而得遺錢拾遺繫樹枝此錢既不見取而繫錢者愈多原問其故答者謂之神樹原惡其由已而成淫祀乃辨之於是里中遂斂其錢以為社供里老為之誦曰邴君行仁落邑無虎邴君行廉路樹成社別傳庾邈與女子郭凝過請社約不二心俱不婚聘經二年凝忽暴亡邈出見凝云前北村還遇強梁抽刀見逼懼死從之不能守節為社神所責心痛而絶人鬼異路因下泣沾襟也述異記晉元帝建武元年又依洛京立二社一稷其太社之祝曰地德普施惠存無彊乃建太社保佑萬邦悠悠四海咸賴嘉祥其社之祝曰坤德厚載王畿是保乃建帝社以神地道明祀惟辰景福來造禮左宗廟右社稷歷代尊之故洛京社稷在廟之右而江左又然也宋書禮志升為大祀天寶中升社稷五星為大祀詔曰祭之為典以陳主敬名或不正是將奪倫况社稷孚祐百代蒙其福日月照臨五星叶其紀兆庶允殖下土式瞻既超言象之外須極尊嚴之禮列為中祀頗紊大猷自今已後社稷及日月五星並升為大祀仍以四時致祭唐書仲春上戊祭太社以后土氏配焉祭大稷以后稷氏配焉六典誡社王者諸侯必有誡社何示存亡也明為善者得之為惡者失之春秋公羊傳曰亡國之社奄其上柴其下郊特牲曰喪國之社屋之亦與天地絶也白虎通亡國之社屋其上柴其下者示絶於天地夫春秋薄社周以為戒夫經藝書傳人當鑒之猶社當通氣於天地也故人不通覽者薄社之類論衡天子太社以五色土為壇封諸侯者取其方面土苴以白茅授之各以其所封方色以立社於其國故謂之授茅士漢舊事宗廟廟者貌也其以貌言之也尚書大傳宗尊也廟貌也先祖形貌所在也寢所寢息也釋名廟所以尊祖也孝經援神契宗廟致敬不忘親也孝經禮聖王所制宗廟何曰生死殊路故敬鬼神而遠之所以有室何所以象生之居白虎通王者立宗廟何緣生以事死敬亡若事存欲立宗廟而祭之此孝子之心所以追繼養也上夏曰世室世世祭祀之也殷曰重屋夏曰霤周曰宗廟尊其生存之貌示不死之故致之於室也古今通論禹生於石紐禹母吞珠孕禹圻疈而生禹於塗山娶妻生子名啓於今塗山有禹廟亦為其母立廟蜀王本紀會稽有禹廟始皇配食王朗為太守而黜之吳録梅福上書諫曰武王克殷未下車存五帝之後封殷於宋紹夏於祀明著三統示不獨有也是以姬姓半天下遷廟之制流出於戶所謂存人以自立者也漢書孔子曰吾於甘棠見宗廟之敬甚矣思其人猶愛其樹尊其人必敬其道也家語帝廟高祖廟曰原廟文帝廟曰顧城廟景帝廟曰德陽武帝廟曰龍淵昭帝廟曰徘徊宣帝廟曰樂遊元帝廟曰長壽成帝廟曰成陽漢書中元元年十月甲申使司空馮魴告祠高祖廟呂太后不宜配食以薄太后配遷呂太后於園四時上祭東觀漢記天子自雒陽遷都長安初長安遭赤眉亂宮室焚盡唯有高廟遂居之告祠賜金宣帝立孝武廟於河東告祠日見一人騎馬馬異於常馬持尺一札賜將作函文曰汝續克成賜汝金一斤因忽不見劄乃變為金一斤漢武故事王浚字彭祖為幽州刺史尋洛陽破後承制建行臺以宗廟焚毀設壇望祀七室及配臣配食晉諸公讚請立七廟侯景篡王偉請立七廟景曰何謂七廟偉曰天子登七世祖考故置七廟并請七世諱敕太常具祭祀之禮景曰前世吾不復憶唯阿爺名標且在朔州伊郍得來噉是衆聞咸笑之南史人君既葬之後日中虞祭即作木主以存神廟主用木木者本落歸本有終始之義天子廟主長尺二寸諸侯一尺四向孔穴午達相通葬後孝子心目無所覩故用以主其神也禮記外傳廟者所以藏主列昭穆漢舊事宗廟之木主名曰柘說文言神無所依據孝子以主繼心白虎通論語曰哀公問社於宰我宰我答夏后氏以松夏人都河東河東宜松也殷人以柏殷人都亳亳宜柏也周人以栗周人都豐鎬豐鎬宜栗也五經異義主者神象也凡虞主用桑桑猶喪也喪禮取其名練主用栗栗者敬也祭禮取其恭五經要義所以虞而立主何孝子既葬日中反虞念親已沒棺柩已去悵然失望倣徨哀痛故設桑主以虞所以慰孝子之心虞安其神所以用桑者始與神相接三王俱以桑白虎通祏宗廟主也周禮有郊廟石室一曰大夫以石為主從示從石石亦聲也說文廟中藏木主石室也增韻凡廟之主藏於戶外西牖之下有石函故名宗柘決疑要注祔順宗于廟遷中宗神主于夾室有司以中宗為中興之君當百代不遷宰臣君史官蔣武問之武對曰中宗以弘道元年於高宗柩前即位時春秋已壯矣及母后篡奪神器潛移其後賴張柬之等同謀國祚再復此蓋同於反正恐不得號為中興之君凡非我失之自我復之謂之中興漢光武晉元帝是也自我失之因人復之晉孝惠孝安是也今中宗興惠安二帝事同即不可為不遷之主矣唐書明天道明堂者明天道之堂也黃圖明堂猶堂堂高顯貌也釋名告朔告朔行正謂之明堂五經釋例明堂之制東西九筵筵長九尺也明堂東西八十一尺南北六十三尺故謂之太室孝經援神契明堂在辰巳者言在水火之際辰木也巳火也木生數三火成數七故在三里之外七里之內合成圖明堂古者天子布政之言在國南十里之內七里之外黃帝享百神於朝廷是也唐虞為五府夏謂大廟為世室殷人為路寢為重屋周人為五府為明堂夏后氏一堂之上為五室南面三階五室者象載於五行也五行生於四時故每室四達一室八窗周人有圓屋九月大亨五帝於明堂心為天子明堂或以明堂獨以一室耳禮記外傳明堂所以通神靈感天地正四時出教化崇有德章有道也禮含文嘉黃帝曰合宮有虞氏曰總章殷人曰陽館周人曰明堂此皆所以名休其善也尸子自古者明堂之制下之潤濕弗能及也上之霧露弗能入也所以饗上帝禮鬼神示人知節也淮南昔者五帝三王之蒞政施教乃立明堂之朝行明堂之政以調陰陽之氣以和四時之節以辟疾病之菑泰族案禮及孝經援神契並云明堂有五室天子每月聽朔布教祭五帝之神配以功德之君大戴禮曰明堂者所以明諸侯尊卑也許慎五經異義曰布政之宮故稱明堂明堂盛貌也周官匠人職稱明堂有五官鄭玄云周人明堂五室帝一室也齊禮志孝武帝議立明堂於長安城南許令褒等議曰按五經禮樂傳記曰聖人之教制作之象所以法則天地比類陰陽以之宮室本之太古以昭令德茅屋采椽土階素輿越席皮辨蓋興於黃帝堯舜之世是以三代修之也三輔黃圖孔子觀乎明堂覩四門墉有堯舜之容桀紂之象而各有善惡之狀興廢之誡焉又有周公相成王抱之負斧扆南面以朝諸侯之圖焉孔子徘徊而望之謂從者曰此周之所以盛也家語或以為明堂者文王廟周時德澤和洽蒿茂大以為宮柱名曰蒿宮禮論天子封泰山泰山東北址古時有明堂處處險不敞上欲治明堂奉高旁未曉其制度濟南人公王帶上黃帝時明堂圖明堂中有一殿四面無壁以茅蓋通水水圜宮垣為復道上有樓從西南入名曰昆侖天子從之入以拜祀上帝焉於是上令奉高作明堂汶上如帶圖漢郊祀志垂拱二年毀乾元殿就其地創造明堂凡高二百九十四尺東西南北各廣三百尺凡有三層下層象四時各隨方色中層法十二辰圓蓋蓋上盤九龍棒上層法二十四氣亦圓蓋亭中有巨木十圍上下通貫刻木為瓦紵漆之明堂之下施鐵渠以為辟雍之象號為萬象神宮唐書證聖元年正月明堂後復室大火延燒明堂三年又令重造如明堂高廣如舊制上制寶鳳號為通天宮也上辟雍天子曰辟雍諸侯曰泮宮禮王制天子立辟雍者何所以行禮樂宣教化也辟者何象璧以法天相雍者何雍之以水象教化流行白虎通象四海辟雍水四周於外象四海也三輔夬録王者作圓池如璧形實水其中以圜壅之故曰辟雍言其上承天地以班教令流轉王道周而復始桓談新論鄉飲處辟雍天子鄉飲之處說苑修禮樂王朗云辟雍所以修禮樂大學所以集儒林魏志白虎通曰辟雍外圓內方明德當圓行當方蔡雍明堂論曰辟雍外圓內方擬王者動作法天地水環四周譬德廣四海也不知泮水象諸侯行不當方德不當廣乎其釋辟雍雖明而於泮水則礙蘭叢識遺莊子言歷代樂名黃帝堯舜禹湯武王有咸池大章韶夏濩武中曰文王有辟雍是以辟雍為天子學亦非也詩言於論鼓鐘於樂辟雍又云鎬京辟雍無思不服亦無養才之意莊子去古未遠必有傳授鼠璞祀孔顏配昔武王入殷而封先代之後蓋追思其德也孔子大聖終於陪臣未有封爵至漢元帝時孔霸以帝師號褒成侯奉孔子後魏黃初二年以議郎孔羡為宗聖侯奉孔子祀魏齊王正始二年始太常釋奠以太牢祀孔子於辟雍以顏回配晉禮志尚書符太常曰按洛陽圖宮南自有太學國子辟雍不相預也捨辟雍以太學辟雍便為無事虛誕漢魏舊事皆言釋奠祠先聖於辟雍未有言太學者又咸和中成皇帝釋奠於中堂之前臺中故事亦曰辟雍是為漢魏之世初自兩立至釋奠便在辟雍猶存今廢辟雍而立二學中興以來相違太常王彪之答魏帝齊王使有司釋奠於辟雍此是魏之大事非晉書舊典大始元康釋奠太學不在辟雍大始五年元康五年二行嚮禮皆於辟雍不在太學是則釋奠於太學行嚮於辟雍有留已行之准也中朝有辟雍猶在太學况無辟雍唯有太學更當不在太學乎宰相從太常晉尚書大傳仲春上丁釋奠于孔宣父以顏回配焉其七十二弟子及先儒並從祠仲秋之月亦如之仲春上戊釋奠于齊太公以留侯張良配焉仲秋之月亦如之凡州縣皆治孔宣父廟以顏回配仲春上丁州縣官行釋奠之禮仲秋上丁亦如之唐六典晉范堅書問馮懷曰漢氏以來釋奠先師唯享仲尼不及公旦何也馮答曰若如來談亦當憲章堯舜文武豈唯周旦乎貞觀二十一年詔以孔子為先聖更添左邱明等二十二人與顏子俱配宣父於太學並為先師永徽中制令改周公為先聖黜夫子為先師顏回左邱明從祀開元八年勑改顏生等十哲為坐像悉應從祀曾參大孝德冠同列特為王像坐於十哲之次二十七年制夫子追贈諡為文宣故昔緣周公南面夫子西坐自今以後夫子南面而坐內出王者衮冕之服以衣之十哲等東西列侍顏子優秩兗國公通典舍菜凡學春官釋奠于先師秋冬亦如之釋奠即舍菜舍菜即祭菜然則國子入學以蘋蘩告誠祀其師以示敬道也菜芹之屬禮記呂氏春秋仲春上丁命樂正入舞舍采注命樂官正率卿大夫之子入學宮習舞也舍猶置也初入學宮必禮先師置采帛於前以贄神也周禮春入學舍采舍舞秋訟學舍聲以六樂之會正舞位此之謂也此云習舞釋菜鄭云將舞必釋菜於先師以禮之夫臨祭豈方習舞釋奠豈獨用菜乎教養耕籍所以教諸侯之養也祭義籍千畝帝籍千畝者使民如借故謂之籍說文籍者借也天子耕千畝但三推發未正岱而止借民力治之所耕之穀藏於神倉以供事天地宗廟神祗人鬼之用也天子以身先天下以建寅之日而郊郊而後耕郊用辛日而耕用亥日享先農而後籍田禮外傳天子升壇公卿耕訖嗇夫下種籍田千畝亦曰帝籍亦曰親耕亦曰王籍漢官儀天子籍田千畝孟冬啓蟄既郊之後率公卿大夫而親耕焉所以先百姓而致孝敬五經要義立春東耕為土象人男女各二執耒鉏錢或列土牛象人土牛未畢而耕也從氣應時示帥下也論衡貫髮冠貫也所以貫韜髮也釋名作冠上古穴居野處衣毛而冒皮後代聖人易以絲麻觀暈翟之文乃染帛以效之始作五采以為服見鳥獸有冠角枊胡之制遂作冠冕纓緌輿服志故曰冠者禮之始也嘉事之重者也是故古者重冠重冠故行之於廟行之於廟者所以尊重事尊重事而不敢擅重事不敢擅重事所以自卑而尊先祖也冠義適子冠於阼以著代也醮於客位加有成也三加彌尊喻其志也冠而字之敬其名也郊特牲三王冠異孟懿子曰始冠必加緇布之冠何也孔子曰示不忘古太古冠布齊則緇之其緌也吾未之聞今則冠而幣之可也懿子曰三王之冠其異何也孔子曰周辨殷哻夏收一也三王共皮辨素緌委貌周道也章甫殷道也毌追夏后氏之道也家語天子冠者武王崩成王年十有三而嗣立周公居冢宰攝政以治天下明年夏六月既葬冠成王而朝于祖以見諸侯亦有君也周公命祝雍作頌曰祝王達而未幼祝雍辭曰使王近於民遠於年嗇於時惠於財親賢而任能其頌曰令月吉日王始加元服去王幼志服衮職欽若昊命六合是式率爾祖考永永無極此周公之制也上趙文子冠見韓獻子獻子曰戒之此謂成人成人在始與善始與善善進善不善蔑由至矣始與不善不善進不善善亦蔑由至矣如草木之産也各以其物人之有冠猶宮室之有牆屋也糞除而已何又加焉見張老而語之張老曰物備之志在子是先生覆露子也晉語晉侯以公宴于河上問公年季武子對曰會于沙隨之歲寡君以生晉侯曰十二年矣是謂一終一星終也國君十五而生子冠而生子禮也君可以冠矣大夫盍為冠具武子對曰君冠必以祼享之禮行之以金石之樂節之以先君之祧處之今寡君在行未可具也請及兄弟之國而假備焉晉侯曰諾公還及衛冠于成公之廟假鐘磬焉禮也襄九邾隱公既即位將冠使大夫因孟懿子問禮于孔子子曰其禮如世子之冠懿子曰天子未冠即位長亦冠也孔子曰古者王世子雖幼其即位則尊為人君人君治成人之事者何冠之有懿子曰然則諸侯之冠異天子與孔子曰君薨而世子主喪是亦冠也已人君無所殊也懿子曰今邾君之冠非禮也孔子曰諸侯之有冠禮也夏之未造有自來矣今無譏焉家語哀公問曰夫子之服其儒服與孔子對曰某少居魯衣逢掖之衣長居宋冠章甫之冠儒行郊持牲云章甫殷道也蓋緇布冠殷世則名章甫章明也所以表明求夫故謂之章甫耳裂苞楯為冠楚漢會於鴻門項籍圖危高祖樊噲聞急乃裂苞楯以為冠排入羽營周廷輿服雜事孝昭帝冠辭曰陛下摛顯先帝之光耀以承皇天之嘉祿欽奉仲春之吉辰普尊大道之郊域秉率百福之休靈始加昭明之元服推遠冲孺之幼志蘊積文武之就德肅勤高祖之清廟六合之內靡不息蒙德永永與天無極博物志漢侍中冠武辨大冠亦曰惠文冠加金璫附蟬為文貂尾為飾侍中服則左貂常侍服右貂金取堅剛百鍊不耗蟬取居高食潔貂取外徑悍而內溫潤此本趙武靈王胡服之制秦破之得其冠以賜侍中庾杲之為蟬冕所映彌有華采職林馬防子巨為常從小六年正月齊宮中上欲冠巨夜拜為黃門郎御章臺下殿陳鼎俎自蒞冠之東觀漢記江左諸帝將冠金石宿設百僚陪位豫于殿上鋪大床御府令奉冕幘簪導衮服以授侍中常侍太尉加幘太保加冕太尉跪念祝文曰令月吉日始加元服皇帝穆穆思弘衮職欽若昊天六合是式率尊祖考永永無極眉壽惟祺介茲景福晉禮志阮孝緒字士宗年十三遍通五經十五冠而見其父彥之彥之誡曰三加彌尊人倫之始宜思自勗以庇爾躬答曰願迹松子於瀛海追許由於穹谷庶保促生以免塵纍南史晉王堪冠禮儀云宗人申誡之曰以歲之正以月之令兄弟具來咸加爾服棄爾幼志順爾成德敬慎威儀惟人之則壽考惟祺永受景福冠者高跪而冠通典無定時王彪之以為禮冠自卜日不必以三元也又禮夏冠用葛履冬冠用皮履明無定時也禮論邢文偉歷太子典膳丞時孝敬罕見宮臣文偉即臧膳上書曰古者太子既冠則有司過之史虧膳之宰死不書過死之宰不徹膳死之新唐大經冠婚之義禮之大經上婚姻者何謂昏時行禮故曰婚婦人因夫而成故曰姻白虎通妻父曰婚壻父曰姻嫁娶必以春何春天地交通萬物始生陰陽交接之時也詩曰士如歸妻逮冰未泮夏小正曰二月冠子娶婦之時也夫有惡行妻不得去地無去天之義夫雖有惡猶不可去也故郊特牲記曰一與之醮終身不改悖逆人倫殺妻父母廢弛綱紀亂之大者也義絶乃得去耳天子諸侯一娶九女者何重國廣繼嗣也適九何地有九州承天之施無所不生一娶九女亦足以承君施九而無子百亦無益也白虎通古者謂婚姻為兄弟因成兄弟之義也壻曰壻以婚時往婦曰姻又壻之父曰姻婦之父曰婚壻者陽也婦者陰也日往而陰氣至也禮外傳子孫娶妻嫁女必擇孝弟世世有行義者是則其子孫慈悌孝愛不敢淫暴黨無不善三族輔之故鳳凰生而有仁義之意虎狼生而有貪戾之心嗚呼戒之哉無養乳虎將傷天下大戴禮逸禮禮曰女子十五許嫁納采問名納吉請期親迎以鴈為贄納徵用玄纁故不用鴈也納徵玄纁束帛離皮玄三法天纁二法地也陽奇陰隅明陽道之大也離皮者兩皮也以為庭實庭實偶也白虎通或曰同姓不相娶何也曰遠別也曰今之人外內相婚禮歟曰中外之親近於同姓同姓且猶不可而以中外之親乎古人以為無疑故不制也今以古之不言固謂之可婚不知禮者也或曰國語云同德則同姓同姓雖遠男女不相及異德則異姓異姓雖近男女相及也斯言何故也曰司空季子有為而言也文公將求秦以反國不敢逆秦故也魏袁淮正論長子容當為求婦其父如此誰肯嫁之者造求小姓足使生子天其福人不在舊族楊雄之才非出孔氏芝草無根醴泉無源帝舜受襌父嚚母頑虞家世法出癡子虞翻與弟書別禽獸夏殷五世之後則通婚姻周公制禮百世不通所以別禽獸也禮外傳劉范劉氏范氏世為婚姻哀上劉氏周卿士范氏晉大夫世與王家鄭崇字子游本高密大族世與王家相嫁娶漢書司空東萊王基當世大儒豈不達禮而納司空王忱女以姓同源異故也魏氏春秋與婚不許王粲父謙名公之胄何進為長史欲與為婚見二子使擇焉謙不許魏志陶謙字恭祖丹陽人同縣甘公出遇之塗見其容貌異而呼之住車與語甚悅之因許妻以女甘夫人怒曰聞陶家兒游戲無度如何以女許之甘公曰彼有奇表後必大成遂與之後為徐州牧吳書阮修字宣子居貧四十未有室王敦等斂錢為婚皆名士也時慕之者求入錢而不得晉書江湛字徹淵濟陽考城人也為義康司徒主簿司空檀道濟為子求湛妹婚不許義康有命又不從時人重其立志守義者也宋書桓閎字叔道太祖輔政使禇淵致意為子晃求女婚閎不敢聞命曰辭霍不婚常所嘉楫齊大非偶所以不敢承殊眷太祖雖嘉其退讓而心不能歡也吳均齊春秋王秀之字伯奮臨沂人吏部尚書禇淵見秀之正潔欲與結婚秀之不肯以此頓為府分兵參軍齊書江蒨方雅有風格僕射徐勉權重唯蒨及王規與抗禮不為之屈勉因蒨門客翟景為子繇求婚于蒨蒨不答景再言之乃杖景四十由此與勉忤梁書漢成帝欲與近臣遊張安世玄孫放以公主子且開敏得幸放娶后弟許嘉女上為放供張賜甲第充以服飾號為天子娶婦皇后嫁女又唐中宗時蕭至忠以女妻韋后舅崔從禮子帝主蕭后主崔時謂天子嫁女皇后娶婦又宋英宗於仁宗為從子宣仁后於光獻為甥自幼同鞠禁中會溫成有寵英宗遂還官邸宣仁亦歸其家洎溫成薨仁宗覺無子一日謂光獻曰吾夫婦老無子舊養十三滔滔各已長立朕為十三后為滔滔主婚使相嫁娶十三英宗行第滔滔宣仁小字也時宮中謂天子娶婦皇后嫁女邵氏聞見録孫雋字文英與李元禮俱娶太尉桓焉女時人謂桓叔元兩女俱乘龍言得壻如龍也楚國先賢傳王丞相初在江左欲結吳人請婚陸太尉太尉曰培塿無松柏薰蕕不同器玩雖不才義不為亂倫之始也世說聖經論曰嫁娶古人皆以秋冬毛詩曰東門之楊其葉牂牂毛萇傳曰男女失時不逮秋冬也鄭衆言婚禮有合歡鈴取音聲和諧九子墨取生長子孫通典楊綏清才茂盛德日新既藉三葉世親之恩而子之姑余之伉儷焉潘安仁誄潘楊之睦有自來矣上羊鄧諸葛恢兒娶鄧攸女于時謝尚書裒求其小女婚恢乃云羊鄧是世婚江家我顧伊庾家伊顧我我不能復謝裒兒婚世說東海王源嫁女與富陽滿氏源雖人品庸陋預五通徹而托姻結惟利是求王滿連姻實駭物聽潘楊之睦有異於此豈有六卿之胄納女管庫之家宋子河魴同穴於輿臺之鬼蔑祖辱親於事為甚沈約彈文王元規字正範八歲而孤兄弟三人隨母依舅氏往臨海郡時年十二郡土豪劉瑱者資財巨萬欲妻以女母以其兄弟幼弱欲結強援元規泣請曰姻不失親古人所重豈得茍安異壤輒昏非類母感其言而止徐州古豐縣有村曰朱陳去縣百餘里桑麻青氛氳一村惟兩姓世世為婚姻白陶李陶李為婚深駭物聽廣記狐二雙石婚禮有九子蒲未葦雙石蒲葦取其心可屈伸雙石義在兩固俗以子午卯酉年謂之當梁年娶婦舅姑不相見唐禁之賣馬娶婦以賣馬錢娶婦多惡病夫妻離別龍魚圖孔子之郊遭程子於塗顧謂子路曰取束帛以贈先生子路屑然對曰由聞之士不中間不見女嫁無媒君子不以交禮也家語吾令豐隆乘雲兮求虙妃之所在解佩纕以結言兮吾令蹇修以為理屈原離騷宋王因其友以見於楚襄王襄王待之無以異宋玉讓其友其友曰夫薑桂因地而生不因地而辛婦人因媒而嫁不因媒而親子之事王未耳何怨於我男娶女嫁何陰卑不能自專就陽而成之故傳曰陽唱陰和男行女隨男不專娶女不專嫁必由父母須媒妁何遠恥防淫佚也白虎通為陽語陰孝廉令狐策夢立冰上與冰下人語索紞曰冰上為陽冰下為陰陰陽事也士如歸妻逮冰未泮婚姻事也君在冰上與冰下人語為陽語陰媒介事也君當為人作媒冰泮而婚成策曰老夫耄矣不為媒也會太守田豹因策為子求鄉人張公徵女仲春而成婚焉晉書鳥孫國嫁娶賣馬聘先令媒者與婦宿徐乃壻迎闞戲十二州志正義曰天有日月星辰地有山陵河海歲有萬物成熟國有聖賢宮觀周域官僚人有言語衣服體貌端修咸謂之樂史樂書注移風易俗移風易俗莫善於樂孝經伏羲樂名扶來亦曰立本神農樂名扶持亦曰下謀孝經緯伊耆有葦籥之音伏羲有網罟之詠葛天八闋神農五絃事與功偕其來尚矣隋志女媧命娥陵氏制都良管以一天下之音命聖氏為班管合日月星辰名曰充樂既成天下無不得理帝系譜鉤命決伏羲樂曰立基神農樂曰下謀祝融樂曰屬績少昊樂曰九淵孝經緯神農改女皇之太樂坤鑿度注咸池黃帝作咸池顓頊作六莖帝嚳作五英堯作大章舜作招禹作夏湯作濩武王作武周公作勺勺言能勺先祖之道武言以功定天下也濩言救民也夏大承二帝也招繼堯也大章章之也五英英華茂也六莖及根莖也咸池備矣漢禮樂志有虞氏之祀其樂咸池承雲九韶夏后氏其樂夏籥九成六佾六列六英殷樂大濩晨露周樂大武三象棘下淮南齊俗訓列子奏承雲注黃帝樂大庭有鼓籥之器黃帝有雲門之樂詩正義顓頊令飛龍作效八風之音命之曰承雲以祭上帝呂氏春秋耳聽九韶六瑩注六塋顓頊樂也淮南莊子堯有大章白虎通堯曰大章大明天地人之道也公羊注堯時民樂其道章明也周禮缺文或作大卷季札觀樂見舞韶簫者曰德至矣大矣如天之無不幬地之無不載雖甚盛德其蔑以加於此矣左傳李斯書昭虞象武注樂動聲儀曰舜樂曰簫韶一云大韶漢志堯作大章舜作招招繼堯也孔子曰簫韶者舜之遺音也溫潤以和似南風之至其為音如寒暑風雨之動物如物之動人雷動獸禽風雨動魚龍仁義動君子財色動小人是以聖人務其本樂動聲儀虞傳曰維元祀巡狩四嶽八伯壇四奧沉四海封十有二山兆十有二州樂正定樂名元祀代泰山貢兩伯之樂焉東嶽陽伯之樂舞株離其歌聲比余謠名曰晢陽儀伯樂舞鼚哉其歌聲比大謠名曰南陽中祀大交霍山貢兩伯之樂焉夏伯之樂舞謾或其歌聲比中謠名曰初慮羲伯之樂舞將陽其歌聲比大謠名曰朱千秋祀柳穀華山貢兩伯之樂焉秋伯之樂舞蔡俶其歌聲比小謠名曰苓落和伯之樂舞玄鶴其歌聲比中謠名曰歸來幽都弘山祀貢兩伯之樂焉冬伯之樂舞齊落歌曰縵縵并論八音四會歸假於禰祖用特五載一巡狩群后德讓貢正聲而九族奏具成尚書大傳魏公卿奏曰簫韶九奏親於虞帝之庭宋志大夏子家駒曰朱干玉戚以舞大夏注夏樂也公羊傳季札見舞大夏者曰美哉勤而不德非禹其孰能修之左傳大夏言禹能順二聖之道而行之白虎通公羊傳夏時民樂大其三聖相承也季札見舞韶濩者聖人之弘也而猶有慚德聖人之難也左傳程繁問樂墨子曰湯立為王事成功立因先王之樂又自作樂命曰護又循九招墨子三辨篇湯作護聞其宮聲使人溫良而寬大商聲使人方廉而好義角聲使人側隱而愛仁徵聲使人樂養而好施羽聲使人恭敬而好禮韓詩外傳湯樂曰大護言能護民之急也白虎通公羊注殷時民樂大其護已也周穆王奏承雲六瑩九韶晨露以樂之注九韶舜樂晨露湯樂列子辟雍文王有辟雍之樂莊子詩云於論鐘鼓於樂辟雍蔡雍志周頌雅樂辟雍饗射用之文王作武象之樂增琴二弦曰少宮少商帝王世紀文王時民樂其興師征伐故曰武元命包王者不空作樂樂者和盈於內動發於外應其發時制禮作樂以成之是故作樂者必反天下之始樂於己為本舜之時民樂其紹堯業故韶者紹也禹之時民大樂其駢二聖相繼故夏者大也湯之時民大樂其救於患害故護者救也文王之時民樂其興師征伐故武者伐也四者天下之所同樂者一也其所同樂之端不可一也上象武文王樂名巨業武王樂名象武樂苑武王因先王之樂又自作樂命曰象武成王因先王之樂命曰騶虞墨子三辨篇武王即位以六師伐殷六師未至以鋭兵克之於牧野乃薦俘馘于京師室乃命周公為作大武成王立殷民反王命周公踐伐之商人服象為患于東夷周公遂以師逐之至于江南乃為三象以嘉其德故樂之所由來者尚矣呂覽武王作象樂繼文以奉天春秋繁露周人其樂大武三象棘下其服尚赤淮南李斯書云韶虞武象注樂勤聲儀曰周樂伐時曰武象宋均曰象伐時用干戈勺周公作勺言能勺先祖之道也漢志虞氏之樂莫盛於韶於周莫盛於勺武帝策賢良周公輔成王作勺樂以奉天春秋繁露周公歌雍詠勺六服承德子華子周樂曰大武象周公之樂曰酌白虎通遂八風伶州鳩對周景王曰琴瑟尚宮鐘尚羽石尚角匏竹利制大不踰宮細不過羽故樂器重者從細輕者從大是以金尚羽石尚角瓦絲尚宮匏竹尚徵革木一聲呂以和樂律以平聲金石以動之絲竹以行之詩以道之歌以詠之匏以宣之瓦以贊之革木以節之物得其常曰樂極極之所集曰聲聲應相保曰和細大不踰曰平如是而鑄之金磨之石繫之絲木越之匏竹節之鼓而行之以遂八風國語周用六代之禮樂故有雲門咸池大韶大踰大夏大武也魯受四代之禮樂故不舞雲門咸池示有降殺也頴容春秋釋例平公說新聲師曠曰公室其將卑乎君之明兆於衰矣夫樂以開山川之風以耀德於廣遠也風德以廣之風山川以遠之風物以聽之修詩以詠之修禮以節之夫德廣遠而有時節是以遠服而邇不遷國語師涓者出於衛靈公之世能寫列代之樂善造新曲以代古聲故有四時之樂春有離鴻去鴈應蘋之歌夏有明晨焦泉之華流金之調秋有商飊白雲落葉吹蓬之曲冬有凝河流陰沉雲之操此四時之聲奏於靈公公情湎心惑志於政事蘧伯玉諫曰此雖以發揚氣律終為沉湎靡曼之音無合於風雅非下臣宜薦於君也靈公乃去新聲而親政務故衛人美其化焉師涓悔其違於雅頌失為臣之道乃退而隱迹伯玉焚其樂器於九逵之衢恐後世傳造焉其歌曲湮滅世代迹遠唯紀其篇目之大意也拾遺記孔子至齊郭門之外遇一嬰兒挈其壺相與俱行其視精其心正其行端孔子謂御曰趣驅之趣驅之韶樂方作孔子至彼聞韶三月不知肉味故樂非獨以自樂也又以樂人非獨以自正也又以正人矣哉說苑洞庭之山浮於水上其下金堂數百間帝女居之四時聞金石絲竹之音徹於山頂楚懷王之時與群才賦詩於水湄故云瀟湘洞庭之樂聽者令人難老雖咸池蕭韶不能比焉每四仲之節王嘗繞山以遊宴各舉四仲之氣以為樂章惟仲春律中夾鐘乃作輕流水之詩宴於山南時中蕤賓乃作皓露秋霜之曲拾遺記夫樂者聖人所以感天地通神明安萬民成性類者也故聽者無不虛已竦神悅而承流是以海內遍知上德被服其風光輝日新化上遷善而不知所以然至於萬物不夭天地順而嘉應降故詩曰磬管鏘鏘降福穰穰漢書沈約宋書曰秦樂曰五行始皇所改漢樂曰文始高祖改韶舞為之武德高祖造舞人執干戚以象天下樂已行武以除亂安世舊曰房中秦改為壽人孝惠改為安世昭容高祖造生於武德禮容高祖造生於文始五行嘉至叔孫通造以迎神四時文帝所造昭德孝武帝造薦之太宗廟盛德孝宣造薦之太宗廟雲翹育命並漢樂以祀天地巴渝漢初巴渝助漢有功作此舞魏樂曰昭武改漢巴渝正世改漢安世又為享神歌迎靈改漢嘉至武頌改漢武德昭業改漢昭容鳳翔改漢雲翔靈應改漢育命大韶改漢文始大武改漢五行采菱陽阿奏雅樂者始如陽阿采菱淮南夫歌采菱發陽阿鄙人聽之不若此延路陽局上邯鄲師有出新曲者託之李奇諸人皆爭學之後復知其非也而皆棄其曲此未始知音者也上注楚樂之名也楚辭曰陳鐘案鼓造新歌涉江採菱發陽阿濟南公姚雍字子和興之弟也尤喜音樂皆能度其盈虛增改曲調世咸傳之號濟南新調十六國春秋知音候氣北齊神武霸府田曹參軍信都芳代號知音能以管候氣觀雲色嘗與人對語即指天曰孟春之氣至矣人往驗管而飛灰已應每月所候言皆無爽又為輪扇二十四埋地中以測二十四氣每一氣感則一扇自動他扇往並與管灰相應若合符契焉古今樂録高宗時章懷太子作寶慶曲閲于太清觀李嗣真謂道人劉概曰宮不召商君臣乖也角與徵戾父子疑也死聲多且哀若國家無事太子任其咎俄而太子廢嗣真常曰隋樂府有堂堂曲明唐再受命此日有側堂堂撓堂堂之謠側不正也撓危也皇帝病日侵事皆決中宮持權與人收之不易宗室雖衆居中制外勢且不敵諸王殆為后所蹂踐吾見難作不久矣后皆驗唐書神龍元年正月享西京太廟樂作大樂令裴知古密語萬年令元行冲曰金石諧婉將有大慶其在唐室子孫乎是月唐中宗復位復國為唐上明皇時涼州獻新曲帝召諸王觀之寧王進曰此曲雖加臣有聞焉夫音者始於宮散於商成於角徵羽莫不根抵橐籥於宮商也斯曲也宮離而少徵商亂而加暴臣聞宮君也商臣也宮不勝則君勢卑商有餘則臣事僣卑則逼下僣則犯上發于倏忽形于聲音播之詠歌見於人事臣恐一旦有播遷之禍帝默然果安史亂方知寧王審音之妙云開天傳信記天寶後調人多為流寓之思及寄興于江湖僧寺而樂曲亦多以邊地為名至其曲遍繁聲謂之入破蓋破碎云唐五行志考鐘得徵宋沈善音律太常久亡徵調沈考鐘律得之國史補不舉樂鄭從讜在汴時以兄處誨常為鎮師歿于是郡訖臨政受代不於公署舉樂唐書宫聲尅羽後唐清泰初王仁裕從事梁苑范延光師之春正月郊野尚寒引諸臣寮餞朝客於柳柳亭樂作於羽而響獨有宮聲意不諧王獨訝之私謂李巨唐獻曰今日必有譸張之事蓋樂音不和今舉羽而有宮聲且羽為水宮為土水土相尅得無憂乎少時筵散范引賓客約鷹犬大獵於王婆店北為奔馬所墜不救於彼自辰巳至午後絶而復蘇玉堂間話王仁裕性曉音律高祖初定雅樂宴群臣於承福殿奏黃鐘仁裕聞之曰音不純肅而元和聲當有爭者起於禁中已而兩軍校鬭升龍門外聲聞於內人以為神五代史變黎庶樂所以上事宗廟下以變化黎庶史記五音別名爾雅什樂云宮謂之重商謂之敏角謂之經祉謂之迭羽謂之柳郭璞注言皆五音之別名其義未聞也劉歆云宮者中也君也為四音之綱其聲重厚如君之德而為重商者章也臣者其聲敏疾如臣之節而為敏角者觸也民也其聲圓長經貫清濁如民之象而為經徵者祉也事也其聲抑揚遞續其音如事之續而為迭羽者宇也物也其聲低平掩映自下而高五音借成如物之聚而為柳也徐京安樂書劉韶鐘律書曰春官秋律百卉必凋秋宮春律萬物必榮夏宮冬律雨雹必降冬宮夏律雷必發聲夫音樂至重所感者大故曰知禮樂之情者能作知禮樂之文者能述風俗通聞聲聞宮聲無不溫雅而和也五經通義聞商音無不割斷而亡事也邯鄲綽五經折疑聞角音無不惻隱而慈者上聞徵音無不善養而好施者也通義凡樂音有八鼓謂之革鐘謂之金磬謂之石琴瑟謂之絲簫鼓謂之竹塤謂之土柷敔謂之木笙謂之匏是謂八音五經要義周禮鐘磬皆編懸之二八十六而在一蘆謂之堵磬一堵謂之肆春秋傳曰歌鐘二肆此之謂也上舞四夷之樂明德澤廣被四表也東夷之樂曰抹離南夷之樂曰任西夷之樂曰禁北夷之樂曰昧五經通義反天真伏羲作琴以修身理性反其天真也琴操伏羲削桐為琴面圓法天底平象地龍池八寸通八風鳳池四寸象四氣蔡雍論琴琴者樂之統也君子所常御不離於身非若鐘鼓陳於宗廟列於蘆懸也以其大小得中而聲音和大聲不喧譁而流漫小聲不湮滅而不聞適足以和人意氣感發善心也風俗通正人心琴者禁也禁止於邪以正人心也白虎通琴長三尺六寸六分廣六寸文上曰池下曰濱前廣後狹象尊卑也上圓下方法天地也五絃象五行大絃為君小絃為臣文王武王加二絃以合君臣之恩琴操文王加一武王加一今稱二絃為文武絃釋智匠樂録唐德宗時有安涗者世稱善琴且知音楊收問五絃外其二云何涗曰世謂周文武二王所加者收曰能為文王操乎涗即以黃鐘為宮而奏之以少商應大絃收曰止如子之言少商武絃也且文世安得武聲乎涗大驚唐書象六合伏羲作琴廣六十象六合琴操蔡雍琴操曰伏羲氏作琴絃有五象五行演連珠記農瑟羲琴達靈成性象物昭功晉志伏羲絃琴農皇制瑟後魏樂志伏羲氏琴長七尺二寸上有五絃廣雅伏羲樂曰立基造琴瑟以律呂樂書昔者至人伏羲氏王天下也仰觀象於天俯察法於地遠取諸物近取諸身始畫八卦削桐為琴琴書神農琴琴禁也神農所作洞越練朱五絃周加二絃說文神農始作五絃之琴以具宮商角徵羽之音歷九代至文王復增其二絃曰少宮少商帝王世紀神農始削桐為琴繩絲為絃以通神明之德合天地之和今琴四尺五寸法四時五行又曰神農氏為琴七絃足以通萬物而考理亂也桓談新論神農氏琴長三尺六寸有五絃曰宮商角徵羽文王增二弦曰少宮少商廣雅神農初作瑟以歸神反望及其天心也淮南昔古朱襄氏之治天下也多風而陽氣蓄積萬物散解果實不成故士達作為五絃琴呂氏黃帝琴古琴名有清角黃帝之琴梁元帝纂要黃帝作清角合鬼神於泰山之上韓非子堯琴堯使無句作琴五絃通禮纂神人暢堯帝所作堯彈琴感神人現故制此弄也謝希逸琴論舜彈五絃之琴歌南風之詩而天下治南風之詩者生長之音也舜樂好之樂與天地同意得萬國之歡心故天下治史樂書理重華之遺操選琴賦琴道曰舜操者舜聖德玄遠遂升天子喟然念親巍巍上帝之位不足保援琴作操注舜彈五絃天下化堯彈二絃以合君臣之恩楊雄琴清英舜遊歷山見烏飛思親作思親操古今樂録禹上會稽者禹之所作也決江河上會稽山自是之後百姓降邱黎庶乂安彈琴以自歎大周正樂古者帝王升歌清廟大琴練絃吳越大琴朱絃吳越以韋為鼓謂之搏拊尚書大傳越裳操者周公之所作也周公輔相成王天下太平萬國和會江黃納貢越裳重九譯而來獻周公援琴而歌大周樂正頌琴初穆姜死使擇美檟自以為櫬與頌琴左傳南音晉侯觀於軍府見鍾儀問其族曰伶人也與之琴操南音公曰君子也言稱先職不背本也樂操本風不忘舊也上初衛侯有嬖妾使師曹誨之琴師曹鞭之公怒鞭師曹三百昔者衛靈公將之晉至濮水之上稅車而放馬設舍以宿夜分而聞鼓新聲者而說之使人問左右盡報弗聞乃召師涓而告之曰有鼓新聲者使人問左右盡報弗聞其狀似鬼神子為聽而寫之師涓曰諾因靜坐撫琴而寫之師涓明日報曰臣得之矣而未習也請復一宿習之靈公曰諾因復留宿明日而習之遂去之晉晉公觴之于施夷之臺酒酣靈公起公曰有新聲願請以示平公曰善乃召師涓令坐師曠之傍援琴鼓之未終師曠撫止之曰此亡國之聲不可遂也平公曰此道奚出師曠曰此師延之所作與紂為靡靡之樂也及武王伐紂師延東走至於濮水而自投故聞此聲者必於濮水之上先聞此聲者其國必削不可遂平公曰寡人所好者音子其使遂之師涓鼓究之平公問師曠曰此所謂何聲也師曠曰此所謂清商也公曰清商固最悲乎師曠曰不如清徵公曰清徵可得面聞乎師曠曰不可古之聽清徵者皆有德義之君也今吾君德薄不足以聽平公曰寡人之所好者音也願試聽之師曠不得已援琴而鼓一奏之有玄鶴二八道從也南方來集於即門之垝棟端也再奏之而列三奏之延頸而鳴舒翼而舞音中宮商之聲聲聞於天平公大說坐者皆喜平公提觴而起為師曠壽反坐而問曰音莫悲於清徵乎師曠曰不如清角平公曰清角可得而聞乎師曠曰不可昔者黃帝合鬼神於泰山駕象車而六蛟龍畢方神名並轄蚩尤居前風伯進掃雨師灑道虎狼在前鬼神在後螣蛇伏地鳳凰覆上大合鬼神作為清角今主君德薄不足聽之聽之將恐有敗平公曰寡人老矣所好者音也願遂聽之師曠不得已而鼓之一奏之有玄雲從西方起再奏之大風至大雨隨之裂帷幕破俎豆隳廊瓦坐者散走平公恐懼伏於廊室之間晉國大旱赤地三年平公之身遂瘙病故曰不務聽治而好五音不已則窮身之事也韓子本過師曠鼓琴通於神明玉羊白鵲升枝翾翔瑞應圖晉平公出言而不當師曠舉琴而撞之跌任宮壁左右欲塗之平公曰舍之以此為寡人失孔子曰平公非不痛其體也欲來諫者也韓子聞之曰群臣失禮而弗誅是縱過也有以夫平公之不霸也淮南齊俗昔者師曠奏白雪之音而神物為之下降風雨暴至平公癃病晉國赤地上覽冥訓文王操孔子學琴於師襄子襄子曰吾雖以擊磬為官然能於琴今子於琴已習可以益矣孔子曰丘未得其數也有間曰已習其數可以益矣孔子曰丘未得其志也有間曰已習其志可以益矣孔子曰丘未得其為人也有間曰孔子有所謬然思焉有所睪然高望而遠眺曰丘逮得其為人矣近黮而黑頎然長曠如望羊奄有四方非文王其孰能為此師襄子避席葉拱而對曰吾子聖人也其傳曰文王操家語孔子晝息於室而鼓琴焉閔子自外聞之以告曾子曰嚮也夫子之音清徹以和淪入至道今也更為幽沉之聲幽則利欲之所為發沉則貪得之所為施夫子何所之感若是乎吾從子入而問焉曾子曰諾二子入問夫子夫子曰然女言是也吾有之向見猫方取鼠欲其得之故為之音也女二人者欲識諸曾子對曰閔子夫子曰可與聽音矣孔叢子使絃切切閔子騫三年喪畢見於孔子與之琴使之絃切切而悲孔子曰君子也哀未盡能斷之以禮家語夫榮啓期一彈而孔子三日樂感於和鄒忌一徽而威王終夕悲感於憂動諸琴瑟形諸音聲而能使人為之哀樂縣法設賞而不能移風易俗者其誠心弗施也淮主訓瓠巴鼓琴而鳥舞魚躍鄭師文聞之棄家從師襄遊三年不成章師襄曰子可以歸矣師文舍其琴歎曰且小假之以觀其後無幾何復見師襄曰得之矣於是當春而叩商絃以召南呂涼風忽至草木成實及秋而叩角絃以激夾鐘溫風徐回草木發榮當夏而叩羽絃以召黃鐘霜雪交下川池暴沍及冬而叩徵弦以激蕤賓陽光熾烈堅冰立散將終命官而㧾四絃則景風翔慶雲浮甘露降澧泉涌師襄乃撫心高蹈曰微矣子之彈也雖師曠之清角鄒衍之吹律亡以加之列子伯牙學琴於成連先生成連曰吾師云春在海中能移人意乃與遊蓬萊山留伯牙曰子居習之我將迎子師刺船而去伯牙迎過但見海水澒洞山林冥杳鳥獸悲號歎曰吾師將移我情乃援琴而歌終成理至遂為天下妙為連仙樂府解題絶絃伯牙善鼓琴鍾子期善聽伯牙鼓琴志在登高山鍾子期曰善哉峨峨兮若泰山志在流水鍾子期曰善哉洋洋乎若江河伯牙所念鍾子期必得之列子鍾子期死伯牙破琴絶絃終身不復鼓琴以為世無足復為鼓琴者呂氏伯牙游於泰山之陰卒逢暴雨止於巖下心悲乃援琴而鼓之初為霖雨之操更造崩山之音曲每奏鍾子期輒窮其趣伯牙乃舍琴而歎曰善哉善哉子之聽夫志想象猶吾心也吾於何逃聲哉列子昔者瓠巴鼓瑟而流魚出聽伯牙鼓琴而六馬仰秣荀勸學西京賦曰天子駕雕軫六駁駁又曰六玄蚪之奕奕齊騰驤而沛艾仰首而秣聽其聲也注瓠巴鼓瑟而淫魚出聽伯牙鼓琴駟馬仰秣淮南說山淫魚喜音仰秣仰頭缺吐謂馬笑也注懸壁周師經鼓琴魏文侯起舞賦曰使我言而無見違師經援琴而撞文侯不中中旒潰之文侯謂左右曰為人臣而撞其君其罪如何左右曰罪當烹提師經下堂一等師經曰臣可一言而死乎文侯曰可師經曰昔堯舜之為君也唯恐言而人不違桀紂之為君也唯恐言而人違之臣撞桀紂非撞吾君也文侯曰釋之是寡人之過也懸琴於城門以為寡人符不補旒以為寡人戒說苑十二國史同治國弭人騶忌子以鼓琴見威王威王說而舍之右室須臾王鼓琴騶忌子推戶入曰善哉鼓琴王勃然不說去琴按劍曰夫子見容未察何以知其善也騶忌子曰夫大絃濁以春溫者君也小絃廉折以清者相也攫之深醳之愈者政令也鈞諧以鳴大小相益回邪而不相害者四時也吾是以知其善也王曰善語音騶忌子曰何獨語音夫治國家而弭人民皆在其中王又勃然不說曰若夫語五音之紀信未有如夫子者也若夫治國家而弭人民又何為乎絲桐之間騶忌子曰夫大絃濁以春溫者君也小絃廉折以清者相也攫之深而醳之愈者政令也鈞諧以鳴大小相益回邪而不相害者四時也夫復而不亂者所以治昌也連而徑者所以存亡也故曰琴音調而天下治夫治國家而弭人民者無若乎五音者王曰善騶忌子見三月而受相印史記大絃者君也寬和而溫小絃者臣也清廉而不亂琴操應侯與賈午子坐聞其鼓琴之聲應侯曰今日之琴一何悲也賈午子曰夫張急調下故使之悲耳急張者良材也調下者官卑也取夫良材而卑官之安能無悲乎應侯曰善哉說苑雍門周以琴見孟嘗君先生鼓琴亦能令文悲乎對曰臣之所能令悲者先貴而後賤昔富而今貧擯壓窮巷不交四鄰不若身材高妙懷質抱真逢讒罹謗結怨而不得信不若交歡而結愛無怨而生離遠赴絶國無相見期不若幼無父母壯無妻兒出以野澤為鄰入用掘冗為家困於朝夕無所借貸若此人者但聞飛烏之號秋風鳴條則傷心矣臣一為之援琴而長不息未有不悽惻而涕泣者也今若足下居則廣廈高堂連闥洞房下羅帷來清風倡優在前諂諛侍側揚激楚舞鄭妾流聲以娛耳練色以淫目水戲則舫龍舟建羽旗鼓鉤乎不測之淵野游則登平原馳廣囿強弩下高鳥勇士格猛獸置酒娛樂沉醉忘歸方此之時視天地曾不若一指雖有善鼓琴未能動足下也孟嘗君曰固然雍門周曰臣竊為足下有所常悲夫角帝而困秦者君也連五國而伐楚者又君也天下未嘗無事不從即衡從成則楚王衡成則秦帝夫以秦楚之強而報弱薛猶磨蕭斧而伐朝道也有識之士莫不為足下寒心天道不常寒暑更進退千秋萬歲之後宗廟必不血食高臺既以傾曲池又已平墳墓生荊棘狐狸穴其中游兒牧豎躑躅其足而歌其上曰孟嘗君之尊貴亦猶若是乎於是孟嘗君喟然太息涕淚交睫而未下雍門周引琴而鼓之徐動宮徵叩角羽終而成曲孟嘗君遂歔欷而就之曰先生鼓琴令文立若亡國之人也桓談新論秦咸陽宮有琴長六尺安十三絃二十六徽皆用七寶飾之銘曰璵璠之樂西京雜記司馬相如素與臨卭令王吉相善臨卭富人卓王孫有女文君新寡好音相如謬與令相重而以琴心挑之相如之臨卭車騎雍容間雜甚都及飲卓氏弄琴文君竊從戶窺之心悅而好之恐不得當也史記其詩曰鳳兮鳳兮歸故鄉遊遨四海求其皇有一艷女在此堂室邇人遐毒我腸何由交接為鴛鴦也又曰鳳兮鳳兮從皇栖得托子尾永為妃交情通體必和諧中夜相從別有誰索隱雅琴之意事皆出龍德諸琴雜事中趙氏者渤海人趙定也宣帝元康神爵間丞相奏能鼓琴者渤海趙定梁國龍德皆召入見溫室使鼓琴時間燕為散操多為之涕泣者劉向別録齊人劉道強善彈琴能作單鵠寡鳧之弄聽者皆悲不能自攝西京雜記趙后有寶琴曰鳳凰皆以金玉隱起為龍鳳螭鸞古賢列女之象亦善為歸鳳送遠之操焉上慶安世年十五為成帝侍郎善鼓琴能為雙鳳離鸞之曲趙后悅之白上得出入御內絶見幸常著輕絲履招風扇紫綈裘與后同居處欲有子而終無胤嗣上令談失次上嘗問宋弘通博之士弘薦桓談談善鼓琴喜鄭聲上數聽悅之弘聞坐府上遣吏召談責問之弘叩頭良久乃遣後二令談鼓琴談為之失次上問之弘言其故故不復令談給辨東觀漢記漢桓帝聞楚琴悽愴傷心倚房而悲慷慨長息曰善哉為聲若此而足矣昔季流子向風而鼓琴聽之者淚下阮籍樂論蔡雍亡命江海遠跡吳會在吳吳人有燒桐以爨者雍聞火烈之聲知其良木因請而裁為琴果有美音而其尾猶焦故時人名曰焦尾琴焉後漢張隲文士傳曰雍告吳人曰吾昔嘗經會稽高遷亭見屋椽竹東間第十六可以為笛取用果有異聲伏滔長笛賦序云柯亭之觀以竹為椽雍取為笛奇聲獨絶也蔡雍性沉審志好琴道以嘉平元年入清溪訪鬼谷先生其所居山五曲曲有幽居靈跡每一曲制一弄三年曲成出呈馬融王允董卓之輩皆異之琴纂琴本五絃宮商角徵羽也加二絃文武也後漢蔡雍又加二絃象九星琴書蔡琰字文姬蔡雍之女聰惠秀異年六歲雍夜鼓琴絃絶琰曰第二絃雍故斷一絃問之琰曰第四絃雍曰偶得之耳琰曰吳札觀化知興亡之國師曠吹律識南風不競由此言之何云不知也琰別傳鼓琴與名顧雍少從蔡伯喈學鼓琴伯喈貴異之謂曰卿必有成故以名與卿雍伯喈同名由此江表傳琴經一卷諸葛亮撰述製琴之始及七絃之音十三徽所象之意中興書目廣陵散稽康字叔夜譙國人少嘗晝寢夢人身長丈餘自稱黃帝伶人骸骨在公舍東三里林中為人發露若為葬埋當厚相報康至其處果有白骨脛長三尺遂收葬之其夜復夢長人來授以廣陵散曲及覺撫琴而作其聲甚妙都不遺忘高貴鄉公時康為中散大夫後為鍾會所說司馬文王誅之異苑稽康燈下彈琴忽有一人長丈餘著黑單衣革帶康熟視之乃吹火滅之曰恥與魑魅爭光嘗行長路數十里有亭名月華投此亭由來殺人中散心神蕭散了無懼意至一更操琴先作諸弄雅聲逸奏空中稱善中散撫琴而呼之君是何人答云身是故人幽沒於此聞君彈琴音曲清和昔所好故來聽耳身不幸非理就終形體殘毀不宜接見君子然愛君之琴要當相見君勿怪惡之君可更作數曲中散復為撫琴擊節曰夜已久何不來也形骸之間復何足計乃手挈其頭曰聞君奏琴不覺心開神悟恍若暫生遂與共論音聲之趣辭甚清辨謂中散曰君試以琴見與乃彈廣陵散便從受之果悉得中散先所受引殊不及與中散誓不得教人天明語中散相與雖一遇於今夕可以遠同千載於此長絶能不悵然靈鬼志稽康嘗宿王伯通館忽有八人云吾有兄弟為樂人不勝羇旅今傳君廣陵散甚妙今代莫傳大周正樂呂安罹事稽康詣獄以明之鍾會庭論康文王於是録康閉獄臨死而兄弟親族咸與共別康顏色不變問其兄曰向以琴來不邪兄曰以來康取調之為太平引曲成歎曰太平引於今絶也文士傳稽康臨死顧視日影索琴彈之曰袁孝尼嘗從吾學廣陵散吾惜故不與廣陵於是絶矣竹村十賢傳稽康援琴而鼓既而歎曰雅音於是絶矣魏氏春秋杜夔妙於廣陵散稽中散就其子猛求得此聲劉潛琴議韓皋生知音律嘗聞鼓琴至止息歎曰妙哉稽生之為是曲也其當晉魏之際乎其音商商主金晉乘金運此所以知魏之季而晉將代也王陵母邱儉文欽諸葛誕相繼為揚州督都咸有匡復之謀皆為司馬懿父子所殺康以揚州故廣陵地故其曲曰廣陵散言魏室散亡自廣陵始止息者晉雖暴興終止息於此也其音哀傷潛迫脅永嘉之亂其應乎叔夜撰此將貽後代之知音者且避晉魏之禍所以託之神鬼也新舊唐書應暘與劉劭孔才書云聽廣陵之清散傅玄琴賦云馬融談思于止息稽康琴賦云次其曲引所宜則廣陵止息東武太山夫德璉季長俱在康前而康賦有廣陵止息之語故知琴曲之名其來舊矣可云稽所撰曲耶太平引廣陵散雅音之說互有不同伯通館月華亭畫夢之言各家並載又豈可謂散自廣陵託之鬼神耶皋詭辭以欺人而史氏載之于傳豈聆音察理者耶稽中散夜彈琴忽有一鬼械而長歎舉其手袂曰為君一絃一調中散與琴彈之聲清泠遙問不對疑是蔡雍雍死之日身著桎梏語林會稽賀思令善彈琴嘗夜在月中坐臨風鳴絃忽有一人形狀甚偉著械有慚色至其中庭稱善與之相語自云是稽中散謂賀云卿下手極快但於古法未備因授以廣陵散賀遂傳之于今不絶幽明録一絃琴孫登字公和不知何許人散髮至地行吟樂于居白鹿蘇門二山彈一絃琴善嘯每感風雷稽康師事之三年不言晉記孫登清淨無為好讀易彈琴頽然自得覩其風神若遊六合之外者當魏末居北山中石窟為宇編草自覆阮嗣宗見登披髮端坐巖下逍遙鼓琴嗣宗自下趨進莫得與言嗣宗乃長嘯與琴音諧會登因嘯和之妙響動于林壑別傳齊王冏輔政稽紹為侍中詣冏咨事遇冏宴會董艾葛旟等白冏稽侍中善於絲竹公可令操之左右進琴紹推却不受冏曰今日共為歡興何却耶紹曰公協輔皇室令作事可法紹雖官卑職備常伯操絲比蓋樂官之事不可以先王法服為伶人之業今逼高命不敢茍辭當釋冠冕襲私服此紹之心也旟等不自得而退世說阮瞻字千里咸之子也善彈琴人聞其能多往求聽不問貴賤長幼皆為彈之神氣冲和內兄潘嶽每令鼓琴終日達夜曾無忤色識者歎其恬淡不可榮辱也晉書顧榮彥先平日好琴及喪家人常以琴置靈座上張季膺往哭之不勝其慟遂徑上床鼓琴作數曲竟撫琴曰顧彥先頗復賞此不又大慟遂不執孝子手而出上戴逵字安道少有文藝善鼓琴太宰武陵王晞聞其能琴使人召焉逵對使者破琴曰戴安道不為王門伶人晞怒乃更引其兄述述亦能樂聞命欣然操琴而往逵不樂當世以琴書為娛不遠千里晉中興書王子猷子敬俱病篤而子敬先亡子猷問左右何以都不聞消息此已喪矣語時了不悲便索輿來奔喪都不哭子敬素好琴便徑入坐靈床上取子敬琴彈絃既不調擲地云子敬人琴俱亡因慟絶良久月餘亦卒世說趙正字文業渭水人情度敏達性好譏諫符堅末年寵惑鮮卑惰於治政正因援琴歌曰昔聞孟津河千里作一曲此水本自清是誰攪令濁堅動容曰是朕也又歌曰北園有棗樹布葉垂重陰外雖饒棘刺內實有赤心堅笑曰將非趙文業耶其調戲機捷皆此類也前秦録會稽有防風鬼屢見城邑常跋雷門上腳乘至地晉橫陽令賀韜鼓琴防風聞琴聲在賀中庭舞世說賀韜吳人也常夜彈琴感鬼神已舞數曲斯亦妙之至也大周正樂晉中朝時有王質者嘗入山伐木至石室見童子四人彈琴而歌質因留鐵斧柯而聽之童子以一物與質狀若棗質取而含之更不復饑遂復少留亦謂俄頃童子曰汝來已久何不遽去質承命視所坐斧柯爛盡既歸計離家已數十年矣舊宅遷移室宇靡存遂號痛而絶鄭緝之東陽記晉王恭伯字子升會稽人美姿容善鼓琴為東宮舍人求假休吳到閶門郵亭望月鼓琴俄有一女子從一女謂恭伯曰妾平生愛琴願共撫之其姿質甚麗恭伯留之宿向曉而別以錦褥香囊為訣恭伯以玉簪贈行俄而天曉聞鄰船有吳縣令劉惠基亡女靈前失錦褥及香囊斯須有官吏遍搜鄰船至恭伯船獲之恭伯懼因述其言我亦贈其玉簪惠基令檢果於亡女頭上獲之惠基乃慟哭因呼共伯以子壻之禮其女名稚華年十六而卒邢子才山河別記女郎名妙容字稚華大婢名春條年二十許小婢名桃枝年十五皆善彈箜篌妙宛轉歌相繼俱卒其詞有云願為星與漢光影共徘徊又曰願為煙與霧氛氳對容姿續齊諧記陶潛性不解音而蓄素琴一張絃徽不具每朋酒之會則撫而和之云但識琴中趣何勞絃上聲本傳通考作陶隱居蕭思話嘗從太祖登鍾山北嶺中道有盤古清泉上使于石止彈琴因賜銀鐘酒謂曰相賞有松石間意宋書宗少文好山水愛遠遊有疾還江陵歎曰老疾俱至名山恐難遍覩惟澄懷觀道臥以遊之凡所遊履皆圖之於室謂人曰撫琴動操欲令衆山皆響古有金石弄為諸桓氏取重桓氏亡其聲遂絶惟少文傳焉文帝遣樂師楊歡就受之宋書戴顒字仲若父達善琴書顒及兄勃並受琴於父父沒所傳之聲不忍復奏各造新弄勃制五部顒制十五部顒又制長弄一部並傳於世中書令王綏嘗攜客造之勃等方進豆粥綏曰聞卿善琴試欲一聽不答綏恨而去南史衡陽王義季鎮京口長史張邵與戴顒姻通迎來止黃鵠山山北有竹林精舍林澗甚美顒憩於此澗義季亟從之遊顒服其野服不改常度為義季鼓琴並新聲變曲其三調遊絃廣陵止息之流皆與世異文帝每欲見之嘗謂黃門侍郎張敷曰吾東巡之日當宴戴公山下也以其好音長給正聲伎一部顒合何嘗白鵠之聲以為一調號為清曠南史劉琨之為竟陵王誕司空主簿誕有寶琴左右犯其徽誕罰焉琨之諫以為非是誕曰此余寶也琨之曰前哲以善人為寶不以珠玉為寶故王孫圉稱觀父為楚國之寶未聞以琴瑟為寶誕忸然不悅宋書王仲雄善彈琴瑟時妙絶江左有蔡雍焦尾琴在主衣庫上敕五日一給仲雄蕭子顯齊書柳世隆少立功名晚專以談義自業善彈琴世稱公雙瑣為士品第一常自云馬舞第一清談第二彈琴第三在朝不干世務垂簾鼓琴風韻清遠甚獲世譽南史柳惲字文暢世隆次子也初宋時有稽元榮羊蓋者並善琴云傳戴安道法惲從之學特窮其妙齊竟陵王子良雅賞狎之子良常置酒後園有晉太傅謝安鳴琴在側援以授惲惲彈為雅弄子良曰卿巧越稽心妙臻羊體良質美乎信在今夜豈止當世稱奇亦可追橽古烈初父世隆彈琴為士流第一惲人世隆彈琴為士流第一惲每奏其父曲常感思復變體備寫古曲嘗賦詩未就以筆捶琴坐客過以筯扣之惲驚其哀韻乃製為雅音後傳擊琴自於此惲常以今聲轉棄古法乃著清調論具有條流上禇彥回嘗聚袁粲舍初秋涼夕風月甚美彥回援琴奏別鵠之曲宮商既調風神諧暢王彧謝莊併在坐撫節而歎曰以無纍之神合有道之器宮商暫離不可得已上齊江夏王鋒字宣頴性好琴書嘗覲武帝賜以寶裝琴仍於御前鼓之大見賞帝謂鄱陽王鏗曰闍黎琴亦是柳令之流亞其既事事有意吾欲試以臨人鏗曰昔鄒忌鼓琴威王委以國政乃出為南徐州刺史江祐嘗謂王宴曰江夏王有才行亦善能匿迹以琴道授羊景之景之著名而江夏掩能于世非止七絃而已百氏亦復如之鋒聞歎曰江祐遂復為混沌書眉欲益反弊耳寡人聲酒是耽狗馬是好豈復一豪於平生哉當時以為話言上鄭述祖字恭文開封人能鼓琴自造龍吟十弄云嘗夢異人彈琴寤而寫得當時以為絶妙北齊臨嶽顏黃門曰琴首更絃者為臨嶽絲綽云回風臨嶽修飾流離成公綏云臨嶽則齊州之丹林琴必以堅木藉絃趙師子邪利天水人也在隋為知音至唐真觀初獨步上京遽入琴苑疇之稽氏纍代居曹遂令曹郡琴者所修五弄具列於曹妙傳濮州司馬氏琴道不墜於地也師云吳聲清宛若長江廣流綿綿徐逝有國士之風蜀聲躁急若繫浪奔雷亦一時俊決也周書樂志司馬承禎睿宗引入中掖廷問其術帝曰廣成之言也錫寶琴霞紋被還之本傳斫製之妙蜀稱雷霄郭諒吳稱沈鐐張越霄諒清雅而沈細鐐越虛並鳴而響亮唐明皇反蜀召雷儼待詔襄陽馮昭亦善攻斫鬻之不售節使盧公鈞聞之見重受一張仍贈之詩自是馮氏門其屨滿矣陳氏樂書唐汧公李勉好雅琴嘗取桐梓之精者雜綴為之謂之百衲琴用蝸殼為之其間三面尤絶異通謂之響泉韻聲絃一上可十年不斷尚書故實汧公鎮宣武戎事之隙以琴書為娛自造琴聚新舊桐材扣之合律者則裁而膠綴不中者棄之故所蓄二琴殊絶所謂響泉韻磬者也性不善俗間音聲唯二寵妓曰秀奴七七皆聰惠善琴兼篳輿歌時令奏之自撰琴譜因話録自寶汧公雅好琴常斫桐又取漆筒為之多至數百張求者與之有絶代者一名響泉一名韻磬自寶於家京師又以樊氏路氏為第一路氏有房太尉石枕損之不理蜀氏斫桐琴常自品第一上者以玉次者以琴瑟又次以金徽螺蚌國史補泛聲張相弘靜夜會名家觀鄭宥彈琴宥調二絃至切各置一榻動宮則宮應動角則角應稍不切乃不應宥師董庭蘭尤善泛聲祝聲上韓晉公奉使入蜀至洛谷山椒巨樹聳茂可愛烏鳥之聲皆異下焉以探弓射其巔杪柯墜於下響震山谷有金石之韻使還戒縣尹募樵夫伐之取其幹載以歸召良匠斷之亦不知其名堅緻如紫石復金色線交結其間匠曰為胡琴槽他木不可並遂為二琴名大者曰大忽雷小者曰小忽雷因便殿德皇言樂遂獻大忽雷及禁中所有小忽雷在親仁里南部新書衛次公子字從周善鼓琴為渭南尉京兆尹李齊運使其子交歡欲次公授之琴次公拒之由是終身未嘗操絃舊唐于頔嘗令客彈琴其嫂知音聽於簾下歎曰三分之中一分箏聲二分琵琶聲絶無琴韻國史補心驅神遇趙璧彈五絃琴人問其術璧曰吾之五絃也始則心驅之中則神遇之終則天隨之方吾浩然眼如耳耳如鼻不知五絃之為璧璧之為五絃也語林裴說寬之姪孫佐西川韋皋幕善鼓琴時稱妙絶靈開山有美桐取而製以新樣遂謂之靈開渠南部新書琴有氣琴有氣曾識一道者相琴知吉凶酉陽雜俎處士求嬰性高古善拊琴去其瓜作肉聲有公子不善之嬰作色曰如樂其聲何不槌鼓聞者莫不大笑葆光録越客沈蚪子劉琴絃素絲七條其上備指一弄五聲叢鳴鳴中有靈峰橫空烏泉出雲鳳龍騰凌鶴哀烏啼松吟風悲舒元輿斫琴志錢忠懿王能琴遣使物色良琴使者至天台宿山寺聞瀑布聲止在簷外晨起視之瀑布下淙石處正對一屋柱而且向日私念曰若是桐木即良琴在是矣削之果桐也即賂寺僧易之取陽面二琴材以聞乞俟一年斫之既成獻忠懿一曰洗凡二曰清絶遂為曠代之寶挾琴牧羊勝之逸人也常挾琴牧羊巨澤漢王知其賢將聘焉委以國政勝之曰王廢牧羊之任而委四海之務是錯亂天下顛倒人倫竟赴於陰山之中大周正樂瓠巴六國時人也工琴好古因夏日俯於池亭鼓之感魚躍潛藻而聽焉上頴揚李氏處女年十五天寶中遘疾七日不食魂飛冥冥如升上景在雲霧中於女仙人蘆藕苖間受琴清風等五十曲琴書凡琴曲和樂而作命之曰暢暢者言其道之美暢猶不敢自安也憂愁而作命之曰操操者言困厄危迫猶不失其操也風俗通清角黃帝之琴號鐘齊桓公琴繞梁楚莊王琴緑綺司馬相如琴焦尾蔡雍琴鳳凰趙飛鸞琴上天中記卷四十二
