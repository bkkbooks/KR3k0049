body:
  text: 瑟伏羲作庖犧氏作瑟瑟潔也使人精潔於心淳一於行世本太昊伏羲氏作二十五絃之瑟以制婚姻之禮通曆或曰泰帝使素女鼓五十絃瑟悲帝禁不止故破其瑟為二十五絃漢郊祀志琴欲高張瑟欲下聲物理論昔古朱襄氏之治天下也多風而陽氣畜積萬物散解果實不成故士達作為五絃瑟以采陰氣以定群生瞽叟乃拌五絃之瑟作以為十五絃之舞命之曰大章以祭上帝舜立仰延乃拌瞽叟之所為瑟益之八絃以為二十三絃之瑟呂覽周穆王東巡西王母來奏環天之和樂列以重霄之寶器器有員山靜瑟員山其形圓也有大林雖疾風震地而林木不動以其木為琴瑟故曰琴瑟拾遺記師曠見太子晉師曠東躅其足曰善哉善哉王子曰太師乎何舉足驟師曠曰天氣之躅是以數舉也王子曰請入座遂敷席注瑟師曠曰歌無射曰國誠寧矣遠人來觀佾義經矣如樂無荒乃注色於王乎周書百里奚虞大夫晉君以女為秦穆夫人用奚為媵奚亡走宛楚人執之秦穆公知其賢欲厚貨以求之恐楚不與乃以羖羊皮贖之號五羖大夫秦遂以霸奚相秦其妻傭洗入宮見琴者毀之自言能鼓瑟歌曰百里奚母以死葬南溪墳以瓦覆以柴舂黃藜扼伏雞西入秦五羖皮今日富貴捐我為百里奚乃識之昔者孔子鼓瑟曾子子貢側門而聽曲終曾子曰嗟乎夫子瑟聲殆有貪狼之志邪辟之行何其不仁趨利之甚子貢以為然不對而入夫子望見子貢有諫過之色應難之狀釋瑟而待之子貢以曾子之言告子曰嗟夫夫參天下賢人也其習知音矣鄉者丘鼓瑟有鼠出遊狸見于屋循梁微行造焉而避厭有曲脊求而不得丘以瑟淫其音參以丘為貪狼邪僻不亦宜乎詩曰鼓鐘於宮聲聞於外子路鼓瑟有北鄙之聲孔子聞之曰信矣由之不才也冉有侍子曰求來爾奚不謂由夫先王之制音也奏中聲為中節流入於南不歸於北南者生育之鄉北者殺伐之域故君子執中以為本務生以為基故其音溫和而居中以象生育之氣憂愛悲痛之感不加乎心暴厲淫荒之動不存乎體夫然者乃治存之風安樂之為也彼小人則不然執末以論本務剛以為基故其音湫厲而微末以象殺伐之氣和節中正之感不加乎心溫嚴恭莊之動不存乎體夫殺者乃亂亡之風奔北之為也昔舜操南風之聲其興也勃焉至今王公述而不釋紂為北鄙之聲其廢也忽焉至今以為笑今由也匹夫之徒布衣之醜也既無意乎先王之制又有亡國之聲豈能保七尺之身哉冉有以告子路子路曰由之罪也小人不能自陷而入於斯宜矣夫子之言也遂自悔不食七日而骨立焉孔子曰由之過改矣説苑檀為瑟公輸子巧用材也不能以檀為瑟慎子齊宣王問匡倩曰儒者鼓瑟乎曰不也夫瑟以小絃為大聲以大絃為小聲是大小易序貴賤易位儒者以為害義故不鼓也宣王曰善仲尼曰與其使民諂下也寧使民諂上韓非子選笙賦齊瑟秦箏注史記蘇秦曰臨災其民無不吹竽鼓瑟歌録有齊瑟行曹子建詩齊瑟揚東謳秦箏發西嶽趙王遣使者之楚方鼓瑟而遣之誡之曰必如吾言使者曰王之鼓瑟未嘗悲若此也王曰宮商固方調矣使者曰調則何不書其柱耶王曰天有燥濕絃有緩急宮商移徙不可知是以不書使者曰明君之使人也任之以事不制以辭遭吉則賀之凶則弔之今楚趙相去千有餘里吉凶憂患不可豫知猶柱之不可書也詩云莘莘征夫每懷靡及説苑奏瑟趙惠文王與秦王會澠池秦王曰竊聞趙王好音請奏瑟趙王鼓瑟藺相如前曰竊聞秦王善為秦聲請奉盆蘇秦王以相娛樂秦王不懌為一擊鐃史本傳澠池之會趙王恥為偏鼓西征賦趙孝成王以趙括為將代廉頗藺相如曰王以名使括若膠柱而鼓瑟耳括使能讀其父書不知合變也本傳或曰以往聖人之法治將來辟猶膠柱而調瑟有諸曰有之楊子先知萬石君石奮其父趙人姊能鼓瑟高祖曰若能從我乎曰願盡力於是高祖召其姊為美人漢書瑟起元鼎六年春既滅南越李延年以好音見上善之益召歌兒作二十五絃及空侯瑟自此起志楊惲報孫會宗書曰惲本秦人能為秦聲婦趙女也雅善鼓瑟漢書趙女鼓瑟而鳳舞白帖莽何羅反走移臥內顧入行觸寶瑟僵仆金日磾得抱何羅因呼曰何羅反漢書天寶十年錢起從鄉薦居江湖客舍聞吟於庭中曰曲終人不見江上數峰青視之無所見矣明年崔暐試湘靈鼓瑟詩落句久不屬即用為末句因中選人以為鬼謠小説盧邁有寶瑟四各直數十萬有寒玉石罄響泉和志之號南部新書齊王好竽有求仕於齊者操瑟而往立王之門三年不得入叱曰吾瑟鼓之能使鬼神上下吾瑟鼓之合軒轅氏之律呂客罵之曰王好竽而子鼓瑟瑟雖工如王不好何是所謂工於瑟而不工於求齊也今舉進士於此世求祿利行道於此世而為文必使一世人不好得無與操瑟立齊門者比歟韓答陳書爾雅大瑟謂之灑疏云禮圖舊云雅瑟長一尺一寸廣一尺八寸二十三絃其常用者十九絃頌瑟長七尺二寸廣一尺八寸二十五絃盡用之夫瑟二十五絃其僕人鼓之則為笑賢者以其義鼓之欲樂則樂欲悲則悲雖有暴亦不為之變尸子唐相國李公集紀洪鐘駭聽瑤瑟清骨盻盻詩瑤瑟玉簫無意緒任從蛛網任從灰北李唐右史鄭休範贈妓天仙歌曰嚴吹如何下太清玉朋無軫六銖輕雖知不是流霞酌願聽雲和瑟一聲錦瑟何時詔取金錢會暫醉佳人錦瑟旁杜曲江錦瑟無端五十絃一絃一柱思華年李商隱詩用木人君冬至日使八能之士鼓黃鍾之瑟瑟用槐木長八尺一寸夏至日瑟用桑木長五尺七寸易通卦驗正德白虎通曰瑟者閉也所以懲忿室欲正人之德也蔡雍月令章句曰前其柱則清却其柱則濁任彥升哭范僕射詩寧知安歌日非君撤瑟晨儀禮曰有疾病者齊撤瑟琴動物八音之列數者金為長金聲之動物者鐘為大玉海凡金為樂器有六皆鐘之類也曰鐘曰鏄曰錞曰鐲曰鐃曰鐸鏄如鐘而大錞于也圓如錐頭上大下小所謂金錞和鼓也鐲鉦也形如小鐘軍行為鼓節鐃如鈴而無舌有柄而執之鐸如大鈴古今樂録造鐘黃帝工人垂所造宋志炎帝之孫鼓延始為鐘山海經黃帝作五聲以正五鐘一曰青鐘大音二曰赤鐘重心三曰黃鐘洗光四曰景鐘昧其明五曰黑鐘隱其常五聲既調然後作五行管子黃帝又命伶倫與榮將鑄十二鐘以和五音以施英韶始奏之命之曰咸池呂氏鏄鐘每鐘垂一簨虡各應律呂之音即黃帝所命伶倫鑄十二鐘和五音也隋志鳳舞高辛氏使鼓人拊鞞擊鐘鳳凰鼓翼而舞册府元龜顓頊居位乃揖四方之靈群后執圭以禮百辟各有班序受文德者錫以鐘磬受武德者錫以干戈有浮金之鐘沉明之磬以毛羽拂之則聲振百里石浮於水上如萍藻之輕取以為磬不加琢磨拾遺記教義禹之治天下也以五聲聽曰教寡人以義者擊鐘鬻子無射景王二十三年將鑄無射而為之大林單穆公曰不可王不德問律於伶州鳩對曰律所以立均出度也古之神瞽考中聲量之以制度律均鐘百官軌儀紀之以三平之以六成之於十二天之道也細鈞有鐘無鏄昭其大也大鈞有鏄無鐘鳴其細也王卒鑄大鐘二十四年鐘成周語昭二十一年春天王將鑄無射伶州鳩曰夫樂天子之職也音樂之輿也鐘音之器也天子省風以作樂器以鐘之輿以行之小者不窕大者不槬則和於物物和則嘉成今鐘槬矣王心弗堪豈能久乎左傳尚書大傳曰天子將出撞黃鍾之鐘右五鍾皆應入則撞賓之鐘左五鍾皆應太師于是奏樂疏黃鐘陽聲之首陽主動出則撞之右五鐘謂林鐘至應鐘謂陰主靜是動以告靜者賓在午陰生之月陰主靜入亦是靜左五鐘謂大呂至中呂左陽主動入靜以告動也太師以時奏采薺肆夏韓詩外傳同揚雄傳注東都賦注周禮樂師注昔厲公充潞之役秦來圖敗晉功魏顆以其身郤還秦師于輔氏親止杜回其勳銘于景鐘晉語崔駰達止銘昆吾之冶勒景襄之鐘後漢景公之鐘注鄭賂晉以歌鐘六律及其鏄磬女樂二八晉侯以樂之半賜魏絳絳始有金石之樂襄十擊鐘宋左師向巢每食擊鐘昭五九龍鐘闔閭伐楚燒高府之粟破九龍之鐘泰族訓楚為九龍之簴以垂鐘也注伍子胥任吳國之政也提邦以伐楚五戰而五勝入郢之門毀十龍之鐘賈子連語宿聞鐘聲吳公子札自衛如晉將宿于戚聞鐘聲焉曰異哉吾聞之辨而不德必加于戮夫子獲罪于君以在此懼猶不足而又何樂夫子之在此也猶燕之巢於幕上君又在殯而何以樂乎文子聞之終身不聽琴瑟襄二十九夜飲擊鐘鄭伯有嗜酒為窟室而夜飲酒擊鐘焉朝至未己三十鄭簡公謂子産曰飲酒之不樂鐘鼓不鳴寡人之任也國家之不義朝廷之不理與諸侯交之不得志子之任也子無入寡人之樂寡人無入子之朝自是以來子産理鄭城門不閉國無盜賊道無飢人孔子曰若鄭簡公之好樂也雖抱鐘而朝可也尸子景公為大鐘將懸之仲尼伯常騫晏子三人俱朝曰鐘將毀撞之果毀公召三子問之晏子對曰鐘大不以禮故曰將毀仲尼曰鐘大懸下其氣不得上薄故曰將毀伯常騫曰今日庚申雷日也陰莫勝於雷故曰將毀晏子春秋魯莊公鑄大鐘魯翽入見曰今國褊小而鐘大君何不圖之慎子晉平公鑄為鐘使工聽之皆以為調矣師曠曰不調請更鑄之公曰吾皆以為調矣師曠曰後世有知音者知鐘之不調也臣竊恥之至于師涓而果知鐘之不調也呂氏智伯將伐仇由而道難不通乃鑄大鐘遺仇由之君方車二軌仇由之君大悅除道將內之赤章曼枝曰此小所以事大也而今也大不來卒必隨之不可內也仇由之君不聽遂內之赤章曼枝因斷轂而驅至於齊七月而仇由亡矣韓非子子路答趙襄子曰建天下之鳴鐘撞之以莛豈能發其音聲哉説苑杜襲對曹操曰千鈞之弩不為鼷鼠發機萬石之鐘不以莛撞起音三國志王彪與陳思答贈偉長與公幹往復雖曰以莛扣鐘亦無間雅矣詩品聖主得賢臣頌曰伯牙操遞鐘注晉灼曰二十四鐘各有節奏擊之不常故曰遞漢王褒傳祕各有秦昭和鐘形制瑰譎其始得之豳雍間其銘首曰不顯朕皇且十有三公千石秦始皇建千石之鐘立萬石之簴説苑高廟中四鐘皆秦時廟鐘也重十二萬斤明帝徙二鐘在南宮古今樂録始皇造虡高三丈鐘小者千石初學記引三輔黃圖高祖廟鐘十枚各受十石撞之聲聞百里漢舊儀大鐘高帝總鄒魯之儒墨通先聖之遺教戴天子之旗乘大輅建九斿撞大鐘擊鳴鼓奏咸池揚千戚淮南汜論訓山崩漢武帝未央宮殿前鐘無故自鳴三日三夜不止大怪之召待詔王朔問之朔對曰有兵氣上更問東方朔朔對曰王朔知其一不知其二臣昔聞銅土之子以陰陽氣類言之子母相感山恐有崩弛者故鐘先鳴易曰鳴鶴在陰其子和之上曰應在幾日朔曰在五日內居三日南郡太守上言有山崩延袤二十餘里上大笑賜帛二十匹朔傳高帝平陵宣帝杜陵其鐘皆在長安夏侯征西欲徒詣洛陽重不能致縣在清明門裡道南其西者平陵鐘也東者杜陵鐘也晉潘嶽關中記古之人用鐘非特在陵雖廟亦用之東都賦發鯨魚鏗華鐘薛綜西京賦注曰海中有大魚曰鯨海邊又有獸名蒲牢蒲牢素畏鯨鯨魚擊蒲牢輒大鳴凡鐘欲令聲大者故作蒲牢於上所以撞之者為鯨魚鐘有篆刻之文故曰華鐘也西京賦洪鐘萬釣猛虡趪趪景福殿華鐘杌其高縣捍獸仡以麗陳山崩鐘鳴魏時殿前鐘忽鳴張華曰蜀銅山崩異苑盤鳴諧鐘昔晉人有銅藻盤無故自鳴問之於張茂先茂先扣之謂人曰此器與洛陽宮鐘聲相諧宮中撞鐘故鳴也若以鑢之音殊其鳴可止後果如其言樂纂受命而出元帝初鎮建業王導令郭璞筮之遇咸之井璞曰東北郡縣有武名者當出鐸以著受命之符其後建興二年晉陵武進縣人於田中得銅鐸五枚及帝為晉王又使璞筮之遇豫之暌璞曰會稽當出鐘以告成功上有勒銘應在人家井泥中得之由辭所謂先王作樂崇德殷薦之上帝者也及帝即位大典初會稽剡縣人果于井中得一鐘上有古文奇書十八字云會稽嶽命餘字時人莫識之璞曰蓋王者之作必有靈符塞天人之心與神物合契然後可以言天命矣觀五鐸之號于晉陵棧鐘告成于會稽鐸發其響鐘告其象瑞不失類出皆以方豈不偉哉晉書晉陵有金鐸之瑞郭璞云必致中興王廙傳趙將軍張珍領邑民徙洛陽六鐘猛簴九龍翁仲銅駝飛廉鐘一沒盟津中陜縣城西北二面帶河河中對城西北角水涌起銅鐘翁仲頭髮常出水上漲臧常與水齊晉軍當至髮不復出惟見水中嗟嗟有聲聞數里翁仲本在城內大司馬門外為賊所徙當西入關至此而沒戴延之西征記陜州黃河有銅鐘水大水小常自浮出每晦朔風雨之日輒鳴聲響悲亮行客聞之莫不愴然廣古今五行記豐山有鐘霜降則鳴黃河有鐘陰雨則鳴氣感之也山海經五行記出涕晉惠帝時殿前六鐘皆出涕五刻止裴子野宋略云永嘉元年因水有大鐘從豫章宜陽鐘山流出驗其銘乃秦時所造因以名山有巨石臨江如峽故又名鐘山峽袁州志下桓溫平洛陽議欲移洛陽鐘虡王述曰方蕩平區宇旋軫舊京不應先事鐘虡晉王述傳洛陽太極殿前大鐘六枚父老云曾欲有移此鐘者聚百數長絙挽之鐘聲振地自是莫敢復犯郭緣生述征録石勒耕輒聞鐘鐸之音或在前後懼以問翼伽伽曰作勞耳鳴無不祥也勒至平原賣與茌平人師歡家為奴有老父謂勒曰君魚龍發際上四道已成當貴為人主甲戌之歲王彭祖可圖勒曰若如公言不敢忘德忽然不見每耕又聞鼓角之聲勒又告諸奴諸奴亦聞之因曰吾初在家恆聞如是諸奴白歡歡奇而免之至是衆歸焉十六國春秋鐘有銅滓張永曉音律太極殿前鐘聲嘶宋孝武以問永答鐘有銅滓乃扣鐘求其處鑿而去之聲遂清越南史永瓌之父也唐太宗時創制禮樂召張文收與祖孝孫參定雅樂太樂古鐘十二近代惟用其七餘有五俗號啞鐘莫能通者文收吹律調之聲皆響徹時人咸服其妙舊唐高宗時擢太常丞太常𪍣黃鐘不能成李嗣真居崇業里疑土人有之弗得其所道上逢一車有鐸聲甚厲嗣真曰宮聲也市以歸振于空地若有應者掘之得鐘衆樂遂和李嗣真傳孫智亮開元中內殿修齊奏詔投龍于吉州笥山泊州江側有異氣在東川之中疑有古迹乃于皂閣山掘得銅鐘一枚重有餘斤鐘下得玉象三身因置閣皂觀南部新書天寶十年六月乙亥中書奏昨日辰時大同殿前鐘樓上鐘自鳴請宣示中外册府元龜占曰庶雄為亂五行志姑洗編鐘宋沇為太常卿每言諸懸鐘磬亡墜至若補亡者又乖律呂一日于光宅寺待漏聞塔上風鐸聲傾聽久之問寺僧曰塔鐸有一是古製寺衆言往往無風自搖洋洋自聞此非耶沇曰是耳必因祀祭考本懸鐘而應也因取觀之曰姑洗之編鐘耳詰旦獨綴于僧庭令樂工僧與同約其時彼扣樂懸此果應之遂購而獲焉曾送客出通化門路蓬度支軍乘馬俄傾忽駐馬揖客客隨乘至左藏認一鈴言亦編鐘也他人但覺銛鋒獨工不與軍者將莫知其餘後配諸懸音形皆合其度唐書閩城法炯者聞海壇綀門江內有巨鐘相傳云昔有人往廣州慕鑄信鼓巨艦至此忽值風濤沉溺每月望日其潮大至水退其蒲牢乃出可容一人從中穿過約其周圍徑一丈餘大歷中炯欲出此鐘先于開元寺設大會齋誦呪令一小僧詣龍宮乞鐘于人世擊扣以警晨昏小僧見海神曰我惜以鎮海別與小珠三顆為信當爾時小僧有如夢覺珠在手焉吳興武康大慈寺唐大曆中僧神悟欲鑄十鐘方作念間忽聞空中有聲徹數十里及鐘成聲聞果如其遠朝命致都下中途鐘忽自躍入水求之不得寺有神鐘記縣令韓章撰涔陽古鐘宣宗時涔陽耕者得古鐘高尺餘收叩之曰此姑洗角也既劘拭有刻在兩欒果然收博學強記常言瑟通黃鐘姑洗無射三均側出諸調楊收傳黎州聖鐘山古老相傳此山有鐘聲聞其聲而形不見南詔犯境鐘則預鳴唐天寶太和咸通乾符之載群蠻來寇皆有徵也昔有名僧講大乘經論鐘亦震鳴黎州圖經蒲牢鬥龍吉州龍魚觀有巨鐘上有文曰晉元康年鑄鐘頂有一核古老相傳則夫時鐘聲震長安遂有詔鑿之其竅是也天祐年中忽一夜失鐘所在至旦如故見蒲牢有血痕并蕬草蕬草者江南水草也葉如薤隨水深淺而生生觀前大江數夜居人聞江水風浪之聲至旦有漁者見江心有一紅旗水上流下漁者掉一舟往接取之至則見金鱗光耀波濤洶湧漁者急回始知蒲牢鬭傷江龍也玉堂間話吼躍入江祁陽縣白鶴觀觀有鐘重數百斤唐末一夕有雷雨忽鐘吼躍入江中後有客夜宿照潭夜夢一道流曰吾祈陽縣白鶴觀道士入歸久矣幸附后載客諾之遲明解纜忽有鐘臥水次有文曰祁陽白鶴觀鐘客悟載歸通州志王播客揚州木蘭院僧厭苦之飯後擊鐘後二紀播鎮揚州訪舊詩有曰上堂已了各西東慚愧闍梨飯後鐘碧紗籠之矣續云三十年來塵拂面如今始得碧紗籠托言北夢瑣言云假文昌嘶嗄光化三年冬武德殿前鐘聲忽嘶嗄丐銅鐘南蠻曇陵陀丐馬銅鐘帝與之金銀鐘南蠻婆賄伽盧國王宮設金銀二鐘寇至焚香擊之以占吉凶七寶鐘七寶所鑄高六尺廣二尺孟以之為馬希範壽希範以賜君山寺宋建炎中金人焚之建炎二年歲在戊申楊淵守吉州是年車駕駐驆維揚江南諸郡日虞金人深入時修城得銅鐘於城隅其上有文云唐京兆季愛子墓志唐興元初仲春中巳日吾季愛子築役于盧陵殞于西壘之顛吾時自王文昭政令命晦朔康定之始未欲塋於它山就瘞于西壘之垠吾卜茲土後當火德五九之間世衰道息浙梁相繼喪亂之時章貢康昌之日復工是壘吾亦復出是邦東平鳩工復使吾愛子之骨得同河伯聽命于水府矣京兆逸翁深浦記淵方有版築未成明年今日犯維揚車駕幸浙東金人遂渡江分兩路一犯明越車駕登海舟駐永嘉一犯洪吉太母保章貢淵失守既經兵火不知鐘所在癸丑呂源來守下車即修城不數月壁壘皆立東平鳩工之言亦驗去銅鐘銘得之劉僩退齋筆録時郡守命録之甫畢而鐘自碎近金為變怪也通考凌波入舟吳山三茅寧壽觀有唐鐘本唐澄清觀舊物紹與間有金聲震于太湖漁者莫能致湖濱寺觀爭以舟迎獨澄清觀迎之鐘凌波而上一引入于舟內丙辰九月二十四日戊午常州澄清觀女冠王玉山所造河東薛泚為之銘曰上德願而鑄洪鐘仙聖佑而人天從霜朝聞兮窈窕月夜聽而雍容蓮花生而腰淨頂銜饒于盤龍響上徹于天外聲下徹于九重庶長空于鬼獄魔屏迹而潛蹤杭州志撞鐘知君君子鑠金為鐘四時九乳是以撞鐘以知君鐘調則君道得宋均注曰九乳法九州樂汁圖徵黃鐘生一一生萬物故君子鑠金為鐘上聖王往承天定爵祿人者不過於能尊卑有位位有物物有宜功成者賞功敗者罰故樂用鐘宋均注曰不過謂量能授爵也有罪鳴鐘以攻之也上鐘之為言動也陰氣用事萬物動成鐘為器用金聲也鏄者時之聲也節度之所生也有節度則萬物昌無節度則萬物亡白虎通鐘之與磬也近之則鐘音亮遠之則磬音彰物固有近不若遠遠則不若近矣淮南昔張懷瓘在翰林時見古鐘紀夏禹之文皆紫金鈿以蛟篆博古圖歐陽修云唐詩夜半鐘聲到客船甚佳但夜半非撞鐘時按南史丘仲孚字公信少好學讀書常以中宵鐘鳴為限靈鞠常稱為千里駒也則夜半鐘吳中寺故事也王直方詩話金輪寺僧謙夜半詠中秋月得清光何處無之句喜極撞鐘江南野録鐘聲鏗鏗以立號號以立橫橫以立武君子聽鐘聲則思武臣樂記鳧氏為鐘兩欒謂之銑薄厚之所震動清濁之所由出侈弇之所由興有説鐘已厚則石已薄則播侈則柞弇則鬱長甬則震鐘大而短則其聲疾而短聞鐘小而長則其聲舒而遠聞冬官地室而懸晉郤至如楚聘饗之子反相為地室而懸焉郤至將登金奏作于下驚而走出左成十二為盤莒人伐我東鄙圍台季武子救台遂入鄆取其鐘以為公盤襄二季武子以所得於齊之兵作林鐘而銘魯功焉臧武仲謂季孫曰非禮也夫銘天子令德諸侯言時計功大夫稱代今稱代則下等也計功則借人也言時則妨民多矣何以為銘且夫大伐小取其所得以作彝器銘其功烈以示子孫昭明德而懲無禮也今將借人之力以救其死若之何銘之小國幸於大國而昭所獲焉以怒之亡之道也襄十九秦人賂晉侯歌鐘二肆注曰肆列也懸鐘十六為一肆二肆三十二枚上六郊雉皆雊齊景公族鑄大鐘撞之于庭下郊雉皆雊淮南族聚也鐘聲如雷震雉皆應之注叔孫相魯有子曰孟丙豎牛妬之叔孫為丙鑄鐘鐘成丙不敢擊使豎牛請之叔孫豎牛不為之請又欺之曰吾已為爾請之矣使爾擊之叔孫聞之曰丙不請而擅擊鐘遂怒之丙出奔齊韓子知公子卒未葬平公飲酒師曠李調侍鼓鐘杜蕢自外來聞鐘聲曰安在曰在寢杜蕢入寢歷階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北面坐飲之降趨而出檀弓擊編鐘磬師曰磬師掌教擊編鐘春秋掌金奏鐘師曰鐘師掌金奏上黃鐘之實黃鐘之數六分而為雌雄十二鐘鐘以三成故置一而三之凡積分十七萬七千一百四十七為黃鐘之實宋志二至清濁日冬至音比林鐘浸以濁日夏至音比黃鐘浸以清以十二月律應二十四時凡鐘磬各有筍虡寫鳥獸之形大聲有力者以為鐘虡清聲無力者以為磬虡初學所以懸鐘者橫曰筍筍峻也在上高峻也植曰簴簴舉也在傍舉筍也釋名梓人為簨虡天下大獸五脂者膏者羸者羽者鱗者宗廟之事脂者膏者以為牲羸者羽者鱗者以為筍虡外骨內骨郤行仄行連行紆行以脰鳴者以注鳴者以旁鳴者以翼鳴者以股鳴者以胸鳴者謂之小蟲之屬以為雕琢故擊其所懸而由其虡鳴小首而長摶身而鴻若是者謂之鱗屬以為簨削鐻梓慶削木為鐻鐻成見者驚猶鬼神魯侯問其術對曰臣將為鐻未嘗敢以耗氣也必齋以靜心齋三日而不敢懷慶賞爵祿齋五日不敢懷非譽巧拙齋七日輒然忘吾有四肢形體也然後入山林觀天性形軀至矣然後成見鐻然後加手焉不然則已莊子甘露元年建章未央長樂宮鐘虡銅人皆生毛長一寸所時以為美祥郊祀志師古曰虡神獸名也縣鐘之木刻飾為之因名曰虡也建武二十八年正月己巳賜東海王強虎賁旄頭鐘虡之樂後紀隋盧賁曰周武克殷得鶉火天駟之應其音用七漢興加應鐘故十六枚而在一虡立秋之樂磬立秋之樂也五經要義無句作磬世本堯臣磬叔所造樂録黃帝使伶倫造磬通禮義纂磬者夷則之器也象萬物之成也其聲磬故曰磬有貴賤焉有親踈焉有長幼焉朝廷之禮貴不讓賤所以有尊卑也鄉黨之禮長不讓幼所以明有年也宗廟之禮親不讓踈所以有親也此三者行然後王道得王道得然後萬物成天下樂用磬也白虎通磬磬以立辨辨以致死君子聽聲則思死封疆之臣沉明之磬顓頊居位奇祥衆祉莫不總集不稟正朔者越山航海而皆至也有浮金之鐘沉明之磬以羽毛拂之則聲振百里石浮於水一如萍藻之輕取以為磬不加磨琢拾遺記拊石堯命夔擊石拊石以象上帝玉磬之音以致舞獸呂覽虞書鄭注曰夔語舜云磬有大小豫擊大石磬拊小石磬則感百獸相率而舞大司樂疏臧文仲以鬯圭與玉磬如齊告糴曰不腆先君之敝器敢告滯積以紓執事齊人歸其玉而豫之糴魯語晉師從齊師入自丘輿擊馬陘齊侯使賓媚人賂以紀甗玉磬與地成二魯遺齊以請糴二以鬯圭齊賂晉以求成紀甗兼之心悲磬應鍾子期夜聞擊磬者而悲使人召而問之曰子何擊磬之悲也答曰臣之父不幸而殺人不得生臣之母得生而為公家為酒臣之身得生而為公家擊磬臣不覩臣之母三年矣昔為舍氏覩臣之母量所以贖之則無有量度而身固公家之財也是故悲也鍾子期嗟嘆曰悲夫悲夫心非臂也臂非椎非石也悲存乎心而木石應之故君子誠乎此而論乎彼感乎已而發乎人豈必強説乎哉呂覽洞陰西王母侍女成花君拊洞陰之磬漢武內傳武帝起騰光臺以望四遠於臺上撞碧玉之鐘挂懸黎之磬吹霜條之箎唱來雲依日之曲洞冥記漢武帝起招仙閣於甘泉宮西其上懸浮金輕玉之磬浮金者色如金自浮于水上輕玉者其質真明而輕上浮瀛即瀛州也上有青石可為磬磬者長一丈輕若鴻毛因輕而鳴拾遺記璆磬璆磬金鼓靈其有喜展詩應律鋗玉鳴師古曰璆美玉名以為磬也晉灼曰鳴玉聲也郊祀歌天地八成帝時揵為郡于水濱得石磬十六枚議者以為善祥劉向説上宜興雍辟設膠序隆雅頌之音以風化於天下磬之和酌允鑠肴樂胥歌投頌吹合雅又曰拮隔鳴球注韋昭曰玉磬也長楊魯恭王餘好治宮室壞孔子舊宅以廣其宮聞鐘磬琴瑟之聲遂不復壞漢書建武十九年拜為博士車駕幸大學會諸博士論難又詔諸生雅吹擊磬盡日乃罷桓榮傳采玉造晉太常賀循奏置登歌簨虡采玉造小磬謝常為鎮西將軍鎮壽陽采拾樂人制石磬以備太樂江鐘石之樂自常始也樂志寧守豫章大設庠序遣人往交州採石磬以供學用本鳴石共水鳴石郭璞注永康元年襄陽郡上鳴君似玉色青撞之聲聞七八里山海經隋文帝開皇十四年於翟泉獲玉磬十四垂之于庭有一素衣神人來擊之其聲妙絶洽聞記總章中潤州嘗得玉磬十二以獻張率更文收叩其一曰是晉某歲所造也是歲閏月造磬者法月數當有十三今缺其一宜于黃鐘東九尺掘之必得焉求之如言國史纂異宴樂張文女所造也樂用玉磬一架登歌磬以玉為之大樂令壁記楊妃善擊磬明皇令取藍田緑玉琢之備極精巧幸蜀還乃送太常藏之開元傳信記天寶中始廢泗濱磬用華原石代之詢諸磬人則曰故老云泗濱磬下調之不能和得華原石考之乃和由是不改白居易作華原磬詩刺樂工非其人玉泗濱石可為磬近代出自華原通典天寶中廢泗濱磬而以華原石代之卒致祿氏之禍陳氏樂書潞城縣令周混妻韋璜乾元中卒月餘忽至其家靈語云太山府君嫁女令我裝束染紅借家婢暫去家人難之韋云但借兩日耳若過兩日則宜擊磬呼之夫磬聲一振鬼神皆聞廣異記磬與鐘應洛陽有僧房中磬子聲輒自鳴僧懼而成疾曹紹夔來問疾僧具以告俄擊齊鐘磬復作聲紹夔笑曰明日當為除之僧設饌以待紹夔食訖出錯鑢磬數起而去其聲遂絶僧苦問其所以紹夔云磬與鐘律合擊彼此應僧大喜其疾亦愈國史異纂江南李建勳嘗蓄一玉磬尺餘以沉香節按柄扣之聲極清越客有談及猥俗之語者則急起擊石磬數聲曰聊代清耳名曰泗濱友澄懷録少華之山其陰多磬鳥危之山其陽多磬嵩山涇水出焉其中多磬則磬石所自固雖不一要之適陰陽之和者泗濱所貢浮磬而已蓋取其土少而水多其聲和且潤也陳氏樂書八音以石為君故詩言依我磬聲韶樂以球為首三代之樂皆準于磬鳴球天成而不可易者琴瑟笙竿皆人為之高下難齊故協之以磬玉景祐二年李照鍊白石以為磬範中金以作鐘六月九日左司諫姚仲孫言其詭異風俗通曰鼓者郭也春分之音萬物皆鼓甲而出故謂之鼓易曰鼓之以雷霆則其所象也不知誰之所造世本曰夷作鼓又曰巫咸作鼓大周正樂曰劉貺曰鼓動也冬至之音萬物含陽氣而動群音之長鼓所以檢樂為群音之長也五經要義鼓鼙之聲歡歡以立動動以正衆君子聽鼓鼙之聲則思將帥之臣樂記書曰鼓其聲象雷其大象天其樂象君故凡鼓瑟鼓琴鼓鐘鼓簧鼓缶皆謂之鼓以五音非鼓不節也荀卿曰鐘象天鼓象地土鼓土鼓蕢桴葦籥伊耆氏之聲也明堂位注伊耆氏古天子有天下之號禮運注築土為鼓以土鼓為桴桴擊鼓之物黃帝殺夔以其皮為鼓撅以雷獸之鼓而聲聞五百里帝王世紀帝伐蚩尤元女為帝製夔牛鼓八十面一震五百里連震三千八百里黃帝內傳黃帝得奇獸名曰夔取皮以昌鼓聲聞五百里莊子什文夔一足之獸也其音如雷建鼓建鼓者謂少昊氏作大鼓為衆樂之節徐景安樂書鞞鼓高辛氏使鼓人拊鞞鼓擊鐘磬鳳凰鼓翼而舞于庭宋符瑞志敢諫堯立敢諫之鼓淮南漢劉輔傳昭有虞之聽師古曰舜有敢諫之鼓故言有虞之聽堯舜禹湯武王伐鼛而食奏雍而徹已飯而祭可謂至貴矣然戰戰栗栗日慎一日注鼛鼓王者之食樂也詩云鼓鐘伐鼛雍已食之樂也淮南建鼓禹立建鼓於而備訊矣管子柦公問禹有立鼓之訊水經警衆天子觀學大昕鼓以警衆也文王世子天子讀書於黎丘奏廣樂而遺其靈鼓又天子靈鼓警衆穆天子傳衛子魚曰成王分唐叔大路之旗密須之鼓闕鞏之甲姑洗之鐘命以唐誥而封於夏墟定四晉荀躒如周以文伯宴樽以魯壺王曰叔父唐叔成王之母弟也其反無分乎密須之鼓與其大路文所以大搜也昭十五魯莊公及齊戰于長勺公將鼓之曹劌曰未可齊人三鼓劌曰可矣齊師敗績云云公問其故劌對曰夫戰勇氣也一鼓作氣再而衰三而竭彼竭我盈故克之莊十聲氣宋襄公及楚人戰於泓公子魚曰三軍以利用也金鼓以聲氣也利而用之阻隘可也聲盛致志鼓儳可也僖二十二抱鼓桓公使鮑叔為宰辭曰管夷吾執枹鼓立于軍門使百姓加勇焉弗若也齊語齊晉戰于鞍邴夏御齊侯逢丑父為右晉解張御郤克鄭丘緩為右齊侯曰余姑翦滅此而朝食不介馬而馳之郤克傷於矢流血及屨未絶鼓音曰余病矣張侯曰自始合而矢貫余手及肘余折以御左輪朱殷豈敢言病吾子忍之緩曰自始合茍有險余必下推車子豈識之然子病矣張侯曰師之耳目在吾旗鼓進退從之此車一人殿之可以集事若之何其以病敗君之大事也吾子勉之左并轡右援袍而鼓馬逸不能止師從之齊師敗績成二石鼓文在鳳翔天興縣南二十許里石形如鼓其數有十蓋紀周宣畋獵之事即史籀之迹也貞觀中吏部侍郎蘇勉紀其事云虞禇歐陽共稱古妙雖歲久訛缺遺迹尚可觀郡縣志楚厲王有警為鼓以與百姓為戒飲酒醉過而擊之也民大驚使人止曰吾醉而與左右戲過擊之也民皆罷居數月有警擊鼓而民不赴乃更令明號而民信之韓子吳王夫差移于建康之宮南門有雙鶴從鼓中而飛上入雲中吳録靈鼉李斯上秦始皇書曰建翠鳳之作靈鱓之鼓上林賦建翠華之植靈鼉之鼓注曰以皮冒鼓也埤雅曰鼉鼓非特有取于皮亦其鼓聲逢逢然象鼉之鳴聲晉安海物記曰鼉宵鳴如桴鼓今江淮之間謂鼉鳴為鼉鼓亦或謂之鼉更趙辟公雜記曰鼉聞鼓聲則鳴續博物志曰其聲如鼓東方朔曰撞萬石之鐘擊雷霆之鼓詩靈臺曰鼉鼓逢逢矇瞍奏公聖鼓始與郡山陽縣有豫章木本徑可二丈名為聖木秦時伐此木為鼓顙顙成忽自奔逸北至桂陽盛宏之荊州記息于臨武遂之始興洛陽因名聖鼓城今在臨武始興記春秋孔演圖有人卯金興于豐擊玉鼓駕六龍春秋緯亦有玉鼓王尊謁東平王太傅在前説相鼠之詩尊曰無持布鼓過雷門師古曰雷門會稽城門也有太鼓越擊此鼓聲聞洛陽漢書李陵擊胸奴夜擊鼓起士鼓不鳴陵曰吾士氣少衰而鼓不起何耶軍中豈有女子乎搜軍中得卒妻皆斬之上何並傳建鼓注建鼓一名植鼓縣有此鼓者所以召集號令為開閉之時嚴鼓史丹傳元帝建昭之間留好音樂或置鼙鼓殿下天子自臨軒檻上隤銅凡以擲鼓聲中嚴鼓之節定陶王亦能之注晉灼曰疾擊鼓師古曰鼙騎上之鼓晉傳王喬為葉令每當朝華門下鼓不擊自鳴聞于京師明帝乃迎取置都亭下略無人聲焉後漢書禰衡被魏武謫為鼓吏正月半試鼓衡揚枹為漁陽摻撾淵淵有金石聲四坐為之改容操笑曰本欲辱衡衡反辱孤衡對曰不敢以先王之法服為伶倫之衣孔融曰禰衡罪同胥靡不能發明王之夢魂武慚而赦之世説漢書徐鍇任江左校祕書時吳淑為校理古樂府中有摻字淑多改為曺蓋章草之變鍇曰非可以一例若漁陽摻者音七鑒反三擲鼓也禰衡作漁陽摻撾古歌云邊城晏開漁陽槮黃塵蕭蕭白日暗叔歎服之馬援於交趾得駱越銅鼓鑄為馬式注廣州記曰狸獠鑄銅為鼓鼓惟高大為貴面闊丈餘祁成垂之于廷尅晨置酒招置同類來者盈門豪富子女以金銀為大鼓執以叩鼓叩畢留遺主人本傳夏正三朝撞洪鐘伐靈鼓旁震八鄙軯戩隱訇若疾霆轉雷而激迅風也東京賦登聞泰始五年六月西平人麴路伐登聞鼓言多祅謗晉紀劉由等執黃幡撾聞鼓上言衛瓘傳王大將軍年少時舊有田舍名語音亦楚武帝喚時賢共言技藝事人皆多有所知唯王都無所聞意色殊惡自言知打鼓吹帝令取鼓與之於坐振袖而起揚捶奮擊音節諧捷神氣豪上傍若無人舉坐歎其佳爽世説鳴如人弄蘇峻在歷陽外營將軍鼓自鳴如人弄鼓者峻手自破之曰我鄉土時有此則城空矣俄而作亂夷滅此聽不聰之罰也潛鶴鼓郡西有白鵠山上有石鼓元嘉中居人祀山神乃椎此鼓數十里聞如金石之響相傳云此山有鵠飛入會稽郡雷門鼓中打鼓聲洛陽聞之後孫恩亂兵擊破中有二鶴沖天而去自是不復鳴後人呼為潛鶴鼓六朝事迹晉嘗遣偏師謝咸攻東陽東陽岑山下民聞嶺上有鼓鞞聲若數萬人咸既破潰而山鼓亦絶東陽記姚泓永和元年天水郡石鼓鳴聞數百里野雉皆雊後秦記細腰鼓蕭思話年十許歲好騎屋棟打細腰鼓沈約宋書孫挹為延陵縣令國子助教高爽詣之挹了無故人懷爽出從閣下過取筆書鼓面人徒有此大腹了自無肝腸面皮如許厚被打未遽央南史談藪作身有八尺圍腹內無寸腸元魏置大鼓于白樓之上晨昏伐以千椎為城里諸門啓閉之候謂之戒晨鼓也水經注齊李崇為兗州刺史劫盜崇乃村置一樓樓懸一鼓盜發之處捶鼓亂擊諸村始聞者捶鼓一通次聞者復撾以為節俄頃之間聲布百里伏其險要無不擒獲諸州置鼓自此始也時號臥虎後周裴俠為工部中大夫疾沉頓忽聞五更鼓驚起曰可向府耶遂瘳晉公護曰危篤若此不廢愛公因鼓聲疾遂愈天祐其勤也史先是京城諸街每至晨暮遣人傳呼以警衆馬周遂奏諸街置鼓每擊以警衆令罷傳呼時人便之舊唐周上言令金吾每街懸鼓夜擊止其行李以備竊盜時人遂呼為鼕鼕鼓也雍洛靈異小録有道人裴修戲為詞云遮莫鼕鼕鼓須傾滿滿杯金吾若相間報道玉山顏宮中擊鼓張元素太子承乾嘗于宮中擊鼓聲聞于外元素叩閣請見極言切諫承乾乃出宮內鼓對元素毀之唐書開元中有三衛至華嶽廟前見青衣引見一婦人華嶽第三新婦為嶽子所薄憑寓書于北海後至陰復見前婦人謝云三郎以附書之故將害于君君且還不久大駕東幸鬼神畏鼓若坐于鼓車則無慮也言訖不見廣異記杜鴻漸自蜀南始臨加陵江乘月色與從事楊炎杜亞輩登驛樓望江日行觴宴話命家童取羯鼓酣奏數曲四一作西山猿鳥皆驚飛嗚噭衆悉異之曰昔夔之擊撫百獸舞庭此豈遠耶鴻漸曰某有別墅近華嚴閣嘉時登閣奏此忽見群羊躑躅于山下某不謂以鼓然也及止群羊亦止復鼓羊亦然旋有二犬走而吠之及群羊側遂俯仰若有所聽少選則復宛頸搖尾亦從而變態是知率舞固不難矣羯鼓出外夷以戎羯之鼓曰羯鼓羯鼓録玄宗好羯鼓而寧王善吹橫笛帝常稱羯鼓八音之領褎諸樂不可方也蓋本戎羯之樂其音太簇一均龜茲高昌疏勒天竺部皆用之其聲焦殺特異衆樂志玄宗洞曉音律由之天縱凡是管絃悉造其妙若製作曲調隨意即成雖古之夔曠無以過尤愛羯鼓橫笛云八音之領袖也諸樂不可為北嘗值二月詰旦巾櫛方畢時宿雨初晴景色明麗小殿庭內柳杏將吐高力士遣取羯鼓上旋命之臨軒縱擊一曲名春光好神思自得又製秋風高每至秋空逈徹纖羅不起即奏之必遠風徐來庭葉墮落其妙絶入神也如此上性雋邁酷不好琴嘗聽彈正弄未及畢叱琴者曰待詔出去謂宦者曰速召花奴將羯鼓來為我解穢宋開府雖耿介不倫亦深好聲樂尤善羯鼓始承恩顧與上論鼓事曰頭如青山峯手似白兩點案此即羯鼓之能事山峯欲不動雨點取碎急東都留守鄭淑祖母即開封之女今尊賢畢鄭氏第小樓即是夫人習鼓之所也曹嗣王皋為荊南節度使有客懷二捲見之皋捧而嘆曰此至寶也必開元中供御捲也已而問之果得于高力士矣杜鴻漸為三川副元帥成都匠者有以二杖獻之鴻漸示于衆曰此尤物也必常衣襟下收之積時也已而問之果養之脊溝中二十年矣廣德中蜀客前雙流縣丞李琬者嘗至長安夜聞羯鼓聲曲頗妙謂鼓工曰君所擊者豈非耶婆色雞乎雖至精能然而無尾何也工大異之曰君固知音者具言所以琬曰夫耶婆色雞掘柘急遍解之工如所教果能諧協而盡其聲矣工泣而謝之柘枝用渾脫解甘州用結了頭解之類是也並羯鼓録不嗚貞元十三年六月丙寅天晦街鼓不嗚貞元中驃國進樂有銅鼓咸通末龔州刺史張直方因葺城池掘得一銅鼓捨于延慶以代木魚僖宗朝林藹守高州鄉野牧童聞田中蛤嗚欲進捕之一蛤躍入穴中掘而取之得一銅鼓其上隱起多鑄蛙黽之狀豈嗚鴿乃銅鼓之精耶嶺表録異鄭餘慶兼判太常卿事初德宗自山南還宮關輔有懷光吐蕃之虞都下驚擾遂詔太常習樂去大鼓至是餘慶始奏復用大鼓唐書新進士放榜後翌日排建福門候謁宰相有詩曰華陽觀裏鐘聲起建福門前鼓動時即其事也南部新書張薦明為道士高祖召見延入內殿薦明聞宮中奏時鼓曰陛下聞鼓乎其聲一而已五音十二律鼓無一焉然和之者鼓也五代史成都不打晚衙鼓劉仲張潛夫皆云孟蜀多以晚鼓戮人埋野場中故鳴則鬼祟必作矣自是成都倒不打鼓耳目記鼓妖范仲淹一日攜子純仁訪民間民舍有鼓為妖坐未幾鼓自風躍至庭不已民舍皆服栗仲淹徐謂純仁曰此鼓久不擊見好客至故自來庭以尋槌耳令純仁削槌以赴之其鼓立碎陳叔夏得銅鼓甚大其飾為蚩尤飛廉塗善金而光耀不滅其銘曰龍升元年七月大將渙崔鴻十六國書赫連勃勃以銅為大鼓及飛廉翁仲銅駝龍虎以黃金飾之列於宮殿之前疑即此龍升大夏年號也廣川書鼓西溪鎮聖果院有鼓相傳保太中海潮飄至故范希文有高麗鼓半穿之句宋范延賞過金陵張忠定公為守問曰天使沿路來還見好官員否曰昨過萍鄉邑長張希顏者好官員也野無惰農市無賭博更鼓分明必有美政也守即日同薦于朝凡天神之類皆以雷鼓地祗之類皆以靈鼓人鬼之類皆以路鼓樂志紹熙二年溫州瑞安縣感應侯鼓自鳴後邑有巨寇舁鼓去先是鼓上有書曰鼓響盜長鼓壞盜敗寇果以旬日就戮與晉志隆安石鼓鳴孫恩同古通考吳興長城夏架山有石鼓長丈餘面徑三尺所下有盤石為足鳴則聲如金鼓三吳有兵至安帝隆安中大鳴後有孫恩之亂晉志石鼓八方之荒有石鼓焉蒙之以皮其音如雷神異經城東祠山有石鼓將有寇難則鳴所以豫警備也齊地記逢山有祠并石人石齊世將亂石人輒打鼓聞數十里郭緣志述征記浮山東石鼓下有兩石鼓扣之清越所謂神鉦也羅浮山記洞庭山有宮五門東有石樓樓下兩石鼓扣之其聲清越世所謂神鉦也晉孝武樂章曰神鉦一震九域同來郡國志冀縣有天鼓山有石如鼓河鼓星搖動則石鼓鳴鳴則秦上有殃酉陽雜俎磁州武安縣南有鼓山上有二石如鼓南北相當世傳鼓鳴則有兵起高齊之末此鼓嘗鳴而齊為周所併隋文帝末年鼓又自鳴聲聞數百里而唐代隋以興故一名神鉦山川紀異金胡礪碑後周敞為交趾刺史伐龍山木以為鼓以下分鼓給桂林郡上分鼓給交趾郡擊一鼓則二鼓皆鳴輿地志南雄之俗鑄銅為鼓欲將攻擊則鳴此鼓到者如雲家有鼓者號為音老雜録耳目晉解張曰師之耳目在吾旗鼓進退從之成笛始風俗通曰笛漢武時丘仲所作也按宋玉有笛賦玉在漢前又馬融長笛賦云近代雙笛從羌起羌人伐竹未及已龍吟水中不見矣截竹吹之聲相似鳳鳴黃帝使伶倫伐竹於昆溪斬而作笛吹之作鳳鳴御覽引史記昭華高祖初入咸陽宮周行府庫金玉珍寶不可稱言其尤驚異者有玉笛長二尺三寸二十六孔吹之則見車馬山林隱轔相次吹息亦不復見銘曰昭華之琯西京馬融性好音能鼓琴吹笛為督郵獨臥郿縣平陽塢中有洛客舍旅吹笛相和融去京師踰年暫聞甚悲而樂之追慕簫琴皆有頌而笛無乃作長笛頌長笛賦序蔡雍告吳人曰吾昔嘗經會稽高遷亭見屋椽竹東間第十六可以為笛取用果有異聲文士傳余同僚桓子野有故長笛傳之耆老云蔡雍所製也初雍避難江南宿於柯亭之館以竹為椽雍仰而盻之曰良竹也取以為笛奇聲獨絶歷代傳之伏滔長笛賦序向秀思舊賦序云余少與稽康呂安居止接近其後各以事見法逝將西邁經其舊廬于時日薄虞淵寒冰凄然鄰人有吹笛者發聲寥亮追想疇昔遊宴之女感音而嘆之故作賦云帝舅王愷嘗置酒王導王敦俱往女妓吹笛小失愷意便令黃門毆殺之一坐改容愷神色自若也善吹列和善吹笛吳姬之聲無以加也傳子太始十年中書監荀勗中書令張華令郝玉鼓瑟宋同吹笛以為雜引相和宋書荀勗問列和曰若不知律呂之義作樂者均高下清濁之調當以何名之和曰每合樂時隨歌者清濁聲假聲濁者用三尺二笛因名曰此三尺二調聲清者用二尺九笛因名曰此二尺九調漢魏相傳施行皆然也晉書宋禕是石崇妓緑珠姊子有國色善吹笛后在晉明帝宮帝疾患危篤群臣進諫請出宋禕時朝賢悉見帝曰卿諸人誰與得者衆人無言阮遙集時為吏部尚書對曰願以賜臣即與之世説永嘉中太山民巢氏先為相縣令居在晉陵家婢採薪忽有一人追隨婢還家不使人見與婢宴飲輒吹笛而歌歌云間夜寂寂清長笛亮且鳴若欲知我者姓郭字長生幽明録謝仁祖妾阿紀有國色善吹笛仁祖死阿紀誓死不嫁郗曇時為北中郎設權詐遂得阿紀為妾阿紀終身不與曇言上桓伊字叔夏善音樂有蔡雍椅亭笛嘗吹之王徽之赴京泊舟青溪側伊素不相識于岸上過徽之便使人謂之曰聞君善吹笛試為我一奏伊時已貴顯素明徽之名便下車踞胡床為作三調之弄便上車去終始不交一言代郡界有一亭常有怪不可詣忽有諸生壯勇行歌止宿鬼吹五孔笛一手都不能得攝笛諸生便笑謂汝止有一手那得遍笛我為汝吹來鬼云謂我少指耶乃數十指出諸生拔劍斫之得一老雄雞從者並雞雛耳幽冥録紫玉笛涼州人發涼王張駿墓得赤玉簫紫玉笛三十國春秋假龜龍涼州記云呂纂時胡人云云安公子始自煬帝將幸江都時有樂工於笛中吹其父病廢于臥內聞之乃問其子曰何得此曲子對曰宮中雜翻也父歔欷問其子曰宮曰君商曰臣宮聲往而不返大駕東巡必不還矣汝可托疾勿去也其精鑒如此樂府雜録假安節漢中王瑀為太卿早起朝聞永興里人吹笛問是太常樂人否曰然已後因閲樂而喚之問曰何得某日臥吹笛耶傳記明皇置五王帳長枕大被與兄弟共處其間妃子無何竊寧王紫玉笛吹故張祐詩云梨花靜院無人見間把寧王玉笛吹因此忤旨放出外傳玄宗嘗坐朝時以手指上下按其腹朝退高力士進曰陛下向來數以手指按其腹豈非聖體小不愈耶玄宗曰非也吾昨夜夢遊月宮諸仙娛余以上清之樂流亮清越殆非人所聞也酣醉久之合奏清樂以送吾歸其曲凄楚動人杳杳在耳吾向以玉笛尋盡得矣坐朝之際慮或遺忘故懷玉笛時以上下尋之非不安也力士再拜賀曰非常之事也願陛下為臣以奏之上試奏其音寥寥然不可名也力士又奏拜且請其名上笑曰此曲名紫雲回載于樂章今太常刻石在焉開天傳信記獨孤裂笛李謨者開元中吹笛為第一部有故至越州時州客舉進士者十人同邀于湖上吹笛有獨孤文者與坐漸移舟湖心李生捧筆一發水木森然倣佛如有鬼神之來坐客皆更替詠之獨孤生乃無一言李生忿其輕已又靜思作一曲更加妙絶無不賞駭李生更有一笛拂拭以進獨孤曰此都不堪取執者粗通耳乃換之曰此至入破必裂吝惜否李生謝不敢遂吹聲發入雲四座震栗李生蹙踖不敢動至十三疊歌示謬誤之處敬伏將拜及入破笛遂裂不復終曲李生再拜衆皆悚息乃散逸史明皇自蜀來居南內夜闌登政樓憑欄南望煙月滿目貴妃侍者紅桃在焉歌涼州之詞貴妃所製也上親御玉笛為之倚曲曲罷相視無不掩泣上因廣其曲外傳開元中李謨善吹笛獨步當時越州刺史皇甫政月夜泛鑑湖命謨吹笛謨為之盡妙時有一老父泛舟聽之因奏一聲湖波搖動笛遂中裂即探懷中一笛以畢其曲政視之有三龍翔舟而聽老人曲終以笛付謨吹之竟不能聲而老父亦失所在樂府雜録天下第一李丹好事嘗得村舍煙竹截為笛堅如鐵石以遺李謨謨吹笛天下第一月夜泛江與同舟人吹寥亮逸發俄有客於岸呼舟請載既至請笛而吹甚為精妙山石可裂謨平生未嘗見及入破呼吸盤劈應指粉碎客散不知所之舟著記疑其蛟龍也國史補舟人怨悲李謨嘗秋夜吹笛于瓜州楫載甚隘初發調群動皆息及數奏微風颯然立至有頃舟人賈客有怨歎悲泣之聲上許雲封樂工之工笛者貞元初韋應物自蘭臺郎出為和州牧非所宜願頗不得志輕舟東下夜泊舟中相與語久之韋公曰我有乳母子名千金天寶中受笛李供奉藝成身死每所悲嗟舊吹之笛李君所賜也遂囊出舊笛雲封跪捧悲切撫而觀之曰信是佳笛但非外祖所吹者乃謂韋公曰竹生雲夢之南鑒在柯亭之下以今年七月望前生明年七月望前伐過期不伐則其音實未期而伐則其音泛泛者外澤中乾乾者受氣不全氣不全則其竹天凡發揚一聲出入九息古之至音者一疊十二節一節十二敲今之名樂也至如落梅流韻感金谷之遊人折柳傳情悲玉關之成客誠有清響異音非至音無以降神而祈福也其已天之竹遇至音必破所以知非外祖所吹者韋公曰欲信汝鑒笛破無傷雲封乃捧笛吹亦州遍一疊未盡劃然中裂韋公驚嘆久之遂禮雲封於曲部甘澤謠賈客呂筠卿嘗於中春夜泊舟於君山側命酒吹笛數曲忽見一老父拏舟而來遂于懷袖間出笛三管其一大如合拱其次如常人之所蓄其一絶小如細筆管筠卿請老父一吹老父曰其大者諸天之樂不可發其次者對洞府諸仙合樂而吹其小者是老身與朋儕可樂者試為子吹之不知可終一曲否言畢抽笛吹三聲湖上風動波濤沆漾魚龍跳噴五聲六聲君山上鳥獸叫噪月色昏昧舟人大恐老父遂止博異志猿臂有人以猿臂骨為笛吹之清聲圖絶勝竹酉陽雜俎范敏下第往鄆州訪故人暑月夜行至一田舍遇一婦人自稱唐莊宗內樂部笛首為敏吹笛敏問其曲云名清秋月莊宗自製者也帝最愛夜月夜自橫笛吹數曲故為曲名明視之則一孤塜也青瑣高議余靖知桂州時每至月盈之夕輒有笛聲發於一林中甚清遠土人云聞之已數十年遣視乃自大柏木中出也伐取以為枕笛聲如期而發公甚寶惜後數年季弟欲窮其怪命工解視其木紋理正如人月下吹笛象雖善畫者莫及重以膠合之則不復有聲遁齋間覽萬波息新羅神文王時東海中有小山浮來隨波往來王異之泛海入其山且有一竿竹命以作笛吹此笛則兵退病愈旱雨雨晴風定波平號萬息波笛歷代寶傳之至孝昭王加號萬萬波波息笛朝鮮志又有玉笛長尺有九寸其聲清亮云東海龍所獻太原姚康成奉使汧隴假邢云舊必就寢后見三人賦詩其一長細而黃面多瘡孔詠曰當時得意氣瑱心一曲君前值萬金今日不如庭下竹風來猶得學龍吟候曉視之乃見破笛一管靈怪集宋嘉祐中王疇欲定大樂嘗就成都房庶取玳瑁古笛以校金石通考唐玄宗時樂人孫處秀善吹笛好作犯聲當時皆以為新意流美樂人皆效之其聲變態日增因有犯調犯調即今之所尚也樂纂變聲符旨文宗時雲朝霞以善吹笛進士為新聲雅樂朝霞能承意變聲頓符上旨由是有寵唐書樂纂曰橫笛小箎也梁朝歌云快馬不須鞭拗折楊柳枝下馬吹橫笛愁殺路傍兒後世有長笛有短笛有義觜笛義觜笛如橫笛而加觜西涼樂也考索釋名曰簫肅也其聲肅肅而清也風俗通曰簫作竹簫其形參差以象鳳翼十管長尺二寸隋音樂志曰簫十六管長二尺舜所造者也通禮義纂曰伏羲作簫十六管事始云女媧造簫者中呂之氣萬物生於無聲見於無形僇也簫也故謂之簫白虎通易卦通驗曰夏至之樂補以簫鄭元注曰簫亦管也形似鳳翼鳳火禽也火數七夏時又用火事天籟南郭子綦謂顏成子遊曰汝聞人籟而未聞地籟汝聞地籟而未聞天籟郭象注曰天籟簫也莊子上下客有以吹籟廣雅云簫謂之籟見越王者上下宮商而越王不喜也或為之野音而王反悅之亦有如此者要在聽之而已呂氏春秋吳市伍子胥鼓腹吹簫乞食于吳市中史記賣餳之人吹簫以自表也給喪周勃以織薄曲為生常為人吹簫給喪事史記善吹漢元帝多材藝吹洞簫自度曲被歌聲也漢書馬先生能使木人吹簫比妙般輸翟墨曰不劣古矣傳子明皇天寶中安祿山自范陽入覲獻白玉簫管數百陳于梨園通考張昌宗得幸於武后武后謂為王子晉后見使被羽衣吹簫乘寓鶴徘徊庭中如仙人狀簫管竹江寧縣南四十里慈姥山積石臨江生簫管竹玉褒洞簫賦所稱即此也其竹圓緻異于衆處自伶倫採竹嶰谷其後惟此簳見珍故歷代常給樂府而俗呼鼓吹山丹陽記元帝多材藝善史書鼓琴瑟吹洞簫自度曲被歌聲分刌節度窮極幻妙漢贊帝為太子嘉褒所為洞簫頌令後宮貴人皆誦讀之漢書靈帝善鼓琴吹洞簫謝承書大簫大簫謂之言小者謂之筊爾雅簫大者二十三管無底小者十六管有底博雅無底者謂之洞簫有雅簫長四寸頌簫長尺二寸三禮圖笙生也象物貫地而生以匏為之其中空以受簧也釋名笙之言施也牙也萬物始施而牙笙者太簇之氣也象萬物之生也故曰笙有七政之節焉有六合之和焉天下樂之故謂之笙白虎通笙正月之音物生故謂之笙有十三簧象鳳之聲説文禮曰女媧之笙簧簧聲中之簧也曹植女媧贊曰造簧作笙隋音樂志曰笙竽並女媧之所作也世本曰隨作笙竽注曰隨女媧之臣也舜帝在位西王母使獻白玉環及益地圖舜之廣九州為十二復獻白玉之琯以和八風故章帝時麥陵文學奚景于泠道舜祠下得笙白玉之管集仙録古者玉琯以玉夫以玉作音故神人以和鳳凰來儀也説文隨時商容觀舞墨子吹笙墨子非樂而於樂有是也尸子墨子見荊王衣荊吹笙呂氏春秋墨子儉嗇而非樂者往見荊王衣錦吹笙非茍違性隨時好也劉子隨時聽笙敗奕奕秋通國之善奕也當奕之思有吹笙過者乍而聽之則奕敗矣非奕道暴深情有暫暗笙猾之也劉子專學叢霄笙謝元卿遇神仙吹叢霄之笙續仙傳謝孺子宴少與族兄莊齊名多藝能尤善聲律王或孺子姑之子也嘗與孺子同臺孺子吹笙或自起舞既而嘆曰今日真使人飄飄有洛間意南史謝恂傳邯鄲綽五經折疑曰夫笙者發萬物始生導達陰陽之氣故有長短黃鍾之始象法鳳凰季秋之月上丁入學習吹所以通氣也管簫笙竽塤箎皆以吹鳴者也蔡雍月令章句竹聲濫濫以立會會以聚衆君子聽笙竽簫管之聲則思蓄聚之臣禮交趾人多取無柄之瓠為笙安十三簧吹之音律清響嶺表録異雲和西王母命侍女董雙成吹雲和之笙漢武內傳短長撞鳳翼洪細摹燕音切切孤竹管來應雲和琴楊希道詩居巢武夷君命朱小娥運居巢即大笙也武夷山志諸山志西王母吟曰吹笙鼓簧中心翔翔世民之子惟天之望穆天子傳隋作隋作竽世本漢武帝時邱仲作竽笙三十六管通禮纂竽笙類也列管匏中施簧管端官管在中央三十六簧急就篇注大者曰竽小者曰和竽暖也立春之氣暖生萬物也竽管三十六宮在左和十三管宮居中唐樂志竽也者五聲之長者也故竽先則鐘瑟皆隨竽唱則衆色皆和今大姦作則俗之民唱俗之民唱則小盜必和故服文采帶利劍厭飲食而資貨有餘者是之謂盜竽矣韓非子齊宣王使人吹竽必三百人南郭處士請為王吹竽宣王説之廩食以數百人宣王死湣王立好一一聽之處士逃一曰韓昭侯曰吹竽者衆吾無以知其善者田嚴對曰一一而聽之上劉實崇讓論云昔齊王好聽竽聲必令三百人合吹而後聽之廩以數人之俸南郭先生不知吹竽者也以三百人合吹可以容其不知自請為主吹竽虛食數人之俸嗣王覺而改之難彰先生之過乃下令曰吾之好聞竽聲有甚于先生欲一一列而聽之先生於此逃矣晉書齊王好竽有求仕於齊者操瑟而往立王之門三年不得入叱曰吾瑟鼓之能使鬼神上下吾鼓瑟合軒轅氏之律呂客罵之曰王好竽而子鼓瑟雖工如王不好何是所謂工於瑟而不工于求齊也韓答陳商書商丘子晉者高邑人也好牧豕吹竽年七十不娶婦而老邑人乃奇怪之從受道問其要言但食木菖蒲根飲水不飢不老如此傳世見之三百餘年貴戚富室聞之取而服之不能終歲輒止惰慢矣謂將復有匿術也列仙傳千曲成少伯三吹竽見安昌侯張千夏鼓琴謂音不通千曲以上不足以為之音桓談新論知法度吹竽有以知法度竽音調則度數得見樂府圖笳者胡人卷蘆葉吹之以作樂也故云胡笳杜摯笳賦序云昔伯陽避亂入戎懷土遂建斯樂晉先蠶儀注車駕住吹小箛發吹大箛箛即笳也又胡笳漢舊箏笛彔有其曲不記所出本末胡笳者張博望入西域傳其法于西京惟得摩訶兜勒一曲李三年因胡曲更造新聲二十八解以為武樂自出塞入塞楊柳等十曲播為琴曰蔡琰先適河東衛仲道夫亡無子歸寧於家漢末大亂為胡騎所獲在左賢王部伍中春月登胡殿感笳之音作詩言志曰胡笳動兮邊馬鳴孤鴈歸兮聲嚶嚶文姬別傳劉疇字正喬嘗避亂塢壁賈胡百數欲害之疇無懼色援笳吹之為出塞入塞之聲以動其遊客之思於是群胡皆垂淚而去曹嘉之晉書劉越石為胡騎所圍數重城中窘迫無計劉始夕乘月登樓清嘯胡騎聞之皆悽然長嘆中夜吹奏胡笳賊皆流涕人有懷土之思向曉又吹賊并起圍奔走或云是劉道真世説越石琨字也秦箏箏瑟類也本十二絃今則十三急就篇注通典曰箏秦聲也傅元箏賦序曰代以蒙恬所造今觀其器上崇似天下平似地中空準六合絃柱擬十二月設之則四象在鼓之則五音發斯乃仁知之器豈亡國之臣所能開思運巧哉集韻云秦俗薄惡有父子爭瑟者各入其半故當時名為箏古以竹為之長離武夷君命謝英妃撫長離印箏也諸山記呂布詣袁紹紹患布欲殺之遣三十六兵彼鎧迎布使著帳邊臥布知之使于帳中鼓箏諸兵臥布出帳去兵不覺也英華記善彈郝素善彈箏雖伯牙妙手吳姬奇聲何以加之傅子謝安相晉室為其壻王國賓所讒一日武帝召桓伊宴飲安侍坐命伊撫箏伊撫而歌曰為君既不易為臣良獨難忠信事不顯乃有見危患周旦佐文武金縢功不刊推心輔王政二叔反流言聲節慷慨俯仰可觀安泣下沾襟越席將其鬚曰使君於此不凡帝有愧色語林曰桓野王善鮮音晉孝武設宴西堂樂闋酒闌將詔桓野王箏歌野王辭以須笛於是詔其常吹奴碩賜姓曰張嘉四品將軍引使上殿張碩意氣激揚吹破三笛末取䐗腳笛然後乃理調成其曲何承天素好奕棋頗用廢事又善彈箏文帝賜以局子及銀裝箏承天奉表陳謝帝答云局子之賜安必非張武之金耶南史梁張稷瓌弟也幼有孝性所生母劉無寵疾終毀瘠過人州里謂之淳孝長兄瑋善彈箏稷以劉氏先執此使聞瑋為清調便悲感頓絶遂終身不聽之上元魏孫紹兄善彈箏早卒紹後聞箏聲便涕泗嗚咽捨之而去世以此尚之本傳第一手薛瓊瓊開元宮中第一箏手麗情集崔懷寶贈瓊瓊詩云平生無所願願作樂中箏得近玉人纖手孑呀羅裙上放嬌聲樊彥深妻魏氏淮陰人彥深卒值徐敬業之亂為賊所獲賊黨知其素解絲竹逼令彈箏魏曰夫亡未能自盡今而見逼管絃豈非禍從手發耶引刀斬指賊黨又欲妻之魏以必死自固被殺舊唐高駢鎮蜀口以南詔侵暴築羅城四十里朝廷雖加恩賞亦疑其跋扈或一日奏樂聲聞知有改移乃題風箏寄意曰夜靜絃聲響碧空宮商信任往來風依稀似曲才堪聽又被風吹別調中旬日報到移鎮渚宮箜篌師延所作靡靡之樂後出桑間濮上之地師涓為晉平公鼓焉鄭衛分其地而有之遂號鄭衛之音為淫樂劉熙釋名箜篌一名坎篌漢武帝祠太一后土令樂人侯調依琴作坎篌言其坎坎應節也篌以姓冠章也風俗通封禪作空侯漢靈帝好之體曲而長二十三絃抱于懷中兩手齊奏之謂之擘隋音樂志曰立箜篌出自西域非華夏舊器也事物紀原魏高陽王雍美人徐月華能彈臥箜篌為明妃出塞之聲後為將軍原士康側室徐鼓箜篌而歌哀聲入雲行者俄而成市洛陽伽藍記有李生者其舅姓盧有道術別久忽相遇邀李往其居曰求得一妓善箜篌令侍飲李生視箜篌上有朱字云雲中辨天樹天際識歸舟盧曰此人名家莫要作婚姻否李莫測而退後娶陸長源女乃所見於盧家者問何能曰善箜篌示之朱字宛然李生具説女亦曰往常夢至一處亦記見生逸史拾遺以為崔宇過薛肇不識鄙人謂狐為狸以瑟為箜篌此非徒不知狐與瑟乃不知狸與箜篌也桓談新論箜篌引箜篌引者朝鮮津卒霍里子高妻麗玉所作也子高晨起刺船有一白首狂夫披髮提壺亂流而渡其妻隨而止之不及墮河溺死妻乃援箜篌作公無渡河之曲曰公無渡河公竟渡河墮河而死當奈公何曲終投河而死子高還以語麗玉麗玉傷之乃引箜篌而寫其聲聞者莫不墮淚飲泣麗玉以其曲傳憐女麗容名曰箜篌引古今注及孔衍琴操永和中吳郡陳緒家平旦忽有叩閽自通云陳都尉寄住緒有妾姓奚能彈箜篌神思歡悅既令妾絃歌歌聲焦細歷三年乃別去甄異録晉永嘉中有神見兗州自號樊道基有嫗號成夫人夫人好音樂能彈箜篌聞人歌絃輒起舞搜神記清溪婢歌趙文韻住青溪月夜唱鳥棲飛忽有青衣至曰王家娘子傳語聞君歌聲有關人者須臾女子至容色可憐文韶乃歌深契女心曰但令有瓶何患無水取箜篌鼓之令婢歌繁霜自解裙帶縛箜篌歌曰日暮風吹葉落依依丹心寸意愁君不知窮夕別去明日至青溪廟中女姑神像即夜所見者類説鳳首樂工云天竺伎有鳳首箜篌琵琶法三才象四時風俗通云琵琶近代樂家作不知所起長三尺五寸法天地人五行四絃象四時釋名曰琵琶本胡中馬上所鼓推手前曰琵琶手却曰琶因以為名樂録云琵琶本出於絃鞉而杜摯以為秦之末世苦於長城之役百姓絃鞉而鼓之事始云或云碎葉國所獻貞觀中裴洛兒彈琵琶始廢撥用手今所謂搊琵琶是也唐國子博士假安節琵琶録故老言漢宋烏孫公主嫁昆彌念其行道思慕使知音者載琴箏築箜篌之屬作馬上之樂傅元琵琶傳序胸奴盛請婚於漢元帝以後宮良家子昭君配焉昔公主嫁烏孫令琵琶馬上作樂以慰其道路之思其送明君亦必爾也石崇明君辭王昭君初適胸奴在路愁怨遂於馬上彈琵琶以寄其憾至今傳之謂之昭君怨圖經夫漢送公主于馬上作樂李倫製辭意昭君亦爾未嘗謂昭君自彈也圖經即以昭君怨實之不知何所本也如今人畫明妃出塞圖作馬上愁容自彈琵琶賦辭者多即以為昭君實事蓋承前人之誤耳楚遊上表乞宿衛拜駙馬都尉楚無學好遨遊音樂及畜歌者琵琶箏笛每行將以自隨三輔決録吳赤烏三年句章民楊度至餘姚夜行有一年少持琵琶求寄載度受之鼓琵琶作數十曲曲畢乃吐舌擘目以怖度而去復行二十里許又見一老父寄載自云姓王名戒因復載之謂曰鬼工鼓琵琶甚哀戒曰我亦能鼓即是向鬼復擘眼吐舌度怖幾死録異傳善彈孔輝善彈琵琶吳歸命恆使為樂文士傳君性好音能操琴及琵琶以自散孫放別傳朱生善彈琵琶雖伯牙之妙無以加之傅子孔煒字正忠解音律彈琵琶文士傳石季倫善彈琵琶晉書阮咸善彈琵琶荀勗善解音律自以遠不及也七賢傳謝鎮西著紫羅襦據胡床在大寺佛圖門樓上彈琵琶作大道曲語林司空桓豁在荊州有參軍五月五日剪鸜鵒舌令教學語遂無所不名與人相聞顧參軍善彈琵琶鸜鵒每立聽移時幽明録桓宣武外甥恆在坐鼓琵琶宣武醉後指琵琶曰名在固亦操斯器語林世以方謝仁祖不及重者桓大司馬曰諸君莫輕以仁祖企腳北窗下彈琵琶故自有天際真人想世説謝尚善音樂晉陽秋丞相嘗曰堅石挈腳枕琵琶有天際想語林堅石尚小名也南平國嶽在姑孰有鬼附之每言吉凶輒先索琵琶隨彈而言事有驗或云是老鼠所作名曰靈侯異苑宋范曄善琵琶文帝欲聞之屢諷以微旨曄偽為不曉終不肯為帝彈帝嘗飲宴歡適謂曄曰朕與歌卿可彈上歌則彈歌畢亦止南史庾仲文為吏部尚書好貨先與劉德願殊惡德願自持琵琶甚精麗遺之便復款然宋書窗外唱曲永嘉中李謙素善琵琶元嘉初往廣州夜集坐倦悉寢唯謙獨揮彈未輟便聞窗外有唱佳聲每至契會無不擊節謙怪語曰何不進耶對曰遺生以久無宜于笑始悟是鬼異苑齊禇彥回淵善彈琵琶武帝在東宮宴賜之金縷柄銀柱琵琶南史高帝宴會群臣使各效技淵彈琵琶王僧虔彈琴沈文季歌子夜張敬兒舞王敬則拍張王儉曰臣無所解但知誦書因跪前誦相如封禪書齊豫章王嶷北宅後堂集會沈文季與禇淵意喜琵琶酒闌淵取示器為明君曲文季便下席大唱曰沈文季不能作伎兒主解之曰汝固不當損仲容之德淵顏色無異曲終而止齊文宣所幸薛嬪甚被寵愛忽意其徑與高嶽私通無故斬首藏之於懷於東山宴勸酹始合忽探出頭投於柈上枝解其尸弄其髀為琵琶一座驚怖莫不喪膽帝方收取討之流淚云佳人難再得甚可惜也載尸以出被髮步哭而隨之北史隨樂人王令言妙達音律大業末煬帝將幸江都令言之子嘗於戶外彈胡琵琶作翻調安公子曲令言時臥室中聞之驚起曰變變急呼其子曰此曲興自早晚其子曰頃來有之令言遂歔欷流涕謂其子曰汝慎無從行帝必不反子問其故令言曰此曲宮聲往而不反宮君也吾所以知之帝竟被弒於江都北史唐上皇聞禽頡利嘆曰高祖困白登不能報今我子能滅深厥吾付托得人何復憂哉上皇召上與貴人十餘人及諸工妃主置酒凌煙閣酒酣上皇自彈琵琶上起舞公卿迭起為壽史李綱仕隋為太子洗馬太子勇宴宮臣左庶子唐令則奏琵琶又歌武媚娘曲綱曰令則官調護乃自比倡優進淫聲惑視聽誠知上聞之豈不為殿下纍乎吐谷渾黨項寇邊敕柴紹討之虜據高射紹軍兩矢失色紹安坐遣人彈胡琵琶使二女子舞虜疑之休射而觀紹從后擊之大潰唐書初隋有琵琶圓體修頸而小號曰秦漢子蓋絃鼗之遺制出於胡中傳為秦漢所作樂志彈至大官武德中白明遠竹伯夷皆以彈琵琶至大官琵琶録羯胡犯京上欲遷幸復登華蕚樓置酒四顧乃命進玉環玉環者睿宗所御琵琶也異時上長樂宮中嘗置別榻以帕覆之不雜以他樂器而未嘗持用至是命樂工賀懷知取調之又命禪定僧假師彈之太宗時西國進一胡善彈琵琶絃撥倍粗上每不欲番人勝中國乃置酒高會使羅黑黑帷聽之一遍而得謂胡人曰此曲吾宮人能之取大琵琶遂於帷下令黑黑彈之不遺一字胡人謂是宮女也驚嘆辭去西國聞之降者數十國僉載羅逤檀開元中有中官白秀貞自蜀使回得琵琶以獻其槽邏皆桫檀為之溫潤如玉光耀可鑒有金縷紅文影成雙鳳楊妃每抱是琵琶奏於梨園音韻凄清飄如雲外而諸王貴主自虢國已下競為貴妃琵琶弟子每受曲畢皆廣有進獻談賓録絃乃未訶彌羅國永泰元年所貢者淥水蠶絲也光麗如貫珠楊太真外傳逆鼓順鼓漢中王瑀憲子也亦知音聞康崑崙奏琵琶曰琵聲多琶聲少是未可彈五十四絲大絃也樂家以自下逆鼓曰琵自上順鼓曰琶云唐書古琵琶絃用鵾雞筋開元中假師能彈琵琶用皮絃賀懷智破撥彈之不能成聲酉陽賀懷智以食為糟鵾雞筋作絃用鐵撥彈之樂府雜録王維妙能琵琶為岐王所眷重維方將應舉求庇岐王岐王令維服鮮衣𠌾琵琶同至公主之第令奏新曲聲調哀切滿坐動容公主曰此曲何名維起曰號鬱輪枹公主大奇之岐王因荐之曰此生欲得解頭然已承貴主論託張九皋矣公主笑謂維曰子誠取解當為子力維起謙謝公主則召試官至第遣宮婢傳命維遂作解頭而一舉登第韋應物為蘇州刺史有屬官因建中之亂得國工康崑崙琴瑟琵琶至是送官表進入內國史補宋沇者璟之孫也工音律之學德宗令與樂官訂樂衆工笑之沇顧笑者忽忽忿怒作色曰奏曲作其間有不可者上驚聞之即指一琵琶云此人大逆殘忍兼抵法不宜在至尊前又指一笙云此人神魂已遊墟墓不可更留供奉上乃驚駭令主云潛伺察之旋而琵琶者為同輩告訐稱六七年前其文自縊不得端由即令按鞫遂伏其罪笙者乃憂恐不食而卒後樂工見沇不敢正視羯鼓録貞元中有康崑崙琵琶第一手因兩市祈雨鬭樂崑崙登大街綵樓彈一曲新翻羽調緑腰自謂無敵街西豪俠閲樂東市稍誚之亦于綵樓上出一女即抱樂器先云我亦彈是曲兼移在楓香調中及下撥聲如雷絶妙入神崑崙驚愕即拜請為師女郎更衣出乃僧善本也俗姓假翌日德宗召入內因令教授崑崙假師曰且請令彈一調子乃調之師曰本領何雜兼帶邪聲崑崙驚曰假師神人也臣少年初學藝時偶于鄰家女巫處授一品絃調于後乃屢易數師之藝今師精識如此玄妙也假師奏曰且遣崑崙不近樂器十餘年候忘本態然後可教詔許之後果盡假師之藝琵琶録貞元中有王芬曹保其子善才其孫綱及裴興奴善彈琵琶其曹綱善運撥聲若風而不事舊絃其裴興奴善於攏然其撥稍軟詩人云曹綱有左手裴興奴有右手武宗朝朱崖李太尉有樂吏廉郊者師於曹綱精妙入神嘗謂儕流曰教授人亦多矣未曾有此性靈子弟也嘗因清夜提攜樂器於平泉別墅臨池彈賓調芰荷間有聲意其魚躍也乃彈別調即寂然因復彈賓久之池中擲物躍上岸觀乃一片方響賓鐵蓋以聲律諧和相應故也其妙若此樂府雜録王沂者平生善解絃管忽旦睡至夜乃寤索琵琶絃之成數曲一名雀啅蛇一名胡王調一名胡瓜苑人不識聞聽之者莫不流涕其妹請學之乃教成聲須臾總忘不復成曲僉載文宗朝女弟子鄭中丞善于胡琴內庫有兩面琵琶號大小忽雷鄭嘗彈小忽雷音偶以匙頭脫乃送於崇仁坊南趙家修理大約造樂器多在此坊中南北二趙家最妙樂府雜録馮吉瀛王道之子能彈琵琶以皮為絃世宗嘗令彈於御前深欣喜之因號其琵琶曰繞殿雷也道以其隋業每加譴責而吉攻之愈精道益怒凡與客飲必使廷立而彈之曲罷或賜以束帛命背負之然後致謝道自以為戒勗及矣吉永未能悛改既而益自若道度無可奈何歎曰百工之可藝而身賤理使然也此子不過太常少卿耳其後果終于此五代史補除夜鼓吳越錢鏐嘗歲除夜宴命諸子及諸孫鼓胡琴一再行遽止之曰人將以我為長夜之飲也九國志但能彈宋太祖曰資蔭子弟在家但能彈琵琶弄絲竹豈能治民於是未許親民三朝聖政録樂譜琵琶曲有轉關六么取其聲調間婉又有護索梁州謂其音節間繁蔡寬夫詩話平和之人聽箏笛琵琶則形躁而志越聞琴瑟之音則體靜而心間夫琵琶箏笛聞促聲高故使人形躁而志越稽康無聲哀樂論象中虛外實天地象也盤員柄直陰陽敘也柱有十二配律象也傳玄賦盤員含靈太極形也三材片合兩儀象也分柱分位歲數成也呂窗華表日月星也成公綏賦梁有銅磬即今之方響也方響以鐵為之以代鐘磬和凝有響鐵之歌通考唐文宗時有宮娥沈阿翹本吳元濟之妓嘗自進元濟所與一白玉方響光明潔冷可照數十步以犀為槌以雲檀香為架芳馥著人彌月不散制度精妙希世之寶也杜陽編立秋之音也古者盎謂之缶唐堯之時有擊壤而歌者因使鄭以糜𩊚冥缶而鼓之是以易之盈缶見於比用缶見於坎鼓缶而歌見于離詩之擊缶見於宛丘澠池之蘇秦王為趙王擊缶趙王命使書之徐幹曰聽黃鐘之音知擊缶之細先儒謂始於西戎踈矣通考南蠻婆賄伽盧國與諸蠻市以琉璃罌缶相易孔帖製用金成李員居長安延壽里一夕忽聞室隅有歌曰色分藍葉清聲比磬中鳴七月七日吾當示汝之形其日大雨垣圮得一缶徑尺餘製用金成形狀奇古叩之其韻極長滌去塵蘚字若小篆歷然可讀乃崔子玉座右銘張瀆宣室志劉熙釋名曰籥躍也氣躍而出也古者取卯地之行以為籥春分之音萬物振躍而出也然三漏之籥所以通中聲先王之樂也七漏之籥所以備二變世俗之樂也通考説文曰管如箎十二月之音昔女媧氏命娀陵氏制都良之管以一天下之音又命聖氏為班管合日月星辰名曰充樂至於帝嚳命咸墨吹笭展管虞氏下管上周官之於塤教於小師播於瞽矇吹於笙師以塤為德音見於禮如塤如箎見於詩則塤之於器立秋之音也爾雅大塤謂之器以其六孔交鳴而喧譁故也譙周曰幽王之時暴公善塤世本曰暴公作塤蓋塤之作其來尚矣謂之暴公善塤可也謂之作塤未之敢信矣劉熙釋名曰箎啼也聲自孔出如嬰兒啼聲也月令仲夏之月調箎蓋調之使和也洞冥記吹霜條之箎東觀漢記明帝幸南陽舊宅作雅樂奏鹿鳴用塤箎和之以娛嘉賓唐之七星管古之長笛也其狀如箎而長其數盈尋而七竅劉係所作也顧况七星管歌云龍吟世澤欲興兩鳳引九雛警宿焉通考角書記所不載或云羌胡以驚中國馬黃帝會群臣於太山作清角之音似兩鳳雙鳴二龍齊吟丹蛇繞首雄虹帶天樂録云蚩尤氏率魍魎與黃帝戰於涿鹿之野黃帝乃命吹角為龍吟以禦之上龍吟晉志云説者云蚩尤氏帥魑魅與黃帝戰下涿鹿帝乃命始吹角為龍吟以禦之其後魏武比征烏丸越漠而軍士思歸於是改為中鳴而尤足悲矣李搔字德沈元中子也少聰敏有才藝曾採諸聲別造一器號曰八絃時人稱有思理北史二十一貝蠡之大者可容數聲南蠻吹以節樂今之梵樂用以和銅鈸釋氏所謂法螺赤土國吹螺以迎隋使是也梁武之樂有童子伎倚歌梵貝唐貞元中五印度種落有鰾國王子獻樂器躬總樂凡一十二笛皆諧釋氏經唄吹蠡擊鼓或歌且舞纓絡四垂珠璣粲發周流萬變爛然可觀聲若竽籟林邑每擊鼓以警衆吹蠡以即戎人聲曰歌歌柯也以聲吟詠有上下如草木有柯葉方言歌聲如柯也釋名樂聲歌者樂之聲也蔡雍月令章句情動於中而形於言言之不足故嗟嘆之嗟嘆之不足故詠歌之詠歌之不足故不知手之舞之足之蹈之毛詩序歌名聲比於琴瑟曰歌徒歌曰謠亦謂之咢爾雅有章句曰歌無章曲曰謠韓詩章句齊歌曰謳吳歌曰歈楚歌曰艷淫聲曰哇又有清歌高歌安歌緩歌長歌浩歌雅歌酣歌怨歌勞歌振旅而歌曰覬歌堂上奏樂而歌曰登歌亦曰升歌梁元帝纂要古歌曲有陽陵白露朝日魚麗白水白雲江南陽春淮南駕辨淥水陽阿採菱下里巴人八闋唐歌南風卿雲晨露漢歌曲有大風芝房白麟朱鴈交門天馬房中盛唐摐陽瓠子玄雲步雲始為歌帝俊有子八人是始為歌舞山海經夏后開上三嬪於天得九辨與九歌以下此天穆之野高二千仞開焉得始歌九招上昔葛天氏之樂三人槮牛尾捉足以歌八闋一曰載民二曰玄鳥三曰遂草木四曰奮五穀五曰敬天常六曰達帝功七曰依地德八曰總萬物之極呂覽上林賦聽歌天氏之歌帝嚳氏命咸黑作為唐歌堯命質當為夔效山林溪谷之音以作歌湯命伊尹作為大護歌晨露呂覽九代詠歌志合文財黃歌斷竹質之至也唐歌在昔則廣於黃世虞歌卿雲文于唐時夏歌雕墻縟於虞代商周篇什麗於夏年雕龍白雪歌謝希逸琴論云劉捐子善鼓琴歌陽春白雪曲琴集云白雪師曠所作商調曲也唐書樂志云白雪周曲也張華博物志云白雪者太帝使素女鼓五十絃琴曲名也昔伏羲氏因時興利教民田漁天下歸之時則有網罟之歌神農繼之教民食榖時則有豐年之詠黃帝備物始垂衣裳時則有龍衮之頌夏侯玄辨樂論堯郊天地祭神在座上有響誨堯曰水方至宮命子救之堯乃作歌古今樂録昔帝堯之世民樂無事擊壤之歡慶雲之瑞因以作歌上帝堯之世天下太和百姓無事有八九十老人擊壤而歌曰日出而作日入而息鑿井而飲耕田而食帝力於我何有哉世紀堯治天下五十年微服遊於康衢聞兒童謠曰立我蒸民莫匪爾極不識不知順帝之則堯喜問曰誰教汝為此言童兒曰我聞之大夫問大夫大夫曰古詩也堯還宮召舜因授以天下列子仲尼舜將禪禹於時俊乂百工相和而歌卿雲帝乃唱之曰卿雲爛兮禮漫漫兮日月光華旦復旦兮八伯咸進稽首曰明明上天爛然星辰日月光華弘宇一人帝乃再歌曰日月有常星辰有行四時順經萬姓允誠於豫論樂配天之靈尚書大傳帝堯立乃命質為樂質乃效山林溪谷之音以歌乃以麋𩊚置缶而鼓之帝舜乃令質修九招六列六英以明帝德呂覽塗山女令其妾往候禹女作歌始作南音有娀氏二佚女帝令燕遺二卵北飛不返二女作歌始作北音夏孔甲田於東陽萯山取民子為子長為斧斬斫其足孔甲乃作為破斧之歌實始為東音周昭王親將征荊抎於漢中殷整甲徙宅西河猶思故處實始作為西音呂覽塗山歌於候人始為南音有娀謠乎飛燕始為北音夏甲嘆於東陽東音以發殷氂思於西河西音以興音聲推移亦不一概矣文心雕龍夏甲作破斧之歌始為東音殷辛作靡靡之音始為北音鄭衛之俗好淫故有溱洧桑中之曲楚越之俗好勇則有赴湯蹈火之歌各詠其所好歌其所欲劉子商紂無道比於知極諫必死作秣馬金閨之歌洞曆記紂拘文王於羑里大顛宏夭散宜生南宮適之屬往見文王文王於臏反目者言紂之好色也拊桴其腹者言欲得奇寶也蹀𨈳其足者使疾迅也於是乃周流海內經歷豐土得美女二人水中大寶白馬朱鬣以獻於紂陳其中庭曰是西伯之寶以贖刑罪紂曰於寡人何其厚也立出西伯紂謂宜生譖岐侯者長鼻決耳也宜生還以狀告文王乃知崇侯虎譖之文王在美里時演八卦以為六十四作鬱尻之辭據於石困於疾藜乃申憤以作歌章曰殷道溷溷浸濁煩兮丹紫相合不分別兮迷亂聲色信諛言兮閻閻之虎使我蹇兮幽間牢獄誰其言兮無辜桎梏誰所宣兮遘我四人皆憂勤兮得此珍玩且鮮大患兮倉遑迄命遺後昆兮作此象變兆在昌兮欽承祖命天不喪兮遂臨下土在聖明兮討暴除亂誅逆王兮古今樂録宴西王母於瑤池之上西王母為天子謠曰白雲在天山陵自出道里悠遠山川間之將子無死尚能復來天子答曰豫歸東土和治諸夏萬民平均吾顧見汝比及三年將復而野穆天子傳黃澤天子東遊於黃澤宿於曲洛使宮樂謠曰黃之陀其馬噴沙黃之澤其馬噴玉上哀公使以幣如衛迎夫子而卒不能賞故夫子作丘陵之歌曰登彼丘陵峛崺其阪仁道在邇求之若遠遂迷不復自嬰屯蹇喟然回慮題彼泰山鬱崔其高梁甫回連枳棘充路陟之無緣將伐無柯患茲蔓延推以永歎涕霣潺湲孔叢子楚王使使奉金幣聘夫子宰豫冉有曰夫子之道至是行矣遂請見問夫子曰太公勤身苦志八十而遇文王孰與許由之賢夫子曰許由獨善其身者也太公兼利天下者也然今世無文王之君也雖有太公孰能識之乃歌曰大道隱兮禮為基賢人竄兮將待時天下如一欲何之上叔孫氏之車子曰鉏商樵於野而獲獸焉衆莫之識以為不祥棄之五父之衢冉有告夫子曰麕身而肉角豈天之妨乎夫子曰今何在吾將觀焉遂往謂其御高柴曰若求之言其必麟乎到視之果信言偃問曰飛者宗鳳走者宗麟為其難致也敢問今見其誰應之子曰天子布德將致太平則鱗鳳龜龍先為之祥今宗周將滅天下無主孰為來哉遂泣曰豫之於人猶麟之於獸也麟出而死吾道窮矣乃歌曰唐虞世兮麟鳳遊今非其時吾何求麟兮麟兮我心憂上河激之歌趙簡子南擊楚津吏醉臥不能渡召欲殺之津吏女姢持擑而前曰昔父聞君東渡不測之水恐風波之起故禱九江山淮之神不勝巫祝杯酒飲沉醉至於此矣妾願鄙軀易父之死簡子將渡用楫少一人娟願備員用楫遂與渡中流奏河激之歌曰升彼河兮西觀清水揚波兮杳冥禱求福兮醉不醒誅將加兮妾心驚蛟龍助兮王將歸呼來棹兮行勿疑簡子大悅立為夫人列女傳薛談學謳於秦青未窮青之旨於一日遂舜歸秦青乃餞於郊衢撫節悲歌聲震林木響遏行雲薛談乃謝求返終身不敢言歸秦青顧謂其友曰昔韓娥東之齊遺糧過雍門鬻歌假食而去餘響繞梁三日不絶左右以其人弗去過逆旅凡人辱之韓娥因曼聲哀哭一里老幼喜歡忭舞弗能自禁乃厚賂而遣之故雍門人至今善歌哭效娥之遺聲也博物志擁楫而歌襄城君始封之曰衣翠衣帶玉期劍履蹻舄立乎流水之上楚大夫莊辛過而説之曰臣願把君之手其可乎襄城君忿然作色而不言莊辛遷延而稱曰君獨不聞夫鄂君方乘青瀚之舟張翠蓋會鐘鼓之音越人雍楫而歌曰今夕何夕兮搴洲中流今日何日兮得與王子同舟山有樹木兮木有枝心説君兮君不知於是鄂君乃舉繡被而覆之説苑夢女鼓琴武靈王遊大陵他日王夢見處女鼓琴而歌詩曰美人熒熒兮顧若苕之榮命乎命乎曾無我嬴異日王飲酒樂數言所夢想見其狀吳廣聞之因夫人而內其女娃嬴孟姚也孟姚甚有寵於王是為惠后史記春秋後語武靈王遊大陵夢處女鼓瑟而歌築長城歌始皇起驪山之蒙使蒙恬築長城死者相屬民歌曰生男慎勿舉生女哺用晡不見長城下尸骸相友柱楊泉物理論高帝戚夫人善鼓瑟擊築帝常擁夫人倚瑟而絃歌畢每泣下流漣夫人善為翹神折腰之舞歌出塞入塞望歸之曲侍婢數百皆習之後宮齊首高唱聲入雲霄西京雜記上靈曲戚夫人侍兒賈佩蘭後出為扶風人假儒妻説在宮內時常以絃管歌舞相歡娛競為妖服以趣良時十月十二日共入靈女廟以黍樂神吹笛擊築歌上靈之曲既而相與連臂踏地為節歌赤鳳凰來上四皓者秦始皇時見秦政虐乃退入藍田山而作歌曰莫莫高山深谷逶迤曄曄紫芝可以療飢唐虞世遠吾將何歸駟馬高蓋其憂甚大富貴之畏人不如貧賤之肆志乃共入商雒隱地肺山以待天下定教歌兒孝惠帝所教歌兒百二十人有缺輒補漢書張釋之為中郎將從行至霸陵是時慎夫人從上指示慎夫人新豐道曰此是邯鄲道也使慎夫人鼓瑟上自倚瑟而歌上孝武帝巡狩至於盛唐尋陽浮江親射蛟江中獲之舳艫千里薄摐揚而出作盛唐摐陽之歌上元帝自度曲被歌注云聲終更授其次曰度曲度曲未終雲起雪飛是也上雅歌祭尊為將取士皆用儒術對酒設樂必雅歌投壺謝承後漢書重譯歌宋酺明帝時為益州刺史移書屬郡喻以聖德白狼王等百餘國重譯來庭歌詩三章酺獻之東觀漢記劉贊初為將臨敵必先被髮叫天因抗音而歌左右應之乃進戰吳書三月上巳日會稽夏統字仲御入洛市樂大尉賈充問曰卿能土地間曲乎統曰百姓懷先君恩遂作慕歌又孝女曹娥歌河女之章為伍子胥作小海唱今欲歌之統曰善乃以竹叩船引聲喉囀清激慷慨大風應至含水漱天雲雨響集充曰聽慕歌之聲便髣佛見大禹之容聞河女之音不覺涕淚交流即謂伯姬高行在目前也聆小海之唱謂子胥屈平立吾左右矣晉書袁山松善音樂舊歌有行路難曲詞頗踈質山松乃文其辭句婉其節制因酣歌之聞者流涕上初苻堅二十五年滅慕容仲姊清河公主年十四有殊色堅納之寵冠後庭沖時年十二亦有龍陽之姿堅又幸之姊弟專寵宮人莫進長安中歌之曰一雌與一雄雙飛入紫宮咸懼為亂王猛切諫乃出沖沖卒為堅賊崔鴻十六國春秋絲不如竹桓溫公問孟嘉曰聽伎絲不如竹竹不如肉何謂也答曰漸近自然一坐咨嗟孟嘉別傳孝武太元中琅琊王軻之冢有鬼歌子夜殷允為章郡僑人庾僧度冢亦有鬼歌子夜殷允為章郡亦是太元乎則子夜是此時以前人也晉書子夜晉曲也晉有女子名子夜造此聲聲遇哀苦古樂府團扇郎歌者晉中書令王珉捉白團扇與嫂婢謝芳姿有愛情好甚篤嫂捶撻婢過苦王東亭聞而止之芳姿素善歌嫂令歌一曲當赦之應聲歌云白團扇辛苦五流連是郎眼所見珉聞更問之汝歌何遺芳姿即改云白團扇憔悴非昔容羞與郎相見後人因而歌之古今樂録文獻通考云婢素好歌而珉好持白扇故云團扇復團扇持許自遮面憔悴無復理羞與郎相見憑乘縣有歌父山傳云老父少不娶妻而善於謳歌年八十餘病命終鄉里六七人輿上穴中鄰人舞歸父老歌而送之聲振林藪嚮遏行雲盛宏之荊州記臨城縣南二十里有蓋山登百許步有舒姑泉俗傳云有舒氏女未適人與其父折薪於此女坐泉處牽挽不動遽告家比還惟見清泉湛然母云女好音樂乃作絃歌泉涌回流純義宣城記花上盈盈臨川聶包死數年忽詣南豐相沈遒襲作歌其歌笑甚有倫次每歌輒作花上盈盈曰但聞行當歸不聞死復生異苑魏晉之世有孫氏善歌舊曲宋識善擊節唱和陳左善清歌列和善吹笛郝索善彈箏朱生善琵琶尤發新聲故傳元著傳曰人若欽所聞而忽所見不亦惑乎此六人生於上世越古今而無儷晉志黎園歌明皇自巴蜀回夜閩登勤政樓南望煙月滿目因歌曰庭前琪樹已堪攀塞北征人尚未還蓋盧思道之詩也歌畢里中隱隱如有歌者謂力士曰得非黎園舊人乎遲明為我訪來翌日力士於里中召至果是其人後乘月登樓左右惟力士及妃子侍者紅桃在焉即命歌梁州即貴妃所製上親御玉笛為之倚曲曲罷無不掩泣上因廣其曲今涼州留傳者益加焉明皇雜録太真外傳興慶宮帝潛邸於西南隅起花蕚相輝之樓與諸王遊處祿山犯順乘據以聞議欲遷幸置酒樓上命作樂有進水調歌者曰山川滿目淚霑衣富貴榮華得幾時不見只今汾水上惟有年年秋鴈飛上問誰為此詞曰李嶠上曰真才子也遂不終飲而去明皇雜録開元中內人許子和吉州永新縣樂家女也入宮因名永新能變新聲高秋明月喉轉一聲響傳九陌一日大酺於勤政樓萬衆喧譁莫得聞魚龍百戲之音永新乃撩鬢舉袂直奏曼聲廣場寂寂若無一人喜者聞之氣勇愁者聞之腸絶漁陽之亂六宮星散永新為一士人所得韋青避地廣陵月夜憑欄聞舟中唱水調者曰此永新歌也登舟省之相與對泣後市人卒遂落風塵臨終謂其母曰阿母錢樹子倒矣樂府雜録聲出朝霞念奴者有姿色善歌唱未嘗一日離帝左右每執板當席顧盻帝謂妃子曰此女妖麗眼色媚人每囀聲歌喉則聲出於朝霞之上雖鐘鼓笙竽嘈雜而莫能遏宮妓中帝之鍾愛也天寶遺事宮妓永新者善歌受明皇寵愛每對御奏歌則絲竹之聲莫能遏帝嘗謂左右曰此女歌直千金上宋之遜為連州參軍刺史陳希古聞其善歌使教婢曰執笏簾外唱吟自如其婢隔窗從而和之聞者無不大笑朝野僉載大曆中有才人張紅紅者本與其父歌於衢路丐食過將軍衛青所居青聞其喉音寥亮仍有眉首即納為姬乃自傳其藝頴悟絶倫嘗有樂工自撰歌即古長命西河女也加減其節奏頗有新聲未進聞先侑歌于青青召紅紅于屏風後聽之歌罷青入問紅云已得矣青出云有女弟子曾歌此非新曲也即令隔屏風歌之一聲不失樂工大驚尋違上聽召入宜春院宮中號記曲娘子尋為才人後韋青卒紅紅一痛而絶上嘉嘆之贈昭儀樂府雜録李衮善歌於江外而名動京師崔昭入朝密載而至乃邀致賓客請第一部樂及京師之名倡以為盛會紿言請表弟末座令衮被衣而出滿座皆笑少頃命酒昭曰請表弟歌座中又笑及喉轉一發樂人皆大驚曰是李八郎也乃羅拜之國史補韋堅鑿潭成帝為升樓每至署某郡以所産暴陳其上若廣陵則錦銅器先是人間唱得體紇歌有揚州銅器語叶更變為得寶歌自造曲唱習是至衣袂袴衫錦半臂絳帽額立艫前倡人數百皆巾㡚鱗治齊聲應和鼓吹合作六帖夔頭韓會善歌絶妙名輩號為四夔會為夔頭國史補歌妙之曲其來久矣元和中國樂有米嘉榮何戡近有陳不嫌不嫌子意奴一二十年來絶不聞善唱盛以拍彈行於世拍彈起於李可久懿宗朝恩澤曲子別趙十哭趙十之名劉尚書禹錫與米嘉榮詩云三朝供奉米嘉榮能變新聲作舊聲于今後輩輕前輩好染髭鬚事後生又自貶所歸京問何戡歌曰二十年來別帝京重聞天樂不勝情舊人惟有何戡在更請殷勤唱渭城盧氏雜説贊皇一品集云豈謂擊壤餘音謬入帝堯之聽巴渝末曲猥蒙漢祖之知符存審少微賤嘗犯法當死臨刑指旁壞垣顧主者曰願就死於彼冀得垣土覆尸主者哀而許之為徙坦下而主將方飲酒顧其愛妓思得善歌者佐酒妓言有符存審常為妾歌甚善主將馳騎召存審而存審以徙垣下故未加刑因往就召使歌而悅之存審因得不死五代史歌者樂之聲善歌者必先調其氣氤氳自臍間出至喉乃噫其詞即分抗墜之音即得其術即可致遏雲響谷之妙也樂府雜録吳越錢鏐為衣錦軍作還鄉歌曰三節還鄉兮挂錦衣父老遠來相追隨吳越一王駟馬歸樂者舞之容也天子省風以作樂舞所以節八音而行八風天子八佾諸侯六佾大夫四佾佾列也八人每佾每服冕而執戚有俯仰張翕之容行綴長短之制所以受命而歌王者之功也人之動而有節者莫若舞所以因陽氣而達物也蔡雍月令章句王朗表曰凡音樂以舞為主自黃帝雲門至周太武皆太廟舞樂名也樂所以樂君之德舞所以象君之功魏名臣奏宣鬱昔陶唐氏之始陰多滯伏而湛積水道壅塞不行其原民氣鬱閼而滯著筋骨瑟縮不達故作為舞以宣導之呂覽考仲子之宮將萬焉公問羽數於衆仲對曰天子用八諸侯用六大夫四士二夫舞所以節八音而行八風故自八以下公從之于是初獻六羽始用六佾也左隱縈塵集羽燕昭王即位三年廣昭王來獻善舞者二名一名旋波一名提謨並玉質凝膚體輕氣馥綽婉妙絶曠古無倫或行無橽影或經年不飢昭王處以單綃華幄飲以瑞珉之膏飴以丹泉之粟王登重霞之臺乃召二人在側時香風吹起二人徘徊翔轉殆不自支王以纓綏屬拂之二人皆舞容治妖麗靡若鸞翔而歌聲輕下揚乃使伶人代唱其曲清響流韻雖繞梁動木未定加焉其舞曲一名榮塵言體輕與塵霧相亂也次曰集羽言婉轉若羽毛之從風也末曰旋懷言支體緬曼若入懷袖也王子年拾遺記晉將攻齊使范昭往觀景公觴之范昭請公之棄酌公曰諾告侍者酌樽進之晏子曰徹樽更之范昭佯醉不悅而起舞謂太師曰能為我調成周之樂乎吾為子舞之太師曰冥臣不習范昭趣而出公問晏子晏子曰昭非不知禮也欲慚吾君臣公問太師太師曰成周之樂天子樂也范昭人臣而舞之臣故不為昭歸報晉平公曰齊未可伐也臣欲試其君而晏子試之臣欲犯其禮而太師知之仲尼聞曰夫不出於樽俎之間而知千里之外其晏子之謂也可謂折衝矣而太師其與焉晏子楚襄王既遊雲夢將置酒宴飲謂宋玉曰寡人欲觴群臣何以娛之王曰臣聞激楚結風陽阿之舞材人之窮觀天下之至妙王曰試為寡人賦之傳毅舞賦巴中有渝水賨民鋭氣喜舞高舞樂其猛鋭數觀其舞使樂人習之故名巴渝舞三巴記高祖廟奏武德文始五行之舞武德者象天下樂已行舞以除亂也文始者本舜韶舞也高祖更名曰文始示不相襲也漢書景帝元年制詔御史蓋聞歌者所以發德舞者所以明德高廟始奏文始五行之舞史記景帝時諸王來朝有詔更前稱壽歌舞長沙定王發但張袖小舉手左右笑其拙上怪問之對曰臣國小地狹不足回旋帝乃以武陵零陵桂陽屬焉前漢書注平恩侯許伯入第長信少府檀長卿起舞為沐猴與狗鬭司隸蓋寬饒劾長卿以列卿而沐猴舞失禮不敬許伯為謝良久乃解漢史掌上舞趙飛燕體輕能掌上舞漢書蔡雍坐上章事徙邊及歸將就還路五原太守主智餞之酒酣智起舞屬雍雍不敢報智銜之智者中常侍王甫之弟也密告雍怨于囚於謗訕朝蔡雍慮卒不免禍乃亡命江海遠迹吳會范曄後漢書陶謙為舒令郡守張磐謙恥為之下磐舞屬謙謙不為起強之乃舞舞而轉磐曰不當轉耶曰轉則勝人史孫權請顧雍父子及孫談時為選曹尚書見任貴重是日孫權極欣談醉酒王起舞舞又不知止雍內怒之明日召談訶責之君王以含垢為德臣下以恭謹為節何有舞不復知止雖為酒後以為恃恩謙虛不足損吾家者必汝也江表傳江右初有拂舞舊云拂舞吳舞檢其歌非吳辭也皆陳於殿庭楊泓拂舞序曰自江南見白符舞或言自亮鴆沈自有此來數十年察其辭旨乃是吳人患孫皓虐政也志白符舞吳孫皓時所作初學記陸遜破曹休上與群僚大會酒酣命遜舞解所著白鼯子裘賜之吳書白紵舞案辭有中抱之言紵本吳地所出宜是吳舞也晉徘徊歌曰交交白緒節節為雙吳音呼緒為紵擬白緒即白紵也古今樂府太康中天下為晉世寧之舞其舞抑手以執杯盤而反覆之反覆至危也杯盤酒器也而名晉世寧者言人時茍且酒食之間而其智不可及遠如器左手也搜神記王導補謝尚為掾導有勝會謂之曰聞君能作鸜鵒舞一座傾想尚更著衣幘而舞令座上擊節為應俯仰有中旁若無人晉傳永明中舞人冠幘並簪筆武帝曰筆笏蓋以記事受言舞不受言何事簪筆豈有服朝衣而足綦宴於是去筆齊書舉手舞韶榮陽人姓何忘其名聞士也荊州辟為別駕不就隱遁養志嘗至田舍收穫在場上忽有一人長一丈蕭踈單衣角巾來詣之翩翩舉其兩手並舞而來語何云君嘗見韶舞否此是韶舞且舞且去尋遂徑向山山有穴裁容人即入穴何亦隨之見有良田數十頃何遂懇作以為世業子孫於今賴之續搜神記沈佺期兼修文館直學士既侍宴帝詔學士等舞回波佺期為弄辭悅帝本傳帝與群臣宴飲祝欽明自言能八風舞帝許之欽明體肥醜據地搖頭睆目左右顧盻帝大笑吏部侍郎盧藏用嘆曰是舉五經掃地矣唐本傳明皇御勤政樓大張聲樂羅列伎時教坊有王大娘善戴百尺竿竿上於木山狀瀛洲方丈仍令小兒持鋒節出入其間而舞不輟時雜樂安祿山晚益肥腹緩及膝聳兩肩若挽牽者乃能行作胡旋舞帝前乃疾如風開成末有樂人崇胡子善舞其腰支不異女郎明皇雜録公莫舞今布舞也相傳曰項莊舞劍項伯以袖隔之古人相呼曰公伯語莊云公莫害漢王今之用巾蓋象項伯衣袖之意也志漢世有盤舞晉世如之以杯盤舞詩云丹唇含九秋妍迹凌七盤陸士衡言舞用盤七枚也梁魏有舞盤伎唐樂志興七盤其迭奏觀徑捷之翩翻卞蘭許昌宮賦七盤起長袖鮑昭詩怨西荊之折盤南郡賦歷七盤而縱躡張衡舞賦七盤陳於廣庭王粲七釋遞間關於盤舞顏延之陽阿耳分八風之調足蹀陽阿之舞手會淥水之趣淮南夫歌采菱發陽阿鄙人聽之不若此延路陽局延路陽局鄙歌曲也人間吹聲雜字解詰曰嘯吹聲也永泰中大理評事孫廣著嘯旨一篇云夫氣激於喉中而濁謂之言激于舌而清謂之嘯言之濁可以通人事達性情嘯之清可以感鬼神致不死蓋出其言善千里應之出其嘯善萬靈受職斯古之學道者哉語林嘯音十五章一曰權輿二曰流雲三曰深溪虎四曰高柳蟬五曰空林夜鬼六曰巫峽猿七曰下鴻鵠八曰古木鳶九曰龍吟十曰地動十一曰蘇門十二曰劉公命鬼十三曰阮氏逸韻十四曰正章十五曰畢章王睿炙轂子吳王闔閭將欲伐楚登臺向南風而嘯有頃乃嘆群臣莫有曉王意者子胥深知王憂乃荐孫武善為兵法人莫能知吳越春秋魯漆室邑女過時未嫁倚柱而悲嘯旁人問之曰何嘯之悲也子欲嫁乎吾為子求偶漆室邑之女曰吾豈為不嫁之故而悲哉憂吾君老太子少也列女傳太始二年西方有因霄之國人皆善嘯丈夫嘯聞百里婦人嘯聞五十里如笙竽之音秋冬則聲清亮春夏則聲沉下人舌尖處倒向喉內亦曰兩舌重咱以爪徐刮之則嘯聲逾遠拾遺記阮籍性樂酒善嘯聲聞數百步蘇門山中忽有真人晉書云孫登也樵伐者咸共傳説步兵往觀見其人擁鄰岩側籍登嶺就之談太古無為之道論五帝三王之義蘇門先生翛然曾不盻之籍乃嘐然長嘯韻響寥亮蘇門先生乃逌然而笑籍既降還半嶺許聞上然有聲如數部鼓吹林谷傳響魏氏春秋云有如鳳音顧著乃向人之為嘯也籍素知音因傳寫之十得其二為之蘇門世説及七賢傳晉書妙動林壑孫登善長嘯每發聲妙動林壑孔帖王導與庾亮遊于石頭會過王廙至是日迅風飛帆廙倚樓長嘯神色自逸廙別傳劉宋時釋智一者居錢塘靈隱寺之半峰精守戒範而善長嘯嘯終乃牽曳其聲沓入雲際如吹茄葉若揭遊絲徐舉徐揚載哀載咽颼颼凄切聽者悲涼謂之哀松之梵有宋高僧傳天寶末有峨嵋山道士姓陳來遊京邑善長嘯能作雷鼓霹靂之引初則發聲調暢稍加散越須臾望空寫雷音忽復震駭聲如霹靂觀者莫不傾竦語林李翱守廬江有重囚當刑慮之乃哀鳴曰某有薄伎願于貴人前試之乃長嘯也乃命釋戒俄而清聲上徹雲漢公曰不謂蘇門之風出于赭衣之下可與孫阮同躅乎即赦其罪孔帖四夷樂東方曰時南方曰任西方曰朱離北方曰禁天中記卷四十三
