body:
  text: 佛佛屠者佛也西域天竺國有佛道焉佛者漢言覺也將以覺悟群生也統其教以修善慈心為主不殺生類專務清淨其精進者號為沙門沙門者漢言息也蓋息意去欲而歸於無為也又以為人死精神不滅隨復受形所行善惡者皆有報應故所貴行善修道以鍊精神鍊而不已以至無生而得佛也佛身長丈六尺黃金色項佩日月光變化無常無所不入故能化通萬物而大濟群生後漢紀初明帝夢見神人身有日光飛在殿前欣然悅之明日博問群臣此為何神有通人傅毅曰臣聞天竺有得道者號之曰佛飛行虛空身有日光殆將其神也於是上悟遣使者張騫羽林郎中秦景博士弟子王遵等十二人於大月支寫佛經四十二章藏在蘭臺石室第十四間時於洛陽城西雍門外起佛寺於其壁畫千乘萬騎繞塔三匝又於南宮清涼臺及開陽城門上作佛像明帝存時預修造壽陵陵曰顯節亦於其上作佛圖像時國豐民寧遠夷慕義學者由此而滋牟子有經書數千卷以虛無為宗包羅精粗無所不統善為宏闊勝大之言所求在於一體之內而所明在於視聽之表故世之人以為虛誕然歸於玄微深遠之難測故王公大人觀死生報應之際莫不矍然自得也後漢紀殷中軍見佛經云理亦應阿堵上世説佛經之行中國尚矣莫詳其始牟子曰云云石室劉子政列仙傳曰歷觀百家之中以相撿驗得仙者百四十六人其七十四人已在佛經故撰得七十可以多聞博識者遐觀焉如此即漢成哀之間已有經矣與牟子傳記便為不同魏略西戎傳曰天竺城中而臨兒國浮屠經云其國王生浮圖浮圖者太子也父曰屑頭邪母曰莫邪浮屠者身服色黃髮如青絲瓜如銅其母夢白象而孕及生從右脅出而有髻墜地能行七步天竺又有神人曰沙律昔漢哀帝元壽元年博士弟子景慮受大月氏王使伊存口傳浮屠經曰復豆者其人也漢武故事曰昆邪王殺休屠王以其衆來降得其金人之神置之甘泉宮金人皆長丈餘其祭不用牛羊唯燒香禮拜上使依其國俗祀之此神全類於佛豈當漢武之時其經未行於中土而但神明之事邪故驗劉向魚豢之説佛至自哀成之世明矣然則牟傳所言四十二者其文今存非妄蓋明帝遣使廣求異聞非是時無經也注王劭仁壽舍利現瑞記云漢世曰浮屠即佛陀也猶沙門與桑門語之轉也周昭王即位二十四年甲寅歲四月八日江河泉水忽然泛漲井水溢出山川震動有五色光入貫太微遍生西方盡作青紅色太史蘇由奏曰有大聖人生於西方一千年外聲教及此昭王即勑鐫石記之埋於南郊天祠前此即佛生之時也穆王於相國呂侯乘驊騮八駿而行求佛因而禳之至穆王五十二年二月十五日暴風忽起林木傷折大地震動西方有白虹十二道南北通過連夜不滅穆王問太史扈多曰是何徵也對曰西方有大聖人滅度衰相現耳此時佛涅盤也周書異記佛初生時乘白象入母右脅其母摩邪夢懷白象梵仙占曰若夢日月當生國王若夢白象必生聖子菩薩初生大地震動身紫金色三十二相八十種好圓光四尋生已四方各行四步為降魔梵發城實語天上天下惟我獨尊抱入天池天像悉起阿私陀仙合掌歎曰相好明了必為法王自恨當死不得見佛斯則淨飯國王之太子也字悉達多祖號師子頰父名淨飯母曰摩耶代代為輪王姓瞿曇氏復因能事別姓釋迦釋玄則禪林妙記序菩薩以四月八日化乘白象冠日之精因母晝寢以示其夢從右脅入夫人夢寤自知身重天獻飲食自然而至不復樂於人間之味菩薩在胎母無妨礙十月滿足四月八日夫人將諸綵女遊藍毗尼園攀無憂樹於時樹下忽出蓮花大如車輪菩薩化從夫人右脅而生墮彼華上自行七步舉其右手作獅子吼天下天下惟我獨尊時四大王既以天繒接太子身置寶杌上帝釋執蓋梵王持拂左右侍立九龍空中吐清淨水一溫一涼灌太子身三十二相八十種好放大光明普照三千大千世界天龍八部滿虛空中作天伎樂雨妙香花瓔珞天衣可不稱數所感瑞應三十有二大藏佛於莊王十年甲午二月八日夜鬼宿合時於嵐毗園波羅樹下從摩耶夫人右脅而生放大光明照三千大千世界十九出家三十成道四十九年處世説法利益天人度脫群品至匡王四年壬子二月十五日夜於拘尸城入般涅槃王儉史録費長房史寶録普曜本行經沸星下見侍太子生瑞應經靈空無雲而雨本行經佛降神兜率之宮垂像迦毗之域氏曰瞿曇種稱殺利俗名悉達道字能仁乃白淨王之太子也其生也坤形六動方行七步五淨兩華滿國二龍灑水遍空身邊則金色一丈眉間則白毫五尺開卍字於胸前躡千輪於足下力格香象氣冠神功歷王城之四門哀老病之三苦天王捧白馬而踰城給使持寶冠而詣闕於是以仙林始抽簪之地禪河起苦行之迹沐金流之淨水遊道場之吉樹食假獻麋座因施草於是十力智圓六通神足大業克成獨稱為佛法輪則奈國初轉僧侶則憍陳始度至於迦葉兄弟目連朋友於是他化宮裏乃弘十地耆闍山上方會三乘善吉談無得之宗淨名顯不言之旨斯乃三界之大師萬古之獨步含靈福盡法玉斯逝遂使北首提河春秋有八十矣智炬消慈雲滅長夜諸子於是瞻相好於香檀記筌蹄於貝葉二藏受持四依補處而我師風無墜暨於像運既當徂北稍復東漸所以金人夢劉壯之寢摩騰佇蔡愔之勸遺教之流漢地創發此焉自後康僧會竺法護佛圖澄鳩摩什繼踵來儀盛宣方等遂使道生道安之侶慧嚴慧觀之徒並能銷聲挂冠翕然歸向緇門繁熾焉可勝道釋彥琮通極論南山曰瞿曇星名從星立稱至於後代改姓釋迦慈恩云釋迦之群望也文句曰瞿曇此云純淑應法師翻為地最勝謂除天外人類中此族最勝翻譯昔王遜位與弟從學於婆羅門姓曰瞿曇而受之言當解王衣如吾所服受瞿曇姓謂小瞿曇釋迦譜佛興老子入關之於天竺維衛國國王夫曰名曰清妙老子因其晝寢乘日之精入清妙口中後年四月八日夜半時剖右脅而生墮地即行七步舉手指天曰天下天下惟我為尊三界皆苦何可樂者於是佛道興焉玄妙內篇周魯二莊親昭夜景之鑒漢晉兩明並勒丹青之飾王簡栖頭陀寺碑慧光遐照莊王因覩夜明靈液方津明帝以之神夢釋道安二教論莊公七年甲午四月辛卯夜恆星不見星隕如雨即周莊王十年也左傳遂即易筮之云西域銅色人出也所以明夜非中夏之災也莊王別傳佛法詳其始而典籍亦無聞焉魯莊七年夜明佛生之日也顧微吳縣記所以孟夏之月生者不寒不熱草木華英釋狐裘衣絺綌中呂之時也所以生天竺者天地之中處其中和也牟子什迦出世年月不過以恆星不見為據三代年既不同不知外國何用曆法若外國用周正耶則四月辛卯長曆推是五日了非八日若用殷正耶周之四月殷之三月用夏正耶周之四月夏之二月都不與佛家四月八日同也若以魯之四月為證則日月參差不可為定若不以此為證則佛生年月無證可尋陶隱居難沈約均聖論依天竺用正與夏同二教論寶應聲菩薩名曰伏犧寶吉祥菩薩名曰女媧須彌四域經太昊本應聲大士仲尼即儒童菩薩先遊茲土權行漸化愍濟五濁宣布五常辨正論佛遣三弟子震旦教化儒童菩薩乃稱孔邱光淨菩薩彼稱顏回摩訶迦葉彼稱老子破邪論天下大術佛術第一吾師化由天竺善入泥洹老子西升經老氏之師名釋迦文符子老子是迦葉菩薩化由震旦老子大權菩薩經佛者覺也覺一切種智復能開覺有情如睡夢覺故名為佛姓釋迦號牟尼佛佛地論佛小名天中天初為淨梵王太子一日抱出謁天神廟石為神神像即禮太子足王曰我子於天神中更為尊勝宜名天中天要覽佛生於殷末道成於周初至成王十二年經律始到新頭河法顯記河即張騫新到之處經云佛者昔於西胡得道在四十二天為延真宮主勇猛苦教故其子弟皆髡形染衣斷絶人道諸天衣服悉然魏釋老志德充濟物佛者本號釋迦文者譯言能仁謂德重道備堪濟萬物也釋迦前有六佛釋迦繼六佛而成道處今賢劫文言將來有彌勒佛方繼釋迦而降世釋迦即天竺迦維衛國王之子天竺其總釋迦維別名也上釋迦在世教化四十九年乃至天龍人鬼並來聽法弟子得道以百千萬億數然後於拘尸那城娑羅雙樹間以二月十五日入般涅槃涅槃亦曰泥洹譯言滅度亦言常樂我淨弟子迦葉等追共撰述綴為十二部經隋經籍志涅槃明無遷謝及諸苦纍也釋老佛者諡號也猶名三皇神五帝聖也佛乃道德之元祖神明之宗緒佛之言覺也恍惚變化分身散體或存或亡能大能小能圓能方能老能少能隱能彰蹈火不燒履刃不傷在污不染在禍無殃欲行則飛坐則揚光故號為佛也牟子大論云秦言知者漢言覺也僧肇曰佛者何也蓋窮理盡性大稱之稱也其道虛玄固已妙絶常境心不可以智知形不可以像測同萬物之為而居不為之域處言數之內而止無言之鄉非有而不可為無非無而不可為有寂寞虛曠物莫能測不知所以名故強謂之覺翻譯羅汰私婆阿育王所治城中宮殿皆起墻闕雕文刻鏤纍大石作山山下作石室長三丈廣二丈高丈餘有大乘婆羅門子名羅汰私婆亦名文殊師利住此城裏爽悟多智事無不達以清淨自居國王宗敬師事之賴此一人弘宣佛法外不能陵凡諸中國惟此城為大民人富盛競行仁義水經佛滅度後二百五十年文殊至雪山中化五百仙人訖還歸本土放大光明遍照世界入於涅槃文殊師利般若經此云妙德大經云了了見佛性猶如妙德等爭名疏云若見佛性即具三德不縱不橫故名妙德慈恩上生經疏引經云未來成佛名曰普現翻譯不二法維摩會上三十二菩薩各説不二法門文殊曰我於一切法無言無説無示無識離諸問答是為菩薩入不二法門于是文殊又問維摩仁者當説何等是菩薩入不二法門維摩默然文殊讚曰乃至無有言語文字是菩薩入不二法門維摩詰經支道林造即色之論論成示王坦之中郎都無言支曰默而識之乎王曰既無文殊誰能見賞世説一道清淨名為不二自性軌持名法賢聖通遊曰門維摩經云毗耶離城中有長者名維摩詰注云維摩詰華言是淨名也心經注維摩詰者秦言淨名蓋法身之大士見居此土以弘道也僧肇注淨名大士是往古金粟如來發經維摩詰是金粟如來祖廷事苑維摩詰者華言淨名居士也沒於妙喜之國生於毗耶之域大仙那提之子常修梵行世號曰衣居士焉故總妙圓明現身方大無起無住不去不來空色空而取真空滅生滅而求寂滅或歸之於無物或得之於默然邪正於是路殊語言由其道斷居士之真宗也元廣之畫像碑喜見菩薩曰色色空為二色即是空非色滅空色性自空如是受想行識識空為二識即是空非識性自空於其中通而達者為入不二法門維摩經維摩詰辨才無礙入深法門善於智度通達方便其以方便現身有疾以其疾故皆往問疾維摩詰因以身疾廣為説法佛告文殊師利汝詣維摩詰問疾維摩詰言從癡有愛則我病生以一切衆生病是故我病若一切衆生得不病者則我病滅菩薩為衆生故入生死菩薩疾者以大悲心起維摩詰經垂裕記云淨即真身名即應身真即所證之理應即所現之身生曰此云無垢稱其晦迹五欲超然無染清名遐布故致斯號大經云威德無垢稱王優婆塞西域記毗維摩詰唐主無垢稱舊曰淨名然淨則無垢名則是稱義雖取同名乃有異翻譯邲輸跋陀或云三曼跋陀此云普賢悲華云我行要當勝諸菩薩寶藏佛言以是因緣今改汝字名曰普賢文句云今明伏道之頂其因周遍曰普斷道之後鄰于極聖曰賢檇李云行彌法界曰普位鄰極聖曰賢文殊普賢二聖亦互相融攝二而不二沒同果海即是毗盧遮那是為三聖故此菩薩常為一對上賓頭盧賓頭盧羅漢優填王臣也精勤苦行王放出家得阿羅漢果王後每出城入寺參禮諸佞臣見賓頭盧不起迎王惡心諫王王欲殺之賓頭盧見王後來入門便下床七步迎之王怒曰大德由來難動今避席迎何耶答曰王前有好心來故不起迎今懷惡心來若不起迎必當見殺王嘆謝之然賓頭盧記王由僧起迎故却後七日必失王位被他鄰國興兵來捉經十二年鎖腳囚禁四分律見法苑敬僧部今時有作賓頭盧聖僧像立房供養立房供養亦之一途然須別施空座前置碗鉢至僧食時令大僧為受不得以僧家盤盂設之以凡聖雖殊俱不觸僧食器若是俗家則隨俗所設翻譯摩訶迦葉見世尊在靈山會上拈花示衆是時衆皆默然唯迦葉破顏微笑傳燈録阿難一日問迦葉曰師兄世尊傳金欄袈裟外別傳箇甚麼迦葉召阿難阿難應諾迦葉曰倒却門前剎竿著馬鳴者北天竺國王餓七匹馬至于六日請比丘説法以浮流草與之馬垂念聽法無念食想于是內外沙門乃知非恆以馬解其音故號為馬鳴本傳正法衰微六百歲以九十六種諸外道等邪見競興破滅佛法有一比丘名曰馬鳴善説法要降伏一切諸外道輩七百歲已有一比丘名曰龍樹善説法要滅邪見幢燃正法炬摩訶摩耶經馬鳴當顯王時龍樹當秦始皇時龍樹龍樹者龍接入海于宮殿中以諸方等深奧經典無上妙法授之即得深入無生三忍具足龍還送出入寂後南天竺敬奉之其母樹下生之因字阿周陀那阿周陀那樹名也以龍成其道故以龍配字號曰龍樹本傳龍樹至南印度彼國之人多信福業祖為説法遞相謂曰人有福業世間第一徒言佛性誰能覩之祖曰汝欲見佛性先須除我慢彼人曰佛性大小祖曰非大非小非廣非狹無福無報不死不生彼聞理勝悉回初心祖復于座上現自在身如滿月輪一切衆唯聞法音不覩祖相彼衆中有長者子名迦那提婆謂衆曰識此相否衆曰目所未覩安敢辨識提婆曰此是尊者現佛性體相以示我等何以知之蓋以無相三昧形如滿月佛性之義廓然虛明言訖輪相即隱復居本座而説偈言身現圓月相以表諸佛體説法無其形用辨非聲色彼衆聞偈頓悟無生傳燈録舍利弗智慧目犍連神通大迦葉頭陀阿那律天眼須菩提解空富樓那説法迦旃延論義優波離持律羅㬋羅密行阿難陀多聞淨名疏云今十弟子雖各掌一法何曾不具十德自有偏長故稱第一翻譯仲尼之有十哲猶如來之有大十弟子記纂世尊詣波羅奈國鹿野苑中轉大法輪於是世間始有三寶如來大聖是為佛寶四諦法輪是為法寶五阿羅漢是為僧寶為諸天人第一福田大藏路迦那他大論云翻世尊成論云具上九號為物欽重故曰世尊天上人間所共尊故無虛妄名如來無與等名無上士為衆生眼名天人師知三聚名佛具茲十德名世間尊翻譯如來多陀阿伽阿後秦翻為如來金剛經云無所從來亦無所去故名如來此以法身釋轉法輪論云第一義諦名如正覺名來此以報身釋成實論云乘如實道來成正覺故名如來此約應身釋上本覺為如今覺為來故曰如來朝逈道院集要如者來之體來者如之用佛書雜説佛殿中塑三世佛像中尊釋迦當見在賢劫彌勒居左當未來星宿劫迦葉居右當過去莊嚴劫鼓山寺碑彌勒西域記云梅高麗耶唐云慈氏即姓也什曰姓也阿逸多字也南天竺婆羅門子觀下生經云時修梵摩即與子立字名曰彌勒翻譯托華云此云能仁寂默寂默故不住生死能仁故不住涅槃悲智兼運立此嘉稱發軫云本起經翻釋迦為能仁本行經譯牟尼為寂默能仁是姓寂默是字姓從慈悲利物字取智慧冥理以利物故不住涅槃以冥理故不住生死長水云寂者現相無相默者示説無説此則即真之應也翻肇曰正音云菩提薩埵菩提佛道名也薩埵秦言大心衆生有大心入佛道名菩提薩埵安師云開士始士荊溪釋云心初開故始發心故淨名疏云古本翻為高士既異翻不定須留梵音今依大論釋菩提名佛道薩埵名成衆生天台解云用諸佛道成就衆生故名菩提薩埵又菩提是自行菩埵是化地自修佛道又化他故賢首云菩提此謂之覺薩埵此曰衆生以智上求菩提用悲下救衆生上阿那婆婁吉低輸此云觀世音能所圓融有無兼暢照窮正性察其本末故稱觀也世音者是所觀之境也萬象流動隔別不同類音殊唱俱蒙離苦菩薩弘慈一時普救皆令解脫故曰觀世音唐奘三藏云觀有不住有觀空不住空聞名不惑於名見相不沒於相心不能動境不能隨動隨不亂其真可謂無礙智慧也上異口同音幸善言也真實不虛此其觀自在者也諦聽此佛之觀世音也菩薩者慱施而濟衆者也如來菩薩猶堯舜禹稷也佛書雜説大論云阿羅名賊漢名破一切煩惱賊故又阿名不羅漢名生後世中更不生是名阿羅漢法華疏云阿颰經云應真瑞應云真人悉是無生釋羅漢也或言無翻名含三義無名粳脫後世田中不受生死果報故云不生九十八使煩惱盡故名殺賊具智斷功德堪為人天福田故言應供含此三義故存梵名翻譯經云羅漢者真人也聲色不能污榮位不能動何必鶡冠雀辨反拘自縳磕齒噓氣而稱道哉廣弘明辨惑應真王喬控鶴以沖天應真飛錫以躡虛天台賦百法論曰并及八輩應真僧然應真謂羅漢也注釋曇諦廬山賦應真凌雲以踞峰眇翳景而入冥法苑鼓僧部此云天龍樹弟子波吒釐城僧屈外道經十二年不擊捷稚提婆重聲摧伏異道提婆因入大自在廟廟金為像像高六丈琉璃為眼大有神驗求願必得怒目動睛提婆語曰神則神矣本以精靈訓物而假以黃金琉璃威炫于世何斯鄙哉便登梯鑿神眼衆人咸云神被屈辱婆曰欲知神智本無慢心神知我心復何屈辱夜營厚供明日祭神神為肉身而無左眼臨祭歎曰能此施設真為希有而我無眼何不施眼提婆即剜已眼施之隨剜隨出凡施萬眼神大歡喜問求何願婆曰我辭不假他但未信受神曰如願即沒不現神理交通咸皆信伏翻譯達摩鬱多羅此云法尚佛滅八百年出造雜毗曇上福田夫云福田者三寶之謂也功成妙智道登圓覺者佛也玄理幽寂正教精誠者法也禁戒守真威儀出俗者僧也皆是四生導首六趣舟航高拔天人重踰金石譬乎珍寶劣相擬議佛以法主標宗法以佛師居本僧為弟子崇斯佛法廣弘明僧行篇永平夜夢金人遣使西域尋法遂獲三寶東傳洛陽畫釋迦立像是寶佛也翻四十二章經是法寶也迦竺來儀是僧寶也上孤山云此翻緣覺觀十二緣而悟道故亦翻獨覺出無佛世無師自悟故今楞嚴云復有無量辟支者將非他方無佛之土大權引實而來此會乎翻譯釋迦起無緣之慈應有機之召語其迹也則行滿三祗相圓百劫降神而乘玉象掩耀而誕金姿三十二祥休徵開於地府一十八梵禎瑞駭于天宮靈相周於十方神光顯乎八極述其本也久證圓明塵沙莫能算其壽早登寂照虛空無以量其體豈唯就攀枝而偉瑞徵白首而效祥猶螢光與龍燭競輝魚目共蛇珠並曜廣明弘夫大慈化圓德滿緣謝機亡仁舟溺于兩河慧目沉於雙樹其六天八國之位法儔聖衆之倫且電合而風馳而雲委而霧集靈齒瑞骨昭勝福于殊方紺髮紅爪顯神功于絶代是知莫來莫往弘濟之德美焉非顯非昧聲華之風盛矣豈同鼎湖亡返嶠山之冢獨存流沙不歸扶風之隴空樹上道流百靈夫佛垂化也道濟百靈法傳世也慈育萬有出則釋天前引入乃梵王後隨左輔大將由滅惡以成功右弼金剛用生善而為德三乘賢聖既肅爾以歸投八部鬼神故森然而翊衛翻譯佛有覺名假名非實佛有形像假像非真非真而立像為令因像以悟真非實以施名為令因名以悟實無名無實悟者所以豁虛非像非真達人所以玄會明概精至或言老子入夷狄為浮屠浮屠不三宿桑下不欲久生恩愛精之至也天神遺以好女浮屠曰此但革囊盛血遂不盼之其守一如此乃能成道後襄稽傳客問三教優劣李士謙曰佛日也道月也儒五星也客亦不能難而止北史人以大覺為歸世之迷人塵勞妄想而不悟雖生而喪其所以生矣此達者之所哀佛氏之所以有大悲之號也儒書雜説南無佛者化胡經云老子化胡王不受其教老子曰王若不信吾南入天竺教化諸國其道大興自此已南無尊於佛者胡王猶不信受曰若南化天竺吾當稽首稱南無佛廣弘明梵言南無此言歸命亦云救我上釋迦佛生剎利王家放大智光明照十方世界涌金蓮花年十九欲出家夜有天人名淨居於窗牖中乂手曰太子言出家時至乃於檀特山中修道鬱頭藍佛處學非非想于二月八日明星出時成佛號天人師住世四十九年將金縷僧迦黎衣傳法與摩訶迦葉説無常偈曰諸行無常是生滅法生滅滅已寂滅為樂諸弟子以香薪茶毗之燼後金棺如故高七多羅樹往返空中化火三昧得舍利八斛四斗世尊滅後一千十七年永平中教至中夏佛時在舍衛國祗樹給孤獨園時有梵志名曰邪旬來詣佛所曰吾聞佛道厥義弘深巍巍堂堂猶星中月神智妙達衆聖中丕願開盲瞑什其愚癡所事何師天尊曰吾前世師其名難數吾今自然神耀得道非有師也所謂八師者不殺不盜不淫不惡口不飲酒老病死西溪叢話四日照世東有馬鳴南有提婆西有龍猛北有童受或通宗乎衆典或別釋于一經分照乎四方俱破于群翳西域記開雲見日佛經如江海其文如錦繡吾既覩佛經之説覽老子之要守恬淡之性觀無為之行還視世事猶臨天井而窺溪谷登嵩岱而見丘垤矣五經則五味佛道則五穀矣吾自聞道已來如開雲見白日炬火入冥室焉牟子佛有四牙廣半寸長半寸一牙在呵條國又一牙在天上又一牙在海龍王宮又一牙在乾陀國國王使大臣九人守保之月朝捧擎牙出或放光明香花數十斛散牙上而牙不沒佛骨記醍醐之教踰於佛性從乳出酪從酪出蘇從生蘇出熟蘇熟蘇出醍醐醍醐之精也涅槃經黃面夫子黃面夫子之事豈不明明也哉宗炳明佛説神龜元年太后遣宋雲與比丘惠生向西域求取經二年十二月初入烏場國雲與惠生出城外尋如來教迹水東有佛晒衣處初如來在烏場國行化龍王瞋怒興大風雨佛僧迦梨表裏通濕雨止佛在石下東面而坐晒袈裟年歲雖久彪炳若新非直條縫明見至于細縷亦新乍往觀之如似未徹假令刮削其文轉明佛坐處及晒衣所並有塔記伽藍記嚼楊植地王城北八十里有如來履石之迹起塔籠之履石之處若水踐泥量之不定或長或短佛本清淨嚼楊枝植地即生今成大樹胡名曰婆樓上王城東南山行八日如來苦行投身餓虎之處高山籠嵸危岫入雲山有收骨寺三百餘僧王城南一百餘里有如來昔作摩休圖剝皮為紙折骨為筆處阿育王起塔籠之舉高十丈折骨之處髓流著石觀其脂色肥膩若新上王城西南五百里有善持山山頂東南有太子石室有太子男女繞樹不去婆羅門以杖鞭下流血灑地處其樹猶存灑血之地今為泉水室西三里天帝釋化為獅子當路蹲坐遮嫚𡛠之處石上毛尾爪迹今悉炳然上那迦羅阿國有佛頂骨方圓四寸黃白色下有孔受人手指閃然似仰蜂窠上醯羅城中有佛頂骨用尺二寸其相仰平形如天蓋佛髑髏蓋如荷葉槃佛眼圓精狀如奈許澄淨皎然有佛大衣其色黃赤佛之錫杖以鐵為環紫檀為笴此五聖迹同在一城玄奘傳佛放眉間白毫相光遍照東方萬八千世界皆如金色幽冥衆生悉得相見法花經普通六年西域使還獲佛爪髮髮青紺色以物伸之隨物長短放之則旋曲為螺釋氏通鑑陳宣帝太建二年重為孝太妃建靈剎高一十五丈下安佛爪長二寸闊一寸藏諸寶篋或光飛五色焰起一尋神變不窮覩者生信上靈鷲耆闍崛山此譯云靈鷲峰山在摩竭陀國之正中王舍大城之西北三十餘里其山頂東西長南北狹翠影相映濃淡分色如來住世垂五十年多居此山廣説妙法大乘本生心地觀經者釋迦如來於山與文殊師利彌勒八萬四千大菩薩及餘無量天龍神鬼十六國王之所説也唐憲宗序闢圓明之界廣納于無邊開常樂之門普該于有識道宣法花經序圓明如來之藏常樂涅槃之界如來世尊既自證得廣説妙法開方便之門示真實相令諸有情普皆悟入故金剛經云所有一切衆生之類我皆令入無餘涅槃而滅度之智度論云涅槃城以空無相無願為門注拘尸那城北阿利羅跋提河此譯為有金河河畔有婆羅林如來于此娑羅林中入于涅槃上梵語涅槃此云無為楞嚴經云乃不生不死之地一切修行之所依歸佛説施燈文云願一切衆生皆得涅槃微妙光明至涅槃者乃有微妙光明世人誤認為死大非也多心經注德無不備者謂之為涅槃道無不通者名之為菩薩智無不周者稱之為佛陀夫佛陀者漢言大覺也菩薩者漢言大道也涅槃者漢言無為也廣弘明反本求宗者不以生纍其神超落塵封者不以情纍其生不以情纍其生則生可滅不以生纍其神則神可冥冥神絶境故謂之泥洹泥洹之名豈虛稱也哉遠法師不敬王者論佛有真應二身權實兩知三明八解五服六通神力不可思議法號心行處滅其道也運衆聖于泥洹其力也接下凡于苦海唐法林破邪論闍維或耶旬正名荼毗此云焚燒西域記云涅疊槃那舊闍維訛也通慧音義云親問梵僧未聞闍維之名翻譯清淨平等覺經翻無量清淨佛無量壽經翻無量壽佛稱讚淨土經云其中世尊名無量壽及無量光毗盧遮那輔行曰此云遍一切處煩惱體淨衆德悉備身土相稱遍一切處光明玄云法明可軌諸佛軌之而得成佛故經云諸佛所師所謂法也上毗盧教主功德難思普賢主願文殊表信智輔佐毗盧為教之主二聖為因如來為果因圓滿果三聖圓融為一無旱偈云毗盧遮那佛願力周法界一切國土中恆轉無上輪則天華嚴經序梵經云毗盧遮那華言是種種光明遍照道院集菩提樹摩竭陀中印度大國也周萬餘里中有菩提樹即畢鉢羅樹也昔佛在世高數百尺屢經殘伐猶高四五丈佛坐其下成等正覺因而謂之菩堤樹焉莖幹黃白枝葉青翠冬夏不凋光鮮無變每至涅槃之日葉皆凋落頃之復故西域記法苑云釋迦道樹名阿沛多羅萬八千歲同臨有截之區七十二君詎識無邊之義由是人迷四忍輪回于六趣之中家纏五蓋沒溺于三塗之下及夫鷲巖西峙象駕東驅慧日法王超四大而高視中天調御越十方以居尊包括鐵圍延促沙劫其為體也則不生不滅其為相也則無去無來念處正勤三十七品為其行慈悲喜捨四無量法運其心方便之力難思圓對之機多緒混太空而為量豈算數之能窮入纖芥之微區匪名言之可述無得而稱者其唯大覺歟則天華嚴經序大覺妙覺佛也三覺圓滿故稱妙覺心地觀法佛亦名梵由與無上梵德相應是故世尊獨應名梵顯宗論梵帝乘時牢籠于萬八千歲中宗三藏聖教序大梵經音義梵迦夷此言淨身初禪梵天淨名疏云梵是西音此云離欲或云淨行法華疏云除下地繫上升色界故名離欲亦稱高淨淨名疏云梵王是娑婆世界主翻譯葛洪字苑梵潔也上大雄大雄以慈悲致化法王以清淨為宗心地觀序皆謂佛一切諸佛皆有三身一者法身謂圓心所證二者報身謂萬善所感三者化身謂隨緣所現今釋迦牟尼佛者法身久證報身久成今之出現蓋化身耳禪林妙記序跋闍羅波膩梁云金剛應法師云跋闍羅此云金剛波膩此云手謂執金剛杵以立名也乃法意王子據經唯一人今狀于伽藍之門而為一像夫應變無方多亦無咎索隱記鞞沙門大論云秦言多聞主夜乂及羅剎光明疏云北水精埵王名毗沙門翻譯玄宗天寶十二載僧史元年西蕃寇圉涼州帝命三藏不空祈陰兵救之空誦仁王密語數番有神介胄而至帝親見之問曰此何神也空曰此方毗沙門天王長二子也空誦密語遣之數日涼州奏有神人被金甲鼓角大鳴蕃寇奔潰斯須城土天王見形謹圖形上進帝大悅因勑諸節鎮所在州府於城西北隅各立天王形像佛寺亦別院安置釋氏通鑑僧史釋迦如來説從是西方過十萬億佛土有世界號極樂以無八苦十惡道故也其國名淨土以無三毒五濁業故也其佛號阿彌陀以壽無量願無量功德相好光明無量故也白畫西方慎記經云西方淨土以七寶裝嚴無地獄餓鬼禽畜以至蠕動之類常清淨自然無一切雜穢故名淨土其人生蓮花中長生不老衣食宅宇隨意化成其景序常春無復寒暑大受快樂無一切苦惱故名極樂世界佛者有大神力身紫金色三十二相八十種好六通清徹前知無窮却睹無極菩薩本經八處平滿佛身七處平滿謂兩手兩肩兩足及額十住論佛表裏八處平滿三峰滿齊如等色好佛地經庾公嘗入佛圖見臥佛曰此子疲于津梁時以為名言世説涅槃經云如來背痛於陰菴羅雙樹間入般經槃北首而臥故後之圖繪者為此像普門疏云此云淨行劫初種族山野自間故人以淨行稱之其人種類自云從梵天口生四姓中勝獨取梵名準五天竺有餘國即無諸經中梵志即同此名正翻淨裔稱是梵天苗裔也翻譯古佛宇見京口北固山甘露寺大鐵護銘梁天監鑄也沙門或云桑門什師云佛法及外道凡出家者皆名沙門肇云出家之都名也後漢書云沙門漢言息心削髮去家絶情洗欲而歸于無為也瑞應云息心達本源故號為沙門翻譯太子出北城門天帝復化作沙門太子曰何謂沙門對曰沙門之為道舍妻子捐棄愛欲也瑞應經沙門秦言義訓勤行趨涅槃也釋僧肇維摩經注佛舊經本云浮屠羅什改為佛徒知疹源惡故也所以名為浮屠胡人凶惡故老子云化言始不欲傷其形故髡其頭名為浮屠况屠割也至者禕後俊為佛圖本舊經云喪門喪門由死滅之門云其法無生之教名曰喪門至羅什又改為桑門僧後又改為沙門沙門猶沙汰之法不足可稱三破論漢明之世佛經始過故漢譯言音字未正浮音似佛桑音似沙聲之誤也以圖為屠字之誤也滅惑論經云浮圖者聖瑞靈圖浮海而至故云浮圖也論云喪門者死滅之門也喪者滅也滅塵之勞通神之解即喪門也桑當為乘字之誤耳乘門者即大乘門也煩想既滅遇物斯乘故先云滅門後云乘門焉息心達原號曰沙門此則練神濯穢反流歸潔即沙汰之謂也僧順折三破論梵語云僧伽唐言衆僧史略云凡四人以上名僧今一人亦稱僧蓋從衆之名也亦如萬二千五百人為軍一人亦稱軍也善覺要覽僧伽大論秦言衆多比丘一處和合是名僧伽譬如大樹叢林是名為林又僧名良福田者報恩經云衆僧者出三界之福田謂比丘具有戒體戒為萬善之根是故世人歸信供養種福如沃壤之田能生嘉苗故號良福田翻譯和尚或和闍傳云和尚梵本正名塢波遮迦傳至于闐翻為和尚傳到此土什師翻名力生善見云和尚外國語漢言知有罪知無罪也上梵語云比丘秦言乞士謂上於諸佛乞法資益惠命下於施主乞食資益色身同覺要覽大論云比丘名乞士清淨活命故復次比名破丘名煩惱能破煩惱故復次比名怖丘名能能怖魔王及魔人民乞士者乞是乞求之名士是清雅之稱翻譯此翻息慈謂息世染之情以慈濟群生也又云初入佛法多存俗情故須息惡行慈也南山沙彌別行篇七歲至年十三者皆名驅烏沙彌若年十四至十九名應法沙彌若年二十已上皆號名字沙彌寄歸傳落髮後稱沙彌也華言為息慈謂安息在慈悲之地也善覺要覽有過能自改名上人內有德智外有勝行在人之上名上人上律云瓶沙王稱佛弟子為上人大品經佛言若菩薩一心行阿耨三藐三菩提多羅心不散亂是名上人翻梵云阿此云無梵云耨多羅此云上梵語三此云正梵語藐此云等梵語菩提此云覺是阿耨多羅三藐三菩提者乃無上等正覺謂無上真性也心經注或阿祗利寄歸傳云梵語阿遮梨耶唐言軌範今稱闍梨訛略菩提資糧論云阿遮梨夜隋言正行南山鈔云能糾正弟子行故翻新云杜多此云抖擻亦云修治亦云洮汰垂裕記云抖擻煩惱故也善住意天子經云頭陀者抖擻貪欲嗔恚愚癡三界內外六入若不取不捨不修不著我説彼人名為杜多今訛稱頭陀上尊勝經號僧曰苾芻之草也而有五義一體性柔軟喻出家人能折伏身語粗獷故二引蔓旁布喻出家人傳法度人連延不絶故三馨香遠聞喻出家人戒德芬馥為衆所聞四能療疼痛喻出家人能斷煩惱毒害故五不背日光喻出家人常向佛日故上婆檀陀大論秦言大德毗奈耶律云佛言從今日後小下苾芻于長宿處應喚大德老宿體昆履此云老宿他毗利此云宿德上座悉替那此云上座五分律佛言上更無人名上座道宣勑為西明寺上座列寺主維那之上南山云聲論翻為次第謂知僧事之次第寄歸傳云華梵兼舉也維是綱維華言也那是梵語刪去羯磨陀三字也僧史略云梵語羯磨陀那譯為事知亦云悅衆謂知其事悅其衆也明帝夢金人遣蔡愔秦景等使往天竺尋往佛法愔等于彼遇見攝摩騰乃要還漢地騰志誓弘通不憚疲苦冒涉流沙至乎洛邑明帝甚加賞接于城西門外立精舍以處之漢地有沙門之始也高僧傳時竺法蘭與摩騰共契遊化遂相隨而來既達雒陽與騰同止翻譯四十二章經可二千餘言漢地見存諸經唯此為始也上康僧會其先康居人吳地初染大法風化未全僧會欲使道振江左興立圖寺乃杖錫東遊以昊赤烏十年初達建業營立茆茨設象行道時吳地初見沙門疑為矯異有司奏曰有胡入境自稱沙門服非常事應檢察權曰昔漢明帝夢神號稱為佛彼之所事豈非其遺風耶即召請會詰問有靈驗否會曰如來遷逝忽逾千載遺骨舍利神曜無方昔阿育起塔八萬四千塔寺自興以來遺化也會乃潔齋靜室以銅瓶如几燒香禮請三七日果獲舍利權大嗟服即為建塔以始有佛寺故號建初寺因名其地為佛陀里由是江左大法遂興皓大集朝賢以馬車迎會會既坐皓問曰佛教所明善惡報應何者是耶會對曰夫明主以孝慈訓世則赤烏翔而老人星見仁德育物則醴泉湧而嘉苖出善既有瑞惡亦如之故為惡于隱鬼得而誅之為惡于顯人得而誅之易稱積善餘慶詩詠求福不回雖儒典之格言即佛教之明訓皓曰若然則周孔已明何用佛教會曰周孔所言略示近迹至于釋教則備極幽微故行惡則有地獄長苦修善則有天宮永樂舉茲以明勸沮不亦大哉孫綽為之贊曰會公蕭瑟實惟令質心無近纍情有餘逸厲此幽夜振彼尤黜超然遠詣卓矣高出高僧傳𥿵鉢支遁字道林慮人幼有神理聰明秀徹初至京師太原王濛甚重之曰造微之功不減輔嗣隱居餘杭山沉思道行之品委曲慧印之經卓焉獨拔得自天心年二十五出家每至講肆善摽宗會而章句或有所遺時為守文者所陋謝安聞而善之曰此乃九方歅之相馬也略其玄黃而取其駿逸劉恢殷浩許詢郗超孫綽袁彥伯等並一代名流皆著塵外之狎王羲之觀遁才藻驚絶遂披襟解帶留連不能已仍請住靈嘉寺意存相近王濛宿構精理撰其才辭往詣遁作數百語自謂遁莫能抗遁徐曰貧道與君別來多年君語了不長進濛慚而退焉乃歎曰實緇鉢之王何也郗超後與親友書云林法師神理所通玄拔獨悟數百年來紹明大法令真理不絶一人而已遁卒超為之序傳袁宏為之銘贊周曇寶為之作誄孫綽道賢論以七沙門比竹林七賢以遁方向子期論云支遁向秀雅尚老莊二子異時風好玄同矣後高士戴逵行經遁墓乃歎曰德音未遠而拱木已繁冀神理綿綿不與氣運俱盡耳遁有同學法處精理入神先遁亡遁歎曰昔匠石廢斤於郢人牙生輟絃於鍾子推已求人良不虛矣寶契既潛發言莫賞中心蘊結余其亡矣上余以寧康二年命駕之剡石城山即法師之丘也高墳鬱為荒楚丘隴化為宿莽遺迹未滅而其人已遠感想平昔觸物悽懷王珣法師墓下詩序佛圖澄姓帛氏以永嘉四年來適洛陽志弘大法善誦神呪能役使鬼物以麻油雜脂塗掌千里外事皆徹見掌中如對面焉亦能令潔齊者見又聽鈴音以言事無不驗效左乳旁先有一孔圍四五寸通徹腹內有時腸從中出或以絮塞孔夜欲讀書輒拔絮則一室洞明又齋日輒至水邊引腸洗之還復內中上值京師有難潛遁草澤間石勒雄異好殺害因勒大將軍郭默略見勒勒甚敬信之虎即位亦師澄號大和尚自知終日別傳卒于鄴宮寺後有沙門從羅州來稱見澄西入關右季龍掘而觀之唯有一石而無尸也季龍惡曰石者朕也葬我而去吾將死矣明年季龍死高佛圖澄者得聖之人也乳孔流光不假燈炬之照占鈴映掌坐觀成敗之儀兩主奉之若神百辟敬之如佛預啓東儲之二前表石蔥之禍及難生妖現諫虎以刑濫法深饗壽不遙廣弘明辨惑篇邢州內丘縣西古中丘城寺有碑後趙石勒光初五年所立也碑云大和上佛圖澄願者天竺大國附賓小主之元子本姓溫所以言注者思潤理國澤彼無外是以號之為溫按高僧傳名僧傳晉書藝術傳佛圖澄並無此姓今云姓溫亦異聞也封氏聞見耆域者天竺人任性忽俗人莫能測洛陽兵亂辭還天竺洛中有沙門竺法行者高足僧也時人方之樂令因請域曰上人既得道之僧願留一言以為永誡域曰可普會衆人也衆既集域升高座曰守口攝身意慎莫犯衆惡修行一切善如是得度世言訖便禪默行重詣曰願上人當授所未聞如斯偈義八歲童子亦已諳誦非所望于得道人也域笑曰八歲雖誦百歲不行誦之何益人皆知敬得道者不知行之自得道悲夫吾言雖少行者益多也於是辭去數百人各請域中食域皆許往明旦五百舍皆有一域始謂獨過末相讎問方知分外降焉高相傳云釋道欽往徑山有問道者率爾而對皆造宗極劉忠州嘗乞心偈令執爐而聽再三稱諸惡莫作諸善奉行晏曰此三尺童子皆知之欽曰三尺童子皆知之百歲老人行不得至今以為名理酉陽杭州烏窠師答白居易語同釋鑑釋道安姓衛氏常山扶柳人神聰性敏形貌甚陋至鄴佛圖澄見而異之因事澄為師後避地南投襄陽時襄陽習鑿齒鋒辨天逸籠罩當時其先藉安高名早以致書通好及聞安至即往修造既坐稱言四海謂鑿齒安曰彌天釋道安時人以為名答鑿齒與謝安書云來此見釋道安故是遠勝非常道士恨足下不同日而見其亦每言思得一敘孝武遣使通問并有詔曰安法師器識倫逼風韻摽朗居道訓俗徽績兼著豈直規濟當今方乃陶津來世以太元十年卒羅釋在西方因聞安風謂是東方聖人恆遙禮之初安生而便左臂有一皮廣寸許著臂上可得上下之唯不得出手時人謂之為印手菩薩高初魏晉沙門依師為姓故姓各不同衛道安以為大師之本莫過釋迦乃以釋命氏復獲增一阿含經稱四河入海無復河名四姓為沙門皆稱釋種既懸與經符遂為永式鳩摩羅什此云童壽神情朗徹傲岸出群應機領會鮮有其匹西域諸國感伏其神雋每至講説諸王皆長跪座側令什踐而登焉苻堅建元中太史奏云有星見外國分野當有大德智人入輔中國堅曰朕聞西域有鳩摩羅什襄陽有沙門道安將非此耶即遣將軍呂光西伐龜茲光與什同來聞堅為姚萇所害遂據西涼至姚興滅西呂迎入長安待以國師之禮奉之若神晤言相對則淹留終日研微造盡則窮年忘倦高嘗講經于草堂寺興及朝臣大德沙門千有餘人肅容觀聽羅什忽下高坐謂興曰有二小兒登吾肩欲鄣須婦人興乃召宮女進之一交而生二子焉興嘗謂羅什曰大師聰明超悟天下莫二何可使法種少嗣遂以伎女十人逼令受之爾後不住僧坊別丘解舍晉書每至講説常先自説譬如臭泥中生蓮花但採蓮花勿取臭泥也高天竺密陀耶舍至姑臧聞什受秦宮女歎曰什如好綿其可使入棘刺乎什聞耶舍來勸秦王迎之耶舍至王郊迎別荊精舍處之供設如王者耶舍一無所受時至分衛一食而已善毗婆沙論而髭赤時號赤髭毗婆沙釋鑑天女孝武中釋慧嵬戒行嚴潔多在山禪定後因寒雪有一女子來求寄宿姿容婉媚衣服鮮明自稱天女以上人有德天遣我來以相慰喻談説欲言勸動其意嵬執志貞逈一心無擾乃謂女曰吾心若死灰無以革囊見試女遂凌雲而逝顧嘆曰海水可竭須彌可傾彼上人者秉志堅貞釋氏通鑑竺法護本姓支氏博覽六經遊心七籍雖世務毀譽未嘗介抱世居燉煌死而道化周洽時人咸謂燉煌菩薩也高道場寺僧覺賢儀軌率素不同華俗而志韻清遠雅有淵致市師法師僧弼與沙門寶林書曰道場禪師甚有天心便是天竺王何風流人也連眉禪師曇摩蜜多此云法秀沈邃有慧解儀軌詳正生而連眉故世號連眉禪師山竺法友志業強正慱通衆典嘗從竺道潛受阿毗曇一宿便誦潛曰經目則諷見稱昔人茲能仁更興大晉者必取汝為五百之一也竺道潛字法深簡文以為道俗標領支遁與高驪道人書云上坐竺法深中州劉公之弟子體道貞峙道俗綸綜往在京邑維持法網內外俱瞻弘道之匠也嘗于簡文坐劉恢問道人何以遊朱門答曰君自見其朱門貧道如遊蓬戶竺法汰少與道安同學下都止瓦官寺簡文深相敬重領軍主洽東亭王珣太傳謝安並欽敬無極卒後孝武詔曰汰法師道播八方澤流後裔孫綽詩曰凄風拂林鳴絃映壑爽爽法汰校德無作竺道一從汰公受學思徹淵深文鋒富贍聲播內外律行清嚴四遠僧尼咸依附咨稟時人號曰九州都維那孫綽為之贊曰馳騁遊説言固不虛唯茲一公綽然有餘譬若春圃載芬載敷條何猗蔚枝幹扶踈汰有弟子曇一亦雅有風操時人呼曇一為大一道一為小一名德相繼為時論所宗竺僧朗與隱士張忠為林下之契共遊處太山金輿谷此谷中舊多虎災人常執杖結群而行及朗居之猛獸歸伏晨行夜往道俗無滯百姓咨嗟稱善無極故奉高人至今猶呼金輿谷為朗公谷也道流東國釋慧遠弱而好書圭璋秀發莊老性度弘偉風鑒朗拔高遊學許洛年二十一欲南渡就范宣子學道阻不通遇釋道安以為師抽簪落髮研求法藏釋曇翼每資以燈燭之費誦鑒淹遠高悟冥賾安常歎曰道流東國其在遠乎襄陽既沒振錫南遊結宇靈嶽自年六十不復出山名被流沙彼國僧衆皆稱漢地有大乘沙門每至然香禮拜輒東向致敬張野遠法師銘遠法師每送客不過虎溪道士吳修靜同淵明入山見師師送之執手共話不覺過虎溪三人相顧大笑令人畫之為廬山三笑圖釋氏通鑑清風襲人遠法師居廬山三十年影不出山迹不入俗弟惠持亦有高行社衆數千持居第一座其社衆名迹尤彰彰者一十八人俗士則有劉遺民雷次宗周續之宗炳張野張詮法師則有慧永慧持道敬罽賓則有佛馱跋陀羅尊者他如慧睿曇順曇常道昺曇詵類以童稚出家同修淨社最後有竺道生及罽賓佛馱耶舍尊者以義熙十八年方入山則荊社二十六七年矣猶得在十八賢傳列至今清風襲人又陶淵明以山無酒而去謝靈運以心雜不得入社陸修靜嘗從遠公問道今世傳有二十一人焉遠之門德行則又有道祖僧遷道流並才義英烈上登龍門慧持遠公弟也形長六尺風神俊爽伏事道安遍學衆經遊刃五藏隨遠共止廬山徒屬莫匪英秀往反三千皆以持為稱首王珣與范寧書云遠公持公孰愈范答書云誠為賢兄賢弟也時有沙門皆望風推服有升持堂者皆號登龍門宋政和三年嘉州奏本部路傍有大古樹因風摧折中有一僧禪定鬚髮被體指爪繞身徽宗勑肩輿入京命西天總持三藏以金磬出其定遂問何代僧曰我東林遠法師之弟急持因遊峨嵋入定于樹遠師無恙否藏曰遠師晉人化去七百年矣持不復語藏問師既至此將欲歸何所持曰陳留縣復入定帝製三偈令繪像頒行偈曰七百年來古老錐定中消息許誰知爭如隻履西歸去生死何勞木作皮有情身不是無情彼此人人定裏人會得菩提本無樹不須辛苦問盧能傳燈釋僧肇京兆人學善方等兼通三藏才思幽玄又善談説承機挫鋭曾不留滯後羅什至姑臧肇自遠從之行嗟賞無極肇著般若無知論凡二千餘言竟以呈什什讀之動善乃謂肇曰論解不謝子辭當相挹時廬山隱士劉遺民見肇此論乃嘆曰不意方袍復有平叔因以呈遠公遠乃撫機嘆曰未嘗有也因共披尋玩味更存往復六魏太和二十一年詔曰羅什法師可謂神出五才志入四行者也釋僧睿謙虛內敏學與時競精練五門善入六靜姚嵩以為鄴衛之松柏姚興勑見之睿風韻窪隆含吐彬蔚興大賞悅後謂嵩曰乃四海之標領何獨鄴衛之松柏釋慧隆凝心佛法貫通衆典思徹詮表善于清論凡先舊諸家盤滯之處顯發開張使昭然可了汝南周顒目之曰隆公蕭散森疏若霜下之松竹釋法度遊學北土備總衆經時有沙門法詔榮行清苦譽齊于度而學解優之故時人號曰北山二聖求那跋摩此云功德鎧元嘉八年正月達于建業文帝引見勞問殷勤因又言曰弟子常欲持齋不殺迫以身徇物不獲從志法師既不遠萬里來化此國將何以教下跋摩曰夫道在心不在事法由巳非由人且帝王與匹夫所修各異匹夫身賤名劣言令不威若不尅苦躬將何為用帝王以四海為家萬民為子出一嘉言則士女感悅布一善政則人神以和刑不天命役無勞力則使風雨適時寒暑應節百穀滋繁桑麻鬱茂如此持齋亦大矣不殺亦衆矣寧在闕半日之食全一禽之命然後方為弘濟耶帝乃撫几歎曰夫俗人迷于遠理沙門滯于近教迷遠理者謂至道虛説滯近教者則拘戀篇章至如法師所言真謂開悟明達可與言天人之際矣乃勑住祗洹寺供給隆厚高周武帝建德六年僧道林表請開法事帝曰卿言業不乖里凡有入聖之期性非業外道有通凡之趣此則道無不在凡聖該通是則教無孔釋虛崇如是之言形通道俗徒加剃剪之飾是知帝王即是如來宜停丈六王公即是菩薩省事文殊耆年可為上座不用賓頭仁惠真為檀度豈借棄國和平第一精僧寧勞布薩貞謹即成木又何必受戒儉約實是少欲無假頭陀蔬食至好長齋豈煩斷穀放生妙同無我何藉解空忘功全過大乘寧希般若文武直是二智不觀空有權謀終成巧便豈待變化加官真為授記無謝證果爵祿交獲天堂何待上界罰戮見感地獄不指泥犂以民為子可謂大慈四海為家即同法界治收以理何異匡救安樂百姓寧殊拔苦翦罰殘害理是降魔君臨天下真成得道汪汪何殊于淨土濟濟豈謝于迦維卿懷異見妄生偏執即事而言何處非道廣弘明竺道生俊思奇拔辭清珠玉遊長安從什公受業後還都止青園寺為當時法匠宋文帝設會親同衆御于地筵下食良久衆咸疑日晚帝曰始可中耳生曰白日麗天天言始中何得非中遂取鉢便食于是一衆從之若不嘆其樞機得衷五弘范泰顏延之並挹敬風猷從之問道初生與睿公及慧嚴慧觀同學齊名故時人語曰生睿發天真嚴慧觀慧窪流得慧義憉惇進寇淵于默塞王微以生比郭林宗乃為之立傳旌其遺德近代又有釋惠生者亦止龍光寺蔬食善衆經典兼工草隸時人以同寺相繼號曰大小二生也高虎丘千人坐旁有石點頭十道四蕃志云生公講道于此無信之者乃聚石為徒與談至理石皆為點頭中吳紀聞釋道溫入廬山依遠公受學後之長安復師童壽元嘉中還止襄陽檀溪寺張邵鎮襄陽子敷聽溫講還問溫何如敷曰義解足以析微道心未易可測邵躬往候之方挹其神俊復從容謂溫曰法師倘能還俗當以別駕相處溫曰檀越乃以桎梏誘人高釋道猷吳人初為生公弟子積思參玄宗源有本孝武勑住新安為鎮寺法主帝每稱曰生公孤情絶照猷公直轡獨上可謂克明師匠無忝徽音上釋玄高弟子有玄紹者秦州隴西人學究諸禪神力自在手指供高洗漱其水香淨倍異于常沙門惠琳嘗著均善論頗貶裁佛法其歸以為六度與五教並行信順與慈悲齊立文帝見論賞之元嘉中遂參權要朝廷大事皆與議焉賓客輻輳門車常有數十輛四方贈賂於係勢傾一時方筵七八座上恆滿琳著高屐披貂裘置通呈書佐權侔宰輔會稽孔顗嘗謁之遇賓客填咽暄涼而已顗慨然曰遂有黑衣宰相可謂冠履失所矣南史夷貊傳釋惠觀姓崔清河人十歲便以慱見馳名晚遁廬山咨稟遠惠什公入關乃自南徂北訪核異同辨詳新舊風神秀雅思入玄微時人稱之曰通性則生融上首精難則觀肇第一西秦有高昌國慧嵩法師統解小乘世號毗曇孔子沙門惠始高作曇始初師羅什三輔人多宗之宋武滅秦留子義鎮長安夏赫連屈丐追敗之道俗被坑戮而惠始接刃無傷屈丐大怒召始于前以佩劍自擊之又不能害乃歡而謝罪統萬乎惠始到京師多所訓導魏什老志太武毀滅佛法境內無復沙門始忽杖錫到宮門有司奏云有一道人足白于面從門而入燾令依軍法屢斬不傷遽以白燾燾大怒自以所佩劍斫之體無餘異唯劍所著處有痕如布線焉時北園養虎于檻燾令以始餧之虎皆潛伏終不敢近試以天師近檻處輒鳴吼太始大驚延始上殿再拜稱謝許之復教始自習禪至於沒世稱五十餘年未嘗寢臥或時既行雖履泥塵初不汙足色愈鮮白世號白足阿練志高釋通融覺比丘曇謨最善于禪學講涅槃花嚴僧徒千人天竺國胡門沙菩提見而禮之焉咸號為菩薩流支解佛義知名西土諸夷號為羅漢曉魏言及隸書釋十地楞伽及諸經論二十三部雖石室之寫金言草堂之傳真教不能過也流支讀曇謨最大乘義章每彈指讚嘆唱言微妙即為胡書寫之傳之于西域沙門常東向遙禮之號曇謨為東方聖人伽藍記素三千梁什僧旻吳大帝之後也精神洞出標群獨秀性極照窮言必典詣自至金陵琅琊王仲寶吳人張思光謝眺學冠當時清真獨絶並投分請交申以縞帶天監中遊于都輦眷遇甚隆吳郡太守張充吳興太守謝覽表上延請勑給發遣二郡迎候舟楫滿門京師學士雲隨霧合中途守宰莫不郊迎晉陵太守蔡樽出候門迎之歎曰昔仲尼素王於周今旻公素王於梁矣續高僧預覩三世沙門寶公者形貌醜陋心機通達過去未來預覩三世發言似讖不可解事過之後始驗其實胡太后聞之問以世事寶公曰把粟與雞呼朱朱時人莫之能解建義元年后為爾朱榮所害始驗其言時亦有洛陽人趙法和請占朝晚當有爵否寶公曰大竹箭不須羽東廂屋急手作時不曉其意經十餘日法和父喪大竹者杖東廂屋者倚廬造十二辰歌終如其言也伽藍記法師自説姓朱名保志其生緣乘梓莫能知之齊故特地吳人張緒興皇寺僧釋法義並見法師於宋太初始出入鍾山往來都邑年可五六十歲永知其異也齊宋之交稍顯靈迹被髮徒跣負杖挾鏡或徵索酒肴或數日不食豫言未兆懸識他心一時之中分身數處陸倕墓志齊永明中住東宮後堂從平旦門中出入末年忽云門工血汙衣褰裳走過至齊廢帝鬱林王見害果以犢車載尸出自此門舍故閹人徐龍駒宅而帝頸血流于門限焉梁武帝尤深敬事嘗問年祚遠近答曰元嘉元嘉帝欣然以為享祚倍宋文之年梁書晉安王蕭綱初生日梁武遣使問志志合掌云皇子誕育幸甚然冤家亦生蓋侯景生于鮮卑懷朔鎮即東昏後身也天監十三年即化于華林門之佛堂先是忽移寺之金剛像出置戶外語人曰菩薩當去旬日無疾而終先是琅琊王筠至莊嚴寺寶志遇之與交言歡飲至亡勑令筠為碑蓋先覺也上沉舟之痛有切皇心爰詔有司式刊景行辭曰欲化毗城金粟降靈猗歟大士權迹帝京哀慈景象愍此風電慧雲晝歇慈燈夜昏陸志伽藍記寶公與江南者未委是一人也兩人也廣記趙僧儼北海人廖廓無常人不能測所友劉善明為青州欲舉為秀才大驚拂衣去後忽為沙門栖遲山谷常以一壺自隨一旦謂弟子曰吾今夕當死壺中大錢一千以通九泉之路蠟燭一挺以照七尺之軀至夜而亡時人以為命梁南嶽思禪師謂什惠成曰卿一生學問與吾炙手猶不得暖後魏末有僧達摩者本天竺王子以護國出家入南海得禪宗妙法云自釋迦相傳有衣鉢為記世相付授達摩齎衣鉢航海而來至梁詣武帝帝問以有為之事達摩不説遂折蘆渡江潛回洛陽止嵩山少林寺終日面壁人謂之壁觀婆羅門時魏氏律師流支亡藏僧中鸞鳳也與師論議是非加毒而卒其年魏使於蔥嶺回見之明帝命啓壙但有衣履而已舊唐傳燈釋僧可遇菩提達磨遊化嵩洛一見悅之奉以為師時有法林在鄴盛講勝鬘及周滅法與可同學初達磨以四卷楞伽授可可遭賊斫臂以法御心不覺痛苦火燒斫處血斷帛裹乞食如故曾不告人後林又被賊斫臂叫號通夕可為治裹乞食供林怪可手不便怒之可曰我亦無臂因相委問方知有功故世云無臂林續神光潛取利刀自斷左臂置于祖前祖易名慧可傳燈僧達含幽識明知名南北禪法一門開世殊廣曾遊梁境志公遇而告曰達禪師是大福德人也武帝常云北方曇鸞法師達禪師肉身菩薩恆北向遙禮達麼傳曰婆羅提法中龍象梁簡文慧念法師乃銘曰是曰人龍亦號僧象隋高祖曇遷禪師詔曰承守持正法利益無邊誠釋氏之楝梁即人倫之龍象智度論曰龍象言其力大水行中龍力大陸行中象力大故負荷大法者比之龍象杯渡者不知姓名常乘木杯渡水因而為號不修細行不甚持齋飲酒噉肉至于辛膾與俗人不殊闍梨通公道人者不知其姓氏居處無常所語狂譎然必有應驗飲酒食肉遊行民間侯景信甚之人並呼為闍梨景後因宴召僧通僧通取肉捏鹽以進于景問曰好否景曰大鹹僧通不鹹則爛及景死後數日衆以鹽五石置腹中送尸于建康市百姓爭屠膾羹食之皆盡後竟不知所去廣古今五行記南史釋道超姓陸少以勤篤知名遊于上京自處獨房屏絶賓件內外典墳常擁膝前而手不釋卷加以塵埃滿屋蟋蟀鳴壁中書郎吳郡張率謂曰蟲鳴聒耳塵土埋膝安能對此而無忤耶答曰時聞此聲是代簫管塵隨風來我未暇掃致忤名賓為愧多矣時人高其放達續高釋寶海姓龔梁武自講涅槃命海論佛性義海升論榻而鍮執香爐帝曰法師雖斷慳貪香爐非鍮不執海應聲曰陛下位居宸極帽簪非纛不帶帝大悅梁慧達禪師得水觀三昧每入定有窺者見清水滿室沙門道仙得火光三昧所居之室玄夜大明釋通釋慧安嘗晦夕共同學慧濟上堂布薩堂戶未開乃綰濟指從壁隙而入出亦如之濟甚駭懼後袝商人入湘川中路患痢令商出置岸側夜見火光從身而出商就視已死矣濟後言千劉虬虬曰此入火光三昧也高僧無上士釋雲崇偏精六行冠達五門同學號為無上士智顗禪師眼有重瞳俊朗通悟詣金陵尾官寺創弘禪法徐陵等明時貴望學統釋儒並稟禪慧俱傳香法禹穴慧榮住莊嚴寺道跨吳會世稱義虎辨號懸流聞顗講法故來設問輕誕自矜揚眉舞扇扇墮地顗應對事理渙然清顯譴榮曰禪定之力不可難也時沙門法歲撫榮背曰從來義龍今成伏鹿扇既隨地何以遮羞榮曰輕敵失勢未可欺也一日夢巖岩萬重雲日半垂其側滄海無畔泓澄在於其下又見一僧搖手伸臂至于岐麓挽顗上山云云顗以夢中所見通告門入咸曰此會稽天台山也聖賢之所託矣昔僧光道猷法蘭曇密晉宋英達無不栖焉周與慧辨等二十餘人隱淪斯嶽先有青州僧定光久居此山積四十載定慧無習蓋神人也顗未至二年預告山民曰有大善知識當早年山上搖手相喚不乎顗驚異焉知通夢之有枉也又聞鐘聲滿谷衆咸怪異曰鐘是召集有緣爾得住也陳永陽王伯知躬著願文曰天台闍梨德侔安遠道邁光猷宣帝求釋門誰為名勝陳暄奏云瓦官禪師德邁風霜禪鏡淵海昔在京吧群賢所宗今高步天台法雲東靄願陛下召之乃還都敕立禪衆于靈耀寺末為靈曜隘更求間靜忽夢一人翼從嚴正自稱名云余冠達也請住三橋顗曰冠達叉武法名三橋豈非光宅耶乃移居之卒後枯骸特立端坐如生顗初居臨海民以滬魚為業罾網相連四百餘里江滬溪梁六十餘所即以福緣所得金帛買斯海曲為放生之池又表聞陳宜勑禁採捕時還佛壟如常習定忽有黃雀滿空翱翔相慶鳴呼山寺三日乃散顗曰此乃魚來報吾恩也又居山有蕇觸樹皆垂隨采隨出供僧常調顗若他涉蕇即不生因斯以談誠道感矣釋曇延弘裕方雅詞辨優贍有薛居士者學揔玄儒聞而謁之言謔相高戲題方圓動靜四字命延體之延應聲曰方如方等城圓如智慧日動則識波浪靜類涅槃室薛驚異絶嘆曰由來所未見希世挺生即斯人也爾後恆來尋造質疑請義八能什貞觀左掌仙丈右掌人字口流津液充潤榮府從幼至終未嘗患渴舌文交加狀如羅綺八歲通詩禮和庾尚書林檎之作沙門洪偃才邁儒吳英鉤深釋傑面相謂曰權高多知耳白有名我有四絶爾具八能謂義導書詩辨貌聲棊是也學士傳縡嗟曰三千稱首七十當初是上人者當為對時人語曰錢塘有貞觀當天下一半初祖達摩傳慧可慧可嘗斷其左臂以求其法慧可傳璨璨傳道信道信傳弘忍弘忍信周氏黃梅人物弘忍與道信並往東山寺故謂其法為東山法門舊洛陽人潁川陳仲弓之後鳩車之齡落䰂竹馬之齒通玄戒具云畢偏肆毗尼閲筌蹄乎九丘探幽旨于八藏常慨教缺傳匠理翳譯人遂使如意之寶不全雪山之偈猶半於是杖錫既戾梵境籌咨無倦五明四含之典三藏十二之筌七例八轉之音三聲六釋之句皆盡其微法師討論一十七周遊覽百有餘國貞觀十九年回靶上京靜邁法師譯經圖紀時太宗幸東都乃留所得經像于弘福寺有瑞氣徘徊像上移晷乃滅遂詣駕并將異方奇物朝謁太宗謂之曰法師行後造弘福寺其處雖小禪院虛靜可謂翻譯之所太宗御製聖教序高宗時為太子又作述聖記並勒于碑南部新書玄奘往五印取經西域敬之侍國僧金剛三昧言嘗至中天寺中多畫玄奘麻屩及匙筯以綵雲乘之蓋西域所無者每至齋日輒膜拜焉酉陽玄奘在玉華陰翻大殷若經畢麟德元年示滅其夜子時慈恩寺明慧念誦經行旋繞佛堂忽見北方有白虹四道從北亘南橫跨東井直勢貫慈恩塔院歷歷分明慧心怪焉即自念曰昔如來滅度白虹十二道從西貫于太微于是有雙林之滅今有此將非玉華法師有無常事耶申旦向衆述其所見衆咸怪之至九日凶問至京正符所見宋高僧傳僧萬回年二十餘貌癡不語其兄戍遼陽安西久絶音問或傳其死其家為作齋萬回忽卷餅茹大言曰兄在我將饋之出門如飛馬馳不及及暮而還得其兄書緘封猶濕弘農抵安西蓋萬餘里以其萬里而回故號萬回先是玄奘法師向佛國取經見佛龕題柱曰菩薩萬回謫向閿鄉地教化奘師馳驛至閿鄉縣問此有萬回師無令呼之萬回至奘師禮之施三衣瓶鉢而去後則天追入內語事多驗時天后任酷吏羅織位稍隆者日別妻子摶陵王崔玄暉位望俱極其母憂之曰汝可一迎萬回此僧寶志之流可以觀其舉止禍福也及至毋垂泣作禮兼施銀匙筯一雙萬回忽下階擲其匙筯於堂屋上掉臂而去一家謂為不祥一日令上屋取之匙筯下得書一卷觀之乃讖諱書也遽令焚之數日後司忽即其家大索圖讖不獲得雪時酷吏多令盜夜埋蠱讖人家經月乃密籍之張易之大起第宅萬回常指曰將作人莫之悟及易之伏誅以其宅為將作監常謂韋庶人及安樂公主曰三郎斫汝頭韋庶人以中宗第三恐帝生變遂鴆之不悟為玄宗所誅也安樂公主玄宗季妹也附會韋氏熱可炙手道路懼焉萬回望見車騎連唾曰血腥血腥不可近也不久而夷滅玄宗潛龍時與張暐等同謁回見帝曳帝入反扃其戶撫帝背曰五十年太平天子可自愛張暐門外聞其言故傾心焉酉陽南部談賓録兩京記神僧傳中宗賜號玄通大居士封法雲公高什道宣依知頵律師受業持律精苦三衣皆苧一食唯菽行則策杖坐則倚床蚤風從遊居然除收土木自得固已亡身嘗築一壇僧尼受戒俄有長眉僧談道知者其實賓頭盧也復三果梵僧禮壇贊曰自佛法後像法住世興毗尼法唯師一人矣常夜後行道臨階墜墮忽覺有人捧承其足宣顧視之乃一少年也宣遽問弟子何人中夜在此少年曰某非常人即毗沙門天王子那叱太子也以護法之故擁護和尚時已久矣宣律曰貧道修行無事煩太子太子威神自在西政有可以作佛事者願太子致之太子曰某有佛牙寶事器久然頭目猶捨敢不奉獻宣律得之即今崇聖寺佛牙是也高僧傳開天傳信記律師先所居久在南終故號南山律宗焉宋高僧傳神秀師事五祖弘忍弘忍深器異之謂其懸解圓照張説嘗問道弟子之禮退謂人曰秀禪師威德巍巍王霸之器也初神秀有同學慧能者其行勞相埒住韶州廣果寺神秀奏則天併作書重邀之能以南中有緣竟不渡嶺而死天下乃散傳其道謂神秀為北宗慧能為南宗能就法性寺知光律師授滿分戒後返曹溪兩大法兩學者不下千數舊唐傳燈忍師歸寂能移住寶林寺時刺史韋據命出大梵寺苦辭入雙峰曹侯溪矣宋荷澤神會往西京受戒景隆年中却歸曹溪閲大藏經於內六處有疑問於六祖第四問先頓而後漸先漸而後頓不悟頓漸人心裏常迷悶祖曰聽法頓中漸悟法漸中頓修行頓中漸正果漸中頓頓漸是常因悟中不迷悶祖滅後二十年間曹溪頓旨沉廢于荊吳嵩嶽漸門盛行於秦洛師入京天寶四年方定兩宗南能頓宗北秀漸教乃著顯宗記傳燈神秀禪門之傑雖有禪行得帝王重之而未嘗聚徒開堂傳法至弟子晉寂始于都城傳教二十餘年人皆仰之舊唐僧一行姓張氏本名遂少聰敏讀書不再覽時道士尹崇慱學先達見所撰太衍玄圖甚嗟伏之謂人曰後生顏子也武三思請與結交一行逃匿以避之尋出家為僧隱于嵩山師事沙門晉寂盧鴻持其所製導文至寺一覽即無遺誤鴻驚謂寂公曰非君所能教導也當縱其遊學一行因求訪師資以窮大衍至天台國清寺見門前有流水一行立于門屏間聞僧于庭布算其聲蓛蓛既而謂其徒曰今日當有弟子求吾算法已合到門豈無人導達耶即除一算又謂曰門前水合却西流弟子當至一行承言而入稽首請法盡授其術而門水復東流矣自此聲振遐邇邢和璞嘗謂尹愔曰一行其聖人乎漢之洛下閎造大衍歷云後人百歲當差一日則有聖人定之今年期畢矣而一行造大衍歷正其差謬則洛下閎之言信矣河南尹裴寬深信佛法師事普寂一日詣寂寂云方有少事未暇款語且請遲回休息寬止空室見寂正堂端坐忽聞扣門連聲云天師一行和尚至矣一行入作禮室語如是者三一行入南堂寂徐命弟子遣鐘一行和尚滅度矣滅度後寬服衰絰徒步出城送葬宋僧傳明皇雜録三車釋窺基字洪道姓尉遲氏神悟精爽為玄裝弟子不斷情懸行駕纍載關輔語曰三車和尚初宣律師以弘律感天廚供饌每薄基三車之玩不甚為禮基嘗訪宣其日過午而天饌不至及基辭去天神乃降宣責以過時天神曰適見大乘菩薩在此翊衛嚴甚故無自而入宣聞之大驚于是遐邇增敬焉先是裝公親搜西域戒賢瑜伽師地論惟識宗而師盡領其妙世謂之慈恩師神僧得法尋思六祖青原山靜居寺行思禪師聞曹溪法席乃往參禮祖深器之會下學徒雖衆師居首焉亦猶二祖不言少林謂之得髓矣一日祖謂師曰從上衣法雙行師資遞授衣以表信法乃印心師既得法歸住青原六祖將示滅有沙彌希遷即石頭和尚問曰和尚百年後希遷未審當依附何人祖曰尋思去及祖順世遷每于靜處端坐寂若忘生第一座問曰汝師已逝空坐奚為遷曰我稟遺誡故尋思爾座曰汝有師兄思和尚住今吉州汝因緣在彼師言甚直汝自迷耳遷聞語便禮辭祖龕直詣靜居參禮傳燈南嶽懷讓禪師姓杜氏金州人儀鳳二年四月八日降誕感白氣應于玄象在安康之分太史瞻見奏聞高宗問是何祥對曰國之法器不染世榮通天二年受戒後習毗尼藏詣曹溪參六祖先天二年往衡嶽居般若寺其入室弟子惣有六人師各印可曰汝等六人同證吾身各契其一一人得吾眉善威儀常浩一人得吾眼善顧盼智達一人得吾耳善聽理坦然一人得吾鼻善知氣神照一人得吾舌善談説嚴峻一人得吾心善古今道一江西道一禪師姓馬氏開元中習禪定於衡嶽山中遇讓和尚同參六人唯師密受心印讓之一猶思之遷也同源而異派故禪法之盛始于二師劉軻云江西主大寂湖南主石頭往來憧憧不見二大士為無知矣又六祖謂讓和尚曰向後佛法從汝邊去馬駒踏殺天下人厥後江西嗣法布于天下時號馬祖洪州百丈山懷海禪師姓王氏丱歲離家遊學該練屬大寂闡化江西乃傾心依附與西堂智藏南泉普願同號入室時三大士為角立焉北祖華嚴和尚學于神秀禪師謂之北祖釋豐于師者本居天台國清寺與拾得寒山子相得歡甚豐于出雲遊適閭丘胤出守台州國清曰風師持淨水噀之須臾祛殄問所從來曰天台國清曰彼有賢達否曰見之不識識之不見若欲見之不得取相寒山文殊遁迹國清拾得普賢狀如貧子又似風狂在寺庫院走使廚中著火言訖辭去閭丘至任入寺于廚中見二人拜之寺僧驚訝二人曰豐于饒舌便連臂而出更不返寺閭丘復往寒岩謁問便縮入岩穴縫中乃令僧道翹尋其遺物唯于林間并村墅屋壁所抄得三百餘篇有庭際何所有白雲抱幽石之句歷然雅體今岩下有石亭亭而立號幽石焉其得拾當寺僧布薩時驅牛至堂前撫手大笑時持律首座咄曰風人得曰我不放牛也此多是此寺知僧事人也各呼亡僧法號牛各應聲而過舉衆措愕感菩薩垂迹度脫時道翹纂寒山文句于土地堂壁見拾得偈詞附寒山集中高太原崇福寺釋宗哲幼而聰穎就師玄奘門下號為得意備窮諸典講唱日新時謂之為法江哲露其頭角惟神伏同寺浮丘義學嘗曰為吾謝此品藻不知法海在乎太原蓋指浮丘為滄溟也上釋德感儀容瓌麗學業精贍天皇悅其對為之讚曰河汾之寶山嶽之英早祛俗纍夙解塵纓緇門仰德紺宇馳聲式亞龍樹爰齊馬鳴上釋法慎時賢推服聲振京師黃門侍郎盧藏用才高名重罕於推挹一見法慎慕味循環不能離坐退而歎曰宇宙之內信有高人陸象先嚴挺之房琯王昌齡等僉所贍奉願同灑掃卒後李華為碑李陽氷題額徑山法道欽德性氷霜淨行林野代宗召至京師鄭重咨問法要司徒楊綰篤情道樞行出人表一見欽於衆退而嘆曰此實方外之高士也難得而名焉名賢執弟子禮者相國崔渙裴晉公度第五琦陳少遊等自淮而南婦人禮乞號皆目之為功德山焉高僧傳崔圖問弟子今欲出家得否師曰出家乃大丈夫事非相相之所能為公於是有省傳燈塵外摩尼什神雍丱角聰悟過人孔釋二典一讀能誦公卿籍其風宇追慕者結轍而至著作郎韋子春剛氣而贍學與之酬抗子春折角滿座驚服苑舍人歎曰闍梨可謂塵外摩尼論中師子時人以為能言高僧三宣三一揚州釋法慎傳于舊章淮甸之間稱為碩匠天寶初晉陵義宣往師之毗陵多出名士僧有三宣謂慧德與義也義時于江都習業與會稽曇一閩川懷一慶雲靈一同門為朋也晉陵既有三宣慎門復出三一焉江表資為美談宋高僧杭州靈隱山寺什道標經行之外尤練詩章辭體古健比之潘劉當時吳興有晝會稽有靈徹相與酬唱作笙簧故人諺曰霅之晝能清秀越之徹洞氷雪杭之標摩雲霄每飛章寓韻竹夕花時彼三上人當四面之敵所以辭林樂府常采其聲詩景陵于陸羽云夫日月雲霞為天標山川草木為地標推能歸美為德標居間趣寂為道標爾後聲價軼于公卿至今杭州謂之西崩和尚矣宋高僧傳歸宗智常禪師目有重瞳遂用藥手按摩久而目眥俱赤世號赤眼歸宗李渤洽聞多識號李萬卷遷江州刺史與白樂天相過一日同至廬山歸宗寺與什知常相見李問曰教中有言須彌細芥子于渤即不疑芥子納須彌莫是妄談否常曰人言慱士讀書萬卷還是否李曰忝此虛名常曰摩頂至踵如椰子大萬卷向甚處著李俯首無言再思稱嘆上馬祖道一洪州廉使問曰喫酒肉即是不喫即是師曰若喫是中丞祿不喫是中丞福師入室弟子一百三十九人各為一方禪主轉化無窮傳燈紫玉道通禪師于頔相公問如何是黑風吹其船舫漂墮羅剎鬼國師曰于頔客作漢問恁麼事作麼于公失色師乃指曰這箇便是漂墮羅剎鬼國上住世影響襄陽龐蘊居士將入滅州牧于公頔問疾次居士謂之曰但願空諸所有慎勿實諸所無姓住世間皆如影響言訖枕公膝而化上什元慧俗姓陸氏立志持三白吳會之間謂為三白和尚焉三白者事理二種一白飯白水白鹽事也二身不偏觸口誦真經意不妄念此三明白非黑業也宋唐江陵府釋些些師又名青者不與人交狎口自言些些故號之矣上釋點點師者孟氏廣政中隱卬南大造山寺多遊纏市中或與人接必指點而言故因是稱焉上懿宗時杭州大慈山寰中禪師嘗示衆云説得一丈不如行取一尺説得一尺不取行取一寸釋氏通鑑志間和尚館陶人早參臨濟晚宿灌溪乾寧二年夏忽問侍者曰坐死者誰僧伽立死者誰曰僧會乃行七步垂手而逝後鄧隱峰倒立而化南部禪月大師貫休以詩謁吳越王錢鏐有滿堂花醉三千客一劍霜寒十四州之語鏐令改作四十州乃可相見休曰州亦難添詩亦難改孤間雲野孤鶴何天而不可飛遂入蜀以詩投王建曰一瓶一鉢垂垂老萬水千山得得來建遇之甚厚常呼為得得和尚釋鑑唐詩紀事宋高僧傳釋常覺後唐天成三載始于東京麗景門之右樹小禪坊勑額為普淨焉而逐月三八日設闔京僧浴其或香湯汲注樵蒸失供覺必令撤小屋抽榱桷而助爨焉陶穀為湘東張仲荀序詩贈覺云起後唐天成至漢乾祐每黑白月取三八日浴京大衆纍歲費錢可一百三十六萬數計緍千萬矣雖檀施共成實覺公化導之力也嘻大火之下陳留古封周秦已來戰伐之國人物衆而土風尚利舟車會而貨殖惟錯昔梁惠王嘗謂孟軻曰何以利吾國是知禮讓之化不勝於好利之心明矣且梁去魯干道而近道猶不同矧十萬八千里乎梁王孟子同世之人也心或有異况瞿曇上人乎彼孟氏屬斯文未喪不能揚素王之道今上人當去聖逾遠卒能行法王之教茍非三業內淨六塵外清以至公之行化於人孰以至公之心受於化也陶重敘曰自靈山覆簣法海煙流玉毫晦而微言絶金杖折而異端作惟上人也色空等觀物我都亡麻麥一齋自同禪悅炎涼一納僅蔽枯形前後王臣欲上章乞以大師為號請以紫染方袍者皆崔而推之云云宋高僧傳摩摩帝此云寺主僧史略云詩其寺主起于東漢白馬寺也東晉以來此職方盛故梁武帝造光宅寺召法雲為寺主創立僧制稽其佛世飲光統衆於靈鷲身子涖事於竹林音義指歸云僧如綱假有德之人為綱綱也隋智琳潤州刺史李海洊命琳為斷事綱維邇後寺立三綱上座維那典座也翻譯僧中職任也如網之綱如屋之梁焉肇自姚秦立正魏世都推北齊則十統分員唐世則僧録命職五臺山自貞元中智頵始封僧長矣宋僧智頵傳晉五臺山真容院光嗣時降龍大師者率領彈壓緇伍畏焉為其分散諸寺蘭若衆寡均等時徒侶堅請嗣主院宣補僧官轄諸臺院寺命曰都綱上光嗣傳稗沙門寶積經説僧之無行者曰辟如麥田中生稗麥其形似麥田夫盡謂其好麥後見方知非是沙門之在衆中似是持戒有德行者施主見時謂盡是沙門而彼癡人實非沙門是名稗沙門火宅僧廣中僧有室家者謂之火宅僧鄭熊番禺雜記京師大相國寺僧有妻曰梵嫂陰穀清異記漢明初立佛寺同梵福量時後宮陰夫人王婕妤等一百九十人出家司空陽城侯劉善峻等二百六十人出家法本內傳譯經圖記又聽洛陽婦女阿潘等出家僧史略肇曰義名信士男信士女淨名疏云此云清淨士清淨女亦云善宿男善宿女優婆塞梵語塢波索迦唐言近事男優婆夷梵語夷即女聲字也又云塢波斯迦唐言近事女言近事者親近承事諸佛法故後漢書名伊蒲塞注云即優婆塞也中華翻為近住言受戒行堪近僧住也翻神之最高謂之大覺教通三世衆別四部二從於道二守於俗從道則服像尊儀守俗則務典供事像尊謂比丘比丘尼也典供謂優婆塞優婆夷也釋彥綜福田論桓溫以雄武專朝覬覦非望時有遠方比丘尼名有道術於別室浴溫竊窺之尼倮身先以刀自破腹次斷兩足浴出溫問吉凶尼云公若作天子亦當如是晉書咸康中竹林寺尼淨檢見天女持五色花自空來迎遂騰空直上所行之路有如虹霓直屬于天釋鑑南齊禪林寺比丘尼釋淨秀挺慧于曠劫體妙解于當年七歲自然持齋十二便求出家二十九方落䰂青園躬修三葉夙夜匪懈有開士馬先生者於青園見上即便記云此尼當生兜率天也宋大明中黃修儀及南昌公主深崇三寶敬仰德行初置精舍居之明帝賜號曰禪林上前後違和恆有瑞相天監五年八月得病苦心悶不下飲彭城寺令法師以六月十九日夜得夢見一處謂是兜率天上住止嚴麗非世間比言此是上住處即見上在中於是法師有語上上得生好處當見將接上是法師小品檀越勿見遺棄上即答云法師丈夫又弘通經教自應居勝也某甲是女人何能蓋法師又云不如此也雖為丈夫不能精進持戒不及上時體已轉惡漸就綿綴久復動轉自云上兜率天見彌勒及諸菩薩皆黃金色上手中自有一琉璃清淨罌可高三尺許以上彌勒即放光明照于上身至兜率天亦不見飲食自然飽滿故一復須人間食也但聞人間食皆臭是以不肯食於彼天上得波利餅將還意欲與令法師有言令法師是人中果報那得食天上食不聽將去自後體中亦轉惡不復説餘事但云有三十二童子一名功德天二名善女天是迦毗羅所領恆來在左右與我驅使或言得人餉飲食令衆中行之復云空中畫夜作伎樂鬧人耳也沈約行狀宋元嘉十一年師子國尼鐵索羅等於建康南林寺壇上為福寺尼果淨音等受戒法事薩婆多師資傳尼講晉廢帝大和三年洛陽東寺尼道馨通法華維摩研窮理味一方宗師儒史略爾朱榮之害朝士山偉與儀曹郎袁升屯田郎李考外兵郎李與三公郎王延業方駕而行偉少居後路逢一尼望之嘆曰此輩緣業同日而死謂偉曰君方近天子當作好官既而升等四人皆死河陰竟如其言後魏書宋初有法南方人不知因緣所出辟穀食棗粟不著綿帛戒德甚尊禪定多所感通會稽恭子張使君蒞廣州便供養之隨使君還吳又隨出入尼自尅亡日捨命後勿斂但乞烏鳥至破岡如期而終使君依旨送林野間停再七日七夕鳥哭不敢侵乃收殯焉江惣祖母尼受戒勑江集隋文帝以後魏大統七年六月十三日生於同州般若寺中于時赤光照室流溢外戶紫氣滿庭狀如樓閣色染人衣內外驚禁妳母以時炎熱就而扇之寒甚幾絶困不能啼有神尼者名曰智仙河東蒲坂劉氏女也少出家有戒行和尚失之恐其角井見在佛屋儼然坐定時年七歲遂以禪觀為業及帝誕日無因而至語太祖曰兒天佛所佑勿憂也尼遂名帝為那羅延言如金剛不可壞也又曰此兒來處異倫俗家穢雜自為養之太祖乃割宅為寺內通小門以兒委尼不敢名問後皇妣來抱忽見化而為龍驚惶角地尼曰何因妄觸我兒遂令晚得天下及年七歲告帝曰佛法將滅一切神明今已西去兒當大貴從東國來佛法當滅由兒與之一切神明還來尼沉靜寡言時道成敗吉凶莫不符驗及周滅二教尼隱皇家內著法衣戒行不改帝後果自山東入為天子重興佛法每以神尼為言久云我與由佛法由小時在寺至今樂聞鐘聲乃命王劭為尼作傳其龍潛所經四十五州同時悉改為大興國寺般若其一也於天下舍利內各作神尼之像焉續高王劭舍利記比丘尼經一云除饉女康僧惠法鏡經云凡夫貪染六塵猶餓夫食飯不知厭足今聖人斷貪除六情飢饉故號出家女為除饉女也開元中溫州淨居寺尼玄機景雲中得度嘗習定於平陽大日山石窟中或者云嘗與兄宿覺同參六祖因暑圓明歌與證道歌相表裏後例立而化法屬以生死顛倒語呵之應聲而仆將罪之弘風雷陰黯若有神物移之越二日有自大日來者云是夕空中有簫罄聲釋鑑昔延州有婦人白晢頗有姿貌孤行城市年少之子悉與之遊狎昵薦枕一無所却數年而歿州人以其無家瘞于道左大歷中忽有胡僧見墓遂跌坐具敬禮焚香圍繞讚嘆數日人見謂曰此以淫縱女子以其無屬故瘞于此和尚何敬耶僧曰斯乃大聖慈悲喜捨世俗之欲無不徇焉此即鎖骨菩薩順緣已盡聖者云耳請衆開墓視之遍身之骨鉤結皆如鎖狀州人異之為設大齋起塔焉續玄怪記謂比丘比丘尼式義摩那沙彌室羅末尼此出家五衆優婆塞優婆夷此在家二衆此七衆也式義摩那此云學法女今之尼長髮也阿夷比丘尼稱阿姨師姨梵云阿梨夷此翻尊者聖者檀那者要覽曰梵語陀那鉢底唐主施主今稱檀那訛陀為檀去鉢底留那也思大乘論云皆破慳吝嫉妬及貧窮下賤苦故稱陀後得大富及能引福德資糧故稱那又稱檀越者檀即施也此人行施越貧窮海翻譯支謙字恭明月氏國優婆塞也漢末遊洛該覽經籍及諸伎藝善諸國語細長黑瘦白眼黃睛時人語曰支郎眼中黃形軀雖細是智囊高僧傳青眼貞觀時雍州牧魏王與法恭疏云律行淨于青眼威儀整于赤髭序達摩眼紺青色稱碧眼胡僧高僧傳功德直西域人道契既廣善誘日新宋大明年到荊州為釋玄暢翻譯暢刊正文義詞旨婉密舒手出香掌中流水莫之測也翻譯大僧正慧令蓋法門之上首亦㧾持之神足願等須提之問遂同迦葉之請陸雲御講波若經序梵表龍光寺僧綽建元寺法寵並道秀域中聲高梵表續慧勇傳什彥琮隋時與朝士王劭辛德源陸開明唐怡等情同琴瑟號為文外玄友續唐太宗為秦王時書慰什吉藏曰法師道濟三乘名高十地方當樹德淨土闡教禪林豈意湛露晞晨業風飄世長辭奈苑遽掩松門續劉孝孫為惠淨詩英華序云挹海不知其淺深學山徒切其峻極明鏡屢照而不疲鴻鐘待扣而斯應誠佛法之棟梁僧徒之領袖者也禇亮為惠淨金剛什文序云達鑒窮覽皎乎先覺炳慧炬以出重昏拔愛河而升彼岸景和時釋慧亮講席有聲顏延歎曰安汰吐珠玉於前斌亮振金聲于後清言妙緒將絶復興至是于莊嚴寺學徒盛集勑亮與斌遞為法主釋鑑魏文君時沙門玄高者定門之秀傑也太子晃師之廣弘明辨惑元和中鄧隱峰之五臺道由淮右蜀吳元濟阻兵蔡州與官單戰師曰吾當少解其患乃振錫空中飛身而過兩軍仰觀歎異鬥心頓息以是官軍得成其功焉釋鑑釋法琳內該三藏外綜九流辨中觀則龍樹可期談自然則老莊非遠固以學侔安遠才邁肇生實開士之棟梁法城之牆塹者也陳子良辨正論序夫稱沙門者何耶論其發蒙俗之迷昏啓化表之玄路方將以兼忘之道與天下同往使希高者挹其遺風漱流者味其餘津遠法師沙門不敬王者論沙門者行超俗表心遊塵外是以捨愛捐親仰衆聖也摧棄聲色遵梵行也剃除鬚髮去華競也仰容肅質不忘敬也分衛掃衣支身命也言無隱曲離邪佞也和聲怡氣入無諍也吐納安詳慎詞令也世貴莫屈守貞徑也清虛恬淡順道性也邪相不撓住八正也顏下色敬愍衆病也人天崇仰三業淨也窮玄極真取究竟也廣仁弘濟亦忠孝之盛也辨正論天中記卷三十五
