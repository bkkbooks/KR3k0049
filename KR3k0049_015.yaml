body:
  text: 臺臺觀四方高曰臺有木曰榭爾雅鈞臺椒舉曰夏啓有鈞臺之享左昭四啓筮享神於大陵之上是為鈞臺之享歸藏璿臺夏后啓筮享神於晉之墟作為璿臺於水之陽上九成有娀氏有二佚女為之九成之臺飲食必以鼓帝令燕往視之鳴若諡隘呂覽音初瑤臺桀作瑤臺殫百姓之財伊尹諫之桀曰吾有天下猶天之有日日亡吾乃亡矣新序鹿臺紂為鹿臺七年而成其大三里高千尺臨望雲雨新序竹書紀年曰武王親禽帝受於南單之臺遂分天之明南單之臺蓋鹿臺之異名也水經注靈臺文王比出羑里周公旦築為靈臺六韜文王為玉門築靈臺以正紂之失淮南子周文王作為靈臺及於池沼澤及朽骨新序武王有靈臺之復而賢者進也管威公問篇重璧天子遊於河濟盛君獻女為造重璧臺穆天子傳濮州璧玉臺穆天子為盛姬所造也今旁地猶多珉石郡國志誃臺周景王作洛陽誃臺論語云誃子之足誃別離也説文中天穆王之時西極之國有化人來以王之宮室卑陋不可處王乃為之改築土木之功赭堊之色無遺巧焉五府為虛而臺始成焉高千仞臨終南之上號曰中天之臺列子鳳臺蕭史者瓊姿偉爍風神超邁善吹簫作鸞鳳之響秦穆公有女字弄玉好之公遂以妻焉日教弄玉作鳳鳴居數年吹簫似鳳聲鳳凰來止其屋公為作鳳臺夫婦止其上不飲不食不下數年一旦弄玉乘鳳蕭史乘龍升天而去秦為作鳳女祠時聞簫聲列仙傳拾遺思煙晉文公焚林以求介之推有白鴉繞煙而噪或集之推之側火不能焚晉人嘉之起一高臺名曰思煙臺拾遺記九層晉靈公造九層臺費用億萬謂左右曰敢有諫者斬荀息聞之上書求見靈公張弩持矢見之謂曰子欲諫邪息曰不敢諫也臣能纍十二博碁加九雞子其上公曰子為寡人作之息即正顏色定志氣以碁子置下加九雞子其上左右懾息靈公扶伏氣息不續公曰危哉危哉息曰是不危也復有危於此者公曰願復見之息曰九層之臺三年不成男不得耕女不得織國用空虛鄰國謹議將欲興兵社稷亡滅君欲何望靈公曰寡人之過乃止於此即壞九層之臺説苑彈人晉靈公不君厚斂以雕墻從臺上彈人而觀其辟丸也左宣二望母洧水南有鄭莊公望母臺莊薑惡公寤生與假共居假不弟薑氏無訓莊公居夫人於城潁誓曰不及黃泉無相見也故成臺以望母用伸在心之思感考叔之言欣大隧之賦泄泄之慈有加融融之孝得常矣水經注層臺楚莊築層臺延石千重延壤百里士有反三月之糧者大臣諫者七十二人皆死矣有諸御己者違楚百里委其耕而入見莊王莊王謂之曰諸御己來汝將諫邪諸御己曰君有義之用有法之行且已聞之土負水者平木負繩者正君受諫者聖君築層臺延石千重延壤百里民之釁咎血成於通塗然且未敢諫也已何敢諫乎因歷陳天子諸侯不尊賢用諫身死國亡之事遂趨而出楚王遽而追之曰己子反矣吾固將用子之諫日遂鮮層臺而罷民楚人歌之曰薪乎萊乎無諸御己訖無子乎萊乎薪乎無諸御己訖無人乎説苑強臺令尹子佩請飲楚王莊王許諾子佩疏揖北面立於殿下曰昔者君王許之今不果往意者臣有罪乎莊王曰吾聞子具於強臺強臺者南望料山以臨方皇左江而右淮其樂忘死若吾薄德之人不可以當此樂也恐留而不能反淮南子昆昭周靈王二十三年起昆昭之臺亦名宣昭聚天下異木神工篩水精以為泥臺高百丈升之以望雲色拾遺馳底晉平公使叔向聘於吳吳人拭舟以逆之左右五人右五百人有繡衣而豹裘者有錦衣而狐裘者叔向歸以告平公平公曰吳其亡乎奚以敬舟奚以敬民叔向對曰君為馳底之臺上可以發千兵下可以陳鐘鼓諸侯聞君者亦曰奚以敬臺奚以敬民所敬咎異也於是平公乃罷臺説苑施惠晉平公置酒於施惠之臺史樂書章華靈王建章華之臺與登焉王曰臺美伍舉曰臣聞國君服寵以為美安民以為樂克聽以為聰致遠以為明不聞以土木之崇高蟲鏤之刻畫金石之清音絲竹之淒唳以之為美前莊王為匏吳越作抱居之臺高不過望國氛大不過容宴豆木不妨守備用不煩官府民不敗時務官不易朝常今君為此臺七年國人怨焉財用盡焉年榖敗焉百姓煩焉諸侯忿怨卿士訕謗豈前王之所盛人君之美者耶靈王即除土去飾不遊於臺楚語吳越春秋昔靈王不君其臣針諫以不入乃築臺於章華之上罷弊楚國其民不忍飢勞之殃三軍叛亂於乾溪吳語邊讓賦云靈王遊雲夢之中息於荊臺之上前方淮之水左洞庭之波右顧彭蠡之隩南望巫山之阿遂造章華之臺後漢傳楚子成章華之臺願與諸侯落之左昭七三休翟王使使至楚楚王誇使者以章華之臺臺甚高三休乃至楚王曰翟國亦有此臺乎使者曰否翟窶國也惡見此臺也翟王之自為室也堂高三尺壤階三纍茆茨弗剪采椽弗刮且翟王猶以作之者大苦居之者大佚翟國惡見此臺也楚王愧賈傳新書乾溪楚靈王作乾溪之臺五百仞之臺欲登浮雲窺天文陸賈新語妨農宋皇國父為平公築臺妨於農牧子罕請俟農功之畢築者謳曰澤門之晳實興我役邑中之黔實慰我心子罕聞之執撲抶其不勉者曰吾儕小人皆有闔廬以避燥濕寒暑今君為一臺而不速成何以為役注善子罕分謗左襄十七重華昔衛靈公坐重華之臺侍御數百隨珠照日羅衣從風仲叔御諫曰昔桀行此而滅紂用此以亡今四境內侵諸侯加兵土地日削百姓乖離今君王內寵無乃大盛歟公下席再拜曰寡人過矣微子之言社稷傾幾於是出宮女之不進者數百人百姓大悅子貢聞之曰所謂能受諫也王孫子新書長庲景公築長庲之臺晏子侍坐觴三行晏子起舞曰歲已暮矣而禾不穫忽忽矣若之何歲已寒矣而役不罷惙惙矣如之何舞三而涕下沾襟景公慚焉為之罷長庲之役晏子露寢齊景公為路寢之臺成而不通焉柏常騫曰為臺甚急臺成君何為不通焉公曰然梟昔者鳴其聲無不為也吾惡之甚是以不通焉柏常騫曰臣請禳而去之公曰何具對曰築新室為置白茅焉公使為室成置白茅焉柏常騫曰用事明日問公曰今昔聞梟聲乎公曰一鳴而不復聞使人往視之梟當陛布翼伏地而死説苑柏寢景公與晏子遊於少海登柏寢之臺而還望其國曰美哉泱泱乎堂堂乎後世將孰有此晏子對曰其田成氏乎公泫然出涕曰不亦悲乎寡人有國而田成氏有之今為之奈何晏子對曰君何患焉若君欲奪之則近賢而遠不肖治其煩亂緩其刑罰賑貧窮而恤孤寡行恩惠而給不足民將歸君則雖有十田成氏其如君何韓非子遄臺齊侯至自田晏子侍於遄臺飲酒樂公曰古而無死其樂若何晏子對曰古而無死則古之樂也君何得焉昔爽鳩氏始居此地季萴因之有逢伯陵因之蒲姑氏因之而後太公因之古者無死爽鳩氏之樂非君所願也左昭二十年九重景公使人於楚楚王與之上九重之臺顧使者曰齊有臺若此乎使者曰吾君有治位之坐土階三等茅茨不翦朴椽不斫者猶以謂為之者勞居之者泰吾君惡有臺若此者於是楚王蓋悒如也韓詩外傳檀臺簡公與婦人飲酒於檀臺成子遷諸寢公執戈將擊之太史子餘曰非不利也將除害也左哀十四凌陽陳惠侯大城因起凌陽之臺未終而坐法死者數十人又執三監吏夫子適陳見陳侯與俱登臺而觀焉夫子曰美哉此臺自古聖王之為臺未有不戮一人而能功成若此者也陳侯默然而退遽竊赦所執吏既而見夫子問曰昔周作靈臺亦戮人乎答曰文王之興附者六州六州之衆各以子道來故區區之臺未及期月而既成矣何戮之何夫以少少之衆能立大大之功唯君耳孔叢子荊臺楚王將遊荊臺司馬子期諫王怒令尹子西駕於殿下曰今荊臺之觀不可失也王喜子西出從十里還引轡曰夫子期忠臣也若臣諛臣也願王賞忠而誅諛也王乃還家語漸臺貞薑者楚昭王夫人也王出遊留夫人漸臺之上而去王聞江水大至使使者迎夫人忘持其符使者至請夫人夫人不去於是使者取符則水大至臺崩夫人流而死列女傳姑蘇闔閭造姑蘇臺經營九年始成其臺高三百丈廣八十四丈望見三百里外作九曲路以登之吳地記越王得神木一雙大二十圍長五十尋陽為文梓陰為楩楠巧工施校制以規繩雕治圓轉刻削磨礱分以丹青錯畫文業婪以白璧鏤以黃金狀類龍蛇文彩生光乃使大夫種獻之於吳王吳王大悅吳子胥諫曰王勿受也昔者桀起靈臺紂起鹿臺陰陽不和寒暑不時五榖不熟天與其災民虛國變遂取滅亡大王受之必為越王所戮吳王不聽遂受而起姑蘇之臺三年聚材五年乃成高見二百里吳越春秋越王既獻西施復使大夫種請糴以入其意子胥曰夫虎不可餧以食蝮蛇不恣其意今大王捐國家之福以饒無益之讎棄忠臣之言而順敵人之欲臣必見越之破吳豸鹿遊於姑胥之臺荊榛蔓於宮闕願王覽武王伐紂之事也吳王聽宰嚭之言與越粟萬石上伍被諫淮南王曰昔子胥諫吳王吳王不用乃曰臣今見麋鹿遊於姑蘇之臺也本傳如皇越伐吳乃先宣言曰我聞吳王築如皇之臺掘深池疲苦百姓煎靡財貨以盡民力余來為百姓誅之韓非子洪波趙簡子有臣曰周舍立於門下抱筆執牘從之書過簡子與之居無幾死後與諸大夫飲於洪波之臺酒酣泣曰千羊之皮不如狐之一腋衆人之唯唯不如周食之諤諤今舍死吾亡無日矣韓詩外傳召兵秦康公築臺三年荊人起兵將欲以兵攻齊任妄曰飢召兵疾召兵亂召兵勞召兵君築臺三年今荊人起兵將攻齊臣恐其攻齊為聲而以襲秦為實也不如備之戍東邊荊人輟行韓非子瑤臺齊威王遊於瑤臺成侯卿來奏事從車羅綺甚衆王望之謂左右曰來者何為者也左右曰成侯卿也王曰國至貧也何出之盛也成侯卿至王問其説對曰忌舉田居子為西河而秦梁弱忌舉田解子為南城而楚人抱羅綺而朝忌舉黔涿子為冥州而燕人給牲趙人給盛忌舉田種首子為即墨而於齊足究忌舉北郭刁勃子為大士而九族益親民益富舉此數良人者王枕而臥耳何患國之貧哉説苑范臺梁惠王觴諸侯於范臺酒酣請魯君舉觴魯君擇言曰昔者楚王登強臺而望崩山左江而右湖以臨倣徨其樂忘死遂盟強臺而弗登曰後世必有以高臺陂池亡其國者今主君前夾林而後蘭臺強臺之樂也可無戒與魏策叢臺趙武靈王建叢臺於邯鄲前漢書夫全趙之時武力鼎士服叢臺之下者一旦成市本傳楚築章華於前趙建叢臺於後東京賦史記趙武靈王起叢臺太子圍之三月薛綜注郡國志曰邯鄲有叢臺故劉劭趙郡賦曰結雲閣於南宇立叢臺於少陽者也水經注中天魏襄王將起中天臺令曰敢諫者死許綰負操鍤入曰聞大王將起中天臺臣願加一力王曰子何力有加綰曰雖無力能商臺王曰若何曰臣聞天與地相去萬五千里今王因而半之當起七千五百里之臺高既如是其趾須方八千里盡王之地不足以為臺趾古者堯舜建諸侯地方五千里王必起此臺先以兵伐諸侯盡有其地猶不足又伐四夷得方八千里乃足以為臺趾材木之積人徒之衆倉廩之儲數以萬億度八千里之外當定農畝之地足以奉給王之臺者臺具以備乃可以作魏王默然無以應乃罷起臺新序逃債周赧王雖居天子之位為諸侯所侵逼與家人無異多負責於民無以歸之乃上臺以避之故周人因名其臺曰逃債臺故洛陽南宮簃臺是也帝王世紀黃金黃金臺易水東南十八里燕昭王置千金於臺上以延天下之士上谷郡圖經燕昭為郭隗築臺今在幽州燕王故城中土人呼為賢士臺亦謂之招賢臺述異記假匹磾進屯故安縣故燕太子丹金臺王隱晉書固安縣金臺陂西北有釣臺高十丈陂北十餘步有金臺有小金臺臺北有蘭馬臺並悉高數丈秀峙相對翼臺左右水流經通長廡廣宇周旋被浦棟堵咸淪柱礎尚存耆舊咸言昭王禮賓廣延方士至如郭隗樂毅之徒鄒衍劇辛之儔宦遊歷説之民自遠而屆者多矣不欲令諸侯之客伺隟燕邦故修建下都館之南垂言燕昭創之於前子丹踵之於後水經注傳逮述遊賦曰出北薊歷良鄉登金臺觀武陽雨城遼郭舊迹冥芒上按史記云昭王為郭隗改築宮而師事之孔文舉與曹公書昭王築臺以尊郭隗善注止引築管事鮑昭詩將起黃金臺善引圖經晉書俱不云史記御覽乃引史昭王置千金云云士謂之黃金臺不知所據崇霞昭王時廣延國來獻善舞者二人一名旋娟一名提謨王登崇霞之臺乃召二人處之拾遺記通霞昭王時海人乘霞舟以雕壺盛數斗龍膏以獻王王坐通雲堂亦曰通霞之臺王與西王母常居其上拾遺握日西王母與昭王遊於燧林之下王坐握日之臺參雲上可捫日上望氣酸棗城西有韓王望氣臺孫子荊故臺賦敘曰酸棗寺門外夾道左右有兩故臺訪之故老云韓王聽訟觀臺高一十五仞雖樓泯滅然廣基似於山嶽邵公大賢猶舍甘棠區區小國而臺觀隆崇驕盈於世以鑒來今故作賦曰薎邱陵之邐迤亞五嶽之嵯峨言壯觀也水經注青陵韓憑為宋康王舍人妻何氏美王欲之捕舍人築青陵臺何氏作烏鵲歌以見志遂自縊死韓亦死彤管新編章臺楚懷王西至咸陽朝章臺如蕃臣不與亢禮懷王大怒世家楊雄解嘲曰藺先生牧功於章臺漢書張敞無威儀時罷朝會走馬章臺街上蘭臺楚襄王遊於蘭臺之宮風賦楚有人謂頃襄王曰王綪繳蘭臺飲馬西河世家一名南臺時所謂楚臺者也地志陽雲襄王與唐勒景差宋玉遊於陽雲之臺玉作大言賦古文苑子虛賦楚王乃登陽雲之臺孟康云雲夢中高唐之臺宋玉所賦者言其高出雲之陽也漢書文選作昭陽時所謂陽臺者互見巫山下白起長平城在郡之南秦壘在城西二軍共食流水澗相去五里秦坑趙衆收頭顱築臺於壘中因山為臺崔嵬桀起今仍號曰白起臺上黨記華陽荊軻與太子遊東宮池軻拾瓦拾龜太子捧金丸進之又共乘千里馬軻曰馬肝美即殺馬進肝太子與樊將軍置酒於華陽臺出美人能鼓琴軻曰好手也斷以玉盤盛之燕丹子琅邪琅邪山名越王勾踐之故國也秦始皇二十八年至琅邪大樂之留三月乃徙黔首二萬戶於琅邪山下復十二年所作琅邪臺臺亦孤山也然高顯出于衆山之上刊石立碑紀秦功德臺上有神淵淵至靈焉人汙之則竭齋潔則通漢武帝亦登此臺水經注伏滔地記雲明始皇起雲明臺窮四方之珍木搜天下之巧工二千人騰虛木揮斤斧於空中子時起工午時已畢秦人謂之子午臺拾遺記海録作燕昭誤受珠始皇至東海海神捧珠獻於帝前今海畔有始皇受珠臺述異記蒲臺鬲城東南有蒲臺高八丈秦始皇東遊海上於臺下縈蒲繫馬夾道數百步到今蒲生縈委猶若有繫狀蒲似水楊而徑堪為箭三齊略記懷清巴蜀寡婦清其先得丹穴而擅其利數世家亦不訾清寡婦也能守其業用財自衛不見侵犯秦皇帝以為貞婦而客之為築女懷清臺史記曲臺秦倚曲臺之宮懸衡天下畫地而民不犯威加胡越漢鄒陽傳遊曲臺臨上路不如朝夕之池枚乘傳黃山陽穀有黃山臺黃石公與張子房期處也水經注朝臺熙安縣東南有圓岡十丈四面為羊腸道論者曰尉他登此望漢而朝名曰朝臺南越志尉他築臺以朝漢室基圓千步直峭百丈螺道登進頂上三畝朔望升拜號為朝臺傍江起華館以送陸賈因稱朝亭裴淵廣州記前後刺史郡守遷除新至未嘗不乘車升履於焉逍遙步騭登高遠望覩巨海之浩茫觀原藪之殷阜乃曰斯誠海島膏腴之地宜為都也建安二十二年遷州番禺桀立城郭綏和百越遂用寧集水經注露臺文帝嘗欲作露臺召匠計之直百金上曰百金中人十家之産也吾奉先帝宮室常恐羞之何以臺為紀贊翼奉上疏曰孝文欲作一臺度用百金重民之財廢而不為其積土基至今猶存本傳漸臺文帝嘗夢欲上天不能有一黃頭郎推上天覺而之漸臺以夢中陰目求推者郎見鄧通夢中所見也師古曰未央殿西南有蒼池池中有漸臺漢書漸臺在未央宮太液池中高十丈漸浸也言為池水所漸黃圖馬臺睢陽縣城中有掠馬臺臺東有曲池池東有一臺謂之清泠臺北城憑隅又結一池臺晉灼曰或説平臺在城中東北角亦或言兔園在平臺側如淳曰平臺離宮所在今城東二十里有臺寬廣而不甚極高俗謂之平臺按漢梁孝王傳稱王以功親為大國築東苑方三百里廣睢陽城七十里大治宮室為復道自宮東出揚州之門左門陽即睢陽東門也連屬於平臺則近矣屬之城西則不能是知平臺不在城中也梁王與鄒枚相如之徒歡遊于其上故亦一時之盛事謝氏賦雪亦曰梁王不悅遊于兔園今也歌堂淪宇律管埋音孤墓磈立無復曩日之望矣水經綴平臺之遺響宋書靈運傳論漢書晉如注見水經者今本刪削殆盡因備録之統志云謝惠連於此賦雪又名雪臺夫謝居江左賦假相如安得云於此賦雪耶通志因之俱誤吹臺陳留風俗傳曰縣有倉頡師曠城上有列仙之吹臺梁王層築以為吹臺城隍夷滅略存故迹其臺方一百許步即阮嗣宗詠懷詩所謂駕言發魏都南向望吹臺簫管有遺音梁王安在哉晉世喪亂乞活憑居削墮故基遂成二層上基猶方四五十步高一丈餘世謂之乞活臺又謂之婆臺城水經注後有繁姓居側因亦名繁臺郡國志九域志蠡臺梁孝王所築於兔園中廽道似蠡因名之述征記司馬彪郡國志曰睢陽縣有盧門亭城內有高臺甚秀廣巍然介立超然獨上謂之蠡臺亦曰升臺焉當昔全盛之時故與雲霞競遠矣續述征記云回廽道似蠡故謂之蠡臺非也闕子所謂虎圈臺者水經注柏梁元鼎二年春起柏梁臺武紀武帝鑄柏梁銅柱郊祀志梁以香柏為之香聞數十里三輔舊事起柏梁臺以處神君武帝故事帝嘗置酒其上詔群臣二千石有能為七言詩者乃得上座三輔黃圖古文苑通天元封二年作甘泉通天臺師古曰通天者言此臺高通于天也漢武故事築通天臺於甘泉去地百餘丈望雲雨悉在其下去長安三百里望見長安城武帝時祭太乙上通天臺舞八歲童女三百人置祠祀招仙人祭太乙云令人升通天臺以候天神天神既下祭所若大流星乃舉烽火而就竹宮望拜上有承露盤仙人掌擎玉杯以承雲表之露元鳳間自毀椽桷皆化為龍鳳從風雨飛去亦曰候神臺又曰望仙臺以候神明望神仙也黃圖左右通天臺高三十餘丈祭天時於此候天神下也關中記神明陛下以城中為小圖起建章左鳳闕右神明號稱千門萬戶方朔傳神明臺武帝造祭仙人處上有承露盤有銅仙人舒掌捧銅盤玉杯以承雲表之露以露和玉屑服之以求仙道廟記武帝初起神明臺時掘地入三十丈得泉水色黃傍有人居無日月光明晝夜以火照中有人食土飲水服赭布之衣漢人問汝何時在此答曰商王無道使兆人入地千丈求青堅之土以作瓦起瑤宮金堂工人皆以繩入地裏負器取土多有壓陷死者今猶二人在耳漢人問何得獨存答曰我以玉為衣金為環身有金玉故心氣不滅漢人問汝欲更出為人否答曰食土飲泉與螻蟻為伍寧望日月乎乃引出三日自死骨肉靡成灰惟心如彈丸大堅如石以物扣之則是乾血耳洞冥記神明臺高五十丈上有九室常置九天道士百人漢宮閣疏神明臺上有九臺今謂之九子臺黃圖望風太初二年起甘泉望風臺於臺上得珠望之如照月因名照月珠洞冥記騰光建元二年帝起騰光臺以望四望常有飛光如星集於臺上亦曰經星臺集方士説仙事上招仙武帝起招仙之臺於明庭宮北明庭宮者甘泉之別名也於臺上撞碧玉之鐘挂懸黎之磬吹霜滌之箎唱來雲依日之曲使臺下聽而不聞管歌之聲登仙嵩中嶽也東謂太室西謂少室相去十七里嵩高總名也武帝作登仙臺在少室峰下戴延之西征記尋真嵩高山有玉女臺云武帝見三仙玉女因以名臺山記帝登尋真之臺齋至七月七日夜天西南如白雲起頃王母至漢武內傳帝登延靈之臺盛齋存道其四方之事權委於冢宰焉七月七日王母至廣記引內傳通靈鉤弋夫人從至甘泉而卒既殯尸香聞十餘里葬雲陽帝哀悼疑其非常人也乃起通靈臺於甘泉宮有一青鳥集臺上往來至宣帝時鳥不至王褒雲陽記望恩武帝寤戾太子無辜被殺作思子宮為歸來望思之臺於湖天下聞而悲之漢書黃圖桂臺昭帝元始元年穿林池廣千步池南起桂臺以望遠東引太液之水時命水嬉遊燕永日以文梓為船木蘭為柁刻飛燕翔鷁飾於船首隨風輕漾畢景忘歸起商臺於池上拾遺記黃圖避風帝常以三秋間日與飛燕戲於太液池以沙棠木為舟貴其不沈浮也每清風時至飛燕殆欲隨風入水帝以翠纓結飛燕之裙常怨曰妾微賤何復得預纓裙之遊今太液池尚有避風臺即飛燕結裙之處拾遺記月影漢掖有月影臺雲光殿九華殿鳴鑾殿開襟閣臨池觀不在簿籍皆繁華窈窕之所棲宿焉西京雜記類白虎成帝幸王根第見園中土山漸臺似類白虎殿於是上怒以讓車騎將軍音外戚溫明洺州溫明臺後漢世祖晝臥此殿耿弇入造床下勸即位處郡國志雲臺周黨光武引見伏而不謁范升奏毀曰願與坐雲臺之下考試圖國之道逸民傳永平初馬援女立為皇后顯宗圖畫建武中名臣列將於雲臺以椒房故獨不及援東平王蒼觀圖言於帝曰何故不畫伏波將軍像帝笑而不言本傳中平二年二月己酉南宮雲臺災夫雲臺者乃周家之所造也圖書術籍珍玩寶怪皆所藏在也五行志景升沔水南有層臺號曰景升臺蓋劉表治襄陽之所築也言表盛遊於此常所止憩表性好鷹嘗登此臺歌野鷹來曲其聲韻似孟達上堵吟矣水經讀書華陽有讀書臺諸葛孔明相蜀築此臺以集諸儒兼以待四方賢士號曰讀書臺寰宇記避暑隆中諸葛亮故宅有舊井一今涸無水盛弘之記云井深五丈廣五尺堂前有三間屋地基丘極高云是孔明避暑臺宅西山臨水孔明嘗登之鼓琴以為梁父吟因名此為樂山先有董家居此宅衰殄滅亡後人不敢復憩焉齊建武中有人修井得一石枕高一尺二寸長九寸獻晉安王習鑿齒又為宅銘南雍州記三臺魏武帝于鄴城西北立三臺中臺名銅雀臺南名金虎臺此名冰井臺陸翽鄴中記三臺皆因城為基巍然崇舉其高若山建安十五年魏武所起其中曰銅臺高十丈有屋百餘間臺成命諸子登之並使為賦陳思王下筆成章美捷當時亦魏武望奉常王叔治之處也南則金雀臺高八丈有屋一百九間北曰冰井臺亦高八丈有屋一百四十間上有冰室室有數井井深十五丈藏冰及石墨焉石墨可書又然之難盡亦謂之石炭又有粟窖及鹽窖以備不虞今窖上猶有石銘存焉左思魏都賦曰三臺列峙而崢嶸者也水經文宣天保九年發丁匠三十萬人營三臺于鄴因其舊業而高博之大起宮室及遊逸園至是三臺成改銅雀曰金鳳金虎曰聖應冰井曰崇光十一月登三臺御乾象殿朝燕群臣並命賦詩北齊書陵雲文帝黃初二年築陵雲臺魏志陵雲臺樓觀精巧先稱平衆木輕重然後造構乃無錙銖相負揭臺雖高峻常隨風搖動而終無傾倒之理魏明帝登臺懼其勢危別以大材扶持之樓即頽壞論者謂輕重力偏故也世説凌雲臺高二十三丈登之見孟津楊龍驤洛陽記凌雲臺在明光殿西高八丈纍磚作道通至臺上登高逈眺究觀洛邑暨南望少室亦山之秀極也述征記明帝景初元年鑄作黃龍鳳皇奇偉之獸飾金墉陵雲臺陵霄闕百役繁興作者萬數公卿以下至于學生莫不展力帝因遂躬掘土以率之高堂隆上疏切諫本傳燭臺文帝築土為臺基高四十丈列燭置於臺下名曰燭臺遠望如列星之墜地以處美人薛靈藝焉拾遺記釣臺孫權於武昌臨釣臺飲酒大醉使人以水灑群臣曰今日酣飲惟醉墮臺中乃當止耳張昭曰昔紂為糟邱酒池長夜之飲當時亦以為樂不以為惡也權默然有慚色遂罷酒吳志吳主以潘夫人為神女每以遊昭宣之臺志意幸愜又與夫人遊釣臺得大魚主大喜夫人曰昔聞泣魚今乃有喜有喜必憂以為深戒吳主於是罷宴夫人果見棄逐釣臺基今尚存焉拾遺記閲馬鄴漳水北有趙閲馬臺基高五丈列觀其上石虎每講武於其下升觀以望之虎自於臺上放鳴鏑之矢以為車騎出入之節矣水經芳塵石虎於太極殿前起樓高四十丈盛夏之時登高樓以望四極奏金石絲竹樂以日繼夜時亢旱春雜寶異香為屑使數百人於樓上吹散之名曰芳塵臺上有銅龍腹容數百斛酒使胡人於樓上衆酒風至則望之如露名之曰粘雨臺用以灑塵樓上戲笑之聲震空中拾遺記靈鈞涼張茂築靈鈞臺周輪八十餘堵基高九仞武陵人閻曾夜叩門呼曰武公遣我來曰何故勞百姓而築臺乎姑臧令辛巖以曾妖妄請殺之茂曰吾信勞人曾稱先君之令何謂妖乎大府主簿馬魴曰今世難未夷唯當宏尚道素不宜勞役崇飾臺榭比年以來轉覺衆務日奢於往每所經營輕違雅度實非士女所望於明公茂曰吾過也命止作役晉書沖天赫連勃勃起沖天臺於南山欲登之望長安十六國春秋學臺范鄰為豫章太守大設庠序遠近至者千餘人資給衆費一出私祿并取郡四姓子弟皆充學生課誦五經文起學臺功用彌廣本傳波若姚興集沙門五千餘人有大道者五十人起造淨圖於永貴里立波若臺居中作須彌山四面有崇岩峻璧珍禽異獸木草精奇仙人佛像俱有人所未聞皆以為希奇長安志靈芝千秋門內道北有西遊園園中有凌雲臺即魏文帝所築者臺上有八角井高祖於井北造涼風觀登之遠望目極洛川東有靈芝釣臺纍木為之出於海中去地二十丈風生戶牖雲起梁棟刻石為鯨魚背負釣臺既如從地踊出又似空中飛下釣臺四面凡四殿皆有飛閣向靈芝往來三伏之月皇帝在靈芝臺以避暑洛陽伽藍記靜輪魏天師道場壇東北舊有靜輪宮魏神麚四年造抑亦柏梁之流也臺高廣超出雲間欲令上延霄客下絶囂塵水經雨花梁武帝時有雲光法師講經於此臺感得天雨賜花天廚獻食楊無為詩云空書來震旦康樂造淵徹貝葉深山譯曼花半夜飛香清雖透𥵧蘃散不霑衣舊社白蓮老遠公應望歸六朝事迹樂善高齋之後有堂堂西有射堂五間射堂南有大池池上有臺名曰樂善臺南雍州記玉女李軌字處別武威姑臧人也大業末自稱河西大涼王後僣稱尊號不受唐官時有胡巫惑之曰上帝嘗遣玉女從天而降遂遂兵築臺以候玉女多所縻費百姓患之及敗嘆曰人心去矣天亡我乎攜妻子上玉女臺置酒為別安修仁執送尋伏誅舊書訟臺景龍中韋庶人置石臺於朱雀門街在開化一方之間雕刻綵鏤上建蔥臺蛟龍蟠繞下有石馬石獅子侍衛之像初韋氏矯稱衣箱有五色雲氣使畫工圖像以示於朝及節愍太子遇害韋氏乃上中宗聖威神武頌刊石以紀其事謂之訟臺上官昭容之文也并勒公卿姓名於上諂詞偽事有乖典實景雲元年毀之長安志望月玄宗八月十五日夜與貴妃臨太液池憑欄望月不盡帝意不快遂勑令左右於池西岸別築百尺高臺與吾妃子來年望月後經祿山之兵不復置焉惟有基址而已天寶遺事愁臺明宗入汴州莊宗至萬勝鎮不得進與元行欽登道旁冢置酒相顧泣下有野人獻雉問其家名野人曰愁臺也莊宗益不悅因罷酒去五代史濮州羊角城陳思王愁臺基甚高郡國志病龍周世宗大舉入幽州契丹蕃部望風宵遁車駕至瓦橋關聞之甚喜登高阜因以觀六師頃之有老父百餘輩持牛酒以獻世宗問曰此地何名對曰歷代相傳謂之病龍臺世宗問然遽上馬馳至是夜病亟回戈未到關而晏駕五代史補書臺毋昭裔入蜀見岷峨之秀乃嘆曰卿雲黼黻河漢實英靈所鍾也修文翁石室武侯書臺出家財建學館刊九經海録天井江陵縣東有天井臺飛軒孤映背邑面河實郊𫑮遊憩之佳處也荊州記井在方城北里餘廣員二里其深不測井有潛室見輒兵西岸有天井臺因基舊隄臨際水湄遊憩之佳處也水經注清暑江陵赤湖東北有大罡臺高六丈餘從廣八丈一名清暑臺秀宇層明通望周使遊者登之以暢遠情上玉臺雩都君山上有玉臺方廣數丈周廽盡是白石柱柱自然石覆如屋形也四面多松杉遙眺峨峨嚮像羽人之館風雨之後景氣明淨頗聞山上有鼓吹之聲山都木客為舞唱之節鄧德明南康記遊閶闔觀玉臺注上帝所居天馬歌西有玉臺聯以昆德西京賦麗春東都城有流杯殿在麗春臺北有東西廊南至麗春臺北連宏徽殿南頭皆亭子間以山池殿上作漆渠九曲兩京記九思九思臺楚莊王樊姬墓也張説登臺詩云楚國所以霸樊姬有力焉萬化茫無在孤墳獨巋然英華集思作里逍遙張九齡陪王司馬登薛公逍遙臺詩常聞薛公淚非直雍門琴曾是陪遊日徒為梁父吟英華琴臺司馬相如宅在州西笮橋北百許步王褒益州記市橋西二百步得相如舊宅今海安寺南有琴臺故墟李膺記在成都府華陽縣市橋西寰宇記在浣花溪云海安寺南今為金花寺城內非其舊成都志盧照鄰詩雲疑作賦客月似聽琴人卜臺廣漢郡有嚴君平卜臺蜀記鴈橋東有嚴君平卜處土臺高數丈也益州記一柱江陵有臺甚大而惟有一柱衆梁皆共此柱博物志靈應長安城南四十里有靈母谷俗呼為炭谷入谷五里有惠炬寺寺西南澗水緑崖側一十八里至峰謂之靈應臺臺上置塔塔中觀世音菩薩鐵像像是六軍散將安清鑄造陸長源辨疑志望京李逢吉上望京臺寄令狐華州云祗役滯南服間上望京臺寄懷三峰守岐路隔雲煙唐詩紀事集虛張祜集虛臺詩云日光斜照集虛臺紅樹花迎曉露開昨夜上皇新授籙太真含笑入簾來上凝霞大中中日本國王子來朝云本國之東三萬里有集真島島上有凝霞臺臺上有手談池池中生玉棊子不由制度自然黑白分明杜陽編璜臺天問璜臺十成誰所極焉楚辭珍臺珍臺間館甘泉賦珍臺蹇崖以極壯隥道邐倚以正東西京賦旋臺應門八襲旋臺九重七命箕子曰紂必為九重高臺韓子春臺衆人熙熙如登春臺老子和邢端公登臺春望詩春日繡衣輕春臺別有情春煙間草色春鳥隔花聲春樹亂無次春山遙得名春風正飄蕩春甕莫須傾英華砌臺砌臺即今擦擦臺也王侯家作以為臨觀之戲唐張仲素詩云騁望臨香閣登高下砌臺林間踏青去席上寄箋來即知唐來有之王審琦都尉家其子承祐幼時其父戲補砌臺使談苑仲素字繪之建封子也孔帖作仲封誤避燥濕先聖王之為臺榭也足以辟燥濕而已矣呂覽層臺招魂云高堂邃宇檻層軒些層臺纍榭臨高山些楚辭長楊長楊榭在長楊宮秋冬較獵其下命武士摶射禽獸天子登此以觀焉黃圖瀛洲成帝於太液池中起為瀛洲榭高四十尺帝御流波文縠無縫衫趙后衣南越所貢雲英紫裙碧瓊輕綃廣榭上后歌舞歸風送遠之曲帝以文犀簪擊玉甌令后所愛侍郎馮無方吹笙以倚后歌趙飛燕傳高光馬融廣成頌云棲遲乎昭明之觀休息乎高光之榭以臨乎宏地後傳三臺天子有三臺靈臺以觀天文時臺以觀四時施化囿臺以觀鳥獸魚鱉諸侯卑不得觀天文無臺但有時臺囿臺也五經異義門捫也在外為人所捫摸也釋名門從二戶象形也閻里中門也闤市垣也闠市外門也閌閬高門也䦳門響也閭里門也周禮五家為比五比為閭閭侶也二十五家相郡侶也閽門豎也門昏也門常昏閉故曰閽即守門隸也閈門也汝南平輿里門曰閈説文閈城外郭內之里門也閈扞也言為人藩屏以扞難也風俗通天門角天門也韓楊天文集要閶闔天門也楚人名門皆曰閶闔説文叫帝閽使開關兮倚閶闔而望豫楚辭夢良人兮來遊若閶闔兮洞開潘嶽賦爾雅闔謂之扉左傳以枚乘闔公羊傳齒著于門闔荀子外闔不閉又月令乃修闔扇注治門戶用木曰闔用竹葦曰扇或謂雙曰闔闔門也單曰扇扇戶也月令仲春修闔扇孟冬修鍵閉服虔云闔扇所以開鍵閉所以塞九重九辨云豈不鬱陶而思君兮君之門以九重楚辭注天子九門關門遠郊門近郊門城門皋門雉門應門路門寢門亦曰庫門皋門王之郭門曰皋門詩注應門王之正門謂之應門宮中之門謂之闈其小者謂之閨小閨謂之閣爾雅李巡曰路門之外受朝正門一名應門應門之外門曰雉門虎門師氏掌以媺詔王居虎門之左司王朝注虎門路寢門也王日視朝於路寢門外畫虎焉以明勇猛於守宜也周禮王元長曲水詩序入虎闈而齒胄閎門周書皇門篇維正月庚午周公格于左閎門會群臣序周公會群臣于閎門以輔主之格言作皇門注路寢左曰皇門鼎門成王定鼎于郟鄏其南門名定鼎門蓋九鼎所從入也帝王世紀雒陽東城門名鼎門後漢志魯十二魯城凡有十二門其北名上東門左傳定公元年公斂處父帥成人自上東門入是也西五門一曰鹿門即臧孫紇斬鹿門關以出奔邾是也三曰稷門即圉人犖能投蓋於稷門南曰雩門左傳自雩門出蒙皋比而先犯之是也吳門吳子胥為吳造大城陸門八象天之八風水門八法地之八窗立閶門者象天門通閶闔風也立蛇門以象地尸亦名破楚門亦名地門者吳位辰屬龍故小城南門作龍以壓蛇氣也吳越春秋吳都賦云通門二八水道陸衢陸士衡詩云閭門何峨峨飛閣跨通波劉夢得詩云二八城門開道路五千軍馬引旌旗高門韓昭侯造作高門屈宜咎曰昭侯不出此門曰何也曰不時吾所謂不時者非時日也人固有利不利昭侯嘗利矣不作高門往年秦拔宜陽明年大旱民飢不以此時恤民之急也而顧反益奢此所謂福不重至禍必重來者也高門成昭侯卒竟不出此門談苑夷門魏有隱士曰侯嬴年七十家貧為大梁夷門監者魏公子聞之往請欲厚遺之不肯受史記大史公曰吾過大梁之墟求問其所謂夷門夷門者城之東門也上土多髦俊儒藝則以遊俠夷門即侯嬴抱關處郡國志司馬司馬門之名起漢世案列女傳鍾離春詣齊司馬門史記又云司馬欣請事咸陽留司馬三日是則名起戰國非獨漢也今又曰公車門而俗稱謝章門也丹陽記未央宮殿雖南面而上書奏事謁見之徒皆詣北闕公車司馬在焉高紀注師古曰宮外門也衛尉有八屯衛侯司馬主衛士徼循宿衛每面各二司馬故謂宮外門為司馬門元紀注端門太微南四星執法中端門左右掖門天文志端門太微正南門注始皇窮極奢侈築咸陽宮因北陵營殿端門四達以則紫宮象帝居引渭水灌都以象天漢橫橋南渡以法牽牛黃圖燕王旦傳鼠舞殿端門中注端門正門也本傳立金人於端闈西都賦掖門內至禁者為殿門外出大道為掖門漢制劉章從勃請卒千人入未央宮掖門注非正門而在兩旁若人之臂掖呂后紀闔門如今東西掖門儀禮注掖者言在司馬門之旁掖應劭注漢書十二長安城方十三里經緯各長十五里十二城門續志注漢舊儀長安城東出南頭第一門霸城內民見門色青名曰青城門或曰青門召平種瓜青門外廟記亦曰青綺門莽更曰仁壽門無疆亭黃圖金馬金馬門者署門旁有銅馬故謂之金馬門史記武帝時善相馬者東門京鑄作銅馬法獻之有詔立馬於魯班門外則更名魯班門曰金馬門後馬援傳公孫宏待詔金馬門東方朔待詔公車上使待詔金馬門稍親近主父偃嚴安徐樂皆待詔金馬門宣帝修武帝故事益召高才劉向張子僑華龍柳褒等待詔金馬門上欲興協律之事王褒作中和樂職宣布詩傳蘭臺金馬遞宿迭居西京賦金閨諸彥蘭臺群英注金閨金馬門也選歷金門上玉堂應劭曰金門金馬門也楊雄傳詔罷黃門乘輿狗馬師古曰黃門近署也元紀金馬門又謂之黃門玉海璧門漢書曰建章宮南有玉堂璧門三層臺高三十丈玉堂內殿十二門階陛皆玉為之鑄銅鳳高五尺飾黃金棲屋上下有轉樞向風若翔椽首薄以璧玉因曰璧門黃圖青瑣黃門郎屬黃門令日暮入對青瑣門拜名曰夕郎漢舊儀青瑣門在南宮宮閣簿王根驕奢僣上赤墀青瑣孟康曰以青畫戶邊鏤中天子制也如淳曰門楣格再重如人衣領再重裹者青名曰青瑣天子門制也師古曰青瑣者刻為連瑣文而以青塗之也元后傳雕欒鏤楶青瑣丹楹吳都賦衛瓘注青瑣戶邊青鏤也後百官志注董巴曰禁門曰黃闥以中人主之故號曰黃門令上攝官青瑣闥遙望鳳皇池范雲詩雷門王尊為東平相王以至親驕不奉法度尊至庭中王傳在前説相鼠之詩尊曰毋持布鼓過雷門本傳開陽開陽門始成未有名宿昔有一柱來在樓上琅邪開陽縣上言縣南城門一柱飛去光武使來識視悵然遂堅縛之刻記其年月因以名焉應劭漢官何湯仲弓嘗為門候上微行夜還湯閉門不納朝廷嘉之水經謝承書開陽門故建陽門也晉官閣名上東榖水東徑建春門石橋下即上東門也阮嗣宗詠懷詩所謂朝出上東門遙望首陽基遙遙九曲門徘徊欲何之者也水經注郅惲為上東門候光武嘗出夜還詔開門欲入惲不內上令從門間識面惲曰火明遼遠遂拒不開由是上益重之東觀漢記堅鐔攻洛陽朱鮪別將為反間私約鐔晨開上東門本傳上西閶闔門漢之上西門者也漢官儀曰上西門所以不純白者漢家厄於戍故以丹鏤之水經注濯龍建初二年有司依舊典奏封諸舅太后詔曰前過濯龍門上見外家車如流水馬如龍吾亦不譴怒之但絶其歲用冀知默愧其心袁宏漢紀雲龍班固永平十七年與賈逵傳毅杜矩展龍郗萌等召詣雲龍門小黃門趙宣持秦始皇本紀問臣等曰太史遷贊語寧有非邪典引金商楊賜光和元年引入金商門問祥異注太極殿西有金商門後傳啓南端之特闈立應門之將將昭仁惠於崇賢抗義聲於金商飛雲龍於春路屯神虎於秋方東京賦東蒼龍西白虎漢書鴻都靈帝引諸生能為文賦尺牘工書鳥篆者待制鴻都門下宦者傳通德鄭康成北海高密人國相孔融深敬之告高密令為康成特立一鄉曰齊置士鄉越有君子軍皆異賢之意又謂公者仁義之正號不必三事大夫今鄭公鄉可廣開門衢令容高車號曰通德門本傳昌門孫堅母生堅夢腸出繞吳昌門以告鄰母鄰母曰安知非吉祥也昌門吳郭門也獻帝興平中吳中謠言黃金車斑闌耳開昌門出天子宋符瑞志千秋一水自千秋門南流徑神虎門下東對雲龍門二水衡𢫯之上皆列龍雲風虎之狀以大齊薄之及其晨見初起夕景斜暉霜文翠照陸離眩目又南流東轉徑閶闔門南魏明帝上法太極於洛陽南宮起太極殿于漢崇德殿之故處改雉門為閶闔門閶闔門外夾建巨闕以應天宿水經注承明黃初元年十二月初營洛陽宮戊午幸洛陽注案諸書記帝居北宮以建始殿朝群臣門曰承明陳思王詩曰謁帝承明廬是也三國志注承明門後宮出入之門常怪謁帝承明廬問張公云明帝作建始殿朝會皆由承明門陸璣洛陽記塞門張昭諫孫權不從稱疾不朝權恨之土塞其門昭又於內以土封之後權因出過其門呼昭昭辭疾篤權曉其門欲以恐之昭更閉戶權使人滅火住門良久昭諸子共扶昭起權載以還宮吳志題門廣州盧耽仕州為治中冇仙術刺史步騭惡之以狀聞欲誅之耽後題其門曰誅門誅門國雖存無射年欲知此書盧耽還太守削之隨削字更生郡國志歸厚稽含好學能屬文家在鞏縣亳邱自號亳邱子門曰歸厚之門室曰慎終之室晉傳朱門麴允金城人也與遊氏世為豪族西州為之語曰麴與遊羊牛不數頭南開朱室不望青樓上私作元帝時廷尉張闓在小市居私作都門蚤閉脫開群小患之詣州府訴不得理遂至檛登聞鼓猶不被判聞賀司空出至破岡連名詣賀訴賀曰身被微作禮官不聞此事群小叩頭曰若府君復不見治便無所訴賀未語令且去見張廷尉當為及之張聞即毀門自至方山迎賀賀出見辭之曰此不必見關但與君門情相為惜之張愧謝曰小人有如此始不即知蚤已毀壞世説白門宋明帝末年多忌諱宜陽門謂之白門上以白門不祥諱之尚書右丞江謐嘗誤犯上變色曰白汝家門本紀大夏洛陽北面有二門西頭曰大夏門漢曰夏門魏晉曰大夏門嘗造三層樓去地二十丈洛陽城門樓皆兩重去地百尺惟大夏門甍棟干雲洛陽伽藍記朱白梁元帝令胡僧祐援王僧辨將發泣下謂其子曰汝可開朱白二門吾不捷則死吉則由朱凶則由白也元帝聞而壯之前至赤沙亭會陸法和至乃并與軍大敗侯景將任約軍禽約送江陵南史露門武帝建德三年正月壬戌朝群臣露門周書沈重於露門館講論語玉海久閉高祖初為定州總管先是定州城西門久閉不行齊文宣帝時或請開之以便行路帝不許曰當有聖人來啓之及高祖至而開焉莫不驚異隋書縣門萬年縣門宇文愷所造高宗末太平公主出降於縣廨為婚第以縣門窄狹欲毀之高宗敕曰其宇文愷所作不須折於他所開門遂存韋述西京記春明開元十七年五月丁卯侍臣以下燕于春明門外寧王憲元園池帝御花萼樓邀其廽騎更令坐飲遞舞班賜有差實録王涯詩莫道兩京非遠別春明門外即天涯光範公主受册設册案便次於光範門及長樂門外通典韓愈上宰相書伏光範門外門樞貴戚懼家之不吉而聚諸令名懼門之不堅而作為鐵樞卒其所以敗者非苦禁忌少而門樞朽也常苦崇財貨而行驕僣虐百姓而失民心爾潛夫論漢武世王侯深殿重階金樞素墀傳子魯仲連先生見孟嘗君於杏堂之門孟嘗君曰吾聞先生有勢數可得聞乎連曰勢數者譬若門關舉之而便則可以一指持中而舉之非便則兩手不關非益加重兩手非加罷也彼所起者非舉勢也彼可舉然後舉之所謂勢數魯連子大畜之乾曰金柱鐵關膠固衛災君子居之安安憂疑易林屋大屋曰廡廡幠也幠覆也并冀人謂之庌庌正也屋之正大者也釋名屋奧也其中溫奧也上客堂曰庌通俗文殷屋禮人君公室之制為殷屋也夏也卿大夫為夏屋隔半以北為正室中半以南為堂正室齋室也崔愷喪服節黃屋黃屋非堯心選項羽圍漢滎陽紀信誑楚乘王車黃屋左纛曰漢王降楚以故漢王出遁漢書天子車以黃繒為蓋裏注白屋周公居冢宰之尊而猶下白屋之士日見百七十人家語蕭望之説霍光曰恐非周公相成王躬吐握之禮致白屋之心本傳白屋謂白蓋之屋以茅覆之注金屋武帝四歲封膠東王長主數抱膝上問曰兒欲得婦否長主指右左長御百餘人皆云不用因指其女問曰阿嬌好不笑對曰好若得阿嬌作婦當作金屋貯之長主大悅乃苦要上遂成婚焉漢武故事神屋上起神屋九間鑄銅為柱以金塗之大五圍赤王為階椽以金刻玳瑁為龍虎禽獸以薄其上椽首皆作龍首銜鈴流蘇懸之鑄銅為瓦以赤白石脂為泥椒汁和之以火齊薄其上扇屏悉以白琉璃作之光照洞徹以白珠為簾玳瑁壓之以象牙為床乃以琉璃珠玉明月夜光雜錯天下珍寶為甲帳其次為乙帳甲以居神乙上自御之前庭植王樹珊瑚為枝以碧玉為葉或青或赤悉以珠玉為之子皆空其中如小鈴鎗鎗有聲甍柎作金鳳軒翥若飛口銜流蘇長十餘丈有雲母窗珊瑚窗雖崑崙元圃不是過也漢武內傳故事俸作鍾離邑意堂邑令初到無屋意乃出俸錢作屋民賫柱趣作浹日而成畢為民士祝曰興功役者令也如有禍崇令當之民大悅東觀漢記起屋是儀字子羽為人不治産業造屋舍才容足鄰家起大宅孫權出望見起屋左右曰是儀家權曰是子羽儉必非也令人親至果是鄰舍吳志三間蔡司徒在洛陽見陸機兄弟住參佐廨中三間屋士龍住東頭士衡住西頭士龍為人文弱可愛士衡長七尺餘聲作鍾聲言多慷慨世説雕楹弘農王粹以貴公子尚主館宇甚盛圖莊周於室廣集朝士使稽含為之贊含援筆為序文文不加點其序曰帝壻王弘遠華池豐屋廣延賢彥圖畫真人於刻桷之室載退士于進趣之堂嗟乎先生高迹何局生處巖岫之居死寄雕楹之屋託非其所沒有餘辱粹有愧色晉傳茅茨桓宣武以羅含為別駕以官廨寺喧擾非靜然所處乃與城西池小洲上立茅茨之屋竹果蔭宇伐木為床織葦為席布衣疏食晏若有餘別傳蒲屋楊於陵出為嶺南節度使教民陶瓦易蒲屋以絶火患本傳板屋秦州俗上氣力不恥寇盜弓馬射獵以為工能其居八板為屋故詩曰在其板屋修我甲兵及車轔轔四鐵小戎皆田狩之事郡國志覆形伎之書起宅蓋屋必擇吉日夫屋覆人形宅居人體何患害於歲月而必擇之則夫裝車治船亦當擇日論衡鬱金洛陽城有鬱金屋戴延之西征記水精大秦國以青水精為屋廣志讀書大和中陳郡殷府君引水入城穿池殷仲堪又於池北立小屋讀書百姓于今呼曰讀書齋王孚安成記盤龍桓元鎮姑孰屋壁悉畫盤龍於其上號為讀書齋俄而元敗將軍劉毅居之毅小名盤龍晉徵祥説高齋襄沔記曰金城內刺史院有高齋梁昭明太子於此齋造文選鮑至云簡文為晉安王鎮襄陽日又引劉孝威庾肩吾徐昉江伯操孔敬通惠子悅安徐陵王囿孔鑠等於此齋綜核詩集於時鮑時亦在凡數十人資給豐厚日設肴饌于時號為高齋學士雍州記云高齋其泥色鮮淨故此名焉南平世子恪臨州有甘露降此齋前竹林昭明太子於齋宮集道義以時相繼白土白土齋南道又一齋以栗為屋梁武帝臨州寢臥於此齋中常有五色雲廽轉狀如盤龍屋上恆紫雲騰起形似繖蓋遠近望者莫不異焉梁武於此龍飛上下齋齊齋東北有一齋名曰下齋次於高齋制度壯麗極爽塏刺史辨決獄訟舊出此齋上東府梁宣城王為揚州刺史顧野王及琅邪王褒並為賓客野王好善丹青王於東府起齋令野王畫古賢命王褒書贊時人稱為二絶南史蕭齋梁武造寺令蕭子雲飛白大書一蕭字在焉李約自江淮竭産買歸於洛中匣於小亭號曰蕭齋國史補插竈宜都山絶崖壁立數百丈有一大燼插其崖間望可長數尺傳云堯洪水人泊船此旁爨餘故曰插竈崖宜都縣記燔柴臧文仲燔柴於竈者老婦之祭也盛於盆尊於瓶非所柴也文仲安知禮禮器踞觚仲尼作春秋老聃踞竈觚而聽之曰是何書也曰春秋也莊子曲突淳于髡至鄰家見其灶突之直而積薪在傍謂曰此直有火使為曲突而徙薪鄰家不聽後果焚其屋鄰家救火乃滅烹羊具酒以謝救火者不肯呼髡知士譏之曰曲突徙薪無厚澤焦頭爛額為上客蓋傷其賤本而貴末也桓談新論漢書人為徐福上言霍氏事同祀竈武帝時李少君以祠窟竈榖道郤老方見上言祠竈皆可致物致物而丹砂可化為黃金黃金成以為飲食器則益壽益壽而海中蓬萊仙者乃可見之以封禪則不死黃帝是也於是天子乃親祠竈漢郊祀志養生昭帝元鳳元年燕王旦宮永巷中豕出圂壞都竈銜其釜六七枚置殿前劉向以為近豕禍也竈者生養之本豕而敗竈陳釜於庭釜竈將不用宮室將廢辱也燕王不改卒伏其辜五行志廁中豕群出壞大官竈本傳風吹李南明於風角女亦曉家術為由拳縣人妻晨詣爨室卒有暴風婦便上堂從姑求歸辭其二親姑不許乃跪而泣曰家世傳術疾風卒起乃吹竈突及井此禍為婦女主爨者妾將亡之應因著其亡日乃聽還家如期病卒本傳請鄰御史大夫張忠署孫寶主簿寶徙入舍祭竈請比鄰後漢雞入卞伯玉作東陽郡竈正熾火有雞遙從口入良久乃於突而入毛羽不焦鳴啄如故伯玉尋病殞竈神黃帝作竈死為竈神淮南子竈神晦日歸天白人罪萬畢術竈神名隗狀如美女又姓張名單字子郭夫人字卿忌有六女皆名察治常以月晦日上天白人罪狀大者奪紀紀三百日小者奪算算一百日故為天帝督使下為地精己丑日日出卯時上天禺中下行署此日祭得福其屬神有天帝嬌孫天帝大夫天帝都尉天帝長兄硎上童子突上紫君太和君玉池夫人等一曰竈神名壤子也酉陽雜俎鉤注竈無故自濕潤者赤蝦墓名鉤注居之去則止上夢衛靈公時彌子瑕有寵專於衛國侏儒有見公者曰臣之夢踐矣公曰何夢對曰夢見竈為見公也公怒曰吾聞見人主者夢見日奚為夢竈曰夫物兼燭天下一物不能當也人君兼燭一國人一人不能擁也故將見人主者夢見日夫竈一人煬焉則後人無從見矣今或者一人有煬君者乎則臣雖夢見竈不亦可乎韓子內儲溷説文曰廁清也釋名曰廁言雜在上非一也又或曰溷言溷濁也或曰聞至穢之處宜常修治使潔清也偃觀室者周於寢廟又適其偃焉莊子注偃謂屏廁也屏廁則以偃溲庚桑篇陷廁晉景公夢大厲覺召桑田巫曰不食新矣六月晉侯欲麥使甸人獻麥饋入為之召桑田巫示而殺之將食張如廁陷而卒小臣有晨夢負公以登天及日中負晉侯出諸廁遂以為殉左成十廁牏萬石君石奮長子建老白首萬石君尚無恙建為郎中令每五日洗沐歸謁親入子舍竊問侍者取親中裙廁牏身自浣洗復與侍者不敢令萬石君知之以為常前漢徐廣曰牏築垣短板也廁牏謂溷垣墻建隱於其廁而浣滌也一謂牏為豆言建又自洗蕩廁豆廁豆寫除穢污之穴也呂靜曰槭窬褻器也槭虎子也窬行清也舊注今本無孟康曰廁行清牏中受糞函者也守廁淮南王安謁仙伯坐起不恭主者奏安不敬謫守廁三年神仙傳河東碩曼卿入山學仙十年而成家問其故曼卿曰在山中仙人乘龍迎我上天先過紫床金床玉几真貴處也仙人以流霞一杯飲我輒不飢倏忽然思家天帝前謁拜失儀見斥來還昔淮南王劉安升天見上帝而箕坐大言自稱寡人遂見謫守天廁三年吾何人哉抱朴子惡夢博士弟子談生居東寺連三夜有惡夢以問人教使晨起清中説之三旦而人告以為呪咀捕治數日桓談新論不冠管寧避地遼東經海遇風船人危懼皆叩頭思過寧思惟無愆念嘗如廁不冠即便悔首尋風止周景式孝子傳過爐劉季和性愛香常如廁還過香爐上主簿張坦曰人名公作俗人不虛也季和曰荀令君至人家坐豦三日香氣不歇為我如何令君而惡我愛好也坦曰古有好婦人患而捧心嚬眉見者皆以為好其鄰醜婦法之見者皆走公便欲使下官遁走邪季和大笑以是知坦襄陽記列婢石崇廁常有十餘婢侍列皆麗服藻飾置甲煎粉沉香汁之屬無不畢備又與新衣著令出客多羞不能如廁王敦往脫故衣著新衣神色傲然群婢相謂曰此客必能作賊世説錦囊晉太尉劉實詣石崇如廁見有絳紗帳大床茵蓐甚麗兩婢持錦香囊實遽反走即謂崇曰向誤入卿室內崇曰是廁耳實曰貧士未嘗得如此便如他廁語林下果王敦初上舞陽公主如廁見漆箱盛乾棗本以塞鼻王謂廁上亦下果食遂至盡既還婢擎金澡盤盛水琉璃琬盛澡豆因倒水中而飲之謂是為乾飯群婢莫不掩口而笑之世説設醊郭璞素與桓彝友善彝每造之或值璞在婦間便入璞曰卿來他處自可徑前但不可廁上相尋耳必客主有殃彝後因醉詣璞正逢在廁掩而觀之見璞裸身被髮銜刀設醊璞見彝撫心大驚曰吾每屬卿勿來反更如是非但禍吾卿亦不免矣天實為之將以誰咎璞終嬰王敦之禍彝亦死蘇峻之難本傳後帝陶侃常如廁見數十人悉持大杖有一人朱衣平上幘劍履自稱後帝曰以君長者故出見三載勿言富貴至極侃便起旋失所在有大印作公字當其穢所異苑廁神後帝也雜五行書方相庾翼鎮江州如廁見一物頭如方相兩眼大有光翼擊之入地因而病卒鹵薄宋沈慶之在文帝時嘗夢引鹵薄入廁中慶之甚惡入廁之鄙時有善占夢者為解之曰君必大富貴然未在旦夕鹵簿固是富貴容廁中所謂後帝也本傳廁鬼貞元中吳都進士李赤與趙敏之同遊閩宿於驛之館亭宵分忽有一婦人入廷中赤即起下階揖讓良久上廷取紙筆作書與親云某為郭氏所選為壻婦人拍其巾縊之敏之出走大叫婦人乃妝巾而走及視其書赤如夢中所為明又偕行白書又失赤敏之遽往見赤坐於廁大怒曰方當禮謝為爾所驚浹日至閩屬僚有與赤舊遊者設宴次又失赤敏之疾索于廁見赤僵仆于地氣絶死矣獨異志據廁王升曾行至一宅籬間見物兩手據廁深目虎鼻豬身面色紫而斒斕直視於升懼而走見表兄陸望言之望曰吾聞見廁神無不立死汝其勉之升遂卒紀聞見形宣城太守刁緬初為玉門軍使有廁神形見狀如大豬通體皆有眼出入溷中遊行院內緬時不在官吏兵卒見者千餘人如是數日緬歸祭以祈福廁神乃滅旬日遷伊州刺吏歷官至翰林左將軍上溷軒有一丞郎馬上內逼急詣一空宅徑登溷軒乃大優穆刁陵空屋也將畢穆優忽至此丞郎慚謝之優穆曰侍郎他日內逼但請光訪聞者絶倒北夢瑣言祭報台州有民姓王常祭廁神一日至其所見著黃女子云某廁神也君聞螻蟻言否民曰不聞遂懷中取小合子以指點少膏如口脂塗民右耳下戒之曰或見蟻子側耳聆之必有所得民明旦見柱礎下群蟻紛紜聽之果聞相語云移穴去暖處傍有問之何故云其下有寶甚寒住不安民伺蟻出訖尋之獲白金十鋌葆光録屋頭俗命如廁為屋頭稱并州人咸鑿土為室廁在所居之上故也一説北齊文宣帝怒其魏郡丞崔叔寶以溷汁沃頭後人或食或避親長不能正言溷因影為沃頭焉資暇集別業石崇樂放逸篤好林藪遂肥遁於河陽別業其制宅也却阻長堤前臨清渠柏木幾於萬株流水周於舍下有觀閣池沼多養鳥魚思歸引土山謝安於土山營墅樓館林竹甚盛每攜中外子姪往來遊集肴饌亦屢廢百金本傳賭墅苻堅入寇謝安與謝元出土山墅宴親朋畢集方留元圍棊賭別墅安棊常劣于元是日有懼心便不勝安顧外甥羊曇曰以墅乞汝上宋屬檀道濟名檀城地圖謂之城子墅唐溫廷筠謝公墅詩云朱鵲橋南繞香陌謝郎東墅連春碧敕取王騫有舊墅在鍾山八十餘頃與諸宅及故舊共佃之常謂人曰我不如鄭公業有田四百頃而食常不周以此為愧梁武帝于鍾山西造大愛敬寺騫墅在寺側者即王導賜田也帝遣主書宣旨取之答曰此田不賣若敕取所不敢言帝怒遂付市評田價以直逼還之南史員莊員半千莊在焦戴川北枕白鹿原蓮塘竹徑酴醿架海棠洞會景堂花塢藥畦碾磨麻稻里諺曰上有天堂下有員莊長安志輞川王維得宋之問藍田別墅在輞口輞水周於舍下別漲竹洲花塢與道友裴迪浮舟往來彈琴賦詩嘯詠終日聚其田園所為詩號輞川集舊唐余別業在輞川山谷其遊止有孟城坳華子岡文杏館斤竹嶺鹿柴木蘭柴茱萸沜宮槐柏臨湖亭南宅欹湖柳浪欒家瀨金屑泉白石灘北坨竹里館辛夷塢漆園等與裴迪間暇各賦絶句輞川集母亡表輞川第為寺新唐城南張守圭坐賂中人牛仙童得罪李林甫素忌蕭嵩因言嵩嘗以城南墅遺仙童見貶唐書嵩請老於林園植藥合鍊自適舊昭應蕭復字履初嵩孫也為宮門郎廣德中歲飢家貧議將鬻昭應別墅時宰相王縉聞其林泉之美心欲之乃使弟紘以要地誘焉復曰僕以家貧鬻舊業將以拯濟孀幼耳倘以易美職於身令門內凍餒非鄙夫之心也縉憾之乃罷復官舊濟源蕭俯字思謙嵩曾孫也母韋氏賢明理家嚴俯雖為宰相侍母左右不異褐衣時既致仕以洛都官屬賓友避歲時請謁之煩乃歸濟源別墅逍遙山野嘯詠窮年開成二年弟俶授楚州刺史辭日文宗謂俶曰朕賜俯詔書匹帛卿便賫至濟源道吾此意拆楊綰拜相御史中丞崔寬劍南節度使寧之弟家富於財有別墅在皇城之南池館臺榭當時第一寬即日潛遣毀之舊處士溫造字簡輿自負節概隱王屋山以釣魚逍遙為事人號其居曰處士墅舊新家墅裴休字公美操守嚴正兄弟借隱家墅晝講經夜著書終年不出戶唐杜墅韓昌黎南山詩云前行經杜墅坌藪畢原陋注杜墅即杜陵也本周之杜伯國在長安萬年縣東南集玉潭莊隴西李幼卿字長夫大曆中以右庶子領滁州別業在常州義興曰玉潭莊在滁州時以書託獨狐至之獨孤以詩寄云日日思瓊樹書書話玉潭題玉潭云碧玉徒強名冰壺難比德唯當寂照心可並奫淪色幼卿所謂薄宦龍鍾心懶慢故山寥落水淵淪午橋裴度於東都立第於集賢里築山穿池竹木叢萃有風亭水榭梯橋架閣島嶼廽環極都城之勝概又於午橋創別墅花木萬株中起涼臺暑館名曰緑野堂又甘水貫其中釃引脈分映帶左右度視事之隟與詩人白居易劉禹錫酣宴終日高歌放言以詩酒琴書自樂當時名士皆從之遊舊唐裴題南莊云野人不識中書令喚作陶家與謝家白樂天和云陶廬僻陋那堪比謝墅幽微不足攀何以嵩峰三十六長隨申甫作家山長慶集互見堂張齊賢以司空致仕歸洛得度午橋莊有池榭松竹之盛日與親舊觴詠其間意甚曠適宋史傳平泉李德裕東都於伊闕南置平泉別墅清流翠篠樹石幽奇初未仕時講學其中及從官藩服出將入相三十年不復重遊而題寄歌詩皆銘之於石舊唐初德裕營平泉遠方之人多以異物奉之有題平泉詩曰隴右諸侯供語鳥日南太守送名花劇談録汪遵平泉莊詩云水泉花木好高樹嵩少縱橫滿目前惆悵人間不平事今朝身在海南邊唐詩紀事贊皇公平泉莊周圍十里構臺榭百餘所天下奇花異草珍松怪石靡不畢致其間故德裕自製平泉草木記今悉蕪絶唯鴈翅檜珠子柏蓮房玉蕊等蓋僅有存焉怪石名品甚衆多有洛城有力者取去唯禮星石及師子石今為陶學士徙置梁園別墅賈氏談録東墅吳越廣陵王錢元璙帥吳時其子衙前指揮使文奉荊東墅南園經營三十年極園池之賞奇卉異木名品千萬及其身見皆成合抱又纍土為山亦成巖谷晚年經度不已每宴集其間任客所適文奉跨白騾被鶴氅緩步花徑或泛舟池中容與往來聞客笑語就之而飲其好事如此吳越備史九國志牆垣蔽曰牆壁垣也説文牆謂之墉爾雅墉垣牆也廣雅墉容也所以蔽隱形容也壁僻也所以辟禦風寒也牆障也所以自障蔽也垣援也人所依阻以為援衛者也釋名牆所以防非常也賁庸天子賁庸諸侯疏杼鄭元注曰賁大也言大牆正直也疏衰也杼亦牆也言衰殺其上下不得正直尚書大傳丹青諸侯垣牆有黝惡無丹青之色新序始築舜作室築牆茨屋辟地樹榖令民皆知去巖穴各有家室淮南修務象墉孔子觀乎明堂覩四門之墉有堯舜桀紂之象各有善惡之狀興廢之誡焉家語蔽惡叔孫豹曰人之有牆以蔽惡也牆之隙壞誰之咎也衛而惡之吾又甚焉左昭元玉璧元狩三年帝復起凌霞臺去地九十丈纍白玉為壁以八分篆寫羲皇以來訖周成王封禪之事所謂事登壁文蓋帝王之本績也洞冥記金釭趙婕妤居昭陽舍殿壁帶往往為黃金釭含藍田壁明珠翠羽飾之西京雜記畫雲哀帝為董賢起太第於北闕下重五殿洞六門柱壁皆畫雲氣華花山靈水怪或衣以綈錦或飾以金玉樓閣臺榭轉相連注山池玩好窮盡雕麗上粉塗漢省中皆以胡粉塗壁紫素界之畫古烈士漢官典職金飾琅邪王京都莒好修宮室窮極伎巧殿館壁帶皆飾以金銀注壁帶壁中之橫木也以金銀為釘飾其上後漢刻像焦氏山魯恭塜前有石祠四壁皆有青石隱起忠臣孝子貞婦形像像邊皆刻石記碑文戴延之西征記藏書杜安字伯夷少有志節年十三入學號兒童京師貴戚慕其名或遺之書安不發悉壁藏之後及捕案貴戚賓客安開壁出書印封如故竟不罹患時人貴之後漢基下史叔賓者陳留人也少有盛名郭林宗見而謂人曰牆高基下雖得必失後果以論議阿枉毀名云上石角蔡瑁字德圭襄陽人家在蔡洲上屋宇甚好四墻皆以青石結角婢妾數百人別業四五十處耆舊傳穿壁呂蒙病孫權時在江安迎置內殿治護萬方欲數見顏色又恐勞動常穿壁瞻之見小能下食則喜不然則咄唶也吳志臥壁下徐孝嗣初在率府晝臥齋北壁下夢兩童子遽云移公床孝嗣驚起行數步而壁崩齊書水間牆元諧隋高祖為丞相引致左右諧白高祖曰公無黨援譬如水間一堵墻大危矣公其勉之及高祖受禪上顧諧笑曰水間墻竟何如也於是賜宴極歡本傳九丈鄴城避雷室西南石溝北有華陰牆高九丈方圓一里孟奧北征記琉璃大秦國以琉璃為牆南州異物志裔外西北裔外大夏山有宮以黃金為牆南方裔外罔明山有宮以赤石為牆西南裔外老壽山有宮以黃銅為牆東南裔外闠清山有宮以青石為牆西方裔外西明山有宮以白石為牆神異經苑苑有垣曰囿説文囿所以養禽獸也天子百里諸侯四十里毛萇詩注苑蘊也言薪蒸所蘊積也囿者畜魚鱉之處也囿猶有也風俗通古謂之囿漢謂之苑周禮囿人注疏天子曰苑諸侯曰囿左僖原圃疏東方苑囿所以在東方何囿苑養萬物者也東方所以生也白虎通天苑天苑十六星在昴畢南天子之苑囿隋天文志外內之制各得其所四方之士無有畜滯則麒麟遊囿六畜繁多天苑有德星應禮嵇命徵節性昔先聖王之為苑園囿池也足以觀望勞形而已矣非好儉而惡費也節乎性也呂覽養龍黃帝為養龍之囿拾遺記初作湯之初作囿也以奉宗廟鮮犞之具簡士卒習射御以戒不虞及其衰也馳騁遊獵以奪民時罷民之力淮南泰族禦災單襄公曰藪有圃草囿有林池所以禦災也其餘無非榖土民無縣耜野無奧草周語具囿皇武子鄭之有原圃猶秦之有具囿也左僖三十三縈陽中牟縣西有圃田澤注鹿囿秋築鹿囿書不時也左成十八郎囿冬築郎囿書時也季平子欲速成叔孫昭子曰焉用速成其以勦民也無囿猶可無民其可乎昭三螻趙簡子田于螻史黯聞之以犬待于門簡子見之曰何為曰有所得犬欲試之茲囿簡子曰何為不告對曰君行臣不從不順主將適螻而麓不聞臣敢煩當日簡子乃還晉語五苑秦大飢應侯請曰五苑之草著蔬菜橡果棗栗足以活民請發之昭襄王曰吾秦法使民有功而受賞有罪而受誅今發五苑之蔬草者使民有功與無功俱賞也韓非子樂林張儀説韓王曰大王不助秦鴻臺之宮樂林之苑非韓之有也戰國策今本作桑林上林上林苑本秦舊苑也長安志蕭相國請曰上林中多空地願令民得田苑中史記武帝微行以為道遠勞苦又為百姓所患乃使大中大夫吾丘壽王與待詔能用笮者舉措阿城以南盩厔以東宜春以西提封頃畝及其賈直屬之南山以為上林苑東方朔諫秦起阿房而天下亂因陳泰階六符之事上乃拜大中大夫卒起上林苑故相如請為天子遊獵之賦稱烏有先生亡是公而奏上林也水經注上林苑中廣長三百里苑中養百獸天子春秋獵射苑中取禽無數其中離宮七十所容千乘萬騎漢舊儀初修上林苑群臣遠方各獻名果異卉三千餘種植其中亦有制為美名以標高麗也西京雜記昭祥昭祥苑在甘泉宮西周千里萬國獻異物皆集此中洞冥記樂遊神爵三年春起樂遊苑宣紀樂遊苑自生玫瑰樹樹下多苜蓿苜宿一名懷風昔人或謂之光風風在其間常蕭蕭然日照其花有光采故名苜蓿為懷風茂陵人謂之連枝草西京雜記宣帝樂遊廟亦名樂遊苑亦名樂遊原基地最高四望寬敞兩京新記芳林濯龍芳林九谷八溪東京賦濯龍池名芳林苑名洛陽圖經廣成明帝數幸廣成苑鍾離意以為從禽廢政嘗當車陳諫般樂遊田之事天子即時還宮本傳桓帝幸廣成校獵陳蕃諫曰臣聞人君有事於苑囿唯仲秋西郊順時講武殺禽助祭以敦孝敬豈宜揚旗曜武騁心輿馬之觀乎本傳河南新城有廣成聚有廣成苑續志汝水東與廣成澤水合水經注千里梁冀多柘林苑禁同王家西至弘農東界滎陽南亟魯陽北遠河淇包含山藪遠帶邱荒周旋封域殆將千里又起兔苑於河南城西經亘數十里本傳有人殺苑兔者迭相尋逐死者十三人張璠漢記冀誅散其苑囿以業窮民畢圭靈帝欲造畢圭靈琨苑楊賜諫曰昔先王造囿裁足以修三驅之禮薪菜芻牧皆悉往焉先王之制左開鴻池右作上林不奢不約以合禮中今城外之苑已有五六可以逞情意順四節也宜情夏禹卑宮太宗露臺之意以慰下民之勞書奏帝欲止以問侍中任芝中常侍樂松松等曰昔文王之囿百里人以為小齊宣五十里人以為大今與百姓共之無害於政也帝悅遂令築苑後傳玄武苑以元武陪以幽林繚垣開囿觀宇相觀表清禦勒虞針樵蘇往而無忌即鹿縱而匪禁魏都賦元武苑在鄴城西苑中有魚梁釣臺竹園蒲萄諸果注桂林建康縣北吳朝為桂林苑陶季直京都記桂林苑在落星山之陽南朝宮苑記龍騰慕容熙大築龍騰苑廣袤十餘里役徒二萬人起景雲山於苑內基廣五百步峰高十七丈又起逍遙宮甘露殿連房數百觀閣相交鑿天河渠引水入宮又為其昭儀苻氏鑿曲光海清涼池晉載記南苑宋明帝嘗以南苑借張永云且給三百年期盡更請南史紀南苑在臺城南鳳臺山南朝宮苑記芳林芳林苑一名桃花園本齊高帝舊宅在廢東府城東邊秦淮大路北齊王融作曲水詩序載懷平浦乃眷芳林即此也上齊世清溪宮改為芳林苑天監初賜南平王偉為第偉又加穿築增植嘉樹珍果窮極雕麗每與賓客遊其中命從事中郎蕭子範為之記梁世藩邸之盛無以過焉梁傳芳樂齊東昏以閲武堂為芳樂苑窮奇極麗當暑種樹朝種夕死死而復種卒無一生於是徵求人家望樹便取毀徹墻屋以移置之大樹合抱亦皆移掘插葉繁華取玩俄頃剗取細草來植階庭烈日之中至便焦燥紛紜往來無復已極山石皆塗以采色跨池水立紫閣諸樓壁上畫男女私褻之像南史紀建興梁紀少遊建興苑詩云丹陵抱天邑紫泉更上林玉臺極百尺銀樹起千尋湘東湘東王於子城中造湘東苑穿池構山長數百丈植蓮浦緣岸雜以奇木其上有通波閣跨水為之南有芙蓉堂東有禊飲堂堂後有隱士亭亭北有正武堂堂前有射堋馬垀其西有鄉射堂堂置行堋可得移動東南有連理堂堂後生連理太清初生北連理當時以為湘東踐祚之瑞北有映月亭修竹堂臨水齋齋前有高山山有石洞潛行宛委二百餘步山有陽雲之樓樓好高峻遠近皆見北有臨風亭明月棲顏之推詩云屢陪明月宴並將軍扈熙義所造渚宮故事仙都齊後主武平四年大興土木之功於仙都苑穿池築山樓殿間起窮華極麗功始就而亡國陏五行志西苑隋煬帝大業元年五月築西苑周三百里其內為海周十餘里為方丈蓬萊瀛洲諸山高出水百餘尺臺觀宮殿羅絡山上向背如神海北有龍鱗渠縈紆注海內緣渠十六院門皆臨渠每院以四品夫人主之堂殿樓觀窮極華麗宮樹秋冬雕落則剪綵為花葉綴於枝條色渝則易以新者常如陽春沼內亦剪綵為荷芰菱茨乘輿遊幸則去冰而布之十六院競以殽羞精麗相尚求市恩寵上好以月夜從宮女數千騎遊西苑作清夜遊曲於馬上奏之續世説於皂澗營顯仁宮採海內奇禽異獸草木之類以實園苑隋書紀會通東都苑隋曰會通苑又改為華芳神都苑周回一百二十六里兩京記上苑蘇良嗣遷荊州刺史高宗遣宦者采怪竹江南將蒔上苑宦者所過縱暴至荊良嗣囚之上書言狀帝下詔慰獎取竹棄之新唐鬻果則天時尚方監裴匪躬檢校京苑將鬻苑中果菜以收其利蘇良嗣駁之曰昔公儀相魯猶能拔葵去織未聞萬乘之主鬻其果菜以與下人爭利也匪躬遽止舊唐昌華荔枝洲在番禺縣劉氏於其上荊昌華苑圖經北苑南唐徐鉉湯悅徐鍇有北苑侍宴詠序云望蔣橋之嶔崟祝為聖壽泛潮溝之清淺流作恩波奈苑西域國有奈樹生果果中有一女子王收為妃女乃以苑地施佛為伽藍故曰奈苑雞跖集樹果園樹果也圃樹菜也説文天園天園主果實菜茹蓄儲天文要集匏瓜匏瓜為天子果園上大象賦云匏瓜薦果於震閨注云五星在離珠北天子之果園占大光潤則歲豐不爾則瓜果之實不登場圃場人掌國之場圃而樹之果蓏珍異之物以時斂而藏之凡祭祀賓客共其果蓏享亦如之周禮注云果棗栗之屬蓏瓜瓠之屬珍異蒲桃枇杷之屬矍相郡國志魯國有闕里孔子所居注禮記矍相之圃亦在城中西南近孔子廟後漢圃畦子貢南遊於楚反於晉過漢陰見一文人方將為圃畦鑿隧而入井抱甕而出灌搰搰然用力甚多而見功寡子貢曰有機於此一日浸百畦用力甚寡而見功多夫子不欲乎為圃者仰而視之曰奈何曰鑿木為機後重前輕挈水若抽數如沃湯其名為槔為圃者忿然作色而笑曰吾聞之吾師有機械者必有機事有機事者必有機心機心存于胸中則純白不備純白不備則神生不定神生不定者道之所不載也吾非不知羞而不為也子貢告孔子孔子曰彼假修渾沌氏之術者也莊子繫馬魯穆公時君老太子幼漆室女倚柱而嘯鄰婦笑之漆室女曰昔晉客舍吾家繫馬園中馬佚馳走踐吾葵使我終歲不食葵列女傳鄭圃列子居鄭圃四十年人無識者國君卿大夫視之猶衆庶也國不足將嫁於衛列子灌園於陵子辭卿相而桔槔灌園雜記漆園梁郡蒙縣莊周之本邑也為蒙之漆園吏郭景純所謂漆園有傲吏者也悼惠施之沒杜門於此邑矣水經兔園史記謂梁孝王築東苑方三百里是曰兔園也隋圖經梁王不悅遊於兔園乃置旨酒命賓乃召鄒生延枚叟雪賦漢枚乘有免園賦互見親王臺下竹園睢水東南流歷于竹圃水次緑竹蔭渚菁菁實望世人言梁王竹園也水經不窺董仲舒孝景時為博士下帷講誦弟子傳以久次相授業或莫見其面蓋三年不窺園其精如此前漢桓榮字春卿精力不倦十五年不窺家園後漢法真隱居大澤講論術藝歷年不問園圃謝承後書趙昱歷年潛志不窺園圃魏志陶謙傳注北邙茂陵富人袁廣漢藏鏹巨萬家僮八九百人於北邙山下築園東西四里南北五里激流水注其內構石為山高十餘丈連延數里養白鸚鵡紫鴛鴦犛牛青兕奇獸怪禽委積其間積沙為洲嶼激水為波潮其中致江鷗海鵠孕雛産鷇延漫林池奇樹異草靡不具植屋皆徘徊連屬重閣修廊行之移晷不能遍也廣漢後有罪誅沒入為官園鳥獸草木皆僉植上林苑中西京雜記樊川漢武有名園曰樊川一名御宿園出栗十五枚一升大梨如五升落地則破其取梨先以布囊承之號曰含消此園梨也三秦記索其栗味甘而小不如三秦記所説含消梨人間往往有之其大不至五升亦不出此川矣括地志持鋤孫寶為京兆尹署侯文為東部督郵灞陵杜季杜門不通水火持鋤自理園不敢犯法前漢濯龍顯宗每幸濯龍並召諸才人請呼皇后帝笑曰是家不好樂雖來無歡以遊娛之事奚從馬后蠶于濯龍中馬后紀自賃范丹學通三經常自賃灌園陳留耆舊傳得印桓帝時沛國戴翼鉏園得黃金印後漢紀行園吳祐遷膠東侯相時濟北戴宏父為縣丞宏年七六從在丞舍祐每行園常聞諷讀之音甚奇之與為友宏卒成儒宗知名東夏為河間相因自沔歸家不復仕灌園蔬以經書教授年九十八卒銅爵文昌殿西有銅爵園園中有魚池銅爵園西有三臺中央銅爵臺南金鳳臺北冰井臺魏都賦注芳林明帝起土山於芳林園西北陬使公卿百僚皆負成山立松竹雜木善草於其上捕山禽雜獸置其中魏略芳林園即華林園齊王芳即位改為華林甘露降明帝與東阿王詔曰昔先帝時靈芝生芳林園中自吾建成承露已來甘露復降芳林園仁壽殿前翻車馬鈞巧思絶世居京都城內有地可以為園患無水以灌之乃作翻車令童兒轉之而灌水自覆更入更出其巧百倍於常收利向秀與呂安灌園於北山陽收其餘利以供酒食之費起園顏斐字文林為京兆守於府下起菜園使吏援簡鋤治也魏志春王文選陸士衡詩逍遙春王圃躑躅千畝田注晉宮閣名曰洛陽宮有春王園廬中范汪性好學外氏家貧無以資給汪乃廬于園中布衣蔬食燃薪寫書寫畢誦讀一遍遂博學多通善談名理晉書苜蓿華既廢黜武帝後又登凌雲臺望見苜蓿園阡陌甚整依然感舊太康初大赦乃襲得封上名園王子敬自會稽經吳聞顧辟疆有名園先不識主人徑往其家值顧方集賓友酣燕而王遊歷既畢指麾好惡傍若無人顧勃然不堪曰傲主人非禮也以貴驕人非道也失此二者不足齒人傖耳便驅其左右出門王獨在輿上回轉顧望左右移時不至然後令送箸門外怡然不屑世説吳中舊傳池館林木之勝惟晉顧辟疆園為第一李太白云柳深陶令宅竹暗辟疆園陸羽云辟疆舊園林怪石紛相向陸龜蒙云吳之辟疆園在昔勝概敵皮日休云更葺園中景應為顧辟疆中吳紀聞會心簡文入華林園顧謂左右曰會心處不必在遠翳然林木便自有濠濮間想也覺鳥獸禽魚自來親人世説殖果涼州牧張駿增築四城箱各千步東城殖園果命曰講武場北城殖園果命曰玄武圃皆有宮殿王隱晉書逍遙姚興常於逍遙園引諸沙門聽番僧鳩摩羅什演講佛經起逍遙宮殿庭左右有樓閣高百尺相去四十丈以麻繩大一圍兩頭各絟樓上會日令二人各從繩繩行過以為佛神相遇長安志種菜柳元景為尚書令南岸有數十畝菜園園人得賣菜錢三萬送宅元景曰我立此園種菜以供家中啖耳乃復賣以取錢奪百姓之利耶以錢與守園者宋書玄圃齊文惠太子好釋氏立六疾館以養窮人而性頗奢麗宮內殿堂皆雕飾精綺過於上宮開拓玄圃園與臺城北塹等其中起出土山池閣樓觀塔宇窮奇極麗費以千萬多聚異石妙極山水慮上宮中望見乃旁列修竹外施高鄣造遊觀數百間施諸機巧宜須鄣蔽須臾成立若應毀撤應手以晉明帝為太子時立西池起武帝引前例求於東田起小苑上許之壯麗極目南史離垢劉慧斐字宣文遊匡山有終焉之志遂居東林寺又于山北構園一所號曰離垢園時人乃謂為離垢先生南史隱逸芙蓉芙蓉園本隋氏之離宮居地三十頃周廽十七里秦謂為宜春苑漢謂為樂遊苑宇文愷營建京城以羅城東南城地高不便故缺此隅頭一方餘地穿入芙蓉池以虛之兩京記芙蓉在京羅城東南隅有青林重復緑城瀰漫若帝城勝景駕時幸之景龍文館記司竹司竹園在盩屋縣東十二里穆天子西征至玄池乃植竹即此是也史記云渭川千畝竹漢謂鄠杜竹林故有司竹都尉西都賦所謂鄠杜濱其足竹林果園芳草甘木也隋圖經起樓汝南袁德師故給事高之子嘗於東都買得婁師德故園地起書樓洛人語曰昔日婁師德園今乃袁德師樓傳載不立張嘉貞雖貴不立田園嘗曰吾相國矣未死豈有飢寒憂苦以譴去雖富田産猶不能保也近世士大夫務廣宅為不肖子孫酒食費我無是也唐書市取唐嗣王皋為山南東道節度使張柬之有園圃在襄陽皋將市取之馬彝諫曰漢陽有中興功今遺業當百世共保奈何使其子孫鬻乎王謝曰主吏失詞以為君羞微君安得聞此言上奉誠司徒兼侍中馬燧宅在安邑里燧子少府監暢燧資甲天下暢亦善殖財貞元末神策中尉楊志廉諷使納田産遂獻舊第為奉誠園長安志到順宗時復記之中官往往逼取暢畏不敢吝以至困窮而終諸子無室廬自託奉誠園亭觀故當世視暢以厚畜為戒新唐暢以第中大杏饋竇文埸文埸以進德宗德宗未嘗見頗怪之令中使就封其樹暢懼進宅廢為奉誠園木皆拆入內國史補桂苑叢談題園楊尚書昭儉退居華下自題家園以見志曰池蓮憔悴無顏色園竹低垂臧翠陰園竹池蓮莫惆悵相看恰似主人心南部新書瀟灑顏謝魯公之後所居有泉石松竹創亭延客孟賓于留題詩云園林瀟灑聞來久欲往因循二十秋今日開襟吟不盡碧山重疊水長流江南野録荔枝西夷有荔枝園僰僮施夷中最賢者古所謂僮之富多荔枝為業園植萬餘樹收一百五十斛郡國志栗園玄瓠灣中有地數頃土有栗園栗小殊不并固安之實也然歲貢三百實以充天府水渚即栗洲也樹木高茂望若屯雲積氣矣林中有栗堂射墩甚間敞牧宰及英彥多所遊薄水經瓊圃洛陽有瓊圃園靈芝園石祠園鄴有鳴鵠園蒲萄園晉宮闕名祇園須達多長者白佛言弟子欲營精舍請佛住惟有祇陀太子園廣八十頃林木鬱茂可居白太子太子戲曰滿以金布便當相與須達出金布八十頃精舍告成凡千二百區經律異相亦曰給孤園金剛經注舍衛精舍東北六百里毗舍佉毋作精舍請佛及借此處故在秖洹舍大園落有二門一門東向一北向此園即須達長者布金錢買地處也精舍當中央佛住此處最久説法度人經行坐處亦盡孝塔皆有名字法顯記菴羅園菴羅是果樹之名其果似桃或云似奈此樹開花花生一女國人嘆異以園封之園既屬女女人守護故言菴羅樹園宿善冥熏見佛歡喜以園奉佛佛即受之而為所住闡義拘夷那竭城東行到毗舍離城北有大林重閣精舍佛住處及阿難半身塔其城裏本菴婆羅女家為佛起塔今故在城南三里道西菴婆羅女以園施佛住處法顯記天中記卷十五
