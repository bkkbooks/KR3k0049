body:
  text: 榖百榖總名榖續也百榖之總名也説文五榖者萬民之命國之重寶東方多麥稻西方多麻北方多菽中央多禾五土之宜各一高下高而陽者多豆平而陰者多五榖范子計然榖氣勝元氣其人肥而不壽養性之術常使榖氣少則病不生矣梁者黍稷之總名稻者溉種之總名菽者衆豆之總名三榖各二十種為六十疏果之實助榖各二十凡為百榖故詩曰播厥百榖榖者種衆之大名也楊泉物理論周禮以五味五榖五藥養其病鄭司農注麻黍稷麥豆凡王之膳食用六榖鄭司農注稻黍稷粱麥苽三農生九榖鄭司農注稷秫黍稻麻大小豆大小麥鄭云九榖無秫大麥而有粱苽炙轂子云九榖黍稷麻麥稻梁苽大小豆酉陽雜俎九轂黍稷稻粱三豆二麥星經八榖八星在五車北主黍稷稻粱麻叔麥烏麻星明俱熟一榖不升謂之嗛二榖不升謂之飢三榖不升謂之饉四榖不升謂之康五榖不升謂之大侵大侵之禮君食不兼味臺榭不塗弛侯廷道不除百官布而不制鬼神禱而不祀此大侵之禮也榖梁一榖不收謂之饉二榖不收謂之旱三榖不收謂之凶四榖不收謂之餽五榖不收謂之飢饉則大夫以下損祿五分之一旱則二凶則三餽則四飢則盡祿廩食而已墨子五榖者萬民之命國之重寶也是故無道之君及無道之臣皆不能積其盛有餘之時以待其衰不足也范子計然五榖之先杏多實不蟲者來年秋善五木者五榖之先欲知五榖但視古木釋其木盛者來年宜種之師曠金土金干土則五榖傷土干金則五榖不成春秋繁露居方凡禾麥居東方黍居南方稻居中央粟居北方周書職方氏職方氏掌天下之圖辨其邦國都鄙九榖之數揚州荊州其榖宜稻豫州并州其榖宜五種青州其榖宜稻麥兗州其榖宜四種雍州冀州其榖宜黍稷幽州其榖宜三種食榖食氣者神明而壽食榖者智惠而巧不食不巧大戴禮登榖歲凶年榖不登君膳不祭肺馬不食榖孟春之日天子乃以元日祈榖於上帝孟夏驅獸無害五榖仲夏之月乃命百縣雩祀百辟以祈榖實孟秋之月農乃登榖天子嘗新先薦寢廟臣專政私其君位則草木不生禾榖不實禮斗威儀凡以火乾五榖之類出自山東齊楚以往曰熬隴冀以往曰𤑏秦晉之間曰焣方言小豆忌卯稻麻忌辰禾忌丑稼忌未小麥忌戍大麥忌子汜勝之書播榖炎帝大庭氏下為地皇作耒耜播百榖曰神農月令疏昔者神農之治天下也甘雨時降五榖蕃植春生夏長秋收冬藏月省時考歲終獻功以時嘗榖祀於明堂淮主術黃帝考定星曆建五行民神易業敬而不黷故神降之嘉榖生史歷書黃帝藝五榖史殖五榖厲山氏之子能殖五榖故祀以為稷禮記播百榖舜曰棄黎民阻飢汝后稷播時百榖舜典魏王問子慎曰寡人聞昔上天神異后稷而為之下嘉榖周以遂興往中山之地無故有榖非人所為云天雨之反以亡國何答曰天雖至神自古及今未聞其下榖與人也詩美后稷大能教民善種榖以利天下所謂稷降播種農殖嘉榖其義一也若中山之榖妖怪之事非所謂天祥也孔叢子扶海洲上有草焉名曰蒒其實食之如大麥從七月稔熟民斂獲至冬乃訖名曰自然榖或曰禹餘糧博物志齊桓公欲封禪管仲曰今鳳凰麒麟不來嘉榖不生而蓬蒿藜莠茂鴟梟數至而欲封禪毋乃不可乎史楚魏會於晉陽將以伐齊齊王患之使人召淳于髡曰楚魏謀欲伐齊願先生與寡人共憂之淳于髡大笑而不應王復問之又復大笑而不應三問而不應王怫然作色曰先生以寡人國為戲乎淳于髡對曰臣不敢以王國為戲也臣笑臣鄰之祠田也以奩飯與一鮒魚其祝曰下田汙耶得榖百車蟹堁者宜禾臣笑其所以祠者少而所求者多王曰善賜之千金革車百乘立為上卿説苑朝錯曰粟米布帛生於地長於時聚於力非可一日成也數石之重中人弗勝不為姦邪所利一日弗得而飢寒至是故明君貴五榖而榖金玉今海內為一土地人民之衆不臧湯禹加以亡天災數年之旱而蓄積之未及者何也地有餘利民有餘力生榖之土未盡墾也山澤之利未盡出也遊食之人未歸農也漢書漢宣帝時江淮飢饉人相食天兩榖三日尋魏地奏亡榖二千頃述異記野榖建武二年天下野榖旅生麻菽尤盛東觀漢記牛乃耕農之本百姓所仰為用最大國家之為強弱也建武之初軍役亟動牛亦損耗農業頗廢米石萬錢天愛斯民扶助聖主事有徵應於是旅榖彌望野繭被山風俗通雨榖建武三十一年陳留雨榖蔽地視榖形若粢而黑此夷狄地生榖也夷狄不食榖生於草野成熟委於地遭疾風與之俱飛風衰榖集中國中國見之謂天雨榖也論衡建武初榖食尚少趙孝得榖炊將熟令弟禮夫妻出北還孝夫妻共蔬食茹菜禮夫妻來輒獨飴之積久禮心疑吝後伺掩見亦不復肯出兄弟怡怡鄉里歸德東觀漢記殖財貴施馬援在河西有榖數萬斛乃嘆曰凡殖財者貴以施也否則守錢虜耳華嶠後漢書永平十五年上始欲征胸奴與竇固等議出兵調度皆以為塞外草美可不須榖馬案軍出塞無榖馬故事馬防言當與榖上曰何以言之防對曰宣帝時五將出征案其奏言胸奴候騎得漢馬矢見其中有粟知漢兵出以故引去以是言之馬當與榖上善其用意微緻即下調馬榖防遂見親也上黃金易榖赤眉亂後關中大飢黃金一斤易五升榖袁宏漢記董卓築於郿高厚七尺號曰萬歲積榖為三十年儲自云事成雄據天下不成守此足以畢老後漢書吳桓王時金陵雨五榖于貧民家富民家則不雨述異記殷稷字伯起遭世喪亂埋榖數百石後稷為賊所執掠見責具以榖告之賊猶嫌其未實欲刃焉稷乃詈曰卿行劫害當知人心豈有出財還自殺耶賊知其誠遂免殷氏世傳袁談以王循為別駕太祖破鄴藉沒雷配等家財物資以萬數破南皮閲循家榖不滿千斛魏志借死厭衆太祖嘗賦廩榖不足私謂主者如何主者曰可以小斛以足之後軍中言太祖欺衆太祖謂主者曰借汝一死厭衆乃徇曰小斛盜官榖即斬之曹暪傳高堂隆諫祿賜榖帛人主所以惠養吏民而為之司命若令有廢是奪其命鄧攸為吳郡太守吳人飢荒攸輒出臺倉榖賑之後劾攸曰善不可為也王隱晉書羊祜周行賊境七百餘里往返四十餘日割賊榖以為軍糧皆計頃畝送絹還直使如榖價別傳見人擔榖琅琊諸葛氏兄弟二人寓居晉陵家甚貧耗常假乞日給榖在囷中計日用未應盡而早以空罄始者謂是家中相竊盜復封檢題識而耗如初後有客從遠來際夕至巷口見數人擔榖出門客借問諸葛在否答云悉在客進內言語之後因問卿何得大糶榖主人云告乞少榖欲充口云何復得糶之客云我向來逢見數人擔榖從門出若不糶者為何事主人兄弟相視竊自疑怪試入看封題儼然如故試開囷量視即無十許斛知前後所失非人為之幽明録天麥涼州張駿時天雨五榖殖之悉生因名為天麥述異録陳君賓遷邢州刺史徙鄧州明年四方霜潦獨君賓所治有年儲倉充羡蒲虞二州民就食其境太宗下詔勞之曰去年關內六州榖不登糇糧少令祈民房遂食聞刺史與百姓識朕此懷務相安養還有羸糧出布帛贈遺行者知此水旱常數更相拯贍禮讓興行海內之人皆為兄弟變澆薄之風朕顧何憂已踊貴盧坦江淮早榖踊貴或請抑其價坦曰所部地狹榖來它州若直賤穀不至矣不如任之既而傷以米坌至積榖翁韋寅善治生初除廣州宣宗垂誡貪泉寅奏曰江淮江陵莊積榖尚七千堆固無所貪宣宗曰此所謂積榖翁韋寅永州刺史州負嶺轉餉艱險每飢人輒殍死宙始築常平倉收榖羡餘以待之榖者所以阜俗康時聚人守位者也下至十室之邑必有千鍾之藏茍凶禳以之貴賤失度雖封丞相而猶困侯大農而謂何杜甫策榖者百姓之本百役皆出上司和女夷鼓歌女夷天帝之女下司時和春陽喜樂鼓歌也以司天和以長百榖禽鳥草木孟夏之月以熟榖禾雄鳩長鳴為帝侯歲淮天文漢宣帝時江淮飢饉人相食天雨榖三日尋魏地奏亡榖二千頃述異記孝武竟寧元年南陽山都雨榖小者如麥粟而青黑味苦大者如米豆赤黃味如麥下三日生根葉狀如大豆初生時博物志張駿九年雨五稼榖于武威燉煌種之皆生因名天麥崔鴻十六國春秋前涼録韋珍遷顯武將軍郢州刺史在州有聲績朝廷嘉之遷龍驤將軍賜驊騮二匹帛五十五匹榖三百斛珍乃召集州內孤貧者謂之曰天子以我能綏撫卿故賜以榖帛吾何敢獨當遂以所賜悉分與之後魏書盧義僖寬和畏順不妄交款情性儉素不營財利少時幽州頻遭水旱先有數萬石榖貸人義熙以年榖不熟乃燔其契州閭悅其恩德雖居顯位每至困乏麥飯蔬食欣然甘之北史射鳥口榖後梁有何山者其射之妙人莫能及有鳥巢於庭樹蕭發惡之謂山曰射中者賜一車榖其鳥雛並於枝上山曰脫一箭中兩請賜兩車臣無車牛願官為送發許之於是山射中其兩項發甚欣悅即令載榖送之三國典略長壽二年元日大雪其夜質明而晴上謂侍臣曰俗云元日有雪百榖豐未知此語有何故實文昌右丞姚璹對曰汜勝書云雪是五榖之精以其汁和鍾則百穀大穰又宋孝武帝大明五年元日降雪以為嘉瑞上曰朕臨御萬方心存百姓如得年登歲稔此即可為大瑞雖獲麟鳳亦何用焉唐書五榖為財飲食物夢見穀得財吉五榖入家家當盛夢書一年三熟淮陽郡西北接耒陽縣有溫泉其下流百里恆資以溉灌常十二月一日種至明年三月新榖便登重種一年三熟盛宏之荊州記力耕得榖學不勤則不知道耕不力則不得榖世要論常山之東河汝之間早生而晚殺五榖之所審熟也管子八榖星八榖八升在五車北主黍稷稻粱麻菽麥烏麻星明俱熟星經俱傷京房五景占曰五榖俱傷何君無德也雨榖歲熟京房易逆利曰天雨榖歲大熟五行木勝土土勝水水勝火火勝金金勝木故春生秋死禾菽夏生冬死麥秋生夏死薺冬生仲夏死淮南子播琴都廣之野百榖自生冬夏播琴山海經播琴如播殖七日不粒孔子窮乎陳蔡之間藜藿不斟七日不嘗粒晝寢顏回索米得而爨之幾熟孔子望見顏回攫其甑中而食之選間食熟謁孔子而進食孔子佯為不見之孔子起曰今者夢見先君食潔而後饋顏回對曰不可向者煤室入甑中棄食不祥回攫而飯之孔子嘆曰所信者目也而目猶不可信所恃者心也而心猶不足恃弟子記之知人固不易矣呂氏春秋家語作子貢見之以問孔子云帝因西征隗囂至漆諸將多以王師之重不宜遠入險阻計猶豫未決會召馬援夜至大喜引入具以群議質之援因説隗囂將帥有土崩之勢兵進有必破之狀又於帝前聚米為山谷指畫形勢開示重軍所從道經往來分析昭然可曉帝曰虜在吾目中矣明旦遂進軍囂衆大潰後漢書獻帝時三輔大旱帝避正殿請兩遣使者洗囚徒原輕繫洗謂蕩滌也是時榖一斛五十萬豆麥一斛二十萬人相食啖白骨委積帝使御史侯汶出太倉米豆為飢人作麋粥經日而死者無數帝疑賦恤有虛乃親於御坐前量試作麋乃知非實袁宏漢記曰時勑侍中劉艾取米豆五升於御前作麋得滿三盂于是召尚書米豆五升得麋三盂而人委頊何也時侍中劉艾出讓有司於是尚書令以下皆詣省閣謝奏收侯汶考實詔曰未忍致汶于理可杖五十自是之後多得全濟上晉平王休祐素無才愚而自用大明之世年尚少未得自專至是貪淫好財色在荊州褒刻所在多營財貨以短錢一百賦良田登就求白米一斛米粒皆令徹白若有破折者悉令簡不受民間糶此米一升一百至時又不受未評米貴賤凡諸求利皆悉如此宋書私榖助賑徐齊耕晉陵人也元嘉二十一年大旱人飢耕詣縣陳辭以米千斛助官賑貸縣為言上當時議以耕比漢卜式詔書褒美酹以縣令大明八年東土飢東海嚴城東苑王道益各以私榖五百斛餘助官賑恤上任昉為新安太守為政清省吏民便之卒於官唯有桃花米二十斛無以為斂遺言不許將新安一物還都下梁書孔覬後為司徒左長史弟道存代覬為後軍長史江夏內史時東土大旱都邑米貴一升將百錢道存慮覬甚之遣使載五百斛米餉之覬呼使謂之曰我在彼三載去官之日不辨有路糧即至彼未幾郍能便得此米即可載還彼吏曰自古以來無有載米上水者都下米貴乞於此貨之不聽吏乃載米而去南史庾詵嘗乘舟從豫中山舍還載米一百五十石有人寄載四十石及至宅寄載者曰君四十斛我一百五十斛詵默然不言恣其取足鄰人有被執為盜見劾妄疑詵矜之乃以書質錢二萬令門生詐謂其親代之酹彼鄰人獲免謝詵曰矜天下無辜豈期謝也梁書張率嗜酒不事於家務尤忘懷在新安遣家僮載米三千石還吳宅及至耗一半率問其故答曰雀鼠耗率笑而言曰壯哉雀鼠竟不研問上陶潛為彭澤令郡遣都郵至縣吏白應束帶見之潛嘆曰我不能為五斗米折腰向鄉里小人即日解印綬去職賦歸去來兮遂其志南史隱逸傳崔浩自撰食經序曰余備位台鉉與參大謀賞獲豐厚牛羊盈澤資纍巨萬衣則重錦食必粱肉遠惟平生思季路負米之時可復得乎故序遺文垂示來世魏書齊文宣帝崩當朝文士冬作挽歌十首擇其善者而用之魏收陽休之祖孝徵等不過得一二首惟慮思道獨有八篇故時人稱為八美盧郎北史西域王舍城有大人米大人米粳米也大如烏豆飯香百步惟此國有王及知法者預焉玄裝傳續黃稑烏節楊州土貢黃稑米烏節米地里志紫米元和八年大軫國貢紫米有類于豆勝炊之一升得飯一斗食之令人髭髮鬒黑顏色不老久則後天而死杜陽編張萬福為泗州刺史魏州飢父子相賣餓死者接道萬福曰魏州吾鄉里也安可不救令其兄子將米百車往餒之又使人於汴口求魏人自賣者給車牛贖而遣之上陽城常約其二弟云吾所得月俸汝可度吾家有幾口月食米當幾何賣薪菜鹽米凡用幾錢先具之其餘悉以付酒媼無留也未嘗有所積畜上陽城嘗絶糧遣奴求米奴以米易酒醉臥於路城與弟迎之奴未醒乃負以歸及覺痛咎謝城曰寒而飲何害焉吳全綜父柔為桂陽守使綜齎米數千斛至吳交易綜皆賑給士大夫空船而還柔求之王修齡貧乏陶胡奴為烏程令送米一船答曰王修齡飢自就謝仁祖索食不須陶胡奴米世説齊劉懷惠為齊郡守人有餉新米一斛者懷惠出所食麥飯示之曰食有餘幸不煩此梁忱絢少貧於宗黨得米數百斛為宗人所侮覆米絢去及貴不以為憾荊南孫儒之亂斗米四十千持金寶換易才得一合一撮謂之通腸米言飢人不可食他物惟煎飲之可以消通腸胃南楚新聞會稽有射的山遠望狀若射侯故謂射的射之西有石室名之為射堂年登否常占射的以為貴賤之碓的明米賤的暗則米貴故諺云射的白斛米百射的玄斛米千水經孟夏之月天子以彘嘗麥孟夏行冬令則首種不入禮記月令凡田六道種麥為首禾欲富黃金覆為曳柴壅麥根也夏至後七十日寒地可種宿麥汜勝之書爾雅翼麥者繼絶續乏之榖春秋於他榖不書至無麥禾則書之麥比他榖隔歲種故號宿麥麥之為言殖也寢生觸凍而不息精射刺直故麥含芒事且立也春秋説題辭麥芒榖秋穜厚薶故謂之麥麥金也金王而生火王而死從來有穗者從久牟周所受來牟也一麥二縫象其芒刺之形天所來也麧堅麥也𨛫小麥屑核也䴾磨麥也麥核屑也十斤為三斗從麥啻聲麷煮麥也麩麥甘鬻也稍麥莖也説文不食晉侯夢大厲公召桑田巫巫曰不食新麥矣六月丙午晉侯欲麥使甸人獻麥召桑田巫示而殺之將食張如廁陷而卒成上傳郭宓子賤為單父宰百姓化之齊人攻魯道由單道父老謂曰麥已熟矣今齊寇至不及人人自收其麥請放民皆使出穫傳郭之麥可以益糧且不資寇三請而宓子不聽俄而寇逮于麥季孫聞之怒使人讓之宓子蹙然曰今茲無麥明年可樹若使不耕者得穫是民樂有寇也且單父一歲之麥於魯不加強喪之不加損使民有自取之心其瘡必數世不息季孫聞之敞然愧曰地若可入吾豈忍見宓子哉家語箕子朝周過故殷虛感宮室毀壞生禾黍箕子傷之欲哭則不可欲泣為其近婦人乃作麥秀之詩以歌詠之其詩曰麥秀漸漸兮禾黍油油彼狡僮兮不與我好兮所謂狡僮者紂也史記鄧禹平三輔糧乏王舟上麥二千斛禹高其節義表丹領左馮祤東觀漢記漂麥高鳳字文通南陽苑人誦讀晝夜不絶妻嘗之田曝麥於地以竿授鳳令護鳳受竿誦經書時天大雷暴雨流潦鳳留意在經忽不視麥麥隨水漂去上與奴種麥第五倫免歸田躬與奴共發株棘田種麥上董宣為洛陽令卒官詔遣使視唯見布被覆尸妻子對哭有大麥數斛上兩岐張湛為漁陽太守勸民耕種以致殷富百姓歌曰桑無附枝麥穗兩岐張君為政樂不可支上羊續為南陽太守妻與子祕俱往郡舍續閉門不納妻自將祕行其資藏唯布衾弊禱鹽麥數斛上桓帝時童謠曰小麥青青大麥枯誰當穫者婦與姑丈夫何在西擊胡上范丹字史雲外黃人使兒捃麥得五斛鄉人尹臺遺之以一斛囑兒莫道丹後知即令并送六斛言麥已雜遂誓不取上蝝蝗不食高順字孝甫敦厚少華子式至孝蝝蝗為災不食式麥陳留耆舊傳孔文舉為北海相有人母病差思食新麥家無乃盜鄰熟麥而進文舉聞特償之秦子太祖曾行麥中令士卒無敗麥犯者死騎士皆下馬持麥以相待太祖馬騰入麥中太祖曰孤為軍師不可殺請自刑因拔劍割髮以置地曹瞞傳停食作賦孫恪常饗蜀使費禕禕停食餅索筆作麥賦恪亦請筆作磨賦咸稱善諸葛恪別傳王褒字偉元諸生有密為褒刈麥者褒遂棄之於是莫敢復佐王隱晉書初符健聞桓溫之來伐也芟麥以待之故溫掠無所得軍人大飢前秦録收麥求價李嶽字祖仁官至中散大夫嘗為門客所説舉錢營生廣收大麥載赴晉陽侯其寒食以求高價清明之日其車方達又從晉陽載化生向鄴城路逢大雨並化為泥息利既少乃至貧迫當世人士莫不笑之三國典略侯景亂時吳明徹有大麥三十餘斛而鄰里飢餒乃白諸兄曰今人不圖久奈何不與鄰里共此於是計口平分同其豐儉群盜聞而避焉賴以存者甚衆陳書麥遺漏地天寶末有強練師以無底囊歷長安市告乞市以米麥遺之隨即漏地人或問其故練曰但令諸人見盛空耳及隋初遷都龍首山長空遂空矣後周書張文詡隱居常有人夜中竊刈其麥者見而避之盜因感悟棄麥而謝慰諭之自誓不言固令持去經數年盜者向鄉人論之始為遠近所悉鄰家築墻心有不直文詡因毀舊堵以應之隋書開元十三年河南府壽安縣人劉懷家有大麥六畝先熟與衆麥殊色其中有兩岐三岐四岐六岐者唐書打麥打麥元和九年六月三日宰臣武元衡為盜所害先是長安謠曰打麥打麥三三三既而旋其神曰舞了也鮮者謂打麥者打麥時也麥打者蓋謂暗中突擊也三三三謂六月三日也舞了者謂元衡之卒也上西安國每十月令巫者齎肴諸山中散糟麥於空大呪呼烏俄而烏如雞飛入巫者之懷因剖腹而視之每有一榖來歲必登若有霜雪必有災異其俗信之名為巫卜焉上得時之麥秱長而頸黑二七以為行而服薄䅵而赤色稱之重食之致香以息使人飢澤且有力如此者不蚼蛆先時者暑雨未至腑動蚼蛆而多疾其次羊以節後時者弱苗而穗蒼狼薄色而美芒呂覽延精麥言延壽益氣有昆和麥調暢六腑有輕心麥食者體輕有淳和麥麵以釀酒一醉纍月食之凌冬不寒有含露麥中有露甘如飴拾遺記東方多麥南方多稷西方多黍北方多菽中央多禾五土之所宜也范子計然異麥虜小麥其實大牟似大麥形有二縫麥似大麥出涼州施麥三月種八月熟出西方赤麥赤而肥出鄭縣有半夏小麥有秀芒大麥有黑穬麥廣志天竺以十一月六日為冬至則麥秀十二月十六日為臘則麥熟西域諸國志啖麥多力啖麥令人多力博物志削木近世有田夫至巧削木為麥入市糶之糶者無疑歸磨乃覺非麥上為蛺蝶麥之為蛺蝶由于濕也爾則萬物之變皆有也農夫止麥之化者區之以灰聖人理萬物之化者濟之以道搜神記含神麥神名含神姓習春秋佐助期靈星秋昏虛星中可以種麥尚書大傳黍麥黑墳宜黍麥孝經援神契獨孤及上疏陳政曰民不敢訴于有司有司不敢聞陛下茹毒飲痛窮而無告今其心顒顒獨恃於麥麥不登則易子交骨矣大陰干時雨雪而霜故大傷首種首種故宿麥以秋種故謂之首種入收也春為寒所傷故至夏麥不成長也臣恐霜雪損稼夏麥不登無所收入也王方慶疏太子瑛元宗種麥苑中瑛諸王侍同帝曰是將事宗廟故親之亦欲若等知稼穡之艱因分賜侍臣曰春秋無麥禾古所甚重比詔便者閲田畝所對不以實故朕自蒔以觀其成元和八年大軫國貢碧麥形大於中華之麥粒表裏皆碧香氣如粳米食之體輕久可以禦風唐杜陽編同昌公主出降賜金麥銀米共數斛此皆條枝國獻教種韋丹為容州刺史教種茶麥吐蕃其稼有小麥青麥蕎麥白麥五代回鶻地宜白麥青麥五代梁果州節度使友諒進瑞麥一莖三穗太祖怒曰宋州大水何用此為九穗太康十五年嘉麥生扶風郿一莖四穟收實三倍晉起居注永嘉元年嘉麥一莖九穗生姑臧前涼録麥實有孚甲屬木黍秀舒散屬火麻實有文理屬金菽實孚甲堅合屬水稷五榖之長屬土鄭注月令嘉蔬祭宗廟之禮稻曰嘉蔬曲禮陰精稻之為言藉也稻冬含水盛其德也故稻太陰精含水漸洳乃能化也江旁多稻固其宜也春秋説題辭稻稌也䆏紫莖不黏者也稴稻不黏者也耗稻屬也説文注伊尹曰飯之美者玄山之禾南海之耗呂氏今本作秬注黑黍也雨稻夏禹時天雨稻古詩云安得天雨稻飼我天下民述異記越敗吳王孫雄請和范蠡不聽雄曰子范子先人有言無助天為虐助天為虐者不祥今吾稻蟹不遺種子將助天為虐不忌其不祥乎國語越王勾踐復興師伐吳王吳敗畫馳夜走三日三夕腹餒口飢顧得生稻而食之顧左右曰此何名也對曰是生稻也吳王曰是公孫聖所言不得火食走慞偟也吳越春秋史起為鄴令以漳水灌鄴田鄴民大怨欲藉史起史起不敢出而避之王乃使他人遂為之水已行民大得其利相與歌之曰鄴有聖令時為史公決漳水灌鄴旁終古斥鹵生之稻粱使民知可與不可則無所用矣呂覽東周欲為稻西周不下水東周患之蘇子往西周之君曰君之謀過矣今不下水所以富東周也今其民皆種麥無他種矣君若欲害之不若一為下水以病其所種下水東周必復種稻種稻不復奪之若是則東周之民可令一仰西周而受命於君矣戰國策劉敞拜廬江都尉歲餘遭旱行縣人持稻皆枯吏強責租敞應曰太守事也載枯稻至太守所酒數行以語太守太守曰無有敞以枯稻示之太守曰都尉事也敞怒叱太守曰鼠何敢爾也東觀漢記興鴻隙陂鄧晨為汝南太守興鴻隙陂數千頃田後漢書草化稻孫亮五鳳元年交址稗草化為稻江表傳鍾離牧字子升會稽山陰人少居永興自墾田稻二十餘畝臨熟而縣民認之牧曰本自田荒故墾之耳遂以稻與縣民縣長召繫獄欲繩以法牧請之長曰君自義士僕為民主當以法率下牧曰此是郡界緣君意顧來暫住今以少稻殺此民何必復留吳志野稻自生黃龍三年由卷縣野稻自生改為禾興縣上杜預修邵信臣遺迹激用爾淯諸水以浸稻田萬餘頃分疆刊石使有定分公私同衆庶賴之號曰杜父舊水道晉書惠帝征成都王狼狽左腳三指折匍匐入稻苗中賴侍郎稽紹以身捍之上郭翻字長翔武昌隱士也不交世事唯以漁釣射獵為娛貧無業欲墾荒田先立表題經年無主然後乃作稻將熟有認之者悉與之縣令聞而告之以稻還翻翻遂不受上袁甫嘗詣何勗自言能為劇縣勗曰惟欲宰縣不為台閣職何也甫曰人各有能有不能譬繒中之好莫過錦錦不可以為稻榖中之美莫過稻稻不可以為糜是以聖王使人必先以器茍非周材何能悉長黃霸馳名於州郡而息譽於京邑廷尉之材不為三公自昔然也勗善之除松滋令上顧歡好學年六七歲家貧父使田中驅雀歡作黃雀賦而歸雀食稻過半父怒欲撻之見賦乃止宋書范雲嘗從文惠太子幸東田觀穫稻文惠顧謂雲曰割此甚快雲曰三時之務亦甚勤勞願陛下知稼穡之艱難無徇一朝之宴逸也文惠改容謝之齊書小兒偷稻孔琇之有吏能仕齊為吳令有小兒年十歲偷割鄰家稻一束琇之付獄案罪或諫之琇之曰十歲便為盜長大何所不為縣中皆震肅南史鄧元起嘗至其西沮田舍有沙門造之乞元起有稻幾二千斛悉以施之時人稱其有大度梁書陳伯之濟關睢陵人也年十三四好著獺衣冠帶刺刀候鄰里稻熟輒偷割之嘗為田主所見呵之曰楚子莫動伯之曰君稻幸多取一擔何苦田主將執之因拔刀而進曰楚子定何如田主皆反走徐擔稻而歸上齊孝昭王建中平州刺史稽廷建議開幽州督元舊陂長城左右營屯歲收稻粟數十萬石北境以得周贍隋書穭生再熟開元十九年揚州奏穭生稻二百一十五頃再熟稻一千八百頃其粒與常稻無異唐書芒履立田孟元陽為曲環軍中大將環使董作西華屯元陽盛夏芒履立稻田中須役者退而後就舍故其田歲無不稔軍中足食上郭元振為涼州都督遣甘州刺史李漢通闢屯田盡水陸之利稻收豐衍滄州乾符本魯城乾符元年生野稻水榖十餘頃燕魏飢民就食之唐地理志都會間有運大筆如椽或於稻粒上寫七言詩一絶歷歷可愛北夢瑣言晉簡文見田中稻苗不識問人是何草左右答曰是稻簡文歸三日不出云寧有得其末不失其本世説陶侃見人持一把未熟稻問何用曰行道所見輒取之侃怒其戲賊人稻鞭之盧城北狄傳渤海俗所居者曰盧城之稻巨粒西域摩揭陀有異稻巨粒號供大人米歲四熟天竺稻歲四熟龍睛稻唐謝元卿遇神仙設龍睛稻續仙傳九真太守任延始教耕犁俗化交土風俗象林知耕以來六百餘年火耨耕藝法與華同名白田種白榖七月大作十月登熟名赤田種赤榖十二月作四月登熟所謂雨熟之稻也水經三十六郭義恭廣志曰有虎掌稻紫芒稻赤穬南方有蟬鳴稻七月熟稻有蓋下白正月種五月穫訖其莖根復生九月復熟青芋稻六月熟纍子稻白漢稻七月熟此三稻大且粗長三枚長一寸益州稻之長者米長半寸熟香再種交趾夏稻熟農者一歲再種異物志十月穫稻人君嘗其先熟故在季秋九月熟者謂之半夏稻蔡雍月令章句海陵縣扶接海多麋獸千千為群掘食草根其處成泥名麋畯民人隨此略種稻不耕而穰其收百倍博物志九熟南海晉安九熟之稻抱朴子夏香有盜刈其稻者香助為收之盜者慚送以還香香不受會稽典録粳米斷瘧西方佛沙伏國有昔尸毗王倉庫為火所燒其粳米燋然於今猶在若服一粒永無瘧疾彼國人民須以為藥洛陽伽藍記粳稻屬也稻亦粳之惣名也道家方藥有用稻米粳末此則是兩物也稻米粒白如霜味苦主溫服之令人多瘦無肥膚粳米味甘主利臟長肌膚好顏色養生要集五里聞香江表唯長沙名有好米何時比新城粳稻也上風炊之五里聞香魏文帝與朝臣書安同遼東胡人也太宗時同與長孫嵩並理人訟世祖即位除青冀二州刺史同長子居典太倉事盜官粳米數石以養同大怒奏求戮居自劾不能訓子請罪太宗嘉而恕遂詔長給同粳米後魏書徐孝克所生母惠欲粳米為粥不能常辦母後亡孝克遂常啖麥有遺粳米者孝克對而悲泣終身不復食焉陳米宣帝地節元年樂浪之東有背明之國來貢其方物言其鄉在扶桑之東見日出於西方其國昏昏常暗宜種百榖名曰融澤方三千里五榖皆良食之後天而死有浹日之稻種之十旬而有壽有明清稻食者延年有清腸稻食一粒歷年不飢有和靈稻言寒者食之則溫熱者食之則體冷莖多白拾遺記稻孫稻已割而復抽曰稻孫湍瀨今稻生於水而不能生於湍瀨之流淮南得時之稻大本而莖葉格秱疏穖穗如馬尾大粒無芒摶米而薄粳舂之易而食之香如此者不益先時者大本而莖葉格對短秱短穗多粃厚粳薄米多芒後時者纖莖而不滋厚粳多粃是以米不得恃定熟印天而死呂覽九月薦稻舊稑稻熟常用九月九日薦稻徐鴨祭記雜俎酆都稻名重思其米如石榴子粒稍大味如菱亦以上獻仙官杜瓊作重思賦曰霏霏春暮翠矣重思靈氣交被嘉穀應時大中祥符五年遣使福建取占城禾分給江淮兩浙漕并出種法令澤民田之高者分給種之國朝會要今江浙間有稻粒稍細耐水旱而成實早作飯差硬土人謂之占城稻云始自占城國有此種真宗聞其耐旱遣以珍寶求其種始植於後苑後在處播之爾雅翼薌合祭宗廟之禮黍曰薌合曲禮秬黑黍也一稃二米所以鬯也黍禾屬黏者也以大暑而種故謂之黍孔子曰黍可以為酒苑文黍者暑也種必除暑先夏至三十日此時有雨強土可種黍畝三升黍心未生雨灌其心心傷無實凡種黍皆如禾欲疏於禾汜勝之書黍神黍神名侜佞姓蘭郝春秋佐助期精移黍轉生黍夏出秋改黍者縮也故其立字木入米為黍酒以扶老春秋説題辭獻秬黃帝時南夷乘白鹿獻鬯宋符瑞志今本作秬鬯膏黍廣都之野后稷葬焉爰有膏黍膏稷山海經鄗黍管仲説桓公曰古者封禪鄗上之黍所以為盛史記閔宗周也彼黍離離彼稷之苗行邁靡靡中心搖搖詩經公子過鄭鄭文公亦不禮焉叔詹曰若不禮焉則請殺之諺曰黍稷無成不能為榮黍不為黍不能蕃廡稷不為稷不能蕃殖所生不疑唯德之基公弗聽國語秦伯賦采叔子餘使公子賦黍苗子餘曰重耳之卬君也若黍苗之卬陰雨也若君實庇蔭膏澤之使能成嘉榖薦在宗廟君之力也上孔子侍坐於哀公賜之桃與黍焉哀公曰請食孔子先食黍而後食桃左右皆掩口而笑公曰黍者所以雪桃非為食之也孔子對曰丘知之矣蓋以黍者五榖之長郊社宗廟以為上盛果屬有六而桃為下祭祀不用不登郊廟丘聞之君子以賤雪貴不聞以貴雪賤今以五榖之長雪果之下者是從上雪下臣以為妨於教害於義故不敢公曰善哉家語韓昭侯之時黍種常貴甚昭侯令人覆廩廩吏果竊黍種糶之韓子吳起為魏武侯西河之守秦有小亭臨境吳起欲攻之不去則甚害田者去之則不足以徵甲兵於是乃倚一車轅於北門之外而令之曰有能徙此南門之外者賜之上田上宅人莫之徙也及有使之者還賜之如令俄又置一石赤黍今本作菽東門之外而令之曰有此徙此於西門之外者賜之如初人爭徙之乃下令大夫曰明日且攻亭有能先登者仕之國大夫賜之上田宅人爭趨之於是攻亭一朝而拔之韓非子天雨黍惠成王八年雨黍紀年書承宮遭天下喪亂遂將諸生避地漢中後與妻子之蒙陰山肆力耕種其黍將熟人有認之者宮不與計推之而去由是顯名後漢書十月朝黃祖在艨衝舟上會設黍臛禰衡年少在坐黍臛至先自飽食舉摶以弄戲其輕慢如此別傳劉聰時河東大蝗唯不食黍豆靳準率部人收而埋之哭聲聞於十餘里後乃鑽土飛出復食黍豆平陽飢甚晉書苻堅宴群臣於釣臺祕書侍郎趙整以堅頗好酒因為酒德之歌曰穫黍西秦採麥東齊春封夏發鼻心迷崔鴻十六國春秋前秦録盜刈默避李士謙隱居有牛犯其田者士謙牽至涼處飼之過於本主望見盜刈其牛黍者默避之其家僮熱盜栗者士謙慰諭之曰窮困所致義無相責遽令放之隋書古人所尚李氏宗黨豪盛每至春秋二社必高會極歡無不沉醉喧亂嘗集李士謙所盛饌盈而先為設黍謂群從曰孔子稱黍為五榖之長荀卿亦云食先黍稷古人所尚容可違乎少長肅然不敢弛隋退而相謂曰既見君子方覺吾徒之不德也士謙聞而自責曰何乃為人所踈頓至於此上司農獻黍德宗以中和節令文武百辟進農書獻種稑及是百僚始進兆人本業三卷司農獻粟黍一斗唐書得時之黍芒莖而徼下穗芒以長摶米而薄粳舂之易而食之不一而香如此者不餲先時者大本而華莖殺而不遂葉藁短穗後時者小莖而麻長短穗而厚粳小米令而不香呂覽今以百金與摶黍以示兒子兒子必取摶黍也以和氏之璧與百金以示鄙人鄙人必取百金矣上渭水渭水多力而宜黍淮南飯美飯之美者南海之秬呂覽上時四月可種黍謂之上時崔實四民月令宣帝元康四年長安雨黑黍粟如禾和帝元宣元年黑黍穗一禾二實或三四實生任城得粟二斛一斗以薦宗廟崔豹古今注天雨黍粟大人出走京房易妖占種黍多蛇地節三年種蜀黍其後七年多蛇博物志黍有燕頷之名又有驢皮黍又曰牛黍南尾秀成赤黍馬革大黑黍或云秬黍有溫屯黃黍廣志黍臛十月一日黍臛俗謂之秦之歲首未詳黍臛之義今此人此日設麻羹豆飯當為其始熱嘗新耳荊楚歲時記神名黍神名侜佞蘭郝春秋佐助期三代積德而王齊桓繼絶而霸故樹黍者無不穫稷樹恩者無不報德淮南火中夏昏火中可以種黍尚書大傳栵粢黍也黍穰謂之䅀廣雅東平衡農師太尉薨農欲奔赴無糧自致妻願從行行止紡績庶以自資行至聚亭遇天雨留獨母舍母舍後有空園農曰此園可以種黍從求分種之獨母曰此久廢園唯恐生劣不多耳何分之有乎農遂與妻斬荊棘種之黍將熟獨母乃更曰黍當分農欲委去妻曰不如收斂以遺之安其意然後乃去農遂從之後還獨母以昔黍歸農遂不肯取列女後傳稻之黏稻之黏者為黍亦謂稌為黍古今注禾之黏禾之黏者為黍亦謂之穄亦曰黃黍上天子西征至於赤鳥獻酒千斛穄麥百載穄似黍而不黏天子賜墨乘黃金貝帶乃膜拜而拜穆天子傳釀酒王績種黍春秋釀酒孔大帖稷者五榖之長以其中央之榖月令中央土食稷與牛五行土為尊故五榖稷為長雅翼曲禮曰凡祭宗廟稷曰明粢稷又名齋或為粢故祭祀之號稷曰明粢而言粢盛者本之故諸榖因皆有粢名小宗伯所謂辨六齍之名物與其用是也西南黑水之間有都廣之野后稷葬焉爰有膏菽膏稻膏黍膏稷百榖自生山海經稷又名為穄呂氏春秋曰飯之美者有陽山之穄高誘曰關西謂之糜冀州謂之䵖説文糜穄也廣記曰䵖穄也苗穗似蘆而米可食月令章句稷秋種夏熟歷四時備陰陽榖之貴者通志蕃殖黍不為黍不能蕃蕪稷不為稷不能蕃殖國語四月熟破臧稷逼麥稷此二者以四月熟廣志益志稷米甘而無毒益志氣補不足本草太官稷為太官鄭氏婚禮謁文贊地珍貞定好稷地産不為無珍也盧育冀州論稷古者祭祀以為榖神又農官之名亦曰后稷左傳稷田正也烈山氏之子曰桂為稷自夏以上祀之周棄亦為稷自商以來祀之自漢以來禹配社稷配稷粢稷也爾雅今江東呼粟為粢也郭璞注説文粟嘉榖實也孔子曰粟之為言續也粟為陸種之首粟助陽扶性粟之為言續也粟五變一變而以陽生為苗二變而秀為禾三變而祭然謂之粟四變入臼米出甲五變而蒸飯可食陽以一立為法故粟積大一分穗長一尺文以七烈精以五六立故其字粟為粟西者金所立米者陽精故西字合米而為粟説題辭天雨粟蒼帝起天雨粟也河圖説微神農之時天雨粟神農耕而種之作陶冶斤斧破木為耜鉏耨以墾草莽然後五榖興以助果蓏之實周書昔者蒼頡作書而天雨粟黃帝治天下力牧太山稽輔之狗期吐菽粟於道路而無分爭之心淮南子神農之教雖有石城湯池帶甲百萬而無粟者弗能守也夫穀帛實天下之命衛尉前上蠶法今上農事人所忽略衛尉勤之可謂忠國憂民之至汜勝之書伊尹説湯以至味飯之美者玄山之禾不周之粟陽山之穄南海之秬呂氏春秋發秬橋粟武王入殷發秬橋之粟以與殷民六韜冬晉薦飢乞糴於秦秦伯輸粟於晉自雍及絳相繼命之曰泛舟之役左傳歸粟諸侯無粟諸侯相歸粟正也榖梁載孫㬻告糴記秋齊侯宋公江人黃人會於陽榖桓公曰無障榖無貯粟公羊傳鄭子皮即位於是鄭飢而未及麥民病子皮以子展之命餼國人粟戶一鍾襄公桓公觀於野曰何物可比君子之德隰朋曰粟可比君子之德管仲曰苗始出生也眴眴乎似孺子安之則安不得則危命之曰禾可比君子桓公曰善管子夏會于黃父謀王室也趙簡子令諸侯之大夫輸玉粟昭六齊有北郭騷者結果氓梱蒲葦織屨履養其母猶不足踵門見晏子曰願乞所以養母晏子之僕謂晏子曰此齊國之賢者也今乞所以養母是説夫子之義也必與之晏子使人分倉粟分府金而遺之辭金而受粟有間晏子見疑於齊君出奔北郭子召其友而告之曰説晏子之義而當乞所以養母焉吾聞之曰養及親者身伉其難今晏子見疑吾將以身死白之著衣冠令其友操劒奉笥而從造於君庭求復者曰晏子天下之賢者也去則齊國必侵矣必見國之侵也不若先死請以頭託白晏子也因謂其友曰盛吾頭於笥中奉以託退自刎也其友因奉以託其友謂觀者曰北郭子為國故死吾將為北郭子死也又退而自刎齊君聞之大駭乘馹而自追晏子及之國郊晏子不得已而反呂氏春秋高府闔閭代楚五戰入郢燒高府之粟淮南子伍子胥諫吳王曰非吾吳越越必喪吳今將輸之粟是長吾讎而豢吾讎也上季桓子以粟十鍾餼夫子天子受而班門人之無者子貢曰季孫以夫子貧故致粟今而施人無乃乖彼意乎子曰吾受而不辭為季孫之惠受不為富惠於一人豈若數百人哉孔叢子曾子魯君饋之粟辭不受使者曰子無求於人人自致之曰與人者驕人受人者畏人縱子不以是驕我我能無畏乎與其富而畏人不若貧而無屈曾子鄒穆公有令食鳧鴈者必以秕無敢以粟於是倉無秕求而易於民二石粟得一石秕於民請曰秕食鳧鴈為無費也今求秕於二石粟而易一石秕食鴈則費甚矣請以粟食之穆公曰去非爾知也夫百姓餉牛而耕暴背而藝勤而不敢惰者豈為鳥獸食哉粟米貢上食也奈何以其食養鳥且爾知小許而不知大害賈子田釐子乞事齊景公為大夫其收賦稅於民以小斗受之其粟豫民以大斗行陰德於民而景公弗禁晏嬰卒後范中行氏反晉晉攻之急范中行請粟於齊田乞欲為亂樹黨於諸侯乃説景公曰范中行數有德於齊齊不可不救齊使田乞救之而輸之粟田乞卒子常代立是為田成子復修釐子之政以大斗出貸以小斗收齊人歌之曰嫗乎采芑歸乎田成子史記子思居貧其友饋之粟者受二車焉或獻尊酒束修子思曰為費而無當也或曰子取人粟而辭酒是辭少而受多也於義則無名於分則不全行之何也子思曰然伋不幸而貧於財及至困乏將絶先人之祀夫所以受粟為周乏也酒脯則所以飲謙也方乏於食而乃飲謙非義也吾豈以為介哉度義而行之孔叢子高平主遣使者從魏文侯貸粟文侯曰須吾租收邑粟至乃得也使者曰臣初來時見瀆中有魚張口謂臣曰無窮水魚命在呼吸可得灌乎臣謂之曰待吾南見河堤之君決江淮之水灌汝口魚曰謂命在須臾乃須決江淮之水比至君還必求吾於枮魚之肆今高平貧窮故遣詣君貸粟乃須租收大王必求臣於死人之墓説苑莊周貧貸粟於監河侯侯曰待我得邑金將貸子周作色曰周昨來有呼周者視輒中有一鮒魚曰我東海之波臣也君豈有斗升水活我哉周曰諾我且南遊吳越激西江之水迎子可乎鮒魚曰不如早索我於枯魚之肆也莊子墨子語禽滑釐曰今凶年與子隋侯珠又與子一鍾粟子將何擇釐曰粟可耳説苑衛嗣君欲重稅以聚粟民弗安以告薄疑曰民甚愚矣夫聚粟也將以為民也其自藏之與在於上奚擇薄疑曰不然其在于民而君弗知其不如在上也其在於上而民弗知其不如在民也凡聽必反諸已審則令無不聽矣呂氏春秋仰天雨粟燕太子丹仰天歎天為雨粟風俗通苗其蒻也欲孤長也欲相與居其熟也欲相扶是故三以為族乃多粟呂氏春秋雨粟呂后三年秦中天雨粟述異記武帝建元四年天雨粟宣帝地節三年長安雨黑粟元帝竟寧元年南陽山郡縣雨粟赤青黑味若大者如豆小者如麻子赤黃味如麥建初元年九江壽春雨粟光武建武二十年清河廣州雨粟大如莧實色黑古今注天雨粟無德者興有德者不祿小人進大臣辱春秋潛潭巴曰天雨粟不肖者食祿與三公易位天與稻黍者亡天雨稻大臣當誅京房易占宣曲任氏之先為督道倉吏秦之敗也豪傑皆爭取金玉而任氏獨窖倉粟楚漢相距滎陽也民不得耕種米石至萬而豪傑金玉盡歸任氏任氏以此起富史貨殖秦將王離涉河圍巨鹿章邯軍其南築甬道而輸之粟漢書酈食其説齊王曰漢英豪賢才皆樂為之用諸侯之兵四面而至蜀漢之粟方船而下上飛芻挽粟主父偃諫伐胸奴曰秦皇使天下飛芻挽粟起於東陲琅耶負海之郡轉輸北河率三十鍾而致一石漢書漢興七年之間國家無事非遇水旱之災太倉之粟陳陳相因充溢露積於外至腐敗不可食也史記文帝徙淮南王道死民歌曰一斗粟尚可舂一尺帛尚可縫兄弟二人不能相容上時民歌之曰一尺繒好童童一升粟飽蓬蓬兄弟二人不能相容淮南注河內失火上使黯往視之還報曰河內人或父子相食臣謹發河南倉粟以賑貧乏上賢而釋之汲黯傳曰公孫宏起家徙步為丞相故人高賀從之食以脫粟未飯復以布被賀怒曰何用故人富貴為脫粟布被我自有之乃退漢書賈捐之上書曰武帝元狩六年太倉之粟紅腐不可食上大將軍衛青遂至實録山趙信城得胸奴積粟食軍軍留一月而還悉燒其城餘粟以歸汲黯傳曰東方朔曰侏儒長三尺俸一囊粟錢二百四十臣長九尺餘亦俸一囊粟錢二百四拾侏儒飽欲死臣朔飢欲死漢書宣帝地節元年樂浪子東有背明之國人至貢方物言其鄉土在扶桑之東見日出於西方其國昏昏恆門宜五榖名曰融澤方三千里五榖皆良食者延年清腹一粒歷年不飢有搖枝粟言其枝長而弱無風常搖食之益髓其鳳冠粟似鳳之冠食者令人多力有龍枝之粟言其枝屈曲似遊龍食之善走有瓊脂粟言質白如玉柔滑如膏食之盡壽不病有雲渠粟藂生葉似扶蕖食之益顏色粟莖赤多黃皆長二丈千株藂生年拾遺記不周粟員嶠山一名環丘上有方湖周回千里多大鵲高一丈銜不周之粟粟穗高三丈粒皎如玉鵲銜粟飛於中國故世俗間往往有之其粟食之歷月不飢故呂氏春秋云粟之美者有不周之粟焉丹陽方儲字聖明曉風角占候為章句長民田還置餘粟二石及刀鋤於田陌上明日求亡去疑其鄰家儲曰此人非偷自呼縣功曹語曰若何取粟置家後積茭中功曹款服謝承後漢書腐粟不貸王符潛夫論曰富貴皆背親捐舊喪其本心杇實千萬而不忍賜人一錢積粟腐倉不忍貸人一升光武興洛陽斗粟萬錢人死者相枕漢末大飢江淮間童謠曰大兵如市人死如林持金易粟粟貴如金洛中謠云雖有千金黃不如我斗粟斗粟自可飽千金何所直袁紹在冀州時滿市黃金而無一斗之粟餓死者相食人為之語虎豹之口不如飢人劉備在荊州粟與金同價永嘉之亂洛中飢荒懷帝遣人觀市珠玉金銀填委市門而無粟麥袁宏上表云田畝由是丘墟都市化為珠玉矣任昉述異記晉末荊州久雨粟化為蟲蟲害民春秋云榖之飛為蟲是也中郎王義興表曰臣聞堯生神禾而晉有蟲粟陛下自以聖德何如也帝有慚色上宋高宗之初當晉末飢饉之後既即位而江表二千餘里野粟生焉又淮南諸山石殼生石上生殼也袁安云石殼藥名穗之尤小者是也述異記任城王雲為冀州刺史雲留心政事甚不得情於是合城長吏請輸絹五尺粟五升以報雲恩高祖甚嘉之後魏書世祖引高允與論刑政言甚稱旨因問允曰萬機之務何者為先是時多禁封良田又京師遊食者衆允因言曰地方一里則為田三頃若勤之則畝益三升不勤則畝損三升方百里損益數率為粟二百二十二萬斛况以天下之廣乎若公私有儲雖遇飢年復何哉世祖善之遂除田禁上韋朏字尊顯少有志業年十八辟州主簿時屬歲儉朏以家粟造粥以飼飢人所活甚衆上王羆為華州刺史時關中大飢徵稅民間榖於以供軍費或隱匿者令遞相告多被篣捶以是人有逃散唯羆信著於人莫有隱者得粟不少後周書馬周疏正觀初率土霜儉一匹絹才得帖斗粟而百姓怡然者知陛下憂憐之故人人自安曾無謗讟自五六年來頻歲豐稔一匹絹得粟十餘石而百姓皆以為陛下不憂憐之咸有怨言委粟太倉始平人宗士眺粟一石委粟於太倉而去云願少益軍國高祖嘉之賚物百假唐書郭元振為涼州都督涼州粟斛售數千至是歲數登至匹縑易粟十斛賈相在滑州境內大旱秋稼盡損賈召大將二人謂曰今歲荒旱煩若救三軍百姓也曰君可辱為健步翌日當有兩騎衣縿緋所乘馬蕃步鬣長經市出城君等蹤之識其所滅處則吾事諧矣二將乃褁糧米早行尋之一如賈言自市至野行二百里大塜而滅遂壘石摽表志焉經信而返賈大喜令數百人具畚鍤與二將偕往其所因發塜獲陳粟數十斛人竟不之測酉陽雜俎歲收十萬竇靜表請屯田太原帝從之歲收粟十萬斛蕭復改同州刺史歲歉州有京畿觀察使儲粟復輒發以貸人有司劾治詔削階停刺史或弔之復曰茍利於人胡責之辭賤佑濟民蕭倣出太倉粟賤佑以濟民裴休進中書侍郎居三年粟至渭倉者百二十萬斛丐粟養母劉三復母病廢丐粟以養李峴出為零陵太守時京師米翔貴百姓乃相與謠曰欲粟賤追李峴飛龍粟宣中紀太宗元年二月癸未停飛龍粟以沙參粒為將者刻薄自入賦粟以沙參粒唐史突厥序高祖明而難犯事多親決嘗有店婦與軍士懇訴無以自明帝為鞠吏曰雖屬官吾可市而伐之兩訟未分何以為斷可殺馬刳腸而視其粟有軍士誅無則婦人死遂殺馬馬傷無粟因戮其婦境內蕭然莫敢以欺晉史王周性寡怨不忤物情初刺信都州城西橋敗覆民租車周曰橋梁不飭余之過也乃還其粟沉粟出私財重修之漢實録仁義禮善之於人也譬之若貸則粟米之於家也多有之者富少有之者貧至無有者窮荀卿子欲知歲宜以布囊盛粟等糧埋於陰地冬至後取糧多者多種之汜勝之書董仲舒三年不窺園嘗乘馬不覺牝牡朱買臣貧賤之時孳孳修藝不知雨之流粟志在經傳也鄒子豆有大小二種菽大豆答小豆也叢生其角謂之莢其葉謂之藿其莖謂之萁然又有藤生者種亦不一皆係五榖之數食之能飽人美種也廣雅曰豍豆豌豆留豆也胡豆豇雙也巴菽巴豆也廣志曰重小豆一歲三熟槧甘白豆粗大可食刺豆亦可食秬豆苗似小豆紫華可為麵生朱提建寧胡豆有青有黃者公子過鄭鄭文公亦不禮焉叔詹曰若不禮焉則請殺之諺曰黍稷無成不能為榮黍不為黍不能蕃廡稷不為稷不能蕃殖所生不疑唯德之基公弗聽遂如楚晉語戎菽爾雅曰戎菽謂之荏菽郭璞曰孫叔然以為大豆按春秋齊侯獻戎捷榖傳曰戎菽也管子亦云北伐山戎出冬蔥及戎菽布之天下今之胡豆是也周子有兄而無慧不能辨菽麥故不可立菽大豆也豆麥殊形易別故以為癡者之候不慧蓋世所謂白癡成十八齊景公常賞賜及後宮文繡被臺榭菽粟食鳧鴈出而見殣謂晏子曰此何為死晏子對曰此餒而死公曰嘻寡人之無德也何甚矣晏子對曰君之德著而彰何為無德也景公曰何謂也對曰君之德及後宮與臺榭君之玩物衣以文繡君之鳧鴈食以菽粟君之營內自樂延及後宮之族何為其無德也顧臣願有請於君由君之意自樂之心推而與百姓同之則何殣之有君不推此而茍營內自私使財貨偏有所聚菽粟幣帛腐於囷府惠不遍加於百姓公心不周乎國則桀紂之所以亡也夫士民之所以叛由偏之也君如察臣嬰之言推君之盛德公布之於天下則湯武可為也一殣何足恤哉説苑張儀説韓王曰韓地險惡山居五榖所生非菽而麥民之食大抵飯菽藿羹一歲不收民不厭糟粳史記得時之菽長莖而短足其美二七以為族多枝數節競葉蕃實大菽則圓小菽則摶以芳稱之重食之息以香如此者不蟲先時者必長以蔓浮葉疏節小英不實後時者短莖疏節本虛不實宣帝地節元年樂浪之東有背明之國來貢其方物言其國宜種百榖名曰融澤有繞明豆其莖弱自相縈纏有挾劍豆其莢形似人挾劍橫斜而生有傾離豆見日即傾葉食者歷歲不飢豆莖皆大若指而緑一莖爛漫數畝拾遺記楊惲報孫會宗詩曰田彼南山蕪穢不治種一頃豆落而為萁人生行樂耳須富貴何時漢書宣帝元康四年南昌雨豆光武建武三年春縑一匹易一斗豆夏野生旅豆民收取之明帝永平十八年下邳雨大豆似槐實古今注丞相薛宣曰陛下八月酎祠嘉美上升皇天報應茂陵寢廟上食曰玄鳥來至集吐所含大豆紫黑色食物之象也漢名臣奏赤眉平後百姓飢餓人相食黃金一斤易豆五升東觀漢記鄧禹攻赤眉陽敗棄輜重走車皆載土以豆覆其上兵士飢爭取之上求豆贖兄倪萌字子明齊國臨淄人兄為赤眉賊所得賊欲殺啖之萌詣賊叩頭言兄年老羸瘠不肥健願代兄賊義之不啖命歸求豆來贖兄萌歸不能得豆復自縳詣賊賊遂放之上獻豆粥世祖自薊東南至饒陽蕪蔞亭馮異獻豆粥後漢光武二年寇恂為穎川郡大生旅豆收得一萬餘斛以應給諸營東觀漢記閔仲叔太原人也與周黨相友黨每遇仲叔共唅菽飲水無菜茄上三升謝恩劉平嘗為餓賊所得平叩頭曰老母飢少氣待平為命願得還飯母馳來就死賊即遣去母已食平曰向與賊期義不可欺乃復往賊驚怪其信義曰不忍食汝平既免脫乃托莢得三升以謝恩上小黃恆牧為都尉功曹與郎君共歸鄉里為赤眉所得欲殺啖之牧求先死賊義釋之送與萱豆一斛陳留耆舊傳王郎起光武自薊東南馳晨夜草舍至饒陽蕪蔞亭時天寒烈衆皆飢疲馮異上豆粥明旦帝謂諸將曰昨得公孫豆粥飢寒俱解後帝即位使中黃門賜以珍寶詔曰倉卒蕪蔞亭豆粥滹河麥飯厚意久不報本紀朱倉字卿雲之蜀從處士張寧受春秋糴小豆十斛屑之為糧閉戶精誦寧矜之斂得米二十石倉不受一粒益部耆舊傳斛二十萬獻帝在長安榖貴豆一斛二十餘萬後漢書志士鄧子然告困焉得愛釜庾之間以傷烈士之心與豆三斛後乏復言孔融教高密令頗別菽麥彭義與諸葛亮書云先民有言左手據天下右手刎咽喉愚夫不為况僕頗別菽麥蜀志華他還家太祖纍書呼他恃能饜事猶不上道託妻疾太祖大怒使往視若妻信疾賜小豆四十斛魏志左元放度荒年法擇大豆粗細調均種之必生者熟挼令有光使暖氣徹豆必先一日不食以冷水傾服二升服訖其魚肉菜果酒醬鹹酢甘苦之物一不得後經口渴則飲水慎不可暖飲初少困極數十日後體力更壯健不復思食大較法服三升為劑亦當隨人先食多少增損之歲豐欲還食者煮葵子及脂蘇肥肉羹漸漸飲之須豆下乃可食豆未下盡而食實物腸塞則殺人此未試於理或可耳博物志刊本無大較下孫權北征使陸遜與諸葛瑾攻襄陽陸遜遣親人韓扁𠌾表報遇敵於江中羅得扁瑾聞之甚懼書與遜云大駕以旋賊得韓扁具知吾闊狹且當急去遜未答方催人種豆與諸變禖射戲如常吳志趙達善算使人取小豆數升播之席上立處其數驗復果信計飛蝗射隱伏無不中上時王浚稱制邊陲潛使人問霍原原不答浚既銜之又有遼東內徙三十餘人依山為賊意欲劫原為主亦未能行時有謠曰天子在何許近在豆田中浚以為豆者霍也浚逐害原懸其首諸生悲哭其中王隱晉書廢帝子業景和初人種紫花草及豆皆化為白花俄而帝見廢之應宋書厙狄伏連之家口百數盛夏之日料以倉米一升不給鹽菜常有飢色冬至之日親表稱賀其妻為設豆餅伏連問此豆因何而得妻對向于食馬豆中分臧克用伏連大怒典馬掌食之人並加杖罰北齊書魏長史自江右載豆來宣城忽有梓木並舟而行夜夢神告曰吾錢塘梓府君也欲托祠于昭亭山既而舟至其處魏度山麓宜為神居然無以得材復夢神曰宣人方病目舟中豆可療試之無不驗者得錢既多祠遂成宣州志䝁豆夏侯端東走擷䝁豆以食豆入牛口竇建德竄牛口谷初其軍有謠曰豆入牛口勢不得久至是果敗盧懷慎清貞素不營産業常器宋璟及盧從願見之甚喜留連永日命設食有蒸豆兩毆葉數俎而已此外翛然無辦明皇雜録豆菽未種裴諝為河東道祖庸使時歲大旱諝請入計代宗召見問榷酤之利一歲幾何諝久而不對帝復問之對曰臣有所思帝曰何思對曰臣自河東來其三百里農夫愁歡榖菽未種誠為陛下憂之而乃責臣以利故臣未敢即對唐書貞元中李元諒為隴右節度使開郡下荒田數十里勸軍士樹藝歲收菽粟數十萬斛上靈光豆大曆中日林國獻靈光豆大小類中國之菉豆其色紅而光芒長數尺本國人亦呼為詰多珠和石上菖蒲葉煮之即大如鵝卵其中純紫稱之可重一斤已土啖之一丸香美無比而數日不復言飢渴杜陽編黃巢未入京師時都人以黃米及黑豆屑蒸食之謂之黃賊打黑賊五行志天雨豆天雨豆之類皆非中國耳目所及五代司天考京兆府先奏蟲食豌豆全然不收且豌豆為物其用甚微舊例所支唯充畜料準數回給大豆諸司誰曰不然計價利剩徵義將安在陸相奏議國豆石虎諱胡胡物皆改名胡豆曰國豆鄴中記豆神豆神名靈殖姓樂春秋佐助期令人腫豆令人腫榆令人瞑稽康養生論夏至二十日可種豆帶甲而生不用深耕豆花憎見日則黃爛而根焦矣知歲所宜以囊盛種等量埋陰地冬至後五十日以發取糧之最多者種焉汜勝之書常以正月旦亦用月半以麻子七粒赤豆五六枚著井中辟瘟病甚神效雜五行書正月七日男吞赤豆六枚女吞十四枚竟年無病上塞耳兩葉蔽目不見太山兩豆塞耳不聞雷霆鶡冠子水調河中水調而宜菽淮南豆花雨八月雨為豆花雨陳留耆舊傳人食豆五升則身重行止動難恆食小豆令人肌燥粗理博物志木豆出交州記木豆出徐童間子美似烏豆大葉似柳一年種數年採魏王花木志禾嘉榖也二月始生八月方熟得時之中故謂之禾禾木也木王而生金王而死故早種也穎禾末也谷禾皮也稈禾莖也苑稈也説文天文以七列精以五故嘉禾之滋莖長五尺五七三十五神盛故連莖三十五穗以成盛德禾之極也春秋説題辭旋星明則嘉禾液春秋運斗樞德下至地則嘉禾生孝經援神契日下淪於地則嘉禾興春秋感精符德至於地則嘉禾生嘉禾者大禾也白虎通后稷辟土墾草以為百姓力農然而不能使禾冬生淮南異莖一穟成王時有苗異莖而生同為一穟大幾盈車長充廂人有上之者王召周公而問之公曰三苗為一穟抑天下其和為一乎果有越裳氏重譯而來尚書大傳管仲説桓公曰古之封禪鄗上之黍北里之禾所以為盛史封禪書夫子見禾之三變滔滔然曰孤鄉丘而死我其首禾乎垂而向根君子不忘本也淮南武帝外事四夷四民去本董仲舒説上曰春秋他榖不書至于麥禾不成則書之以見聖人於五榖最重麥與禾也漢書王莽使中郎平憲誘羌還云天下太平一禾長丈餘故乞內屬郊祀志承宮字少子琅琊人常在蒙陰山中耕種禾黍臨熟人認之宮便推與而去由是發名也續漢書光武以建平元年生于濟陽縣是歲有嘉禾生一莖九穗大于凡禾縣界大熟因名上曰秀東觀漢記和帝元年嘉禾生濟陰城陽一莖九穗安帝延光三年嘉禾生九貞百五十六本一百六十八穗古今注淳于恭字孟孫有盜割禾恭見之念其愧因伏草中盜去乃起東觀漢記蔡茂初在廣漢夢坐太極殿上有三穗禾茂跳取之得其中穗輒復失之後漢沈勳身自耕耘以供衣食人有盜獲其禾勳見而避之明日便收拾送致其家盜者愧懼齎還不授會稽典録謝承遷吳郡督郵歲穰嘉禾六穗生於部屬上鄭元年十六號曰神童民有獻嘉禾者欲表府文辭鄙略元為改作又著頌一篇侯相高其才為修冠禮焉本傳盧陵巴丘人文晃者世以田作為業秋收以過獲刈都畢明旦至田禾悉復湛然如先即便穫所穫盈倉而巨富續搜神記赤烏七年宛陵嘉禾生會稽南始平言嘉禾生改年為嘉禾三年由拳野稻自生改為和興縣吳志庾衮居貧禾熟穫者已畢而採捃尚多衮乃引其群子以退曰待其間及其捃也不曲行不勞掇跪而把之則亦大獲又與邑人入山拾橡分夷險序長幼推易居難禮無違者晉書朱沖字巨容躬植禾藝蔬鄰牛侵犯特芻送牛而無憾色臧榮緒晉書七莖同穗武帝時嘉禾三生其七莖同穗晉起居注王者德盛則嘉禾仁卉也義熙十三年鞏縣民宋曜於田中獲嘉禾九穗同本九穗九州是時羌平六合寧晉中興徵祥説許謙字元遜代人也子洛陽為鴈門太守家田三生嘉禾皆異壟合穎世祖善之進爵北地公也後魏趙肅授原州總管司馬在道夜行其左右馬逸入田中暴人禾輒駐馬待明訪禾主酬直而去北史東魏孝靜帝天寶初四月禾夜生于帝銅硯中及明而長數寸有穗其年帝為高洋所幽遇鴆而崩廣五行記獻禾授令七年九月太原郡有獻禾一本三穗長八尺穗長三尺五寸大尺圍芒穗皆紫色鮮明受自禾已上三尺餘亦紫色有老人年八十餘以素木匣盛之賜物三十假板授嘉禾縣令杜寶大業拾遺録朔方節度郭子儀言寧朔縣界荒地廣十五里有黑禾榖出遍地每日側近百姓掃盡經宿還生前後可得五六千石其禾圓實味甘美臣以為天啓興王先瑞百榖故漢稱雨粟周頌來牟豈若瑞禾自出家給人足蓋陛下富教安人務農敦本光復社稷康濟黎元之應也唐書代宗為皇太子乾元初上降誕豫州奏百姓李氏有嘉禾生及是册禮特詔改名豫上永泰元年秋京兆府上言鄠縣嘉禾生穗長一尺餘穗上粒重疊如連珠上馬燧大曆四年為懷州刺史乘兵亂後其夏大旱人失耕種燧乃務教化將吏有父母者燧輒造之施敬收瘞暴骨去其煩苛至秋田中生櫓禾人頗便之上元和中東州觀察使潘孟陽上言龍州武安川中嘉禾生有麟食之復生麟之來一鹿引之群鹿隨焉光華不可正視畫工就圖之并嘉禾一函以獻上聞河南縣獻嘉禾一莖五穗重規視之曰偽也笞其人而遣五代種禾無期因地為時三月榆莢雨時高地強土可種禾薄田不能糞者以原蠶矢雜禾種之則禾不生蟲汜勝之書得時之禾長秱而穗大本而莖殺疏穖而穗大其粟圓而薄粳其米多沃而食之強如此者不風先時者莖葉帶芒以短衡穗巨而芳奪秮米而不香後時者莖葉帶芒而衡穗閲而青零多粃而不滿呂覽夏四月鄭祭足帥師取溫之麥秋又取成周之禾左隱季子皋葬其妻犯人之禾申祥以告曰請庚之子皋曰孟氏不以是罪子朋友不以是棄豫以吾為邑長於斯也買道而葬後難繼也檀弓飯之美者玄山之禾不周之粟陽山之穄南海之秬呂覽五尋崑崙墟有禾本長五尋山海經大風不實人主好田獵則歲多大風禾榖不得實六韜夢禾財生禾稼為財用之所夢見禾稼言財氣生夢書春秋説題辭曰禾者銜滋液宋均注曰銜滋液以生故以禾為名也洛水洛水輕利而宜禾實野禾實于野粟缺于倉皆奇怪非人所意此可畏也春秋繁露莽鹵而報莽鹵而種之禾亦莽鹵而報之滅裂而耰之禾亦滅裂而報之莊吐秀嘉禾為榖班祿是宜吐秀五七乃名為嘉鄭婚禮謁文贊沒橐它天竺國禾之長者沒橐它孔帖薌其祭宗廟之禮粱曰薌萁曲禮飯飯黍稷稻粱白黍黃粱稰穛內則爾雅曰虋赤苗芭白苗郭璞注曰虋赤粱粟芭白粱粟皆好榖也捷為舍人曰別米赤白苗也又曰是伯夷所食首陽草也膏粱之性欒伯請公族大夫公曰夫膏粱之性難正也晉語珍怪其味人之所美也而堯糲粱之飯藜藿之羹文繡狐白人所好也而堯布衣掩形鹿裘禦寒淮南桓帝之初京都童謠曰城上烏尾畢逋公為吏子為徒一徒死百乘車車班班入河間河間奼女工數錢以錢為室金為堂石上慊慊黃粱下有懸鼓我欲掌之丞卿怒城上烏者處高獨食不與下共謂人主多聚斂也公為吏子為徒者言蠻夷叛逆父既為軍吏子弟又為卒徒往擊之也一徒死百乘車者言前一人討胡既死矣後又遣百乘車往也車班班者言乘輿班班入河間迎靈帝也奼女數錢言帝既立其母永樂太后好聚金錢以為堂室也石上慊慊者言太后雖積金錢猶慊慊常苦不足使人舂黃粱而食之也我欲擊之者言太后教帝使賣官授錢天下忠篤之士怨望欲擊鼓求見卿懸鼓者復怒而止我也續漢志魏武為粥有具粱解粱遼東赤粱魏武帝以為粥廣志孫權時有一人種粱在山中患猿猴食之聞介象有道聊從乞辟猿猴法象告之無他法也汝明日往粱所望見群猿方往時便大喚語之曰以白介君使猿猴莫復求食粱此人倉卒直謂象欺弄之明日視粱遇群猴適欲下樹試承象語語猿即各還山出遂便絶迹神仙傳涼州都督計欽明嘗出按部有吐蕃數萬奄至城下欽明拒戰久之力屈被執賊將欽明至靈州城下欽明大呼曰賊中都無飲城內有美醬乞二升粱米乞二升墨乞一挺是時賊營四面阻泥河唯有一路得入欽明詐乞此物以喻城中冀有簡兵練將候夜掩襲城中無悟其旨者尋遇害唐書不能耕而欲黍粱不能織而喜衣裳無事而求其功難矣淮南白粱味甘微寒無毒生除熱益氣有襄陽竹根者最巨黃粱出青冀本草黃粱穗大毛長殼米俱粗於白粱而收子少不耐水旱食之香味逾於諸粱人號為竹根黃爾雅翼玄山粱飲以華泉之水食以玄山之粱傳林奕雉賦雍丘左思魏都賦曰雍丘之粱爾雅曰黂枲實孫炎注曰麻子因分爾雅翼麻有實者別名苴而無實者別名枲禮記月令曰仲秋之月天子乃以犬嘗麻先薦寢廟鄭元注曰麻新黂食麻與犬三秋之月天子衣白衣乘白駱食麻與犬淮南得時之麻必莖以長疏節而危陽少本而莖堅厚枲以均後熟多榮日夜分復生如此者不蝗呂覽大夫李斯與鮑丘子俱事孫卿鮑丘飯麻蓬藜修道白屋之下李斯為秦丞相終致五刑鹽鐵論飛明珠東極之東有飛明麻葉黑實如玉風吹之如塵亦名明塵麻有紫沉麻如粟色紫迮為油則汁之如清水食之目視鬼魅又有倒葉麻葉如倒苣色紅紫亦名紅冰麻言冰麻乃有實食之顏色潔白有通明麻食者夜行不持燭是苣蕂也拾遺周黨遺閔仲叔生麻叔嘆曰我欲省煩耳受而不食東觀漢記夢麻驚乳宣帝陳皇后生高帝高帝年二歲乳人乏乳后夢人以兩甌麻粥與之覺而驚乳因此豐足齊書補中麻子味甘無毒主補中益氣服之令人肥健本草麻子味甘無毒主補中益氣服之令人肥健麻子一名一名麻勃養子要集胡麻亦有實本生大宛一名油麻一名狗莖一名方莖淳黑者名巨勝亦曰一葉兩莢為巨勝或曰莖圓名胡麻莖方名巨勝又作角作四稜者名胡麻八稜者為巨勝俗云必夫婦同種即生而茂盛道家以為飯陶隱居言八榖之中胡麻最為良爾雅翼折麻九歌云折疏麻兮瑤華將以遺兮離居離騷法宣云雖攀桂之歡或舛而折麻之贈不遺續高僧傳爾雅衆秫謂黏粟也説文云與榖相似米黏此人用之釀酒其莖稈似禾而粗大者是也孫炎注曰秫稷粟也陶潛字元亮為彭澤令在縣公田悉令種秫榖曰令吾常醉于酒足矣妻子固請種粳乃使二頃五十畝種秫五十畝種粳晉書茭草苽者蔣草也生水中葉如蔗荻江南人呼為菱草刈以飼馬甚肥其苗有莖梗者謂之菰蔣至秋則為此米爾雅翼苽米一名雕胡故宋玉賦云為臣炊雕胡之飯烹露葵之羹又牧叔七發云楚苗之食安胡之飯摶之不解一啜而散上太液池邊皆是雕胡紫籜緑節之類菰之有米者長安人謂之雕胡葭蘆之未解葉者謂之紫籜菰之有首者謂之緑節西京雜記海上有草焉名蒒其實食之如大麥七月稔熟名曰自然穀民斂至冬乃訖或曰禹餘糧言禹治水棄其餘糧化而為此爾雅翼爾雅稊苵稊一名苵似稗之穢草布生於地而稗則生下澤中故古詩曰蒲稗相因依上稗水旱無不熟之時又特滋盛易得蕪穢良田畝得二三十斛宜種之以備凶年又稗中有米熟時可禱取炊之不減粢米又可釀作酒武帝時令典農種之一頃收二十斛斛得米三升大儉可磨食之汜勝之書東牆東牆生河西苗似篷子似葵可為飯河西人語曰貸我東牆償爾田粱本草菵米菵米可為飯生水田中苗子似小麥而小四月熟久食不飢爾雅所謂皇守田者也上狼尾草子作黍食之令人不飢爾雅所謂孟狼尾者也上蒯草蒯草子亦堪食如粳米又蓬草子作飯無異粳米儉年食之上天中記卷四十五
