body:
  text: 榻長狹而卑曰榻言其榻然近地也小者曰獨坐主人無二獨所坐也釋名徐稚字孺子豫章人陳蕃為太守不接賓客惟稚來特設一榻去則懸之謝承書周璆字孟玊陳蕃為太守璆來置一榻去則懸之上簡雍性簡傲佚蕩自諸葛亮以下則獨擅一榻項枕臥語無所為屈蜀志合榻周瑜薦魯肅孫權引肅合榻對飲言議吳志管寧自越海及歸常坐一木榻五十餘年未嘗箕踞榻上當膝處皆穿皇甫謐高士傳杜預拜鎮南將軍朝士悉至客皆在連榻于稚舒後至日杜元凱復以連榻坐客不坐便去郭子方榻當陽侯劉彥節既貴士子自非三署不得上方榻時以此少之宋書顏延之為祕書監光祿勳太常時沙門釋惠林以才學為文帝所賞朝廷政事多與之謀士庶歸仰上每引見常升獨榻延之甚嫉焉因醉曰昔子同驂乘袁絲正色此三台之坐豈可使刑餘居之上變色上詣直登榻王瞻字明遠一字升鸞負氣傲俗好貶裁人初仕宋為王府參軍常指劉彥節直登榻曰君侯是公孫僕是公子引滿促膝惟余三人彥節外雖酬之意甚不悅上別施榻孔休源字慶緒博學為晉王府長史甚得人譽王深相倚仗常於中齊別施一榻云此是孔長史坐人莫得預焉其見敬如此齊書見榻哽塞元順為吏部尚書右僕射及上省登階向榻見榻甚故問都令史徐仵起仵起曰此榻曾經先王坐順即哽塞涕泗交流久而不能言遂令換之魏書不置連榻臨汝侯猷為益州頗僣濫客筵內遂有香燈不置連榻武帝知之以此為僣還都以憂愧成疾卒梁書側置玄宗命太常韋縚讀時令每月一篇每孟月朔日上御宣政殿側置一榻東置面案令韋縚坐而讀之唐書李峴為相元載於政事堂置榻邀宣事中官坐峴至叱左右去榻上修羊公者魏人也止華陰山石室有懸石榻臥其上石盡穿陷列仙傳好胡床靈帝好胡床董卓擁胡兵之應也風俗通掛柱裴潛為兗州刺史常作一胡床及去官留以掛柱魏志張景真僣侈武帝拜陵還景真白服乘舴艋坐胡床觀者咸疑是太子齊書武帝軍至新林楊公則自越城移此領軍府疊北樓與南掖門相對嘗登樓望戰城中遙見麾蓋縱神鋒弩射之矢貫胡床左右皆失色公則曰虜幾中吾腳談笑如初梁書掛裝胡床武城胡后與沙門曇獻通布金錢於獻席下又掛裝胡床於獻屋壁武城平生之所御者也北齊書侯景既纂時著白紗帽而上披青抱頭插象牙梳床上常設胡床及筌蹄著鞾垂腳坐梁書扶風蘇不違父為司秉李皓所遷司農不違穿府北垣徑上廳事斫皓臥具皓一宿數還風俗通奇溫朱百年隱居山陰家素貧母以冬月亡衣並無絮自此不衣綿帛嘗寒時就孔覬飲酒醉眠覬以臥具覆之百年不覺也既覺引臥具去體謂覬曰綿定奇溫因流涕悲慟覬亦為之成傷宋書謝眺嘗行還過候江革時天寒雪見革弊絮單席而枕覺不倦眺嗟嘆久之乃脫其所著襦并手割半氈與革充臥具而去齊書劉孝綽與到溉兄弟甚狎溉少孤宅近僧寺孝綽往溉宅適見黃臥具孝綽謂僧物色也撫手笑溉知其旨奮拳擊之傷口而去上囊橐囊謂橐也橐車上大囊也說文掩囊自關而西食囊謂之掩囊方言哀公曰齊景死舍立陳乞迎陽生使力士舉巨囊而至開之則公子陽生也乞曰此君也諸大夫皆再拜稽首自是往殺舍公羊傳昔魯哀公祖載其父孔子問曰寧設五榖乎哀公曰五穀囊者起伯夷叔齊讓國不食周粟而餓首陽之山恐魂之饑故作五穀囊吾父食味舍哺而死何以此為王肅喪服要記鳲鵜吳王殺申胥盛以鳲鵜而投之於江國語趙王使平原君入楚求定從約其客有文武者二十人偕得十九人未有可以備二十者毛遂請行平原君曰賢士處世譬如錐之處囊其鋒立見今先生處勝門下三年無所聞是先生無所能也遂曰臣乃今日請處囊中耳若早處囊中乃頴脫而出非特未見也平原乃許與偕春秋後語惠帝嘗與趙王同寢處呂后欲殺之而未得後帝早獵王不能夙興呂后命力士於被中縊殺之及死呂后不之信以緑囊盛之載以小羊車入見乃厚賜力士力士是東郭門外官奴帝後知腰斬之后不知也西京雜記帝見王母有一卷書盛以紫錦之囊母曰此吾真形圖也漢武內傳書囊為帷文帝集上書囊以為殿帷東方朔傳持囊簪筆張安世持囊簪筆事孝武數十年見謂忠謹赤白囊邴吉馭吏習知邊塞嘗出適見驛騎持赤白囊邊郡發奔命書馳來至知虜入雲中代郡遽歸府見吉白狀上成帝許美人乳詔使婢嚴持乳醫及五種和藥丸三送美人所後詔使嚴持緑囊書與許美人告嚴曰美人當有以豫女受來置飾室中美人以葦篋一合盛所生兒緘封及緑囊報書豫嚴上王陽好車馬衣服鮮明而遷徙轉移所載不過囊橐時人怪其奢伏其儉故傳王陽能作黃金上岑彭與吳漢圍隗囂壅谷水以縑囊盛土為堤灌西域東觀漢記光武嘗召見諸郡計吏問前後守令能否蜀郡計掾樊顯曰漁陽太守張堪昔在蜀仁以惠下威能討姦前公孫述破時珍寶山積卷𡎔之物足富十世而張堪去職之日乘折轅車布被囊而已後漢書楊璇為零陵太守以緋囊盛石灰於車上繫布索於馬尾會戰從風鼓灰賊不得視因以火燒布布燒馬驚奔賊陳上范滂被詰受紀贓贓賕滂曰曾為北部督郵汝陽令有紀囊表裏六尺若以此為贓贓真六十耳汝南先賢傳和熹鄧后臨朝杜根以安帝長宜親政事乃上書直諫太后怒收根盛以縑囊撲殺之執法者以根知名私語行事人使不加力而載出城外根得蘇後漢褁足而戰馬超為司隸督軍從事討郭援為流矢所中乃以囊褁其足而戰斬援首詔拜徐州刺史典略大秦國王有五官相去各十里王一旦至一宮聽事止宿明旦復至一宮遍而還出行嘗以一韋囊自隨有上言者收辭囊中還宮乃省之魏略步隲表言北降王潛等說北箱部伍圖以東向多作布囊欲以盛沙塞江孫權見呂範諸葛恪云每讀隲表輒獨失笑此江與開闢俱生寧有可囊塞理乎吳録棗嵩用事於王浚時人謠曰十囊五囊入棗郎王隱晉書囊兒投外孫恩敗以囊簏盛嬰兒投之於外而告之曰賀汝先登仙堂我尋後就汝晉中興書郭公居河東精卜筮郭璞從之受業公以青囊中書九卷與之璞由是洞曉其術晉書吳郡人陳遺少為郡吏母好食璫底飯遺在後恆帶一囊每煮食輒録其燋以貽母宋書張處威晝在塗見一遺囊恐其主求失因令左右負之而行後數日物求主認悉以付之隋書謝玄年少時好著紫羅香囊垂覆手太傅患之而不欲傷其意乃譎與戲賭得則燒之世說劉承胤少有淹雅之才王庾溫公皆素與周旋聞其至共載看之劉倚被囊了不與王公言神味亦不相酹俄頃賓退王庾甚怪此意未能解溫曰承胤好賭新下必有珍寶當有市井事令人視之果見向囊皆珍玩正與胡父詣賈語林錦囊石崇厮內兩婢錦囊是籌也上何承天顏延年俱為郎何問顏曰藿囊是何物顏答曰此當復何解耶藿囊將是卿俗說閻憲字孟度為綿竹令男子杜成行於路得遺裝囊開視有錦二十五匹明送詣吏益部耆舊傳信安鄭微年少時見人遺一囊云中有物欲碎便為凶兆微密開看乃是一梃炭意甚祕之年八十病篤語子弟云吾齒老矣可試啓此囊見炭悉碎折於是遂死異苑石虎為俗臺皆用瑜石碔玦為隄岸或以虎魄中渠為瓶杓夏則自渠水以內池池中皆紗縠為囊盛百雜香漬於水裏拾遺録掫囊人而不學命之曰視皮學而不行命之曰撮囊莊子叔鮒求貨於衛淫芻蕘者衛人使屠伯饋叔向羹與一篋錦叔向受羹反錦曰晉有羊舌鮒者黷貨無厭亦將及矣昭十三魏文侯命樂羊將攻中山三年而拔之樂羊反而論功文侯示之謗書一篋春秋後語胡質為荊刺史史及囊無餘財惟有賜衣書篋而已魏志文史溢篋張華身死之日家無遺財有文史溢於几篋晉書五明扇舜所作也既受堯禪廣開視聽求賢人以自輔故作五明扇秦漢公卿大夫皆用之魏晉非乘輿不得用也古今注雉尾扇起於殷世高宗時有雊雉之祥服章多用翟羽周制以為王后夫人之車服輿車有翣即緝雉羽為扇翣以障翳風塵也漢朝乘輿服之後以賜梁孝王魏晉以求無常准諸王皆得用之上鵲翅為扇周昭王時塗修國獻青鳳丹鵲各一雌一雄孟夏之時鳳鵲皆脫易毛羽聚鵲翅以為扇緝鳳羽以飾車蓋也扇一名遊飄二名反影時東甌獻二女一名延娟二名延娛使二人更搖此扇侍於王側輕風四散冷然自涼拾遺記諸葛武侯與先主在渭濱將戰武侯乘素輿葛巾白羽扇指摩三軍三軍皆隨其進止語林扇障面王大將軍在西朝時見周侯輒扇鄣面不得住後渡江左不能復爾王歎曰不知吾進伯仁退世說溫嶠娶姑女既婚交禮女以披紗扇撫掌大笑曰我嫌是老奴果如所擬上羊孚作雪讚云資清以化乘氣以霏值象能鮮即潔成暉桓胤遂以書扇上搖扇貽戚胡母彥國至湘州坐廳事斷官爾時三伏中傍搖扇視事其兒子光從容顧謂曰彥國復何為自貽伊戚語林庾翼為荊州都督毛扇上成帝疑是故物侍中劉邵曰柏梁雲搆匠者先居其下管弦繁奏夔牙先聆其音廙之上扇以好不以新季恭聞之曰此人宜在帝左右上顧虎頭為人畫扇作稽元而都不點眼精主問之顧答曰那可點精點精便語世說吳猛好道術常渡江以白羽扇畫水橫流直過不用舟楫續搜神記高平擅茂宗義熙中喪亡其母劉氏夢見宗云方求違離今以此扇奉別母流涕覺於屏風間得扇上皆如蜘蛛網絡異苑覆蓋蓋在上覆蓋人也釋名繖蓋張帛避雨謂之撒蓋通俗文華蓋黃帝所作也與蚩尤戰於涿鹿之野常有五色雲氣金枝玊葉於帝上有花花之象故因而作華蓋崔豹古令注曲蓋太公所作武王伐紂大風折蓋太公因折蓋之形而制曲蓋焉戰國常以賜將軍自漢朝乘輿用之因謂睥睨蓋有軍號者賜其一焉上齊侯伐晉夷儀敝無好死於霤下齊侯謂夷儀人曰得敝無好者以五家免乃得其尸公禭之與之犀軒直蓋左定下不張蓋五羖大夫之相秦也勞不坐乘暑不張蓋史記夫子適郯郯子遇子於途傾蓋而語終日而別命子路將束帛贈焉孔叢子持蓋孔子將行命從者持蓋既而果雨家語上官桀少時為羽林郎從武帝上甘泉天大風車不得行解蓋投之桀奉蓋雖風常屬車雨下蓋輒御上奇其材力焉漢書蔽霜吳起與秦人戰僕衆之蓋足以蔽霜露尉繚子黃霸為揚州刺史三年宣帝詔賜車蓋特高一尺以彰有德漢書或言黃帝時建華蓋以登仙王莽乃造華蓋高八丈一尺皆全瑵羽葆載以祕機四輪車駕六馬挽者皆呼登仙王莽傳靈帝時講武平樂觀建十重五彩華蓋高十丈建九重華蓋高九丈續漢書門不容蓋光武東巡時虞延從駕到魯還經封邱城門門下小不容羽蓋帝怒使撻御史延救之乃止後漢書曹休入皖城陸遜破之權令左右以御蓋覆遜吳志劉基孫權愛敬之嘗從御樓船時雨甚權以蓋自覆又令覆基餘人不得覆也上賀齊為將性奢綺兵甲器械極為精好所乘船雕刻丹鏤青蓋絳襜弓弩矢箭咸取上材上徐干木年少時常夜夢見鳥從天上飛銜繖樹其庭中如此凡三過銜來作惡聲而去徐後果得繖遂以惡終俗語桓玄遊於水南飄風飛其輗蓋後義兵起遂敗晉安帝記御史中丞荀伯子奏左衛將軍何尚立公事每罩笠有虧體制建野笠於公門棄華繖而不御宋元嘉十年起居注孔雀蓋訶羅國奉孔雀蓋一其元嘉二十九年起居注風飄儀繖始安王遙光傳江祐被誅東昏召遙光入殿告以祐罪遙光懼還省便佯狂號哭自此稱疾不復入臺先是遙光行還入風飄儀繖出城外遙光遂敗齊書殷孝祖與賊合戰每常以鼓蓋自隨軍中人相謂曰殷統軍可謂死將至矣今與賊交鋒而以羽儀自標顯若此射者十手攢射欲不斃得乎是日中流矢死南史王籍為中散大夫彌日忽忽不樂乃至徒行市道不懌交遊有時途中見相識輒以笠傘覆面梁書湖城吏丁初忽見少婦人姿容可愛青衣戴傘呼初初疑而待顧婦自投波中是太蒼獺衣傘皆是蓮荷搜神記義熙中烏傷小吏見女子戴青傘姿容遂要之女至多電光乃是大狸抽刀斫殺其繖乃枯荷葉耳異苑繡羽蓋太上大道君授務成君繡羽蓋雙明珠真人王君傳紫陽山人周義山子通今會仙人在金屋銅門之內以紫雲為真人周君傳障風屏風以屏障也扆在後所依倚也釋名扆扆縱廣八尺畫斧文今之屏風則遺象也三禮圖孟嘗君每侍客坐語屏風後常有侍吏主記所與客語知其親戚居處客去後使使謝餽無所遺失春秋後語荊軻入秦為燕太子報讎把秦王衣袂曰寧為秦地鬼不為燕地囚王美人彈琴作語曰三尺羅衣何不掣四面屏風何不越王因製衣而走得免三秦記睡觸屏風陳萬年字幼公善事人賂外戚為御史大夫子咸字子康年十八有異材抗直數言事刺譏近臣萬年嘗病召咸教誡於床下語至夜半咸睡著頭觸屏風萬年大怒欲杖之曰乃公教戒汝汝反睡不聽吾言何也咸叩頭謝曰具曉所言大要教咸諂也萬年乃不復言漢書班伯以侍中光祿大夫養病久之成帝出過臨侯伯伯乃再視事自大將軍薨後富平定陵侯張放淳于長等始愛幸出為微行行則同輿執轡入則侍中設宴飲之會及趙李諸侍中皆引滿舉白時乘輿幄坐帳畫屏風畫紂醉踞妲己作長夜之樂上以伯新起數目禮之因顧指畫而問伯曰紂為無道至於是乎伯對曰書云乃用婦女之言何有踞肆於朝所謂衆惡歸之不如是之甚者也上曰茍不若此此圖何戒伯曰沉湎于酒微子所以告去也式號式呼大雅所以留連也詩書淫亂之戒其原皆載於酒上乃喟然歎曰吾久不見班生今日復聞讜言放等不懌上成帝省減椒房掖庭用度許皇后上疏曰設妾欲作其屏風張於某所必繩妾以詔書矣上翳雲母屏王莽常翳雲母屏風上宋弘嘗燕見御坐新施屏風圖畫列女帝數顧視之弘正容言曰未見好德如好色者上即為撤之上姊湖陽公主新寡上與共論朝臣微觀其意主曰宋公威容德器群臣莫及上曰方圖之後弘見上令主坐屏風後因謂弘曰諺言貴易交富易妻人情乎弘曰臣聞貧賤之交不可忘糟糠之妻不下堂上顧主曰事不諧矣東觀漢記鄭弘為太尉舉第五倫為司空班次在下每正朔朝見弘曲躬自卑上問知其故遂聽置雲母屏風分隔其間由此為故事謝承後漢書補壞曹公雅性節儉帷帳屏風壞則補衲魏書曹公平柳城班所獲器物特以素屏風素憑几賜毛玠曰以君有古人之風故賜君以古人之風魏志吳隱之字處默清貧劉裕拜太常卿以竹蓬為屏風坐無氈席晉書何毋忌母劉牢之姊無忌與宋高祖謀夜於屏風中製檄文母登屏風窺之大喜曰汝能如此吾讎雪矣續晉陽秋顏延之愛姬死以冬日臨哭忽見妾排屏風以壓延之延之懼墜地因病宋書王琨儉於財用設酒不過兩爵輒云此酒難遇鹽豉薑菜之屬並排屏風酒漿悉置床下內外有求琨手自付之上元嘉中中丞劉禎奏風聞廣州刺史韋朗於州作緑沉銀泥漆屏風二十三床請以事免朗官宋起居注明帝性多忌諱禁制回避者數十百品亦惡白字屏風書古來名文有白字轍加改易玄黃朱紫遂宜代之王琰宋春秋宜都王鏗年十歲時與告景曜商略先言往行左右誤排柟福屏風倒壓其背顏色不異言談不輟亦不顧視齊書古玉屏皇太子在雍有盜發古塜得玉屏風遣將還都賜屏武帝在東宮每幸悛坊間言至夕賜屏風帷帳俱同上王遠字景舒位光祿勳時人謂遠如屏風屈曲從俗能蔽風露言能不虧物理也南史太宗引虞世南為秦府十八學士嘗令寫列女傳以裝屏風于時無本世南書之一無遺失唐書賜屏靈座田神功卒賜屏風茵褥於靈座上憲宗以天下無事留心典墳著書十四篇名曰前代君臣事跡寫於六屏風以示宰相上帝起神臺其上扉屏風悉以白琉璃作之光輝洞徹也漢武舊事龜甲上起神明臺上有金床象席雜玉為龜甲屏風郭子橫洞冥記董偃嘗臥延清之室設紫琉璃屏風列靈麻之燭於戶外視屏風若無屏風矣侍人惟見燈明以言無礙乃於屏風外扇偃偃曰玉石豈須扇而後清涼耶侍者乃郤扇以手摸之方知有屏風之礙矣拾遺録石屏廣川王去疾發魏哀王塜有石屏風西京雜記雲母屏趙飛燕為皇后其女弟遺雲母屏風琉璃屏風七尺屏漢江都王建徑健嘗跳越七尺屏風上何敞為汝南太守和帝南巡過郡有刻鏤屏風為帝設之帝命侍中黃香銘之曰古典務農雕鏤傷民忠在竭節義在修身三輔夬録杜陵蕭彪字伯文為巴郡太守以父老歸供養父有客常立屏風後自應使命京兆舊事孫亮作琉璃屏風甚薄而徹每於月下清夜舒之常愛寵四姬使坐屏風中外望之乃若無隔惟香氣通於外耳拾遺録鏤瑞應圖孫亮作琉璃屏風鏤作瑞應圖一百二十種古今注滿奮字武秋體嬴惡風侍坐武帝屢顧看雲母幌武帝笑之奮云北窗琉璃屏風實而似踈帝有難色答曰臣如吳牛見月則喘或云是胡質時魏明帝座語林閉屏風荀介子為荊州刺史荀婦大妬恆在介子齊中客來便閉屏風有桓客者時為中兵參軍來謁荀咨事論事已訖為復作余語桓時年少殊有姿容荀婦在屏風裏便語桓云桓參軍君知作人不論事已訖何以不去桓狼狽便走俗說謝方作吳興郡其兄安時隨至郡中方眠常晏起清朝便往床前叩屏風呼方起上臣與黃門侍郎歆所校列女傳種類相從為七篇以著禍福榮辱之效是非得失之分畫之於屏風四堵劉向七略別傳王凝之妻謝氏有才辨凝之弟獻之嘗與賓客談論調理將屈謝氏遣婢白獻之曰欲與小郎解圍乃施青綾步障自蔽與客申獻之前議客不能屈晉書鐵步障許玄度將弟出都婚諸人聞是玄度弟欽迓之既見乃甚癡便欲嘲弄之玄度為之解紛諸人不能犯境劉貞長歎曰玄度為弟婚施千里鐵步障語林步障繞大將軍刑周伯仁以步障繞之經日已臭王曰周伯仁子弟癡何以不知取其翁尸周家然後收之上錦步障石虎為洛臺列鳳文錦步障縈蔽於浴所拾遺記江夏王寶玄與崔惠景叛景敗寶玄逃奔數日乃出帝召入後堂以步障裹圍之令群少數十人鳴鼓角繞其外遣人謂曰汝近圍我亦如此少日乃殺之齊書琅琊王儼字仁威武成第三子也武成甚愛之儀衛甚盛帝嘗與后在華林園東門外張幕施青綾障以觀之北齊書施上塵土承塵施於上以承塵土也釋名雷義字仲公豫章鄱陽人也初為郡功曹能擢舉善人不伐其功義常濟人死罪罪者後以金二斤謝之義不受金主伺義不在默投金於承塵上後葺理屋宇乃得金金主已死無所復還義乃以付縣曹後漢書博陵劉伯祖為河東太守所止承塵上有神能語京師詔書若下消息輒豫告伯祖伯祖問其所食啖欲得羊肝買羊肝于前切之腐隨刀不見盡兩羊肝有一老狸眇眇在案前持刀者舉刀欲斫之伯祖訶止自舉著承塵上須臾大笑曰向者啖肝醉忽失形與府君相見大慚愧後伯祖當為司隸復先語伯祖云某月某日詔書當到至期如言及入司隸府神隨在承塵上輒言省內事伯祖大恐怖謂神曰今職在刺舉左右貴人聞神在此因以相害神答曰誠如府君所慮當相捨去遂無聲搜神記傅信事母母嬴病恆驚悸信乃取雞鴨去毛置承塵上行落地母輒恐怖語林王衍夷甫盛才美貌明悟若神每捉玊柄麈尾與手同色晉書何次道嘗詣王丞相以麈尾礭床呼何共坐曰此君子坐也郭子孫安國往殷中軍許共語左右進食冷而復暖者數四彼我奮擲麈尾悉墮落滿飯中賓主遂至暮忘食也上懸帳王丞相嘗懸一麈尾著帳中及殷中軍來乃取之曰今當遺汝世說石勒僞事王浚浚遺勒麈尾勒為不執置之於壁朝拜之云王公所賜如見公也晉陽秋麈尾轉視王長史病已篤寢燈下轉麈尾而視之歎曰如此人曾不得滿四十及亡劉尹臨殯以犀柄麈尾置柩中因慟哭郭子客問樂令旨不至者樂亦不復剖析文句直以麈尾柄確機曰至不客曰至樂因又舉麈尾曰若至者那得去客乃悟服世說康法迅造庾公捉麈尾至彼公曰麈尾過麗何以得在答廉者不求貪者不與故得在耳語林張融字思光弱冠有名同郡道士陸修靜以白鷺羽麈尾扇遺之曰此既異物以奉異人又融臨卒遺令建白旐無旐不設祭令人捉麈尾登復魂宋書張敷好讀玄言善屬文論弱冠初父邵使與高士南陽宗少文談繫象往復數番少文欲屈握麈尾歎曰吾道東矣於是名價日重上周顒音辭辨麗長於佛理著三宗論言空假義西涼州智林道人遺顒書深相贊美言捉麈尾來四十餘載頗見宗録惟有此塗白黑無一人得者非意此音猥來入耳見重如此齊書盧廣有儒術為國子博士於學中講說僕射徐勉以下畢至謝舉造坐屢折廣詞理通達廣深歎服仍以所執麈尾贈之以况重席焉梁書張譏善講論後主在東宮集官僚置宴時造玉柄麈尾新成後主親執之曰當今雖復多士如林至於堪捉此者獨張譏耳即手授譏後主嘗幸鍾山開善寺詔從臣坐於西寺西南松下勑譏講議時索麈尾未至後主勑取松枝手以屬譏曰可以代麈尾陳書吳主潘夫人之父坐法夫輸入織室夫人容態少儔為江東絶色同幽者百餘人謂夫人為神女敬而遠之有司聞於吳主使圖其容貌夫人憂戚不食減瘦改形工人寫其真狀以進吳主吳主見圖而嘉之琥珀如意撫按則折歎曰此神女也遂納之拾遺記孫和悅鄧夫人嘗置膝上和月下舞水精如意誤傷夫人頰上時有掘地得銅匣長二尺七寸以琉璃為蓋布雲母於其上開之得白玊如意所執處皆刻螭虎如蠅蟬等形時人莫有識者吳大帝以問綜綜答曰昔秦始皇帝東遊以金陵有天子氣乃鑿諸山岡起處輒埋寶物以當王者之氣胡綜別傳珊瑚崇有珊瑚如意長三尺二寸石季倫本事殷荊州有所識作賦是束晢慢戲之流殷甚以為有才語王公適見新文甚可觀便於手巾函中出之王既讀殷笑不勝王看竟既不笑亦不言好惡但以如意帖之而已殷悵然自失世說謝萬北征嘗以笑詠自高未嘗撫慰衆士謝公從容謂萬曰汝為元帥宜數呼諸將宴會以悅衆心萬從之於是召集諸將都無所說直以如意指四坐曰諸君皆是徑卒諸將甚恨之上石崇與王愷爭豪晉武帝愷之甥也每助愷以珊瑚高二尺許愷以示崇崇以鐵如意擊之應手瓦碎愷聲色俱厲崇曰此不足恨乃命取珊瑚有三尺光彩溢目者六七株愷悵然自失語林烏角太原鄧澄之義熙初諸葛長民欲取為輔國咨議澄之不樂後為南康太守盧循反自廣州長民以其謀先告因騁私惡收澄之以付廷尉將至大辟夜夢見一神人以烏角如意與之既覺便在其頭側可長尺餘形制甚陋澄之遂得無它後從入關因以自隨忽失所在異苑蒼梧欲害高帝帝嘗以書案下安鼻為楯以鐵為書鎮如意甚大以備不虞欲以代仗齊書明僧紹字蒸烈平原聶人也隱長廣郡勞山詔徵為正員外稱疾不就賜竹根如意笋籜冠隱者以為榮蕭子顯齊書席闡文武帝將起兵闡文勸蕭頴胄同焉仍遣客田祖恭私報帝并獻銀裝刀帝報以金如意梁書韋睿拒魏於邵陽睿乘素木輿執白角如意以麾軍一日數合上殷鈞字季和武帝與鈞父睿有舊以女永興公主妻鈞公主驕淫險虐鈞形貌短小為主所憎每被召先入滿壁為殷睿字鈞輒流涕以出主命婢束而反之鈞不勝怒言於帝帝以犀如意擊主碎於背然猶恨鈞自侍中出為王府咨議上擊席李膺字公胤有才辨西昌侯藻為益州以為主簿使至都武帝悅之謂曰今李膺何如昔對曰今勝昔問其故對曰昔事桓靈之主今逢堯舜之君帝嘉其對以如意擊席者久之乃以為益州別駕上高祖孝文欲試諸子志尚乃大陳寶物任其所取京兆王愈等競取寶玩宣武皇帝惟取骨如意而已帝大奇之後魏書羽如意廣陵王羽為太子太保録尚書事孝文將南討遺羽持節安撫六鎮發其突騎夷夏寧悅還領廷尉卿及車駕發羽與太尉元王留守帝賜羽如意以表心焉竹節恩旨賜臣犀縷竹節如意目所未覩劉義慶啓事旄牛尾拂今奉旄牛尾拂一枚可拂塵垢秦嘉婦與嘉書武帝泰康四年有司奏先帝舊物麻繩為細拂以明儉約晉書孝成大明中壞高祖所居陰壁於其處起玉燭殿與群臣觀之床頭有土障陰壁上掛葛燈籠麻繩拂侍中袁覬盛稱上儉素之德孝武曰田舍翁得此已為過矣宋書陳顯達子休尚為郢府主簿過九江拜別顯達謂曰凡奢侈者鮮有不敗麈尾繩拂是王謝家許汝不須捉此即取於前燒除之齊書白眊拂太子有白眊拂二東宮舊事長安巧工丁諼作臥褥香爐一名被中香爐為機環轉四周而剷體常平可置之褥被故取被褥以為名又作九層博山香爐鏤以奇禽怪獸西京雜記劉季和性愛香上廁置香爐主簿張坦曰人名公作俗人真不虛也季和曰荀令君至人家坐處三日香為我何如令君而惡我愛好色襄陽記吳郡吳泰能筮會稽盧氏失博山香爐使泰筮之泰曰此物質雖為金其象實山有樹非林有孔非泉閶闔風至時發青烟此香爐也語其主處求即得之集異記夢爐有娠陶弘景字通明丹陽秣陵人也父貞孝昌令初弘景母郝氏夢天子手執香爐來至其所已有娠矣南史庾仲文貪賄何尚之奏選令史龍向臣說亦歎受納之過言實得嫁女具銅爐四人舉乃勝細葛斗帳等物不可稱數上江泌為南康王子琳侍讀建武中明帝召諸王後泌憂念子琳訪志公道人問其禍福志公覆香爐灰示之曰都盡無餘後子琳被害齊書侯景即位景床東邊香爐無故墮地景呼東西南北皆謂為廂景曰此東廂香爐那忽下地議者以為湘東軍下之徵梁書鏤香爐石虎冬月為復帳四角安純金鑿鏤香爐鄴中記櫛櫛梳枇揔名也說文梳言其齒篦疏也篦言其細相比也釋名晉太子圉為質於秦將逃歸謂嬴氏曰與子歸乎對曰寡君之使婢子侍執巾櫛以固子也從子而歸棄君命也不敢從亦不敢言左僖中季文德素善延篤謂公卿曰延篤有王佐之才欲引進之篤聞為書止文德曰吾當昧爽櫛梳坐於客堂朝則誦虞夏之書歷公旦之典禮鑒仲尼之春秋當此之時不知天之為蓋地之為輿慎勿迷其本棄其生也續漢書以梳為枇徐季龍取十三種物著大篋中使管輅占之輅先說雞子後道蠶蛹遂一一名之唯以梳為枇耳魏志臨賀興安縣東邊有平石其上有櫛履各一具俗云越王渡溪脫履墜櫛於此盛弘之荊州記解憂夢梳枇為憂解也虱盡去百病愈也夢書荔草荔草似蒲而小根可作刷說文理髮所以理髮謂之刷通俗文帥髮上從刷帥也帥髮長短皆令上從也釋名攝髮鑷攝也攝取髮也釋名披減鬚髮謂之鑷通俗文卷縣令施安上懷鑷令郭璞射之璞曰此是鏡物有兩岐洞林光銅彭城王義康餉沈熙光銅鑷沈約宋書鑷魚鑷魚長七寸頭如鑷臨海水土記高祖恆令左右拔白髮隆昌王高帝之孫年五歲戲於床前帝曰兒言我是誰答曰太翁帝曰豈有為人高祖拔白髮乎即擲去鏡鑷后首飾曰副副覆也以覆於首上有垂珠步則搖也釋名主人之女垂珠步搖宋玉風賦后入廟步搖以黃金為山題貫白珠桂枝相糾八爵九華熊虎赤羆天鹿辟邪續漢書輿服志慕容廆高祖慕容廆魏初率其諸部入居遼西從宣帝伐公孫氏以功拜率義王始建國於棘城之北時燕代多冠步搖冠護跋見之乃斂髮襲冠諸部因呼之為步搖其後音訛遂為慕容焉晉書孫皓使尚方以金作步搖假髻以千數令宮人著以相撲朝成夕敗輒命更作江表傳黃金趙飛燕為皇后其女弟上遺黃金步搖西京雜記禁物步搖蔽髻皆為禁物晉令王莽斥出王閎太后憐之閎伏泣失聲太后親自以手巾拭閎淚漢名臣奏不宜借人在尊者前宜各具一手巾不宜借人巾用英雄記孫權尅荊州將吏悉皆歸附而潘濬涕泣交橫權慰勞與語使親近以手巾拭其面江表傳王戎雖為三司率爾私行巡省園內不從一人以手巾插腰戎故吏多大官相逢輒下道避之竹林七賢論鬱州道祭酒徐誕常以治席為事有吳人姓夏侯來師誕忽暴疾死終冬涉春有長沙門從北來於道中見夏侯云被崑崙召不得辭師寄手巾為信誕得手巾乃本所送入棺者名山略記會稽人吳詳見一女子溪邊洗腳呼詳共宿明旦別去女贈詳以紫巾詳答以白手巾志怪著巾賣餅趙岐避難至北海著絮巾市中賣餅魏略石虎皇后出以女騎一千為鹵簿冬月紫絮綸巾鄴中記匱匱櫝也匣也說文夏之衰也褒人之神化二龍而言曰余褒之二君也夏后布幣陳策而告之龍亡而漦在櫝而藏之國語玊櫝燕人歸燕姬以瑤甕玉櫝左昭七買櫝還珠楚人賣其珠於鄭者為木蘭之櫝薰以桂椒綴以珠玉飾以玖瑰緝以翡翠鄭人買櫝而還珠未可謂善鬻珠也韓子甘卓家金匱鳴聲似捶鏡清而悲師言金匱將離是以悲鳴尋而卓下將軍周慮等承望敦意害卓王隱晉書王伾下劣闒葺不能如叔文有大志唯務金帛寶玩為無門大匱上開一孔使足以受物夫妻寢止其上唐書郭况家富以玉器盛食故東京謂郭家為瓊廚金窟拾遺録扈纍字伯重京兆人常隨青牛先生先生姓方正曉知星曆風角鳥情得其術有婦無子後亦喪婦獨居道側以磚為障施一廚床食宿其中魏略母廚盛薪收范曄家樂器服玩普皆稱麗奴妾亦盛飾母住止單陋惟有一廚盛柴薪沈約宋書衡陽王鈞母區貴人卒鈞哀毀甚先是貴人以叉廚子賜鈞以為玩弄貴人亡後每歲時及朔望輒開視再拜鯁咽見者皆為之悲齊書陸澄當世稱為碩學讀易三年不解文義欲撰宋書竟不成王儉戲之曰陸公書廚也上謝弘微臨終語左右曰有一廚書須劉領軍至可於前燒之慎勿開也南史火斗通俗文曰火斗曰尉紂欲重刑乃先作大尉斗以火熱之使人舉不能勝爛手與妲己為戲笑帝王世紀韓康伯年數歲母殷氏時大寒母方為作袴令康伯捉尉斗而謂之曰且著襦尋當作復袴康伯曰火在斗中而柄尚熱今既著襦下亦當暖晉書張蕪小時母謂其寒且作袴蕪曰且作襦如尉斗著火柄亦熱別傳尉遲逈反於鄴時李穆在并州高祖獻慮其為逈所誘遣使往布腹心穆遽奉尉斗於高祖曰願以此尉安天下也高祖大悅隋書炮烙始糟丘生於象箸炮烙始於尉斗淮南子中朝有人畜銅藻盤旦夕恆鳴張華曰與洛鍾宮商相諧故聲相應錯爐之乃止異苑惠帝征伐成都軍敗帝渴帳下賫五升銅灌就民家取水就灌飲之四王起事劉悛少與齊武款好帝常至悛宅晝臥覺悛自奉金藻灌受四升水以沃盥因以與帝前後所納稱此齊書月支國有佛澡灌受二升許青石水羅勒色碧玉班白受水無定隨其多少西域諸國志褻器玉府掌王燕衣服凡褻器周禮天官飲器智伯圍趙襄子於晉陽襄子大敗智伯軍殺智伯漆其頭以為飲器春秋後語胸奴破月氏王以其頭為飲器史記蘇則為侍中舊侍中親省起居故俗因謂執虎子始蘇則同隱吉茂後見嘲之曰仕宦不已執虎子魏書吹作角聲吳時嘉興倪彥思忽有鬼魅其家能與人語飲食如人唯不見形思乃延道士逐之酒肴既設道士便擊鼓召請諸神魅乃伏虎於神坐吹作角聲以亂音頃刻道士忽覺背中冷驚起解衣乃伏虎也録異傳武帝崩時遺詔以雜道書四十卷置棺中至延康二年河東功曹李及入上黨抱犢山採藥於巖室中得此書盛以金箱卷後題日月是武帝時河東太守張純以箱笈書奉上之武帝時左右見之涕泣曰此是帝崩時殯斂物宣帝愴然以書付茂陵安合如故內傳作鏡鏡景也有光景也釋名鑒謂之鏡廣雅尹壽作鏡玄中記鏡銘武王踐祚鏡之銘也曰見爾前必慮爾後大戴禮玉鏡桀失玉鏡用其噬虎尚書帝命期鄭玄注曰鏡喻清明之道虎喻暴也周穆王時沮渠國貢火齊鏡廣三尺六寸暗中視物如晝人向鏡中則響應之拾遺録周穆王時有如石之鏡此石色白如月照面如雪謂之月鏡上池泥鍊鏡方丈山池泥百鍊成金鏡色青可照魑魅上武都丈夫化為二女蜀王娶以為夫人無幾物故葬於武都以石作鏡一枚表其墓蜀王本紀金鏡秦失金鏡魚目入珠尚書考靈耀金鏡喻明道也始皇不韋子言亂真也方鏡高祖入咸陽宮周行府庫有方鏡九寸表裏明人直來照之影則倒見以手掩心而來即腸胃五臟歷然無礙人有病在內則掩心而照之即知病之所在女子有邪心則膽張心動秦始皇帝以照宮人膽張心動者則殺之西京雜記宣帝被收繫郡邸獄臂上猶帶史良娣合綵婉轉繩繫身毒寶鏡一枚如八珠錢舊傳此鏡照見妖魅佩之者為天神所福宣帝從危獲濟及紹大位每照此鏡感咽移辰帝崩鏡不知所在上玉瑩石精郭舍人曰四珠籀文章皆有組索兩人相見朔能知之為上客東方朔曰此玉之瑩石之精表如日光裏如衆星兩人相覩相見知情此名為鏡漢書夏侯惇從征呂布為流矢所中傷左目時夏侯淵俱為將軍軍中號惇為盲夏惇惡之每照鏡恚發輒撲鏡著地魏略張裕曉相術每舉鏡視面自知刑死未嘗不撲之于地蜀志劉敬宣八歲喪母四月八日敬宣見衆人灌佛乃拔頭上金鏡以為母灌因悲泣不勝沈約宋書殷仲文在東陽照鏡而不見其頭面旬日而戳上甘卓將破誅引鏡不見其頭蕭方等三十國春秋慕容垂攻鄴符丕遣其從弟龍請救乃遺謝玄青銅鏡黃金宛轉繩等以為之信上背三公字綦母珍之有一銅鏡背有三公字常語人曰徵祥如此何患三公不至齊書陸慧曉遷太子洗馬廬江何點常稱慧曉心如照鏡遇形觸物無不朗照上王珍國武帝起兵東昏照珍國以衆還都使出屯朱雀門為王茂所敗及入城密遣郗纂奉明鏡獻誠於梁帝帝斷金以報之後侍宴帝曰卿明鏡尚存黃金何在珍國曰黃金謹在臣不敢失墜梁書到溉子鏡字圓照初在孕其母夢懷鏡及生因以名焉上文帝委任高熲後右衛將軍龐冕及將軍盧貴等前後短熲於上上怒之皆被踈黜因謂熲曰獨孤公猶鏡也每被磨瑩皎然益明隋書太宗謂群臣曰夫以銅為鏡可以正衣冠以古為鏡可以知興替以人為鏡可以明得失朕常保此三鏡以防已過今魏徵殂猶一鏡亡矣唐書陽符一名陽燧取火於石陰符一名陰燧取火於月並入銅作鏡名曰水火之鏡魏名臣高堂隆奏至人之用心也若鏡不將不迎應而不藏故勝物而無傷莊子心善知人者如明鏡自知者如淵𧉻鏡以曜明故鑒人𧉻以含珠故內照符子正鬢眉古人知目短於自見故以鏡觀面智短於自知故以道正已鏡無見疵之罪道無明過之惡目失鏡則無以正鬢眉身失道則無以知迷惑韓子萬乘之主人之阿也亦甚矣而無所鏡其殘亡無日矣孰當可鏡其惟士人乎鏡明已也小士明已也大呂氏春秋拭以玄錫明鏡之始朦然未見形容也及拭之以玄錫磨之以白氈則鬢眉微毛可得而察淮南子照形承食鏡便於照形承食不如竹簟上坐見四鄰高懸大鏡坐見四鄰上或問知將來吉凶為有道乎答曰用鏡九寸自照有所思存七日則見神仙知千里外事也明鏡用一或二謂之日月或用四謂之四規鏡抱朴子萬物之老者其精皆能假託人形以炫人於鏡中亦能易其真形是以入山道士以明鏡徑九寸懸於背者老魅未敢近或後來者視鏡中其是仙人及山人好神者鏡中故如人形上晉孝武將講孝經謝公兄弟與諸人私相講習車武子欲問謝謂袁羊曰不問則德音有遺多問則重勞二謝袁曰何嘗見明鏡疲於屢照世說楊真孟宗周覽求師經歷齊魯資用將乏磨鏡自給益部耆舊傳徐孺子常事江夏黃公黃公薨往會其葬家貧無以自致賫磨鏡具自隨賃磨取資然後得前既至祭而退海內士品望蟾閣上有青金鏡廣四尺元光年中祗國獻此鏡照見魑魅百鬼不能隱形洞冥記引鏡為刀河東孫博能引鏡為刀屈刀為鏡神仙傳孫策既殺于吉每獨自髣佛見在其左右引鏡自照見在鏡中因掊大叫瘡皆裂須臾而死又吳曆曰策為許貢客所傷引鏡自照曰面如此嘗可復建功立事乎因推几大叫瘡裂而卒搜神記文獻曾令郭璞筮己一年中吉凶璞曰當有小不吉利可取廣州二大罌盛水置床帳二角名曰鏡耗以厭之某時撤罌去水如此其災可消至日忘之尋失銅鏡不知所在後撤去水乃見所失鏡在於罌中罌口數寸鏡大尺餘王公後令筮鏡罌之意璞云撒罌違期故致此妖邪魅此為無他故也使燒車轄以擬鏡立出續搜神記林慮山下有一亭人過宿者或病或死常云十許男女各雜衣或白或黑輒來為害郅伯夷者過宿於此獨坐誦經忽有十餘人來與伯夷並坐因共蒲搏於是伯夷密以鏡照之乃是一群犬因執燭而起佯誤以燭燒之衣毛乃燋伯夷懷刀殺一人中之遂死成犬餘悉走去上昔有夫婦將別破鏡各執半以為信其妻與人通其鏡化鵲飛至夫前其夫乃知之後人因鑄鏡為鵲安背上自此始也神異經頃得此鏡既明且好形觀文藻世所希世意甚愛之故以相與明鏡可以鑒形淑答書曰今君征未旋鏡將何施明鏡鑒形當待君至秦嘉與婦徐淑書蒼梧太守吳巨據城邑不恭王命孫權遣步隲為交州喻巨巨照鏡不見其頭隲因入斬之王隱晉書石虎初衣衮冕將祀南郊照鏡無首大恐怖不敢稱帝乃自貶為王魏傳梁河東王譽昭明子也將敗引鏡照面不見其頭為元帝所殺南史太和九年羅立言為京兆尹嘗因入朝既冠帶引鏡自視不見其首遂語於季弟約言後果為李訓連坐誅死宣室志隋煬帝喜奢侈幸江都王世充獻銅鏡屏帝甚喜擢江都通守河洛記日蝕亦昏蘇威有鏡殊精好日蝕既鏡亦昏黑無所見威以為左右所污不以為意他日日食半缺其鏡亦半昏如之於是始寶藏之後匱內有聲如磬尋之乃鏡聲也無何其子夔死後更有聲無何而威敗後不知所走隋唐嘉話隋御史王度家有寶鏡云是蘇綽家舊物也大業中有胡僧之宅上常有碧光連日絳氣屬月此寶鏡氣也但以金烟薰之玉水洗之又以金膏塗之珠粉拭之雖藏泥中不晦矣蒲陜間疫甚度令小史張龍駒持鏡照之諸病皆驚起云見龍駒持一月來相照並愈其夜龍駒夢一人朱冠紫服曰我即鏡精也名曰紫珍上唐中宗令揚州造方丈鏡鑄銅為桂樹金花銀葉帝每常騎馬自照人馬並在鏡中僉載夷則鏡天寶中陳仲躬居洛陽清化里有大井好溺人一日有敬元頴請謁飾鉛粉衣緋緑衣曰此井有毒龍請命匠淘之仲躬命匠入井獲古銅鏡夜見元頴謝曰某本師曠所鑄十二鏡中第七者貞觀中為許敬宗所墮其鏡背科斗書云維晉新公二年七月七日午時首陽山白龍潭鑄於鼻題云夷則之鏡博異志天寶中揚州進冰心鏡青瑩耀目背有盤龍勢如生動鼻如明月珠焉先是有老人自稱姓龍名護有小童曰玄冥至鏡所云老人解造真龍令玄冥入爐所扄閉戶牖三日開戶俱失所在鏡匠呂暉移爐置船以五月五日揚子江心鑄之後大旱不雨葉法善祈鏡龍于凝陰殿須臾雲氣散布甘雨大𪷏異聞集葉法善有一鐵鏡鑒物如水人每有疾病以鏡照之盡見臟腑中所滯之物即以藥療之竟至痊瘥天寶遺事天寶初有獻書闕下言巴蜀之間有石鏡見于巖之畔仁壽之字昭然可見文苑英華序少府監裴匪舒為高宗造鏡殿成上與劉仁軌觀之仁軌驚趨下殿上問其故對曰天無二日土無二王通視四壁有數天子不祥孰甚焉上遽令剔去鑑張藝叟家舊畜鏡傳為楊妃故物徑尺許厚七分背文精古有銘其略曰粉壁交映珠簾對看潛窺聖淑麗則常端聖淑字若少空有並后之象明皇以八月五日生始置誕節名千秋藩鎮進鏡紫絲承露囊此幾是耶畫墁録鏡影相字宋璟未第時因于日中覽鏡鏡影忽成相字璟因此自負遂修相業後如其志天寶遺事高季輔兼吏部侍郎凡所銓敘時稱允當太宗嘗賜金背鏡一面以表其清鑒焉舊唐長興于相琮與舉人裴邱善邱有一古鏡嘗所寶者琮布素時曾一照之分明見有朱衣吏導從他皆類此其鏡卒亦墜矣玉泉子元相國之鎮江夏也嘗秋夕登黃鶴樓遙望江濱有光若殘星焉乃令人往觀之至其所乃釣船也詢彼漁云適獲一鯉光則無之乃攜鯉而來命剖之腹中得古鏡二如古錢大以面相合背則隱起雙龍雖小而鱗鬛髯爪皆具既磨瑩則常有光耀公寶之置巾箱中及相國薨鏡亦亡去小說舊聞李德裕長慶中廉問浙右會有漁人于秦淮垂機網下深處忽覺力重異于常時及斂就水次卒不獲一鱗但得古銅鏡可尺餘光浮於波際漁人取視之歷歷盡見五臟六腑血縈脈動竦駭氣魄因腕戰而墜漁人偶話於旁舍遂聞之于德裕盡周歲萬計窮索水底終不復得松窗録飛精長安任仲宣家有寶鏡謂之飛精識者云三代物後有八字乃近籀篆云水銀陰精百練成鏡後仲宣南牧洞庭風浪泊舟夢一道士赤衣乘龍持鏡而去且云此鏡水府之寶出世有期今當歸我夢覺亟視篋已失所在龍城録神物王宗受建之族子得一古鏡鏡下有篆文十二字忽照見一青衣小兒坐酒樓上令人訪之青衣隨至曰吾失此百年矣此神物也終當化去不若還我宗受出而與之青衣剖腹納鏡而去小兒傳辟谷吐納之術外史檮杌呂蒙正為相有朝士藏古鑑能照二百里欲因弟獻以求知公曰吾面不過楪子大安用照二百里聞者歎服歸田録明徹驚人熙寧末齊南陵耕者破塜得古圓鏡大小二徑六七寸明徹驚人非他鑑比其背郭皆有字可讀大為小篆小為正隸附篆為流水美蕖茂林叢竹又有孤陵野鶴下有老人倚杖岸幘逍遙其間附麗亦為雜花皆古簡不可識其詞曰陰陽合配日月兩相會白玉芙蓉匣翡翠瓊瑤帶同心人心相親照心照膽保千春煉形巧冶瑩質良工如珠出匣似月停空當扉寫翠對臉傳紅綺窗繡屋俱含影中宋朝類苑嘉祐中有吳僧持一寶鑑云齊戒照之見前途吉凶沈括伯兄為京寺丞衣緑往照之鑑不甚分明髣佛見人衣緋而坐不數月以英宗覃恩果賜緋後其僧至京師茶景繁為御史嘗照之見著貂蟬甚喜不旬日攝官奉祠遂假貂蟬筆談安陸石巖村耕夫得一鏡光明瑩然不為土所蝕視之可見十餘里外草木人物三人者互欲得之遂破三假猶照數里塵史照數十里何遠字楚言幼隨父宦河朔有一人持古鏡謂之云可照數十里因試之郊外鏡中隱隱如飛繩不絶詢之乃二十里開河擲土土空中也南墅間談慶曆中有宦者以罪謫居維揚藏一古鑑圓徑尺餘云是禁中舊物鑑背鑄成兔形甚精巧每至月滿夜持鑑當月照之則兔形却在鑑中人莫究其理墨客揮犀軒轅鏡李士寧道人蓬州人先得塗氏所藏軒轅山鏡洞見遠近李曾為蔡君謨正首骨出入張方平門下蓋異人也李壁安石詩注盧彥緒曾於壙中得寶鏡一枚背是金花持以照日花如金輪廣異記詳墓孟蜀時軍校張敵得一古鏡模闊尺餘光照室寢處不施燈燭將求磨滌之有貧士見而歎禮曰久知寶在蜀中一見足矣然此鏡不久當亦歸耳敵益珍藏自得鏡無疾病樵牧間談仙銅傳王希默簡淡無他好惟以對鏡為娛整飾為鬚終日無倦以杜子美有勳業頻看鏡之句遂作策勳亭仍自號勳叟收古今善鏡典衣賞無難色居長洲結親友之蓄異鏡者數人間日會聚樂飲各出鏡傳玩評品抵掌極歡而罷鄉人目曰鏡社希默又集載集凡言鏡者成二十卷號仙銅傳云清異録元豐中東坡自齊安過黃州獲一鏡其背銘云漢有善銅出自白陽取鑄為鏡清明而光左龍右虎輔之兩傍其字如粟大篆款甚精妙白陽疑白水之陽其銅黑色如漆照人微小古鏡然此道家聚形之法也仇地筆記楊慎矜慎餘慎名皆偉儀形風韻高朗愛客喜飲籍甚于時慎名嘗覽鏡見其鬚面神彩有過於人覆鏡歎惋曰吾兄弟三人盡長六尺餘有如此貌如此才而見容當代以期全難矣何不惜我少體弱耶竟如其言舊唐馮履謙七歲讀書數萬言九歲能屬文自管城尉丁艱補河北尉有部人張懷道任河陽尉與謙疇舊餉一鏡焉謙召縣吏遍示之咸曰維揚之美者甚嘉也謙謂縣此張公所致也吾與之有舊雖親故不坐著之章程吾效官但以俸祿自守豈私受遺哉昌言曰清水見底明鏡照心余之效官必同於此復書於使者乃歸之聞者莫不欽尚新語磨鏡取資海內王品子曰徐孺子常事江夏黃公公卒孺子往會葬無資以自致齎磨鏡具自隨每所在賃磨鏡取資然後得前既至祭畢而還藝文照面一眼徐鉉得一鏡照面只見一眼祕閣間談江心鏡揚州舊貢江心鏡五月五日揚子江心中鑄也或言無百鍊者六七十鍊則止易破難對往往有鳴者國史補周靈王起昆陽臺戎胥國獻火齊鏡高三尺暗中視物如晝向鏡則聞影應聲周人見之如神靈王末不知所之拾遺記君子有三鑒世人鏡鑒前惟順人惟賢鏡惟明夏商之衰不鑒於湯禹也周秦之弊不鑒於民下也側辨垢顏不鑒於明鏡也荀悅申鑒銘古鏡銘云仙山並照知水齊名花朝艷采月夜流明龍盤五瑞瓀鸞舞儛雙情精傳聞仁壽始驗銷兵五月五日東觀餘論溫嶠為劉越石長史北討劉聰得玉鏡臺嶠從姑劉氏有女美嶠有意自媒數日乃下玉鏡臺姑喜既婚交禮女曰我固疑是老奴果如所小也世說胡太后使沙門靈昭造七寶鏡臺合有三十六戶每室別有一婦人手各執鎖才下一關三十六戶一時自閉若抽此關諸門皆啓婦人各出戶前三國典略元嘉中韋朗為廣州刺史作銅鏡臺一具御史中丞劉禎請以事追免朗官宋起居注因形叉枝也因形名之也爵叉者叉頭施爵也釋名神女玉叉元鼎元年起招仙閣有神女留一玉叉與帝帝以賜趙婕妤至昭帝元鳳宮中人猶見此叉共謀欲碎之明旦視匣中唯見白燕直升天去故宮人作玉叉因改名玉燕叉言其吉祥洞冥記化黿簪叉靈帝時江夏黃氏母浴而化為黿入於深淵其後人時見出浴簪一銀叉猶在其首續漢書漢獻帝為李催所敗帝傷指伏后以繡紱拭血刮玉叉以拂於創應手則愈拾遺記龍鸞叉魏文帝納美女薛靈藝有獻火珠龍鸞叉帝曰珠翠尚不能勝况龍鸞之重乎上石季倫愛婢翔風別玉聲金色為倒龍之佩營金為鳳冠之叉言刻玉如倒龍之勢鑄金象鳳凰之狀結繡繞楹舞於晝夜使聲聲相接謂之恆舞欲有所召者不呼姓名悉聽佩聲視叉色玉聲輕者居前金色艷者居後以為行次而進也上魏明帝時昆明國貢嗽金鳥常吐金屑如粟用飾叉佩謂之廣寒金宮人因相嘲曰不服辟寒金那得帝王心上蟠龍叉蟠龍叉梁冀婦所制崔豹古今注吳郡有徐君廟東陽長山縣吏季瑫義熙中遭事在都婦過廟乞恩拔銀叉為願未至富陽有白魚跳婦前剖腹得所願叉夫事尋解異苑潯陽參軍夢一婦人前跪自稱先葬近水淪沒誠能見救雖不能富貴可令君薄免禍參軍答曰何以為志婦人曰君見渚邊上有魚叉即我也參軍明旦覔果見一毀墳其上有叉移置高燥處却十餘日參軍行至東橋牛奔直趨水垂墮忽轉正得無恙也幽明録吳人夢季客賈去家與諸賈人語曰吾臨行就婦求金叉婦與之吾乃置戶楣上忘白婦說妻夢見季死前金叉在戶上妻取得發哀一年季却還録異傳頭上著叉夜臥墮靴履中者婦人與外夫殺之也神仙占駭雞剝駭雞以為叉駭雞犀也黃香九宮賦金雀叉頭戴金雀叉腰佩翠琅玕陳司馬美女篇合歡叉頭戴合歡叉魏陳思王美女篇寶叉千金今致寶叉一雙價值千金可以輝首淑答曰未奉光儀則寶叉不設秦嘉與婦淑書耳珠耳珠曰璫風俗通珥瑱也瑱以玉充耳也說文瑱鎮也懸璫耳旁不欲使人妄聽自鎮重也釋名武王馳紂商師大崩帝辛登稟臺取天知玉珥及鹿玉衣食以自焚鹿玉則銷天知珥在火中不銷周書齊侯將納公命無受魯貨申豐從女賈以幣錦二兩縛一如瑱注云瑱充耳也易懷藏也昭六十美其一齊威王夫人死有十孺子薛公欲知所立人為十玉珥而美其一獻於王以付十孺子明日賜美珥所在乃立之韓子淳于髡謂齊威王曰前有墮珥後有遺簪此可飲八斗而醉二參史記七美珥齊王夫人有七美珥戰國策脫簪珥武帝譴責鈎戈夫人脫簪珥叩頭史記合浦圓珠趙飛燕為皇后其女弟上遺合浦圓珠珥西京選一卞太后唯約儉不尚華麗無文繡珠玉器皆黑漆太祖嘗得名璫數具命后自選一具后取其中者太祖問其故對曰取其上者為貪取其下者為詐故取其中者魏書范慎時在坐嘲諸葛恪曰馬雖大畜稟氣於天今殘其耳豈不傷仁恪答曰母之於女恩愛至矣穿耳附珠何傷於仁吳志注環臂環臂謂之釧通俗文延安中河間太守劉照夫人卒於府後太守至夢見一好婦人就為室家持一雙金鏆與太守不能名婦人乃曰此鏤鏆鏤鏆者其狀如紐珠大如指屈伸在人太守得置枕中前太守迎喪言有鏤鏆開棺視夫人臂果無復有鏤鏆焉祖台之志怪樂安章沉病死未殯而蘇云被録到天曹主者是其外兄斷理得免見一女同時被録乃脫金釧一雙託兄以與主者亦得還遂共宴接女云家在吳姓徐名秋英沈後尋問遂得之女父母因以女妻沈甄異記交河王麴崇裕兄昭少好學嘗有鬻異書於市者其母將為買之搜索家財不足其價唯噬中有金叉數枚既而歎曰何愛此物令吾子不有異聞手促令貨易此書昭後位司膳卿頗以詩詠流譽唐書刑取其環紂刑鬼侯之女取其環春秋繁露羊祐年五歲令乳母取所弄玉環乳母曰汝先無此物祐乃鄰人李氏東牆桑樹中探得之李氏見驚曰余亡兒所失物也乳母具言前事李氏悲惋時人異之李氏之子即羊祐前身也晉書傅暢年五歲父友見而戲解暢衣取其金環與左右暢不惜以此賞之後選入侍講東宮上武丁貴嬪武帝鎮樊城嘗登樓以望見漢濱五彩如龍丁有女子臂繞頭則貴嬪也帝贈以金環納之時年十四梁書咸陽王禧弟樹字秀和位宗正卿後奔梁武帝尤器之後復歸魏初辭梁其愛妹玊兒以金指環與樹常著之寄以還梁表必還之意朝廷知之俄而賜死後魏書戚姬以百鍊金為環照見指骨上惡之以賜侍兒西京雜記劉寵喪母時危亂墳墓發傷寵乃矯母令家貧無財唯有手上金環賣造墓供送免發掘益部耆舊傳吳王潘夫人以火齊指環掛石榴枝上因其處臺名曰環榴臺時有諫者云今吳蜀爭雄還榴之名將為妖乎權乃翻其名為榴環臺也拾遺録王諿琅琊人也仕梁為南康王記室亡後數年妻子困於衣食歲暮諿見形謂婦曰卿困乏衣食妻因與之酒別而去諿曰我若得財物當以相寄後自小女探得金指環一隻集靈記沛郡秦拊義熙中至曲阿村日暮失路遠見火光投之屋有小女因寄宿曉臨別女以指環與拊拊去回顧乃是塜焉甄異傳係冠笄係也所以係冠使不墜也釋名笄簪也士以骨大夫以象三禮圖司馬期欲以妾為內子訪於左史倚相曰吾有妾而願欲笄之倚相止之國語范文子暮退於朝武子曰何暮也對曰有秦客辭於朝大夫莫之能對也吾知三焉武子怒曰大夫非不能也讓父兄也爾童子而三掩人於朝吾不在晉國亡無日矣擊之以杖折其委笄上磨笄趙襄子之姊為代王夫人襄子併代殺王平其地其姊聞之泣而呼天磨笄自殺代人憐之名其地為磨笄山春秋後語粉分也研米使分散也粉赤也染粉使赤以著頰上也釋名造粉墨子曰禹造粉燒鉛紂燒鉛錫作粉傅粉惠帝侍中皆傅脂粉漢書順帝時所除官多不次李固奏免百餘人此等既怨共作飛章誣固曰大行在殯路人掩涕固獨胡粉飾貌搔頭弄姿盤旋偃仰曾無慘怛之心續漢書粉不去手何晏自喜動靜粉白不去手行步顧影魏書自傅邯鄲淳詣臨淄侯植時天暑植取水浴以粉自傅科頭胡舞擊劍誦小說顧謂淳曰邯鄲生何如也魏略若毛嬙西施之美麗無益吾面用脂澤粉黛則倍其初言先王仁義無益於治明法度必賞罰則國之脂澤粉黛韓子巴郡江西縣有清水穴巴人以此水為粉則皓曜鮮芳嘗貢京師名為粉水華陽國志夢粉婦人夢粉飾為懷妊夢書和椒塗壁石崇以胡粉和椒塗壁曰椒房畫眉黛作黱畫眉也說文黛代也滅去眉毛以此代其處也釋名點黛染青石謂之點黛通俗文不施明德馬皇后眉不施黛獨左眉角小缺補之如粟後漢書青雀頭河西王沮渠蒙遜獻青雀頭黛百斤宋起居注香澤者人髮恆枯瘁以此濡澤之也脣脂以丹作之象脣赤也釋名江淮以北謂面脂為面澤世說販脂翁伯販脂而傾縣邑漢書處不能潤孔奮為姑臧長清儉人或譏之以身處脂膏不能自潤上典櫛晉舊儀典櫛三人掌宮中櫛膏沐北史后妃傳作燕脂取藍花搗以水洮去黃汁作小餅如手掌著溫草臥一宿便陰乾欲用燕脂以水浸之三四日以水洮去黃汁盡得赤汁而止也博物志焉支山祁連山焉支山能畜養胸奴失此二山乃歌曰失我祁連山使我六畜不蕃息失我焉支山使我婦女無顏色河西舊事燕支葉似葪花似蒲公出西方土人以染名為燕支中國人謂之紅藍以染粉為面色謂為燕支粉今人以重絳為燕支非燕支花所染也燕支花所染自為紅藍爾舊謂赤白之間為紅即今所謂紅藍也古今注染緋習鑿齒與燕王書曰此下有紅藍足下先知之不北方人採取其花染緋黃名妻班固曰胸奴名妻作閼氏言可愛如燕支注面以丹注面曰的的灼也此本天子諸侯有群妾者以次進御有月事者止而不御重以口說故注此於面灼然而識也釋名施華的王粲神女賦曰施華的結羽叉點雙的珥明璫之迢迢黔雙的以發姿傅玄鏡賦武帝見西王母巾箱中有一卷書王母曰此五嶽真形圖昨青城諸仙就我來求今當付之漢武內傳元凶劭弒逆南陽公主見女巫嚴道育云天神當賜符應時主夕臥見流光相隨狀若螢火遂入巾箱化為雙珠圓青可愛因是巫蠱而敗宋書衡陽王鈞常手自細書寫五經部為一卷置於巾箱中以備遺忘侍讀賀玠問曰殿下家自有墳素復何須蠅頭細書別藏巾箱中答曰巾箱中有五經便於檢閲且一經手寫則永不忘諸王聞而爭效為巾箱五經自此始也齊書威法濟者義興人其兒年二十得病經年有神來語言床席不淨神何處得坐曰有漆巾箱甚淨神何不入中因內新果於箱中覺有聲以蓋覆之於是便聞箱中動搖即以衣傳之可五升米重而病愈世說晉孝武太元末每聞手巾箱中有鼓吹鞸角之音帝是歲崩天下大亂異苑飯衣器簟笥飯及衣之器說文上問第五倫卿為市掾人有遺卿母一笥餅卿從外來見之奪母笥探口中餅出之倫對曰實無此衆人以臣愚蔽故為生此語東觀漢記笥麥免肩上聞王武將軍至復驚去馮異進一笥麥飯免肩上一笥飯世祖微時繫南鳴市獄市吏以一笥飯與之續漢琥珀笥宣帝以琥珀笥盛身毒寶鏡西京雜記孝靈帝建寧中京師長者皆以葦辟方笥為粧具時有識者竊言葦方笥郡國讞篋也今珍用天下皆當有罪讞於理官也後黨錮皆讞廷尉人名悉入方𥯤笥中斯為驗矣風俗通板作板作笈驢上負也說文負書笈學士所以負書箱如冠籍箱也風俗記徐稚字孺子公車五徵皆不降志其有死喪負笈赴弔謝承後漢書袁閎字夏甫汝南人也博覽群書常負笈尋師變易姓名上蘇章字士成北海人負笈從師不遠萬里上高弘字伯武河內山陽人為琅琊相到官自負笈單步入界聽採風俗上負笈三輔方儲字聖明負笈到三輔無術不覽上郎宗負笈賣卜給食諸公表上博士徵宗宗負笈遁去上步行負笈李固父為三公而固步行負笈千里從師本傳上元夫人語武帝曰阿母令以瓊笈妙蘊發紫臺之文賜汝漢武內傳南楚江沔之間籠謂之篣或謂之笯陳楚宋魏之間謂之庸君今薰籠是也方言大瓠為籠卞彬性飲酒以大瓠為火籠什物多諸詭異自稱卞田居婦為傳蠶室齊書火籠詩臨賀五正德為吳郡太守正德自謂應居諸謫心常怏怏後奔魏初去之始為詩一絶內火籠曰楨幹屈曲盡蘭麝氛氳銷欲知懷炭日正是履冰朝梁書漢制天子以象牙為籠上皆散花文後宮則五色綾文西京雜記錦里錦金也作之用功重其價如金故制字帛與金也釋名歷代尚未有錦而成都獨稱妙故三國時魏則市於蜀吳亦資西蜀至是始乃有之丹陽記錦城在益州南里橋東流江南岸昔蜀時故錦宮也處號錦里城墉猶在益州記織錦羅在中尚坊三署皆數百人錦有大登高小登高大明光小明光大博山小博山大茱萸小茱萸大交龍小交龍蒲桃文錦班文錦鳳凰朱雀錦韜文錦桃核文錦或青綈或白綈或黃綈或緑綈或紫綈或蜀綈工巧百數不可盡名也鄴中記周成王時有因祗之國獻女工一人善織以五色絲內於口中手引而結之則成文錦其國人來獻有雲崑錦文似雲從山嶽中出有列堞錦文似雲霞覆城雉樓堞雜珠錦文似貫珠珮也有篆文錦文似大篆之文也有列明錦文似列燈燭也幅皆廣三尺拾遺記重錦衛遷于曹齊桓公歸夫人魚軒重錦三十兩左閔束錦晉侯先歸功享六卿于蒲囿賄荀偃束錦加璧襄三錦左師見夫人之步馬者問之對曰君夫人氏也左師曰誰謂君夫人余胡弗知圉人歸以告夫人使饋之錦與馬先之以玉襄五製錦子皮欲使尹何為宰子産曰少未知可否子皮曰願吾愛之使夫往而學焉亦愈知治矣子産曰人之愛人求利之也今吾子愛人則以政猶未能操刀而使割也其傷實多子之愛人傷之而已子有美錦不使人學製焉大官大邑身之所庇也而使學者製焉其為美錦不亦多乎襄六晉合諸侯次於衛地叔駙求貨於衛淫芻蕘者衛人使遺叔向一杯羹與一篋錦曰諸侯事晉未敢攜二况衛在君之宇下何敢有異志芻蕘者異於他日敢請之叔向受羹反錦昭四懷錦平邱之會公不與盟晉人執季孫意如以幕蒙之使狄人守之司鐸射懷錦奉壺飲冰以匍匐焉守者禦之乃與之錦而入上齊侯將納公命無受魯貨申豐從女賈以幣錦二兩縛一如瑱適齊師謂子猶之人高齮能貨子猶為高氏後粟五千庾高齮以錦示子猶子猶欲之齮曰魯人買之百兩一布以道之不通先入幣財子猶愛之昭六吳人藩衛侯之舍子服景伯為子貢曰夫諸侯之會事既畢矣侯伯致禮地主歸餼以相辭也今吳不行禮於衛而藩其君舍以難之子盍見太宰乃請束錦以行哀上孔子反衛夫人南子使人謂之曰四方君子之來者必見寡小君子不得已見之夫人在錦帷中孔子北面稽首典略錦被蔣欽字公奕為右將軍孫權入其內母練帳縹被權歎其在貴守約勑御府為其母作錦被改易帷帳吳志繒錦維舟甘寧住止常以搗錦維舟去輒割棄以示奢諸葛融父兄質素雖在軍旅身無綵飾而融錦罽文繡獨為奢侈上重錦蜀遣使獻重錦十端環氏吳紀陸遜攻劉備於夷陵備捨船步走燒皮鎧以斷道使兵以錦挽車走入白帝江表傳袁甫字公曹稱所知於領軍何勗勗曰君稱其好人則多所宜何以唯欲使宰民不可為臺閣職手甫曰人各有能此人雖好好莫過錦錦不可以為幍晉書織錦回文竇滔妻蘇氏善屬文苻堅時滔為秦州刺史被徙流沙蘇氏思之織錦為回文詩以寄滔滔循環宛轉以讀之詞甚悽切上石季龍僣立遷都於鄴傾心事佛圖澄有重於勒下書澄衣以綾錦乘以雕輦上宋元凶邵將作難賜袁淑等袴褶又就主人取錦裁三尺為一假又中裂之分蕭斌與淑及左右使以縳袴褶南史江淹為宣城太守時罷歸始泊禪林寺渚夜夢一人自稱張景暘謂曰前以一匹錦相寄今可見還淹探懷中得數尺與之此人大恚曰那得割截都盡願見立遲謂餘尺既無用以遺君自邇淹文章躓矣齊書孝武時至彭城宋江夏王義恭獻蠟燭十梃武陵王駿獻錦一匹後魏書千機織錦齊畢義雲家有千餘機織錦并造金銀器物北史太祖曾在同州與郡公宴集出錦罽及雜綾絹數假命諸將樗蒲取之後周書王方慶天后初為廣州都督境內清肅手製褒之曰朕以卿歷職有稱故授此官既美化遠聞實副朝寄今賜卿雜綵六十假并瑞錦等物以彰善政也唐書大曆初代宗詔許宰臣元載王縉及左僕射裴冕戶部侍郎判度支第五琦京兆尹黎幹各出錢三十萬宴郭子儀于子儀私第內侍魚朝恩參其會焉朝恩出錦三匹羅五十匹綾一百匹為子儀纏頭之費極歡而罷舊俗賞歌舞人以錦綵置之頭上為之纏頭宴享加惠借以為詞上大曆中代宗勑曰王制命市納賈以觀人之好惡布帛精粗不中度廣狹不中量不鬻於市漢詔亦云纂組文繡害女工也朕思以恭儉克已敦朴化人每尚素玄之服庶齊金玉之價而風俗不一踰侈相高侵弊於時其來自久耗縑繒之本資錦綺之奢異綵之綺文恣其誇竟今師旅未戢黎元不康宣使淫巧之工更虧恆制在外所織造大張錦軟錦瑞錦琇背及大𦅘錦竭鑿六硬已上錦獨窠文紗四尺幅及獨窠吳綾獨窠司馬綾等並宜禁斷其長行高麗白錦雜色錦及常行少文字綾錦花文所織盤龍對鳳麒麟獅子天馬辟邪孔雀仙鶴芝草萬字雙勝及諸織差樣文字等亦從禁斷上張萬福為和州刺史賊許果至楚州大掠節度使韋元甫命萬福追討未至淮陰果為其將康自勸所逐自勸擁兵繼掠循淮南東萬福倍道追而殺之代宗發詔以勞之賜衣一襲宮錦十雙上夏桀殷紂之時婦人錦繡文綺之坐席衣以綾紈常三百人太公六韜周靈王起昆昭之臺以享群臣張鸞章錦文如鸞翔拾遺記吉日甲子天子乃執白圭玄璧以見西王母好獻錦組百純西王母再拜受之穆天子傳魏文侯與田子方語有兩童子衣錦而侍於君前田子曰此君之寵子乎文侯曰非也此其父死於戰此其幼孤也寡人收之說苑帝見西王母巾器中有一卷小黃書盛以紫錦衣囊帝問此書是仙方耶不審其因可得瞻盻不王母出以示之此五嶽之真形圖也文祕禁豈汝穢質所宜佩王母即命女宋靈賓更取一圖以與武帝靈賓採懷中得一卷盛以雲錦之囊王母起立手以付帝漢武內傳元鼎元年起招仙靈閣於甘泉宮西編翠羽麟毫為廉有走龍錦有翻鴻錦郭子橫洞冥記五色錦武帝得二師天馬以玫瑰石為鞍轡鏤以金錦以緑地五色錦為蔽泥西京雜記綺帳淮南王為八公張錦綺之帳燔百和之香神仙傳蒙錦被陳元方遭父喪骨立其母愍之以錦被蒙其上郭林宗往弔見而責之賓客絶百許日語林錦裘魏武與楊彪書曰今贈足下錦裘二領仰錦今民貧國虛決敵之資唯仰錦耳諸葛亮集溫熟錦劉禪送臣溫熟錦五端張溫表閻憲字孟度成都人名知人為綿竹令以禮讓化人莫敢犯者有民社戍夜行得遺賄一囊中有錦二十匹求其主還之曰縣有明君何敢負也華陽國志夏侯孝若集羊太常辛夫人傳曰夫人字憲英衛尉肅侯毗之女不好華麗琇上夫人子帔緣以錦不肯服從外孫胡母楊上夫人錦被夫人反臥之錦帳石崇錦步幛四十里世說左慈字元放廬江人少有神道常在魏武帝坐帝曰恨無蜀中生薑耳元放曰亦可得也因曰吾前遣人到蜀買錦可過勑使者增市二端須臾只得薑還并獲使報神仙傳石虎冬月施熟錦流蘇斗帳四角安純金龍頭銜五色流蘇或用黃地博山文錦或有紫綈及小明光錦鄴中記員嶠之山名環邱東有雲石廣五百里有冰蠶長七尺黑色有角有麟以雪霜覆之然後作繭長一尺其色五彩織為文錦入水而不濡其質輕暖柔滑拾遺記夫攻玉以石治金以鹽濯錦以魚浣布以灰物故有以醜治好者矣潛夫論韓生說項羽曰關中阻山河四塞地肥饒可都羽見秦皆已燒殘則乃懷思東歸曰富貴不歸故鄉如衣錦夜行韓信曰人謂楚人沐猴而冠果然漢書錦鳥文章如丹地錦而藻繢綵文俗人見其端正似錦因謂之錦鳥異物志襄邑縣南有渙水北有濉水傳曰濉渙之間能文章故有黼黻藻飾日月華蟲以奉天子宗廟服御焉陳留風俗傳登廟子思子曰管仲饋錦也雖惡而登廟子産練紫也雖美而不尊家語管仲文錦也雖醜登廟子産練白也美而不尊淮南子賜以宮錦封敖武宗使作詔書賜以宮錦裴胄拜荊南節度使是時方鎮爭剝下希恩制貢重異綾名貢奉有中使者即悉公帑市歡胄待之有節獻錦十五床杜鴻漸兼成都尹入朝獻錦十五床錦裘范君瑾執元普送突厥頡利得之遺以錦裘張士貴虢州人授虢州刺史帝曰顧令卿衣錦晝遊耳韋堅通漕成舟署某郡以所産暴陳其上若廣陵錦崔寧嚴武白寧為利州刺史及武為劍南節度獻誠見款以奇錦珍貝遺獻誠且求寧宣宗大中初女蠻國獻明霞錦練水香麻以為也光耀芬馥著人五色相間而美麗於中國之錦酉陽康老子嘗賣一錦褥有波斯見之者乃曰此冰蠶絲繭所織暑月陳於座滿室清涼唐樂府録杜亞拜淮南節度使泛九曲池曳繡為飄詫曰要當稱是林沼李衡曰未有錦纜云何亞大慚錦裘繡帽李晟每與賊戰必錦裘繡帽自表指揮陳前視錦繡元德秀視錦繡未嘗求足女王國貢魚油錦紋綵尤異入水不濡濕云有魚油故也樣與前不同有錦衣隸宮錦坊祿山亂後人尋其舊坊不收曰如今花樣與前不同遣之盧氏雜說文宗論德宗奢靡云問得禁中老宮人每引泉先於池底鋪錦建王宮詞魚藻宮中鎖翠蛾先皇行處不曾多只今池底休鋪錦菱角雞頭積漸多是也李石開城録王方慶纍遷廣州都督境內清畏議諸謂治廣未有如方慶者號第一下詔賜瑞錦雜綵以著善政文錦郭崇韜莊宗聞破蜀遣宧官向正嗣勞軍正嗣還上蜀簿得文錦五十萬匹東女真王斂臂使大臣求請官號武后冊拜左右玊鈴衛將軍賜瑞錦服新羅真德襲王遣春秋子法敏入朝真德織錦為頌以獻朝霞錦阿何機遣使者解俚隨頃以朝霞錦聘梁五代毛錦室韋其人工巧善織毛錦上波斯錦吐蕃其所貢波斯錦山林覆錦吳越錢鏐游衣錦城宴故老山林皆覆以錦大食有重錦其載二十橐馳乃勝既不可兼負乃裁為二十匹每三歲一餉黠戛斯夫絲捨而不治則腐而棄使女工繅之以為美錦人君朝而服之尹子修然繡修也文修修然也釋名五綵備謂之繡冬官上紂不服短褐處於茅屋之下必將衣繡遊於九重之臺帝王世記狄人伐衛公與石祁子玦與寧莊子矢使守曰以此贊國擇利而為之與夫人繡衣曰聽於二子左閔公郭君乘青輸之舟張翠蓋越人擁楫而歌曰心悅君兮君不知於是鄂君舉繡被而覆之說苑晉文公使叔向聘吳吳人飾舟以送之左百人右百人有繡衣而豹裘者有錦衣而狐裘者歸以告平公平公曰吳其亡乎上齊桓公曰昔吾先君襄公陳妾數百食必良肉衣必文繡國語孔子時生之夕有麟吐玊書於闕里人家徵在乃以繡紱繫麟角而去拾遺記文帝所幸慎夫人令衣不得曳地帷不得文繡以示敦朴史記繡衣直指侍御史有繡衣直指武帝所制百官表江充使胸奴拜直指繡衣御史督三輔漢書暴勝之為直指使者衣繡持斧逐捕盜賊威震州郡上繡被霍光薨贈絮繡被百領上齊織作繡宣帝時呼韓邪單于來賜白繡綺八千匹上李忠獨不掠財物上曰我欲賜之諸君無望乎取大驪馬及繡被以賜忠東觀漢記張既為尚書出為雍州刺史太祖謂既曰還君本州可謂衣繡晝行矣魏志曹植妻衣繡太祖登高見之以違制命還家賜死世說吳王孫權常歎魏蜀未夷軍旅之隟思得善畫者便圖作山川地形軍陳之象趙夫人曰丹青之色甚易歇滅不可為久寶妾能刺繡作列國圖於方帛之上寫以五嶽河海城邑行陳之形進於吳王時人謂之針絶拾遺記齊郡能刺繡恆女無不能者襄邑織錦恆婦無不巧者因見而手狎也論衡古庶人老耄而後衣絲其餘則麻枲而已故命曰布衣今富者綺繡羅紈素綈冰錦楊子法言刺繡之師能縫帷裳納縷之工不能織錦儒生能為文吏文吏不能為儒生也文吏一旦在位則鮮冠利劍一歲典職則田宅併集論衡繡之未刺錦之未織絲帛何以異哉及其加五采之功施針縷之飾則文章煥耀學士有文章其猶絲帛布色之功上吳王死辭曰不忍見伍子胥吾死必結璧連組以幕吾目恐其不蔽即復重羅繡三掩以為掩明生不昭我身死不見我形吾何言哉吳越春秋世傳有夫死而婦許以不嫁者誓以繡衣禭以衣戶納諸棺焉後三年婦出適迎有日矣有行道人夜求人家宿向晨主人語之婦約之辭寄所誓之衣曰子到若千里當逢之還此衣焉或者出門到所言處果見迎車具以事告還其繡衣婦遂自縊而死物理論元鼎元年起招仙閣於甘泉宮有霞光繡有藻龍繡有連烟繡有走龍錦有雲鳳錦翻鴻錦閣上燒荃蘼香屑燒粟許其氣三月不絶別國洞冥記繁繐繁繐鮮支縠絹也廣雅絹䋌也其絲䋌厚而疏也釋名趣絹後魏書曰四民月令曰八月清風戒寒趣絹縑帛晉故事凡民丁課田夫五十畝收租四斛絹三匹綿三斤凡屬諸侯皆減租縠畝一斗計所減以增諸侯絹戶一匹以其絹為諸侯秩又分民租戶二斛以為侯奉其餘租及舊調絹二戶三匹綿三斤書為公賦九品相通皆輸入官自如舊制晉令其趙郡中山常山國輸縑當絹者及餘處常輸踈布當綿絹者縑一匹當絹六丈踈布一匹當絹一匹絹一匹當綿二斤舊制人間所織絹布等皆幅廣一尺二寸長四十尺為一端今任服後乃漸至濫惡不依尺度陳留夏馥避黨事遁迹黑山弟靖載絹往餉之於深陽縣客舍見馥顏色毀不復識聞其聲乃覺之謝承後漢書持絹挽下李傕等大戰弘農百官士卒死者不可勝數董承密招白波帥李嶽等率衆夾攻擊傕等大破之乘輿乃得進承使潜過曰先具舟為應帝步出營臨河岸高不得下時中官伏德扶中官以手持十匹絹乃取德絹連續挽而下餘人匍匐岸側或自投死亡華嶠後漢書陳實在鄉閭平心率物有盜夜入其家止於梁上實録見之乃自整拂命子孫正色訓之曰夫人不可不自勉不善之人未必本惡習與性成耳如梁上君子者是矣盜大驚自投於地實徐譬之曰視君狀貌不似惡人然當由貧困今遺絹二匹自是縣無復盜竊上賊來入門時家見在絹布三千餘匹及衣被器物皆令婢使輦出著庭中恣其所取由是皆競取財物不暇復見殺孔舒元在窮記王尼見太傅越曰公負尼物越答初不識此事尼曰昔楚人失布謂令尹盜者以令尹執政不能奉禮率法至使盜賊公行則是與自盜無異也尼舍資財軍寇掇略公為宰輔未能禁賊令尼窮困是亦明公負物也越意解大笑與尼絹五十匹王隱晉書胡威少有志尚厲操清白父質為荊州威自京都省之家貧無車馬童僕威自驅驢單行拜見父停廄中十餘日告歸臨辭質賜其絹一匹為道路糧威跪曰大人清高不審於何得此絹質曰是吾俸祿之餘故以為汝糧耳晉陽秋桓溫入蜀聞得善星者夜執其手於星下問國祚修短星人曰太微紫微文昌三宮氣候決無虞五十年外不論耳溫不悅送絹一匹錢五千與之星人詣主簿習鑿齒曰今受旨自裁乞命為標揭棺木問其故曰賜絹令僕自絞乞錢以買棺故知之耳鑿齒曰君幾誤死君聞子知星宿有不覆之義乎絹以戲君錢供資糧是聽君去耳星人喜以言詣溫溫笑曰君三十年著儒書不如一詣習主簿也上荊州刺史庾冰中子襲嘗代官曹絹十匹冰怒撻之市絹還官上翟湯字道淵潯陽人太守于寶遣船餉之勑吏曰翟公廉讓卿致書訖便委般還湯無人送致乃更貨易絹物因寄還寶晉中興書兩匹足度沈慶之年八十夢有人以兩匹絹與之謂曰此絹足度寤而諧人曰老子今年不免矣兩匹八十尺也足度無盈餘矣是歲果卒宋書李安人行南徐州事城局參將王回素為安人所親盜絹二匹安人流涕謂曰我與卿契闊備嘗今日犯王法乃卿負我也於軍門斬之上孝武時齊庫上絹年調巨萬匹綿亦稱此期儼限峻人問買絹一匹至二三千綿一兩三四百貧者賣妻子甚者或自縊死沈懷文具陳人困由是綿絹薄有所減上阮佃夫佞幸專權有人餉絹二百匹嫌少不答書上豫章王嶷拜陵還過延陵季子廟觀沸井有水牛突部伍直兵執牛椎問嶷不許取絹一匹撫繫牛角放歸其家齊書蕭赤斧遷給事中太子詹事卒於家貧無絹衾衣上擲磚無褲吉士瞻少時嘗於南蠻國中擲磚無褲褰露為儕輩所侮及平魯休烈軍得絹三萬匹乃作百褲其外並賜軍士不以入室梁書劉孝綽為吏部郎坐受人絹一匹為餉者所訟左遷信威臨賀王長史上登舟無衣任昉為義興太守及被代登舟止有絹七匹米五石至都無衣鎮軍將軍沈約遺裙衫迎之上作曲賜絹費昶善為樂府嘗作鼓吹曲武帝重之勑曰才意新拔有足加異昔邯鄲博物卞蘭工辭束帛之賜實為勸善可賜絹十匹上販絹為業周石珍建康之廨隸也世以販絹為業上置絹簿下傅昭為臨海太守縣令嘗餉粟置絹於簿下昭笑而還之上裴邃為北康梁秦二州刺史復開創屯田數千頃倉廩盈實省息邊運人吏獲安乃相率餉絹千餘匹邃從曰汝等不應耳吾又可逆汝納其二匹而已上李崇在官和厚明於決斷然性在財賄販肆聚斂上令王公以下從者百餘人皆令任負布絹即以賜之多者過五百匹少者百餘唯長樂公兩手持絹二十匹而出亦不異衆而當世稱其廉儉尚書令任城王澄疾不起賜絹百匹崇與章武王融以所負過多顛仆於地崇乃傷腰融至損腳時人為之語曰陳留張武傷腰折股貪人敗類穢我明主北史楊津除岐州刺史巨細躬親孜孜不倦有武功人賞絹三匹去城十里為賊所劫時有使者馳驛而至被劫人因以告之使者到州以狀白津津乃下教云有人著某色衣乘某色馬在城東十里被殺不知姓名若有家人可速收視有一老母行哭而出云是己子於是遣騎追收并絹俱獲自是闔境畏服後魏書楊平王子衍轉徐州刺史至州病重帝勑徐成伯乘傳療疾差成伯還帝曰卿定名醫賚絹三千匹成伯辭請受一千匹帝曰詩云人之云亡邦國殄瘁以是而言豈惟三千匹乎上辛穆再轉汝陽太守遇水潦人饑上表請輕租賦帝從之遂勑汝陽一郡聽以小絹為調上孝昭帝賜百官射王晞中的當得絹為不書箭有司不與晞陶陶然曰我今可謂武有餘文不足北齊庫狄士文嘗入朝遇上置酒高會賜公卿入左藏任取多少人皆極重士文獨口銜絹一匹兩手各持一匹上問其故士文曰臣口手俱滿餘無所須上異之別加賞物勞而遣之隋書侍御史馬周上疏云往者貞觀之初一匹絹才得一斗米而天下帖然百姓知陛下甚憂憐故人人自安皆無怨讟自五六年來頻歲豐稔一匹絹得粟十餘石而百姓皆以為陛下不憂憐之咸有怨言又今所營為樂頗多不急之務故也唐書太宗初即位風聞諸曹案典受賂乃遺左右試以財物遺之有司聞令史受餽絹一匹上將殺之裴矩進諫曰此人受賂誠合重誅但陛下以物試人則刑極法所謂陷入其罪恐非道德齊禮之義上善之上高宗朝詔自今以後天下嫁女受財三品以上之家不得過絹三百匹四品不過二百匹六品七品不得過百匹皆充所嫁女之資裝等用其夫家不得受陪門之財上文宗太和六年賜故衛國公李靖五代孫前鳳翔司録參軍彥芳絹二百匹衣笏一副并還先奏高祖太宗書詔及官誥衣物等上賜宰相李愚絹百匹錢百緡鋪陳物一十三件時愚病上令中使宣問愚所居寢室蕭然四壁臥弊氈而已中使具言其事上曰嘻宰相月俸錢幾何而委頓如此故有是賜後唐史惠帝於鄴與成都王還洛陽出城倉卒上下無持資食之調道中有驅羊二百餘口者便勒將至洛得以為糧至洛盧志啓以有藏絹倍還羊主四王起事剪斷復連永嘉中有天竺胡人能取絹與人各執一頭剪斷之已而取兩假合持之則復還連綿可練無異故體也搜神記清河崔基寓居清州朱氏女姿容絶倫崔傾懷招賢納女為妾後三更中忽聞扣門外崔披衣出迎女兩淚嗚咽云適得暴疾喪亡忭愛永奪悲不自勝女於懷中抽兩匹絹與崔曰近自織此絹欲為君作裙衫未得裁縫今以贈離崔以錦八尺答之女取錦曰以此絶矣言畢豁然而滅至旦告其家女父曰女昨夜忽然心痛夜亡崔曰吾家絹帛無零失耶答云此女舊織餘兩匹絹在箱中女亡之始婦出絹欲裁為送終衣轉盻失之崔因此具說事狀述異記掠絹呼取范郤字孝悌少時曾省外家逢掠者驅其牛取衣服去郤還車知賊不得席後三匹絹乃追呼令取之賊知長者悉還所取而辭謝焉先賢行狀王經字彥律初為江夏太守大將軍曹爽附絹二十匹令交市於吳經不發書棄官歸母問歸狀經以實對母以經典兵馬而擅去對送吏杖經五十爽聞不復罪經世語范宣年八歲後園挑菜誤傷指大啼人問痛耶答曰非為痛也但身體髮膚不敢毀傷是以啼耳宣潔行廉約韓豫章遺絹百匹終不肯受後韓與范同車就車裂二丈韓云寧可使婦無視也范笑而受之上董永父終貧不遂葬以身質錢一萬既葬就後逢一女子求與永為妻云能織絹永詣主人主人令織一旬三百匹債足女辭之曰我天之織女也帝見君孝使我償耳因遂不見孝子傳趙柔有人遺柔鏵數百枚者柔與子善明鬻之市有人從柔買素絹二十匹有商人知賤與柔三十匹善明欲取之曰與人交易一言便定豈可以利動心遂與之縉紳之流聞而敬服後魏書陸馥為相州刺史發奸摘伏事無不驗百姓以為神明無敢劫盜者在州七年家至貧約徵為散騎常侍百姓乞留馥千餘人獻文不許謂群臣曰馥之善政雖古人何以加之賜絹五百匹上李元忠去任歸李魚出孝莊時盜賊蜂起清河有五百人西戎還經南趙郡以路便共投元忠奉絹千餘匹元忠唯受一匹殺五年以食之遣奴為道曰若逢賊便道李元忠遣如言賊皆舍避上吳先主病遣人於門觀不祥巫啓見一鬼著絹巾似是大臣將相其夜先主夢見魯肅來入衣巾如之也搜神記縑縑并絲也說文縑兼也其絲細䋋兼於絹染五色細且緻不漏水也釋名遺縑不受張渙少大志節量卓慕之使其兄遺縑百匹渙惡卓為人絶而不受續漢書王丹資性方潔疾惡豪強時河南太守同郡陳遵關西之大俠也其友人喪親遵為護喪事賻助甚豐丹乃懷縑一匹陳之於主人前曰如丹此縑出自機杼遵聞而有慚色東觀漢書王丹子有同門生喪親家在中山白丹欲往奔慰結侶將行丹怒而撻之令寄縑以祠焉或問其故丹曰交道之難未易言也上戴封常遇賊財物悉被掠奪唯餘縑七匹賊不知處封乃追以與之曰知諸君乏故送相遺賊驚曰此賢人也盡還其器物後舉孝廉上愁妻致縑期門郎程偉妻能通神變化偉當從出無衣甚愁妻即為致衣縑得以為衣上孫元濟初為錢唐令御繁以簡獄無繫囚及去官百姓以謙在職不受餉遺追載縑帛以送謙辭不受南史何遠輕財好義周人之急言不虛妄蓋天性也每戲語人曰卿能得我一妄語則謝卿以一縑衆共伺之不能記也梁書天中記卷四十九
