body:
  text: 地萬物之祖地者元氣所生萬物之祖也地之言施也諦也應施變化審諦不誤敬始重終故謂之地也白虎通含吐應節地者易也言養物懷仁交易變化含吐應節故其立字土力於一者為地元命包右轉地所以右轉者氣濁精少含陰而起遲故轉右迎天佐其道上後定太極初構清濁始分故天先成而地後定抱朴子濁陰積陰為地故地者濁陰也素問方廣地承天故定寧地定寧萬物形地廣厚萬物聚定寧無不載廣厚無不容地勢深厚水泉入聚地道方廣故能久長文子政本地者政之本也地不均平和調則政不可正也管子萬物之本地者萬物之本原諸生之根苑上經緯牝牡子夏曰啇聞山書曰地東西為緯南北為經山為積德川為積刑高者為生下者為死丘陵為牡溪谷為牝蚌蛤龜珠與日月而盛虛是故堅土之人剛弱土之人柔墟土之人大沙土之人細息土之人美㘪土之人醜家語天根地者底也底之言著也陰體下著也其神曰祗祗成也育生萬物備成也形有高下氣有剛柔物有巨細味有甘苦鎮之以五嶽積之以丘陵播之以四瀆流之以百川蓋氣自然之體也發氣黃泉周伏回轉以生萬物也天之根本也雲雨于是乎出日月星辰于是乎陳霜雪于是乎降形西北高而東南下東西長南北短其盡四海者也炎氣鬱蒸景風蕩物地之張也秋風蕩生涼氣肅然地之間也物理論媼神地者其卦曰坤其德曰母其神曰祗亦曰媼大而名之曰黃地祗小而名之曰神州亦名后土上漢書曰惟泰元尊媼神蕃釐經紀天地作成四時師古曰媼地神也又曰海內安寧興文匽武后土富媼昭明三光張晏曰媼老母稱也坤為母故稱媼海內安定富媼之助耳人下子貢問孔子曰賜為人下未知所以為人下之道也孔子曰為人下者其猶土乎種之則五穀生焉掘之則甘泉出焉草木植焉禽獸育焉生人立焉死人入焉多其功而不言為人下者其猶土乎說苑人臣猶土夫人臣猶土也萬物載焉而不辭其重水瀆污焉而不辭其下草木植焉而不有其功杜恕篤論上地凡居地有大利而無小害者此上地也物理論下元下元者地氣也為萬物始生育長養蓋藏之主樂聲儀萬物所陳元氣初分輕清為天重濁為地萬物所陳列也徐曰地者迆也迆而高也山嶽丘陵墳衍迆而卑也皋隰汙潢故曰地有二形高下平也說文牧生地之為言媲也承天行其義也山陵之大非地不制含功以牧生也春秋說題辭仁禽子問天與地孰仁墨子曰翟以地為仁太山之上則封禪焉培塿之側則生松柏下生黍苖莞蒲水生黿鼉龜魚民衣焉食焉家焉死焉地終不責德焉故翟以地為仁墨子地理天有日月星辰謂之文地有山川陵谷謂之理論衡丘陵墳衍普天之下華嶽列居河海所流丘陵墳衍總謂之地聖證論丘陵原隰阪險總而曰地月令章句地無兩形夫土地者百姓之所蹈也殊無兩形之致矣而談者強謂之異體云地者都大之名土者細屬之號國寧有有地無土有土無地之處乎萬機論任萌地順受澤謙虛開張含泉任萌滋物歸中援神契吐物土地之吐生萬物者也二象地之土地之中吐物出形也說文地當陰陽之中能吐生萬物者土書鄭注孔鼂云能吐生百穀謂之土聖證論王四季土所以王四季者何木非土不生火非土不榮金非土不成水非土不高扶微助衰歷成其道故五行更生亦曰土白虎通上五行之中央主於四季各十八日金父土者金之父也尚書帝命驗積塊杞人有憂地壞身亡所寄者曉者曰地積塊耳充塞四虛亡處亡塊若躇步跐蹈終日在地上行止奈何憂其壞刻子積形長廬子曰山嶽也河海也金石也火木也此積形之成乎地者也上食本四海之內六合之間曰奚貴曰貴土土食之本也申子常靜地道不作是以常靜地道常靜是以正方上貴貞天道貴信地道貴貞不信不貞萬物不生漢書方貞反騷云正皇天之清則兮度后土之方貞應劭曰平正司法者莫過於天養物均調者莫過於地上方輿束晳補亡詩曰漫漫方輿回回洪覆翰曰方輿地也宋玉大言賦曰方地為輿圓天為蓋曾子曰天道曰員地道曰方淮南子曰大丈夫以天為蓋則無不覆也以地為輿則無不載也方儀盧子諒詩亹亹圓象運悠悠方儀廓注天地曰兩儀故曰方儀也棊局陽動而陰靜天回而地遊地若浮舟方如棊局楊炯渾天賦骨脈皮毛地以山為之輔佐石為之骨川為之脈草木為其毛土為其肉三尺以上為糞三尺以下為地慱物志太空地厚萬里其下得太空四角下有自然金柱輒方圓五千里關令內傳兩戒唐天文志初貞觀中李淳風撰法象志北戒自積石負終南地絡之陰東及太華踰河並雷首底柱王屋太行北抵常山之右乃東循塞垣至濊貊朝鮮是謂北紀所以限戎狄也南戒自岷山嶓冢負地絡之陽東及太華連沈山熊耳外方桐柏自上洛南逾江漢攜武當荊山至于衡陽乃東循嶺徼達東甌閩中是謂南紀所以限蠻夷也故星傳謂北戒為胡門南戒為越門四游地有四游冬至地上行北而西三萬里夏至地下行南而東三萬里春秋二分是其中矣地常動移而人不知譬如人在大舟中閉牗而坐舟行不覺也尚書考靈耀四極四荒東至泰遠西至邠國南至濮鉛北至祝栗謂之四極孤竹北戶西王母日下謂之四荒九夷八狄七戎六蠻謂之四海距齊州以南載日為丹穴北載斗極為空同東至日所出為太平西至日所入為太蒙爾雅四方溟渤漲洋此天地之所以限東徼也惡溪沸海此天地之所以阻南徼也陷河懸度之設乎西潮海沙子之設乎比北天地之所遮西而制北者也激漳霧于東維界黑水于南極泄流沙于西陲決弱水于北滅此天地之所以界四維也路史前紀卷四五沃五沃之土其土宜杏管子五地周禮曰大司徙掌天下地土之圖周知九州之地域廣輸之數辨五地之物生一曰山林動物宜毛植物宜皂物二曰川澤動物宜鱗植物宜膏物三曰丘陵動物宜羽植物宜核物四曰墳衍動物宜介植物宜策物五曰原隰動物宜羸植物宜叢物注曰東西為廣南北為輪皂柏栗膏楊柳核李梅策王棘叢萑葦之屬五土夫地有五土之宜各有高下范子計然分別五土視其高下若田宜黍稷下田宜稻麥丘陵阪險宜種棗栗孝經鄭注六區思玄賦上下無常窮六區注六區上下四方也六極天有六極注四方上下六體裴秀武帝時為司空為地圖十八篇制圖之體有六一曰分率以辨廣輪之度二曰準望以正彼此之體三曰道理以定所由之數四曰高下五曰方邪六曰迂直此三者各因地制宜以校夷險之異以六者參而考之晉書隋宇文愷曰裴秀輿地以二寸為千里六幕禮樂志紛紜六幕浮大海師古曰六幕猶言六合也七表天有五行地有五嶽天有七星地有七表天有八氣地有八風天有九道地有九州天有四維地有四瀆河圖括地象八區楊雄傳咸營于八區師古曰八區八方也八紘燭六合耀八紘師古曰八紘八方之綱維也八埏封襌書下泝八埏孟康曰埏地之八際也言德下流於地之八際八荒過秦論并吞八荒師古曰八荒八方荒忽極遠之地也八柱天有九部八紀地有九州八柱東南神州曰晨土正南卭州曰深土西南戎州曰滔土正南弇州曰幵土正中冀州曰白土西南柱州曰肥土北方玄州曰成土東北咸州曰隱土正東揚州曰信土崑崙山為柱氣上通天崑崙者地之中也地下有八柱柱廣十萬里有三千六百軸互相牽制名山大川孔穴相通河圖括地象八殥九州之外乃有八寅亦方千里自東北方曰大澤曰無通東方曰大渚曰少海東南方曰具區曰無澤南方曰大夢曰浩澤西南方曰渚資曰丹澤西方曰九區曰泉澤西北方曰大夏曰海澤北方曰大冥曰寒澤凡八寅八澤之雲是雨九州淮南子八紘八寅之外乃有八紘亦方千里自東北方曰和丘曰荒土東方曰棘林曰桑野東南方曰大窮曰衆女南方曰都廣曰反戶西南方曰焦僥曰炎土西方曰金丘曰沃野西北方曰一目曰沙所北方曰積冰曰委羽凡八紘之氣是出寒暑以合八正必以風雨上八極八紘之外乃有八極自東北方曰方土之山曰蒼門東方曰東極之山曰開明之門東南方曰波母之山曰陽門南方曰南極之山曰暑門西南方曰編駒之山曰白門西方曰西極之山曰閶闔之門西北方曰不周之山曰幽都之門北方曰北極之山曰寒門凡八極之雲是雨天下八門之風是節寒暑八紘八寅八澤之雲以雨九州而和中土上伯昏無人曰夫至人者上窺青天下潛黃泉渾斥八極神氣不變莊子八方司馬相如傳六合之內八方之外師古曰四方四維謂之八方河圖龍文曰鎮星光明八方歸德八聽天有八風噫氣也地有八聽孔竅也九則楚詞曰地方九則何以墳之康回憑怒地何以西南傾注墳分也謂九州之地凡九品禹何以能分別之康回共工也九地凡九地一為沙泥二澤池三沚崖四下田五中田六上田七下山八中山九上山太玄經九土登徒子好色賦周覽九土足歷五都思玄賦思九土之殊風曹子建責躬詩朱旗所拂九土披攘九壤補亡詩茫茫九壤注九壤九州九域韓詩曰方命厥后奄有九域薛君曰九域九州選注十形夫土地皆有形名而人莫察焉有龜龍體有鱗鳳貌有弓弩勢有斗升象有張舒形有塞閉容有隱真之安有纍卵之危有膏腴之利有塉埆之害此十形者氣勢之始終陰陽之所極也物理論方載從上臨下八萬里天以圓覆地以方載考靈耀地戶天不足西北地不足東南西北為天門東南為地戶天門無上地戶無下河圖括地象坤靈坤靈定位川澤攸同澤有所注川有所通後漢楊厥碑舒形地以舒形萬象咸載鉤命決靈靜天成於外地定於內天體於陽故圓以動地體於陰故平以靜動以行施靜以合化天以陽回地以陰淳是故天致其稟氣舒光地致其靜承施候明天以以順動不失其中則四時順至寒暑不臧致生有節故品物用生地以靈靜作合承天清化致養四時而後育故品物用成凡至大莫如天至厚莫若地至多莫若水至空莫若土至華莫若木至實莫若金至無莫若火靈憲出雲起雨土無位而道在故太一不興化人主不任部地出雲起雨以合從天下勤勞出於地功歸於主元命包不能天不能冬蓮春菊是以聖人不違時地不能洛橘汶貉是以聖人不違俗文始真經黃泉天以不見為玄地以不形為玄人以心腹為玄天奧西北鬱化精也地奧黃泉隱魄榮也人奧思慮含至精也太玄經十二分地有十二分王侯之所居也春秋內事得一天得一以清地得一以寧谷得一以盈天無以清將恐裂地無以寧將恐發谷無以盈將恐竭老子九圃洛書曰人皇始出於提地之口九男兄弟相像以別長九州為九囿人皇乃有中州八輔九淮南子曰神農皇帝剖判大宗竅領天地襲九窾重九注竅通也領理也襲法也形也言因九天九地之形法以通理也黃壚淮南子曰女媧功烈上際九天下契黃壚注上與九天接下契至黃壚黃泉下有壚土也又云放乎九天之上蟠乎黃壚之下曹植詩抱罪黃壚方州淮南子曰女媧氏背方州抱圓天注方州地也文子作負方州九州人皇氏分九州神農始立地形甄度四海遠近山川林藪故至東西九十萬里南北八十一萬里春秋命歷序黃帝受命風后受圖割地布九州周公職録黃帝旁行天下方制萬里畫野分州得百里之國萬區漢地理志圖地形元命苞云神農世怪義生白阜圖地形脈道注怪義白阜母名白阜為神農圖畫地形通水道之脈使不壅塞也任地顓項養材以任地載時以象天北至於幽陵南至於交趾西至於流沙東至於蟠木日月所照莫不砥屬史記益地圖西王母於大荒之國得益地圖慕舜德遠來獻之書帝驗期黃帝在位王母遣使乘白鹿集帝庭授以地圖舜在位遣使獻白玉環反益地圖遂廣黃帝九州為十二州又獻三琯吹之以和八風集仙録息壤洪水滔天鯀竊帝之息壤以堙洪水山海經滔滔洪水無所止極伯鯀乃以息石息壤以填洪水開筮息謂子也填物不耗臧掘之益多故禹用填洪水以為名凡土有輕重肥瘦色澤氣不同自江而南掘土不過五尺見泉厥無息掘土還填裨補多缺故南中井淺自淮而北土實掘井動經二三丈或再填穴則多於始取重輕不足定以北校稱之也相感志括地圖禹長於地理得括地象圖堯以為司空尚書刑德倣禹觀於河始受圖括地象也圖言治水之意帝王世紀禹步禹乃使太章步自東極二億三萬三千五百里七十五步使堅亥步自北極至于南極二億三萬三千五百里七十五步淮南子禹迹虞人之針曰芒芒禹迹畫為九州經啓九道民有寢廟獸有茂草各有攸處左襄四禹治八極之廣東西二億三萬三千里南北二億三萬一千五百里夏禹所治四海內地東西二萬八千里南北二萬六千里括地象九有九圍沈書曰以有九有之師九有以亡沈頌曰奄有九有九有有截毛傳曰九州也又曰式是九圍釋語云謂九州為九圍者蓋以九分天下各為九處規圍然故謂之九圍土訓版圖之二司會掌之土地之圖司書記之則天官之屬也形體之法遂人造之地事之圖土訓詔之則地官之職也春卿有小史外史掌其志夏卿有司險職方掌其圖至於邦國土地之圖地域廣輪之數載在司徒維見可睹玉海獻土晉文公過衛衛文公不禮去過五鹿饑而從野人乞食野人盛土器中進之重耳怒趙衰曰土者有土也君其拜受之史記金化蜀王本紀曰蜀王獵於褒谷見秦王以金一笥遺蜀王蜀王報以禮物盡化為土秦王大怒臣以下賀曰土地也今秦當得蜀矣九土楚蒍掩為司馬書土田度山林鳩藪澤辨京陵表淳鹵數疆潦規偃豬町原防牧隰皋井衍沃量入修賦注量九土之所入左襄二十五年海外九州鄒衍曰儒者所云中國者於天下乃八十一分居其一分耳中國名曰赤縣神州赤縣神州內自有九州禹之序九州是也不得為州數中國外如赤縣神州者九乃所謂九州也於是有裨海環之人民禽獸莫能相通者如一區中者乃為一州如此者九乃有大瀛海環其外天地之際焉史記崑崙東南方五千里謂之神州中有和羹鄉方三千里五嶽之城帝王之宅聖人所生也王嬰古今通論崑崙東南有亦縣之州風雨有時寒暑有節茍非此土南則多暑北則多寒東則多陽西則多陰故聖人不處焉靈憲幽都土伯魂兮歸來君無下此幽都些土伯九約其角觺觺些敦脄血拇逐人駓駓些參目虎首其身若牛些招魂崑崙之東北地轉下三千六百里有八玄幽都方二十餘萬里慱物志六合汰沃盧敖游乎北海經乎太陰入乎玄闕至於蒙榖之上見一士焉深目而玄鬚淚注而鳶肩豐上而殺下軒軒然方迎風而舞顧見盧敖慢然下其臂遁逃乎碑盧敖就而視之方捲龜殼而食蛤梨盧敖與之語曰唯敖為背群離黨窮觀於六合之外者非敖而已乎敖幼而好游至長不渝周行四極唯北陰之未窺今卒睹夫子於是子殆可與敖為友乎若士者齤而笑曰曰嘻子中州之民寧肯而遠至此此猶光乎日月而載列星陰陽之所行四時之所生其比夫不名之地猶奧也若我南游乎岡䆡之野北息乎沉墨之鄉西窮窅冥之黨東開鴻濛之先此其下無地而上無天聽焉無聞視焉無眗此其外猶有汰沃之汜其餘一舉而千萬里吾猶未能之在今子游始於此乃語窮觀豈不亦遠哉然子處矣吾與汗漫期于九垓之外吾不可以久駐若士舉臂而竦身遂入雲中盧敖仰而視之弗見乃止駕止柸治悖然若有喪也曰吾比夫子猶黃鵠與蠰蟲也終日行不離咫尺而自以為遠豈不悲哉淮南子論衡淚注作頸奧作沉墨作沉薶地市驪山始皇陵作地市生死人交易市平不得欺死人云秦王地市有斷馬利三秦記地脈二世遣使殺蒙恬恬喟然太息曰我何罪而死乎良久曰恬罪固當死矣起臨洮屬之遼東城塹萬餘里此其中不能無絶地脈哉史記八鎮校獵賦戲八鎮而開關應劭曰四方四隅為八鎮如淳曰不言九者一鎮在中天子居之故也客土永始元年秋七丹詔曰昌陵作治五年尚事加功天下虛耗百姓罷勞客土疏惡終不可成其罷昌陵服處曰取他處土以增高為客土也成帝紀客土無氣唐方伎傳杜生真土成帝時陳湯上封事起昌陵卒不就有司皆議曰昌陵因卑為高積土為山度便房猶在平地土客土之中不保幽冥之靈淺外不固取土東土且與穀同價故陵因天性據真土處勢高敞宜還復之陳湯傳四表大漢左東海右渠搜前番禺後陶塗東南一尉西北一候解潮甘泉賦東燭倉海西耀流沙北爌幽都南煬丹崖師古曰四表也踊長元帝時臨淮徐縣地踊長五六里高二丈山海經注四履秦地則西臨洮北沙漠東縈西帶皆臨大海漢興地東西九千三百二里南北萬三千三百六十八里此漢之極盛也東樂浪西敦煌南日南北鴈門西南永昌四履之盛亦如前漢通典縮地脈費長房遇壺公有神術能縮地脈千里聚在目前放之復如舊神仙傳土神俗間有土公之神云土不可動玄有五歲女孫卒得病詣市卜云犯土云即依方治之病即愈然後知天下有土神矣裴玄新言坑掘晉氏南遷郭璞周訪地圖云荊楚舊為王都欲於硤州置之嫌逼山遂止便有宜都之號下至松滋地有面勢都邑之像乃掘坑稱土嫌其太輕復瀉本坑土又不滿便止曰昔金陵王氣於今不絶固當經三百年矣便都建業宣律師感應記赤如丹祖約府內地忽赤如丹戴洋曰按河圖徵云地赤如丹血丸丸當有下反上者恐胡馬當來飲准水后果石勒騎大至攻城大戰晉書夢吞丸劉敬宣在鮮卑夢土丸而服之既而占焉或答曰此服土吞丸也既覺而喜曰丸者桓也既吞矣我復本土矣旬日中聞桓玄敗得來歸晉安帝紀地陷桓玄既篡位後御床微陷群臣失色侍中殷仲文進曰當由聖德淵重厚地所以不能載時人善之世說侯景篡位及升御床床腳自陷南史夢吞梁簡文夢見幽縶謂舍人殷不害曰吾昨夢吞土試思之不害曰昔重耳饋塊卒友晉國陛下所夢將符是乎帝曰儻幽冥有徵異斯言不妄後王偉彭俊五修纂進觴于帝帝醉而寢俊進土囊修纂坐上乃崩竟協於夢南史食土開元二十八年春二月懷州武德武陟修武三縣人無故食土云味美異於他先是武德期城村婦人相與採聚而言曰今未貴人饑幸為生活有老父紫衣白馬從十人來過之謂婦人曰何憂無食此渠水傍土甚佳可食女試嘗之婦人取食味頗異遂失老父乃取其土至家伴其麵為餅餅甚美由是遠近競取之渠東西五里南北十餘步土并盡牛肅時在懷親遇之紀聞地癖李憕豐於産業伊川膏腴水陸上田修竹茂樹自城及關口別業相望與吏部侍郎李彭年皆有地癖鄭巖田産亞于憕舊唐穿地姜師度既好溝洫所在必發衆穿鑿雖時有不利而成功亦多先是太史令傳孝忠善占星緯時人為之語曰傳孝忠兩眼看天姜師度一心穿地傳之以為口實舊唐時為語曰孝忠知仰天師度知相地嘲所嗜也新唐王地浮屠泓與張說置永樂東南第一宅有永巷者戒曰此宅西北隅最是王地慎勿於此取土越月泓又至謂悅曰此宅氣候忽然索莫其必恐有取土于西北隅者與說並視果有取土坑三數坑皆深丈餘泓大驚曰禍事令公富貴一身而已更二十年外諸郎君皆不得天年說懼將乎之泓曰客土無氣與地脈不相連今欲填之猶人有瘡痏補以他肉無益也說子均垍皆為祿山委任克復后均賜死垍長流常恃言旨彈丸劍南自玄宗還京後於綿益二州各置一節度百姓勞弊高適因西山三城置戍上三疏曰平戎以西數城邈在窮山之顛垂于絶險之未運糧于束馬之路坐甲於無人之鄉以戎狄言之不足以利戎狄以國家言之不足以廣土宇奈何以險阻彈丸之地而困全蜀太平之人哉舊唐書地理賈耽好地理學凡四夷之使及使四夷還者必與之從容訊其山川土地之終始是以九州之夷險百蠻之土俗區分指畫備究源流上貢土天下貢賦唯長安縣貢土萬年縣貢水南部新書益土建中初魏縣西四十里忽然土長土長四五尺數畝里人駭異之明年魏博田悅反德宗命馬燧等討之朱滔王武俊帥兵救田悅引軍與王師對壘三年滔僣稱冀王武俊稱趙王田悅稱魏王悅時壘正當土長之所及僣署告天乃因其長土為壇以祭魏州功曹韋稔為益土頌以媚悅馬燧聞之笑曰田悅異常賊也舊唐厚薄朱朴遷都議曰江南土薄水淺人心囂浮輕巧不可以都河北土厚水深人心疆愎狠戾不可以都惟襄鄧實惟中原人心質良去秦咫尺而有上洛為之限永無夷狄侵軼之虞此建都之極選也唐書青牛嫗遼太祖皇后述律氏嘗至遼土二河之會有女子乘青牛車倉卒避路忽不見未幾童謠曰青女嫗曾避路蓋言謂地祗為青牛嫗云遼史黃金母汾晉村野間語曰欲作千箱主問取黃金母意謂多稼厚畜由耕所致也凊異青銅海汴老圃紀生一鉏庇三十口病篤呼子孫戒曰此二十畝地便是青銅海也起西北崑崙柱天萬脈萬山之脈由起西北綿亘幽寒莫詣為背為項西北近崑崙如人之背項為脊為毳漸遠也下為贅臀上為髮際面居秦雍耳目口鼻秦雍為天下之面分耳目口鼻也幽冀川蜀分左右背懸心關腦腹垂洛汭胃脘出納為汧為渭大河大江經絡縈衛大腸膀胱震澤壘濟青徐以降是為髖髀泄為尾閭茫洋無際海洲萬國糞滓塵穢張子房赤霆經雌雄中原為雄魁傑竒偉江南為雌荊楚嬌麗言其孕人物然也上沃瘠公父文伯之母曰昔聖王之處民也擇瘠土而處之沃土之民不材淫也瘠土之民莫不嚮義勞也國語生反廣成子曰百昌皆生於土而反于土故余將去汝入無窮之門以游無極之野莊子上方下方翼奉封事曰上方之情樂也下方之情哀也孟康曰上方謂北與東也陽氣所萌生故為上下方謂南與西也陰氣所萌生故為下前漢地垠甘泉賦天閫決兮地垠開八荒閫兮萬國諧上地絡振天維衍地絡西京層峰亘天維曠渚綿地絡宋孝武白土隋圖經云常山高邑縣房子城出白土細滑膏潤可以塗飾兼用之濯錦可致鮮潔一名赤石岡酈道元水經云白土細滑如膏可用濯錦色奪霜雪光彩鮮異潔于常錦俗以美談言房子之纊也抑江矣歲貢其錦以充御府魏都賦織纊房子響地邢州尚書房東井地周百餘步其所鳴響人馬行土轟作雷聲掘之即火出郡國志可食雲南臨安府唐黎州也有落容山在府治西南三里其土香美作餅炙熟可食僰婦嗜之雲南志堅土丹徒界內土堅緊如蠟故諺云生東吳死丹徒言吳多産出可以攝生自奉養丹徒地可以葬也輿地志瘞薶爾雅曰祭地曰瘞貍孫炎曰瘞者翳也既祭瘞藏也祭法曰瘞埋于泰折呂氏春秋曰天下時地生財不與民謀有年瘞土無年瘞土注有穀祭土報其功也無穀祭土讓其神也六幽典引曰光被六幽蔡雍曰六幽謂上下四方也向曰六幽謂天地四方幽遠之處六漠遠遊曰經營四荒兮周流六漠注六合也楚辭別壤計九州之別壤山陵之大川澤所注菜沮所生鳥獸所聚凡九百一十萬八千二十四頃磽埆不墾者千五百萬二千頃援神契地癢鑿山鑽石則地痛人民多若蚤蝨蚤蝨衆多則地癢也劉向別録夢地地為陰其下冥冥也夢見地者身安寧夢書止殃剪妖文王立國八年寢疾五日而地動東西南北不出國郊百吏皆請曰臣聞地之動為人主也請舉事動衆增國城以移之文王曰不可天之見妖也以罰有罪也請改行重善以移之無幾何疾乃止此文王所以止殃剪妖也呂氏春秋三川震幽王三年西周三川皆震伯陽父曰周將亡矣夫天地之氣不失其序若過其序民之亂也陽伏而不能出陰遁而不能蒸於是有地震今三川實震是陽失其所而鎮陰也陽失而在陰川源必塞夫水土演而民用也水土無演民乏財用不亡何待國語句星在房心間景公謂太卜曰子之道何能對曰能動地公以告晏子晏子默然不對出見太卜曰昔吾見句星在房心之間地其動乎太卜曰然晏子出太卜走往見公曰臣非能動地地固將動也田子陽聞之曰晏子默然不對者不欲太卜之死往見太卜者恐公之欺也晏子可謂忠於上而惠於下矣晏子春秋晏子曰吾見維星絶樞星散其地動乎說苑維星散句星信則地動有星守三淵地動後志天西河中九星曰鉤星鉤星伸則地動者以水動也辰星赤黃而小則地大動土勝水也鉤鈐者天之管籥鉤鈐折則地動者天之管鑰動也漢上朱氏易解地之將動鉤鈐開鈐即房星上垂二星若磔開則始震盛張則大動漸合則止晉志云西河中九星如鉤狀曰鉤星直則地動地動儀張衡字平子造候風地動儀以精銅鑄成圓徑八寸合蓋隆起形似酒樽飾以篆文山龜鳥獸之形中有都柱旁行八道於開機外有八龍首銜銅丸下有蟾蜍張口承之牙機巧制皆在鐏中覆蓋周密無際如地動鐏則震龍機發吐丸而蟾蜍承之振聲激揚因此覺知雖一龍發機而七首不動尋其方面乃知震動之所在驗之合契若神自書典所記未之有也曾一龍發機而地不覺動京師學者初咸怪其無徵數日驛至果地動由是皆服其神妙後漢越陰安帝永初元年郡國十八地震李固曰地者陰也法當安靜今乃越陰之職專陽之政故應以震動通考失性初平二年地震董卓問蔡雍對曰天為陽故轉運於上地為陰故安靜於下今而地震是失其性以陰為陽也明公車不當青蓋宜改之以應變卓改為緑蓋獻帝春秋雍曰地動陰盛大臣踰制後漢臣象永徽元年晉州地震不息高宗顧謂侍臣曰朕政教不明使晉州之地屢有震動侍中張行成曰天陽也地陰也陽君象陰臣象君宜轉動臣宜安靜今晉州地震彌旬不休臣將恐女謁用事大臣陰謀且晉州陛下本封今地屢震尤彰其應伏願深思遠慮以杜其萌帝深然之舊唐陰盈京房易傳曰臣事雖正專必地震其震於水則波於木則搖於屋則瓦落大經在辟而易臣茲謂陰動又曰小人剝廬厥妖山崩茲謂陰乘陽弱勝強劉向曰金木水沴土地所以震春秋災異先書地震日蝕惡陰盈也上風寒盛陰陽太甚作雨日久不為星變則為地震或大風作而為地震地寒盛則裂風盛則震也玉曆通政經海波薄海水三歲一周流波相薄故地動莊子土聚太子晉曰古之長民者不墮山不崇藪不防川不竇澤夫山土之聚也藪物之歸也川氣之導也澤水之鍾也夫天地成而聚於高歸物於下疏為川谷以導其氣陂唐污痺以鍾其美是故聚不阤崩而物有所歸氣不沈滯而亦不散越國語含澤布氣春秋說題辭曰山之為言宣也含澤布氣調五神也又云陰含陽故石凝為山含精山者氣之包含所以含精藏雲故觸石而出元命包地基春秋運斗樞曰山者地基也地鎮張晏曰元延中岷山崩山地之鎮宜固而崩所以示人患也翟方進傳注産物山産也言産萬物釋名山宣也宣氣散生萬物有名而高象形也說文總山山頂曰冢亦曰巔亦曰椒山脊曰岡山大而高曰嵩嵩高稱也今中嶽嵩山蓋依此亦作嵩小而高曰岑鋭而高曰嶠卑而大曰扈小而衆曰巋土大下小曰巘山有草木曰岵無草木曰垓石載土曰岨土載石曰崔嵬此因形而名之山東曰朝陽山西曰夕陽隨日照而名之山足曰麓山穴曰岫山邊曰崖崖之高曰巖上秀者曰峰陬隅高者曰岊山坡曰坂山三襲曰陟山再成曰坯山中絶曰陘未及上曰翠微一說山氣青縹色曰翠微山屬曰嶧言絡繹相連金魯國有嶧山純石相積搆連屈成山蓋謂此也山狹而高曰巒巒山曰墮徒果反謂山形長狹狹者荊州記又謂之巒詩云墮山喬嶽土山曰阜阜厚也言其高厚曲阜曰阿大阜曰陵小陵曰丘山精曰夔亦曰跂亦曰雲陽祭山曰庪說文釋名爾雅巑岏鋭山也字林岬山脅也淮南注出雲導風仁者何以樂山山者萬物之所瞻仰草木生焉衆物立焉飛禽萃焉走獸休焉寶藏殖焉奇夫息焉育群物而不倦焉四方並取而不限焉出雲導風嵸乎天地之間天地以成國家以寧有似夫仁人志士是仁者所以樂山也說苑孔子曰夫山生材用無私為焉四方皆伐無私與焉出雲雨以通乎天地之間陰陽和合雨露之澤萬物以成百姓以饗此仁者之樂于山也尚書大傅上為星精蟠家山上為狼星武關山為地門上為天高星主囹圄荊山為地雌上為軒轅星大別為地理以天合地以通三危山在鳥獸之西南上為天苑星岐山在崑崙東南為地乳上為天糜星山之地為井絡帝以會昌神以建福上為天井星桐柏山為地穴上為維星鳥鼠同穴山地之幹也上為掩畢星熊耳山地門也精上為畢附耳星河圖九山何謂九山會稽泰山王屋首山泰華岐山太行羊腸孟門呂氏春秋名山凡天下名山五千三百七十出鐵之山三千六百有九上有丹砂者下有黃金上有磁石者下有銅金上有緑石者下有鉛錫上有赭下有鐵管子山上有葱下有銀山上有薤下有金山上有薑下有銅錫山有寶玉木旁枝皆下垂酉陽雜俎五百歲天下名山一開開時金玉之精涌出關令尹喜內傳入名山必先齊五十日牽白犬抱白雞以鹽一升山神大喜芝草異藥寶玉為出未到山百步呼曰林林央央此山王名知之却百邪地鏡五嶽視三公五嶽者泰山東嶽也霍山南嶽也華山西嶽也常山北嶽也嵩高山中嶽也五嶽何以視三公能大布雲雨焉能大斂雲雨焉雲觸石而出膚寸而合不崇朝而雨天下施德慱大故視三公也說苑疊崿秀峰西陵峽疊崿秀峰奇構異形難以詞敘林木蕭森離離蔚蔚乃在雲氣之表仰曯俯映彌習彌流連信宿不覺忘返目所履歷未嘗有也既自欣得此奇觀山水有靈亦當驚知已於千古矣水經造雲兩山壁立崇隆造雲漢武都太守李翕碑奇形異勢袁山松曰夷陵江北多連山登之望江南諸山數十百重莫識其名高者千仞多異形異勢自非煙褰雨霽不辨見此遠山矣水經欲界仙都陶宏景云高峰入雲清流見底夕日欲流沉鱗競躍實是欲界之仙都也陰成水架方丈之西北有陰成大山滄浪之西有陽長大山此二山是陽九百六曆數之標揭也百六之運將至則陽長水竭陰成水架陽九之運將至則陰成水竭陽長水架海録碎事文章嶺九域志青州有文章嶺渠江志有禮義山圖經涪州有錦繡洲丹梯謝玄暉敬亭山詩要欲追奇趣即此陵丹梯善田丹梯謂山也眺鼓吹登山曲曰暮春春服美游駕陵丹梯升嶠既小魯登巒且悵齊謝靈運登石門最高頂詩共登青雲梯靈嶽荀晞曰淮陽之地北組塗山南枕靈嶽王隱晉書靈山紀地德險峭資嶽靈沈休文鍾山詩崇丘瞻彼崇丘其林藹藹補亡詩振策陟崇丘陸士衡赴洛道中詩崇嶽峨峨崇嶽吐符降神郭有道碑羽斾臨崇基鍾山詩隱天楊雄蜀都賦蒼山隱天岎崟回叢西都賦其陽則崇山隱天幽林窮谷干雲山則交錯糾紛上干青雲子虛賦干雲非一狀沈休文詩合沓敬亭詩茲山亘百里合沓與雲齊鍾山詩合沓共隱天參差互相望沓嶂丘希範詩鳴鞞響沓嶂太白詩回崖沓嶂凌蒼蒼爾雅曰山上正曰嶂天阻曹子建朔風詩俯降千仞仰登天阻千仞易陟天阻可越九成長笛賦託九成之孤岑兮臨萬仞之石磎注山海經柏山四成郭璞曰成亦重也言九者數之多也插漢淯水由分頭嶺南流徑魯陽關左右連山插漢秀木干雲是以張景陽詩云朝登魯陽關峽路峭且深水經峰柱月駕武都南入秦岡山山高入雲遠望增狀若嶺紆曦軒峰柱月駕矣水經注軼雲蔽日四明山高峰軼雲連岫蔽日孔瞱會稽記山峻高以蔽日九章自三峽七百里中兩岸連山略無闕處重巖疊嶂隱天蔽日自非亭午夜分不見曦月水經干天入漢故鄣縣東有青山絶壁干天孤峰入漢緣嶂百重青川萬轉信足蕩纍順物悟衷散賞吳筠與施從事書爭霞限日石門山森壁爭霞孤峰限日幽岫含雲與顧章書空同山黃帝立為天子十九年令行天下聞廣成子在於空同之上故往見之問至道之精莊子汝州臨汝縣廣成坡之西垠有小山曰崆峒即黃帝訪道地廣成子所隱也其顛洞穴如盎將有大風雨則白犬自穴出田夫以為候亦名山曰玉犬峰耆老云若九春三秋天景清麗必有素霧自𡵒起須臾粉堞青甃彌亘數里樓殿轇轕花木煥爛數息中霧勢漫散不復見矣庸輩不知神仙窟宅以為廣成子化城乃俚談也三水小牘爾雅曰北戴斗極為崆峒其地絶遠華夏之君所不至禹跡之內山名崆峒者有三焉其一在臨洮秦築長城之所起也其一在安定二山高大可取財用彼人亦各於其處為廣成子立廟而莊生述黃帝問道崆峒遂言遊襄城登具茨訪大騩皆與此山接壤則臨洮安定非問道之所明矣汝州刺史盧貞碑黃帝西見中黃子受九品之方過崆峒從廣成子受自然之經抱朴子內篇青城黃帝破山通道遍歷五嶽封青城山為五嶽丈人乃嶽瀆之上司真仙之宗秩一月之內群嶽再朝六時灑泉以代晷漏一名赤城一名青城都一名天國山亦為第五大洞寶仙九室之天對郡之西北在岷山之南群峰掩映互相連接靈仙所宅祥異甚多玉匱經青城觀北上十餘里有一臺孤聳獨秀霞表名曰軒轅臺下望衆山如蟻蛭焉連抱之樹有若薺也此臺非得仙之人不可居之山記岷山連峰接岫千里不絶青城乃第一峰也前號青城峰後名大面山山有七十二小洞應七十二候有八大洞應八節天倉諸峰屹然三十有六杜光庭記具茨黃帝登具茨之山升於洪隄之上受神芝圖於黃蘆童子陽城記縉雲括蒼縣縉雲山黃帝遊仙之處有孤石特起高二百丈峰數十或如羊角或似蓮花謂之三天子都有龍鬚草云群臣攀所墜者郡國志堯山蒲城有堯山亦名浮山舊圖經云昔堯時洪水為災諸山盡沒惟此山若浮因以為名桂陽有山盤紆數百里有赭嵓迭起冠以青林與雲霞亂米山上有白石英山下有平陵有大堂基耆舊云堯行宮所水經武夷武夷山者列仙傳籛鏗鍊丹之所也籛鏗進雉羹於堯堯封於彭城故謂之彭祖年七百七十七歲而卒鏗有子二人其一曰武其二曰夷因以名山山志白玉蟾記武夷巖石悉紅覺望若朝霞顧野王謂之地仙之宅建安記羅浮羅浮者蓋總稱焉羅羅山也浮浮山也二山合體謂之羅浮羅山頂有桂所謂賁隅之桂又有天池一鑑周可五里水應海潮是曰神湖浮山者本蓬萊之一峰堯時洪水泛海澌來傳於羅山崖巘皆合至今卉木不同浮山皆海中類也又有平田七畝水旱不及禾稼異常陳郡袁伯東管徐履道皆云蓬萊有三島此其一焉峰嶺秀撥四百餘里峰巒暗映三十二所峰崛起上披重霄下有深洞幽邃旁達約數十里山顛飛雲頂又曰聚霞峰常有紫霞在于峰上夜半登之則見日出真誥呼為層城山記洞名朱明耀真之天茅君內傳朱明之陽宮耀真之陰室謝靈運賦洞中常有五百首真人遊會開元二十六年奉勑建蘸于花首臺天寶初詔道士申太芝祭山欲尋朱明洞時邑簿任知宣領耆舊尋見一洞以藤儋籠石斛垂一人下約五丈餘却出云下視無底日月星辰無不傋初有白雲須臾散漫五色羅浮異記巫咸山蓋巫咸者實以鴻術為帝堯醫生為上公死為貴神豈封斯山而因以名之乎伊巫咸之名山崛孤停而嵥峙配華霍以助鎮致靈潤乎百里郭璞賦九嶷南方蒼梧之丘蒼梧之淵其中有九嶷山舜之所葬在長沙零陵界中山海經九嶷山盤基蒼梧之野峰秀數郡之開羅巖九舉各導一浮岫壑負岨異嶺同勢遊者疑焉故曰九疑水經連峰接岫競秀爭高含霞卷霧分天隔日荊州記魯妙典入九疑十餘年有神人語之曰此山大舜所理天地之總司九州之宗主也古有高道之士作三處麓床可以棲庇風雨宅形念真集仙録九峰一曰蕭韶二曰女美三曰石城四曰娥皇五曰朱明六曰桂林七曰華蓋八曰巴林九曰石樓周回百餘里圖記君山洞庭之山帝之二女居之山海經君山洞庭之山也帝之二女居之曰湘夫人帝女遣精衛至王母取西山之玉印印東海北山慱物志湘夫人者帝堯女也秦始皇浮江至湘山逢大雨而問慱士湘君何神慱士曰聞之堯二女舜妃也死而葬此河圖玉版始皇欲入湘觀衡山而遇風浪溺敗至此山而免因號為君山湘州記湘君所遊故曰君山有神祈之則利涉荊州圖記君山有道與吳包山潛通上有美酒數斗得飲者不死漢武帝齊七日遣男女數十人至君山得美酒欲飲之東方朔曰識此酒請視之因一飲致盡帝欲殺之朔乃曰殺朔若死此為不驗以其有驗殺亦不死乃赦之慱物志龍冢禹生於石紐起於龍冢江源岷山也有禹廟填許山上廟平八十畝每朔望池自漏繼有水給千口禹所遺弓青城記宛委會稽山南有宛委山其上有石形似簣俗呼為石匱壁立千雲有懸度之險升者纍梯然後至焉孔靈符會稽山記禹案黃帝中經見聖人所記曰在九疑山東南曰天柱山號宛委承以文玉覆以盤石其書金簡青玉為字編以白銀禹乃東巡衡山殺白馬以祭之見赤繡文衣男子自稱玄夷滄水使者謂禹曰欲得我簡書知導水之方者齊於黃帝之嶽禹乃齊登石簣山果得其文乃知四瀆之根百川之理鑿龍門通伊闕遂周行天下使伯益記之名為山海經吳越春秋禹開宛委山得赤圭如日碧如月長一尺二寸也開山圖包山禹治洪水至牧德之山見神人焉謂禹曰勞子之形役子之慮以治洪水無乃怠乎禹知其神人再拜請誨神人曰我有靈寶五符以役蛟龍水豹子能傳之不日而就因授禹而誡之曰事畢可祕之于靈山禹成功后乃藏之于洞庭苞山之穴至吳王闔閭之時有龍威丈人得符獻之吳王以示群臣皆莫能識乃令賫符以問孔子曰吳王間居有赤烏銜此書以至王所莫辨其文故令遠問孔子曰昔禹治水于牧德之山遇神人授以靈寶五符后藏于洞庭之苞山君王所得無乃是乎赤烏之事某所未詳使者反白闔閭乃尊事之先是江左童謠云禹治洪水得五符藏之洞庭之苞山湖龍威丈人竊禹書得五書者喪國廬尋而吳果滅吳越春秋越絶書見甄正論吳王闔閭出遊包山見一人自言姓山名隱居闔閭扣之乃入洞庭取素書一卷呈闔閭其義不可識令人賫之問孔子曰某聞童謠曰吳王出遊觀震湖龍威丈人山隱居北土包山入靈墟乃入洞庭竊禹書天帝大文不可舒此文長傳百六初若強取出喪國廬靈寶要略砥柱昔禹治洪水山陵當水者鑿之故破山以通河河水分流包山而過山見水中若柱然故曰砥柱也三穿既決水流踈分指狀表目亦謂之三門矣水經會稽禹到大越上苖山大會計爵有德封有功因而更名苖山曰會稽因病死葬焉越傳會稽之山古防山也亦謂之為茅山又曰棟山越絶云棟猶鎮也蓋周禮所謂揚州之鎮矣山形四方上多金玉下多瑛石山下有禹廟廟有聖姑像禮樂緯云禹治水旱天賜神女聖姑即其像也山上有禹冢昔大禹即位十年東巡狩崩于會稽因而葬之有鳥來為之耘春撥草根秋啄其穢是以縣官禁民不得妄害此鳥犯則刑無赦山東有硎去廟弋里深不見底謂之禹井云東游者多探其穴也水經山有陽明洞一名極玄大元之天白玉上經廬山廬山出三天子都一曰天子鄣山海經古名天子三嶂山洞玄集古名南障山郡國志武王時方輔先生與李老跨白驢入山煉丹得道仙去惟廬存故名廬山九微志輔山即廬山也豫章古今記殷周之際匡俗先生受道於仙人而共遊此山時人謂其所止為仙之廬因名匡廬山慧師山記匡俗字子孝周武王時人生而神靈廬於此山後仙化空廬尚存世稱廬君故號廬山焉周景式山記威烈王以安車迓匡續續仙去惟廬存因命其山為靖廬山邦人以先生姓呼匡山又曰匡阜謝皓廣福觀碑匡俗字君孝父東野王共潯陽令吳芮佐漢定天下而亡漢封俗於潯陽曰越廬君兄弟七人皆好道術遂寓精爽於洞庭之山故世謂之廬山漢武南巡封俗大明公豫章舊志慱物志曹著傳其神自云姓徐受封廬山後吳猛經過山神迎猛猛語曰君王此山近六百年符命已盡不宜久居非據水經廬山彭澤之山也雖非五嶽之數穹隆嵯峨實峻極之名山也王彪之賦敘潯陽郡南有廬山九江之鎮也臨彭蠡之澤按平敞之原孫放賦山四方周四百餘里疊彰之巖萬仞懷靈抱異苞諸仙迹山圖崇標峻極辰光隔輝幽澗澄深積清百仞阻絶重險非人跡之所遊窈窕冲融常含霞而貯氣真可謂神明之區域列真之苑囿矣湛方生神仙詩序廬山者江陽之名嶽其大形也背岷流面彭蠡潘根所據亘數百里重嶺桀嶂仰插雲日俯瞰川湖之流焉伏滔遊山序廬山者亦南國之德鎮雖林石異勢而雲霞共色東瞻洪井識曳帛之在茲西望石梁見指寶之可拾梁元帝山碑序其山川明淨風澤清廣氣爽節和土沃民逸嘉遁之士繼響窟巖龍潛鳳采之賢往者忘歸矣秦始皇漢武帝及太史公司馬遷咸升其巖望九江而眺鍾彭焉水經廬山名山靈詠真之天茅君內傳廬山之南有上霄石高壁緬然與霄漢連接秦始皇三十六年嘆斯嶽遠遂記為上霄焉上霄之南大禹刻石志其丈尺里數今猶得刻石之號焉水經峰去平地七千仞上有古迹云是夏禹治水之時泊船之所鑿石為竅以繫纜焉磨崖為碑皆科斗文字隱隱可見玉堂聞話東南有香爐山孤峰獨秀起游氣籠其上則氤氳若香煙白雲映其外則炳然與衆峰殊別將雨其下水氣湧出如馬車蓋此龍井之所吐慧遠山記西南有石門山兩巖間微有門形故以為稱瀑布飛瀉丹翠交曜謝靈運游名山志廬山頂上一池水池中有三石鴈霜落則飛山北有五老峰於廬山最為峻極橫隱蒼穹積石巖巉逈壓彭蠡其形勢如河中虞鄉縣前五老之形故名之潯陽記峰下有李太白書堂三宮僧景衡陽湘鄉人永明中夢廬山之神云廬山惟嶽峻極于天是曰三宮壁立萬仞欲屈真人居之又夢受請而行至香爐峰石門頂見銀閣金樓丹泉碧樹希世而有後振錫登峰宛如夢中所見虞羲景法師行狀廣弘明集群玉天子北征東還至于群玉之山阿平無險四輒中繩先王之所謂策府寡草木而無禽獸天子於是取玉三乘玉器服物載玉萬隻天子休群玉之山乃命邢侯得攻玉者穆天子傳春山穆王北升于春山之上以望四野曰春山是惟天下之高山也先王所謂玄圃百獸之所聚也飛鳥之所接也愛有赤豹白虎烏青鵰執犬羊食豕鹿穆王觀于春山之上乃為銘迹于玄圃之上以詔後世穆天子傳山海注作鍾山弇山甲子天子賓于西王母乃執白圭玄璧以見西王母西王母再拜受之乙丑天子觴西王母于瑤池之上西王母為天子謠曰白雲在天山䧙自出道里悠遠山川間之將子無死尚能復來天子答之曰子歸東上和治諸夏萬民平均吾顧見汝比及三年將復而野天子遂驅升于弇山乃紀丌跡于弇山之石而樹之槐眉曰西王母之山穆天子傳注即崦嵫山也禹大傳曰涓盤之水出崦嵫山離騷云望崦嵫而勿迫大形王屋二山方七百里高萬仞北山愚公者年且九十面山而居懲山北之塞出入之迂也謀平之河曲知叟止之而不得操蛇之神聞之懼其不已也告之於帝帝感其誠命夸蛾氏二子負二山一厝朔東一厝雍南自此冀之南漢之陰無隴斷焉列子天子命駕八駿之乘赤驥之駟造父為御南征翔行徑絶翟道升于太行南濟于河馳驅千里遂入于宗周穆天子傳中黃伯曰余左執太行之優而右摶雕虎唯象之未與吾心試焉有力者則又願為牛欲與象聞以自試今二三子以為義矣將惡乎試之夫貧窮大行之獶也疏賤義之雕虎也而曰遇之亦足以試矣尸子太行附路之精圖緯降象武王尅殷欲築宮於五行之山今太行山周公曰不可夫五行之山固塞險阻之地也淮南子王屋本冀州之河陽山也古今地名山狀如垣慱物記王屋山號小有清虛洞天太行折山為佐命中條古鍾為輔翼三十六洞小有為群洞之尊四十九山王屋為重山之最實不死之靈鄉真人之洞境也仙經王屋山仙之別天所謂陽臺也始得道者皆詣陽臺是清虛之宮也南嶽夫人言明日當詣王屋清虛宮真誥天目老子說云欲度南及避水災天目海陵山是為第一寰宇記天目山極高峻嶺上有泉水甚美東南有瀑布下注數畝吳興記天目有兩峰峰頂各一池左右相對為天公之左右目元和地志晉郭璞錢唐天目山詩云天目山前兩乳長龍飛鳳舞到錢唐海門一點巽峰起五百年間出帝王及高宗中興建邦天目乃主山至度宗甲戌山崩京城騷動時有建遷蹕之議者未幾宋鼎遂移有人作詩云天目山前水齧磯天心地脈露危機西周浸冷觚移月未必遷岐說果非古杭雜記昔有登天目山北遇雨見雲霧在山腰雷似嬰兒聲遁齊間覽天目山有洞三十六每秋必有一月風雨晦暝土俗云是山神與江神會也圖經山雖多矣莫若天目之為大其高也凡三萬九千尺仰太虛兮日月低生絶頂兮乾坤窄唐杭都賦元天閼奕之隸與殷翼之孫遏士之子三士相與謀致人於造物共之元天之上元天者其高四見列星司馬彪云元天山名莊子顏延年詩元天高北列沙鹿秋八月辛卯沙鹿崩左傳十四年晉史卜之曰陰為陽堆土火相乘故有沙鹿崩後六百四十五年宜有聖女興其齊田乎漢元后傳孔子山黃州東百里有孔子山相傳孔子適楚嘗登山上有坐石草木不侵有硯石每雨墨水浸出城北二十里有小崎山上有飛來石下有石柱推之者可轉而不仆山川紀異䱉山闔閭出入游臥秋冬治於城中春夏治於城外治姑蘇之臺旦食䱉山晝游蘇臺射於鷗陂馳於游臺興樂石城走犬長洲吳越春秋謁泉西河謁泉山一名隱泉山山有石室子夏退居之所陏圖經謁泉山俗雨暘雨𠎝時謁禱是應故山得其名其山石岸地險壁立天固爰有層松飾岩列柏綺望水經虎丘虎丘先名海涌山王珀銘闔廬死葬於國西北名虎丘穿土為川積壤為丘發五都之士十萬人共治千里使象摙土冢池四周水深丈餘槨三重傾水銀為池池廣六十步黃金珠玉為鳧鴈扁諸之劍魚腸三千在焉葬之已三日金精上楊為白虎據墳故曰虎丘吳越春秋虎丘山絶嵒聳壑茂林深篁為江左丘壑之表吳興太守禇淵昔嘗述職路經吳境淹留數日登覽不足乃嘆曰今之所稱多過其實今觀虎丘逾于所聞王僧虔吳地記巨麗之名山大吳之勝壤顧野土山序三江五湖洞庭巨麗其中之秀異者實虎丘之靈阜焉沈炯答張種書吳山杭之吳山吳人憐子胥以諫死立祠其上又名胥止左臨大江右瞰西湖為一郡勝概郡國志金主亮將南侵乃密隱畫工於奉使中俾寫臨安湖山以歸為屏而圖已之像策馬于吳山絶頂題詩其上有立馬吳山第一峰之句史記怪山越王欲築城郭范蠡乃觀天文擬法于紫宮築作小城城既成而怪山自生者琅琊東武海中山也一夕自來百姓怪之故名怪山吳越春秋水經注云飛來徙此壓殺數百家亦云越王無疆為楚所伐去琅琊止東武人隨居山下遠望此山其形似龜故亦有龜山之稱也越起靈臺於山上又作三層樓以望雲物川土明秀亦為勝地故王逸少云從山陰道上猶如鏡中行也水經三神山齊威宣燕昭使人入海求蓮萊方丈瀛洲此三神山者其傳在渤海中去人不遠患且至則船風引而去蓋嘗有至者諸仙人及不死之藥皆在焉其物禽獸盡白而黃金銀為宮闕未至望之如雲及到三神山反居水下臨之風輒引去終莫能至云史記渤海之東有大壑中有五山岱輿員嶠方壺瀛洲蓬萊臺觀皆金玉所居之人皆仙聖之種五山之根無所連著常隨潮波上下往來不得暫峙仙聖欣于帝帝怒流於西極命禺禺疆使巨鼇十五舉首而戴之五山始峙湯問齊人徐市等上書言海中有三神山名曰蓮萊方丈瀛洲仙人居之請得齊戒與童男女求之於是遣徐市發童男女數千人入海求仙人秦紀東方朔寶甕銘曰寶雲生于露壇祥風起于月館望三壺如盈尺視八鴻如榮帶三壺海中三山也一曰方壺則方丈也二曰蓮壺則蓬萊也三曰瀛壺則瀛洲也此三山形如壺器八鴻者八方之名鴻大也登月館以望四海三山則如聚米縈帶者矣拾遺記蓬萊亦名防丘一名雲來方丈一名巒雉瀛洲亦名魂洲亦名環洲員嶠一名環丘上三峰燕王仙臺東有三峰甚為崇峻騰云冠峰高霞翼嶺岫壑冲深合煙罩霧耆舊言燕昭王求仙處水經玉笥屈潭之左玉笥山屈平之放棲於此山而作九歌焉甄烈湘中記漢武好仙於玉笥山頂上置降真壇大還丹竈道士晝夜祈禱天感其誠乃降白玉笥置壇上武帝遣使取之至其壇側飄風大震卷玉笥而去因此則為玉笥山焉玉笥山録巫山大巫山非惟三峽所無乃當抗峰岷娥偕領衡疑其附翼群山並概青雲更就霄漢辨其優劣耳其間首尾一百六十里謂之巫峽蓋因山為名也水經楚襄王與宋玉遊於雲夢之野望朝雲之館有氣焉須臾之間變化無窮王問此是何氣玉對曰昔先王遊於高唐怠而晝寢夢見一婦人自云我天帝之季女名曰瑤姬未行而亡封於巫山之臺精搜為草實為靈芝所謂巫山之女高唐之姬聞王來遊願薦枕席王因幸之去乃言妾在巫山之陽高丘之阻旦為朝雲暮為行雨朝朝暮暮陽臺之下旦以視之果如其言為之立館名曰朝雲宋玉集十二峰曰望霞峰翠屏峰朝雲峰松巒峰集仙峰聚鶴峰淨壇峰上升峰起雲峰飛鳳峰登龍峰聖泉峰武擔武都丈夫化為女子顏色美絶蓋山精也蜀王納以為妃無幾物故王哀念之遣武丁之武都擔土為妃作冢蓋地數畝高七丈號曰武擔以石作鏡一枚表其墓其石俗今名為石笋蜀王本紀華陽國志吳山雍州其山鎮曰吳嶽周禮國語謂之西吳古文以為汧山秦都咸陽以為西嶽漢地理志一名吳嶽馬融作開山書疏吳山三峰霞舉秀出雲霄崩巒傾返山頂相捍望之恆有落勢水經秦望會稽秦望山為衆峰之傑陟境便見史記云秦始皇登之以望南海自平地以取山頂七巠縣嶝孤危峭路險絶記云扳蘿捫葛然後能升山上無高木當由地逈多風所致山南有嶕峴峴裏有大城越王無餘之舊都也上四明四明名丹山赤水之天上有石窟四穴通日月星辰之光故曰四明秦時驅山塞海鬼神勞役奔入四明洞不出因名鬼藏山其巔五峰絶高形如芙蓉良常秦始皇登句曲北垂嘆曰巡狩之樂莫過於山海自今以往良為常也爾群臣并稱壽嘆曰良為常矣乃改句容北垂為良常山金陵志大翮居庸縣有大翮小翮山高巒截雲層陵斷霧雙阜共秀兢舉群峰之上郡人王次仲少有異志年及弱冠變蒼頡舊文為今隸書秦始皇時官務煩多以次仲所易文簡便於事要奇而召之三徵而輒不至次仲履真懷道窮數術之美始皇怒其不恭令檻車送之次仲行次忽化為大鳥出車外翻飛而去落二翮於斯山故其峰巒有大翮之名矣水經注次仲匿術匿術于秦始落雙翮而冲天陽固北都賦驅山鐸宜春界鍾山有峽數十里其水即宜春江也回環澄徹深不可測曾有漁人垂釣得一金鎖引之數百尺而獲一鐘又如鐸形漁人舉之有聲如霹靂天晝晦山川震動鍾山一面崩摧五百餘丈漁人皆沉舟落水其山摧處如削至今存焉或有識者云此即秦始皇驅山之鐸也玉堂間話拒神山牟州有拒神山在州東五里始皇取石為橋此山拒而不去因遂名焉山南四里有黃銀冗續高僧傳八素八素山在武義縣東陽山水記云秦末有八士來隱於此故名五嶺秦北為長城之役南有五嶺之戍漢書五嶺大庾始安臨賀桂陽揭陽廣州記大庾嶺一名塞嶺又曰塞上武帝元鼎四年南越相呂嘉殺漢將韓千秋函封漢使節置塞上即此嶺也南康記云漢兵擊嘉衆潰有監軍姓庾城是嶺以其姓庾因謂之大庾又以其上多梅而先發亦曰梅嶺海録古人云五嶺者天地以隔內外況綿塗於海衣顧九嶺而彌邈非復行路之徑岨信幽荒之冥域者矣水經茅山句曲山秦時名為華陽之天三茅君居之因而為名外金山因壇為號矣周時名其源澤為句曲之穴案山形曲折後人名為句曲之山山間有金陵之地四十七八頃是金壇之地肺也居其地必得度世茅君內傳句曲洞天東通林屋北通岱宗西通峨嵋南通羅浮真誥句曲山深曲而有所容故號為句容里史記方山湖熟西北有方山頂正方上有池水輿地志山形方如印故曰方山亦名天印山丹陽記始皇時望氣者云江東有天子氣乃東游以厭之又鑿金陵以斷其勢今方山石硊是其所斷之地也輿地志酉陽小酉山石穴中有書千卷相傳秦人於此而學因留故梁湘東王云訪酉陽之逸典是也荊州記終南荊山中南九州之險也左傳終南一名中南言在天中居都之南也關中記太一在驪山西山之秀者也一名地胏山可避洪水三秦記孟門終隆之山不能禁注終隆終南淮南子扶風武功縣有太一山古文以為終南漢地理志秦時四皓共入啇雒隱地肺山以待天下定及秦敗漢高聞而徵之不至深自匿終南山不能屈已高士傳盧藏用初隱居之時有貞險之操往來于少室終南二山時人稱為隨駕隱士後登朝趑趄詭佞專事權貴道士司馬子微歸天臺山群公祖道藏用指終南山曰此中甚有佳處何必天臺子微曰以吾觀之此乃仕宦之捷徑爾藏用有慚色舊唐據西京賦終南太一隆窟崔崒西征賦面終南而背雲陽跨平原而連蟠冢九嵕𡽱嶭太一巃嵸則終南太一非一山也元和志蓋終南南山之總名太一一山之別號五經要乂按四皓先隱地胏後匿終南則地胏終南亦非一山矣天階將樂縣天階山下有寶華洞即赤松子採藥之所洞中有石燕石蝙蝠石室石柱并石臼石井俗云其井南通沙縣溪復有乳泉自上而滴人以服之登山頂者若升碧霄故有天階之號建安記孤雲兩角興元南有路通巴州深溪峭巖捫蘿摸石三日始達于山頂復登措大嶺蓋稍平處也其絶頂謂之孤雲兩角彼中諺云孤雲兩角去天一握淮陰侯廟在焉昔韓信亡去蕭何追及於茲山王仁裕題詩云孤雲不掩興亡策兩角曾懸去住心玉堂間話八公山壽春八公山山無樹木唯重阜耳山上有淮南王劉安廟安折節下士篤好儒學養方術之徒數十人皆為俊異焉多神仙祕法鴻寶之道忽有八公皆鬚眉皓素詣門希見門者曰吾王好長生今先生無住衰之術未敢相聞八公咸變成童王甚敬之八士並能鍊金化丹出入無間乃與安登山埋金於地白日升天餘藥在器雞犬䑛之者俱得上升其所升之處踐石皆陷人馬跡存焉故山即以八公為目晉世謝玄北禦苻堅祈八公山及置陳於肥水之苻堅望上山草木咸為人狀非八公之靈有助蓋符氏將亡之感也水經函山齊郡函山有鳥足青觜赤黃素翼絳顙名王母使者昔漢武登此山得玉函長五寸帝下山玉函忽為白鳥飛去世傳山上有王母藥函常令鳥守之酉陽雜俎天台天台山者蓋山嶽之神秀也涉海則有方丈蓬萊登陸則有四明天臺皆玄聖之所遊化靈仙之所窟宅孫綽賦序明帝永平五年剡縣劉晨阮肇共入天臺山度山出一大溪溪邊有二女子姿質妙絶遂留半年後懷土求歸既出親舊零落邑屋改異無復相識訊問得七世孫幽明録天台山上應台星超然秀出山有八重視之如一帆高一萬八千丈周回八百里臨海經天台山去天不遠路楢溪溪水險清冷前有石橋路徑不盈尺長數千丈下臨絶冥之澗唯忘其身然後能濟濟者梯巖壁捫蘿葛之莖度得平路見天台山蔚然綺秀列雙嶺於青霄上有瓊樓玉閣天堂碧林醴泉仙物華具晉隱士白道猷得過之獲醴泉紫芝靈樂啓蒙記注赤城山天台之南門也瀑布山天台之西南峰水從南巖懸注望之如曳布天台山圖赤城山土色皆赤岩岫連沓狀似雲霞懸霤十仞謂之瀑布飛流灑散冬夏不竭山谷絶澗崢嶸無底長松蔓藟幽藹其上內有天台虛嶽仙室璿臺會稽記赤城山亦名燒山名山略記此山舊名五縣之餘地五縣餘姚鄞句章剡始寧會稽記濟楢溪而直進落五界而迅征孫賦天臺山有八桂嶺地理記白石之山望之如雪山有湖傳云金鵝之所集八桂之所植臨海記八桂森挺以凌霜賦天臺山赤城阻其徑瀑布激其衢石有莓苔之險淵有不測之深異苑燕然竇憲與單于戰于稽落山大破之憲遂登燕然山刻石勒功班固作銘曰封神丘兮建隆嵑後漢築山梁冀廣開園囿採土築山十里九坂以象二崤深林絶澗有若自然奇禽馴獸飛走其間後漢祁山漢水北連山秀舉羅峰競峙祁山在蟠冢之西山上有城極為巖固昔諸葛亮攻祁山即此城也開山圖曰漢陽西南有祁山溪徑委迤山高巖嶮九州之名岨天下之奇峻水經鍾山建康東北十里有鍾山舊名金山漢末金陵尉蔣子文討賊戰亡靈發於山因立蔣侯祠焉故號曰蔣山諸葛亮以為鍾山龍盤即蔣山也徐爰釋問略京師南北並有連領而蔣山獨隆崫峻異其形象龍實楊都之鎮也孫權葬山南因山為名號曰孫陵丹陽記蔣山輿地圖謂之鍾山元皇未渡江之年望氣者云蔣山上有紫雲時時晨見庾闡楊都賦注蔣山舊名金陵山因此立名金陵輿地志秦始皇時望氣者云金陵有天子氣埋金玉雜寶於鍾山乃斷其地更名曰秣陵金陵地記大帝祖諱鍾因改名曰蔣山吳録蕭士贇李白金陵歌注云大帝為子文立廟子文祖諱鍾改曰蔣山一統志亦云誤石城石頭城山嶺嶂千里相重若一游歷者以為吳之石城猶楚之九疑也山上有城因以為名漢建安十六年吳孫權修理改名石頭城今清涼寺西是也江乘地記諸葛亮謂吳大帝曰秣陵地形鍾山龍蟠石城虎踞真帝王所都也景陽黃初元年文帝愈崇宮殿雕飾觀閣取白石英及紫石英五色大石於太行穀城之山起景陽山于芳林園樹松竹草木捕禽獸以克其中于時百役繁興帝躬自掘土率群臣三公以下莫不展力孫盛魏春秋北芒明帝欲平北芒令於其上作臺觀則見孟津辛毗曰天地之性高高下下今而反之既非其理加以損費人功民不堪役且若九河盈溢洪水為害而丘陵皆夷將何以禦之帝乃止魏志北邙山是隴山之尾一名平逢山一名郟山郡國志北山連嶺修且四百餘里實古今東洛九原之地也洛陽記南臨洛水北據邙山託崇以為宅因茂林以為蔭應璩與程文信書蘇韶卒見形于蘇節求改葬曰吾性愛好京洛每往來出入瞻視邙山樂哉萬世之基也北背孟津洋洋之河南望天邑濟濟之盛王隱晉書太白吉茂蘇則值亂隱於扶風南太白山中以經籍自娛魏略太白山不知高幾許俗云武功太白去天三百山下軍行不得鳴鼓角鳴鼓角則疾風暴雨兼至也三秦記嵩梁武陵郡嵩梁山高峰孤聳素璧千尋望之苕亭有似香爐永安六年其山洞開玄朗如門高三百丈廣二百丈門角上各生一竹倒垂下拂謂之天帚孫休以為嘉祥分武陵置天門郡水經荊州記隋文帝改曰石門山崑山海鹽縣東北二百里有長谷昔陸遜陸凱居此谷東二十里有崑山父祖葬焉陸道瞻吳地記陸氏之先葬此士衡兄弟生焉時人以玉出崑岡比之故名士衡贈從兄車騎詩所謂婉孌崑山陰也輿地廣記峴山羊祜嘗與從事鄒湛共登峴山垂泣曰自有宇宙便有此山由來賢達勝士登此遠望如我與卿者多矣皆湮滅無聞念此使人悲傷我百年後魂魄猶當登此山也湛對曰公德冠四海道符前哲令聞令望當與此山俱傳若湛輩乃當如公語耳襄陽耆舊傳沉碑杜預好為後世名常言高岸為谷深谷為陵刻石為二碑紀其勳績一沉萬山之下一立峴山之上曰焉知此後不為陵谷乎晉書時人多使沉碑峴首唐賢往往有之按晉書云云沉碑峴首誤也當為沉碑萬山南部新書五臺五臺山有五巒巍然故曰五臺晉永嘉三年鴈門郡人五百餘家避亂入此山見山中人為先驅因而不返遂寧巖野往還之士稀有望見有村居者至詣尋訪莫知所在故俗人以為仙者之都矣中臺之山山頂方三里西北有一泉水不流謂之太華泉蓋五臺之層秀仙經云此山名為紫府仙人居之其北臺之山冬夏常冰雪不可居即文殊師利常鎮毒龍之所今多佛寺四方僧徒善信之士多往禮焉水經注內經以為清涼山元和志雲代之間有靈山焉與竺乾鷲嶺角立相望而往山東峰有離嶽火球西峰有麗農瑤室南峰有洞光珠樹北峰有玉澗瓊芝中峰有自明之金環光之璧太平廣記太和武當山亦曰太和山亦曰參山山形特秀又曰仙室晉咸和中歷陽謝允捨羅邑宰隱遁斯山故亦曰謝羅山水經武當山區域周回四五百里中央有一峰名四參嶺高二十餘里望之秀絶出於雲表清朗之日然後見峰一月之間不見四五輕霄蓋於上白雲帶其前旦必西行夕而東返嘗謂之朝山蓋以衆山朝揖之生也山記武當山山高巃峻若慱山香爐苕亭峻極于霄出霧學道者常百數相繼不絶若有於此山學者心有隆替輒為獸所逐南雍州記印渚印渚山上承浮溪水從渚以上至縣悉石瀨惡道不可行船以下水道無險故行旅集焉晉王胡之為吳興太守至渚中歎曰非唯使人心情開滌亦覺日月清朗傳云渚次石文似印因以為名吳興記東山王右軍語劉尹故當共推安石劉尹曰若安石東山志立當與天下共推之世說謝公在東山朝命屢降而不動後出為桓宣武司馬將發新亭朝士咸出瞻送高靈時為中丞亦往相祖先時多少飲酒因倚如醉戲曰卿屢違朝旨高臥東山諸人每相與言安石不肯出將如蒼生何今亦蒼生將如卿何謝笑而不答上東永安西永安為安石之東山臨要圖記安石每游賞必以女妓自隨今山絶頂有謝公調馬路白雲明月二亭遺跡地志後於建康土山營築以擬東山六朝事迹濟勝許詢字玄度好遊山水而體便登涉時人云許非徒有勝情實有濟勝之具世說買山支道林因人就深公買印山深公答曰未聞巢由買山而隱世說遁得深公之言慚恧而已高逸沙門傳競秀顧愷之從會稽還人問山川之美顧云千巖競秀萬壑爭流草木蒙籠其上若雲興霞蔚世說映發會稽境特多名山水峰崿隆峻吐納雲霧松栝楓柏擢幹竦條潭壑鏡徹清流寫注會稽郡記王子敬云從山陰道上行山川自相映發使人應接不暇若秋冬之際尤難為懷世說采藥許邁小名阿映上山采藥經月不返每言映好山林猶魚得水也真誥天姥天姥山與括蒼山相連石壁上有刊字科斗形高不可識春月樵者聞簫鼓笳吹之聲聒耳元嘉中遣名畫寫狀於圖扇即此山也郡國志瞑投剡中宿明登天姥岑謝靈運與惠連詩東南山水越為首剡為面沃洲天姥為眉目沃洲禪院記登躡謝靈運尋山陟嶺必造幽峻巖嶂千重莫不備盡登躡常著木履上山則去前齒下山去其後齒宋書神明境嵊山帶山臨江松嶺森蔚與始它寧縣嶀山峰嶺相連其間傾澗懷烟泉溪引霧吹畦風馨觸岫延賞是以王元琳謂之神明境事備謝康樂山居記水經東則天台桐柏方石太平二韭四明五奧三菁表神異於緯牒驗感應於慶靈連岡則積嶺以隱嶙舉峰則群竦以𡽱𡾲山居賦觀景陽孝文曾幸華林園因觀故景陽山祚曰山以仁靜水以智流願陛下修之帝曰魏明以舉失於前朕何為襲之於後祚曰高山仰止帝曰得非景行之謂北史山雲陶弘景性愛林泉齊高祖問之曰山中何所有弘景賦詩以答之曰山中何所有嶺上多白雲只可自怡悅不堪持寄君高祖賞之談藪齊無高祖疑梁武也秀山池州秀山峰巒秀麗屹然于雲昭明太子薨其神附于秀山之民曰吾昔愛此今帝賜我矣民為立祠山阿圖經慶山則天時新豐縣東南露臺鄉因大風雨雹震有山踊出高二百尺有池周三頃池中有龍鳳之形禾麥之異則天以為休徵名為慶山荊州人俞文俊詣闕上書曰臣聞天氣不和而寒暑隔人氣不和而疣贅生地氣不和而堆阜出今陛下以女主居陽位反易剛柔故地氣隔塞山變為災陛下以為慶山臣以為非慶也則天怒流于嶺南舊唐志給事中魏叔璘曰地生骨堆何足可慶或以上聞坐賜死兩京道里記山移永昌中華州赤水南岸大山晝日忽風昏有聲隱隱如雷頃之漸移東數百步擁赤水壓張村民三十餘家山高二百餘丈水深三十丈坡上草木宛然唐志金庭山嵊縣桐柏山上有金庭洞道書以為第二十七洞天下有丹池赤水唐天寶六載改名曰丹池山晏殊類要云越有桐柏之金庭養真之福地輔唐太和先生王旻得道者也常遊名山五嶽玄宗雅敬信之南嶽道者李遐周恐其戀世樂勸旻令出旻乃請于高密牢山合煉玄宗許之因改牢山為輔唐山許旻居之紀聞九華九華山録云峰巒異狀其數有九故號九子李白以九峰如蓮花更號九華劉禹錫云九華山自是天地一尤物陸渾元德秀為魯山令秩滿南游陸渾見佳山水杳然有長往之志乃給廬山阿陶陶然遺身物外舊唐徛玕元結天寶中師中行子始在沈於之山稱元子逃難入猗玕之山稱猗玕子或稱浪士漁者乎為聲叟酒徒呼為漫叟及為官呼漫郎國史補九日秦系字公緒天寶末客泉州南安有九日山大松百餘章俗傳東晉時所植系結廬其上姜公輔之謫別駕見系輒窮日不能去築室與相近忘流落之苦卒南安人思之為立小亭號其山為高士峰云唐書買山錢于頔鎮襄陽匡廬符載山人遣書乞買山錢百萬公遂與之仍加紙墨衣服等雲溪友議造山懿宗末年長安役人取石於苑中造山崎危詰曲有若天成又命取終南草木植之山禽野獸縱其往復及造屋室如庶民家帝與嬪妃遊處由是王公貴游爭效之未及半年奇花異草自然生滿宮殿識者以為丘墟之象後黃巢入京焚燒殆盡悉為瓦礫紀異録錦維王鎔好左道與道士王若訥留游西山登王母祠使婦人維錦繡牽持而上逾月忘歸五代史衣錦山臨安石鏡山東峰有圓石徑二尺七寸其光如鑑吳越王錢鏐布衣時嘗照此鏡鏡起而聳戰顧其形服皆冠冕如王者狀寰宇記其後唐昭宗改鏐所居營曰衣錦營又升衣錦營為衣錦城石鑑山曰衣錦山大官山曰功臣山鏐游錦城宴故老山林皆覆以錦號號其幼所嘗戲大木曰衣錦將軍五代史金山金山始名浮玉言自玉京諸峰浮而至也道藏經此山大江環繞每風濤四起勢欲浮動故南朝謂之浮玉山唐有裴頭陀于此開山得金因名金山周必大雜志麥積山北跨清渭南漸兩當其半崛起一石塊高百萬尋望之團圓如民間積麥之狀故有此名其青雲之半峭壁之間鐫石成佛萬龕千室雖自人力疑其鬼工隨文分葬神尼舍利函於東閣下傍室之中有庾信記刊于巖中古記云六國共修自平地積薪至于巖巔從上鐫鑿其龕室佛像功畢旋旋折薪而下然後梯空架險而上其上千房萬屋緣空躡虛登之者不可回顧將及絶頂有萬菩薩堂鑿石而成自此室上更有一龕謂之天堂空中倚一獨梯攀緣而上至此則萬人無一人敢登者於此下顧其群山皆如培塿王仁裕前唐末年辛未獨能登之題詩于天營西壁上曰躡盡懸空萬仞梯等間身共白雲齊簷前下視群山小堂上平分日月低云云玉堂間話斗山興元有斗山觀自平川內聳起一山四面懸絶其上方如斗底故號之薜蘿松檜景象幽奇上有唐公昉飲李八百仙酒全家拔宅之跡其宅基三畝許陷為坑此蓋連地而上升也王仁裕辛巳歲為節度判官嘗以片板題詩于觀舊說斗山一洞西去二千里通于青城大面山又與嚴貢觀井相通仁裕癸未年入蜀因入嚴貢觀見斗山詩牌在焉詰之不知所來人皆異之上皖公李家明從元宗遷南都時已失江北十四郡舟楫多行南岸至趙屯因輟樂停觴北望皖公山謂家明曰好青峭數峰不知何名也家明應聲對曰龍舟輕颯錦帆風正值宸遊望遠空回首皖公山色翠影斜不到壽杯中元宗慚之俯首而過南唐皖山在𤄵山天柱峰相連其山三峰鼎峙疊嶂重巒拒雲概日登涉無由漢地理志山王有舊南漢韶州釋如敏者知來事多異迹初以一苦行為侍者呼曰所由一日隨登山脊間却之前令下山回顧見敏入地焉苦行隱草中伺之久之乃出迎問曰師焉往平曰吾與山王有舊邀命言話來如是時或亡者乃穴地而出嚴誡之曰所由無宜外說泄吾間務高僧傳天中宋劉敞云豫州天地之中而汝南又為豫州之中故汝寧北三里有山名天中一名天臺云自古測影植圭莫準於此鴈宕西域書云第五位尊者諾詎那大羅漢續居震旦南大海際鴈蕩山又云龍湫鴈宕乃吾佛弟子諾詎那者之化都也詎那至山中觀瀑遂坐化焉唐貫休詩云鴈宕經行雲漠漠龍湫宴坐雨濛濛宋太宗時永嘉僧全了至荊州至玉泉山遇天竺一神僧謂之曰嘉有諾詎羅者道場數適當興師宜往訪以成其事了詰其所在曰地以花名山以鳥名中有龍湫宴坐此尊者棲錫地也了遍訪諸山行至海濱見山水清奧因問其村曰芙蓉問其山曰鴈宕了大感悟遂住山結菴於山水要會處曰芙蓉菴即今能仁寺也大芙蓉小芙蓉者鴈山西外谷山名也山志蕩在山之絶頂中多葭葦每深秋鴻鴈來集故名其地險遠至者絶少山下有東西二谷東谷有剪刀峰瀑布泉頗奇大龍湫在其上西谷有長雲峰在馬鞍巖之東展旗石屏天柱玉女卓筆諸峰皆奇峭聳直高插天半而不沾寸土其北最高且大橫十數石石理如湧浪名平霞嶂靈岩寺在諸峰巑岏中於此獨立西顧心目驚悸清氣砭骨似非人世令人眷戀裴回不忍舍去回視西湖飛來等峰便覺塵俗無餘韻矣平霞嶂西一洞中有石下垂泉涓涓出二竅中名象鼻泉括蒼五嶽圖序曰括蒼山東嶽之佐命登真隱訣注及吳録云括録山登之俯視雷雨也鵜鶘山鵜鶘山有二峰峻極于天高崖雲峰亢石無階後徒喪其捷巧鼯族窮其輕工及其長霄骨鎮層霞冠峰方乃就辨優劣耳故有大小鵜鶘之名矣水經百梯河東涷水南鹽道山其西則石壁千尋東則磻溪萬仞方嶺雲回奇峰霞舉孤標秀出罩絡群山之表翠柏蔭峰清泉灌頂郭景純云世所謂鴦漿也發于上而潛於下矣厥頂方平有良藥神農本章曰地有固活女踈銅藝紫菀之族也是以緇服思玄之士鹿裘念一之夫代往遊焉路出北巘勢多懸絶來去者咸援蘿騰崟尋葛降深於東則連木乃陟百梯方降巖側縻鎖之跡仍今存焉故亦曰百梯山也上鳳凰山杭州鳳凰山下瞰大江直望海門勢若鳳凰欲飛之狀有石如片雲援地高數丈將巔有一竅已餘名曰月巖惟中秋之月穿竅而出十四十六日則外此竅矣餘月尤斜積書巖積石河北有層山山甚靈秀山峰之上立石數百丈亭亭桀豎競勢爭高遠望參若攢圖之記霄上其下層巖峭舉壁岸無階懸巖之中多石室焉室中若有積卷矣而世士罕有津逮者因謂之積書巖巖堂之內每時見神人往還矣蓋鴻衣羽裳之士練精餌食之夫耳俗人不悟其仙者乃謂之神鬼彼羌目鬼曰唐述復因名之為唐述山指其堂密之居謂之唐述窟其懷道宗玄之士皮冠淨髮之徒亦往棲託焉水經青山臨沮縣西有青山青溪之源也尋源浮溪奇為深峭盛弘之云稠水傍生凌空交合危樓傾嶽恆有落勢風泉傳響於青林之下巖流聲於白雲之上遊者常若目不周玩情不給賞是以林徒栖託雲客宅心泉側多結道士精廬焉上龍門北徐州東南有石門世俗謂之龍門也其山上合下開開處高六丈飛冰歷其間南出乘崖傾瀾泄注七丈有餘渀蕩之音奇為壯猛觸石成井水深不測素波白激濤襄四陸闞之者驚神臨之者駭魄矣上朱提為朱提山羊腸繩屈八十餘里或攀木而升或繩索相牽而上緣陟者若將階天故袁休明巴蜀志云高山嵯峨巖石磊落傾側縈回下臨峭壑行者扳緣牽援繩索三蜀之人及南中諸郡以為至嶮浮嶽始興曲江縣有浮嶽山山躡一處則百餘步動若在水也因名浮嶽山水經注高梁山南浦郡高梁山尾東跨江西首劍閣東西數千里嶺長峻其峰崔嵬於蜀市望之若長雲垂天一日行之乃極其頂俯視衆山泯若平原劍閣銘所謂巖巖梁山積石峨峨即述此也江源記石鍾山南康都昌縣有石鐘山西枕彭蠡連峰疊嶂壁立削峻南西北而皆水四時如一白波撼山其聲若鍾因名之李渤辨山鍾山記云水經云彭蠡之口有石鐘山酈元謂下臨深潭微風鼓浪水石相摶響若洪鍾因受其稱豫尋繹東湖躋崖穿洞次于南隅忽遇雙石欹枕潭際影淪波中詢諸水濱乃曰石鍾也有銅鐵之異焉扣而聆之南音函胡北音清越扣之響騰餘韻徐歇若非澤滋其山山含其英聯氣凝質發為至靈不然則安能産茲奇石乎乃知山仍石名舊矣如善長之論則瀕流庶峰皆可以斯名貫之聊刊前謬留遺將來寰宇記馬當馬當山高八十丈周回四里在古彭澤縣北其山橫枕大江山象馬形回風急擊波浪涌沸舟船上下多懷憂恐山際立馬當山廟以祠之九江記唐王勃沮風泊舟其下遇老叟助以順風一夕至洪都作滕王閣序陸魯望銘云天下之險者在山曰太行在水曰呂梁合二險而為一吾又聞乎馬當一山四名史記胸奴傳驃騎將軍擊胸奴過居延攻祁連山注西河舊事曰胸奴歌云失我祁連山使我六畜不番息祁連一名天山亦曰白山也霍去病傳注小顏曰胸奴謂天為祁連明帝紀擊破白山虜于蒲類海上章懷注曰西河舊事云白山冬夏有雪故曰白山胸奴謂之天山過此皆下馬拜又竇固破呼衍王于天山注天山即祁連山一名雪山今名折羅漢山在伊州北祁音時靈鷲山西域耆闍崛此云靈鷲山大論云耆闍石鷲崛名頭是山頂似鷲因名靈鷲觀經疏云諸聖仙靈因之而住西域記云既棲鷲鳥又類高臺故云鷲峰亦云鷲臺應法師云按梵本無靈義此鳥有靈知人死活故號靈鷲波沙云其山三峰如仰雞足似狼之迹亦名狼迹又云普賢山白墡山仙人山負重山翻譯名義竺法無云胡語羅閲祇國有靈鷲山胡語云耆闍崛山山是青石頭似鷲鳥阿育王使人鑿石假安兩翼兩腳鑿治其身今見存遠望似鷲鳥形故曰靈鷲山也水經始興曲江靈鷲山本名虎郡山亦曰虎市山以虎多暴故也晉義熙中沙門釋僧律葺宇巖阿猛虎遠跡蓋律仁感所致因改曰靈鷲山上荊門州靈鷲山有穴曰龍洞深五里石臺甚高春月水聲如鐘鼓管籥聽者忘倦宋熙寧中山泉溢有髹器車流出志字曰嘉州蓋泉與蜀通也志須彌西域記云蘇迷盧唐言妙高舊曰須彌法苑云三千大千世界之中四天下以蘇迷盧山為中因本經云其山四寶合成在大海中據金輪上日月之所回泊諸天之所游舍七山七海環峙環列四面各有一色東黃金南琉璃西白銀北頗梨隨其方面水同山色毗曇俱舍云妙高七寶所成故名妙出七金山故名高鐵圍四洲地心即是須彌山山外別有八山其外鹹海廣於無際海外有山即大鐵圍山四周圍輪長阿起世經山名斫伽羅一曰柘伽羅應法師云此翻輪山舊云鐵圍翻譯須彌為帝釋所居鐵圍為藩墻之城法苑補陀落迦此云海島又云小白花西域記云有咀落迦山南海有石天宮觀自在菩薩游舍翻譯山在明州定海昌國東海中約一潮可到佛書稱海岸孤絶處也一名梅岑山或謂梅福煉丹於此因名有善財巖潮音洞乃觀音大士化現之地志駿迦西域記云僧伽羅國東南隅有駿迦山巖谷幽峻神鬼游舍昔佛於此說駿迦經舊曰楞迦經訛也翻譯彌樓此云光明七金山也金色光明故俱舍須彌亦云彌樓法華云內外彌樓山須彌及鐵圍則非一山雞足西域記云屈叱播陀唐言雞足山峻起起三峰慈氏將登此山彈指峰開迦葉授衣火化入滅四面忽魯謨斯國有一大山四面各産一物一面海邊出鹽如紅礬可末而食之不潮濕鑿之一塊有三四百斤者一出紅土如硃一出白土可堊一出黃土色如姜黃其王令人守視各處人貨而用之瀛涯勝覽勢羅西域記唐言山塢波世羅翻為小山山精如人一足長三四尺食山蟹夜出晝藏玄中記其得曰蚨一曰超空一曰𤟤一曰飛龍呼其名不敢為害抱朴子天中記卷七
