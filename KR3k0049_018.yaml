body:
  text: 伯叔世父父之晜弟先生為世父後生為叔父爾雅世有為嫡者嗣世統故也注繼世以嫡長先生於父則繼世者也故曰世父說文叔作卡許慎曰從上小言尊行之小也疏伯把也把持家政也父弟為仲仲中也位在中也仲父之弟曰叔叔者少也叔父之弟曰季季癸也甲乙之次癸在下也釋名齊衰縣子瑣曰吾聞之古者不降上下各以其親滕伯文為孟虎齊衰其叔父也為孟皮齊衰其叔父也檀弓字叔爰盎字絲名重朝庭常引大體慷慨宦者趙談以數幸常害盎盎患之盎兄子種諫盎曰君衆辱之後雖惡君上不復信徙吳相辭行種謂盎曰吳王驕日久國多姦今絲欲刻治彼不上書告君則利劍刺君矣南方卑濕絲能日飲無何說王勿反而已如此幸得脫盎用其計吳王厚遇盎本傳大人疏廣字仲翁宣帝時為太子太傅兄子受字公子為少傅太子每朝因進見太傅在前少傅在後父子並為師傅朝廷以為榮廣語受以止足受叩頭曰從大人議即日父子俱移病漢書十起第五倫字伯魚京兆長陵人或問倫曰公有私乎對曰吾兄子嘗疾一夜十往退而安寢吾子有疾雖不省視竟夕不眠若是者豈可為無私乎後漢引老薛包字孟嘗弟子求分財異居包不能止乃中分其財奴婢引其老病者曰與我共事久若不能使也田廬取其荒頓者曰吾少時所治意所戀也器物取其朽敗者曰我生平所服食身口所安也上活姪琅琅兒子明歲敗之時兄為饑人所食自縳叩頭代兄為食餓人美其義兩全舍不食兄死收養其孤愛不異於己之子歲敗榖盡不能兩活餓殺其子活兄之子臨淮許君叔亦養孤兄子歲倉卒之時餓其親子活兄之子與子明同義論衡魏談有一孤兄子年一二歲常自養視遭饑饉棄其女養活兄子州郡高其義東觀記親若幼童蔡雍書曰雍薄祐早喪二親年踰三十鬢髮二色叔父親之猶若幼童車則對生食則比豆拔柴載還范丹為萊蕪長去官於市賣卜妻紡績以自給丹弟子愷見丹藩不完載柴將客藩之時丹適行還怒勑子拔柴載以還之矣袁山松書陽中惡風太祖一名吉利字阿瞞少飛鷹走狗遊蕩無度其叔父數言之於嵩操患之後逢叔父於路乃陽敗面喎口叔父怪問其故太祖曰卒中惡風叔父以告嵩驚愕呼操操口貌如故嵩曰叔父言汝中風已差乎操曰初不中風但失愛於叔父故見罔耳嵩乃凝焉後叔父有所告嵩終不信操於是益得肆志矣曹瞞傳傷耳荀攸字公達七八歲叔父衢曾醉誤傷攸耳而攸出入遊戲常避護不欲令衢見衢後聞之乃驚其夙智如此魏書祖父曇卒故吏張推求守曇墓攸年十三疑之謂叔父衢曰故吏有非常之色殆將姦亂衢悟乃推問果殺人亡命因是異之魏志癡叔王湛初有隱德人莫能知兄弟宗族皆以為癡兄子濟輕之所食方丈盈前不以及湛湛命取菜蔬對而食之濟嘗詣見床頭有周易問曰叔父何用此為湛曰體中不佳時脫復看耳濟請言之湛因剖析玄理微妙有奇趣皆濟所未聞也晉書濟先略無子姪之敬既聞其言不覺凛然心形俱肅遂留連彌日纍夜濟雖俊爽自視缺然乃喟然嘆曰家有名士三十年而不知濟之罪也既而辭還渾問濟何以暫行纍日曰始得一叔渾問其故濟具歎述如此渾曰何如我濟曰濟以上人武帝每見濟輒以湛調之曰卿家癡叔死未濟曰臣叔不癡稱其實美帝曰誰比濟曰山濤以下魏舒以上世說時人謂湛上方山濤不足下比魏舒有餘湛聞之曰欲以我處季孟之間乎晉陽秋蘭王謝太傅問諸子姪子弟亦何預人事而正欲使其佳諸人莫有言者車騎玄答曰譬如芝蘭玉樹欲使其生於階庭耳世說佩囊謝玄嘗佩紫羅香囊叔安惡之而不欲傷其意因戲賭得乃焚之本傳穢素業陸納字祖言為吳興太守謝安嘗欲詣納而納殊無供辨其兄子俶不敢問之乃密作數十人供安既至納所設唯茶果而已俶遂陳盛饌珍羞畢具客罷納大怒曰汝不能光益父叔乃復穢我素業邪於是杖之四十後以愛子長生有疾求解官營視兄子禽又犯法應刑乞免官謝罪詔特許輕降頃長生小佳喻還攝職晉書先見安帝時以劉鎮之為散騎常侍光祿大夫不受鎮之毅季父也義熙初謂毅等曰汝輩才力勢運足以得志當身事耳我不就汝求位求財又不受汝罪纍每見毅等導從吏卒到門輒罵詬之毅甚敬畏每未至宅數百步止與白衣數人而進儀衛悉不自隨及至毅敗天下服其先見而劉裕敬遇之三十國春秋餉新許紹先義興人也諸父肇坐事繫獄七年不判子姪三十餘人紹先家最貧薄專獨斷訴無日在家餉饋肇莫非珍新家産既盡賣宅以充之肇諸子倦怠唯紹先無有懈息如是七歲尚書沈演之嘉其操行肇事由此而得釋宋書長風宗愨字元幹徵士炳兄子也年少時炳問愨所志答曰願乘長風破萬里浪炳曰汝若不富貴必破我門戶上活弟子孔嚴太和中拜吳興太守餘杭婦人經年荒賣其子以活夫之兄子武康有兄弟二人妻各有孕弟遠行未反遇荒歲不能兩全棄其子而活弟子嚴並褒薦之晉書矜少謝淡字景恆從子晦為荊州將之鎮詣淡別晦色自矜淡問晦年答曰三十五淡笑曰昔荀中郎年二十九為北府都督卿比之已為老矣晦色甚愧廢寢王僧虔孝武初出為武陵太守兄子儉於中途得病僧處為廢寢食同行客慰喻之僧處曰昔馬援處兒姪之間一情不異鄧攸于弟子更愈所生吾實懷其心誠未異古亡兄之胤不宜忽諸若此兒不救便當回丹謝職無復遊官之興矣南齊二魏魏收字伯起從叔季景有才學歷官著名並在收前然收常所欺忽季景收初赴并頓丘李庶者以華辨見稱曾謂收曰霸朝便有二魏收率爾對曰以從叔見比便是耶輸之比卿耶邪輸者故上書令陳留公繼伯之子也愚癡有名好自入市肆高價買物商賈共所嗤玩收忽季景方之不遜例多如此文襄曾宴東山楊愔與魏收相嘲文襄曰向語猶微宜更指斥愔應聲曰魏收在并州作一篇詩對衆讀訖云打從叔季景出六百斛米亦不辨此遠近所知非敢妄說文襄喜曰我亦先聞衆人皆笑收雖日申雪不復抗拒終身病之北齊史無傳梁特進沈約撰史王希聃嘗問約曰從叔太常何故無傳約戲之曰賢從叔者何可載答曰從叔唯忠與孝君當不以忠孝為美約有慚色宋齊語録乳汁元德秀貧時其兄早亡有遺孤朞月其嫂又喪無乳哺之德秀晝夜哀號抱其子即以己乳含之涉旬而有汁遂長天德秀官魯山令有清政化惠於一邑闔郡歌之唐書賞踈野李約初至金陵主李錡坐屢讚招隱寺標致一日錡宴於寺中明日謂約曰十郎嘗誇招隱寺昨遊宴細看何殊州中約笑曰約所賞者踈野耳若遠山將翠幕遮古松用綵物褁腥羶涴鹿跑泉音樂亂山鳥聲此則實不如在叔父大廳也錡笑因話録獻圖贊陳恭公判毫州遇生日親戚多獻老人星圖姪世修獨獻范蠡遊五湖圖且贊曰賢哉陶朱伯越平吳名遂身退扁丹五湖公即日納節明年乞致仕倦遊録詩針韓他胄暮年以冬月攜家遊西湖畫船花輿覽南北二山之勝末乃置宴於南園同族別院與焉席間有獻牽絲傀儡為土偶負小兒者名為遊春黃判韓顧族子汝名能詩可詠即承命一絶云腳踏虛空手弄春一人頭上要安身忽然線斷兒童手骨肉都為陌上塵韓大不樂不終宴而歸未幾禍作瘦竹齊談藪屬國宋穆公疾召大司馬孔父而屬殤公焉曰先君舍與夷而立寡人寡人弗敢忘若以大夫之靈得保首領以沒先君若問與夷其將何辭以對請子奉之以主社稷寡人雖死亦無悔焉對曰群臣願奉馮也公曰不可先君以寡人為賢使主社稷若棄德不讓是廢先君之舉也豈曰能賢光昭先君之令德可不務乎吾子其無廢先君之功使公子馮出居於鄭左隱三終致國乎與夷莊公馮弒與夷故君子大居正宋之禍宣公為之也公羊竹室楊愔字遵彥小名秦王幼時學庭前有奈樹實落地群兒咸爭之愔頽然獨坐其季父暐適入學館見之大用嗟異顧謂賓客曰此兒恬裕有我家風宅內有茂竹遂為愔於林邊別葺一室命獨處其中常以銅盤具盛饌以飯之因以督厲諸子曰汝輩但如遵彥謹慎自得竹林別室銅盤重肉之食愔從父兄黃門侍郎昱特相器重曾謂人曰此兒駒齒未落已是我家龍文更十歲後當求之千里外北齊合璧事類以昱為愔叔父預期誤反被羊耽妻辛氏字憲英隴西人鍾會為鎮西將軍憲英謂耽從子祜曰鍾士季何故西出祜曰將謂伐蜀也憲英曰會所在縱恣非持久處下之道吾畏其他志也會果反祜嘗送錦被憲英嫌其華反而覆之晉書教忍杜有道妻嚴氏字憲京兆人貞淑有識量生子植植從兄預為秦州刺史被誣徵還憲與預書戒之曰諺曰忍辱至三公卿今何謂辱矣能忍之公是卿坐預後果為儀同三司上能養羊祜年十五而孤事伯母蔡氏以孝聞蔡氏每歎曰羊叔子可謂能養今顏叔子也其諸葛孔明之亞乎三十國春秋帶經皇甫謐字士安年二十不好學遊蕩無度嘗得瓜果輒進叔母任氏任氏曰孝經云三牲之養猶為不孝汝今年餘二十目不存教心不入道無以慰我因歎曰昔孟母三徙以成仁曾父烹豕以存教豈我居不卜鄰教有所闕何爾魯鈍之甚也因對泣涕謐乃感激就鄉人席坦受書勤力不怠居貧躬自稼穡帶經而農遂慱綜典籍百家之言自號玄晏先生晉書教姪女服南宮縚之妻之姑之喪夫子誨之髽曰爾無從從爾爾無扈扈爾蓋榛以為笄長尺而總八寸注從從謂大高扈扈謂大廣總束髮垂為飾齊縗之總八寸也縚南宮閲字子容其妻孔子兄女也檀弓遺腹姪女劉平弟仲為賊所殺扶母奔逃仲遺腹女一歲平抱仲女而棄其子母欲取之平曰力不能兩活仲不可絶類遂去不顧後漢篚器之訓廋衮孤兄女曰芳將嫁美服具矣衮刈荊苕為箕帚焉召諸子集之于堂男女以班而命芳曰汝芳少孤今汝適人將事舅姑灑掃庭內婦人之道也故賜汝以此匪器之美欲汝之溫恭朝夕雖休勿休也晉書問詩王凝之妻謝氏字道韞安西將軍奕之女也聰識有才辨叔父安嘗問毛詩何句最佳道韞稱吉甫作頌穆如清風仲山甫永懷以慰其心安謂有雅人深致又嘗內集俄而雪驟下安曰何所似也道韞曰未若柳絮因風起安大悅上夫人既往王氏大薄凝之既還謝家意大不悅太傅慰釋之曰王郎逸少之子人身亦不惡汝何以恨乃爾答曰一門叔父則有阿大中郎群從兄弟則有封胡羯末不意天壤之中乃有王郎世說封謂謝韶胡謂謝朗羯謂謝玄末謂謝川皆其小字也晉書世說注封胡謝韶小字遏末謝淵小字晉書避淵字故云謝川耳通志略列女傳亦書川字何耶父姊妹父之姊妹曰姑姑故也言於己為久故之人也釋名父之姊妹為姑王父之姊妹為王姑高祖王父之姊妹為高祖王姑父之從姊妹為從姑父之從父姊妹為從祖姑父之從祖姊妹為族祖姑爾雅中賓房中內賓姑姊妹也儀禮義姑魯義姑者野人之父也齊攻魯至郊遙見一人攜一兒有抱一子及軍至乃棄抱者而抱攜者將欲射之遂止而問曰所抱者誰之子對曰兄之子所棄者誰之子曰己子也妾見大軍至不能兩全遂棄所生之子軍曰子之於母甚痛於心何棄所生而抱兄子對曰子之於母私愛也姪之從姑公義也背公向私妾不為也齊軍曰魯郊有婦人猶持節行况朝庭乎遂回軍不伐魯魯君聞之賜束帛號曰義姑列女傳赴火梁姑姊其室失火兄子與二子在內欲取兄子輒得其子火盛不得復入婦人曰梁豈可戶告人曉耶被不義之名何面見兄弟國人哉遂赴火而死上筮嫁初晉獻公筮嫁伯姬於秦遇歸妹之暌史蘇占之曰不吉歸妹暌孤寇張之孤姪其從姑六年其逋逃歸其國而棄其家明年其死於高梁之墟左僖十一散寶堂下呂后崩平勃使人劫酈商令子寄紿說呂祿信寄與俱出游過其姑呂嬃嬃怒曰汝為將而棄軍呂氏今無處矣乃悉出珠玉寶器散堂下曰無為它人守也漢書止傳舍桓曄字文林一名嚴尤修志介姑為司空楊賜夫人初鸞卒姑歸寧赴哀將至止於傳舍整飾從者而後入曄心非之及姑勞問終無所言號哭而已賜遣吏奉祠因縣發取祠具曄拒不受後每至京師未嘗舍宿楊氏其貞忮若此上彪姑成帝班婕妤彪之姑也上曜卿姑蔡伯喈母袁曜卿之姑女也博物志李膺姑鍾元皓妻李膺之姑也生子覲與膺同名先賢行狀姑婢阮仲容先幸姑家鮮卑婢及居母喪姑當遠移初云當留婢既發定將去仲容借客驢箸重服自追之纍騎而返曰人種不可失即遙集之母也世說咸與姑書曰胡婢遂生胡兒姑答書曰魯靈光殿賦曰胡人遙集於上楹可字曰遙集也故孚字遙集孚別傳咸既追婢於是世議紛然自魏末沈淪閭巷逮晉咸寧中始登王途竹林七賢論姑女溫公喪婦從姑劉氏家值亂離散惟有一女甚有姿慧姑以屬公覔婚公密有自婚意答云佳壻難得但如嶠比云何姑云喪敗之餘乞粗存活便足慰吾餘年何敢希汝比郤後少日公報姑云已覔得婚處門地粗可壻身名宦盡不臧嶠因下玉鏡臺一枚姑大喜既婚交禮女以手披紗扇撫掌大笑曰我固疑是老奴果如所卜玉鏡臺是公為劉越石長史北征劉聰所得世說王江州愈夫人謝玄妹語謝遏曰汝何以都不復進為是塵務經心天分有限上娶眇崔巨倫有姊明慧有才行因患眇一目內外親族莫有求者其家議欲下嫁之巨倫姑趙國李叔胤之妻聞而悲感曰吾兄盛德不幸早世豈令此女屈事卑族乃為子翼納之時人歎其義識北史二十見賞袁淑字陽源豹之子也少有風氣年數歲伯父湛謂家人曰此非凡兒至十餘歲為姑夫王弘所賞不為章句之學而博涉多通文彩遒艷宋書讀詩范雲字彥龍六歲就其姑夫袁叔明讀毛詩日誦九紙陳郡殷琰名知人候叔明見之曰公輔才也上不造門江子一字元貞統七世孫也直華林省其姑夫右衛將軍朱异權要當朝休下之日賓客輻湊子一未嘗造門其高潔如此梁書名亞蕭子雲王褒之姑夫也特善草隸褒少以姻戚往來其家遂相模範俄而名亞子雲並見重於時後周書行賄裴佶常話少時姑夫為朝官有雅望佶至宅會其退朝深歎曰崔照何人衆口稱美必行賄也如此安得不亂言未訖門者報曰荊州崔使君候謁姑夫怒呵門者將鞭之良久束帶強見須臾命茶甚急又命酒饌又命為飯佶姑曰前何踞而後恭及入門有德色揖佶曰憩學中佶未下階出懷中一經乃贈官絁千匹國史補姊妹男子謂女子先生為姊後生為妹爾雅伯姊問我諸姑遂及伯姊詩泉水委禽鄭徐吾犯之妹美公孫楚聘之矣公孫黑又使強委禽焉犯懼告子産子産曰是國無政非子之患也唯所欲與犯請於二子請使女擇焉皆許之子晳盛飾入布幣而出子南戎服入左右射超乘而出女自房觀之曰子晳信美矣抑子南夫也夫夫婦婦所謂順也適子南氏左昭元除服弗忍子路有姊之喪可以除之矣而弗除也孔子曰何不除也子路曰吾寡兄弟而弗忍也孔子曰先王制禮不可踰也遂除之刺笄趙襄子上於夏屋以望代俗其樂甚美及歸慮所以取代乃先善之代君好色請以其弟姊妻之代君許諾弟姊已往所以善代者乃萬故馬郡宜馬代君以善馬奉襄子襄子謁於代君而請觴之馬郡盡先令舞者置兵其羽中數百人先具大金斗代君至酒酣反斗而擊之一成腦塗地舞者操兵以鬥盡殺其從者因以代君之車迎其妻其妻道聞之狀磨笄以自刺故趙氏至今有刺笄之證山與反斗之號呂覽襄子既殺代王使人迎其婦代王夫人曰以弟慢夫非仁也以夫怨弟非義也磨笄自殺而死使者遂亦自殺魏土地記代人憐之所死地名之為摩笄之山史記不慈梁車新為鄴令其姊往省之暮而後門閉因踰郭而入車遂刖其足趙成侯以為不慈奪之璽而免之令韓非子烈姊聶政為嚴仲子刺殺韓相狹纍因自皮面屠腸以死韓取其尸暴于市縣購之千金久之莫知誰政姊嫈聞之乃於邑曰其是吾弟歟乃如韓之市而死者果政也伏尸哭極哀曰是軹深井里所謂聶政者也乃大呼天者三亦自殺于政之旁晉楚齊衛聞之皆曰非獨政能也及其姊亦烈女也史記國策進妹李園春申君之舍人也進其妹於春申初已有身使妹謂春申君曰楚王無子百年之後將立兄弟君用事日久多失禮於王之兄弟兄弟誠立禍將及身今妾有子人莫知若進妾於王後若生男則君之子為王也春申君乃言之王召入幸之遂生男立為太子後孝烈王薨李園害春申君之寵乃刺殺之史記女嬃女嬃之嬋媛兮申申其詈豫離騷女嬃屈原姊也楚人謂女曰嬃注南北岸者屈原之鄉里原既流放忽然歸鄉人喜悅因名南岸曰歸鄉岸原有姊聞原還亦來歸責其矯世鄉人又名其北岸曰姊歸岸荊州圖經袁山松云原有賢姊聞原放逐亦來歸喻令自寬全鄉人冀其見從因名曰姊歸縣縣比有原故宅宅之東北有女嬃廟搗衣石猶存上書還兄曹壽妻班超之妹也超字仲叔扶風人為都護在絶域年老思入關妹乃上書曰妾兄超延命沙漠三十餘年骨肉生離不復相識書奏帝乃徵還後書觸鎌秦彭字伯平為三陽太守民江伯欲嫁寡姊姊乃引鎌自割伯因前救姊觸鎌傷姊遂亡縣正論法彭曰救無惡志乃輕罪之漢書范冉丹字史雲姊病往看之姊為設飰冉留錢一百文姊使人追還之冉竟不受謝書太原郝子廉一分一介不取諸人曾過姊家食密留五十錢置席下而去風俗通抱聽鄰讀賈逵年五歲明惠過人其姊韓瑤之婦嫁瑤無嗣而歸居焉亦以貞明見稱聞鄰中讀書旦夕抱逵隔籬而聽之逵靜聽不言姊以為喜至年十歲乃暗誦六經姊謂逵曰吾家貧困未嘗有儒者入門汝安知天下有三墳五典而誦無遺句耶逵曰憶昔姊抱逵於籬聞聽鄰家讀書今萬不遺一拾遺記託弟梁冀誅李固固少子燮字德公姊文姬賢而有智謀匿燮乃告父吏王成曰君執義於先公今委君以六尺之孤李之休戚在君矣乃將燮東下得全白帖先行袁隗妻馬倫融女也初成禮隗問之曰弟先兄舉世以為笑今處姊未適先行可乎對曰妾姊高行殊邈未遭良匹不似鄙薄茍然而已從妹宴飲趙岐娶馬融從妹融嘗至其家與從妹宴飲作樂日夕乃出岐與友書曰馬季長雖有名當世而不持士節三輔高士未曾以華椐蔽其門岐曾讀周官二義不通不往造之賤融如此後漢姊夫貸錢郭林宗家貧初欲遊學無資就姊夫貸五千錢乃遠至成皋從年授乘併日而食衣個敝行常以蓋幅自障出入入則護前出則俺後別傳曹大家班昭一名姬兄固著漢書其八表及天文志未及竟而卒和帝詔昭就東觀踵而成之號曰大家後漢節行張溫為孫權所斥其姊妹三人皆有節行已嫁者皆見録奪其中妹先適顧承官以許嫁丁氏成婚有日遂食藥而死吳朝嘉歡鄉人圖盡為之讚頌云文士傳入常凜凜蜀先主初在荊州孫權以妹妻之妹才捷剛猛有諸兄之風侍婢百餘皆執刀侍立先主每入心常凜凜法正傳先主入蜀權遣船迎妹妹回至焦磯溺水而死今俗呼為焦磯娘娘焉求名郭奕遷雍州刺史有寡姊隨共之官姊下僮僕多有姦犯而為人所紏奕按省畢曰大丈夫豈當以老姊求名遣而不問晉書迎妹郗嘉賓喪婦兄弟欲迎妹還終不肯歸曰生縱不得與郗郎同室死寧不同穴世說玉映謝遏絶重其姊張玄常稱其姊欲以獻之有所尼者並遊張謝二家人問其優劣答曰王夫人神情散朗故有林下風氣顧家婦清心玉映自是閨房之秀上喻弟桑虞字子深魏人年十四喪父哀毀過禮以米百粒糝藜藿其姊喻之曰其性非孝子對曰藜藿雜米足以勝哀晉書才姊陳統字元方弟紘字偉方俱清秀知名姊妹四人並有美才姊適東莞徐氏生邈及二姊適同郡劉氏文章最盛上長廣橋長廣橋者宋武帝姊昔賣鈔糴米還橋小不敢過無船得渡日晚武帝大飢久方見姊負米還乃謂姊曰若異日富貴當長廣此橋遂為名也梁典遣信王敬弘為天門太守敬弘妻桓玄姊也敬弘之郡玄時為荊州遣信要令過敬弘至巴陵謂人曰靈寶見要正當欲與其姊集聚耳我不能為桓氏贅壻乃遣別船送妻往江陵妻在桓氏彌年不迎宋書貧家食朱修之薄於恩情姊在鄉里饑寒不立修之為荊州刺史未嘗供贍往姊家姊為設菜羹粗飯激之修之曰此貧家好食進之致飽之鎮分祿新野庾彥達為益州刺史攜姊之鎮分祿秩之半以供贍之西土稱焉宋書樂藹姊適徵士同郡劉虬亦明識有禮訓為州迎姊居官舍參分祿秩西土稱之梁書才亞左芬鮑令暉歌詩往往斷絶清巧擬古尤勝唯百願淫涘昭常答孝武云臣妹才自亞於左芬臣才不及太冲爾詩品令暉有才思著香茗賦小名録三娘劉孝標三妹並有才學長妹適王叔英二妹名令嫻適徐悱文尤清拔所謂劉三娘也悱卒妻為祭文辭甚悲愴悱父勉欲為哀辭見之遂閣筆彤管集神人劉孝儀諸妹文彩艷質甚於神人也蕭韶太清記女進士關圖有一妹有文學善書札圖嘗語同僚曰某家有一進士所恨不櫛耳後適常氏修之母也修咸通六年登科南楚新聞陸家姑張巡初子琦議生致一人慶緒所或曰用兵拒守者巡也乃送遠洛陽至偃師亦以不屈死虢王巨之走臨淮巡有姊嫁陸氏遮王勸勿行不納賜百縑不受為巡補綴行間軍中號陸家姑先巡被害堂饌庾倬為河南兵曹有寡姊在家時洛中物價翔貴難致口腹庾常於公堂輟已饌以餉其姊繆言所愛小男以餉之同官初甚鄙笑後知之感而嘉歎因話録嚴師尚官宋若昭父廷芬生五女長若莘次若昭若倫若憲若荀若昭文尤高若莘誨諸妹如嚴師收繫胡母班字季友八廚之一王匡妹夫也匡受紹旨收班繫獄欲殺以徇軍班與匡書略曰足下拘僕於獄欲以釁鼓此何悖暴無道之甚者也僕與董卓何親戚義豈同惡足下張虎狼之口吐長蛇之毒恚卓遷怒何其酷哉死者人之所難然恥為狂夫所害若亡者有靈當訴足下於皇天夫婚姻者禍福之幾今日著矣曩為一體今為血讎亡人二女則君之甥身沒之後慎勿令臨僕尸骸匡得書抱班二子哭班遂死於獄謝承書二謝王右軍郗夫人謂二弟司空中郎曰王家見二謝傾筐倒皮見汝輩來平平爾汝可無煩復往世說劾奏劉覽孺弟也除尚書左丞當官清正無所私姊夫御史中丞褚湮從兄吏部郎孝綽在職頗通贓貨覽劾奏並免官孝綽怨之嘗謂人曰犬齧行路覽噬家人梁書踈妹夫鄭元禮崔昂婦弟也魏收昂之妹夫昂持元禮數詩示盧思道曰元禮比來詩詠亦不臧魏收思道曰未覺元禮賢於魏收且知妹夫踈於婦弟北齊誤殺刀躍王智興在徐州法令甚嚴有防秋官健交代歸其妹壻於家中設饌以賀自於廚中磨刀將就坐割羊腳磨訖持之疾行妻兄自堂走入廚倉卒相值鋒正中妻兄心即死所由擒之以告智興訊問但稱過誤本無惡意智興不之信命斬之刀輒自刑者手中躍出投於地三換皆然智興異之乃不殺因話録妹為制服畢搆初喪繼母時有二妹在襁褓親加鞠養咸得成立及搆卒二妹號絶久之以撫育恩遂制三年之服其弟栩亦甚哀毀並為當世所稱舊唐二妹袁彥道有二妹一適殷淵源一適謝仁祖語桓宣武云恨不更有一人配卿救弟庾希被誅將戮小弟玉臺子婦宣武女弟也突入號泣曰庾玉臺常因人腳短三寸當復能作賊否宣武笑曰壻故自急遂原玉臺世說南山南山刺齊襄公也鳥獸之行淫乎其妹南山崔崔雄狐綏綏毛詩齊侯送姜氏非禮也凡公女嫁于敵國姊妹則上卿送之以禮於先君公子則下卿送之於大國雖公子亦上卿送之於天子則諸卿皆行公不自送於小國則上大夫送之桓三公與姜氏如齊申繻曰女有家男有室無相瀆也謂之有禮易此必敗公會齊侯于濼遂及文姜如齊齊侯通焉公謫之以告丙子享公使公子彭生乘公公薨于車十八嫂婦女子謂兄之妻為嫂弟之妻為婦爾雅妻嫂孟郊妻其嫂有五子焉然而相魏寧其危解其患景陽飲酒被髮而御於婦人威服諸侯淮汜論訓鑠釜高祖長兄伯妻高祖微時嘗避事時與賓友過其丘嫂嫂厭叔引客來食佯為羹盡鑠釜客去高祖視釜尚有羹由是怨之後定天下而伯子獨不得封曰其母不長者耳後七年封為頡羹侯漢書丘史作巨大也食糠陳平兄伯常耕田縱平遊學嫂疾之不親家事或問平食何物而肥對曰食糠籺耳嫂曰有叔如此不如無伯聞而逐其妻上盜嫂直不疑為郎朝廷毀不疑曰狀貌雖美善盜嫂不疑曰我無兄終不明責錢鄭弘守陽羡縣民有弟用兄錢者為嫂所責未還之嫂詣弘弘為叔還錢兄聞之慚愧自繫於獄遂遣一齎錢還弘弘不受也會稽典録冠入馬援兄况卒行服朞年敬事寡嫂不冠不入廬常謂人曰丈夫為志窮當益堅老當益壯後漢爭訟高鳳字文通南陽人也鳳年老名聲著聞太守連召請恐不得免自言鳳本巫家不應為吏又詐與寡嫂詐公遂不仕東觀記逸士傳高鳳自穢爭訟寡嫂選彈劉整與別阮籍嫂嘗還家見與別或譏之籍曰禮豈為我輩設也世說王平子澄年十四五見王夷甫妻郭氏貪欲令婢路上儋糞平子諫之並言不可郭大怒謂平子曰昔夫人臨終以小郎囑新婦不以新婦囑小郎急捉衣裾將與杖平子饒力爭得脫踰窗而走上家嫂林道人詣謝公東陽朗時始總角新病起體未堪勞與林公講論遂至相苦母王夫人在壁後聽之再遣信令還而大傅留之王夫人因自出云新婦少遭家難一生所寄唯在此兒因流涕抱兒以歸謝公語同坐曰家嫂辭情慷慨致可傳述恨不使朝士見上解圍王凝之妻謝道韞凝之弟獻之嘗與賓客談議詞理將屈道韞遣婢白獻之曰欲為小郎解圍乃施青綾步障自蔽申獻之前議客不能屈晉書風吹財歸晉隆安二年吳郡人朱明孝義立身而家大富與弟同居其妻言庭樹壞欲棄兄異居明知弟意乃以金帛餘榖盡給與弟唯留空宅忽一夕狂風驟起悉吹財帛還歸明家與妻羞見鄉里自盡明乃舍宅為寺號曰朱明寺吳地記恭和蔡興宗幼立風概家行尤謹奉歸宗姑事寡嫂養孤兄子有聞於世太子左率王錫妻范聰明婦人也有才藻學見與錫弟僧達書因讓之曰昔謝太傅奉嫂王夫人如慈母今蔡興宗亦有恭和之稱其為世所重如此宋書求還資劉祥字顯微兄整先為廣州於職喪亡去年啓求迎喪還至大雷祥與整妻孟爭計還資瞋忿祥仍委前還任遐奏曰祥厥兄浮櫬天倫無一日之悲南金弗獲嫂姪致其輕絶孤丹敻反存沒相捐遂令暴客掠奪骸柩行路流歎有識傷心南齊如母韓靈敏兄靈珍亡無子妻卓氏守節不嫁慮家人奪其志未嘗告歸靈敏事之如母上自賣吳達之義興人也嫂亡無以葬自賣為十夫客以營冢槨從祖弟敬伯夫妻荒年被略賣江北達之有田十畝貨以贖之與之同財共宅郡命為主簿固以讓兄又讓世業舊田與族弟弟亦不受田遂間廢上市米齊竟陵王子良為會稽太守時有山陰人孔平詣子良訟嫂市米負錢不還子良歎曰昔高文通與寡嫂訟田義異於此乃賜米錢以償平南史三十四叔郎齊故西陽內史劉寅妻范詣臺訴列稱叔郎整恆欲傷害侵奪奪寅息逡婢緑草寅弟二庶息師利去歲十月往整田上經十二日整便責范米六斗哺食米未展送忽至戶前隔箔攘拳大罵突進房中屏風上取車帷准米去二月九日夜整婢采音偷車欄夾杖龍牽范問失物之意整便打息逡整及母并奴婢等六人來共至范屋中高聲大罵婢采音舉手查范臂求攝檢任昉奏彈曰理絶通問而妄肆醜辭終夕不寐而謬加大杖選講老盧處後妻元氏升堂講老子道德經處弟元明隔紗帷以聽之鄴洛峙記叔嫂服太宗謂侍臣曰同爨尚有緦麻之恩而嫂叔無服宜集學者詳議侍中魏等議曰記曰兄弟之子猶子也蓋引而進之也嫂叔之不服蓋推而遠之也且事嫂見稱載籍非一鄭仲虞則恩禮甚篤顏弘都則竭誠致感馬援則見之必冠孔伋則哭之為位察其所尚之旨豈非先覺者歟舊志咨事王圭奉寡嫂盡禮家事咨而後行教撫孤姪雖其子不過也新唐罄橐遺叔丘旭字孟陽隨計金陵凡九舉而曳白者六七然自勵彌篤不以為恥既而困窘無進取意秋試將邇寡嫂問行期旭以匱乏告劉曰茍濟榮望雖孤兒可鬻况資用乎於是罄橐遺之旭不得已再就鄉舉明年春試厚德載物賦旭為第一什褐歸鄉而家人猶疑其未調暨鄉老酋長謁賀郡吏改置里名乃知上第南唐書命主家事李光進弟光顏先娶而母委以家事及光進娶母已亡弟婦籍資貯納管鑰於姒光進命反之曰姊逮事姑且嘗命主家事不可改因相持泣乃如初唐書王汝南湛娶郝普女有令姿淑德王司徒渾婦鍾氏琰女太傅曾孫亦有俊才女德鍾郝為姒娣雅相親重鍾不以貴陵郝郝亦不以賤下鍾東海家內則郝夫人之法京陵家內範鍾夫人之禮世說拜弟婦李濤與弟浣娶禮部尚書竇寧國之女年甲稍高成結之夕竇氏出參濤輒望塵下拜浣驚曰大哥風狂耶新婦參阿伯豈有答禮濤曰我不風只將謂之親家母浣且慚且怒既坐竇氏復拜濤又義手當胸作歇後語曰慚無竇建愧作梁山喏喏聞者莫不絶倒五代史補娣姒人多以兄妻呼弟婦為娣弟妻呼兄妻為姒左成十一年穆姜謂聲伯之母為姒昭八年叔向之嫂謂叔向妻為姒是皆呼夫弟之妻為姒賈鄭杜皆云知娣姒之名不計夫之長幼也今相呼先後或云妯娌爾雅疏送女齊侯送姜氏于歡禮送女父不下堂母不出祭門諸母兄弟不出闕門父戒之曰謹慎從爾舅之言母戒之曰謹慎從爾姑之言諸母般申之曰謹慎從爾父母之言送女踰竟非禮也穀梁桓三棄初宋芮司徒生女子赤而毛棄諸堤下共姬之妾取以入名之曰棄長而美平公入夕共姬與之食公見棄也而視之尤姬納諸御嬖襄二十六上書贖父齊太倉長淳于意以刑罪當傳西之長安意有五女隨而泣意怒罵曰生女不生男緩急無可使者於是少女緹縈隨父西上書曰妾父為吏齊中稱其廉平今坐法當刑妾願入身為官婢以贖父刑罪書聞上悲其意此歲中亦除肉刑法史記女囚吳興餘不鄉有女囚山又曰女獄山漢沈恢以柯田山水嘉甚謀居其女泄之於姻沈戎家奪之恢憤其女賺女歸寧囚之苧溪之北山墟間至死不悔仍戒其後三世不舉女戎字威卿說降劇賊尹良光武嘉之功封海昏侯不受圖經自沉見夢符縣長趙祉遣吏先尼和以永建元年十一月詣巴郡沒死成濡灘子賢求喪不得女絡年二十五歲有二子五歲以還至二年二月十五日尚不得喪絡乃乘小船至父沒處哀哭自沉見夢告賢曰至二十一日與父俱出至日父子果浮出江上郡縣上言為之立碑以旌孝誠也水經後漢作叔先雄投衣祝父孝女曹娥者上虞人父旴為巫祝能撫節按歌婆娑樂神以漢安二年五月時迎五君逆濤而上為水所淹不得其尸時娥年十四號慕思旴哀吟澤畔旬有七日投衣於水祝曰父尸所在衣當沉衣隨流至一處而沉娥遂隨衣投江死項原列女傳經五日抱父尸出碑縣長度尚悲憐其義為之改葬命其弟子邯鄲子禮為之作碑會稽典録後書作迎婆娑神似誤報讎申屠蟠字子龍外黃人同郡緱氏女玉為父報讎殺夫氏之黨吏執玉以告令梁配欲論殺之蟠進諫曰玉之節義足以感無恥之孫激忍辱之子配乃為讞臧死後漢三女葬父蜀郡太守姓王字子雅南陽西鄂人有三女無男而家纍千金父沒當葬女自相謂曰先君生吾姊妹無男兄弟今當安神玄宅翳靈后土冥冥絶後何以彰吾君之德各出錢五百萬一女築墓二女各建石樓以表孝思樓高可丈七八柱圓圍二丈有餘石質青緑光可以鑒窮功綺刻妙絶人工水經注投爐宣城郡青陽縣有梅根冶孝女李娥娥父吳人大帝時為鐵官冶以鑄軍器一夕鍊金竭爐而金不出時吳方草創法令至嚴諸耗折官物十萬即坐斬仍又沒入其家而娥父所損折數過千萬娥年十五痛傷之因火烈遂自投于爐中赫然屬天於是金液沸湧溢於爐口娥所躡二履浮出於爐身則化矣其金汁塞爐而下遂成溝渠泉注二十里入于江水其所收金凡億萬斤溝渠中鐵至今仍存故吳俗每治銅鐵必先為娥立祠享而祈福紀聞對作賓主裴成公婦王戎女王戎晨往裴許不通徑前裴從床南下女從北下相對作賓主了無異色世說貸錢王戎女適裴頠貸錢數萬女歸戎色不說女遽還錢乃釋然上突圍乞師荀嵩小女灌幼有奇節嵩為襄城太守為杜曾所圍力弱食盡欲求救於故吏平南將軍石覽計無從出灌時年十三乃率勇士數十人踰城突圍夜出賊追甚急灌督厲將士且戰且前得入魯陽山獲免自詣覽乞師又為嵩書與南中郎將周訪請援仍結為兄弟訪即遣子撫率三千人會石覽俱救嵩賊聞兵至散走灌之力也華陽國志叫絶宋謝晦女為彭城王義康妃聰明有才貌被髮徒跣與晦訣曰阿父大丈夫當橫死戰場奈何狼籍都市言訖叫絶行人為落淚南史身蔽張稷長女楚瑗適會稽孔氏無子歸宗至稷見害女以身蔽父刃先父卒梁書市玉叉王涯居相位有女適竇氏欲求錢十七萬市一玉叉涯曰於女何惜此妖物也必與禍相隨後數月女自婚會歸告王曰前時玉叉在馮外郎妻首飾矣乃馮球也王嘆曰馮為郎吏妻之首飭有十七萬錢其可久乎其善終乎南部新書隨父咸通六年滄州鹽院吏趙鏻犯罪至死既就刑有女請隨父死七歲母亡蒙父私鹽官利衣食之今父罪彰露合隨其法鹽院官崔據義之遂具以事聞詔嘉之兼臧父之死女又泣曰昔為父所生今為官所賜誓落髮奉佛以報君王因於懷中出刃立截其耳以示信既而侍父臧死罪之刑疾愈遂歸浮圖氏文藪紿賊赴江鄭路昆仲有為江外官者一夕維舟江渚郡盜掩至鄭即以所有金帛羅列岸上恣賊所取一不犯但云得侍御小娘子足矣其女有美色賊潛知之骨肉相顧無以為答女欣然請行其賊具小舟載之而去女謂賊曰君雖為偷兒得無所居與親族乎然吾家衣冠族既為汝妻豈可無禮見遇若達汝止一會親族以托好求足矣賊曰喏又指所偕來二婢公既以偷為名此婢不當我有為公計不若歸吾家賊見女貌美且順已顧無不可見即自鼓棹載二婢而去女即赴江死時人賢之青瑣高議參軍王蜀相周庠者初在卬南幕中留司府事時臨卭縣送失火人黃崇嘏才下獄便貢詩一章曰偶離幽隱住臨卭行止堅貞比澗松何事政清如水鏡絆他野鶴向深籠周覽詩遂召見稱鄉貢進士年三十許祗對詳敏即命釋放後數日獻歌周極奇之召於學院與諸生姪相伴善棊琴妙書畫翌日薦攝府司戶參軍頗有三語之稱胥吏畏伏案牘嚴明周既重其英聰又美其風彩在任將逾一載遂欲以女妻之崇嘏又袖封狀謝仍貢詩一篇曰一辭拾翠碧江涯貧守蓬茅但賦詩自服藍衫居郡掾永拋鸞鏡畫蛾眉立身卓爾青松操挺志鏗然白璧姿幕府若容為坦腹願天速變作男兒周覽詩驚駭不已遂召見詰問乃黃使君之女幼失覆蔭唯與老嬭同居元未從人周益仰貞潔郡內咸皆歎異旋乞罷歸臨卭之舊隱竟莫知存亡焉玉溪編事荊棺荊棺峽璧隙有棺以荊為之昔人有九子父死不能葬一女編荊為棺不知其人矣諺曰九子不葬父一女打荊棺古今記虎冠呂后崩周勃等盡誅諸呂而琅邪王亦從齊至長安大臣議欲立齊王皆曰母家駟鈞惡戾虎而冠者也漢以宮氏故幾亂天下今又立齊王是欲復為呂氏也代王母家薄氏君子長者漢紀述書楊惲母司馬遷女也惲始讀外祖太史公記頗為春秋以材能稱漢書遷死外孫楊惲述其書遂宣布焉上解忿樊重字君雲光武外祖也資至巨萬而加惠宗族外孫何氏兄弟爭財重恥之以田二頃解其忿訟縣中稱美推為三老年八十餘終後漢無為外家王符字節信安定臨涇人也少好學有志操與馬融竇章張衡崔瑗等友善安定俗鄙庶孽而符無外家為鄉人所賤品題殷顗庾恆並是謝鎮西外孫殷少而率悟庾每不推嘗俱詣謝公謝公熟視殷曰阿巢故似鎮西於是庾下聲語曰定何似謝公續復云巢頰似鎮西庾復云頰似足作健不戒恐取疾蕭惠開思話子也少有風氣初為祕書郎著作並名家年少惠開意趣與人多不同比肩或三年不共語外祖光祿大夫沛邵劉成戒之曰汝恩戚家子嘗應將迎時俗緝外內之歡如汝自業將無小傷多異以取天下之疾患邪惠開曰人間宜相緝和甚如慈但不中耿介耻見作凡人畫龍未成故遂至於多忤耳宋書都似風韻王筠清潔好學沈約見筠以為似外祖袁粲謂僕射張稷曰王郎非惟額類袁公風韻都欲相似稷曰袁公見人輒矜嚴王郎見人必娛笑惟此一條不能酷似梁書陽元陸倕少為外祖張岱所異謂諸子曰此汝家陽元也上自杖皇甫繢三歲而孤為外祖韋孝寬所鞠養嘗與諸外兄博奕孝寬督以嚴訓繢歎命左右自杖孝寬聞而對之流涕於是博涉經史隋書撫背楊於陵生子嗣復外祖韓滉撫其背曰名與位皆踰其父此楊氏之慶也本傳渭陽渭陽康公念母也康公之母晉獻公之女文公遭驪姬之難未反而秦姬卒穆公納文公康公時為太子贈送文公于渭之陽念母之不見也我見舅氏如母存焉秦詩投璧秦伯納晉公子重耳及河子犯以壁授公子曰臣負羈紲從君巡於天下臣之罪多矣臣猶知之而况君乎請由此亡公子曰所不與舅氏同心者有如白水投璧于河左僖二十四三甥楚文王伐申過鄧鄧祁侯曰吾甥也止而享之騅甥聃甥養甥請殺楚子鄧侯弗許三甥曰亡鄧國者必此人也若不早圖後君噬臍其及圖之乎圖之此為時矣鄧侯曰人將不食吾餘對曰若不從三臣抑社稷實不血食而君焉取餘弗從還年楚子伐鄧十六年楚復伐鄧滅之莊六懲舅氏初叔向欲娶申公巫臣氏其母欲娶其黨叔向曰吾母多而庶鮮吾懲舅氏矣昭二十八注言父多妾媵而庶子鮮少嫌母氏性不曠報讎賈淑字子厚為舅宋瑗報讎于縣中為吏所捕係獄當死郭林宗與語淑懇惻流涕太詣縣令應操陳其報怨蹈義之士被赦縣不宥之郡上言乃得原謝承書不召范滂外甥西平李頌公族子孫而為鄉曲所棄中常侍唐衡以頌請宗資資用為吏滂非其人寢而不召資遷怒捶書佐朱零零仰曰范滂清裁猶以利刃齒腐朽今日寧受笞死而滂不可違資乃止後漢嚼棗以哺平邱程末年十四時父沒未抱尸號泣悲哀舅哀其羸劣嚼棗肉以哺之末見食歔欷不能吞咽蔡雍進表殯葬吉閎幼有美名九歲明尚書舅何邈死家貧子幼閎自造墳塋殯葬之三輔夬録衣被不受黃香字文強年十二家業虛貧衣食不贍舅龍鄉侯為作衣被不受東觀記宅相魏舒字陽元任城樊人也少孤為外家寧氏所養寧氏起宅相宅者云當出貴甥外祖母以魏氏甥小而慧意謂應之舒曰當為外祖成此宅相後為相國參軍文帝曰魏舒堂堂人之領袖也晉傳敗俗王夷甫父乂為平北將軍有簡書將免官夷甫年十七見所繼從舅羊祜申陳事狀辭甚俊偉祐不然之夷甫拂衣而起祜顧謂賓客曰此人必將以盛名處當世大位然敗俗傷化者必此人也晉陽秋朗照王濟字武子衛玠之舅也俊爽有風姿見玠輒嘆曰珠玉在側覺我形穢世說濟嘗與玠同游語人曰昨日我與外甥并出冏若明珠在側朗然來照人別傳含飯郗鑒值永嘉喪亂在鄉里甚窮餒鄉人以公名德傳共飴之公常攜兄子邁及外生周翼二小兒往食鄉人曰各自饑困以君之賢欲共濟君耳恐不能兼有所存公於是獨往食輒含飯箸兩頰邊還吐與二兒後並得存同過江郗公亡翼為剡縣解職歸席苦於公靈床頭心喪終三年世說奕奕劉嶼字慶孫弟崑字越石並為尚書郎郭奕之甥名著當時京師為之語曰洛中奕奕慶孫越石牙慧殷中軍云康伯未得我牙后慧世說韓康伯清和有思理舅殷浩稱之曰康伯少自標置居然是出群之器及其發言遣辭往往有情致上鼠輩郗愔字方回與姊夫王羲之有邁世之風獻之兄弟愔子超未亡時嘗見郗公躡履問訊甚修外生禮及嘉賓死皆箸高屐儀容輕慢命坐皆云有事不暇坐既去郗公慨然曰使嘉賓不死鼠輩敢爾上桓豹奴嗣是王丹陽混外生形似其舅桓甚諱之宣武云不恆相似時似耳恆似是形時似是神桓逾不說上刻簿衛江州在尋陽有知舊人投之都不料理唯餉王不留行一斤此人得餉便命駕李弘範度聞之曰家舅刻薄乃復驅使草木各美桓玄問劉太常曰我何如謝太傅劉答曰公高太傅深又曰何如賢舅子敬答曰梨橘柚各有其美坐越舅右習鑿齒與其二舅羅崇羅友俱為州從事及遷別駕以坐越舅右屢經陳請溫後激怒既盛乃超拔其二舅相繼為襄陽都督出鑿齒為滎陽太守此舅此甥王忱字元達嘗造其舅范寧與張玄相遇寧使與玄語玄正坐斂襟待其所發忱竟不與言玄失望便去寧讓忱曰張玄吳中之秀何不與語忱笑曰張祖希欲相識自可相見詣寧謂曰卿風流俊望真後來之秀忱曰不有此舅焉有此甥大舅小舅庾懌嘗以毒酒餉江州刺史王允之允之覺其有毒飲犬犬斃乃密奏之帝曰大舅已亂天下小舅復欲爾邪懌聞飲鴆而卒晉書酷似何無忌東海郯人少有大志鎮北將軍劉牢之即其舅也時鎮京口每有大事皆參議之桓玄之篡與劉裕劉毅共興義兵桓玄聞之甚懼謂其黨曰烏合之衆勢必無成玄曰劉裕勇冠三軍劉毅家無擔石之儲樗蒲一擲百萬何無忌劉牢之之甥酷似其舅共舉大事何謂無成上世無渭陽謝絢字宣映曾於公坐調戲無禮於其舅袁湛湛甚不堪之謂曰汝父昔已輕舅汝今復來加我可謂世無渭陽情也絢父重即王胡之外孫與舅亦有不協之論湛故有此及云晉書安傳袁湛初陳郡謝重王胡之外孫也於諸舅敬禮多缺重子絢湛之甥也常於公坐慢湛湛正色謂曰汝便是兩世無渭陽情絢有愧色南史割瘤朱齡石少好武事頗輕佻不治崖檢舅淮南蔣氏人才儜劣齡石使舅臥於聽事一頭剪紙方一寸帖箸舅枕自以刀子懸擲之相去入九尺百擲百中舅雖危懼戰栗為畏齡石終不敢動舅頭有大瘤齡石伺舅眠密往割之舅即死宋書月旦齊王延之與阮韜俱宋領軍將軍劉湛外甥並有早譽湛甚愛之曰韜后當為第一延之為次也延之甚不平每致餉下都韜與朝士同例齊武聞之與延之書曰韜云卿未嘗有別意當緣劉家月旦故耶韜字長明裕玄孫也南史歸阿士劉孝綽字孝綽幼聰敏七歲能屬文舅齊中書郎王融深賞異之常與同載適親友號曰神童融每言曰天下文章若無我當歸阿士阿士孝綽小字也繪齊世掌詔誥孝綽年未志學繪常使代草之名藺謝藺安八世孫也父經藺五歲每父母未飯乳媼欲令藺先飯藺曰既不覺饑彊食終不進舅阮孝緒聞之歎曰此兒在家則曾子之流事君則藺生之匹因名之曰藺稍受以經史過目便能諷誦孝緒每曰吾家陽元也取書樂藹字蔚遠其舅雍州刺史宗愨嘗陳器物試諸甥姪時藹尚幼而所取惟書愨由此奇之又取史傳各一捲授藹等使讀畢言所記藹略讀具舉愨益善之梁書如禮梁顏協幼孤養于舅氏陳郡謝暕暕卒協以有鞠養恩居喪如伯叔禮議者甚重焉南史類舅陸杲字明霞少好學工書畫其舅張融有高名杲風韻舉止頗與相類時稱曰無對日下惟舅與甥彈舅領軍將軍張稷是陸杲從舅杲嘗以公事彈稷稷因侍宴訴高祖曰陸杲是臣通親小事彈臣不貸高祖曰杲職司其事卿何得為嫌杲在臺號稱不畏彊禦梁書誦詩楊愔字遵彥津子也小名秦王六歲學史書十一受詩易好左氏春秋幼而喪母曾詣舅源子恭子恭與之飲問曰汝比來讀何書答曰誦詩子恭因曰誦詩至渭陽未邪愔便號泣感噎子恭亦對之歔欷遂為之罷酒子恭後謂津曰嘗謂秦王貌不甚察慧從今已後更刮目而視之北史對玉北齊李繪字敬文儀貌端偉神情朗俊第五舅河間邢晏每與言歎其高遠曰若披雲霧如對珠玉宅相之奇良在此甥上英拔陳江聰七歲而孤依于外氏聰敏為舅吳平光侯蕭勵鍾愛謂曰爾神采英拔后知名當出吾右論兵李靖字藥師其舅韓擒虎每與論兵輒歎曰可與語孫吳者非斯人尚誰哉唐書頭觸玉階唐霍獻可為左司員外則天法峻多不自保競希旨以為忠獻可頭觸玉階請殺狄仁傑裴行本裴即獻可堂舅也既損額以緑帛褁於巾下常令露出冀則天以為忠時人比之李子慎子慎則天朝誣告母舅加游擊將軍母見其著緋衫以面覆床涕淚不勝曰此是汝舅血染者耶御史臺記命子同名姚崇外甥任奕任异少孤長於崇家乃與之立家産謂之曰爾吾無間然矣惜殊宗而代踈命與其子同名冀無以別也杖殺史牟榷鹽於解縣初變榷法以中朝廷有外甥十餘歲從牟檢畦拾鹽一顆以歸牟知立杖殺之其姊哭而出救已不及矣國史補真珠室皇甫松牛奇章公之甥怨公不薦作謗詩曰夜入真珠室朝遊玳瑁筵真珠公侍妾名也托言抵舅罪王師範舅醉殺人其家訴之師範厚賂謝訴者不置師範曰法非我敢亂乃抵舅罪母恚之師範立堂下日三四至不得見三年拜省戶外不敢解唐書無罪斬甥劉昌寧陵之圍昌令守陴內顧者斬昌孤甥張俊守西北未嘗內顧捽下斬之士有死志史臣謂勒兵乘城與賊抗所賴惟賞罰爾今無罪而斬其甥士心離二不祥莫大焉上引庇它族張克勤左將衛大將軍有詔賜一子五品官克勤以息幼推與其甥裴夷直劾曰克勤骫有司法引它族開後日賣爵之端不可許詔聽遂著于令上判毀崔護不登科怒其考官苖登即崔之三從舅也乃私試為判頭毀其舅曰甲背有猪皮之異人問曰何不去之曰有所受其判曰曹人之袒重耳駢脅載觀相里之剝苖登猪皮斯見初登為東畿尉相里造為尹曾欲笞之袒其背有志毛長數寸故云又曰當偃兵之時則燧而無用在冗食之日則搖而有求皆謂其尾也嘉話録從母母之姊妹為從母爾雅問難周季貢班固姊之子也善屬文喪婦作問神其姨曹大家難之三輔夬録斷乳初高祖産而皇妣殂孝皇貧薄無由得乳人議欲不舉高祖高祖從母生劉懷敬未朞乃斷懷敬乳自養高祖高祖以舊恩懷敬纍見寵授至會稽太守宋劉懷肅傳識機姚氏婦楊氏者閹人符承祖姨也家貧及承祖為文明太后所寵貴親姻皆求利潤惟楊獨不欲常謂其姊曰姊雖有一時之榮不若妹有無憂之樂姨與之衣服奴婢終不肯受承祖遣人乘車往迎之則厲志不起遣人強輿於車上則大哭言爾欲殺我也由是苻家內外皆號為癡姨及承祖敗有司執其二姨至殿庭致法以姚氏婦衣裳弊陋特免其罪其識機雖呂類亦不過也魏書不事女主狄仁傑之為相也有盧氏堂姨居于午橋南別墅姨止有一子而未嘗來都城親戚家梁公每遇伏臘晦朔修禮甚謹嘗經甚雪多休暇因候盧姨安否適見表弟挾弓矢攜雉兔來歸膳味進於北堂顧揖梁公意甚輕簡公因啓姨曰某今為相表弟有何樂從願悉力以從其旨姨曰相自貴爾有一子不欲令其事女主公大慚而退松窗雜録內外兄弟姑之子外兄弟也舅之子內兄弟也爾雅乞封羊祐當討吳賊有功將進爵土乞以賜舅子蔡襲詔封襲關內侯晉書不餞城陽太守梁柳皇甫謐從姑子也當之官人勸謐餞之謐曰柳為布衣時過吾吾送迎不出門食不過鹽菜貧者不以酒肉為禮今作郡而送之是貴陽城太守而賤梁柳豈中古人之道是非吾心所安也上鼓琴阮瞻字千里讀書不甚研求而默識其要善彈琴內兄潘嶽每令彈琴終日達夜無忤色識者嘆其恬淡不可榮辱上食醬阮孝緒字士宗外兄王晏貴顯屢至其門孝緒度之必至顛覆聞其笳管穿籬逃匿不與相見曾食醬美問之云是王家所得便吐餐覆醬及晏誅親戚咸為之懼孝緒曰親而不黨何坐之及竟獲免南史充選太學博士周捨舉外弟徐摛曰形質陋小若不勝衣而堪此選乃為晉安王侍讀梁璠劉典勵志孔若思陳亡客居鄠勵志於學外兄虞世南曰本朝淪覆吾分湮滅有弟若此知不亡矣唐書跪奏開元十六年悉召能言佛老者相答難禁中有員淑者九歲升坐詞辨注射帝因問童子豈有類若者俶跪奏臣舅子李泌帝即馳召之泌既至帝方與張說觀奕因使賦方圓動靜泌即答說因賀帝得兒童帝大悅曰是子精神要大於身上倨不冠帶崔彥昭與王凝外昆弟也凝大中初先顯而彥昭未仕嘗見凝凝倨不冠帶嫚言曰不若從明經舉彥昭為憾至是凝為兵部侍郎母聞彥昭相敕婢多製履襪曰王氏妹必與子偕逐吾將共行彥昭聞之泣且拜不敢為怨而凝竟免本傳外家之寶韋述父景駿元行冲景駿姑子也為時儒宗常載書數車自隨述入其室觀書不知寢食行冲異之試與語前世事熟復詳諦如指掌然使屬文受紙輒就行冲曰外家之寶也唐書育女柳公綽外兄薛宮早卒為育其女嫁之上父一祭仲專鄭伯患之使其壻雍紏殺之將享諸郊雍姬知之謂其母曰父與夫孰親其母曰人盡夫也父一而已胡可比也遂告祭仲曰雍氏舍其室而將享子於郊吾惑之以告祭仲殺雍紏尸諸周氏之汪公載以出曰謀及婦人宜其死也左桓十四贅壻淳于髡者齊之贅壻也史滑稽傳秦人家富子壯則出分家貧子壯則出贅漢賈誼傳師古曰謂之贅壻者言其不當出在妻家亦猶人身體之疣贅非應所有也注世讒贅壻為布袋謂如入布袋氣不得出也或云人家有女無子恐世代自此絶不肯嫁出招壻以補其世代猗覺寮不拜陳勝既立為王妻之父兄往焉勝以衆賓待之長揖不拜無加其禮妻父怒曰恬亂僣號而傲長者不能久矣不辭而去陳王跪謝遂不為顧王心慚焉以問孔鮒子魚對曰禮以婚為昆弟妻之父母為外舅姑由是明之則拜之可知昔魏信陵君嘗以此質臣之父臣父曰於諸母之昆弟妻之諸父則以親配德年以上雖拜之可也幼於已者揖之可也此出於人情而可常者也周之道雖百世婚姻不通重先君之同體也王曰善孔叢子六子壻張耳子敖嗣立為趙王高祖長女魯元公主為趙王敖后漢七年高祖從平城過趙趙王朝夕袒韝蔽自上食禮甚卑有子壻禮高祖箕倨詈甚慢易之史記倩宋建故有要脊痛往四五日天雨黃氏諸倩見建家京下方石即弄之建亦欲效之效之不能起即復置之暮要脊痛不得溺至今不愈土倉公傳徐廣曰倩女壻也遠嫁張禹每病輒以起居聞成帝自臨問之禹言老臣有四男一女愛女甚於男遠嫁為張掖太守蕭咸妻不勝父子私情思與相近上即時徙咸為弘農太守本傳冰清玉潤衛玠天韻標今妻父樂廣有海內重名議者以裴叔通曰妻父有冰清之姿壻有玉潤之望所謂秦晉之匹也後玠以天下大亂移家西行至江夏玠妻先亡征南將軍山簡見之甚相欽重簡曰昔戴叔鸞嫁女惟賢是與不問貴賤况衛氏權貴門戶令望之人乎於是以女妻焉晉書及別傳玉作璧抑毀戴若思弟邈華談女壻也談平生時常抑淵而進邈若思每街之及用事常毀談於帝由是官塗不至談每懷觖望常從容言於帝曰臣已老矣將待死祕閣汲黯之言復存于今帝不懌久之加散騎常侍晉書受困裴散騎遐娶王太尉女婚後三日諸壻大會嘗時名士王裴子弟悉集郭子玄在坐挑與裴談子玄才甚豐瞻始數交未快郭陳張甚盛裴徐理前語理致甚微四坐咨嗟稱快王亦以為奇謂諸人曰君輩勿為爾將受困寡人女壻世說晚令謝中郎萬是王藍田女壻嘗箸白綸巾肩與徑至揚州聽事見王直言曰人言君侯癡君侯信自癡藍田曰非無此論但晚令耳世說刑寡妻齊謝眺為王敬則壻曾告敬則其女常懷刃欲報眺眺不敢相見及當拜吏部謙挹尤甚尚書郎范鎮嘲曰卿人才無慚此選但恨不可刑于寡妻眺有愧色及臨誅歎曰天道其可昧乎我雖不殺王公王公因我而死比張禹魏崔光自從貴達罕所申薦曾啓其女壻彭城劉敬微云敬微為荊州五隴城主女隨夫行常慮寇抄南北分張乞為徐州長史兼別駕暫集京師肅宗許之時人比之張禹本傳杖壻田式子顯標陏文初拜襄州總管專以立威為務犯禁者雖至親昵無所容貨其壻杜寧自長字省之式戒無出外寧久不得還竊上北樓以暢羈思式知之杖之五十北史丈人明皇封禪太山張說為封禪使說女壻鄭鎰本九品官舊例封禪後自三公以下皆遷轉一級惟鄭鎰因說驟遷五品兼賜緋服因大酺次玄宗見鎰官位騰跳怪而問之鎰無辭以對黃幡綽曰此乃太山之力也酉陽雜俎自此遂目丈人為泰山蘇鶚演義或謂泰山有丈人峰故名叢書青城山乃五嶽之長故名丈人山今世俗呼人婦翁為令嶽妻之伯叔父為列嶽往往因此青城山記婦翁與壻張垍尚寧親公主玄宗眷垍厚即禁中置內宅侍為文章珍賜不可數均供奉翰林而垍以所賜夸均均曰此婦翁遺壻非天子賜學士也本傳垍尚主在翰林獨以珍玩常誇於同列張淑曰此婦翁與壻非天子賜學士者也國史補受薄韋皋見辱於張延賓崔圓受薄於李彥允皆丈人子壻後韋為張西川交代崔救李殊死南部新書李彥允崔圓少貧賤依親人李彥允時為刑部尚書待之不甚加禮一夕李夢身桎梏其輩百人為兵擁入大府呼姓名領過判云准法李視見紫衣人據案乃崔也躍出哀叫紫衣人曰李彥允特收禁流汗而覺具以語崔自是厚待之因薦之楊國忠後遂以知留後旬月拜相京城尅復李公授僞官與陳希烈等二百人合誅崔為中書令訊決之際以姓名呼過判云准法李公呼曰相公豈不憶昔年所禱耶崔乃悟遂判李彥允收禁具表其事請贖罪許之流嶺外昔日之夢何其神歟唐逸史張延賞張延賞選壻無可意者其妻苗氏賢而知人特選進士韋皋許之臯性踈曠不拘細行延賞竊悔由是婢僕頗輕慢之惟苖氏待之益厚皋因辭東遊張氏罄奩具以治行延賞幸其去以七馱物為贐皋行翌日悉還之惟留奩物及書冊而已後五年皋擁節旄會德宗幸奉天持節西川替延賞乃改姓名作韓翱人莫敢言至大回驛去府三十里人有報曰替相公者韋皋非韓翱苖氏曰必韋郎也延賞曰天下姓名同者甚衆彼韋生必填溝壑豈能乘吾位乎次日果韋皋也延賞慚懼自西門潛遁皋入見苖禮奉過布衣之日求前輕慢者皆杖死之時泗濱郭圍因為詩曰宣父從周又入秦昔賢誰不困風塵當時甚訝張延賞不識韋皋是貴人雲溪友議德宗還京拜皋鳳翔節度使懇讓乞改西川道教靈驗記不為壻禮杜黃裳始為卿士女嫁韋執誼深不為執誼所稱及執誼為相除太常卿因謂執誼曰令率百官請皇太子監國執誼遽曰丈人甫得一官奈何開口議禁中事耶黃裳勃然曰黃裳受恩三朝豈可以一官見買即拂衣而出俄而順宗崩憲宗即位黃裳為相執誼貶崖州黃裳終保全之洎死嶺表請歸其喪以辦喪事舊唐呼為雍老崔涯妻雍氏揚州總校之女雍以崔有詩名資贍甚厚崔略無恭敬但呼妻父雍老而已雍杖劍呼女謂崔曰某河朔之人唯習弓馬養女合嫁軍門徒慕士流之德小女不可別醮便令出家止令剃髮為尼涯悲泣悔過慟別留詩曰隴上流泉隴下分斷腸嗚咽不堪聞姮娥一入宮中去巫峽千秋空白雲不羈士安之壻曰皇甫泌少時不羈惟事蒲慱時士安作相纍諭不悛欲面奏其事使加貶斥方啓口云臣有女壻皇甫泌適值邊庭有息報不暇敷陳他日又欲面奏值上內逼遽引袖起遙語畢曰卿纍言壻皇甫泌得非欲轉官耶可與轉一資畢不敢辨惟而退泌即轉殿中丞後纍典大郡以尚書右丞致仕年八十五青箱雜記命褫帶張安道平生未嘗不衣冠而食嘗暑月與其壻王鞏同飯命鞏褫帶而已衫帽自如鞏不敢公曰吾自布衣諸生遭遇至此一飯皆君賜也享君之賜敢不敬乎子自食某之食雖衩衣無害也半子回紇明年可汗遣宰相𨁂跌都督等衆千餘并遣其妹骨咄祿毗伽公主率大酋之妻五十人迎主且納聘𨁂跌至振武為室韋所鈔戰死有下七百皆聽入朝舍鴻臚帝御延喜門見使者是時可汗上書恭甚言皆為兄弟今壻半子也陛下若患西戎子請以兵除之唐書兒例突厥致書曰皇帝是婦父即是翁此是女夫即是兒海録僚壻兩壻相謂為亞爾雅詩曰瑣瑣姻亞今江東人呼同門為僚壻注兩壻相謂為亞者言每一人取姊一人取妹相亞次也又並來女氏則姊夫在前妹夫在後亦相亞也釋名友壻嚴助漢武時為中大夫特見任用嘗侍燕從容上問助居鄉里時助對曰家貧為友壻富人所辱上問所欲對願為會稽太守於是拜為會稽太守漢書弗賓蔡哀侯取于陳息侯亦娶焉息媯將歸過蔡蔡侯曰吾姨也止而見之弗賓息侯聞之怒使謂楚文王曰伐我吾求救於蔡而伐之楚子從之莊十一二隗晉公子重耳奔狄狄人伐牆咎如獲其二女叔隗季隗納諸公子公子取季隗以叔隗妻趙衰僖二十二大橋小橋周瑜字公瑾為中護軍從孫策攻皖得橋公兩女皆國色策自納大橋瑜納小橋策從容戲瑜曰橋公二女雖流離得吾二人為壻亦足為歡誦賦庾登之謝晦為荊州刺史請為長史南郡太守仍為衛軍長史登之與晦俱曹氏壻名位本同一旦為之佐意甚不愜到廳箋唯言即日恭到初無感謝之言每入覲見備持箱囊几席之屬一物不具不肯坐嘗於晦坐誦西征賦云生有修短之命位有通塞之遇晦雖恨而常優容之晦拒王師欲登之留守登之不許晦敗登之以無任免官禁錮還家何承天戲之曰因禍為福未必皆知登之曰我亦幾與三豎同戮承天為晦作表云當舟東下戮此三豎故登之為嘲南史匹敵夫妻匹敵之義也士庶人曰妻妻齊也夫賤不足以尊稱故齊等言也釋名人道大倫易基乾坤詩首關雎書美釐降春秋譏不親迎夫婦之際人道之大倫也禮之用惟婚姻為兢兢史記象太陰妻象太陰臣法金位春秋漢含孳水火交感陰陽以設夫婦象也上配陰陽夫婦之道參配陰陽通達神明夫不賢則無以御婦婦不賢則無以事夫夫不御婦則威儀廢婦不事夫則義理墮夫婦之好終身不離列女傳娶塗山禹三十未娶行到塗山恐時之暮失其度制乃辭云吾娶也必有應矣乃有白狐九尾造於禹禹曰白者吾之服也其九尾者王之證也塗山之歌曰綏綏白狐九尾痝痝成家成室我造彼昌禹因娶塗山謂之女嬌吳越春秋禹行功見塗山之女禹未之遇而巡省南土塗山氏之女乃令其妾侍禹於塗山之陽乃作歌歌曰候人兮猗呂覽先配鄭公子忽如陳逆婦媯辛亥以媯氏歸甲寅入于鄭陳針子送女先配而後祖針子曰是不為夫婦誣其祖矣非禮也何以能育左隱八不言蔡哀侯為莘故繩息媯以語楚子楚子如息以食入享遂滅息以息媯歸生堵敖及成王焉未言楚子問之對曰吾一婦人而事二夫縱弗能死其又奚言莊十四占吉初懿氏卜妻敬仲其妻占之曰吉是謂凰皇于飛和鳴鏘鏘有媯之後將育于姜五世其昌竝于正卿八世之後莫之與京上二十二內子狄人歸季隗于晉而請其二子文公妻趙衰生原同屏括樓嬰趙姬請逆盾與其母子餘辭姬曰得寵而忘舊何以使人必逆之固請許之來以盾為才固請于公以為嫡子而使其三子下之以叔隗為內子而已下之僖二十四相待如賓季臼使人舍于冀缺耨其妻饁之敬相待如賓與之歸言諸文公曰敬德之聚也能敬必有德德以治民君請用之公以為下軍大夫三十三國語聚作恪伉儷聲伯之母不聘穆姜曰吾不以妾為姒生聲伯而出之嫁於齊管于奚生二子而寡以歸聲伯聲伯以其外弟為大夫而嫁其外妹施孝叔郤犨來聘求婦於聲伯聲伯奪施氏婦以與之婦人曰鳥獸猶不失儷子將若何曰吾不能死亡婦人遂行生二子於郤氏郤氏亡晉人歸之施氏施氏逆諸河沈其二子婦人怒曰已不能庇其伉儷而亡之又不能字人之孤而殺之將何以終遂誓施氏成十一戒直言孫伯宗朝以喜歸其妻曰子貌有喜何也曰吾言於朝諸大夫皆謂我知似陽子對曰陽子華而不實主言而無謀是以難及其身子何喜焉伯宗曰吾飲諸大夫酒而與之語爾試聽之曰諾既飲其妻曰諸大夫莫子若也然而民不能戴其上久矣難必及子子盍亟索士憖庇州犂焉得畢陽及欒弗忌之難諸大夫害伯宗將謀而殺之畢陽實送州犂于荊晉語初伯宗每朝其妻必戒之曰盜憎主人民惡其上子好直言必及於難成十五辨姓齊棠公之妻東郭偃之姊也東郭偃臣崔武子棠公死偃御武子以弔焉見棠姜而美之使偃取之偃曰男女辨姓今君出自丁臣出自桓不可武子筮之遇困之大過以示陳文子文子曰夫從風風隕妻不可娶也且其繇曰困于石據于蒺藜入于其宮不見其妻凶崔子曰嫠也何害先夫當之矣遂取之莊公通焉驟如崔氏杼使人弒之公求之曰陪臣于掫有淫不知二命遂弒之襄二十五子産對叔向曰男女辨姓禮之大司也今君內實有四姬焉昭元內主晉韓須如齊逆女齊陳無宇送女致少姜少姜有寵於晉侯謂之少齊少姜卒昭公如晉及河晉侯使士文伯來辭曰非伉儷也請君無辱齊侯使晏嬰請繼室於晉曰寡君不腆先君之適以備內官焜耀寡人之望則又無祿早世隕命君若不忘先君之好照臨敝邑鎮撫其社稷則猶有先君之適及遺姑姊妹若而人君若不棄敝邑而辱使董振擇之以備嬪嬙寡人之望也韓宣子使叔向對曰寡君不能獨任其社稷之事未有伉儷若惠顧敝邑賜之內主豈惟寡君舉群臣實授其貺其自唐叔以下實寵嘉之遂成婚晉韓起如齊逆女公孫蘲為少姜之有寵也以其子更公女而嫁公子昭二三不笑叔向得鬷明昔賈大夫惡娶妻而美三年不言不笑御以如皋射雉獲之其妻始笑而言賈大夫曰才之不可以已我不能射女遂不言不笑夫二十八遠丈夫吳師入郢楚子取其妹季莽畀我以出楚昭王之奔鄖楚大夫鍾建負季莽以從王將嫁季莽季莽辭曰所以為女子遠丈夫也鍾建負我矣以妻鍾建以為樂尹定四笑曠趙簡子舉兵伐齊有被甲士申護笑簡子曰子何笑對曰臣乃有宿笑當桑之時臣鄰家夫與妻俱之田見桑中女因追之不能得還及其妻怒而去之臣笑其曠也簡子曰今吾伐國夫國是吾曠也還師而歸說苑晉文公出會欲伐衛公子鋤仰天而笑公問何笑曰臣笑鄰之人有送其妻適私家者道見桑婦悅而與言然顧視其妻亦有招之者矣臣竊笑此也公寤其言乃止引師而還未至而有伐其北鄙者矣列說符私壻昔東夷之子慕諸夏之禮有女而寡為納私壻終身不嫁嫁則不嫁矣非有貞節之義也蒼吾嬈娶妻而美讓與其兄讓則讓矣非禮之讓也家語相思樹宋大夫韓馮娶妻而美康王奪之馮怨王囚之論為城且妻密遺馮書謬其辭云其雨淫淫河大水深日出當心王以問蘇賀對曰其雨淫淫言愁且思也河大水深不得往來也日出當心死有志也俄而馮自殺妻乃陰腐其衣王與之登臺妻遂自投下左右攬之衣不中手遺書于帶曰王利其生妾利其死願以尸骨與馮合葬王怒弗聽使人埋之塜相望也王曰爾夫婦相愛能使塜合則弗禁也一夕有大梓木生于二塜之端旬日其大合抱屈體以相就根交於下又有鴛鴦雌雄各一恆棲樹上晨夕交頸悲鳴音聲感人宋人哀之遂號其木曰相思樹搜神記韓馮戰國時為宋康王舍人妻何氏美王欲之捕舍人築青陵臺何氏作烏鵲歌以見志遂自縊死南山有烏北山張羅烏自高飛羅當奈何烏鵲雙飛不樂鳳凰妾是庶人不樂宋王九國志王臺新詠取長陳軫去楚之秦張儀請秦王殺之王告軫軫曰人有兩妻者人誂其長者長者詈之誂其少者少者許之居無幾何有兩妻者死客謂誂者曰汝取長者乎少者乎取長者客曰長者詈汝少者和汝汝何為取長者曰居彼人之所則欲其許我也今為我妻則欲其詈人也戰國策人有挑其鄰之妻者其長者罵之其少者報之後其夫死而取其長者或曰夫非罵爾者耶曰在人欲其報我在我欲其罵人後馮衍傳陌桑歌邯鄲女子姓秦名羅敷為邑人千乘王仁妻仁後為趙王家令羅敷出採桑於陌上趙王登臺見而悅之置酒欲奪焉羅敷善彈箏作陌上桑以自明不從古今注私畏鄒忌修八尺有餘而形䫉昳麗朝服衣冠窺鏡謂其妻曰我孰與城北徐公美其妻曰君美甚徐公何能及君也城北徐公齊國之美麗者也忌不自信而復問其妾曰吾孰與徐公美妾曰徐公何能及君也明日徐公來孰視之自以為不如窺鏡而自視又弗如遠甚暮寢而思之曰吾妻之美我者私我也妾之美我者畏我也齊策兩袒俗說齊有一女二人求之東家子醜而富西家子好而貧問其女定所欲適難指斥言者偏袒令我知之女便兩袒父母怪問其故對曰欲東家食西家息此為兩袒者也風俗通殺妻吳起好用兵事魯君齊人攻魯欲將起以起取齊人為妻而疑之起欲就名遂殺其妻以明不與齊魯卒以為將攻齊大破之史記決嫁張耳嘗亡命游外黃外黃富人女甚美嫁庸奴亡其夫去抵父客父客素知張耳乃謂女曰必欲求賢夫從張耳女聽乃卒為請決嫁之張耳張耳是時脫身游女家厚奉給張耳張耳以故致千里客乃官魏為外黃令名由此益賢史記畫眉張敞字子高為京兆尹為婦畫眉長安中傳張京兆眉嫵有司以奏敞宣帝問之對曰臣聞閨房之內夫婦之私有過于畫眉者上愛其能弗責備也漢書娶巫丞相黃霸字次公故為陽夏游徼與善相者共載見一婦人相者言此婦當富貴為封侯者夫人不然相書不可用也霸推問之乃其里人巫家女也即娶為妻論衡遺襦待詔景子春素善占坐事係獄其婦朱君至獄門通言遺襦子春驚曰朱君來言與朱為誅袴而襦中斷絶也我當誅斷也後遂腰斬桓談新論送獄丁邯字叔春京兆陽陵人也為漢中太守妻弟為公孫述將收妻送南鄭獄免冠徒跣自陳詔曰漢中太守妻乃係南鄭獄誰得搔其背垢者懸牛頭賣馬脯盜跖行孔子語以邯服罪且邯一妻冠履勿謝決録注從命渤海鮑宣妻者柏氏之女也字少君宣從少君父學父奇其清苦故以女妻之裝送甚厚宣不悅曰少君生富驕習美飾而吾貧賤不敢當禮少君乃悉歸侍御服飾更著短布裳與宣共挽鹿車歸鄉里拜姑禮畢提甕出汲修行婦道宣官司隸校尉子永始興初為魯郡守永子昱從容問少君曰太夫人寧復識挽鹿車時不對曰先姑有言存不忘亡安不忘危吾焉敢忘乎後漢舉案齊眉梁鴻字伯鸞家貧而尚節介執家慕其高節多欲女之鴻並絶不娶同縣孟氏有女狀肥醜而黑力舉石臼擇對不嫁至年三十父母問其故女曰欲得賢如梁伯鸞者鴻聞而聘之女求作布衣麻屨織作筐緝績之具及嫁始以裝飾入門七日而鴻不答妻乃跪床下請曰竊聞夫子高義簡斥數婦妾亦偃蹇數夫矣今而見擇敢不請罪鴻曰吾欲裘褐之人可與俱隱深山者爾今乃衣綺縞傅粉墨豈鴻所願哉妻曰以觀夫子之志耳妾自有隱居之服乃更為椎髻著布衣操作而前鴻大喜曰此真梁鴻妻也能奉我矣字之曰德曜名孟光居有頃妻曰常聞夫子欲隱居避患今何為默默無乃欲低頭就之乎鴻曰諾乃共入霸陵山中以耕織為業適吳依大家皋伯通居廡下為人賃舂每歸妻為具食不敢於鴻前仰視舉案齊眉伯通察而異之曰彼傭能使其妻敬之如此非凡人也乃方舍之於家上才美流譽隴西秦嘉字士會雋秀之士婦曰徐淑亦以才美流譽桓帝時嘉為曹椽赴洛淑歸寧於家晝臥流涕覆面嫂怪問之曰適見嘉自說往津鄉亭病亡二客俱留一客守喪一客賫書還日中當至舉家大驚書至事如夢幽明録漢上計秦嘉嘉妻徐淑夫妻事既可傷文亦悽怨為五言者不過數家而婦人居二徐淑敘別之作亞於團扇矣詩品嘉妻徐氏動合禮義言成規矩毀形不嫁哀痛傷生此則才德兼美者也後漢書標列女而徐淑不齒欲使彤管所載將安准的史通嘉夫妻詩僅見藝文類聚辭多不録斷織河南樂羊子之妻羊子嘗行路得遺金一餅還以與妻妻曰妾聞志士不飲盜泉之水廉者不受嗟來之食文苑况拾遺求利以污其行乎羊子大慚乃捐金於野而遠尋師學一年來歸妻跪問其故羊子曰久行懷思無它異也妻乃引刀趨機而言曰此織生自蠶繭成於機杼一絲而纍以至於寸纍寸不已遂成丈匹今若斷斯織也則捐失成功稽廢時月夫子積學當日知其所亡以就懿德若中道而歸何異斷斯織乎羊子感其言復還終業遂七年不反後漢不諧周澤字稚卿北海安丘人也為太常臥疾齊宮其妻哀澤老病窺問所苦澤大怒以為干犯齊禁收送詔獄并自劾謝當世疑其激發不實又諺曰生世不諧作太常妻一歲三百六十日三百五十九日齊一日不齊醉如泥既作事復低迷漢官儀重合黃昌會稽餘姚人為蜀郡太守初昌為州書佐其婦歸寧遇賊被獲流轉入蜀為人妻其子犯事乃詣昌自訟昌疑不類蜀人因問所由對曰妾本會稽餘姚戴次公女州佐黃昌妻妾當歸家為賊所掠遂至此昌驚曰何以識黃昌耶對曰昌左足心有黑子嘗自言當為二千石昌出足示之相持悲泣還為夫婦初昌欲至蜀郡時有謠兩日出天謝承書還衣世傳有夫死而婦許以不嫁者誓以繡衣襚以衣尸納諸棺焉後三年婦出適迎有日矣有行道人夜求人家宿向晨主人語之婦約之詞寄所誓之衣曰子到若千里當逢之還此衣焉果見迎車具以事告還其繡衣婦遂自縊而死物理論兩譏王龔字伯宗有高名於天下順帝時為太尉初山陽太守薛勤喪妻不哭將殯臨之曰幸不為夭復何恨哉及龔妻卒龔與諸子並杖行服時人或兩譏焉張璠漢記投水合肥有小吏港漢建安中廬江小吏焦仲卿妻劉氏為姑所出自誓不嫁其家逼之乃投水死仲卿聞之亦自縊時人憐之後為名寰宇記慕勢中官常侍唐衢欲以女妻汝南傳公明不娶轉以女妻荀彧彧父緄慕勢誡彧娶之為論者所譏典略彧父緄畏憚宦官乃為彧娶衡女彧以少有才名故得免於譏議後漢擇婦漢末諸蔡最盛蔡諷姊適太尉張溫長女為黃彥承妻小女為劉景升後婦媦之姊也襄陽傳黃承彥者高爽開列為沔南名士謂諸葛孔明曰聞君擇婦身有醜女黃頭黑色而才堪相配孔明許即載送之時人以為笑樂鄉里為之諺曰莫作孔明擇婦止得阿承醜女上撾妻蜀劉琰妻胡氏入賀太后太后特留胡氏經明乃出胡氏有美色琰疑其與後主有私呼卒五百撾胡至以履摶面而後棄遣胡具以告琰坐下獄有司議曰卒非撾妻之人面非受履之地琰竟棄市自是大臣妻母朝慶遂絶三國志比肩吳黃龍中吳郡海鹽陸東美妻朱氏有容止夫妻相重寸步不相離時人號為比肩人後妻卒東美不食而死合葬後未一歲冢上生梓樹同根二身相抱而合成一樹每有雙鴈常宿于上孫權聞之嗟嘆封其里曰比肩墓曰雙梓後子弘與妻張氏亦相愛慕吳人又呼為小比肩三吳記述異記不瀆顧悌雍族人也待妻有禮常夜入晨出希見其面嘗疾篤妻出省之悌命左右扶起冠幘加襲起對趣令妻還其真潔不瀆如此吳書修整晉何曾家法修整至年五十以上每見妻必正衣冠身坐面南妻坐面北對酒酬酢一歲不至再三焉年八十而終獨異志廬杖劉實字子貢位望通顯每崇儉素雖處榮寵居無第宅雖禮教陵而行已以正喪妻為廬杖之制終喪不御內輕薄者笑實不以介意晉書堪作夫人山濤初為布衣家貧謂其妻韓曰忍饑寒我後當作三公但不知竟堪作夫人否耳上身尉荀奉倩與婦至篤冬月婦病熱乃出中庭自取冷還以身尉之婦亡奉倩後少時亦卒以是獲譏於世奉倩曰婦人德不足稱當以色為主裴令聞之曰此乃是興到之事非盛德言冀後人未昧此語卿卿王安豐婦常卿安豐曰婦人卿壻於禮為不敬後勿復爾婦曰親卿愛卿是以卿卿我不卿卿誰復卿卿遂恆聽之籍注咸康二年零陵李繁姊先適南平郡陳詵為妻産四子而遭賊於賊請活姑命賊略將姊去詵更娶嚴氏生三子繁後得姊消息往迎還詵詵籍注領二妻及李亡詵疑制服以事言征西大將軍庾亮府平議時議亦往往異同司馬王愆期議曰案禮不二嫡故惠公元妃孟子孟子卒繼室以聲子諸侯猶爾况庶人乎詵不能遠慮避難以亡其妻非犯七出見絶於詵始不見絶終又見迎養姑於堂子為首嫡列名黃籍則詵之妻為詵也妻則為暉也母暉之制服無所疑矣詵有老母不可以莫之養妻無歸期納妾可也李雖沒賊尚有生冀詵尋求之理不盡而便娶妻誠詵之短也然隴畝之夫不達禮義考之傳記不勝施孝叔之妻失身於郤犨而不棄者以非其罪也詵有兩妻非故犯法李鄙野人而能臨危請活姑命險不忘順可謂孝婦矣議者欲令在沒略之中必全苦操有隕無二是望凡人皆為宋伯姬也詵雖不應娶妻要以嚴為妻妻則繼室本非嫡也雖云非嫡義在始終寧可以詵不應二妻而已涉二庭乎若能下之則趙姬之義若云不能官當有制先嫡後繼有自來矣亮從愆期議定晉禮志號梁孫晷字文度恭孝清約學識有理義時會稽虞喜隱居海嵎有高世之風晷欽其德娉喜弟預女為妻喜戒女棄華尚素與晷同志時人號為梁鴻夫婦傳射婦郭默婦兄同郡陸嘉取官米數石餉妹默以為違制將殺嘉嘉懼奔石勒默乃自射殺婦以明無私本傳重室家宋東徐州刺史張讜妻皇甫氏被掠賜中官為婢皇甫遂詐癡不能疏沐後讜為宋冀州長史因貨千餘匹購求皇甫文成怪其納財之多引見之時皇甫年垂六十矣文成曰南人奇好能重室家之義此老母復何所任乃能如此致費也皇甫氏歸讜令諸妾境上奉迎數年卒後十年而讜入魏北史三十三蠶室卞彬字士蔚性飲酒以瓠壺瓢勺杬皮為肴著帛冠不十年不改易以大瓠為火籠什物多諸詭異自稱卞田居婦為傅蠶室南齊對飲沈文季為吳興太守文季飲酒至五斗妻王氏王錫女飲酒亦至三斗文季與對飲竟日而視事不廢上重婦柳惔字文通世隆子也度量寬博家人未嘗見其喜慍甚重其婦頗成畏憚性愛音樂女伎精麗略不敢視僕射張稷與惔狎密而為惔妻所敬稷每詣惔必先相問夫人惔每欲見妓恆因稷請奏其妻隔幔坐妓然後出惔因得留目南史二十八比秦勃海封卓妻彭城劉氏女也成婚一夕卓官於京師後以事伏法劉氏在家忽然夢想知卓已死哀泣不輟遂憤嘆而死時人比之秦嘉妻高允念其高義為詩八首贊之魏書健婦夫半裴澤妻巨鹿魏氏恩好甚隆不能暫相離澤每從駕其妻不宿亦至性強立時人以為健婦夫半北史狗吠邢邵字子才與婦甚踈未嘗內宿自云嘗晝入內閣為狗所吠言畢撫掌大笑北齊託夢李庶生而天閹妻元羅女也庶亡後兄嶽使妻伴之寢宿積五年元氏更適趙起嘗夢庶謂已曰我薄福託劉氏為女明旦當出彼家甚貧恐不能見養夫妻舊恩故來相見告君宜往取我劉家在七帝坊十字街南東入窮巷是也元氏不應庶曰君似懼趙公意我自說之於是起亦夢焉起寤問妻言之符合遂持錢帛躬往求劉氏如所夢得之養女長而嫁焉北史三十一鄉里王彪敗謂妻楊呼為鄉里曰我不忍令鄉里落他處今當先殺鄉里然後就死楊引頸受刀曾不辭憚南史沈休文山陰柳家女詩云還家問鄉里詎堪持作夫憶餅師寧王憲貴盛寵妓數十人皆絶藝上色宅左有賣餅者妻纖白明媚王一見屬目厚遺其夫取之寵惜逾等環歲因問之汝復憶餅師否默然不對王召餅師使見之其妻注視雙淚垂頰若不勝情時王座客十餘人皆當時文士無不悽異王命賦詩王右丞維詩先成莫以今時寵寧忘舊日恩看花滿目淚不共楚王言更為親唐柳子升妻鄭氏無疾而終臨卒時告子升曰不離君之身後十八年更與君為親已而子升年近七十再娶于崔氏或多省前生之事後産一男而卒獨異志卜會候請岐王李茂貞霸秦隴也涇州書記薛昌緒為人迂僻秉自天性與妻相見亦有時必有禮容先命女僕通傳往來數四可之然後秉燭造室至于高談虛論茶果而退或欲詣房幃其禮亦然嘗曰某以繼嗣事重輒欲卜其嘉會必候請而可之玉堂閒話河魁在房李戴仁性迂緩娶閻氏年甚少與之異室私約曰有興則見忽一夕聞扣戶聲小豎報云縣君欲見大監戴仁遽取百忌曆燈下看之大驚曰今夜河魁在房不宜行事傳語縣君謝到閻氏慚怒而去荊湖遺事王腕青唇有覩鄰夫婦相諧和者夫自外歸見婦吹火乃贈詩曰吹火朱唇動添薪玉腕斜遙看煙裏面太似露中花其妻候夫歸告之曰每見鄰人夫婦極甚多情適來夫見婦吹火作詩詠之君豈不能學也夫曰彼詩道何語妻乃誦之夫曰卿當吹火為別製之妻亦效吹夫乃為詩曰吹火青唇動添薪黑腕斜遙看煙裏面恰似鳩盤茶笑林去而復合徐孝克擒之子凌弟也性至孝遭父憂始不勝喪所生母陳氏盡就養之道梁末侯景寇亂孝克養母饘粥不能給妻東莞臧氏領軍將軍盾女也甚有容色孝克乃謂曰今饑荒如此供養交闕欲嫁卿與當世人望彼此俱濟於卿如何臧氏弗許之時有孔景行者為侯景將多從左右逼而迎之臧氏涕泣而去所得穀帛悉以遺母孝克又剃髮為沙門改名法整兼乞食以充給焉臧氏亦深念舊恩數私致饋餉故不乏絶後景行戰死臧氏伺孝克於途中纍日乃見謂孝克曰往日之事非為相負今既得脫當歸供養孝克默然無答於是歸俗更為夫妻南史離而復聚李德武妻裴氏字淑英適德武經一年而德武坐從父金才事徙嶺表裴父矩奏請德武離婚煬帝許之德武將與裴別謂曰燕婉始爾便事分離方遠投瘴癘恐無還理尊君奏留必欲改嫁耳於此即事長訣矣裴泣而對曰婦人事夫無再譙之禮夫者天也何可背乎守之以死必無他志因操刀欲割耳自誓保者禁之乃止後十餘年間與德武音信斷絶矩欲奪其志時有柳直求婚許之期有定日乃以剪斷其髮悲泣絶粒矩不可奪乃止德武已於嶺表娶爾朱氏為妻及遇赦得還至襄州聞裴守節乃出其後妻重與裴合生三男四女貞觀中德武終於鹿城令裴歲餘亦卒舊唐天中記卷十八
