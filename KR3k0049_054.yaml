body:
  text: 鹿異名鹿牡麚牝麀其子麛其跡速絶有力爾雅麚牡鹿也夏至解角麟大牡鹿也𪋯鹿也𪋝鹿迹也麠大鹿也說文律主四九三十六六主律律主鹿鹿故六月而生家語不觸鹿有角而不能觸麞有牙而不能噬崔豹古今注瑤光星瑤光散而為鹿江淮不祠則瑤光不明彘生鹿春秋運斗樞夫鹿者純善之獸也道術得則白鹿見王者明惠及下則見瑞應圖仁獸白鹿仁獸也色若霜雪不與他鹿為群晉徵祥說殷仲堪上白鹿表曰白者正色鹿者景福嘉義中興書乘鹿獻環黃帝時西王母使使乘白鹿獻環白之休符有金方也神鹿夏禹之時神鹿行於河水金樓子天子征于菹臺獵菹之獸於是有白鹿一忤乘而逆天子乘蕖黃之乘馳焉穆天子傳駕鹿天子西升于黎丘之陽過並公傳乃駕鹿遊乎山上桓公問管子楚之強國舉兵伐之恐力不能過奈何對曰公貴買其鹿公即為百里之城使人載錢二千萬求鹿於楚人楚人釋其農而田鹿管子告楚人賈曰為致生鹿賜子金百斤什至金千斤管子晉侯不見鄭伯以為二於楚鄭子家使執訊告趙宣子曰鹿死不擇音小國之事大國也德則其人也不德則其鹿也鋌而走險急何能擇左傳范宣子執戎子駒支親數諸朝今諸侯之事我寡君不如昔者蓋言語漏泄則職女之由戎子駒支曰昔文公與秦伐鄭秦人竊與鄭盟於是乎有殽之師晉禦其上戎亢其下譬如捕鹿晉人角之諸戎犄之與晉踣之戎何以不免襄十四孟孫獵得麑使秦西巴載之持歸其母隨之而歸秦西巴弗忍而與之孟孫大恕逐之居三月復召以為子傅曰夫不忍于麑又且忍吾子乎昔有女子采薇萊有所驚而走因獲得鹿其家遂昌熾故屈子天問云驚女采薇鹿何祐秦二世之時趙別駕鹿而從行王曰丞相何為駕鹿高曰馬也王曰丞相誤耶以鹿為馬高曰乃馬也陛下以臣之言為不然願問群臣群臣半言馬半言鹿當此之時秦王不敢信其目而從邪臣之言鹿與馬之異形乃衆人之所知也然而不能別其是非況于暗昧之是乎陸賈新語鹿王楚王畋於震澤遇群鹿約千餘王令諸軍張兩翼驅群鹿入一大谷中谷無他道王將令弓弩並發期盡殪之忽一大鹿突圍而走至王前跪而人言曰我鹿王也今者與其族類盡困於此谷中大王如盡取之則我之族滅絶無有遺類矣我願大王憫而釋之願自今日日獻一鹿則大王可長享而我等不至殲絶也王異之遂命諸將開道縱之大鹿遂跳躍而往鳴以呼其群整行而出入大山去自是日有一死鹿置王所獵處僅三年王崩遂止山傍人奇其事為立廟因為鹿王廟震澤事苑楚元王在鬱林大獵于雲夢之澤云云後吳侵楚萬鹿乘月黑馳繞吳軍若萬馬奔聲吳軍驚遁楚王明日達吳營見鹿迹無數環之一大白鹿見王敘其報恩曲折楚王乃為立廟以旌其德仍名其山曰仁鹿山谷曰仁鹿谷廟曰仁鹿廟地理志青瑣高議殺鹿武帝時有殺上林鹿者下有司收殺之朔時在傍曰是故當死者三使陛下以鹿殺人一當死天下聞陛下重鹿賤人二當死胸奴有急以鹿觸之三當死上默然赦之東方朔別傳古者皮幣諸侯以聘享武帝乃以白鹿皮方尺線以藻繢為幣直四十萬王侯朝覲享聘必為薦璧然後得行史記鹿千年為蒼鹿又五百年為白鹿又五百年化為玄鹿成帝時中山人得玄鹿烹而視其骨皆黑色仙者說玄鹿為脯食之壽二千歲餘干縣有白鹿土人傳千歲矣晉成帝遣人捕得有銅牌刻字在角後云寶鼎二年臨江所獻述異記雨鹿成帝時宮中雨一蒼鹿殺而食之味甚美上明帝永平中三角鹿出江陵孝和帝永元中豫章餘干得白鹿高丈九寸古今注隨車鄭弘為淮陰太守行春大旱隨車致雨白鹿方道俠轂而行弘怪問主簿黃國曰鹿為吉為凶國拜賀曰聞三公車轓畫作鹿明府必為宰相後果為太尉謝承書劉攽云淮陰當作淮陽白鹿甚馴辛繕字公文少治春秋詩易隱居弘農華陰弟子受業者六百餘人所居旁有白鹿甚馴不畏人三輔決録烏馴丹羽巢叔和之室鹿呈白毳擾功文之廬晉孝友傳序初明帝為平原王王母甄后妬文帝殺之故不立為太子嘗從帝獵見鹿子母帝射殺鹿母語明帝射其子對曰陛下既已殺其母臣不忍復殺其子因涕泣帝放弓矢歎曰此語一何痛哉由是帝立太子意定矣魏末傳高堂隆集曰近日有司宣令殺禁地鹿者身死財産沒官有能先覺白者賞賜之此為重禽獸而賤人也昔張盍踏及孺鄰成二人竝精思於蜀云臺山石室中忽有一人著黃練單衣葛巾到其前曰勞乎道士乃辛苦幽深於是二人顧視於鏡乃見是鹿也因問曰汝是草中老鹿也敢詐為人形也言絶即逐其鹿而走去抱朴子石勒嘗傭於臨水為遊軍所囚會有群鹿傍過軍人競逐之勒乃獲免俄而又見一老父謂勒曰向群鹿者我也君應為中州故相救耳晉書謝鯤避地于豫章嘗行經空亭中夜宿此亭舊每殺人將曉有黃衣人呼鯤字令開戶鯤淡然無懼色便於窗中度手牽之髀斷視之鹿也尋血獲焉爾後此亭無復妖怪上鄱陽樂安有人姓彭世以獵射為業每入山與子俱行後忽蹶然而倒化成白鹿兒悲號鹿超然遠遊遂失所在其子終身不復弋獵至孫復學射忽得一白鹿乃于兩角間得道家七星符並有其祖姓名及鄉居年月焉覩之悔懊乃燒去弓矢永斷射獵異苑列異傳不云晉咸寧中晉咸和四年七月壬寅長沙郡邏吏黃光於南郡道遇白鹿驅之不去直來就光追尋光二百餘步光遂抱取遣吏李堅奉獻宋書陶淡侃之孫雅好導養年十五六便服食絶榖於野得白鹿子馴而養之恆與之俱往還後遂不復還家晉中興書紫纈青裾淮南陳氏於田種豆忽見有二女姿色甚美著紫纈襦青裾天雨而衣不濕其壁先桂一銅鏡鏡中見二鹿以刀斫獲之以為脯陶潛搜神後記項縣人姚牛年十餘歲父為鄉人所殺牛後在縣署前手刃之于衆中吏捕得官長深矜孝節為推遷其事會赦得免令後出獵逐鹿入草中有古深穽數處馬將趣之忽見一翁舉杖擊馬馬驚避不得鹿令怒引弓將射之曰此中有穽恐君墮耳令曰爾為何人翁跪曰姚牛父也感君活牛故來謝恩遂滅不見令身感冥事在官數年多惠於民幽明録白鹿山荊門山臨江皆絶壁峭峙五百餘丈亘帶激流禽獸所不能履此岸有一白鹿浮過江行人競逐之謂至山下必得之鹿忽飛超踰岡而去故名此壁白鹿山袁嵩白鹿山詩序伍襲字世公丁父憂盧墓側有一鹿每襲哭輒依墳而悲鳴蕭廣濟孝子傳丁茂字仲盧交址人也至孝母終負土治家列植松柏白鹿遊乎左右廣州先賢傳唐頌字德雅番禺人遭喪六年廬於墓次白鹿拾食冢邊上孫法宗每麕鹿觸網必解放之償以錢物後忽苦頭瘡夜有女人至云我是天使來相謝行瘡本不關善人使者遠相及取牛糞煮傅之即驗一傅便差一境賴之南史梁吉士瞻夢得一積鹿皮從而數之有十一領及覺喜曰鹿者祿也吾當居十一祿乎自其仕進所歷已久及除西陽武昌二郡太守心惡之遇疾不肯療普通七年卒於郡南史會稽孔祐至行通神隱於四明山谷中有數百斛錢視之如瓦石不異采樵者競取入手即成沙礫曾有鹿中箭來投祐祐為之養療愈然後去上天監中有邵文立者世以烹屠為業嘗欲殺一鹿鹿跪而流淚以為不祥鹿懷一麑尋當産育就庖衰切同被刳割因患疾乃深自悔責舍宅為伽藍小莊嚴寺是也梁京寺記真山在毗陵梁時有村人韓文秀見一鹿産一女子在地遂收養之既長與凡女有異遂為女冠梁武帝為別立一觀號曰鹿娘死後入棺武帝致祭但聞異香不見骸骨蓋尸解也遂葬棺于毗陵因號其葬處為真山述異記津陽門詩長生鹿瘦銅牌垂注上嘗於芙蓉園獲白鹿惟王昊山人識之曰晉時鹿也上異之令左右周視之乃於角際雪毛中得銅牌子刻之曰宜春苑中白鹿上由是愈愛之移于北山字之曰山客宣室志作張果詩漢武鹿唐玄宗幸溫泉見白鹿升天改會昌為昭應縣會昌解頤會昌新豐也唐京師安國寺什元康貞觀中遊學京邑有彭田之譽先居山野見一鹿角分八岐厥形絶異撫而馴伏遂豢養之乘而致遠曾無倦色以三論之文荷之於背又以小軸係之于尾曳入上都意為戲弄人皆駭觀焉宋高僧傳禇無量丁母憂解職廬於墓側其所植松柏時有鹿犯之無量泣而言曰山中衆草不少何忍犯吾先瑩樹哉因通夕守護俄有群鹿馴押不復侵害無量因此終身不食鹿肉唐書正元八年正月鄂州觀察使何士幹獻白鹿上曰朕初即位即上祥瑞士幹致白鹿其謂我何還之彼當慚懼留之遠近復獻竟不視遂放於苑中焉唐會毛斑如畫虞部郎中陸紹弟為盧氏縣尉常觀獵人獵忽遇鹿五六頭臨澗見人不驚毛斑如畫陸怪獵人不射問之獵者言此仙鹿也射之不能傷且復不利陸不信強之獵者不得已一發矢鹿帶箭而去及返射者墜崖折左足蹄下貫環胡珦為虢州時獵人殺得鹿重一百八十斤蹄下貫銅環上有篆字博物者不能識酉陽雜俎唐寶曆中范陽節度使朱克融獵得一鹿鹿膽中得珠如彈丸黑色初軟後硬如石光明克融以為已瑞或問麻安石曰是何祥也安石曰此事自古未有請以意推之鹿者祿也鹿死是祿盡也珠初軟後硬是珠變也祿盡珠變必有變易之事衰亡之兆也自此克融言詞輕發是年五月帳下軍亂而全家被殺祥驗集人語開寶七年金陵苑圃中鹿忽一旦人語牧者叱之鹿亦叱牧者曰明年今日汝等俱作鬼物苑囿荒涼焉能拘我明年宋師渡江牧者俱死鬭敵苑囿亦廢矣金陵志遊牝江陵松滋枝江村射鹿者率以淘河烏脛骨為管以鹿心上脂膜作簧吹作鹿聲有大號小號呦呦之異或作麀鹿聲則麚鹿畢集蓋為牝聲所誘人得轂矢而注之南中多鹿每一牡管牝百類至春羸瘦蓋遊牝多也及夏則唯食昌蒲一味却肥當角鮮之時其茸甚痛獵人逢之其鹿不敢逆走伏而不動獵者以繩繫其茸截而取之先以其血來噉然後殺之鹿何其苦也與夫狨麝孔雀以有用賈害良可愍之北夢瑣言麋千百為群掘食草根其處成泥名曰麋畯民隨此畯種稻不耕而穫其收百倍博物記鹿者仙獸常自能樂性從其雲泉至六十年必懷瓊于角下角有班痕紫色如點行或有涎出于口不復能急走矣天玄主物簿佛書謂鹿為伊尼山谷詩照灘行郭索焚野得伊尼般若經世尊三十二相第八相名㕠腨纖圖如延鹿王一云密利伽羅翻譯名義胡居士嘗言鹿性驚烈多別良草食九物餘則不嘗九草者一曰葛葉及花鹿藥白蒿水芹甘草齊頭蒿山耳薺苨也享神用其肉者以其性烈清淨也凡餌藥者勿食鹿肉以鹿常啖解毒之草也山谷蜀郡頤慕山山有穴如慕之口故名高七百二十丈崖岩直峭有平地百餘步坦然方正諸山之鹿一日一聚其中號曰鹿市圖經雲南郡出茶首其音為蔡茂是兩頭鹿名也獸是鹿兩頭其腹中胎常以四月中取可以治蛇虺毒永昌亦有之博物志雲南郡有熊倉山上有神鹿一身兩頭主食毒草名之食毒鹿魏宏南中志武陵郡西有山山有獸如鹿前後有頭常以一頭食一頭行山中時有見之者盛弘之荊州記戟食鐵之獸射噬毒之鹿蜀都賦鹿夜臨宿下鹿角寨大者角而外四圍小者在中團圍如寨今人以木倣作鹿角寨瑣碎録江同祖過郢州京山脫抵村驛驛人言鹿在前結寨即出觀之彌望可數里巨鹿無數四環成圍以角外向凡數十重兩麑塵處中勃跳嬉戲民田相近者悉遭蹂踐禾苗為之一空獵戶雜沓其傍云不可近近輒觸遭之者多死明旦始引去獵人操弓矢戈矛追隨之伺巨者行前稍遠乃敢捕射其稚弱亦各有所獲而還夷堅支丙字統云粗驚防也鹿之性相背而食慮人獸之害也旅行麗旅行也鹿之性見食急則必旅行禮麗皮納聘蓋鹿皮也說文嵊縣剡山一名鹿胎山昔有獵士陳惠度射鹿此山鹿孕而傷既産以舌䑛子乾而母死惠度遂投寺為僧後鹿死處生草名曰鹿胎草浙江志會稽記上虞蘭室山葛玄所隱之處有隱几化為鹿鹿鳴即縣令有罪獨異志張掖南山一名天山一名雪山出赤鹿足短而形大如牛肉千斤寰宇記馬鹿陶隱居云古稱馬之似鹿者直百金今荊楚之地其鹿絶似馬當解角時望之無辨土人謂之馬鹿以是知趙高指鹿為馬蓋以類耳爾雅翼鹿形似馬而迅於馬豺形似犬而健於犬國有千金之馬而無千金之鹿家有千金之犬而無千金之豺以犬馬有用而豺鹿無用也劉子䑛鹹遼穆宗應曆十一年夏射䑛鹹鹿于玉山遊幸表性嗜鹹灑𨢑于地以誘鹿射之國語解䑛作舔名苑曰鹿之大者為麈群鹿隨之皆視麈所往以尾所轉為準故名談者揮焉其尾辟塵以置於蒨帛中能令歲久經色不黦以之拂氈令氈不蠹恩平郡譜云沈牛謂之回沙牛謂之磨麈謂之荒鹿謂之擢無魂麞鹿無魂白瞻善怖道書麋茸麋茸補陽鹿茸補陰瑣碎録為脯麝鹿非辰屬八卦無主故道家聽許為脯陶氏書黠獸山澤之獸無黠於麋麋知獵者張綱前而驅已也固還走而冒人至數獵者知其詐僞舉綱而進之麋因得矣楚策海陵沿海洲上蘆葦無際群麋馬大迅走人欲捕之雖麑不獲蓋常兩兩並負其子而行太州志西北之麝噬虺而食柏故其香結東南山溪有松而無柏故麝不結也趙辟公雜說商汝山中多麝絶愛其臍每為人所逐勢且急即自投高岩舉瓜裂出其香就繫而死猶拱四足以固其臍李商隱詩云投岩麝退香羊祥也象頭角足尾之形孔子曰牛羊之字以形舉也羊在六畜主給膳也羊大則美故從大羸瘦也羊以瘦為病羔羊子也咩羊鳴也𥧲羊臭也說文說文云達小羊也薛綜答韋昭曰羊子初生達小名羔未成羊曰羜大曰羊長幼之異名詩生民疏大羊為羬六尺尸子小羊曰𦏗集韻柔毛凡祭祀宗廟之禮羊曰柔毛曲禮美鬚主簿羊一名髯鬚主簿古今注羊而不角曰羖羊一名胡鬚郎又名青鳥蛟羊似羊而無角啖之毒羊贄凡贄卿用羔羔有角而不用如好仁者執之不鳴殺之不謗類死義者羔飲其母必跪類知禮者羊之為言猶祥故以為贄春秋繁露譙周法訓曰羊有跪乳之禮雞有識時之候鴈有庠序之儀人取法焉鄭氏婚禮謁文讚曰群而不黨跪乳有敬禮以為贄吉事之宜六飛有人黃頭大腹出天齊政三百四歲春秋命歷序神次之號曰皇神出淮駕六飛羊政三百歲五葉千五百歲周成王時東夷進六角羊周厲王元年外國貢三角羊述異記犬戌朝天子于雷首之河乃獻良馬四駟天子使孔牙受之曰雷水之中爰有黑牛面角黑羊白血也穆天子傳齊攻魯魯使柳下惠于齊齊侯曰魯君將懼乎柳下惠曰齊魯之初封也相與出周南門刳羊而約曰自後子孫敢有相攻者令其罪若此刳羊矣臣之君固以刳羊不懼矣齊侯乃解兵三百里說苑昔有攘羊者以羊頭遺晉叔向向母埋之不食後三年攘羊事發追捕向家檢羊骨肉都盡唯有舌在國人異之遂以羊舌為氏魯定公會晉師于瓦范獻子執羔中行文子趙簡子皆執鴈魯於是始尚羔魯以前同贄始知執羔之貴魯侯時欲以孔子為司徒將召三桓而議之左丘明曰周人有愛裘而好珍羞欲為千金之裘而與狐謀其皮欲具少牢之珍而與羊謀其羞言未卒狐相率逃於重丘之下羊相呼藏于深林之中故周人之謀失之矣今君欲以孔子為司徒召三桓而謀之亦與狐謀裘與羊謀羞哉符子土怪季柏子穿井獲如土𣥸其中有羊焉使問仲尼曰吾穿井得羊何也對曰以某所聞非羊也木石之怪夔魍魎水之怪龍罔象土之怪羵羊也家語魯衰公使人穿井三月不得泉得一生羊焉公使祝鼓舞之欲上於天羊不能上孔子見曰水之精為玉土之精為羊此羊肝土也公使殺羊視肝即土韓詩外傳問仲尼曰穿井獲狗何也仲尼曰以某所聞羊也搜神記晉文種菜曾子植羊非性暗蠢不辦方隅以其運大不習小務也劉子觀量篇謂銼羊皮用土種之也注齊莊公之臣王國卑與中里檄者訟三年而獄不斷恐失有罪使二人共一羊盟齊之社二子相從以羊血灑社讀王國卑之詞已盡中里檄之詞未半祭羊起而觸中里檄齊人以為神墨子隱於屠肆屠羊說楚人隱於屠肆昭王失國說往從王王反國欲將賞說說曰大王失國說失屠羊大王反國說亦屠羊臣之爵祿已復矣又何賞之有王使司馬子綦延之以三圭之位說曰願長反屠羊之肆耳遂不受高士傳魏文侯見宋陵子三仕不願文侯曰何貧乎曰王見楚富者牧羊九十九而願百嘗遊邑里故人其鄰人貧有一羊者富拜之曰吾羊九十九今君之一盈成我百則牧數足矣鄰者與之從此觀焉富者非富貧非貧也符子臧與穀二人相與牧羊而俱亡其羊問臧奚事則挾策讀書問穀奚事則博塞以遊二人事業不同其亡羊均也莊子楊朱見梁惠王言治天下如運諸掌王曰先生有一妻一妾而不能治三畝之園而不能耘言治天下何也曰君見夫牧羊者乎百羊為群使五尺童子荷箠而隨之欲東而東欲西而西使堯牽一羊舜荷箠而隨之則不能前也列子格虎張儀謂楚王曰夫為從者無異驅群羊而致生虎虎之與羊不格亦明矣今王不與虎而與羊臣竊以為大王之計過也春秋後語鄭太對董卓驅虎兕以赴犬羊將狼黥布反上病欲使太子將往擊之四皓說建成侯曰今諸將皆陛下故等夷乃令太子將此屬無異使羊將狼莫肯為用史記卜式牧百羊十餘年羊致千餘頭上曰吾有羊在上林欲令子牧之乃拜為郎式布衣屮蹻而牧羊歲餘羊肥息上過其羊所善之式曰非獨羊也治民亦猶是矣以時起居惡則輒去無令敗群上奇其言拜緱氏令漢書郡國志云吳房堂溪有白羊淵淵水舊出山羊漢武帝元封二年有白羊出此淵畜牧者禱祀之初出一羊婦人大驚拍手羊自此絶焉今欲生羊禁婦人拍手是效古也水經注同路溫舒巨鹿人父為里監門使溫舒牧羊溫舒取澤中蒲截以為牒編寫書漢書王育字伯春京兆人也少孤貧為人慵牧羊每過小學必歔欷流涕時有暇即折蒲學書忘而失羊為羊主所債育將鬻已以償之同郡郭子章聞而嘉之代育償羊給其衣食使與子同學遂博通經史子章以兄之子妻之皇初平年十五家使牧羊有道士見其良謹便將至金華山石室中四十餘年忽然不復念家其兄初起行索初平歷年不得後見市中有道士乃問之道士曰金華山中有牧羊兒姓皇字初平兄乃隨道士與初平相見語畢問羊何在在山東兄往視但見白石不見羊平曰羊在耳兄自不見平乃往叱之曰羊起於是白石皆起成羊數萬頭神仙傳南陽宗定伯夜行忽逢一鬼鬼問伯為誰伯欺之曰我亦鬼也遂為侶向宛行倦因相擔問鬼曰鬼何畏曰鬼唯不喜唾耳欲至宛便擔鬼著頭上詣宛市鬼化為羊伯恐其變遂唾之因賣得錢千五百買者將還繫之明旦見繩在時人語曰宗定伯賣鬼得錢千五百搜神記曹公收左慈慈走入群羊中失慈之所在追者疑化為羊乃令人數羊羊本千口揀之長一口知果化為羊乃謂曰若是左公者但出無苦也有一羊跪云遽如許追者欲執之於是群羊皆跪曰遽如許追者乃去仙傳武帝平吳後多內寵莫知所適嘗乘羊車恣其所之至便宴寢宮人乃取竹葉插戶以鹽汁灑地而引帝車胡貴嬪芳最蒙愛幸殆有專房之寵晉后妃傳宋文帝好乘羊車經諸房潘淑妃每粧飾褰帷以候并密令左右以鹽水灑地帝每至戶羊輒䑛地不去帝曰羊乃為汝徘徊况于人乎以此愛傾后宮南史后妃傳劉毅奉羊琇乘羊車請免官詔曰羊雖無制非素乘者可如其奏太元起居注張華少孤貧自牧羊同郡盧欽見而器之鄉人劉放亦奇其才以女妻焉晉書桓彝亡後子冲兄弟并少家貧母患須羊以解無由得之溫乃以冲為質羊主甚富言不欲為質幸為養買得郎買得郎冲小字也及冲為江州出射羊主于堂邊看冲識之曰我買得也遂厚報之石虎嘗晝寢夢見群羊負魚從東北來寤以訪浮圖證證曰不祥也鮮卑其有中原乎慕容氏後果都之高僧傳顧霈者吳之豪士送客於升平亭時有一沙門在坐是流俗道人主當欲殺羊羊繩斷便走來入此道人膝中穿頭入袈裟下道人不能救即將去而殺之既行炙主人先割以啖道人道人食炙下喉炙便自走行道人皮中痛毒不可忍呼醫來針之以數針貫之炙猶動搖乃破出之故是一臠肉耳道人於是得病作羊鳴吐沫還寺少時便死續搜神記王克為永嘉郡守有人餉羊集賓欲宴而羊繩解來投一客先跪兩拜便入衣中此客竟不言之固無救請須臾宰羊為炙先行至客一臠入口便下皮內周行遍體痛楚號叫方復說之遂作羊鳴而死顏氏家訓吳興俞亮以永明八年補護軍府吏於長眠處聞有羊聲疑為神怪竊於戶窺之見其床下有一羊可高二尺毛色若丹光耀滿室續異記京兆許超夢盜羊入獄問於楊元慎曰君當得陽城令其後有功封陽城侯伽藍記隋大業中長安趙文若嘗因使暫憩驛廳上夢一青衣婦女乞命甚急文若驚寤問之乃驛長將殺青㹀羊相待也即贖放之冥祥記王君破吐蕃於青海西張說策其且敗因上巂州鬪羊於帝以申諷諭曰使羊能言必將曰鬭而不解立有死者所賴至仁無茂量力取歡焉帝識其意納之賜綵千匹西舍利凡曲名十有二五曰鬭羊勝驃云來乃昔有人見二羊鬭海岸強者則見弱者入山時人謂之來乃來乃者勝勢也開元末有人好食羊頭者嘗晨出有怪在門焉羊頭人身怪衣冠甚偉告其人曰吾未之神也其屬在羊吾以汝好食羊頭故來告汝輟食則已若不爾吾將殺汝其人大懼遂不復食紀聞邠公杜悰福壽少倫日食五飧一食之費皆至萬錢京西李客見人牧羊遍滿山谷不知幾千萬口詰之自何而來自鄜夏供相公食耳指顧之際轉首恍然並無所覩乃神靈所授也中朝故事李德裕為太子少保分司東都嘗召一僧問已之休咎僧曰公災當南行萬里公曰南去遂不還乎僧曰當還耳公究其事對曰相國平生當食萬羊今食九千五百矣所以當還者未盡五百羊耳公慘然而嘆曰吾師果至人且我元和十三年為丞相張公從事於北都嘗夢行晉山見山上盡目皆羊有牧羊者十數迎拜我因問牧羊者牧者曰此侍御平生所食羊吾嘗識此夢不泄於人今者果如師之說耶後旬餘振武節度使朱塈遣使至書於公且饋四百羊公大驚即召僧告其事僧嘆曰萬羊將滿公其不還乎公曰吾不食之亦可免耶曰羊至此已為相國所有公戚然不悅旬日貶潮州司馬連貶崖州司戶竟沒於荒裔補録紀傳宣室志一品集冥數論云余嘗三遇異人非卜祝之流惟再謫南服未嘗有前知者則萬革之說疑即杜公事而宣室志等傳聞之誤耳王處存以輕兵三千蒙羊皮夜布之野李全忠軍望為群羊爭趍之李茂勳傳薛昭緯經巢賊亂流離絶糧遇舊識銀工延昭緯飲食甚豐以詩謝之曰一楪氈根數十皴盤中猶更有紅鱗早知文字多辛苦悔不當初學治銀南楚新聞黃載字元吉精究經史遂不復進取肄業之士多從之諸生醵會市羊以備饌載夢一羊前跪請命晨出見羊跪伏如所夢載以已緡償諸生而畜其羊又畜一犬亦頗馴出入則羊犬聯隨潭倅夏中正為作犬羊仙序以記其事南唐書寧州真寧縣有牽羊教化者其羊胸前有右手抱胸如人手有六指甲如羊頗長皆言前身為人因過惡致此縣令張元弼疑之主簿尹良臣曰此無他人與羊交耳衆人皆伏北窗記異梁氏志云馮翊朝邑縣許原下地有苦泉水味鹹苦羊飲之肥而肉美今於泉側置羊牧因相傳渭沙苑細肋羊諺曰苦泉羊洛水漿寰宇記元和郡圖縣志龍魚河圖曰羊有一角食之殺人白澤圖曰羊有一角當頂上龍也殺之震死僧玄裝至西域大雪山高嶺上有一村養羊大如驢酉陽拂林國有羊羔生于土中其國人候其欲萌乃築垣以環之防外獸所食然其臍連地割之絶則死惟人著甲走馬擊鼓駭之其羔驚鳴而臍絶因逐水草以一二百口為群舊唐大尾月氏有羊尾重十斤稍割以供食尋生如故宋膺異物志康居出大尾羊尾上旁廣重十斤酉陽忽魯謨斯國有靈羊尾大者重二十斤行則以車載羊大食勿斯離國産胡羊高三尺餘其尾如扇每歲春時割取脂二十餘斤再縫合仍生不取則脹死又莊浪有叨羊土人歲取其脂非久復滿腹羊有二種不可食毛長而黑壯者曰骨䍽白而有角者曰古羊皆羶臭發病羊之大者不過五十斤奚中所産者百餘斤膳夫録龍羊出吐蕃及蜀威茂州形似畜羊而大其角繚上重八九兩黑質而白文帶以為帶胯其用亂犀宋祁益州方物贊青羊千歲之樹精為青羊玄中記罽賓國出野青羊如翠色土人食之酉陽忽魯謨斯國羊有四種大尾綿羊重七八十斤其尾闊一尺餘拖地重二十斤狗尾羊如山羊尾長二尺餘閗羊高二尺七八寸前截毛長拖地後半皆剪淨頗頗似綿羊角彎向前上帶小鐵牌好鬭好事者養之賭博為戲瀛羊勝覽毛短如犬阿丹國綿羊白毛無角於角處有兩搭圓黑甚異其項下如黃牛袋毛短如犬尾大如盤上故十仞之城樓季弗能踰者峭也千仞之山跛牂易牧者夷也故明王峭其法而嚴其刑也韓子五蠹李斯對二世書曰城高五丈而樓季不輕犯也太山之高百仞而跛牂牧其上夫樓季也而難五丈之量豈跛牂而易百仞之高哉峭塹之勢異也史記五角蜀復山郡有五角羊後書觥羊觥羊之毅鳴不類太玄觥羊大羊也或曰有人焉自姓孔而字仲尼入其門升其堂伏其几襲其裳則可謂仲尼乎曰其文是也其質非也敢問質曰羊質而虎皮見草而說見豺而戰忘其皮之虎也楊子吾子卞彬為禽獸決録目禽獸云羊性淫而佷猪性卑而率鵝性頑而傲狗性險而出皆指斥貴勢其羊淫佷謂呂文顯猪卑率謂朱隆之鵝頑傲謂潘敞狗險出謂文度其險詣如此皂莢江東謂羖羊角為皂莢南史陳紀融鐵鑄鐵不銷以羊頭骨灰致之乃消融也物類相感志萬壽年中長安百姓李審言忽得病如狂須與羊同食家人無以止求醫不效後忽西走近將百里路傍遇群羊遽走入其內逐之者方至審言已作為一大羊於衆中不能辨認及家人齊至泣而擇之其一大羊乃自語曰將我歸慎勿殺我我為羊快樂人何以比遂將歸飼養以終天年瀟湘録犬狗之有懸蹄者也孔子曰視犬之字如畫狗也狗叩也叩氣吠以守也說文龐犬多毛也猲短喙犬也㺌犬吠不止也獒犬如人心可使也㹞健犬也狄赤犬也狡少狗也胸如地有狡犬巨口而黑身獿獀南越名犬也上獹韓良犬也㹱鵲宋良犬也𤜵逐虎犬也呂忱字林守犬為獖隴西以犬為猶㺜㲰皆多毛犬也獟猘也䂏屈尾犬也何承天纂文狗有懸蹄短尾之號殷虞晉獒並犬名也廣雅昔高辛氏有犬戎之帝募有能得其將吳將軍搜神作吳將軍玄中記作犬戎頭者厚賞之妻以少女時帝有畜狗其毛五采名曰槃瓠下令亡三月以其首來帝乃以女配之槃瓠負女而走入南山止石室中經三年生六男六女槃瓠死後因自相夫妻其母後歸以狀白帝於是使迎致諸子賜以名山廣澤其後滋蔓號曰蠻夷今長沙武陵蠻是也後漢高辛氏有老婦居王室得耳疾挑之乃得物大如繭婦人盛瓠中覆之以槃俄項化為丈其文五色因名槃瓠魏略武溪山高可萬仞半有槃瓠石窟可容數萬人窟中有石似狗形蠻俗相傳即槃瓠也武陵記每歲七月二十五日種類四集於廟扶老攜幼環宿其旁凡五日祠以牛彘酒鮓椎歌歡飲即還惟不用犬云辰陽風土記少康逐犬而顛隕厥首言夏后少康因田獵放犬逐獸遂襲殺澆而斷其頭楚詞湯四方獻令伊尹請正南以矩狗為獻孔氏曰矩狗狗之善也鼩犬周成王時渠搜國獻鼩一作鼩犬鼩犬者露犬也能飛食虎豹周書王會執虎豹天子之狗走百里執虎豹穆天子傳龍狗天子東征以行流沙天子之豪牛豪馬龍狗豪羊上注龍龍茸謂猛狗或曰龍亦狗名徐君宮人妊娠而産卵以為不祥棄於水濱孤獨老母有犬名鵠蒼獵於水濱得所棄卵銜以來歸獨母以為異覆暖之遂𧉸蝍成小兒生時正偃故以為名徐君宮中聞之乃更録取收養長而仁智襲君徐國後鵠蒼臨死更生角而九尾實黃龍也偃王葬之徐梁界中今名狗壟鵠蒼或名后蒼偃王志博物志晉侯飲趙盾酒伏甲將攻之其右提彌明知之趨登曰臣侍君宴過三爵非禮也遂扶以下公嗾夫獓焉明摶而殺之盾曰棄人用犬雖猛何為鬪且出左宣二靈公食趙盾公曰聞子之劍蓋利劍也子以示我我將觀焉盾起將進劍祁彌明自下呼之曰盾食飽則出何故拔劍於君所盾知之躇階而走公有周狗謂之獒呼而屬之獒亦躇階而從之彌明逆而踆之絶其頷趙盾顧曰君之獒不若臣之獒也公羊注躇猶超遽周狗可以比周之狗所指如意踆以足逆踏之瘈狗宋國人逐瘈狗瘈狗入於華臣氏國人從之臣懼遂奔陳左襄十七鄭子陽剛毅而好罰其於罰也執而無赦舍人有折弓者畏罪而恐誅則因狾狗之驚以殺子陽此剛猛之所致也淮南汜論荊文王得茹黃之狗宛路之矰以畋雲夢三月不返得舟之姬期年不朝葆申束細箭五十跪而加之王背出而自沉於淵荊王乃殺茹黃狗折矰放舟之姬呂覽秦伯有齧犬弟針欲請之秦伯不與針以百兩金易之又不聽因逐針而奪其爵昭元事兄有噬犬弟何欲易之以百兩卒無祿楚詞叔孫婼如晉晉人執之館諸箕吏人之與叔孫居於箕者請其吠狗弗與及將歸殺而與之食之叔孫所館者雖一日必葺其牆屋去之如始至昭二十三文種過范蠡之門蠡于狗洞作狗吠文種曰狗當吠人蠡乃以我為人回車至其門入內而拜薦為越相劉子知人篇曰范蠡于犬竇文種聞而拜之景公走狗死命外供之棺內給祭晏子諫公曰亦細物也特與左右為笑耳晏子曰孤老凍餒而死狗有祭鰥寡不恤而死狗有棺行辟若此百姓聞之必怨吾君諸侯聞之必輕吾國而乃以為細物君其圖之公曰善趨庖治狗以會朝屬晏子春秋蓋埋仲尼之畜狗死使子貢埋之曰吾聞之弊帷不棄為理馬也弊蓋不棄為埋狗也丘也貧無蓋於其封也亦與之席無使其首陷焉檀弓吳徵會于衛子木曰長木之弊無不摽也國狗之瘈無不笑也而况大國乎哀十三介鬭閭里有狗宋人之駑狗也其家命之為淖逐狗不及止而望之自以為過矣莊子齊欲伐魏淳于髡謂齊王曰韓子盧者天子之壯犬也東郭者海內之狡兔也韓子盧逐東郭環山者三騰山者五兔極于前犬疲於後犬兔俱罷各死其處田父見而獲之無勞倦之苦而擅其功今齊魏相持頓兵弊衆臣恐強秦大楚承其後而有田父之功也戰國策騏驥長鳴伯樂昭其能盧狗悲號韓國知其才曹子建求自試表昔韓盧之取兔也上觀下獲不甚多殺願次卿少緩誅罰思行此術張敞與嚴延年書嚴尤謂陳茂曰是猶紲韓盧而貴之獲也莽傳客謂孟嘗君臣聞周氏之嚳韓氏之盧天下疾狗也見兔而指屬則無失兔矣望見而放狗也則纍世不能得兔矣狗非不能屬之者罪也說苑楊朱之弟曰布衣素衣而出天雨解素衣布衣而反其狗迎而吠楊布怒將朴狗楊朱曰子無朴矣向者使汝狗白而往黑而來豈能無怪哉列子貂勃常惡田單於朝單召而問之貂曰勃然跖之狗可使吠堯非貴跖而賤堯狗自吠非其主者且公孫子賢而徐子不肖然而公孫子與徐子鬪徐子之狗攫公孫子之腓而噬之哉單乃任貂勃於王春秋後語高祖詔齊捕蒯通通至上曰若何教淮陰侯反對曰然跖之狗吠堯堯非不仁狗故吠非其主史記齊有善相狗者其鄰籍之買鼠狗期年而得曰良狗也其鄰畜之數年不噉鼠以告相者曰此志在麞麋豕鹿不在鼠欲其鼠也則相之其鄰桎其後足則狗取鼠呂氏春秋徐無鬼曰嘗語君吾相狗也下之質執飽而止是狸德也中之質若視日上之質若亡其一莊子齊有貧者命其狗為富命其子為樂方將祭狗入於室叱之曰富出祝曰不祥家有禍長子死哭之曰樂乎而不自悲也尸子康衢長者字僮曰善搏字犬曰善噬賓客不過其門三年長者怪而問之以實對於是改之賓客復往尹文子呂后七年三月中祓還過軹道見物如蒼犬據后掖忽弗復見卜之云趙王如意為祟后遂病掖傷崩史記生角文帝後五年齊雍城門外有狗生角京房易傳曰執政失下將害之厥妖狗生角君子茍免小人陷之厥妖狗生角漢五行志天狗下梁而荊楚攻梁狗生角於齊而三國圍齊青骹楊萬年有獵狗名青骹直百金西京雜記茂陵少年李亭好馳逐鷹犬皆制佳名狗則有修毫釐睫白望青曹之號上與人鬪成帝河平元年長安男子石良劉音相與同居有如人狀在其室中擊之為狗走出去後有數人被甲持弓弩至石家良等格擊或死或傷皆狗也自二月至六月乃止其於洪範皆犬禍也漢五行志占仲子婢死有女四歲數來撫循亦能為沐頭浣濯甚令人惡之道士云其家青狗為之殺之便止楊仲文亦言能知家嫗死未葬忽起飲食醉后而坐祭床上如此三四家益厭苦其後醉形露壞垣得老狗便行打死之推問乃里頭沽家狗桓談新論搜神記以李德事同桂陽太守汝南韋叔堅少時為從事其家狗忽人立而行家中皆請殺之叔堅云犬馬喻君子狗見人行行效之何傷叔堅為縣令還解冠榻上狗戴持走家人驚愕復云誤觸冠冠纓挂著耳狗尋于竈前畜火家益驚愕叔堅曰兒輩皆在田中狗助畜火幸可不煩鄰里亦何所惡也遂不肯殺後數日狗自暴死卒無纖芥之異叔堅至太尉終於位風俗通靈帝熹平四年於西園弄狗著進賢冠帶綬以為笑樂有一狗突出走入司徒府門或見之者莫不驚怪配人光和四年又於西園弄狗以配人袁山松書漢末富春有桑君者養犬數年不吠孫文臺微時經此犬忽吠之桑謂文臺曰君其異相乎及貴欲報桑無所好惟好張簞捕魚文臺為作九里簞以贈之文臺堅字也郡國志上屋公孫淵未亡家數有怪犬冠幘絳衣上屋魏志雍闓欲絳魏說夷曰官欲得烏狗三百頭膺前盡黑蟎腦三㪷斫木溝三丈者三千枚汝能得不夷皆從闓華陽國志孫權時李信純襄陽紀南人也家養一犬字曰黑龍愛之尤甚行坐相隨飲饌之間皆分與食忽一日於城外飲酒大醉歸家不及臥於草中時遇太守鄭瑕出獵見田草深遣人縱火爇之信純臥處恰當順風犬見火來乃以口拽純衣純亦不動臥處比有一溪相去三五十步犬即奔往入水濕身走來臥處周回以身濕之獲免主人大難犬運水困乏致斃於側俄爾信純醒來見犬已死遍身毛濕甚訝其事周回覩火蹤跡因爾慟哭聞於太守太守憫之曰犬之報恩甚於人人不知恩豈如犬乎即命具棺槨衣衾葬之今紀南有義犬冢高十餘丈搜神記太和中廣陵人楊生養狗甚憐愛之行止與俱後生飲酒醉行大澤草中眠不能動時冬月野火起風又猛狗周章號喚生醉不覺前有一坑水狗便走往水中還以身灑生左右草沾水得著地火尋過去生醒方見之他日又暗行墮空井中狗呻吟徹曉須臾有人過怪之就視見生生曰君可出我當厚報君人曰以此狗見與便當相出生曰此狗曾活我於已死不得相與餘即無惜人曰若爾便不相出狗因下頭目井生知其意乃語路人以狗相與人乃出之繫狗而去後五日狗夜走歸續搜神記王姥黃龍中九歲病死自朝至暮復蘇云見一老嫗挾將飛見北斗君有狗如獅子大深目伏井欄中云此天公狗也幽明録丁謐為尚書多所忽略雖與何晏鄧揚同位而皆少之惟以勢屈于爽爽亦敬之言無不從故于時謗書謂臺中有三狗二狗崖柴不可當一狗憑默作疽囊三狗謂何鄧丁也默者爽小字也言三狗皆欲嚙而謐尤甚魏略類聚作啀喍事類賦作睚眥孫峻與亮謀誅諸葛恪恪將見之夜精爽擾動通夕不寐嚴畢趨出犬銜引其衣恪曰犬不欲我行乎還坐頃刻乃復起犬又銜其衣恪令從者逐犬遂升車被殺吳志陸機少時頗好遊獵在吳豪盛客獻快犬名曰黃耳機後仕洛常將自隨此犬黠慧能解人語又常借人三百里外犬識路自還一日至家機羈旅京師久無家問機戲語犬曰我家絶無書信汝能賫書馳還取消息否犬喜搖尾作聲應之機試為書盛以竹筒繫之犬頸犬出驛路疾走向吳入草噬肉取飽每經大水輒依渡者弭毛掉尾向之其人憐愛因呼上船載近岸犬即騰上速去如飛徑至機家口銜竹筒作聲示人機家開筒取書看畢犬又向人作聲如有所求其家作答書內竹筒中復繫犬頸犬既得答仍馳還洛計人行程五旬而犬往還裁半月後犬死殯之遣送還家葬機村南去機家二百步築土為墳村人呼為黃耳塜述異記犬名黃耳崔豹古今注太康七年郊天壇下有白狗高三尺光色鮮明恆臥見人則去魏晉俗語元康中婁縣瑤懷家忽聞池中有犬聲視之得犬子雌雄各一長老云此名犀犬得之者富搜神記晉志云經宿失所在的尾晉大興二年吳人華隆好獵養一快犬號曰的尾常時自隨隆後至江邊伐荻犬暫出渚次隆為大蛇圍繞周身犬還便咋蛇蛇死隆僵無所知犬倣徨涕泣走還船復反草中同伴怪所以隨往見隆悶絶將歸家二日犬為不食隆復蘇乃始進飯隆愈愛惜同於親戚幽明地狼大興四年廬江灊縣何旭家忽聞地中有犬子聲掘之得一母犬青釐色狀甚羸瘦走入草中不知所在視其處有二犬子一雄一雌哺而養之雌死雄活及長為犬善噬野獸其後旭里中為蠻所沒晉五行志地中有犬名曰地狼尸子掘地得犬名曰賈夏鼎志會稽張然滯役有少婦無子唯與一奴守舍奴遂與婦通然素養一狗名烏龍常自隨婦奴欲謀殺然盛作飯食婦語然與君當大別離君可彊噉奴已張弓拔刀須然食畢然涕泣不能食以肉及飯擲狗祝曰食汝經年吾當將死汝能救我否狗得食不噉唯注睛視奴然拍膝大喚曰烏龍犬應聲傷奴奴失刀伏倒地狗咋奴頭然因取刀斬奴以婦付官殺之搜神記韋善俊挾一犬號烏龍後化龍乘之飛升而去續仙傳飛燕符堅時賊帥張平有狗名飛燕形若小驢搜神記安帝義熙年譙縣崔仲文與會稽石和俱為劉撫君吏仲文養一犬以獵麋鹿無不得也和甚愛之乃以丁奴易之仲文不與和及仲文入山獵至草中殺仲文欲取其犬犬齧和守其主尸爬地覆之後諸軍出獵見犬守尸人識其主因還啓劉撫軍石和假還至府門犬便往牽衣號吠人復白撫軍曰此人必殺犬主因録之撫軍栲問果得其實遂殺石和廣古今五行記張天錫在涼州夢一緑色犬甚長從南來欲咋天鍚林上避之乃墮地后苻堅遣茍萇著緑地錦袍從南來攻未入門大破之李産集異傳嘉興縣朱休之有一弟宋元嘉中兄弟對坐家有一犬來向休之蹲遍視二人遂搖頭而笑曰言我不能歌聽我歌梅花今年故復可奈汝明年何其家驚懼斬犬榜首路側至來歲梅花時兄弟相鬪並被囚係經歲得免至夏舉家時疾兄及弟皆死述異記宋袁粲父子以舉兵為齊所害有小兒數歲乳母將投粲門生狄靈慶靈慶遂抱以首乳母號泣呼天曰公昔于汝有恩故冒難歸汝奈何欲殺郎君以求小利若天神有知我見汝滅門此兒死後靈慶常見兒騎大㲰狗戲如平常經年餘鬪場忽見一狗走入其家遇靈慶于庭噬殺之少時妻子皆沒此狗即袁郎所常騎也南史廣古今記其妻子併死于狗陶弘景云裴真君好養白犬白雞犬名白靈雞名白精學道之士或居山林此可以辟邪北齊徐之才與朝士出遊遙望群犬競走諸人令目之之才厲聲曰為是宋鵲為是韓盧為逐李斯東走為負帝女南徂本傳南陽王綽始十餘歲留守晉陽愛波斯狗尉破胡諫之歘然研殺數狗狼籍在地破胡驚走不敢復言後在定州有婦人抱兒在路走避入草綽奪其兒飼波斯狗婦人號哭綽怒又縱狗使食狗不食塗以兒血乃食焉北齊齊高緯以波斯狗為赤虎儀同逍遙郡君飼以梁肉食縣邑常於馬上設蹬褥以抱之三國典略高思反與諸貴書云駮龍得儀同之號逍遙受郡君之名犬馬班位榮冠軒冕北史後主時為開府儀同雌者有夫人郡君之號隋五行志北齊廣寧王孝珩嘗畜一犬守外人不得趨近孝珩每射令其取箭亦解呼召左右牽衣而進三國典略還家犬吠徐勉為侍中時師方侵魏候驛填委勉參軍動經數旬一還家群犬驚吠勉曰吾憂國忘家乃至於此吾亡後亦是傳中一事也梁傳抱犬義陽朱詹好學家貧纍日不爨乃時吞紙以實腹寒無氈被抱犬而臥犬亦饑虛起行盜食呼之不至哀聲動鄰猶不廢業卒成學士為孝元所禮顏氏家訓張彪敗後與妻楊氏去唯常養一犬名黃蒼在彪前後未曾捨離乃還入若邪山中沈泰說陳文帝遣章昭達領千兵重購之並圖其妻彪眠未覺黃蒼驚吠劫來便嚙一人中喉即死及彪被害黃蒼號叫彪尸側宛轉血中若有哀狀昭達殯彪喪墳冢既畢黃蒼又俯伏冢間號叫不肯離南史張元性仁孝幼時村陌有狗子為人所棄者元見即收而養之其叔父怒曰何用此為將更棄之對曰有生之類莫不重其性命若天之生殺自然之理今為所棄而死非其道也是以收養之叔父感其言遂許焉未幾有狗母銜一死兔置元前而去後周書文帝時魏州四月八日立舍利塔有一黑狗耽耳白胸於舍利塔前舒左股屈右腳見人行道即起行道見人持齊亦即持齊非時與食不食唯欲得飲淨水至後日旦起解齊與粥始喫且寺內先有數箇猛狗但見一狼狗無不競來吠嚙若見此狗入寺悉皆低頭掉尾隋書唐武德中高昌王文泰獻狗雄雌各一高六寸長尺餘性甚慧能曳馬銜燭云本出拂䔉國中國有拂䔉狗自此始也舊唐通典武三思嘗與宗楚客兄弟紀處訥崔湜甘元東相驅煽王同皎周憬張仲之等不勝憤謀殺之為冉祖雍宋之遜李悛所白皆坐因逮染五王而崔湜遣周利貞就殺之時人號祖雍姚紹之等五人為三思五狗神龍時唐休景為相有門僧出言多中一日謂休景曰公有大禍不遠數月然可以禳之公懼而問計僧曰可於卑穴官中孤寒有才幹者用為曹州因得張君為之乃問所為僧曰張君赴部之時當令求二犬高數尺而神駿者張到郡即求得二犬高四尺獻之休璟大悅召僧視之僧曰極善育后旬日有二刺客為犬所嚙而斃宣室志宗楚客家畜一犬一日忽戴楚客冠人立楚客恕曰畜類敢作妖僣越犯分即殺之犬作人言曰公亦作妖僣越犯分亦即見殺未幾韋氏敗楚客被斬朝野僉載魏元忠嘗呼蒼頭未應犬輒代呼之元忠曰此孝順狗也乃能代我勞後亦無恙廣異記劉巨麟開元未為廣府都督在州恆養一丈雄徑多力犬至馴附有異於他巨麟常夜迎使犬忽遮護不欲令出巨麟亦悟曰犬不使我行耶徘徊良久人至白使近巨麟叱曰我行部從如雲寧有非意之事使家人關犬而出上馬之際犬亦隨之忽咋一從者喉中頃之死巨麟驚愕搜死者懷中得利七首初巨麟常鞭箠此僕故修其怨私欲報復而犬逆知之是以免難托異記裴令公度性好養犬凡所宿設燕會處悉領之所食物餘者便和碗與犬食時子壻李甲見之數諫裴公曰人與犬類何惡之甚犬正食見李諫乃棄食以目視李而去裴令曰此犬人性必讎於子竊慮之李以為戲言將欲午寢其犬乃蹲而向李李見之乃疑犬讎之犬見未寢又出其戶李見犬去後乃以巾櫛安枕多排衣服以被覆之其狀如人寢李乃藏於異處視之逡巡犬入其戶將謂李已睡乃跳上寢床當喉而嚙嚙訖知謬犬乃下床憤跳號吠而死集異記鄱陽人張朝為猛獸所摶噬其家犬名小狸救之獲免南部新書捧硯者裴至德家僮也其母曰春紅配騶人高璠而生一歲時有卑腳犬曰青花忽來噬兒陰食之至德有良藥封之愈明年夏青花復併兒外又食訖工以前藥傅之及愈為宦者焉字之曰捧硯委以內豎之職三水僖宗朝宰相王鐸所愛卑腳犬曰花鴨有刺官匿于梁上為犬所覺而免上吠雲杜光庭犬名吠雲可行萬里肖象寧德大學生黃嶽者乾寧中王審知節度武威軍纍辟不為動及審知據閩必欲起之嶽投淵而死其父母妻子二弟一白犬俱赴水死焉僞使者宗舒趙田四人亦死邦人哀之俱肖象祀之廟稱忠烈王云福寧州志淳化中合州貢羅江犬甚小而性惠常馴擾于御榻之側每坐朝犬必掉尾先吠人乃肅然太宗不豫犬不食及上仙犬號呼涕泗以至疲瘠章聖初即位左右引令前導鳴吠徘徊意若不忍章聖令諭以奉陵即掘尾飲食如故詔造大鐵籠施素裀置鹵簿中行路見者隕涕后因以斃詔以弊蓋葬於熙陵之側李至作桃花犬歌以寄史官錢若水末句云白麟赤鳳且勿喜願君出此懲浮俗古今詩話康定中侍禁李貴為西邊寨主妻為昊賊虜去家中一白犬頗馴擾祝之曰我聞犬之白乃前世為人也爾能送我歸乎犬俯仰如聽命即裏糧隨之有驚則引伏草間渴即濡身而返凡六七日出賊境其夫無恙朝廷封崇信縣君江鄰幾雜志慶曆中渭州巡檢張殿直事同回家後夫妻朝暮所食必分三器一以飼犬括異志慶歷中衛士有變震驚宮掖臺官宋禧上言蜀有羅江狗赤而尾小者其警如神願養此狗於掖庭以警倉卒時謂之宋羅江東軒華録渠來虞經臣策元祐時為給事中初入臺值都城開渠忽有異犬自渠中出直入其家熟服若素畜養者家人輩愛之名曰渠來但無事惟喜睡至或亂遽毀簾幃窗之類則經臣必有遷改錫賫之慶自爾每遇慶事則飼以肉一斤必欣喜跳躍然後食之以為常凡數年經臣敗前一夕渠來一死泊宅編楊光遠之叛青州也有孫中舍者居圍城中族人在西州別墅城閉既久內外隔絶食且盡舉族愁嘆有所畜犬倣徨其側似有憂思者中舍因囑曰爾能為我至莊取米耶犬搖尾若應狀至夜置一布囊并簡置犬背上犬曰水竇出至莊鳴吠居者開門識其犬取簡視之令負米還未曉入城如此數月以至城開孫氏闔門賴以不餒孫氏愈愛畜之後數年斃葬於別墅之南至其孫彭年語龍圖趙師民刻石表其墓曰靈犬澠水燕談義犬咸溪童鏞家畜二犬一白一花共出一母性狡獪善知人意後白者雙目俱盲弗能進牢而食主家作草窩臥于簷外花者日銜飯吐而飼之夜則臥于其傍白者既死主憐之埋於門前山麓間花者朝夕往埋所繞數匝若拜泣狀臥其旁少頃始返建寧志宣和五年京師城北乃官民牧羊地忽有野犬不知所從來入羊群中鳴叫左右前後諸犬皆往聚會一羊間一犬黑白交映至次日城內外諸犬畢集或縳者并斷索而來凡擾擾兩日犬多羊少皆齧殺其羊識者知為不祥後果有北虜犬羊之禍宣靖妖化録蘇子聸來儋耳得吠犬名烏喙甚猛而馴隨子瞻遷合浦過澄邁溷而濟路人皆驚本集青鸇犬則青顫白鵲飛龍虎子馴良捷警難伸易使也周處風土記波斯國多白馬駁犬或赤日行七百里者駁犬今所謂波斯犬也舊唐如驢罽賓大狗大如驢赤色數里搖鞉以呼之郭義恭廣志南斗犬犬虎文南斗君犬也畜之可致萬石黑犬白耳大王犬也畜之令富貴黑犬白前兩足宜子孫白犬黃頭家大吉黃犬白尾代有衣冠黃犬白前兩足利人雜五行黑龍黑狗白頭耳長卷尾龍也白澤圖豺跪狗豺之舅豺遇狗輒跪如拜狀酉陽唐伯剛云北方凡皂雕作巢所在官司必令人窮巢探卵多寡若三枚必設置以守之及其出一乃狗也取而飼養之長則獻于朝廷與常狗無異但耳上多羽毛耳田獵之際鵰則上飛狗則陸行所逐同至名曰鷹背狗東園客談遼鵰巢中生獵犬性識頗異每獵而獲十倍常犬然極難得使遼録狗國北狗國人身狗首長毛不衣手摶猛獸語為犬嘷其妻皆人能漢語生男為狗女為人自相婚嫁穴居食生而妻女人食云嘗有中國人至其國其妻憐之使逃歸與其筯十餘隻教其每走十餘里遺一筯狗夫追之見其家物必銜而歸則不能追矣其說如此五代史四夷附録管仲寢疾言于桓公曰東郭有狗嘊嘊且暮欲齧我猳而不使也謂易牙等之不可用也管子豈不鬱陶而思君兮君之門以九重猛犬狺狺而迎吠兮關梁閉而不通九辨猪一名參軍一名豕豕曰剛鬣禮云豚曰腯肥豕生子多謂之縱古今注異呼豬燕朝鮮之間謂之豭關東西謂之彘或謂之豕南楚謂之豨其子或謂之豚或謂之貕吳揚之間謂之豬子方言梁州以豕為豬河南謂之彘荊楚謂之豨漁陽以大豬為䝈齊徐以小豬為䝒白豕黑頭也豱豕奏毛也何承天纂文豰小肫也豯肫生三月也豵肫生六月也或曰一歲曰豵豝牝豕豶𧱅也豕豜三歲豕豭壯豕也䝐豶也上谷名豬曰豛豷豕息也豢以穀圈養豕也說文大豕為䝈五尺尸子豕所寢檜郭云檜郭所臥蓐方言云其檻及蓐曰檜舍人曰豕所寢草名為檜某氏曰臨淮人謂野豬所寢為檜李巡曰豬臥處名檜檜是所居之處爾雅疏四月生斗星時散精為彘四月生應天理春秋說題辭六九五十四四主時時主豕故豕四月而生淮南子齊無知殺其君十二月齊侯游于姑棼遂田于具丘見大豕從者曰公子彭生也公恕曰彭生敢見射之豕人立而啼公懼墜于車傷足喪屨遇賊于門遂殺之而立無知左莊八昔有仍氏生女曰玄妻樂正后夔取之生伯封實有豕心貪婪無厭忿類無期謂之封豕昭二十八衛靈公為夫人南子召宋朝會于洮太子蒯瞶獻盂于齊過宋野野人歌之曰既定爾婁猪盍歸吾艾假太子羞之定十四孔子窮陳蔡之間藜蒸不糂子路烹豚孔子不問肉所由來即食之墨子子路性鄙好勇力冠雄雞佩假豚凌暴孔子孔子設禮稍誘子路子路後儒服委質因門人請為弟子史祝宗人玄端以臨牢策說彘曰汝奚惡死吾將三月㹖汝十日戒三日齊藉白茅加汝肩尻乎雕俎之上則汝為之乎為彘謀曰不如食以糠糟而錯之牢策之中莊子子車氏之豭其色粹而黑一産三豚其二如之其一則駁而白惡其弗類于已也囓而殺之其同於巳也字之惟恐傷也子華子韓昭釐侯視所以祠廟之牲其豕小昭釐侯令官更之官以是豕來也昭釐侯曰是非嚮者之豕邪官無以對命吏罪之從者曰君王何以知之君曰吾以其耳也申不害聞之曰何以知其聾以其耳之聽也何以知其育以其目之明也何以知其聾以其耳之聰也何以知其肓以其目之明也何以知其狂以其言之當也朔人獻燕昭王以大豕曰養奚若使曰豕也非大圊不居非人便不珍今年百二十矣人謂豕仙王乃命豕宰養之十五年大如沙獖足如不勝其體王異之命衡官橋而量之折橋豕不量又命水官舟而量之其重千鈞其巨無用燕相謂王曰奚不享之王乃命宰夫膳之豕既死乃見夢於燕相曰造化勞我以豕形食我以人穢吾患其生久矣仗君之靈得化吾生始得為魯津之伯而浮舟者食我以粳糧欣君之惠將報子焉後燕相游于魯津而赤龜銜夜光而獻符子一云奉璧相彘留長儒以相彘立名史記養猪商丘子有養猪法卜式有養羊法博物志牧豕公孫弘菑川人少時為獄吏有罪家貧牧豕海上四十餘乃學春秋雜記漢書昭帝時燕王宮永巷中豕出圂壞都竈銜其釜六七枚置殿前漢五行志朱浮為幽州牧與彭寵書曰伯通自伐以為功高天下往時遼東有豕生子白頭異而獻之行至河東見群豕皆白懷慚而還若以子之功論於朝廷則為遼東豕也選吳祐字季英年二十喪父獨居家無擔石而不受贍遺常牧豕於長垣澤中行吟經書遇父故人謂曰卿二千石子而自業賊事縱子無耻奈先君何祐辭謝而已守志如初後傳售猪過真公沙穆嘗養猪有病使人賣之於市語之言如售當告買者言病賤取其直不可言無病欺人取貴價也賣猪者到市即售亦不言病其直過價穆怪之問其故齎半直以還買猪者買者辭不取穆棄錢而去謝書養猪嚄嚄五門子孫凡民之伍決録馬氏兄弟五人共作五門客舍養猪賣豚故民謂之曰苑中三公巨下二卿五門嚄嚄但聞豚聲注孫期濟陰人少為諸生家貧事母至孝牧豕於大澤中以奉養焉遠人往從其學者皆執經壟畔以追之里落化其仁讓黃巾賊起過其里陌相約不犯孫先生舍辟舉方正遣吏賫羊酒請期期驅豕入草不顧司徒黃琬特辟不就終於家皇甫高士傳失猪司馬徽字德操時人呼為水鏡嘗有人妄認徽猪徽便推猪以與之後數日亡猪者得其猪既以猪還徽乃叩頭自責徽又厚謝之董正別傳莎車王殺于闐王于闐大都末出城見野豕欲摶之乃人語曰無殺我我為汝殺莎車將軍都末異之即與兄弟共殺莎車王張璠漢記蒸豕尤美王濟性豪侈帝幸其家供饌甚豐蒸豚尤美上問其故對曰以人乳蒸之上色不平食未畢而去晉書劉聰末年犬與豕交有豕著進賢冠升聰坐犬冠武冠帶綬與豕并升俄而鬭死殿上宿衛莫有見其入者晉五行志接飲阮咸至宗人間共集不用杯觴斟酌以大瓮盛酒圓坐相向大酌更飲時有群豕來飲其酒咸直接去其上便共飲之晉書郭子曰劉道真少時嘗漁釣草澤善歌嘯有一老嫗識其非常人乃殺㹠以進道真食盡嫗又進一㹠又食半餘半還之後道真為吏部郎嫗兒為小令史道真乃超用之兒不知所由問母而後知之於是賫牛酒以詣道真笑曰去去無復相報吳中有一士夫夫於都假還至曲阿塘上見一女子甚美留其宿士解臂上金鈴繫女臂令暮更來遂遂不至使人求都無此色過猪圈見一母猪臂上繫金鈴志怪李汾撫琴于四明山月夜有女子至端正無比惟覺口帶高緇黑色留宿極歡汾偷女子青氈履子一隻女泣求不與及明見鮮血滿地驗履乃猪蹄殼也汾惶駭尋血至山前張氏溷中見一牝豕後足已刓一殼豕視汾瞋目咆哮如有怒色汾以事白張叟叟即殺之汾即棄山院別遊他邑搜神記幽怪録尹縱之事同廢帝狂悖無道囚諸父殿中以明帝肥壯用竹籠盛而稱之號為猪王嘗以木槽盛飯內諸雜食攪令和合掘地為坑穽實之以泥水倮明帝內坑中和槽食置前令太宗以口就槽中食用之為歡笑時廷尉劉矇妾孕臨月迎入後宮冀其生男欲立為太子太宗嘗忤旨帝怒乃倮之縛其手腳以杖貫手腳內使人檐付太官曰即日屠猪休仁笑謂帝曰猪今日未應死帝問其故休仁曰待皇太子生殺猪取其肝肺帝意乃解曰且付廷尉一宿出之宋書休仁傳乞命有劉胡者兄弟四人以屠為業永安年中胡殺猪猪忽唱乞命聲及四鄰鄰人謂胡兄弟相歐鬭而來觀之乃猪也即舍宅為歸覺寺合家人入道焉伽藍記陸逞為京兆尹都界有豕生數子經旬而死其家又有獖遂乳養之諸豚賴之以活時論以逞仁政所致後周書開皇末渭南有人寄宿他舍夜中聞二豕對語其一曰歲將盡阿郎明日殺我供歲何處避之一答曰可向水北姊家因相隨而去天將曉主人覔豕不得意是宿客而詰之宿客言狀主人如其言而得豕隋五行志安祿山嘗夜宴醉臥化為異猪而龍首左右遽言之玄宗曰猪龍也無能為者祿山事跡饒陽李瞿曇勳官番滿選夜夢一母猪極大李仙藥占之曰母猪㹠主也君必得狍主數日果如其言僉載烏金洪州有人畜猪以致富因號猪為烏金上烏將軍郭元振開元中下第自晉之汾夜行失道有宅門宇甚峻堂上燈燭而悄無人俄聞女子哭聲公曰人耶鬼耶曰妾鄉有烏將軍能禍福人每歲鄉人擇美女嫁焉父利鄉人之金潛以應選醉妾此室而去將軍二更當來公大憤曰吾力救不得當殺身以徇女未久車馬駢闐紫衣吏入復走曰相公在此既而將軍入公出揖曰聞今夕嘉禮願為小相將軍喜而延坐公取佩刀斫其腕而斷之將軍失驚而走天明視其手乃猪蹄也俄聞哭聲漸近乃父母舁襯而來將收其尸公具告焉乃令鄉人執弓矢尋血而行入大冢中見大猪無前蹄走出而斃公納其女為側室幽怪録咸通初有渤海僧隆多羅者寓于西明精舍能通鳥獸之言一日秋暑方炎與朝客數人將納涼于城西別墅路逢牝豕引諸豚而行咯咯有聲一朝士戲云此猪有語否僧曰巨彘顧諸雛云行行向前樹陰下吃妳料其不遠當遇官槐而止且飼群子矣傎之果然闕史僧辨聰遊五臺將還京師有老僧託以書其上題云東京城北尋勃賀分付僧竊啓封視之云度衆生畢早來茍更強住切恐造業復封之至京尋訪不見其人一日於五丈河側見一小兒逐一犬猪名勃賀屠者趙氏猪能令群猪不亂逸愛食薄苛故以名僧試呼其名以書投之猪遽食其書人立而化僧徑之五臺訪其老僧亦化去矣洞微志今觀宰司之取士也有似于司原之佃也昔有司原氏者燎獵中野鹿斯東奔司原縱譟之西方之衆有逐狶者聞司原之譟也競舉音而和之司原聞音之衆則反輟已之逐而往伏焉遇夫俗惡之狶司原喜而自以為獲白瑞珍禽也盡芻豢單囷倉以養之豕俯仰嚘咿為作容聲司原愈益珍之居無何烈風興而澤雨作灌巨豕而惡塗渝遂駭懼真聲出乃知是家之艾猳耳此隨聲逐響之過也潛夫論狗彘不澤甂甌而食偷肥其體而顧近其死鳳凰高翔千仞之上故莫之能致淮南說林啨蛉縣有石猪圻長谷中有石猪子母數千頭長老傳言夷昔牧此一朝化為石迄今夷人不敢往牧水經鄭頡豕北狄渤海俗所貴者曰鄚頡之豕豢豕者翁為調糠而媼為擇之蝨豈愛豕哉利其肉也猫目晴旦暮圓及午豎斂如綖其鼻端常冷唯夏至一日暖其毛不容蚤虱黑者暗中逆循其毛即若火星俗言猫洗面過耳則客至楚州射陽出猫有褐花者靈武有經叱撥猫青驄色者猫一名蒙貴一名烏圓平陵城古談國也城中有一猫常帶金鎖有錢飛若蛺蝶士人往往見之酉陽獨狐陀性好左道其外祖母高氏先事猫鬼轉入陀家每一子日夜祠之猶鬼所殺人取其財物置於所事猫鬼家鬼若降人則面正青若被牽曳陀後敗免死北史隋大業之季猫鬼事起家養老猫為厭魅頗有神靈相誣告京都都縣被誅戮者數千餘家蜀王秀皆坐之隋室既亡其事亦寢僉載高宗廢王后及蕭良娣蕭罵曰阿武狐媚翻覆至此百十願生得一日為猫阿武為鼠吾扼其喉以報今日即足矣武后聞之不說約六宮不許畜猫舊書李猫李義甫柔而害物時謂之李猫舊唐新唐作人猫李德柔任大理少卿持法甚峻忌刻便佞時號李猫兒本無學術詐稱博聞每呼馬為韓盧樂工為伶倫諂佞為謇諤以此貽譏於世南唐近事武則天習猫使與鸚鵡共處出示百官傳觀未遍猫飢摶鸚鵡食之太后甚慚猫犬互乳河東孝子王燧家猫犬互乳其子州縣上言遂蒙旌表乃是猫犬同時産子取猫兒置犬窠中取犬子置猫窩內飲慣其乳遂以為常殆不可以異論也僉載夢伏堂限薛季昶為荊州長史夢猫兒伏臥于堂限上頭向外以問占者張猷猷曰猫兒者爪牙伏門限者閫外之事君必知軍馬之要未旬月除桂州都督嶺南招討使上裴寬子諝素好談諧為河南尹有婦人投狀爭猫兒狀云若是兒猫即是兒猫若不是兒猫即不是兒猫諝大笑判狀云猫兒不識主傍我搦老鼠兩家不須爭將來與裴諝遂納其猫兒爭者皆哂之開元傳信記朱泚上言隴州將趙貴家猫鼠同乳不相為害詔遣中使示於朝常衮率百僚慶賀崔祐甫獨否中官詰其故答曰此物之失常也上奏言禮云迎猫為其食田鼠也今對鼠不食無乃失于性乎且猫受人養育職既不修亦何異于法吏不勤觸耶疆吏不勤捍敵以茲稱慶臣所未詳代宗深嘉之舊唐司徒馬燧家猫有生子同日者其一母死焉有二子其一方乳其子銜而乳之若其子韓文連山張大夫摶好養猫衆色備有皆自製佳名每視事退至中門數十頭曳尾延頸盤接入以緑紗為幃聚其內以為戲或謂摶是猫精南部新書左軍容使嚴遵美閹官中仁人也嘗一日發狂手足舞蹈傍有一猫一犬猫忽謂犬曰軍容改常也顛發也犬曰莫管他從他俄而舞定自驚自笑且異猫犬之言遇昭宗播廷乃求致仕北夢瑣言苗介立成自虛雪夜于東陽驛寺中遇苗介立吟詩曰為慚食肉主恩深日晏蟠蜿臥錦衾且學志人知白黑那將好爵動吾心次日視之乃一大駁猫兒也傳奇建州刺吏月下見七八白衣人長不盈尺男女雜坐而飲一人曰今日甚樂然白老將至奈何因哭入溝中數月後罷官新政家有猫名白老於堂西得白鼠七八枚食之稽神録江南二徐大儒也後主岐王六歲時戲佛像前有大琉璃瓶為猫所觸仆然墮地因驚得疾薨詔鍇為墓志鍇謂鉉曰此文章雖不引猫兒事此故實兄頗記不鉉為疏二十事鍇曰適已憶七十餘事鉉曰楚金大能記明旦又云夜來復得數事兄撫掌而已邵思野說鄱陽龔冕仲自言其祖紀與族人同應進士舉其家衆妖競作乃召女巫徐姥者使治之時尚寒有一猫正臥爐側家人指謂姥曰吾家百物皆為異不為異者獨此猫耳於是猫亦人立拱手而言曰不敢姥大駭馳去後數日捷音至二子皆高第矣知妖異未必盡為禍也續墨客揮談和州烏江縣升中寺僧有負主僧今久而不償病且革誓為畜産以報既卒主僧晝寢夢病僧披衣槃跚入床下覺而異之須臾猫生一子稍長極馴擾其重七八斤每客至則歡迎走報見非其人者輒謹隨入有知呼其名必前怒噬至主僧呼則昂首號叫若求隱其事者泊宅編宋有盧仙姑者指猫而問蔡京曰識之否此章惇也其意蓋以諷京河南永寧天壇山中岩有仙猫洞世傳燕真人丹成雞犬俱升仙猫獨不去人嘗見之就洞呼仙哥則聞有應者山川紀異澡洗世俗稱六月六日猫犬澡洗之候應星玉衡星散而為鼠運斗樞玉策記稱鼠壽三百歲滿一百歲者則色白善憑人而卜名曰仲能知一年中吉凶及千里外事也抱朴子毀郊牛鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛成七蚤風雖細困於安寢鼷鼠雖微猶毀郊牛魏文與王朗書鼷鼠甘口鼠也食牛嚙盡而牛不覺畏人齊侯將為臧紇田臧孫聞之見齊侯與之言伐晉對曰多則多矣抑君似鼠夫鼠晝伏夜動不穴於寢廟畏人故也今君聞晉之亂而後作焉寧將事之非鼠如何乃弗與田襄二十四社鼠桓公問管仲曰治國奚患對曰最苦社鼠矣公曰何患社鼠哉對曰君亦見大社木者乎樹木而塗之鼠穿其間掘穴託其中燻之則恐焚木灌之則恐塗陀此社鼠之所以不得也今人君之左右出則為勢重而收利於民入則比周而蔽惡於君不誅則亂法誅之則君不安據而有之此亦國之社鼠也韓子外儲說苑同晏子作景公社鼷不灌屋鼠不薰何則所託者然也漢中山王傳馬成人之巨蠹久依成社不畏熏燒虞延傳鄭人謂玉未理者為璞周人謂鼠未臘者為璞周人乃懷璞問鄭賈曰欲買璞乎賈曰欲因出其璞視之乃鼠也因謝不取尹文子馬屎為靈薪老鼠為玉璞上清經李斯年少時為郡小吏見吏舍廁中鼠食不潔近人犬數驚恐之斯入倉觀倉中鼠食積粟居大廡之下不見人犬之憂於是李斯乃嘆曰人之賢不肖譬如鼠矣在所自處耳史記田蚡怒謂韓安國曰與長孺共一禿翁何為首鼠兩端注首鼠一前一却也漢灌夫傳張湯其父為長安丞出湯為兒守舍還鼠盜肉父怒笞湯湯掘熏得鼠及餘肉劾鼠掠治傳爰書訊鞠論報并取鼠與肉具獄磔堂下父見之視文辭如老獄吏大驚遂使書獄本傳漢昭帝元鳳元年九月燕有黃鼠銜其尾舞王宮端門中王往視之鼠舞如故王使吏以酒脯祠鼠舞不休一日一夜死時燕剌王旦謀反將死之象也其月發覺伏辜京房易傳曰誅不原情厥妖鼠舞門左馮翊韓延壽有罪下獄楊惲上書訟延壽郎中丘常謂惲曰聞君侯訟韓馮翊當得活惲曰事何容易硜硜者未必全也我不能自保真人所謂鼠不容穴坐銜窶藪也漢書巨鼠翟方進傳王莽詔誣劉信云父東平王雲不孝不謹親毒殺其父思王名曰巨鼠前書鼮鼠竇攸治爾雅舉孝廉為郎世祖與百僚大會靈臺得鼠如豹文熒熒光澤世祖異之以問群臣莫能知者攸對曰鼮鼠也詔問何以知之攸曰見爾雅詔案視書如攸言賜帛百匹詔諸侯子弟從攸受爾雅竇氏家傳終軍事同見爾雅注何承天纂文唐鼠形如鼠稍長青黑色腹邊有餘物如腸時亦污浴名易腸鼠昔仙人唐昉拔宅升天雞犬皆去惟鼠墜下不死而腸出數寸三年易之俗呼為唐鼠録異記唐房升仙雞狗並去惟以鼠惡不將去鼠悔一月三出腸也博物志鼠乃感激以月晦日吐腸胃更生水經注公子蒼舒早惠時軍國多事用刑嚴重太祖馬鞍在庫為鼠所囓庫吏懼罪必死議欲面縳首罪猶慮不免冲謂曰待三日中然後自首冲於是以刀穿單衣如鼠囓者繆為失意貌有愁色太祖問之冲對曰世俗以為鼠嚙衣者其主不吉今衣見囓是以憂戚太祖曰此妄言耳無所苦也俄而庫吏以囓鞍聞太祖笑曰兒衣在側尚囓况馬鞍懸柱乎一無所問魏志逐鼠丸王肅以銅為逐鼠丸晝夜自轉酉陽魏齊王正始中中山王周南為襄邑長有鼠從穴出語曰王周南爾以某日死周南不應鼠還穴後至期更冠幘皂衣出語曰周南汝日中當死又不應鼠復入穴斯須更出語如前日適欲中鼠入須臾復出出復入轉更數語如前日適中鼠曰周南汝不應我復何道言絶顛蹙而死即失衣冠取視具如常鼠幽明録及宋五行志列異傳陳安世年十三初為管叔本客得道叔本年七十猶拜安曰得道者當師吾不羞弟子之禮矣死王樂生鼠雖為帝王死不及生鼠抱朴子晉簡文為撫軍時床上塵不聽拂見鼠行跡視以為佳有參軍見鼠白日行以手板批殺之撫軍不悅門下起彈教曰鼠被害尚不能忘懷今復以鼠損人無乃不可乎世說大興中衡陽區純作鼠市四方丈餘開四門門有一木人縱四五鼠於中欲出門木人輒以椎椎之晉陽秋宋南譙玉劉義宣鎮荊州府吏蔡鐵善卜宣射得一白鼠置函中乃召鐵使卜之鐵兆成笑曰兌色之鼠背明戶彎弧射之絶左股鼠孕三雄而兩雌若不見信剖腹而立知公乃使剖鼠腹皆如鐵言即賜錢一萬述異記唐袁天綱子客師高宗置一鼠於奩令術家射之皆曰鼠客師曰雖實鼠然入則一出則四發之鼠生三子史景平中東陽大水永康蔡嘉夫避水住南壟夜有大鼠浮水而來伏喜夫奴床角奴愍而不犯每食以餘飵與之水勢既退喜夫得返故居鼠以前腳捧青囊褁三斤許珠著奴床前啾啾狀如欲語從此去來不絶異苑齊永明中會稽鍾山有人姓蔡不知名山中養鼠數十頭呼來即來遣去便去語狂易時謂之謫仙南齊隱逸杜京産傳齊鬱林王夜中與宦者共刺鼠至曉每夜輒得十藍金樓子東昏侯在東宮嘗夜捕鼠達旦以為笑樂南史紀北齊平原太守蘭陵蕭悉達服帶為鼠嚙楊遵彥以俗事戲之曰當遷官未幾除家令尋失官鼠後嚙其靴遵彥曰當復得官悉達曰鼠便為吏部尚書何關人事談藪李曉字仁略魏太尉虔子學涉有思理釋褐員外侍郎爾朱榮之害朝士將行曉衣冠為鼠所噬遂不成行得免河套之難北齊二十一蘇徵仕汜水縣令舉止輕薄郎中張元一目為失窟鼠僉載天寶末御史中丞畢杭為魏州刺史陷於祿山賊中尋欲謀歸順而未發數日於庭中忽見小人長五六寸數百枚遊戲自若家人擊殺明日群小人皆白服而哭載死者以喪車凶器一如士人送喪之備仍於庭中作塜葬畢遂入南牆穴中甚驚異之發其冢得一死鼠乃作熱湯沃中久而掘之得死鼠數百枚後十餘日杭以事不尅一門遇害廣異記李知微夜遊文成宮下初月微明見數十小人皆長數寸聚立古槐下有一紫衣者擁侍十餘輩悉稍長有一人白長者曰某當為西閣舍人一人曰某當為殿前録事一人曰某當為司文府史一人曰某當為南宮書佐一人曰某當為馳道都尉一人曰某當為司城主簿一人曰某當為遊佃使者一人曰某當為東垣執戟言訖相引入穴而去明日掘視之乃鼠也河東記報恩寶應中有李氏家于洛陽不畜狸者三世忽一日李氏大集親友會食私堂既坐而門外有數百鼠俱人立以前足相鼓如甚喜狀家僮驚異言於李氏李氏親友乃空其堂而縱觀人去且盡堂忽摧圯其家無一傷者悲夫鼠固微物也尚能識恩而知報况人乎宣室志路敬淳為遂安令先是令多死敬潛欲辭妻曰君不死獄而得全非生死有命邪從之到官有梟嘯其屏鼠數十走于前左右驅之擁杖而號敬潛不為懼久之遷衛令新唐王孝傑為清邊道總管初進軍平州白鼠晝入營頓伏皆謂鼠精胡象也白質歸命天亡之兆及戰乃孝傑覆焉上唐縉大曆中嘗將入朝其前榻囊中忽有一鼠長尺餘躍出公大懼顧謂其子曰我以不才謬居卿相無德而貴嘗懼有意外之咎今者妖異如是豈非禍之將至耶後數日果得罪貶縉雲守宣室志許昌郗尚書士美元和末為鄂州觀察一日晨興出視事束帶已畢左手引鞾未及陷足忽有一巨鼠過庭北面拱立而舞八座大怒驚叱之略無懼意自擲鞾以擊鼠則奔逸有毒虺墜于鞾中向無鼠妖則以致臃指潰足之患闕史進士李昭嘏舉十上不第時登科年已有主司並無薦託之地主司盡寢忽窺見一軸文卷在枕前看其題處乃昭嘏之卷令遷於架上復寢暗視有一大鼠取其卷銜其軸復還枕前再三如此昭嘏來春及第主司問其故乃三世不養猫皆云鼠報聞奇録玉泉子僖宗末廣陵丐者杜可均嘗大雪訪術西酒家姓樂者求飲見主事者白人以衣換酒收藏不謹鼠囓其衣杜即令治淨室曰項年記一符能却鼠試書之既有驗可盡此室永無鼠矣生得符焚之鼠遂絶桂苑叢談掘鼠得粟天復中隴右大飢其年秋稼甚豐將刈之間大半無穗有人就田畔斸鼠穴求之所獲甚多於是家家窮穴有獲五七斛者相傳謂之劫鼠倉飢民皆出求食濟活甚蟲竇蟠久不第晚娶宇文翊女遂登科時杜尚宅遺火云因鼠尾戔火而作韋說因謂璠曰魚將化龍雷為燒尾近日鼠亦有燒尾者璠大慚瑣言虞部郎中周仁願監永豐倉有通謁云江州進士禇昌及見之如十歲小兒出一啓為贄曰幽室微光寒泉涸滴莊周之壑已空孔氏之車何適願曰孔緒之車何故事也其人曰楊三楊三汝楊邁之孫楊中之子孔緒之事何必問也願怒欲擊之其人溘然仆地惟露幞頭巾子願遽逐之化為大鼠走入倉下金玉精陳太者家貧好施嘗夜見一白鼠雪色緣其樹或上或下久之揮而不去陳言於其妻子曰衆言有白鼠處即有藏遂掘之果獲白金五十錠葆光録白鼠身毛皎白耳足紅色眼眶赤赤者比乃金玉之精伺其所出掘之當獲金玉云鼠五百歲即白耳足不紅者乃常鼠也録異記南漢劉玢初名洪度龑子龑病臥寢中召右僕射王翻與語呼洪度小字曰壽雋雖長然皆不足任吾事惟洪昌類我吾欲立之奈何吾子孫不肖後世如鼠入牛角勢當漸小爾因泣下歔欷五代史鼠膽鼠膽在頭活取則有雜俎百勞化𪖅鼠地中行鼠百勞所化亦作蚡鼠字林人食礜石而死蠶食而不飢魚食巴菽而死鼠食之而肥淮南說林庚申甲子夜鼠伏庚申夜蝙䗜伏瑣碎録聖人師蜂立君臣師蜘蛛立綱罟師拱鼠制禮師戰蟻置兵文子拱鼠形如常鼠行田野中見人即拱手而立人近欲捕之即跳躍而走去秦川有之録異記詩相鼠有體人而無禮陸璣云河東有大鼠能人立交前兩腳於頭上跳舞善鳴韓退之城南絶句云禮鼠拱而立孫奕云相地名按地志相州與河東相鄰則知相州有此鼠詩人蓋取譬焉若如毛氏以相為視則視物之有體與皮者皆可以喻禮何以取鼠紅飛鼠多出交趾及廣管瀧州背腹有深毛茸茸然唯肉翼淺黑色多雙伏紅蕉花間採捕者若獲一則其一不去南中婦人皆買而帶之以為媚樂嶺表録異鼹鼠鼹鼠首尾如鼠色青黑短足百指形大重千餘斤出零陵郡界不知所來民有災及為惡者鼠輒入其田中振落毛衣皆成小鼠食其苗稼而去或捕得鼹鼠者治其皮食為帶頗能𤁧篘為其三毛出於一孔與常皮有異人多寶之録異記家鹿嶺南人食鼠謂之家鹿倦遊録嶺南僚氏好為蜜唧即鼠胎未瞬通身赤蠕者飼之以蜜釘之筵上囁囁而行以筯夾取咬之唧唧作聲故曰蜜唧僉載廣南府儂人飲食無美味嘗醢鼷鼠捕飛蟲噉之雲南志竹鼠竹鼠如小狗大食竹根出封溪縣交州記竹𧳽者食竹之鼠也生於深山溪谷竹林之中無人之境非竹不食巨如野狸其肉肥脆山民重之西域有鼠王國鼠大如狗著金環枷中者如兔小者如常鼠頭悉白商佑有經過其國不先析祀者則齧人衣裳得沙問呪願便獲無他釋道安昔西方親見如此俗諺云鼠得死人目精則為王異苑西域諸國志舊說鼠王其溺精一滴成一鼠一說鼠母頭腳似鼠尾蒼口鋭大如水牛性畏狗溺一滴成一鼠時有鼠災多起於鼠母鼠母所至處動成萬鼠其肉極美酉陽雜俎辟毒鼠大秦國出辟毒鼠罽賓國武德十六年獻褥特鼠喙大而尾赤能食蛇有被蛇螫者鼠輒臭而尿之其瘡即愈舊唐獻金錢釋善無畏至烏萇國有白鼠馴繞日獻金錢宋高僧傳契丹國産大鼠曰毗狸形類大鼠而足短極肥其國以為殊味穴地取之以供國主之膳自公相以下皆不得嘗常以羊乳飼之頃北使嘗獲至京烹以進御本朝使其國者亦皆得食之蓋極珍重之也澠水燕談刁約使契丹戲為詩云押燕夷離畢看房賀跋支餞行三匹裂密賜十毗狸毗狸如鼠而大穴居食果穀味若㹠而脆契丹以為珍膳續揮犀狀如大鼠極肥腯甚畏日為隙光所射輒死陸氏舊聞有比令邦者以其肉一臠置之食物之鼎則立糜爛是以愛重浮休使遼録遼史國語解云夷離畢即參知政事也引刁約詩云松鼠尸子曰松柏之鼠不知堂密之有美樅說文山如堂者密宣大間産黃鼠土人珍之凡捕之者必畜鬆尾鼠數隻名夜猴兒能嗅黃鼠穴知其有無有則入嚙其鼻而出白貂耶律德光脫白貂以衣晉高祖五代史契丹西北至嫗厥律多黑白黃貂鼠皮北方諸國皆仰足陷虜記天中記卷五十四
