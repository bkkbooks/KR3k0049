body:
  text: 冠韜髮冠貫也所以貫韜髮也釋名冠纓上古穴居野處衣毛而冒皮後代聖人易以絲麻觀翬翟之文乃染帛以效之始作五采以為服見鳥獸有冠角𩑺胡之制遂作冠冕纓縷輿服志人所以有冠者𢃩也所以𢃩持髮也人懷五常莫不貴德示成禮有修飾文章故制冠以飭首別成人也白虎通緇布冠始冠之冠也大古冠布齊則緇之今武冠則其遺象也太古未有絲繒殆麻布耳三禮圖冠等玉藻曰始冠緇布冠自諸侯下達冠而敝之可也玄冠朱組纓天子之冠也緇布冠繢緌諸侯之冠也玄冠丹組纓諸侯之齊冠也元冠綦組纓士之齊冠也縞冠玄武子姓之冠也縞冠素紕既祥之冠也垂緌五寸惰游之士也玄冠縞武不齒之服也居冠屬武自天子下達有事然後緌玄武之象冠之在首玄武之象也玄武貌之最嚴威者象在後反居首者武武至而不用者矣春秋繁露冠義始冠之緇布之冠也大古冠布齊則緇之其緌也孔子曰吾未之聞也冠而敝之可也子冠於阼以著代也醮於客位加有成也三加彌尊喻其志也冠而字之敬其名也委貌周道也章甫殷道也毋追夏后氏之道也周辨殷冔夏收三王共皮辨素積郊持天皇太帝比辰星也含元秉陽舒精吐光居紫宮中制御四方冠有五采文曰黃帝冠黃冠白帝冠白又黑帝冠黑文春秋合誠圖狄人滅衛齊桓公封衛于楚丘衛國忘亡衛文公大布之衣大帛之冠左閔公昔齊桓公高冠慱帶以治其國楚莊王鮮冠組縷絳衣慱袍以治其國墨子齊桓公飲酒遺其冠恥之三日不朝管仲曰此有國家之恥公胡不雪之以政公曰善因發囷倉賜貧窮論囹圄出薄罪三日而民歌之曰公胡不復遺其冠乎韓子鄭子華之弟子臧出奔宋好聚鷸冠鄭伯聞而惡之使盜誘之八月盜殺之于陳宋之間君子曰服之不衷身之災也僖二十四楚文王好服獬冠楚國效之趙武靈王具帶鵕𪇘而朝趙國化之淮主術制冠莊王誅史里孫叔敖制冠浣衣淮南貊冠公孫屈子曰屈到貊冠定王使單襄公聘于宋遂假道於陳以聘楚及陳氏靈公與孔寧儀行父南冠以如夏氏單于歸告王曰陳我太姬之後也棄衮冕而南冠以出不亦簡彝乎國語范獻子卜獵命人占之此其繇也曰君子得黿小人遺冠范獻子獵而無得遺其豹冠瑣語哀公會晉侯吳子于黃池吳王夫差曰好冠來孔子曰大矣夫差未能言冠而欲冠也穀梁傳哀公問孔子曰昔舜何冠孔子不對公曰有問於子不對何也對曰舜之為君好生惡殺任能授賢君舍此不遵而冠是問是以緩對家語文竹成王將加元服周公使人來零陵取文竹為冠周書烏萃曾參鋤瓜三足烏來萃其冠古今注盜跖責孔子曰爾作言造語言稱文武冠枝木之冠帶死牛之脅多辭繆說搖脣鼓舌擅生是非以迷天下之主莊子傳記言魏牟北見趙王王方使冠工制冠於前問治國於牟對曰太王誠能重國若此二尺縱則治國且安王曰國所受於先人宗廟社稷至重比之二尺縱何也牟曰大王制冠不使親近而必求良工者非為其敗縱而冠不成與今治國不善則社稷不安宗廟不血食大王不求良士而任使其私愛此非輕國於二尺縱之制耶王無以應桓子新論高祖時籍孺孝惠時閎孺婉佞貴幸與人臥起故惠帝時郎中皆冠鵕䴊具帶傅脂粉比閎籍之屬史記不冠不見丞相公孫叔燕見上或時不冠至於汲黯見上不冠不見嘗坐武帳中黯前奏事上不冠望見黯避帳中敬禮如此上劉氏冠高祖為亭長以竹皮為冠至貴所謂劉氏冠也後令爵非公乘母得冠劉氏冠也漢書竹皮今之鵲尾冠高山冠酈食其謁沛公衣儒衣冠側注注一名高山冠沛公略地陳留麾下騎士酈食其里中子也食其見之曰沛公吾所欲從騎士曰沛公不喜儒諸客冠來者沛公輒鮮其冠溺其中未可以儒生說也上杜欽字子夏家富而目偏盲茂陵杜業亦字子夏時人號欽為盲杜子夏以相別欽惡以疾詆乃為小冠廣裁一寸由是京師更謂欽為小冠杜子夏而業為大冠社子夏上蓋寬饒初拜衛司馬冠大冠帶長劍躬按行士卒之室上江充召見衣紗縠禪衣冠禪纚步搖冠飛翮之纓上見之燕趙固多奇士上王陽與貢禹為友陽為益州刺史禹聞之彈其冠以待陽薦陽薦禹於成帝召為大夫上王莽居攝子字諫莽殺之逢萌謂其友人曰三綱絶矣不去禍將及人即鮮冠掛東門而去東觀漢記馬援與公孫述有舊援入蜀述見之甚喜令冠交讓之冠立舊友之位上劉虞為公孫瓚所誅初虞以儉素為操冠敝不改乃就補其穿及遇害瓚兵搜其內而妻妾服羅紈盛綺飭時人以此疑之後漢書狹冠梁冀改輿服別制卑幘狹冠續漢書劉暾字長生轉侍御史武庫火尚書郭彰率百人自衛而不救火暾正色詰之彰怒曰我能截君角也暾勃然謂彰曰何敢恃寵作威作福天子法冠而欲截角乎求紙筆奏之彰伏不敢言衆人鮮釋乃止晉書斂髮襲冠慕容廆高祖父慕容跋見燕代少年多冠步搖冠好之乃斂髮襲冠諸部因呼之為步援其後音訛而為慕容遂以慕容為氏崔鴻十六國春秋前燕録鹿皮冠張欣泰為直閣步兵校尉領羽林監欣泰通涉雅好交結多士名素正直輒著鹿皮冠挾素瑟有以啓武帝曰將家兒何敢作此舉止梁書武帝幸劉悛弟帝著鹿皮冠劉悛設兔毛衾於牗中宴樂以冠賜悛至夜乃出齊書獺皮冠陳伯之濟關睢陵人也年十三四好著獺皮冠梁書婆利國以瓔珞繞身頭著金長冠高尺餘形如辨綴以七寶之飾上崔休兼給事黃門侍郎參定禮儀帝常閲故府得舊冠題曰南部尚書崔逞制顧謂休曰此卿家舊事也後魏書帝臨軒冠太子于太極殿舊制太子著遠遊觀金蟬蟾翠緌纓至是詔加金博山梁書進賢冠古緇布遺象也蓋文儒之服有五梁三梁兩梁一梁人主五梁三公三梁卿大夫尚書兩梁漢太官令冠兩梁親省御膳為重也博士兩梁崇儒也晉輿服志貞觀中太宗初服翼善冠賜貴臣進德冠因謂侍臣曰幞起自周武帝蓋取便於軍容今四海無虞息武事此冠頗採古樣兼類幞頭乃宜常服可與袴褶通用唐書肅宗時司天韓穎奏五官正其官配五方臣請冠上加一星衣從方色上令狐德棻帝嘗問丈夫冠婦人髻比高大何邪德棻對曰冠髻在首君之象也晉之將亡君弱臣彊故江左士女衣小而裳大宋武帝受命君德尊嚴衣裳隨亦變改此近事驗也董晉金吾將軍沈房有朞喪公除常服入閣帝疑以問晉又問晉對曰古者服冠冕以佩玉節步堂上接武堂下布武君前趨進而已今或奔走以致顛仆在式朝臣皆綾嫩五品而上金玉帶所以盡飾而奉上故漢尚書郎含香老萊綵服君父一也若然服絁縵亦非禮也帝然其言詔入閣官無趨走期以下喪不得以慘服會令群臣衣本品綾袍金玉帶自晉而復太平公主玉葉冠虢國夫人夜光枕楊國忠鎖子帳皆輪代之寶不能計其直明皇雜録知有持盈玉葉冠比紅兒詩輕金冠寶曆二年浙東貢舞女戴輕金冠以金絲結之為鸞鶴狀仍飾以五綵細珠玲瓏相續可高一尺稱之無二三分唐杜陽編嚴武鎮成都奏杜甫為參謀甫於浣花里種竹植樹結廬枕江縱酒嘯詠與田畯野老相狎蕩無拘檢武過之有時不冠其傲誕如此舊史賣平天冠廖融潘居冲更唱迭和宋太宗懲五代之弊以詞賦論策取士融曰豈知今日詩一似大市裏賣平天冠並無人問耶荊湖近事武冠一曰惠文或曰趙惠文王所造或曰齊人見于歲涸澤之神名曰慶忌冠乘小車疾馳因象其冠而服焉裂冠梁邵陵王綸於婁湖立園廣宴酒後好聚衆賓冠手自裂破投之唾壺皆莫敢言謝舉常預宴王欲取舉幘舉正色曰裂冠毀冕下官弗敢聞命拂衣而退王屢召不返甚有慚色南史華山宋鈃尹文為華山之冠以自表莊子示勇宋康王為無頭之冠以示勇桓子新論加首冠雖敝禮加之於首履雖新法踐之於地六韜通天冠通天冠一曰高山冠上之所服三禮圖天子通天冠高九寸黑介幘金慱山徐廣輿服雜注通天冠金博山蟬謂之金顏徐爰釋遠遊冠遠遊冠諸王所服三禮圖天子雜服遠遊冠太子及諸王遠遊冠制似通天也天子五梁太子三梁徐廣輿服雜注皇太子遠遊冠翠緌張鏡宋東宮儀魏文帝與于禁詔曰昔漢高脫衣以衣韓信光武鮮綬以帶李忠誠皆人主當時貴敬功勞今以遠遊冠與將軍章甫章甫殷冠名甫大夫也殷以之表章大夫也釋名殷統十二月為正其飾微大故為章甫白虎通孔子曰丘長居宋冠章甫之冠禮記宋人有資章甫而適於越越人斷髮文身無所用之莊子委貌玄冠一曰委貌今之進賢則其遺象也夏曰母追殷曰章甫周曰委貌後世轉以巧意改易其名耳三禮圖周襄王賜晉文公命晉侯端委而入孔朝曰玄端之衣委貌之冠也國語委貌者何周朝廷理政事行道德之冠名所謂委貌者周統十一月為正萬物始萌冠飾最小故為委貌言委曲有貌也白虎通虎賁冠插鶡尾鶡鷙鳥中之果徑者也每所櫻撮應瓜摧碎其尾上黨所貢漢官儀武冠加雙鶡尾為鶡冠羽林虎賁冠之鶡雞勇鬭死乃止故趙武靈王以表武士秦施用之漢輿服志武辨武辨大冠也士服之或曰千歲涸澤之神名慶忌冠大冠乘小車馬好疾馳齊人服之三禮圖武冠一曰武辨大冠武官冠之侍中常侍加黃金璫附蟬為飾謂之趙惠文冠漢輿服志武冠或曰繁冠今謂之大冠蔡雍獨斷陳思王植上疏曰臣若得辭遠遊戴武辨解朱組佩青紋乃臣之至願也魏志武辨世謂之籠冠也宋志却敵冠却敵冠前廣四寸後高三寸衛士服之三禮圖却敵冠制似進賢衛士服之漢輿服志却非冠宮殿門僕射服之高五寸禮不記又司馬彪續漢書云插以燕尾三禮圖却非冠似長冠漢輿服志巧士冠前高五寸後相通掃除從官服之禮不記三禮圖巧士冠高七寸不常服唯郊天黃門從官四人冠之在鹵簿中次乘輿車前以備宦者四星漢輿服志五綵方山冠各以其綵縠為之祠廟天子八佾樂五行舞人所服三禮圖方山冠似進賢冠以五彩縠為之漢輿服志昌邑王賀為王時冠方山冠漢五行志牟追母追夏后氏之道也儀禮士冠禮收收夏后氏冠名也言收斂髮也釋名夏收而祭謂之收者十三月陽氣收本舉生萬物而達出之故謂之收白虎通殷冔而祭謂之冔者十二月施氣受化冔張而後得牙上殷人哻而祭縞衣而養老禮記法冠一曰柱後惠文一曰獬豸冠柱高五寸以縱裏鐵柱卷秦制法冠服之禮不記三禮圖法冠秦制執法者服之天子冠通天漢制之侍中中常侍皆冠惠文加貂附蟬蔡雍獨斷太傳胡公說春秋左氏傳有南冠而縶者則楚冠也秦滅楚以其服賜執法近臣御史服之漢輿服志武冠一曰武辨大冠侍中中常侍加黃金璫附蟬為文貂尾為飾為之趙惠文冠上定王使單襄公聘於宋假道於陳陳靈公與孔寧儀行父南冠以如夏氏留賓不見單子歸告王曰陳侯棄衮冕而南冠以出不亦簡彝乎簡略彝常也言簡略常服犯先王之令國其亡乎賈逵曰南冠楚冠也國語張敞弟武為梁相敞遣吏送之曰何以治梁武曰馭黠馬者利其御策當以柱後惠文彈治之耳秦獄吏冠柱後惠文冠如淳曰蟪蟬也冠細如蟬趐今御史冠也漢書昌邑王賀短衣大袴冠惠文冠服處曰武冠也趙惠文所服故號惠文上侍御史周官也為柱下史冠法冠一曰柱後以鐵為柱言其審固不撓或說古有獬豸獸主觸不直故執憲者以角形為冠耳漢官儀侍御史朱放請復置朱衣豸冠於內廓有犯者御史服以彈後御史張著服之以彈京兆尹嚴郢唐書樊噲冠樊噲冠楚漢會於鴻門項羽圖危高祖樊噲聞急乃裂衣苞楯戴以為冠排入羽營輿服雜事夜光上元夫人戴九星靈芝夜光之冠漢武內傳晨嬰王母戴太真晨嬰之冠履嬰璚鳳文之舄上神仙服食經曰漢武帝閒居未央殿有人乘白雲車駕白鹿冠芙蓉冠曰我中山衛叔度也又陶元景真誥曰桐柏山真人王子喬戴芙蓉冠著朱衣以朱綴縫帶劍金棺葬狗曹植與陳琳書曰夫披翠雲以為衣戴北斗以為冠帶虹霓以為紳連日月以為佩此服非不美也然而帝王不服者望殊於天志絶于心矣骨蘇高麗冠曰骨蘇多以紫羅為之周書冕大夫以上冠邃延垂旒紞纊昔者黃帝初作見說文冕所以前後邃延者何示進賢退不能也垂旒者示不視邪纊塞耳示不聽讒故水清無魚人察無徒明不尚極知下故禮曰天子玉藻十有二旒前後邃延也白虎通黃帝作旃冕宋均曰通帛為旃冕冠之有旃應劭云周始垂旒也世本黃帝戴黃冕三禮圖祭服曰冕冕猶俯俯平直貌也珠上纁下前後垂珠有文飾也釋名麻冕者何周宗廟之冠也十一月之時陽氣俯仰黃泉之下萬物被施如冕前俯而後仰故謂之冕也所以用麻為之者女功之始示不忘本不以皮皮乃太古未有禮聞之服也白虎通辨師辨師掌王之五冕豸冕朱裏延紐冕綖之覆也紐小鼻笄所貫也五綵繅十有二就繅合五色絲為之垂于延之前後各十有二所謂邃延也就迎也繩之每一匝而貫五綵玉十二斿則十二玉也周禮司服掌王之吉及祀昊天上帝則大裘而冕祀五帝亦如之六服同冕享先王則衮冕享先公饗享外則鷩冕祀四望山川則毳冕祭社稷五祀則冕祭群小祀則麻冕上冕而祭有虞氏皇而祭周人冕而祭皇冕屬畫羽飾之禮記冕而舞諸侯冕而舞大武諸侯之僣禮也上天數王戴冕璪十有二旒則天數也上玄冕玄冕齊戒鬼神陰陽也陰陽夫婦上天子之冕朱緑藻十有二諸侯九上大夫七下大夫五士三此以文為貴也禮記恐臥魏文侯問於子夏曰吾端冕而聽古樂則惟恐臥鄭玄曰端曰衣樂記敬色君子端冕則有敬色表記前旒古者冕而前旒所以蔽明黈纊塞耳所以掩聽也大戴禮龍逢諫桀曰臣觀君之冕非冕冕危石觀君之履非履履春冰未有冠危石而不壓蹈春冰而不陷也符子周襄王賜晉文公命晉侯端委入太宰以王命命之冕服內史贊之三命而後即冕服國語晉士會帥師滅赤狄晉侯請于王戊申以黻冕命士會將中軍且為太傳左傳公還及方城季武子使公冶問問公起居公冶季氏屬大夫公與公冶冕服以卿端冕賞之固辭而後受公冶疾聚其臣曰我死必無以冕服斂非德賞也言公畏季氏而賞其使非以我有德襄六王使詹桓伯辭於晉曰我在伯父猶衣服之有冠冕未水之有本源民人之有謀主伯父若裂冠毀冕拔本塞源專棄謀主雖戎狄其何有余一人昭三漢明帝採尚書皋繇及周官禮記以定制冕皆廣七寸長尺二寸係白珠子其端十二旒三公及諸侯九旒卿七旒蔡雍獨斷秦除六冕之制明帝漢明帝也永平中使諸儒案古文始復造衮冕摯氏決疑要注郭賀拜荊州刺史明帝巡狩到南陽特見嗟嘆賜以三公之服黼黼旒冕勑去幨露冕使百姓見此衣服以彰其德陳壽益部耆舊傳初中興儀服不備又冕旒飾以蓊翠珊瑚雜珠顧和奏舊冕十二旒皆用玉今不能得玉可用白珽珠於是始下太常治改晉中興書明帝詔曰滕以大冕郊祀天地宗祀明堂以法冕祀太廟元正大會朝諸侯以絺冕小會宴嚮餞送諸侯臨軒命王公以繡冕征伐不賓講武校獵宋記六等之冕皆有黈纊黃錦為之其大如橘自皇太子以下並犀導青纓隋書牛亨問曰冕旒如繁露何也答曰綴而下垂如露之繁多故曰繁露古今注圓方制冕皆前圓後方朱裏朝上三禮圖高下冕者俯也後高前下有俯伏之形上黃帝作冕黃帝作冕垂旒目不邪視通典禮篇堯舜為堯舜以德化為冠冕王制叔孫通制禮多依周法古今冕俱廣八寸長尺六寸前圓後方漢用白玉珠各十二三公九青珠二千石七黑珠上魏用珊瑚魏因漢故事明帝好婦人之飾改以珊瑚通典後周設司服之官掌皇帝十二冕祀昊天則蒼冕五帝各隨其方色朝日同青冕夕月同素冕地祗同黃冕神州社稷同元冕享先生加元服笄象冕享先帝食三老耕籍等以衮冕視朝大射等以山冕視朝臨法門適宴等以鷩冕皆十有二旒通典北齊採陳之制旒玉用五采以組為纓色如其綬其四時祭祀封禪皆服衮冕上隋採北齊之法衮冕垂白珠十二旒組為纓色如其綬充耳玉笄裴正奏色並用元上乾德元年閏十二月詔乘輿所服冠冕去珠玉之飾長編改組紘元豐四年臣僚言古者冕辨則用紘冠則用纓今衣服令乘輿服大裘冕以組為纓色如其綬衮冕朱絲組帶為纓冕而用纓不與禮合請改用朱組紘仍改平冕為元冕用纓不赤而微黑者又別圖改上韍制從之品服衮冕者一品之服也鷩冕者二品之服也毳冕者三品之服也絺冕者四品之服也端冕者五品之服也平冕者郊廟武舞郎之服也爵辨者六品以下九品以上從祀之服也武辨者武官朝參殿廷武舞郎堂下鼓人鼓吹按工之服也辨服者文官九品公事之服也輿服雜志子路問於孔子曰有人於此披褐而懷玉如何子曰國無道隱者可也國有道則衮冕而執玉家語平天宋更名曰平天冕天子郊禮及宗廟服之通典貂蟬冠胡服也貂者取其有文而不煥外柔而易內剛而徑蟬者取其清靈而識時變在位者有文而不自耀有武而不示人清靈自牧識時而動古今注補冠帽釋名曰帽冒也冒絮漢薄太后以冒絮提文帝晉輿服志趙飛燕為后其弟在昭陽殿遺飛燕書曰令月嘉辰貴姊懋膺大冊上遺金花紫綸帽以陳踴躍白綸帽孟達與諸葛亮書曰貢白綸帽一顏以示微意皂帽管寧在家恆著皂帽布裙隨時單復魏志朱然破魏將李典等軍斬首五百級得鼓車三乘拜然左大司馬加錫御織成帽吳書翠帽陸遜破曹休於石亭還上脫翠帽以遺遜上王濛字仲祖美姿容居貧帽敗自入肆買之嫗悅其貌爭遺新帽晉書金鏤石季龍將獵頭冠金鏤之帽蕭方等三十國春秋季龍獵著金鏤織成合歡帽陸翽鄴中記云沈慶之隨宗愨等代沔北諸山蠻大破之威震諸山群蠻皆稽顙慶之患頭風好著狐皮帽群蠻惡之號曰蒼頭公宋書元凶劭姓生三日帝往視之簪帽甚堅無風而墜于劭側上不悅上何尚之大明二年以左光祿開府儀同三司侍中如故尚之在家常著鹿皮帽及拜開府天子臨軒百僚陪位沈慶之於殿廷戲之曰今日何不著鹿皮冠上東昏侯自造遊宴之服綴以花采錦繡群小又造四種帽帽因勢為名一曰山鵲歸林以詩曰鵲巢夫人之德東昏寵嬖淫亂故鵲反藪二曰兔度坑天意言天下將有逐兔之事也三曰反縳黃離嘍黃口小鳥也反縳之應也四曰鳳凰度三橋鳳凰者嘉三橋梁王宅處也齊書破後帽永明中蕭諶開博風帽後裙之製又為破後帽世祖崩後建謀廢正誅滅諸王上徐龍駒常住含章殿著黃綸帽被貂裘南面向案代帝書勑上豫章王嶷妃庾氏常有病廖上幸嶷邸後堂設金石樂官人畢至登桐臺使嶷著烏紗帽因極宴盡歡到溉嘗夢武帝遍見諸子至湘東而脫帽與之於是尤敬事焉梁書初賀革之江陵也意甚不悅過別御史中丞江革以情告之答曰吾常夢主上遍見諸子惟至湘東王手脫帽以與之此人後必當璧卿其行乎上沙門寶志忽重著三布帽亦不知於何得之俄而武帝崩文惠太子豫章文獻王相繼夢上倭國男女皆露髻富貴者以錦繡雜采為帽似中國胡公頭上庚弘遠字士操清實有仕譽仕齊為江州長史刺史陳題達舉兵敗斬於朱雀航將刑索帽著之曰子路結纓吾不可以不冠而死上白紗帽桓崇祖為豫州刺史魏攻壽春崇祖著白紗帽肩輿上城決水破之安開者安成之俗師也善於幻術時王疑之為江州向王當行陽為王刷頭簪荷葉以為帽與王著當時亦不覺帽之有異到座之後荷葉乃見舉坐驚駭王不知幽明録皂帽辛紹先有至性丁父憂三年口不甘味頭不櫛沐髮遂落盡故常垂著裙皂帽後魏書齊制宮內唯天子紗帽臣下皆絨帽特賜平秦王歸彥紗帽以寵之上側帽獨孤信在秦州嘗因獵日暮馳馬入城其帽微側詰旦而吏人有戴帽者咸慕信而側帽焉後周書司徒帽高昂轉司徒公好著小帽世因稱司徒帽後魏書瓶上加帽后魏元孚貌短而禿性機辨周文以酒十瓶上皆加帽戲之孚曰吾兄弟甚無禮竊入王家宜早還家因持酒歸周文撫掌大笑史陳陳暄為后主狎客後傲弄轉甚后主不能容摶艾為帽使加于首爇之然及髮垂涕求哀弗什柳莊遽起發之并悸死上後周之時著突騎帽如今胡帽垂裙覆帶蓋索髮之遺象也又文帝項有瘤疾不卻人見每常著焉相魏之時著而謁帝故後周一代將為雅服小朝公宴咸許戴之隋書著榖帽唐初以榖為之以隔風塵唐寶録唐李晟收京師每與朱泚戰必錦裘繡帽自表李懷光惡之針曰將務持重豈宜自表襮為賊餌哉晟曰昔在涇原士頗相畏伏欲令見之奪其心耳本傳張巡前此遠將李滔救東平遂叛入賊大將田秀榮替與通或以告還曰晨出戰以碧帽為識視之如言盡覆其衆還輒日我誘之也請以精騎往易為識汝陽王璡戴砑硝帽打曲明皇自摘紅槿花置帽上極滑久而方安喚曰花奴壓耳帽代宗禁民皂衫壓耳帽以異官唐書危帽散衣李紳河南惡少危帽散衣白孔六帖李珣子七歲夢王母宴群仙舞者帶砑光帽帽上簪花舞山香曲未終百花盡落仇池筆記作李陶子蜀王衍晚年俗競為小帽僅覆其頂俯首即墮謂之危腦帽衍以為不祥禁之而衍好大大帽五代史膩帽蛤王仲郎坦之與林公絶不相得王謂林公危辨林公道王云著膩顏蛤綸巾布衣挾左傳逐鄭康成車後問是何物塵垢囊世說林公云文度著膩顏挾左傳逐鄭康成自為高足弟子篤而論之不離塵垢囊也語林巾謹也二十成人士冠庶人巾當自謹修於四教也釋名承露兩復結謂之幘巾或謂之承露巾或謂覆髮巾方言光武徵鮑永永疑不至及更始亡乃發去上將軍列侯印綬悉罷兵但幅巾與諸將詣河內幅巾謂不著冠但幅巾束首也後漢書華歆為豫章太守孫策略地歆知策善用兵乃幅巾迎策魏志曹操既猜嫌忌孔融令丞相軍謀祭酒路粹枉狀奏融云位為九列不遵朝儀禿巾微行唐突宮掖後漢書諸葛亮出斜谷司馬宣王拒之堅璧不與戰亮致巾幗婦人之飾以怒宣王魏志諸葛武侯與宣王在渭濱將戰宣王戎服蒞事使人視武侯乘素輿葛巾毛扇指揮三軍皆隨其進止宣王聞而嘆曰可謂名士矣蜀書縑巾漢末王公多委王服以幅巾為雅袁紹崔釣之徒雖為將軍皆著縑巾太祖以天下未定擬古皮辨裁縑帛以為之𢂿合簡易隨時之義以色別貴賤可謂軍容非國容也傳子何進袁隗欲特表陳實以不次之位實謝曰久絶人事飾巾待終而已大刀巾王敦欲伐甘卓遣使送大刀巾晉書著白綸巾謝萬字萬石簡文辟為從事中郎著白綸巾鶴氅裘版而前帝與談移日上陶潛在家郡將侯潛值其酒熟取頭上葛巾漉酒還暴著之宋書武帝賜陶元景以鹿皮巾後屢加禮聘並不出梁書武帝與何點有舊及踐祚手詔論舊賜以鹿皮巾等召之點以巾褐引入華林園上賀德基少遊學都門積年不歸衣資罄乏又恥服故敝盛冬止衣夾襦袴嘗於白馬寺前逢一婦人容服甚盛呼德基入寺門脫白綸巾以贈之仍謂曰君方為重器不久貧寒故以此相遺耳問姓名不答而去王僧孺遷尚書左丞俄兼御史中丞僧孺幼貧其母鬻紗巾以自業上宣政元年初服常冠以皂紗為之加簪而不施纓其制若今之折角巾也後周書隋大業十年左丞相牛儒下議請著桐子巾以桐木為之內皆漆詔從之劉馮事始剪紙帖巾張易之兄同休嘗謂王公大臣宴於司禮寺因謂御史大夫楊再思曰公面似高麗請作高麗舞再思欣然剪紙自帖其巾反紫袍遂作之唐書踣樣巾武后擅政多賜群臣巾子繡袍靳以回文之銘皆無法度不足紀至中宗又賜百官英王踣樣巾帝在藩時冠也車服志武攸暨安樂公主出降遣通事舍人李邈以璽書邀之詔見曰以葛為巾不名不拜自製巾裴冕自製巾子工甚人爭效之號僕射巾孔帖唐文宗性儉素不喜華侈駙馬韋處仁戴夾羅巾帝謂之曰慕卿門第清素以之選尚如此巾服從他戚為之惟卿非所宜也李願節度鳳翔用婚家竇綏典帳中兵驕驁怠沓衙將李臣則等因衆不忍夜斬綏首願聞變不及巾與左右數人縋而逸楊供奉官及詣司長官則有羅巾圓頭巾子後遂不改車服志昭宗播遷於鳳翔朱梁率諸道甲馬奉迎車駕時侯王將帥在歧下者皆以珠一顆盤幞頭腳貫以銀線而簪之又軍人咸以珠飾巾競相誇尚洎朱梁纂立乃知珠已居人上者久矣秦再思紀異皇甫玄真于新羅得一辟塵巾持與高瑀乞田知性命翌日試于郭外時久旱塵埃且甚高顧視馬尾鬛及左右騶從並無纖塵執之體覺虛涼酉陽器奇尖巾前蜀王衍好褁尖巾其狀如錐車服志山簡鎮襄陽優游卒歲唯酒是耽諸習氏荊土豪族有佳水池簡每出嬉遊多之池上置酒輒醉名之曰高陽池時有兒童歌曰山公出何許往至高陽池日夕倒載歸酩酊無所知時時能騎馬倒著白接籬舉鞭向葛彊何如并州兒彊家在并州簡愛將也晉本傳覆髻謂之幘巾或謂之承露或謂之覆髻皆趙魏之間通語也方言不冠之服幘古卑賤執事不冠者之所服也漢官儀未冠童子幘無屋者未成人也入學小童幘也句卷屋示尚幼小未遠冒也通典晢幘齊侯伐晉夷儀東郭書讓登犂彌從之云云齊侯賞犂彌犂彌辭曰有先登者臣從之晢幘而衣貍裘晢白也齒上下相值製裘也上古者有冠無幘秦加其武將首飾為絳柏以表貴賤後稍作顏題漢興續其顏却結之施巾連題却覆之今喪幘是也至孝文乃高顏續為之耳崇其巾為屋貴賤皆服之漢輿服志武帝從館陶公主飲董偃緑幘傳韝伏殿下乃贊曰館陶公主庖人臣偃昧死再拜謁漢書絳衣赤幘光武初起與諸李市弓弩絳衣赤幘東觀漢記坦幘馬援初見帝令中黃門引入上在宣德殿南廡下坦幘坐援曰陛下何知臣非刺客姦臣而簡易若是上馬援外類儻蕩簡易而內重禮事寡嫂雖在閨內必幘然後見上幘壞不改巴祇字敬祖為揚州刺黑幘毀壞不復改易以水澡墨傳而用之許慎說文曰澡洗也後漢書幘肆許劭字子將劭知人入幘肆拔樊子昭續漢書孫堅屯七梁東為董卓所攻衆少而不敵與其驍騎潰圍得出常著赤罽幘卓騎追堅堅脫罽幘令親近持祖茂著之堅從間道得出春秋顧悌字子通疾篤妻出省之悌命左右自扶起冠幘加襲令妻還真潔不黷如此吳書廋顗字子嵩性儉家富劉與說東海王越令就換錢千萬冀其有吝因此可乘越於衆坐中間顗顗頽然已醉幘墮機上以頭就穿取徐答示下官家故有兩千萬隨公所取矣與於是乃服越甚喜晉書檀道濟數拒魏有功及誅憤怒氣盛目光如炬俄爾間引飲一斛乃脫幘投地曰乃壞汝萬里長城宋書謝舉臨川始興諸王常所遊踐邵陵王綸於婁湖立園廣燕酒後好聚衆賓冠手自裂破投之唾壺皆莫敢言舉嘗預宴王欲取舉幘舉正色曰裂冠毀冕下官弗敢聞命拂衣而去王屢召不反甚有慚色梁書著幘不安平秦王歸彥額骨三道著幘不安文宣見之怒使以馬鞭繫其額血出面曰爾反時當以此骨嚇漢後歸彥竟反云北齊書漢元帝額有壯髮不欲使人見始進幘服群臣皆隨焉尚無巾王莽頭禿因施巾故里語曰王莽禿幘施屋蔡雍獨斷庫幘梁冀改易輿服之制作平上軿車庫幘狹冠也漢書桓帝延熙中梁冀誅後京師作幘皆顏短耳長短上長下以為服妖輿服雜事平幘公孫瓚字伯圭上計吏郡太守劉基以事公車徵伯圭褠衣平幘御車洛陽身執徒養英雄記昔魏武軍中無故作白幍此喪徵也神橫縫其前名之曰顏晉永嘉初乃去其縫名無顏幘其後王平四海分崩卞火悲嘆無顏以生也搜神記晉明帝年少不倫常微行詔喚入以衣幘迎之涉水過衣幘悉濕元帝已不重明帝忽復有此以為無不廢理既入幘不正元帝自為正之明帝大喜語林哀帝隆和元年太學博士曹攸之等議立秋應讀令不應著緗幘改為素晉書要事緗幘謁者著緗幘大冠漢官凡救曰蝕者皆著赤幘以助陽也侍臣皆赤幘帶劍摯虞夬疑翡翠幘交址蒼梧俗以翡翠為幘廣志介幘中書監令著介幘衣始世本曰胡曹作衣宋衷注曰黃帝臣也隱形衣者隱也裳者鄣也所以隱形自鄣蔽也白虎通庇寒暑衣者依也人所依以庇寒暑也釋名衣梳謂之視黼領謂之襮緣謂之純衴謂之褮衣眥謂之襟衱謂之裾襟謂之袸佩襟謂之褑執衽謂之袺扱衽謂之襭衣蔽前謂之襜婦人之禕謂之縭縭緌也裳削幅謂之纀爾雅孔子曰昔先生未有火化食草木之實鳥獸之肉飲其血茹其毛未有絲麻衣其羽皮後果有作治其絲麻以為布帛禮器臧哀伯曰衮冕黻珽帶裳幅舄衡紞紘綖昭其度也藻率鞞鞛鞶厲游纓昭其數也火龍黼黻昭其文也五色比象昭其物也桓二藍縷欒武子曰訓之以若敖蚡冒篳路藍縷以啓山林宣下不得曳地文帝衣弋締所幸慎夫人令衣不得曳地史記齊國有三服之官奉獻冠幘縱為首服紈素為冬服輕綃為夏服漢書武帝末郡國賊盜群起暴勝之為置指使者衣錦衣持斧捕之上朱慱為琅琊太守勑官屬多作褒衣大祒不中節度自冬掾吏衣皆令去地三寸上帝賜南粵王他上禇五十衣中禇三十衣下禇二十衣江充初召見大臺宮自請願以所常被服冠見上上許之充衣紗縠禪衣曲裙後垂交輸冠禪纚綴搖冠飛翮之纓容貌甚壯帝望而異之謂左右曰燕趙固多奇士上雋不疑佩環玦褒衣博帶盛服至門下謁暴勝之上衣服鮮明王吉字子陽好車馬衣服自奉養極為鮮明而遷徙所載不過囊衣天下服其潔而怪其奢世傳陽能作黃金也上更始時授官爵皆群小賈豎膳夫庖人多著繡而衣錦袴襜褕諸子罵詈道中時智者見之以為服之不中身之災也後漢祭遵為人廉節家無私財常衣韋袴寢布被夫人裳不加緑上祭彤在遼東幾三十年衣無兼副顯宗美其清約賜之衣被什物無不悉備上衣屨耿恭自疏勒還衣屨穿決形容枯稿上明德為后身長七尺二寸方口美髮能卜易好讀春秋常衣大練裾不加緣朔望諸姬主朝請望見后袍衣踈粗反以為綺縠就視乃笑后辭曰此繒特直染色故用之耳六宮莫不歎息上袁忠乘船戴笠詣王朗見朗左右僮從皆著青絳采衣非其奢麗即辭疾發而退謝承後漢書郭賀拜荊州刺史有殊政顯宗巡狩到南陽特見嗟嘆賜以三公之服黻黼冕旒勑行部去襜幃令百姓見其容服以彰有德上文帝詔曰三世長者知被服五世長者知飲食此言被服飲食難曉也魏志明帝徵管寧為光祿勳辭不就詔問青州刺史程喜寧守節高乎審疾至頓耶喜上言寧相著皂帽布襦袴而裙隨時單復出入閨庭能自任杖不須扶持四時祭祀輒自力強改加衣服著絮巾故在遼東所有白布單衣親薦饌饋跪拜成禮上文昭甄后以漢光和五年十二月丁酉生每寢寐家中髣佛見有人持玉衣覆其上者常共怪之魏略王允為吏部郎中選郡守明帝疑其所用非次召入將加罪允妻阮出謂曰明主可以理奪難以請求允頷之而入帝怒詰之允對曰某郡太守雖限滿文書先至年限在後月限在前帝取事視之乃釋遣山望其衣敗曰清吏也魏氏春秋孫權每賜周瑜衣寒暑皆百領諸將皆不能及吳書石崇以奢豪矜物廁常有十餘婢列侍置香粉有客如廁皆易新衣而出客多羞脫故而王敦脫故著新意氣無怍婢相謂曰此必能作賊晉書高士郭文字文舉河內軹人也洛陽陷入吳居大辟山恆著鹿裘葛巾餘杭令顧揚與葛洪造之揚使致韋布衣不納使置室中乃爛於內竟不服用上今本作袴褶一具董威輦不知何許人忽見洛陽止宿白社中於市得殘許繒輒結以為衣號曰百結衣王隱晉書沈慶之領隊防東掖門劉湛被收之夕上開門召慶之慶之戎服履韎縳袴入上見而驚曰卿何意乃爾急裝慶之曰夜半喚隊主不容換服宋書著小皮衣明帝體肥憎風夏月常著小皮衣上明帝疾召禇彥回入帝坐帳中流涕曰吾近危篤故召卿欲使著黃羅耳指床頭大函曰文書皆函得不復開彥回亦悲不自勝黃羅乳母服也上范曄性精微有思致觸類多善衣裳器服莫不增損制度世人皆法學之上浣衣稱疾江湛字微深為吏部尚書家甚貧不營財利餉饋盈門一無所受無兼衣餘食嘗為上用召遇浣衣稱疾經日衣成然後起上謝超宗為義興太守升明二年公事免詣東府門自通其日風寒高帝謂曰座曰此客至使人不衣自暖上白服侍宴宋元嘉制諸王入齊各得自服裾帽見主人唯出太極西廂乃備朝衣車駕幸其弟乃白服烏紗帽以侍宴焉至於衣服制度動皆陳啓事無專制齊書高帝即位後手詔賜張融衣曰見卿衣服粗故成乃素懷有本交爾藍縷亦虧朝望今送一通故本意謂雖故乃勝新也是吾所著已令裁減稱卿之體衣履一量上脫朝服陶元景永明十年脫朝服掛神武門上表辭祿詔許之上王思遠立身簡潔諸客詣已者覘知衣服垢穢方便不前儀形新楚乃與促膝雖然及去之後猶令二人交帚拂其坐處上戒嚴須紫王琨性儉約景和中討義陽王昹六軍戒嚴應須紫服左右欲雲辨琨曰元嘉初征謝晦有紫服在匣不須臾製檢取果得焉上朝服穿補劉溉性率儉不好聲色庭室單床傍無姬侍冠履十年一易朝服或至穿補梁書何敬容為吏部尚書侍中領太子中庶子敬容身長八尺白哲美鬚眉性矜莊衣冠鮮麗武帝雖衣而左右衣必須潔嘗有侍臣衣帶卷摺帝怒曰卿衣帶如繩欲何所縳敬容希旨故益鮮明常以膠清刷鬚衣裳不整伏床尉之或暑月皆為燋上任昉有子東里西華南容北庾西華冬月著葛帔練裙上任昉為義興太守友人彭城劉溉弟洽從昉共為山澤遊及被代登舟止有絹七匹米五石至都無衣鎮軍將軍沈約遺裾衫迎之上樂浪王萬壽孫忠明帝時位太常少卿孝武帝泛舟天泉池命宗室諸王陪宴忠愚而無智性好衣服著紅羅襦繡作領碧納袴錦為緑帝謂曰朝廷衣冠應有常式何為著百戲衣忠曰臣少來所愛情存綺羅歌衣儛服是臣所願帝曰人之無良乃至此乎後魏書乖靡見譏胡叟於高允館中見書侍郎李璨被服華靡叟貧老衣褐璨頗忽之叟謂曰老子今若相脫體上袴褶衣帽君欲作何計也譏其唯假成服璨愓然失色上文宣因元韶幽於京畿地牢絶食啖衣袖而死上爾朱敞字乾羅彥伯之誅敞小隨母養於宮中年二十敞自竇走大街見童兒群戲解所著綺羅金翠服易衣而遁追騎至不識敞便執綺衣兒比究問知非會日已暮由是免北齊書徐陵為吏部尚書精簡人物縉紳之士皆嚮慕焉陳暄以玉帽簪插髻紅絲布褁頭袍拂踝靴至膝不陳爵里直上陵坐陵不知識命吏持下暄徐步而出舉止自若竟無怍客作書謗陵陵甚病之陳書齊後主於苑內作貧兒村親衣繿縷之服而行乞其間以為笑樂多令人服烏衣以相執縳後主果為周所敗被虜妃后窮困至以賣燭為業隋書差等太宗詔冠冕制度已備令文尋常服飾未為差等於是三品以上服紫四品以上服緋六品七品以緑八品九品以青婦從夫之色仍通服唐書鳴玉曳組李綱帝以舞工安叱奴為散騎常侍綱諫曰魏武使禰衡擊鼓衡先解朝衣曰不敢以先王法服為伶人衣今先令舞胡鳴玉曳組位五品趨丹地殆非創業垂統貽子孫之道李密簡驍勇數十人衣婦人服戴羃內離藏刀裙下詐為家婢妾者入桃林傳舍須臾變服出據其城閻立德遷尚衣奉御制衮冕六服腰輿傘扇咸有典法張易之時無檢輕薄者又諂言昌宗乃王子晉後身后使被羽裳吹蕭乘寓鶴裴回庭中如仙去狀楊妃寵愛特甚宮中主貴妃刺繡者七百人楊益及諸戚里每歲進衣服布之於庭光奪人目楊國忠侍郎韋見素張倚與本曹郎趨走堂下抱按牘國忠顧女弟曰紫袍二主事何如皆大噱奇服玄宗貴妃楊氏奇服變化若神孫孝哲契丹部人祿山對側門俟召衣帶絶不知所為孝哲針縷素具徐為紉綻祿山大悅覆以己袍安祿山林甫稍厚之引至中書覆以己袍寶雞袍賜安祿山品目有金鸞紫羅緋羅立馬寶雞袍酉陽雜俎開元中賜邊衣製自宮中有軍校袍中得一詩云留意多添線含情更著綿令生已過了重結後生緣持詩白帥帥以聞明皇問之有一宮人自言萬死即以嫁得詩者與汝結今生緣本事詩天寶初貴族及士民好為胡服胡帽婦人則簪步搖叉袗袖窄小楊貴妃常以假髫為首飾而好服黃裙近服妖也時人為之語曰義髻拋河裏黃裙逐水流安樂公主使尚方合百鳥毛織二裙正視為一色旁視為一色日中為一色影中為一色而百鳥之狀皆見以其一獻韋后五行志安樂公主初出降益州獻單絲碧羅籠裙縷金為花鳥細如絲髮大如黍米眼鼻觜甲皆備瞭視者方見之著白者山人李泌肅宗即位欲授以官固辭願以客從入議國事出陪輿輦衆指曰著黃者聖人著白者山人帝聞因賜金紫肅宗廢后張氏駐靈武産子三日起縫戰士衣太子敕止對曰今豈自養時耶肅宗性節儉嘗出衣袖示近臣曰此衣已三浣矣初德宗居奉天儲蓄空窘嘗遣卒視賊以苦寒乞襦袴帝不能致剔親王帶金而鬻之食貨志韋綬德宗時為翰林學士帝嘗幸其院韋妃從會綬方寢學士鄭栶欲馳告之帝不許時大寒以妃蜀襭袍覆而去其待遇若此文綵非制貞元六年德宗初賜節度觀察使新製時服尚方織作呈閲所宜上曰頃來賜衣文綵不恆非制也朕今思之節度使以雕銜綬帶取武毅以靖封內觀察使以鴈銜威儀委取其竹列有序牧人有威儀也陽城德宗召拜諫議大夫遣長安尉楊寧齎束帛詣其家城褐衣到闕下辭讓帝遣中人持緋衣衣之和政公主代宗以主貧詔諸節度餉億主一不取親紉綻裳衣諸子不敢服紈絺楊炎道州還也家人以緑嫩木簡棄之炎止曰吾嶺上一逐吏超登上台可常哉且有非常之福必有非常之禍安可棄是及貶還所服無文綺飾盧懷謹服無文綺之飾解衣衣之陸贄帝親倚至解衣衣之同類莫敢望武儒衡宰相鄭餘慶不事華潔門下客多垢衣敗服獨儒衡上謁未嘗有所易常衣垢弊蕭復傳常衣垢弊柳公權嘗與六學士對便殿帝稱漢文帝恭儉因舉袂曰此三浣矣學士皆賀獨公權無言帝問之對曰人主當進賢退不肖納諫諍明賞罰服瀚濯之衣此小節爾賈直言始劉悟子從諫貴甚見直言輒衣紫擁笏以兵自衛直言諫悟曰郎少年無使襲山東熊朝服可擅著耶文帝朝淮南節度使李德裕奏比以婦人長裾大袖朝廷制度尚未頒行微臣之分合副天心比聞閭閻之間神闊四尺今令闊一尺五寸裙曳四尺今曳五寸初延安公主以衣服踰制駙馬竇浣得罪德裕因而奏之李德裕臣在先朝嘗獻大明賦以諷二曰正服諷服御非法也視衣製廣狹漢陽公主文宗尤惡世流侈因主入問曰姑所服何年法也今之弊何代而然對曰妾自貞元時辭宮所服者皆當時賜未嘗敢變元和後數用兵悉出禁藏纖麗賞戰士由是散於人間內外矜似以成風若陛下示所好于下誰敢不變帝悅詔宮人視主衣製廣狹遍諭諸主衣紫韋澳一日召入屏左右問曰朕於敕使何如澳陳帝威制前世無比帝搖首曰未也策安出澳倉卒答曰若謀之外廷則大和事可用追鑒不若就擇可任者與計事帝曰朕固行之矣自黃至緑自緑至緋猶可衣紫即合為一矣夏侯端壽春人王世充遣人以淮南郡公尚書少吏部印綬召端解衣服以贈端曰吾天子使寧污賊官耶非持首去不可見即焚書及衣張仲武范陽人子直方時鄭畋輔政頗言仲武會昌中功第一今直方百口不自存每內燕以衣敝惡辭不赴陛下録功念舊宜少優假周智光先是淮西李忠臣入朝次潼關聞智光反率兵討之會敗忠臣因入華大掠自赤水至潼關畜産財物皆盡官吏至衣紙自蔽纍日不食者開成初李紳為河南尹河南多惡少或危帽散衣擊大毬當官道車馬不敢前紳治剛嚴皆望風遁去不為鮮明盧鈞玩服不為鮮明衣服喜鮮明李貞素衣服喜鮮明衣錦半臂來子珣遷遊擊將軍常衣錦半臂自異軿羅衣敬宗寶曆二年閩東國貢舞女二人衣軿羅之衣無縫而成其文巧織人未之識焉淮南觀察使李德裕令管內婦人衣褒四尺者皆闊一尺五寸裙曳地四五寸者減三寸銀緋張宿使淄青裴度欲為請銀緋韋貫之曰宿奸佞吾等縱不能斥奈何欲假以寵乎唐咸通末淮南李公游江舟子刺船誤為竹蒿所濺水濕近侍衣李公為之變色裴餘慶時佐幕適在坐遽獻詩云半額鵝黃金縷衣翠翹浮動玉叉垂從教水濺羅襦濕疑是巫山行雨歸周逢行為武安節度婦人所著裙皆不縫謂之散幅裙或曰裙之于身以幅多為尚周匝子身今乃散開是不周也不周不縫是姓與名俱去矣幅者福也福破散其能久乎未幾行逢卒陶嶽荊湖近事蜀王衍嘗與太后太妃遊青城山宮人衣服皆畫雲霞飄然望之若仙楊行密嘗過楚州臺濛盛供帳之行密一夕去遺衣臥內皆經補浣濛浣之行密曰吾興細微不敢忘本君笑我耶濛大慚昭宗既誅宦官第五可範等準國故事量留三十人各賜黃絹衫一領以備宮中指使仍不得輒有養男其左右神策軍諸道監軍並令停廢陳無已趙挺之邢和叔皆郭大夫壻陳在館職當侍祠郊丘非重裘不能禦寒氣無已止有其一其內子為於挺之家假以衣之無已詰所從來內以實告無已曰汝豈不知我不著渠衣邪却之既而遂以凍病而死謝克家作其文集序中有云篋無副裘又云此豈易衣食者蓋指此事朱語録寶衣武王伐紂紂蒙寶衣投火而死六韜齊桓好服紫國人盡服之公患之管仲曰君謂左右甚惡紫臭於是三日境內莫有紫衣者韓子季文子相宣成無衣帛之妾無食粟之馬仲孫它諫曰子為魯上卿妾不衣帛馬不食粟人其以子為愛且不華國乎文子以告孟獻子獻子囚之七日自服之妾衣不過七升之布文子聞之曰過而能改者民之上也使為上大夫魯語偏裻之衣晉獻公使太子申生伐東山衣之偏裻之衣佩之金玦僕人贊聞之曰大子殆哉君賜之奇奇生怪怪生無常無常不立使之出征先以觀之且是衣也狂夫阻之衣也晉語狂夫方相氏之士也阻古詛字將服是衣必先詛之晉文公好仕之惡衣故文公之臣皆牂羊之裳韋以為帶墨子昔晉國苦奢文公以儉矯之乃衣不重帛食不兼肉無幾時國人皆大布之衣脫粟之飯尹文子宋景公之時懸四時衣春夏以珠玉為飭秋冬以翡翠為溫拾遺録戎夷違齊如魯天大寒而後與門弟子一人宿於郭外寒逾急謂其弟子曰子與我衣我活我與子衣子活我國士也為天子惜死子不肖也不足愛子與我衣弟子曰夫不肖之人安能與國士衣哉戎夷解衣與弟子夜半而死弟子遂活呂氏春秋懸蓑林類榮啓期衣若懸蓑淮南齊林既者衣葦朝景公景公曰何忽服小人衣耶林既曰衣狗裘者必不羊鳴今君衣狐裘音必能不狐乎說苑魏文侯封太子擊於中山三年使不往來舍人趙倉唐奉使侯問子之君長大孰與寡人倉唐曰君賜之外府之衣則能之勝文侯遣倉唐賜太子衣一襲令倉唐雞鳴時至太子迎拜賜發篋衣盡顛倒太子趣具駕曰賜之衣非以為寒也欲召擊也無誰與謀故遺豫以衣詩曰東方未明顛倒衣裳顛之倒之自公召之上子夏家貧衣若懸鶉人曰子何不仕曰諸侯之驕我者吾不為臣大夫之驕我者吾不復見也孫卿子緇衣狗吠楊朱之弟楊布衣素衣而出天雨緇衣而反其狗吠之布恐將擊之朱曰使汝狗白而往黑而來能不怪哉韓子莊子衣大布之衣而過魏王魏王曰何先生之憊耶莊子曰士有道德不能行憊也衣弊履穿而貧者非憊也莊子田文謂其父靖郭君曰君後宮蹈綺縠之衣而士不得短褐春秋後語高祖時大謁者臣章受詔長樂官令群臣議天子所以服以安天下謁者趙堯舉春李舜舉夏倪湯舉秋貢禹舉冬四人各職一時制曰可舉者以各舉一時之事白之五時衣始於是漢雜事綴草為衣天漢三年渠搜國之西有祈淪國其俗淳和人壽三百歲有大壽木之林一樹千尋若經憩此木皆不死不病或有泛海繩山來會其國綴毛草為繩結網為衣如今之羅紈也至元狩六年獻網衣一襲帝焚於九達之道恐後人徵求此物故燒之烟如金石之氣拾遺員嶠山南有池移國人長三尺壽萬歲以茅為衣衣服皆長裾大袖因風以升烟霞若鳥用羽毛也織茅為衣禮敬國其俗人年三百歲而織芳茅以為衣蓋尚書云島夷卉服之類也任末年十四時學無常師夜則映星望月暗則縷麻蒿以自照觀書有合意者題其衣裳以記其事門徒悅其勤學更以靜衣易之時人謂任氏為經苑王昌字公伯為東平相散騎常侍早卒婦是任成王曹子大女昌弟式字公儀為渡遼將軍長史婦是尚書令桓階女昌母聰明有典教二婦入門皆令變服下車不得踰侈後偕子嘉尚魏主欲金縷衣見其式婦歸嘉止之曰其嫗嚴固不聽善耳不須持往犯人家法襄陽耆舊傳明帝寵愛肇與帝戲賭衣服有所獲輒入御帳服之趣出親狎如此曹肇傳襲私服齊王冏為大司馬輔政稽紹為侍中詣冏咨事冏召葛旟董艾等共論時宜旟等白冏曰稽侍中善於絲竹公可能操之遂進樂器紹推却不受冏曰今共為歎卿何却耶紹曰公協輔皇室今作事可法紹雖官卑職備常伯豈可以先王法服為令人之業今逼高命不敢有辭當釋冠冕襲私服此紹之心也旟等不自得而退世說桓車騎不好著新衣浴訖婦故送新衣車騎大怒催使將去婦便持還傳語云衣不經新何由而故桓大笑而著之上阮宣子論鬼神有無或以人死有鬼阮子獨以為無曰今見鬼者云著生時衣服若人死有鬼衣服亦復有鬼乎上太始元年魏帝以陳留王之歲有頻斯國人來朝以五色玉為衣如今之鎧拾遺録曹操遣女皂帳婢婢十人東阿婦以繡衣賜死王景興以淅米見誚南齊書崔祖思傳霍光傳珠璣玉衣師古曰漢儀注以玉為襦如鎧狀連綴之以黃金為縷要以下玉為札長尺廣二寸半為柙下至足亦綴以黃金縷也上賜霍光玉衣梓宮耿秉死上亦賜玉衣貴人死者珍異之服也上古穴居衣毛未有制度後聖人易之以絲麻觀之翬翟之文榮華之色乃染帛以效之始作五采成以為服凡十二章董巴漢輿服志古之人未知衣服之制故聖人作之冬則綿帛暖且溫夏則絺綌清且涼所以適身體和肌膚也墨子老而衣絲古者庶人老耋而後衣絲其餘則麻而已鹽鐵論吳選曹令史劉卓並荒夢見一人以白越單衫與之言曰汝著衫汙火燒便潔也卓覺果有衫在側汙輒火浣之魏文帝列傳何宴好服婦人之服傅玄曰此服妖也夫衣裳之制所以定上下殊內外也大雅云玄衮赤舄鉤膺鏤錫歌其文也小雅云有嚴有翼共武之服詠其武也若內外不殊王制失敘服妖既作身隨之亡姝嬉冠男子之冠桀亡天下何晏服婦人之服亦亡其家其咎均也狄仁傑轉幽州都督賜紫袍龜帶武后自製十二金字環統五色雙鸞其文曰敷政術守清勤升題位勵相臣乃命録之家傳朱桃椎益州成都人淡泊絶俗被裘曳索人莫能測其為長史竇軌見之遺以衣服鹿幘麂鞾逼署鄉正委之地不肯服衮冕者一品之服也鷩冕者二品之服也毳冕者三品之服也絺冕者四品之服也玄冕者五品之服也平冕者郊廟武舞郎之服也爵辨者六品以下九品以上從祀之服也武辨者武官朝參殿庭武舞郎堂下鼓人鼓吹按工之服也辨服者文官九品公事之服也進賢冠者文武朝參三老五更之服也遠遊冠者親王之服也法冠者御史大夫中丞御史之服也高山冠者內侍省內謁者之服也委貌冠者郊廟文舞郎之服也却非冠者亭長門僕之服也平巾冠者武官衛公事之服也黑介幘者國官視品府優謁府國子太學生四門生俊士參見之服也介幘者流外官行署及三品以下登歌工人之服也緑幘者尚食局主膳典膳局典食大官署食官署供膳奉觶之服也具服者五品以上陪祭朝饗拜表大事之服也從省服者五品以上公事朔望朝謁見東宮之服也大尉長孫無忌議服袍者下加襴緋紫緑皆視其品庶人以白出車服志則天光宅元年九月甲寅易內外官服青者以碧前蜀王衍嘗與太后太妃遊青城山宮人衣服皆盡雲霞飄然望之若仙金字銘袍永壽中勑賜嶽牧金銀字銘袍雞跖集伯余之初作衣也緂麻索縷手經指挂其成猶網羅後世為之機杼淮南汜論甚遼衣服鬼名甚遼焚衣街齊東昏侯製四種冠五彩袍一月中二十餘出晨出三更歸夜出清晨反梁廢東昏焚奢淫異服六十二種于御街後人號其所曰焚衣街金陵志帝嘗問丈夫冠婦人髻皆高大何邪令狐德棻對曰冠髻在首君之象也晉之將亡君弱臣彊故江左士女衣小而裳大宋武帝時命君德尊嚴衣裳隨亦變改此近事驗也唐書紗榖單衣江充召見上衣紗榖單衣曲裾後垂交輸漢書陳留尹苞字延博與同郡范史雲善二人俱貧出入共一單衣到人門外苞年長常先著單衣前入須臾出解與史雲謝承後漢書衣補車幰梁孝王彤宣帝子將軍衣補車幰以此為清參軍王銓曰晏嬰大官稱清者以為御食七百家也公無此費宜美衣服使內外相稱彤有慚色王隱晉書鄭弘為縣嗇夫民有弟斥兄錢者未還之嫂領詣弘賣中單為叔還錢兄聞之慚遣婦賫錢還弘弘不受會稽典録吳祐為曜東相嗇夫孫性盜富民錢五百為父市單衣父恐便以單衣謁門自謝祐遂以單衣遺其父陳留耆舊傳梁冀作火浣布單衣會賓客行酒失杯而污之僞怒解衣而燒之垢盡火滅粲然潔白傳子梁冀作狐尾單衣上短下長別傳邊讓才辨俊逸孔融薦讓於武帝曰邊為九州之被則不足為單衣襜褕則有餘別傳華曜懷愧張君平與妹憲書曰念諸里舍皆富財賄袿䙱襲蔽紛華照曜於是之際想汝懷愧婦人集介幘優申石勒參將周承為館陶令斷官絹數百匹獄以入坐議宥之後每設大會使優兒著介幘黃絹單衣優問曰汝何官答曰我本為館陶令斗藪單衣曰正坐取是故入汝輩以為本笑趙書靈帝欲以羊續為太尉時拜三公者皆輸東園禮錢千萬中使督之續乃舉縕袍以示之曰臣之所資惟斯而已故不登公位袁山松後漢書續出黃紙補袍以示使人時人謠曰天下清苦羊續祖古今善言郭璞每自為卦知其凶終嘗逢一趍走來年便脫青絲袍與之此人不解其意璞曰身命卒當在君手故逆相屬耳及當死果此人行刑傍人皆為屬求利璞曰我常託之久矣此人為之歔欷哽咽行刑既畢乃說如此搜神記有談生者年四十無婦夜有女年十六六姿色無雙來為生妻經三年遂乃生一兒曰慎勿以火照我後三年可照耳生不能忍照之腰上肉如人腰以下但枯骨婦求去將入華堂奧室以珠袍與之生至市賣袍睢陽王識是女袍收栲談生談生具對呼兒似王女搜神記母丘儉征浟使王頃窮其東界父老云曾有破船從漢海流得布衫身如中國人但兩袖俱長三丈異苑博袍楚莊王鮮冠縕紐纓絳衣博袍以理其國政也墨子短衣襦短衣也一曰𦍀衣𦍀溫也奴案反說文襦暖也言溫暖也單襦如襦而無絮也反閉襦之小者也却向著之領含於項反於背後閉其襟也釋名子産治鄭鄧析務難之約民大獄一衣小獄襦袴鄭國大亂子産殺鄧析而民服呂氏春秋勾踐與妻入臣吳夫人衣無緣之裳左開之襦莝以養馬吳越春秋班伯為侍中與王許子弟為群在於綺繻紈袴之間非其好也漢書昌邑王被廢太后被珠襦如淳曰以珠飾襦晉書曰貫珠為襦盛服坐武帳中王前聽詔珠襦豫賜哀帝以東園祕器珠襦玉柙皆豫以賜董賢織襦趙飛燕為皇后其弟在昭陽殿上遺織成上襦兩京雜記待詔景子春素善占坐事繫其婦朱君至獄門通言遺襦袴子春驚曰朱君來言與朱為誅袴而襦中絶者也我當誅斷也後遂腰斬桓談新論鍾離意為司徒侯霸府議曹掾詔送三百人到河北遇隆恩到弘農意輒使屬縣令出錢與徒作襦袴光武謂侯霸曰君所使吏仁恕用心乎吳越春秋襜襦來歙詣雒見上上大喜解所披襜襦衣歙東觀漢記布襦第五倫性節儉為二千石常衣布襦上梁鴻妻孟氏女布襦袴裙鴻曰此真梁鴻妻也上皂帽布襦管寧嘗著皂帽布襦隨時單復魏志司馬宣王從遼東還有六十假士寒凍于車乞一襦公乞之酒左右曰官不少襦可賜之公乞之酒曰襦官中物臣無私施世說謝眺為吏部侍郎過侯江革時大寒雪見革敝絮單席而耽學不倦嗟嘆久之乃脫其著襦并手割半氈與之充坐具而去紫羅襦謝鎮西著紫羅襦據胡床彈琵琶作大道曲語林武陵昭王頴過竟陵王子良宅冬月道逢乞人脫襦與之子良見其衣單進襦於頴笑曰我與向人亦復何異齊書不敢解襦顧協少清介有志操初為廷尉正冬服單薄寺卿蔡法度欲解襦與之憚其清嚴不敢發口謂之曰我願解身上襦與顧郎難衣食者竟不敢以遺之梁書常服布襦郭祖深清儉常服故布襦上索君正為豫章內史性不信巫邪有師世榮稱道術為一郡巫長君正在郡小疾主簿熊丘簏巫師云須疾者衣為信命君正以所著襦與之事竟取襦云神將送與北斗君君正使檢諸身於衣裏獲之以為亂政即刑於市而焚神一郡無敢行巫上高祖復至鄴見公卿曰朕昨日入城見車上婦人冠帽而著小襦襖者尚書何為不察任城王澄曰著者猶少帝曰任城意欲全著乎一言可以喪邦其斯之謂可命史官書之後魏書珠襦吳王闔閭葬女以珠襦之寶吳越春秋夏著暑襦紐伯子者冬著單衣盛暑襦袴列仙傳青襦東海君以織成青襦遺陳節方列異傳乾羅者慕容廆之十一世祖也著金銀襦鎧乘白馬金銀鞍勒自天而墮鮮卑神之推為君長述異記衫芟也衫末無袖端也襦襠其一當胸其一當背也釋名襜襦陳魏宋之間謂之襜或謂之單襦揚雄方言建康小吏曹著為蘆山使君所迎配以文婉著形意不安屢求請退婉潛然流涕賦序別并贈織成禈衫也晉東宮舊事寄愍懷以體上白絹單衣一領因士寄與妃晉惠帝起居注納布徐湛之母會稽公主高祖微時有納布衫襖等衣皆是武敬皇后手自作高祖既貴以此付公主曰後代若驕奢不節者以此示之宋書薛安都與魏多縱突騎衆軍患之安都怒甚乃脫兜鍪解所帶鎧唯著絳納兩襠衫馬亦去具裝馳馬賊陳猛氣咆𠷺所向無當其鋒者宋書到溉為建安太守任昉以詩贈之求二衫云鐵錢兩當一百代易名實為惠當及時無待涼秋曰溉答云余衣本百結閩中徒入蠶假令金如粟詎使廉夫貪上太始二年御史丞羊希奏山陰令謝洸親憂未除常著青絳納兩襠請免沈前所居官也宋起居注陽休之除散騎常侍監修起居注頃之坐事左遷驍騎將軍衣兩襠文宣郊天百僚咸從休之為驍騎將軍衣兩襠用手持白棓時魏收為中書令嘲之曰義真服未休之曰我昔為常伯首戴蟬冕今處驍遊身被衫甲允文允武何必減卿談笑晏然議者服其夷曠齊書德宗在梁州地熱未給將士春衣夾服以侍朝左右請御衫上曰從我者冬服未易我豈可獨衣衫乎將士聞之莫不流涕唐書下裳裙下裳也連接裙幅也緝下橫縫緝其下也緣裙裙施緣也釋名裏衣裙裏衣也古服裙不居外皆有衣籠也上帔裙陳魏之間謂裙為帔繞襟謂之裙方言織成趙飛燕為皇后其女弟上織成下裙西京雜記無緣戴良家五女皆布裙無緣裙四等汝南先賢傳布裙王良為司徒司直妻布裙徒跣曳柴東觀漢記禿裙漢明德太后禿裙不緣續漢書長裙上短獻帝時女子好長裙而上甚短五行志燉煌俗婦人作裙攣縮如羊腸用布一匹皇甫隆為太守禁改之魏略恆著管寧恆著布裙魏志崇進皇太后為太皇太后有絳碧絹雙裙絳絹䙱裙緗絳紗復裙白絹裙晉宋舊事單帛惠帝還洛陽得鹿犢車一乘以單帛裙為幃也四王起事羊欣字敬元年二十時王獻之為吳興太守甚知愛之欣嘗夏月著新絹裙晝寢獻之入縣見之書裙數幅而去欣書本工因此彌善宋書魚復侯子響不道帝以兵圖之有司奏絶子響屬籍賜為蛸氏子響密作啓數紙藏妃王氏裙腰中具自申明云輕舫還闕而不得見此苦之深惟願矜之無使竹帛齊有反父之子父有愛子之名齊書何間人齊與太武攻赤連昌帝以微服入其城齊固諫不許乃與數人從帝入城內既覺諸門悉下帝及齊等因入其宮中得婦人裙繫之槊帝乘而上因此得拔於齊有力焉後魏書世祖為胡皇后造真珠裙積所費不可勝計後被火燒之比齊孟卓字君偉少修清苦之志著單裙十六年不換後趙録青羽裙南極夫人被錦服青羽裙真人傳成帝立飛燕為皇后帝步太液池后歌舞歸風送遠之曲帝以文犀簪擊玉甌酒酣風起后揚袖曰仙乎仙乎去故而就新寧忘懷乎帝令馮無方持后裾風止裙為之皺他日宮姝或襞裙為皺號留仙裙外傳每輕風至飛燕殆欲隨風入水帝以翠纓結飛燕之裙常怨曰妾微賤何得復與纓裙之遊拾遺記梁任昉四子東里西華南容北叟俱元學墜其家聲流離不自振西華冬月著葛帔練裙道逢劉孝標泫然矜之曰我為卿作論乃著廣絶交論譏其舊友五色繡裙梁武帝作五色繡裙以朱繩真珠為飾事始仙裙隋煬帝作長裙十二破名仙裙上唐孫伏迦上表近太后常於民間借婦女裙襦以充妓衣于五月五日於神武門遊戲非所以為子孫法安樂公主使尚方合百鳥毛織二裙正視為一色旁視為一色月中為一色影中為一色而百鳥之狀皆見以其一獻韋后五行志安樂公主初出降益州獻單絲碧羅籠裙縷金為花鳥細如絲髮大如黍米眼鼻觜甲皆備瞭視者方見之周逢行為武安節度婦人所著裙皆不縫謂之散幅裙或曰裙之于身以幅多為尚周匝于身今乃散開是不周也不周不縫是姓與名俱去矣幅者福也福破散其能久乎未幾行逢卒陶嶽荊湖近事司馬相如初與卓文君至成都遂相謀還成都賣酒相如自著犢鼻裩滌器以恥王孫也西京雜記昭帝上官后霍光外孫也光欲后擅寵有子帝時體不安左右及醫者皆阿意言宜禁內雖宮人使令皆為窮袴多其帶后宮莫有進者王澄之荊州送者傾城澄脫衣著犢鼻禈上樹取鵲𪆪傍若無人晉書客詣劉伶值其祼祖因責伶伶笑曰吾以天為屋以屋為裩諸君不當入何責乎晉記桂陽侯義融孫冕字茂德性庸鄙為郢州刺吏暑月露禈上聽事宋書紅縠鬱林王常祼𥘵著紅縠𥚛齊書周弘正善玄理為當世所宗藏法司於開善寺講說門徒數百弘正年少未知名著紅禈錦文髻踞關而聽衆人茂之弗譴也既而乘間進難舉坐盡傾法師疑非是人覘之知相賞狎弘正後為左氏尚書夏月著犢鼻裩衣朱衣為有司所奏彈其放達如此梁書擲摶無禈吉士瞻少時嘗於南蠻國中擲摶無禈褰露為儕輩所侮及平魯休烈軍得絹三萬匹乃作百裩其外并賜軍士不以入室上謝幾卿姓通脫在省署夜著犢鼻裩與門生登閣道飲酒酣呼為有司糾奏坐免上障蔽上曰衣下曰裳裳障也以自障蔽也釋名禹入祼國欣起而解裳俗說禹治洪水乃播入祼國君子入俗不改其恆於是欣然而解裳也原其所以當言皆裳祼國今吳即是也被髮文身祼以為飾蓋正朔所不及也猥見大聖之君悅禹文德欣然皆著衣裳矣風俗通三千服繡桀之時女樂三千人無不服文繡衣裳者管子華登以吳師救華氏齊烏枝嗚曰用少莫如齊致死齊致死莫如去備彼多兵矣請皆用劍從之華氏北復即之廚人濮以裳褁首而荷以走曰得華登矣遂敗華氏于新里昭二十一去冠披裳景公飲酒數日去冠披裳自鼓盆甕而已晏子景公飲酒數日衣縠繡之裳一衣而五采具焉上裂裳至郢楚欲攻宋墨子聞之自魯趨而往十日十夜足重繭而不休息裂裳而裹之至于郢見楚王淮南子樊噲常持鐵楯聞項羽有意殺漢王噲裂裳以裹楯冠之入軍門立漢王旁續漢書輿服志掛樹化龍東方朔生三日而母死鄰母拾而養之經歲母忽失朔纍月方歸後復去家萬里見一枯樹脫白布裳掛樹裳化為龍因名其地為布龍澤洞冥記裳不加緣祭遵為人廉約夫人裳不加緣後漢書鮑宣妻桓氏女字少君宣嘗就少君父學父奇其精苦以女妻之裝送甚盛宣謂妻曰少君生富驕習美飾吾貧賤不敢當禮妻乃悉歸侍御服飾更著短布衣裳東觀漢記孫登字公和於汲郡北山中為土窟夏則編草為裳冬則以髮自覆嵇康集自録皮衣說文曰裘皮衣也白虎通曰所以佐女工助溫也古者緇衣羔裘黃衣狐裘禽獸衆多獨以狐羔取其輕暖因狐死首丘明君子不忘本也羔取其跪乳遜順也龍茸狐裘龍茸一國三公吾誰適從左僖上羔袖齊人以郲寄衛侯右宰穀從而逃歸衛人將殺之辭曰余不悅初矣余狐裘而羔袖乃赦之襄三賜羔公賜公衍羔裘使獻龍輔於齊侯遂入羔裘齊喜與之陽穀昭六衣貍齊侯伐晉夷東郭書讓發犂彌從之齊侯賞犂彌犂彌辭曰有先登者臣從之晢幘而衣貍製公使視東郭書曰乃夫子也定下周昭王綴青鳳毛為二裘一名燠質一名暄肌常以禦寒也至厲王流于彘彘人得而奇之分裂此裘遍于彘土罪入大辟者抽裘一毛以贖死價值萬金也拾遺牂裘晉文公好士之惡衣故文公之臣皆牂裘墨子衣羖孫叔敖相楚衣羖羊裘韓子晉平公使叔嚮聘吳吳人飾舟以送左右各五百人有繡衣而貂裘者說苑晉平公出朝有鳥環平公不去平公謂師曠曰吾聞之霸王之主鳳下之今者出朝有鳥環寡人終朝不去是其鳳鳥也曠對曰東方有鳥名諫珂其為鳥也文身而赤足憎鳥而愛狐今者君不衣狐裘以朝乎平公曰然上趙簡子敝車瘦馬衣羖羊之裘其宰曰車新則安馬肥則疾狐裘則溫君宜改之上景公時雨雪三日公披狐白之裘曰怪哉雨雪三日不寒晏子曰古之賢君飽而知人飢溫而知人寒今君不知也公乃命出裘以與寒者發粟以與飢者晏子晏子至中辨賭弊冠反裘負芻者晏子曰子何者對曰我越石父也不免凍餓為人僕三年晏子解左驂贖之也上景公賜晏子狐白裘其賈千金晏子辭而不受三反曰君服之上而使嬰服之下不可以為教上狗號羊鳴林既衣韋衣而朝齊景公公曰此君子服耶既作色曰服何足以端士行如君言衣狗裘當狗號羊裘當羊鳴乎今君衣狐意得無變乎說苑麛裘孔子始用於魯魯人謗之曰麛裘而韠投之無戾韠而麛裘投之無郵用三年男行乎途左女行乎途右物之遺者民莫之舉呂覽延陵季子適見路有遺金當夏五月有披裘而薪者季子呼取金薪者曰吾五月披裘而負薪豈取金者哉吳越春秋魏文侯出遊見反裘負芻者問之對曰愛毛也文侯曰爾不知皮盡而毛無所附也明年東陽上計其布十倍大夫賀之文侯曰民不增而稅倍亦何異反裘負芻者厚取於下則上下不安此自危之道也子何用賀之乎新序秦昭王囚孟嘗君欲殺之孟嘗君使人抵昭王幸姬求解姬曰妾願得君狐白裘此時孟嘗君有一狐白裘值千金天下無雙入秦獻之昭王更無他裘孟嘗君患之客最下坐為狗盜者臣能得狐白裘乃夜為狗盜以入秦宮藏中取所獻裘奉姬姬為言于王王釋孟嘗君史記賈誼上書諫文帝曰天下咸知陛下之義臥赤子天下之上而安植遺腹朝委而天下不亂漢書服處曰言天下安雖赤子遺腹在位猶不危也孟康曰委裘若容衣太子未坐朝事先帝裘衣也賜貂東平王蒼來朝章帝以王觸寒涉道賜乘輿貂裘東觀漢記馬援嘆曰殖貨財産貴其能施賑也不能守錢虜耳乃盡散以班昆弟故舊身服羊裘皮袴後漢嚴光世祖時遊學及世祖即位乃變名隱身不見帝思其賢乃令以物色訪之後齊國上言曰有男子披羊裘釣澤中帝令齎玄纁聘之三聘而後至上劉虞為函州刺史常著氊裘謝承後漢書高文惠為刺姦令史夙夜匪懈至擁膝袍文書而寤寐大祖常夜微出觀察諸吏見而哀之徐解裘覆之而去魏氏春秋陸遜破曹休上為群僚大會酒與遜對舞解所著子裘賜遜吳志趙王倫字子彝初封琅邪郡王坐使散騎將劉緝買工所將盜御裘廷尉杜友正緝棄市綸當與緝同罪有司奏倫爵重屬親可不坐諫議大夫劉毅駮曰王法賞罰不阿貴賤然後可以齊禮制而明典刑也倫知裘非常蔽不語吏與緝同罪晉書著裘走脫步熊字叔羆好學兼術數趙王倫辟熊熊言倫死不久不足應有人告倫倫怒遣兵圍之熊使諸生著巳裘南走圍者皆奔之熊密從北道走得脫王隱晉書遺母桓玄殺羅企生先是玄以羔裘遺企生所生母氏及企生遇害即日焚裘鶴氅王恭裳披鶴裘氅涉雪行孟旭曰此神仙中人也王敦參軍摯瞻見敦以故壞裘賜老外部都督曰此裘雖故不如與卜吏敦曰何故瞻曰上服賜下貂蟬亦可賜下乎上大司馬程據上雉頭裘一領詔曰據此裘非常衣服清費功用其於殿前燒之勑內外有造異服詔罪之晉咸寧起居注孔雀裘文帝製孔雀毛裘齊書文惠太子性奢侈製珍玩之物織孔雀毛為裘光采金翠過於雉頭遠矣上唐雍字道和少明敏有治世才斛律金啓太后曰唐雍強幹一人當千顯祖乃解所服青鼠皮裘賜之云意在與卿共弊北齊汲乘盛暑重裘重茵使人扇之恚不清涼斬扇者軍中謂之語曰仕為將軍何可羞六月重茵披狐裘不識寒暑斷人頭趙書羽裘少昊氏都於曲阜鞬鞮毛人獻其羽裘田休子鹿裘堯之王天下也冬則鹿裘夏則葛絺韓子渠搜之人服夏禹之德獻其珍裘毛出五采光曜五色田休子褐裘夏禹時渠搜國來獻羽裘也帝王世紀齊有盜狗子與胡跪子相誇盜狗子曰吾父之裘獨有尾胡跪子曰吾父冬夏獨有一足袴韓子弊補淳于髡見鄒忌曰狐裘雖弊不可補以黃犬之皮忌曰諾謹受教請擇君子無雜小人其間春秋後語送黑貂裘蘇春說李兌兌送秦黑貂裘黃衣百鎰戰國策蘇秦詣秦王上書十上而說不行黑貂之裘弊黃金百鎰盡形容枯槁及歸妻不下機嫂不為炊上漢武帝大漢三年西國獻吉光裘色黃蓋神馬之類入水不沉入火不灼十洲記司馬相如初與卓文君還成都居貧愁悶以所服鷫鸘裘就市人陽昌貫酒與文君為歡西京雜記青羔裘成帝好蹴踘群臣以蹴踘為勞體非至尊所宜帝曰朕好之可擇似而不勞者奏之劉向作彈棊以獻帝大悅賜青羔裘紫絲履服以朝覲上楊興謂史高曰將軍所舉不過門下賓客富人而列士不舉是有狐白之裘而反衣也漢書錦裘魏武與楊彪書曰今贈足下錦裘二領布衣貂裘管寧字幼安至孝每祭祀未嘗不伏地流涕恆著布衣貂裘別傳魏文與孫權書曰今因趙咨致文馬一匹鼲子裘一領魏朗字少英為郡功曹佐正旦掾吏顧龕被裘以加朝服朗以裘非臣服龕不敬勑卒撤去龕恚而不聽朗右手鳴鼓左手撒裘以聞府君喜朗遂退龕以代之朗辭病不就會稽典略謝萬就安乞裘云畏寒答曰君妾與語正欲以為豪具耳若畏寒無復勝綿者以三十斤綿與萬語林謝萬與安共諧簡文萬來無衣幘可前簡文曰俱但前不須衣幘即呼使入萬著白綸巾鵠氅裘履板而前共談移日大器重之世說挾夫私計以論公政猶與狐議裘無時而可也潛夫論著裘衣覆古者著裘於內而以繒衣覆之乃加以朝服會之時袒其朝服見裘裏覆衣謂之禓禓之言露可見之辭所以示美呈好而為飾加以朝服謂之袒謂之禓大裘不覆反本以其質也五經要義黼裘諸侯黼裘以誓田雜羔狐為黼文也上或謂孟嘗君曰太廟之掾非一水之枝也千鎰之裘非一狐之皮也戰國策名裘毛氏國出名裘去朔方七千里外國圖與狐謀為千金之裘而與狐謀之其皮不可得也符子天下無粹白之狐而有粹白之裘取之於衆白也呂覽夫夏日之不披裘者非愛之也暖有餘於身也裘與蓑孰急見雨則裘不用上堂則蓑不御此代為帝者白狐之裘天子之披也而在朝堂然為狐計者不若走於澤披羊裘而賃固其事也狐裘而負籠甚可怪也哉淮南子脛衣袴脛衣也說文袴跨也兩股各跨別也留幕冀州所名大褶下至膝者也留牢也幕絡也言牢落在衣表也釋名齊魯之間袴謂之褰或謂之襱關西謂之袴大袴謂之倒頓小袴謂之芙蓉衫楚通語也方言屠岸賈攻趙朔朔妻晉成公姊有遺腹公宮匿之生男屠岸賈索於宮中夫人置兒袴中祝曰趙宗若滅即號若不滅即無聲乃索兒竟無聲史記鄭人卜子使妻為袴曰寫吾故袴妻因鑿新袴為孔韓子孟嘗君食客三千人上客食肉中客食魚下客食菜馮暖經冬無袴面有飢色列士傳俯出袴下淮陰屠中少年有侮韓信者衆辱之曰信能刺我不能出我袴下於是信熟視之俯出袴下蒲伏一市皆笑信以為怯漢書周仁為人陰重不泄當衣弊補衣溺袴甚為不潔清以是得幸景帝上大袴昌邑王賀衣短衣大袴上朱博琅琊郡功曹官屬多褒衣大祒謂大袴也上昭帝上官后霍光外孫光欲后擅寵有子帝體不安左右及醫皆阿意言宜內宮人使令皆為窮袴多其帶後宮無進者上更始所爵多群小被服威儀不以衣冠或繡面衣錦袴東觀漢記馬援田牧至有牛馬羊數千頭盡散昆弟故舊身衣羊裘皮袴後漢書韋袴祭遵賞賜與士共之家無私財身衣韋袴上吳良字大儀齊國臨淄人以清白守正稱為郡議曹掾正旦掾吏入賀門下掾王望舉觴上壽曰齊郡遭離盜賊今明府視事五年家給人足良跪曰門下掾佞諂明府勿受其觴盜賊未盡人庶困之今良為議曹掾尚無袴望曰議曹隋窳自無袴寧足為不家給人足耶太守曰此生言是賜良鰒魚百枚上秦護清廉不受禮賂家貧衣服單露鄉人歌之曰冬無袴有秦護謝承後漢書貧無袴賈逵居貧無袴過其妻兄柳孚家宿其明無何著孚袴去時人謂為通達魏略道還取袴許允聞李豐等被收欲往見大將軍已出門回遑不定中道還取袴豐等已收訖大將軍聞允前遽怪之曰我自收豐等不知士大夫何為忽忽乎上布袴絮巾趙跋避難至北海著布袴絮中在市中賣餅劉穆之壞布裳為袴往見武帝謂曰我中始舉大義須一軍中甚急誰堪其選穆之曰無見踰者帝笑曰卿能自屈吾事濟矣宋書緑絲布袴周劉顯將之尋陽朝賢畢祖道顯懸帛十匹約曰檢衣來者以賞之衆人競改常服不過短長之間顯曰將有甚於此矣既而弘正緑絲布袴軒昂而至折而取帛梁書碧絲布袴元帝愍懷太子昵狎群下好著微服常入朝公服中著碧絲布袴摳衣元帝見之帝大怪遣尚書周中正責之上王裕之常使二老婦女戴五條辮著青絞羅袴飾以朱彩上作襦賜凍安成王秀為郢州冬月常作襦以賜凍者上何點永元中雀景惠圍城人間無薪點悉伐園樹以贍親黨景惠性好俠義欲交點點不顧之至是乃逼召點點裂裙衣為袴往赴其軍終日談說不及軍事其語默之迹如此上丞相司馬任胄主簿李世林都督鄭仲禮房子遠等潛謀害神武自魏氏舊俗以正月十五日夜為打簇戲能中者即時賞帛胄令仲禮藏刀於袴中因神武臨觀謀竊發後敗北齊見貧遺袴孫略冬日見貧士脫袴遺之高士論武帝嘗降王武子婢子百餘人皆綾羅袴裙手擎飲食世說昭侯使人藏弊袴侍者曰君上不以賜左右而藏之昭侯曰吾聞明主愛一嚬一笑有為嚬而嚬有為笑而笑今袴豈特嚬笑哉吾必待有功者故藏之韓子孫興公道曹輔佐才云白地明光錦裁為負板袴非無文綵然酷無裁製郭子謝仁祖年少時喜著刺文袴出郊郭外其叔父誚責之仁祖於是自改遂為名流俗說直幅無殺晉中興作袴者直幅為口無殺不大夫裁也王敦之徵搜神記柸文綺袴皇太子納妃有降直文羅袴七綵柸文綺袴東宮舊事都尉布袴申朔字元遊蒼梧人為九真都尉布襦布袴鄉邑歡慕之廣州先賢傳兼司徒員外散騎常侍謝祭應著絳袴而祭披披不以貫足有虧常體蔡廊彈事官絹作披楊平善裁披以官絹百匹作披百枚魏舊事合歡披石虎獵著金樓合歡披鄴中記皂袴絳袴司空騎吏以下皂袴因秦水行今漢家火行宜絳袴應劭漢官儀鞶帶說文曰帶紳也男子鞶帶婦人帶絲象繫佩之形帶必有巾故從重巾徐曰其帶上連屬結固處著身釋名曰帶蒂也著於身如物蒂也天子北征舍于珠澤珠澤獻白玉食天子賜黃金之環三十朱帶貝飾三十西征至赤烏氏赤烏氏先出自周宗乃賜赤烏之人具帶五十穆天子傳魯仲連謂田單曰將軍黃金橫帶騁乎淄澠之間有生之樂無死之心戰國策金飾貝帶文帝遺胸奴黃金飾具帶一黃金犀毗漢書革帶楊賜拜大常詔賜所服冠幘綬王兼革帶東觀漢記緄帶鄧遵破胸奴上賜金剛鮮卑緄帶一具上赤石帶踈勒王獻大秦赤石帶一枚魏略青石金帶漢陽嘉三年踈勒王獻海西青石金帶上陸遜破曹休於石亭上脫御金交帶以賜遜又親以帶為鉤絡帶吳書鉤絡者鞍飾革帶也世名為鉤絡帶吳録大秦國人皆著袴褶絡帶吳時外國傳扶南人悉著鉤絡帶上張融形貌短醜精神清徹王敬則見融革帶寬洽將至骼謂曰革帶大急融曰既非步吏急帶何為齊書隋文作相李穆曰周德既衰愚智共悉天時若此豈能違天仍遣使謁隋文帝并上十三鐶金帶蓋天子服也以微申其意後周書寶飾絡帶夏侯祖欣為兗州刺史喪於官沈僧榮代之祖欣見形詣僧榮見床上有一織成寶飾絡帶夏侯曰此帶殊好豈能見與沈曰甚善夏侯曰卿直許中不見關必以為施可命焚與沈對前燒視此帶已在下腰矣述異記杜如晦薨帝嘗賜玄齡黃銀帶曰如晦與公同輔朕今獨見公泫然流淚曰世傳黃銀鬼神畏之更取金帶遣玄齡送其家天授二年改佩魚為龜其後三品以上龜袋飾以金四品以銀五品以銅中宗初罷龜袋復給以魚郡王嗣王亦佩金魚袋景龍中令特進佩魚散官佩魚自此始也唐車服志紅玉帶上自解紅玉帶賜寧王明皇雜録上以紫金帶賜岐王蓋昔高宗破高麗所得開元中高麗遣使來朝宴內殿因從容言於內臣曰紫金帶本國亡是歲荒民散干戈屢起幸在內帑一見足矣上聞之命封付其使佩龜載初元年改內外官所佩魚並作龜舊史高宗咸亨三年勑五品以上賜新魚袋並飾以銀三品以上賜金裝刀子礪石一具上元中又勑文武官三品以上金玉帶四品五品並金帶六品七品並銀帶八品九品並䃋石帶庶人銅鐵帶文武並帶手巾算袋刀子礪石武官欲帶亦聽之九月百官具新服上宴之于麟德殿上永徽二年文武職事四品五品並給隨身魚天后復改魚為龜唐實録貞元之間德宗詔頃來賜衣文綵不常非制也朕今思之宜有定制節度使宜以緩帶取其武毅以靖封內觀察使宜以鴈銜威儀取其行列有序翼牧人有威儀也威儀瑞草也會要李靖五代孫彥芳其舊物有靖破蕭銑時所賜于闐玉帶十三胯七方六刓胯各附環以金固之所以佩物者天子悉留禁中馬植進中書侍郎初左軍中尉馬元贊最為帝寵信賜通天犀帶而植素與元贊善至通昭穆元贄以賜帶遺之它日對便殿帝識其帶以詰植植震恐具言狀於是罷為天平軍節度使李司封宗易言石駙馬寶吉知陳州其州廨一皆新之每毀舊屋則坐下風塵自分去人皆驚怪蓋其所服帶乃辟塵犀也本草裴晉公質狀眇小相者曰郎君若不至貴即當餓死一日遊香山寺有婦人以父被罪假得玉帶三犀帶一以賂津要置于欄楯忘收而去度得而授之後相者曰必有陰德及物前途萬里非某所知也撫言芝田録載白中令事同但以婦為夫耳裴度拜淮西宣慰招討處置使入對延英曰主憂臣辱義在必死賊朱授首臣無還期帝壯之為流涕及行帝賜通天御帶本傳晉公平淮西賜以玉帶公臨薨却進口占奏狀曰內府之珍先朝所賜既不敢將歸地下又不合留在人間聞者嘆其不亂因話録文宗朝李訓講周易頗叶上意時方盛夏遂命取水玉腰帶以賜訓杜陽編夜明犀唐敬宗時南昌進夜明犀製為寶帶光照百步萇從簡陳州人許州富人有玉帶欲之而不可得遣二卒夜入其家殺而取之卒夜踰垣隱木間見其夫婦相待如賓二卒嘆曰吾公欲奪其寶而害良人吾必不免因躍出而告之使其速以帶獻遂踰垣而去鳳翔李永吉初朝京師蘇逢吉以永吉故秦王從曮子家世王侯當有奇貨使人告永吉許以一州而求其先世玉帶永吉以無為解逢吉乃使人市一玉帶直數千緡責永吉償之既而不得州五代史漢臣傳楚馬希聲海商有牛犀帶者直數百萬晝夜有光洞照一室希聲殺商而取之逾月光遂滅九國志江西鍾氏既滅子匡範歸武肅獻雲鶴通天離水犀帶一云玄宗御玩遺在西門門客獻鍾鍾常寶之武肅回帶賜錢二萬緡範因登碧波亭命與許彥方擊楫而行水開七尺許至瑞石山岸大為驚賞僧贊傳載嚴續相公歌姬唐鎬給事通天犀帶皆一代尤物因出妓解帶呼廬唐采大勝乃酌酒命美人歌一曲而別嚴悵然與之南唐近事日月帶韓似夫使金國見北主所係犀帶倒透中正透如圓鏡狀光彩絢目虜主云此石晉少主歸獻耶律氏謂唐世所寶日月帶也揮塵録宋王介甫所賜玉帶闊十四稻號玉抱肚真宗時趙德明所貢也紹興中王氏猶藏之曾孫奉議郎璹始復進入禁中老學庵筆記萬釘寶鈿統葉爾可汗獻萬釘寶鈿金帶突厥傳天中記卷四十七
