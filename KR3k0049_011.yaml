body:
  text: 帝王皇皇者天天不言四時行焉百物生焉三皇垂拱無為設言而民不違道德玄泊有似皇天故稱曰皇皇者中也光也弘也含弘履中開陰布綱上合皇極其施光明指天畫地神化潛通煌煌盛美不可勝量春秋運斗樞皇君也美也大也大人之尊美大稱也時質故謂之也號之為皇者煌煌人莫違也白虎通皇者煌煌也道爛然顯明也元命包帝帝者天號也德配天地不私公位稱之曰帝天子者繼天治物改正一統各得其宜父天母地以養生人至尊之號也大君者君人之盛也易緯天立五帝以為相四時施生法度明察春夏慶賞秋冬刑罰帝者任德設刑以則象之言其能行天道舉錯審諦也易書大傳帝者天之一名所以名帝帝者諦也言天蕩然無心忘於物我言公平通遠舉事審諦故謂之帝也五帝道同於此亦能審諦故取其名書正義道缺皇道缺故帝者興洛書皇帝皇帝至尊之稱皇者煌也盛德煌煌無所不照帝者諦也能行天道事天審諦故稱皇帝獨斷皇者大也言其煌煌盛美帝者德象天地言其能行天道舉措審諦父天母帝為天下主漢官儀王古之人造文字者三畫而連其中謂之王三畫者天地與人也連中者通其道也取天地與人之才而參之非王者其孰能當是故王者必法天以大仁覆育萬物既化而生之又養而成之董子王者往也神之所輸向人所歸樂元命包道大天大地大王亦大域中有四大而王居其一焉老子李陽冰曰王者之王中一畫近上王者則天之義也王者至尊四號之別名王畿內之所稱王有天下故稱王獨斷王天下所歸往也說文帝王帝者天下之適也王者天下之往也天下不適不往不可謂帝王故帝王不得人不能成得人失道亦不能守文子帝王者號也號者功之表也所以表功明德號令臣下者也德合天地者稱帝仁義合者稱王別優劣也禮記諡法曰德象天地稱帝仁義所生稱王帝者天號王者五行之稱也白虎通帝者天號王者人稱天有五帝以立名人有三王以正度尚書緯天子天子至尊之定名也應神受命為天所子故謂之天子帝王世紀德侔天地者稱皇帝天祐而子之號稱天子故聖王生則稱天子繁露天子皆五帝精寶各有題序次運相據起必有神靈符紀諸神扶助使開階立遂春秋演孔圖天子之尊也精神與天地通血氣含五帝精天愛之子之也春秋保乾圖太古之時蒸黎初載未有上下而自順序天未事焉君未設焉後稍矯處或相凌虐侵漁不止為萌巨害於是天命聖人使司牧之使不失性四海蒙利莫不被德僉共奉戴謂之天子潛夫論始生之者天地養成之者人也能養天之所生而勿攖戾之謂天子天子之動也以全天為故者也呂氏春秋天子朝諸侯所稱父天母地故稱天子獨斷古之神聖人母感天而生子故曰天子說文聖人受命皆天所生故謂之天子成公八公羊注君為天下主者天也繼天者君也君之所存者命也為人臣而侵其君之命而用之是不臣也為人君而失其命是不君也穀梁傳君者群也群下之歸心也白虎通君道能群荀子賞慶刑威曰君左傳注君者群也群天下萬民除其害者謂之君王者往也天下往之善養生人者也故人尊之善辨治人者也故人安之善顯設人者也故人親之善粉飾人者也故人悅之四德具而天下往之四德無一而天下去之往之之謂王去之之謂亡故曰道存則國存道亡則國亡韓詩外傳說文君尊也從尹從口以發號徐曰君者尹也正也長民之通稱晉悼公曰臣之求君以出令也於文口尹為君齊一古之立帝王者非以奉養其欲也聖人踐位者非以逸樂其身也為天下之民強陵弱衆暴寡詐者欺愚勇者侵怯又為其懷智詐不以相教積財不以相分故立天子以齊一之文子立為天下古者立天子貴之者非以利一人曰天下無一貴則禮無由通通理為天下也故立天子為天下也非立天下為天子也立國君以為國也非立國以為君也慎子君之為君孔子曰商汝知君之為君乎子夏曰魚失水則死水失魚猶為水也孔子曰商知之矣尸子天下智慮人主者以天下之目視以天下之耳聽以天下之智慮以天下之力爭是故號令能下究而臣情得上聞百官修同群臣輻湊喜不以賞賜怒不以罪誅是故威厲立而不廢聰明光而不蔽法令察而不苛耳目達而不閽善否之情日陳於前而無所逆淮南子明如日月人主之居也如日月之明也天下之所同側目而視側耳而聽延頸舉踵而望也是故非淡泊無以明德非寧靜無以致遠非寬大無以兼覆非慈厚無以懷衆非平正無以制斷上恩如春養君人者乘南面之位操殺生之柄威如秋霜恩如春養何求而不得何化而不從人君也當以江海為腹山林為面當使其觀者不知江海何藏山林何有唐子導進稱辭昔者天子手能衣而宰夫設服足能行而相者導進能言而行人稱辭故無失言失禮也慎子人主之術處無為之事而行不言之教清靜而不動一度而不搖因循而任下責成而不勞是故心知規而師傅諭導口能言而行人稱辭足能行而相者先導耳能聽而執正進諫是故慮無失策謀無過事言為文章行為儀表於天下淮南翳明隱聽古之王者冕而前旒所以蔽明也黈纊塞耳所以掩聰天子外屏所以自障故所禮者遠則所任者邇所治者大則所守者少上天子坐九重之內樹塞其門旒以翳明衡以隱聽鸞以抑馳蘇子權勢權勢者人主之車輿也大臣者人主之駟馬也體離車輿之安而手失駟馬之心而能不危者古今未有也淮南運無所積天道運而無所積故萬物成帝道運無所積故天下歸聖道運而無所積故海內服明於天通於聖六通四辟於帝王之德者其自為也夫虛靜恬淡寂寞無為者萬物之本也以此處上帝王天子之德也莊天道帝王之德夫帝王之德以天下為宗以道德為主以無為為常無為也則用天下而有餘有為也則為天下用而不足莊子無為古之王天下者知雖落天地不自慮也辨雖雕萬物不自說也能雖窮海內不自為也天不産而萬物化地不長而萬物育帝王無為而天下功故曰莫神於天莫富於地莫大於帝王故曰帝王之德配天地乘天地馳萬物而用人群之道也上綱紀昔者之聖王仰取象於天俯取度於地中取法於人調陰陽之氣和四時之節察陵陸水澤肥墽高下之宜以立事生財除飢寒之患辟疾疢之災中受人事以制禮樂行仁義之道以治人倫列金木水火土之性以立父子之親而成家聽五音清濁六律相生之數以立君臣之義而成國察四時孟仲季之序以立長幼之節而成官列地而州之分國而治之立大學以教之此治之綱紀也得道則舉失道則廢文子因物因人夫人君不出戶以知天下者因物以識物因人以知人故積力之所舉即無不勝也衆智之所為即無不成也千人之衆無絶糧萬人之群無廢功上法江海古之善為君者法江海江海無為以成其大窊下以成其廣故能長久為天下溪谷其德乃足無為故能取百川不求故能得不行故能至是以取天下而無事不自貴故富不自見故明不自矜故長處不有之地故為天下王不爭故莫能與之爭終不為大故能成其大文子利勢國者天下之利用也人主者天下之利勢也得道以持之則大安也大榮也積美之源也不得道以持之則大危也大纍也有之不如無之為安及其亡也索為匹夫不可得也荀子國之隆君者國之隆也父者家之隆也隆一而治二而亂上導利芮良夫諫厲王曰王人者將導利而布之上下者也使神人百物無不得其極猶日怵惕懼怨之來匹夫專利猶謂之盜王而行之其歸鮮矣周語正邪里革曰夫君也者將牧民而正其邪者也若君縱私回而棄民事民胥有慝無由省之益邪多矣將安用之魯語昭德塞違臧哀伯曰君人者將昭德塞違以臨照百官猶懼或失之故昭令德以示子孫百官於是乎戒懼而不敢易紀律左桓二君道晉平公問於師曠曰人君之道如何對曰人君之道清淨無為務在博愛趨在任賢廣開耳目以察萬方不固溺於流俗不拘繫於左右廓然遠見踔然獨立屢省考績以臨臣下此人君之操也平公曰善說苑君事齊宣王謂尹文曰人君之事何如尹文對曰人君之事無為而能容下夫事寡易從法省易因故民不以政獲罪也大道容衆大德容下聖人寡為而天下理矣宣王曰善上司牧衛國逐獻公晉悼公謂師曠曰衛人出其君不亦甚乎對曰或者其君實甚也夫天生民而立之君使司牧之無使失性良君將賞善而除民患愛民如子蓋之如天容之若地民奉其君愛之如父母仰之如日月敬之如神明畏之若雷霆夫君神之主也而民望之也天之愛民甚矣豈使一人肆於民上以縱其淫而棄天地之性乎必不然矣若困民之性乏神之祀百姓絶望社稷無主將焉用之不去何為公曰善新序三懼孔子曰明王有三懼一曰處尊位而恐不聞其過二曰得志而恐驕三曰聞天下之至道而恐不能行三懼者明君之務也韓詩外傳四術治天下有四術一曰忠愛二曰無私三曰用賢四曰度量通財足用用賢則多功無私百知之宗也忠愛君父之行也尸子先公昔先聖王之治天下也必先公公則天下平矣嘗試觀於上志有天下者衆矣其得之必以公其失之必以偏凡主之立也生於公故洪範曰無偏無黨呂氏春秋輿策勢者君之輿威者君之策臣者君之馬民者君之輪勢固則輿安威定則策徑臣順則馬良民和則輪利為國失此必有覆車奔馬折輪敗載之患安得不危鄧析子以國位為車以勢為馬以號令為轡以刑罰為鞭策使堯舜御之則天下治桀紂御之則天下亂則賢不肖相去遠矣韓非子國者君之車也勢者君之馬也夫不處勢以禁誅擅愛之臣而必德厚以與天下齊行以爭民是皆不乘君之車不因馬之利舍車而下走者也上五壅人主有五壅臣閉其主曰壅臣制財利曰壅臣擅行令曰壅臣得行義曰壅臣得樹人曰壅臣閉其主則主失位臣制財利則主失德臣擅行令則主失制臣得行義則主失名臣得樹人則主失黨此人主之所以獨擅也非人臣之所以得操也上三道聖人之所以為治道者三一曰利二曰威三曰名夫利者所以得民也威者所以行令也名者上下之所同道也非此三者雖有不急矣上二柄明主之所導制其臣者二柄而已矣二柄者刑德也殺戮之謂刑慶賞之謂德乃明君之行賞也曖乎如時雨百姓利其澤其行罰也畏乎如雷霆神聖不能解也故明君無偷賞無赦罰賞偷則功臣墮其業赦罰則姦人易為非是故誠有功則雖疏賤必賞誠有過則雖近愛必誅近愛必誅則疏賤者不怠而近愛者不驕也上身察為之人主而身察百官則日不足力不給且上用目則下飾觀上用耳則下飾聲上用慮則下繁辭先王以三者為不足故舍己能而因法數審賞罰先王之所守要故法省而不侵獨制四海之內聰智不得用其詐險躁不得關其佞姦邪無所依遠在千里外不敢易其辭勢在郎中不敢蔽善飾非朝廷群下直湊單不敢相踰越故治不足而曰有餘上之任勢使然也上立功成名明君之所以立功成名者四一曰天時二曰人心三曰技能四曰勢位故得天時則不務而自生得人心則不趣而自勸因技能則不急而自疾得勢位則不推進而名成若水之流若船之浮守自然之道行無窮之令故曰明主上步驟馳騖三皇步五帝驟三王馳五霸騖或稱帝王接上稱天子明以爵事天接下稱帝王明以號令臣下孝經鉤命訣英華根核帝者得其英華王者得其根核霸者得其附心故帝道不行不能王王道不行不能霸霸道不行不能守其身禮斗威儀任德帝不先義任道德王不先力尚仁義霸不先正尚武力論語摘輔象明一明一者皇察道者帝通德者王謀得兵勝者霸管子居中人君者降禮尊賢而王重法愛人而霸好利多誑而危欲近四旁莫如中央故王者必居天下之中也荀子義立用國者義立而王信立而霸權謀立而亡三者明王之所謹擇也荀子粹而王駮而霸無一焉而亡上體太一帝者體太一王者法陰陽霸者則四時君者用六律秉太一者牢籠天地彈壓山川含吐陰陽伸曳四時紀綱八極經緯六合覆露照導普汜無私蠉飛蠕動莫不仰德而生陰陽者承天地之和形萬殊之體含氣化物以成埒類贏縮卷舒淪於不測終始虛滿轉於無原則四時者春生夏長秋收冬藏取豫有節出入有時開闔張歙不失其敘喜怒剛柔不離其理用六律者生之與殺也賞之與罰也豫之與奪也非此無道也故謹於權衡準繩審乎輕重足以治其境內矣淮南子體太一者明於天地之情通於道德之倫聰明照於日月精神通於萬物動靜調於陰陽喜怒和於四時覆露皆道溥洽而無私蜎飛蠕動莫不依德而生德澤流於方外名聲傳乎後世法陰陽者承天地之和德與天地參光明與日月並照精神與鬼神齊靈戴圓履方抱表寢繩內能理身外得人心發施號令天下從風則四時者春生夏長秋收冬藏取與有節出入有量喜怒剛柔不離其理柔而不脆剛而不折淮南作鞼寬而不肆肅而不悖優游委順以養群類其德含愚而容不肖無所私愛也用六律者伐亂禁暴興賢良廢不肖匡邪以為正攘險以為平矯枉以為直明於施舍開塞之道乘時因勢以服役人心者也帝者不體陰陽即侵王者不法四時即削霸者不用六律即辱君者失準繩即廢故小而行大即窮塞而不親大而行小即狹隘而不容文子道治德化夫上古稱三皇五帝而次有三王五伯此皆天下君之冠首也故言三皇以道治五帝用德化三王由仁義五伯以權智其說之曰無制令刑罰謂之皇有制令而無刑罰謂之帝賞善誅惡諸侯朝事謂之王興兵約盟以信義矯世謂之伯王者往也言其惠澤優游天下歸往也王道純粹其德如彼伯道駁雜其功如此俱有天下而君萬民垂統子孫其實一也圖王不成亦可以霸桓談新論步驟優劣易稱天先春而後秋地先生而後凋日月先光而後幽是以王者則之亦先教而後刑三皇結繩五帝畫像三王肉刑五霸黠巧此言步驟稍有優劣也風俗垂策繫手三皇垂策而五帝繫手唐虞按轡禹湯馳轅雖使周公御衡仲尼促節固不已也陸子道一道一者帝德充者王依仁仗義者霸無為而治者道也為能不待者德也存三亡國仁也責貢不入義也孫綽子依道三皇依道五帝仗德三王施仁五霸行義強國任智蓋優劣之異薄厚之降也阮籍通考論含天光人主含天光據璣衡齊七政操八極故君明聖人道得正則日月光明五星有度春秋感精符天樞春生夏長秋收冬藏天之正也不可干而逆之逆之者雖成必敗故人君亦有天樞生養成藏亦復不別干而逆之逆之雖盛必衰此天道人君之大綱也鬼谷子承天意天之生人也蓋非以為君也天之立君也蓋非以為位也夫為人君行其私欲而不顧其人是不承天意忘其位之所以宜事也說苑經世至人不役志以經世而虛心以應物誠信著於天地不爭暢於萬物然後萬物歸懷天地不逆故德音發而天下響會景行彰而六合俱應而後始可以經寒暑涉治亂而不與逆忤也莊子注孤寡不榖人之所惡唯孤寡不榖而王公以為稱老子顏斶對齊宣王曰老子曰雖貴必以賤為本雖高必以下為基是以侯王稱孤寡不榖是其賤之本與非夫孤寡者人之困賤下位也而侯王以自謂豈非下人而尊貴士與戰國策南面稱寡而不以侈大呂覽務大孤晉悼公言於諸大夫曰孤始願不及此孤之及此天也抑人之有元君將稟命焉二三子為令之不從故求元君而訪焉孤之不元廢也其誰怨國語晉文公出獵前有大蛇文公還車反宿齊三日清于廟曰孤有三罪蛇死新序孔子曰凡天下有三德生而長大美好無雙少長貴賤見而皆說之此上德也知維天地能辨諸物此中德也勇悍果敢聚衆率兵此下德也凡人有此一德者足以南面稱孤矣莊子高帝使使召田橫橫謂其客曰橫始與漢王俱南面稱孤今漢王為天子而橫乃為亡虜北面事之其愧固已甚矣前漢不榖齊桓公伐楚謂屈完曰豈不榖是為先君之好是繼與不榖同好何如左僖四年襄王出居于鄭使來告難曰不榖不德得罪於母弟之寵子帶鄙在鄭地況敢告叔父二十四越師圍吳王吳王懼使人行成曰昔不榖先委制於越君君告孤請成許君成以至于今國語楚莊王謂申公巫臣曰以不榖之不肖而群臣莫吾違吾國幾於亡乎荀子堯問曲禮云諸侯與民言自稱寡人庶方小侯自稱曰孤其在四夷雖大曰子於內自稱不榖禮記雖為定例事在臨時所稱春秋疏正義稱號古之正義東西南北茍舟車之所達人之所至莫不率服而後云天子澤厚焉澤湛焉而後稱帝又加美焉而後稱皇今稱號甚美而實不出長城賈子道機合者稱皇鉤命訣德象天地為帝仁義所生為王樂稽嘉耀稱號丞相王綰等議曰古有天皇有地皇有泰皇史記上古天子庖犧氏神農氏稱皇堯舜稱帝夏殷周稱王秦承周末為漢驅除自以德兼三皇功包五帝故并以為號漢高祖受命功德宜之因而不改也獨斷天王天王諸夏之所稱天下之所歸往故稱天王上國家封禪記云詔百官以次下國家隨後明日太醫令問國家起居國家云不勞漢官儀天家百官小吏稱天子曰天家天子無外以天下為家故稱天家獨斷大家親近侍從官稱天子為大家上天辟如淳曰天辟謂天子也京房易傳曰棄正作淫厥妖木斷自屬妃后有顓木仆反立斷枯復生天辟惡之漢五行志春秋潛潭巴曰里社明此里有聖人出其詬百姓歸天辟亡宋均曰詬鳴之怒者聖人怒則天辟亡矣明鳴同官家鮑白令之對秦始皇曰天下官則讓賢是也天下家則世繼是也故五帝以天下為官三王以天下為家說苑五帝官天下故傳之賢三王家天下故傳之子今指天子為官家則猶言帝王也蔣齊萬幾論安帝義熙初童謠曰官家養蘆化作荻晉五行志太宗嘗問杜鎬曰天子何以呼官家對曰三皇官天下五帝家天下上甚悅儒林公議真宗問李仲容何故謂天子曰官家遽對云蔣濟言三皇官天下五帝家天下兼三五之德故曰官家湘山野録宅家至尊以天下為宅四海為家不敢斥呼故曰宅家亦猶陛下之義資暇集巨公武帝東巡海上至東萊群臣有言見一老父牽狗言吾欲見巨公已忽不見鄭氏曰天子也張晏曰天子為天下父故曰巨公也郊祀志縣官霍禹曰縣官非我家將軍不得至是霍山曰今丞相用事縣官信之如淳曰縣官謂天子前漢大尊樂運陳宣帝八失曰內史御正職在弼諧皆須彥議共治天下大尊比來小大之事多獨斷之周書顏之儀傳崖公玄宗宴蕃客唐崇勾當音聲言甚明辨上極歡長入人許小客一日過崇曰今日崖公甚蜆斗散樂呼天子為崖公以歡為蜆斗以每日在至尊左右為長入唐語林教坊記萬花谷前集以崖公為天誤震旦南詔以十二月十六日謂之星回節日遊于避風臺命清平官賦詩驃信詩曰自我居震旦翊衛類夔契元昶同一心子孫堪貽厥清平官趙叔達曰下令俚柔洽獻賝弄揀來其國謂天子為震旦詞臣為清平官謂朕曰元卿曰昶百姓俚柔也玉溪編事幸御漢有天下號曰皇帝自稱朕人臣稱之曰陛下其命令曰制詔衣冠車馬器械百物曰乘輿所在曰行在所至曰幸所居曰某禁中所追曰御漢雜事龍首王者之道如龍之首高居而遠望深視而審聽神其形而散其精若天高而不可極若淵深而不可測故可怒而不怒臣乃為虎可殺而不殺大賊乃發六韜帝王之祚必有明聖顯懿之德豐功厚利積纍之業然後精誠通于神明流澤加於生民故能為鬼神所福饗天下所歸往未見運世無本功德不紀而能屈起在此位者也班彪王命論帝王之起帝王之起必有天下瑞應自然之符明統顯祚豐懿之業加以茂德成功賢智之助而後居世臨臣為神所保佑永世所尊崇未見運敘無紀次勳澤不加於民而可力爭覬覦神器者也傳彥林王令敘神器夫體睿窮幾含靈獨秀謂之聖人所以能君四海而役萬物使動植之類莫不各得其所百姓仰之歡若親戚芬若椒蘭故為旗章輿服以崇之玉璽黃屋以尊之以神器之重推之於兆民之上自中智以降則萬物之為役者也宋志有道師尚父曰天下壙壙一人有之天下藂藂一人理之故夫天下者非一家之有也惟有道者理之惟有道者紀之惟有道者使之惟有道者宜處而久之賈子體元春秋元命苞曰元年者何元宜為一謂之元何曰君之始元也杜預傳注曰凡人君即位欲其體元以居正玉床易是謀類曰假威出座玉床鄭玄曰坐玉床處天下之位也天鏡握天鏡而授河圖執玉衡而運乾象徐陵文皇齊受終建極握鏡臨宸神武重輝欽明懿鑠齊建武記握鏡璇樞允集明哲齊禪梁文張寶圖以光帝載懸玉鏡以徹澿靈唐元和類表神器有歸鼎運斯集憑玉几握天鏡簡文大法頌序天序成帝初匡衡張談奏言帝王之事莫大乎承天之序承天之序莫重於郊祀前漢郊祀武帝策阮种曰在昔哲王承天之序光宅宇宙咸用規矩乾坤惠康品類晉傳肆豫一人祇承天序魏禪晉文天序不可以無統人神不可以曠主晉紀陟鑒乾序欽若明命齊即位告天文猥以沖人入纂乾緒思與黎元共綏戩福齊海陵詔踐祚谷永對成帝曰陛下踐至尊之祚為天下主奉帝王之職以統群生前漢仰宣遺烈俯弘景祚宋永光詔神器殆於朽索景祚危於綴旒上朕以眇身祇承寶祚周宣帝詔繼統興業興復洪祚後黃瓊傳高皇赫矣仰膺乾顧景星蒸哉實啓洪祚沈休昭王碑登極大命元集大業攸歸宜遵漢魏纂承皇極宋書太后令位御三極風澄萬寓宋永元詔夫肇自生民樹以司牧所以闡極則天開元創物齊告天文陛下窮神盡聖總極居中齊王融疏武皇以英明提極經緯天人齊太后詔漢宣嗣位之後即遣蒲類之軍光武登極既竟始有長安之捷王僧辨奉表公卿失馭禍纏霄極元紀望紫極而長號瞻丹陵而殞慟上握圖握乾圖之休徵應五百之顯期曹植論光武御鳳曆握龍圖梁武紀何以應寶曆何以嗣龍圖元紀握圖南面紹茲寶運上握圖執鉞將在御天上聖王御世河龍負卷舒圖論語比考讖踐寶祚握瑤圖唐類表握樞負扆握樞元歸明哲宋與齊九錫文秉籙御天握樞臨極王元長策秀才文高祖應期撫運握樞御宇陳書握機握機創歷誕命建家王元長詩序魏文與吳主策曰朕承運革命秉統天機吳志握符聖皇乃握乾符闡坤珍握皇圖稽帝文東都賦大魏膺靈符天祿方茲始曹植大魏篇信斯武之未喪膺靈符而在茲陸士衡弔茲魏武文魏武協建靈符天命既集石苞與孫皓書伏惟大晉應符御世桓溫薦譙秀表天子受符以卒日立號春秋漢含孳帝受命握符出也孝經鉤命訣宜順靈符速踐皇阼魏志注膺籙膺籙受圖順天行誅東京賦言漢高由德膺籙者代興于前失道數盡者迭廢于後魏志注董巴等奏五德更運膺籙受符應吉甫晉武帝華林園詩肇基駿命膺籙受圖齊廢東昏詔惟是孱蒙再膺天籙陳紀惟王應期誕秀開籙握圖上宣奉大宗嗣膺寶籙上奄宅區夏爰膺帝籙北齊贊五德之運同徵合符膺籙次相代春秋命歷序秉維人君者攝天地之政秉四海之維舉動不可以違聖法進退不可以離道規謬言出口則亂及八方後陳蕃疏登皇大漢之開元也奮布衣以登皇位東都賦神器不可以辭拒皇位不可以謙讓漢冊親詔陛下躡曆登皇乘圖踐帝天地更築日月再張孔稚圭張天造曆駕日登皇聲雷寓寓宙勢壓河嶽上皇綱古者陰陽始分天地初制皇綱云緒帝紀乃設後崔駰達旨廓帝紘恢皇綱答賓戲曹操階禍竊執天衡丕尋亂階盜據神器昭烈丕承天序存復祖業誕膺皇綱不墜于地朕以幼沖繼統鴻業諸葛集詔九州絶貫皇綱解紐孫子荊代與孫皓書帝王莫不張皇綱以羅遠飛仁風以被物晉桓談傳關朗曰聖人輔相天地準繩陰陽恢皇綱立人極修策迥馭長羅別駕昭治亂于未然算成敗于無兆文中子聖人之臨天下也祖乾綱以流化順谷風以興仁上元帝振乾綱於已墜紐絶維而更張晉劉波傳帝典缺而不補王綱弛而未張揚雄傳王綱縱弛于上智士鬱伊于下後崔實政論拯頽綱以繼三五鼓芳風以扇遊塵范寧穀梁傳序宸居高光二聖宸居其域典引宸居失御神器流離劉琨表睿文承歷景屬宸居顏延年曲水詩序宸極不可久曠民人不可乏主梁詔紫宸曠位赤縣無主梁王僧辨表育德素里棲景宸軒謝希逸宣貴妃誄德芬道俗美敷宸宇魏孝文詔賈逵曰宸室之奧者後人指帝居曰宸廣韻曰天子之居增韻帝居北辰之宮天曆思厚國本用弘天曆周宣詔天曆逐獄訟之歸神鼎隨謳歌之去周禪隋冊皇靈有眷遽移天曆陳書宸曆御寓弘革典憲沈休彈王源孝武棄世屬當曆宸宋太后詔安成王地隆親茂皇曆攸歸上祇從鴻曆處奉皇符南齊紀革文祖而撫歸運畏上天而躬寶曆齊璽梁禪齊武帝威承景曆肅御金科史臣寶命宸運肇創寶命維新齊詔寶命無常主帝王非一族梁紀嗣膺寶政欽若前圖欎林詔神鼎將遷寶策無主宋禪齊璽書負荷寶圖亟回星琯陳書武帝撥亂反正膺圖御籙文帝克嗣洪基光宣寶業上寶冊葳蕤帝圖掩映簡文頌鼎玉欽若唐虞推其鼎玉梁與陳璽書運鍾百六鼎玉遷變陳書史臣先殄衣冠次移龜鼎齊禪梁璽書干戈揖讓取之也殊途鼎玉龜符成之也一致海録天業婉婉幕中畫輝輝天業昌謝宣遠張良詩攝天之業使之理易制靈圖寅畏上靈用膺景業梁詔天璣大魏承天璣曹植秋胡行伊昔不造鴻化中微用集寶命仰陟天璣顏延年宋后哀策文注曰天璣喻帝位也即璿璣玉衡機璣同天居皇家赫而天居蔡伯喈西征賦層閣肅天居馳道直如髮選鮑明遠詩天綱陳蕃蕪室志清天綱人謀雖緝幽運未當後贊天暉廣筵華宴必參末例朝半問訊時奉天暉南齊劉祥傳帝暉臨幄百司定列顏延年曲水詩序天歡高宗誕辰與侍臣賦詩宴樂上曰可識朕意不須惜醉李嶠等奏曰既陪天歡不敢不醉景龍文館記擁璇持衡傾佇明哲宋禪齊璽書擁璇沈首屬懷聖哲齊禪梁冊昔放勛御世沈璧屬子重華握曆持衡擁璇魏禪北齊冊握紀李百藥封建論陛下握紀御天膺期啓聖獨照宸衷永懷前古英華五行之精帝王者五行之精易姓之符代興之會以七百二十年為一軌有德者遇之至於八百無德者不及至四百載是以周家八百六十七年夏家四百數十年漢行夏止迄今四百二十六歲魏志注合元德合元者稱皇孔子曰皇象元逍遙術無文字德明諡合天者稱帝河洛受瑞可放仁義合者稱王符瑞應天下歸往公羊成公八年傳注疏春秋說青蒲元帝欲廢太子史丹直入臥內伏青蒲上泣言太子遂定應劭曰以青規地曰青蒲非皇后不得至此前書王融疏云待詔朱闕伏對青蒲南齊書太后廢鬱林詔曰丹屏之北為沽鬻之所青蒲之上開桑中之肆紀日伏青蒲罕能切直任彥升策秀才文楓宸藝若充庭槐楓被宸景福殿賦古者王禁被以楓槐外朝之位樹九棘焉埤雅尊無為上天子尊無為上故天以為子位臨臣庶威重四海動靜以理則星辰順序意有邪僻則晷度錯違后爰延傳乾剛明主嚴天元之尊正乾剛之位若國政一由帝命王事每決於己後陳忠傳奮乾剛之位平天覆之施前谷永傳宅中彼偏據而規小豈如宅中而圖大東京賦古之王者擇天之中而立國擇國之中而立宮呂氏春秋宅天衷立民極顏延年序奄受敷錫宅中拓宇顏詩萬葉晉詔桓玄蕃衛王家垂固萬葉中興書拓世貽統固萬葉而為量顏延年曲水序步斗步玉斗握金鏡地維續天柱正張說握乾符頌亘地亘地稱皇罄天作主顏延年詩威力夫帝王者必立德立功可大可久經之以仁義緯之以文武深根固蒂貽厥子孫一言一行以為軌範垂之萬代為不可易所以域中四大王居其一帝力可以鎮萬邦王威可以伏兆庶翻譯帝王略論帝王不得稱帝王肅云王者雖號稱帝而不得稱天帝而曰天子乃天之子子之與父尊卑相去遠矣金光明經云以天護故復稱天子翻譯負扆皇帝應天御物負扆臨民含光宇宙照清海表梁邵陵王綸啓廣弘明集登圖大唐膺期啓運握機御曆誕命建家初起義則道叶百靈始登圖則威加萬國明概決對廣弘明集佛經五王世間帝王有其五種一粟散王威德最劣二鐵輪王治閻浮提三銅輪王兼二天下四銀輪王化三天下五金輪王統四天下仁王經此之五王論其位上下不同語其德勝劣有異推秦皇漢武閻浮提內唯王震旦五種王中粟散王也廣弘明釋明概決對傅奕事四種輪王威定諸方亦有差別慈恩云金輪望風順化銀輪遣使方降銅輪震威乃服鐵輪奮戈始定翻譯俱舍云從此洲人壽無量歲乃至八萬歲有轉輪王生契經從勝但說金輪故契經言若王生在剎帝利種紹灌頂位於十五日受齊戒時沐浴首身受勝齊戒升高臺殿臣僚輔翼東方忽有金輪寶現其輪千輻具足轂輞衆相圓淨如巧匠成舒妙光明來應王所此王定是轉金輪王轉餘輪王應知亦爾上中國者三千日月萬二千天地之中央也故有輪王迭出聖主繼興御七寶而王四天行十善而被萬國明概決對唐武后證聖元年秋九月加尊號天冊金輪聖神皇帝舊紀儀乾開寶歷御極轉金輪宗楚客應制歸仰夫為王者率土歸仰王當如橋濟渡萬民王當如水親踈皆平王當如道不違聖蹤王者如日普照世間王者如月與物清涼王如父母恩育慈矜王者如天覆蓋一切王者如地載養萬物王者如火為諸萬民燒除惡患王者如水潤澤四方應如過上轉輪聖王乃以十善道教化衆生雜寶藏經釋氏以自在名王妙玄云轉輪聖王四域自在翻譯因陀羅此云帝正翻天主以帝代之上遮閲那此云王薩遮經云王者民之父母以法攝護衆生令安樂故上帝王之道帝王之道包之如海養之如春朝錯新書其君天下也炎之如日威之如神涵之如海養之如春辟猶草木之植山林鳥魚之育川澤參天地而施化豈云人事之厚薄哉答賓戲帝王由昌本仁祖義褒有德祿賢能誅惡亂總遠方一統類美風俗此帝王所由昌也前東方朔傳夫本仁祖義褒德祿賢勸善刑暴五帝三王所繇昌也朕夙興夜寐稽參政事祈進民心庶幾成風紹休聖緒漢武紀萬幾之位大周應千載之期當萬幾之位述禮明樂合地平天武列文昭翼真明俗廣弘明王明廣對皇上繼三五而臨萬幾紹七百以御六辨勳格無稱道還淳粹經天緯地之德左日右月之明皇王之所未曉群聖之所不備億兆之所宜通將來之所必至莫不鬯其玄波而達其幽致者也庾黔婁答天誥暗情難曉觸理多疑天誥遠流預同撫覿萬夜獲開千昏永曙入神之妙發自天衷敢以膚受謹為注釋豈伊錐管用窮天奧沈績梁武立神明成佛義記序天思天思淵發妙旨凝深至理既弘孝機兼極生屬昌辰預覯聖藻王緝答勑審神威論天情睿思機深天情雲發標理明例渙若冰消王瑩答伏奉淵旨頓祛群疑天情獨照妙鑒懸覽伏烜答天識天識昭遠聖情淵察伏覽玄徽實曉庸昧建安王天旨天旨弘深殷勤於妙象范孝才伏讀天旨照鏡塵蒙皎若朝暉朗如宵讀陸璉猥奉神旨昭若發蒙殷鈞天誨天誨諄諄引諭彌博徒懷遊聖終懵管窺謝綽天照天照淵凝妙旨周博折彼異端弘茲教範信可以朗悟冥塗棟梁千載矣王珍國天製蒙示天製謹加讀誦垢吝雲消特兼歡抃韋睿天儀天儀臨席睟容親證拜伏雖多疲勞頓遣簡文答湘東書天覽臣障雖多災身穢饒疾針艾湯藥每黷天覽簡文謝懺天獎大恩淵深睿情廣奧夕趨瓊筵晨登朱陛歲頒天獎猶及下官蕭映答晉安王心要書天藻聖上愍其迷途爰奮天藻鉤深致遠盡化知神陸倕仰墜天藻俯逮闡提所謂若披重霧以攀合璧出幽夜而眄燭龍短綆爰汲望瀾覘海沈宏天苑敢藉寵靈頻干聽覽再降神旨未垂臨燭自以結根天苑竊高前載纍冒宸嚴倍增戰息梁太子綱請御講啓天慈欲須甘果翻種苦瓜欲除渴乏反趨鹹水伏願天慈曲垂矜許隋釋彥琮通極論天澤聖主流慈天澤滂被上答乾慈永同彼岸蕭綸教天鑒天鑒凝遠未蒙降遂晉安王等重請御講啓道綱聖王御世淳風遐被振道綱以維六合布德網以羅群俊川無扣浪之夫谷無含歎之士晉什道恆釋駁論地綱皇帝握斯乾紀執斯地綱懸特日月嘯吒風雲北齊武成詔魏收臨乾皇上體神御極挹睿臨乾二儀叶德五精翼化下洞淵泉上達蒼昊統天皇帝以上睿統天大明御極彈壓九代驅駕百王至德上通深仁下漏盧思道詩序運元象理大綱仗八柄運元象撮衆有者天子也周生烈子盤古天地渾沌如雞子盤古生其中萬八千歲天地開闢陽清為天陰濁為地盤古在其中一日九變神于天聖于地天日高一丈地日深一丈盤古日長一丈如此萬八千歲天極高地極深盤古極長三五歷紀盤古垂死化身氣成風雲聲為雷霆左眼為日右眼為月四肢五體為四極五嶽血液為江河筋脈為地里肌肉為田土髮髭為星辰皮毛為草木齒骨為金石精髓為珠玉汗流為雨澤身之諸蟲因風所感化為黎氓元氣論盤古之君龍首蛇身噓為風雨吹為雷電開目為晝閉目為夜死後骨節為山林腸為江海血為淮瀆毛髮為草木五運歷年記又昔古傳盤古左手為東嶽右手為西嶽腹為中嶽首為南嶽足為北嶽事物紀原盤古氏神靈一日九變蓋元混之初陶融造化之主也真源賦謂元始應世萬八千年為一甲子荊湖南北今以十月十六日為盤古氏生日以候月之陰晴云其頭化之所宜有以也路史廣都縣有盤古三郎廟頗有靈應民之過門稍不致敬必加顯驗或為人毆擊或道途顛蹶由是遠近畏而敬之縣人楊知遇者嘗受正一盟威籙一夕醉甚將還其家路遠月黑因廟門過大呼曰余正一弟子也願得神力示以歸路俄有一炬火自廟門出前引之比至其家二十餘里雖狹橋細路略無蹉跌火炬亦無見矣鄉里尤驚異之録異記天皇春秋保乾圖云天皇於是斟元陳樞以立易威言斟酌元化該皇極以建易道宋君云威則也言斟酌元氣陳列樞機之行以改立先法易通卦驗云天皇氏之先與乾曜合元君有五期輔有三名注云君之用事五行更王者亦有五期三輔公卿大夫也河圖括地象云天皇九翼提名旋復蓋輔翼者九人地皇人皇盤古氏後有天皇君一十三人時遭劫火乃有地皇君一十一人各萬八千餘年乃有人皇君兄弟九人結繩刻木四萬五千六百年真源賦天地初起狀如雞子盤古生其中經九萬歲次三皇及燧人氏治二萬二百九十七年帝系譜九皇九皇之制主不虛王臣不虛貴階級尊卑名號自君吏民次者無國歷寵歷録副所以付授與天人參相結連鉤考之具不備故也鶡冠子九皇殊制而政莫不效焉故曰泰一泰皇問泰一曰天地人事三者孰急泰一曰愛精養神內端者所以希天上泰一之道九皇之傳請成於泰始之末上注春秋緯云人皇兄弟九人分治天下九皇之號豈緣是歟泰皇蓋九皇之長也索隱曰按李斯議云天皇地皇之下即云泰皇當人皇也而封禪書云昔者太帝使素女鼓瑟而悲蓋二皇已前稱泰皇秦紀注李斯云泰皇最貴東戶東戶氏之熙載也紹荒屯遺美好垂精拱默而九寰以承流當是之時禽獸成群竹木遂長道上顏行而不拾遺耕者餘餼宿之隴首其歌樂而無謠其哭哀而不聲皆至德之世也子思子淮南子云東戶季子之世道路不拾遺耒耜餘糧宿諸畝首使君子小人各得其宜也許氏云古之人君傳又作東扈几蘧几蘧氏之御天下也不治而不亂徇耳目內通而外乎心知天下之人惟知母不知父鶉居鷇飲而不求不譽晝則旅行夜則類處及其死也藁舁風化而已令之曰知生之民亢倉子莊子人間世云夫徇耳目內通而外於心知鬼神將來而況其散焉者是伏羲几蘧之所行終而況其散者成玄英云徇使也能令根竅內通不緣於物境精神安靜志外於心知則外遣於形內忘於知鬼神冥附而舍止矣几蘧者三皇以前無文字之君言伏羲几蘧行之以終其身也至德之世昔者容成氏大庭氏伯皇氏中央氏栗陸氏驪畜氏軒轅氏赫胥氏尊盧氏祝融氏伏戲氏神農氏當是時也民結繩而用之甘其食美其服樂其俗安其居鄰國相望雞狗之音相聞民至老死而不相往來若此之時則至治己莊子赫胥氏夫赫胥氏之時民居不知所為行不知所之含哺而熙鼓腹而遊民能以此矣上皇雄齊授梁策云遂古之載肇有生人皇雄大庭之辟赫胥尊盧之后斯並龍圖鳥跡以前慌忽杳冥之世固無得而詳焉合雒元帝答王僧辨曰天生蒸民而樹之君所以對揚天休司牧黔首攝提合雒以前栗陸驪連之外書契不傳無得稱也神民氏路史云天地開闢爰有神民民神異業精氣通行見潛夫論卜列都於神民之邱一曰神皇氏陳子桱綱目外紀云神皇蓋使神民異業精氣通行者王潛夫云天地開闢有神民民神異業精氣通行有招召命有遭隨吉凶之期天難諶斯聖賢雖察不自專故立卜筮以質神靈按此論之意蓋謂開闢之後有神有民民之與神業雖異而精氣則相通也民之吉凶因行命而致故立卜筮以質神靈耳非以神民為帝者名氏也羅氏誤以行字帶上讀遂為強立名氏陳氏不察本書遂因之而示蓋使云云不大誤于後學耶路史又有大隗氏陳氏亦因載之按莊子徐無鬼云黃帝將見大隗乎具茨之山注云大隗大司神名也一云大道也又云具茨今名泰隗山未嘗以為帝者名也而羅氏云云不知果何所見其他所列帝王名氏詎可盡憑耶路史有巨靈氏左邱明國語云華嶽本一山當河河水過而曲行河神巨靈手蕩腳踏開而為兩今掌足之跡仍存水經有巨靈神者偏得神元之道能造山川出江河華嚴開山圖俱不云帝王也齊桓公欲封禪管仲曰古者封泰山禪梁父者七十二家而夷吾所記者十有二焉昔無懷氏云云史記孔子登泰山觀易姓而王可得而數者七十餘人不得而數者萬數也韓詩外傳楊朱曰太古之事滅矣孰志之哉三皇之事若存若亡五帝之事若覺若夢三王之事或隱或顯億不識一當身之事或聞或見萬不識一目前之事或存或廢千不識一太古至于今日年數固不可勝紀列子高辛已往則聞其人不見其書唐虞夏殷則見其書不詳其事周氏已來載籍具矣仲長昌言按此昔人所論往古事者也而路史之云若此三皇伏羲女媧神農春秋運斗樞伏羲祝融神農禮號諡記虙戲燧人神農含文嘉伏羲神農黃帝之書謂之三墳孔安國書序女媧燧人祝融事經典未嘗以皇帝言之又不承五行之運蓋霸而不王者也且祝融乃顓頊之代火官之長可列於三皇哉則諸家之論唯安國為長兼明書邁化三皇邁化民不犯慝後天文志三皇邁化五星如連珠日月如合璧上三皇邁德七曜順軌晉天文志登閎羽獵賦歷五帝之寥廓涉三皇之登閎韋昭曰登高也閎大也選躡三皇之高蹤揚雄河東賦統天三皇統天五帝御寓道含弘而遠大德普覆而平均廣弘明集夫王道之主其德能載包含以統乾元也桓談新論太昊燧人氏沒庖犧氏代之繼天而生首德於木為百王先帝出於震末有所因故位在東方主春象日之明是稱太昊皇王世紀緯合天地開闢五緯各在其方至伏犧乃合故以為元春秋內事三皇最先說文云賈侍中說此犧非古字張揖字詁云羲古字戲今字一號包羲氏三皇之最先書序注養犧牲以充庖廚故曰庖犧氏服牛乘馬亦曰伏羲通曆伏犧德洽上下禮含文嘉庖官太昊之世設九庖之官崔實政論春皇春皇者庖犧之別號至德於天下元元之類莫不尊焉以木德稱王故曰春皇其明睿照於八區是謂太昊昊者明也位居東方以含養蠢化叶于木德其音附角號曰木皇拾遺記一號雄皇氏世紀法始或曰太上無法而治法非所以為治也曰鴻荒之世聖人惡之是以法始乎伏羲而成乎堯匪伏匪堯禮義哨哨聖人不取也揚子問道篇周易云伏羲為上古俯仰二儀經綸萬象至德備於冥昧神化通於精粹是以圖書著其迹河洛表其文變太素之質改淳遠之化三才之位既立四維之義乃張禮樂文物自茲而始拾遺記録功揆天地虙犧氏之王天下也枕石淮南作枕方寢繩殺秋約冬負方州抱員天陰陽所擁沈滯不通者竅理之逆氣戾物傷民厚積者絶止之其民童蒙不知西東視瞑瞑行蹎蹎侗然自得莫知其所由浮游泛然不知所本自養不知所如往當此之時禽獸蟲蛇無不懷其爪牙藏其螫毒功揆天地然而不章其功不揚其名隱真人之道以從天地之固然何即道德上通而智故消滅也文子至德伏戲女媧不設法度而以至德遺於後世何則至虛無純一而不羈喋苛事也淮南子春秋世譜云華胥生男子為伏羲女子為女媧故世言女媧伏羲之妹鍊補往古之時四極廢九州裂女媧鍊五色石以補蒼天斷鼇足以立四極蒼天補四極正考其功烈上際九天下契黃壚名聲被後世光輝重萬物乘雷車服駕應龍驂青虬援絶瑞席蘿圖黃雲絡前白螭後奔蛇浮游消搖道鬼神登九天朝帝於靈門宓穆休于太祖之下准南訓福萬民壽九州莫大乎真氣鍊五石立四極莫大乎神用易內篇平定州有東西浮化二山皆有女媧廟其東浮山即媧氏補天之處其鍊石竈尚存而所産諸色石亦可燒云歲上元夕人家各置一爐當戶是曰補天圖經互見天地門見上注羅列圖籍以為席蓐一說羅圖車上席也七十化黃帝生陰陽上駢生耳目桑林生臂手此女媧所以七十化也淮南子黃帝古天神女媧之腸化為神處栗廣之野橫道而處山海經女媧古神女而帝者人面蛇身一日中七十變其腹化為此神栗廣野名注女媧鍊得五方氣變化成形補天地三十六變世應知七十二化處其位麻姑紫壇歌二皇泰古二皇得道之柄立於中央神與化游以撫四方是故能天運地滯輪轉而無廢淮南注二皇伏羲神農也為師故不言之令不視之見此伏犧神農之所以為師也故民之化也不從其所言而從所行淮南嘗百草古者民茹草飲水采樹木之實食螺蛖之肉時多疾病毒傷之害於是神農乃始教民播植五榖相土地宜燥濕肥墝高下嘗百草之滋味水泉之甘苦令民知所避就當此之時一日而遇七十毒上神農以為走獸難以久養民乃求可食之物嘗百草實察鹹苦之味教民食榖賈誼書神農嘗百草分五榖蒸民乃粒食陸景典略或云神農嘗百藥之時一日百死百生其所得三百六十物以應周天之數化如神神農之治天下也神不馳於胸中智不出於四域懷其仁誠之心甘雨時降五榖蕃植春生夏長秋收冬藏月省時考歲終獻功以時嘗榖祀於明堂明堂之制有蓋而無四方風雨不能襲寒暑不能傷遷延而入之養民以公其民朴重端愨不忿爭而財足不勞形而功成因天地之資而與之和同是故威厲而不殺刑錯而不用法省而不煩故其化如神其地南至交址北至幽都東至暘谷西至三危莫不聽從當此之時法寬刑緩囹圄空虛而天下一俗莫懷姦心淮南戴玉理有神人名石年蒼色大眉戴玉理駕六龍出地輔號皇神農春秋命曆序問太一神農稽首再拜問於太一小子曰鑿井出泉五味煎煮口別生熟後乃食咀男女異利子識其父曾聞太古之時人壽過百無殂落之咎獨何氣使然耶太一小子曰天有九門中道最良日月行之名曰國皇字曰老人出見南方長生不死衆耀同光神農乃從其嘗藥以救人命神農本草夫負妻戴神農氏夫負妻戴以治天下堯曰朕之比神農猶旦與昏也尸子神農之教曰士有當年不耕者則天下或受其飢矣女有當年不績者則天下或受其寒矣故夫親耕妻親績呂覽紀綱四時神農黃帝竅領天下紀綱四時和調陰陽於是萬民莫不竦身而思戴聽而視故治而不和文子赤帝神農為赤帝繁露黃軒邈矣黃軒應天載靈牽秀黃帝頌德冠黃帝德冠帝位春秋合誠圖調日月黃帝治天下而力牧太山稽輔之淮南調日月之行治陰陽之氣節四時之度正律曆之數別男女明上下使強不掩弱衆不暴寡民保命而不夭歲時熟而不凶百官正而無私上下調而無尤法令明而不暗輔佐公而不阿田者讓畔道不拾遺市不預賈故於此時日月星辰不失其行風雨時節五榖豐昌鳳凰翔於庭麒麟游於郊文子青龍進駕飛黃伏皂諸北儋耳之國莫不獻其貢賦淮南蘭席黃帝使百辟群臣受德教者先列圭玉於蘭席上燃沈榆之香舂雜寶為屑以沈榆之膠和之為泥以塗地分別尊卑華戎之位也拾遺記事出封禪記王融疏云天移雲動勒封岱宗咸五登三追蹤七十集三燭于蘭席聆萬歲之禎聲豈不韙哉南齊書四面子貢問孔子曰古者黃帝四面信乎孔子曰黃帝取合己者四人使治四方不謀而親不約而成大有成功此之謂四面也尸子呂氏春秋云黃帝立四面三百年宰我問于孔子曰昔者豫聞諸榮伊曰黃帝三百年請問黃帝者人耶抑非人耶何以至於三百年子曰生而民得其利百年死而民畏其神百年亡而民用其教百年故曰三百年大戴禮九行黃帝置四史以主圖籍使九行之士以統萬國九行者孝慈文信忠恭勇義以觀天地以祠萬靈亦為九德之臣拾遺記任風力舉風后力牧常先大鴻以治民史記黃帝夢大風吹天下之塵垢皆去又夢人執千鈞之弩驅羊萬群帝寤而嘆曰風為號令執政者也垢去土后在也天下豈有姓風名后者哉夫千鈞之弩異力者也驅羊數萬群能牧民為善也天下豈有姓力名牧者也於是依二占而求之得風后於海隅登以為相得力牧於大澤進以為將帝王世紀黃帝師於風后風后善於伏羲氏之道故推演陰陽之事春秋內事黃帝察三辰於上跡禍福于下經緯歷數然後天步有常則風后之為也後張衡傳黃帝得力牧而為五帝先大禹得咎繇而為三王祖前鼂錯傳黃帝所以垂衣裳而天下理者任風力也帝堯所以光宅天下者任稷卨也舊唐盧懷慎傳陶天下黃帝問於伯高曰吾欲陶天下而以為一家為之有道乎伯高對曰請刈其莞而樹之吾謹逃其牙則天下可陶而為一家管子合鬼神昔者黃帝合鬼神於泰山之上駕象車而六蛟龍畢方並轄蚩尤居前風伯進掃雨師灑道虎狼在前鬼神在後螣蛇伏地鳳凰覆上大合鬼神作為清角韓非子十過置法黃帝之治天下也其民不引而來不推而往不使而成不禁而止故黃帝之治也置法而不變使民安其法者也管子任法問道黃帝聞廣成子在於崆峒之上故往見之曰我聞吾子達於至道敢問至道之精吾欲取天地之精以佐五榖以養民人吾又欲官陰陽以遂群生為之奈何治身奈何而可以長久廣成子蹶然而起曰至道之精窈窈冥冥至道之極昏昏默默莊子遊天衢黃帝之遊天衢奏鈞天之鼓建日月之旗乘雕雲之輿駕六翼之龍彭祖前驅松喬俠轂光景流而不見長風逐而不及發軔紫宮不崇朝而匝六合也孫綽子適昆虞黃帝將適昆虞之邱中路逢容成子乘翠華之蓋建日月之旗驂紫虬御雙鳥黃帝命方明遊路謂容成子曰吾將釣于一壑栖于一邱符子龍驤黃帝之初養性養民不好戰伐而四帝各以方色稱號交共謀之邊城日驚介胄不釋黃帝歎曰君危于上民安于下主失於國其臣再嫁厥病之由非養寇耶今處民萌之上而四盜亢衡遞震子師於是遂即營壘以滅四帝向令黃帝若不龍驤虎變而與俗同道則其民亦嫁于四帝矣蔣子萬幾論黃靈思玄賦黃靈詹而訪命兮樛天道其焉如注黃靈黃帝也詹至也訪謀也樛求也如之也黃炎黃炎故用水火矣共工氏固次作難矣五帝固相與爭矣遞興廢勝者用事呂覽蕩兵夫兵者所以禁暴討亂也炎帝為火災故黃帝擒之共工為水害故顓頊誅之淮南子世及干寶晉武革命論云鴻黃世及以一民也黃帝內禪體文德也晉紀左傳史克曰昔帝鴻氏有不才子賈逵杜預曰帝鴻黃帝也按山海經帝俊生帝鴻帝鴻生白民干云世及則賈杜似誤唐逢行圭鬻子注云軒轅氏少典次子父曰帝鴻氏路氏謂帝鴻為黃帝子帝俊是黃帝字無稽紀三綱炎帝分八節以始農功軒轅紀三綱而闡書契晉律歷志制法窮聖神備道德滋萌元氣開闢太初斯乃天皇氏之所以應乎天也依土地明神靈駕六羽而上騰度九州而下濟斯乃人皇氏之所以順乎人也造書契教畋漁合五緯而節四時登九天而類萬物斯乃犧皇氏之所以制人法也務播殖該變通嘗藥以救兆人聚貨而交天下斯乃農皇氏之所以興人利也振夔鼓載龍旗天則玄女授符帝則黃神降斗斯乃軒轅氏之所以除人害也崔融啓母廟碑乘時乘時設教必生大聖以首之庖羲氏甄才煥文君人子天神農以之首於皇而體至道也軒轅氏推策命官度方順紀顓頊奉之首於帝而法玄德也常仲孺文宣王廟碑無言三皇無言而化流四海故天下無所歸功帝者體天則地有言有令而天下太平君臣讓功四海化行百姓不知其所以然武經七書五帝黃帝少昊顓頊帝嚳唐堯虞舜為五帝六人而云五帝者以其俱合五帝座星也康成黃帝顓頊帝嚳唐堯虞順為五帝史記少昊顓頊高辛唐虞為五帝孔安國康成以女媧為皇軒轅為帝軒轅之德不劣女媧何故不為稱皇而淪之入帝仍為六人哉司馬遷近遺少昊而遠收黃帝甚為踈略唯安國為定論兼明書神聖五帝神聖其臣莫能及故自親事處于法宮之中明堂之上動靜上配天下順地中得人故衆生之類亡不覆也根著之徒亡不載也燭以光明亡偏異也德上及飛鳥下至水蟲草木諸産皆被其澤然後陰陽調四時節日月光風雨時膏露降五榖熟妖孽滅賊氣息民不疾疫河出圖洛出書神龍至鳳鳥翔德澤滿天下靈光施四海此謂配天地治國大體之功也前朝錯傳道化五帝之世道化淳備穀梁注朱宣河圖曰白帝朱宣宋均曰少昊氏也王元長策秀才文五正置於朱宣下民不忒少昊窮桑氏嬴姓以金德王故號金天氏也或曰宗師太昊之道故曰少昊古史考少昊以主西方一號金天氏亦曰金窮氏時有五鳳隨方之色集於帝庭因曰鳳鳥氏拾遺記勤民昔在金天勤於民事命春鳸以耕稼召夏鳸以耘鋤秋鳸所以收斂冬鳸於焉蓋藏晉食貨志獻裘少昊都於曲阜鞬鞮毛人獻其羽裘渠摉之人服禹之德獻其珍裘毛出五采田俅子王者奉五行教民種柏以時則渠摉來獻裘德茂盛不恥惡衣則四夷獻其白裘孫氏瑞圖絶地天通楚觀射父曰少皡之衰也九黎亂德民神雜揉不可方物漢書作放家為巫史享祀無度黷齊明而神弗蠲嘉生不降禍災荐臻莫盡其氣顓頊受之乃命南正重司天以屬神火正黎司地以屬民使復舊常亡相侵黷是謂絶地天通楚語前郊祀志揖靈顓頊居位奇祥衆祉莫不總集不稟正朔者越山航海而皆至也帝乃揖四方之靈群后執圭以禮百辟各有班序受文德者錫以鐘磬受武德者錫以干戈拾遺緣道昔者帝顓頊年十五而佐黃帝二十而治天下其治天下也上緣黃帝之道而行之學黃帝之道而常之鬻子日慎一日顓頊曰功莫美於去惡而為善罪莫大於去善而為惡故非吾善善而已也善緣善也非惡惡而已也惡緣惡也吾日慎一日其此而已也賈太傅新書法天地良人請問十二紀文信侯曰嘗得學黃帝之所以誨顓頊矣爰有大圜在上大矩在下汝能法之為民父母蓋聞古之清世是法天地凡十二紀者所以紀治亂存亡也呂覽銘器天和元年詔曰昔周王受命請聞顓頊廟有戒盈之器室為復禮之銘後周書帝嚳昔者帝嚳年十五而佐帝顓頊三十而治天下其治天下也上緣黃帝之道而明之學帝顓頊之道而行之鬻子信仁帝嚳曰德莫高於博愛人而政莫高於博利人故政莫大於信治莫大於仁吾慎此而已也賈太傅新書敘三辰顓頊氏其相戴干其號高辛厥職神靈德行祇肅迎逆日月順天之則能敘三辰以固民潛夫論戴干帝嚳駢齒上法日參秉度成紀以理陰陽河圖矩起帝嚳戴干是謂清明發節移度蓋像招搖元命苞道德帝嚳有天下號高辛高辛者道德大信也嚳者極也言其能施行窮極道也白虎通嚳者考也成也言其考明法度醇美嚳然若酒之芬香也風俗通黃唐自昔黃唐經略萬國燮定東西疆理南北前敘傳大漢基隆于羲農規廣于黃唐選班固賓戲五等之制始於黃唐陸士衡五等論周氏以鑒夏殷之長久遵黃堂之並建唐李百藥封建論佶堯佶堯之時混吾之美在下其道非獨出時也山不用而童瞻澤不弊而養足管子侈靡陶唐堯先居唐後居陶邱故曰陶唐氏元和郡縣志上稽乾則降承龍翼而炳諸典謨以冠德卓絶武臣作綽者莫崇乎陶唐班固賓戲明法昔者堯之治天下也猶埴之在埏也唯陶之所以為猶金之在爐恣治之所以鑄其民引之而來推之而往使之而成禁之而止故堯之治也善明法禁之令而已矣管子任法游汾堯治天下之民平海內之政往見四子藐姑射之山汾水之陽窅然喪其天下焉莊逍遙四子王倪齧缺被衣許由注體元則大悵望姑射之阿曲水詩序昔聞汾水游今見塵外鑣謝靈運北固詩德遠帝堯曰吾存心於先古說苑作天下加志於窮民痛萬姓之罹罪憂衆生之不遂也故一民或飢曰此我飢之也一民或寒曰此我寒之也一民有罪曰此我陷之也仁行而義立德博而化廣故不賞而民勸不罰而民治先恕而後行是故德音遠也賈太傅新書說苑載河間獻王之言同刑措帝堯之治天下也蓋殺一人刑二人而天下治故曰威厲而不試刑措而不用此之謂也荀議兵子貢曰傳云堯舜之王一人不刑而天下治教誠而受深也書大傳儉德人君之有天下者瑤臺九纍而堯白屋黼衣九種而堯大布宮中三市而堯鶉居珍羞百種而堯糲飯菜粥騏驎青龍而堯素車朴馬尸子人之所以樂為人主者以其窮耳目之欲而適躬體之便也今高臺層榭人之所麗也而堯朴桷不斫素題不枅珍怪奇異人之所美也而堯糲粢之飯藜藿之羹文繡白狐人之所好也而堯布衣掩形鹿裘御寒養性之具不加厚而增之以任重之憂故舉天下而傳之于舜若解重負然非直辭讓誠無以為也淮南精神訓堯之有天下也非貪萬人之富而安人主之位也以為百姓力征強凌弱衆暴寡於是堯乃身服節儉之行而明相愛之仁以和輯之是故茅茨不翦采椽不折大路不畫越席不緣大羹不和粢食不毇巡狩行教勤勞天下周流五嶽豈其奉養不足樂哉舉天下而以為社稷非有利焉年衰志憫舉天下而傳之舜猶却行而脫屣也上主術帝堯王天下之時金銀珠玉弗服也錦繡文綺弗衣也奇怪異物弗視也玩好之器弗寶也淫泆之樂弗聽也宮垣屋室弗堊色也榱桷柱楹弗藻飾也茅茨之蓋弗翦齊也𦓗衣絓履不弊不更為也滋味重纍弗食也溫飯暖羹不酸餒不易也不以私曲之故留耕種之時削心約志從事于無為其自奉也甚薄其賦役也甚寡故萬民富樂而無饑寒之色百姓戴其君如日月親其君如父母六韜堯之王天下也有茅茨不翦采椽不斫糲粢之食藜藿之羹冬日麑裘夏日葛衣雖監門之服養不虧於此矣韓非子堯有天下飯於土簋飲於土鉶其地南至交趾北至幽都東西至日月之所出入者莫不賓服上晏子問于子華子曰嬰聞聖人尚儉堯不以土階為陋而有虞氏怵戒于塗髹於傳有之乎子華子曰昔堯居於衢室之宮垂衣而襞幅邃如神明之居輯五瑞以見群后帶幅舄而入覲者如衆星之拱北堯則若固有之也舜遊於巖廊之土被袗衣而鼓五絃之琴畫日月於太常備十有二章黼黻玄黃爛如也出則有鸞和動則有珮環步趨中於莖詔之節舜亦若固有之也夫堯舜之備物也如此而惡有所謂土階三尺茅茨不翦者惡有所謂塗髹以自怵戒者此腐儒之所守而汙俗之所以相欺者也野人之所稱道故記所不傳者也子華子九臣當堯之時舜為司徒契為司馬禹為司空后稷為田疇夔為樂正倕為工師伯夷為秩宗皋陶為大理益掌驅禽堯體力便巧不能為一焉堯為君而九子為臣其何故也堯知九職之事使九子者各受其事皆勝其任以成九功堯遂成厥功以王天下說苑君道堯之九臣誠而能興於朝其四臣詐而誅於野上堯之治天下也舜為司徒契為司馬禹為司空后稷為大田師奚仲為工其導萬民也水處者漁山處者木谷處者牧陸處者農地宜其事事宜其械械宜其用用宜其人澤皋織網陵阪耕田得以所有易所無以所工易所拙是故離叛者寡而聽從者衆譬若播棊丸於地員者走澤方者處高各從其所安若風之遇簫忽然感之各以清濁應矣淮南齊俗治官理民者有司也君無事焉猶尊君也辟地墾草者后稷也決河濬江者禹也聽獄治中者皋陶也有聖名者堯也故得道以御者身雖無能必使能者為己用不得其道技藝雖多未有益也詮言堯戒堯戒曰戰戰栗栗日慎一日人莫蹪於山而蹪於垤人間大公劉向曰古有行大公者帝堯也貴為天子富有天下得舜而傳之不私其子去天下若遺屣於天下猶然況細於天下者乎恩深堯遭洪水之災天下分絶為十二州制遠之道微而無乖畔之難者德厚恩深無怨於天下也前谷永傳德化唐堯以德化為冠冕以稷契為筋力高而益崇動而愈據此先聖所以長守萬國保其社稷者也後黃瓊傳群龍為用昔唐堯在上群龍為用是以能建天地之功增日月之耀者也上郎顗傳華封祝堯觀乎華華封人曰嘻聖人請祝聖人使聖人壽堯曰辭使聖人富堯曰辭使聖人多男子堯曰辭封人曰壽富多男子人之所欲也女獨不欲何耶堯曰多男子則多懼富則多事壽則多辱是三者非所以養德也故辭封人曰始也我以女為聖人耶今然君子也天生萬民必授之職多男子而授之職則何懼之有富而使人分之則何事之有夫聖人鶉居而鷇食鳥行而無彰天下有道則與物皆昌天下無道則修德就閒千歲厭世去而上仙乘彼白雲至于帝鄉三患莫至身常無殃則何辱之有莊天道康衢謠堯治天下五十年不知天下治歟不治歟不知億兆之願戴己歟不願戴己歟顧問左右左右不知問外朝外朝不知問在野在野不知堯乃微服游於康衢聞兒童謠曰立我蒸民莫匪爾極不識不知順帝之則喜問曰誰教爾為此言童兒曰我聞之大夫問大夫大夫曰古詩也堯還宮召舜因禪以天下列仲尼用心舜問於堯曰天王之用心何如堯曰吾不敖無告不廢窮民苦死者嘉孺子而哀婦人此吾所以用心已舜曰美則美矣而未大也堯曰然則何如舜曰天德而出寧日月照而四時行若晝夜之有經雲行而雨施矣堯曰膠膠擾擾乎天之合也我人之合也莊天道安榮許由欲觀帝意謂堯曰坐於華殿之上面雙闕之下君之榮願亦已足矣夫堯曰余坐華殿之上森然而松生於棟余立櫺扉之內霏焉而雲生於牖雖面雙闕無異乎崔巍之冠蓬萊雖背墉郭無異乎回巒之縈崑崙余安知其所以安榮符子六王之冠夫堯之賢六王之冠也舜一徙而成邑而堯無天下矣有人無術以禁下恃為舜而不失其民不亦無術乎韓難三帝媯昔在帝媯巨唐之世海賦舜祖幕夫成天地之大功者其子孫未嘗不章虞夏商周是也乃至于虞幕能聽協風以成樂物生者也云云其後皆為王公侯伯鄭國語晉侯問于史趙曰陳其遂亡乎對曰未也且陳氏得政于齊而後卒亡自幕至于瞽瞍無違命舜重之以明德置德於遂遂世守之及胡公不淫故周賜之姓使祀虞帝臣聞盛德必百世祀虞之世數未也繼守將在齊其兆既存矣左昭八年展禽云幕能帥顓頊者也有虞氏報焉魯語孔朝云幕能修道功不及祖德不及宗故每於歲之大蒸而祭焉謂之報言虞舜祭幕明幕是舜先不知去舜遠近也左疏舜祖幕幕生窮蟬窮蟬生敬康敬康生喬牛喬牛生瞽叟瞽叟産舜劉耽呂梁碑鄭衆曰幕舜之先賈逵以幕為虞思非也傳言自幕而至瞽瞍知幕在瞽瞍之前非虞思明矣陳世家索隱不利利人舜耕歷山陶河濱漁雷澤不取其利以教百姓百姓舉利之此所謂能以所不利利人者也管子歷山之農者侵畔舜往耕焉朞年甽畝正河濱之漁者爭抵舜往漁焉朞年而讓長東夷之陶者器苦窳舜往陶焉朞年而器牢仲尼歎曰耕漁與陶非舜官也而舜往為之者所以救敗也舜其信仁乎乃躬耕處苦而民從之韓難一舜兼愛百姓務利天下其田歷山也荷彼耒耜耕彼南畝與四海俱有其利其漁雷澤也旱則為耕者鑿瀆儉則為獵者表虎故有光若日月天下歸之若父母尸子昔舜耕於歷山朞年而田者爭處墝埆以封壤肥饒相讓釣於河瀆朞年而漁者爭處湍瀨以曲隈深潭相豫當此之時口不設言手不指麾執玄德於心而化馳若神淮原道行猶河海舜南面而治天下天下太平明于玉燭息于永風食於膏火飲于醴泉舜之行其猶河海乎千仞之溪滿焉螻蟻之穴亦滿焉由此觀之禹湯之功不足言也尸子託位舜一徙成邑再徙成都三徙成國四方之士歸之堯聞其賢徵之草茅之中與之語禮樂而不逆與之語政至簡而易行與之語道廣大而不窮於是妻之以媓媵之以娥九子事之而託天下焉上屬以九子贈以昭華之玉而傳天下焉淮南子見堯昔堯殂之後舜仰慕三年坐則見堯于牆食則覩堯于羹後漢李固傳殛鯀堯以天下讓舜鯀為諸侯怒於堯曰得天之道者為帝得地之道者為三公今我得地之道而不以我三公以堯為失論欲得三公乃使猛獸欲以為亂比獸之角能以為城舉其尾能以為旌召之不來仿佯於野以患帝舜於是殛之於羽山副之以吳刀禹不敢怨而反事之官為司空呂氏春秋堯欲傳天下於舜鯀諫曰不祥哉孰以天下而傳之於匹夫乎堯不聽舉兵而誅殺鯀於羽山之郊共工又諫曰孰以天下而傳之於匹夫乎堯不聽又舉兵而誅共工於幽之都於是天下莫敢言無傳天下於舜仲尼聞之曰堯之知舜之賢非其難者也不以其所疑敗其所察則難也韓非子堯以天下與舜顏色不變舜受天下於堯亦顏色不變知天下無損益於己也夫何為哉尸子大功舜有大功二十而為天子注舉十六相去四凶也左十八年帝舜以二八成功文王以多士興周晉華談傳策二八舉而四門穆十亂用而天下安何充疏虞喜二八升而唐朝盛伊呂用而湯武寧袁安名臣頌舜去四凶而格天地唐書宗立太子制教舜務成昭之教舜曰避天下之逆從天下之順天下不足取也避天下之順從天下之逆天下不足失也尸子作食器堯禪天下虞舜受之作為食器斬山木而財之削鋸修之迹流漆墨其上輸之於宮以為食器諸侯以為益侈國之不服者十三韓非子不下席子曰參女以為明主為勞乎昔者舜左禹而右皋陶不下席而天下治書大傳不下堂人君不親小事百官有司各任其職故舜命九賢則無所用心彈五絃之琴詠南風之詩不下堂廟而天下治也吳志步騭黃序王元長策秀才文九工開於黃序庶績其凝注帝王世紀曰舜始即位改正朔以土承火色尚黃尚書中候所謂建黃授正改朔選端如北極舜之在位也端如北極淮覽冥訓舜之在位猶北辰然家五帝注見萬卷菁華致天下堯問於舜曰我欲致天下為之奈何對曰執一無失行微無怠忠信無倦而天下自來執一如天地行微如日月忠誠盛於內賁於外形於四海天下其在一隅耶夫有何足致也荀堯問尊德禮魏徵疏潛夫論曰人君之理莫大於道德教化也聖人甚尊德禮而卑刑罰故舜先敕契以敬敷五教而後任咎繇以五刑也貞觀政要遇時舜之耕漁其賢不肖與為天子同其未遇時也以其徒屬掘地財取水利編蒲葦結罘網手足胼胝不居然後免於凍餒之患其遇時也登為天子賢士歸之萬民譽之丈夫女子振振殷殷無不戴說舜自為詩曰普天之下莫非王土率土之濱莫非王臣所以見盡有之也盡有之賢非加也盡無之賢非損也時使然也呂氏春秋卷婁卷婁者舜也羊肉不慕蟻蟻慕羊肉羊肉羶也舜有羶行百姓悅之故三徙成都至鄧之虛而十有萬里堯聞舜之賢舉之童土之地曰冀得其來之澤莊子寡為昔者舜甑盆無膻而下不以餘獲罪飯乎土簋啜乎土型而農不以力獲罪麑衣而𥂕領而女不以巧獲罪法下易由事寡易為功而民不以政獲罪故大道多容大德衆下聖人寡為故用物常壯也韓詩外傳十堯九舜知高九舜明出十堯三四六五不能喻十堯九舜無以方廣弘明昭明啓梁元檄四方云十堯九舜何足云也紀今夫堯舜生而在上位雖有十桀紂而不能亂者則世治也桀紂亦生而在上位雖有十堯舜而不能治者則勢亂也韓子責公者易雖一賢少謬執難者衆雖九舜猶亂桓範要論左堯右舜事強暴之國必致寶單國舉而後己雖左堯右舜未有能以此道免者也韓詩外傳體堯蹈舜濟時拯世之術豈必體堯蹈舜然後乃理哉期於補綻決壞枝柱邪傾隨形裁割措於安寧後崔實論善教堯舜至天下之善教化者也南面而聽天下生民之屬莫不振動從服以化順之然而朱象獨不化堯舜者天下之英也朱象者天下之嵬一時之瑣也今世俗不怪朱象而非堯舜豈不過甚矣哉夫是之謂嵬說荀子四王舜染於許由伯陽禹染於皋陶伯益湯染於伊尹仲虺武王染於太公望周公旦此四王者所染當故立天下立為天子功名蔽天地舉天下之仁義顯人必稱此四王者呂覽舜逼堯禹逼舜湯放桀武王伐紂此四王者人臣弒其君者也而天下譽之察四王之情貪得人之意也度其行暴亂之兵也然四王自廣措也而天下稱大焉自顯名也而天下稱明焉則威足以臨天下利足以蓋世天下從之韓非子四代梁武帝云書起軒轅同以燧人為皇其五帝自黃帝至堯而止知帝不可以過五故曰舜非三王亦非五帝與三王為四代而已書疏學記云三王四代唯其師注虞夏殷周五代五代建侯開國成家傳嗣百世歷載千數皆以能當天官功加百姓五代之臣以道事君以仁撫世澤及草木兼利外內普天率土莫不被德其所安全真天工也是以福祚流衍本枝百世潛夫論貴忠篇靈光殿賦殷五代之純熙紹伊唐之炎精注五代唐虞夏殷周也旗古今昔舜欲旗古今務大作服海外而不成既足以成帝矣禹欲帝而不成既足以正殊俗矣湯欲繼禹而不成既足以服四荒矣武王欲及湯而不成既足以王道矣桓公欲繼三王而不成既足以為諸侯長矣呂覽論大神明主天胙光德而隕明忒昔在有熊高陽高辛唐虞三代咸有顯懿故天祚之為神明主且著在天庭是生民之願也厥饗國長久楊重黎威察今人言五帝三王者其盛無偶威察若存其故何也其法盛其德厚故思其德必稱其人朝夕祝之升聞於天上帝俱歆用永厥世而豐其年家語執轡咸五司馬相如難蜀父老文曰上咸五下登三注言與五帝皆盛而登于三王之上也前書四三皇而六五帝曾何周夏之足言景福殿賦遐邇五三校獵賦畜王資而承敵國之釁超五帝侔三王者必此法也韓非子人主師五帝而式三王後崔實傳朝登五帝夕宿三皇杜甫太清宮賦孕育乃先孕虞育夏甄殷陶周班固典引吞虞孕夏罩漢籠周梁簡文菩提頌遂欲流唐漂虞滌殷蕩周揚雄劇秦馳驟堯步舜趨禹馳湯驟杜太清宮賦五帝之戒武王問五帝之戒可得聞太公曰黃帝云余在民上搖搖恐夕不至朝故金人三緘其口慎言語也堯居民上振振如臨深淵舜居民上兢兢如履薄冰禹居民上栗栗如恐不滿湯居民上翼翼恐不敢息意林八代今既不能純法八代故宜參以霸政八代謂三皇五帝也後崔實傳無地蘇秦說趙王曰舜無咫尺之地以有天下禹無百人之聚以王諸侯史記枚叔諫吳王書云舜無立錐之地以有天下禹無十戶之聚以王諸侯選堯無百戶之郭舜無置錐之地以有天下湯無七里之分以王諸侯淮南汜論令王韓厥曰三代之令王皆數百年保天之祿夫豈無辟王賴前哲以免也左成八四王齊賓媚人對晉人曰四王之王也樹德而濟同欲焉五伯之霸也勤而撫之以役王命成二堯伐歡兜舜伐有苗禹伐共工湯伐有夏文王伐虢武王伐紂此二帝四王皆以仁義之兵行于天下也荀議兵伯禹堯美禹績乃賜姓姒氏封為夏伯故謂之伯禹天下宗之謂大禹帝王世紀禹步禹治洪水疏河決江十年不窺其家手不爪脛不生毛生偏枯之病步不相過人曰禹步尸子禹有功抑下鴻荀成相股無完胈脛不生毛韓子字書股作腓胈細毛也見遠禹之決江水也民聚瓦礫及其事已成功已立為萬世利禹之所見者遠也而民莫之知呂樂成昔禹決江濬河而民聚瓦石子産開畝樹桑鄭人謫訾韓顯學惜陰禹為司空繼鯀治水勞身涉勤不重徑尺之璧而愛日之寸陰帝王世紀陶侃常語人曰大禹聖人乃惜寸陰至於衆人當惜分陰晉書趨時禹之趨時冠挂而不顧履遺而不取非爭其先也爭得其時也故聖人不貴尺之璧而重寸之陰時難得而易失也淮原道禹之治水身執畚插以為民先當此之時燒不暇撌濡不給扢要略沐浴霪雨梳櫛扶風平治水土定千八百國修務禹蹙洪水身親其勞澤行路宿過門不入當此之時簪墮不掇冠挂不顧而暇耕乎鹽鐵相刺待士禹之治天下也以五聲聽門懸鐘鼓鐸磬而置軺以待四海之士為銘於簨𥲤曰教寡人以道者擊鼓教寡人以義者擊鐘教寡人以事者振鐸語寡人以憂者擊磬語寡人以獄訟者揮鞀此之謂五聲是以禹嘗據一饋而七十起日中而不暇飽食曰吾猶恐四海之士留於道路是以四海之士皆至是以禹當朝廷間也可以羅爵鬻子昔者禹一沐而三握髮一食而三起以禮有道之士通乎已之不足也通乎已之不足則不與物爭矣呂謹聽泣罪禹出見罪人下車問而泣之左右曰夫罪人不順道故使然焉君王何為痛之至於此也禹曰堯舜之人皆以堯舜之心為心今寡人為君也百姓各自以其心為心是以痛之也說苑時多禹嘆物未堯心廣弘明昭明啓作祭器舜禪天下而傳之於禹禹作為祭器墨染其外而朱畫其內縵帛為茵蔣席頗緣觴酌有采而樽俎有飾此彌侈矣而國之不服者三十三韓十過太宗常怪舜造漆器禹雕其俎諫者十餘不止小物何必爾耶褚遂良傳司祿益食昔三苗大亂天命殛之夏禹受于玄宮有大神人面鳥身降而輔之司祿益食而民不飢司金益富而國家實司命益年而民不夭禹乃克三苗而神民不違四方歸之闢地以王隋巢子德衰堯治天下伯成子高為諸侯焉堯授舜舜受禹伯成子高辭為諸侯而耕禹往見之則耕在野禹趨就下位而問焉曰昔者堯治天下吾子立為諸侯焉堯授舜吾子猶存焉及吾在位子辭諸侯而耕何故伯成子高曰昔堯之治天下舉天下而傳之他人至無欲也擇賢而與之其位至公也以至無欲至公之行示天下故不賞而民勸不罰而民畏舜亦猶然今君賞罰而民欲且多私是君之所懷者私也百姓知之貪爭之端自此始矣德自此衰刑自此繁矣吾不忍見以是處野也今君又何求而見我君行矣無留吾事耕而不顧新序舜王天下皋陶佐政北人無擇深隱不見禹王天下伯益輔治伯成子高委位而耕論衡啓攻益伯益干啓位啓殺之竹書燕王欲傳國於子之也問之潘壽對曰禹愛益而任天下於益己而以啓人為史及老而以啓為不足任天下故傳天下於益而勢重盡在啓也已而啓與友黨攻益而奪之天下是禹名傳天下於益而實令啓自取之也韓非子管仲妾婧云睪子生五歲而佐禹曹大家云皋子者皋陶之子伯益也列女傳秦益後益即皋陶子也仲長統昌言金版出地論語陰嬉讖曰庚子之旦金版尅書出地庭中曰臣族虐王禽宋均曰謂殺關龍之後庚子旦庭中地有此版異也龍同姓稱族王虐殺我必見禽也任昉箋云金板出地告龍逢之怨玉鏡尚書帝命驗期云桀失玉鏡用其噬虎注玉鏡謂清明之道虎視謂其暴虐金椎孝經援神契云后偷任威折其玉斗失其金椎注后桀也偷茍且自奉也玉斗者渾儀金椎言國之寶琬琰后桀命扁伐岷山岷山女于桀二人曰琬曰琰桀愛二女無子焉斫其名于苕華之玉苕是琬華是琰而棄其元妃于洛曰妹嬉氏以與伊尹交遂以夏亡紀年大犧桀為無道天下顫恐于辛任威國人大崩湯欲令伊尹往視曠夏恐其不信湯乃自射伊尹伊尹奔夏三年反報于亳曰桀迷于末嬉好彼琬琰不恤其衆民心積怨皆曰上天不恤夏命其卒湯與伊尹盟以示必滅夏伊尹又往視曠夏聽于末嬉之言以告湯湯良車七十乘必死六千人以戊子戰于郕遂禽移大犧登自鳴條乃入巢門遂有夏民大悅親郼如夏呂慎大簡選注琬當作婉婉順阿意之人或作美玉誤按國語桀伐有施有施人以妹嬉女焉妹嬉有寵于是乎與伊尹比而亡夏竹書呂覽末嬉伊尹之事似亦非誣作大輅夏后氏沒殷人受之作為大輅而建九旒食器雕琢觴酌刻鏤四壁堊墀茵席雕文此彌侈矣而國之不服者五十三韓十過太史出奔夏桀迷惑暴亂太史令終古出其圖法執而泣之先奔于商三年而桀乃亡商紂沈于酒德爰近姑卒息殺三不辜太史令向摯一作藝載其圖法先歸文王期年而紂乃亡故聖人之見存亡之迹成敗之際也非乃鳴條之野甲子之日也呂覽淮南天下傑古者桀紂長巨姣美天下之傑也筋力越徑百人之敵也然而身死國亡為天下大僇後世言惡則必稽焉荀非相疇四海至賢疇四海湯武是也至罷不容妻子桀紂是也上正論三宗於殷太甲為太宗太戊曰中宗武丁曰高宗周公為無逸之戒舉三宗以勸成王所以勸帝之功博矣前劉歆議湯有天下傳二十八王而其甚盛者號稱三宗唐太宗贊象箸昔者紂為象箸而箕子怖以為象箸必不加於土鉶必將犀玉之杯象箸玉杯必不羹菽藿則必旄象豹胎旄象豹胎必不衣短褐而食於茅屋之下則錦衣九重廣室高臺吾畏其卒故怖其始居五年紂為肉圃設炮烙登糟邱臨酒池紂遂以亡故箕子見象箸以知天下之禍韓喻老長夜之飲紂為長夜之飲懼以失日問其左右盡不知也乃使問箕子箕子謂其徒曰為天下主而一國皆失日天下其危矣一國皆不知而我獨知之吾其危矣辭以醉而不知韓說林玉版周有玉版紂令膠鬲索之文王不豫費仲來求因豫之是膠鬲賢而費仲無道也周惡賢者之得志也故豫費仲上喻老史蘇曰妲己有寵與膠鬲比而亡殷國語請解炮烙昔者文王侵孟克莒舉酆三事舉而紂惡之文王乃懼請入雒西之地赤壤之國方千里以請解炮烙之刑天下皆悅仲尼聞之曰仁哉文王輕千里之國而請解炮烙之刑智哉文王出千里之地而得天下之心上難二義王費仲說紂曰西伯昌賢百姓悅之諸侯附焉不可不誅不誅必為殷禍紂曰子言義主何可誅費仲曰冠雖穿弊必戴於頭履雖五采必踐之於地今西伯昌人臣也修義而人向之卒為天下患其必昌乎人人不以其賢為其主非可必誅也且主而誅臣焉有過紂曰夫仁義者上所以勸下也今昌好仁義誅之不可三說不用故亡外儲拘文羑里文王砥德修政三年而天下二心歸之紂聞而患之曰余夙興夜寐與之競行則苦心勞形縱而置之恐伐余一人崇侯虎曰周伯昌行仁義而善謀太子其德淮人間陰謀武王伐紂太公陰謀食小兒以丹令身純赤長大教言殷亡殷民見兒赤身以為天神及言殷亡皆謂法啇滅兵至牧野晨舉脂燭姦謀惑民權掩不備周之所諱也論衡兵忌武王之誅紂也行之日以兵忌東面而迎太歲至汜而汜至懷而懷至共頭而山隧霍叔懼曰出三日而五災至無乃不可乎周公曰刳比干而囚箕子飛簾惡來知政夫又惡有不可焉遂選馬而進朝食於戚暮宿於百泉厭旦於牧之野鼓之而紂卒易鄉遂乘殷人而進誅紂荀儒效淮南共頭而墜下云彗星出而授殷人其柄當戰之時十日亂于上風雨擊於中然而前無蹈難之賞而後無遁北之刑白刃不畢拔而天下得矣兵略係墮武王至殷郊係墮五人御於前莫肯之為曰吾所以事君者非係也武王左釋白羽右釋黃鉞勉而自為係孔子聞之曰此五人者之所以為王者佐也不肖主之所弗安也呂不茍文王伐崇至鳳皇墟襪係解因自結之太公望曰何為也王曰君與處皆其師中皆其友下盡其使也今王先君之臣故無可使也韓外儲黃鳥武王率兵車以伐紂紂虎旅百萬陳于商郊起自黃鳥至于赤斧三軍之士靡不失色武王乃命太公把白旄以麾之紂軍反走鬻子任彥升令曰白羽一麾黃鳥發勇敢而不疑中子旦恭儉而知時若與之從則不堪其殃縱而赦之身必危亡冠雖敝必加於頭及未成請圖之屈商乃拘文王於羑里於是散宜生乃以千金求天下之珍怪得騶虞雞斯之乘玄玉百工大貝百朋玄豹黃羆青犴白虎文皮千合以獻於紂因費仲而通紂見而說之乃免其身殺牛而賜之文王歸乃為玉門築靈臺相女童擊鐘鼓以待紂之失也紂聞之曰周伯昌改道易行吾無憂矣乃為炮烙剖比干剔孕婦殺諫者文王乃遂其謀淮道應三淫周文王處岐諸侯去殷三淫而翼文王散宜生曰殷可伐也文王弗許周公旦乃作詩曰文王在上於昭于天周雖舊邦其命惟新以繩文王之德呂古樂見幾公子曰文王率殷之叛國而事紂是納紂為虐使得志天下流毒百姓文王之為也何不仁之甚乎孰若直司正諫以正其患先生曰夫幾者動之微也非聖人不能見也于時曆數雖改殷仲尚強紂剛猛暴虐飾非拒諫豈文王之能動乎通曆玉馬論語比考讖曰殷惑妲己玉馬走宋均曰女妲己有美色也玉馬喻賢臣奔去也任昉箋云玉馬駿奔表微子之去澤枯湯教祝網者而四十國朝文王葬死人之骸而九夷歸之武王蔭暍人於樾下左擁而右扇子而天下懷底定甲既鱗下車亦瓦解坶野武王伐紂戰于牧野紂之卒輻分紂之車瓦裂紂之甲如鱗下賀乎武王書大傳武王大敗殷人上堂見玉曰誰之玉也曰諸侯之玉即取而歸之於諸侯天下聞之曰武王廉於財矣入室見女曰誰之女也曰諸侯之女也即取而歸之於諸侯天下聞之曰武王廉於色也說苑乃封比干之墓表商容之閭迎箕子之棺朝成湯之廟淮南道應立其後于宋以奉桑林呂慎大於是聽遺老之言復盤庚之政發巨橋之粟散鹿臺之錢以示民無私出拘救罪分財棄責以振窮困呂破鼓折枹弛弓絶弦去含露宿以示平易解劍帶笏以示無仇淮濟河而西歸報于廟呂天下酌酒鬱搖樂稽耀嘉康梁紂為天子賦斂無度戮殺無止康梁沈湎宮中成市天下同心而苦之淮南要略天智玉武王克商時甲子夕紂取天智玉琰五環身以自焚凡厥有庶告焚玉四千五日武王乃俾于千人求之四千庶玉則銷天智玉五在火中不銷凡武王俘商舊寶萬千佩玉億有八萬周書注天智玉之美者縫環其身自厚也凡焚玉四千庶玉則銷天智玉不銷紂身不盡也殷長者武王入殷聞殷有長者武王往見之而問殷之所以亡殷長者對曰王欲知之則請以日中為期武王與周公旦明日早要期則弗得也武王怪之周公曰吾已知之矣此君子也取不能其主有以其惡告王不忍為也若夫期而不當言而不信此殷之所以亡也已以此告王矣呂貴因武有七德楚子曰夫文止戈為武武王克商作頌曰載戢干戈載櫜弓矢夫武禁暴戢兵保大定功安民和衆豐財者也故使子孫無忘其章左宣十三示民無返武王伐紂過隧斬岸過水拆舟過谷發梁過山焚萊示民無返志也說苑權謀載尸武王伐紂載尸而行海內未定故不為三年之喪始淮南齊俗成王周公旦所朝於窮巷之中甕牖之下者七十人文王造之而未遂武王遂之而未成周公抱少主而成之故曰成王呂下賢成周成王之定成周也其辭曰惟余一人營居于成周惟余一人有善易得而見也有不善易得而誅也上長利政度成王問政於尹佚曰吾何德之行而民親其上對曰使之時而敬順之王曰其度安在曰如臨深淵如履薄冰王曰懼哉王人乎尹佚曰天地之間四海之內善之則吾畜也不善則吾讎也昔夏商之臣反讎桀紂而臣湯武宿沙之民皆自攻其君而歸神農此世之所明知也如何其無懼也淮南道應民得四生成王曰寡人聞之聖王在上位使民富且壽云若夫富則可為也若夫壽則不在天乎粥子對曰唯疑請以上世之政詔於君王政曰聖王在上位則天下無軍兵之事故諸侯不私相攻而民不私相鬪閲不私相煞也故聖王在上位則民免於一死而得一生矣聖王在上則君積於道而吏積於德而民積於用力故婦人為其所衣丈夫為其所食則民無凍餒矣故聖王在上則民免於二死而得二生矣聖王在上則君積於仁而吏積於愛而民積於順則刑罰廢矣而民無夭遏之誅故聖王在上則民免於三死而得三生矣聖王在上則使民有時而用之有節則民無厲疾故聖王在上則民免於四死而得四生矣聖王在上則使盈境內興賢良以禁邪惡故賢人必用而不肖人不作則已得其命矣故夫富且壽者聖王之功也周成王曰受命矣賈子上賢周至成王有上賢之材因文武之業以周召為輔有司各敬其事在位莫非其人天下甫二世耳然周公猶作詩書深戒成王以恐失天下書則曰王毋若殷王紂其詩則曰宜監于殷駿命不易前翼奉傳法度素定昔成王之政周公在前召公在後畢公在左史佚在右四子挾而維之目見正容耳聞正言一日即位天下曠然言其法度素定也後翟酺傳流聲成王之為太子也則周召為保傅史佚昭文章故能聞道極備登崇大業刑措不用流聲洋溢晉江統傳中才成王人之中才也近管蔡則讒入有周召則義聞豈可謂天聰明哉然而克終於道者得不謂教之然耶元氏長慶集周公左而召公右伯禽魯而太公齊上薰風潛暢成康以四十二年之間刑厝不用薰風潛暢頌聲遐舉越裳重譯萬里來歸隋志藩屏王子朝使告于諸侯曰昔武王克殷成王靖四方康王息民並建母弟以蕃屏周亦曰吾無專享文武之功至于厲王王心戾虐萬民弗忍居王于彘諸侯釋位以間王政宣王有志而後效官左昭二十六年共伯和共伯和即于王位竹書共伯名和好行仁義諸侯賢之厲王無道國人作難王奔于彘諸侯奉和以行天子事號曰共和元年魯連子十四年大旱廬舍俱焚卜于太陽兆曰厲王為祟共伯子使諸侯王子請為宣王共伯復歸國于衛和有至德尊之不喜廢之不怒逍遙得志于共山之首司馬彪莊注沈約竹書注許由虞乎潁陽而共伯得乎共首莊讓王呂慎大共伯和修其行好仁賢而海內皆以來為稽矣周厲之難天子曠絶而天下皆來請矣呂開春觀左傳釋位效官及魯呂諸書則共伯名和無可疑者高誘注乃謂共國伯爵夏時諸侯共首得志不知出何書何耶漢書古今人表云共伯和孟康云入為三公今本無師古曰和共伯名遷史以為周召二相行政號曰共和無所據也四三王夏扶謂荊軻曰何以教太子軻曰高欲令四三王下欲令六五霸於君何如也燕丹子天下有有道之士雖幸而有未必知也不知則與無賢同此治世之所以短而亂世之所下長也故王者不四霸者不六亡國相望明主相及得士則無此之患呂觀世非唐笑虞始皇既并海內以威力為王道以權詐為要術遂非唐笑虞絶滅舊章防禁文學行是古之戮嚴誹謗之誅十餘年滂沱而盈溢故皇天疾威吾丘壽王論金鏡尚書考靈曜曰秦失金鏡魚目入珠鄭玄曰金鏡喻明道也始皇呂不韋子言亂真也折槁秦皇挾録圖見其傳曰亡秦者胡也因發卒五十萬萬使蒙公楊翁將築修城西屬流沙北擊遼水東結朝鮮中國內郡挽車而餉之又利越之犀角象齒翡翠珠璣乃使尉屠雎發卒五十萬為五軍一軍塞鐔城之嶺一軍守九嶷之塞一軍守番禺之都一軍守南野之界一軍結餘干之水二年不解甲弛弩使監祿無以轉餉又以卒鑿渠而通糧道以與越人戰殺西嘔君譯吁宋而越人皆入叢薄中與禽獸處莫肯為秦虜相置桀駿以為將而夜攻秦人殺尉屠睢伏尸流血數十里乃發適戍以備之於是陳勝起于大澤劉項興義兵隨而定若折槁振落遂亡天下禍在備胡而利越也淮人間鑄金人秦之時高為臺榭大為苑囿遠為馳道鑄金人發適戍入芻苑頭會箕賦輸於少府丁壯丈夫西至臨洮狄道東至會稽浮石南至豫章桂林北至飛狐陽原道路死人以溝量當此之時忠諫者謂之不祥而道仁義者謂之狂淮汜論然劉氏奪之若轉閉錘道應十亡始皇既兼天下大侈靡於是有方士韓客侯生齊客盧生相與謀亡去始皇大怒坑犯法者四百六十餘人盧生不得而侯生後至始皇召見將數而車裂之侯生曰臣聞知死必勇陛下肯聽臣一言乎始皇曰若欲何言言之侯生曰陛下奢侈淫泆下喑上聾臣等故去丹朱傲虐好慢遊遂以不升今陛下之淫萬丹朱而千昆吾夏桀臣恐陛下之十亡也而曾不一存始皇默然久之曰汝何不早言侯生曰陛下之意方乘青雲飄搖於文章之觀自賢自健上侮五帝下凌三王棄朴素就末技陛下亡徵見久矣臣等恐言之無益也而自取死故逃今臣必死故為陛下陳之欲使陛下自知也始皇曰吾可以變乎侯生曰形已成矣陛下之佐又非也臣恐變之不能存也始皇喟然釋之說苑反質任刑昔秦法繁於秋荼而網密於凝脂然而上下相遁姦僞萌生有司法之若救爛撲焦不能禁非網疏而罪漏禮義廢而刑罰任也鹽鐵刑德虎挒梟磔始皇方虎磔而梟磔噬士猶臘肉也楊重黎自營始皇既吞天下召群臣而議曰吾德出於五帝吾將官天下誰可使代我後者鮑白令之對曰陛下行桀紂之道欲為五帝之禪非陛下所能行也始皇大怒曰令之前若何以言我行桀紂之道也趣說之不解則死對曰陛下築靈于雲宮殿五里建千石之鐘萬石之虡婦女連百倡優纍千興作驪山宮室至雍相繼不絶所以自奉者殫天下竭民力偏駁自私不能以及人所謂自營僅存之主也何暇比德五帝欲官天下哉始皇暗然面有慚色久之曰令之之言乃令衆醜我說苑至公巢杖秦以刑罰為巢故有覆巢破卵之患以趙高李斯為杖故有傾仆缺覆之禍何哉所任非也陸賈新語獻蒲為脯二世時趙高用事乃先獻蒲為脯指鹿為馬以驗群臣古今注風俗通趙高欲作亂或以青為黑黑為黃民言從之至今語猶存也鄭玄禮器注崔琦對梁冀曰將使玄黃改色馬鹿易形乎後漢文苑傳漢階桀紂是湯武之梯秦項是大漢之階四逆不興則四順不升周生烈子卯金有人卯金握天鏡春秋録孔法卯金出軫握命孔符尚書考靈曜帝命驗云賊起蜚卯生虎注賊始皇虎高祖出軫有人雄起戴玉英祈旦失籥亡其金虎東南紛紛注精起昌光出軫已圖之上金虎喻秦君什殷周漢興以來傳文未遠以所聞見伍唐虞而什殷周煥炳郁郁莫盛於斯論衡佚文總萬廷高皇攝政總萬廷四海歸詠治威明文德道化承天精元祚興隆協聖靈龍魚河圖鳳舉高帝龍飛鳳舉於楚宋之間山東子弟為輔鹽鐵國病光武龍興鳳舉取天下若拾遺何以不及湯武論衡齊世優五代堯以唐侯入嗣帝位舜以司徒因堯授禪禹以司空緣功代舜湯由七十里文王百里武王為西伯襲文王位五代之起皆有因緣力易為也高祖從亭長提三尺劍取天下光武由白水奮威武海內無尺土所因一位所乘直奉天命樂推自然此則起高於淵汙為深於邱山也比方五代孰者為優論衡恢國七制大哉七制之主其以仁義公恕統天下乎其役簡其刑清君子樂其道小人懷其生四百年間天下無二志其有以結人心乎終之以禮樂則三王之舉也文中天地蜀三傑徵士傅幹曰劉備寬仁有度能得人死力諸葛亮達治知變正而有謀而為之相張飛關羽勇而有義皆萬人之敵而為之將此三人者皆人傑也以備之略三傑佐之何為不濟也蜀志二天中記卷十一
